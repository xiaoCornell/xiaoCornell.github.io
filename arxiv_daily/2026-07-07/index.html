  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;

      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2607.02661", "category": "cond-mat", "title": "Non-equilibrium coupling to a diffusing density breaks Ising universality", "abstract": "The Ising universality class is remarkably robust to non-equilibrium perturbations, which generically flow to zero under renormalization. We show that this robustness fails when an order parameter is coupled nonreciprocally to a conserved diffusive density. Below $d_c=4$, the renormalization group flows to a fast-diffusion fixed point at which the density acts as a long-range multiplicative noise, producing a novel universality class. The non-equilibrium nature of the fixed point is manifest in the large-scale violation of the fluctuation-dissipation relations, reflected in a splitting of the scaling exponents of the two-point correlation and response functions--a measurable hallmark of non-equilibrium critical fluctuations. A two-loop calculation establishes the stability of this fixed point but yields a small correction-to-scaling exponent $\\omega\\approx0.020$ in $d=3$, implying strong finite-size corrections. An all-orders modified Harris criterion $\\nu>2/(d+z-2)$ confirms that the BIM fixed point governs criticality in $d=3$, with Ising universality recovered only at $d=2$.", "url": "https://arxiv.org/abs/2607.02661", "type": "理论+数值", "summary": "伊辛普适性类对于非平衡扰动非常稳健，在重整化下，非平衡扰动通常趋于零。我们证明，当有序参数与守恒扩散密度不可逆耦合时，这种鲁棒性就会失效。在 $d_c=4$ 以下，重正化群流向一个快速扩散固定点，在该点密度充当远程乘性噪声，产生一个新颖的普遍性类。不动点的非平衡性质体现在对涨落-耗散关系的大规模违反上，反映在两点相关函数和响应函数的标度指数的分裂上——这是非平衡临界涨落的可测量标志。两环计算建立了该固定点的稳定性，但在 $d=3$ 中产生一个小的缩放校正指数 $\\omega\\approx0.020$，这意味着强大的有限大小校正。全阶修改哈里斯准则 $\\nu>2/(d+z-2)$ 证实 BIM 固定点控制 $d=3$ 中的关键性，伊辛普适性仅在 $d=2$ 时恢复。", "authors": [{"name": "Mattia Scandolo"}, {"name": "Johannes Pausch"}, {"name": "Michael E. Cates"}, {"name": "Luca Di Carlo"}], "featured_authors": [{"name": "Mattia Scandolo"}, {"name": "Johannes Pausch"}, {"name": "Michael E. Cates"}, {"name": "Luca Di Carlo"}], "author_count": 4}, {"id": "2607.02747", "category": "cond-mat", "title": "Anisotropic magnetoresistance of 2D Rashba films with in-plane Zeeman field and short-range disorder", "abstract": "We study the dc conductivity of a continuum two-dimensional Rashba film with an in-plane Zeeman field and delta-correlated scalar disorder. Although the field deforms the two helicity Fermi contours and rotates the spin texture, it does not produce anisotropic magnetoresistance in the leading quasiclassical conductivity. The mechanism is geometric. A density Ward identity fixes the spin-vector part of the Born self-energy to the derivative of the total particle density with respect to the field. This derivative vanishes, because the total area enclosed by the two Rashba-Zeeman sheets is independent of the in-plane field. The Born self-energy is therefore scalar and field independent, and the quasiparticle lifetime stays isotropic. The same area invariance controls transport: once the leading impurity ladder reduces the current vertex to the parabolic velocity, the diagonal intraband Kubo conductivity collapses onto the two-sheet occupied area and is field independent as well. The result settles the short-range-disorder quasiclassical problem: point-like nonmagnetic impurities do not produce AMR in this model. A nonzero AMR requires physics beyond this quasiclassical short-range-disorder mechanism.", "url": "https://arxiv.org/abs/2607.02747", "type": "理论", "summary": "我们研究了具有面内塞曼场和 δ 相关标量无序的连续二维 Rashba 薄膜的直流电导率。尽管场使两个螺旋费米轮廓变形并旋转自旋纹理，但它不会在领先的准经典电导率中产生各向异性磁阻。该机制是几何的。密度沃德恒等式将玻恩自能的自旋矢量部分固定为总粒子密度相对于场的导数。该导数消失，因为两个 Rashba-Zeeman 片包围的总面积与面内场无关。因此，玻恩自能与标量和场无关，并且准粒子寿命保持各向同性。相同的面积不变性控制输运：一旦领先的杂质梯将当前顶点降低到抛物线速度，对角带内 Kubo 电导率就会塌陷到两片占据的区域上，并且也是场无关的。结果解决了短程无序准经典问题：点状非磁性杂质在此模型中不会产生 AMR。\n\n非零 AMR 需要超越这种准经典短程无序机制的物理学。", "authors": [{"name": "Igor Gornyi"}, {"name": "Alexander Khaetskii"}], "featured_authors": [{"name": "Igor Gornyi"}, {"name": "Alexander Khaetskii"}], "author_count": 2}, {"id": "2607.02762", "category": "cond-mat", "title": "Shear and crystallization in deformable granular packings: why don't auxetics order?", "abstract": "Shear of three-dimensional, highly compressed granular packings is simulated using a bonded particle approach that explicitly resolves elastic deformation. Varying Poisson's ratio $\\nu$ produces significant changes in rheology, packing structure, and grain morphology. During flow, conventional systems ($\\nu > 0$) readily crystallize while auxetics ($\\nu < 0$) resist ordering. This duality reflects the fact that conventional grains develop polyhedral-like facets but conserve volume while auxetics behave oppositely, demonstrating an unexpected interaction between elasticity, geometry, and crystallization.", "url": "https://arxiv.org/abs/2607.02762", "type": "理论", "summary": "使用可明确解决弹性变形的粘合颗粒方法来模拟三维、高度压缩的颗粒填料的剪切。改变泊松比 $\\nu$ 会导致流变学、堆积结构和颗粒形态发生显着变化。在流动过程中，传统系统 ($\\nu > 0$) 容易结晶，而拉胀系统 ($\\nu < 0$) 则难以有序化。这种二元性反映了这样一个事实，即传统晶粒形成类似多面体的面，但保留体积，而拉胀行为则相反，这表明弹性、几何形状和结晶之间存在意想不到的相互作用。", "authors": [{"name": "Joel T. Clemmer"}, {"name": "Nicholas W. Hackney"}, {"name": "Gary S. Grest"}], "featured_authors": [{"name": "Joel T. Clemmer"}, {"name": "Nicholas W. Hackney"}, {"name": "Gary S. Grest"}], "author_count": 3}, {"id": "2607.02812", "category": "cond-mat", "title": "Theoretical investigation of power absorbed by superconductors with Rashba spin-orbit coupling in the presence external time-dependent perturbation", "abstract": "The absorbed power in superconductors driven by a time-dependent external perturbation is investigated through transitions between Bogoliubov quasiparticle states. The transition matrix element contains the superconducting coherence factor, which determines the role of the gap, excitation spectrum, and external frequency in the absorption process. The formulation is applied to a Hubbard-model superconductor including correlated hopping and Rashba spin-orbit coupling. In this model, numerical calculations are used to obtain the quasiparticle energies, density of states, chemical potential, and temperature-dependent superconducting gap. The normalized absorbed power is then evaluated for different values of temperature, interaction strength, correlated hopping parameter, and spin-orbit coupling strength. The results show that the absorption response is strongly affected by the superconducting gap and by changes in the quasiparticle spectrum. Rashba spin-orbit coupling changes the density of states and therefore modifies the absorption. These results show that hopping processes, interaction strength, and spin-orbit coupling play important roles in the ultrasonic and electromagnetic absorption of superconducting systems.", "url": "https://arxiv.org/abs/2607.02812", "type": "理论+数值", "summary": "通过 Bogoliubov 准粒子态之间的转变来研究由时间相关的外部扰动驱动的超导体中的吸收功率。过渡矩阵元素包含超导相干因子，它决定了能隙、激发光谱和外部频率在吸收过程中的作用。该公式应用于哈伯德模型超导体，包括相关跳跃和 Rashba 自旋轨道耦合。在该模型中，使用数值计算来获得准粒子能量、态密度、化学势和与温度相关的超导能隙。然后针对不同的温度值、相互作用强度、相关跳跃参数和自旋轨道耦合强度来评估归一化吸收功率。结果表明，吸收响应受到超导能隙和准粒子光谱变化的强烈影响。 Rashba 自旋轨道耦合改变了态密度，从而改变了吸收。\n\n这些结果表明，跳跃过程、相互作用强度和自旋轨道耦合在超导系统的超声波和电磁吸收中发挥着重要作用。", "authors": [{"name": "Reza Afzali"}, {"name": "Bahman Takrim"}, {"name": "Amir Hossein Asghari"}], "featured_authors": [{"name": "Reza Afzali"}, {"name": "Bahman Takrim"}, {"name": "Amir Hossein Asghari"}], "author_count": 3}, {"id": "2607.02848", "category": "cond-mat", "title": "Crystal structure and basic properties of dirhenate quantum materials", "abstract": "The anhydrous divalent 3d-metal dirhenate quantum materials, M(ReO$_4$)$_2$,were synthesized using solid-state methods for M = Mn through Zn. Previously unreported Mg(ReO4)2 is also described. Their layered crystal structures, which feature an in-plane triangular lattice of M$^{2+}$, were refined using single crystal X-ray diffraction, and their optical absorption and several other physical properties were characterized. Their magnetism and heat capacity reveal long-range magnetic order at low temperatures in many of the M(ReO$_4$)$_2$ phases. Notably, many of these ordered states are sensitive to applied magnetic fields and can be readily suppressed by relatively small fields, suggesting competing magnetic interactions in a low-dimensional framework, which appear worthy of further study.", "url": "https://arxiv.org/abs/2607.02848", "type": "理论", "summary": "采用固态方法合成了无水二价3d-金属二钌酸盐量子材料M(ReO$_4$)$_2$，其中M = Mn至Zn。还描述了以前未报道的 Mg(ReO4)2。它们的层状晶体结构具有 M$^{2+}$ 面内三角晶格，利用单晶 X 射线衍射对其进行了细化，并表征了它们的光学吸收和其他一些物理性质。它们的磁性和热容揭示了许多 M(ReO$_4$)$_2$ 相在低温下的长程磁序。值得注意的是，许多有序态对施加的磁场敏感，并且很容易被相对较小的场抑制，这表明低维框架中存在竞争性磁相互作用，这似乎值得进一步研究。", "authors": [{"name": "Danrui Ni"}, {"name": "Xianghan Xu"}, {"name": "Stephen Zhang"}, {"name": "N.P. Ong"}, {"name": "Sanfeng Wu"}, {"name": "R. J. Cava"}], "featured_authors": [{"name": "Danrui Ni"}, {"name": "Xianghan Xu"}, {"name": "Stephen Zhang"}, {"name": "N.P. Ong"}, {"name": "Sanfeng Wu"}, {"name": "R. J. Cava"}], "author_count": 6}, {"id": "2607.02953", "category": "cond-mat", "title": "Hall Shift Current and Nonlinear Anomalous Hall Effect in Gapped Dirac Fermion Systems", "abstract": "We discuss a new mechanism for the nonlinear anomalous Hall effect in tilted two-dimensional gapped Dirac fermion systems. This mechanism originates from a side-jump displacement associated with Landau-Zener tunneling across the mass gap. In lightly doped tilted Dirac systems with a small gap, this interband mechanism can contribute to the nonlinear anomalous Hall effect in addition to the conventional intraband mechanism arising from the Berry curvature dipole. It provides a possible explanation for the nonlinear Hall effect accompanied by nonlinear longitudinal transport observed in the organic Dirac fermion system {\\alpha}-(ET)2I3 with an extremely small gap.", "url": "https://arxiv.org/abs/2607.02953", "type": "理论", "summary": "我们讨论了倾斜二维有隙狄拉克费米子系统中非线性反常霍尔效应的新机制。这种机制源于与跨越质量间隙的朗道-齐纳隧道相关的侧跳位移。在具有小间隙的轻掺杂倾斜狄拉克系统中，除了由贝里曲率偶极子产生的传统带内机制之外，这种带间机制还可以促成非线性反常霍尔效应。它为在极小间隙的有机狄拉克费米子系统 {\\alpha}-(ET)2I3 中观察到的伴随非线性纵向输运的非线性霍尔效应提供了可能的解释。", "authors": [{"name": "Toshihito Osada"}], "featured_authors": [{"name": "Toshihito Osada"}], "author_count": 1}, {"id": "2607.03022", "category": "cond-mat", "title": "When Repulsion Creates Pairing: A New Perspective on Unconventional Superconductivity", "abstract": "Despite the repulsive Coulomb law and the Pauli statistics that do not favor bound states, attraction between electrons or holes is nevertheless possible in the context of many body interaction and of valley potential landscapes, reminiscent of exotic superconducting materials. In particular, in 1965, Kohn and Luttinger published a note revealing that the dynamical screening of the repulsive Coulomb interaction leads, under certain conditions, to an effective attraction necessary for the formation of Cooper pairs. We propose such a formalism adapted to the cuprates, where the screening arises from the superexchange dynamics of virtual holes in the oxygen orbitals of the $Cu O_2$ plane. Inspired from the Bardeen-Copper-Schrieffer (BCS) theory, we can derive some predictions for the temperature-doping phase diagram (pseudo-gap, strange metal, antiferromagnetism, superconducting, and normal states) in semi-quantitative agreement with observations.", "url": "https://arxiv.org/abs/2607.03022", "type": "理论+数值", "summary": "尽管排斥的库仑定律和泡利统计不利于束缚态，但在许多物体相互作用和谷势景观的背景下，电子或空穴之间的吸引力仍然是可能的，让人想起奇异的超导材料。特别是，1965 年，Kohn 和 Luttinger 发表了一篇文章，揭示了排斥库仑相互作用的动态筛选在某些条件下会导致形成库珀对所需的有效吸引力。我们提出了一种适用于铜酸盐的形式主义，其中筛选源于 $Cu O_2$ 平面氧轨道中虚拟空穴的超交换动力学。受 Bardeen-Copper-Schrieffer (BCS) 理论的启发，我们可以对温度掺杂相图（赝能隙、奇异金属、反铁磁性、超导和正常态）进行一些预测，与观测结果半定量一致。", "authors": [{"name": "Patrick Navez"}], "featured_authors": [{"name": "Patrick Navez"}], "author_count": 1}, {"id": "2607.03032", "category": "cond-mat", "title": "Entropy density functional universality: Correlation, response, and entropic Ornstein-Zernike structure", "abstract": "We give a comprehensive account of the recent entropy density functional theory for the equilibrium statistical mechanics of classical many-body systems ( arXiv:2606.28240 ). The approach is formally exact and based on a joint grand potential minimization principle for the one-body density and the global pair distance distribution. These variational fields depend respectively on position and on scalar distance, which retains the low computational complexity of standard density functional theory. Correlations effects are contained in a unique excess entropy functional, which is universal across all systems with pairwise interparticle potentials. Functional differentiation yields entropic direct correlation functionals that generate entropic response and fluctuation correlation functions via coupled Ornstein-Zernike equations. Two alternative proofs are given for the existence and uniqueness of the underlying metadensity functional map, based on generalizations of either Levy's constrained search method or Mermin-Evans proof by contradiction. Simple excess entropy approximations yield the standard mean-field and second-virial excess free energy density functionals. We describe exact entropic functional line integrals, make connections to the recent one-body fluctuation profiles, and generalize the entropy approach beyond pairwise interparticle potentials.", "url": "https://arxiv.org/abs/2607.03032", "type": "理论+数值", "summary": "我们全面介绍了经典多体系统平衡统计力学的最新熵密度泛函理论（arXiv：2606.28240）。该方法在形式上是精确的，并且基于单体密度和全局对距离分布的联合大势最小化原理。这些变分场分别取决于位置和标量距离，这保留了标准密度泛函理论的低计算复杂度。相关效应包含在独特的过剩熵泛函中，该泛函在所有具有成对粒子间势的系统中都是通用的。函数微分产生熵直接相关函数，通过耦合的 Ornstein-Zernike 方程生成熵响应和波动相关函数。基于 Levy 约束搜索方法或 Mermin-Evans 反证法的推广，给出了底层元密度函数图的存在性和唯一性的两个替代证明。简单的过剩熵近似产生标准平均场和第二维里过剩自由能密度泛函。\n\n我们描述了精确的熵函数线积分，与最近的单体波动剖面建立了联系，并将熵方法推广到了成对粒子间势之外。", "authors": [{"name": "Matthias Schmidt"}], "featured_authors": [{"name": "Matthias Schmidt"}], "author_count": 1}, {"id": "2607.03102", "category": "cond-mat", "title": "Winding charge density wave: intertwining of structural chirality and phase topology of electronic order", "abstract": "We propose a class of chiral charge density waves (CDWs), dubbed winding CDWs, that exhibit macroscopic chirality despite a single ordering wavevector. In screw-symmetric chiral crystals, chiral phonons drive a Peierls instability that selects a definite crystal angular momentum channel, thereby endowing the CDW with an integer azimuthal phase winding dictated by the selection rule governing electron-phonon coupling. We further extend this framework to achiral crystals with discrete rotational symmetry and demonstrate that spontaneous symmetry breaking stabilizes a winding CDW with either handedness, realizing an achiral-to-chiral phase transition. Our results reveal a fundamental link between the geometry of chiral structures and the phase topology of electronic orders.", "url": "https://arxiv.org/abs/2607.03102", "type": "理论", "summary": "我们提出了一类手性电荷密度波（CDW），称为缠绕 CDW，尽管具有单一有序波矢，但仍表现出宏观手性。在螺旋对称手性晶体中，手性声子驱动 Peierls 不稳定性，选择确定的晶体角动量通道，从而赋予 CDW 具有由控制电子声子耦合的选择规则决定的整数方位角相位绕组。我们进一步将该框架扩展到具有离散旋转对称性的非手性晶体，并证明自发对称性破缺可以稳定具有任意旋向的缠绕CDW，从而实现非手性到手性的相变。我们的结果揭示了手性结构的几何形状与电子序的相拓扑之间的基本联系。", "authors": [{"name": "Shun Asano"}, {"name": "Youichi Yanase"}], "featured_authors": [{"name": "Shun Asano"}, {"name": "Youichi Yanase"}], "author_count": 2}, {"id": "2607.03172", "category": "cond-mat", "title": "Martensitic Transformation in Crystal-Amorphous Superlattices of NiTi Shape Memory Alloy", "abstract": "Shape memory alloys (SMAs) exhibit unique thermo-mechanical properties arising from reversible martensitic transformation. Tailoring these properties through coherent second phases is effective but is often limited by the difficulty of identifying thermodynamically compatible phases. Crystal-amorphous superlattices (CAS), in which the second phase is derived from the base material itself, provide an attractive alternative. However, the influence of partial amorphization on martensitic transformation and thermo-mechanical behavior remains largely unexplored. Here, large-scale molecular dynamics simulations are used to investigate temperature- and stress-induced martensitic transformations in CAS-NiTi with different crystalline phase fractions. Partial amorphization fundamentally modifies the transformation pathway, introducing an initial continuous (second-order-like) transformation before the conventional first-order martensitic transformation. The amorphous phase also enhances transformation reversibility, reducing the thermal hysteresis from 275 K in fully crystalline NiTi to 95-110 K in CAS-NiTi. Simultaneously, the elastic modulus and the critical stress for stress-induced martensitic transformation increase by approximately 60-90 percent, depending on the crystalline fraction. These improvements originate from heterogeneous nucleation at crystal-amorphous interfaces, retained austenite that promotes the reverse transformation, and mechanical constraint imposed by the amorphous phase. These findings establish crystal-amorphous superlattices as a promising microstructural design strategy for tailoring the thermo-mechanical performance of shape memory alloys.", "url": "https://arxiv.org/abs/2607.03172", "type": "理论+数值", "summary": "形状记忆合金 (SMA) 表现出由可逆马氏体转变产生的独特热机械性能。通过相干第二相调整这些特性是有效的，但通常受到识别热力学相容相的困难的限制。晶体非晶超晶格（CAS）提供了一种有吸引力的替代方案，其中第二相源自基础材料本身。然而，部分非晶化对马氏体转变和热机械行为的影响在很大程度上仍未被探索。在这里，大规模分子动力学模拟用于研究具有不同晶相分数的 CAS-NiTi 中温度和应力诱导的马氏体转变。部分非晶化从根本上改变了转变路径，在传统的一阶马氏体转变之前引入了初始连续（类二阶）转变。非晶相还增强了相变可逆性，将热滞后从全结晶 NiTi 的 275 K 降低到 CAS-NiTi 的 95-110 K。\n\n同时，应力诱导马氏体相变的弹性模量和临界应力增加约 60-90%，具体取决于结晶分数。这些改进源于晶体-非晶界面处的异质成核、促进逆相变的残余奥氏体以及非晶相施加的机械约束。这些发现将晶体非晶超晶格确立为一种有前途的微观结构设计策略，用于定制形状记忆合金的热机械性能。", "authors": [{"name": "Bhavna Singh"}, {"name": "Shivam Tripathi"}], "featured_authors": [{"name": "Bhavna Singh"}, {"name": "Shivam Tripathi"}], "author_count": 2}, {"id": "2607.03208", "category": "cond-mat", "title": "Data-driven multi-objective optimization for alloy recycling using factorization machines and quantum annealing", "abstract": "Quantum annealing has the potential to provide practical quantum advantage for complex optimization tasks. Here, we present a systematic assessment of an integrated factorization-machine and quantum-annealing workflow (FM+QA) for a technologically relevant application: multi-objective Pareto optimization in metal up-cycling through alloy design. To address the non-convex nature of the Pareto front, we employ the recently proposed data-driven Tchebycheff scalarization (DDTS) scheme. Our results show that FM+QA extends the applicability of QUBO-based optimization to data-driven materials discovery problems with multiple competing objectives. In particular, we analyze the scaling behavior of the approach and compare quantum annealing with classical simulated annealing using both regular binary encoding and one-hot encoding. Finally, we provide a critical perspective on the problem sizes and encoding strategies for which quantum-annealing-based optimization may become practically beneficial in the near future.", "url": "https://arxiv.org/abs/2607.03208", "type": "理论+数值", "summary": "量子退火有潜力为复杂的优化任务提供实用的量子优势。在这里，我们对集成因子分解机和量子退火工作流程 (FM+QA) 进行了系统评估，用于技术相关的应用：通过合金设计进行金属升级循环的多目标帕累托优化。为了解决帕累托前沿的非凸性质，我们采用了最近提出的数据驱动的切比雪夫标量化（DDTS）方案。我们的结果表明，FM+QA 将基于 QUBO 的优化的适用性扩展到具有多个竞争目标的数据驱动的材料发现问题。特别是，我们分析了该方法的缩放行为，并将量子退火与使用常规二进制编码和 one-hot 编码的经典模拟退火进行了比较。最后，我们对问题规模和编码策略提供了一个批判性的视角，基于量子退火的优化可能在不久的将来变得实际有益。", "authors": [{"name": "Thomas Plehn"}, {"name": "Katrin Bugelnig"}, {"name": "Silvana Tumminello"}, {"name": "Daniel Barragan-Yani"}, {"name": "David Melching"}], "featured_authors": [{"name": "Thomas Plehn"}, {"name": "Katrin Bugelnig"}, {"name": "Silvana Tumminello"}, {"name": "Daniel Barragan-Yani"}, {"name": "David Melching"}], "author_count": 5}, {"id": "2607.03300", "category": "cond-mat", "title": "Variance of the $SIS$ Epidemic on Networks: A Diffusion Approximation", "abstract": "Functional laws of large numbers (FLLNs) describe the mean-field trajectory of epidemics on networks, but say nothing about the fluctuations around it. These fluctuations are governed by moments of the degree distribution not relevant at the level of the mean. A rigorous functional central limit theorem (FCLT) exists for the susceptible--infected ($SI$) process on configuration-model graphs, but no analogue exists for $SIS$, where recovery reintroduces vertices into the susceptible pool with partially known neighborhoods, breaking the clean neighborhood distribution the $SI$ derivation relies on. We develop a tractable variance approximation for Markovian $SIS$ on configuration-model graphs, combining Gleeson's approximate master equation (AME) framework with a van Kampen system-size expansion in the spirit of the $SI$ FCLT. We derive a closed drift and diffusion matrix for a reduced susceptible/$SI$-edge/$SS$-edge count vector and obtain the time-dependent covariance via the associated Langevin/Lyapunov equation. Validation against Gillespie simulation across Poisson, regular, and power-law networks shows close agreement, with deviations near the epidemic threshold and in strongly heterogeneous networks.", "url": "https://arxiv.org/abs/2607.03300", "type": "理论+数值", "summary": "大数函数定律（FLLN）描述了网络上流行病的平均场轨迹，但没有提及其周围的波动。这些波动由与平均值水平无关的度分布矩控制。配置模型图上的易感-感染 ($SI$) 过程存在严格的功能中心极限定理 (FCLT)，但 $SIS$ 不存在类似物，其中恢复将顶点重新引入具有部分已知邻域的易感池中，打破了 $SI$ 推导所依赖的干净邻域分布。我们本着 $SI$ FCLT 的精神，将 Gleeson 的近似主方程 (AME) 框架与 van Kampen 系统规模扩展相结合，在配置模型图上为马尔可夫 $SIS$ 开发了一种易于处理的方差近似。我们为减少的易受影响/$SI$-edge/$SS$-edge 计数向量导出闭合漂移和扩散矩阵，并通过相关的 Langevin/Lyapunov 方程获得时间相关协方差。\n\n对泊松网络、正则网络和幂律网络的吉莱斯皮模拟进行的验证显示出接近的一致性，但在流行阈值附近和强异构网络中存在偏差。", "authors": [{"name": "Lucija Nora Farkaš"}, {"name": "Sebastian Morel Balbi"}, {"name": "Hrvoje Štefančić"}, {"name": "István Zoltán Kiss"}, {"name": "Vinko Zlatić"}], "featured_authors": [{"name": "Lucija Nora Farkaš"}, {"name": "Sebastian Morel Balbi"}, {"name": "Hrvoje Štefančić"}, {"name": "István Zoltán Kiss"}, {"name": "Vinko Zlatić"}], "author_count": 5}, {"id": "2607.03357", "category": "cond-mat", "title": "Stability and equilibria of a compressible elastic membrane in Stokes flow", "abstract": "We formulate a continuum model for a compressible lipid-bilayer membrane immersed in Stokes flow, replacing exact local area inextensibility by conservation of an areal phospholipid density. The membrane free energy combines Helfrich bending, spontaneous curvature, and a finite area-compression penalty, so that membrane tension becomes a constitutive response to lipid-density variation rather than a Lagrange multiplier enforcing local area conservation. The resulting interfacial stress includes normal elastic forces and tangential Marangoni stresses generated by lipid redistribution; these stresses arise from membrane compressibility and can produce an effective negative tension when the local lipid density exceeds its preferred value. We further derive the linear stability of circular membranes in two dimensions and spherical membranes in three dimensions under full Stokes hydrodynamic coupling. In both cases, bending stabilizes the base shape, while excess lipid density destabilizes it by favoring increased membrane area. The first instability occurs in the lowest nontrivial shape mode, m = 2 in two dimensions and j = 2 in three dimensions. Energy expansions near onset show that the two-dimensional instability is a pitchfork bifurcation, whereas the three-dimensional instability is generically transcritical because prolate and oblate perturbations are geometrically distinct. These results provide a controlled compressible extension of classical vesicle mechanics and directly connect lipid-density variation, membrane tension, hydrodynamic coupling, and shape instability.", "url": "https://arxiv.org/abs/2607.03357", "type": "理论", "summary": "我们为浸没在斯托克斯流中的可压缩脂质双层膜制定了连续介质模型，通过保存面积磷脂密度来代替精确的局部不可扩展性。膜自由能结合了赫尔弗里希弯曲、自发曲率和有限面积压缩罚分，因此膜张力成为对脂质密度变化的本构响应，而不是强制局部面积守恒的拉格朗日乘数。由此产生的界面应力包括法向弹力和脂质重新分布产生的切向马兰戈尼应力；这些应力由膜的可压缩性产生，当局部脂质密度超过其优选值时，可以产生有效的负张力。我们进一步推导了全斯托克斯流体动力耦合下二维圆形膜和三维球形膜的线性稳定性。在这两种情况下，弯曲都可以稳定基底形状，而过量的脂质密度则有利于增加膜面积，从而使其不稳定。第一个不稳定性发生在最低的非平凡形状模式中，二维中 m = 2，三维中 j = 2。\n\n接近开始时的能量膨胀表明，二维不稳定性是干草叉分岔，而三维不稳定性一般是跨临界的，因为长长和扁圆扰动在几何上是不同的。这些结果提供了经典囊泡力学的受控可压缩延伸，并直接连接脂质密度变化、膜张力、流体动力耦合和形状不稳定性。", "authors": [{"name": "Sho Kawakami"}, {"name": "Han Zhou"}, {"name": "Po-Chun Kuo"}, {"name": "Yoichiro Mori"}, {"name": "Yuan-Nan Young"}], "featured_authors": [{"name": "Sho Kawakami"}, {"name": "Han Zhou"}, {"name": "Po-Chun Kuo"}, {"name": "Yoichiro Mori"}, {"name": "Yuan-Nan Young"}], "author_count": 5}, {"id": "2607.03363", "category": "cond-mat", "title": "Pressure-Driven Structural Transitions without a Displacive Charge-Density Wave in La$_2$SmNi$_2$O$_7$", "abstract": "We investigated the structural properties of bilayer nickelate La$_2$SmNi$_2$O$_7$ as a function of pressure and temperature. At ambient conditions, we show that the material crystallizes as a monoclinic superstructure distinct from the one previously reported and close to the pseudo-orthorhombic structure of pristine La$_3$Ni$_2$O$_7$. No signatures of satellite reflections associated with charge density wave (CDW) ordering are detected at low temperature. Upon compression, a sequence of pressure-induced structural transitions from monoclinic to orthorhombic 15 GPa and then tetragonal 21 GPa symmetry is observed. Within the superconducting dome, the quality of the X-ray diffraction data enables structural refinements enabling theoretical models to understand the emergence of superconductivity.", "url": "https://arxiv.org/abs/2607.03363", "type": "理论", "summary": "我们研究了双层镍酸盐 La$_2$SmNi$_2$O$_7$ 的结构特性随压力和温度的变化。在环境条件下，我们表明该材料结晶为单斜超结构，与之前报道的不同，并且接近原始 La$_3$Ni$_2$O$_7$ 的伪斜方结构。在低温下未检测到与电荷密度波 (CDW) 排序相关的卫星反射特征。压缩后，观察到一系列压力诱导的结构转变，从单斜晶系到斜方晶系 15 GPa，然后是四方晶系 21 GPa 对称性。在超导穹顶内，X 射线衍射数据的质量可以实现结构细化，从而使理论模型能够理解超导性的出现。", "authors": [{"name": "J. Huang"}, {"name": "Sitaram Ramakrishnan"}, {"name": "P. Rodière"}, {"name": "P. Toulemonde"}, {"name": "Z. Rahmany"}, {"name": "V. Balédent"}, {"name": "B. Vignolle"}, {"name": "Sourav Marik"}, {"name": "P. Fertey"}, {"name": "P. Foury-Leylekian"}], "featured_authors": [{"name": "J. Huang"}, {"name": "Sitaram Ramakrishnan"}, {"name": "P. Rodière"}, {"name": "Sourav Marik"}, {"name": "P. Fertey"}, {"name": "P. Foury-Leylekian"}], "author_count": 10}, {"id": "2607.03378", "category": "cond-mat", "title": "Quantum Destabilization of Skyrmions in Centrosymmetric Frustrated Magnets", "abstract": "We investigate the role of the spin quantum number $s$ on the stability of skyrmions in a $J_1-J_2-J_3$ centrosymmetric quantum Heisenberg model on a square lattice using the neural network quantum states method. Our results reveal that the skyrmion stability $Q$ is severely degraded when transitioning from the semiclassical regime to the extreme quantum limit ($s=1/2$), where it ultimately vanishes. We demonstrate that this destabilization is driven by quantum longitudinal fluctuations, with $Q$ exhibiting a power-law decay as a function of the reciprocal spin moment $1/s$. Notably, the extreme quantum limit ($s=1/2$) deviates drastically from this scaling behavior, exhibiting distinct physics compared to larger spin moments. Furthermore, we reveal the microscopic origin of this decay by establishing a quantitative correspondence between skyrmion stability, entanglement, and local spin magnitude: as the local second Rényi entropy (an indicator of entanglement) increases and the local spin magnitude is suppressed, the skyrmion stability vanishes linearly. This regime marks a quantum state where the skyrmion number $C$ remains as remanent geometric feature of the spin orientations, yet the skyrmion stability $Q$ vanishes due to the longitudinal suppression of the local spin magnitude. Our findings suggest that classically robust skyrmion phases in frustrated lattices are fundamentally restricted to high-spin materials, indicating that a spin moment must of at least $s = 3/2$ is required for the realization of stable, atomic-scale topological textures.", "url": "https://arxiv.org/abs/2607.03378", "type": "理论", "summary": "我们使用神经网络量子态方法研究了方晶格上 $J_1-J_2-J_3$ 中心对称量子海森堡模型中自旋量子数 $s$ 对斯格明子稳定性的作用。我们的结果表明，当从半经典状态过渡到极端量子极限（$s=1/2$）时，斯格明子稳定性 $Q$ 会严重降低，并最终消失。我们证明这种不稳定是由量子纵向涨落驱动的，$Q$ 表现出幂律衰减，作为自旋矩倒数 $1/s$ 的函数。值得注意的是，极端量子极限 ($s=1/2$) 极大地偏离了这种缩放行为，与较大的自旋矩相比，表现出不同的物理特性。此外，我们通过建立斯格明子稳定性、纠缠和局部自旋幅度之间的定量对应关系，揭示了这种衰变的微观起源：随着局部第二 Rényi 熵（纠缠的指标）增加并且局部自旋幅度受到抑制，斯格明子稳定性线性消失。\n\n这种状态标志着一种量子态，其中斯格明子数 $C$ 保留为自旋方向的剩余几何特征，但由于局部自旋幅度的纵向抑制，斯格明子稳定性 $Q$ 消失。我们的研究结果表明，受挫晶格中经典的鲁棒斯格明子相从根本上仅限于高自旋材料，这表明要实现稳定的原子级拓扑纹理，自旋矩必须至少为 $s = 3/2$。", "authors": [{"name": "Amit Kumar"}, {"name": "Kalpataru Pradhan"}], "featured_authors": [{"name": "Amit Kumar"}, {"name": "Kalpataru Pradhan"}], "author_count": 2}, {"id": "2607.03401", "category": "cond-mat", "title": "Emergent $\\mathbb{Z}$-type topology in a quasi-one-dimensional extended QWZ model", "abstract": "We investigate the emergence of zero-dimensional topological end states in nanoribbons described by the Qi-Wu-Zhang (QWZ) model and its extensions with longer-range couplings. While dimensional reduction from two to one dimension is often assumed to preserve the symmetry classification of the parent system, here an additional symmetry can emerge originating from the real-space geometry of the ribbon. This symmetry acts as a chiral symmetry, combining orbital and spatial transformations, and promotes the effective one-dimensional system from symmetry class D to class BDI. We demonstrate that the existence of such a symmetry depends both on the long and end termination of the ribbon and exhibits an even-odd effect with respect to ribbon width, revealing that the commonly studied rectangular ribbons constitute a special high-symmetry case. For the conventional QWZ model, we derive analytic expressions for the topological phase boundaries of finite-width nanoribbons and characterize the resulting hybridization-gap phases through ($\\mathbb{Z}_2 $) and winding-number invariants. We further show that extended QWZ models with longer-range couplings support phases with multiple topological end states and higher winding numbers. These phases arise through distinct mechanisms, including the hybridization of multiple edge modes inherited from higher-Chern-number bulk phases. Our results demonstrate that both long and end termination can fundamentally alter the topological classification of confined Chern insulators, highlighting the interplay between crystalline geometry, emergent symmetries, and dimensional reduction.", "url": "https://arxiv.org/abs/2607.03401", "type": "理论", "summary": "我们研究了 Qi-Wu-Zhang (QWZ) 模型描述的纳米带中零维拓扑端态的出现及其与长程耦合的扩展。虽然通常假设从二维降维到一维可以保留父系统的对称性分类，但这里可以出现源自带的真实空间几何形状的附加对称性。这种对称性充当手性对称性，结合了轨道和空间变换，并促进了有效的一维系统从 D 类对称性到 BDI 类对称性。我们证明这种对称性的存在取决于带的长度和端部终止，并且相对于带宽度表现出奇偶效应，表明通常研究的矩形带构成了特殊的高对称性情况。对于传统的 QWZ 模型，我们推导了有限宽度纳米带的拓扑相边界的解析表达式，并通过 ($\\mathbb{Z}_2 $) 和绕数不变量来表征所得的杂化间隙相。\n\n我们进一步表明，具有更远距离耦合的扩展 QWZ 模型支持具有多种拓扑最终状态和更高绕组数的相。这些相通过不同的机制产生，包括继承自较高陈数体相的多种边缘模式的混合。我们的结果表明，长终止和末端终止都可以从根本上改变受限陈绝缘体的拓扑分类，突出了晶体几何、涌现对称性和降维之间的相互作用。", "authors": [{"name": "Zebedeus F. Osseweijer"}, {"name": "Lumen Eek"}, {"name": "Cristiane Morais Smith"}], "featured_authors": [{"name": "Zebedeus F. Osseweijer"}, {"name": "Lumen Eek"}, {"name": "Cristiane Morais Smith"}], "author_count": 3}, {"id": "2607.03433", "category": "cond-mat", "title": "Dyna-Mat: End-to-end benchmarking of foundation machine learning interatomic potentials in finite-temperature ensembles", "abstract": "Foundation machine learning interatomic potentials (MLIPs) are increasingly being used as drop-in replacements for first-principles calculations, enabling simulations of materials at length and time scales that were previously inaccessible. However, due to lack of ground truth data, their accuracy on structural and dynamical observables in finite thermodynamic ensembles is yet to be established. Here, we introduce Dyna-Mat-v1.0, a benchmark dataset of condensed-phase first-principles molecular dynamics trajectories designed to test foundation MLIPs at realistic finite-temperature conditions. Using this dataset, we evaluate 15 foundation MLIPs across four model tiers by comparing both single-point energy and force errors on first-principles configurations and observables generated from MLIP-driven trajectories. We find that \"on average\" models with lower single-point force errors also yield lower errors for structural and dynamical observables. However, there are individual systems for which low force errors lead to qualitative failures in the predicted structure. Pressure remains poorly described across most models, pointing to limitations in the density functional theory stress labels available in current large-scale training datasets. Finally, we construct an accuracy-cost Pareto frontier to identify the best trade-offs for molecular dynamics with foundation MLIPs, finding that the latest generation of cross-trained models is close to Pareto-optimal according to the accuracy metrics considered here. Overall, Dyna-Mat-v1.0 shows that end-to-end finite-temperature validation is essential for quantifying the predictive behaviour of foundation MLIPs, and provides a simple, scalable route for assessing them beyond static and harmonic benchmarks relevant to materials design.", "url": "https://arxiv.org/abs/2607.03433", "type": "理论+数值", "summary": "基础机器学习原子间势 (MLIP) 越来越多地被用作第一性原理计算的直接替代品，从而能够在以前无法实现的长度和时间尺度上模拟材料。然而，由于缺乏地面实况数据，它们在有限热力学系综中结构和动力学可观测值的准确性尚未确定。在这里，我们介绍 Dyna-Mat-v1.0，这是一个凝聚相第一原理分子动力学轨迹的基准数据集，旨在在实际有限温度条件下测试基础 MLIP。使用该数据集，我们通过比较第一原理配置和从 MLIP 驱动轨迹生成的可观测量的单点能量和力误差，评估了四个模型层的 15 个基础 MLIP。我们发现，具有较低单点力误差的“平均”模型也会产生较低的结构和动力学可观测误差。然而，对于某些单独的系统，低力误差会导致预测结构的定性故障。\n\n大多数模型对压力的描述仍然很差，这表明当前大规模训练数据集中可用的密度泛函理论压力标签存在局限性。最后，我们构建了一个准确性成本帕累托前沿，以确定分子动力学与基础 MLIP 的最佳权衡，发现根据此处考虑的准确性指标，最新一代的交叉训练模型接近帕累托最优。总体而言，Dyna-Mat-v1.0 表明，端到端有限温度验证对于量化基础 MLIP 的预测行为至关重要，并提供了一种简单、可扩展的途径，用于在与材料设计相关的静态和谐波基准之外对其进行评估。", "authors": [{"name": "Mikołaj J. Gawkowski"}, {"name": "Nongnuch Artrith"}, {"name": "Silvia Bonfanti"}, {"name": "Abhijeet Sadashiv Gangan"}, {"name": "Hendrik H. Heenen"}, {"name": "Joseph Kioseoglou"}, {"name": "Ivor Lončarić"}, {"name": "Hemanadhan Myneni"}, {"name": "Janosh Riebesell"}, {"name": "Mariana Rossi"}, {"name": "Matthias Rupp"}, {"name": "Jonathan Schmidt"}, {"name": "Shubham Sharma"}, {"name": "Benjamin X. Shi"}, {"name": "Antoni Wadowski"}, {"name": "Lukas Hörmann"}, {"name": "Venkat Kapil"}], "featured_authors": [{"name": "Mikołaj J. Gawkowski"}, {"name": "Nongnuch Artrith"}, {"name": "Silvia Bonfanti"}, {"name": "Antoni Wadowski"}, {"name": "Lukas Hörmann"}, {"name": "Venkat Kapil"}], "author_count": 17}, {"id": "2607.03534", "category": "cond-mat", "title": "Fixed-point tensor network for compactified boson conformal field theory", "abstract": "Fixed-point (FP) tensor networks provide a discrete spacetime representation of conformal field theories (CFTs), offering a new route toward understanding holographic duality, generalized symmetries, and even quantum gravity. In this work, we construct FP tensors for the 2D compactified boson theory at a generic compactification radius, an archetypal irrational CFT, using boundary (open-string) data with conformal boundary conditions. We show that the resulting tensors reproduce the closed-string spectrum with high accuracy and generate stable renormalization-group (RG) flows under the tensor complex renormalization algorithm. Moreover, we identify a controllable exactly marginal deformation at the level of a single tensor, enabling flows that move continuously along the $c=1$ moduli space. This framework establishes a concrete lattice-level route toward describing a broad class of 2D irrational CFTs.", "url": "https://arxiv.org/abs/2607.03534", "type": "理论+数值", "summary": "定点 (FP) 张量网络提供了共形场论 (CFT) 的离散时空表示，为理解全息对偶性、广义对称性甚至量子引力提供了一条新途径。在这项工作中，我们使用具有共形边界条件的边界（开弦）数据，在通用紧致半径（一种典型的无理 CFT）下构造 2D 紧致玻色子理论的 FP 张量。我们表明，所得到的张量能够高精度地再现闭弦谱，并在张量复数重整化算法下生成稳定的重整化群（RG）流。此外，我们在单个张量水平上确定了一个可控的精确边际变形，使得流体能够沿着 $c=1$ 模空间连续移动。该框架建立了一条具体的晶格级路线来描述一类广泛的 2D 无理 CFT。", "authors": [{"name": "Gong Cheng"}, {"name": "Dong-Yu Bao"}, {"name": "Zheng-Cheng Gu"}], "featured_authors": [{"name": "Gong Cheng"}, {"name": "Dong-Yu Bao"}, {"name": "Zheng-Cheng Gu"}], "author_count": 3}, {"id": "2607.03706", "category": "cond-mat", "title": "Correlated-Electron Theory of Triplet-Triplet Multiexciton States in Polypentacene", "abstract": "We present correlated-electron calculations of optical spin-singlet and triplet-triplet multiexciton states in three- and four-unit pentacene oligomers as microscopic models for polypentacene. The calculations use the Pariser-Parr-Pople Hamiltonian, multiple-reference singles and doubles configuration interaction, and a molecular exciton basis that resolves Frenkel, charge-transfer, and triplet-pair (T1T1) configurations in real space. We find that the complete set of 1(T1T1) eigenstates lies in a narrow, nearly degenerate energy window near the lowest optical exciton and that no eigenstate can be identified with a single localized triplet-pair configuration. Instead, each triplet-pair eigenstate is a quantum superposition of configurations containing all accessible intertriplet separations. This electronic structure explains the perceived absence of intramolecular triplet diffusion in pentacene oligomers, polypentacene, and polytetracene solutions, while leaving open the possibility of intermolecular singlet fission in films with appreciable interchain interactions.", "url": "https://arxiv.org/abs/2607.03706", "type": "理论+数值", "summary": "我们提出了三单元和四单元并五苯低聚物中光学自旋单线态和三线态-三线态多激子态的相关电子计算，作为聚并五苯的微观模型。计算使用 Pariser-Parr-Pople 哈密顿量、多参考单和双构型相互作用，以及解析实空间中的 Frenkel、电荷转移和三重态对 (T1T1) 构型的分子激子基础。我们发现完整的 1(T1T1) 本征态集位于最低光学激子附近的狭窄、近简并的能量窗口中，并且不能用单个局域三重态对配置来识别本征态。相反，每个三重态对本征态都是包含所有可访问的三重态间分离的配置的量子叠加。这种电子结构解释了并五苯低聚物、聚并五苯和聚并四苯溶液中不存在分子内三重态扩散，同时在具有明显链间相互作用的薄膜中保留了分子间单重态裂变的可能性。", "authors": [{"name": "Rupali Jindal"}, {"name": "Alok Shukla"}, {"name": "Sumit Mazumdar"}], "featured_authors": [{"name": "Rupali Jindal"}, {"name": "Alok Shukla"}, {"name": "Sumit Mazumdar"}], "author_count": 3}, {"id": "2607.03737", "category": "cond-mat", "title": "Intermittency Signatures in the Deformation of a Passive Droplet in Active Turbulence", "abstract": "We use fully resolved nematohydrodynamic simulations to study deformation statistics of a passive nematic droplet in two-dimensional extensile active-nematic turbulence. We find that the droplet aspect ratio serves as a scalar probe of the active bath. Its increments show heavy-tailed distributions with dependence on the time lag, scale-free burst statistics and multiscaling structure functions which establish temporal intermittency. While the mean deformation increases with activity, normalized intermittency is strongest at lower activity. This suggests slower and more coherent bath forcing. When compared with translational and forcing-side fluctuations, it reveals a hierarchy of intermittency: shape is more weakly intermittent than translation and active-stress fluctuations, consistent with filtering by interfacial restoring forces. Power spectra show an extended near-$1/\\omega$ regime for the maximal normal interface velocity, distinct from the steeper, approximately $1/\\omega^{2}$ spectrum of the interfacial active stress. Soft inclusions thus reveal how interfacial restoring forces convert active forcing into bursty, scale-rich deformation dynamics.", "url": "https://arxiv.org/abs/2607.03737", "type": "数值", "summary": "我们使用完全解析的向列流体动力学模拟来研究二维可拉伸主动向列湍流中被动向列液滴的变形统计。我们发现液滴纵横比可作为活性浴的标量探针。其增量显示出依赖于时间滞后、无标度突发统计和建立时间间歇性的多尺度结构函数的重尾分布。虽然平均变形随着活动而增加，但标准化间歇性在较低活动时最强。这表明浴强迫更慢且更连贯。与平移和受力侧波动相比，它揭示了间歇性的层次结构：形状比平移和主动应力波动更弱间歇性，与界面恢复力的过滤一致。功率谱显示最大法向界面速度的扩展近 $1/\\omega$ 范围，与更陡峭的、大约 $1/\\omega^{2}$ 界面主动应力谱不同。因此，软夹杂物揭示了界面恢复力如何将主动力转化为突发的、富含尺度的变形动力学。", "authors": [{"name": "Sudeep Halder"}, {"name": "Abhishek Chaudhuri"}], "featured_authors": [{"name": "Sudeep Halder"}, {"name": "Abhishek Chaudhuri"}], "author_count": 2}, {"id": "2607.03762", "category": "cond-mat", "title": "Pauli Spectrum and Stabilizer Rényi Entropy in Gapless Symmetry-Protected Topological Phases", "abstract": "Quantum entanglement is widely used as a diagnostic of topological phases of matter. Beyond entanglement, non-stabilizerness captures a distinct aspect of quantum many-body states by quantifying their distance from the manifold of stabilizer states. In this work, we study the stabilizer Rényi entropy in symmetry protected topological (SPT) phases, including both gapped SPT, non-intrinsically gapless SPT, and intrinsically gapless SPT phases. Under symmetry preserving perturbations, we find numerically that the stabilizer Rényi entropy exhibits an extremum near the phase transition. However, the stabilizer Rényi entropy alone cannot distinguish different SPT phases. In contrast, the Pauli spectrum reveals a characteristic crossing structure at the transition point. This crossing reflects the exchange of dominant Pauli-string correlations associated with the non-local string order parameters of the two topological distinct phases. For gapped SPT and non-intrinsically gapless SPT phases, the crossing structure can be understood from a local-unitary duality that maps the Pauli spectrum between the two phases. For intrinsically gapless SPT phases, such a local-unitary mapping is absent. Instead, we find that the Pauli spectrum mapping is generated by a non-invertible duality transformation. These results show that although the stabilizer Rényi entropy provides only a coarse diagnostic of phase transitions, the Pauli spectrum contains finer information about the exchange of string order sectors. Our findings demonstrate that quantum magic offers a complementary perspective for characterizing both gapped and gapless SPT phases.", "url": "https://arxiv.org/abs/2607.03762", "type": "理论+数值", "summary": "量子纠缠被广泛用作物质拓扑相的诊断。除了纠缠之外，非稳定态通过量化量子多体态与稳定态流形的距离来捕获量子多体态的一个独特方面。在这项工作中，我们研究了对称保护拓扑 (SPT) 相中的稳定剂 Rényi 熵，包括有间隙 SPT、非本质无间隙 SPT 和本质无间隙 SPT 相。在对称性保持扰动下，我们在数值上发现稳定器 Rényi 熵在相变附近表现出极值。然而，仅靠稳定器 Rényi 熵无法区分不同的 SPT 阶段。相反，泡利谱揭示了转变点处的特征交叉结构。这种交叉反映了与两个拓扑不同相的非局部弦序参数相关的主导泡利弦相关性的交换。对于有间隙的 SPT 和非本质无间隙的 SPT 相，交叉结构可以从映射两相之间泡利谱的局部酉对偶性来理解。对于本质上无间隙的 SPT 相，不存在这种局部统一映射。\n\n相反，我们发现泡利谱映射是通过不可逆对偶变换生成的。这些结果表明，虽然稳定器 Rényi 熵仅提供相变的粗略诊断，但泡利谱包含有关弦序扇区交换的更精细信息。我们的研究结果表明，量子魔法为表征有隙和无隙 SPT 相提供了一个互补的视角。", "authors": [{"name": "Ying-Lin Li"}, {"name": "Po-Yao Chang"}], "featured_authors": [{"name": "Ying-Lin Li"}, {"name": "Po-Yao Chang"}], "author_count": 2}, {"id": "2607.03823", "category": "cond-mat", "title": "Janus MgAlB_2 MBene: a dipole-engineered anode for ultrafast Li-ion transport and exceptional lithium storage", "abstract": "In this work, we propose a group II/IIIA-based Janus MBene, MgAlB_2, and investigate its electrochemical properties using first-principles calculations. The substitution of one Mg layer in Mg_2B_2 MBene by an Al layer breaks the structural symmetry and generates a permanent out-of-plane polarization, giving rise to a distinct electronic environment compared with the parent Mg_2B_2 and Al_2B_2 monolayers. Electronic-structure analysis reveals enhanced orbital hybridization among B, Mg, and Al states near the Fermi level, resulting in improved electronic delocalization across the monolayer. The Janus MgAlB_2 monolayer is found to possess excellent dynamical, mechanical, and thermal stability. Owing to its polarization-modified energy landscape, Li ions migrate with an exceptionally low diffusion barrier of 17.1 meV, corresponding to a room-temperature diffusion coefficient of 3.43x10^-10 cm^2/s. Unlike the pristine Mg_2B_2 and Al_2B_2 monolayers, which support only a single stable adsorption layer, MgAlB_2 accommodates two complete Li layers. Detailed analysis shows that the residual polarization retained after first-layer lithiation continues to promote Li adsorption, whereas increasing Li-Li electrostatic interactions eventually limit further storage. As a result, the Janus monolayer delivers a high theoretical specific capacity of 1470.24 mAh/g together with a small volume expansion of only 3.7% during maximum lithiation. The present study demonstrates that intrinsic polarization can be utilized to regulate both the thermodynamics and kinetics of Li storage, providing a design strategy for high-rate and high-capacity two-dimensional electrode materials.", "url": "https://arxiv.org/abs/2607.03823", "type": "理论+数值", "summary": "在这项工作中，我们提出了一种基于 II/IIIA 族的 Janus MBene，MgAlB_2，并使用第一原理计算研究了其电化学性能。 Mg_2B_2 MBene 中的一层 Mg 层被 Al 层取代，打破了结构对称性，并产生永久的面外极化，与母体 Mg_2B_2 和 Al_2B_2 单层相比，产生了独特的电子环境。电子结构分析表明，费米能级附近 B、Mg 和 Al 态之间的轨道杂化增强，从而改善了单层电子离域。研究发现 Janus MgAlB_2 单层具有优异的动力学、机械和热稳定性。由于其极化改变的能量景观，锂离子以 17.1 meV 的极低扩散势垒迁移，对应于 3.43x10^-10 cm^2/s 的室温扩散系数。与仅支持单个稳定吸附层的原始Mg_2B_2和Al_2B_2单层不同，MgAlB_2容纳两个完整的Li层。\n\n详细分析表明，第一层锂化后保留的残余极化继续促进锂吸附，而增加的锂-锂静电相互作用最终限制了进一步的储存。因此，Janus 单层具有 1470.24 mAh/g 的高理论比容量，并且在最大锂化过程中体积膨胀仅为 3.7%。本研究表明，本征极化可用于调节锂存储的热力学和动力学，为高倍率和高容量的二维电极材料提供设计策略。", "authors": [{"name": "Pritam Samanta"}, {"name": "Sashank Kumar Pandey"}, {"name": "Amit Kumar Jana"}, {"name": "Prakash Parida"}], "featured_authors": [{"name": "Pritam Samanta"}, {"name": "Sashank Kumar Pandey"}, {"name": "Amit Kumar Jana"}, {"name": "Prakash Parida"}], "author_count": 4}, {"id": "2607.03841", "category": "cond-mat", "title": "First-principles study of the electronic structure and optical properties of two-dimensional $α$-graphdiyne", "abstract": "The structural, electronic, and optical properties of monolayer $\\alpha$-graphdiyne ($\\alpha$-GDY) are systematically investigated using density-functional theory within the plane-wave pseudopotential formalism. The electronic band structure reveals a gapless Dirac crossing at the K point, demonstrating the Dirac semimetallic character of the monolayer. The calculated total and orbital-projected density of states show that the electronic states near the Fermi level are dominated by the carbon $2p$ orbitals, while the contribution of the $2s$ orbitals is comparatively weak. The optical response exhibits pronounced polarization dependence. The in-plane dielectric function displays a strong Drude-like response and negative values of the real dielectric function at low photon energies, whereas the out-of-plane component remains positive throughout the investigated energy range. Consistently, the absorption coefficient, extinction coefficient, reflectivity, and electron energy-loss spectra reveal a pronounced optical anisotropy. The calculated plasma frequencies are approximately $3.21$~eV for the in-plane polarization and $1.06$~eV for the out-of-plane polarization, indicating substantially stronger collective electronic excitations within the atomic plane. These findings demonstrate that $\\alpha$-GDY combines Dirac-like electronic behavior with highly anisotropic optical properties, highlighting its potential for polarization-sensitive optoelectronic, plasmonic, and nanoelectronic applications.", "url": "https://arxiv.org/abs/2607.03841", "type": "理论", "summary": "使用平面波赝势形式中的密度泛函理论系统地研究了单层 $\\alpha$-graphdiyne ($\\alpha$-GDY) 的结构、电子和光学性质。电子能带结构揭示了 K 点处的无带隙狄拉克穿越，证明了单层的狄拉克半金属特性。计算的总态密度和轨道投影态密度表明，费米能级附近的电子态以碳$2p$轨道为主，而$2s$轨道的贡献相对较弱。光学响应表现出明显的偏振依赖性。面内介电函数在低光子能量下表现出强烈的类德鲁德响应和真实介电函数的负值，而面外分量在整个研究的能量范围内保持正值。吸收系数、消光系数、反射率和电子能量损失光谱一致地揭示了明显的光学各向异性。\n\n计算出的面内极化的等离子体频率约为 3.21$~eV，面外极化的等离子体频率约为 $1.06$~eV，表明原子平面内的集体电子激发明显更强。这些发现表明$\\alpha$-GDY结合了类狄拉克的电子行为和高度各向异性的光学特性，突出了其在偏振敏感光电、等离子体和纳米电子应用中的潜力。", "authors": [{"name": "Ashkan Shekaari"}], "featured_authors": [{"name": "Ashkan Shekaari"}], "author_count": 1}, {"id": "2607.03845", "category": "cond-mat", "title": "Quantum tunneling Mpemba effect", "abstract": "The quantum tunneling Mpemba effect is investigated within a continuous one-dimensional symmetric double-well potential open to external environmental sinks at the boundaries ($x=\\pm L$). Using a non-Hermitian spectral decomposition of the effective Hamiltonian, we characterize the open-system relaxation dynamics without relying on abstract state-space quenches. We mathematically prove that the non-monotonic behavior of the first non-trivial even-parity spectral coefficient, $a_{2}(T_{i})$, with respect to the initial preparation temperature $T_{i}$ is a universal topological property born from quantum statistical mechanics. Crucially, we demonstrate that this intermediate thermal peak is governed by the Sturm-Liouville oscillation theorem and remains completely invariant with respect to the global system size $L$, contrasting sharply with the boundary-driven classical Mpemba effect. This universal peak arises from the geometric and nodal alignment between highly localized unperturbed states and extended non-Hermitian decay channels. Furthermore, we clarify that while this mechanism is robust, the actual observation of anomalous crossings in the total survival probability trace $S(t,T_{i})$ and the trace distance $\\mathcal{D}(t,T_i)$ demand a strict separation of timescales, requiring the over-barrier escape rate to vastly exceed the decay rate of the deep-well tunneling doublet ($\\Gamma_{2}\\gg \\Gamma_{0}$ and $\\Gamma_2\\gg \\Gamma_1$). Our continuous formulation successfully bridges real-space classical boundary-driven dissipation with open quantum dynamics, providing novel insights for engineering non-equilibrium states via tailored boundary loss.", "url": "https://arxiv.org/abs/2607.03845", "type": "理论", "summary": "在边界处向外部环境汇开放的连续一维对称双阱势内研究量子隧道 Mpemba 效应 ($x=\\pm L$)。使用有效哈密顿量的非厄米谱分解，我们在不依赖抽象状态空间猝灭的情况下描述了开放系统弛豫动力学。我们在数学上证明了第一个非平凡偶宇称谱系数 $a_{2}(T_{i})$ 相对于初始制备温度 $T_{i}$ 的非单调行为是源自量子统计力学的普遍拓扑性质。至关重要的是，我们证明了这个中间热峰受 Sturm-Liouville 振荡定理控制，并且相对于全局系统大小 $L$ 保持完全不变，这与边界驱动的经典 Mpemba 效应形成鲜明对比。这个普遍的峰值产生于高度局域未扰动状态和扩展的非厄米衰变通道之间的几何和节点排列。\n\n此外，我们澄清，虽然这种机制是稳健的，但总生存概率轨迹 $S(t,T_{i})$ 和轨迹距离 $\\mathcal{D}(t,T_i)$ 中异常穿越的实际观察需要时间尺度的严格分离，要求越障逃逸率大大超过深井隧道双峰的衰减率 ($\\Gamma_{2}\\gg \\Gamma_{0}$ 和$\\Gamma_2\\gg \\Gamma_1$)。我们的连续公式成功地将现实空间经典边界驱动耗散与开放量子动力学联系起来，为通过定制边界损失工程非平衡态提供了新颖的见解。", "authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "featured_authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "author_count": 2}, {"id": "2607.03867", "category": "cond-mat", "title": "The Reweighting Principle in Statistical Mechanics", "abstract": "Reweighting of probability measures provides a unifying perspective on conditioning, exponential tilting, and, more generally, ensemble transformations in statistical mechanics. We show that exponential tilting and conditioning arise as the minimum-relative-entropy updates associated with soft and hard constraints, respectively. Their relative entropies naturally inherit complementary thermodynamic structures: exponential tilting gives rise to the Legendre structure of the canonical ensemble and reduces to the Gibbs entropy for a uniform reference measure, while conditioning reduces to the Boltzmann entropy through the surprisal of the constrained macrostate. By introducing an enlarged probability space in which observables are treated as explicit variables, we further show that microcanonical and canonical ensembles arise as conditional and marginal distributions of a common structural prior after exponential reweighting. In the thermodynamic limit, described through large deviation theory, conditioning emerges from exponential tilting by concentration of measure, revealing ensemble equivalence as a consequence of entropy--bias competition. Finally, we outline how the same information-theoretic framework naturally extends to path space, suggesting a unified probabilistic description of equilibrium thermodynamics and conditioned stochastic dynamics.", "url": "https://arxiv.org/abs/2607.03867", "type": "理论", "summary": "概率度量的重新加权为统计力学中的条件、指数倾斜以及更一般的系综变换提供了统一的视角。我们表明，指数倾斜和调节分别作为与软约束和硬约束相关的最小相对熵更新而出现。它们的相对熵自然地继承了互补的热力学结构：指数倾斜产生了正则系综的勒让德结构，并减少到吉布斯熵以获得统一的参考测量，而调节则通过约束宏观状态的意外减少到玻尔兹曼熵。通过引入扩大的概率空间，其中可观测量被视为显式变量，我们进一步表明，微规范和规范系综是指数重新加权后作为共同结构先验的条件和边缘分布而出现的。在通过大偏差理论描述的热力学极限中，条件作用是由测量浓度的指数倾斜产生的，揭示了熵偏差竞争的结果的集合等价性。\n\n最后，我们概述了相同的信息论框架如何自然地扩展到路径空间，提出了平衡热力学和条件随机动力学的统一概率描述。", "authors": [{"name": "Salvatore Romano"}], "featured_authors": [{"name": "Salvatore Romano"}], "author_count": 1}, {"id": "2607.03893", "category": "cond-mat", "title": "Morphology-Property Interplay in Chemo-Mechanics of Ion-Intercalation Active Particles", "abstract": "Morphology, material property, and mechanical constraint jointly govern the chemo-mechanical behavior of ion-intercalation particles, yet their coupled effects remain insufficiently understood. Here we establish a thermodynamically consistent single-particle framework and combine analytical solutions with multiphysics simulations to determine how these factors regulate lithiation and stress generation. We study hollow spherical, cylindrical, and ellipsoidal particles with isotropic or transversely isotropic material properties under fully constrained, inner-free, or unconstrained boundary conditions. We show that the transient lithiation pathway and the associated stress and strain fields are governed not by morphology, property, or constraint alone, but by their coupled interaction: isotropic particles are sensitive to the mechanical constraint, whereas transversely isotropic particles exhibit persistent heterogeneous lithiation dominated by anisotropic diffusivity. Flux decomposition analysis reveals that the mechanical contribution to Li flux is negligible in spheres but dominant in ellipsoids. Correlation analysis further shows that Li concentration and volumetric strain exhibit strong anti-correlation in unconstrained particles but weak correlation under full constraints. Bayesian optimization of hollow ellipsoids identifies Pareto-optimal morphologies that balance lithiation capacity against peak tensile stress. These results provide a unified framework for the morphology-property interplay in intercalation particles and offer morphology design principles for chemo-mechanical stability.", "url": "https://arxiv.org/abs/2607.03893", "type": "理论+数值", "summary": "形态、材料特性和机械约束共同控制着离子嵌入颗粒的化学机械行为，但它们的耦合效应仍然没有得到充分的了解。在这里，我们建立了热力学一致的单粒子框架，并将分析解决方案与多物理场模拟相结合，以确定这些因素如何调节锂化和应力产生。我们研究在完全约束、内部自由或无约束边界条件下具有各向同性或横向各向同性材料特性的空心球形、圆柱形和椭圆形颗粒。我们表明，瞬态锂化路径以及相关的应力和应变场不仅受形态、性质或约束的控制，而且受它们耦合相互作用的影响：各向同性颗粒对机械约束敏感，而横向各向同性颗粒表现出由各向异性扩散率主导的持久异质锂化。通量分解分析表明，机械对锂通量的贡献在球体中可以忽略不计，但在椭球体中占主导地位。\n\n相关分析进一步表明，Li浓度和体积应变在无约束颗粒中表现出强反相关性，但在完全约束下表现出弱相关性。空心椭球体的贝叶斯优化确定了平衡锂化能力与峰值拉伸应力的帕累托最优形态。这些结果为插层颗粒的形态-性质相互作用提供了统一的框架，并为化学机械稳定性提供了形态设计原则。", "authors": [{"name": "Rongyue Lin"}, {"name": "Royal C. Ihuaenyi"}, {"name": "Juner Zhu"}, {"name": "Ruobing Bai"}], "featured_authors": [{"name": "Rongyue Lin"}, {"name": "Royal C. Ihuaenyi"}, {"name": "Juner Zhu"}, {"name": "Ruobing Bai"}], "author_count": 4}, {"id": "2607.03954", "category": "cond-mat", "title": "Reentrant localization transition, quantum butterfly and robust edge modes in aperiodic zig-zag ladder", "abstract": "Low dimensional tight-binding lattices in presence of quasiperiodic disorder generally exhibits localization transition. The system supports diffusive modes upto a limiting strength of disorder and all the eigenstates become localized beyond that critical strength thereby quenching the kinetic signature of the wavepacket. However, moving away from this situation, we demonstrate that with minimal long-range off-diagonal modulation, the eigenspectrum again may offer delocalization of electronic states for some subtle combination of kinetic parameters of the Hamiltonian leading to a second quantum phase change. The localization transitions are associated with the obvious presence of single-particle mobility edges. Multifractal energy landscape also shows quantum butterfly pattern with the in-gap robust edge modes. The re-emerging localization transition is manifested through the evaluation of inverse participation ratio, eigenspectrum and a pertinent quantum dynamical study.", "url": "https://arxiv.org/abs/2607.03954", "type": "理论", "summary": "存在准周期无序的低维紧束缚晶格通常表现出局域化转变。该系统支持高达无序极限强度的扩散模式，并且所有本征态都变得局域化超过该临界强度，从而淬灭波包的动力学特征。然而，摆脱这种情况，我们证明，通过最小的远程非对角调制，本征谱可以再次为哈密顿量的动力学参数的一些微妙组合提供电子态的离域，从而导致第二次量子相变。局域化转变与单粒子迁移边缘的明显存在相关。多重分形能量景观还显示出具有间隙内鲁棒边缘模式的量子蝴蝶图案。重新出现的局域化转变通过逆参与比、特征谱和相关量子动力学研究的评估来体现。", "authors": [{"name": "Sayan Bhattacharya"}, {"name": "Rhiddha Acharjee"}, {"name": "Atanu Nandy"}], "featured_authors": [{"name": "Sayan Bhattacharya"}, {"name": "Rhiddha Acharjee"}, {"name": "Atanu Nandy"}], "author_count": 3}, {"id": "2607.04097", "category": "cond-mat", "title": "Full Gate-Voltage Control of a Parity-Protected Superconducting Qubit with an Altermagnetic Josephson Junction", "abstract": "Parity-protected superconducting qubits offer intrinsically long coherence, but many current implementations require magnetic-flux biasing, which introduces flux noise, control overhead, and limited scalability. Here we propose a parity-protected qubit based on a gate-tunable superconductor-altermagnet-superconductor Josephson junction. Altermagnets are compensated magnets with momentum-dependent spin splitting and zero net magnetization, providing spin-dependent functionality without external magnetic fields. In the proposed junction, the two spin sectors acquire opposite phase shifts, generating two Josephson channels whose interference is controlled electrically by the chemical potential. At the tuned $0$-$\\pi$ transition, the first Josephson harmonic is strongly suppressed while the second harmonic dominates, yielding a double-well potential with two nearly degenerate states of opposite Cooper-pair parity. For realistic gatemon-compatible parameters, we estimate coherence times of up to tens of milliseconds while maintaining fully gate-controlled qubit operations. These results establish altermagnetic Josephson junctions as a promising route toward protected superconducting qubits with local, scalable, and all-electrical control.", "url": "https://arxiv.org/abs/2607.04097", "type": "理论", "summary": "受奇偶校验保护的超导量子位本质上提供长相干性，但许多当前的实现需要磁通偏置，这会引入磁通噪声、控制开销和有限的可扩展性。在这里，我们提出了一种基于门可调超导体-交变磁体-超导体约瑟夫森结的奇偶校验保护量子位。交变磁体是补偿磁体，具有动量相关的自旋分裂和零净磁化强度，无需外部磁场即可提供自旋相关的功能。在所提出的结中，两个自旋扇区获得相反的相移，产生两个约瑟夫森通道，其干扰由化学势进行电控制。在调谐的 $0$-$\\pi$ 跃迁处，第一个约瑟夫森谐波受到强烈抑制，而第二个谐波占主导地位，从而产生具有相反库珀对宇称的两个近简并态的双阱电势。对于实际的门控兼容参数，我们估计相干时间高达数十毫秒，同时保持完全门控的量子位操作。\n\n这些结果表明，交磁约瑟夫森结是实现具有局部、可扩展和全电气控制的受保护超导量子位的有前途的途径。", "authors": [{"name": "Guo-Liang Guo"}], "featured_authors": [{"name": "Guo-Liang Guo"}], "author_count": 1}, {"id": "2607.04104", "category": "cond-mat", "title": "Vortex-Number-Controlled Josephson Diode Polarity in Corbino Junctions", "abstract": "We demonstrate that the polarity of the Josephson diode effect in Corbino Josephson junctions can be deterministically controlled by the vortex number, which arises as a generic consequence of structured spatial inhomogeneity. By solving the continuum Andreev spectral problem, we identify a mechanism in which the vortex number selectively filters specific spatial Fourier harmonics of the local inhomogeneity. This harmonic selection reshapes the amplitudes and relative phases of higher-order Josephson current harmonics, ultimately reversing the critical-current asymmetry. Numerical simulations of both an effective one-dimensional edge model and full two-dimensional lattice models confirm the robustness of this mechanism. Crucially, our results show that a vortex-parity-dependent reversal of diode polarity is not an exclusive signature of Majorana physics, but can emerge generically from geometric and structural inhomogeneities in Corbino junctions.", "url": "https://arxiv.org/abs/2607.04104", "type": "理论+数值", "summary": "我们证明，Corbino 约瑟夫森结中约瑟夫森二极管效应的极性可以由涡旋数确定性地控制，涡旋数是结构空间不均匀性的一般结果。通过解决连续谱安德烈耶夫谱问题，我们确定了一种机制，其中涡数选择性地过滤局部不均匀性的特定空间傅里叶谐波。这种谐波选择重塑了高阶约瑟夫森电流谐波的幅度和相对相位，最终扭转了临界电流不对称性。有效的一维边缘模型和全二维晶格模型的数值模拟证实了该机制的鲁棒性。至关重要的是，我们的结果表明，依赖于涡旋宇称的二极管极性反转并不是马约拉纳物理学的专有特征，而是可以从科尔比诺结的几何和结构不均匀性中普遍出现。", "authors": [{"name": "Linghao Huang"}, {"name": "Jing Wang"}], "featured_authors": [{"name": "Linghao Huang"}, {"name": "Jing Wang"}], "author_count": 2}, {"id": "2607.04116", "category": "cond-mat", "title": "Electronic Structure, Optical Response, Thermal and Mechanical Behavior of B6X (X = S, Se) under Pressure: A Comprehensive Ab-initio Exploration", "abstract": "This study presents a comprehensive investigation of the pressure dependent structural, electronic, optical, mechanical, and bonding properties of orthorhombic boron rich chalcogenides B6S and B6Se. Calculations were performed using density functional theory across a wide range of hydrostatic pressures. The computed elastic constants, bulk, Young, shear moduli, and Poisson ratio, revealed mechanical robustness and strong resistance to deformation, even under significant compression. Electronic band structure and density of states analyses indicate that the materials exhibit indirect bandgap semiconducting behavior. Optical results reveal clear pressure induced spectral shifts, particularly in the visible and ultraviolet regions, suggesting modified light matter interaction under compression. Phonon dispersion curves verified the dynamical stability of both materials within the investigated pressure range. Hardness estimations, combined with elastic parameters, and melting temperatures, further indicate that B6S and B6Se possess significant mechanical strength suitable for applications under harsh environments. The thermal properties suggest that both these compounds possess features suitable to be used as excellent thermal barrier coating materials.", "url": "https://arxiv.org/abs/2607.04116", "type": "理论+数值", "summary": "本研究对正交富硼硫属化物 B6S 和 B6Se 的压力依赖性结构、电子、光学、机械和键合特性进行了全面研究。使用密度泛函理论在广泛的静水压力下进行计算。计算出的弹性常数、体积、杨氏、剪切模量和泊松比表明，即使在显着压缩的情况下，其也具有机械鲁棒性和强大的抗变形能力。电子能带结构和态密度分析表明该材料表现出间接带隙半导体行为。光学结果揭示了明显的压力引起的光谱变化，特别是在可见光和紫外区域，这表明压缩下光物质相互作用发生了变化。声子色散曲线验证了两种材料在研究压力范围内的动态稳定性。硬度估计与弹性参数和熔化温度相结合，进一步表明 B6S 和 B6Se 具有适合恶劣环境下应用的显着机械强度。\n\n热性能表明这两种化合物都具有适合用作优异热障涂层材料的特性。", "authors": [{"name": "Sourav Kumar Sutradhar"}, {"name": "Tanvir Khan"}, {"name": "Tauhidur Rahman"}, {"name": "Sraboni Saha Moly"}, {"name": "Mst. Maskura Khatun"}, {"name": "S.H. Naqib"}], "featured_authors": [{"name": "Sourav Kumar Sutradhar"}, {"name": "Tanvir Khan"}, {"name": "Tauhidur Rahman"}, {"name": "Sraboni Saha Moly"}, {"name": "Mst. Maskura Khatun"}, {"name": "S.H. Naqib"}], "author_count": 6}, {"id": "2607.04135", "category": "cond-mat", "title": "Broken Ergodicity and the Violation of the Fluctuation-Dissipation Theorem Lead to Generalization Beyond Overfitting in Machine Learning", "abstract": "The remarkable ability of modern neural networks to generalize improves with increasing network capacity, even when the number of model parameters or effective degrees of freedom exceeds the number of training data points. This phenomenon is all the more surprising given that generalization error diverges when the number of model parameters approaches a critical value from below. Here we use dynamical mean field theory to show that this so-called \"double descent\" behavior is the outcome of a phase transition in the stochastic field theory describing the training process. We calculate the critical exponents and scaling function of the double descent phase transition, and show that it is marked by a breakdown of the fluctuation-dissipation theorem associated with broken ergodicity. The corresponding response function has the same functional form as the simple London model of the superconducting transition, with the rigidity of the wave function corresponding to the neural network's ability to generalize accurately.", "url": "https://arxiv.org/abs/2607.04135", "type": "理论+数值", "summary": "现代神经网络卓越的泛化能力随着网络容量的增加而提高，即使模型参数的数量或有效自由度超过训练数据点的数量。考虑到当模型参数的数量从下方接近临界值时泛化误差会发散，这种现象更加令人惊讶。在这里，我们使用动态平均场理论来证明这种所谓的“双下降”行为是描述训练过程的随机场理论中相变的结果。我们计算了双下降相变的临界指数和标度函数，并表明它的特点是与破坏遍历性相关的波动耗散定理的崩溃。相应的响应函数具有与超导转变的简单伦敦模型相同的函数形式，波函数的刚性对应于神经网络的精确泛化能力。", "authors": [{"name": "Chan Li"}, {"name": "Nigel Goldenfeld"}], "featured_authors": [{"name": "Chan Li"}, {"name": "Nigel Goldenfeld"}], "author_count": 2}, {"id": "2607.04200", "category": "cond-mat", "title": "Tellurium sublattice instability driven amorphization in the chalcogenide AgSbTe2 under pressure", "abstract": "Pressure provides a powerful thermodynamic route to access hidden structural states in functional materials, yet the microscopic origin of pressure-induced amorphization remains elusive in many complex chalcogenides. Here we report a detailed high-pressure structural study of AgSbTe2,combining synchrotron X-ray diffraction with density functional theory and molecular dynamics calculations up to 60 GPa. We uncover a pressure-driven transformation from the ambient R-3m phase to a fully disordered cubic Im3m phase, through an extended intermediate amorphous state. Enthalpy calculations reveal a near-degeneracy between the R3m and Im3m structures over a broad pressure range, dictating amorphization. Contrary to previously speculated cation vacancies, the amorphization is governed by a pronounced displacement instability of the Te sublattice. Remarkably, the time dependent decompression pathway controls the final structural state, resulting in either amorphous (slow decompression) or fully crystalline (fast decompression) states, indicative of a strong counterintuitive kinetic effect.", "url": "https://arxiv.org/abs/2607.04200", "type": "理论+数值", "summary": "压力提供了一种强大的热力学途径来获取功能材料中隐藏的结构状态，但压力引起的非晶化的微观起源在许多复杂的硫属化物中仍然难以捉摸。在这里，我们报告了 AgSbTe2 的详细高压结构研究，将同步加速器 X 射线衍射与密度泛函理论和高达 60 GPa 的分子动力学计算相结合。我们发现了压力驱动的转变，通过扩展的中间非晶态，从环境 R-3m 相到完全无序的立方 Im3m 相。焓计算揭示了 R3m 和 Im3m 结构在广泛的压力范围内的近简并性，决定了非晶化。与之前推测的阳离子空位相反，非晶化是由 Te 亚晶格的明显位移不稳定性控制的。值得注意的是，时间依赖性减压途径控制最终的结构状态，导致无定形（慢速减压）或完全结晶（快速减压）状态，表明强烈的违反直觉的动力学效应。", "authors": [{"name": "Baihong Sun"}, {"name": "Zihan Zhang"}, {"name": "Wei Luo"}, {"name": "Sergei Grazhdannikov"}, {"name": "Wenting Lu"}, {"name": "Shiyu Feng"}, {"name": "Haikai Zou"}, {"name": "Chenxin Wei"}, {"name": "Martin Kunz"}, {"name": "Hirokazu Kadobayashi"}, {"name": "Bihang Wang"}, {"name": "Azkar Saeed Ahmad"}, {"name": "Yaron Amouyal"}, {"name": "Rajeev Ahuja"}, {"name": "Elissaios Stavrou"}], "featured_authors": [{"name": "Baihong Sun"}, {"name": "Zihan Zhang"}, {"name": "Wei Luo"}, {"name": "Yaron Amouyal"}, {"name": "Rajeev Ahuja"}, {"name": "Elissaios Stavrou"}], "author_count": 15}, {"id": "2607.04252", "category": "cond-mat", "title": "Universal fluctuations of first discoveries in competitive exploration", "abstract": "Random exploration is usually quantified by how fast new space is found, from the range of a single walker to the territory collectively covered by many walkers. In competitive exploration, first arrival secures an exclusive resource, as when foragers compete for food items or agents capture distributed targets. It is then no longer enough to know which sites have been discovered: one must determine, for each discovered site, which searcher reached it first. We introduce the discovery share $X_n$, the fraction of the first $n$ collective discoveries secured by a tagged searcher. For two identical competitors, exchange symmetry fixes $\\langle X_n\\rangle=1/2$, but the central question is whether this equal split emerges in each long exploration history or only on average, \\emph{i.e.} whether early competitive advantages are erased or persist. Here we show that the answer is controlled by the spectral dimension $d_s$, defined by the large-time decay of the probability that a single searcher is at its starting point after $t$ steps, $p_0(t)\\sim t^{-d_s/2}$. Across ordinary diffusion, long-range superdiffusion and subdiffusion induced by crowding or memory, $d_s$ separates persistent randomness in recurrent exploration $(d_s<2)$, anomalously slow non-Gaussian concentration for $2\\le d_s<3$, and Gaussian concentration, logarithmically corrected at $d_s=3$, for $d_s\\ge3$. For $d_s\\ge2$, we derive exact asymptotic variances, including prefactors, and the discovery scale on which competitive imbalances are erased. Two-point correlations of first-discovery labels identify the memory mechanism behind these regimes. The same phase structure persists under changes in geometry, competitor heterogeneity, number of competitors and memory, revealing a general fluctuation theory of first-arrival inequalities.", "url": "https://arxiv.org/abs/2607.04252", "type": "理论", "summary": "随机探索通常通过发现新空间的速度来量化，从单个步行者的范围到许多步行者共同覆盖的区域。在竞争性探索中，先到者会确保获得专有资源，就像觅食者争夺食物或特工捕获分布式目标一样。这样，仅仅知道哪些站点已被发现就不再足够了：对于每个已发现的站点，必须确定哪个搜索者首先到达该站点。我们引入发现份额 $X_n$，即由标记搜索者保护的前 $n$ 集体发现的一部分。对于两个相同的竞争者，交换对称性固定$\\langle X_n\\rangle=1/2$，但核心问题是这种平等的分裂是否出现在每个漫长的探索历史中，还是仅平均出现，\\emph{即}早期的竞争优势是否被消除或持续存在。在这里，我们表明答案是由谱维度 $d_s$ 控制的，谱维度由单个搜索者在 $t$ 步后到达起点的概率的长时间衰减定义，$p_0(t)\\sim t^{-d_s/2}$。\n\n在普通扩散、由拥挤或记忆引起的长程超扩散和次扩散中，$d_s$ 分离了重复探索 $(d_s<2)$ 中的持续随机性、$2\\le d_s<3$ 的异常缓慢非高斯浓度，以及 $d_s\\ge3$ 的高斯浓度（在 $d_s=3$ 处对数校正）。对于 $d_s\\ge2$，我们得出精确的渐近方差，包括前因子以及消除竞争不平衡的发现尺度。首次发现标签的两点相关性确定了这些机制背后的记忆机制。在几何形状、竞争者异质性、竞争者数量和记忆的变化下，相同的相结构仍然存在，揭示了先到不平等的一般波动理论。", "authors": [{"name": "Arthur Plaud"}, {"name": "P. L. Krapivsky"}, {"name": "S. Redner"}, {"name": "Olivier Bénichou"}], "featured_authors": [{"name": "Arthur Plaud"}, {"name": "P. L. Krapivsky"}, {"name": "S. Redner"}, {"name": "Olivier Bénichou"}], "author_count": 4}, {"id": "2607.04266", "category": "cond-mat", "title": "Phase-Factor-Controlled Interaction and Bonding between a Chiral Bobber and a Skyrmion String in the Conical Phase", "abstract": "Skyrmion interactions govern the formation of skyrmion lattices, clusters, and particle-like growth patterns. In contrast, the interaction between a chiral bobber and a skyrmion string remains largely unexplored, despite the role of bobbers as intermediate states in skyrmion-string formation and annihilation. Here we show that this interaction is intrinsically phase dependent in the conical phase. Using three-dimensional micromagnetic simulations, we compute the locally relaxed constrained energy landscape as a function of the bobber--skyrmion separation $R$ and the surface phase factor $\\phi_0$. We find that changing $\\phi_0$ qualitatively reshapes the interaction, producing repulsive, attractive, and bonding-like regimes that cannot be reduced to a conventional distance-dependent potential. Real-space analysis shows that this behavior originates from phase-dependent reconstruction of nonaxisymmetric outer distortion shells. The phase-controlled interaction persists over a finite field range and follows the expected top--bottom phase relation of surface-sensitive conical textures. These results identify the conical phase direction, often hidden in projected or thickness-averaged descriptions, as a previously underappreciated degree of freedom in the interaction between skyrmion strings and finite-length chiral textures, as demonstrated here for chiral bobbers.", "url": "https://arxiv.org/abs/2607.04266", "type": "理论+数值", "summary": "斯格明子相互作用控制着斯格明子晶格、簇和类粒子生长模式的形成。相比之下，尽管浮子在斯格明子弦形成和湮灭中扮演着中间态的角色，但手性浮子和斯格明子弦之间的相互作用在很大程度上仍未被探索。在这里，我们证明这种相互作用在圆锥相中本质上是相位相关的。使用三维微磁模拟，我们计算局部松弛约束能量景观作为浮子-斯格明子分离 $R$ 和表面相位因子 $\\phi_0$ 的函数。我们发现，改变 $\\phi_0$ 会定性地重塑相互作用，产生排斥性、吸引力和类似粘合的机制，而这些机制无法简化为传统的距离依赖势。实空间分析表明，这种行为源于非轴对称外变形壳的相位相关重建。相控相互作用在有限的场范围内持续存在，并遵循表面敏感锥形纹理的预期顶部-底部相位关系。\n\n这些结果确定了圆锥形相位方向，通常隐藏在投影或厚度平均描述中，作为斯格明子弦和有限长度手性纹理之间相互作用的先前未被充分认识的自由度，正如此处针对手性浮子所演示的那样。", "authors": [{"name": "Haijun Zhao"}, {"name": "Tingting Yan"}, {"name": "Shuai Dong"}], "featured_authors": [{"name": "Haijun Zhao"}, {"name": "Tingting Yan"}, {"name": "Shuai Dong"}], "author_count": 3}, {"id": "2607.04269", "category": "cond-mat", "title": "First-principles Floquet analysis from real-time propagation", "abstract": "We present a real-time Floquet analysis method for extracting quasi-energies and Floquet states directly from propagated wavefunctions. By reconstructing the one-period evolution operator from overlaps between time-evolved states, the method avoids the explicit construction of the enlarged Floquet Hamiltonian and adds negligible computational overhead to time-
