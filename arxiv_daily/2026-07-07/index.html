ems with critical long-range interactions provides new insight in the field of Anderson localisation. As the second main result, based on the off-diagonal decay estimate, we prove a strong convergence of the finite capacitance operator, which corresponds to a truncated chain, to the capacitance operator as the size of the truncated chain grows to infinity. Using this strong convergence, we improve the results of [Ammari et al., SIAM J. Math. Anal., 2023 and Bull. London Math Soc., 2025] by presenting a rigorous estimate of the convergence rate of the spectrum.", "url": "https://arxiv.org/abs/2607.04971", "type": "理论", "summary": "高对比度谐振器系统的光谱和传输特性可以在亚波长范围内用所谓的电容算子来描述。在本文中，我们考虑了三维高对比度谐振器的无限周期链。第一个结果是电容算子 $C$ 的非对角线衰减率的精确估计。重要的是，我们证明了衰减率是长程且关键的：如 $|n-m|\\to\\infty$、\\begin{equation*} C(n,m)\\sim \\frac{1}{|n-m|\\log^2|n-m|}、\\end{equation*} 是 $\\ell^1$ 可求和的，但比二次方程慢。非对角线条目的这种边界衰减使得当前具有任意无序的安德森定位的证明（在本文中以数值方式观察到）无法实现；我们希望这个具有关键远程相互作用的经典波系统的物理例子为安德森定位领域提供新的见解。作为第二个主要结果，基于非对角线衰减估计，我们证明了当截断链的大小增长到无穷大时，对应于截断链的有限电容算子与电容算子的强收敛性。\n\n利用这种强收敛性，我们改进了 [Ammari 等人，SIAM J. Math.肛门，2023 和公牛。伦敦数学协会，2025]通过提出对谱收敛速度的严格估计。", "authors": [{"name": "Habib Ammari"}, {"name": "Silvo Barandun"}, {"name": "Jiayu Qiu"}, {"name": "Alexander Uhlmann"}], "featured_authors": [{"name": "Habib Ammari"}, {"name": "Silvo Barandun"}, {"name": "Jiayu Qiu"}, {"name": "Alexander Uhlmann"}], "author_count": 4}, {"id": "2607.05254", "category": "math-ph", "title": "Collision geometry of relativistic spinning particles", "abstract": "We investigate elastic binary collisions of relativistic spinning particles in special relativity. The spin of each particle is represented by an antisymmetric second order tensor. Assuming the conservation of total four momentum and total spin tensor, together with the mass shell and spin constraints, we formulate the collision problem in a fully Lorentz covariant setting. We show that the relativistic collision problem admits a simple geometric formulation, reducing the original system of conservation laws to the solution of a quadratic equation on a circle. This reduction yields a complete classification of the postcollisional states together with explicit reconstruction formulas for all postcollisional variables from the conserved quantities. In particular, there are generically only finitely many postcollisional states, with the maximal number equal to eight.", "url": "https://arxiv.org/abs/2607.05254", "type": "理论", "summary": "我们研究狭义相对论中相对论旋转粒子的弹性二元碰撞。每个粒子的自旋由反对称二阶张量表示。假设总四个动量和总自旋张量守恒，以及质量壳和自旋约束，我们在完全洛伦兹协变设置中制定了碰撞问题。我们证明相对论碰撞问题允许一个简单的几何公式​​，将原始守恒定律系统简化为圆上二次方程的解。这种简化产生了碰撞后状态的完整分类，以及来自守恒量的所有碰撞后变量的显式重建公式。特别是，通常只有有限多个碰撞后状态，最大数量等于八。", "authors": [{"name": "Simone Calogero"}], "featured_authors": [{"name": "Simone Calogero"}], "author_count": 1}, {"id": "2607.05286", "category": "math-ph", "title": "Lower bound on the energy-momentum relation of the polaron", "abstract": "For a class of polaron-type models, we establish a lower bound on the energy-momentum relation in terms of the vacuum overlap and the spectral gap of the total momentum zero Hamiltonian. We show convergence of the rescaled mean square displacement of the associated path measure to the inverse of the effective mass. We derive a probabilistic criterion for the absence of ground states at large total momentum.", "url": "https://arxiv.org/abs/2607.05286", "type": "理论", "summary": "对于一类极化子型模型，我们根据真空重叠和总动量零哈密顿量的谱间隙建立了能量动量关系的下界。我们展示了相关路径测量的重新缩放均方位移与有效质量倒数的收敛。我们得出了在大总动量下不存在基态的概率标准。", "authors": [{"name": "Steffen Polzer"}], "featured_authors": [{"name": "Steffen Polzer"}], "author_count": 1}, {"id": "2607.02616", "category": "quant-ph", "title": "MLIR for Quantum Beyond Gate Cancellation: Quantum Circuit Mapping Reimagined", "abstract": "The Multi-Level Intermediate Representation (MLIR) framework has become a cornerstone for building extensible, domain-specific compilers, with the quantum computing community already leveraging it to model quantum programs and implement basic optimizations. However, computationally intensive tasks in the quantum compilation pipeline, such as quantum circuit mapping, remain underexplored within the MLIR ecosystem. This paper proposes an MLIR-native blueprint for these non-local, quantum-specific optimization routines by reimplementing a well-established, state-of-the-art mapping A* search algorithm for qubit routing and SWAP insertion. Our evaluation demonstrates that this approach not only integrates seamlessly into an MLIR-based quantum compiler collection but also surpasses previous non-MLIR solutions in both solution quality and runtime. The implementation is open-source and publicly available at this https URL .", "url": "https://arxiv.org/abs/2607.02616", "type": "理论+数值", "summary": "多级中间表示（MLIR）框架已成为构建可扩展的特定领域编译器的基石，量子计算社区已经利用它来建模量子程序并实现基本优化。然而，量子编译管道中的计算密集型任务（例如量子电路映射）在 MLIR 生态系统中仍未得到充分探索。本文通过重新实现用于量子位路由和 SWAP 插入的成熟、最先进的映射 A* 搜索算法，为这些非局部、特定于量子的优化例程提出了 MLIR 原生蓝图。我们的评估表明，这种方法不仅可以无缝集成到基于 MLIR 的量子编译器集合中，而且在解决方案质量和运行时间方面都超越了以前的非 MLIR 解决方案。该实现是开源的，可通过 https URL 公开获取。", "authors": [{"name": "Matthias Reumann"}, {"name": "Yannick Stade"}, {"name": "Robert Wille"}, {"name": "Lukas Burgholzer"}], "featured_authors": [{"name": "Matthias Reumann"}, {"name": "Yannick Stade"}, {"name": "Robert Wille"}, {"name": "Lukas Burgholzer"}], "author_count": 4}, {"id": "2607.02622", "category": "quant-ph", "title": "COMET: Combinatorial Optimization for Multiplex Editing Targets Via Constraint-Preserving QAOA", "abstract": "Multiplex CRISPR-Cas9 gene editing requires selecting one guide RNA per target gene subject to cross-gene interactions: a constrained combinatorial problem that can be formulated as a Quadratic Unconstrained Binary Optimization (QUBO) and solved via the Quantum Approximate Optimization Algorithm (QAOA). The one-hot per-gene constraint is conventionally enforced by adding quadratic penalty terms to the cost Hamiltonian, but penalty coefficient selection is heuristic and penalties amplify hardware noise. An alternative is to enforce the constraint structurally via the XY-mixer, which preserves feasibility by construction. We present COMET, a systematic comparison of penalty-based and XY-mixer QAOA on a three-gene, twelve-qubit multiplex editing instance targeting the immune-checkpoint genes PDCD1, LAG3, and HAVCR2. In simulation, the XY-mixer exceeds 95% probability of the optimum by QAOA depth p=3, while three penalty variants spanning an order of magnitude in penalty coefficient remain below 6% at every depth. On IBM's ibm_kingston (Heron r2) processor, the XY-mixer's simulator-hardware energy gap stays within |0.8| across all depths, while the worst-tuned penalty variant's gap reaches +53.9. We provide an honest account of where the structural guarantee partially breaks under gate-level noise. The twelve-qubit instance is classically trivial; our contribution is a methodological comparison of constraint-enforcement strategies in a biologically motivated domain, with real-hardware validation.", "url": "https://arxiv.org/abs/2607.02622", "type": "理论+数值", "summary": "多重 CRISPR-Cas9 基因编辑需要为每个目标基因选择一个引导 RNA，以进行跨基因相互作用：这是一个约束组合问题，可以表示为二次无约束二元优化 (QUBO)，并通过量子近似优化算法 (QAOA) 解决。传统上，单热每基因约束是通过向成本哈密顿量添加二次惩罚项来强制执行的，但惩罚系数的选择是启发式的，并且惩罚会放大硬件噪声。另一种方法是通过 XY 混合器在结构上强制实施约束，从而保留构造的可行性。我们提出了 COMET，这是在针对免疫检查点基因 PDCD1、LAG3 和 HAVCR2 的三基因、十二量子位多重编辑实例上对基于惩罚的 QAOA 和 XY 混合器 QAOA 的系统比较。在仿真中，XY 混合器超过 95% 的 QAOA 深度 p=3 的最佳概率，而跨越一个数量级的惩罚系数的三个惩罚变体在每个深度都保持在 6% 以下。\n\n在 IBM 的 ibm_kingston (Heron r2) 处理器上，XY 混合器的模拟器-硬件能隙保持在 |0.8| 以内。在所有深度上，而最差调整的惩罚变体的差距达到+53.9。我们诚实地描述了结构保证在门级噪声下部分断裂的位置。十二量子位实例在经典上是微不足道的；我们的贡献是对生物驱动领域中的约束执行策略与真实硬件验证进行方法学比较。", "authors": [{"name": "Priyansh Singhal"}, {"name": "Sumit Maheshwari"}, {"name": "Piyush Joshi"}], "featured_authors": [{"name": "Priyansh Singhal"}, {"name": "Sumit Maheshwari"}, {"name": "Piyush Joshi"}], "author_count": 3}, {"id": "2607.02626", "category": "quant-ph", "title": "Krylov-Lie Algebras for Variational Quantum Algorithms: Geometric, Depth-Aware Insights into Expressivity and Trainability", "abstract": "Variational quantum algorithms (VQAs) are a leading approach to near-term quantum computation, but their utility is limited by barren plateaus and other pathologies in their loss landscapes. Existing landscape theories based on dynamical Lie algebras, Jordan-algebraic Wishart systems, approximate t-designs, and Haar-random circuits are foundational, but they often neglect the finite-depth geometry of realistic ansätze and are therefore poorly suited to the shallow-depth regime, where VQAs are poor approximators of 2-designs and trainability is most feasible. This thesis introduces Krylov algebras, algebraic structures induced by the Krylov span of a finite generator set acting on one or more seed vectors, as a framework for VQA landscape theory. We show that VQA reachable manifolds can be approximated in a numerically robust, geometrically faithful way by Krylov-Lie algebras and groups, and that these structures induce canonical invariant measures for computing expectation values and variances under general sampling measures. In particular, we derive weighted non-Haar variance formulas that recover the usual Lie-algebraic Haar formulas as a special case while isolating non-Haar effects into explicit correction terms. We also show that the common heuristic that sufficiently deep circuit ensembles must converge to Haar fails in general without additional hypotheses, identify concrete obstructions to naive Haar convergence, and recover convergence under natural necessary and sufficient ergodic conditions. Lastly, our formulas further imply that non-Haar contributions may mitigate barren plateaus by reweighting the visible sectors of the loss landscape, suggesting that VQAs may be more trainable than recent literature has posited.", "url": "https://arxiv.org/abs/2607.02626", "type": "理论+数值", "summary": "变分量子算法（VQA）是近期量子计算的一种领先方法，但其实用性受到其损失情况中的贫瘠高原和其他病态的限制。现有的基于动态李代数、乔丹代数 Wishart 系统、近似 t 设计和 Haar 随机电路的景观理论是基础，但它们经常忽略现实 ansätze 的有限深度几何，因此不太适合浅深度体系，其中 VQA 是 2 设计的较差近似器，可训练性是最可行的。本论文介绍了 Krylov 代数，即由作用于一个或多个种子向量的有限生成器集的 Krylov 跨度导出的代数结构，作为 VQA 景观理论的框架。我们表明，VQA 可达流形可以通过 Krylov-Lie 代数和群以数值鲁棒、几何忠实的方式近似，并且这些结构引入了规范不变测度，用于在一般采样测量下计算期望值和方差。\n\n特别是，我们推导了加权非哈尔方差公式，该公式将通常的李代数哈尔公式恢复为特殊情况，同时将非哈尔效应隔离为显式校正项。我们还表明，如果没有额外的假设，足够深的电路系综必须收敛到 Haar 的常见启发式通常会失败，识别朴素 Haar 收敛的具体障碍，并在自然必要和充分的遍历条件下恢复收敛。最后，我们的公式进一步表明，非 Haar 贡献可以通过重新加权损失景观的可见部分来缓解贫瘠高原，这表明 VQA 可能比最近的文献所假设的更容易训练。", "authors": [{"name": "Anžej Margeta-Cacace"}], "featured_authors": [{"name": "Anžej Margeta-Cacace"}], "author_count": 1}, {"id": "2607.02696", "category": "quant-ph", "title": "Parametrized-circuit-free quantum regression with variance regularization", "abstract": "Quantum regression tasks for predicting properties of quantum states are commonly addressed using variational quantum algorithms. While variational quantum circuits are highly expressive and allow to achieve reasonable accuracy, training these circuits may demand a considerable amount of time and resources. In this work, we propose an approach of constructing problem-specific quantum regression models with encoding relevant symmetries and regularizing the variance. The proposed method is based on finding the coefficients of the linear combination of suitably chosen observables. Although it requires the knowledge of the symmetries of the problem in question, the method does not involve parameterized quantum circuits, and the training is done efficiently once the observables are measured. We demonstrate this method on two examples: Prediction of the transverse field strength in the Ising model, and quantification of entanglement in bipartite qubit systems. Our approach is accurate and less resource-intensive than conventional variational methods.", "url": "https://arxiv.org/abs/2607.02696", "type": "理论+数值", "summary": "用于预测量子态属性的量子回归任务通常使用变分量子算法来解决。虽然变分量子电路具有很高的表达能力并且可以实现合理的精度，但训练这些电路可能需要大量的时间和资源。在这项工作中，我们提出了一种通过编码相关对称性和正则化方差来构建特定问题的量子回归模型的方法。所提出的方法基于寻找适当选择的可观测量的线性组合的系数。尽管它需要了解所讨论问题的对称性，但该方法不涉及参数化量子电路，并且一旦测量了可观测值，训练就可以有效地完成。我们通过两个例子演示了这种方法：伊辛模型中横向场强的预测，以及二分量子位系统中纠缠的量化。与传统的变分方法相比，我们的方法准确且资源密集程度低。", "authors": [{"name": "Yerassyl Balkybek"}, {"name": "Andrey Kardashin"}, {"name": "Vladimir V. Palyulin"}, {"name": "Konstantin Antipin"}], "featured_authors": [{"name": "Yerassyl Balkybek"}, {"name": "Andrey Kardashin"}, {"name": "Vladimir V. Palyulin"}, {"name": "Konstantin Antipin"}], "author_count": 4}, {"id": "2607.02736", "category": "quant-ph", "title": "Encoding matroids into quantum states", "abstract": "Efficient representations of multipartite quantum states play a fundamental role in quantum information theory, providing both conceptual insight and practical tools for characterizing entanglement. Motivated by the axiomatic framework for graph states [Phys. Rev. A 85, 062313 (2012)] and its subsequent extension to hypergraph states [Phys. Rev. A 87, 022311 (2013)], we introduce an axiomatic construction of \\emph{matroid states}, a new family of multipartite quantum states associated with matroids. Our constructions are based on a set of axioms analogous to those that define graph and hypergraph states, yielding a consistent quantum representation of arbitrary matroids. Two ways of constructing matroid states are proposed: the first is defined in terms of circuits, and the second in terms of independent sets. In both approaches, we establish the existence of universal global operators that satisfy desirable properties such as locality, symmetry, commutativity, and are associated with the combinatorial structure of matroids. Furthermore, we establish a hierarchy connecting graph, matroid, and hypergraph states within a unified framework. Additionally, we show how to obtain an arbitrary graph state by applying suitable families of matroid states, whose corresponding operators are the generators of the stabilizer subgroup of the graph state. These results identify matroid theory as a natural combinatorial language for the efficient description of multipartite quantum states and open new perspectives for the investigation of quantum entanglement and related combinatorial structures.", "url": "https://arxiv.org/abs/2607.02736", "type": "理论", "summary": "多部分量子态的有效表示在量子信息理论中发挥着基础作用，为表征纠缠提供了概念见解和实用工具。受图状态公理框架的启发 [Phys。 Rev. A 85, 062313 (2012)] 及其随后对超图状态的扩展 [Phys. Rev. A 87, 022311 (2013)]，我们引入了 \\emph{拟阵态} 的公理化构造，这是与拟阵相关的一类新的多部分量子态。我们的构造基于一组类似于定义图和超图状态的公理，产生任意拟阵的一致量子表示。提出了两种构造拟阵状态的方法：第一种是根据电路定义的，第二种是根据独立集定义的。在这两种方法中，我们都建立了通用全局算子的存在，这些算子满足所需的属性，例如局部性、对称性、交换性，并且与拟阵的组合结构相关联。此外，我们在统一框架内建立了连接图、拟阵和超图状态的层次结构。\n\n此外，我们还展示了如何通过应用合适的拟阵状态族来获得任意图状态，其相应的算子是图状态的稳定子群的生成器。这些结果将拟阵理论确定为有效描述多部分量子态的自然组合语言，并为量子纠缠和相关​​组合结构的研究开辟了新的视角。", "authors": [{"name": "Nathan Ferreira"}, {"name": "Alison A. Silva"}, {"name": "Giuliano G. La Guardia"}, {"name": "Fabiano M. Andrade"}], "featured_authors": [{"name": "Nathan Ferreira"}, {"name": "Alison A. Silva"}, {"name": "Giuliano G. La Guardia"}, {"name": "Fabiano M. Andrade"}], "author_count": 4}, {"id": "2607.02810", "category": "quant-ph", "title": "Locally Passive, Globally Charged Quantum Batteries: Coherence-Controlled Work and the Robustness of the Stored Charge", "abstract": "A solvable charger--battery model is introduced in which quantum coherence controls both where a quantum battery's charge is stored and how robustly it survives noise. Charging converts the charger's coherence into charger--battery entanglement and splits the deposited work between a locally extractable part and a correlation-locked part accessible only through joint operations; for a qubit, the split obeys an exact complementarity, and at maximal coherence, the battery is locally passive with the entire charge locked in correlations. Robustness follows local accessibility: the stored energy and locally extractable work are population-based, immune to pure dephasing, and limited only by relaxation, with an energy half-life, whereas the correlation-locked work is fragile to both dephasing and relaxation. Dephasing, global and local depolarization, and amplitude damping are treated through a single gain--loss competition algebra, and the resulting storage lifetimes are made concrete with superconducting-transmon parameters.", "url": "https://arxiv.org/abs/2607.02810", "type": "理论", "summary": "引入了可求解的充电器-电池模型，其中量子相干性控制着量子电池的电荷存储位置以及其抗噪声能力。充电将充电器的相干性转化为充电器-电池纠缠，并将存储的功分成本地可提取部分和只能通过联合操作访问的相关锁定部分；对于量子位来说，分裂遵循精确的互补性，并且在最大相干性下，电池是局部无源的，整个电荷被锁定在相关性中。鲁棒性遵循局部可访问性：存储的能量和局部可提取的功是基于群体的，不受纯相移的影响，并且仅受弛豫的限制，具有能量半衰期，而相关锁定的功对于相移和弛豫都很脆弱。移相、全局和局部去极化以及振幅阻尼通过单个增益-损耗竞争代数进行处理，并且由此产生的存储寿命由超导传输参数具体化。", "authors": [{"name": "Asad Ali"}, {"name": "Saif Al-kuwari"}, {"name": "James Q. Quach"}], "featured_authors": [{"name": "Asad Ali"}, {"name": "Saif Al-kuwari"}, {"name": "James Q. Quach"}], "author_count": 3}, {"id": "2607.02989", "category": "quant-ph", "title": "Error-tolerant secure key leasing for quantum decryption keys in public-key encryption", "abstract": "We propose the first error-tolerant secure key leasing (SKL) for public-key encryption. As with SKL in prior works, our protocol consists of a lessor and lessee. In the protocol, the lessor encodes its secret key into quantum states and leases the key to the lessee. Then, the lessor can ask the lessee to return the secret key at a later point. The lessor is able to check whether the lessee has returned its key honestly. However, our protocol works even when the leased secret key is subject to noise. The lessee decrypts the ciphertext correctly, and the lessor verifies the return of the secret key correctly when the amount of error is below a certain threshold. Our improved protocol does not change the encoding of the secret key, and thus adds no overhead to the quantum information processing. Our most significant result is a framework to analyze the trade-off between robustness against error and security. We bridge the security of the error-tolerant SKL and that of the error-tolerant certified deletion with shortened codes, which is a relatively less explored concept in coding theory.", "url": "https://arxiv.org/abs/2607.02989", "type": "理论", "summary": "我们提出了第一个用于公钥加密的容错安全密钥租赁（SKL）。与之前作品中的 SKL 一样，我们的协议由出租人和承租人组成。在协议中，出租人将其密钥编码为量子态，并将密钥出租给承租人。然后，出租人可以要求承租人稍后归还密钥。出租人可以检查承租人是否如实归还钥匙。然而，即使租用的密钥受到噪声影响，我们的协议仍然有效。承租人正确解密密文，出租人在错误量低于一定阈值时验证密钥返回是否正确。我们改进的协议不会改变密钥的编码，因此不会增加量子信息处理的开销。我们最重要的成果是一个分析稳健性、抗错误性和安全性之间权衡的框架。我们用缩短的代码桥接了容错SKL和容错认证删除的安全性，这是编码理论中相对较少探索的概念。", "authors": [{"name": "Duo Xu"}, {"name": "Yuki Takeuchi"}], "featured_authors": [{"name": "Duo Xu"}, {"name": "Yuki Takeuchi"}], "author_count": 2}, {"id": "2607.02997", "category": "quant-ph", "title": "Symmetry-Resolved Parent Hamiltonians for Entangled Bosonic Cat Resources", "abstract": "We derive parent Hamiltonians in terms of oscillator operators for multimode bosonic cat resource states. The construction separates a universal branch Hamiltonian, which confines each mode to the coherent-state support $ |\\pm\\alpha\\rangle$, and state-dependent constraint Hamiltonians, which select the desired correlations and symmetry sectors inside the resulting branch manifold. This framework progressively removes degeneracies in the low-energy manifold and yields explicit parent Hamiltonians for GHZ-, cluster-, and W-type cat states. In the large-$|\\alpha|$ limit, the bosonic parent Hamiltonians reduce to stabilizer or exchange Hamiltonians acting on an effective logical-qubit basis. The present construction provides a direct bridge between coherent-state bosonic engineering and stabilizer-based quantum information processing.", "url": "https://arxiv.org/abs/2607.02997", "type": "理论+数值", "summary": "我们根据多模玻色猫资源状态的振荡器算子推导出父哈密顿量。该构造将通用分支哈密顿量与状态相关约束哈密顿量分开，该通用分支哈密顿量将每个模式限制为相干状态支持 $ |\\pm\\alpha\\rangle$ ，而状态相关的约束哈密顿量则在所得分支流形内选择所需的相关性和对称性部分。该框架逐步消除低能流形中的简并性，并为 GHZ、簇和 W 型猫态产生显式的父哈密顿量。在大 $|\\alpha|$ 限制中，玻色子父哈密顿量减少为稳定器或交换哈密顿量，在有效的逻辑量子位基础上起作用。目前的结构提供了相干态玻色子工程和基于稳定器的量子信息处理之间的直接桥梁。", "authors": [{"name": "Šimon Bräuer"}, {"name": "Klaus Mølmer"}], "featured_authors": [{"name": "Šimon Bräuer"}, {"name": "Klaus Mølmer"}], "author_count": 2}, {"id": "2607.03164", "category": "quant-ph", "title": "Geometric modulation of transition and survival intensities in non-Hermitian systems", "abstract": "The time evolution of non-Hermitian systems is generally nonunitary. Dynamics governed by time-dependent non-Hermitian Hamiltonians lead to a variety of novel phenomena, one of which is state amplification or suppression induced by the complex Berry phase. Here, we extend the framework of geometric modulation to multi-level systems and show that both transition and survival intensities can be modulated. We apply our theory to the non-Hermitian Landau-Zener (LZ) problem. First, we show that, in the half-LZ problem, both the transition and survival probabilities exhibit nonreciprocity due to the complex Berry phase. In the non-Hermitian standard LZ problem, only the survival intensity is known to exhibit nonreciprocity, whereas the transition intensity does not. However, the physical origin of this nonreciprocal behavior remains unclear. In this work, we show that the nonreciprocity originates from the complex Berry phase.", "url": "https://arxiv.org/abs/2607.03164", "type": "理论+数值", "summary": "非厄米系统的时间演化通常是非酉的。由时间相关的非厄米哈密顿量控制的动力学导致了各种新颖的现象，其中之一是由复杂的贝里相引起的状态放大或抑制。在这里，我们将几何调制的框架扩展到多级系统，并表明过渡和生存强度都可以调制。我们将我们的理论应用于非厄米兰道齐纳 (LZ) 问题。首先，我们表明，在 half-LZ 问题中，由于复杂的 Berry 相，过渡概率和生存概率都表现出非互易性。在非厄米标准 LZ 问题中，仅已知生存强度表现出非互易性，而跃迁强度则不然。然而，这种非互惠行为的物理起源仍不清楚。在这项工作中，我们证明非互易性源于复杂的贝里相。", "authors": [{"name": "Ryu Frieson"}, {"name": "Takashi Oka"}, {"name": "Hideaki Obuse"}], "featured_authors": [{"name": "Ryu Frieson"}, {"name": "Takashi Oka"}, {"name": "Hideaki Obuse"}], "author_count": 3}, {"id": "2607.03187", "category": "quant-ph", "title": "Quantum Kolmogorov--Arnold representation theorem for continuous unitary-valued maps", "abstract": "The classical Kolmogorov--Arnold representation theorem states that any continuous multivariate function can be exactly decomposed into a finite composition of univariate continuous functions and addition operations. This foundational result has recently inspired the development of Kolmogorov--Arnold Networks (KANs) in classical machine learning, as well as their extensions into the quantum domain (QKANs). In this paper, we establish two quantum analogues of the Kolmogorov--Arnold representation theorem for continuous unitary-valued maps of several variables within an open $1$-neighbourhood of the identity matrix \\(O_1(\\mathbf{I}) \\subset \\mathcal{U}(n)\\). First, we prove a representation theorem that yields an exact additive decomposition inside the matrix exponent of anti-Hermitian-valued maps. Second, due to the non-commutative nature of quantum operators, we derive a factorised version expressing the target unitary map as a finite sequential product of univariate matrix exponentials. Finally, we provide a concrete topological counterexample based on the lifting property of \\(\\mathcal{SU}(2)\\) to demonstrate that these local representation theorems cannot be globally extended to the entire unitary group \\(\\mathcal{U}(n)\\) without encountering fundamental structural obstructions.", "url": "https://arxiv.org/abs/2607.03187", "type": "理论+数值", "summary": "经典的柯尔莫哥洛夫-阿诺德表示定理指出，任何连续多元函数都可以精确地分解为单变量连续函数和加法运算的有限组合。这一基础性成果最近激发了经典机器学习领域柯尔莫哥洛夫-阿诺德网络 (KAN) 的发展，以及它们在量子领域 (QKAN) 的扩展。在本文中，我们为单位矩阵 \\(O_1(\\mathbf{I}) \\subset \\mathcal{U}(n)\\) 的开放 $1$ 邻域内多个变量的连续酉值映射建立了柯尔莫哥洛夫 - 阿诺德表示定理的两个量子类似物。首先，我们证明了一个表示定理，该定理在反厄米值映射的矩阵指数内产生精确的加法分解。其次，由于量子算子的非交换性质，我们导出了一个因式分解版本，将目标酉映射表示为单变量矩阵指数的有限顺序乘积。\n\n最后，我们提供了一个基于 \\(\\mathcal{SU}(2)\\) 提升性质的具体拓扑反例，以证明这些局部表示定理不能在不遇到基本结构障碍的情况下全局扩展到整个酉群 \\(\\mathcal{U}(n)\\)。", "authors": [{"name": "Sviatoslav V. Dzhenzher"}], "featured_authors": [{"name": "Sviatoslav V. Dzhenzher"}], "author_count": 1}, {"id": "2607.03218", "category": "quant-ph", "title": "Quantum Annealing for Dynamic Portfolio Optimization under Realistic Transaction Costs", "abstract": "This paper investigates and compares quantum and classical investment strategies for portfolio construction under realistic trading and allocation constraints. The study considers a multi-period portfolio re-balancing setting in which asset weights are subject to lower and upper bounds, class-level exposure restrictions, and turnover limitations. On the quantum side, the portfolio selection problem is reformulated as a quadratic unconstrained binary optimization (QUBO) model through a finite binary encoding of asset weights, and subsequently embedded into a constrained quadratic model (CQM) solved by a hybrid quantum-classical optimization workflow. On the classical side, benchmark allocation strategies are introduced to provide an economically meaningful reference for performance assessment. The proposed framework jointly evaluates portfolio efficiency from two complementary perspectives: business performance, measured through return, volatility, and a measure of the trade-off between them, the Sharpe ratio; and computational performance, assessed through solver structure, constraint handling, and hardware execution characteristics. The resulting comparison provides a rigorous basis for understanding the practical role of quantum annealing in constrained portfolio optimization, while clarifying both its modeling advantages and its current implementation limitations relative to established classical approaches.", "url": "https://arxiv.org/abs/2607.03218", "type": "理论+数值", "summary": "本文研究并比较了现实交易和配置约束下构建投资组合的量子和经典投资策略。该研究考虑了多时期投资组合重新平衡设置，其中资产权重受到下限和上限、类别级别的风险敞口限制和周转率限制。在量子方面，投资组合选择问题通过资产权重的有限二进制编码重新表述为二次无约束二元优化（QUBO）模型，随后嵌入到由混合量子经典优化工作流程求解的约束二次模型（CQM）中。在经典方面，引入基准分配策略，为绩效评估提供经济上有意义的参考。拟议的框架从两个互补的角度联合评估投资组合效率：业务绩效，通过回报、波动性以及它们之间的权衡衡量标准夏普比率来衡量；和计算性能，通过求解器结构、约束处理和硬件执行特性进行评估。\n\n由此产生的比较为理解量子退火在约束投资组合优化中的实际作用提供了严格的基础，同时阐明了其建模优势及其相对于已建立的经典方法的当前实现限制。", "authors": [{"name": "Escolástico Sánchez-Martínez"}, {"name": "Senaida Hernandez Santana"}, {"name": "Ventura Sarasa Laborda"}, {"name": "Pablo Serrano Molinero"}, {"name": "Guillermo Botella Juan"}, {"name": "Alberto del Barrio García"}], "featured_authors": [{"name": "Escolástico Sánchez-Martínez"}, {"name": "Senaida Hernandez Santana"}, {"name": "Ventura Sarasa Laborda"}, {"name": "Pablo Serrano Molinero"}, {"name": "Guillermo Botella Juan"}, {"name": "Alberto del Barrio García"}], "author_count": 6}, {"id": "2607.03235", "category": "quant-ph", "title": "A Galton-Watson estimate for Dyson series", "abstract": "We consider the question of convergence of particular series of integrals, which are labeled by rooted trees. Necessary and sufficient criteria for convergence are obtained, together with an explicit expression for the sum. The technique used is strongly reminiscent of the generating function approach of Galton and Watson to branching processes. The interest in these series derives from the Dyson series expansion for the perturbation of a free quantum dynamics by a local potential: the convergence of the series imlies that the perturbed dynamics exists and is unitarily equivalent with the free one.", "url": "https://arxiv.org/abs/2607.03235", "type": "理论", "summary": "我们考虑特定积分系列的收敛问题，这些积分由有根树标记。获得了收敛的必要和充分标准，以及总和的显式表达式。所使用的技术强烈地让人想起高尔顿和沃森的分支过程的生成函数方法。对这些级数的兴趣源于局部势对自由量子动力学的扰动的戴森级数展开：该级数的收敛意味着被扰动的动力学存在并且与自由的动力学统一等价。", "authors": [{"name": "Hans Maassen"}, {"name": "Dmitri Botvich"}], "featured_authors": [{"name": "Hans Maassen"}, {"name": "Dmitri Botvich"}], "author_count": 2}, {"id": "2607.03274", "category": "quant-ph", "title": "False vacuum decay in long-range interacting quantum systems", "abstract": "We formulate false-vacuum decay in a mixed-field Ising chain with $1/r^\\alpha$ interactions as a spatially nonlocal Euclidean $\\phi^4$ theory featuring a fractional spatial kinetic term $\\sim |q|^\\sigma$, where $\\sigma=\\alpha-1$. The nonlocal bounce is anisotropic in space-time and develops algebraic spatial tails, challenging the standard thin-wall picture of a compact droplet. Combining thin-wall arguments with numerical solutions of the full nonlocal saddle, we show that these tails preserve the leading thin-wall exponents, manifesting instead in subleading corrections. For $0<\\sigma<1$, the lifetime exponent scales with the energy bias $h$ of the metastable state as $B\\sim h^{-1/\\sigma}$; for $1<\\sigma<2$, the leading Coleman scaling $B\\sim h^{-1}$ is recovered, while long-range effects are retained in the subdominant term $\\sim h^{\\sigma-2}$. Our results show that tunable long-range interactions fundamentally reshape bubble nucleation and alter false-vacuum decay in quantum simulators.", "url": "https://arxiv.org/abs/2607.03274", "type": "理论+数值", "summary": "我们将具有 $1/r^\\alpha$ 相互作用的混合场 Ising 链中的假真空衰变公式化为空间非局域欧几里得 $\\phi^4$ 理论，具有分数空间动力学项 $\\sim |q|^\\sigma$，其中 $\\sigma=\\alpha-1$。非局部弹跳在时空上是各向异性的，并产生代数空间尾部，挑战了紧凑液滴的标准薄壁图像。将薄壁参数与完整非局部鞍点的数值解相结合，我们表明这些尾部保留了领先的薄壁指数，而是表现为次领先的修正。对于 $0<\\sigma<1$，寿命指数随亚稳态的能量偏差 $h$ 缩放为 $B\\sim h^{-1/\\sigma}$；对于 $1<\\sigma<2$，主导科尔曼标度 $B\\sim h^{-1}$ 被恢复，而远程效应则保留在次主导项 $\\sim h^{\\sigma-2}$ 中。我们的结果表明，可调谐的长程相互作用从根本上重塑了气泡成核并改变了量子模拟器中的假真空衰变。", "authors": [{"name": "Valerio Pagni"}, {"name": "Laura Batini"}, {"name": "Nicolò Defenu"}], "featured_authors": [{"name": "Valerio Pagni"}, {"name": "Laura Batini"}, {"name": "Nicolò Defenu"}], "author_count": 3}, {"id": "2607.03278", "category": "quant-ph", "title": "Complexity of Normalized Persistence Problems for Topological Data Analysis and Local Hamiltonians", "abstract": "Topological data analysis (TDA) is a machine learning technique that uses topology to extract patterns from data and has shown the potential to exhibit quantum advantage. A key concept in TDA is persistent homology, which measures the robustness of topological information at different lengthscales. In this paper, we introduce and study the problem of normalized persistence, a practically motivated and easily interpretable version of persistent homology that counts the fraction of holes that persist at different lengthscales. We prove that a variant of normalized persistence is $\\mathsf{DQC}_1$-hard and contained in $\\mathsf{BQP}$, giving evidence of an exponential quantum speedup for TDA under the standard assumption that $\\mathsf{DQC}_1 \\not\\subseteq \\mathsf{BPP}$. These are the first $\\mathsf{DQC}_1$-hardness results that are directly applicable to TDA instances. We also find a close connection between normalized persistence and the complexity of estimating spectral quantities in the low-energy subspace of local Hamiltonians. We study a family of such problems, including a low-energy normalized subtrace and spectral density. We show that these are $\\mathsf{DQC}_1$-hard for $O(1)$-local Hamiltonians, strengthening previous results that required log-local interactions. We also introduce a variant of $\\mathsf{DQC}_1$ with perfect completeness ($\\mathsf{SDQC}_1$) to characterize the hardness of problems normalized by an exact kernel. This includes normalized persistence for $O(1)$-local Hamiltonians, which we show is $\\mathsf{SDQC}_1$-hard.", "url": "https://arxiv.org/abs/2607.03278", "type": "理论+数值", "summary": "拓扑数据分析（TDA）是一种机器学习技术，它使用拓扑从数据中提取模式，并已显示出展现量子优势的潜力。 TDA 中的一个关键概念是持久同源性，它衡量不同长度尺度上拓扑信息的鲁棒性。在本文中，我们介绍并研究了归一化持久性问题，这是持久同源性的一种实用且易于解释的版本，它计算在不同长度尺度上持久存在的孔的分数。我们证明了归一化持久性的一个变体是 $\\mathsf{DQC}_1$-hard 并包含在 $\\mathsf{BQP}$ 中，提供了在 $\\mathsf{DQC}_1 \\not\\subseteq \\mathsf{BPP}$ 标准假设下 TDA 呈指数量子加速的证据。这些是第一个直接适用于 TDA 实例的 $\\mathsf{DQC}_1$-硬度结果。我们还发现归一化持久性与估计局部哈密顿量低能量子空间中谱量的复杂性之间存在密切联系。我们研究一系列此类问题，包括低能量归一化亚迹和谱密度。\n\n我们证明，对于 $O(1)$-局部哈密顿量来说，这些是 $\\mathsf{DQC}_1$-困难，加强了之前需要对数局部相互作用的结果。我们还引入了具有完美完整性的 $\\mathsf{DQC}_1$ 的变体 ($\\mathsf{SDQC}_1$) 来表征由精确内核标准化的问题的难度。这包括 $O(1)$-局部哈密顿量的归一化持久性，我们显示它是 $\\mathsf{SDQC}_1$-hard。", "authors": [{"name": "Dominic Lowe"}, {"name": "M.S. Kim"}, {"name": "Roberto Bondesan"}, {"name": "Ryu Hayakawa"}], "featured_authors": [{"name": "Dominic Lowe"}, {"name": "M.S. Kim"}, {"name": "Roberto Bondesan"}, {"name": "Ryu Hayakawa"}], "author_count": 4}, {"id": "2607.03295", "category": "quant-ph", "title": "Quantum Probability and Quantum Information Theory", "abstract": "This is an introductory course on quantum probability and quantum information, based on matrix algebras.", "url": "https://arxiv.org/abs/2607.03295", "type": "理论", "summary": "这是基于矩阵代数的量子概率和量子信息的入门课程。", "authors": [{"name": "Hans Maassen"}], "featured_authors": [{"name": "Hans Maassen"}], "author_count": 1}, {"id": "2607.03337", "category": "quant-ph", "title": "An End-to-End Multi-Stage Kill-Chain Attack on Quantum Neural Networks: Demonstration on Trapped-Ion Hardware", "abstract": "We demonstrate an end-to-end, multi-stage attack against a quantum neural network (QNN) model that is executed on a trapped-ion quantum computer. Our chain combines side-channel reconnaissance, crosstalk characterization, adversarial example generation, and a physical crosstalk attack that realizes the adversarial perturbation on the device. We cover the full attack chain on ion traps and report the corresponding superconducting-hardware experiments in the appendix. We discuss implications for QaaS providers and hardware mitigations.", "url": "https://arxiv.org/abs/2607.03337", "type": "实验", "summary": "我们演示了针对在捕获离子量子计算机上执行的量子神经网络 (QNN) 模型的端到端多阶段攻击。我们的链结合了侧通道侦察、串扰表征、对抗性示例生成以及在设备上实现对抗性扰动的物理串扰攻击。我们涵盖了离子陷阱的完整攻击链，并在附录中报告了相应的超导硬件实验。我们讨论对 QaaS 提供商和硬件缓解措施的影响。", "authors": [{"name": "Cedric Brügmann"}, {"name": "Daniel Herr"}, {"name": "Daniel Ohl de Mello"}, {"name": "Pascal Debus"}, {"name": "Maximilian Wendlinger"}, {"name": "Kilian Tscharke"}, {"name": "Juris Ulmanis"}, {"name": "Alexander Erhard"}, {"name": "Arthur Schmidt"}, {"name": "Fabian Petsch"}], "featured_authors": [{"name": "Cedric Brügmann"}, {"name": "Daniel Herr"}, {"name": "Daniel Ohl de Mello"}, {"name": "Alexander Erhard"}, {"name": "Arthur Schmidt"}, {"name": "Fabian Petsch"}], "author_count": 10}, {"id": "2607.03361", "category": "quant-ph", "title": "Nested-Loop Trajectory-Informed Variational Quantum Solver for Interior-Point OPF", "abstract": "Optimal power flow (OPF) solved by an interior-point method (IPM) requires repeatedly solving Newton linear systems. When variational quantum linear solvers (VQLS) are used, each IPM iteration involves an additional nested inner variational optimization loop, which can significantly slow the overall quantum-assisted IPM convergence. To address this challenge, this paper proposes a dual-level trainable quantum IPM framework for OPF that leverages early solver-generated trajectories rather than relying on single-point prediction. The key observation is that early IPM iterates provide informative primal-dual, slack, and barrier-variable evolution about the path to optimality, while early VQLS parameter updates provide useful information about the later variational search. At the quantum-solver level, a trainable parameter model uses a short prefix of the VQLS parameter trajectory to project the remaining variational search toward a lower-cost region. At the OPF-solver level, a second trainable model uses early primal-dual IPM iterates to project a later central path state, which is restored to an admissible point before IPM refinement continues. Simulation studies show that the proposed approach reduces the number of variational updates by up to $95\\%$ while maintaining OPF objective values close to the classical IPM reference. A 2-bus demonstration on real quantum hardware is also included to validate the implementation of the proposed workflow.", "url": "https://arxiv.org/abs/2607.03361", "type": "理论+数值", "summary": "通过内点法 (IPM) 求解的最优功率流 (OPF) 需要反复求解牛顿线性系统。当使用变分量子线性求解器 (VQLS) 时，每次 IPM 迭代都会涉及一个额外的嵌套内部变分优化循环，这会显着减慢整个量子辅助 IPM 收敛速度。为了应对这一挑战，本文提出了一种用于 OPF 的双级可训练量子 IPM 框架，该框架利用早期求解器生成的轨迹，而不是依赖于单点预测。关键的观察结果是，早期 IPM 迭代提供了有关最优路径的原始对偶、松弛和障碍变量演化的信息，而早期 VQLS 参数更新提供了有关后期变分搜索的有用信息。在量子求解器级别，可训练参数模型使用 VQLS 参数轨迹的短前缀将剩余的变分搜索投射到成本较低的区域。在 OPF 求解器级别，第二个可训练模型使用早期原始对偶 IPM 迭代来预测稍后的中心路径状态，该状态在 IPM 细化继续之前恢复到可接受的点。\n\n仿真研究表明，所提出的方法将变分更新的数量减少了高达 $95\\%$，同时保持 OPF 目标值接近经典 IPM 参考值。还包括真实量子硬件上的 2 总线演示，以验证所提出的工作流程的实现。", "authors": [{"name": "Farshad Amani"}, {"name": "Amin Kargarian"}], "featured_authors": [{"name": "Farshad Amani"}, {"name": "Amin Kargarian"}], "author_count": 2}, {"id": "2607.03409", "category": "quant-ph", "title": "Symmetry-Protected Quantum Synchronization in Squeezed-Bath-Engineered Superradiance", "abstract": "A squeezed dissipative bath converts the coupling phase of a bipartite unconventional Dicke model into a control parameter that suppresses both static superradiant thresholds, opening a window where only a Hopf instability survives and the two spin ensembles synchronize completely via the shared cavity mode. The squeezed bath preserves a $\\mathbb{Z}_2$ parity symmetry, so conventional broken-symmetry diagnostics vanish identically. We certify the synchronized state instead through parity-even, information-theoretic witnesses: a 30\\% photon-number suppression, a Husimi-$Q$ lobe-count change, a 64\\% suppression of spin--spin mutual information, and a robust discord-to-mutual-information ratio $D/I = 0.50 \\pm 0.05$, confirmed by full quantum master-equation simulations. These results establish parity-even witnesses as a general, entanglement-free route to certifying quantum synchronization in symmetry-protected driven-dissipative systems.", "url": "https://arxiv.org/abs/2607.03409", "type": "理论+数值", "summary": "挤压耗散浴将二分非常规 Dicke 模型的耦合相转换为抑制两个静态超辐射阈值的控制参数，打开一个窗口，其中仅存在 Hopf 不稳定性，并且两个自旋系综通过共享腔模式完全同步。挤压浴保留了 $\\mathbb{Z}_2$ 奇偶对称性，因此传统的对称破缺诊断同样消失。我们通过奇偶校验、信息论见证来证明同步状态：30% 的光子数抑制、Husimi-$Q$ 波瓣计数变化、自旋-自旋互信息的 64% 抑制，以及强大的不一致与互信息比率 $D/I = 0.50 \\pm 0.05$，由全量子主方程模拟证实。这些结果将宇称偶见证确立为一种通用的、无纠缠的途径，用于证明对称保护驱动耗散系统中的量子同步。", "authors": [{"name": "Juan David Álvarez-Cuartas"}, {"name": "Joakim Bergli"}, {"name": "John H. Reina"}], "featured_authors": [{"name": "Juan David Álvarez-Cuartas"}, {"name": "Joakim Bergli"}, {"name": "John H. Reina"}], "author_count": 3}, {"id": "2607.03429", "category": "quant-ph", "title": "Matter-Field Exchange Generates Entanglement, Not Classical Gravity", "abstract": "Aziz and Howl have argued that a hybrid theory with quantum matter and a classical gravitational field can generate entanglement between two massive systems. In their construction, the branch-dependent contribution appears at fourth order through propagators of the quantum matter field in a fixed classical gravitational potential. We analyse this mechanism within the same perturbative QFT framework and show that the effect should not be interpreted as classical gravity mediating entanglement in the sense relevant to BMV-type witnesses. The non-separable term relies on a quantum-matter exchange channel between the two interferometers and is present only when the two systems are modelled as excitations of the same matter field. If distinct, non-interconverting matter fields describe the systems, the corresponding cross-propagator is absent and the Aziz-Howl entangling diagram vanishes. The effect relies on coherent propagation amplitudes of the quantum matter field between the two interferometers, together with postselection onto the original localised branch subspace. Moreover, the inference of entanglement is made after projecting the full QFT evolution onto a restricted final subspace containing the original localised $N$-particle branch states. This projection removes precisely the sectors that would record matter-field contamination, mode deformation, or exchange between the two interferometers. We therefore argue that the Aziz-Howl mechanism is a matter-sector cross-talk effect in a classical background, not entanglement mediated by classical gravitational degrees of freedom. Having identified the channel responsible for the Aziz-Howl contribution, we predict that it can be eliminated by using distinct, non-interconverting matter species in the two interferometers, or by inserting a barrier that suppresses matter-field propagation between them.", "url": "https://arxiv.org/abs/2607.03429", "type": "理论", "summary": "阿齐兹和哈尔认为，量子物质和经典引力场的混合理论可以在两个大系统之间产生纠缠。在他们的构造中，分支相关的贡献通过固定经典引力势中的量子物质场的传播器出现在第四阶。我们在相同的微扰 QFT 框架内分析了这种机制，并表明该效应不应被解释为与 BMV 型见证相关的经典重力介导的纠缠。不可分离项依赖于两个干涉仪之间的量子物质交换通道，并且仅当两个系统被建模为同一物质场的激发时才出现。如果不同的、非相互转换的物质场描述了系统，则相应的交叉传播器不存在，并且阿齐兹-哈尔纠缠图消失。该效应依赖于两个干涉仪之间量子物质场的相干传播幅度，以及对原始局部分支子空间的后选择。\n\n此外，在将完整的 QFT 演化投影到包含原始局域 $N$ 粒子分支态的受限最终子空间上之后，进行了纠缠的推断。该投影精确地去除了记录物质场污染、模式变形或两个干涉仪之间交换的部分。因此，我们认为阿齐兹-哈尔机制是经典背景下的物质扇区串扰效应，而不是经典引力自由度介导的纠缠。在确定了造成阿齐兹-哈尔贡献的通道后，我们预测可以通过在两个干涉仪中使用不同的、非相互转换的物质种类，或者通过在它们之间插入抑制物质场传播的势垒来消除它。", "authors": [{"name": "Nicetu Tibau Vidal"}, {"name": "Aditya Varna Iyer"}], "featured_authors": [{"name": "Nicetu Tibau Vidal"}, {"name": "Aditya Varna Iyer"}], "author_count": 2}, {"id": "2607.03438", "category": "quant-ph", "title": "Dynamical zero modes, boundary dependence, and numerical instability in dynamical quantum phase transitions", "abstract": "Boundary conditions are usually expected to cause only finite-size corrections to bulk quantities, but this expectation can fail for dynamical quantum phase transitions. In this work, we show that such boundary dependence is encoded in dynamical zero modes (DZMs) of the Loschmidt matrix, which are defined as singular vectors whose singular values vanish in the thermodynamic limit. Using the Su-Schrieffer-Heeger (SSH) and extended SSH models as examples, we find that the time interval where the Loschmidt rate functions (LRFs) under periodic and open boundary conditions differ coincides with the emergence of DZMs in the open-boundary Loschmidt matrix. These modes carry the boundary-dependent contribution: removing them from the open-boundary LRF recovers the periodic-boundary result. We further show that these DZMs lead to finite-precision numerical instability, since their finite-size singular values decay exponentially with system size and eventually become unresolved in fixed-precision arithmetic. A reliable small-size branch before this loss of precision can be used to estimate the thermodynamic LRF by linear extrapolation. Our results identify DZMs as both a diagnostic of boundary-dependent LRFs and the origin of the associated numerical instability.", "url": "https://arxiv.org/abs/2607.03438", "type": "理论+数值", "summary": "通常预计边界条件只会对体量产生有限尺寸的校正，但这种期望对于动态量子相变可能会失败。在这项工作中，我们证明了这种边界依赖性被编码在洛施密特矩阵的动态零模式（DZM）中，它被定义为奇异向量，其奇异值在热力学极限内消失。以Su-Schrieffer-Heeger (SSH) 和扩展SSH 模型为例，我们发现周期性和开边界条件下Loschmidt 速率函数(LRF) 不同的时间间隔与开边界Loschmidt 矩阵中DZM 的出现一致。这些模式具有与边界相关的贡献：将它们从开放边界 LRF 中删除可以恢复周期性边界结果。我们进一步表明，这些 DZM 会导致有限精度数值不稳定，因为它们的有限大小奇异值随着系统大小呈指数衰减，并最终在固定精度算术中无法解决。在这种精度损失之前，可靠的小尺寸分支可用于通过线性外推来估计热力学 LRF。\n\n我们的结果将 DZM 确定为边界相关 LRF 的诊断以及相关数值不稳定性的根源。", "authors": [{"name": "Siyan Lin"}, {"name": "Xu Feng"}, {"name": "Xiuhua Tian"}, {"name": "Shu Chen"}], "featured_authors": [{"name": "Siyan Lin"}, {"name": "Xu Feng"}, {"name": "Xiuhua Tian"}, {"name": "Shu Chen"}], "author_count": 4}, {"id": "2607.03468", "category": "quant-ph", "title": "Superposed circular motion Unruh effect in (3+1) dimensions", "abstract": "Using a recently-introduced quantum control model for Unruh-DeWitt detectors in superpositions of classical trajectories, we investigate the response of a detector interacting with a massless scalar quantum field in (3+1) dimensions along a superposition of circular trajectories. We present numerical results for the transition probability and effective temperature of such a detector in four distinct geometric scenarios: (a) concentric, vertically-stacked trajectories, (b) planar, horizontally-displaced trajectories, (c) static central point and surrounding circular trajectory, and (d) concentric, planar circular trajectories. For Gaussian switching functions that are much broader than the acceleration timescale, in case (a) we find only minor deviations from the well-known, effectively thermal response of a single circular trajectory, whereas in case (c) we find a significant reduction in the effective temperature and greater variation with energy gap. We conclude with a discussion of a potential analogue implementation in ultracold atom systems.", "url": "https://arxiv.org/abs/2607.03468", "type": "理论+数值", "summary": "使用最近推出的经典轨迹叠加中的 Unruh-DeWitt 探测器的量子控制模型，我们研究了探测器与 (3+1) 维度中的无质量标量量子场沿着圆形轨迹叠加相互作用的响应。我们提出了这种探测器在四种不同几何场景下的跃迁概率和有效温度的数值结果：(a)同心、垂直堆叠轨迹，(b)平面、水平位移轨迹，(c)静态中心点和周围圆形轨迹，以及(d)同心、平面圆形轨迹。对于比加速时间尺度宽得多的高斯切换函数，在情况（a）中，我们发现与众所周知的单个圆形轨迹的有效热响应仅存在微小偏差，而在情况（c）中，我们发现有效温度显着降低，并且随能隙变化更大。最后，我们讨论了超冷原子系统中潜在的模拟实现。", "authors": [{"name": "Taylor Cey"}, {"name": "Cisco Gooding"}, {"name": "Robert Mann"}], "featured_authors": [{"name": "Taylor Cey"}, {"name": "Cisco Gooding"}, {"name": "Robert Mann"}], "author_count": 3}, {"id": "2607.03486", "category": "quant-ph", "title": "Semiclassical Langevin dynamics of long-range dissipative time crystals", "abstract": "We develop a semiclassical Langevin approach to study finite-size effects in dissipative time-crystalline spin systems. For a spin-$1/2$ model with power-law Lindblad operators, we find finite-size oscillations exponentially decaying in time, and their decay rate decreases algebraically with system size in the long-range regime. The scaling exponent of this decay time provides a direct diagnostic of the robustness of the time-crystalline, and we find that this robustness extends beyond the range of power-law dissipation exponents where the system dynamics is mean-field in the thermodynamic limit. We also apply our approach to a spin-one model with local dissipation and long-range Hamiltonian interactions, formulating it in terms of Gell-Mann variables. In this case, finite-size stability is quantified through the deviation time from the mean-field behavior and the behavior of the dominant Fourier peak. We find that both quantities scale as a power law with the system size -- marking thereby a time-crystal behavior -- when the exponent of the power-law interaction is below a certain threshold, that turns out to be in agreement with previous cumulant-expansion findings. Our results show that semiclassical Langevin dynamics provides a useful finite-size probe of dissipative time crystals in regimes beyond exact Lindblad simulations.", "url": "https://arxiv.org/abs/2607.03486", "type": "理论+数值", "summary": "我们开发了一种半经典朗之万方法来研究耗散时间晶体自旋系统中的有限尺寸效应。对于具有幂律 Lindblad 算子的自旋 $1/2$ 模型，我们发现有限尺寸的振荡随时间呈指数衰减，并且它们的衰减率在长程范围内随着系统尺寸的代数减小。该衰减时间的标度指数提供了时间晶体鲁棒性的直接诊断，我们发现这种鲁棒性超出了幂律耗散指数的范围，其中系统动力学是热力学极限的平均场。我们还将我们的方法应用于具有局部耗散和长程哈密顿相互作用的自旋一模型，并根据盖尔曼变量来制定它。在这种情况下，有限尺寸稳定性通过平均场行为和主傅立叶峰行为的偏差时间来量化。我们发现，当幂律相互作用的指数低于某个阈值时，这两个量都随着系统尺寸的幂律而变化，从而标记出时间晶体行为，这与之前的累积量膨胀发现是一致的。\n\n我们的结果表明，半经典朗之万动力学为耗散时间晶体提供了一种有用的有限尺寸探针，其范围超出了精确的 Lindblad 模拟。", "authors": [{"name": "Reyhaneh Khasseh"}, {"name": "Rosario Fazio"}, {"name": "Angelo Russomanno"}], "featured_authors": [{"name": "Reyhaneh Khasseh"}, {"name": "Rosario Fazio"}, {"name": "Angelo Russomanno"}], "author_count": 3}, {"id": "2607.03493", "category": "quant-ph", "title": "Driving collective RPA modes by a time-dependent Dyson map", "abstract": "We study a time-dependent non-Hermitian generalisation of the Schütte-Da~Providência model describing a bosonic mode coupled to collective particle-hole excitations. Using a time-dependent Dyson map, we construct a Hermitian counterpart and reduce the collective fermionic sector by means of the random phase approximation (RPA). The resulting dynamics is mapped to two time-dependent harmonic-oscillator branches with instantaneous RPA frequencies $W_\\pm(t)$. We determine the corresponding stability regions and compute transition probabilities between instantaneous oscillator states. In first-order instantaneous-basis perturbation theory the leading transition $n\\to n+2$ is proportional to $\\dot W_j/W_j$, showing that it is purely nonadiabatic and absent in the time-independent case. We compare this result with exact Lewis-Riesenfeld transition amplitudes within the RPA approximation. Numerical examples show that different components of the Dyson map provide distinct driving mechanisms: the scaling parameter modulates the effective coupling, while the squeezing parameter acts through a moving-boundary contribution. In both cases the induced collective transitions exhibit parametric-resonance peaks and sideband structures.", "url": "https://arxiv.org/abs/2607.03493", "type": "理论+数值", "summary": "我们研究了 Schütte-Da~Providência 模型的时间相关非厄米泛化，该模型描述了与集体粒子空穴激发耦合的玻色子模式。使用与时间相关的戴森图，我们构建了厄米特对应物，并通过随机相位近似（RPA）减少了集体费米子扇区。由此产生的动态被映射到两个与时间相关的谐波振荡器分支，其瞬时 RPA 频率为 $W_\\pm(t)$。我们确定相应的稳定区域并计算瞬时振荡器状态之间的转换概率。在一阶瞬时基微扰理论中，前导跃迁 $n\\to n+2$ 与 $\\dot W_j/W_j$ 成正比，表明它是纯粹非绝热的，并且在与时间无关的情况下不存在。我们将此结果与 RPA 近似内的精确 Lewis-Riesenfeld 跃迁幅度进行比较。数值例子表明，戴森图的不同组成部分提供了不同的驱动机制：缩放参数调节有效耦合，而挤压参数通过移动边界贡献起作用。\n\n在这两种情况下，引发的集体跃迁都表现出参数共振峰和边带结构。", "authors": [{"name": "Andreas Fring"}, {"name": "Marta Reboiro"}], "featured_authors": [{"name": "Andreas Fring"}, {"name": "Marta Reboiro"}], "author_count": 2}, {"id": "2607.03535", "category": "quant-ph", "title": "Thermalization hierarchy from irreducible degrees of freedom", "abstract": "The decomposition of the Hilbert space of a quantum many-body system into the irreducible representations of its bond and commutant algebras yields a finer structure of dynamically isolated subspaces than the mere decomposition into symmetry sectors. While it has been recognized that subspaces associated with low bond-irrep dimensions $D_\\lambda$ tend to violate the eigenstate thermalization hypothesis (ETH), here we show that $D_{\\lambda}$ controls thermalization continuously across the full spectrum of dynamical subspaces. Using SU(2)-symmetric spin-1/2 chains as a paradigmatic example, we demonstrate that $\\mathrm{log} \\ D_{\\lambda}$ quantitatively accounts for the average eigenstate entanglement entropy within each sector, establishing a thermalization hierarchy that interpolates from exact quantum many-body scars at $D_{\\lambda}=1$ to volume-law ergodic states at large $D_{\\lambda}$. To make this concrete, we introduce the notion of irreducible degrees of freedom (IDOF), defined as the number of independently-varying spatial coordinates parametrizing a many-body state within a given bond-algebra sector, which provides a microscopic interpretation of $D_{\\lambda}$ and of the resulting thermalization hierarchy. Finally, we show that by selectively breaking symmetries while preserving chosen bond-algebra sectors, one can embed families of nonthermal eigenstates at prescribed entanglement levels into an otherwise ergodic spectrum, generalizing restricted spectrum-generating algebras from towers of individual states to entire dynamical subspaces.", "url": "https://arxiv.org/abs/2607.03535", "type": "理论", "summary": "将量子多体系统的希尔伯特空间分解为其键代数和交换代数的不可约表示，比仅仅分解为对称扇区产生了更精细的动态隔离子空间结构。虽然人们已经认识到与低键无表示维 $D_\\lambda$ 相关的子空间往往违反本征态热化假说 (ETH)，但在这里我们表明 $D_{\\lambda}$ 在整个动态子空间范围内连续控制热化。使用 SU(2) 对称自旋 1/2 链作为范例，我们证明 $\\mathrm{log} \\ D_{\\lambda}$ 定量地解释了每个扇区内的平均本征态纠缠熵，建立了一个热化层次，该热化层次从 $D_{\\lambda}=1$ 处的精确量子多体疤痕插值到大 $D_{\\lambda}$ 处的体积律遍历态。\n\n为了使这一点具体化，我们引入了不可约自由度（IDOF）的概念，定义为参数化给定键代数扇区内的多体状态的独立变化的空间坐标的数量，它提供了 $D_{\\lambda}$ 和由此产生的热化层次结构的微观解释。最后，我们表明，通过选择性地打破对称性，同时保留选定的键代数扇区，人们可以将规定纠缠水平的非热本征态族嵌入到其他遍历谱中，将受限谱生成代数从单个状态塔推广到整个动态子空间。", "authors": [{"name": "Pedro Fittipaldi de Castro"}, {"name": "Wladimir A. Benalcazar"}], "featured_authors": [{"name": "Pedro Fittipaldi de Castro"}, {"name": "Wladimir A. Benalcazar"}], "author_count": 2}, {"id": "2607.03747", "category": "quant-ph", "title": "The influence of the transverse electric field on accelerating vortex state in the axisymmetric electric field", "abstract": "The relativistic vortex states of massive charged particles propagating in non-uniform axisymmetric electric field are studied. Starting from the stationary-state equation after the relativistic Foldy-Wouthuysen (FW) transformation and employing the paraxial approximation, the coupled evolution equations for the beam width, wavefront curvature, and Gouy phase are derived. The equations are solved numerically for a quadratic electrostatic potential, an immersion lens, and an einzel lens. The essential influence of the transverse field on beam evolution is demonstrated. The results provide a relativistic quantum framework for controlling accelerated vortex particle beams using electrostatic fields.", "url": "https://arxiv.org/abs/2607.03747", "type": "理论+数值", "summary": "研究了非均匀轴对称电场中传播的大质量带电粒子的相对论涡旋态。从相对论Foldy-Wouthuysen (FW)变换后的稳态方程出发，采用近轴近似，推导了光束宽度、波前曲率和Gouy相位的耦合演化方程。针对二次静电势、浸没透镜和单透镜对方程进行数值求解。证明了横向场对光束演化的重要影响。结果提供了使用静电场控制加速涡旋粒子束的相对论量子框架。", "authors": [{"name": "Ziyang Ding"}, {"name": "Ziqiang Huang"}, {"name": "Qi Meng"}, {"name": "Alexander J. Silenko"}, {"name": "Pengming Zhang"}, {"name": "Liping Zou"}], "featured_authors": [{"name": "Ziyang Ding"}, {"name": "Ziqiang Huang"}, {"name": "Qi Meng"}, {"name": "Alexander J. Silenko"}, {"name": "Pengming Zhang"}, {"name": "Liping Zou"}], "author_count": 6}, {"id": "2607.03757", "category": "quant-ph", "title": "Entanglement-Assisted Timing Optimization for Discriminating Amplitude-Damping Dynamics", "abstract": "We analyze minimum-error discrimination of two qubit dynamical processes generated by phase-covariant amplitude-damping Lindbladians in a single-use scenario. The optimization involves both the input probe, possibly entangled with an isolated ancilla, and the interrogation time. For unassisted probes we obtain a closed expression for the optimal trace-norm distinguishability at fixed time, with distinct interior and boundary branches. For entanglement-assisted probes, the common phase covariance of the two channels reduces the diamond-norm optimization to a one-parameter Schmidt family. The resulting formula gives transparent sufficient conditions for fixed-time entanglement advantage and separates this local advantage from advantage after global optimization over time. We exhibit examples in which the best unassisted strategy is approached only asymptotically, whereas an entangled probe achieves a strictly smaller error probability at finite time.", "url": "https://arxiv.org/abs/2607.03757", "type": "理论+数值", "summary": "我们分析了在一次性场景中由相位协变振幅阻尼 Lindbladians 生成的两个量子位动态过程的最小误差辨别。优化涉及输入探针（可能与孤立的辅助设备纠缠在一起）和询问时间。对于无辅助探针，我们获得了固定时间最佳迹范数可区分性的闭合表达式，具有不同的内部和边界分支。对于纠缠辅助探针，两个通道的共同相位协方差将钻石范数优化简化为单参数施密特族。由此产生的公式为固定时间纠缠优势提供了透明的充分条件，并将这种局部优势与随着时间的推移进行全局优化后的优势分开。我们展示了一些例子，其中最好的无辅助策略仅渐进地接近，而纠缠探针在有限时间内实现了严格较小的错误概率。", "authors": [{"name": "Massimiliano F. Sacchi"}, {"name": "Milajiguli Rexiti"}, {"name": "Stefano Mancini"}], "featured_authors": [{"name": "Massimiliano F. Sacchi"}, {"name": "Milajiguli Rexiti"}, {"name": "Stefano Mancini"}], "author_count": 3}, {"id": "2607.03779", "category": "quant-ph", "title": "Gorini-Kossakowski-Sudarshan-Lindblad equation in different bases: application to driven-dissipative two- and multilevel systems", "abstract": "An open quantum system can be described by a master equation, of which one of the most popular is the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) equation. We revisit description of driven-dissipative quantum systems focusing on the appropriate choice of the system's basis and the respective transformations. We consider the GKSL equation in different bases and calculate the dynamics for a qubit and for a qudit. An appropriate choice of the basis is a fundamental problem for theoretical consideration of open quantum systems and provides an opportunity to obtain the desired evolution in practice.", "url": "https://arxiv.org/abs/2607.03779", "type": "理论", "summary": "开放量子系统可以通过主方程来描述，其中最流行的方程之一是 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 方程。我们重新审视驱动耗散量子系统的描述，重点关注系统基础和相应变换的适当选择。我们考虑不同基础上的 GKSL 方程，并计算量子位和 qudit 的动力学。适当选择基础是开放量子系统理论考虑的一个基本问题，并提供了在实践中获得所需演化的机会。", "authors": [{"name": "O. A. Ilinskaya"}, {"name": "O. V. Ivakhnenko"}, {"name": "A. I. Ryzhov"}, {"name": "O. Yu. Kitsenko"}, {"name": "S. N. Shevchenko"}], "featured_authors": [{"name": "O. A. Ilinskaya"}, {"name": "O. V. Ivakhnenko"}, {"name": "A. I. Ryzhov"}, {"name": "O. Yu. Kitsenko"}, {"name": "S. N. Shevchenko"}], "author_count": 5}, {"id": "2607.03786", "category": "quant-ph", "title": "Perturbed quantum billiards on the hyperbolic plane", "abstract": "We study the emergence of generic quantum chaos from an arithmetic billiard in the hyperbolic plane. Starting from an arithmetic triangle, we introduce small area-preserving geometric perturbations and compute long consecutive sequences of eigenvalues and eigenstates. The spectral statistics show a perturbation-dependent crossover from Poisson-like arithmetic behaviour to the Gaussian orthogonal ensemble (GOE), with the crossover scale moving to higher wavenumbers as the perturbation decreases. To characterize the nearest-neighbour spacing distribution, we compare the data with Brody and generalized-gamma fits. The generalized-gamma form is used only as a two-parameter diagnostic, allowing the small- and intermediate-spacing structure to vary independently from the large-spacing tail, rather than as a universal crossover law. For the weakest perturbation, we also compare the data with an effective block-GOE model, which diagnoses residual block-like structure deep into the computed spectral range. We complement the spectral analysis with Poincaré-Husimi representations of the eigenstates and quantify phase-space localization using an entropy-based measure. Its distribution is well described by Beta distributions whose width decays as a power law in the wavenumber. Before the spectral crossover, the localization statistics retain memory of the near-arithmetic regime. After the GOE regime is reached, the localization-fluctuation widths collapse onto a common decay law, sigma(Beta) ~ k^{-eta}, with eta approximately 0.37--0.38. These results provide a combined spectral and eigenfunction-level picture of the arithmetic-to-GOE crossover in hyperbolic quantum billiards.", "url": "https://arxiv.org/abs/2607.03786", "type": "理论+数值", "summary": "我们研究双曲平面算术台球中通用量子混沌的出现。从算术三角形开始，我们引入小面积保留几何扰动并计算特征值和特征态的长连续序列。光谱统计显示从类泊松算术行为到高斯正交系综 (GOE) 的扰动相关交叉，随着扰动的减少，交叉尺度移动到更高的波数。为了表征最近邻间距分布，我们将数据与布罗迪和广义伽玛拟合进行比较。广义伽马形式仅用作二参数诊断，允许小间距和中间距结构独立于大间距尾部变化，而不是用作通用交叉定律。对于最弱的扰动，我们还将数据与有效的块 GOE 模型进行比较，该模型可以诊断计算光谱范围深处的残留块状结构。我们用本征态的庞加莱-胡西米表示来补充谱分析，并使用基于熵的测量来量化相空间局部化。\n\n它的分布可以用 Beta 分布很好地描述，其宽度按照波数的幂律衰减。在光谱交叉之前，定位统计保留了近算术状态的记忆。达到 GOE 状态后，局域涨落宽度崩溃到常见的衰减定律 sigma(Beta) ~ k^{-eta}，eta 约为 0.37--0.38。这些结果提供了双曲量子台球中算术到 GOE 交叉的组合光谱和特征函数级图像。", "authors": [{"name": "Matic Orel"}], "featured_authors": [{"name": "Matic Orel"}], "author_count": 1}, {"id": "2607.03905", "category": "quant-ph", "title": "On estimating operator norm distance, with optimal trace distance estimation when one state is pure", "abstract": "We investigate the computational complexity of estimating the operator norm distance ${\\rm T}_{\\infty}(\\rho_0,\\rho_1)$, defined via the operator norm $\\|A\\|_{\\infty} = \\sigma_{\\max}(A)$, given ${\\rm poly}(n)$-size state-preparation circuits of $n$-qubit quantum states $\\rho_0$ and $\\rho_1$. We provide efficient quantum estimators for the operator norm distance whose complexity is independent of the rank (and thus the dimension) of the states: 1. When one state is pure, we establish an optimal quantum estimator using $\\Theta(1/\\epsilon)$ queries to the state-preparation circuits. Consequently, for constant additive error, say $\\epsilon=1/5$, our estimator runs in ${\\rm poly}(n)$ time. Since the operator norm distance ${\\rm T}_{\\infty}(|\\psi\\rangle\\!\\langle\\psi|,\\rho)$ is exactly half of the trace distance ${\\rm T}(|\\psi\\rangle\\!\\langle\\psi|,\\rho)$, our result also gives rank-independent query complexity for estimating both quantities, whereas the approaches due to van Apeldoorn, Cornelissen, Gily{é}n, and Nannicini (SODA 2023) and Wang and Zhang (TIT 2024) have query complexity scaling at least linearly with ${\\rm rank}(\\rho)$, which can be $\\exp(n)$ in general. 2. For general quantum states, we also provide a quantum estimator using $\\widetilde{O}(1/\\epsilon^{3/2})$ queries to the state-preparation circuits, which shows that the corresponding promise problem is ${\\sf BQP}$-complete and improves the ${\\sf QMA}$ upper bound sketched by Liu and Wang (ESA 2025). Together with an $\\Omega(1/\\epsilon)$ quantum query complexity lower bound, this leaves only square-root room for improvement. The key intuition behind our estimators is that, when one state is pure, the pure state $|\\psi\\rangle$ has overlap at least $1/2$ with the top unit eigenvector of $|\\psi\\rangle\\!\\langle\\psi|-\\rho$, reflecting a structural feature specific to the operator norm distance.", "url": "https://arxiv.org/abs/2607.03905", "type": "理论", "summary": "我们研究估计算子范数距离 ${\\rm T}_{\\infty}(\\rho_0,\\rho_1)$ 的计算复杂性，通过算子范数 $\\|A\\|_{\\infty} = \\sigma_{\\max}(A)$ 定义，给定 ${\\rm poly}(n)$ 大小的 $n$ 量子位量子态 $\\rho_0$ 的状态准备电路，以及$\\rho_1$。我们为算子范数距离提供高效的量子估计器，其复杂性与状态的等级（以及维数）无关： 1. 当一个状态是纯状态时，我们使用对状态准备电路的 $\\Theta(1/\\epsilon)$ 查询建立一个最佳量子估计器。因此，对于恒定的加性误差，例如 $\\epsilon=1/5$，我们的估计器运行 ${\\rm poly}(n)$ 时间。由于算子范数距离 ${\\rm T}_{\\infty}(|\\psi\\rangle\\!\\langle\\psi|,\\rho)$ 恰好是迹线距离 ${\\rm T}(|\\psi\\rangle\\!\\langle\\psi|,\\rho)$ 的一半，我们的结果还给出了估计这两个量的与排名无关的查询复杂度，而 van Apeldoorn、Cornelissen、Gily{é}n 和Nannicini (SODA 2023) 以及 Wang 和Zhang (TIT 2024) 的查询复杂度至少与 ${\\rmrank}(\\rho)$ 成线性比例，通常可以是 $\\exp(n)$。 2.\n\n对于一般量子态，我们还提供了一个量子估计器，使用 $\\widetilde{O}(1/\\epsilon^{3/2})$ 查询状态准备电路，这表明相应的承诺问题是 ${\\sf BQP}$ 完成的，并改进了 Liu 和 Wang 所描绘的 ${\\sf QMA}$ 上限（ESA 2025）。与 $\\Omega(1/\\epsilon)$ 量子查询复杂度下限一起，只剩下平方根的改进空间。我们估计器背后的关键直觉是，当一个状态是纯状态时，纯状态 $|\\psi\\rangle$ 与 $|\\psi\\rangle\\!\\langle\\psi|-\\rho$ 的顶部单位特征向量至少有 $1/2$ 重叠，反映了特定于算子范数距离的结构特征。", "authors": [{"name": "Yupan Liu"}, {"name": "Qisheng Wang"}, {"name": "Zhan Yu"}], "featured_authors": [{"name": "Yupan Liu"}, {"name": "Qisheng Wang"}, {"name": "Zhan Yu"}], "author_count": 3}, {"id": "2607.03909", "category": "quant-ph", "title": "Algebra of quantum mechanics \\textit{via} classical phonons. II: Klein-Gordon dynamics, the Heisenberg formalism, the Dirac canonical commutation rule and the Poincaré algebra through the continuous Poisson bracket formalism", "abstract": "In the first part of this series we have shown how the Schrodinger equation for a single particle and the corresponding non relativistic quantum observables can be obtained from a purely classical phonon model through the Newtonian equations of motion. In this work we focus instead on how the classical Hamiltonian formalism applied to the same phonon system allows to recover the feature of relativistic quantum mechanics for a single spinless particle. Using the classical nature of the phonon model, we naturally define continuous Poisson brackets between classical observables, which allows to recover the dynamics of such observables, i.e. the Ehrenfest relations associated to real-valued Klein-Gordon fields. The Poisson brackets also permits to obtain the generic form of constants of motions, thus generalizing the concept of inner products and momentum on Klein-Gordon fields. We then connect the formalism of real-valued classical functionals with that of hermitian operators and complex-valued wave functions. This is done through the introduction of a non-local complex-valued change of variables which allows to rewrite the real-valued Klein-Gordon equation in a form akin to the Schrodinger equation, and the classical observables as quantum expectation values. Then, we show how this change of variables allows to rewrite the classical Poisson brackets as commutators of hermitian operators. This points out the strict equivalence between the Heisenberg formalism and the formalism of classical Poisson bracket. Eventually, we illustrate how the Poisson brackets allows to recover the transformations of Poincaré group in 1+1 dimension together with its algebra. The latter makes the link between the Lorentz invariant inner product of Mostafazadeh and the Casimir invariant associated to the mass of particle.", "url": "https://arxiv.org/abs/2607.03909", "type": "理论", "summary": "在本系列的第一部分中，我们展示了如何通过牛顿运动方程从纯经典声子模型获得单个粒子的薛定谔方程和相应的非相对论量子可观测量。在这项工作中，我们重点关注经典哈密顿形式主义如何应用于同一声子系统，从而恢复单个无自旋粒子的相对论量子力学特征。利用声子模型的经典性质，我们自然地在经典可观测量之间定义连续的泊松括号，这允许恢复此类可观测量的动态，即与实值克莱因-戈登场相关的埃伦菲斯特关系。泊松括号还允许获得运动常数的通用形式，从而概括了克莱因-戈登场上的内积和动量的概念。然后，我们将实值经典泛函的形式与厄米算子和复值波函数的形式联系起来。\n\n这是通过引入变量的非局部复值变化来完成的，该变量允许以类似于薛定谔方程的形式重写实值克莱因-戈登方程，并将经典可观测量重写为量子期望值。然后，我们展示变量的这种变化如何允许将经典的泊松括号重写为厄米算子的交换子。这指出了海森堡形式主义与经典泊松括号形式主义之间的严格等价性。最后，我们说明泊松括号如何恢复 1+1 维庞加莱群及其代数的变换。后者将 Mostafazadeh 的洛伦兹不变量内积和与粒子质量相关的卡西米尔不变量联系起来。", "authors": [{"name": "Emmanuel Giner"}], "featured_authors": [{"name": "Emmanuel Giner"}], "author_count": 1}, {"id": "2607.03939", "category": "quant-ph", "title": "Disentangling Haldane Phase by Generalized Clifford Circuits", "abstract": "Disentangling transformations play a central role in the classical simulation of quantum many-body systems, yet their analytic structure and underlying mechanism remain largely unexplored. Here, we study the structure of the disentangler in the Haldane phase of spin-1 systems using generalized Clifford circuits. To this end, we extend the Clifford-circuit-augmented matrix product states (CAMPS)-based density-matrix renormalization group (DMRG) method to spin-1 systems. Within this framework, we find that the local disentanglers optimized for the Haldane phase implement the generalized Kramers--Wannier (KW) transformation, and we analytically verify its optimality for the Affleck--Kennedy--Lieb--Tasaki (AKLT) state. Beyond reducing entanglement, the KW transformation maps the Haldane phase to a phase with spontaneously broken $\\mathbb{Z}_{2}$ symmetry. This mapping is distinct from the Kennedy--Tasaki transformation and provides a new unitary route from symmetry-protected topological order to symmetry breaking.", "url": "https://arxiv.org/abs/2607.03939", "type": "理论+数值", "summary": "解缠结变换在量子多体系统的经典模拟中发挥着核心作用，但它们的分析结构和潜在机制在很大程度上仍未被探索。在这里，我们使用广义 Clifford 电路研究 spin-1 系统 Haldane 相中解缠结器的结构。为此，我们将基于 Clifford 电路增强矩阵乘积态 (CAMPS) 的密度矩阵重整化群 (DMRG) 方法扩展到 spin-1 系统。在此框架内，我们发现针对 Haldane 相优化的局部解缠器实现了广义 Kramers-Wannier (KW) 变换，并分析验证了其对于 Affleck--Kennedy--Lieb--Tasaki (AKLT) 态的最优性。除了减少纠缠之外，KW 变换还将 Haldane 相映射到具有自发破缺 $\\mathbb{Z}_{2}$ 对称性的相。这种映射与肯尼迪-塔萨基变换不同，并提供了从对称保护拓扑顺序到对称破缺的新酉路线。", "authors": [{"name": "Minsoo Kim"}, {"name": "Changhun Oh"}, {"name": "Donghoon Kim"}], "featured_authors": [{"name": "Minsoo Kim"}, {"name": "Changhun Oh"}, {"name": "Donghoon Kim"}], "author_count": 3}, {"id": "2607.03950", "category": "quant-ph", "title": "Orthogonality Edges in Strong-Coupling Quantum Work Statistics", "abstract": "Strong coupling to a reservoir can do more than shift, broaden, or dress the work peaks of a driven quantum system. When the reservoir is infrared singular, a sudden change of a local control parameter can alter the boundary condition seen by infinitely many low-energy modes, converting a quasiparticle-like threshold line into a many-body edge. We demonstrate this mechanism for the inclusive work distribution of the biased spin-boson model under a sudden bias inversion. In the independent-boson limit, the problem is exactly solvable and gives a sharp infrared classification: a super-Ohmic bath can retain a finite elastic threshold weight, whereas Ohmic and sub-Ohmic baths extinguish the elastic line through boundary orthogonality. At the Ohmic fixed point, the same exponent controls both the vanishing elastic residue and the low-work continuum. We then ask how this edge is resolved away from the static-boundary limit. Using displaced-basis exact diagonalization of logarithmically discretized baths, we find that finite tunnelling leaves an edge-like continuum over the accessible energy window, while separating two operational diagnostics of the threshold: the cumulative-continuum exponent extracted from $z$-interleaved spectra lies above the elastic-overlap exponent extracted from $z$-averaged overlaps, $\\theta_C>\\theta_Z$. We interpret this separation as a finite-energy crossover away from the static-boundary fixed point, not as evidence for a new asymptotic fixed point. The separation survives fitting-window variation, oscillator-cutoff checks, spectrum-size checks, and leave-one-$z$-out tests, while time-domain characteristic functions provide a compatible but non-decisive diagnostic. Finally, the same threshold edge controls the sampling cost of Jarzynski-type exponential averages, making rare low-work events increasingly important at low temperature.", "url": "https://arxiv.org/abs/2607.03950", "type": "理论+数值", "summary": "与储层的强耦合不仅仅可以移动、展宽或修饰驱动量子系统的工作峰。当储层是红外奇异时，局部控制参数的突然变化可以改变无限多个低能模式所看到的边界条件，将类准粒子阈值线转换为多体边缘。我们展示了这种机制，用于在突然的偏置反转下偏置自旋玻色子模型的包容性功分布。在独立玻色子极限下，该问题是完全可解的，并给出了清晰的红外分类：超欧姆浴可以保留有限的弹性阈值重量，而欧姆和亚欧姆浴通过边界正交性消除弹性线。在欧姆固定点，相同的指数控制消失的弹性剩余和低功连续体。然后我们问如何解决这条边远离静态边界限制。\n\n使用对数离散浴的位移基精确对角化，我们发现有限隧道效应在可访问的能量窗口上留下了边缘状连续体，同时分离了阈值的两个操作诊断：从 $z$ 交错光谱中提取的累积连续体指数位于从 $z$ 平均重叠 $\\theta_C>\\theta_Z$ 中提取的弹性重叠指数之上。我们将这种分离解释为远离静态边界不动点的有限能量交叉，而不是作为新渐近不动点的证据。这种分离能够经受住拟合窗口变化、振荡器截止检查、频谱大小检查和留一$z$测试，而时域特征函数提供兼容但非决定性的诊断。最后，相同的阈值边缘控制 Jarzynski 型指数平均值的采样成本，使得罕见的低工作事件在低温下变得越来越重要。", "authors": [{"name": "Atta ur Rahman"}, {"name": "Muhammad Noman"}, {"name": "S. M. Zangi"}, {"name": "Saeed Haddadi"}], "featured_authors": [{"name": "Atta ur Rahman"}, {"name": "Muhammad Noman"}, {"name": "S. M. Zangi"}, {"name": "Saeed Haddadi"}], "author_count": 4}, {"id": "2607.04015", "category": "quant-ph", "title": "The Delayed Stabilizer ZX-Calculus", "abstract": "Many stabilizer quantum error-correcting codes are built from a finite pattern repeated across space or time, such as lattice codes, translation-invariant graph states, and quantum convolutional codes. Ordinary stabilizer ZX-diagrams capture only finite truncations of such systems, obscuring the repeated structure that defines them. We introduce the delayed stabilizer ZX-calculus, a finite graphical language for these infinite, translation-invariant processes. It extends the odd-prime-dimensional stabilizer ZX-calculus with a single new generator, the delay, which feeds data from one time step to the next. We equip the calculus with two semantics. In the first semantics, we interpret the behaviour of a delayed ZX-diagram as an equivalence class of sequences of quantum channels; where two sequences are identified if they have the same information content. We show that the behaviour of a delayed ZX-diagram uniquely determines an infinite stabilizer group. In the second semantics, we interpret the delay as a formal variable, encoding the translation-invariant families of Pauli operators as generating functions. This allows us to represent a delayed ZX-diagram in terms of a tableau of generating functions, from which the infinite stabilizer group can be recovered. Finally, we give a complete axiomatization of the delayed stabilizer ZX-calculus, featuring generalised Euler decomposition and colour change rules. Using generalised forms of local complementation and pivoting, we reduce every diagram to a unique normal form. This establishes soundness, universality, and completeness for the generating tableau semantics.", "url": "https://arxiv.org/abs/2607.04015", "type": "理论", "summary": "许多稳定器量子纠错码是根据跨空间或时间重复的有限模式构建的，例如晶格码、平移不变图状态和量子卷积码。普通稳定器 ZX 图仅捕获此类系统的有限截断，从而模糊了定义它们的重复结构。我们引入延迟稳定器 ZX 微积分，这是一种用于这些无限、平移不变过程的有限图形语言。它使用一个新的生成器（即延迟）扩展了奇素数维稳定器 ZX 微积分，该生成器将数据从一个时间步馈送到下一时间步。我们为微积分配备了两种语义。在第一个语义中，我们将延迟 ZX 图的行为解释为量子通道序列的等价类；如果两个序列具有相同的信息内容，则它们被识别。我们证明延迟 ZX 图的行为唯一地决定了无限稳定剂组。在第二个语义中，我们将延迟解释为形式变量，将泡利算子的平移不变族编码为生成函数。\n\n这使我们能够用生成函数表来表示延迟的 ZX 图，从中可以恢复无限稳定器组。最后，我们给出了延迟稳定器 ZX 演算的完整公理化，具有广义欧拉分解和颜色变化规则。使用局部互补和旋转的广义形式，我们将每个图简化为唯一的范式。这为生成的画面语义建立了健全性、普遍性和完整性。", "authors": [{"name": "Cole Comfort"}, {"name": "Giovanni de Felice"}], "featured_authors": [{"name": "Cole Comfort"}, {"name": "Giovanni de Felice"}], "author_count": 2}, {"id": "2607.04052", "category": "quant-ph", "title": "A Lie-Jordan Geometric Formulation of Lindblad Dynamics", "abstract": "We develop a Lie-Jordan geometric formulation of finite-dimensional open quantum dynamics, building on the algebraic framework introduced in our previous work ( arXiv:2606.26477 ). The Hilbert-Schmidt operator space is endowed with an orthonormal Hermitian basis, in which the commutator and anticommutator are encoded by the structure tensors \\(C_{\\mu\\nu}{}^\\lambda\\) and \\(B_{\\mu\\nu}{}^\\lambda\\). Within this formulation, the von Neumann and Gorini-Kossakowski-Lindblad-Sudarshan equations admit a direct component representation. Our central result is the identification of a basis-independent universal trilinear dissipative map, \\( \\mathcal D(X,Y)Z=XZY-\\frac12\\{YX,Z\\}, \\) whose components define a universal operator-space tensor depending only on the Lie-Jordan structure tensors. The physical dissipator is obtained by contracting this tensor with the expansion coefficients of the Lindblad operators and the Kossakowski matrix, thereby separating the universal algebraic structure from the model-dependent physical information. We further show that the combinations \\((B+C)\\) and \\((B-C)\\) generate internal left and right transports, allowing the elementary dissipative map to be expressed as a left-right bimodule action corrected by an ordered Jordan contribution. The universal map satisfies basis-independent trace and Hermitian-conjugation identities, from which trace preservation, Hermiticity preservation of the complete dissipator, and the reality of its component representation in a Hermitian Hilbert-Schmidt basis follow. We also derive its Hilbert-Schmidt adjoint and illustrate the formalism for a qubit with pure dephasing and amplitude-damping channels. This construction provides a tensorial and affine-geometric interpretation of the universal superoperator structure derived in arXiv:2606.26477 while keeping the algebraic and model-dependent sectors explicitly separated.", "url": "https://arxiv.org/abs/2607.04052", "type": "理论", "summary": "我们基于我们之前的工作 (arXiv:2606.26477) 中介绍的代数框架，开发了有限维开放量子动力学的 Lie-Jordan 几何公式。 Hilbert-Schmidt 算子空间具有正交厄米特基，其中交换子和反交换子由结构张量 \\(C_{\\mu\\nu}{}^\\lambda\\) 和 \\(B_{\\mu\\nu}{}^\\lambda\\) 编码。在这个公式中，冯·诺依曼和 Gorini-Kossakowski-Lindblad-Sudarshan 方程允许直接分量表示。我们的中心结果是识别一个与基无关的通用三线性耗散映射， \\( \\mathcal D(X,Y)Z=XZY-\\frac12\\{YX,Z\\}, \\) 其组件定义了一个仅依赖于 Lie-Jordan 结构张量的通用算子空间张量。通过将该张量与 Lindblad 算子的展开系数和 Kossakowski 矩阵收缩来获得物理耗散器，从而将通用代数结构与模型相关的物理信息分开。\n\n我们进一步表明，组合 \\((B+C)\\) 和 \\((B-C)\\) 生成内部左右传输，允许基本耗散图表示为由有序 Jordan 贡献校正的左右双模作用。通用映射满足基无关迹和厄米共轭恒等式，由此得出迹保留、完全耗散器的厄米性保留及其在厄米希尔伯特-施密特基中的分量表示的现实性。我们还推导了它的希尔伯特-施密特伴随，并说明了具有纯相移和振幅阻尼通道的量子位的形式。这种结构提供了对 arXiv:2606.26477 中导出的通用超级算子结构的张量和仿射几何解释，同时保持代数和模型相关部分明确分离。", "authors": [{"name": "Leonel Bixano"}, {"name": "Victor Alberto Cruz-Barriguete"}, {"name": "Guillermo López-Alvarez"}, {"name": "V. G. Ibarra-Sierra"}, {"name": "José Luis Cardoso"}, {"name": "Alejandro Kunold"}], "featured_authors": [{"name": "Leonel Bixano"}, {"name": "Victor Alberto Cruz-Barriguete"}, {"name": "Guillermo López-Alvarez"}, {"name": "V. G. Ibarra-Sierra"}, {"name": "José Luis Cardoso"}, {"name": "Alejandro Kunold"}], "author_count": 6}, {"id": "2607.04054", "category": "quant-ph", "title": "Frozen-Tree Sampling Refutes Quantum Advantage of Random Circuit Sampling", "abstract": "Random circuit sampling of bitstrings from a Haar-random quantum state is widely believed to be classically intractable, and has therefore been implemented as a primary benchmark for demonstrating quantum advantage. Here, we challenge this premise by proposing an efficient classical frozen-tree sampling algorithm that exploits the conditional scale invariance of Haar-random quantum states [Oh, arXiv:2602.19448 ]. The frozen-tree sampler draws bitstrings of $n$ qubits in $O(n)$ time per sample. Moreover, its output probability $p_F(x)$ is statistically identical to the probability $p_C(x)$ of a random quantum circuit, since both are independent instances of the same Dirichlet distribution. Consequently, no statistical test acting on samples alone can distinguish the classical frozen-tree sampler from a quantum random circuit. The claimed quantum advantage of random circuit sampling therefore does not withstand scrutiny: its hardness lies not in sampling from the Dirichlet distribution, which is classically efficient, but in identifying a specific circuit realization.", "url": "https://arxiv.org/abs/2607.04054", "type": "理论+数值", "summary": "人们普遍认为，从哈尔随机量子态中对比特串进行随机电路采样在传统上是难以处理的，因此已被用作展示量子优势的主要基准。在这里，我们通过提出一种有效的经典冻结树采样算法来挑战这个前提，该算法利用哈尔随机量子态的条件尺度不变性[Oh，arXiv：2602.19448]。冻结树采样器在每个样本的 $O(n)$ 时间内绘制 $n$ 个量子位的位串。此外，其输出概率 $p_F(x)$ 在统计上与随机量子电路的概率 $p_C(x)$ 相同，因为两者都是同一狄利克雷分布的独立实例。因此，仅对样本进行统计测试无法区分经典的冻结树采样器和量子随机电路。因此，所声称的随机电路采样的量子优势经不起审查：它的困难不在于从狄利克雷分布中采样（这在经典上是有效的），而在于识别特定的电路实现。", "authors": [{"name": "Sangchul Oh"}], "featured_authors": [{"name": "Sangchul Oh"}], "author_count": 1}, {"id": "2607.04279", "category": "quant-ph", "title": "Weak ergodicity breaking without nonthermal eigenstates", "abstract": "The typical mechanisms of ergodicity breaking in isolated interacting quantum systems, such as many-body localization and quantum many-body scars, originate from the nonthermal nature of the underlying eigenstates. Here, in the absence of nonthermal eigenstates, we identify a mechanism for collective revivals of multiparticle Wannier states (MWSs) associated with nearly linear bands in a spatially modulated Bose-Hubbard lattice. The MWSs, as superpositions of multiparticle Bloch states within individual energy bands, give rise to band-resolved Wannier-sector fragmentation. The key idea is that spatially periodic modulation folds and separates energy bands of a simple lattice into several sub-bands, among which nearly linear sub-bands inherit the linear segments of the original bands. Although multiparticle Bloch states satisfy the eigenstate thermalization hypothesis (ETH), the MWSs in the nearly linear band still exhibit long-lived collective revivals, due to emergent equally spaced energy levels. Our work provides a route to weak ergodicity breaking in which long-lived revivals arise from spectral phase coherence among ETH-satisfying eigenstates rather than from scar-like nonthermal eigenstates.", "url": "https://arxiv.org/abs/2607.04279", "type": "理论+数值", "summary": "孤立相互作用的量子系统中遍历性破坏的典型机制，例如多体局域化和量子多体疤痕，源于底层本征态的非热性质。在这里，在不存在非热本征态的情况下，我们确定了一种多粒子万尼尔态（MWS）集体复兴的机制，该机制与空间调制的玻色-哈伯德晶格中的近线性能带相关。 MWS 作为单个能带内多粒子布洛赫态的叠加，会产生能带分辨的万尼尔扇区碎片。其关键思想是空间周期性调制将简单晶格的能带折叠并分离成多个子带，其中近线性子带继承了原始能带的线性段。尽管多粒子布洛赫态满足本征态热化假说 (ETH)，但由于出现的等距能级，近线性带中的 MWS 仍然表现出长期的集体复兴。\n\n我们的工作提供了一条弱遍历性破坏的途径，其中长寿命的复兴来自于 ETH 满足本征态之间的光谱相位相干性，而不是来自疤痕状非热本征态。", "authors": [{"name": "Boning Huang"}, {"name": "Yongguan Ke"}, {"name": "Li Zhang"}, {"name": "Lin Ling"}, {"name": "Chaohong Lee"}], "featured_authors": [{"name": "Boning Huang"}, {"name": "Yongguan Ke"}, {"name": "Li Zhang"}, {"name": "Lin Ling"}, {"name": "Chaohong Lee"}], "author_count": 5}, {"id": "2607.04289", "category": "quant-ph", "title": "Chromatic Completeness and the Independence of Geometric Obstruction", "abstract": "We establish a strict logical separation between two distinct phenomena in orthogonality hypergraphs: chromatic completeness, the possibility of assigning a single globally consistent nondegenerate spectrum to all contexts, and geometric coordinatizability, the existence of a faithful orthogonal representation by rays. A strong chromatic number larger than the Hilbert-space dimension obstructs only the former. It does not, by itself, obstruct the existence of a faithful orthogonal representation. We make this separation explicit by comparing two three-dimensional examples with the same strong chromatic number. A completed 25-ray version of the Yu-Oh configuration has strong chromatic number four and nevertheless possesses an explicit faithful orthogonal representation in R^3. Conversely, Greechie's G_{32} hypergraph also has strong chromatic number four, and has a separating and unital set of two-valued states, but we give an ele
