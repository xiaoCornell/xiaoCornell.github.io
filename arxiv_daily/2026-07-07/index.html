提议作为各种环境中黑洞的替代品，包括广义相对论的扩展和涉及标准模型之外的物质部门的场景。它们在物质引力塌缩中的形成需要在相应黑洞的史瓦西半径数量级的长度尺度上发生量子力学隧道效应。我们提出了一种基于量子混沌动力学催化的多通道增强的机制，可以显着放大穿过隧道势垒的量子力学传输。我们特别探索了如何通过这种机制增强弦理论黑壳的成核。我们预计其他拟议的黑洞模仿者也会得到类似的结果。", "authors": [{"name": "Ulf Danielsson"}, {"name": "Suvendu Giri"}, {"name": "Vyshnav Mohan"}, {"name": "Larus Thorlacius"}], "featured_authors": [{"name": "Ulf Danielsson"}, {"name": "Suvendu Giri"}, {"name": "Vyshnav Mohan"}, {"name": "Larus Thorlacius"}], "author_count": 4}, {"id": "2607.03526", "category": "hep-th", "title": "Entanglement and geometric transitions in topological string theory", "abstract": "How do we define a bulk subsystem in quantum gravity? In \\cite{Wong:2025kpz}, we argued that such a subsystem must support local holographic degrees of freedom. These are gravitational edge modes, whose entanglement creates a backreaction that fuses together subregions of spacetime. In this work we give a realization of these ideas in topological string theory, building upon \\cite{Donnelly:2020teo,Jiang:2020cqo}. In this theory, a subsystem for closed strings consists of open strings ending on entanglement branes, which play the role of a dynamical entangling surface. Local holography is implemented by the geometric transition of these branes. We define a subregion open string algebra and develop a diagrammatics for open string modular flow for arbitrary states and subregion. We check that the entanglement entropy of these open strings reproduces the gravitational entropy of the associated closed string background. Finally, we relate these local transitions to defect holography.", "url": "https://arxiv.org/abs/2607.03526", "type": "理论", "summary": "我们如何定义量子引力中的体子系统？在 \\cite{Wong:2025kpz} 中，我们认为这样的子系统必须支持局部全息自由度。这些是引力边缘模式，其纠缠会产生将时空子区域融合在一起的反向反应。在这项工作中，我们以 \\cite{Donnelly:2020teo,Jiang:2020cqo} 为基础，在拓扑弦理论中实现了这些想法。在这个理论中，闭合弦的子系统由末端为纠缠膜的开放弦组成，纠缠膜起到动态纠缠表面的作用。局部全息术是通过这些膜的几何过渡来实现的。我们定义了一个子区域开弦代数，并开发了任意状态和子区域的开弦模流的图表。我们检查这些开弦的纠缠熵是否再现了相关闭弦背景的引力熵。最后，我们将这些局部转变与缺陷全息术联系起来。", "authors": [{"name": "Gabriel Wong"}], "featured_authors": [{"name": "Gabriel Wong"}], "author_count": 1}, {"id": "2607.03605", "category": "hep-th", "title": "Minimal Proper Time and Deterministic Microstates: Emergent Quantum Fields and Relativistic Spacetime", "abstract": "We develop a top-down counterpart of the minimal proper-time formulation of quantum field theory previously introduced as an effective bottom-up framework. Starting from a deterministic pre-geometric substrate of causally ordered events, we show how coarse-graining over microscopic histories leads, at low energies, to an effective Nambu-like quantum dynamics. The elementary deterministic update is identified with the minimal proper-time step, while the growth of coarse-grained equivalence classes controls both the ultraviolet dissipative correction and the scale dependence of the effective quantization strength, encoded in a running Planck constant. In this way, the proper-time cutoff kernel of the bottom-up formulation acquires a microscopic interpretation as the inverse growth of unresolved deterministic histories. In the infrared limit, the dissipative term vanishes and standard unitary quantum field theory is recovered. The same coarse-grained structure also provides a natural setting for an emergent relativistic spacetime geometry, compatible in the macroscopic limit with Einstein gravity. The resulting picture suggests a common deterministic origin for minimal-scale structure, quantum behavior, and relativistic spacetime.", "url": "https://arxiv.org/abs/2607.03605", "type": "理论", "summary": "我们开发了量子场论的最小本时公式的自上而下对应项，之前作为有效的自下而上框架引入。从因果有序事件的确定性前几何基底开始，我们展示了微观历史上的粗粒度如何在低能量下导致有效的类似南部的量子动力学。基本确定性更新用最小的本征时间步长来识别，而粗粒度等价类的增长控制着紫外线耗散校正和有效量化强度的尺度依赖性，编码在运行的普朗克常数中。通过这种方式，自下而上公式的原时截止核获得了微观解释，即未解决的确定性历史的逆增长。在红外极限内，耗散项消失，标准酉量子场论得到恢复。同样的粗粒结构也为新兴的相对论时空几何提供了自然的背景，在宏观极限上与爱因斯坦引力兼容。\n\n由此产生的图像表明了最小尺度结构、量子行为和相对论时空的共同确定性起源。", "authors": [{"name": "Alessio Maiezza"}], "featured_authors": [{"name": "Alessio Maiezza"}], "author_count": 1}, {"id": "2607.03617", "category": "hep-th", "title": "Quiver BPS Indices from Crystal Profiles", "abstract": "We derive new exact formulae for elliptic genera in two spacetime dimensions with $\\mathcal{N}\\ge 2$ supercharges, as well as their one- and zero-dimensional counterparts (for Witten indices and matrix-model partition functions). Our results are written as a discrete sum over geometric/combinatorial structures of crystals introduced previously by the authors. The contribution from each crystal may be expressed in terms of the boundary data of a finite substructure of the crystal called the molecules. Our results provide vast generalisations of the celebrated Nekrasov partition function enumerated by the Young diagrams, and uncover new combinatorics underlying the crystal melting. We also analyse the thermodynamic limit of crystals arising from two-dimensional $\\mathcal{N}=(0,2)$ theories associated with toric Calabi-Yau fourfolds, where a projection of the Calabi-Yau geometry emerges in the limit.", "url": "https://arxiv.org/abs/2607.03617", "type": "理论", "summary": "我们推导了具有 $\\mathcal{N}\\ge 2$ 增压的两个时空维度中椭圆属的新精确公式，以及它们的一维和零维对应公式（对于维滕指数和矩阵模型配分函数）。我们的结果被写成作者之前介绍的晶体几何/组合结构的离散和。每个晶体的贡献可以用晶体的有限子结构（称为分子）的边界数据来表示。我们的结果提供了杨氏图所列举的著名内克拉索夫配分函数的广泛概括，并揭示了晶体熔化背后的新组合数学。我们还分析了由与复曲面卡拉比-丘四重相关的二维 $\\mathcal{N}=(0,2)$ 理论产生的晶体热力学极限，其中卡拉比-丘几何的投影出现在极限中。", "authors": [{"name": "Jiakang Bao"}, {"name": "Masahito Yamazaki"}], "featured_authors": [{"name": "Jiakang Bao"}, {"name": "Masahito Yamazaki"}], "author_count": 2}, {"id": "2607.03679", "category": "hep-th", "title": "Conformal Renormalisation of 8D Einstein Gravity", "abstract": "We show that Holographic Renormalisation (HR) in eight dimensions is encoded in the unique conformal gravity theory that admits an Einstein sector with constant negative curvature. We explicitly relate HR to Topological Regularisation (TR), where the latter prescribes to add the Euler term to the Einstein-Hilbert Lagrangian density, with a precise coefficient so as to ensure that the resulting density is polynomial in the anti de Sitter (AdS) curvature. The polynomial is still asymptotically divergent. We find that the aforementioned, unique conformal gravity action in 8D, reproduces the polynomial, together with extra boundary terms that cancel the divergent terms in the action. We conjecture that, in arbitrary even dimension, HR is equivalent to conformally completing the Einstein-Hilbert action with negative cosmological constant, plus the Euler term with fixed coupling prescribed by TR.", "url": "https://arxiv.org/abs/2607.03679", "type": "理论", "summary": "我们证明了八维的全息重整化（HR）被编码在独特的共形引力理论中，该理论承认爱因斯坦扇区具有恒定的负曲率。我们明确地将 HR 与拓扑正则化 (TR) 联系起来，后者规定将欧拉项添加到爱因斯坦-希尔伯特拉格朗日密度中，并具有精确的系数，以确保所得密度是反德西特 (AdS) 曲率的多项式。多项式仍然渐近发散。我们发现前面提到的 8D 中独特的共形重力作用再现了多项式，以及消除作用中发散项的额外边界项。我们猜想，在任意偶维下，HR相当于共形地完成负宇宙常数的爱因斯坦-希尔伯特作用，加上TR规定的固定耦合的欧拉项。", "authors": [{"name": "Giorgos Anastasiou"}, {"name": "Ignacio J. Araya"}, {"name": "Nicolas Boulanger"}, {"name": "Rodrigo Olea"}, {"name": "Davide Rovere"}], "featured_authors": [{"name": "Giorgos Anastasiou"}, {"name": "Ignacio J. Araya"}, {"name": "Nicolas Boulanger"}, {"name": "Rodrigo Olea"}, {"name": "Davide Rovere"}], "author_count": 5}, {"id": "2607.03735", "category": "hep-th", "title": "Equal-charge projection of the $\\mathcal{N}=4$ index: exact large-$N$ formula and finite-rank $U(3)$ coefficients", "abstract": "The equal-charge branch of supersymmetric rotating AdS$_5$ black holes has $Q_1=Q_2=Q_3$. The corresponding microcanonical sector of the $\\mathcal{N}=4$ superconformal index is obtained by projecting to equal charges, or equivalently by extracting the constant term in the two charge-difference fugacities. We prove that for the large-$N$ multigraviton sector the projected index factorizes exactly as \\[ \\mathcal{I}^{\\rm eqQ}_\\infty(x,p) =\\prod_{k\\ge1}(1-p^kx^{3k})(1-p^{-k}x^{3k}) \\sum_{n\\ge0}\\mathsf{p}(n)^3x^{6n}, \\] where $\\mathsf{p}(n)$ is the partition function. This factorization gives, for every spin sector, an explicit onset energy below which the large-$N$ coefficient is zero. Exact $U(3)$ computations show that finite-rank coefficients can nevertheless appear at energies where the large-$N$ coefficient vanishes, including beyond the classical $U(3)$ black-hole bound. We also determine the full line $j=6J_R+6$. In particular, with $j^*(J_R)$ denoting this large-$N$ onset energy, \\[ d_3^{\\rm eqQ}(87,\\tfrac{27}{2})=1, \\qquad j^*(\\tfrac{27}{2})-87=1554, \\] and the first giant-graviton sector already contributes one unit at this point. All coefficients are coefficients of the $(-1)^F$-graded index, not positive degeneracies. The main conclusion is that the high-spin tail survives the exact equal-charge projection.", "url": "https://arxiv.org/abs/2607.03735", "type": "理论", "summary": "超对称旋转AdS$_5$黑洞的等电荷分支有$Q_1=Q_2=Q_3$。 $\\mathcal{N}=4$ 超共形指数的相应微正则扇区是通过投影到等电荷获得的，或者等效地通过提取两个电荷差逸度中的常数项来获得。我们证明，对于大$N$多引力子扇区，投影指数分解完全为 \\[ \\mathcal{I}^{\\rm eqQ}_\\infty(x,p) =\\prod_{k\\ge1}(1-p^kx^{3k})(1-p^{-k}x^{3k}) \\sum_{n\\ge0}\\mathsf{p}(n)^3x^{6n}, \\] 其中 $\\mathsf{p}(n)$ 是配分函数。对于每个自旋扇区，这种因式分解给出了明确的起始能量，低于该能量时大$N$系数为零。精确的 $U(3)$ 计算表明，有限秩系数仍然可以出现在大 $N$ 系数消失的能量处，包括超出经典的 $U(3)$ 黑洞界限。我们还确定整行 $j=6J_R+6$。特别是，用$j^*(J_R)$表示这个大$N$起始能量，\\[ d_3^{\\rm eqQ}(87,\\tfrac{27}{2})=1, \\qquad j^*(\\tfrac{27}{2})-87=1554, \\] 并且第一个巨引力子扇区此时已经贡献了一个单位。\n\n所有系数都是$(-1)^F$分级指数的系数，而不是正简并性。主要结论是，高自旋尾部在精确的等电荷投影中幸存下来。", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2607.03749", "category": "hep-th", "title": "Holographic heat engines for Schwarzschild black holes", "abstract": "We construct reversible black hole heat engines in asymptotically flat spacetime using quasi-local gravitational thermodynamics. We enclose a Schwarzschild black hole in a finite spherical cavity and identify the working substance with the dual thermal system on the cavity boundary. The surface pressure and boundary area define a thermodynamic pressure-volume pair in the dual system, while all coupling constants of the gravitational theory remain fixed. We derive exact efficiencies for the Carnot, Otto, Diesel, Brayton, and Stirling engines and compare them numerically. These efficiencies probe the quasi-local equations of state of the black hole. The regenerated Stirling efficiency remains remarkably close to the Carnot bound and approaches it in the high-temperature limit.", "url": "https://arxiv.org/abs/2607.03749", "type": "理论", "summary": "我们利用准局域引力热力学在渐近平坦时空中构造可逆黑洞热机。我们将史瓦西黑洞封闭在有限球形空腔中，并用空腔边界上的双热系统识别工作物质。表面压力和边界面积定义了对偶系统中的热力学压力-体积对，而引力理论的所有耦合常数保持固定。我们得出卡诺发动机、奥托发动机、柴油发动机、布雷顿发动机和斯特林发动机的精确效率，并对它们进行数值比较。这些效率探索了黑洞的准局部状态方程。再生斯特林效率仍然非常接近卡诺束缚，并在高温极限下接近它。", "authors": [{"name": "Ripunjay Dwivedi"}, {"name": "Manus R. Visser"}], "featured_authors": [{"name": "Ripunjay Dwivedi"}, {"name": "Manus R. Visser"}], "author_count": 2}, {"id": "2607.03750", "category": "hep-th", "title": "ERG Kernels on Multiply Connected Configuration Spaces", "abstract": "In the functional-integral formulation of Euclidean field theory, exact renormalization group (ERG) transformations are realized by functional-integral kernels. Unlike the ERG flow equations that describe infinitesimal ERG transformations, these ERG kernels explicitly depend on the global topology of the configuration space. This paper explores this topology dependence for multiply connected configuration spaces. We show that the ERG kernel is in general given by a weighted sum of kernels on its universal covering space, where the weight factors are determined by a one-dimensional representation of the fundamental group. These weight factors are shown never to be renormalized under the ERG. We also show that these factors can be interpreted as Aharonov-Bohm phases with respect to a background magnetic flux penetrating the infinite-dimensional configuration space. From this viewpoint, a normalization condition for ERG transformations corresponds to a flux-quantization condition, which is equivalent to the level-quantization condition for Wess-Zumino-Witten terms in nonlinear sigma models. Finally, we present an alternative gauge-equivalent form of the ERG flow equation that incorporates this topological information locally.", "url": "https://arxiv.org/abs/2607.03750", "type": "理论", "summary": "在欧几里得场论的函数积分公式中，精确的重整化群（ERG）变换是通过函数积分核实现的。与描述无穷小 ERG 变换的 ERG 流方程不同，这些 ERG 内核明确依赖于配置空间的全局拓扑。本文探讨了多重连接配置空间的拓扑依赖性。我们证明，ERG 核通常由其通用覆盖空间上的核的加权和给出，其中权重因子由基本群的一维表示确定。这些权重因子在 ERG 下永远不会被重新标准化。我们还表明，这些因素可以解释为相对于穿透无限维构型空间的背景磁通量的阿哈罗诺夫-玻姆相。从这个角度来看，ERG 变换的归一化条件对应于通量量化条件，其相当于非线性 sigma 模型中 Wess-Zumino-Witten 项的水平量化条件。\n\n最后，我们提出了 ERG 流方程的另一种规范等效形式，该形式在本地结合了这种拓扑信息。", "authors": [{"name": "Satoshi Ohya"}, {"name": "Taichi Tanaka"}], "featured_authors": [{"name": "Satoshi Ohya"}, {"name": "Taichi Tanaka"}], "author_count": 2}, {"id": "2607.03800", "category": "hep-th", "title": "A Smoothness Principle for Branch Selection Across Black-Hole Horizons", "abstract": "Many black-hole wave equations reduce to radial ordinary differential equations with regular singular points at horizons, where local solutions split into distinct branches. We propose a simple branch-selection principle to isolate the physically distinguished branch: removing the leading horizon behavior and imposing \\(C^{\\infty }\\) smoothness on the residual field. Using an exactly solvable scalar field in \\(JT/AdS_{2}\\), we demonstrate that this single principle successfully organizes three seemingly distinct structures: smooth continuation across the black-hole horizon, the ambiguity of the boundary retarded Green function (pole-skipping), and the lowest-weight structure of an \\(SL(2,\\mathbb{R})\\) representation. Rather than treating these phenomena as isolated boundary or horizon properties, our results unify them into a cohesive bulk-to-boundary dictionary, proving that the boundary pole-skipping ambiguity is the precise holographic manifestation of horizon-residual smoothness. Furthermore, the group-theoretic identification reveals that this physical branch selection is not a mere mathematical artifact, but is fundamentally governed by the underlying spacetime symmetries. Finally, we apply this framework as a diagnostic tool to a static holographic superconductor model, revealing that a genuine pole-skipping point requires both simultaneous residual smoothness and strict linear independence of the boundary branches to prevent deceptive branch-collapse artifacts.", "url": "https://arxiv.org/abs/2607.03800", "type": "理论", "summary": "许多黑洞波动方程简化为在视界处具有规则奇点的径向常微分方程，其中局部解分裂成不同的分支。我们提出了一个简单的分支选择原则来隔离物理上区分的分支：去除领先的水平行为并对残差场施加 \\(C^{\\infty }\\) 平滑度。使用 \\(JT/AdS_{2}\\) 中的精确可解标量场，我们证明这一单一原理成功地组织了三个看似不同的结构：黑洞视界的平滑延续、边界延迟格林函数的模糊性（跳极点）以及 \\(SL(2,\\mathbb{R})\\) 表示的最低权重结构。我们的结果不是将这些现象视为孤立的边界或地平线属性，而是将它们统一成一个有凝聚力的体到边界字典，证明边界跳极模糊性是地平线残差平滑度的精确全息表现。此外，群论识别表明，这种物理分支选择不仅仅是数学产物，而且从根本上受到潜在时空对称性的控制。\n\n最后，我们将该框架作为静态全息超导模型的诊断工具，揭示了真正的跳极点需要边界分支的同时残差平滑性和严格的线性独立性，以防止欺骗性的分支崩溃伪影。", "authors": [{"name": "Yoon-Seok Choun"}, {"name": "Ki-Seok Kim"}], "featured_authors": [{"name": "Yoon-Seok Choun"}, {"name": "Ki-Seok Kim"}], "author_count": 2}, {"id": "2607.03969", "category": "hep-th", "title": "From OPE Associativity to Gravitational Wave Signatures: Critical Dimensions and AdS/dS Transition", "abstract": "We present a framework connecting the algebraic consistency of the Operator Product Expansion (OPE) in Conformal Field Theories to observable signatures in the stochastic gravitational wave background (SGWB). By interpreting the conformal 6j symbols as crossing kernels, we extract the anomalous dimensions $\\gamma_{n,J}$ of double-trace operators from the singularities of the crossing equation. Through the AdS/CFT correspondence, these algebraic shifts are holographically reinterpreted as effective mass shifts in the Anti-de Sitter bulk. We identify a critical anomalous dimension, $\\gamma_c$, which marks the threshold where the effective mass violates the Breitenlohner-Freedman bound. Upon analytic continuation to de Sitter space ($L_{\\text{AdS}} \\to iL_{\\text{dS}}$), we demonstrate that crossing this threshold ($\\gamma < \\gamma_c$) forces the dual scaling dimensions into the complex principal series, $\\Delta_{\\text{dS}} = d/2 \\pm i\\mu$. This complex dimensionality induces characteristic logarithmic oscillations in the four-point correlators. In the cosmological context, these oscillations manifest as a log-periodic modulation in the SGWB, characterized by a specific spacing $\\Delta \\ln f = 2\\pi/\\mu$. Detecting this log-periodic structure with next-generation interferometers such as LISA would directly measure the parameter $\\mu$, closing the loop between abstract OPE associativity and observational cosmology.", "url": "https://arxiv.org/abs/2607.03969", "type": "理论", "summary": "我们提出了一个框架，将共形场论中算子积展开（OPE）的代数一致性与随机引力波背景（SGWB）中的可观测特征联系起来。通过将共形 6j 符号解释为交叉核，我们从交叉方程的奇点中提取了双迹算子的异常维度 $\\gamma_{n,J}$。通过 AdS/CFT 对应关系，这些代数位移被全息地重新解释为反德西特体中的有效质量位移。我们确定了一个临界异常尺寸 $\\gamma_c$，它标志着有效质量违反 Breitenlohner-Freedman 界限的阈值。通过解析延拓到德西特空间 ($L_{\\text{AdS}} \\to iL_{\\text{dS}}$)，我们证明了跨越这个阈值 ($\\gamma < \\gamma_c$) 会迫使双尺度维度进入复主级数 $\\Delta_{\\text{dS}} = d/2 \\pm i\\mu$。这种复杂的维度会在四点相关器中引起特征对数振荡。\n\n在宇宙学背景下，这些振荡表现为 SGWB 中的对数周期调制，其特征是特定的间距 $\\Delta \\ln f = 2\\pi/\\mu$。使用 LISA 等下一代干涉仪检测这种对数周期结构将直接测量参数 $\\mu$，从而闭合抽象 OPE 关联性和观测宇宙学之间的循环。", "authors": [{"name": "Tetiana Obikhod"}], "featured_authors": [{"name": "Tetiana Obikhod"}], "author_count": 1}, {"id": "2607.04065", "category": "hep-th", "title": "The Normalised Wigner Negativity Rate as a Second-Moment Probe of Infall in AdS$_3$", "abstract": "In spread complexity, the average position of an operator along its Krylov chain, recovers the right radial momentum of an infalling particle in AdS, yet it is a measure of the first moment, irrespective of the spread of the wavepacket away from its classical trajectory. The rate of a normalized Krylov-Wigner negativity can be proposed as a diagnostic of the second moment of the boundary state that captures this spreading. Starting with the \\emph{seed-normalized} Krylov-Wigner distribution -- that is, the Wigner transform of the descendant cloud, with the decaying return amplitude divided out -- we obtain an analytic Bessel form in the macroscopic limit and compute its total negativity explicitly. Retaining the Bessel variable all the way through, we find that the negativity goes as $\\sinh^{4\\Delta}(\\pi t/\\beta)$, while the raw, seed-normalized state negativity saturates, as dictated by the $O(\\sqrt{D})$ bound. Using the exact negative binomial statistics of the Krylov chain and the momentum dictionary of Caputa et al.~\\cite{Caputa:2024}, the rate of the negativity scales as the growth rate of the Krylov variance at late time asymptotics \\emph{if and only if} $\\Delta=1$, the Breitenlohner-Freedman saturating dimension in $AdS_3$. This dimensionality is special in that the negativity rate is the product of the proper radial position and momentum, $\\mathcal{R} \\propto \\mathcal{C} P_\\rho$, i.e., the rate of the tidal stretch of nearby geodesic falling into the horizon. We comment on the direction for future research, in particular the interpretation of the transverse string size operator in terms of the Krylov number operator through the common $SU(1,1)$ discrete series.", "url": "https://arxiv.org/abs/2607.04065", "type": "理论", "summary": "在扩展复杂性中，算子沿其 Krylov 链的平均位置恢复了 AdS 中下落粒子的右径向动量，但它是第一时刻的度量，与波包远离其经典轨迹的扩展无关。可以提出归一化的克雷洛夫-维格纳负率作为捕获这种扩散的边界态二阶矩的诊断。从 \\emph{种子归一化} Krylov-Wigner 分布（即后代云的维格纳变换，除以衰减返回幅度）开始，我们获得宏观极限下的解析贝塞尔形式，并显式计算其总负性。始终保留贝塞尔变量，我们发现负性为 $\\sinh^{4\\Delta}(\\pi t/\\beta)$，而原始种子归一化状态负性饱和，如 $O(\\sqrt{D})$ 界限所规定。\n\n使用 Krylov 链的精确负二项式统计和 Caputa 等人的动量字典~\\cite{Caputa:2024}，负率随着后期渐近的 Krylov 方差的增长率而变化 \\emph{当且仅当} $\\Delta=1$，即 $AdS_3$ 中的 Breitenlohner-Freedman 饱和维度。这个维度的特殊之处在于，负率是固有径向位置和动量的乘积，$\\mathcal{R} \\propto \\mathcal{C} P_\\rho$，即附近测地线落入地平线的潮汐伸展率。我们对未来研究的方向进行了评论，特别是通过常见的 $SU(1,1)$ 离散级数用 Krylov 数算子解释横向弦大小算子。", "authors": [{"name": "Ritam Basu"}], "featured_authors": [{"name": "Ritam Basu"}], "author_count": 1}, {"id": "2607.04115", "category": "hep-th", "title": "Infrared Divergences as Itinerant Vacua", "abstract": "Infrared divergences (IRDs) are usually treated as pathologies to be cancelled, regularized, or hidden in dressed asymptotic states. This paper develops a complementary and constructive viewpoint: an IRD is the signature of an \\emph{itinerant vacuum} -- a quantum vacuum that wanders continuously through a family of inequivalent states as a classical order parameter evolves. Each value of the order parameter carries its own coherent vacuum, so moving the order parameter means traversing a succession of orthogonal vacua. The IRD is the field-theoretic cost of this wandering, and the $1/f$ noise, gravitational memory, and non-Gaussian fluctuations that emerge from it are its observable classical remnants. The technical core is an exact separation in the real-time closed-time-path (CTP) effective action. The infrared-divergent imaginary part of the influence functional must not be left as a divergent coefficient in a deterministic equation of motion; it is instead converted, by a Hubbard--Stratonovich identity, into a classical stochastic source. This step is an algebraic identity of the generating functional and requires no prior coarse graining or decoherence assumption: the retarded kernel encodes the memory of past vacuum transitions, while the noise kernel encodes the quantum uncertainty of the next one. We apply this construction to four parallel arenas -- soft QED, scalar fields in de Sitter space, soft gravitons, and non-equilibrium phase transitions -- and show that the same itinerant-vacuum mechanism underlies $1/f$ current noise, the primordial power spectrum, gravitational memory, and order-parameter dynamics. A geometric formulation in terms of a Hilbert-space bundle over the vacuum manifold is outlined as an outlook.", "url": "https://arxiv.org/abs/2607.04115", "type": "理论", "summary": "红外发散 (IRD) 通常被视为需要消除、正则化或隐藏在渐近状态中的病态。本文提出了一个补充性和建设性的观点：IRD 是 \\emph{流动真空} 的特征——随着经典序参数的演化，量子真空在一系列不等价态中连续徘徊。顺序参数的每个值都带有自己的相干真空，因此移动顺序参数意味着遍历一系列正交真空。 IRD 是这种漂移的场论成本，而由此产生的 $1/f$ 噪声、引力记忆和非高斯波动是其可观察到的经典残余。其技术核心是实时闭路路径（CTP）有效动作中的精确分离。影响函数的红外发散虚部不得作为确定性运动方程中的发散系数；相反，它通过哈伯德-斯特拉托诺维奇恒等式转换为经典随机源。\n\n此步骤是生成函数的代数恒等式，不需要事先的粗粒度或退相干假设：延迟内核对过去真空跃迁的记忆进行编码，而噪声内核对下一个真空跃迁的量子不确定性进行编码。我们将这种结构应用于四个平行领域——软量子电动力学、德西特空间中的标量场、软引力子和非平衡相变——并表明相同的巡回真空机制是$1/f$电流噪声、原始功率谱、引力记忆和有序参数动力学的基础。概述了真空流形上希尔伯特空间束的几何公式​​作为展望。", "authors": [{"name": "Masahiro Morikawa"}], "featured_authors": [{"name": "Masahiro Morikawa"}], "author_count": 1}, {"id": "2607.04143", "category": "hep-th", "title": "Finite-$N$ Operator Algebras and the Hilbert Space of Bilocal Holography", "abstract": "We give an operator-algebraic and representation-theoretic description of the Hilbert spaces finite-$N$ bilocal holography. This work is a sequel to the finite-$N$ Hilbert space construction of arXiv:2602.20788 [hep-th]. The central result is the establishment of an invariant dual-pair operator algebra: before imposing the singlet constraint the Fock space carries commuting actions of the color group and of a bilocal Lie algebra, while the projection to the singlet sector selects a single irreducible representation of the invariant Lie algebra, which we call a master algebra. The finite-$N$ trace relations, beginning with the quadratic identities studied here, are shown to become representation-theoretic identities of the selected irreducible representation. We summarize the orthogonal, symplectic and unitary cases, identify the corresponding finite-$N$ constraints, compute the singlet Casimirs, and explain how finite traces and partition functions are obtained through characters of the resulting irreducible representations. This provides a novel, previously unknown mathematical description of the singlet space.", "url": "https://arxiv.org/abs/2607.04143", "type": "理论", "summary": "我们给出了希尔伯特空间有限$N$双局域全息术的算子代数和表示理论描述。这项工作是 arXiv:2602.20788 [hep-th] 的有限 $N$ 希尔伯特空间构造的续集。核心结果是建立不变的双对算子代数：在施加单重态约束之前，福克空间承载颜色群和双局部李代数的交换作用，而到单重态扇区的投影选择不变李代数的单个不可约表示，我们称之为主代数。有限$N$迹关系，从这里研究的二次恒等式开始，被证明成为所选不可约表示的表示理论恒等式。我们总结了正交、辛和酉情况，识别相应的有限-$N$约束，计算单线态卡西米尔，并解释如何通过所得不可约表示的特征获得有限迹和配分函数。这提供了一种新颖的、以前未知的单态空间数学描述。", "authors": [{"name": "Byoungjoon Ahn"}, {"name": "Robert de Mello Koch"}, {"name": "Vatsal Garg"}, {"name": "Antal Jevicki"}, {"name": "Junggi Yoon"}], "featured_authors": [{"name": "Byoungjoon Ahn"}, {"name": "Robert de Mello Koch"}, {"name": "Vatsal Garg"}, {"name": "Antal Jevicki"}, {"name": "Junggi Yoon"}], "author_count": 5}, {"id": "2607.04203", "category": "hep-th", "title": "Solving for the integrable boundary states of the ABJM spin chain from $KT$-relations", "abstract": "We study integrable boundary states of the alternating SU(4) spin chain arising in ABJM theory. Starting from the $KT$-relation, we directly solve the integrability constraints for states with $n$-site translational invariance. For odd and even $n$, these constraints are reduced respectively to state equations and operator equations for the elementary $n$-site block and the matrix $K(u)$. We analyze chiral and achiral cases for $n\\leq4$. In the 1-site case we allow general operator-valued integrable pairs with an internal space, while in the remaining cases we focus on $c$-number solutions.", "url": "https://arxiv.org/abs/2607.04203", "type": "理论", "summary": "我们研究 ABJM 理论中产生的交替 SU(4) 自旋链的可积边界态。从$KT$关系开始，我们直接解决具有$n$位点平移不变性的状态的可积性约束。对于奇数和偶数 $n$，这些约束分别简化为基本 $n$ 站点块和矩阵 $K(u)$ 的状态方程和算子方程。我们分析 $n\\leq4$ 的手性和非手性情况。在 1 站点的情况下，我们允许具有内部空间的一般运算符值可积对，而在其余情况下，我们专注于 $c$ 数解决方案。", "authors": [{"name": "Nan Bai"}, {"name": "Hui Yang"}, {"name": "Mao-Zhong Shao"}], "featured_authors": [{"name": "Nan Bai"}, {"name": "Hui Yang"}, {"name": "Mao-Zhong Shao"}], "author_count": 3}, {"id": "2607.04246", "category": "hep-th", "title": "Electromagnetic Scoot for Dyons Revisited", "abstract": "In the scattering of two electric charges, the particles acquire a shift in their net boost-like angular momentum, balanced by an opposite field contribution. This electromagnetic scoot effect appears at first order in post-Minkowskian expansion (1PM) order when conservation laws are evaluated on constant-time slices, but disappears at this order on hyperboloidal slices. Here, we extend this analysis to scattering involving both electric and magnetic charges and compare the results with the purely electric case in the context of multiparticle state representations.", "url": "https://arxiv.org/abs/2607.04246", "type": "理论", "summary": "在两个电荷的散射中，粒子的净角动量发生了类似助推的变化，并通过相反的场贡献进行了平衡。当在恒定时间切片上评估守恒定律时，这种电磁冲行效应出现在后闵可夫斯基展开 (1PM) 阶中的一阶，但在双曲面切片上在此阶消失。在这里，我们将此分析扩展到涉及电荷和磁荷的散射，并将结果与​​多粒子状态表示背景下的纯电情况进行比较。", "authors": [{"name": "Rasim Yılmaz"}, {"name": "Onur Ayberk Çakmak"}], "featured_authors": [{"name": "Rasim Yılmaz"}, {"name": "Onur Ayberk Çakmak"}], "author_count": 2}, {"id": "2607.04268", "category": "hep-th", "title": "Entanglement of excited states after measurements in conformal field theory", "abstract": "We study the entanglement of low-energy excited states after a fixed-outcome projective measurement on a spatial interval in a (1+1)-dimensional conformal field theory (CFT). The post-selected measurement outcome is represented by a slit carrying a conformal boundary condition, while excited states are introduced by operator insertions in the Euclidean path integral. After mapping the replicated slit geometry to a disk, the excited-state contribution to the post-measurement Rényi entropy is expressed as a normalized boundary-CFT correlation function. We apply this framework to the compact free boson CFT. For the chiral current excitation, the relevant ratios are given by current hafnians. We also study coherent superpositions of $J$ and $\\bar J$, and of conjugate compact vertex operators. In the conjugate-vertex case, the ordinary-cylinder second Rényi ratio is independent of the relative phase, whereas the finite-slit post-measurement ratio contains phase-sensitive interference terms. Finally, we describe free-fermion and multi-Slater determinant methods for testing these predictions in the critical XX chain.", "url": "https://arxiv.org/abs/2607.04268", "type": "理论", "summary": "我们研究了 (1+1) 维共形场论 (CFT) 中空间间隔的固定结果投影测量后低能激发态的纠缠。后选择的测量结果由带有共形边界条件的狭缝表示，而激发态是通过欧几里德路径积分中的算子插入引入的。将复制的狭缝几何形状映射到圆盘后，激发态对测量后 Rényi 熵的贡献表示为归一化边界 CFT 相关函数。我们将此框架应用于紧凑的自由玻色子 CFT。对于手性电流激励，相关比率由电流哈夫尼给出。我们还研究了 $J$ 和 $\\bar J$ 以及共轭紧顶点算子的相干叠加。在共轭顶点情况下，普通柱面第二Rényi比与相对相位无关，而有限缝后测量比包含相敏干涉项。最后，我们描述了用于在关键 XX 链中测试这些预测的自由费米子和多 Slater 行列式方法。", "authors": [{"name": "Hui-Huang Chen"}], "featured_authors": [{"name": "Hui-Huang Chen"}], "author_count": 1}, {"id": "2607.04413", "category": "hep-th", "title": "Stress stability criterion of the isospinning $\\mathbb{C}P^2$ solitons", "abstract": "We study the energy-momentum tensor of stationary rotating topological solitons in a (2 + 1)-dimensional $\\mathbb{C}P^2$ nonlinear sigma model with a stabilizing potential term. We evaluate the distributions of the corresponding shear forces and pressure and study the stability criteria for these solutions. Our results suggest that these solitons become classically unstable for some range of values of the parameters of the system.", "url": "https://arxiv.org/abs/2607.04413", "type": "理论", "summary": "我们研究了具有稳定势项的 (2 + 1) 维 $\\mathbb{C}P^2$ 非线性 sigma 模型中静止旋转拓扑孤子的能量动量张量。我们评估相应的剪切力和压力的分布，并研究这些解决方案的稳定性标准。我们的结果表明，这些孤子对于系统参数值的某些范围来说变得经典不稳定。", "authors": [{"name": "Sergei Antsipovich"}, {"name": "Yakov Shnir"}], "featured_authors": [{"name": "Sergei Antsipovich"}, {"name": "Yakov Shnir"}], "author_count": 2}, {"id": "2607.04417", "category": "hep-th", "title": "Neumann scalars in AdS: partition functions and phases", "abstract": "We present an analysis of one-loop partition functions for scalars in AdS$_{d+1}$ obeying the Neumann boundary condition and explore phases of scalar field theories in several dimensions at zero and finite temperature. The partition function computation involves an analytic continuation from $\\Delta_+$ corresponding to the Dirichlet boundary condition to $\\Delta_-$ corresponding to Neumann boundary condition. We show that this can be implemented by deformations of the contour for integral over eigenvalue ($\\lambda$) of the Laplace operator as compared to the integral over ${\\mathbb R}$ in [ arXiv:2201.09043 ] for the Dirichlet boundary condition. We further contrast these phases with those appearing for the case of scalars obeying the Dirichlet boundary condition and corroborate the occurrence of these phases by studying the long range behaviour of correlators.", "url": "https://arxiv.org/abs/2607.04417", "type": "理论", "summary": "我们对 AdS$_{d+1}$ 中遵循诺伊曼边界条件的标量的单循环配分函数进行了分析，并探索了零温度和有限温度下多维标量场论的阶段。配分函数计算涉及从对应于狄利克雷边界条件的$\\Delta_+$到对应于诺伊曼边界条件的$\\Delta_-$的解析延拓。我们证明，这可以通过拉普拉斯算子的特征值 ($\\lambda$) 积分的轮廓变形来实现，与狄利克雷边界条件的 [ arXiv:2201.09043 ] 中 ${\\mathbb R}$ 的积分相比。我们进一步将这些相位与服从狄利克雷边界条件的标量情况下出现的相位进行对比，并通过研究相关器的长程行为来证实这些相位的出现。", "authors": [{"name": "Biki Bishwakarma"}, {"name": "Astha Kakkar"}, {"name": "Swarnendu Sarkar"}], "featured_authors": [{"name": "Biki Bishwakarma"}, {"name": "Astha Kakkar"}, {"name": "Swarnendu Sarkar"}], "author_count": 3}, {"id": "2607.04483", "category": "hep-th", "title": "Topological effects in the polarization of the Fulling-Rindler vacuum", "abstract": "We investigate how the compactification of some spatial dimensions in Rindler spacetime affects the vacuum expectation values (VEVs) of the field squared and the energy-momentum tensor for a charged scalar field prepared in the Fulling-Rindler vacuum state. A toral compactification is considered with quasi-periodicity conditions on the field operator along the compact dimensions. The phases of these conditions are interpreted in terms of the magnetic flux enclosed by the compact dimensions. For a general number of spatial dimensions, the components of the VEVs are explicitly separated, corresponding to the expectation values in the Minkowski vacuum. As a limiting case, the VEVs are retrieved in Rindler spacetime with trivial topology. We demonstrate that, for non-zero phases in the periodicity conditions, the vacuum energy-momentum tensor exhibits off-diagonal components with indices in the compact subspace. Near the Rindler horizon, the leading terms in the asymptotic expansions of the field squared and the diagonal components of the energy-momentum tensor coincide with the corresponding VEVs in Rindler spacetime with trivial topology. The off-diagonal components of the energy-momentum tensor vanish on the Rindler horizon. For small accelerations, the difference between the VEVs in the Fulling-Rindler and Minkowski vacua is exponentially small. The exception to this is a massless field with zero phases in the periodicity conditions. In this special case, the difference decays according to a power law as a function of acceleration. As an application, we consider the VEVs near the horizon of cylindrical black holes and topological black holes with toroidal horizons.", "url": "https://arxiv.org/abs/2607.04483", "type": "理论", "summary": "我们研究了 Rindler 时空中某些空间维度的致密化如何影响场平方的真空期望值 (VEV) 以及在 Fulling-Rindler 真空状态下制备的带电标量场的能量动量张量。考虑了场算子沿紧凑维度的准周期性条件的托拉紧化。这些条件的相位根据紧凑尺寸所包围的磁通量来解释。对于一般数量的空间维度，VEV 的组成部分是明确分离的，对应于 Minkowski 真空中的期望值。作为限制情况，VEV 在 Rindler 时空中以简单的拓扑进行检索。我们证明，对于周期性条件下的非零相位，真空能量动量张量在紧致子空间中表现出具有索引的非对角分量。在 Rindler 视界附近，能量动量张量的平方场和对角线分量的渐近展开中的主项与 Rindler 时空中具有平凡拓扑的相应 VEV 一致。\n\n能量动量张量的非对角分量在林德勒视界上消失。对于小加速度，Fulling-Rindler 真空和 Minkowski 真空中的 VEV 之间的差异呈指数级小。例外情况是周期性条件下具有零相位的无质量场。在这种特殊情况下，差异根据幂律作为加速度的函数衰减。作为一个应用，我们考虑圆柱形黑洞和具有环形视界的拓扑黑洞视界附近的 VEV。", "authors": [{"name": "A. A. Saharian"}, {"name": "G. V. Mirzoyan"}, {"name": "V. S. Torosyan"}], "featured_authors": [{"name": "A. A. Saharian"}, {"name": "G. V. Mirzoyan"}, {"name": "V. S. Torosyan"}], "author_count": 3}, {"id": "2607.04522", "category": "hep-th", "title": "Symmetries and Conservation Laws in Lie-Poisson Electrodynamics", "abstract": "Lie-Poisson electrodynamics (LPE) is a non-Abelian and nonlinear deformation of usual electrodynamics, where the gauge algebra is defined through a Lie-algebra-type Poisson bracket on space-time. We focus on the geometric approach to LPE in the absence of charged matter. We establish a non-trivial field redefinition which, under mild technical assumptions, maps the LPE dynamics to that of Maxwell theory. Using this map, for any symmetry of the Maxwell action, we construct generators of LPE symmetries and the corresponding conserved currents. In particular, we obtain deformed Poincaré transformations. We also outline a natural quantization prescription for LPE based on our field redefinition.", "url": "https://arxiv.org/abs/2607.04522", "type": "理论", "summary": "李泊松电动力学（LPE）是通常电动力学的非阿贝尔非线性变形，其中规范代数通过时空上的李代数型泊松括号来定义。我们专注于在不存在带电物质的情况下 LPE 的几何方法。我们建立了一个非平凡的场重新定义，在温和的技术假设下，将 LPE 动力学映射到麦克斯韦理论。使用该映射，对于麦克斯韦作用的任何对称性，我们构造 LPE 对称性生成器和相应的守恒电流。特别是，我们获得了变形的庞加莱变换。我们还根据我们的场重新定义概述了 LPE 的自然量化处方。", "authors": [{"name": "M. A. Kurkov"}], "featured_authors": [{"name": "M. A. Kurkov"}], "author_count": 1}, {"id": "2607.04602", "category": "hep-th", "title": "Kaluza-Klein tower thresholds and scheme dependence of the species scale", "abstract": "We revisit the species scale in quantum gravity from the viewpoint of effective field theory (EFT). Two characterizations are commonly used: one defines it as the energy at which the perturbative description of quantum gravity breaks down, as inferred from the one-loop correction to the graviton propagator; the other identifies it with the suppression scale of higher-derivative operators in the gravitational effective action. We clarify the relation between these characterizations by analyzing the cutoff-scheme dependence of the one-loop tower contribution. For a large number of species, the leading tower-enhanced local correction is regulator dependent and should be interpreted as EFT matching data, while the subleading logarithmic contribution is universal within the class of proper-time cutoff profiles considered here. As a concrete application, we compute the full four-derivative one-loop corrections from Kaluza-Klein towers. Our results separate regulator-stable logarithmic data from scheme-dependent local threshold contributions, providing a controlled EFT interpretation of the relation between perturbative-breakdown and higher-derivative definitions of the species scale and explaining why their coefficient-level identification is not regulator independent.", "url": "https://arxiv.org/abs/2607.04602", "type": "理论", "summary": "我们从有效场论（EFT）的角度重新审视量子引力中的物种尺度。通常使用两种表征：一种将其定义为量子引力的微扰描述失效时的能量，这是从对引力子传播器的单环校正推断出来的；另一个将其与引力有效作用中高导算子的抑制尺度等同起来。我们通过分析单环塔贡献的截止方案依赖性来阐明这些特征之间的关系。对于大量物种，主导塔增强局部校正取决于调节器，应解释为 EFT 匹配数据，而次主导对数贡献在此处考虑的原时截止剖面类别中是通用的。作为一个具体应用，我们计算 Kaluza-Klein 塔的完整四导数单环修正。\n\n我们的结果将调节器稳定的对数数据与方案相关的局部阈值贡献分开，为物种规模的微扰击穿和高导数定义之间的关系提供了受控的 EFT 解释，并解释了为什么它们的系数水平识别不是独立于调节器的。", "authors": [{"name": "Yuri Michinobu"}], "featured_authors": [{"name": "Yuri Michinobu"}], "author_count": 1}, {"id": "2607.04611", "category": "hep-th", "title": "Multi-Particle Contributions to the Celestial Algebra in the ${\\cal N}=8$ Supergravity", "abstract": "Recently, Calkins and Pate calculated the multi-particle operator product expansions (OPEs) of single-particle celestial operators with two-particle celestial operators in pure Einstein gravity. We apply their construction to the graviton, gravitinos, graviphotons, graviphotinos and scalars in ${\\cal N}=8$ supergravity. By performing various contour integrals on these multi-particle OPEs, we obtain ninety-five (anti)commutators for the single-particle contributions from the celestial soft current algebra (derived from the single-particle OPEs) in a two-dimensional boundary. Moreover, these ninety-five multi-particle OPEs provide nontrivial relations between the corresponding celestial amplitudes. The triple-collinear limits between these bosonic and fermionic particles from the four-dimensional bulk are also described as a double check. Finally, we implicitly propose both the multi-particle OPEs of single-particle celestial operators with $(N-1)$-particle celestial operators and the corresponding (anti)commutators for the modes of celestial operators that have linear terms (or single-particle exchange terms due to the sum of $N$-particle factorization channels from amplitudes) on the right-hand sides.", "url": "https://arxiv.org/abs/2607.04611", "type": "理论", "summary": "最近，卡尔金斯和佩特计算了纯爱因斯坦引力中单粒子天体算子与双粒子天体算子的多粒子算子乘积展开（OPE）。我们将它们的构造应用于 ${\\cal N}=8$ 超重力中的引力子、引力子、引力光子、引力子和标量。通过对这些多粒子 OPE 执行各种轮廓积分，我们获得了二维边界中来自天体软电流代数（源自单粒子 OPE）的单粒子贡献的 95 个（反）换向子。此外，这九十五个多粒子 OPE 提供了相应天体振幅之间的重要关系。来自四维体的这些玻色子和费米子粒子之间的三重共线限制也被描述为双重检查。\n\n最后，我们隐含地提出了具有 $(N-1)$-粒子天体算子的单粒子天体算子的多粒子 OPE，以及右侧具有线性项（或由于振幅的 $N$-粒子分解通道之和而产生的单粒子交换项）的天体算子模式的相应（反）换向器。", "authors": [{"name": "Changhyun Ahn"}], "featured_authors": [{"name": "Changhyun Ahn"}], "author_count": 1}, {"id": "2607.04706", "category": "hep-th", "title": "New insights on mutual information in the island approach to the Page curve", "abstract": "In this article, we have presented one of the very important observations, regarding the behavior of mutual information of two different sets of subsystems in the after Page time scenario. This provides us with some deep insights about the conservation of geometrical entanglement. In our earlier works, we have shown how the saturation of mutual information between two specific subsystems plays a vital role in obtaining the correct Page curve for the eternal black hole. In those works, we have shown that the mutual information between $B_+$ and $B_-$, that is, $I(B_{+}: B_{-})$, vanishes at scrambling time, which leads to the correct Page curve. That means that at scrambling time, there is no correlation between $B_+$ and $B_-$. Remarkably, it is observed that at this particular value of observer's time, the mutual information between $\\mathcal{I}$ and $R$, that is, $I(\\mathcal{I}:R)$, becomes infinity. This indicates that the regions $\\mathcal{I}$ and $R$ become maximally entangled. This provides us with a notion of conservation of geometric correlation between different regions on the Cauchy slice. In this work, we have also provided a way to calculate the tripartite mutual information of regions $\\mathcal{I}$,$R_+$ and $R_-$, that is, $I(\\mathcal{I}:R_+:R_-)$ on the Cauchy slice using the earlier results involving the bipartite regions. This is a new result which was missing in the earlier literature.", "url": "https://arxiv.org/abs/2607.04706", "type": "理论", "summary": "在本文中，我们提出了非常重要的观察结果之一，涉及页面后时间场景中两组不同子系统的互信息行为。这为我们提供了关于几何纠缠守恒的一些深刻见解。在我们早期的工作中，我们已经展示了两个特定子系统之间的互信息饱和如何在获得永恒黑洞的正确佩奇曲线方面发挥着至关重要的作用。在这些工作中，我们证明了 $B_+$ 和 $B_-$ 之间的互信息，即 $I(B_{+}: B_{-})$ 在置乱时消失，从而得出正确的 Page 曲线。这意味着在置乱时，$B_+$ 和 $B_-$ 之间不存在相关性。值得注意的是，观察者在这个特定的时间值下，$\\mathcal{I}$ 和 $R$ 之间的互信息，即 $I(\\mathcal{I}:R)$ 变得无穷大。这表明区域 $\\mathcal{I}$ 和 $R$ 变得最大程度地纠缠。这为我们提供了柯西切片上不同区域之间几何相关性守恒的概念。\n\n在这项工作中，我们还提供了一种方法来计算区域 $\\mathcal{I}$、$R_+$ 和 $R_-$ 的三方互信息，即使用涉及二分区域的早期结果计算柯西切片上的 $I(\\mathcal{I}:R_+:R_-)$。这是早期文献中缺失的新结果。", "authors": [{"name": "Anirban Roy Chowdhury"}, {"name": "Souvik Paul"}, {"name": "Sunandan Gangopadhyay"}], "featured_authors": [{"name": "Anirban Roy Chowdhury"}, {"name": "Souvik Paul"}, {"name": "Sunandan Gangopadhyay"}], "author_count": 3}, {"id": "2607.04905", "category": "hep-th", "title": "Entropy bounds, Geroch process, and the sign of deformation parameter", "abstract": "Based on Geroch's process of dropping a system into a black hole from the vicinity of the horizon, we investigate in this paper the influence of deformation on the Bekenstein entropy bound both for (3+1) and (2+1) dimensions in the context of a generalized uncertainty principle (GUP). While providing a coherent framework for providing an upper limit on the entropy across dimensions we show, in the framework of a semiclassical treatment, that while a negative GUP deformation yields a universal relaxation of the bound, a positive deformation tightens it. Our results may be interpreted as a response to Planck-scale modifications of the near-horizon redshift.", "url": "https://arxiv.org/abs/2607.04905", "type": "理论", "summary": "基于 Geroch 将系统从视界附近投入黑洞的过程，我们在本文中研究了广义不确定性原理 (GUP) 背景下变形对 (3+1) 和 (2+1) 维度贝肯斯坦熵界的影响。在提供一个连贯的框架来提供跨维度熵的上限时，我们表明，在半经典处理的框架中，虽然负 GUP 变形会产生边界的普遍松弛，但正变形会收紧边界。我们的结果可以解释为对近地平线红移的普朗克尺度修改的响应。", "authors": [{"name": "Bijan Bagchi"}, {"name": "Akshat Pandey"}, {"name": "Parmest Roy"}, {"name": "Sauvik Sen"}], "featured_authors": [{"name": "Bijan Bagchi"}, {"name": "Akshat Pandey"}, {"name": "Parmest Roy"}, {"name": "Sauvik Sen"}], "author_count": 4}, {"id": "2607.04929", "category": "hep-th", "title": "Revisiting the Wess-Zumino-Witten Term in Nuclear and Quark Matter under Magnetic Fields and Rotation", "abstract": "We study anomalous Wess-Zumino-Witten terms associated with the chiral anomaly in dense QCD matter under magnetic fields and rotation. By introducing electromagnetic, baryon number, and isospin background gauge fields, we write down the topological couplings of neutral mesons for the $N_f=2$ and $N_f=3$ cases. The resulting terms contain characteristic contributions proportional to $\\vec{B} \\cdot \\vec{\\nabla} \\phi$ and $\\vec{\\Omega} \\cdot \\vec{\\nabla} \\phi$, where $\\phi$ denotes $\\pi^0$, $\\eta$, or $\\eta'$. These results are relevant to chiral soliton lattices in dense rotating matter.", "url": "https://arxiv.org/abs/2607.04929", "type": "理论", "summary": "我们研究了与磁场和旋转下致密 QCD 物质中的手性异常相关的异常 Wess-Zumino-Witten 项。通过引入电磁、重子数和同位旋背景规范场，我们写出了$N_f=2$和$N_f=3$情况下中性介子的拓扑耦合。结果项包含与 $\\vec{B} \\cdot \\vec{\\nabla} \\phi$ 和 $\\vec{\\Omega} \\cdot \\vec{\\nabla} \\phi$ 成比例的特征贡献，其中 $\\phi$ 表示 $\\pi^0$、$\\eta$ 或 $\\eta'$。这些结果与致密旋转物质中的手性孤子晶格相关。", "authors": [{"name": "Markus A. G. Amano"}, {"name": "Minoru Eto"}, {"name": "Muneto Nitta"}, {"name": "Shin Sasaki"}], "featured_authors": [{"name": "Markus A. G. Amano"}, {"name": "Minoru Eto"}, {"name": "Muneto Nitta"}, {"name": "Shin Sasaki"}], "author_count": 4}, {"id": "2607.04980", "category": "hep-th", "title": "The causal set reduction formula", "abstract": "We derive a reduction formula for matrix elements on a causal set background. We derive an infinite tower of relations between correlators, akin to the Schwinger-Dyson equations of the continuum. Combining these two results we are able to express matrix elements in three different forms: as a path integral and as two distinct sums of correlators. We sketch the form that our method - which circumvents explicit use of differential equation of motion operators - takes in flat continuum spacetime where it provides an alternative expression for the standard LSZ result.", "url": "https://arxiv.org/abs/2607.04980", "type": "理论", "summary": "我们推导出因果集背景上矩阵元素的约简公式。我们推导出相关器之间关系的无限塔，类似于连续体的施温格-戴森方程。结合这两个结果，我们能够以三种不同的形式表达矩阵元素：作为路径积分和作为两个不同的相关器之和。我们绘制了我们的方法（避免了运动微分方程算子的显式使用）在平坦连续时空中采用的形式，其中它为标准 LSZ 结果提供了替代表达式。", "authors": [{"name": "Stav Zalel"}], "featured_authors": [{"name": "Stav Zalel"}], "author_count": 1}, {"id": "2607.05115", "category": "hep-th", "title": "From Galilei to Euclidean Carroll and the Alice Particle: The Times They Are a-Changin'", "abstract": "In generalized, also known as $p$-brane Galilei limits, the speed of light $c$ becomes infinite in the directions transverse to a $(p+1)$-dimensional Lorentzian worldvolume. In this paper, we explain that allowing the worldvolume to be Euclidean, and thus time to be transversal, $p$-brane Galilei limits turn into Carrollian ones, that we refer to as \"Euclidean $p$-brane Carroll limits\", in which $c$ goes to zero in the $p+1$ worldvolume directions. This leads to a unified approach to taking Galilean and Carrollian limits, whose consequences we explore for $p=0$. We show that the spacetime symmetries that arise from the Euclidean 0-brane Carroll limit can be centrally extended to what we will call the Alice algebra, similar to how the Bargmann algebra centrally extends the Galilei symmetries. This gives rise to the novel notion of an Alice particle, and we obtain the Bargmann and Alice particle actions from a unified limit of the action of a relativistic massive particle or tachyon, suitably coupled to a one-form gauge potential. In the presence of a cosmological constant, we find that the Bargmann and Alice particles undergo stable motion for negative and positive cosmological constant, respectively. Finally, we show that the Bargmann and Alice particle actions can be obtained from null reduction of a massless particle action in a relativistic spacetime with one and two times. Our results indicate that in 10 dimensions, the Alice particle is a decoupling limit of a D$0{}^*$-brane in Hull's type IIA${}^*$ theory, similar to how the Bargmann particle is related to a D$0$-brane in type IIA string theory.", "url": "https://arxiv.org/abs/2607.05115", "type": "理论", "summary": "广义而言，也称为 $p$ 膜伽利略极限，光速 $c$ 在横向于 $(p+1)$ 维洛伦兹世界体积的方向上变得无穷大。在本文中，我们解释了允许世界体积为欧几里得，因此时间是横向的，$p$-膜伽利略极限变成卡罗尔极限，我们将其称为“欧几里德$p$-膜卡罗尔极限”，其中$c$在$p+1$世界体积方向趋于零。这导致了采用伽利略和卡罗尔极限的统一方法，我们探索 $p=0$ 的后果。我们证明，由欧几里得 0 膜卡罗尔极限产生的时空对称性可以集中扩展到我们所说的爱丽丝代数，类似于巴格曼代数如何集中扩展伽利略对称性。这就产生了爱丽丝粒子的新概念，我们从相对论大质量粒子或快子的作用的统一极限中获得了巴格曼和爱丽丝粒子作用，并适当地耦合到一种形式的规范势。\n\n在存在宇宙学常数的情况下，我们发现巴格曼和爱丽丝粒子分别在负宇宙学常数和正宇宙学常数下经历稳定运动。最后，我们证明了巴格曼和爱丽丝粒子作用可以通过一倍和两倍相对论时空中无质量粒子作用的零约化来获得。我们的结果表明，在 10 维中，爱丽丝粒子是赫尔 IIA${}^*$ 型理论中 D$0{}^*$-膜的解耦极限，类似于巴格曼粒子与 IIA 型弦理论中 D$0$-膜的关系。", "authors": [{"name": "Eric A. Bergshoeff"}, {"name": "Luca Romano"}, {"name": "Jan Rosseel"}, {"name": "Elena Simón Félix"}, {"name": "Sara Zeko"}], "featured_authors": [{"name": "Eric A. Bergshoeff"}, {"name": "Luca Romano"}, {"name": "Jan Rosseel"}, {"name": "Elena Simón Félix"}, {"name": "Sara Zeko"}], "author_count": 5}, {"id": "2607.05136", "category": "hep-th", "title": "Chern Character for Discrete Spectrum Partition Function", "abstract": "We establish a rigorous geometric correspondence between thermal partition functions of discrete-spectrum quantum systems with bounded ground energy and the Chern character of \"virtual physical sheaf\" over spacetime. By interpreting Hamiltonian dynamics as a $U(1)$-equivariant flow on the quantum phase space $\\mathbb{CP}^n$ and pushforward to spacetime, we show that the finite-temperature partition function emerges as the integral of the Chern character of \"virtual physical sheaf\" over spacetime. The construction extends naturally to infinite dimensions through trace class guaranteed by Weyl's aspmtotic law. Using the Grothendieck-Riemann-Roch formalism, we prove pushforward invariance of the Chern character under thermal compactification on arbitrary manifolds, providing a topological foundation for thermal traces in quantum field theory. This framework unifies spectral theory with characteristic class theory, offering a geometric interpretation of partition functions based on operator-algebraic approach.", "url": "https://arxiv.org/abs/2607.05136", "type": "理论", "summary": "我们在具有有限地面能量的离散谱量子系统的热分配函数与时空中“虚拟物理层”的陈省身特征之间建立了严格的几何对应关系。通过将哈密顿动力学解释为量子相空间 $\\mathbb{CP}^n$ 上的 $U(1)$ 等变流并推进到时空，我们表明有限温度配分函数是“虚拟物理层”陈省身特性在时空上的积分。该结构通过外尔渐进定律保证的迹类自然地延伸到无限维度。利用 Grothendieck-Riemann-Roch 形式主义，我们证明了任意流形上热致紧化下陈省性的前推不变性，为量子场论中的热迹提供了拓扑基础。该框架将谱理论与特征类理论相结合，提供基于算子代数方法的配分函数的几何解释。", "authors": [{"name": "Shunrui Li"}, {"name": "Yang Liu"}], "featured_authors": [{"name": "Shunrui Li"}, {"name": "Yang Liu"}], "author_count": 2}, {"id": "2607.05143", "category": "hep-th", "title": "Effective Field Theory of Noncritical M-theory from Bosonization", "abstract": "We extend the coadjoint orbit approach to bosonization systematized by Delacretaz-Du-Mehta-Son to double-scaled non-relativistic Fermi liquids with central inverted harmonic oscillator potential. In 1+1d, this reproduces the Das-Jevicki collective field theory describing quasiparticle excitations of the $c=1$ matrix model. In 2+1d, this yields an effective field theory for noncritical M-theory, namely the 2+1d Fermi liquid proposed by Hořava and Keeler as a unified framework for characterizing noncritical string vacua. With a suitable gauge choice this theory reduces to a continuous family of 1+1d chiral bosons resembling Das-Jevicki collective fields coupled by additional interactions. Utilizing the underlying integrability of noncritical M-theory, we compute select fermion density correlation functions order-by-order in perturbation theory, and provide evidence that they agree with their Fermi liquid counterparts in a suitable semiclassical limit. This represents a step toward an effective spacetime gravity description of noncritical M-theory, which we expect to shed light on both the landscape of 2d noncritical strings and 3d quantum gravity in general.", "url": "https://arxiv.org/abs/2607.05143", "type": "理论", "summary": "我们将由 Delacretaz-Du-Mehta-Son 系统化的共伴轨道方法扩展到具有中心倒谐振子势的双尺度非相对论费米液体。在 1+1d 中，这再现了描述 $c=1$ 矩阵模型的准粒子激发的 Das-Jevicki 集体场论。在 2+1d 中，这产生了非临界 M 理论的有效场论，即 Hořava 和 Keeler 提出的 2+1d 费米液体，作为表征非临界弦真空的统一框架。通过选择合适的规范，该理论可简化为 1+1d 手性玻色子的连续族，类似于通过附加相互作用耦合的 Das-Jevicki 集体场。利用非临界 M 理论的潜在可积性，我们在微扰理论中按顺序计算选定的费米子密度相关函数，并提供证据证明它们在适当的半经典极限下与费米液体对应函数一致。这代表着向非临界 M 理论的有效时空引力描述迈出了一步，我们期望该理论能够阐明 2d 非临界弦和 3d 量子引力的总体情况。", "authors": [{"name": "Patrick Jefferson"}, {"name": "Tokiro Numasawa"}], "featured_authors": [{"name": "Patrick Jefferson"}, {"name": "Tokiro Numasawa"}], "author_count": 2}, {"id": "2607.05225", "category": "hep-th", "title": "A Century of Group Theory in Particle Physics and Beyond", "abstract": "The development of Group Theory in Mathematics as well as its impact in Physics has been spectacular during the twentieth century, and more particularly these last fifty years. If its contribution to Particle Physics deserves a special consideration, its usefulness cannot be neglected in other domains like Statistical Physics for example, and might also be of interest in Theoretical Biology. Some of these aspects will be examined.", "url": "https://arxiv.org/abs/2607.05225", "type": "理论", "summary": "群论在数学中的发展及其对物理学的影响在二十世纪，特别是最近五十年是引人注目的。如果它对粒子物理学的贡献值得特别考虑，那么它在统计物理学等其他领域的用处也不容忽视，并且在理论生物学中也可能会引起人们的兴趣。将审查其中一些方面。", "authors": [{"name": "Paul Sorba"}], "featured_authors": [{"name": "Paul Sorba"}], "author_count": 1}, {"id": "2607.05258", "category": "hep-th", "title": "Thermal two-point functions in SYK and complex-time singularities", "abstract": "We analyze the finite-temperature two-point function of the large-$N$ SYK model at intermediate couplings away from the infrared fixed point. Specifically, we examine its analytic structure in the complex time plane, tracking the complex-time singularities over a range of temperatures. The location of the leading singularity lies on the imaginary axis. It controls the short-time dynamics of operator complexity, defining an `effective temperature' for the correlator. The next-to-leading singularity lies outside the thermal strip set by the above effective temperature. It has been argued that this could be interpreted in terms of bouncing null geodesics in the emergent black hole geometry. Both these singularities persist all the way down to zero temperature. We discuss our observations and motivate the related emergent geometry using a kinematic space perspective.", "url": "https://arxiv.org/abs/2607.05258", "type": "理论", "summary": "我们分析了大$N$ SYK 模型在远离红外固定点的中间耦合处的有限温度两点函数。具体来说，我们检查其在复杂时间平面中的解析结构，跟踪一定温度范围内的复杂时间奇点。主奇点的位置位于虚轴上。它控制算子复杂性的短时动态，定义相关器的“有效温度”。次要的奇点位于由上述有效温度设定的隔热条之外。有人认为，这可以用新兴黑洞几何中的弹跳零测地线来解释。这两个奇点一直持续到零温度。我们讨论我们的观察结果，并使用运动学空间视角激发相关的新兴几何学。", "authors": [{"name": "Ilija Burić"}, {"name": "Chi-Ming Chang"}, {"name": "Ivan Gusev"}, {"name": "Elizabeth Helfenberger"}, {"name": "Andrei Parnachev"}, {"name": "Mukund Rangamani"}], "featured_authors": [{"name": "Ilija Burić"}, {"name": "Chi-Ming Chang"}, {"name": "Ivan Gusev"}, {"name": "Elizabeth Helfenberger"}, {"name": "Andrei Parnachev"}, {"name": "Mukund Rangamani"}], "author_count": 6}, {"id": "2607.05294", "category": "hep-th", "title": "Polynomial Initial-State Jumps and Christoffel Transforms in Krylov Complexity", "abstract": "State Krylov, or spread, complexity is a property of a pair $(H,\\ket{K_0})$ rather than of the Hamiltonian alone. Thus, changing the initial state at fixed $H$ generally changes the Lanczos coefficients and the ordered Krylov basis. We solve this relative initial-state problem for normalized polynomial filters, $\\ket{\\psi_Q}=Q(H)\\ket{K_0}/\\sqrt{N_Q}$ with $N_Q=\\langle K_0|Q(H)^\\dagger Q(H)|K_0\\rangle$. The filtered spectral measure is the positive polynomial modification $|Q(E)|^2\\mathrm d\\mu(E)/N_Q$, and orthogonality turns this measure change into a finite-band transfer from reference Fourier-orthogonal-polynomial moments to shifted Krylov amplitudes. We derive exact finite sums for individual amplitudes and projected Christoffel-Darboux kernels for cumulative probabilities and spread complexity. The formulae cover confluent roots, complex seed coefficients, support loss, and terminal quotients in finite dimensions. We evaluate the construction in three canonical Jacobi families, the Heisenberg--Weyl/Charlier oscillator, the compact $SU(2)$/Krawtchouk spin, and the constant-coefficient tight-binding/Chebyshev chain, with a Hermite central-limit scaling of Charlier as a continuous-spectrum check of this Christoffel jump machinery. Finite seed families are organized by a matrix-valued parent measure whose scalar compressions recover the individual shifted problems. The fixed-inner-product construction carries over to operator Krylov complexity after the replacement \\(H\\mapsto\\mathcal L\\) and \\(\\ket{K_0}\\mapsto O\\); polynomial seeds then become nested-commutator descendants \\(Q(\\mathcal L)O\\). The result is an exact relative calculus in which a solved cyclic problem generates a family of polynomially related initial-state dynamics without repeating Lanczos in the original Hilbert space.", "url": "https://arxiv.org/abs/2607.05294", "type": "理论", "summary": "状态 Krylov 或扩展复杂度是一对 $(H,\\ket{K_0})$ 的属性，而不是单独的哈密顿量的属性。因此，改变固定 $H$ 的初始状态通常会改变 Lanczos 系数和有序 Krylov 基。我们用 $N_Q=\\langle K_0|Q(H)^\\dagger Q(H)|K_0\\rangle$ 解决归一化多项式滤波器 $\\ket{\\psi_Q}=Q(H)\\ket{K_0}/\\sqrt{N_Q}$ 的相对初始状态问题。滤波后的频谱测量是正多项式修改 $|Q(E)|^2\\mathrm d\\mu(E)/N_Q$，正交性将此测量变化转换为从参考傅立叶正交多项式矩到平移 Krylov 幅度的有限带转移。我们推导出各个振幅的精确有限和以及累积概率和扩展复杂度的投影 Christoffel-Darboux 核。这些公式涵盖了汇合根、复数种子系数、支撑损失和有限维度的末端商。\n\n我们评估了三个规范雅可比族的结构，即海森堡-韦尔/查理尔振荡器、紧凑的$SU(2)$/Krawtchouk自旋和常数系数紧束缚/切比雪夫链，并使用查理尔的埃尔米特中心极限缩放作为克里斯托菲尔跳跃机械的连续谱检查。有限种子族由矩阵值父度量组织，其标量压缩恢复各个转移问题。在替换 \\(H\\mapsto\\mathcal L\\) 和 \\(\\ket{K_0}\\mapsto O\\) 后，固定内积构造将复杂性转移到算子 Krylov 上；然后多项式种子成为嵌套交换子后代 \\(Q(\\mathcal L)O\\)。结果是一个精确的相对微积分，其中解决的循环问题生成一系列多项式相关的初始状态动力学，而无需在原始希尔伯特空间中重复 Lanczos。", "authors": [{"name": "Abhishek Chowdhury"}, {"name": "Ajit Prasad Mahapatra"}], "featured_authors": [{"name": "Abhishek Chowdhury"}, {"name": "Ajit Prasad Mahapatra"}], "author_count": 2}, {"id": "2607.05327", "category": "hep-th", "title": "Cosmological Correlators in KLF and the Double-Exchange", "abstract": "In this work, we present the procedure to find series representations of tree-level cosmological correlators using the Kontorovich-Lebedev-Fourier (KLF) space formalism. This framework allows us to trade the in-in nested time integrals for frequency integrals over rational propagators and vertex functions, which encode interactions among quantum fields on a de Sitter background. Because these functions are the key objects to understand in order to perform a diagrammatic computation, we derive their relevant analytic properties by using both their integral representation and series representation in terms of Lauricella functions. For a vertex involving any number of fields, we obtain the location of singularities, the corresponding residues and the large-frequency asymptotic behaviour. Gathering these properties at each frequency integration allows us to compute a tree-level correlator directly, without relying on the differential equations it satisfies. To illustrate this procedure, we provide a complete treatment of the double-exchange diagram. The computation naturally distinguishes the different physical contributions, whether to the background or to the cosmological collider signal. The newly derived result is expressed at most in terms of a double series over hypergeometric functions, which simplifies the analytical expression of the correlator.", "url": "https://arxiv.org/abs/2607.05327", "type": "理论", "summary": "在这项工作中，我们提出了使用 Kontorovich-Lebedev-Fourier (KLF) 空间形式主义查找树级宇宙学相关器的级数表示的过程。该框架允许我们将内嵌嵌套时间积分换成有理传播器和顶点函数上的频率积分，这些传播器和顶点函数对德西特背景上的量子场之间的相互作用进行编码。由于这些函数是执行图解计算时需要理解的关键对象，因此我们通过使用 Lauricella 函数的积分表示和级数表示来推导它们的相关分析属性。对于涉及任意数量域的顶点，我们获得奇点的位置、相应的留数和大频率渐近行为。在每个频率积分处收集这些属性使我们能够直接计算树级相关器，而不依赖于它满足的微分方程。为了说明这个过程，我们提供了双交换图的完整处理。\n\n计算自然地区分了不同的物理贡献，无论是对背景还是对宇宙对撞机信号。新导出的结果最多用超几何函数的双级数来表示，这简化了相关器的解析表达式。", "authors": [{"name": "Nathan Belrhali"}, {"name": "Arthur Poisson"}, {"name": "Sébastien Renaux-Petel"}], "featured_authors": [{"name": "Nathan Belrhali"}, {"name": "Arthur Poisson"}, {"name": "Sébastien Renaux-Petel"}], "author_count": 3}, {"id": "2607.05338", "category": "hep-th", "title": "Does QFT make sense in non-integer dimensions?", "abstract": "We revisit the old problem of analytically continuing QFTs to fractional dimension $d\\in\\mathbb C$. We observe that common theories like QCD and QED have branch cuts in the complex $d$ plane. In particular, many operators in their low-energy CFT have OPEs and scaling dimensions that jump as a function of $d$.", "url": "https://arxiv.org/abs/2607.05338", "type": "理论", "summary": "我们重新审视分数维 $d\\in\\mathbb C$ 的解析连续 QFT 的老问题。我们观察到 QCD 和 QED 等常见理论在复杂的 $d$ 平面上有分支切割。特别是，许多低能量 CFT 中的算子具有作为 $d$ 函数跳跃的 OPE 和缩放维度。", "authors": [{"name": "Diego Delmastro"}, {"name": "Yan-Yan Li"}, {"name": "Dikshant Rathore"}], "featured_authors": [{"name": "Diego Delmastro"}, {"name": "Yan-Yan Li"}, {"name": "Dikshant Rathore"}], "author_count": 3}, {"id": "2607.05385", "category": "hep-th", "title": "Charge-Sector Construction of the Type-IIB Axion--Dilaton Wormhole Partition Function", "abstract": "I construct the Type-IIB axion--dilaton wormhole partition function from charge-sector data. In a chosen axion charge, equivalently form-field flux sector, the long-distance saddle calculation supplies a two-end operator term with coefficient matrix \\(C^{ij}_\\nu\\). The labels \\(i,j\\) label end-insertion operators; the labels \\(A,B\\) label parent universes. Reduction data \\(b\\) convert this matrix into scalar coefficients \\(W_\\nu[b]\\). The wormhole partition function in the theta variable is \\(Z_{\\rm wh}(\\theta;b)=\\sum_\\nu W_\\nu[b]\\e^{i\\nu\\theta}\\). I analyze properties and constraints this coefficients satisfy: discrete-symmetry covariance, phase, absolute bounds, moment positivity, Cauchy--Schwarz inequalities for the unreduced coefficient matrix, complex-\\(\\theta\\) domains, charge-lattice tails, and the dilute Bessel/Skellam limit. The \\(\\theta\\)-dependence of the wormhole partition function is the Fourier transform of the charge-sector scalar coefficients.", "url": "https://arxiv.org/abs/2607.05385", "type": "理论", "summary": "我根据电荷扇区数据构建了 IIB 型轴子——膨胀虫洞分区函数。在选定的轴子电荷中，相当于形成场通量扇区，长距离鞍计算提供了带有系数矩阵 \\(C^{ij}_\\nu\\) 的两端算子项。标签 \\(i,j\\) 标签末端插入运算符；标签 \\(A,B\\) 标记父宇宙。约简数据\\(b\\)将此矩阵转换为标量系数\\(W_\\nu[b]\\)。 theta 变量中的虫洞配分函数为 \\(Z_{\\rm wh}(\\theta;b)=\\sum_\\nu W_\\nu[b]\\e^{i\\nu\\theta}\\)。我分析了该系数满足的属性和约束：离散对称协方差、相位、绝对界限、矩正性、未约简系数矩阵的柯西-施瓦茨不等式、复\\(\\theta\\)域、电荷晶格尾部和稀释贝塞尔/斯凯拉姆极限。虫洞配分函数的\\(\\theta\\)依赖性是电荷扇区标量系数的傅里叶变换。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2607.05395", "category": "hep-th", "title": "Liénard--Wiechert fields in AdS and flat-space antipodal matching from geodesic-centered Coulombic data", "abstract": "We give a geometric derivation of Li'enard--Wiechert fields in flat space and in global AdS, emphasizing the origin of antipodal matching. In flat space, the field of a uniformly moving charge is obtained by using coordinates centered on the source timelike geodesic, where the charge is at rest and the solution is the ordinary Coulomb field. The nontrivial angular dependence of the leading data at null infinity arises only after rewriting this static solution in a non-centered frame, making the antipodal matching condition transparent. We extend the same construction to global AdS, where uniform motion is replaced by motion along a timelike geodesic. Starting from the static Maxwell solution at the AdS center, we use geodesic-adapted coordinates and embedding-space invariants to reconstruct the field in arbitrary global coordinates. This yields a closed-form AdS analogue of the Coulombic Li'enard--Wiechert field, including the gauge-invariant component $F_{\\rho\\tau}$. We show that the bulk field satisfies exact antipodal covariance, and that its null-fringe limit reproduces the standard flat-space antipodal matching relation between the Coulombic data at $\\mathscr I^+*-$ and $\\mathscr I^-*+$. We also describe an image-charge interpretation of the Coulomb seed, giving a unified picture of Coulombic fields, antipodal matching, and the AdS-to-flat-space limit.", "url": "https://arxiv.org/abs/2607.05395", "type": "理论", "summary": "我们给出了平坦空间和全局AdS中Li'enard--Wiechert场的几何推导，强调了对映匹配的起源。在平坦空间中，均匀移动电荷的场是通过使用以源类时测地线为中心的坐标获得的，其中电荷处于静止状态，解是普通库仑场。只有在非中心坐标系中重写此静态解之后，才会出现零无穷远处前导数据的非平凡角度依赖性，从而使对映匹配条件变得透明。我们将相同的结构扩展到全局 AdS，其中匀速运动被沿着类时测地线的运动取代。从 AdS 中心的静态麦克斯韦解开始，我们使用测地线适应坐标和嵌入空间不变量来重建任意全局坐标中的场。这产生库仑 Li'enard-Wiechert 场的封闭形式 AdS 类似物，包括规范不变分量 $F_{\\rho\\tau}$。\n\n我们证明体场满足精确的对映协方差，并且其零边缘极限再现了 $\\mathscr I^+*-$ 和 $\\mathscr I^-*+$ 处库仑数据之间的标准平坦空间对映匹配关系。我们还描述了库仑种子的图像电荷解释，给出了库仑场、对映匹配和 AdS 到平坦空间限制的统一图像。", "authors": [{"name": "Sarthak Duary"}], "featured_authors": [{"name": "Sarthak Duary"}], "author_count": 1}, {"id": "2607.02700", "category": "math-ph", "title": "Van Vleck spectra of high-order Heun operators:\\ finite-band universality and exterior asymptotics", "abstract": "We study high-order analogues of the classical Heun operator of Fuchs index one, \\[ \\dq=\\sum_{i=1}^k Q_i(z)\\frac{d^i}{dz^i}, \\qquad °Q_i\\le i+1, \\qquad °Q_k=k+1. \\] For a fixed degree $n$ we consider the linear Van Vleck polynomials $V$ for which $\\dq+V$ has a polynomial solution of degree $n$, and we form the spectral polynomial $Sp_n$ whose zeros are the zeros of these Van Vleck polynomials. The main result is a finite-band determinant representation and the resulting universality theorem: after normalization, all fixed power sums of the zeros of $Sp_n$ have limits given by explicit constant-term formulae depending only on the leading coefficient $Q_k$. The lower coefficients of $\\dq$ enter only lower order correction terms. Combining this with the localization theorem for Van Vleck roots, we strengthen the usual germ-at-infinity conclusion to locally uniform convergence of the normalized Cauchy transforms and logarithmic potentials on the whole exterior of the convex hull of the zeros of $Q_k$. We also prove a determinacy criterion: if the spectral roots are asymptotically confined to a compact set with empty interior and connected complement, then the finite-band moments determine the actual weak limit. In particular, when the zeros of $Q_k$ are collinear the root-counting measures of $Sp_n$ converge weakly to a probability measure supported on the corresponding segment; this limit is independent of all lower coefficients of $\\dq$. Finally, we prove holonomicity of the exterior Cauchy transform and derive Picard--Fuchs equations for the WKB periods, with an explicit third-order equation in the first non-classical case $k=3$. The paper ends with a precise mother-body conjecture for the genuinely complex case, clearly separated from the unconditional results.", "url": "https://arxiv.org/abs/2607.02700", "type": "理论", "summary": "我们研究 Fuchs 指数一的经典 Heun 算子的高阶类似物， \\[ \\dq=\\sum_{i=1}^k Q_i(z)\\frac{d^i}{dz^i}, \\qquad °Q_i\\le i+1, \\qquad °Q_k=k+1。 \\] 对于固定次数 $n$，我们考虑线性 Van Vleck 多项式 $V$，其中 $\\dq+V$ 具有 $n$ 次数的多项式解，并且我们形成谱多项式 $Sp_n$，其零点是这些 Van Vleck 多项式的零点。主要结果是有限带行列式表示和由此产生的普遍性定理：归一化后，$Sp_n$ 的零点的所有固定幂和都具有由仅取决于首项系数 $Q_k$ 的显式常数项公式给出的限制。 $\\dq$ 的较低系数仅输入较低阶校正项。将此与 Van Vleck 根的局域化定理相结合，我们强化了通常的无穷远萌芽结论，即归一化柯西变换和 $Q_k$ 零点凸包的整个外部上的对数势的局部一致收敛。\n\n我们还证明了一个确定性标准：如果谱根渐进地限制在一个具有空内部和连通补集的紧集上，那么有限带矩决定了实际的弱极限。特别是，当 $Q_k$ 的零点共线时，$Sp_n$ 的根计数度量弱收敛到相应段上支持的概率度量；该限制与 $\\dq$ 的所有较低系数无关。最后，我们证明了外柯西变换的完整性，并推导了 WKB 周期的 Picard--Fuchs 方程，并在第一个非经典情况 $k=3$ 中给出了显式三阶方程。论文最后对真正复杂的情况提出了精确的母体猜想，与无条件结果明显分开。", "authors": [{"name": "Boris Shapiro"}], "featured_authors": [{"name": "Boris Shapiro"}], "author_count": 1}, {"id": "2607.02737", "category": "math-ph", "title": "Transition-Set Morphometry for Inter-Scale Contacts in Digital Sandstones", "abstract": "This paper introduces a transition-set morphometry for quantifying inter-scale contacts in digital sandstones. Pore volume, a medial pore-throat subsystem, and fracture porosity are treated as distinct geometric subsystems. Their finite-neighborhood contacts are represented by transition sets such as $T_{VL}$, $T_{VF}$, and, when a residual skeleton is resolved, $T_{LF}$. The method measures the density, finite-scale dimension, and weighted contact measures of these sets. A matrix-mode test was performed on 21 digital sandstone samples from the Imperial College micro-CT collection and Digital Porous Media Portal dataset DRP-317. Permeability, expressed as $\\log_{10}K$, served as an external response for assessing how much structural information the descriptors carry. The transition dimension $d_{VL}$ alone produced little independent predictive gain, whereas contact measures combining transition-set density with local pore radius were more informative. The adaptive measure $\\widehat C_{VL}^{(d+1)}=\\mu_{VL}(\\overline D_{VL}/D_*)^{d_{VL}+1}$ increased leave-one-out $R^2$ from 0.752 to 0.881 in the combined sample and from 0.287 to 0.807 within DRP-317. Fractured datasets DRP-5, DRP-31, and DRP-285 were then used to test the transfer of the same transition-set construction to fracture-related contacts. The results support transition sets as reproducible morphometric descriptors of inter-scale contact.", "url": "https://arxiv.org/abs/2607.02737", "type": "理论", "summary": "本文介绍了一种用于量化数字砂岩中尺度间接触的过渡集形态测量方法。孔隙体积、中间孔喉子系统和裂缝孔隙度被视为不同的几何子系统。它们的有限邻域接触由转移集表示，例如$T_{VL}$、$T_{VF}$，并且当解析残余骨架时，$T_{LF}$。该方法测量这些集合的密度、有限尺度维度和加权接触度量。对来自帝国理工学院微型 CT 收藏和数字多孔介质门户数据集 DRP-317 的 21 个数字砂岩样本进行了矩阵模式测试。渗透率表示为 $\\log_{10}K$，作为评估描述符携带多少结构信息的外部响应。单独的过渡维度 $d_{VL}$ 几乎没有产生独立的预测增益，而将过渡集密度与局部孔隙半径相结合的接触测量则提供了更多信息。自适应措施 $\\widehat C_{VL}^{(d+1)}=\\mu_{VL}(\\overline D_{VL}/D_*)^{d_{VL}+1}$ 将组合样本中的留一 $R^2$ 从 0.752 增加到 0.881，在 DRP-317 中从 0.287 增加到 0.807。\n\n然后使用断裂数据集 DRP-5、DRP-31 和 DRP-285 来测试相同过渡集结构向断裂相关接触的转移。结果支持过渡集作为尺度间接触的可重复形态测量描述符。", "authors": [{"name": "O. M. Kiselev"}], "featured_authors": [{"name": "O. M. Kiselev"}], "author_count": 1}, {"id": "2607.02849", "category": "math-ph", "title": "A new PBW basis for the alternating central extension of the $q$-Onsager algebra", "abstract": "We establish a new PBW basis for $\\mathcal A_q$, the alternating central extension of the $q$-Onsager algebra. Terwilliger showed that the alternating generators form a PBW basis in the block order $\\mathcal G<\\mathcal W^-<\\mathcal W^+<\\widetilde{\\mathcal G}$. We prove that they also form a PBW basis in the different block order $\\mathcal W^-<\\mathcal G<\\widetilde{\\mathcal G}<\\mathcal W^+$. Consequently, multiplication induces a vector-space isomorphism \\[ \\mathcal W^-\\otimes\\mathcal G\\otimes\\widetilde{\\mathcal G}\\otimes\\mathcal W^+ \\longrightarrow \\mathcal A_q, \\] thereby confirming a conjecture of Terwilliger.", "url": "https://arxiv.org/abs/2607.02849", "type": "理论", "summary": "我们为 $\\mathcal A_q$ 建立了一个新的 PBW 基础，$q$-Onsager 代数的交替中心扩展。 Terwilliger 证明，交替生成器以块顺序 $\\mathcal G<\\mathcal W^-<\\mathcal W^+<\\widetilde{\\mathcal G}$ 形成 PBW 基础。我们证明它们也以不同的块顺序 $\\mathcal W^-<\\mathcal G<\\widetilde{\\mathcal G}<\\mathcal W^+$ 形成 PBW 基础。因此，乘法导致向量空间同构 \\[ \\mathcal W^-\\otimes\\mathcal G\\otimes\\widetilde{\\mathcal G}\\otimes\\mathcal W^+ \\longrightarrow \\mathcal A_q, \\] 从而证实了 Terwilliger 的猜想。", "authors": [{"name": "Haoran Zhu"}], "featured_authors": [{"name": "Haoran Zhu"}], "author_count": 1}, {"id": "2607.03507", "category": "math-ph", "title": "The Oracle Theorem for Matrix-Valued Jacobi Operators", "abstract": "This paper develops the matrix-valued analogue of the reflectionless and oracle framework for Jacobi operators. Starting from matrix-valued Weyl--Titchmarsh $m$-functions on the Siegel upper half-space, we study the distance-decreasing action of transfer matrices, matrix-valued harmonic measures and value distribution convergence. These ingredients are then used to establish the reflectionless property of the $\\omega$-limit set and to prove an Oracle Theorem for matrix-valued Jacobi operators with absolutely continuous spectrum of full multiplicity.", "url": "https://arxiv.org/abs/2607.03507", "type": "理论", "summary": "本文开发了雅可比算子的无反射和预言机框架的矩阵值模拟。从西格尔上半空间上的矩阵值 Weyl--Titchmarsh $m$ 函数出发，我们研究了传递矩阵的距离递减作用、矩阵值调和度量和值分布收敛。然后，使用这些成分来建立 $\\omega$ 极限集的无反射属性，并证明具有完全多重性的绝对连续谱的矩阵值雅可比算子的 Oracle 定理。", "authors": [{"name": "Silas L. Carvalho"}, {"name": "Douglas C. P. Freitas"}], "featured_authors": [{"name": "Silas L. Carvalho"}, {"name": "Douglas C. P. Freitas"}], "author_count": 2}, {"id": "2607.03546", "category": "math-ph", "title": "Anomalous rate of eigenstate thermalisation at singularities of the density of states", "abstract": "We prove the Eigenstate Thermalisation Hypothesis (ETH), also known as Quantum Unique Ergodicity (QUE), for large $N\\times N$ mean-field random matrices with general correlation structure. We identify the microcanonical ensemble and establish the optimal fluctuation scale of eigenvector overlaps around it. Our results invalidate the prediction by Feingold and Peres [Phys. Rev. A 34, 591 (1986)] in the physics literature of quantum chaos, based upon popular semiclassical theory, and uncover the genuine mechanism which relies on multi-resolvent local laws. Although fluctuations are expected to increase as the density of states vanishes, and indeed scale as $N^{-1/2}$ in the special cusp regime, rather than $N^{-1}$ in the bulk, we find, unexpectedly, that the same $N^{-1}$ rate persists at regular spectral edges. Hence, generically, in the absence of cusps, the entire eigenbasis fluctuates on the same scale as a Haar unitary. This anomaly stems from delicate cancellations in the solution of the underlying matrix Dyson equation, which form the core of our analysis.", "url": "https://arxiv.org/abs/2607.03546", "type": "理论", "summary": "我们针对具有一般相关结构的大型 $N\\times N$ 平均场随机矩阵证明了本征态热化假设 (ETH)，也称为量子唯一遍历性 (QUE)。我们识别微正则系综并建立其周围特征向量重叠的最佳波动尺度。我们的结果使 Feingold 和 Peres 的预测无效 [Phys. Rev. A 34, 591 (1986)]在量子混沌物理文献中，基于流行的半经典理论，揭示了依赖于多解析局部定律的真正机制。尽管波动预计会随着态密度的消失而增加，并且在特殊尖点区域中确实会按 $N^{-1/2}$ 缩放，而不是在整体中按 $N^{-1}$ 缩放，但我们意外地发现，相同的 $N^{-1}$ 速率在规则的光谱边缘仍然存在。因此，一般来说，在没有尖点的情况下，整个特征基的波动与哈尔酉的尺度相同。这种异常现象源于底层矩阵戴森方程解中的微妙抵消，该方程构成了我们分析的核心。", "authors": [{"name": "László Erdős"}, {"name": "Joscha Henheik"}, {"name": "Volodymyr Riabov"}], "featured_authors": [{"name": "László Erdős"}, {"name": "Joscha Henheik"}, {"name": "Volodymyr Riabov"}], "author_count": 3}, {"id": "2607.04349", "category": "math-ph", "title": "The Dirichlet Laplacian with a point interaction on unbounded Lipschitz domains", "abstract": "We study one-centre point interactions for the Dirichlet Laplacian on unbounded domains in dimensions two and three, with emphasis on exterior domains and special Lipschitz domains. These operators are singular perturbations constructed as self-adjoint extensions of the Dirichlet Laplacian restricted to functions vanishing at the interaction centre, and their resolvents are given by an explicit Kre\\uın formula with a single extension parameter $\\alpha$. The negative spectrum is completely characterized by a scalar equation and the critical coupling $\\alpha$ separating binding from non-binding is the threshold limit of the Weyl function appearing in the Kre\\uın formula. We establish domain monotonicity of the Weyl function, of the critical coupling, and of the unique negative eigenvalue when existing, and we derive sharp near-boundary asymptotics of the critical coupling in uniformly $C^{1,1}$ geometries. These estimates imply that, for every fixed coupling, nonpositive spectrum disappears when the interaction centre approaches the Dirichlet boundary. We also prove limiting absorption principles and purely absolutely continuous positive spectrum for a point-interaction in exterior domains case and in classes of special Lipschitz domains. We also analyze in depth several threshold phenomena. We show that the critical coupling is governed by the far-field behavior of the zero-energy Green function: exterior domains give threshold resonances, domains contained in a three-dimensional half-space give threshold eigenvalues, the half-plane gives a $p$-wave resonance, and planar wedges exhibit types of threshold states that are aperture-dependent. Finally, low-energy resolvent expansions are computed in the model cases and persistence or disappearance of eigenvalues at threshold are studied. The present paper seems to be the first systematic work on the subject.", "url": "https://arxiv.org/abs/2607.04349", "type": "理论", "summary": "我们研究二维和三维无界域上狄利克雷拉普拉斯算子的一​​中心点相互作用，重点关注外部域和特殊 Lipschitz 域。这些算子是奇异扰动，被构造为狄利克雷拉普拉斯算子的自伴扩展，仅限于在相互作用中心消失的函数，并且它们的求解由具有单个扩展参数 $\\alpha$ 的显式 Kre\\uın 公式给出。负谱完全由标量方程来表征，而将结合与非结合分开的临界耦合 $\\alpha$ 是 Kre\\uın 公式中出现的 Weyl 函数的阈值极限。我们建立了 Weyl 函数、临界耦合和唯一负特征值（当存在时）的域单调性，并推导出均匀 $C^{1,1}$ 几何中临界耦合的尖锐近边界渐近性。这些估计意味着，对于每个固定耦合，当相互作用中心接近狄利克雷边界时，非正谱消失。\n\n我们还证明了外部域情况和特殊 Lipschitz 域类中点相互作用的限制吸收原理和纯绝对连续正谱。我们还深入分析了几种阈值现象。我们表明，临界耦合受零能量格林函数的远场行为控制：外部域给出阈值共振，三维半空间中包含的域给出阈值特征值，半平面给出$p$波共振，平面楔子表现出与孔径相关的阈值状态类型。最后，在模型情况下计算低能解析展开式，并研究阈值处特征值的持续或消失。本文似乎是关于该主题的第一篇系统性著作。", "authors": [{"name": "Diego Noja"}, {"name": "Francesco Raso Stoia"}], "featured_authors": [{"name": "Diego Noja"}, {"name": "Francesco Raso Stoia"}], "author_count": 2}, {"id": "2607.04521", "category": "math-ph", "title": "Hyperbolic Completion of Newton's Off-Center Orbit Problem: $SO(2,1)$ Symmetry, Inversion Duality, and Magnetic Classification", "abstract": "We resolve the hyperbolic off-center-orbit problem for the singular potential \\[ V(r)=-\\frac{\\alpha}{(R^2-r^2)^2},\\qquad \\alpha>0. \\] At zero energy, the Jacobi metric has constant negative curvature on both components separated by $r=R$. The interior Jacobi metric is a constant multiple of the Poincaré disk metric, while circular inversion maps the exterior isometrically to the punctured disk. We classify all zero-energy trajectories: nonradial orbits are arcs of Euclidean circles orthogonal to $r=R$, radial trajectories lie on lines through the origin, and the force center lies outside every nonradial supporting circle. An explicit Runge--Lenz-type moment map closes into $\\mathfrak{so}(2,1)$, whose Casimir is the hyperbolic geodesic Hamiltonian. The canonical cotangent lift of inversion preserves the symmetry generators and maps the zero-energy flow to itself up to positive time reparametrization. The singular circle is reached in finite Newtonian time but lies at infinite Jacobi distance. Quantum mechanically, we distinguish the Stäckel coupling transform from a genuine unitary equivalence, whose Euclidean representative is a divergence-form operator rather than the naive flat Schrödinger operator. The bottom of the hyperbolic continuum maps to the Hardy/oscillation threshold of the inverse-square boundary model. Finally, the symmetry-preserving radial magnetic field becomes a constant intrinsic field on the hyperbolic plane. Its shifted Casimir classifies the trajectories as closed magnetic circles, horocycles, or open hypercycles, with zero-field geodesics as the limiting case and a transition at $Q^2=8m\\alpha R^2$. Numerical integrations confirm the orbit equations and conserved quantities.", "url": "https://arxiv.org/abs/2607.04521", "type": "理论", "summary": "我们解决了奇异势 \\[ V(r)=-\\frac{\\alpha}{(R^2-r^2)^2},\\qquad \\alpha>0 的双曲偏心轨道问题。 \\] 在零能量时，雅可比度量在由 $r=R$ 分隔的两个分量上具有恒定的负曲率。内部雅可比度量是庞加莱圆盘度量的常数倍，而圆形反演将外部等距映射到穿孔圆盘。我们对所有零能量轨迹进行分类：非径向轨道是与 $r=R$ 正交的欧几里得圆弧，径向轨迹位于通过原点的直线上，力中心位于每个非径向支撑圆之外。显式龙格-伦茨型矩图逼近$\\mathfrak{so}(2,1)$，其卡西米尔是双曲测地线哈密顿量。反演的正则余切升力保留了对称生成器，并将零能量流映射到自身直至正时间重参数化。奇异圆在有限的牛顿时间内到达，但位于无限的雅可比距离。\n\n在量子力学上，我们将 Stäckel 耦合变换与真正的酉等价区分开来，其欧几里得代表是散度形式算子，而不是朴素的平坦薛定谔算子。双曲连续体的底部映射到平方反比边界模型的 Hardy/振荡阈值。最后，保持对称的径向磁场成为双曲平面上的恒定本征场。其移动的卡西米尔轨迹将轨迹分类为闭合磁圈、半圆或开放超循环，以零场测地线为极限情况，并在 $Q^2=8m\\alpha R^2$ 处进行转变。数值积分证实了轨道方程和守恒量。", "authors": [{"name": "Dipesh Bhandari"}], "featured_authors": [{"name": "Dipesh Bhandari"}], "author_count": 1}, {"id": "2607.04971", "category": "math-ph", "title": "Long-range interactions and Anderson localisation for one-dimensional high-contrast resonator chain", "abstract": "Spectral and transport properties of high-contrast resonator systems can be described in the subwavelength regime in terms of the so-called capacitance operator. In this paper, we consider an infinitely periodic chain of high-contrast resonators in three dimensions. The first result is a precise estimate of the off-diagonal decay rate of the capacitance operator $C$. Importantly, we demonstrate that the decay rate is long-range and critical: as $|n-m|\\to\\infty$, \\begin{equation*} C(n,m)\\sim \\frac{1}{|n-m|\\log^2|n-m|}, \\end{equation*} which is $\\ell^1$ summable but slower than quadratic. This borderline decay of the off-diagonal entries makes the present proof of Anderson localisation with arbitrary disorder, which is observed numerically in this paper, out of reach; we hope that this physical example of classical wave syst
