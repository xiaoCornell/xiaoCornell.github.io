dependent simulations. To resolve the ambiguity inherent in the reduced-zone representation, we introduce an unfolding procedure based on the harmonic decomposition of Floquet states, which recovers their underlying equilibrium band character beyond the reduced Floquet Brillouin zone. The reconstructed wavefunctions further provide access to the symmetry properties of individual light-induced sidebands. We demonstrate the applicability and generality of the method in first-principles time-dependent simulations of real materials, ranging from two-dimensional monolayers to a three-dimensional bulk semiconductor, and including finite pulses without strict time periodicity. This framework directly connects real-time simulations with Floquet observables, enabling practical analysis of light-driven electronic structure in materials.", "url": "https://arxiv.org/abs/2607.04269", "type": "理论+数值", "summary": "我们提出了一种实时 Floquet 分析方法，用于直接从传播的波函数中提取准能量和 Floquet 态。通过根据时间演化状态之间的重叠重建一周期演化算子，该方法避免了放大的 Floquet 哈密顿量的显式构造，并且为瞬态模拟添加了可忽略不计的计算开销。为了解决简化区域表示中固有的模糊性，我们引入了基于 Floquet 状态的调和分解的展开过程，该过程恢复了简化的 Floquet 布里渊区域之外的基本平衡带特征。重建的波函数进一步提供了对各个光感生边带的对称特性的访问。我们证明了该方法在真实材料的第一原理时间相关模拟中的适用性和通用性，范围从二维单层到三维体半导体，并包括没有严格时间周期性的有限脉冲。该框架直接将实时模拟与 Floquet 可观测值连接起来，从而能够对材料中的光驱动电子结构进行实际分析。", "authors": [{"name": "Ruipeng Li"}, {"name": "Benshu Fan"}, {"name": "Umberto De Giovannini"}, {"name": "Hannes Hübener"}, {"name": "Angel Rubio"}], "featured_authors": [{"name": "Ruipeng Li"}, {"name": "Benshu Fan"}, {"name": "Umberto De Giovannini"}, {"name": "Hannes Hübener"}, {"name": "Angel Rubio"}], "author_count": 5}, {"id": "2607.04288", "category": "cond-mat", "title": "Mass weighting algorithm optimizes Fourier-based physics-informed neural network in adhesive contact mechanics", "abstract": "Physics-informed neural networks (PINNs) for elastic contact mechanics suffer from a spectral stiffness imbalance,that is, the elastic kernel grows linearly with wave number, causing short-wavelength modes to dominate gradient updates and stall convergence of the macroscopic deformation. We introduce a spectral preconditioning strategy that reweights displacement gradients in Fourier space before back-propagation, amplifying low wavenumber components through a mass weighting (MW) function while suppressing sub-grid noise via a built-in low-pass filter. Applied to adhesive line contact problems, the mass weighted PINN reaches machine-zero residual loss within 400 Adam iterations for specified benchmark, whereas the reference benchmark stalls at three orders of magnitude higher loss. The converged displacement and contact stress fields agree quantitatively with Green's function molecular dynamics (GFMD) solutions for both smooth Hertz contact at pressures spanning tension to compression and rough surfaces with roughness covering several decades of wavelength. The method operates directly on a uniform real-space grid, requires no explicit Green's function integration or quadrature rules, and is formulated entirely in terms of minimising a scalar energy function. Extension to two-dimensional rough surfaces is direct, as both the Fourier elastic energy and the spectral preconditioner depend only on the wave-number magnitude.", "url": "https://arxiv.org/abs/2607.04288", "type": "理论+数值", "summary": "用于弹性接触力学的物理信息神经网络（PINN）存在谱刚度不平衡的问题，即弹性核随波数线性增长，导致短波长模式主导梯度更新和宏观变形的失速收敛。我们引入了一种光谱预处理策略，该策略在反向传播之前对傅立叶空间中的位移梯度进行重新加权，通过质量加权（MW）函数放大低波数分量，同时通过内置低通滤波器抑制子网格噪声。应用于粘合线接触问题时，质量加权 PINN 在指定基准的 400 Adam 迭代内达到机器零残余损耗，而参考基准则在高出三个数量级的损耗处停滞。收敛的位移和接触应力场与格林函数分子动力学 (GFMD) 解决方案在数量上一致，无论是在拉伸到压缩的压力下的平滑赫兹接触，还是粗糙度覆盖数十个波长的粗糙表面。\n\n该方法直接在均匀的实空间网格上运行，不需要明确的格林函数积分或求积规则，并且完全根据最小化标量能量函数来制定。扩展到二维粗糙表面是直接的，因为傅立叶弹性能和光谱预处理器仅取决于波数幅度。", "authors": [{"name": "Yunong Zhou"}, {"name": "Kaifeng Huang"}, {"name": "Chaofan Du"}, {"name": "Yang Xu"}, {"name": "Hengxu Song"}], "featured_authors": [{"name": "Yunong Zhou"}, {"name": "Kaifeng Huang"}, {"name": "Chaofan Du"}, {"name": "Yang Xu"}, {"name": "Hengxu Song"}], "author_count": 5}, {"id": "2607.04589", "category": "cond-mat", "title": "Synchro-nematic and -antinematic ordering of spheroidal circle swimmers", "abstract": "Chirality gives a microswimmer something a straight-line swimmer lacks: a phase. This variable both modulates, and is affected by, the hydrodynamic interactions between microswimmers. Here we ask what collective order emerges when many such chiral swimmers are free to move, and how the shape and actuation anisotropies of an individual swimmer dictate the outcome. Using a kinetic theory for hydrodynamically interacting circle swimmers, we show that the interplay between intrinsic rotation, stresslet flows, and Jeffery-like reorientation generates effective phase-locking interactions. Asymmetries in the actuation are encoded through a non-axisymmetric stresslet tensor. At the pair level, pusher swimmers select one of two synchronized states depending on particle shape and actuation asymmetry: in-phase/anti-phase locking, or quarter-shifted locking. Extending the analysis to many-body systems, we find that these pair-level synchronization mechanisms drive emergent collective phases. The swimmers develop global \\textit{synchro-nematic} order when the hydrodynamic coupling favors parallel or anti-parallel phase locking, and \\textit{synchro-antinematic} local order where quarter-shifted locking prevails. A coarse-grained field theory predicts the onset of nematic order through a hydrodynamic instability criterion. In addition, we find that the collective states exhibit crystalline or disordered hyperuniform structure arising from period-averaged hydrodynamic interactions that are effectively repulsive between swimmers. Lattice Boltzmann simulations of chiral oblate squirmers, resolving finite-size and near-field flows, recover the synchro-nematic ordering. Together, these results show how a swimmer's geometric and actuation anisotropies can be leveraged to program synchronization and spatiotemporal order in chiral active matter.", "url": "https://arxiv.org/abs/2607.04589", "type": "理论+数值", "summary": "手性为微型游泳者提供了直线游泳者所缺乏的东西：相位。该变量既调节微型游泳者之间的水动力相互作用，又受其影响。在这里，我们询问当许多这样的手性游泳者自由移动时会出现什么集体秩序，以及单个游泳者的形状和驱动各向异性如何决定结果。利用流体动力学相互作用的圆圈游泳者的动力学理论，我们证明了内在旋转、应力波流和杰弗里式重定向之间的相互作用产生了有效的锁相相互作用。驱动中的不对称性通过非轴对称应力波张量进行编码。在配对级别，推进器游泳者根据粒子形状和驱动不对称性选择两种同步状态之一：同相/反相锁定或四分之一移位锁定。将分析扩展到多体系统，我们发现这些配对级同步机制驱动了紧急集体阶段。\n\n当流体动力耦合有利于平行或反平行锁相时，游泳者形成全局\\textit{同步向列}顺序，并且在四分之一位移锁定盛行时形成\\textit{同步反运动}局部顺序。粗粒场理论通过流体动力学不稳定准则预测向列序的开始。此外，我们发现集体状态表现出结晶或无序的超均匀结构，这是由周期平均流体动力学相互作用产生的，这些相互作用在游泳者之间有效地相互排斥。手性扁圆蠕动体的格子玻尔兹曼模拟，解决了有限尺寸和近场流动，恢复了同步向列排序。总之，这些结果表明了如何利用游泳者的几何和驱动各向异性来编程手性活性物质中的同步和时空顺序。", "authors": [{"name": "Anson G. Thambi"}, {"name": "Alexander N. Dodge"}, {"name": "William E. Uspal"}], "featured_authors": [{"name": "Anson G. Thambi"}, {"name": "Alexander N. Dodge"}, {"name": "William E. Uspal"}], "author_count": 3}, {"id": "2607.04621", "category": "cond-mat", "title": "Orbital-Selective Mott and Antiferromagnetic Phases in Diagonally Compressed Kagome Lattice", "abstract": "We perform determinant quantum Monte Carlo simulations of the half-filled Hubbard model on a diagonally compressed kagome lattice, introducing exponential decay long-range hopping $t(r) = t_0 \\exp\\bigl(-r / r_0\\bigr)$ to account for the evolving bond length. By varying the lattice angle $\\theta$ and the on-site interaction $U$, double occupancy, charge compressibility, and spin-spin correlation functions of the whole system and each sub-lattice are measured. We find that geometric compression induces a clear sublattice differentiation: for $\\theta\\gtrsim52^\\circ$, the A sublattice establishes long-range hoppings, which in turn suppresses the metallic behavior of the $B/C$ sublattice and drives a selective Mott transition; for $\\theta\\lesssim52^\\circ$, the $B$-$C$ chains develop long-range antiferromagnetic correlations within the finite-size simulations, which in turn suppresses the metallic behavior of the $A$ sublattice and drives a selective Mott transition. The critical interaction $U^c_A$ for the $A$ sites decreases sharply near the onset of $B$-$C$ antiferromagnetic correlations, while $U^c_{B/C}$ increases. These competing orders give rise to an orbital-selective Mott phase and a rich $U$-$\\theta$ phase diagram featuring paramagnetic-metal, paramagnetic-Mott, antiferromagnetic-metal, and antiferromagnetic-Mott states. Our results highlight the complex interplay between lattice geometry, magnetic frustration, and strong correlations in frustrated two-dimensional systems.", "url": "https://arxiv.org/abs/2607.04621", "type": "理论+数值", "summary": "我们在对角压缩的 kagome 晶格上对半填充 Hubbard 模型进行行列式量子蒙特卡洛模拟，引入指数衰减长程跳跃 $t(r) = t_0 \\exp\\bigl(-r / r_0\\bigr)$ 来解释不断变化的键长。通过改变晶格角$\\theta$和现场相互作用$U$，测量整个系统和每个子晶格的双占据、电荷压缩性和自旋相关函数。我们发现几何压缩会引起明显的亚晶格分化：对于 $\\theta\\gtrsim52^\\circ$，A 亚晶格建立了长程跳跃，这反过来又抑制了 $B/C$ 亚晶格的金属行为并驱动选择性莫特跃迁；对于 $\\theta\\lesssim52^\\circ$，$B$-$C$ 链在有限尺寸模拟中形成长程反铁磁相关性，这反过来又抑制 $A$ 亚晶格的金属行为并驱动选择性莫特转变。 $A$ 位点的关键相互作用 $U^c_A$ 在接近 $B$-$C$ 反铁磁相关性开始时急剧下降，而 $U^c_{B/C}$ 则增加。\n\n这些竞争顺序产生了轨道选择性莫特相和丰富的 $U$-$\\theta$ 相图，其中包括顺磁金属、顺磁莫特、反铁磁金属和反铁磁莫特态。我们的结果强调了晶格几何、磁挫败和挫败二维系统中强相关性之间的复杂相互作用。", "authors": [{"name": "Jiewei Ding"}, {"name": "Ho-Kin Tang"}, {"name": "Wing Chi Yu"}], "featured_authors": [{"name": "Jiewei Ding"}, {"name": "Ho-Kin Tang"}, {"name": "Wing Chi Yu"}], "author_count": 3}, {"id": "2607.04628", "category": "cond-mat", "title": "Superconductivity on the verge of metal-insulator transition in Cu$_{1-x}$Zn$_x$Ir$_2$S$_4$ probed by $μ$SR", "abstract": "The thiospinel CuIr$_2$S$_4$ undergoes a metal-insulator transition below $\\approx$230 K, which is suppressed by substitution of Cu with Zn (Cu$_{1-x}$Zn$_x$Ir$_2$S$_4$) to induce superconductivity for $0.2\\lesssim x\\lesssim0.8$. We show that the temperature/field dependence of superfluid density in samples with $x = 0.3$ and 0.4 ($T_{\\rm c} \\approx 3$ K and 2.5 K) investigated by muon spin rotation and relaxation ($\\mu$SR) is consistent with a fully gapped $s$-wave pairing. Meanwhile, the relatively high resistivity (10$^{-3}$-10$^{-2}$ $\\Omega\\:$cm) in their normal state suggests that the superconductivity is in the \"dirty limit\" where the mean free path is much shorter than the coherence length ($\\ell \\ll \\xi_0$). This indicates that the potential anisotropy associated with unconventional pairing mechanisms expected under the strong electron correlations is smeared out by the electron scattering. Based on these observations, we discuss potential link between the Zn substitution-induced superconductivity and that recently discovered in CuIr$_2$S$_4$ under high pressure ($>18$ GPa) where the existence of strong electron scattering is also suggested.", "url": "https://arxiv.org/abs/2607.04628", "type": "理论", "summary": "硫尖晶石 CuIr$_2$S$_4$ 在 $\\approx$230 K 以下经历金属-绝缘体转变，通过用 Zn 取代 Cu (Cu$_{1-x}$Zn$_x$Ir$_2$S$_4$) 来抑制这种转变，从而诱导 $0.2\\lesssim x\\lesssim0.8$ 的超导性。我们表明，通过 μ 子自旋旋转和弛豫 ($\\mu$SR) 研究的 $x = 0.3$ 和 0.4 ($T_{\\rm c} \\approx 3$ K 和 2.5 K) 样品中超流体密度的温度/场依赖性与完全带隙的 $s$ 波配对一致。同时，正常状态下相对较高的电阻率 (10$^{-3}$-10$^{-2}$ $\\Omega\\:$cm) 表明超导性处于“脏极限”，其中平均自由程远短于相干长度 ($\\ell \\ll \\xi_0$)。这表明在强电子相关性下预期的与非常规配对机制相关的潜在各向异性被电子散射抹掉了。基于这些观察，我们讨论了 Zn 取代引起的超导性与最近在高压 ($>18$ GPa) 下 CuIr$_2$S$_4$ 中发现的超导性之间的潜在联系，其中也表明存在强电子散射。", "authors": [{"name": "K. M. Kojima"}, {"name": "M. Miyazaki"}, {"name": "M. Hiraishi"}, {"name": "A. Koda"}, {"name": "R. Kadono"}, {"name": "C. Baines"}, {"name": "Y. Tsuchiya"}, {"name": "H. S. Suzuki"}, {"name": "H. Kitazawa"}], "featured_authors": [{"name": "K. M. Kojima"}, {"name": "M. Miyazaki"}, {"name": "M. Hiraishi"}, {"name": "Y. Tsuchiya"}, {"name": "H. S. Suzuki"}, {"name": "H. Kitazawa"}], "author_count": 9}, {"id": "2607.04651", "category": "cond-mat", "title": "Topological Electronic States and Phonon Mediated Superconductivity in Ru Based Ternary Pnictides: ZrRuAs and HfRuP", "abstract": "This study investigates the structural, electronic, mechanical, optical, thermodynamic, and superconducting properties of ZrRuAs and HfRuP. Electronic band structure calculations reveal topological semimetallic behavior in both compounds with several bands crossing the Fermi level. The inclusion of spin orbit coupling lifts band degeneracies in both compounds. The Fermi surface shows both electron and hole segments. The estimated Pugh ratio, Poisson ratio and machinability index indicate that both compounds are ductile in nature and exhibit excellent machinability. Optical results show metallic reflectivity and notable absorption in the ultraviolet region. Thermodynamic analysis indicates stable behavior. The estimated superconducting transition temperatures are 9.75 K for ZrRuAs and 9.03 K for HfRuP that indicates strong coupling conventional superconductivity. The results provide a detailed view of the physical and superconducting properties of ZrRuAs and HfRuP and help to close the existing research gaps in these topological superconducting materials.", "url": "https://arxiv.org/abs/2607.04651", "type": "理论+数值", "summary": "本研究研究了 ZrRuAs 和 HfRuP 的结构、电子、机械、光学、热力学和超导特性。电子能带结构计算揭示了两种化合物的拓扑半金属行为，其中多个能带跨越费米能级。自旋轨道耦合的加入提高了两种化合物的能带简并性。费米面显示电子段和空穴段。估计的普格比、泊松比和切削加工性指数表明，两种化合物本质上都具有延展性，并表现出优异的切削加工性。光学结果显示金属反射率和紫外区域的显着吸收。热力学分析表明行为稳定。估计的 ZrRuAs 超导转变温度为 9.75 K，HfRuP 为 9.03 K，表明强耦合传统超导性。研究结果提供了 ZrRuAs 和 HfRuP 物理和超导特性的详细视图，有助于弥补这些拓扑超导材料的现有研究空白。", "authors": [{"name": "Jubair Hossan Abir"}, {"name": "Tanvir Khan"}, {"name": "Tauhidur Rahman"}, {"name": "Md. Kamrul Hassan"}, {"name": "Sraboni Saha Moly"}, {"name": "Mst. Maskura Khatun"}, {"name": "Raihana Shams Islam"}, {"name": "Saleh Hasan Naqib"}], "featured_authors": [{"name": "Jubair Hossan Abir"}, {"name": "Tanvir Khan"}, {"name": "Tauhidur Rahman"}, {"name": "Mst. Maskura Khatun"}, {"name": "Raihana Shams Islam"}, {"name": "Saleh Hasan Naqib"}], "author_count": 8}, {"id": "2607.04805", "category": "cond-mat", "title": "Nonlocal Kondo-exchange-driven intrinsic anomalous Hall effect in localized-$4f$ antiferromagnetic metals", "abstract": "The anomalous Hall effect in antiferromagnetic metals has attracted considerable attention. Most known realizations involve itinerant $d$ electrons that simultaneously mediate charge transport and magnetic order. Here, we focus on $f$-electron materials, where localized magnetic moments and conduction electrons are hosted in different orbitals. We develop a theoretical framework to describe the impact of localized antiferromagnetic order on itinerant electrons. Applying this approach to the recently discovered $4f$ antiferromagnetic metal $\\mathrm{Ce}_{2}\\mathrm{Cu}\\mathrm{Ge}_{6}$, we identify the origin of both the intrinsic anomalous Hall conductivity and the spin splitting of the energy bands as spin-dependent intersite hopping induced by nonlocal Kondo exchange coupling, rather than a Zeeman-type effective field acting locally on the conduction electrons.", "url": "https://arxiv.org/abs/2607.04805", "type": "理论", "summary": "反铁磁金属中的反常霍尔效应引起了人们的广泛关注。大多数已知的实现涉及同时介导电荷传输和磁序的巡回$d$电子。在这里，我们关注 $f$-电子材料，其中局域磁矩和传导电子位于不同的轨道中。我们开发了一个理论框架来描述局域反铁磁序对流动电子的影响。将这种方法应用于最近发现的$4f$反铁磁金属$\\mathrm{Ce}_{2}\\mathrm{Cu}\\mathrm{Ge}_{6}$，我们确定了本征反常霍尔电导率和能带自旋分裂的起源是非局域近藤交换耦合引起的自旋相关位点间跳跃，而不是局部作用于传导电子的塞曼型有效场。", "authors": [{"name": "Akimitsu Kirikoshi"}, {"name": "Junya Otsuki"}], "featured_authors": [{"name": "Akimitsu Kirikoshi"}, {"name": "Junya Otsuki"}], "author_count": 2}, {"id": "2607.04840", "category": "cond-mat", "title": "Disentangling Electronic and Lattice Contributions to Transient Absorption in Metal Halide Perovskites: A First-Principles Study of CH3NH3PbBr3", "abstract": "Soft lattices combined with strong electron-phonon coupling in metal halide perovskites result in a complex interplay between electronic and lattice degrees of freedom. This interplay complicates the interpretation of time-resolved excitation spectra like pump-probe spectra. Here, we develop a first-principles approach that combines a nonequilibrium extension of the Bethe-Salpeter equation with \\textit{ab initio} molecular dynamics to resolve the origin of transient absorption. This approach can quantitatively disentangle electronic and thermal lattice contributions across femtosecond-to-picosecond timescales. Exemplified with \\ce{CH3NH3PbBr3}, we find that on the femtosecond scale, both X-ray and optical transient absorption spectra are dominated by electronic contributions: Photoinduced Coulomb screening weakens the effective electron-hole interaction and blueshifts the excitonic resonances, whereas Pauli blocking is negligible. On the picosecond scale, thermal lattice contributions become essential, with distinct mechanisms dominating different spectral regions: Lattice vibrations lead to spectral redistribution in the X-ray transient absorption spectrum, whereas lattice expansion blueshifts the optical transient absorption spectrum.", "url": "https://arxiv.org/abs/2607.04840", "type": "理论+数值", "summary": "金属卤化物钙钛矿中的软晶格与强电子-声子耦合相结合，导致电子和晶格自由度之间复杂的相互作用。这种相互作用使时间分辨激发光谱（如泵浦探针光谱）的解释变得复杂。在这里，我们开发了一种第一原理方法，将 Bethe-Salpeter 方程的非平衡扩展与 \\textit{ab initio} 分子动力学相结合，以解决瞬态吸收的起源。这种方法可以定量地解开飞秒到皮秒时间尺度上的电子和热晶格贡献。以 \\ce{CH3NH3PbBr3} 为例，我们发现在飞秒尺度上，X 射线和光学瞬态吸收光谱都以电子贡献为主：光诱导库仑屏蔽削弱了有效的电子-空穴相互作用并使激子共振蓝移，而泡利阻挡可以忽略不计。\n\n在皮秒尺度上，热晶格的贡献变得至关重要，不同的机制主导着不同的光谱区域：晶格振动导致 X 射线瞬态吸收光谱中的光谱重新分布，而晶格膨胀使光学瞬态吸收光谱发生蓝移。", "authors": [{"name": "Lu Qiao"}, {"name": "Ronaldo Rodrigues Pela"}, {"name": "Claudia Draxl"}], "featured_authors": [{"name": "Lu Qiao"}, {"name": "Ronaldo Rodrigues Pela"}, {"name": "Claudia Draxl"}], "author_count": 3}, {"id": "2607.04861", "category": "cond-mat", "title": "Different dielectric, magnetic, and magnetodielectric mechanisms in M-type BaFe12O19 hexaferrite regulated by doping Ga3+ and In3+ cations", "abstract": "We systematically investigated the magnetic, dielectric, and MD properties of BaFe12-xMexO19 ceramics prepared by a solid-state reaction method. The Ga3+ cations with a smaller radius preferentially substitute the Fe3+ ions in FeO6 octahedra while the In3+ cations with a larger radius tend to replace the Fe3+ ions in FeO5 bipyramids of R blocks, inducing different physical characteristics. The pure BaFe12O19 and Ga-doped samples show ferrimagnetism in the temperature range from 10 K to 300 K. The In-doped samples exhibit a transition from non-collinear magnetism to collinear ferrimagnetism. The dielectric decrease of pure BaFe12O19 at around 10-175 K is attributed to the quantum paraelectric state, and the shoulder peaks of loss at about 140-200 K are from electron hopping. The dipole glass state is responsible for the dielectric peak of Ga-doped samples at around 20-40 K. The dielectric increase and plateau of In-doped samples are mainly ascribed to the electron hopping at low temperatures. Their dielectric properties at high temperatures are all attributed to the interfacial polarization caused by the Maxwell-Wagner effect. The MD effect also has different origins for the various samples at low temperatures. For the pure BaFe12O19, the negative MD effect at extremely low temperatures and the positive MD effect after warming are ascribed to spin-phonon coupling and field-dependent electron hopping, respectively. The positive MD effect in Ga-doped hexaferrites results from the field-dependent electric dipoles inside FeO5 bipyramids. For the In-doped samples, the negative MD effect and subsequent transformation to the positive MD effect originate from the field-dependent non-collinear spin ordering and electron hopping, respectively. The MD effect at high temperatures is attributed to the combination of magnetoresistance and Maxwell-Wagner effects.", "url": "https://arxiv.org/abs/2607.04861", "type": "理论", "summary": "我们系统地研究了固相反应法制备的BaFe12-xMexO19陶瓷的磁、介电和MD性能。半径较小的Ga3+阳离子优先取代FeO6八面体中的Fe3+离子，而半径较大的In3+阳离子倾向于取代R块的FeO5双锥体中的Fe3+离子，从而产生不同的物理特性。纯BaFe12O19和Ga掺杂样品在10 K至300 K的温度范围内表现出亚铁磁性。In掺杂样品表现出从非共线磁性到共线亚铁磁性的转变。纯 BaFe12O19 在 10-175 K 左右的介电常数降低归因于量子顺电态，而在 140-200 K 左右的损耗肩峰则来自电子跳跃。偶极玻璃态是 Ga 掺杂样品在 20-40 K 左右的介电峰值的原因。In 掺杂样品的介电增加和平台主要归因于低温下的电子跳跃。它们在高温下的介电性能均归因于麦克斯韦-瓦格纳效应引起的界面极化。\n\n对于低温下的各种样品，MD 效应也有不同的来源。对于纯BaFe12O19，极低温下的负MD效应和升温后的正MD效应分别归因于自旋声子耦合和场相关电子跳跃。掺 Ga 六角铁氧体中的正 MD 效应源自 FeO5 双锥体内的场相关电偶极子。对于In掺杂样品，负MD效应和随后向正MD效应的转变分别源自场相关的非共线自旋排序和电子跳跃。高温下的MD效应归因于磁阻效应和麦克斯韦-瓦格纳效应的结合。", "authors": [{"name": "Yang Yang"}, {"name": "Run-Yu Lei"}, {"name": "Jian-Ping Zhou"}, {"name": "Xiao-Ming Chen"}], "featured_authors": [{"name": "Yang Yang"}, {"name": "Run-Yu Lei"}, {"name": "Jian-Ping Zhou"}, {"name": "Xiao-Ming Chen"}], "author_count": 4}, {"id": "2607.04863", "category": "cond-mat", "title": "Uniform distributions in nonuniform systems: Wall potentials generating constant density profiles in classical density functional theory", "abstract": "We study the inverse problem of classical density functional theory for inhomogeneous fluids: finding the wall potential that produces a constant equilibrium density profile, i.e., a perfectly flat density distribution in the accessible region adjacent to a substrate. Within Rosenfeld's fundamental measure theory, we solve this problem for a one-component fluid in planar, spherical, and cylindrical geometries, considering both a hard-sphere fluid and a fluid with an additional truncated Lennard-Jones attraction treated at the mean-field level. Explicit analytical expressions are obtained for planar walls, while spherical walls also admit an analytical treatment in a more cumbersome form. The cylindrical case is treated numerically. The construction provides an explicit microscopic realization of structure-cancelling wall fields, related to flat-profile conditions that occur under special matching conditions in interfacial theories of wetting and drying. The theory also yields a compact collection of formulae for weighted densities and one-body direct correlation functions in the three fundamental geometries, providing useful reference expressions for density-functional implementations. The resulting analytic wall potentials are validated in independent density functional calculations, which confirm that the prescribed flat profiles are recovered within numerical accuracy.", "url": "https://arxiv.org/abs/2607.04863", "type": "理论+数值", "summary": "我们研究非均匀流体的经典密度泛函理论的逆问题：找到产生恒定平衡密度分布的壁势，即在邻近基底的可接近区域中完全平坦的密度分布。在罗森菲尔德的基本测量理论中，我们解决了平面、球形和圆柱形几何形状的单组分流体的这一问题，同时考虑了硬球流体和在平均场水平处理的具有附加截断伦纳德-琼斯吸引力的流体。对于平面壁可以获得显式的解析表达式，而球形壁也允许以更麻烦的形式进行解析处理。对圆柱壳进行数值处理。该结构提供了结构消除壁场的明确微观实现，与润湿和干燥界面理论中特殊匹配条件下发生的平坦轮廓条件有关。\n\n该理论还产生了三种基本几何中的加权密度和单体直接相关函数的紧凑公式集合，为密度泛函的实现提供了有用的参考表达式。由此产生的分析壁电位在独立的密度泛函计算中得到验证，这证实了规定的平面轮廓在数值精度内恢复。", "authors": [{"name": "Jiří Janek"}, {"name": "Alexandr Malijevský"}], "featured_authors": [{"name": "Jiří Janek"}, {"name": "Alexandr Malijevský"}], "author_count": 2}, {"id": "2607.04870", "category": "cond-mat", "title": "Unveiling Structural Bottlenecks of Dynamic Disorder in a Density-Tunable Glass Former: From Strong to Fragile Regimes", "abstract": "Fragility characterizes how rapidly a glass-forming liquid slows down upon supercooling, but whether strong and fragile behaviors arise from the same microscopic relaxation mechanism remains unclear. Here, we address this question using a density-tunable soft-repulsive binary mixture spanning distinct fragility regimes and analyze particle jump dynamics within the framework of dynamic disorder. Across these regimes, we show that increasing fragility leads to progressively broader cage-lifetime distributions and increasingly non-exponential survival probabilities, revealing non-Poisson cage-to-jump statistics governed by fluctuating jump rates and slowly evolving structural variables. To characterize their structural origin, we first identify the neighbor ranks most strongly coupled to jump motion using Kullback-Leibler divergence and Pearson correlation analyses. We then introduce a structural slowness parameter that combines these neighbor-distance fluctuations into a reduced slow coordinate for constructing the slow-fluctuation survival probability. A comparison with the actual survival probability shows that localized neighbor-distance fluctuations control the jump rate in the strong regime, whereas extended neighbor rearrangements become relevant in the intermediate and fragile regimes, increasing the effective dimensionality of the slow-variable space. In the fragile regime, distance-based descriptors alone become insufficient at the lowest temperature, where the Voronoi free volume captures additional cage-volume fluctuations in the rate-controlling slow variable. Point-to-set correlations grow with fragility, but the spatial extent of the slow variables exceeds the point-to-set length. These results show that fragility changes the structural bottleneck for microscopic rate fluctuations, linking dynamic disorder and multidimensional slow variables.", "url": "https://arxiv.org/abs/2607.04870", "type": "理论", "summary": "脆性表征了玻璃形成液体在过冷时减速的速度，但强和脆行为是否源于相同的微观松弛机制仍不清楚。在这里，我们使用跨越不同脆性区域的密度可调软排斥二元混合物来解决这个问题，并在动态无序框架内分析粒子跳跃动力学。在这些机制中，我们表明，脆弱性的增加导致笼子寿命分布逐渐扩大，生存概率越来越非指数，揭示了由波动的跳跃率和缓慢演变的结构变量控制的非泊松笼子跳跃统计数据。为了表征它们的结构起源，我们首先使用 Kullback-Leibler 散度和 Pearson 相关分析来识别与跳跃运动最紧密耦合的邻居等级。然后，我们引入一个结构慢度参数，将这些邻居距离波动组合成一个简化的慢坐标，以构建慢波动生存概率。\n\n与实际生存概率的比较表明，局部邻居距离波动控制强区域中的跳跃率，而扩展的邻居重排在中间和脆弱区域中变得相关，增加了慢变量空间的有效维度。在脆弱状态下，仅基于距离的描述符在最低温度下变得不够，其中 Voronoi 自由体积捕获速率控制慢变量中的额外笼体积波动。点到集的相关性随着脆弱性而增长，但慢变量的空间范围超过了点到集的长度。这些结果表明，脆弱性改变了微观利率波动的结构瓶颈，将动态无序和多维慢变量联系起来。", "authors": [{"name": "Shubham Kumar"}, {"name": "Shinji Saito"}], "featured_authors": [{"name": "Shubham Kumar"}, {"name": "Shinji Saito"}], "author_count": 2}, {"id": "2607.04897", "category": "cond-mat", "title": "Size Effect of Monovalent Ions on Polyelectrolyte Brushes", "abstract": "The conformation of polyelectrolyte (PE) brushes is highly sensitive to external conditions, particularly salt concentration and ion-specific effects. As salt concentration increases, PE brushes transition from an osmotic brush regime at low salt ($H \\propto c_\\mathrm{s}^{0}$) to a salted brush regime at high salt ($H \\propto c_\\mathrm{s}^{-1/3}$). However, deviations from this ideal scaling behavior are frequently observed in molecular simulations. In this work, we employ coarse-grained molecular dynamics simulations to systematically investigate how the sizes of counterions and co-ions affect the structural evolution and scaling behavior of PE brushes over a broad range of salt concentrations. Our results show that counterion size plays a dominant role in regulating ion penetration and coordination with PE monomers. At low salt concentration, smaller counterions penetrate more easily into the brush, leading to enhanced local charge compensation and stronger brush collapse. At high salt concentration, however, the brush height becomes largely insensitive to counterion size, while deviations from the classical scaling relation emerge. On the other hand, co-ion size mainly affects the system indirectly by modifying ion distributions and the local electrostatic environment. Smaller co-ions weaken local charge compensation and suppress brush collapse, with this effect becoming more pronounced at high salt concentration. When the sizes of counterions and co-ions are reduced simultaneously, the system exhibits a coupled response. Collectively, this work provides a microscopic understanding of how ion size and salt concentration jointly govern the structural response of PE brushes and the emergence of non-classical scaling behavior in realistic solution environments.", "url": "https://arxiv.org/abs/2607.04897", "type": "数值", "summary": "聚电解质（PE）刷的构象对外部条件高度敏感，特别是盐浓度和离子特异性效应。随着盐浓度的增加，PE 刷从低盐渗透刷状态 ($H \\propto c_\\mathrm{s}^{0}$) 过渡到高盐盐渍刷状态 ($H \\propto c_\\mathrm{s}^{-1/3}$)。然而，在分子模拟中经常观察到与这种理想缩放行为的偏差。在这项工作中，我们采用粗粒度分子动力学模拟来系统地研究反离子和共离子的大小如何影响 PE 刷在广泛的盐浓度范围内的结构演变和结垢行为。我们的结果表明，抗衡离子大小在调节离子渗透和与 PE 单体的配位方面起着主导作用。在低盐浓度下，较小的反离子更容易渗透到刷子中，从而增强局部电荷补偿和更强的刷子塌陷。然而，在高盐浓度下，刷子高度对反离子尺寸变得很大程度上不敏感，同时出现了与经典比例关系的偏差。\n\n另一方面，共离子尺寸主要通过改变离子分布和局部静电环境来间接影响系统。较小的共离子会削弱局部电荷补偿并抑制刷子塌陷，这种效应在高盐浓度下变得更加明显。当反离子和共离子的尺寸同时减小时，系统表现出耦合响应。总的来说，这项工作提供了对离子大小和盐浓度如何共同控制 PE 刷的结构响应以及现实解决方案环境中非经典结垢行为的出现的微观理解。", "authors": [{"name": "Xianggui Zhou"}, {"name": "Nengjie Cao"}, {"name": "Xiang-Meng Jia"}, {"name": "Jinyuan Mao"}, {"name": "Jiajia Zhou"}], "featured_authors": [{"name": "Xianggui Zhou"}, {"name": "Nengjie Cao"}, {"name": "Xiang-Meng Jia"}, {"name": "Jinyuan Mao"}, {"name": "Jiajia Zhou"}], "author_count": 5}, {"id": "2607.04975", "category": "cond-mat", "title": "Optical switching of antiferromagnetic domains by nonreciprocal heat current", "abstract": "What distinguishes front from back? In physics, such directionality emerges only when an underlying symmetry is broken. Antiferromagnets that inherently break both space-inversion and time-reversal symmetries provide a striking example, exhibiting nonreciprocal optical responses that depend on the direction of light propagation. Beyond distinguishing antiferromagnetic domains, we show that this nonreciprocity can deterministically create them. Using mid-infrared light, we demonstrate deterministic switching of antiferromagnetic domains in the magnetoelectric antiferromagnet LiFePO4, where illumination from opposite sides selectively stabilizes opposite domain states. Remarkably, the switching persists over a broad wavelength range rather than being confined to a narrow transition-specific spectral region, overcoming the spectral and material constraints of resonance-based optical switching schemes. The broadband switching originates from the material's intrinsic nonreciprocity through optically generated heat currents. Our results establish nonreciprocity as a general principle for deterministically controlling symmetry-broken phases with light.", "url": "https://arxiv.org/abs/2607.04975", "type": "理论", "summary": "正面和背面有什么区别？在物理学中，只有当潜在的对称性被打破时，这种方向性才会出现。本质上打破空间反转和时间反转对称性的反铁磁体提供了一个引人注目的例子，它表现出取决于光传播方向的不可逆光学响应。除了区分反铁磁域之外，我们还证明这种非互易性可以确定性地创建它们。使用中红外光，我们演示了磁电反铁磁体 LiFePO4 中反铁磁域的确定性切换，其中来自相对侧的照明选择性地稳定相反的域状态。值得注意的是，这种开关在很宽的波长范围内持续存在，而不是局限于狭窄的特定跃迁光谱区域，从而克服了基于谐振的光学开关方案的光谱和材料限制。宽带切换源自材料通过光学产生的热流的固有非互易性。我们的结果将非互易性确立为用光确定性控制对称破缺相位的一般原理。", "authors": [{"name": "Takeshi Hayashida"}, {"name": "Shunsuke Izumikawa"}, {"name": "Kenta Kimura"}, {"name": "Carl S. Davies"}, {"name": "Andrei Kirilyuk"}], "featured_authors": [{"name": "Takeshi Hayashida"}, {"name": "Shunsuke Izumikawa"}, {"name": "Kenta Kimura"}, {"name": "Carl S. Davies"}, {"name": "Andrei Kirilyuk"}], "author_count": 5}, {"id": "2607.04997", "category": "cond-mat", "title": "Inhomogeneous thinning of dielectric membranes under uniaxial tension and electric fields", "abstract": "Dielectric elastomers exhibit rich electromechanical instabilities arising from the coupling between mechanical deformations and electric fields. A widely used approach for analyzing instabilities in dielectric elastomers is the Hessian stability criterion proposed by Zhao and Suo (2007), which identifies the onset of instability of a homogeneous deformation but does not determine how the deformation develops beyond the instability threshold. To address this problem, we investigate dielectric membranes subjected to uniaxial tension and an electric field. Starting from a three-dimensional nonlinear electroelastic formulation, we derive asymptotically consistent reduced models, including a membrane model and a plate model, using the variational--asymptotic method. A linear bifurcation analysis first shows that the Hessian stability criterion is equivalent to a zero-wavenumber bifurcation condition, thereby establishing a direct connection between energy-based stability analysis and bifurcation theory. A subsequent weakly nonlinear analysis demonstrates that the zero-wavenumber bifurcation gives rise to localized necking, manifested as inhomogeneous thinning of the membrane. Furthermore, for the plane-stress configuration considered here, the membrane model accurately captures both the onset of instability and the associated localization behavior, while bending effects remain small. These results provide a physical interpretation of the Hessian instability and offer a framework for analyzing instabilities in dielectric membranes.", "url": "https://arxiv.org/abs/2607.04997", "type": "理论+数值", "summary": "介电弹性体表现出由于机械变形和电场之间的耦合而产生的丰富的机电不稳定性。分析介电弹性体不稳定性的一种广泛使用的方法是由Zhao和Suo（2007）提出的Hessian稳定性准则，该准则识别均匀变形的不稳定性的开始，但不能确定变形如何发展到超过不稳定阈值。为了解决这个问题，我们研究了承受单轴张力和电场的介电膜。从三维非线性电弹性公式出发，我们使用变分渐近方法推导出渐近一致的简化模型，包括膜模型和板模型。线性分岔分析首先表明Hessian稳定性判据等价于零波数分岔条件，从而建立了基于能量的稳定性分析和分岔理论之间的直接联系。随后的弱非线性分析表明，零波数分叉会引起局部颈缩，表现为膜的不均匀变薄。\n\n此外，对于此处考虑的平面应力配置，膜模型准确地捕获了不稳定的开始和相关的局部化行为，而弯曲效应仍然很小。这些结果提供了 Hessian 不稳定性的物理解释，并提供了分析介电膜不稳定性的框架。", "authors": [{"name": "Xiang Yu"}, {"name": "Yibin Fu"}], "featured_authors": [{"name": "Xiang Yu"}, {"name": "Yibin Fu"}], "author_count": 2}, {"id": "2607.05014", "category": "cond-mat", "title": "Geometric Characteristics of Subproblems in Ising-Machine-Assisted Large Neighborhood Search", "abstract": "Large-scale quadratic unconstrained binary optimization (QUBO) formulations of constrained combinatorial optimization problems often exceed the input-size limit of present Ising machines or suffer from degraded solution quality as the number of binary variables increases. Large neighborhood search (LNS) mitigates this difficulty by sequentially optimizing restricted subproblems, but the structural factors that distinguish subproblems beyond the number of binary variables remain insufficiently characterized. In this study, we examine vehicle routing problems and compare a construction based on the vehicle routes of the current solution, denoted by LNS-K, with a construction based on QUBO variables and constraint relations, denoted by LNS-Q, while controlling the number of binary variables in the subproblems. Under the tested conditions, LNS-K obtained shorter total distances than LNS-Q in the matched-size comparisons, and the position variance, a measure of the spatial spread of the selected customers, decreased during the iterations in LNS-K. These observations suggest that subproblem design for sequential optimization with Ising machines should consider not only subproblem size but also semantic and geometric structures inherited from the current solution.", "url": "https://arxiv.org/abs/2607.05014", "type": "数值", "summary": "约束组合优化问题的大规模二次无约束二元优化 (QUBO) 公式通常会超出当前伊辛机的输入大小限制，或者随着二元变量数量的增加而导致解质量下降。大邻域搜索（LNS）通过顺序优化受限子问题来缓解这一困难，但区分二元变量数量之外的子问题的结构因素仍然没有充分表征。在本研究中，我们研究了车辆路径问题，并将基于当前解决方案的车辆路径的构造（用 LNS-K 表示）与基于 QUBO 变量和约束关系的构造（用 LNS-Q 表示）进行比较，同时控制子问题中二元变量的数量。在测试条件下，在匹配大小比较中，LNS-K 获得的总距离比 LNS-Q 更短，并且位置方差（衡量所选客户的空间分布的指标）在 LNS-K 的迭代过程中减少。\n\n这些观察结果表明，伊辛机顺序优化的子问题设计不仅应考虑子问题的大小，还应考虑从当前解决方案继承的语义和几何结构。", "authors": [{"name": "Masashi Yamashita"}, {"name": "Shu Tanaka"}], "featured_authors": [{"name": "Masashi Yamashita"}, {"name": "Shu Tanaka"}], "author_count": 2}, {"id": "2607.05039", "category": "cond-mat", "title": "Coexisting Charge Density Wave and Superconducting Order in Quantizing Magnetic Fields", "abstract": "Charge density wave (CDW) and superconductivity are both common in strongly interacting electron systems. While CDW order is ubiquitous in both quantum Hall systems and unconventional superconductors, superconductivity is generally suppressed by the strong magnetic fields required for Landau quantization. Here we investigate the intertwined CDW and superconducting phases of rhombohedral hexalayer graphene (R6G) in a large displacement field, which generates tunable flat band edges, and a strong magnetic field, which generates a manifold of nearly degenerate Landau levels. CDW order is accompanied by pronounced thermal hysteresis as expected for first-order melting transitions. Surprisingly, we find a series of strong integer quantum Hall effects at magnetic fields above ~2T with Hall conductance quantum numbers that deviate strongly from nearby integer filling factors, an observation that can be explained only by CDW order that mixes many Landau levels. We also find a nearby superconducting phase that is stabilized by perpendicular magnetic fields and persists deep within the quantum Hall regime. The CDW and superconducting phases develop on comparable temperature scales and emerge from the same manifold of strongly mixed Landau levels. These observations provide new insight into the interplay between superconductivity and CDW order in R6G at zero magnetic field.", "url": "https://arxiv.org/abs/2607.05039", "type": "理论", "summary": "电荷密度波（CDW）和超导现象在强相互作用电子系统中都很常见。虽然 CDW 阶在量子霍尔系统和非常规超导体中普遍存在，但超导性通常会受到朗道量子化所需的强磁场的抑制。在这里，我们研究了菱形六层石墨烯（R6G）在大位移场中的交织CDW和超导相，该位移场产生可调谐的平带边缘，以及强磁场，产生多种近简并朗道能级。 CDW 阶次伴随着明显的热滞后，正如一阶熔化转变所预期的那样。令人惊讶的是，我们在~2T 以上的磁场中发现了一系列强整数量子霍尔效应，其霍尔电导量子数与附近的整数填充因子有很大偏差，这一观察结果只能通过混合许多朗道能级的 CDW 阶来解释。我们还发现了附近的超导相，该相通过垂直磁场稳定并持续存在于量子霍尔区域深处。\n\nCDW 和超导相在可比较的温度尺度上发展，并从相同的强混合朗道能级流形中出现。这些观察结果为零磁场下 R6G 中超导性和 CDW 秩序之间的相互作用提供了新的见解。", "authors": [{"name": "Ron Q. Nguyen"}, {"name": "Peiyu Qin"}, {"name": "Hai-Tian Wu"}, {"name": "Sparsh Mishra"}, {"name": "Tobias Wolf"}, {"name": "Joseph Roll"}, {"name": "Erin Morissette"}, {"name": "Naiyuan J. Zhang"}, {"name": "Sarah Alkidim"}, {"name": "Kenji Watanabe"}, {"name": "Takashi Taniguchi"}, {"name": "Aaron W. Hui"}, {"name": "Dima E. Feldman"}, {"name": "Allan MacDonald"}, {"name": "J.I.A. Li"}], "featured_authors": [{"name": "Ron Q. Nguyen"}, {"name": "Peiyu Qin"}, {"name": "Hai-Tian Wu"}, {"name": "Dima E. Feldman"}, {"name": "Allan MacDonald"}, {"name": "J.I.A. Li"}], "author_count": 15}, {"id": "2607.05066", "category": "cond-mat", "title": "Finite-frequency magnetic common baths in ferromagnetic planar cavities", "abstract": "We formulate the finite-frequency magnetic common bath of two spin probes in a ferromagnetic planar cavity. The probes couple to the retarded magnetic Green tensor of the cavity, whose imaginary and real parts determine the collective decay kernel \\(\\gamma_{12}\\) and the Lamb-shift kernel \\(\\Omega_{12}\\). We evaluate these kernels for a finite-thickness scalar TE channel formed by a ferromagnetic film on a nonmagnetic conducting substrate, using the transverse diagonal Polder permeability \\(\\mu_\\perp(\\omega,B)\\) as the magnetic input. The normalization is fixed by the free-space magnetic-dipole decay rate. In the \\(\\omega\\to0\\) limit, the constant-reflection benchmark reproduces the static image-series reference, while the finite slab retains the corresponding static TE reflection amplitude. For a \\(t=200\\,\\mathrm{nm}\\) film described by a representative Ni-like parameter set in a micron-scale mid-gap cavity, the GHz probe transition samples the positive-frequency response of the body-assisted magnetic reservoir at millikelvin temperature. On resonance, the off-diagonal linewidth splitting reaches about two thirds of the single-spin scattering linewidth at \\(\\rho=3\\,\\mu\\mathrm m\\). The resulting linewidth splitting and collective Lamb shift provide finite-frequency counterparts of the static TE coupling-frequency shift.", "url": "https://arxiv.org/abs/2607.05066", "type": "数值", "summary": "我们在铁磁平面腔中制定了两个自旋探针的有限频率磁共浴。探针耦合到腔体的延迟磁格林张量，其虚部和实部决定集体衰变核 \\(\\gamma_{12}\\) 和兰姆位移核 \\(\\Omega_{12}\\)。我们使用横向对角 Polder 磁导率 \\(\\mu_\\perp(\\omega,B)\\) 作为磁输入，针对由非磁性导电基板上的铁磁薄膜形成的有限厚度标量 TE 通道评估这些内核。归一化由自由空间磁偶极子衰减率确定。在 \\(\\omega\\to0\\) 限制下，恒定反射基准再现静态图像系列参考，而有限板保留相应的静态 TE 反射幅度。对于微米级中隙腔中具有代表性的类 Ni 参数集描述的 \\(t=200\\,\\mathrm{nm}\\) 薄膜，GHz 探针跃迁对毫开温度下体辅助磁库的正频率响应进行采样。在共振时，非对角线宽分裂在 \\(\\rho=3\\,\\mu\\mathrm m\\) 处达到单自旋散射线宽的约三分之二。\n\n由此产生的线宽分裂和集体兰姆频移提供了静态 TE 耦合频移的有限频率对应物。", "authors": [{"name": "O. J. Kwon"}], "featured_authors": [{"name": "O. J. Kwon"}], "author_count": 1}, {"id": "2607.05081", "category": "cond-mat", "title": "Structural crossovers of quasi-one-dimensional patchy hard superellipses", "abstract": "We study a quasi-one-dimensional associating fluid composed of hard superellipses carrying two patches interacting through a directional Kern--Frenkel potential. Using the Transfer Operator Method, we show that the selective patch--patch association promotes horizontal alignment and chain formation at low-to-intermediate densities, whereas hard-core interaction favours vertical alignment without bonds at high densities. The competition between these two mechanisms drives a structural crossover upon compression from a horizontally aligned bonded chain structure to a completely unbonded, vertically aligned structure. While patchy ellipses undergo a tilted-to-vertical realignment, patchy rectangle-like superellipses exhibit a horizontal-to-vertical change. These structural changes manifest as a plateau in the equation of state. To capture these properties, we generalise Wertheim's first-order thermodynamic perturbation theory by introducing an orientation-dependent fraction of sites not in a bond. When combined with the Parsons--Lee hard-body theory, the orientationally resolved perturbation theory provides quantitatively reliable results for the structural properties and phase behaviour. Therefore, the generalised Wertheim theory together with Parsons-Lee theory can be suitable in higher dimensions, too.", "url": "https://arxiv.org/abs/2607.05081", "type": "理论+数值", "summary": "我们研究了一种由硬超椭圆组成的准一维缔合流体，硬超椭圆带有两个通过定向克恩-弗兰克尔势相互作用的斑块。使用转移算子方法，我们表明选择性斑块-斑块关联促进低至中密度下的水平排列和链形成，而硬核相互作用有利于高密度下无键的垂直排列。这两种机制之间的竞争驱动压缩时的结构交叉，从水平对齐的键合链结构到完全非键合的垂直对齐结构。斑驳的椭圆经历了从倾斜到垂直的重新排列，而斑驳的矩形超椭圆则表现出水平到垂直的变化。这些结构变化表现为状态方程的稳定状态。为了捕捉这些特性，我们通过引入非键位点的方向相关部分来推广韦特海姆的一阶热力学微扰理论。\n\n当与 Parsons-Lee 硬体理论相结合时，定向分辨微扰理论为结构特性和相行为提供了定量可靠的结果。因此，广义韦特海姆理论和帕森斯-李理论也适用于更高维度。", "authors": [{"name": "Sakineh Mizani"}, {"name": "Martin Oettel"}, {"name": "Péter Gurin"}, {"name": "Szabolcs Varga"}], "featured_authors": [{"name": "Sakineh Mizani"}, {"name": "Martin Oettel"}, {"name": "Péter Gurin"}, {"name": "Szabolcs Varga"}], "author_count": 4}, {"id": "2607.05130", "category": "cond-mat", "title": "Critical behavior of the driven Curie-Weiss model", "abstract": "We complete the phase diagram of the macroscopic Curie-Weiss magnet in a time-periodic external field, as a function of temperature and driving parameters. There is a regime (large enough driving amplitude and frequency, at low temperatures) where stable paramagnetic and ferromagnetic phases coexist. In particular, we present a new detailed analysis of the (nonequilibrium) specific heat, diverging at the same critical inverse temperature $\\beta_c$ as the magnetic susceptibility. The new Curie temperature decreases with the driving, and we find critical exponent $\\alpha=1$ for $\\beta\\downarrow \\beta_c$, and $\\alpha\\simeq 0.86$ for $\\beta\\uparrow \\beta_c$, even for small driving. A Floquet analysis shows the nature of the criticality, which is dynamical, with implications that remain unseen and are mostly impossible when the system is in thermal equilibrium.", "url": "https://arxiv.org/abs/2607.05130", "type": "理论+数值", "summary": "我们完成了宏观居里-维斯磁体在时间周期外场中的相图，作为温度和驱动参数的函数。存在一种稳定的顺磁相和铁磁相共存的状态（在低温下足够大的驱动幅度和频率）。特别是，我们对（非平衡）比热进行了新的详细分析，在与磁化率相同的临界反温度 $\\beta_c$ 下发散。新的居里温度随着驾驶而降低，我们发现$\\beta\\downarrow \\beta_c$的临界指数$\\alpha=1$，$\\beta\\uparrow \\beta_c$的临界指数$\\alpha\\simeq 0.86$，即使对于小驾驶。 Floquet 分析显示了临界性的本质，它是动态的，当系统处于热平衡时，其影响仍然是看不见的，而且几乎是不可能的。", "authors": [{"name": "Ruohan Xu"}, {"name": "Faezeh Khodabandehlou"}, {"name": "Christian Maes"}], "featured_authors": [{"name": "Ruohan Xu"}, {"name": "Faezeh Khodabandehlou"}, {"name": "Christian Maes"}], "author_count": 3}, {"id": "2607.05151", "category": "cond-mat", "title": "On data-driven parameterizations of multidimensional generalized Langevin dynamics in the presence of a quadratic potential", "abstract": "We propose a numerical algorithm to construct a Markov model with an extended list of variables to parameterize the equation of motion of a multidimensional coarse-grained physical system in an external potential, when memory effects are relevant. Our method uses autocorrelation data of the stationary velocities, but it avoids the inverse problem of finding the corresponding memory kernel from these data in a first step. Rather, the data are used to construct a Prony series approximation of the autocorrelation function, and the parameters of this Prony series provide the corresponding Markov model. Numerical results for molecular dynamics data show a good match for parameterized models with five auxiliary variables for a one-dimensional, and twelve auxiliary variables for a two-dimensional system.", "url": "https://arxiv.org/abs/2607.05151", "type": "理论+数值", "summary": "我们提出了一种数值算法来构建具有扩展变量列表的马尔可夫模型，以在记忆效应相关时参数化外部势中多维粗粒度物理系统的运动方程。我们的方法使用平稳速度的自相关数据，但它避免了第一步从这些数据中找到相应内存内核的逆问题。相反，数据用于构造自相关函数的 Prony 级数近似，并且该 Prony 级数的参数提供相应的马尔可夫模型。分子动力学数据的数值结果显示，一维系统具有五个辅助变量，二维系统具有十二个辅助变量的参数化模型具有良好的匹配性。", "authors": [{"name": "Maximilian Braun"}, {"name": "Martin Hanke"}, {"name": "Niklas Wolf"}], "featured_authors": [{"name": "Maximilian Braun"}, {"name": "Martin Hanke"}, {"name": "Niklas Wolf"}], "author_count": 3}, {"id": "2607.05169", "category": "cond-mat", "title": "Ising-Machine-Assisted Large Neighborhood Search with Flexibly Tunable Subproblem Size", "abstract": "Ising machines are heuristic solvers for combinatorial optimization, but their solution quality can degrade when large-scale constrained problems are solved directly. Ising-machine-assisted large neighborhood search (LNS) instead repeatedly updates a feasible current solution by solving smaller subproblems. An existing feasibility-preserving method for the vehicle routing problem (VRP) re-optimizes the entire routes of selected vehicles and thus cannot adjust the subproblem size finely. We propose LNS-VT, which introduces the number of consecutive steps re-optimized per vehicle as a parameter to control the subproblem size finely while preserving feasibility. For a 300-site, 5-vehicle VRP, its best setting reduced the objective value by approximately 10\\% relative to the existing method after 100 iterations, and the appropriate setting changed with the current solution quality. Applying the same principle to the quadratic multiple knapsack problem, we confirmed that an appropriate subproblem size also exists, indicating that subproblem-size control is important in Ising-machine-assisted LNS.", "url": "https://arxiv.org/abs/2607.05169", "type": "数值", "summary": "伊辛机是用于组合优化的启发式求解器，但当直接求解大规模约束问题时，其解质量可能会下降。伊辛机辅助大邻域搜索（LNS）通过解决较小的子问题来重复更新可行的当前解决方案。现有的车辆路径问题（VRP）的可行性保持方法对所选车辆的整个路线进行重新优化，因此无法精细地调整子问题的大小。我们提出了 LNS-VT，它引入了每辆车重新优化的连续步骤数作为参数，以在保持可行性的同时精细地控制子问题的大小。对于300个站点、5辆车的VRP，经过100次迭代后，其最佳设置相对于现有方法使目标值降低了约10%，并且适当的设置随着当前解的质量而变化。将相同的原理应用于二次多重背包问题，我们证实也存在适当的子问题大小，这表明子问题大小控制在伊辛机辅助 LNS 中很重要。", "authors": [{"name": "Koshiro Fujimoto"}, {"name": "Masashi Yamashita"}, {"name": "Shu Tanaka"}], "featured_authors": [{"name": "Koshiro Fujimoto"}, {"name": "Masashi Yamashita"}, {"name": "Shu Tanaka"}], "author_count": 3}, {"id": "2607.05173", "category": "cond-mat", "title": "Semi-Markovian switching in a fluctuating harmonic trap: An age-structured formulation", "abstract": "We study a Brownian particle in a harmonic trap whose stiffness switches between two values with arbitrary waiting-time statistics, generating semi-Markovian dynamics. To treat the resulting temporal memory, we formulate the problem in an enlarged age-structured state space, restoring Markovianity and yielding a local Fokker--Planck description. Within this framework, we derive exact steady-state integral equations for the spatial and birth distributions and obtain exact expressions for stationary moments, injected power, and potential energy. In the second part of the paper, we analyze the stochastic-resetting limit, corresponding to a particle alternately released and trapped. By representing the stationary spatial distribution as a superposition of Gaussian states with fluctuating variance, the problem can be reformulated as a switching process in variance space. This yields exact integral equations for the variance distributions and leads to a simplified description amenable to direct analytical treatment.", "url": "https://arxiv.org/abs/2607.05173", "type": "理论", "summary": "我们研究谐波陷阱中的布朗粒子，其刚度在任意等待时间统计的两个值之间切换，生成半马尔可夫动力学。为了处理由此产生的时间记忆，我们在扩大的年龄结构状态空间中制定问题，恢复马尔可夫性并产生局部福克-普朗克描述。在此框架内，我们推导出空间和出生分布的精确稳态积分方程，并获得静止力矩、注入功率和势能的精确表达式。在本文的第二部分，我们分析了随机重置极限，对应于交替释放和捕获的粒子。通过将平稳空间分布表示为具有波动方差的高斯状态的叠加，可以将问题重新表述为方差空间中的切换过程。这产生了方差分布的精确积分方程，并导致了易于直接分析处理的简化描述。", "authors": [{"name": "Derek Frydel"}], "featured_authors": [{"name": "Derek Frydel"}], "author_count": 1}, {"id": "2607.05194", "category": "cond-mat", "title": "Nucleation and time-reversal symmetry breaking in nonconserved scalar field theories", "abstract": "Classical nucleation theory (CNT) describes the formation of a stable phase from a metastable one in terms of a single reaction coordinate that corresponds to the radius of a nucleating droplet. In this work, we provide a full account of nonequilibrium nucleation theory (NNT), which generalizes CNT to non-equilibrium field theories with non-conserved order parameter. We present two equivalent derivations of the dynamics of the droplet radius: a stochastic route, based on a direct projection of the stochastic field equation onto the radial reaction coordinate, and a route based on the minimization of the Freidlin-Wentzell action. Crucially, the quasipotential barrier predicted by NNT differs from the one found when assuming the instanton to be the time-reversal of the relaxation dynamics. Whereas the interfacial density profile differs from that on the relaxation path, an analytical derivation of NNT remains possible using a careful definition of the reaction coordinate. This leverages the perturbative structure that (in common with CNT) emerges in the limit of large critical radius. We further derive with similar techniques the dynamics of capillary waves, whose stability is required for the CNT/NNT precept of a near-spherical droplet to prevail. After deriving our theory for generic non-conserved field-theories, we address two explicit examples: a non-equilibrium generalization of Model A (Active Model A), and a population dynamics model (with two choices of noise that each break time-reversal symmetry). In both cases, we validate our analytical NNT against numerical results obtained by action minimization, with excellent agreement. NNT provide a systematic framework for constructing nucleation theories in a broad class of non-equilibrium systems from active matter, reaction-diffusion systems and population dynamics.", "url": "https://arxiv.org/abs/2607.05194", "type": "理论+数值", "summary": "经典成核理论（CNT）根据对应于成核液滴半径的单个反应坐标描述了从亚稳态相形成稳定相的过程。在这项工作中，我们提供了非平衡成核理论（NNT）的完整描述，它将 CNT 推广到具有非保守序参数的非平衡场论。我们提出了液滴半径动力学的两个等效推导：基于随机场方程在径向反应坐标上的直接投影的随机路线，以及基于 Freidlin-Wentzell 作用最小化的路线。至关重要的是，NNT 预测的准势垒与假设瞬子是弛豫动力学的时间反转时发现的准势垒不同。尽管界面密度分布与弛豫路径上的不同，但通过仔细定义反应坐标，仍然可以对 NNT 进行分析推导。这利用了在大临界半径限制下出现的微扰结构（与碳纳米管相同）。\n\n我们进一步用类似的技术推导了毛细波的动力学，毛细波的稳定性是近球形液滴的 CNT/NNT 规则占上风所必需的。在推导出通用非守恒场论的理论后，我们提出了两个明确的例子：模型 A 的非平衡推广（主动模型 A）和群体动力学模型（有两种噪声选择，每种噪声都打破时间反转对称性）。在这两种情况下，我们都根据动作最小化获得的数值结果验证了我们的分析 NNT，并且具有良好的一致性。 NNT 为从活性物质、反应扩散系统和群体动力学中构建广泛的非平衡系统中的成核理论提供了一个系统框架。", "authors": [{"name": "Noah Ziethen"}, {"name": "Michalis Chatzittofi"}, {"name": "Michael E. Cates"}, {"name": "Cesare Nardini"}], "featured_authors": [{"name": "Noah Ziethen"}, {"name": "Michalis Chatzittofi"}, {"name": "Michael E. Cates"}, {"name": "Cesare Nardini"}], "author_count": 4}, {"id": "2607.05269", "category": "cond-mat", "title": "Excitation spectra and rank tomography of linear matrix product tangent spaces", "abstract": "We formulate a tangent-space method for algebraic varieties of matrix product states (MPS) to study excitation spectra of non-uniform quantum many-body systems with open boundary conditions. We further introduce a rank tomography of the MPS tangent space, which characterizes its expressivity in terms of particle-sector rank profiles of the underlying MPS variety. Using the Bose--Hubbard model as a benchmark, we illustrate that the method reproduces low-lying excitations and captures finite-size precursors of the Mott-insulator to superfluid transition.", "url": "https://arxiv.org/abs/2607.05269", "type": "理论", "summary": "我们制定了矩阵积态（MPS）代数簇的切线空间方法来研究具有开放边界条件的非均匀量子多体系统的激发光谱。我们进一步介绍了 MPS 切线空间的等级断层扫描，它根据底层 MPS 品种的粒子扇区等级分布来表征其表达能力。使用 Bose-Hubbard 模型作为基准，我们说明该方法再现低位激发并捕获莫特绝缘体到超流体转变的有限尺寸前体。", "authors": [{"name": "Otto T.P. Schmidt"}, {"name": "Iacopo Carusotto"}], "featured_authors": [{"name": "Otto T.P. Schmidt"}, {"name": "Iacopo Carusotto"}], "author_count": 2}, {"id": "2607.05308", "category": "cond-mat", "title": "A universal emulator for planar Ising lattices", "abstract": "We introduce the notion of an Ising emulator for two-dimensional Ising models: flat, unit-edge-length lattices can be represented as site- or bond-diluted supercells of a single host lattice, for which the Feynman--Vdovichenko/Kac--Ward solution is fixed once and for all. We construct explicit square and triangular emulators and show that a single transition matrix, supplemented by lattice-specific binary masks, gives all the thermodynamic quantities of interest for both ferro- and antiferromagnetic couplings. We apply the framework to all eleven Archimedean lattices, to all twenty $2$-uniform lattices -- whose thermodynamics is obtained here for the first time -- and to several pentagonal lattices, and show that the same construction extends directly to fractal and disordered Ising models, with no modification to the underlying machinery.", "url": "https://arxiv.org/abs/2607.05308", "type": "理论", "summary": "我们引入了二维 Ising 模型的 Ising 模拟器的概念：平坦的、单位边长的晶格可以表示为单个主晶格的位点稀释或键稀释的超晶胞，其中 Feynman--Vdovichenko/Kac--Ward 解被一劳永逸地固定。我们构造了显式的正方形和三角形模拟器，并表明单个过渡矩阵，辅以晶格特定的二进制掩模，给出了铁磁和反铁磁耦合的所有感兴趣的热力学量。我们将该框架应用于所有 11 个阿基米德晶格、所有 20 个 $2$ 均匀晶格（首次在这里获得其热力学）以及几个五边形晶格，并表明相同的结构直接延伸到分形和无序伊辛模型，而不需要对底层机制进行修改。", "authors": [{"name": "Riccardo Ben Alì Zinati"}, {"name": "Alessandro Codello"}], "featured_authors": [{"name": "Riccardo Ben Alì Zinati"}, {"name": "Alessandro Codello"}], "author_count": 2}, {"id": "2607.05328", "category": "cond-mat", "title": "Mass-imbalanced SU(N) Fermi gases", "abstract": "We report a fully analytical description of zero-temperature itinerant ferromagnetism in repulsive SU(N) Fermi gases with arbitrary mass imbalance among components. Using perturbation theory in the gas parameter x = kFa0, with kF the Fermi momentum and a0 the s-wave scattering length, we derive the second-order energy for arbitrary spin polarization and arbitrary mass ratio. Our main result is a closed analytic expression for the beyond-mean-field correction in mixtures with unequal masses. This analytical result extends the theory of dilute Fermi gases beyond the mass-balanced case and provides a compact equation of state for multicomponent mixtures. We show that mass imbalance breaks the paramagnetic symmetry already in the non-interacting limit, favors the occu pation of heavier components, and lowers the interaction strength required to reach a fully polarized state. For S = 1/2, the system evolves continuously from a mass-induced partially polarized state to full ferromagnetism. For larger spins, distinct mass distributions generate qualitatively differ ent polarization paths, including smooth and discontinuous sequences. Our results identify mass imbalance as a powerful control tool for magnetic ordering in ultracold Fermi mixtures.", "url": "https://arxiv.org/abs/2607.05328", "type": "理论", "summary": "我们报告了对成分间任意质量不平衡的排斥性 SU(N) 费米气体中的零温巡回铁磁性的全面分析描述。利用气体参数 x = kFa0 的微扰理论，kF 为费米动量，a0 为 s 波散射长度，我们推导出任意自旋极化和任意质量比的二阶能量。我们的主要结果是不等质量混合物中超平均场校正的封闭解析表达式。该分析结果将稀费米气体理论扩展到质量平衡情况之外，并为多组分混合物提供了紧凑的状态方程。我们表明，质量不平衡打破了非相互作用极限下的顺磁对称性，有利于较重组分的占据，并降低了达到完全极化状态所需的相互作用强度。当 S = 1/2 时，系统从质量引起的部分极化状态不断演化为完全铁磁性。对于较大的自旋，不同的质量分布会产生性质不同的极化路径，包括平滑和不连续的序列。\n\n我们的结果表明质量不平衡是超冷费米混合物中磁有序的强大控制工具。", "authors": [{"name": "Jordi Pera"}, {"name": "Joaquim Casulleras"}, {"name": "Jordi Boronat"}], "featured_authors": [{"name": "Jordi Pera"}, {"name": "Joaquim Casulleras"}, {"name": "Jordi Boronat"}], "author_count": 3}, {"id": "2607.02648", "category": "hep-th", "title": "Time-Dependent Integrability from Gauge Theory, I", "abstract": "Solvable time-dependent systems provide important settings for studying non-equilibrium physics, where exact results are rare. They are also useful for benchmarking quantum simulations, which can directly probe real-time dynamics beyond the reach of conventional numerical approaches. In this paper, we show that the four-dimensional Chern-Simons theory offers a natural and unifying framework for constructing such systems. Focusing on classically integrable field theories, we consider a generalization of the four-dimensional Chern-Simons theory in which the usual holomorphic one-form is replaced by a more general, spacetime-dependent one-form. This yields a systematic procedure for generating time-dependent integrable field theories and establishes a universal relation: for every theory obtained in this way, the allowed time dependence coincides with the one-loop renormalization group flow. Despite the explicit time dependence, these theories retain Lax integrability and remain solvable by inverse scattering methods. Our construction applies to both ultralocal and non-ultralocal theories and extends previously known time-dependent sigma models to a much broader class of integrable systems. It also admits rewriting as dilaton gravity coupled to matter, producing a large family of classically integrable dilaton gravity theories in two dimensions. We also comment on connections to time-dependent integrable models studied recently in condensed matter physics and non-autonomous integrable systems arising from dimensionally-reduced Einstein gravity.", "url": "https://arxiv.org/abs/2607.02648", "type": "理论", "summary": "可解的瞬态系统为研究非平衡物理提供了重要的设置，而精确的结果很少见。它们对于量子模拟基准测试也很有用，它可以直接探测超出传统数值方法范围的实时动态。在本文中，我们表明四维陈-西蒙斯理论为构建此类系统提供了一个自然且统一的框架。着眼于经典可积场论，我们考虑四维陈-西蒙斯理论的推广，其中通常的全纯一式被更一般的、依赖于时空的一式所取代。这产生了用于生成依赖于时间的可积场论的系统过程，并建立了普遍关系：对于以这种方式获得的每个理论，允许的时间依赖性与单循环重整化群流一致。尽管存在明确的时间依赖性，但这些理论保留了 Lax 可积性，并且仍然可以通过逆散射方法求解。\n\n我们的构造适用于超局部和非超局部理论，并将先前已知的时间相关西格玛模型扩展到更广泛的可积系统类别。它还承认将膨胀子引力重写为与物质耦合，从而产生了一大堆二维经典可积膨胀子引力理论。我们还评论了最近在凝聚态物理和由降维爱因斯坦引力产生的非自治可积系统中研究的瞬态可积模型的联系。", "authors": [{"name": "Shota Komatsu"}, {"name": "Jun-ichi Sakamoto"}, {"name": "Anders Wallberg"}, {"name": "Masahito Yamazaki"}], "featured_authors": [{"name": "Shota Komatsu"}, {"name": "Jun-ichi Sakamoto"}, {"name": "Anders Wallberg"}, {"name": "Masahito Yamazaki"}], "author_count": 4}, {"id": "2607.02658", "category": "hep-th", "title": "The giant graviton expansion in AdS$_5\\times$SE$_5$", "abstract": "We study giant graviton-like D3-branes as probe configurations in type IIB supergravity backgrounds AdS$_5\\times$SE$_5$, with emphasis on the structure of the five-dimensional Sasaki-Einstein manifolds SE$_5$. These configurations wrap supersymmetric three-cycles in SE$_5$ and rotate at the speed of light along the Reeb direction. We formulate the general problem in terms of the transverse Kähler potential and show that configurations carrying maximal angular momentum can be described by loci where the transverse Kähler potential diverges in suitably chosen coordinates. We quantize a particular set of excitations, similar to those considered in the AdS$_5\\times S^5$ case, and show that they are governed by a Fock-Darwin problem with a conical deficit, which generalizes the Landau problem obtained for $S^5$. Succinctly, the information about the geometry of SE$_5$ is encoded in the form of the external potential and the conical deficit. We compute a protected contribution to the superconformal index arising from quantized fluctuations of supersymmetric giant graviton configurations. For the explicit case of AdS$_5\\times T^{1,1}$, we recover the finite-N protected index of the dual quiver ${\\cal N}=1$ superconformal field theory in the sector captured by a non-Abelian generalization of the quantized degrees of freedom.", "url": "https://arxiv.org/abs/2607.02658", "type": "理论", "summary": "我们研究巨型类引力子 D3 膜作为 IIB 型超重力背景 AdS$_5\\times$SE$_5$ 中的探针构型，重点研究五维 Sasaki-Einstein 流形 SE$_5$ 的结构。这些配置将超对称三周期包裹在 SE$_5$ 中，并沿 Reeb 方向以光速旋转。我们根据横向卡勒势公式化了一般问题，并表明携带最大角动量的构型可以通过横向卡勒势在适当选择的坐标中发散的轨迹来描述。我们量化了一组特定的激励，类似于 AdS$_5\\times S^5$ 情况中考虑的激励，并表明它们受具有圆锥赤字的 Fock-Darwin 问题控制，该问题概括了针对 $S^5$ 获得的朗道问题。简而言之，SE$_5$ 的几何信息以外部电势和圆锥形赤字的形式编码。我们计算了由超对称巨引力子构型的量化涨落引起的超共形指数的受保护贡献。\n\n对于 AdS$_5\\times T^{1,1}$ 的显式情况，我们恢复了由量化自由度的非阿贝尔概括捕获的扇区中双箭袋 ${\\cal N}=1$ 超共形场论的有限 N 保护索引。", "authors": [{"name": "Alfredo González Lezcano"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Augniva Ray"}], "featured_authors": [{"name": "Alfredo González Lezcano"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Augniva Ray"}], "author_count": 3}, {"id": "2607.02861", "category": "hep-th", "title": "Holographic Learning from Fermionic Spectra: Application to Strange Metal Phenomenology", "abstract": "We develop a data-driven framework based on Neural ODEs that learns the bulk metric functions and the $U(1)$ gauge potential of a static, planar-symmetric black hole from boundary fermionic spectral functions. After validating the framework on the Einstein--Maxwell and Gubser--Rocha models with high accuracy, we apply it to the strange metal phase of the cuprate $\\mathrm{(Pb,Bi)_2Sr_{2-x}La_xCuO_{6+\\delta}}$ within a semi-holographic setting, taking as input the spectral data generated from the extended power-law liquid (PLL) model calibrated by angle-resolved photoemission measurements. At low temperatures and near-optimal doping, we show that the normalized extended PLL model can be well described by an effective representative of a conformal class near $\\mathrm{AdS}_{2}\\times\\mathbb{R}^{2}$ black holes with a nearly vanishing gauge potential ($qA_t\\sim10^{-4}\\,\\mathrm{eV}$). A key structural observation is that our probe fermion is massless and therefore insensitive to the conformal factor $\\Omega(z)$. This further implies that fixing the macroscopic thermodynamics such as the electronic specific heat would require independent input beyond the fermionic spectra. We also delineate the applicability boundaries of our framework: the learned effective model remains viable across doping at low temperatures, with the loss increasing mildly as the samples move away from the marginal Fermi liquid point toward the overdoped side; the principal limitation is temperature, where both the loss and $qA_t$ grow substantially.", "url": "https://arxiv.org/abs/2607.02861", "type": "理论", "summary": "我们开发了一个基于神经常微分方程的数据驱动框架，该框架从边界费米子谱函数中学习静态平面对称黑洞的体积度量函数和 $U(1)$ 规范势。在以高精度验证了 Einstein-Maxwell 和 Gubser-Rocha 模型上的框架后，我们将其应用于半全息环境中铜酸盐 $\\mathrm{(Pb,Bi)_2Sr_{2-x}La_xCuO_{6+\\delta}}$ 的奇怪金属相，以通过角分辨光电发射测量校准的扩展幂律液体 (PLL) 模型生成的光谱数据作为输入。在低温和接近最佳掺杂的情况下，我们表明，归一化扩展 PLL 模型可以通过 $\\mathrm{AdS}_{2}\\times\\mathbb{R}^{2}$ 黑洞附近保角类的有效代表来很好地描述，该黑洞具有接近消失的规范势 ($qA_t\\sim10^{-4}\\,\\mathrm{eV}$)。一个关键的结构观察是我们的探针费米子是无质量的，因此对共形因子 $\\Omega(z)$ 不敏感。这进一步意味着固定宏观热力学（例如电子比热）将需要费米子光谱之外的独立输入。\n\n我们还描绘了我们框架的适用范围：学习到的有效模型在低温下的掺杂过程中仍然可行，随着样品从边缘费米液体点向过度掺杂侧移动，损耗略有增加；主要限制是温度，此时损耗和 $qA_t$ 都会大幅增长。", "authors": [{"name": "Hong-Zhi Xiao"}, {"name": "Zhan-Zhi He"}, {"name": "Zhuo-Yu Xian"}, {"name": "Shao-Feng Wu"}], "featured_authors": [{"name": "Hong-Zhi Xiao"}, {"name": "Zhan-Zhi He"}, {"name": "Zhuo-Yu Xian"}, {"name": "Shao-Feng Wu"}], "author_count": 4}, {"id": "2607.02905", "category": "hep-th", "title": "Pre-Strings Lectures on Artificial Intelligence", "abstract": "These notes are based on six lectures given over three days at the Pre-Strings 2026 school in Shanghai. Day 1 develops neural network essentials, organized around the expressivity, statistics, and dynamics of neural networks, presented with a field-theoretic lens. Day 2 develops a neural network approach to field theory (NN-FT), in which a field theory is defined by a network architecture and a density on its parameters, and surveys recent results. Examples include a universality theorem, a neural network realization of Liouville theory, famous string amplitudes, topological sectors and the Kosterlitz-Thouless transition, Ward identities and anomalies, and a new derivation of the critical dimension of the bosonic string. Day 3 turns the lens around and covers applied AI for string theory: agentic workflows that are changing how the other techniques are implemented, physics-informed neural networks and Calabi-Yau metrics, reinforcement learning and search in the string landscape and in knot theory, and interpretable supervised learning with an eye towards conjecture generation.", "url": "https://arxiv.org/abs/2607.02905", "type": "理论", "summary": "这些笔记基于在上海 Pre-Strings 2026 学校三天内进行的六场讲座。第一天开发神经网络基础知识，围绕神经网络的表达性、统计和动力学进行组织，并通过场论镜头进行呈现。第 2 天开发场论的神经网络方法 (NN-FT)，其中场论由网络架构及其参数密度定义，并调查最新结果。例子包括普适性定理、刘维尔理论的神经网络实现、著名的弦振幅、拓扑扇区和科斯特利茨-托利斯转变、沃德恒等式和异常，以及玻色弦临界尺寸的新推导。第三天将镜头转向弦理论，涵盖人工智能的应用：正在改变其他技术实施方式的代理工作流程、基于物理的神经网络和 Calabi-Yau 度量、弦景观和纽结理论中的强化学习和搜索，以及着眼于猜想生成的可解释监督学习。", "authors": [{"name": "James Halverson"}], "featured_authors": [{"name": "James Halverson"}], "author_count": 1}, {"id": "2607.02970", "category": "hep-th", "title": "Null-strings Gauged, Reloaded and Quantized, I: Canonical Quantization in the Light-Cone Gauge", "abstract": "We study the light-cone quantization of null-strings in $D$ dimensional flat target-space. Incorporating the essential new gauge symmetry and the associated constraint structure of the null-string, allows one to solve for one more degree of freedom (DoF) compared to the standard light-cone gauge, reducing the physical phase space to $(D-3)$ propagating DoF. Quantization is formulated directly in the Schrödinger representation, leading to a Hilbert space of wavefunctions on the reduced configuration space. The space of physical states is built on a reduced phase space associated with the corrected gauge structure. We discuss the ground-state wavefunction and a generic class of excited states. As a direct consequence of the overlooked Carroll-Weyl gauge symmetry of the null-strings, we find the remarkable and perhaps unexpected result that null-strings exhibit a discrete spectrum. Our analysis indicate that there is no critical dimension for null-strings, and $D$ can be arbitrary.", "url": "https://arxiv.org/abs/2607.02970", "type": "理论", "summary": "我们研究 $D$ 维平坦目标空间中空串的光锥量化。与标准光锥规范相比，结合基本的新规范对称性和相关的零弦约束结构，可以求解多一个自由度 (DoF)，从而将物理相空间减少到 $(D-3)$ 传播 DoF。量化直接用薛定谔表示形式表示，从而在简化的构型空间上形成波函数的希尔伯特空间。物理状态空间建立在与校正规范结构相关的简化相空间上。我们讨论基态波函数和一类通用的激发态。作为被忽视的零弦卡罗尔-韦尔规范对称性的直接结果，我们发现了显着且可能出乎意料的结果：零弦表现出离散谱。我们的分析表明，空字符串没有关键维度，并且 $D$ 可以是任意的。", "authors": [{"name": "Ida M. Rasulian"}, {"name": "M.M. Sheikh-Jabbari"}, {"name": "H. Yavartanoo"}], "featured_authors": [{"name": "Ida M. Rasulian"}, {"name": "M.M. Sheikh-Jabbari"}, {"name": "H. Yavartanoo"}], "author_count": 3}, {"id": "2607.03109", "category": "hep-th", "title": "Graph Neural Networks for the Graphical Bootstrap", "abstract": "We study a graph classification problem involving over 20 million graphs, arising from high-order perturbative computations of correlators in planar $\\mathcal{N}=4$ super-Yang--Mills, a model closely related to the theory of the strong nuclear force. We benchmark graph neural networks, including graph transformers, achieving robust generalization to larger graphs with up to $99.996\\%$ ROC AUC. Then, we analyze how the models can be used to gain a computational speedup compared to the traditional graphical bootstrap algorithm, through shrinking the redundant data by up to $85.5\\%$ at the level of denominator graphs. Finally, we study the embeddings of the models to investigate their interpretability.", "url": "https://arxiv.org/abs/2607.03109", "type": "理论", "summary": "我们研究了一个涉及超过 2000 万张图的图分类问题，该问题源自平面 $\\mathcal{N}=4$ super-Yang--Mills 中相关器的高阶微扰计算，该模型与强核力理论密切相关。我们对图神经网络（包括图转换器）进行了基准测试，实现了对更大图的稳健泛化，ROC AUC 高达 $99.996\\%$。然后，我们分析了如何使用模型来获得与传统图形引导算法相比的计算加速，通过在分母图级别将冗余数据缩小高达 $85.5\\%$。最后，我们研究模型的嵌入以研究它们的可解释性。", "authors": [{"name": "Rigers Aliaj"}, {"name": "Gabriele Dian"}, {"name": "Reza Doobary"}, {"name": "Paul Heslop"}], "featured_authors": [{"name": "Rigers Aliaj"}, {"name": "Gabriele Dian"}, {"name": "Reza Doobary"}, {"name": "Paul Heslop"}], "author_count": 4}, {"id": "2607.03120", "category": "hep-th", "title": "Exact Schwarzian Metric Factor and Holographic Wilson-Loop Screening", "abstract": "We evaluate exactly the radial metric factor $h(\\zeta)$ generated by Schwarzian averaging in the AdS$_2$ throat of an extremal Reissner--Nordström AdS$_5$ black brane. The result is a Gaussian integral against $\\coth(\\pi y)$, valid at all radial depths, which Mordell's identity turns into an exact Appell--Lerch $q/q^\\ast$-series representation. The dual series identifies the nonperturbative scale $e^{-\\pi^2 C/\\zeta}$ missed by any finite near-boundary truncation. The third parametric derivative required by the evaluation generates the quasimodular Eisenstein series $E_2$, absent from the classical Mordell identity. From the integral representation we prove that $\\mathcal{G}_0(\\zeta):=h(\\zeta)/\\zeta^2$ is completely monotone and hence has no interior minimum, so any confining minimum produced by a finite near-boundary truncation is an artifact. We also compute the exact relative variance of the Schwarzian kernel, which makes the averaged-metric approximation error quantitative and shows that the absence of a confining minimum is robust across moment-based effective geometries. Applied to the temporal rectangular Wilson loop, the exact throat gives algebraic screening, $E(L)\\sim -\\kappa_{\\rm IR}/L^2$, the Wilson-loop diagnostic of the semi-local quantum-liquid IR of the extremal RN brane. A numerical check in a simple matched geometry confirms that the screened saddle is the dominant string configuration, and an exact-versus-truncated force comparison shows that the apparent constant-force regime of the fourth-order truncation is not a feature of the exact geometry.", "url": "https://arxiv.org/abs/2607.03120", "type": "理论", "summary": "我们精确评估极值 Reissner--Nordström AdS$_5$ 黑膜 AdS$_2$ 喉部中 Schwarzian 平均生成的径向度量因子 $h(\\zeta)$。结果是针对 $\\coth(\\pi y)$ 的高斯积分，在所有径向深度都有效，莫德尔的恒等式将其转换为精确的 Appell--Lerch $q/q^\\ast$ 系列表示。对偶级数确定了任何有限近边界截断所错过的非微扰尺度 $e^{-\\pi^2 C/\\zeta}$。评估所需的第三个参数导数生成拟模爱森斯坦级数 $E_2$，经典莫德尔恒等式中不存在。从积分表示中，我们证明 $\\mathcal{G}_0(\\zeta):=h(\\zeta)/\\zeta^2$ 是完全单调的，因此没有内部最小值，因此有限近边界截断产生的任何限制最小值都是伪影。我们还计算了 Schwarzian 核的精确相对方差，这使得平均度量近似误差定量化，并表明，在基于矩的有效几何形状中，限制最小值的缺失是稳健的。\n\n应用于时间矩形威尔逊环，精确喉管给出代数筛选，$E(L)\\sim -\\kappa_{\\rm IR}/L^2$，极值 RN 膜的半局域量子液体 IR 的威尔逊环诊断。对简单匹配几何结构的数值检查证实，屏蔽鞍座是主要的弦配置，并且精确与截断力的比较表明，四阶截断的表观恒力状态并不是精确几何结构的特征。", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2607.03199", "category": "hep-th", "title": "Singularities, Entropy and the Arrow of Time, {\\it or} Is CRT a Gauge Symmetry in Quantum Gravity?", "abstract": "We examine the question of whether the discrete transformation CRT is a gauge symmetry of ``Quantum Gravity\". Since the phrase in quotes is not yet completely well defined, we first try to define specific frameworks in which one might ask the question. We find that the general answer is NO. In asymptotically flat and AdS spaces, CRT is an asymptotic gauge symmetry in the same sense that the continuous parts of the Poincare/AdS isometry groups and scalar internal symmetries are. In eternal dS space it can be considered a spontaneously broken gauge symmetry if a certain ``Alice String\" configuration is allowed in the Thermofield double Hilbert space. This requires an extension of the conventional Chern-Simons rewriting of $2 + 1$ dimensional gravity. This interpretation only makes sense if we consider the underlying quantum mechanics to be time independent. General quantum measurement and semi-classical gravitational restrictions on measuring devices put {\\it a priori} limits on the existence of detectors with clocks that can actually measure proper time along a classical dS geodesic.", "url": "https://arxiv.org/abs/2607.03199", "type": "理论", "summary": "我们研究离散变换 CRT 是否是“量子引力”的规范对称性的问题。由于引号中的短语尚未完全明确定义，我们首先尝试定义可能提出问题的特定框架。我们发现一般答案是否定的。在渐近平坦空间和 AdS 空间中，CRT 是渐近规范对称性，其含义与庞加莱/AdS 等距群的连续部分和标量内部对称性相同。在永恒的 dS 空间中，如果热场双希尔伯特空间中允许某种“爱丽丝弦”配置，则可以将其视为自发破缺的规范对称性。这需要对 $2 + 1$ 维引力的传统 Chern-Simons 重写进行扩展。只有当我们认为底层量子力学与时间无关时，这种解释才有意义。一般量子测量和测量设备的半经典引力限制{\\先验}地限制了带有时钟的探测器的存在，这些探测器实际上可以沿经典 dS 测地线测量适当的时间。", "authors": [{"name": "T. Banks"}], "featured_authors": [{"name": "T. Banks"}], "author_count": 1}, {"id": "2607.03344", "category": "hep-th", "title": "Falling through the horizon of a quantum black hole", "abstract": "We study quantum-gravitational effects on the response of an infalling detector as it crosses the horizon of a near-extremal black hole in the framework of quantum JT gravity. These effects are incorporated via the gravitational dressing needed to define both the infalling trajectory and the local observables probed by the detector in a diffeomorphism-invariant way. In the black hole exterior, a preferred choice of dressing to the Schwarzian mode of JT gravity can be motivated in connection to geometric modular flow. We show how to extend this dressing to the black hole interior, defining local observables that are gravitationally dressed to both boundaries in the thermofield double state. The gravitational dressing connects the near-horizon region to the IR sector of the Schwarzian theory, leading to measurable effects as the horizon is approached. We find that the infalling detector is able to locally determine the location of the horizon and its temperature, violating the equivalence principle, but without encountering a firewall.", "url": "https://arxiv.org/abs/2607.03344", "type": "理论", "summary": "我们研究了当落入探测器穿过量子 JT 引力框架中的近极值黑洞视界时，量子引力对落入探测器响应的影响。这些效应通过定义落入轨迹和探测器以微分同胚不变的方式探测到的局部可观测值所需的重力修饰来结合。在黑洞外部，可以根据几何模流来激发对 JT 重力 Schwarzian 模式的优先选择。我们展示了如何将这种装饰扩展到黑洞内部，定义在热场双态中通过重力装饰到两个边界的局部可观测量。引力修饰将近地平线区域与施瓦茨理论的红外区域连接起来，当接近地平线时会产生可测量的影响。我们发现，落入探测器能够局部确定地平线的位置及其温度，这违反了等效原理，但不会遇到防火墙。", "authors": [{"name": "Victor Franken"}, {"name": "Thomas G. Mertens"}, {"name": "Bruno de S. L. Torres"}], "featured_authors": [{"name": "Victor Franken"}, {"name": "Thomas G. Mertens"}, {"name": "Bruno de S. L. Torres"}], "author_count": 3}, {"id": "2607.03434", "category": "hep-th", "title": "Berry Picking: Random Wave Chaos Hierarchy for BPS Microstate Geometries", "abstract": "We estimate the strength of chaos of probe waves and probe geodesics in different smooth supergravity backgrounds of decreasing supersymmetry and/or increasing length of the AdS throat in the interior (LLM geometry, supertubes, superstrata). We find that the wave chaos becomes stronger and stronger with less supersymetry and longer throats; in other words, chaos becomes stronger as we approach black hole solutions. Geodesic motion shows the opposite trend, becoming more and more regular. Testing the wave chaos by its compliance with the Berry random wave hypothesis and the geodesic chaos by computing Poincare sections, we explain the dichotomy between wave and geodesic motion by the existence of stable periodic orbits inside long throats while the overall measure of KAM tori decreases. Computing the Renyi entropies for the dual CFT states in the weak coupling regime, we show that they do not have such universal trends and the complexity depends on the specifics of the state rather than just the amount of supersymmetry and throat length. We conclude that the hierarchy of BPS chaos works differently in the bulk and in field theory, and in either case cannot be simply extrapolated to black holes.", "url": "https://arxiv.org/abs/2607.03434", "type": "理论", "summary": "我们估计了在不同的平滑超重力背景下，探测波和探测测地线的混沌强度，这些背景是超对称性降低和/或内部 AdS 喉部长度增加（LLM 几何、超管、上地层）。我们发现，随着超对称性越来越少、波喉越来越长，混沌波变得越来越强；换句话说，当我们接近黑洞解时，混沌就会变得更强。测地运动呈现出相反的趋势，变得越来越有规律。通过计算庞加莱剖面来测试波混沌是否符合贝里随机波假说和测地线混沌，我们通过长喉内稳定周期轨道的存在来解释波和测地线运动之间的二分性，同时 KAM 环面的总体测量值减小。计算弱耦合状态下双 CFT 态的 Renyi 熵，我们表明它们不具有这种普遍趋势，并且复杂性取决于态的具体情况，而不仅仅是超对称性的数量和喉部长度。\n\n我们得出的结论是，BPS 混沌的层次结构在整体和场论中的工作方式不同，并且在任何一种情况下都不能简单地外推到黑洞。", "authors": [{"name": "Vladan Djukić"}, {"name": "Milica Stepanović"}, {"name": "Mihailo Čubrović"}], "featured_authors": [{"name": "Vladan Djukić"}, {"name": "Milica Stepanović"}, {"name": "Mihailo Čubrović"}], "author_count": 3}, {"id": "2607.03439", "category": "hep-th", "title": "Finite path integral limits work in cases where the perturbative series is not Borel summable", "abstract": "The perturbative expansion in powers of the coupling of observables in quantum field theory and quantum mechanics is known to yield an asymptotic series. If the original physical system is well-behaved and a finite observable is expected, this can often be calculated via a Borel resummation of the asymptotic series. However, there are cases where a system is well-behaved and the series is not Borel summable. This typically occurs when the physical system has a non-trivial vacuum structure. It has recently been shown that if the perturbative series is carried out under finite path integral limits, one can obtain a convergent series that yields observables even at strong coupling. This was recently used to obtain the energy at strong coupling for the anharmonic oscillator. This is a Borel summable case so the question is whether finite path integral limits work when the series is not Borel summable. To begin answering this question we consider a simple non-Borel summable case: the series stemming from a basic integral where the function has a double-well shape and hence two minima. The integral has an exact analytical expression that the series can be compared to. Under finite integral limits that run from $-L$ to $L$, where $L$ is finite, positive and real, we develop two perturbative series in powers of the coupling: one by expanding the integral about the local maximum at the origin and the other by expanding it about one of the minima. In both cases, we obtain an absolutely convergent series and the series sums to the exact analytical expression of the original integral in the infinite $L$ limit. It is significant that a perturbative expansion about one of the minima reproduces the exact analytical expression because this implies that it captures the full effect of both minima.", "url": "https://arxiv.org/abs/2607.03439", "type": "理论", "summary": "众所周知，量子场论和量子力学中可观测量耦合幂的微扰展开会产生渐近级数。如果原始物理系统表现良好并且预期有有限的可观测量，则通常可以通过渐近级数的 Borel 恢复来计算。然而，在某些情况下，系统表现良好且级数不可进行 Borel 求和。当物理系统具有重要的真空结构时，通常会发生这种情况。最近的研究表明，如果在有限路径积分限制下进行微扰级数，则即使在强耦合下也可以获得收敛级数，该级数也能产生可观测量。最近，它被用来获取非简谐振子强耦合时的能量。这是 Borel 可求和的情况，因此问题是当级数不可 Borel 可求和时，有限路径积分限制是否有效。为了开始回答这个问题，我们考虑一个简单的非 Borel 可求和的情况：源自基本积分的级数，其中函数具有双井形状，因此有两个最小值。积分具有可以与级数进行比较的精确解析表达式。\n\n在从 $-L$ 到 $L$ 的有限积分限制下，其中 $L$ 是有限的、正的和实数，我们在耦合幂中开发了两个微扰级数：一个通过在原点处围绕局部最大值展开积分，另一个通过围绕其中一个最小值展开积分。在这两种情况下，我们都获得了绝对收敛级数，并且该级数之和为无限 $L$ 极限中原始积分的精确解析表达式。重要的是，关于最小值之一的微扰展开再现了精确的解析表达式，因为这意味着它捕获了两个最小值的全部影响。", "authors": [{"name": "Ariel Edery"}], "featured_authors": [{"name": "Ariel Edery"}], "author_count": 1}, {"id": "2607.03452", "category": "hep-th", "title": "Quantum nucleation of black hole mimickers via chaos dominated tunneling", "abstract": "Black hole mimickers, ultracompact horizonless objects, have been proposed as alternatives to black holes in a variety of settings, including extensions of general relativity and scenarios involving matter sectors beyond the Standard Model. Their formation in gravitational collapse of matter requires quantum mechanical tunneling to occur on a length scale of the order of the Schwarzschild radius of the corresponding black hole. We propose a mechanism, based on multichannel enhancement catalyzed by quantum chaotic dynamics, that can dramatically amplify the quantum mechanical transmission across a tunneling barrier. We explore, in particular, how the nucleation of a string theoretic black shell is enhanced via this mechanism. We anticipate similar results to hold for other proposed black hole mimickers.", "url": "https://arxiv.org/abs/2607.03452", "type": "理论", "summary": "黑洞模仿者，超紧凑的无地平线物体，已被
