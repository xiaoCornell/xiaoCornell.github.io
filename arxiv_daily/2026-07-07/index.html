mentary algebraic proof that it admits no faithful orthogonal representation in C^3. The obstruction in G_{32} is therefore not chromatic but projective-geometric: the incidence relations force two distinct atoms to collapse onto the same ray.", "url": "https://arxiv.org/abs/2607.04289", "type": "理论", "summary": "我们在正交超图中的两个不同现象之间建立了严格的逻辑分离：色完整性，为所有上下文分配单个全局一致的非简并谱的可能性，以及几何可协调性，光线忠实正交表示的存在。大于希尔伯特空间维数的强色数仅阻碍前者。它本身并不妨碍忠实正交表示的存在。我们通过比较具有相同强色数的两个三维示例来明确这种分离。 Yu-Oh 配置的完整 25 射线版本具有很强的色数四，并且在 R^3 中具有明确的忠实正交表示。相反，Greechie 的 G_{32} 超图也具有强色数四，并且具有一组分离且统一的二值状态，但我们给出了一个基本代数证明，它不承认 C^3 中的忠实正交表示。因此，G_{32} 中的障碍不是色度的，而是射影几何的：入射关系迫使两个不同的原子塌陷到同一射线上。", "authors": [{"name": "Karl Svozil"}], "featured_authors": [{"name": "Karl Svozil"}], "author_count": 1}, {"id": "2607.04320", "category": "quant-ph", "title": "Fundamental limits on state preparation for an open qubit", "abstract": "We analytically determine the ultimate limits of state preparation in two-level open quantum systems driven by coherent control. For a dissipative qubit governed by a GKSL master equation, we give an exact characterization of the reachable set in the Bloch ball. Dissipation excludes a region of states in the Bloch ball which cannot be approached even under arbitrarily strong coherent driving, and we prove that this region has a nontrivial geometry whose boundary is a surface of revolution around the $x$-axis which is analytic except for two conical singularities. We derive a closed-form control protocol for moving on this boundary, and construct an explicit protocol that steers the system arbitrarily close to any prescribed boundary state. These results provide a complete geometric constructive description of reachable qubit states in the standard dissipative environment, establishing fundamental bounds on controllability and state-preparation fidelity for open two-level quantum systems.", "url": "https://arxiv.org/abs/2607.04320", "type": "理论", "summary": "我们通过分析确定了由相干控制驱动的两级开放量子系统中状态准备的最终极限。对于由 GKSL 主方程控制的耗散量子位，我们给出了布洛赫球中可达集的精确表征。耗散排除了布洛赫球中的一个状态区域，即使在任意强的相干驱动下也无法接近该区域，并且我们证明该区域具有非平凡的几何形状，其边界是围绕 $x$ 轴的旋转表面，除了两个圆锥奇点之外，该表面是解析的。我们推导出一个用于在该边界上移动的封闭式控制协议，并构建一个显式协议来引导系统任意接近任何规定的边界状态。这些结果提供了标准耗散环境中可达到的量子位状态的完整几何构造性描述，为开放两级量子系统的可控性和状态准备保真度建立了基本界限。", "authors": [{"name": "D.A. Abraamian"}, {"name": "L.V. Lokutsievskiy"}, {"name": "A.N. Pechen"}], "featured_authors": [{"name": "D.A. Abraamian"}, {"name": "L.V. Lokutsievskiy"}, {"name": "A.N. Pechen"}], "author_count": 3}, {"id": "2607.04348", "category": "quant-ph", "title": "Supersymmetry and Entanglement in the Generalized Dirac Oscillator", "abstract": "The supersymmetric properties of the generalized Dirac oscillator allow us to determine the entanglement entropy between the spin and the continuous variable in a purely algebraic manner. The entanglement has a relativistic origin and disappears in the nonrelativistic limit. The entanglement entropy attains its maximal value in the limit of infinite energy.", "url": "https://arxiv.org/abs/2607.04348", "type": "理论", "summary": "广义狄拉克振子的超对称性质使我们能够以纯代数的方式确定自旋和连续变量之间的纠缠熵。纠缠具有相对论起源，并在非相对论极限中消失。纠缠熵在无限能量的极限内达到最大值。", "authors": [{"name": "H. P. Laba"}, {"name": "V. M. Tkachuk"}], "featured_authors": [{"name": "H. P. Laba"}, {"name": "V. M. Tkachuk"}], "author_count": 2}, {"id": "2607.04462", "category": "quant-ph", "title": "Noise-Aware Synthesis of Quantum LDPC Encoder Circuits via Two-Sided Hamming Descent", "abstract": "Quantum low-density parity-check (LDPC) codes are a promising route to fault-tolerant quantum computation, but their use requires efficient preparation of encoded states. Standard encoder constructions generate circuits through fixed algebraic procedures, yet the resulting circuit can contain substantial redundancy. We formulate LDPC encoder preparation as a circuit-resynthesis problem: given the linear-reversible matrix implemented by the encoder's CNOT block, we seek a lower-cost equivalent circuit that can be routed efficiently on the target hardware and which mitigates noise. We propose a novel optimization approach referred as two-sided Hamming descent and a noise-aware optimization pipeline for this task. Across several families of Calderbank-Shor-Steane (CSS) LDPC encoders, including Bivariate Bicycle, hypergraph-product, and entanglement-assisted codes, the proposed pipeline produces substantially smaller and shallower encoder circuits than the standard constructions and the synthesis baselines considered, cutting gate counts by 53.8% in aggregate across the benchmark and by up to 68% on the Bivariate Bicycle family. The gains remain visible after routing, where the two-qubit depth is reduced by up to 71% and translate into higher-fidelity state preparation under circuit-level noise. On the Bivariate Bicycle family, live-range scheduling further reduces routed preparation failure by up to 13.7% without adding two-qubit gates to the selected circuit. These results indicate that encoder-matrix resynthesis, combined with hardware-calibrated selection and scheduling, is an effective compiler-level tool for preparing quantum LDPC code states.", "url": "https://arxiv.org/abs/2607.04462", "type": "理论+数值", "summary": "量子低密度奇偶校验（LDPC）码是容错量子计算的一条有前途的途径，但它们的使用需要有效地准备编码状态。标准编码器结构通过固定代数过程生成电路，但所得电路可能包含大量冗余。我们将 LDPC 编码器准备制定为电路重新综合问题：给定编码器 CNOT 块实现的线性可逆矩阵，我们寻求一种成本较低的等效电路，可以在目标硬件上有效路由并减轻噪声。我们为此任务提出了一种称为两侧汉明下降的新颖优化方法和噪声感知优化管道。在 Calderbank-Shor-Steane (CSS) LDPC 编码器的多个系列中，包括双变量 Bicycle、超图积和纠缠辅助码，所提出的管道产生比标准结构和所考虑的合成基线更小、更浅的编码器电路，在基准上总共减少了 53.8% 的门数，在双变量 Bicycle 系列上减少了高达 68%。\n\n布线后增益仍然可见，其中两个量子位深度减少了高达 71%，并在电路级噪声下转化为更高保真度的状态准备。在 Bivariate Bicycle 系列上，生命范围调度进一步将路由准备失败减少了 13.7%，而无需向所选电路添加两个量子位门。这些结果表明，编码器矩阵重新合成与硬件校准的选择和调度相结合，是一种用于准备量子 LDPC 码状态的有效编译器级工具。", "authors": [{"name": "Aditya Sodhani"}, {"name": "Keshab K. Parhi"}], "featured_authors": [{"name": "Aditya Sodhani"}, {"name": "Keshab K. Parhi"}], "author_count": 2}, {"id": "2607.04488", "category": "quant-ph", "title": "Trace-to-Hilbert-Schmidt Speed Ratio in Quantum Dynamics: Universal Bounds and Effective Rank", "abstract": "We study the ratio between the trace speed and the Hilbert-Schmidt speed for differentiable finite-dimensional quantum states, $\\mathcal R(\\phi)=\\|\\partial_\\phi\\rho(\\phi)\\|_1/\\|\\partial_\\phi\\rho(\\phi)\\|_2$. Because $\\partial_\\phi\\rho(\\phi)$ is always Hermitian and traceless, this ratio is constrained more strongly than for a generic operator. For any nonzero tangent operator $X=\\partial_\\phi\\rho$ of rank $r$, we prove the sharp bounds $\\sqrt{2}\\le \\|X\\|_1/\\|X\\|_2\\le \\sqrt r$. The lower bound is attained exactly for rank-two tangents, while the upper bound is attained exactly when all nonzero singular values are equal, which in the traceless Hermitian setting requires even rank. At every nonstationary point of a pure-state family, the tangent has rank two, implying $\\mathcal R=\\sqrt2$. For odd Hilbert-space dimension $d$, we further prove the sharp global maximum $\\mathcal R\\le \\sqrt{d-1/d}$, with equality characterized by full-rank spectra whose positive and negative eigenvalues are separately degenerate and have multiplicities differing by one. We identify $\\mathcal R^2$ as the inverse participation ratio of the singular-value distribution of the tangent operator, giving $\\mathcal R$ a natural interpretation as an effective-rank diagnostic for local quantum dynamics. Furthermore, we decompose the effective rank into classical (eigenvalue) and quantum (eigenvector) contributions and prove the bound $r_{\\mathrm{eff}}\\le r_C + r_Q$, with equality guaranteed when either component vanishes. We establish a direct inequality linking the effective rank to the quantum Fisher information (QFI), which forces a large number of active singular modes when the QFI is small relative to the squared trace speed. Finally, we derive a hierarchy of quantum speed limits in which the effective rank controls the tightness of bounds expressed through the Hilbert-Schmidt speed.", "url": "https://arxiv.org/abs/2607.04488", "type": "理论", "summary": "我们研究可微分有限维量子态的迹线速度和希尔伯特-施密特速度之间的比率，$\\mathcal R(\\phi)=\\|\\partial_\\phi\\rho(\\phi)\\|_1/\\|\\partial_\\phi\\rho(\\phi)\\|_2$。由于 $\\partial_\\phi\\rho(\\phi)$ 始终是 Hermitian 且无迹的，因此该比率比通用运算符受到更严格的约束。对于$r$阶的任意非零正切算子$X=\\partial_\\phi\\rho$，我们证明锐界$\\sqrt{2}\\le \\|X\\|_1/\\|X\\|_2\\le \\sqrt r$。对于二阶切线，可以精确地达到下界，而当所有非零奇异值相等时，可以精确地达到上限，这在无迹厄米特设置中需要偶数阶。在纯态族的每个非平稳点，切线的秩为二，这意味着 $\\mathcal R=\\sqrt2$。对于奇数希尔伯特空间维 $d$，我们进一步证明了尖锐的全局最大值 $\\mathcal R\\le \\sqrt{d-1/d}$，其等式由满秩谱表征，其正负特征值分别简并且重数相差一。\n\n我们将 $\\mathcal R^2$ 确定为正切算子奇异值分布的逆参与比，从而将 $\\mathcal R$ 自然地解释为局部量子动力学的有效秩诊断。此外，我们将有效秩分解为经典（特征值）和量子（特征向量）贡献，并证明边界 $r_{\\mathrm{eff}}\\le r_C + r_Q$，当任一分量消失时保证相等。我们建立了一个直接的不等式，将有效等级与量子费希尔信息（QFI）联系起来，当 QFI 相对于平方跟踪速度较小时，这会强制出现大量的活动奇异模式。最后，我们推导出量子速度限制的层次结构，其中有效等级控制通过希尔伯特-施密特速度表示的边界的紧密度。", "authors": [{"name": "Hossein Rangani Jahromi"}], "featured_authors": [{"name": "Hossein Rangani Jahromi"}], "author_count": 1}, {"id": "2607.04519", "category": "quant-ph", "title": "Schrodinger Oscillator and its Thermal Properties in a Dynamical Noncommutative Space", "abstract": "In this paper, we study the two-dimensional Schrodinger oscillator within a dynamical noncommutative (DNC) space. By leveraging perturbation theory, we derive the energy eigenvalues and eigenvectors and systematically analyze the effects of both dynamical and non-dynamical noncommutative settings. First-order corrections to the eigensystem are obtained, revealing that the energy shift explicitly depends on the DNC parameter tau. Furthermore, we explore the thermal properties of the system by employing the partition function. Numerical results are presented to provide a comprehensive analysis of the system behavior under the considered effects. Notably, in the DNC framework, the commutation relations and the deformation parameter are position-dependent. Using the two-dimensional Bopp-shift, we effectively map the noncommutative problem to its commutative counterpart.", "url": "https://arxiv.org/abs/2607.04519", "type": "理论+数值", "summary": "在本文中，我们研究动态非交换（DNC）空间内的二维薛定谔振荡器。通过利用微扰理论，我们推导了能量特征值和特征向量，并系统地分析了动态和非动态非交换设置的影响。获得了对本征系统的一阶修正，表明能量偏移明确取决于 DNC 参数 tau。此外，我们通过采用配分函数来探索系统的热性能。给出的数值结果可以对所考虑的影响下的系统行为进行全面分析。值得注意的是，在 DNC 框架中，换向关系和变形参数是位置相关的。使用二维波普位移，我们有效地将非交换问题映射到其交换对应问题。", "authors": [{"name": "Ilyas Haouam"}], "featured_authors": [{"name": "Ilyas Haouam"}], "author_count": 1}, {"id": "2607.04586", "category": "quant-ph", "title": "QuTuner: Feature- and Learning-Guided Optimization Pass Tuning for Quantum Compilers", "abstract": "Quantum compilers play a key role in transforming quantum circuits into lower-cost implementations with improved execution fidelity. This process is commonly guided by circuit-level metrics, such as gate counts and circuit depth. Although compiler pass tuning has been widely studied in classical compilation, directly transferring these techniques to quantum compilers is challenging, because quantum programs are expressed as circuits and exhibit optimization behaviors that are shaped by quantum-specific structures. Prior quantum compiler tuning approaches have begun to use circuit features to guide pass selection, but they remain limited in two aspects: they search only a small portion of the optimization-pass space, and they mainly rely on static features that do not explicitly reflect how a circuit reacts to compiler optimizations. We present QuTuner, a feature-guided quantum compiler pass tuning framework that generalizes across compilers and tuning objectives. QuTuner first builds a large optimization dataset. It then characterizes each circuit from two complementary views: static circuit features that describe circuit structure, and optimization-aware pass embeddings that summarize the circuit's responses to individual optimization passes. Using these representations, QuTuner trains two offline models to retrieve and rank candidate pass sequences for unseen circuits, followed by lightweight refinement. We evaluate QuTuner on Qiskit and PyTKET using two benchmark suites. On Qiskit, QuTuner improves the evaluation-metric reduction by up to 84.85% over the strongest baseline while reducing tuning time by 73.59%. On PyTKET, it improves metric reduction by up to 18.68% with a 64.49% reduction in tuning time. These results show that QuTuner provides an effective approach to adaptive pass tuning for quantum compilers.", "url": "https://arxiv.org/abs/2607.04586", "type": "理论+数值", "summary": "量子编译器在将量子电路转变为具有更高执行保真度的低成本实现方面发挥着关键作用。此过程通常由电路级指标指导，例如门数和电路深度。尽管编译器传递调优已在经典编译中得到广泛研究，但将这些技术直接转移到量子编译器具有挑战性，因为量子程序被表示为电路并表现出由量子特定结构形成的优化行为。先前的量子编译器调优方法已经开始使用电路特征来指导通道选择，但它们在两个方面仍然受到限制：它们仅搜索优化通道空间的一小部分，并且它们主要依赖于静态特征，这些静态特征不能明确反映电路对编译器优化的反应。我们推出了 QuTuner，这是一种功能引导的量子编译器传递调优框架，可以跨编译器和调优目标进行泛化。 QuTuner 首先构建一个大型优化数据集。\n\n然后，它从两个互补的角度描述每个电路的特征：描述电路结构的静态电路特征，以及总结电路对各个优化通道的响应的优化感知通道嵌入。使用这些表示，QuTuner 训练两个离线模型来检索和排名未见过电路的候选传​​递序列，然后进行轻量级细化。我们使用两个基准套件在 Qiskit 和 PyTKET 上评估 QuTuner。在 Qiskit 上，QuTuner 将评估指标比最强基线提高了 84.85%，同时将调整时间缩短了 73.59%。在 PyTKET 上，它使指标减少量提高了 18.68%，调整时间减少了 64.49%。这些结果表明，QuTuner 为量子编译器提供了一种有效的自适应通道调整方法。", "authors": [{"name": "Ming Zhong"}, {"name": "Xiangyu Ren"}, {"name": "Jinglei Cheng"}, {"name": "Shaohua Li"}, {"name": "Zhiding Liang"}], "featured_authors": [{"name": "Ming Zhong"}, {"name": "Xiangyu Ren"}, {"name": "Jinglei Cheng"}, {"name": "Shaohua Li"}, {"name": "Zhiding Liang"}], "author_count": 5}, {"id": "2607.04598", "category": "quant-ph", "title": "Breaking the One-Dimensional Expressibility-Trainability Tradeoff", "abstract": "Expressive parameterized quantum circuits (PQCs) are often designed under a dilemma: the growth of expressibility and entangling power (EP) that improves Hilbert-space coverage is also expected to randomize an ansatz and activate barren-plateau (BP) conditions. We show that this dilemma is not a one-dimensional tradeoff. The usual picture collapses three inequivalent objects -- parameter-ensemble coverage, fixed-circuit entangling response, and local gradient moments -- into one scalar narrative. For a fixed circuit probed by Haar-product inputs, EP is a global two-copy mean of the output-entanglement distribution, whereas entangling-power deviation (EPD) is a global four-copy fluctuation descriptor. Gradient variance, however, is a local two-copy contraction selected by a parameter light cone and a cost observable. This moment hierarchy yields an analytic separation: equal EP need not imply equal trainability, as witnessed by equal-EP circuits with different EPDs and different gradient variances. These separations turn EP and EPD into a two-dial design rule for PQC ansatzes: EP measures how far the circuit has moved along the coverage dial, while EPD monitors whether input-dependent variability remains. We find that ansatz routes can reach high, Haar-like coverage before EPD and gradient variance collapse, showing that coverage and BP activation are distinct crossover events. The EP/EPD framework thus breaks the apparent one-dimensional expressibility-trainability tradeoff into a practical design rule: search for highly expressive PQCs in the window where coverage is high but BP-like homogenization has not yet erased trainable structure.", "url": "https://arxiv.org/abs/2607.04598", "type": "理论", "summary": "富有表现力的参数化量子电路（PQC）通常是在困境下设计的：提高希尔伯特空间覆盖范围的可表现性和纠缠力（EP）的增长也有望使模拟随机化并激活贫瘠高原（BP）条件。我们证明这种困境不是一维的权衡。通常的图片将三个不等价的对象——参数整体覆盖、固定电路纠缠响应和局部梯度矩——折叠成一个标量叙述。对于由 Haar 乘积输入探测的固定电路，EP 是输出纠缠分布的全局两副本均值，而纠缠功率偏差 (EPD) 是全局四副本波动描述符。然而，梯度方差是由参数光锥和成本可观测量选择的局部二拷贝收缩。此时层次结构产生了分析分离：相等的 EP 不一定意味着相等的可训练性，正如具有不同 EPD 和不同梯度方差的等 EP 电路所证明的那样。\n\n这些分离将 EP 和 EPD 变成 PQC 分析的双刻度盘设计规则：EP 测量电路沿着覆盖刻度盘移动的距离，而 EPD 监视是否仍然存在与输入相关的可变性。我们发现 ansatz 路线可以在 EPD 和梯度方差崩溃之前达到高的、类似 Haar 的覆盖率，这表明覆盖率和 BP 激活是不同的交叉事件。因此，EP/EPD 框架将表面上的一维可表达性与可训练性权衡打破为实用的设计规则：在覆盖率较高但类似 BP 均质化尚未消除可训练结构的窗口中搜索高表达性 PQC。", "authors": [{"name": "Kyoungho Cho"}, {"name": "Yu-Seong Jeon"}, {"name": "Jinhyoung Lee"}, {"name": "Jeongho Bang"}], "featured_authors": [{"name": "Kyoungho Cho"}, {"name": "Yu-Seong Jeon"}, {"name": "Jinhyoung Lee"}, {"name": "Jeongho Bang"}], "author_count": 4}, {"id": "2607.04669", "category": "quant-ph", "title": "Estimation of a sparse multi-qubit Hamiltonian via compressed sensing", "abstract": "Hamiltonian estimation is an effective approach in studying the structure and dynamical evolution of quantum systems. The difficulty in estimating the Hamiltonian is that an $N$-qubit Hamiltonian has $4^N-1$ unknown parameters, requiring exponentially many equations for information extraction. In this paper we develop a method based on compressed sensing to estimate the Hamiltonian of a multi-qubit system. We identify a problem where as $N$ increases, the common sufficient condition (Restricted Isometry Property) for compressed sensing often fails, obstructing the application of compressed sensing in ($N\\geq 3$)-qubit Hamiltonian estimation. To solve this problem, we propose a ``scale transformation\" technique to restore RIP and ensure a compressive estimation of a $k$-sparse Hamiltonian using only $O(k\\log(4^N/k))$ equations. In the numerical examples, we estimate the Hamiltonians of two 6- and 30-qubit systems, demonstrating the effectiveness of the method.", "url": "https://arxiv.org/abs/2607.04669", "type": "理论+数值", "summary": "哈密​​顿估计是研究量子系统结构和动态演化的有效方法。估计哈密顿量的困难在于 $N$ 个量子位哈密顿量有 $4^N-1$ 个未知参数，需要指数级多个方程来提取信息。在本文中，我们开发了一种基于压缩感知的方法来估计多量子位系统的哈密顿量。我们发现一个问题，随着 $N$ 的增加，压缩感知的常见充分条件（受限等距性质）经常失效，阻碍了压缩感知在 ($N\\geq 3$)-量子位哈密顿估计中的应用。为了解决这个问题，我们提出了一种“尺度变换”技术来恢复 RIP 并确保仅使用 $O(k\\log(4^N/k))$ 方程对 $k$ 稀疏哈密顿量进行压缩估计。在数值示例中，我们估计了两个 6 和 30 量子位系统的哈密顿量，证明了该方法的有效性。", "authors": [{"name": "Juntao Tu"}, {"name": "Yuanlong Wang"}, {"name": "Shuming Cheng"}, {"name": "Shuixin Xiao"}, {"name": "Zhibo Hou"}], "featured_authors": [{"name": "Juntao Tu"}, {"name": "Yuanlong Wang"}, {"name": "Shuming Cheng"}, {"name": "Shuixin Xiao"}, {"name": "Zhibo Hou"}], "author_count": 5}, {"id": "2607.04721", "category": "quant-ph", "title": "Mapping open quantum dynamics onto graphs", "abstract": "Graph-theoretic frameworks have been widely employed in quantum physics to address the high-dimensional complexity of quantum systems. Although open quantum dynamics incorporates system-bath coupling via numerous interacting operators, it has been formulated algebraically with a partial set of jump operators or statistically universal reservoirs, leaving the underlying connectivity structure largely unexplored. Here, we propose a universal graph-theoretic framework for Markovian quantum dynamics. The framework maps open quantum dynamics onto two uniquely defined graphs, where the quantum master equation is rigorously interpreted as the average wave characteristic of operator-valued signals across the graphs. Applying this framework to the open quantum Rabi model, we demonstrate an open-system generalization of Fock-state lattices, characterize graph-topological signatures of dissipation, and classify the weak-to-ultrastrong coupling transition. Building on these representations, graph pruning reveals the backbone of open quantum dynamics, which enables superior graph neural-network learning. Our results bridge graph theory and open quantum dynamics, achieving efficient data-driven analysis of high-dimensional complexity.", "url": "https://arxiv.org/abs/2607.04721", "type": "理论", "summary": "图论框架已广泛应用于量子物理学中，以解决量子系统的高维复杂性。尽管开放量子动力学通过众多相互作用的算子整合了系统-浴耦合，但它是用部分跳跃算子集或统计上通用的储层以代数形式表示的，而底层的连接结构在很大程度上尚未被探索。在这里，我们提出了马尔可夫量子动力学的通用图论框架。该框架将开放量子动力学映射到两个唯一定义的图上，其中量子主方程被严格解释为图上算子值信号的平均波特征。将该框架应用于开放量子拉比模型，我们展示了福克态晶格的开放系统推广，表征了耗散的图拓扑特征，并对弱到超强耦合转变进行了分类。基于这些表示，图剪枝揭示了开放量子动力学的支柱，从而实现了卓越的图神经网络学习。\n\n我们的结果将图论和开放量子动力学联系起来，实现了高维复杂性的高效数据驱动分析。", "authors": [{"name": "Kyuho Kim"}, {"name": "Dayeong Lee"}, {"name": "Seungkyun Park"}, {"name": "Xianji Piao"}, {"name": "Namkyoo Park"}, {"name": "Sunkyu Yu"}], "featured_authors": [{"name": "Kyuho Kim"}, {"name": "Dayeong Lee"}, {"name": "Seungkyun Park"}, {"name": "Xianji Piao"}, {"name": "Namkyoo Park"}, {"name": "Sunkyu Yu"}], "author_count": 6}, {"id": "2607.04736", "category": "quant-ph", "title": "Magnetic graphs for cavity quantum electrodynamics", "abstract": "Strengthening light-matter coupling has become a central challenge in cavity quantum electrodynamics (QED), enabling ultrafast gate operations, qubit protection, and deterministic nonlinear optics. As the coupling increases, even the simplest configuration, a two-level atom interacting with a quantized field, requires careful treatment, as exemplified by the gauge-invariant quantum Rabi model (QRM). Here we propose a magnetic graph model for single-atom cavity QED, which enables the interpretation of quantum dynamics across the ultrastrong coupling regime through graph connectivity. We demonstrate that the generalized QRM maps onto a complex bipartite graph of identical sites under Floquet boundary conditions. This framework captures the crossover from weak to deep-strong coupling via a single metric: the cost of disconnecting a nonmagnetic subgraph. We examine the mechanism underlying this connectivity transition, establishing phase frustration induced by subgraph topology as the primary driver. Scalable to many-body systems, this approach bridges graph theory and cavity QED, revealing highly complex-graph dynamics even in the simplest setting.", "url": "https://arxiv.org/abs/2607.04736", "type": "理论", "summary": "加强光与物质耦合已成为腔量子电动力学 (QED) 的核心挑战，从而实现超快门操作、量子位保护和确定性非线性光学。随着耦合的增加，即使是最简单的配置，即与量子场相互作用的两级原子，也需要仔细处理，例如规范不变的量子拉比模型（QRM）。在这里，我们提出了一种单原子腔 QED 的磁图模型，该模型能够通过图连通性解释超强耦合范围内的量子动力学。我们证明了广义 QRM 在 Floquet 边界条件下映射到相同位点的复杂二分图。该框架通过单个指标捕获从弱耦合到深强耦合的交叉：断开非磁性子图的成本。我们研究了这种连接转换背后的机制，建立了由子图拓扑引起的阶段挫败作为主要驱动因素。这种方法可扩展到多体系统，将图论和腔 QED 联系起来，即使在最简单的环境中也能揭示高度复杂的图动力学。", "authors": [{"name": "Sunkyu Yu"}, {"name": "Xianji Piao"}, {"name": "Namkyoo Park"}], "featured_authors": [{"name": "Sunkyu Yu"}, {"name": "Xianji Piao"}, {"name": "Namkyoo Park"}], "author_count": 3}, {"id": "2607.04845", "category": "quant-ph", "title": "HamQASBench: A Hamiltonian-Informed Diagnostic Benchmark for Evaluating Quantum Architecture Search", "abstract": "Quantum Architecture Search (QAS) automates the design of parameterized quantum circuits for variational quantum algorithms, yet existing benchmarks organize instances by molecular identity or qubit count -- criteria agnostic to Hamiltonian structure -- and rely solely on energy accuracy, which cannot detect structural failures such as over-parameterization on near-product ground states. We introduce HamQASBench, a Hamiltonian-informed diagnostic benchmark organizing 11 molecules into five structural tiers via fingerprints derived from the Pauli operator basis, computational basis representation, and ground-state entanglement. A post-hoc critical-structure extraction procedure identifies minimal circuits consistent with each tier's requirements, complementing energy-based evaluation with per-qubit entanglement analysis and pairwise state fidelity. Benchmarking five QAS methods across four paradigms reveals failure modes invisible to conventional metrics: over-parameterization in the minimalism regime, eigenstate commitment under degeneracy, a representation bottleneck in strongly correlated systems, topology-induced routing failure, and circuit search space growth as a scalability bottleneck.", "url": "https://arxiv.org/abs/2607.04845", "type": "理论+数值", "summary": "量子架构搜索 (QAS) 自动设计变分量子算法的参数化量子电路，但现有基准通过分子身份或量子位计数（与哈密顿结构无关的标准）组织实例，并且仅依赖于能量精度，无法检测结构故障，例如近产品基态的过度参数化。我们引入了 HamQASBench，这是一个基于哈密顿量的诊断基准，通过源自泡利算子基础、计算基础表示和基态纠缠的指纹将 11 个分子组织成五个结构层。事后关键结构提取程序可识别符合每一层要求的最小电路，通过每量子位纠缠分析和成对状态保真度补充基于能量的评估。\n\n对四种范式的五种 QAS 方法进行基准测试揭示了传统指标不可见的故障模式：极简主义体系中的过度参数化、简并下的本征态承诺、强相关系统中的表示瓶颈、拓扑引起的路由故障以及作为可扩展性瓶颈的电路搜索空间增长。", "authors": [{"name": "Jiayang Niu"}, {"name": "Akib Karim"}, {"name": "Yan Wang"}, {"name": "Jie Li"}, {"name": "Ke Deng"}, {"name": "Azadeh Alavi"}, {"name": "Muhammad Usman"}, {"name": "Yongli Ren"}], "featured_authors": [{"name": "Jiayang Niu"}, {"name": "Akib Karim"}, {"name": "Yan Wang"}, {"name": "Azadeh Alavi"}, {"name": "Muhammad Usman"}, {"name": "Yongli Ren"}], "author_count": 8}, {"id": "2607.04899", "category": "quant-ph", "title": "Quantum orientation, Noether structure, composition of systems and operations", "abstract": "In this paper we argue that, in addition to the statistical structure of quantum theory, another structure, referred to here as the ``Noether structure,\" is necessary to describe the composition of systems and to define completely positive operations. A Noether structure reflects the dual role of Hermitian operators as observables on the one hand and as generators of symmetry transformations on the other. This idea has been expressed in a similar form in the works of Alfsen and Shultz, who investigated the conditions under which the Jordan product can be extended to an associative product of operator algebras. Our investigations into the Noether structure and the composition of systems are limited to the finite-dimensional case and establish a connection to completely positive operations. In the case of pure operations, the latter can be characterized as orientation-preserving maps.", "url": "https://arxiv.org/abs/2607.04899", "type": "理论", "summary": "在本文中，我们认为，除了量子理论的统计结构之外，另一种结构，这里称为“诺特结构”，对于描述系统的组成和定义完全正运算是必要的。诺特结构反映了厄米算子一方面作为可观测量，另一方面作为对称变换生成器的双重作用。这一思想在阿尔夫森和舒尔茨的著作中以类似的形式表达，他们研究了约旦积可以推广到的条件。我们对诺特结构和系统组成的研究仅限于有限维情况，并在纯运算的情况下建立与完全正运算的联系，后者可以表征为方向保持映射。", "authors": [{"name": "Heinz-Jürgen Schmidt"}], "featured_authors": [{"name": "Heinz-Jürgen Schmidt"}], "author_count": 1}, {"id": "2607.04915", "category": "quant-ph", "title": "How Hard Is Quantum Advantage? A Cloud Microphysics Stress Test for Variational Quantum Models", "abstract": "Quantum machine learning (QML) could have the potential to leverage advantages of quantum over classical computing but still lacks strong evidence of actual improvements and scalability, partly due to phenomena such as barren plateaus. In this paper, we employ a hybrid quantum neural network (QNN) on a dataset on cloud microphysics, containing processes for phase transitions of water in the atmosphere and its related temperature changes, which are highly relevant for accurate climate predictions and projections. To reach optimal performance of our QNNs, we employ a rich and trainable frequency spectrum together with expressivity enhancing classical postprocessing. We find that our QNNs strongly benefit from extensive hyperparameter optimization and thereby demonstrate the feasibility of applying QNNs to complex physical systems. At the same time, the QNNs are outperformed by classical baselines in the form of simple fully-connected neural networks. We discuss identified bottlenecks of this class of quantum models to learn the full complexity of the cloud microphysics dataset to show that there is a need to further understand and improve variational quantum models for machine learning such that they might fill the gap where classical models fail or are inefficient.", "url": "https://arxiv.org/abs/2607.04915", "type": "理论+数值", "summary": "量子机器学习（QML）可能有潜力利用量子相对于经典计算的优势，但仍然缺乏实际改进和可扩展性的有力证据，部分原因是诸如贫瘠高原等现象。在本文中，我们在云微物理数据集上采用混合量子神经网络（QNN），其中包含大气中水的相变过程及其相关的温度变化，这与准确的气候预测和预测高度相关。为了达到 QNN 的最佳性能，我们采用丰富且可训练的频谱以及增强表现力的经典后处理。我们发现我们的 QNN 从广泛的超参数优化中受益匪浅，从而证明了将 QNN 应用到复杂物理系统的可行性。与此同时，QNN 的性能优于简单全连接神经网络形式的经典基线。\n\n我们讨论此类量子模型的已识别瓶颈，以了解云微物理数据集的全部复杂性，以表明需要进一步理解和改进机器学习的变分量子模型，以便它们可以填补经典模型失败或低效的空白。", "authors": [{"name": "Felix Herbort"}, {"name": "Ellen Sarauer"}, {"name": "Daniel Ohl de Mello"}, {"name": "Paul Christiansen"}, {"name": "Steffen Hien"}, {"name": "Cedric Brügmann"}, {"name": "Dieter Jaksch"}, {"name": "Veronika Eyring"}, {"name": "Martin Kiffner"}, {"name": "Mierk Schwabe"}], "featured_authors": [{"name": "Felix Herbort"}, {"name": "Ellen Sarauer"}, {"name": "Daniel Ohl de Mello"}, {"name": "Veronika Eyring"}, {"name": "Martin Kiffner"}, {"name": "Mierk Schwabe"}], "author_count": 10}, {"id": "2607.04950", "category": "quant-ph", "title": "Contraction and Expansion Values of Quantum Channels", "abstract": "The contraction coefficient of the trace distance is a central tool in quantum information, quantifying how strongly a quantum channel degrades the distinguishability of states. However, being an extremal ratio, it captures only the most optimistic behaviour of the channel and is often trivial, even for very noisy channels. Moreover, a single scalar is poorly suited to describe how contraction accumulates under channel composition. In this work we introduce the \\emph{contraction and expansion values}, two monotone sequences that refine the contraction and expansion coefficients in the same way singular values refine the operator norm. They arise from a min--max variational principle over subspaces of traceless Hermitian operators, admit an operational interpretation in terms of two state-discrimination games, and are shown to coincide with the Gel'fand or Bernstein numbers of the channel restricted to traceless operators. This identification places the sequences within Pietsch's theory of $s$-numbers and yields, in particular, bounds under channel composition that the contraction coefficient alone cannot provide. We establish their main structural properties and compute or estimate them for single-qubit channels, $d$-dimensional amplitude damping channels, and direct-sum channels.", "url": "https://arxiv.org/abs/2607.04950", "type": "理论+数值", "summary": "迹线距离的收缩系数是量子信息的核心工具，它量化量子通道降低状态可区分性的程度。然而，作为一个极值比率，它仅捕获通道最乐观的行为，并且通常是微不足道的，即使对于非常嘈杂的通道也是如此。此外，单个标量不太适合描述通道组成下收缩如何累积。在这项工作中，我们引入了 \\emph{收缩和膨胀值}，这是两个单调序列，它们以与奇异值细化算子范数相同的方式细化收缩和膨胀系数。它们源自无痕埃尔米特算子子空间上的最小-最大变分原理，承认根据两个状态歧视博弈的操作解释，并且被证明与仅限于无痕算子的通道的盖尔凡德或伯恩斯坦数一致。这种识别将序列置于 Pietsch 的 $s$ 数和产量理论中，特别是仅靠收缩系数无法​​提供的通道组成下的界限。\n\n我们建立了它们的主要结构特性，并针对单量子位通道、$d$维振幅阻尼通道和直接和通道计算或估计它们。", "authors": [{"name": "Ruben Ibarrondo"}, {"name": "Mikel Sanz"}], "featured_authors": [{"name": "Ruben Ibarrondo"}, {"name": "Mikel Sanz"}], "author_count": 2}, {"id": "2607.04979", "category": "quant-ph", "title": "Extending the Bloch sphere model to an N-qubit system", "abstract": "The Bloch sphere is an elegant tool for representing single-qubit states. However, a widely accepted generalization for multi-qubit systems with entanglement remains absent. We propose a novel geometric model extending the Bloch sphere representation to arbitrary $N$-qubit systems using $2^N-1$ spheres. We demonstrate that any pure 2-qubit state is uniquely described by three spheres: two for individual qubits and a third encapsulating bipartite entanglement. Generalizing this, we establish an $N$-qubit parameterization through the hierarchical application of controlled rotation gates along the $Z$ and $Y$ axes. We formally prove a strict bijection between the standard state vector representation and our model's angular parameters. This framework provides an intuitive visualization of multiple entanglement, offering potential computational advantages for quantum simulators and new analytical perspectives on quantum gates.", "url": "https://arxiv.org/abs/2607.04979", "type": "理论", "summary": "布洛赫球是表示单量子位状态的优雅工具。然而，对于具有纠缠的多量子位系统，仍然缺乏被广泛接受的概括。我们提出了一种新颖的几何模型，使用 $2^N-1$ 球体将 Bloch 球体表示扩展到任意 $N$-qubit 系统。我们证明任何纯 2 量子位状态都由三个球体唯一地描述：两个球体用于单个量子位，第三个球体用于封装二分纠缠。概括这一点，我们通过沿 $Z$ 和 $Y$ 轴分层应用受控旋转门来建立 $N$ 量子位参数化。我们正式证明了标准状态向量表示和模型的角度参数之间的严格双射。该框架提供了多重纠缠的直观可视化，为量子模拟器提供了潜在的计算优势，并为量子门提供了新的分析视角。", "authors": [{"name": "Francisco Piñero"}, {"name": "Cristian Franco"}, {"name": "Hernán I. de la Cruz"}, {"name": "Fernando L. Pelayo"}, {"name": "Vicente Pascual"}, {"name": "Mauro Mezzini"}, {"name": "Jose Javier Paulet"}, {"name": "Fernando Cuartero"}], "featured_authors": [{"name": "Francisco Piñero"}, {"name": "Cristian Franco"}, {"name": "Hernán I. de la Cruz"}, {"name": "Mauro Mezzini"}, {"name": "Jose Javier Paulet"}, {"name": "Fernando Cuartero"}], "author_count": 8}, {"id": "2607.05072", "category": "quant-ph", "title": "Transmon Phase Gates Controlled by Superconducting Soliton DAC", "abstract": "We introduce a superconducting digital-to-analog converter (DAC) that filters control noise, provides native multiplexing, performs quantum gates in nanoseconds, and can be controlled by CMOS. This is achieved by transducing a trapezoidal drive pulse into a superconducting soliton, which is then held in the DAC load loop, applying flux to a mutually-coupled superconducting qubit or gate coupler. The analog flux output by the DAC can be easily controlled by varying the soliton hold time, or with a DC-biased tunable DAC-qubit coupler, allowing the DAC to perform a fixed-time, high-fidelity gate that's robust to fabrication variance or flux offsets in the quantum circuit. Our initial demonstration shows that the DAC can successfully perform 5.6 ns S-gates on transmons. We measure the DAC-induced quantum state excitation probability per gate to be 0.05%, and find that the DAC-induced relaxation rate from the qubit 1 state is below the intrinsic T1 rate limit of the transmon. Quantum simulations show qualitative agreement with the measured data, and predict that the DAC excitation rate can be lowered 10 times further by overdamping the Josephson junction (JJ) in the DAC load loop. may be limited by a Interleaved Randomized Benchmarking (IRB) sequences on an observer qubit reveal that, when scaling to many qubits, the DAC's performance may be limited by a non-local, DAC-induced phase error of 1.6% per gate, appearing in ancilla qubits that are not directly coupled to any of the 30 DACs on the chip. We discuss strategies for future layouts of multi-DAC chips that focus on mitigating the source of these non-local, high-frequency electromagnetic interactions (EMI), and how to incorporate a DC-tunable coupler for phase correction.", "url": "https://arxiv.org/abs/2607.05072", "type": "理论+数值", "summary": "我们推出了一种超导数模转换器 (DAC)，它可以过滤控制噪声、提供本机复用、在纳秒内执行量子门，并且可以由 CMOS 控制。这是通过将梯形驱动脉冲转换为超导孤子来实现的，然后将其保持在 DAC 负载环路中，将通量施加到相互耦合的超导量子位或门耦合器上。 DAC 的模拟通量输出可以通过改变孤子保持时间或使用直流偏置可调谐 DAC 量子位耦合器来轻松控制，从而允许 DAC 执行固定时间、高保真门，该门对量子电路中的制造方差或通量偏移具有鲁棒性。我们的初步演示表明 DAC 可以在 transmon 上成功执行 5.6 ns S 门。我们测量每个门的 DAC 诱导的量子态激发概率为 0.05%，并发现 DAC 诱导的量子位 1 状态的弛豫速率低于传输的固有 T1 速率限制。量子模拟显示与测量数据的定性一致性，并预测通过对 DAC 负载环路中的约瑟夫森结 (JJ) 进行过阻尼，可以将 DAC 激励率进一步降低 10 倍。\n\n可能受到观察者量子位上的交错随机基准 (IRB) 序列的限制表明，当扩展到许多量子位时，DAC 的性能可能会受到每门 1.6% 的非局部、DAC 引起的相位误差的限制，该误差出现在不直接耦合到芯片上 30 个 DAC 中任何一个的辅助量子位中。我们讨论了多 DAC 芯片未来布局的策略，重点是减轻这些非本地高频电磁相互作用 (EMI) 的来源，以及如何结合直流可调耦合器进行相位校正。", "authors": [{"name": "Derek Reitz"}, {"name": "Tony X. Zhou"}, {"name": "Aditya Sharma"}, {"name": "Ryan Bilotta"}, {"name": "John McFarland"}, {"name": "Aref Fouladi"}, {"name": "Jacob Glasby"}, {"name": "Aruna Ramanayaka"}, {"name": "Zachary Stegen"}, {"name": "Aaron Pesetski"}, {"name": "Mark Covington"}, {"name": "Gregory Boyd"}, {"name": "Jeremy Clark"}], "featured_authors": [{"name": "Derek Reitz"}, {"name": "Tony X. Zhou"}, {"name": "Aditya Sharma"}, {"name": "Mark Covington"}, {"name": "Gregory Boyd"}, {"name": "Jeremy Clark"}], "author_count": 13}, {"id": "2607.05094", "category": "quant-ph", "title": "Brownian Motion in Orthogonal and Symplectic Groups", "abstract": "Matrix Brownian motion provides a powerful framework for studying crossover ensembles in quantum chaos and quantum transport, as well as thermalization and information scrambling in many-body dynamics. Here, we develop a unified diagrammatic framework to characterize Brownian ensembles for orthogonal and symplectic random matrices, which describe systems with particle-hole symmetry. We compute polynomial averages up to fourth order and construct an orthogonally invariant interpolation for the disconnected $\\mathrm{SO}^-(q)$ sector of the orthogonal group. We consider applications relating to the fields of quantum information, quantum chaos, and quantum transport.", "url": "https://arxiv.org/abs/2607.05094", "type": "理论", "summary": "矩阵布朗运动为研究量子混沌和量子传输中的交叉系综以及多体动力学中的热化和信息置乱提供了强大的框架。在这里，我们开发了一个统一的图解框架来表征正交和辛随机矩阵的布朗系综，它描述了具有粒子孔对称性的系统。我们计算高达四阶的多项式平均值，并为正交群的断开 $\\mathrm{SO}^-(q)$ 扇区构造正交不变插值。我们考虑与量子信息、量子混沌和量子传输领域相关的应用。", "authors": [{"name": "Zhiyang Tan"}, {"name": "Piet W. Brouwer"}], "featured_authors": [{"name": "Zhiyang Tan"}, {"name": "Piet W. Brouwer"}], "author_count": 2}, {"id": "2607.05107", "category": "quant-ph", "title": "Complementary 3D color codes for transversal quantum logic", "abstract": "Transversal logical gates provide a direct route to fault-tolerant quantum computation, but the Eastin-Knill theorem forbids a universal transversal gate set within a single quantum error-correcting code. We propose a hybrid architecture based on the tetrahedral three-dimensional color code and its Hadamard-transformed counterpart, which we call the H-tetrahedral code. The two encodings support complementary transversal non-Clifford operations. Combined with bitwise Hadamard transformations that switch between the two encodings and a one-way transversal logical CNOT from the tetrahedral code to the H-tetrahedral code, these operations realize an almost-universal transversal logical gate set that enables both the creation of entanglement and logical states with magic. We complete a universal gate set through a pieceably fault-tolerant round-robin construction of a logical controlled-$Z$ gate between two H-tetrahedral codes. This logical entangling gate is interleaved with reduced-overhead Steane-type syndrome extraction using logical two-dimensional color-code auxiliary qubits. Our construction provides a new route toward implementing classically hard-to-simulate quantum algorithms where magic and most entangling operations are transversal while the resource overhead is concentrated in a small number of non-transversal Clifford entangling operations.", "url": "https://arxiv.org/abs/2607.05107", "type": "理论+数值", "summary": "横向逻辑门提供了容错量子计算的直接途径，但 Eastin-Knill 定理禁止在单个量子纠错码中设置通用横向门。我们提出了一种基于四面体三维颜色代码及其对应的 Hadamard 变换的混合架构，我们将其称为 H-四面体代码。这两种编码支持互补的横向非 Clifford 操作。结合在两种编码之间切换的按位哈达玛变换和从四面体代码到 H 四面体代码的单向横向逻辑 CNOT，这些操作实现了几乎通用的横向逻辑门集，可以通过魔法创建纠缠和逻辑状态。我们通过两个 H 四面体代码之间的逻辑受控 $Z$ 门的分段容错循环构造来完成通用门集。该逻辑纠缠门与使用逻辑二维颜色代码辅助量子位的减少开销的 Steane 型校正子提取交错。\n\n我们的构造为实现经典的难以模拟的量子算法提供了一条新途径，其中魔法和大多数纠缠操作是横向的，而资源开销集中在少量非横向的 Clifford 纠缠操作中。", "authors": [{"name": "Friederike Butt"}, {"name": "Luis Colmenarez"}, {"name": "Erik Weilandt"}, {"name": "Tom Peham"}, {"name": "Robert Wille"}, {"name": "Markus Müller"}], "featured_authors": [{"name": "Friederike Butt"}, {"name": "Luis Colmenarez"}, {"name": "Erik Weilandt"}, {"name": "Tom Peham"}, {"name": "Robert Wille"}, {"name": "Markus Müller"}], "author_count": 6}, {"id": "2607.05109", "category": "quant-ph", "title": "Characterisation of a satellite-to-ground channel for continuous variable quantum key distribution protocol", "abstract": "In space based quantum key distribution (QKD) protocols, the quantum channel will be dynamic in nature and the channel loss will change with respect to the zenith angle. In the context of continuous variable (CV)-QKD, this will cause issues with parameter estimation and for a transmitted local oscillator in particular it will also fluctuate the shot noise. Therefore, it is vital to characterise this channel loss and the sources of this loss. In this paper the varying channel loss is characterised under practical assumptions. This is shown for various different scenarios, turbulence strengths, as well as wavelengths. This work shows, for the channel parameters considered, it is possible to generate a positive secret key if restricted Eve security assumptions are made.", "url": "https://arxiv.org/abs/2607.05109", "type": "理论", "summary": "在基于空间的量子密钥分发（QKD）协议中，量子信道本质上是动态的，并且信道损耗将随着天顶角而变化。在连续变量 (CV)-QKD 的背景下，这将导致参数估计问题，特别是对于传输的本地振荡器，它还会使散粒噪声波动。因此，表征该通道损耗及其来源至关重要。在本文中，变化的信道损耗是在实际假设下描述的。这针对各种不同的场景、湍流强度以及波长进行了显示。这项工作表明，对于所考虑的通道参数，如果做出受限的 Eve 安全假设，则可以生成正密钥。", "authors": [{"name": "Emma Tien Hwai Medlock"}, {"name": "Vinod N. Roa"}, {"name": "Timothy Spiller"}, {"name": "Rupesh Kumar"}], "featured_authors": [{"name": "Emma Tien Hwai Medlock"}, {"name": "Vinod N. Roa"}, {"name": "Timothy Spiller"}, {"name": "Rupesh Kumar"}], "author_count": 4}, {"id": "2607.05112", "category": "quant-ph", "title": "Fragile single-cone Dirac quantum walks in two dimensions", "abstract": "It is known that a one-dimensional (1D) quantum walk gives a local space-time discretization of the massless Dirac equation with a single quasi-energy cone (no fermion doubling at low energies), keeping the fundamental symmetries (chiral and time-reversal) of the continuum theory. We show that the analogous 2D construction is fundamentally more fragile. Local two-band quantum walks can have an unpaired Dirac cone, but the protecting symmetries then cease to be ordinary on-site symmetries: they become non-symmorphic, involving half-lattice translations, and are broken by generic spatial inhomogeneities. In particular, we demonstrate that the 2D Dirac quantum walk based on the Ho-Chalker network model can be gapped by potential scattering.", "url": "https://arxiv.org/abs/2607.05112", "type": "理论", "summary": "众所周知，一维 (1D) 量子行走给出了具有单个准能量锥的无质量狄拉克方程的局域时空离散化（低能量下没有费米子倍增），保持了连续介质理论的基本对称性（手性和时间反转）。我们表明，类似的二维结构从根本上来说更加脆弱。局部二能带量子行走可以具有不成对的狄拉克锥，但保护对称性不再是普通的现场对称性：它们变得非对称，涉及半晶格平移，并被一般空间不均匀性打破。特别是，我们证明了基于 Ho-Chalker 网络模型的 2D 狄拉克量子行走可以通过势散射来间隙。", "authors": [{"name": "C.W.J. Beenakker"}, {"name": "J. Sánchez Férnan"}, {"name": "J. Tworzydło"}], "featured_authors": [{"name": "C.W.J. Beenakker"}, {"name": "J. Sánchez Férnan"}, {"name": "J. Tworzydło"}], "author_count": 3}, {"id": "2607.05218", "category": "quant-ph", "title": "Quasi-holonomy in non-adiabatic quantum evolution", "abstract": "We develop a framework for quasi-holonomy in non-adiabatic quantum time evolution of subspaces along loops in a complex Grassmannian. By factoring the Schrödinger evolution into dynamical and connection-induced contributions in a moving basis, we obtain an effective geometric generator that depends explicitly on the dynamical propagator. This quasi-connection does not define a genuine connection on the original Grassmann bundle, since its gauge transformation law acquires a history-dependent, nonlocal term. Other ways of factoring the Schrödinger evolution are briefly discussed. All these approaches suffer from the same type of history-dependence, thereby defining transport of subspaces in which geometric and dynamical effects are generally intertwined, just as in the case of the quasi-holonomy. Our work sheds light on the issue of separating quantum evolution of subspaces into holonomic and dynamical parts from an essentially gauge-theoretic perspective.", "url": "https://arxiv.org/abs/2607.05218", "type": "理论", "summary": "我们开发了一个沿着复杂格拉斯曼方程的子空间非绝热量子时间演化的准完整框架。通过将薛定谔演化分解为运动基础上的动力学和连接引起的贡献，我们获得了一个显式依赖于动力学传播器的有效几何生成器。这种准连接并没有定义原始格拉斯曼丛上的真正连接，因为它的规范变换定律获得了一个依赖于历史的非局部项。简要讨论了分解薛定谔演化的其他方法。所有这些方法都受到相同类型的历史依赖性的影响，从而定义了几何效应和动力学效应通常交织在一起的子空间传输，就像准完整学的情况一样。我们的工作揭示了从本质上规范论的角度将子空间的量子演化分离为完整部分和动力学部分的问题。", "authors": [{"name": "Erik Sjöqvist"}, {"name": "Adam Fredriksson"}], "featured_authors": [{"name": "Erik Sjöqvist"}, {"name": "Adam Fredriksson"}], "author_count": 2}, {"id": "2607.05361", "category": "quant-ph", "title": "Coherent Control of Energy Transport at Room Temperature in a Noisy Bath", "abstract": "Coherent control of energy transport in a non-equilibrium steady-state (NESS) in a reaction-center-connected donor-acceptor pair is proposed. The pigments are considered to be continuously interacting with incoherent radiation and a phonon bath while being driven by phase-controlled coherent fields. Coherent excitation of the donor-acceptor pair is shown to induce interference between excitation pathways, resulting in phase dependent modulation of the flux. As a consequence one can enhance or suppress energy transfer via interference, e.g. an optical energy switch. The persistence of such interference enables coherent control at a NESS in dissipative regime suggests an extension of the operational scope of quantum control from traditional transient domain with low dissiaption to noisy environment NESS at room temperature.", "url": "https://arxiv.org/abs/2607.05361", "type": "理论", "summary": "提出了反应中心连接的供体-受体对中非平衡稳态（NESS）能量传输的相干控制。这些颜料被认为与非相干辐射和声子浴持续相互作用，同时由相控相干场驱动。供体-受体对的相干激发会引起激发路径之间的干扰，从而导致通量的相位依赖性调制。因此，人们可以通过干扰来增强或抑制能量传输，例如光能量开关。这种干扰的持续存在使得耗散状态下的 NESS 能够进行相干控制，这表明量子控制的操作范围从传统的低耗散瞬态域扩展到室温下的噪声环境 NESS。", "authors": [{"name": "Davinder Singh"}, {"name": "Paul Brumer"}], "featured_authors": [{"name": "Davinder Singh"}, {"name": "Paul Brumer"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
