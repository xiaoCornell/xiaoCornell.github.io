  <style>
    :root {

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2606.18290", "category": "cond-mat", "title": "Stochastic Thermodynamics and SDE-based Generative Models", "abstract": "SDE-based generative models, including diffusion models and the Schrödinger bridge, have found broad applications in signal processing tasks such as speech enhancement, image restoration, and time-series generation. This note presents a modeling framework for such models within the context of stochastic thermodynamics. The main results of this note are trajectory-level definitions of work, heat, and entropy production, along with a generalized Jarzynski identity and a second-law-like inequality. The proposed framework extends the original Jarzynski setup to accommodate time-dependent bath temperature and nonconservative driving forces. This thermodynamic perspective may deepen our understanding of diffusion models and the Schrödinger bridge from a nonequilibrium statistical mechanics viewpoint.", "url": "https://arxiv.org/abs/2606.18290", "type": "理论+数值", "summary": "基于 SDE 的生成模型（包括扩散模型和薛定谔电桥）已在语音增强、图像恢复和时间序列生成等信号处理任务中得到广泛应用。本文介绍了随机热力学背景下此类模型的建模框架。这篇文章的主要结果是功、热量和熵产生的轨迹级定义，以及广义的 Jarzynski 恒等式和类似第二定律的不平等。所提出的框架扩展了最初的 Jarzynski 设置，以适应时间相关的浴温度和非保守驱动力。这种热力学视角可以从非平衡统计力学的角度加深我们对扩散模型和薛定谔桥的理解。", "authors": [{"name": "Yaowen Zhang"}], "featured_authors": [{"name": "Yaowen Zhang"}], "author_count": 1}, {"id": "2606.18346", "category": "cond-mat", "title": "Quantum Geometry and Topology of Bulk Plasmons in Weyl Metals", "abstract": "We address the quantum geometric structure of plasmons in Fermi surfaces enclosing a topological charge. We demonstrate that Weyl fermion plasmons have monopole structure, are topological and have a finite vorticity $\\zeta=2\\mathsf{C}_{\\text{w}}$, where $\\mathsf{C}_{\\text{w}}$ is the Chern number of the Fermi surface enclosing the Weyl point. We show that these plasmons selectively couple to light linearly polarized along the plasmon effective dipole moment $\\mathbf{d}$, which has quantum geometric origin and points along the direction of the plasmon center of mass momentum $\\hat{\\mathbf{Q}}$. We suggest that Weyl metal topological plasmons have distinctive optical properties compared to conventional plasmons.", "url": "https://arxiv.org/abs/2606.18346", "type": "理论", "summary": "我们研究了费米表面中包含拓扑电荷的等离子体激元的量子几何结构。我们证明，Weyl 费米子等离子体激元具有单极结构、拓扑结构和有限涡度 $\\zeta=2\\mathsf{C}_{\\text{w}}$，其中 $\\mathsf{C}_{\\text{w}}$ 是包含 Weyl 点的费米表面的陈数。我们证明这些等离子体激元选择性地耦合到沿等离子体激元有效偶极矩 $\\mathbf{d}$ 线性偏振的光，该偶极矩具有量子几何原点并沿着等离子体激元质心动量 $\\hat{\\mathbf{Q}}$ 的方向指向。我们认为，与传统等离子体激元相比，韦尔金属拓扑等离​​子体激元具有独特的光学特性。", "authors": [{"name": "Hong-Yi Xie"}, {"name": "Peter Abbamonte"}, {"name": "Bruno Uchoa"}], "featured_authors": [{"name": "Hong-Yi Xie"}, {"name": "Peter Abbamonte"}, {"name": "Bruno Uchoa"}], "author_count": 3}, {"id": "2606.18399", "category": "cond-mat", "title": "akaitools: A Python package for parsing and analyzing AkaiKKR electronic structure calculations", "abstract": "The Korringa-Kohn-Rostoker (KKR) Green's function method is a first-principles electronic structure approach well suited to substitutionally disordered alloys through the Coherent Potential Approximation (CPA). AkaiKKR is a widely used implementation, known for efficient treatment of metallic systems and their magnetic properties. Its output, however, is unstructured plain text with no programmatic interface, leaving data extraction entirely to the user and making systematic or high-throughput studies impractical. akaitools is a Python package that parses AkaiKKR output files into structured, type-annotated Python objects. The package covers three output types: self-consistent field (SCF) results, which capture convergence history and per-atom electronic and magnetic properties; spin-resolved, orbital projected density of states for each CPA component; and Bloch spectral functions on a user-defined k-point path. Results come back as immutable dataclasses backed by NumPy arrays. Energy quantities are available in both Rydbergs and electronvolts, and results can be exported to Pandas DataFrames. A built-in plotting module produces Matplotlib figures for DOS curves and SCF convergence. A command-line interface provides file summaries and JSON export without any Python scripting. The package also includes a programmatic input file generator, so full calculation pipelines from input preparation to output analysis can be run in Python.", "url": "https://arxiv.org/abs/2606.18399", "type": "数值", "summary": "Korringa-Kohn-Rostoker (KKR) 格林函数方法是一种第一原理电子结构方法，非常适合通过相干势近似 (CPA) 来分析替代无序合金。 AkaiKKR 是一种广泛使用的实施方案，以有效处理金属系统及其磁性而闻名。然而，它的输出是非结构化纯文本，没有编程接口，将数据提取完全留给用户，使得系统或高通量研究不切实际。 akaitools 是一个 Python 包，它将 AkaiKKR 输出文件解析为结构化的、带类型注释的 Python 对象。该包涵盖三种输出类型：自洽场（SCF）结果，捕获收敛历史和每个原子的电子和磁性属性；每个 CPA 组件的自旋解析、轨道投影态密度；和用户定义的 k 点路径上的 Bloch 谱函数。结果以 NumPy 数组支持的不可变数据类形式返回。能量数量可以用里德堡和电子伏特表示，结果可以导出到 Pandas DataFrames。\n\n内置绘图模块可生成 DOS 曲线和 SCF 收敛的 Matplotlib 图形。命令行界面提供文件摘要和 JSON 导出，无需任何 Python 脚本。该软件包还包括一个编程输入文件生成器，因此可以在 Python 中运行从输入准备到输出分析的完整计算管道。", "authors": [{"name": "Doğuhan Sarıtürk"}, {"name": "Raymundo Arróyave"}], "featured_authors": [{"name": "Doğuhan Sarıtürk"}, {"name": "Raymundo Arróyave"}], "author_count": 2}, {"id": "2606.18493", "category": "cond-mat", "title": "Dynamical axion quasiparticles: an open quantum system", "abstract": "We study the non-equilibrium dynamics of emergent dynamical axion quasiparticles (DAQ) coupled to a photon bath in equilibrium via a Chern-Simons term as a quantum open system. A quantum master equation (QME) is derived up to second order in this coupling implementing only a \\emph{partial} Markov approximation, allowing time dependent rates in the Lindblad (QME). These are determined by the equilibrium correlation functions of the Chern-Simons density, and their time dependence allows us to explore transient dynamics in coherences and population: the formation of the quasiparticle on short time scales and its decay, and the build-up of population with an effective time dependent rate. Early time evolution features quantum \\emph{anti} Zeno dynamics with enhanced quasiparticle decay and population growth. These phenomena describe transient violations of Fermi's Golden rule and of \\emph{detailed balance}, and are distinct \\emph{non-Markovian} effects directly related to the spectral density of the Chern-Simons correlators. We obtain the equation of motion of coherent (DAQ) condensates both with the (QME) and with quantum many body linear response establishing a direct bridge between both methods. As a corollary we obtain the expectation value of the Chern-Simons density \\emph{induced} by a (DAQ) condensate in linear response, the topological susceptibility is shown to be proportional to the (DAQ) many body self-energy. We provide a Feynman diagram-based interpretation of approximations invoked in the (QME) and corrections from system-bath correlations in higher order.", "url": "https://arxiv.org/abs/2606.18493", "type": "理论", "summary": "我们研究了通过 Chern-Simons 项作为量子开放系统耦合到平衡光子浴的新兴动力轴子准粒子 (DAQ) 的非平衡动力学。在该耦合中导出了高达二阶的量子主方程（QME），仅实现了 \\emph{partial} Markov 近似，从而允许 Lindblad（QME）中的时间相关速率。这些是由陈-西蒙斯密度的平衡相关函数决定的，它们的时间依赖性使我们能够探索相干性和布居的瞬态动力学：短时间尺度上准粒子的形成及其衰变，以及具有有效时间依赖性速率的布居的形成。早期演化的特点是量子\\emph{反}芝诺动力学，具有增强的准粒子衰变和种群增长。这些现象描述了对费米黄金法则和\\emph{详细平衡}的瞬时违反，并且是与陈-西蒙斯相关器的谱密度直接相关的明显\\emph{非马尔可夫}效应。\n\n我们通过 (QME) 和量子多体线性响应获得了相干 (DAQ) 凝聚体的运动方程，在两种方法之间建立了直接桥梁。作为推论，我们获得了线性响应中 (DAQ) 凝聚体的 Chern-Simons 密度 \\emph{induced} 的期望值，拓扑磁化率与 (DAQ) 多体自能成正比。我们提供了基于费曼图的 (QME) 中调用的近似解释以及高阶系统浴相关性的修正。", "authors": [{"name": "Daniel Boyanovsky"}], "featured_authors": [{"name": "Daniel Boyanovsky"}], "author_count": 1}, {"id": "2606.18513", "category": "cond-mat", "title": "Magnon-dislon hybridization in magnetic insulators", "abstract": "Spin dynamics in ordered magnets with topological lattice defects is investigated. Using fracton--elasticity duality, we develop an effective field theory of magnons coupled to quantized lattice dislocations (dislons) in magnetic insulators. Within this framework, an elastic gauge field mediates a nonlocal interaction between dislocations and magnetization gradients. The resulting magnetoelastic coupling gives rise to coherent magnon-dislon hybridization whose properties are dictated by dislocation topology. Screw dislocations exhibit helicity-selective hybridization and symmetry-protected dark dislon sectors, while edge dislocations generate anisotropic hybrid excitations with finite spin-precession ellipticity through the glide constraint. Our results establish dislocations as dynamical topological defects with directly observable polarization fingerprints in magnon spectra, and reveal magnon-dislon hybridization as a new route to control spin dynamics.", "url": "https://arxiv.org/abs/2606.18513", "type": "理论", "summary": "研究了具有拓扑晶格缺陷的有序磁体的自旋动力学。利用分形-弹性对偶性，我们开发了一种与磁绝缘体中量子化晶格位错（dislons）耦合的磁振子的有效场论。在这个框架内，弹性规范场介导位错和磁化梯度之间的非局域相互作用。由此产生的磁弹性耦合产生相干磁振子杂化，其特性由位错拓扑决定。螺旋位错表现出螺旋选择性杂化和对称保护的暗dislon扇区，而边缘位错通过滑移约束产生具有有限自旋进动椭圆度的各向异性混合激发。我们的结果将位错确立为动态拓扑缺陷，并在磁振子光谱中具有可直接观察到的偏振指纹，并揭示了磁振子-dislon杂化作为控制自旋动力学的新途径。", "authors": [{"name": "Carlos Saji"}, {"name": "Nicolas Vidal-Silva"}, {"name": "Roberto E. Troncoso"}], "featured_authors": [{"name": "Carlos Saji"}, {"name": "Nicolas Vidal-Silva"}, {"name": "Roberto E. Troncoso"}], "author_count": 3}, {"id": "2606.18529", "category": "cond-mat", "title": "Tunable Chaos in the Finite Mean SYK Model", "abstract": "The complex Sachdev-Ye-Kitaev (SYK) model, featuring fermions with all-to-all interactions, serves as a dual paradigm for understanding non-Fermi liquid behavior and the holographic nature of charged black holes. Two defining characteristics of the standard SYK model are its maximal chaos (Lyapunov exponent $\\lambda_{\\mathrm{L}}=2\\pi T$ at temperature $T$), and its finite zero-temperature residual entropy. While previous studies have largely focused on couplings drawn from a zero-mean Gaussian distribution, we investigate a generalized model with a finite mean-to-standard-deviation ratio, $g\\equiv J_{0}/\\delta J$ of the coupling distribution in order to get deeper insight into the evolution of chaos. We find that increasing $g$ yields the following effects: (i) The system remains a fast scrambler with $\\lambda_{\\mathrm{L}}=A~T$, but with a suppressed coefficient $A<2\\pi$. (ii) In the limit $g\\to \\infty$, out-of-time-ordered correlators (OTOCs) no longer exhibit exponential growth with $\\lambda_{\\mathrm{L}}\\simeq 0$. (iii) The spectral correlations indicative of late-time chaos maintain Wigner-Dyson level spacing statistics for all values of $g$. (iv) The system preserves a finite residual entropy, albeit with reduced magnitude, for all $g$ values. We conclude that in this generalized SYK model, there is a chaotic to non-chaotic crossover. Moreover different measures of chaos decouple, demonstrating that the presence of finite residual entropy does not strictly imply maximal chaos.", "url": "https://arxiv.org/abs/2606.18529", "type": "理论", "summary": "复杂的 Sachdev-Ye-Kitaev (SYK) 模型以具有所有对所有相互作用的费米子为特征，可作为理解非费米液体行为和带电黑洞的全息性质的双重范式。标准 SYK 模型的两个定义特征是其最大混沌（温度 $T$ 时的李雅普诺夫指数 $\\lambda_{\\mathrm{L}}=2\\pi T$）及其有限的零温度残余熵。虽然之前的研究主要集中在零均值高斯分布的耦合上，但我们研究了耦合分布具有有限均值与标准差之比 $g\\equiv J_{0}/\\delta J$ 的广义模型，以便更深入地了解混沌的演化。我们发现增加$g$会产生以下效果：（i）系统仍然是一个快速扰码器，$\\lambda_{\\mathrm{L}}=A~T$，但抑制系数$A<2\\pi$。 (ii) 在 $g\\to \\infty$ 的限制下，乱序相关器 (OTOC) 不再表现出 $\\lambda_{\\mathrm{L}}\\simeq 0$ 的指数增长。 (iii) 表明晚期混沌的谱相关性维持所有 $g$ 值的维格纳-戴森能级间距统计。\n\n(iv) 对于所有 $g$ 值，系统保留有限的剩余熵，尽管幅度减小。我们得出的结论是，在这个广义 SYK 模型中，存在混沌到非混沌的交叉。此外，不同的混沌度量解耦，表明有限剩余熵的存在并不严格意味着最大混沌。", "authors": [{"name": "Arkaprava Mukherjee"}, {"name": "Sumilan Banerjee"}, {"name": "Sandip P. Trivedi"}, {"name": "Nandini Trivedi"}], "featured_authors": [{"name": "Arkaprava Mukherjee"}, {"name": "Sumilan Banerjee"}, {"name": "Sandip P. Trivedi"}, {"name": "Nandini Trivedi"}], "author_count": 4}, {"id": "2606.18742", "category": "cond-mat", "title": "Ewald summing irreducible components of flow around active particles", "abstract": "We present a method to compute Ewald summation for the irreducible components of flow around active particles to study hydrodynamic interactions in active colloidal suspensions. An active particle is modeled as a colloidal sphere with a surface slip velocity. Using this model, we obtain an irreducible representation of the fluid flow produced by an active particle in periodic geometry of Stokes flow for an arbitrary surface slip. The solution of the active flow is obtained in terms of lattice sum of the Oseen tensor and their derivatives. The lattice sum is accelerated using the Ewald summation technique. We apply the method to compute explicit expression for rigid body motion of hydrodynamically interacting active particles. Our method presents a way for dynamic simulation of active particles due to arbitrary mode of active slip in periodic geometry of Stokes flow.", "url": "https://arxiv.org/abs/2606.18742", "type": "理论+数值", "summary": "我们提出了一种计算活性颗粒周围流动的不可约成分的埃瓦尔德求和的方法，以研究活性胶体悬浮液中的流体动力学相互作用。活性粒子被建模为具有表面滑移速度的胶体球。使用该模型，我们获得了任意表面滑移的斯托克斯流周期几何中的活性粒子产生的流体流动的不可约表示。主动流的解是根据 Oseen 张量及其导数的晶格和获得的。使用埃瓦尔德求和技术加速晶格和。我们应用该方法来计算流体动力学相互作用的活性粒子的刚体运动的显式表达式。我们的方法提出了一种动态模拟由于斯托克斯流周期性几何中的任意主动滑移模式而产生的主动粒子的方法。", "authors": [{"name": "Mayurakshi Deb"}, {"name": "Rajesh Singh"}], "featured_authors": [{"name": "Mayurakshi Deb"}, {"name": "Rajesh Singh"}], "author_count": 2}, {"id": "2606.18769", "category": "cond-mat", "title": "Role of Local Structural Variation in X-ray Photoelectron Spectrum of Silicon Oxide Interfaces", "abstract": "We show that the broad X-ray photoelectron lines of silicon oxide on silicon arise from a continuous statistical distribution of core-level binding energies. Statistical simulations spanning compositions from Si to SiO$_2$ reproduce the full extent of this broadening, reaching 5 eV for SiO$_{1.0}$ , in quantitative agreement with 0.23 nm layer-resolved spectra reconstructed from Ar$^+$ sputtering data. This continuous distribution blurs distinct spectral fingerprints of local structural motifs, thereby challenging conventional chemical state assignment in oxide X-ray photoelectron spectra.", "url": "https://arxiv.org/abs/2606.18769", "type": "数值", "summary": "我们证明，硅上氧化硅的宽 X 射线光电子线源自核心级结合能的连续统计分布。涵盖从 Si 到 SiO$_2$ 成分的统计模拟再现了这种展宽的全部范围，SiO$_{1.0}$ 达到 5 eV，与根据 Ar$^+$ 溅射数据重建的 0.23 nm 层分辨光谱定量一致。这种连续分布模糊了局部结构图案的独特光谱指纹，从而挑战了氧化物X射线光电子光谱中的传统化学态分配。", "authors": [{"name": "Mikael Santonen"}, {"name": "Sari Granroth"}, {"name": "Johanna Laaksonen"}, {"name": "Pekka Laukkanen"}, {"name": "Johannes Niskanen"}], "featured_authors": [{"name": "Mikael Santonen"}, {"name": "Sari Granroth"}, {"name": "Johanna Laaksonen"}, {"name": "Pekka Laukkanen"}, {"name": "Johannes Niskanen"}], "author_count": 5}, {"id": "2606.18800", "category": "cond-mat", "title": "Mimicry of chaos and $k$-design in higher order OTOCs of Luttinger liquids", "abstract": "Out-of-time-order correlators (OTOCs) provide a fundamental metric for quantum chaos, but capturing the fine structure of information scrambling requires exploring their higher-order generalizations. Here, we systematically investigate the sequence of higher-order OTOCs in a Luttinger liquid and its lattice realization, the XXZ Heisenberg chain. Using bosonization and numerics, we extract the full temporal dynamics of the first three OTOCs, revealing that they rapidly erase memory of the initial state, and quickly saturate to their steady state values. Strikingly, we show that calculating the late time saturation values for the entire sequence of higher-order OTOCs maps exactly onto determining the partition function of a non-Hermitian Harper model. Through this mapping, we demonstrate that for moderately strong interactions, the steady-state OTOCs become parametrically small up to the seventh order, mimicking higher $k$-design. Our results reveal that Luttinger liquids exhibit an unexpectedly profound degree of apparent scrambling when viewed through the lens of higher-order OTOCs.", "url": "https://arxiv.org/abs/2606.18800", "type": "理论", "summary": "乱序相关器 (OTOC) 为量子混沌提供了基本度量，但捕获信息置乱的精细结构需要探索其高阶概括。在这里，我们系统地研究了 Luttinger 液体中高阶 OTOC 的序列及其晶格实现，即 XXZ 海森堡链。使用玻色子化和数值，我们提取了前三个 OTOC 的完整时间动态，揭示了它们快速擦除初始状态的记忆，并快速饱和到其稳态值。引人注目的是，我们表明计算整个高阶 OTOC 序列的后期饱和度值完全映射到确定非 Hermitian Harper 模型的配分函数。通过这种映射，我们证明，对于中等强度的相互作用，稳态 OTOC 的参数会变得小到七阶，模仿更高的 $k$ 设计。我们的结果表明，当通过高阶 OTOC 的镜头观察时，卢廷格液体表现出出乎意料的深刻程度的表观扰乱。", "authors": [{"name": "Balázs Dóra"}, {"name": "Catalin Pascu Moca"}, {"name": "Roderich Moessner"}], "featured_authors": [{"name": "Balázs Dóra"}, {"name": "Catalin Pascu Moca"}, {"name": "Roderich Moessner"}], "author_count": 3}, {"id": "2606.18835", "category": "cond-mat", "title": "Classical dissipative search of unstructured database", "abstract": "We propose a physical realization of the unstructured database search that works via classical, dissipative model of spherical spins. The database is implemented via spin-spin couplings, where the selected coupling refers to a larger ferromagnetic interaction between two selected spins. The low-temperature equilibrium of this model leads to magnetization strongly concentrated on the selected spins, which means that the search is complete. The search time refers to the relaxation time to equilibrium from a homogeneous initial state, and is described via Langevin equations. This time scales as ${\\cal O}(M^a)$ with $a<1/2$, where $M$ is the database volume. This is faster than Grover's search, showing how a dissipative, classical analog computer can overcome the quantum unitary computer.", "url": "https://arxiv.org/abs/2606.18835", "type": "理论", "summary": "我们提出了非结构化数据库搜索的物理实现，该搜索通过经典的球形自旋耗散模型进行工作。该数据库是通过自旋-自旋耦合实现的，其中所选耦合是指两个所选自旋之间更大的铁磁相互作用。该模型的低温平衡导致磁化强烈集中在选定的自旋上，这意味着搜索已完成。搜索时间是指从均匀初始状态到平衡的弛豫时间，并通过朗之万方程描述。该时间按 ${\\cal O}(M^a)$ 缩放，其中 $a<1/2$，其中 $M$ 是数据库卷。这比格罗弗的搜索速度更快，展示了耗散的经典模拟计算机如何克服量子酉计算机。", "authors": [{"name": "A.E. Allahverdyan"}, {"name": "Y. Bisharyan"}], "featured_authors": [{"name": "A.E. Allahverdyan"}, {"name": "Y. Bisharyan"}], "author_count": 2}, {"id": "2606.18891", "category": "cond-mat", "title": "Theory of In-Plane Orbital Magnetization with Layer Hybridization", "abstract": "The modern theory of orbital magnetization successfully describes the response of Bloch electrons to magnetic fields in fully periodic crystals, but it does not directly address the distinct regime of an in-plane field in multilayer systems with layer hybridization. Coherent interlayer tunneling allows electrons to form circulating current loops, producing an in-plane orbital response that is absent in a strictly two-dimensional limit and qualitatively different from the conventional three-dimensional one. Here we develop a theory of in-plane orbital magnetization for this {\\it transdimensional} regime, where the layer thickness is comparable to the vertical mean free path. Starting from the current-loop picture, we construct the in-plane orbital angular momentum operator and derive exact expressions for the orbital magnetic moment and the in-plane orbital magnetic susceptibility. As an application, we predict a gate-tunable in-plane orbital magnetoelectric effect in layered materials. Our framework establishes a general foundation for in-plane orbital responses and suggests new opportunities for orbitronics in layer-hybridized quantum materials.", "url": "https://arxiv.org/abs/2606.18891", "type": "理论", "summary": "现代轨道磁化理论成功地描述了布洛赫电子对全周期晶体中磁场的响应，但它并没有直接解决具有层杂化的多层系统中面内场的独特状态。相干层间隧道效应允许电子形成循环电流环路，产生严格二维极限中不存在的面内轨道响应，并且与传统的三维轨道响应有质的不同。在这里，我们开发了一种针对这种{\\it跨维}区域的面内轨道磁化理论，其中层厚度与垂直平均自由程相当。从电流环图出发，我们构造了面内轨道角动量算子，并推导了轨道磁矩和面内轨道磁化率的精确表达式。作为一个应用，我们预测了层状材料中的栅极可调面内轨道磁电效应。我们的框架为面内轨道响应奠定了基础，并为层杂化量子材料中的轨道电子学提出了新的机遇。", "authors": [{"name": "Jin-Xin Hu"}, {"name": "Zi-Ting Sun"}, {"name": "Yugui Yao"}], "featured_authors": [{"name": "Jin-Xin Hu"}, {"name": "Zi-Ting Sun"}, {"name": "Yugui Yao"}], "author_count": 3}, {"id": "2606.18911", "category": "cond-mat", "title": "Nonequilibrium nucleation theory for nonconserved fields: from active matter to population dynamics", "abstract": "Classical nucleation theory (CNT) describes the formation of a stable phase from a metastable one. In equilibrium systems, it quantifies the free-energy competition between a favorable bulk gain and an unfavorable interfacial cost. For systems without detailed balance, the corresponding nonequilibrium nucleation theory (NNT) was so far developed only for cases with a conserved order parameter, such as active fluid-fluid phase separation. Here we construct the NNT for systems with a (single, scalar) nonconserved order parameter. Unlike in the conserved case, the nucleation barrier controlling (noise-driven) droplet growth is profoundly altered by deviations in the interfacial density profile from the one arising during (deterministic) droplet relaxation. The barrier can nonetheless be analysed by carefully defining the reaction coordinate (droplet radius) to project out those deviations. We give explicit NNT predictions for models drawn from population dynamics and active matter, finding excellent agreement with numerical studies.", "url": "https://arxiv.org/abs/2606.18911", "type": "理论+数值", "summary": "经典成核理论 (CNT) 描述了从亚稳态相形成稳定相的过程。在平衡系统中，它量化了有利的体积增益和不利的界面成本之间的自由能竞争。对于没有详细平衡的系统，迄今为止，仅针对具有保守序参数的情况（例如主动流体-流体相分离）开发了相应的非平衡成核理论（NNT）。在这里，我们为具有（单个标量）非保守阶参数的系统构建 NNT。与保守情况不同，控制（噪声驱动）液滴生长的成核势垒会因界面密度分布与（确定性）液滴松弛期间出现的偏差而发生深刻改变。尽管如此，仍然可以通过仔细定义反应坐标（液滴半径）来分析障碍，以消除这些偏差。我们对从种群动态和活性物质中得出的模型给出了明确的 NNT 预测，发现与数值研究非常一致。", "authors": [{"name": "Michalis Chatzittofi"}, {"name": "Noah Ziethen"}, {"name": "Cesare Nardini"}, {"name": "Michael E. Cates"}], "featured_authors": [{"name": "Michalis Chatzittofi"}, {"name": "Noah Ziethen"}, {"name": "Cesare Nardini"}, {"name": "Michael E. Cates"}], "author_count": 4}, {"id": "2606.18925", "category": "cond-mat", "title": "Spin-orbit coupling renormalization of the natural optical activity of Pb5Ge3O11 from first-principles", "abstract": "We present a first-principles study of the natural optical activity of the gyroelectric Pb$_5$Ge$_3$O$_{11}$ crystal, explicitly accounting for spin-orbit coupling (SOC) effects. We derive a new analytical expression for the gyration coefficients within the recent framework of long-wavelength density-functional perturbation theory [Phys. Rev. Lett. \\textbf{131}, 086902 (2023)], which significantly improves computational efficiency by reducing the number of required response functions and includes spin-orbit coupling effects. We use this implementation to investigate the evolution of Pb$_5$Ge$_3$O$_{11}$'s optical rotation across the ferroelectric double-well, from the paraelectric $P\\bar{6}$ phase to the ferroelectric $P3$ phase. Our results demonstrate that, in addition to the substantial renormalization of the double-well energy, spin-orbit coupling contributions play an equally crucial role in the natural optical activity, largely through purely electronic contributions, while SOC-induced structural relaxation effects are minor.", "url": "https://arxiv.org/abs/2606.18925", "type": "理论", "summary": "我们对旋电 Pb$_5$Ge$_3$O$_{11}$ 晶体的自然光学活性进行了第一性原理研究，明确解释了自旋轨道耦合 (SOC) 效应。我们在长波长密度泛函微扰理论的最新框架内推导了回转系数的新解析表达式 [Phys.莱特牧师。 \\textbf{131}, 086902 (2023)]，通过减少所需响应函数的数量并包括自旋轨道耦合效应，显着提高了计算效率。我们使用此实现来研究 Pb$_5$Ge$_3$O$_{11}$ 在铁电双阱中的旋光从顺电 $P\\bar{6}$ 相到铁电 $P3$ 相的演变。我们的结果表明，除了双阱能量的大幅重整化之外，自旋轨道耦合贡献在自然光学活动中发挥着同样重要的作用，主要是通过纯粹的电子贡献，而 SOC 引起的结构弛豫效应很小。", "authors": [{"name": "Asier Zabalo"}, {"name": "Massimiliano Stengel"}, {"name": "Eric Bousquet"}], "featured_authors": [{"name": "Asier Zabalo"}, {"name": "Massimiliano Stengel"}, {"name": "Eric Bousquet"}], "author_count": 3}, {"id": "2606.18945", "category": "cond-mat", "title": "Suppression of Extrinsic Anomalous Hall Conductivity in Disordered Parity Anomalous Semimetal", "abstract": "We present an analytical investigation of the extrinsic contributions to the anomalous Hall conductivity in the context of the half-quantized Hall effect observed in disordered parity anomalous semimetal emerged from semi-magnetic topological insulator thin films. The gapless Dirac cone surface state, which embodies the quintessence of the half-quantized Hall effect, exhibits remarkable robustness against disorder scattering. Two primary extrinsic mechanisms, the side-jump and skew-scattering, are deemed irrelevant and make no contributions. These results establish the parity anomalous semimetal as a disorder-resilient quantum phase, thereby providing insights into Dirac fermion physics.", "url": "https://arxiv.org/abs/2606.18945", "type": "理论", "summary": "我们在从半磁性拓扑绝缘体薄膜中出现的无序宇称异常半金属中观察到的半量子化霍尔效应的背景下，对异常霍尔电导率的外在贡献进行了分析研究。无间隙狄拉克锥表面态体现了半量子化霍尔效应的精髓，对无序散射表现出卓越的鲁棒性。两种主要的外在机制，即侧跳和倾斜散射，被认为是无关紧要的并且没有任何贡献。这些结果将宇称反常半金属确立为抗无序量子相，从而为狄拉克费米子物理学提供了见解。", "authors": [{"name": "Shi-Hao Bi"}, {"name": "Bo Fu"}, {"name": "Shun-Qing Shen"}], "featured_authors": [{"name": "Shi-Hao Bi"}, {"name": "Bo Fu"}, {"name": "Shun-Qing Shen"}], "author_count": 3}, {"id": "2606.18973", "category": "cond-mat", "title": "Emergence of Resonating Valence-Bond Correlations in Stretched Graphene", "abstract": "Electronic correlations in graphene are generally considered weak due to the large bandwidth of its $\\pi$ electrons. Here we show that tensile expansion of the honeycomb lattice provides a direct route to enhancing correlation effects. Using variational and diffusion quantum Monte Carlo, we compare a conventional Jastrow-Slater determinant wave function with a resonating-valence-bond (RVB) Jastrow-antisymmetrized geminal product ansatz for a series of stretched graphene lattices. We find that the energy gain of the RVB state relative to the single-determinant description increases with bond expansion up to a critical strain $\\delta_{\\mathrm{cr}}$, and decreases beyond it, revealing a nonmonotonic evolution of electronic correlations. The crossover is found to occur in the range $15\\% < \\delta_{\\mathrm{cr}} < 20\\%$, in agreement with mechanical stability limits. This behavior indicates a transition from a weakly correlated Dirac semimetal to a regime with enhanced non-dynamic correlation and short-range singlet pairing. Our results provide direct many-body evidence that lattice expansion drives graphene into a regime where RVB-like correlations become energetically favorable, offering a simple route to tuning correlation effects in Dirac materials.", "url": "https://arxiv.org/abs/2606.18973", "type": "理论+数值", "summary": "由于$\\pi$电子的带宽较大，石墨烯中的电子相关性通常被认为很弱。在这里，我们表明蜂窝晶格的拉伸膨胀提供了增强相关效应的直接途径。使用变分和扩散量子蒙特卡罗，我们将传统的 Jastrow-Slater 行列式波函数与一系列拉伸石墨烯晶格的共振价键 (RVB) Jastrow 反对称孪生积 ansatz 进行比较。我们发现，相对于单行列式描述，RVB 态的能量增益随着键扩展而增加，直到临界应变 $\\delta_{\\mathrm{cr}}$，并在超过它时减少，揭示了电子相关性的非单调演化。发现交叉发生在 $15\\% < \\delta_{\\mathrm{cr}} < 20\\%$ 范围内，与机械稳定性极限一致。这种行为表明从弱相关的狄拉克半金属到具有增强的非动态相关性和短程单线态配对的状态的转变。\n\n我们的结果提供了直接的多体证据，表明晶格膨胀驱动石墨烯进入一种状态，在这种状态下，类 RVB 相关性在能量上变得有利，从而为调节狄拉克材料中的相关效应提供了一种简单的途径。", "authors": [{"name": "Sam Azadi"}, {"name": "A. Principi"}, {"name": "T. D. Kühne"}, {"name": "M. S. Bahramy"}], "featured_authors": [{"name": "Sam Azadi"}, {"name": "A. Principi"}, {"name": "T. D. Kühne"}, {"name": "M. S. Bahramy"}], "author_count": 4}, {"id": "2606.19024", "category": "cond-mat", "title": "Room-Temperature Calcium Intercalation into Graphite Catalyzed by Sodium", "abstract": "Calcium (Ca) insertion into graphite (C) has been considered to require elevated temperatures, and its occurrence at room temperature (RT) has been regarded as highly unlikely. Here, we demonstrate that sodium (Na) catalysis enables the formation of superconducting CaC$_6$ even at RT. In mixtures of Ca, Na, and graphite, the gradual development of superconducting diamagnetism and the emergence of X-ray diffraction peaks confirm the formation of CaC$_6$ during storage at RT. The superconducting transition temperature increases with storage time, and the amount of CaC$_6$ scales proportionally to the square root of storage time. These findings provide new insights into the mechanism of superconductivity and Na-catalyzed formation of CaC$_6$, and highlight the potential of this RT intercalation process for practical applications such as electrode materials in Ca-ion batteries.", "url": "https://arxiv.org/abs/2606.19024", "type": "理论", "summary": "人们认为钙（Ca）嵌入石墨（C）需要升高温度，而在室温（RT）下发生的可能性极小。在这里，我们证明即使在室温下，钠 (Na) 催化也能形成超导 CaC$_6$。在Ca、Na和石墨的混合物中，超导抗磁性的逐渐发展和X射线衍射峰的出现证实了在室温储存期间CaC$_6$的形成。超导转变温度随着储存时间的增加而增加，CaC$_6$ 的量与储存时间的平方根成正比。这些发现为超导机制和Na催化形成CaC$_6$提供了新的见解，并强调了这种RT插层过程在钙离子电池电极材料等实际应用中的潜力。", "authors": [{"name": "Akira Iyo"}, {"name": "Shigeyuki Ishida"}, {"name": "Hiroshi Eisaki"}, {"name": "Hiraku Ogino"}, {"name": "Kenji Kawashima"}], "featured_authors": [{"name": "Akira Iyo"}, {"name": "Shigeyuki Ishida"}, {"name": "Hiroshi Eisaki"}, {"name": "Hiraku Ogino"}, {"name": "Kenji Kawashima"}], "author_count": 5}, {"id": "2606.19030", "category": "cond-mat", "title": "Large-deviation tails of critical order-parameter distributions", "abstract": "Large-deviation tails of critical probability distributions provide a sensitive probe of universality beyond standard finite-size scaling. We study these tails for critical percolation and Fortuin--Kasteleyn Ising models on two-dimensional lattices, three-dimensional lattices, and complete graphs. We consider two rescaled order parameters: the magnetization-like variable $x_m=|M|/\\langle |M|\\rangle$, including a signed cluster-mass analogue for percolation, and the largest-cluster variable $x_C=C_1/\\langle C_1\\rangle$. For $x_m$, we test the expected stretched-exponential large-deviation tail and show that the same form applies to the percolation analogue. For $x_C$, guided by the exact complete-graph result and scaling arguments, we propose universal scaling forms for both tails of the cumulative distribution and test them by extensive Monte Carlo simulations. In the complete-graph FK-Ising model, the left tail is governed by rare configurations with percolation-like scaling rather than by the typical Ising scaling. Our results show that the tails of order-parameter distributions reveal universal features of critical fluctuations that are not captured by averaged observables alone.", "url": "https://arxiv.org/abs/2606.19030", "type": "理论+数值", "summary": "临界概率分布的大偏差尾部提供了超越标准有限尺寸缩放的普遍性的敏感探针。我们研究这些尾部的临界渗流和二维晶格、三维晶格和完全图上的 Fortuin-Kasteleyn Ising 模型。我们考虑两个重新调整的顺序参数：类磁化变量 $x_m=|M|/\\langle |M|\\rangle$，包括用于渗透的有符号簇质量模拟，以及最大簇变量 $x_C=C_1/\\langle C_1\\rangle$。对于 $x_m$，我们测试了预期的拉伸指数大偏差尾部，并表明相同的形式适用于渗滤类似物。对于 $x_C$，在精确的完整图结果和缩放参数的指导下，我们为累积分布的两个尾部提出了通用缩放形式，并通过广泛的蒙特卡罗模拟对其进行了测试。在完整图 FK-Ising 模型中，左尾由具有类似渗流缩放的罕见配置控制，而不是由典型的 Ising 缩放控制。\n\n我们的结果表明，序参数分布的尾部揭示了临界波动的普遍特征，而这些特征是仅通过平均可观测量无法捕获的。", "authors": [{"name": "Jinhong Zhu"}, {"name": "Yihao Xu"}, {"name": "Abbas Ali Saberi"}, {"name": "Youjin Deng"}], "featured_authors": [{"name": "Jinhong Zhu"}, {"name": "Yihao Xu"}, {"name": "Abbas Ali Saberi"}, {"name": "Youjin Deng"}], "author_count": 4}, {"id": "2606.19072", "category": "cond-mat", "title": "Enucleated incompressible red blood cells in shear flow: theoretical analysis of shape instabilities", "abstract": "Red blood cells (RBCs) are essential for oxygen transport, and their remarkable ability to undergo significant deformations during flow is a crucial feature for their physiological function. At intermediate shear rates typical of the microcirculation, RBCs can adopt complex, multi-lobed shapes, signifying a dynamic instability. Here we adopt a perturbative theoretical framework of a quasi-spherical RBC under external shear flow to study such shape instabilities. To better capture RBC maturation and enucleation, we first extend the framework to explicitly account for different excess areas between the stress-free and current membrane shapes. We revisit the reduced equations of motion obtained for an ellipsoidally-shaped RBC, and demonstrate the effect of different excess areas and initial orientation on the dynamical trajectories. Then, we introduce additional spatial modes and show that an emerging instability critically depends on the RBC's shear and bending moduli, the internal to external viscosity ratio, and the excess area, mainly through the RBC's membrane tension. We also study the instability-induced saturation of the membrane tension, and the resulting excess area redistribution at long times. The theoretical framework and the emerging picture of the different instabilities provide insights into the emergence of stomatocyte and trilobe shapes exhibited by RBCs under external flow.", "url": "https://arxiv.org/abs/2606.19072", "type": "理论", "summary": "红细胞 (RBC) 对于氧气运输至关重要，它们在流动过程中发生显着变形的卓越能力是其生理功能的关键特征。在微循环典型的中间剪切速率下，红细胞可以呈现复杂的多叶形状，这意味着动态不稳定性。在这里，我们采用外部剪切流下准球形红细胞的微扰理论框架来研究这种形状不稳定性。为了更好地捕获红细胞成熟和去核，我们首先扩展框架以明确解释无应力膜形状和当前膜形状之间的不同多余区域。我们重新审视了椭圆形红细胞获得的简化运动方程，并证明了不同的多余面积和初始方向对动态轨迹的影响。然后，我们引入了额外的空间模式，并表明新出现的不稳定性主要取决于红细胞的剪切和弯曲模量、内部与外部粘度比以及主要通过红细胞膜张力产生的多余面积。\n\n我们还研究了不稳定引起的膜张力饱和，以及由此产生的长时间多余面积重新分布。理论框架和不同不稳定性的新兴图像提供了关于红细胞在外部流动下表现出的口细胞和三叶形状的出现的见解。", "authors": [{"name": "Avraham Moriel"}, {"name": "Howard A. Stone"}, {"name": "Simon Mendez"}], "featured_authors": [{"name": "Avraham Moriel"}, {"name": "Howard A. Stone"}, {"name": "Simon Mendez"}], "author_count": 3}, {"id": "2606.19098", "category": "cond-mat", "title": "Pore-shape and its spatial organization control intrinsic permeability of porous media", "abstract": "The structure of a porous material, and in particular its spatial variability, is known to control the intrinsic permeability of the system. We investigate how dead-end pores influence the intrinsic permeability of a porous medium beyond their contribution to total pore volume. Dead-end pores are ubiquitous in porous media, yet they are often treated as hydraulically inactive regions whose influence is assumed to be negligible or absorbed into effective-porosity descriptions. We perform pore-scale flow simulations across different dead-end pore structures, including heterogeneous arrangements, controlled granular assemblies, and a minimal single-channel model to study their impact on the system macroscopic permeability. This strategy allows us to isolate the effects of dead-end pore density, depth, and orientation while preserving the transmitting network. We find that dead-end pores can influence intrinsic permeability: increasing the density of dead-end pores along percolating flow paths enhances permeability, whereas pore depth and junction orientation have negligible effects. The observed permeability enhancement originates from localized hydrodynamic interactions at junctions between transmitting and dead-end pores. Based on these results, we propose an effective formulation that relates the density and spatial organization of dead-end pores relative to the transmitting network to macroscopic permeability. Our findings show that dead-end pore architecture provides an additional geometric control on intrinsic permeability beyond porosity and pore-size statistics.", "url": "https://arxiv.org/abs/2606.19098", "type": "理论+数值", "summary": "已知多孔材料的结构，特别是其空间变异性，可以控制系统的固有渗透性。我们研究了死端孔隙如何影响多孔介质的固有渗透率，而不仅仅是它们对总孔隙体积的贡献。死端孔隙在多孔介质中普遍存在，但它们通常被视为水力不活跃区域，其影响被认为可以忽略不计或被吸收到有效孔隙度描述中。我们对不同的死端孔隙结构（包括异质排列、受控颗粒组件和最小单通道模型）进行孔隙尺度流动模拟，以研究它们对系统宏观渗透率的影响。这种策略使我们能够隔离死端孔隙密度、深度和方向的影响，同时保留传输网络。我们发现死端孔隙会影响固有渗透率：增加沿渗流路径的死端孔隙的密度会增强渗透率，而孔隙深度和连接方向的影响可以忽略不计。\n\n观察到的渗透率增强源于传输孔和死端孔之间连接处的局部流体动力相互作用。基于这些结果，我们提出了一种有效的公式，将相对于传输网络的死端孔隙的密度和空间组织与宏观渗透率联系起来。我们的研究结果表明，除了孔隙率和孔径统计之外，死端孔隙结构还提供了对固有渗透率的额外几何控制。", "authors": [{"name": "Wenqiao Jiao"}, {"name": "Isaac Pincus"}, {"name": "Chiara Recalcati"}, {"name": "Alberto Guadagnini"}, {"name": "Pietro de Anna"}], "featured_authors": [{"name": "Wenqiao Jiao"}, {"name": "Isaac Pincus"}, {"name": "Chiara Recalcati"}, {"name": "Alberto Guadagnini"}, {"name": "Pietro de Anna"}], "author_count": 5}, {"id": "2606.19206", "category": "cond-mat", "title": "Mapping the non-equilibrium interacting Anderson Impurity Model to an effective Gaussian theory", "abstract": "Quantum impurity models with strong electron correlations, such as the paradigmatic Anderson Impurity Model (AIM), are central to our understanding of a range of physical phenomena including local moment formation, Coulomb blockade and Kondo screening. They describe magnetic atoms and molecules on surfaces, quantum dot circuits, and correlated materials through dynamical mean field theory. The physics of such systems in strongly non-equilibrium conditions is particularly complex and challenging to capture, whereas Gaussian models of free fermions can be easily solved. Here we show that the time-evolving dynamics of the AIM after a quench can be described by a completely non-interacting version of the model, at the expense of coupling to additional static auxiliary degrees of freedom. Starting from the full solution of the quenched AIM using ED and DMRG, we study the properties of this mapping using numerical optimization, and uncover intriguing structure in the auxiliary system. The method allows us to understand interacting non-equilibrium dynamics through the simpler lens of an effective non-interacting system of larger dimension.", "url": "https://arxiv.org/abs/2606.19206", "type": "理论+数值", "summary": "具有强电子相关性的量子杂质模型，例如典型的安德森杂质模型 (AIM)，是我们理解一系列物理现象的核心，包括局域矩形成、库仑封锁和近藤屏蔽。他们通过动态平均场理论描述表面上的磁性原子和分子、量子点电路和相关材料。在强非平衡条件下，此类系统的物理特性特别复杂且难以捕捉，而自由费米子的高斯模型则可以轻松求解。在这里，我们表明，失超后 AIM 的时间演化动力学可以通过模型的完全非交互版本来描述，但代价是耦合到额外的静态辅助自由度。从使用 ED 和 DMRG 的淬火 AIM 的完整解开始，我们使用数值优化研究了这种映射的特性，并揭示了辅助系统中有趣的结构。该方法使我们能够通过更简单的大维非相互作用系统的透镜来理解相互作用的非平衡动力学。", "authors": [{"name": "Emmanuel Bogacz"}, {"name": "Graham Kells"}, {"name": "Andrew K. Mitchell"}], "featured_authors": [{"name": "Emmanuel Bogacz"}, {"name": "Graham Kells"}, {"name": "Andrew K. Mitchell"}], "author_count": 3}, {"id": "2606.19254", "category": "cond-mat", "title": "Spin point group symmetry and classification of non-relativistic spin splitting in non-collinear magnetic structures: Identification of high-order spin splitting types (l=5,7, and 9)", "abstract": "A comprehensive study of the possible types of non-relativistic spin splitting of electronic bands in coplanar and non-coplanar magnetic structures is presented on the basis of spin-group theory. First, we tabulate all non-equivalent spin point groups (SpPGs) which can be expressed as a direct product of a nontrivial part and a spin-only group limited to be the intrinsic (trivial) one, or augmented by the time-reversal (TR) operation. This tabulation, which includes the listing of symmetry operations for 1249 nonequivalent SpPGs, is now available as an online database SPGENPOS in the Bilbao Crystallographic Server (BCS). This extends previous enumerations, in which the possible presence of TR in the magnetic point group was not taken into account, thus overlooking the full SpPG symmetry associated with the numerous magnetic structures which have a magnetic space group of type IV. For each of the listed coplanar and non-coplanar SpPGs, the spin-splitting that is symmetry allowed is analyzed in detail using the program STENSOR also in the BCS. Except for the SpPGs that include the operation 1', i.e., the combined operation of TR and space inversion, all other coplanar and non-coplanar SpPGs allow spin splitting at some order in a power expansion of the electron wave vector components. We find that, depending on the SpPG, spin-splitting terms can appear with the lowest-order monomials ranging from l=0 to 9, with the exception of l=8. This contrasts with the collinear case, where the lowest order is not higher than l=6, and where TR forbids any spin splitting. For the newly identified spin textures with powers l=5, 7, and 9, which are possible in some noncentrosymmetric SpPGs, the functional form of the spin splitting in terms of the components of the crystal momentum is given. One example of a real material, LaMnAu5, showing l=5 spin splitting is identified.", "url": "https://arxiv.org/abs/2606.19254", "type": "理论", "summary": "基于自旋群理论，对共面和非共面磁结构中电子带非相对论自旋分裂的可能类型进行了全面研究。首先，我们将所有非等价自旋点群 (SpPG) 制成表格，这些自旋点群可以表示为非平凡部分和仅自旋群的直积，该群仅限于固有（平凡）群，或者通过时间反转（TR）操作进行增强。该列表包括 1249 个非等价 SpPG 的对称操作列表，现已作为毕尔巴鄂晶体服务器 (BCS) 中的在线数据库 SPGENPOS 提供。这扩展了之前的列举，其中没有考虑磁点群中TR可能存在的情况，从而忽略了与具有IV型磁空间群的众多磁性结构相关的完整SpPG对称性。对于每个列出的共面和非共面 SpPG，也使用 BCS 中的 STENSOR 程序详细分析允许对称的自旋分裂。\n\n除了包括操作1'（即TR和空间反转的组合操作）的SpPG之外，所有其他共面和非共面SpPG都允许在电子波矢量分量的幂展开中以某种顺序进行自旋分裂。我们发现，根据 SpPG，自旋分裂项可以出现在从 l=0 到 9 的最低阶单项式中，但 l=8 除外。这与共线情况形成对比，共线情况中最低阶不高于 l=6，并且 TR 禁止任何自旋分裂。对于新确定的幂 l=5、7 和 9 的自旋织构（在一些非中心对称 SpPG 中可能存在），给出了以晶体动量分量表示的自旋分裂的函数形式。真实材料 LaMnAu5 的一个示例已被识别，显示出 l=5 自旋分裂。", "authors": [{"name": "Luis Elcoro"}, {"name": "Jesus Etxebarria"}, {"name": "J. Manuel Perez-Mato"}, {"name": "Emre S. Tasci"}], "featured_authors": [{"name": "Luis Elcoro"}, {"name": "Jesus Etxebarria"}, {"name": "J. Manuel Perez-Mato"}, {"name": "Emre S. Tasci"}], "author_count": 4}, {"id": "2606.19290", "category": "cond-mat", "title": "On operator product expansion in the spin-orbit coupled bosonic system", "abstract": "Ultra-cold bosonic systems can be tuned to exhibit quantum phase transitions. For example, the Rabi-coupled bosonic system exhibits ferromagnetic and paramagnetic phases, whereas the spin-orbit-coupled system exhibits exciting phases such as supersolidity. The physics of these phases and phase transitions is very rich. It is an important topic of research to probe these phases and phase transitions using various tools in many-body physics. The operator product expansion (OPE) provides one such tool. It expresses the product of two separated operators as a series expansion of local operators. In this article, we will derive the OPE of two operators $\\psi^\\dagger_\\sigma(\\vec r)$ and $\\psi_{\\sigma'}(\\vec r')$. More specifically, we look for the contact density term, which controls many of the universal physics of the underlying bosonic system.", "url": "https://arxiv.org/abs/2606.19290", "type": "理论", "summary": "超冷玻色子系统可以调整以表现出量子相变。例如，拉比耦合玻色子系统表现出铁磁和顺磁相，而自旋轨道耦合系统则表现出令人兴奋的阶段，例如超固态。这些相和相变的物理原理非常丰富。使用多体物理学中的各种工具来探测这些相和相变是一个重要的研究课题。运营商产品扩展 (OPE) 提供了这样一种工具。它将两个独立算子的乘积表示为本地算子的一系列扩展。在本文中，我们将推导两个算子 $\\psi^\\dagger_\\sigma(\\vec r)$ 和 $\\psi_{\\sigma'}(\\vec r')$ 的 OPE。更具体地说，我们寻找接触密度项，它控制着底层玻色子系统的许多通用物理学。", "authors": [{"name": "Rajesh Kumar Gupta"}, {"name": "Siddhant Tiwari"}], "featured_authors": [{"name": "Rajesh Kumar Gupta"}, {"name": "Siddhant Tiwari"}], "author_count": 2}, {"id": "2606.19331", "category": "cond-mat", "title": "Topological spectral form factor reveals emergent non-Hermitian single-particle $\\mathcal{PT}$ transitions from many-body quantum chaos", "abstract": "In equilibrium physics, topological defect insertions in quantum and classical partition functions provide non-perturbative probes of phase transitions beyond local observables. In non-equilibrium physics, the spectral form factor provides a minimal probe of universal quantum dynamics, and admits a representation as a product of two partition functions at imaginary inverse temperature. We define the topological spectral form factor (TopSFF) by inserting topological defects acting non-trivially on the doubled partition functions, producing mismatched spacetime world-sheet topologies. For the minimal $\\mathbb{Z}_2$ spatially extended defect, implemented by the global swap operator, we derive an exact mapping of the TopSFF of a generic 1D many-body chaotic system to an emergent $(3+1)$D non-Hermitian single-particle problem describing a temporal domain wall (tDW). We show analytically that the effective tDW dynamics undergoes a $\\mathcal{PT}$ symmetry breaking transition at a finite interaction strength $\\epsilon_{\\mathrm{EP}}$: below $\\epsilon_{\\mathrm{EP}}$, the leading modes are polarized into Gaussian or non-Gaussian tDW sectors and the TopSFF varies monotonically and exponentially with system size; above $\\epsilon_{\\mathrm{EP}}$, the tDW sectors hybridize and the TopSFF oscillates with system size; at the exceptional point $\\epsilon_{\\mathrm{EP}}$, Jordan non-diagonality produces a linear-in-system-size enhancement. For temporally extended topological defects, we derive exact universal scaling forms for the TopSFF free energy in systems with time reversal or time translation symmetry, and verify them numerically in independent models.", "url": "https://arxiv.org/abs/2606.19331", "type": "理论+数值", "summary": "在平衡物理学中，量子和经典配分函数中的拓扑缺陷插入提供了超出局部可观测量的相变的非微扰探针。在非平衡物理学中，光谱形状因子提供了通用量子动力学的最小探针，并允许表示为两个配分函数在虚数逆温度下的乘积。我们通过插入对双配分函数起作用的拓扑缺陷来定义拓扑谱形状因子（TopSFF），产生不匹配的时空世界片拓扑。对于由全局交换算子实现的最小 $\\mathbb{Z}_2$ 空间扩展缺陷，我们导出了通用一维多体混沌系统的 TopSFF 到描述时域壁 (tDW) 的新兴 $(3+1)$D 非厄米特单粒子问题的精确映射。\n\n我们分析表明，有效的 tDW 动力学在有限的相互作用强度 $\\epsilon_{\\mathrm{EP}}$ 下经历 $\\mathcal{PT}$ 对称破缺转变：低于 $\\epsilon_{\\mathrm{EP}}$，主导模式被极化为高斯或非高斯 tDW 扇区，并且 TopSFF 随着系统尺寸单调和指数变化；在 $\\epsilon_{\\mathrm{EP}}$ 之上，tDW 扇区混合，TopSFF 随系统大小振荡；在特殊点$\\epsilon_{\\mathrm{EP}}$，若尔当非对角性产生系统内线性尺寸增强。对于时间扩展的拓扑缺陷，我们推导出具有时间反转或时间平移对称性的系统中 TopSFF 自由能的精确通用标度形式，并在独立模型中进行数值验证。", "authors": [{"name": "Daniel Harkin"}, {"name": "Chun Y. Leung"}, {"name": "Amos Chan"}], "featured_authors": [{"name": "Daniel Harkin"}, {"name": "Chun Y. Leung"}, {"name": "Amos Chan"}], "author_count": 3}, {"id": "2606.18331", "category": "hep-th", "title": "Meromorphic amplitudes from 3-dimensional supersymmetry", "abstract": "We establish a new connection between supersymmetric theories and scattering amplitudes. We show that the Coon amplitude coincides with the 3d $\\mathcal{N}=2$ half-index of the XYZ model with nontrivial boundary conditions. Our 3d theory, intrinsically defined in the UV, flows to a sigma model in the IR whose partition function is the Veneziano amplitude. Crossing symmetry is realized as a consequence of 3d $\\mathcal{N}=2$ mirror symmetry between XYZ and SQED. We use this correspondence to construct a meromorphic modification of the Coon amplitude by promoting the long-standing dressing factor $\\mathfrak{q}^{ST}$ responsible for a branch cut to an elliptic completion thereof. This illustrates that one does not have to give up single-valuedness to achieve positivity at the physical poles.", "url": "https://arxiv.org/abs/2606.18331", "type": "理论", "summary": "我们在超对称理论和散射振幅之间建立了新的联系。我们证明，Coon 振幅与具有非平凡边界条件的 XYZ 模型的 3d $\\mathcal{N}=2$ 半指数一致。我们的 3d 理论本质上是在 UV 中定义的，流向 IR 中的 sigma 模型，其配分函数是 Veneziano 振幅。交叉对称是由于 XYZ 和 SQED 之间的 3d $\\mathcal{N}=2$ 镜像对称而实现的。我们利用这种对应关系，通过促进长期存在的修整因子 $\\mathfrak{q}^{ST}$ 来构建库恩振幅的亚形修改，该修整因子负责将分支切割实现为椭圆形。这说明人们不必放弃单一价值观就能在物理极点获得积极性。", "authors": [{"name": "Federico Ambrosino"}, {"name": "Nathan Haouzi"}], "featured_authors": [{"name": "Federico Ambrosino"}, {"name": "Nathan Haouzi"}], "author_count": 2}, {"id": "2606.18343", "category": "hep-th", "title": "The pole truth: an analytical graviton propagator from Asymptotic Safety", "abstract": "We derive an analytical approximation for the graviton propagator from Asymptotic Safety. We find neither extra poles nor indications of unitarity or causality violations in the spin-two sector. Our results strengthen the case that Asymptotic Safety does not introduce new degrees of freedom, and thus propagates the same field content as General Relativity. We also identify the underlying mechanism: the residues of spurious poles in finite-order derivative expansions approach zero as the order is increased.", "url": "https://arxiv.org/abs/2606.18343", "type": "理论", "summary": "我们从渐近安全性中推导出引力子传播器的解析近似。我们在自旋二扇区中既没有发现额外的极点，也没有发现单一性或违反因果关系的迹象。我们的结果强化了渐近安全性不会引入新的自由度，因此传播了与广义相对论相同的场内容。我们还确定了潜在的机制：随着阶数的增加，有限阶导数展开中的杂散极点的残数接近于零。", "authors": [{"name": "Benjamin Knorr"}], "featured_authors": [{"name": "Benjamin Knorr"}], "author_count": 1}, {"id": "2606.18344", "category": "hep-th", "title": "Black p-brane Thermodynamics without Constructing Solutions", "abstract": "This paper generalizes the method used in the previous article 2512.09930 to black $p$-brane thermodynamics in arbitrary dimensions containing black holes and strings as special cases: thermodynamic quantities can be derived without constructing the corresponding black $p$-brane solutions. We further extend the discussion to black holes or $p$-branes involving a general scalar coset.", "url": "https://arxiv.org/abs/2606.18344", "type": "理论", "summary": "本文将前一篇文章2512.09930中使用的方法推广到包含黑洞和弦的任意维度的黑$p$膜热力学作为特例：无需构建相应的黑$p$膜解即可导出热力学量。我们进一步将讨论扩展到涉及一般标量陪集的黑洞或 $p$-膜。", "authors": [{"name": "Bing-Yang Han"}, {"name": "H. Lu"}], "featured_authors": [{"name": "Bing-Yang Han"}, {"name": "H. Lu"}], "author_count": 2}, {"id": "2606.18345", "category": "hep-th", "title": "Exponentiation of higher-point and higher-genus Virasoro conformal blocks in the semiclassical limit", "abstract": "A long-standing conjecture claims that Virasoro conformal blocks exponentiate in the semiclassical limit $c \\to \\infty$ with $h/c$ finite. However, this has been proven only for four-point blocks on the sphere and one-point blocks on the torus. Here we extend the proof to general conformal blocks for higher-point functions and higher-genus backgrounds in arbitrary channels. The statement is to be understood at the level of a formal power series. Our proof builds upon a novel extension of the oscillator method for the computation of conformal blocks to cases where three internal lines meet at a vertex. This extension also gives a new constructive method to compute global conformal blocks in 2d CFTs at general genus.", "url": "https://arxiv.org/abs/2606.18345", "type": "理论", "summary": "一个长期存在的猜想声称，Virasoro 共角块在半经典极限 $c \\to \\infty$ 上求幂，且 $h/c$ 有限。然而，这仅针对球体上的四点块和环面上的单点块得到证明。在这里，我们将证明扩展到任意通道中更高点函数和更高属背景的一般共形块。该陈述应在正式幂级数的层面上理解。我们的证明建立在振荡器方法的新颖扩展之上，用于计算共形块到三个内部线在一个顶点相交的情况。此扩展还提供了一种新的构造方法来计算一般属的 2d CFT 中的全局共形块。", "authors": [{"name": "Marius Gerbershagen"}, {"name": "Jakob Hollweck"}], "featured_authors": [{"name": "Marius Gerbershagen"}, {"name": "Jakob Hollweck"}], "author_count": 2}, {"id": "2606.18349", "category": "hep-th", "title": "Ghosts versus Unstable Particles in Quantum Field Theory", "abstract": "We elucidate the physical nature of ghosts above the multi-particle threshold by contrasting them with unstable particles in quantum field theory. We first consider the asymptotic formulation, where ordinary positive-norm one-particle states can be unstable and decay, whereas ghosts survive asymptotically without decaying, yet admit no particle interpretation due to interference with the multi-particle component which masks the negative-norm one-particle state. This distinction originates from two different analytic structures of the dressed propagator, whose complex conjugate poles lie in the first or second Riemann sheet in the ghost or ordinary case, respectively. Ghost resonances are, in principle, phenomenologically distinguishable from ordinary ones, being narrower and exhibiting weaker interference between positive- and negative-energy peaks. We then formulate the quantum field theory in a finite interval of time and, working within a suitable approximation for the dressed propagator, find that finite-time effects amplify differences in the resonant behavior and give rise to new features, such as higher peaks in ghost resonances. Distinct temporal regimes are also identified: for times shorter than the inverse width, an approximate free-particle description is valid, whereas at later times interactions and interference effects dominate, leading to decay or multi-particle masking. Complex poles in the dressed propagator emerge only at late times and become complex-conjugate pairs asymptotically, determining the asymptotic dynamics. This study supports the absence of freely propagating ghost particles in the asymptotic limit.", "url": "https://arxiv.org/abs/2606.18349", "type": "理论", "summary": "我们通过将多粒子阈值以上的幽灵与量子场论中的不稳定粒子进行对比，阐明了它们的物理性质。我们首先考虑渐近公式，其中普通的正范数单粒子态可能不稳定并衰变，而鬼魂则渐近地生存而不衰变，但由于与掩盖负范数单粒子态的多粒子分量的干扰而不允许粒子解释。这种区别源于修饰传播器的两种不同的分析结构，其复共轭极点分别位于幽灵或普通情况下的第一或第二黎曼片中。原则上，幽灵共振在现象学上与普通共振不同，幽灵共振更窄，正负能量峰之间的干扰也更弱。然后，我们在有限的时间间隔内制定量子场论，并在适合传播器的适当近似范围内工作，发现有限时间效应放大了谐振行为的差异，并产生了新的特征，例如鬼谐振中的更高峰值。\n\n还确定了不同的时间范围：对于短于倒数宽度的时间，近似的自由粒子描述是有效的，而在稍后的时间，相互作用和干扰效应占主导地位，导致衰变或多粒子掩蔽。修饰后的传播器中的复极点仅在后期出现并渐近地变成复共轭对，从而确定渐近动力学。这项研究支持在渐进极限内不存在自由传播的鬼粒子。", "authors": [{"name": "Luca Buoninfante"}], "featured_authors": [{"name": "Luca Buoninfante"}], "author_count": 1}, {"id": "2606.18351", "category": "hep-th", "title": "Probing weak chaos in $\\mathcal N=4$ super Yang-Mills and long-range spin chains", "abstract": "We study signatures of quantum chaos in finite-loop truncations of the planar dilatation operator in the $\\mathfrak{su}(2)$ sector of $\\mathcal N=4$ super Yang-Mills and its $\\beta$-deformation. These truncations define holographically motivated long-range deformations of the nearest-neighbour XXX spin chain. At one-loop the model is integrable, while the all-loop planar theory is expected to again be integrable. Finite-loop truncations therefore provide a natural setting for investigating how chaotic behaviour emerges between these two integrable limits. We analyse this question using spectral statistics, eigenvector diagnostics and spread complexity. We find that the two- and four-loop truncations develop GOE-like level statistics at sufficiently large coupling but with features characteristic of weak integrability breaking. The integrability breaking at four-loops is weaker than at two-loops and the critical coupling at which chaos occurs is larger, at least for long spin chains. The three-loop truncation does not show the same onset of chaos in the range studied. Eigenvector diagnostics show that the corresponding eigenstates remain less random than GOE vectors, indicating weak ergodicity and multifractality. Finally, we can identify signatures of the eigenvalue and eigenvector chaos in the Krylov-space data. Namely, we demonstrate a correlation of the level spacing statistics with the peak of spread complexity and disorder on the Krylov chain. The delocalisation of the initial state in the Hamiltonian eigenbasis is shown to strongly affect the saturation of complexity. Our results suggest that finite-loop dilatation operators are not generic long-range spin chain Hamiltonians, but already display patterns consistent with the restoration of integrability in the all-loop planar theory.", "url": "https://arxiv.org/abs/2606.18351", "type": "理论", "summary": "我们研究了 $\\mathcal N=4$ super Yang-Mills 的 $\\mathfrak{su}(2)$ 扇区中平面膨胀算子的有限循环截断中的量子混沌特征及其 $\\beta$ 变形。这些截断定义了最近邻 XXX 自旋链的全息驱动的长程变形。在单环路中，模型是可积的，而全环路平面理论预计再次是可积的。因此，有限循环截断为研究这两个可积极限之间如何出现混沌行为提供了一个自然的环境。我们使用谱统计、特征向量诊断和扩展复杂性来分析这个问题。我们发现，二环和四环截断在足够大的耦合下产生类似 GOE 的级别统计，但具有弱可积破坏的特征。四环处的可积性破坏比两环处的可积性破坏弱，并且发生混沌的临界耦合更大，至少对于长自旋链而言是这样。三环截断在研究范围内没有显示出相同的混沌开始。\n\n特征向量诊断表明，相应的特征态仍然不如 GOE 向量随机，表明遍历性和多重分形性较弱。最后，我们可以识别克雷洛夫空间数据中的特征值和特征向量混沌的特征。也就是说，我们证明了级别间距统计数据与 Krylov 链上传播复杂性和无序性峰值的相关性。哈密​​顿本征基中初始状态的离域被证明会强烈影响复杂性的饱和度。我们的结果表明，有限循环膨胀算子不是通用的长程自旋链哈密顿量，但已经显示出与全循环平面理论中可积性恢复一致的模式。", "authors": [{"name": "Pawel Caputa"}, {"name": "Brian Creed"}, {"name": "Rathindra Nath Das"}, {"name": "Saskia Demulder"}, {"name": "Tristan McLoughlin"}], "featured_authors": [{"name": "Pawel Caputa"}, {"name": "Brian Creed"}, {"name": "Rathindra Nath Das"}, {"name": "Saskia Demulder"}, {"name": "Tristan McLoughlin"}], "author_count": 5}, {"id": "2606.18362", "category": "hep-th", "title": "Tracing Transcendentality in Protected Correlators of N=4 SYM", "abstract": "We study two-point functions of protected scalar operators in N=4 SYM, focusing on their transcendentality properties in dimensional reduction, where quantum corrections are subleading in the regulator. We compute the correlators explicitly through two loops and operators up to classical dimension 10, for all trace structures. The one-loop correction is universal. At two loops, we find a controlled partial breaking of uniform transcendentality for higher-dimensional operators, which can be cancelled by suitable combinations of correlators in a fully predictable way. A main result is a complete planar extrapolation for two-loop correlators at arbitrary dimension and trace structure, whose dependence is entirely controlled by the number of stress-tensor multiplet factors in the operator. The perturbative results agree with localization predictions in all cases where comparisons are possible.", "url": "https://arxiv.org/abs/2606.18362", "type": "理论", "summary": "我们研究了 N=4 SYM 中受保护标量算子的两点函数，重点关注它们在降维中的超越性性质，其中量子校正在调节器中处于次领先地位。对于所有迹线结构，我们通过两个循环和高达经典维度 10 的运算符显式计算相关器。单环校正是通用的。在两个循环中，我们发现高维算子一致超越性的受控部分破坏，这可以通过相关器的适当组合以完全可预测的方式取消。主要结果是任意维度和迹线结构的双环相关器的完整平面外推，其依赖性完全由算子中的应力张量多重因子的数量控制。在所有可以进行比较的情况下，扰动结果都与本地化预测一致。", "authors": [{"name": "Marco S. Bianchi"}], "featured_authors": [{"name": "Marco S. Bianchi"}], "author_count": 1}, {"id": "2606.18380", "category": "hep-th", "title": "What makes spacetime spin in string theory?", "abstract": "Type II string theory in the absence of orientifolds requires the target spacetime $X$ to admit a spin structure. We show that this familiar requirement arises directly from the consistency of the worldsheet GSO projection. The obstruction is a mixed global anomaly between $(-1)^{\\text{F}_L}$ and the target space background data, detected by the spin bordism group $\\Omega_3^{\\mathrm{spin}}(B\\mathbb{Z}_2\\times X)$. We compute the relevant mixed bordism group and identify the bordism class of the GSO-projected worldsheet theory. For smooth target spaces, vanishing of the anomaly reduces to the condition that $X$ is spin, while for general orbifolds $[\\hat{X}/G]$, $\\hat{X}$ has to carry a $G$-equivariant spin structure. We also classify all possible theta angles in the worldsheet theory and show that they correspond to all possible continuous and discrete background fields of the target space theory visible in string perturbation theory.", "url": "https://arxiv.org/abs/2606.18380", "type": "理论", "summary": "在没有东方折叠的情况下，II 型弦理论需要目标时空 $X$ 来接纳自旋结构。我们表明，这种熟悉的要求直接源于世界表 GSO 投影的一致性。该障碍物是 $(-1)^{\\text{F}_L}$ 和目标空间背景数据之间的混合全局异常，由自旋波群 $\\Omega_3^{\\mathrm{spin}}(B\\mathbb{Z}_2\\times X)$ 检测到。我们计算相关的混合边界群并确定 GSO 投影世界表理论的边界类。对于平滑的目标空间，异常的消失简化为$X$是自旋的条件，而对于一般轨道折叠$[\\hat{X}/G]$，$\\hat{X}$必须携带$G$等变自旋结构。我们还对世界表理论中所有可能的 theta 角进行了分类，并表明它们对应于弦扰动理论中可见的目标空间理论的所有可能的连续和离散背景场。", "authors": [{"name": "Matilda Delgado"}, {"name": "Lorenz Eberhardt"}, {"name": "Marija Tomašević"}], "featured_authors": [{"name": "Matilda Delgado"}, {"name": "Lorenz Eberhardt"}, {"name": "Marija Tomašević"}], "author_count": 3}, {"id": "2606.18396", "category": "hep-th", "title": "An effective field theory approach to the sign problem in BFSS", "abstract": "The sign problem is a notorious obstacle for classically simulating quantum theories with fermions. We propose an effective field theory method for analyzing the sign problem. At high temperatures, a $d$+1 dimensional field theory reduces to a bosonic $d$-dimensional theory; the phase of the Pfaffian in the higher dimensional theory is encoded in an operator in the lower dimensional theory. We apply this framework to the D0-brane/BFSS matrix quantum mechanics, where the phase becomes an operator in a bosonic multi-matrix integral. Our results show that the continuum theory has a sign problem that persists in the large-$N$ 't Hooft regime. However, detecting the sign problem involves going to 10-loop order in the high-temperature expansion. This delayed onset follows from the fact that the Pfaffian phase transforms as an $O(9)$ pseudoscalar. Furthermore, the relevant diagrams give a numerically small prefactor. Consequently, ignoring the sign problem leads to a relatively small fractional error in thermodynamic quantities for temperatures $T \\gtrsim \\lambda^{1/3}$. However, at stronger coupling in the 't Hooft regime, the sign problem may become more severe. Finally, we initiate the application of this framework to higher-dimensional maximally supersymmetric Yang-Mills theories.", "url": "https://arxiv.org/abs/2606.18396", "type": "理论", "summary": "符号问题是用费米子经典模拟量子理论的一个臭名昭著的障碍。我们提出了一种有效的场论方法来分析符号问题。在高温下，$d$+1 维场论简化为玻色子 $d$ 维场论；高维理论中的普法夫相位被编码在低维理论中的算子中。我们将此框架应用于 D0-膜/BFSS 矩阵量子力学，其中相位成为玻色子多矩阵积分中的算子。我们的结果表明，连续统理论存在一个符号问题，该问题在大 $N$ 't Hooft 体系中持续存在。然而，检测符号问题涉及到高温膨胀中的 10 环阶。这种延迟起始源于普法夫相位变换为 $O(9)$ 伪标量这一事实。此外，相关图表给出了数值上较小的先因子。因此，忽略符号问题会导致温度 $T \\gtrsim \\lambda^{1/3}$ 的热力学量的分数误差相对较小。然而，在 't Hooft 体系中耦合更强时，符号问题可能会变得更加严重。\n\n最后，我们开始将该框架应用于高维最大超对称杨-米尔斯理论。", "authors": [{"name": "Gauri Batra"}, {"name": "Henry W. Lin"}, {"name": "Haifeng Tang"}], "featured_authors": [{"name": "Gauri Batra"}, {"name": "Henry W. Lin"}, {"name": "Haifeng Tang"}], "author_count": 3}, {"id": "2606.18432", "category": "hep-th", "title": "Thermodynamic Stability and Fluctuations of the (2+1)-dimensional GMG Warped Black Hole", "abstract": "We investigate the thermodynamic stability and the stochastic thermal fluctuations of the warped black hole solution in three-dimensional General Massive Gravity. We demonstrate that the black hole is thermodynamically unstable and identify the nontrivial Davies phase-transition curves from the behavior of its admissible heat capacities. Going beyond the classical stability analysis, we study thermal fluctuations within a modified finite-time nonequilibrium extension of Ruppeiner's Hessian-based fluctuation theory. For a class of isentropic and isoenergetic processes, we derive exact on-shell angular momentum trajectories in the thermodynamic state space and compute the corresponding thermodynamic lengths. These quantities characterize relaxation processes between macrostates and provide an estimate of the associated relaxation times. Furthermore, we show that the thermodynamic geodesic equations do not admit constant-angular-momentum solutions, suggesting a continuous change of the black hole's angular momentum. Our results consistently reproduce the warped AdS$_3$ black hole limit of Topological Massive Gravity.", "url": "https://arxiv.org/abs/2606.18432", "type": "理论", "summary": "我们研究了三维广义引力场中扭曲黑洞溶液的热力学稳定性和随机热涨落。我们证明黑洞在热力学上不稳定，并从其容许热容的行为中识别出非平凡的戴维斯相变曲线。超越经典的稳定性分析，我们研究了鲁珀纳基于 Hessian 的涨落理论的有限时间非平衡扩展的修改后的热涨落。对于一类等熵和等能过程，我们推导出热力学状态空间中精确的壳上角动量轨迹，并计算相应的热力学长度。这些量表征了宏观状态之间的弛豫过程，并提供了相关弛豫时间的估计。此外，我们表明热力学测地方程不允许恒定角动量解，这表明黑洞角动量的连续变化。我们的结果一致地再现了拓扑大引力的扭曲 AdS$_3$ 黑洞极限。", "authors": [{"name": "Tsvetan Vetsov"}], "featured_authors": [{"name": "Tsvetan Vetsov"}], "author_count": 1}, {"id": "2606.18442", "category": "hep-th", "title": "Two-point functions in $4-2\\,\\varepsilon$ dimensions from localization", "abstract": "We study two-point functions of half-BPS operators in maximally supersymmetric Yang-Mills theory continued to $d=4-2\\,\\varepsilon$ dimensions. Using supersymmetric localization on $S^d$, we derive perturbative matrix-model expressions for the $\\varepsilon$-expansion of these correlators and obtain all-loop results at leading order in $\\varepsilon$ in the planar limit, with extensions to finite-$N$ corrections and higher-charge operators. We compare the localization results with direct perturbative computations in flat space. At order $\\varepsilon$ the two descriptions agree perfectly, while at higher orders our construction fails to reproduce the perturbative data due to the breaking of conformal symmetry away from four dimensions. Nevertheless, in the case of the dimension-two operator we conjecture an all-loop formula at order $\\varepsilon^2$ by exploiting the precise form of the mismatch.", "url": "https://arxiv.org/abs/2606.18442", "type": "理论", "summary": "我们研究了最大超对称 Yang-Mills 理论中半 BPS 算子的两点函数，持续到 $d=4-2\\,\\varepsilon$ 维度。使用 $S^d$ 上的超对称定位，我们推导出这些相关器的 $\\varepsilon$ 展开的微扰矩阵模型表达式，并在平面极限中以 $\\varepsilon$ 的前导顺序获得全循环结果，并扩展到有限 $N$ 校正和更高电荷算子。我们将定位结果与平坦空间中的直接微扰计算进行比较。在 $\\varepsilon$ 阶上，两种描述完全一致，而在更高阶上，由于共形对称性从四个维度被破坏，我们的构造无法重现微扰数据。然而，在二维运算符的情况下，我们通过利用不匹配的精确形式来推测 $\\varepsilon^2$ 阶的全循环公式。", "authors": [{"name": "Alessandro Georgoudis"}, {"name": "Joseph A. Minahan"}, {"name": "Anton Nedelin"}, {"name": "Congkao Wen"}], "featured_authors": [{"name": "Alessandro Georgoudis"}, {"name": "Joseph A. Minahan"}, {"name": "Anton Nedelin"}, {"name": "Congkao Wen"}], "author_count": 4}, {"id": "2606.18452", "category": "hep-th", "title": "Tropical WKB asymptotics of NRS coordinates for opers in $SU(2)$, $N_f=4$ theory", "abstract": "We study the semiclassical limit of SL_2-opers on the four-punctured sphere in Nekrasov-Rosly-Shatashvili Darboux coordinates. Using exact Wentzel-Kramers-Brillouin (WKB) connection formulae, we express the trace coordinates of the corresponding SL_2(C) character variety as finite Laurent sums of Voros exponentials. Tropicalizing these formulae and the NRS relations gives a chamberwise integer affine linear system for the leading logarithms of the NRS coordinates. In chambers where this system is unimodular and the selected cycles form a primitive symplectic pair, the leading asymptotics agree, up to flavor-period shifts, with Seiberg-Witten periods of the N=2 SU(2) theory with N_f=4 fundamental hypermultiplets. We verify this mechanism in a sample chamber and in the weak-coupling degeneration. No global coordinate-independent recovery theorem is claimed; non-unimodular or degenerate chambers are treated as limitations of the chosen NRS chart. In the weak-coupling degeneration, we show that the NRS chart can be chosen compatibly with the plumbing limit so that the resulting chamber is unimodular and non-degenerate away from tropical walls.", "url": "https://arxiv.org/abs/2606.18452", "type": "理论", "summary": "我们研究了 Nekrasov-Rosly-Shatashvili Darboux 坐标中 SL_2-opers 在四穿孔球面上的半经典极限。使用精确的 Wentzel-Kramers-Brillouin (WKB) 连接公式，我们将相应 SL_2(C) 字符变体的迹坐标表示为 Voros 指数的有限洛朗和。热带化这些公式和 NRS 关系给出了 NRS 坐标的前导对数的室向整数仿射线性系统。在该系统是幺模且所选循环形成原始辛对的室中，领先的渐近函数在风味周期变化之前与 N=2 SU(2) 理论的 Seiberg-Witten 周期一致，其中 N_f=4 基本超多重态。我们在样品室和弱耦合退化中验证了这种机制。没有提出全局坐标独立恢复定理；非单模或简并室被视为所选 NRS 图的限制。在弱耦合退化中，我们表明可以选择与管道限制兼容的 NRS 图，以便生成的室在远离热带墙壁的情况下是单模且非退化的。", "authors": [{"name": "Vasilii Iugov"}], "featured_authors": [{"name": "Vasilii Iugov"}], "author_count": 1}, {"id": "2606.18629", "category": "hep-th", "title": "Holographic Dual of PT Symmetric BCFT", "abstract": "We present a holographic dual of a two dimensional conformal field theory with non-hermitian but Parity-Time (PT) symmetric boundary conditions, by applying the AdS/BCFT duality and by introducing an imaginary valued scalar field localized on an end-of-the-world brane. We find that as we increase the strength of the non-hermitian PT symmetric interactions, the system experiences a spontaneous PT symmetry breaking. We also consider its Wick rotated setup as a new quantum quenched state and show that its growth of entanglement entropy can be larger than the standard results obtained from standard Cardy states.", "url": "https://arxiv.org/abs/2606.18629", "type": "理论", "summary": "通过应用 AdS/BCFT 对偶性并引入位于世界末日膜上的虚值标量场，我们提出了具有非厄米但宇称时间 (PT) 对称边界条件的二维共形场论的全息对偶。我们发现，当我们增加非厄米 PT 对称相互作用的强度时，系统会经历自发的 PT 对称性破缺。我们还将其威克旋转设置视为一种新的量子猝灭态，并表明其纠缠熵的增长可以大于从标准卡迪态获得的标准结果。", "authors": [{"name": "Ryota Maeda"}, {"name": "Nanami Nakamura"}, {"name": "Tadashi Takayanagi"}], "featured_authors": [{"name": "Ryota Maeda"}, {"name": "Nanami Nakamura"}, {"name": "Tadashi Takayanagi"}], "author_count": 3}, {"id": "2606.18639", "category": "hep-th", "title": "A Note on Corrections to Entanglement Wedge Reconstruction", "abstract": "If entanglement wedge reconstruction is exact, then (under certain assumptions) the area term in the RT formula is a c-number, indicating that the choice of a bulk quantum state does not influence the geometry. Recently Cao, Cheng, Karthikeyan, Li, and Preskill considered a generic perturbation away from exact entanglement wedge reconstruction. The optimal reconstruction was defined; based on this, an effective area function that depends nontrivially on the quantum state was defined and its properties were analyzed. Here we make one aspect of this picture more quantitative, by showing that if as expected the area term in the RT formula is of order 1/G while the bulk entropy is of order 1, then the corrections to entanglement wedge reconstruction are exponentially small (in G) relative to corrections to the area function. In the framework under discussion, there is an area function but no area operator; we discuss to what extent this is the expected behavior in holography.", "url": "https://arxiv.org/abs/2606.18639", "type": "理论", "summary": "如果纠缠楔重建是精确的，那么（在某些假设下）RT 公式中的面积项是 c 数，表明体量子态的选择不会影响几何形状。最近，Cao、Cheng、Karthikeyan、Li 和 Preskill 考虑了一种远离精确纠缠楔重建的通用扰动。定义了最佳重建；在此基础上，定义了非平凡依赖于量子态的有效面积函数，并分析了其性质。在这里，我们使这幅图的一个方面更加定量，通过表明，如果如预期的那样，RT 公式中的面积项为 1/G 阶，而体熵为 1 阶，则纠缠楔重构的校正相对于面积函数的校正呈指数小（以 G 为单位）。在讨论的框架中，有区域函数但没有区域运算符；我们讨论这在多大程度上是全息术中的预期行为。", "authors": [{"name": "Edward Witten"}], "featured_authors": [{"name": "Edward Witten"}], "author_count": 1}, {"id": "2606.18641", "category": "hep-th", "title": "SUSY meets pseudo-Hermiticity", "abstract": "In this work, we construct the simplest pseudo-Hermitian quantum field theory that is supersymmetric. This is the pseudo-Hermitian Wess-Zumino model in the sense that it contains a pair of symplectic fermions (anti-commuting scalar fields) that satisfy the Klein-Gordon equation and a spin-half boson that satisfies the Dirac equation. The conventional spin-statistics theorem is circumvented through the use of pseudo-Hermitian conjugation to define field adjoints. To make the supersymmetry manifest, we formulate the pseudo-Hermitian Wess-Zumino model using the superfield formalism. These superfields are Grassmann-odd so it is not possible to construct non-vanishing cubic interactions using only these superfields. We show that this problem can be resolved by coupling the pseudo-Hermitian Wess-Zumino model with the Hermitian Wess-Zumino model while preserving supersymmetry.", "url": "https://arxiv.org/abs/2606.18641", "type": "理论", "summary": "在这项工作中，我们构建了最简单的超对称伪厄米量子场论。这是伪埃尔米特韦斯-祖米诺模型，因为它包含一对满足克莱因-戈登方程的辛费米子（反交换标量场）和一个满足狄拉克方程的自旋半玻色子。通过使用伪厄米共轭来定义场伴随，可以绕过传统的自旋统计定理。为了使超对称性显现出来，我们使用超场形式主义制定了伪埃尔米特韦斯-祖米诺模型。这些超场是格拉斯曼奇数，因此不可能仅使用这些超场来构造非零立方相互作用。我们证明，这个问题可以通过将伪 Hermitian Wess-Zumino 模型与 Hermitian Wess-Zumino 模型耦合来解决，同时保留超对称性。", "authors": [{"name": "Cheng-Yang Lee"}, {"name": "Gloria Cecilia de León Morales"}, {"name": "Julio Olmos"}, {"name": "Carlos A. Vaquera-Araujo"}, {"name": "Siyi Zhou"}], "featured_authors": [{"name": "Cheng-Yang Lee"}, {"name": "Gloria Cecilia de León Morales"}, {"name": "Julio Olmos"}, {"name": "Carlos A. Vaquera-Araujo"}, {"name": "Siyi Zhou"}], "author_count": 5}, {"id": "2606.18739", "category": "hep-th", "title": "ASEP/DSSYK duality and strange correlator", "abstract": "We show that the moment of the transfer matrix of the double scaled SYK model is written as an overlap between the stationary state of ASEP (asymmetric simple exclusion process) and a product state. We argue that this overlap is an analogue of the strange correlator appearing in the correspondence between the Levin-Wen string-net model and the Turaev-Viro state sum.", "url": "https://arxiv.org/abs/2606.18739", "type": "理论", "summary": "我们证明，双尺度 SYK 模型的传递矩阵矩被写为 ASEP（非对称简单排除过程）的稳态和乘积状态之间的重叠。我们认为这种重叠类似于 Levin-Wen 弦网模型与 Turaev-Viro 状态和之间的对应关系中出现的奇怪相关器。", "authors": [{"name": "Kazumi Okuyama"}], "featured_authors": [{"name": "Kazumi Okuyama"}], "author_count": 1}, {"id": "2606.18779", "category": "hep-th", "title": "Hydrodynamics of perfect fluids with anomalies from the fermionic path integral", "abstract": "The path integral of the Dirac fermion with vector and axial gauge backgrounds is analyzed near the infrared limit in the presence of residual irrelevant current-current interaction. After integrating out fermions, a semiclassical low-energy effective action is obtained, written in terms of currents. Its expression is found to correspond to the hydrodynamic action previously proposed for perfect barotropic fluids with anomalies at zero temperature. This approach also leads to two further hydrodynamic actions to be associated, respectively, with the Weyl fermion, and the Dirac fermion having independent vector and axial currents. These actions feature four- and five-dimensional bulk-boundary terms, owing to anomaly inflow, which are identified as being the so-called transgression forms. These are generalizations of Chern--Simons forms that involve two gauge fields: the dynamical field and the background field. The path-integral argument provides a ``microscopic'' explanation for several ingredients of the action formulation of hydrodynamics that are necessary to incorporate anomalies. It also clarifies the infrared reduction required to pass from the effective field theory to a local hydrodynamic description. This reduction is implemented by considering restricted variations of the action, familiar from hydrodynamics, which at the same time lead to four-dimensional equations of motion from the five-dimensional transgression terms.", "url": "https://arxiv.org/abs/2606.18779", "type": "理论", "summary": "在存在残余不相关电流-电流相互作用的情况下，在红外极限附近分析了具有矢量和轴向规范背景的狄拉克费米子的路径积分。对费米子进行积分后，获得半经典的低能有效作用，以电流的形式表示。发现其表达式与先前提出的零温度异常的完美正压流体的流体动力作用相对应。这种方法还导致两个进一步的流体动力学作用分别与具有独立矢量和轴向电流的外尔费米子和狄拉克费米子相关。由于异常流入，这些行为具有四维和五维体边界项，被识别为所谓的海侵形式。这些是陈-西蒙斯形式的概括，涉及两个规范场：动力场和背景场。路径积分论证为流体动力学作用公式的几个成分提供了“微观”解释，这些成分对于纳入异常是必要的。\n\n它还阐明了从有效场理论到局部流体动力学描述所需的红外减少。这种简化是通过考虑流体动力学中熟悉的作用的受限变化来实现的，同时从五维海侵项得出四维运动方程。", "authors": [{"name": "Alexander G. Abanov"}, {"name": "Andrea Cappelli"}], "featured_authors": [{"name": "Alexander G. Abanov"}, {"name": "Andrea Cappelli"}], "author_count": 2}, {"id": "2606.18802", "category": "hep-th", "title": "Mutation and crossover of simplicial complexes", "abstract": "Color graphs and their subgraphs, referred to as bubble graphs, correspond bijectively to the simplicial complexes of pseudomanifolds and their subsimplices, respectively. In this paper, we introduce matrix representations for colored graphs and their associated bubble graphs. By using this correspondence, we define simplicial-complex matrices and subsimplex matrices that encode the simplicial complexes of pseudomanifolds and their subsimplices. Moreover, we formulate mutation and crossover operations on colored graphs. Through the established correspondence among simplicial complexes, colored graphs, and simplicial-complex matrices, we extend these operations to simplicial complexes and simplicial-complex matrices. We further implement an algorithm generating simplicial-complex matrices and a genetic algorithm performing mutation and crossover of them to produce pseudomanifolds exhibiting diverse topologies. In addition, we implement procedures for decomposing the generated simplicial-complex matrices into simplex matrices, reconstructing the simplicial complexes of the associated pseudomanifolds from this information, and computing geometric quantities such as the volume, circumcenter, and dual-simplex volume of each simplex.", "url": "https://arxiv.org/abs/2606.18802", "type": "理论", "summary": "彩色图及其子图（称为气泡图）分别双射对应于伪流形及其子单纯形的单纯复形。在本文中，我们介绍了彩色图及其相关气泡图的矩阵表示。通过使用这种对应关系，我们定义了对伪流形及其子单纯形的单纯复形进行编码的单纯复形矩阵和子单纯形矩阵。此外，我们在彩色图上制定了变异和交叉操作。通过单纯复形、彩色图和单纯复形矩阵之间建立的对应关系，我们将这些运算扩展到单纯复形和单纯复形矩阵。我们进一步实现了生成单纯复矩阵的算法和执行它们的变异和交叉的遗传算法，以产生表现出不同拓扑的伪流形。\n\n此外，我们还实现了将生成的单纯复矩阵分解为单纯形矩阵的过程，根据该信息重建相关伪流形的单纯复形，并计算几何量，例如每个单纯形的体积、外心和双单纯形体积。", "authors": [{"name": "Boyu Li"}, {"name": "Kohta Hatakeyama"}, {"name": "Matsuo Sato"}, {"name": "Yuji Sugimoto"}, {"name": "Gota Tanaka"}], "featured_authors": [{"name": "Boyu Li"}, {"name": "Kohta Hatakeyama"}, {"name": "Matsuo Sato"}, {"name": "Yuji Sugimoto"}, {"name": "Gota Tanaka"}], "author_count": 5}, {"id": "2606.18929", "category": "hep-th", "title": "Higher-Trace Operators and Cut Diagrammatics in the Conformal Block Expansion", "abstract": "We study four-point functions of identical scalar operators in conformal field theories with AdS duals in large-$N$ expansion. We analyze the appearance of higher-trace operators in theories dual to bulk $\\phi^3$ and $\\phi^4$ interactions, focusing on how these operators are required by crossing symmetry. We compute part of the OPE data associated with these operators. We also introduce a diagrammatic framework for organizing the different terms in the conformal block expansion within the large-$N$ expansion. This framework refines the use of crossing symmetry by allowing it to be applied to individual diagrammatic topologies, rather than only to the full correlator. It further separates different contributions to the OPE data by associating them with different cut diagrams. In this language, the emergence of higher-trace operators and their relation to lower-trace OPE data become more manifest.", "url": "https://arxiv.org/abs/2606.18929", "type": "理论", "summary": "我们研究了共形场论中相同标量算子的四点函数以及大 $N$ 展开中的 AdS 对偶。我们分析了理论中对偶 $\\phi^3$ 和 $\\phi^4$ 相互作用的高迹算子的出现，重点关注交叉对称性如何需要这些算子。我们计算与这些运算符相关的部分 OPE 数据。我们还引入了一个图解框架，用于在大 $N$ 扩展内组织共形块扩展中的不同项。该框架通过允许将交叉对称性应用于单独的图拓扑而不是仅应用于完整的相关器来改进交叉对称性的使用。它通过将 OPE 数据与不同的切割图关联起来，进一步区分对 OPE 数据的不同贡献。在这种语言中，较高迹算子的出现及其与较低迹 OPE 数据的关系变得更加明显。", "authors": [{"name": "Mohammad Reza Khansari"}], "featured_authors": [{"name": "Mohammad Reza Khansari"}], "author_count": 1}, {"id": "2606.19049", "category": "hep-th", "title": "Instability of 5D Gauss-Bonnet black branes", "abstract": "We show that Gauss-Bonnet black branes in five-dimensional anti-de Sitter gravity are unstable when the Gauss-Bonnet coupling falls outside the range allowed by the conformal collider bounds. The unstable modes and the boundary causality violating modes are connected by a phase rotation of complex boundary momentum.", "url": "https://arxiv.org/abs/2606.19049", "type": "理论", "summary": "我们证明，当高斯-邦内耦合落在共形对撞机边界允许的范围之外时，五维反德西特重力中的高斯-邦内黑膜是不稳定的。不稳定模式和边界因果关系破坏模式通过复杂边界动量的相位旋转连接。", "authors": [{"name": "Alex Buchel"}, {"name": "Raphael E. Hoult"}, {"name": "Pavel Kovtun"}], "featured_authors": [{"name": "Alex Buchel"}, {"name": "Raphael E. Hoult"}, {"name": "Pavel Kovtun"}], "author_count": 3}, {"id": "2606.19112", "category": "hep-th", "title": "Post-Carroll Algebra, Conformal Extensions, and Field Theories", "abstract": "By incorporating leading $c\\,$-dependent corrections to the Carroll transformations, w
