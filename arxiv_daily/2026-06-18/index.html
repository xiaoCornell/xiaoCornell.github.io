e introduce the ``post-Carroll transformations''. We demonstrate that these transformations are consistent with post-Carrollian mechanics \\cite{Najafizadeh:2025ksm}; furthermore, they give rise to the so-called ``post-Carroll algebra''. We show that, unlike the Carroll algebra, this new structure allows for a central charge in higher dimensions; we refer to it as the ``Carroll-Bargmann algebra''. To construct conformal extensions, we first build the conformal extension of the post-Carroll algebra and study field theories invariant under this symmetry. We then construct the conformal extension of the Carroll-Bargmann algebra, referred to as the ``Carroll-Schrödinger algebra'', and demonstrate that it precisely matches the symmetry algebra of the higher-dimensional Carroll-Schrödinger theory \\cite{Najafizadeh:2024imn}. Finally, we derive the general form of two-point functions in a post-Carrollian CFT, which in $1+1$ dimensions exhibits both electric and magnetic sectors, while in higher dimensions only the magnetic sector survives.", "url": "https://arxiv.org/abs/2606.19112", "type": "理论", "summary": "通过将领先的 $c\\,$ 相关修正合并到卡罗尔变换中，我们引入了“后卡罗尔变换”。我们证明这些变换与后卡罗尔力学一致\\cite{Najafizadeh:2025ksm};此外，它们还产生了所谓的“后卡罗尔代数”。我们证明，与卡罗尔代数不同，这种新结构允许更高维度的中心电荷；我们将其称为“卡罗尔-巴格曼代数”。为了构建共形扩展，我们首先构建后卡罗尔代数的共形扩展并研究这种对称性下的场论不变性。然后，我们构造了卡罗尔-巴格曼代数的共形扩展，称为“卡罗尔-薛定谔代数”，并证明它与高维卡罗尔-薛定谔理论的对称代数精确匹配\\cite{Najafizadeh:2024imn}。最后，我们推导了后卡罗尔 CFT 中两点函数的一般形式，其在 $1+1$ 维度中同时表现出电扇区和磁扇区，而在更高维度中只有磁扇区幸存。", "authors": [{"name": "Mojtaba Najafizade"}], "featured_authors": [{"name": "Mojtaba Najafizade"}], "author_count": 1}, {"id": "2606.19166", "category": "hep-th", "title": "Bubble wall velocity and nucleation rates in inverse holographic phase transitions", "abstract": "We study the dynamics of first-order inverse phase transitions (driven by superheating) at strong coupling, focusing on the top-down Witten-Sakai-Sugimoto model for holographic QCD. Two cases are considered: the deconfinement transition in the unflavored version of the model and a chiral symmetry-restoring transition occurring in the deconfined phase of the full theory. In both cases, we imagine driving the system into a metastable phase at high temperature, inducing the nucleation of bubbles of the stable phase. For both classes of transitions, we find the corresponding Euclidean bounce solutions and compute the bubble nucleation rates and the relevant transition parameters. For the deconfinement transition, the large jump in the number of degrees of freedom between the two phases suggests that the bubble wall velocity is parametrically small; we provide a rough estimate of it near the critical temperature. In the case of the chiral transition, instead, we compute the bubble wall velocity and the friction force exerted on the bubbles employing motivated ansatze and approximations for the steady-state configurations.", "url": "https://arxiv.org/abs/2606.19166", "type": "理论", "summary": "我们研究强耦合下的一阶逆相变（由过热驱动）的动力学，重点关注全息 QCD 的自上而下的 Witten-Sakai-Sugimoto 模型。考虑两种情况：模型的原始版本中的解禁转变和整个理论的解禁阶段中发生的手性对称性恢复转变。在这两种情况下，我们想象在高温下驱动系统进入亚稳定相，从而诱导稳定相气泡的成核。对于这两类转变，我们找到相应的欧几里得弹跳解并计算气泡成核率和相关转变参数。对于解约束转变，两个阶段之间自由度数的大幅跃升表明气泡壁速度在参数上很小；我们在临界温度附近提供了一个粗略的估计。相反，在手性转变的情况下，我们使用稳态构型的激励模拟和近似来计算气泡壁速度和施加在气泡上的摩擦力。", "authors": [{"name": "Francesco Bigazzi"}, {"name": "Aldo L. Cotrone"}, {"name": "Natalia Pinzani-Fokeeva"}, {"name": "Tommaso Trabocchi"}], "featured_authors": [{"name": "Francesco Bigazzi"}, {"name": "Aldo L. Cotrone"}, {"name": "Natalia Pinzani-Fokeeva"}, {"name": "Tommaso Trabocchi"}], "author_count": 4}, {"id": "2606.19173", "category": "hep-th", "title": "Higher-spin self-dual gravity from holomorphic planes in twistor space", "abstract": "We prove a `nonlinear graviton theorem' for higher-spin self-dual gravity. We consider small deformations of the complex structure of the non-projective twistor space that are bounded in a specified region near the origin and investigate the space $M_{HS}$ of holomorphically embedded complex planes $\\mathbb{C}^2$ that intersect the origin. We show that this space is an infinite dimensional complex manifold with a canonical projection onto a four-dimensional holomorphic self-dual spacetime $\\mathcal{M}$, and discuss the geometry induced on this new higher-spin space. Solutions of higher-spin self-dual gravity are then obtained by choosing an embedding of spacetime $\\mathcal{M}$ into higher-spin space $M_{HS}$, with higher-spin symmetries arising from the different choices of embedding. Integrability of the theory is manifested in the form of a Lax pair for the system that we present. We conjecture that chiral higher-spin gravity can similarly be realized by considering deformations that are unconstrained at the origin.", "url": "https://arxiv.org/abs/2606.19173", "type": "理论", "summary": "我们证明了高自旋自对偶引力的“非线性引力子定理”。我们考虑非射影扭量空间复杂结构的小变形，这些变形以原点附近的指定区域为界，并研究与原点相交的全纯嵌入复平面 $\\mathbb{C}^2$ 的空间 $M_{HS}$。我们证明这个空间是一个无限维复流形，具有到四维全纯自对偶时空 $\\mathcal{M}$ 的正则投影，并讨论了在这个新的高自旋空间上导出的几何。然后通过选择将时空 $\\mathcal{M}$ 嵌入到高自旋空间 $M_{HS}$ 中来获得高自旋自对偶引力的解，并且不同的嵌入选择会产生高自旋对称性。该理论的可积性以我们提出的系统的 Lax 对的形式表现出来。我们推测，通过考虑原点不受约束的变形，可以类似地实现手性高自旋引力。", "authors": [{"name": "Nicolas Boulanger"}, {"name": "Yannick Herfray"}, {"name": "Lionel Mason"}, {"name": "Noémie Parrini"}], "featured_authors": [{"name": "Nicolas Boulanger"}, {"name": "Yannick Herfray"}, {"name": "Lionel Mason"}, {"name": "Noémie Parrini"}], "author_count": 4}, {"id": "2606.19281", "category": "hep-th", "title": "Universal Closed Form for Dynamical Love Numbers of Black Holes", "abstract": "Black hole static Love numbers vanish, but their dynamical counterparts do not. We present the scheme-independent dynamical response $\\bar{F}_{\\ell,s}$ of a Schwarzschild black hole in closed form, to all orders, and for every spin $s$ and multipole $\\ell$. The result is $\\bar{F}_{\\ell,s}/4\\pi R_S^{2\\ell+1}=\\Phi_{\\ell,s}(\\bar{y})-\\tfrac12\\eta\\,\\Phi_{\\ell,s}'(\\bar{y})$ with $\\bar{y}=-\\tfrac12\\eta^2\\tau$ and $\\eta=i\\omega R_S$. Here $\\Phi_{\\ell,s}$ is simply the leading-log solution to the renormalization group equation, but lifting the running logarithm to $\\tau=\\log(R_S/R)-2\\sum_{k\\ge2}\\zeta_k\\,\\eta^{k-1}$ resums it to all orders. This tower of Riemann zeta values is the Newtonian phase in disguise: it originates from the same far-zone $\\Gamma(1-\\eta)$ that governs long-range scattering, and is universal across multipole and spin. Our result exhibits a factorization pinned to three ingredients: the hard matching coefficient at the horizon, the anomalous dimension in the near zone, and the dressed log in the far zone. Using shell effective field theory, we independently verify our formula for scalar, electromagnetic, and gravitational perturbations, reaching $\\mathcal O(G^{15})$.", "url": "https://arxiv.org/abs/2606.19281", "type": "理论", "summary": "黑洞静态洛夫数消失了，但动态洛夫数却没有。我们提出了封闭形式的史瓦西黑洞的与方案无关的动力学响应 $\\bar{F}_{\\ell,s}$，对于所有阶数，以及每个自旋 $s$ 和多极子 $\\ell$。结果是 $\\bar{F}_{\\ell,s}/4\\pi R_S^{2\\ell+1}=\\Phi_{\\ell,s}(\\bar{y})-\\tfrac12\\eta\\,\\Phi_{\\ell,s}'(\\bar{y})$，其中 $\\bar{y}=-\\tfrac12\\eta^2\\tau$ 和 $\\eta=i\\omega R_S$。这里 $\\Phi_{\\ell,s}$ 只是重整化群方程的前导对数解，但是将运行对数提升到 $\\tau=\\log(R_S/R)-2\\sum_{k\\ge2}\\zeta_k\\,\\eta^{k-1}$ 将其恢复为所有阶。这座黎曼 zeta 值塔是伪装的牛顿相位：它源自控制长程散射的同一个远区 $\\Gamma(1-\\eta)$，并且在多极和自旋中通用。我们的结果展示了由三个因素决定的分解：地平线处的硬匹配系数、近区中的异常尺寸以及远区中的修饰原木。利用壳有效场理论，我们独立验证了标量、电磁和引力扰动的公式，达到$\\mathcal O(G^{15})$。", "authors": [{"name": "Mikhail P. Solon"}], "featured_authors": [{"name": "Mikhail P. Solon"}], "author_count": 1}, {"id": "2606.19283", "category": "hep-th", "title": "A Dispersive Bootstrap for the Virasoro-Shapiro Amplitude", "abstract": "We study the closed-string tree-level Virasoro-Shapiro amplitude using the dispersive S-matrix bootstrap. For the ten-dimensional maximally supersymmetric four-point amplitude, we impose analyticity, crossing symmetry, partial-wave unitarity, and Regge boundedness. With the massless graviton pole kept explicitly, the resulting dispersion relations and crossing null constraints give numerical bounds on the leading low-energy coefficients normalized by the gravitational coupling. We then introduce a Virasoro-inspired ansatz, which becomes a set of nonlinear relations among Wilson coefficients and shrinks the allowed region toward the Virasoro-Shapiro trajectory. Finally, we study a gravity-pole-subtracted setup, where the regular part of the amplitude has a well-defined forward limit. In this stripped problem, the nonlinear constraints reduce the allowed region to a small island containing the Virasoro-Shapiro point, for which we provide an analytic bootstrap explanation.", "url": "https://arxiv.org/abs/2606.19283", "type": "理论", "summary": "我们使用色散 S 矩阵自举来研究闭弦树级 Virasoro-Shapiro 幅度。对于十维最大超对称四点振幅，我们施加解析性、交叉对称性、部分波幺正性和 Regge 有界性。在明确保留无质量引力子极的情况下，所得到的色散关系和交叉零约束给出了通过引力耦合归一化的主要低能量系数的数值界限。然后，我们引入一个受 Virasoro 启发的 ansatz，它成为威尔逊系数之间的一组非线性关系，并将允许的区域缩小到 Virasoro-Shapiro 轨迹。最后，我们研究了一种减去重力极的设置，其中振幅的常规部分具有明确定义的前向限制。在这个剥离问题中，非线性约束将允许区域减少到包含 Virasoro-Shapiro 点的小岛，我们为此提供了分析引导解释。", "authors": [{"name": "Yongjun Xu"}], "featured_authors": [{"name": "Yongjun Xu"}], "author_count": 1}, {"id": "2606.19321", "category": "hep-th", "title": "Spectral Functions of Lorentzian Quantum Gravity", "abstract": "We compute spectral functions of graviton modes in Lorentzian quantum gravity, interpolating between classical general relativity and an asymptotically safe ultraviolet fixed point. Using functional renormalisation adapted for theories in Lorentzian signature, and enhanced by new symmetry conditions to account for underlying Ward identities, we derive and solve flow equations directly for the Källén-Lehmann representation of propagators. Consistent results are found for several sets of renormalisation conditions yielding normalisable spectral functions for the graviton and the scalar graviton mode, in agreement with effective theory in the infrared. We further calculate the full quantum effective action to quadratic order in curvature, extract graviton-induced form factors, and discuss implications for unitarity of quantum gravity.", "url": "https://arxiv.org/abs/2606.19321", "type": "理论", "summary": "我们计算洛伦兹量子引力中引力子模式的谱函数，在经典广义相对论和渐近安全紫外线不动点之间进行插值。使用适用于洛伦兹签名理论的函数重整化，并通过新的对称条件进行增强以解释潜在的 Ward 恒等式，我们直接推导并求解传播子的 Källén-Lehmann 表示的流方程。对于产生引力子和标量引力子模式的可归一化光谱函数的几组重整化条件，发现了一致的结果，与红外中的有效理论一致。我们进一步计算对曲率二次阶的完整量子有效作用，提取引力子引起的形状因子，并讨论对量子引力幺正性的影响。", "authors": [{"name": "Gabriel Assant"}, {"name": "Daniel F. Litim"}, {"name": "Manuel Reichert"}], "featured_authors": [{"name": "Gabriel Assant"}, {"name": "Daniel F. Litim"}, {"name": "Manuel Reichert"}], "author_count": 3}, {"id": "2606.18542", "category": "math-ph", "title": "Elastic Surface Instability as a Topological Phase Transition", "abstract": "The macroscopic instability of soft materials undergoing extreme deformations is traditionally viewed as a pure structural or mechanical failure. Driven by the quest to uncover universal principles across disparate physical systems, we bridge two vibrant yet seemingly disconnected research frontiers: macroscopic finite-strain solid mechanics and quantum-like topological physics. Here, we demonstrate that the classical elastic surface instability of a deformed hyperelastic manifold is not merely a mechanical bifurcation, but fundamentally a topological phase transition. By incorporating Lie group metric evolution into a generalized Stroh formalism, we map the highly nonlinear geometric frustration onto an algebraic surface impedance matrix $\\mathbf{H}$. For a semi-infinite hyperelastic half-space under finite compression, we analytically map the system to a one-dimensional Dirac Hamiltonian, where the macroscopic mechanical stretch acts as a tunable knob for the Dirac mass. We reveal that the onset of surface wrinkles marks a topological transition from a trivial to a non-trivial phase characterized by a quantized step in the winding number, naturally giving rise to a robust, macroscopically localized zero-energy edge state. This fundamental linkage unifies macroscopic symmetry breaking with the topological paradigm, opening a new theoretical pathway for programmable smart soft matter.", "url": "https://arxiv.org/abs/2606.18542", "type": "理论", "summary": "经历极端变形的软材料的宏观不稳定性传统上被视为纯粹的结构或机械故障。在探索不同物理系统中普遍原理的推动下，我们架起了两个充满活力但看似互不相关的研究前沿：宏观有限应变固体力学和类量子拓扑物理学。在这里，我们证明变形超弹性流形的经典弹性表面不稳定性不仅仅是机械分岔，而且从根本上来说是拓扑相变。通过将李群度量演化结合到广义的斯特罗形式主义中，我们将高度非线性的几何挫折映射到代数表面阻抗矩阵 $\\mathbf{H}$ 上。对于有限压缩下的半无限超弹性半空间，我们分析地将系统映射到一维狄拉克哈密顿量，其中宏观机械拉伸充当狄拉克质量的可调旋钮。\n\n我们发现，表面皱纹的出现标志着从平凡相到非平凡相的拓扑转变，其特征是缠绕数的量子化步骤，自然产生鲁棒的、宏观局部的零能量边缘态。这种基本联系将宏观对称性破坏与拓扑范式统一起来，为可编程智能软物质开辟了一条新的理论途径。", "authors": [{"name": "Yu-Xin Xie"}], "featured_authors": [{"name": "Yu-Xin Xie"}], "author_count": 1}, {"id": "2606.18635", "category": "math-ph", "title": "Non-Perturbative Closure of the 3D $ϕ^4$ Field Theory via Operator-Valued Stroh Formalism and Barnett-Lothe Invariants", "abstract": "We establish a rigorous non-perturbative closure framework for the three-dimensional (3D) $\\phi^4$ scalar field theory near criticality, bypassing the long-standing limitations of perturbative Feynman diagrammatic expansions. By slicing the 3D Euclidean space along a spatial axis, the exact dressed theory is mapped onto a matrix operator evolution governed by the infinite-dimensional symplectic Lie algebra $\\mathfrak{sp}(\\infty)$. We generalize the classical Stroh formalism and Barnett-Lothe integral invariants from anisotropic elasticity to the quantum field Hilbert space. Crucially, we prove that the dressed operator-valued Barnett-Lothe tensors satisfy the algebraic identity $\\hat{\\mathbf{S}}^2 + \\hat{\\mathbf{H}}\\hat{\\mathbf{L}} = -\\hat{\\mathbf{I}}$ exactly and non-perturbatively, regardless of the coupling strength. By coupling this symplectic invariance with the Källén-Lehmann spectral representation and the Schwinger-Dyson equations, a novel \"Symplectic Bootstrap\" master spectral integral equation is formulated. The framework exhibits exact dimensional reduction, naturally degenerating to the Onsager exact solution ($\\eta = 1/4$) in 2D and the Gaussian triviality limit ($\\eta = 0$) in 4D. Solving the transcendental bootstrap equation under the strong-coupling conformal fixed point yields the non-perturbative anomalous dimension $\\eta \\approx 0.0363$, matching the state-of-the-art conformal bootstrap numerical limits. Finally, a profound holographic duality between the statistical state equations and the post-buckling bifurcation of fluctuating soft matters is discussed.", "url": "https://arxiv.org/abs/2606.18635", "type": "理论", "summary": "我们为接近临界点的三维（3D）$\\phi^4$标量场理论建立了严格的非微扰闭合框架，绕过了微扰费曼图解展开的长期限制。通过沿着空间轴对 3D 欧几里得空间进行切片，精确的修饰理论被映射到由无限维辛李代数 $\\mathfrak{sp}(\\infty)$ 控制的矩阵算子演化。我们将经典的 Stroh 形式主义和 Barnett-Lothe 积分不变量从各向异性弹性推广到量子场希尔伯特空间。至关重要的是，我们证明了修饰后的算子值 Barnett-Lothe 张量准确且非扰动地满足代数恒等式 $\\hat{\\mathbf{S}}^2 + \\hat{\\mathbf{H}}\\hat{\\mathbf{L}} = -\\hat{\\mathbf{I}}$，无论耦合强度如何。通过将这种辛不变性与 Källén-Lehmann 谱表示和 Schwinger-Dyson 方程相结合，建立了一个新颖的“辛 Bootstrap”主谱积分方程。\n\n该框架表现出精确的降维，自然退化为 2D 中的 Onsager 精确解 ($\\eta = 1/4$) 和 4D 中的高斯平凡极限 ($\\eta = 0$)。在强耦合共形不动点下求解超越自举方程，得到非微扰反常维数 $\\eta \\approx 0.0363$，与最先进的共形自举数值极限相匹配。最后，讨论了统计状态方程与脉动软物质的后屈曲分岔之间的深刻全息对偶性。", "authors": [{"name": "Yu-Xin Xie"}], "featured_authors": [{"name": "Yu-Xin Xie"}], "author_count": 1}, {"id": "2606.18752", "category": "math-ph", "title": "Self-averaging of replica overlaps in the random field Edwards-Anderson model", "abstract": "The self-averaging of the replica overlap is proven in the Edwards-Anderson (EA) model under random field almost everywhere in the coupling constant space in any dimension. The EA order parameter is represented in terms of the derivative of the free energy density with respect to the random field strength, regardless of boundary conditions. Tasaki's correlation inequality for finite-dimensional spin glass models shows that the expectation of the squared replica overlap is bounded by the squared EA order parameter. These simple evaluations enable us to prove that the variance of the replica overlap vanishes in the infinite-volume limit. The self-averaging of the replica bond overlap is proven also in the EA model with Gaussian exchange interaction without random field. Short-range spin glass models have been shown to behave differently from mean-field spin glass models with RSB phase.", "url": "https://arxiv.org/abs/2606.18752", "type": "理论", "summary": "在爱德华兹-安德森（EA）模型中，在任何维度的耦合常数空间中几乎无处不在的随机场下，复制品重叠的自平均得到了证明。 EA 阶参数以自由能密度相对于随机场强度的导数表示，与边界条件无关。有限维自旋玻璃模型的 Tasaki 相关不等式表明，平方副本重叠的期望受到平方 EA 阶次参数的限制。这些简单的评估使我们能够证明副本重叠的方差在无限体积限制中消失。复制键重叠的自平均在没有随机场的高斯交换相互作用的 EA 模型中也得到了证明。短程自旋玻璃模型已被证明与具有 RSB 相的平均场自旋玻璃模型表现不同。", "authors": [{"name": "C. Itoi"}, {"name": "Y. Sakamoto"}], "featured_authors": [{"name": "C. Itoi"}, {"name": "Y. Sakamoto"}], "author_count": 2}, {"id": "2606.18983", "category": "math-ph", "title": "A finite element-based eigenvalue analysis for predicting thermal runaway in Li-ion battery packs", "abstract": "Thermal runaway remains a critical safety concern in battery systems and other thermally active devices, necessitating reliable methods for predicting the conditions under which thermal runaway may occur. In this work, we develop a finite element framework for assessing thermal stability in systems undergoing transient heat conduction with temperature-dependent internal heat generation. The formulation leads naturally to a generalized eigenvalue problem, wherein the sign of the smallest eigenvalue provides a direct criterion for determining the onset of thermal runaway. This approach enables direct prediction of thermal runaway thresholds in geometrically complicated problems without requiring computationally expensive transient analysis. The proposed methodology is validated through comparison with analytical solutions for a cylindrical Li-ion cell, as well as with a pack of cylindrical cells, demonstrating excellent agreement in both cases. Based on this model, the influence of material properties, boundary conditions, geometric parameters, and spatially varying heat generation on stability limits is examined. A key advantage of this formulation is its effectiveness even for complex geometries where analytical methods become impractical. By providing a systematic and computationally efficient means to identify stability thresholds, the present work offers a practical tool for the thermal design and safety assessment of battery systems.", "url": "https://arxiv.org/abs/2606.18983", "type": "理论", "summary": "热失控仍然是电池系统和其他热活性设备中的一个关键安全问题，因此需要可靠的方法来预测可能发生热失控的条件。在这项工作中，我们开发了一个有限元框架，用于评估经历瞬态热传导并产生与温度相关的内部热量的系统的热稳定性。该公式自然地导致广义特征值问题，其中最小特征值的符号提供了确定热失控开始的直接标准。这种方法能够直接预测几何复杂问题中的热失控阈值，而不需要计算成本高昂的瞬态分析。通过与圆柱形锂离子电池以及圆柱形电池组的分析解决方案进行比较，对所提出的方法进行了验证，在两种情况下都表现出良好的一致性。基于该模型，研究了材料特性、边界条件、几何参数和空间变化的热量产生对稳定性极限的影响。\n\n该公式的一个关键优点是，即使对于分析方法变得不切实际的复杂几何形状，它仍然有效。通过提供系统且计算有效的方法来确定稳定性阈值，本工作为电池系统的热设计和安全评估提供了实用工具。", "authors": [{"name": "Shailendra Rahi"}, {"name": "Vinay Dhakal"}, {"name": "Ankur Jain"}, {"name": "Manish Agrawal"}], "featured_authors": [{"name": "Shailendra Rahi"}, {"name": "Vinay Dhakal"}, {"name": "Ankur Jain"}, {"name": "Manish Agrawal"}], "author_count": 4}, {"id": "2606.19014", "category": "math-ph", "title": "A quantum-like model of political consensus via non self-adjoint Hamiltonians", "abstract": "We discuss here how non self-adjoint Hamiltonians, and their related Heisenberg-like dynamics, can be used to model a political system consisting in a coalition $\\C$ of different parties (forming a government) and by their (original) supporters $\\Sc$. Our aim is to model how the opinion of these supporters changes depending on the efficiency, competence and coherence of the coalition $\\C$, as these are perceived by $\\Sc$ during their action while governing. After a rather general introduction we propose three specific models, and we describe and comment the dynamical behaviour of the { full} system, $\\Sc\\cup\\C$. The role of the so-called {\\em balanced Hamiltonians}, recently introduced by the authors in connection with integrals of motion, is discussed in details.", "url": "https://arxiv.org/abs/2606.19014", "type": "理论", "summary": "我们在这里讨论如何使用非自伴哈密顿主义者及其相关的海森堡式动力学来模拟一个由不同政党（形成政府）及其（原始）支持者 $\\Sc$ 组成的联盟 $\\C$ 组成的政治体系。我们的目标是模拟这些支持者的意见如何根据联盟$\\C$的效率、能力和一致性而变化，因为$\\Sc$在执政期间的行动中感知到这些。经过相当一般性的介绍后，我们提出了三个具体模型，并描述和评论了 { full} 系统 $\\Sc\\cup\\C$ 的动态行为。作者最近在运动积分方面引入了所谓的{\\em平衡哈密顿量}，详细讨论了它的作用。", "authors": [{"name": "Fabio Bagarello"}, {"name": "Gloria Liarda"}], "featured_authors": [{"name": "Fabio Bagarello"}, {"name": "Gloria Liarda"}], "author_count": 2}, {"id": "2606.19137", "category": "math-ph", "title": "Bulk-boundary correspondence of (1+1)D symmetric gapped phases", "abstract": "We develop an operator-algebraic framework for boundary conditions and bulk-boundary correspondence in one-dimensional gapped phases with categorical symmetry. Working directly in the thermodynamic limit, we construct half-infinite fusion spin chains and commuting-projector boundary Hamiltonians from a unitary fusion category $\\mathcal{C}$, an indecomposable semisimple right $\\mathcal{C}$-module category $\\mathcal{M}$, a Q-system $Q\\in\\mathcal{C}$ specifying the bulk phase, and a right $Q$-module $K\\in\\mathcal{M}_{Q}$, regarded as an object of $\\mathcal{M}_{Q}^{\\mathrm{op}}$, specifying the boundary. We prove that these Hamiltonians have unique ground states and that the resulting realization functor $\\mathcal{M}_{Q}^{\\mathrm{op}}\\to\\mathrm{BCond}$ is an equivalence, so simple boundary conditions are classified by simple objects of $\\mathcal{M}_{Q}$ and general boundary conditions by their finite direct sums. We also give a microscopic formulation of the boundary symmetry topological field theory using DHR bimodules of the boundary quasi-local algebra. For a half-infinite fusion spin chain, the boundary DHR category is monoidally equivalent to $(\\mathcal{C}_{\\mathcal{M}}^{\\vee})^{\\mathrm{rev}}$, and the canonical action of the bulk DHR category on it agrees with the categorical action of $Z_1(\\mathcal{C}^{\\mathrm{rev}})$. Finally, we identify the action of the boundary DHR category on boundary conditions with the categorical action of $(\\mathcal{C}_{\\mathcal{M}}^{\\vee})^{\\mathrm{rev}}$ on $\\mathcal{M}_{Q}^{\\mathrm{op}}$. This yields a one-dimensional bulk-boundary correspondence: the enriched monoidal category describing the bulk is the enriched center of the enriched category describing the boundary.", "url": "https://arxiv.org/abs/2606.19137", "type": "理论", "summary": "我们开发了一个算子代数框架，用于具有分类对称性的一维间隙相中的边界条件和体边界对应。直接在热力学极限下工作，我们从酉聚变类别 $\\mathcal{C}$、不可分解的半简单右 $\\mathcal{C}$ 模块类别 $\\mathcal{M}$、指定体相的 Q 系统 $Q\\in\\mathcal{C}$ 和右 $Q$ 模块构建半无限聚变自旋链和通勤投影边界哈密顿量$K\\in\\mathcal{M}_{Q}$，视为$\\mathcal{M}_{Q}^{\\mathrm{op}}$的对象，指定边界。我们证明这些哈密顿量具有唯一的基态，并且所得的实现函子 $\\mathcal{M}_{Q}^{\\mathrm{op}}\\to\\mathrm{BCond}$ 是等价的，因此简单边界条件可以通过 $\\mathcal{M}_{Q}$ 的简单对象进行分类，而一般边界条件可以通过它们的有限直和进行分类。我们还使用边界准局部代数的 DHR 双模给出了边界对称拓扑场论的微观表述。\n\n对于半无限融合自旋链，边界 DHR 类别幺半群等价于 $(\\mathcal{C}_{\\mathcal{M}}^{\\vee})^{\\mathrm{rev}}$，并且体 DHR 类别对其的规范作用与 $Z_1(\\mathcal{C}^{\\mathrm{rev}})$ 的分类作用一致。最后，我们通过 $(\\mathcal{C}_{\\mathcal{M}}^{\\vee})^{\\mathrm{rev}}$ 对 $\\mathcal{M}_{Q}^{\\mathrm{op}}$ 的分类作用来识别边界 DHR 类别对边界条件的作用。这产生一维体边界对应：描述体的丰富的幺半群类别是描述边界的丰富的类别的丰富的中心。", "authors": [{"name": "Yizhou Ma"}, {"name": "Gen Yue"}, {"name": "Tian Lan"}], "featured_authors": [{"name": "Yizhou Ma"}, {"name": "Gen Yue"}, {"name": "Tian Lan"}], "author_count": 3}, {"id": "2606.19141", "category": "math-ph", "title": "Topology of Bloch Bands from Cauchy Data", "abstract": "In a previous work, the topology of inversion-symmetric one-dimensional periodic media was characterized through the pole-zero pattern of an impedance-like function associated with Bloch waves. This construction reproduces the Berry--Zak invariant and provides a criterion for topological interface states. In the present work, we give a geometric interpretation of this formalism. We show that poles and zeros arise naturally from the action of inversion symmetry on the projectivized space of Cauchy data. The corresponding Dirichlet and Neumann states are identified with the two fixed points of the induced $\\mathbb Z_2$ action on the Riemann sphere. The key observation is that Bloch eigenvectors are naturally constructed on the universal covering of the Brillouin circle. The topology of the associated Real eigenline bundle is encoded in the action of the deck transformation group on lifted eigenvectors. This action is described by a monodromy sign $\\rho\\in\\{\\pm1\\}$, determined by the inversion representations carried by the band at the fixed points of the Brillouin zone. We show that this monodromy defines a natural rank-one local system over the Brillouin circle. The corresponding Real line bundle is classified by its first Stiefel--Whitney class, which coincides with the associated $\\mathbb Z_2$ pole-zero invariant. This establishes a geometric connection between the pole-zero formalism, Berry--Zak phases, Real bundles and local coefficient systems.", "url": "https://arxiv.org/abs/2606.19141", "type": "理论", "summary": "在之前的工作中，反演对称一维周期性介质的拓扑结构是通过与布洛赫波相关的类阻抗函数的零极点模式来表征的。这种结构再现了 Berry-Zak 不变量，并提供了拓扑界面态的标准。在目前的工作中，我们给出了这种形式主义的几何解释。我们证明，极点和零点是由柯西数据投影空间上的反演对称性作用自然产生的。相应的狄利克雷和诺依曼状态由黎曼球面上感应 $\\mathbb Z_2$ 作用的两个不动点来标识。关键的观察结果是布洛赫特征向量自然地构建在布里渊圆的通用覆盖上。相关实数特征线丛的拓扑在甲板变换组对提升特征向量的作用中被编码。该作用由单峰符号 $\\rho\\in\\{\\pm1\\}$ 描述，由布里渊区固定点处的能带所携带的反演表示确定。我们表明，这种单一性定义了布里渊圈上的自然一级局部系统。\n\n相应的实数线丛按其第一个 Stiefel--Whitney 类进行分类，该类与相关的 $\\mathbb Z_2$ 零极点不变量一致。这在零极点形式、Berry-Zak 相、实丛和局部系数系统之间建立了几何联系。", "authors": [{"name": "Didier Felbacq"}, {"name": "Emmanuel Rousseau"}], "featured_authors": [{"name": "Didier Felbacq"}, {"name": "Emmanuel Rousseau"}], "author_count": 2}, {"id": "2606.18339", "category": "quant-ph", "title": "Ground state preparation of random all-to-all Hamiltonians using ADAPT-VQE", "abstract": "The ground state of random Hamiltonians with all-to-all interactions such as the quantum Sherrington-Kirkpatrick (SK) model and the Sachdev-Ye-Kitaev (SYK) model follow volume-law entanglement and are expected to be hard to model using tensor networks. In recent years, some progress has been made to push the limit of classical methods using neural quantum states. However, it remains an open question whether there exist quantum algorithms that could offer a quantum advantage over the state-of-the-art classical methods in simulating random Hamiltonians. In this work, we show that one such algorithm, TETRIS-ADAPT-VQE, can construct accurate ground states for dense and sparse SYK models containing up to $N=20$ Majorana fermions achieving fidelities $\\geq 99.3\\%$ and for the quantum SK model with up to $L=18$ sites achieving fidelities $\\geq 99.9998\\%$. We find that while the preparation of ground states is efficient (in terms of operator pool size and circuit depth) for the SK model, it is not efficient for either dense or moderately sparse SYK models.", "url": "https://arxiv.org/abs/2606.18339", "type": "理论+数值", "summary": "具有全对全相互作用的随机哈密顿量的基态，例如量子 Sherrington-Kirkpatrick (SK) 模型和 Sachdev-Ye-Kitaev (SYK) 模型遵循体积定律纠缠，预计很难使用张量网络进行建模。近年来，在突破使用神经量子态的经典方法的极限方面取得了一些进展。然而，是否存在量子算法在模拟随机哈密顿量方面比最先进的经典方法具有量子优势仍然是一个悬而未决的问题。在这项工作中，我们证明了这样一种算法，TETRIS-ADAPT-VQE，可以为包含高达 $N=20$ 马约拉纳费米子的密集和稀疏 SYK 模型构建精确的基态，实现保真度 $\\geq 99.3\\%$，并为最多 $L=18$ 位点实现保真度 $\\geq 99.9998\\%$ 的量子 SK 模型构建准确的基态。我们发现，虽然基态的准备对于 SK 模型来说是有效的（就算子池大小和电路深度而言），但对于密集或中等稀疏的 SYK 模型来说效率不高。", "authors": [{"name": "Sabhyata Gupta"}, {"name": "Bharath Sambasivam"}, {"name": "Sophia E. Economou"}, {"name": "Edwin Barnes"}, {"name": "Alexander F. Kemper"}, {"name": "Raghav G. Jha"}], "featured_authors": [{"name": "Sabhyata Gupta"}, {"name": "Bharath Sambasivam"}, {"name": "Sophia E. Economou"}, {"name": "Edwin Barnes"}, {"name": "Alexander F. Kemper"}, {"name": "Raghav G. Jha"}], "author_count": 6}, {"id": "2606.18340", "category": "quant-ph", "title": "Chaos from quantum bath fluctuations", "abstract": "The effect of a large environment on a finite-size quantum mechanical system is two-fold: It brings dissipation, but also fluctuations of thermal and quantum origin. While dissipation tends to stabilize the dynamics, we question if and how environmental quantum fluctuations can generate chaos in an otherwise classically non-chaotic system. We work out a paradigmatic model of quantum optics: the dissipative Dicke model, where a large spin interacts with a dissipative harmonic mode. We dial in the classical/quantum correspondence by working in the semiclassical regime at large but finite spin. We demonstrate that, starting from a classically regular phase space in the superradiant regime, quantum noise can generate a strange attractor with fractal dimension and a positive Lyapunov exponent. We unveil the deep connection with shear-induced chaos that was recently developed in the mathematical community.", "url": "https://arxiv.org/abs/2606.18340", "type": "理论", "summary": "大环境对有限尺寸量子力学系统的影响是双重的：它带来耗散，但也带来热和量子起源的波动。虽然耗散往往会稳定动力学，但我们质疑环境量子涨落是否以及如何在其他经典非混沌系统中产生混沌。我们提出了量子光学的范例模型：耗散迪克模型，其中大自旋与耗散谐波模式相互作用。我们通过在大但有限自旋的半经典状态下工作来拨动经典/量子对应关系。我们证明，从超辐射区域中的经典规则相空间开始，量子噪声可以产生具有分形维数和正李雅普诺夫指数的奇怪吸引子。我们揭示了数学界最近发展起来的与剪切引起的混沌的深层联系。", "authors": [{"name": "Ilan Baud"}, {"name": "Tamoghna Ray"}, {"name": "Mahaveer Prasad"}, {"name": "Manas Kulkarni"}, {"name": "Camille Aron"}], "featured_authors": [{"name": "Ilan Baud"}, {"name": "Tamoghna Ray"}, {"name": "Mahaveer Prasad"}, {"name": "Manas Kulkarni"}, {"name": "Camille Aron"}], "author_count": 5}, {"id": "2606.18348", "category": "quant-ph", "title": "Steady-state spectral kissing and dissipative phase transitions", "abstract": "Spectral kissing, recently realized in a Kerr parametric oscillator (KPO), refers to the merging of pairs of energy levels and arises as a manifestation of an excited-state quantum phase transition (ESQPT). Here, we show that this phenomenon has a dissipative counterpart encoded in the spectrum of the steady-state density matrix. Using a dissipative KPO as a representative example, we demonstrate that, in the weak-dissipation regime, the eigenvalues of the steady-state density matrix organize into quasi-degenerate pairs that mirror the spectral kissing of the corresponding closed system. As the dissipation strength increases, this pairing gradually disappears. By analyzing the classical limit of the system, we derive analytical expressions for the critical lines governing both the onset of steady-state spectral kissing and its disappearance at a dissipative phase transition.", "url": "https://arxiv.org/abs/2606.18348", "type": "理论", "summary": "最近在克尔参量振荡器 (KPO) 中实现的光谱接吻是指能级对的合并，并作为激发态量子相变 (ESQPT) 的表现而出现。在这里，我们表明这种现象在稳态密度矩阵的频谱中具有编码的耗散对应物。使用耗散 KPO 作为代表性例子，我们证明，在弱耗散状态下，稳态密度矩阵的特征值组织成准简并对，反映了相应封闭系统的光谱接吻。随着耗散强度的增加，这种配对逐渐消失。通过分析系统的经典极限，我们得出了控制稳态谱接吻的开始及其在耗散相变时消失的临界线的解析表达式。", "authors": [{"name": "Devesh Karthik"}, {"name": "Jorge Chávez-Carlos"}, {"name": "Edson M. Signor"}, {"name": "Victor S. Batista"}, {"name": "Francisco Pérez-Bernal"}, {"name": "Lea F. Santos"}], "featured_authors": [{"name": "Devesh Karthik"}, {"name": "Jorge Chávez-Carlos"}, {"name": "Edson M. Signor"}, {"name": "Victor S. Batista"}, {"name": "Francisco Pérez-Bernal"}, {"name": "Lea F. Santos"}], "author_count": 6}, {"id": "2606.18361", "category": "quant-ph", "title": "Universal entanglement probes of topological order and locally-achiral manifolds", "abstract": "We consider the problem of identifying a topological order based on bulk entanglement of the ground-state wavefunction. Previous work showed that some universal information can be extracted from multi-entropy measures, a class of multipartite entanglement measures obtained by applying permutation operators exchanging the degrees of freedom between different replicas of the wavefunction. It remains an open question to what extent such entanglement measures can be used to extract any universal information from the ground state. Here we show that the topological partition function $Z(M)$ of a manifold $M$ can be extracted provided that $M$ satisfies a topological condition which we term ``local achirality\". We show that locally-achiral manifolds can be used to extract universal properties of 2+1d topological phases that go beyond the $S$ and $T$ matrices. As a first step towards classifying locally-achiral manifolds, we show that, in four dimensions, such manifolds have vanishing Pontryagin number. We relate this property to the existence of beyond-cohomology time-reversal symmetry protected topological order (T-SPT) in four dimensions. Finally, we present an entanglement measure that detects this nontrivial T-SPT.", "url": "https://arxiv.org/abs/2606.18361", "type": "理论", "summary": "我们考虑基于基态波函数的体纠缠来识别拓扑顺序的问题。先前的工作表明，可以从多熵度量中提取一些通用信息，多熵度量是通过应用置换算子在波函数的不同副本之间交换自由度而获得的一类多部分纠缠度量。这种纠缠措施可以在多大程度上用于从基态提取任何通用信息仍然是一个悬而未决的问题。在这里，我们证明，如果 $M$ 满足我们称之为“局部非手性”的拓扑条件，则可以提取流形 $M$ 的拓扑配分函数 $Z(M)$。我们证明，局部非手性流形可用于提取超出 $S$ 和 $T$ 矩阵的 2+1d 拓扑相的通用属性。作为分类局部非手性流形的第一步，我们证明，在四个维度中，此类流形已经消失我们将此属性与四个维度中超上同调时间反转对称保护拓扑序 (T-SPT) 的存在联系起来。\n\n最后，我们提出了一种纠缠措施来检测这种重要的 T-SPT。", "authors": [{"name": "Yarden Sheffer"}], "featured_authors": [{"name": "Yarden Sheffer"}], "author_count": 1}, {"id": "2606.18415", "category": "quant-ph", "title": "Entanglement response to Temperature in Interacting Two-Qubit Thermal States", "abstract": "We investigate the response of entanglement to temperature variations in interacting two-qubit thermal states. For a general two-qubit interaction Hamiltonian, we derive exact expressions for the thermal concurrence, its first and second derivatives with respect to inverse temperature, and the thermal quantum Fisher information. We show that the rate of change of thermal entanglement is bounded by the thermal quantum Fisher information. We further derive a bound relating entanglement curvature and thermal quantum Fisher information, and show that temperature uncertainty induces a loss of entanglement bounded by the same quantity that determines thermometric sensitivity. These results establish thermal quantum Fisher information as a fundamental constraint on the response and robustness of entanglement in interacting two-qubit thermal states.", "url": "https://arxiv.org/abs/2606.18415", "type": "理论", "summary": "我们研究了相互作用的两个量子位热态中纠缠对温度变化的响应。对于一般的双量子位相互作用哈密顿量，我们推导出热并发的精确表达式、其关于逆温度的一阶和二阶导数以及热量子费希尔信息。我们证明热纠缠的变化率受到热量子费希尔信息的限制。我们进一步推导了一个与纠缠曲率和热量子费希尔信息相关的界限，并表明温度不确定性会导致纠缠的损失，该损失的界限与决定测温灵敏度的量相同。这些结果将热量子费希尔信息确立为相互作用的两个量子位热态中纠缠响应和鲁棒性的基本约束。", "authors": [{"name": "Zain H. Saleem"}, {"name": "Iram Saleem"}], "featured_authors": [{"name": "Zain H. Saleem"}, {"name": "Iram Saleem"}], "author_count": 2}, {"id": "2606.18428", "category": "quant-ph", "title": "Quantum algorithm for Valiant-Vazirani reduction", "abstract": "There is growing interest in extensions of the standard model of gate-based quantum computation to include auxiliary degrees of freedom evolving according to a nonlinear Schrödinger equation. By reducing the Boolean satisfiability problem SAT to quantum state discrimination, Abrams and Lloyd argued that the right type of nonlinearity can be used to solve {\\sf NP} and \\#{\\sf P} problems in polynomial time, at least in an idealized noise-free limit. For practical implementation, however, we are restricted to simulated and emergent nonlinearities, such as that appearing in mean field models for ultracold atoms and similar ensembles. A prominent example is the torsion model, which arises in two-component Bose-Einstein condensates and spin models with all-to-all Ising interaction. But torsion-based state discrimination appears to fall short of solving SAT. Here we close this gap by constructing the filtered oracle of the Valiant-Vazirani theorem, providing a randomized polynomial-time reduction from SAT to UNIQUE SAT, a promise problem where there is at most 1 satisfying assignment. In the noise free limit, the UNIQUE SAT problem can be olved in polynomial time using torsion nonlinearity. Quantum Valiant-Vazirani reduction is no faster than the efficient classical version, but a fault-tolerant implementation coupled to a nonlinear quantum coprocessor simulating torsion would enable polynomial time solution to {\\sf NP} (but not \\#{\\sf P}) problems.", "url": "https://arxiv.org/abs/2606.18428", "type": "理论+数值", "summary": "人们对基于门的量子计算标准模型的扩展越来越感兴趣，以包括根据非线性薛定谔方程演化的辅助自由度。通过将布尔可满足性问题 SAT 简化为量子态判别，艾布拉姆斯和劳埃德认为，正确类型的非线性可用于在多项式时间内解决 {\\sf NP} 和 \\#{\\sf P} 问题，至少在理想化的无噪声极限内。然而，在实际实现中，我们仅限于模拟和突现的非线性，例如出现在超冷原子和类似系综的平均场模型中的非线性。一个突出的例子是扭转模型，它出现在二元玻色-爱因斯坦凝聚体和具有所有伊辛相互作用的自旋模型中。但基于扭力的状态歧视似乎无法解决 SAT 问题。在这里，我们通过构建 Valiant-Vazirani 定理的过滤预言来弥补这一差距，提供从 SAT 到 UNIQUE SAT 的随机多项式时间减少，这是一个最多有 1 个令人满意的分配的承诺问题。\n\n在无噪声限制下，UNIQUE SAT 问题可以使用扭转非线性在多项式时间内求解。 Quantum Valiant-Vazirani 简化并不比高效的经典版本快，但与模拟扭转的非线性量子协处理器耦合的容错实现将能够对 {\\sf NP} （但不是 \\#{\\sf P}）问题进行多项式时间解。", "authors": [{"name": "Patrick Kelly"}, {"name": "Victoria S. Ordonez"}, {"name": "Michael R. Geller"}], "featured_authors": [{"name": "Patrick Kelly"}, {"name": "Victoria S. Ordonez"}, {"name": "Michael R. Geller"}], "author_count": 3}, {"id": "2606.18470", "category": "quant-ph", "title": "Exact propagating Dirac wave packets in an attractive Coulomb-like potential", "abstract": "We construct exact, positive-energy, normalizable wave-packet solutions of the Dirac equation in the axisymmetric potential $V=-\\,v_0/\\rho$ -- to our knowledge, the first such solutions in any external potential. Remarkably, one family comprises only elementary functions whose longitudinal profiles reproduce the free-Schrödinger Hermite--Gauss wave packets in the nonrelativistic limit. All packets share two striking features: (i) a probability density that is pointwise decoupled from spin orientation -- despite the inherent spin-orbit coupling of the Dirac equation -- and (ii) a complete freezing of their time evolution at the critical coupling $v_0\\to\\hbar c/2$. We also present a simple scheme that maps solutions of the 2D Helmholtz equation to further exact Dirac wave packets.", "url": "https://arxiv.org/abs/2606.18470", "type": "理论", "summary": "我们在轴对称势 $V=-\\,v_0/\\rho$ 中构造了狄拉克方程的精确、正能量、可归一化波包解——据我们所知，这是任何外部势中的第一个此类解。值得注意的是，一个族仅包含基本函数，其纵向轮廓再现了非相对论极限中的自由薛定谔厄米特高斯波包。所有数据包都有两个显着的特征：（i）概率密度与自旋方向逐点解耦——尽管狄拉克方程固有的自旋轨道耦合——以及（ii）它们的时间演化完全冻结在临界耦合$v_0\\to\\hbar c/2$处。我们还提出了一个简单的方案，将二维亥姆霍兹方程的解映射到更精确的狄拉克波包。", "authors": [{"name": "Siddhant Das"}], "featured_authors": [{"name": "Siddhant Das"}], "author_count": 1}, {"id": "2606.18494", "category": "quant-ph", "title": "Towards an Optimally Distributed Quantum Fourier Transform Circuit", "abstract": "A promising avenue for scaling quantum computing is to connect quantum processing units (QPUs) by generating entanglement between them. This requires circuit partitioning: partially rewriting quantum circuits to run on a distributed quantum system using quantum teleportation protocols, while preserving the unitary operation implemented by the circuit. The key metric to minimize when partitioning is the e-bit count, defined as the number of maximally entangled qubit pairs that must be generated between QPUs. We focus on partitioning the quantum Fourier transform (QFT) circuit, which is widely used as a subroutine in quantum algorithms such as quantum phase estimation and arithmetic circuits. Specifically, we present a partitioning scheme based on optimal gate-packing, compare it against prior analytical partitioning schemes for the QFT, and evaluate it against partitions produced by general-purpose circuit partitioning algorithms. We further validate our approach by implementing the partitioned circuit on quantum hardware.", "url": "https://arxiv.org/abs/2606.18494", "type": "理论+数值", "summary": "扩展量子计算的一个有前途的途径是通过在量子处理单元（QPU）之间产生纠缠来连接它们。这需要电路分区：部分重写量子电路以使用量子隐形传态协议在分布式量子系统上运行，同时保留电路实现的单一操作。分区时要最小化的关键指标是 e 位计数，定义为 QPU 之间必须生成的最大纠缠量子位对的数量。我们重点关注量子傅里叶变换（QFT）电路的划分，该电路广泛用作量子算法中的子程序，例如量子相位估计和算术电路。具体来说，我们提出了一种基于最佳门填充的分区方案，将其与 QFT 的先前分析分区方案进行比较，并根据通用电路分区算法生成的分区对其进行评估。我们通过在量子硬件上实现分区电路来进一步验证我们的方法。", "authors": [{"name": "Zachary Vernec"}, {"name": "Michael Silver"}, {"name": "Hans-Arno Jacobsen"}], "featured_authors": [{"name": "Zachary Vernec"}, {"name": "Michael Silver"}, {"name": "Hans-Arno Jacobsen"}], "author_count": 3}, {"id": "2606.18534", "category": "quant-ph", "title": "Ground- and excited-state energies extraction via Trotterization on IBM quantum computers", "abstract": "We implement the Hadamard test with Trotterized time-evolution operators on IBM quantum computers to simultaneously extract ground- and excited-state energies of the transverse field Ising model (TFIM) and transverse longitudinal field Ising model (TLFIM). The Trotterization circuits for the TFIM admit constant-depth circuits (CDCs) for arbitrary time, allowing us to locate a large number of eigen-energies above the background noise for up to six spins. Via circuit synthesis we show that the three-spin TLFIM has constant-depth structure although it does not meet the known CDC criteria. The CDCs enable the extraction of the ground and first-excited state energies of the three-site TLFIM via its dynamics. We also address complications from the noisy background and discrete Fourier transform to enhance the reliability of the extraction process and compare the results from different generations of IBM hardware to highlight the improvement.", "url": "https://arxiv.org/abs/2606.18534", "type": "理论", "summary": "我们在IBM量子计算机上使用Trotterized时间演化算子实施Hadamard测试，以同时提取横向场伊辛模型（TFIM）和横向纵向场伊辛模型（TLFIM）的基态和激发态能量。 TFIM 的 Trotterization 电路允许任意时间的恒定深度电路 (CDC)，使我们能够在最多六个自旋中定位背景噪声之上的大量本征能量。通过电路综合，我们表明三自旋 TLFIM 具有恒定深度结构，尽管它不符合已知的 CDC 标准。 CDC 能够通过其动力学提取三位点 TLFIM 的基态和第一激发态能量。我们还解决了噪声背景和离散傅里叶变换带来的复杂性，以增强提取过程的可靠性，并比较不同代 IBM 硬件的结果以突出改进。", "authors": [{"name": "Fernando Espinoza-Ortiz"}, {"name": "Chungwei Lin"}, {"name": "Chih-Chun Chien"}], "featured_authors": [{"name": "Fernando Espinoza-Ortiz"}, {"name": "Chungwei Lin"}, {"name": "Chih-Chun Chien"}], "author_count": 3}, {"id": "2606.18580", "category": "quant-ph", "title": "Separation of Statistical Complexity and Trainability in Variational Quantum Circuits", "abstract": "Variational quantum algorithms (VQAs) are among the leading approaches for near-term quantum computing, yet their performance can degrade in barren plateau regimes characterized by vanishing gradients. A widely held intuition is that increasing circuit expressivity, often associated with random-state behavior, leads to a loss of trainability. Existing results show that sufficiently random circuits can lead to barren plateaus. Here we show that standard statistical signatures of randomness can emerge well before this regime, without degrading trainability. We demonstrate this behavior in structured variational circuits applied to the one-dimensional cluster-Ising model and a generalized toric code Hamiltonian. To characterize state complexity, we analyze Porter-Thomas statistics, entanglement-spectrum level statistics, and inverse participation ratios. Across both models, increasing circuit depth drives these diagnostics toward random-state-like or random-matrix-like behavior, while variational optimization remains effective, with no evidence of exponential gradient suppression in the regime studied. We interpret this behavior in terms of locality. Spectral correlations develop at relatively shallow depth through locally generated structure, while global state randomization and the associated concentration-of-measure effects are not yet realized. These results show that commonly used statistical diagnostics of complexity do not by themselves determine trainability. Instead, they point to a separation between different aspects of complexity in finite-depth variational circuits.", "url": "https://arxiv.org/abs/2606.18580", "type": "理论+数值", "summary": "变分量子算法（VQA）是近期量子计算的主要方法之一，但它们的性能可能会在梯度消失的贫瘠高原状态下下降。人们广泛持有的直觉是，电路表现力的增加（通常与随机状态行为相关）会导致可训练性的损失。现有结果表明，足够随机的电路可能会导致贫瘠的平台。在这里，我们表明，随机性的标准统计特征可以在这种情况之前出现，而不会降低可训练性。我们在应用于一维簇伊辛模型和广义环面代码哈密顿量的结构化变分电路中证明了这种行为。为了表征状态复杂性，我们分析了波特-托马斯统计、纠缠谱级统计和逆参与比。在这两个模型中，增加电路深度将这些诊断推向类似随机状态或类似随机矩阵的行为，而变分优化仍然有效，在研究的范围内没有指数梯度抑制的证据。我们根据局部性来解释这种行为。\n\n谱相关性通过局部生成的结构在相对较浅的深度发展，而全局状态随机化和相关的测量集中效应尚未实现。这些结果表明，常用的复杂性统计诊断本身并不能决定可训练性。相反，他们指出有限深度变分电路中复杂性的不同方面之间的分离。", "authors": [{"name": "Suman Mandal"}, {"name": "Maximillian Daughtry"}, {"name": "Eduardo R. Mucciolo"}], "featured_authors": [{"name": "Suman Mandal"}, {"name": "Maximillian Daughtry"}, {"name": "Eduardo R. Mucciolo"}], "author_count": 3}, {"id": "2606.18605", "category": "quant-ph", "title": "The quantum-advantage resource in multimode OPA light: Identification, optimization, extraction", "abstract": "We introduce the notion and reveal remarkable properties of quantum complexity resource contained in a mixed multimode Gaussian state and providing universal quantitative characterization of its quantum advantage. The notion is based on convex optimization, multimode photon number statistics, Hafnian Master Theorem, and #P-hard complexity. We consider pulsed OPAs targeting maximal quantum complexity resource and thousands of multipartite-entangled squeezed modes of output light via nonlinear, spatio-temporally nonadiabatic generation inside OPA and optimized extraction out of OPA. We show that such figure of merit is more realistic than Bloch--Messiah supermodes and guides to multimode OPAs opening new paths to important applications in quantum information science such as generation of 3D cluster states for one-way photonic quantum computing and demonstration of quantum advantage.", "url": "https://arxiv.org/abs/2606.18605", "type": "数值", "summary": "我们引入了这一概念，揭示了混合多模高斯态中包含的量子复杂性资源的显着特性，并提供了其量子优势的通用定量表征。该概念基于凸优化、多模光子数统计、哈夫尼安主定理和#P-hard 复杂度。我们考虑脉冲 OPA，其目标是通过 OPA 内部的非线性、时空非绝热生成和 OPA 的优化提取，实现最大量子复杂度资源和数千种多部分纠缠压缩模式的输出光。我们表明，这种品质因数比 Bloch-Messiah 超模更加现实，并指导多模 OPA 为量子信息科学中的重要应用开辟新途径，例如用于单向光子量子计算的 3D 簇态生成和量子优势的演示。", "authors": [{"name": "Vitaly Kocharovsky"}, {"name": "Kunwar Kalra"}], "featured_authors": [{"name": "Vitaly Kocharovsky"}, {"name": "Kunwar Kalra"}], "author_count": 2}, {"id": "2606.18612", "category": "quant-ph", "title": "Characterization of three-qubit controlled unitary gates of Schmidt rank three", "abstract": "We characterize three-qubit controlled unitary gates of Schmidt rank three, establishing necessary and sufficient conditions for such gates to have Schmidt rank three. We construct explicit examples and analyze their entanglement capabilities, showing that gates with Schmidt rank three can generate output states ranging from fully separable to maximal GHZ-class states. Within this classification, we present a parameterized gate family that produces an output W-class state whose bipartite tangles for subsystems AB and AC are modulated as simple trigonometric functions of a single phase parameter. The examples also include gates implementable with only three CNOT gates, showing that this lower bound is achievable. Decompositions that achieve the minimum possible CNOT count for several other cases are provided as well. Our results bridge Schmidt rank classification, entanglement structure, and resource-efficient circuit synthesis.", "url": "https://arxiv.org/abs/2606.18612", "type": "理论", "summary": "我们描述了三量子位控制的施密特三阶酉门，为此类门具有施密特三阶建立了充分必要条件。我们构建了明确的示例并分析了它们的纠缠能力，表明施密特三阶门可以生成从完全可分离到最大 GHZ 级状态的输出状态。在这个分类中，我们提出了一个参数化门系列，它产生一个输出 W 级状态，其子系统 AB 和 AC 的二分缠结被调制为单相参数的简单三角函数。这些示例还包括仅用三个 CNOT 门即可实现的门，表明该下限是可以实现的。还提供了其他几种情况下实现尽可能最小 CNOT 计数的分解。我们的结果桥接了施密特等级分类、纠缠结构和资源高效的电路合成。", "authors": [{"name": "Xiutao Zhang"}], "featured_authors": [{"name": "Xiutao Zhang"}], "author_count": 1}, {"id": "2606.18631", "category": "quant-ph", "title": "Coherence measures in the strictly incoherent operation framework and its application in the multi-path interferometer", "abstract": "Quantifying coherence is an essential endeavor in both quantum foundations and quantum technologies. In this paper, we study the coherence measures in terms of the diagonal states in the strictly incoherent operations framework. Specifically, we propose a coherence measure in terms of fidelity and provide its analytical expression. The relations between the proposed coherence measure and some other coherence measures are derived. Furthermore, we prove its monotonicity under incoherent operations. As an application, we explore the role of the proposed coherence measure in characterizing the waveness in the multi-path interferometer. As a result, some wave-particle dualities in terms of fidelity are presented. This work not only deepens the interpretation of the diagonal states on characterizing quantum states, but also promotes the quantitative description of the wave-particle behaviors in the multi-path interferometer.", "url": "https://arxiv.org/abs/2606.18631", "type": "理论", "summary": "量化相干性是量子基础和量子技术中的一项重要工作。在本文中，我们研究了严格非相干运算框架中对角状态的相干性度量。具体来说，我们提出了保真度方面的一致性度量并提供了其分析表达式。推导了所提出的一致性度量和其他一些一致性度量之间的关系。此外，我们证明了它在不相干操作下的单调性。作为一个应用，我们探讨了所提出的相干性测量在表征多路径干涉仪中的波度方面的作用。因此，在保真度方面出现了一些波粒二象性。这项工作不仅加深了对角态在表征量子态方面的解释，而且促进了多路干涉仪中波粒行为的定量描述。", "authors": [{"name": "Peiru Li"}, {"name": "Jingyan Liu"}, {"name": "Ming-Jing Zhao"}], "featured_authors": [{"name": "Peiru Li"}, {"name": "Jingyan Liu"}, {"name": "Ming-Jing Zhao"}], "author_count": 3}, {"id": "2606.18720", "category": "quant-ph", "title": "Memory-assisted advantage for state transfer in disordered quantum many-body scar system", "abstract": "We analyze how memory in disorder facilitates quantum communication in many-body scar systems. We consider three distinct types of disorder, viz., memoryful, and memoryless uniform and Gaussian, and compare their respective performances in facilitating quantum state transfer. Using the maximum transfer fidelity and fidelity area as figures of merit, we find that memoryful disorder yields a better performance than the memoryless disordered channels. Furthermore, the maximum transfer fidelity exhibits an initial parabolic decay with disorder strength, followed by a linear decrease, for all the disorder models considered. We introduce a degree of scarness, and show that it is higher for memoryful disorder in comparison to memoryless disorders, implying a role of scarness in the quantum state transfer protocol. We further perform a scaling analysis, revealing that memory effect in disorder is not only beneficial for short-distance but also long-distance quantum state transfer. Finally, we show that the state yielding the maximum transfer fidelity has larger inverse participation ratio for memoryful disorder in comparison to the other two disorders, highlighting the role of nonergodicity in enhancing state transfer.", "url": "https://arxiv.org/abs/2606.18720", "type": "理论", "summary": "我们分析了无序记忆如何促进多体疤痕系统中的量子通信。我们考虑三种不同类型的无序，即有记忆的和无记忆的均匀无序和高斯无序，并比较它们各自在促进量子状态转移方面的性能。使用最大传输保真度和保真度区域作为品质因数，我们发现记忆无序通道比无记忆无序通道产生更好的性能。此外，对于所有考虑的无序模型，最大传输保真度随着无序强度呈现初始抛物线衰减，然后线性下降。我们引入了一定程度的稀缺性，并表明与无记忆障碍相比，记忆障碍的稀缺性更高，这意味着稀缺性在量子状态转移协议中的作用。我们进一步进行了尺度分析，揭示了无序记忆效应不仅有利于短距离量子态转移，而且有利于长距离量子态转移。\n\n最后，我们表明，与其他两种疾病相比，产生最大转移保真度的状态对于记忆障碍具有更大的逆参与率，突出了非遍历性在增强状态转移中的作用。", "authors": [{"name": "Paranjoy Chaki"}, {"name": "Ujjwal Sen"}], "featured_authors": [{"name": "Paranjoy Chaki"}, {"name": "Ujjwal Sen"}], "author_count": 2}, {"id": "2606.18743", "category": "quant-ph", "title": "Enhancing the teleportation fidelity of a quantum network using purification", "abstract": "Complex quantum networks can support a diverse set of long-range entanglement distribution schemes ranging from linear repeater protocols to multipath entanglement purification strategies. As a result, a network's resourcefulness, that is its ability to facilitate quantum communication, depends on the deployed distribution scheme. In this work, we analyse and compare the resourcefulness of quantum networks across a broad range of network topologies, including both regular and random networks, under two distinct entanglement distribution schemes. The first relies on entanglement swapping along a single path connecting a source-target pair, while the second exploits entanglement purification using multiple paths between the same source and target nodes. The resourcefulness of the network is quantified using a recently described metric [1] that averages over the maximum teleportation fidelity between arbitrary source-target pairs in the network. We present algorithms for estimating this metric under constraints of edge-usage and ordering of paths. Our results not only demonstrate the sensitivity of the average maximum teleportation fidelity metric to the choice of entanglement distribution protocol, but also highlight the significant improvements enabled by network purification schemes. In particular, purification-based approaches can substantially enhance average teleportation fidelity, thereby improving the overall teleportation capability of quantum networks.", "url": "https://arxiv.org/abs/2606.18743", "type": "理论+数值", "summary": "复杂的量子网络可以支持多种远程纠缠分布方案，从线性中继器协议到多路径纠缠净化策略。因此，网络的足智多谋，即促进量子通信的能力，取决于所部署的分布式方案。在这项工作中，我们分析和比较了两种不同的纠缠分布方案下量子网络在广泛的网络拓扑（包括规则网络和随机网络）中的足智多谋。第一个依赖于沿着连接源-目标对的单个路径进行纠缠交换，而第二个则利用相同源和目标节点之间的多个路径进行纠缠净化。网络的足智多谋是使用最近描述的指标[1]来量化的，该指标对网络中任意源-目标对之间的最大隐形传态保真度进行平均。我们提出了在边缘使用和路径排序的约束下估计该度量的算法。\n\n我们的结果不仅证明了平均最大隐形传态保真度指标对纠缠分布协议选择的敏感性，而且还强调了网络净化方案所带来的显着改进。特别是，基于纯化的方法可以显着提高平均隐形传态保真度，从而提高量子网络的整体隐形传态能力。", "authors": [{"name": "Soumit Roy"}, {"name": "Md Sohel Mondal"}, {"name": "Siddhartha Santra"}, {"name": "Indranil Chakrabarty"}], "featured_authors": [{"name": "Soumit Roy"}, {"name": "Md Sohel Mondal"}, {"name": "Siddhartha Santra"}, {"name": "Indranil Chakrabarty"}], "author_count": 4}, {"id": "2606.18756", "category": "quant-ph", "title": "Universal photon blockade via two-photon light-matter interaction at chiral exceptional points", "abstract": "The photon blockade (PB) effect is a hallmark non-classical phenomenon in quantum optics and finds important applications for building quantum sources, while the control of PB by the non-Hermitian exceptional points remains largely unexplored. In this work, we theoretically investigate universal photon blockade in a microcavity harboring chiral exceptional points (CEPs) for building multiplexing quantum sources with nonreciprocal photon statistics. The results reveal that the presence of the CEPs leads to a stark contrast in the photon statistics of two whispering-gallery modes with opposite propagating directions. That is, one mode exhibits a strong PB effect while the other displays either sub-Poissonian or super-Poissonian distribution. Our findings thus may pave the way for advanced applications of photon blockade, and provide a theoretical foundation for the selective generation of single-photon and two-photon emission", "url": "https://arxiv.org/abs/2606.18756", "type": "理论", "summary": "光子封锁（PB）效应是量子光学中的一个标志性非经典现象，在构建量子源方面有着重要的应用，而通过非厄米特异点对 PB 的控制在很大程度上仍未得到探索。在这项工作中，我们从理论上研究了具有手性异常点（CEP）的微腔中的通用光子封锁，用于构建具有非互易光子统计的多路复用量子源。结果表明，CEP 的存在导致两种传播方向相反的回音壁模式的光子统计数据形成鲜明对比。也就是说，一种模式表现出强烈的PB效应，而另一种模式则表现出亚泊松分布或超泊松分布。因此，我们的研究结果可能为光子封锁的高级应用铺平道路，并为选择性产生单光子和双光子发射提供理论基础", "authors": [{"name": "Hai-Tao Dong"}, {"name": "Meng-Long Song"}, {"name": "Si-Yu Zhang"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "featured_authors": [{"name": "Hai-Tao Dong"}, {"name": "Meng-Long Song"}, {"name": "Si-Yu Zhang"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "author_count": 6}, {"id": "2606.18840", "category": "quant-ph", "title": "Field Demonstration of a Multi-User Continuous-Variable Quantum Access Network for Quantum-to-the-Home", "abstract": "Realizing scalable Quantum-to-the-Home (QTTH) faces a bottleneck: link asymmetry in broadcast continuous-variable quantum access networks (CV-QANs) hinders the selection of a globally optimal modulation variance. We demonstrate a downstream broadcast CV-QAN connecting a Quantum Line Terminal (QLT) to multiple Quantum Network Units (QNUs) over commercial fiber. Operating within a trusted local network domain, we establish a multi-user utility model to select the optimal shared variance, balancing network efficiency and user fairness. Supported by robust digital signal processing, our 1:16 field trial achieves Mbit/s-level asymptotic secure key rates, bridging theoretical protocols with Fiber-to-the-Home reality and guiding future scalable access architectures.", "url": "https://arxiv.org/abs/2606.18840", "type": "理论", "summary": "实现可扩展的量子到户（QTTH）面临瓶颈：广播连续可变量子接入网络（CV-QAN）中的链路不对称阻碍了全局最优调制方差的选择。我们演示了下游广播 CV-QAN，通过商用光纤将量子线路终端 (QLT) 连接到多个量子网络单元 (QNU)。在受信任的本地网络域内运行，我们建立了多用户效用模型来选择最佳共享方差，平衡网络效率和用户公平性。在强大的数字信号处理的支持下，我们的 1:16 现场试验实现了 Mbit/s 级渐近安全密钥速率，将理论协议与光纤到户现实联系起来，并指导未来的可扩展接入架构。", "authors": [{"name": "Junpeng Zhang"}, {"name": "Xu Liu"}, {"name": "Qijun Zhang"}, {"name": "Yifeng Liang"}, {"name": "Yue Yu"}, {"name": "Peng Huang"}, {"name": "Huasheng Li"}, {"name": "Yingming Zhou"}, {"name": "Jingyu Yang"}, {"name": "Chunchen Li"}, {"name": "Yunfan Chen"}, {"name": "Cheng Zheng"}, {"name": "Ciqing Deng"}, {"name": "Tao Wang"}, {"name": "Guihua Zeng"}], "featured_authors": [{"name": "Junpeng Zhang"}, {"name": "Xu Liu"}, {"name": "Qijun Zhang"}, {"name": "Ciqing Deng"}, {"name": "Tao Wang"}, {"name": "Guihua Zeng"}], "author_count": 15}, {"id": "2606.18914", "category": "quant-ph", "title": "Benchmark of Pauli Correlation Encoding for different optimisation problems", "abstract": "The continuous progress of quantum technologies has spurred the exploration of their potential applications across diverse fields, particularly in combinatorial optimisation. In this work, we study a quantum-classical optimisation framework based on Pauli Correlation Encoding, an encoding scheme that can represent m binary variables using a polynomial number of qubits. To evaluate the performance of the method, we use four classical optimisation problems against the instances of the QOPTLib benchmark. The study includes an analysis of the impact of the compression order of the encoding scheme, the problem structure, and hyperparameter selection on solution quality, as well as the role of post-processing in improving performance. Additionally, we study the effect of shot-based execution and hardware noise, showing how these factors influence both the accuracy of expected value estimation and the overall dynamics of the optimisation process. The results indicate that the proposed PCE-based framework achieves competitive performance against the benchmark and, in several cases, obtains equivalent or even superior solutions, highlighting its potential as an efficient encoding strategy for quantum optimisation in the NISQ and near fault-tolerant era.", "url": "https://arxiv.org/abs/2606.18914", "type": "数值", "summary": "量子技术的不断进步刺激了对其在不同领域的潜在应用的探索，特别是在组合优化方面。在这项工作中，我们研究了一种基于泡利相关编码的量子经典优化框架，这种编码方案可以使用多项式数量的量子位来表示 m 个二进制变量。为了评估该方法的性能，我们针对 QOPTLib 基准测试的实例使用了四个经典优化问题。该研究包括分析编码方案的压缩顺序、问题结构和超参数选择对解决方案质量的影响，以及后处理在提高性能方面的作用。此外，我们还研究了基于镜头的执行和硬件噪声的影响，展示了这些因素如何影响期望值估计的准确性和优化过程的整体动态。\n\n结果表明，所提出的基于 PCE 的框架实现了与基准相比的竞争性能，并且在多种情况下获得了等效甚至更好的解决方案，突显了其作为 NISQ 和近容错时代量子优化的有效编码策略的潜力。", "authors": [{"name": "Fernando Alonso"}, {"name": "Colomán Samprón"}, {"name": "Jacobo Veiga"}, {"name": "Mariamo Mussa Juane"}, {"name": "Andrés Gómez"}], "featured_authors": [{"name": "Fernando Alonso"}, {"name": "Colomán Samprón"}, {"name": "Jacobo Veiga"}, {"name": "Mariamo Mussa Juane"}, {"name": "Andrés Gómez"}], "author_count": 5}, {"id": "2606.18916", "category": "quant-ph", "title": "Exceptional-Point-Anchored Variational Quantum Eigensolver for Non-Hermitian Many-Body Phase Diagrams: Bridging Skin-Effect Topology and Entanglement Criticality on NISQ Hardware", "abstract": "We introduce the Biorthogonal Variational Quantum Eigensolver (B-VQE), a quantum algorithm for simulating non-Hermitian many-body systems on noisy intermediate-scale quantum (NISQ) hardware. Non-Hermitian quantum matter exhibits exceptional points, parity-time symmetry breaking, and non-Hermitian skin effects, yet existing quantum algorithms often rely on costly post-selection procedures and are not designed to capture biorthogonal eigenstates. B-VQE employs independent variational circuits to represent the left and right eigenstates of a non-Hermitian Hamiltonian and optimizes a biorthogonal objective function that directly tracks non-Hermitian phase transitions. The framework incorporates an Exceptional-Point Detector (EPD) that identifies exceptional points through a hardware-native coalescence metric and a Non-Hermitian Quantum Geometric Tensor (NH-QGT) readout that distinguishes state-topological and band-topological signatures in interacting many-body systems. To overcome the exponential overhead associated with conventional non-Hermitian simulation, we develop an importance-sampling mitigation strategy that removes the need for ancilla-based post-selection while retaining polynomial computational scaling. We validate the approach on three representative models: a non-Hermitian Hubbard chain, a non-Hermitian XXZ spin chain, and a two-dimensional non-Hermitian (t)-(J) model. B-VQE achieves relative energy errors below (5\\times10^{-3}) and locates exceptional points with high accuracy on noise-free simulations while resolving phase boundaries associated with localization, quantum scars, and skin-effect physics. These results establish B-VQE as a scalable NISQ methodology for constructing non-Hermitian many-body phase diagrams and exploring topological and critical phenomena in open quantum systems.", "url": "https://arxiv.org/abs/2606.18916", "type": "理论+数值", "summary": "我们介绍了双正交变分量子本征求解器 (B-VQE)，这是一种用于在嘈杂的中尺度量子 (NISQ) 硬件上模拟非厄米多体系统的量子算法。非厄米量子物质表现出异常点、宇称时间对称性破缺和非厄米集肤效应，但现有的量子算法通常依赖于昂贵的后选择程序，并且并非旨在捕获双正交本征态。 B-VQE 采用独立变分电路来表示非厄米哈密顿量的左右本征态，并优化直接跟踪非厄米相变的双正交目标函数。该框架采用了异常点检测器 (EPD)，可通过硬件本机合并度量来识别异常点，以及非厄米量子几何张量 (NH-QGT) 读数，可区分交互多体系统中的状态拓扑和能带拓扑特征。\n\n为了克服与传统非厄米特模拟相关的指数开销，我们开发了一种重要性采样缓解策略，该策略消除了基于辅助的后选择的需要，同时保留多项式计算缩放。我们在三个代表性模型上验证了该方法：非厄米哈伯德链、非厄米 XXZ 自旋链和二维非厄米 (t)-(J) 模型。 B-VQE 实现了低于 (5\\times10^{-3}) 的相对能量误差，并在无噪声模拟中以高精度定位异常点，同时解决了与局域化、量子疤痕和集肤效应物理相关的相边界。这些结果将 B-VQE 确立为一种可扩展的 NISQ 方法，用于构建非厄米多体相图并探索开放量子系统中的拓扑和临界现象。", "authors": [{"name": "Akoramurthy B"}, {"name": "Surendiran B"}, {"name": "Xiaochun Cheng"}], "featured_authors": [{"name": "Akoramurthy B"}, {"name": "Surendiran B"}, {"name": "Xiaochun Cheng"}], "author_count": 3}, {"id": "2606.18982", "category": "quant-ph", "title": "Probing chaos and thermalization through out-of-time-ordered correlators in random field spin chains", "abstract": "Out-of-time-ordered correlators (OTOCs) have emerged as a diagnostic of information scrambling and quantum chaos in many-body systems. We investigate the imprints of chaos in the dynamics of OTOCs in the Heisenberg spin-$1/2$ chain with random fields. The system is parameterized to exhibit a crossover from integrable to chaotic dynamics. We demonstrate numerically that the approach to saturation of the OTOC can distinguish between integrable and chaotic regimes, with a power-law $(1/t)$ relaxation for integrable systems and a higher-degree power-law decay $(1/t^\\alpha; \\alpha \\ge 1)$ followed by an exponential relaxation for the chaotic regime. We further show that long-range spectral statistics, such as the number variance, are more effective in characterizing quantum chaos in the regime near saturation of OTOC. We also demonstrate that the relaxation and initial scrambling regimes exhibit distinct and universal features, with the former being sensitive and the latter being robust against different realizations of random-fields. The long-time saturation of OTOC also fluctuates with different realizations, and its exact expression is derived through the Eigenstate Thermalization Hypothesis.", "url": "https://arxiv.org/abs/2606.18982", "type": "数值", "summary": "乱序相关器 (OTOC) 已成为多体系统中信息扰乱和量子混沌的诊断方法。我们研究了具有随机场的海森堡自旋 $1/2$ 链中 OTOC 动力学中的混沌印记。该系统被参数化以表现出从可积动力学到混沌动力学的交叉。我们用数值证明了 OTOC 的饱和方法可以区分可积系统和混沌系统，可积系统具有幂律 $(1/t)$ 松弛，而混沌系统则具有更高程度的幂律衰减 $(1/t^\\alpha; \\alpha \\ge 1)$，然后是指数松弛。我们进一步表明，长程光谱统计数据（例如数量方差）在表征 OTOC 接近饱和状态下的量子混沌时更有效。我们还证明了松弛和初始置乱机制表现出独特且普遍的特征，前者是敏感的，后者对随机场的不同实现具有鲁棒性。\n\nOTOC的长时间饱和度也会随着不同的实现而波动，其精确表达式是通过本征态热化假说推导出来的。", "authors": [{"name": "C Jisha"}, {"name": "Shivam Mishra"}, {"name": "Ravi Prakash"}], "featured_authors": [{"name": "C Jisha"}, {"name": "Shivam Mishra"}, {"name": "Ravi Prakash"}], "author_count": 3}, {"id": "2606.19020", "category": "quant-ph", "title": "Quantum circuit decomposition of the tangent-fermion Dirac operator", "abstract": "The Dirac operator on a lattice cannot be both local and free of fermion doubling, at least not without breaking fundamental symmetries. Non-local, symmetry-preserving discretizations that avoid doubling have a quantum circuit representation as a linear-combination-of-unitaries (LCU) in which both the number of terms and their norm (the subnormalization factor) grow with the lattice size, compromising the efficiency of a quantum algorithm. We show that the tangent-fermion discretization escapes this obstruction when the Dirac equation is written as a generalized eigenvalue problem with a local operator pencil: Each member of the pencil has an exact LCU, with term count that is independent of lattice size and with subnormalization factor of order unity, on a par with elliptic operators. This provides an efficient block-encoding primitive for Dirac spectra and Green functions without fermion doubling.", "url": "https://arxiv.org/abs/2606.19020", "type": "理论+数值", "summary": "晶格上的狄拉克算子不可能既是局域的又不存在费米子倍增，至少在不破坏基本对称性的情况下是这样。避免加倍的非局域、保对称离散化将量子电路表示为酉线性组合 (LCU)，其中项数及其范数（次归一化因子）随着晶格大小而增长，从而损害了量子算法的效率。我们证明，当狄拉克方程被写成带有局部算子铅笔的广义特征值问题时，正切费米子离散化就避开了这个障碍：铅笔的每个成员都有一个精确的 LCU，其项数独立于晶格大小，并且具有阶次单位的次归一化因子，与椭圆算子同等。这为狄拉克谱和格林函数提供了一种有效的块编码原语，无需费米子倍增。", "authors": [{"name": "C.W.J. Beenakker"}], "featured_authors": [{"name": "C.W.J. Beenakker"}], "author_count": 1}, {"id": "2606.19035", "category": "quant-ph", "title": "Scalable quantum circuit knitting using a weak-coupling approximation", "abstract": "We present a method for performing distributed quantum computing with controlled approximations. Exact distributed quantum computing requires exponential classical information to reconstruct the quantum process. However, we show how the classical cost is reduced to polynomial if the quantum procedure can be partitioned between a qubit that is weakly coupled the other qubits. We demonstrate our method for a layered circuit based on the circuits used for the quantum approximate optimization algorithm.", "url": "https://arxiv.org/abs/2606.19035", "type": "数值", "summary": "我们提出了一种通过受控近似执行分布式量子计算的方法。精确的分布式量子计算需要指数经典信息来重建量子过程。然而，我们展示了如果量子过程可以在与其他量子位弱耦合的量子位之间划分，经典成本如何减少为多项式。我们展示了基于量子近似优化算法所用电路的分层电路方法。", "authors": [{"name": "John P. T. Stenger"}, {"name": "Daniel Gunlycke"}, {"name": "Nikos Chrisochoides"}], "featured_authors": [{"name": "John P. T. Stenger"}, {"name": "Daniel Gunlycke"}, {"name": "Nikos Chrisochoides"}], "author_count": 3}, {"id": "2606.19083", "category": "quant-ph", "title": "Matrix Product Operators In The Age of Block Encoding", "abstract": "We develop a block-encoding compiler that speeds up linear combination of unitaries Hamiltonian simulation programs by treating matrix product operators as compressed, virtual-path LCU programs. In showing how these new conditional PREP and SELECT stages are compiled in terms of a parent matrix product operator, we go beyond typical operator splitting product formulas and illustrate how tensor networks are a natural language and valid intermediate representation for quantum circuits. Our results are numerically verified for two important cases, namely, Heisenberg and perturbed Heisenberg-adjacent chain real-time evolution, and highlight polynomial speedups. Specifically, we highlight a polynomial speedup that avoids the $\\mathcal{O}(N^K)$ Pauli-string growth when the compressed MPO bond dimension and path normalization remain mild. We quantify how MPO truncation error and bond-dimension budgets affect the compiled polynomial representation. Our algorithms show how classical pre-processing in terms of tensor network data structures opens new avenues to accelerate quantum algorithms.", "url": "https://arxiv.org/abs/2606.19083", "type": "理论+数值", "summary": "我们开发了一种块编码编译器，通过将矩阵乘积运算符视为压缩的虚拟路径 LCU 程序来加速酉哈密顿模拟程序的线性组合。在展示如何根据父矩阵乘积运算符编译这些新的条件 PREP 和 SELECT 阶段时，我们超越了典型的运算符分裂乘积公式，并说明了张量网络如何成为自然语言和量子电路的有效中间表示。我们的结果对两个重要情况进行了数值验证，即海森堡和扰动海森堡邻链实时演化，并突出了多项式加速。具体来说，我们强调了多项式加速，当压缩的 MPO 键维和路径归一化保持温和时，可以避免 $\\mathcal{O}(N^K)$ 泡利弦增长。我们量化 MPO 截断误差和键维预算如何影响编译的多项式表示。我们的算法展示了张量网络数据结构方面的经典预处理如何为加速量子算法开辟新途径。", "authors": [{"name": "Eugene Dumitrescu"}], "featured_authors": [{"name": "Eugene Dumitrescu"}], "author_count": 1}, {"id": "2606.19180", "category": "quant-ph", "title": "Quantum magic is necessary but not sufficient for wormhole-inspired teleportation", "abstract": "We investigate the dynamics of Quantum magic, formally known as non-stabilizerness, quantified by the stabilizer Rényi entropy (SRE), across the stages of the wormhole-inspired teleportation protocol (WITP) in the Sachdev-Ye-Kitaev (SYK) model. By tracking the SRE of the full pure state across scrambling, message insertion, left-right coupling, and right-side extraction, we uncover a regime-dependent relationship between magic accumulation and teleportation fidelity. In the gravitational (low temperature) regime, fidelity rises concurrently with magic from early times, whereas in the peaked-size (high temperature) regime, the magic saturates near the Haar-typical value before teleportation onset. A baseline-subtracted diagnostic comparing coupled and uncoupled protocols reveals that the double-trace coupling first suppresses and then channels non-stabilizer resources toward the teleportation signal, with the channel amplitude decreasing monotonically with inverse temperature. Comparison with a chaotic random two-local model, which generates near-maximal magic yet fails to teleport, demonstrates that structured magic redistribution, rather than raw non-stabilizerness, underlies successful wormhole traversal. Moreover, the magic transiently dips at the fidelity peak, marking the teleportation event in the time domain. Our results are robust across the three system sizes studied ($N_{\\mathrm{maj}}=8,10,12$), and the fidelity-magic trajectories exhibit an approximate collapse across system sizes when the SRE is normalized by the Haar-typical prediction.", "url": "https://arxiv.org/abs/2606.19180", "type": "理论", "summary": "我们研究了量子魔法的动力学，正式称为非稳定器，通过稳定器 Rényi 熵 (SRE) 量化，跨越 Sachdev-Ye-Kitaev (SYK) 模型中虫洞启发的隐形传输协议 (WITP) 的各个阶段。通过跟踪加扰、消息插入、左右耦合和右侧提取的完整纯状态的 SRE，我们发现了魔法积累和传送保真度之间依赖于机制的关系。在重力（低温）状态下，保真度与早期的魔法同时上升，而在峰值尺寸（高温）状态下，魔法在隐形传送开始之前饱和到哈尔典型值附近。比较耦合和非耦合协议的基线扣除诊断表明，双迹耦合首先抑制非稳定器资源，然后将非稳定器资源引导至隐形传态信号，信道幅度随温度的倒数单调减小。\n\n与混沌随机两局部模型（产生接近最大魔法但无法传送）的比较表明，结构化魔法重新分配，而不是原始的非稳定器，是成功穿越虫洞的基础。而且，魔力在保真度峰值处短暂下降，标志着时域中的瞬移事件。我们的结果在所研究的三个系统规模（$N_{\\mathrm{maj}}=8,10,12$）中都是稳健的，并且当 SRE 通过 Haar 典型预测进行归一化时，保真魔法轨迹在系统规模上表现出近似崩溃。", "authors": [{"name": "Sudhanva Joshi"}, {"name": "Sunil Kumar Mishra"}], "featured_authors": [{"name": "Sudhanva Joshi"}, {"name": "Sunil Kumar Mishra"}], "author_count": 2}, {"id": "2606.19188", "category": "quant-ph", "title": "When Isolated Quantum Systems Appear Classical", "abstract": "The emergence of classical behavior and the origin of thermal equilibrium are two central problems in the foundations of physics. In the standard accounts, both phenomena are typically explained through interactions with an external environment: decoherence suppresses quantum interference, while coupling to a thermal bath drives relaxation toward equilibrium. Over the last decades, however, it has become clear that equilibration and thermalization can arise even in fully isolated quantum systems, in the operational sense that the expectation values of relevant observables remain close to equilibrium values for most of the time. Here, we ask whether the same intrinsic equilibration mechanism can also account for the emergence of classical behavior. Using rigorous bounds on equilibration in closed systems, we derive sufficient conditions under which a time-evolved pure state becomes, for most times, operationally indistinguishable from a classical mixture associated with a chosen physical property. We identify two complementary routes to such operational classicality: either the chosen property almost commutes with the system Hamiltonian or the observables used to probe the system lose access to the remaining coherence after equilibration. Our results show that classical behavior need not be confined to the energy basis and may emerge even when substantial coherence remains present in the equilibrium state. This establishes a direct connection between two foundational questions: the origin of thermalization in isolated quantum systems and the quantum-to-classical transition", "url": "https://arxiv.org/abs/2606.19188", "type": "理论", "summary": "经典行为的出现和热平衡的起源是物理学基础中的两个核心问题。在标准解释中，这两种现象通常是通过与外部环境的相互作用来解释的：退相干抑制量子干涉，而与热浴的耦合则推动松弛趋向平衡。然而，在过去的几十年里，很明显，即使在完全隔离的量子系统中，平衡和热化也可能出现，从操作意义上讲，相关可观测值的期望值在大多数时间里都保持接近平衡值。在这里，我们问同样的内在平衡机制是否也可以解释经典行为的出现。利用封闭系统中平衡的严格界限，我们得出了充分的条件，在这些条件下，时间演化的纯态在大多数情况下在操作上与与所选物理性质相关的经典混合物无法区分。\n\n我们确定了实现这种操作经典性的两条互补途径：要么所选择的属性几乎与系统哈密顿量交换，要么用于探测系统的可观测量在平衡后失去了剩余的相干性。我们的结果表明，经典行为不必局限于能量基础，即使在平衡状态下仍然存在大量相干性，经典行为也可能出现。这在两个基本问题之间建立了直接联系：孤立量子系统中热化的起源和量子到经典的转变", "authors": [{"name": "Thiago R. de Oliveira"}, {"name": "Pedro S. Correia"}, {"name": "Tiago Debarba"}, {"name": "Gabriel Dias Carvalho"}, {"name": "Raúl O. Vallejos"}, {"name": "Fernando de Melo"}], "featured_authors": [{"name": "Thiago R. de Oliveira"}, {"name": "Pedro S. Correia"}, {"name": "Tiago Debarba"}, {"name": "Gabriel Dias Carvalho"}, {"name": "Raúl O. Vallejos"}, {"name": "Fernando de Melo"}], "author_count": 6}, {"id": "2606.19239", "category": "quant-ph", "title": "Quantum-Classical Auxiliary-Field Quantum Monte Carlo at the Edge of Practicability", "abstract": "We introduce algorithmic improvements to quantum-classical auxiliary-field quantum Monte Carlo (QC-AFQMC) that reduce the dominant per-step classical scaling from $\\tilde{\\mathcal{O}}(N^{5.5})$ to $\\tilde{\\mathcal{O}}(N^{4.5})$ as a function of the number of molecular spin-orbitals $N$. Central to this improvement is the application of Aitken's block transformation to handle singular Pfaffians arising in the estimation of overlaps between a quantum trial state and classical Slater-determinant walkers. Together with the use of algorithmic differentiation for the computation of the force bias, this yields a $248\\times$ estimated runtime improvement for a system of 100 molecular orbitals. Using our workflow, we demonstrate a ground-state energy calculation for $H_8$ from quantum data collected on IQM Emerald and post-processed with a tensor-network-based error-mitigation technique. We further validate the method's scalability through noiseless simulation of hydrogen chains up to $H_{12}$, and on the lithium-air battery related rearrangement pathway of the $Li_2O_4$ lithium superoxide dimer in a (26e, 20o) active space. We estimate both quantum and classical runtimes for a potential fault-tolerant implementation of QC-AFQMC, showing that the method holds promise for the early fault-tolerant era. These results move QC-AFQMC a step closer to treating chemically relevant systems.", "url": "https://arxiv.org/abs/2606.19239", "type": "数值", "summary": "我们引入了对量子经典辅助场量子蒙特卡罗（QC-AFQMC）的算法改进，将占主导地位的每步经典缩放从 $\\tilde{\\mathcal{O}}(N^{5.5})$ 减少到 $\\tilde{\\mathcal{O}}(N^{4.5})$ 作为分子自旋轨道数量 $N$ 的函数。这一改进的核心是应用艾特肯的块变换来处理在估计量子试验状态和经典斯莱特行列式步行器之间重叠时出现的奇异普法夫式。再加上使用微分算法计算力偏差，对于 100 个分子轨道的系统来说，预计运行时间改进为 248 倍。使用我们的工作流程，我们演示了根据 IQM Emerald 上收集的量子数据计算 $H_8$ 的基态能量，并使用基于张量网络的误差缓解技术进行后处理。我们通过对高达 $H_{12}$ 的氢链的无噪声模拟以及 (26e, 20o) 活性空间中 $Li_2O_4$ 锂超氧化物二聚体的锂空气电池相关重排途径进一步验证了该方法的可扩展性。\n\n我们估计了 QC-AFQMC 潜在容错实现的量子和经典运行时间，表明该方法为早期容错时代带来了希望。这些结果使 QC-AFQMC 距离处理化学相关系统又近了一步。", "authors": [{"name": "Francesco Nappi"}, {"name": "Matthew Kiser"}, {"name": "Fedor Šimkovic IV"}], "featured_authors": [{"name": "Francesco Nappi"}, {"name": "Matthew Kiser"}, {"name": "Fedor Šimkovic IV"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
