 dual manifestation of the classic question of Steenrod, namely the issue of the existence of homology cycles without manifold representatives. Thom developed the theory of cobordisms to answer this question, and we explain how the same analysis leads to Dijkgraaf-Witten phases which are nontrivial on general simplicial complexes but become trivial on manifolds.", "url": "https://arxiv.org/abs/2607.14662", "type": "理论", "summary": "众所周知，玻色子可逆和对称保护拓扑（SPT）相是由低维的普通上同调群描述的，但“超上同调”相出现在更高的维度中。我们对它们进行了系统的研究，发现第一个主要的非平凡性是 mod-3 现象，而不是费米子相的 mod-2 现象。我们还指出，这是Steenrod经典问题的双重表现，即无流形代表的同源循环的存在性问题。 Thom 发展了配边理论来回答这个问题，我们解释了同样的分析如何导致 Dijkgraaf-Witten 相，这些相在一般单纯复形上是不平凡的，但在流形上却变得平凡。", "authors": [{"name": "Shota Saito"}, {"name": "Yuji Tachikawa"}, {"name": "Yi Zhang"}], "featured_authors": [{"name": "Shota Saito"}, {"name": "Yuji Tachikawa"}, {"name": "Yi Zhang"}], "author_count": 3}, {"id": "2607.14891", "category": "hep-th", "title": "Cosmological Collider Signals at Strong Mixing", "abstract": "We study cosmological collider signatures in a two-field inflationary system with constant-turn derivative mixing between the canonically normalized curvature fluctuation and a massive isocurvature field. Building on recently derived exact hypergeometric solutions that treat the quadratic mixing nonperturbatively, we construct the mixed propagators constituting the cosmological correlators. A Mellin-Barnes approach helps isolate the pair of nonanalytic late-time branches carried by a heavy field. For a cubic isocurvature self-interaction, these branches contribute towards a squeezed bispectrum with a power-law envelope and logarithmic oscillations. The oscillation frequency encodes the heavy mass, while the amplitude and phase retain the full mixing dependence rather than a perturbative expansion. We perform the squeezed limit integral analytically and compare it with numerical results across representative masses and mixing strengths. At fixed mixing we derive the large-mass JWKB expansion of the squeezed correlator and its phase. We also give integral representations for the isocurvature Wightman function. The research idea was suggested by ARC, the calculation was performed by GPT, and the results were checked by the authors.", "url": "https://arxiv.org/abs/2607.14891", "type": "理论", "summary": "我们研究了双场膨胀系统中的宇宙学对撞机特征，该系统具有正则归一化曲率涨落和大规模等曲率场之间的常转导数混合。基于最近导出的非微扰处理二次混合的精确超几何解决方案，我们构造了构成宇宙学相关器的混合传播器。 Mellin-Barnes 方法有助于隔离由重场携带的一对非分析晚期分支。对于三次等曲率自相互作用，这些分支有助于形成具有幂律包络和对数振荡的压缩双谱。振荡频率对重质量进行编码，而幅度和相位保留完全的混合依赖性而不是微扰膨胀。我们对压缩极限进行积分分析，并将其与代表性质量和混合强度的数值结果进行比较。在固定混合下，我们推导出压缩相关器的大质量 JWKB 展开式及其相位。我们还给出了等曲率怀特曼函数的积分表示。\n\n研究思路由ARC提出，计算由GPT进行，结果由作者校对。", "authors": [{"name": "Xiangwei Wang"}, {"name": "Yi Wang"}, {"name": "Yunke Zhao"}], "featured_authors": [{"name": "Xiangwei Wang"}, {"name": "Yi Wang"}, {"name": "Yunke Zhao"}], "author_count": 3}, {"id": "2607.15007", "category": "hep-th", "title": "Observers, local measurements, and topology", "abstract": "An observer which propagates in a spacetime with dynamical gravity has access to an algebra of observables which is expected to be a von Neumann algebra with a trace. The observer can use projections from the algebra to perform local measurements. By using this fact we construct a simplicial complex out of measurements recorded on the worldline of the observer and we propose that such a complex captures topological information about spacetime, even when this is fluctuating.", "url": "https://arxiv.org/abs/2607.15007", "type": "理论", "summary": "在具有动力引力的时空中传播的观察者可以访问可观测量的代数，该代数预计是带有迹的冯·诺依曼代数。观察者可以使用代数的投影来执行局部测量。通过利用这一事实，我们根据观察者世界线上记录的测量构造了一个单纯复形，并且我们提出，这样的复形可以捕获有关时空的拓扑信息，即使时空是波动的。", "authors": [{"name": "Michele Cirafici"}], "featured_authors": [{"name": "Michele Cirafici"}], "author_count": 1}, {"id": "2607.15070", "category": "hep-th", "title": "Casimir effect for a massive scalar field confined between parallel plates with a spatially varying effective mass", "abstract": "We investigate the Casimir effect for a massive real scalar field confined between two perfectly reflecting parallel plates in the presence of a position-dependent effective mass, a mechanism for coupling a scalar background to a scalar field. Exact normal modes are obtained by solving the corresponding Klein-Gordon equation, leading to a transverse energy spectrum that exhibits a characteristic Landau-like structure despite the absence of an external magnetic field. Upon quantization of the field, the vacuum energy is evaluated by means of generalized zeta-function regularization together with an appropriate renormalization procedure. The renormalized vacuum energy naturally separates into a Landau-like contribution and an additional term induced by the spatial dependence of the effective mass. We show analytically and numerically that both contributions are exponentially suppressed in the strong-coupling regime. In the opposite limit, the Landau-like contribution smoothly reproduces the standard vacuum energy for a massive scalar field confined between parallel plates, whereas the additional contribution becomes singular owing to the restricted domain of validity of the exact spectrum. Except in the vicinity of this singular limit, the vacuum energy is shown to be dominated by the Landau-like sector. Our results establish a direct connection between position-dependent effective masses and boundary-induced quantum vacuum phenomena, providing a new exactly solvable framework for the investigation of Casimir effects in spatially inhomogeneous relativistic systems.", "url": "https://arxiv.org/abs/2607.15070", "type": "理论", "summary": "我们研究了在存在位置相关有效质量的情况下限制在两个完美反射平行板之间的巨大实标量场的卡西米尔效应，这是一种将标量背景耦合到标量场的机制。通过求解相应的克莱因-戈登方程获得了精确的简正模，从而导致横向能谱在没有外部磁场的情况下表现出特征性的类朗道结构。在场量化后，通过广义 zeta 函数正则化以及适当的重整化程序来评估真空能量。重整化的真空能量自然地分为类朗道贡献和由有效质量的空间依赖性引起的附加项。我们通过分析和数值表明，这两种贡献在强耦合机制中都受到指数抑制。\n\n在相反的极限下，类朗道贡献平滑地再现了限制在平行板之间的巨大标量场的标准真空能量，而由于精确光谱的有效范围的限制，附加贡献变得奇异。除了在这个奇异极限附近之外，真空能量显示出由类朗道扇区主导。我们的结果在位置相关的有效质量和边界引起的量子真空现象之间建立了直接联系，为研究空间非均匀相对论系统中的卡西米尔效应提供了一个新的精确可解的框架。", "authors": [{"name": "R. L. Araújo Xavier"}, {"name": "M. H. B. Chaves"}, {"name": "E. R. Bezerra de Mello"}, {"name": "Herondy Mota"}], "featured_authors": [{"name": "R. L. Araújo Xavier"}, {"name": "M. H. B. Chaves"}, {"name": "E. R. Bezerra de Mello"}, {"name": "Herondy Mota"}], "author_count": 4}, {"id": "2607.15074", "category": "hep-th", "title": "Mirror symmetry in 3d in 3d mirror symmetry", "abstract": "Given a compact CY3 $Y$, its A-side (resp. B-side) universal intermediate Jacobian $X$ (resp. $X^{!}$) admits a natural hyperkahler structure. Both $X$ and $X^{!}$ determines 3d Rozansky-Witten theories, in both A-model and B-model. We describe some surprising 3d mirror symmetry phenomena between $X$ and $X^{!}$. This includes (i) a 3d SYZ construction of $X^{!}$ from $X$ via moduli of certain 3d A-branes in $X$ constructed from $D^{b}\\left( Y,\\Omega \\right) $ with varying stability conditions given by $\\varpi $; (ii) The 3d B-brane on $X^{!}$, constructed from varying $D^{b}\\left( Y,\\Omega \\right) $ with fixed $\\varpi $, is realized as the 3d SYZ transformation of a cotangent fiber 3d A-brane in $X$. Under mirror symmetry between $Y$ and $Y^{\\vee }$, the roles for $X$ and $% X^{!}$ got interchanged. We also construct 3d A- and B-branes in $X$ and $X^{!}$ via DT theory and discrete symmetries on $Y$ and $Y^{\\vee }$.", "url": "https://arxiv.org/abs/2607.15074", "type": "理论", "summary": "给定紧凑的 CY3 $Y$，其 A 侧（或 B 侧）通用中间雅可比行列式 $X$（或 $X^{!}$）承认自然的超卡勒结构。 $X$ 和 $X^{!}$ 都确定 A 模型和 B 模型中的 3d Rozansky-Witten 理论。我们描述了 $X$ 和 $X^{!}$ 之间一些令人惊讶的 3D 镜像对称现象。这包括 (i) 通过 $X$ 中某些 3d A 膜的模数从 $X$ 构建 $X^{!}$ 的 3d SYZ 构造，该模数由 $D^{b}\\left( Y,\\Omega \\right) $ 构造，具有由 $\\varpi $ 给出的不同稳定性条件； (ii) $X^{!}$ 上的 3d B 膜由不同的 $D^{b}\\left( Y,\\Omega \\right) $ 和固定的 $\\varpi $ 构造而成，被实现为 $X$ 中的余切纤维 3d A 膜的 3d SYZ 变换。在 $Y$ 和 $Y^{\\vee }$ 之间的镜像对称下，$X$ 和 $% X^{!}$ 的角色互换了。我们还通过 DT 理论和 $Y$ 和 $Y^{\\vee }$ 上的离散对称性在 $X$ 和 $X^{!}$ 中构建了 3d A 和 B 膜。", "authors": [{"name": "Naichung Conan Leung"}, {"name": "Mengqi Yang"}], "featured_authors": [{"name": "Naichung Conan Leung"}, {"name": "Mengqi Yang"}], "author_count": 2}, {"id": "2607.15083", "category": "hep-th", "title": "Defects extremal surfaces and interface CFTs", "abstract": "We propose a generalization of the defect extremal surface (DES) prescription to holographic interface conformal field theories (ICFTs), extending its applicability beyond the AdS$_3$/BCFT$_2$ framework. We consider a holographic ICFT$_2$ comprising two CFT$_2$s coupled across an interface, dual to two asymptotically AdS$_3$ geometries joined by a codimension-one end-of-the-world (EOW) brane. In the corresponding effective lower-dimensional description obtained via partial dimensional reduction on the brane-boundary combination, the theory on the brane is coupled to gravity, thereby enabling the computation of fine-grained entanglement entropy via the island formula. We demonstrate that the generalized DES prescription exactly reproduces the effective lower-dimensional results for finite subsystems in time-independent scenarios in the large brane tension limit, corresponding to weak gravitational coupling on the EOW brane. We further compute the entanglement entropy of semi-infinite bipartite pure states in radiation subsystems coupled to $2d$ eternal black holes, and obtain the corresponding Page curves.", "url": "https://arxiv.org/abs/2607.15083", "type": "理论", "summary": "我们提出将缺陷极值表面 (DES) 规定推广到全息界面共形场理论 (ICFT)，将其适用性扩展到 AdS$_3$/BCFT$_2$ 框架之外。我们考虑一个全息 ICFT$_2$，它由两个通过界面耦合的 CFT$_2$ 组成，对偶于两个渐近 AdS$_3$ 几何结构，并由一个余维一世界末日 (EOW) 膜连接。在通过膜边界组合部分降维得到的相应有效低维描述中，膜理论与重力耦合，从而能够通过岛公式计算细粒度纠缠熵。我们证明，广义 DES 方案准确地再现了大膜张力极限下与时间无关的场景中有限子系统的有效低维结果，对应于 EOW 膜上的弱引力耦合。我们进一步计算了与$2d$永恒黑洞耦合的辐射子系统中半无限二分纯态的纠缠熵，并获得了相应的Page曲线。", "authors": [{"name": "Ankur Dey"}], "featured_authors": [{"name": "Ankur Dey"}], "author_count": 1}, {"id": "2607.15187", "category": "hep-th", "title": "Type I/II Vortex Dynamics With Excited Normal Modes", "abstract": "We investigate the effects of excited normal modes on vortex dynamics in the Abelian Higgs model in the type I (static attraction) and type II (static repulsion) regimes. We demonstrate that shape normal modes compete with the static inter-vortex forces. This can result in excited type I (II) vortices repelling (attracting). In addition we observe the existence of spectral walls that prevent the formation (break up) of bound states in type I (II) systems. We study the long lived quasi-bound states and orbits induced by their competing forces and the effective centrifugal forces. Finally, we observe that the effect is strong enough to induce vortex-antivortex pairs to follow long-lived orbits.", "url": "https://arxiv.org/abs/2607.15187", "type": "理论", "summary": "我们研究了 I 型（静态吸引）和 II 型（静态排斥）状态下阿贝尔希格斯模型中激发简正模对涡旋动力学的影响。我们证明了形状法向模态与静态涡旋间力的竞争。这可能导致激发的 I (II) 型涡流排斥（吸引）。此外，我们观察到光谱墙的存在，可以防止 I (II) 型系统中束缚态的形成（破裂）。我们研究由它们的竞争力量和有效离心力引起的长寿命准束缚态和轨道。最后，我们观察到这种效应足够强，足以引起涡旋-反涡旋对遵循长期存在的轨道。", "authors": [{"name": "Steffen Krusch"}, {"name": "Morgan Rees"}, {"name": "Thomas Winyard"}], "featured_authors": [{"name": "Steffen Krusch"}, {"name": "Morgan Rees"}, {"name": "Thomas Winyard"}], "author_count": 3}, {"id": "2607.15212", "category": "hep-th", "title": "Magnetic corrections to the fermionic Casimir effect with Lorentz symmetry violation and a compactified extra dimension", "abstract": "In this work I study the effect of a magnetic field on the Casimir effect due to a massive, charged fermion field that violates Lorentz invariance in an aether-like manner while maintaining CPT, in a space with one toroidally compactified extra dimension. I take the fermion field to obey MIT bag boundary conditions on two identical square parallel plates. I do this investigation using the zeta function technique that enables me to calculate the Casimir energy and pressure in the presence of a constant magnetic field perpendicular to the plates. I examine the cases of timelike Lorentz violation, of spacelike Lorentz violation in the direction of the magnetic field, of spacelike Lorentz violation in the direction perpendicular to the magnetic field, and of spacelike Lorentz violation in the direction of the compactified extra dimension. In all scenarios, I find simple and accurate analytic expressions of the magnetic field dependent Casimir energy and pressure.", "url": "https://arxiv.org/abs/2607.15212", "type": "理论", "summary": "在这项工作中，我研究了磁场对卡西米尔效应的影响，这是由于巨大的带电费米子场在具有一个环形致密额外维度的空间中以类以太的方式违反了洛伦兹不变性，同时维持了 CPT。我使费米子场服从两个相同的方形平行板上的麻省理工学院袋边界条件。我使用 zeta 函数技术进行这项研究，该技术使我能够在垂直于板的恒定磁场存在的情况下计算卡西米尔能量和压力。我研究了类时洛伦兹破坏、磁场方向上的类空间洛伦兹破坏、垂直于磁场方向的类空间洛伦兹破坏以及压缩额外维度方向上的类空间洛伦兹破坏的情况。在所有情况下，我都找到了与磁场相关的卡西米尔能量和压力的简单而准确的解析表达式。", "authors": [{"name": "Andrea Erdas"}], "featured_authors": [{"name": "Andrea Erdas"}], "author_count": 1}, {"id": "2607.15236", "category": "hep-th", "title": "Analytical and Numerical Study of Quartic Nonlinear Electrodynamics in Holographic Fermion Systems", "abstract": "We study how the leading string-inspired quartic correction $\\alpha'^2 F^4$ modifies holographic fermionic observables in a bottom-up $AdS_4/CFT_3$ model. The gauge sector is described by Maxwell electrodynamics supplemented by the quartic interaction, while the geometry is kept fixed in the probe approximation. We first analyze the nonlinear electrostatic background and derive an exact first integral of the gauge equation, the associated constitutive relation for the radial electric field, the critical coupling for globally regular solutions, and weak-coupling expansions for the electrostatic potential and chemical potential. We then use these backgrounds to compute the retarded Green's function and spectral function of charged probe fermions. The quartic interaction increases the chemical potential, lowers the effective ratio $T/\\mu$, shifts the Fermi momentum, and enhances the spectral weight without destroying the holographic Fermi surface. We further show that the fermionic observables inherit the even-power dependence on $\\alpha'$ implied by the analytic structure of the gauge sector. The resulting probe-limit analysis makes explicit how quartic bulk nonlinearities propagate from the bulk to boundary fermionic observables.", "url": "https://arxiv.org/abs/2607.15236", "type": "理论", "summary": "我们研究了领先的弦四次校正 $\\alpha'^2 F^4$ 如何在自下而上的 $AdS_4/CFT_3$ 模型中修改全息费米子可观测量。规范部分由麦克斯韦电动力学描述并辅以四次相互作用，而几何形状在探针近似中保持固定。我们首先分析非线性静电背景，并推导规范方程的精确第一积分、径向电场的相关本构关系、全局正则解的临界耦合以及静电势和化学势的弱耦合展开式。然后，我们使用这些背景来计算带电探针费米子的延迟格林函数和光谱函数。四次相互作用增加了化学势，降低了有效比$T/μ$，改变了费米动量，并在不破坏全息费米面的情况下增强了光谱权重。我们进一步表明，费米子可观测量继承了规范扇区的解析结构所隐含的对 $\\alpha'$ 的偶次幂依赖性。\n\n由此产生的探针极限分析明确了四次体非线性如何从体体传播到边界费米子可观测量。", "authors": [{"name": "Vitor Neves da Silva"}, {"name": "Luiz Antonio Barreiro"}], "featured_authors": [{"name": "Vitor Neves da Silva"}, {"name": "Luiz Antonio Barreiro"}], "author_count": 2}, {"id": "2607.15251", "category": "hep-th", "title": "New exact bispectrum shapes in multifield inflation", "abstract": "Using the effective field theory of multiple inflationary fluctuations, we present the first analytical calculation of the primordial bispectrum in which the quadratic mixing between curvature and isocurvature fluctuations is treated non-perturbatively. Building upon the operator representation of the exact linear solutions proposed in Ref.~\\cite{Huenupi:2026abj}, we derive a simpler integral representation for these mixed mode functions. We prove that all scale-invariant tree-level bispectra reduce to a single vertex diagram, which can be evaluated with a Schwinger-parameter integral over independent pre-computable leg kernels. We showcase the power of our approach by considering the cubic time-derivative interaction $\\dot{\\pic}^3$, which leads to a purely single-field, equilateral phenomenology at small mixing. On the contrary, at strong mixing the obtained bispectrum shapes decorrelate from the equilateral template and become genuinely multifield, with a large amplitude, motivating a dedicated data analysis. The squeezed limit is obtained analytically in a closed form at any dimensionless mixing strength $\\la$ for an isocurvature field of bare mass $m$ and features a cosmological collider signal set by $\\nu_{\\rm eff} = i \\muf=\\sqrt{9/4-m^2/H^2-\\la^2}$, with an effective mass dressed by $\\la$, as previously evidenced in numerical or semi-analytical calculations. Our results encompass the $\\la \\ll 1$ limit of usual perturbative calculations, where the amplitude of the signal is necessarily small, but they also surpass them, thus opening a new analytical window into large multifield primordial non-Gaussianities.", "url": "https://arxiv.org/abs/2607.15251", "type": "理论", "summary": "利用多重暴胀涨落的有效场理论，我们提出了原初双谱的第一个解析计算，其中曲率和等曲率涨落之间的二次混合被非扰动地处理。基于 Ref.~\\cite{Huenupi:2026abj} 中提出的精确线性解的算子表示，我们得出了这些混合模式函数的更简单的积分表示。我们证明所有尺度不变的树级双谱都简化为单个顶点图，可以使用独立的可预先计算的腿核上的施温格参数积分来评估该顶点图。我们通过考虑三次时间导数相互作用 $\\dot{\\pic}^3$ 来展示我们方法的强大功能，这会在小混合下产生纯粹的单场、等边现象学。相反，在强混合时，获得的双谱形状与等边模板去相关，并成为真正的多场，具有很大的振幅，从而激发了专门的数据分析。\n\n压缩极限是在裸质量 $m$ 的等曲率场的任何无量纲混合强度 $\\la$ 下以封闭形式解析获得的，并具有由 $\\nu_{\\rm eff} = i \\muf=\\sqrt{9/4-m^2/H^2-\\la^2}$ 设置的宇宙对撞机信号，有效质量由 $\\la$ 修饰，如先前在数值或半解析计算中所证明的那样。我们的结果涵盖了通常微扰计算的 $\\la \\ll 1$ 极限，其中信号的幅度必然很小，但它们也超过了它们，从而为大型多场本初非高斯性打开了一个新的分析窗口。", "authors": [{"name": "Lucas Pinol"}], "featured_authors": [{"name": "Lucas Pinol"}], "author_count": 1}, {"id": "2607.15261", "category": "hep-th", "title": "Relativistic time-commutative dynamics with $κ$-plane noncommutativity", "abstract": "In the last decades, spacetime noncommutativity and the associated deformations of relativistic symmetries have attracted a lot of interest, as several phenomenological windows into quantum gravity are approaching genuine Planck-scale sensitivity. However, the physical significance of the mathematical structures introduced to deal with spacetime noncommutativity is still debated, and some crucial pieces are missing or poorly understood. From time to time it has been suggested that valuable insight into these conceptual challenges could come from the analysis of appropriately designed first-quantized toy models, in which major technical and interpretive issues can be effectively managed or sidestepped altogether. In this paper we take seriously this suggestion and develop the first fully consistent and fully relativistic first-quantized model of two particles propagating and interacting on a noncommutative spacetime. The specific spacetime noncommutativity implemented in our model, which we call 'time-commutative $\\kappa$-plane', had already been proposed as a suitable arena for a first-quantized analysis, but previous studies were mostly heuristic and failed to provide a full description of the deformed relativistic symmetries. We here go much beyond those pioneering attempts: we find a full characterization of the appropriate deformed Poincaré symmetry algebra as well as its Galilean limit; we build a single-particle quantum model carrying an irreducible representation of the deformed Galilei algebra; we exhibit two consistent, Galilean-relativistic descriptions of a system of two quantum particles interacting via a deformed harmonic potential, finding that the structure of the two-particle symmetry generators is intimately connected with the deformation of the interaction law.", "url": "https://arxiv.org/abs/2607.15261", "type": "理论", "summary": "在过去的几十年里，时空不可交换性和相对论对称性的相关变形引起了人们的广泛兴趣，因为量子引力的几个唯象窗口正在接近真正的普朗克尺度的灵敏度。然而，为处理时空不可交换性而引入的数学结构的物理意义仍然存在争议，并且一些关键部分缺失或理解甚少。有时有人提出，对这些概念挑战的有价值的见解可以来自对适当设计的第一量化玩具模型的分析，其中主要的技术和解释问题可以得到有效管理或完全回避。在本文中，我们认真对待这一建议，并开发了第一个完全一致且完全相对论的第一量子模型，用于描述两个粒子在非交换时空上传播和相互作用的模型。\n\n我们的模型中实现的特定时空非交换性，我们称之为“时间交换$\\kappa$平面”，已经被提议作为首次量化分析的合适场所，但之前的研究大多是启发式的，未能提供变形相对论对称性的完整描述。我们在这里远远超出了那些开创性的尝试：我们发现了适当的变形庞加莱对称代数及其伽利略极限的完整表征；我们建立了一个单粒子量子模型，带有变形伽利略代数的不可约表示；我们对两个量子粒子通过变形谐波势相互作用的系统展示了两种一致的伽利略相对论描述，发现双粒子对称发生器的结构与相互作用定律的变形密切相关。", "authors": [{"name": "Alessandro Moia"}, {"name": "Stefano Stocchetti"}, {"name": "Giovanni Amelino-Camelia"}], "featured_authors": [{"name": "Alessandro Moia"}, {"name": "Stefano Stocchetti"}, {"name": "Giovanni Amelino-Camelia"}], "author_count": 3}, {"id": "2607.14343", "category": "math-ph", "title": "Quantum Markov Chains for an Asymmetric Mixed Ising-XY Model on a Cayley Tree", "abstract": "We study a mixed quantum Ising-$XY$ model on the semi-infinite rooted Cayley tree of order two. For every vertex $u$, the edge $\\langle u,(u,1)\\rangle$ carries an $XY$ interaction and the edge $\\langle u,(u,2)\\rangle$ carries an Ising interaction. Using the compatibility criterion for tree-indexed quantum Markov chains and consistently working with the normalized trace, we derive the translation-invariant boundary equation and compute explicitly the associated local transfer operator, namely the one-step partial-trace map which propagates successor boundary data to the parent vertex. We prove that the boundary equation has a unique positive translation-invariant solution for all $J_I,J_{XY}\\in\\mathbb R$ and $\\beta>0$. Hence the model admits a unique translation-invariant quantum Markov chain generated by a positive translation-invariant boundary condition. We also show that the reduced boundary-law dynamics, i.e. the induced finite-dimensional recursion for the boundary-law parameters, has no admissible periodic points of period greater than one and compute the local two-site entanglement on the natural three-site cluster of the tree.", "url": "https://arxiv.org/abs/2607.14343", "type": "理论", "summary": "我们研究了二阶半无限有根凯莱树上的混合量子 Ising-$XY$ 模型。对于每个顶点 $u$，边 $\\langle u,(u,1)\\rangle$ 带有 $XY$ 交互作用，边 $\\langle u,(u,2)\\rangle$ 带有 Ising 交互作用。使用树索引量子马尔可夫链的兼容性标准并始终使用归一化迹，我们推导了平移不变边界方程并显式计算相关的局部传递算子，即将后继边界数据传播到父顶点的一步部分迹图。我们证明边界方程对于所有 $J_I,J_{XY}\\in\\mathbb R$ 和 $\\beta>0$ 都有唯一的正平移不变解。因此，该模型承认由正平移不变边界条件生成的唯一平移不变量子马尔可夫链。我们还表明，简化的边界律动力学，即边界律参数的诱导有限维递归，没有允许的周期大于 1 的周期点，并计算树的自然三点簇上的局部两点纠缠。", "authors": [{"name": "Farrukh Mukhamedov"}], "featured_authors": [{"name": "Farrukh Mukhamedov"}], "author_count": 1}, {"id": "2607.14409", "category": "math-ph", "title": "On Factorizing Aggregate Counting Distributions into Independent Latent Processes", "abstract": "Given only the probability distribution of an aggregate counting variable, what independent latent counting processes are compatible with the observation? Equivalently, when does a probability-generating function admit a factorization into normalized polynomials with nonnegative coefficients? We develop a mathematical theory of such positive factorizations. We introduce the positive factorization poset, whose elements are all positive factorizations ordered by refinement, and define the factorization entropy, measuring the maximal latent Shannon entropy compatible with the observed distribution. We prove a sharp entropy inequality, characterize the equality case by injectivity of the latent addition map, show that entropy optimization may be restricted to maximal atomizations, and exhibit examples where distinct maximal atomizations have different entropy. We further establish support-based obstructions to positive factorization, characterize the real-rooted and Hurwitz-stable sectors, prove a local stability theorem for coprime factorizations, determine exactly the factorable regions in degrees two and three, obtain an exact quartic Hurwitz volume, and investigate the geometry of the factorable region inside the probability simplex through exact calculations and Monte Carlo experiments. These results identify the positive factorization poset as a natural algebraic object associated with probability-generating functions and provide a framework for studying latent independent structure in aggregate counting statistics.", "url": "https://arxiv.org/abs/2607.14409", "type": "理论", "summary": "仅给定聚合计数变量的概率分布，哪些独立的潜在计数过程与观察结果兼容？同样，概率生成函数何时允许分解为具有非负系数的归一化多项式？我们发展了这种正因式分解的数学理论。我们引入正因式分解偏序集，其元素都是通过细化排序的正因式分解，并定义因式分解熵，测量与观察到的分布兼容的最大潜在香农熵。我们证明了尖锐的熵不等式，通过潜在加法图的单射性来表征等式情况，表明熵优化可能仅限于最大原子化，并展示了不同最大原子化具有不同熵的示例。\n\n我们进一步建立了基于支持的正因式分解障碍，描述了实根和赫尔维茨稳定扇区，证明了互质因式分解的局部稳定性定理，精确确定了二阶和三阶的可因式分解区域，获得了精确的四次赫尔维茨体积，并通过精确计算和蒙特卡罗实验研究了概率单纯形内可因式分解区域的几何形状。这些结果将正因式分解偏序集识别为与概率生成函数相关的自然代数对象，并为研究聚合计数统计中的潜在独立结构提供了框架。", "authors": [{"name": "Israel Klich"}], "featured_authors": [{"name": "Israel Klich"}], "author_count": 1}, {"id": "2607.14752", "category": "math-ph", "title": "Polar Form of the Dirac Operator in Low-Dimensional Space-Times", "abstract": "We express in polar form the Dirac operator as left-multiplication by an assigned matrix: we use this technique to find its right-resolvent for low-dimensional spaces.", "url": "https://arxiv.org/abs/2607.14752", "type": "理论", "summary": "我们以极坐标形式将狄拉克算子表示为与指定矩阵的左乘：我们使用这种技术来找到其对低维空间的右解。", "authors": [{"name": "Luca Fabbri"}, {"name": "Giuseppe De Maria"}], "featured_authors": [{"name": "Luca Fabbri"}, {"name": "Giuseppe De Maria"}], "author_count": 2}, {"id": "2607.14918", "category": "math-ph", "title": "A C++ implementation of the G-Scheme stiff ODE solver with multi-resolution sparse hash-table kernel lookup", "abstract": "The G-Scheme is an explicit, adaptive integration framework for stiff systems of ordinary differential equations that exploits a local time-scale decomposition provided by the eigensystem of the Jacobian (the kernel set). Its computational cost is dominated by the evaluation of a new kernel set at each time step. In a recent paper [ this http URL Galassi and this http URL , Combust. Theory Model. 2025], we introduced a multi-resolution sparse hash-table strategy that replaces online kernel computation with retrieval from a precomputed lookup table, demonstrated in Python. Here we present cpp-gscheme, a production-grade C++ implementation of both the G-Scheme and the multi-resolution hash table, together with the porting methodology that guarantees behavioural equivalence with the Python reference: identical scaling, binning and hashing semantics, a bitwise-inert retrieval hook in the integrator, and a fully native evaluation path for the chemical source terms. On 33 n-heptane autoignition mechanisms spanning 56-459 species plus the detailed 654-species mechanism, the hash-tabulated C++ G-Scheme retrieves 100 percent of the kernel sets, performs zero online eigen decompositions, and outperforms the natively compiled CVODE solver by a factor increasing from 2.7x (56 species) to 9.3x (654 species), with observed cost scaling of approximately N power 1.4 versus CVODE's N power 1.9. A three-metric accuracy assessment (ignition delay, equilibrium state, and accumulated entropy-progress error) shows that the solver contributes negligibly to the overall error budget, which is dominated by skeletal reduction. Consequently, a 5 percent ignition-delay target is achieved by the 80-species skeletal mechanism with a 225x speed-up over CVODE on the detailed mechanism. The software, training-set builders, and benchmark drivers are released as open source.", "url": "https://arxiv.org/abs/2607.14918", "type": "理论", "summary": "G 方案是针对常微分方程刚性系统的显式自适应积分框架，它利用雅可比行列式本征系统（核集）提供的局部时间尺度分解。其计算成本主要取决于每个时间步对新内核集的评估。在最近的一篇论文中 [这个 http URL Galassi 和这个 http URL，Combust。理论模型。 2025]，我们引入了一种多分辨率稀疏哈希表策略，该策略用从预先计算的查找表中检索来代替在线内核计算，这在 Python 中进行了演示。在这里，我们介绍 cpp-gscheme，它是 G-Scheme 和多分辨率哈希表的生产级 C++ 实现，以及保证与 Python 参考行为等效的移植方法：相同的缩放、分箱和哈希语义、积分器中的按位惰性检索挂钩以及化学源术语的完全本机评估路径。\n\n在涵盖 56-459 种物质的 33 种正庚烷自燃机制以及详细的 654 种物质机制中，散列表式 C++ G 方案检索 100% 的内核集，执行零在线特征分解，并以从 2.7 倍（56 种物质）增加到 9.3 倍（654 种物质）的倍数超越本地编译的 CVODE 求解器，观察到的成本缩放约为 N 1.4 次方与 CVODE 的 N 次方 1.9 次对比。三指标精度评估（点火延迟、平衡状态和累积熵进度误差）表明，求解器对总体误差预算的贡献可以忽略不计，总体误差预算主要是骨架减少。因此，80 种骨架机构实现了 5% 的点火延迟目标，详细机构上的速度比 CVODE 提高了 225 倍。软件、训练集构建器和基准驱动程序均作为开源发布。", "authors": [{"name": "Riccardo Malpica Galassi"}, {"name": "Mauro Valorani"}], "featured_authors": [{"name": "Riccardo Malpica Galassi"}, {"name": "Mauro Valorani"}], "author_count": 2}, {"id": "2607.15013", "category": "math-ph", "title": "Quasi-Pfaffian Solutions to Integrable Systems via Sylvester-Moutard Transformations", "abstract": "In this paper, we introduce a mathematical structure called the quasiPfaffian. The quasiPfaffian is analogous to the quasideterminant, a structure used instead of a determinant in noncommutative settings. Building on the Sylvester identity for the quasiPfaffian, we develop a novel transformation, named the Sylvester Moutard transform, this generates new solutions for Moutard transformable integrable systems, such as the Novikov Veselov equation and the two dimensional sine Gordon equation. We also briefly review the classical Moutard transformation in the context of quasiPfaffians and discuss several additional properties of this new object.", "url": "https://arxiv.org/abs/2607.15013", "type": "理论", "summary": "在本文中，我们介绍了一种称为拟普法夫的数学结构。拟普法夫类似于准行列式，是一种在非交换设置中代替行列式的结构。基于拟普法夫方程的 Sylvester 恒等式，我们开发了一种新颖的变换，称为 Sylvester Moutard 变换，这为 Moutard 可变换可积系统生成新的解，例如 Novikov Veselov 方程和二维正弦 Gordon 方程。我们还简要回顾了准普法夫背景下的经典 Moutard 变换，并讨论了这个新对象的几个附加属性。", "authors": [{"name": "Claire R Gilson"}, {"name": "Chen Shu"}], "featured_authors": [{"name": "Claire R Gilson"}, {"name": "Chen Shu"}], "author_count": 2}, {"id": "2607.15233", "category": "math-ph", "title": "Study of Duffing oscillator using an improved Lindstedt Poincare method and relevant comparisons", "abstract": "The undamped Duffing oscillator is a nonlinear dynamical system with broad applications in physics, engineering and biological system. We present a comprehensive analysis of this system using the Lindstedt Poincare method (LPM) and its modifications and make comparison with numerical solution obtained using higher order Runge-Kutta. It is also shown the method suggested in this article converges better than the standard LPM and Lindstedt Poincare method with Burton's modification.", "url": "https://arxiv.org/abs/2607.15233", "type": "理论", "summary": "无阻尼杜芬振子是一种非线性动力系统，在物理、工程和生物系统中有着广泛的应用。我们使用 Lindstedt Poincare 方法 (LPM) 及其修改对该系统进行了全面分析，并与使用高阶龙格库塔获得的数值解进行了比较。还表明，本文提出的方法比标准 LPM 和经过 Burton 修改的 Lindstedt Poincare 方法收敛得更好。", "authors": [{"name": "Ramij Ahamed"}, {"name": "Subhankar Ray"}], "featured_authors": [{"name": "Ramij Ahamed"}, {"name": "Subhankar Ray"}], "author_count": 2}, {"id": "2607.15237", "category": "math-ph", "title": "\"Goldfish'' equations for infinitely many particles", "abstract": "The ``goldfish'' equations, so named because of their striking beauty, are a system of $N$ nonlinear ODE's, where $N$ is an arbitrary integer. They can be solved exactly in a very simple manner, by transforming them to free motion using a transformation involving the transition from the set of {\\em coefficients\\/} of a polynomial to that of its {\\em zeroes}. This paper aims to explore the possibility of extending this solution to the case in which $N$ is infinite. The main difficulty involves the transition from polynomials to entire functions. Another approach using non-standard analysis, is left to future work.", "url": "https://arxiv.org/abs/2607.15237", "type": "理论", "summary": "“金鱼”方程因其惊人的美感而得名，是一个由 $N$ 非线性 ODE 组成的系统，其中 $N$ 是任意整数。它们可以通过一种非常简单的方式精确求解，通过使用涉及从多项式的{\\em系数\\/}集合到其{\\em零}集合的变换将它们变换为自由运动。本文旨在探讨将该解决方案扩展到 $N$ 无穷大情况的可能性。主要困难涉及从多项式到整个函数的转变。另一种使用非标准分析的方法留待未来工作。", "authors": [{"name": "Francois Leyvraz"}], "featured_authors": [{"name": "Francois Leyvraz"}], "author_count": 1}, {"id": "2607.14175", "category": "quant-ph", "title": "Transducer leakage error suppression using invariant-based shortcut", "abstract": "We present a method for suppressing transducer leakage errors in spin-superconducting hybrid quantum systems with the theory of optimal invariant-based shortcut. By mediated virtual photons as a transducer to exchange the energy between the spin qubit and a transmon qubit, the fidelity of the population of the final state features a broad range above 99\\% under the influence of leakage error. The leakage probability from computational subspace to non-computational subspace can be effectively suppressed at a lowest value with $0.01$. Based on the optimized pulse control designed by the invariant-based inverse engineering, the high-fidelity quantum iSWAP gate operations and entanglement state preparation within the computational subspace are achieved. {Compared to the traditional $\\pi$ pulse, derivative removal by adiabatic gate, counter-diabatic shortcut schemes, and limited-memory Broyden-Fletcher-Goldfarb-Shanno gradient ascent pulse engineering, the optimized shortcut scheme can still achieve a high fidelity with 99\\% in the presence of decoherence and control error.} When taking into account the possibility of leakage errors in actual situations, our solution can still largely resist the influence of control errors. The results provides a feasible path for precisely manipulating the quantum state of hybrid quantum systems.", "url": "https://arxiv.org/abs/2607.14175", "type": "理论+数值", "summary": "我们提出了一种利用基于最优不变量的捷径理论来抑制自旋超导混合量子系统中换能器泄漏误差的方法。通过介导的虚拟光子作为换能器在自旋量子位和跨量子位之间交换能量，在泄漏误差的影响下，最终状态的总体保真度具有超过 99％ 的广泛范围。从计算子空间到非计算子空间的泄漏概率可以有效地抑制在最低值$0.01$。基于基于不变性的逆向工程设计的优化脉冲控制，实现了计算子空间内的高保真量子iSWAP门操作和纠缠态准备。\n\n{与传统的$\\pi$脉冲、绝热门去除导数、反绝热捷径方案和有限内存Broyden-Fletcher-Goldfarb-Shanno梯度上升脉冲工程相比，优化的捷径方案在存在退相干和控制误差的情况下仍然可以达到99\\%的高保真度。}当考虑到实际情况中泄漏误差的可能性时，我们的解决方案仍然可以很大程度上抵抗控制误差的影响。研究结果为精确操控混合量子系统的量子态提供了一条可行的途径。", "authors": [{"name": "Shi-Qiang Qiao"}, {"name": "Zheng Shan"}, {"name": "Xue-Ke Song"}, {"name": "Shi-Lei Su"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "featured_authors": [{"name": "Shi-Qiang Qiao"}, {"name": "Zheng Shan"}, {"name": "Xue-Ke Song"}, {"name": "Shi-Lei Su"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "author_count": 6}, {"id": "2607.14217", "category": "quant-ph", "title": "Analytic gradients for low-rank quantum optimal control", "abstract": "We introduce low-rank optimal control (LROC), a method for designing control pulses in open quantum systems whose full density-matrix simulation is prohibitively expensive. The method exploits a feature of quantum computing itself: because protocols are designed to preserve purity, the density matrix is dominated by a few pure states and admits an accurate low-rank factorization. LROC propagates only this factorized form and, by deriving the corresponding adjoint equation, obtains the gradient of any differentiable objective at the same reduced cost as the simulation, leading to a quadratic improvement in time and memory compared to the full master equation. We illustrate the breadth of the method on four superconducting-circuit tasks: preparation of a five-qubit GHZ state, a CNOT gate, qubit readout, and an error correction primitive, modeled with realistic multilevel transmons, decay, and strong drives, in each case reaching fidelities consistent with the intrinsic dissipation limits. LROC thereby extends pulse-level optimization to system sizes beyond the reach of existing gradient-based methods.", "url": "https://arxiv.org/abs/2607.14217", "type": "理论+数值", "summary": "我们引入了低阶最优控制（LROC），这是一种在开放量子系统中设计控制脉冲的方法，其全密度矩阵模拟的成本极其昂贵。该方法利用了量子计算本身的一个特征：因为协议的设计是为了保持纯度，所以密度矩阵由一些纯态主导，并允许精确的低秩分解。 LROC 仅传播这种分解形式，并通过推导相应的伴随方程，以与仿真相同的降低成本获得任何可微分目标的梯度，与完整主方程相比，导致时间和内存的二次改进。我们在四个超导电路任务上说明了该方法的广度：准备五量子位 GHZ 状态、CNOT 门、量子位读出和纠错原语，用现实的多级传输、衰减和强驱动进行建模，在每种情况下都达到与内在耗散极限一致的保真度。因此，LROC 将脉冲级优化扩展到了现有基于梯度的方法无法达到的系统尺寸。", "authors": [{"name": "Leo Goutte"}, {"name": "Vincenzo Savona"}], "featured_authors": [{"name": "Leo Goutte"}, {"name": "Vincenzo Savona"}], "author_count": 2}, {"id": "2607.14227", "category": "quant-ph", "title": "Principles of Quantum Optimization for Constrained Problems", "abstract": "Constrained combinatorial optimization underlies many industrial and technological decision problems. We develop a spectral theory that unifies many quantum optimization algorithms. We show that computational slowdown is driven by entanglement restructuring: the creation, redistribution, and destruction of entanglement during system evolution. The severity of the slowdown depends on how much entanglement must be changed. We show that algebraic properties of constraints induce such restructuring, and that constraint-aware dynamics reduce the associated slowdown by avoiding unnecessary restructuring. This framework explains why constraint-aware quantum methods can outperform generic penalty-based approaches. The theory connects constrained optimization, computational complexity, entanglement dynamics, and Hamiltonian spectral structure across continuous-time and circuit-based quantum optimization paradigms.", "url": "https://arxiv.org/abs/2607.14227", "type": "理论+数值", "summary": "约束组合优化是许多工业和技术决策问题的基础。我们开发了一种统一许多量子优化算法的谱理论。我们证明计算速度减慢是由纠缠重组驱动的：系统演化过程中纠缠的创建、重新分配和破坏。放缓的严重程度取决于必须改变多少纠缠。我们表明，约束的代数属性会引发这种重组，并且约束感知动态通过避免不必要的重组来减少相关的减速。该框架解释了为什么约束感知量子方法可以优于基于惩罚的通用方法。该理论将连续时间和基于电路的量子优化范式中的约束优化、计算复杂性、纠缠动力学和哈密顿谱结构联系起来。", "authors": [{"name": "Einar Gabbassov"}, {"name": "Gurpahul Singh"}, {"name": "Achim Kempf"}], "featured_authors": [{"name": "Einar Gabbassov"}, {"name": "Gurpahul Singh"}, {"name": "Achim Kempf"}], "author_count": 3}, {"id": "2607.14282", "category": "quant-ph", "title": "Worldline-Susceptibility Scheduling for Quantum Annealing Beyond Local-Adiabatic Evolution", "abstract": "The performance of quantum annealing depends critically on how the available annealing time is distributed along the evolution. Although the Roland Cerf local adiabatic schedule is theoretically optimal, it requires complete knowledge of the instantaneous spectral gap, making it impractical for large optimization problems. We propose a computationally inexpensive surrogate schedule based on the worldline magnetization susceptibility measured during simulated quantum annealing. The susceptibility is obtained directly from equilibrium Monte Carlo sampling and identifies the critical region of the anneal without requiring spectral information. Using exact diagonalization of Sherrington Kirkpatrick spin glass instances as ground truth, we show that the resulting schedule consistently outperforms conventional linear annealing and, for a substantial fraction of instances, also surpasses the exact Roland Cerf schedule. We demonstrate that this unexpected behaviour originates from two finite time failure modes of exact local adiabatic scheduling a boundary gap trap, in which the minimum spectral gap occurs at the end of the anneal, and an oscillatory instability caused by excessively localized time allocation around an interior minimum gap. These results suggest that robust scheduling based on inexpensive equilibrium observables can outperform exact spectral gap based strategies under realistic finite time conditions. The complete methodology is implemented in the open source Qanneal framework.", "url": "https://arxiv.org/abs/2607.14282", "type": "理论+数值", "summary": "量子退火的性能主要取决于可用退火时间在演化过程中的分布情况。尽管 Roland Cerf 局部绝热调度在理论上是最优的，但它需要完全了解瞬时谱间隙，这使得它对于大型优化问题来说不切实际。我们根据模拟量子退火期间测量的世界线磁化强度提出了一种计算成本低廉的替代方案。磁化率直接从平衡蒙特卡罗采样中获得，无需光谱信息即可识别退火的临界区域。使用 Sherrington Kirkpatrick 自旋玻璃实例的精确对角化作为基本事实，我们表明所得到的时间表始终优于传统的线性退火，并且在很大一部分实例中，也超过了精确的 Roland Cerf 时间表。\n\n我们证明了这种意想不到的行为源于精确局部绝热调度边界间隙陷阱的两种有限时间故障模式，其中最小谱间隙出现在退火结束时，以及由于内部最小间隙周围过度局部时间分配而引起的振荡不稳定。这些结果表明，在现实的有限时间条件下，基于廉价平衡可观测量的鲁棒调度可以优于基于精确谱间隙的策略。完整的方法在开源 Qanneal 框架中实现。", "authors": [{"name": "Suraj Singh"}, {"name": "Lakshya Nagpal"}, {"name": "Vikas Chauhan"}, {"name": "S.R. Hassan"}], "featured_authors": [{"name": "Suraj Singh"}, {"name": "Lakshya Nagpal"}, {"name": "Vikas Chauhan"}, {"name": "S.R. Hassan"}], "author_count": 4}, {"id": "2607.14308", "category": "quant-ph", "title": "An end-to-end quantum algorithm for weakly nonlinear plasma physics with superquadratic speedup", "abstract": "Nonlinear kinetic plasma simulation is high-dimensional and classically demanding, while quantum algorithms face different bottlenecks: embedding nonlinear dynamics into a linear computation, loading dense field-interaction data, and efficiently extracting information. We present an end-to-end quantum algorithm, with rigorous convergence guarantees, for a weakly nonlinear kinetic plasma model. The system describes a 3D electron-ion plasma with adiabatic electrons, kinetic ions, Debye screening, and Krook relaxation. After Fourier-Hermite truncation, the dynamics reduces to a high-dimensional quadratic ordinary differential equation. To tackle quantum bottlenecks we combine three key ingredients. First, we use a plasma free energy to identify a Lyapunov transform under which a Carleman linear embedding converges exponentially in the truncation order within a certified weakly nonlinear regime. Second, we develop a hierarchical block-encoding protocol for dense matrices, exploiting the spatial decay of the field to avoid polynomial overhead from sparse access encodings. Third, we introduce a subroutine for information extraction that exploits nonlinear components encoded in the full Carleman history state to improve the estimation of linear observables. We construct a quantum algorithm to estimate the spacetime-averaged kinetic energy using $\\widetilde{O}\\!\\left( N_F N_H^{1/2} \\operatorname{polylog}\\!\\left(\\frac{T}{\\epsilon}\\right)\\frac{1}{\\epsilon}\\right)$ gates and $\\widetilde{O}\\!\\left(\\log\\!\\left(N_F N_H^{1/2}T\\right)\\log\\!\\left(\\frac{1}{\\epsilon}\\right)\\right)$ qubits, where $N_F$ and $N_H$ are the Fourier and Hermite cutoffs. Relative to a Fourier-Hermite spectral solver, this yields exponential memory savings and superquadratic improvements in time. Together, these results establish a controlled nonlinear plasma benchmark for quantum simulation.", "url": "https://arxiv.org/abs/2607.14308", "type": "理论+数值", "summary": "非线性动力学等离子体模拟是高维且经典的要求，而量子算法面临着不同的瓶颈：将非线性动力学嵌入到线性计算中、加载密集的场相互作用数据以及有效地提取信息。我们为弱非线性动力学等离子体模型提出了一种具有严格收敛保证的端到端量子算法。该系统描述了具有绝热电子、动能离子、德拜屏蔽和克鲁克弛豫的 3D 电子离子等离子体。经过傅里叶-埃尔米特截断后，动力学简化为高维二次常微分方程。为了解决量子瓶颈，我们结合了三个关键要素。首先，我们使用等离子体自由能来识别李亚普诺夫变换，在该变换下，卡尔曼线性嵌入在经过认证的弱非线性区域内以截断顺序呈指数收敛。其次，我们为密集矩阵开发了一种分层块编码协议，利用场的空间衰减来避免稀疏访问编码带来的多项式开销。\n\n第三，我们引入了一个信息提取子程序，该子程序利用在完整卡尔曼历史状态中编码的非线性分量来改进线性可观测量的估计。我们构造一个量子算法，使用 $\\widetilde{O}\\!\\left( N_F N_H^{1/2} \\operatorname{polylog}\\!\\left(\\frac{T}{\\epsilon}\\right)\\frac{1}{\\epsilon}\\right)$ 门和 $\\widetilde{O}\\!\\left(\\log\\!\\left(N_F) 来估计时空平均动能N_H^{1/2}T\\right)\\log\\!\\left(\\frac{1}{\\epsilon}\\right)\\right)$ 个量子位，其中 $N_F$ 和 $N_H$ 是傅里叶和埃尔米特截止值。相对于傅里叶-埃尔米特谱求解器，这可以节省指数级的内存并在时间上实现超二次方的改进。这些结果共同为量子模拟建立了受控非线性等离子体基准。", "authors": [{"name": "Bjorn K. Berntson"}, {"name": "David Jennings"}, {"name": "Matteo Lostaglio"}, {"name": "Scott Parker"}], "featured_authors": [{"name": "Bjorn K. Berntson"}, {"name": "David Jennings"}, {"name": "Matteo Lostaglio"}, {"name": "Scott Parker"}], "author_count": 4}, {"id": "2607.14344", "category": "quant-ph", "title": "Collapse and Inversion of the Josephson Potential in a Strongly Driven Superconducting Circuit", "abstract": "Superconducting circuits embedding Josephson junctions leverage microwave drives for control and measurement of quantum states. Although increasing the drive power is desirable for improving the efficiency of these operations, it eventually triggers unwanted transitions to uncontrolled states. While careful choice of circuit symmetries and parameters can mitigate these effects, the presence of spurious circuit modes spoils the resilience to high power. In this work, we engineer a transmon-resonator system free of any detrimental unwanted transitions. This resilience enables us to access drive powers at which we uncover a remarkable physical phenomenon: the collapse and inversion of the Josephson potential. Through spectroscopy and readout experiments, we confirm that the driven potential goes to zero and inverts as the power increases. The inversion corresponds to the dynamical stabilization of the transmon at its unstable equilibrium point, directly analogous to an inverted pendulum. This result reveals a new limitation of strongly driven superconducting circuits beyond drive-induced transitions. In addition, the dynamical renormalization of the Josephson potential opens up novel avenues for the control of superconducting circuits, and the autonomous stabilization of noise-resilient quantum states.", "url": "https://arxiv.org/abs/2607.14344", "type": "实验", "summary": "嵌入约瑟夫森结的超导电路利用微波驱动来控制和测量量子态。尽管增加驱动功率对于提高这些操作的效率是有利的，但它最终会触发到不受控制状态的不需要的转变。虽然仔细选择电路对称性和参数可以减轻这些影响，但杂散电路模式的存在会破坏高功率的恢复能力。在这项工作中，我们设计了一个跨谐振器系统，没有任何有害的不需要的转变。这种弹性使我们能够获得驱动力，从而发现一个显着的物理现象：约瑟夫森势的崩溃和反转。通过光谱学和读出实验，我们确认驱动电势变为零并随着功率的增加而反转。倒转对应于反式在其不稳定平衡点的动态稳定，直接类似于倒立摆。这一结果揭示了强驱动超导电路在驱动引起的转变之外的新局限性。\n\n此外，约瑟夫森势的动态重整化为超导电路的控制和抗噪声量子态的自主稳定开辟了新途径。", "authors": [{"name": "Sercan Deve"}, {"name": "Marius Villiers"}, {"name": "Marijn A. Morssink"}, {"name": "Robin C. Dekker"}, {"name": "Gary A. Steele"}], "featured_authors": [{"name": "Sercan Deve"}, {"name": "Marius Villiers"}, {"name": "Marijn A. Morssink"}, {"name": "Robin C. Dekker"}, {"name": "Gary A. Steele"}], "author_count": 5}, {"id": "2607.14370", "category": "quant-ph", "title": "Unified monogamy and polygamy relations for multipartite systems", "abstract": "For a bipartite entanglement measure $\\mathcal{E}$ that satisfies the $\\gamma$th-power monogamy inequality (Eq.~\\eqref{e:chap1-ineq1}), and for its assisted counterpart $\\mathcal{E}_a$ that obeys the $\\delta$th-power polygamy inequality (Eq.~\\eqref{e:chap1-ineq2}), we introduce a unified, tunable framework indexed by a parameter $m\\geq1$. Within this framework, we derive two hierarchical families of refined inequalities: a tightened $\\alpha$-power monogamy relation for $\\mathcal{E}$, valid for all $\\alpha \\geq m\\gamma$; a tightened $\\beta$-power polygamy relation for $\\mathcal{E}_a$, applicable for $(m-1)\\delta < \\beta \\leq m\\delta$. As $m$ increases, the bounds become progressively tighter, recovering known results at $m=1$. Notably, the optimal monogamy bound emerges as a piecewise function of $\\alpha$, with additional correction terms activated as $\\alpha$ crosses successive integer thresholds, thereby offering a sharper characterization of entanglement distribution. We demonstrate that our results generalize and strengthen existing monogamy and polygamy relations through analytical comparisons and numerical evaluations using concurrence and concurrence of assistance. This hierarchical, parameterized approach offers enhanced and flexible tools for applications in quantum communication, quantum networks, and multipartite quantum information processing.", "url": "https://arxiv.org/abs/2607.14370", "type": "理论+数值", "summary": "对于满足 $\\gamma$ 次方一夫一妻不等式 (Eq.~\\eqref{e:chap1-ineq1}) 的二分纠缠测度 $\\mathcal{E}$ 以及服从 $\\delta$次方一夫多妻不等式的辅助对应 $\\mathcal{E}_a$ (Eq.~\\eqref{e:chap1-ineq2})，我们引入了一个统一的，由参数 $m\\geq1$ 索引的可调框架。在此框架内，我们推导出两个精致不平等的层次族：$\\mathcal{E}$ 的严格 $\\alpha$-power 一夫一妻关系，对所有 $\\alpha\\geq m\\gamma$ 有效； $\\mathcal{E}_a$ 的严格 $\\beta$-power 一夫多妻关系，适用于 $(m-1)\\delta < \\beta \\leq m\\delta$。随着 $m$ 的增加，界限逐渐变紧，在 $m=1$ 时恢复已知结果。值得注意的是，最优一夫一妻制界限作为 $\\alpha$ 的分段函数出现，当 $\\alpha$ 跨越连续的整数阈值时，附加校正项被激活，从而提供了纠缠分布的更清晰的表征。我们证明，通过使用同意和协助的分析比较和数值评估，我们的结果概括并加强了现有的一夫一妻制和一夫多妻制关系。\n\n这种分层的参数化方法为量子通信、量子网络和多方量子信息处理中的应用提供了增强且灵活的工具。", "authors": [{"name": "Yue Cao"}, {"name": "Naihuan Jing"}, {"name": "Kailash Misra"}, {"name": "Yiling Wang"}], "featured_authors": [{"name": "Yue Cao"}, {"name": "Naihuan Jing"}, {"name": "Kailash Misra"}, {"name": "Yiling Wang"}], "author_count": 4}, {"id": "2607.14384", "category": "quant-ph", "title": "Circuit complexity lower bounds for quantum spin glasses", "abstract": "A central question in quantum information theory is the circuit complexity of states arising from standard many-body models. We study this question for quantum $p$-spin glasses, random Hamiltonians whose interactions act on $p$-tuples of qubits through Pauli strings. Anschuetz, Gamarnik, and Kiani ( arXiv:2404.07231 ) showed that the optimum energy is separated from the best energy achievable by product states. This leaves open whether shallow circuits can close the gap, since even depth-one circuits can generate entanglement. We show that the entanglement needed to close the product-state gap cannot be generated at shallow depth. When the average interaction degree grows with $n$, we prove that, for all sufficiently large fixed $p$, any circuit preparing an $n$-qubit state whose normalized energy is within a fixed positive constant of the optimum must have depth $\\Omega_p(\\log n)$. In the bounded-average-degree regime, we prove a fixed-depth obstruction: for every fixed $D$, a sufficiently large degree prefactor rules out depth-$D$ preparation of near-ground states. Both results hold uniformly over circuits with an arbitrary number of ancilla qubits. Our results give an obstruction in the spirit of the No Low-Energy Trivial States problem of Freedman and Hastings ( arXiv:1301.1363 ), but for random quantum spin glasses rather than code-based Hamiltonians such as those of Anshu, Breuckmann, and Nirkhe ( arXiv:2206.13228 ), whose ground states admit polynomial-size preparation circuits. This setting opens a probabilistic route to NLTS-like questions: we recast state-preparation lower bounds for random quantum Hamiltonians as uniform control of Gaussian processes indexed by shallow circuits.", "url": "https://arxiv.org/abs/2607.14384", "type": "理论", "summary": "量子信息论的一个核心问题是标准多体模型产生的状态的电路复杂性。我们研究这个问题的量子 $p$-自旋玻璃，随机哈密顿量，其相互作用通过泡利弦作用于 $p$-量子位元组。 Anschuetz、Gamarnik 和 Kiani (arXiv:2404.07231) 表明，最佳能量与产物状态可实现的最佳能量是分开的。这就留下了浅层电路是否可以缩小差距的问题，因为即使是深度一电路也可能产生纠缠。我们表明，缩小产物态差距所需的纠缠不能在浅深度产生。当平均相互作用度随 $n$ 增长时，我们证明，对于所有足够大的固定 $p$，任何准备归一化能量在最佳值的固定正常数范围内的 $n$-qubit 状态的电路必须具有深度 $\\Omega_p(\\log n)$。在有界平均度制度中，我们证明了固定深度障碍：对于每个固定的$D$，足够大的度前因子排除了近基态的深度$D$准备。这两个结果在具有任意数量的辅助量子位的电路上一致成立。\n\n我们的结果在 Freedman 和 Hastings 的无低能平凡态问题 (arXiv:1301.1363) 的精神上给出了障碍，但对于随机量子自旋玻璃而不是基于代码的哈密顿量，如 Anshu、Breuckmann 和 Nirkhe (arXiv:2206.13228) 的哈密顿量，其基态允许多项式大小的准备电路。这种设置为类似 NLTS 的问题开辟了一条概率途径：我们将随机量子哈密顿量的状态准备下界重新定义为由浅层电路索引的高斯过程的统一控制。", "authors": [{"name": "Omar Al-Ghattas"}, {"name": "David Gamarnik"}], "featured_authors": [{"name": "Omar Al-Ghattas"}, {"name": "David Gamarnik"}], "author_count": 2}, {"id": "2607.14401", "category": "quant-ph", "title": "Efficient quantum algorithm for Heisenberg spin systems", "abstract": "We consider a broad family of Heisenberg-type quantum spin systems that were studied by Suzuki and Fisher in 1971. This family includes, for example, the Heisenberg antiferromagnet on any bipartite graph. The ground and Gibbs states of these models are Lee-Yang tensors with radius 1: they are associated with multilinear polynomials that possess an extraordinary zero-freeness property inside the unit polydisk in the complex plane. For each Hamiltonian in this family we show that the spectral gap between the first-excited and ground-state energies is lower bounded by $2\\mu$, where $\\mu$ is the magnetic field along the $Z$ direction. Using this result we obtain an efficient quantum adiabatic algorithm for the ground energy of any model in this family. The proof is based on a new inequality that relates the spectral gap of a positive semidefinite operator to its Lee-Yang radius -- a quantitative strengthening of prior work of the authors that may find applications elsewhere.", "url": "https://arxiv.org/abs/2607.14401", "type": "理论+数值", "summary": "我们考虑 Suzuki 和 Fisher 在 1971 年研究的海森堡型量子自旋系统的广泛家族。例如，该家族包括任何二分图上的海森堡反铁磁体。这些模型的基态和吉布斯态是半径为 1 的 Lee-Yang 张量：它们与多线性多项式相关，这些多项式在复平面的单位多盘内具有非凡的零自由度属性。对于该族中的每个哈密顿量，我们表明第一激发能量和基态能量之间的谱间隙的下限为 $2\\mu$，其中 $\\mu$ 是沿 $Z$ 方向的磁场。利用这个结果，我们获得了针对该族中任何模型的地面能量的有效量子绝热算法。该证明基于一个新的不等式，该不等式将正半定算子的谱间隙与其李杨半径联系起来——这是对作者先前工作的定量强化，可能会在其他地方找到应用。", "authors": [{"name": "Sergey Bravyi"}, {"name": "David Gosset"}, {"name": "Yinchen Liu"}, {"name": "Benjamin Wong"}], "featured_authors": [{"name": "Sergey Bravyi"}, {"name": "David Gosset"}, {"name": "Yinchen Liu"}, {"name": "Benjamin Wong"}], "author_count": 4}, {"id": "2607.14462", "category": "quant-ph", "title": "Quantum correlations of tripartite mixed states in the black hole quantum atmosphere", "abstract": "We investigate quantum state texture, genuine multipartite entanglement, and tripartite nonlocality of a tripartite mixed state in the black hole quantum atmosphere. By introducing the Hartle-Hawking local temperature into the Bogoliubov coefficients, we characterize the influence of the local Hawking effect on both physically accessible and inaccessible reduced states. We find that the extrema of these three quantities all lie in the same near horizon region and shift outward with increasing local Hawking temperature, coinciding with the peak region of the local Hawking temperature and indicating that different aspects of tripartite quantum information are most sensitive to the local Hawking effect in the same atmospheric region. In contrast to genuine multipartite entanglement, tripartite nonlocality is more fragile and is suppressed under stronger local Hawking effects. These results provide a unified characterization of density matrix restructuring, entanglement redistribution, and nonlocality in tripartite mixed states affected by the black hole quantum atmosphere.", "url": "https://arxiv.org/abs/2607.14462", "type": "理论", "summary": "我们研究了黑洞量子大气中的量子态结构、真正的多部分纠缠以及三部分混合态的三部分非局域性。通过将 Hartle-Hawking 局域温度引入 Bogoliubov 系数，我们表征了局域霍金效应对物理可及和不可及还原态的影响。我们发现这三个量的极值都位于同一近视界区域，并随着局部霍金温度的增加而向外移动，与局部霍金温度的峰值区域重合，表明三方量子信息的不同方面对同一大气区域的局部霍金效应最敏感。与真正的多部分纠缠相比，三部分非定域性更加脆弱，并且在更强的局域霍金效应下受到抑制。这些结果提供了受黑洞量子大气影响的三方混合态中的密度矩阵重构、纠缠重新分布和非局域性的统一表征。", "authors": [{"name": "Anqi Zhang"}, {"name": "Yanze Zheng"}, {"name": "Xiaofen Huang"}, {"name": "Tinggui Zhang"}], "featured_authors": [{"name": "Anqi Zhang"}, {"name": "Yanze Zheng"}, {"name": "Xiaofen Huang"}, {"name": "Tinggui Zhang"}], "author_count": 4}, {"id": "2607.14484", "category": "quant-ph", "title": "Syndrome-as-Header: A Quantum Label-Switching Architecture via Uncorrectable Error Injection", "abstract": "Scaling quantum networks beyond point-to-point links requires packet forwarding that can tolerate control-plane timing uncertainty. Existing optical-burst switching (OBS) and quantum-wrapper-based packet switching (QW) rely on external classical headers whose jitter-prone processing must remain aligned with in-flight quantum payloads, creating guard-window or fiber-delay-line budget failures. This paper proposes Syndrome-as-Header (SAH), a quantum label-switching architecture that embeds routing labels into the syndrome structure of an encoded payload. The proposed scheme uses Uncorrectable Error Injection (UEI) to map flow labels to reference syndromes and builds a syndrome-space header codebook whose decoding regions remain distinguishable under correctable channel-induced syndrome deviations. Core routers extract the syndrome header, suppress the correctable residual channel-error component, and swap labels without measuring or decoding the logical payload. SAH supports FAST forwarding and VERIFICATION mode, the latter providing end-to-end consistency checking while retaining swappable labels. In NSFNet timing benchmarks with common per-hop quantum error correction (QEC), SAH eliminates the external-header/payload alignment condition, so timing uncertainty appears as memory residence and delivered latency rather than alignment-budget drops. With a $T_2$-based memory-residence penalty, the advantage depends on router memory coherence; for sufficiently long coherence, SAH maintains higher acceptance and throughput than OBS+QEC and QW+QEC under high jitter.", "url": "https://arxiv.org/abs/2607.14484", "type": "理论", "summary": "将量子网络扩展到点对点链路之外需要能够容忍控制平面时序不确定性的数据包转发。现有的光突发交换（OBS）和基于量子包装器的数据包交换（QW）依赖于外部经典报头，其易抖动处理必须与飞行中的量子有效负载保持一致，从而产生保护窗口或光纤延迟线预算故障。本文提出了综合症作为标头（SAH），这是一种量子标签交换架构，它将路由标签嵌入到编码有效负载的综合症结构中。所提出的方案使用不可纠正的错误注入（UEI）将流标签映射到参考校正子，并构建校正子空间标头码本，其解码区域在可校正的通道引起的校正子偏差下保持可区分。核心路由器提取校正子标头，抑制可纠正的残留信道错误分量，并交换标签，而无需测量或解码逻辑有效负载。 SAH支持快速转发和验证模式，后者提供端到端一致性检查，同时保留可交换标签。\n\n在具有常见每跳量子纠错 (QEC) 的 NSFNet 时序基准中，SAH 消除了外部标头/有效负载对齐条件，因此时序不确定性表现为内存驻留和交付延迟，而不是对齐预算下降。使用基于 $T_2$ 的内存驻留惩罚，优势取决于路由器内存一致性；为了获得足够长的相干性，SAH 在高抖动下比 OBS+QEC 和 QW+QEC 保持更高的接受度和吞吐量。", "authors": [{"name": "IlKwon Sohn"}, {"name": "Ju-Bong Kim"}, {"name": "Kwangil Bae"}, {"name": "Wooyeong Song"}, {"name": "Wonhyuk Lee"}], "featured_authors": [{"name": "IlKwon Sohn"}, {"name": "Ju-Bong Kim"}, {"name": "Kwangil Bae"}, {"name": "Wooyeong Song"}, {"name": "Wonhyuk Lee"}], "author_count": 5}, {"id": "2607.14592", "category": "quant-ph", "title": "Adaptive Entanglement Management in Quantum Multi-Core Architectures", "abstract": "Scalable quantum computing architectures increasingly rely on multi-core designs, where qubits are distributed across multiple processing cores interconnected through a quantum Network-on-Chip (NoC). In such systems, inter-core communication is typically realized through entanglement-assisted quantum teleportation, making efficient entanglement generation critical for performance. In this paper, we perform a comparative study of three entanglement management paradigms for multi-core quantum processors: reactive on-demand generation (ODG), proactive continuous pre-generation (CGP), and an adaptive continuous pre-generation approach (ACGP). While ODG generates entanglement only when required, CGP reduces average teleportation latency by pre-generating EPR pairs in the background. To improve upon this, we propose ACGP which dynamically adjusts entanglement generation probabilities based on observed inter-core communication patterns. We evaluate these approaches using an extended SeQUeNCe simulator on mesh-based multi-core architectures on real benchmark circuits. Results show that ACGP significantly reduces average teleportation latency compared to ODG and CGP. Although pre-generation introduces fidelity degradation due to storage time, entanglement purification effectively restores fidelity with minimal impact on latency. These results demonstrate that adaptive entanglement managements can substantially improve communication efficiency in scalable quantum multi-core systems.", "url": "https://arxiv.org/abs/2607.14592", "type": "理论+数值", "summary": "可扩展的量子计算架构越来越依赖于多核设计，其中量子位分布在通过量子片上网络（NoC）互连的多个处理核心上。在此类系统中，核间通信通常通过纠缠辅助量子隐形传态来实现，这使得高效的纠缠生成对于性能至关重要。在本文中，我们对多核量子处理器的三种纠缠管理范式进行了比较研究：反应式按需生成（ODG）、主动连续预生成（CGP）和自适应连续预生成方法（ACGP）。 ODG 仅在需要时生成纠缠，而 CGP 通过在后台预先生成 EPR 对来减少平均隐形传态延迟。为了改进这一点，我们提出了 ACGP，它根据观察到的核间通信模式动态调整纠缠生成概率。我们使用基于网格的多核架构上的扩展序列模拟器在真实基准电路上评估这些方法。结果表明，与 ODG 和 CGP 相比，ACGP 显着降低了平均隐形传态延迟。\n\n尽管预生成会因存储时间而导致保真度下降，但纠缠净化可以有效地恢复保真度，同时对延迟的影响最小。这些结果表明，自适应纠缠管理可以显着提高可扩展量子多核系统中的通信效率。", "authors": [{"name": "Rajeswari Suance P S"}, {"name": "Anubhab Dutta"}, {"name": "Ruchika Gupta"}, {"name": "John Jose"}], "featured_authors": [{"name": "Rajeswari Suance P S"}, {"name": "Anubhab Dutta"}, {"name": "Ruchika Gupta"}, {"name": "John Jose"}], "author_count": 4}, {"id": "2607.14650", "category": "quant-ph", "title": "Worst-Case Quantum Algorithm for Optimal Polynomial Intersection Beyond Decoded Quantum Interferometry", "abstract": "The Optimal Polynomial Intersection (OPI) problem asks us to find a low-degree polynomial over a finite field whose values lie in prescribed subsets on as many given inputs as possible. Decoded quantum interferometry (DQI) gives a quantum algorithm for OPI in parameter regimes beyond those achieved by the best known classical heuristics. Follow-up works improve the parameter regimes, but their analyses are limited to average-case settings. Recently, Sun and Wootters showed that, even in the worst case, OPI has a solution in a larger parameter regime than the one covered by DQI. However, they left open whether one can design a quantum algorithm that solves OPI in the worst-case beyond the DQI regime. We give such a quantum algorithm. As a byproduct, we also improve the existential bound of Sun and Wootters in certain parameter regimes. In particular, when each subset contains roughly half of the field elements, our algorithm finds a solution with satisfaction rate $s=1$ whenever the rate satisfies $R>0.75$. This matches the previous average-case bound, whereas DQI cannot achieve $s=1$ unless $R=1$. Our existential bound guarantees the existence of a solution when $R> 0.7158$, improving over the previous threshold $R>0.7495$. More generally, our existential results extend to the Max-LINSAT problem with respect to arbitrary maximum distance separable (MDS) codes. The corresponding algorithmic results apply only to MDS codes whose dual admits an efficient list decoder. Our results are obtained through a novel application of a Brascamp--Lieb-type inequality in the MDS setting, which may have further applications.", "url": "https://arxiv.org/abs/2607.14650", "type": "理论+数值", "summary": "最优多项式交集 (OPI) 问题要求我们在有限域上找到一个低次多项式，其值位于尽可能多的给定输入的规定子集中。解码量子干涉测量 (DQI) 为 OPI 提供了一种量子算法，其参数范围超出了最著名的经典启发式算法所实现的范围。后续工作改进了参数机制，但他们的分析仅限于平均情况设置。最近，Sun 和 Wootters 表明，即使在最坏的情况下，OPI 也能提供比 DQI 所覆盖的参数范围更大的解决方案。然而，他们对于是否可以设计一种量子算法来解决 DQI 之外最坏情况下的 OPI 问题持开放态度。我们给出了这样一个量子算法。作为副产品，我们还改进了 Sun 和 Wootters 在某些参数范围内的存在界限。特别是，当每个子集包含大约一半的字段元素时，只要满意率满足 $R>0.75$，我们的算法就会找到满意率 $s=1$ 的解决方案。这与之前的平均情况边界相匹配，而除非 $R=1$，否则 DQI 无法实现 $s=1$。\n\n我们的存在界限保证了当 $R> 0.7158$ 时存在解决方案，比之前的阈值 $R>0.7495$ 有所改进。更一般地说，我们的存在性结果扩展到关于任意最大距离可分离（MDS）码的 Max-LINSAT 问题。相应的算法结果仅适用于其对偶允许高效列表解码器的MDS代码。我们的结果是通过在 MDS 环境中对 Brascamp--Lieb 型不等式的新颖应用而获得的，该结果可能具有进一步的应用。", "authors": [{"name": "Shuji Horinaga"}, {"name": "Takashi Yamakawa"}], "featured_authors": [{"name": "Shuji Horinaga"}, {"name": "Takashi Yamakawa"}], "author_count": 2}, {"id": "2607.14687", "category": "quant-ph", "title": "Electrons Hopping across a Molecular Network: Spectra and Symmetries", "abstract": "We investigate interacting spinless electrons on finite molecular ring networks described by a tight-binding Hubbard Hamiltonian. The interplay between lattice geometry, Coulomb interactions and discrete symmetries is analysed for rings with $L=3,4,5,6$ nodes, filled with one, two or three electrons. Special attention is devoted to the role of the network symmetries in determining the structure of the many-body spectrum and the Mulliken classification of the eigenstates. Using group-theoretical methods, we examine the evolution of the spectra in the presence of an external magnetic flux. The Zeeman effect lifts degeneracies and results in combination with the Coulomb interaction to avoided crossings in symmetry sectors. We identify a qualitatively distinction between systems with an even and odd number of particles. At half-filling, particle-hole symmetry (duality) protects selected symmetry sectors against Zeeman splitting.", "url": "https://arxiv.org/abs/2607.14687", "type": "理论", "summary": "我们研究了由紧束缚哈伯德哈伯德哈密顿量描述的有限分子环网络上相互作用的无自旋电子。分析了具有 $L=3,4,5,6$ 节点且充满一个、两个或三个电子的环的晶格几何、库仑相互作用和离散对称性之间的相互作用。特别关注网络对称性在确定多体谱的结构和本征态的马利肯分类中的作用。使用群论方法，我们研究了外部磁通量存在下光谱的演变。塞曼效应提升了简并性，并与库仑相互作用相结合，避免了对称扇区的交叉。我们确定了具有偶数和奇数粒子的系统之间的定性区别。在半填充时，粒子孔对称性（对偶性）可保护选定的对称扇区免受塞曼分裂的影响。", "authors": [{"name": "Ludwig Schulz"}, {"name": "Max Best"}, {"name": "Carsten Henkel"}], "featured_authors": [{"name": "Ludwig Schulz"}, {"name": "Max Best"}, {"name": "Carsten Henkel"}], "author_count": 3}, {"id": "2607.14704", "category": "quant-ph", "title": "High-rate continuous-variable quantum key distribution coexisting with Tb/s coherent classical transmission in hollow-core fiber", "abstract": "Quantum key distribution (QKD) can provide secret keys with security rooted in quantum mechanics, but operation alongside high-capacity classical traffic remains limited by the excess-noise budget of weak quantum states in conventional solid-core fiber. Here, we combine ultralow-loss anti-resonant hollow-core fiber with residual-carrier-assisted discrete-modulation continuous-variable QKD (DM-CV-QKD) to address both propagation-induced coexistence noise and low-SNR phase recovery. Over a 24.3-km hollow-core link with 3.3-dB end-to-end loss, a dual-polarization 15-Gbaud DM-CV-QKD channel achieves an average asymptotic secret-key rate (SKR) of 153.22 Mb/s and a finite-size SKR of 149.99 Mb/s, while 39 coherent wavelength-division-multiplexed channels deliver an aggregate data rate of 7.6 Tb/s and a net data rate of 7.2 Tb/s. The system can even sustain a positive SKR under a high classical launch power of up to 15 dBm, without an optical bandpass filter (BPF). Finite-size analysis against collective attacks further yields a projected positive secret-key rate at a 100-km-equivalent condition. These results show that an anti-resonant hollow-core fiber, combined with carrier-assisted phase recovery, can greatly extend the operating regime of shared-fiber quantum-secured coherent links, pointing to a promising approach for integrating high-rate CV-QKD with high-capacity optical networks.", "url": "https://arxiv.org/abs/2607.14704", "type": "理论", "summary": "量子密钥分发 (QKD) 可以为密钥提供植根于量子力学的安全性，但与大容量经典流量一起运行仍然受到传统实芯光纤中弱量子态的过量噪声预算的限制。在这里，我们将超低损耗抗谐振空心光纤与残余载波辅助离散调制连续变量 QKD (DM-CV-QKD) 相结合，以解决传播引起的共存噪声和低 SNR 相位恢复问题。在端到端损耗为 3.3 dB 的 24.3 公里空心链路上，双极化 15 Gbaud DM-CV-QKD 通道实现了 153.22 Mb/s 的平均渐近密钥速率 (SKR) 和 149.99 Mb/s 的有限大小 SKR，而 39 个相干波分复用通道提供的聚合数据速率为7.6 Tb/s，净数据速率为 7.2 Tb/s。该系统甚至可以在高达 15 dBm 的高经典发射功率下维持正 SKR，无需光学带通滤波器 (BPF)。针对集体攻击的有限规模分析进一步得出了 100 公里等效条件下的预计正密钥率。\n\n这些结果表明，反谐振空心光纤与载波辅助相位恢复相结合，可以极大地扩展共享光纤量子安全相干链路的工作范围，为将高速率CV-QKD与高容量光网络集成提供了一种有前景的方法。", "authors": [{"name": "Xitao Ji"}, {"name": "Siyu Chen"}, {"name": "Peng Li"}, {"name": "Mingming Zhang"}, {"name": "Yilun Chen"}, {"name": "Jun Gao"}, {"name": "Rui Lin"}, {"name": "Bacco Davide"}, {"name": "Siqi Yan"}, {"name": "Ming Tang"}], "featured_authors": [{"name": "Xitao Ji"}, {"name": "Siyu Chen"}, {"name": "Peng Li"}, {"name": "Bacco Davide"}, {"name": "Siqi Yan"}, {"name": "Ming Tang"}], "author_count": 10}, {"id": "2607.14755", "category": "quant-ph", "title": "Moment Optimization in the Navascués-Pironio-Acín Hierarchy", "abstract": "The Navascués-Pironio-Acín (NPA) hierarchy provides a convergent sequence of semidefinite programming (SDP) relaxations for noncommutative polynomial optimisation, ubiquitous in quantum physics. However, its practical applicability is limited by the combinatorial growth in operator moments required at each level. Since not all moments contribute equally to bound tightness, selecting moments within a fixed computational budget is a relevant problem. We reframe moment selection as combinatorial subset selection and show it is governed by strong higher-order synergistic interactions among moments, quantified through a marginal synergy diagnostic adapted from complex systems theory. We develop and compare three optimisation methods: Parallel Tempering (PT), an RBM-based reinforcement learning policy, and Bayesian Optimisation (BO). On the $I_{3322}$ Bell inequality benchmark, all three substantially outperform greedy approaches at costs around two orders of magnitude below brute force, with the RBM achieving the closest approach to optimal throughout the hard transition regime. We apply the framework to the 174 Bell inequalities in the $(4,4,2,2)$ scenario, finding heterogeneous convergence behaviour across inequalities, and to the one-dimensional Heisenberg spin chain, demonstrating that physically motivated monomial bases are internally compressible and are not globally optimal in general. A budget-aware search over a broader pool improves certified bounds on long-range correlations by nearly two orders of magnitude. These results establish a scalable framework for moment selection in noncommutative polynomial optimisation, with broad applications across quantum physics and quantum information.", "url": "https://arxiv.org/abs/2607.14755", "type": "理论+数值", "summary": "Navascués-Pironio-Acín (NPA) 层次结构为非交换多项式优化提供了半定规划 (SDP) 松弛的收敛序列，这在量子物理学中无处不在。然而，它的实际适用性受到每个级别所需的算子矩的组合增长的限制。由于并非所有矩对边界紧度都有同等贡献，因此在固定计算预算内选择矩是一个相关问题。我们将矩选择重新定义为组合子集选择，并表明它受到矩之间强大的高阶协同相互作用的控制，通过根据复杂系统理论改编的边际协同诊断进行量化。我们开发并比较了三种优化方法：并行调温 (PT)、基于 RBM 的强化学习策略和贝叶斯优化 (BO)。在 $I_{3322}$ Bell 不等式基准上，所有三种方法的性能都显着优于贪婪方法，而成本比暴力方法低两个数量级左右，RBM ​​在整个硬过渡机制中实现了最接近最优的方法。\n\n我们将该框架应用于 $(4,4,2,2)$ 场景中的 174 个贝尔不等式，发现不等式之间的异构收敛行为，以及一维海森堡自旋链，证明物理驱动的单项式基是内部可压缩的，并且一般来说不是全局最优的。在更广泛的池中进行预算意识搜索将长期相关性的认证界限提高了近两个数量级。这些结果为非交换多项式优化中的矩选择建立了一个可扩展的框架，在量子物理和量子信息领域具有广泛的应用。", "authors": [{"name": "Francesco Flora"}, {"name": "Losel Matos"}, {"name": "Tim Heightman"}, {"name": "Tamás Kriváchy"}, {"name": "Adan Garriga"}, {"name": "Antonio Acín"}], "featured_authors": [{"name": "Francesco Flora"}, {"name": "Losel Matos"}, {"name": "Tim Heightman"}, {"name": "Tamás Kriváchy"}, {"name": "Adan Garriga"}, {"name": "Antonio Acín"}], "author_count": 6}, {"id": "2607.14797", "category": "quant-ph", "title": "Robustness of periodicity in Grover walks under a magnetic vector potential", "abstract": "We study the effect of magnetic vector potentials on periodic Grover walks on finite graphs. The magnetic vector potential is introduced through the framework of quantum graphs, which induces the Grover walk as a special case. We regard the vector potential as a perturbation of a periodic Grover walk and investigate the robustness of its periodicity. Our analysis reveals that the response to such perturbations depends on the spectral structure of the underlying graph. In particular, when the graph possesses at least one non-simple eigenvalue, we derive a Hermitian matrix that characterizes the robustness of its periodicity. As a consequence, we show that the perturbed dynamics is asymptotically described by a continuous-time quantum walk generated by this Hermitian matrix.", "url": "https://arxiv.org/abs/2607.14797", "type": "理论", "summary": "我们研究磁矢量势对有限图上周期性 Grover 行走的影响。通过量子图的框架引入磁矢量势，从而导出格罗弗游走作为一个特例。我们将矢量势视为周期性 Grover 行走的扰动，并研究其周期性的鲁棒性。我们的分析表明，对此类扰动的响应取决于底层图的谱结构。特别是，当图具有至少一个非简单特征值时，我们推导出一个厄尔米特矩阵来表征其周期性的鲁棒性。因此，我们表明，扰动动力学是由该埃尔米特矩阵生成的连续时间量子行走渐近描述的。", "authors": [{"name": "Hiroto Sekido"}, {"name": "Etsuo Segawa"}], "featured_authors": [{"name": "Hiroto Sekido"}, {"name": "Etsuo Segawa"}], "author_count": 2}, {"id": "2607.14861", "category": "quant-ph", "title": "Binary Gauss Stabilizers for Abelian Lattice Gauge Theories", "abstract": "Gauge theories and quantum error-correcting codes share the same underlying structure: both use constraints to identify a specific subspace of the full Hilbert space. In quantum error correction, these constraints are known as stabilizers, while in gauge theories they correspond to Gauss law. In this work, we consider a family of discrete Abelian lattice gauge theories described by a $\\mathbb{Z}_{N}$ gauge group with $N$ an arbitrary power of two. In this setting, we find a set of stabilizers for the gauge-invariant subspace which is an alternative to the Gauss operators, and we call them binary Gauss stabilizers. We use this alternative stabilizer group to build practical error-correcting codes exploiting the gauge symmetries of the system without the addition of extra qubits. The applications of our finding are not limited to error correction though. We also provide a new strategy of gauge fixing to remove the redundancies based on our alternative stabilizer, which might provide advantages with respect to already-existing approaches such as the axial gauge. Our results provide new tools to study lattice gauge theories and their quantum simulation, and opens directions for future work at the interface of lattice gauge theory and quantum information.", "url": "https://arxiv.org/abs/2607.14861", "type": "理论+数值", "summary": "规范理论和量子纠错码共享相同的底层结构：两者都使用约束来识别完整希尔伯特空间的特定子空间。在量子误差校正中，这些约束被称为稳定器，而在规范理论中，它们对应于高斯定律。在这项工作中，我们考虑由 $\\mathbb{Z}_{N}$ 规范组描述的一系列离散阿贝尔晶格规范理论，其中 $N$ 为 2 的任意幂。在这种情况下，我们找到了一组规范不变子空间的稳定器，它是高斯算子的替代品，我们称之为二元高斯稳定器。我们使用这种替代稳定剂组来构建实用的纠错代码，利用系统的规范对称性，而无需添加额外的量子位。不过，我们的发现的应用并不限于纠错。我们还提供了一种新的轨距固定策略，以消除基于替代稳定器的冗余，这可能比轴向轨距等现有方法具有优势。\n\n我们的研究结果为研究晶格规范理论及其量子模拟提供了新的工具，并为晶格规范理论和量子信息接口的未来工作开辟了方向。", "authors": [{"name": "Matteo Turco"}, {"name": "Luca Spagnoli"}, {"name": "Alessandro Roggero"}], "featured_authors": [{"name": "Matteo Turco"}, {"name": "Luca Spagnoli"}, {"name": "Alessandro Roggero"}], "author_count": 3}, {"id": "2607.14864", "category": "quant-ph", "title": "Limits on Broadcasting Genuine Multipartite Entanglement in Quantum Networks", "abstract": "We establish operational limits on the broadcasting of genuine multipartite entanglement (GME) in quantum networks. Using a distributed protocol in which each of N parties locally implements optimal 1 $\\to$ 2 cloning via beam-splitter interactions, we derive exact expressions for the broadcast fidelity of Greenberger-Horne-Zeilinger (GHZ), W states, and Cluster states in a limited setting. We show that the fidelity decays exponentially with system size as [c(R)]$^N$, providing a quantitative expression of multipartite entanglement monogamy in the broadcasting setting, and that both state families share a universal normalisation factor arising from independent post-selection probabilities. Most significantly, we prove a no-go result for simultaneous GME certification: for all reflectivities and all system sizes, the two broadcast copies cannot be simultaneously certified as genuinely multipartite entangled within the standard framework of fidelity-based witnesses. We further check this behaviour for three- and four-party cluster states, finding consistent results that support the generality of the no-go beyond the GHZ and W families. This obstruction arises from the redistribution of multipartite coherence, which both reduces the achievable fidelity and increases the corresponding certification threshold. Our results reveal a fundamental trade-off between the broadcastability of multipartite entanglement and its operational certifiability, and delineate intrinsic limits on entanglement distribution in quantum networks.", "url": "https://arxiv.org/abs/2607.14864", "type": "理论", "summary": "我们对量子网络中真正的多方纠缠（GME）的广播建立了操作限制。使用分布式协议，其中 N 方中的每一方通过分束器交互在本地实现最佳 1 $\\to$ 2 克隆，我们推导出有限设置中 Greenberger-Horne-Zeilinger (GHZ)、W 状态和 Cluster 状态的广播保真度的精确表达式。我们表明，保真度随着系统规模 [c(R)]$^N$ 呈指数衰减，提供了广播环境中多方纠缠一夫一妻制的定量表达，并且两个状态族共享一个由独立的后选择概率产生的通用归一化因子。最重要的是，我们证明了同步 GME 认证的失败结果：对于所有反射率和所有系统尺寸，两个广播副本不能同时被认证为在基于保真度的见证的标准框架内真正多方纠缠。我们进一步检查三方和四方集群状态的这种行为，发现一致的结果支持 GHZ 和 W 系列之外的禁止的普遍性。\n\n这种障碍源于多方一致性的重新分配，这既降低了可实现的保真度，又增加了相应的认证阈值。我们的结果揭示了多部分纠缠的广播性与其操作可证明性之间的基本权衡，并描绘了量子网络中纠缠分布的内在限制。", "authors": [{"name": "Pritam Roy"}, {"name": "William John Munro"}, {"name": "Shashank Gupta"}], "featured_authors": [{"name": "Pritam Roy"}, {"name": "William John Munro"}, {"name": "Shashank Gupta"}], "author_count": 3}, {"id": "2607.14883", "category": "quant-ph", "title": "A Geometric Theory of Fermion-to-Qubit Encodings", "abstract": "Exact fermion to qubit transformations are conventionally regarded as algorithmic tools that translate many-body Hamiltonians into qubit representations for quantum simulation. Here we show that they also define intrinsic geometric representations whose structure encodes physically meaningful information beyond spectral equivalence. We develop a geometric framework based on weighted hypergraphs and coupling space representations constructed from the Bravyi--Kitaev (BK) and Xia--Bian--Kais (XBK) encodings. Within the BK representation, we introduce a geometric observable that compares the algebraic connectivities of the kinetic and interaction hypergraphs, derive its exact analytical dependence on interaction strength, and uncover two geometric universality classes together with an exact spectral organization originating from the binary tree architecture of the encoding. The complementary XBK representation describes the evolution of encoded Hamiltonians through probability measures in coupling space, where optimal transport quantifies interaction-driven reorganization independently of the spectral analysis. Applications to the Hubbard, spinless tV , single impurity Anderson, and Kitaev models demonstrate that these connectivity and transport based geometric descriptions consistently capture the structural evolution of encoded quantum Hamiltonians across distinct classes of many-body systems. Our results establish hypergraph geometry as a new framework for understanding fermion-to-qubit encodings,revealing that they serve not only as computational mappings but also as geometric representations of quantum many-body Hamiltonians.", "url": "https://arxiv.org/abs/2607.14883", "type": "理论+数值", "summary": "精确的费米子到量子位的转换通常被视为将多体哈密顿量转换为用于量子模拟的量子位表示的算法工具。在这里，我们表明它们还定义了内在的几何表示，其结构编码了超出光谱等效性的物理有意义的信息。我们开发了一个基于加权超图和耦合空间表示的几何框架，该空间表示由 Bravyi-Kitaev (BK) 和 Xia-Bian-Kais (XBK) 编码构建。在 BK 表示中，我们引入了一个几何可观测量，它比较动力学和相互作用超图的代数连通性，导出其对相互作用强度的精确分析依赖性，并揭示两个几何普遍性类以及源自编码二叉树结构的精确谱组织。互补的 XBK 表示通过耦合空间中的概率度量描述了编码哈密顿量的演化，其中最优传输独立于谱分析来量化交互驱动的重组。\n\n哈伯德模型、无旋转电视模型、单杂质安德森模型和基塔耶夫模型的应用表明，这些基于连通性和传输的几何描述一致地捕获了不同类别多体系统中编码量子哈密顿量的结构演化。我们的结果将超图几何建立为理解费米子到量子比特编码的新框架，揭示它们不仅可以用作计算映射，还可以用作量子多体哈密顿量的几何表示。", "authors": [{"name": "Lakshya Nagpal"}, {"name": "Nishith Reen"}, {"name": "S.R. Hassan"}], "featured_authors": [{"name": "Lakshya Nagpal"}, {"name": "Nishith Reen"}, {"name": "S.R. Hassan"}], "author_count": 3}, {"id": "2607.14920", "category": "quant-ph", "title": "A Three-Point Continuous-Variable Quantum MacWilliams Identity", "abstract": "We construct the three-point continuous-variable (CV) quantum MacWilliams identity, extending the two-point framework of Burchards, and give its closed-form integral kernel. Its configuration space carries a symplectic invariant with no classical counterpart, which encodes the GKP quantization condition and a three-point sign phase. Using the identity, we derive the semidefinite-programming bounds it supports on the dimension of CV quantum error-correcting codes, and we prove, in two collapse theorems, that the three-point apparatus does not improve on the two-point bound. For GKP lattice codes the three-point optimum equals the Burchards two-point linear-programming optimum identically. This is an exact determination of the lattice three-point optimum, so the $E_8$ and Leech magic functions saturate it rather than beat it. For general bosonic codes a completely-positive reformulation bypasses the positivity obstruction that rules out the natural factored-form constructions; the phase-sign condition together with Choi positivity then force the three-point term to vanish. We certify this collapse for radial Choi forms on the first eight Laguerre levels at one mode, and leave the full trace-class cone open. Both collapses have a single cause with no classical analogue, the code projector: it orients the bound correctly but also removes the full positivity that powers the classical three-point improvement.", "url": "https://arxiv.org/abs/2607.14920", "type": "理论", "summary": "我们构造了三点连续变量（CV）量子MacWilliams恒等式，扩展了Burchards的两点框架，并给出了其封闭式积分核。它的配置空间带有一个没有经典对应物的辛不变量，它编码 GKP 量化条件和三点符号相位。使用恒等式，我们推导了它在 CV 量子纠错码维度上支持的半定规划界限，并且我们在两个崩溃定理中证明了三点装置并没有改进两点界限。对于 GKP 格码，三点最优值等同于 Burchards 两点线性规划最优值。这是晶格三点最优的精确确定，因此 $E_8$ 和 Leech 魔法函数使其饱和而不是击败它。对于一般的玻色码，完全正的重构绕过了排除自然因子形式构造的正性障碍；相位符号条件与 Choi 正性一起迫使三点项消失。\n\n我们在一种模式下证明了径向 Choi 形式在前八个拉盖尔能级上的这种塌缩，并将完整的迹级锥体保持打开状态。这两次崩溃都有一个单一的原因，没有经典的类似物，即代码投影仪：它正确地确定了界限，但也消除了支持经典三点改进的全部积极性。", "authors": [{"name": "Yinzi Xiao"}], "featured_authors": [{"name": "Yinzi Xiao"}], "author_count": 1}, {"id": "2607.15030", "category": "quant-ph", "title": "Implicit differentiation of tensor network algorithms", "abstract": "The current leading approach to the variational optimization of projected entangled-pair states (PEPS) is based on automatic differentiation, which allows for a convenient evaluation of the energy gradient with respect to the local variational degrees of freedom. However, evaluating the energy gradient not only remains a major computational bottleneck of the optimization procedure, but also suffers from frequent numerical instabilities. In this work, we adopt recent advances in implicit differentiation techniques to address these challenges in PEPS optimization. By reformulating the core step of the gradient computation in terms of a single characteristic equation for the contraction environment, we reduce the cost of the gradient computation and improve its scaling with the problem size. By choosi
