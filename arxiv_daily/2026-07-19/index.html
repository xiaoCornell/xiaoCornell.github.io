ng a suitable parametrization of this characteristic equation based on the intrinsic symmetries of the contraction environment, we can directly remove instabilities from the global gradient computation that would otherwise arise from the derivatives of subroutines of the contraction algorithm. Finally, we demonstrate how this approach drastically simplifies the practical implementation of stable gradient-based PEPS optimization.", "url": "https://arxiv.org/abs/2607.15030", "type": "理论+数值", "summary": "目前投影纠缠对态（PEPS）变分优化的主要方法是基于自动微分，它可以方便地评估相对于局部变分自由度的能量梯度。然而，评估能量梯度不仅仍然是优化过程的主要计算瓶颈，而且还经常遭受数值不稳定的困扰。在这项工作中，我们采用隐式微分技术的最新进展来解决 PEPS 优化中的这些挑战。通过根据收缩环境的单个特征方程重新制定梯度计算的核心步骤，我们降低了梯度计算的成本并提高了其随问题规模的扩展。通过根据收缩环境的固有对称性选择该特征方程的合适参数化，我们可以直接消除全局梯度计算中的不稳定性，否则这些不稳定性可能是由收缩算法子程序的导数引起的。\n\n最后，我们演示了这种方法如何极大地简化基于稳定梯度的 PEPS 优化的实际实现。", "authors": [{"name": "Lander Burgelman"}, {"name": "Anna Francuz"}, {"name": "Paul Brehmer"}, {"name": "Lukas Devos"}, {"name": "Jutho Haegeman"}, {"name": "Frank Verstraete"}, {"name": "Bram Vanhecke"}], "featured_authors": [{"name": "Lander Burgelman"}, {"name": "Anna Francuz"}, {"name": "Paul Brehmer"}, {"name": "Jutho Haegeman"}, {"name": "Frank Verstraete"}, {"name": "Bram Vanhecke"}], "author_count": 7}, {"id": "2607.15076", "category": "quant-ph", "title": "SQD-Enabled Circuit Compression for Resource-Efficient Quantum Chemistry", "abstract": "Subspace Quantum Diagonalization (SQD) recovers ground-state energies by classically diagonalizing a Hamiltonian in the subspace spanned by quantum samples, requiring only bitstrings with sufficient ground-state overlap rather than an accurate variational energy. We reveal and exploit this underexplored robustness property: how much non-Clifford and variational expressivity can be removed from the sampling circuit before SQD accuracy degrades? We answer through two complementary compression techniques: gradient-based operator pruning, which discards low-impact excitation operators, and Clifford rounding, which snaps remaining parameters to the nearest Clifford angle. Both of these techniques can be applied to a VQE ansatz on a qubit-reduced Hamiltonian. A systematic ablation study across 21 molecules shows that median SQD error stays within chemical accuracy even at 50\\% compression on both axes, while simulation speedup reaches $33\\times$. Hardware validation on 6 molecules on IBM quantum hardware confirms up to $2.8\\times$ transpiled-depth reduction with zero loss in SQD accuracy.", "url": "https://arxiv.org/abs/2607.15076", "type": "理论+数值", "summary": "子空间量子对角化 (SQD) 通过在量子样本跨越的子空间中对哈密顿量进行经典对角化来恢复基态能量，只需要具有足够基态重叠的位串，而不需要精确的变分能量。我们揭示并利用了这种未被充分开发的鲁棒性特性：在 SQD 精度下降之前，可以从采样电路中去除多少非 Clifford 和变分表达力？我们通过两种互补的压缩技术来回答：基于梯度的算子修剪（丢弃低影响的激励算子）和克利福德舍入（将剩余参数捕捉到最近的克利福德角度）。这两种技术都可以应用于量子位简化哈密顿量上的 VQE 模拟。对 21 个分子进行的系统消融研究表明，即使在两个轴上压缩 50% 时，中值 SQD 误差仍保持在化学精度范围内，而模拟加速达到 33 美元。在 IBM 量子硬件上对 6 个分子进行的硬件验证证实，转译深度降低高达 2.8 美元\\次$，且 SQD 精度损失为零。", "authors": [{"name": "Kangyu Zheng"}, {"name": "Yidong Zhou"}, {"name": "Jinglei Cheng"}, {"name": "Zhemin Zhang"}, {"name": "Shaohua Li"}, {"name": "Zhiding Liang"}], "featured_authors": [{"name": "Kangyu Zheng"}, {"name": "Yidong Zhou"}, {"name": "Jinglei Cheng"}, {"name": "Zhemin Zhang"}, {"name": "Shaohua Li"}, {"name": "Zhiding Liang"}], "author_count": 6}, {"id": "2607.15124", "category": "quant-ph", "title": "On the origin of finite entanglement scaling", "abstract": "The concept of finite entanglement scaling forms one of the pillars on which the tensor network ecosystem is built. In this paper, we resolve the open problem of determining the actual perturbations induced by matrix product state approximations of critical systems, and we demonstrate that these can be quite different than the ones predicted by conformal field theory. To that aim, we develop a sparse linear solver to calculate the forward and backward derivatives of 2-dimensional tensor networks with respect to their defining parameters in an implicit way. This algorithm is of independent interest as it provides a primitive for the variational optimization of projected entangled pair states that circumvents the instabilities plaguing traditional automatic differentiation methods.", "url": "https://arxiv.org/abs/2607.15124", "type": "理论+数值", "summary": "有限纠缠缩放的概念构成了张量网络生态系统构建的支柱之一。在本文中，我们解决了确定由关键系统的矩阵乘积状态近似引起的实际扰动的开放问题，并且我们证明这些扰动可能与共形场论预测的扰动有很大不同。为此，我们开发了一个稀疏线性求解器，以隐式方式计算二维张量网络相对于其定义参数的前向和后向导数。该算法具有独立的意义，因为它为投影纠缠对态的变分优化提供了原语，从而避免了困扰传统自动微分方法的不稳定性。", "authors": [{"name": "Luke Hodgkiss"}, {"name": "Laurens Lootens"}, {"name": "Atsushi Ueda"}, {"name": "Bram Vanhecke"}, {"name": "Frank Verstraete"}], "featured_authors": [{"name": "Luke Hodgkiss"}, {"name": "Laurens Lootens"}, {"name": "Atsushi Ueda"}, {"name": "Bram Vanhecke"}, {"name": "Frank Verstraete"}], "author_count": 5}, {"id": "2607.15132", "category": "quant-ph", "title": "Periodic orbits and quantum many-body scars in integrable spin chains", "abstract": "Quantum many-body scars provide an exception to generic thermalising dynamics, but their relation to integrability remains unclear. Here we apply the periodic-orbit framework to the integrable XYZ/XXZ spin-1/2 chain, developing an energy-resolved approach that enables us to locate and track periodic orbits across the spectrum. We identify families of scarred orbits and resolve their supporting eigenstates in terms of Bethe-ansatz quantum numbers, revealing a common string core dressed by zero-momentum magnon pairs. This allows us to reconstruct both the scarred eigenstates and the associated towers directly within the Bethe ansatz, and explain the equidistant tower spacing analytically from the decoupling of zero-momentum magnon pairs in the Bethe equations, providing a microscopic realisation of scar phenomenology in an integrable setting. We further show that this structure persists upon breaking integrability with a transverse field, with the periodic orbits continuing to govern the dynamics. Our results establish a direct connection between the periodic-orbit picture of quantum scarring and the algebraic structure of integrable models, showing that key features of scar dynamics can be understood analytically within the Bethe ansatz framework.", "url": "https://arxiv.org/abs/2607.15132", "type": "理论+数值", "summary": "量子多体疤痕为一般热化动力学提供了一个例外，但它们与可积性的关系仍不清楚。在这里，我们将周期轨道框架应用于可积 XYZ/XXZ 自旋 1/2 链，开发了一种能量解析方法，使我们能够在整个光谱中定位和跟踪周期轨道。我们识别了伤痕轨道家族，并根据 Bethe-ansatz 量子数解析了它们的支持本征态，揭示了一个由零动量磁振子对装饰的共同弦核心。这使我们能够直接在 Bethe ansatz 内重建伤痕本征态和相关塔，并通过 Bethe 方程中零动量磁振子对的解耦来分析解释等距塔间距，从而在可积设置中提供疤痕现象学的微观实现。我们进一步表明，这种结构在破坏横向场的可积性时仍然存在，而周期性轨道继续控制动力学。\n\n我们的结果在量子疤痕的周期轨道图和可积模型的代数结构之间建立了直接联系，表明可以在 Bethe ansatz 框架内分析理解疤痕动力学的关键特征。", "authors": [{"name": "Elena Petrova"}, {"name": "Maksym Serbyn"}, {"name": "Marko Ljubotina"}], "featured_authors": [{"name": "Elena Petrova"}, {"name": "Maksym Serbyn"}, {"name": "Marko Ljubotina"}], "author_count": 3}, {"id": "2607.15159", "category": "quant-ph", "title": "LDGM-Based Quantum Codes for Fault-Tolerant Quantum Computation", "abstract": "We construct a new family of Calderbank-Shor-Steane (CSS) codes using the generator and parity-check matrices of Low-Density Generator Matrix (LDGM) codes, with row operations applied to both matrices in order to achieve the desired quantum rate. Decoding is performed in an iterative manner, by applying message passing over the associated graph, and discrete Density Evolution (DDE) is used to optimize performance in the depolarizing channel. The proposed construction offers high flexibility and easiness in the design, producing quantum codes that possess excellent error correction capabilities. By properly designing the structure of the code, we are able to control and bound the weight of the stabilizer generators to a small value, which results in codes particularly well suited for fault-tolerant quantum computation. At the same time, these codes achieve very good performance in terms of error correction capability.", "url": "https://arxiv.org/abs/2607.15159", "type": "理论+数值", "summary": "我们使用低密度生成矩阵 (LDGM) 代码的生成器和奇偶校验矩阵构建了新的 Calderbank-Shor-Steane (CSS) 代码系列，并对两个矩阵应用行运算以实现所需的量子速率。通过在相关图上应用消息传递，以迭代方式执行解码，并使用离散密度演化 (DDE) 来优化去极化通道中的性能。所提出的结构在设计中提供了高度的灵活性和简易性，产生具有出色纠错能力的量子码。通过正确设计代码的结构，我们能够控制稳定器生成器的权重并将其限制为一个较小的值，这使得代码特别适合容错量子计算。同时，这些代码在纠错能力方面取得了非常好的性能。", "authors": [{"name": "Yumin Li"}, {"name": "Kejing Liu"}, {"name": "Hanqing Lou"}, {"name": "Javier Garcia-Frias"}], "featured_authors": [{"name": "Yumin Li"}, {"name": "Kejing Liu"}, {"name": "Hanqing Lou"}, {"name": "Javier Garcia-Frias"}], "author_count": 4}, {"id": "2607.15184", "category": "quant-ph", "title": "Backpropagating Pauli Propagation", "abstract": "We develop a backpropagation algorithm for evaluating parameter gradients in quantum circuits using Pauli propagation simulation. The method has computational complexity comparable to that of standard sparse Pauli simulation techniques, while producing gradients whose accuracy is of the same order as the corresponding observable expectation values. By exploiting the reversibility of quantum circuits, the algorithm reduces the memory cost by a factor of $\\mathcal{O}(n_\\text{param})$ compared with conventional reverse-mode automatic differentiation, where $n_\\text{param}$ denotes the number of parameters in the circuit. Compared with finite difference methods, the algorithm is $\\mathcal{O}(n_\\text{param})$ more efficient in function evaluations. These features enable efficient and accurate classical optimization of quantum circuits for applications such as state preparation and time-evolution compression, while also allowing operator-complexity measures such as the operator stabilizer Rényi entropy to be monitored and regularized during optimization. We demonstrate the method by optimizing low-energy state-preparation circuits for transverse-field Ising models in one, two, and three dimensions and for the three-dimensional Heisenberg model, and by compressing two-dimensional time-evolution circuits.", "url": "https://arxiv.org/abs/2607.15184", "type": "理论+数值", "summary": "我们开发了一种反向传播算法，用于使用泡利传播模拟来评估量子电路中的参数梯度。该方法的计算复杂度与标准稀疏泡利模拟技术相当，同时产生的梯度的精度与相应的可观察期望值具有相同的数量级。通过利用量子电路的可逆性，与传统的反向模式自动微分相比，该算法将内存成本降低了 $\\mathcal{O}(n_\\text{param})$ 倍，其中 $n_\\text{param}$ 表示电路中的参数数量。与有限差分方法相比，该算法在函数求值方面$\\mathcal{O}(n_\\text{param})$更加高效。这些功能能够对状态准备和时间演化压缩等应用的量子电路进行高效、准确的经典优化，同时还允许在优化过程中监控和正则化算子稳定器 Rényi 熵等算子复杂度测量。\n\n我们通过优化一维、二维和三维横向场伊辛模型以及三维海森堡模型的低能状态准备电路以及压缩二维时间演化电路来演示该方法。", "authors": [{"name": "Sheng-Hsuan Lin"}, {"name": "Etienne Granet"}, {"name": "Kevin Hémery"}, {"name": "Henrik Dreyer"}], "featured_authors": [{"name": "Sheng-Hsuan Lin"}, {"name": "Etienne Granet"}, {"name": "Kevin Hémery"}, {"name": "Henrik Dreyer"}], "author_count": 4}, {"id": "2607.15210", "category": "quant-ph", "title": "Counterexamples to additivity of minimum output $p$-Rényi entropy of quantum channels for $p>3/4$ and $0\\leq p<1/4$", "abstract": "Additivity of minimum output entropies is a central problem in quantum information theory. Nonadditivity is known for every Rényi order $p>1$, at the von Neumann point $p=1$, and near $p=0$, while most of the interval $0<p<1$ has remained open. We prove that for every Rényi order $p$ satisfying either $p>3/4$ or $0\\leq p<1/4$, there exist finite-dimensional projection-induced quantum channels such that additivity of the minimum output $p$-Rényi entropy fails. The proof combines two correlated random-projection constructions: a product-conjugate Bell-state witness for $p>3/4$, and a transpose-complement rank-defect witness for $p<1/4$. Thus the unresolved part of $0<p<1$ is reduced to $[1/4,3/4]$. Our estimates also improve the output dimension threshold for additivity violation of minimum output von Neumann entropy, first established in Belinschi, Collins and Nechida.", "url": "https://arxiv.org/abs/2607.15210", "type": "理论+数值", "summary": "最小输出熵的可加性是量子信息论的中心问题。对于每个 Rényi 阶 $p>1$，在冯诺依曼点 $p=1$ 和 $p=0$ 附近，非可加性都是已知的，而大多数区间 $0<p<1$ 仍然保持开放。我们证明，对于满足 $p>3/4$ 或 $0\\leq p<1/4$ 的每个 Rényi 阶 $p$，存在有限维投影诱导量子通道，使得最小输出 $p$-Rényi 熵的可加性失败。该证明结合了两个相关的随机投影结构：$p>3/4$ 的乘积共轭贝尔态见证，以及 $p<1/4$ 的转置补秩缺陷见证。因此 $0<p<1$ 的未解决部分被减少为 $[1/4,3/4]$。我们的估计还提高了最小输出冯·诺依曼熵的可加性违规的输出维度阈值，该阈值首先由 Belinschi、Collins 和 Nechida 建立。", "authors": [{"name": "Debbie Leung"}, {"name": "Benjamin Lovitz"}, {"name": "Peixue Wu"}], "featured_authors": [{"name": "Debbie Leung"}, {"name": "Benjamin Lovitz"}, {"name": "Peixue Wu"}], "author_count": 3}, {"id": "2607.15262", "category": "quant-ph", "title": "Dynamic Entanglement Distribution for Multi-User and Multi-Protocol Quantum Networking", "abstract": "Dynamic entanglement distribution is a key requirement for scalable, multi-user and multi-protocol quantum networks. We demonstrate a metropolitan-scale entanglement-based quantum communication network enabled by a quantum reconfigurable optical add-drop multiplexer (q-ROADM), which dynamically distributes polarisation-entangled photon pairs from a broadband source to six users over deployed campus and metropolitan fibre. The network supports programmable full-mesh, partial-mesh and sliced sub-network configurations, enabling flexible allocation of entanglement resources according to link condition and service requirement. We demonstrate stable six-user full-mesh operation over more than 150 hours, compare full-mesh and time-shared partial-mesh strategies under different source and detector conditions, and realise quantum network slicing with optional/additional interconnection links. We also show that the same infrastructure can support different quantum protocols by showcasing Secure Inaugural Authentication-Transfer (SIAT) combined with Network flooding over multiple paths to improve the security of onboarding a new user. These results demonstrate a q-ROADM-enabled entanglement distribution architecture as a novel route towards reconfigurable, service-oriented quantum networking over optical fibre infrastructure.", "url": "https://arxiv.org/abs/2607.15262", "type": "理论", "summary": "动态纠缠分布是可扩展、多用户和多协议量子网络的关键要求。我们展示了由量子可重构光分插复用器（q-ROADM）支持的城域规模基于纠缠的量子通信网络，该网络通过部署的园区和城域光纤将偏振纠缠光子对从宽带源动态分配给六个用户。该网络支持可编程的全网状、部分网状和切片子网配置，能够根据链路状况和业务需求灵活分配纠缠资源。我们展示了超过 150 小时的稳定六用户全网格运行，比较了不同源和探测器条件下的全网格和分时部分网格策略，并通过可选/附加互连链路实现了量子网络切片。我们还表明，通过展示安全首次身份验证传输（SIAT）与多路径上的网络泛洪相结合，相同的基础设施可以支持不同的量子协议，以提高新用户加入的安全性。\n\n这些结果表明，支持 q-ROADM 的纠缠分发架构是一种通过光纤基础设施实现可重构、面向服务的量子网络的新途径。", "authors": [{"name": "Rui Wang"}, {"name": "Marcus J. Clark"}, {"name": "Obada Alia"}, {"name": "Sima Bahrani"}, {"name": "Djeylan Aktas"}, {"name": "Matej Peranić"}, {"name": "Mario Stipčević"}, {"name": "Martin Lončarić"}, {"name": "John Rarity"}, {"name": "Siddarth K. Joshi"}, {"name": "Dimitra Simeonidou"}], "featured_authors": [{"name": "Rui Wang"}, {"name": "Marcus J. Clark"}, {"name": "Obada Alia"}, {"name": "John Rarity"}, {"name": "Siddarth K. Joshi"}, {"name": "Dimitra Simeonidou"}], "author_count": 11}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
