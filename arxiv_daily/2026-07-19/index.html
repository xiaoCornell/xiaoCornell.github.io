  <style>
    :root {
      --bg: #f6f1e8;

      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;

    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }

    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }

    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }

    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }

    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2607.14136", "category": "cond-mat", "title": "Gravity-Induced Thermal Rectification in Gaseous Systems", "abstract": "Thermal rectification (TR) typically relies on structural asymmetry or material heterogeneity. Here, we show that gravity alone can induce and modulate TR in gaseous systems. Using a minimal model of a single gas particle confined in a two-dimensional channel between heat baths at different temperatures, we analytically demonstrate that gravitational fields generate TR, enabling perfect unidirectional heat conduction across broad gravitational parameter ranges. This effect exhibits an intrinsic trade-off between rectification efficiency and heat power. Extending beyond the single-particle limit, numerical simulations confirm that gravitationally induced TR persists in interacting many-particle systems. Notably, in interacting gas mixtures, the rectification direction can be reversed. Gravity-mediated control of heat currents thus provides new fundamental insights into thermal transport and suggests design principles for gaseous thermal diodes.", "url": "https://arxiv.org/abs/2607.14136", "type": "理论+数值", "summary": "热整流 (TR) 通常依赖于结构不对称性或材料异质性。在这里，我们证明重力可以单独诱导和调节气体系统中的 TR。使用限制在不同温度的热浴之间的二维通道中的单个气体粒子的最小模型，我们分析证明了引力场产生TR，从而能够在广泛的引力参数范围内实现完美的单向热传导。这种效应表现出整流效率和热功率之间的内在权衡。数值模拟超越了单粒子极限，证实了引力引起的TR在相互作用的多粒子系统中持续存在。值得注意的是，在相互作用的气体混合物中，精馏方向可以颠倒。因此，重力介导的热流控制为热传输提供了新的基本见解，并提出了气态热二极管的设计原则。", "authors": [{"name": "Rongxiang Luo"}, {"name": "Chao Yang"}, {"name": "Juncheng Guo"}, {"name": "Qiyuan Zhang"}], "featured_authors": [{"name": "Rongxiang Luo"}, {"name": "Chao Yang"}, {"name": "Juncheng Guo"}, {"name": "Qiyuan Zhang"}], "author_count": 4}, {"id": "2607.14221", "category": "cond-mat", "title": "Spinless charged excitation at the interface between a conventional topological insulator and a topological Mott insulator", "abstract": "We investigate the interface separating two topologically distinct insulating phases of matter using extensive density-matrix renormalization group calculations to study the triangular-lattice Hofstadter-Hubbard model with a spatially varying interaction strength, chosen to realize both integer quantum Hall and chiral spin liquid states in different spatial regions. We find that the integer quantum Hall-chiral spin liquid interface hosts a spinless charged excitation that is bound to the interface. This mode at the interface is identified through charge and spin pumping, and by direct calculations of low-lying excited states. We also characterize bulk excitations in both phases, finding evidence for fractionalization in the chiral spin liquid and for spin-triplet exciton formation in the integer quantum Hall phase.", "url": "https://arxiv.org/abs/2607.14221", "type": "理论+数值", "summary": "我们使用广泛的密度矩阵重正化群计算来研究分隔两个拓扑不同的物质绝缘相的界面，以研究具有空间变化相互作用强度的三角晶格Hofstadter-Hubbard模型，选择在不同空间区域实现整数量子霍尔和手性自旋液态。我们发现整数量子霍尔-手性自旋液体界面具有与界面结合的无自旋带电激发。界面处的这种模式是通过电荷和自旋泵浦以及通过直接计算低位激发态来识别的。我们还表征了两个相中的体激发，寻找手性自旋液体中的分级和整数量子霍尔相中自旋三重态激子形成的证据。", "authors": [{"name": "Cesar A. Gallegos"}, {"name": "Andrew J. Millis"}, {"name": "Steven R. White"}], "featured_authors": [{"name": "Cesar A. Gallegos"}, {"name": "Andrew J. Millis"}, {"name": "Steven R. White"}], "author_count": 3}, {"id": "2607.14232", "category": "cond-mat", "title": "Phonons in low-dimensional confined systems: Emergent non-reciprocity in 1D", "abstract": "An important feature of solid-state or cold atom systems in low dimensions is the restricted oscillations of ionic/atomic degrees of freedom in the confining directions, for which the conventional phonon from canonical quantization is not an ideal description. In this work we propose a general recipe to introduce this feature to otherwise unrestricted systems by mapping displacement fields to spin degrees of freedom. We demonstrate the validity of the approach with a 1D harmonic chain, and the results lead to massive Dirac fermions at long distances, showing the absence of acoustic modes as the signature of confined out-of-plane motion of the entire chain. We then introduce a short-range interaction via anharmonicities and show that for energy scale slightly above the gap, it gives rise to a (quantum) phase transition to a nonreciprocal state with spontaneous time reversal symmetry breaking (TRSB) of the type $\\hat{T}^2=+1$. Despite the non-conserved total particle number, the model holds an under-appreciated $U(1)$ symmetry with conserved \"polarization charge\", so that the nonreciprocity can be probed by measuring the change of inductivity to artificial gauge fields in and out of the ordered phase.", "url": "https://arxiv.org/abs/2607.14232", "type": "理论", "summary": "低维固态或冷原子系统的一个重要特征是离子/原子自由度在限制方向上的受限振荡，而来自正则量子化的传统声子并不是理想的描述。在这项工作中，我们提出了一种通用方法，通过将位移场映射到自旋自由度，将此功能引入到其他不受限制的系统中。我们用一维谐波链证明了该方法的有效性，结果导致长距离的大量狄拉克费米子，表明不存在声学模式作为整个链的受限平面外运动的特征。然后，我们通过非谐性引入短程相互作用，并表明，对于略高于能隙的能量尺度，它会引起（量子）相变到非互易态，并具有 $\\hat{T}^2=+1$ 类型的自发时间反转对称破缺（TRSB）。\n\n尽管总粒子数不守恒，但该模型仍具有未被充分重视的 $U(1)$ 对称性和保守的“极化电荷”，因此可以通过测量有序相内和外的人工规范场的感应率变化来探测非互易性。", "authors": [{"name": "Yuan Gao"}, {"name": "K.A. Muttalib"}], "featured_authors": [{"name": "Yuan Gao"}, {"name": "K.A. Muttalib"}], "author_count": 2}, {"id": "2607.14263", "category": "cond-mat", "title": "AutoHF: a general Hartree-Fock solver utilizing direct energy minimization with automatic differentiation", "abstract": "We present autohf, a general, easy-to-use mean-field solver for quantum many-fermion Hamiltonians. It allows the user to bypass the process of deciphering the mean-field form for each many-body Hamiltonian $H$ and thus avoid setting up a tailored program for each $H$. Rather, autohf finds the optimal Slater determinant $|\\Psi\\rangle$, written in terms of orbital coefficients and subject to symmetry constraints, by directly minimizing the variational energy $\\langle H \\rangle$. By embracing this variational approach, autohf makes use of the growing power of automatic differentiation and optimization tools developed by the machine learning community.", "url": "https://arxiv.org/abs/2607.14263", "type": "理论+数值", "summary": "我们提出了 autohf，一种通用的、易于使用的量子多费米子哈密顿量平均场求解器。它允许用户绕过破译每个多体哈密顿量 $H$ 的平均场形式的过程，从而避免为每个 $H$ 设置定制程序。相反，autohf 通过直接最小化变分能量 $\\langle H \\rangle$，找到最佳的 Slater 行列式 $|\\Psi\\rangle$，以轨道系数形式编写并受到对称性约束。通过采用这种变分方法，autohf 利用了机器学习社区开发的自动微分和优化工具日益强大的功能。", "authors": [{"name": "Ryan Levy"}, {"name": "Brandon Eskridge"}, {"name": "Lukas Weber"}, {"name": "Miguel A. Morales"}, {"name": "Shiwei Zhang"}], "featured_authors": [{"name": "Ryan Levy"}, {"name": "Brandon Eskridge"}, {"name": "Lukas Weber"}, {"name": "Miguel A. Morales"}, {"name": "Shiwei Zhang"}], "author_count": 5}, {"id": "2607.14383", "category": "cond-mat", "title": "Long-lived memory in sliding spin chains", "abstract": "We study a system of two ferromagnetic one-dimensional Ising chains coupled to a thermal bath, which are driven out of equilibrium by being moved past one another at a constant speed. We show that even at modest speeds, magnetic friction between the two chains significantly increases the ability of the system to order. In particular, at inverse temperature $\\beta$, Ising coupling $J$, and sliding speed $v$, the dynamics retains memory of its initial magnetization for a time that increases from $\\exp(O(\\beta J))$ at $v = 0$ to $\\exp(O((\\beta J)^2v\\ln v))$ when $v>v_c$, where $v_c$ is a small constant. Magnetic friction thus provides a simple mechanism for parametrically slowing down thermalization in a one-dimensional magnet.", "url": "https://arxiv.org/abs/2607.14383", "type": "理论", "summary": "我们研究了一个由两个铁磁一维伊辛链耦合到一个热浴的系统，该系统通过以恒定速度相互移动而失去平衡。我们表明，即使在中等速度下，两条链之间的磁摩擦也会显着提高系统的排序能力。特别是，在逆温度 $\\beta$、伊辛耦合 $J$ 和滑动速度 $v$ 下，动力学保留其初始磁化强度的记忆时间从 $v = 0$ 时的 $\\exp(O(\\beta J))$ 增加到 $v>v_c$ 时的 $\\exp(O((\\beta J)^2v\\ln v))$，其中 $v_c$ 是一个小常数。因此，磁摩擦提供了一种简单的机制，用于以参数方式减缓一维磁体的热化。", "authors": [{"name": "Charles Stahl"}, {"name": "Ethan Lake"}], "featured_authors": [{"name": "Charles Stahl"}, {"name": "Ethan Lake"}], "author_count": 2}, {"id": "2607.14388", "category": "cond-mat", "title": "Memory of Initial Conditions in Self-Similar Diffusion: A Renormalization-Group Perspective", "abstract": "Universality is usually associated with asymptotic behavior becoming independent of details of the initial state. Using a unified renormalization-group (RG) framework for self-similar dynamics, we show that retaining relevant length scales leads naturally to distinct classes of memory-retaining fixed points. A modified density-dependent diffusion model reveals a general scaling structure in which initial-condition information remains asymptotically relevant, with the Barenblatt equation emerging as a special case. These results provide a new perspective on universality and anomalous scaling.", "url": "https://arxiv.org/abs/2607.14388", "type": "理论", "summary": "普遍性通常与渐近行为变得独立于初始状态的细节相关。使用统一的重正化群（RG）框架进行自相似动力学，我们表明保留相关的长度尺度自然会导致不同类别的记忆保留不动点。修改后的密度相关扩散模型揭示了一种一般的标度结构，其中初始条件信息保持渐近相关，巴伦布拉特方程作为一个特例出现。这些结果为普遍性和异常缩放提供了新的视角。", "authors": [{"name": "Ko Okumura"}], "featured_authors": [{"name": "Ko Okumura"}], "author_count": 1}, {"id": "2607.14402", "category": "cond-mat", "title": "The two-particle density matrix of a Luttinger liquid", "abstract": "Two-particle coherence is the first level of the reduced-density-matrix hierarchy that contains correlations inaccessible to single-particle observables, yet analytic two-particle density matrices are rare even in one dimension. We derive a closed, finite-size expression for the equal-time two-particle reduced density matrix of spinless fermions in a Tomonaga-Luttinger liquid using constructive bosonization with an explicit ultraviolet cutoff. In addition to the familiar Luttinger parameter $K$-dependent exponent $\\gamma^2=(K+K^{-1}-2)/2$ which governs the spatial decay of matrix elements, the result exposes a second exponent, $\\lambda=(K^{-1}-K)/2$, which encodes correlations between opposite chiralities and controls the off-diagonal structure. The diagonal limit of the two-particle reduced density matrix yields density correlations and the static structure factor, while its coherences resolve algebraic $2k_F$ charge-density-wave correlations for repulsion and odd-parity p-wave pairing correlations for attraction. After fixing the cutoff from the one-particle density matrix, the analytic result quantitatively reproduces density matrix renormalization group calculations of the interacting J-V chain within the Luttinger liquid regime. The result connects universal Luttinger liquid scaling with observables in finite microscopic systems.", "url": "https://arxiv.org/abs/2607.14402", "type": "理论+数值", "summary": "双粒子相干性是降密度矩阵层次结构的第一级，其中包含单粒子可观测量无法访问的相关性，但即使在一维中，解析的双粒子密度矩阵也很少见。我们使用具有显式紫外线截止的相长玻色化，导出了 Tomonaga-Luttinger 液体中无自旋费米子的等时双粒子约简密度矩阵的封闭有限大小表达式。除了熟悉的 Luttinger 参数 $K$ 相关指数 $\\gamma^2=(K+K^{-1}-2)/2$ 控制矩阵元素的空间衰减之外，结果还暴露了第二个指数 $\\lambda=(K^{-1}-K)/2$，它编码相反手性之间的相关性并控制非对角结构。双粒子约化密度矩阵的对角极限产生密度相关性和静态结构因子，而其相干性则解决了排斥的代数 $2k_F$ 电荷密度波相关性和吸引力的奇宇称 p 波配对相关性。\n\n固定单粒子密度矩阵的截止值后，分析结果定量地再现了 Luttinger 液体体系内相互作用的 J-V 链的密度矩阵重正化群计算。结果将通用卢廷格液体标度与有限微观系统中的可观测值联系起来。", "authors": [{"name": "Harini Radhakrishnan"}, {"name": "Matthias Thamm"}, {"name": "Hatem Barghathi"}, {"name": "Bernd Rosenow"}, {"name": "Adrian Del Maestro"}], "featured_authors": [{"name": "Harini Radhakrishnan"}, {"name": "Matthias Thamm"}, {"name": "Hatem Barghathi"}, {"name": "Bernd Rosenow"}, {"name": "Adrian Del Maestro"}], "author_count": 5}, {"id": "2607.14520", "category": "cond-mat", "title": "Moment-Resolved Readout and Reservoir Diversity in Nonequilibrium Langevin Computing", "abstract": "Nonlinear thermodynamic computers based on Langevin dynamics exploit thermal fluctuations as a physical substrate for computation. Recent work has shown that quartic-confined fluctuating degrees of freedom can act as thermodynamic neurons capable of nonlinear function approximation at finite observation times. Here we extend this paradigm from mean-only readout to moment-resolved readout. Instead of representing each driven reservoir solely by its first moment, we construct a response vector from the elementwise raw polynomial moments \\(\\mathbb{E}[\\bm{x}]\\), \\(\\mathbb{E}[\\bm{x}^{\\odot 2}]\\), and \\(\\mathbb{E}[\\bm{x}^{\\odot 4}]\\). These observables combine displacement and central-shape contributions and are naturally aligned with the linear, quadratic, and quartic terms of the local driven dynamics. We further introduce a heterogeneous multi-reservoir architecture in which three reservoirs with distinct initialization and training histories form a joint \\(2304\\)-dimensional response representation. Under the fixed MNIST \\(60000/10000\\) reproduction protocol, feature-level fusion achieves the best observed accuracy of \\(9695/10000=96.95\\%\\), compared with \\(9682/10000=96.82\\%\\) for the strongest single-reservoir model and \\(9684/10000=96.84\\%\\) for equal-weight logit averaging. An exact paired McNemar test does not establish a statistically significant improvement over the strongest single reservoir, but the ablation and wrong-set overlap results provide suggestive evidence of complementary classification errors. These results motivate higher-order polynomial-moment readout and reservoir heterogeneity as candidate design principles for finite-time Langevin computing.", "url": "https://arxiv.org/abs/2607.14520", "type": "理论+数值", "summary": "基于朗之万动力学的非线性热力学计算机利用热波动作为计算的物理基础。最近的工作表明，四次约束波动自由度可以充当热力学神经元，能够在有限的观察时间内进行非线性函数逼近。在这里，我们将这种范式从仅平均值读出扩展到矩分辨读出。我们不是仅用其一阶矩来表示每个驱动水库，而是根据元素原始多项式矩 \\(\\mathbb{E}[\\bm{x}]\\)、\\(\\mathbb{E}[\\bm{x}^{\\odot 2}]\\) 和 \\(\\mathbb{E}[\\bm{x}^{\\odot 4}]\\) 构造响应向量。这些可观测量结合了位移和中心形状的贡献，并且自然地与局部驱动动力学的线性、二次和四次项对齐。我们进一步引入了一种异构多储层架构，其中具有不同初始化和训练历史的三个储层形成了联合\\(2304\\)维响应表示。\n\n在固定的 MNIST \\(60000/10000\\) 再现协议下，特征级融合实现了最佳观测精度 \\(9695/10000=96.95\\%\\)，相比之下最强单库模型为 \\(9682/10000=96.82\\%\\) 和最强单库模型 \\(9684/10000=96.84\\%\\)等权 Logit 平均。精确配对的麦克尼马尔检验并没有建立相对于最强的单一储层的统计上显着的改进，但是消融和错误设置重叠结果提供了互补分类错误的暗示证据。这些结果激发了高阶多项式矩读数和储层异质性作为有限时间朗之万计算的候选设计原则。", "authors": [{"name": "JiZheng Duan"}, {"name": "MingYang Zhao"}, {"name": "YanWei Chen"}, {"name": "Lei Yang"}], "featured_authors": [{"name": "JiZheng Duan"}, {"name": "MingYang Zhao"}, {"name": "YanWei Chen"}, {"name": "Lei Yang"}], "author_count": 4}, {"id": "2607.14714", "category": "cond-mat", "title": "Amoeboid swimming of active vesicles", "abstract": "We investigate the shape dynamics and migration of weakly deflated active vesicles driven by processes acting either directly in the membrane or transmitted by the cytoskeleton. For a force-free vesicle, local membrane incompressibility suppresses rigid-body translation, so that migration arises from time-dependent shape deformations. Assuming small excess area enables a systematic analysis of the coupled deformation and migration dynamics in free space, i.e. in the absence of substrate adhesion or confinement. Depending on the strength and frequency of the activity, the vesicle exhibits several dynamical regimes, including synchronized oscillations, quasiperiodic shape changes, transitions between non-propelling and propelling states, and intermittent motion.", "url": "https://arxiv.org/abs/2607.14714", "type": "数值", "summary": "我们研究了由直接作用于膜或通过细胞骨架传递的过程驱动的弱收缩活性囊泡的形状动力学和迁移。对于无力囊泡，局部膜不可压缩性抑制刚体平移，因此迁移是由时间依赖性形状变形引起的。假设小的多余面积能够对自由空间中的耦合变形和迁移动力学进行系统分析，即在没有基材粘附或限制的情况下。根据活动的强度和频率，囊泡表现出几种动态状态，包括同步振荡、准周期形状变化、非推进和推进状态之间的转换以及间歇运动。", "authors": [{"name": "Reiner Kree"}, {"name": "Annette Zippelius"}], "featured_authors": [{"name": "Reiner Kree"}, {"name": "Annette Zippelius"}], "author_count": 2}, {"id": "2607.14766", "category": "cond-mat", "title": "Emergence of a monopole phase in the $J_1{-}J_2$ Heisenberg model on the triangular lattice for small magnetic fields", "abstract": "We investigate the ground-state phase diagram of the $J_1{-}J_2$ Heisenberg model on the triangular lattice under an external Zeeman field $H$ by using the variational Monte Carlo approach. We span a region with $0 \\le J_2/J_1 \\le 0.2$ and $0 \\le H/J_1 \\le 2$, to assess the fate of the (putative) spin-liquid phase that has been detected for $J_2/J_1=1/8$ at zero magnetic field. Simple variational ansatze are proposed for a few candidate states, and their energetics are compared on large clusters to obtain the phase diagram. For $J_2/J_1 \\lesssim 1/6$, a continuous transition from a gapless \"Y'' phase to a gapped \"up-up-down'' phase is obtained, as predicted by spin-wave theory. Most importantly, around $J_2/J_1=1/8$, a condensate of monopoles (which are gapless gauge excitations of the spin liquid at $H=0$) is stabilized in a significant region of the phase diagram, for small Zeeman fields. Here, a finite scalar chirality is present, while no transverse magnetic order is detected. The stability of the monopole phase is confirmed by a field-theory approach that includes a self-consistent random-phase approximation of the low-lying spin fluctuations. The boundary between the monopole and \"Y'' phases is also obtained with no free parameters.", "url": "https://arxiv.org/abs/2607.14766", "type": "理论+数值", "summary": "我们使用变分蒙特卡罗方法研究了外部塞曼场 $H$ 下三角晶格上 $J_1{-}J_2$ 海森堡模型的基态相图。我们跨越 $0 \\le J_2/J_1 \\le 0.2$ 和 $0 \\le H/J_1 \\le 2$ 的区域，以评估在零磁场下检测到的 $J_2/J_1=1/8$ 的（假定）自旋液相的命运。针对一些候选态提出了简单的变分模拟，并在大簇上比较它们的能量以获得相图。对于 $J_2/J_1 \\lesssim 1/6$，获得从无间隙“Y”相到有间隙“上下”相的连续转变，正如自旋波理论所预测的那样。最重要的是，在 $J_2/J_1=1/8$ 附近，对于小塞曼场，单极子凝聚体（在 $H=0$ 处自旋液体的无间隙规范激发）稳定在相图的重要区域中。这里，存在有限标量手性，而没有检测到横向磁序。单极子相位的稳定性通过场论方法得到证实，该方法包括低位自旋涨落的自洽随机相位近似。\n\n单极子相和“Y”相之间的边界也是在没有自由参数的情况下获得的。", "authors": [{"name": "Sasank Budaraju"}, {"name": "Shi Feng"}, {"name": "Josef Willsher"}, {"name": "Johannes Knolle"}, {"name": "Frank Pollmann"}, {"name": "Federico Becca"}], "featured_authors": [{"name": "Sasank Budaraju"}, {"name": "Shi Feng"}, {"name": "Josef Willsher"}, {"name": "Johannes Knolle"}, {"name": "Frank Pollmann"}, {"name": "Federico Becca"}], "author_count": 6}, {"id": "2607.14799", "category": "cond-mat", "title": "The distribution of eccentricities in random regular graphs", "abstract": "We derive a closed-form analytical expression for the distribution of eccentricities (DoE) in random regular graphs (RRGs) that consist of $N$ nodes of degree $c$. The DoE is given by the tail distribution $P(E > \\ell) \\simeq 1 - \\exp \\left[ - \\exp \\left( - \\frac{ e^{b \\ell} - \\mu }{\\beta} \\right) \\right]$, where the distance $\\ell$ takes integer values, $b = \\ln (c-1)$ is the shape parameter, $\\beta = \\frac{c-2}{c} N$ is the scale parameter and $\\mu = \\frac{c-2}{c} N \\ln N$ is the location parameter. By providing the full distribution rather than a single characteristic length scale, we present a detailed view of the large-scale structure. In spite of the fact that the degrees of all the nodes are the same, their eccentricities exhibit non-trivial variations. We derive a closed-form expression for the mean eccentricity, which is given by $\\langle E \\rangle \\simeq \\frac{\\ln N}{\\ln (c-1)} + \\frac{\\ln \\ln N}{\\ln (c-1)} - \\frac{ \\ln c - \\ln (c-2) }{ \\ln (c-1) } + \\frac{1}{2}$. We calculate the mode of the DoE, which exhibits a staircase profile as a function of the network size. Interestingly, the mode is given by $E_{\\rm mode} ={\\rm Round} \\left( \\langle E \\rangle \\right)$, where ${\\rm Round}( x )$ is the nearest integer to $x$. We also calculate the variance ${\\rm Var}(E)$ and show that it exhibits oscillations as a function of the network size $N$. The results presented in this paper may serve as benchmarks for algorithmic approaches to eccentricity calculations in large sparse networks. The eccentricities are important in practical applications such as broadcasting and global dissemination, where the network performance is determined by the longest delay times.", "url": "https://arxiv.org/abs/2607.14799", "type": "数值", "summary": "我们推导出随机正则图 (RRG) 中偏心率分布 (DoE) 的封闭式解析表达式，该随机正则图 (RRG) 由 $N$ 个 $c$ 度的节点组成。 DoE 由尾部分布 $P(E > \\ell) \\simeq 1 - \\exp \\left[ - \\exp \\left( - \\frac{ e^{b \\ell} - \\mu }{\\beta} \\right) \\right]$ 给出，其中距离 $\\ell$ 取整数值，$b = \\ln (c-1)$ 是形状参数，$\\beta = \\frac{c-2}{c} N$ 是尺度参数，$\\mu = \\frac{c-2}{c} N \\ln N$ 是位置参数。通过提供完整的分布而不是单一的特征长度尺度，我们呈现了大规模结构的详细视图。尽管所有节点的度数相同，但它们的偏心率却表现出不小的变化。我们推导出平均偏心率的封闭式表达式，由 $\\langle E \\rangle \\simeq \\frac{\\ln N}{\\ln (c-1)} + \\frac{\\ln \\ln N}{\\ln (c-1)} - \\frac{ \\ln c - \\ln (c-2) }{ \\ln (c-1) } + \\frac{1}{2}$ 给出。我们计算 DoE 的模式，它呈现出作为网络大小函数的阶梯轮廓。\n\n有趣的是，模式由 $E_{\\rm mode} ={\\rm Round} \\left( \\langle E \\rangle \\right)$ 给出，其中 ${\\rm Round}( x )$ 是最接近 $x$ 的整数。我们还计算方差 ${\\rm Var}(E)$ 并表明它表现出作为网络大小 $N$ 的函数的振荡。本文提出的结果可以作为大型稀疏网络中偏心率计算算法方法的基准。偏心率在广播和全球传播等实际应用中很重要，其中网络性能由最长延迟时间决定。", "authors": [{"name": "Dor Lev-Ari"}, {"name": "Ofer Biham"}, {"name": "Eytan Katzav"}], "featured_authors": [{"name": "Dor Lev-Ari"}, {"name": "Ofer Biham"}, {"name": "Eytan Katzav"}], "author_count": 3}, {"id": "2607.14827", "category": "cond-mat", "title": "SevenNet-Polar for MultiTask Prediction of Energy, Forces, Stress, and Born Effective Charges: Development and Application to ZrO$_2$, Li$_3$PO$_4$, and Perovskites", "abstract": "Accurate prediction of the Born effective charge (BEC) tensor is crucial for modeling materials under electric fields but remains computationally expensive. To bridge this gap, we present SevenNet-Polar, an equivariant graph neural network framework based on the SevenNet architecture for fast and accurate BEC predictions. Our BEC-only predictors can achieve an RMSE as low as 0.0043 e on ZrO$_2$, Li$_3$PO$_4$, and perovskites, despite the presence of high-temperature (up to 2,000 K) and defect-laden training data. Our all-in-one multitask models for predicting energy, forces, stress, and BEC in ZrO$_2$ and Li$_3$PO$_4$ achieve high accuracy with an RMSE of 1.0 meV/atom for energy, 12 meV/angstrom for forces, 0.05 GPa for stress, and 0.0029 e for BEC. BEC accuracy is not degraded by multitask training. Scaling analysis reveals distinct exponents for diagonal and off-diagonal BEC components, both of which exhibit less favorable scaling than energy, force and stress errors. SevenNet-Polar generalizes robustly when tested on scenarios containing structural environments absent from the training set, such as along nudged elastic band (NEB) trajectories or grain boundaries in ZrO$_2$. Accelerated by FlashTP, SevenNet-Polar enables simulations containing up to 1.5 million atoms on multi-GPU supercomputers and up to approximately 15,000 atoms on a single consumer-grade GPU. This makes charge-aware molecular dynamics simulations under electric fields more accessible.", "url": "https://arxiv.org/abs/2607.14827", "type": "理论+数值", "summary": "准确预测玻恩有效电荷 (BEC) 张量对于电场下的材料建模至关重要，但计算成本仍然很高。为了弥补这一差距，我们提出了 SevenNet-Polar，这是一种基于 SevenNet 架构的等变图神经网络框架，可实现快速准确的 BEC 预测。尽管存在高温（高达 2,000 K）和充满缺陷的训练数据，但我们的仅 BEC 预测器在 ZrO$_2$、Li$_3$PO$_4$ 和钙钛矿上仍可以实现低至 0.0043 e 的 RMSE。我们用于预测 ZrO$_2$ 和 Li$_3$PO$_4$ 中的能量、力、应力和 BEC 的一体化多任务模型实现了高精度，能量 RMSE 为 1.0 meV/atom，力为 12 meV/angstrom，应力为 0.05 GPa，BEC 为 0.0029 e。 BEC 准确性不会因多任务训练而降低。标度分析揭示了对角线和非对角线 BEC 分量的不同指数，这两者都表现出比能量、力和应力误差更不利的标度。在包含训练集中不存在的结构环境的场景（例如沿微动弹性带 (NEB) 轨迹或 ZrO$_2$ 中的晶界）进行测试时，SevenNet-Polar 具有稳健的泛化能力。\n\n在 FlashTP 的加速下，SevenNet-Polar 能够在多 GPU 超级计算机上模拟多达 150 万个原子，在单个消费级 GPU 上模拟多达约 15,000 个原子。这使得电场下的电荷感知分子动力学模拟变得更容易。", "authors": [{"name": "Anh Khoa Augustin Lu"}, {"name": "Shungo Arai"}, {"name": "Yutack Park"}, {"name": "Seungwu Han"}, {"name": "Tsuyoshi Miyazaki"}, {"name": "Satoshi Watanabe"}], "featured_authors": [{"name": "Anh Khoa Augustin Lu"}, {"name": "Shungo Arai"}, {"name": "Yutack Park"}, {"name": "Seungwu Han"}, {"name": "Tsuyoshi Miyazaki"}, {"name": "Satoshi Watanabe"}], "author_count": 6}, {"id": "2607.14838", "category": "cond-mat", "title": "Density-driven reentrant polymer transitions via saturable bridging crowders", "abstract": "Reentrant coil-globule-coil transitions, in which a polymer collapses and then reexpands as a single parameter is varied, have been observed across diverse soft matter systems, yet the minimal ingredients required to produce them remain unclear. Using molecular dynamics simulations of coarse-grained polymers interacting with a single species of attractive crowder, we show that crowder volume fraction $\\phi_c$ alone is sufficient to drive a complete reentrant transition. At low $\\phi_c$, crowders bridge distant monomers and drive cooperative collapse; at high $\\phi_c$, saturation of monomer binding sites suppresses bridging connectivity and produces reentrant expansion. This density-driven transition is absent with purely repulsive crowders, which produce only monotonic compaction while preserving self-avoiding walk (SAW) chain statistics. In contrast, bridging breaks SAW universality: the rescaled size distributions no longer collapse onto a universal curve, and the conformational distributions trace the full coil-globule-coil trajectory as $\\phi_c$ is varied. For charged polymers with explicit counterions, electrostatics amplifies rather than suppresses reentrance: bridging crowders displace counterions from the chain, and upon saturation the unscreened backbone charges drive expansion well beyond the original chain size. Saturable geometric bridging thus emerges as a minimal mechanism linking reentrant phenomena across neutral and charged polymers in crowded environments.", "url": "https://arxiv.org/abs/2607.14838", "type": "数值", "summary": "在不同的软物质系统中都观察到了可重入线圈-球体-线圈转变，其中聚合物崩溃然后重新膨胀，因为单个参数发生变化，但生产它们所需的最低成分仍不清楚。通过对粗粒聚合物与单一种类的有吸引力的拥挤剂相互作用的分子动力学模拟，我们表明单独的拥挤剂体积分数 $\\phi_c$ 足以驱动完整的重入转变。在$\\phi_c$较低时，拥挤者会桥接遥远的单体并导致合作崩溃；在高 $\\phi_c$ 时，单体结合位点的饱和会抑制桥接连接并产生可重入扩展。这种密度驱动的转变在纯粹的排斥性拥挤器中不存在，它只产生单调压缩，同时保留自回避行走（SAW）链统计数据。相反，桥接破坏了 SAW 的普遍性：重新调整的尺寸分布不再折叠到通用曲线上，并且随着 $\\phi_c$ 的变化，构象分布跟踪完整的线圈-球-线圈轨迹。\n\n对于具有显式抗衡离子的带电聚合物，静电会放大而不是抑制重入：桥联拥挤剂将抗衡离子从链上取代，并且在饱和时，未屏蔽的主链电荷驱动膨胀远远超出原始链尺寸。因此，饱和几何桥接成为在拥挤环境中连接中性和带电聚合物之间的重入现象的最小机制。", "authors": [{"name": "Monmee Phukan"}, {"name": "Hitesh Garg"}, {"name": "Satyavani Vemparala"}], "featured_authors": [{"name": "Monmee Phukan"}, {"name": "Hitesh Garg"}, {"name": "Satyavani Vemparala"}], "author_count": 3}, {"id": "2607.14875", "category": "cond-mat", "title": "Optimization dynamics of Transformer backflow neural quantum states for the two-dimensional Hubbard model", "abstract": "Building on the multi-determinant Transformer backflow neural quantum state (NQS) ansatz and the associated multi-stage training workflow for the doped two-dimensional Hubbard model, we investigate how the optimization dynamics of the NQS depend on several key optimization and architectural hyperparameters. The workflow consists of neural-network backflow (NNB) initialization, supervised Transformer pre-training, and main energy optimization using the Moment-Adaptive ReConfiguration Heuristic (MARCH) within variational Monte Carlo. Using the doped $4\\times4$ periodic Hubbard model at $U=8$ as a baseline, we examine how the update-norm threshold, Transformer width, number of determinant channels, and Monte Carlo batch size affect convergence. We find that a moderate update constraint improves the efficiency of MARCH optimization, larger Transformer width and more determinant channels improve the expressive capacity of the ansatz, and larger Monte Carlo batches reduce sampling noise in the update direction. We further test the same workflow at half filling, weaker interaction strength, open boundary conditions, and on a larger $8\\times8$ doped lattice. These results identify practical optimization trends for Transformer backflow NQSs and highlight the balance between ansatz expressivity, MARCH update stability, and Monte Carlo sampling quality.", "url": "https://arxiv.org/abs/2607.14875", "type": "理论+数值", "summary": "基于多行列式 Transformer 回流神经量子态 (NQS) ansatz 和掺杂二维 Hubbard 模型的相关多阶段训练工作流程，我们研究了 NQS 的优化动态如何取决于几个关键优化和架构超参数。该工作流程包括神经网络回流 (NNB) 初始化、监督 Transformer 预训练以及使用变分蒙特卡罗内的矩自适应重新配置启发式 (MARCH) 进行主要能量优化。使用 $U=8$ 处的掺杂 $4\\times4$ 周期性哈伯德模型作为基线，我们检查更新范数阈值、Transformer 宽度、行列式通道数和蒙特卡罗批量大小如何影响收敛。我们发现，适度的更新约束提高了 MARCH 优化的效率，更大的 Transformer 宽度和更多的决定性通道提高了 ansatz 的表达能力，更大的蒙特卡洛批次减少了更新方向上的采样噪声。我们进一步在半填充、较弱的相互作用强度、开放边界条件以及更大的 8\\times8$ 掺杂晶格上测试相同的工作流程。\n\n这些结果确定了 Transformer 回流 NQS 的实际优化趋势，并强调了 ansatz 表达性、MARCH 更新稳定性和蒙特卡洛采样质量之间的平衡。", "authors": [{"name": "Zong-Yu Liao"}, {"name": "Jia-Qi Wang"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "featured_authors": [{"name": "Zong-Yu Liao"}, {"name": "Jia-Qi Wang"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "author_count": 4}, {"id": "2607.14917", "category": "cond-mat", "title": "Star-triangle duality estimates for triangular and honeycomb permutation models", "abstract": "We study a duality analysis in conjunction with the star-triangle transformation for symmetric-group permutation models on the triangular and honeycomb lattices. The calculation is motivated by the permutation-model description of random tensor networks and by earlier duality analyses of replicated spin glasses. The essential point is that the finite-basis unit is not a bare bond but a star-triangle block. Our analysis estimates the critical bond dimension for the honeycomb lattice to be 2.634929344884, and the associated single-bond duality relation yields the triangular-lattice estimate 1.475661534848.", "url": "https://arxiv.org/abs/2607.14917", "type": "理论+数值", "summary": "我们研究了对偶性分析以及三角形和蜂窝晶格上对称群置换模型的星三角变换。该计算是由随机张量网络的排列模型描述和复制自旋玻璃的早期对偶性分析推动的。要点是有限基单元不是裸键而是星三角块。我们的分析估计蜂窝晶格的临界键维数为 2.634929344884，相关的单键对偶关系得出三角晶格估计值为 1.475661534848。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2607.14922", "category": "cond-mat", "title": "Spot Profile Analysis Low Energy Electron Diffraction of Plasma-Enhanced Chemical Vapor Deposition Grown Epitaxial Few-Layer Graphene on Sapphire", "abstract": "We demonstrate the use of high-resolution spot-profile analysis low-energy electron diffraction to determine the mean grain size of plasma-enhanced chemical vapor deposition grown few-layer graphene on sapphire (Al$_2$O$_3$). The diffraction patterns exhibit broadened graphene spots, pronounced diffuse scattering, and azimuthally extended features, indicating finite crystallite size and rotational disorder. By analyzing the finite-size broadening of the specular (00) spot with an Airy-type diffraction profile, we determine a mean grain diameter of 3.7$\\,$nm for the as-grown graphene layer. Post-growth annealing under ultrahigh-vacuum conditions increases the mean grain size to about 5.7$\\,$nm and 6.8$\\,$nm, respectively. These results establish SPA-LEED as a sensitive reciprocal-space method for quantifying the structural coherence of directly grown graphene on insulating substrates.", "url": "https://arxiv.org/abs/2607.14922", "type": "理论", "summary": "我们演示了使用高分辨率点轮廓分析低能电子衍射来确定蓝宝石 (Al$_2$O$_3$) 上等离子增强化学气相沉积生长的几层石墨烯的平均晶粒尺寸。衍射图案表现出加宽的石墨烯斑点、明显的漫散射和方位延伸的特征，表明有限的微晶尺寸和旋转无序。通过使用艾里型衍射轮廓分析镜面 (00) 光斑的有限尺寸展宽，我们确定生长的石墨烯层的平均晶粒直径为 3.7$\\,$nm。超高真空条件下的生长后退火将平均晶粒尺寸分别增加到约 5.7$\\,$nm 和 6.8$\\,$nm。这些结果将 SPA-LEED 确立为一种灵敏的倒易空间方法，用于量化绝缘基板上直接生长的石墨烯的结构相干性。", "authors": [{"name": "Niels Ganser"}, {"name": "Marko A. Kriegel"}, {"name": "Umut Kaya"}, {"name": "Jixi Zhang"}, {"name": "Rodney D. L. Smith"}, {"name": "Marika Schleberger"}, {"name": "Wolfgang Mertin"}, {"name": "Gerd Bacher"}, {"name": "Michael Horn-von Hoegen"}], "featured_authors": [{"name": "Niels Ganser"}, {"name": "Marko A. Kriegel"}, {"name": "Umut Kaya"}, {"name": "Wolfgang Mertin"}, {"name": "Gerd Bacher"}, {"name": "Michael Horn-von Hoegen"}], "author_count": 9}, {"id": "2607.14969", "category": "cond-mat", "title": "Collective dynamics of harmonically trapped 1D quantum droplets under linear gravitational-like confinement", "abstract": "We investigate the dynamics of harmonically confined quantum droplets in a binary Bose Einstein condensate within the one dimensional extended Gross Pitaevskii framework, including LHY corrections, under a constant linear (gravitational like) potential. By analyzing the COM and width dynamics, we show that the monopole (breathing) mode remains governed by the harmonic confinement, with a frequency asymptotically insensitive to the linear perturbation, demonstrating the robustness of internal collective excitations against uniform external forcing. In contrast, the COM exhibits interaction-dependent transport, with weak confinement producing large susceptibility and rapid displacement, whereas strong confinement suppresses transport even under large forcing. The COM response decreases monotonically with increasing trap frequency. We further characterize the evolving quantum state through the quantum Fisher information and Wigner quasi-probability distributions, showing that the linear potential enables controlled generation of states with enhanced metrological sensitivity over finite times, while stronger confinement shifts the onset of the high-sensitivity regime to larger forcing strengths. Numerical simulations based on the split-step Fourier method confirm the dynamical stability of the obtained solutions. These results illustrate the impact of linear gravitational like trap on the collective excitations, transport, and quantum metrological properties of 1D ultradilute quantum fluids.", "url": "https://arxiv.org/abs/2607.14969", "type": "理论+数值", "summary": "我们研究了一维扩展的 Gross Pitaevskii 框架内的二元玻色爱因斯坦凝聚体中的谐波约束量子液滴的动力学，包括 LHY 校正，在恒定的线性（类引力）势下。通过分析 COM 和宽度动力学，我们表明单极子（呼吸）模式仍然受谐波限制控制，频率对线性扰动渐近不敏感，证明了内部集体激励对均匀外力的鲁棒性。相比之下，COM 表现出相互作用依赖的输运，弱约束会产生大的磁化率和快速位移，而强约束甚至在大强迫下也会抑制输运。 COM 响应随着陷波频率的增加而单调下降。\n\n我们通过量子费希尔信息和维格纳准概率分布进一步描述了演化的量子态，表明线性势能够在有限时间内控制状态的生成，并增强计量灵敏度，而更强的限制将高灵敏度状态的开始转移到更大的强迫强度。基于分步傅里叶方法的数值模拟证实了所得解的动态稳定性。这些结果说明了线性引力陷阱对一维超稀量子流体的集体激发、输运和量子计量特性的影响。", "authors": [{"name": "Saurab Das"}, {"name": "Jayanta Bera"}, {"name": "Ajay Nath"}], "featured_authors": [{"name": "Saurab Das"}, {"name": "Jayanta Bera"}, {"name": "Ajay Nath"}], "author_count": 3}, {"id": "2607.14972", "category": "cond-mat", "title": "Synergistic Effects of Phosphorus Doping and Oxygen Vacancies on Formaldehyde Oxidation over CeO$_2$(111): A First Principles Investigation", "abstract": "Using a combination of static and dynamic density functional theory simulations, we systematically investigated how phosphorus doping and oxygen vacancies on the CeO$_2$(111) surface influence the oxidation mechanisms of formaldehyde (HCHO). Our results reveal that P cations (P$^{5+}$) substitutionally replace Ce$^{4+}$ in the lattice, forming Ce$-$O$-$P bonds that reduce the band gap (from 2.26 eV to 2.09 eV) and generate localized Ce$^{3+}$ states through charge redistribution. This synergistic effect of P doping combined with oxygen vacancy strengthens HCHO adsorption by decreasing the adsorption energy from -0.62 eV on pristine CeO$_2$(111) to -2.65 eV on the defective P-doped surface. Importantly, P doping lowers the C$-$H bond cleavage barrier by 0.84 eV relative to pristine CeO$_2$(111), accelerating formaldehyde oxidation on the defective surface. In addition, the rapid desorption of CO$_2$ and H$_2$O ($\\tau \\sim 0.59 s$ at 300 K) indicates weak product-surface interactions, which favor efficient catalyst regeneration during continuous operation. These findings highlight P-doped CeO$_2$(111) as a promising system for low-temperature HCHO oxidation and provide insights into the design of ceria-based catalytic materials.", "url": "https://arxiv.org/abs/2607.14972", "type": "理论+数值", "summary": "利用静态和动态密度泛函理论模拟相结合，我们系统地研究了CeO$_2$(111)表面上的磷掺杂和氧空位如何影响甲醛（HCHO）的氧化机制。我们的结果表明，P 阳离子 (P$^{5+}$) 替代性地取代晶格中的 Ce$^{4+}$，形成 Ce$-$O$-$P 键，从而减小带隙（从 2.26 eV 到 2.09 eV），并通过电荷重新分布生成局域化的 Ce$^{3+}$ 态。 P 掺杂与氧空位相结合的协同效应通过将吸附能从原始 CeO$_2$(111) 上的 -0.62 eV 降低到有缺陷的 P 掺杂表面上的 -2.65 eV 来增强 HCHO 吸附。重要的是，相对于原始 CeO$_2$(111)，P 掺杂将 C$-$H 键断裂势垒降低了 0.84 eV，加速了缺陷表面上的甲醛氧化。此外，CO$_2$ 和 H$_2$O 的快速解吸（300 K 时 $\\tau \\sim 0.59 s$）表明产物-表面相互作用较弱，这有利于连续运行期间催化剂的高效再生。\n\n这些发现凸显了 P 掺杂 CeO$_2$(111) 作为一种有前景的低温 HCHO 氧化系统，并为二氧化铈基催化材料的设计提供了见解。", "authors": [{"name": "Tarek Ayadi"}, {"name": "Mourad Debbichi"}, {"name": "Michael Badawi"}, {"name": "Fabien Pascale"}, {"name": "Adel Mesbah"}, {"name": "Sébastien Lebègue"}], "featured_authors": [{"name": "Tarek Ayadi"}, {"name": "Mourad Debbichi"}, {"name": "Michael Badawi"}, {"name": "Fabien Pascale"}, {"name": "Adel Mesbah"}, {"name": "Sébastien Lebègue"}], "author_count": 6}, {"id": "2607.15008", "category": "cond-mat", "title": "Plug Flow and Cavitation in Rough Lubricated Contacts: Molecular Dynamics of Single- vs. Two-Component Fluids", "abstract": "We present non-equilibrium molecular dynamics simulations of lubricated sliding between rough, deformable surfaces under conditions representative of boundary and mixed lubrication. One aim is to reduce the gap between highly idealized simulations of smooth interfaces and real, rough, load-bearing contacts. Another aim is to determine whether favorable tribological properties of two-fluid lubrication reported for solvated hydrophilic-hydrophobic polymer-brush interfaces can also be realized in rough contacts without brushes. To this end, we compare aqueous (water), hydrocarbon ($n$-dodecane), which has a similar equilibrium viscosity to water at ambient conditions, and immiscible two-fluid lubrication under identical geometric conditions. For the single-component lubricants, the simulations reproduce established trends: Water shows stronger speed dependence but reduced load-bearing capacity than $n$-dodecane, despite their similar ambient viscosities. Beyond this expected behavior, the simulations reveal that the combination of strong confinement and large height gradients can cause plug flow and cavitation after asperity collisions. For a high-surface-tension liquid like water, cavitation provides a mechanism for abrupt shear-stress release observable on scales much exceeding the size of the cavity. The mixed lubricant exhibits the lowest friction and material transfer, while maintaining plug flow to the lowest sliding velocity. It is also the only system in which folding lips form, occasionally developing into transient wear particles at high speeds.", "url": "https://arxiv.org/abs/2607.15008", "type": "理论+数值", "summary": "我们提出了在边界润滑和混合润滑代表条件下粗糙、可变形表面之间润滑滑动的非平衡分子动力学模拟。目标之一是缩小平滑界面的高度理想化模拟与真实、粗糙的承载接触之间的差距。另一个目的是确定溶剂化亲水-疏水聚合物-电刷界面所报告的双流体润滑的有利摩擦学特性是否也可以在没有电刷的粗糙接触中实现。为此，我们比较了水性（水）、碳氢化合物（$n$-十二烷）（其在环境条件下与水具有相似的平衡粘度）以及在相同几何条件下不混溶的两种流体润滑。对于单组分润滑剂，模拟再现了既定趋势：与正十二烷相比，水表现出更强的速度依赖性，但承载能力降低，尽管它们的环境粘度相似。除了这种预期行为之外，模拟还表明，强约束和大高度梯度的结合可能会在粗糙体碰撞后引起塞流和空化。\n\n对于像水这样的高表面张力液体，空化提供了一种在远远超过空腔尺寸的尺度上观察到的突然剪切应力释放的机制。混合润滑剂表现出最低的摩擦和材料转移，同时保持活塞流至最低的滑动速度。它也是唯一形成折叠唇的系统，在高速下偶尔会发展成短暂的磨损颗粒。", "authors": [{"name": "Shubham Agarwal"}, {"name": "Martin H. Müser"}], "featured_authors": [{"name": "Shubham Agarwal"}, {"name": "Martin H. Müser"}], "author_count": 2}, {"id": "2607.15085", "category": "cond-mat", "title": "Light-activated Janus particles in geometrically confined binary solvent", "abstract": "The coupled dynamics of local fields exert a drastic influence on the light-activated self-propulsion of a Janus particle in a binary solvent under spatial confinement. In this work, we investigate this problem using numerical simulations that account for local phase separation and wetting phenomena, as well as hydrodynamic effects. We find that confining the binary solvent within a channel results in a reduction of the active particle's propulsion speed and an extension of the duration of its directed motion. Furthermore, the orientational dynamics of this self-propelled particle are not restricted to two dimensions, unlike the phenomenon known as \"orientational quenching\". Increasing the light intensity leads to strong fluctuations in the local fields and, consequently, in the particle's speed. In this context, the significance of key physical parameters governing the efficiency of particle motion control is elucidated.", "url": "https://arxiv.org/abs/2607.15085", "type": "理论+数值", "summary": "局部场的耦合动力学对空间限制下二元溶剂中的 Janus 粒子的光激活自推进产生巨大影响。在这项工作中，我们使用数值模拟来研究这个问题，该数值模拟考虑了局部相分离和润湿现象以及流体动力学效应。我们发现将二元溶剂限制在通道内会导致活性粒子的推进速度降低并延长其定向运动的持续时间。此外，与所谓的“取向猝灭”现象不同，这种自驱动粒子的取向动力学并不局限于二维。增加光强度会导致局部场的强烈波动，从而导致粒子速度的强烈波动。在这种情况下，阐明了控制粒子运动控制效率的关键物理参数的重要性。", "authors": [{"name": "Michał Przerwa"}, {"name": "Piotr Nowakowski"}, {"name": "Takeaki Araki"}, {"name": "Anna Maciołek"}], "featured_authors": [{"name": "Michał Przerwa"}, {"name": "Piotr Nowakowski"}, {"name": "Takeaki Araki"}, {"name": "Anna Maciołek"}], "author_count": 4}, {"id": "2607.15112", "category": "cond-mat", "title": "Spin Hall Effect in Collinear Ferromagnets from Spin-Group Symmetry", "abstract": "Magnetic materials support both time-reversal-even (T-even) and time-reversal-odd (T-odd) spin Hall currents, yet their underlying microscopic origins remain elusive. Here, we elucidate the spin Hall effect (SHE) in collinear ferromagnets by treating spin-orbit coupling (SOC) as a perturbation that breaks spin-group symmetry, thereby revealing how magnetic order activates distinct spin Hall response. To first order in SOC, we identify two dominant T-even SHE mechanisms: a magnetization-independent conventional contribution and a magnetization-dependent channel associated with anomalous Hall charge transport. At the same order, the leading T-odd magnetic spin Hall effect (MSHE) originates from the exchange interaction between the conventional spin current and the local magnetization. At second order in SOC, we further uncover a distinct T-odd planar spin Hall mechanism. Our spin-symmetry analysis is corroborated by first-principles calculations, which reveal a pronounced anisotropic magnetic spin Hall effect whose magnitude can be comparable to the T-even spin Hall conductivity (SHC) when the magnetic moment is tilted away from the principal crystallographic axes. These findings clarify the microscopic origins of the SHC in collinear ferromagnets and pave the way for ferromagnet-based spin current sources with versatile properties in spintronic applications.", "url": "https://arxiv.org/abs/2607.15112", "type": "理论+数值", "summary": "磁性材料支持时间反转偶数 (T-even) 和时间反转奇数 (T-odd) 自旋霍尔电流，但其潜在的微观起源仍然难以捉摸。在这里，我们通过将自旋轨道耦合（SOC）视为破坏自旋群对称性的扰动来阐明共线铁磁体中的自旋霍尔效应（SHE），从而揭示磁序如何激活不同的自旋霍尔响应。对于 SOC 的一阶，我们确定了两种主要的 T 偶 SHE 机制：与磁化无关的常规贡献和与异常霍尔电荷传输相关的磁化相关通道。同级，领先的T奇磁自旋霍尔效应（MSHE）源于常规自旋流与局部磁化强度之间的交换相互作用。在 SOC 的二阶，我们进一步揭示了独特的 T 奇平面自旋霍尔机制。我们的自旋对称分析得到了第一性原理计算的证实，第一性原理计算揭示了明显的各向异性磁自旋霍尔效应，当磁矩远离主晶轴倾斜时，其大小可与 T 偶自旋霍尔电导率 (SHC) 相当。\n\n这些发现阐明了共线铁磁体中 SHC 的微观起源，并为基于铁磁体的自旋电流源在自旋电子应用中具有多种特性铺平了道路。", "authors": [{"name": "Qing Zhang"}, {"name": "Yizhuo Song"}, {"name": "Jiahao Shentu"}, {"name": "Jianting Dong"}, {"name": "Jia Zhang"}], "featured_authors": [{"name": "Qing Zhang"}, {"name": "Yizhuo Song"}, {"name": "Jiahao Shentu"}, {"name": "Jianting Dong"}, {"name": "Jia Zhang"}], "author_count": 5}, {"id": "2607.15119", "category": "cond-mat", "title": "Thermodynamic theory of voting and EU elections", "abstract": "We introduce a thermodynamic theory of voting and show that it provides a good description of distribution of party votes in EU elections. The theory traces parallels between system energies of coupled nonlinear oscillators and party vote fractions. Such a classical system evolution is characterized by the conservation of total energy and probability norm that leads to the Rayleigh-Jeans (RJ) thermalization and condensation at low energy states. A similar thermalization also describes the wealth inequality in society. This feature belongs to the phenomena of constraint driven condensation known in statistical mechanics. We show that the RJ theory well depicts the Lorenz and Pareto curves obtained from the EU vote results. The theory also recovers the dispersion of votes between candidates of first round presidential elections in France.", "url": "https://arxiv.org/abs/2607.15119", "type": "理论", "summary": "我们引入了投票的热力学理论，并表明它很好地描述了欧盟选举中政党选票的分布。该理论追踪了耦合非线性振荡器的系统能量与政党投票分数之间的相似之处。这种经典系统演化的特点是总能量守恒和概率范数，导致低能态下的瑞利-詹斯（RJ）热化和凝结。类似的热化也描述了社会中的财富不平等。该特征属于统计力学中已知的约束驱动凝结现象。我们证明 RJ 理论很好地描述了从欧盟投票结果中获得的洛伦兹曲线和帕累托曲线。该理论还恢复了法国第一轮总统选举候选人之间选票的分散性。", "authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "featured_authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "author_count": 2}, {"id": "2607.15158", "category": "cond-mat", "title": "Fast two-dimensional tensor-network contraction via subspace iteration", "abstract": "The corner transfer matrix renormalization group (CTMRG) is one of the standard contraction methods for infinite projected entangled-pair states (iPEPS), but its computational cost is dominated by repeated truncated singular value decompositions (SVDs). We introduce subspace-iteration CTMRG (SI-CTMRG), a QR-based projector construction that replaces each large-matrix SVD with an SVD of a much smaller matrix. The resulting algorithm shifts the dominant cost from decompositions to tensor contractions, making it highly suited to GPU acceleration and yielding speedups of up to two orders of magnitude over standard CTMRG. We demonstrate the efficiency and accuracy of the method for the triangular-lattice Heisenberg antiferromagnet, reaching state-of-the-art iPEPS results on a single H100 GPU in approximately 10 hours of computation.", "url": "https://arxiv.org/abs/2607.15158", "type": "理论+数值", "summary": "角转移矩阵重正化群 (CTMRG) 是无限投影纠缠对态 (iPEPS) 的标准收缩方法之一，但其计算成本主要由重复截断奇异值分解 (SVD) 决定。我们引入了子空间迭代 CTMRG (SI-CTMRG)，这是一种基于 QR 的投影仪结构，它用小得多的矩阵的 SVD 代替每个大矩阵 SVD。由此产生的算法将主要成本从分解转移到张量收缩，使其非常适合 GPU 加速，并比标准 CTMRG 实现高达两个数量级的加速。我们展示了三角晶格海森堡反铁磁体方法的效率和准确性，在大约 10 小时的计算时间内在单个 H100 GPU 上达到了最先进的 iPEPS 结果。", "authors": [{"name": "Yining Zhang"}, {"name": "Philippe Corboz"}], "featured_authors": [{"name": "Yining Zhang"}, {"name": "Philippe Corboz"}], "author_count": 2}, {"id": "2607.15189", "category": "cond-mat", "title": "Gyrotropy from Extrinsic Geometry in Twisted Materials", "abstract": "Gyrotropy in twisted bilayer graphene can be used as a signature of interlayer electronic coherence. Gyrotropy can emerge in the absence of interlayer coupling in time-reversal symmetric bilayer systems. This gyrotropy originates from the extrinsic geometry associated with the physical geometry of the system and is independent of the structure of the electronic states. We first illustrate this effect for a purely classical bilayer array of one-dimensional wires. Next we study twisted bilayer graphene and show that the gyrotropy is entirely due to interlayer coherence. In doing so we observe that conductivities calculated in the Bistritzer-MacDonald frame differ significantly from conductivities measurable in the lab frame. Finally we consider twisted bilayer MoTe2, first as a pristine model where the gyrotropy exactly vanishes, and then with weak strain and displacement fields where we show that the geometric gyrotropy can dominate the coherent gyrotropy. Our results call attention to the necessity to separate the contribution of extrinsic physical geometry from the contribution of intrinsic electronic states to the properties of twisted materials.", "url": "https://arxiv.org/abs/2607.15189", "type": "理论", "summary": "扭曲双层石墨烯中的陀螺仪可以用作层间电子相干性的标志。在时间反转对称双层系统中，如果没有层间耦合，就会出现陀螺仪。这种陀螺性源自与系统的物理几何形状相关的外在几何形状，并且与电子态的结构无关。我们首先用纯经典的一维线双层阵列来说明这种效应。接下来，我们研究扭曲的双层石墨烯，并表明回旋性完全是由于层间相干性造成的。在此过程中，我们观察到 Bistritzer-MacDonald 框架中计算的电导率与实验室框架中可测量的电导率存在显着差异。最后，我们考虑扭曲双层 MoTe2，首先作为原始模型，其中陀螺仪完全消失，然后在弱应变和位移场中，我们表明几何陀螺仪可以主导相干陀螺仪。我们的结果引起人们的注意，有必要将外在物理几何形状的贡献与内在电子态对扭曲材料性能的贡献分开。", "authors": [{"name": "Spenser Talkington"}, {"name": "Eugene J Mele"}], "featured_authors": [{"name": "Spenser Talkington"}, {"name": "Eugene J Mele"}], "author_count": 2}, {"id": "2607.15230", "category": "cond-mat", "title": "High-Q superconducting microwave resonators using MBE titanium nitride", "abstract": "Using molecular beam epitaxy, we have realized thin films of titanium nitride (TiN) on c-plane sapphire that exhibit the lowest observed full-width at half maximum X-ray rocking curve width of 18 arcsec. Though the (111) oriented TiN exhibits an abrupt and crystalline interface with sapphire, for the first time we observe sub-surface defects in the sapphire substrate, which nucleate structural defects in the epitaxial TiN layer. Using quarter-wavelength coplanar waveguide (CPW) resonators in a 3 \\textmu m/6 \\textmu m/3 \\textmu m gap/strip/gap lines in a hanger geometry, we find the internal quality factor of the TiN resonators to be $>10^{6}$ in the single-photon $\\langle n \\rangle \\sim 1$ limit at 5.8 GHz and 10 mK, rising to $>20 \\times 10^{6}$ at $\\langle n \\rangle \\sim 10^{6}$. The results are of high interest for applications of superconducting TiN in several areas, and provide a path towards epitaxial Josephson junctions with crystalline barriers in the future for high coherence qubits.", "url": "https://arxiv.org/abs/2607.15230", "type": "理论", "summary": "利用分子束外延，我们在 c 面蓝宝石上实现了氮化钛 (TiN) 薄膜，其观察到的最低半峰全宽 X 射线摇摆曲线宽度为 18 角秒。尽管（111）取向的 TiN 与蓝宝石呈现出突变的结晶界面，但我们首次观察到蓝宝石衬底中的亚表面缺陷，这些缺陷使外延 TiN 层中的结构缺陷成核。在吊架几何结构中的 3 \\textmu m/6 \\textmu m/3 \\textmu m 间隙/带/间隙线中使用四分之一波长共面波导（CPW）谐振器，我们发现 TiN 谐振器的内部品质因数在 5.8 GHz 和 10 mK 的单光子 $\\langle n \\rangle \\sim 1$ 限制中为 $>10^{6}$，上升到 $>20 \\times 10^{6}$ 位于 $\\langle n \\rangle \\sim 10^{6}$。这些结果对于超导 TiN 在多个领域的应用引起了高度关注，并为未来高相干量子位的具有晶体势垒的外延约瑟夫森结提供了一条途径。", "authors": [{"name": "Anand Ithepalli"}, {"name": "Haoran Lu"}, {"name": "Eegene Clara Chung"}, {"name": "Xiangqin Wang"}, {"name": "Amit Rohan Rajapurohita"}, {"name": "Keun-Yeol Park"}, {"name": "Celesta S. Chang"}, {"name": "Peter McMahon"}, {"name": "Huili Grace Xing"}, {"name": "David Muller"}, {"name": "Valla Fatemi"}, {"name": "Debdeep Jena"}], "featured_authors": [{"name": "Anand Ithepalli"}, {"name": "Haoran Lu"}, {"name": "Eegene Clara Chung"}, {"name": "David Muller"}, {"name": "Valla Fatemi"}, {"name": "Debdeep Jena"}], "author_count": 12}, {"id": "2607.15249", "category": "cond-mat", "title": "Altermagnetic spin textures coupled to superconductors: Domain wall spin-triplet superconductivity and supercurrent-induced torques", "abstract": "Motivated by the absence of sizable stray fields and the recently discovered highly non-trivial impact of altermagnetic textures on itinerant electrons, we here study the form of Cooper pairs in spatially varying altermagnets coupled to conventional $s$-wave superconductors. As a consequence of the detrimental impact of altermagnetism on spin-singlet pairing and the local symmetry reduction caused by textures in the magnetic order parameter, we show that superconductivity predominantly impacts the regions between altermagnetic domains. Focusing on a planar radial domain wall for concreteness, we show that emergent Zeeman and spin-orbit fields create spatially separated triplet hotspots and transitions between nodal and fully gapped superconducting regions, whose structure is set by both the domain wall and the altermagnetic order parameter. We also identify a reciprocal effect, where a supercurrent generates a quasiparticle-mediated quadrupolar torque that inherits the symmetry of the altermagnetic order. Our results show that accounting for spatial inhomogeneities in the altermagnetic order parameter is essential for an understanding of the superconducting proximity effect and suggest that hybrid systems of altermagnetic textures and superconductors offer unique opportunities for local engineering of Cooper pairs and for detecting altermagnetic order.", "url": "https://arxiv.org/abs/2607.15249", "type": "理论", "summary": "由于不存在相当大的杂散场以及最近发现的交变磁织构对流动电子的非常重要的影响，我们在这里研究与传统$s$波超导体耦合的空间变化交变磁体中的库珀对的形式。由于交变磁性对自旋单重态配对的有害影响以及磁序参数中的纹理引起的局部对称性降低，我们表明超导性主要影响交变磁域之间的区域。着眼于具体的平面径向磁畴壁，我们证明了涌现的塞曼场和自旋轨道场产生了空间上分离的三重态热点以及节点和全间隙超导区域之间的过渡，其结构由磁畴壁和交变磁序参数决定。我们还确定了一种交互效应，其中超电流产生准粒子介导的四极扭矩，该扭矩继承了交变磁序的对称性。\n\n我们的结果表明，考虑交变磁序参数的空间不均匀性对于理解超导邻近效应至关重要，并表明交变磁织构和超导体的混合系统为库珀对的局部工程和检测交变磁序提供了独特的机会。", "authors": [{"name": "Yasir Dar"}, {"name": "Mathias S. Scheurer"}, {"name": "Constantin Schrade"}], "featured_authors": [{"name": "Yasir Dar"}, {"name": "Mathias S. Scheurer"}, {"name": "Constantin Schrade"}], "author_count": 3}, {"id": "2607.15274", "category": "cond-mat", "title": "Single-component twisted $\\mathbb{Z}_3$ orthogonal metal in an $e/3$-anyon fluid", "abstract": "We propose an unconventional metallic phase emerging on doping the $1/3$ Fractional Chern insulator, which can serve as a parent state to anyon superconductivity with arbitrary chiral central charge. It is a twisted $\\mathbb{Z}_3$ orthogonal metal: a state with vanishing electron quasiparticle weight but a single well-defined Fermi surface of emergent charge-$e/3$ fermions coupled to a Dijkgraaf-Witten twisted $\\mathbb{Z}_3$ gauge field. It is manifestly valley-symmetric and valley-gapped. Pairing this fractionalized Fermi surface then removes the topological order and produces a family of superconductors whose chiral central charge is directly set by the BdG band topology of the paired $e/3$ fermions, while the angular momentum of the physical order parameter is constrained to be a multiple of three. This scenario provides a route to superconducting states beyond anyon-superconductivity constructions based on $2e/3$ anyons. The metallic phase itself carries distinctive ``fractional Fermiology'' signatures: $e/3$ shot noise, anomalous quantum oscillations, and a $6\\pi$ ac Josephson effect when it mediates the Josephson coupling between superconductors. We construct explicit wavefunction ansatz realizing the phase, and argue that inter-valley repulsion between anyons stabilizes this phase compared to competing states. We show that the construction extends to higher Laughlin states but not to Jain states.", "url": "https://arxiv.org/abs/2607.15274", "type": "理论", "summary": "我们提出了一种非常规金属相，通过掺杂 1/3 美元分数陈绝缘体而出现，它可以作为具有任意手性中心电荷的任意子超导性的母态。它是一种扭曲的 $\\mathbb{Z}_3$ 正交金属：一种电子准粒子重量消失的状态，但有一个定义明确的涌现电荷 $e/3$ 费米子费米面，耦合到 Dijkgraaf-Witten 扭曲的 $\\mathbb{Z}_3$ 规范场。它明显是谷对称和谷间隙的。然后，对这个分数化费米面进行配对，消除了拓扑序，并产生了一系列超导体，其手性中心电荷直接由配对的 $e/3$ 费米子的 BdG 带拓扑设置，而物理序参数的角动量被限制为三的倍数。这种情况提供了一条超越基于 $2e/3$ 任意子的任意超导结构的超导态路径。金属相本身具有独特的“分数费米学”特征：$e/3$散粒噪声、反常量子振荡以及当它介导超导体之间的约瑟夫森耦合时的$6\\pi$ ac约瑟夫森效应。\n\n我们构造了实现相位的显式波函数 ansatz，并认为与竞争态相比，任意子之间的谷间排斥可以稳定该相位。我们表明，该建设延伸到了更高的劳克林州，但没有延伸到耆那教州。", "authors": [{"name": "Zhaoyu Han"}, {"name": "Ashvin Vishwanath"}, {"name": "Eslam Khalaf"}], "featured_authors": [{"name": "Zhaoyu Han"}, {"name": "Ashvin Vishwanath"}, {"name": "Eslam Khalaf"}], "author_count": 3}, {"id": "2607.14213", "category": "hep-th", "title": "JT gravity on the worldline", "abstract": "Motivated by the problem of understanding the experience of an observer in dynamical quantum gravity, we study the effects of coupling a one-dimensional quantum mechanical system living on a bulk worldline to Euclidean AdS JT gravity. On the disk topology, where the worldline stretches between two boundary points, we derive exact expressions for the Euclidean propagator of the observer and for its correlation functions, and discuss their holographic interpretation. The main effect on the quantum mechanics is the fluctuation of the total Euclidean time for which the observer evolves, or its inverse temperature for closed Euclidean paths. This turns the standard quantum mechanical evolution operator into an average of those, weighted by a measure over Euclidean times which in the semiclassical limit is peaked around the geodesic distance between the boundary points. We characterize the fluctuations around this value, finding that they are small compared to the mean, but large compared to the effective Planck scale of the model. These fluctuations can be resolved by an observer with a finely spaced density of states. We also discuss the Lorentzian interpretation of these Euclidean calculations. Finally, we compute a contribution to the partition function of the observer coupled to gravity coming from the double trumpet. In this case the fluctuations of the effective temperature are large, reflecting the absence of a smooth semiclassical saddle point.", "url": "https://arxiv.org/abs/2607.14213", "type": "理论", "summary": "出于理解动态量子引力中观察者体验的问题，我们研究了将存在于体世界线上的一维量子力学系统与欧几里得 AdS JT 引力耦合的影响。在圆盘拓扑上，世界线在两个边界点之间延伸，我们推导了观察者的欧几里得传播子及其相关函数的精确表达式，并讨论了它们的全息解释。对量子力学的主要影响是观察者演化的总欧几里德时间的波动，或其封闭欧几里德路径的逆温度。这将标准量子力学演化算子变成了这些算子的平均值，并通过欧几里得时间的测量进行加权，该测量在半经典极限中在边界点之间的测地距离附近达到峰值。我们描述了围绕该值的波动，发现它们与平均值相比很小，但与模型的有效普朗克尺度相比却很大。这些波动可以通过具有精细间隔状态密度的观察者来解析。\n\n我们还讨论了这些欧几里得计算的洛伦兹解释。最后，我们计算与来自双喇叭的重力耦合的观察者配分函数的贡献。在这种情况下，有效温度的波动很大，反映出不存在平滑的半经典鞍点。", "authors": [{"name": "Ben Freivogel"}, {"name": "Alessandro Fumagalli"}, {"name": "Diego M. Hofman"}], "featured_authors": [{"name": "Ben Freivogel"}, {"name": "Alessandro Fumagalli"}, {"name": "Diego M. Hofman"}], "author_count": 3}, {"id": "2607.14215", "category": "hep-th", "title": "Anti-scrambling and euclidean folds from observer correlators in de Sitter space", "abstract": "The de Sitter horizon behaves in a qualitatively different way from a black hole horizon, which poses a challenge to any attempt to develop a fundamental quantum description of de Sitter space. In this paper we gather some ``data'' on this problem using gravitational calculations, seeing that they lead to an ``anti-scrambling'' phenomenon that is contrary to the behavior of standard many-body quantum systems. We organize our discussion in terms of correlation functions computed on the worldline of an observer living in the spacetime, with the two-point function looking like a conventional thermal correlator but the four-point function showing anti-scrambling. We propose that anti-scrambling can be realized in a quantum system whose Hamiltonian is bounded from both above and below using correlators that are folded in Euclidean time.", "url": "https://arxiv.org/abs/2607.14215", "type": "理论", "summary": "德西特视界的行为方式与黑洞视界有本质上的不同，这对任何开发德西特空间基本量子描述的尝试构成了挑战。在本文中，我们使用引力计算收集了有关该问题的一些“数据”，发现它们导致了与标准多体量子系统的行为相反的“反扰乱”现象。我们根据生活在时空中的观察者的世界线上计算的相关函数来组织我们的讨论，其中两点函数看起来像传统的热相关器，但四点函数显示出反扰乱。我们提出，可以使用在欧几里德时间折叠的相关器在哈密顿量从上到下有界的量子系统中实现反扰乱。", "authors": [{"name": "Daniel Harlow"}, {"name": "Ying Zhao"}], "featured_authors": [{"name": "Daniel Harlow"}, {"name": "Ying Zhao"}], "author_count": 2}, {"id": "2607.14219", "category": "hep-th", "title": "Ising the way into de Sitter", "abstract": "We study the two-dimensional Ising model deformed by the relevant thermal operator and placed on de Sitter (dS) spacetime. Despite being strongly interacting in its original formulation, the theory is exactly solvable on account of fermionisation. We compute exact cosmological correlators and compare them with conformal perturbation theory. In the Euclidean formulation of the model, we first compute the renormalised sphere partition function and the exact two-point functions of the thermal operator and descendant-like operators. We analytically continue the two-point functions to Lorentzian dS$_2$. Their late-time behaviour is governed by de Sitter representation theory and includes oscillations associated with principal-series scaling dimensions. We then analyse two-point functions of the spin and disorder operators, which are non-local in the fermionic variables, and derive non-perturbative constraints on their late-time scaling dimensions. In both cases, we compare the exact answers to conformal perturbation theory (CPT) and we show that divergent secular terms generically spoil the perturbative series at late times. The de Sitter Ising model shows explicitly how late-time perturbative pathologies are resummed in non-perturbative cosmological observables and provides a minimal solvable laboratory for quantum field theory dynamics in de Sitter space.", "url": "https://arxiv.org/abs/2607.14219", "type": "理论", "summary": "我们研究了由相关热算子变形并放置在德西特 (dS) 时空上的二维伊辛模型。尽管在其原始公式中存在强烈的相互作用，但该理论由于费米化而完全可解。我们计算精确的宇宙相关器并将其与共形微扰理论进行比较。在模型的欧几里得公式中，我们首先计算重整化球体配分函数以及热算子和类后代算子的精确两点函数。我们分析将两点函数延续到洛伦兹 dS$_2$。它们的后期行为受德西特表示理论控制，并包括与主级数缩放维度相关的振荡。然后，我们分析自旋和无序算子的两点函数（它们在费米子变量中是非局部的），并推导其后期缩放维度的非微扰约束。在这两种情况下，我们比较了共形微扰理论（CPT）的确切答案，并且我们表明不同的世俗术语通常会在后期破坏微扰级数。\n\n德西特伊辛模型明确地展示了如何在非微扰宇宙学可观观测中恢复晚期微扰病理学，并为德西特空间中的量子场论动力学提供了一个最小可解的实验室。", "authors": [{"name": "Giovanni Galati"}, {"name": "Stathis Vitouladitis"}], "featured_authors": [{"name": "Giovanni Galati"}, {"name": "Stathis Vitouladitis"}], "author_count": 2}, {"id": "2607.14220", "category": "hep-th", "title": "Non-perturbative saturation of Krylov complexity, and its implications in quantum gravity", "abstract": "We study the dynamics of Krylov state complexity in finite-dimensional quantum systems. Orthogonal polynomials built on a discrete energy spectrum crowd away from regions where the density of states is low at large Krylov index. The physical implication of this result is that, even using a minimalist Krylov state complexity which is defined over the entire spectrum, the Krylov complexity provably stops growing a little past the Heisenberg length in every low-energy state. This has interesting implications for the proposal that Krylov complexity is related to the wormhole length in 2D quantum gravity.", "url": "https://arxiv.org/abs/2607.14220", "type": "理论", "summary": "我们研究有限维量子系统中克雷洛夫态复杂性的动力学。正交多项式建立在离散能谱群上，远离大克雷洛夫指数下态密度较低的区域。这个结果的物理含义是，即使使用在整个频谱上定义的极简克雷洛夫态复杂度，克雷洛夫复杂度也可以在每个低能态中停止增长，超过海森堡长度。这对于克雷洛夫复杂度与二维量子引力中虫洞长度相关的提议具有有趣的意义。", "authors": [{"name": "Andrew Lucas"}, {"name": "Amit Vikram"}], "featured_authors": [{"name": "Andrew Lucas"}, {"name": "Amit Vikram"}], "author_count": 2}, {"id": "2607.14230", "category": "hep-th", "title": "Gravitational Effective Theories with Maximal Supersymmetry and a Peculiar Parity", "abstract": "We study the space of four-dimensional ultraviolet completions for $\\mathcal{N}=8$ supergravity that are described at low energies by weakly-coupled effective field theories (EFTs) with maximal supersymmetry and $\\mathrm{SU}(4)\\times\\mathrm{SU}(4)$ R-symmetry. We show that tree-level factorization of the 4-, 5-, and 6-point EFT scattering amplitudes, together with a certain ``peculiar parity'' condition, leads to nonlinear constraints on the 4-point Wilson coefficients. This peculiar parity is a property that can only be imposed on a subset of scalar amplitudes. Combining the nonlinear constraints with positivity, we find that the allowed region of 4-point Wilson coefficients is reduced to a non-convex domain with two sharp corners: one being the closed superstring Virasoro--Shapiro amplitude, the other an infinite spin tower amplitude exchanging states of every spin at the same mass. We show both numerically and analytically that requiring a finite number of states near the first mass level leaves only the Virasoro--Shapiro amplitude.", "url": "https://arxiv.org/abs/2607.14230", "type": "理论", "summary": "我们研究了 $\\mathcal{N}=8$ 超引力的四维紫外完成空间，该空间通过具有最大超对称性和 $\\mathrm{SU}(4)\\times\\mathrm{SU}(4)$ R 对称性的弱耦合有效场论 (EFT) 在低能量下描述。我们证明了 4 点、5 点和 6 点 EFT 散射幅度的树级分解，以及某种“特殊奇偶校验”条件，导致了 4 点 Wilson 系数的非线性约束。这种奇特的奇偶性是只能应用于标量幅度的子集的属性。将非线性约束与正性相结合，我们发现4点Wilson系数的允许区域被简化为具有两个尖角的非凸域：一个是闭合超弦Virasoro-Shapiro振幅，另一个是在相同质量下交换每个自旋状态的无限自旋塔振幅。我们通过数值和分析表明，在第一质量水平附近需要有限数量的状态，仅留下维拉索罗-夏皮罗振幅。", "authors": [{"name": "Justin Berman"}, {"name": "Simon Caron-Huot"}, {"name": "Aditi V. Chandra"}, {"name": "Henriette Elvang"}, {"name": "Aidan Herderschee"}, {"name": "Loki L. Lin"}, {"name": "Roger Morales"}], "featured_authors": [{"name": "Justin Berman"}, {"name": "Simon Caron-Huot"}, {"name": "Aditi V. Chandra"}, {"name": "Aidan Herderschee"}, {"name": "Loki L. Lin"}, {"name": "Roger Morales"}], "author_count": 7}, {"id": "2607.14284", "category": "hep-th", "title": "Non-Hermitian Holographic Flows to Little Rip Cosmologies", "abstract": "Spacelike singularities supported by matter satisfying the null energy condition (NEC) are expected to fall within the Belinski--Khalatnikov--Lifshitz (BKL) paradigm. We show that controlled violations of the NEC in holography can lead to different black hole interiors. In a holographic model dual to a strongly coupled non-Hermitian $\\mathcal{PT}$-symmetric QFT, we uncover a novel non-Kasner regime within its real, $\\mathcal{PT}$-restored phase. The deep-interior geometry describes an isotropic FLRW cosmology undergoing super-accelerated expansion and approaching a Little Rip. This regime leaves a characteristic imprint on two-sided heavy-operator correlators, allowing it to be distinguished from a standard Kasner interior. Our construction provides a concrete holographic realization of a Little Rip cosmology and lays the groundwork for a Little Rip/CFT correspondence, in which such cosmological regimes can be explored through observables in a non-Hermitian quantum field theory.", "url": "https://arxiv.org/abs/2607.14284", "type": "理论", "summary": "由满足零能量条件 (NEC) 的物质支持的类空间奇点预计属于 Belinski-Khalatnikov-Lifshitz (BKL) 范式。我们证明，在全息术中受控违反 NEC 可以导致不同的黑洞内部。在与强耦合非厄米$\\mathcal{PT}$对称QFT对偶的全息模型中，我们在其真实的$\\mathcal{PT}$恢复相中发现了一种新颖的非Kasner状态。深层内部几何描述了各向同性 FLRW 宇宙学正在经历超加速膨胀并接近小撕裂。这种机制在两侧重算子相关器上留下了特征印记，使其与标准的 Kasner 内部区分开来。我们的构造提供了 Little Rip 宇宙学的具体全息实现，并为 Little Rip/CFT 对应奠定了基础，其中可以通过非厄米量子场论中的可观测值来探索此类宇宙学体系。", "authors": [{"name": "Daniel Arean"}, {"name": "David Garcia-Fariña"}, {"name": "Juan F. Pedraza"}], "featured_authors": [{"name": "Daniel Arean"}, {"name": "David Garcia-Fariña"}, {"name": "Juan F. Pedraza"}], "author_count": 3}, {"id": "2607.14289", "category": "hep-th", "title": "Dynamical Entropy Is a Noether Charge", "abstract": "Black hole thermodynamics for generic dynamical, non-equilibrium regimes remains a fundamental challenge. We establish dynamical entropy as the Noether charge associated with a generic evolving null surface subject to Dirichlet boundary conditions. We uniquely specify the symmetry generator associated with the dynamical entropy, which is a null vector on the null surface, upon requiring physically motivated geometric conditions that yield a notion of ``dynamical zeroth law.'' We prove that this Noether charge density satisfies the second law of thermodynamics strictly at each instant in time, bypassing the teleological final conditions traditionally required by event horizons. Thus, we extend and generalize the notion of dynamical entropy introduced in \\cite{Hollands:2024vbe}, in some different ways: We do not impose background stationarity; our dynamical entropy and the associated second law are local in time and work for generic dynamical gravitational systems.", "url": "https://arxiv.org/abs/2607.14289", "type": "理论", "summary": "一般动力学、非平衡状态的黑洞热力学仍然是一个基本挑战。我们将动态熵建立为与受狄利克雷边界条件影响的通用演化零表面相关的诺特电荷。我们独特地指定了与动态熵相关的对称生成器，动态熵是零表面上的零向量，需要物理驱动的几何条件，产生“动态零定律”的概念。我们证明，诺特电荷密度在每个瞬间都严格满足热力学第二定律，绕过了事件视界传统上所需的目的论最终条件。因此，我们以一些不同的方式扩展和概括了\\cite{Hollands:2024vbe}中引入的动态熵的概念：我们不强加背景平稳性；我们的动态熵和相关的第二定律在时间上是局部的并且适用于通用动态引力系统。", "authors": [{"name": "V.R. Shajiee"}, {"name": "M.M. Sheikh-Jabbari"}, {"name": "V. Taghiloo"}], "featured_authors": [{"name": "V.R. Shajiee"}, {"name": "M.M. Sheikh-Jabbari"}, {"name": "V. Taghiloo"}], "author_count": 3}, {"id": "2607.14330", "category": "hep-th", "title": "The variational approach to infrared divergencies: Applications to black hole action integrals and holographic Wilson loops", "abstract": "Renormalizing the on-shell action variation offers two important advantages over renormalizing the action itself. First, the variation of the action has a universal form in which the bulk contribution vanishes identically. As a result, the renormalization problem is automatically localized at the boundary; no bulk subtractions are required. Second, the variation of the action admits a natural interpretation as a 1-form on functional space. The distinction between exact and non-exact 1-forms provides a clear renormalization prescription. We apply these ideas to the computation of on-shell black hole actions. After presenting the general algorithm, we discuss some examples, including Kerr-Newman, Kerr-Newman-AdS, Taub-NUT, Taub-Bolt, and STU black holes. We also apply the same techniques to the computation of holographic Wilson loops. All results agree with standard results, in particular with holographic renormalization.", "url": "https://arxiv.org/abs/2607.14330", "type": "理论", "summary": "与重新标准化动作本身相比，重新标准化壳上动作变化具有两个重要的优点。首先，动作的变化具有普遍的形式，其中大部分贡献相同地消失。结果，重整化问题自动定位在边界处；不需要批量减法。其次，动作的变化允许在功能空间上将其自然解释为 1-形式。精确和非精确 1-形式之间的区别提供了明确的重整化处方。我们将这些想法应用于壳内黑洞作用的计算。在介绍一般算法之后，我们讨论一些例子，包括 Kerr-Newman、Kerr-Newman-AdS、Taub-NUT、Taub-Bolt 和 STU 黑洞。我们还将相同的技术应用于全息威尔逊环的计算。所有结果都与标准结果一致，特别是全息重整化。", "authors": [{"name": "M. Arroyo"}, {"name": "D. Arteaga"}, {"name": "M. Bañados"}, {"name": "A. Faraggi"}], "featured_authors": [{"name": "M. Arroyo"}, {"name": "D. Arteaga"}, {"name": "M. Bañados"}, {"name": "A. Faraggi"}], "author_count": 4}, {"id": "2607.14351", "category": "hep-th", "title": "Lectures on Open Systems and Cosmology", "abstract": "Open systems are ubiquitous in physics. Many realistic systems interact, at least weakly, with environmental degrees of freedom that may be too numerous, too complicated, inaccessible, or unknown. When only a subset of degrees of freedom is observed, its reduced dynamics can differ qualitatively from that of a closed system, displaying dissipation, noise, decoherence, memory effects, or loss of information into unobserved sectors. When the microscopic description is also unknown, one is led to an open effective description, in which the relevant degrees of freedom are treated systematically while the environment and the microscopics are parametrized rather than solved for explicitly. This perspective is especially important in gravity and cosmology. The main open problems of cosmology, including inflation, dark matter, and dark energy, involve spacetime-filling sectors whose microscopic nature is unknown and whose observed effects are primarily gravitational. At the same time, gravitational systems often lack a preferred notion of conserved energy because they are time dependent, and naturally display out-of-equilibrium dynamics. These lecture notes introduce the operator formalism and the Schwinger-Keldysh path-integral as tools to study open systems, with emphasis on open effective field theories and inflation. They are aimed at master students, PhD students, and researchers approaching these topics for the first time.", "url": "https://arxiv.org/abs/2607.14351", "type": "理论", "summary": "开放系统在物理学中无处不在。许多现实系统与环境自由度的相互作用（至少是微弱的）可能太多、太复杂、难以接近或未知。当仅观察到自由度的子集时，其降低的动态特性可能与封闭系统的动态特性有本质上的不同，表现出耗散、噪声、退相干、记忆效应或信息丢失到未观察到的区域。当微观描述也未知时，人们会得到一种开放的有效描述，其中系统地处理相关的自由度，同时对环境和微观进行参数化而不是明确地求解。这种观点在引力和宇宙学中尤其重要。宇宙学的主要开放问题，包括暴涨、暗物质和暗能量，涉及时空填充部分，其微观性质未知，观测到的影响主要是引力。与此同时，引力系统通常缺乏能量守恒的首选概念，因为它们与时间相关，并且自然地表现出不平衡动力学。\n\n这些讲义介绍了算子形式主义和 Schwinger-Keldysh 路径积分作为研究开放系统的工具，重点是开放有效场论和通货膨胀。它们针对的是硕士生、博士生和首次接触这些主题的研究人员。", "authors": [{"name": "Enrico Pajer"}], "featured_authors": [{"name": "Enrico Pajer"}], "author_count": 1}, {"id": "2607.14425", "category": "hep-th", "title": "Birman-Schwinger Formulation of the Faddeev--Popov Zero-Mode Problem", "abstract": "Characterizations of the Gribov horizon have so far proceeded indirectly, through Zwanziger's horizon function or through Gribov's no-pole condition on the ghost propagator, each of which encodes the positivity of the Faddeev--Popov operator only approximately, whereas the construction developed here supplies a direct operator statement. Once the constant gauge modes are removed, the Landau-gauge Faddeev--Popov operator becomes congruent to a bounded, dimensionless operator assembled from the background field and the free Laplacian, so that the horizon condition reduces to an ordinary spectral threshold, attained when an eigenvalue of that operator crosses $-1$. Self-adjointness, ordinarily postulated as an independent hypothesis, follows in this formulation from Landau transversality alone, while the first-order character of the perturbation fixes an analytic scale distinct from the one governing the familiar Schrödinger problem. Because the ghost dressing function coincides with the diagonal resolvent of the same operator, Gribov's no-pole estimate emerges as its leading Born-order truncation, an identification that at once delimits the regime in which the estimate is trustworthy and the regime in which it fails. The construction is tested against an exact solution for a periodic transverse $SU(2)$ background, for which the threshold, its Born approximation, and the corrections beyond Born all admit closed forms, and for which the associated action and mode-counting entropy scale with the volume so that the two balance in four dimensions. The periodic family thereby furnishes a solvable reference case for the underlying mechanism, whereas extending the claim to generic Yang--Mills configurations constitutes a separate undertaking, whose requirements are stated explicitly.", "url": "https://arxiv.org/abs/2607.14425", "type": "理论", "summary": "到目前为止，格里博夫视界的表征是通过 Zwanziger 的视界函数或通过鬼传播器上的格里博夫的无极点条件间接进行的，其中每一个都仅近似地编码了 Faddeev-Popov 算子的正性，而这里开发的构造提供了直接的算子声明。一旦恒定规范模式被移除，朗道规范 Faddeev-Popov 算子就与由背景场和自由拉普拉斯算子组合而成的有界、无量纲算子一致，从而当该算子的特征值穿过 $-1$ 时，水平条件降低到普通的光谱阈值。自伴性，通常被假定为一个独立的假设，在这个公式中仅遵循朗道横截性，而扰动的一阶特征固定了一个与控制熟悉的薛定谔问题的分析尺度不同的分析尺度。\n\n由于鬼修整函数与同一算子的对角线解一致，格里波夫的无极点估计以其主要的玻恩阶截断而出现，这种识别立即界定了估计值得信赖的范围和估计失败的范围。该构造针对周期性横向 $SU(2)$ 背景的精确解进行测试，其中阈值、其玻恩近似以及玻恩之外的修正都允许封闭形式，并且相关的作用和模式计数熵与体积成比例，以便两者在四个维度上平衡。因此，周期族为基本机制提供了一个可解的参考案例，而将权利要求扩展到一般的杨-米尔斯构型则构成了一项单独的任务，其要求已明确说明。", "authors": [{"name": "Daniel G. Tedesco"}], "featured_authors": [{"name": "Daniel G. Tedesco"}], "author_count": 1}, {"id": "2607.14662", "category": "hep-th", "title": "Bosonic SPT and invertible phases and its relation to Steenrod's problem", "abstract": "Bosonic invertible and symmetry-protected topological (SPT) phases are well-known to be described by ordinary cohomology groups in low dimensions, but `beyond-cohomology' phases appear in higher dimensions. We make a systematic study of them, and find that the first major non-triviality is a mod-3 phenomenon, and not a mod-2 phenomenon as in the case of fermionic phases. We also point out that this is a
