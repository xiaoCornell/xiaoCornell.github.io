cture of Artemev that connected the resonance transformations for the $(2,2p+1)$ minimal string to the $x-y$ swap in the theory of topological recursion.", "url": "https://arxiv.org/abs/2606.04854", "type": "理论", "summary": "本文包含 Artemev 最近猜想的证明，该猜想将 $(2,2p+1)$ 最小字符串的共振变换与拓扑递归理论中的 $x-y$ 交换联系起来。", "authors": [{"name": "Kornelis Dekinga"}, {"name": "Sergey Shadrin"}, {"name": "Erik Verlinde"}], "featured_authors": [{"name": "Kornelis Dekinga"}, {"name": "Sergey Shadrin"}, {"name": "Erik Verlinde"}], "author_count": 3}, {"id": "2606.04933", "category": "hep-th", "title": "$\\text{AdS}_D\\times I$ solutions in axio-dilaton gravity", "abstract": "We study non-supersymmetric $\\mathrm{AdS}_D\\times I$ solutions in the context of $(D+1)$ dimensional gravity coupled to an axio-dilaton with arbitrary runaway potential for the dilaton and arbitrary exponential coupling of the dilaton to the axion kinetic energy. We analyze the equations of motion, reformulate them in terms of a first order autonomous dynamical system, and discuss the set of fixed points, their physical interpretation and their stability conditions. We find a few special classes of analytic solutions for arbitrary $D$, including $\\mathrm{AdS}_9\\times I$ backgrounds in type IIB supergravity. We conclude by discussing the properties of numerical flows including the massive IIA supergravity case.", "url": "https://arxiv.org/abs/2606.04933", "type": "理论", "summary": "我们在 $(D+1)$ 维引力耦合到轴膨胀子的背景下研究非超对称 $\\mathrm{AdS}_D\\times I$ 解，该轴膨胀子具有膨胀子的任意失控势以及膨胀子与轴子动能的任意指数耦合。我们分析运动方程，根据一阶自主动力系统重新表述它们，并讨论不动点集、它们的物理解释和稳定性条件。我们找到了任意 $D$ 的一些特殊类别的解析解，包括 IIB 型超重力中的 $\\mathrm{AdS}_9\\times I$ 背景。最后，我们讨论了数值流的性质，包括大规模 IIA 超重力情况。", "authors": [{"name": "Giuseppe Dibitetto"}, {"name": "Nicolò Petri"}], "featured_authors": [{"name": "Giuseppe Dibitetto"}, {"name": "Nicolò Petri"}], "author_count": 2}, {"id": "2606.04938", "category": "hep-th", "title": "AdS$_9$ solutions in type II supergravities", "abstract": "We present new solutions in type II supergravities describing AdS$_9$ geometries warped over an interval. In type IIB, we construct an analytic family of backgrounds supported by a non-trivial axio-dilaton profile. Despite the presence of strong-coupling singularities at both ends of the interval, these solutions exhibit both a finite Euclidean on-shell action and a finite holographic central charge. Moreover, they possess a $\\mathbb Z_2$ symmetry under which the axion transforms as $C_0\\rightarrow -C_0$. We also investigate AdS$_9$ backgrounds in massive IIA supergravity supported by the Romans mass and the dilaton. Numerical integration reveals solutions with a strong-coupling singularity whose asymptotic behavior is consistent with the characteristic D8/O8 profile. In contrast to the type IIB case, our analysis indicates that the Euclidean on-shell action diverges. Finally, we identify a family of perturbative dS$_9$ solutions in massive IIA supergravity.", "url": "https://arxiv.org/abs/2606.04938", "type": "理论", "summary": "我们提出了 II 型超重力的新解决方案，描述了在一段时间内扭曲的 AdS$_9$ 几何形状。在 IIB 型中，我们构建了一个由非平凡轴膨胀剖面支持的背景分析族。尽管区间两端都存在强耦合奇点，但这些解同时表现出有限的欧几里得壳上作用和有限的全息中心电荷。此外，它们具有 $\\mathbb Z_2$ 对称性，在该对称性下轴子变换为 $C_0\\rightarrow -C_0$。我们还研究了罗马质量和膨胀子支持的大规模 IIA 超重力中的 AdS$_9$ 背景。数值积分揭示了具有强耦合奇点的解，其渐近行为与特征 D8/O8 轮廓一致。与 IIB 型情况相反，我们的分析表明欧几里得壳上作用是发散的。最后，我们确定了大规模 IIA 超重力中的一系列微扰 dS$_9$ 解。", "authors": [{"name": "Giuseppe Dibitetto"}, {"name": "Nicolò Petri"}], "featured_authors": [{"name": "Giuseppe Dibitetto"}, {"name": "Nicolò Petri"}], "author_count": 2}, {"id": "2606.04949", "category": "hep-th", "title": "Off-shell Thermodynamics and Kinetics of Holographic CFTs Dual to Charged AdS Black Holes", "abstract": "We study the thermodynamics and phase structure of holographic conformal field theories dual to spherically symmetric charged AdS black holes using an off-shell free energy. We consider three ensembles of the dual CFT with fixed: $(\\tilde Q,{\\cal V},C)$, $(\\tilde \\Phi,{\\cal V},C)$, and $(\\tilde Q,{\\cal V},\\mu)$ and present their corresponding phase diagrams. For the fixed $(\\tilde Q,{\\cal V},C)$ and $(\\tilde \\Phi,{\\cal V},C)$ ensembles, we study the transitions between competing states using a stochastic description on the various phases given by off-shell free energy. This is described by an ensemble dependent Fokker-Planck equation, allowing us to compute the first-passage-time distribution, including the mean first passage time and its fluctuations over a range of temperatures. We also examine how the phase structure and the associated kinetics depend on the electric charge $\\tilde Q$ and the central charge $C$.", "url": "https://arxiv.org/abs/2606.04949", "type": "理论", "summary": "我们使用离壳自由能研究球对称带电 AdS 黑洞的全息共形场论的热力学和相结构。我们考虑固定的对偶 CFT 的三个系综：$(\\tilde Q,{\\cal V},C)$、$(\\tilde \\Phi,{\\cal V},C)$ 和 $(\\tilde Q,{\\cal V},\\mu)$ 并给出它们相应的相图。对于固定的 $(\\tilde Q,{\\cal V},C)$ 和 $(\\tilde \\Phi,{\\cal V},C)$ 系综，我们使用离壳自由能给出的各个相的随机描述来研究竞争状态之间的转变。这是由依赖于系综的福克-普朗克方程描述的，使我们能够计算首次通过时间分布，包括平均首次通过时间及其在一定温度范围内的波动。我们还研究了相结构和相关动力学如何取决于电荷 $\\tilde Q$ 和中心电荷 $C$。", "authors": [{"name": "Debabrata Sahu"}, {"name": "Chandrasekhar Bhamidipati"}], "featured_authors": [{"name": "Debabrata Sahu"}, {"name": "Chandrasekhar Bhamidipati"}], "author_count": 2}, {"id": "2606.04999", "category": "hep-th", "title": "Path integral quantization of tensionless bosonic strings with Carroll-Weyl ghosts", "abstract": "We revisit the path integral quantization of the null, or tensionless, bosonic string from the viewpoint that all local gauge symmetries of the Carrollian worldsheet must be gauge fixed before the quantum theory is defined. In the tensile-string construction the $bc$ ghosts are the Faddeev-Popov determinant for fixing $\\mathrm{Diff}\\times\\mathrm{Weyl}$. In the ILST tensionless string this logic gives the BMS $bc$ system. However, a Carrollian worldsheet admits an additional volume-preserving Carroll-Weyl scaling, whose Hamiltonian generator is $C_3=P\\cdot X$. Keeping this scaling as a genuine local gauge symmetry adds one more Faddeev-Popov row. The correct ghost system is therefore a $bcs$ system: the BMS $bc$ ghosts plus a scalar ghost $s$ and scalar antighost $b^s$ for Carroll-Weyl scaling. We derive the revised path integral, the $bcs$-ghost action, its residual symmetry equations, mode expansion, and its relation to the extended BMS algebra. The result changes the BRST complex and the anomaly problem: the usual $D=26$ check based only on the old BMS $bc$ ghosts is a partially gauge-fixed calculation, while the Carroll-Weyl covariant quantum theory must include the $s,b^s$ sector.", "url": "https://arxiv.org/abs/2606.04999", "type": "理论", "summary": "我们从卡罗尔世界表的所有局部规范对称性必须在量子理论被定义之前被规范固定的角度重新审视零或无张力玻色弦的路径积分量化。在拉伸弦结构中，$bc$ 幽灵是固定 $\\mathrm{Diff}\\times\\mathrm{Weyl}$ 的 Faddeev-Popov 行列式。在 ILST 无张力弦中，该逻辑提供了 BMS $bc$ 系统。然而，卡罗尔世界表承认额外的保持体积的卡罗尔-韦尔标度，其哈密顿生成器为 $C_3=P\\cdot X$。保持这种缩放作为真正的局域规范对称性又增加了一个 Faddeev-Popov 行。因此，正确的幻影系统是 $bcs$ 系统：BMS $bc$ 幻影加上用于 Carroll-Weyl 缩放的标量幻影 $s$ 和标量反幻影 $b^s$。我们推导出修正后的路径积分、$bcs$-鬼作用、其残差对称方程、模式展开及其与扩展 BMS 代数的关系。\n\n结果改变了 BRST 复合体和异常问题：仅基于旧 BMS $bc$ 幽灵的通常 $D=26$ 检查是部分规范固定的计算，而 Carroll-Weyl 协变量子理论必须包括 $s,b^s$ 扇区。", "authors": [{"name": "Sarthak Duary"}, {"name": "Sourav Maji"}], "featured_authors": [{"name": "Sarthak Duary"}, {"name": "Sourav Maji"}], "author_count": 2}, {"id": "2606.05049", "category": "hep-th", "title": "Generalized Heisenberg algebra from $o(2,4)$", "abstract": "It is well known that the algebra $o(2,4)$ generates the conformal group, but it can also be used to define some variants of the Yang model of noncommutative geometry on a curved spacetime. Starting from these examples, we construct a new physical model based on $o(2,4)$, that can be interpreted as a generalization of the Heisenberg algebra on phase space, with flat positions and momenta, but nontrivial commutation relations between positions and momenta and with the Planck constant promoted to an operator.", "url": "https://arxiv.org/abs/2606.05049", "type": "理论", "summary": "众所周知，代数 $o(2,4)$ 生成共形群，但它也可用于定义弯曲时空上非交换几何杨模型的一些变体。从这些例子开始，我们构建了一个基于$o(2,4)$的新物理模型，该模型可以解释为海森堡代数在相空间上的推广，具有平坦的位置和动量，但位置和动量之间存在非平凡的交​​换关系，并且将普朗克常数提升为算子。", "authors": [{"name": "Tea Martinic Bilac"}, {"name": "Stjepan Meljanac"}, {"name": "Salvatore Mignemi"}], "featured_authors": [{"name": "Tea Martinic Bilac"}, {"name": "Stjepan Meljanac"}, {"name": "Salvatore Mignemi"}], "author_count": 3}, {"id": "2606.05059", "category": "hep-th", "title": "Thermal effective action for the $O(N)$ vector model", "abstract": "We compute the leading coefficients of the thermal effective action for the critical O(N) vector model in three dimensions, in the large-N limit in presence of non vanishing angular twist. At high temperature, the partition function on a product of a two-dimensional spatial manifold and a thermal circle admits a Kaluza-Klein reduction to a local effective action on the spatial slice, whose coefficients encode universal CFT data such as the Casimir energy and the response to a Kaluza-Klein gauge field. We determine these coefficients through two independent computations: an evaluation of the twisted partition function on the two-sphere in the high-temperature limit, and a direct path-integral computation on a generic weakly curved background. The two methods yield consistent results, providing a non-trivial check of the thermal effective action framework.", "url": "https://arxiv.org/abs/2606.05059", "type": "理论", "summary": "我们计算了三维临界 O(N) 矢量模型的热有效作用的主要系数，在存在非消失角扭曲的大 N 限制下。在高温下，二维空间流形和热循环乘积的配分函数允许 Kaluza-Klein 还原为空间切片上的局部有效作用，其系数编码通用 CFT 数据，例如卡西米尔能量和对 Kaluza-Klein 规范场的响应。我们通过两个独立的计算来确定这些系数：高温极限下两个球体上扭曲配分函数的评估，以及一般弱弯曲背景上的直接路径积分计算。这两种方法产生一致的结果，提供了对热有效作用框架的重要检查。", "authors": [{"name": "Lorenzo Mauro"}, {"name": "Alessandro Vichi"}], "featured_authors": [{"name": "Lorenzo Mauro"}, {"name": "Alessandro Vichi"}], "author_count": 2}, {"id": "2606.05086", "category": "hep-th", "title": "Fermionic Kaluza-Klein mode mixing in braneworlds", "abstract": "We investigate fermionic Kaluza-Klein (KK) mode mixing in thick braneworld models subjected to generic background perturbations. Conventionally, isolated static backgrounds are completely described by a Schroedinger-like formulation, which yields an unperturbed orthogonal basis of KK eigenstates. However, generic perturbations possess a non-trivial spatial profile along the extra dimension. When the full interacting Dirac operator is expanded in this original basis, the spatial variation inevitably yields non-vanishing overlap integrals between distinct KK levels, thereby inducing off-diagonal couplings in the 4D effective mass matrix. Consequently, the original eigenstates are no longer exact physical eigenmodes of the perturbed system. To rigorously preserve the underlying 5D chiral structure and resolve the true physical states, we employ an exact Singular Value Decomposition (SVD) of the full, off-diagonal Dirac mass matrix. Our exact analysis reveals that this mode mixing introduces small but highly structured corrections to the mass eigenvalues. Specifically, parity-odd perturbation operators strictly induce same-parity mixing that preserves the macroscopic Z2 spatial symmetry, whereas parity-even operators trigger cross-parity mixing that shatters the Z2 symmetry, resulting in severe spatial polarization of the KK probability densities. Phenomenologically, such polarization shifts the wave functions toward the brane, turning probability zeros into non-zero values, which directly illuminates previously \"dark\" KK modes.", "url": "https://arxiv.org/abs/2606.05086", "type": "理论", "summary": "我们研究了受到一般背景扰动的厚膜世界模型中的费米子 Kaluza-Klein (KK) 模式混合。传统上，孤立的静态背景完全由类薛定谔公式描述，产生 KK 本征态的未扰动正交基。然而，一般扰动在额外维度上具有不平凡的空间轮廓。当完全相互作用的狄拉克算子在此原始基础上扩展时，空间变化不可避免地会在不同的 KK 能级之间产生不为零的重叠积分，从而在 4D 有效质量矩阵中引起非对角耦合。因此，原始本征态不再是扰动系统的精确物理本征模。为了严格保留底层 5D 手性结构并解析真实的物理状态，我们对完整的非对角狄拉克质量矩阵采用精确的奇异值分解 (SVD)。我们的精确分析表明，这种模式混合对质量特征值引入了小但高度结构化的校正。\n\n具体来说，奇偶扰动算子严格引发同奇偶混合，从而保持宏观 Z2 空间对称性，而奇偶算子触发交叉奇偶混合，破坏 Z2 对称性，导致 KK 概率密度的严重空间极化。从现象学角度来看，这种极化将波函数移向膜，将概率零转变为非零值，这直接照亮了之前的“暗”KK 模式。", "authors": [{"name": "Chun-E Fu"}, {"name": "Wen-Xuan Ma"}], "featured_authors": [{"name": "Chun-E Fu"}, {"name": "Wen-Xuan Ma"}], "author_count": 2}, {"id": "2606.05136", "category": "hep-th", "title": "Thermal Positivity", "abstract": "We argue that Lorentz invariance and unitarity impose sharp constraints on thermodynamic quantities. By relating thermal vacuum diagrams to forward scattering amplitudes, we derive an infinite family of sign conditions on finite-temperature observables in perturbative theories of relativistic massless bosons. In particular, we prove that all low-temperature corrections from interactions to the pressure, or equivalently the negative free energy density, of the form T^{2D-4+4k} with k>0 in D spacetime dimensions, are strictly positive. These positivity conditions are inherited by analogous terms in the entropy density and specific heat. Our results apply to any effective field theory that is free of long-range forces and descends from a weakly coupled ultraviolet completion, in which case higher-loop and higher-multiplicity thermal diagrams are parametrically subleading.", "url": "https://arxiv.org/abs/2606.05136", "type": "理论", "summary": "我们认为洛伦兹不变性和幺正性对热力学量施加了严格的限制。通过将热真空图与前向散射振幅联系起来，我们推导出相对论无质量玻色子微扰理论中有限温度可观测量的无限族符号条件。特别是，我们证明了所有与压力相互作用的低温校正，或者等效地，形式为 T^{2D-4+4k} 且在 D 时空维度中 k>0 的负自由能密度，都是严格正的。这些正性条件由熵密度和比热中的类似术语继承。我们的结果适用于任何不受长程力影响并从弱耦合紫外完成下降的有效场理论，在这种情况下，更高回路和更高多重性热图在参数上是次领先的。", "authors": [{"name": "Clifford Cheung"}, {"name": "Rachel A. Rosen"}], "featured_authors": [{"name": "Clifford Cheung"}, {"name": "Rachel A. Rosen"}], "author_count": 2}, {"id": "2606.04024", "category": "math-ph", "title": "Delta-pulse solution in Zener viscoelastic model", "abstract": "We derive the integral representation of the solution for the propagation of a delta-pulse (impulsive wave) in a semi-infinite, homogeneous, linear viscoelastic medium governed by the Zener model. Starting from the Bromwich integral representation of the response function, we obtain a closed-form integral representation by analytically inverting the relevant Laplace transforms. The result is expressed in terms of modified Bessel functions of the first kind and Macdonald functions of half-integer order, and is shown to reduce to the known Maxwell model solution in the appropriate limit. As an independent computational approach, we derive the steepest descent path (SDP) associated with the phase function of the Bromwich integral, characterizing its saddle points and showing that the SDP can be expressed explicitly as the zero locus of a sixth-degree polynomial in the imaginary part of the complex variable. The two methods are compared numerically for several values of the model parameters, confirming their agreement. While the integral representation provides analytical insight into the structure of the solution, the steepest descent method requires no explicit inversion of the Laplace transform and may therefore prove especially valuable in more general viscoelastic settings where a closed-form integral representation is not available.", "url": "https://arxiv.org/abs/2606.04024", "type": "理论", "summary": "我们推导了由齐纳模型控制的半无限均匀线性粘弹性介质中 δ 脉冲（脉冲波）传播解的积分表示。从响应函​​数的布罗姆维奇积分表示开始，我们通过解析相关拉普拉斯变换的逆变换获得闭式积分表示。结果用第一类修正贝塞尔函数和半整数阶麦克唐纳函数表示，并在适当的限度内简化为已知的麦克斯韦模型解。作为一种独立的计算方法，我们推导了与 Bromwich 积分的相位函数相关的最速下降路径（SDP），表征了其鞍点，并表明 SDP 可以明确表示为复变量虚部中六次多项式的零轨迹。对模型参数的几个值对这两种方法进行了数值比较，证实了它们的一致性。\n\n虽然积分表示提供了对解结构的分析洞察，但最速下降法不需要拉普拉斯变换的显式反转，因此在闭式积分表示不可用的更一般的粘弹性设置中可能证明特别有价值。", "authors": [{"name": "Andrea Mentrelli"}, {"name": "Juan Luis Gonzalez-Santander"}, {"name": "Francesco Mainardi"}], "featured_authors": [{"name": "Andrea Mentrelli"}, {"name": "Juan Luis Gonzalez-Santander"}, {"name": "Francesco Mainardi"}], "author_count": 3}, {"id": "2606.04041", "category": "math-ph", "title": "$A$-Generalized Hessian pre-Lie algebras and $A$-Generalized Yang--Baxter Equations", "abstract": "Inspired by the problem of constructing ($\\omega$-)pre-Lie algebra structures on the dual space of a pre-Lie algebra, we introduce the \\(A\\)-generalized Yang--Baxter equation as a generalization of the Yang--Baxter equation of pre-Lie algebras. We study its symmetric solutions through \\(A\\)-generalized Hessian pre-Lie algebras and split these solutions into two types. We further consider factorizable solutions of this equation and establish a one-to-one correspondence between them and generalized quadratic Rota--Baxter pre-Lie algebras of nonzero weight. By studying the structure of these algebras, we find all factorizable solutions. Finally, we study the structure of \\(A\\)-generalized Hessian pre-Lie algebras. In particular, we obtain a structural description via central and double extensions and classify low-dimensional non-trivial \\(A\\)-generalized Hessian pre-Lie algebras.", "url": "https://arxiv.org/abs/2606.04041", "type": "理论", "summary": "受在前李代数的对偶空间上构造 ($\\omega$-)前李代数结构问题的启发，我们引入\\(A\\)-广义Yang--Baxter方程作为前李代数的Yang--Baxter方程的推广。我们通过\\(A\\)-广义Hessian预李代数研究其对称解，并将这些解分为两类。我们进一步考虑该方程的可分解解，并在它们与非零权重的广义二次 Rota-Baxter pre-Lie 代数之间建立一一对应关系。通过研究这些代数的结构，我们找到了所有可因式分解的解。最后，我们研究了\\(A\\)-广义Hessian预李代数的结构。特别是，我们通过中心和双重扩展获得了结构描述，并对低维非平凡 \\(A\\) 广义 Hessian pre-Lie 代数进行了分类。", "authors": [{"name": "Yining Sun"}, {"name": "Zeyu Hao"}, {"name": "Ziyi Zhang"}, {"name": "Liangyun Chen"}], "featured_authors": [{"name": "Yining Sun"}, {"name": "Zeyu Hao"}, {"name": "Ziyi Zhang"}, {"name": "Liangyun Chen"}], "author_count": 4}, {"id": "2606.04162", "category": "math-ph", "title": "An Elementary Perspective on the Dirac Equation and its Closest Relatives", "abstract": "We consider the Dirac equation in a real setting to show its close relationship to Maxwell's equation. In addition to analysing the classical Dirac mass term, we also inspect the alternative Majorana mass term and discuss their quaternionic structure and its consequences.", "url": "https://arxiv.org/abs/2606.04162", "type": "理论", "summary": "我们在实际环境中考虑狄拉克方程，以显示它与麦克斯韦方程的密切关系。除了分析经典的狄拉克质量项之外，我们还检查了替代的马约拉纳质量项并讨论了它们的四元结构及其后果。", "authors": [{"name": "Rainer Picard"}, {"name": "Sascha Trostorff"}, {"name": "Marcus Waurick"}], "featured_authors": [{"name": "Rainer Picard"}, {"name": "Sascha Trostorff"}, {"name": "Marcus Waurick"}], "author_count": 3}, {"id": "2606.04515", "category": "math-ph", "title": "Discussion on the Physics Problem of a Boat Crossing a River", "abstract": "This study addresses the boat river-crossing problem under non-uniform flow velocities by constructing three models: constant flow (Model 1), linear distribution (Model 2), and even-power function distribution (Model 3, adjustable via parameter n ). By using the vector addition, combined with the solutions of calculus and differential equations, the analytical expression of the ship's spatial trajectory under a fixed heading angle relative to the water flow is derived. For the shortest-time control problem, the Lagrange multiplier method is introduced to construct a constrained optimization model, and the analytical solution of the optimal heading angle that satisfies the boundary condition of reaching the direct opposite bank is solved. The research results provide theoretical support for the path planning of inland ship intelligent navigation systems, and the proposed multi-model analysis framework can effectively simulate the complex flow velocity distribution scenarios of real rivers.", "url": "https://arxiv.org/abs/2606.04515", "type": "理论", "summary": "本研究通过构建三个模型来解决非均匀流速下的船过河问题：恒定流量（模型1）、线性分布（模型2）和偶次幂函数分布（模型3，通过参数n调节）。利用矢量加法，结合微积分和微分方程的解，推导了相对于水流固定航向角下船舶空间轨迹的解析表达式。针对最短时间控制问题，引入拉格朗日乘子法构建约束优化模型，求解满足到达直接对岸边界条件的最优航向角解析解。研究成果为内河船舶智能导航系统的路径规划提供了理论支撑，所提出的多模型分析框架能够有效模拟真实河流复杂的流速分布场景。", "authors": [{"name": "Kyle Kou Yuchang"}, {"name": "Simon Meng Zimin"}, {"name": "Paul Zhang Yixing"}], "featured_authors": [{"name": "Kyle Kou Yuchang"}, {"name": "Simon Meng Zimin"}, {"name": "Paul Zhang Yixing"}], "author_count": 3}, {"id": "2606.04643", "category": "math-ph", "title": "On the Conicality of Causally Simple, Future Cohesive Spacetimes", "abstract": "The notion of conicality, recently introduced in [ 2403.00916 ], captures the extent to which the joint future of a finite set in spacetime uniquely determines the generating subset via its light cone structure. In the same paper it was mentioned that conicality holds for Minkowski spacetime of dimension $1+N$ with $N\\geq 2$ and it has been conjectured that this property holds more generally. In this work, we show that neither homotopy with Minkowski space nor global hyperbolicity alone are sufficient for the spacetime to satisfy conicality. We then establish that causally simple, future cohesive spacetimes of dimension $1+N$ with $N\\geq 2$ satisfy the condition. This class of spacetimes in particular includes TIP spacetimes, which can be understood as the timelike past of an observer. This is in line with the origin of causal modeling since the past of an observer is the natural domain for the description of experiments.", "url": "https://arxiv.org/abs/2606.04643", "type": "理论", "summary": "最近在[2403.00916]中引入的圆锥性概念，捕捉了时空中有限集的联合未来通过其光锥结构唯一确定生成子集的程度。在同一篇论文中，提到圆锥性对于维度为 $1+N$ 且 $N\\geq 2$ 的闵可夫斯基时空成立，并且推测该性质更普遍地成立。在这项工作中，我们证明，无论是与闵可夫斯基空间的同伦还是全局双曲性都不足以使时空满足锥性。然后我们建立因果简单、维度为 $1+N$ 且 $N\\geq 2$ 的未来内聚时空满足条件。这类时空特别包括TIP时空，它可以被理解为观察者的类似时间的过去。这符合因果模型的起源，因为观察者的过去是描述实验的自然领域。", "authors": [{"name": "Claudio F. Paganini"}], "featured_authors": [{"name": "Claudio F. Paganini"}], "author_count": 1}, {"id": "2606.04837", "category": "math-ph", "title": "Maximal Minimal Spacing for Random Points", "abstract": "From $N+1$ random points on a line we wish to select $M+1$ points so as to maximize the minimal spacing between them. We consider an initial configuration with independent and identically distributed spacings. The problem is equivalent to optimally grouping consecutive gaps into $M$ blocks and maximizing the smallest block sum. For general gap distributions, and for all $M\\leq N$, we derive exact distributional identities for the optimal spacing and obtain its asymptotic behavior. The problem admits a reformulation in terms of a threshold-resetting random walk. The walk advances by successive random increments and is reset to the origin upon exceeding a fixed threshold. The probability that the optimal spacing exceeds a given value coincides with the probability that the walk completes at least $M$ reset cycles within $N$ steps. This yields an exact representation in terms of first-passage functionals of the walk. The same mapping suggests a numerical scheme for the max-min spacing problem in the regime of large $N$ and $M$, whose accuracy is tested against the exact results obtained here.", "url": "https://arxiv.org/abs/2606.04837", "type": "理论", "summary": "我们希望从一条线上的 $N+1$ 个随机点中选择 $M+1$ 个点，以便最大化它们之间的最小间距。我们考虑具有独立且相同分布间距的初始配置。该问题相当于将连续间隙最优地分组为 $M$ 块并最大化最小块和。对于一般间隙分布，以及所有 $M\\leq N$，我们导出最佳间距的精确分布恒等式并获得其渐近行为。该问题允许重新表述阈值重置随机游走。行走以连续的随机增量前进，并在超过固定阈值时重置到原点。最佳间距超过给定值的概率与步行在 $N$ 步内完成至少 $M$ 重置周期的概率一致。这产生了步行的第一通道泛函的精确表示。相同的映射提出了大 $N$ 和 $M$ 范围内最大最小间距问题的数值方案，其准确性根据此处获得的确切结果进行了测试。", "authors": [{"name": "Fabio Deelan Cunden"}, {"name": "Noemi Cuppone"}, {"name": "Giovanni Gramegna"}, {"name": "Pierpaolo Vivo"}], "featured_authors": [{"name": "Fabio Deelan Cunden"}, {"name": "Noemi Cuppone"}, {"name": "Giovanni Gramegna"}, {"name": "Pierpaolo Vivo"}], "author_count": 4}, {"id": "2606.04038", "category": "quant-ph", "title": "Graphical and algebraic methods for Boolean factoring", "abstract": "The problem of factoring Boolean polynomials has significant applications in both classical and quantum computing technology. In this paper we have developed novel algorithms for factoring both ESOP and SOP expressions. Our aim is to optimize the AND-count. The AND-count plays a key role in determining the number of AND and Toffoli gates required to implement a reversible function with classical and quantum circuits, respectively. The first type of algorithms that we develop, are graphical. We reduce the problem of Boolean factoring to covering a bipartite graph with bicliques, and so optimizing the number of bicliques required to cover the bipartite graph, leads to reduced number of factors, and hence AND-count. The second type of algorithm is algebraic, and is derived from multivariate Horner method. We have compared the performances of our algorithms with existing popular methods like EXORCISM-4 and EPOEM2, on random functions of up to 12 variables. We have observed that our multivariate Horner method is substantially faster, while our biclique-based method achieves the maximum AND-count reduction. In fact, compared to EXORCISM-4 our biclique based method achieves up to 5 times reduction in AND-count.", "url": "https://arxiv.org/abs/2606.04038", "type": "理论+数值", "summary": "布尔多项式因式分解问题在经典计算技术和量子计算技术中都有重要的应用。在本文中，我们开发了用于分解 ESOP 和 SOP 表达式的新颖算法。我们的目标是优化 AND 计数。 AND 计数在确定分别用经典电路和量子电路实现可逆功能所需的 AND 门和 Toffoli 门的数量方面起着关键作用。我们开发的第一类算法是图形算法。我们将布尔因式分解的问题减少为用 bicliques 覆盖二分图，因此优化覆盖二分图所需的 bicliques 数量，导致因子数量减少，从而减少 AND 计数。第二种算法是代数算法，源自多元 Horner 方法。我们将我们的算法与 EXORCISM-4 和 EPOEM2 等现有流行方法在最多 12 个变量的随机函数上进行了性能比较。我们观察到，我们的多元 Horner 方法要快得多，而我们的基于 biclique 的方法实现了最大的 AND 计数减少。\n\n事实上，与 EXORCISM-4 相比，我们基于 Biclique 的方法可将 AND 计数减少多达 5 倍。", "authors": [{"name": "Simon Martiel"}, {"name": "Priyanka Mukhopadhyay"}], "featured_authors": [{"name": "Simon Martiel"}, {"name": "Priyanka Mukhopadhyay"}], "author_count": 2}, {"id": "2606.04055", "category": "quant-ph", "title": "Boson Models with Interactions of Arbitrary Order", "abstract": "The paper considers quantal many-boson systems that are described by a rotationally invariant and boson-number conserving Hamiltonian. The properties of a generic model are studied which treats N bosons of p different kinds with non-zero angular momenta l_1,l_2,...,l_p, possibly augmented with a (number of) scalar s boson(s). The order k of the interaction between the bosons is arbitrary and closed formulas are given for matrix elements between N-boson states for any k if p=1 and p=2. A recursive procedure is defined for arbitrary k and p. With the expressions derived in the paper it is possible to express symbolically a Hamiltonian matrix element between N-boson states as a linear combination of k-body interaction matrix elements. More generally, the formulas allow the evaluation of matrix elements of tensor operators that are not necessarily scalar nor boson-number conserving. The numerical implementation of the formalism is discussed and illustrated with a few examples.", "url": "https://arxiv.org/abs/2606.04055", "type": "理论+数值", "summary": "该论文考虑了由旋转不变且玻色子数守恒哈密顿量描述的量子多玻色子系统。研究了通用模型的属性，该模型处理具有非零角动量 l_1,l_2,...,l_p 的 p 个不同种类的 N 个玻色子，可能用（多个）标量 s 玻色子进行增强。玻色子之间相互作用的阶数 k 是任意的，并且对于任意 k（如果 p=1 和 p=2），给出了 N 玻色子态之间的矩阵元素的闭合公式。为任意 k 和 p 定义递归过程。利用本文推导的表达式，可以将 N 玻色子态之间的哈密顿矩阵元素象征性地表达为 k 体相互作用矩阵元素的线性组合。更一般地说，这些公式允许对张量算子的矩阵元素进行求值，这些算子不一定是标量守恒的，也不一定是玻色子数守恒的。讨论并通过几个例子说明了形式主义的数值实现。", "authors": [{"name": "P. Van Isacker"}], "featured_authors": [{"name": "P. Van Isacker"}], "author_count": 1}, {"id": "2606.04080", "category": "quant-ph", "title": "Essential Unitarity for Higher-Order Quantum Computation", "abstract": "We develop a semantic framework for higher-order quantum computation based on a boundary-centric presentation of compact closed categories, building on Kelly--Laplaza and this http URL are polarized boundary linkings composed by execution, with a unit-free monoidal sum providing reversible control and branching. We identify a notion of \\emph{essential unitarity} generalizing unitarity from first-order processes to higher-order interfaces;at first order it coincides with standard unitarity, and at higher order it characterizes when information is preserved relative tothe boundary. Essential unitarity is the unique predicate compatible with dagger-monoidal structure, coherence reindexing, and currying, and reducing to ordinary unitarity at first order. Every morphism of the quantum core is essentially unitary. The framework realizes the coherent quantum switch and other one-slot, equal-ratio, purity-preserving supermaps as coherent pure-comb dilations. Extended Abstract appears in QPL 2026", "url": "https://arxiv.org/abs/2606.04080", "type": "理论", "summary": "我们开发了一个用于高阶量子计算的语义框架，基于以边界为中心的紧凑封闭类别的表示，建立在 Kelly--Laplaza 的基础上，这个 http URL 是由执行组成的极化边界链接，具有提供可逆控制和分支的无单元幺半群和。我们确定了\\emph{本质幺正性}的概念，将幺正性从一阶过程推广到高阶界面；在初阶它与标准幺正性一致，在高阶它表征信息相对于边界被保留的情况。本质幺正性是与匕首幺半体结构、一致性重新索引和柯里化兼容的唯一谓词，并在一阶还原为普通幺正性。量子核心的每一个态射本质上都是幺正的。该框架将相干量子开关和其他单槽、等比、保持纯度的超图实现为相干纯梳扩张。扩展摘要出现在 QPL 2026 中", "authors": [{"name": "Samson Abramsky"}, {"name": "Radha Jagadeesan"}], "featured_authors": [{"name": "Samson Abramsky"}, {"name": "Radha Jagadeesan"}], "author_count": 2}, {"id": "2606.04186", "category": "quant-ph", "title": "Quantum Information Harvesting with the Parallel Quantum Flow Algorithm", "abstract": "The Quantum Flow (QFlow) algorithm provides a resource-efficient framework for describing correlated many-body systems on hybrid quantum-classical architectures. By enabling parallel utilization of quantum and classical resources, QFlow offers a scalable pathway toward simulations of realistic systems. In this Letter, we report a high-performance computing (HPC) implementation of the QFlow formalism based on a singles-and-doubles model. We demonstrate its performance for target spaces comprising 82 and 114 orbitals, where the flow includes all 6 active electrons in 6 active orbitals type active spaces. In the largest QFlow simulations, we optimize 1.17 million wave function parameters using the equivalent of 12 qubits. Despite the modest qubit requirements of the underlying active-space problems, the method recovers over $95\\%$ of the total correlation energy obtained with the coupled cluster singles and doubles (CCSD) approach for systems dominated by dynamical correlation effects, which remain challenging for existing quantum algorithms. We further show that the QFlow formalism retains high accuracy in extended basis sets with diffuse functions, highlighting its potential for realistic large-scale quantum chemistry simulations.", "url": "https://arxiv.org/abs/2606.04186", "type": "理论+数值", "summary": "量子流 (QFlow) 算法提供了一个资源高效的框架，用于描述混合量子经典架构上的相关多体系统。通过实现量子和经典资源的并行利用，QFlow 提供了一条可扩展的途径来模拟现实系统。在这封信中，我们报告了基于单打和双打模型的 QFlow 形式的高性能计算 (HPC) 实现。我们展示了其在包含 82 和 114 个轨道的目标空间中的性能，其中流包括 6 个活性轨道类型活性空间中的所有 6 个活性电子。在最大的 QFlow 模拟中，我们使用相当于 12 个量子位的参数优化了 117 万个波函数参数。尽管潜在的活动空间问题的量子比特要求不高，但该方法恢复了通过耦合簇单双打 (CCSD) 方法获得的总相关能量的 95% 以上，适用于以动态相关效应为主的系统，这对现有量子算法仍然具有挑战性。\n\n我们进一步表明，QFlow 形式在具有扩散函数的扩展基组中保持了高精度，突出了其在现实大规模量子化学模拟中的潜力。", "authors": [{"name": "Nicholas P. Bauman"}, {"name": "Ajay Panyala"}, {"name": "Chenxu Liu"}, {"name": "Muqing Zheng"}, {"name": "Meng Wang"}, {"name": "Karol Kowalski"}], "featured_authors": [{"name": "Nicholas P. Bauman"}, {"name": "Ajay Panyala"}, {"name": "Chenxu Liu"}, {"name": "Muqing Zheng"}, {"name": "Meng Wang"}, {"name": "Karol Kowalski"}], "author_count": 6}, {"id": "2606.04312", "category": "quant-ph", "title": "Characterization of errors in photon-heralded quantum operations between non-interacting quantum emitters", "abstract": "We develop an analytic perturbative framework that enables the analysis of small Markovian errors in probabilistic, photon-heralded quantum operations between non-interacting emitters. Building on and extending the Zero-Photon-Generation (ZPG) framework, we derive closed-form perturbative solutions that capture both ideal (zero-order) and noisy (low-order) gate dynamics conditioned on time-integrated photon counting. Our framework provides analytic solutions to process matrices and Pauli error weights up to leading order, bridging the gap between detailed physical imperfections of a system and its corresponding abstract Pauli noise models. Moreover, our framework captures imperfections across the full physical system stack, from photon generation to optical manipulation. We benchmark the resulting perturbative predictions on a repeat-until-success CZ gate against numerical simulations, demonstrating accurate modeling of source-induced noise, and then apply the same framework to analyze coherent phase-shifter miscalibrations as a representative example of optical-manipulation errors. The methods developed in this work enable physics-informed parameter tuning to optimize gate designs and develop tailored quantum error correction protocols toward fault-tolerant quantum computing using hybrid light--matter quantum systems.", "url": "https://arxiv.org/abs/2606.04312", "type": "理论+数值", "summary": "我们开发了一个分析微扰框架，可以分析非相互作用发射器之间概率性、光子预示的量子操作中的小马尔可夫误差。在零光子生成（ZPG）框架的基础上构建并扩展，我们得出了封闭形式的微扰解决方案，可以捕获以时间积分光子计数为条件的理想（零阶）和噪声（低阶）门动力学。我们的框架提供了处理矩阵和最高阶泡利误差权重的分析解决方案，弥合了系统的详细物理缺陷与其相应的抽象泡利噪声模型之间的差距。此外，我们的框架捕获了整个物理系统堆栈的缺陷，从光子生成到光学操纵。我们将重复直到成功 CZ 门上的扰动预测与数值模拟进行基准比较，展示了源诱发噪声的精确建模，然后应用相同的框架来分析相干移相器误校准，作为光学操纵误差的代表性示例。\n\n这项工作中开发的方法使得基于物理的参数调整能够优化门设计，并开发定制的量子纠错协议，以实现使用混合光-物质量子系统的容错量子计算。", "authors": [{"name": "Mahsa Karimi"}, {"name": "Samuel Mister"}, {"name": "Christoph Simon"}, {"name": "Stephen C. Wein"}], "featured_authors": [{"name": "Mahsa Karimi"}, {"name": "Samuel Mister"}, {"name": "Christoph Simon"}, {"name": "Stephen C. Wein"}], "author_count": 4}, {"id": "2606.04353", "category": "quant-ph", "title": "Spectral Fusion for Identifying Early State Exclusion in Symmetric Quantum Spin Chains", "abstract": "Perfect state transfer (PST) in one-dimensional quantum spin chains provides a natural setting in which quantum information transport can be analyzed using spectral methods. In the single-excitation subspace, the dynamics of a chain with nearest-neighbor interactions are governed by a Jacobi matrix, allowing questions of state transfer to be formulated in terms of eigenvalue distributions and symmetry properties of eigenvectors. In this work, we investigate the phenomenon of \\emph{early state exclusion} (ESE), whereby the overlap of the time-evolved state with the initial state vanishes at a time strictly earlier than the first occurrence of perfect state transfer. Building on earlier constructions of Hamiltonians exhibiting PST with and without ESE, we provide explicit Jacobi matrix realizations for arbitrary odd-length chains and establish general conditions under which ESE occurs or does not occur. We propose the process of \\emph{spectral fusion} (SF) to build infinite families of such Hamiltonians. These results broaden the known class of spin chains displaying early state exclusion and further clarify the role of spectral structure of the Hamiltonians.", "url": "https://arxiv.org/abs/2606.04353", "type": "理论", "summary": "一维量子自旋链中的完美状态转移（PST）提供了一个自然的环境，可以使用光谱方法分析量子信息传输。在单激励子空间中，具有最近邻相互作用的链的动力学由雅可比矩阵控制，允许根据特征值分布和特征向量的对称性来表述状态转移问题。在这项工作中，我们研究了\\emph{早期状态排除}（ESE）现象，即时间演化状态与初始状态的重叠在严格早于完美状态转移第一次发生的时间消失。基于具有和不具有 ESE 的 PST 的哈密顿量的早期构造，我们为任意奇数长度链提供显式雅可比矩阵实现，并建立 ESE 发生或不发生的一般条件。我们提出了 \\emph{谱融合} (SF) 的过程来构建此类哈密顿量的无限族。这些结果拓宽了显示早期态排除的已知自旋链类别，并进一步阐明了哈密顿量谱结构的作用。", "authors": [{"name": "Mia Escobar"}, {"name": "Valentin Garcia"}, {"name": "Anastasiia Minenkova"}], "featured_authors": [{"name": "Mia Escobar"}, {"name": "Valentin Garcia"}, {"name": "Anastasiia Minenkova"}], "author_count": 3}, {"id": "2606.04386", "category": "quant-ph", "title": "Optimizing the Sensitivity-Noise Trade-off in Non-Hermitian Sensing via Off-Exceptional-Deficiency Operation", "abstract": "A central challenge in non-Hermitian sensing is that spectral singularities simultaneously amplify both the signal and environmental noise. We address this predicament in a double-chain Hatano-Nelson model featuring unidirectional interlayer coupling. At the exceptional deficiency (ED) limit, the system exhibits a macroscopically degenerate complex spectrum and a pronounced non-Hermitian skin effect (NHSE), yielding a sensitivity that scales exponentially with lattice size $N$ while remaining robust across a six-order-of-magnitude detuning range. By introducing diagonal spatial disorder, we demonstrate that the NHSE is progressively suppressed, whith eigenspace cosine similarity analysis quantifying a well-defined fault-tolerance threshold. To reconcile the sensitivity-noise trade-off, we delineate \"At-ED\" and \"Off-ED\" operating regimes. While the At-ED configuration imposes fractional-order noise amplification (SNR $\\propto \\delta^{-1/2}$) that saturates at a suboptimal plateau, migrating to the Off-ED regime eliminates this geometric singularity and restores a linear scaling law (SNR $\\propto \\delta^{-1}$), achieving an SNR enhancement of several orders of magnitude. Crucially, this improvement is achieved while fully preserving the exponential sensitivity scaling, albeit at a slightly reduced absolute sensitivity compared to the strict At-ED limit. Our findings establish the Off-ED framework as a concrete paradigm for next-generation topological sensors that reconcile extreme sensitivity with robust noise immunity.", "url": "https://arxiv.org/abs/2606.04386", "type": "理论+数值", "summary": "非厄米传感的一个核心挑战是光谱奇点同时放大信号和环境噪声。我们通过具有单向层间耦合的双链 Hatano-Nelson 模型解决了这一困境。在异常缺陷 (ED) 极限下，该系统表现出宏观简并的复杂光谱和明显的非厄米集肤效应 (NHSE)，产生的灵敏度随晶格尺寸 $N$ 呈指数级增长，同时在六数量级的失谐范围内保持鲁棒性。通过引入对角空间无序，我们证明 NHSE 被逐渐抑制，特征空间余弦相似性分析量化了明确定义的容错阈值。为了协调灵敏度与噪声的权衡，我们描述了“At-ED”和“Off-ED”操作机制。虽然 At-ED 配置会施加分数阶噪声放大 (SNR $\\propto \\delta^{-1/2}$)，在次优平台处饱和，但迁移到 Off-ED 机制消除了这种几何奇点并恢复了线性缩放定律 (SNR $\\propto \\delta^{-1}$)，实现了几个数量级的 SNR 增强。\n\n至关重要的是，这种改进是在完全保留指数灵敏度缩放的同时实现的，尽管与严格的 At-ED 极限相比，绝对灵敏度略有降低。我们的研究结果将 Off-ED 框架确立为下一代拓扑传感器的具体范例，该传感器能够协调极端的灵敏度与强大的抗噪性。", "authors": [{"name": "Shangxuan Li"}, {"name": "Bin Guo"}], "featured_authors": [{"name": "Shangxuan Li"}, {"name": "Bin Guo"}], "author_count": 2}, {"id": "2606.04548", "category": "quant-ph", "title": "Distributed Variational Quantum Optimisation by Entanglement-Selective Transport", "abstract": "Distributed quantum optimisation is challenging because computing the problem cost function across multiple quantum processors requires non-local gates, which can incur overhead in latency and fidelity. Here we introduce QESTO, a distributed variational ansatz for graph-based discrete optimisation that requires only persistent pre-shared Bell pairs for remote operations. Using local operations, it encodes local constraint information in the Bell pairs that is leveraged to produce amplitude transfer towards globally valid distributed solution states. QESTO requires one Bell pair per distributed edge of the problem graph and, after initialisation of the Bell states, uses no non-local gates. On two bounded weighted Wang tile-matching problem ensembles, QESTO achieves stronger convergence to low-cost tilings than equivalently partitioned QAOA with no distributed gates at ansatz depths of two or higher, and exceeds the mean performance of monolithic QAOA at the deepest studied depth in both ensembles. These results suggest that persistent entanglement can support useful variational communication while reducing per-layer non-local gate overhead.", "url": "https://arxiv.org/abs/2606.04548", "type": "理论+数值", "summary": "分布式量子优化具有挑战性，因为跨多个量子处理器计算问题成本函数需要非本地门，这可能会产生延迟和保真度方面的开销。在这里，我们介绍 QESTO，一种用于基于图的离散优化的分布式变分 ansatz，仅需要持久的预共享贝尔对即可进行远程操作。使用局部操作，它对贝尔对中的局部约束信息进行编码，利用该信息产生向全局有效的分布式解状态的幅度传递。 QESTO 需要问题图的每个分布式边有一对贝尔，并且在贝尔状态初始化后，不使用非本地门。在两个有界加权 Wang 瓦片匹配问题集成上，QESTO 比在 ansatz 深度为 2 或更高时没有分布式门的等效分区 QAOA 实现了更强的低成本瓦片收敛，并且在两个集成的最深研究深度上超过了整体 QAOA 的平均性能。这些结果表明，持久纠缠可以支持有用的变分通信，同时减少每层非本地门开销。", "authors": [{"name": "Edric Matwiejew"}, {"name": "Pascal Elahi"}, {"name": "Ugo Varetto"}], "featured_authors": [{"name": "Edric Matwiejew"}, {"name": "Pascal Elahi"}, {"name": "Ugo Varetto"}], "author_count": 3}, {"id": "2606.04679", "category": "quant-ph", "title": "Hybrid quantum-classical physics-informed neural networks for solving nonlinear PDEs: when and where hybridization is effective?", "abstract": "Physics-informed neural networks (PINNs) often struggle on nonlinear partial differential equations (PDEs) with sharp gradients, stiff dynamics, high-frequency content, or multiscale structure. Such limitations, rooted in spectral bias, ill-conditioned optimization, and unstable convergence, restrict PINN accuracy in regimes where advanced solvers are most needed. In this work, we develop a hybrid quantum-classical physics-informed neural network (HQPINN) that integrates a classical neural-network backbone with a parameterized quantum circuit (PQC) to enrich the solution representation. The framework is benchmarked against a classical PINN on three representative nonlinear PDEs: Burgers' equation, the Allen-Cahn equation, and the Korteweg-de Vries (KdV) equation. The framework is further examined through a systematic sensitivity analysis of qubit count, circuit depth, PQC placement, collocation density, and classical-network width. Across all benchmarks, HQPINNs exhibit smoother training dynamics, reduced loss oscillations, and improved final accuracy, with the largest gains occurring in stiff and multiscale regimes. Relative L2 error decreases by about fourfold for Burgers' equation and fivefold for the Allen-Cahn equation, while improvements for the KdV equation are more moderate. Overall, the results demonstrate that carefully co-designed hybrid quantum-classical architectures can mitigate key limitations of classical PINNs and provide practical design guidance for near-term quantum-enhanced PDE solvers.", "url": "https://arxiv.org/abs/2606.04679", "type": "理论+数值", "summary": "物理信息神经网络 (PINN) 经常难以处理具有尖锐梯度、刚性动力学、高频内容或多尺度结构的非线性偏微分方程 (PDE)。这些根源于谱偏差、病态优化和不稳定收敛的限制，限制了最需要高级求解器的 PINN 精度。在这项工作中，我们开发了一种混合量子经典物理通知神经网络（HQPINN），它将经典神经网络主干与参数化量子电路（PQC）集成在一起，以丰富解决方案表示。该框架以三个代表性非线性偏微分方程上的经典 PINN 为基准：Burgers 方程、Allen-Cahn 方程和 Korteweg-de Vries (KdV) 方程。通过对量子位计数、电路深度、PQC 布局、搭配密度和经典网络宽度的系统敏感性分析，进一步检查该框架。在所有基准测试中，HQPINN 表现出更平滑的训练动态、减少的损失振荡和更高的最终精度，其中最大的增益出现在刚性和多尺度状态中。\n\nBurgers 方程的相对 L2 误差降低了约四倍，Allen-Cahn 方程的相对 L2 误差降低了五倍，而 KdV 方程的改进则更为温和。总体而言，结果表明，精心设计的混合量子经典架构可以减轻经典 PINN 的关键限制，并为近期量子增强型 PDE 求解器提供实用的设计指导。", "authors": [{"name": "Kaveh Zabihi"}, {"name": "Hamid Montazeri"}, {"name": "Akke S.J. Suiker"}], "featured_authors": [{"name": "Kaveh Zabihi"}, {"name": "Hamid Montazeri"}, {"name": "Akke S.J. Suiker"}], "author_count": 3}, {"id": "2606.04681", "category": "quant-ph", "title": "Protecting Quantum States via the Super-Zeno Effect and Anticoherence", "abstract": "We consider a spin system coupled to a noisy environment via an interaction Hamiltonian $H$ which is a polynomial of degree $n$ in the spin operators $S_i$ ($n$-magnetic Hamiltonian), and show that the use of the quantum super-Zeno effect in conjunction with a spin-anticoherent subspace, is highly effective in protecting the spin from the noise. When $n=1$, as in the case of unwanted rotations induced by stray magnetic fields, our scheme provides a quantum gyroscope, a concept that generalizes naturally to higher $n$ values (a quantum $n$-gyroscope). The gist of the proposed protocol is to use the quantum super-Zeno effect to confine a state to the subspace, and then exploit anticoherence to freeze its evolution within it.", "url": "https://arxiv.org/abs/2606.04681", "type": "理论", "summary": "我们考虑通过相互作用哈密顿量 $H$ 耦合到噪声环境的自旋系统，该哈密顿量是自旋算子 $S_i$（$n$-磁哈密顿量）中的 $n$ 次多项式，并表明使用量子超芝诺效应与自旋反相干子空间相结合，可以非常有效地保护自旋免受噪声影响。当 $n=1$ 时，就像杂散磁场引起的不需要的旋转一样，我们的方案提供了一个量子陀螺仪，这个概念可以自然地推广到更高的 $n$ 值（量子 $n$ 陀螺仪）。所提出协议的要点是利用量子超芝诺效应将状态限制在子空间中，然后利用反相干性来冻结其在子空间内的演化。", "authors": [{"name": "C. Chryssomalakos"}, {"name": "A. G. Flores-Delgado"}, {"name": "E. Guzmán-González"}, {"name": "L. Hanotel"}], "featured_authors": [{"name": "C. Chryssomalakos"}, {"name": "A. G. Flores-Delgado"}, {"name": "E. Guzmán-González"}, {"name": "L. Hanotel"}], "author_count": 4}, {"id": "2606.04689", "category": "quant-ph", "title": "QPredSGG: Hybrid Quantum Predicate Learning for Long-Tailed Scene Graph Generation", "abstract": "Scene Graph Generation (SGG) requires relational reasoning over objects and their interactions, but performance is often limited by severe long-tail predicate imbalance. Classical SGG models frequently rely on dataset statistics, leading to biased predictions toward frequent relations rather than fine-grained semantic predicates. Although existing debiasing strategies improve mean recall, predicate classification in current frameworks still often depends on large classical decision modules with high parameter cost. This work introduces a hybrid quantum predicate classifier for SGG by replacing the classical predicate head in Causal Feature Enhancement Network (CFEN) with a Quantum Predicate Head (QP-Head) trained using weighted cross-entropy. To the best of our knowledge, this is among the first studies to evaluate a hybrid quantum architecture for scene graph predicate classification on Visual Genome 150. We study the effect of qubit count, encoding strategy, entangling structure, and circuit depth on relational prediction. The best 4-qubit QP-Head uses Amplitude Embedding and Strongly Entangling Layers to compress 4096-dimensional pair features into a 16-dimensional quantum-compatible representation, corresponding to a 256$\\times$ reduction. It achieves an mR@100 of 57.25%, compared with 41.1% for the classical CFEN reference, while using only 96 trainable quantum parameters. Scaling to 8 qubits maintains strong long-tail performance, reaching an mR@100 of 55.38% with 384 quantum parameters, while the depth analysis shows a trade-off between expressibility and runtime overhead. These results suggest that compact hybrid quantum predicate heads can support parameter-efficient long-tail relational classification in complex visual reasoning tasks.", "url": "https://arxiv.org/abs/2606.04689", "type": "理论+数值", "summary": "场景图生成（SGG）需要对对象及其交互进行关系推理，但性能通常受到严重的长尾谓词不平衡的限制。经典的 SGG 模型经常依赖于数据集统计数据，导致对频繁关系而不是细粒度语义谓词的预测存在偏差。尽管现有的去偏策略提高了平均召回率，但当前框架中的谓词分类仍然常常依赖于具有高参数成本的大型经典决策模块。这项工作通过用加权交叉熵训练的量子谓词头（QP-Head）替换因果特征增强网络（CFEN）中的经典谓词头，引入了 SGG 的混合量子谓词分类器。据我们所知，这是在 Visual Genome 150 上评估用于场景图谓词分类的混合量子架构的首批研究之一。我们研究了量子位计数、编码策略、纠缠结构和电路深度对关系预测的影响。\n\n最好的 4 量子位 QP-Head 使用幅度嵌入和强纠缠层将 4096 维对特征压缩为 16 维量子兼容表示，相当于减少 256$\\times$。它的 mR@100 达到 57.25%，而经典 CFEN 参考的 mR@100 为 41.1%，同时仅使用 96 个可训练量子参数。扩展到 8 个量子位可以保持强大的长尾性能，在 384 个量子参数下达到 55.38% 的 mR@100，而深度分析显示了可表达性和运行时开销之间的权衡。这些结果表明，紧凑的混合量子谓词头可以支持复杂视觉推理任务中参数高效的长尾关系分类。", "authors": [{"name": "Prerana Ramkumar"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Prerana Ramkumar"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "author_count": 3}, {"id": "2606.04721", "category": "quant-ph", "title": "Quantification of Entanglement in Three-Qubit Systems", "abstract": "This study presents an analytical investigation of entanglement quantification in three-qubit pure states through the Acín canonical representation, which serves as a generalization of the two-qubit Schmidt decomposition. Driven by the intricacies of multipartite entanglement and the shortcomings of current measures, we employ a global concurrence measure derived from the generalized concurrence of various bipartitions within the system. The characteristics of this measure are explored both analytically and numerically across a range of SLOCC entanglement classes, such as product, biseparable, GHZ-type, and W-type states. When compared to the three-tangle and tripartite negativity, our findings indicate that this measure yields complementary insights into multipartite correlations. The outcomes underscore the significance of this measure in elucidating the structure and distribution of entanglement within three-qubit quantum systems.", "url": "https://arxiv.org/abs/2606.04721", "type": "理论+数值", "summary": "本研究通过 Acín 规范表示对三量子位纯态中的纠缠量化进行了分析研究，该规范表示是两量子位施密特分解的推广。在多方纠缠的复杂性和当前措施的缺点的驱动下，我们采用了从系统内各种二分的广义并发性导出的全局并发性度量。该度量的特征在一系列 SLOCC 纠缠类（例如积态、双可态、GHZ 型和 W 型态）中进行了分析和数值探索。与三重缠结和三方消极性相比，我们的研究结果表明，这种措施可以产生对多方相关性的补充见解。结果强调了该方法在阐明三量子位量子系统内纠缠的结构和分布方面的重要性。", "authors": [{"name": "Zikra Aram"}], "featured_authors": [{"name": "Zikra Aram"}], "author_count": 1}, {"id": "2606.04759", "category": "quant-ph", "title": "Efficient Description of Parametric Amplification of Quantum Pulses", "abstract": "A single quantum pulse undergoing parametric amplification feeds into at most two pulses in the output. In this work, we present an efficient, analytical method for finding the quantum state of these output modes. Our method applies the amplification to the vacuum rather than to the input state, and subsequently applies a transformed version of the operator that creates the input state from vacuum. Given the input and output pulse mode functions, the method is analytical, and therefore computationally very efficient, and it can be readily generalized to multiple non-vacuum input modes. We exemplify the method by computing the output quantum states resulting from the input of a coherent, a Schrödinger cat, and a single photon input quantum state. We further employ the method to obtain the quantum state in one of the two output modes heralded upon detection of vacuum in the other, least populated, mode.", "url": "https://arxiv.org/abs/2606.04759", "type": "理论", "summary": "经历参量放大的单个量子脉冲最多馈入输出中的两个脉冲。在这项工作中，我们提出了一种有效的分析方法来查找这些输出模式的量子态。我们的方法将放大应用于真空而不是输入状态，然后应用从真空创建输入状态的算子的转换版本。给定输入和输出脉冲模式函数，该方法是分析性的，因此计算上非常高效，并且可以很容易地推广到多种非真空输入模式。我们通过计算由相干薛定谔猫和单光子输入量子态的输入产生的输出量子态来举例说明该方法。我们进一步采用该方法来获得两种输出模式中的一种的量子态，这两种输出模式在检测到另一种（人口最少的）模式中的真空时预示着。", "authors": [{"name": "Victor Rueskov Christiansen"}, {"name": "Klaus Mølmer"}, {"name": "Emanuel Hubenschmid"}], "featured_authors": [{"name": "Victor Rueskov Christiansen"}, {"name": "Klaus Mølmer"}, {"name": "Emanuel Hubenschmid"}], "author_count": 3}, {"id": "2606.04761", "category": "quant-ph", "title": "Comment on \"Possibility of superradiant neutrino emission by atomic condensate\" by M. Blasone, L. Gastaldo and F. Romeo, Phys. Rev. D 113, 053010 (2026)", "abstract": "We show that the recent proposal for superradiant emission of neutrinos cannot evade our proof that superradiant neutrino emission is fundamentally impossible. Pairing two fermions in a molecule does not remove the cancellation of interference terms in neutrino emission due to fermionic anticommutators.", "url": "https://arxiv.org/abs/2606.04761", "type": "理论", "summary": "我们表明，最近关于中微子超辐射发射的提议不能回避我们的证据，即超辐射中微子发射基本上是不可能的。在一个分子中配对两个费米子并不能消除由于费米子反换子而导致的中微子发射中的干扰项的消除。", "authors": [{"name": "Wolfgang Ketterle"}, {"name": "Hanzhen Lin"}, {"name": "Yu-Kun Lu"}], "featured_authors": [{"name": "Wolfgang Ketterle"}, {"name": "Hanzhen Lin"}, {"name": "Yu-Kun Lu"}], "author_count": 3}, {"id": "2606.04763", "category": "quant-ph", "title": "Imaginarity witness", "abstract": "Imaginarity has shown to be an important resource in quantum information. The witness theory of quantum resource, such as entanglement witness, coherence witness, and imaginarity witness, has been established, in particular entanglement witness and coherence witness have been extensively explored. We present here another class of imaginarity witnesses beyond the one in [{Phys. Lett. A} \\textbf{530}, 130135 (2025)]. Within our framework, any nonreal Hermitian operator under the reference basis is an imaginarity witness and only finite of them can detect all the imaginarity states. As the common approaches that were explored in the witness theories of entanglement and coherence, we then explore the relations between these imaginarity witnesses in different cases: (i) when they can detect common imaginary states, (ii) when they can detect the same sets of imaginary states, and (ii) when they obey the finer relation. Finally, we define an imaginarity measure in terms of witnesses, termed witnessed imaginarity, and prove that it coincides with both the trace norm of imaginarity and the robustness of imaginarity.", "url": "https://arxiv.org/abs/2606.04763", "type": "理论", "summary": "想象力已被证明是量子信息的重要资源。量子资源的见证理论，如纠缠见证、相干见证、想象见证等已被建立，特别是纠缠见证和相干见证得到了广泛的探索。我们在这里提出了除[{Phys.莱特。 A} \\textbf{530}, 130135 (2025)]。在我们的框架内，参考基下的任何非实厄米特算子都是虚数见证者，并且只有有限的它们可以检测所有虚数状态。作为纠缠和相干证人理论中探索的常见方法，我们随后探讨了这些想象证人在不同情况下之间的关系：（i）何时他们可以检测到共同的想象状态，（ii）何时他们可以检测到相同的想象状态集，以及（ii）何时他们服从更精细的关系。最后，我们根据目击者定义了一种想象性测度，称为目击想象性，并证明它与想象性的迹范数和想象性的鲁棒性一致。", "authors": [{"name": "Zhiqi Liang"}, {"name": "Yufan Lin"}, {"name": "Yu Guo"}, {"name": "Yuqi Sun"}], "featured_authors": [{"name": "Zhiqi Liang"}, {"name": "Yufan Lin"}, {"name": "Yu Guo"}, {"name": "Yuqi Sun"}], "author_count": 4}, {"id": "2606.04817", "category": "quant-ph", "title": "Effect of isotropic errors on the complexity of Grover's algorithm", "abstract": "Isotropic errors have been shown to be immune to conventional error correction techniques. While general theoretical frameworks have been proposed to model such errors, there have been no studies so far analysing their concrete impact on practical use-cases. Here we explore the effect of isotropic errors on the complexity of Grover's search algorithm through numerical simulations, with an analysis of the impact on the algorithm's performance and success probability. The results provide insights into the robustness of Grover's algorithm against isotropic errors, highlighting potential challenges for implementations on noisy quantum hardware. All results presented here are obtained through numerical simulations using the open-source python library \\texttt{isotropic} developed as part of this work. The source code, numerical simulations and documentation for the library are available online at this https URL .", "url": "https://arxiv.org/abs/2606.04817", "type": "理论+数值", "summary": "各向同性误差已被证明不受传统纠错技术的影响。虽然已经提出了通用理论框架来对此类错误进行建模，但迄今为止还没有研究分析它们对实际用例的具体影响。这里我们通过数值模拟探讨各向同性误差对 Grover 搜索算法复杂度的影响，并分析其对算法性能和成功概率的影响。结果提供了对 Grover 算法对抗各向同性误差的鲁棒性的见解，突出了在噪声量子硬件上实现的潜在挑战。这里给出的所有结果都是通过使用作为这项工作的一部分开发的开源 python 库 \\texttt{isotropic} 进行数值模拟获得的。该库的源代码、数值模拟和文档可通过 https URL 在线获取。", "authors": [{"name": "Anurag Saha Roy"}, {"name": "Jesús Lacalle"}], "featured_authors": [{"name": "Anurag Saha Roy"}, {"name": "Jesús Lacalle"}], "author_count": 2}, {"id": "2606.04835", "category": "quant-ph", "title": "Reconciliation of effective Hamiltonians for intense light-matter interaction", "abstract": "Essential-state models are central for quantum control and technology in broad regimes of light-matter interaction. The canonical effective Hamiltonian is obtained equivalently from adiabatic elimination, the Markov approximation, and the pole approximation. These approximations are known to break down at high intensities, significantly limiting their applicability to moderate light-matter interaction. We show how this limitation can be addressed by applying quasi-degenerate Rayleigh-Schrödinger perturbation theory (QD-RSPT). We reconcile QD-RSPT with adiabatic elimination and propose a quasi-degenerate extension of adiabatic elimination that is robust when the detuning of the essential states is non-negligible. The accuracy of QD-RSPT is demonstrated in both the low- and high-frequency regime, showing excellent agreement with Floquet calculations at high intensities. The crucial corrections to adiabatic elimination make the eigenvectors of the effective Hamiltonian non-orthogonal. Physically, this allows us to account for the asymmetric strength with which different essential states couple to the non-essential states. We expect that our systematic approach to effective Hamiltonians from QD-RSPT will constitute a new state of the art in intense light-matter interaction and quantum optics with novel forms of strong coupling and quantum control phenomena being conceivable.", "url": "https://arxiv.org/abs/2606.04835", "type": "理论+数值", "summary": "本征态模型是光与物质相互作用的广泛领域中量子控制和技术的核心。规范有效哈密顿量可以通过绝热消除、马尔可夫近似和极点近似等价获得。众所周知，这些近似值在高强度下会分解，从而极大地限制了它们对中等光与物质相互作用的适用性。我们展示了如何通过应用准简并瑞利-薛定谔微扰理论（QD-RSPT）来解决这一限制。我们将 QD-RSPT 与绝热消除相协调，并提出了绝热消除的准简并扩展，当基本状态的失谐不可忽略时，该扩展是稳健的。 QD-RSPT 的准确性在低频和高频状态下都得到了证明，在高强度下与 Floquet 计算表现出极好的一致性。对绝热消除的关键修正使得有效哈密顿量的特征向量成为非正交的。从物理上讲，这使我们能够解释不同基本状态与非基本状态耦合的不对称强度。\n\n我们期望我们从 QD-RSPT 获得有效哈密顿量的系统方法将构成强光-物质相互作用和量子光学领域的新技术，具有新形式的强耦合和量子控制现象是可以想象的。", "authors": [{"name": "Jakob Nicolai Bruhnke"}, {"name": "Jan Marcus Dahlström"}], "featured_authors": [{"name": "Jakob Nicolai Bruhnke"}, {"name": "Jan Marcus Dahlström"}], "author_count": 2}, {"id": "2606.04843", "category": "quant-ph", "title": "Decoded Quantum Interferometry Beyond Hamming: Rank-Metric and Translation Association Schemes", "abstract": "Decoded Quantum Interferometry (DQI) uses coherent decoding and a quantum Fourier transform to find high-quality solutions of structured optimisation problems. Existing analyses are closely tied to Hamming space, which underlies the optimisation objective, Dicke state preparation and the decoding step of the algorithm. Here we extend the core DQI mechanism beyond Hamming space to finite geometries with translation symmetry, where points are grouped into shells by their distance from a basepoint. Mathematically, these geometries are translation association schemes. In this setting the algorithm can be analysed by tracking one amplitude per shell, and biasing the prepared state towards high-quality solutions becomes a finite tridiagonal eigenvalue problem. As a non-Hamming example, we develop an efficient DQI protocol for finding an m x n finite-field matrix with smallest rank difference to a target matrix. Initial states are uniform superpositions over fixed-rank matrices, and Gabidulin codes provide candidates for efficient low-rank decoding up to a cutoff l. For this objective, this finds solutions with an effective-rank proxy near min(m,n)-l, and the corresponding expected score can be converted into a constant-probability bound on the residual rank of a sample. For Gabidulin nearest-codeword instances, a covering-radius obstruction shows that this bound does not imply an additive guarantee for the true optimum, and we do not claim a quantum advantage for the rank-metric construction. The results instead identify the geometric and coding ingredients for DQI beyond Hamming space.", "url": "https://arxiv.org/abs/2606.04843", "type": "理论+数值", "summary": "解码量子干涉测量 (DQI) 使用相干解码和量子傅里叶变换来寻找结构化优化问题的高质量解决方案。现有的分析与汉明空间密切相关，汉明空间是优化目标、Dicke 状态准备和算法解码步骤的基础。在这里，我们将核心 DQI 机制扩展到汉明空间之外，扩展到具有平移对称性的有限几何，其中点根据距基点的距离分组为壳。从数学上讲，这些几何形状是平移关联方案。在此设置中，可以通过跟踪每个壳的一个振幅来分析算法，并将准备好的状态偏向高质量解决方案，从而成为有限三对角特征值问题。作为非汉明示例，我们开发了一种高效的 DQI 协议，用于查找与目标矩阵具有最小秩差的 m x n 有限域矩阵。初始状态是固定秩矩阵上的均匀叠加，并且加比杜林码提供了高达截止 l 的高效低秩解码的候选者。\n\n对于这个目标，这会找到具有接近 min(m,n)-l 的有效排名代理的解决方案，并且相应的预期分数可以转换为样本剩余排名的恒定概率界限。对于加比杜林最近码字实例，覆盖半径障碍表明该界限并不意味着对真正最优的附加保证，并且我们不声称排名度量构造具有量子优势。相反，结果确定了汉明空间之外 DQI 的几何和编码成分。", "authors": [{"name": "Alexandre Krajenbrink"}, {"name": "Colin Krawchuk"}, {"name": "Ansis Rosmanis"}, {"name": "Matthias Rosenkranz"}], "featured_authors": [{"name": "Alexandre Krajenbrink"}, {"name": "Colin Krawchuk"}, {"name": "Ansis Rosmanis"}, {"name": "Matthias Rosenkranz"}], "author_count": 4}, {"id": "2606.04940", "category": "quant-ph", "title": "Convergence rates of Sum-of-Hermitian-Squares Hierarchies for the Pauli algebra", "abstract": "Moment/Sum-of-Hermitian-Squares relaxations for noncommutative polynomial optimization problems have become an important tool for analyzing problems within quantum theory. Despite their widespread success, little is known about their rate of convergence and, consequently, their accuracy. In this work, we develop explicit convergence rates for relaxations of noncommutative polynomial optimization problems generated from the Pauli algebra -- covering applications to the ground state energy problem for n-qubit systems. In particular, we show that the rate of convergence can be bounded in terms of the smallest roots of a family of orthogonal polynomials known as Krawtchouk polynomials. Our result represents the first quantitative analysis of the rate of convergence for relaxations of noncommutative polynomial optimization problems.", "url": "https://arxiv.org/abs/2606.04940", "type": "理论+数值", "summary": "非交换多项式优化问题的矩/厄米平方和松弛已成为分析量子理论中问题的重要工具。尽管它们取得了广泛的成功，但人们对其收敛速度及其准确性知之甚少。在这项工作中，我们开发了用于松弛由泡利代数生成的非交换多项式优化问题的显式收敛率——涵盖了 n 量子位系统的基态能量问题的应用。特别是，我们证明收敛速度可以用称为 Krawtchouk 多项式的正交多项式族的最小根来限制。我们的结果代表了对非交换多项式优化问题松弛收敛速度的首次定量分析。", "authors": [{"name": "Ali Almasi"}, {"name": "Dávid Bugár"}, {"name": "Cambyse Rouzé"}, {"name": "Peter Brown"}], "featured_authors": [{"name": "Ali Almasi"}, {"name": "Dávid Bugár"}, {"name": "Cambyse Rouzé"}, {"name": "Peter Brown"}], "author_count": 4}, {"id": "2606.04955", "category": "quant-ph", "title": "Expressibility, Noise, and Error Mitigation in VQE Ansatz Selection", "abstract": "The variational quantum eigensolver (VQE) is a promising algorithm for near-term quantum chemistry applications, but selecting optimal ansatz circuits remains challenging. Expressibility, a metric quantifying a circuit's ability to explore the Hilbert space, has been proposed as a guide for ansatz selection, but recent work showed it inconsistently predicts VQE performance under realistic noise for $H_2$. We extend this investigation to cover both $H_2$ and $H_3^+$ under four execution scenarios: ideal, noisy, and noisy with zero-noise extrapolation (ZNE) or probabilistic error cancellation (PEC). We find that error mitigation does not reliably restore expressibility's predictive power. ZNE reduces error for only 4 of 12 $H_2$ circuits and 4 of 6 $H_3^+$ circuits, while PEC actually increases error in 11 of 12 $H_2$ circuits and all 6 $H_3^+$ circuits. We reproduce and extend Saib et al.'s key finding that circuit rankings scramble under noise (Spearman $\\rho \\approx -0.1$ between ideal and noisy rankings), and identify a new result: ZNE largely preserves noisy rankings ($\\rho = +0.80$ for $H_2$) while PEC actively reorders them ($\\rho = -0.22$). Noisy expressibility, computed from density matrix simulations, strongly predicts unmitigated performance for $H_3^+$ (Pearson $r = +0.91$, $p = 0.01$), but this metric is computationally intractable at scale. We demonstrate that zero-cost circuit topology metrics such as two-qubit gate count provide comparable or superior predictive power for PEC degradation ($r = +0.96$ for $H_3^+$), while standard expressibility best predicts noisy and ZNE performance for $H_2$ ($r = +0.74$ and $r = +0.77$).", "url": "https://arxiv.org/abs/2606.04955", "type": "数值", "summary": "变分量子本征求解器 (VQE) 是近期量子化学应用中一种很有前途的算法，但选择最佳模拟电路仍然具有挑战性。可表达性是一种量化电路探索希尔伯特空间能力的指标，已被提议作为 ansatz 选择的指南，但最近的研究表明，它对 $H_2$ 实际噪声下的 VQE 性能预测不一致。我们将这项调查扩展到四种执行场景下的 $​​H_2$ 和 $H_3^+$：理想、噪声和零噪声外推 (ZNE) 或概率误差消除 (PEC) 的噪声。我们发现错误缓解并不能可靠地恢复可表达性的预测能力。 ZNE 仅减少了 12 个 $H_2$ 电路中的 4 个和 6 个 $H_3^+$ 电路中的 4 个的误差，而 PEC 实际上增加了 12 个 $H_2$ 电路中的 11 个以及所有 6 个 $H_3^+$ 电路中的误差。我们重现并扩展 Saib 等人的关键发现，即电路排名在噪声下打乱（Spearman $\\rho \\approx -0.1$ 在理想排名和噪声排名之间），并确定了一个新结果：ZNE 在很大程度上保留了噪声排名（$H_2$ 的 $\\rho = +0.80$），而 PEC 主动对它们重新排序（$\\rho = -0.22$）。\n\n根据密度矩阵模拟计算得出的噪声表达能力强烈预测 $H_3^+$ 的未缓解性能（Pearson $r = +0.91$，$p = 0.01$），但该指标在规模上计算起来很困难。我们证明，零成本电路拓扑指标（例如两个量子位门计数）为 PEC 退化提供了可比或优越的预测能力（$H_3^+$ 的 $r = +0.96$），而标准可表达性最好地预测 $H_2$ 的噪声和 ZNE 性能（$r = +0.74$ 和 $r = +0.77$）。", "authors": [{"name": "Peter Annis"}, {"name": "Abe Kassem"}, {"name": "Evan Coleman"}], "featured_authors": [{"name": "Peter Annis"}, {"name": "Abe Kassem"}, {"name": "Evan Coleman"}], "author_count": 3}, {"id": "2606.05010", "category": "quant-ph", "title": "Measurement-induced state transitions in multi-qubit transmon processors", "abstract": "Dispersive readout of the transmon qubit in circuit QED is known to lose its quantum non-demolition character at small to moderate measurement drive amplitudes. This phenomenon is understood to originate from Laundau-Zener transitions at accidental multi-photon resonances, where $n$ drive photons can promote the transmon by $m$ levels. This interpretation has been shown to be in agreement with experiments characterizing the dispersive readout of a single transmon. The impact of these measurement-induced state transition (MIST) of a transmon embedded in a multi-qubit chip, however, remains largely unexplored. Here, we show that the presence of other components, such as qubits and couplers, can affect the MIST threshold of a measured transmon. To arrive at these results, we present a general method to characterize measurement-induced transition when the qubit under readout is coupled to other circuit elements, a ubiquitous situation in circuit QED-based quantum processors. As an example, we consider the case of two transmon qubits, and we show that the spectator qubit can be impacted by the measurement-induced transition of the readout qubit and, conversely, that the presence of the spectator qubit can lower the MIST threshold of the readout qubit. Finally, we explore how adding a coupler mode between the two qubits further modifies these effects.", "url": "https://arxiv.org/abs/2606.05010", "type": "实验", "summary": "已知电路 QED 中传输量子位的色散读出在小到中等测量驱动幅度时会失去其量子非破坏特性。这种现象被认为起源于偶然多光子共振时的朗道-齐纳跃迁，其中 $n$ 驱动光子可以将 transmon 提升 $m$ 水平。这种解释已被证明与表征单个传输的色散读数的实验一致。然而，嵌入多量子位芯片中的 Transmon 的这些测量引起的状态转换 (MIST) 的影响在很大程度上仍未得到探索。在这里，我们表明其他组件（例如量子位和耦合器）的存在可以影响测量的传输的 MIST 阈值。为了获得这些结果，我们提出了一种通用方法来表征当读出的量子位耦合到其他电路元件时测量引起的转变，这是基于电路 QED 的量子处理器中普遍存在的情况。\n\n作为一个例子，我们考虑两个传输量子位的情况，并且我们表明观察者量子位可能会受到读出量子位的测量引起的转变的影响，相反，观察者量子位的存在可以降低读出量子位的 MIST 阈值。最后，我们探讨了如何在两个量子位之间添加耦合器模式进一步修改这些效应。", "authors": [{"name": "Baptiste Hoyau"}, {"name": "Alexander McDonald"}, {"name": "Boris M. Varbanov"}, {"name": "Manuel H. Muñoz-Arias"}, {"name": "Alexandre Blais"}], "featured_authors": [{"name": "Baptiste Hoyau"}, {"name": "Alexander McDonald"}, {"name": "Boris M. Varbanov"}, {"name": "Manuel H. Muñoz-Arias"}, {"name": "Alexandre Blais"}], "author_count": 5}, {"id": "2606.05032", "category": "quant-ph", "title": "Gaussian mean width strong converse bound on the classical identification capacity of quantum channels", "abstract": "We establish a single-letter and efficiently computable strong converse bound on the classical identification capacity of quantum channels. By equipping the $n$-fold channel output space with a product state-weighted $\\sigma$-Euclidean geometry, we allow trace-distance separation constraints for identification codes to be controlled by Euclidean covering estimates. Using Sudakov's inequality, we bound the covering numbers of the $n$-fold channel outputs via their Gaussian mean widths in the weighted geometry, whose exponential growth in $n$ is governed by the operator norm of a single-letter positive operator. Upon optimizing over all weighing states $\\sigma$, this yields a strong converse bound on the identification capacity of the channel, which also admits a semidefinite representation. Our method improves the best known converse bounds on the identification capacity of several important examples, such as depolarizing, Pauli, erasure, and amplitude damping channels. We also discuss extensions of this method to more general Euclidean geometries on the output space.", "url": "https://arxiv.org/abs/2606.05032", "type": "理论+数值", "summary": "我们在量子通道的经典识别能力上建立了单字母且可有效计算的强逆界。通过为$n$倍通道输出空间配备乘积状态加权$\\sigma$-欧几里德几何结构，我们允许识别码的迹线距离分离约束由欧几里德覆盖估计来控制。使用苏达科夫不等式，我们通过加权几何中的高斯平均宽度来限制 $n$ 倍通道输出的覆盖数，其 $n$ 中的指数增长由单字母正算子的算子范数控制。在对所有称重状态 $\\sigma$ 进行优化后，这会在通道的识别能力上产生强逆界，这也允许半定表示。我们的方法改进了几个重要示例的识别能力的最著名的逆界，例如去极化、泡利、擦除和幅度阻尼通道。我们还讨论了将该方法扩展到输出空间上更一般的欧几里得几何。", "authors": [{"name": "Satvik Singh"}], "featured_authors": [{"name": "Satvik Singh"}], "author_count": 1}, {"id": "2606.05044", "category": "quant-ph", "title": "Generalized Bicycle Codes as Cyclic Submodules and their Automorphism Structure", "abstract": "Automorphisms of quantum codes, when they exist, offer a pathway toward fault-tolerant gate implementation via qubit relabeling. Although useful, the conditions under which automorphisms appear in a given code remain poorly understood. In this paper, we develop an algebraic framework for systematically analyzing and engineering automorphisms in Generalized Bicycle (GB) codes. Central to our approach is the derivation of a three-space dependency between the polynomial ring space, the parity check matrix space, and the $\\mathbb{F}_2^{2\\ell}$ qubit space, similar to the structure found in the study of classical cyclic codes. By expressing GB codes as a pair of cyclic submodules of $R_\\ell^2$, where $R_\\ell \\cong \\mathbb{F}_2[x]/\\langle x^\\ell-1\\rangle$, we reduce the search for code automorphisms to a deterministic algebraic problem, deriving necessary and sufficient conditions for the existence of block-separable automorphisms built from cyclic shifts, ring automorphisms and block-swaps. We connect these conditions to the fold-transversal gate framework, providing explicit criteria for the existence of $H$-, $S$-, and $CX$-type fold-transversal gates. We further discuss structured bases for logical operators in order to determine the logical action of a given automorphism. Finally, we introduce the Maximal Cube Root (MCR) code family, a family of GB codes constructed around the principle of maximizing automorphism flexibility and fold-CX gates. We demonstrate a collection of $k=2$ MCR codes up to $d=13$ generating the 2-qubit Clifford group via automorphism and fold-transversal gates, with stabilizer weight ranging from 8 to 16, and $k>2$ MCR codes with a minimum of 20 distinct logical gates achievable from automorphisms. This serves as a first demonstration of inverse design: using these methods to build codes around a rich automorphism structure from the ground up.", "url": "https://arxiv.org/abs/2606.05044", "type": "理论", "summary": "量子代码的自同构（当它们存在时）提供了一条通过量子位重新标记实现容错门的途径。尽管有用，但对给定代码中出现自同构的条件仍然知之甚少。在本文中，我们开发了一个代数框架，用于系统分析和工程广义自行车（GB）代码中的自同构。我们方法的核心是多项式环空间、奇偶校验矩阵空间和 $\\mathbb{F}_2^{2\\ell}$ 量子位空间之间的三空间依赖关系的推导，类似于经典循环码研究中发现的结构。通过将 GB 代码表示为 $R_\\ell^2$ 的一对循环子模块，其中 $R_\\ell \\cong \\mathbb{F}_2[x]/\\langle x^\\ell-1\\rangle$，我们将代码自同构的搜索简化为确定性代数问题，推导出由循环移位、环自同构和区块交换。我们将这些条件连接到折叠横向门框架，为 $H$-、$S$- 和 $CX$ 型折叠横向门的存在提供明确的标准。\n\n我们进一步讨论逻辑运算符的结构化基础，以确定给定自同构的逻辑操作。最后，我们介绍最大立方根（MCR）代码族，这是一个围绕最大化自同构灵活性和折叠 CX 门原理构建的 GB 代码族。我们演示了 $k=2$ MCR 代码的集合，高达 $d=13$，通过自同构和折叠横向门生成 2 量子位 Clifford 群，稳定器权重范围为 8 到 16，并且 $k>2$ MCR 代码具有可通过自同构实现的至少 20 个不同的逻辑门。这是逆向设计的第一个演示：使用这些方法从头开始围绕丰富的自同构结构构建代码。", "authors": [{"name": "AJ Davenport"}, {"name": "John Blue"}, {"name": "Isaac Chuang"}], "featured_authors": [{"name": "AJ Davenport"}, {"name": "John Blue"}, {"name": "Isaac Chuang"}], "author_count": 3}, {"id": "2606.05099", "category": "quant-ph", "title": "Quantum Time Lower Bounds by Permutation Invariance", "abstract": "Tight bounds on quantum sample complexity and quantum query complexity have been known for various computational problems in the literature, whereas tight bounds on quantum time complexity (i.e., the size of quantum circuits) remain unresolved. In this paper, we provide a framework to establish lower bounds on the quantum time complexity for testing permutation-invariant properties of quantum states, via a reduction from quantum sample complexity. As an application, we obtain a series of matching lower bounds when given sample access to the input quantum states, including: 1. The SWAP test due to Buhrman, Cleve, Watrous, and de Wolf (Phys. Rev. Lett. 2001) is time-optimal to estimate the purity $\\operatorname{tr}(\\rho^2)$ and the inner product $\\operatorname{tr}(\\rho\\sigma)$. 2. The Shift test due to Ekert, Alves, Oi, Horodecki, Horodecki, and Kwek (Phys. Rev. Lett. 2002) is time-optimal to estimate the high-order functionals $\\operatorname{tr}(\\rho^k)$. 3. The productness tester for multipartite pure states due to Harrow and Montanaro (J. ACM 2013) is time-optimal. 4. The LMR protocol due to Lloyd, Mohseni, and Rebentrost (Nat. Phys. 2014) is time-optimal to implement the reflection operator about a pure state. 5. The samplizer due to Wang and Zhang (IEEE Trans. Inf. Theory 2025) is time-optimal for pure states. 6. The estimator for pure-state trace distance and fidelity due to Wang and Zhang (ICALP 2026) is time-optimal. To the best of our knowledge, this is the first method that allows us to systematically establish tight lower bounds on quantum time complexity.", "url": "https://arxiv.org/abs/2606.05099", "type": "理论+数值", "summary": "文献中已知各种计算问题的量子样本复杂性和量子查询复杂性的严格界限，而量子时间复杂性（即量子电路的大小）的严格界限仍未解决。在本文中，我们提供了一个框架，通过降低量子样本复杂性来建立量子时间复杂度的下限，以测试量子态的排列不变特性。作为一个应用，当给定样本访问输入量子态时，我们获得了一系列匹配的下界，包括： 1. Buhrman、Cleve、Watrous 和 de Wolf (Phys. Rev. Lett. 2001) 的 SWAP 测试对于估计纯度 $\\operatorname{tr}(\\rho^2)$ 和内积 $\\operatorname{tr}(\\rho\\sigma)$ 是时间最优的。 2. Ekert、Alves、Oi、Horodecki、Horodecki 和 Kwek (Phys. Rev. Lett. 2002) 提出的 Shift 测试对于估计高阶泛函 $\\operatorname{tr}(\\rho^k)$ 来说是时间最优的。 3. Harrow 和 Montanaro (J. ACM 2013) 的多部分纯态产物测试仪是时间最优的。 4. Lloyd、Mohseni 和 Rebentrost 提出的 LMR 方案（Nat. Phys.\n\n2014）是实现纯状态反射算子的时间最优。 5. Wang 和Zhang 提出的采样器（IEEE Trans. Inf. Theory 2025）对于纯态来说是时间最优的。 6. Wang 和Zhang 提出的纯态迹线距离和保真度估计器（ICALP 2026）是时间最优的。据我们所知，这是第一个允许我们系统地建立量子时间复杂度的严格下限的方法。", "authors": [{"name": "Qisheng Wang"}], "featured_authors": [{"name": "Qisheng Wang"}], "author_count": 1}, {"id": "2606.05125", "category": "quant-ph", "title": "Experimentally probing the Quantum Physics in the Inverted Harmonic Oscillator", "abstract": "When a quantum system passes through an unstable fixed point the local dynamics reduces to the inverted harmonic oscillator (IHO). It exponentially amplifies along one quadrature while squeezing the other, producing macroscopically extended quantum states from microscopic zero-point fluctuations. We realize this dynamics with a Bose-Einstein condensate on an AtomChip. Radio-frequency dressing flips the transverse harmonic confinement into an IHO. Through phase-space tomography we follow the full Wigner function of the evolving quantum state, observe sub-vacuum squeezing of 10.6(1.3) dB, and test coherent reversibility by time-reversing the IHO evolution. Matter-wave interference between the two daughter clouds confirms quantum coherence over timescales far beyond the initial expansion. Our experiment establishes ultra-cold atoms as a clean, controlled, many-body platform for unstable quantum dynamics opening a route to force sensing with time-reversal-based coherence certification and to analog studies of the amplification of quantum fluctuations in inflationary field dynamics.", "url": "https://arxiv.org/abs/2606.05125", "type": "实验", "summary": "当量子系统通过不稳定的固定点时，局部动力学会降低为倒谐振子（IHO）。它沿着一个正交呈指数放大，同时挤压另一个正交，从微观零点涨落产生宏观扩展的量子态。我们通过原子芯片上的玻色-爱因斯坦凝聚体实现了这种动力学。射频敷料将横向谐波限制翻转为 IHO。通过相空间断层扫描，我们跟踪演化量子态的完整维格纳函数，观察 10.6(1.3) dB 的亚真空压缩，并通过时间反转 IHO 演化来测试相干可逆性。两个子云之间的物质波干涉证实了远远超出初始膨胀的时间尺度上的量子相干性。我们的实验将超冷原子建立为一个干净、受控的多体平台，用于不稳定的量子动力学，为通过基于时间反转的相干性认证进行力传感以及暴涨场动力学中量子涨落放大的模拟研究开辟了一条途径。", "authors": [{"name": "Si-Cong Ji"}, {"name": "Philipp Schüttelkopf"}, {"name": "Nataliia Bazhan"}, {"name": "Federica Cataldini"}, {"name": "Mohammadamin Tajik"}, {"name": "Frederik S. Møller"}, {"name": "Igor Mazets"}, {"name": "Sebastian Erne"}, {"name": "Jörg Schmiedmayer"}], "featured_authors": [{"name": "Si-Cong Ji"}, {"name": "Philipp Schüttelkopf"}, {"name": "Nataliia Bazhan"}, {"name": "Igor Mazets"}, {"name": "Sebastian Erne"}, {"name": "Jörg Schmiedmayer"}], "author_count": 9}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
