  <script>
    const papers = [{"id": "2606.04000", "category": "cond-mat", "title": "SPLIT-PINN: Separable Probability Learning Technique via Physics-Informed Neural Networks for High-Dimensional Probabilistic Modeling", "abstract": "We present a probabilistic modeling framework for incorporating small-scale spatial heterogeneity into macroscopic descriptions of material behavior for polycrystalline metallic materials. Spatially heterogeneous material state fields are represented using probability density functions (PDFs), providing a principled statistical description of microstructural variability and state evolution across different computational polycrystalline realizations. The framework is built on the inverse identification of a probabilistic transport model, formulated as a Liouville equation with an unknown drift term. To enable accurate, stable, and interpretable inference of this drift field in high-dimensional, transport-dominated settings, we develop a Separable Probability Learning Technique via Physics-Informed Neural Networks (SPLIT-PINN). This method incorporates a marginal-correction drift decomposition, orthogonality constraints, and residual-based adaptive training to enhance well-posedness, numerical stability, and physical consistency without imposing restrictive parametric assumptions. Using SPLIT-PINN, the drift field governing the temporal evolution of joint state PDFs is inferred directly from data. After benchmark validation, the framework is applied to physical computational datasets describing the evolution of polycrystalline microstructural states, including von Mises stress, dislocation density, and equivalent plastic strain rate. The learned Liouville model, trained on a single dataset, is subsequently used in forward predictions of the temporal evolution of joint and marginal PDFs for multiple unseen polycrystal realizations. Quantitative comparisons with reference PDFs demonstrate that the proposed framework yields accurate and robust probabilistic predictions and generalizes effectively across datasets.", "url": "https://arxiv.org/abs/2606.04000", "type": "理论+数值", "summary": "我们提出了一个概率建模框架，用于将小尺度空间异质性纳入多晶金属材料材料行为的宏观描述中。空间异质材料状态场使用概率密度函数（PDF）表示，提供了不同计算多晶实现中微观结构变异性和状态演化的原则性统计描述。该框架建立在概率传输模型的逆辨识基础上，该模型被表述为具有未知漂移项的刘维尔方程。为了在高维、传输主导的环境中对该漂移场进行准确、稳定和可解释的推断，我们通过物理信息神经网络（SPLIT-PINN）开发了一种可分离概率学习技术。该方法结合了边际校正漂移分解、正交性约束和基于残差的自适应训练，以增强适定性、数值稳定性和物理一致性，而无需施加限制性参数假设。\n\n使用 SPLIT-PINN，可以直接从数据推断出控制联合状态 PDF 时间演化的漂移场。经过基准验证后，该框架应用于描述多晶微观结构状态演化的物理计算数据集，包括冯米塞斯应力、位错密度和等效塑性应变率。在单个数据集上训练的学习刘维尔模型随后用于对多个未见过的多晶实现的联合和边缘 PDF 的时间演化进行前向预测。与参考 PDF 的定量比较表明，所提出的框架可以产生准确且稳健的概率预测，并可以有效地跨数据集进行推广。", "authors": [{"name": "Pouria Behnoudfar"}, {"name": "Deekshith Naidu Ponnana"}, {"name": "Noah J. Schmelzer"}, {"name": "Janith Wanni"}, {"name": "George T. Gray III"}, {"name": "Dan J. Thoma"}, {"name": "Curt A. Bronkhorst"}, {"name": "Nan Chen"}, {"name": "Wenxiao Pan"}], "featured_authors": [{"name": "Pouria Behnoudfar"}, {"name": "Deekshith Naidu Ponnana"}, {"name": "Noah J. Schmelzer"}, {"name": "Curt A. Bronkhorst"}, {"name": "Nan Chen"}, {"name": "Wenxiao Pan"}], "author_count": 9}, {"id": "2606.04005", "category": "cond-mat", "title": "Entropy-Compatible Reconstruction for High-Weissenberg Viscoelastic Flow", "abstract": "Log-conformation and square-root reconstructions preserve positive definiteness in high-Weissenberg viscoelastic simulations, but positivity alone does not guarantee compatibility with the discrete free-energy balance. We identify three reconstruction-level mechanisms by which strictly positive tensors can still generate nonphysical behavior: Jensen-type entropy bias, exponential amplification of logarithmic perturbations in highly stretched states, and sign-indefinite polymeric-work defects caused by using incompatible tensors in stress work and entropy variables. We formulate an entropy-compatible reconstruction principle and a corrected logarithmic reconstruction selected by a least-damping entropy constraint. The correction is local, positive, computable by bisection, spectrally controlled, and compatible with coupled velocity--pressure--conformation time stepping. We prove existence of the maximal admissible parameter, convexity of the entropy profile along the logarithmic path, a compatible free-energy estimate, a defect-budget estimate for noncompatible reconstructions, asymptotic inactivity on high-order admissible defects, and a conditional high-stretch resolution advantage in log-relative and entropy metrics. Reproducible diagnostics compare logarithmic, square-root, and linear reconstructions and verify the predicted entropy defects, work defects, stress-force errors, and high-Weissenberg accumulation.", "url": "https://arxiv.org/abs/2606.04005", "type": "数值", "summary": "对数构象和平方根重建在高魏森伯格粘弹性模拟中保持正定性，但仅正定性并不能保证与离散自由能平衡的兼容性。我们确定了三种重建级别的机制，通过这些机制，严格的正张量仍然可以产生非物理行为：詹森型熵偏差、高度拉伸状态下对数扰动的指数放大，以及在应力功和熵变量中使用不相容张量引起的符号不定聚合功缺陷。我们制定了熵兼容重建原理和由最小阻尼熵约束选择的校正对数重建。该校正是局部的、正的、可通过二等分计算、光谱控制的，并且与耦合的速度-压力-构象时间步进兼容。\n\n我们证明了最大容许参数的存在、熵剖面沿对数路径的凸性、兼容的自由能估计、不兼容重建的缺陷预算估计、高阶容许缺陷的渐近不活动性以及对数相对和熵度量中的条件高拉伸分辨率优势。可重复的诊断比较对数、平方根和线性重建，并验证预测的熵缺陷、工作缺陷、应力-力误差和高魏森伯格累积。", "authors": [{"name": "Sai Peng"}], "featured_authors": [{"name": "Sai Peng"}], "author_count": 1}, {"id": "2606.04012", "category": "cond-mat", "title": "Deformable Charge Dynamics in Biological Environments: An Extended Structural Dynamics Foundation for Biological Electrostatics", "abstract": "The point-charge approximation is one of the most successful idealizations in molecular biophysics, but it becomes strained in strong fields, confined geometries, and crowded aqueous environments. We develop a minimal Extended Structural Dynamics (ESD) model in which charged entities are treated as finite, deformable objects with an internal breathing mode rather than as structureless points. Starting from a Hamiltonian description and a controlled coarse-graining procedure, we derive an effective generalized Langevin equation for the center-of-mass motion. The reduced dynamics contain a memory kernel with three physically distinct contributions: finite-size causal delay, inertial deformation, and crowding-induced deformation. The derivation rests on explicit assumptions of small deformation, local dielectric screening, one dominant internal mode, and adiabatic elimination of the fast structural coordinate. Parameters are determined by independently measurable inputs -- ionic radius, charge, mass, and the high-frequency dielectric constant of water -- with one exception: the dimensionless coupling lambda governing crowding-induced deformation, discussed in detail in the paper. Two primary predictions follow. First, transport through confined geometries should show dynamical deviations from point-charge baselines scaling with ionic deformability, beyond static potential-of-mean-force predictions. Second, polarization response should preserve ionic-radius ordering across alkali ions. Two secondary consequences are identified: a field-dependent effective charge radius and a deformation-dependent correction to near-surface mobility. Amplification of these effects in confined settings is treated as a plausible extension rather than a derived result. The framework recovers standard electrostatic models as limiting cases.", "url": "https://arxiv.org/abs/2606.04012", "type": "理论", "summary": "点电荷近似是分子生物物理学中最成功的理想化之一，但它在强场、受限几何结构和拥挤的水环境中变得紧张。我们开发了一个最小的扩展结构动力学（ESD）模型，其中带电实体被视为具有内部呼吸模式的有限可变形物体，而不是无结构点。从哈密顿描述和受控粗粒度程序开始，我们推导出质心运动的有效广义朗之万方程。简化的动力学包含具有三个物理上不同贡献的记忆内核：有限大小的因果延迟、惯性变形和拥挤引起的变形。该推导基于小变形、局部介电屏蔽、一种主要内部模式以及快速结构坐标的绝热消除的明确假设。参数由可独立测量的输入（离子半径、电荷、质量和水的高频介电常数）确定，但有一个例外：控制拥挤引起的变形的无量纲耦合 lambda，这在本文中进行了详细讨论。\n\n以下是两个主要预测。首先，通过受限几何形状的传​​输应该显示出与点电荷基线的动态偏差，该偏差与离子变形能力成比例，超出了平均力的静态势预测。其次，极化响应应保持碱离子的离子半径有序性。确定了两个次要结果：与场相关的有效电荷半径和对近表面迁移率的与变形相关的校正。在有限环境中这些效应的放大被视为合理的延伸，而不是派生结果。该框架恢复标准静电模型作为极限情况。", "authors": [{"name": "Patrick BarAvi"}], "featured_authors": [{"name": "Patrick BarAvi"}], "author_count": 1}, {"id": "2606.04042", "category": "cond-mat", "title": "Uncertainty-Aware Symbolic Regression through Bayesian Support Selection", "abstract": "The Sure Independence Screening and Sparsifying Operator (SISSO) framework is a powerful symbolic-regression method for extracting compact and interpretable descriptors from large nonlinear feature spaces. However, standard SISSO is deterministic: it returns a single descriptor and point prediction, without quantifying uncertainty in descriptor selection, regression coefficients, or predictions. Here we introduce a probabilistic extension in which the sure independence screening (SIS) stage is kept deterministic to preserve scalability, while the sparsifying operator (SO) stage is reformulated as Bayesian inference over the SIS-screened support space. The resulting deterministic-SIS/Bayesian-SO framework yields posterior probabilities for competing descriptor supports, feature-inclusion probabilities, Bayesian-model-averaged predictions, and predictive credible intervals, while recovering the deterministic SO descriptor of standard SISSO in the maximum-a-posteriori limit. Applied to an $X_2YZ$ Heusler-alloy magnetic-moment dataset, the approach gives modest improvements in five-fold cross-validation RMSE and near-nominal empirical coverage of the 95$\\%$ predictive intervals. More importantly, the posterior exposes competing, physically related symbolic descriptor families that would appear artificially unique in a deterministic analysis. These results suggest that deterministic-SIS/Bayesian-SO can be used as an uncertainty-aware diagnostic extension of SISSO: a tool for assessing descriptor confidence, stability, and non-uniqueness in small-data materials regression problems.", "url": "https://arxiv.org/abs/2606.04042", "type": "理论", "summary": "Sure Independence Screening and Sparsifying Operator (SISSO) 框架是一种强大的符号回归方法，用于从大型非线性特征空间中提取紧凑且可解释的描述符。然而，标准 SISSO 是确定性的：它返回单个描述符和点预测，而不量化描述符选择、回归系数或预测中的不确定性。在这里，我们引入了一种概率扩展，其中确定独立筛选（SIS）阶段保持确定性以保持可扩展性，而稀疏算子（SO）阶段则被重新表述为在 SIS 筛选的支持空间上的贝叶斯推理。由此产生的确定性 SIS/贝叶斯 SO 框架产生竞争描述符支持的后验概率、特征包含概率、贝叶斯模型平均预测和预测可信区间，同时在最大后验限制中恢复标准 SISSO 的确定性 SO 描述符。应用于 $X_2YZ$ Heusler 合金磁矩数据集时，该方法在五倍交叉验证 RMSE 和 95$\\%$ 预测区间的接近标称经验覆盖方面给出了适度的改进。\n\n更重要的是，后验暴露了相互竞争的、物理相关的符号描述符家族，这些描述符家族在确定性分析中会人为地显得独特。这些结果表明，确定性 SIS/贝叶斯-SO 可以用作 SISSO 的不确定性感知诊断扩展：一种用于评估小数据材料回归问题中描述符置信度、稳定性和非唯一性的工具。", "authors": [{"name": "Satadeep Bhattacharjee"}], "featured_authors": [{"name": "Satadeep Bhattacharjee"}], "author_count": 1}, {"id": "2606.04086", "category": "cond-mat", "title": "Quantum String Interactions Revealed by Full Counting Statistics", "abstract": "How quantum strings interact is a basic question for extended objects in quantum many-body physics. Even the simplest hard-core constraint (no crossing), can generate a nontrivial effective potential, whose microscopic form is difficult to determine because the relative distance between the strings is intrinsically nonlocal. Here we show that this nonlocality is naturally captured by full counting statistics (FCS). For two hard-core quantum strings, we derive an analytic FCS expression for the emergent interaction by identifying the virtual process in which the two strings touch and hop back. Using the FCS--entanglement relation, we find the effective potential has the entanglement-controlled asymptotic form $\\ln\\Delta E(r)\\sim -\\pi^2 r^2/(12 S_\\ell)$ up to subleading terms, where $S_\\ell$ is the entanglement entropy between the two halves of a quantum string. We confirm the theory using high-precision numerical calculations and finite-size FCS estimates. Our results reveal FCS as a direct route to effective interactions between quantum topological line-defects, which may also be extended to higher-form charge.", "url": "https://arxiv.org/abs/2606.04086", "type": "理论+数值", "summary": "量子弦如何相互作用是量子多体物理中扩展对象的一个​​基本问题。即使是最简单的硬核约束（无交叉），也可以产生不平凡的有效势，其微观形式很难确定，因为弦之间的相对距离本质上是非局域的。在这里，我们表明这种非定域性可以通过完整计数统计（FCS）自然地捕获。对于两个硬核量子弦，我们通过识别两个弦接触和跳回的虚拟过程，导出了紧急相互作用的解析 FCS 表达式。使用FCS-纠缠关系，我们发现有效势具有纠缠控制的渐进形式 $\\ln\\Delta E(r)\\sim -\\pi^2 r^2/(12 S_\\ell)$ 直到次领先项，其中 $S_\\ell$ 是量子弦两半之间的纠缠熵。我们使用高精度数值计算和有限尺寸 FCS 估计来证实该理论。我们的结果表明，FCS 是量子拓扑线缺陷之间有效相互作用的直接途径，也可以扩展到更高形式的电荷。", "authors": [{"name": "Chang-Yan Wang"}, {"name": "Xue-Feng Zhang"}], "featured_authors": [{"name": "Chang-Yan Wang"}, {"name": "Xue-Feng Zhang"}], "author_count": 2}, {"id": "2606.04187", "category": "cond-mat", "title": "Emergence of Macroscopic Quantum Order via Translational Zero Modes", "abstract": "Macroscopic quantum coherence in solids, such as in superfluids, superconductors, and condensates, is generally limited to low temperatures because order forms within a fixed excitation spectrum whose competing states become thermally populated as temperature rises. Here, we show that strong coupling between electronic excitations and a deformable lattice enables a different route. Above a critical density, this coupling nucleates self generated confining potentials that trap the very excitations generating them. Unlike rigid external traps, these potentials can translate through the host lattice without changing their internal structure, defining a translational zero mode. Coupling to this zero mode provides a shared dynamical coordinate that lowers and isolates a single collective many body configuration, opening a density dependent gap that suppresses thermal occupation of competing states and supports off diagonal long range order at elevated temperatures. As a concrete realization, we identify high-temperature superfluorescence in lead halide perovskites as the radiative instability of this zero mode dressed ordered excitonic state. More broadly, this establishes a general route to macroscopic quantum order: not cooling within a fixed spectrum, nor pairing instabilities, but a self generated mobile confining structure whose translational zero mode reconstructs the many-body spectrum to protect coherence.", "url": "https://arxiv.org/abs/2606.04187", "type": "理论", "summary": "固体（例如超流体、超导体和凝聚体）中的宏观量子相干性通常仅限于低温，因为有序在固定的激发光谱内形成，其竞争态随着温度升高而热填充。在这里，我们证明电子激发和可变形晶格之间的强耦合可以实现不同的途径。在临界密度之上，这种耦合使自生成的限制势成核，从而捕获产生它们的激发。与刚性外部陷阱不同，这些电势可以通过主晶格平移，而不改变其内部结构，从而定义平移零模式。耦合到这种零模式提供了一个共享的动态坐标，可以降低和隔离单个集体的多体配置，打开一个密度相关的间隙，抑制竞争态的热占据，并支持高温下的非对角长程有序。作为具体实现，我们将卤化铅钙钛矿中的高温超荧光识别为这种零模式修饰的有序激子态的辐射不稳定性。\n\n更广泛地说，这建立了一条通向宏观量子秩序的通用途径：不是在固定光谱内冷却，也不是配对不稳定性，而是一种自生成的移动限制结构，其平移零模式重建了多体光谱以保护相干性。", "authors": [{"name": "Kenan Gundogdu"}], "featured_authors": [{"name": "Kenan Gundogdu"}], "author_count": 1}, {"id": "2606.04256", "category": "cond-mat", "title": "Morphogenesis driven by nematic defects in active biological networks", "abstract": "Cellular morphogenesis, the process by which biological tissues acquire shape and structure, remains a fundamental challenge in understanding pattern formation and the coordinated remodeling of cellular assemblies. Under appropriate conditions, cytoskeletal filaments can organize into a nematic phase exhibiting partial orientational order. Topological defects within this nematic organization generate localized mechanical stresses that destabilize the tissue and promote deformation and structural rearrangements to relieve internal stresses. We develop a continuum framework that models living tissues as active biological networks represented as nematic polymer networks capable of heterogeneous growth and remodeling. The model captures macroscopic effects through spatial variations in the fiber order parameter which drives the system away from equilibrium. Morphogenesis is described as a sequence of quasi-static equilibrium states governed by the coupling between nematic order, elasticity, stress-driven growth, and adaptive relaxation. Finite element simulations illustrate Hydra regeneration and development when topological defects are prescribed according to the mature organism's expected morphology. The results show that defect topology controls stress localization and shape evolution: $+1$ defects drive protrusion formation, while $-1/2$ defects act as structural stabilizers with minimal growth. By varying the initial defect configuration, we model diverse morphogenetic outcomes, including uniaxial regeneration, tentacle formation, and biaxial development.", "url": "https://arxiv.org/abs/2606.04256", "type": "理论+数值", "summary": "细胞形态发生是生物组织获得形状和结构的过程，仍然是理解细胞组装的模式形成和协调重塑的基本挑战。在适当的条件下，细胞骨架丝可以组织成表现出部分取向顺序的向列相。这种向列组织内的拓扑缺陷会产生局部机械应力，使组织不稳定并促进变形和结构重新排列以减轻内应力。我们开发了一个连续体框架，将活组织建模为活跃的生物网络，以能够异质生长和重塑的向列聚合物网络为代表。该模型通过纤维有序参数的空间变化来捕获宏观效应，从而使系统远离平衡。形态发生被描述为一系列准静态平衡状态，由向列序、弹性、应力驱动生长和适应性松弛之间的耦合控制。\n\n有限元模拟说明了当根据成熟生物体的预期形态规定拓扑缺陷时，水螅的再生和发育。结果表明，缺陷拓扑控制应力局部化和形状演化：$+1$ 缺陷驱动突起形成，而 $-1/2$ 缺陷充当结构稳定剂，生长最小。通过改变初始缺陷配置，我们模拟了不同的形态发生结果，包括单轴再生、触手形成和双轴发育。", "authors": [{"name": "Silvia Paparini"}, {"name": "Giulio G. Giusteri"}, {"name": "L. Angela Mihai"}], "featured_authors": [{"name": "Silvia Paparini"}, {"name": "Giulio G. Giusteri"}, {"name": "L. Angela Mihai"}], "author_count": 3}, {"id": "2606.04331", "category": "cond-mat", "title": "Effect of cations on van der Waals interactions between particles in aqueous alkali nitrate electrolytes", "abstract": "The van der Waals interaction has been extensively studied for colloidal forces and resultant emergent phenomena such as colloidal stability, aggregation, and suspension rheology, but the effect of electrolytes on this interaction, especially at intermediate and high electrolyte concentrations, remains incompletely understood. We have extended the Lifshitz theory for van der Waals interactions in pure water to alkali nitrate solutions at arbitrary concentrations by developing a dielectric response model for alkali nitrate solutions that is based on electronic structure calculations of the molecular constituents. Due to their importance in catalysis, ceramics, and coating technologies, the Hamaker constants for rutile, boehmite, and alumina nanoparticles suspended in alkali nitrate solutions are calculated as a function of salt concentration. Contrary to prevailing assumptions, increasing the concentration of sodium (Na), potassium (K), and rubidium (Rb) nitrate solutions causes appreciable increases of the Hamaker constants relative to pure water instead of decreases, whereas cesium nitrate (CsNO3) has almost no effect on the Hamaker constant. We discussed the influence of the solution molar volume, the polarizability of the dissolved ions, and optical properties of the interacting particles in the context of previously published work. Our study indicates a non-vanishing role of van der Waals interactions on colloidal stability at intermediate and high electrolyte concentrations, leading to physical insights on emergent phenomena associated with nanoparticles.", "url": "https://arxiv.org/abs/2606.04331", "type": "理论+数值", "summary": "范德华相互作用已被广泛研究用于胶体力和由此产生的新兴现象，例如胶体稳定性、聚集和悬浮液流变学，但电解质对这种相互作用的影响，特别是在中等和高电解质浓度下，仍然不完全清楚。我们通过开发基于分子成分电子结构计算的碱金属硝酸盐溶液介电响应模型，将纯水中范德华相互作用的利夫希茨理论扩展到任意浓度的碱金属硝酸盐溶液。由于金红石、勃姆石和氧化铝纳米颗粒在催化、陶瓷和涂层技术中的重要性，悬浮在碱金属硝酸盐溶液中的金红石、勃姆石和氧化铝纳米颗粒的 Hamaker 常数计算为盐浓度的函数。与普遍的假设相反，增加硝酸钠 (Na)、钾 (K) 和铷 (Rb) 溶液的浓度会导致 Hamaker 常数相对于纯水明显增加而不是降低，而硝酸铯 (CsNO3) 对 Hamaker 常数几乎没有影响。\n\n我们在之前发表的工作中讨论了溶液摩尔体积、溶解离子的极化率以及相互作用粒子的光学性质的影响。我们的研究表明，在中等和高电解质浓度下，范德华相互作用对胶体稳定性的作用并不消失，从而对与纳米颗粒相关的新兴现象产生了物理见解。", "authors": [{"name": "Micah P. Prange"}, {"name": "Jaehun Chun"}, {"name": "Gregory K. Schenter"}, {"name": "Elias Nakouzi"}, {"name": "Yihui Wei"}, {"name": "Aurora E. Clark"}, {"name": "Kevin M. Rosso"}, {"name": "Carolyn I. Pearce"}], "featured_authors": [{"name": "Micah P. Prange"}, {"name": "Jaehun Chun"}, {"name": "Gregory K. Schenter"}, {"name": "Aurora E. Clark"}, {"name": "Kevin M. Rosso"}, {"name": "Carolyn I. Pearce"}], "author_count": 8}, {"id": "2606.04533", "category": "cond-mat", "title": "Vibrational model of entropy in dense two-dimensional fluids", "abstract": "A vibrational paradigm of atomic dynamic in dense fluids is known to provide useful insight on the transport and thermodynamic properties of fluids in three dimensions. In this paper, a vibrational model is generalized to describe the excess entropy of two-dimensional (2D) fluids. A simple practical implementation of this model is demonstrated to deliver accurate results for various systems, such as one-component plasmas with Coulomb and logarithmic interactions, a 2D fluid of dipole particles, and a 2D Yukawa fluid. The applicability limits, relevance to three-dimensional fluids, relations to other 2D phenomena, and potential practical applications are briefly discussed.", "url": "https://arxiv.org/abs/2606.04533", "type": "理论", "summary": "众所周知，稠密流体中原子动力学的振动范式可以为三维流体的输运和热力学性质提供有用的见解。在本文中，振动模型被推广来描述二维（2D）流体的过剩熵。该模型的简单实际实现被证明可以为各种系统提供准确的结果，例如具有库仑和对数相互作用的单组分等离子体、偶极粒子的二维流体和二维汤川流体。简要讨论了适用性限制、与三维流体的相关性、与其他二维现象的关系以及潜在的实际应用。", "authors": [{"name": "Sergey Khrapak"}], "featured_authors": [{"name": "Sergey Khrapak"}], "author_count": 1}, {"id": "2606.04605", "category": "cond-mat", "title": "Contact-network organization and motion statistics in shear-thickening suspensions", "abstract": "We use lubricated-flow discrete-element-method (LF-DEM) simulations to examine how contact-network organization shapes particle motion in dense shear-thickening suspensions. The primary system studied is a two-dimensional bidisperse monolayer where rigid clusters are identified by the $(3,3)$ pebble game; three-dimensional simulations are shown to have qualitatively similar rotational velocity statistics. Across the stress--solid-fraction state diagram, frictional contact number, $k\\ge 3$ percolation, and rigid-cluster fluctuations all strengthen in the same region where translational velocity correlations grow, consistent with rigid clusters translating coherently while the surrounding non-rigid particles accommodate a disproportionate share of the local velocity gradient. Rotational motion provides a complementary view: non-affine angular-velocity distributions broaden, near-contact rotations become increasingly anti-correlated, and rigid and non-rigid particles carry distinct statistics. Connectivity, rigidity, and velocity correlations are related but distinct signatures of the constrained collective motion that accompanies shear-thickening and the approach to shear jamming.", "url": "https://arxiv.org/abs/2606.04605", "type": "数值", "summary": "我们使用润滑流离散元法 (LF-DEM) 模拟来研究接触网络组织如何塑造致密剪切增稠悬浮液中的颗粒运动。研究的主要系统是二维双分散单层，其中刚性簇通过 $(3,3)$ 卵石游戏来识别；三维模拟显示出具有定性相似的旋转速度统计数据。在应力-固体分数状态图中，摩擦接触数、$k\\ge 3$渗流和刚性团簇波动都在平移速度相关性增长的同一区域中增强，这与刚性团簇连贯地平移一致，而周围的非刚性颗粒容纳了不成比例的局部速度梯度。旋转运动提供了一个互补的观点：非仿射角速度分布变宽，近接触旋转变得越来越反相关，刚性和非刚性粒子具有不同的统计数据。连通性、刚性和速度相关性是伴随剪切增厚和剪切干扰方法的受约束集体运动的相关但不同的特征。", "authors": [{"name": "Michel Orsi"}, {"name": "Rahul Pandare"}, {"name": "Brolin Adu-Poku"}, {"name": "Bulbul Chakraborty"}, {"name": "Jeffrey F. Morris"}], "featured_authors": [{"name": "Michel Orsi"}, {"name": "Rahul Pandare"}, {"name": "Brolin Adu-Poku"}, {"name": "Bulbul Chakraborty"}, {"name": "Jeffrey F. Morris"}], "author_count": 5}, {"id": "2606.04608", "category": "cond-mat", "title": "Correlated States in Quantum Dot Clusters Coupled to a Common Superconductor", "abstract": "We study an effective model of regular quantum dot clusters coupled to a common superconductor. By applying a canonical transformation, we map the system onto a particle-number-conserving representation, making it directly accessible to standard fermionic neural-network quantum-state variational Monte Carlo methods. We show that the superconducting gap closes at a particular high-symmetry point, which, in finite non-interacting systems, corresponds to crossings between singlet ground states of different character. Combining exact methods, density matrix renormalization group, and neural quantum-state variational Monte Carlo calculations, we identify three distinct interacting regimes: a trivial superconducting singlet phase, a strongly correlated regime connected to an effective Heisenberg model, and a critical intermediate regime with qualitatively different behavior in one and two dimensions. In one-dimensional systems, the intermediate regime exhibits a sequence of singlet-doublet transitions and becomes gapless in the thermodynamic limit even for finite Coulomb interaction. In two-dimensional clusters, we find robust triplet ground states. Furthermore, our results demonstrate that relatively standard fermionic neural quantum states provide an efficient approach for correlated superconducting nanostructures.", "url": "https://arxiv.org/abs/2606.04608", "type": "理论+数值", "summary": "我们研究了与普通超导体耦合的规则量子点簇的有效模型。通过应用规范变换，我们将系统映射到粒子数守恒表示上，使其可以直接用于标准费米子神经网络量子态变分蒙特卡罗方法。我们证明超导能隙在特定的高对称点处闭合，在有限的非相互作用系统中，该点对应于不同特征的单重态基态之间的交叉。结合精确方法、密度矩阵重正化群和神经量子态变分蒙特卡罗计算，我们确定了三种不同的相互作用状态：平凡的超导单重态相、与有效海森堡模型连接的强相关状态以及在一维和二维中具有性质不同行为的关键中间状态。在一维系统中，中间状态表现出一系列单线态-双线态转变，并且即使对于有限的库仑相互作用，在热力学极限下也变得无间隙。在二维簇中，我们发现了稳健的三重基态。\n\n此外，我们的结果表明，相对标准的费米子神经量子态为相关超导纳米结构提供了一种有效的方法。", "authors": [{"name": "Martin Žonda"}, {"name": "Jakub Rękas"}, {"name": "Tobiáš Poláček"}, {"name": "Jana Kodrlová"}, {"name": "Vladislav Pokorný"}, {"name": "Martin Friák"}], "featured_authors": [{"name": "Martin Žonda"}, {"name": "Jakub Rękas"}, {"name": "Tobiáš Poláček"}, {"name": "Jana Kodrlová"}, {"name": "Vladislav Pokorný"}, {"name": "Martin Friák"}], "author_count": 6}, {"id": "2606.04614", "category": "cond-mat", "title": "Curvature-Controlled Infrared Regularization of Crystalline Membranes", "abstract": "We show that negative Gaussian curvature regularizes the infrared sector of crystalline membranes. In a covariant formulation of embedded elasticity, the Green strain contains a symmetry-required linear coupling between the normal phonon and extrinsic curvature. Integrating out the in-plane phonons converts this coupling into a finite quadratic contribution to the inverse flexural response. Anomalous roughening is thereby replaced by curvature-controlled saturation, and the mechanism survives on minimal hyperbolic patches. Hyperbolic geometry preempts anomalous elasticity before the flat infrared regime is reached, implying the absence of a crumpling phase. The same Gaussian-order coupling admits sound propagation in the infrared.", "url": "https://arxiv.org/abs/2606.04614", "type": "理论", "summary": "我们证明负高斯曲率使晶体膜的红外区域规则化。在嵌入弹性的协变公式中，格林应变包含法向声子和外在曲率之间所需的对称性线性耦合。对面内声子进行积分可将这种耦合转换为对逆弯曲响应的有限二次贡献。因此，异常粗糙化被曲率控制的饱和度所取代，并且该机制在最小双曲斑块上仍然存在。双曲几何形状在达到平坦红外状态之前先发制人了异常弹性，这意味着不存在褶皱阶段。同样的高斯阶耦合允许声音在红外线中传播。", "authors": [{"name": "Pablo A. Morales"}, {"name": "Pavel Castro-Villarreal"}], "featured_authors": [{"name": "Pablo A. Morales"}, {"name": "Pavel Castro-Villarreal"}], "author_count": 2}, {"id": "2606.04723", "category": "cond-mat", "title": "Finite-Basis Duality Estimate for the Surface-Code Threshold under Correlated Bit-Flip Errors", "abstract": "We apply finite-basis duality to a statistical-mechanical model introduced by Chubb and Flammia for the surface code under spatially correlated bit-flip noise. Their mapping gives a random-bond Ising model with both two-body edge interactions and four-body face interactions. The single-equation estimate based on the duality analysis is slightly deviated from their Monte Carlo estimate \\(p_c=0.1004(6)\\). Following the finite-basis and graph-polynomial strategy, we instead use periodic and twisted-periodic sectors on toroidal bases. We have obtained an improved estimate of the critical point, $p_c = 0.10348$.", "url": "https://arxiv.org/abs/2606.04723", "type": "理论+数值", "summary": "我们将有限基对偶性应用于 Chubb 和 Flammia 引入的统计机械模型，用于空间相关位翻转噪声下的表面代码。他们的映射给出了具有二体边缘相互作用和四体面相互作用的随机键伊辛模型。基于对偶性分析的单方程估计与其蒙特卡罗估计略有偏差\\(p_c=0.1004(6)\\)。遵循有限基和图多项式策略，我们在环形基上使用周期性和扭曲周期扇区。我们获得了对临界点的改进估计，$p_c = 0.10348$。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2606.04748", "category": "cond-mat", "title": "Percolation Criticality of Amorphous-Amorphous Transitions in Compressed Glasses", "abstract": "The low-to-high-density transition in compressed silica glass is investigated using percolation theory. Large-scale molecular dynamics simulations of SiO$_2$ glasses, with system sizes of up to 10$^6$ atoms and pressures ranging from 0 to 35 GPa, were carried out to investigate the emergence of structural motifs and their growth to system-spanning length scales under compression. On this basis, we introduced long-range descriptors that complement conventional local and medium-range structural measures. The results reveal critical percolation transitions of SiO$_Z$-SiO$_Z$ clusters with increasing coordination number $Z$. The critical exponents slightly deviate from the standard (random) correlation, a behavior that seems to be more pronounced for higher coordinated polyhedra than for tetrahedra, suggesting a possible rigidity percolation mechanism. SiSi$_z$-SiSi$_z$ clusters were also analyzed using the non-bonded approach. Bonded and non-bonded approaches complement each other in a particularly illuminating way for describing pressure-induced structural transformations and common mechanisms shared by bonded glasses, such as SiO$_2$, and non-bonded glasses, such as amorphous ice.", "url": "https://arxiv.org/abs/2606.04748", "type": "理论+数值", "summary": "使用渗流理论研究了压缩石英玻璃中低密度到高密度的转变。对 SiO$_2$ 玻璃进行了大规模分子动力学模拟，系统尺寸高达 10$^6$ 原子，压力范围为 0 至 35 GPa，以研究结构图案的出现及其在压缩下向系统跨越长度尺度的增长。在此基础上，我们引入了远程描述符，以补充传统的局部和中期结构性措施。结果揭示了随着配位数 $Z$ 的增加，SiO$_Z$-SiO$_Z$ 团簇发生临界渗流转变。临界指数稍微偏离标准（随机）相关性，这种行为对于更高协调的多面体来说似乎比四面体更明显，这表明可能存在刚性渗透机制。 SiSi$_z$-SiSi$_z$ 簇也使用非键合方法进行了分析。粘合和非粘合方法以一种特别具有启发性的方式相互补充，用于描述压力引起的结构转变以及粘合玻璃（例如 SiO$_2$）和非粘合玻璃（例如无定形冰）共享的常见机制。", "authors": [{"name": "Julien Perradin"}, {"name": "Simona Ispas"}, {"name": "Ricardo V. Paredes"}, {"name": "Anwar Hasmy"}, {"name": "Bernard Hehlen"}], "featured_authors": [{"name": "Julien Perradin"}, {"name": "Simona Ispas"}, {"name": "Ricardo V. Paredes"}, {"name": "Anwar Hasmy"}, {"name": "Bernard Hehlen"}], "author_count": 5}, {"id": "2606.04791", "category": "cond-mat", "title": "Surface Charge Doping for Ion-Pairing Criticality in Confined Electrolytes", "abstract": "Dielectric confinement strengthens Coulomb correlations in quasi-two-dimensional electrolytes and can promote Bjerrum pairing in charge-neutral slits. Here we use a generalized Debye-Huckel-Bjerrum theory to show that weak surface charge changes this picture by stoichiometrically doping the slit with mobile counterions. These counterions maintain a finite screening floor, decouple microscopic pairing from macroscopic ionicity, and shift association-driven criticality to lower temperatures. The critical-temperature suppression collapses onto a single scaled perturbation variable, revealing how surface charge and dielectric confinement jointly control charged nanofluidic slits. Brownian-dynamics tests further show that the same counterions are not always fully bulk-like diffusive: at low intrinsic salt density, explicit wall charge slows in-plane diffusion, whereas at higher intrinsic density the wall-induced diffusion penalty decreases and the mobile-counterion description becomes dynamically accurate. These results identify surface charge as a thermodynamic doping field that tunes both correlated ionic stability and the diffusion mechanism in nanofluidic confinement.", "url": "https://arxiv.org/abs/2606.04791", "type": "理论", "summary": "电介质限制增强了准二维电解质中的库仑相关性，并且可以促进电荷中性狭缝中的贝耶鲁姆配对。在这里，我们使用广义的 Debye-Huckel-Bjerrum 理论来表明，弱表面电荷通过在狭缝中化学计量地掺杂移动抗衡离子来改变这一情况。这些反离子维持有限的屏蔽层，将微观配对与宏观离子性解耦，并将关联驱动的关键性转移到较低的温度。临界温度抑制崩溃为单个尺度的扰动变量，揭示了表面电荷和介电限制如何共同控制带电纳米流体狭缝。布朗动力学测试进一步表明，相同的抗衡离子并不总是完全像块体一样扩散：在低固有盐密度下，显式壁电荷减慢了面内扩散，而在较高的固有密度下，壁诱导的扩散损失减少，并且移动抗衡离子描述变得动态准确。这些结果将表面电荷确定为热力学掺杂场，可调节相关离子稳定性和纳米流体限制中的扩散机制。", "authors": [{"name": "Na Shen"}, {"name": "Yabei Wu"}, {"name": "Wenqing Zhang"}], "featured_authors": [{"name": "Na Shen"}, {"name": "Yabei Wu"}, {"name": "Wenqing Zhang"}], "author_count": 3}, {"id": "2606.04862", "category": "cond-mat", "title": "Variational approach to determine the properties of dislocations at finite deformation", "abstract": "A generalised version of the continuum theory of curved dislocations describing the spatial and temporal evolution of the fields: statistically stored dislocation density, geometrically necessary dislocation density, and curvature has recently been proposed. The dynamics of the system are derived from a scalar functional of the relevant fields that cannot increase during the evolution of the system. However, the framework was established only for small deformations. The aim of the present paper is to discuss the fundamentals of the elasticity theory of finite deformation in cases where individual dislocations are present in the system. The equilibrium equations are derived within a variational formalism. It is shown that introducing dislocations into the finite deformation framework is a nontrivial task. Moreover, if the deformation is large, the force acting on a dislocation segment is not the well-known Peach-Koehler force. In a forthcoming paper, the results obtained will be applied to the generalisation of the dislocation continuum theory of curved dislocations.", "url": "https://arxiv.org/abs/2606.04862", "type": "理论+数值", "summary": "最近提出了描述场的空间和时间演化的弯曲位错连续统理论的广义版本：统计存储的位错密度、几何必要位错密度和曲率。系统的动力学源自相关域的标量函数，该标量函数在系统的演化过程中不会增加。然而，该框架仅针对小变形而建立。本文的目的是讨论系统中存在单个位错的情况下有限变形弹性理论的基础知识。平衡方程是在变分形式中导出的。结果表明，将位错引入有限变形框架是一项艰巨的任务。而且，如果变形很大，作用在位错段上的力就不是众所周知的Peach-Koehler力。在即将发表的论文中，获得的结果将应用于弯曲位错的位错连续体理论的推广。", "authors": [{"name": "István Groma"}], "featured_authors": [{"name": "István Groma"}], "author_count": 1}, {"id": "2606.04926", "category": "cond-mat", "title": "Adiabatic Ramp Dynamics Across the ETH--MBL Transition in Disordered XXZ Spin Chain", "abstract": "Many-body localization(MBL) provides a mechanism by which isolated interacting quantum systems with disorder can avoid thermalization unlike ergodic systems satisfying the eigenstate thermalization hypothesis(ETH). Many-body localized systems retain signatures of their initial conditions at long times, whereas systems obeying ETH lose such information as they approach thermal equilibrium. Studying Non-equilibrium dynamics across ETH-MBL crossover is an important problem in condensed matter physics. Adiabatic control of parameters in interacting disordered systems provides a powerful framework to investigate MBL phases and their dynamical robustness. Using exact diagonalization and time-dependent numerical methods we study the effects of adiabatically ramped interactions in a disordered spin-1/2 XXZ chain, a paradigmatic model for exploring the many-body localization transition. By monitoring diagonal entropy density and entanglement entropy density growth across various ramp speeds, and system sizes. Our study incorporates Finite-size effects of spectral observables to probe the transition between ergodic and localized phases. The numerical results show that localized dynamical behavior remains largely intact under sufficiently slow ramp evolution, while increasing the driving rate promotes stronger excitation generation and larger entropy growth. This trend highlights the strong dependence of nonequilibrium adiabatic dynamics in disordered interacting quantum many-body systems.", "url": "https://arxiv.org/abs/2606.04926", "type": "理论+数值", "summary": "多体局域化（MBL）提供了一种机制，通过该机制，无序的孤立相互作用量子系统可以避免热化，这与满足本征态热化假说（ETH）的遍历系统不同。多体局部系统会长时间保留其初始条件的特征，而遵循 ETH 的系统在接近热平衡时会丢失此类信息。研究 ETH-MBL 交叉的非平衡动力学是凝聚态物理中的一个重要问题。相互作用的无序系统中参数的绝热控制为研究 MBL 相及其动态鲁棒性提供了一个强大的框架。使用精确对角化和时间相关数值方法，我们研究了无序自旋 1/2 XXZ 链中绝热斜坡相互作用的影响，这是探索多体定位转变的范例模型。通过监测不同斜坡速度和系统尺寸的对角熵密度和纠缠熵密度增长。我们的研究结合了光谱可观测量的有限尺寸效应来探测遍历阶段和局域阶段之间的转变。\n\n数值结果表明，在足够慢的斜坡演化下，局部动力学行为基本保持不变，而增加驱动速率会促进更强的激发生成和更大的熵增长。这一趋势凸显了无序相互作用的量子多体系统中非平衡绝热动力学的强烈依赖性。", "authors": [{"name": "Nidhi Kumari"}, {"name": "Vinod Ashokan"}], "featured_authors": [{"name": "Nidhi Kumari"}, {"name": "Vinod Ashokan"}], "author_count": 2}, {"id": "2606.04936", "category": "cond-mat", "title": "Stabilizing the parquet problem", "abstract": "We systematically analyze the stability of the iterative solution of the parquet equations by studying the spectrum of the Jacobian associated with the commonly used damped fixed-point iteration procedure. In this context, we provide an explicit criterion that determines when the physical fixed point of the parquet iteration becomes unstable. Importantly, we demonstrate that misleading convergence issues, observed in parquet calculation at intermediate-to-high interaction values, are not restricted to parameter regions where the two-particle irreducible vertex diverges, but can also arise in absence of vertex divergences. Hence, the misleading convergence issues of parquet-based algorithms are not directly caused by the crossings of two solutions of the (multivalued) Luttinger-Ward functional, that are associated with vertex divergences. Building on these insights, we introduce a controlled stabilization strategy that allows the convergence to the physical solution in the instability regimes. We apply this procedure to the zero-point model and the Hubbard model in the atomic limit, where we successfully stabilize the physical solution deep in the non-perturbative regime, even across multiple divergence lines.", "url": "https://arxiv.org/abs/2606.04936", "type": "理论+数值", "summary": "我们通过研究与常用阻尼定点迭代过程相关的雅可比谱，系统地分析了 parquet 方程迭代解的稳定性。在这种情况下，我们提供了一个明确的标准来确定镶木地板迭代的物理固定点何时变得不稳定。重要的是，我们证明了在中高相互作用值的实木复合地板计算中观察到的误导性收敛问题不仅限于两粒子不可约顶点发散的参数区域，而且也可能在没有顶点发散的情况下出现。因此，基于镶木地板的算法的误导性收敛问题并不是由与顶点散度相关的（多值）Luttinger-Ward 泛函的两个解的交叉直接引起的。基于这些见解，我们引入了一种受控稳定策略，该策略允许收敛到不稳定状态下的物理解。\n\n我们将此过程应用于原子极限下的零点模型和哈伯德模型，我们成功地将物理解稳定在非微扰区域深处，甚至跨越多个发散线。", "authors": [{"name": "Herbert Eßl"}, {"name": "Stefan Rohshap"}, {"name": "Marcel Gievers"}, {"name": "Markus Wallerberger"}, {"name": "Alessandro Toschi"}, {"name": "Anna Kauch"}], "featured_authors": [{"name": "Herbert Eßl"}, {"name": "Stefan Rohshap"}, {"name": "Marcel Gievers"}, {"name": "Markus Wallerberger"}, {"name": "Alessandro Toschi"}, {"name": "Anna Kauch"}], "author_count": 6}, {"id": "2606.04948", "category": "cond-mat", "title": "Many body localization in Disordered One-Dimensional Fermi-Hubbard Model", "abstract": "We investigate the non-equilibrium dynamics of the disordered one-dimensional Fermi-Hubbard model with a focus on many-body localization. The system is initialized in a charge-density-wave-state, and its time evolution is analyzed through sublattice imbalance (spin and charge), and bipartite entanglement entropy. A clear crossover from ergodic to non-ergodic behavior is observed with increasing disorder strength. In the weak disorder regime, rapid decay of imbalance and the fast growth of entanglement indicate efficient thermalization. In contrast, a strong disorder leads to persistent imbalance and slow dynamics, signaling the breakdown of ergodicity. The charge and spin sectors exhibit distinct relaxation behavior, providing evidence for partial decoupling between these degrees of freedom. Furthermore, in the interacting regime, the entanglement entropy shows slow logarithmic growth, reflecting the dephasing-driven dynamics characteristic of the many-body localized phase. These results highlight the interplay between disorder and interactions in determining the dynamical properties of the system and establish robust signatures of many-body localization in the Fermi-Hubbard model.", "url": "https://arxiv.org/abs/2606.04948", "type": "理论", "summary": "我们研究无序一维费米-哈伯德模型的非平衡动力学，重点关注多体定位。该系统以电荷密度波态初始化，并通过亚晶格不平衡（自旋和电荷）和二分纠缠熵分析其时间演化。随着无序强度的增加，观察到从遍历行为到非遍历行为的明显交叉。在弱无序状态下，不平衡的快速衰减和纠缠的快速增长表明有效的热化。相反，严重的紊乱会导致持续的不平衡和缓慢的动态，标志着遍历性的崩溃。电荷和自旋扇区表现出明显的弛豫行为，为这些自由度之间的部分解耦提供了证据。此外，在相互作用的情况下，纠缠熵表现出缓慢的对数增长，反映了多体局域相的相移驱动的动力学特征。这些结果强调了无序和相互作用之间的相互作用在确定系统的动力学特性中的作用，并在费米-哈伯德模型中建立了多体定位的稳健特征。", "authors": [{"name": "Harmanjeet Kaur"}, {"name": "Vinod Ashokan"}], "featured_authors": [{"name": "Harmanjeet Kaur"}, {"name": "Vinod Ashokan"}], "author_count": 2}, {"id": "2606.04953", "category": "cond-mat", "title": "Electron-Phonon Coupling and Charge Density Wave Instabilities in W2N and Halogen-Functionalized W2N Monolayers", "abstract": "The interplay between charge-density-wave (CDW) order and superconductivity is a central problem in condensed-matter physics because both phenomena often originate from the same electron-phonon coupling (EPC) mechanism. Here, we investigate the structural, electronic, vibrational, and superconducting properties of monolayer W2N and halogen-functionalized W2N (W2NF2 and W2NCl2) using first-principles calculations. Pristine W2N exhibits pronounced phonon instabilities near the M and K points driven by exceptionally strong EPC associated with softened low-frequency phonons. The coincidence between phonon softening and enhanced phonon linewidths identifies the instability as EPC-driven and indicative of a CDW tendency. Inclusion of van der Waals interactions stabilizes the lattice and yields strong-coupling superconductivity with {\\lambda} = 1.00 and Tc = 13.2 K, while fluorination further weakens the soft-phonon anomaly, resulting in a moderate-coupling superconductor with {\\lambda} = 0.67 and Tc = 5.3 K. In contrast, W2NCl2 exhibits a re-emergence of CDW-related phonon softening that can be continuously suppressed by compressive strain or electron doping. Under -3% compressive strain, the EPC constant decreases from {\\lambda} = 1.35 to {\\lambda} = 0.71, giving rise to superconductivity with Tc = 5.8 K. Across the entire W2N family, the low-energy physics is governed by softened ZA phonons near the M point, establishing a unified framework in which CDW order and superconductivity emerge as competing manifestations of the same soft-phonon-driven EPC mechanism.", "url": "https://arxiv.org/abs/2606.04953", "type": "数值", "summary": "电荷密度波（CDW）阶数和超导性之间的相互作用是凝聚态物理学的一个中心问题，因为这两种现象通常源于相同的电子声子耦合（EPC）机制。在这里，我们使用第一性原理计算研究了单层 W2N 和卤素功能化 W2N（W2NF2 和 W2NCl2）的结构、电子、振动和超导特性。原始 W2N 在 M 点和 K 点附近表现出明显的声子不稳定性，这是由与软化低频声子相关的异常强的 EPC 驱动的。声子软化和增强的声子线宽之间的一致性将不稳定性确定为 EPC 驱动的并且表明 CDW 趋势。范德华相互作用的加入使晶格稳定，并产生了强耦合超导性，{\\lambda} = 1.00，Tc = 13.2 K，而氟化进一步削弱了软声子异常，产生了 {\\lambda} = 0.67，Tc = 5.3 K 的中耦合超导体。相比之下，W2NCl2 表现出与 CDW 相关的重新出现。声子软化可以通过压缩应变或电子掺杂来持续抑制。\n\n在-3%的压缩应变下，EPC常数从{\\lambda} = 1.35减小到{\\lambda} = 0.71，产生Tc = 5.8 K的超导性。在整个W2N家族中，低能物理由M点附近的软化ZA声子控制，建立了一个统一的框架，其中CDW阶数和超导性作为同一软声子驱动的EPC机制的竞争表现形式出现。", "authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}], "featured_authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}], "author_count": 2}, {"id": "2606.04954", "category": "cond-mat", "title": "Triangular Charge-Density Waves (T-CDW) Stabilize Janus Group-VI Chalcogenide Hydrides", "abstract": "Hydrogenation is an effective strategy for enhancing electron--phonon coupling (EPC) and superconductivity in two-dimensional materials. However, excessively strong EPC can also induce lattice instabilities, leading to charge-density-wave (CDW) formation and structural phase transitions. Here, using first-principles calculations, we investigate CDW order in the Janus transition-metal chalcogenide hydrides 1T-WSH and 1T-WSeH. We find that the high-symmetry phases exhibit pronounced phonon softening at the M point, driving a transition to a commensurate $2\\times2$ distorted structure characterized by an emergent triangular charge-density-wave (T-CDW) pattern. Analysis of the electronic structure, susceptibility, and phonon spectrum reveals that the instability is not driven by conventional Fermi-surface nesting but originates from strong momentum-dependent EPC. The T-CDW transition reconstructs the electronic structure and reduces the density of states at the Fermi level, leading to a substantial renormalization of the EPC strength. Consequently, the electron--phonon coupling constants decrease from $\\lambda=2.04$ to $1.50$ in 1T-WSH and from $\\lambda=3.94$ to $1.06$ in 1T-WSeH, while superconductivity remains robust in CDW phase with predicted transition temperatures of $T_c=12.28$ K and $7.75$ K, respectively. Together with previous results for MoSH and MoSeH, our findings establish a universal mechanism in the 1T-$MCH$ family ($M=\\mathrm{Mo},\\mathrm{W}$ and $C=\\mathrm{S},\\mathrm{Se}$), where the primary role of the T-CDW phase is not to eliminate superconductivity but to stabilize the lattice through EPC renormalization. The T-CDW phase therefore acts as an intrinsic self-stabilizing response that relieves excessively strong EPC while preserving phonon-mediated superconductivity.", "url": "https://arxiv.org/abs/2606.04954", "type": "理论+数值", "summary": "氢化是增强二维材料电子声子耦合（EPC）和超导性的有效策略。然而，过强的 EPC 也会引起晶格不稳定性，导致电荷密度波 (CDW) 形成和结构相变。在这里，我们使用第一性原理计算，研究了 Janus 过渡金属硫属化物氢化物 1T-WSH 和 1T-WSeH 中的 CDW 顺序。我们发现，高对称性相在 M 点表现出明显的声子软化，推动向相应的 $2\\times2$ 扭曲结构的转变，其特征是出现三角电荷密度波 (T-CDW) 模式。对电子结构、磁化率和声子谱的分析表明，这种不稳定性不是由传统的费米表面嵌套驱动的，而是源于强动量依赖性 EPC。 T-CDW 跃迁重建了电子结构并降低了费米能级的态密度，从而导致 EPC 强度的大幅重整化。\n\n因此，电子-声子耦合常数在 1T-WSH 中从 $\\lambda=2.04$ 降低到 $1.50$，在 1T-WSeH 中从 $\\lambda=3.94$ 降低到 $1.06$，而超导性在 CDW 相中保持稳健，预测转变温度分别为 $T_c=12.28$ K 和 $7.75$ K。结合之前对 MoSH 和 MoSeH 的结果，我们的研究结果在 1T-$MCH$ 族中建立了一个通用机制（$M=\\mathrm{Mo},\\mathrm{W}$ 和 $C=\\mathrm{S},\\mathrm{Se}$），其中 T-CDW 相的主要作用不是消除超导性，而是通过 EPC 重正化稳定晶格。因此，T-CDW 相充当了一种内在的自稳定响应，可以缓解过强的 EPC，同时保留声子介导的超导性。", "authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}, {"name": "Graeme J. Ackland"}], "featured_authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}, {"name": "Graeme J. Ackland"}], "author_count": 3}, {"id": "2606.04973", "category": "cond-mat", "title": "SLUSCHI-UP: A Web Infrastructure for SLUSCHI Melting-Temperature Calculations Using Universal Machine-Learning Interatomic Potentials", "abstract": "Melting temperature is a critical property for high-temperature materials design, but first-principles melting calculations based on finite-temperature molecular dynamics can require substantial computational resources. The SLUSCHI method reduces this cost by using small-cell solid--liquid coexistence simulations and statistical analysis of many short molecular-dynamics trajectories. Here I present SLUSCHI-UP, a deployed web service for atomistic melting-temperature estimation that couples the SLUSCHI workflow to selectable pretrained universal machine-learning interatomic potentials (uMLIPs) and asynchronous GPU execution. Users submit a crystal structure through a Materials Project identifier or POSCAR input, select a uMLIP backend, and launch a queued melting calculation without local installation of simulation software. The current production interface supports mace-mpa-0-medium, Allegro-OAM-L, and DPA-3.2-5M-OMat24, while beta deployments expose additional models. On the compact MeltBench-10 validation set, the three production backends produce raw coexistence mean absolute errors in the range of approximately 178--327 K. Across the broader set of materials tested so far in MeltBench, the current deployed-job snapshot contains 119 raw uMLIP entries, and PBE-corrected Allegro-OAM-L predictions reach a mean absolute error of approximately 166 K. These values should be interpreted as screening-level infrastructure validation rather than a definitive ranking of uMLIPs. The results demonstrate that SLUSCHI-UP provides a practical, provenance-aware deployment layer between fast scalar melting-temperature predictors and much more expensive first-principles coexistence calculations, while retaining the usual limitations of uMLIP transferability, finite-size sampling, and high-temperature trajectory stability.", "url": "https://arxiv.org/abs/2606.04973", "type": "理论+数值", "summary": "熔化温度是高温材料设计的关键特性，但基于有限温度分子动力学的第一原理熔化计算可能需要大量的计算资源。 SLUSCHI 方法通过使用小细胞固液共存模拟和许多短分子动力学轨迹的统计分析来降低成本。在这里，我介绍 SLUSCHI-UP，这是一种用于原子熔化温度估计的已部署 Web 服务，它将 SLUSCHI 工作流程与可选择的预训练通用机器学习原子间势 (uMLIP) 和异步 GPU 执行相结合。用户通过材料项目标识符或 POSCAR 输入提交晶体结构，选择 uMLIP 后端，并启动排队熔化计算，无需本地安装模拟软件。当前的生产接口支持 mace-mpa-0-medium、Allegro-OAM-L 和 DPA-3.2-5M-OMat24，而 beta 部署则公开了其他模型。在紧凑的 MeltBench-10 验证集上，三个生产后端产生约 178--327 K 范围内的原始共存平均绝对误差。\n\n到目前为止，在 MeltBench 中测试的更广泛的材料集中，当前部署的作业快照包含 119 个原始 uMLIP 条目，并且经过 PBE 校正的 Allegro-OAM-L 预测达到约 166 K 的平均绝对误差。这些值应解释为筛选级基础设施验证，而不是 uMLIP 的明确排名。结果表明，SLUSCHI-UP 在快速标量熔化温度预测器和昂贵得多的第一原理共存计算之间提供了一个实用的、来源感知的部署层，同时保留了 uMLIP 可转移性、有限尺寸采样和高温轨迹稳定性的常见限制。", "authors": [{"name": "Qi-Jun Hong"}], "featured_authors": [{"name": "Qi-Jun Hong"}], "author_count": 1}, {"id": "2606.04976", "category": "cond-mat", "title": "Effective and Floquet Hamiltonians for High Frequency Driving and Floquet-induced Heating in Quantum Spin Chains", "abstract": "We study the non-equilibrium dynamics of a disordered periodically driven quantum spin chain, with the competition between the interaction, disorder, and Floquet driving being of particular interest. We study dynamics of entanglement entropy, energy absorption to characterize dynamical regimes of the system whether it stays in the Floquet-MBL(many-body localization) region or thermalized region. Starting with a product state in the computational basis, followed by reduced density matrix which in turn gives rise to the entanglement entropy density. With the strength of the interaction, the transverse field, the parallel field, the disorder strength W and the driving frequency, we discover the distinct behaviors of fast delocalization and logarithmic entanglement growth and long-lasting memory of the initial state, indicative of localized or prethermal Floquet regimes. We observe that strong disorder arrests transport and enables slow entanglement dynamics, whereas strong driving frequency arrests energy absorption and creates a long-lived non-equilibrium state. Conversely, weak disorder or low driving frequency leads to delocalization. The outcomes show strong support for non-equilibrium phases in driven many-body systems.", "url": "https://arxiv.org/abs/2606.04976", "type": "理论", "summary": "我们研究无序周期性驱动的量子自旋链的非平衡动力学，其中相互作用、无序和 Floquet 驱动之间的竞争特别令人感兴趣。我们研究纠缠熵、能量吸收的动力学来表征系统的动力学状态，无论它是处于 Floquet-MBL（多体局域化）区域还是热化区域。从计算基础中的乘积状态开始，然后是减少的密度矩阵，这反过来又产生了纠缠熵密度。通过相互作用的强度、横向场、平行场、无序强度W和驱动频率，我们发现了快速离域和对数纠缠增长以及初始状态的持久记忆的独特行为，表明局域或预热Floquet状态。我们观察到，强无序会阻止传输并实现缓慢的纠缠动力学，而强驱动频率会阻止能量吸收并产生长期的非平衡状态。相反，弱无序或低驾驶频率会导致离域。\n\n结果表明，驱动多体系统中的非平衡相得到了强有力的支持。", "authors": [{"name": "Mayukh Bandyopadhyay"}, {"name": "Vinod Ashokan"}], "featured_authors": [{"name": "Mayukh Bandyopadhyay"}, {"name": "Vinod Ashokan"}], "author_count": 2}, {"id": "2606.05013", "category": "cond-mat", "title": "Coherent State Path Integral Monte Carlo", "abstract": "We propose a new quantum simulation method for a many body quantum liquid of identical particles at finite (non-zero) temperature. The new scheme expands the high temperature density matrix on the overcomplete set of single particles coherent states of John Rider Klauder instead of the usual plane waves as in conventional path integral methods. One is free to tune the elastic constant and/or the mass of the harmonic oscillator subtending the coherent states so as to maximize the computational efficiency of the algorithm. We prove that in the limit of an extremely stiff harmonic oscillator the results for the internal energy tends towards the correct expected values. Moreover we suggest that a stiff harmonic oscillator could allow the use of larger (imaginary) timesteps. This additional degree of freedom is the characteristic feature of our new algorithm and is not available in more conventional path integral methods.", "url": "https://arxiv.org/abs/2606.05013", "type": "数值", "summary": "我们提出了一种新的量子模拟方法，用于在有限（非零）温度下相同粒子的多体量子液体。新方案将高温密度矩阵扩展为 John Rider Klauder 的单粒子相干态超完备集，而不是传统路径积分方法中常见的平面波。人们可以自由地调整弹性常数和/或相干态谐振子的质量，以便最大化算法的计算效率。我们证明，在极其刚性的谐振子的极限下，内能的结果趋向于正确的期望值。此外，我们建议刚性谐振子可以允许使用更大的（虚数）时间步长。这种额外的自由度是我们新算法的特征，并且在更传统的路径积分方法中不可用。", "authors": [{"name": "Riccardo Fantoni"}], "featured_authors": [{"name": "Riccardo Fantoni"}], "author_count": 1}, {"id": "2606.05033", "category": "cond-mat", "title": "Crossover from Rabi oscillations to adiabatic population switching in the Faraday optical control of quantum dot spins", "abstract": "Stimulated Raman transitions in Faraday geometry allow for simultaneous single-shot qubit readout and qubit control. It involves driving an unbalanced $\\Lambda$ system via an auxiliary excited state. Due to the simultaneous driving of both transitions with unequal detuning, the resulting time-dependent Stark shift gives rise to additional resonance conditions beyond the conventional picture. We identify a distinct regime in which repeated passages through avoided crossings lead to step-like population inversion arising from Landau-Zener-Stückelberg interference. By changing the detuning beatnote, we demonstrate a controlled continuous crossover from Rabi-like oscillations to adiabatic population switching. These findings establish the oscillating Stark shift as a mechanism for engineering and controlling spin dynamics in Faraday geometry.", "url": "https://arxiv.org/abs/2606.05033", "type": "理论+数值", "summary": "法拉第几何中的受激拉曼跃迁允许同时进行单次量子位读出和量子位控制。它涉及通过辅助激发态驱动不平衡的 $\\Lambda$ 系统。由于两个跃迁的同时驱动具有不等的失谐，由此产生的时间依赖性斯塔克位移会产生超出传统图像的额外共振条件。我们确定了一种独特的机制，其中重复通过避免的交叉点会导致由于朗道-齐纳-施图尔伯格干扰而产生的阶梯状种群反转。通过改变失谐节拍，我们展示了从类拉比振荡到绝热群体切换的受控连续交叉。这些发现确立了振荡斯塔克位移作为法拉第几何中工程和控制自旋动力学的机制。", "authors": [{"name": "Jan M. Kaspari"}, {"name": "Zhe Xian Koong"}, {"name": "Dorian A. Gangloff"}, {"name": "Michał Gawełczyk"}, {"name": "Doris E. Reiter"}], "featured_authors": [{"name": "Jan M. Kaspari"}, {"name": "Zhe Xian Koong"}, {"name": "Dorian A. Gangloff"}, {"name": "Michał Gawełczyk"}, {"name": "Doris E. Reiter"}], "author_count": 5}, {"id": "2606.05057", "category": "cond-mat", "title": "Bulk and surface excitons in the van der Waals magnet CrSBr: Magneto-optical studies to 55 tesla", "abstract": "In thin layers of the 2D magnetic semiconductor CrSBr, very recent studies identified two distinct band-edge optical resonances, believed to arise from distinguishable bulk and surface excitons. This behavior reportedly originates from the highly anisotropic nature of CrSBr -- particularly in its antiferromagnetic state -- where excitons are effectively confined within individual monolayers, such that excitons in the two surface layers \"see\" a different local dielectric environment and have a lower resonance energy. To explore this scenario, here we investigate optical absorption properties of few-layer CrSBr in magnetic fields. In addition to the fundamental exciton resonance at ~1.36eV, we observe an absorption resonance ~20 meV lower in energy. Compared to the fundamental transition, this resonance redshifts only half as much in small magnetic fields that induce ferromagnetic order, while in high fields to 55T it exhibits a smaller diamagnetic shift. Both behaviors point to distinguishable populations of bulk and surface excitons in CrSBr.", "url": "https://arxiv.org/abs/2606.05057", "type": "理论", "summary": "在二维磁性半导体 CrSBr 的薄层中，最近的研究发现了两种不同的带边光学共振，据信是由可区分的体激子和表面激子产生的。据报道，这种行为源于 CrSBr 的高度各向异性，特别是在其反铁磁状态下，其中激子被有效地限制在各个单层内，使得两个表面层中的激子“看到”不同的局部介电环境并具有较低的共振能量。为了探索这种情况，我们在这里研究了几层 CrSBr 在磁场中的光吸收特性。除了~1.36eV​​ 的基本激子共振之外，我们还观察到能量较低~20 meV 的吸收共振。与基本转变相比，这种共振红移在引起铁磁序的小磁场中只有一半，而在高达 55T 的高磁场中，它表现出较小的抗磁位移。这两种行为都表明 CrSBr 中的体激子和表面激子具有可区分的群体。", "authors": [{"name": "Junho Choi"}, {"name": "Yihyun Moon"}, {"name": "Doohyeon Lee"}, {"name": "Iva Plutnarova"}, {"name": "Zdenek Sofer"}, {"name": "Vinod M. Menon"}, {"name": "Scott A. Crooker"}], "featured_authors": [{"name": "Junho Choi"}, {"name": "Yihyun Moon"}, {"name": "Doohyeon Lee"}, {"name": "Zdenek Sofer"}, {"name": "Vinod M. Menon"}, {"name": "Scott A. Crooker"}], "author_count": 7}, {"id": "2606.05065", "category": "cond-mat", "title": "Mechanoluminescence in crystalline inorganic materials: local disorder and the elastic distortion hypothesis", "abstract": "In this exploratory work, we aim to understand the mechanoluminescence (ML) phenomenon manifested by various inorganic compounds by focusing on the influence of mechanical loading on local distortion and loss of symmetry at active sites. To this end, we have analyzed the elastic deformation of several relevant crystalline phases and shown, through a kinematic analysis based on elastic constants, that the loading-induced distortion is smaller than, but remains comparable in magnitude to, the intrinsic structural distortion as quantified by the Baur descriptor. Although the structural distortion has previously been proposed as a structural fingerprint of the ML potential of a compound, it is by nature a static parameter, and must be supplemented by a dynamic distortion contribution that develops under mechanical load. By approximating the crystal deformation by that of simple polygonal motifs, we have been able to propose a rationale for otherwise puzzling observations: in particular, the marked differences in sensitivity to hydrostatic pressure and to shear, the appearance of an intense ML peak upon unloading in certain compounds, and the contrast in behavior depending on whether the preliminary UV irradiation is performed under load or at rest.", "url": "https://arxiv.org/abs/2606.05065", "type": "理论", "summary": "在这项探索性工作中，我们旨在通过关注机械载荷对活性位点局部变形和对称性丧失的影响，了解各种无机化合物表现出的机械发光（ML）现象。为此，我们分析了几种相关晶相的弹性变形，并通过基于弹性常数的运动学分析表明，载荷引起的变形小于由鲍尔描述符量化的内在结构变形，但在大小上仍相当。尽管结构畸变之前已被提出作为化合物 ML 势的结构指纹，但它本质上是一个静态参数，必须通过在机械负载下产生的动态畸变贡献来补充。\n\n通过用简单的多边形图案来近似晶体变形，我们已经能够为其他令人费解的观察结果提出一个基本原理：特别是，对静水压力和剪切的敏感性的显着差异，在某些化合物中卸载时出现强烈的ML峰，以及取决于初步紫外线照射是在负载下还是在静止状态下进行的行为对比度。", "authors": [{"name": "T. Rouxel"}, {"name": "X. Rocquefelte"}, {"name": "S. Tanabe"}], "featured_authors": [{"name": "T. Rouxel"}, {"name": "X. Rocquefelte"}, {"name": "S. Tanabe"}], "author_count": 3}, {"id": "2606.05095", "category": "cond-mat", "title": "Soliton-antisoliton pairs in the supersymmetric gapped phase of an interacting Majorana chain", "abstract": "A strongly interacting chain of Majorana fermions realizes the supersymmetric tricritical Ising phase, with supersymmetry (SUSY) extending into a symmetry-broken ordered phase adjacent to the tricritical point. Although the signatures of SUSY at the tricritical point are well understood, their behavior in the gapped phase remains less clear. Here, we address two key questions: how SUSY manifests in the gapped phase and what is the nature of the excitations in this phase. We show that, in the thermodynamic limit, a conventional SUSY diagnostic that remains finite at the tricritical point diverges immediately on the Ising side, yet decays continuously to zero deeper in the gapped phase, signaling the persistence of SUSY. Focusing on the lowest excited states in the supersymmetric gapped regime, we find that the excitations consist of soliton-antisoliton pairs separating distinct ordered regions. Each soliton binds an emergent localized Majorana mode, and together the pair forms a nonlocal Dirac fermion. The occupation of this Dirac mode distinguishes eigenstates with even and odd fermion parity.", "url": "https://arxiv.org/abs/2606.05095", "type": "理论", "summary": "马约拉纳费米子的强相互作用链实现了超对称三临界伊辛相，其中超对称性（SUSY）延伸到与三临界点相邻的对称破缺有序相。尽管 SUSY 在三临界点的特征已被很好地理解，但它们在间隙阶段的行为仍然不太清楚。在这里，我们解决两个关键问题：SUSY 在间隙相中如何表现以及该相中激励的本质是什么。我们表明，在热力学极限下，在三临界点保持有限的传统 SUSY 诊断在伊辛一侧立即发散，但在间隙相中不断衰减到更深的零，这表明 SUSY 的持久性。着眼于超对称带隙区域中的最低激发态，我们发现激发态由分隔不同有序区域的孤子-反孤子对组成。每个孤子都绑定一个新兴的局域马约拉纳模式，并且这对孤子一起形成一个非局域狄拉克费米子。这种狄拉克模式的占据通过偶数和奇数费米子宇称来区分本征态。", "authors": [{"name": "Alberto Nocera"}, {"name": "Mobin Shakeri"}, {"name": "Armin Rahmani"}, {"name": "Ian Affleck"}], "featured_authors": [{"name": "Alberto Nocera"}, {"name": "Mobin Shakeri"}, {"name": "Armin Rahmani"}, {"name": "Ian Affleck"}], "author_count": 4}, {"id": "2606.05128", "category": "cond-mat", "title": "Quantum Hall effect in vacancy-engineered $β$-Ag$_2$Te", "abstract": "Accessing surface quantum transport in topological insulators is hampered by residual bulk conduction arising from lattice defects. Here, we demonstrate a novel synthesis pathway for realizing high mobility $\\beta$-Ag$_2$Te thin films where surface transport is dominant. An \\textit{in-situ} vacancy engineering step as part of the molecular beam epitaxy growth process acts to modify the stoichiometry and suppress donor-type defects, enabling continuous tuning of the sheet carrier density over more than an order of magnitude through the charge-neutrality point without an external gate electrode. In the lower-carrier-density films, a fully developed $\\nu=1$ quantum Hall state is observed, and Landau-level energies extracted across samples collapse onto the $E_N=v_\\mathrm{F}\\sqrt{2e\\hbar NB}$ relation, providing evidence for the massless Dirac dispersion of the top and bottom surface states. These results establish stoichiometry-driven vacancy engineering as a versatile lithography- and gate-free approach to accessing quantum Hall transport in epitaxial topological-insulator thin films.", "url": "https://arxiv.org/abs/2606.05128", "type": "理论", "summary": "拓扑绝缘体中的表面量子传输受到晶格缺陷引起的残余体传导的阻碍。在这里，我们展示了一种新的合成途径，用于实现表面传输占主导地位的高迁移率 $\\beta$-Ag$_2$Te 薄膜。原位空位工程步骤作为分子束外延生长过程的一部分，用于修改化学计量并抑制施主型缺陷，从而无需外部栅电极即可通过电荷中性点连续调节片状载流子密度超过一个数量级。在载流子密度较低的薄膜中，观察到完全发展的 $\\nu=1$ 量子霍尔态，并且跨样本提取的朗道能级能量塌陷到 $E_N=v_\\mathrm{F}\\sqrt{2e\\hbar NB}$ 关系上，为顶部和底部表面态的无质量狄拉克色散提供了证据。这些结果将化学计量驱动的空位工程确立为一种通用的光刻和无栅极方法，用于访问外延拓扑绝缘体薄膜中的量子霍尔传输。", "authors": [{"name": "Mizuki Ohno"}, {"name": "Veronica Show"}, {"name": "Reiley Dorrian"}, {"name": "Joseph Falson"}], "featured_authors": [{"name": "Mizuki Ohno"}, {"name": "Veronica Show"}, {"name": "Reiley Dorrian"}, {"name": "Joseph Falson"}], "author_count": 4}, {"id": "2606.05147", "category": "cond-mat", "title": "MicroCup: A Cryogenic Specimen Preparation Strategy for Atom Probe Tomography of Organic Molecular Liquids", "abstract": "Atom probe tomography (APT) of organic molecular liquids is limited by poorly reproducible specimen geometry, reduced milling rates, and beam sensitivity during cryo-FIB preparation. Here we introduce a MicroCup strategy that confines liquids in a FIB-prepared nanoscale cavity prior to phase separation, reduces deposited volume to increase preparation throughput, enables reproducible specimen geometry, and minimizes beam exposure in the region of interest. Using the liquid crystals 4'-octyl-4-cyanobiphenyl (8CB) and 4'-octyloxy-4-cyanobiphenyl (8OCB) as model systems, we establish stable and reproducible field evaporation conditions, enabling the detected intact ion molecular preservation above 70% in smectic-like phases with interpretable fragmentation behavior. Comparative analysis further shows that the oxygen atom in 8OCB promotes preferential cleavage pathways associated with bond polarization under high electric fields. By inducing partial crystallization within the MicroCup cavity, distinct regions could be resolved: 8CB shows broadly similar evaporation behavior across crystalline and amorphous regions, whereas 8OCB exhibits clearer regional contrast, with smectic-like regions dominated by intact molecular or large fragments and crystalline domains producing small alkyl fragments and ether-type species. These results provide spatially resolved evidence of a solid-liquid interface in a freeze-prepared organic liquid by APT and establish a reproducible workflow for probing local phase behavior in soft materials.", "url": "https://arxiv.org/abs/2606.05147", "type": "理论+数值", "summary": "有机分子液体的原子探针断层扫描 (APT) 受到样品几何形状重现性差、研磨速率降低以及冷冻 FIB 制备过程中光束敏感性的限制。在这里，我们介绍了一种 MicroCup 策略，该策略在相分离之前将液体限制在 FIB 制备的纳米级腔中，减少沉积体积以提高制备通量，实现可重复的样品几何形状，并最大限度地减少感兴趣区域的光束暴露。使用液晶 4'-辛基-4-氰基联苯 (8CB) 和 4'-辛氧基-4-氰基联苯 (8OCB) 作为模型系统，我们建立了稳定且可重复的场蒸发条件，使得在近晶相中检测到的完整离子分子保存率超过 70%，并具有可解释的碎片行为。比较分析进一步表明，8OCB 中的氧原子在高电场下促进与键极化相关的优先裂解路径。\n\n通过在 MicroCup 腔内诱导部分结晶，可以解析不同的区域：8CB 在结晶和非晶区域中表现出大致相似的蒸发行为，而 8OCB 表现出更清晰的区域对比，近晶状区域主要由完整分子或大碎片和产生小烷基碎片和醚型物质的结晶域主导。这些结果提供了通过 APT 冷冻制备的有机液体中固液界面的空间分辨证据，并建立了用于探测软材料中局部相行为的可重复工作流程。", "authors": [{"name": "Kuan Meng"}, {"name": "Florian Groll"}, {"name": "Sebastian Eich"}, {"name": "Guido Schmitz"}], "featured_authors": [{"name": "Kuan Meng"}, {"name": "Florian Groll"}, {"name": "Sebastian Eich"}, {"name": "Guido Schmitz"}], "author_count": 4}, {"id": "2606.05164", "category": "cond-mat", "title": "Floquet-Engineered Parity Anomaly Staircase in a Cold Atom Dirac Lattice", "abstract": "We propose a Floquet-engineered cold atom realization of a parity anomaly inspired anomalous Hall staircase in a two dimensional $\\pi$-flux lattice. The effective model hosts massive Dirac fermions generated by the combined action of a time reversal symmetry breaking Floquet mass and a static inversion breaking mass offset. An additional momentum dependent scalar displacement term shifts different Dirac sectors in opposite energy directions without modifying their Bloch eigenvectors. As a result, the Berry curvature contribution associated with individual massive Dirac sectors can be selectively occupied, allowing the anomalous Hall response to evolve stepwise as a function of chemical potential or scalar displacement term. Evaluating the full lattice Berry curvature integral, we find plateau-like responses near $0$, $e^2/2h$, and $e^2/h$, corresponding respectively to the activation of zero, one, and two effective massive Dirac sector contributions. We analyze the associated low energy Dirac theory, band topology, Berry curvature structure, and two parameter response maps, and discuss a possible realization using Raman-assisted tunneling, off-resonant Floquet driving, and auxiliary AC-Stark dressing in ultracold atomic optical lattices.", "url": "https://arxiv.org/abs/2606.05164", "type": "理论", "summary": "我们提出了一种由 Floquet 设计的冷原子实现，在二维 $\\pi$-磁通晶格中实现奇偶校验异常激发的异常霍尔楼梯。该有效模型包含大量狄拉克费米子，这些狄拉克费米子是由时间反演对称性破缺 Floquet 质量和静态反演破缺质量偏移的联合作用产生的。附加的动量相关标量位移项使不同的狄拉克扇区沿相反的能量方向移动，而不修改其布洛赫特征向量。因此，与单个大狄拉克扇区相关的贝里曲率贡献可以被选择性地占据，从而允许反常霍尔响应作为化学势或标量位移项的函数逐步演化。评估全晶格贝里曲率积分，我们发现 $0$、$e^2/2h$ 和 $e^2/h$ 附近有类似高原的响应，分别对应于零、一和两个有效的大规模狄拉克扇区贡献的激活。\n\n我们分析了相关的低能狄拉克理论、能带拓扑、贝里曲率结构和两个参数响应图，并讨论了在超冷原子光学晶格中使用拉曼辅助隧道效应、非共振 Floquet 驱动和辅助 AC-Stark 修整的可能实现。", "authors": [{"name": "Binayyak Roy"}, {"name": "Vito Scarola"}, {"name": "Sumanta Tewari"}], "featured_authors": [{"name": "Binayyak Roy"}, {"name": "Vito Scarola"}, {"name": "Sumanta Tewari"}], "author_count": 3}, {"id": "2606.04085", "category": "hep-th", "title": "Coarse graining from within: Wilson-Fisher universality on $S^3$", "abstract": "Wilsonian renormalization is usually formulated in momentum space, but on curved backgrounds momentum shells have no invariant meaning. We replace them by an intrinsic spectral cutoff, ordering modes by the covariant Laplacian and setting the cutoff resolution by the system size in renormalization group (RG) units. For a scalar field on $S^3$, this yields a covariant, momentum-free RG flow whose trace is an exact sum over spherical harmonics. The standard flat-space flow is recovered when the sphere is large compared with the coarse-graining scale. As a nontrivial test, the compact spectral flow realizes Wilson-Fisher universality without momentum shells: the interacting fixed point survives at finite resolution, has one relevant direction, and approaches its flat-space counterpart smoothly, with critical exponents only weakly affected by the compact spectrum.", "url": "https://arxiv.org/abs/2606.04085", "type": "理论", "summary": "威尔逊重整化通常在动量空间中表述，但在弯曲背景上动量壳没有不变的意义。我们用固有的光谱截止来代替它们，通过协变拉普拉斯对模式进行排序，并通过重正化组（RG）单位中的系统大小设置截止分辨率。对于 $S^3$ 上的标量场，这会产生协变、无动量 RG 流，其迹是球谐函数的精确和。当球体比粗粒尺度大时，就会恢复标准的平坦空间流。作为一项重要的测试，紧致谱流在没有动量壳的情况下实现了威尔逊-费舍尔普适性：相互作用的不动点以有限分辨率存在，具有一个相关方向，并且平滑地接近其平坦空间对应点，临界指数仅受紧致谱的微弱影响。", "authors": [{"name": "Alfio M. Bonanno"}, {"name": "Renata Ferrero"}, {"name": "Giovanni Oglialoro"}], "featured_authors": [{"name": "Alfio M. Bonanno"}, {"name": "Renata Ferrero"}, {"name": "Giovanni Oglialoro"}], "author_count": 3}, {"id": "2606.04088", "category": "hep-th", "title": "Closed string trajectories from a new \"tiling\"", "abstract": "Based on an efficient technology for the excavation of entire open string trajectories of physical states, we propose an algorithmic method of constructing the largely unknown closed string trajectories. Due to combinatorial complexity, the \"double copy\" of open strings is limited in efficiency as a means of building closed string trajectories. We bypass this technical difficulty by employing one open string as the fundamental seed and then dressing it by a suitable selection of generators of a symplectic algebra that acts on both the left and the right sector. By applying Howe duality, the dressed seeds amount to closed string trajectory candidates, finding the physical subset of which is possible by solving systems of equations involving Diophantine-like recursion relations, which we also illustrate with examples.", "url": "https://arxiv.org/abs/2606.04088", "type": "理论", "summary": "基于一种有效的物理状态开弦轨迹挖掘技术，我们提出了一种构造很大程度上未知的闭弦轨迹的算法方法。由于组合的复杂性，开弦的“双重复制”作为构建闭弦轨迹的手段在效率上受到限制。我们通过使用一个开弦作为基本种子，然后通过适当选择作用于左扇区和右扇区的辛代数生成元来修饰它，从而绕过了这一技术难题。通过应用豪对偶性，整理后的种子相当于闭合弦轨迹候选，通过求解涉及丢番图式递归关系的方程组可以找到其物理子集，我们也用例子来说明。", "authors": [{"name": "Thomas Basile"}, {"name": "Chrysoula Markou"}], "featured_authors": [{"name": "Thomas Basile"}, {"name": "Chrysoula Markou"}], "author_count": 2}, {"id": "2606.04318", "category": "hep-th", "title": "The Awada-Gibbons-Shaw Algebra in de Sitter Space and SUSY Breaking", "abstract": "We rederive the Cosmological Supersymmetry Breaking Relation $m_{3/2} = \\frac{C}{\\sqrt{R_{dS} L_P}}$ from a deformation of the Awada-Gibbons-Shaw local supersymmetry algebra.", "url": "https://arxiv.org/abs/2606.04318", "type": "理论", "summary": "我们从 Awada-Gibbons-Shaw 局域超对称代数的变形中重新推导出宇宙超对称破缺关系 $m_{3/2} = \\frac{C}{\\sqrt{R_{dS} L_P}}$。", "authors": [{"name": "T. Banks"}], "featured_authors": [{"name": "T. Banks"}], "author_count": 1}, {"id": "2606.04470", "category": "hep-th", "title": "Multi-entropy in random tensor networks", "abstract": "We study the evaluation of Rényi multi-entropies $S^{(q)}_n$ in Random Tensor Network (RTN) states in the large bond-dimension limit. For the case of Rényi index $n=2$ and arbitrary number of parties $q$, we prove that that multi-entropies are determined by minimal multiway cuts through the network. When the minimal multiway cut is degenerate, we characterize the full minimizer set via compatible families of minimal cuts and give a criterion for all minimizers to come from ordinary cut partitions. For $n=2$, this gives a natural generalization of the minimal cut description of bipartite entanglement to multipartite systems with arbitrarily many parties. For the case of integer $n>2$, we show that the minimal multiway cut conjecture is in general \\emph{not true} by providing explicit counter examples for both the single random tensor and for the network built from isometric tilings. We discuss the implication for our results on the multipartite entanglement structures in RTN and holography.", "url": "https://arxiv.org/abs/2606.04470", "type": "理论", "summary": "我们研究了大键维数限制下随机张量网络 (RTN) 状态中 Rényi 多熵 $S^{(q)}_n$ 的评估。对于 Rényi 指数 $n=2$ 和任意数量的参与方 $q$ 的情况，我们证明多熵是由网络中的最小多路切割决定的。当最小多路割退化时，我们通过最小割的兼容族来表征完整的最小化集，并给出所有最小化器来自普通割分区的标准。对于 $n=2$，这给出了二分纠缠到具有任意多方的多分系统的最小割描述的自然推广。对于整数 $n>2$ 的情况，我们通过为单个随机张量和由等距平铺构建的网络提供明确的反例来证明最小多路切割猜想一般是 \\emph{not true}。我们讨论了我们的结果对 RTN 和全息术中多部分纠缠结构的影响。", "authors": [{"name": "Miao Hu"}, {"name": "Simon Lin"}, {"name": "Ion Nechita"}], "featured_authors": [{"name": "Miao Hu"}, {"name": "Simon Lin"}, {"name": "Ion Nechita"}], "author_count": 3}, {"id": "2606.04542", "category": "hep-th", "title": "On Cosmologies and Vacua Driven by Tension and Curvatures", "abstract": "We investigate the effects of the exponential potentials typical of non-supersymmetric strings in cosmologies whose spatial and internal slices are maximally symmetric spaces with curvatures labeled by a pair of integers $k$ and $k'$ ($=\\pm 1$). We classify the solutions according to their singularity structure and asymptotic behavior and present a semi-quantitative picture of the generic dynamics in the physically most relevant cases with flat spatial slices. The analysis relies on exact solutions emerging when one of the effects dominates, special solutions arising when two or more effects are comparable, scaling asymptotics, and some numerical tests.", "url": "https://arxiv.org/abs/2606.04542", "type": "理论", "summary": "我们研究了宇宙学中非超对称弦的典型指数势的影响，其空间和内部切片是最大对称空间，其曲率由一对整数 $k$ 和 $k'$ ($=\\pm 1$) 标记。我们根据解的奇点结构和渐近行为对解进行分类，并在具有平坦空间切片的物理上最相关的情况下呈现通用动力学的半定量图像。该分析依赖于当一种效应占主导地位时出现的精确解、当两种或多种效应具有可比性时出现的特殊解、标度渐近以及一些数值测试。", "authors": [{"name": "J. Mourad"}, {"name": "A. Sagnotti"}], "featured_authors": [{"name": "J. Mourad"}, {"name": "A. Sagnotti"}], "author_count": 2}, {"id": "2606.04575", "category": "hep-th", "title": "Emergent Closed Universes in Symmetric Orbifold CFTs", "abstract": "We identify closed universe sectors in large $N$ symmetric orbifold CFTs with holographic duals. Starting from tensor product states built out of a finite dimensional low energy subspace of the seed theory, we show that the large $N$ Hilbert space decomposes into superselection sectors labeled by occupation number distributions. Before imposing the orbifold gauge constraint, these sectors have exponentially large dimensions, and the maximally entropic sector dominates the ungauged Hilbert space. We argue that this sector exhibits several characteristic features expected of a closed universe Hilbert space: pure states become indistinguishable from a mixed state at the level of simple correlation functions, and the associated operator algebra is naturally a hyperfinite type II$_1$ von Neumann algebra. We then impose the $S_N$ gauge constraint. The large gauge redundancy drastically reduces the number of independent states. In particular, in the large $N$ limit, the dimension of the physical Hilbert space grows only polynomially with $N$. Consequently, each superselection sector after imposing the constraint is one dimensional in this limit. This reproduces the qualitative behavior suggested by gravitational path integral calculations with wormholes. We then show why, in this setup, the Hartle-Hawking type semiclassical approximation for the dominant closed universe fails to reproduce the CFT results. Nevertheless, the dominant saddle point approximation for gravitational path integral calculation is reconstructed once the CFT degrees of freedom are coupled to external observer degrees of freedom.", "url": "https://arxiv.org/abs/2606.04575", "type": "理论", "summary": "我们通过全息对偶识别大型 $N$ 对称轨道 CFT 中的封闭宇宙扇区。从种子理论的有限维低能子空间构建的张量积状态开始，我们证明大 $N$ 希尔伯特空间分解为由占用数分布标记的超选择扇区。在施加轨道折叠规范约束之前，这些扇区具有指数级大的尺寸，并且最大熵扇区在未规范希尔伯特空间中占主导地位。我们认为，这个扇区表现出封闭宇宙希尔伯特空间所期望的几个特征：在简单相关函数的水平上，纯态与混合态无法区分，并且相关的算子代数自然是超有限类型 II$_1$ 冯·诺依曼代数。然后我们施加 $S_N$ 规格约束。大规格冗余大大减少了独立状态的数量。特别是，在较大的 $N$ 限制下，物理希尔伯特空间的维数仅随 $N$ 呈多项式增长。因此，施加约束后的每个超级选择扇区在此限制中都是一维的。\n\n这再现了虫洞引力路径积分计算所建议的定性行为。然后，我们将展示为什么在这种设置中，占主导地位的封闭宇宙的 Hartle-Hawking 型半经典近似无法重现 CFT 结果。然而，一旦 CFT 自由度与外部观察者自由度耦合，引力路径积分计算的主要鞍点近似就会被重建。", "authors": [{"name": "Akihiro Miyata"}, {"name": "Keigo Horikoshi"}, {"name": "Hiromasa Tajima"}, {"name": "Tomonori Ugajin"}], "featured_authors": [{"name": "Akihiro Miyata"}, {"name": "Keigo Horikoshi"}, {"name": "Hiromasa Tajima"}, {"name": "Tomonori Ugajin"}], "author_count": 4}, {"id": "2606.04626", "category": "hep-th", "title": "Self-dual higher spin theory: Poincaré invariance and new solutions", "abstract": "In this paper we study the self-dual higher spin theory in $4d$ recently proposed in arXiv:2209.01966 . The typical vacuum of higher spin theories is an empty AdS space-time. We consider solutions of special form: space-time geometry associated with spin $S=2$ field is an AdS, and other fields may have nonzero values, such that the global space-time symmetry of the vacuum is broken to $3d$ Poincaré. We show that the only field possessing this property is a two-parametric scalar vacuum. We also provide a new family of solutions that generalize this scalar vacuum. In addition to the scalar, the family consists of a fermion $S = 1/2$ in the bulk propagating along the radial direction in Poincaré coordinates and trivial fields of all spins. Fields are trivial in the sense that they do not have gauge fields in the bulk and correspond to trivially conserved currents (i.e. constants) on the conformal boundary.", "url": "https://arxiv.org/abs/2606.04626", "type": "理论", "summary": "在本文中，我们研究了最近在 arXiv:2209.01966 中提出的 $4d$ 中的自对偶高自旋理论。高自旋理论的典型真空是空的 AdS 时空。我们考虑特殊形式的解：与自旋 $S=2$ 场相关的时空几何是 AdS，其他场可能具有非零值，使得真空的全局时空对称性破缺为 $3d$ 庞加莱。我们证明，唯一具有这种性质的场是二参数标量真空。我们还提供了一系列新的解决方案来推广这种标量真空。除了标量之外，该族还包含沿庞加莱坐标中的径向方向传播的整体费米子 $S = 1/2$ 以及所有自旋的平凡场。场是微不足道的，因为它们在整体上不具有规范场并且对应于共形边界上的微不足道的守恒电流（即常数）。", "authors": [{"name": "I. S. Faliakhov"}], "featured_authors": [{"name": "I. S. Faliakhov"}], "author_count": 1}, {"id": "2606.04841", "category": "hep-th", "title": "Chiral Transport in Metric-Affine Geometries", "abstract": "Anomalous transport in equilibrium fermionic fluids chirally coupled to background Weyl-type nonmetricity is studied. A formal descent analysis is carried out in which the dependence of the anomaly polynomial on the nonmetricity tensor is encoded in a Weyl invariant four-form. The constitutive relation of the axial-vector current is evaluated from the equilibrium partition function obtained using transgression techniques, showing the existence of nonmetricity-mediated chiral separation effects driven by the fluid's vorticity and the Weyl magnetic field. A second nonminimal coupling of fermionic matter to metric-affine geometries proposed in the literature is also discussed.", "url": "https://arxiv.org/abs/2606.04841", "type": "理论", "summary": "研究了与背景 Weyl 型非度量性手性耦合的平衡费米子流体中的反常输运。进行形式下降分析，其中异常多项式对非度量张量的依赖性被编码为 Weyl 不变四形式。根据海侵技术获得的平衡分配函数评估了轴矢量电流的本构关系，表明存在由流体涡度和外尔磁场驱动的非度量介导的手性分离效应。还讨论了文献中提出的费米子物质与度量仿射几何的第二个非最小耦合。", "authors": [{"name": "Miguel A. Vazquez-Mozo"}], "featured_authors": [{"name": "Miguel A. Vazquez-Mozo"}], "author_count": 1}, {"id": "2606.04854", "category": "hep-th", "title": "Resonance transformations for the $(2,2p+1)$ minimal string via $x-y$ swap: a proof of Artemev's conjecture", "abstract": "This paper contains a proof of a recent conje
