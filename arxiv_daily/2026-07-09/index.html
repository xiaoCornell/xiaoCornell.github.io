 strings connecting half-integer defects and separating domains with opposite polarization, together with closed depolarization loops. We first characterize the elementary relaxation mechanisms of defect pairs and loops, showing that the interplay between polar and nematic alignment gives rise to non-monotonic string-mediated interactions, finite equilibrium separations and distinct loop-collapse pathways. Large-scale simulations from disordered states instead show dynamic scaling with a characteristic length growing as $\\sim(t/\\ln t)^{1/2}$, consistent with coarsening in systems with non-conserved order parameters and point-like defects. Upon introducing self-advection, sufficiently strong activity leads to the coexistence of positive integer and negative half-integer defects, which we term motility-induced charge symmetry breaking, and to saturation of the characteristic length scales, ultimately resulting in arrested coarsening. Overall, our results provide a simple unified framework for understanding the ordering and defect dynamics in biological and synthetic nematopolar systems.", "url": "https://arxiv.org/abs/2607.07656", "type": "理论+数值", "summary": "在广泛的生物和合成活性系统中观察到的极性和向列相互作用的共存产生了丰富的现象学，继续挑战我们对非平衡集体行为的理论理解。在本文中，我们对新引入的干向列极系统最小单场模型中的相序和缺陷动力学进行了数值研究，其中竞争的极性和向列贡献进入自由能，并且活动是通过自平流贡献实现的。在两种排列之间的最佳平衡下，系统开发出连接半整数缺陷的去极化串和具有相反极化的分离域以及闭合去极化环。我们首先描述了缺陷对和环的基本弛豫机制，表明极性和向列排列之间的相互作用产生了非单调弦介导的相互作用、有限平衡分离和不同的环塌陷路径。\n\n相反，无序态的大规模模拟显示特征长度以 $\\sim(t/\\ln t)^{1/2}$ 的形式增长的动态缩放，这与具有非保守序参数和点状缺陷的系统中的粗化一致。在引入自平流后，足够强的活动导致正整数和负半整数缺陷的共存，我们将其称为运动引起的电荷对称性破缺，并导致特征长度尺度的饱和，最终导致粗化停止。总的来说，我们的结果为理解生物和合成线极系统中的有序和缺陷动态提供了一个简单的统一框架。", "authors": [{"name": "Fabio Aprile"}, {"name": "Massimiliano Semeraro"}, {"name": "Giuseppe Gonnella"}], "featured_authors": [{"name": "Fabio Aprile"}, {"name": "Massimiliano Semeraro"}, {"name": "Giuseppe Gonnella"}], "author_count": 3}, {"id": "2607.06657", "category": "hep-th", "title": "Towards gauge independence in asymptotically safe quantum gravity", "abstract": "We study gauge dependence in proper-time renormalisation group flows for asymptotically safe quantum gravity. Working in an essential scheme, we use field redefinitions to separate redundant off-shell contributions from the on-shell running of physical couplings. We consider two approximations: in the first, we work on general backgrounds and project onto all terms with up to four derivatives, neglecting boundary terms; in the second, we work on a maximally symmetric background and retain all orders in the Ricci scalar. Although the flow equation depends on the gauge parameters, this dependence can be cancelled order by order once the redundant terms are absorbed by field redefinitions. In the four-derivative approximation, the dependence on the retained gauge parameter drops out of the beta function for Newton's constant to third order in the coupling. On the sphere, the flow becomes independent of both parameters of the general gauge to all curvature orders, and all orders in the coupling. Crucially, this cancellation depends on the choice of regulator. We verify the mechanism explicitly at one loop, where the gauge-dependent fluctuation contributions are cancelled by the ghost sector on shell. The resulting essential flow displays a gauge-independent non-Gaussian fixed point, supporting the interpretation that universal information in quantum gravity is encoded in the on-shell essential sector.", "url": "https://arxiv.org/abs/2607.06657", "type": "理论", "summary": "我们研究渐近安全量子引力的原时重正化群流中的规范依赖性。在一个基本方案中，我们使用场重新定义来将冗余的壳外贡献与物理耦合的壳内运行分开。我们考虑两种近似：第一种，我们研究一般背景，并投影到具有最多四个导数的所有项，忽略边界项；在第二个中，我们研究最大对称背景并保留 Ricci 标量中的所有订单。尽管流量方程取决于仪表参数，但一旦冗余项被场重新定义吸收，这种依赖性就可以逐级取消。在四阶导数近似中，对保留规范参数的依赖性从耦合中牛顿常数的 beta 函数下降到三阶。在球体上，流动变得独立于所有曲率阶次的通用规范参数以及耦合中的所有阶次。至关重要的是，这种取消取决于监管机构的选择。\n\n我们在一个循环中明确验证了该机制，其中与规范相关的波动贡献被壳上的幽灵扇区抵消。由此产生的基本流显示了一个与规范无关的非高斯不动点，支持了量子引力中的通用信息被编码在壳上基本扇区中的解释。", "authors": [{"name": "Kevin Falls"}, {"name": "Renata Ferrero"}, {"name": "Giovanni Oglialoro"}], "featured_authors": [{"name": "Kevin Falls"}, {"name": "Renata Ferrero"}, {"name": "Giovanni Oglialoro"}], "author_count": 3}, {"id": "2607.06661", "category": "hep-th", "title": "Perturbiner methods in scattering amplitude", "abstract": "Berends--Giele currents have recently attracted renewed attention across the amplitude community, appearing in new contexts ranging from gravitational amplitudes to cosmological correlators and string theory. They can be derived from first principles using the perturbiner method, a thirty-year-old framework that organizes tree-level scattering data in the form of classical multi-particle solutions to field theory equations of motion. After its rediscovery about a decade ago, it has been systematically studied and applied in many different contexts. This review aims to provide a pedagogical introduction to the method, covering its basic formulation across a broad (but certainly not exhaustive) range of models and progressing to some of the most recent findings in the literature. This includes several unpublished results, many of which represent tacit knowledge of the community that has not previously appeared in print.", "url": "https://arxiv.org/abs/2607.06661", "type": "理论", "summary": "Berends-Giele 电流最近引起了振幅界的重新关注，出现在从引力振幅到宇宙学相关器和弦理论的新背景中。它们可以使用扰动器方法从第一原理中推导出来，扰动器方法是一个已有三十年历史的框架，以场论运动方程的经典多粒子解的形式组织树级散射数据。大约十年前它被重新发现后，它已被系统地研究并应用于许多不同的环境。这篇综述旨在提供对该方法的教学介绍，涵盖其在广泛（但肯定不是详尽的）模型中的基本表述，并进一步介绍文献中的一些最新发现。这包括一些未发表的结果，其中许多代表了以前未在印刷品中出现过的社区隐性知识。", "authors": [{"name": "Renann Lipinski Jusinskas"}], "featured_authors": [{"name": "Renann Lipinski Jusinskas"}], "author_count": 1}, {"id": "2607.06663", "category": "hep-th", "title": "Generalised global symmetries in 5d $\\mathcal{N}=1$ theories from the blow-up equations", "abstract": "Five-dimensional $\\mathcal{N}=1$ superconformal field theories admit a rich variety of generalised global symmetries, including higher-form symmetries, 2-group symmetries, and their 't$~$Hooft anomalies. We show that this data can be extracted directly from the blow-up equations that govern the instanton partition functions of such theories on the $\\Omega$-background. The central object is the classical prefactor $\\exp(-V_n)$ that weights each magnetic flux on the blown-up geometry: evaluated on a background for the electric 1-form symmetry, the fractional parts of its exponents encode the cubic self-anomaly of the 1-form symmetry, as well as its mixed anomalies with the instanton, flavour, gravitational, and $\\mathrm{SU}(2)_R$ symmetries. Combined with the faithful continuous global symmetry of the ultraviolet fixed point, which we determine from the superconformal index, the same data decides whether the theory possesses a 2-group symmetry or a mixed 't$~$Hooft anomaly. We illustrate the method in gauge theories, including $\\mathrm{SU}(4)$ and $\\mathrm{USp}(4)$ with antisymmetric hypermultiplets, and $\\mathrm{Spin}(7)$ and $\\mathrm{Spin}(8)$ with vector hypermultiplets, as well as in several families of non-Lagrangian theories, for which we obtain new results: notably, the effective prepotentials of the $B_N$ and $B_N^{(1,2,3)}$ families, the cubic 1-form anomalies of the rank-two theories $\\mathbb{P}^2\\cup\\mathbb{F}_3$ and $\\mathbb{P}^2\\cup\\mathbb{F}_6$, and several mixed anomalies involving the 1-form and flavour symmetries.", "url": "https://arxiv.org/abs/2607.06663", "type": "理论", "summary": "五维 $\\mathcal{N}=1$ 超共形场论承认丰富多样的广义全局对称性，包括更高形式的对称性、2 群对称性及其 't$~$Hooft 异常。我们证明，这些数据可以直接从控制 $\\Omega$ 背景上此类理论的瞬子配分函数的爆炸方程中提取。中心对象是经典前因子 $\\exp(-V_n)$，​​它对放大几何上的每个磁通量进行加权：在电 1 型对称性的背景上进行评估，其指数的小数部分编码 1 型对称性的三次自异常，以及其与瞬子、风味、引力和 $\\mathrm{SU}(2)_R$ 对称性的混合异常。结合我们从超共形指数确定的紫外线不动点的忠实连续全局对称性，相同的数据决定了该理论是否具有二群对称性或混合't$~$Hooft异常。\n\n我们在规范理论中说明了该方法，包括具有反对称超多重态的 $\\mathrm{SU}(4)$ 和 $\\mathrm{USp}(4)$，以及具有向量超多重态的 $\\mathrm{Spin}(7)$ 和 $\\mathrm{Spin}(8)$，以及在几个非拉格朗日理论族中，我们获得了新的结果：值得注意的是， $B_N$ 和 $B_N^{(1,2,3)}$ 系列，二阶理论 $\\mathbb{P}^2\\cup\\mathbb{F}_3$ 和 $\\mathbb{P}^2\\cup\\mathbb{F}_6$ 的立方 1 型异常，以及涉及 1 型和风味对称性的几个混合异常。", "authors": [{"name": "William Harding"}, {"name": "Noppadol Mekareeya"}], "featured_authors": [{"name": "William Harding"}, {"name": "Noppadol Mekareeya"}], "author_count": 2}, {"id": "2607.06666", "category": "hep-th", "title": "Effective Field Theories for Material Media", "abstract": "We review recent progress in understanding certain aspects of condensed matter systems from a high energy theory perspective. We discuss effective field theories that describe collective bulk and localized excitations in a variety of solid and fluid systems. Particular emphasis is placed on the role played by spacetime symmetries and their spontaneous breaking. The resulting Goldstone dynamics can be seen as underlying a wide variety of phenomena. We attempt to bridge the language gap between subfields while underscoring the numerous conceptual similarities.", "url": "https://arxiv.org/abs/2607.06666", "type": "理论", "summary": "我们回顾了从高能理论角度理解凝聚态物质系统某些方面的最新进展。我们讨论描述各种固体和流体系统中集体整体和局部激发的有效场论。特别强调时空对称性及其自发破缺所发挥的作用。由此产生的戈德斯通动力学可以被视为多种现象的基础。我们试图弥合子领域之间的语言差距，同时强调众多概念相似之处。", "authors": [{"name": "Angelo Esposito"}, {"name": "Alberto Nicolis"}, {"name": "Riccardo Penco"}], "featured_authors": [{"name": "Angelo Esposito"}, {"name": "Alberto Nicolis"}, {"name": "Riccardo Penco"}], "author_count": 3}, {"id": "2607.06669", "category": "hep-th", "title": "Monodromy defects in Chern-Simons theory and Holography", "abstract": "Wilson loop operators in Chern-Simons theory have revealed profound links between quantum field theory, the fractional quantum Hall effect, topology, conformal field theory, and string theory. In Chern-Simons theories with charge conjugation symmetry, we construct a new class of observables: codimension-two monodromy defects around which fields return to themselves up to charge conjugation. Whereas Wilson loops are labeled by integrable representations of an untwisted affine Lie algebra, monodromy defects are labeled by those of the corresponding twisted affine algebra. The modular and fusion data of these two algebras determine the exact correlation functions of Wilson lines and monodromy defects, which together furnish a $\\mathbb{Z}_2$-crossed braided tensor category. The spectrum of line defects in Chern-Simons theory thus gives a physical realization of every algebra in Kac's classification of affine Lie algebras: untwisted for Wilson loops, twisted for monodromy defects. We also determine the exact 't Hooft expansion of monodromy defects in $SU(N)_k$ Chern-Simons theory and identify their holographic duals in topological string theory. The insertion of the lightest monodromy defect has a striking effect: it replaces the resolved conifold background of the Gopakumar-Vafa duality by a specific orientifold of the resolved conifold, transmuting the dual theory of oriented strings into one of unoriented strings. Each excited monodromy defect is then realized as a collection of branes in the orientifold background, with the brane content determined by the representation of the twisted affine algebra that labels the defect.", "url": "https://arxiv.org/abs/2607.06669", "type": "理论", "summary": "陈-西蒙斯理论中的威尔逊环算子揭示了量子场论、分数量子霍尔效应、拓扑、共形场论和弦理论之间的深刻联系。在具有电荷共轭对称性的陈-西蒙斯理论中，我们构造了一类新的可观测量：余维——两个单峰缺陷，围绕该缺陷场返回到自身直至电荷共轭。威尔逊环由非扭曲仿射李代数的可积表示来标记，而单峰缺陷则由相应的扭曲仿射代数的可积表示来标记。这两个代数的模和融合数据确定了威尔逊线和单性缺陷的精确相关函数，它们共同提供了$\\mathbb{Z}_2$交叉编织张量类别。因此，Chern-Simons 理论中的线缺陷谱给出了 Kac 仿射李代数分类中每个代数的物理实现：威尔逊环是未扭曲的，单峰缺陷是扭曲的。我们还确定了 $SU(N)_k$ Chern-Simons 理论中单峰缺陷的精确 't Hooft 展开式，并确定了拓扑弦理论中它们的全息对偶。\n\n最轻的单峰缺陷的插入具有惊人的效果：它用已解析的圆锥折叠的特定东方折叠取代了 Gopakumar-Vafa 对偶性的已解析圆锥折叠背景，将有向弦的对偶理论转变为无向弦的理论。然后，每个受激单峰缺陷被实现为东方褶皱背景中的膜集合，膜内容由标记缺陷的扭曲仿射代数的表示确定。", "authors": [{"name": "Federico Ambrosino"}, {"name": "Jaume Gomis"}, {"name": "Suriyah Rajalingam Kannagi"}], "featured_authors": [{"name": "Federico Ambrosino"}, {"name": "Jaume Gomis"}, {"name": "Suriyah Rajalingam Kannagi"}], "author_count": 3}, {"id": "2607.06679", "category": "hep-th", "title": "Classical conformal invariance and superhorizon dynamics in de Sitter", "abstract": "Soft de Sitter Effective Theory is a well-motivated candidate for the correct effective late-time description of equal-time correlation functions in de Sitter space. In this work, we study its application to theories that enjoy classical conformal invariance, using the conformally-coupled $\\phi^4$-theory as a toy model. While quantum effects generate non-trivial late-time dynamics in such models, we argue that it is not described by the standard construction of the effective theory as discussed thus far in the literature. We show that the tree-level matching of the trispectrum onto the effective theory does not fit into the expected power-counting scheme, and we contrast it with the matching of the tree-level bispectrum in the conformally-coupled $\\phi^3$-theory, where it works consistently. We then propose a prescription to identify the leading superhorizon degrees of freedom in such theories, which should serve as the starting point for the construction of their late-time effective description. The interpretation of logarithms of the form $\\log(-k\\eta)$ in this context is briefly discussed.", "url": "https://arxiv.org/abs/2607.06679", "type": "理论", "summary": "软德西特有效理论是德西特空间中等时相关函数的正确有效后期描述的一个有充分动机的候选理论。在这项工作中，我们使用共形耦合 $\\phi^4$ 理论作为玩具模型，研究其在享有经典共形不变性的理论中的应用。虽然量子效应在此类模型中产生了不平凡的后期动力学，但我们认为，迄今为止文献中讨论的有效理论的标准结构并未描述它。我们证明了三谱与有效理论的树级匹配不符合预期的功率计数方案，并且我们将其与共形耦合 $\\phi^3$ 理论中的树级双谱匹配进行了对比，后者工作一致。然后，我们提出了一种方法来确定此类理论中领先的超视界自由度，这应该作为构建其后期有效描述的起点。本文简要讨论了 $\\log(-k\\eta)$ 形式的对数的解释。", "authors": [{"name": "Maria Cristina Fiore"}, {"name": "Andrea F. Sanfilippo"}], "featured_authors": [{"name": "Maria Cristina Fiore"}, {"name": "Andrea F. Sanfilippo"}], "author_count": 2}, {"id": "2607.06680", "category": "hep-th", "title": "Evidence for renormalized instantons in real-time simulations of vacuum decay", "abstract": "While vacuum decay is traditionally described by Euclidean instanton methods, lattice simulations enable real-time modeling of dynamical observables relevant to cosmology and upcoming cold-atom analog experiments. We investigate the relationship between these approaches by extracting ensemble-averaged bubble profiles from zero-temperature simulations of a relativistic scalar field. Our observed profiles differ markedly from the bare Coleman bounce and classical thermal predictions. However, we find that instanton solutions in an appropriately renormalized potential reproduce both the measured profiles and their dependence on the UV cutoff, and predict decay rates consistent with simulations across the parameter range considered. The fact that a single renormalized Euclidean object captures these independent observables provides strong evidence that renormalization accounts for the discrepancy between the two formalisms, and establishes a quantitative link between instanton predictions, lattice simulations, and forthcoming empirical tests of vacuum decay.", "url": "https://arxiv.org/abs/2607.06680", "type": "理论", "summary": "虽然真空衰变传统上是通过欧几里得瞬时子方法来描述的，但晶格模拟可以对与宇宙学和即将到来的冷原子模拟实验相关的动态可观测量进行实时建模。我们通过从相对论标量场的零温度模拟中提取系综平均气泡轮廓来研究这些方法之间的关系。我们观察到的剖面与裸露的科尔曼弹跳和经典的热预测明显不同。然而，我们发现，适当重整化势中的瞬子解再现了测量的轮廓及其对紫外线截止的依赖性，并预测与所考虑的参数范围内的模拟一致的衰减率。单个重整化欧几里得物体捕获这些独立的可观测量这一事实提供了强有力的证据，证明重整化解释了两种形式之间的差异，并在瞬子预测、晶格模拟和即将到来的真空衰变经验测试之间建立了定量联系。", "authors": [{"name": "Emilie Hertig"}, {"name": "Alexander C. Jenkins"}, {"name": "Hiranya V. Peiris"}, {"name": "Andrew Pontzen"}, {"name": "Matthew C. Johnson"}], "featured_authors": [{"name": "Emilie Hertig"}, {"name": "Alexander C. Jenkins"}, {"name": "Hiranya V. Peiris"}, {"name": "Andrew Pontzen"}, {"name": "Matthew C. Johnson"}], "author_count": 5}, {"id": "2607.06695", "category": "hep-th", "title": "Geometry-induced Casimir response in a helicoidal spacetime", "abstract": "We investigate the Casimir response of a massive scalar field in a torsionless helicoidal spacetime with Levi-Civita connection. The background is ultrastatic and curved, with scalar curvature \\(R=-2\\Omega^2\\), and its off-diagonal metric component induces a geometric coupling between angular and axial quantum numbers. We show that individual modes exhibit a linear helicoidal splitting, whereas the linear contribution cancels in the nonchiral vacuum sum. The leading Casimir correction is therefore quadratic in the twist and defines a helicoidal vacuum susceptibility after local ultraviolet subtractions. For a cylindrical Dirichlet cavity, we compute this scheme-defined susceptibility and the associated correction to the radial Casimir force. The results identify torsionless helicoidal geometry as a controlled setting in which mode-level chirality produces a finite quadratic response of vacuum fluctuations.", "url": "https://arxiv.org/abs/2607.06695", "type": "理论", "summary": "我们研究了具有列维-奇维塔连接的无扭螺旋时空中大质量标量场的卡西米尔响应。背景是超静态和弯曲的，具有标量曲率 \\(R=-2\\Omega^2\\)，其非对角度量分量引起角量子数和轴向量子数之间的几何耦合。我们表明，各个模式表现出线性螺旋分裂，而线性贡献在非手性真空和中被抵消。因此，领先的卡西米尔校正在扭曲中是二次的，并在局部紫外线扣除后定义了螺旋真空磁化率。对于圆柱形狄利克雷腔，我们计算了该方案定义的磁化率以及对径向卡西米尔力的相关校正。结果将无扭转螺旋几何形状确定为一种受控设置，其中模式级手性产生真空涨落的有限二次响应。", "authors": [{"name": "Edilberto O. Silva"}], "featured_authors": [{"name": "Edilberto O. Silva"}], "author_count": 1}, {"id": "2607.06738", "category": "hep-th", "title": "Integrable systems inspired by DAHA and DIM algebra: type $C^\\vee C$ versus type $A$", "abstract": "The Ding-Iohara-Miki (DIM) algebra (quantum toroidal algebra of $\\widehat{gl_1}$) is related to a wide class of quantum many-particle integrable systems, a typical one being the Ruijsenaars trigonometric system with eigenfunctions that are a triad formed by the Noumi-Shiraishi power series, the Macdonald polynomials, and the Baker-Akhiezer multivariable function. Other integrable systems of this type are obtained from the Ruijsenaars system by twisting. At the same time, the Ruijsenaars Hamiltonians are directly related to the Hamiltonians of another quantum integrable system, the Cherednik DAHA Hamiltonians of type $A$ (and their twisted versions in the twisted case), due to the correspondence between the DIM algebra and the spherical DAHA. The eigenfunctions of the DAHA Hamiltonians are non-symmetric Macdonald polynomials. Similarly, there is a class of integrable DAHA Hamiltonians of type $C^\\vee C$, the spherical version of which, in turn, allows one to generate integrable Koornwinder Hamiltonians. The eigenfunctions of these two integrable systems are, respectively, non-symmetric and symmetric Koornwinder polynomials, which are our main interest in this paper. Here we consider the cases of both type $A$ and type $C^\\vee C$ systems, since they are sufficiently similar, and point out important distinctions between them.", "url": "https://arxiv.org/abs/2607.06738", "type": "理论", "summary": "Ding-Iohara-Miki (DIM) 代数（$\\widehat{gl_1}$ 的量子环形代数）与一类广泛的量子多粒子可积系统相关，典型的是 Ruijsenaars 三角系统，其特征函数是由 Noumi-Shiraishi 幂级数、Macdonald 多项式和 Baker-Akhiezer 多变量函数形成的三元组。这种类型的其他可积系统是通过扭转 Ruijsenaars 系统获得的。同时，由于 DIM 代数和球面 DAHA 之间的对应关系，Ruijsenaars 哈密顿量与另一个量子可积系统的哈密顿量（$A$ 类型的 Cherednik DAHA 哈密顿量（以及它们在扭曲情况下的扭曲版本））直接相关。 DAHA 哈密顿量的本征函数是非对称麦克唐纳多项式。类似地，有一类 $C^\\vee C$ 类型的可积 DAHA 哈密顿量，其球形版本又允许生成可积的 Koornwinder 哈密顿量。这两个可积系统的特征函数分别是非对称和对称 Koornwinder 多项式，这是我们本文的主要兴趣。\n\n在这里，我们考虑 $A$ 类型和 $C^\\vee C$ 类型系统的情况，因为它们足够相似，并指出它们之间的重要区别。", "authors": [{"name": "L. Bishler"}, {"name": "A. Mironov"}, {"name": "A. Popolitov"}], "featured_authors": [{"name": "L. Bishler"}, {"name": "A. Mironov"}, {"name": "A. Popolitov"}], "author_count": 3}, {"id": "2607.06826", "category": "hep-th", "title": "BMS$_3$ invariant field theories", "abstract": "We review existing and construct new two-dimensional field theories that exhibit BMS$_3$ symmetry, with and without central extensions. These include interacting electric, magnetic and canonical BMS$_3$ scalar theories, as well as couplings between the electric and magnetic sectors. We provide a careful analysis of boundary contributions at the corner points $u\\rightarrow\\pm\\infty$, determine the counterterms and boundary conditions required by BMS$_3$ invariance, and study the corresponding variational principles. Furthermore, we introduce external sources and derive the associated flux-balance laws. Within the framework of flat-space holography, we show that a simple free electric BMS$_3$ model with the appropriate central charge reproduces the monodromy classification of three-dimensional Einstein gravity. Finally, we investigate the flat-space limits of both AdS$_3$ and dS$_3$, whose boundary dynamics are described by Carrollian limits of Liouville and Euclidean Liouville theory, respectively. Although the resulting BMS$_3$ theories possess isomorphic spectra, they differ in the signs of the supertranslation charges and the central charge. This suggests that the flat-space limits of AdS$_3$ and dS$_3$ provide complementary realizations of flat-space holography.", "url": "https://arxiv.org/abs/2607.06826", "type": "理论", "summary": "我们回顾现有的并构建新的二维场论，这些理论表现出 BMS$_3$ 对称性，有或没有中心扩展。其中包括相互作用的电、磁和规范 BMS$_3$ 标量理论，以及电和磁部分之间的耦合。我们仔细分析了角点$u\\rightarrow\\pm\\infty$处的边界贡献，确定了BMS$_3$不变性所需的反项和边界条件，并研究了相应的变分原理。此外，我们引入外部源并推导相关的通量平衡定律。在平面空间全息术的框架内，我们证明了具有适当中心电荷的简单自由电 BMS$_3$ 模型再现了三维爱因斯坦引力的单向分类。最后，我们研究了 AdS$_3$ 和 dS$_3$ 的平坦空间极限，其边界动力学分别由卡罗尔刘维尔极限和欧几里德刘维尔理论描述。尽管由此产生的 BMS$_3$ 理论具有同构谱，但它们在超平移电荷和中心电荷的符号上有所不同。\n\n这表明 AdS$_3$ 和 dS$_3$ 的平坦空间限制提供了平坦空间全息术的互补实现。", "authors": [{"name": "Diego Hidalgo"}, {"name": "Stefan Vandoren"}, {"name": "Huaxuan Zeng"}], "featured_authors": [{"name": "Diego Hidalgo"}, {"name": "Stefan Vandoren"}, {"name": "Huaxuan Zeng"}], "author_count": 3}, {"id": "2607.06851", "category": "hep-th", "title": "5d Higgs Branches: Stratifications from Geometry", "abstract": "Higgs Branches of 5d SCFTs are hyperkähler cones, symplectic varieties with interesting nested singularities governing the structure of possible Higgs branch RG flows. The main purpose of this note is to investigate 5d Higgs Branches via a geometric route: we study 5d SCFTs geometrically engineered from M-theory on non-compact Calabi-Yau threefolds, with non-isolated singularities. We match the (dynamical) complex structure deformations of the threefold with the symplectic leaves in the Higgs branch of the 5d SCFT, constructing its stratification purely relying on geometry. Consistency checks for our proposal are presented exploiting magnetic quivers.", "url": "https://arxiv.org/abs/2607.06851", "type": "理论", "summary": "5d SCFT 的希格斯分支是超克勒锥体，辛变体，具有有趣的嵌套奇点，控制可能的希格斯分支 RG 流的结构。本文的主要目的是通过几何途径研究 5d 希格斯分支：我们研究根据非紧卡拉比-丘三重的 M 理论几何设计的 5d SCFT，具有非孤立奇点。我们将三重的（动态）复杂结构变形与 5d SCFT 希格斯分支中的辛叶相匹配，纯粹依靠几何构造其分层。我们的提案的一致性检查是利用磁箭进行的。", "authors": [{"name": "Mario De Marco"}, {"name": "Michele Del Zotto"}, {"name": "Julius Grimminger"}, {"name": "Andrea Sangiovanni"}], "featured_authors": [{"name": "Mario De Marco"}, {"name": "Michele Del Zotto"}, {"name": "Julius Grimminger"}, {"name": "Andrea Sangiovanni"}], "author_count": 4}, {"id": "2607.06867", "category": "hep-th", "title": "On Integrable Structures on Non-compact Boundaries in Three-Dimensional Gravity", "abstract": "We study three-dimensional Einstein gravity with negative cosmological constant on non-compact spatial boundaries within the Chern-Simons formulation. Using an exact fluid/gravity correspondence, we derive a closed radial flow equation for the quasi-local stress tensor and show that it realizes the holographic $T\\bar T$ deformation at finite cutoff. We further develop the inverse-scattering description of the boundary dynamics, identifying the gravitational interpretation of the associated spectral data and analyzing the finite-cutoff deformation of soliton solutions. Although the boundary evolution is governed by an integrable bi-Hamiltonian hierarchy, we show that the radial flow itself is not Hamiltonian with respect to the canonical Poisson structure. Our results establish a unified framework connecting integrability, quasi-local gravitational observables, inverse scattering, and finite-cutoff holography on non-compact boundaries.", "url": "https://arxiv.org/abs/2607.06867", "type": "理论", "summary": "我们研究陈-西蒙斯公式中非紧空间边界上具有负宇宙学常数的三维爱因斯坦引力。使用精确的流体/重力对应关系，我们推导了准局部应力张量的闭合径向流方程，并表明它实现了有限截止时的全息 $T\\bar T$ 变形。我们进一步开发了边界动力学的逆散射描述，确定了相关光谱数据的引力解释并分析了孤子解的有限截止变形。尽管边界演化受可积双哈密顿层次结构控制，但我们表明，相对于规范泊松结构，径向流本身不是哈密顿量。我们的结果建立了一个统一的框架，连接可积性、准局域引力可观测量、逆散射和非紧边界上的有限截止全息术。", "authors": [{"name": "Hamed Adami"}, {"name": "Kristiansen Lara"}, {"name": "Anouchah Latifi"}, {"name": "René Meyer"}], "featured_authors": [{"name": "Hamed Adami"}, {"name": "Kristiansen Lara"}, {"name": "Anouchah Latifi"}, {"name": "René Meyer"}], "author_count": 4}, {"id": "2607.06870", "category": "hep-th", "title": "Phase transitions and uberholography of holographic pure-state geometries", "abstract": "We study the error-correcting properties of pure-state holographic geometries, in which mixed boundary subregions are replaced, via the surface/state correspondence, by the Ryu--Takayanagi (RT) geodesic bounding their entanglement wedges. In AdS$_3$/CFT$_2$ we derive a cross-ratio threshold relation $\\eta'/\\eta = e^{\\Delta H/2}$ for the connected/disconnected transition of the entanglement wedge when two holes are punched in such a geometry. The quantity $\\Delta H$ is sourced entirely by geodesics ending on RT boundaries. It shifts the standard two-interval threshold $\\eta = 1/2$, and we classify when its sign is fixed by the pattern of hole endpoints. Turning to code properties, we show that the recursive hole-punching underlying uberholography cannot start within an RT-boundary, while an untouched asymptotic boundary can still fractalize, and we find numerically that in the configurations we study it does so with the universal fractal dimension $\\alpha \\approx 0.786$. The resulting upper bounds on price and distance are nevertheless procedure dependent. In the configurations we study, punching holes on the asymptotic boundary while retaining the RT-boundary yields strictly tighter bounds than first tracing out the RT-boundary and then fractalizing.", "url": "https://arxiv.org/abs/2607.06870", "type": "理论", "summary": "我们研究纯态全息几何的纠错特性，其中混合边界子区域通过表面/状态对应被 Ryu-Takayanagi (RT) 测地线取代，它们的纠缠楔形边界。在 AdS$_3$/CFT$_2$ 中，当在这样的几何结构中打两个孔时，我们得出了纠缠楔的连接/断开过渡的交叉比阈值关系 $\\eta'/\\eta = e^{\\Delta H/2}$。数量 $\\Delta H$ 完全来源于以 RT 边界结束的测地线。它改变了标准的两区间阈值 $\\eta = 1/2$，并且当其符号由孔端点的模式固定时我们进行分类。转向代码属性，我们表明超全息术底层的递归打孔不能在 RT 边界内开始，而未触及的渐近边界仍然可以分形，并且我们从数字上发现，在我们研究的配置中，它以通用分形维数 $\\alpha \\approx 0.786$ 进行分形。然而，由此产生的价格和距离上限取决于程序。\n\n在我们研究的配置中，在保留 RT 边界的同时在渐近边界上打孔会产生比先描绘出 RT 边界然后分形更严格的边界。", "authors": [{"name": "Ning Bao"}, {"name": "Keiichiro Furuya"}, {"name": "Jacob March"}], "featured_authors": [{"name": "Ning Bao"}, {"name": "Keiichiro Furuya"}, {"name": "Jacob March"}], "author_count": 3}, {"id": "2607.07172", "category": "hep-th", "title": "Formation of holographic vortex in a rotating shell-shaped superfluid", "abstract": "We investigate the holographic superfluid dynamics subjected to external rotation on a spherical geometry. Through a linear perturbation analysis, we identify several dynamically unstable phases in the phase diagram, each characterized by distinct unstable modes. Employing fully nonlinear numerical simulations, we further demonstrate that these unstable modes generically drive the system into vortex-antivortex configurations with definite winding numbers, determined by the symmetry of the corresponding unstable modes.", "url": "https://arxiv.org/abs/2607.07172", "type": "理论", "summary": "我们研究了球面几何形状上外旋转的全息超流体动力学。 Through a linear perturbation analysis, we identify several dynamically unstable phases in the phase diagram, each characterized by distinct unstable modes. Employing fully nonlinear numerical simulations, we further demonstrate that these unstable modes generically drive the system into vortex-antivortex configurations with definite winding numbers, determined by the symmetry of the corresponding unstable modes.", "authors": [{"name": "Chang-Xu Yan"}, {"name": "Hao-Ran Chang"}, {"name": "Meng Gao"}, {"name": "Yu Tian"}, {"name": "Hongbao Zhang"}], "featured_authors": [{"name": "Chang-Xu Yan"}, {"name": "Hao-Ran Chang"}, {"name": "Meng Gao"}, {"name": "Yu Tian"}, {"name": "Hongbao Zhang"}], "author_count": 5}, {"id": "2607.07234", "category": "hep-th", "title": "Thermodynamics of Deformed AdS-Schwarzschild Black Holes Beyond the Bekenstein Paradigm", "abstract": "This work investigates the thermodynamic behavior of deformed AdS-Schwarzschild black holes by incorporating higher-order corrections within non-interacting spacetime models and extended entropy frameworks. To address the inadequacies of classical statistical mechanics in describing gravitational systems with non-local and long-range interactions, we employ non-extensive entropy formalisms, specifically Tsallis and Barrow entropies, which capture quantum-scale deviations and extended correlations. The resulting thermodynamic analysis reveals significant departures from conventional black hole behavior under strong entropy deformations. Notably, as the degree of non-extensivity decreases, the system asymptotically recovers classical features, indicating an emergent universality across statistical regimes. Furthermore, the Joule-Thomson (JT) expansion is examined to analyze the temperature-pressure response during adiabatic processes. Key thermodynamic quantities, including mass, temperature, heat capacity, Gibbs free energy, enthalpy, internal energy, and the JT coefficient, are computed under the influence of non-extensive entropy corrections. These results provide deeper insight into black hole thermodynamics in quantum-corrected spacetimes and offer new avenues for exploring gravitational systems beyond the traditional Bekenstein-Hawking (BH) framework.", "url": "https://arxiv.org/abs/2607.07234", "type": "理论", "summary": "这项工作通过在非相互作用时空模型和扩展熵框架中结合高阶修正来研究变形 AdS-Schwarzschild 黑洞的热力学行为。为了解决经典统计力学在描述具有非局域和长程相互作用的引力系统方面的不足，我们采用非广延熵形式主义，特别是 Tsallis 和 Barrow 熵，它们捕获量子尺度偏差和扩展相关性。由此产生的热力学分析揭示了强熵变形下与传统黑洞行为的显着偏离。值得注意的是，随着非广延性程度的降低，系统逐渐恢复经典特征，这表明统计体系中出现了普遍性。此外，还检查了焦耳-汤姆逊 (JT) 展开式，以分析绝热过程中的温度-压力响应。关键热力学量，包括质量、温度、热容、吉布斯自由能、焓、内能和 JT 系数，都是在非扩展熵校正的影响下计算的。\n\n这些结果为量子校正时空中的黑洞热力学提供了更深入的见解，并为探索传统贝肯斯坦-霍金（BH）框架之外的引力系统提供了新途径。", "authors": [{"name": "Jafar Sadeghi"}, {"name": "Fatemeh Khosravani"}, {"name": "Alireza Amani"}], "featured_authors": [{"name": "Jafar Sadeghi"}, {"name": "Fatemeh Khosravani"}, {"name": "Alireza Amani"}], "author_count": 3}, {"id": "2607.07255", "category": "hep-th", "title": "Airy functions from quantum M-theory", "abstract": "We show that Airy function partition functions for M2-brane theories may be derived from relative equivariant localization of quantum M-theory. The eleven-dimensional Chern--Simons coupling gives the cubic term in the grand potential, while the $X_8$ correction gives the charge shift. Fixing the M2-brane charge turns the localized M-theory path integral into an Airy integral. In this way we derive the ABJM result, its toric Calabi--Yau generalizations, and gravitational blocks for black holes and other spacetimes, up to the prefactor and non-perturbative corrections.", "url": "https://arxiv.org/abs/2607.07255", "type": "理论", "summary": "我们表明，M2 膜理论的艾里函数配分函数可以从量子 M 理论的相对等变局域化中导出。十一维 Chern-Simons 耦合给出了大势的三次项，而 $X_8$ 校正给出了电荷位移。固定 M2 膜电荷将局部 M 理论路径积分转变为艾里积分。通过这种方式，我们得出 ABJM 结果、其环面卡拉比-丘概括、以及黑洞和其他时空的引力块，直至前因子和非微扰校正。", "authors": [{"name": "Pietro Benetti Genolini"}, {"name": "Florian Gaar"}, {"name": "Jerome P. Gauntlett"}, {"name": "Jaeha Park"}, {"name": "James Sparks"}], "featured_authors": [{"name": "Pietro Benetti Genolini"}, {"name": "Florian Gaar"}, {"name": "Jerome P. Gauntlett"}, {"name": "Jaeha Park"}, {"name": "James Sparks"}], "author_count": 5}, {"id": "2607.07295", "category": "hep-th", "title": "Massive Graviton Dark Matter from a Gapped Continuum", "abstract": "We consider the possibility of dark matter in a warped extra-dimensional theory in presence of a linear dilaton background, with a gapped continuum spectrum, in a brane-world cosmological scenario. Firstly, triggered by self-energy radiative corrections, we study the existence of an isolated resonance of massive gravitons, and its realization as a long-lived feebly interacting dark matter candidate, produced by the freeze-in mechanism. This massive graviton is proved to satisfy all theoretical and experimental constraints, in the sub-MeV mass range. We further consider the close relationship between the existence of this component of dark matter and the presence of an inflaton localized on the brane, with a mass around $10^{11}$ GeV and a sub-TeV reheating temperature, in a brane inflationary scenario that allows to reproduce the most recent cosmological observables. Secondly, the gapped continuum of gravitons, a particular five dimensional realization of the physics of unparticles, is identified as a holographic fluid which can play the role of holographic dark matter. The production of the holographic fluid goes by an ultra-violet freeze-in mechanism, with an abundance mainly depending on the reheating temperature. Depending on the values of the mass gap and the reheating temperature, one or both components of dark matter can be present.", "url": "https://arxiv.org/abs/2607.07295", "type": "理论", "summary": "我们考虑在膜世界宇宙学场景中，在存在线性膨胀背景、具有间隙连续谱的情况下，在扭曲的超维度理论中存在暗物质的可能性。首先，在自能辐射校正的触发下，我们研究了大质量引力子的孤立共振的存在，以及它作为由冻结机制产生的长寿命弱相互作用暗物质候选者的实现。事实证明，这种巨大的引力子在亚兆电子伏质量范围内满足所有理论和实验约束。我们进一步考虑了暗物质这一成分的存在与膜上局部暴胀子的存在之间的密切关系，该暴胀子的质量约为 10^{11}$ GeV 左右，再加热温度低于 TeV，在膜暴胀场景中，可以重现最新的宇宙学观测结果。其次，引力子的有隙连续体，即非粒子物理的特殊五维实现，被认为是一种全息流体，可以发挥全息暗物质的作用。\n\n全息流体的生产通过紫外线冻结机制进行，其丰度主要取决于再加热温度。根据质量间隙和再加热温度的值，可以存在暗物质的一种或两种成分。", "authors": [{"name": "Eugenio Megias"}, {"name": "Miguel Prieto"}, {"name": "Mariano Quiros"}], "featured_authors": [{"name": "Eugenio Megias"}, {"name": "Miguel Prieto"}, {"name": "Mariano Quiros"}], "author_count": 3}, {"id": "2607.07342", "category": "hep-th", "title": "Horizon-Restricted Leading Soft QED as Open Quantum System", "abstract": "I formulate black-hole-horizon-induced decoherence of charged branch codes as the leading-soft QED restricted to an exterior algebra, formulated as an open quantum system. The fixed-history Feynman--Vernon identity ${\\cal F}[J,J]=1$ remains exact. Decoherence enters through the unequal-history influence factor that survives exterior monitoring and belongs to the complementary horizon output. In the coherent eikonal regime, I derive the completely positive Schur channel $({\\cal E}_H^{(0)}\\rho)_{ab}=\\langle\\Phi_b^{H,(0)}|\\Phi_a^{H,(0)}\\rangle \\, \\rho_{ab}$. The leading soft input is the eikonal factor, projected onto the horizon radiative algebra. The channel yields Gram-positivity constraints, an exterior quantum-eraser bound, finite-time non-Markovianity tests, soft/hard scaling criteria, and a charged-qutrit interferometer measuring a leading-soft Bargmann holonomy. The holonomy phase is the rephasing-invariant symplectic area of a triangle in horizon soft phase space. I show that its orientation, common-mode, triangulation, and completely positive determinant identities render falsifiable tests beyond pairwise two-path visibility.", "url": "https://arxiv.org/abs/2607.07342", "type": "理论", "summary": "我将黑洞视界引起的带电分支码退相干公式化为受限于外部代数的领先软 QED，公式化为开放量子系统。固定历史费曼-弗农恒等式 ${\\cal F}[J,J]=1$ 仍然准确。退相干通过不等历史影响因素进入，该影响因素在外部监测中幸存下来，属于互补的视界输出。在相干转角​​体系中，我推导出完全正的 Schur 通道 $({\\cal E}_H^{(0)}\\rho)_{ab}=\\langle\\Phi_b^{H,(0)}|\\Phi_a^{H,(0)}\\rangle \\, \\rho_{ab}$。主要的软输入是映射因子，投影到地平线辐射代数上。该通道产生革兰氏阳性约束、外部量子擦除器界限、有限时间非马尔可夫性测试、软/硬缩放标准以及测量领先软巴格曼完整性的带电量子干涉仪。完整相是视界软相空间中三角形的重定相不变辛区域。我证明了它的方向、共模、三角测量和完全正的行列式恒等式使得可证伪的测试超出了成对双路径可见性。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2607.07347", "category": "hep-th", "title": "Thermodynamic limit for SO(2N) gauge theories with spinors/conjugate spinors", "abstract": "In this paper, we investigate five-dimensional $\\mathcal{N} = 1$ supersymmetric $SO(2N)$ gauge theories coupled to hypermultiplets in spinor/conjugate spinor representation based on 5-brane web constructions with O5-planes. Based on the topological vertex formalism with O5-plane, we find new expressions for the partition functions for these theories, emphasizing the difference between the case with two spinors and that with one spinor and one conjugate spinor. Through the thermodynamic limit of these partition functions, we derive the Cameral and Seiberg-Witten curves. We show that the difference between the spinor and the conjugate spinor appears as a difference in the boundary conditions of the Seiberg-Witten curves at the orientifold planes.", "url": "https://arxiv.org/abs/2607.07347", "type": "理论", "summary": "在本文中，我们基于 O5 平面的 5 膜网结构，研究了与旋量/共轭旋量表示中的超多重态耦合的五维 $\\mathcal{N} = 1$ 超对称 $SO(2N)$ 规范理论。基于O5平面的拓扑顶点形式，我们找到了这些理论的配分函数的新表达式，强调了具有两个旋量的情况和具有一个旋量和一个共轭旋量的情况之间的区别。通过这些配分函数的热力学极限，我们推导出Camral 和Seiberg-Witten 曲线。我们表明，旋量和共轭旋量之间的差异表现为 Seiberg-Witten 曲线在 orientifold 平面上的边界条件的差异。", "authors": [{"name": "Xiaobin Li"}, {"name": "Futoshi Yagi"}], "featured_authors": [{"name": "Xiaobin Li"}, {"name": "Futoshi Yagi"}], "author_count": 2}, {"id": "2607.07364", "category": "hep-th", "title": "Topological changes and response singularities in black hole thermodynamic branch structure", "abstract": "Different diagnostics of black hole thermodynamic branch structure do not always identify the same local event. We examine this issue in charged AdS black hole examples where a thermodynamic topological phase transition is known to occur. In these examples, previously reported in [JHEP 06 (2024) 213}], the inverse temperature $\\tau_a$ at which the total topological number changes is separated from the inverse temperature $\\tau_b$ at which the fixed charge parameter branch response considered here becomes singular. Reanalyzing the same zero point branch geometry, we find that the two diagnostics track different local structures. The change at $\\tau_a$ is a boundary membership and index flow event of the positive radius physical branch set: a zero point with nonzero winding enters or leaves the counted domain. The singularity at $\\tau_b$ is instead caused by a turning point at finite radius, where a pair of branches annihilates. Since the two branches carry opposite windings, this event changes the branch count but preserves the total topological number. Thus, in the analyzed examples, the thermodynamic topological phase transition and the branch response singularity are distinct diagnostics of the same zero point branch geometry, with different local origins.", "url": "https://arxiv.org/abs/2607.07364", "type": "理论", "summary": "黑洞热力学分支结构的不同诊断并不总是识别相同的局部事件。我们在带电 AdS 黑洞示例中研究了这个问题，其中已知会发生热力学拓扑相变。在[JHEP 06 (2024) 213}]中先前报道的这些示例中，总拓扑数变化时的逆温度$\\tau_a$与这里考虑的固定电荷参数分支响应变为奇异时的逆温度$\\tau_b$是分开的。重新分析相同的零点分支几何结构，我们发现两种诊断跟踪不同的局部结构。 $\\tau_a$ 处的变化是正半径物理分支集的边界隶属度和索引流事件：非零缠绕的零点进入或离开计数域。 $\\tau_b$ 处的奇点是由有限半径处的转折点引起的，其中一对分支湮灭。由于两个分支具有相反的绕组，因此该事件会更改分支计数，但保留总拓扑数。\n\n因此，在分析的例子中，热力学拓扑相变和分支响应奇点是具有不同局部起源的相同零点分支几何形状的不同诊断。", "authors": [{"name": "Di Wu"}], "featured_authors": [{"name": "Di Wu"}], "author_count": 1}, {"id": "2607.07495", "category": "hep-th", "title": "Phenomena in the kink-antikink Collisions of $ϕ^8$ Theory", "abstract": "We investigated kink-antikink collisions in a $(1+1)$-dimensional $\\phi^8$ scalar field theory with multiple degenerate vacua. We presented explicit soliton solutions for different vacuum structures characterized by the ratio $n = p_2/p_1$. We focused on the cases $n=2$ and $n=3$ with four distinct vacua, and performed systematic numerical simulations across all topological sectors. We revealed that there is a complete annihilation regime in the $(1/2,\\,1)$ sector, where kink-antikink pairs annihilate for all initial velocities. Up to our knowledge, such phenomenon is first reported in the kink antikink collisions. We revealed a comprehensive fractal cartography of multi-bounce resonance windows across sectors $(-1,\\,-1/2)$, $(-1,\\,-1/3)$, and $(-1/3,\\,1/3)$. Given the kink antikink ($K\\bar{K}$, or $\\bar{K}K$) ordering, the effective potential and the spectrum of the Schrödinger like equation were presented. By collecting all the effective potential and collision phenomena, we proposed that the effective potential classification scheme provides a predictive framework for collision outcomes including escape, bion formation, sector change, and annihilation. Especially, it is identified that, when soliton pairs pass through each other, the abrupt changes of the potential type could explain both the sector-change and annihilation phenomena. Our work highlight novel dynamical features of the $\\phi^8$ model absent in lower-order field theories, and establish connections between topological structure, vibrational modes, and effective potentials.", "url": "https://arxiv.org/abs/2607.07495", "type": "理论", "summary": "我们研究了具有多个简并真空的 $(1+1)$ 维 $\\phi^8$ 标量场理论中的扭结-反扭结碰撞。我们提出了不同真空结构的显式孤子解，其特征在于比率 $n = p_2/p_1$。我们重点关注具有四个不同真空的 $n=2$ 和 $n=3$ 情况，并对所有拓扑扇区进行了系统的数值模拟。我们揭示了 $(1/2,\\,1)$ 区域存在完全湮灭机制，其中扭结-反扭结对对于所有初始速度都会湮灭。据我们所知，这种现象是在扭结反扭结碰撞中首次报道的。我们揭示了跨扇区 $(-1,\\,-1/2)$、$(-1,\\,-1/3)$ 和 $(-1/3,\\,1/3)$ 的多反射共振窗口的综合分形制图。给定扭结反扭结（$K\\bar{K}$ 或 $\\bar{K}K$）排序，给出了类薛定谔方程的有效势和谱。通过收集所有有效势和碰撞现象，我们提出有效势分类方案为碰撞结果（包括逃逸、生物体形成、扇区变化和湮灭）提供了预测框架。\n\n特别是，人们发现，当孤子对相互穿过时，势类型的突变可以解释扇区变化和湮灭现象。我们的工作突出了低阶场论中不存在的 $\\phi^8$ 模型的新颖动力学特征，并建立了拓扑结构、振动模式和有效势之间的联系。", "authors": [{"name": "Yun Feng"}, {"name": "Yunguo Jiang"}], "featured_authors": [{"name": "Yun Feng"}, {"name": "Yunguo Jiang"}], "author_count": 2}, {"id": "2607.07621", "category": "hep-th", "title": "Odd-Dimensional Localization in Supergravity", "abstract": "We establish a localization principle for odd-dimensional supergravity theories containing Chern--Simons interactions. Our construction relies on combining an equivariant extension of the gauge-invariant part of the action with an equivariant completion of the Chern--Simons anomaly form ${\\Phi}^{(\\text{anom})}$ to form a relative equivariant cohomology class. This leads to a universal fixed point formula for the on-shell action of supersymmetric solutions that is expressed in terms of ${\\Phi}^{(\\text{anom})}$ and an equivariant Euler class. We illustrate the formalism in $D=11$ and $D=5$ supergravity, with applications including the supersymmetric Casimir energy and superconformal index of M5-branes, as well as black ring and black lens solutions.", "url": "https://arxiv.org/abs/2607.07621", "type": "理论", "summary": "我们建立了包含陈-西蒙斯相互作用的奇维超引力理论的定域原理。我们的构造依赖于将作用的规范不变部分的等变扩展与 Chern-Simons 异常形式 ${\\Phi}^{(\\text{anom})}$ 的等变完成相结合，以形成相对等变上同调类。这导致了超对称解的壳上作用的通用不动点公式，用 ${\\Phi}^{(\\text{anom})}$ 和等变的欧拉类表示。我们说明了 $D=11$ 和 $D=5$ 超引力的形式主义，其应用包括超对称卡西米尔能量和 M5 膜的超共形指数，以及黑环和黑透镜解决方案。", "authors": [{"name": "Pietro Benetti Genolini"}, {"name": "Florian Gaar"}, {"name": "Jerome P. Gauntlett"}, {"name": "Jaeha Park"}, {"name": "James Sparks"}], "featured_authors": [{"name": "Pietro Benetti Genolini"}, {"name": "Florian Gaar"}, {"name": "Jerome P. Gauntlett"}, {"name": "Jaeha Park"}, {"name": "James Sparks"}], "author_count": 5}, {"id": "2607.07684", "category": "hep-th", "title": "Unification of polynomial and exponential cosmological attractors", "abstract": "We introduce a family of simple $\\alpha$-attractor models that can interpolate between exponential and polynomial cosmological attractors. By varying the interpolation parameter $\\mu$ in these models, one can scan a wide range of values of the spectral index $n_{s}$ matching any combination of CMB and DESI data.", "url": "https://arxiv.org/abs/2607.07684", "type": "理论", "summary": "我们引入了一系列简单的 $\\alpha$-吸引子模型，可以在指数和多项式宇宙吸引子之间进行插值。通过改变这些模型中的插值参数 $\\mu$，我们可以扫描与 CMB 和 DESI 数据的任意组合相匹配的频谱索引 $n_{s}$ 的大范围值。", "authors": [{"name": "Renata Kallosh"}, {"name": "Andrei Linde"}], "featured_authors": [{"name": "Renata Kallosh"}, {"name": "Andrei Linde"}], "author_count": 2}, {"id": "2607.06800", "category": "math-ph", "title": "On the Geometrical and Kinematical Foundations of the Symmetric Relativity Model: Lorentz Transformation and Time Dilation", "abstract": "We examine the kinematic foundations of relativity by considering two inertial frames, $S$ and $S'$, in a standard configuration, where $S'$ moves along the common spatial $x$-axis at a constant velocity $v$. By relaxing Einstein's second postulate regarding the universal invariance of the one-way speed of light, we adopt an operational framework grounded strictly on the directly observable two-way (round-trip) speed of light, evaluated alongside the principles of spacetime homogeneity, linearity, and reciprocity. Within this setting, we demonstrate that: (i) the classical Lorentz transformation is recovered exactly along the coordinate axes under a generalized two-way synchronization scheme without requiring Einstein's second postulate; (ii) Langevin's light-clock argument fundamentally implies that the longitudinal scale factor $b$ matches the standard Lorentz factor $\\gamma$; and (iii) transverse lengths remain strictly invariant ($b_z = 1$). Crucially, to resolve the ontic paradox of multiple co-existing wavefront centers, we introduce a kinematically symmetric model relative to an absolute cosmological rest frame (or geometric anchor) $K$, wherein $S$ and $S'$ move with equal and opposite velocities ($u$ and $-u$, respectively). Within this generalized framework, allowing for anisotropic one-way light propagation via Reichenbach-type parameters ($\\varepsilon$ or $\\kappa$) yields a consistent, linear velocity-addition law, a generalized Doppler effect, and a flat but oblique spacetime metric. Finally, we prove that all round-trip observables remain strictly invariant under synchronization gauge transformations (reflecting the Tangherlini-Edwards perspective) and demonstrate that the resulting non-diagonal metric structure is fully consistent withthe Sagnac effect over closed spatial loops.", "url": "https://arxiv.org/abs/2607.06800", "type": "理论", "summary": "我们通过考虑标准配置中的两个惯性系 $S$ 和 $S'$ 来检查相对论的运动学基础，其中 $S'$ 以恒定速度 $v$ 沿公共空间 $x$ 轴移动。通过放松爱因斯坦关于单向光速普遍不变性的第二个假设，我们采用了一种严格基于可直接观测的双向（往返）光速的操作框架，并根据时空均匀性、线性和互易性原理进行评估。在此设置中，我们证明：（i）在广义双向同步方案下沿着坐标轴精确恢复经典洛伦兹变换，而不需要爱因斯坦的第二假设； (ii) 朗之万的光钟论证从根本上意味着纵向比例因子 $b$ 与标准洛伦兹因子 $\\gamma$ 匹配； (iii) 横向长度保持严格不变 ($b_z = 1$)。\n\n至关重要的是，为了解决多个共存波前中心的本体悖论，我们引入了相对于绝对宇宙静止框架（或几何锚）$K$的运动学对称模型，其中$S$和$S'$以相等和相反的速度移动（分别为$u$和$-u$）。在这个广义框架内，允许通过 Reichenbach 型参数（$\\varepsilon$ 或 $\\kappa$）进行各向异性单向光传播，产生一致的线性速度加法定律、广义多普勒效应以及平坦但倾斜的时空度量。最后，我们证明所有往返可观测量在同步规范变换下保持严格不变（反映 Tangherlini-Edwards 视角），并证明所得的非对角度量结构与闭合空间环上的萨尼亚克效应完全一致。", "authors": [{"name": "Miodrag Mateljević"}], "featured_authors": [{"name": "Miodrag Mateljević"}], "author_count": 1}, {"id": "2607.06836", "category": "math-ph", "title": "Global time-analytic strong solutions for a class of 3-wave kinetic equations", "abstract": "We study a class of 3-wave kinetic equations arising in wave turbulence theory, with regularized kernels. For radial, nonnegative initial data, we construct an exact global-in-time strong solution which remains nonnegative and is analytic with respect to time. The proof combines a careful analysis of the resonant interaction surfaces with a time power-series construction and a continuation argument based on the conservation of the energy moment.", "url": "https://arxiv.org/abs/2607.06836", "type": "理论", "summary": "我们研究了波湍流理论中出现的一类带有正则核的三波动力学方程。对于径向非负初始数据，我们构建了一个精确的全局时间强解，该解保持非负并且相对于时间是可分析的。该证明将对共振相互作用面的仔细分析与时间幂级数构造以及基于能量矩守恒的连续论证相结合。", "authors": [{"name": "Nguyen Gia Hien"}, {"name": "Gigliola Staffilani"}, {"name": "Minh-Binh Tran"}], "featured_authors": [{"name": "Nguyen Gia Hien"}, {"name": "Gigliola Staffilani"}, {"name": "Minh-Binh Tran"}], "author_count": 3}, {"id": "2607.06942", "category": "math-ph", "title": "Invariant Measures for Soliton Systems Generated by Mealy Automata", "abstract": "We study invariant measures for soliton systems described by Mealy automata. Motivated by recently introduced soliton models associated with 2-letter, 3-state Mealy automata, we formulate the time evolution induced by Mealy automata on bi-infinite configuration spaces. We provide sufficient conditions for the invariance of Bernoulli product measures and derive a criterion for the invariance of two-sided space-homogeneous Markov distributions. We then apply these general results to three soliton models, which can be interpreted as variants of the box-ball system (BBS). For two of these models, BBS-S(2) and BBS-V(2), we prove that Bernoulli product measures are invariant. For the remaining model, BBS-C(2), we establish a more general result: the invariance of two-sided space-homogeneous Markov distributions, which include Bernoulli product measures as a special case. Furthermore, for all three models, we compute the phase shift associated with the interaction of two solitons, as well as the velocity of an isolated soliton. Although the latter has already been studied previously, both quantities constitute fundamental characteristics for understanding the generalized hydrodynamics of these systems. These results provide a foundation for the study of invariant measures, generalized Gibbs ensembles, and generalized hydrodynamic behavior in Mealy-automaton soliton systems.", "url": "https://arxiv.org/abs/2607.06942", "type": "理论", "summary": "我们研究 Mealy 自动机描述的孤子系统的不变测度。受最近引入的与 2 字母、3 状态 Mealy 自动机相关的孤子模型的启发，我们在双无限配置空间上制定了由 Mealy 自动机引起的时间演化。我们为伯努利乘积测度的不变性提供了充分的条件，并推导了两侧空间齐次马尔可夫分布的不变性准则。然后，我们将这些一般结果应用于三个孤子模型，这可以解释为盒球系统（BBS）的变体。对于其中两个模型 BBS-S(2) 和 BBS-V(2)，我们证明伯努利乘积测度是不变的。对于剩下的模型 BBS-C(2)，我们建立了一个更一般的结果：两侧空间同质马尔可夫分布的不变性，其中包括作为特例的伯努利乘积测度。此外，对于所有三个模型，我们计算与两个孤子相互作用相关的相移，以及孤立孤子的速度。\n\n尽管先前已经研究过后者，但这两个量构成了理解这些系统的广义流体动力学的基本特征。这些结果为研究 Mealy 自动机孤子系统中的不变测度、广义吉布斯系综和广义流体动力学行为奠定了基础。", "authors": [{"name": "Takahiro Kanazawa"}, {"name": "Yutaro Nakabayashi"}], "featured_authors": [{"name": "Takahiro Kanazawa"}, {"name": "Yutaro Nakabayashi"}], "author_count": 2}, {"id": "2607.07057", "category": "math-ph", "title": "Hamiltonian reduction from particular integrals", "abstract": "We develop a geometric reduction mechanism generated by particular integrals. A family of functions whose time derivatives close linearly on the same family defines an invariant zero-level submanifold. In the Hamiltonian case, if this family is in involution, the restricted dynamics is presymplectic, and its characteristic quotient carries a reduced Hamiltonian flow. This yields a direct bridge between particular integrals, presymplectic reduction, and lower-dimensional Hamiltonian dynamics, and leads to a Liouville-type notion of particular integrability. We illustrate the framework through mechanical examples and lift constructions, including variants of the Eisenhart lift.", "url": "https://arxiv.org/abs/2607.07057", "type": "理论", "summary": "我们开发了一种由特定积分生成的几何简化机制。其时间导数在同一族上线性接近的函数族定义了不变的零级子流形。在哈密顿量情况下，如果该族是对合的，则受限动力学是预辛的，并且其特征商带有减少的哈密顿流。这在特定积分、预辛约简和低维哈密顿动力学之间产生了直接的桥梁，并导致了特定可积性的刘维尔型概念。我们通过机械示例和电梯结构（包括艾森哈特电梯的变体）来说明该框架。", "authors": [{"name": "R. Azuaje"}, {"name": "A. M. Escobar-Ruiz"}, {"name": "I. Gutierrez-Sagredo"}], "featured_authors": [{"name": "R. Azuaje"}, {"name": "A. M. Escobar-Ruiz"}, {"name": "I. Gutierrez-Sagredo"}], "author_count": 3}, {"id": "2607.07692", "category": "math-ph", "title": "Error bounds for the truncated Baker--Campbell--Hausdorff and Zassenhaus formulas in unitary problems", "abstract": "The Baker--Campbell--Hausdorff (BCH) formula plays a critical role in many branches of mathematics and physics. It expresses the logarithm of the product of exponentials of non-commuting operators as an infinite series of nested commutators of the operators involved. The Zassenhaus formula is the dual of the BCH formula: the exponential of a sum of operators is written as an infinite product of exponentials involving the operators and their commutators. In practical computations, however, one typically has to truncate the expansions, and so understanding the error committed by the resulting approximations and eventually providing suitable bounds for this error is of paramount interest. In this work we present a general strategy to derive rigorous error bounds and explicit error constants for the BCH and Zassenhaus formulas when the operators involved are skew-adjoint, as is the case for quantum evolution problems.", "url": "https://arxiv.org/abs/2607.07692", "type": "理论", "summary": "Baker-Campbell-Hausdorff (BCH) 公式在数学和物理学的许多分支中发挥着至关重要的作用。它将非交换算子的指数乘积的对数表示为所涉及算子的无限级数嵌套交换子。 Zassenhaus 公式是 BCH 公式的对偶：运算符之和的指数被写为涉及运算符及其换向器的指数的无限乘积。然而，在实际计算中，通常必须截断展开式，因此了解由此产生的近似值所产生的误差并最终为该误差提供合适的界限是至关重要的。在这项工作中，我们提出了一种通用策略，当涉及的算子是斜伴随的（量子演化问题的情况）时，为 BCH 和 Zassenhaus 公式导出严格的误差界限和显式误差常数。", "authors": [{"name": "A. Arnal"}, {"name": "F. Casas"}, {"name": "J.L. Ruiz-Benito"}], "featured_authors": [{"name": "A. Arnal"}, {"name": "F. Casas"}, {"name": "J.L. Ruiz-Benito"}], "author_count": 3}, {"id": "2607.06672", "category": "quant-ph", "title": "Spin singlets are useful", "abstract": "We evaluate the utility of the spin-zero manifold of an exchange-coupled array of $N$ spins for tasks in quantum computation and quantum simulation. Since pairs of electrons can be readily initialized into a product state of singlets in semiconducting quantum dot arrays, the full spin-zero manifold is available with exchange-only control, providing a Hilbert space of approximate dimension $2^N/(N/2)^{3/2}$, asymptotically close to the $2^N$ dimension of the full spin Hilbert space. Leveraging the spin-zero manifold enables larger computational space in a given array compared to traditional exchange-only control, in which spin arrays are organized into modular units of $n$ spins comprising $N/n$ encoded qubits, limiting to the exponentially smaller Hilbert dimension $2^{N/n}$. Here we focus on benchmarking metrics for this resource utilization by generalizing cross-entropy benchmarking, mirror benchmarking, and out-of-time-ordered correlators to this system. We show that operating in the spin-zero manifold can accelerate the realization of computational quantum advantage applications in semiconductor-based spin qubits.", "url": "https://arxiv.org/abs/2607.06672", "type": "数值", "summary": "我们评估了 $N$ 自旋交换耦合阵列的自旋零流形对于量子计算和量子模拟任务的效用。由于电子对可以很容易地初始化为半导体量子点阵列中单线态的乘积态，因此完整的自旋零流形可通过仅交换控制来获得，从而提供近似维度 $2^N/(N/2)^{3/2}$ 的希尔伯特空间，渐近地接近全自旋希尔伯特空间的 $2^N$ 维度。与传统的仅交换控制相比，利用自旋零流形可以在给定阵列中实现更大的计算空间，在传统的仅交换控制中，自旋阵列被组织成包含 $N/n$ 编码量子位的 $n$ 自旋的模块化单元，限制为指数较小的希尔伯特维度 $2^{N/n}$。在这里，我们通过将交叉熵基准测试、镜像基准测试和乱序相关器推广到该系统，重点关注该资源利用率的基准测试指标。我们证明，在自旋零流形中运行可以加速基于半导体的自旋量子位中计算量子优势应用的实现。", "authors": [{"name": "Silas Hoffman"}, {"name": "Edward H. Chen"}, {"name": "Matthew Brooks"}, {"name": "Stephen Carr"}, {"name": "Daniel Volya"}, {"name": "Alan Tran"}, {"name": "Tyler Keating"}, {"name": "Thaddeus D. Ladd"}, {"name": "Charles Tahan"}], "featured_authors": [{"name": "Silas Hoffman"}, {"name": "Edward H. Chen"}, {"name": "Matthew Brooks"}, {"name": "Tyler Keating"}, {"name": "Thaddeus D. Ladd"}, {"name": "Charles Tahan"}], "author_count": 9}, {"id": "2607.06683", "category": "quant-ph", "title": "Universal purification dynamics of monitored Clifford circuits", "abstract": "Quantum circuits under sufficiently weak monitoring purify on a timescale $T_P$ exponentially long in the system size. This slowness underlies a universal purification dynamics, whose quantitative description has so far required the replica trick, with a delicate analytic continuation. We show that monitored Clifford circuits on $L$ qudits of prime dimension $q$ bypass this construction entirely: in the scaling limit at fixed $x = t/T_P(L)$, purification reduces to the Markovian decay of the density-matrix rank, an exactly solvable death process descending from infinity. We compute the full scaling functions in compact form: all Rényi entropies collapse onto a universal curve $\\langle S(x) \\rangle$. Exact stabilizer simulations at $q=2,3,5$ confirm the predictions, with no fitting parameter for the global model and $T_P$ as the only fitted scale for local brick-wall circuits. Also, the replica problem amounts to a tilted version of the same Markov process, in agreement with exact computations from the Clifford commutant. Finally, the quantization of the rank leaves two hallmarks that distinguish Clifford dynamics from generic monitored circuits: the entropy fluctuations saturate at short scaled times $x\\to0$ to an $O(1)$ variance, instead of vanishing, and observables develop a temporal modulation periodic in $\\log_q x$, which cannot be captured by the replica approach.", "url": "https://arxiv.org/abs/2607.06683", "type": "理论+数值", "summary": "在足够弱的监控下，量子电路在系统规模中呈指数级增长的时间尺度 $T_P$ 上进行净化。这种缓慢是普遍净化动力学的基础，迄今为止，其定量描述需要复制技巧，以及微妙的分析延续。我们表明，在素数维度 $q$ 的 $L$ qudits 上受监控的克利福德电路完全绕过了这种构造：在固定 $x = t/T_P(L)$ 的缩放极限中，净化减少到密度矩阵等级的马尔可夫衰减，这是一个从无穷大下降的完全可解的死亡过程。我们以紧凑的形式计算完整的缩放函数：所有 Rényi 熵都塌陷到通用曲线 $\\langle S(x) \\rangle$ 上。 $q=2,3,5$ 处的精确稳定器模拟证实了预测，全局模型没有拟合参数，而 $T_P$ 是局部砖墙电路的唯一拟合尺度。此外，副本问题相当于同一马尔可夫过程的倾斜版本，与 Clifford 交换子的精确计算一致。\n\n最后，秩的量化留下了两个特征，将 Clifford 动力学与通用监控电路区分开来：熵波动在短尺度时间 $x\\to0$ 下饱和到 $O(1)$ 方差，而不是消失，并且可观测量在 $\\log_q x$ 中形成时间调制周期，这无法通过复制方法捕获。", "authors": [{"name": "Beatrice Magni"}, {"name": "Federico Gerbino"}, {"name": "Xhek Turkeshi"}, {"name": "Andrea De Luca"}], "featured_authors": [{"name": "Beatrice Magni"}, {"name": "Federico Gerbino"}, {"name": "Xhek Turkeshi"}, {"name": "Andrea De Luca"}], "author_count": 4}, {"id": "2607.06718", "category": "quant-ph", "title": "Quantum error correction of a grid-state qubit with state preparation and measurement errors below $10^{-3}$", "abstract": "Grid state qubits offer a hardware-efficient approach to large-scale fault-tolerant quantum computing. They access the information redundancy required for quantum error correction by exploiting the large Hilbert space naturally available in harmonic oscillators. Superconducting architectures are particularly suitable to implement grid state qubits due to their fast and high-fidelity operations. Grid states in superconducting circuits enable quantum error correction (QEC) with performance beyond break-even. However, the state preparation and measurements (SPAM) errors of grid states has been a significant limitation to computational performances. In this work, we leverage high-performance QEC to enable repeat-until-success state preparation of both cardinal and magic states of the single-mode grid-state qubit. We combine this with an improved measurement protocol that corrects for both finite-energy envelope and auxiliary qubit readout errors, and increases robustness to photon loss. Our experiments, using both techniques, achieve a combined state-preparation and measurement error below $10^{-3}$. This represents two orders-of-magnitude improvement over the state of the art, bringing this platform on par with standard SPAM error levels measured in transmon qubits.", "url": "https://arxiv.org/abs/2607.06718", "type": "实验", "summary": "网格状态量子位为大规模容错量子计算提供了一种硬件高效的方法。他们通过利用谐振子中自然可用的大希尔伯特空间来获取量子纠错所需的信息冗余。超导架构由于其快速和高保真度的操作而特别适合实现网格状态量子位。超导电路中的网格状态可实现量子纠错（QEC），其性能超越收支平衡。然而，网格状态的状态准备和测量（SPAM）误差一直是计算性能的重大限制。在这项工作中，我们利用高性能 QEC 来实现单模式网格状态量子位的基本状态和幻数状态的重复直到成功状态准备。我们将其与改进的测量协议相结合，该协议可纠正有限能量包络和辅助量子位读出错误，并提高对光子损失的鲁棒性。我们的实验使用这两种技术，实现了低于 10^{-3}$ 的组合状态准备和测量误差。\n\n这代表了比现有技术高出两个数量级的改进，使该平台与以 transmon 量子位测量的标准 SPAM 错误水平相当。", "authors": [{"name": "Sara Turcotte"}, {"name": "Lucas St-Jean"}, {"name": "Amélie L. Pessonneaux"}, {"name": "Ross Shillito"}, {"name": "Bohdan Kulchytskyy"}, {"name": "Eliott Ouellet"}, {"name": "Jean Olivier Simoneau"}, {"name": "Florian Hopfmueller"}, {"name": "Matthew Hamer"}, {"name": "Pascal Lemieux"}, {"name": "Dany Lachance-Quirion"}, {"name": "Baptiste Royer"}, {"name": "Nicholas E. Frattini"}], "featured_authors": [{"name": "Sara Turcotte"}, {"name": "Lucas St-Jean"}, {"name": "Amélie L. Pessonneaux"}, {"name": "Dany Lachance-Quirion"}, {"name": "Baptiste Royer"}, {"name": "Nicholas E. Frattini"}], "author_count": 13}, {"id": "2607.06752", "category": "quant-ph", "title": "Feynman's clock and hierarchy-informed sampling for quantum error mitigation", "abstract": "Near-term physical implementations of quantum algorithms require efficient quantum error mitigation schemes to reduce quantum noise. In this letter we propose a new mitigation technique, by extending the applicability of our BBGKY-ISM scheme from quantum simulations of spin chains to arbitrary quantum circuits. We map executions of quantum circuits using Feynman's clock Hamiltonian to the Hamiltonian dynamics of a corresponding quantum system, whose time evolution obeys a BBGKY-like hierarchy of equations informing the BBGKY-ISM mitigation. We show that the method's classical and quantum overheads are polynomial in the circuit size and in the number of qubits. We apply our method to numerical simulations of tunable Bell state preparation circuits under state-of-the-art quantum noise, and numerically demonstrate its systematic and controllable quantum error reduction capability.", "url": "https://arxiv.org/abs/2607.06752", "type": "理论+数值", "summary": "量子算法的近期物理实现需要有效的量子错误缓解方案来减少量子噪声。在这封信中，我们提出了一种新的缓解技术，将 BBGKY-ISM 方案的适用性从自旋链的量子模拟扩展到任意量子电路。我们使用费曼时钟哈密顿量将量子电路的执行映射到相应量子系统的哈密顿动力学，其时间演化遵循类似 BBGKY 的方程层次结构，从而通知 BBGKY-ISM 缓解。我们证明了该方法的经典和量子开销在电路大小和量子位数量上是多项式的。我们将我们的方法应用于最先进量子噪声下的可调谐贝尔态制备电路的数值模拟，并数值证明了其系统可控的量子误差降低能力。", "authors": [{"name": "Theo Saporiti"}], "featured_authors": [{"name": "Theo Saporiti"}], "author_count": 1}, {"id": "2607.06783", "category": "quant-ph", "title": "Secret Key Rate Analysis of Distribution Matching Algorithms for Discrete-Modulated CV-QKD", "abstract": "Continuous variable quantum key distribution protocols (CV-QKD) with discrete modulation have been intensively investigated to bridge the gap between ideal Gaussian modulation and modern coherent optical communication systems. To mitigate the penalty of discrete modulation, probabilistic constellation shaping (PCS) is applied to the modulation format and is typically performed by distribution matching (DM) algorithms. In this paper, we address the application of DM algorithms to perform PCS in CV-QKD protocols. We investigate the impact of approximating optimized Maxwell-Boltzman distributions with DM algorithms based on Huffman (HDM) and constant composition (CCDM) codes on the protocol's secret key rate (SKR) and tolerance to excess noise. Our results show that specifically symbol-by-symbol HDM degrades the SKR by at least 30\\%, whereas CCDM matches the optimal SKR with code length of $10^3$ or more symbols. Furthermore, we also provide a statistical analysis of symbol dependence for both approaches, showing that CCDM must operate with blocks of at least $10^5$ symbols for the correlations become negligible. Finally, we propose an algorithm to generate independent symbols following near-optimal distributions.", "url": "https://arxiv.org/abs/2607.06783", "type": "数值", "summary": "具有离散调制的连续可变量子密钥分发协议（CV-QKD）已被深入研究，以弥补理想高斯调制和现代相干光通信系统之间的差距。为了减轻离散调制的损失，概率星座整形 (PCS) 应用于调制格式，并且通常由分布匹配 (DM) 算法执行。在本文中，我们讨论了 DM 算法在 CV-QKD 协议中执行 PCS 的应用。我们研究了使用基于霍夫曼 (HDM) 和常数组合 (CCDM) 代码的 DM 算法来逼近优化的麦克斯韦-玻尔兹曼分布对协议密钥率 (SKR) 和对过量噪声的容忍度的影响。我们的结果表明，逐个符号的 HDM 会使 SKR 降低至少 30\\%，而 CCDM 可以与代码长度为 $10^3$ 或更多符号的最佳 SKR 相匹配。此外，我们还提供了两种方法的符号依赖性统计分析，表明 CCDM 必须使用至少 $10^5$ 符号的块进行操作，以使相关性可以忽略不计。\n\n最后，我们提出了一种算法来生成遵循近乎最优分布的独立符号。", "authors": [{"name": "Micael Dias"}, {"name": "Caroline Alves"}, {"name": "Gabrielly Roman"}, {"name": "Søren Forchhammer"}], "featured_authors": [{"name": "Micael Dias"}, {"name": "Caroline Alves"}, {"name": "Gabrielly Roman"}, {"name": "Søren Forchhammer"}], "author_count": 4}, {"id": "2607.06850", "category": "quant-ph", "title": "A \"squeezed polaron\" variational wavefunction for the spin boson model", "abstract": "The localization transition of the sub-Ohmic spin-boson model generates boson bath correlations that are, at low frequencies, analytically inaccessible to standard coherent-state-polaron variational ansatzes. In this paper, we introduce a ``squeezed polaron'' wavefunction incorporating generic Gaussian boson-boson correlations induced by the spin impurity. This gives the correct critical power-law scaling of bath observables near the localization transition together with a systematically improved ground state energy and a more accurate determination of the critical coupling. Our wavefunction captures the correct mean-field nature of the transition in the deep sub-Ohmic region. It also displays non-mean-field critical exponents in the shallow sub-Ohmic regime. Using the squeezed polaron as a starting point, we derive scattering phase shifts for bosons, and show how they encode the emergent energy scale that vanishes at the localization transition.", "url": "https://arxiv.org/abs/2607.06850", "type": "理论+数值", "summary": "亚欧姆自旋玻色子模型的局域化转变产生了玻色子浴相关性，这些相关性在低频下是标准相干态极化子变分分析无法分析获得的。在本文中，我们引入了一种“压缩极化子”波函数，其中包含由自旋杂质引起的通用高斯玻色子-玻色子相关性。这给出了局域化转变附近浴可观测量的正确临界幂律标度，以及系统改进的基态能量和更准确的临界耦合确定。我们的波函数捕获了深亚欧姆区域中转变的正确平均场性质。它还显示浅亚欧姆区域中的非平均场临界指数。使用压缩极化子作为起点，我们推导出玻色子的散射相移，并展示它们如何编码在局域转换时消失的涌现能量尺度。", "authors": [{"name": "Diego Barberena"}, {"name": "Nigel Cooper"}], "featured_authors": [{"name": "Diego Barberena"}, {"name": "Nigel Cooper"}], "author_count": 2}, {"id": "2607.06876", "category": "quant-ph", "title": "XOR Games at Full Tilt: The Hardness of Binary Nonlocal Games", "abstract": "It is well known that the quantum value of an XOR nonlocal game, where the winning condition depends only on the XOR of the two players' output bits, may be approximated in polynomial time. We study a variant of the XOR game model, which we call tilted XOR games, where the winning condition can additionally depend on only one of the output bits. We show that this dramatically increases the expressive power: the computational complexity of the problem of approximating the quantum value of tilted XOR games to constant precision is RE-complete. Also, our result extends to succinct versions of tilted XOR games, where the questions can be polynomial-length binary strings, generated by a polynomial-time verifier. For classical strategies, the distinction between XOR games and tilted XOR games is inconsequential. Håstad (J. ACM, 2001) shows that they are both NP-complete to approximate, by using a reduction from linear systems to XOR games. Our approach is to show that this is also quantum-sound, but as a reduction from linear system games to tilted XOR games. Since titled XOR games are a special case of binary games (where each party outputs a single bit), our result implies that binary games are RE-hard to approximate.", "url": "https://arxiv.org/abs/2607.06876", "type": "理论", "summary": "众所周知，异或非局部游戏的量子值可以在多项式时间内近似，其中获胜条件仅取决于两个玩家输出位的异或。我们研究了 XOR 游戏模型的一种变体，我们将其称为倾斜 XOR 游戏，其中获胜条件可以仅取决于一个输出位。我们证明这极大地提高了表达能力：将倾斜异或游戏的量子值近似为恒定精度的问题的计算复杂性是重新完成的。此外，我们的结果扩展到倾斜 XOR 游戏的简洁版本，其中问题可以是由多项式时间验证器生成的多项式长度的二进制字符串。对于经典策略来说，异或游戏和倾斜异或游戏之间的区别并不重要。 Håstad (J. ACM, 2001) 通过使用从线性系统到 XOR 游戏的简化，表明它们都是 NP 完全近似的。我们的方法是证明这也是量子声音，但作为从线性系统游戏到倾斜异或游戏的简化。\n\n由于 XOR 游戏是二进制游戏的特例（其中每一方输出一个比特），因此我们的结果意味着二进制游戏很难近似。", "authors": [{"name": "Richard Cleve"}, {"name": "Eric Culf"}, {"name": "Aviv Taller"}], "featured_authors": [{"name": "Richard Cleve"}, {"name": "Eric Culf"}, {"name": "Aviv Taller"}], "author_count": 3}, {"id": "2607.06888", "category": "quant-ph", "title": "Correlation Localization in Waveguide QED with Delayed Interactions", "abstract": "We study the atom-atom correlation length in an atomic array coupled to a waveguide under the Bragg condition with delayed non-Markovian interactions caused by a finite photon propagation time. Starting from a single excited atom, the excitation partially spreads among all atoms, reaching a steady state. The remaining excitation localizes near the initially excited atom, and the atom-atom correlation length decreases as a power law with the interaction delay. This localization phenomenon reveals how the delay-induced non-Markovian behavior affects the correlation transport in waveguide QED systems.", "url": "https://arxiv.org/abs/2607.06888", "type": "理论", "summary": "我们研究了布拉格条件下与波导耦合的原子阵列中的原子相关长度，以及由有限光子传播时间引起的延迟非马尔可夫相互作用。从单个激发原子开始，激发部分在所有原子之间传播，达到稳定状态。剩余的激发集中在最初激发的原子附近，原子与原子的相关长度随着相互作用延迟呈幂律减小。这种局域化现象揭示了延迟引起的非马尔可夫行为如何影响波导 QED 系统中的相关传输。", "authors": [{"name": "N. Vera"}, {"name": "F. M. Quinteros"}, {"name": "P. Barberis-Blostein"}, {"name": "P. Solano"}], "featured_authors": [{"name": "N. Vera"}, {"name": "F. M. Quinteros"}, {"name": "P. Barberis-Blostein"}, {"name": "P. Solano"}], "author_count": 4}, {"id": "2607.06932", "category": "quant-ph", "title": "Enhanced two-photon sources in a cavity-coupled two-atom system", "abstract": "We propose a component-selective scheme for improving two-photon sources in a cavity-coupled two-atom system, where a single cavity mode interacts with two two-level atoms driven by phase-controlled classical fields of the same frequency. By controlling the atomic detunings and driving phase, the system can be tailored toward optimized cavity-field two-photon blockade or strongly correlated fluorescence photon-pair emission. When the two-cavity-photon component is enhanced, the cavity field exhibits optimized two-photon blockade with simultaneous suppression of unwanted one- and three-photon components at a comparable two-photon population. In another parameter regime, strongly correlated fluorescence photon pairs can also be generated from the two atoms by selecting the double-atomic-excitation component in the same two-excitation manifold. This approach provides a route toward high-quality and versatile two-photon sources, with potential applications in few-photon quantum optics and quantum information processing.", "url": "https://arxiv.org/abs/2607.06932", "type": "数值", "summary": "我们提出了一种组件选择方案，用于改进腔耦合双原子系统中的双光子源，其中单腔模式与由相同频率的相控经典场驱动的两个两能级原子相互作用。通过控制原子失谐和驱动相位，该系统可以针对优化的腔场双光子封锁或强相关荧光光子对发射进行定制。当双腔光子分量增强时，腔场表现出优化的双光子阻挡，同时抑制可比较的双光子群体中不需要的一光子和三光子分量。在另一个参数方案中，还可以通过选择同一双激发流形中的双原子激发分量来从两个原子生成强相关的荧光光子对。这种方法提供了一条通往高质量和多功能双光子源的途径，在少光子量子光学和量子信息处理中具有潜在的应用。", "authors": [{"name": "Zhicai Chen"}, {"name": "Jun Xu"}, {"name": "Deyi Kong"}, {"name": "Xiangming Hu"}, {"name": "Fei Wang"}], "featured_authors": [{"name": "Zhicai Chen"}, {"name": "Jun Xu"}, {"name": "Deyi Kong"}, {"name": "Xiangming Hu"}, {"name": "Fei Wang"}], "author_count": 5}, {"id": "2607.06953", "category": "quant-ph", "title": "A quantum model for synchronizing finite state transition systems", "abstract": "We propose a quantum model for finding a resetting input sequence (RS) which can take a finite state transition system (FA), to particular state independent of its current state. The complexity of finding such sequences for various types of FA can be NP-Hard or even PSPACE-Complete. To this end, we represent the FA states, inputs, and transition function in quantum space. Accordingly, we propose a model to represent the execution of an input sequence of a particular length $l$ starting form an initial FA state. The model is extended considering the application in superposition of all input sequences of length $l$ to an initial state of the FA. The model is further extended considering the application of all input sequences to all initial states of the FA capturing for every input sequence the collection (ordered list) of states reached by applying the sequence to all states of the FA. The amplitude amplification algorithm is then used as it combines similar collections of reached states while preserving all input sequences that reach these collections. A Grover search for a reached collection where its elements correspond to the same FA state provides a RS for the FA. Our approach offers a quadratic gain over the exponential complexity of traditional brute-force method, which is the only method that can be applied to a general FA class. As a proof of concept we provide results of several simulated FAs on a quantum simulator.", "url": "https://arxiv.org/abs/2607.06953", "type": "理论+数值", "summary": "我们提出了一种量子模型，用于寻找重置输入序列（RS），该序列可以采用有限状态转换系统（FA）到与其当前状态无关的特定状态。为各种类型的 FA 找到此类序列的复杂性可能是 NP-Hard，甚至是 PSPACE-Complete。为此，我们在量子空间中表示 FA 状态、输入和转换函数。因此，我们提出了一个模型来表示从初始 FA 状态开始执行特定长度 $l$ 的输入序列。考虑到将长度为 $l$ 的所有输入序列叠加到 FA 的初始状态，该模型得到了扩展。考虑到将所有输入序列应用于 FA 的所有初始状态，该模型进一步扩展，为每个输入序列捕获通过将序列应用于 FA 的所有状态而达到的状态集合（有序列表）。然后使用幅度放大算法，因为它组合了达到状态的相似集合，同时保留达到这些集合的所有输入序列。 Grover 搜索所到达的集合，其中其元素对应于相同的 FA 状态，为 FA 提供 RS。\n\n我们的方法比传统的暴力方法的指数复杂度提供了二次增益，这是唯一可以应用于一般 FA 类的方法。作为概念证明，我们提供了量子模拟器上多个模拟 FA 的结果。", "authors": [{"name": "Martin Lukac"}, {"name": "Khaled El-Fakih"}, {"name": "Uraz Turker"}], "featured_authors": [{"name": "Martin Lukac"}, {"name": "Khaled El-Fakih"}, {"name": "Uraz Turker"}], "author_count": 3}, {"id": "2607.06994", "category": "quant-ph", "title": "Operator-frame geometry of non-compact quantum systems with frame-vacuum phase transitions", "abstract": "We formulate the geometric structure of non-compact bosonic quantum systems in regimes where vacuum instability renders the relevant quantum states non-normalizable, causing conventional state-space quantum geometry -- described by the Berry connection, curvature, and quantum metric -- to become ill-defined. To overcome this breakdown, we develop a formulation of quantum geometry at the level of canonical operator frames, allowing for complexified Bogoliubov-Valatin transformations that lift the requirement that creation operators be Hermitian conjugates of annihilation operators. Canonical operator frames are defined as choices of bosonic creation and annihilation operators realizing the canonical commutation relations. A natural equivalence relation among such frames generalizes the phase ambiguity of quantum states and determines a parameter space that analytically extends the stable-regime parameter space. The space of canonical operator frames forms a principal bundle over parameter space -- the operator-frame bundle -- equipped with a natural Ehresmann connection that defines parallel transport while preserving the canonical commutation relations. In the stable regime, this construction reduces to the Berry connection, while more generally it yields a well-defined operator-space quantum geometric tensor (QGT) that remains valid across vacuum instabilities. Using the framework of rigged Hilbert spaces, we define a notion of quantum frame vacuum and obtain a consistent state-space QGT. Focusing on a single bosonic mode, we demonstrate analyticity of the QGT across the quantum frame-vacuum phase transition and present the corresponding phase diagram on the complexified squeezing-parameter plane. We further introduce a realistic physical setting that allows continuous paths connecting stable and unstable regimes, along which the QGT evolves smoothly across Stokes lines.", "url": "https://arxiv.org/abs/2607.06994", "type": "理论+数值", "summary": "我们在真空不稳定性导致相关量子态不可归一化的情况下制定了非紧玻色子量子系统的几何结构，导致传统的状态空间量子几何（由贝里连接、曲率和量子度量描述）变得不明确。为了克服这种故障，我们在规范算子框架层面开发了一种量子几何公式，允许复杂的 Bogoliubov-Valatin 变换，从而提高了创生算子是湮没算子的埃尔米特共轭的要求。规范算子框架被定义为实现规范交换关系的玻色子产生和湮灭算子的选择。这些框架之间的自然等价关系概括了量子态的相位模糊性，并确定了在分析上扩展稳定体系参数空间的参数空间。规范算子框架的空间形成了参数空间上的主丛（算子框架丛），配备了自然的埃雷斯曼连接，该连接定义了并行传输，同时保留了规范交换关系。\n\n在稳定状态下，这种结构简化为贝里连接，而更一般地，它产生了一个明确定义的算子空间量子几何张量（QGT），该张量在真空不稳定性下仍然有效。利用操纵希尔伯特空间的框架，我们定义了量子框架真空的概念并获得了一致的状态空间QGT。着眼于单一玻色子模式，我们展示了 QGT 在整个量子框架-真空相变中的分析性，并在复杂的挤压参数平面上呈现了相应的相图。我们进一步引入了一个现实的物理环境，允许连接稳定和不稳定状态的连续路径，QGT 沿着该路径平滑地跨越斯托克斯线。", "authors": [{"name": "Satoshi Tanaka"}, {"name": "Gonzalo Ordonez"}, {"name": "Masatoshi Kubota"}, {"name": "Hiroto Nakano"}, {"name": "Kazuki Kanki"}], "featured_authors": [{"name": "Satoshi Tanaka"}, {"name": "Gonzalo Ordonez"}, {"name": "Masatoshi Kubota"}, {"name": "Hiroto Nakano"}, {"name": "Kazuki Kanki"}], "author_count": 5}, {"id": "2607.07056", "category": "quant-ph", "title": "Quantum Recurrence Plot Algorithm Based on Quantum Principal Component Analysis", "abstract": "Recurrence Plot (RP) is a method employed to analyze the periodicity, chaoticity, and nonlinear characteristics of complex systems. Quantum Principal Component Analysis (QPCA), on the other hand, achieves dimensionality reduction of sample data using density matrices based on quantum circuits. We improve the distance threshold function of the recurrence plot algorithm using a density operator conceptually equivalent to the covariance matrix, integrate it with quantum circuits, and thereby develop a Quantum Recurrence Plot (QRP) algorithm. This algorithm achieves ultra-high efficiency in parallel computing, reduces computational costs, and simultaneously upgrades the traditional grayscale recurrence plot to colored heatmaps, enabling a better revelation of the system's dynamical characteristics.", "url": "https://arxiv.org/abs/2607.07056", "type": "数值", "summary": "递归图（RP）是一种用于分析复杂系统的周期性、混沌性和非线性特征的方法。而量子主成分分析（QPCA）则利用基于量子电路的密度矩阵实现样本数据的降维。我们使用概念上等同于协方差矩阵的密度算子改进了递推图算法的距离阈值函数，并将其与量子电路集成，从而开发了量子递推图（QRP）算法。该算法实现了超高的并行计算效率，降低了计算成本，同时将传统的灰度递归图升级为彩色热图，能够更好地揭示系统的动态特性。", "authors": [{"name": "Hanhuai Zhu"}, {"name": "Jingjing Huang"}, {"name": "Zhi-Xi Wang"}, {"name": "Shao-Ming Fei"}], "featured_authors": [{"name": "Hanhuai Zhu"}, {"name": "Jingjing Huang"}, {"name": "Zhi-Xi Wang"}, {"name": "Shao-Ming Fei"}], "author_count": 4}, {"id": "2607.07081", "category": "quant-ph", "title": "Spectral Chaos Does Not Determine Quantum Mpemba Crossings", "abstract": "In a symmetry-restoration quantum Mpemba effect, an initial state with stronger local symmetry breaking can lose that memory faster than a state that starts closer to the symmetric manifold. We test whether this local ordering reversal is organized by chaotic thermalization in a clean U(1)-conserving spin chain, comparing spectral level statistics with crossings of the entanglement asymmetry for the same Hamiltonians. We find that Gaussian orthogonal ensemble (GOE)-like level statistics alone do not determine whether Mpemba crossings occur. Across field textures, GOE-like spectra can occur with or without entanglement-asymmetry crossings, and crossings can also appear away from the GOE reference. A near-staggered detuned control further shows that even an inversion of the total charge-sector coherence need not produce an entanglement-asymmetry crossing. Thus the crossing response is controlled not by spectral chaos alone, but by how local charge-sector coherence enters the reduced density matrix.", "url": "https://arxiv.org/abs/2607.07081", "type": "理论", "summary": "在对称性恢复量子 Mpemba 效应中，具有更强的局部对称性破缺的初始状态可以比开始时更接近对称流形的状态更快地失去记忆。我们测试这种局部有序反转是否是由干净的 U(1) 守恒自旋链中的混沌热化组织的，将谱级统计数据与相同哈密顿量的纠缠不对称性的交叉进行比较。我们发现仅靠类似高斯正交系综 (GOE) 的水平统计并不能确定 Mpemba 交叉是否发生。在整个场纹理中，类似 GOE 的光谱可以在有或没有纠缠不对称交叉的情况下出现，并且交叉也可以出现在远离 GOE 参考的地方。近交错失谐控制进一步表明，即使总电荷扇区相干性的反转也不需要产生纠缠不对称交叉。因此，交叉响应不仅由光谱混沌控制，还由局部电荷扇区相干性进入约化密度矩阵的方式控制。", "authors": [{"name": "Ri-Hua Zheng"}, {"name": "Yang Xiao"}, {"name": "Yu Wang"}, {"name": "Ye-Hong Chen"}, {"name": "Yan Xia"}], "featured_authors": [{"name": "Ri-Hua Zheng"}, {"name": "Yang Xiao"}, {"name": "Yu Wang"}, {"name": "Ye-Hong Chen"}, {"name": "Yan Xia"}], "author_count": 5}, {"id": "2607.07167", "category": "quant-ph", "title": "Macroscopic position-position entanglement by photon recoil in Rydberg atoms", "abstract": "Entanglement between two spatially separate matter particles can be generated via many means and often resides in the internal states of particles. Here, via Rydberg blockade in two spatially separate neutral atoms, we find that the photon recoil in Rydberg excitation can push one atom microns away provided the other atom exerts a state-dependent Rydberg-mediated blockade. When the atoms are recaptured by optical traps, a position-position entangled state between two spatially separate atoms can emerge. This realizes a Bell state of two atoms, where the entanglement exists in the position of each atom and the distance between the two possible locations of each atom can be in the hundred-micron regime.", "url": "https://arxiv.org/abs/2607.07167", "type": "理论", "summary": "两个空间上分离的物质粒子之间的纠缠可以通过多种方式产生，并且通常存在于粒子的内部状态中。在这里，通过两
