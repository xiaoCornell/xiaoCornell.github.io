个空间上分离的中性原子的里德伯封锁，我们发现里德伯激发中的光子反冲可以将一个原子推开微米远，前提是另一个原子施加依赖于状态的里德伯介导的封锁。当原子被光陷阱重新捕获时，两个空间上分离的原子之间会出现位置-位置纠缠态。这实现了两个原子的贝尔态，其中每个原子的位置都存在纠缠，并且每个原子的两个可能位置之间的距离可以在百微米范围内。", "authors": [{"name": "Xiao-Feng Shi"}], "featured_authors": [{"name": "Xiao-Feng Shi"}], "author_count": 1}, {"id": "2607.07197", "category": "quant-ph", "title": "Analytical Landscape of Maximal Magic for Two-Qutrit States and Beyond", "abstract": "Achieving a genuine quantum advantage relies on two distinct non-classical resources that restrict efficient classical simulation: entanglement and magic (nonstabilizerness). We investigate the interplay between these resources by characterizing the Pareto frontiers of extreme magic at fixed entanglement for systems of two qutrits ($d=3$) and two ququints ($d=5$). Unlike the case of two qubits, the Schmidt spectrum for two qutrits features two independent entanglement parameters, resulting in two-dimensional Pareto surfaces. For the lower frontier, we recast the minimal magic as a compact function of concurrence and negativity, with a maximal value of $\\ln 2$. For the upper frontier, we determine the maximal stabilizer Rényi entropy to be $M_2 = \\ln(81/17) \\approx 1.561$, which tightens the previous theoretical bound of $\\ln 5\\approx 1.609$ and improves on earlier numerical estimates. The maximum magic is achieved at eighteen distinct maxima categorized into three families of six permutation-equivalent spectra. We provide analytical expressions for the maximal magic in the neighborhood of each maximum and for the corresponding maximally magical states which turn out to be Weyl-Heisenberg-covariant fiducial states for mutually unbiased bases. Finally, numerical analysis of two ququints ($d=5$) reveals six permutation-inequivalent maxima with a peak magic value of $M_2 = \\ln(625/49) \\approx 2.546$. Based on these findings, we conjecture that the maximal magic for a bipartite system of two qudits with prime dimension $d$ is given by $\\ln [ d^4 / (2d^2 - 1) ]$, which reproduces the previously known value for qubits, as well as the values derived here for qutrits and ququints.", "url": "https://arxiv.org/abs/2607.07197", "type": "理论+数值", "summary": "实现真正的量子优势依赖于限制有效经典模拟的两种不同的非经典资源：纠缠和魔法（非稳定剂）。我们通过描述两个 qutrits ($d=3$) 和两个 ququints ($d=5$) 系统固定纠缠下极端魔法的帕累托前沿来研究这些资源之间的相互作用。与两个量子位的情况不同，两个量子位的施密特谱具有两个独立的纠缠参数，从而产生二维帕累托曲面。对于较低的边界，我们将最小魔力重新设计为并发性和负性的紧凑函数，最大值为 $\\ln 2$。对于上边界，我们确定最大稳定器 Rényi 熵为 $M_2 = \\ln(81/17) \\approx 1.561$，这收紧了之前 $\\ln 5\\approx 1.609$ 的理论界限，并改进了早期的数值估计。最大魔力是在十八个不同的最大值处实现的，这些最大值分为三个系列的六个排列等效光谱。\n\n我们提供了每个最大值邻域中的最大魔力以及相应的最大魔力状态的解析表达式，这些状态被证明是互无偏基的韦尔-海森堡协变基准状态。最后，两个四元组 ($d=5$) 的数值分析揭示了六个排列不等价最大值，其峰值幻值为 $M_2 = \\ln(625/49) \\approx 2.546$。基于这些发现，我们推测两个质数维度 $d$ 的二分系统的最大魔力由 $\\ln [ d^4 / (2d^2 - 1) ]$ 给出，它再现了先前已知的量子位值，以及此处导出的 qutrit 和 ququint 的值。", "authors": [{"name": "Marco Knipfer"}, {"name": "Alexander Roman"}, {"name": "Katia Matcheva"}, {"name": "Konstantin T. Matchev"}], "featured_authors": [{"name": "Marco Knipfer"}, {"name": "Alexander Roman"}, {"name": "Katia Matcheva"}, {"name": "Konstantin T. Matchev"}], "author_count": 4}, {"id": "2607.07223", "category": "quant-ph", "title": "Non-Abelian Thouless pumping based on the global adiabatic criterion in Rydberg synthetic lattices", "abstract": "We study a quantum implementation of non-Abelian Thouless pumping in Lieb lattices using Rydberg synthetic dimensions. The lattice is encoded in twelve selected microwave-coupled Rydberg levels, forming a three-cell structure with six degenerate zero-energy states. These zero-energy states define the working subspace for cyclic modulation of the microwave couplings, while the remaining bright states provide the dominant leakage channels at finite evolution time. To choose the relative timing of the Gaussian pulses, we introduce a global adiabatic criterion (GAC), which evaluates the mean value and temporal fluctuation of a nonadiabatic factor obtained from a representative $\\Lambda$-type transfer paradigm. With the resulting timing applied to the full twelve-level pumping dynamics, composing two elementary pumping cycles in opposite temporal orders produces distinct projected population maps. It is exactly consistent with noncommuting matrix-valued adiabatic operations in the zero-energy subspace. We numerically simulate the non-Abelian Thouless pumping using the Lindblad master equation with state-dependent Rydberg loss and representative perturbations. The results show that the GAC-selected timing within the same Gaussian pulse family gives higher target-state population than two literature-adapted Gaussian pulse schedules over the simulated parameter ranges. This quantum implementation of non-Abelian Thouless pumping, enabled by the GAC, marks a major milestone in finite-time geometric control and paves the way for transformative applications in holonomic quantum computing with Rydberg synthetic lattices.", "url": "https://arxiv.org/abs/2607.07223", "type": "理论+数值", "summary": "我们使用里德堡合成维度研究了利布晶格中非阿贝尔无意识泵浦的量子实现。该晶格被编码为十二个选定的微波耦合里德伯能级，形成具有六个简并零能态的三单元结构。这些零能量态定义了微波耦合循环调制的工作子空间，而其余的亮态提供了有限演化时间的主要泄漏通道。为了选择高斯脉冲的相对定时，我们引入了全局绝热准则（GAC），它评估从代表性 $\\Lambda$ 型传递范式获得的非绝热因子的平均值和时间波动。将所得时序应用于完整的十二级泵送动力学，以相反的时间顺序组成两个基本泵送循环会产生不同的预测人口图。它与零能量子空间中的非对易矩阵值绝热运算完全一致。我们使用具有状态相关里德堡损失和代表性扰动的 Lindblad 主方程对非阿贝尔 Thouless 泵浦进行数值模拟。\n\n结果表明，在模拟参数范围内，同一高斯脉冲族内的 GAC 选择时序比两个文献改编的高斯脉冲方案提供了更高的目标状态总体。由 GAC 实现的非阿贝尔无意识泵浦的量子实现，标志着有限时间几何控制的一个重要里程碑，并为里德堡合成晶格的完整量子计算的变革性应用铺平了道路。", "authors": [{"name": "Jin-Kang Guo"}, {"name": "Jin-Lei Wu"}, {"name": "Chuan-Cun Shu"}], "featured_authors": [{"name": "Jin-Kang Guo"}, {"name": "Jin-Lei Wu"}, {"name": "Chuan-Cun Shu"}], "author_count": 3}, {"id": "2607.07225", "category": "quant-ph", "title": "Quantum Boomerang Effect in Time-Crystalline Structures", "abstract": "The quantum boomerang effect (QBE) is a unique dynamical signature of Anderson localization, characterized by a launched wavepacket that initially drifts but ultimately returns to its initial position due to fundamental quantum interference. In this work, we theoretically establish and quantitatively characterize the QBE in a time-crystalline structure using a periodically driven quantum particle in a one-dimensional potential well. By constructing maximally localized Floquet-Wannier states and introducing temporal disorder, we rigorously map the continuous Floquet dynamics onto a discrete disordered tight-binding lattice. By positioning a detector at a fixed spatial coordinate, we monitor the temporal evolution of the wavepacket, to extract the mean temporal center of mass of the probability density in a time-crystalline structure. This mean temporal center of mass exhibits an initial ballistic expansion, followed by a pronounced U-turn, and ultimately returns to its initial temporal position after long-time evolution. These results confirm the existence of the complete QBE in the time domain. They also demonstrate that non-trivial dynamics can be explored within time-crystalline systems, even though these structures already possess an inherent temporal periodicity.", "url": "https://arxiv.org/abs/2607.07225", "type": "理论", "summary": "量子回旋镖效应 (QBE) 是安德森局域化的独特动力学特征，其特征是发射的波包最初发生漂移，但由于基本量子干涉最终返回到其初始位置。在这项工作中，我们使用一维势阱中周期性驱动的量子粒子，从理论上建立并定量表征了时间晶体结构中的 QBE。通过构建最大局域 Floquet-Wannier 态并引入时间无序，我们将连续的 Floquet 动力学严格映射到离散的无序紧束缚晶格上。通过将探测器放置在固定的空间坐标上，我们监测波包的时间演化，以提取时间晶体结构中概率密度的平均时间质量中心。这个平均时间质心表现出最初的弹道扩张，随后发生明显的 U 型转弯，并最终在长期演化后返回到其初始时间位置。这些结果证实了时域中完整 QBE 的存在。\n\n他们还证明，可以在时间晶体系统中探索非平凡的动力学，即使这些结构已经具有固有的时间周期性。", "authors": [{"name": "Qi-wen Peng"}, {"name": "Krzysztof Sacha"}, {"name": "Chu-hui Fan"}], "featured_authors": [{"name": "Qi-wen Peng"}, {"name": "Krzysztof Sacha"}, {"name": "Chu-hui Fan"}], "author_count": 3}, {"id": "2607.07332", "category": "quant-ph", "title": "Lecture notes on classical and quantum non-Markovianity", "abstract": "The study of non-Markovian quantum processes has attracted significant interest in recent decades, giving rise to several competing notions of quantum non-Markovianity. These notes serve as an introduction to the topic for graduate students familiar with quantum mechanics and probability theory. Owing to the vastness of the literature, we focus on two prominent characterizations of quantum Markovianity based on the divisibility of quantum channels and monotonically decreasing state distinguishability. The correspondence between classical concepts (stochastic matrices, Chapman-Kolmogorov equation) and their quantum analogs (dynamical maps, CP-divisibility) is emphasized throughout.", "url": "https://arxiv.org/abs/2607.07332", "type": "理论", "summary": "近几十年来，非马尔可夫量子过程的研究引起了人们的极大兴趣，引发了量子非马尔可夫性的几种相互竞争的概念。这些笔记为熟悉量子力学和概率论的研究生提供了对该主题的介绍。由于文献数量巨大，我们重点关注基于量子通道可分性和单调递减状态可区分性的量子马尔可夫性的两个突出特征。自始至终都强调了经典概念（随机矩阵、查普曼-柯尔莫哥洛夫方程）与其量子类似物（动态映射、CP 整除性）之间的对应关系。", "authors": [{"name": "Graeme Pleasance"}], "featured_authors": [{"name": "Graeme Pleasance"}], "author_count": 1}, {"id": "2607.07336", "category": "quant-ph", "title": "Resource-Efficient Hybrid Quantum Neighborhood Selection for Large-Scale Molecular Diversity Optimization", "abstract": "Large-scale combinatorial optimization remains demanding for classical heuristics, particularly when dense Quadratic Unconstrained Binary Optimization (QUBO) formulations induce large memory footprints, high CPU utilization, and long execution times. While near-term quantum processors cannot yet deliver unconditional quantum advantage, hybrid architectures can provide practical value by reducing the resource burden. This paper presents a resource-efficiency study of Hybrid Quantum Neighborhood Selection (HQNS), a framework that decomposes large dense QUBO instances into bounded-width quantum subproblems via stochastic frontier selection. We evaluate HQNS on the Maximum Diversity Subset Selection Problem (MDSSP), focusing on the trade-off between solution quality retention and resource consumption. Benchmarks up to N=1000 candidates show that HQNS preserves 99.9908% of the mean diversity score of an 11-restart parallel Simulated Annealing baseline, while reducing wall-clock time by 94.91%, peak CPU utilization by 64.68%, and peak memory usage by 88.61%. The QPU execution time remains bounded within a 6-7 second envelope across scales, indicating that the quantum component is decoupled from the global QUBO dimension when the frontier size is fixed. These results suggest that HQNS provides a resource-aware pathway for deploying hybrid quantum optimization in practical large-scale settings, serving as an efficient architecture for incorporating near-term quantum processors into classical optimization pipelines.", "url": "https://arxiv.org/abs/2607.07336", "type": "理论+数值", "summary": "大规模组合优化对经典启发式仍然有很高的要求，特别是当密集的二次无约束二元优化 (QUBO) 公式导致大量内存占用、高 CPU 利用率和长执行时间时。虽然近期量子处理器尚无法提供无条件的量子优势，但混合架构可以通过减少资源负担来提供实用价值。本文提出了混合量子邻域选择（HQNS）的资源效率研究，该框架通过随机前沿选择将大型密集 QUBO 实例分解为有界宽度量子子问题。我们在最大多样性子集选择问题 (MDSSP) 上评估 HQNS，重点关注解决方案质量保持和资源消耗之间的权衡。 N=1000 个候选者的基准测试表明，HQNS 保留了 11 次重新启动并行模拟退火基准的平均多样性得分的 99.9908%，同时减少了 94.91% 的挂钟时间、峰值 CPU 利用率 64.68% 和峰值内存使用率 88.61%。\n\nQPU 执行时间在各个尺度上保持在 6-7 秒的范围内，这表明当边界大小固定时，量子组件与全局 QUBO 维度解耦。这些结果表明，HQNS 为在实际大规模环境中部署混合量子优化提供了一条资源感知途径，作为将近期量子处理器纳入经典优化管道的有效架构。", "authors": [{"name": "Nicolas Mendes de Araujo"}, {"name": "Lester de Abreu Faria"}], "featured_authors": [{"name": "Nicolas Mendes de Araujo"}, {"name": "Lester de Abreu Faria"}], "author_count": 2}, {"id": "2607.07338", "category": "quant-ph", "title": "Quantum simulation of real-world nonlinear dynamics via Koopman method", "abstract": "Nonlinear dynamics is ubiquitous in nature, ranging from chemical pattern formation to ocean circulation, yet its simulation on quantum computers is fundamentally limited by the unitary nature of quantum evolution. We propose the quantum Koopman method, a data-driven framework that embeds nonlinear dynamics into a learned linear representation and implements the resulting evolution using shallow quantum circuits. This method learns Koopman observables from trajectory data, projects the lifted dynamics onto a finite-dimensional subspace, and decomposes the corresponding non-unitary propagator into parallel spectral channels. We utilize the Koopman method on a superconducting processor to simulate three distinct nonlinear systems, comprising reaction-diffusion dynamics, fluid motion on a sphere, and satellite-derived observations of Gulf Stream currents, employing up to 32 parallel circuits of 10 qubits. These quantum simulations capture the dominant multiscale patterns and statistical signatures of the underlying dynamics, and reveal a transition from performance limited by hardware noise in weakly nonlinear systems to performance limited by finite-dimensional Koopman representations as nonlinear scale interactions increase. This transition identifies a practical boundary for quantum-amenable nonlinear dynamics, establishing a hardware-validated route for simulating moderately nonlinear dynamics on near-term quantum hardware.", "url": "https://arxiv.org/abs/2607.07338", "type": "理论+数值", "summary": "非线性动力学在自然界中无处不在，从化学模式的形成到海洋环流，但其在量子计算机上的模拟从根本上受到量子演化的统一性质的限制。我们提出了量子库普曼方法，这是一种数据驱动的框架，它将非线性动力学嵌入到学习的线性表示中，并使用浅量子电路实现由此产生的演化。该方法从轨迹数据中学习库普曼可观测量，将提升的动力学投影到有限维子空间上，并将相应的非酉传播器分解为并行谱通道。我们在超导处理器上利用库普曼方法来模拟三个不同的非线性系统，包括反应扩散动力学、球体上的流体运动以及来自卫星的湾流电流观测，使用多达 32 个 10 量子位的并行电路。\n\n这些量子模拟捕获了底层动力学的主要多尺度模式和统计特征，并揭示了随着非线性尺度相互作用的增加，从弱非线性系统中受硬件噪声限制的性能到受有限维库普曼表示限制的性能的转变。这一转变确定了适合量子的非线性动力学的实际边界，建立了一条经过硬件验证的路线，用于在近期量子硬件上模拟适度的非线性动力学。", "authors": [{"name": "Baoyang Zhang"}, {"name": "Dong An"}, {"name": "Zhaoyuan Meng"}, {"name": "Yefei Yu"}, {"name": "Xiaoxiao Xiao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "featured_authors": [{"name": "Baoyang Zhang"}, {"name": "Dong An"}, {"name": "Zhaoyuan Meng"}, {"name": "Xiaoxiao Xiao"}, {"name": "Zhen Lu"}, {"name": "Yue Yang"}], "author_count": 7}, {"id": "2607.07449", "category": "quant-ph", "title": "Turing mechanisms in a multimode open quantum system", "abstract": "We investigate pattern formation in a finite chain of bosonic modes whose dynamics is governed by a Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) master equation. The model combines local parametric driving and nonlinear damping with nonlocal dissipative couplings between modes that work on different discrete spatial scales. In the classical limit, these mechanisms generate a reaction-diffusion-like dynamics, allowing the emergence of Turing-type instabilities. The key aspect of the analysis is the coexistence and competition of different unstable spatial modes. Depending on the range of parameters, the system may select different stationary nonuniform configurations, oscillatory wave-like states, or regimes in which multiple modes interact before a dominant pattern is established, thus providing a mechanism for pattern selection. We compare the deterministic bifurcation scenario, generated by a reaction-diffusion-like system derived from semiclassical drift dynamics, with the quantum dynamics, derived via the GKSL master equation, using phase-space methods and reduced Wigner functions. The results show how Turing instabilities, mode competition, and pattern selection can be extended to multimode open quantum systems, providing a bridge between nonlinear dynamical systems, dissipative quantum mechanics, and spatial self-organization.", "url": "https://arxiv.org/abs/2607.07449", "type": "理论", "summary": "我们研究了玻色子模式有限链中的模式形成，其动力学由 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 主方程控制。该模型将局部参数驱动和非线性阻尼与在不同离散空间尺度上工作的模式之间的非局部耗散耦合相结合。在经典极限下，这些机制产生类似反应扩散的动力学，从而出现图灵型不稳定性。分析的关键在于不同不稳定空间模式的共存和竞争。根据参数的范围，系统可以选择不同的静态非均匀配置、振荡波状状态或在建立主导模式之前多种模式相互作用的状态，从而提供模式选择的机制。我们将由半经典漂移动力学衍生的类反应扩散系统生成的确定性分岔场景与使用相空间方法和简化维格纳函数通过 GKSL 主方程导出的量子动力学进行比较。\n\n结果表明，图灵不稳定性、模式竞争和模式选择可以扩展到多模开放量子系统，从而在非线性动力系统、耗散量子力学和空间自组织之间架起一座桥梁。", "authors": [{"name": "Giorgia Comparato"}, {"name": "Francesco Gargano"}, {"name": "Rosario Lo Franco"}], "featured_authors": [{"name": "Giorgia Comparato"}, {"name": "Francesco Gargano"}, {"name": "Rosario Lo Franco"}], "author_count": 3}, {"id": "2607.07502", "category": "quant-ph", "title": "Spin Textures and Eigenstate Evolution of Isospectrally Patterned Lattices", "abstract": "Isospectrally patterned lattices exhibit a composite band structure with a tunable ratio of localized versus delocalized eigenstates that is controlled by the underlying phase gradient. We show that the lattice Hamiltonian can be interpreted as that of a single spin exposed to a rotating magnetic field which is allowed to hop with a spin-flip across the lattice. In the low- and high-energy part of the band the localized states show an envelope of oscillatory character separated by quasi-nodes. Spin peaks occur at the locations of these quasi-nodes and provide a unique spin texture to the eigenstates which becomes increasingly complex with increasing degree of excitation. The crossover from localization to delocalization and vice versa leaves its fingerprints in the Fourier spectrum of the eigenstates: the original bimodal frequency distribution widens with increasing degree of excitation, moves across the spectral window and finally culminates in an extremely narrow frequency peak. In the course of this evolution the spin texture undergoes a rearrangement transition involving different characteristic (ir)regular patterns which we quantify by considering the total variation of the local spin fluctuations. Our results demonstrate the variety of the spectral properties of isospectrally patterned lattices which holds great prospect in particular when considering higher lattice or cell dimensions.", "url": "https://arxiv.org/abs/2607.07502", "type": "理论", "summary": "等谱图案晶格表现出复合能带结构，其局域与离域本征态的比率可调，该比率由基础相位梯度控制。我们证明，晶格哈密顿量可以解释为暴露于旋转磁场的单个自旋，该自旋可以通过自旋翻转跨越晶格跳跃。在能带的低能和高能部分，局域态显示出由准节点分隔的振荡特征包络。自旋峰出现在这些准节点的位置，并为本征态提供了独特的自旋纹理，随着激发程度的增加，本征态变得越来越复杂。从局域到离域的交叉，反之亦然，在本征态的傅里叶频谱中留下了指纹：原始双峰频率分布随着激励程度的增加而变宽，跨越频谱窗口，最终达到极窄的频率峰值。\n\n在此演化过程中，自旋纹理经历了涉及不同特征（ir）规则模式的重排转变，我们通过考虑局部自旋波动的总变化来量化这些模式。我们的结果证明了等光谱图案晶格的光谱特性的多样性，特别是在考虑更高的晶格或晶胞尺寸时，这具有广阔的前景。", "authors": [{"name": "Peter Schmelcher"}], "featured_authors": [{"name": "Peter Schmelcher"}], "author_count": 1}, {"id": "2607.07530", "category": "quant-ph", "title": "The NISQ Trap: Eight Years of Demonstrations the Hardware Was Built to Lose", "abstract": "With a single contested exception, every NISQ-era flagship demonstration of \"quantum advantage\" has been classically reproduced, or closed by a simulability theorem, within eighteen months of its announcement. Six theoretical results from 2024 through April 2026 explain the pattern: the regions of circuit-space NISQ hardware can run with sufficient fidelity coincide with the regions classical algorithms compress efficiently, because the features that admit one (low effective depth, strong algebraic structure, geometric locality) are the features that admit the other. This reading dates the NISQ programme from its 2018 articulation as an interim retreat from the unmet conditions of the 1996 threshold theorems, characterises the eight years that followed as a closed loop in which the demonstrations the hardware could run were drawn from the only regions classical methods could already attack, and locates the exit from the loop where the threshold theorems originally located it: in fault tolerance. The empirical pattern could in principle break with a demonstration that escapes the current simulability results. After eight years and more than thirty advantage-class announcements, the burden of producing such a demonstration falls to the defenders of NISQ.", "url": "https://arxiv.org/abs/2607.07530", "type": "数值", "summary": "除了一个有争议的例外，每一个 NISQ 时代“量子优势”的旗舰演示都在其宣布后的 18 个月内被经典地复制或通过可模拟定理结束。 2024 年至 2026 年 4 月的六个理论结果解释了这一模式：电路空间 NISQ 硬件的区域可以以足够的保真度运行，与经典算法有效压缩的区域一致，因为允许其中一个的特征（低有效深度、强代数结构、几何局部性）就是允许另一个的特征。本文将 NISQ 程序从 2018 年的阐述开始，作为对 1996 年阈值定理未满足条件的临时撤退，将随后的八年描述为一个闭环，其中硬件可以运行的演示是从经典方法已经可以攻击的唯一区域中得出的，并找到了阈值定理最初定位的循环的出口：容错。原则上，经验模式可能会打破逃避当前可模拟性结果的演示。\n\n经过八年的时间和超过三十次的优势级公告，制作这样的演示的重担落到了 NISQ 的捍卫者身上。", "authors": [{"name": "Amit Hagar"}], "featured_authors": [{"name": "Amit Hagar"}], "author_count": 1}, {"id": "2607.07539", "category": "quant-ph", "title": "A Dynamic Multiplexing Policy for a Quantum Repeater", "abstract": "We consider a multiplexed quantum repeater that distributes entanglement between two end nodes. Multiplexing is achieved through optical integration of many quantum chips. Each chip hosts an optically addressable communication qubit and a separate memory qubit. The communication qubit serves as an entanglement generation interface between different quantum chips, and the memory qubit can be used to store entanglement. The quantum chips on the repeater are interconnected using a reconfigurable router, which makes it possible to dynamically assign quantum chips for entanglement generation with either of the two end nodes in every end-to-end communication cycle. We propose a dynamic multiplexing policy in which after an entangled link has been established with one of the end nodes, all remaining quantum chips are assigned to the opposite end node. We compare this dynamic policy to a policy in which the assignment of quantum chips to end nodes is fixed. We consider a parameter regime where on average less than one entangled link is generated per end-to-end communication cycle, which is the relevant regime for near-term quantum networks. We show that in this regime, the dynamic multiplexing policy can lead to a significant improvement in fidelity over a fixed policy, while marginally improving the rate. Moreover, even though the dynamic multiplexing policy requires a deeper, and hence, more lossy, router than the fixed policy, it can still achieve higher secret key rates in the parameter regime studied. This makes dynamic multiplexing with a many-quantum-chip repeater especially relevant for the development of near-term quantum networks.", "url": "https://arxiv.org/abs/2607.07539", "type": "理论", "summary": "我们考虑一个多路复用量子中继器，它在两个端节点之间分配纠缠。复用是通过许多量子芯片的光学集成来实现的。每个芯片都拥有一个光学可寻址通信量子位和一个单独的存储器量子位。通信量子位充当不同量子芯片之间的纠缠生成接口，存储量子位可用于存储纠缠。中继器上的量子芯片使用可重新配置的路由器互连，这使得在每个端到端通信周期中动态分配量子芯片以与两个端节点中的任何一个产生纠缠成为可能。我们提出了一种动态复用策略，其中在与一个端节点建立纠缠链路后，所有剩余的量子芯片都被分配给相对的端节点。我们将这种动态策略与量子芯片分配给终端节点是固定的策略进行比较。我们考虑一种参数机制，其中每个端到端通信周期平均生成少于一个纠缠链路，这是近期量子网络的相关机制。\n\n我们表明，在这种情况下，动态复用策略可以比固定策略显着提高保真度，同时略微提高速率。此外，尽管动态复用策略需要比固定策略更深、因此损耗更大的路由器，但它仍然可以在所研究的参数体系中实现更高的密钥率。这使得多量子芯片中继器的动态复用对于近期量子网络的开发尤其重要。", "authors": [{"name": "Jeroen Grimbergen"}, {"name": "Sounak Kar"}, {"name": "Michal van Hooft"}, {"name": "Conor Bradley"}, {"name": "Stephanie Wehner"}], "featured_authors": [{"name": "Jeroen Grimbergen"}, {"name": "Sounak Kar"}, {"name": "Michal van Hooft"}, {"name": "Conor Bradley"}, {"name": "Stephanie Wehner"}], "author_count": 5}, {"id": "2607.07540", "category": "quant-ph", "title": "Towards Minimax Estimation of High-Order Functionals by Quantum Arguments", "abstract": "We propose a novel approach to the minimax estimation of high-order functionals from the perspective of quantum computing. Specifically, for any real number $\\alpha \\gg 1$, we present two estimators, one for the classical functional $\\mathrm{F}_\\alpha(P) = \\sum_{i=1}^S p_i^\\alpha$ of a discrete distribution $P$ and the other for the quantum functional $\\mathrm{F}_\\alpha(\\rho) = \\operatorname{tr}(\\rho^\\alpha)$ of a mixed state $\\rho$. These functionals have close connections with the Rényi entropy and the Tsallis entropy. We show that both estimators achieve the minimax optimal $L_2$ rate $\\alpha \\mathsf{n}^{-1}$ in the range $\\alpha \\lesssim \\mathsf{n} \\lesssim \\alpha^{3-o(1)}$, where the support size $S$ of $P$ or the dimension of $\\rho$ can be much larger than the number of samples $\\mathsf{n}$. As a result, both estimators achieve the \\textit{optimal} sample complexity $\\mathsf{n} \\asymp \\alpha$, improving upon the prior best upper bounds $O(\\alpha^2)$ established by Jiao, Venkat, Han, and Weissman (IEEE Trans. Inf. Theory 2017) for classical functionals and Chen and Wang (COLT 2025) for quantum functionals. Our estimators are constructed under a unified framework using quantum primitives and run in linear time on a quantum computer. This work reveals an unexpected path from quantum computing to statistics, suggesting a conceptually new methodology for functional estimation. It adds to the growing list of quantum proofs for classical theorems.", "url": "https://arxiv.org/abs/2607.07540", "type": "理论", "summary": "我们从量子计算的角度提出了一种高阶泛函的极小极大估计的新方法。具体来说，对于任何实数$\\alpha \\gg 1$，我们提出两个估计器，一个用于离散分布$P$的经典函数$\\mathrm{F}_\\alpha(P) = \\sum_{i=1}^S p_i^\\alpha$，另一个用于混合状态$\\rho$的量子函数$\\mathrm{F}_\\alpha(\\rho) = \\operatorname{tr}(\\rho^\\alpha)$。这些泛函与 Rényi 熵和 Tsallis 熵有密切的联系。我们表明，两个估计器都在 $\\alpha \\lesssim \\mathsf{n} \\lesssim \\alpha^{3-o(1)}$ 范围内实现了极小极大最优 $L_2$ 率 $\\alpha \\mathsf{n}^{-1}$，其中 $P$ 的支持大小 $S$ 或 $\\rho$ 的维度可以远大于样本数量 $\\mathsf{n}$。结果，两个估计器都实现了 \\textit{optimal} 样本复杂度 $\\mathsf{n} \\asymp \\alpha$，改进了焦、Venkat、Han 和 Weissman (IEEE Trans. Inf. Theory 2017) 为经典泛函以及 Chen 和 Wang (COLT 2025) 为量子泛函建立的先验最佳上限 $O(\\alpha^2)$。\n\n我们的估计器是在使用量子原语的统一框架下构建的，并在量子计算机上以线性时间运行。这项工作揭示了从量子计算到统计学的一条意想不到的路径，提出了一种概念上新的函数估计方法。它增加了经典定理的量子证明的不断增长的列表。", "authors": [{"name": "Qisheng Wang"}], "featured_authors": [{"name": "Qisheng Wang"}], "author_count": 1}, {"id": "2607.07546", "category": "quant-ph", "title": "An analytical solution of a quantum system with non-Markovian behavior: The Bixon-Jortner system in time domain", "abstract": "Non-Markovian behavior in quantum systems is often studied in the context of bipartite systems consisting of a system of interest and an environment -- tracing over the environment results in non-Markovian behavior for the subsystem of interest. One may get a Markovian limit in certain regimes, which is studied using the Lindblad master equation, and corrections to this behavior can be obtained by techniques such as the Nakajima-Zwanzig formalism. In this paper, we obtain an exact non-Markovian equation for the dynamics of a simple model system that consists of a direct sum rather than a tensor product of two pieces, namely, a discrete state and an infinite ladder. This system, called the Bixon-Jortner model, was first developed in the quantum chemistry literature but has been utilized by the quantum optics community as a model system with interesting behavior, including a Wigner-Weisskopf limit of exponential decay. We attack the time evolution problem of this system directly in time-domain, and start with an integrodifferential equation describing the time evolution of the discrete state. Using tools from mathematical physics, we transform this equation to a delay differential equation, which makes the non-Markovianity completely transparent, and then we solve the delay equation using an intuitive ansatz. This allows us to obtain the analytic form of the dynamics directly in time domain, and demonstrate decay and revival behaviors coming from the aforementioned delay differential equation. We believe the explicit form of the time-domain non-Markovian equation we obtain and the accessibility the solution techniques we use make our results a useful case study of non-Markovianity in quantum systems.", "url": "https://arxiv.org/abs/2607.07546", "type": "理论", "summary": "量子系统中的非马尔可夫行为通常在由感兴趣的系统和环境组成的二分系统的背景下进行研究——跟踪环境会导致感兴趣的子系统的非马尔可夫行为。在某些情况下，人们可能会得到马尔可夫极限，这是使用 Lindblad 主方程进行研究的，并且可以通过 Nakajima-Zwanzig 形式主义等技术来修正这种行为。在本文中，我们获得了一个简单模型系统动力学的精确非马尔可夫方程，该方程由直和而不是两个部分（即离散状态和无限梯）的张量积组成。这个系统称为 Bixon-Jortner 模型，最初是在量子化学文献中开发的，但已被量子光学界用作具有有趣行为的模型系统，包括指数衰减的 Wigner-Weisskopf 极限。我们直接在时域中解决该系统的时间演化问题，并从描述离散状态的时间演化的积分微分方程开始。\n\n使用数学物理工具，我们将这个方程转换为延迟微分方程，这使得非马尔可夫性完全透明，然后我们使用直观的 ansatz 求解延迟方程。这使我们能够直接在时域中获得动力学的解析形式，并证明来自上述延迟微分方程的衰减和复兴行为。我们相信我们获得的时域非马尔可夫方程的显式形式以及我们使用的求解技术的可访问性使我们的结果成为量子系统中非马尔可夫性的有用案例研究。", "authors": [{"name": "Osman Cevheroğlu"}, {"name": "Arkadaş Özakın"}], "featured_authors": [{"name": "Osman Cevheroğlu"}, {"name": "Arkadaş Özakın"}], "author_count": 2}, {"id": "2607.07547", "category": "quant-ph", "title": "Variational Learning with Sparse Long-range Entangling Gates", "abstract": "The performance of variational quantum algorithms depends in general on the structure of the parametrized quantum circuit, but the most common ansätze are typically based on local couplings. Motivated by the extended connectivity available with neutral atoms and trapped ions, we examine when structured long-range connectivity provides a useful resource, focusing on sparse power-of-two (PWR2) coupling graphs. Using dynamical Lie-algebra analysis, approximate unitary-design diagnostics, and finite-depth measures of expressibility and entanglement, we examine how these geometries enlarge the accessible operator space. This enlarged space alone is not sufficient to ensure trainability of the parameterized circuit for given target problems, and we explore performance across example problems with and without long-range coupling, identifying where sparse coupling graphs are or are not likely to provide an advantage. We also introduce a variational scheme that maps hierarchical long-range Hamiltonians to geometrically local ones that can be optimized with short-range circuits. Together, these results identify circuit geometry and qubit reconfigurability as task-dependent resources for variational algorithms, relevant to ongoing developments in quantum hardware with long-range connectivity.", "url": "https://arxiv.org/abs/2607.07547", "type": "理论+数值", "summary": "变分量子算法的性能通常取决于参数化量子电路的结构，但最常见的分析通常基于局部耦合。受中性原子和捕获离子可用的扩展连接的启发，我们研究了结构化远程连接何时提供有用的资源，重点关注稀疏二次幂（PWR2）耦合图。使用动态李代数分析、近似酉设计诊断以及可表达性和纠缠的有限深度测量，我们研究了这些几何形状如何扩大可访问的算子空间。仅这个扩大的空间不足以确保给定目标问题的参数化电路的可训练性，我们探索有和没有远程耦合的示例问题的性能，确定稀疏耦合图在哪里可能提供或不可能提供优势。我们还引入了一种变分方案，将分层长程哈密顿量映射到可以用短程电路优化的几何局部哈密顿量。\n\n总之，这些结果将电路几何结构和量子位可重构性确定为变分算法的任务相关资源，与具有远程连接的量子硬件的持续开发相关。", "authors": [{"name": "Helene M. Lösl"}, {"name": "Aydin Deger"}, {"name": "Andrew J. Daley"}], "featured_authors": [{"name": "Helene M. Lösl"}, {"name": "Aydin Deger"}, {"name": "Andrew J. Daley"}], "author_count": 3}, {"id": "2607.07554", "category": "quant-ph", "title": "RubriQ: Rubric-Guided Group Relative Policy Optimization for Constraint-Aware Quantum Circuit Synthesis", "abstract": "Designing fault-tolerant quantum circuits that are both algorithmically correct and hardware compatible remains a major bottleneck in the transition to scalable quantum computing. We introduce RubriQ, a scalable framework that formulates circuit synthesis as a large language model (LLM) code-generation task, optimized via group relative policy optimization (GRPO). Unlike conventional black-box neural critics, RubriQ employs a domain-grounded programmatic rubric as the reinforcement learning reward function, evaluating circuits for T-gate reduction, hardware topology compliance, and unitary fidelity. To support high-throughput training, RubriQ integrates GPU-accelerated CUDA-Q simulation directly into the reinforcement learning (RL) loop and is deployed on NERSC Perlmutter using DeepSpeed ZeRO2 across multinode NVIDIA A100 clusters. On benchmark tasks, RubriQ achieves a mean T-gate compression of 3.31x, significantly outperforming sparse-reward RL baselines (2.05x), converging 2-3x faster, and maintaining less than 1\\% hardware-constraint violations. Validated on IBM and IonQ quantum processors, RubriQ establishes an automated, high-performance computing (HPC)-driven pipeline for generating hardware-ready, fault-tolerant quantum circuits at scale.", "url": "https://arxiv.org/abs/2607.07554", "type": "理论+数值", "summary": "设计算法正确且硬件兼容的容错量子电路仍然是向可扩展量子计算过渡的主要瓶颈。我们引入了 RubriQ，这是一个可扩展的框架，它将电路综合制定为大型语言模型 (LLM) 代码生成任务，并通过组相对策略优化 (GRPO) 进行优化。与传统的黑盒神经批评家不同，RubriQ 采用基于领域的程序化规则作为强化学习奖励函数，评估电路的 T 门减少、硬件拓扑合规性和单一保真度。为了支持高吞吐量训练，RubriQ 将 GPU 加速的 CUDA-Q 模拟直接集成到强化学习 (RL) 循环中，并使用 DeepSpeed ZeRO2 跨多节点 NVIDIA A100 集群部署在 NERSC Perlmutter 上。在基准任务上，RubriQ 实现了 3.31 倍的平均 T 门压缩，显着优于稀疏奖励 RL 基线 (2.05 倍)，收敛速度提高了 2-3 倍，并且硬件约束违规率保持在 1% 以下。\n\nRubriQ 在 IBM 和 IonQ 量子处理器上进行了验证，建立了一个自动化、高性能计算 (HPC) 驱动的管道，用于大规模生成硬件就绪、容错的量子电路。", "authors": [{"name": "Ziqing Guo"}, {"name": "Ziwen Pan"}], "featured_authors": [{"name": "Ziqing Guo"}, {"name": "Ziwen Pan"}], "author_count": 2}, {"id": "2607.07572", "category": "quant-ph", "title": "Analysis of the sample complexity for PAC-learning functions defined over quantum states", "abstract": "A fundamental question in PAC learning is determining the number of labeled examples required to learn a concept class to a desired accuracy and confidence. In classical learning theory, this quantity is characterized by the VC-dimension, while several quantum generalizations have established analogous results when examples are provided in quantum superposition. In this work, we study a distinct quantum PAC-learning model in which concepts are functions acting on quantum states. We demonstrate that the VC-dimension, although still relevant, fails to fully capture the sample complexity of this model. To further characterize this setting, we develop a new lower bound on the required number of samples and establish an upper bound when the states in the domain are linearly independent. Remarkably, this upper bound has a form similar to the classical PAC-learning bound. We further examine a setting in which the learner receives more informative data and show that the limitations of the VC-dimension persist in this extended model.", "url": "https://arxiv.org/abs/2607.07572", "type": "理论", "summary": "PAC 学习中的一个基本问题是确定将概念类学习到所需的准确性和置信度所需的标记示例的数量。在经典学习理论中，这个量的特征是 VC 维，而当在量子叠加中提供例子时，一些量子推广已经建立了类似的结果。在这项工作中，我们研究了一种独特的量子 PAC 学习模型，其中概念是作用于量子态的函数。我们证明 VC 维度虽然仍然相关，但无法完全捕获该模型的样本复杂性。为了进一步表征此设置，我们对所需样本数量开发了一个新的下界，并在域中的状态线性独立时建立了一个上限。值得注意的是，这个上限的形式类似于经典的 PAC 学习界限。我们进一步研究了学习者接收更多信息数据的设置，并表明 VC 维度的局限性在这个扩展模型中仍然存在。", "authors": [{"name": "Jordi Pérez-Guijarro"}], "featured_authors": [{"name": "Jordi Pérez-Guijarro"}], "author_count": 1}, {"id": "2607.07586", "category": "quant-ph", "title": "Fidelity Analysis of Adiabatically Driven Donor Spins as Two-Qubit and Ququart Systems", "abstract": "Donor spin systems host a native Hilbert space whose dimension exceeds that of a qubit, meaning they can be used as qudits. Here we study a \\ce{Si{:}P} donor spin system through leakage-aware randomized benchmarking (RB) of native ququart $\\mathcal{C}_4$ and encoded two-qubit $\\mathcal{C}_2^{\\otimes 2}$ Clifford groups. We implement adiabatic ramps to operate electron dipole spin resonance (EDSR) pulses at the ionization point, where the electron is shared halfway between the donor and the interface, and to operate electron spin resonance (ESR) pulses near the interface, motivated by the sensitivity of the effective magnetic field to charge noise at the ionization point. By placing the electron near the ionization point only during EDSR control and using sufficiently long displacement ramp durations, leakage outside the computational basis is strongly suppressed, which is crucial for optimized qudit control. We find in our analysis based on leakage RB that $\\mathcal{C}_4$ consistently achieves $\\sim 40$--$50\\%$ lower (lower-bound) error rates $\\varepsilon^{\\mathrm{LB}}_\\mathrm{PT}$ with respect to $\\mathcal{C}_2^{\\otimes 2}$, due to its reduced circuit complexity. These results indicate that donor spin qudits benefit from genuine qudit operation as opposed to imposed encoded qubit operation.", "url": "https://arxiv.org/abs/2607.07586", "type": "理论+数值", "summary": "供体自旋系统拥有一个原生希尔伯特空间，其尺寸超过了量子位的尺寸，这意味着它们可以用作量子位。在这里，我们通过本地 ququart $\\mathcal{C}_4$ 和编码的两量子位 $\\mathcal{C}_2^{\\otimes 2}$ Clifford 群的泄漏感知随机基准测试（RB）来研究 \\ce{Si{:}P} 供体自旋系统。我们实施绝热斜坡以在电离点处操作电子偶极子自旋共振（EDSR）脉冲，其中电子在供体和界面之间共享，并在界面附近操作电子自旋共振（ESR）脉冲，其动机是有效磁场对电离点处电荷噪声的敏感性。通过仅在 EDSR 控制期间将电子放置在电离点附近并使用足够长的位移斜坡持续时间，可以强烈抑制计算基础之外的泄漏，这对于优化 Qudit 控制至关重要。我们在基于泄漏 RB 的分析中发现，由于电路复杂性降低，$\\mathcal{C}_4$ 相对于 $\\mathcal{C}_2^{\\otimes 2}$ 始终实现 $\\sim 40$--$50\\%$ 较低（下限）错误率 $\\varepsilon^{\\mathrm{LB}}_\\mathrm{PT}$。\n\n这些结果表明，与强加的编码量子位操作相比，供体自旋量子位受益于真正的量子位操作。", "authors": [{"name": "Brian Michon"}, {"name": "James Keppens"}, {"name": "Ashutosh Kinikar"}, {"name": "George Simion"}, {"name": "Kristof Moors"}, {"name": "Bart Sorée"}], "featured_authors": [{"name": "Brian Michon"}, {"name": "James Keppens"}, {"name": "Ashutosh Kinikar"}, {"name": "George Simion"}, {"name": "Kristof Moors"}, {"name": "Bart Sorée"}], "author_count": 6}, {"id": "2607.07607", "category": "quant-ph", "title": "Covariant Approximate Quantum Codes for Protected Analog Computation", "abstract": "Quantum error correction compatible with continuous symmetries is a fundamental problem in quantum information and a possible route to robust analog quantum simulation. Because the Eastin-Knill theorem forbids exact codes with continuous transversal symmetries, we construct explicit $SU(d)$-covariant approximate codes that exploit permutation symmetry to spread logical information uniformly across all physical subsystems. For one-, two-, and three-qudit erasures at known locations, we prove worst-case purified-distance scaling $\\Theta(1/N)$, matching approximate Eastin-Knill lower bounds up to constants, and we extend the reduced-state analysis to general flagged local noise. For single-qudit erasure, we construct an explicit near-optimal decoder from the Petz recovery map. We then use these codes as building blocks for encoded analog dynamics. Symmetry-preserving Hamiltonians generate block-structured dynamical Lie algebras implementable transversally, while controlled symmetry-breaking terms serve as non-transversal resources for universal dynamics. These results provide explicit non-Abelian covariant codes and a framework for robust analog quantum simulation.", "url": "https://arxiv.org/abs/2607.07607", "type": "理论+数值", "summary": "与连续对称性兼容的量子纠错是量子信息中的一个基本问题，也是实现鲁棒模拟量子模拟的可能途径。由于 Eastin-Knill 定理禁止具有连续横向对称性的精确码，因此我们构造显式 $SU(d)$ 协变近似码，利用排列对称性将逻辑信息均匀地分布在所有物理子系统中。对于已知位置的一、二和三量子擦除，我们证明了最坏情况的纯化距离缩放 $\\Theta(1/N)$，将近似 Eastin-Knill 下界匹配到常数，并且我们将简化状态分析扩展到一般标记的局部噪声。对于单qudit 擦除，我们从 Petz 恢复映射构造了一个显式的接近最优解码器。然后，我们使用这些代码作为编码模拟动态的构建块。保对称哈密顿量生成可横向实现的块结构动态李代数，而受控对称破缺项则充当通用动力学的非横向资源。这些结果提供了显式的非阿贝尔协变代码和鲁棒模拟量子模拟的框架。", "authors": [{"name": "Mariia Elovenkova"}, {"name": "Hong-Ye Hu"}, {"name": "Susanne F. Yelin"}], "featured_authors": [{"name": "Mariia Elovenkova"}, {"name": "Hong-Ye Hu"}, {"name": "Susanne F. Yelin"}], "author_count": 3}, {"id": "2607.07614", "category": "quant-ph", "title": "Multi-stage Quantum Amplifier Readout Chain", "abstract": "Multi-stage cryogenic readout chains with a wide bandwidth and added noise within a few quanta of the quantum limit are frequently constructed using traveling-wave parametric amplifiers (TWPAs) as the first stage, and a semiconductor amplifier as the second stage. Unfortunately for highly-scaled superconducting detector arrays, or quantum information systems, and space-based observatories, the power dissipation of the semiconductor amplifier becomes problematic from the perspective of available cryogenic cooling power at \\mbox{3~K to 4~K}. Here we demonstrate a readout chain based on a two-stage kinetic inductance TWPA (KTWPA). This quantum-amplifier-based-readout-chain (QARC) provides sufficient gain that a cryogenic semiconductor follow-on amplifier can be eliminated without degradation of the system noise. In this way, the QARC dissipates approximately three orders of magnitude less power than readout chains containing semiconductor amplifiers while adding noise of less than 2~quanta over a 1~GHz bandwidth. In addition, by leveraging the high power handling of kinetic inductance technology, the QARC maintains an input compression point of -93~dBm, which exceeds that of many contemporary Josephson-junction-based parametric amplifiers.", "url": "https://arxiv.org/abs/2607.07614", "type": "理论", "summary": "具有宽带宽和在量子极限的几个量子内添加噪声的多级低温读出链通常使用行波参量放大器（TWPA）作为第一级，并使用半导体放大器作为第二级。不幸的是，对于大规模超导探测器阵列、量子信息系统和天基观测站来说，从 \\mbox{3~K 到 4~K} 可用低温冷却功率的角度来看，半导体放大器的功耗成为问题。在这里，我们演示了基于两级动感电感 TWPA (KTWPA) 的读出链。这种基于量子放大器的读出链 (QARC) 提供了足够的增益，可以消除低温半导体后续放大器，而不会降低系统噪声。通过这种方式，QARC 消耗的功率比包含半导体放大器的读出链低大约三个数量级，同时在 1GHz 带宽上增加的噪声小于 2Quanta。\n\n此外，通过利用动感电感技术的高功率处理能力，QARC 保持了 -93~dBm 的输入压缩点，这超过了许多当代基于约瑟夫森结的参量放大器。", "authors": [{"name": "Logan Howe"}, {"name": "Andrea Giachero"}, {"name": "Michael Vissers"}, {"name": "Corwin Shiu"}, {"name": "Shannon Duff"}, {"name": "Jason Austermann"}, {"name": "Johannes Hubmayr"}, {"name": "Joel Ullom"}], "featured_authors": [{"name": "Logan Howe"}, {"name": "Andrea Giachero"}, {"name": "Michael Vissers"}, {"name": "Jason Austermann"}, {"name": "Johannes Hubmayr"}, {"name": "Joel Ullom"}], "author_count": 8}, {"id": "2607.07691", "category": "quant-ph", "title": "Faster quantum linear system solver beyond the condition number", "abstract": "The spectral condition number is a widely adopted measure of worst-case cost for quantum linear system solvers. Yet it can significantly overestimate the actual runtime for a typical problem instance. We present two quantum algorithms that produce the normalized solution $|x\\rangle$ of linear system $Ax=| b \\rangle$ to accuracy $\\epsilon$ with complexity independent of the condition number $\\kappa=\\lVert A^{-1}\\rVert$. We focus on the standard input model where $A$ is accessed through a block encoding and $| b \\rangle$ is prepared by a unitary. But we also introduce an affine dilation model that encodes $A$ and $| b \\rangle$ jointly, allowing further refinements of the query complexity. Our truncation-based solver makes an optimal number of queries to $| b \\rangle$ and $\\operatorname{\\mathbf{O}}\\left(\\kappa_{\\mathrm{eff}}\\operatorname{polylog}\\left(\\frac{\\kappa_{\\mathrm{eff}}}{\\epsilon}\\right)\\right)$ queries to $A$. We prove a family of upper bounds on the effective condition number, including $\\kappa_{\\mathrm{eff}}\\leq\\frac{\\lVert(A^\\dagger A)^{-t/2}|x\\rangle\\rVert^{1/t}}{\\epsilon^{1/t}}$ for positive even integer $t$ and $\\kappa_{\\mathrm{eff}}\\leq\\frac{\\lVert A^{-1\\dagger}(A^\\dagger A)^{-(t-1)/2}|x\\rangle\\rVert^{1/t}}{\\epsilon^{1/t}}$ for positive odd $t$, overcoming the $\\kappa$-barrier. Our filtering-based solver is extremely simple with a favorable runtime prefactor. In particular, the solver has query complexity $6\\frac{\\lVert A^{-1\\dagger}|x\\rangle\\rVert}{\\epsilon}\\ln\\left(\\frac{1}{\\epsilon}\\right)$ to leading order when the solution norm is known. We then present a similarly simple solution norm estimator with the same asymptotic cost up to logarithmic factors. Our quantum linear system solvers thus substantially improve a recent algorithm of Li, enabling faster quantum linear system solving beyond the condition number.", "url": "https://arxiv.org/abs/2607.07691", "type": "理论+数值", "summary": "谱条件数是量子线性系统求解器最坏情况成本的广泛采用的衡量标准。然而，它可能会大大高估典型问题实例的实际运行时间。我们提出两种量子算法，可以产生线性系统 $Ax=| 的归一化解 $|x\\rangle$ b \\rangle$ 精确到 $\\epsilon$，复杂度与条件数 $\\kappa=\\lVert A^{-1}\\rVert$ 无关。我们关注标准输入模型，其中 $A$ 通过块编码访问，$| b \\rangle$ 是由一个单元准备的。但我们还引入了一个仿射扩张模型，它编码 $A$ 和 $| b \\rangle$ 联合起来，允许进一步细化查询复杂性。我们基于截断的求解器对 $| 进行最佳数量的查询b \\rangle$ 和 $\\operatorname{\\mathbf{O}}\\left(\\kappa_{\\mathrm{eff}}\\operatorname{polylog}\\left(\\frac{\\kappa_{\\mathrm{eff}}}{\\epsilon}\\right)\\right)$ 查询到 $A$。\n\n我们证明了有效条件数的一系列上限，包括 $\\kappa_{\\mathrm{eff}}\\leq\\frac{\\lVert(A^\\dagger A)^{-t/2}|x\\rangle\\rVert^{1/t}}{\\epsilon^{1/t}}$ 正偶整数 $t$ 和 $\\kappa_{\\mathrm{eff}}\\leq\\frac{\\lVert A^{-1\\dagger}(A^\\dagger A)^{-(t-1)/2}|x\\rangle\\rVert^{1/t}}{\\epsilon^{1/t}}$ 为正奇 $t$，克服 $\\kappa$ 障碍。我们基于过滤的求解器非常简单，具有有利的运行时前置因素。特别是，当解范数已知时，求解器的查询复杂度为前导顺序 $6\\frac{\\lVert A^{-1\\dagger}|x\\rangle\\rVert}{\\epsilon}\\ln\\left(\\frac{1}{\\epsilon}\\right)$。然后，我们提出一个类似简单的解范数估计器，其具有相同的渐近成本直至对数因子。因此，我们的量子线性系统求解器极大地改进了 Li 的最新算法，使量子线性系统求解速度超出条件数。", "authors": [{"name": "Alexander M. Dalzell"}, {"name": "Jianqiang Li"}, {"name": "Yuan Su"}], "featured_authors": [{"name": "Alexander M. Dalzell"}, {"name": "Jianqiang Li"}, {"name": "Yuan Su"}], "author_count": 3}, {"id": "2607.07701", "category": "quant-ph", "title": "Multi-channel collective dissipation via the symmetric irreducible representation of SU(4)", "abstract": "We specialize Agarwal's multi-level collective spontaneous-emission formalism to the four-level case by formulating it in the fully symmetric \\SU(4) representation of $N$ identical atoms. In the irreducible representation $(N,0,0)$, the occupation-number basis forms a tetrahedral weight lattice on which the six embedded $\\mathfrak{su}(2)$ transition subalgebras act as ladder operators. From these algebraic factors we obtain a compact Pauli-type population-rate equation and a closed-form expression for the total emitted intensity that apply to any combination of open dipole channels. The formalism is then specialized to the seven dipole-allowed four-level topologies -- tripod, inverted tripod, Y, inverted Y, double-$\\Lambda$, closed cascade, and diamond -- and the resulting rate equations are solved numerically for atom numbers up to $N=50$. In every case the emitted intensity develops a delayed cooperative burst whose peak height obeys a power law $I_{\\mathrm{peak}}=aN^{p}$ with topology-dependent parameters $(a,p)$; the fitted exponents lie in the range $1.81\\lesssim p\\lesssim 1.92$, indicating a superlinear. The \\SU(4) tetrahedral flow and the seven configuration-dependent transients together provide a unified geometric picture of multi-channel collective dissipation in four-level atomic ensembles.", "url": "https://arxiv.org/abs/2607.07701", "type": "理论+数值", "summary": "我们通过将 Agarwal 的多级集体自发发射形式专门化为四能级情况，将其表述为 $N$ 相同原子的完全对称 \\SU(4) 表示。在不可约表示 $(N,0,0)$ 中，占据数基础形成一个四面体权重格，其中六个嵌入的 $\\mathfrak{su}(2)$ 过渡子代数充当梯子算子。从这些代数因子中，我们获得了一个紧凑的泡利型布居率方程和一个适用于开放偶极子通道的任意组合的总发射强度的封闭式表达式。然后，该形式专门针对七个偶极子允许的四能级拓扑——三脚架、倒三脚架、Y、倒Y、双$\\Lambda$、闭合级联和菱形——并且对所得的速率方程进行数值求解，以获得高达$N=50$的原子数。在每种情况下，发射强度都会产生延迟的协作爆发，其峰值高度遵循幂律 $I_{\\mathrm{peak}}=aN^{p}$ ，且参数取决于拓扑 $(a,p)$；拟合指数位于 $1.81\\lesssim p\\lesssim 1.92$ 范围内，表明超线性。\n\n\\SU(4) 四面体流和七个与构型相关的瞬态共同提供了四能级原子系综中多通道集体耗散的统一几何图。", "authors": [{"name": "M. Lutsukh"}, {"name": "M. Bazarsana"}, {"name": "T. Begzjav"}, {"name": "G. O. Ariunbold"}], "featured_authors": [{"name": "M. Lutsukh"}, {"name": "M. Bazarsana"}, {"name": "T. Begzjav"}, {"name": "G. O. Ariunbold"}], "author_count": 4}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
