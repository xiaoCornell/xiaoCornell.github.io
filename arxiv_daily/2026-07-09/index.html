  <style>

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

"Jyun-jie Jiang"}, {"name": "Xianghua Kong"}, {"name": "Hong Guo"}], "author_count": 4}, {"id": "2607.06729", "category": "cond-mat", "title": "Physical exact conditions as regularizers for exchange-correlation in solids and surface chemistry", "abstract": "Density functional theory (DFT) often is the method of choice for simulating the electronic properties of extended solids and surfaces from first principles due to a favorable compromise between accuracy and computational cost. In the field of heterogeneous catalysis, DFT is indispensable for deriving mechanistic insights and understanding trends in surface reactivity. The accuracy of DFT for surface reaction energetics depends strongly on the exchange-correlation (XC) approximation. We show here that optimization of such XC functionals for surface binding energies can lead to a worse description of surface reaction barriers, unless important physical exact conditions are fulfilled.", "url": "https://arxiv.org/abs/2607.06729", "type": "理论+数值", "summary": "由于精度和计算成本之间的有利折衷，密度泛函理论 (DFT) 通常是根据第一原理模拟扩展固体和表面的电子特性的首选方法。在多相催化领域，DFT 对于获得机理见解和理解表面反应性趋势是不可或缺的。表面反应能量学 DFT 的准确性在很大程度上取决于交换相关 (XC) 近似。我们在此表明​​，除非满足重要的物理精确条件，否则针对表面结合能的此类 XC 泛函的优化可能会导致表面反应势垒的描述更差。", "authors": [{"name": "Johannes Voss"}], "featured_authors": [{"name": "Johannes Voss"}], "author_count": 1}, {"id": "2607.06730", "category": "cond-mat", "title": "Spin-orbit magnetism in altermagnets", "abstract": "The mechanism enabling antiferromagnets, including altermagnets, to exhibit a prominent anomalous Hall effect despite a vanishingly small net magnetization has long remained elusive. Here, by employing oriented spin group theory and spin-orbit-coupling tensor expansion, we systematically disentangle the perturbative behaviors of orbital and spin magnetizations with respect to spin-orbit coupling. Remarkably, we find that only if the opposite-spin sublattices are connected through a fourfold rotation, the orbital and spin magnetizations exhibit distinct perturbative orders. In these altermagnets, we further discover a coaxial Hall effect characterized by the induced spin and orbital magnetizations aligning parallel to the Néel vector, which we further demonstrate by first-principles calculations in the altermagnet KV$_{2}$Se$_{2}$O. This effect holds great promise for achieving deterministic switching of the Néel order under weak external fields. Our work provides a systematic symmetry approach to identify potential altermagnetic candidates combining a large anomalous Hall effect with minimal net magnetization, paving the way for high-performance, stray-field-free spintronic applications.", "url": "https://arxiv.org/abs/2607.06730", "type": "理论+数值", "summary": "尽管净磁化强度微乎其微，但使反铁磁体（包括交流磁体）表现出显着的异常霍尔效应的机制长期以来仍然难以捉摸。在这里，通过采用定向自旋群理论和自旋轨道耦合张量展开，我们系统地解开了轨道和自旋磁化强度相对于自旋轨道耦合的微扰行为。值得注意的是，我们发现只有当相反自旋亚晶格通过四重旋转连接时，轨道和自旋磁化强度才会表现出不同的扰动顺序。在这些交替磁体中，我们进一步发现了同轴霍尔效应，其特征是感应自旋和轨道磁化强度平行于尼尔矢量排列，我们通过交替磁体 KV$_{2}$Se$_{2}$O 中的第一原理计算进一步证明了这一点。这种效应对于在弱外场下实现尼尔阶的确定性切换具有很大的希望。\n\n我们的工作提供了一种系统的对称方法来识别潜在的交变磁候选物，将大的反常霍尔效应与最小的净磁化强度相结合，为高性能、无杂散场的自旋电子应用铺平了道路。", "authors": [{"name": "Ruojia Wang"}, {"name": "Yuntian Liu"}, {"name": "Renzheng Xiong"}, {"name": "Xiaobing Chen"}, {"name": "Qihang Liu"}], "featured_authors": [{"name": "Ruojia Wang"}, {"name": "Yuntian Liu"}, {"name": "Renzheng Xiong"}, {"name": "Xiaobing Chen"}, {"name": "Qihang Liu"}], "author_count": 5}, {"id": "2607.06741", "category": "cond-mat", "title": "First-Principles Investigation of the Al-V Phase Diagram", "abstract": "The Al-V alloy system contains a number of phases including several with complex structures and at least two exhibiting sites of partial occupation. Through electronic density functional theory-based total energy calculations combined with methods of statistical mechanics, we examine the relative stability of phases at finite temperatures. We construct composition-continuous free energy models for the V-rich solid solution and for one of the complex intermetallic phases. In the V-rich region, we identify three ground states that transform to the solid solution at elevated temperatures. We also suggest that \\phase{Al}{V_3} takes the Al15 structure as an intermediate-temperature phase stabilized by anharmonic vibrational free energy.", "url": "https://arxiv.org/abs/2607.06741", "type": "理论+数值", "summary": "Al-V合金体系包含多个相，其中包括多个结构复杂的相和至少两个部分占据的表现位点。通过基于电子密度泛函理论的总能量计算结合统计力学的方法，我们检查了有限温度下相的相对稳定性。我们为富 V 固溶体和复杂金属间相之一构建了成分连续自由能模型。在富含 V 的区域，我们确定了在高温下转变为固溶体的三种基态。我们还建议\\phase{Al}{V_3}将Al15结构作为由非简谐振动自由能稳定的中温相。", "authors": [{"name": "AKM Sadman Mahmud"}, {"name": "Hassan Albuhairan"}, {"name": "Marek Mihalkovic"}, {"name": "Michael Widom"}], "featured_authors": [{"name": "AKM Sadman Mahmud"}, {"name": "Hassan Albuhairan"}, {"name": "Marek Mihalkovic"}, {"name": "Michael Widom"}], "author_count": 4}, {"id": "2607.06756", "category": "cond-mat", "title": "Topological charge, helicity and vorticity conservation and the reverse spin-current model in the II-nd type multifferoics", "abstract": "The topological charge and its density are related to the spin vorticity, while the spin vorticity is a part of full vorticity of the medium. The full vorticity is related to an integral of motion called the hydrodynamic helicity. Relation between two integrals of motion (the topological charge and the hydrodynamic helicity) is traced. The role of the spin-current model of the electric polarization formation due to the specific spin distribution in the helicity conservation is demonstrated. The reverse spin-current model is suggested to demonstrate the contribution of the polarization in the spin evolution equation, its importance for the helicity conservation is shown as well. Spin-field model of the electric polarization is the second model for the electric polarization (the deformation, firstly) formation due to the specific spin distribution, which appears from the same principles, but it has nonstationary origin. Moreover, the reverse spin-current model gives a mechanism for the spin structure formation due to the electric polarization in the system. It also appears as the requirement for the conservation of the helicity and the topological charge.", "url": "https://arxiv.org/abs/2607.06756", "type": "理论", "summary": "拓扑电荷及其密度与自旋涡度有关，而自旋涡度是介质全涡度的一部分。完整涡度与称为流体动力螺旋度的运动积分相关。追踪两个运动积分（拓扑电荷和流体动力螺旋度）之间的关系。证明了由于螺旋度守恒中的特定自旋分布而导致的电极化形成的自旋流模型的作用。建议使用反向自旋流模型来证明极化在自旋演化方程中的贡献，也显示了其对于螺旋度守恒的重要性。电极化的自旋场模型是由于特定的自旋分布而形成的电极化（首先是变形）的第二种模型，其出现原理相同，但它具有非平稳起源。此外，反向自旋电流模型给出了由于系统中的电极化而形成自旋结构的机制。它也表现为螺旋度和拓扑电荷守恒的要求。", "authors": [{"name": "Pavel A. Andreev"}], "featured_authors": [{"name": "Pavel A. Andreev"}], "author_count": 1}, {"id": "2607.06787", "category": "cond-mat", "title": "Microscopic Dynamical Entropy I: Quantifying Hamiltonian Irreversibility in Large and Small Systems", "abstract": "We introduce a Microscopic Dynamical Entropy (MDE) for Hamiltonian systems, defined with respect to a chosen partition of degrees of freedom into a system X and its environment Y. The construction is based on the conditional phase-space volume (CPV), or conditional Boltzmann entropy, associated with the unmonitored degrees of freedom Y. The MDE is a microscopically defined entropy functional of the marginal distribution $\\rho_X(t)$, obtained by discarding conditional microscopic information associated with Y from the Gibbs entropy of the joint XY system, while retaining exact Hamiltonian dynamics. This construction clarifies the microscopic origin of thermal entropy. The dependence of MDE solely on $\\rho_X(t)$ is consistent with the thermodynamic assumption that the entropy increment of a heat bath Y depends on its heat content and temperature, not on details of its probability distribution. Indeed, the MDE recovers dS = dQ/T connecting entropy increments to heat flow between system and environment. More generally, it provides a consistent description of irreversible relaxation under exact Hamiltonian dynamics, while permitting transient entropy decreases in small systems and in spin-echo type protocols. Under time-scale separation between X and Y, the MDE becomes strictly monotonic in time, recovering the familiar structure of irreversible thermodynamics. The MDE can foreshadow thermodynamics even in a small isolated Hamiltonian system, if X is a well chosen subset of its degrees of freedom. An example is the centre of mass of interacting particles confined to a box. Even for as few as N=10 particles, the MDE increases during relaxation towards a maximum at equilibrium, with increasing monotonicity at larger N. Taken together, our results show that the MDE offers a microscopic interpretation of nonequilibrium thermal entropy and its time dependence within exact Hamiltonian dynamics.", "url": "https://arxiv.org/abs/2607.06787", "type": "理论", "summary": "我们引入了哈密顿系统的微观动态熵（MDE），它是根据系统 X 及其环境 Y 中选定的自由度划分来定义的。该构造基于与不受监控的自由度 Y 相关的条件相空间体积（CPV）或条件玻尔兹曼熵。MDE 是边缘分布 $\\rho_X(t)$ 的微观定义的熵函数，通过丢弃与Y 来自联合 XY 系统的吉布斯熵，同时保留精确的哈密顿动力学。这种结构阐明了热熵的微观起源。 MDE 仅对 $\\rho_X(t)$ 的依赖性与热力学假设一致，即热浴 Y 的熵增量取决于其热含量和温度，而不取决于其概率分布的细节。事实上，MDE 恢复了 dS = dQ/T，将熵增量与系统和环境之间的热流联系起来。\n\n更一般地说，它提供了精确哈密顿动力学下不可逆弛豫的一致描述，同时允许小系统和自旋回波类型协议中的瞬态熵减少。在 X 和 Y 之间的时间尺度分离下，MDE 在时间上变得严格单调，恢复了熟悉的不可逆热力学结构。如果 X 是其自由度的精心选择的子集，即使在小型孤立哈密顿系统中，MDE 也可以预示热力学。一个例子是限制在盒子内的相互作用粒子的质心。即使对于 N=10 的粒子，MDE 在弛豫过程中也会增加到平衡时的最大值，并且在较大的 N 下单调性会增加。总之，我们的结果表明，MDE 提供了非平衡热熵及其在精确哈密顿动力学中的时间依赖性的微观解释。", "authors": [{"name": "Mingnan Ding"}, {"name": "Michael E. Cates"}], "featured_authors": [{"name": "Mingnan Ding"}, {"name": "Michael E. Cates"}], "author_count": 2}, {"id": "2607.06792", "category": "cond-mat", "title": "Symmetry-Enforced Chiral Phonons in Altermagnets via Magnon-Phonon Coupling", "abstract": "Chiral phonons are attractive for spintronics applications, however, their zero-field generation in conventional antiferromagnets is forbidden by combined parity and time-reversal ($\\mathcal{PT}$) symmetry. Here we demonstrate the emergence of chiral phonons in $\\mathcal{PT}$-breaking altermagnetic systems at zero field arising from relativistic magnon-phonon coupling. Focusing on the prototypical altermagnet CrSb, we utilize first-principles methods to calculate the hybridized magnon-polarons across the complete Brillouin zone. We show that this coupling imprints an altermagnetic $g$-wave symmetry directly onto the phonon angular momentum. Furthermore, we demonstrate anomalous spin and phonon angular momentum Nernst responses arising from finite Berry curvatures. These findings establish that chiral lattice dynamics can arise in compensated magnetic ground states without requiring external fields, positioning bulk altermagnets as material candidates for zero-field spin caloritronics and chiral phononics.", "url": "https://arxiv.org/abs/2607.06792", "type": "理论", "summary": "手性声子对于自旋电子学应用很有吸引力，然而，它们在传统反铁磁体中的零场产生被组合宇称和时间反转 ($\\mathcal{PT}$) 对称性所禁止。在这里，我们证明了由于相对论磁振子-声子耦合而在零场 $\\mathcal{PT}$ 破断交变磁系统中出现手性声子。着眼于原型交流磁体 CrSb，我们利用第一原理方法来计算整个布里渊区的混合磁振子极化子。我们证明这种耦合将交变 $g$ 波对称性直接印在声子角动量上。此外，我们还证明了有限贝里曲率引起的反常自旋和声子角动量能斯特响应。这些发现表明，手性晶格动力学可以在补偿磁基态中出现，而不需要外部场，从而将块体交替磁体定位为零场自旋热电子学和手性声子学的候选材料。", "authors": [{"name": "Philipp Rieger"}, {"name": "Markus Weißenhofer"}, {"name": "Sergiy Mankovsky"}, {"name": "Peter M. Oppeneer"}], "featured_authors": [{"name": "Philipp Rieger"}, {"name": "Markus Weißenhofer"}, {"name": "Sergiy Mankovsky"}, {"name": "Peter M. Oppeneer"}], "author_count": 4}, {"id": "2607.06812", "category": "cond-mat", "title": "Driven square lattice of quantum dots in a magnetic field coupled to a cylindrical FIR-photon cavity", "abstract": "We present a comprehensive computational study of driven quantum dot arrays in a square lattice configuration, subject to an external magnetic field and coupled to a cylindrical far-infrared photon cavity. The driving is introduced through a harmonic modulation of the full electron-photon interaction, therefore including both paramagnetic and diamagnetic contributions. The electron-electron Coulomb interactions are treated within density functional theory, while the electron-photon coupling is modeled using a many-body configuration interaction approach at each iteration of the density functional. By exploiting the unique properties of the cylindrical TE$_{011}$ cavity mode, we demonstrate selective enhancement of diamagnetic two-photon transitions. Our results reveal that the effectiveness of harmonic modulation of the electron-photon interaction is strongly dependent on both the driving frequency and the electron occupation number per dot. When the driving frequency approaches twice the cavity photon frequency, the system exhibits resonant behavior characterized by efficient photon pumping, occupation of higher-order photon replicas, and activation of collective radial Coulomb breathing modes. These findings establish a controllable mechanism for manipulating photon states in coupled quantum dot-cavity systems and provide insights into the interplay among harmonic modulation, photonic excitations, magnetic confinement, and many-body electron correlations in dimensionally reduced nanostructures.", "url": "https://arxiv.org/abs/2607.06812", "type": "理论+数值", "summary": "我们对方形晶格配置中的驱动量子点阵列进行了全面的计算研究，该阵列受到外部磁场的影响并耦合到圆柱形远红外光子腔。驱动是通过全电子-光子相互作用的谐波调制引入的，因此包括顺磁和反磁贡献。电子-电子库仑相互作用在密度泛函理论中进行处理，而电子-光子耦合则在密度泛函的每次迭代中使用多体配置相互作用方法进行建模。通过利用圆柱形 TE$_{011}$ 腔模式的独特性质，我们证明了抗磁双光子跃迁的选择性增强。我们的结果表明，电子-光子相互作用的谐波调制的有效性很大程度上取决于驱动频率和每个点的电子占据数。\n\n当驱动频率接近腔光子频率的两倍时，系统表现出谐振行为，其特征是有效的光子泵浦、占据高阶光子复制品以及集体径向库仑呼吸模式的激活。这些发现建立了一种在耦合量子点腔系统中操纵光子态的可控机制，并为降维纳米结构中谐波调制、光子激发、磁约束和多体电子关联之间的相互作用提供了见解。", "authors": [{"name": "Vidar Gudmundsson"}, {"name": "Vram Mughnetsyan"}, {"name": "Hsi-Sheng Goan"}, {"name": "Jeng-Da Chai"}, {"name": "Nzar Rauf Abdullah"}, {"name": "Chi-Shung Tang"}, {"name": "Wen-Hsuan Kuan"}, {"name": "Valeriu Moldoveanu"}, {"name": "Andrei Manolescu"}], "featured_authors": [{"name": "Vidar Gudmundsson"}, {"name": "Vram Mughnetsyan"}, {"name": "Hsi-Sheng Goan"}, {"name": "Wen-Hsuan Kuan"}, {"name": "Valeriu Moldoveanu"}, {"name": "Andrei Manolescu"}], "author_count": 9}, {"id": "2607.06814", "category": "cond-mat", "title": "Microscopic Dynamical Entropy II: Statistical and Stochastic Thermodynamics of Hamiltonian Systems", "abstract": "The Microscopic Dynamical Entropy (MDE) introduced in Ref. [1] describes irreversible relaxation of selected variables x within a finite closed Hamiltonian system of fixed total energy E. Here we extend the framework to arbitrary total-energy distributions and time-dependent Hamiltonians. This allows work interactions with external agents or protocols, crucial in stochastic and classical thermodynamics, and driven systems more generally, to be addressed directly. The central step is to reduce the full microscopic description in terms of selected variables x and unmonitored variables y to one in terms of the selected variables and the instantaneous total energy (x,E). The unmonitored degrees of freedom y in Y enter through their conditional phase-space volume (CPV) $\\Omega_Y(x,E,t)$. This construction allows work and heat to be defined directly for finite Hamiltonian composites, including cases where Y is so small that its temperature is not well defined. We demonstrate monotonic MDE growth, corresponding to the macroscopic second law, under mixing and time-scale separation even for driven systems with arbitrary energy distributions. At trajectory level, we derive detailed and integral fluctuation relations for the MDE, generalising standard large-bath results. We verify these numerically in a driven few-particle Hamiltonian system, showing the emergence of stochastic thermodynamics for collective coordinates, such as the centre-of-mass position, even in closed systems with only ten or twenty degrees of freedom. Physically, these fluctuation relations connect irreversibility to the change in the number of unmonitored microstates compatible with initial and final data for the observed coordinates. Together, our results provide a finite-system Hamiltonian foundation for the emergence of classical and stochastic thermodynamics and extend their applicability to surprisingly small heat baths.", "url": "https://arxiv.org/abs/2607.06814", "type": "理论+数值", "summary": "参考文献中介绍的微观动态熵（MDE）。 [1] 描述了在固定总能量 E 的有限封闭哈密顿系统中所选变量 x 的不可逆松弛。在这里，我们将框架扩展到任意总能量分布和时间相关哈密顿量。这允许直接解决与外部代理或协议的工作交互，这在随机和经典热力学以及更普遍的驱动系统中至关重要。中心步骤是将所选变量 x 和未监控变量 y 的完整微观描述减少为所选变量和瞬时总能量 (x,E) 的完整微观描述。 Y 中不受监控的自由度 y 通过其条件相空间体积 (CPV) $\\Omega_Y(x,E,t)$ 进入。这种结构允许直接定义有限哈密顿复合材料的功和热，包括 Y 太小以至于无法很好定义其温度的情况。我们证明了单调 MDE 增长，对应于宏观第二定律，即使对于具有任意能量分布的驱动系统，在混合和时间尺度分离下也是如此。\n\n在轨迹层面，我们推导了 MDE 的详细和积分涨落关系，概括了标准大浴结果。我们在驱动的少粒子哈密顿系统中对这些进行了数值验证，显示了集体坐标（例如质心位置）的随机热力学的出现，即使在只有十或二十个自由度的封闭系统中也是如此。从物理上讲，这些波动关系将不可逆性与与观测坐标的初始和最终数据兼容的不受监控的微观状态数量的变化联系起来。总之，我们的结果为经典和随机热力学的出现提供了有限系统哈密顿基础，并将其适用性扩展到令人惊讶的小型热浴。", "authors": [{"name": "Mingnan Ding"}, {"name": "Michael E. Cates"}], "featured_authors": [{"name": "Mingnan Ding"}, {"name": "Michael E. Cates"}], "author_count": 2}, {"id": "2607.06822", "category": "cond-mat", "title": "A neural-network Maxwell's demon learns cold damping for work extraction", "abstract": "We train a neural-network Maxwell's demon to extract work from a model of an underdamped micromechanical cantilever subject to thermal noise. The demon, which periodically adjusts the position of a harmonic trap, is trained to maximize the power extracted under steady-state operation. When the demon is given the cantilever position and trap position as inputs it learns a refined version of an existing hand-designed protocol, yielding a substantial improvement in performance. When the demon receives the oscillator velocity as input it discovers a qualitatively different strategy that extracts substantially more work, close to the theoretical power bound. Analysis of the protocol shows that it implements {\\em cold damping}: the trap position is displaced approximately linearly with velocity, producing an effective increase of the oscillator's damping coefficient and a reduction of its effective temperature. Thus a neural-network Maxwell's demon rediscovers a well-known cooling strategy from optomechanics, revealing a simple physical mechanism underlying near-optimal work extraction from thermal fluctuations in an underdamped system.", "url": "https://arxiv.org/abs/2607.06822", "type": "理论", "summary": "我们训练神经网络麦克斯韦妖从受热噪声影响的欠阻尼微机械悬臂梁模型中提取功。该恶魔会定期调整谐波陷阱的位置，经过训练可以最大限度地提高稳态操作下提取的功率。当恶魔被给予悬臂位置和陷阱位置作为输入时，它会学习现有手工设计协议的改进版本，从而显着提高性能。当恶魔接收到振荡器速度作为输入时，它会发现一种性质不同的策略，可以提取更多的功，接近理论功率界限。对协议的分析表明，它实现了{\\em冷阻尼}：陷阱位置与速度近似线性位移，从而有效增加了振荡器的阻尼系数并降低了其有效温度。因此，神经网络麦克斯韦妖重新发现了光力学中众所周知的冷却策略，揭示了从欠阻尼系统的热波动中提取近乎最佳功的简单物理机制。", "authors": [{"name": "Stephen Whitelam"}, {"name": "Sergio Ciliberto"}, {"name": "Ludovic Bellon"}], "featured_authors": [{"name": "Stephen Whitelam"}, {"name": "Sergio Ciliberto"}, {"name": "Ludovic Bellon"}], "author_count": 3}, {"id": "2607.06848", "category": "cond-mat", "title": "Large-scale pseudopotential density functional theory calculations using orthogonalized enriched finite element basis", "abstract": "We present an efficient and scalable computational framework for pseudopotential Kohn-Sham density functional theory (KS-DFT) calculations using an enriched finite element (EFE) basis. The EFE basis is formed by augmenting the classical finite element (CFE) basis with compact atom-centered functions, which we term enrichment functions. The key idea is to combine the completeness of a finite element basis with the efficiency of an atom-centered basis. We orthogonalize the enrichment functions with respect to the underlying CFE basis to simultaneously improve the conditioning of the EFE basis and the efficiency of evaluating the inverse of the overlap matrix. To efficiently solve the Kohn-Sham eigenvalue problem, we employ a residual-based Chebyshev subspace iteration approach that is tolerant to approximations in the evaluation of the inverse of the overlap matrix. We demonstrate the accuracy of the framework as compared to the widely available DFT packages. For benchmark non-periodic calculations, ranging up to 39,083 electrons, the EFE basis offers a $5-7\\times$ reduction in degrees of freedom over the CFE basis. As a result of this, EFE achieves a $5-9\\times$ reduction in computational cost over the CFE basis. The EFE basis also provides a $4-5\\times$ reduction in the required memory compared to the CFE basis, thus allowing for optimal utilization of computational resources. Finally, we demonstrate that the EFE basis affords good parallel scalability. Overall, the EFE basis offers a systematically convergent, fast, scalable, resource-efficient basis for pseudopotential DFT calculations.", "url": "https://arxiv.org/abs/2607.06848", "type": "理论+数值", "summary": "我们使用丰富的有限元 (EFE) 基础，提出了一种高效且可扩展的计算框架，用于赝势 Kohn-Sham 密度泛函理论 (KS-DFT) 计算。 EFE 基础是通过用紧凑的原子中心函数（我们称之为富集函数）增强经典有限元 (CFE) 基础而形成的。关键思想是将有限元基础的完整性与原子中心基础的效率结合起来。我们将富集函数与底层 CFE 基础正交化，以同时提高 EFE 基础的调节和评估重叠矩阵逆的效率。为了有效地解决 Kohn-Sham 特征值问题，我们采用了基于残差的切比雪夫子空间迭代方法，该方法在重叠矩阵的逆矩阵的评估中能够容忍近似。与广泛使用的 DFT 包相比，我们证明了该框架的准确性。对于基准非周期计算（范围最多为 39,083 个电子），EFE 基础的自由度比 CFE 基础的自由度降低了 5-7 倍。\n\n因此，与 CFE 相比，EFE 的计算成本降低了 5-9 倍。与 CFE 基础相比，EFE 基础还可以将所需内存减少 4-5 倍，从而实现计算资源的最佳利用。最后，我们证明 EFE 基础提供了良好的并行可扩展性。总体而言，EFE 基础为赝势 DFT 计算提供了系统收敛、快速、可扩展、资源高效的基础。", "authors": [{"name": "Avirup Sircar"}, {"name": "Bikash Kanungo"}, {"name": "Sambit Das"}, {"name": "Vikram Gavini"}], "featured_authors": [{"name": "Avirup Sircar"}, {"name": "Bikash Kanungo"}, {"name": "Sambit Das"}, {"name": "Vikram Gavini"}], "author_count": 4}, {"id": "2607.06866", "category": "cond-mat", "title": "Disorder signatures in coherent electronic waveguides", "abstract": "Microscopic disorder in a coherent conductor is encoded in the magnitude of the transmitted current and in the energy- and channel-resolved structure of the scattering response. We develop a conductance-balanced learning framework for identifying microscopic disorder mechanisms from coherent quantum-transport spectra. Using armchair graphene nanoribbons as controlled multichannel tight-binding waveguides, we generate ensembles in which distinct disorder classes occupy the same intervals of integrated transmission, removing the dominant shortcut associated with average conductance. Within this constrained setting, we compare scalar transmission spectra with transmission-eigenvalue spectra, and use supervised classification, scale-normalizing controls, plateau-resolved tests, and principal-component analysis to identify the spectral structures that remain informative. The learned distinctions persist after normalization of the conductance envelope and are strongest in multichannel energy windows, where mode mixing and channel redistribution shape the scattering response. Principal components provide interpretable transport coordinates whose loadings identify the energy and eigenchannel sectors responsible for the dominant spectral deformations. The results establish a controlled AI-assisted protocol for learning disorder signatures from nonlinear quantum-scattering data.", "url": "https://arxiv.org/abs/2607.06866", "type": "理论+数值", "summary": "相干导体中的微观无序被编码为传输电流的大小以及散射响应的能量和通道解析结构。我们开发了一个电导平衡学习框架，用于从相干量子传输光谱中识别微观无序机制。使用扶手椅石墨烯纳米带作为受控多通道紧束缚波导，我们生成了集合，其中不同的无序类别占据相同的积分传输间隔，消除了与平均电导相关的主要捷径。在这种约束设置下，我们将标量透射谱与透射特征值谱进行比较，并使用监督分类、尺度归一化控制、平台分辨测试和主成分分析来识别仍然提供信息的谱结构。在电导包络归一化后，学到的区别仍然存在，并且在多通道能量窗口中最强，其中模式混合和通道重新分布塑造了散射响应。\n\n主成分提供了可解释的传输坐标，其载荷确定了造成主要光谱变形的能量和本征通道扇区。结果建立了一个受控的人工智能辅助协议，用于从非线性量子散射数据中学习无序特征。", "authors": [{"name": "Alejandro Lopez-Bezanilla"}], "featured_authors": [{"name": "Alejandro Lopez-Bezanilla"}], "author_count": 1}, {"id": "2607.06878", "category": "cond-mat", "title": "Thermoelectric and Magnetic Properties in Doped Fe$_2$VAl within a Bipolar Random Anderson Model", "abstract": "We investigate the thermoelectric and magnetic properties of Si-substituted $n$-type and Ti-substituted $p$-type Heusler alloy Fe$_2$VAl using the bipolar random Anderson model, which has been introduced recently to study antisite-defect effects associated with the sign change of the Seebeck coefficient in thermally quenched Fe$_2$VAl. Based on the electronic states of both $n$-type and $p$-type compounds, with the rigid-band shift of the Fermi energy and a temperature-dependent scattering rate taken into account, we elucidate how antisite defects simultaneously influence thermoelectric transport and local magnetic moments. We find that the magnetic moments are enhanced in $n$-type Fe$_2$VAl, whereas they are suppressed in $p$-type Fe$_2$VAl compared with the undoped compound. These contrasting magnetic responses highlight the impact of antisite spin polarization on thermoelectric properties and demonstrate the crucial role of antisite defects in realizing magneto-thermoelectric functionalities in Heusler-type alloys.", "url": "https://arxiv.org/abs/2607.06878", "type": "理论", "summary": "我们使用双极随机安德森模型研究了 Si 取代的 $n$ 型和 Ti 取代的 $p$ 型 Heusler 合金 Fe$_2$VAl 的热电和磁性能，该模型最近被引入来研究与热淬火 Fe$_2$VAl 中塞贝克系数符号变化相关的反位缺陷效应。基于$n$型和$p$型化合物的电子态，考虑费米能的刚性带位移和温度相关的散射率，我们阐明了反位缺陷如何同时影响热电输运和局部磁矩。我们发现与未掺杂的化合物相比，$n$型Fe$_2$VAl中的磁矩增强，而$p$型Fe$_2$VAl中的磁矩受到抑制。这些对比鲜明的磁响应凸显了反位自旋极化对热电性能的影响，并证明了反位缺陷在实现赫斯勒型合金磁热电功能方面的关键作用。", "authors": [{"name": "Takami Tohyama"}, {"name": "Hidetoshi Fukuyama"}], "featured_authors": [{"name": "Takami Tohyama"}, {"name": "Hidetoshi Fukuyama"}], "author_count": 2}, {"id": "2607.06904", "category": "cond-mat", "title": "Negative and Zero Linear Compressibility in MCN (M = Ag, Au, Cu): A First-Principles Study", "abstract": "Negative linear compressibility (NLC) is the counterintuitive phenomenon in which a crystallographic axis expands under hydrostatic pressure. A related phenomenon, zero linear compressibility (ZLC), occurs when an axis shows no length change under pressure. Both responses are rare and arise in materials with highly anisotropic mechanical properties. Motivated by recent reports of anomalous behavior in metal cyanides - including negative thermal expansion and NLC - we use first-principles calculations to investigate the potential of the MCN family (M = Ag, Au, Cu) to exhibit ZLC or NLC. Our simulations reveal three main findings. First, we predict the existence of previously unreported phases: the P6mm phase for AgCN and CuCN, and the R3m phase for AuCN. Second, all six members of the MCN family studied exhibit extreme elastic anisotropy, which indeed leads to ZLC or NLC in each case. Third, we identify a mechanism for these responses distinct from previously reported ones. The mechanism arises from the unique \"bamboo forest\" geometry of the material: weakly interacting rigid rods whose sparse packing allows pressure to be accommodated through changes in packing density rather than rod compression. This mechanism enables the anomalous response to persist over a wide pressure range, contrasting favorably with other materials that exhibit similar behavior. Our findings expand the relatively small family of materials known to exhibit ZLC or NLC and provide deeper insight into the microscopic origin of these unusual mechanical responses.", "url": "https://arxiv.org/abs/2607.06904", "type": "理论+数值", "summary": "负线性压缩率 (NLC) 是一种违反直觉的现象，即晶轴在静水压力下膨胀。当轴在压力下没有显示长度变化时，就会出现一种相关现象，即零线性压缩率 (ZLC)。这两种响应都很罕见，并且出现在具有高度各向异性机械性能的材料中。受最近金属氰化物异常行为（包括负热膨胀和 NLC）报道的启发，我们使用第一原理计算来研究 MCN 家族（M = Ag、Au、Cu）表现出 ZLC 或 NLC 的潜力。我们的模拟揭示了三个主要发现。首先，我们预测以前未报道的相的存在：AgCN 和 CuCN 的 P6mm 相，以及 AuCN 的 R3m 相。其次，所研究的 MCN 家族的所有六个成员都表现出极端的弹性各向异性，这确实在每种情况下都会导致 ZLC 或 NLC。第三，我们确定了这些反应的机制与之前报道的不同。\n\n该机制源于材料独特的“竹林”几何形状：弱相互作用的刚性棒，其稀疏堆积允许通过堆积密度的变化而不是棒压缩来调节压力。这种机制使得异常响应能够在很宽的压力范围内持续存在，这与表现出类似行为的其他材料形成鲜明对比。我们的研究结果扩展了已知具有 ZLC 或 NLC 的相对较小的材料家族，并为这些不寻常的机械响应的微观起源提供了更深入的见解。", "authors": [{"name": "Arlies Valdespino"}, {"name": "Abduljelili Popoola"}, {"name": "Sergey Lisenkov"}, {"name": "Inna Ponomareva"}], "featured_authors": [{"name": "Arlies Valdespino"}, {"name": "Abduljelili Popoola"}, {"name": "Sergey Lisenkov"}, {"name": "Inna Ponomareva"}], "author_count": 4}, {"id": "2607.06966", "category": "cond-mat", "title": "Anomalous Hall and Nernst effects driven by static and fluctuating spin chiralities on Kagome lattice", "abstract": "We theoretically investigate the anomalous Hall and Nernst effects (AHE and ANE) in a two dimensional Kagome lattice to uncover the distinct roles of static and fluctuating scalar spin chi ralities. Employing Monte Carlo simulations incorporating with a tight binding Hamiltonian via the s-d exchange interaction, we explicitly evaluate the anomalous transport coefficients. A key finding is the systematic disentanglement of the macroscopic responses into an intrinsic contribu tion, governed by momentum space Berry curvature induced by static chirality, and an extrinsic skew scattering contribution driven by real space dynamical spin fluctuations. We demonstrate a pronounced mechanistic crossover: deep in magnetically ordered phases like the skyrmion crystal, the intrinsic Berry curvature dictates the transport behavior. However, approaching the magnetic order-disorder critical regime, strong thermal fluctuations disrupt static noncoplanar spin configu rations, drastically suppressing intrinsic responses. Here, dynamical chiral fluctuations emerge as the dominant driving force. By delineating the phase regimes governed by static versus fluctuating chiralities, this work elucidates the distinct microscopic mechanisms dictating anomalous transport in frustrated magnetic systems.", "url": "https://arxiv.org/abs/2607.06966", "type": "理论+数值", "summary": "我们从理论上研究了二维 Kagome 晶格中的反常霍尔效应和能斯特效应（AHE 和 ANE），以揭示静态和波动标量自旋手性的不同作用。通过 s-d 交换相互作用，采用蒙特卡罗模拟与紧束缚哈密顿量相结合，我们明确地评估了异常输运系数。一个关键发现是将宏观响应系统地分解为内在贡献，该内在贡献由静态手性引起的动量空间贝里曲率和由真实空间动态自旋涨落驱动的外在偏斜散射贡献控制。我们展示了明显的机械交叉：在像斯格明子晶体这样的磁有序相深处，固有的贝里曲率决定了输运行为。然而，接近磁有序无序临界状态时，强烈的热波动会破坏静态非共面自旋构型，从而极大地抑制本征响应。在这里，动态手性涨落成为主要驱动力。\n\n通过描绘静态手性与波动手性控制的相态，这项工作阐明了受挫磁系统中决定异常输运的不同微观机制。", "authors": [{"name": "He-Lin Li"}, {"name": "Zhen-Gang Zhu"}, {"name": "Gang Su"}], "featured_authors": [{"name": "He-Lin Li"}, {"name": "Zhen-Gang Zhu"}, {"name": "Gang Su"}], "author_count": 3}, {"id": "2607.06969", "category": "cond-mat", "title": "AI2Pot: A scalable and unified framework for machine-learning interatomic potential development and large-scale molecular dynamic simulations", "abstract": "Machine-learning interatomic potentials (MLIPs) bridge the accuracy of first-principles calculations and the efficiency required for large-scale molecular dynamics (MD) simulations. However, existing MLIP software remains fragmented across different model architectures, making it difficult to establish unified workflows that support flexible model development, efficient training, and scalable MD deployment. Here, we present AI2Pot, a scalable and unified MLIP framework that seamlessly integrates model training, evaluation, and large-scale MD simulations with PyTorch-compatible ecosystem. Instead of relying on generic automatic differentiation for expensive atomistic operators, AI2Pot re-engineers the core computations of Moment tensor potential (MTP) and Neuroevolution potential (NEP) for both training and inference using hand-crafted C++/CUDA code. These specialized operators constitute a unified computational backend shared by training and inference, improving training-inference consistency and reducing memory usage by avoiding large intermediate caches. As a result, AI2Pot enables fast inference for large-scale atomic systems containing millions of atoms on a single GPU, while retaining the flexibility of PyTorch for model construction, training, and evaluation. Trained models can be deployed in ASE and LAMMPS for MD simulations. Furthermore, AI2Pot provides a companion command-line toolkit (AI2Pot-cli) and Python APIs to facilitate practical MLIP workflows. By unifying high-performance atomistic computing with modern machine-learning ecosystems, AI2Pot offers an user-friendly end-to-end framework for the developing, training, and deploying MLIPs for large scale MD.", "url": "https://arxiv.org/abs/2607.06969", "type": "理论+数值", "summary": "机器学习原子间势 (MLIP) 将第一原理计算的准确性与大规模分子动力学 (MD) 模拟所需的效率结合起来。然而，现有的 MLIP 软件仍然分散在不同的模型架构中，因此很难建立支持灵活模型开发、高效训练和可扩展 MD 部署的统一工作流程。在这里，我们介绍 AI2Pot，这是一个可扩展且统一的 MLIP 框架，它将模型训练、评估和大规模 MD 模拟与 PyTorch 兼容的生态系统无缝集成。 AI2Pot 不再依赖昂贵的原子算子的通用自动微分，而是使用手工编写的 C++/CUDA 代码重新设计了矩张量势 (MTP) 和神经进化势 (NEP) 的核心计算，用于训练和推理。这些专门的算子构成了训练和推理共享的统一计算后端，提高了训练-推理的一致性，并通过避免大型中间缓存来减少内存使用。\n\n因此，AI2Pot 能够在单个 GPU 上对包含数百万个原子的大规模原子系统进行快速推理，同时保留 PyTorch 在模型构建、训练和评估方面的灵活性。经过训练的模型可以部署在 ASE 和 LAMMPS 中进行 MD 模拟。此外，AI2Pot 还提供配套的命令行工具包 (AI2Pot-cli) 和 Python API，以促进实际的 MLIP 工作流程。通过将高性能原子计算与现代机器学习生态系统相结合，AI2Pot 提供了一个用户友好的端到端框架，用于开发、训练和部署大规模 MD 的 MLIP。", "authors": [{"name": "Hanyu Liu"}, {"name": "Linggang Zhu"}, {"name": "Xuanguang Zhang"}, {"name": "Ning Yang"}, {"name": "Jian Zhou"}, {"name": "Zhimei Sun"}], "featured_authors": [{"name": "Hanyu Liu"}, {"name": "Linggang Zhu"}, {"name": "Xuanguang Zhang"}, {"name": "Ning Yang"}, {"name": "Jian Zhou"}, {"name": "Zhimei Sun"}], "author_count": 6}, {"id": "2607.07002", "category": "cond-mat", "title": "Size focusing in core-shell precipitates: A phase-field study", "abstract": "Due to their enhanced resistance to coarsening and/or creep, aluminium alloys with precipitates of two distinct phases in a core-shell morphology are of great contemporary interest. In this paper, we focus on the curious observation in two recent studies on Al-Sc-Li and Al-Yb-Li alloys that growth of the shell phase leads to a narrowing of the size distribution. We have studied this phenomenon, known as size focusing, using a theoretical framework (which extends Zener's theory of diffusional growth to a core-shell precipitate) and multi-precipitate simulations based on a phase field model. Our results yield key theoretical insights as well as conclusions with practical significance. (a) On the theoretical front, we show clearly that size focusing is a growth phenomenon: it ends when shell growth ends, and coarsening begins. (b) On the practical front, our results offer guidelines for designing alloys with narrower size distributions: size focusing is promoted in alloys with greater shell volume fractions and greater inter-precipitate spacing.", "url": "https://arxiv.org/abs/2607.07002", "type": "理论+数值", "summary": "由于其增强的抗粗化和/或蠕变能力，在核-壳形态中具有两种不同相的沉淀物的铝合金在当代引起了极大的兴趣。在本文中，我们重点关注最近两项关于 Al-Sc-Li 和 Al-Yb-Li 合金的研究中令人好奇的观察结果，即壳相的生长导致尺寸分布变窄。我们使用理论框架（将齐纳的扩散生长理论扩展到核壳沉淀物）和基于相场模型的多沉淀物模拟，研究了这种称为尺寸聚焦的现象。我们的结果产生了关键的理论见解以及具有实际意义的结论。 (a) 在理论方面，我们清楚地表明，尺寸聚焦是一种生长现象：当壳生长结束时，尺寸聚焦结束，粗化开始。 （b）在实践方面，我们的结果为设计具有更窄尺寸分布的合金提供了指导：在具有更大壳体积分数和更大沉淀间间距的合金中促进尺寸聚焦。", "authors": [{"name": "Soumya Mishra"}, {"name": "T. A. Abinandanan"}], "featured_authors": [{"name": "Soumya Mishra"}, {"name": "T. A. Abinandanan"}], "author_count": 2}, {"id": "2607.07037", "category": "cond-mat", "title": "Minimizing propagated density errors of atomic core-electron for simultaneously accurate bandgaps and lattice constants in closed-shell Copper semiconductors", "abstract": "Density functional theory struggles to accurately determine electron density of atoms, whose error is inevitably encoded into the pseudopotential and propagated into solid-state calculations. However, little is known about how this affects accuracy nor how to remedy it. In this work, through a systematic study of the effect of Cu atomic density on bandgap and lattice constants of over 50 Cu-containing simple closed-shell semiconductors, we find that core-electron density can drastically affect nuclear attraction to valence electrons and subsequent charge distribution and energy position of Cu 3$d$ electrons. The error can be eliminated at its source by employing modified Hartree-Fock pseudopotentials for Cu core while retaining (semi-)local functionals for valence electrons. This real-space partitioning approach leads to simultaneous high-accuracy in bandgap and lattice constants across the entire material class.", "url": "https://arxiv.org/abs/2607.07037", "type": "理论+数值", "summary": "密度泛函理论很难准确确定原子的电子密度，其误差不可避免地被编码到赝势中并传播到固态计算中。然而，人们对这如何影响准确性以及如何补救知之甚少。在这项工作中，通过系统研究Cu原子密度对50多种含Cu简单闭壳半导体的带隙和晶格常数的影响，我们发现核电子密度可以极大地影响核对价电子的吸引力以及随后的Cu 3$d$电子的电荷分布和能量位置。通过对铜核采用修改后的 Hartree-Fock 赝势，同时保留价电子的（半）局域泛函，可以从根源上消除该误差。这种实空间划分方法可以同时实现整个材料类别的带隙和晶格常数的高精度。", "authors": [{"name": "Kuiyu Ye"}, {"name": "Haitao Liu"}, {"name": "Yuanchang Li"}, {"name": "Shengbai Zhang"}], "featured_authors": [{"name": "Kuiyu Ye"}, {"name": "Haitao Liu"}, {"name": "Yuanchang Li"}, {"name": "Shengbai Zhang"}], "author_count": 4}, {"id": "2607.07041", "category": "cond-mat", "title": "A low-energy effective Hamiltonian for Landau quasiparticles: II Application to the contact Fermi gas", "abstract": "This article follows up on arXiv:2511.15938 , in which we developed a new renormalization scheme to construct a quantized theory of Fermi liquids. Here, we apply this formalism to a low-temperature atomic Fermi gas where the short-range interactions are fully parametrized by the s-wave scattering length $a$. We benchmark our renormalized theory by recovering known perturbative results on the static properties of the Fermi gas, such as the Lee-Huang-Yang expansion of the equation of state, the Galitskii expansion of the momentum distribution, and the Gor'kov- Melik Barkhudarov preexponential correction to the critical temperature. We then turn to the transport dynamics and demonstrate the presence of a preexponential correction to the speed of zero sound when including corrections of second order in $a$. Finally, we develop an efficient numerical method to solve the transport equation exactly, and we apply to study the crossover from the collisionless to the hydrodynamic regime in the density and polarisation response functions.", "url": "https://arxiv.org/abs/2607.07041", "type": "理论+数值", "summary": "本文是 arXiv:2511.15938 的后续文章，其中我们开发了一种新的重正化方案来构建费米液体的量子化理论。在这里，我们将这种形式应用于低温原子费米气体，其中短程相互作用完全由 s 波散射长度 $a$ 参数化。我们通过恢复费米气体静态特性的已知扰动结果来对重正化理论进行基准测试，例如状态方程的Lee-Huang-Yang展开、动量分布的Galitskii展开以及对临界温度的Gor'kov-Melik Barkhudarov指数前修正。然后，我们转向传输动力学，并证明当在 $a$ 中包含二阶校正时，零声速存在指数前校正。最后，我们开发了一种有效的数值方法来精确求解输运方程，并应用于研究密度和极化响应函数中从无碰撞到流体动力学状态的交叉。", "authors": [{"name": "Pierre-Louis Taillat"}, {"name": "Hadrien Kurkjian"}], "featured_authors": [{"name": "Pierre-Louis Taillat"}, {"name": "Hadrien Kurkjian"}], "author_count": 2}, {"id": "2607.07086", "category": "cond-mat", "title": "A modified Moss rule highlights underexplored classes of high refractive index materials", "abstract": "High refractive index dielectrics are central to photonic applications, yet the empirical Moss rule imposes a fundamental trade-off between refractive index and optical transparency. We introduce a modified Moss rule anchored to the optical absorption edge rather than the fundamental bandgap, capturing materials where various physical mechanisms suppress absorption well above the electronic gap. Screening the Materials Project database with this metric reveals recurring chemical compositions and structural prototypes in the materials with the most promising refractive index/transparency trade-offs. These materials include chalcopyrites, Zintl pnictides, and early transition metal multi-anion chalconitrides and oxychalcogenides compounds. Hybrid density functional theory calculations reveal that the chalconitride (Hf,Zr)2(S,Se)N2 family can achieve a combination of ultra-high refractive indices, low effective masses and transparency windows extending deep into the UV, surpassing state-of-the-art TiO2 and SiC. Our results establish (Hf,Zr)2(S,Se)N2 compounds as a unique and largely unexplored material family for next-generation photonic applications.", "url": "https://arxiv.org/abs/2607.07086", "type": "理论+数值", "summary": "高折射率电介质是光子应用的核心，但经验莫斯规则在折射率和光学透明度之间强加了基本的权衡。我们引入了一种锚定于光学吸收边而不是基本带隙的改进的莫斯规则，捕获各种物理机制抑制远远高于电子能隙的吸收的材料。使用此指标筛选材料项目数据库，揭示了具有最有希望的折射率/透明度权衡的材料中重复出现的化学成分和结构原型。这些材料包括黄铜矿、Zintl磷族化合物以及早期过渡金属多阴离子硫族氮化物和氧硫属化物化合物。混合密度泛函理论计算表明，硫氮化物 (Hf,Zr)2(S,Se)N2 系列可以实现超高折射率、低有效质量和延伸至紫外线深处的透明窗口的组合，超越了最先进的 TiO2 和 SiC。我们的研究结果表明 (Hf,Zr)2(S,Se)N2 化合物是一种独特且很大程度上未经探索的下一代光子应用材料系列。", "authors": [{"name": "Eugène Bertin"}, {"name": "Finja Tadge"}, {"name": "Andrea Crovetto"}], "featured_authors": [{"name": "Eugène Bertin"}, {"name": "Finja Tadge"}, {"name": "Andrea Crovetto"}], "author_count": 3}, {"id": "2607.07090", "category": "cond-mat", "title": "Ethaline deep eutectic solvent under nanoconfinement: Unveiling structural and dynamical changes", "abstract": "Hybrid nanomaterials incorporating deep eutectic solvents (DES) in porous hosts or at solid interfaces are gaining increasing attention for their potential interest across a wide range of applications. Under these conditions, the performances of DESs may be influenced by interfacial effects and spatial restrictions. In this study, we examined the effects of nanoconfinement on both the structure and molecular dynamics of the prototypical DES ethaline (a mixture of choline chloride and ethylene glycol) when confined within the cylindrical mesopores of SBA-15 (Dp $\\approx$ 8.1 nm) and MCM-41 (Dp $\\approx$ 3.5 nm) silicas, using neutron diffraction and quasielastic neutron scattering. It demonstrates that ethaline remains structurally homogeneous under confinement, showing no evidence of core-shell segregation within the pore cross-section. The molecular dynamics of the confined ethaline preserve the key characteristics observed in its bulk state. Translational diffusion follows a jump-diffusion mechanism, with diffusion coefficients that remain remarkably close to the bulk values, showing only a modest reduction in MCM-41. A more pronounced increase in the residence time t0 between translational molecular jumps is observed. It corresponds to roughly a factor of 3-8 under confinement in SBA-15, and reaches up to a tenfold enhancement in MCM-41 relative to bulk. Similarly, the characteristic relaxation time, tL, associated with the localized in-cage motion of ethaline, increases by approximately 20% in SBA-15 and up to 50% in MCM-41. However, the molecular trajectories, modeled from the elastic incoherent structure factor, remain largely preserved under confinement, showing only a marginal reduction in intra-basin motional amplitudes.", "url": "https://arxiv.org/abs/2607.07090", "type": "理论+数值", "summary": "在多孔基质或固体界面中掺入深共晶溶剂（DES）的混合纳米材料因其在广泛应用中的潜在兴趣而受到越来越多的关注。在这些条件下，DES 的性能可能会受到界面效应和空间限制的影响。在本研究中，我们利用中子衍射和准弹性中子散射，研究了纳米限制对原型 DES 乙醇（氯化胆碱和乙二醇的混合物）限制在 SBA-15（Dp $\\approx$ 8.1 nm）和 MCM-41（Dp $\\approx$ 3.5 nm）二氧化硅的圆柱形介孔内时的结构和分子动力学的影响。它表明乙胺在限制下保持结构均匀，没有显示孔隙横截面内核壳分离的证据。受限乙醇的分子动力学保留了在其本体状态下观察到的关键特征。平移扩散遵循跳跃扩散机制，扩散系数仍然非常接近体积值，表明 MCM-41 仅略有减少。\n\n观察到平移分子跳跃之间的停留时间 t0 有更明显的增加。它大约相当于 SBA-15 限制下的 3-8 倍，而 MCM-41 相对于体积而言可达到十倍增强。同样，与乙胺的局部笼内运动相关的特征弛豫时间 tL 在 SBA-15 中增加了约 20%，在 MCM-41 中增加了 50%。然而，根据弹性非相干结构因子建模的分子轨迹在限制下仍然大部分保留，仅显示盆地内运动幅度略有减少。", "authors": [{"name": "Kamar Mohammad Nadim"}, {"name": "Mozhdehei Armin"}, {"name": "Lefort Ronan"}, {"name": "Moréac Alain"}, {"name": "Ollivier Jacques"}, {"name": "Appel Markus"}, {"name": "Viviana Cristiglio"}, {"name": "Denis Morineau"}], "featured_authors": [{"name": "Kamar Mohammad Nadim"}, {"name": "Mozhdehei Armin"}, {"name": "Lefort Ronan"}, {"name": "Appel Markus"}, {"name": "Viviana Cristiglio"}, {"name": "Denis Morineau"}], "author_count": 8}, {"id": "2607.07092", "category": "cond-mat", "title": "Unveiling Nanoscale Surface Damage Dynamics in Swift Heavy Ion Irradiated Gallium Nitride", "abstract": "This work systematically unveils the nanoscale surface damage dynamics in gallium nitride by investigating the atomistic mechanisms of hillock formation. The results identify two distinct hillock morphologies dependent on electronic energy loss (Se) values. Bell-shaped hillocks form under 18.2 keV/nm Kr irradiation, whereas crater-rim hillocks with central holes emerge under 40.2 keV/nm Ta irradiation. Microstructural analysis reveals that Ga-rich hillocks are accompanied by the generation of metastable zincblende nanodomains. These nanodomains preferentially aggregate around the periphery or sidewalls of the hillocks and exhibit a high spatial correlation with screw dislocations. Further temperature-dependent studies indicate that elevated temperatures significantly enlarge the overall dimensions of the hillock structures without altering their fundamental morphologies. Notably, under Ta irradiation above 1200 K, the high temperatures drastically reduce the viscosity and surface tension of liquid gallium. This enhanced fluidity of the transient molten phase promotes the formation of penetrating nanochannels.", "url": "https://arxiv.org/abs/2607.07092", "type": "理论", "summary": "这项工作通过研究小丘形成的原子机制，系统地揭示了氮化镓中的纳米级表面损伤动力学。结果确定了取决于电子能量损失 (Se) 值的两种不同的小丘形态。在 18.2 keV/nm Kr 辐照下形成钟形小丘，而在 40.2 keV/nm Ta 辐照下出现带有中心孔的火山口边缘小丘。微观结构分析表明，富镓小丘伴随着亚稳态闪锌矿纳米域的生成。这些纳米域优先聚集在小丘的外围或侧壁周围，并表现出与螺旋位错的高度空间相关性。进一步的温度依赖性研究表明，升高的温度显着扩大了小丘结构的整体尺寸，而不会改变其基本形态。值得注意的是，在 1200 K 以上的 Ta 辐照下，高温大大降低了液态镓的粘度和表面张力。瞬态熔融相流动性的增强促进了穿透纳米通道的形成。", "authors": [{"name": "Jiayu Liang"}, {"name": "Shaowei He"}, {"name": "Wenlong Liao"}, {"name": "Tan Shi"}, {"name": "Hang Zang"}, {"name": "Yonghong Li"}, {"name": "Wenbo Liu"}, {"name": "Xiaojun Fu"}, {"name": "Chuanjian Yao"}, {"name": "Huan He"}, {"name": "Jianan Wei"}, {"name": "Chaohui He"}], "featured_authors": [{"name": "Jiayu Liang"}, {"name": "Shaowei He"}, {"name": "Wenlong Liao"}, {"name": "Huan He"}, {"name": "Jianan Wei"}, {"name": "Chaohui He"}], "author_count": 12}, {"id": "2607.07113", "category": "cond-mat", "title": "Density-Induced Reentrant Coarsening in a Two-Temperature System", "abstract": "Understanding how nonequilibrium driving modifies phase-separation kinetics remains a fundamental challenge. Here we show that phase separation in a two-temperature system exhibits a striking density-induced reentrant coarsening behavior. Using Brownian dynamics simulations and a coarse-grained field-theoretic model, we find that the characteristic domain size grows as $L(t)\\sim t^{1/z}$, displaying a reentrant sequence $(t^{1/3} \\rightarrow t^{1/4}\\rightarrow t^{1/3})$ with increasing density. While the low- and high-density regimes are governed by classical curvature-driven bulk diffusion, the intermediate-density regime exhibits anomalously slow growth. We show that this slowdown originates from a transport bottleneck arising from the interplay of particle diffusivity, particle availability, and attachment kinetics, which suppresses the effective mass flux between domains. Unlike equilibrium phase separation, where density primarily affects morphology and crossover scales, the two-temperature drive renders density a key control parameter for coarsening pathways. Our results uncover a nonequilibrium mechanism for anomalous domain growth in two-temperature systems.", "url": "https://arxiv.org/abs/2607.07113", "type": "理论+数值", "summary": "了解非平衡驱动如何改变相分离动力学仍然是一个基本挑战。在这里，我们证明了双温度系统中的相分离表现出惊人的密度诱导的重入粗化行为。使用布朗动力学模拟和粗粒度场论模型，我们发现特征域大小随着 $L(t)\\sim t^{1/z}$ 增长，显示出随着密度增加而可重入序列 $(t^{1/3} \\rightarrow t^{1/4}\\rightarrow t^{1/3})$。虽然低密度和高密度区域受经典曲率驱动的体扩散控制，但​​中密度区域表现出异常缓慢的增长。我们表明，这种减速源于粒子扩散率、粒子可用性和附着动力学相互作用产生的传输瓶颈，它抑制了域之间的有效质量通量。与密度主要影响形态和交叉尺度的平衡相分离不同，双温度驱动使密度成为粗化途径的关键控制参数。我们的结果揭示了双温度系统中异常域生长的非平衡机制。", "authors": [{"name": "Partha Sarathi Mondal"}, {"name": "Anish Kumar"}, {"name": "Nayana Venkatareddy"}, {"name": "Prabal K. Maiti"}, {"name": "Shradha Mishra"}], "featured_authors": [{"name": "Partha Sarathi Mondal"}, {"name": "Anish Kumar"}, {"name": "Nayana Venkatareddy"}, {"name": "Prabal K. Maiti"}, {"name": "Shradha Mishra"}], "author_count": 5}, {"id": "2607.07163", "category": "cond-mat", "title": "Emergent superconductivity upon disordering a topological insulator", "abstract": "We study the emergence of superconductivity in a quantum spin Hall insulator and identify a disorder-driven enhancement of pairing arising from quantum geometry. Using sign-problem-free quantum Monte Carlo simulations of the attractive Bernevig-Hughes-Zhang (BHZ) Hubbard model, we obtain a quantum phase transition as a function of interaction strength for different impurity densities. In the clean limit, the system develops bulk superconductivity for Hubbard interaction $\\vert U \\vert$ above a finite critical strength. Interestingly, strong impurities significantly reduce such $\\vert U \\vert$ required for the onset of superconductivity. Our calculations indicate that Cooper pairing first nucleates in subgap ring states surrounding the impurities and then evolves into a globally coherent superconducting phase. Our results demonstrate that impurity-generated bound states can promote superconductivity in systems with strong quantum geometry. This mechanism is expected to be relevant in nearly flat-band systems like moiré materials where quantum geometry plays a dominant role.", "url": "https://arxiv.org/abs/2607.07163", "type": "理论+数值", "summary": "我们研究了量子自旋霍尔绝缘体中超导性的出现，并确定了由量子几何引起的无序驱动的配对增强。使用有吸引力的 Bernevig-Hughes-Zhang (BHZ) 哈伯德模型的无符号问题量子蒙特卡罗模拟，我们获得了作为不同杂质密度相互作用强度函数的量子相变。在清洁极限下，系统在有限临界强度以上产生哈伯德相互作用 $\\vert U \\vert$ 的体超导性。有趣的是，强杂质显着减少了超导开始所需的$\\vert U \\vert$。我们的计算表明，库珀配对首先在杂质周围的亚带隙环态中成核，然后演变成全局相干的超导相。我们的结果表明，杂质产生的束缚态可以促进具有强量子几何结构的系统的超导性。这种机制预计与近平带系统相关，例如量子几何起着主导作用的莫尔材料。", "authors": [{"name": "Carlos Eduardo S. P. Corsino"}, {"name": "Hermann Freire"}, {"name": "Anurag Banerjee"}], "featured_authors": [{"name": "Carlos Eduardo S. P. Corsino"}, {"name": "Hermann Freire"}, {"name": "Anurag Banerjee"}], "author_count": 3}, {"id": "2607.07248", "category": "cond-mat", "title": "Critical SO(5) scaling of entanglement entropy at honeycomb lattice deconfined criticality", "abstract": "The deconfined quantum critical point (DQCP) in square lattice S=1/2 quantum antiferromagnets has been extensively studied with a large body of evidence pointing to a weakly first-order transition scenario. Recent studies, which focused on entanglement at this nearly continuous DQCP in square lattice J-Q models, have observed conflicting bipartite entanglement entropy (EE) scaling behavior. One bipartition choice gave scaling coefficients in remarkable agreement with predictions from the unitary CFT corresponding to the putative DQCP. While another equally natural choice gave scaling coefficients in complete violation of unitary CFT that may be attributed to lack of scale invariance at the known weakly first-order behavior of the model. This motivates the exploration of DQCP behavior via entanglement measures in lattice models with distinct crystalline symmetries. Here we study a S=1/2 honeycomb model that hosts a nearly continuous transition between Néel and valence-bond-solid ground states relevant to probing DQCP. Using large-scale quantum Monte Carlo simulations, we compute the Rényi EE for a variety of bipartitions and test the CFT based description of the DQCP on the honeycomb lattice. For smooth bipartitions, we find no evidence of logarithmic corrections, in accordance with CFT, thereby essentially ruling out contributions from Goldstone modes. For subsystems with corners, CFT predicts universal logarithmic contributions, which we extract for corners with 60 and 120 degree angles and find close agreement with an emergent SO(5) CFT. While we observe scaling consistent with a critical system in the majority of cases, we also demonstrate an intriguing counterexample of the hexagon subsystem that exhibits a subtle period three oscillation. This results in three separate finite-size series, where the sign of the logarithmic term apparently changes depending on the series.", "url": "https://arxiv.org/abs/2607.07248", "type": "理论+数值", "summary": "方形晶格 S=1/2 量子反铁磁体中的解禁量子临界点 (DQCP) 已得到广泛研究，大量证据表明存在弱一阶跃迁场景。最近的研究重点关注方晶格 J-Q 模型中这种近乎连续的 DQCP 的纠缠，观察到相互冲突的二分纠缠熵 (EE) 缩放行为。一种二分选择给出的缩放系数与对应于假定 DQCP 的酉 CFT 的预测非常一致。而另一个同样自然的选择给出的缩放系数完全违反了酉 CFT，这可能归因于模型已知的弱一阶行为缺乏尺度不变性。这激发了通过具有不同晶体对称性的晶格模型中的纠缠测量来探索 DQCP 行为。在这里，我们研究了一个 S=1/2 蜂窝模型，该模型具有与探测 DQCP 相关的 Néel 基态和价键固体基态之间几乎连续的转变。\n\n使用大规模量子蒙特卡罗模拟，我们计算了各种二分的 Rényi EE，并测试了蜂窝晶格上 DQCP 的基于 CFT 的描述。对于平滑二分，根据 CFT，我们没有发现对数校正的证据，因此基本上排除了戈德斯通模式的贡献。对于有角的子系统，CFT 预测通用对数贡献，我们针对 60 度和 120 度角的角提取该贡献，并发现与新兴的 SO(5) CFT 非常一致。虽然我们在大多数情况下观察到与关键系统一致的缩放，但我们还展示了六边形子系统的一个有趣的反例，该子系统表现出微妙的三周期振荡。这会产生三个独立的有限大小系列，其中对数项的符号显然会根据系列而变化。", "authors": [{"name": "Sankalp Kumar"}, {"name": "Jonathan D'Emidio"}, {"name": "Sumiran Pujari"}], "featured_authors": [{"name": "Sankalp Kumar"}, {"name": "Jonathan D'Emidio"}, {"name": "Sumiran Pujari"}], "author_count": 3}, {"id": "2607.07299", "category": "cond-mat", "title": "Electrical manipulation and detection of perpendicular altermagnetic order via proximitized Dirac semimetal", "abstract": "Altermagnets, which combine antiferromagnetic-like magnetic compensation with ferromagnetic-like broken time-reversal symmetry, hold great promise for high-density and ultrafast spintronic applications. However, the detection and switching of perpendicular altermagnetic order are fundamentally constrained by magnetic symmetry, restricting both fundamental studies and practical implementation. We realize robust electrical reading and deterministic switching of perpendicular altermagnetic order by designing a Dirac semimetal/altermagnet heterostructure of PtTe2/CrSb. This engineered interface enables anomalous Hall readout via altermagnetic proximity effect and delivers efficient spin-orbit torque for manipulating the epitaxial perpendicular Neel vector in CrSb. These findings significantly broaden the functional scope of altermagnetic heterostructures and pave the way for highly scalable altermagnetic memory.", "url": "https://arxiv.org/abs/2607.07299", "type": "理论", "summary": "交替磁体将类反铁磁磁补偿与类铁磁破缺时间反转对称性相结合，为高密度和超快自旋电子应用带来了巨大前景。然而，垂直交变磁序的检测和切换从根本上受到磁对称性的限制，限制了基础研究和实际实现。我们通过设计 PtTe2/CrSb 的狄拉克半金属/交变磁体异质结构，实现了稳健的电学读数和垂直交变磁序的确定性切换。该设计接口可通过交变邻近效应实现反常霍尔读数，并提供高效的自旋轨道扭矩，用于操纵 CrSb 中的外延垂直尼尔矢量。这些发现显着拓宽了交变磁异质结构的功能范围，并为高度可扩展的交变磁存储器铺平了道路。", "authors": [{"name": "Zhaohui Li"}, {"name": "Wenqing He"}, {"name": "Hua Bai"}, {"name": "Yang Wang"}, {"name": "Alexander J. Grutter"}, {"name": "Guoyi Shi"}, {"name": "Xiwen Zhang"}, {"name": "Christy Kinane"}, {"name": "Andrew Caruana"}, {"name": "Hui Ru Tan"}, {"name": "Yuchen Pu"}, {"name": "Chenhui Zhang"}, {"name": "Yongxi Wang"}, {"name": "Hanbum Park"}, {"name": "Anjan Soumyanarayanan"}, {"name": "Lei Shen"}, {"name": "Hyunsoo Yang"}], "featured_authors": [{"name": "Zhaohui Li"}, {"name": "Wenqing He"}, {"name": "Hua Bai"}, {"name": "Anjan Soumyanarayanan"}, {"name": "Lei Shen"}, {"name": "Hyunsoo Yang"}], "author_count": 17}, {"id": "2607.07307", "category": "cond-mat", "title": "Magnetocaloric properties of centered molecular quantum spin systems", "abstract": "We investigate the magnetocaloric properties of a class of centered magnetic molecules that are very similar in their magnetic properties. In particular, we study the magnetocaloric response of these molecules in the space of two exchange parameters and as function of the spin quantum numbers. Major figures of merit such as adiabatic temperature change and isothermal entropy change as well as theoretically achievable low temperatures show that overall ferromagnetic interactions are preferential as long as this does not lead to dipolar ordering.", "url": "https://arxiv.org/abs/2607.07307", "type": "理论", "summary": "我们研究了一类磁性非常相似的中心磁性分子的磁热特性。特别是，我们研究了这些分子在两个交换参数空间中的磁热响应以及作为自旋量子数的函数。绝热温度变化和等温熵变以及理论上可实现的低温等主要品质因数表明，只要不导致偶极有序，总体铁磁相互作用是优先的。", "authors": [{"name": "H. Meel"}, {"name": "J. Schnack"}], "featured_authors": [{"name": "H. Meel"}, {"name": "J. Schnack"}], "author_count": 2}, {"id": "2607.07325", "category": "cond-mat", "title": "Taming nonlinear energy diffusion: The case of time-crystal energy condensates", "abstract": "We study a bulk-driven nonlinear variant of the Kipnis-Marchioro-Presutti model of stochastic energy diffusion in which local collisions are biased to induce a net energy flow, resembling the effect of an external field. Starting from the microscopic master equation, we derive the hydrodynamic description of the driven system via a local equilibrium approximation, obtaining explicit expressions for the energy current and the associated diffusivity and mobility transport coefficients, which are nonlinear functions of the local energy density. We test our findings in kinetic Monte Carlo simulations of the model and, as a proof of concept, we demonstrate the versatility of this driving mechanism to control nonlinear energy transport by inducing time-crystalline phases. In particular, we show that appropriately designed packing fields induce the spontaneous formation of traveling energy condensates, exhibiting robust long-range temporal order reminiscent of continuous time crystals. Our results provide a simple yet powerful framework to study bulk-driven nonlinear energy diffusion in stochastic many-body systems, offering a bridge between microscopic dynamics, macroscopic transport, and controlled spatiotemporal order.", "url": "https://arxiv.org/abs/2607.07325", "type": "理论+数值", "summary": "我们研究了随机能量扩散 Kipnis-Marchioro-Presutti 模型的体驱动非线性变体，其中局部碰撞被偏置以诱导净能量流，类似于外部场的效应。从微观主方程出发，我们通过局部平衡近似推导了驱动系统的流体动力学描述，获得了能量流以及相关的扩散率和迁移率传输系数的显式表达式，这些系数是局部能量密度的非线性函数。我们在模型的动力学蒙特卡罗模拟中测试了我们的发现，作为概念证明，我们证明了这种驱动机制的多功能性，可以通过诱导时间结晶相来控制非线性能量传输。特别是，我们表明，适当设计的堆积场会诱导行进能量凝聚体的自发形成，表现出鲁棒的长程时间顺序，让人想起连续时间晶体。\n\n我们的结果提供了一个简单而强大的框架来研究随机多体系统中体驱动的非线性能量扩散，在微观动力学、宏观输运和受控时空秩序之间架起了一座桥梁。", "authors": [{"name": "P.I. Hurtado"}, {"name": "G. Cortés-Guillén"}], "featured_authors": [{"name": "P.I. Hurtado"}, {"name": "G. Cortés-Guillén"}], "author_count": 2}, {"id": "2607.07384", "category": "cond-mat", "title": "Optimizing high-temperature electron mobility in single-crystal Bi$_2$O$_2$Se based on its unconventional dependence on concentration", "abstract": "Quasi-2D Bi$_2$O$_2$Se is part of an intensive materials research effort aimed at finding new semiconductors that outperform silicon-based electronics in terms of speed and power consumption. This material exhibits exceptionally high carrier mobility at low temperatures but mediocre mobility at 300 K. Its high mobility is generally associated with its high permittivity ($\\varepsilon_r$~500), which is also associated with metallicity persisting down to very low carrier concentrations. This material exhibits a counterintuitive increase in carrier mobility as the concentration increases. The connection between low both carrier concentration and mobility in Se-rich conditions, and both high carrier concentration and mobility in Se-poor conditions suggests that the increase is related to native defects. We demonstrate that these defects can alter the effective mass of charge carriers. Specifically, substitutional Se(Bi) defects, which appear under Se-rich conditions, destroy the Bi$_2$O$_2$ channel and compromise charge transport properties. These defects increase the effective mass of charge carriers transforming the original semiconductor into a semimetal and introducing holes into charge transport. Additionally, we show that single crystals are generally inhomogeneous, particularly those grown under Se-rich conditions. Unlike Se-poor conditions, Se-rich conditions induce a higher concentration of dislocations and extraneous phases. These findings suggest that the perfection of the Bi$_2$O$_2$ channel is crucial for mobility, particularly at room temperature.", "url": "https://arxiv.org/abs/2607.07384", "type": "数值", "summary": "准二维 Bi$_2$O$_2$Se 是密集材料研究工作的一部分，旨在寻找在速度和功耗方面优于硅基电子器件的新型半导体。这种材料在低温下表现出极高的载流子迁移率，但在 300 K 时表现出平庸的迁移率。其高迁移率通常与其高介电常数（$\\varepsilon_r$~500）相关，而高介电常数也与持续保持在非常低的载流子浓度下的金属性相关。随着浓度的增加，这种材料的载流子迁移率呈现出违反直觉的增加。富硒条件下的低载流子浓度和迁移率与贫硒条件下的高载流子浓度和迁移率之间的联系表明，这种增加与固有缺陷有关。我们证明这些缺陷可以改变电荷载流子的有效质量。具体来说，在富硒条件下出现的替代性 Se(Bi) 缺陷会破坏 Bi$_2$O$_2$ 通道并损害电荷传输特性。\n\n这些缺陷增加了电荷载流子的有效质量，将原始半导体转变为半金属并将空穴引入电荷传输。此外，我们发现单晶通常是不均匀的，特别是在富硒条件下生长的单晶。与贫硒条件不同，富硒条件会引起更高浓度的位错和外来相。这些发现表明 Bi$_2$O$_2$ 通道的完善对于迁移率至关重要，特别是在室温下。", "authors": [{"name": "Antonín Sojka"}, {"name": "Petr Knotek"}, {"name": "Jan Zich"}, {"name": "Martin Míšek"}, {"name": "Roman Tesař"}, {"name": "Kyo-Hoon Ahn"}, {"name": "Petr Levinský"}, {"name": "Jiří Navrátil"}, {"name": "Pavlína Ruleová"}, {"name": "Jiří Hejtmánek"}, {"name": "Karel Knížek"}, {"name": "Václav Holý"}, {"name": "Čestmír Drašar"}], "featured_authors": [{"name": "Antonín Sojka"}, {"name": "Petr Knotek"}, {"name": "Jan Zich"}, {"name": "Karel Knížek"}, {"name": "Václav Holý"}, {"name": "Čestmír Drašar"}], "author_count": 13}, {"id": "2607.07411", "category": "cond-mat", "title": "Hyperuniform systems are maximally irreversible", "abstract": "Hyperuniform systems, defined by the anomalous suppression of large-scale density fluctuations, are a paradigm of non-equilibrium self-assembly. While mechanisms underlying the self-assembly of hyperuniform states have been widely studied, the energetics of this process remain unexplored. This raises a fundamental question: what is the energetic cost of self-assembling a hyperuniform system? Here, we address this question across several noisy particle systems drawn from soft matter and machine learning, in which hyperuniformity can be induced by tuning noise correlations. Despite their distinct microscopic dynamics, we uncover a universal behavior across all systems: hyperuniform states are maximally irreversible, as quantified by the entropy production rate. Further, we develop a path integral formulation of the entropy production rate directly from the microscopic dynamics, which explains our observations. Our work establishes a direct link between emergent long-range structure and time irreversibility and opens a new avenue of probing the energetic cost of hyperuniform self-assembly, ubiquitous across physics, biology, and materials science.", "url": "https://arxiv.org/abs/2607.07411", "type": "数值", "summary": "超均匀系统由大规模密度波动的异常抑制定义，是非平衡自组装的范例。虽然超均匀态自组装的机制已被广泛研究，但该过程的能量学仍未得到探索。这就提出了一个基本问题：自组装超均匀系统的能量成本是多少？在这里，我们通过从软物质和机器学习中提取的几个噪声粒子系统来解决这个问题，其中可以通过调整噪声相关性来诱导超均匀性。尽管它们具有独特的微观动力学，但我们发现了所有系统的普遍行为：超均匀态是最大不可逆的，正如熵产生率所量化的。此外，我们直接从微观动力学中开发了熵产生率的路径积分公式，这解释了我们的观察结果。我们的工作在新兴的长程结构和时间不可逆性之间建立了直接联系，并为探索超均匀自组装的能量成本开辟了一条新途径，超均匀自组装在物理学、生物学和材料科学中普遍存在。", "authors": [{"name": "Mathias Casiulis"}, {"name": "Satyam Anand"}, {"name": "Stefano Martiniani"}], "featured_authors": [{"name": "Mathias Casiulis"}, {"name": "Satyam Anand"}, {"name": "Stefano Martiniani"}], "author_count": 3}, {"id": "2607.07472", "category": "cond-mat", "title": "Stress calculation in linear scaling DFT: convergence and dynamics", "abstract": "We present the approach needed to calculate stress within density functional theory (DFT) using a localised orbital basis, both for exact diagonalisation and linear scaling approaches, and demonstrate our implementation within the large scale DFT code Conquest. For the linear scaling approach, we test the rate of convergence of stress with density matrix range, and compare it to the convergence of energy and forces for different materials with a range of band gaps. We show that excellent convergence is found for modest cutoffs, and show that large-scale isothermal-isobaric molecular dynamics is stable and accurate.", "url": "https://arxiv.org/abs/2607.07472", "type": "理论+数值", "summary": "我们提出了使用局域轨道基础计算密度泛函理论 (DFT) 中的应力所需的方法，包括精确对角化和线性缩放方法，并演示了我们在大规模 DFT 代码 Conquest 中的实现。对于线性缩放方法，我们测试了应力随密度矩阵范围的收敛速度，并将其与具有一定范围带隙的不同材料的能量和力的收敛速度进行比较。我们表明，对于适度的截止值，可以发现出色的收敛性，并表明大规模等温等压分子动力学是稳定且准确的。", "authors": [{"name": "Shereif Y. Mujahed"}, {"name": "Tsuyoshi Miyazaki"}, {"name": "David R. Bowler"}], "featured_authors": [{"name": "Shereif Y. Mujahed"}, {"name": "Tsuyoshi Miyazaki"}, {"name": "David R. Bowler"}], "author_count": 3}, {"id": "2607.07488", "category": "cond-mat", "title": "Non-Hermitian control of helicity-selective antiferromagnetic resonance", "abstract": "We study non-Hermitian antiferromagnetic resonance in an antiferromagnetic insulator/nonmagnetic metal junction with sublattice-dependent damping and spin-orbit torque. By formulating the linearized Landau-Lifshitz-Gilbert (LLG) equation as a 2x2 non-Hermitian eigenvalue problem, we derive the complex resonance frequencies, the exceptional-point condition, and the stability-threshold condition. We show that the largest absorption response is maximized by approaching the stability threshold from the stable side. Near the threshold on the stable side, the absorption spectrum exhibits strong enhancement and linewidth narrowing, together with pronounced helicity dependence in the sub-THz regime that can be switched by reversing the spin-orbit torque. We also confirm by solving the full LLG dynamics that crossing the threshold leads to gain and self-oscillation. These results identify the stability threshold as the key control principle for enhancing absorption and achieving polarization selectivity in the sub-THz/THz regime.", "url": "https://arxiv.org/abs/2607.07488", "type": "理论", "summary": "我们研究具有亚晶格相关阻尼和自旋轨道扭矩的反铁磁绝缘体/非磁性金属结中的非厄米反铁磁共振。通过将线性化 Landau-Lifshitz-Gilbert (LLG) 方程表述为 2x2 非埃尔米特特征值问题，我们推导出复共振频率、异常点条件和稳定性阈值条件。我们表明，通过从稳定侧接近稳定性阈值，可以最大化最大吸收响应。在稳定侧的阈值附近，吸收光谱表现出强烈的增强和线宽变窄，以及亚太赫兹区域中明显的螺旋度依赖性，可以通过反转自旋轨道扭矩来切换。我们还通过求解完整的 LLG 动力学来确认跨越阈值会导致增益和自振荡。这些结果将稳定性阈值确定为在亚太赫兹/太赫兹区域增强吸收和实现偏振选择性的关键控制原理。", "authors": [{"name": "Masato Todani"}, {"name": "Satoshi Iihama"}, {"name": "Yuto Moritake"}, {"name": "Takeo Kato"}], "featured_authors": [{"name": "Masato Todani"}, {"name": "Satoshi Iihama"}, {"name": "Yuto Moritake"}, {"name": "Takeo Kato"}], "author_count": 4}, {"id": "2607.07499", "category": "cond-mat", "title": "Nonlinear Dynamics of Hopfion for Frequency Multiplication", "abstract": "Hopfions, associated with higher-dimensional topology through the Hopf fibration, exhibit {exotic} features like {complex knot} and improved stability compared to skyrmions, enhancing their appeal for innovative applications. In this paper, we study the nonlinear response of magnetic Hopfion to microwave fields. {We observe the emergence of higher-order harmonics of the driving microwave field as it interacts with the Hopfion}. By carefully selecting the {driving frequency, the corresponding harmonic can efficiently excite localized magnon state of a Hopfion. Our results demonstrate the promising potential of hopfions in nonlinear magnonics.", "url": "https://arxiv.org/abs/2607.07499", "type": "理论", "summary": "Hopfion 通过 Hopf 纤维与高维拓扑相关联，表现出{奇异}特征，例如{复杂结}，并且与斯格明子相比具有更高的稳定性，从而增强了它们对创新应用的吸引力。在本文中，我们研究了磁性 Hopfion 对微波场的非线性响应。 {我们观察到驱动微波场与 Hopfion 相互作用时出现高阶谐波}。通过仔细选择驱动频率，相应的谐波可以有效地激发 Hopfion 的局域磁振子态。我们的结果证明了 hopfions 在非线性磁振子学中的巨大潜力。", "authors": [{"name": "Waleed I. Waseer"}, {"name": "Yunshan Cao"}, {"name": "Peng Yan"}], "featured_authors": [{"name": "Waleed I. Waseer"}, {"name": "Yunshan Cao"}, {"name": "Peng Yan"}], "author_count": 3}, {"id": "2607.07544", "category": "cond-mat", "title": "Strain-tunable charge localization coupled to complex magnetic orders in EuAl$_4$", "abstract": "Charge localization is particularly interesting when coupled to antiferromagnetic spin structures. Coupled spin-charge orders are well established in elemental chromium and correlated oxide superconductors, yet the interplay between charge order and more complex magnetic textures -- such as skyrmion lattices and chiral spin structures -- remains largely unexplored. Here we report a comprehensive study of how charge localization couples to the unusually rich sequence of magnetic phases in EuAl$_4$. Using x-ray diffraction under applied magnetic field and uniaxial pressure, we demonstrate a direct coupling between the charge and spin order parameters. In the absence of external stimuli, charge localization is markedly enhanced upon entering the magnetically ordered phases. Strikingly, this effect is highly susceptible to strain: uniaxial pressure applied along the charge-order propagation direction further enhances localization, whereas pressure applied perpendicular to it weakens it. Application of magnetic field reveals both competitive and possible collaborative interactions between spin and charge this http URL flexible coupling between spin and charge ordering opens a new route to designing symmetry-breaking states. Chiral charge order may for example be patterned from spin structures with that symmetry.", "url": "https://arxiv.org/abs/2607.07544", "type": "理论", "summary": "当与反铁磁自旋结构耦合时，电荷局域化特别有趣。耦合自旋电荷序在元素铬和相关氧化物超导体中已得到很好的证实，但电荷序和更复杂的磁性结构（例如斯格明子晶格和手性自旋结构）之间的相互作用仍然很大程度上未被探索。在这里，我们报告了一项关于电荷局域化如何与 EuAl$_4$ 中异常丰富的磁相序列耦合的全面研究。利用外加磁场和单轴压力下的 X 射线衍射，我们证明了电荷和自旋序参数之间的直接耦合。在没有外部刺激的情况下，进入磁有序相后电荷定位显着增强。引人注目的是，这种效应非常容易受到应变的影响：沿电荷序传播方向施加的单轴压力进一步增强了局域化，而垂直于其施加的压力则削弱了局域化。\n\n磁场的应用揭示了自旋和电荷之间的竞争和可能的协作相互作用，这个http URL自旋和电荷排序之间的灵活耦合为设计对称破缺态开辟了一条新途径。手性电荷顺序可以例如由具有该对称性的自旋结构图案化。", "authors": [{"name": "M. Baumgartner"}, {"name": "Xunyang Hong"}, {"name": "Tianren Wang"}, {"name": "Fazhi Yang"}, {"name": "Yuetong Wu"}, {"name": "Junzhang Ma"}, {"name": "Tian Shang"}, {"name": "J. Oppliger"}, {"name": "J. Küspert"}, {"name": "M. Hücker"}, {"name": "O. Ivashko"}, {"name": "F. Igoa Saldaña"}, {"name": "M. v. Zimmermann"}, {"name": "S. Pyon"}, {"name": "K. Kudo"}, {"name": "M. Nohara"}, {"name": "P. Sačer"}, {"name": "A. Akrap"}, {"name": "N. Barišić"}, {"name": "M. Novak"}, {"name": "Qisi Wang"}, {"name": "J. Chang"}], "featured_authors": [{"name": "M. Baumgartner"}, {"name": "Xunyang Hong"}, {"name": "Tianren Wang"}, {"name": "M. Novak"}, {"name": "Qisi Wang"}, {"name": "J. Chang"}], "author_count": 22}, {"id": "2607.07556", "category": "cond-mat", "title": "Entanglement Asymmetry in Random Quantum Automata", "abstract": "We investigate the subsystem entanglement asymmetry in random quantum automaton ensembles, which are generated by permuting the basis states in the Hilbert space and applying global phase shifts. We compute the ensemble average of the $U(1)$ subsystem asymmetry in different connectivity geometries, showing that the late-time limit of the ensemble associated to a 2-local circuit geometry coincides with the all-to-all ensemble average. By focusing on different subsystem sizes, we demonstrate that, similarly to Haar-random circuits, the system locally symmetrizes. However, in sharp contrast to the Haar-random setting, the scale at which symmetrization happens depends on the initial state, a phenomenon we associate with the interplay of conservation of the participation entropy and the uniform exploration of charge sectors. Additionally, we connect the growth of the subsystem asymmetry to the subsystem coherence and show that their growth is characterized by the same symmetrization scale.", "url": "https://arxiv.org/abs/2607.07556", "type": "理论", "summary": "我们研究了随机量子自动机系综中的子系统纠缠不对称性，这些系综是通过排列希尔伯特空间中的基态并应用全局相移而生成的。我们计算了不同连接几何结构中 $U(1)$ 子系统不对称性的整体平均值，表明与 2 局部电路几何结构相关的整体的后期限制与所有整体整体平均值一致。通过关注不同的子系统大小，我们证明了与哈尔随机电路类似，系统局部对称。然而，与哈尔随机设置形成鲜明对比的是，对称化发生的规模取决于初始状态，我们将这种现象与参与熵守恒和电荷扇区均匀探索的相互作用联系起来。此外，我们将子系统不对称性的增长与子系统相干性联系起来，并表明它们的增长具有相同的对称化尺度。", "authors": [{"name": "Olalla A. Castro-Alvaredo"}, {"name": "Dávid Szász-Schagrin"}, {"name": "Michele Mazzoni"}], "featured_authors": [{"name": "Olalla A. Castro-Alvaredo"}, {"name": "Dávid Szász-Schagrin"}, {"name": "Michele Mazzoni"}], "author_count": 3}, {"id": "2607.07590", "category": "cond-mat", "title": "Unveiling the Spin-Valley Structure of Dipolar Exciton Ladders in R-stacked WSe$_2$/WS$_2$ Moiré Heterobilayers", "abstract": "Localized interlayer excitons in moiré heterobilayers can form dipolar exciton ladders, yet their internal spin-valley structure remains unresolved. Here, we use helicity-resolved magneto-photoluminescence to identify the microscopic origin of the ladder in R-stacked WSe$_2$/WS$_2$ at charge neutrality and one-electron filling of the moiré lattice. At charge neutrality, the first two emission peaks correspond to a spin-triplet interlayer exciton and a triplet-triplet two-exciton state separated by 38 meV, reflecting the on-site dipolar interaction. The opposite Zeeman response of the apparent third rung of the ladder rules out its assignment as a spin-conserving three-exciton state and instead identifies it as a triplet-singlet two-exciton configuration with a 22 meV offset set by the WS$_2$ conduction-band spin splitting. At one-electron filling, the correlated electronic background gives rise to charged one- and two-exciton states and intervalley/intravalley two-exciton configurations, while reducing the effective exciton-exciton interaction. Our results establish a spin-valley-resolved picture of dipolar exciton ladders beyond simple occupation-number physics in moiré heterobilayers.", "url": "https://arxiv.org/abs/2607.07590", "type": "数值", "summary": "莫尔异质双层中的局域层间激子可以形成偶极激子梯，但其内部自旋谷结构仍未解决。在这里，我们使用螺旋分辨磁光致发光来识别 R 堆叠 WSe$_2$/WS$_2$ 中电荷中性和莫尔晶格单电子填充时梯子的微观起源。在电荷中性时，前两个发射峰对应于相距 38 meV 的自旋三重态层间激子和三重态-三重态双激子态，反映了现场偶极相互作用。阶梯的明显第三梯级的相反塞曼响应排除了其作为自旋守恒三激子态的分配，而是将其识别为三线态-单线态二激子配置，具有由 WS$_2$ 导带自旋分裂设置的 22 meV 偏移。在单电子填充时，相关电子背景产生带电一和二激子态以及谷间/谷内二激子构型，同时减少有效激子-激子相互作用。\n\n我们的结果建立了一个自旋谷解析的偶极激子梯图，超越了莫尔异双层中简单的占据数物理。", "authors": [{"name": "Byeong Wook Cho"}, {"name": "Tatyana V. Ivanova"}, {"name": "Zhe Li"}, {"name": "Takashi Taniguchi"}, {"name": "Kenji Watanabe"}, {"name": "Brian D. Gerardot"}, {"name": "Mauro Brotons-Gisbert"}], "featured_authors": [{"name": "Byeong Wook Cho"}, {"name": "Tatyana V. Ivanova"}, {"name": "Zhe Li"}, {"name": "Kenji Watanabe"}, {"name": "Brian D. Gerardot"}, {"name": "Mauro Brotons-Gisbert"}], "author_count": 7}, {"id": "2607.07647", "category": "cond-mat", "title": "Are Machine Learning Interatomic Potentials Truly Practical? A Benchmark of 23 Mainstream Models", "abstract": "Most MLIP benchmarks reward static accuracy while ignoring inference efficiency and hardware scalability -- driving model bloat with unclear real-world value. We benchmark 23 mainstream open-source MLIPs on a low-cost NVIDIA DGX Spark (128 GB native memory, capped at 80 GB to mimic ordinary lab hardware), using a fixed 192-atom system under a unified ASE-based pipeline. We evaluate three dimensions: predictive accuracy, MD simulation throughput, and atomic scalability. Our results expose a sharp accuracy-efficiency trade-off: large SOTA models deliver only 3-5 meV/atom more accuracy than lightweight ones, but lose orders of magnitude in throughput -- in the worst case, becoming only marginally faster than DFT itself. Lightweight MLIPs, by contrast, sit on the Pareto frontier and run on modest hardware. The lesson is that single-dimensional benchmarks mislead the field, and that future MLIP development should value efficiency and scalability alongside accuracy.", "url": "https://arxiv.org/abs/2607.07647", "type": "理论+数值", "summary": "大多数 MLIP 基准测试奖励静态准确性，而忽略推理效率和硬件可扩展性——导致模型膨胀，现实价值不明确。我们在低成本 NVIDIA DGX Spark（128 GB 本机内存，上限为 80 GB 以模拟普通实验室硬件）上对 23 个主流开源 MLIP 进行了基准测试，在基于 ASE 的统一管道下使用固定的 192 个原子系统。我们评估三个维度：预测准确性、MD 模拟吞吐量和原子可扩展性。我们的结果揭示了精确度与效率之间的巨大权衡：大型 SOTA 模型的精确度仅比轻量级模型高出 3-5 meV/atom，但吞吐量却损失了几个数量级——在最坏的情况下，仅比 DFT 本身快一点点。相比之下，轻量级 MLIP 位于帕累托前沿并在适度的硬件上运行。教训是，单维基准会误导该领域，未来的 MLIP 开发应该重视效率和可扩展性以及准确性。", "authors": [{"name": "Hanwen Kang"}, {"name": "Tenglong Lu"}, {"name": "Sheng Meng"}, {"name": "Miao Liu"}], "featured_authors": [{"name": "Hanwen Kang"}, {"name": "Tenglong Lu"}, {"name": "Sheng Meng"}, {"name": "Miao Liu"}], "author_count": 4}, {"id": "2607.07649", "category": "cond-mat", "title": "Feller diffusion in an interval: Inhomogeneous fluctuation-induced asymmetric escape", "abstract": "We present an inhomogeneous fluctuation-induced asymmetric escape event of a Feller diffusion confined to a finite interval with two competing absorbing boundaries. The dynamics correspond to an overdamped Brownian motion in a shifted harmonic potential with state-dependent diffusivity. We set two exit points (equal potential energies), equidistant from the potential minima: an extinction site near the origin and an outbreak point. The multiplicative fluctuations are suppressed near the extinction boundary, biasing trajectories toward the outbreak state. The mean exit time exhibits a non-monotonic dependence on the initial condition and the drift-to-noise strength ratio, attaining a maximum when the particle is initialized toward the extinction (low-noise) site. The outbreak possibility is more likely even if the process started with a small initial bias towards the low-noise boundary. The spatial location of the lowest coefficient of variation (CV) is nicely corroborated by the maximum exit time, which is the hallmark of a stochastic escape from an interval. The fluctuation in escape time is found to dominate its mean as a non-trivial function of the drift-to-noise strength and the initial spatial bias. The observed asymmetries in escape also shape the speed-accuracy trade-off in stochastic decision-making events.", "url": "https://arxiv.org/abs/2607.07649", "type": "理论", "summary": "我们提出了一种非均匀波动引起的费勒扩散的不对称逃逸事件，该事件被限制在具有两个竞争吸收边界的有限区间内。动力学对应于具有状态相关扩散率的移位谐波势中的过阻尼布朗运动。我们设置了两个退出点（势能相等），与潜在最小值等距：原点附近的灭绝点和爆发点。乘性波动在灭绝边界附近受到抑制，使轨迹偏向爆发状态。平均退出时间表现出对初始条件和漂移噪声强度比的非单调依赖性，当粒子初始化到消光（低噪声）位置时达到最大值。即使该过程开始时对低噪声边界有较小的初始偏差，爆发的可能性也更大。最低变异系数 (CV) 的空间位置可以通过最大退出时间得到很好的证实，这是从某个区间随机逃逸的标志。\n\n发现逃逸时间的波动主导其平均值，作为漂移噪声强度和初始空间偏差的重要函数。观察到的逃逸不对称性也影响了随机决策事件中速度与准确性的权衡。", "authors": [{"name": "Prashanta Bauri"}, {"name": "Debasish Mondal"}], "featured_authors": [{"name": "Prashanta Bauri"}, {"name": "Debasish Mondal"}], "author_count": 2}, {"id": "2607.07656", "category": "cond-mat", "title": "Ordering and Defect Dynamics in Passive and Active Nematopolars", "abstract": "The coexistence of polar and nematic interactions, observed in a broad range of biological and synthetic active systems, gives rise to a rich phenomenology that continues to challenge our theoretical understanding of non-equilibrium collective behaviour. In this paper, we numerically investigate phase ordering and defect dynamics in a newly introduced minimal single-field model for dry nematopolar systems, where competing polar and nematic contributions enter the free energy, and activity is implemented through a self-advection contribution. At optimal balance between the two alignments, the system develops depolarization
