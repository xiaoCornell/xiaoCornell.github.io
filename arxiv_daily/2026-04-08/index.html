  <style>

  <script>
    const papers = [{"id": "2604.04968", "category": "cond-mat", "title": "Emergent symmetry and thermodynamic crossovers for supercritical AdS black holes", "abstract": "Ising symmetry typically emerges in the critical domain between liquid-gas phases. Universality of this property imposes strong constraints on the behavior of thermodynamic crossovers for supercritical fluids. In this work, we develop a novel approach to investigate the crossover lines for supercritical AdS black holes using Lee-Yang phase transition theory. We analytically continue Lee-Yang zeros into the complex plane within the supercritical region by keeping a modular pressure real. Consequently, we obtain a pair of complex crossover lines, which exhibit universal scalings and manifest the emergent Ising symmetry in the complex phase space. The real crossover lines are defined by projecting the complex crossovers onto the real phase space. As a result, the phase diagram above the critical point is divided into three distinct regimes: liquid-like, indistinguishable and gas-like states, in sharp contrast to scenarios featuring only a single crossover line.", "url": "https://arxiv.org/abs/2604.04968", "type": "理论+数值", "summary": "伊辛对称性通常出现在液-气相之间的临界域中。这一性质的普遍性对超临界流体的热力学交叉行为施加了强烈的限制。在这项工作中，我们开发了一种利用李杨相变理论研究超临界 AdS 黑洞交叉线的新颖方法。我们通过保持模压力真实，分析地将李杨零点延续到超临界区域内的复杂平面。因此，我们获得了一对复杂的交叉线，它们表现出通用的标度并表现出复杂相空间中的新兴伊辛对称性。真实交叉线是通过将复杂交叉投影到真实相空间上来定义的。因此，临界点以上的相图被分为三个不同的状态：类液体、不可区分的状态和类气体状态，这与仅具有单个交叉线的情况形成鲜明对比。", "authors": [{"name": "Zhong-Ying Fan"}], "featured_authors": [{"name": "Zhong-Ying Fan"}], "author_count": 1}, {"id": "2604.05052", "category": "cond-mat", "title": "Predicting spin-orbit coupling in hole spin qubit arrays with vision-transformer-based neural networks on a generalized Hubbard model", "abstract": "We introduce a neural-network-based machine learning method to predict the effective spin-orbit coupling (SOC) strength in hole quantum dot arrays from standard charge stability diagrams. Specifically, we study a $2\\times 2$ Ge hole quantum dot array described by a generalized spin-orbit coupled Hubbard model that incorporates random site- and bond-dependent disorder in all system parameters, including onsite potentials, Coulomb interaction strengths, interdot tunneling amplitudes, as well as the direction and angle of the SOC-induced spin rotations accompanying interdot tunneling. We train the neural network on numerically simulated charge stability diagrams from nearest-neighbor pairs of quantum dots for different chemical potentials and out-of-plane magnetic fields, and show that this enables us to predict the SOC-induced spin-flip tunneling amplitudes -- and, thus, the effective SOC strength -- with high fidelity ($R^2\\approx 0.94$) even when all other Hubbard model parameters are unknown. Furthermore, our neural network can also predict the other Hubbard model parameters with high fidelity, demonstrating that neural-network-based approaches can be a powerful tool for the automated characterization of hole spin qubit arrays.", "url": "https://arxiv.org/abs/2604.05052", "type": "理论+数值", "summary": "我们引入了一种基于神经网络的机器学习方法，可以根据标准电荷稳定性图预测空穴量子点阵列中的有效自旋轨道耦合（SOC）强度。具体来说，我们研究了由广义自旋轨道耦合哈伯德模型描述的 $2\\times 2$ Ge 空穴量子点阵列，该模型在所有系统参数中纳入了随机位点和键相关的无序，包括现场电位、库仑相互作用强度、点间隧道效应幅度，以及伴随点间隧道效应的 SOC 引起的自旋旋转的方向和角度。我们在不同化学势和面外磁场的最近邻量子点对的数值模拟电荷稳定性图上训练神经网络，结果表明，即使所有其他哈伯德模型参数未知，这也使我们能够以高保真度（$R^2\\约 0.94$）预测 SOC 引起的自旋翻转隧道振幅，从而预测有效 SOC 强度。\n\n此外，我们的神经网络还可以高保真度预测其他哈伯德模型参数，这表明基于神经网络的方法可以成为自动表征空穴自旋量子位阵列的强大工具。", "authors": [{"name": "Jacob R. Taylor"}, {"name": "Katharina Laubscher"}, {"name": "Sankar Das Sarma"}], "featured_authors": [{"name": "Jacob R. Taylor"}, {"name": "Katharina Laubscher"}, {"name": "Sankar Das Sarma"}], "author_count": 3}, {"id": "2604.05097", "category": "cond-mat", "title": "Surface Response, Plasma Modes of coated Multi-Layered anisotropic Semi-Dirac Heterostructures", "abstract": "We derived closed-form analytical expressions for the surface response functions (SRFs) for heterostructure. We investigate structures consisting of up to three layered, coated heterostructure of two-dimensional (2D) materials with a dielectric medium or vacuum interface. The dielectric media serves to inhibit charge transfer between layers for the case when a pair of 2D layers serve as coatings for a dielectric film. Our results revise the established picture for the dispersion equation for two layers of reduced dimensionality surrounded by dielectric media. An impinging electromagnetic field incident on the surface leads to Coulomb coupled plasma excitations in the structure which are yielded by the SRF. This is achieved by employing Maxwell's equations and linear response theory. We use these results to investigate the plasmonic properties of tilted semi-Dirac materials both analytically and numerically. Closed-form analytical expressions are derived for the plasmon dispersions in the long wavelength limit for single and double layers. We numerically obtain density plots of the loss functions and observe anisotropic behavior in different momentum directions. For the cases when there are two or three layers, we observe two plasmon branches corresponding to in-phase and out-of-phase charge density oscillations, where the in-phase optical modes have higher intensity than the out-of-phase acoustic modes. We calculated the optical absorption spectra for plasma modes in layered semi-Dirac materials produced by an external electromagnetic field carrying an electric polarization and frequency. Possible applications include durable protection coatings providing UV resistance, chemical protection and improving upon traditional ceramic coatings.", "url": "https://arxiv.org/abs/2604.05097", "type": "理论+数值", "summary": "我们导出了异质结构表面响应函数（SRF）的封闭式解析表达式。我们研究由多达三层、具有介电介质或真空界面的二维 (2D) 材料涂层异质结构组成的结构。当一对二维层用作介电膜的涂层时，介电介质用于抑制层之间的电荷转移。我们的结果修正了介电介质包围的两层降维色散方程的既定图。入射到表面的电磁场会在结构中产生由 SRF 产生的库仑耦合等离子体激发。这是通过采用麦克斯韦方程组和线性响应理论来实现的。我们利用这些结果从分析和数值角度研究倾斜半狄拉克材料的等离子体特性。导出了单层和双层的长波长极限内等离激元色散的封闭式解析表达式。我们以数值方式获得损失函数的密度图，并观察不同动量方向的各向异性行为。\n\n对于两层或三层的情况，我们观察到对应于同相和异相电荷密度振荡的两个等离子体分支，其中同相光学模式比异相声学模式具有更高的强度。我们计算了由带有电极化和频率的外部电磁场产生的层状半狄拉克材料中等离子体模式的光学吸收光谱。可能的应用包括提供抗紫外线、化学保护和改进传统陶瓷涂层的耐用保护涂层。", "authors": [{"name": "Teresa Lee"}, {"name": "Godfrey Gumbs"}, {"name": "Thi Nga Do"}, {"name": "Andrii Iurov"}, {"name": "Danhong Huang"}], "featured_authors": [{"name": "Teresa Lee"}, {"name": "Godfrey Gumbs"}, {"name": "Thi Nga Do"}, {"name": "Andrii Iurov"}, {"name": "Danhong Huang"}], "author_count": 5}, {"id": "2604.05198", "category": "cond-mat", "title": "Decoding Equilibrium and Dynamical Criticality in the 2D Topological Order", "abstract": "Unifying equilibrium criticality and dynamical quantum phase transitions (DQPTs) under complex driving fields remains a profound challenge. Here, we decode this connection in the 2D strongly interacting Wen-plaquette model. By mapping its anyonic excitations to 1D effective dissipative channels, we reveal that microscopic single-particle fidelity zeros exactly reconstruct the macroscopic equilibrium topological phase boundaries. Beyond equilibrium, we demonstrate that during non-unitary quench dynamics, these very same static singularities enforce an absolute momentum-space exclusion against dynamical Fisher zeros. Furthermore, a newly identified dissipation-phase racing mechanism prematurely depletes the decaying mode, fundamentally annihilating DQPTs and generating topologically trivial steady states. Our results establish exact microscopic static singularities as the universal decoder for macroscopic non-unitary topological dynamics.", "url": "https://arxiv.org/abs/2604.05198", "type": "理论", "summary": "在复杂驱动场下统一平衡临界性和动态量子相变（DQPT）仍然是一个巨大的挑战。在这里，我们在 2D 强相互作用 Wen-plaquette 模型中解码了这种连接。通过将其任意子激发映射到一维有效耗散通道，我们揭示了微观单粒子保真度零点准确地重建了宏观平衡拓扑相边界。除了平衡之外，我们证明在非单一淬灭动力学过程中，这些完全相同的静态奇点强制对动态费希尔零点进行绝对动量空间排除。此外，一种新发现的耗散相竞赛机制会过早耗尽衰变模式，从根本上消除 DQPT 并产生拓扑平凡的稳态。我们的结果建立了精确的微观静态奇点作为宏观非单一拓扑动力学的通用解码器。", "authors": [{"name": "Xiao-Ming Zhao"}, {"name": "Cui-Xian Guo"}, {"name": "Gaoyong Sun"}, {"name": "Su-Peng Kou"}], "featured_authors": [{"name": "Xiao-Ming Zhao"}, {"name": "Cui-Xian Guo"}, {"name": "Gaoyong Sun"}, {"name": "Su-Peng Kou"}], "author_count": 4}, {"id": "2604.05216", "category": "cond-mat", "title": "Approximate vortex lattices of atomic Fermi superfluid on a spherical surface", "abstract": "While planar Fermi superfluids form Abrikosov vortex lattices under magnetic or effective gauge fields, spherical geometry forbids perfect lattices above 20 vortices. We characterize approximate vortex structures of atomic Fermi superfluids under an effective monopole field on a spherical surface as an analogue of the planar vortex-lattice problem by two constructions based on the Ginzburg-Landau theory. The first one is geometric and uses the random, geodesic-dome, and Fibonacci lattices as scaffolds to construct the order parameter from the degenerate monopole harmonics. The second one minimizes the free energy by numerically adjusting the coefficients to find the solution with the minimal Abrikosov parameter. We have verified the vortices from both constructions are zeros of the order parameter with circulating currents around the vortex cores. As the number of vortices increases, the Abrikosov parameters of both the Fibonacci-lattice and minimization solutions extrapolate to the planar value. We briefly discuss implications for ultracold atoms in thin spherical-shell geometry.", "url": "https://arxiv.org/abs/2604.05216", "type": "理论+数值", "summary": "虽然平面费米超流体在磁场或有效规范场下形成阿布里科索夫涡旋晶格，但球面几何形状禁止形成超过 20 个涡旋的完美晶格。我们通过基于 Ginzburg-Landau 理论的两种结构来表征球面上有效单极场下原子费米超流体的近似涡旋结构，作为平面涡旋晶格问题的模拟。第一个是几何的，使用随机、测地圆顶和斐波那契晶格作为支架，从简并单极子谐波构造阶参数。第二个方法是通过数值调整系数来最小化自由能，以找到具有最小 Abrikosov 参数的解。我们已经验证了两种结构的涡流都是阶次参数为零，并且涡流核心周围有循环电流。随着涡旋数量的增加，斐波那契格和最小化解的 Abrikosov 参数都会外推到平面值。我们简要讨论了薄球壳几何结构中超冷原子的含义。", "authors": [{"name": "Keshab Sony"}, {"name": "Yan He"}, {"name": "Chih-Chun Chien"}], "featured_authors": [{"name": "Keshab Sony"}, {"name": "Yan He"}, {"name": "Chih-Chun Chien"}], "author_count": 3}, {"id": "2604.05220", "category": "cond-mat", "title": "Many-body description of two-dimensional van der Waals ferroelectric $α-$In$_2$Se$_3$", "abstract": "Two-dimensional (2D) van der Waals ferroelectrics are recognized for enabling many applications, from memory and logic to neuromorphic computing, as well as transforming other materials to control electronic phase transitions and topological states. While these materials are typically weakly correlated and expected to have their ground-state properties well described with the commonly used density functional theory, by focusing on bilayers and trilayers of In$_2$Se$_3$ we show that this approach may not be reliable. The underlying electronic structure strongly depends on the polarization structure of the multilayer system and is surprisingly challenging to accurately calculate, requiring a high-fidelity many-body theory of the quasiparticle self-consistent \\textit{GW} approximation. We develop this underlying description by extending the capabilities of Green function implementation within the open-source Questaal package. We show that even a sophisticated hybrid functional approach may fail to predict a nonvanishing gap in a bilayer In$_2$Se$_3$ and yields charge density, polarization, and band offsets that strongly deviate from the many-body picture. We discuss the implications of these computational advances for future opportunities in 2D ferroelectrics.", "url": "https://arxiv.org/abs/2604.05220", "type": "理论+数值", "summary": "二维 (2D) 范德华铁电体被认为可实现从内存和逻辑到神经形态计算的许多应用，以及转换其他材料以控制电子相变和拓扑状态。虽然这些材料通常相关性较弱，并且预计可以用常用的密度泛函理论很好地描述其基态特性，但通过关注 In$_2$Se$_3$ 的双层和三层，我们表明这种方法可能并不可靠。底层的电子结构强烈依赖于多层系统的极化结构，并且精确计算具有惊人的挑战性，需要准粒子自洽 \\textit{GW} 近似的高保真多体理论。我们通过扩展开源 Questaal 包中 Green 函数实现的功能来开发这种底层描述。我们表明，即使是复杂的混合功能方法也可能无法预测双层 In$_2$Se$_3$ 中的非消失间隙，并产生与多体图像严重偏离的电荷密度、极化和能带偏移。\n\n我们讨论这些计算进步对二维铁电体未来机会的影响。", "authors": [{"name": "Denzel Ayala"}, {"name": "Dimitar Pashov"}, {"name": "Tong Zhou"}, {"name": "Kirill Belashchenko"}, {"name": "Mark van Schilfgaarde"}, {"name": "Igor Žutić"}], "featured_authors": [{"name": "Denzel Ayala"}, {"name": "Dimitar Pashov"}, {"name": "Tong Zhou"}, {"name": "Kirill Belashchenko"}, {"name": "Mark van Schilfgaarde"}, {"name": "Igor Žutić"}], "author_count": 6}, {"id": "2604.05223", "category": "cond-mat", "title": "A Modular 3D-Printed Design to Investigate Prebiotic Chemical Systems in Hot Spring Pools", "abstract": "The emergence of membranous compartments (protocells) with encapsulated genetic material was a crucial step life's origin and evolution. The hot spring hypothesis for the origin of life suggests that protocells could have formed in hot spring pools and encapsulated organic matter. Previous investigations have focused on mimicking wet-dry (WD) cycles within a single pool, which precludes simulation of many hydrothermal field conditions, such as differential mineralogy, variable temperature and pH and water flow between multiple hot spring pools. Here, we present a modular 3D-printed hydrothermal field simulator that mimics the complex nature of hot spring fields by controlling the variability of a series of linked pools, including WD cycles, temperature, pH, mineralogy, and mixing of different fluids. Results from using the prototype hot spring field design demonstrate the ability to spontaneously form lipid vesicles that encapsulate organic matter within membranous compartments comprised of decanoic acid:decanol (4:1) or the phospholipids POPC:POPG (1:1). We observed distinct morphological differences in the vesicles, ranging from thick-walled multilamellar, thin-walled oligolamellar and unilamellar as well as giant unilamellar vesicles formed under multiple WD cycles in the simulator pools. Cargo encapsulation was favoured in the cell-like giant unilamellar and small oligolamellar vesicles. Overall, hot-spring simulator offers a customisable avenue for studying other hot spring processes such as prebiotic chemical reactions, mineral surface catalysis, and the complexity of hydrothermal field dynamics.", "url": "https://arxiv.org/abs/2604.05223", "type": "数值", "summary": "含有封装遗传物质的膜室（原始细胞）的出现是生命起源和进化的关键一步。生命起源的温泉假说表明，原始细胞可能是在温泉池中形成的，并包裹着有机物。之前的研究主要集中在模拟单个温泉池内的干湿 (WD) 循环，这妨碍了对许多热液场条件的模拟，例如不同的矿物学、可变的温度和 pH 值以及多个温泉池之间的水流。在这里，我们提出了一个模块化 3D 打印热液场模拟器，它通过控制一系列相连池的变化来模拟温泉场的复杂性质，包括 WD 循环、温度、pH 值、矿物学和不同流体的混合。使用原型温泉场设计的结果表明，能够自发形成脂质囊泡，将有机物质封装在由癸酸:癸醇 (4:1) 或磷脂 POPC:POPG (1:1) 组成的膜室内。\n\n我们观察到囊泡存在明显的形态差异，包括厚壁多层囊泡、薄壁寡层囊泡和单层囊泡，以及在模拟器池中多次 WD 循环下形成的巨型单层囊泡。细胞状巨型单层囊泡和小寡层囊泡有利于货物封装。总的来说，温泉模拟器为研究其他温泉过程提供了一个可定制的途径，例如生命前化学反应、矿物表面催化和热液场动力学的复杂性。", "authors": [{"name": "Arslan Siddique"}, {"name": "Dev Chauhan"}, {"name": "Alethea Dutton"}, {"name": "Kavish Reddy"}, {"name": "Soumya Kanti De"}, {"name": "Albert C. Fahrenbach"}, {"name": "Tracie Barber"}, {"name": "Martin Van Kranendonk"}, {"name": "Anna Wang"}], "featured_authors": [{"name": "Arslan Siddique"}, {"name": "Dev Chauhan"}, {"name": "Alethea Dutton"}, {"name": "Tracie Barber"}, {"name": "Martin Van Kranendonk"}, {"name": "Anna Wang"}], "author_count": 9}, {"id": "2604.05244", "category": "cond-mat", "title": "Edge universality in Floquet sideband spectra", "abstract": "We show that, for non-interacting fermions under a monochromatic phase drive (Tien--Gordon regime), the outgoing sideband occupations at a sharp Fermi edge are governed by the discrete Bessel kernel -- an exact result at any drive amplitude~$A$. In the large-amplitude regime the edge of this kernel converges, on the $A^{1/3}$ scale, to the Airy kernel of random matrix theory. This universality has a direct transport consequence: the deficit of the photo-assisted shot-noise slope from its high-bias plateau collapses onto the Airy-kernel diagonal. The derivation rests on a bridge between the linear detection chain and the Floquet scattering matrix: commensurate gating isolates a single coherence-order block of the one-body correlator. We identify the crossover temperature below which the Airy scaling is sharp, extend the analysis to biased two-terminal occupations, and argue that multi-tone drives make Pearcey-kernel cusps accessible in Floquet--Sambe space.", "url": "https://arxiv.org/abs/2604.05244", "type": "理论", "summary": "我们表明，对于单色相位驱动（Tien-Gordon 体系）下的非相互作用费米子，尖费米边缘处的传出边带占用由离散贝塞尔核控制——在任何驱动幅度〜$A$ 下都是精确的结果。在大振幅状态下，该核的边缘在 $A^{1/3}$ 尺度上收敛到随机矩阵理论的艾里核。这种普遍性具有直接的传输后果：光辅助散粒噪声斜率的缺陷从其高偏置平台崩溃到艾里核对角线上。推导依赖于线性检测链和 Floquet 散射矩阵之间的桥梁：相称的选通隔离了单体相关器的单个相干阶块。我们确定了交叉温度，低于该温度艾里标度急剧变化，将分析扩展到有偏差的两端占用，并认为多音驱动使皮尔西核尖点在 Floquet-Sambe 空间中可访问。", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2604.05258", "category": "cond-mat", "title": "Nematic Phase Transitions and Density Modulations in 1D Flat Band Condensates", "abstract": "We investigate the ground-state properties of one-dimensional Gross-Pitaevskii flat-band lattices. We uncover a geometry-driven phase transition into a macroscopically degenerate nematic state with broken time reversal symmetry. Focusing on all-bands-flat (ABF) models, we demonstrate that even infinitesimal onsite interactions can destabilize a uniform, constant-phase condensate, driving the system into a nematic manifold as the flat-band geometry controlled parameter $\\theta \\geq \\pi/8$. At a critical endpoint (\\(\\theta=\\pi/4\\)), where the compact localized states exhibit constant amplitudes, we identify an additional pair of density-modulated ground states characterized by vanishing phase stiffness. Utilizing Bogoliubov-de Gennes excitations and simulated annealing, we show that these density-modulated phases are thermally selected at low temperatures via an order-by-disorder mechanism. Finally, we demonstrate that these non-trivial condensate phases extend beyond ABF models, as exemplified by the sawtooth lattice. Our findings also reveal that the sound velocity in flat-band condensates is a sensitive probe of the underlying geometric phase structure.", "url": "https://arxiv.org/abs/2604.05258", "type": "理论", "summary": "我们研究一维 Gross-Pitaevskii 平带晶格的基态特性。我们发现了几何驱动的相变到具有破坏时间反转对称性的宏观简并向列态。着眼于全能带平坦（ABF）模型，我们证明即使是无穷小的现场相互作用也会破坏均匀、恒定相位凝聚体的稳定性，将系统驱动为向列流形，因为平带几何控制参数 $\\theta \\geq \\pi/8$。在关键端点 (\\(\\theta=\\pi/4\\)) 处，紧凑的局域态表现出恒定的振幅，我们识别出一对额外的密度调制基态，其特征是相位刚度消失。利用 Bogoliubov-de Gennes 激发和模拟退火，我们表明这些密度调制相在低温下通过有序无序机制进行热选择。最后，我们证明这些重要的凝聚相超出了 ABF 模型，如锯齿晶格所示。我们的研究结果还表明，平带凝聚态中的声速是底层几何相结构的敏感探针。", "authors": [{"name": "Yeongjun Kim"}, {"name": "Oleg I. Utesov"}, {"name": "Alexei Andreanov"}, {"name": "Mikhail V. Fistul"}, {"name": "Sergej Flach"}], "featured_authors": [{"name": "Yeongjun Kim"}, {"name": "Oleg I. Utesov"}, {"name": "Alexei Andreanov"}, {"name": "Mikhail V. Fistul"}, {"name": "Sergej Flach"}], "author_count": 5}, {"id": "2604.05264", "category": "cond-mat", "title": "Stability and superstructural ordering of alkali-triel-pnictide clathrates A$_8$T$_{27}$Pn$_{19}$", "abstract": "Clathrates are a class of inclusion compounds that offer various useful and surprising phenomena, including superconductivity, thermoelectricity, and the potential for high-density ion storage. Stability conditions within the Alkali-Triel-Pnictide A$_8$T$_{27}$Pn$_{19}$ family of unconventional clathrates are investigated with high-throughput density functional theory calculations, establishing trends in formation energy, structural and electronic properties. Electronic structure calculations and first-principles molecular dynamics simulations show that the ionization potential of guest alkaline atoms strongly influences the stability of electron-exact clathrates and affects their rattler behavior. Targeted reactive synthesis from elemental precursors is attempted, resulting in two novel ternary compounds. However, the targeted clathrate phases are not obtained. Further analysis reveals that the stability of ATPn clathrate compounds containing heavy elements, such as bismuth, depends strongly on spin-orbit effects, which are often neglected in high-throughput studies that compute formation energies. Finally, chemically induced superstructural ordering is described in relation to Wyckoff sites in the prototypical type-I clathrate unit cell.", "url": "https://arxiv.org/abs/2604.05264", "type": "理论+数值", "summary": "包合物是一类包合物，可提供各种有用且令人惊讶的现象，包括超导性、热电性和高密度离子存储的潜力。通过高通量密度泛函理论计算研究了非常规包合物 A$_8$T$_{27}$Pn$_{19}$ 系列内的稳定性条件，确定了形成能、结构和电子特性的趋势。电子结构计算和第一原理分子动力学模拟表明，客体碱性原子的电离势强烈影响电子精确包合物的稳定性并影响其响尾行为。尝试从元素前体进行定向反应合成，产生两种新型三元化合物。然而，没有获得目标包合物相。进一步的分析表明，含有重元素（例如铋）的 ATPn 笼形化合物的稳定性很大程度上取决于自旋轨道效应，而在计算形成能的高通量研究中，这一效应常常被忽略。\n\n最后，描述了与典型 I 型笼形晶胞中威科夫位点相关的化学诱导的超结构排序。", "authors": [{"name": "Frank Cerasoli"}, {"name": "Xiaochen Jin"}, {"name": "Genevieve Amobi"}, {"name": "Kirill Kovnir"}, {"name": "Davide Donadio"}], "featured_authors": [{"name": "Frank Cerasoli"}, {"name": "Xiaochen Jin"}, {"name": "Genevieve Amobi"}, {"name": "Kirill Kovnir"}, {"name": "Davide Donadio"}], "author_count": 5}, {"id": "2604.05319", "category": "cond-mat", "title": "H-NESSi: The Hierarchical Non-Equilibrium Systems Simulation package", "abstract": "We present H-NESSi (The Hierarchical Non-Equilibrium Systems Simulation package), an open-source software package for solving the Kadanoff-Baym equations (KBE) of nonequilibrium Green's function (NEGF) theory using hierarchical low-rank compression techniques. The simulation of strongly correlated quantum systems out of equilibrium is severely limited by the cubic scaling in propagation time and quadratic memory growth associated with conventional two-time formulations. H-NESSi overcomes these limitations by combining high-order time-stepping schemes with hierarchical off-diagonal low-rank (HODLR) representations of the retarded and lesser Green's functions, enabling controllable accuracy at substantially reduced computational cost and memory usage. Imaginary time quantities are efficiently represented using the discrete Lehmann representation (DLR), allowing compact and accurate treatment of thermal initial states. The implementation supports multiorbital systems, adaptive singular value truncation, and both shared-memory (OpenMP) and distributed-memory (MPI) parallelization strategies suitable for large-scale lattice calculations. The workflow closely mirrors established NEGF frameworks while introducing compression transparently into the propagation procedure. Benchmark applications to driven superconductors within dynamical mean-field theory and to the two-dimensional Hubbard model demonstrate favorable scaling compared to conventional implementations, with asymptotic time complexity significantly below the cubic scaling of uncompressed approaches. H-NESSi thus enables long-time and large-system nonequilibrium simulations of correlated quantum materials which were previously computationally prohibitive.", "url": "https://arxiv.org/abs/2604.05319", "type": "理论+数值", "summary": "我们推出了 H-NESSi（分层非平衡系统仿真包），这是一个开源软件包，用于使用分层低阶压缩技术求解非平衡格林函数 (NEGF) 理论的 Kadanoff-Baym 方程 (KBE)。失去平衡的强相关量子系统的模拟受到传播时间的三次缩放和与传统二次公式相关的二次存储增长的严重限制。 H-NESSi 通过将高阶时间步进方案与延迟和较小格林函数的分层非对角低秩 (HODLR) 表示相结合来克服这些限制，从而在大幅降低计算成本和内存使用的情况下实现可控精度。使用离散莱曼表示法 (DLR) 可以有效地表示虚数时间量，从而可以紧凑且准确地处理热初始状态。该实现支持多轨道系统、自适应奇异值截断以及适合大规模点阵计算的共享内存 (OpenMP) 和分布式内存 (MPI) 并行化策略。\n\n该工作流程密切反映了已建立的 NEGF 框架，同时将压缩透明地引入到传播过程中。动态平均场理论中的驱动超导体和二维哈伯德模型的基准应用表明，与传统实现相比，具有良好的缩放比例，渐近时间复杂度显着低于未压缩方法的立方缩放比例。因此，H-NESSi 能够对相关量子材料进行长时间、大型系统的非平衡模拟，而这在以前的计算量上是令人望而却步的。", "authors": [{"name": "Thomas Blommel"}, {"name": "Jeremija Kovačević"}, {"name": "Jason Kaye"}, {"name": "Emanuel Gull"}, {"name": "Jakša Vučičević"}, {"name": "Denis Golež"}], "featured_authors": [{"name": "Thomas Blommel"}, {"name": "Jeremija Kovačević"}, {"name": "Jason Kaye"}, {"name": "Emanuel Gull"}, {"name": "Jakša Vučičević"}, {"name": "Denis Golež"}], "author_count": 6}, {"id": "2604.05352", "category": "cond-mat", "title": "Chemical Short-Range Order Regulates Hydrogen Energetics and Hydrogen-Dislocation Interactions in CoNiV", "abstract": "Chemical short-range order (CSRO) has emerged as a critical structural feature in concentrated alloys, yet its coupling with hydrogen remains an active discussion. Here, we develop a machine-learning interatomic potential for the Co-Ni-V-H system and investigate how CSRO regulates hydrogen energetics and dislocation behavior in CoNiV, an alloy with reported strong resistance to hydrogen embrittlement. We identify strong V-centered ordering that suppresses V-V clustering and significantly reshapes the hydrogen solution landscape. Compared to a chemically random alloy, the ordered state exhibits higher average hydrogen solution energies and a reduced population of strongly binding sites, indicating lower bulk hydrogen uptake. At partial dislocations, hydrogen preferentially segregates to tensile core regions, acting as a shallow, reversible trap with a much weaker effect compared to chemical trapping states. These results demonstrate that local chemical order strongly regulates hydrogen-dislocation coupling and provide an atomistic understanding for tuning hydrogen-assisted deformation in concentrated CoNiV alloys.", "url": "https://arxiv.org/abs/2604.05352", "type": "理论+数值", "summary": "化学短程有序（CSRO）已成为浓合金中的一个关键结构特征，但其与氢的耦合仍然是一个活跃的讨论。在这里，我们为 Co-Ni-V-H 系统开发了一种机器学习原子间势，并研究了 CSRO 如何调节 CoNiV 中的氢能量和位错行为，CoNiV 是一种据报道具有很强的抗氢脆性的合金。我们发现强 V 中心有序性可以抑制 V-V 聚类并显着重塑氢溶液景观。与化学随机合金相比，有序态表现出更高的平均氢溶解能和减少的强结合位点数量，表明整体氢吸收量较低。在部分位错处，氢优先偏析到拉伸核心区域，充当浅层可逆陷阱，与化学捕获态相比，其效果要弱得多。这些结果表明，局部化学顺序强烈调节氢位错耦合，并为调节浓 CoNiV 合金中的氢辅助变形提供原子学理解。", "authors": [{"name": "Beihan Chen"}, {"name": "Dalia Sayed Ahmed"}, {"name": "Yang Yang"}, {"name": "Miaomiao Jin"}], "featured_authors": [{"name": "Beihan Chen"}, {"name": "Dalia Sayed Ahmed"}, {"name": "Yang Yang"}, {"name": "Miaomiao Jin"}], "author_count": 4}, {"id": "2604.05356", "category": "cond-mat", "title": "Entanglement in the open XX chain: Rényi oscillations, hard-edge crossover, and symmetry resolution", "abstract": "We derive closed-form asymptotic formulas for the Rényi entanglement entropies of the open XX spin-$1/2$ chain by mapping the underlying determinant of the boundary correlation matrix (which has Toeplitz-plus-Hankel structure) to a Hankel determinant with a positive weight whose large-size asymptotics follow from known Riemann--Hilbert results. An explicit evaluation of the Szegő function yields the leading $2k_F$ oscillatory amplitude and phase. A single variable $s = 2\\ell \\sin(k_F/2)$ organizes the hard-edge crossover as the Fermi momentum approaches the band edge: the oscillation envelope obeys $s^{\\pm1/\\alpha}$ power laws and $\\ln s$ is the natural leading logarithm for a clean data collapse. For detached blocks the oscillatory amplitude is numerically consistent with a factorization through the conformal cross-ratio. The same framework recovers the open-boundary-condition (OBC) equipartition offset $-\\tfrac{1}{2}\\log\\log\\ell$ for symmetry-resolved entropies, together with the known halving of the Gaussian width relative to the periodic chain.", "url": "https://arxiv.org/abs/2604.05356", "type": "理论+数值", "summary": "我们通过将边界相关矩阵（具有 Toeplitz-plus-Hankel 结构）的基础行列式映射到具有正权重的 Hankel 行列式，推导出开放 XX 自旋-$1/2$ 链的 Rényi 纠缠熵的闭合形式渐近公式，该行列式的大尺寸渐进遵循已知的 Riemann-Hilbert 结果。对 Szegő 函数的显式评估会产生领先的 $2k_F$ 振荡幅度和相位。当费米动量接近能带边缘时，单个变量 $s = 2\\ell \\sin(k_F/2)$ 组织硬边交叉：振荡包络遵循 $s^{\\pm1/\\alpha}$ 幂定律，而 $\\ln s$ 是干净数据崩溃的自然主导对数。对于分离块，振荡幅度在数值上与通过共形交比的因式分解一致。相同的框架恢复对称解析熵的开放边界条件（OBC）均分偏移 $-\\tfrac{1}{2}\\log\\log\\ell$ ，以及相对于周期链的已知高斯宽度减半。", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2604.05385", "category": "cond-mat", "title": "Rationalizing defect formation energies in metals and semiconductors with semilocal density functionals", "abstract": "The study of defects in materials is of utmost importance for technological applications and the design of new materials. In this work, we analyze the performance of density functional approximations on two prototypical sets of defective systems: monovacancies in eight fcc metals, and interstitials in the semiconductor Si-diamond. Specifically, we compute defect formation energies using the local density approximation, the Perdew-Burke-Ernzerhof generalized gradient approximation, the meta-generalized gradient approximations (meta-GGAs) strongly constrained and appropriately normed (SCAN), its regularized version (r2SCAN), the Lebeda-Aschebrock-Kummel (LAK) meta-GGA, and the Heyd-Scuseria-Ernzerhof screened hybrid functional. For metals, the local density approximation shows better performance compared to the other approximations, whereas for silicon, the meta-generalized gradient approximation Lebeda-Aschebrock-Kummel yields outstand- ing accuracy, surpassing the hybrid functional and approaching the results of more computationally demanding Quantum Monte Carlo methods. To rationalize the different performances, we study the semilocal ingredients rs, s and {\\alpha} in both the pristine and defective structures. We identify critical regions that indicate the observed trends of the defect formation energies and pave the way for improving density functional approximations.", "url": "https://arxiv.org/abs/2604.05385", "type": "理论+数值", "summary": "材料缺陷的研究对于技术应用和新材料的设计至关重要。在这项工作中，我们分析了密度泛函近似在两组典型缺陷系统上的性能：八种面心立方金属中的单空位，以及半导体硅金刚石中的填隙。具体来说，我们使用局部密度近似、Perdew-Burke-Ernzerhof 广义梯度近似、强约束和适当规范的元广义梯度近似 (meta-GGA) (SCAN)、其正则化版本 (r2SCAN)、Lebeda-Aschebrock-Kummel (LAK) 元 GGA 和 Heyd-Scuseria-Ernzerhof 来计算缺陷形成能筛选杂化功能。对于金属，局域密度近似比其他近似表现出更好的性能，而对于硅，元广义梯度近似 Lebeda-Aschebrock-Kummel 具有出色的精度，超越了混合泛函并接近计算要求更高的量子蒙特卡罗方法的结果。\n\n为了合理化不同的性能，我们研究了原始结构和有缺陷结构中的半局部成分 rs、s 和 {\\alpha}。我们确定了指示缺陷形成能量观察到的趋势的关键区域，并为改进密度泛函近似铺平了道路。", "authors": [{"name": "Jorge Vega Bazantes"}, {"name": "Timo Lebeda"}, {"name": "Akilan Ramasamy"}, {"name": "Kanun Pokharel"}, {"name": "Ruiqi Zhang"}, {"name": "John Perdew"}, {"name": "Jianwei Sun"}], "featured_authors": [{"name": "Jorge Vega Bazantes"}, {"name": "Timo Lebeda"}, {"name": "Akilan Ramasamy"}, {"name": "Ruiqi Zhang"}, {"name": "John Perdew"}, {"name": "Jianwei Sun"}], "author_count": 7}, {"id": "2604.05391", "category": "cond-mat", "title": "Topologically shadowed quantum criticality: A non-compact conformal manifold", "abstract": "We put forward a proposal for topological quantum critical points (tQCPs) separating non-invertible chiral topological orders in $(2+1)$ dimensions. We conjecture that these tQCPs can be captured by a family of scale-invariant field theories forming a non-compact scale-invariant manifold. A central feature of our proposal is topological shadowing: the underlying critical theory is rigorously constrained by the global topological data of the two adjacent gapped phases. These theories can be further projected into quantum field theories with universal non-local structures. Specifically, we show that the quantum dynamics of the $U(1)$ symmetric critical point uniquely characterized by a topological angle $\\Theta_{\\text{cft}}$ -- which is defined by a commutator between two Wilson loop operators on a torus -- is determined by the braiding angles $\\Theta_{1,2}$ of the adjacent gapped phases via the relation $\\Theta_{\\text{cft}}^{-1} =\\frac{1}{2}[\\Theta_1^{-1} + \\Theta_2^{-1}]$. Despite the non-locality, our renormalization group calculations (up to two-loop order) strongly suggest that the theory shall maintain exact scale invariance. This establishes, without supersymmetry, a continuous manifold of fixed points that naturally becomes a conformal manifold when the local structure is further enforced.", "url": "https://arxiv.org/abs/2604.05391", "type": "理论+数值", "summary": "我们提出了拓扑量子临界点 (tQCP) 的提案，该点在 $(2+1)$ 维度上分离不可逆手性拓扑序。我们推测这些 tQCP 可以通过一系列形成非紧尺度不变流形的尺度不变场论来捕获。我们建议的一个核心特征是拓扑阴影：基本的批判理论受到两个相邻间隙相的全局拓扑数据的严格约束。这些理论可以进一步投射到具有普适非局域结构的量子场论中。具体来说，我们表明 $U(1)$ 对称临界点的量子动力学唯一由拓扑角 $\\Theta_{\\text{cft}}$ 表征（拓扑角由环面上两个威尔逊环算子之间的换向器定义），由相邻间隙相的编织角 $\\Theta_{1,2}$ 通过关系 $\\Theta_{\\text{cft}}^{-1} 确定=\\frac{1}{2}[\\Theta_1^{-1} + \\Theta_2^{-1}]$。尽管存在非局部性，但我们的重整化群计算（高达两环阶）强烈表明该理论应保持精确的尺度不变性。\n\n这在没有超对称性的情况下建立了一个连续的定点流形，当进一步强化局部结构时，该流形自然会变成共形流形。", "authors": [{"name": "Tianyao Fang"}, {"name": "Weicheng Ye"}, {"name": "Zhengcheng Gu"}, {"name": "Fei Zhou"}], "featured_authors": [{"name": "Tianyao Fang"}, {"name": "Weicheng Ye"}, {"name": "Zhengcheng Gu"}, {"name": "Fei Zhou"}], "author_count": 4}, {"id": "2604.05408", "category": "cond-mat", "title": "Mpemba Effect in an Expanding Lieb-Liniger Bose gas in a hard wall box", "abstract": "The Mpemba effect, broadly understood as the counterintuitive phenomenon in which a system initially farther from equilibrium relaxes faster than a system closer to equilibrium, has been widely studied in classical stochastic systems and, more recently, in quantum settings. However, its manifestation is strongly dependent on the choice of observable and the dynamical constraints of the system. In this work, we investigate the emergence of a Mpemba-type effect in the density redistribution dynamics of a strongly interacting one-dimensional Bose gas in the Tonks-Girardeau regime undergoing a sudden box expansion from length L_0 to L. By defining a physically motivated distance function based on the difference of densities between spatial regions, we provide evidence that -the relaxation dynamics of the ground and excited symmetry sectors exhibit a clear crossing in time, indicating a reversal in relaxation ordering. We emphasize that the Mpemba effect is not a universal law but rather an observable-dependent phenomenon that arises under specific dynamical conditions. In particular, we show that the interplay between initial state structure, integrability, and spatial redistribution leads to distinct relaxation pathways that enable the effect. Our results clarify common misconceptions linking the Mpemba effect to Newton's law of cooling and highlight the conditions under which such anomalous relaxation behavior can emerge in integrable quantum systems.", "url": "https://arxiv.org/abs/2604.05408", "type": "理论", "summary": "姆彭巴效应被广泛理解为一种反直觉现象，即最初远离平衡的系统比接近平衡的系统松弛得更快，它已在经典随机系统以及最近的量子环境中得到了广泛研究。然而，它的表现很大程度上取决于可观测值的选择和系统的动态约束。在这项工作中，我们研究了 Tonks-Girardeau 体系中强相互作用一维玻色气体的密度重新分布动力学中 Mpemba 型效应的出现，该气体经历了从长度 L_0 到 L 的突然盒膨胀。通过定义基于空间区域之间密度差异的物理驱动距离函数，我们提供了证据，证明地面和激发对称扇区的弛豫动力学在时间上表现出明显的交叉，表明弛豫顺序发生了逆转。我们强调，姆彭巴效应不是普遍规律，而是在特定动力学条件下出现的可观察依赖现象。\n\n特别是，我们表明初始状态结构、可积性和空间重新分布之间的相互作用导致了不同的松弛路径，从而实现了这种效果。我们的结果澄清了将姆彭巴效应与牛顿冷却定律联系起来的常见误解，并强调了可积量子系统中出现这种反常弛豫行为的条件。", "authors": [{"name": "Sumita Datta"}], "featured_authors": [{"name": "Sumita Datta"}], "author_count": 1}, {"id": "2604.05412", "category": "cond-mat", "title": "Magnetic toroidal monopoles from relativistic polarization responses to magnetic field gradients", "abstract": "The magnetic toroidal monopole, a time-reversal-odd scalar, has attracted attention through its characteristic responses, such as electric-field-induced nonreciprocal directional dichroism observed in Co$_2$SiO$_4$. However, its evaluation in crystalline solids remains unresolved, as it cannot be defined within conventional multipole expansions or thermodynamic formulations. In this paper, we propose a theoretical framework to evaluate the magnetic toroidal monopole in periodic crystals based on the response of relativistic electric polarization to a magnetic field gradient. By incorporating the magnetic-field-gradient correction to the relativistic polarization, we derive an explicit expression for the magnetic toroidal monopole beyond symmetry arguments. The resulting expression is formulated in terms of geometric quantity such as Berry curvatures and orbital magnetic moment defined in an extended parameter space spanning momentum, magnetic field, and electric field. We further perform model calculations for an antiferromagnetic system hosting a magnetic toroidal monopole and confirm that the proposed quantity is finite. These results provide a practical route to characterize magnetic toroidal monopoles in crystalline solids and clarify their quantum geometric nature.", "url": "https://arxiv.org/abs/2604.05412", "type": "理论+数值", "summary": "磁环形单极子是一种时间反转奇标量，因其特征响应而引起了人们的关注，例如在 Co$_2$SiO$_4$ 中观察到的电场感应非互易方向二色性。然而，它在结晶固体中的评估仍未解决，因为它无法在传统的多极展开式或热力学公式中定义。在本文中，我们提出了一个理论框架，基于相对论电极化对磁场梯度的响应来评估周期性晶体中的磁环形单极子。通过将磁场梯度校正与相对论偏振相结合，我们得出了超越对称性论证的磁环形单极子的显式表达式。所得到的表达式是根据几何量来公式化的，例如在跨越动量、磁场和电场的扩展参数空间中定义的贝里曲率和轨道磁矩。我们进一步对具有磁环形单极子的反铁磁系统进行模型计算，并确认所提出的数量是有限的。\n\n这些结果提供了表征晶体固体中磁环形单极子并阐明其量子几何性质的实用途径。", "authors": [{"name": "Taisei Yamanaka"}, {"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Taisei Yamanaka"}, {"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "author_count": 3}, {"id": "2604.05450", "category": "cond-mat", "title": "\\textit{Ab initio} \\textit{GW}-BSE theory of optical activity in $α$-quartz", "abstract": "We present an ab initio many-body theory of optical activity in solids within the GW-BSE framework. Dielectric spatial dispersion is formulated in two complementary forms: exciton envelope modulation and sum-over-exciton-states expansion. Our application to $\\alpha$-quartz reveals that the envelope-modulated formulation captures the low-frequency region, whereas the sum-over-exciton-states formulation is essential to reproduce the correct full frequency dependence. Comparisons with the independent-particle approximation and simple local-field corrections further highlight the decisive role of excitonic many-body effects in shaping the spectral dispersion of optical activity in solids.", "url": "https://arxiv.org/abs/2604.05450", "type": "理论+数值", "summary": "我们提出了 GW-BSE 框架内固体旋光性的从头算多体理论。介电空间色散以两种互补的形式表示：激子包络调制和激子态总和扩展。我们对 $\\alpha$-quartz 的应用表明，包络调制公式捕获了低频区域，而激子态求和公式对于再现正确的全频率依赖性至关重要。与独立粒子近似和简单的局部场校正的比较进一步强调了激子多体效应在塑造固体中旋光性光谱色散方面的决定性作用。", "authors": [{"name": "Xiaoming Wang"}, {"name": "Yanfa Yan"}], "featured_authors": [{"name": "Xiaoming Wang"}, {"name": "Yanfa Yan"}], "author_count": 2}, {"id": "2604.05454", "category": "cond-mat", "title": "Nonlinear thermal gradient induced magnetization in $d^{\\prime }$, $g^{\\prime }$ and $i^{\\prime }$ altermagnets", "abstract": "It is a highly nontrivial question whether a magnetization can be induced by applying a nonlinear temperature gradient in the absence of any linear component. In this work, we address this issue and provide explicit examples demonstrating that such a response can indeed arise. The spin-split band structures of $d$-wave, $g$-wave, $i$-wave altermagnets are characterized by $k^{N_{X}}\\sin N_{X}\\phi $, where $N_{X}=2,4$ and $6$, respectively. In contrast, the corresponding $d^{\\prime }$-wave, $g^{\\prime } $-wave, $i^{\\prime }$-wave altermagnets are described by $k^{N_{X}}\\cos N_{X}\\phi $. We show that a finite magnetization is induced in the $d^{\\prime }$-wave, $g^{\\prime }$-wave, $i^{\\prime }$-wave altermagnets under a second-order nonlinear temperature gradient, whereas no such response occurs in the $d$-wave, $g$-wave, $i$-wave altermagnets. This constitutes the leading-order contribution because the linear response is forbidden by inversion symmetry. Furthermore, we derive analytic expressions for the induced magnetization in the high-temperature regime. We also demonstrate that no analogous nonlinear thermal response appears in $p$-wave, $f$-wave, $p^{\\prime }$-wave and $f^{\\prime }$-wave odd-parity magnets.", "url": "https://arxiv.org/abs/2604.05454", "type": "理论", "summary": "在没有任何线性分量的情况下是否可以通过施加非线性温度梯度来感应磁化是一个非常重要的问题。在这项工作中，我们解决了这个问题，并提供了明确的例子，证明这种反应确实可以出现。 $d$波、$g$波、$i$波交替磁体的自旋分裂能带结构的特征为$k^{N_{X}}\\sin N_{X}\\phi $，其中$N_{X}=2,4$和$6$分别。相反，相应的 $d^{\\prime }$-波、$g^{\\prime } $-波、$i^{\\prime }$-波交替磁体由 $k^{N_{X}}\\cos N_{X}\\phi $ 描述。我们发现，在二阶非线性温度梯度下，$d^{\\prime}$波、$g^{\\prime}$波、$i^{\\prime}$波互变磁体中会产生有限磁化强度，而$d$波、$g$-波、$i$波互变磁体中不会出现这种响应。这构成了主阶贡献，因为线性响应被反演对称性所禁止。此外，我们推导了高温状态下感应磁化强度的解析表达式。\n\n我们还证明，$p$波、$f$波、$p^{\\prime }$波和$f^{\\prime }$波奇宇称磁体中没有出现类似的非线性热响应。", "authors": [{"name": "Motohiko Ezawa"}], "featured_authors": [{"name": "Motohiko Ezawa"}], "author_count": 1}, {"id": "2604.05457", "category": "cond-mat", "title": "Novel Light-Induced States in Triangular Metallic Magnet", "abstract": "Novel nonequilibrium states of magnet induced by light attract considerable attention both in nature of physics and apply. In this work, we systematically explore the electronic and magnetic states of a double-exchange model on a triangular lattice under the irradiation of circularly polarized continuous wave field, by means of molecular dynamics calculation. Several exotic nonequilibrium magnetic states are discovered, including a vortex state, long-range magnetic orders at the $\\Gamma$ and $\\textbf{K}/2$, as well as quasi(dynamical)-long-range magnetic order at the $\\textbf{K}$ and $\\textbf{M}$, respectively. Correspondingly, the evolution of electron bands and fillings are also uncovered. These results offer a promising candidate approach for the optical control of exotic magnetic and electronic states.", "url": "https://arxiv.org/abs/2604.05457", "type": "理论+数值", "summary": "光诱导磁体的新型非平衡态在物理学和应用领域都引起了广泛的关注。在这项工作中，我们通过分子动力学计算，系统地探讨了圆偏振连续波场照射下三角晶格上双交换模型的电子和磁态。发现了几种奇异的非平衡磁态，包括涡旋态、$\\Gamma$和$\\textbf{K}/2$处的长程磁序，以及分别在$\\textbf{K}$和$\\textbf{M}$处的准（动态）长程磁序。相应地，电子能带和填充物的演化也被揭示。这些结果为奇异磁态和电子态的光学控制提供了一种有前途的候选方法。", "authors": [{"name": "Yao Wang"}], "featured_authors": [{"name": "Yao Wang"}], "author_count": 1}, {"id": "2604.05474", "category": "cond-mat", "title": "Quantitative analysis of fluctuating hydrodynamics in uniform shear flow", "abstract": "Many theoretical predictions in fluctuating hydrodynamics under uniform shear flow have lacked precise quantitative verification due to analytical approximations whose quantitative impacts are difficult to assess a priori and the limitations of microscopic particle-based simulations. To address this problem, we perform direct numerical simulations (DNS) of the fluctuating Navier-Stokes (NS) equations with shear-periodic boundary conditions. We provide a decisive quantitative validation of two seminal frameworks: the Lutsko-Dufty theory for nonequilibrium long-range correlations, and the dynamic renormalization group (RG) theory by Forster, Nelson, and Stephen (FNS) for anomalous transport. By simulating the linearized fluctuating NS equations, we demonstrate that the predictions of the Lutsko-Dufty theory are quantitatively valid from the viscous-dominated, long-wavelength regime to the shear-dominated, short-wavelength regime, well beyond their originally assumed limits. Moving beyond the linearized equations, we simulate the full nonlinear fluctuating NS equations to test the quantitative predictive capability of the dynamical RG approach by FNS. Our results show that the one-loop RG prediction remains quantitatively accurate up to a strongly nonlinear regime, where conventional perturbation theory fails. Our findings solidify the foundations of these classical theories, paving the way for quantitative analyses using fluctuating hydrodynamics.", "url": "https://arxiv.org/abs/2604.05474", "type": "理论+数值", "summary": "由于分析近似的定量影响难以先验评估以及基于微观粒子的模拟的局限性，均匀剪切流下脉动流体动力学的许多理论预测缺乏精确的定量验证。为了解决这个问题，我们对具有剪切周期边界条件的脉动纳维-斯托克斯 (NS) 方程进行直接数值模拟 (DNS)。我们对两个开创性框架进行了决定性的定量验证：用于非平衡长程相关性的 Lutsko-Dufty 理论，以及 Forster、Nelson 和 Stephen (FNS) 用于异常传输的动态重正化群 (RG) 理论。通过模拟线性化脉动 NS 方程，我们证明了 Lutsko-Dufty 理论的预测从粘性主导的长波长区域到剪切主导的短波长区域在数量上是有效的，远远超出了最初假设的极限。除了线性化方程之外，我们还模拟了完整的非线性波动 NS 方程，以测试 FNS 动态 RG 方法的定量预测能力。\n\n我们的结果表明，单环 RG 预测在强非线性状态下仍然保持定量准确，而传统的微扰理论在这种情况下是失效的。我们的研究结果巩固了这些经典理论的基础，为使用脉动流体动力学进行定量分析铺平了道路。", "authors": [{"name": "Hiroyoshi Nakano"}, {"name": "Yuki Minami"}], "featured_authors": [{"name": "Hiroyoshi Nakano"}, {"name": "Yuki Minami"}], "author_count": 2}, {"id": "2604.05494", "category": "cond-mat", "title": "Mass generation in graphs", "abstract": "We demonstrate a mechanism for the production of massive excitations in graphs. We treat the number of neighbors at each vertex in the graph (degree) as a scalar field. Then we introduce a mechanism inspired by the Higgs mechanism in quantum field theory(QFT), that couples the degree field to a vector-like field, introduced via the graph edges, represented mathematically by the incident matrices of the graph. The coupling between the two fields produces a massless ground state and massive excitations, separated by a mass gap. The excitations can be treated as emergent massive particles, propagating inside the graph. We study how the size of the graph and its density, represented by the ratio of edges over vertices, affects the mass gap and the localization properties of the massive excitations. We show that the most massive excitations, corresponding to the heaviest emergent particles, localize on regions of the graph with high density, consisting of vertices with a large degree. On the other hand, the least massive excitations, corresponding to the lightest emergent particles localize on a few vertices but with a smaller degree. Excitations with intermediate masses are less localized, spreading on more vertices instead. Our study shows that emergence of matter-like structures with various mass properties, is possible in discrete physical models, relying only on a few fundamental properties like the connectivity of the models.", "url": "https://arxiv.org/abs/2604.05494", "type": "理论", "summary": "我们演示了一种在图中产生大量激励的机制。我们将图中每个顶点的邻居数量（度）视为标量场。然后，我们引入了一种受量子场论（QFT）中希格斯机制启发的机制，它将度场耦合到类矢量场，通过图边引入，在数学上由图的事件矩阵表示。两个场之间的耦合产生无质量基态和大量激发，并由质量间隙隔开。激发可以被视为出现的大质量粒子，在图中传播。我们研究图的大小及其密度（由边与顶点的比率表示）如何影响质量间隙和大量激发的局域特性。我们表明，最大的激发，对应于最重的涌现粒子，集中在图的高密度区域，由大度数的顶点组成。另一方面，对应于最轻的涌现粒子的最小质量激发集中在几个顶点上，但程度较小。\n\n中等质量的激发不太集中，而是传播到更多的顶点。我们的研究表明，在离散物理模型中，具有各种质量属性的类物质结构的出现是可能的，仅依赖于一些基本属性，例如模型的连通性。", "authors": [{"name": "Ioannis Kleftogiannis"}, {"name": "Ilias Amanatidis"}], "featured_authors": [{"name": "Ioannis Kleftogiannis"}, {"name": "Ilias Amanatidis"}], "author_count": 2}, {"id": "2604.05503", "category": "cond-mat", "title": "Exact solution of three-point functions in critical loop models", "abstract": "We propose an exact formula for three-point functions on the sphere in critical loop models with primary fields $V_{(r,s)}$ characterized by $2r$ legs and a parameter \\(s\\) that describes diagonal fields for $r=0$ and the momentum of legs for $r>0$. We demonstrate its validity in three ways: the conformal bootstrap method for 4-point functions, a transfer-matrix study of the lattice model, and a probabilistic method based on conformal loop ensemble and Liouville quantum gravity. This work provides a crucial missing piece for solving critical loop models and reveals a deep unity between three fundamental approaches to 2D statistical physics: transfer matrix, conformal field theory, and probability theory.", "url": "https://arxiv.org/abs/2604.05503", "type": "理论", "summary": "我们提出了关键循环模型中球面上三点函数的精确公式，其主场 $V_{(r,s)}$ 的特征为 $2r$ 腿，参数 \\(s\\) 描述 $r=0$ 的对角场和 $r>0$ 的腿动量。我们通过三种方式证明了其有效性：4 点函数的共形自举法、晶格模型的传递矩阵研究以及基于共形环系综和刘维尔量子引力的概率方法。这项工作为求解关键环路模型提供了一个关键的缺失部分，并揭示了二维统计物理的三种基本方法之间的深刻统一：传递矩阵、共形场论和概率论。", "authors": [{"name": "Morris Ang"}, {"name": "Gefei Cai"}, {"name": "Jesper Lykke Jacobsen"}, {"name": "Rongvoram Nivesvivat"}, {"name": "Paul Roux"}, {"name": "Xin Sun"}, {"name": "Baojun Wu"}], "featured_authors": [{"name": "Morris Ang"}, {"name": "Gefei Cai"}, {"name": "Jesper Lykke Jacobsen"}, {"name": "Paul Roux"}, {"name": "Xin Sun"}, {"name": "Baojun Wu"}], "author_count": 7}, {"id": "2604.05582", "category": "cond-mat", "title": "Grassmann corner transfer-matrix renormalization group approach to one-dimensional fermionic models", "abstract": "The strongly correlated fermions play a vital role in modern physics. For a given fermionic Hamiltonian system, the most widely used approach to explore the underlying physics is to study the wave function that incorporates Fermi-Dirac statistics, which can be obtained variationally by energy minimization or by imaginary-time evolution. In this work, we develop an accurate tensor network method for one-dimensional interacting fermionic models based on the coherent-state path-integral representation of the fermionic partition function. Employing the coherent-state representation, the partition function is effectively represented as a (1+1)-dimensional anisotropic Grassmann-valued tensor network, and the Grassmann version of the corner transfer-matrix renormalization group algorithm is developed to contract the tensor network and evaluate physical quantities. We validate our method in the one-dimensional fermionic Hubbard model with a magnetic field, where the essential features of the phase diagram in the $(\\mu, B)$ plane are quantitatively captured. Our work offers a promising approach to interacting fermionic models within the framework of tensor networks.", "url": "https://arxiv.org/abs/2604.05582", "type": "理论+数值", "summary": "强相关费米子在现代物理学中发挥着至关重要的作用。对于给定的费米子哈密顿系统，探索底层物理的最广泛使用的方法是研究结合了费米-狄拉克统计的波函数，可以通过能量最小化或虚时间演化来变分地获得。在这项工作中，我们基于费米子配分函数的相干态路径积分表示，为一维相互作用费米子模型开发了一种精确的张量网络方法。采用相干态表示，将配分函数有效地表示为(1+1)维各向异性格拉斯曼值张量网络，并开发了格拉斯曼版本的角转移矩阵重整化群算法来收缩张量网络并评估物理量。我们在带有磁场的一维费米子哈伯德模型中验证了我们的方法，其中定量捕获了 $(\\mu, B)$ 平面中相图的基本特征。我们的工作提供了一种在张量网络框架内交互费米子模型的有前景的方法。", "authors": [{"name": "Jian-Gang Kong"}, {"name": "Zhi Yuan Xie"}], "featured_authors": [{"name": "Jian-Gang Kong"}, {"name": "Zhi Yuan Xie"}], "author_count": 2}, {"id": "2604.05585", "category": "cond-mat", "title": "Shortcuts to state transitions for active matter", "abstract": "Shortcut schemes can accelerate quasi-static processes in passive systems by adding auxiliary controls to realize swift transitions between equilibrium states. In active systems, however, inherently directed motion driven by free energy consumption continually drives the system away from equilibrium. In this work, we develop a shortcut framework to realize swift state transitions for active systems operating in the weak activity regime. An auxiliary potential is introduced to guide the system along a predefined distribution path, allowing it to reach the target state within a finite time. Considering unavoidable energy cost in such a finite-time process, we derive a thermodynamic metric from the dissipative work to induce a Riemann manifold on the space spanned by the control parameters. The optimal protocol with minimum dissipative work is then identical to the geodesic path in the geometric space. We demonstrate this framework by considering active systems confined in an external harmonic trap and interacting via two distinct internal potentials, respectively: an attractive harmonic coupling and a repulsive pairwise Gaussian-core coupling. The strengths of both the external trap and the internal interactions are controllable. For the latter case, since the auxiliary potential can not be derived precisely, we adopt a variational method to obtain an approximate auxiliary control. Compared to linear protocols, the geodesic protocols can effectively reduce dissipation.", "url": "https://arxiv.org/abs/2604.05585", "type": "数值", "summary": "捷径方案可以通过添加辅助控制来加速无源系统中的准静态过程，以实现平衡状态之间的快速转变。然而，在主动系统中，由自由能消耗驱动的固有定向运动不断使系统偏离平衡。在这项工作中，我们开发了一个快捷框架，以实现在弱活动状态下运行的活动系统的快速状态转换。引入辅助势来引导系统沿着预定义的分布路径，使其在有限时间内达到目标状态。考虑到这种有限时间过程中不可避免的能量成本，我们从耗散功中推导出热力学度量，以在控制参数所跨越的空间上引入黎曼流形。具有最小耗散功的最佳协议与几何空间中的测地路径相同。我们通过考虑被限制在外部谐波陷阱中并分别通过两个不同的内部势相互作用的有源系统来演示该框架：有吸引力的谐波耦合和排斥的成对高斯核心耦合。\n\n外部陷阱和内部相互作用的强度都是可控的。对于后一种情况，由于无法精确推导辅助势，我们采用变分法来获得近似的辅助控制。与线性协议相比，测地线协议可以有效减少耗散。", "authors": [{"name": "Guodong Cheng"}, {"name": "Z. C. Tu"}, {"name": "Geng Li"}], "featured_authors": [{"name": "Guodong Cheng"}, {"name": "Z. C. Tu"}, {"name": "Geng Li"}], "author_count": 3}, {"id": "2604.05592", "category": "cond-mat", "title": "Taylor dispersion in a soft channel", "abstract": "Diffusion of a solute along a channel is enhanced by hydrodynamic flow, a phenomenon known as Taylor dispersion. In microfluidic applications, the compliance of the channel boundaries modifies the hydrodynamic flow and thus solutal transport. Here, we develop the theory of solutal dispersion in a soft, axisymmetric channel where the channel walls respond to the hydrodynamic pressure through a Winkler response. By deriving the modified macro-transport equation for the solutal concentration dynamics based on multiple-time-scale analysis, we explore the influence of softness on solutal transport for steady and pulsatile configurations. Our main finding is that softness enhances the effective advection velocity and dispersion coefficient, which might have practical implication in biology and microfluidic technology.", "url": "https://arxiv.org/abs/2604.05592", "type": "理论", "summary": "流体动力流动增强了溶质沿通道的扩散，这种现象称为泰勒色散。在微流体应用中，通道边界的顺应性改变了流体动力流动，从而改变了溶液传输。在这里，我们发展了软轴对称通道中的溶质分散理论，其中通道壁通过温克勒响应对流体动力压力做出响应。通过基于多时间尺度分析推导溶液浓度动力学的修正宏观输运方程，我们探讨了柔软度对稳态和脉动构型的溶液输运的影响。我们的主要发现是柔软度提高了有效平流速度和分散系数，这可能在生物学和微流体技术中具有实际意义。", "authors": [{"name": "Aditya Jha"}, {"name": "Masoodah Gunny"}, {"name": "Joshua D Mcgraw"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "featured_authors": [{"name": "Aditya Jha"}, {"name": "Masoodah Gunny"}, {"name": "Joshua D Mcgraw"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "author_count": 5}, {"id": "2604.05619", "category": "cond-mat", "title": "Two-Dimensional Space-Time Groups: Classification and Applications", "abstract": "The concept of space group has long served as the fundamental framework to describe the physical properties of crystalline materials, from electronic bands to photonic dispersions. The recent progress of spatiotemporal control, such as laser-driven lattices, dynamic photonic and phononic crystals, and dynamic optical lattices, necessitates the study of a new framework, space-time group, beyond that based on the Floquet theorem. Space-time group includes novel intertwined non-symmorphic spatial-temporal symmetries such as time-glide reflection and time-screw rotation. Here, we perform a complete classification of the 2+1D space-time groups based on the method of group cohomology, leading to the identification of all 275 space-time crystals, including 203 non-symmorphic ones. Under this formalism, unique physical phenomena are uncovered: A chirality-selective response rule with specific space-time symmetry is fully investigated and a novel ``horizontal cone\" structure is predicted in space-time metamaterials as a direct consequence of non-symmorphic space-time symmetry. This work serves as a starting point for predicting and engineering a wide range of novel spatiotemporal phenomena across condensed matter and metamaterials.", "url": "https://arxiv.org/abs/2604.05619", "type": "理论", "summary": "空间群的概念长期以来一直是描述晶体材料物理性质（从电子能带到光子色散）的基本框架。时空控制的最新进展，如激光驱动晶格、动态光子和声子晶体以及动态光学晶格，需要研究基于 Floquet 定理之外的新框架——时空群。时空群包括新颖的交织非对称时空对称性，例如时间滑行反射和时间螺旋旋转。在这里，我们基于群上同调的方法对2+1D时空群进行了完整的分类，识别出了全部275个时空晶体，其中包括203个非对称时空晶体。在这种形式主义下，独特的物理现象被揭示：具有特定时空对称性的手性选择性响应规则被充分研究，并且在时空超材料中预测了一种新颖的“水平锥体”结构，作为非对称时空对称性的直接结果。\n\n这项工作是预测和设计跨凝聚态物质和超材料的各种新颖时空现象的起点。", "authors": [{"name": "Chenhang Ke"}, {"name": "Congjun Wu"}], "featured_authors": [{"name": "Chenhang Ke"}, {"name": "Congjun Wu"}], "author_count": 2}, {"id": "2604.05705", "category": "cond-mat", "title": "Bias controlled Interlayer Exchange Coupling", "abstract": "We demonstrate, using computer simulations and a non-equilibrium Greens function approach, that the sign of the out-of-equilibrium interlayer exchange coupling (ooeIEC) can change in the presence of an externally applied electrical bias. Our system consists of an insulating section connected to an exchange coupled ferromagnetic (FM) tri-layer, sandwiched between semi-infinite leads. When the exchange coupled trilayer contains a quantum-well state confined in the hybridisation gap (HG) of the FM, we find that a relatively small applied electrical bias can switch the lowest energy state of the tri-layer between parallel (P) and anti-parallel (AP) configurations. We consider three cases for the insulating section; a single tunnelling barrier, a resonant tunnelling barrier and an amorphous insulating barrier and, in each case, show that the bias dependence of the ooeIEC is strongly dependent on the system conductance. We find that the lowest switching current densities are achieved with strongly confined quantum well states.", "url": "https://arxiv.org/abs/2604.05705", "type": "理论+数值", "summary": "我们使用计算机模拟和非平衡格林函数方法证明，在存在外部施加电偏压的情况下，非平衡层间交换耦合（ooeIEC）的符号可能会发生变化。我们的系统由连接到交换耦合铁磁 (FM) 三层的绝缘部分组成，夹在半无限引线之间。当交换耦合三层包含限制在 FM 杂化能隙 (HG) 中的量子阱态时，我们发现施加相对较小的电偏压可以在平行 (P) 和反平行 (AP) 配置之间切换三层的最低能态。我们考虑绝缘部分的三种情况；单个隧道势垒、谐振隧道势垒和非晶绝缘势垒，并且在每种情况下都表明 ooeIEC 的偏置依赖性强烈依赖于系统电导。我们发现，在强限制的量子阱态下可以实现最低的开关电流密度。", "authors": [{"name": "Nathan A. Walker"}, {"name": "Alex D. Durie"}, {"name": "Andrey Umerski"}], "featured_authors": [{"name": "Nathan A. Walker"}, {"name": "Alex D. Durie"}, {"name": "Andrey Umerski"}], "author_count": 3}, {"id": "2604.05708", "category": "cond-mat", "title": "Predicted DC current induced by propagating wave in gapless Dirac materials", "abstract": "In this paper, we show that the application of propagating waves can induce a DC current even in systems with spatial inversion symmetry. We derive the equation for the DC current induced by propagating waves using two methods: perturbation theory and Floquet theory. These two approaches yield consistent results. We then apply the equation to gapless graphene subjected to propagating waves. A nonzero DC current is predicted in graphene with next nearest neighbor hopping terms. Nonperturbative effects arising from a strong wave amplitude are also discussed within the framework of Floquet theory.", "url": "https://arxiv.org/abs/2604.05708", "type": "理论", "summary": "在本文中，我们证明即使在具有空间反演对称性的系统中，传播波的应用也可以感应出直流电流。我们使用微扰理论和 Floquet 理论两种方法推导了传播波感应的直流电流方程。这两种方法产生一致的结果。然后，我们将该方程应用于传播波的无间隙石墨烯。使用下一个最近邻跳跃项预测石墨烯中的非零直流电流。强波幅产生的非微扰效应也在 Floquet 理论框架内进行了讨论。", "authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "featured_authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "author_count": 2}, {"id": "2604.05710", "category": "cond-mat", "title": "Nonperturbative effects in second harmonic generation", "abstract": "Second-harmonic generation (SHG) is a quintessential probe of inversion symmetry breaking in condensed matter. While perturbative $\\chi^{(2)}$ processes are well-documented, the nonperturbative regime under intense driving remains largely unexplored. In this Letter, we develop a nonperturbative Floquet-Keldysh theory to describe SHG in two-band systems. Our analysis reveals the emergence of two distinct types of nonperturbative saturation: a transition from the conventional $E^2$ scaling to a linear $E$ dependence, and a stronger saturation regime where the SHG response becomes independent of the field amplitude. These behaviors are analytically shown to be governed by one-photon and two-photon resonance processes, respectively. By applying our formalism to a tight-binding model of monolayer GeS, we demonstrate that these specific scaling behaviors are observable in realistic materials and are fully consistent with large-scale numerical Floquet-matrix calculations.", "url": "https://arxiv.org/abs/2604.05710", "type": "理论+数值", "summary": "二次谐波产生（SHG）是凝聚态物质中反演对称性破缺的典型探测。虽然扰动 $\\chi^{(2)}$ 过程已有详细记录，但剧烈驾驶下的非扰动状态在很大程度上仍未被探索。在这封信中，我们开发了一种非微扰 Floquet-Keldysh 理论来描述双频带系统中的 SHG。我们的分析揭示了两种不同类型的非微扰饱和的出现：从传统的 $E^2$ 缩放到线性 $E$ 依赖性的转变，以及更强的饱和状态，其中 SHG 响应变得独立于场振幅。分析表明，这些行为分别受单光子和双光子共振过程的控制。通过将我们的形式应用于单层 GeS 的紧束缚模型，我们证明了这些特定的缩放行为在现实材料中是可观察到的，并且与大规模数值 Floquet 矩阵计算完全一致。", "authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "featured_authors": [{"name": "Keisuke Kitayama"}, {"name": "Masao Ogata"}], "author_count": 2}, {"id": "2604.05722", "category": "cond-mat", "title": "Inertial chiral active Brownian particle: Transition from Gaussian to platykurtic distribution", "abstract": "We investigate the dynamics of an inertial chiral active Brownian particle in the presence of a harmonic confinement. Through numerical simulation, we observe that when the harmonic frequency becomes comparable to the chiral frequency, the position distribution transitions from a Gaussian to a platykurtic distribution, corresponding to short tails with a nearly uniform probability near the minimum of the potential. This result is further confirmed by analyzing the kurtosis of the position of the particle as a function of harmonic frequency, which exhibits a dip when the harmonic frequency matches the chiral frequency. At the same time, the steady state mean square displacement (MSD) shows a non-monotonic feature with the harmonic frequency and shows a maximum only when the harmonic frequency is of the same order as the chiral frequency. In the rotational overdamped limit of the same model, we have calculated the exact expression for kurtosis, steady state MSD and find that the qualitative behavior remains the same. Kurtosis still exhibits a dip in the matching of chiral and harmonic frequencies, but the feature is less pronounced with a higher minimum. These findings might be relevant for controlling the transport and spatial distribution of chiral microswimmers in optical or acoustic traps, where confinement can be tuned to optimize particle distribution.", "url": "https://arxiv.org/abs/2604.05722", "type": "理论+数值", "summary": "我们研究了谐波约束下惯性手性活性布朗粒子的动力学。通过数值模拟，我们观察到，当谐波频率与手征频率相当时，位置分布从高斯分布转变为平峰分布，对应于势能最小值附近具有几乎均匀概率的短尾。通过分析作为谐波频率的函数的粒子位置的峰度，进一步证实了这一结果，当谐波频率与手性频率匹配时，峰度表现出下降。同时，稳态均方位移（MSD）表现出与谐波频率的非单调特征，仅当谐波频率与手性频率同阶时才显示最大值。在同一模型的旋转过阻尼极限中，我们计算了峰度、稳态 MSD 的精确表达式，并发现定性行为保持不变。峰度在手性频率和谐波频率的匹配方面仍然表现出下降，但随着最小值的升高，该特征不太明显。\n\n这些发现可能与控制光学或声学陷阱中手性微型游泳器的传输和空间分布有关，其中可以调整限制以优化颗粒分布。", "authors": [{"name": "M Muhsin"}, {"name": "S Deion"}, {"name": "M Sahoo"}], "featured_authors": [{"name": "M Muhsin"}, {"name": "S Deion"}, {"name": "M Sahoo"}], "author_count": 3}, {"id": "2604.05772", "category": "cond-mat", "title": "Percolation in the three-dimensional Ising model", "abstract": "Geometric representations provide a useful perspective on critical phenomena in the Ising model. In a recent study [Phys. Rev. E 112, 034118 (2025)], we found that the two-dimensional critical Ising model exhibits two consecutive percolation transitions for geometric spin clusters as the bond-occupation probability $p$ between parallel spins increases. Here, through extensive Monte Carlo simulations, we show that this phenomenon does not persist in three dimensions, where we observe only a single percolation transition on critical Ising configurations. Further theoretical analysis of the Ising model on the complete graph also yields the same scenario. In addition, we study percolation on a two-dimensional layer embedded in the three-dimensional critical Ising model. For this layer system, we estimate the red-bond exponent $y_p = 0.426(6)$ and the fractal dimensions of the largest cluster, hull, and shortest path as $d_f = 1.8926(20)$, $d_{\\rm hull} = 1.663(4)$, and $d_{\\rm min} = 1.080(10)$, respectively. These values indicate a distinct universality class induced by coupling to out-of-plane critical correlations.", "url": "https://arxiv.org/abs/2604.05772", "type": "理论+数值", "summary": "几何表示为伊辛模型中的关键现象提供了有用的视角。在最近的一项研究中[物理。 Rev. E 112, 034118 (2025)]，我们发现，随着平行自旋之间的键占据概率 $p$ 的增加，二维临界 Ising 模型表现出几何自旋簇的两个连续渗流跃迁。在这里，通过广泛的蒙特卡罗模拟，我们表明这种现象在三个维度中并不持续存在，我们在三个维度中仅观察到临界伊辛构型上的单个渗流跃迁。对完整图上的伊辛模型进行进一步的理论分析也得出了相同的情况。此外，我们研究了嵌入三维临界伊辛模型的二维层上的渗透。对于该层系统，我们估计红键指数 $y_p = 0.426(6)$ 以及最大簇、外壳和最短路径的分形维数分别为 $d_f = 1.8926(20)$、$d_{\\rm hull} = 1.663(4)$ 和 $d_{\\rm min} = 1.080(10)$。这些值表明由耦合到平面外关键相关性引起的独特的普遍性类别。", "authors": [{"name": "Jinhong Zhu"}, {"name": "Tao Chen"}, {"name": "Zhiyi Li"}, {"name": "Sheng Fang"}, {"name": "Youjin Deng"}], "featured_authors": [{"name": "Jinhong Zhu"}, {"name": "Tao Chen"}, {"name": "Zhiyi Li"}, {"name": "Sheng Fang"}, {"name": "Youjin Deng"}], "author_count": 5}, {"id": "2604.05880", "category": "cond-mat", "title": "Collective spatial reorganization from arrest to peeling and migration through density-dependent mobility in internal-state coordinates", "abstract": "Numerous problems in development, regeneration, and disease involve simultaneous evolution of both spatial organization and the internal state of the constituents in addition to local interactions and crowding. This motivates us to study a minimal model for interacting populations evolving in coupled spatial and internal-state coordinates. We focus on a specific transition of particular biological interest: the reorganization of dense collectives from compact or arrested states toward boundary-led peeling and migration. In our formulation, each particle carries a spatial position and a scalar internal state, and interacts through finite-range forces. Mobilities are defined on both spatial and internal-state coordinates with a density dependence, and are asymmetrically cross-coupled. We derive update equations for stochastic dynamics in the overdamped limit and perform numerical simulations. We find that mobility in internal-state coordinates alone provides an independent control axis for large-scale spatial reorganization. In particular, increasing the baseline internal-state diffusivity and tuning its density dependence drives a transition from arrested aggregates to a peeling-like regime with broad spatial excursions, strong outward radial bias, and edge-localized activity, while the baseline positional diffusivity is held fixed. The transition is accompanied by correlated broadening of spatial and internal-state displacements, systematic reorganization of radial density and density-curvature profiles, and a pronounced dependence on system size, consistent with the idea that growing aggregates can cross into a boundary-dominated migratory state. These results establish the utility of our approach and motivate a broader framework aimed at modeling state change, spatial redistribution, and neighborhood structure within a common formalism.", "url": "https://arxiv.org/abs/2604.05880", "type": "理论+数值", "summary": "除了局部相互作用和拥挤之外，发育、再生和疾病中的许多问题还涉及空间组织和成分内部状态的同时演化。这促使我们研究在耦合空间和内部状态坐标中相互作用的群体演化的最小模型。我们关注特定生物学兴趣的特定转变：密集集体从紧凑或停滞状态到边界主导的剥落和迁移的重组。在我们的公式中，每个粒子都带有一个空间位置和一个标量内部状态，并通过有限范围的力相互作用。迁移率是在具有密度依赖性的空间坐标和内态坐标上定义的，并且是不对称交叉耦合的。我们推导出过阻尼极限下随机动力学的更新方程并进行数值模拟。我们发现，内部状态坐标的移动性本身就为大规模空间重组提供了独立的控制轴。\n\n特别是，增加基线内部态扩散率并调整其密度依赖性可驱动从捕获聚集体向具有广泛空间偏移、强向外径向偏差和边缘局部活动的剥离状状态的转变，同时基线位置扩散率保持固定。这种转变伴随着空间和内部状态位移的相关扩大、径向密度和密度曲率分布的系统重组，以及对系统大小的明显依赖，这与不断增长的聚集体可以进入边界主导的迁移状态的观点是一致的。这些结果确立了我们的方法的实用性，并激发了一个更广泛的框架，旨在在共同的形式主义中对状态变化、空间重新分配和邻里结构进行建模。", "authors": [{"name": "Yagyik Goswami"}], "featured_authors": [{"name": "Yagyik Goswami"}], "author_count": 1}, {"id": "2604.05909", "category": "cond-mat", "title": "Emergent Rotation of Passive Clusters in a Chiral Active Bath", "abstract": "We investigate the dynamics of passive particles immersed in a bath of chiral active particles, focusing on the emergence of collective rotational motion. Using numerical simulations, we show that passive particles aggregate into clusters that can exhibit persistent rotation within a well-defined regime of size ratio and active particle packing fraction. This rotational state is characterized by the coexistence of internal structural order, enhanced shape fluctuations, and a coherent net torque generated by the surrounding active bath. Outside this regime, the dynamics remain predominantly diffusive, highlighting that sustained rotation is not ubiquitous but arises from a delicate interplay between geometry, activity, and chirality. Furthermore, we demonstrate that chirality heterogeneity disrupts rotational coherence, while a uniform chiral bath promotes strongly superdiffusive angular dynamics. These results provide new insights into the role of chirality and collective interactions in shaping the emergent behavior of active-passive mixtures.", "url": "https://arxiv.org/abs/2604.05909", "type": "理论+数值", "summary": "我们研究了浸入手性活性粒子浴中的被动粒子的动力学，重点关注集体旋转运动的出现。通过数值模拟，我们表明被动颗粒聚集成簇，可以在明确的尺寸比和活性颗粒堆积分数范围内表现出持续旋转。这种旋转状态的特点是内部结构秩序、增强的形状波动以及周围活性浴产生的连贯净扭矩并存。在这个范围之外，动力学仍然主要是扩散的，这凸显出持续的旋转并不普遍存在，而是源于几何、活动和手性之间的微妙相互作用。此外，我们证明手性异质性会破坏旋转相干性，而均匀的手性浴会促进强烈的超扩散角动力学。这些结果为手性和集体相互作用在塑造主动-被动混合物的涌现行为中的作用提供了新的见解。", "authors": [{"name": "Divya Kushwaha"}, {"name": "Abhra Puitandy"}, {"name": "Shradha Mishra"}], "featured_authors": [{"name": "Divya Kushwaha"}, {"name": "Abhra Puitandy"}, {"name": "Shradha Mishra"}], "author_count": 3}, {"id": "2604.05918", "category": "cond-mat", "title": "Long distance attraction between particles in a soap film", "abstract": "Millimeter-sized particles trapped at the surface of a liquid bath attract each other through the deformation of the liquid-air interface, a phenomenon known as \"the Cheerios effect\". We consider here a situation similar at first sight: the interaction between two millimeter-sized particles trapped in an horizontal soap film. In this geometry, the deformation of the film due to the weight of one particle extends over the entire system size, which induces an extremely long-ranged attraction. Combined with the low viscous friction in the film, this leads to intricate particle orbits, lasting up to ten seconds before the two particles eventually collide. By tracking the particles dynamics, we measure the force exerted by each particle on the other, and we develop a theoretical model. Because the interface deformation induced by a particle depends on its position in the soap film, the attractive force has two features that fundamentally depart from classical interaction forces. The force exerted by one particle on the other differs both in direction and magnitude from the reverse interaction, with an asymmetry reaching 150% when one particle is close to the center and the other one close to the frame. Reciprocity is recovered when both particles are close to the film center. These results are a original example of non-reciprocal effective interactions due to boundary conditions.", "url": "https://arxiv.org/abs/2604.05918", "type": "理论", "summary": "捕获在液浴表面的毫米级颗粒通过液-气界面的变形相互吸引，这种现象被称为“Cheerios 效应”。我们在这里考虑乍一看类似的情况：水平肥皂膜中捕获的两个毫米大小的颗粒之间的相互作用。在这种几何结构中，由于一个粒子的重量而导致的薄膜变形延伸到整个系统尺寸，从而产生极长距离的吸引力。再加上薄膜中的低粘性摩擦，这导致了复杂的粒子轨道，在两个粒子最终碰撞之前持续长达十秒。通过跟踪粒子动力学，我们测量每个粒子对另一个粒子施加的力，并开发一个理论模型。由于颗粒引起的界面变形取决于其在皂膜中的位置，因此吸引力具有两个从根本上背离经典相互作用力的特征。\n\n一个粒子对另一个粒子施加的力与反向相互作用在方向和大小上都不同，当一个粒子靠近中心而另一个粒子靠近框架时，不对称性达到 150%。当两个粒子都靠近薄膜中心时，互易性恢复。这些结果是边界条件导致的非互易有效相互作用的原始示例。", "authors": [{"name": "Youna Louyer"}, {"name": "Megan Delens"}, {"name": "Nicolas Vandewalle"}, {"name": "Benjamin Dollet"}, {"name": "Isabelle Cantat"}, {"name": "Anaïs Gauthier"}], "featured_authors": [{"name": "Youna Louyer"}, {"name": "Megan Delens"}, {"name": "Nicolas Vandewalle"}, {"name": "Benjamin Dollet"}, {"name": "Isabelle Cantat"}, {"name": "Anaïs Gauthier"}], "author_count": 6}, {"id": "2604.05925", "category": "cond-mat", "title": "Hydrodynamic Switching Fronts Polarize Deformable Particle Trains", "abstract": "We show that propagating switching fronts mediate directional state transmission and polarity selection in a passive many-body suspension. In confined trains of slipper-shaped deformable particles in Poiseuille flow, this behavior originates from directionally biased switching between neighboring particles: owing to the fore-aft asymmetry of the slipper, an upstream particle drives switching of its downstream neighbor more effectively than in the reverse direction. A local transition from an opposite-sign pair to a same-sign pair therefore launches a streamwise front that relays the inclination sign from particle to particle. A minimal coarse-grained model with local bistability and directional coupling captures front propagation and arrest. In periodic trains, the fronts coarsen into a uniformly polarized state, whereas in long open trains they arrest and leave persistent polarized domains. Our results point to local bistability and directional coupling as a route to collective polarization in passive many-body systems.", "url": "https://arxiv.org/abs/2604.05925", "type": "理论", "summary": "我们表明，传播切换前沿介导被动多体悬架中的定向状态传输和极性选择。在泊肃叶流中受限的拖鞋形可变形粒子序列中，这种行为源于相邻粒子之间的方向偏置切换：由于拖鞋的前后不对称性，上游粒子比相反方向更有效地驱动其下游邻居的切换。因此，从相反符号对到相同符号对的局部转变会启动一个流向前沿，将倾斜符号从一个粒子传递到另一个粒子。具有局部双稳态和方向耦合的最小粗粒度模型捕获前向传播和阻止。在周期性列车中，锋面粗化为均匀极化状态，而在长开放列车中，它们捕获并留下持续的极化域。我们的结果表明局部双稳态和定向耦合是无源多体系统中集体极化的途径。", "authors": [{"name": "Linzheng Huang"}, {"name": "Hengdi Zhang"}, {"name": "Zaicheng Zhang"}, {"name": "Zaiyi Shen"}], "featured_authors": [{"name": "Linzheng Huang"}, {"name": "Hengdi Zhang"}, {"name": "Zaicheng Zhang"}, {"name": "Zaiyi Shen"}], "author_count": 4}, {"id": "2604.05928", "category": "cond-mat", "title": "Quantum phases in the interacting generalized Su-Schrieffer-Heeger model", "abstract": "We investigate the quantum phases of a half-filled generalized interacting Su-Schrieffer-Heeger model with intracell, nearest-neighbor, and next-nearest-neighbor intercell hoppings, together with an on-site inter-sublattice interaction. In the noninteracting limit, the model hosts one topologically trivial phase and two symmetry-protected topological (SPT) phases, distinguished under periodic boundary conditions by different winding numbers and under open boundary conditions by two-fold and four-fold entanglement-spectrum degeneracies, respectively. When interactions are introduced, these free-fermion SPT phases evolve into distinct interacting topological phases that retain characteristic signatures such as entanglement-spectrum degeneracy structures, boundary modes, and nonzero string order parameters. For strong repulsive interactions, a symmetry-breaking phase with unequal but spatially uniform sublattice densities appears between the trivial and topological regimes. For strong attractive interactions, period-2 and period-4 charge-density-wave phases emerge from particle clustering. At intermediate attractive interactions, the competition between interaction-induced localization and hopping-induced delocalization gives rise to a Luttinger liquid phase, a paired Luttinger liquid phase, and a gapless symmetry-protected topological (gSPT) phase. The gSPT phase is characterized by a gapless charge mode together with symmetry-protected current-carrying edge states. We further characterize the gapless phases and the associated quantum phase transitions through central charges and critical exponents.", "url": "https://arxiv.org/abs/2604.05928", "type": "理论", "summary": "我们研究了半填充广义相互作用 Su-Schrieffer-Heeger 模型的量子相，该模型具有单元内、最近邻居和次最近邻居单元间跳跃，以及现场亚晶格间相互作用。在非相互作用极限下，该模型包含一个拓扑平凡相和两个对称保护拓扑（SPT）相，分别在周期性边界条件下通过不同的绕数进行区分，在开放边界条件下通过两倍和四倍纠缠谱简并进行区分。当引入相互作用时，这些自由费米子 SPT 相演变成不同的相互作用拓扑相，这些拓扑相保留了诸如纠缠谱简并结构、边界模式和非零弦序参数等特征特征。对于强排斥相互作用，在平凡状态和拓扑状态之间出现具有不等但空间均匀的亚晶格密度的对称破缺相。对于强吸引力相互作用，粒子聚集会产生周期 2 和周期 4 的电荷密度波相。\n\n在中间吸引相互作用下，相互作用引起的局域化和跳跃引起的离域之间的竞争产生了路廷格液相、配对路廷格液相和无间隙对称保护拓扑（gSPT）相。 gSPT 阶段的特点是无间隙充电模式以及对称保护的载流边缘状态。我们通过中心电荷和临界指数进一步表征无间隙相和相关的量子相变。", "authors": [{"name": "Jing-Hua Niu"}, {"name": "Jia-Lin Liu"}, {"name": "Ke Wang"}, {"name": "Shan-Wen Tsai"}, {"name": "Jin Zhang"}], "featured_authors": [{"name": "Jing-Hua Niu"}, {"name": "Jia-Lin Liu"}, {"name": "Ke Wang"}, {"name": "Shan-Wen Tsai"}, {"name": "Jin Zhang"}], "author_count": 5}, {"id": "2604.05951", "category": "cond-mat", "title": "Lattice location of ion-implanted 6He in diamond", "abstract": "We report on the lattice location of the short-lived ion implanted nuclear probe 6He (t1/2=807 ms) in diamond, which was performed using the beta emission channeling method at CERN's ISOLDE facility. 6He was implanted with 30 keV into a single-crystalline artificial diamond sample kept at a temperature ranging from 30 deg C up to 800 deg C. By means of comparing the measured emission channeling patterns along different crystallographic directions with simulated yields for a variety of possible sites, we conclude that the implanted 6He occupies tetrahedral (T) interstitial sites, in agreement with theoretical predictions that T sites should be the preferred position of He in diamond. Implantation at 800 deg C resulted in a drop in the tetrahedral interstitial fraction by 20%, which we interpret as the onset of diffusion, 6He thus being able to change to lattice sites of low crystallographic symmetry, or reach the surface of the sample or escape to the bulk during its lifetime. We estimate the activation energy for interstitial migration of He to be around 1.63-2.89 eV, which agrees with theoretical predictions of 1.41 eV, 1.97 eV, 2.35 eV and 2.36 eV from the literature. Activation energies around 2 eV would mean that simple interstitial He cannot be stable in diamond on geological time scales, thus to remain inside, it should be bound to some defect in the material or exist in another form such as within inclusions of other minerals or liquids, or possibly small He bubbles.", "url": "https://arxiv.org/abs/2604.05951", "type": "理论", "summary": "我们报告了短寿命离子注入核探针 6He (t1/2=807 ms) 在金刚石中的晶格位置，该位置是在 CERN 的 ISOLDE 设施中使用 β 发射沟道方法进行的。将 6He 以 30 keV 的电压注入温度范围为 30 ℃ 至 800 ℃ 的单晶人造金刚石样品中。通过将沿不同晶体方向测量的发射沟道模式与各种可能位点的模拟产率进行比较，我们得出结论，注入的 6He 占据四面体 (T) 间隙位点，这与理论预测一致，即 T 位点应该是 He 在金刚石中的首选位置。在 800 摄氏度下注入导致四面体间隙分数下降 20%，我们将其解释为扩散的开始，因此 6He 能够改变到低晶体对称性的晶格位置，或到达样品表面或在其寿命期间逸出到本体中。我们估计 He 间隙迁移的活化能约为 1.63-2.89 eV，这与文献中 1.41 eV、1.97 eV、2.35 eV 和 2.36 eV 的理论预测一致。\n\n活化能约为 2 eV 意味着简单的填隙 He 在地质时间尺度上无法在钻石中保持稳定，因此为了留在钻石内部，它应该与材料中的某些缺陷结合在一起或以其他形式存在，例如在其他矿物或液体的包裹体中，或者可能以小 He 气泡存在。", "authors": [{"name": "U. Wahl"}, {"name": "J.G. Correia"}, {"name": "A. Costa"}, {"name": "B. Biesmans"}, {"name": "G. Magchiels"}, {"name": "S.M. Tunhuma"}, {"name": "A. Lamelas"}, {"name": "A. Vantomme"}, {"name": "L.M.C. Pereira"}, {"name": "ISOLDE Collaboration"}], "featured_authors": [{"name": "U. Wahl"}, {"name": "J.G. Correia"}, {"name": "A. Costa"}, {"name": "A. Vantomme"}, {"name": "L.M.C. Pereira"}, {"name": "ISOLDE Collaboration"}], "author_count": 10}, {"id": "2604.05997", "category": "cond-mat", "title": "Numerically Exact Study of Flat-Band Superconductivity", "abstract": "Current theories of high-temperature superconductivity in flat-band syste
