ed, however attaining improved uncertainties by the use of squeezing has not been explored. Here, we apply an effective Hamiltonian framework to the problem of ranging with quantum frequency combs in order to derive the associated precision bounds for distance estimation. We analyse the role of intensity anti-squeezing and temporal beam shaping, and find that quantum solutions may be appealing mostly for short-distance applications.", "url": "https://arxiv.org/abs/2604.05107", "type": "理论", "summary": "光学频率梳结合了超短脉冲持续时间和相位稳定性，使其成为高精度测距的强大资源，即使受到大气色散的影响也是如此。已经确定，通过经典模态工程和 mdoe 敏感的检测灵敏度可以达到标准极限的距离，但是尚未探索通过使用挤压来提高不确定性。在这里，我们将有效的哈密顿框架应用于量子频率梳的测距问题，以便导出距离估计的相关精度范围。我们分析了强度抗挤压和时间光束整形的作用，发现量子解决方案可能对短距离应用最有吸引力。", "authors": [{"name": "Mylenne Manrique"}, {"name": "Ilaria Gianani"}, {"name": "Marco Barbieri"}, {"name": "Valentina Parigi"}, {"name": "Nicolas Treps"}], "featured_authors": [{"name": "Mylenne Manrique"}, {"name": "Ilaria Gianani"}, {"name": "Marco Barbieri"}, {"name": "Valentina Parigi"}, {"name": "Nicolas Treps"}], "author_count": 5}, {"id": "2604.05126", "category": "quant-ph", "title": "In-Situ Simultaneous Magic State Injection on Arbitrary CSS qLDPC Codes", "abstract": "Quantum low-density parity-check (qLDPC) codes can encode many logical qubits within a single code block at low physical qubit overhead, yet magic state injection into such codes remains largely underexplored. Existing state injection proposals for qLDPC codes predominantly follow an external prepare-and-transfer paradigm, in which raw magic states are prepared outside the target code block and subsequently injected via inter-code operations. We propose the first \\emph{in-situ} magic state injection: a scheme in which logical magic states are directly prepared within a qLDPC memory block, only using resources required for syndrome extraction. We show that our scheme is generalizable to any CSS qLDPC code, with examples of circuit-level simulations on the $[[144,12,12]]$ Bivariate Bicycle (BB) code and the $[[225,9,4]]$ Hypergraph Product code. We focus on a regime where correlated injection errors are negligible. In the BB code, this corresponds to a configuration that simultaneously injects four logical $|Y\\rangle$ states. Under a uniform depolarizing noise model with physical error rate $10^{-3}$, this achieves an injection error rate of $1.62 \\times 10^{-3}$ per logical qubit, while the correlated-error contribution is only $2 \\times 10^{-5}$ per logical qubit (about $1\\%$ of the injection error rate). Under a hardware-motivated asymmetric noise model where single-qubit gate errors are $10\\%$ of two-qubit gate errors, the injection error rate per logical qubit falls to $ 6.7 \\times 10^{-4} $, below the error rate ($ 10^{-3} $) of the two-qubit gates used to encode the magic states. Its simplicity allows our scheme to be applied to arbitrary CSS qLDPC codes using only the ancilla qubits native to syndrome extraction, and yield a reduction in space overhead relative to both prepare-and-transfer approaches and surface-code-based magic state injection schemes.", "url": "https://arxiv.org/abs/2604.05126", "type": "理论+数值", "summary": "量子低密度奇偶校验 (qLDPC) 代码可以以较低的物理量子位开销在单个代码块内编码许多逻辑量子位，但向此类代码中注入魔术状态在很大程度上仍未得到充分探索。 qLDPC 代码的现有状态注入建议主要遵循外部准备和传输范例，其中原始魔术状态在目标代码块外部准备，然后通过代码间操作注入。我们提出了第一个\\emph{原位}魔术状态注入：一种在 qLDPC 内存块内直接准备逻辑魔术状态的方案，仅使用校正子提取所需的资源。我们证明我们的方案可推广到任何 CSS qLDPC 代码，并以 $[[144,12,12]]$ 双变量 Bicycle (BB) 代码和 $[[225,9,4]]$ 超图产品代码的电路级模拟为例。我们关注的是相关注入误差可以忽略不计的制度。在 BB 代码中，这对应于同时注入四个逻辑 $|Y\\rangle$ 状态的配置。\n\n在物理错误率为 $10^{-3}$ 的均匀去极化噪声模型下，每个逻辑量子位的注入错误率为 $1.62 \\times 10^{-3}$，而相关错误贡献仅为每个逻辑量子位 $2 \\times 10^{-5}$（大约为 $1\\%$ 的注入错误率）。在硬件驱动的非对称噪声模型下，单量子位门错误是两量子位门错误的 $10\\%$，每个逻辑量子位的注入错误率降至 $ 6.7 \\times 10^{-4} $，低于用于编码魔法状态的两量子位门的错误率 ($ 10^{-3} $)。它的简单性使得我们的方案能够仅使用校正子提取所固有的辅助量子位应用于任意CSS qLDPC代码，并且相对于准备和传输方法以及基于表面代码的魔法状态注入方案减少了空间开销。", "authors": [{"name": "Kun Liu"}, {"name": "Shifan Xu"}, {"name": "Tomas Jochym-O'Connor"}, {"name": "Zhiyang He"}, {"name": "Shraddha Singh"}, {"name": "Yongshan Ding"}], "featured_authors": [{"name": "Kun Liu"}, {"name": "Shifan Xu"}, {"name": "Tomas Jochym-O'Connor"}, {"name": "Zhiyang He"}, {"name": "Shraddha Singh"}, {"name": "Yongshan Ding"}], "author_count": 6}, {"id": "2604.05133", "category": "quant-ph", "title": "Tight Quantum Lower Bound for k-Distinctness", "abstract": "In this paper, we introduce a new quantum query lower bound framework. It is inspired by Zhandry's compressed oracle technique, but it also subsumes the polynomial method as a special case. Compared to Zhandry's technique, our approach has two key differences. First, we do not use any oracles (except for the standard input oracle), and define ``knowledge'' directly through the expansion of the state of the algorithm in the Fourier basis. Second, we allow arbitrary probability distributions of inputs. We show how this framework behaves on the problem of finding equal elements in the input string. In particular, we demonstrate its power by proving a first tight quantum query lower bound for the k-Distinctness problem.", "url": "https://arxiv.org/abs/2604.05133", "type": "理论+数值", "summary": "在本文中，我们介绍了一种新的量子查询下界框架。它的灵感来自于 Zhandry 的压缩预言技术，但它也将多项式方法作为一个特例。与 Zhandry 的技术相比，我们的方法有两个关键区别。首先，我们不使用任何预言机（标准输入预言机除外），直接通过算法状态在傅立叶基础上的展开来定义“知识”。其次，我们允许输入的任意概率分布。我们展示了该框架如何处理在输入字符串中查找相等元素的问题。特别是，我们通过证明 k-Distinctness 问题的第一个严格量子查询下界来展示其威力。", "authors": [{"name": "Aleksandrs Belovs"}], "featured_authors": [{"name": "Aleksandrs Belovs"}], "author_count": 1}, {"id": "2604.05170", "category": "quant-ph", "title": "Star product for qubit states in phase space and star exponentials", "abstract": "In this paper, we formulate the phase space description of qubit systems using coadjoint orbits of $SU(2)$ and the Stratonovich-Weyl correspondence, yielding a deformation quantization on the sphere. The resulting star product reproduces the operator algebra of complexified quaternions and its antisymmetric part induces the Lie-Poisson structure associated with the Kirillov-Kostant-Souriau symplectic form. We show that quantum dynamics can be expressed entirely in phase space through star exponentials of Hamiltonian symbols, leading to an explicit representation of the propagator. Further, we establish the equivalence between the coherent-state path integral formulation on $S^2$ and the algebraic description in terms of star exponentials. Some examples illustrating the construction of the star-exponential functions and the resulting Poisson structure are included.", "url": "https://arxiv.org/abs/2604.05170", "type": "理论", "summary": "在本文中，我们使用 $SU(2)$ 的共伴轨道和 Stratonovich-Weyl 对应关系制定了量子位系统的相空间描述，从而产生了球体上的变形量化。所得的星积再现了复四元数的算子代数，其反对称部分引入了与基里洛夫-科斯坦特-苏里奥辛形式相关的李-泊松结构。我们证明量子动力学可以通过哈密顿符号的星指数完全在相空间中表达，从而得到传播子的显式表示。此外，我们建立了 $S^2$ 上的相干态路径积分公式与星指数的代数描述之间的等价性。其中包括一些说明星型指数函数的构造和所得泊松结构的示例。", "authors": [{"name": "Jasel Berra-Montiel"}, {"name": "Alberto Molgado"}, {"name": "Mar Sánchez-Córdova"}], "featured_authors": [{"name": "Jasel Berra-Montiel"}, {"name": "Alberto Molgado"}, {"name": "Mar Sánchez-Córdova"}], "author_count": 3}, {"id": "2604.05218", "category": "quant-ph", "title": "Quantum Hilbert Space Fragmentation and Entangled Frozen States", "abstract": "We find that rank deficiency of the local Hamiltonian in a classically fragmented model is the key mechanism leading to quantum Hilbert space fragmentation. The rank deficiency produces local null directions that can generate entangled frozen states (EFS): entangled states embedded in mobile classical Krylov sectors that do not evolve under Hamiltonian dynamics. When the entangled frozen subspace is non-empty, the mobile classical sector splits into an mobile quantum Krylov subspace and an entangled frozen subspace, and the model exhibits quantum fragmentation. We establish this mechanism in four models of increasing symmetry structure: an asymmetric qubit projector with no symmetry, the $\\mathbb{Z}_2$-symmetric GHZ projector, a $\\mathbb{Z}_3$-symmetric cyclic qutrit projector, and the Temperley-Lieb model. For the asymmetric and GHZ projector models, we obtain closed-form expressions for irreducible Krylov dimensions, degeneracies, and sector multiplicities. Further, we introduce the notion of weak and strong quantum fragmentation, the quantum counterpart of the weak-strong distinction in classical fragmentation. After removing the EFS, the mobile quantum Krylov subspace decomposes into irreducible blocks. In the weak case, the number of irreducible blocks remains $\\mathcal{O}(1)$, each is individually ergodic with Gaussian Orthogonal Ensemble (GOE) level statistics, and the unresolved spectrum follows an $m$GOE distribution. In the strong case, the number of irreducible blocks grows with system size, and the gap-ratio distribution approaches Poisson as $L\\to\\infty$.", "url": "https://arxiv.org/abs/2604.05218", "type": "理论+数值", "summary": "我们发现经典碎片模型中局部哈密顿量的秩不足是导致量子希尔伯特空间碎片的关键机制。秩缺陷产生局部零方向，可以产生纠缠冻结态（EFS）：嵌入在移动经典克雷洛夫扇区中的纠缠态，在哈密顿动力学下不会演化。当纠缠冻结子空间非空时，移动经典扇区分裂为移动量子克雷洛夫子空间和纠缠冻结子空间，模型表现出量子碎片。我们在增加对称性结构的四种模型中建立了这种机制：没有对称性的非对称量子位投影仪、$\\mathbb{Z}_2$-对称GHZ投影仪、$\\mathbb{Z}_3$-对称循环qutrit投影仪和Temperley-Lieb模型。对于非对称和 GHZ 投影模型，我们获得了不可约 Krylov 维数、简并性和扇区多重性的封闭式表达式。此外，我们引入了弱量子碎片和强量子碎片的概念，这是经典碎片中弱强区别的量子对应物。\n\n去除 EFS 后，移动量子 Krylov 子空间分解为不可约块。在弱情况下，不可约块的数量仍然是 $\\mathcal{O}(1)$，每个块都单独遍历高斯正交系综 (GOE) 级别的统计数据，并且未解析的谱遵循 $m$GOE 分布。在强情况下，不可约块的数量随着系统规模的增加而增长，间隙比分布接近泊松$L\\to\\infty$。", "authors": [{"name": "Zihan Zhou"}, {"name": "Tian-Hua Yang"}, {"name": "Bo-Ting Chen"}], "featured_authors": [{"name": "Zihan Zhou"}, {"name": "Tian-Hua Yang"}, {"name": "Bo-Ting Chen"}], "author_count": 3}, {"id": "2604.05325", "category": "quant-ph", "title": "Noise is not always detrimental: the capacity of quantum batteries is enhanced in black holes", "abstract": "Quantum battery capacity, as a critical metric for quantifying energy storage and release in quantum systems, exhibits complex behaviors in curved spacetime and noisy environments. This study focuses on bipartite mixed state, aiming to explore the modulation of quantum battery capacity by Hawking radiation and environmental noise. We find a counterintuitive phenomenon that Hawking radiation can enhance battery capacity, exerting a positive influence on energy storage, a result that stands in stark contrast to the detrimental effects typically associated with entanglement and coherence. When a quantum battery is simultaneously subjected to environmental noise and Hawking radiation, its capacity generally degrades, with the extent of degradation depending on the type of noise. The charging and discharging behaviors largely follow the same patterns observed in the noiseless scenario; however, under a bit flip channel with strong noise intensity, the charging-discharging pattern reverses. In the extreme case of maximum noise intensity, the capacity of the quantum battery under depolarizing noise tends to zero. The underlying physical mechanism lies in the fact that the bit flip channel disrupts the original population distribution of energy levels, thereby altering the average energy of the system and establishing a perturbative environment for bidirectional energy exchange. This differs fundamentally from the phase flip channel. These findings offer a new perspective for the theory of quantum batteries in noninertial reference frames.", "url": "https://arxiv.org/abs/2604.05325", "type": "理论", "summary": "量子电池容量作为量化量子系统中能量存储和释放的关键指标，在弯曲时空和噪声环境中表现出复杂的行为。本研究重点关注二分混合态，旨在探索霍金辐射和环境噪声对量子电池容量的调制。我们发现了一个违反直觉的现象，即霍金辐射可以增强电池容量，对能量存储产生积极影响，这一结果与通常与纠缠和相干相关的有害影响形成鲜明对比。当量子电池同时受到环境噪声和霍金辐射时，其容量通常会下降，下降的程度取决于噪声的类型。充电和放电行为很大程度上遵循无噪声场景中观察到的相同模式；然而，在具有强噪声强度的比特翻转通道下，充电-放电模式相反。在最大噪声强度的极端情况下，量子电池在去极化噪声下的容量趋于零。\n\n其潜在的物理机制在于比特翻转通道扰乱了原有的能级分布，从而改变了系统的平均能量，建立了双向能量交换的微扰环境。这与相位翻转通道有根本的不同。这些发现为非惯性参考系中的量子电池理论提供了新的视角。", "authors": [{"name": "Xukun Wang"}, {"name": "Xiaofen Huang"}, {"name": "Zhihao Ma"}, {"name": "Shao-Ming Fei"}, {"name": "Tinggui Zhang"}], "featured_authors": [{"name": "Xukun Wang"}, {"name": "Xiaofen Huang"}, {"name": "Zhihao Ma"}, {"name": "Shao-Ming Fei"}, {"name": "Tinggui Zhang"}], "author_count": 5}, {"id": "2604.05331", "category": "quant-ph", "title": "Dynamics of Entanglement in Schwarzschild Black Holes", "abstract": "To characterize the effect of Hawking radiation induced by the quantum atmosphere beyond the event horizon on entanglement, we employ concurrence as the entanglement measure for a bipartite mixed state and investigate its evolution with Hawking temperature. We find that the physically accessible concurrence decreases as the Hawking acceleration increases, whereas the physically inaccessible concurrence exhibits the opposite behavior, increasing monotonically from zero. We further establish several trade-off relations on concurrence, revealing its distribution between physically accessible and inaccessible regions. Additionally, we study the dynamics of concurrence under three types of channel noise. The results indicate that the evolution of concurrence depends on the specific noise channel: unlike the phase damping channel, sudden death of concurrence occurs in both phase flip and bit flip channels, the concurrence exhibits a certain symmetry with respect to the noise parameter during its evolution under bit flip channel noise.", "url": "https://arxiv.org/abs/2604.05331", "type": "理论", "summary": "为了表征事件视界之外的量子大气引起的霍金辐射对纠缠的影响，我们采用并发作为二分混合态的纠缠度量，并研究其随霍金温度的演化。我们发现，物理上可访问的并发数随着霍金加速度的增加而减少，而物理上不可访问的并发数则表现出相反的行为，从零单调增加。我们进一步建立了几种并发性的权衡关系，揭示了其在物理可访问和不可访问区域之间的分布。此外，我们研究了三种类型的通道噪声下的并发动态。结果表明，并发的演化取决于特定的噪声通道：与相位阻尼通道不同，并发突然死亡在相位翻转和位翻转通道中都会发生，在位翻转通道噪声下，并发的演化过程相对于噪声参数表现出一定的对称性。", "authors": [{"name": "Fang Xie"}, {"name": "Ying Yang"}, {"name": "Tinggui Zhang"}, {"name": "Xiaofen Huang"}], "featured_authors": [{"name": "Fang Xie"}, {"name": "Ying Yang"}, {"name": "Tinggui Zhang"}, {"name": "Xiaofen Huang"}], "author_count": 4}, {"id": "2604.05455", "category": "quant-ph", "title": "Another Triumph of Locality: Colliding Histories Skew Handshakes", "abstract": "From gravity to electromagnetism, apparent action at a distance has always been resolved by deeper, local explanations. Yet today, Bell's theorem is widely interpreted as the death knell for local reality. In this chapter, I present the theorem in accessible terms, examine the three main strategies that attempt to preserve hidden variables, and argue that they share a common defect: the attempt to explain the quantum from the classical rather than the other way around. In unitary quantum mechanics, classicality itself is given a quantum account, and, when the Bell scenario is formulated in the Heisenberg picture, a strictly local explanation emerges. This chapter serves as a non-technical front-end to 'Explaining Bell Locally' (Proc. R. Soc. A).", "url": "https://arxiv.org/abs/2604.05455", "type": "理论+数值", "summary": "从重力到电磁力，远距离的明显作用总是可以通过更深入的局部解释来解决。然而今天，贝尔定理被广泛解释为当地现实的丧钟。在本章中，我用易于理解的术语介绍了该定理，研究了试图保留隐藏变量的三种主要策略，并认为它们有一个共同的缺陷：试图从经典解释量子，而不是相反。在酉量子力学中，经典性本身被赋予了量子解释，并且当贝尔场景在海森堡图景中得到表述时，严格的局域解释就出现了。本章作为“本地解释贝尔”（Proc. R. Soc. A）的非技术前端。", "authors": [{"name": "Charles Alexandre Bédard"}], "featured_authors": [{"name": "Charles Alexandre Bédard"}], "author_count": 1}, {"id": "2604.05627", "category": "quant-ph", "title": "Loss-aware state space geometry for quantum variational algorithms", "abstract": "The natural gradient descent optimisation technique is an efficient optimising protocol for broad classes of classical and quantum systems that takes the underlying geometry of the parameter manifold into account by means of using either the Fisher information metric of the classical probability distribution function or the Fubini-Study tensor of the associated parametrised quantum states in the consequent update rules. Even though the natural gradient descent procedure utilises the geometry of the space of probability or states, it is, however, insensitive to the measure of parametrised distance on the space of possible outcomes when the corresponding optimising problem is considered for the expectation value of a classical or quantum observable with respect to the probability distribution or the quantum state. In this work, we introduce a generic optimising principle, where the intrinsic geometry of the space of outcomes has been taken into account suitably, either by using an ambient space construction with a base statistical manifold with the usual Fisher information metric (or the Fubini-Study tensor), where the loss hypersurface is embedded to, or by means of a first-principle construction from the overlap of nearby quantum states on the projective Hilbert space. This construction as well as a family of conformal variants yields a form of loss-aware natural gradient updates that rescale the effective step size while preserving the descent direction. We benchmark the resulting optimisers on variational quantum circuit examples and on a classical neural network task, finding that, while the standard natural gradient remains the most robust on average, the proposed conformal schemes can improve best-case convergence in favourable regimes.", "url": "https://arxiv.org/abs/2604.05627", "type": "理论+数值", "summary": "自然梯度下降优化技术是一种针对广泛类别的经典和量子系统的有效优化协议，它通过在后续更新规则中使用经典概率分布函数的 Fisher 信息度量或相关参数化量子态的 Fubini-Study 张量来考虑参数流形的基础几何形状。尽管自然梯度下降过程利用了概率或状态空间的几何形状，但是，当考虑相应的优化问题以获取关于概率分布或量子状态的经典或量子可观测量的期望值时，它对可能结果空间上的参数化距离的测量不敏感。\n\n在这项工作中，我们引入了一种通用优化原理，其中结果空间的内在几何形状已被适当考虑，或者通过使用具有基本统计流形的环境空间构造和通常的费舍尔信息度量（或富比尼研究张量），其中嵌入损失超曲面，或者通过射影希尔伯特空间上附近量子态重叠的第一原理构造。这种结构以及一系列共形变体产生了一种损失感知的自然梯度更新形式，可以在保留下降方向的同时重新调整有效步长。我们在变分量子电路示例和经典神经网络任务上对所得优化器进行了基准测试，发现虽然标准自然梯度平均而言仍然是最稳健的，但所提出的共形方案可以改善有利机制中的最佳情况收敛。", "authors": [{"name": "Ankit Gill"}, {"name": "Kunal Pal"}], "featured_authors": [{"name": "Ankit Gill"}, {"name": "Kunal Pal"}], "author_count": 2}, {"id": "2604.05637", "category": "quant-ph", "title": "Quantum Learning of Classical Correlations with continuous-domain Pauli Correlation Encoding", "abstract": "We propose a quantum machine learning framework for estimating classical covariance matrices using parameterized quantum circuits within the Pauli-Correlation-Encoding (PCE) paradigm. We introduce two quantum covariance estimators: the C-Estimator, which constructs the covariance matrix through a Cholesky factorization to enforce positive (semi)definiteness, and a computationally efficient E-Estimator, which directly estimates covariance entries from observable expectation values. We analyze the trade-offs between the two estimators in terms of qubit requirements and learning complexity, and derive sufficient conditions on regularization parameters to ensure positive (semi)definiteness of the estimators. Furthermore, we show that the barren plateau phenomenon in training the variational quantum circuit for E-estimator can be mitigated by appropriately choosing the regularization parameters in the loss function for HEA ansatz. The proposed framework is evaluated through numerical simulations using randomly generated covariance matrices. We examine the convergence behavior of the estimators, their sensitivity to low-rank assumptions, and their performance in covariance completion with partially observed matrices. The results indicate that the proposed estimators provide a robust approach for learning covariance matrices and offer a promising direction for applying quantum machine learning techniques to high-dimensional statistical estimation problems.", "url": "https://arxiv.org/abs/2604.05637", "type": "数值", "summary": "我们提出了一种量子机器学习框架，用于在泡利相关编码（PCE）范式中使用参数化量子电路来估计经典协方差矩阵。我们引入了两个量子协方差估计器：C-Estimator，它通过 Cholesky 分解构造协方差矩阵以强制正（半）定性；以及计算效率高的 E-Estimator，它直接根据可观察的期望值估计协方差条目。我们分析了两个估计器在量子位要求和学习复杂性方面的权衡，并推导出正则化参数的充分条件，以确保估计器的正（半）定性。此外，我们表明，通过适当选择 HEA ansatz 损失函数中的正则化参数，可以减轻 E 估计器训练变分量子电路中的贫瘠平台现象。所提出的框架是通过使用随机生成的协方差矩阵进行数值模拟来评估的。\n\n我们检查估计器的收敛行为、它们对低秩假设的敏感性以及它们在部分观察矩阵的协方差完成中的性能。结果表明，所提出的估计器为学习协方差矩阵提供了一种稳健的方法，并为将量子机器学习技术应用于高维统计估计问题提供了有希望的方向。", "authors": [{"name": "Vicente P. Soloviev"}, {"name": "Bibhas Adhikari"}], "featured_authors": [{"name": "Vicente P. Soloviev"}, {"name": "Bibhas Adhikari"}], "author_count": 2}, {"id": "2604.05660", "category": "quant-ph", "title": "Coherence and Imaginarity as Resources in Quantum Circuit Complexity", "abstract": "Quantum circuit complexity quantifies the minimal number of gates needed to realize a unitary transformation and plays a central role in quantum computation. In this work, we investigate the complexity of quantum circuits through coherence and imaginarity resources. We establish a lower bound on the circuit cost by the Tsallis relative $\\alpha$ entropy of cohering power, which is shown to be tighter than the one presented by Bu et al.[\\textit{Communications in Mathematical Physics} 405, no. 7 (2024):161] under restrictive conditions. As a consequence, we obtain the relationships between the circuit cost and the coherence generating power via probabilistic average in terms of skew information/relative entropy, and present explicit bounds of the circuit cost for typical quantum gates. Moreover, we derive lower bounds on the circuit cost via the imaginaring power of the circuit, induced by the Tsallis relative $\\alpha$ entropy and relative entropy. We demonstrate that imaginarity can yield nontrivial constraints on the circuit cost even when coherence-based lower bounds are zero (e.g., for the $T$ gate), which implies that imaginarity may provide advantages under certain circumstances compared with coherence. Our results may help better understand the connections between quantum resources and circuit complexity.", "url": "https://arxiv.org/abs/2604.05660", "type": "理论", "summary": "量子电路复杂性量化了实现酉变换所需的最小门数量，并在量子计算中发挥着核心作用。在这项工作中，我们通过相干性和想象力资源研究量子电路的复杂性。我们通过相聚力的 Tsallis 相对 $\\alpha$ 熵建立了电路成本的下限，该下限比 Bu 等人提出的更严格。[\\textit{数学物理中的通信} 405，第 405 页，第 405 页。 7（2024）：161]在限制性条件下。因此，我们通过偏斜信息/相对熵的概率平均获得了电路成本和相干性生成功率之间的关系，并给出了典型量子门的电路成本的明确界限。此外，我们通过由 Tsallis 相对 $\\alpha$ 熵和相对熵引起的电路想象能力得出电路成本的下限。\n\n我们证明，即使基于相干性的下界为零（例如，对于 $T$ 门），想象力也可以对电路成本产生重要的约束，这意味着与相干性相比，想象力在某些情况下可能会提供优势。我们的结果可能有助于更好地理解量子资源和电路复杂性之间的联系。", "authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Nanrun Zhou"}], "featured_authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Nanrun Zhou"}], "author_count": 3}, {"id": "2604.05675", "category": "quant-ph", "title": "The final version of a recent approach towards quantum foundation", "abstract": "In several articles, this author has advocated an alternative approach towards quantum foundation based upon a set of postulates, and based upon the notions of theoretical variables and of accessible theoretical variables. It is shown in this article that this basis can be considerably simplified. In particular, the assumption that there exists an inaccessible variable $\\phi$ such that all the accessible ones can be seen as functions of $\\phi$, can be dropped. This assumption has been difficult to motivate in the previous articles. From this, I get a simple basis for the main this http URL essential assumption is that there in the given context exist two different maximal accessible variables, what Niels Bohr would have called two complementary variables. From this, the whole Hilbert space formalism may be derived. It is also discussed in some detail how this Hilbert space should be chosen. The resulting theory is a purely mathematical theory, but it leads to qunantum mechanics by letting the variables be physical variables. Other applications of the main theory are also considered. The mathematical proofs are mostly deferred to the Appendix.", "url": "https://arxiv.org/abs/2604.05675", "type": "理论", "summary": "在几篇文章中，作者提出了一种基于一组假设并基于理论变量和可访问理论变量概念的量子基础的替代方法。本文表明，这个基础可以大大简化。特别是，可以放弃存在不可访问变量 $\\phi$ 从而所有可访问变量都可以视为 $\\phi$ 的函数的假设。这个假设在之前的文章中很难得到证实。由此，我得到了这个 http URL 基本假设的一个简单基础：在给定的上下文中存在两个不同的最大可访问变量，尼尔斯·玻尔（Niels Bohr）将其称为两个互补变量。由此，可以推导出整个希尔伯特空间形式主义。还详细讨论了如何选择希尔伯特空间。由此产生的理论是一个纯粹的数学理论，但它通过让变量成为物理变量而引出了量子力学。还考虑了主要理论的其他应用。数学证明大多放在附录中。", "authors": [{"name": "Inge S. Helland"}], "featured_authors": [{"name": "Inge S. Helland"}], "author_count": 1}, {"id": "2604.05693", "category": "quant-ph", "title": "A plug-and-play superconducting quantum controller at millikelvin temperatures enables exceeding 99.9% average gate fidelity", "abstract": "The development of large-scale superconducting quantum computing requires efficient in-situ control methods that allow high-fidelity operations at millikelvin temperatures. Superconducting circuits based on Josephson junctions offer a promising solution due to their high speed, low power dissipation, and cryogenic nature. Here, we report a superconducting quantum controller that enables direct chip-to-chip interconnection with qubits at 10 mK and high-fidelity, all-digital manipulation. Randomized benchmarking reveals a uniformly high average Clifford fidelity of 99.9% with leakage to high energy levels on the order of $10^{-4}$, and an estimated average gate operation energy of 0.121 fJ, demonstrating the potential to resolve the control bottleneck in superconducting quantum computing.", "url": "https://arxiv.org/abs/2604.05693", "type": "理论", "summary": "大规模超导量子计算的发展需要有效的原位控制方法，以允许在毫开尔文温度下进行高保真操作。基于约瑟夫森结的超导电路因其高速、低功耗和低温特性而提供了一种有前途的解决方案。在此，我们报告了一种超导量子控制器，可实现 10 mK 量子位的芯片间直接互连以及高保真全数字操作。随机基准测试显示，平均 Clifford 保真度一致高达 99.9%，泄漏到高能级的量级为 10^{-4}$，估计平均门操作能量为 0.121 fJ，证明了解决超导量子计算中控制瓶颈的潜力。", "authors": [{"name": "Kuang Liu"}, {"name": "Zhiyuan Wang"}, {"name": "Xiaoliang He"}, {"name": "Siqi Li"}, {"name": "Hao Wu"}, {"name": "Xiangyu Ren"}, {"name": "Zhengqi Niu"}, {"name": "Wangpeng Gao"}, {"name": "Chenluo Zhang"}, {"name": "Pei Huang"}, {"name": "Yu Wu"}, {"name": "Liliang Ying"}, {"name": "Wei Peng"}, {"name": "Jaw-Shen Tsai"}, {"name": "Zhirong Lin"}], "featured_authors": [{"name": "Kuang Liu"}, {"name": "Zhiyuan Wang"}, {"name": "Xiaoliang He"}, {"name": "Wei Peng"}, {"name": "Jaw-Shen Tsai"}, {"name": "Zhirong Lin"}], "author_count": 15}, {"id": "2604.05747", "category": "quant-ph", "title": "Kinetic Uncertainty Relation in Collective Dissipative Quantum Many-Body Systems", "abstract": "Attaining the ultimate precision remains a central objective in the engineering of nanoscale systems and the investigation of nonequilibrium processes. While thermodynamic and kinetic uncertainty relations establish fundamental precision bounds, prior derivations in the quantum regime have remained confined to single-body systems. Consequently, the ultimate precision limits for interacting many-body systems have been unknown. In this Letter, we analytically formulate a kinetic uncertainty relation for a many-body system undergoing collective dissipation, a paradigmatic model of boundary time crystals. By applying a mean-field approximation, we derive lower bounds for relative fluctuations expressed in terms of clear physical quantities. Our analysis identifies a cooperative enhancement mechanism, demonstrating that collective interactions allow the precision to scale with the number of particles. We validate these findings through numerical simulations across the stationary, critical, and boundary time crystal phases. Our work presents the first theoretical description of precision bounds in collective dissipative quantum many-body systems for an arbitrary particle number $N$, providing a solid foundation for designing future quantum technologies that exploit many-body phenomena.", "url": "https://arxiv.org/abs/2604.05747", "type": "理论+数值", "summary": "达到最终精度仍然是纳米级系统工程和非平衡过程研究的中心目标。虽然热力学和动力学不确定性关系建立了基本的精度界限，但量子体系中的先前推导仍然仅限于单体系统。因此，多体系统交互的最终精度限制尚不清楚。在这封信中，我们分析地制定了经历集体耗散的多体系统的动力学不确定性关系，这是边界时间晶体的范例模型。通过应用平均场近似，我们得出以明确物理量表示的相对波动的下限。我们的分析确定了一种合作增强机制，证明集体相互作用可以使精度随着粒子数量的增加而变化。我们通过稳态、临界和边界时间晶相的数值模拟验证了这些发现。\n\n我们的工作首次对任意粒子数 $N$ 的集体耗散量子多体系统中的精度界限进行了理论描述，为设计利用多体现象的未来量子技术提供了坚实的基础。", "authors": [{"name": "Hayato Yunoki"}, {"name": "Yoshihiko Hasegawa"}], "featured_authors": [{"name": "Hayato Yunoki"}, {"name": "Yoshihiko Hasegawa"}], "author_count": 2}, {"id": "2604.05776", "category": "quant-ph", "title": "A Nested Amplitude Amplification Protocol for the Binary Knapsack Problem", "abstract": "Amplitude Amplification offers a provable speedup for search problems, which is leveraged in combinatorial optimization by Grover Adaptive Search (GAS). The protocol demands deep circuits that are challenging with regards to NISQ capabilities. We propose a nested Amplitude Amplification protocol for the binary knapsack problem that splits the decision tree at a tunable depth, performing a partial amplification on the first variables before executing a global GAS on the full search space. The partial amplification is implemented by an Inner Iteration Finder that selects the rotation count maximizing marked-subspace amplitude. The resulting biased superposition serves as the initial state for the outer Amplitude Amplification. Using the Quantum Tree Generator for feasible-state preparation and an efficient classical amplitude-tracking scheme, we simulate the protocol on knapsack instances of sizes intractable by statevector simulation. Our results show that the nested approach reduces the cost of improving an incumbent solution compared to baseline GAS, particularly for a specific subset of knapsack instances. As combinatorial problems in domains such as semiconductor supply-chain planning grow in scale, methods that reduce circuit cost are an important step toward eventual quantum advantage for such applications.", "url": "https://arxiv.org/abs/2604.05776", "type": "数值", "summary": "幅度放大为搜索问题提供了可证明的加速，Grover 自适应搜索 (GAS) 在组合优化中利用了这一点。该协议需要深度电路，这对 NISQ 功能具有挑战性。我们针对二元背包问题提出了一种嵌套幅度放大协议，该协议以可调深度分割决策树，在整个搜索空间上执行全局 GAS 之前对第一个变量执行部分放大。部分放大是通过内部迭代查找器实现的，该查找器选择旋转计数最大化标记子空间幅度。由此产生的偏置叠加用作外部幅度放大的初始状态。使用量子树生成器进行可行状态准备和有效的经典幅度跟踪方案，我们在尺寸难以通过状态向量模拟处理的背包实例上模拟协议。我们的结果表明，与基线 GAS 相比，嵌套方法降低了改进现有解决方案的成本，特别是对于背包实例的特定子集。\n\n随着半导体供应链规划等领域的组合问题规模不断扩大，降低电路成本的方法是此类应用最终实现量子优势的重要一步。", "authors": [{"name": "Laurin Demmler"}, {"name": "Maximilian Hess"}], "featured_authors": [{"name": "Laurin Demmler"}, {"name": "Maximilian Hess"}], "author_count": 2}, {"id": "2604.05881", "category": "quant-ph", "title": "Hybrid Quantum-Classical Algorithm for Hamiltonian Simulation", "abstract": "We introduce a hybrid classical-quantum algorithm for simulating a Hamiltonian of the form $H= \\sum_{i=1}^K H_i = \\sum_{i=1}^K H_{i_1} \\otimes H_{i_2} \\otimes \\cdots \\otimes H_{i_M}$. Given that the entries of all $\\{ H_{i_1}, H_{i_2} , \\cdots , H_{i_M}\\}$ (for all $i$) are classically known, we present a procedure (with three variants) in which these operators are classically diagonalized, and then this information is fed into three possible quantum procedures to obtain the block-encoding of $H$. The evolution operator $\\exp(-iHt)$ is then obtained using the standard block-encoding/quantum singular value transformation framework. In the case where $\\{H_i\\}_{i=1}^K$ commute pairwise, our method can be trivially extended to the case with time-dependent coefficients. We provide a detailed discussion of the efficient regime of our hybrid framework and compare it with existing quantum simulation algorithms. Our algorithm can serve as a useful complement to existing quantum simulation algorithms, thereby expanding the reach of quantum computers for practically simulating physical systems. As a side contribution, we will show how the recent technique called \\textit{randomized truncation to a quantum state} developed by Harrow, Lowe, and Witteveen [arXiv preprint arXiv:2510.08518 , 2025] can be applied to the context of quantum simulation and particularly quantum state preparation, for which the latter can be of independent interest.", "url": "https://arxiv.org/abs/2604.05881", "type": "理论+数值", "summary": "我们引入了一种混合经典量子算法，用于模拟 $H= \\sum_{i=1}^K H_i = \\sum_{i=1}^K H_{i_1} \\otimes H_{i_2} \\otimes \\cdots \\otimes H_{i_M}$ 形式的哈密顿量。假设所有 $\\{ H_{i_1}, H_{i_2} , \\cdots , H_{i_M}\\}$ （对于所有 $i$）的条目都是经典已知的，我们提出一个过程（具有三个变体），其中这些运算符被经典对角化，然后将此信息输入到三个可能的量子过程中以获得 $H$ 的块编码。然后使用标准块编码/量子奇异值变换框架获得演化算子 $\\exp(-iHt)$。在 $\\{H_i\\}_{i=1}^K$ 成对通勤的情况下，我们的方法可以简单地扩展到具有时间相关系数的情况。我们详细讨论了混合框架的有效机制，并将其与现有的量子模拟算法进行比较。我们的算法可以作为现有量子模拟算法的有用补充，从而扩大量子计算机实际模拟物理系统的范围。\n\n作为附带贡献，我们将展示由 Harrow、Lowe 和 Witteveen [arXiv 预印本 arXiv:2510.08518，2025] 开发的名为 \\textit{随机截断量子态} 的最新技术如何应用​​于量子模拟，特别是量子态制备的背景下，后者可能具有独立的兴趣。", "authors": [{"name": "Nhat A. Nghiem"}, {"name": "Tzu-Chieh Wei"}], "featured_authors": [{"name": "Nhat A. Nghiem"}, {"name": "Tzu-Chieh Wei"}], "author_count": 2}, {"id": "2604.05915", "category": "quant-ph", "title": "Quantum advantage in transfer of quantum states", "abstract": "Quantum advantage, broadly understood as the ability of quantum systems to significantly outperform their classical counterparts, underpins current interest to quantum technologies and is a topic of active investigation. In many situations, its existence is subject to debate, and the areas of supremacy of large-scale quantum systems are not well defined. Here, we uncover a novel niche where quantum advantage can be clearly defined and proven. We study a time-optimal transfer of excitations in the lattice involving both nearest-neighbor and longer-range couplings. We prove that the quantum-mechanical property of a particle to propagate along several trajectories simultaneously speeds up the transfer process, which takes a shorter time compared to any particular trajectory and thus provides a clear example of quantum advantage.", "url": "https://arxiv.org/abs/2604.05915", "type": "理论", "summary": "量子优势被广泛理解为量子系统显着优于经典系统的能力，它支撑了当前对量子技术的兴趣，也是一个积极研究的主题。在许多情况下，它的存在存在争议，并且大规模量子系统的优势领域尚未明确定义。在这里，我们发现了一个新的利基市场，可以清楚地定义和证明量子优势。我们研究了涉及最近邻耦合和长程耦合的晶格中激发的时间最优转移。我们证明，粒子沿多个轨迹同时传播的量子力学特性加速了转移过程，与任何特定轨迹相比，这需要更短的时间，从而提供了量子优势的明显例子。", "authors": [{"name": "Andrei Stepanenko"}, {"name": "Kseniia Chernova"}, {"name": "Maxim Gorlach"}], "featured_authors": [{"name": "Andrei Stepanenko"}, {"name": "Kseniia Chernova"}, {"name": "Maxim Gorlach"}], "author_count": 3}, {"id": "2604.05962", "category": "quant-ph", "title": "Distributed Quantum Property Testing with Communication Constraints", "abstract": "We introduce a framework for distributed quantum inference under communication constraints. In our model, $m$ distributed nodes each receive one copy of an unknown $d$-dimensional quantum state $\\rho$, before communicating via a constrained one-way communication channel with a central node, which aims to infer some property of $\\rho$. This framework generalizes the classical distributed inference framework introduced by Acharya, Canonne, and Tyagi [COLT2019], by allowing quantum resources such as quantum communication and shared entanglement. Within this setting, we focus on the fundamental problem of quantum state certification: Given a complete description of some state $\\sigma$, decide whether $\\rho=\\sigma$ or $\\|\\rho-\\sigma\\|_1\\geq \\epsilon$. Additionally, we focus on the case of limited quantum communication between distributed nodes and the central node. We show that when each communication channel is limited to only $n_q\\leq \\log d$ qubits, then the sample complexity of distributed state certification is $\\mathcal{O}(\\frac{d^2}{2^{n_q}\\epsilon^2})$ when public randomness is available to all nodes. Moreover, under the assumption that the channels used by the distributed nodes are mixedness-preserving, we prove a matching lower bound. We further demonstrate that shared randomness is necessary to achieve the above complexity, by proving an $\\Omega(\\frac{d^3}{4^{n_q} \\epsilon^2})$ lower bound in the private-coin setting under the same assumption as above. Our lower bounds leverage a recently introduced quantum analogue of the celebrated Ingster-Suslina method and generalize arguments from the classical setting. Together, our work provides the first characterization of distributed quantum state certification in the regime of limited quantum communication and establishes a general framework for distributed quantum inference with communication constraints.", "url": "https://arxiv.org/abs/2604.05962", "type": "理论", "summary": "我们引入了通信限制下的分布式量子推理框架。在我们的模型中，$m$ 个分布式节点每个都会接收一份未知的 $d$ 维量子态 $\\rho$ 的副本，然后通过受约束的单向通信通道与中心节点进行通信，其目的是推断 $\\rho$ 的某些属性。该框架通过允许量子通信和共享纠缠等量子资源，概括了 Acharya、Canonne 和 Tyagi [COLT2019] 引入的经典分布式推理框架。在此背景下，我们关注量子态证明的基本问题：给定某个状态 $\\sigma$ 的完整描述，决定是 $\\rho=\\sigma$ 还是 $\\|\\rho-\\sigma\\|_1\\geq \\epsilon$。此外，我们关注分布式节点和中心节点之间有限量子通信的情况。我们证明，当每个通信通道仅限于 $n_q\\leq \\log d$ 个量子位时，当公共随机性可供所有节点使用时，分布式状态认证的样本复杂度为 $\\mathcal{O}(\\frac{d^2}{2^{n_q}\\epsilon^2})$。\n\n此外，在分布式节点使用的通道是混合性保持的假设下，我们证明了匹配的下界。我们通过在与上述相同的假设下证明私有币设置中的 $\\Omega(\\frac{d^3}{4^{n_q} \\epsilon^2})$ 下界，进一步证明共享随机性对于实现上述复杂性是必要的。我们的下界利用了最近引入的著名 Ingster-Suslina 方法的量子模拟，并概括了经典环境中的论点。我们的工作共同提供了有限量子通信体制中分布式量子态认证的第一个特征，并为具有通信约束的分布式量子推理建立了通用框架。", "authors": [{"name": "Mina Doosti"}, {"name": "Ryan Sweke"}, {"name": "Chirag Wadhwa"}], "featured_authors": [{"name": "Mina Doosti"}, {"name": "Ryan Sweke"}, {"name": "Chirag Wadhwa"}], "author_count": 3}, {"id": "2604.05986", "category": "quant-ph", "title": "Quantum Machine Learning for particle scattering entanglement classification", "abstract": "Entanglement is a key quantity for characterizing quantum correlations in particle scattering processes, but its direct evaluation is computationally demanding on quantum hardware. In this work, we investigate whether fermion density profiles, which are easier to access, can serve as proxies for entanglement by framing the problem as a classification task across multiple entanglement thresholds. Using the fermion scattering in the Thirring model as a test bed, we compare Quantum Convolutional Neural Networks (QCNNs) with classical CNNs of comparable parameter counts, and find that QCNNs achieve consistently competitive or superior accuracy with faster convergence and lower variance. Notably, we observe that increasing the model size does not improve the performance within the architectures studied here, and larger models appear to be more sensitive to the choice of encoding. Instead, a compact 4-qubits QCNN provides the best results, suggesting the importance of trainability and encoding choices over model scaling. These findings demonstrate the potential of quantum and quantum-inspired machine learning models for extracting nontrivial quantum information from accessible observables, with implications for high-energy physics and quantum many-body systems.", "url": "https://arxiv.org/abs/2604.05986", "type": "理论+数值", "summary": "纠缠是表征粒子散射过程中量子相关性的关键量，但其直接评估对量子硬件的计算要求很高。在这项工作中，我们通过将问题框架为跨多个纠缠阈值的分类任务来研究更容易访问的费米子密度分布是否可以作为纠缠的代理。我们使用 Thirring 模型中的费米子散射作为测试平台，将量子卷积神经网络 (QCNN) 与具有可比参数数量的经典 CNN 进行比较，发现 QCNN 具有一致的竞争性或卓越的精度，并且具有更快的收敛速度和更低的方差。值得注意的是，我们观察到增加模型大小并不会提高此处研究的架构中的性能，并且较大的模型似乎对编码的选择更敏感。相反，紧凑的 4 量子位 QCNN 提供了最佳结果，这表明可训练性和编码选择相对于模型缩放的重要性。\n\n这些发现证明了量子和受量子启发的机器学习模型从可观测的可观测值中提取重要量子信息的潜力，这对高能物理和量子多体系统具有重要意义。", "authors": [{"name": "Hala Elhag"}, {"name": "Yahui Chai"}], "featured_authors": [{"name": "Hala Elhag"}, {"name": "Yahui Chai"}], "author_count": 2}, {"id": "2604.06007", "category": "quant-ph", "title": "Scaling Laws for Hybrid Quantum Neural Networks: Depth, Width, and Quantum-Centric Diagnostics", "abstract": "Hybrid quantum neural networks are increasingly explored for classification, yet it remains unclear how their performance and quantum behavior scale with circuit depth and qubit count. We present a controlled scaling study of hybrid quantum-classical classifiers along two axes: (1) increasing the number of quantum layers L at fixed qubits Q, and (2) increasing the number of qubits Q at fixed depth L. Across multiple datasets, we evaluate predictive performance using Accuracy, PR-AUC, Precision, Recall, and F1, and track quantum-specific metrics (QCE, EEE, QGN) to characterize how quantum properties evolve under scaling. Our results summarize scaling trends, saturation regimes, and dataset-dependent sensitivity, and further analyze how quantum metrics relate to predictive performance. This study provides practical guidance for selecting (Q,L) in hybrid QNN classifiers and establishes a consistent evaluation protocol for scaling analysis.", "url": "https://arxiv.org/abs/2604.06007", "type": "理论+数值", "summary": "人们越来越多地探索混合量子神经网络用于分类，但仍不清楚它们的性能和量子行为如何随着电路深度和量子位计数而变化。我们提出了沿两个轴的混合量子经典分类器的受控缩放研究：（1）在固定量子位 Q 处增加量子层 L 的数量，以及（2）在固定深度 L 处增加量子位 Q 的数量。在多个数据集中，我们使用准确度、PR-AUC、精度、召回率和 F1 来评估预测性能，并跟踪量子特定指标（QCE、EEE、QGN）来表征量子属性在缩放下如何演变。我们的结果总结了扩展趋势、饱和状态和数据集相关的敏感性，并进一步分析了量子指标与预测性能的关系。本研究为混合 QNN 分类器中选择 (Q,L) 提供了实用指导，并为标度分析建立了一致的评估协议。", "authors": [{"name": "Danil Vyskubov"}, {"name": "Kirill Vyskubov"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Danil Vyskubov"}, {"name": "Kirill Vyskubov"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}], "author_count": 4}, {"id": "2604.06027", "category": "quant-ph", "title": "Exploring bosonic bound states with parallel reaction coordinates", "abstract": "Bound states are dissipation-resilient states that may emerge when quantum systems are strongly coupled to reservoirs with band gaps. We analyze an exactly solvable bosonic model for bound state existence and reproduce these results by a weak-coupling treatment of a supersystem composed of the original system and multiple reaction coordinates, which are individually representing small energy intervals of the reservoir spectral function. Within the perturbative supersystem treatment, the bound state stability results from its energy being inside the band gap. We discuss cases of multiple band gaps and also show that already in presence of weak interactions the bound state's lifetime is finite -- but can be increased by raising the system-reservoir coupling strength.", "url": "https://arxiv.org/abs/2604.06027", "type": "理论", "summary": "束缚态是当量子系统与带隙库强耦合时可能出现的耗散弹性态。我们分析了束缚态存在的精确可解玻色子模型，并通过对由原始系统和多个反应坐标组成的超系统的弱耦合处理来再现这些结果，这些坐标分别代表储层谱函数的小能量区间。在微扰超系统处理中，束缚态稳定性源于其能量位于带隙内。我们讨论了多个带隙的情况，并且还表明，在存在弱相互作用的情况下，束缚态的寿命是有限的，但可以通过提高系统-储层耦合强度来增加。", "authors": [{"name": "Guan-Yu Lai"}, {"name": "Friedemann Queißer"}, {"name": "Gernot Schaller"}], "featured_authors": [{"name": "Guan-Yu Lai"}, {"name": "Friedemann Queißer"}, {"name": "Gernot Schaller"}], "author_count": 3}, {"id": "2604.06077", "category": "quant-ph", "title": "Simulating Thermal Properties of Bose-Hubbard Models on a Quantum Computer", "abstract": "While recent advances have established efficient quantum algorithms for preparing Gibbs states of finite-dimensional systems, comparable complexity results for bosonic and other infinite-dimensional models remain unexplored. We introduce the first general rigorous Gibbs sampling framework for bosonic many-body systems, showing that physically relevant bosonic models admit gapped dissipative generators, enabling efficient preparation of thermal states. Although our results hold for broad classes of models, we illustrate them using Bose-Hubbard Hamiltonians, both within and beyond the mean-field regime. In both cases, we show that the associated dissipative generators maintain a positive spectral gap, thereby implying exponential convergence to the thermal state. Our argument in the multi-mode case is based on a finite-rank reduction of the dissipative dynamics, which allows us to control the generator via compact perturbations and deduce the discreteness of the spectrum and the stability of the gap. We apply our results to provide efficient preparation of the corresponding Gibbs state on qubit hardware, and by that a quantum algorithm to compute thermal properties of the associated model. This provides the first mathematically controlled route to Gibbs sampling in infinite-dimensional systems, with implications for quantum simulation, thermalization, and many-body complexity, where quantum advantages may arise.", "url": "https://arxiv.org/abs/2604.06077", "type": "理论+数值", "summary": "虽然最近的进展已经建立了有效的量子算法来准备有限维系统的吉布斯态，但玻色子和其他无限维模型的可比复杂性结果仍有待探索。我们引入了第一个用于玻色多体系统的通用严格吉布斯采样框架，表明物理相关的玻色模型允许有间隙的耗散发生器，从而能够有效地准备热态。尽管我们的结果适用于广泛的模型，但我们使用 Bose-Hubbard Hamiltonian 来说明它们，无论是在平均场范围内还是在平均场范围之外。在这两种情况下，我们都表明相关的耗散发生器保持正的光谱间隙，从而意味着指数收敛到热状态。我们在多模式情况下的论点基于耗散动力学的有限阶减少，这使我们能够通过紧凑扰动控制发生器并推断出频谱的离散性和间隙的稳定性。\n\n我们应用我们的结果在量子位硬件上提供相应吉布斯状态的有效准备，并通过量子算法来计算相关模型的热属性。这为无限维系统中的吉布斯采样提供了第一个数学控制的途径，对可能出现量子优势的量子模拟、热化和多体复杂性具有影响。", "authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "featured_authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "author_count": 3}, {"id": "2604.06127", "category": "quant-ph", "title": "Necessary and sufficient conditions for the N-representability of functionals of the one-electron reduced density matrix", "abstract": "We establish necessary and sufficient conditions for the N-representability of the universal one-electron reduced density matrix functional. Functionals satisfying these conditions are guaranteed to yield variational upper bounds on the true energy in one-electron reduced density matrix functional theory, regardless of the strength of the interparticle repulsion. Conversely, any functional violating these conditions will necessarily underestimate the true energy for certain systems. These exact constraints impose a stringent restriction on density matrix functional approximations, as many existing functionals-including the Hartree-Fock functional-appear to violate them. This mathematical formalism, therefore, can guide the development of new approximate functionals and numerical algorithms.", "url": "https://arxiv.org/abs/2604.06127", "type": "理论+数值", "summary": "我们建立了通用单电子约简密度矩阵泛函的 N 表示性的充要条件。无论粒子间排斥力的强度如何，满足这些条件的泛函都保证在单电子约化密度矩阵泛函理论中产生真实能量的变分上限。相反，任何违反这些条件的功能必然会低估某些系统的真实能量。这些精确的约束对密度矩阵泛函近似施加了严格的限制，因为许多现有泛函（包括 Hartree-Fock 泛函）似乎违反了它们。因此，这种数学形式主义可以指导新的近似泛函和数值算法的开发。", "authors": [{"name": "Jannis Erhard"}, {"name": "Paul W. Ayers"}], "featured_authors": [{"name": "Jannis Erhard"}, {"name": "Paul W. Ayers"}], "author_count": 2}, {"id": "2604.06135", "category": "quant-ph", "title": "Shot-Based Quantum Encoding: A Data-Loading Paradigm for Quantum Neural Networks", "abstract": "Efficient data loading remains a bottleneck for near-term quantum machine-learning. Existing schemes (angle, amplitude, and basis encoding) either underuse the exponential Hilbert-space capacity or require circuit depths that exceed the coherence budgets of noisy intermediate-scale quantum hardware. We introduce Shot-Based Quantum Encoding (SBQE), a data embedding strategy that distributes the hardware's native resource, shots, according to a data-dependent classical distribution over multiple initial quantum states. By treating the shot counts as a learnable degree of freedom, SBQE produces a mixed-state representation whose expectation values are linear in the classical probabilities and can therefore be composed with non-linear activation functions. We show that SBQE is structurally equivalent to a multilayer perceptron whose weights are realised by quantum circuits, and we describe a hardware-compatible implementation protocol. Benchmarks on Fashion MNIST and Semeion handwritten digits, with ten independent initialisations per model, show that SBQE achieves 89.1% +/- 0.9% test accuracy on Semeion (reducing error by 5.3% relative to amplitude encoding and matching a width-matched classical network) and 80.95% +/- 0.10% on Fashion MNIST (exceeding amplitude encoding by +2.0% and a linear multilayer perceptron by +1.3%), all without any data-encoding gates.", "url": "https://arxiv.org/abs/2604.06135", "type": "理论+数值", "summary": "高效的数据加载仍然是近期量子机器学习的瓶颈。现有方案（角度、幅度和基础编码）要么未充分利用指数希尔伯特空间容量，要么需要超出噪声中等规模量子硬件的相干预算的电路深度。我们引入了基于镜头的量子编码（SBQE），这是一种数据嵌入策略，根据多个初始量子态上的数据相关经典分布来分配硬件的本机资源镜头。通过将射击计数视为可学习的自由度，SBQE 生成混合状态表示，其期望值在经典概率中是线性的，因此可以由非线性激活函数组成。我们证明SBQE在结构上相当于一个多层感知器，其权重由量子电路实现，并且我们描述了一个硬件兼容的实现协议。\n\nFashion MNIST 和 Semeion 手写数字的基准测试（每个模型有 10 个独立的初始化）表明，SBQE 在 Semeion 上实现了 89.1% +/- 0.9% 的测试精度（相对于幅度编码和匹配宽度匹配的经典网络，误差减少了 5.3%），在 Fashion MNIST 上达到了 80.95% +/- 0.10%（超出幅度编码 +2.0% 和线性多层）感知器增加 1.3%），所有这些都没有任何数据编码门。", "authors": [{"name": "Basil Kyriacou"}, {"name": "Viktoria Patapovich"}, {"name": "Maniraman Periyasamy"}, {"name": "Alexey Melnikov"}], "featured_authors": [{"name": "Basil Kyriacou"}, {"name": "Viktoria Patapovich"}, {"name": "Maniraman Periyasamy"}, {"name": "Alexey Melnikov"}], "author_count": 4}, {"id": "2604.06142", "category": "quant-ph", "title": "Light-Induced Quantum Self-Trapping of Vibrational Excitons in an Optical Cavity", "abstract": "In an optical cavity, strong light--matter coupling between excitons and photons has been widely reported as a way to enhance energy delocalization through spatially extended polaritonic states. In contrast, leveraging cavity-mediated light--matter effects to promote the reciprocal phenomenon, namely \\textit{energy localization}, remains largely underexplored. In the present work, we address this question by focusing on a special form of energy localization arising from nonlinear matter interactions: \\textit{Quantum Self-Trapping} (QST). We employ a generalized Tavis--Cummings model to investigate the transport of vibrational excitons -- \\textit{i.e., vibrons} -- between two anharmonic vibrational modes and examine their interplay with cavity photons. In the absence of a cavity, the arising of true and complete QST -- \\textit{i.e.}, an infinite-lifetime localization -- is not possible due to the symmetry of the system. The energy transfer between the two modes still occurs, slowed down by the many-body interactions. Coupling the system to a single-mode cavity strongly alters this behavior, with two emerging regimes. First, at weak light--matter coupling, destructive interference between newly opened transition pathways suppresses energy exchange, leading to cavity-enhanced self-trapping. As the coupling strength increases, these interference effects evolve leading to cavity-assisted energy transfer, where we observe an acceleration of the vibrational energy flow. Most notably, we identify critical coupling strengths that separate both regimes in which the dynamics almost totally freeze, suggesting the arising of a ``stabilized'' light-induced~QST of many-vibron bound states. These results suggest that optical cavities can not only enhance transport but could also stabilize energy localization phenomena, providing a new route to control energy flow in quantum systems.", "url": "https://arxiv.org/abs/2604.06142", "type": "理论", "summary": "在光学腔中，激子和光子之间的强光-物质耦合已被广泛报道为通过空间扩展的极化子态增强能量离域的一种方法。相比之下，利用空腔介导的光物质效应来促进相互现象，即\\textit{能量局域化}，在很大程度上仍然没有得到充分探索。在目前的工作中，我们通过关注非线性物质相互作用产生的一种特殊形式的能量局域化来解决这个问题：\\textit{量子自捕获}（QST）。我们采用广义的塔维斯-卡明斯模型来研究振动激子（\\textit{即振动子}）在两种非简谐振动模式之间的传输，并检查它们与腔光子的相互作用。在没有空腔的情况下，由于系统的对称性，真正且完整的 QST（\\textit{i.e.}，无限寿命定位）的出现是不可能的。两种模式之间的能量传递仍然发生，但由于多体相互作用而减慢了速度。将系统耦合到单模腔会强烈改变这种行为，并出现两种新的状态。\n\n首先，在弱光-物质耦合时，新打开的跃迁路径之间的相消干涉抑制了能量交换，导致空腔增强的自捕获。随着耦合强度的增加，这些干扰效应不断发展，导致空腔辅助能量转移，我们观察到振动能量流的加速。最值得注意的是，我们确定了将两种状态分开的临界耦合强度，其中动力学几乎完全冻结，这表明多振动子束缚态的“稳定”光诱导〜QST的出现。这些结果表明，光腔不仅可以增强传输，还可以稳定能量局域化现象，为控制量子系统中的能量流提供了一条新途径。", "authors": [{"name": "Vincent Pouthier"}, {"name": "Saad Yalouz"}], "featured_authors": [{"name": "Vincent Pouthier"}, {"name": "Saad Yalouz"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
