ms predict a linear dependence of the transition temperature on the attractive interaction, $T_c(U) = c|U|$. However, neither the value of $c$ nor the full nonlinear $T_c(U)$ curve -- with a maximum at large $|U|$ -- is known beyond mean-field and quantum geometry estimates. Using a controlled diagrammatic Monte Carlo technique, we trace the onset of superfluid response in the Lieb lattice with attractive Hubbard interaction. Focusing on the half-filled flat-band case, where the ordering mechanism differs fundamentally from both BCS and preformed Cooper pair scenarios, we find that the pairing response diverges linearly with decreasing temperature over a broad range of $U$, leading to a sharp crossover to long-range correlations at a characteristic temperature $T_*$, which provides a controlled upper bound on $T_c$. The highest $T_*$ occurs when all three bands touch at a single momentum point, potentially corresponding to high $T_c$ values.", "url": "https://arxiv.org/abs/2604.05997", "type": "理论+数值", "summary": "当前平带系统中的高温超导理论预测，转变温度与吸引力相互作用存在线性关系，$T_c(U) = c|U|$。然而，除了平均场和量子几何估计之外，$c$ 的值和完整的非线性 $T_c(U)$ 曲线（最大值为 $|U|$）​​都是未知的。使用受控图解蒙特卡罗技术，我们追踪了具有吸引哈伯德相互作用的利布晶格中超流体响应的开始。着眼于半填充平带情况，其中排序机制与 BCS 和预先形成的库珀对方案有根本不同，我们发现配对响应在 $U$ 的广泛范围内随着温度的降低呈线性发散，导致在特征温度 $T_*$ 处与长程相关性急剧交叉，这提供了 $T_c$ 的受控上限。当所有三个带接触单个动量点时，出现最高的 $T_*$，可能对应于高 $T_c$ 值。", "authors": [{"name": "I.S. Tupitsyn"}, {"name": "B. Currie"}, {"name": "B.V. Svistunov"}, {"name": "E. Kozik"}, {"name": "N.V. Prokof'ev"}], "featured_authors": [{"name": "I.S. Tupitsyn"}, {"name": "B. Currie"}, {"name": "B.V. Svistunov"}, {"name": "E. Kozik"}, {"name": "N.V. Prokof'ev"}], "author_count": 5}, {"id": "2604.06048", "category": "cond-mat", "title": "Large Language Model Assisted Discovery of Optimal Dopants for Enhanced Thermoelectric Performance in CoSb$_3$ Based Skutterudites", "abstract": "We present a data-driven approach for accelerating the discovery of high-performance CoSb$_3$-based skutterudites by curating a comprehensive dataset of compositions with various filler elements from over 300 research articles. Leveraging large language models (LLMs), we extract and embed compositional representations, which are then used to train a regression head for predicting thermoelectric figure of merit. Compared to traditional deep neural networks relying on elemental descriptors such as atomic radii, our LLM-based model achieves significantly lower mean-squared error losses. We further employ the trained model to propose novel filler compositions with promising thermoelectric properties. Finally, we support these predicted candidates through density functional theory and molecular dynamics calculations to assess their electrical and thermal conductivity. This data-driven approach demonstrates the potential of combining natural language processing, machine learning, and quantum simulations for thermoelectric materials design.", "url": "https://arxiv.org/abs/2604.06048", "type": "理论+数值", "summary": "我们提出了一种数据驱动的方法，通过从 300 多篇研究文章中整理出包含各种填充元素的综合数据集，加速发现高性能 CoSb$_3$ 方钴矿。利用大型语言模型（LLM），我们提取并嵌入组合表示，然后将其用于训练回归头以预测热电品质因数。与依赖原子半径等元素描述符的传统深度神经网络相比，我们基于 LLM 的模型实现了显着较低的均方误差损失。我们进一步利用经过训练的模型来提出具有良好热电性能的新型填料组合物。最后，我们通过密度泛函理论和分子动力学计算来支持这些预测的候选者，以评估它们的电导率和导热率。这种数据驱动的方法展示了将自然语言处理、机器学习和量子模拟结合起来进行热电材料设计的潜力。", "authors": [{"name": "Yagnik Bandyopadhyay"}, {"name": "Dylan Noel Serrao"}, {"name": "Houlong L. Zhuang"}], "featured_authors": [{"name": "Yagnik Bandyopadhyay"}, {"name": "Dylan Noel Serrao"}, {"name": "Houlong L. Zhuang"}], "author_count": 3}, {"id": "2604.06051", "category": "cond-mat", "title": "Disentangling High Harmonic Generation from Surface and Bulk States of a Topological Insulator", "abstract": "The discovery of topological phases has introduced a new dimension to materials science. Three-dimensional (3D) topological insulators (TIs) are a remarkable class of matter that is insulating in the bulk while hosting conductive topological surface states (TSSs) with unique charge and spin properties. High-order harmonic generation (HHG) has emerged as a powerful tool to probe condensed matter systems by providing insights into their electronic structure and dynamic behavior. Here, we investigate HHG in the prototype 3D-TI Bi$_2$Se$_3$. We demonstrate that the contributions of bulk and surface states to the harmonic emission can be controlled by tuning the thickness of thin film samples. An ultrathin (6 nm) film substantially enhances HHG from the surface states, while the bulk states dominate HHG in a thicker (50 nm) film. By applying a quasi-static terahertz perturbing field, we disentangle the bulk and surface responses and reveal the significant impact of the surface states' shift vector and Berry curvature on HHG. Our study provides effective methods for isolating the optical responses of TSSs from those of the bulk, which opens the door to resolving an ongoing debate regarding whether it is possible to reliably extract topological signatures in HHG.", "url": "https://arxiv.org/abs/2604.06051", "type": "理论", "summary": "拓扑相的发现为材料科学引入了一个新的维度。三维 (3D) 拓扑绝缘体 (TI) 是一类非凡的物质，它在整体上是绝缘的，同时具有具有独特电荷和自旋特性的导电拓扑表面态 (TSS)。高阶谐波发生 (HHG) 已成为一种强大的工具，可通过深入了解凝聚态物质系统的电子结构和动态行为来探测它们。在这里，我们研究原型 3D-TI Bi$_2$Se$_3$ 中的 HHG。我们证明，可以通过调整薄膜样品的厚度来控制体态和表面态对谐波发射的贡献。超薄（6 nm）薄膜从表面态显着增强 HHG，而在较厚（50 nm）薄膜中体态主导 HHG。通过应用准静态太赫兹扰动场，我们解开了体响应和表面响应，并揭示了表面态位移矢量和贝里曲率对 HHG 的显着影响。\n\n我们的研究提供了将 TSS 的光学响应与整体光学响应隔离的有效方法，这为解决关于是否有可能可靠地提取 HHG 中的拓扑特征的持续争论打开了大门。", "authors": [{"name": "Sha Li"}, {"name": "Wenyi Zhou"}, {"name": "Kazi A. Imroz"}, {"name": "Yaguo Tang"}, {"name": "Tiana A. Townsend"}, {"name": "Vyacheslav Leshchenko"}, {"name": "Larissa Boie"}, {"name": "Pierre Agostini"}, {"name": "Alexandra S. Landsman"}, {"name": "Roland K. Kawakami"}, {"name": "Lun Yue"}, {"name": "Louis F. DiMauro"}], "featured_authors": [{"name": "Sha Li"}, {"name": "Wenyi Zhou"}, {"name": "Kazi A. Imroz"}, {"name": "Roland K. Kawakami"}, {"name": "Lun Yue"}, {"name": "Louis F. DiMauro"}], "author_count": 12}, {"id": "2604.06153", "category": "cond-mat", "title": "Solving the Peierls-Boltzmann transport equation with matrix product states", "abstract": "The Peierls-Boltzmann transport equation (PBE), which governs non-equilibrium phonon transport, suffers from the curse of dimensionality due to its high-dimensional phase space including both real and modal spaces. We explore the use of matrix product states (MPS) for numerical simulation of the PBE. We show that an MPS configuration based on scattering events combined with a dimensionless form of the solution can drastically increase the locality of correlations between tensors in the MPS representation, enhancing its effectiveness in dimension reduction. We further examine the effects of index ordering in an MPS and find that the highest locality is achieved when tensor chains associated with both real and modal spaces are connected from the coarsest grid to each other in the center of the MPS. Using this optimal configuration and a solver inspired by the density matrix renormalization group, we solve the PBE discretized by a finite volume method (FVM). The solution is obtained for crystalline silicon across ballistic, quasi-ballistic, and diffusive transport regimes. An MPS truncated to the compression ratio of $10^{-3}$ suffices to reproduce reference solutions with high fidelity. The computational cost scales sublinearly with the number of grid points in both real and modal spaces, achieving roughly an order of magnitude reduction in computational time compared to the FVM with sparse matrix operation.", "url": "https://arxiv.org/abs/2604.06153", "type": "理论+数值", "summary": "控制非平衡声子输运的 Peierls-Boltzmann 输运方程 (PBE) 由于其高维相空间（包括实空间和模态空间）而遭受维数灾难。我们探索使用矩阵乘积状态 (MPS) 进行 PBE 数值模拟。我们证明，基于散射事件的 MPS 配置与解决方案的无量纲形式相结合，可以极大地增加 MPS 表示中张量之间相关性的局部性，从而增强其降维的有效性。我们进一步研究了 MPS 中索引排序的影响，发现当与实空间和模态空间相关的张量链在 MPS 中心从最粗糙的网格相互连接时，可以实现最高的局部性。使用这种最优配置和受密度矩阵重整化群启发的求解器，我们求解通过有限体积法 (FVM) 离散化的 PBE。该解决方案是针对弹道、准弹道和扩散输运范围内的晶体硅获得的。\n\n截断为 $10^{-3}$ 压缩比的 MPS 足以以高保真度重现参考解决方案。计算成本与实数空间和模态空间中的网格点数量呈次线性关系，与稀疏矩阵运算的 FVM 相比，计算时间大致减少了一个数量级。", "authors": [{"name": "Sangyeop Lee"}, {"name": "Hirad Alipanah"}, {"name": "Juan José Mendoza-Arenas"}], "featured_authors": [{"name": "Sangyeop Lee"}, {"name": "Hirad Alipanah"}, {"name": "Juan José Mendoza-Arenas"}], "author_count": 3}, {"id": "2604.06157", "category": "cond-mat", "title": "Tractable model for a fractionalized Fermi liquid (FL$^*$) on a square lattice", "abstract": "Motivated by the continued interest in Fermi-surface reconstruction without symmetry breaking, we present an analytically tractable microscopic model of a fractionalized Fermi liquid (FL$^*$) on a square lattice and discuss its potential relevance to the cuprates. As in ancilla-qubit constructions, the model is related to Kondo lattice systems, but in this case, the conduction electrons interact with a $\\mathbb{Z}_2$ spin liquid of the Yao--Lee type, with a Majorana Fermi surface. The associated $\\mathbb Z_2$ gauge theory is static so that the model can be analytically solved to leading-logarithic accuracy. There are two phases: one in which the fractionalized fermions of the spin liquid hybridize with conduction electrons to form a common Fermi surface violating the naive Luttinger count, and one in which they remain decoupled. We discuss the salient features of the small Fermi-surface phase, including analytically derived momentum dependent coherence factors responsible for the appearance of Fermi arcs à la Yang-Rice-Zhang. We further discuss the impact of quantum and thermal fluctuations, including a strong diamagnetic response and a logarithmically divergent Sommerfeld coefficient at the onset of the pseudogap.", "url": "https://arxiv.org/abs/2604.06157", "type": "理论+数值", "summary": "出于对不对称破缺的费米表面重建的持续兴趣的激励，我们提出了一种在方形晶格上的分步费米液体 (FL$^*$) 的分析易处理的微观模型，并讨论了它与铜酸盐的潜在相关性。与辅助量子位结构一样，该模型与近藤晶格系统相关，但在这种情况下，传导电子与具有马约拉纳费米表面的 Yao--Lee 型 $\\mathbb{Z}_2$ 自旋液体相互作用。相关的 $\\mathbb Z_2$ 规范理论是静态的，因此模型可以分析求解到领先对数精度。有两个阶段：一个阶段是自旋液体的分数化费米子与传导电子杂化，形成违反朴素卢廷格计数的共同费米表面，另一个阶段是它们保持解耦。我们讨论了小费米面相的显着特征，包括分析得出的动量相关相干因子，这些因子导致了费米弧的出现，如 Yang-Rice-Zhang。\n\n我们进一步讨论了量子和热涨落的影响，包括强抗磁响应和赝能隙开始时的对数发散的索末菲系数。", "authors": [{"name": "Piers Coleman"}, {"name": "Elio J. König"}, {"name": "Aaditya Panigrahi"}, {"name": "Alexei Tsvelik"}], "featured_authors": [{"name": "Piers Coleman"}, {"name": "Elio J. König"}, {"name": "Aaditya Panigrahi"}, {"name": "Alexei Tsvelik"}], "author_count": 4}, {"id": "2604.06162", "category": "cond-mat", "title": "Mutual Linearity in and out of Stationarity for Markov Jump Processes: A Trajectory-Based Approach", "abstract": "Nonequilibrium response theory is a fundamental framework for understanding how physical systems respond to perturbations. Recently, a mutual linearity has been discovered for Markov jump processes using linear algebra analysis. This mutual linearity states that two observables are linearly dependent on each other in the long-time limit when the transition rate of a single edge is altered. It has also been extended to non-stationary cases for current observables. In this work, we provide a trajectory-based derivation of mutual linearity utilizing the trajectory-level linear response theory. The trajectory approach allows us to generalize the mutual linearity to non-stationary relaxation dynamics for state observables and counting observables. Our results shed light on the fundamental response properties far from equilibrium and the trajectory-level origin of mutual linearity. Our trajectory-based approach makes it possible to generalize the mutual linearity to a broader class of systems, including diffusion processes and open quantum systems.", "url": "https://arxiv.org/abs/2604.06162", "type": "理论", "summary": "非平衡响应理论是理解物理系统如何响应扰动的基本框架。最近，使用线性代数分析发现了马尔可夫跳跃过程的互线性。这种相互线性表明，当单个边缘的转换率发生变化时，两个可观测量在长时间限制内彼此线性相关。它还已扩展到当前可观察量的非平稳情况。在这项工作中，我们利用轨迹级线性响应理论提供了基于轨迹的相互线性推导。轨迹方法使我们能够将相互线性推广到状态可观测量和计数可观测量的非平稳松弛动力学。我们的结果揭示了远离平衡的基本响应特性和相互线性的轨迹水平起源。我们基于轨迹的方法可以将相互线性推广到更广泛的系统，包括扩散过程和开放量子系统。", "authors": [{"name": "Jiming Zheng"}, {"name": "Zhiyue Lu"}], "featured_authors": [{"name": "Jiming Zheng"}, {"name": "Zhiyue Lu"}], "author_count": 2}, {"id": "2604.05025", "category": "hep-th", "title": "Feynman integral reduction with intersection theory made simple", "abstract": "Feynman integral reduction based on intersection theory provides an alternative to the traditional integration-by-parts method, yet its practical application has been constrained by the large number of variables required in the computation. In this Letter, we demonstrate that by employing the recently introduced branch representation, the reduction of $L$-loop Feynman integrals with an arbitrary number of external legs can be achieved through the computation of at most $(3L-3)$-variable intersection numbers. This constitutes a significant simplification compared to existing approaches, particularly for multi-leg integrals where the number of variables in conventional methods scales with the total number of propagators. We validate the proposed method through explicit calculations of two-loop diagrams, demonstrating substantial improvements in computational efficiency relative to both traditional intersection-theory approaches and standard integration-by-parts reduction techniques.", "url": "https://arxiv.org/abs/2604.05025", "type": "理论", "summary": "基于交集理论的费曼积分约简为传统的分部积分方法提供了一种替代方法，但其实际应用却受到计算中需要大量变量的限制。在这封信中，我们证明，通过采用最近引入的分支表示，可以通过计算最多 $(3L-3)$ 变量交集数来减少具有任意数量外部支路的 $L$ 循环费曼积分。与现有方法相比，这构成了显着的简化，特别是对于多腿积分，其中传统方法中的变量数量与传播器总数成比例。我们通过双环图的显式计算验证了所提出的方法，证明相对于传统的交叉理论方法和标准的按部分积分简化技术，计算效率有了显着的提高。", "authors": [{"name": "Li-Hong Huang"}, {"name": "Yan-Qing Ma"}, {"name": "Ziwen Wang"}, {"name": "Li Lin Yang"}], "featured_authors": [{"name": "Li-Hong Huang"}, {"name": "Yan-Qing Ma"}, {"name": "Ziwen Wang"}, {"name": "Li Lin Yang"}], "author_count": 4}, {"id": "2604.05026", "category": "hep-th", "title": "Quantum Solitons", "abstract": "We construct geometries describing the quantum backreaction of thermal fields in AdS$_3$. The solutions are obtained from branes in a four-dimensional AdS C-metric. They can be viewed as solutions of the semiclassical effective theory on the brane, which couples three-dimensional gravity to the CFT dual to the four-dimensional bulk. This brane construction is related by a double analytic continuation to earlier studies of quantum BTZ solutions. There are two families of solutions, labelled by the asymptotic mass. Solutions with negative mass correspond to the back-reaction of a thermal CFT state on global AdS$_3$. Solutions with positive mass have a horizon for zero back-reaction, which is replaced by a smooth origin in the back-reacted solution. We study the thermodynamics and first law on the brane, which we argue is realised in a two-brane setup where we include both the quantum BTZ brane and our quantum soliton brane.", "url": "https://arxiv.org/abs/2604.05026", "type": "理论", "summary": "我们构建了描述 AdS$_3$ 中热场的量子反反应的几何结构。解是从四维 AdS C 度量的膜中获得的。它们可以被视为膜上半经典有效理论的解决方案，该理论将三维引力耦合到对偶于四维体积的 CFT。这种膜结构通过双重解析延续与量子 BTZ 解决方案的早期研究相关。有两个解系列，由渐近质量标记。具有负质量的解对应于全局 AdS$_3$ 上热 CFT 状态的反反应。具有正质量的溶液具有零反反应的范围，其被反反应溶液中的平滑原点所取代。我们研究膜的热力学和第一定律，我们认为这是在双膜设置中实现的，其中我们包括量子 BTZ 膜和量子孤子膜。", "authors": [{"name": "Robie A. Hennigar"}, {"name": "Ayan K. Patra"}, {"name": "Simon F. Ross"}], "featured_authors": [{"name": "Robie A. Hennigar"}, {"name": "Ayan K. Patra"}, {"name": "Simon F. Ross"}], "author_count": 3}, {"id": "2604.05082", "category": "hep-th", "title": "Worldline Images for Yang-Mills Theory within Boundaries", "abstract": "In this article we develop a worldline technique based on the method of images to study the effective action associated to Yang-Mills theories on manifolds with boundaries. We consider the possibility of having either relative or absolute boundary conditions, which are particular types of mixed boundary conditions. Both vector fields and ghost fields are taken into account in this analysis. As a check of our construction, we compute the first three Seeley-DeWitt coefficients of the heat kernel asymptotics. Finally, we employ our technique to calculate the rate of gluon production due to a chromoelectric field background in the presence of a boundary.", "url": "https://arxiv.org/abs/2604.05082", "type": "理论", "summary": "在本文中，我们开发了一种基于图像方法的世界线技术，以研究与带有边界的流形上的杨-米尔斯理论相关的有效作用。我们考虑具有相对或绝对边界条件的可能性，它们是混合边界条件的特殊类型。此分析中同时考虑了矢量场和鬼场。作为对我们构造的检查，我们计算了热核渐近的前三个 Seeley-DeWitt 系数。最后，我们采用我们的技术来计算由于边界存在的色电场背景而产生的胶子产生率。", "authors": [{"name": "Santiago Christiansen Murguizur"}, {"name": "Lucas Manzo"}, {"name": "Pablo Pisani"}], "featured_authors": [{"name": "Santiago Christiansen Murguizur"}, {"name": "Lucas Manzo"}, {"name": "Pablo Pisani"}], "author_count": 3}, {"id": "2604.05094", "category": "hep-th", "title": "Weak-Field Limits of Black Hole Metrics from the KMOC formalism: Schwarzschild, Kerr, Reissner-Nordström, and Kerr-Newman", "abstract": "The KMOC (Kosower-Maybee-O'Connell) formalism establishes a bridge between quantum scattering amplitudes and classical observables in gravitational systems. In this work, we show how the weak-field limits of the four classical black hole metrics - Schwarzschild, Kerr, Reissner-Nordstrom, and Kerr-Newman - can be reproduced within this formalism. Starting from three-point amplitudes with exponential spin structure for both gravitational and electromagnetic interactions, we compute four-point scattering amplitudes and extract the momentum impulse via the KMOC formula. Matching these results with geodesic motion in a general metric allows us to reconstruct the metric components to leading order in G, a, and Q^2. For the Kerr-Newman case, we include interference terms between gravitational and electromagnetic interactions, which produce a Q^2 a/r^3 contribution to g_{t\\phi} that does not appear in the Kerr or Reissner-Nordstrom weak-field limits separately. Our results are consistent with those of arXiv:1907.00431 [hep-th], where the Kerr-Newman metric is derived from minimal coupling amplitudes using the KMOC formalism arXiv:1908.04342 [hep-th]. All results are verified through their consistency with the well-known full metrics, though we emphasize that the KMOC formalism as applied here reproduces only the weak-field expansions, not the complete non-linear solutions.", "url": "https://arxiv.org/abs/2604.05094", "type": "理论", "summary": "KMOC（Kosower-Maybee-O'Connell）形式主义在量子散射振幅和引力系统中的经典可观测量之间建立了一座桥梁。在这项工作中，我们展示了如何在这种形式主义中重现四种经典黑洞度量——史瓦西、克尔、赖斯纳-诺德斯特龙和克尔-纽曼——的弱场极限。从引力和电磁相互作用的指数自旋结构的三点振幅开始，我们计算四点散射振幅并通过 KMOC 公式提取动量冲量。将这些结果与一般度量中的测地运动相匹配，使我们能够将度量分量重建为 G、a 和 Q^2 中的前导顺序。对于 Kerr-Newman 情况，我们包括引力相互作用和电磁相互作用之间的干扰项，这些干扰项对 g_{t\\phi} 产生 Q^2 a/r^3 贡献，而该贡献不会单独出现在 Kerr 或 Reissner-Nordstrom 弱场极限中。我们的结果与 arXiv:1907.00431 [hep-th] 的结果一致，其中 Kerr-Newman 度量是使用 KMOC 形式主义 arXiv:1908.04342 [hep-th] 从最小耦合幅度导出的。\n\n所有结果都通过与众所周知的完整度量的一致性来验证，尽管我们强调此处应用的 KMOC 形式主义仅再现了弱场展开，而不是完整的非线性解决方案。", "authors": [{"name": "Jacobo Hernández C"}], "featured_authors": [{"name": "Jacobo Hernández C"}], "author_count": 1}, {"id": "2604.05103", "category": "hep-th", "title": "Untwisting the double copy: the zeroth copy as an optical seed", "abstract": "We present a historical optical foundation for stationary vacuum Kerr--Schild spacetimes on a flat background and interpret it in modern double-copy language. In this setting, a complex optical seed \\(\\rho=-\\theta-i\\omega\\), built from the expansion and signed twist of the Kerr--Schild congruence, is harmonic, while its inverse obeys an eikonal equation and reconstructs the congruence algebraically. Thus the local stationary geometry is organized by a single complex seed. In the overlap of the stationary Kerr--Schild and Petrov type--D Weyl double-copy framework, this seed furnishes a normalized representative of the zeroth-copy data, while its real part yields the Kerr--Schild profile and its gradient generates the single-copy gauge-field strength. The construction provides, without recourse to twistor methods, a spacetime realization of how a single complex seed builds the congruence, organizes the associated spacetime and gauge fields, and encodes the geometric content of the zeroth copy.", "url": "https://arxiv.org/abs/2604.05103", "type": "理论", "summary": "我们在平坦的背景上提出了静止真空克尔-希尔时空的历史光学基础，并用现代双拷贝语言对其进行了解释。在这种情况下，由 Kerr-Schild 同余的展开和有符号扭曲构建的复杂光学种子 \\(\\rho=-\\theta-i\\omega\\) 是调和的，而其逆矩阵则遵循 Eikonal 方程并以代数方式重建同余。因此，局部静止几何结构是由单个复杂种子组织的。在固定 Kerr-Schild 和 Petrov D 型 Weyl 双拷贝框架的重叠中，该种子提供了第零拷贝数据的归一化表示，而其实部产生 Kerr-Schild 轮廓，其梯度生成单拷贝规范场强度。该构造在不诉诸扭量方法的情况下提供了单个复杂种子如何构建同余、组织相关时空和规范场以及对第零个副本的几何内容进行编码的时空实现。", "authors": [{"name": "Damien A. Easson"}, {"name": "Michael J. Falato"}], "featured_authors": [{"name": "Damien A. Easson"}, {"name": "Michael J. Falato"}], "author_count": 2}, {"id": "2604.05139", "category": "hep-th", "title": "The double-logarithmic four-graviton Regge sector as a rank-two twisted period system", "abstract": "We study the double-logarithmic four-graviton Regge sector in $N$-extended supergravity. Its Mellin-space solution is already known in terms of parabolic-cylinder functions. We show that the same answer can be organized as a rank-two twisted period system, meaning that two closely related weighted integrals determine the full Mellin partial wave. These functions satisfy a simple pair of first-order differential equations and a recursion as the number of supersymmetries $N$ changes. This gives a uniform description of the full supergravity family, clarifies the relation between the positive-ray Euler integral and the earlier contour representation, and reproduces the same reduction rule through intersection theory. The reformulation also makes the special cases with four and six supersymmetries particularly transparent and yields a simple Hermite-polynomial construction for the low-even theories.", "url": "https://arxiv.org/abs/2604.05139", "type": "理论", "summary": "我们研究 $N$ 扩展超引力中的双对数四引力子 Regge 扇区。其梅林空间解决方案在抛物柱面函数方面已为人所知。我们表明，相同的答案可以组织为二阶扭曲周期系统，这意味着两个紧密相关的加权积分决定了完整的梅林部分波。这些函数满足一对简单的一阶微分方程和随着超对称性 $N$ 数量变化而递归。这给出了完整超重力族的统一描述，阐明了正射线欧拉积分和早期轮廓表示之间的关系，并通过交集理论再现了相同的简化规则。重新表述还使具有四个和六个超对称性的特殊情况变得特别透明，并为低偶理论提供了一个简单的埃尔米特多项式构造。", "authors": [{"name": "Agustín Sabio Vera"}], "featured_authors": [{"name": "Agustín Sabio Vera"}], "author_count": 1}, {"id": "2604.05173", "category": "hep-th", "title": "New-born strings are tensionless", "abstract": "We report a physical origin of tensionless strings, obtained by formulating string dynamics in finite-lifetime settings for the first time. Departing from the conventional paradigm of eternal strings, we construct an inertial worldsheet confined to a finite region of two-dimensional Minkowski spacetime, known as a causal diamond. This reveals a striking result: tensionless strings arise only at the moment of their birth. The ultra-shrinking limit of the diamond worldsheet realizes this birth configuration, thereby uncovering a new tensionless string phase characterized by a global, ultra-local Carrollian structure.", "url": "https://arxiv.org/abs/2604.05173", "type": "理论", "summary": "我们报告了无张力弦的物理起源，这是通过首次在有限寿命设置中制定弦动力学而获得的。与永恒弦的传统范式不同，我们构建了一个仅限于二维明可夫斯基时空有限区域（称为因果菱形）的惯性世界表。这揭示了一个惊人的结果：无张力弦仅在其诞生的那一刻出现。金刚石世界片的超收缩极限实现了这种诞生构型，从而揭示了一种新的无张力弦相，其特征是全局、超局部卡罗尔结构。", "authors": [{"name": "Sudip Karan"}, {"name": "Bibhas Ranjan Majhi"}], "featured_authors": [{"name": "Sudip Karan"}, {"name": "Bibhas Ranjan Majhi"}], "author_count": 2}, {"id": "2604.05262", "category": "hep-th", "title": "Residual Symmetries and Their Algebras in the Kerr-Schild Double Copy", "abstract": "The Kerr-Schild double copy (KSDC) is well-known for relating exact classical solutions between Yang-Mills theory and theories of gravity. However, whether this correspondence provides a more fundamental mapping between the underlying symmetries of gauge theory and gravity remains an underdeveloped area of research in the contemporary double copy program. In this paper, we demonstrate that the KSDC correspondence does not provide a mapping between the residual symmetry structures of the Kerr-Schild ansatz in Yang-Mills theory and gravity. On the gauge theory side, residual symmetries form an infinite-dimensional algebra of functions along null directions. On the gravitational side, residual diffeomorphisms preserving the Kerr-Schild form of the Schwarzschild metric generate a conformal algebra on $S^2$, which decomposes into Killing vectors and proper conformal Killing vectors (CKVs). While the Killing sector reproduces the expected global isometries, the CKV sector yields an infinite-dimensional algebra after imposing asymptotic flatness and horizon regularity. This appears to contradict the fact that the Schwarzschild solution admits no proper conformal symmetries. We resolve this apparent contradiction by constructing a Weyl-compensated BRST complex, showing that the CKV sector is BRST-exact and therefore trivial in cohomology, so that the physical symmetry algebra reduces to the global isometries of Schwarzschild. This demonstrates that the KSDC introduces an enlarged symmetry structure at the level of the ansatz, but preserves physical symmetries after a cohomological reduction, revealing a fundamental mismatch between Yang-Mills and gravity at the level of residual symmetries.", "url": "https://arxiv.org/abs/2604.05262", "type": "理论", "summary": "Kerr-Schild 双副本 (KSDC) 因关联杨-米尔斯理论和引力理论之间的精确经典解而闻名。然而，这种对应关系是否提供了规范理论和引力的基本对称性之间更基本的映射仍然是当代双拷贝程序中尚未开发的研究领域。在本文中，我们证明 KSDC 对应关系并未提供杨-米尔斯理论中 Kerr-Schild ansatz 的剩余对称结构与引力之间的映射。在规范理论方面，残差对称性形成沿零方向的函数的无限维代数。在引力方面，保留 Schwarzschild 度量的 Kerr-Schild 形式的残差微分同胚在 $S^2$ 上生成一个共形代数，它分解为 Killing 向量和真共形 Killing 向量 (CKV)。 Killing 扇区再现了预期的全局等距，而 CKV 扇区在施加渐近平坦性和视界正则性后产生无限维代数。这似乎与史瓦西解不承认适当的共角对称这一事实相矛盾。\n\n我们通过构造 Weyl 补偿的 BRST 复形来解决这个明显的矛盾，表明 CKV 扇区是 BRST 精确的，因此在上同调上是微不足道的，因此物理对称代数简化为 Schwarzschild 的全局等距。这表明 KSDC 在拟像水平上引入了扩大的对称结构，但在上同调约简后保留了物理对称性，揭示了杨米尔斯和引力在剩余对称性水平上的根本不匹配。", "authors": [{"name": "B. P. Holton"}], "featured_authors": [{"name": "B. P. Holton"}], "author_count": 1}, {"id": "2604.05447", "category": "hep-th", "title": "Kerr-Schild Double Copy of the Randall-Sundrum Black String", "abstract": "We construct the Kerr-Schild classical double copy of the black string in the Randall-Sundrum II model, deriving the single and zeroth copies, and verifying the associated field equations. The single copy gauge field is independent of the holographic coordinate and satisfies a sourceless Maxwell equation on the curved background, in direct analogy with the Coulomb field of the Schwarzschild double copy. The zeroth copy scalar obeys a modified Klein-Gordon equation with a first-order derivative term along the extra dimension; a field redefinition yields a standard Klein-Gordon equation with effective mass $m^2 = 12/l^2$, induced by the warp factor. We further show that an alternative Kerr-Schild splitting, gravitationally equivalent to the canonical one, produces a physically inequivalent double copy: the gauge field is supported by a conserved but delocalized bulk current, and the zeroth copy satisfies a massless equation that carries no imprint of the warped extra dimension.", "url": "https://arxiv.org/abs/2604.05447", "type": "理论", "summary": "我们在 Randall-Sundrum II 模型中构造了黑弦的 Kerr-Schild 经典双副本，推导了单副本和第零副本，并验证了相关的场方程。单拷贝规范场与全息坐标无关，并且满足弯曲背景上的无源麦克斯韦方程，与史瓦西双拷贝的库仑场直接类比。第零个复制标量遵循修正的 Klein-Gordon 方程，其中沿额外维度具有一阶导数项；场重新定义产生由扭曲因子引起的有效质量 $m^2 = 12/l^2$ 的标准 Klein-Gordon 方程。我们进一步表明，另一种克尔希尔分裂（在引力上与规范分裂相同）会产生物理上不等价的双副本：规范场由守恒但离域的大电流支持，第零个副本满足无质量方程，不带有扭曲额外维度的印记。", "authors": [{"name": "Jesús A. Rodríguez"}], "featured_authors": [{"name": "Jesús A. Rodríguez"}], "author_count": 1}, {"id": "2604.05538", "category": "hep-th", "title": "Phase Transitions in Primary Hair Planar Black Holes and Solitons", "abstract": "We present a new family of Ricci-flat black hole and soliton solutions with primary scalar hair in asymptotically anti-de Sitter (AdS) space in $D$ dimensions. By solving the coupled Einstein-scalar field equations, we obtain analytic planar hairy black hole and soliton geometries. In these solutions, the scalar field and curvature scalars remain regular everywhere. We also derive analytic expressions for the mass and free energy, which indicate that the hairy soliton represents the ground state of the system. We further analyze the phase transitions between the hairy black hole and the hairy soliton, and find that there exists a first-order phase transition between them, with the transition point controlled by the ratio of the periods of Euclidean time and compact spacelike cycle. We further analyze how the scalar hair affects the transition temperature, and find that the temperature window in which the soliton phase remains preferred expands as the hair parameter increases. The hairy soliton solution obtained here is partly motivated by holographic QCD and may provide a useful gravitational background for modeling the confined phase of QCD from a bottom-up holographic perspective.", "url": "https://arxiv.org/abs/2604.05538", "type": "理论", "summary": "我们提出了一系列新的 Ricci 平坦黑洞和孤子解决方案，其在 $D$ 维度的渐近反德西特 (AdS) 空间中具有初级标量毛。通过求解耦合的爱因斯坦标量场方程，我们获得了解析平面毛状黑洞和孤子几何结构。在这些解中，标量场和曲率标量在各处都保持规则。我们还推导了质量和自由能的解析表达式，这表明毛孤子代表了系统的基态。我们进一步分析了毛状黑洞和毛状孤子之间的相变，发现它们之间存在一阶相变，其转变点由欧几里德时间和紧致空旋周期的周期比控制。我们进一步分析了标量毛发如何影响转变温度，并发现随着毛发参数的增加，孤子相保持优选的温度窗口扩大。\n\n这里获得的毛状孤子解部分是由全息 QCD 驱动的，并且可以为从自下而上的全息角度建模 QCD 的受限相提供有用的引力背景。", "authors": [{"name": "Som Abhisek Mohanty"}, {"name": "Subhash Mahapatra"}], "featured_authors": [{"name": "Som Abhisek Mohanty"}, {"name": "Subhash Mahapatra"}], "author_count": 2}, {"id": "2604.05630", "category": "hep-th", "title": "Symmetry-resolved Krylov Complexity and the Uncoloured Tensor Model", "abstract": "The symmetry-resolved Krylov complexity is a useful tool in studying chaotic properties of systems that are endowed with symmetries. We investigate the conditions under which an invariant operator would have the symmetry-resolved Krylov complexity in a charge subspace identical to the Krylov complexity of the full operator. Further, we study the Krylov complexity of the Uncoloured Tensor Model, a disorder-free kin of the SYK Model which has a plethora of symmetries. We find charge subspaces of the same operator in which the equipartition holds as well as where it doesn't. We also find that within the computational limits, the Krylov complexity averaged over the symmetry subspace is bounded above by that of the operator in the full space.", "url": "https://arxiv.org/abs/2604.05630", "type": "理论", "summary": "对称性解析的克雷洛夫复杂度是研究具有对称性的系统的混沌特性的有用工具。我们研究了不变算子在电荷子空间中具有与完整算子的 Krylov 复杂度相同的对称解析 Krylov 复杂度的条件。此外，我们研究了无色张量模型的 Krylov 复杂性，该模型是 SYK 模型的无序亲属，具有大量的对称性。我们找到了同一个算子的电荷子空间，其中均分成立的地方以及不成立的地方。我们还发现，在计算限制内，对称子空间上平均的 Krylov 复杂度受到整个空间中算子复杂度的限制。", "authors": [{"name": "Shaliya Kotta"}, {"name": "P N Bala Subramanian"}], "featured_authors": [{"name": "Shaliya Kotta"}, {"name": "P N Bala Subramanian"}], "author_count": 2}, {"id": "2604.05641", "category": "hep-th", "title": "Causal Dynamical Triangulations: New Lattice Theory of Quantum Gravity", "abstract": "Causal Dynamical Triangulations (CDT) is a methodology to define and compute the gravitational path integral, whose aim is a fully fledged nonperturbative quantum field theory of gravity and spacetime. Analogous to lattice formulations of nongravitational quantum fields, CDT provides a blueprint for lattice quantum gravity, where - crucially - the dynamical, curved and causal nature of spacetime is built into the structure of the lattices from the outset. The regularized path integral involves a sum over triangulated spacetimes, each assembled from flat, Minkowskian building blocks. The degrees of freedom of general relativity are encoded in a coordinate-free manner in the neighbourhood relations of the building blocks and the length of their edges, which also serves as a short-distance cutoff. A well-defined Wick rotation makes this path integral amenable to Monte Carlo simulations. Despite the absence of an a priori preferred background geometry, numerical experiments have revealed the dynamical emergence of a quantum universe near the Planck scale. Its global properties are compatible with those of a de Sitter space, providing strong evidence for a well-defined classical limit. At the same time, large quantum fluctuations lead to unexpected properties on short scales, most prominently, a spectral dimension near 2, replacing the classical value of 4. Computer simulations indicate the presence of an ultraviolet fixed point under renormalization, opening the door to a nontrivial continuum theory. Efforts are under way to construct observables that can elucidate the nonperturbative quantum origins of early-universe cosmology.", "url": "https://arxiv.org/abs/2604.05641", "type": "理论", "summary": "因果动力三角测量 (CDT) 是一种定义和计算引力路径积分的方法，其目标是建立一个成熟的引力和时空非微扰量子场论。与非引力量子场的晶格公式类似，CDT 为晶格量子引力提供了蓝图，其中至关重要的是，时空的动态、弯曲和因果性质从一开始就内置于晶格结构中。正则化路径积分涉及三角时空的总和，每个时空都由平坦的闵可夫斯基构建块组装而成。广义相对论的自由度以无坐标的方式编码在构建块的邻域关系及其边缘的长度中，这也充当短距离截止。明确定义的灯芯旋转使得该路径积分适合蒙特卡罗模拟。尽管缺乏先验的首选背景几何形状，数值实验已经揭示了普朗克尺度附近的量子宇宙的动态出现。它的全局属性与德西特空间的属性兼容，为明确定义的经典极限提供了有力的证据。\n\n与此同时，大的量子涨落会导致短尺度上意想不到的特性，最突出的是，光谱维数接近 2，取代了经典值 4。计算机模拟表明重整化下存在紫外不动点，这为非平凡的连续统理论打开了大门。人们正在努力构建可观测的物体，以阐明早期宇宙宇宙学的非微扰量子起源。", "authors": [{"name": "J. Ambjørn"}, {"name": "R. Loll"}], "featured_authors": [{"name": "J. Ambjørn"}, {"name": "R. Loll"}], "author_count": 2}, {"id": "2604.05676", "category": "hep-th", "title": "Vortex Harmonic Spinors on the Nappi-Witten Space", "abstract": "We establish a correspondence between vortex equations on flat Riemann surfaces and harmonic spinors on the Nappi--Witten space, the group manifold of a central extension of the Euclidean group $SE(2)$. Vortex configurations lift naturally to this setting, producing explicit solutions of a twisted Dirac equation. Using the conformal flatness of the Nappi--Witten metric, these solutions induce harmonic spinors on four-dimensional Minkowski space. This yields a geometric construction of Abelian magnetic zero-modes on flat Minkowski spacetime from vortex data.", "url": "https://arxiv.org/abs/2604.05676", "type": "理论", "summary": "我们建立了平坦黎曼曲面上的涡旋方程与纳皮-维滕空间（欧几里得群 $SE(2)$ 的中心扩展的群流形）上的调和旋量之间的对应关系。涡旋结构自然地提升到这种设置，产生扭曲狄拉克方程的显式解。利用 Nappi--Witten 度量的共形平坦度，这些解在四维 Minkowski 空间上引起谐波旋量。这会根据涡旋数据在平坦的闵可夫斯基时空上产生阿贝尔磁零模式的几何构造。", "authors": [{"name": "Calum Ross"}, {"name": "Raúl Sánchez Galán"}], "featured_authors": [{"name": "Calum Ross"}, {"name": "Raúl Sánchez Galán"}], "author_count": 2}, {"id": "2604.05696", "category": "hep-th", "title": "Monodromy-Matrix Description of Extremal Multi-centered Black Holes", "abstract": "We study solution-generating techniques based on the Breitenlohner--Maison linear system for extremal, stationary biaxisymmetric black hole solutions in five-dimensional $U(1)^3$ supergravity. Focusing on multi-center configurations over a Gibbons--Hawking base, we analyze both BPS and almost-BPS solutions, including rotating single-center black holes and two-center black rings. After dimensional reduction to three dimensions, the system is described by a coset sigma model with target space $SO(4,4)/[SO(2,2)\\times SO(2,2)]$, where solutions are encoded in coset and monodromy matrices. For Bena--Warner BPS solutions, we construct the coset and monodromy matrices and show that they admit an exponential representation governed by nilpotent elements. Although the monodromy matrices generically exhibit double poles, they can be factorized explicitly using the nilpotent algebra of $\\mathfrak{so}(4,4)$, reconstructing the solutions. We extend this to almost-BPS solutions and derive the corresponding matrices. While the single-center case exhibits commuting residues, the two-center black ring leads to a more intricate structure with a third-order pole, which disappears when regularity is imposed. Finally, we analyze the extremal limits of the Rasheed--Larsen solution, where the fast-rotating branch is governed by idempotent elements. We also construct an explicit $SO(4,4)$ duality transformation relating the slowly-rotating branch to a single-center almost-BPS solution. These results will provide the BM formalism as a unified framework for extremal multi-center black holes.", "url": "https://arxiv.org/abs/2604.05696", "type": "理论", "summary": "我们研究基于 Breitenlohner-Maison 线性系统的解生成技术，用于五维 $U(1)^3$ 超重力中的极值、固定双轴对称黑洞解。我们重点关注吉本斯-霍金基上的多中心配置，分析了 BPS 和近 BPS 解决方案，包括旋转单中心黑洞和双中心黑环。降维到三维后，系统由目标空间 $SO(4,4)/[SO(2,2)\\times SO(2,2)]$ 的陪集 sigma 模型描述，其中解被编码为陪集和单调矩阵。对于 Bena-Warner BPS 解决方案，我们构造了陪集和单向矩阵，并证明它们承认由幂零元素控制的指数表示。尽管单向矩阵通常表现出双极点，但它们可以使用 $\\mathfrak{so}(4,4)$ 的幂零代数显式分解，从而重建解。我们将其扩展到近 BPS 解并推导相应的矩阵。\n\n虽然单中心情况表现出交换残差，但两中心黑环导致了具有三阶极点的更复杂的结构，当施加正则性时，该结构就会消失。最后，我们分析了 Rasheed-Larsen 解的极值极限，其中快速旋转分支由幂等元控制。我们还构建了一个显式的 $SO(4,4)$ 对偶变换，将缓慢旋转的分支与单中心近 BPS 解决方案相关联。这些结果将为 BM 形式主义提供作为极值多中心黑洞的统一框架。", "authors": [{"name": "Jun-ichi Sakamoto"}, {"name": "Shinya Tomizawa"}], "featured_authors": [{"name": "Jun-ichi Sakamoto"}, {"name": "Shinya Tomizawa"}], "author_count": 2}, {"id": "2604.05815", "category": "hep-th", "title": "Probing the Factorized Island Branch with the Capacity of Entanglement in JT Gravity", "abstract": "Black hole islands are usually diagnosed through the von Neumann entropy, but the full replica saddle contains more information than survives in the limit $n \\to 1$. In this paper we show that the capacity of entanglement can detect that extra structure already within the controlled factorized island branch of JT gravity coupled to a large-$c$ bath. In the late-time high-temperature regime, the entropy plateau remains unchanged at the first nontrivial order, while the capacity acquires a definite correction. This provides a sharp semiclassical example in which nearby replica data are physically meaningful even when the entropy itself appears rigid. Our result shows that the factorized island saddle already carries finite-$n$ information beyond the entropy, and that the capacity is a natural observable for exposing it. More broadly, it highlights that the physics of island saddles is not exhausted by the $n=1$ limit: the surrounding replica geometry can contain additional, and observable, information about how the semiclassical saddle is assembled.", "url": "https://arxiv.org/abs/2604.05815", "type": "理论", "summary": "黑洞岛通常通过冯·诺依曼熵来诊断，但完整的副本鞍包含的信息比在 $n \\to 1$ 的限制中幸存的信息更多。在本文中，我们证明了纠缠的能力可以检测到 JT 重力的受控因式分解岛分支内已经存在的额外结构，该分支与大型 $c$ 浴相耦合。在后期高温状态下，熵平台在第一非平凡阶保持不变，而容量得到了明确的修正。这提供了一个尖锐的半经典示例，其中即使熵本身看起来是刚性的，附近的副本数据也具有物理意义。我们的结果表明，因式分解岛鞍已经携带了超出熵的有限$n$信息，并且容量是暴露它的自然可观测值。更广泛地说，它强调了岛鞍的物理原理并没有被 $n=1$ 限制所耗尽：周围的复制品几何形状可以包含有关如何组装半经典鞍的附加且可观察的信息。", "authors": [{"name": "Raúl Arias"}, {"name": "Agustín Tamis"}], "featured_authors": [{"name": "Raúl Arias"}, {"name": "Agustín Tamis"}], "author_count": 2}, {"id": "2604.05878", "category": "hep-th", "title": "Exact WKB analysis of inverted triple-well: resonance, PT-symmetry breaking, and resurgence", "abstract": "We study non-Hermitian quantum mechanics of an inverted triple-well potential within the exact WKB framework. For a single classical potential, different Siegert boundary conditions define three distinct quantum problems: the PT-symmetric, resonance, and anti-resonance systems. For each case, we derive the exact quantization condition and construct the associated trans-series solution. By identifying the resurgent structures and cancellations in these non-Hermitian setups, we obtain the median-summed series, clarifying when the spectra are real or complex in accordance with the physical properties of each system. Establishing explicit links to the semi-classical path integral formalism, we elucidate the roles of bounce and bion configurations in these non-Hermitian systems. This analysis predicts PT-symmetry breaking, which we also verify numerically. Using the median quantization conditions, we prove the existence of this symmetry breaking and establish an exact equation for the exceptional point, which emerges as a remarkably simple algebraic relation between the bounce and bion actions. We further show that the median-summed non-perturbative correction to the spectrum vanishes at the exceptional point, while the resurgent structure survives through a universal minimal trans-series. For the resonance and anti-resonance systems, we find that the exact median-summed spectra are related by complex conjugation, representing time reversal in this setting, are necessarily complex, and do not exhibit an exceptional point. Although their spectra differ significantly from the PT-symmetric case, they share the same minimal trans-series. By maintaining explicit links with the path integral saddles and the formal theory of resurgence, our analysis provides a unified and general perspective on the quantization of non-Hermitian theories.", "url": "https://arxiv.org/abs/2604.05878", "type": "理论", "summary": "我们在精确的 WKB 框架内研究倒置三阱势的非厄米量子力学。对于单个经典势​​，不同的 Siegert 边界条件定义了三个不同的量子问题：PT 对称系统、共振系统和反共振系统。对于每种情况，我们推导出精确的量化条件并构建相关的跨系列解决方案。通过识别这些非厄米特设置中的复活结构和抵消，我们获得了中值求和序列，根据每个系统的物理特性澄清光谱何时是实数或复数。通过与半经典路径积分形式建立明确的联系，我们阐明了弹跳和生物粒子配置在这些非厄米系统中的作用。该分析预测了 PT 对称性破缺，我们也通过数值验证了这一点。使用中值量化条件，我们证明了这种对称性破缺的存在，并为异常点建立了精确的方程，该方程表现为弹跳和生物行为之间非常简单的代数关系。\n\n我们进一步表明，对谱的中值总和非微扰校正在异常点处消失，而复兴的结构通过通用最小跨系列而得以幸存。对于共振和反共振系统，我们发现精确的中值求和谱通过复共轭相关，代表这种情况下的时间反转，必然是复杂的，并且不表现出异常点。尽管它们的光谱与 PT 对称情况显着不同，但它们具有相同的最小跨级数。通过与路径积分鞍和复兴的形式理论保持明确的联系，我们的分析为非厄​​米理论的量化提供了统一且普遍的视角。", "authors": [{"name": "Syo Kamata"}, {"name": "Tatsuhiro Misumi"}, {"name": "Cihan Pazarbaşı"}, {"name": "Hidetoshi Taya"}], "featured_authors": [{"name": "Syo Kamata"}, {"name": "Tatsuhiro Misumi"}, {"name": "Cihan Pazarbaşı"}, {"name": "Hidetoshi Taya"}], "author_count": 4}, {"id": "2604.05889", "category": "hep-th", "title": "Edge modes in Chern-Simons theory on a strip", "abstract": "We investigate abelian Chern-Simons gauge theory on a strip geometry with two spatial boundaries. In the presence of boundaries, gauge invariance is broken by boundary conditions, leading to physical edge excitations. By deriving the most general local boundary conditions consistent with power counting in the sense of Symanzik, we show that the bulk equations of motion determine the boundary degrees of freedom through a broken gauge Ward identity, yielding boundary Kac-Moody current algebras with opposite central charges on the two edges. The corresponding two-dimensional boundary actions are of Tomonaga-Luttinger type and describe chiral bosons propagating in opposite directions along the two boundaries. A consistency condition, interpreted as a holographic-like bulk-boundary matching, relates the Chern-Simons coupling constant and the boundary parameters to the physical edge velocities. Within this framework, the equality and opposite sign of the two velocities in a symmetric setup follow directly from the boundary structure rather than from model-dependent assumptions about confining potentials, and the velocities are independent of the strip width. Our analysis provides a fully field-theoretic realization of bulk-boundary correspondence in Chern-Simons theory with two boundaries, with direct applications to edge physics in quantum Hall systems and related topological/hydrodynamic settings.", "url": "https://arxiv.org/abs/2604.05889", "type": "理论", "summary": "我们研究了具有两个空间边界的带状几何上的阿贝尔陈-西蒙斯规范理论。在存在边界的情况下，规范不变性会被边界条件打破，导致物理边缘激励。通过推导与 Symanzik 意义上的功率计数一致的最一般的局部边界条件，我们表明体运动方程通过破碎的规范 Ward 恒等式确定边界自由度，产生边界 Kac-Moody 电流代数，在两个边缘上具有相反的中心电荷。相应的二维边界作用是 Tomonaga-Luttinger 类型，描述了沿着两个边界以相反方向传播的手性玻色子。一致性条件（解释为类全息体边界匹配）将 Chern-Simons 耦合常数和边界参数与物理边缘速度联系起来。在此框架内，对称设置中两个速度的相等和相反符号直接来自边界结构，而不是来自关于限制势的模型相关假设，并且速度与带材宽度无关。\n\n我们的分析提供了陈-西蒙斯理论中具有两个边界的体边界对应的完全场论实现，可直接应用于量子霍尔系统中的边缘物理和相关的拓扑/流体动力学设置。", "authors": [{"name": "Erica Bertolini"}, {"name": "Michael Doyle"}, {"name": "Nicola Maggiore"}, {"name": "Conor Murphy"}, {"name": "Carlotta Piras"}], "featured_authors": [{"name": "Erica Bertolini"}, {"name": "Michael Doyle"}, {"name": "Nicola Maggiore"}, {"name": "Conor Murphy"}, {"name": "Carlotta Piras"}], "author_count": 5}, {"id": "2604.05901", "category": "hep-th", "title": "Geodesics from Quantum Field Theory: A Case Study in AdS", "abstract": "Localized one-particle states of a quantum field theory--whether in flat space or on a curved background--are expected to exhibit geodesic motion in an appropriate semiclassical regime. This expectation is often invoked heuristically: in this work we develop two precise implementations and test them in detail in global AdS$_3$. First, we define a covariant ''center-of-mass'' trajectory from the expectation value of the stress tensor operator and show, using only $\\nabla_\\mu\\langle T^{\\mu\\nu}\\rangle=0$, that it obeys the geodesic equation in the monopole (sufficiently localized) approximation in a general spacetime. This provides a QFT-in-curved-spacetime generalization of the Mathisson-Papapetrou-Dixon framework in classical general relativity. Second, we construct position operators from the Klein--Gordon inner product and mode completeness, and compute their expectation values in generic single-particle wave packet states. We then build explicit normalizable wave packets of a free scalar field in empty AdS$_3$ with tunable energy and angular momentum, and demonstrate analytically and numerically that both prescriptions reproduce the expected radial, circular, and elliptical-like timelike and null geodesics. Our discussion also isolates a natural ultra-relativistic regime in which the wave packet trajectory exhibits a controlled crossover from timelike to null geodesic behavior. We identify precise limits where the localized geodesic interpretation of the wave packet breaks down. On the CFT side, we show that bulk localization--specifically the radial data--is captured by how the state is distributed over global descendants of the dual primary.", "url": "https://arxiv.org/abs/2604.05901", "type": "理论", "summary": "量子场论的局域单粒子态——无论是在平坦空间中还是在弯曲背景上——预计会在适当的半经典状态下表现出测地线运动。这种期望经常被启发式地调用：在这项工作中，我们开发了两个精确的实现，并在全局 AdS$_3$ 中详细测试它们。首先，我们根据应力张量算子的期望值定义协变“质心”轨迹，并仅使用 $\\nabla_\\mu\\langle T^{\\mu\\nu}\\rangle=0$ 来证明它遵循一般时空中单极子（充分局域化）近似中的测地线方程。这提供了经典广义相对论中 Mathisson-Papapetrou-Dixon 框架的弯曲时空 QFT 推广。其次，我们根据 Klein-Gordon 内积和模态完整性构造位置算子，并计算它们在通用单粒子波包状态下的期望值。\n\n然后，我们在空 AdS$_3$ 中构建具有可调谐能量和角动量的自由标量场的显式可归一化波包，并通过分析和数值证明这两种方法都再现了预期的径向、圆形和类椭圆形时空测地线。我们的讨论还隔离了一种自然的超相对论状态，其中波包轨迹表现出从类时到零测地线行为的受控交叉。我们确定了波包局部测地线解释失效的精确限制。在 CFT 方面，我们展示了批量本地化（特别是径向数据）是通过状态如何分布在双主的全局后代上来捕获的。", "authors": [{"name": "Vaibhav Burman"}, {"name": "Chethan Krishnan"}, {"name": "Livesh Parajuli"}], "featured_authors": [{"name": "Vaibhav Burman"}, {"name": "Chethan Krishnan"}, {"name": "Livesh Parajuli"}], "author_count": 3}, {"id": "2604.05919", "category": "hep-th", "title": "${\\cal N}=4$ supersymmetric Yang-Mills thermodynamics to order $λ^{5/2}$", "abstract": "We calculate the resummed perturbative free energy of ${\\cal N} = 4$ supersymmetric Yang-Mills in four spacetime dimensions (SYM$_{44}$) to order $\\lambda^{5/2}$ in the 't Hooft coupling at finite temperature and zero chemical potential. All infrared divergences cancel when we include contributions from SYM$_{44}$ ring diagrams and the final result is both ultraviolet and infrared finite. Our result has special significance since order $\\lambda^{5/2}$ is the highest order calculation that can be done with perturbation theory, because there are nonperturbative effects associated with the magnetic mass scale that come into play at order $\\lambda^3$. We compare results obtained with regularization by dimensional reduction (RDR), which preserves supersymmetry, and canonical dimensional regularization (DR). We also compare with a generalized Padé approximant constructed by matching the weak coupling result at order $\\lambda^2$ and the large $N_c$ strong coupling result at order $\\lambda^{-3/2}$. Finally we make a comparison between our result and the QCD free energy and show that SYM$_{44}$ has better convergence properties.", "url": "https://arxiv.org/abs/2604.05919", "type": "理论", "summary": "我们计算了 ${\\cal N} = 4$ 超对称杨米尔斯在四个时空维度 (SYM$_{44}$) 中恢复的微扰自由能 (SYM$_{44}$)，以在有限温度和零化学势下的 't Hooft 耦合中订购 $\\lambda^{5/2}$。当我们包括 SYM$_{44}$ 环图的贡献时，所有红外发散都会取消，并且最终结果是紫外和红外有限的。我们的结果具有特殊意义，因为$\\lambda^{5/2}$阶是可以用微扰理论完成的最高阶计算，因为存在与在$\\lambda^3$阶上发挥作用的磁质量尺度相关的非微扰效应。我们比较了通过降维正则化（RDR）（保留超对称性）和规范维度正则化（DR）获得的结果。我们还与通过匹配 $\\lambda^2$ 阶弱耦合结果和 $\\lambda^{-3/2}$ 阶大 $N_c$ 强耦合结果构造的广义 Padé 近似进行比较。最后我们将结果与 QCD 自由能进行比较，结果表明 SYM$_{44}$ 具有更好的收敛性。", "authors": [{"name": "Margaret E. Carrington"}, {"name": "Gabor Kunstatter"}, {"name": "Ubaid Tantary"}], "featured_authors": [{"name": "Margaret E. Carrington"}, {"name": "Gabor Kunstatter"}, {"name": "Ubaid Tantary"}], "author_count": 3}, {"id": "2604.05950", "category": "hep-th", "title": "The 't Hooft loop from a center-vortex wave functional", "abstract": "Previously, we proposed an infrared vacuum wave functional for $SU(N)$ Yang-Mills theory peaked at thin center vortices and showed that it yields an area law for the Wilson loop. In this work, we use this wave functional to calculate the spatial 't Hooft loop, for which we find a perimeter law, in accordance with 't Hooft's criterion for confinement.", "url": "https://arxiv.org/abs/2604.05950", "type": "理论", "summary": "之前，我们提出了 $SU(N)$ Yang-Mills 理论的红外真空波泛函，其在薄中心涡旋处达到峰值，并表明它产生了威尔逊环的面积定律。在这项工作中，我们使用该波函数来计算空间 't Hooft 环，并根据 't Hooft 约束准则找到了周长定律。", "authors": [{"name": "D. R. Junior"}, {"name": "L. E. Oxman"}, {"name": "H. Reinhardt"}], "featured_authors": [{"name": "D. R. Junior"}, {"name": "L. E. Oxman"}, {"name": "H. Reinhardt"}], "author_count": 3}, {"id": "2604.05970", "category": "hep-th", "title": "Holographic entanglement entropy, Wilson loops, and neural networks", "abstract": "We apply artificial neural networks to the holographic inverse problem, reconstructing bulk geometry from boundary entanglement entropy by using the Ryu--Takayanagi area functional as a differentiable loss. Validated on the AdS-Schwarzschild background, this approach recovers the blackening factor to 1.7% accuracy. For finite-density backgrounds like the Gubser--Rocha model, we demonstrate that strip entanglement entropy determines only the spatial metric. We resolve this exact one-function degeneracy by incorporating holographic Wilson loop data, which couples to the timelike metric. We present a semi-analytical inversion combining Bilson's and Hashimoto's formulas, alongside a general three-network variational method minimizing the combined area and Nambu--Goto actions. The neural network achieves sub-0.2% accuracy for both metric functions without closed-form derivative relations, establishing a flexible framework for integrating multiple holographic observables.", "url": "https://arxiv.org/abs/2604.05970", "type": "理论", "summary": "我们将人工神经网络应用于全息逆问题，通过使用 Ryu-Takayanagi 区域函数作为可微损失，从边界纠缠熵重建体几何。该方法在 AdS-Schwarzschild 背景上进行了验证，将黑化因子恢复到 1.7% 的准确度。对于像 Gubser-Rocha 模型这样的有限密度背景，我们证明带状纠缠熵仅决定空间度量。我们通过结合全息威尔逊环数据来解决这种精确的单函数简并性，该数据与类时度量相耦合。我们提出了结合 Bilson 和 Hashimoto 公式的半解析反演，以及最小化组合面积和 Nambu-Goto 动作的通用三网络变分方法。该神经网络在没有封闭式导数关系的情况下，两个度量函数的准确度都达到了 0.2% 以下，从而建立了一个用于集成多个全息可观测值的灵活框架。", "authors": [{"name": "Veselin G. Filev"}], "featured_authors": [{"name": "Veselin G. Filev"}], "author_count": 1}, {"id": "2604.05972", "category": "hep-th", "title": "Background Fields Meet the Heat Kernel: Gauge Invariance and RGEs without diagrams", "abstract": "We introduce a new method that exploits the combination of the Heat Kernel (HK) and Background Field Method to compute gauge-invariant and gauge parameter-independent quantities such as the effective potential, anomalous dimensions, and renormalization group equations. In contrast to currently employed techniques, these results are obtained exclusively from the dynamics of the background fields, without relying on supplementary input from, e.g., traditional diagrammatic calculations. This is achieved by a consistent treatment of open and closed derivatives in the HK expansions. In this way, we compute the standard quantities such as $\\beta$ functions and their gauge-parameter independence when background fields are on-shell. We demonstrate this formalism for instructive examples such as Scalar QED and Yukawa theory. Full results for the bosonic part of the Standard Model provide further validation of our approach.", "url": "https://arxiv.org/abs/2604.05972", "type": "理论", "summary": "我们引入了一种新方法，它利用热核 (HK) 和背景场方法的组合来计算规范不变和规范参数无关的量，例如有效势、反常维数和重正化群方程。与当前采用的技术相比，这些结果完全是从背景场的动态中获得的，而不依赖于来自例如传统图表计算的补充输入。这是通过在香港扩张中对开放式和封闭式衍生品进行一致处理来实现的。通过这种方式，我们可以计算标准量，例如 $\\beta$ 函数及其当背景场在壳上时的规范参数独立性。我们通过标量量子电动力学和汤川理论等具有指导意义的例子证明了这种形式主义。标准模型玻色子部分的完整结果进一步验证了我们的方法。", "authors": [{"name": "Debanjan Balui"}, {"name": "Joydeep Chakrabortty"}, {"name": "Christoph Englert"}, {"name": "Subhendra Mohanty"}, {"name": "Tushar"}], "featured_authors": [{"name": "Debanjan Balui"}, {"name": "Joydeep Chakrabortty"}, {"name": "Christoph Englert"}, {"name": "Subhendra Mohanty"}, {"name": "Tushar"}], "author_count": 5}, {"id": "2604.06009", "category": "hep-th", "title": "Are Black Holes Fuzzballs? Probing Horizon-Scale Structure with LISA", "abstract": "Gravitational waves provide a unique probe of the strong-field regime of gravity, offering access to physics beyond the classical black hole paradigm. We explore how space-based observations of extreme-mass-ratio inspirals (EMRIs) by the Laser Interferometer Space Antenna (LISA) can be used to test the fuzzball proposal, a quantum gravity-inspired alternative to Kerr black holes. By introducing generic multipolar deformations encoding potential symmetry breakings and performing a systematic parameter estimation analysis, we forecast LISA's ability to constrain deviations from the Kerr geometry in the near-horizon region. We show that EMRI signals with realistic signal-to-noise ratios can constrain multiple higher-order multipoles at levels orders of magnitude beyond current electromagnetic and ground-based gravitational-wave bounds, opening a new observational window onto horizon-scale structure. In particular, we find that LISA can constrain generic non-axisymmetric mass quadrupole deformations at the $10^{-3}$ level and axisymmetric mass octupole deformations at the $10^{-2}$ level, providing concrete observational targets for identifying fuzzball geometries. Our results demonstrate that precision measurements of EMRI waveforms will transform LISA into a powerful laboratory for fundamental physics and offer the first direct empirical constraints on quantum-gravity-motivated models of compact objects.", "url": "https://arxiv.org/abs/2604.06009", "type": "理论", "summary": "引力波提供了对重力强场状态的独特探测，提供了超越经典黑洞范式的物理学途径。我们探索如何使用激光干涉仪空间天线（LISA）对极端质量比螺旋（EMRI）进行天基观测来测试模糊球提议，这是一种受量子引力启发的克尔黑洞替代方案。通过引入编码潜在对称性破缺的通用多极变形并执行系统参数估计分析，我们预测 LISA 能够限制近地平线区域中克尔几何的偏差。我们证明，具有真实信噪比的 EMRI 信号可以将多个高阶多极子限制在超出当前电磁和地面引力波界限的数量级上，从而为水平尺度结构打开一个新的观测窗口。特别是，我们发现 LISA 可以在 $10^{-3}$ 水平约束通用非轴对称质量四极变形，在 $10^{-2}$ 水平约束轴对称质量八极变形，为识别模糊球几何形状提供具体的观测目标。\n\n我们的结果表明，EMRI 波形的精确测量将使 LISA 转变为强大的基础物理实验室，并为致密物体的量子引力驱动模型提供第一个直接的经验约束。", "authors": [{"name": "Pablo F. Muguruza"}, {"name": "Carlos F. Sopuerta"}], "featured_authors": [{"name": "Pablo F. Muguruza"}, {"name": "Carlos F. Sopuerta"}], "author_count": 2}, {"id": "2604.06062", "category": "hep-th", "title": "$ξRϕ^2$ non-minimal coupling, and the long range gravitational potential for different spin fields from 2-2 scattering amplitudes", "abstract": "In this paper we investigate the long range gravitational effect of curvature-scalar field non-minimal coupling, in the form of $\\xi R \\phi^2$, in the perturbative quantum gravity framework. Such coupling is most naturally motivated from the renormalisation of a scalar field theory with a quartic self interaction in a curved spacetime background. This coupling results in two scalar-$n$ graviton vertices which contain no explicit momenta of the scalar, qualitatively different from the usual, e.g. $\\kappa h^{\\mu\\nu}T_{\\mu\\nu}$-type minimal matter-graviton vertices. Assuming the dimensionless coupling parameter $\\xi$ to be small, we compute the 2-2 scattering Feynman amplitudes between such scalars up to ${\\cal O}(G^2 \\xi)$. From the non-relativistic limit of these amplitudes, we compute the corresponding long range gravitational potential. There exists no tree level contribution $({\\cal O}(\\xi G))$ here, and hence the one loop ${\\cal O}(G^2 \\xi)$ result is leading. Recently, the effect of a cosmological constant in such non-minimal interaction and the subsequent gravitational potential was computed. In this work we take the cosmological constant to be vanishing. The resulting potential is found to have $r^{-4}$ leading behaviour. We further extend these results for scalar-massive spin-1 and massive spin-1/2 scattering. Spin and polarisation dependence of the two body potential have been explicitly demonstrated. We discuss some possible physical implications of these results.", "url": "https://arxiv.org/abs/2604.06062", "type": "理论", "summary": "在本文中，我们研究了微扰量子引力框架中曲率标量场非最小耦合的长程引力效应，其形式为 $\\xi R \\phi^2$。这种耦合最自然地源于标量场理论与弯曲时空背景中的四次自相互作用的重整化。这种耦合产生两个标量-$n$ 引力子顶点，它们不包含标量的显式动量，与通常的情况有质的不同，例如$\\kappa h^{\\mu\\nu}T_{\\mu\\nu}$型最小物质引力子顶点。假设无量纲耦合参数 $\\xi$ 很小，我们计算这些标量之间高达 ${\\cal O}(G^2 \\xi)$ 的 2-2 散射费曼振幅。根据这些振幅的非相对论极限，我们计算出相应的长程引力势。这里不存在树级贡献 $({\\cal O}(\\xi G))$，因此单循环 ${\\cal O}(G^2 \\xi)$ 结果领先。最近，计算了宇宙学常数对这种非最小相互作用和随后的引力势的影响。在这项工作中，我们假设宇宙常数消失。\n\n结果发现，所产生的势具有 $r^{-4}$ 领先行为。我们进一步将这些结果扩展到标量-质量自旋 1 和质量自旋 1/2 散射。两体势的自旋和偏振依赖性已被明确证明。我们讨论这些结果的一些可能的物理含义。", "authors": [{"name": "Avijit Sen Majumder"}, {"name": "Ayan Kumar Naskar"}, {"name": "Sourav Bhattacharya"}], "featured_authors": [{"name": "Avijit Sen Majumder"}, {"name": "Ayan Kumar Naskar"}, {"name": "Sourav Bhattacharya"}], "author_count": 3}, {"id": "2604.06088", "category": "hep-th", "title": "Comments on Symmetry Operators, Asymptotic Charges and Soft Theorems", "abstract": "We study the relation between emergent 1-form symmetries and soft photon theorems in QED. We show that in the relevant massive and massless kinematic regimes, described respectively by HQET and SCET, the soft sector admits electric and magnetic 1-form symmetries. We then show that these symmetries give rise to an infinite-dimensional Abelian algebra of ordinary conserved charges, with a central extension. In Minkowski spacetime, suitable choices of hypersurfaces reduce these charges to the familiar asymptotic symmetry charges and imply the leading electric and magnetic soft photon theorems. We further show that the central term in this algebra fixes a contact term appearing in scattering amplitudes involving two soft photons with mixed electric-magnetic polarizations. Finally, we extend the same construction to inclusive observables and apply it to QED photon detectors.", "url": "https://arxiv.org/abs/2604.06088", "type": "理论", "summary": "我们研究 QED 中涌现的 1 型对称性和软光子定理之间的关系。我们证明，在分别由 HQET 和 SCET 描述的相关质量和无质量运动学体系中，软扇区承认电和磁 1 型对称性。然后我们证明这些对称性产生了普通守恒电荷的无限维阿贝尔代数，具有中心扩展。在闵可夫斯基时空中，超曲面的适当选择将这些电荷减少为熟悉的渐近对称电荷，并暗示了领先的电和磁软光子定理。我们进一步表明，该代数中的中心项修复了涉及两个具有混合电磁极化的软光子的散射幅度中出现的接触项。最后，我们将相同的结构扩展到包容性可观测量，并将其应用于 QED 光子探测器。", "authors": [{"name": "Luigi Tizzano"}], "featured_authors": [{"name": "Luigi Tizzano"}], "author_count": 1}, {"id": "2604.06145", "category": "hep-th", "title": "Massive Exchange and the Sign of the Equilateral Bispectrum", "abstract": "We study the inflationary bispectrum generated by the tree-level exchange of a massive hidden-sector scalar during inflation. When the interaction between the inflaton and the hidden sector arises only from the leading boost-breaking operator of the Effective Field Theory (EFT) of inflation, the equilateral bispectrum for principal-series scalar exchange is known to be universally negative, independent of the sign of the coupling. We revisit this result within the full EFT operator basis. Using bootstrap methods, we construct the de Sitter-invariant seed four-point function and obtain the inflationary bispectrum via weight-shifting operators and a soft-limit procedure. While the equilateral bispectrum remains strictly negative when only the leading interaction is present, additional operators generate independent cubic structures whose contributions compete in the equilateral configuration. As a result, the sign of the bispectrum is no longer universal. We derive a critical ratio of interaction coefficients that separates regions of positive and negative equilateral bispectrum. We further study the effects of reduced sound speed $c_s<1$ and the exchange of multiple particles. In both cases, the critical ratio is modified, and for multi-particle exchange a positive equilateral bispectrum can arise even when the higher-order operator is subdominant. Our results show that the negativity of the equilateral bispectrum from massive exchange is not generic, but reflects a restricted operator structure in the EFT of inflation.", "url": "https://arxiv.org/abs/2604.06145", "type": "理论", "summary": "我们研究了暴胀期间巨大隐藏扇区标量的树级交换所产生的暴胀双谱。当暴胀子和隐藏扇区之间的相互作用仅由暴胀有效场论（EFT）的主要突破算子产生时，已知主级数标量交换的等边双谱普遍为负，与耦合的符号无关。我们在完整的 EFT 运营商基础上重新审视这一结果。使用自举方法，我们构造了德西特不变种子四点函数，并通过权重转移算子和软限制程序获得了膨胀双谱。虽然当仅存在主导相互作用时，等边双谱仍然严格为负，但其他算子会生成独立的立方结构，其贡献在等边配置中竞争。结果，双谱的符号不再具有普遍性。我们得出了分隔正负等边双谱区域的相互作用系数的临界比率。我们进一步研究降低声速 $c_s<1$ 和多个粒子交换的影响。\n\n在这两种情况下，临界比都会被修改，并且对于多粒子交换，即使高阶算子占主导地位，也可能会出现正等边双谱。我们的结果表明，大规模交换带来的等边双谱的负面影响并不普遍，而是反映了通货膨胀 EFT 中受限的运营商结构。", "authors": [{"name": "Diptimoy Ghosh"}, {"name": "Suvashis Maity"}, {"name": "Farman Ullah"}], "featured_authors": [{"name": "Diptimoy Ghosh"}, {"name": "Suvashis Maity"}, {"name": "Farman Ullah"}], "author_count": 3}, {"id": "2604.05109", "category": "math-ph", "title": "Near-Tsirelson Bell-CHSH Violations in Quantum Field Theory via Carleman and Hankel Operators", "abstract": "We study Bell-Clauser-Horne-Shimony-Holt (Bell-CHSH) violations in the vacuum state of free spinor fields in $(1+1)$-dimensional Minkowski spacetime. We construct explicit smooth compactly supported test functions with spacelike separated supports whose Bell-CHSH correlators converge to Tsirelson's bound $2\\sqrt2$. In the massless case, after passage to the time-zero slice and a natural symmetry reduction, the problem reduces to the quadratic form of the Carleman operator on $L^2([0,\\infty))$. Near-maximal Bell violation is then governed by the spectral edge $\\pi$, and explicit near-extremizers are obtained from compactly supported cutoffs of the generalized eigenfunction $x^{-1/2}$. This also explains the appearance of the constant $\\pi$ in earlier wavelet-based formulations. In the massive case, the same reduction leads to a Hankel operator with kernel $mK_1(m(x+y))$, where $K_1$ denotes the modified Bessel function of the second kind of order $1$, and exponentially damped variants of the massless test functions again yield Bell-CHSH values converging to $2\\sqrt2$. Therefore, we establish a direct link between Bell-CHSH violations for free $(1+1)$-dimensional spinor fields and the spectral theory of Carleman and Hankel operators on the half-line.", "url": "https://arxiv.org/abs/2604.05109", "type": "理论", "summary": "我们研究 $(1+1)$ 维 Minkowski 时空中自由旋量场真空状态下的 Bell-Clauser-Horne-Shimony-Holt (Bell-CHSH) 违规。我们构建了具有空间分离支撑的显式平滑紧支撑测试函数，其 Bell-CHSH 相关器收敛于 Tsirelson 的边界 $2\\sqrt2$。在无质量情况下，经过零时间切片和自然对称性约简后，问题简化为 $L^2([0,\\infty))$ 上卡尔曼算子的二次形式。然后，近最大贝尔违规由谱边缘 $\\pi$ 控制，并且从广义特征函数 $x^{-1/2}$ 的紧支持截断中获得显式近极值。这也解释了早期基于小波的公式中常数 $\\pi$ 的出现。在大规模情况下，同样的约简导致使用核 $mK_1(m(x+y))$ 的 Hankel 算子，其中 $K_1$ 表示第二类 $1$ 的修正贝塞尔函数，并且无质量测试函数的指数阻尼变体再次产生收敛于 $2\\sqrt2$ 的 Bell-CHSH 值。\n\n因此，我们在自由 $(1+1)$ 维旋量场的 Bell-CHSH 违规与半线上的 Carleman 和 Hankel 算子的谱理论之间建立了直接联系。", "authors": [{"name": "David Dudal"}, {"name": "Ken Vandermeersch"}], "featured_authors": [{"name": "David Dudal"}, {"name": "Ken Vandermeersch"}], "author_count": 2}, {"id": "2604.05300", "category": "math-ph", "title": "Constructive Quantum Field Theory and Rigorous Statistical Mechanics via Operator Algebras and Probability Theory -- Guiding Principles and Research Perspectives", "abstract": "We present a hierarchical viewpoint on the operator-algebraic formulation of quantum systems, in which $C^{*}$-algebras are responsible for the universal and intrinsic description, whereas von Neumann algebras provide the detailed account obtained after fixing a state compatible with the dynamics. From this standpoint, for bosonic many-body systems the resolvent algebra, rather than the Weyl algebra, is the natural object; in particular, its nuclearity, trivial center, and rich ideal structure faithfully reflect purely quantum-mechanical structures. Macroscopic variables or sector structures associated with phase transitions are captured as the center appearing in the weak closure of the GNS representation. Moreover, the equivalence between representations of operator algebras and functional integrals allows powerful probabilistic methods to be employed. Taking these as guiding principles, we outline research perspectives on concrete objects in constructive quantum field theory and rigorous statistical mechanics.", "url": "https://arxiv.org/abs/2604.05300", "type": "理论", "summary": "我们提出了关于量子系统算子代数公式的分层观点，其中$C^{*}$-代数负责普遍和内在的描述，而冯诺依曼代数提供了在固定与动力学兼容的状态后获得的详细描述。从这个角度来看，对于玻色多体系统来说，解析代数，而不是韦尔代数，是自然的对象；特别是它的核性、琐碎中心和丰富的理想结构忠实地反映了纯粹的量子力学结构。与相变相关的宏观变量或扇区结构被捕获为出现在 GNS 表示的弱闭包中的中心。此外，算子代数和函数积分的表示之间的等价性允许采用强大的概率方法。以这些为指导原则，我们概述了建设性量子场论和严格统计力学中具体对象的研究视角。", "authors": [{"name": "Yoshitsugu Sekine"}], "featured_authors": [{"name": "Yoshitsugu Sekine"}], "author_count": 1}, {"id": "2604.05598", "category": "math-ph", "title": "On some topological and spectral properties of kinetic Langevin processes driven by L{é}vy noises", "abstract": "We investigate several fundamental properties of kinetic Langevin processes in $\\mathbb{R}^{2d}$, defined as solutions to the following system: $$dx\\_t = v\\_t \\, dt, \\qquad dv\\_t = \\mathbf{B}(x\\_t, v\\_t) \\, dt + dL\\_t$$ where $(L\\_t, t \\ge 0)$ is a pure-jump L{é}vy process. Our analysis covers both the original process and its killed counterpart, where killing occurs upon exiting domains of the form $\\mathscr{D} = \\mathscr{O} \\times \\mathbb{R}^d$ for an arbitrary open set $\\mathscr{O} \\subset \\mathbb{R}^d$. Operating within a low-regularity framework - where the drift $\\mathbf{B}$ is not assumed to be continuous - we establish key structural and spectral properties for both the associated non-killed and killed semigroups. These include: the strong Feller property, weak continuity of trajectories with respect to initial conditions, topological irreducibility and the existence of a spectral gap. Furthermore, we prove, in this low-regularity framework, the existence and uniqueness of a weak solution when the driving noise is a rotationally invariant $\\alpha$-stable process, when $\\alpha \\in (1,2)$. For this specific case, we show that the aforementioned properties hold and further establish the existence of densities within certain $L^m$ spaces as well as the Feller $C\\_0(\\mathbb R^{2d})$-semigroup property. Finally, we address the existence and uniqueness of stationary and quasi-stationary distributions, proving exponential ergodicity for the non-killed process and exponential convergence to the quasi-stationary limit for the conditioned process. We show that these results extend to every $\\alpha \\in (0,1]$ when the drift is smooth.", "url": "https://arxiv.org/abs/2604.05598", "type": "理论", "summary": "我们研究了 $\\mathbb{R}^{2d}$ 中动力学朗之万过程的几个基本性质，定义为以下系统的解： $$dx\\_t = v\\_t \\, dt, \\qquad dv\\_t = \\mathbf{B}(x\\_t, v\\_t) \\, dt + dL\\_t$$ 其中 $(L\\_t, t \\ge 0)$ 是纯跳跃 L{é}vy 过程。我们的分析涵盖了原始进程及其被杀死的对应进程，其中杀死发生在任意开集 $\\mathscr{O} \\subset \\mathbb{R}^d$ 的 $\\mathscr{D} = \\mathscr{O} \\times \\mathbb{R}^d$ 形式的退出域上。在低正则性框架内运行 - 其中漂移 $\\mathbf{B}$ 不被假定为连续 - 我们为相关的非杀死和杀死半群建立了关键的结构和谱属性。这些包括：强费勒性质、相对于初始条件的轨迹的弱连续性、拓扑不可约性以及谱间隙的存在。此外，我们证明，在这个低正则性框架中，当驱动噪声是旋转不变的$\\alpha$稳定过程时，当$\\alpha \\in (1,2)$时，弱解的存在和唯一性。\n\n对于这个具体情况，我们证明上述性质成立并进一步证明了某些 $L^m$ 空间内密度的存在以及 Feller $C\\_0(\\mathbb R^{2d})$ 半群性质。最后，我们解决了平稳和准平稳分布的存在性和唯一性，证明了非杀死过程的指数遍历性和条件过程的准平稳极限的指数收敛性。我们证明，当漂移平滑时，这些结果可以扩展到 (0,1]$ 中的每个 $\\alpha \\。", "authors": [{"name": "T Batisse"}, {"name": "A Guillin"}, {"name": "B Nectoux"}, {"name": "L Wu"}], "featured_authors": [{"name": "T Batisse"}, {"name": "A Guillin"}, {"name": "B Nectoux"}, {"name": "L Wu"}], "author_count": 4}, {"id": "2604.05750", "category": "math-ph", "title": "Analytic exact solutions to the nonlinear Dirac equation", "abstract": "We present analytic exact solutions to the nonlinear Dirac equation: they display a ring singularity for the Nambu--Jona-Lasinio nonlinearity and a shell singularity for the Soler nonlinearity. For both cases the size of the singular region is of the order of the Compton length.", "url": "https://arxiv.org/abs/2604.05750", "type": "理论", "summary": "我们提出了非线性狄拉克方程的解析精确解：它们显示了 Nambu-Jona-Lasinio 非线性的环奇点和 Soler 非线性的壳奇点。对于这两种情况，奇异区域的大小都是康普顿长度的量级。", "authors": [{"name": "Luca Fabbri"}, {"name": "Roberto Cianci"}], "featured_authors": [{"name": "Luca Fabbri"}, {"name": "Roberto Cianci"}], "author_count": 2}, {"id": "2604.06011", "category": "math-ph", "title": "Analyticity, asymptotics and natural boundary for a one-point function of the finite-volume critical Ising chain", "abstract": "This note reports the following observation: the finite-volume expectation value of the spin operator (the one-point function) between the $\\mathbb{Z}_2$-even and odd ground states in the critical periodic Ising chain, when continued as a complex-analytic function of the system length $N$ through the Borel resummation of its large-$N$ expansion, has a natural boundary of analyticity along the negative real axis. The singular behavior near the negative real axis, after an exponential map, is the same as that of a Lambert-type series for the odd-divisor-squared sum near the unit circle $|z|=1$. The same divisor sum also governs the strengths of the Borel discontinuities of the one-point function's factorially-divergent large-$N$ asymptotics. We also report the all-order large-$N$ asymptotics of the leg function for the finite-volume spin-operator form factor, and the similarities to certain known quantities in the literature.", "url": "https://arxiv.org/abs/2604.06011", "type": "理论", "summary": "本文报告了以下观察结果：临界周期伊辛链中 $\\mathbb{Z}_2$-偶基态和奇基态之间的自旋算子（单点函数）的有限体积期望值，当通过其大 $N$ 展开的 Borel 恢复继续作为系统长度 $N$ 的复解析函数时，沿负实轴具有解析性的自然边界。在指数映射之后，负实轴附近的奇异行为与单位圆 $|z|=1$ 附近奇除数平方和的兰伯特型级数相同。相同的除数和还控制单点函数的阶乘发散大 $N$ 渐近函数的 Borel 不连续性的强度。我们还报告了有限体积自旋算子形状因子的腿函数的全阶大$N$渐近，以及与文献中某些已知量的相似性。", "authors": [{"name": "Yizhuang Liu"}], "featured_authors": [{"name": "Yizhuang Liu"}], "author_count": 1}, {"id": "2604.05031", "category": "quant-ph", "title": "Geometry of Free Fermion Commutants", "abstract": "Understanding the structure of operators that commute with $k$ identical replicas of unitary ensembles, also known as their $k$-commutants, is an important problem in quantum many-body physics with deep implications for the late-time behavior of physical quantities such as correlation functions and entanglement entropies under unitary evolution. In this work, we study the $k$-commutants of free-fermion unitary systems, which are heuristically known to contain $SO(k)$ and $SU(k)$ groups without and with particle number conservation respectively, with formal derivations of projectors onto these commutants appearing only very recently. We establish a complementary perspective by highlighting a larger $O(2k)$ replica symmetry (or $SU(2k)$ respectively) that the $k$-commutant transforms irreducibly under, which leads to a simple geometric understanding of the commutant in terms of coherent states parametrized by a Grassmannian manifold. We derive this structure by mapping the $k$-commutant to the ground state of effective ferromagnetic Heisenberg models, analogous to the ones that appear in the noisy circuit literature, which we solve exactly using standard representation theory methods. Further, we show that the Grassmannian manifold of the $k$-commutant is exactly the manifold of fermionic Gaussian states on $2k$ sites, which reveals a duality between real space and replica space in free-fermion systems. This geometric understanding also provides a compact projection formula onto the $k$-commutant, based on the resolution of identity for coherent states, which can prove advantageous in analytical calculations of averaged non-linear functionals of Gaussian states, as we demonstrate using some examples for the entanglement entropies. In all, this work provides a geometric perspective on the $k$-commutant of free-fermions that naturally connects to problems in quantum many-body physics.", "url": "https://arxiv.org/abs/2604.05031", "type": "理论+数值", "summary": "理解与酉系综的 $k$ 相同副本（也称为它们的 $k$-交换子）交换的算子的结构是量子多体物理学中的一个重要问题，对酉演化下相关函数和纠缠熵等物理量的后期行为具有深远的影响。在这项工作中，我们研究了自由费米子酉系统的 $k$-交换子，启发式地已知它们包含分别不具有和具有粒子数守恒的 $SO(k)$ 和 $SU(k)$ 群，并且投影到这些交换子上的正式推导最近才出现。我们通过强调 $k$ 交换子不可约变换的更大的 $O(2k)$ 副本对称性（或分别为 $SU(2k)$）来建立互补的视角，这导致了对交换子在由格拉斯曼流形参数化的相干态方面的简单几何理解。\n\n我们通过将 $k$ 交换子映射到有效铁磁海森堡模型的基态来推导出这种结构，类似于噪声电路文献中出现的模型，我们使用标准表示理论方法精确求解。此外，我们证明$k$交换子的格拉斯曼流形正是$2k$位点上费米子高斯态的流形，这揭示了自由费米子系统中实空间和复制空间之间的对偶性。这种几何理解还提供了基于相干态恒等分辨率的到 $k$ 交换子上的紧凑投影公式，这在高斯态平均非线性泛函的分析计算中具有优势，正如我们使用纠缠熵的一些示例所演示的那样。总之，这项工作提供了自由费米子 $k$ 交换子的几何视角，它自然地与量子多体物理学中的问题联系起来。", "authors": [{"name": "Marco Lastres"}, {"name": "Sanjay Moudgalya"}], "featured_authors": [{"name": "Marco Lastres"}, {"name": "Sanjay Moudgalya"}], "author_count": 2}, {"id": "2604.05032", "category": "quant-ph", "title": "Real-time Dynamics in 3D for up to 1000 Qubits with Neural Quantum States: Quenches and the Quantum Kibble--Zurek Mechanism", "abstract": "Exponential complexity of many-body wave functions limits accurate numerical simulations of real-time dynamics, especially beyond 1D, where rapid entanglement growth poses severe challenges. Neural Quantum States (NQS) have emerged as a powerful approach for real-time dynamics in 2D, but their scalability and accuracy in 3D have remained an open challenge. Here, we establish NQS as a scalable framework for 3D quantum dynamics by introducing a residual-based convolutional architecture tailored to cubic spin lattices. Focusing on the 3D transverse-field Ising model, we demonstrate that NQS reliably capture distinct quench regimes, including collapse-and-revival dynamics and, most challengingly, the dynamics following a sudden quench to the quantum critical point. We perform finite-rate quenches to the critical point on lattices containing up to $1000$ qubits, an unprecedented system size for numerical simulations of real-time dynamics beyond 1D. This enables the first large-scale numerical demonstration of the 3D quantum Kibble--Zurek mechanism. The QKZM in 3D is particularly intriguing because it lies at the upper critical dimension of the Ising universality class, where the standard power laws are modified by logarithmic factors together with prominent sub-leading logarithmic corrections. By deriving these corrections from renormalization-group flow equations up to two-loop order, we obtain a robust data collapse across all simulated system sizes for the correlation function, the excess energy, and the quantum Fisher information, the latter revealing universal multipartite-entanglement dynamics. In all cases, we find compelling agreement with the expected scaling dimensions. Our findings establish NQS as a scalable and reliable tool for exploring nonequilibrium phenomena in 3D quantum matter and for providing numerical benchmarks for 3D quantum simulators.", "url": "https://arxiv.org/abs/2604.05032", "type": "理论+数值", "summary": "多体波函数的指数复杂性限制了实时动力学的精确数值模拟，尤其是在一维之外，其中快速的纠缠增长带来了严峻的挑战。神经量子态 (NQS) 已成为 2D 实时动态的强大方法，但其在 3D 中的可扩展性和准确性仍然是一个开放的挑战。在这里，我们通过引入针对立方自旋晶格定制的基于残差的卷积架构，将 NQS 建立为 3D 量子动力学的可扩展框架。重点关注 3D 横向场 Ising 模型，我们证明 NQS 能够可靠地捕获不同的淬灭状态，包括塌缩和复活动力学，以及最具挑战性的突然淬灭到量子临界点后的动力学。我们在包含高达 1000 美元量子位的晶格上执行有限速率淬灭至临界点，这是一个前所未有的系统规模，适用于超过 1D 的实时动态数值模拟。这使得 3D 量子 Kibble-Zurek 机制首次大规模数值演示成为可能。\n\n3D 中的 QKZM 特别有趣，因为它位于伊辛普适性类的上临界维度，其中标准幂律通过对数因子以及突出的次领先对数校正进行修改。通过从重整化群流方程直至二环阶导出这些修正，我们在所有模拟系统大小上获得了相关函数、过剩能量和量子费希尔信息的鲁棒数据崩溃，后者揭示了普遍的多部分纠缠动力学。在所有情况下，我们都发现与预期的缩放尺寸令人信服地一致。我们的研究结果使 NQS 成为一种可扩展且可靠的工具，用于探索 3D 量子物质中的非平衡现象，并为 3D 量子模拟器提供数值基准。", "authors": [{"name": "Vighnesh Dattatraya Naik"}, {"name": "Zheng-Hang Sun"}, {"name": "Markus Heyl"}], "featured_authors": [{"name": "Vighnesh Dattatraya Naik"}, {"name": "Zheng-Hang Sun"}, {"name": "Markus Heyl"}], "author_count": 3}, {"id": "2604.05036", "category": "quant-ph", "title": "Efficient simulation of noisy IQP circuits with amplitude-damping noise", "abstract": "Efficient classical simulation of noisy intermediate-scale quantum (NISQ) circuits has been a topic of intense study over the past few years. The majority of results on efficient simulation assume that the circuits undergo some variant of unital noise or involve sufficient randomness. However, there are limited results for circuits undergoing non-unital noise in the absence of randomness. In this work, we present a polynomial-time classical algorithm to sample from the output distributions of amplitude-damped instantaneous quantum polynomial (IQP) circuits. Our algorithm works for circuits generated by arbitrary $l$-local diagonal gates with depth $d = \\Omega(\\log(n))$, undergoing constant amplitude-damping noise.", "url": "https://arxiv.org/abs/2604.05036", "type": "数值", "summary": "过去几年，噪声中尺度量子（NISQ）电路的高效经典模拟一直是热门研究的主题。有效仿真的大多数结果都假设电路经历某种单位噪声变体或涉及足够的随机性。然而，对于在缺乏随机性的情况下经历非单位噪声的电路，结果有限。在这项工作中，我们提出了一种多项式时间经典算法，用于从振幅阻尼瞬时量子多项式（IQP）电路的输出分布中进行采样。我们的算法适用于由深度为 $d = \\Omega(\\log(n))$ 的任意 $l$-局部对角门生成的电路，并承受恒定的幅度阻尼噪声。", "authors": [{"name": "Shravan Shravan"}, {"name": "Mohsin Raza"}, {"name": "Ariel Shlosberg"}], "featured_authors": [{"name": "Shravan Shravan"}, {"name": "Mohsin Raza"}, {"name": "Ariel Shlosberg"}], "author_count": 3}, {"id": "2604.05098", "category": "quant-ph", "title": "Quantum Algorithms for Heterogeneous PDEs: The Neutron Diffusion Eigenvalue Problem", "abstract": "We develop a hybrid classical-quantum algorithm to solve a type of linear reaction-diffusion equation, the neutron diffusion (generalized) k-eigenvalue problem that establishes nuclear criticality. The algorithm handles an equation with piecewise constant coefficients, describing a problem in a heterogeneous medium. We apply uniform finite elements and show that the quantum algorithm provides significant polynomial end-to-end speedup over its classical counterparts. This speedup leverages recent advances in quantum linear systems -- fast inversion and quantum preconditioning -- and uses Hamiltonian simulation as a subroutine. Our results suggest that quantum algorithms may provide speedups for heterogeneous PDEs, though the extent of this advantage over the fastest classical algorithm depends on the effectiveness of other classical approaches such as nonuniform or adaptive meshing for a given problem instance.", "url": "https://arxiv.org/abs/2604.05098", "type": "理论+数值", "summary": "我们开发了一种混合经典量子算法来求解一种线性反应扩散方程，即建立核临界性的中子扩散（广义）k-特征值问题。该算法处理具有分段常数系数的方程，描述异构介质中的问题。我们应用统一有限元并表明量子算法比经典算法提供了显着的多项式端到端加速。这种加速利用了量子线性系统的最新进展——快速反演和量子预处理——并使用哈密顿模拟作为子程序。我们的结果表明，量子算法可以为异构偏微分方程提供加速，尽管这种相对于最快经典算法的优势程度取决于其他经典方法的有效性，例如给定问题实例的非均匀或自适应网格划分。", "authors": [{"name": "Andrew M. Childs"}, {"name": "Lincoln Johnston"}, {"name": "Brian Kiedrowski"}, {"name": "Mahathi Vempati"}, {"name": "Jeffery Yu"}], "featured_authors": [{"name": "Andrew M. Childs"}, {"name": "Lincoln Johnston"}, {"name": "Brian Kiedrowski"}, {"name": "Mahathi Vempati"}, {"name": "Jeffery Yu"}], "author_count": 5}, {"id": "2604.05107", "category": "quant-ph", "title": "Quantum noise in ranging with optical pulses", "abstract": "Optical frequency combs combine ultrashort pulse duration and phase stability, making them powerful resources for high-precision ranging even when affected by atmospheric dispersion. It has been established that by classical modal engineering and mdoe-sensitive detection sensitivity to distance at the standard limit can be achiev
