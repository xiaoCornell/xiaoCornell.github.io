e3$ is trivialised by the symmetry extension $1\\to Z_n\\to Z_{n^2}\\to Z_n\\to 1,$ and we construct the corresponding symmetric anomalous boundary TQFT. For $d=5$ and $n=3$, this yields a Spin$\\times Z_3$-symmetric 4d $Z_3$-gauge TQFT that cancels the mixed discrete $(\\bf B+L)$-gauge-gravitational anomaly of the SM in the absence of 3 \"sterile\" right-handed neutrinos $\\nu_R$. We further analyze a generalized SM with $N_c$ colors and $N_f$ families and argue that missing $N_f$ copies of the $\\nu_R$ can be naturally replaced by that 4d anomalous $Spin\\times_{Z_2^F} Z_{2 N_f,{{\\bf B} + {\\bf L}}}$ symmetric $Z_{N_c}$-gauge TQFT under the anomaly cancellation, via an appropriate $Z_{N_c}$-color symmetry extension construction $1\\to Z_{N_c}\\to Spin\\times Z_{N_cN_f}\\to Spin\\times_{Z_2^F} Z_{2N_f}\\to1$ of anomalous topological order. For minimal nonzero positive integers $N_c$ and $N_f$, we find the minimal color extensions: $N_c=3, N_f \\ge 3$; $N_c=4, N_f \\ge 2$; and $N_c=12, N_f \\ge 6$. If we further require that an SM baryon is a fermion so $N_c$ is odd, then $Z_{N_c}=Z($SU$(N_c))$ color center, we prove 3 families and 3 colors, $N_c=N_f=3$, is the unique case that stands out. We also prove that $A_{Z_3}p_1= 0\\mod3$ for the mod 3 cohomology class in an appropriate context.", "url": "https://arxiv.org/abs/2605.26202", "type": "理论", "summary": "家族难题询问为什么标准模型 (SM) 恰好具有 3 个夸克和轻子家族。受拓扑约束的推动，我们研究了具有离散 $Z_n$ 对称性的 4 维费米子异常，并按 5d 自旋棱柱群进行分类。我们证明只有群上同调子类 H$^5(Z_n,U(1))\\cong Z_n$ 可以通过反常 $Z_n$-对称 4d $Z_n$-规范拓扑量子场论 (TQFT) 取消，而涉及 Pontryagin 类 $p_1$ 的超群上同调 $A_{Z_n} p_1$ 则不能（$n=2,3$ 除外）。更一般地，我们证明奇时空维度 $d\\ge3$ 中的任何余循环 $\\alpha_d\\in$H$^d(Z_n,U(1))$ 都可以通过对称扩展 $1\\to Z_n\\to Z_{n^2}\\to Z_n\\to 1,$ 变得​​平凡，并构造相应的对称反常边界 TQFT。对于 $d=5$ 和 $n=3$，这会产生一个 Spin$\\times Z_3$ 对称 4d $Z_3$ 规范 TQFT，在没有 3 个“无菌”右手中微子 $\\nu_R$ 的情况下，消除 SM 的混合离散 $(\\bf B+L)$ 规范引力异常。\n\n我们进一步分析了具有 $N_c$ 颜色和 $N_f$ 系列的广义 SM，并认为 $\\nu_R$ 缺失的 $N_f$ 副本可以在异常消除下自然地被 4d 异常 $Spin\\times_{Z_2^F} Z_{2 N_f,{{\\bf B} + {\\bf L}}}$ 对称 $Z_{N_c}$-gauge TQFT 替换，通过一个适当的$Z_{N_c}$-颜色对称扩展构造$1\\to Z_{N_c}\\to Spin\\times Z_{N_cN_f}\\to Spin\\times_{Z_2^F} Z_{2N_f}\\to1$的异常拓扑顺序。对于最小非零正整数 $N_c$ 和 $N_f$，我们找到最小颜色扩展：$N_c=3, N_f \\ge 3$； $N_c=4, N_f \\ge 2$;且 $N_c=12, N_f \\ge 6$。如果我们进一步要求 SM 重子是费米子，因此 $N_c$ 是奇数，则 $Z_{N_c}=Z($SU$(N_c))$ 色心，我们证明 3 个族和 3 个颜色，$N_c=N_f=3$ 是突出的独特情况。我们还证明在适当的上下文中对于 mod 3 上同调类 $A_{Z_3}p_1= 0\\mod3$ 。", "authors": [{"name": "Zheyan Wan"}, {"name": "Juven Wang"}, {"name": "Shing-Tung Yau"}], "featured_authors": [{"name": "Zheyan Wan"}, {"name": "Juven Wang"}, {"name": "Shing-Tung Yau"}], "author_count": 3}, {"id": "2605.26212", "category": "hep-th", "title": "EFTs with Symmetric Moduli Spaces: the Landscape and the Swampland", "abstract": "The Swampland Distance Conjecture (SDC) states that, for any infinite-distance limit in the moduli space of a quantum gravity effective field theory (EFT), there should exist an infinite tower of states that become exponentially light. According to the Emergent String Conjecture, such a tower should consist either of tensionless strings or of Kaluza-Klein modes, each with a mass-decay rate that depends in a precise way on the dimension of the effective field theory. In this paper, we use the results obtained in arXiv:2508.18401 on the SDC for symmetric moduli spaces and how these rates are encoded in the weight polytope of the corresponding particle-state representations to determine the symmetric space EFTs and representations that have these decay rates. Remarkably, assuming that the particle states transform in an irreducible representation, the list of possible polytopes and moduli spaces is finite. Different EFTs are related by embedding one moduli space in another or by taking a decompactification limit. Requiring compatibility of the particle representations under such branching, we find that, while most of the theories can be obtained from an EFT based on $E_{8(8)}$, there remain three in our list that appear to be impossible to get from M- or string-theory compactifications. Using the same embedding procedure, we also identify the string and brane representations that should be present in the spectrum.", "url": "https://arxiv.org/abs/2605.26212", "type": "理论", "summary": "沼泽距离猜想 (SDC) 指出，对于量子引力有效场理论 (EFT) 模空间中的任何无限距离极限，应该存在一个无限的状态塔，这些塔会变成指数光。根据涌现弦猜想，这样的塔应该由无张力弦或卡鲁扎-克莱因模式组成，每种模式都具有精确地取决于有效场理论维度的质量衰减率。在本文中，我们使用在对称模空间的 SDC 上的 arXiv:2508.18401 中获得的结果，以及如何将这些速率编码在相应粒子状态表示的权重多胞形中，以确定对称空间 EFT 和具有这些衰减率的表示。值得注意的是，假设粒子状态以不可约表示形式变换，则可能的多胞形和模空间的列表是有限的。不同的 EFT 通过将一个模空间嵌入到另一个模空间中或通过采用解紧极限来关联。\n\n要求在这种分支下粒子表示的兼容性，我们发现，虽然大多数理论可以从基于 $E_{8(8)}$ 的 EFT 中获得，但我们的列表中仍然有三个理论似乎无法从 M 理论或弦理论压缩中获得。使用相同的嵌入过程，我们还识别了光谱中应出现的字符串和膜表示。", "authors": [{"name": "Stephanie Baines"}, {"name": "Veronica Collazuol"}, {"name": "Bernardo Fraiman"}, {"name": "Mariana Graña"}, {"name": "Daniel Waldram"}], "featured_authors": [{"name": "Stephanie Baines"}, {"name": "Veronica Collazuol"}, {"name": "Bernardo Fraiman"}, {"name": "Mariana Graña"}, {"name": "Daniel Waldram"}], "author_count": 5}, {"id": "2605.26224", "category": "hep-th", "title": "$S$-duality, boundary states, and higher-form symmetries on ALE spaces", "abstract": "We study Abelian $S$-duality of Maxwell theory on $A$-type asymptotically locally Euclidean (ALE) spaces. Unlike on closed four-manifolds, the Maxwell path integral on an ALE space is not naturally a scalar partition function. Rather, it decomposes into theta-function blocks labeled by flat $U(1)$ holonomy sectors on the asymptotic lens-space boundary. We interpret these blocks as components of the Hilbert-space boundary state prepared by the ALE path integral. With this interpretation, the apparent failure of ordinary modularity is replaced by vector-valued modular covariance under the action of the modular group. We test this picture explicitly for Eguchi-Hanson space by gluing it to its orientation reversal. The resulting closed four-manifold is diffeomorphic to $S^2\\times S^2$, and the natural pairing of the two ALE boundary states reproduces the standard Maxwell partition function on $S^2\\times S^2$. We then refine the construction by turning on electric and magnetic $1$-form symmetry backgrounds. In their presence, the ALE theta blocks are not ordinary functions, but sections of a line bundle over the Cartan torus associated with the $A_{N-1}$ root lattice, reflecting the mixed electric-magnetic $1$-form anomaly. We also discuss gauging discrete $\\mathbb Z_k$ subgroups of the $1$-form symmetries and show that the vector-valued boundary-state structure remains the natural covariant framework after gauging. In this sense, ALE spaces behave as chiral building blocks for four-dimensional Maxwell theory: individual ALE blocks carry sector-resolved boundary data, while gluing pairs these sectors to produce an ordinary closed-manifold partition function, much like the pairing of left- and right-moving conformal blocks in two-dimensional CFT.", "url": "https://arxiv.org/abs/2605.26224", "type": "理论", "summary": "We study Abelian $S$-duality of Maxwell theory on $A$-type asymptotically locally Euclidean (ALE) spaces. Unlike on closed four-manifolds, the Maxwell path integral on an ALE space is not naturally a scalar partition function. Rather, it decomposes into theta-function blocks labeled by flat $U(1)$ holonomy sectors on the asymptotic lens-space boundary.我们将这些块解释为由 ALE 路径积分准备的希尔伯特空间边界状态的组成部分。通过这种解释，普通模块化的明显失败被模群作用下的向量值模协方差所取代。我们通过将其粘合到其方向反转来明确测试该图片的 Eguchi-Hanson 空间。所得的闭合四流形与 $S^2\\times S^2$ 微分同胚，并且两个 ALE 边界状态的自然配对在 $S^2\\times S^2$ 上再现了标准麦克斯韦配分函数。然后，我们通过打开电和磁 1 美元形式的对称背景来完善结构。\n\n在它们存在的情况下，ALE theta 块不是普通函数，而是与 $A_{N-1}$ 根晶格相关的嘉当圆环上的线束的一部分，反映了混合电磁 $1$ 形式的异常。我们还讨论了测量 $1$ 形式对称性的离散 $\\mathbb Z_k$ 子群，并表明矢量值边界状态结构在测量后仍然是自然协变框架。从这个意义上说，ALE 空间充当四维麦克斯韦理论的手性构建块：各个 ALE 块携带扇区解析的边界数据，同时将这些扇区配对以产生普通的闭合流形配分函数，非常类似于二维 CFT 中左右移动共形块的配对。", "authors": [{"name": "Mohamed M. Anber"}], "featured_authors": [{"name": "Mohamed M. Anber"}], "author_count": 1}, {"id": "2605.26250", "category": "hep-th", "title": "Krylov Complexity in Periodically Driven CFTs and Critical Fermions", "abstract": "We study Krylov construction in periodically driven conformal field theories and their lattice realisations via critical fermions. Two types of driving are considered: a square-wave drive and a continuous sinusoidal drive. Using the Arnoldi construction, we examine Arnoldi coefficients and return amplitudes in periodically driven conformal field theories in the heating and non-heating phases. In the heating phase, the Arnoldi coefficients approach unity exponentially; in contrast, in the non-heating phase, they exhibit oscillatory behaviour. For the lattice realisations, we further analyse the Krylov complexity of the correlation matrix, quasi energy level statistics, and the graph structure induced by the Floquet operator. Although the two drives exhibit similar Krylov growth on the CFT side, their lattice realisations exhibit markedly different spectral and graph signatures, indicating distinct mechanisms governing the transition between the heating and non-heating phases.", "url": "https://arxiv.org/abs/2605.26250", "type": "理论", "summary": "我们研究周期性驱动的共形场论中的克雷洛夫构造及其通过临界费米子的晶格实现。考虑两种类型的驱动：方波驱动和连续正弦驱动。使用阿诺尔迪构造，我们检查了加热和非加热阶段的周期性驱动共形场论中的阿诺尔迪系数和返回幅度。在加热阶段，Arnoldi 系数以指数方式趋近于 1；相反，在非加热阶段，它们表现出振荡行为。对于点阵实现，我们进一步分析了相关矩阵的 Krylov 复杂度、准能级统计以及由 Floquet 算子导出的图结构。尽管这两种驱动器在 CFT 侧表现出类似的克雷洛夫生长，但它们的晶格实现表现出明显不同的光谱和图形特征，表明控制加热和非加热阶段之间过渡的不同机制。", "authors": [{"name": "Ankit Gill"}, {"name": "Anurag Sarkar"}], "featured_authors": [{"name": "Ankit Gill"}, {"name": "Anurag Sarkar"}], "author_count": 2}, {"id": "2605.26360", "category": "hep-th", "title": "Torsional black holes and wormholes in Einstein-Cartan-Maxwell gravity with a conformal scalar field", "abstract": "We formulate a one-parameter extension of Weyl transformations in first-order gravity and show that it defines a conformally coupled scalar sector with dynamical torsion. The construction reduces to the standard torsionless conformal coupling in the limit $\\lambda\\to 1$. In the corresponding Einstein-Cartan-Maxwell theory, we derive exact static solutions in asymptotically flat and asymptotically locally AdS spacetimes. These solutions describe scalar-dressed black holes, regular black holes, and traversable wormholes, depending on the values of the integration constants and of the deformation parameter. We show that torsion can regularize the scalar field and, for suitable branches, also improve the geometric singularity structure. In the AdS sector, the existence of topological black holes requires a nonvanishing electric charge. These results provide new exact examples of regular and torsional configurations in four-dimensional gravity.", "url": "https://arxiv.org/abs/2605.26360", "type": "理论", "summary": "我们在一阶引力中制定了外尔变换的单参数扩展，并证明它定义了具有动态扭转的共形耦合标量扇区。该结构在 $\\lambda\\ 限制为 1$ 时简化为标准无扭转共形耦合。在相应的爱因斯坦-嘉当-麦克斯韦理论中，我们在渐近平坦和渐近局部 AdS 时空中导出精确的静态解。这些解描述了标量黑洞、规则黑洞和可穿越虫洞，具体取决于积分常数和变形参数的值。我们证明，扭转可以使标量场正则化，并且对于合适的分支，还可以改善几何奇点结构。在 AdS 区域，拓扑黑洞的存在需要不消失的电荷。这些结果提供了四维重力中规则和扭转配置的新的精确示例。", "authors": [{"name": "Luis Avilés"}, {"name": "Omar Valdivia"}, {"name": "Rodolfo Véliz"}, {"name": "Carlos Vera"}], "featured_authors": [{"name": "Luis Avilés"}, {"name": "Omar Valdivia"}, {"name": "Rodolfo Véliz"}, {"name": "Carlos Vera"}], "author_count": 4}, {"id": "2605.26617", "category": "hep-th", "title": "On a mixed-state extension of the holographic signal inequality", "abstract": "A novel inequality was proposed in \\cite{Balasubramanian:2025hxg} for tripartite holographic states, using which it was argued, that purely GHZ-like tripartite entanglement is not allowed in holography. In this short note, we generalize this inequality to mixed states by canonical purification following \\cite{Yuan:2024yfg} and exhibit a class of holographic geometries that violate this generalized inequality. We argue that the analogous mixed-state extension for four parties fails for the same reason. Finally, we conjecture a new inequality for tripartite holographic states and give supporting evidence.", "url": "https://arxiv.org/abs/2605.26617", "type": "理论", "summary": "\\cite{Balasubramanian:2025hxg} 中针对三方全息态提出了一种新颖的不等式，据此论证，在全息术中不允许纯粹的类似 GHZ 的三方纠缠。在这篇简短的文章中，我们通过遵循 \\cite{Yuan:2024yfg} 的规范纯化将这种不等式推广到混合状态，并展示了一类违反这种广义不等式的全息几何。我们认为，四个政党的类似混合国家延期也因同样的原因而失败。最后，我们猜想了三方全息态的一个新的不等式并给出了支持证据。", "authors": [{"name": "Joydeep Naskar"}], "featured_authors": [{"name": "Joydeep Naskar"}], "author_count": 1}, {"id": "2605.26706", "category": "hep-th", "title": "Nonlinear Breit-Wheeler Process Driven by Intense Squeezed Light", "abstract": "The nonlinear Breit-Wheeler process is a fundamental phenomenon of strong-field quantum electrodynamics and is usually studied for classically prescribed laser backgrounds. Here we examine how the statistical properties of a squeezed coherent driving field modify nonlinear Breit-Wheeler pair production. Using a polarization-resolved Monte Carlo framework with stochastic averaging over the field-amplitude distribution derived from the Husimi Q-function, we simulate collisions of gamma photons with squeezed light and identify clear source-state-dependent modifications of the pair production signal. These effects include the smoothing of harmonic structure, the enhancement of higher-order multiphoton channels, and the suppression of the single-laser-photon absorption channel when stronger-field realizations raise the dressed-mass threshold. Within the selected spectral window, the degree of positron polarization increases monotonically with the squeezing parameter, while the angular distributions broaden as the statistical weight of larger field amplitudes increases. Our results show that, even at fixed mean electric-field amplitude, the statistical fluctuations inherent to the squeezed coherent state can substantially reshape spectral, angular, and spin-resolved observables in strong-field pair production. These findings illustrate a direct link between source-state-dependent field statistics and strong-field pair production observables, and provide a theoretical framework for studying how squeezed-state preparation of the driving field can influence high-energy QED processes.", "url": "https://arxiv.org/abs/2605.26706", "type": "理论", "summary": "非线性布莱特-惠勒过程是强场量子电动力学的基本现象，通常针对经典规定的激光背景进行研究。在这里，我们研究压缩相干驱动场的统计特性如何修改非线性 Breit-Wheeler 对产生。使用偏振分辨蒙特卡罗框架，对源自 Husimi Q 函数的场振幅分布进行随机平均，我们模拟伽马光子与压缩光的碰撞，并识别对产生信号的清晰的源状态相关修改。这些效应包括谐波结构的平滑、高阶多光子通道的增强，以及当更强的场实现提高修饰质量阈值时对单激光光子吸收通道的抑制。在选定的光谱窗口内，正电子偏振度随着挤压参数单调增加，而角分布随着较大场振幅的统计权重的增加而变宽。\n\n我们的结果表明，即使在固定的平均电场幅度下，压缩相干态固有的统计波动也可以显着重塑强场对产生中的光谱、角度和自旋分辨可观测量。这些发现说明了源态相关场统计与强场对产生可观测量之间的直接联系，并为研究驱动场的压缩态制备如何影响高能 QED 过程提供了理论框架。", "authors": [{"name": "Xin Ge"}, {"name": "Kai-Hong Zhuang"}, {"name": "Pei-Lun He"}, {"name": "Yue-Yue Chen"}], "featured_authors": [{"name": "Xin Ge"}, {"name": "Kai-Hong Zhuang"}, {"name": "Pei-Lun He"}, {"name": "Yue-Yue Chen"}], "author_count": 4}, {"id": "2605.26743", "category": "hep-th", "title": "Thermal Casimir Effect in A Schwarzschild-like Wormhole Spacetime", "abstract": "We study the finite-temperature Casimir effect for a massless scalar field confined between two parallel plates in a Schwarzschild-like wormhole spacetime. Imposing Dirichlet boundary conditions, we compute the renormalized Casimir free energy in the comoving frame. We find that the thermal correction to the renormalized Casimir free energy decreases gradually with the temperature and becomes independent of the background geometry in this frame. Thermodynamic quantities derived from the Casimir free energy, namely, the renormalized Casimir entropy, internal energy, and heat capacity at constant volume, exhibit distinct temperature dependence. At low temperatures, all thermodynamic quantities recover the expected behavior, consistent with the fundamental laws of thermodynamics. These results provide a compact framework for analyzing quantum vacuum forces in gravitational backgrounds.", "url": "https://arxiv.org/abs/2605.26743", "type": "理论", "summary": "我们研究了类史瓦西虫洞时空中两个平行板之间限制的无质量标量场的有限温度卡西米尔效应。施加狄利克雷边界条件，我们计算共动坐标系中的重整化卡西米尔自由能。我们发现，对重正化卡西米尔自由能的热校正随着温度的升高而逐渐减小，并且变得独立于该框架中的背景几何形状。由卡西米尔自由能导出的热力学量，即重正化卡西米尔熵、内能和定体积热容，表现出明显的温度依赖性。在低温下，所有热力学量都会恢复预期的行为，与热力学的基本定律一致。这些结果为分析引力背景下的量子真空力提供了一个紧凑的框架。", "authors": [{"name": "Arista Romadani"}, {"name": "Apriadi Salim Adam"}, {"name": "Ar Rohim"}, {"name": "Bintoro Anang Subagyo"}, {"name": "Agus Purwanto"}], "featured_authors": [{"name": "Arista Romadani"}, {"name": "Apriadi Salim Adam"}, {"name": "Ar Rohim"}, {"name": "Bintoro Anang Subagyo"}, {"name": "Agus Purwanto"}], "author_count": 5}, {"id": "2605.26822", "category": "hep-th", "title": "Null Strings Gauged and Reloaded, II: Consistent Classical Treatment of the Null Strings", "abstract": "We observed that the null strings, tensionless strings with Carrollian worldsheets, exhibit an extra gauge symmetry, \\textit{Carroll-Weyl} gauge symmetry, which cannot be obtained from ultra-relativistic Carrollian limit of tensile strings. Due to the existence of this symmetry, the BMS$_3$ algebra of constraints, which is obtained as the Carrollian limit of two Virasoro algebras of the standard tensile strings, should be replaced with an BMS$_3$ algebra extended by a weight one operator. To establish further the existence and necessity of the Carroll-Weyl gauge symmetry, we carefully work through Hamiltonian analyses of constrained/gauged systems. We also discuss the extended BMS$_3$ algebra of constraints.", "url": "https://arxiv.org/abs/2605.26822", "type": "理论", "summary": "我们观察到，空弦，即具有卡罗尔世界表的无张力弦，表现出额外的规范对称性，\\textit{Carroll-Weyl}规范对称性，这是无法从拉弦的超相对论卡罗尔极限获得的。由于这种对称性的存在，作为标准拉伸弦的两个 Virasoro 代数的卡罗尔极限而获得的约束的 BMS$_3$ 代数应该替换为由权重一运算符扩展的 BMS$_3$ 代数。为了进一步确定卡罗尔-韦尔规范对称性的存在性和必要性，我们仔细地对约束/规范系统进行了哈密顿分析。我们还讨论了约束的扩展 BMS$_3$ 代数。", "authors": [{"name": "M.M. Sheikh-Jabbari"}, {"name": "H. Yavartanoo"}], "featured_authors": [{"name": "M.M. Sheikh-Jabbari"}, {"name": "H. Yavartanoo"}], "author_count": 2}, {"id": "2605.26829", "category": "hep-th", "title": "A universal geometric mechanism for chaos-bound violations in black hole spacetimes", "abstract": "Violation of the Maldacena-Shenker-Stanford (MSS) chaos bound has been observed in various black hole spacetimes, but its physical origin remains unclear. In particular, it is uncertain whether these violations arise from modifications of general relativity or reflect a more fundamental feature of black hole spacetimes. In this work, we systematically investigate the instability of circular geodesics across a broad class of black hole solutions in Einstein, scalar-tensor, and higher-curvature gravity. We show that the violations are governed by the relative behavior of unstable circular orbits and the horizon structure in near-extremal regimes. When the relevant orbit remains outside the horizon as the surface gravity vanishes, the instability scale persists, and the chaos bound can be violated. On the other hand, as the orbit approaches the degenerate horizon, the instability becomes suppressed by the associated divergent gravitational time dilation, ultimately leading to saturation of the bound. Motivated by these results, we propose a geometric conjecture that determines the applicability of the MSS bound directly from the photon-sphere and horizon structure of the spacetime. Our findings identify a universal geometric criterion that governs the applicability of the MSS bound in black hole spacetimes, revealing a fundamental constraint on extending the quantum chaos bound to classical gravitational settings.", "url": "https://arxiv.org/abs/2605.26829", "type": "理论", "summary": "在各种黑洞时空中都观察到了马尔达塞纳-申克-斯坦福（MSS）混沌界限的违反，但其物理起源仍不清楚。特别是，尚不确定这些违反是否源于广义相对论的修改或反映了黑洞时空的更基本特征。在这项工作中，我们系统地研究了爱因斯坦、标量张量和高曲率引力中广泛的黑洞解中圆形测地线的不稳定性。我们表明，违规行为是由不稳定圆形轨道的相对行为和近极值状态下的视界结构决定的。当表面重力消失而相关轨道保持在地平线之外时，不稳定尺度仍然存在，并且可能会违反混沌界限。另一方面，当轨道接近简并视界时，不稳定性被相关的发散引力时间膨胀所抑制，最终导致边界饱和。受这些结果的启发，我们提出了一个几何猜想，该猜想直接从时空的光子球和视界结构确定了 MSS 束缚的适用性。\n\n我们的研究结果确定了一个通用的几何标准，该标准控制着黑洞时空中 MSS 束缚的适用性，揭示了将量子混沌扩展到经典引力设置的基本约束。", "authors": [{"name": "Terkaa Victor Targema"}, {"name": "Kazuharu Bamba"}, {"name": "Usman Zafar"}], "featured_authors": [{"name": "Terkaa Victor Targema"}, {"name": "Kazuharu Bamba"}, {"name": "Usman Zafar"}], "author_count": 3}, {"id": "2605.26853", "category": "hep-th", "title": "A reparametrization invariant nonabelian surface holonomy", "abstract": "We introduce a nonabelian surface holonomy that is constructed from a one-form gauge potential that takes values in a loop algebra of the $U(N)$ gauge group. The surface holonomy parallel transports a nonabelian string. Although it is not manifest in our formulation, we will see that our nonabelian surface holonomy is invariant under reparametrizations of the surface.", "url": "https://arxiv.org/abs/2605.26853", "type": "理论", "summary": "我们引入了一种非阿贝尔表面完整性，它是由单一形式的规范势构造的，该规范势在 $U(N)$ 规范群的循环代数中取值。表面完整平行传输非阿贝尔弦。尽管它在我们的公式中并不明显，但我们将看到我们的非阿贝尔表面完整性在表面的重新参数化下是不变的。", "authors": [{"name": "Dongsu Bak"}, {"name": "Andreas Gustavsson"}], "featured_authors": [{"name": "Dongsu Bak"}, {"name": "Andreas Gustavsson"}], "author_count": 2}, {"id": "2605.26892", "category": "hep-th", "title": "Constrained Symplectic Quantization II: The Free Scalar Field", "abstract": "Constrained symplectic quantization is a functional formulation of quantum field theory in which quantum fluctuations are sampled through a deterministic Hamiltonian flow in an auxiliary intrinsic time $\\tau$. In this paper we extend the quantum-mechanical framework introduced in [1] to a relativistic scalar quantum field theory in Minkowski space-time. The construction is based on the analytic continuation of fields and action from $\\mathbb{R}$ to $\\mathbb{C}$ together with constraints that select stable intrinsic-time trajectories and, at the same time, define convergent integration cycles for the corresponding microcanonical functional. We show that, in the continuum limit, the microcanonical generating functional reproduces the Feynman generating functional. For the free scalar field in $1+1$ dimensions we derive the constrained equations of motion, implement the resulting dynamics numerically, and verify real-time two-point correlators, equal-time commutator relations, and Dyson--Schwinger equations including the expected contact terms.", "url": "https://arxiv.org/abs/2605.26892", "type": "理论", "summary": "约束辛量子化是量子场论的函数表述，其中量子涨落通过辅助本征时间 $\\tau$ 中的确定性哈密顿流进行采样。在本文中，我们将[1]中引入的量子力学框架扩展到闵可夫斯基时空中的相对论标量量子场论。该构造基于从 $\\mathbb{R}$ 到 $\\mathbb{C}$ 的场和作用的解析延拓，以及选择稳定的内在时间轨迹的约束，同时为相应的微正则泛函定义收敛积分循环。我们证明，在连续极限下，微正则生成泛函再现了费曼生成泛函。对于 $1+1$ 维度的自由标量场，我们推导了约束运动方程，以数值方式实现了所得动力学，并验证了实时两点相关器、等时换向器关系和包括预期接触项的 Dyson-Schwinger 方程。", "authors": [{"name": "Francesco Scardino"}, {"name": "Martina Giachello"}, {"name": "Giacomo Gradenigo"}], "featured_authors": [{"name": "Francesco Scardino"}, {"name": "Martina Giachello"}, {"name": "Giacomo Gradenigo"}], "author_count": 3}, {"id": "2605.27070", "category": "hep-th", "title": "Geometrically constrained multi-kink configurations in generalized impurity-doped field theories", "abstract": "This short communication investigates impurity coupling in generalized field theories where scalar coupling is introduced directly at the level of the kinetic and gradient contributions of the energy. We show that the fundamental aspects of the original theory, which has been previously investigated in the impurity-free setting, can be extended to the inhomogeneous scenario. In particular, an interpretation in terms of geometrically-constrained effective one-field theories with impurities is possible in the separable case. We show that BPS multi-kink configurations are possible in the model, as well as in the usual half-BPS scalar theories.", "url": "https://arxiv.org/abs/2605.27070", "type": "理论", "summary": "这篇简短的交流研究了广义场论中的杂质耦合，其中标量耦合直接在能量的动能和梯度贡献水平上引入。我们表明，先前在无杂质环境下研究过的原始理论的基本方面可以扩展到非齐次场景。特别是，在可分离情况下，可以根据带有杂质的几何约束有效单场理论进行解释。我们证明了 BPS 多扭结配置在模型以及通常的半 BPS 标量理论中是可能的。", "authors": [{"name": "D. Bazeia"}, {"name": "M. A. Liao"}, {"name": "M.A. Marques"}], "featured_authors": [{"name": "D. Bazeia"}, {"name": "M. A. Liao"}, {"name": "M.A. Marques"}], "author_count": 3}, {"id": "2605.27206", "category": "hep-th", "title": "Structure of $\\mathcal{N} = 2$ superfield higher-spin abelian cubic interactions", "abstract": "In this article we study the structure of the $\\mathcal{N}=2$ abelian higher-spin cubic $(\\mathbf{s_1}, \\mathbf{s_2}, \\mathbf{s_2})$ vertices and the corresponding $\\mathcal{N}=2$ higher-spin supercurrents, introduced in arXiv:2408.00668 . These interactions are possible only for $\\mathbf{s_1} \\geq 2 \\mathbf{s_2}$. Conserved supercurrents are constructed as descendants of the \\textit{principal supercurrent}, which is uniquely characterized by simple differential conditions and admits an explicit representation in terms of $\\mathcal{N}=2$ higher-spin super-Weyl tensors. We derive the analytic form of the abelian vertices and identify the corresponding analytic higher-spin $\\mathcal{N}=2$ supercurrents. We show that the vertex structure is fully determined by the analytic supercurrents $J^{++}_{\\alpha(s-1)\\dot{\\alpha}(s-1)}$, $J^+_{\\alpha(s-1)\\dot{\\alpha}(s-2)}$, and $\\bar{J}^+_{\\alpha(s-2)\\dot{\\alpha}(s-1)}$. The analytic form of the vertices provides a simple framework for analyzing their component structure. As an example, we explore the component content of such interactions on the Bel--Robinson diagonal. Using the superfield inverse Noether procedure, we study higher-spin gauge transformations for the $\\mathcal{N}=2$ vector multiplet associated with the $(\\mathbf{s}, \\mathbf{1}, \\mathbf{1})$ interaction. In the rigid limit, for odd $\\mathbf{s}$ these transformations reduce to the $\\mathcal{N}=2$ superspace generalization of zilch-type higher-spin symmetries.", "url": "https://arxiv.org/abs/2605.27206", "type": "理论", "summary": "在本文中，我们研究了 arXiv:2408.00668 中介绍的 $\\mathcal{N}=2$ 阿贝尔高自旋立方 $(\\mathbf{s_1}, \\mathbf{s_2}, \\mathbf{s_2})$ 顶点的结构以及相应的 $\\mathcal{N}=2$ 高自旋超流。这些交互仅适用于 $\\mathbf{s_1} \\geq 2 \\mathbf{s_2}$。守恒超电流被构造为 \\textit{主超电流} 的后代，其独特之处在于简单的微分条件，并允许以 $\\mathcal{N}=2$ 高自旋超外尔张量的形式进行显式表示。我们推导了阿贝尔顶点的解析形式并确定了相应的解析高自旋 $\\mathcal{N}=2$ 超电流。我们证明顶点结构完全由解析超流 $J^{++}_{\\alpha(s-1)\\dot{\\alpha}(s-1)}$、$J^+_{\\alpha(s-1)\\dot{\\alpha}(s-2)}$ 和 $\\bar{J}^+_{\\alpha(s-2)\\dot{\\alpha}(s-1)}$ 决定。顶点的解析形式提供了一个用于分析其组件结构的简单框架。作为一个例子，我们探索贝尔-罗宾逊对角线上此类相互作用的组成内容。\n\n使用超场逆诺特过程，我们研究了与 $(\\mathbf{s}, \\mathbf{1}, \\mathbf{1})$ 相互作用相关的 $\\mathcal{N}=2$ 向量多重态的高自旋规范变换。在严格限制下，对于奇数 $\\mathbf{s}$，这些变换简化为 zilch 型高自旋对称性的 $\\mathcal{N}=2$ 超空间推广。", "authors": [{"name": "Nikita Zaigraev"}], "featured_authors": [{"name": "Nikita Zaigraev"}], "author_count": 1}, {"id": "2605.27256", "category": "hep-th", "title": "Thermal conformal partial waves from flat-space and defect CFT", "abstract": "We establish a correspondence between conformal partial waves on flat, thermal, and defect backgrounds using the shadow formalism. We demonstrate that scalar one-point thermal blocks can be systematically obtained from their four-point flat-space and two-point defect counterparts by considering specific operator configurations. This framework allows us to derive the thermal Casimir equation as a diagonal reduction of the flat-space Casimir system without introducing chemical potentials. We further show that defect two-point blocks with a spin-$l$ exchange operator correspond to thermal one-point blocks for an external spin-$l$ operator.", "url": "https://arxiv.org/abs/2605.27256", "type": "理论", "summary": "我们使用阴影形式建立了平坦、热和缺陷背景上的共形分波之间的对应关系。我们证明，通过考虑特定的算子配置，可以从四点平坦空间和两点缺陷对应物系统地获得标量单点热块。该框架使我们能够在不引入化学势的情况下将热卡西米尔方程推导为平坦空间卡西米尔系统的对角线简化。我们进一步表明，具有自旋$l$交换运算符的缺陷两点块对应于外部自旋$l$运算符的热单点块。", "authors": [{"name": "K.B. Alkalaev"}, {"name": "Semyon Mandrygin"}, {"name": "Vladimir Samsonov"}], "featured_authors": [{"name": "K.B. Alkalaev"}, {"name": "Semyon Mandrygin"}, {"name": "Vladimir Samsonov"}], "author_count": 3}, {"id": "2605.27359", "category": "hep-th", "title": "Wilson coefficients from a non-renormalization theorem in 2D SYM", "abstract": "Matrix string theory ( arXiv:hep-th/9703030 , arXiv:hep-th/9701025 , arXiv:hep-th/9710009 ) is a conjectured duality between two-dimensional maximally supersymmetric $U(N)$ Yang-Mills theory and type-IIA string theory in ten-dimensional Minkowski spacetime. The IR description of this gauge theory is governed by the symmetric product orbifold $(\\mathbb{R}^8)^N/S_N$ CFT. The leading irrelevant deformation from this IR fixed point is the Dijkgraaf-Verlinde-Verlinde operator, which comes with an unknown Wilson coefficient. We determine this coefficient using non-renormalization arguments from the UV gauge theory. The result is consistent with the matrix string theory conjecture and gives a first-principles check of the relation between $g_{\\rm YM}$ and the string coupling. We also comment on the prospects for fixing further Wilson coefficients using similar methods.", "url": "https://arxiv.org/abs/2605.27359", "type": "理论", "summary": "矩阵弦理论（ arXiv:hep-th/9703030 、 arXiv:hep-th/9701025 、 arXiv:hep-th/9710009 ）是十维明可夫斯基时空中二维最大超对称 $U(N)$ Yang-Mills 理论和 IIA 型弦理论之间的猜想对偶性。该规范理论的 IR 描述由对称积轨道 $(\\mathbb{R}^8)^N/S_N$ CFT 控制。该 IR 固定点的主要不相关变形是 Dijkgraaf-Verlinde-Verlinde 算子，它带有未知的 Wilson 系数。我们使用 UV 规范理论中的非重整化参数来确定该系数。结果与矩阵弦理论猜想一致，并对$g_{\\rm YM}$与弦耦合之间的关系进行了第一性原理检验。我们还评论了使用类似方法进一步确定威尔逊系数的前景。", "authors": [{"name": "Kabir Bajaj"}], "featured_authors": [{"name": "Kabir Bajaj"}], "author_count": 1}, {"id": "2605.26410", "category": "math-ph", "title": "Generalized Minkowski Theorem for Tetrahedra in ${\\rm dS}^3$ and ${\\rm AdS}^3$", "abstract": "We formulate and prove a constant-curvature, holonomy-valued Lorentzian analogue of Minkowski theorem for generalized tetrahedra in the constant-curvature Lorentzian spaces ${\\rm dS}^3$ and ${\\rm AdS}^3$. Four non-trivial based ${\\rm SO}^+(1,2)$ holonomies, or equivalently ${\\rm SL}(2,\\mathbb{R})$ spin lifts, determine intrinsic face normals, a dihedral Gram matrix $G$, and oriented triple products of intrinsic face normals. Under closure, nondegeneracy, and the outward convex branch condition, these data reconstruct a unique strictly convex tetrahedron up to ambient isometry. The sign of $\\det G$ selects the de Sitter or anti-de Sitter model, and the prescribed holonomies are exactly the based Levi-Civita face holonomies of the reconstructed tetrahedron. The extrinsic face normals also define a polar-dual projective tetrahedron. In particular, the all-null AdS sector gives ideal dual tetrahedra, and the all-timelike AdS sector gives hyperideal dual tetrahedra. In the all-spacelike sector, changing to ${\\rm SU}(2)$ real form recovers the reconstruction theorem for Euclidean spherical and hyperbolic tetrahedra.", "url": "https://arxiv.org/abs/2605.26410", "type": "理论", "summary": "我们制定并证明了常曲率洛伦兹空间 ${\\rm dS}^3$ 和 ${\\rm AdS}^3$ 中广义四面体的闵可夫斯基定理的常曲率、完整值洛伦兹类似物。四个非平凡的基于 ${\\rm SO}^+(1,2)$ 完整矩阵，或等效的 ${\\rm SL}(2,\\mathbb{R})$ 自旋升力，确定内在面法线、二面体格拉姆矩阵 $G$ 以及内在面法线的定向三重乘积。在闭合、非简并和外凸分支条件下，这些数据重建了一个独特的严格凸四面体，直至环境等距。 $\\det G$ 的符号选择 de Sitter 或反 de Sitter 模型，规定的完整矩阵正是基于重构四面体的 Levi-Civita 面完整矩阵。外部面法线还定义了极对偶射影四面体。特别是，全零 AdS 扇区给出了理想的双四面体，而全时 AdS 扇区给出了超理想的双四面体。在全空间扇区中，更改为 ${\\rm SU}(2)$ 实数形式可以恢复欧几里德球面和双曲四面体的重构定理。", "authors": [{"name": "Hongguang Liu"}, {"name": "Qiaoyin Pan"}], "featured_authors": [{"name": "Hongguang Liu"}, {"name": "Qiaoyin Pan"}], "author_count": 2}, {"id": "2605.26773", "category": "math-ph", "title": "Laplace's law for sharp and diffuse interfaces", "abstract": "We study both diffuse and sharp liquid-vapor interfaces. The equilibrium equation of fluids is derived by using the principle of virtual work in a domain including the interfaces. For diffuse interfaces, the surface tension coefficient depends on the density profile across the interface. For sharp interfaces, the liquid-vapor layer is mathematically represented by a geometric surface and its specific energy is a Dirac delta function at the surface. We compare the both approaches and find relations between the surface tension coefficient and parameters of the models.", "url": "https://arxiv.org/abs/2605.26773", "type": "理论", "summary": "我们研究弥散和尖锐的液-气界面。利用包含界面的域中的虚功原理推导出流体的平衡方程。对于扩散界面，表面张力系数取决于界面上的密度分布。对于尖锐界面，液汽层在数学上由几何表面表示，其比能是表面处的狄拉克δ函数。我们比较这两种方法并找到表面张力系数和模型参数之间的关系。", "authors": [{"name": "Sergey L. Gavrilyuk"}, {"name": "Henri Gouin"}], "featured_authors": [{"name": "Sergey L. Gavrilyuk"}, {"name": "Henri Gouin"}], "author_count": 2}, {"id": "2605.26946", "category": "math-ph", "title": "Partial theta-series and branching rules for the $\\sl(3)$ parabolic Verma modules", "abstract": "The monodromy of the $\\sl(3)$ Casimir flat connection around root hyperplanes is studied. For the computation of the traces of the root monodromy operators, acting on the parabolic Verma modules, we deduce branching rules w.r.t. the corresponding root $\\sl(2)$ subalgebras. We show that the traces of the monodromy operators are partial theta functions of special type.", "url": "https://arxiv.org/abs/2605.26946", "type": "理论", "summary": "研究了围绕根超平面的$\\sl(3)$卡西米尔平连接的单向性。为了计算根单性算子的迹，作用于抛物线 Verma 模，我们推导出分支规则。相应的根$\\sl(2)$子代数。我们证明单性算子的迹是特殊类型的偏θ函数。", "authors": [{"name": "Dotsenko Egor"}], "featured_authors": [{"name": "Dotsenko Egor"}], "author_count": 1}, {"id": "2605.27198", "category": "math-ph", "title": "Bounds on relative modular Hamiltonians in general QFT", "abstract": "The relative entropy between two states is a key concept in quantum information theory and quantum field theory. In the setting of quantum field theory, its computation requires the handling of relative modular Hamiltonians, which are typically very difficult to compute explicitly. In this paper, we exploit locality properties of general algebraic QFTs to estimate relative modular Hamiltonians between two states, $\\omega$ and $\\tilde{\\omega}$, and hence also their relative entropy, in terms of the modular Hamiltonian of a reference state $\\hat{\\omega}$, which might be better understood. For suitable pairs of states we can estimate the relative modular Hamiltonian for the algebra of a region $V_2$ from above, resp. from below, in terms of the modular Hamiltonian of $\\hat{\\omega}$ on a larger region $V_3$, resp. a smaller region $V_1$. Pairs of states and choices of regions which are susceptible to our scheme are related to the presence of superluminal signalling in the sense of Sorkin's paradox. If $\\omega=\\hat{\\omega}$, then there exists a unitary that maps $\\omega$ to $\\tilde{\\omega}$ on $V_3$ and that does not allow superluminal signalling from the spacelike complement $V_3'$ to $V_2$, resp. from $V_1$ to $V_2'$, if our upper, resp. lower, bound applies. To investigate the strength of our estimates we consider coherent states for CCR systems, focussing particularly on free scalar fields. Our estimates apply even if the relative modular Hamiltonian cannot be computed exactly. For sufficiently regular excitations we recover an exact result by squeezing. Our method thus yields an independent proof for the relative entropy formula in cases where the relative modular Hamiltonian cannot be computed exactly. For massless fields we establish the analogous result also for double cone regions. These results indicate that our estimates do not lose too much information.", "url": "https://arxiv.org/abs/2605.27198", "type": "理论", "summary": "两种状态之间的相对熵是量子信息论和量子场论中的关键概念。在量子场论的背景下，其计算需要处理相对模哈密顿量，这通常很难显式计算。在本文中，我们利用一般代数 QFT 的局域性来估计两个状态 $\\omega$ 和 $\\tilde{\\omega}$ 之间的相对模哈密顿量，以及它们的相对熵，以参考状态 $\\hat{\\omega}$ 的模哈密顿量表示，这可能会更好理解。对于合适的状态对，我们可以从上面分别估计区域 $V_2$ 代数的相对模哈密顿量。从下面开始，分别以较大区域 $V_3$ 上 $\\hat{\\omega}$ 的模哈密顿量表示。较小的区域$V_1$。在索金悖论的意义上，对我们的方案敏感的状态对和区域选择与超光速信号的存在有关。\n\n如果 $\\omega=\\hat{\\omega}$，则存在一个酉映射 $\\omega$ 到 $V_3$ 上的 $\\tilde{\\omega}$，并且不允许从类空间补集 $V_3'$ 到 $V_2$ 的超光速信号。从 $V_1$ 到 $V_2'$，如果我们的上部，分别。下限适用。为了研究我们估计的强度，我们考虑 CCR 系统的相干态，特别关注自由标量场。即使无法准确计算相对模哈密顿量，我们的估计也适用。对于足够规则的激励，我们通过挤压恢复精确的结果。因此，在无法精确计算相对模哈密顿量的情况下，我们的方法可以为相对熵公式提供独立的证明。对于无质量场，我们也为双锥区域建立了类似的结果。这些结果表明我们的估计并没有丢失太多信息。", "authors": [{"name": "Adriano Chialastri"}, {"name": "Christoph Minz"}, {"name": "Ko Sanders"}], "featured_authors": [{"name": "Adriano Chialastri"}, {"name": "Christoph Minz"}, {"name": "Ko Sanders"}], "author_count": 3}, {"id": "2605.26205", "category": "quant-ph", "title": "Exact strong zero modes are generic in integrable spin systems with large anisotropy", "abstract": "Strong zero modes (SZMs) are edge-localized operators that commute with the Hamiltonian up to corrections exponentially small in system size, yielding anomalously long edge coherence times. In some settings, notably certain integrable models, this commutator can be made to vanish exactly at finite size, defining an exact SZM (ESZM). Existing ESZM constructions in the integrable setting, however, have proceeded model by model and have not been unified into a common framework. Here, I show that ESZMs arise generically in a broad family of integrable spin models with anisotropic interactions. Their existence follows from two algebraic properties of the underlying R- and K-matrices -- quasi-periodicity in the spectral parameter and tracelessness, respectively -- providing a uniform, model-independent mechanism. The framework recovers the known ESZM in XXZ chain and its higher-spin generalizations as special cases and predicts ESZMs in previously unrecognized models.", "url": "https://arxiv.org/abs/2605.26205", "type": "理论", "summary": "强零模式 (SZM) 是边缘局部算子，可与哈密顿量进行交换，直至系统规模呈指数级小修正，从而产生异常长的边缘相干时间。在某些设置中，特别是某些可积模型，可以使该换向器在有限尺寸下精确消失，从而定义精确的 SZM (ESZM)。然而，可集成环境中现有的 ESZM 结构是逐个模型进行的，尚未统一到一个通用框架中。在这里，我展示了 ESZM 通常出现在一系列具有各向异性相互作用的可积自旋模型中。它们的存在源于基础 R 和 K 矩阵的两个代数特性——分别是光谱参数的准周期性和无迹性——提供了一种统一的、独立于模型的机制。该框架将 XXZ 链中已知的 ESZM 及其高自旋泛化恢复为特殊情况，并预测以前未识别的模型中的 ESZM。", "authors": [{"name": "Sascha Gehrmann"}], "featured_authors": [{"name": "Sascha Gehrmann"}], "author_count": 1}, {"id": "2605.26215", "category": "quant-ph", "title": "Universal Bound for Entanglement Generation", "abstract": "We derive a universal condition for entanglement generation under general bilinear interactions in the presence of white thermal noise. While various protocols have been proposed to enhance the amount of generated entanglement, it remains unclear whether they can also relax the threshold for entanglement generation itself. Using a Gorini-Kossakowski-Sudarshan-Lindblad description, we analyze general multimode systems and derive a separability-preserving condition for bilinear interactions under white thermal noise. As an application to gravity-induced entanglement, we show that the gravitational interaction must dominate over thermal noise for entanglement to arise. In particular, this bound cannot be relaxed by changing the initial state or by introducing mediator systems, although such ingredients may enhance the amount of entanglement once it is generated. These results establish a general limitation on entanglement-generation protocols in thermal environments.", "url": "https://arxiv.org/abs/2605.26215", "type": "理论", "summary": "我们推导出在存在白热噪声的情况下一般双线性相互作用下纠缠生成的通用条件。虽然已经提出了各种协议来提高纠缠生成的数量，但仍不清楚它们是否也可以放宽纠缠生成本身的阈值。使用 Gorini-Kossakowski-Sudarshan-Lindblad 描述，我们分析了一般多模系统，并推导了白热噪声下双线性相互作用的可分离性保持条件。作为重力引起的纠缠的应用，我们表明重力相互作用必须压倒热噪声才能产生纠缠。特别是，这种束缚不能通过改变初始状态或引入介体系统来放松，尽管这些成分一旦产生就可以增强缠结的量。这些结果确立了热环境中纠缠生成协议的一般限制。", "authors": [{"name": "Alfred Li"}, {"name": "Daisuke Miki"}, {"name": "Yanbei Chen"}], "featured_authors": [{"name": "Alfred Li"}, {"name": "Daisuke Miki"}, {"name": "Yanbei Chen"}], "author_count": 3}, {"id": "2605.26219", "category": "quant-ph", "title": "Entanglement Pattern Transition of Quantum States from Directed Percolation", "abstract": "Changes in the entanglement structure and critical phenomena are hallmarks of quantum phase transitions. Here, we discuss how they appear in transitions between classes of states with distinct entanglement patterns beyond the paradigm of stable equilibrium phases of matter. Using a mapping between stochastic automata and isometric Tensor Network States (isoTNS), we construct a two-dimensional quantum state from the Domany-Kinzel automaton, which is a (1+1)D process with an absorbing phase transition in the directed percolation class. At the critical point of the automaton, the corresponding isoTNS hosts algebraic correlations in all spatial directions. The continuous parent Hamiltonian of this state has a degenerate ground state manifold. It consists of a product state (the absorbing state) and a second state that undergoes a transition from pairwise entanglement between distant regions, similarly to the W state, to a state with trivial entanglement. Our results demonstrate how the correspondence between isoTNS and classical stochastic evolution can be used to probe the Hilbert space structure beyond stable ground state manifolds.", "url": "https://arxiv.org/abs/2605.26219", "type": "理论+数值", "summary": "纠缠结构和临界现象的变化是量子相变的标志。在这里，我们讨论它们如何出现在具有超出物质稳定平衡相范式的独特纠缠模式的状态类别之间的转变中。使用随机自动机和等距张量网络状态 (isoTNS) 之间的映射，我们从 Domany-Kinzel 自动机构造二维量子态，这是一个 (1+1)D 过程，在定向渗流类中具有吸收相变。在自动机的临界点，相应的 isoTNS 在所有空间方向上都具有代数相关性。该状态的连续父哈密顿量具有简并基态流形。它由产物态（吸收态）和第二态组成，第二态经历了从遥远区域之间的成对纠缠（类似于W态）到普通纠缠状态的转变。我们的结果证明了如何使用 isoTNS 和经典随机演化之间的对应关系来探测稳定基态流形之外的希尔伯特空间结构。", "authors": [{"name": "Julian Boesl"}, {"name": "Frank Pollmann"}, {"name": "Michael Knap"}], "featured_authors": [{"name": "Julian Boesl"}, {"name": "Frank Pollmann"}, {"name": "Michael Knap"}], "author_count": 3}, {"id": "2605.26227", "category": "quant-ph", "title": "Mode-selective excitation in parametrically driven coupled quantum oscillators", "abstract": "A parametrically driven classical harmonic oscillator exhibits resonant instability when driven at twice its natural frequency, with the lowest energy configuration remaining unaffected by the drive. In contrast, the ground state of the quantum mechanical counterpart shows a non-trivial response to such a drive due to the spatial delocalization of the wavefunction. The standard realization of PR involves modulating the natural frequency of the oscillator. Here we study a different drive protocol in which the coupling between two such quantum harmonic oscillators is modulated parametrically. We show that the drive frequency can in principle be tuned to selectively excite any desired normal mode, while leaving the other close to its ground state. Only states with even quantum numbers in each normal mode are populated. Within the parametric resonance window the excitations follow a power-law decay with respect to occupation number, in contrast to the exponential decay observed off-resonance. We also briefly discuss how this framework can be extended to a system of N coupled oscillators", "url": "https://arxiv.org/abs/2605.26227", "type": "理论", "summary": "当以两倍其固有频率驱动时，参数驱动的经典谐振子表现出谐振不稳定性，且最低能量配置不受驱动的影响。相比之下，由于波函数的空间离域，量子力学对应物的基态对这种驱动表现出不平凡的响应。 PR 的标准实现涉及调制振荡器的固有频率。在这里，我们研究了一种不同的驱动协议，其中两个这样的量子谐振子之间的耦合被参数调制。我们表明，原则上可以调整驱动频率以选择性地激发任何所需的正常模式，同时使另一个接近其基态。仅填充每个正常模式中具有偶数量子数的状态。在参数共振窗口内，激励遵循相对于占据数的幂律衰减，与观察到的非共振指数衰减相反。我们还简要讨论了如何将该框架扩展到 N 个耦合振荡器的系统", "authors": [{"name": "Ranjani Seshadri"}], "featured_authors": [{"name": "Ranjani Seshadri"}], "author_count": 1}, {"id": "2605.26240", "category": "quant-ph", "title": "Amplification and generation bounds of gravity-induced entanglement in pulsed optomechanical systems", "abstract": "We investigate gravity-induced entanglement between the output optical fields of two red-detuned pulsed optomechanical systems with their masses coupled by mutual gravitational interaction. For each individual system, the optomechanical interaction realizes a beam-splitter state swap between an incident optical pulse and its mechanical mode. Using two rectangular pulses for each system -- the first to imprint a nonclassical state on the mechanical modes and the second to read the gravitationally generated entanglement back onto the outgoing light -- we show that the amount of entanglement can be amplified by preparing the input in a squeezed or Fock state. However, the threshold for entanglement generation is set by the competition between the gravitational coupling and thermal decoherence, $g_G>2\\gamma_m N_{\\rm th}$, and cannot be lowered by any choice of input state. We prove this bound for two-mode Gaussian inputs and show that it continues to hold for Fock-state inputs. We further analyze how imperfect detection modifies the threshold and identify the entanglement-annihilating and entanglement-breaking regimes, which are set by the thermal decoherence accumulated over the interaction time, independent of the gravitational coupling.", "url": "https://arxiv.org/abs/2605.26240", "type": "理论", "summary": "我们研究了两个红失谐脉冲光机械系统的输出光场之间的重力引起的纠缠，其质量通过相互重力相互作用耦合。对于每个单独的系统，光机相互作用实现了入射光脉冲与其机械模式之间的分束器状态交换。对每个系统使用两个矩形脉冲——第一个在机械模式上印上非经典状态，第二个将重力产生的纠缠读回到出射光上——我们表明，可以通过在压缩或福克状态下准备输入来放大纠缠量。然而，纠缠生成的阈值是由引力耦合和热退相干之间的竞争决定的，$g_G>2\\gamma_m N_{\\rm th}$，并且不能通过任何输入状态的选择来降低。我们证明了二模高斯输入的这个界限，并表明它对于福克状态输入仍然成立。\n\n我们进一步分析了不完美检测如何修改阈值，并识别纠缠湮灭和纠缠破坏机制，这些机制是由相互作用时间内积累的热退相干设定的，与引力耦合无关。", "authors": [{"name": "Daisuke Miki"}, {"name": "Alfred Li"}, {"name": "Yanbei Chen"}], "featured_authors": [{"name": "Daisuke Miki"}, {"name": "Alfred Li"}, {"name": "Yanbei Chen"}], "author_count": 3}, {"id": "2605.26272", "category": "quant-ph", "title": "Kubo-Ando Means and Rigidity of Quantum Positivity Cones", "abstract": "We investigate the stability of quantum positivity cones under nonlinear operator means. Specifically, we examine how Kubo--Ando means interact with the separable, positive partial transpose (PPT), and Schmidt-number cones. By analyzing the curvature of operator monotone functions at the identity, we give a strict rigidity phenomenon: weighted arithmetic means are the only Kubo--Ando means that preserve the separable cone in all dimensions. We show that the strictly positive curvature of any non-arithmetic mean explicitly forces a violation of the PPT condition, even in the foundational two-qubit setting, and can strictly increase the Schmidt number of the resulting operator. Finally, using the Choi--Jamiołkowski correspondence, we translate these geometric obstructions to the map-theoretic setting, concluding that convex mixing is the uniquely permissible Kubo--Ando operation for preserving entanglement-breaking quantum channels.", "url": "https://arxiv.org/abs/2605.26272", "type": "理论", "summary": "我们研究了非线性算子方法下量子正锥体的稳定性。具体来说，我们研究了 Kubo-Ando 的意思是如何与可分离的、正部分转置 (PPT) 和施密特数锥体相互作用的。通过分析算子单调函数在恒等处的曲率，我们给出了严格的刚性现象：加权算术平均值是唯一在所有维度上保持可分离圆锥的Kubo-Ando平均值。我们证明，任何非算术平均值的严格正曲率都会明确强制违反 PPT 条件，即使在基础的双量子位设置中也是如此，并且可以严格增加所得算子的施密特数。最后，利用 Choi-Jamiołkowski 对应关系，我们将这些几何障碍转化为图论设置，得出结论，凸混合是唯一允许的 Kubo-Ando 操作，用于保存打破纠缠的量子通道。", "authors": [{"name": "Mohsen Kian"}], "featured_authors": [{"name": "Mohsen Kian"}], "author_count": 1}, {"id": "2605.26331", "category": "quant-ph", "title": "Uncertainty Relation for a Single Observable", "abstract": "Uncertainty relations are usually formulated as trade-off relations between two or more observables. Here we show that the uncertainty of a single observable already has a nontrivial lower bound originating from the noncommutativity between the observable and the quantum state. We prove sharp lower bounds on the variance of a single observable and then sharpen them further by introducing the classical uncertainty of the observable under a fixed state. The optimal coefficient is determined solely by the smallest and largest eigenvalues of the state. Our results include an optimal state-dependent improvement of Luo's Wigner--Yanase-type relation and a direct bound showing that coherence or asymmetry of the state with respect to the observable gives an unavoidable contribution to its uncertainty. For qubits, the sharpened bounds become exact identities, giving a complete decomposition of the variance into classical and noncommutative parts. These single-observable relations also yield improved product-form uncertainty relations for pairs of observables.", "url": "https://arxiv.org/abs/2605.26331", "type": "理论", "summary": "不确定性关系通常被表述为两个或多个可观察量之间的权衡关系。在这里，我们表明，单个可观测量的不确定性已经具有一个不平凡的下界，该下界源于可观测量和量子态之间的不可交换性。我们证明了单个可观测量方差的尖锐下界，然后通过引入固定状态下可观测量的经典不确定性来进一步锐化它们。最佳系数仅由状态的最小和最大特征值决定。我们的结果包括罗的维格纳-柳酶型关系的最佳状态相关改进和直接界限，表明状态相对于可观测值的相干性或不对称性对其不确定性做出了不可避免的贡献。对于量子位，尖锐的边界变成精确的恒等式，将方差完全分解为经典部分和非交换部分。这些单一可观察量关系还为可观察量对产生改进的产品形式不确定性关系。", "authors": [{"name": "Haruki Yamashita"}, {"name": "Aina Mayumi"}, {"name": "Gen Kimura"}], "featured_authors": [{"name": "Haruki Yamashita"}, {"name": "Aina Mayumi"}, {"name": "Gen Kimura"}], "author_count": 3}, {"id": "2605.26377", "category": "quant-ph", "title": "Single-Ensemble Multiparameter Squeezing with Qudits", "abstract": "Quantum-enhanced multiparameter sensing is often associated with distributed architectures or 2-anticoherent states, whereas squeezing in a single collective ensemble is typically limited to single-parameter metrology. Here, we show that a single ensemble can support simultaneous multiparameter squeezing when each sensor is promoted from a qubit to a qudit (i.e., spin with $d$ energy levels). We develop a general framework in which the optimal product probe state, the corresponding global readout observables, and the associated squeezing parameters are all determined from the single-site quantum Fisher information matrix. We then present a minimal qudit construction for two-parameter vector magnetic field sensing with local dimension $d=3$. We further identify a collective twisting-like interacting Hamiltonian that generates such multiparameter-squeezed states and numerically demonstrate scalable metrological gain. In particular, for a trapped-ion qutrit chain with power-law interactions, we obtain up to 12 dB enhancement in two-parameter sensing for $N=256$ sensors. Our results establish qudit-enabled multiparameter squeezing in a single ensemble as a distinct route to multiparameter quantum metrology with global readout, and highlight its potential advantage over distributed multi-ensemble strategies in the fixed-sensor-budget regime.", "url": "https://arxiv.org/abs/2605.26377", "type": "理论+数值", "summary": "量子增强多参数传感通常与分布式架构或 2 反相干态相关，而单个集体系综中的压缩通常仅限于单参数计量。在这里，我们表明，当每个传感器从量子位提升到量子位（即以 $d$ 能级旋转）时，单个集成可以支持同时多参数压缩。我们开发了一个通用框架，其中最佳产物探测状态、相应的全局读出可观测量以及相关的压缩参数均由单点量子费希尔信息矩阵确定。然后，我们提出了局部维度 $d=3$ 的双参数矢量磁场传感的最小 qdit 结构。我们进一步确定了一种类似集体扭曲的相互作用哈密顿量，它产生这种多参数压缩状态，并在数值上证明了可扩展的计量增益。特别是，对于具有幂律相互作用的捕获离子 qutrit 链，我们在 $N=256$ 传感器的双参数传感中获得了高达 12 dB 的增强。\n\n我们的结果表明，在单个集合中启用 qdit 的多参数压缩是实现具有全局读数的多参数量子计量的独特途径，并强调了其相对于固定传感器预算制度中的分布式多集合策略的潜在优势。", "authors": [{"name": "Xiaoshui Lin"}, {"name": "Chunlei Qu"}, {"name": "Chong Zu"}, {"name": "Chuanwei Zhang"}], "featured_authors": [{"name": "Xiaoshui Lin"}, {"name": "Chunlei Qu"}, {"name": "Chong Zu"}, {"name": "Chuanwei Zhang"}], "author_count": 4}, {"id": "2605.26389", "category": "quant-ph", "title": "Scar Full Eigenstate Thermalization Hypothesis", "abstract": "The eigenstate thermalization hypothesis (ETH) provides a fundamental mechanism for emergent statistical mechanics in isolated chaotic quantum systems, asserting that individual energy eigenstates behave as pseudorandom vectors within an energy window. This enables a complete characterization of nontrivial correlations among matrix elements in the energy eigenbasis, as described by the full ETH ansatz. Nevertheless, this description breaks down in systems exhibiting quantum many-body scars, which host non-thermal eigenstates with extensive energy. In this Letter, we address this problem by formulating the \\textit{scar full ETH}, which captures correlations among matrix elements involving scar states. The corresponding scaling forms and factorization properties are established using typicality arguments. Multi-time correlation functions for scar states are then organized in terms of both thermal and scar cumulants, providing a nontrivial reorganization of higher-order correlations. We numerically demonstrate the validity of this framework in the paradigmatic model of quantum scars, the PXP model. Our results pave the way for a systematic understanding of intriguing correlations in systems with quantum many-body scars.", "url": "https://arxiv.org/abs/2605.26389", "type": "理论+数值", "summary": "本征态热化假说（ETH）为孤立混沌量子系统中的新兴统计力学提供了基本机制，断言单个能量本征态在能量窗口内表现为伪随机向量。这使得能够完整表征能量本征基中矩阵元素之间的非平凡相关性，如完整的 ETH ansatz 所描述的那样。然而，这种描述在表现出量子多体疤痕的系统中不成立，该系统具有具有广泛能量的非热本征态。在这封信中，我们通过制定 \\textit{scar full ETH} 来解决这个问题，它捕获涉及疤痕状态的矩阵元素之间的相关性。相应的缩放形式和因式分解属性是使用典型性参数建立的。然后根据热累积量和疤痕累积量来组织疤痕状态的多时间相关函数，从而提供高阶相关性的重要重组。我们在量子疤痕范例模型（PXP 模型）中通过数值证明了该框架的有效性。\n\n我们的结果为系统地理解具有量子多体疤痕的系统中有趣的相关性铺平了道路。", "authors": [{"name": "Ning Sun"}, {"name": "Yanting Cheng"}], "featured_authors": [{"name": "Ning Sun"}, {"name": "Yanting Cheng"}], "author_count": 2}, {"id": "2605.26522", "category": "quant-ph", "title": "A Resource Comparison of Logical T-State Preparation", "abstract": "Logical T state preparation is a major overhead source in fault tolerant architectures built from stabilizer operations. Existing protocols, however, are reported under different code families, noise models, postselection rules, and cost conventions, making direct comparison difficult. We compare three representative preparation routes: magic state distillation, magic state cultivation, and code switching, using currently available results. Rather than reducing heterogeneous data to a single cost metric, we retain source native cost units and record output error, single attempt cost, expected cost per accepted output, footprint, latency, and reporting completeness for each configuration. Within the current dataset, distillation reaches the lowest output error regime; code switching achieves the lowest reported single attempt cost and the smallest explicit footprint among the compatible rows; and recent RP2 cultivation results add low cost cultivation points with output errors between 1e-6 and 1e-9. As a simple algorithm level case study, we also examine the reported preparation routes under an error budget motivated by Shor factoring algorithm, in order to relate single state preparation costs to full workload requirements. The resulting comparison clarifies the trade offs currently supported across the literature, while remaining bounded by the conventions and coverage of the underlying papers.", "url": "https://arxiv.org/abs/2605.26522", "type": "理论+数值", "summary": "逻辑 T 状态准备是由稳定器操作构建的容错架构中的主要开销来源。然而，现有协议是在不同的代码系列、噪声模型、后选择规则和成本约定下报告的，这使得直接比较变得困难。我们利用目前已有的结果，比较了三种有代表性的准备路线：魔态蒸馏、魔态修炼、代码切换。我们不是将异构数据减少为单一成本指标，而是保留源本机成本单位并记录输出错误、单次尝试成本、每个接受输出的预期成本、占用空间、延迟和每个配置的报告完整性。在当前数据集中，蒸馏达到最低的输出误差范围；代码切换实现了报告的最低单次尝试成本和兼容行中最小的显式占用空间；最近的RP2栽培结果增加了低成本栽培点，产量误差在1e-6和1e-9之间。\n\n作为一个简单的算法级案例研究，我们还检查了由短因子分解算法驱动的错误预算下报告的准备路线，以便将单状态准备成本与完整工作负载要求联系起来。由此产生的比较澄清了目前文献中支持的权衡，同时仍然受到基础论文的惯例和覆盖范围的限制。", "authors": [{"name": "Jianshuo Gao"}, {"name": "Xiao Yuan"}, {"name": "Yuan Yao"}], "featured_authors": [{"name": "Jianshuo Gao"}, {"name": "Xiao Yuan"}, {"name": "Yuan Yao"}], "author_count": 3}, {"id": "2605.26586", "category": "quant-ph", "title": "Analytical Singular-Value Structure of Analytic-Continuation Kernels from Slepian Information Theory", "abstract": "Analytic continuation from imaginary-time Green's functions to real-frequency spectra is a central ill-posed inverse problem in quantum many-body physics. We show that the thermal kernel admits an analytical generalized singular-value structure once its purely dynamical part is separated from the statistical weight imposed by the heat bath. The dynamical kernel is the imaginary-bandwidth continuation of Slepian's finite Fourier transform and is governed by the same Sturm-Liouville algebra that yields prolate spheroidal wave functions. Fermionic and bosonic statistics then enter as gauge transformations of the frequency-space inner product, producing self-adjoint effective potentials but no numerical kernel diagonalization. The Shannon number, $N_c=\\beta\\wmax/\\pi$, fixes the upper information capacity of this pure Laplace channel. Finally, the optimal sampling points are obtained as eigenvalues of a Legendre colleague matrix, giving a deterministic compressed-sensing grid without iterative root searches.", "url": "https://arxiv.org/abs/2605.26586", "type": "理论+数值", "summary": "从虚时间格林函数到实频谱的解析延拓是量子多体物理中的中心不适定反问题。我们表明，一旦热核的纯动态部分与热浴施加的统计权重分离，热核就承认分析广义奇异值结构。动力学核是 Slepian 有限傅里叶变换的虚部带宽延续，并受产生长椭球波函数的相同 Sturm-Liouville 代数控制。然后，费米子和玻色子统计作为频率空间内积的规范变换进入，产生自伴有效势，但没有数值核对角化。香农数 $N_c=\\beta\\wmax/\\pi$ 确定了这个纯拉普拉斯通道的上限信息容量。最后，获得最佳采样点作为勒让德同事矩阵的特征值，从而给出确定性压缩感知网格，而无需迭代根搜索。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2605.26610", "category": "quant-ph", "title": "End-to-End PDE-Based Quantum Algorithms for Multi-Asset Option Pricing under Local and Stochastic Volatility", "abstract": "Multi-asset option pricing under local- and stochastic-volatility models leads naturally to high-dimensional parabolic PDEs. We develop an end-to-end quantum PDE framework for European option pricing under local-volatility Black--Scholes and Heston models. The framework takes classical contract and model data as input and returns classical estimates of selected option values. We solve the pricing PDEs after finite-difference discretization on spatial grids. For $N=2^n$ grid points per spatial direction and $d$ assets, the end-to-end gate complexity for single-point recovery, counted in elementary CNOT gates and one-qubit Pauli-axis rotations, has leading grid-size dependence $\\widetilde{O}(d^2 N^{2+d/2})$ for local-volatility Black--Scholes and $\\widetilde{O}(d^2 N^{d+2})$ for Heston. Relative to grid-based finite-difference baselines, these scalings correspond to polynomial improvement factors $N^{d/2}$ and $N^d$, respectively. These estimates translate to Clifford+T resources via standard compilation. We complement the complexity analysis with numerical benchmarks against standard classical methods. In the Heston setting, the framework recovers option prices across strikes together with the associated implied-volatility smile/skew. Overall, this work provides a complete end-to-end quantum pricing pipeline with explicit resource accounting and theoretical performance guarantees.", "url": "https://arxiv.org/abs/2605.26610", "type": "理论+数值", "summary": "局部和随机波动率模型下的多资产期权定价自然会导致高维抛物线偏微分方程。我们开发了一个端到端的量子 PDE 框架，用于局部波动性 Black-Scholes 和 Heston 模型下的欧洲期权定价。该框架采用经典合约和模型数据作为输入，并返回所选期权值的经典估计。我们在空间网格上进行有限差分离散化后求解定价偏微分方程。对于每个空间方向 $N=2^n$ 个网格点和 $d$ 资产，单点恢复的端到端门复杂性（以基本 CNOT 门和一量子位泡利轴旋转计算）具有领先的网格大小依赖性 $\\widetilde{O}(d^2 N^{2+d/2})$ 局部波动 Black--Scholes 和 $\\widetilde{O}(d^2 N^{d+2})$赫斯顿。相对于基于网格的有限差分基线，这些缩放比例分别对应于多项式改进因子 $N^{d/2}$ 和 $N^d$。这些估计通过标准编译转化为 Clifford+T 资源。我们通过针对标准经典方法的数值基准来补充复杂性分析。\n\n在赫斯顿设置中，该框架恢复了履约期间的期权价格以及相关的隐含波动率微笑/偏差。总的来说，这项工作提供了一个完整的端到端量子定价管道，具有明确的资源核算和理论性能保证。", "authors": [{"name": "Nikita Guseynov"}, {"name": "Nana Liu"}, {"name": "Chi Seng Pun"}, {"name": "Tushar Vaidya"}], "featured_authors": [{"name": "Nikita Guseynov"}, {"name": "Nana Liu"}, {"name": "Chi Seng Pun"}, {"name": "Tushar Vaidya"}], "author_count": 4}, {"id": "2605.26644", "category": "quant-ph", "title": "Evolution of Hypoequilibrium States in Steepest Entropy Ascent Models for Nonequilibrium Quantum Thermodynamics", "abstract": "A formal development of the hypoequilibrium (HE) state concept within the Steepest-Entropy-Ascent Quantum Thermodynamics (SEAQT) framework is presented, emphasizing its rigorous mathematical formulation. Using a general decomposition of the Hilbert space, HE states are defined in operator language and the reduced evolution of the associated intensive parameters for the regime where the dissipative dynamics commutes with the Hamiltonian is derived. It is proved that the $M$-th order HE family (where $M$ is the number of spectral sectors) constitutes an invariant manifold under the SEAQT equation of motion, ensuring that states initially representing a ``mixture of canonicals'' maintain this structure throughout their evolution. Furthermore, a formal connection is established between the HE ansatz and the rate-controlled constrained equilibrium (RCCE) method, identifying HE variables as constraint potentials. Finally, the model is extended to non-Hamiltonian SEAQT (NH-SEAQT) interactions to describe thermodynamically consistent energy and entropy exchanges between subsystems and heat baths. This work provides the formal foundation for reduced-order modeling of far-from-equilibrium relaxation and transport processes, and supports a methodology previously applied across various physical and chemical systems.", "url": "https://arxiv.org/abs/2605.26644", "type": "理论", "summary": "提出了最速熵上升量子热力学 (SEAQT) 框架内亚平衡 (HE) 状态概念的正式发展，强调其严格的数学公式。使用希尔伯特空间的一般分解，用算子语言定义 HE 状态，并导出耗散动力学与哈密顿量交换的状态的相关强度参数的简化演化。事实证明，$M$ 阶 HE 族（其中 $M$ 是光谱扇区的数量）构成了 SEAQT 运动方程下的不变流形，确保最初代表“规范混合”的状态在整个演化过程中保持这种结构。此外，在 HE ansatz 和速率控制约束平衡 (RCCE) 方法之间建立了正式联系，将 HE 变量识别为约束势。最后，该模型扩展到非哈密尔顿 SEAQT (NH-SEAQT) 相互作用，以描述子系统和热浴之间热力学一致的能量和熵交换。\n\n这项工作为远离平衡弛豫和传输过程的降阶建模提供了正式的基础，并支持以前应用于各种物理和化学系统的方法。", "authors": [{"name": "Gian Paolo Beretta"}, {"name": "Rohit Kishan Ray"}, {"name": "Michael R. von Spakovsky"}], "featured_authors": [{"name": "Gian Paolo Beretta"}, {"name": "Rohit Kishan Ray"}, {"name": "Michael R. von Spakovsky"}], "author_count": 3}, {"id": "2605.26705", "category": "quant-ph", "title": "Analytical Model of Clock Drift in Quantum Key Distribution and a Simple Synchronization Algorithm", "abstract": "Clock synchronization is critical for maintaining low error rates in quantum key distribution. Here, we describe how a frequency mismatch between the transmitter and receiver clocks affects the quantum bit error rate in quantum key distribution, and derive from this model a simple synchronization algorithm together with clock stability requirements for practical operation. Our algorithm continuously compensates for both frequency mismatch and time-offset fluctuations directly from detection timestamps. It does not require a dedicated synchronization channel or auxiliary qubit sequence, converges from a large frequency mismatch within approximately one second of photon acquisition, and remains effective in low-photon-count regimes (more than 30 dB of channel loss) using standard hardware. We validate our approach by demonstrating successful key exchange over 100 km of fiber and continuous operation over 24 hours in a 16 km metropolitan network using commercial systems, with performance equivalent to using a service channel for clock synchronization.", "url": "https://arxiv.org/abs/2605.26705", "type": "理论+数值", "summary": "时钟同步对于维持量子密钥分发中的低错误率至关重要。在这里，我们描述了发送器和接收器时钟之间的频率不匹配如何影响量子密钥分配中的量子误码率，并从该模型中推导出简单的同步算法以及实际操作的时钟稳定性要求。我们的算法直接从检测时间戳连续补偿频率失配和时间偏移波动。它不需要专用的同步通道或辅助量子位序列，在光子采集的大约一秒内从大的频率失配中收敛，并且使用标准硬件在低光子计数状态（超过 30 dB 的通道损耗）中保持有效。我们通过使用商业系统在 100 公里光纤上成功进行密钥交换以及在 16 公里城域网络中连续运行 24 小时以上来验证我们的方法，其性能相当于使用服务通道进行时钟同步。", "authors": [{"name": "Loïc Millet"}, {"name": "Boris Korzh"}, {"name": "Rob Thew"}, {"name": "Gianluca Boso"}], "featured_authors": [{"name": "Loïc Millet"}, {"name": "Boris Korzh"}, {"name": "Rob Thew"}, {"name": "Gianluca Boso"}], "author_count": 4}, {"id": "2605.26863", "category": "quant-ph", "title": "Zero-field dipolar decoupling of color center ensembles via universal qutrit control", "abstract": "Dipolar interactions are a major source of decoherence in dense ensembles of color centers in diamond. Current protocols demand using bias magnetic fields detrimental in many scenarios. We present ZENITH (Zero-field Ensemble Neutralization via Interleaved Trilevel Handling), a pulsed sequence to cancel dipolar interactions among V-degenerate spin-1 systems. We reveal excellent coherence survival, compatibility with existing sensing sequences, and improved DC detection, advancing a general framework to control interacting degenerate multilevel systems, of broad interest in quantum technologies.", "url": "https://arxiv.org/abs/2605.26863", "type": "理论", "summary": "偶极相互作用是钻石色心致密整体退相干的主要来源。目前的协议要求使用偏置磁场，这在许多情况下都是有害的。我们提出了 ZENITH（通过交错三级处理的零场系综中和），这是一种脉冲序列，用于消除 V 简并 spin-1 系统之间的偶极相互作用。我们揭示了出色的相干性生存、与现有传感序列的兼容性以及改进的直流检测，推进了控制相互作用的简并多级系统的通用框架，这在量子技术中引起了广泛的兴趣。", "authors": [{"name": "Antonio Verdú"}, {"name": "Ana Teresa Gea-Caballero"}, {"name": "Santiago Oviedo-Casado"}, {"name": "Fedor Jelezko"}, {"name": "Javier Prior"}], "featured_authors": [{"name": "Antonio Verdú"}, {"name": "Ana Teresa Gea-Caballero"}, {"name": "Santiago Oviedo-Casado"}, {"name": "Fedor Jelezko"}, {"name": "Javier Prior"}], "author_count": 5}, {"id": "2605.26866", "category": "quant-ph", "title": "Encrypted Cloning, Absolute Maximal Entanglement and Quantum Secret Sharing", "abstract": "The no-cloning theorem prohibits the creation of identical copies of quantum information, imposing fundamental constraints on quantum technologies. A recently proposed protocol, encrypted cloning, introduced by Yamaguchi and Kempf, showed that perfect qubit clones can be produced if they are simultaneously encrypted with a single-use key. They also observed a connection between this scheme and quantum secret sharing (QSS). However, it remained an open question whether encrypted cloning could be generalised to arbitrary dimensions, and the broader relationship between the two schemes had not been formally established. In this work, we address both questions by framing encrypted clones as Absolutely Maximally Entangled (AME) states. In parallel with recent work by Ceará that utilises Zadoff-Chu sequences, we independently develop a complementary framework for arbitrary dimensions based on Weyl-Heisenberg displacement operators, both tracing back to the original qubit construction by Yamaguchi and Kempf. We analytically compute the encrypted state and prove that an encrypted qudit system comprising two signal-noise qudit pairs is equivalent to a five-party AME state in any dimension, provided the input state is uniform. We then formalise the connection to QSS by proving that a threshold QSS scheme can achieve the fundamental objectives of encrypted cloning, establishing QSS as the natural general framework within which encrypted cloning can be contextualised.", "url": "https://arxiv.org/abs/2605.26866", "type": "理论", "summary": "不可克隆定理禁止创建相同的量子信息副本，从而对量子技术施加了基本限制。 Yamaguchi 和 Kempf 最近提出的加密克隆协议表明，如果同时使用一次性密钥进行加密，则可以生成完美的量子比特克隆。他们还观察到该方案与量子秘密共享（QSS）之间的联系。然而，加密克隆是否可以推广到任意维度仍然是一个悬而未决的问题，并且两种方案之间更广泛的关系尚未正式建立。在这项工作中，我们通过将加密克隆构建为绝对最大纠缠（AME）状态来解决这两个问题。与 Ceará 最近利用 Zadoff-Chu 序列的工作并行，我们独立开发了一个基于 Weyl-Heisenberg 位移算子的任意维度的补充框架，两者都可以追溯到 Yamaguchi 和 Kempf 的原始量子位构造。\n\n我们分析计算加密状态，并证明包含两个信号噪声 qudit 对的加密 qudit 系统等价于任何维度的五方 AME 状态，前提是输入状态是一致的。然后，我们通过证明阈值 QSS 方案可以实现加密克隆的基本目标，将 QSS 建立为加密克隆可以情境化的自然通用框架，从而形式化与 QSS 的联系。", "authors": [{"name": "Zheng Liang Lim"}, {"name": "Hoi-Kwong Lo"}], "featured_authors": [{"name": "Zheng Liang Lim"}, {"name": "Hoi-Kwong Lo"}], "author_count": 2}, {"id": "2605.26867", "category": "quant-ph", "title": "Entangling power and fidelity diagnostic for bipartite quantum channels", "abstract": "We study two complementary diagnostics of bipartite quantum channels, namely fidelity preservation across different classes of input states and entanglement generation from product inputs, given by properly defined entangling power for bipartite channels. We show that the fidelity averaged over any fixed Schmidt-coefficients local-unitary orbit for equal local dimensions is completely determined by average input-output fidelity and its restriction to product inputs. We also introduce concurrence- and negativity-based entangling power for 2-qubit channels, prove their convexity and monotonicity under local postprocessing, and show that, unlike the previously proposed linear-entropy quantity, they vanish for all separable channels. Examples of non-separable channels are investigated. Finally, we generalize our definitions of entangling power to non-product inputs, and provide an analytical lower bound for the concurrence-based entanglement variation, showing its effectiveness with specific examples.", "url": "https://arxiv.org/abs/2605.26867", "type": "理论", "summary": "我们研究了二分量子通道的两种互补诊断，即不同类别输入状态的保真度保持和乘积输入的纠缠生成，由正确定义的二分通道纠缠功率给出。我们证明，在相同局部维度的任何固定施密特系数局部酉轨道上的平均保真度完全由平均输入输出保真度及其对产品输入的限制决定。我们还引入了 2 量子位通道的基于并发和负性的纠缠能力，证明了它们在局部后处理下的凸性和单调性，并表明，与之前提出的线性熵不同，它们对于所有可分离通道都消失了。研究了不可分离通道的示例。最后，我们将纠缠力的定义推广到非产品输入，并为基于并发的纠缠变化提供了一个分析下界，并通过具体示例展示了其有效性。", "authors": [{"name": "Marcin Rudziński"}, {"name": "Gianluigi Tartaglione"}, {"name": "Karol Życzkowski"}], "featured_authors": [{"name": "Marcin Rudziński"}, {"name": "Gianluigi Tartaglione"}, {"name": "Karol Życzkowski"}], "author_count": 3}, {"id": "2605.26920", "category": "quant-ph", "title": "Extremal Marginal States of Maximal Rank in $(d, d+m)$", "abstract": "We study the extreme points of the convex set $\\mathcal{C}(\\rho_1,\\rho_2)$ of bipartite quantum states with fixed marginals $\\rho_1$ and $\\rho_2$. We construct extreme points in $(d,\\,d+m)$ dimension, of rank $d+m$, matching the highest possible value, for all $d\\geq 3$, $m > \\frac{d^2-2d-2}{2}$ (when $d=2$, $m\\geq 1$). This proves the existence of extremal states with relatively large rank and also covers all the known examples. We further show that, in order to analyze the extreme points of $\\mathcal{C}(\\rho_1,\\rho_2)$, it is sufficient to study the special case $\\mathcal{C}(\\mathcal{D}_1,\\mathcal{D}_2)$, where the marginals are diagonal. Additionally, we observe that it is sufficient to consider $d_1\\leq d_2$. Thus, our results show that apart from possibly a few finite cases, for each $d_1$, the maximal rank is achieved almost all times.", "url": "https://arxiv.org/abs/2605.26920", "type": "理论", "summary": "我们研究具有固定边际 $\\rho_1$ 和 $\\rho_2$ 的二分量子态的凸集 $\\mathcal{C}(\\rho_1,\\rho_2)$ 的极值点。我们在 $(d,\\,d+m)$ 维度中构建等级为 $d+m$ 的极值点，匹配所有 $d\\geq 3$、$m > \\frac{d^2-2d-2}{2}$（当 $d=2$、$m\\geq 1$ 时）。这证明了具有较大秩的极值状态的存在，并且也涵盖了所有已知的例子。我们进一步表明，为了分析 $\\mathcal{C}(\\rho_1,\\rho_2)$ 的极值点，研究特殊情况 $\\mathcal{C}(\\mathcal{D}_1,\\mathcal{D}_2)$ 就足够了，其中边缘是对角线。此外，我们观察到考虑 $d_1\\leq d_2$ 就足够了。因此，我们的结果表明，除了可能的少数有限情况外，对于每个 $d_1$，几乎每次都能达到最大排名。", "authors": [{"name": "Indu Bala"}, {"name": "Swapan Rana"}], "featured_authors": [{"name": "Indu Bala"}, {"name": "Swapan Rana"}], "author_count": 2}, {"id": "2605.27052", "category": "quant-ph", "title": "Semiclassical foundation of universality in chaotic quantum circuits", "abstract": "The fundamental correspondence between quantum chaotic single-particle systems and random matrix theory is well-understood via periodic orbit theory. In contrast, we show that many-body systems with explicit subsystem structure possess characteristics different from the single-particle theory. We present a periodic orbit theory for many-body systems with well defined semiclassical limit. For this we identify periodic orbit families arising exclusively in the many-body setting and implement a central limit theorem characterizing their correlations. Based on this we demonstrate that spectral correlations in chaotic quantum circuits are characterized by the breaking of individual time translation invariance of periodic orbits in the subsystems into residual synchronous time translations only. This provides a systematic approach to confirming random matrix universality in deterministic many-body systems.", "url": "https://arxiv.org/abs/2605.27052", "type": "理论", "summary": "通过周期轨道理论可以很好地理解量子混沌单粒子系统和随机矩阵理论之间的基本对应关系。相比之下，我们表明具有显式子系统结构的多体系统具有与单粒子理论不同的特征。我们提出了具有明确定义的半经典极限的多体系统的周期轨道理论。为此，我们确定了仅在多体环境中出现的周期轨道族，并实施了表征它们相关性的中心极限定理。在此基础上，我们证明混沌量子电路中的谱相关性的特征在于子系统中周期轨道的个体时间平移不变性被打破为仅剩余同步时间平移。这提供了一种系统方法来确认确定性多体系统中随机矩阵的普遍性。", "authors": [{"name": "Maximilian F. I. Kieler"}, {"name": "Felix Fritzsch"}, {"name": "Arnd Bäcker"}], "featured_authors": [{"name": "Maximilian F. I. Kieler"}, {"name": "Felix Fritzsch"}, {"name": "Arnd Bäcker"}], "author_count": 3}, {"id": "2605.27210", "category": "quant-ph", "title": "Qiskit QuantumKatas: Adapting Microsoft's Quantum Computing exercises for LLM evaluation", "abstract": "We adapt Microsoft's QuantumKatas -- a well-established quantum computing curriculum -- from Q# to Qiskit, the most widely-adopted quantum computing framework, and package it with an evaluation framework for systematic LLM assessment. The resulting benchmark comprises 350 tasks across 26 categories, spanning fundamental gates through advanced algorithms (Grover's, Simon's, Deutsch-Jozsa), error correction, key distribution, and quantum games. Each task includes a natural language prompt, canonical solution, and deterministic test verification via classical circuit simulation. By building on the QuantumKatas' proven pedagogical design rather than creating tasks from scratch, we inherit a principled difficulty progression and comprehensive concept coverage while contributing the framework adaptation, evaluation infrastructure, and empirical analysis. We evaluate 16 LLMs across 7 prompting configurations -- a total of 39,200 model runs -- to demonstrate the benchmark's utility. Three key findings emerge: (1) the benchmark effectively differentiates model capabilities, with best-configuration pass rates ranging from 32.3% to 83.1% and a 26.1 pp average gap between frontier and open-source models; (2) models perform well at implementing known algorithms (SimonsAlgorithm 82.1%, BasicGates 81.6%) but struggle with problem encoding (SolveSATWithGrover 34.4%, DistinguishUnitaries 40.0%); and (3) chain-of-thought prompting shows a modestly bimodal effect -- it is the best strategy for three models (two of them explicitly reasoning-tuned per vendor documentation) but degrades performance for the rest, leaving it mid-pack in aggregate (56.3% mean) behind few-shot-5 (57.8%). We release the benchmark, evaluation framework, and baseline results to support research on LLM capabilities in quantum computing.", "url": "https://arxiv.org/abs/2605.27210", "type": "理论+数值", "summary": "我们将微软的 QuantumKatas（一套完善的量子计算课程）从 Q# 改编为 Qiskit（最广泛采用的量子计算框架），并将其与系统化 LLM 评估的评估框架打包在一起。由此产生的基准包含 26 个类别的 350 个任务，涵盖高级算法（Grover、Simon、Deutsch-Jozsa）、纠错、密钥分发和量子游戏的基本门。每个任务都包括自然语言提示、规范解决方案以及通过经典电路仿真进行的确定性测试验证。通过建立在 QuantumKatas 经过验证的教学设计的基础上，而不是从头开始创建任务，我们继承了原则性的难度进展和全面的概念覆盖，同时贡献了框架适应、评估基础设施和实证分析。我们评估了 7 种提示配置中的 16 个法学硕士（总共 39,200 次模型运行），以展示基准测试的实用性。\n\n得出三个关键发现：（1）基准测试有效区分了模型能力，最佳配置通过率范围为 32.3% 至 83.1%，前沿模型与开源模型之间的平均差距为 26.1 个百分点； (2) 模型在实现已知算法方面表现良好（SimonsAlgorithm 82.1%、BasicGates 81.6%），但在编码问题上表现不佳（SolveSATWithGrover 34.4%、DistinguishUnitaries 40.0%）； (3) 思想链提示显示出适度的双峰效应——这是三个模型的最佳策略（其中两个根据供应商文档进行了明确的推理调整），但降低了其余模型的性能，使其总体处于中等水平（平均值为 56.3%），落后于 Few-shot-5（57.8%）。我们发布基准、评估框架和基线结果，以支持量子计算中的 LLM 能力研究。", "authors": [{"name": "Juan Cruz-Benito"}, {"name": "Ismael Faro"}], "featured_authors": [{"name": "Juan Cruz-Benito"}, {"name": "Ismael Faro"}], "author_count": 2}, {"id": "2605.27228", "category": "quant-ph", "title": "Bose-Einstein thermal operators for semidefinite optimization", "abstract": "We establish that semidefinite programs (SDPs) over the unbounded positive semidefinite cone are mathematically equivalent to thermodynamic systems of independent bosonic modes: the eigenvalues of the optimization variable play the role of expected occupation numbers, the linear objective plays the role of total expected energy, and the linear equality constraints play the role of conserved non-commuting charges. Building on this perspective, we recast general SDPs as bosonic free-energy minimization problems at strictly positive temperature, regularized by the Bose-Einstein entropy; the original SDP is recovered in the zero-temperature limit. The optimal primal variable takes the form of a Bose-Einstein thermal operator parametrized by the dual variables. We prove an approximation-error bound that depends on the ground-space degeneracy and the spectral gap of the dual slack operator, improving on the linear-in-dimension worst-case duality gap of interior-point methods. We also introduce the Bose-Einstein quantum relative entropy as a Bregman divergence on the unbounded positive semidefinite cone, generated by the negative Bose-Einstein entropy. We propose it as a natural divergence for unnormalized positive operators, for which the standard Umegaki relative entropy can become negative, and we show that it satisfies a restricted monotonicity property under affine maps modeling bosonic Gaussian channels. Finally, we develop hybrid quantum-classical algorithms for the regularized SDP using only Hamiltonian simulation, Hadamard tests, and classical sampling, and bound their runtime in closed form. Unlike existing quantum SDP solvers, whose runtimes scale polynomially with an a priori upper bound on the primal trace, our framework operates directly on the unbounded cone, replacing this bound with a dependence on the spectral structure of the dual slack operator.", "url": "https://arxiv.org/abs/2605.27228", "type": "理论+数值", "summary": "我们建立了无界正半定锥体上的半定规划（SDP）在数学上等价于独立玻色子模式的热力学系统：优化变量的特征值起到预期占据数的作用，线性目标起到总预期能量的作用，线性等式约束起到守恒非交换电荷的作用。基于这个观点，我们将一般的 SDP 重新定义为严格正温度下的玻色子自由能最小化问题，并通过玻色-爱因斯坦熵进行正则化；在零温极限下恢复了原来的SDP。最佳原始变量采用由双变量参数化的玻色-爱因斯坦热算子的形式。我们证明了一个近似误差界限，该界限取决于地面空间简并性和对偶松弛算子的谱间隙，改进了内点方法的维线性最坏情况对偶间隙。我们还将玻色-爱因斯坦量子相对熵引入为无界正半定锥上的布雷格曼散度，由负玻色-爱因斯坦熵生成。\n\n我们将其视为非归一化正算子的自然散度，其中标准 Umegaki 相对熵可以变为负值，并且我们证明它在建模玻色高斯通道的仿射映射下满足受限单调性属性。最后，我们仅使用哈密顿模拟、Hadamard 测试和经典采样为正则化 SDP 开发混合量子经典算法，并以封闭形式限制其运行时间。与现有的量子 SDP 求解器不同，现有的量子 SDP 求解器的运行时间与原始轨迹上的先验上限按多项式缩放，我们的框架直接在无界锥体上运行，用对双松弛算子的谱结构的依赖来替换该边界。", "authors": [{"name": "Michele Minervini"}, {"name": "Nana Liu"}, {"name": "Mark M. Wilde"}], "featured_authors": [{"name": "Michele Minervini"}, {"name": "Nana Liu"}, {"name": "Mark M. Wilde"}], "author_count": 3}, {"id": "2605.27262", "category": "quant-ph", "title": "Nonasymptotic bounds for quantum purity amplification", "abstract": "In quantum purity amplification, one is given $n$ copies of a noisy quantum state $\\rho \\in \\mathbb{C}^{d \\times d}$ and asked to prepare $k$ copies of its principal eigenstate $|v_d\\rangle$. Several prior works have derived information-theoretically optimal algorithms for this problem, but the bounds they prove are only shown in the asymptotic regime as the number of samples $n$ tends to infinity. In this paper, we establish the following nonasymptotic guarantee: if $\\rho$'s eigenvalues are sorted $p_1 \\leq \\cdots \\leq p_d$ and $p_{d-1} < p_d$, then \\begin{equation*} n = O\\Big(k + \\frac{k}{\\delta} \\cdot \\frac{1-p_d}{(p_d-p_{d-1})^2}\\Big) \\end{equation*} copies suffice to output a state with fidelity at least $1-\\delta$ with $|v_d^{\\otimes k}\\rangle$. Our bound holds for arbitrary spectra, and is independent of the dimension $d$. In the case of depolarizing noise, our finite-sample guarantee matches the optimal asymptotic scaling. Our proof is based on the combinatorics of random Young diagrams.", "url": "https://arxiv.org/abs/2605.27262", "type": "理论+数值", "summary": "在量子纯度放大中，给出 $n$ 个噪声量子态 $\\rho \\in \\mathbb{C}^{d \\times d}$ 的副本，并要求准备其主本征态 $|v_d\\rangle$ 的 $k$ 个副本。先前的几项工作已经针对该问题导出了信息理论上的最优算法，但它们证明的界限仅在渐近状态中显示，因为样本数量 $n$ 趋于无穷大。在本文中，我们建立以下非渐近保证：如果 $\\rho$ 的特征值排序为 $p_1 \\leq \\cdots \\leq p_d$ 且 $p_{d-1} < p_d$，则 \\begin{equation*} n = O\\Big(k + \\frac{k}{\\delta} \\cdot \\frac{1-p_d}{(p_d-p_{d-1})^2}\\Big) \\end{equation*} 复制足以输出保真度至少为 $1-\\delta$ 且 $|v_d^{\\otimes k}\\rangle$ 的状态。我们的界限适用于任意光谱，并且与维度 $d$ 无关。在去极化噪声的情况下，我们的有限样本保证与最佳渐近缩放相匹配。我们的证明基于随机杨图的组合。", "authors": [{"name": "Thilo Scharnhorst"}, {"name": "Jack Spilecki"}, {"name": "John Wright"}], "featured_authors": [{"name": "Thilo Scharnhorst"}, {"name": "Jack Spilecki"}, {"name": "John Wright"}], "author_count": 3}, {"id": "2605.27278", "category": "quant-ph", "title": "Optimal quantum locally differentially private mechanisms in the high-privacy regime", "abstract": "We optimize the trade-off between privacy and utility in the high-privacy regime. We adopt local differential privacy (LDP) and its quantum extension, quantum local differential privacy (QLD
