  <style>

  <script>
    const papers = [{"id": "2605.26207", "category": "cond-mat", "title": "Conserving relaxation-time approximation for electron-electron collisions", "abstract": "We develop a conserving relaxation-time approximation (cRTA), which explicitly enforces conservation of particle number, energy, and momentum and employs an energy-resolved projection onto the full space of collision invariants. This makes the cRTA applicable to transport quantities sensitive to the energy dependence of the nonequilibrium quasiparticle distribution near the Fermi surface. We benchmark the cRTA against several exact and asymptotically exact results. In particular, it reproduces the low- and high-temperature limits of the dc conductivity of a non-Galilean-invariant Fermi liquid (FL) with disorder, the hydrodynamic and collisionless limits of the finite wavevector longitudinal conductivity of a clean Galilean-invariant FL, and the asymptotic scaling forms of the optical conductivity of a clean non-Galilean-invariant FL beyond the semiclassical limit. For several observables, the agreement with exact solutions is quantitative at the percent level. These results demonstrate that the cRTA provides a simple and accurate framework for transport beyond the Fermi surface projection approximation.", "url": "https://arxiv.org/abs/2605.26207", "type": "理论+数值", "summary": "我们开发了一种守恒弛豫时间近似（cRTA），它明确地强制粒子数量、能量和动量守恒，并采用能量解析投影到碰撞不变量的整个空间。这使得 cRTA 适用于对费米表面附近非平衡准粒子分布的能量依赖性敏感的输运量。我们根据几个精确和渐近精确的结果对 cRTA 进行基准测试。特别是，它再现了无序的非伽利略不变费米液体（FL）的直流电导率的低温和高温极限、干净的伽利略不变FL的有限波矢量纵向电导率的流体动力学和无碰撞极限，以及超出半经典极限的干净的非伽利略不变FL的光学电导率的渐近标度形式。对于几个可观察量，与精确解的一致性是在百分比水平上定量的。这些结果表明，cRTA 为超越费米表面投影近似的输运提供了一个简单而准确的框架。", "authors": [{"name": "Sayak Bhattacharjee"}, {"name": "Tatia Kiliptari"}, {"name": "Dmitrii L. Maslov"}], "featured_authors": [{"name": "Sayak Bhattacharjee"}, {"name": "Tatia Kiliptari"}, {"name": "Dmitrii L. Maslov"}], "author_count": 3}, {"id": "2605.26223", "category": "cond-mat", "title": "Quantum Interference Corrections in Electron Hydrodynamics", "abstract": "We show that quantum-interference corrections in an electron fluid are tightly constrained by hydrodynamic Ward identities: charge and momentum conservation protect the $m=0,\\pm1$ sectors, so the leading correction first appears in the spin-two $m=\\pm2$ stress sector. The resulting hydrodynamic Cooperon has a robust infrared structure that renormalizes stress relaxation, and hence the viscosity. In channel flow this lowers the viscous resistivity, producing a hydrodynamic interference signature with the opposite sign to ordinary weak localization.", "url": "https://arxiv.org/abs/2605.26223", "type": "理论", "summary": "我们表明，电子流体中的量子干涉校正受到流体动力学沃德恒等式的严格约束：电荷和动量守恒保护 $m=0,\\pm1$ 扇区，因此主导校正首先出现在自旋二 $m=\\pm2$ 应力扇区。由此产生的流体动力学库珀伦具有强大的红外结构，可以重新规范化应力松弛，从而重新规范化粘度。在河道流动中，这会降低粘性电阻率，产生与普通弱定位相反的流体动力干扰特征。", "authors": [{"name": "Alberto Cortijo"}], "featured_authors": [{"name": "Alberto Cortijo"}], "author_count": 1}, {"id": "2605.26226", "category": "cond-mat", "title": "Hydrodynamic Cooperons in Electron Fluids: Schwinger--Keldysh Derivation and Quantum Corrections to Magnetoresistance", "abstract": "We develop a Schwinger--Keldysh effective theory for quantum-interference corrections in a two-dimensional electron system in the hydrodynamic regime. Starting from the clean hydrodynamic fixed point, we introduce a minimal random-friction disorder model that generates a finite momentum-relaxation time within the self-consistent Born approximation. The disorder-averaged theory then allows us to construct a hydrodynamic Cooperon and to compute the associated self-energy corrections to the collective modes. Conservation laws protect the density and momentum sectors, so that the leading quantum-coherence correction is forced into the spin-two stress sector. The associated stress self-energy renormalizes the shear viscosity and modifies both the Gurzhi response and its low-field magnetohydrodynamic signatures.", "url": "https://arxiv.org/abs/2605.26226", "type": "理论", "summary": "我们开发了一种施温格-凯尔迪什（Schwinger-Keldysh）有效理论，用于流体动力学范围内二维电子系统中的量子干涉校正。从干净的流体动力学不动点开始，我们引入了最小随机摩擦无序模型，该模型在自洽玻恩近似内生成有限的动量弛豫时间。然后，无序平均理论使我们能够构建流体动力学库珀伦并计算集体模式的相关自能修正。守恒定律保护密度和动量部分，因此领先的量子相干校正被迫进入自旋二应力部分。相关的应力自能重新规范了剪切粘度并修改了 Gurzhi 响应及其低场磁流体动力学特征。", "authors": [{"name": "Alberto Cortijo"}], "featured_authors": [{"name": "Alberto Cortijo"}], "author_count": 1}, {"id": "2605.26231", "category": "cond-mat", "title": "Competition between pair and single-particle superfluidity in bosonic quasi-flat bands: A Gaussian state approach", "abstract": "The interplay between interactions and quantum geometry can drive weakly dispersive bosons into different exotic many-body phases. In this work we study a quasi flat-band model in one dimension that exhibits an extended pair-superfluid phase in the all-flat-band limit. Introducing single-particle hopping leads to an intriguing competition with a more conventional single-particle superfluid: we find that the pair superfluid remains stable for a finite range of the hopping strength until the system eventually transitions into the conventional superfluid phase. In our study, we make use of a variational Gaussian state approach that provides a unified description of the single-particle and pair superfluid phases, regarding both the ground state wavefunction and the collective excitation spectrum. In particular, we derive a general relation between the speed of sound and a ``quantum geometric kernel'', thereby extending earlier connections to the quantum metric, which relied on single-particle mean-field theory. This approach is combined with insights from the two-boson problem and exact diagonalization to map out the full phase diagram of the model. Our results show that the Gaussian approach is a versatile tool for studying a broad range of superfluid phases of interacting bosons in multi-orbital lattices.", "url": "https://arxiv.org/abs/2605.26231", "type": "理论+数值", "summary": "相互作用和量子几何之间的相互作用可以驱动弱色散玻色子进入不同的奇异多体相。在这项工作中，我们研究了一维的准平带模型，该模型在全平带极限下表现出扩展的对超流体相。引入单粒子跳跃导致了与更传统的单粒子超流体的有趣竞争：我们发现成对超流体在跳跃强度的有限范围内保持稳定，直到系统最终转变为传统的超流体相。在我们的研究中，我们利用变分高斯态方法，在基态波函数和集体激发谱方面提供单粒子和成对超流体相的统一描述。特别是，我们推导了声速和“量子几何核”之间的一般关系，从而将早期的联系扩展到依赖于单粒子平均场理论的量子度量。这种方法与二玻色子问题和精确对角化的见解相结合，绘制出模型的完整相图。\n\n我们的结果表明，高斯方法是研究多轨道晶格中相互作用玻色子的各种超流体相的通用工具。", "authors": [{"name": "Maxime Burgher"}, {"name": "Simon Loddo"}, {"name": "Laurens Vanderstraeten"}, {"name": "Nathan Goldman"}, {"name": "Ivan Amelio"}], "featured_authors": [{"name": "Maxime Burgher"}, {"name": "Simon Loddo"}, {"name": "Laurens Vanderstraeten"}, {"name": "Nathan Goldman"}, {"name": "Ivan Amelio"}], "author_count": 5}, {"id": "2605.26261", "category": "cond-mat", "title": "GPU-accelerated finite-temperature Lanczos method for spin Hamiltonians", "abstract": "We present a GPU implementation of the finite-temperature Lanczos method (FTLM) for Heisenberg spin Hamiltonians that targets workstation hardware rather than distributed-memory clusters. The Hamiltonian action is evaluated matrix-free in a row-wise gather formulation. We introduce and compare two state-to-index strategies: a compressed lookup table (CLT), which reduces lookup memory by a factor of 16 relative to a full table while retaining a fixed, branch-light access pattern, and a GPU-adapted combinatorial-ranking scheme that removes the lookup table altogether. Numerical tests against FP64 CPU references show that FP32 GPU arithmetic changes heat capacities and magnetic susceptibilities by amounts several orders of magnitude below the stochastic uncertainty of the FTLM trace estimator at typical sample sizes. Benchmarks show speedups of up to about one order of magnitude over optimized multicore CPU calculations and enable Hilbert-space sectors of dimension ~10^8 on a single workstation GPU. The MATLAB/CUDA implementation, including example input files and benchmark scripts, is openly available at this https URL (archived at DOI: https://doi.org/10.5281/zenodo.20378647 ) under the Apache-2.0 license.", "url": "https://arxiv.org/abs/2605.26261", "type": "理论+数值", "summary": "我们提出了海森堡自旋哈密顿量的有限温度 Lanczos 方法 (FTLM) 的 GPU 实现，其目标是工作站硬件而不是分布式内存集群。哈密​​顿作用在行式聚集公式中进行无矩阵评估。我们介绍并比较了两种状态到索引策略：压缩查找表 (CLT)，它相对于完整表将查找内存减少了 16 倍，同时保留固定的轻分支访问模式；以及完全删除查找表的 GPU 适应组合排序方案。针对 FP64 CPU 参考的数值测试表明，FP32 GPU 算法对热容量和磁化率的改变量比典型样本大小的 FTLM 迹线估计器的随机不确定性低几个数量级。基准测试显示，与优化的多核 CPU 计算相比，速度提高了大约一个数量级，并在单个工作站 GPU 上实现了约 10^8 维的希尔伯特空间扇区。\n\nMATLAB/CUDA 实现（包括示例输入文件和基准脚本）可在 Apache-2.0 许可证下通过此 https URL（存档于 DOI：https://doi.org/10.5281/zenodo.20378647 ）公开获取。", "authors": [{"name": "Shadan Ghassemi Tabrizi"}, {"name": "Thomas D. Kühne"}], "featured_authors": [{"name": "Shadan Ghassemi Tabrizi"}, {"name": "Thomas D. Kühne"}], "author_count": 2}, {"id": "2605.26303", "category": "cond-mat", "title": "Extended Bose-Hubbard Model on Small Grids: Exact Diagonalization and Monte Carlo Studies", "abstract": "The superfluid-insulator transition in systems of lattice bosons is usually analyzed in the framework of the Bose-Hubbard model, and has been extensively studied by theory and simulations. Less attention has been paid to the remnants of the transition in truncated lattices, with or without periodic boundary conditions. Here we consider the hard-core limit of the extended Bose-Hubbard model on small square and triangular grids -- i.e., sections of the square and triangular lattices containing up to 13 sites. By mapping out the zero-temperature phase diagram through exact diagonalization, we find ground-state characteristics that are markedly different from those emerging in the thermodynamic limit, together with similarities. The dichotomy between superfluid-like and insulating-like behavior is then investigated in two-dimensional systems of a few interacting bosons in the continuum, subject to confining and optical-lattice potentials mimicking the $3\\times 3$ square grid. Using path-integral Monte Carlo simulations, we compute kinetic and potential energies, as well as superfluidity and exchange-cycle statistics, finding hints of Bose-Hubbard behavior even in systems of just five particles.", "url": "https://arxiv.org/abs/2605.26303", "type": "理论+数值", "summary": "晶格玻色子系统中的超流体-绝缘体转变通常在玻色-哈伯德模型的框架内进行分析，并通过理论和模拟进行了广泛的研究。人们很少关注有或没有周期性边界条件的截断晶格中过渡的残余物。在这里，我们考虑扩展 Bose-Hubbard 模型在小正方形和三角形网格上的硬核限制——即正方形和三角形网格的部分最多包含 13 个位点。通过精确对角化绘制零温相图，我们发现基态特征与热力学极限中出现的基态特征明显不同，但也有相似之处。然后，在连续体中一些相互作用的玻色子的二维系统中研究类超流体和类绝缘行为之间的二分法，受到模拟 3×3$ 方格的限制和光学晶格势的影响。\n\n使用路径积分蒙特卡罗模拟，我们计算动能和势能，以及超流性和交换周期统计数据，即使在只有五个粒子的系统中也能找到玻色-哈伯德行为的线索。", "authors": [{"name": "Gabriele Costa"}, {"name": "Matteo Ciardi"}, {"name": "Fabio Cinti"}, {"name": "Santi Prestipino"}], "featured_authors": [{"name": "Gabriele Costa"}, {"name": "Matteo Ciardi"}, {"name": "Fabio Cinti"}, {"name": "Santi Prestipino"}], "author_count": 4}, {"id": "2605.26338", "category": "cond-mat", "title": "Phase behavior of solvent-nematogen mixtures", "abstract": "Liquid mixtures with a nematogen can undergo both fluid phase separation and a transition from an isotropic to a nematic state. These phase transitions can couple and lead to phase behavior distinct from simple liquid mixtures or pure liquid crystals. We measured the phase behavior of mixtures of a nematogen (5CB) with simple liquid solvents (squalane and/or squalene). We observed two distinct kinds of binary phase diagrams: with and without a region of isotropic-isotropic coexistence. Varying the ratio of squalene to squalane, we continuously tuned the phase boundaries of the apparent binary system and revealed a region of three-phase coexistence. A mean-field model combining classical models of liquid mixing and nematic ordering quantitatively describes both binary and ternary phase behavior. This simple model predicts a range of topologically complex ternary phase diagrams and extends naturally to systems with more components.", "url": "https://arxiv.org/abs/2605.26338", "type": "理论+数值", "summary": "含有线状物质的液体混合物可以经历流体相分离和从各向同性状态向向列状态的转变。这些相变可以耦合并导致与简单液体混合物或纯液晶不同的相行为。我们测量了线虫原 (5CB) 与简单液体溶剂（角鲨烷和/或角鲨烯）混合物的相行为。我们观察到两种不同类型的二元相图：有和没有各向同性-各向同性共存区域。通过改变角鲨烯与角鲨烷的比例，我们不断调整表观二元系统的相界，并揭示了三相共存的区域。平均场模型结合了液体混合和向列排序的经典模型，定量描述了二元和三元相行为。这个简单的模型可以预测一系列拓扑复杂的三元相图，并自然地扩展到具有更多组件的系统。", "authors": [{"name": "Sullivan Bailey-Darland"}, {"name": "Takumi Matsuzawa"}, {"name": "Eric R. Dufresne"}], "featured_authors": [{"name": "Sullivan Bailey-Darland"}, {"name": "Takumi Matsuzawa"}, {"name": "Eric R. Dufresne"}], "author_count": 3}, {"id": "2605.26412", "category": "cond-mat", "title": "Multi-Scale Coherence of Represented Flows", "abstract": "Many problems in nonlinear and statistical physics are formulated through represented flows, including physical-space vector fields, phase-space drift fields, and truncated renormalization-group beta functions. We introduce a complementary representation-dependent diagnostic for testing whether finite-separation flow geometry is stable across observational resolution. For two separated points, states, or theories, the method compares the direction of the corresponding vector-field increment after the field has been smoothed at two resolutions. Averaging this normalized comparison over sampled separations gives a coherence matrix tied to the chosen variables, coarse graining, metric, and sampling protocol; it is a consistency test, not a coordinate-invariant quantity. We demonstrate the diagnostic in three settings. Synthetic divergence-free fields with identical Fourier amplitudes, spectra, and scalar two-point correlations nevertheless produce distinct coherence matrices, showing that second-order statistics do not determine cross-resolution increment geometry. Lorenz phase-space tests show that a smooth coordinate wrinkling changes represented drift geometry without changing the underlying dynamics, and that a weak model perturbation lowers finite-separation coherence even when local stretching proxies remain closely matched. Finally, for functional renormalization-group flows of the three-dimensional \\(O(1)\\) scalar theory, projected \\(M=4,5,6\\) LPA beta fields remain internally coherent, while cross-truncation coherence decreases as higher-order coupling directions are activated. The diagnostic provides a practical field-level check of how representations, models, and truncations preserve finite-separation flow geometry, complementing rather than replacing standard local, spectral, or fixed-point diagnostics.", "url": "https://arxiv.org/abs/2605.26412", "type": "理论", "summary": "非线性和统计物理中的许多问题都是通过表示流来表述的，包括物理空间矢量场、相空间漂移场和截断重正化群 beta 函数。我们引入了一种补充性的依赖于表示的诊断，用于测试有限分离流几何在观测分辨率上是否稳定。对于两个分离的点、状态或理论，该方法在场以两种分辨率平滑后比较相应的矢量场增量的方向。对采样分离的归一化比较进行平均，得到与所选变量、粗粒度、度量和采样协议相关的相干矩阵；它是一致性检验，而不是坐标不变量。我们在三种设置中演示诊断。然而，具有相同傅立叶振幅、频谱和标量两点相关性的合成无散度场会产生不同的相干矩阵，这表明二阶统计量并不能确定交叉分辨率增量几何形状。\n\n洛伦兹相空间测试表明，平滑的坐标起皱变化代表了漂移几何形状，而不会改变底层动力学，并且即使局部拉伸代理保持紧密匹配，弱模型扰动也会降低有限分离相干性。最后，对于三维 \\(O(1)\\) 标量理论的函数重正化群流，投影 \\(M=4,5,6\\) LPA beta 场保持内部相干，而交叉截断相干性随着高阶耦合方向的激活而降低。该诊断提供了对表示、模型和截断如何保留有限分离流几何形状的实用现场级检查，补充而不是取代标准局部、谱或定点诊断。", "authors": [{"name": "Amir Jafari"}], "featured_authors": [{"name": "Amir Jafari"}], "author_count": 1}, {"id": "2605.26420", "category": "cond-mat", "title": "Ground state correlations in the one-dimensional Fermi one-component plasma", "abstract": "Structural and dynamic correlations in the ground state of the one-dimensional Fermi one-component plasma are studied by Quantum Monte Carlo simulations. Results are presented for the pair correlation function, static structure factor, the one-particle density matrix and the momentum distribution, for the cases of full, partial and no polarization. Evidence is reported of density correlations slowly decaying with distance, with the concurrent emergence of quasi-crystalline order even in the weakly correlated regime. Effects of quantum statistics in the momentum distribution are discussed.", "url": "https://arxiv.org/abs/2605.26420", "type": "数值", "summary": "通过量子蒙特卡罗模拟研究了一维费米单组分等离子体基态的结构和动力学相关性。给出了完全、部分和无偏振情况下的配对相关函数、静态结构因子、单粒子密度矩阵和动量分布的结果。据报道，有证据表明密度相关性随着距离的增加而缓慢衰减，即使在弱相关状态下也会同时出现准晶序。讨论了量子统计对动量分布的影响。", "authors": [{"name": "Massimo Boninsegni"}], "featured_authors": [{"name": "Massimo Boninsegni"}], "author_count": 1}, {"id": "2605.26541", "category": "cond-mat", "title": "Super-Arrhenius Dynamic Slowdown Revealed by Slow Variable Modulation in the Fragile Supercooled Liquid", "abstract": "The super-Arrhenius dynamic slowdown in fragile supercooled liquids remains one of the central unresolved questions in condensed matter physics. In this study, we analyze particle jump dynamics in a prototypical fragile glass-forming liquid, the Kob-Andersen Lennard-Jones (KALJ) model. Using the displacement of jumping particles as the reaction coordinate, we demonstrate the emergence of non-Poissonian dynamics as the temperature decreases. In the mildly supercooled regime, the outer region of the first coordination shell of a jumping particle exhibits a significant distribution shift during the jump motion. By comparing the survival probability with its slow-fluctuation limit using this distribution as a slow variable, we confirm that particles in this region modulate the jump dynamics, enhance the jump rate fluctuations, and thereby induce the dynamic slowdown as supercooling proceeds. As the temperature decreases, this behavior extends to the outer regions of the second coordination shell and beyond, intensifying the dynamic slowdown. This spatial growth of the slow variables responsible for dynamic disorder exhibits close correspondence with an increase in the static correlation length. These results provide a microscopic mechanism for the super-Arrhenius dynamic slowdown in the KALJ model.", "url": "https://arxiv.org/abs/2605.26541", "type": "理论+数值", "summary": "脆弱的过冷液体中的超阿伦尼乌斯动力学减速仍然是凝聚态物理学中未解决的核心问题之一。在这项研究中，我们分析了典型的易碎玻璃形成液体中的粒子跳跃动力学，即 Kob-Andersen Lennard-Jones (KALJ) 模型。使用跳跃粒子的位移作为反应坐标，我们证明了随着温度降低非泊松动力学的出现。在轻度过冷状态下，跳跃粒子第一配位壳的外部区域在跳跃运动期间表现出显着的分布变化。通过使用该分布作为慢变量来比较生存概率与其慢波动极限，我们确认该区域中的粒子调节跳跃动力学，增强跳跃速率波动，从而随着过冷的进行而引起动态减速。随着温度降低，这种行为延伸到第二配位层的外部区域及更远的地方，加剧了动态减速。\n\n导致动态无序的缓慢变量的空间增长与静态相关长度的增加密切相关。这些结果为 KALJ 模型中的超阿累尼乌斯动态减速提供了微观机制。", "authors": [{"name": "Zhiye Tang"}, {"name": "Shubham Kumar"}, {"name": "Shinji Saito"}], "featured_authors": [{"name": "Zhiye Tang"}, {"name": "Shubham Kumar"}, {"name": "Shinji Saito"}], "author_count": 3}, {"id": "2605.26570", "category": "cond-mat", "title": "Ultrametricity of Energy Minimum Configurations of RNA Secondary Structures in the Nussinov Model", "abstract": "We present a numerical study of the ultrametric properties of the set of RNA secondary structures with the maximum number of base pairs (energetically degenerate minima) within the maximum matching model (Nussinov algorithm). Using 18 natural small nuclear RNAs as examples, we show that the degree of nontrivial ultrametricity varies widely. We consider the optimization problem for the degree of nontrivial ultrametricity of RNA secondary structures with the maximum number of base pairs under a fixed nucleotide composition. It is found that permuting the nucleotide sequence can strongly change the degree of ultrametricity, indicating the key role of nucleotide order in shaping the hierarchical properties of RNA secondary structures.", "url": "https://arxiv.org/abs/2605.26570", "type": "理论+数值", "summary": "我们对最大匹配模型（Nussinov 算法）内具有最大碱基对数量（能量简并最小值）的 RNA 二级结构集的超量特性进行了数值研究。以 18 种天然核小 RNA 为例，我们发现超计量性的程度差异很大。我们考虑在固定核苷酸组成下具有最大碱基对数量的 RNA 二级结构的非平凡超量度程度的优化问题。研究发现，排列核苷酸序列可以强烈改变超量度的程度，表明核苷酸顺序在塑造RNA二级结构的层次特性中的关键作用。", "authors": [{"name": "A.P. Zubarev"}], "featured_authors": [{"name": "A.P. Zubarev"}], "author_count": 1}, {"id": "2605.26650", "category": "cond-mat", "title": "Quantum statistical mechanics: Gauge invariance, operator shifting, hyperdensity functionals, and nonequilibrium sum rules", "abstract": "We provide an extended acount of the recent statistical mechanical theory of gauge invariance against operator shifting in quantum many-body systems ( arXiv:2509.20494 ). The gauge transformation is enacted by a shifting superoperator that displaces the fundamental position and momentum degrees of freedom. The shifting superoperator constitutes a map between Hilbert space operators and it features Lie algebra commutator structure. Averages of general observables remain invariant under the shifting both in and out of thermal equilibrium, as well as in groundstates. The gauge invariance induces exact sum rules that interconnect global observables and associated locally resolved correlation functions. In particular we describe the resulting one-body force, hyperforce, product, and two-body sum rules. We relate the shifting superoperator to a previously formulated quantum canonical transformation and present the generalization of quantum shifting to multi-component systems. The gauge theory respects fundamental fermionic and bosonic particle properties, as we demonstrate by proving the compatibility of operator shifting and exchange symmetry. We formulate the quantum version of hyperdensity functional theory to provide formal access to hyperforces as well as to general averaged quantum observables via universal density functionals. For time-dependent situations, we describe quantum dynamical gauge invariance and prove exact dynamical sum rules for nonequilibrium situations, as generated by Hamiltonian time dependence. We argue for the fundamental status of statistical mechanical gauge invariance based on the compliance of the underlying geometry with canonical quantization according to Dirac's correspondence principle. Analogies and differences of the quantum mechanical sum rules with their classical counterparts remain indicative of the respective levels of description.", "url": "https://arxiv.org/abs/2605.26650", "type": "理论+数值", "summary": "我们提供了最新统计力学理论的扩展说明，该理论针对量子多体系统中的算子移位而规范不变（arXiv：2509.20494）。规范变换是通过移动超级算子来实现的，该超级算子取代了基本位置和动量自由度。移位超级算子构成了希尔伯特空间算子之间的映射，具有李代数交换子结构。一般可观测量的平均值在进入和离开热平衡以及基态时保持不变。规范不变性引入了精确求和规则，将全局可观测量与关联的局部解析相关函数互连起来。我们特别描述了由此产生的一体力、超力、乘积和二体和规则。我们将移位超级算子与先前制定的量子正则变换联系起来，并将量子移位推广到多分量系统。规范理论尊重基本的费米子和玻色子粒子特性，正如我们通过证明算子移位和交换对称性的兼容性所证明的那样。\n\n我们制定了超密度泛函理论的量子版本，以通过通用密度泛函提供对超力以及一般平均量子可观测量的正式访问。对于时间相关的情况，我们描述了量子动力学规范不变性，并证明了由哈密顿时间依赖性生成的非平衡情况的精确动力学和规则。我们根据狄拉克对应原理，基于底层几何与规范量化的一致性，主张统计机械规范不变性的基本地位。量子力学求和规则与其经典对应规则的类比和差异仍然表明了各自的描述级别。", "authors": [{"name": "Johanna Müller"}, {"name": "Matthias Schmidt"}], "featured_authors": [{"name": "Johanna Müller"}, {"name": "Matthias Schmidt"}], "author_count": 2}, {"id": "2605.26668", "category": "cond-mat", "title": "Spatiotemporal Structures of Parametrically Driven Nonlinear Lattices", "abstract": "We theoretically investigate the effects of parametric driving on the one-dimensional Frenkel-Kontorova model, a nonlinear many-body lattice system. It is numerically found that a parametric vibration induces spatiotemporal ordering characterized by the subharmonic frequency $\\omega_{\\mathrm{ex}}/2$ and wavenumber $k$ which takes nontrivial values depending on the vibration strength $P_{\\mathrm{ac}}$ and frequency $\\omega_{\\mathrm{ex}}$. With increasing $P_{\\mathrm{ac}}$, $k$ gradually increases and discontinuously jumps up to $k=\\pi$. Based on an extended linear stability analysis, we show that the former $k$ resonance (the latter $\\pi$ resonance) corresponds to the unstable (stable) mode and that the $k$ resonance is made possible by the interplay between the parametric amplification and the collective fluctuation developing through the nonlinear effect.", "url": "https://arxiv.org/abs/2605.26668", "type": "理论+数值", "summary": "我们从理论上研究了参数驱动对一维 Frenkel-Kontorova 模型（一种非线性多体晶格系统）的影响。从数值上发现，参数振动会引起时空排序，其特征在于分谐波频率 $\\omega_{\\mathrm{ex}}/2$ 和波数 $k$，其取不平凡的值，具体取决于振动强度 $P_{\\mathrm{ac}}$ 和频率 $\\omega_{\\mathrm{ex}}$。随着$P_{\\mathrm{ac}}$的增加，$k$逐渐增加并间断地跳跃到$k=\\pi$。基于扩展的线性稳定性分析，我们表明，前一个 $k$ 共振（后一个 $\\pi$ 共振）对应于不稳定（稳定）模式，并且 $k$ 共振是通过参量放大和通过非线性效应产生的集体涨落之间的相互作用而成为可能的。", "authors": [{"name": "Yu Funami"}, {"name": "Kazushi Aoyama"}], "featured_authors": [{"name": "Yu Funami"}, {"name": "Kazushi Aoyama"}], "author_count": 2}, {"id": "2605.26741", "category": "cond-mat", "title": "MatFormBench: A Benchmarking Evaluation Framework for Target-Driven Materials Formulation", "abstract": "Inverse design of materials has significantly advanced target-driven formulation optimization, yet existing materials machine learning benchmarks remain limited to forward property prediction, failing to systematically evaluate inverse optimization and generation algorithms, a critical gap that hinders the progress of target-driven materials design. To address this limitation, we propose MatFormBench, a novel benchmarking ecosystem tailored to evaluate and guide generative strategies for target-driven formulation. MatFormBench integrates a physics-driven formulation generation scheme to generate synthetic samples that faithfully emulate realistic materials structure-property response relationships, complemented by five escalating difficulty levels to quantify the complexity of these relationships. To rigorously assess algorithm performance, we further propose MatFormScore, a multi-dimensional metric that comprehensively quantifies performance across five critical axes: target success, search efficiency, exploratory capacity, robustness, and stability. We validate MatFormBench by evaluating 39 diverse inverse design algorithms, covering classical surrogate-assisted black-box search, state-of-the-art deep generative models, and increasingly popular Large Language Model (LLM)-based recommendation strategies. Across 1170 standardized algorithm-task evaluations, diffusion-based models demonstrate the strongest overall performance, while Variational Autoencoder (VAE)-based and Genetic Algorithm (GA)-based methods exhibit distinct advantages in specific scenarios. By establishing a unified evaluation standard for target-driven materials formulation, MatFormBench enables reproducible benchmarking, principled algorithm comparison, and diagnostic analysis of inverse design strategies, providing a foundational tool for advancing materials inverse design.", "url": "https://arxiv.org/abs/2605.26741", "type": "理论+数值", "summary": "材料逆向设计极大地推进了目标驱动的配方优化，但现有的材料机器学习基准仍然仅限于正向性能预测，未能系统地评估逆向优化和生成算法，这是阻碍目标驱动材料设计进展的关键差距。为了解决这一限制，我们提出了 MatFormBench，这是一种新颖的基准测试生态系统，旨在评估和指导目标驱动制定的生成策略。 MatFormBench 集成了物理驱动的配方生成方案来生成合成样本，忠实地模拟现实的材料结构-性能响应关系​​，并辅以五个逐步升级的难度级别来量化这些关系的复杂性。为了严格评估算法性能，我们进一步提出了 MatFormScore，这是一种多维指标，可全面量化五个关键轴上的性能：目标成功、搜索效率、探索能力、鲁棒性和稳定性。\n\n我们通过评估 39 种不同的逆向设计算法来验证 MatFormBench，这些算法涵盖经典的代理辅助黑盒搜索、最先进的深度生成模型以及日益流行的基于大语言模型 (LLM) 的推荐策略。在 1170 个标准化算法任务评估中，基于扩散的模型表现出最强的整体性能，而基于变分自动编码器 (VAE) 和基于遗传算法 (GA) 的方法在特定场景中表现出明显的优势。通过为目标驱动的材料配方建立统一的评估标准，MatFormBench 能够实现可重复的基准测试、原理性算法比较以及逆向设计策略的诊断分析，为推进材料逆向设计提供了基础工具。", "authors": [{"name": "Linhan Wu"}, {"name": "Chenxi Wang"}, {"name": "Chuhan Yang"}, {"name": "Zhengwei Yang"}, {"name": "Yuyang Liu"}], "featured_authors": [{"name": "Linhan Wu"}, {"name": "Chenxi Wang"}, {"name": "Chuhan Yang"}, {"name": "Zhengwei Yang"}, {"name": "Yuyang Liu"}], "author_count": 5}, {"id": "2605.26779", "category": "cond-mat", "title": "Weak first-order phase transition out of the classical kagome spin liquid", "abstract": "The low-temperature fate of the spin-liquid regime in the classical kagome Heisenberg antiferromagnet has been debated for over three decades. Using an expansion in the number of spin components, we show that, contrary to earlier Monte Carlo simulations, the spin liquid terminates at a weak first-order phase transition into the $\\sqrt{3}\\times\\sqrt{3}$ phase which ordered moment saturates at zero temperature. Adding second-neighbor interactions, this transition belongs to a line of first-order phase transitions that ends at a critical point. For comparison, the pyrochlore antiferromagnet remains disordered at all temperatures.", "url": "https://arxiv.org/abs/2605.26779", "type": "理论+数值", "summary": "经典戈薇·海森堡反铁磁体中自旋液体状态的低温命运已经争论了三十多年。通过自旋分量数量的扩展，我们表明，与早期的蒙特卡罗模拟相反，自旋液体在弱的一阶相变处终止于 $\\sqrt{3}\\times\\sqrt{3}$ 相，该相在零温度下有序矩饱和。添加第二邻域相互作用，该转变属于在临界点结束的一阶相变线。相比之下，烧绿石反铁磁体在所有温度下都保持无序状态。", "authors": [{"name": "Cecilie Glittum"}, {"name": "Olav F. Syljuåsen"}], "featured_authors": [{"name": "Cecilie Glittum"}, {"name": "Olav F. Syljuåsen"}], "author_count": 2}, {"id": "2605.26794", "category": "cond-mat", "title": "Superconductivity-enhanced phonon angular momentum", "abstract": "We theoretically investigate the properties of phonon angular momentum in the superconducting state, using fulleride compounds in an external magnetic field as a model system. The electron orbital angular momentum injected by an external field is transferred to the phonon subsystem via electron--phonon coupling. We show that this field-induced phonon angular momentum is significantly enhanced and undergoes a sign reversal upon entering the superconducting state. In the normal state, the dominant energy scale governing the response function is the electronic bandwidth $D$. In the superconducting state, the phonon energy scale $\\omega_1$ enters the denominator, leading to an enhancement of order $D/\\omega_1$. The observed sign change in the response can be explained by the competition between Fermi surface and Fermi volume contributions.", "url": "https://arxiv.org/abs/2605.26794", "type": "理论", "summary": "我们使用外部磁场中的富勒烯化合物作为模型系统，从理论上研究了超导状态下声子角动量的特性。外部场注入的电子轨道角动量通过电子-声子耦合转移到声子子系统。我们表明，这种场引起的声子角动量显着增强，并在进入超导状态时经历符号反转。在正常状态下，控制响应函数的主要能量尺度是电子带宽 $D$。在超导状态下，声子能量尺度$\\omega_1$进入分母，导致$D/\\omega_1$阶次增强。观察到的响应中的符号变化可以通过费米表面和费米体积贡献之间的竞争来解释。", "authors": [{"name": "Natsuki Okada"}, {"name": "Philipp Werner"}, {"name": "Shintaro Hoshino"}], "featured_authors": [{"name": "Natsuki Okada"}, {"name": "Philipp Werner"}, {"name": "Shintaro Hoshino"}], "author_count": 3}, {"id": "2605.26814", "category": "cond-mat", "title": "Neural Autoregressive Control Variates for the Quantum Monte Carlo Sign Problem", "abstract": "We train a pair of autoregressive models to construct zero-mean control variates to mitigate the sign problem in quantum Monte Carlo simulations. The two autoregressive networks are confined to the positive- and negative-sign sectors with strictly disjoint support, and each is exactly normalized over its sector. Their difference is therefore structurally zero-mean, providing an unbiased auxiliary observable whose correlation with the sign estimator controls the variance reduction. We implement the method within the stochastic series expansion framework, which we extend to frustrated lattices by developing an incremental loop-topology update. Sign-ergodic sampling is achieved through a twist channel, which is the unique sign-changing mechanism on non-bipartite lattices. We implement the control variates as autoregressive transformers with an end-of-sequence parity mask that enforces exact sign-sector resolution, while the incremental loop-count change and cumulative frustration parity are incorporated as topological features. On the triangular-lattice Heisenberg antiferromagnet, we benchmark the method in the small-$N$ limit. The control variate reduces the standard error of the average sign by up to an order of magnitude and that of the energy estimator by a factor of three to five, remaining effective even when the average sign drops below $10^{-3}$. This work lays out the framework and provides a proof-of-principle demonstration that autoregressive control variates can effectively mitigate the sign problem. Scaling to larger systems with physics-informed architectures is the subject of future work.", "url": "https://arxiv.org/abs/2605.26814", "type": "理论+数值", "summary": "我们训练一对自回归模型来构造零均值控制变量，以减轻量子蒙特卡罗模拟中的符号问题。这两个自回归网络仅限于具有严格不相交支持的正号和负号扇区，并且每个自回归网络都在其扇区上完全标准化。因此，它们的差异在结构上是零均值，提供了一个无偏的辅助可观测量，其与符号估计器的相关性控制了方差的减少。我们在随机级数展开框架内实现该方法，通过开发增量循环拓扑更新将其扩展到受挫格。符号遍历采样是通过扭曲通道实现的，这是非二分格上独特的符号改变机制。我们将控制变量实现为具有序列末尾奇偶校验掩码的自回归变压器，该掩码强制执行精确的符号扇区分辨率，同时增量循环计数变化和累积挫败奇偶校验被合并为拓扑特征。在三角晶格海森堡反铁磁体上，我们在小 $N$ 限制下对方法进行了基准测试。\n\n控制变量将平均符号的标准误差降低了一个数量级，将能量估计器的标准误差降低了三到五倍，即使平均符号降至 $10^{-3}$ 以下，仍然有效。这项工作列出了框架并提供了原理验证演示，证明自回归控制变量可以有效缓解符号问题。通过物理信息架构扩展到更大的系统是未来工作的主题。", "authors": [{"name": "Bei Qiao"}, {"name": "Lei Wang"}], "featured_authors": [{"name": "Bei Qiao"}, {"name": "Lei Wang"}], "author_count": 2}, {"id": "2605.26834", "category": "cond-mat", "title": "Influence of helicoidal spin-orbit coupling and Rabi coupling in dynamics of 2D Bose-Einstein Condensates", "abstract": "This study explores the dynamics of Bose-Einstein condensates (BECs) with helicoidal spin-orbit coupling (SOC) and Rabi coupling, confined under a two-dimensional harmonic potential. The relationship between helicoidal SOC, non-linear interactions along with Rabi coupling and their impact on the stability and non linear trapped modes of the condensate is analyzed using a coupled Gross-Pitaevski (GP) framework. A linearized GP equation is used to investigate modulation instability (MI), demonstrating the impact of strong coupling effects and anisotropic confinement on the instability dynamics. It has been shown that the modulation instability in the condensate is predominantly governed by the competition between the attractive and repulsive mean-field interactions. Additionally, stability regimes are altered by the harmonic confinement, enhancing their susceptibility to SOC-induced asymmetry and intra- and intercomponent interactions. These results shed light on the possibility for unique quantum phases and emergent characteristics of helicoidal SOC-driven condensates.", "url": "https://arxiv.org/abs/2605.26834", "type": "理论", "summary": "本研究探讨了二维谐波势下具有螺旋自旋轨道耦合 (SOC) 和拉比耦合的玻色-爱因斯坦凝聚 (BEC) 动力学。使用耦合 Gross-Pitaevski (GP) 框架分析了螺旋 SOC、非线性相互作用以及 Rabi 耦合之间的关系及其对凝聚态稳定性和非线性捕获模式的影响。线性化 GP 方程用于研究调制不稳定性 (MI)，证明强耦合效应和各向异性限制对不稳定性动力学的影响。研究表明，凝聚体中的调制不稳定性主要受吸引平均场相互作用和排斥平均场相互作用之间的竞争控制。此外，谐波限制会改变稳定性机制，从而增强其对 SOC 引起的不对称性以及组件内和组件间相互作用的敏感性。这些结果揭示了螺旋 SOC 驱动凝聚体独特量子相和涌现特征的可能性。", "authors": [{"name": "Sai Satyaprakash Biswal"}, {"name": "S. Saravana Veni"}], "featured_authors": [{"name": "Sai Satyaprakash Biswal"}, {"name": "S. Saravana Veni"}], "author_count": 2}, {"id": "2605.26868", "category": "cond-mat", "title": "Electronic properties governing the phase stability and elastic anisotropy of C14 and C15 Cr-Hf-Nb Laves phases", "abstract": "This study utilizes Density Functional Theory (DFT) to investigate the thermodynamic stability, elastic anisotropy, and electronic properties of C14 and C15 Laves phases within the Cr--Hf--Nb system. Both formation enthalpies and comprehensive elastic property analyses confirm the energetic and mechanical stability of the C14 (HfNb$_2$, HfCr$_2$, NbCr$_2$) and C15 (HfCr$_2$, NbCr$_2$) phases. Furthermore, the evaluation of elastic anisotropy reveals a descending order of HfCr$_2$ > NbCr$_2$ > HfNb$_2$ for the C14 phase, contrasting with NbCr$_2$ > HfNb$_2$ > HfCr$_2$ for the C15 phase. Finally, electronic structure and COHP analyses indicate that strong anti-bonding behavior near the Fermi level within the XM$_2$ M--M bonds acts as a primary destabilization mechanism for both of these Laves phases.", "url": "https://arxiv.org/abs/2605.26868", "type": "理论+数值", "summary": "本研究利用密度泛函理论 (DFT) 研究 Cr--Hf--Nb 体系中 C14 和 C15 Laves 相的热力学稳定性、弹性各向异性和电子特性。形成焓和综合弹性特性分析均证实了 C14 (HfNb$_2$、HfCr$_2$、NbCr$_2$) 和 C15 (HfCr$_2$、NbCr$_2$) 相的能量和机械稳定性。此外，弹性各向异性的评估显示，C14 相的弹性各向异性降序为 HfCr$_2$ > NbCr$_2$ > HfNb$_2$，而 C15 相的 NbCr$_2$ > HfNb$_2$ > HfCr$_2$ 则相反。最后，电子结构和 COHP 分析表明，XM$_2$ M--M 键内费米能级附近的强反键合行为是这两个 Laves 相的主要不稳定机制。", "authors": [{"name": "M. Díaz-Choque"}, {"name": "C. F. Schuch"}, {"name": "L. T. F. Eleno"}], "featured_authors": [{"name": "M. Díaz-Choque"}, {"name": "C. F. Schuch"}, {"name": "L. T. F. Eleno"}], "author_count": 3}, {"id": "2605.26887", "category": "cond-mat", "title": "Self-Consistent Spectral Quadrature Approach to Many-Body Green Functions", "abstract": "We develop a self-consistent spectral quadrature (sc-SQ) framework for the calculation of many-body Green functions. The method approximates the Källén--Lehmann spectral measure by Gauss--Christoffel (GC) quadrature, yielding a rational Green function representation with guaranteed spectral positivity that exactly reproduces the first $2N$ spectral moments at pole order $N$. A key component is an SVD-based rank-selection criterion on the Hankel matrix, which identifies the numerically resolvable pole rank $N^*$ from the singular-value gap and acts as a precision-guided diagnostic of correlation complexity. The scheme is made self-consistent by requiring that the spectral function used to evaluate expectation values coincides with the spectral function generated by the quadrature reconstruction. This defines a fixed-point hierarchy that connects systematically to established approximations, including Hartree--Fock and Hubbard-I, and incorporates non-perturbative features such as multi-peak spectral structure. We benchmark the approach for the Anderson impurity model against numerical renormalization group (NRG) results and apply it within dynamical mean-field theory for the Hubbard model on the Bethe lattice. The method captures the three-peak Anderson impurity spectrum and the suppression of quasiparticle weight in the half-filled Hubbard model on the Bethe lattice, including Mott-gap formation on the insulating branch for $N\\geqslant 5$, in qualitative agreement with NRG references.", "url": "https://arxiv.org/abs/2605.26887", "type": "理论+数值", "summary": "我们开发了一个自洽谱求积（sc-SQ）框架来计算多体格林函数。该方法通过 Gauss-Christoffel (GC) 求积来近似 Källén-Lehmann 谱测量，产生具有保证谱正性的有理格林函数表示，该表示精确地再现了极阶 $N$ 处的前 $2N$ 谱矩。一个关键组成部分是 Hankel 矩阵上基于 SVD 的等级选择标准，它从奇异值间隙中识别可数值解析的极等级 $N^*$ 并充当相关复杂性的精确引导诊断。该方案通过要求用于评估期望值的谱函数与正​​交重建生成的谱函数一致来实现自洽。这定义了一个定点层次结构，系统地连接到已建立的近似值，包括 Hartree--Fock 和 Hubbard-I，并结合了非微扰特征，例如多峰谱结构。\n\n我们将安德森杂质模型的方法与数值重正化群 (NRG) 结果进行基准测试，并将其应用于贝特晶格上哈伯德模型的动态平均场理论中。该方法捕获了三峰安德森杂质谱和 Bethe 晶格上半填充哈伯德模型中准粒子重量的抑制，包括 $N\\geqslant 5$ 绝缘分支上莫特间隙的形成，与 NRG 参考文献定性一致。", "authors": [{"name": "Stanislav Yu. Kruchinin"}], "featured_authors": [{"name": "Stanislav Yu. Kruchinin"}], "author_count": 1}, {"id": "2605.26889", "category": "cond-mat", "title": "Orbital Magnetization from Uniform and Periodic Magnetic Fields", "abstract": "Magnetization is thermodynamically defined as the derivative of the grand potential with respect to a uniform magnetic field. However, a uniform magnetic field makes the kinetic momentum operators noncommuting and Landau-quantizes the electron motion. This changes the zero-field momentum-space to Landau-levels and raises a fundamental question: how can the thermodynamic response to a uniform field be reproduced by a linear-response calculation carried out in the momentum space of the zero-field problem? We address this question analytically in a quantum Hall ferromagnet that allows the orbital magnetization $M$ to be computed in a closed form. We first compute $M$ from the local Hartree--Fock projector response to a periodic magnetic field with zero net flux. We then compute $M$ from the derivative of the grand potential with respect to a uniform magnetic field along the Středa line. The two approaches give the same result, even though the first keeps the Hilbert space fixed while the second changes the Landau-level degeneracy. Their agreement suggests that we should view orbital magnetization as the energy associated with the spectral flow that gives rise to the Středa formula. Our work provides a tutorial introduction to orbital magnetization and its relation to the Středa formula.", "url": "https://arxiv.org/abs/2605.26889", "type": "数值", "summary": "磁化强度在热力学上定义为大势能相对于均匀磁场的导数。然而，均匀的磁场使得动量算子不可交换，并使电子运动进行朗道量子化。这将零场动量空间改变为朗道能级，并提出了一个基本问题：如何通过在零场问题的动量空间中进行的线性响应计算来重现对均匀场的热力学响应？我们在量子霍尔铁磁体中分析地解决了这个问题，该铁磁体允许以封闭形式计算轨道磁化强度 $M$。我们首先根据本地 Hartree-Fock 投影仪对净通量为零的周期性磁场的响应计算 $M$。然后，我们根据大势相对于沿 Středa 线的均匀磁场的导数来计算 $M$。这两种方法给出了相同的结果，尽管第一种方法保持希尔伯特空间固定，而第二种方法改变了朗道级简并性。他们的一致意见表明，我们应该将轨道磁化强度视为与产生斯特雷达公式的谱流相关的能量。\n\n我们的工作提供了轨道磁化及其与 Středa 公式的关系的教程介绍。", "authors": [{"name": "Chunli Huang"}], "featured_authors": [{"name": "Chunli Huang"}], "author_count": 1}, {"id": "2605.26932", "category": "cond-mat", "title": "Long-range deformations in Gaussian States", "abstract": "Imaginary-time evolution by a local Hamiltonian cannot induce a phase transition in one dimension, but longer-range interactions may subvert such constraints. Starting from the ground state of the Kitaev Majorana chain, we modify the wave function by an imaginary-time evolution generated by a quadratic Hamiltonian with power-law couplings that enhance pairing correlations, typically of the form $1/r^{\\alpha}$, where $r$ is the distance between two sites. As the state remains Gaussian, entanglement and correlation functions can be computed analytically. We find that the decay exponent $\\alpha$ controls three distinct infrared regimes: for $\\alpha>1$, the deformation produces only smooth crossovers at finite deformation strength, while the topological regime is reached only asymptotically as the deformation strength tends to infinity. At $\\alpha=1$, the deformation induces an immediate flow to the topological phase: an infinitesimal deformation strength drives the system to a topological regime, and in a particular case, an emergent Kramers-Wannier symmetry enforces Ising-like scaling at long distances. For $\\alpha<1$, the deformed state shows the same critical-like behavior for all non-zero deformation strength. We observe that even with arbitrarily long-range interactions, these models do not display a sharp phase transition at non-zero deformation strength.", "url": "https://arxiv.org/abs/2605.26932", "type": "理论+数值", "summary": "局部哈密顿量的虚时演化不能引起一维的相变，但较长程的相互作用可能会颠覆这种约束。从基塔耶夫马约拉纳链的基态开始，我们通过二次哈密顿量生成的虚时间演化来修改波函数，该二次哈密顿量具有增强配对相关性的幂律耦合，通常采用 $1/r^{\\alpha}$ 的形式，其中 $r$ 是两个站点之间的距离。由于状态保持高斯分布，因此可以分析计算纠缠和相关​​函数。我们发现衰减指数 $\\alpha$ 控制三个不同的红外区域：对于 $\\alpha>1$，变形仅在有限变形强度下产生平滑交叉，而当变形强度趋于无穷大时仅渐近地达到拓扑区域。在 $\\alpha=1$ 处，变形导致立即流向拓扑相：无穷小的变形强度将系统驱动到拓扑状态，并且在特定情况下，新兴的 Kramers-Wannier 对称性在长距离上强制执行类似伊辛的缩放。\n\n对于 $\\alpha<1$，变形状态对于所有非零变形强度都显示出相同的类似临界的行为。我们观察到，即使具有任意的长程相互作用，这些模型也不会在非零变形强度下表现出急剧的相变。", "authors": [{"name": "Francisco Pereira"}, {"name": "Nandagopal Manoj"}, {"name": "Sara Murciano"}], "featured_authors": [{"name": "Francisco Pereira"}, {"name": "Nandagopal Manoj"}, {"name": "Sara Murciano"}], "author_count": 3}, {"id": "2605.26945", "category": "cond-mat", "title": "A tridiagonal matrix-valued process with stochastic resetting for arbitrary Dyson index $β>0$", "abstract": "We introduce a symmetric tridiagonal matrix-valued process ($\\beta$-TMP) $H(t)$ whose diagonal entries $H_{k,k}(t)$ evolve independently via an Ornstein-Uhlenbeck process starting at the origin and the off-diagonal entries $H_{k,k+1}(t)$ evolve independently via the Cox-Ingersoll-Ross process, starting at the origin and with parameters that depend on the row index $k$. We show that the joint distribution of the entries of the matrix can be computed exactly at all times and moreover, the joint distribution of its $N$ real eigenvalues can be computed exactly at all times too. We then subject this time-evolving matrix-valued process to stochastic resetting with rate $r$ in two different settings: (i) simultaneous resetting of the matrix entries to the origin with rate $r$ ($\\beta$-SRTMP process) and (ii) independent resetting of the matrix entries to the origin with rate $r$ ($\\beta$-IRTMP process). We show that the joint distribution of the eigenvalues of the $\\beta$-SRTMP process at long times can be computed analytically and it coincides with the joint distribution of the positions of the resetting Dyson Brownian motion in its stationary state for arbitrary $\\beta>0$. For the $\\beta$-IRTMP stationary ensemble, computing analytically the joint distribution of eigenvalues or even the average density of eigenvalues is difficult. However, generating the stationary $\\beta$-IRTMP ensemble numerically is relatively straightforward and we compare its numerical average eigenvalue density to the corresponding analytical results for the $\\beta$-SRTMP stationary ensemble with same parameter values, showing that they are quite different from each other. Finally, we provide a simple and concrete application of this tridiagonal matrix-valued process in computing the annealed partition function of a disordered quantum tight-binding Hamiltonian on a one-dimensional lattice.", "url": "https://arxiv.org/abs/2605.26945", "type": "理论+数值", "summary": "我们引入对称三对角矩阵值过程 ($\\beta$-TMP) $H(t)$，其对角线条目 $H_{k,k}(t)$ 通过从原点开始的 Ornstein-Uhlenbeck 过程独立演化，非对角线条目 $H_{k,k+1}(t)$ 通过 Cox-Ingersoll-Ross 过程独立演化，从原点开始，参数取决于行索引$k$。我们证明了矩阵条目的联合分布可以在任何时候精确计算，而且它的$N$实特征值的联合分布也可以在任何时候精确计算。然后，我们使这个时间演化矩阵值过程在两种不同的设置中以速率 $r$ 进行随机重置：（i）以速率 $r$ 同时将矩阵条目重置到原点（$\\beta$-SRTMP 过程）和（ii）以速率 $r$ 将矩阵条目独立重置到原点（$\\beta$-IRTMP 过程）。我们证明，$\\beta$-SRTMP 过程长时间特征值的联合分布可以通过解析计算得到，并且对于任意 $\\beta>0$，它与重置戴森布朗运动在静止状态下位置的联合分布一致。\n\n对于 $\\beta$-IRTMP 平稳系综，分析计算特征值的联合分布甚至特征值的平均密度是很困难的。然而，在数值上生成平稳 $\\beta$-IRTMP 系综相对简单，我们将其数值平均特征值密度与具有相同参数值的 $\\beta$-SRTMP 平稳系综的相应分析结果进行比较，表明它们彼此有很大不同。最后，我们提供了这种三对角矩阵值过程在计算一维晶格上无序量子紧束缚哈密顿量的退火配分函数中的简单而具体的应用。", "authors": [{"name": "Gernot Akemann"}, {"name": "Satya N. Majumdar"}, {"name": "Patricia Päßler"}], "featured_authors": [{"name": "Gernot Akemann"}, {"name": "Satya N. Majumdar"}, {"name": "Patricia Päßler"}], "author_count": 3}, {"id": "2605.27040", "category": "cond-mat", "title": "Designing Multivalent Copolymers for Selective Targeting of Multicomponent Surfaces", "abstract": "Selective targeting of membranes with a specific receptor profile is an ongoing challenge in targeted drug delivery. We investigate the adsorption of copolymers on a multicomponent receptor-covered surface using grand-canonical Monte Carlo simulations and demonstrate that polymers can be designed to target a particular receptor density profile. To achieve this, the ligand profile on the polymers should match the targeted receptor profile, and the ligand--receptor affinity should be inversely proportional to the ligand profile. While the same can be obtained using multivalent nanoparticles, the entropic effects due to polymer conformations significantly enhance the binding selectivity of multivalent polymers compared to nanoparticles. Surprisingly, the ligand distribution on the polymer plays a crucial role, whereas the persistence length does not. The optimal selectivity to the overall receptor concentration is obtained by the Poisson distribution of ligands (random copolymer), whereas the maximal selectivity to a specific receptor profile is obtained by a defined sequence of grouped alternating ligands (regular copolymer). Interestingly, the regular copolymer can become anti-selective when ligands of the same type are in homogenous blocks, showing that specific ligand distribution qualitatively affects the targeting ability. These findings suggest that sequence control is necessary to selectively target a specific density profile of membrane receptors using linear copolymers.", "url": "https://arxiv.org/abs/2605.27040", "type": "理论+数值", "summary": "选择性靶向具有特定受体谱的膜是靶向药物递送中持续的挑战。我们使用大正则蒙特卡罗模拟研究了共聚物在多组分受体覆盖表面上的吸附，并证明聚合物可以设计为针对特定的受体密度分布。为了实现这一点，聚合物上的配体特征应与目标受体特征相匹配，并且配体-受体亲和力应与配体特征成反比。虽然使用多价纳米颗粒可以获得相同的效果，但与纳米颗粒相比，由于聚合物构象而产生的熵效应显着增强了多价聚合物的结合选择性。令人惊讶的是，聚合物上的配体分布起着至关重要的作用，而持久长度则不然。对总体受体浓度的最佳选择性是通过配体的泊松分布（无规共聚物）获得的，而对特定受体谱的最大选择性是通过分组交替配体的定义序列（规则共聚物）获得的。\n\n有趣的是，当相同类型的配体处于同质嵌段中时，常规共聚物可以变得反选择性，这表明特定的配体分布定性地影响靶向能力。这些发现表明，序列控制对于使用线性共聚物选择性地靶向膜受体的特定密度分布是必要的。", "authors": [{"name": "Vid Ravnik"}, {"name": "Urban Bren"}, {"name": "Tine Curk"}], "featured_authors": [{"name": "Vid Ravnik"}, {"name": "Urban Bren"}, {"name": "Tine Curk"}], "author_count": 3}, {"id": "2605.27059", "category": "cond-mat", "title": "Quantum Geometric Origin of Hall Viscosity and Nonlocal Hall Conductivity in Lattice Bands", "abstract": "We show that Hall viscosity in lattice bands is governed by a band-projected electric quadrupole encoded within the quantum geometry: Berry curvature sets the projected-coordinate algebra, while the quantum metric determines the quadrupolar spread of a wave packet. The same structure enters the quadratic wave-vector coefficient of the nonlocal Hall conductivity, yielding a lattice viscosity-conductivity relation. In ideal bands, the deviation from the Landau-level form is quantified by Berry curvature fluctuations. Our results establish the nonlocal Hall response as an electrical signature of the quantum geometry underlying Hall viscosity and as a transport diagnostic of geometric idealness.", "url": "https://arxiv.org/abs/2605.27059", "type": "理论", "summary": "我们表明，晶格带中的霍尔粘度由量子几何中编码的带投影电四极杆控制：贝里曲率设置投影坐标代数，而量子度量则确定波包的四极扩展。相同的结构输入非局部霍尔电导率的二次波矢量系数，产生晶格粘度-电导率关系。在理想带中，与朗道能级形式的偏差通过贝里曲率波动来量化。我们的结果将非局域霍尔响应确立为霍尔粘度基础的量子几何的电学特征，并作为几何理想性的传输诊断。", "authors": [{"name": "Danyu Shu"}, {"name": "Ryotaro Sano"}, {"name": "Ai Yamakage"}, {"name": "Hiroshi Funaki"}, {"name": "Mamoru Matsuo"}], "featured_authors": [{"name": "Danyu Shu"}, {"name": "Ryotaro Sano"}, {"name": "Ai Yamakage"}, {"name": "Hiroshi Funaki"}, {"name": "Mamoru Matsuo"}], "author_count": 5}, {"id": "2605.27060", "category": "cond-mat", "title": "Molecular Dynamics Study of Defect Evolution Mechanisms in 3C-SiC for Quantum Technologies", "abstract": "The migration of point defects and formation of spin defects in 3C-SiC were investigated using molecular dynamics simulations, with migration barriers obtained from Nudged Elastic Band (NEB) calculations and finite temperature diffusivities evaluated using both mean square displacement (MSD) and jump frequency approaches. While both methods reproduce Arrhenius behavior, the jump frequency formulation exhibits improved statistical stability. Activation energies of 2.12~eV for carbon vacancies and 0.88~eV for carbon interstitials are obtained, consistent with literature. The resulting mobility hierarchy governs defect evolution and complex formations. Interstitial vacancy recombination competes with vacancy aggregation into divacancies, influencing the stabilization of spin active defect centers. The study also provides a consistent framework for diffusion analysis in atomistic simulations.", "url": "https://arxiv.org/abs/2605.27060", "type": "数值", "summary": "使用分子动力学模拟研究了 3C-SiC 中点缺陷的迁移和自旋缺陷的形成，通过微推弹性带 (NEB) 计算获得迁移势垒，并使用均方位移 (MSD) 和跳跃频率方法评估有限温度扩散率。虽然这两种方法都再现了阿累尼乌斯行为，但跳跃频率公式表现出改进的统计稳定性。得到的碳空位活化能为2.12~eV，碳间隙原子活化能为0.88~eV，与文献一致。由此产生的流动性层次结构控制着缺陷的演变和复杂的形成。间隙空位复合与空位聚集竞争形成双空位，影响自旋活性缺陷中心的稳定性。该研究还为原子模拟中的扩散分析提供了一致的框架。", "authors": [{"name": "Irslan Ullah Ashraf"}, {"name": "Gaetano Calogero"}, {"name": "Ioannis Deretzis"}, {"name": "Giorgio Lo Presti"}, {"name": "Damiano Ricciarelli"}, {"name": "Elisabetta Paladino"}, {"name": "Antonino La Magna"}], "featured_authors": [{"name": "Irslan Ullah Ashraf"}, {"name": "Gaetano Calogero"}, {"name": "Ioannis Deretzis"}, {"name": "Damiano Ricciarelli"}, {"name": "Elisabetta Paladino"}, {"name": "Antonino La Magna"}], "author_count": 7}, {"id": "2605.27077", "category": "cond-mat", "title": "Electron Polaron at Neutral 180$^\\circ$ Domain Wall in PbTiO$_3$: Stability, Trapping Energies, and Transverse Polarization", "abstract": "We use density-functional theory with a Hubbard correction to investigate Ti-centered electron polarons at neutral PbO-centered $180^\\circ$ domain walls in tetragonal PbTiO$_{3}$. The Hubbard parameter for Ti $3d$ states is determined using the finite-size-corrected polaronic energy-level alignment procedure, yielding stable electron-polaron formation in bulk PbTiO$_3$ with a trapping energy of $-$0.06 eV. In the domain-wall supercell, the excess electron localizes on Ti and forms a Ti$^{3+}$ center with an occupied $d_{xy}$ orbital in-gap state. Comparison of bulk-like and near-wall Ti sites shows that their trapping energies differ by only about 0.01 eV, indicating that this neutral domain wall does not provide a significant thermodynamic driving force for electron-polaron segregation. While the Ising-like reversal of the out-of-plane polarization is preserved, the localized electron induces a finite transverse polarization component normal to the wall, enhancing a local Néel-like distortion that is strongest when the polaron is located at the wall. These results show that neutral $180^\\circ$ domain walls in PbTiO$_3$ do not substantially alter the stability of Ti-centered electron polarons, but they can couple to the polaron-induced lattice distortion through a localized transverse polarization response.", "url": "https://arxiv.org/abs/2605.27077", "type": "理论", "summary": "我们使用密度泛函理论和哈伯德校正来研究四方 PbTiO$_{3}$ 中性 PbO 中心 $180^\\circ$ 磁畴壁上的 Ti 中心电子极化子。 Ti $3d$ 态的哈伯德参数是使用有限尺寸校正的极化子能级对准程序确定的，在块体 PbTiO$_3$ 中产生稳定的电子极化子形成，捕获能量为 $-$0.06 eV。在畴壁超晶胞中，多余的电子集中在 Ti 上并形成 Ti$^{3+}$ 中心，并占据 $d_{xy}$ 轨道带隙态。块状Ti位点和近壁Ti位点的比较表明，它们的捕获能仅相差约0.01eV，这表明这种中性畴壁不能为电子极化子偏析提供显着的热力学驱动力。虽然面外极化的类伊辛反转得以保留，但局域电子会产生垂直于壁的有限横向极化分量，从而增强局部类尼尔畸变，当极化子位于壁处时这种畸变最强。\n\n这些结果表明，PbTiO$_3$ 中的中性 $180^\\circ$ 畴壁不会显着改变 Ti 中心电子极化子的稳定性，但它们可以通过局部横向极化响应耦合到极化子引起的晶格畸变。", "authors": [{"name": "Mohammad Amirabbasi"}, {"name": "Jochen Rohrer"}, {"name": "Karsten Albe"}], "featured_authors": [{"name": "Mohammad Amirabbasi"}, {"name": "Jochen Rohrer"}, {"name": "Karsten Albe"}], "author_count": 3}, {"id": "2605.27151", "category": "cond-mat", "title": "Identifying and designing altermagnetic crystals in real space", "abstract": "Altermagnetism is a compensated magnetic phase characterized by zero net magnetization and exchange-driven spin splitting. However, identifying altermagnets among collinear antiferromagnets usually requires full magnetic-space-group or spin-group analysis, which is not intuitive. Here we formulate a simple real-space criterion based on how the crystallographic operations of the host nonmagnetic structure permute the two opposite-spin sublattices. For simplicity, we focus on collinear compensated antiferromagnets commonly described by type-III magnetic space groups, whose magnetic primitive cell coincides with the host nonmagnetic crystallographic primitive cell. In this class, altermagnetic spin splitting is generally allowed unless inversion operation exists which transfer between the two opposite-spin sublattices. First-principles calculations on representative noncentrosymmetric and centrosymmetric materials demonstrate these criterions. Similar rules can also be applied to low-dimensional crystals or pseudocrystals. Our work reduces the identification of altermagnetism to a transparent real-space symmetry test and provides a practical route for discovering altermagnetic crystals.", "url": "https://arxiv.org/abs/2605.27151", "type": "理论+数值", "summary": "交替磁性是一种补偿磁相，其特征在于零净磁化和交换驱动的自旋分裂。然而，识别共线反铁磁体中的交变磁体通常需要完整的磁空间群或自旋群分析，这并不直观。在这里，我们根据主体非磁性结构的晶体学操作如何排列两个相反自旋子晶格，制定了一个简单的实空间准则。为了简单起见，我们关注通常由 III 型磁性空间群描述的共线补偿反铁磁体，其磁性原胞与宿主非磁性晶体原胞一致。在这一类中，通常允许交变自旋分裂，除非存在在两个相反自旋子晶格之间转移的反转操作。对代表性非中心对称和中心对称材料的第一性原理计算证明了这些标准。类似的规则也可以应用于低维晶体或赝晶体。\n\n我们的工作将交变磁性的识别简化为透明的实空间对称性测试，并为发现交变磁性晶体提供了一条实用途径。", "authors": [{"name": "Ying Chen"}, {"name": "Qiushi Huang"}, {"name": "Yu Wu"}, {"name": "Xiaolan Yan"}, {"name": "Su-Huai Wei"}], "featured_authors": [{"name": "Ying Chen"}, {"name": "Qiushi Huang"}, {"name": "Yu Wu"}, {"name": "Xiaolan Yan"}, {"name": "Su-Huai Wei"}], "author_count": 5}, {"id": "2605.27193", "category": "cond-mat", "title": "Algebras of order parameters in one-dimensional spin systems", "abstract": "We study order parameters in one-dimensional quantum lattice models with finite invertible or non-invertible symmetry. We investigate what properties a string operator must satisfy in order to acquire a non-vanishing expectation value in a given gapped phase. We deduce that multiplets of string order parameters organise into a Lagrangian algebra in the Drinfel'd centre of the symmetry category. In particular, we highlight the role of the multiplication rule as governing the fusion of the twisted sector local operators that constitute the string operator in the infrared limit. Our derivations exploit the tensor network approach to the classification of gapped phases and its reformulation in terms of module categories over the symmetry category. Within this framework, a gapped phase is associated with a pattern of spontaneous symmetry breaking wherein a Morita class of algebras of topological lines is preserved in the ground state subspace. The crux of the proof is to show that the expectation value of any string operator explicitly depends on the tube algebra module associated with the Lagrangian algebra, which is realised as the full centre of the corresponding module category. Finally, we demonstrate that these techniques extend to phases of symmetric mixed states.", "url": "https://arxiv.org/abs/2605.27193", "type": "理论+数值", "summary": "我们研究具有有限可逆或不可逆对称性的一维量子晶格模型中的序参数。我们研究字符串运算符必须满足哪些属性才能在给定的间隙阶段获得不为零的期望值。我们推断，多个串序参数在对称范畴的 Drinfel'd 中心组织成拉格朗日代数。特别是，我们强调了乘法规则在控制构成红外极限中的串算子的扭曲扇区局部算子的融合方面的作用。我们的推导利用张量网络方法对带隙相进行分类，并根据对称类别的模块类别重新表述。在这个框架内，带隙相与自发对称破缺的模式相关联，其中拓扑线的 Morita 类代数被保留在基态子空间中。证明的关键在于证明任何串运算符的期望值都明确依赖于与拉格朗日代数相关的管代数模块，该模块被实现为相应模块类别的完整中心。\n\n最后，我们证明这些技术可以扩展到对称混合态的阶段。", "authors": [{"name": "Ameya Chavda"}, {"name": "Clement Delcamp"}, {"name": "Alex Turzillo"}, {"name": "Minyoung You"}], "featured_authors": [{"name": "Ameya Chavda"}, {"name": "Clement Delcamp"}, {"name": "Alex Turzillo"}, {"name": "Minyoung You"}], "author_count": 4}, {"id": "2605.27199", "category": "cond-mat", "title": "Quantum fluctuations and chaos in fully connected spin models", "abstract": "We investigate beyond-mean-field dynamics in a fully connected $\\mathrm{SU}(3)$ spin-exchange model, focusing on the interplay between chaotic dynamics and quantum fluctuations. Using the two-particle irreducible (2PI) effective action formalism, we derive equations of motion that systematically account for higher-order correlations generated by interactions, and demonstrate how quantum fluctuations can regularize chaotic dynamics displayed by macroscopic observables. Our results show that an accurate treatment of fluctuations is essential for describing macroscopic dynamics in quantum many-body systems and promote 2PI as a robust framework for connecting microscopic correlations to macroscopic nonequilibrium phenomena.", "url": "https://arxiv.org/abs/2605.27199", "type": "理论", "summary": "我们研究了完全连接的 $\\mathrm{SU}(3)$ 自旋交换模型中的超平均场动力学，重点关注混沌动力学和量子涨落之间的相互作用。使用双粒子不可约（2PI）有效作用形式主义，我们推导了运动方程，系统地解释了相互作用产生的高阶相关性，并证明了量子涨落如何规范宏观可观测值显示的混沌动力学。我们的结果表明，准确处理涨落对于描述量子多体系统中的宏观动力学至关重要，并促进 2PI 成为连接微观相关性与宏观非平衡现象的稳健框架。", "authors": [{"name": "Aleksandra A. Ziolkowska"}, {"name": "Aleksandr N. Mikheev"}], "featured_authors": [{"name": "Aleksandra A. Ziolkowska"}, {"name": "Aleksandr N. Mikheev"}], "author_count": 2}, {"id": "2605.27201", "category": "cond-mat", "title": "Electride States and Superconductivity in Dense Potassium Carbides", "abstract": "Carbon possesses remarkable physicochemical properties, enabling main group metals to react with it under high pressure and produce superconducting compounds. However, the research on high-pressure potassium carbides remains still unsystematic and inadequate. Using first-principles calculations and state-of-the-art swarm intelligence structure prediction techniques, we comprehensively explore the binary novel potassium-carbon system and characterize their structural, electronic, and superconducting properties under compression. Calculations of electron-phonon coupling show that monoclinic K7C (space group C2/m) with high K concentration is a zero-dimensional electride superconductor with a transition temperature Tc of 0.6 K at 25 GPa. By contrast, the Tc of orthorhombic KC with symmetry Imma increases upon decompression owing to the phonon softening of both acoustic and optical branches. Impressively, Imma KC reaches a maximum Tc of 21.4 K at 25 GPa, which is highly desirable for low-pressure metallic carbide superconductors. This work provides valuable insights into K-C compounds and broadens the diversity of metal carbide superconductors.", "url": "https://arxiv.org/abs/2605.27201", "type": "理论+数值", "summary": "碳具有卓越的物理化学性质，使得主族金属能够在高压下与其反应并产生超导化合物。然而，对于高压电石的研究仍然不系统、不充分。利用第一性原理计算和最先进的群体智能结构预测技术，我们全面探索了二元新型钾-碳系统，并表征了它们在压缩下的结构、电子和超导特性。电子-声子耦合计算表明，高K浓度的单斜晶系K7C（空间群C2/m）是一种零维电子化物超导体，在25 GPa下的转变温度Tc为0.6 K。相比之下，由于声子和光学分支的声子软化，具有对称性 Imma 的正交晶系 KC 的 Tc 在减压时增加。令人印象深刻的是，Imma KC 在 25 GPa 下达到了 21.4 K 的最大 Tc，这对于低压金属碳化物超导体来说是非常理想的。这项工作为 K-C 化合物提供了宝贵的见解，并拓宽了金属碳化物超导体的多样性。", "authors": [{"name": "Jiance Sun"}, {"name": "Ting Zhong"}, {"name": "Shoutao Zhang"}], "featured_authors": [{"name": "Jiance Sun"}, {"name": "Ting Zhong"}, {"name": "Shoutao Zhang"}], "author_count": 3}, {"id": "2605.27218", "category": "cond-mat", "title": "Amorphous vs. Short-Range-Ordered Complexions: Consequences for Grain-Boundary-Mediated Plasticity in Nanocrystalline Al-Ni Alloys", "abstract": "Amorphous grain-boundary (GB) complexions in thermally stable nanocrystalline alloys are commonly assumed to be structurally homogeneous, yet their disordered nature makes them susceptible to local short-range ordering (SRO). The influence of local SRO on GB-mediated plasticity mechanisms in such complexions remains poorly understood. This article employs large-scale Monte Carlo and molecular dynamics simulation to address this gap through simulations of nanocrystalline Al-Ni alloys at two Ni concentrations, 2 at.% and 4 at.%. Annealing at 913 K produces thick uniform amorphous intergranular film complexions, while annealing at 378 K produces semi-amorphous complexions containing FCC-type and BCC-type SRO. These two complexion states produce fundamentally different mechanical responses. Amorphous complexions act as dislocation sinks, suppressing shear localization and promoting homogeneous plasticity through shear transformation zones, but at the cost of lower strength. SRO complexions generate higher strength but also promote heterogeneous stress concentrations across the GB network, leading to intense shear localization regardless of Ni concentration. This contrast reflects a fundamental shift in governing mechanism, from shear-transformation-zone-controlled behavior in amorphous complexion alloys to GB-stress-heterogeneity-controlled behavior in SRO complexion alloys. These findings highlight the potential of complexion engineering to tailor the mechanical properties of nanocrystalline materials.", "url": "https://arxiv.org/abs/2605.27218", "type": "理论+数值", "summary": "热稳定纳米晶合金中的非晶晶界（GB）络合物通常被认为是结构均匀的，但它们的无序性质使它们容易受到局部短程有序（SRO）的影响。在此类肤色中，局部 SRO 对 GB 介导的可塑性机制的影响仍然知之甚少。本文采用大规模蒙特卡罗和分子动力学模拟，通过模拟两种 Ni 浓度（2 at.% 和 4 at.%）的纳米晶 Al-Ni 合金来解决这一差距。 913 K 退火产生厚的均匀非晶晶间膜络合物，而 378 K 退火产生包含 FCC 型和 BCC 型 SRO 的半非晶络合物。这两种肤色状态产生根本不同的机械响应。非晶态充当位错汇，抑制剪切局部化并通过剪切转变区促进均匀塑性，但代价是强度较低。 SRO 复合物产生更高的强度，但也会促进整个 GB 网络的异质应力集中，从而导致强烈的剪切局部化，无论 Ni 浓度如何。\n\n这种对比反映了控制机制的根本转变，从非晶合金中的剪切转变区控制行为到SRO合金中的GB应力异质性控制行为。这些发现凸显了复合工程在调整纳米晶体材料的机械性能方面的潜力。", "authors": [{"name": "Frederic Sansoz"}, {"name": "Eve-Audrey Picard"}], "featured_authors": [{"name": "Frederic Sansoz"}, {"name": "Eve-Audrey Picard"}], "author_count": 2}, {"id": "2605.27229", "category": "cond-mat", "title": "At-Scale Data-Driven Exploration of High-Voltage Cathode-Active Materials for Sodium Batteries", "abstract": "Sodium-ion batteries (SIBs) share similar electrochemistry with Li but offer several advantages, including high abundance in nature and low cost, as well as suitability for fast charging due to a Na-ion mobility higher than that of Li. The development of high-voltage SIBs heavily relies on the discovery of novel, robust cathode-active materials (CAMs). All-inorganic materials represent the most mature and practical choice as CAMs for next-generation SIBs; however, their family spans a vast and chemically diverse space. In this work, we present a large-scale, chemically validated database of stable materials for SIB cathode discovery, curated from four major databases: Materials Project, AFLOW, OQMD, and GNoME. Generalizable and transferable descriptor-based machine learning (ML) models are developed based on a dataset of charged-only structures rather than charged/discharged pairs. Using a committee of the top four trained ML models, average voltage and specific capacity are predicted as target properties. Finally, a subset of top-ranked candidate CAMs is validated through explicit, high-throughput first-principles calculations of voltage profiles, phase stability, structural robustness upon sodiation/desodiation, and electronic properties. Together, this integrated data curation, ML ranking and predictions, and first-principles validation strategy establishes a scalable and transferable framework for accelerating the discovery of stable, high-voltage CAMs for SIBs and beyond.", "url": "https://arxiv.org/abs/2605.27229", "type": "理论+数值", "summary": "钠离子电池（SIB）与锂具有相似的电化学性质，但具有多种优点，包括自然界丰富度高、成本低，以及由于钠离子迁移率高于锂而适合快速充电。高压 SIB 的开发在很大程度上依赖于新型、坚固的阴极活性材料 (CAM) 的发现。全无机材料代表了作为下一代 SIB 的 CAM 的最成熟和实用的选择；然而，他们的家族跨越了广阔且化学成分多样的空间。在这项工作中，我们提出了一个用于 SIB 阴极发现的大规模、经过化学验证的稳定材料数据库，该数据库由四个主要数据库组成：Materials Project、AFLOW、OQMD 和 GNoME。可泛化且可转移的基于描述符的机器学习 (ML) 模型是基于仅带电结构而不是带电/放电对的数据集开发的。使用由前四个经过训练的 ML 模型组成的委员会，将平均电压和比容量预测为目标属性。\n\n最后，通过电压分布、相位稳定性、钠化/去钠化的结构鲁棒性和电子特性的明确、高通量第一原理计算来验证排名靠前的候选 CAM 的子集。这种集成的数据管理、ML 排名和预测以及第一原理验证策略共同建立了一个可扩展且可转移的框架，用于加速发现适用于 SIB 及其他领域的稳定、高压 CAM。", "authors": [{"name": "Suchona Akter"}, {"name": "Mohammad R. Momeni"}], "featured_authors": [{"name": "Suchona Akter"}, {"name": "Mohammad R. Momeni"}], "author_count": 2}, {"id": "2605.27275", "category": "cond-mat", "title": "Non-stationary current fluctuations in 1D boundary-driven diffusive systems via Macroscopic Fluctuation Theory", "abstract": "While Macroscopic Fluctuation Theory (MFT) has been highly successful in analyzing non-equilibrium steady states, its application to non-steady-state processes remains limited. In this study, we apply MFT to the relaxation process of one-dimensional boundary-driven diffusive systems coupled to particle reservoirs at both ends. We exactly derive the current variance for systems with a constant diffusion coefficient and arbitrary mobility, as well as the cumulant generating function for the current in Reflective Brownian Motion (RBM). Our results demonstrate that non-steady current fluctuations during the approach to a steady state can be quantitatively described within the MFT framework.", "url": "https://arxiv.org/abs/2605.27275", "type": "理论", "summary": "虽然宏观涨落理论（MFT）在分析非平衡稳态方面非常成功，但其在非稳态过程中的应用仍然有限。在本研究中，我们将 MFT 应用于两端耦合粒子库的一维边界驱动扩散系统的弛豫过程。我们准确地推导出具有恒定扩散系数和任意迁移率的系统的电流方差，以及反射布朗运动（RBM）中电流的累积生成函数。我们的结果表明，在接近稳态过程中的非稳态电流波动可以在 MFT 框架内定量描述。", "authors": [{"name": "Daisuke Suzuki"}, {"name": "Tomohiro Sasamoto"}], "featured_authors": [{"name": "Daisuke Suzuki"}, {"name": "Tomohiro Sasamoto"}], "author_count": 2}, {"id": "2605.27297", "category": "cond-mat", "title": "Geometry and relaxation dynamics of nematic loops", "abstract": "Disclination lines in three-dimensional nematic liquid crystals generically form closed loops whose topology is classified by homotopy theory. While this classification successfully captures global topological features, it does not encode the geometry of the defect profile along the loop, which can strongly influence defect dynamics. Here, we propose a geometric description of nematic disclination loops using the Clifford algebra Cl(3,0). This approach naturally captures the geometry of the local defect profile, as well as changes along the loop, which is mathematically a SU(2) holonomy. Simulations of the dynamics of defect loops with specified geometries embedded in nematic liquid crystals demonstrate that loops nucleate the growth of \"topological blobs\" of defects, which later dissipate leaving uniform nematic textures. Self-twist of the defect profile leads to nucleation of additional linking disclination lines, with a simple arithmetic relation between total self-twist and linking number. In contrast, loops with an even number of discrete profile transitions generate patterns with threading between loops, but no linking. These results establish a direct connection between the geometric holonomy of a disclination loop and its subsequent evolution, and may be extendable to more complex order parameter manifolds, such as cholesterics or smectics.", "url": "https://arxiv.org/abs/2605.27297", "type": "理论+数值", "summary": "三维向列液晶中的向错线通常形成闭环，其拓扑结构根据同伦理论进行分类。虽然这种分类成功地捕获了全局拓扑特征，但它没有对沿环路的缺陷轮廓的几何形状进行编码，这会强烈影响缺陷动态。在这里，我们提出使用 Clifford 代数 Cl(3,0) 的向列向错环的几何描述。这种方法自然地捕获了局部缺陷轮廓的几何形状，以及沿环的变化，这在数学上是 SU(2) 完整性。对嵌入向列液晶中的具有特定几何形状的缺陷环的动力学模拟表明，缺陷环使缺陷“拓扑斑点”的生长成核，随后消散，留下均匀的向列纹理。缺陷轮廓的自扭转导致额外的连接向错线成核，总自扭转和连接数之间存在简单的算术关系。相反，具有偶数个离散轮廓过渡的循环生成在循环之间具有线程但没有链接的模式。\n\n这些结果在向错环的几何完整性与其后续演化之间建立了直接联系，并且可以扩展到更复杂的阶参数流形，例如胆甾型或近晶型。", "authors": [{"name": "F. Aprile"}, {"name": "A. J. H. Houston"}, {"name": "G. Gonnella"}, {"name": "D. Marenduzzo"}, {"name": "T. N. Shendruk"}, {"name": "G. Negro"}], "featured_authors": [{"name": "F. Aprile"}, {"name": "A. J. H. Houston"}, {"name": "G. Gonnella"}, {"name": "D. Marenduzzo"}, {"name": "T. N. Shendruk"}, {"name": "G. Negro"}], "author_count": 6}, {"id": "2605.27325", "category": "cond-mat", "title": "Microstructure-Aware Deep Learning Bridges Atomistics to Macroscale for Shock-to-Detonation Prediction", "abstract": "The shock-to-detonation transition in energetic materials is governed by coupled processes spanning Angstroms to millimeters and femtoseconds to microseconds, where traditional multiscale models fail due to the lack of scale separation. We address this grand challenge by directly bridging large-scale molecular dynamics (MD) simulations with continuum finite-element (FE) models using MISTnetX, a convolutional deep neural network. Trained on MD simulations of shock propagation through complex microstructures, MISTnetX captures shock-microstructure interactions, hotspot formation, and the transition to deflagration, supplying critical sub-grid information to FE simulations of mechanics, shocks, thermal transport, and chemistry. Applied to a synthetic but realistic nanostructured plastic-bonded RDX composite, MISTnetX enables parameter-free prediction of the full run-to-detonation transition.", "url": "https://arxiv.org/abs/2605.27325", "type": "理论+数值", "summary": "高能材料中的冲击到爆炸的转变是由跨越埃到毫米、飞秒到微秒的耦合过程控制的，传统的多尺度模型由于缺乏尺度分离而失败。我们通过使用卷积深度神经网络 MISTnetX 直接将大规模分子动力学 (MD) 模拟与连续有限元 (FE) 模型联系起来，应对这一重大挑战。 MISTnetX 经过复杂微观结构冲击传播的 MD 模拟训练，可捕获冲击与微观结构的相互作用、热点形成以及爆燃过渡，为力学、冲击、热传输和化学的有限元模拟提供关键的子网格信息。 MISTnetX 应用于合成但真实的纳米结构塑料粘合 RDX 复合材料，可以实现对整个运行到爆炸过渡的无参数预测。", "authors": [{"name": "Simon Gonzalez-Zapata"}, {"name": "Aidan Pantoya"}, {"name": "Chunyu Li"}, {"name": "Marisol Koslowski"}, {"name": "Alejandro Strachan"}], "featured_authors": [{"name": "Simon Gonzalez-Zapata"}, {"name": "Aidan Pantoya"}, {"name": "Chunyu Li"}, {"name": "Marisol Koslowski"}, {"name": "Alejandro Strachan"}], "author_count": 5}, {"id": "2605.27368", "category": "cond-mat", "title": "Spontaneous persistent currents and time-reversal symmetry breaking in thick-walled Weyl semimetal cylinders", "abstract": "We theoretically investigate the Aharonov-Bohm effect in a thick-walled Weyl semimetal (WSM) cylinder subject to an external axial magnetic field. By employing a low-energy effective Hamiltonian, we analytically solve the eigenvalue problem for both infinite and finite-length cylindrical geometries. We apply infinite-mass boundary conditions at the radial walls and MIT bag boundary conditions at the cylinder caps to properly account for intra-node confinement and inter-valley scattering, respectively. Our numerical results demonstrate that the spatial separation of the Weyl nodes acts as an internal chiral gauge field. This geometric field intrinsically breaks time-reversal (TR) symmetry, lifting the chiral degeneracy even at zero external flux. This symmetry breaking manifests as spontaneous persistent currents and the unfolding of conductance channels. Furthermore, longitudinal confinement induces propagation-direction-dependent energy splitting, altering the partial density of states and causing spatio-chiral current imbalances.", "url": "https://arxiv.org/abs/2605.27368", "type": "理论+数值", "summary": "我们从理论上研究了受到外部轴向磁场作用的厚壁外尔半金属 (WSM) 圆柱体中的阿哈罗诺夫-玻姆效应。通过采用低能有效哈密顿量，我们分析解决了无限和有限长度圆柱几何形状的特征值问题。我们在径向壁处应用无限质量边界条件，在圆柱盖处应用 MIT 袋边界条件，以分别正确地考虑节点内限制和谷间散射。我们的数值结果表明，外尔节点的空间分离充当内部手性规范场。这种几何场本质上打破了时间反演（TR）对称性，即使在外部通量为零的情况下也能提高手性简并性。这种对称性破缺表现为自发的持续电流和电导通道的展开。此外，纵向限制会引起传播方向相关的能量分裂，改变态的部分密度并导致空间手性电流不平衡。", "authors": [{"name": "J. C. Pérez-Pedraza"}, {"name": "Juan A. Cañas"}, {"name": "Daniel A. Bonilla"}, {"name": "A. Martín-Ruiz"}], "featured_authors": [{"name": "J. C. Pérez-Pedraza"}, {"name": "Juan A. Cañas"}, {"name": "Daniel A. Bonilla"}, {"name": "A. Martín-Ruiz"}], "author_count": 4}, {"id": "2605.26122", "category": "hep-th", "title": "Critical Inter-Horizon Thermal Dynamics on the Lukewarm Reissner-Nordström-de Sitter Manifold", "abstract": "We reinterpret the lukewarm sector of four-dimensional Reissner--Nordström--de Sitter black holes as the exact zero-dissipation thermal manifold of an effective two-horizon nonequilibrium system. In the fixed-charge sector, the inter-horizon thermal affinity controls the entropy production and vanishes precisely on the lukewarm branch. The corresponding linearized thermal mode is governed by an exact relaxation coefficient \\(K_L(\\rho)\\), with \\(\\rho=r_+/r_c\\), and changes stability at the critical ratio \\[ \\rho_*=\\frac{1+\\sqrt{3}-\\sqrt{2}\\,3^{1/4}}{2}\\approx 0.4354, \\] where the relaxation time diverges as \\(\\tau\\sim |\\rho-\\rho_*|^{-1}\\). We then encode this critical structure in a minimal Bragg--Williams functional and an Onsager--Machlup action for the effective trajectories of the thermal mode. In this way, the lukewarm branch is promoted from a geometric equal-temperature locus to a critical inter-horizon thermal manifold.", "url": "https://arxiv.org/abs/2605.26122", "type": "理论", "summary": "我们将四维赖斯纳-诺德斯特伦-德西特黑洞的温热区域重新解释为有效两视界非平衡系统的精确零耗散热流形。在固定电荷区域，视​​界间的热亲和力控制着熵的产生，并在温热的分支上精确地消失。相应的线性化热模式由精确的弛豫系数 \\(K_L(\\rho)\\) 控制，其中 \\(\\rho=r_+/r_c\\)，并在临界比率 \\[ \\rho_*=\\frac{1+\\sqrt{3}-\\sqrt{2}\\,3^{1/4}}{2}\\approx 0.4354, \\] 处改变稳定性，其中弛豫时间发散为\\(\\tau\\sim |\\rho-\\rho_*|^{-1}\\)。然后，我们将这个关键结构编码为最小的 Bragg-Williams 泛函和 Onsager-Machlup 作用，以获得热模式的有效轨迹。这样，温分支就从几何等温轨迹提升为临界层间热流形。", "authors": [{"name": "J. Khalloufi"}, {"name": "H. El Moumni"}, {"name": "K. Masmar"}], "featured_authors": [{"name": "J. Khalloufi"}, {"name": "H. El Moumni"}, {"name": "K. Masmar"}], "author_count": 3}, {"id": "2605.26124", "category": "hep-th", "title": "Astrophysical environment around a black hole in the braneworld and its optical signatures", "abstract": "We investigate the impact of braneworld theory on the astrophysical environment surrounding a black hole. The black hole is sourced by localized matter from the bulk, which could describe both regular and singular (Schwarzschild) black hole. Employing an Einstein cluster description for the environment, we find that the anisotropic nature of the cluster, coupled with finite brane tension, leads to a weakening of gravity due to the quadratic and nonlocal corrections to the effective four-dimensional field equations. Consequently, this effect prevents horizon formation within the environment. Applying current constraints on the brane tension derived from neutron star observations, we demonstrate that this effect is particularly relevant for sub-stellar mass black holes embedded in compact environments. Furthermore, we investigate the optical signatures of finite brane tension in this scenario, specifically focusing on the black hole shadow and Einstein ring radii. We show that the Einstein ring radius decreases with a smaller brane tension, whereas the black hole shadow radius increases--somewhat contradicts the weakening gravity effects. Ultimately, these two observables may jointly serve to constrain the value of the brane tension in a very specific astrophysical scenarios.", "url": "https://arxiv.org/abs/2605.26124", "type": "理论", "summary": "我们研究了膜世界理论对黑洞周围天体物理环境的影响。黑洞来源于本体中的局部物质，这可以描述规则黑洞和奇异（史瓦西）黑洞。采用爱因斯坦簇描述环境，我们发现簇的各向异性性质，加上有限的膜张力，由于对有效四维场方程的二次和非局部校正，导致重力减弱。因此，这种效应阻止了环境中地平线的形成。对中子星观测得出的膜张力应用当前的约束，我们证明这种效应与嵌入致密环境中的亚恒星质量黑洞特别相关。此外，我们研究了这种情况下有限膜张力的光学特征，特别关注黑洞阴影和爱因斯坦环半径。我们表明，爱因斯坦环半径随着膜张力的减小而减小，而黑洞阴影半径则增大——这在某种程度上与减弱的引力效应相矛盾。\n\n最终，这两个可观测值可能共同限制非常特定的天体物理场景中膜张力的值。", "authors": [{"name": "M. F. Fauzi"}, {"name": "A. O. Latief"}, {"name": "A. Sulaksono"}], "featured_authors": [{"name": "M. F. Fauzi"}, {"name": "A. O. Latief"}, {"name": "A. Sulaksono"}], "author_count": 3}, {"id": "2605.26185", "category": "hep-th", "title": "Symmetries of tensionless strings", "abstract": "In a recent article, arXiv:2605.12414 , it is stated that a certain scale transformation has been \"systematically overlooked\" in discussions of the tensionless string. Here we point out that this kind of symmetry is treated in numerous places, in the classical as well as the quantum theory.", "url": "https://arxiv.org/abs/2605.26185", "type": "理论", "summary": "在最近的一篇文章 arXiv:2605.12414 中，指出在无张力弦的讨论中“系统地忽视”了一定的尺度变换。在这里我们指出，这种对称性在经典理论和量子理论中的许多地方都得到了处理。", "authors": [{"name": "Ulf Lindström"}], "featured_authors": [{"name": "Ulf Lindström"}], "author_count": 1}, {"id": "2605.26202", "category": "hep-th", "title": "Fermion Families and Pontryagin Class: Topological Field Theory via Colour Symmetry Extension", "abstract": "Family puzzle asks why the Standard Model (SM) features exactly 3 families of quarks and leptons. Motivated by topological constraints, we study 4-dimensional fermionic anomalies with discrete $Z_n$ symmetry, classified by the 5d spin bordism group. We show that only the group-cohomology subclass H$^5(Z_n,U(1))\\cong Z_n$ can be canceled by an anomalous $Z_n$-symmetric 4d $Z_n$-gauge topological quantum field theory (TQFT), while beyond-group-cohomology $A_{Z_n} p_1$ involving the Pontryagin class $p_1$ cannot (except $n=2,3$). More generally, we prove that any cocycle $\\alpha_d\\in$H$^d(Z_n,U(1))$ in odd spacetime dimension $d\\g
