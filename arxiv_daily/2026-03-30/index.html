einberg analysis, we formulate an RG-covariant leading-logarithmic improvement scheme for the Vilkovisky--DeWitt effective potential in normal field coordinates, in which the RG operator is governed solely by the beta functions. We apply this framework to a real constant bumblebee background and obtain the leading-logarithmic one-loop effective potential, discussing the conditions under which a nontrivial vacuum is generated by dimensional transmutation and thereby provides a dynamical realization of Lorentz symmetry breaking in this class of models.", "url": "https://arxiv.org/abs/2603.26529", "type": "理论", "summary": "我们制定了大黄蜂理论的可重整复数扩展，其中大黄蜂场被提升为复数场并与阿贝尔规范扇区耦合。除了最小规范协变相互作用之外，该模型还包括由无量纲参数 $g_l$ 控制的纵向动力学项以及复杂大黄蜂和光子之间的非最小磁型耦合 $g_m$。使用维度正则化和最小减法，我们确定与规范、纵向和四次扇区重整化相关的两点、三点和四点函数的单循环 UV 散度。我们获得相应的反项并推导出 $e$、$g_l$、$g_m$ 的单循环重整化群函数以及大黄蜂自耦合 $\\lambda$ 和 $\\tilde\\lambda$。受传统 Coleman-Weinberg 分析已知的规范和场重参数化微妙之处的启发，我们为法向场坐标中的 Vilkovisky-DeWitt 有效势制定了 RG 协变领先对数改进方案，其中 RG 算子仅由 beta 函数控制。\n\n我们将该框架应用到真实的恒定大黄蜂背景中，获得了前导对数单环有效势，讨论了通过维度嬗变产生非平凡真空的条件，从而提供了此类模型中洛伦兹对称性破缺的动态实现。", "authors": [{"name": "Willian Carvalho"}, {"name": "A. C. Lehum"}, {"name": "J. R. Nascimento"}, {"name": "A. Yu. Petrov"}], "featured_authors": [{"name": "Willian Carvalho"}, {"name": "A. C. Lehum"}, {"name": "J. R. Nascimento"}, {"name": "A. Yu. Petrov"}], "author_count": 4}, {"id": "2603.26609", "category": "hep-th", "title": "$\\mathcal{N}=4$ single-minus superamplitudes and dual superconformal symmetry", "abstract": "We construct the $\\mathcal{N}=4$ supersymmetric completion of the recently proposed single-minus gluon amplitudes in $(2,2)$ signature, which are nonvanishing for all multiplicities on a half-collinear kinematic locus. The superamplitude factorises into a permutation-invariant measure $\\Delta^{(n-1)}$ with uniform little-group weight that imposes the half-collinearity constraint, a piecewise constant stripped amplitude $\\tilde{A}_{1\\ldots n}$ that is helicity blind and dual conformal invariant, and (super)momentum conservation delta functions. For $n=3$, our superamplitude reduces to the known $\\overline{\\rm MHV}$ superamplitude. We prove dual superconformal covariance of the $n$-point superamplitude, and further analyse the $\\mathrm{Gr}(k,n)$ Grassmannian integral at $k=1$. Finally, we present the corresponding single-minus superamplitude in $\\mathcal{N}=8$ supergravity.", "url": "https://arxiv.org/abs/2603.26609", "type": "理论", "summary": "我们在 $(2,2)$ 签名中构造了最近提出的单负胶子振幅的 $\\mathcal{N}=4$ 超对称完成，它对于半共线运动轨迹上的所有多重性都是非零的。超振幅分解为具有均匀小群权重的排列不变测度 $\\Delta^{(n-1)}$ ，施加半共线性约束，分段常数剥离振幅 $\\tilde{A}_{1\\ldots n}$ （螺旋盲和双保形不变量）以及（超）动量守恒 delta 函数。对于 $n=3$，我们的超振幅减小为已知的 $\\overline{\\rm MHV}$ 超振幅。我们证明了$n$点超振幅的对偶超共形协方差，并进一步分析了$k=1$处的$\\mathrm{Gr}(k,n)$格拉斯曼积分。最后，我们给出了 $\\mathcal{N}=8$ 超引力中相应的单负超振幅。", "authors": [{"name": "Andreas Brandhuber"}, {"name": "Paolo Pichini"}, {"name": "Gabriele Travaglini"}, {"name": "Congkao Wen"}], "featured_authors": [{"name": "Andreas Brandhuber"}, {"name": "Paolo Pichini"}, {"name": "Gabriele Travaglini"}, {"name": "Congkao Wen"}], "author_count": 4}, {"id": "2603.26615", "category": "hep-th", "title": "T-dualities and scale-separated AdS$_3$ in massless IIA on $(X_6 \\times S^1)/\\mathbb{Z}_2$", "abstract": "Motivated by the question of whether scale-separated AdS$_3$ flux vacua arising from G$_2$ compactifications admit an uplift to eleven-dimensional supergravity, we construct scale-separated AdS$_3$ flux vacua in massless type IIA with only O6-planes. We first present new scale-separated solutions in massive type IIA on a G$_2$ holonomy toroidal orbifold with four smeared O6-planes, analyze their properties, and then perform a double T-duality to obtain the corresponding massless backgrounds. In the dual frame, the internal space is locally given by a six-dimensional quotient space $X_6$ with an $\\mathrm{SU}(3)$ structure of Iwasawa type times an untwisted circle $S^1$, while globally it is further modded out by a non-trivial $\\mathbb{Z}_2$ quotient inherited from the G$_2$ orbifold action. Finally, we use T-duality to derive the corresponding superpotential in massless type IIA and identify parametrically classical, scale-separated families of solutions, as well as a family with parametrically large radii, scale separation, and strong coupling, thus allowing for an uplift to eleven-dimensional supergravity.", "url": "https://arxiv.org/abs/2603.26615", "type": "理论", "summary": "出于 G$_2$ 致密化产生的尺度分离的 AdS$_3$ 通量真空是否承认十一维超重力的提升这一问题，我们在仅具有 O6 平面的无质量 IIA 型中构造了尺度分离的 AdS$_3$ 通量真空。我们首先在具有四个涂抹 O6 平面的 G$_2$ 完整环形轨道上提出大规模 IIA 中的新尺度分离解，分析它们的属性，然后执行双 T 对偶性以获得相应的无质量背景。在双框架中，内部空间局部由具有岩泽型 $\\mathrm{SU}(3)$ 结构的六维商空间 $X_6$ 乘以未扭曲的圆 $S^1$ 给出，而全局上则由继承自 G$_2$ Orbifold 动作的非平凡 $\\mathbb{Z}_2$ 商进一步修改。最后，我们使用 T 对偶性导出无质量 IIA 型中相应的超势，并识别参数化经典的、尺度分离的解族，以及参数化大半径、尺度分离和强耦合的族，从而允许提升到十一维超重力。", "authors": [{"name": "George Tringas"}], "featured_authors": [{"name": "George Tringas"}], "author_count": 1}, {"id": "2603.26617", "category": "hep-th", "title": "Structure Constants from Q-Systems and Separation of Variables", "abstract": "We introduce a novel method to compute structure constants from Q-functions in the scalar sector of planar N=4 super Yang-Mills (SYM) and related theories. The method derives from operatorial as well as functional separation of variables, and the structure constants are expressed as determinants of matrices whose entries are integrals over products of Q-functions. In this framework, each operator is twisted by an external angle, mirroring the cusped Maldacena-Wilson loop. The structure constants of local single-trace operators in N=4 SYM are recovered in the untwisting limit, where we obtain a one-to-one correspondence between our key building blocks and those of the Hexagon formalism. Retaining appropriate twists, our structure constants also perfectly match those of the orbifold points of N=4 SYM. Our results thus far are valid at leading order in the weak-coupling expansion, but their formulation in terms of Q-functions provides a natural starting point for including loop corrections. Many of the methods we develop in this work apply more generally to the computation of correlation functions in integrable models.", "url": "https://arxiv.org/abs/2603.26617", "type": "理论", "summary": "我们介绍了一种从平面 N=4 超杨米尔斯 (SYM) 标量扇区中的 Q 函数计算结构常数的新方法和相关理论。该方法源自变量的操作分离和函数分离，结构常数表示为矩阵的行列式，矩阵的项是 Q 函数乘积的积分。在此框架中，每个算子都扭转一个外角，镜像尖头 Maldacena-Wilson 环。 N=4 SYM 中的局部单迹算子的结构常数在解扭极限下恢复，我们在关键构建块和六边形形式主义的构建块之间获得了一对一的对应关系。保留适当的扭曲，我们的结构常数也与 N=4 SYM 的轨道点的结构常数完美匹配。到目前为止，我们的结果在弱耦合展开的前导阶上是有效的，但它们用 Q 函数表示的形式为包含循环校正提供了一个自然的起点。我们在这项工作中开发的许多方法更普遍地适用于可积模型中相关函数的计算。", "authors": [{"name": "Till Bargheer"}, {"name": "Carlos Bercini"}, {"name": "Gabriel Lefundes"}, {"name": "Paul Ryan"}], "featured_authors": [{"name": "Till Bargheer"}, {"name": "Carlos Bercini"}, {"name": "Gabriel Lefundes"}, {"name": "Paul Ryan"}], "author_count": 4}, {"id": "2603.25866", "category": "math-ph", "title": "The Hirota Identity for Hyperpfaffian $τ$-Functions in Charge-$L$ Ensembles", "abstract": "We study log-gas ensembles with inverse temperature $\\beta = L^2$ using a confluent Vandermonde representation that admits a formulation in the exterior algebra of a finite-dimensional vector space. By interpreting the system as consisting of finitely many particles with integer charge $L$, partition functions can be expressed exactly as hyperpfaffians. In this formulation, the system is governed by a natural momentum grading arising from the confluent Vandermonde structure, and its statistical observables are determined entirely by the corresponding bigraded commutative subalgebra. The geometric identity that a particle's $L$-blade wedges with itself to zero produces momentum Plücker relations within this algebra. These relations generate momentum transport identities between sectors of different particle number. Upon introducing dynamic time variables, the partition functions become $\\tau$-functions, and these transport identities are transformed into Hirota bilinear equations. This provides an explicit algebraic origin for the integrable hierarchy structure of the $\\beta = L^2$ ensembles, which may be viewed as a finite-dimensional analogue of the Sato Grassmannian formulation of integrable systems.", "url": "https://arxiv.org/abs/2603.25866", "type": "理论", "summary": "我们使用汇合范德蒙德表示来研究具有逆温度 $\\beta = L^2$ 的对数气体系综，该表示允许有限维向量空间的外代数中的公式。通过将系统解释为由有限多个具有整数电荷 $L$ 的粒子组成，配分函数可以精确地表示为超法夫函数。在这个公式中，系统由汇合范德蒙结构产生的自然动量分级控制，其统计可观测量完全由相应的双分级交换子代数决定。粒子的 $L$ 叶片与自身楔入为零的几何恒等式在该代数中产生了动量普吕克关系。这些关系在不同粒子数的扇区之间产生动量传递恒等式。引入动态时间变量后，配分函数变为 $\\tau$ 函数，并且这些传输恒等式被转换为 Hirota 双线性方程。\n\n这为 $\\beta = L^2$ 系综的可积层次结构提供了明确的代数起源，它可以被视为可积系统佐藤格拉斯曼公式的有限维模拟。", "authors": [{"name": "Christopher D. Sinclair"}], "featured_authors": [{"name": "Christopher D. Sinclair"}], "author_count": 1}, {"id": "2603.26157", "category": "math-ph", "title": "Exponential decay of correlations at high temperature in $H^{2|2n}$ nonlinear sigma models", "abstract": "We consider a family of nonlinear sigma models on $\\mathbb{Z}^{d}$ whose target space is the hyperbolic super manifold $H^{2|2n}$, $n >1$, introduced by Crawford as an extension of Zirnbauer's $H^{2|2}$ model for disordered systems. We prove exponential decay of the two-point correlation function in the high-temperature regime $\\beta \\leq C n^{-1}$, with $C>0$ a universal constant, for any $n>1$ and any dimension $d\\geq 1$, with mass $\\log \\beta^{-1}$. We also consider models with long-range interaction and prove fast decay in the same high-temperature regime. The proof is based on the reduction to a marginal fermionic theory and combines a high-temperature cluster expansion, exact combinatorics and bounds derived via Grassmann norms.", "url": "https://arxiv.org/abs/2603.26157", "type": "理论", "summary": "我们考虑 $\\mathbb{Z}^{d}$ 上的一系列非线性 sigma 模型，其目标空间是双曲超流形 $H^{2|2n}$，$n >1$，由 Crawford 引入，作为 Zirnbauer 无序系统 $H^{2|2}$ 模型的扩展。我们证明了高温状态 $\\beta \\leq C n^{-1}$ 下两点相关函数的指数衰减，其中 $C>0$ 是通用常数，对于任何 $n>1$ 和任何维度 $d\\geq 1$，质量为 $\\log \\beta^{-1}$。我们还考虑了具有长程相互作用的模型，并证明了在相同高温状态下的快速衰减。该证明基于对边际费米子理论的简化，并结合了高温团簇展开、精确组合数学和通过格拉斯曼范数导出的界限。", "authors": [{"name": "Margherita Disertori"}, {"name": "Javier Durán Fernández"}, {"name": "Luca Fresta"}], "featured_authors": [{"name": "Margherita Disertori"}, {"name": "Javier Durán Fernández"}, {"name": "Luca Fresta"}], "author_count": 3}, {"id": "2603.26209", "category": "math-ph", "title": "Lieb-Robinson bounds for Bose-Hubbard Hamiltonians: A review with a simplified proof", "abstract": "We review recent progress on state-dependent Lieb-Robinson bounds for Bose-Hubbard Hamiltonians. In particular, Kuwahara, Vu, and Saito established that, for general bounded-density initial states, the Lieb-Robinson velocity is bounded by $t^{d-1}$ for large times, where $d$ denotes the lattice dimension. We present a shorter proof of the weaker, but still polynomial velocity bound $t^{d+\\epsilon}$.", "url": "https://arxiv.org/abs/2603.26209", "type": "理论", "summary": "我们回顾了 Bose-Hubbard Hamiltonian 的状态相关 Lieb-Robinson 界的最新进展。特别是，Kuwahara、Vu 和 Saito 确定，对于一般有界密度初始态，Lieb-Robinson 速度在很大程度上受 $t^{d-1}$ 限制，其中 $d$ 表示晶格维度。我们提出了一个较弱但仍为多项式速度界限 $t^{d+\\epsilon}$ 的较短证明。", "authors": [{"name": "Marius Lemm"}, {"name": "Carla Rubiliani"}], "featured_authors": [{"name": "Marius Lemm"}, {"name": "Carla Rubiliani"}], "author_count": 2}, {"id": "2603.26247", "category": "math-ph", "title": "Conditioning the tanh-drift process on first-passage times: Exact drifts, bridges, and process equivalences", "abstract": "In this article, we consider the Beneš process with drift $\\mu(x)=\\alpha \\tanh(\\alpha x + \\beta)$, with $\\alpha > 0$, $\\beta \\in \\mathbb{R}$, and an absorbing barrier at $x=a$. After deriving the propagator and key associated quantities -- the first-passage-time distribution and the survival probability -- we then condition this process to have various prescribed first-passage-time distributions. When the conditioning is imposed at an infinite time horizon, this procedure reveals the existence of different processes that share the same first-passage-time distribution as the Beneš process, a phenomenon recently observed in the case of Brownian motion with drift. When the conditioning is imposed at a finite time horizon, the procedure shows that the conditioned Beneš process and the Brownian motion with drift under the same conditioning exhibit identical behaviors. This strengthens an elegant result of Benjamini and Lee stating that Brownian motion and the Beneš process share the same Brownian bridge, and it also connects with more recent findings obtained by conditioning two independent identical Brownian motions with drift, or two independent Beneš processes that annihilate upon meeting. Moreover, we show that several conditioned Beneš drifts converge near the absorbing boundary to the drift of the taboo diffusion, which motivates a parallel analysis of the taboo process itself. Using Girsanov's theorem, we derive its propagator, first-passage-time distribution, and conditioned versions, thereby further clarifying the structural relationships between Beneš, Brownian, and taboo dynamics.", "url": "https://arxiv.org/abs/2603.26247", "type": "理论", "summary": "在本文中，我们考虑具有漂移 $\\mu(x)=\\alpha \\tanh(\\alpha x + \\beta)$ 的贝奈斯过程，其中 $\\alpha > 0$、$\\beta \\in \\mathbb{R}$ 以及 $x=a$ 处的吸收势垒。在推导传播子和关键相关量（首次传代时间分布和生存概率）后，我们将这个过程调节为具有各种规定的首次传代时间分布。当在无限时间范围内施加调节时，该过程揭示了不同过程的存在，这些过程与贝奈斯过程具有相同的首次通过时间分布，这是最近在带漂移的布朗运动的情况下观察到的现象。当在有限时间范围内施加条件时，该过程表明，在相同条件下，条件贝奈斯过程和带漂移的布朗运动表现出相同的行为。\n\n这强化了本杰明尼和李的优雅结果，即布朗运动和贝奈斯过程共享同一个布朗桥，并且它还与通过调节两个独立的相同布朗运动与漂移或两个独立的贝奈斯过程在相遇时湮灭而获得的最新发现相联系。此外，我们还表明，几个条件贝奈斯漂移在吸收边界附近收敛到禁忌扩散的漂移，这激发了对禁忌过程本身的并行分析。利用吉尔萨诺夫定理，我们推导了它的传播子、首次通过时间分布和条件版本，从而进一步阐明了贝奈斯、布朗和禁忌动力学之间的结构关系。", "authors": [{"name": "Kacim François-Élie"}, {"name": "Alain Mazzolo"}], "featured_authors": [{"name": "Kacim François-Élie"}, {"name": "Alain Mazzolo"}], "author_count": 2}, {"id": "2603.26280", "category": "math-ph", "title": "Asymptotic correlation functions of Coulomb gases on an annulus", "abstract": "Two-dimensional Coulomb gases on an annulus at a special inverse temperature $\\beta = 2$ are studied by using the orthogonal polynomial method borrowed from the theory of random matrices. The correlation functions among the Coulomb gas molecules are written in determinant forms and their asymptotic forms in the thermodynamic limit are evaluated. When the Coulomb gas system has a continuous rotational symmetry, the corresponding orthogonal polynomials are monomials, and one can see a universal behavior of the correlation functions in a thin annulus limit. In a system with a discrete rotational symmetry, the corresponding orthogonal polynomials are not in general monomials, and a breakdown of the universality is observed.", "url": "https://arxiv.org/abs/2603.26280", "type": "理论", "summary": "利用随机矩阵理论中的正交多项式方法研究了特殊逆温度 $\\beta = 2$ 下环面上的二维库仑气体。库仑气体分子之间的相关函数被写成行列式，并评估它们在热力学极限下的渐近形式。当库仑气体系统具有连续旋转对称性时，相应的正交多项式是单项式，并且可以看到相关函数在薄环空极限下的普遍行为。在具有离散旋转对称性的系统中，相应的正交多项式不是一般单项式，并且观察到普遍性的破坏。", "authors": [{"name": "Taro Nagao"}], "featured_authors": [{"name": "Taro Nagao"}], "author_count": 1}, {"id": "2603.26390", "category": "math-ph", "title": "Orthogonal pairs of Euler elements II: Geometric Bisognano--Wichmann and Spin--Statistics Theorems", "abstract": "Models in Algebraic Quantum Field Theory (AQFT) may be generalized including Lie groups of symmetries whose Lie algebras admit an Euler element $h$, characterized by the property that $ad h$ is diagonalizable with eigenvalues in $\\{-1, 0, 1\\}$. These elements becomes fundamental to the formal description of wedge localization. In this paper, we extend the geometric analysis of Euler wedges and investigate their applications within the AQFT framework. We call a pair of Euler elements $(h, k)$ orthogonal if $e^{i \\pi \\operatorname{ad} h}(k) = -k.$ Using the geometric framework established in our previous work, we derive both a Bisognano--Wichmann Theorem and a Spin--Statistics Theorem for nets of standard subspaces and von Neumann algebras. Our results {show} how this generalized approach recovers classical results in the AQFT literature while providing a deeper structural understanding of the underlying geometry in established models.", "url": "https://arxiv.org/abs/2603.26390", "type": "理论", "summary": "代数量子场论 (AQFT) 中的模型可以概括为包括李对称群，其李代数承认欧拉元素 $h$，其特征在于 $ad h$ 可与 $\\{-1, 0, 1\\}$ 中的特征值对角化的性质。这些元素成为楔块定位的正式描述的基础。在本文中，我们扩展了欧拉楔的几何分析并研究了它们在 AQFT 框架内的应用。如果 $e^{i \\pi \\operatorname{ad} h}(k) = -k.$，我们称一对欧拉元素 $(h, k)$ 正交。使用我们之前工作中建立的几何框架，我们推导出标准子空间和冯诺依曼代数网络的 Bisognano--Wichmann 定理和自旋-统计定理。我们的结果{显示}这种广义方法如何恢复 AQFT 文献中的经典结果，同时提供对已建立模型中的基础几何结构的更深入的结构理解。", "authors": [{"name": "Vincenzo Morinelli"}, {"name": "Karl-Hermann Neeb"}, {"name": "Gestur Olafsson"}], "featured_authors": [{"name": "Vincenzo Morinelli"}, {"name": "Karl-Hermann Neeb"}, {"name": "Gestur Olafsson"}], "author_count": 3}, {"id": "2603.26455", "category": "math-ph", "title": "Magnetic Weyl Super Calculus: Schatten-class properties, commutator criterion, and complete positivity", "abstract": "We combine our previous results on magnetic pseudo-differential operators for Hörmander symbols dominated by tempered weights [ arXiv:2511.07184 ] with the magnetic Weyl super calculus of Lee and Lein [ arXiv:2201.11487 , arXiv:2405.19964 ]. This allows us to extend some previous results on the semi-super and super Moyal algebra, as well as to prove boundedness, compactness, and Schatten-class properties of super operators. Moreover, we prove a Beals-type commutator criterion for super operators and we also formulate sufficient conditions on super symbols in order to give rise to completely positive and trace preserving maps. For most of the proofs we use decompositions of operators and super operators based on Parseval frames of smoothing operators.", "url": "https://arxiv.org/abs/2603.26455", "type": "理论", "summary": "我们将之前关于以调节权重为主的 Hömander 符号的磁伪微分算子的结果 [ arXiv:2511.07184 ] 与 Lee 和 Lein 的磁 Weyl 超微积分 [ arXiv:2201.11487 ， arXiv:2405.19964 ] 相结合。这使我们能够扩展之前关于半超和超 Moyal 代数的一些结果，并证明超算子的有界性、紧致性和 Schatten 类属性。此外，我们证明了超算子的 Beals 型交换子判据，并且我们还在超符号上制定了充分条件，以便产生完全正且保迹的映射。对于大多数证明，我们使用基于平滑算子的 Parseval 框架的算子和超级算子的分解。", "authors": [{"name": "Horia D. Cornean"}, {"name": "Mikkel H. Thorn"}], "featured_authors": [{"name": "Horia D. Cornean"}, {"name": "Mikkel H. Thorn"}], "author_count": 2}, {"id": "2603.26624", "category": "math-ph", "title": "Noether symmetry groups, locally conserved integrals, and dynamical symmetries in classical mechanics", "abstract": "Several aspects of the connection between conserved integrals (invariants) and symmetries are illustrated within a hybrid Lagrangian-Hamiltonian framework for dynamical systems. Three examples are considered: a nonlinear oscillator with time-dependent frequency (one degree of freedom); geodesics of a spheroid (two degrees of freedom); Calogero-Moser-Sutherland system of interacting particles (three degrees of freedom). For each system, a local generalization of Liouville integrability is shown. Specifically, the variational point symmetries in a Lagrangian setting lead to corresponding locally conserved integrals which are found to commute in the Poisson bracket imported from the equivalent Hamiltonian setting. Action-angle variables are then introduced in the Lagrangian setting, which leads to explicit integration of the Euler-Lagrange equations of motion locally in time.", "url": "https://arxiv.org/abs/2603.26624", "type": "理论", "summary": "动力系统的混合拉格朗日-哈密尔顿框架内说明了守恒积分（不变量）和对称性之间联系的几个方面。考虑三个例子：具有与时间相关的频率（一个自由度）的非线性振荡器；椭球体的测地线（两个自由度）；相互作用粒子的 Calogero-Moser-Sutherland 系统（三个自由度）。对于每个系统，都显示了刘维尔可积性的局部概括。具体来说，拉格朗日设置中的变分点对称性导致相应的局部守恒积分，这些积分被发现在从等效哈密顿设置导入的泊松括号中可交换。然后在拉格朗日设置中引入作用角变量，这导致欧拉-拉格朗日运动方程在局部时间上的显式积分。", "authors": [{"name": "Stephen C. Anco"}], "featured_authors": [{"name": "Stephen C. Anco"}], "author_count": 1}, {"id": "2603.25774", "category": "quant-ph", "title": "Catalytic Coherence Amplification for Quantum State Recovery: Theory, Numerical Validation, and Comparison with Conventional Error Correction", "abstract": "We present Catalytic Quantum Error Correction (CQEC), a quantum state recovery protocol based on the arbitrary amplification of coherence in catalytic covariant transformations. Unlike conventional quantum error correction, CQEC requires knowledge of the target state and multiple noisy copies, but operates without an error threshold: recovery succeeds whenever the coherent modes of the target state are contained within those of the noisy state (mode inclusion), regardless of the noise magnitude. A reusable catalyst state mediates the transformation and its reduced state is preserved exactly after each cycle (correlated catalysis). We validate CQEC numerically across four quantum algorithms -- qDRIFT, quantum Kolmogorov--Arnold networks, control-free phase estimation, and Regev factoring -- and a tree tensor network cryptographic protocol, under dephasing, depolarizing, and combined noise. In the asymptotic (infinite-copy) limit, CQEC recovers the known algorithmic output state from fidelity $F = 0.07$ to $F > 0.999$ across 200 configurations; at finite copy number $n$, the fidelity gap scales as $1 - F \\leq O(1/\\sqrt{n})$. We compare with Steane and surface codes under their respectively different operational assumptions. Our results establish coherence resource theory as a complementary foundation for quantum state recovery.", "url": "https://arxiv.org/abs/2603.25774", "type": "理论+数值", "summary": "我们提出了催化量子纠错（CQEC），这是一种基于催化协变变换中相干性任意放大的量子态恢复协议。与传统的量子纠错不同，CQEC 需要了解目标状态和多个噪声副本，但运行时没有错误阈值：只要目标状态的相干模式包含在噪声状态的相干模式（模式包含）内，无论噪声大小如何，恢复都会成功。可重复使用的催化剂状态介导转化，并且其还原状态在每次循环后准确保留（相关催化）。我们在相移、去极化和组合噪声下，通过四种量子算法（qDRIFT、量子柯尔莫哥洛夫、阿诺德网络、无控制相位估计和 Regev 分解）以及树张量网络加密协议对 CQEC 进行数值验证。在渐近（无限复制）限制下，CQEC 在 200 种配置中恢复已知算法输出状态，从保真度 $F = 0.07$ 到 $F > 0.999$；在有限拷贝数 $n$ 下，保真度差距缩放为 $1 - F \\leq O(1/\\sqrt{n})$。\n\n我们在各自不同的操作假设下与 Steane 和表面代码进行比较。我们的结果建立了相干资源理论作为量子态恢复的补充基础。", "authors": [{"name": "Hikaru Wakaura"}], "featured_authors": [{"name": "Hikaru Wakaura"}], "author_count": 1}, {"id": "2603.25789", "category": "quant-ph", "title": "Typical entanglement in anyon chains: Page curves beyond Lie group symmetries", "abstract": "We study bipartite entanglement statistics in one-dimensional anyon chains, whose Hilbert spaces are constrained by fusion rules of unitary pre-modular categories. Our setup generalizes previous frameworks on symmetry-resolved entanglement entropy for non-abelian Lie group symmetries to the setting of quantum groups. We derive analytical expressions for the average anyonic entanglement entropy and its variance. Surprisingly, despite the constrained Hilbert space structure, the large $L$ expansion has no universal $O(\\sqrt{L})$ or $O(1)$ symmetry-type corrections except for a subleading topological correction term that produces a Page curve asymmetry. We further show that the variance decays exponentially with system size, establishing the typicality. Numerical simulations of the integrable and quantum-chaotic golden chain Hamiltonian show that chaotic mid-spectrum eigenstates match the Haar-random predictions, supporting the use of eigenstate entanglement as a diagnostic of quantum chaos. Our results establish the anyonic Page curve as an appropriate chaotic benchmark in topological many-body systems and connect anyonic entanglement to Page-type universality in quantum many-body physics.", "url": "https://arxiv.org/abs/2603.25789", "type": "理论+数值", "summary": "我们研究一维任意子链中的二分纠缠统计，其希尔伯特空间受到酉预模类别的融合规则的约束。我们的设置将之前关于非阿贝尔李群对称性的对称解析纠缠熵的框架推广到量子群的设置。我们推导了平均任意子纠缠熵及其方差的解析表达式。令人惊讶的是，尽管希尔伯特空间结构受到限制，但大的 $L$ 展开式没有通用的 $O(\\sqrt{L})$ 或 $O(1)$ 对称型校正，除了产生页面曲线不对称性的次主导拓扑校正项。我们进一步表明方差随着系统规模呈指数衰减，从而建立了典型性。可积和量子混沌金链哈密顿量的数值模拟表明，混沌中谱本征态与哈尔随机预测相匹配，支持使用本征态纠缠作为量子混沌的诊断。\n\n我们的结果将任意子佩奇曲线确立为拓扑多体系统中适当的混沌基准，并将任意子纠缠与量子多体物理中的佩奇型普适性联系起来。", "authors": [{"name": "Yale Yauk"}, {"name": "Lucas Hackl"}, {"name": "Alexander Hahn"}], "featured_authors": [{"name": "Yale Yauk"}, {"name": "Lucas Hackl"}, {"name": "Alexander Hahn"}], "author_count": 3}, {"id": "2603.25831", "category": "quant-ph", "title": "Theory of (Co)homological Invariants on Quantum LDPC Codes", "abstract": "With recent breakthroughs in the construction of good qLDPC codes and nearly good qLTCs, the study of (co)homological invariants of quantum code complexes, which fundamentally underlie their logical operations, has become evidently important. In this work, we establish a systematic framework for mathematically analyzing these invariants across a broad spectrum of constructions, from HGP codes to sheaf codes, by synthesizing advanced math tools. We generalize the notion of canonical logical representatives from HGP codes to the sheaf code setting, resolving a long-standing challenge in explicitly characterizing sheaf codewords. Building on this foundation, we present the first comprehensive computation of cup products within the intricate framework of sheaf codes. Given Artin's primitive root conjecture which holds under the generalized Riemann hypothesis, we prove that $\\tilde{\\Theta}(N)$ independent cup products can be supported on almost good qLDPC codes and qLTCs of length N, opening the possibility of achieving linearly many parallel, nontrivial, constant-depth multi-controlled-Z gates. Moreover, by interpreting sheaf codes as covering spaces of HGP codes via graph lifts, we propose a scheme that inductively generates families of both HGP and sheaf codes in an interlaced fashion from a constant-size HGP code. Notably, the induction preserves all (co)homological invariants of the initial code. This provides a general framework for lifting invariants or logical gates from small codes to infinite code families, and enables efficient verification of such features by checking on small instances. Our theory provides a substantive methodology for studying invariants in HGP codes and extends it to sheaf codes. In doing so, we reveal deep and unexpected connections between qLDPC codes and math, thereby laying the groundwork for future advances in quantum coding, fault tolerance, and physics.", "url": "https://arxiv.org/abs/2603.25831", "type": "理论", "summary": "随着最近在构建良好的 qLDPC 码和接近良好的 qLTC 方面取得的突破，对量子码复合体的（共）同调不变量（其逻辑运算的根本基础）的研究变得明显重要。在这项工作中，我们建立了一个系统框架，通过综合高级数学工具，对从 HGP 代码到层代码等广泛结构中的这些不变量进行数学分析。我们将规范逻辑代表的概念从 HGP 代码推广到层代码设置，解决了明确表征层代码字方面长期存在的挑战。在此基础上，我们首次在复杂的层码框架内对杯积进行了全面计算。考虑到在广义黎曼假设下成立的 Artin 的原根猜想，我们证明 $\\tilde{\\Theta}(N)$ 独立杯积可以在几乎良好的 qLDPC 码和长度为 N 的 qLTC 上得到支持，开启了实现线性多个并行、非平凡、恒定深度多控 Z 门的可能性。\n\n此外，通过将层代码解释为通过图提升覆盖 HGP 代码的空间，我们提出了一种方案，该方案从恒定大小的 HGP 代码以交错方式归纳生成 HGP 和层代码的族。值得注意的是，归纳保留了初始代码的所有（共）同调不变量。这提供了一个通用框架，用于将不变量或逻辑门从小代码提升到无限代码族，并通过检查小实例来实现对此类功能的有效验证。我们的理论为研究 HGP 代码中的不变量提供了实质性的方法，并将其扩展到层代码。在此过程中，我们揭示了 qLDPC 码和数学之间深刻且意想不到的联系，从而为量子编码、容错和物理学的未来进步奠定了基础。", "authors": [{"name": "Zimu Li"}, {"name": "Yuguo Shao"}, {"name": "Fuchuan Wei"}, {"name": "Yiming Li"}, {"name": "Zi-Wen Liu"}], "featured_authors": [{"name": "Zimu Li"}, {"name": "Yuguo Shao"}, {"name": "Fuchuan Wei"}, {"name": "Yiming Li"}, {"name": "Zi-Wen Liu"}], "author_count": 5}, {"id": "2603.25920", "category": "quant-ph", "title": "Impact of Topology on Multipartite Entanglement Distribution Protocols in Quantum Networks", "abstract": "Quantum networks will rely on entanglement distribution to enable multi-user applications such as distributed quantum computing and cryptography. While multipartite entanglement distribution routing protocols have been extensively studied on idealised grid topologies, less is understood about how real network structure shapes their performance and resource requirements. We present a systematic study of four routing protocols for multipartite entanglement distribution, each characterised by the number of paths (single-path and multi-path) and routing strategy (star-based and tree-based), over 81 real network topologies. We identified four distinct topology-dependent performance regimes, where: (i) all protocols perform poorly, (ii) tree-based protocols dominate, (iii) multi-path protocols dominate, or (iv) all protocols perform well. By correlating clusters with graph metrics, we also provide structural explanations for the varied performance of specific protocols. Additionally, motivated by the anticipated high cost of repeaters, we investigated the impact of repeater trimming on the performance of multi-path protocols. Topology strongly governs how far repeater nodes can be removed from the network while maintaining a given performance (distribution rate). For instance, in networks where only 80% of nodes operate as repeaters, well-performing topologies are able to retain over 90% of the distribution rate; whereas sparse, weakly connected graphs exhibit rapid performance degradation, retaining less than half of the distribution rate. Our results provide a topology-aware framework for protocol selection and infrastructure optimisation in future quantum networks, bridging routing design with cost-aware deployment strategies.", "url": "https://arxiv.org/abs/2603.25920", "type": "理论", "summary": "量子网络将依靠纠缠分布来实现分布式量子计算和密码学等多用户应用。虽然多方纠缠分布式路由协议已在理想化网格拓扑上进行了广泛研究，但人们对真实网络结构如何影响其性能和资源需求的了解却很少。我们对四种用于多部分纠缠分布的路由协议进行了系统研究，每种协议都以路径数量（单路径和多路径）和路由策略（基于星形和树形）为特征，超过 81 个真实网络拓扑。我们确定了四种不同的依赖于拓扑的性能机制，其中：（i）所有协议都表现不佳，（ii）基于树的协议占主导地位，（iii）多路径协议占主导地位，或（iv）所有协议都表现良好。通过将集群与图指标相关联，我们还为特定协议的不同性能提供结构解释。此外，出于中继器预期高成本的动机，我们研究了中继器调整对多路径协议性能的影响。\n\n拓扑严格控制在保持给定性能（分配率）的同时，中继器节点可以从网络中删除多远。例如，在只有 80% 节点作为中继器运行的网络中，性能良好的拓扑能够保留 90% 以上的分配率；而稀疏、弱连接的图表现出快速的性能下降，保留了不到一半的分配率。我们的结果为未来量子网络中的协议选择和基础设施优化提供了一个拓扑感知框架，将路由设计与成本感知部署策略联系起来。", "authors": [{"name": "Jazz E. Z. Ooi"}, {"name": "Evan Sutcliffe"}, {"name": "Alejandra Beghelli"}], "featured_authors": [{"name": "Jazz E. Z. Ooi"}, {"name": "Evan Sutcliffe"}, {"name": "Alejandra Beghelli"}], "author_count": 3}, {"id": "2603.25952", "category": "quant-ph", "title": "Scalable topological quantum computing based on Sine-Cosine chain models", "abstract": "This work proposes a scalable framework for topological quantum computing using Matryoshka-type Sine-Cosine chains. These chains support high-dimensional qudit encoding within single systems, reducing the physical resource overhead compared to conventional qubit arrays. We describe how these chains can be used in Y-junction braiding protocols for gate operations and in extended memory architectures capable of storing multiple qubits simultaneously. Fidelity analysis shows partial topological protection against disorder, suggesting this approach is a possible pathway toward low-overhead quantum hardware.", "url": "https://arxiv.org/abs/2603.25952", "type": "理论", "summary": "这项工作提出了一种使用俄罗斯套娃型正弦余弦链的拓扑量子计算的可扩展框架。这些链支持单个系统内的高维 qudit 编码，与传统的量子位阵列相比，减少了物理资源开销。我们描述了如何将这些链用于门操作的 Y 结编织协议以及能够同时存储多个量子位的扩展内存架构。保真度分析显示了针对无序的部分拓扑保护，表明这种方法是实现低开销量子硬件的可能途径。", "authors": [{"name": "A. Lykholat"}, {"name": "G. F. Moreira"}, {"name": "I. R. Martins"}, {"name": "D. Sousa"}, {"name": "A. M. Marques"}, {"name": "R. G. Dias"}], "featured_authors": [{"name": "A. Lykholat"}, {"name": "G. F. Moreira"}, {"name": "I. R. Martins"}, {"name": "D. Sousa"}, {"name": "A. M. Marques"}, {"name": "R. G. Dias"}], "author_count": 6}, {"id": "2603.26039", "category": "quant-ph", "title": "Achieving double-logarithmic precision dependence in optimization-based quantum unstructured search", "abstract": "Grover's algorithm is a fundamental quantum algorithm that achieves a quadratic speedup for unstructured search problems of size $N$. Recent studies have reformulated this task as a maximization problem on the unitary manifold and solved it via linearly convergent Riemannian gradient ascent (RGA) methods, resulting in a complexity of $O(\\sqrt{N}\\log (1/\\varepsilon))$. In this work, we adopt the Riemannian modified Newton (RMN) method to solve the quantum search problem. We show that, in the setting of quantum search, the Riemannian Newton direction is collinear with the Riemannian gradient in the sense that the Riemannian gradient is always an eigenvector of the corresponding Riemannian Hessian. As a result, without additional overhead, the proposed RMN method numerically achieves a quadratic convergence rate with respect to error $\\varepsilon$, implying a complexity of $O(\\sqrt{N}\\log\\log (1/\\varepsilon))$, which is double-logarithmic in precision. Furthermore, our approach remains Grover-compatible, namely, it relies exclusively on the standard Grover oracle and diffusion operators to ensure algorithmic implementability, and its parameter update process can be efficiently precomputed on classical computers.", "url": "https://arxiv.org/abs/2603.26039", "type": "数值", "summary": "Grover 算法是一种基本的量子算法，可为 $N$ 大小的非结构化搜索问题实现二次加速。最近的研究将此任务重新表述为酉流形上的最大化问题，并通过线性收敛黎曼梯度上升（RGA）方法来解决它，导致复杂度为$O(\\sqrt{N}\\log (1/\\varepsilon))$。在这项工作中，我们采用黎曼修正牛顿（RMN）方法来解决量子搜索问题。我们证明，在量子搜索的设置中，黎曼牛顿方向与黎曼梯度共线，因为黎曼梯度始终是相应黎曼海塞矩阵的特征向量。因此，在没有额外开销的情况下，所提出的 RMN 方法在数值上实现了相对于误差 $\\varepsilon$ 的二次收敛速度，这意味着复杂度为 $O(\\sqrt{N}\\log\\log (1/\\varepsilon))$，其精度为双对数。\n\n此外，我们的方法仍然与 Grover 兼容，即它完全依赖于标准 Grover 预言机和扩散算子来确保算法的可实现性，并且其参数更新过程可以在经典计算机上有效地预先计算。", "authors": [{"name": "Zhijian Lai"}, {"name": "Dong An"}, {"name": "Jiang Hu"}, {"name": "Zaiwen Wen"}], "featured_authors": [{"name": "Zhijian Lai"}, {"name": "Dong An"}, {"name": "Jiang Hu"}, {"name": "Zaiwen Wen"}], "author_count": 4}, {"id": "2603.26160", "category": "quant-ph", "title": "Distributed Quantum Discrete Logarithm Algorithm", "abstract": "Solving the discrete logarithm problem (DLP) with quantum computers is a fundamental task with important implications. Beyond Shor's algorithm, many researchers have proposed alternative solutions in recent years. However, due to current hardware limitations, the scale of DLP instances that can be addressed by quantum computers remains insufficient. To overcome this limitation, we propose a distributed quantum discrete logarithm algorithm that reduces the required quantum register size for solving DLPs. Specifically, we design a distributed quantum algorithm to determine whether the solution is contained in a given set. Based on this procedure, our method solves DLPs by identifying the intersection of sets containing the solution. Compared with Shor's original algorithm, our approach reduces the register size and can improve the success probability, while requiring no quantum communication.", "url": "https://arxiv.org/abs/2603.26160", "type": "数值", "summary": "使用量子计算机解决离散对数问题（DLP）是一项具有重要意义的基本任务。除了 Shor 算法之外，近年来许多研究人员还提出了替代解决方案。然而，由于当前硬件限制，量子计算机可处理的DLP实例规模仍然不足。为了克服这一限制，我们提出了一种分布式量子离散对数算法，该算法可以减少求解 DLP 所需的量子寄存器大小。具体来说，我们设计了一种分布式量子算法来确定解是否包含在给定集合中。基于此过程，我们的方法通过识别包含解决方案的集合的交集来解决 DLP。与 Shor 的原始算法相比，我们的方法减少了寄存器大小，可以提高成功概率，同时不需要量子通信。", "authors": [{"name": "Renjie Xu"}, {"name": "Daowen Qiu"}, {"name": "Ligang Xiao"}, {"name": "Le Luo"}, {"name": "Xu Zhou"}], "featured_authors": [{"name": "Renjie Xu"}, {"name": "Daowen Qiu"}, {"name": "Ligang Xiao"}, {"name": "Le Luo"}, {"name": "Xu Zhou"}], "author_count": 5}, {"id": "2603.26519", "category": "quant-ph", "title": "Generating function for Hermitian and non-Hermitian models", "abstract": "It is well known that Hermitian and non-Hermitian models exhibit distinct physics and require different theoretical tools. In this work, we propose a unified generating-function framework for both classes with generic boundary conditions and local impurities. Within this framework, any finite lattice model can be mapped to a generating function of the form G(z)=P(z)/Q(z), where Q(z) and P(z) denote the bulk recurrence relation and boundary terms or impurities, respectively. The problem of solving for eigenstates reduces to a simple criterion based on the cancellation of zeros of Q(z) and P(z). Applying this method to the Hatano-Nelson (HN) model, we show how boundary conditions and impurities determine the location of the zeros, thereby demonstrating the boundary sensitivity of non-Hermitian systems. We further investigate topological edge states in the non-Hermitian Su-Schrieffer-Heeger (SSH) model and identify its topological phase transition. Inspired by generating-function techniques widely used in discrete mathematics, particularly in the study of the Fibonacci sequence, our results establish a direct connection between non-Hermitian physics and recurrence relations, providing a new perspective for analyzing non-Hermitian systems and exploring their connections with discrete mathematical structures.", "url": "https://arxiv.org/abs/2603.26519", "type": "理论", "summary": "众所周知，埃尔米特模型和非埃尔米特模型表现出不同的物理特性，并且需要不同的理论工具。在这项工作中，我们为具有通用边界条件和局部杂质的两个类提出了一个统一的生成函数框架。在此框架内，任何有限晶格模型都可以映射为 G(z)=P(z)/Q(z) 形式的生成函数，其中 Q(z) 和 P(z) 分别表示体递推关系和边界项或杂质。求解本征态的问题简化为基于取消 Q(z) 和 P(z) 零点的简单准则。将此方法应用于 Hatano-Nelson (HN) 模型，我们展示了边界条件和杂质如何确定零点的位置，从而证明了非厄米系统的边界敏感性。我们进一步研究非厄米 Su-Schrieffer-Heeger (SSH) 模型中的拓扑边缘态并识别其拓扑相变。\n\n受到离散数学中广泛使用的生成函数技术的启发，特别是在斐波那契数列的研究中，我们的研究结果建立了非厄米物理和递推关系之间的直接联系，为分析非厄米系统并探索其与离散数学结构的联系提供了新的视角。", "authors": [{"name": "Hua-Yu Bai"}, {"name": "Yang Chen"}, {"name": "Guang-Can Guo"}, {"name": "Ming Gong"}, {"name": "Xi-Feng Ren"}], "featured_authors": [{"name": "Hua-Yu Bai"}, {"name": "Yang Chen"}, {"name": "Guang-Can Guo"}, {"name": "Ming Gong"}, {"name": "Xi-Feng Ren"}], "author_count": 5}, {"id": "2603.26540", "category": "quant-ph", "title": "Symmetry-resolved properties of the trace distance in thermalizing SU(2) systems", "abstract": "We study diagnostics of thermalization in quantum many-body systems with global SU(2) symmetry, where the standard eigenstate thermalization hypothesis (ETH) is generalized to its non-Abelian form. As an eigenstate-level probe, we introduce a symmetry-resolved trace distance constructed from the block structure of the reduced density matrix. This block structure separates spin-sector probabilities from configurational fluctuations within each sector, naturally leading to a decomposition into a probability trace distance and a configurational trace distance. The microcanonical average of the former is bounded by fluctuations of the corresponding spin-sector probabilities within a microcanonical energy window, whereas the latter captures finer intra-sector fluctuations. In non-Abelian thermalizing systems, these spin-sector-probability fluctuations are constrained by the non-Abelian ETH and therefore become exponentially suppressed with system size. Numerical studies of the one-dimensional \\(J_1\\)--\\(J_2\\) Heisenberg chain are consistent with this picture and suggest that, in the thermal regime, the trace distance is asymptotically dominated by the configurational trace distance.", "url": "https://arxiv.org/abs/2603.26540", "type": "理论+数值", "summary": "我们研究具有全局 SU(2) 对称性的量子多体系统中的热化诊断，其中标准本征态热化假设 (ETH) 被推广到其非阿贝尔形式。作为本征态级探针，我们引入了由约化密度矩阵的块结构构造的对称分辨迹距离。这种块结构将自旋扇区概率与每个扇区内的构型波动分开，自然地导致分解为概率轨迹距离和构型轨迹距离。前者的微规范平均值受到微规范能量窗口内相应自旋扇区概率波动的限制，而后者则捕获更精细的扇区内波动。在非阿贝尔热化系统中，这些自旋扇区概率波动受到非阿贝尔 ETH 的约束，因此随着系统规模的增大而呈指数抑制。一维\\(J_1\\)-\\(J_2\\)海森堡链的数值研究与该图一致，表明在热状态下，迹线距离渐近地由构型迹线距离主导。", "authors": [{"name": "Haojie Shen"}, {"name": "Jie Chen"}, {"name": "Xiaoqun Wang"}], "featured_authors": [{"name": "Haojie Shen"}, {"name": "Jie Chen"}, {"name": "Xiaoqun Wang"}], "author_count": 3}, {"id": "2603.26561", "category": "quant-ph", "title": "Complexity of Quadratic Bosonic Hamiltonian Simulation: $\\mathsf{BQP}$-Completeness and $\\mathsf{PostBQP}$-Hardness", "abstract": "The computational complexity of simulating the dynamics of physical quantum systems is a central question at the interface of quantum physics and computer science. In this work, we address this question for the simulation of exponentially large bosonic Hamiltonians with quadratic interactions. We present two results: First, we introduce a broad class of quadratic bosonic problems for which we prove that they are $\\mathsf{BQP}$-complete. Importantly, this class includes two known $\\mathsf{BQP}$-complete problems as special cases: Classical oscillator networks and continuous-time quantum walks. Second, we show that extending the aforementioned class to even more general quadratic Hamiltonians results in a $\\mathsf{PostBQP}$-hard problem. This reveals a sharp transition in the complexity of simulating large quantum systems on a quantum computer, as well as in the difference in complexity between their simulation on classical and quantum computers.", "url": "https://arxiv.org/abs/2603.26561", "type": "理论+数值", "summary": "模拟物理量子系统动力学的计算复杂性是量子物理和计算机科学交叉领域的一个核心问题。在这项工作中，我们解决了这个问题，以模拟具有二次相互作用的指数大玻色哈密顿量。我们提出两个结果：首先，我们引入一类广泛的二次玻色子问题，并证明它们是 $\\mathsf{BQP}$ 完备的。重要的是，此类包括两个已知的 $\\mathsf{BQP}$ 完整问题作为特殊情况：经典振荡器网络和连续时间量子行走。其次，我们证明将上述类别扩展到更一般的二次哈密顿量会导致 $\\mathsf{PostBQP}$ 难题。这揭示了在量子计算机上模拟大型量子系统的复杂性的急剧转变，以及在经典计算机和量子计算机上模拟的复杂性之间的差异。", "authors": [{"name": "Lilith Zschetzsche"}, {"name": "Refik Mansuroğlu"}, {"name": "Norbert Schuch"}], "featured_authors": [{"name": "Lilith Zschetzsche"}, {"name": "Refik Mansuroğlu"}, {"name": "Norbert Schuch"}], "author_count": 3}, {"id": "2603.26606", "category": "quant-ph", "title": "Rotating-Wave and Secular Approximations for Open Quantum Systems", "abstract": "We derive a nonperturbative bound on the distance between evolutions of open quantum systems described by time-dependent generators. We show how this result can be employed to provide an explicit upper bound on the error of the rotating-wave approximation in the presence of dissipation and decoherence. We apply the derived bound to the strong-coupling limit in open quantum systems and to the secular approximation used to obtain a master equation from the Redfield equation.", "url": "https://arxiv.org/abs/2603.26606", "type": "理论+数值", "summary": "我们推导了由时间相关生成器描述的开放量子系统演化之间距离的非微扰界限。我们展示了如何利用该结果为存在耗散和退相干的情况下旋转波近似的误差提供明确的上限。我们将导出的界限应用于开放量子系统中的强耦合极限，以及用于从雷德菲尔德方程获得主方程的长期近似。", "authors": [{"name": "Daniel Burgarth"}, {"name": "Paolo Facchi"}, {"name": "Giovanni Gramegna"}, {"name": "Kazuya Yuasa"}], "featured_authors": [{"name": "Daniel Burgarth"}, {"name": "Paolo Facchi"}, {"name": "Giovanni Gramegna"}, {"name": "Kazuya Yuasa"}], "author_count": 4}, {"id": "2603.26619", "category": "quant-ph", "title": "Entanglement and Quantum Coherence in Krylov Space Dynamics", "abstract": "The spreading of quantum states in Krylov space under unitary dynamics provides a natural framework for characterizing quantum complexity. Quantifiers of this spreading, such as the spread complexity and the inverse participation ratio, depend explicitly on both the Hamiltonian and the initial state, rendering their connection to fundamental quantum resources such as entanglement and quantum coherence subtle. We establish quantitative bounds relating Krylov-space spreading to the entanglement of the evolved state and to the quantum coherence of the initial state. For bipartite systems, we have shown that the entanglement of the evolved state is upper bounded in terms of the entanglement of the Krylov basis vectors and the spread complexity. In the case of multipartite systems, analogous bounds are obtained for the inverse participation ratio, a quantifier of the delocalization of a quantum state in the Krylov basis, in terms of the geometric measures. Furthermore, for qubit and qutrit systems, we derive relations between the quantum coherence of the initial state in the energy eigenbasis and the spread complexity, valid for arbitrary Hamiltonians. Our results provide quantitative constraints linking Krylov-space complexity growth to fundamental quantum resources.", "url": "https://arxiv.org/abs/2603.26619", "type": "理论", "summary": "酉动力学下克雷洛夫空间中量子态的扩散为表征量子复杂性提供了一个自然的框架。这种扩散的量词，例如扩散复杂性和逆参与比，明确取决于哈密顿量和初始状态，使得它们与基本量子资源（例如纠缠和量子相干性）的联系变得微妙。我们建立了将克雷洛夫空间扩展与演化态的纠缠以及初始态的量子相干性联系起来的定量界限。对于二分系统，我们已经证明，演化态的纠缠在 Krylov 基向量的纠缠和扩展复杂度方面是有上限的。在多部分系统的情况下，根据几何度量，获得了逆参与比的类似界限，逆参与比是克雷洛夫基中量子态离域的量词。此外，对于量子位和 qutrit 系统，我们推导了能量本征基中初始状态的量子相干性与扩展复杂性之间的关系，这对于任意哈密顿量都有效。\n\n我们的结果提供了将克雷洛夫空间复杂性增长与基本量子资源联系起来的定量约束。", "authors": [{"name": "Swati Choudhary"}, {"name": "Sukrut Mondkar"}, {"name": "Ujjwal Sen"}], "featured_authors": [{"name": "Swati Choudhary"}, {"name": "Sukrut Mondkar"}, {"name": "Ujjwal Sen"}], "author_count": 3}, {"id": "2603.26642", "category": "quant-ph", "title": "Massless Dirac Fermions in curved surfaces with localized curvature", "abstract": "We investigate how a localized curvature affects the dynamics of massless Dirac fermions in a curved surface. We consider a smooth bump with axial symmetry, adopting two specific geometric models, namely a Gaussian and a volcano-like bumps. By considering a minimal coupling between the spinor and the surface geometry, described by the vielbeins and the spin connection, we study the behavior of the wave function over the surface. By using appropriate numerical methods, we find a linear discrete energy spectrum for the Dirac fermions and its corresponding wavefunctions when the Fermi velocity is considered. It turns out that, since the curvature vanishes asymptotically, the electron states are free waves far from the bumps, but around the curved points, the wave function increases its probability density.", "url": "https://arxiv.org/abs/2603.26642", "type": "理论+数值", "summary": "我们研究局部曲率如何影响曲面中无质量狄拉克费米子的动力学。我们考虑轴对称的平滑凹凸，采用两种特定的几何模型，即高斯凹凸和火山状凹凸。通过考虑由 Vielbeins 和自旋连接描述的旋量和表面几何形状之间的最小耦合，我们研究了表面上波函数的行为。通过使用适当的数值方法，当考虑费米速度时，我们找到了狄拉克费米子的线性离散能谱及其相应的波函数。事实证明，由于曲率渐近消失，远离凸块的电子态是自由波，但在弯曲点周围，波函数增加了其概率密度。", "authors": [{"name": "A. R. N. Lima"}, {"name": "D. F. S. Veras"}, {"name": "J. E. G. Silva"}], "featured_authors": [{"name": "A. R. N. Lima"}, {"name": "D. F. S. Veras"}, {"name": "J. E. G. Silva"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
