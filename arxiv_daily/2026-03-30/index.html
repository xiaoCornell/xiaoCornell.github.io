  <style>
    :root {
      --bg: #f6f1e8;

    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }

    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }

    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }

    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }

    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }

    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }

    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.25829", "category": "cond-mat", "title": "Quantum Thermalization beyond Non-Integrability and Quantum Scars in a Multispecies Bose-Josephson Junction", "abstract": "This work investigates the relationship between quantum chaos and thermalization in a three-species Bose-Josephson Junction (BJJ) with mutual interactions, without coupling to any external environment. The analysis is grounded in the Eigenstate Thermalization Hypothesis (ETH), the modern framework for quantum thermalization, in which non-integrability and chaos are historically assumed as prerequisites. After a thorough characterization of quantum chaos in this system, we examine the occurrence of thermal behavior expected when ETH holds. We identify three distinct regimes: chaotic, integrable, and separable. Remarkably, quantum thermalization occurs in both the chaotic and integrable regimes, while it breaks down in the separable limit - supporting that non-integrability is not a necessary condition for thermalization. Furthermore, since the system exhibits collective phenomena in the semiclassical limit, we identify athermal states in the chaotic regime classifiable as quantum scars, which show no signs of thermalization, consistently with a weak form of ETH. These findings contribute to the understanding of ergodicity breaking, emerging statistical behavior, and non-equilibrium dynamics in ultracold many-body quantum systems.", "url": "https://arxiv.org/abs/2603.25829", "type": "理论", "summary": "这项工作研究了三种物质玻色-约瑟夫森结（BJJ）中量子混沌和热化之间的关系，这些关系具有相互相互作用，而不与任何外部环境耦合。该分析基于本征态热化假说（ETH），这是量子热化的现代框架，其中不可积性和混沌在历史上被假设为先决条件。在对该系统中的量子混沌进行彻底表征之后，我们研究了 ETH 成立时预期的热行为的发生。我们确定了三种不同的体系：混沌、可积和可分。值得注意的是，量子热化发生在混沌和可积状态中，而它在可分离极限中崩溃——支持不可积性不是热化的必要条件。此外，由于该系统在半经典极限下表现出集体现象，我们将混沌状态中的无热状态识别为量子疤痕，其没有表现出热化的迹象，与 ETH 的弱形式一致。\n\n这些发现有助于理解超冷多体量子系统中的遍历性破坏、新兴统计行为和非平衡动力学。", "authors": [{"name": "Francesco Di Menna"}, {"name": "Sergio Ciuchi"}, {"name": "Simone Paganelli"}], "featured_authors": [{"name": "Francesco Di Menna"}, {"name": "Sergio Ciuchi"}, {"name": "Simone Paganelli"}], "author_count": 3}, {"id": "2603.25830", "category": "cond-mat", "title": "Scaling laws of electron and hole spin relaxation in indirect band gap (In,Al)As/AlAs quantum dots", "abstract": "We investigate the electron and heavy hole spin dynamics as a function of magnetic field in ensembles of indirect band gap (In,Al)As/AlAs quantum dots (QDs) with type-I band alignment. Employing a comprehensive model that accounts for both the exciton level quartet and the magnetic-field-driven redistribution of excitons between these states via spin relaxation processes, we extract the electron ($\\tau_{se}$) and heavy hole ($\\tau_{sh}$) spin relaxation times as a function of magnetic field for QDs of varying sizes. Our analysis reveals that both $\\tau_{se}(B)$ and $\\tau_{sh}(B)$ exhibit power-law scaling behavior, yet the scaling exponents for electrons and heavy holes show markedly different evolution with QD size. For QDs with a diameter of about 9 nm, we find $\\tau_{se}(B)\\propto B^{-5}$ and $\\tau_{sh}(B)\\propto B^{-3}$. Remarkably, increasing the QD diameter to about 16 nm results in a drastic change of the scaling laws, with both $\\tau_{se}(B)$ and $\\tau_{sh}(B)$ following a $\\propto B^{-9}$ dependence. We discuss the underlying mechanisms responsible for this size-dependent transformation of the magnetic field scaling behavior of carrier spin relaxation.", "url": "https://arxiv.org/abs/2603.25830", "type": "理论", "summary": "我们研究了具有 I 型能带排列的间接带隙 (In,Al)As/AlAs 量子点 (QD) 集合中电子和重空穴自旋动力学作为磁场的函数。采用综合模型，通过自旋弛豫过程解释激子能级四重态和磁场驱动的激子在这些状态之间的重新分布，我们提取了不同尺寸量子点的电子 ($\\tau_{se}$) 和重空穴 ($\\tau_{sh}$) 自旋弛豫时间作为磁场的函数。我们的分析表明，$\\tau_{se}(B)$ 和 $\\tau_{sh}(B)$ 都表现出幂律标度行为，但电子和重空穴的标度指数随 QD 尺寸的变化表现出明显不同的演化。对于直径约为 9 nm 的 QD，我们找到 $\\tau_{se}(B)\\propto B^{-5}$ 和 $\\tau_{sh}(B)\\propto B^{-3}$。值得注意的是，将 QD 直径增加到约 16 nm 会导致标度定律发生巨大变化，$\\tau_{se}(B)$ 和 $\\tau_{sh}(B)$ 都遵循 $\\propto B^{-9}$ 依赖性。我们讨论了载流子自旋弛豫的磁场尺度行为的这种尺寸依赖性转变的基本机制。", "authors": [{"name": "T. S. Shamirzaev"}, {"name": "D. R. Yakovlev"}, {"name": "D. S. Smirnov"}, {"name": "V. N. Mantsevich"}, {"name": "M. Bayer"}], "featured_authors": [{"name": "T. S. Shamirzaev"}, {"name": "D. R. Yakovlev"}, {"name": "D. S. Smirnov"}, {"name": "V. N. Mantsevich"}, {"name": "M. Bayer"}], "author_count": 5}, {"id": "2603.25842", "category": "cond-mat", "title": "Field-controlled interfacial transport and pinning in an active spin system", "abstract": "Field control provides a practical route to programmable active matter, yet how weak fields modify non-equilibrium coexistence and interfaces remains unclear. To address this, we study a minimal flocking model of active Potts particles coupled to an external field and show that even weak fields can reconfigure phase behavior and interfacial dynamics. For a homogeneous unidirectional field, the flocking phase is reshaped: the coexistence regime between an apolar gas and a polar liquid is replaced by a phase separation between two field-aligned polar phases: a low-density, weakly polarized background and a high-density, strongly polarized band, both moving along the field. When the system forms a dense longitudinal lane oriented transverse to the field, it executes a slow treadmilling motion against the field, driven by the weakly polarized background. If the system is divided into regions with opposite field directions, particles accumulate at the interface, leading to field-induced interface pinning with flocks performing back-and-forth oscillatory motion. In the presence of quenched random field orientations, this pinning favors a disordered state in which global order diminishes with increasing system size, consistent with Imry-Ma arguments, while the quenched disorder smoothens sharp first-order signatures, in line with the Aizenman-Wehr theorem, with activity modifying the scaling. A coarse-grained hydrodynamic theory supports these observations and is consistent with microscopic simulations.", "url": "https://arxiv.org/abs/2603.25842", "type": "理论+数值", "summary": "场控制为可编程活性物质提供了一条实用途径，但弱场如何改变非平衡共存和界面仍不清楚。为了解决这个问题，我们研究了与外部场耦合的活性 Potts 粒子的最小聚集模型，并表明即使是弱场也可以重新配置相行为和界面动力学。对于均匀单向场，聚集相被重塑：非极性气体和极性液体之间的共存状态被两个场对齐的极性相之间的相分离所取代：低密度、弱偏振背景和高密度、强偏振带，两者都沿着场移动。当系统形成横向于场的密集纵向车道时，它在弱偏振背景的驱动下对场执行缓慢的跑步运动。如果系统被分成具有相反场方向的区域，粒子会在界面处积聚，导致场诱导界面钉扎，粒子群进行来回振荡运动。\n\n在存在淬灭随机场方向的情况下，这种钉扎有利于无序状态，其中全局秩序随着系统尺寸的增加而减小，与 Imry-Ma 论证一致，而淬灭无序平滑了尖锐的一阶特征，与 Aizenman-Wehr 定理一致，并且活动修改了缩放比例。粗粒度流体动力学理论支持这些观察结果并且与微观模拟一致。", "authors": [{"name": "Mintu Karmakar"}, {"name": "Matthieu Mangeat"}, {"name": "Swarnajit Chatterjee"}, {"name": "Heiko Rieger"}, {"name": "Raja Paul"}], "featured_authors": [{"name": "Mintu Karmakar"}, {"name": "Matthieu Mangeat"}, {"name": "Swarnajit Chatterjee"}, {"name": "Heiko Rieger"}, {"name": "Raja Paul"}], "author_count": 5}, {"id": "2603.25844", "category": "cond-mat", "title": "Double-peak Majorana bound states in altermagnet--superconductor heterostructures", "abstract": "We study Majorana bound states in a planar Josephson junction in which the middle channel is a $d$-wave altermagnetic metal deposited on a proximitized two-dimensional electron gas. In the topological regime, the near-zero-energy states reveals a characteristic double-peak spatial profile, with the Majorana wavefunction localized near the altermagnet--superconductor interfaces. Using simplified theoretical models, we show that anisotropic hopping intrinsic to altermagnetism naturally generates interface-localized low-energy states, providing the natural explanation for the double-peak structure. In a nanowire geometry with extended normal metallic regions, the same feature persists but the Majorana bound states become more sensitive to the chemical potential compared to the case in planar Josephson junction. In a T-shaped Josephson junction, multiple near-zero-energy states appear, and the Majorana bound state expected at the crossing point is found to be localized near the interfaces, demonstrating that the localization of the Majorana bound states is primarily governed by interface boundaries rather than by the junction geometry. These results show that anisotropic hopping and interface structure play a central role in altermagnet-based topological superconductors and provide a promising route toward a network of controllable Majorana bound states without external magnetic fields.", "url": "https://arxiv.org/abs/2603.25844", "type": "理论", "summary": "我们研究了平面约瑟夫森结中的马约拉纳束缚态，其中中间通道是沉积在邻近二维电子气上的$d$波变磁金属。在拓扑结构中，近零能量状态揭示了特征性的双峰空间轮廓，马约拉纳波函数位于交变磁体-超导体界面附近。使用简化的理论模型，我们表明交变磁力固有的各向异性跳跃自然地产生界面局部低能态，为双峰结构提供了自然的解释。在具有延伸的正常金属区域的纳米线几何结构中，相同的特征仍然存在，但与平面约瑟夫森结的情况相比，马约拉纳束缚态对化学势变得更加敏感。在T形约瑟夫森结中，出现了多个近零能量态，并且发现交叉点处预期的马约拉纳束缚态位于界面附近，这表明马约拉纳束缚态的局域化主要由界面边界而不是结几何形状决定。\n\n这些结果表明，各向异性跳跃和界面结构在基于交变磁体的拓扑超导体中发挥着核心作用，并为无需外部磁场的可控马约拉纳束缚态网络提供了一条有希望的途径。", "authors": [{"name": "Pankaj Sharma"}, {"name": "Narayan Mohanta"}], "featured_authors": [{"name": "Pankaj Sharma"}, {"name": "Narayan Mohanta"}], "author_count": 2}, {"id": "2603.25847", "category": "cond-mat", "title": "Universal effect of ammonia pressure on synthesis of colloidal metal nitrides in molten salts", "abstract": "Metal nitrides represent a large class of materials with extensive applications in optoelectronics, energy, and healthcare technologies. For example, GaN and related nitride semiconductors are key materials for solid-state lighting and high-power electronics, TiN and other early transition metal nitrides (TMNs) are widely used in wear-resistant alloys, tool coatings, catalysts and medical implants. Strong metal-nitrogen bonds grant nitrides structural rigidity as well as chemical and thermal stability. However, the covalency of metal-nitrogen bonds necessitates high temperatures to synthesize crystalline metal nitrides. Common synthetic routes include high-temperature solid-state nitridation, crystal growth in supercritical ammonia, molecular-beam epitaxy (MBE), reactive sputtering, and chemical vapor deposition (CVD). The solution synthesis of colloidal nitride nanocrystals (NCs) is rare and particularly challenging because commonly used solvents and surfactants decompose at temperatures far below those required for crystallization of most metal nitrides. Here we report a general approach to solution synthesis of colloidal metal nitride NCs by reacting metal halides and ammonia dissolved in molten inorganic salts at elevated pressures. Successful syntheses of colloidal TiN, VN, GaN, NbN, Mo2N, Ta3N5, W2N, as well as ternary Ti1-xVxN NCs, are demonstrated. These NCs expand the scope of solution-processable technologically important materials.", "url": "https://arxiv.org/abs/2603.25847", "type": "理论+数值", "summary": "金属氮化物是一大类材料，在光电子、能源和医疗保健技术领域有着广泛的应用。例如，GaN及相关氮化物半导体是固态照明和高功率电子器件的关键材料，TiN等早期过渡金属氮化物（TMN）广泛应用于耐磨合金、工具涂层、催化剂和医疗植入物等领域。牢固的金属-氮键赋予氮化物结构刚性以及化学和热稳定性。然而，金属-氮键的共价键需要高温来合成晶体金属氮化物。常见的合成路线包括高温固态氮化、超临界氨中的晶体生长、分子束外延 (MBE)、反应溅射和化学气相沉积 (CVD)。胶体氮化物纳米晶体（NC）的溶液合成很少见，而且特别具有挑战性，因为常用的溶剂和表面活性剂在远低于大多数金属氮化物结晶所需温度的温度下分解。\n\n在这里，我们报告了一种通过金属卤化物和溶解在熔融无机盐中的氨在高压下反应来溶液合成胶体金属氮化物NC的通用方法。展示了胶体 TiN、VN、GaN、NbN、Mo2N、Ta3N5、W2N 以及三元 Ti1-xVxN NC 的成功合成。这些数控系统扩大了可溶液加工的重要技术材料的范围。", "authors": [{"name": "Ruiming Lin"}, {"name": "Vikash Khokhar"}, {"name": "Ningxin Jiang"}, {"name": "Wooje Cho"}, {"name": "Zirui Zhou"}, {"name": "Di Wang"}, {"name": "Justin C. Ondry"}, {"name": "Zehan Mi"}, {"name": "James Cassidy"}, {"name": "Alex M. Hinkle"}, {"name": "John S. Anderson"}, {"name": "Richard D. Schaller"}, {"name": "De-en Jiang"}, {"name": "Dmitri V. Talapin"}], "featured_authors": [{"name": "Ruiming Lin"}, {"name": "Vikash Khokhar"}, {"name": "Ningxin Jiang"}, {"name": "Richard D. Schaller"}, {"name": "De-en Jiang"}, {"name": "Dmitri V. Talapin"}], "author_count": 14}, {"id": "2603.25908", "category": "cond-mat", "title": "Extreme (Rogue) Waves: From Theory to Experiments in Ultracold Gases and Beyond", "abstract": "In this Chapter, we review key theoretical and experimental advances in the study of extreme nonlinear wave events, called rogue waves (RWs), in both single-component attractively interacting and two-component repulsive mixtures of ultracold quantum gases. Starting from the exact rational solutions of the integrable focusing nonlinear Schroedinger model, the hierarchy of RW solutions is exemplified. These range from the Peregrine soliton (PS) and, related to it, the destabilization into a multi-peak cascade of PSs dubbed \"Christmas-tree\", to the Akhmediev breather, and Kuznetsov-Ma soliton as well as higher-order RWs. Emphasis is placed on their controllable dynamical emergence and characteristics in non-integrable quantum many-body systems described by Gross-Pitaevskii models and extensions thereof through different protocols such as modulational instability, gradient catastrophe, and dam-break flows. We further discuss how immiscible particle-imbalanced repulsive mixtures can be cast into effective attractive single-component environments capable of hosting RWs. Next, state-of-the-art experimental techniques are summarized within the ultracold realm that can be utilized to realize solitary waves, modulational instability, dispersive shock waves and RWs including the very recent first experimental observation of the PS, enabled through engineered effective focusing interactions and precise dynamical triggering. Observations of these extreme events in water waves, nonlinear optics and beyond are also outlined, highlighting their broader relevance and potential of emergence in disparate physical settings. Our exposition aims at showcasing ultracold atomic gases as versatile platforms for controllably generating and probing extreme nonlinear events, among others, in the quantum realm across integrable and non-integrable settings.", "url": "https://arxiv.org/abs/2603.25908", "type": "实验", "summary": "在本章中，我们回顾了超冷量子气体的单组分吸引相互作用和双组分排斥混合物中极端非线性波事件（称为流氓波（RW））研究的关键理论和实验进展。从可积聚焦非线性薛定谔模型的精确有理解出发，举例说明了RW解的层次结构。这些范围从游隼孤子 (PS) 以及与之相关的被称为“圣诞树”的 PS 多峰级联的不稳定，到艾哈迈迪耶夫呼吸器、库兹涅佐夫-马孤子以及高阶 RW。重点是它们在不可积量子多体系统中的可控动力学出现和特征，由 Gross-Pitaevskii 模型描述，并通过不同的协议进行扩展，例如调制不稳定性、梯度突变和溃坝流。我们进一步讨论了如何将不混溶的粒子不平衡排斥混合物注入能够容纳 RW 的有效有吸引力的单组分环境中。\n\n接下来，总结了超冷领域最先进的实验技术，这些技术可用于实现孤立波、调制不稳定性、色散冲击波和 RW，包括最近首次对 PS 进行实验观察，这是通过设计有效的聚焦相互作用和精确的动态触发实现的。还概述了对水波、非线性光学等领域的这些极端事件的观察，强调了它们在不同物理环境中更广泛的相关性和出现的潜力。我们的展览旨在展示超冷原子气体作为多功能平台，用于在可积和不可积设置的量子领域中可控地生成和探测极端非线性事件等。", "authors": [{"name": "A. Chabchoub"}, {"name": "P. Engels"}, {"name": "P. G. Kevrekidis"}, {"name": "S. I. Mistakidis"}, {"name": "G. C. Katsimiga"}, {"name": "M. E. Mossman"}, {"name": "S. Mossman"}], "featured_authors": [{"name": "A. Chabchoub"}, {"name": "P. Engels"}, {"name": "P. G. Kevrekidis"}, {"name": "G. C. Katsimiga"}, {"name": "M. E. Mossman"}, {"name": "S. Mossman"}], "author_count": 7}, {"id": "2603.26001", "category": "cond-mat", "title": "Floquet-driven thermal transport in topological Haldane lattice systems", "abstract": "In this paper, we employ a modified Haldane lattice model to investigate the light-driven, spin- and valley-dependent anomalous Nernst effect in two-dimensional hexagonal topological systems. We demonstrate that two-dimensional buckled materials exhibit a hierarchy of electrically and optically tunable topological phases when subjected to off-resonant circularly polarized light in the presence of intrinsic spin-orbit coupling and a staggered sublattice potential. Within a Berry-curvature-driven transport framework, we systematically analyze charge-, spin-, and valley-resolved anomalous Nernst responses and identify their correspondence with distinct topological regimes. A finite charge Nernst conductivity arises under optical driving combined with spin-orbit coupling, whereas the generation of a pure valley Nernst current requires the simultaneous presence of sublattice asymmetry and off-resonant light. Substrate-induced inversion asymmetry further enables thermally driven valley currents with tunable magnitude and sign. We find that single-spin and single-valley Nernst responses occur in selected insulating and metallic phases, while the valley Nernst signal is suppressed in spin-polarized and anomalous quantum Hall phases. Extending our analysis to monolayer MoS$_2$, we show that strong spin-orbit coupling and broken inversion symmetry allow fully spin- and valley-polarized Nernst currents over a broad energy window. The temperature dependence of the Nernst response exhibits characteristic signatures of topological phase transitions, establishing the anomalous Nernst effect as a sensitive probe of field-engineered band topology in two-dimensional Dirac materials.", "url": "https://arxiv.org/abs/2603.26001", "type": "理论+数值", "summary": "在本文中，我们采用改进的 Haldane 晶格模型来研究二维六边形拓扑系统中光驱动的、自旋和谷相关的反常能斯特效应。我们证明，当二维屈曲材料在存在固有自旋轨道耦合和交错亚晶格势的情况下受到非共振圆偏振光时，表现出电学和光学可调拓扑相的层次结构。在贝里曲率驱动的输运框架内，我们系统地分析了电荷、自旋和谷分辨的反常能斯特响应，并确定了它们与不同拓扑机制的对应关系。在光学驱动与自旋轨道耦合相结合的情况下会产生有限电荷能斯特电导率，而纯谷能斯特电流的产生需要同时存在亚晶格不对称性和非共振光。衬底引起的反转不对称性进一步使得热驱动谷电流具有可调节的幅度和符号。\n\n我们发现单自旋和单谷能斯特响应发生在选定的绝缘相和金属相中，而谷能斯特信号在自旋极化和反常量子霍尔相中受到抑制。将我们的分析扩展到单层 MoS$_2$，我们发现强自旋轨道耦合和破缺的反演对称性允许在宽能量窗口上产生完全自旋和谷极化的能斯特电流。能斯特响应的温度依赖性表现出拓扑相变的特征特征，将反常能斯特效应确立为二维狄拉克材料中现场工程能带拓扑的敏感探针。", "authors": [{"name": "Imtiaz Khan"}, {"name": "Muzamil Shah"}, {"name": "Ambreen Uzair"}, {"name": "Reza Asgari"}, {"name": "Gao Xianlong"}], "featured_authors": [{"name": "Imtiaz Khan"}, {"name": "Muzamil Shah"}, {"name": "Ambreen Uzair"}, {"name": "Reza Asgari"}, {"name": "Gao Xianlong"}], "author_count": 5}, {"id": "2603.26060", "category": "cond-mat", "title": "ZEBRA-Prop: A Zero-Shot Embedding-Based Rapid and Accessible Regression Model for Materials Properties", "abstract": "Large language models (LLMs) exhibit substantial potential across diverse scientific disciplines, including materials science. A property prediction framework, ZEBRA-Prop (Zero-Shot Embedding-Based Rapid and Accessible Regression Model for Materials Properties), is presented here as an extension of LLM-Prop. In contrast to LLM-Prop, which requires task-specific fine-tuning of the LLM, ZEBRA-Prop eliminates fine-tuning, thereby reducing computational cost and enabling rapid model training. The framework employs MatTPUSciBERT, an LLM specialized for materials science, to enhance predictive capability. Multiple textual embeddings are incorporated through a learnable weighting mechanism, which alleviates the context-length constraints inherent in LLM-Prop and facilitates effective integration of diverse textual representations. Evaluation is conducted using two datasets: the TextEdge dataset (approximately 140,000 entries) and an in-house dataset (approximately 2,000 entries) derived from the Materials Project database, with physical properties obtained from first-principles calculations. The predictive performance of ZEBRA-Prop is close to that of LLM-Prop, while the training time is reduced by approximately 95%. The performance improvements are attributable to three principal factors: domain-specific LLM utilization, diversified textual descriptions, and systematic text preprocessing. ZEBRA-Prop constitutes a scalable and computationally efficient framework for materials property prediction and supports accelerated materials discovery, particularly under limited computational resources.", "url": "https://arxiv.org/abs/2603.26060", "type": "理论+数值", "summary": "大型语言模型 (LLM) 在包括材料科学在内的不同科学学科中展现出巨大的潜力。这里提出了一种属性预测框架，ZEBRA-Prop（基于零样本嵌入的材料属性快速且可访问的回归模型），作为 LLM-Prop 的扩展。与需要对 LLM 进行特定任务微调的 LLM-Prop 相比，ZEBRA-Prop 消除了微调，从而降低了计算成本并实现了快速模型训练。该框架采用MatTPUSciBERT（专门从事材料科学的法学硕士）来增强预测能力。通过可学习的加权机制合并多个文本嵌入，这减轻了 LLM-Prop 固有的上下文长度限制，并促进不同文本表示的有效集成。评估使用两个数据集进行：TextEdge 数据集（约 140,000 个条目）和源自材料项目数据库的内部数据集（约 2,000 个条目），其物理特性通过第一原理计算获得。\n\nZEBRA-Prop的预测性能接近LLM-Prop，同时训练时间减少了约95%。性能的提高可归因于三个主要因素：特定领域的LLM利用、多样化的文本描述和系统的文本预处理。 ZEBRA-Prop 构成了一个可扩展且计算高效的材料特性预测框架，并支持加速材料发现，特别是在计算资源有限的情况下。", "authors": [{"name": "Ryoma Yamamoto"}, {"name": "Akira Takahashi"}, {"name": "Kei Terayama"}, {"name": "Yu Kumagai"}, {"name": "Fumiyasu Oba"}], "featured_authors": [{"name": "Ryoma Yamamoto"}, {"name": "Akira Takahashi"}, {"name": "Kei Terayama"}, {"name": "Yu Kumagai"}, {"name": "Fumiyasu Oba"}], "author_count": 5}, {"id": "2603.26079", "category": "cond-mat", "title": "Comparing the orbital angular momentum and magnetic moment of magnon in the Kagome antiferromagnet with negative spin chirality", "abstract": "The orbital dynamics of magnons have recently drawn interest due to their potential roles in thermal and orbital transport phenomena in magnetic insulators. In this study, we investigate the orbital magnetic moment (OMM) and orbital angular momentum (OAM) of magnons in a Kagome antiferromagnet with negative vector chirality, focusing on the distinction between thermodynamic and wave-packet-based definitions. We compute the Berry curvature, the OMM, and the OAM in momentum space under an external magnetic field. Our results reveal a quantitative difference between the OMM and OAM, yet their associated Nernst coefficients exhibit similar temperature and field dependence in transport. Our results provide a quantitative comparison between the thermodynamic and wave-packet formulations of magnon orbital dynamics.", "url": "https://arxiv.org/abs/2603.26079", "type": "理论", "summary": "由于磁振子在磁绝缘体的热和轨道输运现象中的潜在作用，磁振子的轨道动力学最近引起了人们的兴趣。在这项研究中，我们研究了具有负矢量手性的 Kagome 反铁磁体中磁振子的轨道磁矩 (OMM) 和轨道角动量 (OAM)，重点关注热力学定义和基于波包的定义之间的区别。我们计算外部磁场下动量空间中的贝里曲率、OMM 和 OAM。我们的结果揭示了 OMM 和 OAM 之间的定量差异，但它们相关的能斯特系数在输运中表现出相似的温度和场依赖性。我们的结果提供了磁振子轨道动力学的热力学和波包公式之间的定量比较。", "authors": [{"name": "Youngjae Jeon"}, {"name": "Jongjun M. Lee"}, {"name": "Hyun-Woo Lee"}], "featured_authors": [{"name": "Youngjae Jeon"}, {"name": "Jongjun M. Lee"}, {"name": "Hyun-Woo Lee"}], "author_count": 3}, {"id": "2603.26083", "category": "cond-mat", "title": "Crossover Scaling of Binder Cumulant and its application in Non-reciprocal Sandpiles", "abstract": "In this letter, we unveil a robust, pre-asymptotic scaling regime for the Binder cumulant $U_L$, a central finite-size scaling tool, demonstrating $U_L\\sim N^{-1} |t|^{-d\\nu}$ (disordered phase) and $\\frac{2}{3}-U_L\\sim N^{-1} |t|^{-d\\nu}$ (ordered phase), with $t$ being the reduced control parameter, and $N$, $d$, $\\nu$ represent the total number of sites, the dimensionality, and correlation length exponent, respectively. Leveraging this result, we resolve a fundamental question on the stability of universality classes under the breaking of microscopic reciprocity. For the conserved Manna sandpile, we show that reciprocal biases preserve its universality class, merely shifting the critical point. In striking contrast, any non-reciprocal interaction acts as a relevant perturbation, decisively driving the system's critical exponents to flow from their non-mean-field values towards the mean-field related ones. This flow establishes non-reciprocity as a generic mechanism inducing mean-field criticality in conserved, non-equilibrium systems.", "url": "https://arxiv.org/abs/2603.26083", "type": "理论+数值", "summary": "在这封信中，我们揭示了 Binder 累积量 $U_L$ 的鲁棒预渐近缩放机制，这是一种中心有限尺寸缩放工具，演示了 $U_L\\sim N^{-1} |t|^{-d\\nu}$ （无序相）和 $\\frac{2}{3}-U_L\\sim N^{-1} |t|^{-d\\nu}$ （有序相），其中 $t$ 是简化的控制参数， $N$、$d$、$\\nu$分别表示站点总数、维数和相关长度指数。利用这一结果，我们解决了微观互易性被破坏下普遍性类稳定性的基本问题。对于保守的甘露沙堆，我们表明互惠偏差保留了其普遍性类别，只是改变了临界点。与此形成鲜明对比的是，任何非互易相互作用都充当相关扰动，决定性地驱动系统的临界指数从非平均场值流向平均场相关值。该流程将非互易性建立为在保守的非平衡系统中引发平均场临界性的通用机制。", "authors": [{"name": "Wei Zhong"}, {"name": "Youjin Deng"}], "featured_authors": [{"name": "Wei Zhong"}, {"name": "Youjin Deng"}], "author_count": 2}, {"id": "2603.26152", "category": "cond-mat", "title": "Towards twisted, topological, and quantum graphene plasmonics", "abstract": "In this article, we analyze the quantum and topological properties of graphene-based plasmonic systems. We consider the following plasmonic materials: single-layer graphene, twisted bilayer graphene, and other graphene stackings, as well as the following architectures: graphene-based gratings, grids, chains of graphene disks, and the kagomé lattice.", "url": "https://arxiv.org/abs/2603.26152", "type": "理论", "summary": "在本文中，我们分析了基于石墨烯的等离子体系统的量子和拓扑特性。我们考虑以下等离子体材料：单层石墨烯、扭曲双层石墨烯和其他石墨烯堆叠，以及以下架构：基于石墨烯的光栅、网格、石墨烯盘链和kagomé晶格。", "authors": [{"name": "A. Octávio Soares"}, {"name": "Nuno M. R. Peres"}], "featured_authors": [{"name": "A. Octávio Soares"}, {"name": "Nuno M. R. Peres"}], "author_count": 2}, {"id": "2603.26271", "category": "cond-mat", "title": "Euler band topology and multiple hinge modes in three-dimensional insulators", "abstract": "In two-dimensional systems with space-time inversion symmetry, such as $C_{2z}T$, the reality condition on wave functions gives rise to real band topology characterized by the Euler class, a $\\mathbb{Z}$-valued topological invariant for a pair of real bands in the Brillouin zone. In this paper, we study three-dimensional $C_{2z}T$-symmetric insulators characterized by $\\bar{e}_2$, defined as the difference in the Euler classes between two $C_{2z}T$-invariant planes in the three-dimensional Brillouin zone. By deriving effective surface Hamiltonians from generic low-energy continuum Hamiltonians characterized by the topological invariant $\\bar{e}_2$, we reveal that multiple gapless boundary states exist at the domain walls of the surface mass, which give rise to the multiple chiral hinge modes. We also show that three-dimensional insulators characterized by $\\bar{e}_2=N$ support $N$ chiral hinge modes. Notably, due to the constraint of two occupied bands in our system, these phases are distinct from stacked Chern insulators composed of $N$ layers. Furthermore, we construct tight-binding models for $\\bar{e}_2=2$ and $3$ and numerically demonstrate the emergence of two and three chiral hinge modes, respectively. These results are consistent with those obtained from the surface theory.", "url": "https://arxiv.org/abs/2603.26271", "type": "理论+数值", "summary": "在具有时空反演对称性的二维系统中，例如$C_{2z}T$，波函数的现实条件产生了以欧拉类为特征的实数能带拓扑，这是布里渊区一对实数能带的$\\mathbb{Z}$值拓扑不变量。在本文中，我们研究了以$\\bar{e}_2$为特征的三维$C_{2z}T$对称绝缘体，定义为三维布里渊区中两个$C_{2z}T$不变平面之间的欧拉类之差。通过从以拓扑不变式 $\\bar{e}_2$ 为特征的通用低能连续体哈密顿量中导出有效表面哈密顿量，我们揭示了表面质量的畴壁处存在多个无间隙边界态，从而产生了多种手性铰链模式。我们还表明，以 $\\bar{e}_2=N$ 为特征的三维绝缘体支持 $N$ 手性铰链模式。值得注意的是，由于我们系统中两个占用带的限制，这些相不同于由 $N$ 层组成的堆叠陈绝缘体。\n\n此外，我们构建了 $\\bar{e}_2=2$ 和 $3$ 的紧束缚模型，并分别在数值上证明了两种和三种手性铰链模式的出现。这些结果与表面理论得到的结果一致。", "authors": [{"name": "Yutaro Tanaka"}, {"name": "Shingo Kobayashi"}], "featured_authors": [{"name": "Yutaro Tanaka"}, {"name": "Shingo Kobayashi"}], "author_count": 2}, {"id": "2603.26281", "category": "cond-mat", "title": "Sign control of photocurrents by spin-group-symmetry breaking in altermagnetic insulators", "abstract": "Controlling physical responses through symmetry breaking is a central paradigm in quantum materials, enabling novel functionalities. Here we determine the effects of spin-group-symmetry breaking on nonlinear optical responses of collinear altermagnetic insulators. Using shear strain as an example, we show that the direction of symmetry-breaking induced components of charge and spin photocurrents are locked to the sign of the strain. In the absence of spin-orbit coupling, this effect is intuitively captured by the spin-gap asymmetry--an imbalance between spin-up and spin-down direct band gaps which couples trilinearly with the Néel order and the strain. We demonstrate this mechanism with density functional theory calculations on the recently proposed altermagnet CuWP$_2$S$_6$. Having symmetry-guided control of both charge and spin photocurrents allows, vice versa, to reveal and investigate altermagnetism in insulating materials by exploration of their optical responses.", "url": "https://arxiv.org/abs/2603.26281", "type": "理论+数值", "summary": "通过对称性破缺控制物理响应是量子材料的核心范例，可实现新颖的功能。在这里，我们确定了自旋群对称性破缺对共线交变磁绝缘体非线性光学响应的​​影响。以剪切应变为例，我们表明电荷和自旋光电流的对称破缺感应分量的方向被锁定到应变的符号。在没有自旋轨道耦合的情况下，这种效应可以通过自旋带隙不对称性直观地捕捉到——自旋向上和自旋向下直接带隙之间的不平衡，与尼尔阶和应变三线性耦合。我们通过最近提出的交流磁体 CuWP$_2$S$_6$ 上的密度泛函理论计算证明了这种机制。对电荷和自旋光电流进行对称引导控制，反之亦然，可以通过探索绝缘材料的光学响应来揭示和研究绝缘材料中的交变磁性。", "authors": [{"name": "Gastón Blatter"}, {"name": "Xiao Zhang"}, {"name": "Jeroen van den Brink"}, {"name": "Mengli Hu"}, {"name": "Shu Zhang"}], "featured_authors": [{"name": "Gastón Blatter"}, {"name": "Xiao Zhang"}, {"name": "Jeroen van den Brink"}, {"name": "Mengli Hu"}, {"name": "Shu Zhang"}], "author_count": 5}, {"id": "2603.26282", "category": "cond-mat", "title": "Simulation of single-qubit gates in spin-orbit coupled Bose-Einstein condensate with cubic-quintic nonlinearity by nonlinear perturbations", "abstract": "We consider spin-orbit coupled Bose-Einstein condensates with cubic-quintic nonlinear interaction within the framework of second quantization formulation and find eigen states using numerical simulation and mean-field approximation. We show that two low-lying Schrodinger cat states remain degenerate up to a certain value of Raman coupling strength and these states can serve as qubit basis. We take three different nonlinear perturbations and find that the perturbations can result in different rotations of qubit state on Bloch sphere. We calculate the unitary operator corresponding to each perturbation and suggest the possibilities for obtaining various gates in ultra-cold atomic system.", "url": "https://arxiv.org/abs/2603.26282", "type": "理论+数值", "summary": "我们在第二量子化公式的框架内考虑具有三次五次非线性相互作用的自旋轨道耦合玻色-爱因斯坦凝聚体，并使用数值模拟和平均场近似找到本征态。我们表明，两个低位薛定谔猫态在拉曼耦合强度达到一定值时仍然保持简并，并且这些态可以作为量子位基础。我们采用三种不同的非线性扰动，发现这些扰动可以导致布洛赫球上量子位态的不同旋转。我们计算了与每个扰动对应的酉算子，并提出了在超冷原子系统中获得各种门的可能性。", "authors": [{"name": "Prithwish Ghosh"}, {"name": "Kajal Krishna Dey"}, {"name": "Golam Ali Sekh"}], "featured_authors": [{"name": "Prithwish Ghosh"}, {"name": "Kajal Krishna Dey"}, {"name": "Golam Ali Sekh"}], "author_count": 3}, {"id": "2603.26283", "category": "cond-mat", "title": "Crystalline b-Ga2O3 thin films deposited via reactive magnetron sputtering of a liquid Ga target", "abstract": "Ga2O3 thin films were deposited by reactive magnetron sputtering from a liquid gallium target. The influence of deposition temperature, substrate type, and discharge parameters on the structural and electrical properties was systematically investigated. Films deposited on silicon and quartz glass exhibit polycrystalline growth, whereas sapphire substrates enable highly oriented growth of b-Ga2O3 with a preferred (-201) orientation. The lowest electrical resistivity of 7x10_3 this http URL was obtained for films deposited on sapphire at a temperature of 585C. At this temperature, the films reach sufficient crystalline quality to enable efficient charge carrier transport and thus the manifestation of unintentional conductivity. At higher deposition temperatures, pronounced crystallization occurs; however, it is not homogeneous throughout the entire film thickness, which leads to a deterioration of the electrical properties. These results demonstrate that, despite intrinsic limitations, reactive magnetron sputtering can be successfully employed for the preparation of Ga2O3 thin films with optimized electrical properties when appropriate substrates and deposition temperatures are selected.", "url": "https://arxiv.org/abs/2603.26283", "type": "理论+数值", "summary": "Ga2O3 薄膜是通过反应磁控溅射从液态镓靶上沉积的。系统地研究了沉积温度、基底类型和放电参数对结构和电性能的影响。沉积在硅和石英玻璃上的薄膜表现出多晶生长，而蓝宝石基板可以实现具有优选 (-201) 取向的 b-Ga2O3 的高度定向生长。该 http URL 的最低电阻率为 7x10_3，是在 585C 温度下沉积在蓝宝石上的薄膜获得的。在此温度下，薄膜达到足够的结晶质量，以实现有效的载流子传输，从而表现出无意的导电性。在较高的沉积温度下，会发生明显的结晶；然而，它在整个薄膜厚度上并不均匀，这会导致电性能恶化。\n\n这些结果表明，尽管存在固有的局限性，但当选择适当的基底和沉积温度时，反应磁控溅射可以成功地用于制备具有优化电性能的 Ga2O3 薄膜。", "authors": [{"name": "Petr Novak"}, {"name": "Jan Koloros"}, {"name": "Stanislav Haviar"}, {"name": "Jiri Rezek"}, {"name": "Pavel Baroch"}], "featured_authors": [{"name": "Petr Novak"}, {"name": "Jan Koloros"}, {"name": "Stanislav Haviar"}, {"name": "Jiri Rezek"}, {"name": "Pavel Baroch"}], "author_count": 5}, {"id": "2603.26404", "category": "cond-mat", "title": "Interstitial-Electron Altermagnetism in Two Dimensions", "abstract": "Altermagnetism has so far been associated with compensated magnetic moments carried by atoms. Here we introduce Stoner instability induced interstitial-electron altermagnetism, a distinct mechanism in which altermagnetic order is carried instead by interstitial anionic electrons in electrides. We show that, owing to the quasi-nucleus-free nature of interstitial electrons, the Stoner instability in electrides hosting two interstitial electrons can naturally stabilize an altermagnetic state rather than the conventional ferromagnetic one. This mechanism leads to a practical design principle for two-dimensional materials, from which we identify monolayers Zr2N and Ti2N as representative candidates. The strong sensitivity of interstitial electrons to cavity size enables efficient strain control of the altermagnetic order and a pronounced piezo-altermagnetic effect. Moreover, we investigate the evolution of the magnetism in Zr2N under ultrafast laser excitation, which exhibits dynamics distinct from those in all previously reported magnetic materials where magnetism is carried by real atoms. Our work not only offers a novel pathway to realize altermagnetism but also reveals an efficient non-magnetic route for its control.", "url": "https://arxiv.org/abs/2603.26404", "type": "理论", "summary": "迄今为止，交变磁性与原子携带的补偿磁矩有关。在这里，我们介绍了斯通纳不稳定性引起的间隙电子交变磁性，这是一种独特的机制，其中交变磁序由电子化合物中的间隙阴离子电子携带。我们表明，由于间隙电子的准无核性质，拥有两个间隙电子的电子化合物中的斯通纳不稳定性可以自然地稳定交变磁态，而不是传统的铁磁态。这种机制产生了二维材料的实用设计原理，从中我们确定了单层 Zr2N 和 Ti2N 作为代表性候选材料。间隙电子对腔尺寸的强烈敏感性使得能够有效地控制交变磁序和显着的压电交变磁效应。此外，我们研究了超快激光激发下 Zr2N 中磁性的演化，其表现出与之前报道的所有磁性材料（其中磁性由真实原子携带）不同的动力学。\n\n我们的工作不仅提供了一种实现交变磁性的新途径，而且揭示了一种有效的非磁性控制途径。", "authors": [{"name": "Xia Cheng"}, {"name": "Yang Wu"}, {"name": "Zhenzhou Guo"}, {"name": "Tie Yang"}, {"name": "Weizhen Meng"}, {"name": "Zhenxiang Cheng"}, {"name": "Zhi-Ming Yu"}, {"name": "Xiaotian Wang"}], "featured_authors": [{"name": "Xia Cheng"}, {"name": "Yang Wu"}, {"name": "Zhenzhou Guo"}, {"name": "Zhenxiang Cheng"}, {"name": "Zhi-Ming Yu"}, {"name": "Xiaotian Wang"}], "author_count": 8}, {"id": "2603.26424", "category": "cond-mat", "title": "Emergence of ferromagnetic state due to structural disorder in pseudo-binary Ce(Fe0.9Co0.1)2 compound", "abstract": "The changes in magnetic properties of Ce(Fe0.9Co0.1)2 compound with increasing disorder are discussed in the paper. Homogeneous alloys are known to undergo the phase transition from ferromagnetic to antiferromagnetic state accompanied by the structural distortion of the cubic Laves C15 phase into the rhombohedral one. Various stimuli, like the structural disorder, or applied magnetic field, can force the emergence of ferromagnetism at low temperatures. We initially introduced the structural disorder using rapid quenching. Further changes were made by severe plastic deformation. The presence of a ferromagnetic phase in a low-temperature region is reported here and accompanies the deterioration of a first-order phase transition. We show, based on electronic calculations, that the structural motifs arising from various distortions of the initial MgCu2-type structure, caused by the partial replacement of Fe with Co atoms, are characterized by stable antiferromagnetic order. This neglects simple structural distortions as the source of ferromagnetism. The presence of a strongly defective structure understood as a topologically disordered volume, reduced the fraction transformed from a ferromagnetic to an antiferromagnetic state. Therefore, a strong reduction of isothermal entropy changes was also observed, as it decreased from 1.94 Jkg-1K-1 and -1.43 Jkg-1K-1 ({\\Delta}{\\mu}0H = 4 T) to 0.30 Jkg-1K-1 and -0.96 Jkg-1K-1 for antiferromagnetic-ferromagnetic and ferromagnetic-paramagnetic transition, respectively.", "url": "https://arxiv.org/abs/2603.26424", "type": "理论+数值", "summary": "本文讨论了Ce(Fe0.9Co0.1)2化合物的磁性能随无序度增加的变化。众所周知，均质合金会经历从铁磁态到反铁磁态的相变，同时伴随着立方 Laves C15 相结构畸变为菱面体相。各种刺激，例如结构紊乱或施加的磁场，都可以迫使低温下铁磁性的出现。我们最初使用快速淬火引入了结构无序。进一步的变化是通过严重的塑性变形来实现的。这里报道了低温区域铁磁相的存在，并伴随着一级相变的恶化。基于电子计算，我们表明，由 Co 原子部分取代 Fe 引起的初始 MgCu2 型结构的各种变形所产生的结构图案具有稳定的反铁磁序的特征。这忽略了简单的结构扭曲作为铁磁性的来源。\n\n被理解为拓扑无序体积的强烈缺陷结构的存在，减少了从铁磁态转变为反铁磁态的部分。因此，也观察到等温熵变的强烈减少，反铁磁-铁磁和铁磁-顺磁转变的等温熵变分别从1.94 Jkg-1K-1和-1.43 Jkg-1K-1 ({\\Delta}{\\mu}0H = 4 T)下降到0.30 Jkg-1K-1和-0.96 Jkg-1K-1。", "authors": [{"name": "Andrzej Musiał"}, {"name": "Maria Pugaczowa-Michalska"}, {"name": "Natalia Lindner"}, {"name": "Zbigniew Śniadecki"}], "featured_authors": [{"name": "Andrzej Musiał"}, {"name": "Maria Pugaczowa-Michalska"}, {"name": "Natalia Lindner"}, {"name": "Zbigniew Śniadecki"}], "author_count": 4}, {"id": "2603.26436", "category": "cond-mat", "title": "Anomalous Nonlinear Magnetoconductivity in van der Waals Magnet CrSBr", "abstract": "Nonlinear magnetoconductivity (NLMC) is a nonreciprocal transport response arising in non-centrosymmetric materials. However, this ordinary NLMC signal vanishes at zero magnetic field, limiting its potential for applications. Here, we report the observation of an anomalous NLMC controlled by internal order parameters such as the magnetization or Néel vectors. We achieve this response by breaking both inversion and time-reversal symmetry in artificial van der Waals heterostructures based on the magnetic CrSBr and insulating hBN. The nonreciprocal signal can be tuned between two different states in ferromagnetic monolayer CrSBr and among four different states in antiferromagnetic bilayer CrSBr, thanks to its metamagnetic transition. Remarkably, this output signal in the ferromagnetic (antiferromagnetic) state of CrSBr is three (one) orders of magnitude higher than those previously measured. A conductivity scaling analysis reveals the Berry connection polarizability as the origin of the anomalous NLMC. Our results pave the way for high-frequency rectifiers with magnetically switchable output polarity as well as for an efficient electrical readout of the magnetic state of antiferromagnetic materials.", "url": "https://arxiv.org/abs/2603.26436", "type": "理论", "summary": "非线性磁导率（NLMC）是非中心对称材料中产生的非互易输运响应。然而，这种普通的 NLMC 信号在零磁场下消失，限制了其应用潜力。在这里，我们报告了由内部序参数（例如磁化强度或尼尔矢量）控制的异常 NLMC 的观察结果。我们通过打破基于磁性 CrSBr 和绝缘 hBN 的人工范德华异质结构中的反转和时间反转对称性来实现这一响应。由于其变磁转变，不可逆信号可以在铁磁单层 CrSBr 的两种不同状态之间以及反铁磁双层 CrSBr 的四种不同状态之间调谐。值得注意的是，CrSBr 铁磁（反铁磁）状态下的输出信号比之前测量的信号高出三（一）个数量级。电导率缩放分析揭示了贝里连接极化率是异常 NLMC 的起源。\n\n我们的研究结果为具有磁性可切换输出极性的高频整流器以及反铁磁材料磁性状态的有效电读出铺平了道路。", "authors": [{"name": "Junhyeon Jo"}, {"name": "Manuel Suárez-Rodríguez"}, {"name": "Samuel Mañas-Valero"}, {"name": "Eugenio Coronado"}, {"name": "Ivo Souza"}, {"name": "Fernando de Juan"}, {"name": "Fèlix Casanova"}, {"name": "Marco Gobbi"}, {"name": "Luis E. Hueso"}], "featured_authors": [{"name": "Junhyeon Jo"}, {"name": "Manuel Suárez-Rodríguez"}, {"name": "Samuel Mañas-Valero"}, {"name": "Fèlix Casanova"}, {"name": "Marco Gobbi"}, {"name": "Luis E. Hueso"}], "author_count": 9}, {"id": "2603.26452", "category": "cond-mat", "title": "Towards a unified first-principles-based description of VO$_2$ using DFT+DMFT with bond-centered orbitals", "abstract": "We present a combined density-functional theory and dynamical mean-field theory (DFT+DMFT) study of the full structural phase space of rutile-based vanadium dioxide (VO$_2$), including also the less studied M2 and T phases, using an unconventional bond-centered orbital basis. The use of bond-centered orbitals allows us to treat all main phases of VO$_2$, and the structural transitions between them, using one consistent approach with moderate computational cost and without pre-pattering of the structure into dimerized and undimerized V--V pairs. We obtain two distinct insulating states on the two different types of vanadium chains in the M2 phase, a singlet-insulator on the dimerized chains and a Mott-insulator on the zigzag-distorted chains, which, however, are strongly coupled in the M2 phase and thus the metal-insulator transition always occurs concomitantly for both types of sites. We also demonstrate that the M2 phase corresponds to a local energy minimum in the structural phase space of VO$_2$, the stability of which, apart from the internal structural distortion, depends crucially on the unit cell strain relative to the undistorted rutile phase. Our calculations further indicate that the symmetry-distinct triclinic T phase corresponds electronically to either an M1 or an M2-type insulator with an abrupt transition as a function of distortion. Finally, we disentangle the effect of the dimerization and zigzag distortions by constructing hypothetical structures that contain only one site type, finding that the zigzag distortion strongly favors emergence of the Mott-insulating state, both as function of distortion and on-site interaction.", "url": "https://arxiv.org/abs/2603.26452", "type": "理论+数值", "summary": "我们使用非常规的键中心轨道基础，对金红石基二氧化钒 (VO$_2$) 的完整结构相空间（包括研究较少的 M2 和 T 相）进行了密度泛函理论和动态平均场理论 (DFT+DMFT) 的结合研究。使用键中心轨道使我们能够处理 VO$_2$ 的所有主要相以及它们之间的结构转变，使用一种计算成本适中的一致方法，并且无需将结构预先模式化为二聚和非二聚 V-V 对。我们在 M2 相中的两种不同类型的钒链上获得了两种不同的绝缘态，即二聚链上的单线态绝缘体和锯齿形链上的莫特绝缘体，然而，它们在 M2 相中强耦合，因此金属-绝缘体转变总是同时发生在两种类型的位点上。我们还证明，M2 相对应于 VO$_2$ 结构相空间中的局部能量最小值，其稳定性除了内部结构畸变外，还主要取决于相对于未畸变金红石相的晶胞应变。\n\n我们的计算进一步表明，对称性不同的三斜 T 相在电子上对应于 M1 或 M2 型绝缘体，其突变是畸变函数。最后，我们通过构建仅包含一种位点类型的假设结构来解开二聚化和锯齿形扭曲的影响，发现锯齿形扭曲强烈有利于莫特绝缘态的出现，无论是作为扭曲还是现场相互作用的函数。", "authors": [{"name": "Peter Mlkvik"}, {"name": "Nicola A. Spaldin"}, {"name": "Claude Ederer"}], "featured_authors": [{"name": "Peter Mlkvik"}, {"name": "Nicola A. Spaldin"}, {"name": "Claude Ederer"}], "author_count": 3}, {"id": "2603.26471", "category": "cond-mat", "title": "Importance of Electronic Entropy for Machine Learning Interatomic Potentials", "abstract": "Machine learning interatomic potentials (MLIPs) enable large-scale atomistic simulations but remain challenged in describing mixed-valence materials where charge ordering strongly influences thermodynamic stability. Here we investigate the role of electronic entropy in MLIP structural optimization of the battery cathode material \\ce{NaFePO4}. We show that conventional MLIPs fail to reproduce the correct stability of intermediate \\ce{Na} concentrations because structural optimization leads to incorrect \\ce{Fe^{2+}}/\\ce{Fe^{3+}} charge assignments, resulting in erroneous energy ordering and convex-hull predictions. Analysis of magnetic moments during structural optimization reveals that MLIPs are unable to capture electronic entropy associated with charge ordering. To address this limitation, we introduce an approach that embeds charge-state information directly into the MLIP representation by distinguishing between \\ce{Fe^{2+}} and \\ce{Fe^{3+}} environments during training. Retraining CHGNet, cPaiNN, and MACE with this representation enables accurate structural optimization, correct identification of charge ordering, and improved agreement with density functional theory convex hulls. Our results demonstrate that incorporating electronic entropy into MLIP representations is essential for modeling charge-disordered materials and provide a practical framework for extending MLIP simulations to mixed-valence transition-metal systems.", "url": "https://arxiv.org/abs/2603.26471", "type": "理论+数值", "summary": "机器学习原子间势（MLIP）可以实现大规模原子模拟，但在描述混合价材料方面仍然面临挑战，其中电荷排序强烈影响热力学稳定性。在这里，我们研究了电子熵在电池正极材料 \\ce{NaFePO4} MLIP 结构优化中的作用。我们表明，传统的 MLIP 无法重现中间 \\ce{Na} 浓度的正确稳定性，因为结构优化会导致不正确的 \\ce{Fe^{2+}}/\\ce{Fe^{3+}} 电荷分配，从而导致错误的能量排序和凸包预测。结构优化期间的磁矩分析表明，MLIP 无法捕获与电荷排序相关的电子熵。为了解决这个限制，我们引入了一种方法，通过在训练期间区分 \\ce{Fe^{2+}} 和 \\ce{Fe^{3+}} 环境，将电荷态信息直接嵌入到 MLIP 表示中。\n\n使用这种表示形式重新训练 CHGNet、cPaiNN 和 MACE 可以实现精确的结构优化、电荷排序的正确识别，并提高与密度泛函理论凸包的一致性。我们的结果表明，将电子熵纳入 MLIP 表示对于电荷无序材料建模至关重要，并为将 MLIP 模拟扩展到混合价过渡金属系统提供了实用的框架。", "authors": [{"name": "Martin Hoffmann Petersen"}, {"name": "Steen Lysgaard"}, {"name": "Arghya Bhowmik"}, {"name": "Kedar Hippalgaonkar"}, {"name": "Juan Maria Garcia Lastra"}], "featured_authors": [{"name": "Martin Hoffmann Petersen"}, {"name": "Steen Lysgaard"}, {"name": "Arghya Bhowmik"}, {"name": "Kedar Hippalgaonkar"}, {"name": "Juan Maria Garcia Lastra"}], "author_count": 5}, {"id": "2603.26490", "category": "cond-mat", "title": "Analysis of the singular band structure occurring in one-dimensional topological normal and superfluid fermionic systems: A pedagogical description", "abstract": "Topological properties of solid-state materials arise when crossings occur in their band-structure eigenvalues, which give rise to discontinuities in the associated Bloch-function eigenvectors once these are mapped over the whole Brillouin zone. These nonanalytic properties have direct consequences on the spatial decay of the corresponding Wannier functions, leading to what is nowadays referred to as the \"obstruction to finding symmetric Wannier functions\" for a given set of bands, as well as on the need for shifting the Wannier functions to interstitial positions, related to what is nowadays known as the \"bulk-boundary correspondence.\" The importance of nonanalytic points of Bloch eigenfunctions and their consequences for the spatial decay of Wannier functions were historically anticipated back in 1978 [G. Strinati, Phys. Rev. B 18, 4104-4119 (1978)], somewhat before the work of Berry on what came to be referred to as the \"Berry phase\" [M. V. Berry, Proc. R. Soc. London, Ser. A 392, 45 (1984)]. In particular, the former paper identified key precursors and physical insights that are now understood, in hindsight, to be closely related to the later developments mentioned above. Here, we recap the essential features of these key issues in a rather pedagogical way, by considering in full details two instructing examples for which the origin of the discontinuities in the eigenvectors can be readily traced and mapped out, and the rate of the spatial falloff of the associated Wannier functions can be fully determined. For this analysis to be as complete as possible, two cases, one for noninteracting and one for interacting fermions, are considered on equal footing.", "url": "https://arxiv.org/abs/2603.26490", "type": "理论", "summary": "当固态材料的能带结构特征值发生交叉时，固态材料的拓扑特性就会出现，一旦相关的布洛赫函数特征向量映射到整个布里渊区，就会导致相关的布洛赫函数特征向量不连续。这些非解析性质对相应的万尼尔函数的空间衰减有直接影响，导致现在所谓的对于给定的一组能带“寻找对称万尼尔函数的障碍”，以及将万尼尔函数移动到间隙位置的需要，这与现在所谓的“体边界对应”有关。 Bloch 本征函数非解析点的重要性及其对 Wannier 函数空间衰减的影响早在 1978 年就已被历史性地预测到了 [G.斯特里纳蒂，物理学家。 Rev. B 18, 4104-4119 (1978)]，稍早于 Berry 关于后来被称为“Berry 阶段”的工作 [M. Rev. B 18, 4104-4119 (1978)]。 V.贝里，Proc。 R.苏克。伦敦，爵士。 A 392, 45 (1984)]。特别是，前一篇论文确定了关键的前兆和物理见解，事后看来，这些前兆和物理见解与上述后来的发展密切相关。\n\n在这里，我们以相当教学的方式回顾这些关键问题的基本特征，通过详细考虑两个指导性示例，可以轻松地追踪和绘制特征向量中不连续性的起源，并且可以完全确定相关 Wannier 函数的空间衰减率。为了使该分析尽可能完整，平等地考虑两种情况，一种是非相互作用费米子，一种是相互作用费米子。", "authors": [{"name": "Marcello Calvanese Strinati"}, {"name": "Giancarlo Calvanese Strinati"}], "featured_authors": [{"name": "Marcello Calvanese Strinati"}, {"name": "Giancarlo Calvanese Strinati"}], "author_count": 2}, {"id": "2603.26505", "category": "cond-mat", "title": "Efficient evaluation of the $k$-space second Chern number in four dimensions", "abstract": "We propose an efficient numerical method to compute the $k$-space second Chern number in four-dimensional (4D) topological systems. Our approach employs an adaptive mesh refinement scheme to evaluate the Brillouin-zone integral, which automatically increases the grid density in regions where the Berry curvature is sharply peaked. We compare our method with the 4D lattice-gauge extension of the Fukui-Hatsugai-Suzuki method and a direct uniform grid integration scheme. Compared with these approaches, our method (i) achieves the same accuracy with substantially fewer diagonalizations, and thus runs faster; (ii) requires minimal memory to execute, enabling calculations for larger systems; and (iii) remains accurate even near topological phase transitions where conventional methods often face challenges. These results demonstrate that the adaptive subdivision strategy is a practical and powerful tool for calculating the $k$-space second Chern number.", "url": "https://arxiv.org/abs/2603.26505", "type": "理论+数值", "summary": "我们提出了一种有效的数值方法来计算四维 (4D) 拓扑系统中的 $k$ 空间第二个陈数。我们的方法采用自适应网格细化方案来评估布里渊区积分，该方案会自动增加贝里曲率急剧达到峰值的区域的网格密度。我们将我们的方法与 Fukui-Hatsugai-Suzuki 方法的 4D 晶格规范扩展和直接均匀网格积分方案进行比较。与这些方法相比，我们的方法（i）以更少的对角化实现了相同的精度，因此运行速度更快； (ii) 需要最少的内存来执行，从而能够为更大的系统进行计算； (iii) 即使在传统方法经常面临挑战的拓扑相变附近也能保持准确。这些结果表明，自适应细分策略是计算 $k$ 空间第二陈数的实用且强大的工具。", "authors": [{"name": "Xiang Liu"}, {"name": "Xiao-Xia Yi"}, {"name": "Zheng-Rong Liu"}, {"name": "Rui Chen"}, {"name": "Bin Zhou"}], "featured_authors": [{"name": "Xiang Liu"}, {"name": "Xiao-Xia Yi"}, {"name": "Zheng-Rong Liu"}, {"name": "Rui Chen"}, {"name": "Bin Zhou"}], "author_count": 5}, {"id": "2603.26563", "category": "cond-mat", "title": "Mean-field theory of the Stribeck effect", "abstract": "We present a theoretical analysis of frictional transitions along the Stribeck curve for rough elastic contacts lubricated by a Newtonian fluid. Building on the mean-field framework of Persson and Scaraggi (J. Phys.: Condens. Matter 21 (2009) 185002), we formulate a minimal elastohydrodynamic model that couples contact mechanics and lubrication through a homogenized pressure decomposition. Dimensional analysis reveals three independent dimensionless parameters governing the frictional response, which correspond to a dimensionless speed, normal load, and surface roughness. Using asymptotic expansions, we first characterize the boundary and hydrodynamic lubrication regimes, which arise naturally as the quasistatic and smooth-surface limits of the model. In both limits, the contact morphology converges toward Hertzian contact in the regime of large elastic deformation, with boundary layers regularizing the separation profile at the edge of the contact zone. We then analyze the mixed lubrication regime and derive asymptotic expressions for the friction coefficient in the low- and high-speed limits. At high speeds, friction decomposes into a viscous contribution and a residual contact term, leading to a roughness- and load-dependent criterion for the transition to hydrodynamic lubrication that departs from constant-{\\Lambda} ratio theories. At low speeds, friction reduction results from the progressive redistribution of the applied load between asperity contact and hydrodynamic pressure, yielding a characteristic transition speed from boundary to mixed lubrication. These results are summarized in a phase diagram that generalizes the classical Stribeck curve to a multidimensional parameter space.", "url": "https://arxiv.org/abs/2603.26563", "type": "理论+数值", "summary": "我们对牛顿流体润滑的粗糙弹性接触沿 Stribeck 曲线的摩擦转变进行了理论分析。基于 Persson 和 Scaraggi 的平均场框架（J. Phys.: Condens. Matter 21 (2009) 185002），我们制定了一个最小弹流体动力学模型，通过均匀压力分解将接触力学和润滑耦合起来。量纲分析揭示了控制摩擦响应的三个独立的无量纲参数，它们对应于无量纲速度、法向载荷和表面粗糙度。使用渐近展开，我们首先描述边界和流体动力润滑状态，这些状态自然出现为模型的准静态和光滑表面极限。在这两个极限下，接触形态在大弹性变形的情况下向赫兹接触收敛，边界层使接触区边缘的分离轮廓规则化。然后，我们分析混合润滑状态并推导出低速和高速极限下摩擦系数的渐近表达式。\n\n在高速下，摩擦分解为粘性贡献和残余接触项，从而导致向流体动力润滑过渡的粗糙度和负载相关标准，该标准背离了恒定的{\\Lambda}比率理论。在低速时，摩擦减少是由于粗糙接触和流体动压之间所施加的载荷逐渐重新分布而产生的，从而产生从边界润滑到混合润滑的特征过渡速度。这些结果总结在相图中，将经典的 Stribeck 曲线推广到多维参数空间。", "authors": [{"name": "Vincent Bertin"}, {"name": "Olivier Pouliquen"}], "featured_authors": [{"name": "Vincent Bertin"}, {"name": "Olivier Pouliquen"}], "author_count": 2}, {"id": "2603.26634", "category": "cond-mat", "title": "Refining hydrogen positions in α-FeOOH through combined neutron diffraction and computational techniques", "abstract": "The hydrogen positions and magnetic structure of goethite $\\alpha$-FeOOH, a key component of iron rust, were examined through neutron diffraction. All symmetry-allowed magnetic structures under the space group $Pnma$ with the magnetic wavevector $\\vec{q}_{\\rm m} = (0, 0, 0)$ r.l.u. were analysed using irreducible representation and magnetic space group approaches. The magnetic moments aligned along the $b$-axis form antiferromagnetic spin arrangements, as reproduced by first-principles calculations. Accurately determining the hydrogen positions is crucial for understanding the mechanism of catalytic reduction of CO$_2$ in $\\alpha$-FeOOH. These positions were precisely identified through diffraction and calculations, highlighting the effectiveness of using both methods for undeuterated compounds.", "url": "https://arxiv.org/abs/2603.26634", "type": "理论+数值", "summary": "通过中子衍射研究了铁锈的关键成分针铁矿 $\\alpha$-FeOOH 的氢位置和磁性结构。空间群 $Pnma$ 下所有允许对称的磁结构，其磁波矢量 $\\vec{q}_{\\rm m} = (0, 0, 0)$ r.l.u。使用不可约表示和磁性空间群方法进行分析。沿 $b$ 轴排列的磁矩形成反铁磁自旋排列，如第一性原理计算所重现。准确确定氢的位置对于理解$\\alpha$-FeOOH中CO$_2$的催化还原机制至关重要。通过衍射和计算精确识别了这些位置，突出了使用这两种方法对未氘化化合物的有效性。", "authors": [{"name": "Yusuke Nambu"}, {"name": "Akihide Kuwabara"}, {"name": "Masahiro Kawamata"}, {"name": "Seira Mori"}, {"name": "Megumi Okazaki"}, {"name": "Kazuhiko Maeda"}], "featured_authors": [{"name": "Yusuke Nambu"}, {"name": "Akihide Kuwabara"}, {"name": "Masahiro Kawamata"}, {"name": "Seira Mori"}, {"name": "Megumi Okazaki"}, {"name": "Kazuhiko Maeda"}], "author_count": 6}, {"id": "2603.25782", "category": "hep-th", "title": "Negative energies and the breakdown of bulk geometry", "abstract": "One central question in quantum gravity is to understand how and why predictions from semiclassical gravity can break down in regimes with low spacetime curvature. One diagnostic of such a breakdown is that states which are orthonormal at the semiclassical level can receive large corrections to their inner products from quantum fluctuations. We study this effect by examining inner products in pure 2D JT gravity. Previous work showed that black hole states with long interiors exhibit a breakdown at length scales of order $e^{S_0}$, where $S_0$ is a parameter analogous to $1/G_N$ in higher dimensions. This breakdown is caused by the discreteness of the spectrum of the dual boundary random matrix theory. We show that the full sum over quantum fluctuations indicates a more dramatic breakdown at parametrically shorter lengths of order $e^{S_0/3}$. In the dual boundary description, these corrections arise from negative energy states appearing in rare members of the random matrix ensemble. These results demonstrate that non-perturbative effects can invalidate the semiclassical description at much smaller length scales than previously expected, providing a new mechanism for the breakdown of effective gravitational theories.", "url": "https://arxiv.org/abs/2603.25782", "type": "理论", "summary": "量子引力的一个核心问题是理解半经典引力的预测如何以及为何在低时空曲率的情况下会崩溃。这种崩溃的一个诊断是，在半经典水平上正交的状态可以从量子涨落中对其内积进行较大的修正。我们通过检查纯 2D JT 重力中的内积来研究这种效应。先前的工作表明，具有长内部的黑洞态在 $e^{S_0}$ 量级的长度尺度上表现出崩溃，其中 $S_0$ 是类似于更高维度中的 $1/G_N$ 的参数。这种崩溃是由对偶边界随机矩阵理论谱的离散性引起的。我们表明，量子涨落的总和表明在参数较短的阶数 $e^{S_0/3}$ 下会发生更剧烈的崩溃。在对偶边界描述中，这些修正是由出现在随机矩阵系综的稀有成员中的负能态引起的。\n\n这些结果表明，非微扰效应可以在比之前预期小得多的长度尺度上使半经典描述失效，从而为有效引力理论的崩溃提供了一种新机制。", "authors": [{"name": "John Preskill"}, {"name": "Mykhaylo Usatyuk"}, {"name": "Shreya Vardhan"}], "featured_authors": [{"name": "John Preskill"}, {"name": "Mykhaylo Usatyuk"}, {"name": "Shreya Vardhan"}], "author_count": 3}, {"id": "2603.25786", "category": "hep-th", "title": "Hořava-Witten theory on ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ as type 0 orientifold", "abstract": "We investigate dualities between ${\\mathbf{Z}}_2$ quotients of recently proposed compactifications of M-theory on `quantum geometries' of the form ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ and 10d orientifolds of type 0A and 0B string theories. In particular, we relate the Hořava-Witten theory on ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ to a 0B orientifold with gauge group $SO(16)^4$. The resulting dictionary provides a geometric explanation for characteristic features of the 0B orientifold, such as the doubling of the gauge group, while the perturbative spectrum of the 0B orientifold indicates the emergence of novel M-theoretic degrees of freedom associated with the junction point. The 0B orientifold further reveals the existence of two variants of the theory on ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$, corresponding to equal vs opposite (i.e., standard vs Fabinger-Hořava) orientations of the $E_8$ walls. We also analyze additional 0A and 0B orientifolds whose open string sectors do not arise from higher-dimensional gauge fields in M-theory and whose microscopic interpretation remains an open problem.", "url": "https://arxiv.org/abs/2603.25786", "type": "理论", "summary": "我们研究了最近提出的 ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ 形式的“量子几何”M 理论紧化的 ${\\mathbf{Z}}_2$ 商与 0A 和 0B 型弦理论的 10d 定向折叠之间的对偶性。特别是，我们将 ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ 上的 Hořava-Witten 理论与规范组 $SO(16)^4$ 的 0B 东方褶皱联系起来。由此产生的字典为 0B 东方褶皱的特征提供了几何解释，例如规范组的加倍，而 0B 东方褶皱的扰动谱表明与接合点相关的新颖 M 理论自由度的出现。 0B orientifold 进一步揭示了 ${\\mathbf{S}}^1\\vee{\\mathbf{S}}^1$ 理论的两个变体的存在，分别对应于 $E_8$ 墙的相等方向与相反方向（即标准方向与 Fabinger-Hořava 方向）。我们还分析了其他 0A 和 0B 东方褶皱，其开放弦扇区并非由 M 理论中的高维规范场产生，其微观解释仍然是一个悬而未决的问题。", "authors": [{"name": "Chiara Altavista"}, {"name": "Edoardo Anastasi"}, {"name": "Salvatore Raucci"}, {"name": "Angel M. Uranga"}, {"name": "Chuying Wang"}], "featured_authors": [{"name": "Chiara Altavista"}, {"name": "Edoardo Anastasi"}, {"name": "Salvatore Raucci"}, {"name": "Angel M. Uranga"}, {"name": "Chuying Wang"}], "author_count": 5}, {"id": "2603.25797", "category": "hep-th", "title": "Dark energy from string theory: an introductory review", "abstract": "Dark energy, the main constituent in our expanding universe, responsible for its acceleration, is currently observed at unprecedented precision by different experiments. While several cosmological models can fit this latest data, deriving some of them from string theory would provide a valuable theoretical prior, with information on the nature of dark energy. This article reviews the efforts towards such a derivation, namely the options from string theory to get a cosmological constant (a de Sitter solution) or a dynamical dark energy (via a quintessence model). After a brief historical perspective, we first review proven or conjectured constraints in getting dark energy from string theory, in classical or asymptotic regimes. Circumventing such obstructions, by changing regime or ansatz, one can try to construct a de Sitter solution: we present a long list of such attempts, and the difficulties encountered. Among them, we discuss in detail efforts towards classical de Sitter solutions. Then, we review quintessence from string theory, focusing on single-field exponential models. Related topics are discussed, including the coupling to matter, the comparison to observational data, and the absence of a cosmological event horizon.", "url": "https://arxiv.org/abs/2603.25797", "type": "理论", "summary": "暗能量是我们不断膨胀的宇宙的主要成分，负责其加速，目前通过不同的实验以前所未有的精度观察到。虽然几个宇宙学模型可以拟合这些最新数据，但从弦理论中推导出其中一些模型将提供有价值的理论先验，包括有关暗能量本质的信息。本文回顾了这种推导的努力，即从弦理论中获得宇宙常数（德西特解）或动态暗能量（通过精髓模型）的选择。在简要的历史回顾之后，我们首先回顾在经典或渐近体系中从弦理论获取暗能量的已证明或猜想的限制。通过改变政权或安萨茨来规避这些障碍，人们可以尝试构建德西特解决方案：我们列出了一长串此类尝试以及遇到的困难。其中，我们详细讨论了经典德西特解决方案的努力。然后，我们回顾弦理论的精髓，重点关注单场指数模型。\n\n讨论了相关主题，包括与物质的耦合、与观测数据的比较以及宇宙事件视界的缺失。", "authors": [{"name": "David Andriot"}], "featured_authors": [{"name": "David Andriot"}], "author_count": 1}, {"id": "2603.25873", "category": "hep-th", "title": "Modular Theory and the Bell-CHSH inequality in relativistic scalar Quantum Field Theory", "abstract": "The Tomita-Takesaki modular theory is employed to discuss the Bell-CHSH inequality in wedge regions. By using the Bisognano-Wichmann results, the construction of a set of wedge localized vectors in the one-particle Hilbert space of a relativistic massive scalar field in $1+1$ dimensions is devised to establish whether violations of the Bell-CHSH inequality might occur for different choices of Bell's operators. In particular, the construction of the wedge localized vectors employed in the seminal work by Summers-Werner is scrutinized and applied to Weyl and other operators. We also outline a possible path towards the saturation of Tsirelson's bound.", "url": "https://arxiv.org/abs/2603.25873", "type": "理论", "summary": "采用Tomita-Takesaki模理论讨论楔形区域中的Bell-CHSH不等式。通过使用 Bisognano-Wichmann 结果，设计了在 $1+1$ 维相对论大规模标量场的单粒子希尔伯特空间中构造一组楔形局域向量，以确定贝尔算子的不同选择是否可能会违反 Bell-CHSH 不等式。特别是，Summers-Werner 在开创性工作中使用的楔形局部向量的构造经过了仔细审查，并应用于 Weyl 和其他算子。我们还概述了 Tsirelson 界限饱和的可能路径。", "authors": [{"name": "J. G. A. Caribé"}, {"name": "M. S. Guimaraes"}, {"name": "I. Roditi"}, {"name": "S. P. Sorella"}], "featured_authors": [{"name": "J. G. A. Caribé"}, {"name": "M. S. Guimaraes"}, {"name": "I. Roditi"}, {"name": "S. P. Sorella"}], "author_count": 4}, {"id": "2603.25962", "category": "hep-th", "title": "Efficient computation of the N-th rank QED polarization tensor: Universal worldline structure of form factors", "abstract": "We derived in arXiv:2206.04188 arXiv:2211.15712 a compact expression for the $N$-th rank QED polarization tensor $\\Pi_{\\mu_1\\cdots \\mu_N}(k_1,\\cdots,k_N)$ in a $(0+1)$-dimensional worldline framework. This fully off-shell object, a function of $N$ external photon four-momenta, is a key ingredient in high-order computations of cusp anomalous dimensions and lepton anomalous magnetic moments. We demonstrate here that $\\Pi_{\\mu_1\\cdots \\mu_N}$ can further be expressed simply in terms of a small number of independent ``head\" form factors (each representing $(N-1)!/2$ Feynman diagrams) which have a universal structure in terms of sums over fermion Green functions and (propertime derivative of) their boson worldline superpartners. This worldline representation bypasses explicit Wick contractions and avoids tensor reductions to scalar loop integrals à la Passarino and Veltman, order by order in perturbation theory. We give explicit expressions for the $4$-th and $6$-th rank head form factors and provide a computer script generalizing these results to arbitrary $N$ external photons. The multiplicity of heads, and their growth with $N$, can be understood in terms of orbits of the permutation group. We employ the Burnside-Cauchy-Frobenius lemma to show that it scales as $e^{N-1}/\\sqrt{N}$ terms as opposed to the $e^{N-1} N!/\\sqrt{N}$ terms in conventional perturbation theory. We reexpress worldline parameter integrals that define the $4$-th rank heads as Feynman parameter integrals to reproduce the seminal results by Karplus and Neuman for the on-shell light-by-light amplitude and extend these to the fully off-shell case in massless QED employing a tailored integration-by-parts procedure. In a follow-up paper, we will discuss the direct computation of worldline integrals, potentially providing a further $N!$ advantage relative to Feynman diagram computations at high orders in perturbation theory.", "url": "https://arxiv.org/abs/2603.25962", "type": "理论", "summary": "我们在 arXiv:2206.04188 arXiv:2211.15712 中导出了 $(0+1)$ 维世界线框架中 $N$ 阶 QED 偏振张量 $\\Pi_{\\mu_1\\cdots \\mu_N}(k_1,\\cdots,k_N)$ 的紧凑表达式。这个完全离壳的物体是 $N$ 外部光子四动量的函数，是尖点异常尺寸和轻子异常磁矩高阶计算的关键成分。我们在这里证明 $\\Pi_{\\mu_1\\cdots \\mu_N}$ 可以进一步简单地用少量独立的“头”形状因子（每个代表 $(N-1)!/2$ 费曼图）来表达，这些形状因子在费米子格林函数及其玻色子世界线超级伙伴（的适当时间导数）的和方面具有通用结构。这种世界线表示绕过了显式的威克收缩并避免了张量约简到标量环积分 à la Passarino 和 Veltman，在微扰理论中按顺序给出了第 4 美元和第 6 美元的头部形状因子的显式表达式，并提供了将这些结果推广到任意 $N$ 外部光子的计算机脚本。\n\n头的多重性，以及它们随 $N$ 的增长，可以用排列群的轨道来理解。我们采用 Burnside-Cauchy-Frobenius 引理来证明它的缩放比例为 $e^{N-1}/\\sqrt{N}$ 项，而不是传统微扰理论中的 $e^{N-1} N!/\\sqrt{N}$ 项。我们重新表达世界线参数积分，将第 4$ 级头定义为费曼参数积分，以重现 Karplus 和 Neuman 对于壳内光逐光振幅的开创性结果，并将这些结果扩展到无质量 QED 中的完全离壳情况，采用定制的分部分积分程序。在后续论文中，我们将讨论世界线积分的直接计算，相对于微扰理论中高阶费曼图计算，可能会提供进一步的 $N!$ 优势。", "authors": [{"name": "Xabier Feal"}, {"name": "Andrey Tarasov"}, {"name": "Raju Venugopalan"}], "featured_authors": [{"name": "Xabier Feal"}, {"name": "Andrey Tarasov"}, {"name": "Raju Venugopalan"}], "author_count": 3}, {"id": "2603.25990", "category": "hep-th", "title": "Implication of dressed form of relational observable on von Neumann algebra", "abstract": "In quantum gravity, physically meaningful operator is required to be invariant under the diffeomorphisms. Such gauge invariant operator is typically given by the relational observable, the operator localized in relation to some background states. We point out that the relational observable can be comprehensively written in the form of the dressed operator. For the background having boundary where the diffeomorphisms are not gauged, we can use the gravitational Wilson line for dressing, then the relational observable is nonlocal. In contrast, when the background breaks some isometries, as can be found in quasi-de Sitter space, dressing can be local, which is a kind of Stückelberg mechanism. Since dressing resembles the outer automorphism in the von Neumann algebra, we may investigate the algebraic structure of the background by considering the dressed form of the relational observable. From this, we can understand that quasi-de Sitter space is described by the Type II$_\\infty$ algebra where the trace diverges in the decoupling limit of gravity. It is different from the Type II$_1$ algebra of de Sitter space where the finite size of trace can be defined in the same limit. This shows that the isometry preserving and breaking backgrounds are quite different in the algebraic structure no matter how small the breaking effect is.", "url": "https://arxiv.org/abs/2603.25990", "type": "理论", "summary": "在量子引力中，有物理意义的算符要求在微分同胚下保持不变。这种规范不变算子通常由关系可观测量给出，该算子相对于某些背景状态进行局部化。我们指出关系可观测量可以综合地写成修饰算子的形式。对于有边界且未测量微分同胚的背景，可以使用引力威尔逊线进行修整，则关系观测量是非局部的。相反，当背景打破某些等距时（如准德西特空间中所示），修饰可以是局部的，这是一种斯图克伯格机制。由于修饰类似于冯·诺依曼代数中的外自同构，因此我们可以通过考虑关系可观测量的修饰形式来研究背景的代数结构。由此，我们可以理解，拟德西特空间是用II型$_\\infty$代数描述的，其中迹在重力解耦极限处发散。它与德西特空间的 II$_1$ 代数不同，在德西特空间中，迹线的有限大小可以在相同的极限内定义。\n\n这表明，无论破坏效应有多小，等距保持和破坏背景在代数结构中都有很大不同。", "authors": [{"name": "Min-Seok Seo"}], "featured_authors": [{"name": "Min-Seok Seo"}], "author_count": 1}, {"id": "2603.26051", "category": "hep-th", "title": "Quantum Channel Capacity of Traversable Wormhole", "abstract": "We formulate the Gao-Jafferis-Wall traversable wormhole protocol as a quantum channel and compute its quantum channel capacity. We show that this capacity is governed by the time derivative of an out-of-time-ordered correlator, hence by operator size growth in the holographic dual, and that its growth is bounded above by the Einstein gravity limit. The channel capacity therefore provides a natural benchmark for quantum simulations of traversable wormholes.", "url": "https://arxiv.org/abs/2603.26051", "type": "理论", "summary": "我们将Gao-Jafferis-Wall可穿越虫洞协议制定为量子通道并计算其量子通道容量。我们表明，这种能力受无序相关器的时间导数控制，因此受全息对偶中算子尺寸增长的控制，并且其增长受到爱因斯坦引力极限的限制。因此，通道容量为可穿越虫洞的量子模拟提供了一个自然的基准。", "authors": [{"name": "Jingru Lu"}, {"name": "Zhenbin Yang"}, {"name": "Jianming Zheng"}], "featured_authors": [{"name": "Jingru Lu"}, {"name": "Zhenbin Yang"}, {"name": "Jianming Zheng"}], "author_count": 3}, {"id": "2603.26070", "category": "hep-th", "title": "A Resonance in Elastic Kink-Meson Scattering", "abstract": "We analytically sum the leading bubble diagrams that contribute to the elastic scattering amplitude of a kink and a meson in the $\\phi^4$ double-well model. We find a single peak, corresponding to the unstable kink state in which the shape mode is excited twice. The peak has the usual Breit-Wigner form, and its imaginary part agrees with the shape mode decay rate found by Manton and Merabet.", "url": "https://arxiv.org/abs/2603.26070", "type": "理论", "summary": "我们对 $\\phi^4$ 双井模型中扭结和介子的弹性散射振幅有贡献的主要气泡图进行了分析求和。我们发现一个单峰，对应于形状模式被激发两次的不稳定扭结状态。该峰具有通常的 Breit-Wigner 形式，其虚部与 Manton 和 Merabet 发现的形状模式衰减率一致。", "authors": [{"name": "Bilguun Bayarsaikhan"}, {"name": "Jarah Evslin"}], "featured_authors": [{"name": "Bilguun Bayarsaikhan"}, {"name": "Jarah Evslin"}], "author_count": 2}, {"id": "2603.26090", "category": "hep-th", "title": "Cosmological Correlators Using Tensor Networks", "abstract": "We develop a nonperturbative tensor-network framework for computing cosmological correlators in de Sitter space and use it to test the proposal that suitably defined in-in correlators can be obtained from an in-out formalism by gluing the expanding and contracting Poincaré patches. Focusing on interacting $1+1$-dimensional $\\phi^4$ theory, we formulate finite-time lattice observables using Matrix Product State (MPS) techniques and analyze the regulator subtleties associated with the singular behavior near the patching surface. Within this regulated framework, we find controlled nonperturbative evidence for the proposed relation between in-in and in-out correlators in several examples. We also find suggestive evidence that the perturbative obstructions present for sufficiently light fields can be softened nonperturbatively, albeit in a regime of substantially larger entanglement. A central outcome of our analysis is an entanglement-based picture of the computation: for in-in evolution the entanglement remains modest and can decrease toward late times, whereas in the patched in-out set-up it grows significantly after the gluing slice. Thus, although the in-out formalism is perturbatively economical, the in-in formulation is numerically more favorable. We briefly discuss how the same strategy extends to low-angular-momentum sectors in $3+1$ dimensions, and why regimes of rapid entanglement growth may eventually motivate quantum-computing implementations.", "url": "https://arxiv.org/abs/2603.26090", "type": "理论", "summary": "我们开发了一个非微扰张量网络框架，用于计算德西特空间中的宇宙学相关器，并用它来测试通过粘合扩展和收缩庞加莱补丁，可以从输入输出形式主义中获得适当定义的输入相关器的提议。专注于相互作用的 $1+1$ 维 $\\phi^4$ 理论，我们使用矩阵乘积状态 (MPS) 技术制定有限时间晶格可观测量，并分析与修补表面附近奇异行为相关的调节器微妙之处。在这个监管框架内，我们在几个例子中找到了关于输入和输入输出相关器之间所提出的关系的受控非扰动证据。我们还发现了有启发性的证据，表明足够光场中存在的微扰障碍可以被非微扰地软化，尽管是在更大的纠缠状态下。我们分析的一个核心结果是基于纠缠的计算图：对于 in-in 进化，纠缠仍然是适度的，并且可以在后期减少，而在修补的 in-out 设置中，它在粘合切片之后显着增长。\n\n因此，尽管进出形式主义非常经济，但进进公式在数字上更有利。我们简要讨论相同的策略如何扩展到 $3+1$ 维度的低角动量部门，以及为什么快速纠缠增长的机制可能最终激发量子计算的实现。", "authors": [{"name": "Ujjwal Basumatary"}, {"name": "Aninda Sinha"}, {"name": "Xinan Zhou"}], "featured_authors": [{"name": "Ujjwal Basumatary"}, {"name": "Aninda Sinha"}, {"name": "Xinan Zhou"}], "author_count": 3}, {"id": "2603.26459", "category": "hep-th", "title": "EVERY CFT$_3$ HAS AN $ \\mathcal{L}_Λw_{1+\\infty}$ SYMMETRY", "abstract": "Recently a one-parameter family of deformed $ \\mathcal{L} w_{1+\\infty}$ soft symmetry algebras, denoted $ \\mathcal{L}_{\\Lambda}w_{1+\\infty}$, acting on tree-level gravitational theories in AdS$_4$ has been discovered. Here we show that all CFT$_3$s, including those dual to quantum gravity on AdS$_4$, admit an $\\mathcal{L}_{\\Lambda}w_{1+\\infty}$ action generated by the ANEC operator, its conformal descendants and their commutators. This extends the previous tree-level results on these soft symmetries to the strongly-coupled quantum regime.", "url": "https://arxiv.org/abs/2603.26459", "type": "理论", "summary": "最近发现了变形 $ \\mathcal{L} w_{1+\\infty}$ 软对称代数的单参数族，表示为 $ \\mathcal{L}_{\\Lambda}w_{1+\\infty}$，作用于 AdS$_4$ 中的树级引力理论。在这里，我们表明所有 CFT$_3$s，包括 AdS$_4$ 上的对偶量子引力，承认由 ANEC 算子、其共形后代及其换向器生成的 $\\mathcal{L}_{\\Lambda}w_{1+\\infty}$ 作用。这将先前关于这些软对称性的树级结果扩展到强耦合量子体系。", "authors": [{"name": "Andrew Strominger"}, {"name": "Hongji Wei"}], "featured_authors": [{"name": "Andrew Strominger"}, {"name": "Hongji Wei"}], "author_count": 2}, {"id": "2603.26495", "category": "hep-th", "title": "Electromagnetic radiation mediated by topological surface states", "abstract": "We study electromagnetic radiation from classical sources near a planar interface separating a topological and a trivial insulator, modeled within axion electrodynamics. The system features a piecewise constant $\\theta$-term that encodes the magnetoelectric response of topological surface states. Treating this coupling perturbatively, we derive analytical corrections to the standard Liénard-Wiechert potentials and obtain modified radiation fields in the far zone. As applications, we analyze the emission from linear antennas and the bremsstrahlung radiation of accelerated charges near the interface. For antennas, the surface Hall response breaks axial symmetry and produces azimuthal modulations that grow with the electrical length, leading to distinct scaling behaviors in the total and angular radiated power. {For accelerated charges, the emitted intensity is uniformly reduced by a factor $1 - (\\sigma_{\\mathrm{Hall}} / 2\\epsilon v)^2$, which we interpret as a process-specific attenuation of the radiative strength due to interference with its image magnetic monopole inside the topological medium.} These results reveal how topological surface states mediate measurable modifications to classical radiation, establishing a link between axion electrodynamics, topological phases, and field theories with spatially varying couplings.", "url": "https://arxiv.org/abs/2603.26495", "type": "理论", "summary": "我们研究了分离拓扑绝缘体和普通绝缘体的平面界面附近经典源的电磁辐射，并在轴子电动力学中建模。该系统具有分段常数 $\\theta$ 项，用于编码拓扑表面态的磁电响应。通过扰动处理这种耦合，我们得出了对标准 Liénard-Wiechert 势的分析修正，并获得了远区的修正辐射场。作为应用，我们分析了线性天线的发射和界面附近加速电荷的轫致辐射。对于天线，表面霍尔响应打破轴对称性并产生随电长度增长的方位角调制，从而导致总辐射功率和角辐射功率出现明显的缩放行为。\n\n{对于加速电荷，发射强度均匀地降低$1 - (\\sigma_{\\mathrm{Hall}} / 2\\epsilon v)^2$，我们将其解释为由于拓扑介质内的图像磁单极子的干扰而导致的辐射强度的特定过程衰减。}这些结果揭示了拓扑表面状态如何介导对经典辐射的可测量的修改，在轴子电动力学、拓扑相和场之间建立了联系具有空间变化耦合的理论。", "authors": [{"name": "M. Ibarra-Meneses"}, {"name": "A. Martín-Ruiz"}], "featured_authors": [{"name": "M. Ibarra-Meneses"}, {"name": "A. Martín-Ruiz"}], "author_count": 2}, {"id": "2603.26529", "category": "hep-th", "title": "Complex bumblebee model", "abstract": "We formulate a renormalizable complex extension of the bumblebee theory in which the bumblebee field is promoted to a complex one and coupled to an Abelian gauge sector. Besides the minimal gauge covariant interaction, the model includes a longitudinal kinetic term controlled by a dimensionless parameter $g_l$ and a non-minimal magnetic-type coupling $g_m$ between the complex bumblebee and the photon. Using dimensional regularization and minimal subtraction, we determine the one-loop UV divergences of the two-, three-, and four-point functions relevant to the renormalization of the gauge, longitudinal, and quartic sectors. We obtain the corresponding counterterms and derive the one-loop renormalization-group functions for $e$, $g_l$, $g_m$, and the bumblebee self-couplings $\\lambda$ and $\\tilde\\lambda$. Motivated by the known gauge- and field-reparametrization subtleties of the conventional Coleman--W
