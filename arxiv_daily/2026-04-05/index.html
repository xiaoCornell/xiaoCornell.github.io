  <style>
    :root {

    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2604.01227", "category": "cond-mat", "title": "On topological frustration and graphene magnonics", "abstract": "The graph-theoretic topological frustration is a peculiar situation on a finite piece of the honeycomb lattice that prevents a full pairwise coupling of the lattice sites via nearest neighbor links, even when the total number of sites is an even number. This type of frustration is inherent for organic molecules that are classified as concealed non-Kekulean hydrocarbons, representing peculiar diradicals. Here we show that this topological frustration persists in 2D systems based on honeycomb lattice. Such systems exhibit fully flat electronic energy bands located at the Fermi level. Therefore, 2D ultimately flat bands can be systematically and predictably constructed for graphene monolayer nanomeshes. These systems are prone to antiferromagnetic ordering and hybrid spin-wave excitations mixing weak ferromagnetic and strong antiferromagnetic features, which could pave the way towards low-power, compact, and ultrafast organic spintronics with near room-temperature operation.", "url": "https://arxiv.org/abs/2604.01227", "type": "理论", "summary": "图论拓扑挫败是蜂窝晶格有限块上的一种特殊情况，即使当站点总数为偶数时，它也会阻止通过最近邻链接完全成对地耦合网格站点。这种挫败感是有机分子所固有的，这些有机分子被归类为隐藏的非凯库列碳氢化合物，代表着特殊的双自由基。在这里，我们表明这种拓扑挫败在基于蜂窝晶格的二维系统中持续存在。此类系统表现出位于费米能级的完全平坦的电子能带。因此，可以系统地、可预测地为石墨烯单层纳米网构建二维最终平坦带。这些系统易于产生反铁磁有序和混合弱铁磁和强反铁磁特征的混合自旋波激发，这可以为低功耗、紧凑和超快有机自旋电子学以及近室温操作铺平道路。", "authors": [{"name": "Vasil A. Saroka"}], "featured_authors": [{"name": "Vasil A. Saroka"}], "author_count": 1}, {"id": "2604.01285", "category": "cond-mat", "title": "Temperature and integrability-breaking correspondence via adiabatic transformations", "abstract": "We reveal a correspondence between temperature and integrability-breaking in classical and quantum many-body systems through the lens of geometry and adiabatic transformations. Decreasing the temperature, obtained in a standard way through the derivative of entropy with respect to energy, steers the system towards an integrable point despite strong integrability-breaking interactions. Auto-correlation functions of local observables exhibit slow relaxation dynamics, which violates ergodicity on the approach to this integrable point. Subsequently, the average fidelity susceptibility of stationary states satisfies scaling relations near the integrable point, in close analogy with continuous phase transitions. We further find that the dynamical exponent encompassing relaxation can be different in the quantum and classical models, depending on dimension of the systems. Collectively, our results establish temperature as a tunable control parameter for chaos and puts it on equal footing with integrability-breaking perturbations.", "url": "https://arxiv.org/abs/2604.01285", "type": "理论", "summary": "我们通过几何和绝热变换的视角揭示了经典和量子多体系统中温度与可积性破坏之间的对应关系。尽管存在强烈的破坏可积性的相互作用，但通过熵对能量的导数以标准方式获得的温度降低可以引导系统趋向可积点。局部可观测量的自相关函数表现出缓慢的松弛动力学，这违反了接近该可积点的遍历性。随后，稳态的平均保真度敏感性在可积点附近满足比例关系，与连续相变非常相似。我们进一步发现，根据系统的维度，包含弛豫的动力学指数在量子模型和经典模型中可能不同。总的来说，我们的结果将温度确立为混沌的可调控制参数，并将其与破坏可积性的扰动置于同等地位。", "authors": [{"name": "Hyeongjin Kim"}, {"name": "Souvik Bandyopadhyay"}, {"name": "Anatoli Polkovnikov"}], "featured_authors": [{"name": "Hyeongjin Kim"}, {"name": "Souvik Bandyopadhyay"}, {"name": "Anatoli Polkovnikov"}], "author_count": 3}, {"id": "2604.01291", "category": "cond-mat", "title": "Dissipative Floquet engineering of gapped many-body phases using thermal baths", "abstract": "Floquet engineering, the control of a quantum system by means of time-periodic driving, allows to modify the properties of the system so that it becomes described by an approximate effective time-independent Hamiltonian. However, in the presence of interactions the stabilization of interesting many-body ground states of such effective Hamiltonians is possible only on a certain time scale, beyond which Floquet heating sets in, as it results from unwanted driving induced resonant excitation. Moreover, already the preparation of such states is challenged by excitations due to imperfect adiabatic dynamics, especially when a phase transition has to be passed. Here, we propose a general dissipative strategy for the preparation and stabilization of effective ground states that are protected by an energy gap. Our approach relies on coupling the driven system to a thermal bath, the properties of which are chosen so that it both suppresses Floquet heating and guides the system into a non-equilibrium steady state with a large occupation of the effective ground-state, but generally non-thermal occupations of excited states of the effective Hamiltonian. We use the Floquet-Born-Markov master equation to verify the proposed strategy for the example of a strongly driven Bose-Hubbard chain with an effective gapped Mott-insulator ground state.", "url": "https://arxiv.org/abs/2604.01291", "type": "理论", "summary": "Floquet 工程是通过时间周期驱动来控制量子系统，允许修改系统的属性，使其由近似有效的时间无关哈密顿量来描述。然而，在存在相互作用的情况下，这种有效哈密顿量的有趣的多体基态的稳定只有在一定的时间尺度上才有可能，超过该时间尺度，Floquet 加热就会开始，因为它是由不需要的驱动引起的共振激发引起的。此外，由于不完美的绝热动力学，特别是当必须通过相变时，这种状态的准备已经受到激发的挑战。在这里，我们提出了一种通用耗散策略，用于准备和稳定受能隙保护的有效基态。我们的方法依赖于将驱动系统耦合到热浴，选择热浴的属性，使其既抑制 Floquet 加热，又引导系统进入非平衡稳态，大量占据有效基态，但通常非热占据有效哈密顿量的激发态。\n\n我们使用 Floquet-Born-Markov 主方程来验证所提出的策略，以具有有效间隙莫特绝缘体基态的强驱动 Bose-Hubbard 链为例。", "authors": [{"name": "Lorenz Wanckel"}, {"name": "André Eckardt"}], "featured_authors": [{"name": "Lorenz Wanckel"}, {"name": "André Eckardt"}], "author_count": 2}, {"id": "2604.01293", "category": "cond-mat", "title": "Quantum structure of the chiral vortical effect and boundary-induced vortical pumping", "abstract": "The chiral vortical effect (CVE) -- an axial current driven by rotation in chiral matter -- appears in systems ranging from relativistic fluids to Weyl semimetals, yet its quantum origin remains unclear because existing derivations are semiclassical. We present an exact quantum solution of a rotating Weyl fermion in a finite cylinder. We show that the bulk vortical response is entirely a magnetization current while the current density on the rotation axis remains finite and matches semiclassical predictions. For spin-polarized boundary conditions, we uncover an additional effect beyond the known CVE: a robust family of chiral modes that transport axial charge, $\\Delta Q=\\chi N^2\\,\\Delta\\theta/4\\pi$, under rotation by angle $\\Delta\\theta$, where $\\chi$ is the Weyl node chirality and $N$ is the number of chiral modes. The pump is independent of temperature, Fermi level and Weyl velocities, but depends on the UV-sensitive number $N$. These results establish a fully quantum picture of the CVE and reveal a boundary-enforced chiral spectral structure underlying vortical response in Weyl systems.", "url": "https://arxiv.org/abs/2604.01293", "type": "理论", "summary": "手性涡旋效应（CVE）——一种由手性物质的旋转驱动的轴向电流——出现在从相对论流体到外尔半金属的系统中，但其量子起源仍不清楚，因为现有的推导是半经典的。我们提出了有限圆柱体中旋转外尔费米子的精确量子解。我们表明，体涡旋响应完全是磁化电流，而旋转轴上的电流密度保持有限并且符合半经典预测。对于自旋极化边界条件，我们发现了已知 CVE 之外的额外效应：在旋转角度 $\\Delta\\theta$ 下传输轴向电荷的强大手性模式族 $\\Delta Q=\\chi N^2\\,\\Delta\\theta/4\\pi$，其中 $\\chi$ 是 Weyl 节点手性，$N$ 是手性模式的数量。该泵与温度、费米能级和韦尔速度无关，但取决于紫外线敏感数 $N$。这些结果建立了 CVE 的完整量子图像，并揭示了 Weyl 系统中涡旋响应背后的边界强制手性光谱结构。", "authors": [{"name": "B. Q. Song"}, {"name": "Pavan Hosur"}], "featured_authors": [{"name": "B. Q. Song"}, {"name": "Pavan Hosur"}], "author_count": 2}, {"id": "2604.01484", "category": "cond-mat", "title": "The topological gap at criticality: scaling exponent d + η, universality, and scope", "abstract": "The topological gap $\\Delta = TP_{H_1}^{real} - TP_{H_1}^{shuf}$ -- the excess $H_1$ total persistence of the majority-spin alpha complex over a density-matched null -- encodes critical correlations in spin models. We establish finite-size scaling: $\\Delta(L,T) = A L^{d+\\eta} G_-(L|t/T_c|)$, with $G_-(x) \\sim (1+x/x_0)^{-(1+\\beta/\\nu)}$. For 2D Ising, $\\alpha = 2.249 \\pm 0.038$, matching $d+\\eta = 9/4$ to $0.03\\sigma$; the $G_-$ exponent $\\gamma = 1.089 \\pm 0.077$ is consistent with $1+\\beta/\\nu = 9/8$ ($\\Delta R^2 < 10^{-5}$). For 2D Potts $q=3$ with $L$ up to 1024, $\\alpha = 2.272 \\pm 0.024$ ($0.2\\sigma$ from $d+\\eta = 2.267$), with two-term corrections to scaling ($R^2 = 0.9999$). The $G_-$ exponent $\\gamma = 1.114$ (68% CI $[1.053, 1.173]$) matches $1+\\beta/\\nu = 17/15$. Scope boundaries: the law fails for 2D Potts $q=4$ ($\\alpha = 2.347 \\pm 0.017$, $9.3\\sigma$ from $d+\\eta = 5/2$) where logarithmic corrections prevent convergence, and for raw 3D Ising ($4\\sigma$ from $d+\\eta$), but density normalization $\\Delta/|M|^{1/2}$ recovers $\\alpha = 3.06 \\pm 0.04$ ($0.6\\sigma$). The framework fails for first-order, BKT, and percolation. The criterion: $\\alpha = d+\\eta$ holds when corrections to scaling are algebraic ($\\omega > 0$) but fails when logarithmic ($\\omega \\to 0$).", "url": "https://arxiv.org/abs/2604.01484", "type": "理论+数值", "summary": "拓扑间隙 $\\Delta = TP_{H_1}^{real} - TP_{H_1}^{shuf}$ - 多数自旋 α 复合体在密度匹配零点上的剩余 $H_1$ 总持久性 - 编码自旋模型中的关键相关性。我们建立有限尺寸缩放：$\\Delta(L,T) = A L^{d+\\eta} G_-(L|t/T_c|)$，其中$G_-(x) \\sim (1+x/x_0)^{-(1+\\beta/\\nu)}$。对于 2D Ising，$\\alpha = 2.249 \\pm 0.038$，将 $d+\\eta = 9/4$ 与 $0.03\\sigma$ 匹配； $G_-$ 指数 $\\gamma = 1.089 \\pm 0.077$ 与 $1+\\beta/\\nu = 9/8$ ($\\Delta R^2 < 10^{-5}$) 一致。对于 2D Potts $q=3$，$L$ 高达 1024，$\\alpha = 2.272 \\pm 0.024$（$0.2\\sigma$ 来自 $d+\\eta = 2.267$），并对缩放进行两项修正（$R^2 = 0.9999$）。 $G_-$ 指数 $\\gamma = 1.114$ (68% CI $[1.053, 1.173]$) 匹配 $1+\\beta/\\nu = 17/15$。范围边界：对于 2D Potts $q=4$ ($\\alpha = 2.347 \\pm 0.017$, $9.3\\sigma$ from $d+\\eta = 5/2$)，该定律失效，对数校正阻止收敛；对于原始 3D Ising ($4\\sigma$ from $d+\\eta$)，但密度归一化 $\\Delta/|M|^{1/2}$ 恢复$\\alpha = 3.06 \\pm 0.04$ ($0.6\\sigma$)。该框架在一阶、BKT 和渗滤方面失败。\n\n当缩放校正是代数（$\\omega > 0$）时，标准：$\\alpha = d+\\eta$ 成立，但当对数校正（$\\omega \\to 0$）时失败。", "authors": [{"name": "Matthew Loftus"}], "featured_authors": [{"name": "Matthew Loftus"}], "author_count": 1}, {"id": "2604.01530", "category": "cond-mat", "title": "Insulator-to-Metal Transitions Driven by Quantized Formal Polarization Mismatch", "abstract": "We propose a mechanism for insulator-to-metal (IM) transitions driven by the mismatch of quantized formal polarization (QFP), a symmetry-protected bulk invariant. For a material with a low-symmetry insulating phase and a high-symmetry phase that allow distinct QFPs, any continuous path connecting them while preserving the symmetry of the low-symmetry phase must inevitably pass through an IM transition. The reason is that QFP remains invariant along any gapped symmetry-preserving evolution, whereas the high-symmetry phase requires a different QFP, which can only be accommodated by gap closing. First-principles calculations on two representative systems, two-dimensional InPS$_3$ and three-dimensional CdBiO$_3$, confirm this mechanism. Our results establish QFP mismatch as a general symmetry constraint on phase evolution and reveal a new route to symmetry-driven IM transitions in high-symmetry materials.", "url": "https://arxiv.org/abs/2604.01530", "type": "理论+数值", "summary": "我们提出了一种由量子化形式极化（QFP）（一种对称保护的体不变量）的不匹配驱动的绝缘体到金属（IM）转变的机制。对于具有低对称性绝缘相和高对称性相且允许不同 QFP 的材料，在保持低对称性相对称性的同时连接它们的任何连续路径都必须不可避免地经过 IM 转变。原因是 QFP 在任何带隙对称性保持演化过程中保持不变，而高对称性阶段需要不同的 QFP，而这只能通过带隙闭合来适应。对两个代表性系统二维 InPS$_3$ 和三维 CdBiO$_3$ 的第一性原理计算证实了这一机制。我们的结果将 QFP 失配确立为相演化的一般对称约束，并揭示了高对称材料中对称驱动的 IM 转变的新途径。", "authors": [{"name": "Hongsheng Pang"}, {"name": "Lixin He"}], "featured_authors": [{"name": "Hongsheng Pang"}, {"name": "Lixin He"}], "author_count": 2}, {"id": "2604.01540", "category": "cond-mat", "title": "Anomalous scaling in redirection networks", "abstract": "In networks that grow by isotropic redirection (IR), a new node selects an initial target node uniformly at random and attaches to a randomly chosen neighbor of the target. The emerging networks exhibit leaf proliferation, in which the number of nonleaves scales sublinearly as $N^\\mu$ and the degree distribution has an algebraic tail with exponent $1+\\mu$. To understand these mysterious properties, we introduce a class of models with redirection to leaves whenever possible. The resulting networks exhibit qualitatively similar phenomenology to IR networks, but avoid the inherent non-locality of the IR growth rule. These networks admit an analytical description of the leaf degree distribution, from which we extract the exponent $\\mu$.", "url": "https://arxiv.org/abs/2604.01540", "type": "理论", "summary": "在通过各向同性重定向 (IR) 增长的网络中，新节点均匀随机选择初始目标节点，并附加到随机选择的目标邻居。新兴网络表现出叶子增殖，其中非叶子的数量以 $N^\\mu$ 呈次线性缩放，并且度分布具有指数为 $1+\\mu$ 的代数尾部。为了理解这些神秘的属性，我们引入了一类尽可能重定向到叶子的模型。由此产生的网络在质量上表现出与 IR 网络相似的现象，但避免了 IR 增长规则固有的非局部性。这些网络接受叶度分布的分析描述，从中我们提取指数 $\\mu$。", "authors": [{"name": "Harrison Hartle"}, {"name": "P. L. Krapivsky"}, {"name": "S. Redner"}, {"name": "Yuanzhao Zhang"}], "featured_authors": [{"name": "Harrison Hartle"}, {"name": "P. L. Krapivsky"}, {"name": "S. Redner"}, {"name": "Yuanzhao Zhang"}], "author_count": 4}, {"id": "2604.01556", "category": "cond-mat", "title": "Time-evolving matrix product operators for off-diagonal system-bath coupling", "abstract": "Based on the process tensor framework, we extend the time-evolving matrix product operator (TEMPO) method to solve bosonic quantum impurity problems (QIPs) with off-diagonal system-bath coupling. Our method is a most generic extension of TEMPO, which applies for any QIPs as long as the bath is noninteracting and the system is linearly coupled to the bath. It naturally contains all the current developments of TEMPO in more restricted settings. As an application, we study the real-time dynamics of a spin that is coupled to a sub-ohmic bath via the Jaynes-Cummings-type system-bath coupling, and compare it against that of the standard spin-boson model. Our results show that the commonly used secular approximation could easily fail in presence of a structural bath. Our method provides a unified framework to understand different variants of TEMPO and directly suggests a fermionic generalization which has not been explored so far, it could also be straightforwardly used as an impurity solver in the bosonic dynamical mean field theory.", "url": "https://arxiv.org/abs/2604.01556", "type": "理论+数值", "summary": "基于过程张量框架，我们扩展了时间演化矩阵乘积算子（TEMPO）方法来解决非对角系统浴耦合的玻色量子杂质问题（QIP）。我们的方法是 TEMPO 的最通用扩展，只要浴不相互作用并且系统与浴线性耦合，它就适用于任何 QIP。它自然包含了 TEMPO 在更受限制的环境中的所有当前发展。作为一个应用，我们研究了通过 Jaynes-Cummings 型系统-浴耦合耦合到亚欧姆浴的自旋的实时动力学，并将其与标准自旋玻色子模型进行比较。我们的结果表明，在存在结构浴的情况下，常用的长期近似很容易失败。我们的方法提供了一个统一的框架来理解 TEMPO 的不同变体，并直接提出了迄今为止尚未探索的费米子推广，它也可以直接用作玻色子动力学平均场理论中的杂质求解器。", "authors": [{"name": "Chu Guo"}, {"name": "Wei Wu"}, {"name": "Xiansong Xu"}, {"name": "Tian Jiang"}, {"name": "Ping-Xing Chen"}, {"name": "Ruofan Chen"}], "featured_authors": [{"name": "Chu Guo"}, {"name": "Wei Wu"}, {"name": "Xiansong Xu"}, {"name": "Tian Jiang"}, {"name": "Ping-Xing Chen"}, {"name": "Ruofan Chen"}], "author_count": 6}, {"id": "2604.01566", "category": "cond-mat", "title": "Abrupt crystallization from shock-compressed CaSiO3 glass", "abstract": "We have performed in situ time-resolved X-ray diffraction at ~100 GPa on laser-shocked CaSiO3 glass to investigate the glass-to-crystal transition. At this extreme pressure, we observe the ultrafast crystallization of the CaSiO3 perovskite structure from the compressed amorphous phase, with a typical nucleation time of 1.69 +/- 0.10 ns and a final grainsize of ~20 nm. The grain size temporal evolution suggest a diffusion controlled transformation. Moreover, the observed concomitant explosive grain growth together with the release wave arrival into shocked CaSiO3 also suggests a role of the release in the nucleation process.", "url": "https://arxiv.org/abs/2604.01566", "type": "数值", "summary": "我们在约 100 GPa 的激光冲击 CaSiO3 玻璃上进行了原位时间分辨 X 射线衍射，以研究玻璃到晶体的转变。在这种极端压力下，我们观察到 CaSiO3 钙钛矿结构从压缩非晶相超快结晶，典型成核时间为 1.69 +/- 0.10 ns，最终晶粒尺寸约为 20 nm。晶粒尺寸随时间的演变表明扩散控制的转变。此外，观察到的伴随爆炸晶粒生长以及释放波到达冲击的 CaSiO3 也表明释放在成核过程中的作用。", "authors": [{"name": "A. Amouretti"}, {"name": "K. Nonaka"}, {"name": "X. Liu"}, {"name": "Y. Hironaka"}, {"name": "H. Huang"}, {"name": "R. Kodama"}, {"name": "K. Lawler"}, {"name": "K. Miyanishi"}, {"name": "H. Nakamura"}, {"name": "C. Schwartz"}, {"name": "Y. Seto"}, {"name": "K. Sueda"}, {"name": "Y. Wu"}, {"name": "M. Yabashi"}, {"name": "T. Yabuuchi"}, {"name": "N. Ozaki"}], "featured_authors": [{"name": "A. Amouretti"}, {"name": "K. Nonaka"}, {"name": "X. Liu"}, {"name": "M. Yabashi"}, {"name": "T. Yabuuchi"}, {"name": "N. Ozaki"}], "author_count": 16}, {"id": "2604.01592", "category": "cond-mat", "title": "Symmetry-Informed Term Filtering for Continuum Equation Discovery", "abstract": "Discovering governing equations, whether manually or by data-driven methods, has been central in physics and related areas. Since governing equations are typically constrained by a set of symmetries, using symmetry constraints to restrict terms is usually the first step in manually formulating a governing equation, but it often becomes intractable for complex systems with high-order derivatives or multiple fields. When a data-driven method is used, on the other hand, imposing physical constraints such as symmetries typically requires manual preprocessing or computationally expensive iterative procedures. Here, we propose an algebraic filtering method that enumerates all symmetry-allowed terms for continuum equations within a finite candidate space. By treating symmetry generators as linear operators on the candidate space, we reduce the problem of enforcing both discrete and continuous symmetries to solving a set of linear kernel equations. The solution yields a provably complete list of permitted terms. We demonstrate the method's effectiveness by identifying invariant terms for systems with dihedral symmetry and recovering the governing equations for the Toner--Tu and Kardar--Parisi--Zhang systems, including higher-order terms useful for extending known models. The method provides a systematic way to obtain a symmetry-allowed search space for data-driven equation discovery, e.g., the sparse identification of nonlinear dynamics method.", "url": "https://arxiv.org/abs/2604.01592", "type": "理论", "summary": "无论是手动还是通过数据驱动的方法发现控制方程一直是物理学及相关领域的核心。由于控制方程通常受到一组对称性的约束，因此使用对称约束来限制项通常是手动制定控制方程的第一步，但对于具有高阶导数或多域的复杂系统来说，这通常变得棘手。另一方面，当使用数据驱动方法时，施加物理约束（例如对称性）通常需要手动预处理或计算成本昂贵的迭代过程。在这里，我们提出了一种代数过滤方法，该方法枚举有限候选空间内连续介质方程的所有对称允许项。通过将对称生成器视为候选空间上的线性算子，我们减少了强制离散和连续对称性来求解一组线性核方程的问题。该解决方案生成了一份可证明完整的允许术语列表。\n\n我们通过识别具有二面对称性的系统的不变项并恢复 Toner--Tu 和 Kardar--Parisi--Zhang 系统的控制方程（包括可用于扩展已知模型的高阶项）来证明该方法的有效性。该方法提供了一种系统方法来获得数据驱动方程发现的对称性允许的搜索空间，例如非线性动力学方法的稀疏识别。", "authors": [{"name": "Junya Yokokura"}, {"name": "Kazumasa A. Takeuchi"}], "featured_authors": [{"name": "Junya Yokokura"}, {"name": "Kazumasa A. Takeuchi"}], "author_count": 2}, {"id": "2604.01642", "category": "cond-mat", "title": "Machine Learning Interatomic Potentials for Million-Atom Simulations of Multicomponent Alloys", "abstract": "Machine learning interatomic potentials (MLIPs) with broad chemical flexibility are important for atomistic simulations of compositionally complex materials such as high-entropy alloys. Here, we study two state-of-the-art MLIP frameworks, the neuroevolution potential (NEP) and the graph atomic cluster expansion (GRACE), for 16 elemental metals and multicomponent alloys. GRACE potential with Finnis-Sinclair type shows substantially higher training efficiency and consistently, though only slightly, better accuracy for mechanical properties, thermal stability, and chemical extrapolation. In contrast, NEP achieves an approximately 60-fold higher inference speed, making it attractive for million-atom molecular dynamics simulations. We further examine uncertainty quantification strategies and find that ensemble-based uncertainty correlates robustly with model error, whereas D-optimality is less reliable for the systems considered here. Large-scale nonequilibrium molecular dynamics simulations of shock propagation further show that NEP, combined with ensemble-based uncertainty quantification, enables efficient and reliable simulations under extreme dynamic conditions.", "url": "https://arxiv.org/abs/2604.01642", "type": "理论+数值", "summary": "具有广泛化学灵活性的机器学习原子间势（MLIP）对于高熵合金等成分复杂材料的原子模拟非常重要。在这里，我们研究了两种最先进的 MLIP 框架，即 16 种元素金属和多组分合金的神经进化势 (NEP) 和图原子簇扩展 (GRACE)。 Finnis-Sinclair 类型的 GRACE 潜力显示出显着更高的训练效率，并且在机械性能、热稳定性和化学外推方面始终保持较高的准确性（尽管只是略有提高）。相比之下，NEP 的推理速度提高了约 60 倍，这使其对于百万原子分子动力学模拟具有吸引力。我们进一步研究了不确定性量化策略，发现基于集合的不确定性与模型误差密切相关，而 D 最优性对于此处考虑的系统来说不太可靠。激波传播的大规模非平衡分子动力学模拟进一步表明，NEP 与基于系综的不确定性量化相结合，可以在极端动态条件下实现高效可靠的模拟。", "authors": [{"name": "Fei Shuang"}, {"name": "Penghua Ying"}, {"name": "Kai Liu"}, {"name": "Zixiong Wei"}, {"name": "Fengxian Liu"}, {"name": "Zheyong Fan"}, {"name": "Minqiang Jiang"}, {"name": "Poulumi Dey"}], "featured_authors": [{"name": "Fei Shuang"}, {"name": "Penghua Ying"}, {"name": "Kai Liu"}, {"name": "Zheyong Fan"}, {"name": "Minqiang Jiang"}, {"name": "Poulumi Dey"}], "author_count": 8}, {"id": "2604.01649", "category": "cond-mat", "title": "Isolated extended states and anomalous critical behavior in the generalized SSH model", "abstract": "We investigate the localization properties of a generalized SSH model. Numerical and analytical results indicate the emergence of extended states protected by unbounded hopping in this model. Moreover, this protection effect is disrupted by the appearance of generalized incommensurate zeros, causing the extended phase in the system to transition into a multifractal phase. However, at the boundaries of the phase region, we still observe the existence of extended states. These extended states coincide with multifractality-enriched mobility edges, separating the multifractal phase from the localized phase. Further analysis reveals that this extended states originates from the band edge states of SSH model. In addition, these isolated extended states also influence eigenstates with nearby energies, giving rise to an anomalous extended-to-multifractal critical transition. These findings not only enrich the behavioral repertoire of eigenstates at critical points, but also offer new insights for further understanding Anderson localization and the induction of multifractal phases.", "url": "https://arxiv.org/abs/2604.01649", "type": "理论+数值", "summary": "我们研究了广义 SSH 模型的本地化特性。数值和分析结果表明，该模型中出现了受无界跳跃保护的扩展状态。此外，这种保护效应会被广义不通约零点的出现所破坏，导致系统中的扩展相转变为多重分形相。然而，在相域的边界，我们仍然观察到扩展态的存在。这些扩展状态与富含多重分形的迁移率边缘一致，将多重分形相与局部相分开。进一步分析表明，这种扩展态源于SSH模型的能带边缘态。此外，这些孤立的扩展态还会影响具有附近能量的本征态，从而引起异常的扩展到多重分形临界转变。这些发现不仅丰富了关键点本征态的行为库，而且为进一步理解安德森定位和多重分形相的归纳提供了新的见解。", "authors": [{"name": "Jia-Ming Zhang"}], "featured_authors": [{"name": "Jia-Ming Zhang"}], "author_count": 1}, {"id": "2604.01688", "category": "cond-mat", "title": "Quantum-Information Measure of Electron Localization", "abstract": "Understanding electron localization in molecules and materials plays a central role in electronic structure theory, and will increase in importance with the rise of data driven approaches. The electron localization function (ELF) is widely used to visualize electron organization in molecules and materials, and it remains a central ingredient in modern density functional approximations. Yet its formulation retains highly empirical elements. Here we introduce a fully non empirical measure of electron localization derived from the concurrence of a correlated two spin mixed state. This construction yields a genuine two point localization indicator grounded in quantum information theory, removing the ad hoc steps underlying the ELF. We show that atomic shells, covalent and ionic bonds, lone pairs, molecular dissociation, and charge transfer processes are captured. The method is straightforward to evaluate numerically.", "url": "https://arxiv.org/abs/2604.01688", "type": "理论+数值", "summary": "了解分子和材料中的电子定位在电子结构理论中发挥着核心作用，并且随着数据驱动方法的兴起，其重要性将会增加。电子定位函数（ELF）广泛用于可视化分子和材料中的电子组织，并且它仍然是现代密度泛函近似的核心成分。然而它的表述保留了高度经验的元素。在这里，我们引入了一种完全非经验的电子局域化测量方法，该方法源自相关的两个自旋混合态的并发。这种构造产生了一个基于量子信息理论的真正的两点定位指示器，消除了 ELF 背后的临时步骤。我们展示了原子壳层、共价键和离子键、孤对电子、分子解离和电荷转移过程被捕获。该方法可以直接进行数值评估。", "authors": [{"name": "Stefano Pittalis"}, {"name": "Filippo Troiani"}, {"name": "Celestino Angeli"}, {"name": "Irene D'Amico"}, {"name": "Tim Gould"}], "featured_authors": [{"name": "Stefano Pittalis"}, {"name": "Filippo Troiani"}, {"name": "Celestino Angeli"}, {"name": "Irene D'Amico"}, {"name": "Tim Gould"}], "author_count": 5}, {"id": "2604.01737", "category": "cond-mat", "title": "Sign-Free Evidence for a d-Wave Superfluid Stiffness Dome in the Doped Hubbard Model", "abstract": "We construct an effective single-particle Hamiltonian $K_{\\mathrm{eff}}$ from Monte Carlo--averaged matrix logarithms of the imaginary-time propagator in determinant quantum Monte Carlo (DQMC). The logarithm maps the multiplicative sign problem into an additive framework where the central limit theorem guarantees convergence, rendering $K_{\\mathrm{eff}}$ sign-problem-free: both sign sectors yield identical dispersions to $<1\\%$. $K_{\\mathrm{eff}}$ captures the exact correlated single-particle spectrum, incorporating all self-energy effects non-perturbatively. Applied to the Hubbard model ($t'/t = -0.30$, $U/t = 4$), $K_{\\mathrm{eff}}$ reveals a $d$-wave pseudogap with strong nodal-antinodal dichotomy below a computational phase transition at $T^*$. Three sign-free observables provide evidence consistent with spin-fluctuation pairing: (i) the gap ratio $R_g > 1$ confirms $d$-wave symmetry -- a temperature-independent property of the correlated band structure that provides the medium for pairing; (ii) the superfluid stiffness $\\rho_s$ forms a dome across doping at $L = 8$, $10$, and $12$, exceeding the Berezinskii-Kosterlitz-Thouless threshold by $5$-$7\\times$ at the dome peak; (iii) $S(\\pi,\\pi)$ is approximately flat across doping, establishing that the dome originates from Fermi-surface geometry responding to uniform spin-fluctuation glue. The pseudogap grows monotonically toward half-filling while $\\rho_s$ forms a dome, mirroring cuprate phenomenology where $T_c$ is limited by the superfluid density (Uemura relation). Vertex corrections remain to be quantified.", "url": "https://arxiv.org/abs/2604.01737", "type": "理论+数值", "summary": "我们从蒙特卡罗构造了一个有效的单粒子哈密顿量 $K_{\\mathrm{eff}}$ - 行列式量子蒙特卡罗 (DQMC) 中虚数时间传播器的平均矩阵对数。对数将乘法符号问题映射到加法框架中，其中中心极限定理保证收敛，使 $K_{\\mathrm{eff}}$ 无符号问题：两个符号扇区产生相同的色散到 $<1\\%$。 $K_{\\mathrm{eff}}$ 捕获精确相关的单粒子光谱，以非扰动方式合并所有自能效应。应用于哈伯德模型（$t'/t = -0.30$，$U/t = 4$），$K_{\\mathrm{eff}}$ 揭示了 $d$ 波赝能隙，在 $T^*$ 的计算相变下方具有强节点-反节点二分法。\n\n三个无符号可观测量提供了与自旋涨落配对一致的证据：(i) 间隙比 $R_g > 1$ 证实了 $d$ 波对称性——相关能带结构的一种与温度无关的特性，为配对提供了介质； (ii) 超流体刚度 $\\rho_s$ 在 $L = 8$、$10$ 和 $12$ 处形成跨掺杂的圆顶，在圆顶峰值处超过 Berezinskii-Kosterlitz-Thouless 阈值 $5$-$7\\times$； (iii) $S(\\pi,\\pi)$ 在掺杂上近似平坦，确定圆顶源自响应均匀自旋涨落胶的费米表面几何形状。赝能隙单调增长至半填充，而 $\\rho_s$ 形成圆顶，反映铜酸盐现象，其中 $T_c$ 受到超流体密度（上村关系）的限制。顶点修正仍有待量化。", "authors": [{"name": "Xidi Wang"}, {"name": "H. Q. Lin"}], "featured_authors": [{"name": "Xidi Wang"}, {"name": "H. Q. Lin"}], "author_count": 2}, {"id": "2604.01746", "category": "cond-mat", "title": "Coupled dynamical Boltzmann transport equations with long-range electron-phonon and electron-electron interactions in 2D materials", "abstract": "We study the interplay between long-range electron-phonon and electron-electron interactions in electrostatically doped two-dimensional semiconductors, including interlayer couplings in van der Waals heterostructures. We evaluate the effects of those interactions on transport properties by writing dynamically coupled Boltzmann equations for the electrons and for the electrodynamically active excitations. We develop a theory with a general validity, and apply it both to simplified parabolic models, and to the realistic BN-encapsulated graphene system which we present in an accompanying paper [ arXiv:2604.00678 ]. We show that dynamical screening effects are of fundamental importance in order to correctly describe the electronic transport properties of two-dimensional materials, and in particular the scattering from polar phonons, whether those come from the semiconductor itself or the surrounding layers.", "url": "https://arxiv.org/abs/2604.01746", "type": "理论+数值", "summary": "我们研究静电掺杂二维半导体中长程电子-声子和电子-电子相互作用之间的相互作用，包括范德华异质结构中的层间耦合。我们通过编写电子和电动主动激发的动态耦合玻尔兹曼方程来评估这些相互作用对输运特性的影响。我们开发了一种具有普遍有效性的理论，并将其应用于简化的抛物线模型，以及我们在随附论文 [arXiv:2604.00678] 中提出的现实的 BN 封装石墨烯系统。我们表明，动态屏蔽效应对于正确描述二维材料的电子传输特性至关重要，特别是极性声子的散射，无论这些声子来自半导体本身还是周围层。", "authors": [{"name": "Francesco Macheda"}, {"name": "Thibault Sohier"}], "featured_authors": [{"name": "Francesco Macheda"}, {"name": "Thibault Sohier"}], "author_count": 2}, {"id": "2604.01784", "category": "cond-mat", "title": "Understanding ultrafast x-ray 'echoes' diffracted from single crystals", "abstract": "Multiple x-ray beams generated by interference processes in perfect crystals were imaged with a resolution of about 100nm using tele-ptychography in the diffraction direction. These multiple wave-fields, also known as x-ray diffraction echoes, are related to the process known as the Pendelloesung effect and are described by dynamical diffraction theory. The echoes are produced by the constructive interference of diffracted x-rays at the exit surface of the crystal sample. In the imaged diffraction peak, we observed 10 echoes maxima with a total signal length of 78 um. Which translates into a total temporal delay in the signal of less than 108 this http URL makes the echoes of high importance for x-ray optics at x-ray Free Electron Laser sources, as the effect could be used for future ultrafast x-ray beam splitters. In addition to this application, echoes can be exploited to follow ultrafast processes in single crystal micro-structures such as melting or strain propagation.", "url": "https://arxiv.org/abs/2604.01784", "type": "理论", "summary": "使用远程叠层摄影术在衍射方向上对完美晶体中干涉过程产生的多个 X 射线束进行成像，分辨率约为 100 nm。这些多重波场，也称为 X 射线衍射回波，与称为 Pendelloesung 效应的过程相关，并由动态衍射理论描述。回波是由衍射 X 射线在晶体样品出口表面的相长干涉产生的。在成像衍射峰中，我们观察到 10 个回波最大值，总信号长度为 78 um。这意味着信号中的总时间延迟小于 108，此 http URL 使得回波对于 X 射线自由电子激光源的 X 射线光学非常重要，因为这种效应可用于未来的超快 X 射线分束器。除了此应用之外，还可以利用回波来跟踪单晶微结构中的超快过程，例如熔化或应变传播。", "authors": [{"name": "Angel Rodriguez-Fernandez"}, {"name": "Dmitry Karpov"}, {"name": "Steven Leake"}, {"name": "Dina Carbone"}, {"name": "Ana Diaz"}], "featured_authors": [{"name": "Angel Rodriguez-Fernandez"}, {"name": "Dmitry Karpov"}, {"name": "Steven Leake"}, {"name": "Dina Carbone"}, {"name": "Ana Diaz"}], "author_count": 5}, {"id": "2604.01796", "category": "cond-mat", "title": "Invariant measures of exclusion processes with a look-ahead rule", "abstract": "We study a one-dimensional exclusion process with a fixed jump length $I \\ge 1$ in which a particle may advance or retreat $I$ sites provided all intermediate sites are vacant, with hopping rates of Arrhenius type depending on the local headway. We identify the class of rates admitting an explicit Ising-Gibbs invariant measure, with stationarity governed by pairwise balance rather than detailed balance. In the thermodynamic limit, we derive a closed-form stationary current that recovers the mean-field prediction for look-ahead traffic flow models exactly when particles are uncorrelated, and quantifies the correlation-induced correction for non-trivial interactions, illustrated with two explicit families of interaction potentials.", "url": "https://arxiv.org/abs/2604.01796", "type": "理论", "summary": "我们研究了具有固定跳跃长度 $I \\ge 1$ 的一维排除过程，其中粒子可以前进或后退 $I$ 位置，前提是所有中间位置都是空的，阿累尼乌斯类型的跳跃率取决于当地的进展。我们确定了接受明确的伊辛-吉布斯不变测度的利率类别，其平稳性由成对平衡而不是详细平衡控制。在热力学极限下，我们推导了一种闭合形式的稳态电流，当粒子不相关时，它可以准确地恢复前向交通流模型的平均场预测，并量化非平凡相互作用的相关引起的校正，用两个显式的相互作用势族进行说明。", "authors": [{"name": "Lam Thi Nhung"}, {"name": "Ngo Phuoc Nguyen Ngoc"}, {"name": "Huynh Anh Thi"}], "featured_authors": [{"name": "Lam Thi Nhung"}, {"name": "Ngo Phuoc Nguyen Ngoc"}, {"name": "Huynh Anh Thi"}], "author_count": 3}, {"id": "2604.01820", "category": "cond-mat", "title": "Beyond dynamic scaling: rare events break universality", "abstract": "Surface growth driven by non-monomeric deposition has remained largely unexplored. We investigate a model based on the deposition of blobs with a power-law size distribution $P(s)\\sim s^{-\\tau}$. We find that the critical exponents vary continuously with $\\tau$, recovering Kardar--Parisi--Zhang behavior only for $\\tau \\ge 3$. For $\\tau<3$, roughness scaling exhibits strong corrections and scale invariance breaks down. We show that this behavior originates from the emergence of a second dynamical length scale $\\zeta$, corresponding to the linear size of the largest cluster, in addition to the usual correlation length $\\xi$. The coexistence of these two relevant scales signals the breakdown of the usual Family--Vicsek scaling. These results point to a new phenomenology of surface growth beyond the standard scale-invariant paradigm.", "url": "https://arxiv.org/abs/2604.01820", "type": "理论", "summary": "由非单体沉积驱动的表面生长在很大程度上仍未被探索。我们研究了一个基于斑点沉积的模型，其具有幂律尺寸分布 $P(s)\\sim s^{-\\tau}$。我们发现临界指数随 $\\tau$ 连续变化，仅在 $\\tau \\ge 3$ 时恢复 Kardar--Parisi--Zhang 行为。对于 $\\tau<3$，粗糙度缩放表现出很强的校正，并且缩放不变性被打破。我们表明，这种行为源于第二个动态长度尺度 $\\zeta$ 的出现，除了通常的相关长度 $\\xi$ 之外，它对应于最大簇的线性大小。这两种相关尺度的共存标志着通常的家庭维切克尺度的崩溃。这些结果指出了超越标准尺度不变范式的表面生长的新现象学。", "authors": [{"name": "Ulysse Marquis"}, {"name": "Riccardo Gallotti"}, {"name": "Marc Barthelemy"}], "featured_authors": [{"name": "Ulysse Marquis"}, {"name": "Riccardo Gallotti"}, {"name": "Marc Barthelemy"}], "author_count": 3}, {"id": "2604.01861", "category": "cond-mat", "title": "Switching between Antiferromagnetic and Ferromagnetic Skyrmions in Two-Dimensional Magnets", "abstract": "Antiferromagnetic (AFM) and ferromagnetic (FM) skyrmions possess unique advantages for spintronic applications. AFM skyrmions eliminate the skyrmion Hall effect and exhibit fast dynamics, whereas FM skyrmions are easier to nucleate and manipulate. However, realizing a transition between AFM and FM skyrmions within the same two-dimensional (2D) material has remained elusive. Here, using first-principles calculations and atomistic spin simulations on the Janus monolayer Cr2Ge2Te3S3, we demonstrate that strain-driven modulation of magnetic interactions enables switching between AFM and FM skyrmion phases. A compressive strain of $-3\\%$ induces an AFM ground state hosting AFM skyrmions, while a tensile strain of $+2\\%$ drives the system into a FM skyrmion phase. Moreover, under an out-of-plane magnetic field, FM skyrmions are rapidly transformed into a uniform FM phase, while AFM skyrmions transform into AFM bimerons under stronger fields. These findings establish a framework for controllable transitions between topological magnetic states in a single 2D material.", "url": "https://arxiv.org/abs/2604.01861", "type": "理论+数值", "summary": "反铁磁（AFM）和铁磁（FM）斯格明子在自旋电子学应用中具有独特的优势。 AFM 斯格明子消除了斯格明子霍尔效应并表现出快速动力学，而 FM 斯格明子更容易成核和操纵。然而，在同一二维 (2D) 材料中实现 AFM 和 FM 斯格明子之间的转变仍然难以实现。在这里，我们利用 Janus 单层 Cr2Ge2Te3S3 上的第一原理计算和原子自旋模拟，证明了磁相互作用的应变驱动调制能够在 AFM 和 FM 斯格明子相之间切换。 $-3\\%$ 的压缩应变会诱发 AFM 斯格明子的 AFM 基态，而 $+2\\%$ 的拉伸应变则驱动系统进入 FM 斯格明子相。此外，在面外磁场下，FM斯格明子迅速转变为均匀的FM相，而AFM斯格明子在更强的磁场下转变为AFM双聚体。这些发现为单一二维材料中拓扑磁态之间的可控转变建立了框架。", "authors": [{"name": "Xinyang Jiang"}, {"name": "Jian Wu"}, {"name": "Weiyi Pan"}], "featured_authors": [{"name": "Xinyang Jiang"}, {"name": "Jian Wu"}, {"name": "Weiyi Pan"}], "author_count": 3}, {"id": "2604.01899", "category": "cond-mat", "title": "Atomistic theory of the phonon angular momentum Hall effect", "abstract": "The spin and orbital Hall effects convert longitudinal charge currents into transverse flows of electronic angular momentum. Here we develop an atomistic theory of the recently proposed lattice-vibrational analogue, in which a longitudinal heat current driven by a thermal gradient is converted into a transverse current of phonon angular momentum. We derive a microscopic real-space expression for this current and show that it originates from thermally induced mixing of polarized vibrational motion, leading to a characteristic edge accumulation of phonon angular momentum. We demonstrate the effect in minimal square- and honeycomb-lattice models and compute the resulting phonon angular momentum accumulations for a range of example materials using input from first-principles calculations. Our results confirm that the phonon angular momentum Hall effect is a universal response of crystalline solids and our framework is generically applicable to all materials.", "url": "https://arxiv.org/abs/2604.01899", "type": "理论+数值", "summary": "自旋和轨道霍尔效应将纵向电荷电流转换为电子角动量的横向流。在这里，我们发展了最近提出的晶格振动模拟的原子理论，其中由热梯度驱动的纵向热流被转换为声子角动量的横向流。我们推导了该电流的微观实空间表达式，并表明它源自极化振动运动的热致混合，导致声子角动量的特征边缘积累。我们演示了最小方形和蜂窝晶格模型中的效应，并使用第一原理计算的输入计算一系列示例材料的声子角动量累积。我们的结果证实，声子角动量霍尔效应是晶体固体的普遍响应，我们的框架普遍适用于所有材料。", "authors": [{"name": "Daniel A. Bustamante Lopez"}, {"name": "Verena Brehm"}, {"name": "Dominik M. Juraschek"}], "featured_authors": [{"name": "Daniel A. Bustamante Lopez"}, {"name": "Verena Brehm"}, {"name": "Dominik M. Juraschek"}], "author_count": 3}, {"id": "2604.01926", "category": "cond-mat", "title": "Universal features of nonequilibrium Ising models in contact with two thermal reservoirs", "abstract": "We derive generic properties of nonequilibrium phase transitions in all-to-all Ising models placed in contact with two thermal reservoirs, in which parameters (temperatures, interactions and field parameters) assume arbitrary values depending on the contact with each thermal bath. The presence of different kinds of external parameters leads to remarkably different sort of phase transitions. While continuous, discontinuous and even tricritical points are presented when external parameters are symmetric (e.g. the case of energetic barriers or different couplings between the system and thermal baths), the tricriticality is absent when external parameters are antisymmetric (e.g. the case of magnetic fields or biased drivings) implying that solely critical or discontinuous are possible. In such latter case, the probability distribution acquires the Boltzmann-Gibbs like form, irrespectively the model parameters when the switching between thermal reservoirs is sufficiently fast. Our work sheds light about the differences between equilibrium and nonequilibrium ingredients and theirs consequences upon phase transitions.", "url": "https://arxiv.org/abs/2604.01926", "type": "理论", "summary": "我们推导了与两个热储层接触的所有伊辛模型中非平衡相变的一般性质，其中参数（温度、相互作用和场参数）根据与每个热浴的接触而假定任意值。不同类型外部参数的存在导致明显不同类型的相变。当外部参数对称时（例如，能量势垒或系统与热浴之间不同耦合的情况），会出现连续、不连续甚至三临界点，而当外部参数反对称时（例如，磁场或偏置驱动的情况），则不存在三临界点，这意味着仅临界或不连续是可能的。在后一种情况下，当热储层之间的切换足够快时，无论模型参数如何，概率分布都会获得类似玻尔兹曼-吉布斯的形式。我们的工作揭示了平衡和非平衡成分之间的差异及其对相变的影响。", "authors": [{"name": "Iago N. Mamede"}, {"name": "Bart Cleuren"}, {"name": "Carlos. E. Fiore"}], "featured_authors": [{"name": "Iago N. Mamede"}, {"name": "Bart Cleuren"}, {"name": "Carlos. E. Fiore"}], "author_count": 3}, {"id": "2604.01940", "category": "cond-mat", "title": "A Residence-Time Approach for Determining Position-Dependent Diffusivities from Biased Molecular Simulations", "abstract": "We introduce a residence-time approach (RTA) for determining position-dependent diffusivities from biased molecular dynamics simulations. The method is formulated for trajectory segments in which the effective drift along the transport coordinate is negligible, as realized here using adaptive biasing force simulations. In this regime, local diffusivities are obtained directly from mean first-exit times out of finite spatial intervals. Unlike conventional fluctuation-based approaches, the RTA does not require dedicated harmonically restrained simulations or numerical integration of noisy time-correlation functions. We assess the method for oxygen diffusion across a hexadecane slab, water permeation across a lipid bilayer, and permeation of water and selected volatile organic compounds through a model skin-barrier membrane. In the slab system, the RTA reproduces independently determined bulk diffusivities within statistical uncertainty. In the membrane systems, the inferred diffusivity profiles are supported by propagator-level validation. These results establish the RTA as a practical approach for extracting position-dependent diffusivities from biased molecular simulations.", "url": "https://arxiv.org/abs/2604.01940", "type": "理论+数值", "summary": "我们引入了一种停留时间方法（RTA），用于从有偏差的分子动力学模拟中确定位置相关的扩散率。该方法是针对轨迹段制定的，其中沿传输坐标的有效漂移可以忽略不计，正如此处使用自适应偏置力模拟所实现的那样。在这种情况下，局部扩散率直接从有限空间间隔的平均首次退出时间获得。与传统的基于波动的方法不同，RTA 不需要专用的谐波约束模拟或噪声时间相关函数的数值积分。我们评估了氧气穿过十六烷板的扩散、水穿过脂质双层的渗透以及水和选定的挥发性有机化合物穿过模型皮肤屏障膜的渗透的方法。在平板系统中，RTA 在统计不确定性内再现独立确定的体扩散率。在膜系统中，推断的扩散率分布得到传播器级验证的支持。这些结果使 RTA 成为从有偏差的分子模拟中提取位置相关扩散率的实用方法。", "authors": [{"name": "Rinto Thomas"}, {"name": "Praveen Ranganath Prabhakar"}, {"name": "Michael von Domaros"}], "featured_authors": [{"name": "Rinto Thomas"}, {"name": "Praveen Ranganath Prabhakar"}, {"name": "Michael von Domaros"}], "author_count": 3}, {"id": "2604.01948", "category": "cond-mat", "title": "Quantum anomalous Hall conductivity in altermagnets under applied magnetic field", "abstract": "We investigate the emergence of quantum anomalous Hall conductivity in a two-dimensional $d$-wave altermagnet on a Lieb lattice under an external magnetic field. Altermagnetic order induces momentum-dependent spin splitting without net magnetization in the relativistic limit, producing distinct spin-resolved bands at the $X$ and $Y$ valleys. The phase diagram features a normal insulator and a spin Chern insulator separated by an accidental Dirac semimetal. The magnetic field breaks rotational symmetry between valleys while maintaining vanishing total magnetization, enabling independent valley contributions to topology. One valley supports Chern numbers $C=-1$ or $0$, while the other hosts $C=0$ or $+1$, governed by field strength and bandwidth. This competition yields valley-dependent topology. Berry curvature analysis reveals fully gapped phases with total Chern numbers $C=\\pm1$, separated by valley-selective gap closings. We uncover a mechanism for rapid magnetic control of the quantum anomalous Hall effect near the semimetal phase and highlight key distinctions from ferro-valleytronic and quantum spin Hall systems.", "url": "https://arxiv.org/abs/2604.01948", "type": "理论+数值", "summary": "我们研究了外部磁场下利布晶格上的二维 $d$ 波交替磁体中量子反常霍尔电导率的出现。交变磁序会在相对论极限内产生动量相关的自旋分裂，而无需净磁化，从而在 $X$ 和 $Y$ 谷处产生明显的自旋分辨带。该相图具有正常绝缘体和自旋陈绝缘体，由偶然的狄拉克半金属隔开。磁场打破了谷之间的旋转对称性，同时保持消失的总磁化强度，从而使谷对拓扑结构具有独立的贡献。一个山谷支持陈数 $C=-1$ 或 $0$，而另一个山谷则承载 $C=0$ 或 $+1$，由场强和带宽控制。这种竞争产生了依赖谷的拓扑结构。贝里曲率分析揭示了完全有间隙的阶段，总陈数 $C=\\pm1$，由谷选择性间隙闭合分隔。我们发现了一种对半金属相附近的量子反常霍尔效应进行快速磁控制的机制，并强调了与铁谷电子和量子自旋霍尔系统的关键区别。", "authors": [{"name": "Meysam Bagheri Tagani"}, {"name": "Amar Fakhredine"}, {"name": "Carmine Autieri"}], "featured_authors": [{"name": "Meysam Bagheri Tagani"}, {"name": "Amar Fakhredine"}, {"name": "Carmine Autieri"}], "author_count": 3}, {"id": "2604.01963", "category": "cond-mat", "title": "Hydrodynamic Backflow for Easing the Fermion Sign in Finite-Temperature Electron Path Integral Simulations", "abstract": "Some notable systems, such as room-temperature superconductors and materials for controlled nuclear fusion, require an accurate description of finite-temperature quantum matter. Stochastic path integral methods are finite-temperature and numerically exact, but scale poorly with system size due the notorious Fermion sign problem. To somewhat mitigate this, we use a hydrodynamical backflow coordinate transformation. Our first attempt was a continuous normalizing flow machine learning approach to determine the optimal parameters. We found this to reduce the error of the total energy, approximately, three times at medium sign severity. Numerical issues challenged training effectively. Thus, a semi-analytic approach was developed to estimate the optimal parameters. We do this by using a derived expression dependent on a Bosonic observable. Hence, the calculation of these values does not have a sign problem. The resulting backflow transformations reduce the problem by multiple orders of magnitude, specifically, in the case of a harmonically trapped, two-dimensional electron gas at finite-temperature. The total energy of the system agrees with previous, backflow untransformed, studies and we calculate energies for up to 32 electrons. The limiting factor is found to be, primarily, the $O(N^3)$ calculation of the Jacobian, stemming from the coordinate transformation of the backflow. A more thorough implementation may further improve this scaling. Otherwise, a pathway for simulating electron systems at currently unreachable regimes is obtained. Finally, as a specific practical use case in energy storage systems, the quantum capacitance for graphene quantum dot materials is calculated.", "url": "https://arxiv.org/abs/2604.01963", "type": "数值", "summary": "一些著名的系统，例如室温超导体和用于受控核聚变的材料，需要对有限温度量子物质进行准确描述。随机路径积分方法在有限温度下具有数值精确性，但由于臭名昭著的费米子符号问题，其规模与系统规模的关系较差。为了在一定程度上缓解这种情况，我们使用流体动力学回流坐标变换。我们的第一次尝试是采用连续归一化流机器学习方法来确定最佳参数。我们发现这可以将总能量的误差减少大约三倍（中等符号严重程度）。数字问题对培训提出了有效的挑战。因此，开发了半解析方法来估计最佳参数。我们通过使用依赖于玻色可观测量的派生表达式来做到这一点。因此，这些值的计算不存在符号问题。由此产生的回流变换将问题减少了多个数量级，特别是在有限温度下谐波捕获的二维电子气的情况下。\n\n系统的总能量与之前的未转化回流研究一致，我们计算了多达 32 个电子的能量。发现限制因素主要是源自回流坐标变换的雅可比行列式的 $O(N^3)$ 计算。更彻底的实施可能会进一步改善这种扩展。否则，获得在当前无法达到的状态下模拟电子系统的途径。最后，作为储能系统中的具体实际用例，计算了石墨烯量子点材料的量子电容。", "authors": [{"name": "Ingvars Vitenburgs"}, {"name": "Jarvist Moore Frost"}], "featured_authors": [{"name": "Ingvars Vitenburgs"}, {"name": "Jarvist Moore Frost"}], "author_count": 2}, {"id": "2604.01986", "category": "cond-mat", "title": "Resetting optimized competitive first-passage outcomes in non-Markovian systems", "abstract": "We investigate the role of stochastic resetting in non-Markovian systems, where memory effects arise due to slow relaxation, rugged energy landscapes, disordered environments, and molecular crowding. Using the celebrated continuous-time random walk (CTRW) framework, we analyze first-passage processes with multiple competing outcomes and examine how resetting can selectively enhance desired events. We characterize the efficiency of resetting through conditional mean first-passage times (MFPTs) and demonstrate that its impact is highly sensitive to the underlying waiting-time statistics. Furthermore, we derive an inequality that quantifies how resetting controls fluctuations in conditional first-passage times (FPTs), revealing regimes where variability is significantly suppressed. Our results provide a systematic understanding of how long-term memory influences competitive first-passage outcomes and establish resetting as a powerful control mechanism beyond the conventional Markovian setting.", "url": "https://arxiv.org/abs/2604.01986", "type": "理论+数值", "summary": "我们研究了随机重置在非马尔可夫系统中的作用，在非马尔可夫系统中，记忆效应是由于缓慢放松、崎岖的能量景观、无序的环境和分子拥挤而产生的。使用著名的连续时间随机游走（CTRW）框架，我们分析具有多个竞争结果的首次传代过程，并研究重置如何选择性地增强期望的事件。我们通过条件平均首次通过时间（MFPT）来描述重置的效率，并证明其影响对基础等待时间统计数据高度敏感。此外，我们推导了一个不等式，该不等式量化了重置如何控制条件首次通过时间（FPT）的波动，揭示了变异性被显着抑制的机制。我们的结果提供了对长期记忆如何影响竞争性首次传代结果的系统性理解，并将重置确立为超越传统马尔可夫设置的强大控制机制。", "authors": [{"name": "Suvam Pal"}, {"name": "Rahul Das"}, {"name": "Arnab Pal"}], "featured_authors": [{"name": "Suvam Pal"}, {"name": "Rahul Das"}, {"name": "Arnab Pal"}], "author_count": 3}, {"id": "2604.02011", "category": "cond-mat", "title": "Merging and oscillations of dipolar Bose-Einstein condensate droplets", "abstract": "We investigate the dynamics of Bose-Einstein condensate droplets composed of $^{164}$Dy atoms formed in a double-well potential following removal of the interwell barrier. By solving the dipolar Gross-Pitaevskii equation, we determine phase diagrams of ground-state configurations as functions of the atom number confined in the double-well potential. For strong dipolar interactions, some of the lowest-energy configurations arise from spontaneous symmetry breaking of the droplet structure, which optimizes the interaction energy. We analyze the subsequent time evolution after removal of the central barrier, revealing both droplet oscillations and merger events leading to the formation of larger droplets. The oscillations are driven by the external potential and by the repulsive tails of the in-plane component of the dipolar interaction. Merger events occur when the initial excess energy is sufficient to overcome the interdroplet potential barrier. The oscillatory dynamics depend sensitively on the atom number, the strength of dipolar interactions, and the initial symmetry of the configuration. We find that both oscillations of individual droplets and atom leakage from the droplets, induced by close droplet-droplet encounters, contribute to the damping of the oscillations.", "url": "https://arxiv.org/abs/2604.02011", "type": "理论+数值", "summary": "我们研究了由 $^{164}$Dy 原子组成的玻色-爱因斯坦凝聚液滴的动力学，这些原子在去除井间势垒后在双阱势中形成。通过求解偶极 Gross-Pitaevskii 方程，我们将基态构型的相图确定为限制在双阱势中的原子数的函数。对于强偶极相互作用，一些最低能量的构型是由液滴结构的自发对称性破缺产生的，这优化了相互作用能量。我们分析了去除中心势垒后随后的时间演化，揭示了导致更大液滴形成的液滴振荡和合并事件。振荡由外部电势和偶极相互作用的面内分量的排斥尾部驱动。当初始过剩能量足以克服液滴间势垒时，就会发生合并事件。振荡动力学敏感地取决于原子数、偶极相互作用的强度以及构型的初始对称性。\n\n我们发现，由液滴-液滴近距离接触引起的单个液滴的振荡和液滴中的原子泄漏都有助于振荡的阻尼。", "authors": [{"name": "Wojciech Orłowski"}, {"name": "Bartłomiej Szafran"}], "featured_authors": [{"name": "Wojciech Orłowski"}, {"name": "Bartłomiej Szafran"}], "author_count": 2}, {"id": "2604.02085", "category": "cond-mat", "title": "Gaussian closure and dynamical mean-field theory for self-avoiding heteropolymers", "abstract": "Analytical treatments of polymer dynamics have mostly been restricted to linear response theory around some steady state obtained via perturbative field theory. Here, I derive an analytical framework that yields unified access to the evolution of conformations, contact probabilities, and fluctuations within a dynamical mean-field theory. Starting with the Langevin equation of a hydrodynamically coupled and self-avoiding heteropolymer, the key idea is to focus on the two-point correlator as the lowest-order relevant observable. Truncating higher-order correlations via a Gaussian closure leads to a self-consistent diffusion equation for the chain correlations. The theory is validated by contrasting coiled, globular, and self-avoiding polymers within a single dynamical framework, and predicts hyper-compacted fractal states in hydrodynamically coupled active polymers such as chromatin.", "url": "https://arxiv.org/abs/2604.02085", "type": "理论", "summary": "聚合物动力学的分析处理大多局限于通过微扰场理论获得的某些稳态周围的线性响应理论。在这里，我推导出一个分析框架，可以统一访问动态平均场理论中的构象演化、接触概率和波动。从流体动力学耦合和自回避杂聚物的 Langevin 方程开始，关键思想是关注作为最低阶相关可观测量的两点相关器。通过高斯闭包截断高阶相关性会产生链相关性的自洽扩散方程。该理论通过对比单一动力学框架内的卷曲、球状和自回避聚合物得到验证，并预测染色质等流体动力学耦合活性聚合物中的超致密分形状态。", "authors": [{"name": "Andriy Goychuk"}], "featured_authors": [{"name": "Andriy Goychuk"}], "author_count": 1}, {"id": "2604.02143", "category": "cond-mat", "title": "Spatial Correlations Restore Zwanzig's Mean-Field Diffusion Result in Rugged Energy Landscapes", "abstract": "Transport in disordered environments is often controlled not by typical fluctuations but by rare, extreme events that dominate long-time dynamics. In such settings, Zwanzig's classic mean-field theory predicts that energetic roughness reduces the diffusion coefficient by an exponential factor governed solely by the variance of the disorder. However, this prediction breaks down in uncorrelated Gaussian landscapes, where rare but deep multi-site traps dominate transport and lead to a much stronger suppression of diffusion. Here, we present a unified theoretical framework that clarifies both the origin of this breakdown and its resolution. We show that Zwanzig's local averaging can be interpreted as a Gaussian cumulant expansion whose validity is destroyed by uncorrelated disorder through the emergence of extreme trapping events. Introducing Gaussian spatial correlations fundamentally reshapes the landscape: roughness increments become smoother, asymmetric multi-site traps are suppressed, and the statistics of escape pathways are regularized. As a result, Zwanzig's exponential scaling is recovered. We provide an explicit analytical derivation demonstrating how spatial correlations modify trap statistics and restore mean-field diffusion, complemented by illustrative numerical examples showing the dramatic reduction of escape times in correlated landscapes.", "url": "https://arxiv.org/abs/2604.02143", "type": "理论+数值", "summary": "无序环境中的传输通常不是由典型的波动控制，而是由主导长期动态的罕见极端事件控制。在这种情况下，Zwanzig 的经典平均场理论预测，能量粗糙度会通过仅由无序方差控制的指数因子降低扩散系数。然而，这一预测在不相关的高斯景观中被打破，其中罕见但深层的多位点陷阱主导着传输，并导致更强的扩散抑制。在这里，我们提出了一个统一的理论框架，阐明了这种故障的根源及其解决方案。我们证明，Zwanzig 的局部平均可以解释为高斯累积量展开，其有效性因极端捕获事件的出现而被不相关的无序所破坏。引入高斯空间相关性从根本上重塑了景观：粗糙度增量变得更加平滑，不对称的多站点陷阱被抑制，逃生路径的统计数据被正则化。结果，Zwanzig 的指数缩放得到恢复。\n\n我们提供了明确的分析推导，展示了空间相关性如何修改陷阱统计数据并恢复平均场扩散，并辅以说明性数值示例，显示相关景观中逃逸时间的急剧减少。", "authors": [{"name": "Biman Bagchi"}], "featured_authors": [{"name": "Biman Bagchi"}], "author_count": 1}, {"id": "2604.02163", "category": "cond-mat", "title": "Quantum droplets in dipolar quasi-one-dimensional Bose-Einstein condensates in optical lattices", "abstract": "We consider quantum droplets in dipolar Bose-Einstein condensates (BECs) embedded in optical lattices within the framework of Gross-Pitaevskii equations. In dipolar BECs, the long-range and anistropic dipole-dipole interaction provides an additional mechanism for self-binding. We analyze the linear stability as well dynamics of quantum droplets. We find effective potential for the width and show that the optimum width for formation of quantum droplet increases as the dipole-dipole interaction increases. We study dynamics of the stable droplets and see that its width oscillates periodically, and the amplitude of oscillation increases with the increase of dipole-dipole interaction. In presence of optical lattices, width of a stable droplet changes quasi-periodically while the density profile oscillating periodically in space. The frequency of oscillation are found to depend sensitively on the lattice parameters.", "url": "https://arxiv.org/abs/2604.02163", "type": "理论", "summary": "我们在 Gross-Pitaevskii 方程的框架内考虑嵌入光学晶格中的偶极玻色-爱因斯坦凝聚体 (BEC) 中的量子液滴。在偶极 BEC 中，长程和各向异性的偶极-偶极相互作用提供了一种额外的自结合机制。我们分析了量子液滴的线性稳定性和动力学。我们发现了宽度的有效潜力，并表明形成量子液滴的最佳宽度随着偶极子-偶极子相互作用的增加而增加。我们研究了稳定液滴的动力学，发现其宽度周期性振荡，并且振荡幅度随着偶极子相互作用的增加而增加。在存在光学晶格的情况下，稳定液滴的宽度准周期性变化，而密度分布在空间中周期性振荡。发现振荡频率敏感地取决于晶格参数。", "authors": [{"name": "Sk Siddik"}, {"name": "Golam Ali Sekh"}], "featured_authors": [{"name": "Sk Siddik"}, {"name": "Golam Ali Sekh"}], "author_count": 2}, {"id": "2604.02167", "category": "cond-mat", "title": "Power laws, anisotropy and center-of-mass conservation in mass transport processes", "abstract": "We present exact results for steady-state density correlation functions in conserved-mass transport processes with {\\it anisotropic}, reflection-symmetric hopping on a $d-$dimensional hypercubic lattice. In addition to mass conservation, we consider center-of-mass (CoM) conservation, imposed either along a specific axis or along all axes. CoM-conserving dynamics is implemented through coordinated {\\it multidirectional} hopping of two equal chunks of masses in {\\it opposite} directions. While anisotropy and mass conservation are known to generate power-law density correlations $C({\\bf x}) \\sim 1/|{\\bf x}|^d$ at large distance $|{\\bf x}| \\gg 1$ {\\it [Phys. Rev. A {\\bf 42}, 1954 (1990)]}, an additional CoM conservation can qualitatively alter the nature of the power law. Indeed, when CoM is conserved in {\\it all} directions, the correlations decay faster $-$ typically as $C({\\bf x}) \\sim 1/|{\\bf x}|^{(d+2)}$, regardless of the presence (or absence) of anisotropy. Consequently, the systems exhibit an extreme {\\it hyperuniformity} (``class I''), where the long-wavelength density fluctuations, despite the slow power-law decay, are anomalously suppressed. When CoM is conserved along particular ({\\it not} all) directions, the slower $1/|{\\bf x}|^{d}$ power-law decay is recovered. The above behavior can be understood from an analogy between the correlation function and an electrostatic potential: While a (rank-$2$) quadrupolar charge distribution gives rise to the $1/|{\\bf x}|^{d}$ power law, the $1/|{\\bf x}|^{(d+2)}$ power law originates from a higher-order (rank-$4$) multipolar charge distribution. These findings reveal a rich interplay between anisotropy and CoM conservation in nonequilibrium steady states.", "url": "https://arxiv.org/abs/2604.02167", "type": "理论", "summary": "我们提出了在$d$维超立方晶格上具有{\\it各向异性}、反射对称跳跃的守恒质量传输过程中的稳态密度相关函数的精确结果。除了质量守恒之外，我们还考虑沿特定轴或沿所有轴施加的质心 (CoM) 守恒。 CoM 守恒动力学是通过两个相等的质量块在{\\相反}方向上协调{\\it多向}跳跃来实现的。虽然各向异性和质量守恒已知会在大距离 $|{\\bf x}| 处产生幂律密度相关性 $C({\\bf x}) \\sim 1/|{\\bf x}|^d$ \\gg 1$ {\\it [物理。 Rev. A {\\bf 42}, 1954 (1990)]}，额外的 CoM 守恒可以定性地改变幂律的性质。事实上，当 CoM 在 {\\it all} 方向上守恒时，相关性衰减得更快 $-$ 通常为 $C({\\bf x}) \\sim 1/|{\\bf x}|^{(d+2)}$，无论是否存在各向异性。因此，系统表现出极端的{\\it超均匀性}（“I类”），其中尽管幂律衰减缓慢，但长波长密度涨落却被异常抑制。\n\n当 CoM 沿特定（{\\不是}所有）方向守恒时，较慢的 $1/|{\\bf x}|^{d}$ 幂律衰减得以恢复。上述行为可以通过相关函数和静电势之间的类比来理解：虽然 (rank-$2$) 四极电荷分布产生 $1/|{\\bf x}|^{d}$ 幂律，但 $1/|{\\bf x}|^{(d+2)}$ 幂律源自高阶 (rank-$4$) 多极电荷分布。这些发现揭示了非平衡稳态下各向异性和 CoM 守恒之间丰富的相互作用。", "authors": [{"name": "Aniket Samanta"}, {"name": "Animesh Hazra"}, {"name": "Punyabrata Pradhan"}], "featured_authors": [{"name": "Aniket Samanta"}, {"name": "Animesh Hazra"}, {"name": "Punyabrata Pradhan"}], "author_count": 3}, {"id": "2604.02180", "category": "cond-mat", "title": "Entropic crystallization of geometrically frustrated magnets on 1/1 approximant Tsai-type quasicrystal", "abstract": "We have studied the antiferromagnetic Ising model on the icosahedral bcc lattice, as a model system of 1/1 approximant Tsai-type quasicrystals. We addressed thermal equilibrium properties of this system with Markov-chain Monte Carlo simulation supplemented with the parallel tempering technique to accelerate the relaxation dynamics. As a result, we found a second-order phase transition takes place to the magnetic ordered phase with ${\\mathbb Z_3}\\times {\\mathbb Z_2}$ symmetry breaking. Despite the ordering, the low-temperature phase keeps macroscopic degeneracy as identified by finite residual entropy, $\\mathcal{S}\\sim0.1767/{\\rm spin}$. Remarkably, the existence of residual entropy turns out to play a major role in the formation of magnetic order. Generation of domain wall is suppressed, as it reduces the residual entropy locally stored in icosahedra, beyond the gain of configurational entropy due to domain wall patterns. Magnetic order arises out of this competition as entropic crystallization, which manifest universal mechanism of strongly frustrated systems with large geometrical units.", "url": "https://arxiv.org/abs/2604.02180", "type": "理论+数值", "summary": "我们研究了二十面体bcc晶格上的反铁磁Ising模型，作为1/1近似Tsai型准晶的模型系统。我们通过马尔可夫链蒙特卡罗模拟解决了该系统的热平衡特性，并辅以平行回火技术来加速弛豫动力学。结果，我们发现发生了向磁有序相的二阶相变，且对称性破缺。尽管有顺序，低温相仍保持宏观简并性，如有限残余熵 $\\mathcal{S}\\sim0.1767/{\\rm spin}$ 所确定的。值得注意的是，残余熵的存在在磁序的形成中发挥了重要作用。畴壁的生成被抑制，因为它减少了局部存储在二十面体中的残余熵，超出了由于畴壁图案而获得的构型熵的增益。磁序是这种竞争中产生的熵结晶，它体现了具有大几何单元的强受挫系统的普遍机制。", "authors": [{"name": "Oscar Novat"}, {"name": "Ludovic D. C. Jaubert"}, {"name": "Masafumi Udagawa"}], "featured_authors": [{"name": "Oscar Novat"}, {"name": "Ludovic D. C. Jaubert"}, {"name": "Masafumi Udagawa"}], "author_count": 3}, {"id": "2604.02193", "category": "cond-mat", "title": "Terahertz optical activity near crystal field transitions of Tm3+ ions in magnetoelectric alumoborates", "abstract": "Crystal field (CF) excitations in the ground multiplet $^3H_6$ of Tm$^{3+}$ ions were investigated using terahertz transmission spectra of magnetoelectric TmAl$_3$(BO$_3$)$_4$ and Tm$_{0.05}$Yb$_{0.1}$Y$_{0.85}$Al$_3$(BO$_3$)$_4$. These excitations were identified as mainly magnetic dipole transitions from the ground singlet A$_1$ to the next excited doublet E, split by the crystal field of the D$_3$ symmetry. The fine structure of the modes was resolved at low temperatures. It manifested differently in lightly doped and in pure Tm borates, consistent with different distortions of the local crystal field with the D$_3$ symmetry. Strong natural optical activity was observed near the CF transitions resulting in a polarization plane rotation up to 25 degrees. The optical activity is quantitatively described by contributions of magnetic and electric dipole transitions to dynamic magnetoelectric susceptibility and taking into account the classification of local distortions.", "url": "https://arxiv.org/abs/2604.02193", "type": "理论+数值", "summary": "使用磁电 TmAl$_3$(BO$_3$)$_4$ 和 Tm$_{0.05}$Yb$_{0.1}$Y$_{0.85}$Al$_3$(BO$_3$)$_4$ 的太赫兹透射谱研究了 Tm$^{3+}$ 离子的地面多重态 $^3H_6$ 中的晶体场 (CF) 激发。这些激发被确定为主要是从地面单线态 A$_1$ 到下一个激发双线态 E 的磁偶极跃迁，被 D$_3$ 对称性的晶体场分开。模式的精细结构在低温下得以解析。它在轻掺杂和纯 Tm 硼酸盐中表现不同，与具有 D$_3$ 对称性的局部晶体场的不同畸变一致。在 CF 跃迁附近观察到强烈的自然光学活性，导致偏振面旋转高达 25 度。通过磁偶极子跃迁对动态磁电敏感性的贡献并考虑局部畸变的分类来定量描述光学活动。", "authors": [{"name": "A.M. Kuzmenko"}, {"name": "V.Yu. Ivanov"}, {"name": "S.V. Garnov"}, {"name": "A. Shuvaev"}, {"name": "A. Pimenov"}, {"name": "K.N. Boldyrev"}, {"name": "I. A. Gudim"}, {"name": "A.A. Mukhin"}], "featured_authors": [{"name": "A.M. Kuzmenko"}, {"name": "V.Yu. Ivanov"}, {"name": "S.V. Garnov"}, {"name": "K.N. Boldyrev"}, {"name": "I. A. Gudim"}, {"name": "A.A. Mukhin"}], "author_count": 8}, {"id": "2604.02246", "category": "cond-mat", "title": "Generalized Beth-Uhlenbeck Approach to the 2+1D Gross-Neveu Model", "abstract": "We study the thermodynamics of the (2+1) dimensional Gross-Neveu model inspired from graphene. We focus on the entropy density of the Gaussian fluctuation beyond the mean field. The full in-medium, momentum-dependent evaluation reveals that the fluctuations give a substantial contribution, even comparable to that of the mean field. We argue that the back-reaction from the fluctuations to the mean field should be included, which reduces the contribution mainly coming from the Landau-damping region. To treat this self-consistently, we use the generalized version of the Beth-Uhlenbeck approach for the entropy density. Compared with the standard Beth-Uhlenbeck formulation, the generalized version suppresses the low-energy contributions while preserving the bound-state effects. The fractional entropy carried by bound excitons and free fermions reveals a sharper crossover of the degrees of freedom in the generalized version, which is consistent with Mott-transition physics in two-dimensional materials.", "url": "https://arxiv.org/abs/2604.02246", "type": "理论", "summary": "我们研究了受石墨烯启发的 (2+1) 维 Gross-Neveu 模型的热力学。我们关注平均场之外的高斯涨落的熵密度。完整的介质内、动量相关的评估表明，波动具有很大的贡献，甚至可以与平均场的贡献相媲美。我们认为应该包括波动对平均场的反作用，这减少了主要来自朗道阻尼区域的贡献。为了自洽地处理这个问题，我们使用 Beth-Uhlenbeck 方法的广义版本来计算熵密度。与标准 Beth-Uhlenbeck 公式相比，广义版本抑制了低能量贡献，同时保留了束缚态效应。束缚激子和自由费米子携带的分数熵揭示了广义版本中自由度的更尖锐的交叉，这与二维材料中的莫特跃迁物理一致。", "authors": [{"name": "Biplab Mahato"}, {"name": "David Blaschke"}], "featured_authors": [{"name": "Biplab Mahato"}, {"name": "David Blaschke"}], "author_count": 2}, {"id": "2604.02263", "category": "cond-mat", "title": "Crossovers from nonlinear wave-packet acceleration to wave-mixing and self-trapping in the Hatano-Nelson model", "abstract": "We demonstrate that wave amplification enables even weak nonlinearities to reshape linear wave-packet transport in nonreciprocal systems. We study the dynamics of bulk Gaussian wave packets in the Hatano--Nelson model with onsite cubic nonlinearity. We show that the interplay between nonlinearity and amplification generates growing frequency shifts that drive the wave packet through three successive dynamical regimes: an early nonlinear-skin regime with coherent propagation, an intermediate wave-mixing regime driven by mode resonances, and a self-trapping regime in which part of the packet localizes while the remainder ballistically spreads along the system favored direction. The crossover time scales are set by the width and average spacing of the eigen-frequency spectrum. Crucially, within the nonlinear-skin regime, we derive analytical predictions for the wave-packet dynamics and show that nonlinearity couples amplification, dispersion, and nonreciprocity, thereby modifying the magnitude of the wave-packet acceleration and introducing an explicit time dependence into its evolution. Focusing nonlinearities suppress the acceleration and cause it to decrease in time, whereas defocusing nonlinearities enhance it and cause it to increase. We further show that nonlinear interactions typically break down the wave packet before the non-Hermitian jump can occur. Our results provide a route toward accurate control of waves in nonreciprocal metamaterials.", "url": "https://arxiv.org/abs/2604.02263", "type": "理论", "summary": "我们证明，波放大甚至可以使弱非线性重塑非互易系统中的线性波包传输。我们研究了具有现场三次非线性的 Hatano--Nelson 模型中体高斯波包的动力学。我们表明，非线性和放大之间的相互作用会产生不断增长的频移，驱动波包通过三个连续的动态机制：具有相干传播的早期非线性集肤机制，由模式共振驱动的中间波混合机制，以及自陷机制，其中波包的一部分局部化，而其余部分沿着系统有利的方向弹道传播。交叉时间尺度由特征频谱的宽度和平均间隔设置。至关重要的是，在非线性皮肤状态下，我们得出了波包动力学的分析预测，并表明非线性耦合了放大、色散和非互易性，从而改变了波包加速度的大小并在其演化中引入了明确的时间依赖性。\n\n聚焦非线性会抑制加速度并导致其随时间减小，而散焦非线性会增强加速度并导致其增加。我们进一步表明，非线性相互作用通常会在非厄米跳跃发生之前破坏波包。我们的结果为精确控制不可逆超材料中的波提供了一条途径。", "authors": [{"name": "Bertin Many Manda"}, {"name": "Vassos Achilleos"}], "featured_authors": [{"name": "Bertin Many Manda"}, {"name": "Vassos Achilleos"}], "author_count": 2}, {"id": "2604.02281", "category": "cond-mat", "title": "AlloyVAE: A generative model for complex probabilistic field-to-field relationships in alloys", "abstract": "The inherent compositional heterogeneity of multi-principal element alloys (MPEAs) gives rise to complex, spatially varying mechanical fields that cannot be uniquely determined from coarse-grained composition descriptors. This non-uniqueness introduces intrinsically probabilistic structure-property relationships, posing a fundamental challenge to conventional deterministic modeling and machine learning approaches that collapse such mappings into average predictions. Here, we present AlloyVAE, a physics-informed generative framework that learns the full conditional distribution of mechanical fields from microstructural inputs. Built upon a conditional variational autoencoder architecture, the model incorporates learned smoothing operators to enhance functional regularity and a self-consistency mechanism to enforce physical plausibility. Trained on atomistic simulation data, AlloyVAE accurately predicts distributions of residual stress fields from composition and short-range order, and enables the generation of multiple physically consistent realizations under identical input conditions. Beyond forward prediction, the framework supports inverse design by optimizing composition fields to achieve targeted mechanical responses, and is extensible to coupled mappings involving eigenstrain. By capturing one-to-many structure-property relationships in heterogeneous materials, this work establishes a probabilistic paradigm for materials modeling and design, providing a scalable alternative to conventional simulations for navigating high-dimensional compositional spaces.", "url": "https://arxiv.org/abs/2604.02281", "type": "理论+数值", "summary": "多主元合金 (MPEA) 固有的成分不均匀性会产生复杂的、空间变化的机械场，而这些机械场无法通过粗粒成分描述符唯一确定。这种非唯一性引入了本质上的概率结构-属性关系，对传统的确定性建模和机器学习方法提出了根本性挑战，这些方法将这种映射分解为平均预测。在这里，我们提出了 AlloyVAE，这是一种基于物理的生成框架，可以从微观结构输入中学习机械场的完整条件分布。该模型建立在条件变分自动编码器架构的基础上，结合了学习的平滑算子来增强功能规律性和自我一致性机制来增强物理合理性。 AlloyVAE 经过原子模拟数据的训练，可以根据成分和短程有序准确预测残余应力场的分布，并能够在相同的输入条件下生成多个物理一致的实现。\n\n除了正向预测之外，该框架还通过优化成分场来支持逆向设计，以实现目标机械响应，并且可扩展到涉及特征应变的耦合映射。通过捕获异质材料中一对多的结构-性能关系，这项工作为材料建模和设计建立了概率范例，为导航高维组合空间的传统模拟提供了可扩展的替代方案。", "authors": [{"name": "Ningyu Yan"}, {"name": "Zhuocheng Xie"}, {"name": "Kai Guo"}, {"name": "Yejun Gu"}, {"name": "Huajian Gao"}, {"name": "Yang Xiang"}], "featured_authors": [{"name": "Ningyu Yan"}, {"name": "Zhuocheng Xie"}, {"name": "Kai Guo"}, {"name": "Yejun Gu"}, {"name": "Huajian Gao"}, {"name": "Yang Xiang"}], "author_count": 6}, {"id": "2604.02298", "category": "cond-mat", "title": "Chiral skyrmionic superconductivity from doping a Chern Ferromagnet", "abstract": "We show that chiral superconductivity can be stabilized by hole doping a Chern ferromagnet. Performing exact diagonalization and density-matrix-renormalization-group calculations on the repulsive Kane-Mele-Hubbard model at hole doping relative to filling $\\nu=1$ electron per unit cell, we find that a Cooper pair formed by a magnon (spin-flip excitation) bound to two holes is stabilized at sufficiently strong interactions and sufficiently large Ising spin-orbit coupling (SOC). This Cooper pair exhibits both finite spin chirality -- signaling a noncoplanar skyrmionic spin texture -- and chiral $f$-wave symmetry. The pairing and spin chirality are set by the Chern number/polarization of the parent Chern ferromagnet. We further find that interactions between skyrmion Cooper pairs evolve from repulsive to attractive as the Ising SOC increases, revealing an intermediate-SOC region where chiral superconductivity can emerge from the condensation of hole-skyrmion Cooper pairs. Our findings provide a novel microscopic mechanism for chiral superconductivity and may be relevant for the recent observation of superconductivity in the MoTe$_2$ moiré superlattice.", "url": "https://arxiv.org/abs/2604.02298", "type": "理论+数值", "summary": "我们证明，可以通过对陈铁磁体进行空穴掺杂来稳定手性超导性。通过对空穴掺杂的排斥 Kane-Mele-Hubbard 模型（相对于每个晶胞填充 $\\nu=1$ 电子）进行精确的对角化和密度矩阵重整化群计算，我们发现由绑定到两个空穴的磁振子（自旋翻转激发）形成的库珀对在足够强的相互作用和足够大的伊辛自旋轨道耦合 (SOC) 下稳定。该库珀对同时表现出有限自旋手性（表示非共面斯格明子自旋纹理）和手性 $f$ 波对称性。配对和自旋手性由母体陈铁磁体的陈数/极化设定。我们进一步发现，随着伊辛 SOC 的增加，斯格明子库珀对之间的相互作用从排斥演变为吸引，揭示了一个中间 SOC 区域，在该区域中，空穴-斯格明子库珀对的凝聚可以出现手性超导性。我们的研究结果为手性超导性提供了一种新颖的微观机制，可能与最近在 MoTe$_2$ 莫尔超晶格中观察超导性相关。", "authors": [{"name": "Miguel Gonçalves"}, {"name": "Kun Yang"}, {"name": "Shi-Zeng Lin"}], "featured_authors": [{"name": "Miguel Gonçalves"}, {"name": "Kun Yang"}, {"name": "Shi-Zeng Lin"}], "author_count": 3}, {"id": "2604.02307", "category": "cond-mat", "title": "Detecting Symmetry-Resolved Entanglement: A Quantum Monte Carlo Approach", "abstract": "Symmetry and entanglement are two fundamental concepts in quantum many-body physics. Their interplay is captured by symmetry-resolved entanglement, which decomposes the total entanglement into contributions from different symmetry sectors. Computing symmetry-resolved entanglement in strongly interacting higher-dimensional quantum systems remains challenging. Here, we introduce a quantum Monte Carlo (QMC) approach for computing symmetry-resolved Rényi entropies (SRRE) in large-scale interacting systems by measuring disorder (symmetry-twisted) operators on replica manifolds and reconstructing SRRE from the corresponding charged moments. We apply this method to the transverse-field Ising model (TFIM) in one and two dimensions. In one dimension, we recover the conformal-field-theory prediction for the logarithmic scaling of the disorder operator and observe the expected approach to entanglement equipartition. In two dimensions, our data provide numerical evidence consistent with entanglement equipartition at the (2+1)D Ising critical point. We further apply the framework to the 1D Heisenberg chain and obtain results consistent with the expected asymptotic scaling and finite-size corrections in the U(1)-resolved sectors. Our work establishes a practical numerical route to symmetry-resolved entanglement in interacting lattice models and provides a useful framework for future studies beyond one dimension.", "url": "https://arxiv.org/abs/2604.02307", "type": "理论+数值", "summary": "对称和纠缠是量子多体物理学中的两个基本概念。它们的相互作用通过对称解决的纠缠来捕获，该纠缠将总纠缠分解为来自不同对称部分的贡献。在强相互作用的高维量子系统中计算对称解决的纠缠仍然具有挑战性。在这里，我们引入了一种量子蒙特卡罗（QMC）方法，通过测量副本流形上的无序（对称扭曲）算子并从相应的带电矩重建 SRRE，来计算大规模交互系统中的对称分辨 Rényi 熵（SRRE）。我们将此方法应用于一维和二维横向场伊辛模型（TFIM）。在一维中，我们恢复了无序算子对数标度的共形场论预测，并观察了纠缠均分的预期方法。在二维中，我们的数据提供了与 (2+1)D 伊辛临界点处的纠缠均分一致的数值证据。\n\n我们进一步将该框架应用于一维海森堡链，并获得与 U(1) 解析扇区中预期渐近缩放和有限尺寸校正一致的结果。我们的工作为相互作用晶格模型中对称解决纠缠建立了一条实用的数值途径，并为未来超越一维的研究提供了一个有用的框架。", "authors": [{"name": "Kuangjie Chen"}, {"name": "Weizhen Jia"}, {"name": "Xiaopeng Li"}, {"name": "René Meyer"}, {"name": "Jiarui Zhao"}], "featured_authors": [{"name": "Kuangjie Chen"}, {"name": "Weizhen Jia"}, {"name": "Xiaopeng Li"}, {"name": "René Meyer"}, {"name": "Jiarui Zhao"}], "author_count": 5}, {"id": "2604.02321", "category": "cond-mat", "title": "Robust Correlation-Induced Localization Under Time-Reversal Symmetry Breaking", "abstract": "We study Anderson localization in a one-dimensional disordered system with long-range correlated hopping decaying as $1/r^{a}$ with complex hopping amplitudes that break time-reversal symmetry in a tunable fashion by varying their argument. We find analytically a corelation-induced algebraic localization that is robust to a finite strength of the time-reversal-symmetry-breaking parameter, beyond which all states delocalize. This establishes a localization--delocalization transition driven by the interplay between long-ranged correlated hopping and time-reversal symmetry breaking. In addition to obtaining the static localization phase diagram, we also investigate the dynamical phase diagram through the lens of wavepacket spreading. We find that the growth in time of the mean-squared displacement of a wavepacket, which is subdiffusive for the time-reversal symmetric case, becomes diffusive for any finite value of the time-reversal-symmetry-breaking parameter.", "url": "https://arxiv.org/abs/2604.02321", "type": "理论+数值", "summary": "我们研究一维无序系统中的安德森定位，该系统的长程相关跳变衰减为 $1/r^{a}$，其复杂的跳变幅度通过改变其参数以可调谐的方式打破时间反转对称性。我们通过分析发现了一种相关诱导的代数局域性，它对于时间反转对称性破缺参数的有限强度具有鲁棒性，超过该强度，所有状态都会离域。这建立了由长程相关跳跃和时间反转对称性破缺之间的相互作用驱动的定位-离域转变。除了获得静态定位相图外，我们还通过波包扩展的透镜研究动态相图。我们发现，波包均方位移随时间的增长（对于时间反演对称情况而言是次扩散的）对于时间反演对称性破缺参数的任何有限值而言都变得扩散。", "authors": [{"name": "Bikram Pain"}, {"name": "Sthitadhi Roy"}, {"name": "Jens H. Bardarson"}, {"name": "Ivan M. Khaymovich"}], "featured_authors": [{"name": "Bikram Pain"}, {"name": "Sthitadhi Roy"}, {"name": "Jens H. Bardarson"}, {"name": "Ivan M. Khaymovich"}], "author_count": 4}, {"id": "2604.02325", "category": "cond-mat", "title": "Loop-level surrogate modeling of dopant-distribution effects in Ba(Zr,Ti)O$_3$", "abstract": "Barium titanate-based perovskites are important candidates for lead-free dielectric and electromechanical technologies. In Zr-substituted BaTiO$_3$ (BZT), functional behavior is usually discussed in terms of the average Zr concentration, while the influence of dopant spatial distribution beyond average concentration is less understood and difficult to explore systematically. Here we present an accelerated materials-design workflow that links controlled dopant distributions to full field-driven response curves. We generate a broad set of Zr distributions spanning a continuum of nanoscale arrangements, with layers, rods, dots, and lamellae serving as representative end-member motifs, and encode each configuration using a compact, parametrized descriptor model. Effective-Hamiltonian molecular dynamics is used to compute polarization-electric-field and strain-field hysteresis loops, and we train a conditional autoencoder surrogate to predict complete loops directly from the distribution parameters. This surrogate enables rapid screening and dense, property-selective design maps at scales that are not feasible with direct simulations alone, and it supports targeted follow-up simulations in regions of interest. Using the predicted loop database, we screen the distribution space for multiple functional targets, including energy-storage performance, electromechanical response, and switching behavior, and identify the corresponding dopant distribution motif families. The resulting design maps show that dopant distribution is an independent tuning parameter that can strongly affect hysteresis behavior and loop-derived figures of merit: layer-like motifs, vertical lamellae, and nanoplate-like inclusions emerge in different performance regimes. More generally, predicting full response curves enables screening of other loop-derived targets and multi-objective design in substituted ferroelectrics.", "url": "https://arxiv.org/abs/2604.02325", "type": "理论+数值", "summary": "钛酸钡基钙钛矿是无铅介电和机电技术的重要候选者。在Zr取代的BaTiO$_3$（BZT）中，功能行为通常根据平均Zr浓度来讨论，而超出平均浓度的掺杂剂空间分布的影响却知之甚少，也很难系统地探索。在这里，我们提出了一种加速材料设计工作流程，将受控掺杂剂分布与完整的场驱动响应曲线联系起来。我们生成了一系列跨越纳米级排列连续体的 Zr 分布，其中层、棒、点和片层作为代表性的端员图案，并使用紧凑的参数化描述符模型对每个配置进行编码。有效哈密尔顿分子动力学用于计算极化电场和应变场磁滞回线，我们训练条件自动编码器代理来直接从分布参数预测完整的回线。\n\n这种替代方法能够实现快速筛选和密集的、属性选择性的设计图，其规模是仅通过直接模拟无法实现的，并且它支持在感兴趣的区域进行有针对性的后续模拟。使用预测的循环数据库，我们筛选多个功能目标的分布空间，包括能量存储性能、机电响应和开关行为，并识别相应的掺杂剂分布基序族。由此产生的设计图表明，掺杂剂分布是一个独立的调节参数，可以强烈影响磁滞行为和环路导出的品质因数：层状图案、垂直薄片和纳米板状夹杂物出现在不同的性能状态中。更一般地说，预测完整响应曲线可以筛选其他环路衍生目标并在替代铁电体中进行多目标设计。", "authors": [{"name": "Heiko Röthl"}, {"name": "Elke Kraker"}, {"name": "Julien Magnien"}, {"name": "Manfred Mücke"}, {"name": "Florian Mayer"}], "featured_authors": [{"name": "Heiko Röthl"}, {"name": "Elke Kraker"}, {"name": "Julien Magnien"}, {"name": "Manfred Mücke"}, {"name": "Florian Mayer"}], "author_count": 5}, {"id": "2604.01272", "category": "hep-th", "title": "Three-form lifting of dilaton flat direction without and with gravity", "abstract": "Spontaneous scale symmetry breaking is commonly associated with a flat direction in the action. We show that this need not be so if the dilaton is coupled to a three-form field in a manner compatible with gauge invariance and dilatations. The resulting effective dynamics lifts the flat direction without introducing explicit scale-violating operators. When gravity is included, the corresponding potential takes the form of an exponential plateau.", "url": "https://arxiv.org/abs/2604.01272", "type": "理论", "summary": "自发尺度对称性破缺通常与动作中的平坦方向相关。我们证明，如果膨胀子以与规范不变性和膨胀兼容的方式耦合到三形式场，则不必如此。由此产生的有效动力学提升了平坦方向，而无需引入显式的尺度违规运算符。当包括重力时，相应的势呈现指数平台的形式。", "authors": [{"name": "Georgios K. Karananas"}], "featured_authors": [{"name": "Georgios K. Karananas"}], "author_count": 1}, {"id": "2604.01273", "category": "hep-th", "title": "Symplectic structure in open string field theory III: Electric field", "abstract": "We use a new formula for the symplectic structure on the phase space of open string field theory to evaluate the energy of a D-brane carrying a constant electric flux. This is shown to be consistent with the e
