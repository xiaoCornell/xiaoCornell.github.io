nergy computed using the Dirac-Born-Infeld action through a generalization of the Ellwood invariant to nonpolynomial open string field theories.", "url": "https://arxiv.org/abs/2604.01273", "type": "理论", "summary": "我们使用开弦场理论相空间辛结构的新公式来评估携带恒定电通量的 D 膜的能量。这被证明与通过将埃尔伍德不变量推广到非多项式开弦场理论而使用狄拉克-玻恩-因费尔德作用计算的能量一致。", "authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}], "featured_authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}], "author_count": 3}, {"id": "2604.01275", "category": "hep-th", "title": "Descending into the Modular Bootstrap", "abstract": "In this paper, we attempt to explore the landscape of two-dimensional conformal field theories (2d CFTs) by efficiently searching for numerical solutions to the modular bootstrap equation using machine-learning-style optimization. The torus partition function of a 2d CFT is fixed by the spectrum of its primary operators and its chiral algebra, which we take to be the Virasoro algebra with $c>1$. We translate the requirement that this partition function is modular invariant into a loss function, which we then minimize to identify possible primary spectra. Our approach involves two technical innovations that facilitate finding reliable candidate CFTs. The first is a strategy to estimate the uncertainty associated with truncating the spectrum to the lowest dimension operators. The second is the use of a new singular-value-based optimizer (Sven) that is more effective than gradient descent at navigating the hierarchical structure of the loss landscape. We numerically construct candidate truncated CFT partition functions with central charges between 1 and $\\frac{8}{7}$, a range devoid of known examples, and argue that these candidates likely come from a continuous space of modular bootstrap solutions. We also provide evidence for a more stringent constraint on the spectral gap near $c = 1$ than the existing bound of $\\Delta_{\\rm gap} \\le \\frac{c}{6} + \\frac{1}{3}$.", "url": "https://arxiv.org/abs/2604.01275", "type": "理论", "summary": "在本文中，我们尝试通过使用机器学习式优化有效搜索模自举方程的数值解来探索二维共形场论（2d CFT）的前景。 2d CFT 的环面配分函数由其主要算子的谱及其手性代数确定，我们将其视为 $c>1$ 的 Virasoro 代数。我们将配分函数模不变的要求转化为损失函数，然后将其最小化以识别可能的主光谱。我们的方法涉及两项技术创新，有助于寻找可靠的候选 CFT。第一个是估计与将频谱截断为最低维算子相关的不确定性的策略。第二个是使用新的基于奇异值的优化器（Sven），它在导航损失景观的层次结构方面比梯度下降更有效。\n\n我们以数字方式构造候选截断 CFT 配分函数，其中心电荷在 1 和 $\\frac{8}{7}$ 之间，这是一个没有已知示例的范围，并认为这些候选函数可能来自模块化引导解决方案的连续空间。我们还提供了证据，表明对 $c = 1$ 附近的光谱间隙的约束比 $\\Delta_{\\rm gap} \\le \\frac{c}{6} + \\frac{1}{3}$ 的现有界限更严格。", "authors": [{"name": "Nathan Benjamin"}, {"name": "A. Liam Fitzpatrick"}, {"name": "Wei Li"}, {"name": "Jesse Thaler"}], "featured_authors": [{"name": "Nathan Benjamin"}, {"name": "A. Liam Fitzpatrick"}, {"name": "Wei Li"}, {"name": "Jesse Thaler"}], "author_count": 4}, {"id": "2604.01320", "category": "hep-th", "title": "Solving Lévy Sachdev-Ye-Kitaev Model", "abstract": "We present an exact solution in the large-$N$ limit of the Lévy Sachdev-Ye-Kitaev (LSYK) model introduced in Ref. [1], wherein the couplings are drawn from a Lévy Stable distribution parameterized by a tail exponent $\\mu \\in [0, 2]$. Starting from the Hamiltonian and its associated partition function, we highlight the key differences from the standard Gaussian SYK model and derive the large-$N$ Schwinger-Dyson equations via a bosonic oscillator representation of the action. These equations are solved both numerically and analytically in the large-$q$ and infrared limits. We subsequently analyze the chaotic properties of the model by computing the Krylov exponent from the large-$q$ Green's function and extracting the Lyapunov exponent from the $4$-point function. The parameter $\\mu$ continuously interpolates between a free theory at $\\mu = 0$ and the conventional, maximally chaotic Gaussian SYK model at $\\mu = 2$, with non-maximal chaos persisting throughout the intermediate regime $0 < \\mu < 2$. Thermodynamic quantities, including the entropy, free energy, average energy, and specific heat capacity, are computed and compared with their Gaussian SYK counterparts. The interpretations of the thermodynamics are discussed with respect to the holographic dual and non-Fermi liquid theory. Finally, we discuss an alternative representation of the LSYK model based on a distinct decomposition of the Lévy Stable distribution, which establishes a non-trivial connection to Gaussian SYK, and provide supporting analytical and numerical results in the appendices.", "url": "https://arxiv.org/abs/2604.01320", "type": "理论", "summary": "我们在参考文献 1 中介绍的 Lévy Sachdev-Ye-Kitaev (LSYK) 模型的大 $N$ 限制中提出了精确的解决方案。 [1]，其中耦合是从由尾部指数 $\\mu \\in [0, 2]$ 参数化的 Lévy 稳定分布中得出的。从哈密顿量及其相关的配分函数开始，我们强调了与标准高斯 SYK 模型的主要区别，并通过作用的玻色子振荡器表示导出了大 $N$ 施温格-戴森方程。这些方程在大$q$ 和红外极限下进行了数值求解和解析求解。随后，我们通过从大 $q$ 格林函数计算 Krylov 指数并从 $4$ 点函数中提取 Lyapunov 指数来分析模型的混沌特性。参数 $\\mu$ 在 $\\mu = 0$ 的自由理论和 $\\mu = 2$ 的传统最大混沌高斯 SYK 模型之间连续插值，非最大混沌在整个中间状态 $0 < \\mu < 2$ 中持续存在。计算热力学量，包括熵、自由能、平均能量和比热容，并与高斯 SYK 对应物进行比较。\n\n热力学的解释是关于全息对偶和非费米液体理论进行讨论的。最后，我们讨论基于 Lévy 稳定分布的独特分解的 LSYK 模型的替代表示，它与高斯 SYK 建立了非平凡的联系，并在附录中提供了支持性的分析和数值结果。", "authors": [{"name": "Budhaditya Bhattacharjee"}, {"name": "William. E. Salazar"}, {"name": "Alexei Andreanov"}, {"name": "Dario Rosa"}], "featured_authors": [{"name": "Budhaditya Bhattacharjee"}, {"name": "William. E. Salazar"}, {"name": "Alexei Andreanov"}, {"name": "Dario Rosa"}], "author_count": 4}, {"id": "2604.01384", "category": "hep-th", "title": "AI usage in string theory, a case study: String Vacua in the Interior of Moduli Space", "abstract": "These proceedings start with a discussion of my recent experiences with large language models and potential implications for their usage in our field. This is followed by an AI generated summary of my talk at the workshop ``Recent Progress in Computational String Geometry,'' held at the Chennai Mathematical Institute in January 2026. The focus is on four-dimensional $\\mathcal{N}=1$ Minkowski vacua in type IIB compactifications that live deep in the interior of moduli space and admit an exact worldsheet description in terms of Landau--Ginzburg models. The main examples are the $1^9$ and $2^6$ models, mirror to rigid Calabi--Yau threefolds and therefore free of Kähler moduli. This makes them ideal laboratories for testing whether fluxes can stabilize all fields and for probing conjectures about the string landscape and the swampland. Based mostly on arXiv:2406.03435 , arXiv:2407.16756 , we review how higher-order terms in the flux superpotential can stabilize fields that remain massless at quadratic order, how isolated Minkowski vacua arise in the $2^6$ model, and why these constructions provide sharp data for the tadpole and massless Minkowski conjectures. We also emphasize the role of arXiv:2407.16758 by other authors, where the first Minkowski vacua of this type with all fields massive were identified.", "url": "https://arxiv.org/abs/2604.01384", "type": "理论", "summary": "这些会议首先讨论我最近在大型语言模型方面的经验以及它们在我们领域的使用的潜在影响。接下来是人工智能生成的我在 2026 年 1 月在钦奈数学研究所举办的“计算弦几何的最新进展”研讨会上的演讲摘要。重点是 IIB 型紧化中的四维 $\\mathcal{N}=1$ Minkowski 真空，它位于模空间内部深处，并承认根据 Landau-Ginzburg 模型进行精确的世界表描述。主要的例子是 $1^9$ 和 $2^6$ 模型，镜像到刚性 Calabi-Yau 三重，因此没有 Kähler 模量。这使它们成为测试通量是否可以稳定所有场以及探索有关弦景观和沼泽地猜想的理想实验室。主要基于 arXiv:2406.03435 和 arXiv:2407.16756 ，我们回顾了通量超势中的高阶项如何稳定二次阶保持无质量的场、$2^6$ 模型中如何出现孤立的闵可夫斯基真空，以及为什么这些结构为蝌蚪和无质量闵可夫斯基猜想提供了清晰的数据。\n\n我们还强调了其他作者的 arXiv:2407.16758 的作用，其中确定了这种类型的第一个 Minkowski 真空，所有字段都是大量的。", "authors": [{"name": "Timm Wrase"}], "featured_authors": [{"name": "Timm Wrase"}], "author_count": 1}, {"id": "2604.01436", "category": "hep-th", "title": "Entanglement entropy and conformal bounds for $d=5$ CFTs", "abstract": "The entanglement entropy of spacetime regions $A$ in odd-dimensional conformal field theories (CFTs) contains a universal constant term, $(-1)^{\\frac{d-1}{2}}F(A)$. This quantity can be robustly defined by considering the mutual information of pairs of slightly deformed versions of $A$. In the case of general three-dimensional CFTs, $F(A)$ is positive definite and bounded below by the round disk result, $F(A)\\geq F_0\\equiv F(\\partial A=\\mathbb{S}^1)$. Additionally, strong evidence has been provided that for every region $A$, $F(A)/F_0$ is maximized, within the space of CFT$_3$'s, by the free scalar field result. In this paper we show that while $F(A)$ remains a local minimum around $F_0\\equiv F(\\partial A=\\mathbb{S}^3)$ for small deformations of the spherical entangling surface, it can take values of arbitrarily large magnitude with either sign for more general regions, and hence it is neither upper- nor lower-bounded in general CFT$_5$'s. We argue that an analogous conjecture regarding the extremization of $F(A)/F_0$ for general regions within the space of theories fails in $d=5$. We instead analyze the viability of the weaker bound, $F_{\\epsilon}/F_0\\leq \\left[F_{\\epsilon}/F_0\\right]_{\\text{free scalar}}$, $\\forall$CFT$_5$ for general small geometric deformations of the spherical entangling surface. This is equivalent to a general constraint involving the stress-tensor two-point function $C_T$ and the Euclidean partition function on the sphere, namely, $C_T/F_0\\leq \\left[C_T/F_0\\right]_{\\text{ free scalar}}\\approx 0.314$, which we show to hold for all known CFT$_5$'s. We also comment on possible extensions of this result to higher dimensions.", "url": "https://arxiv.org/abs/2604.01436", "type": "理论", "summary": "奇维共形场论 (CFT) 中时空区域 $A$ 的纠缠熵包含一个通用常数项 $(-1)^{\\frac{d-1}{2}}F(A)$。通过考虑 $A$ 的稍微变形版本对的相互信息，可以稳健地定义该数量。在一般三维 CFT 的情况下，$F(A)$ 是正定的，并以圆盘结果 $F(A)\\geq F_0\\equiv F(\\partial A=\\mathbb{S}^1)$ 为界。此外，还提供了强有力的证据表明，对于每个区域 $A$，$F(A)/F_0$ 在 CFT$_3$ 的空间内通过自由标量场结果最大化。在本文中，我们表明，虽然对于球形纠缠表面的小变形，$F(A)$ 在 $F_0\\equiv F(\\partial A=\\mathbb{S}^3)$ 附近保持局部最小值，但对于更一般的区域，它可以采用带有任一符号的任意大的值，因此它在一般 CFT$_5$ 中既不是上限也不是下界。我们认为，关于理论空间内一般区域的 $F(A)/F_0$ 极端化的类似猜想在 $d=5$ 中失败。\n\n相反，我们分析较弱界限 $F_{\\epsilon}/F_0\\leq \\left[F_{\\epsilon}/F_0\\right]_{\\text{free scalar}}$、$\\forall$CFT$_5$ 对于球形纠缠表面的一般小几何变形的可行性。这相当于涉及球体上应力张量两点函数 $C_T$ 和欧几里得配分函数的一般约束，即 $C_T/F_0\\leq \\left[C_T/F_0\\right]_{\\text{ 自由标量}}\\approx 0.314$，我们证明它对于所有已知的 CFT$_5$ 都成立。我们还评论了该结果可能扩展到更高维度的情况。", "authors": [{"name": "Pablo Bueno"}, {"name": "Adam Fernández García"}, {"name": "Francesco Gentile"}, {"name": "Oscar Lasso Andino"}, {"name": "Javier Moreno"}], "featured_authors": [{"name": "Pablo Bueno"}, {"name": "Adam Fernández García"}, {"name": "Francesco Gentile"}, {"name": "Oscar Lasso Andino"}, {"name": "Javier Moreno"}], "author_count": 5}, {"id": "2604.01804", "category": "hep-th", "title": "The $W_n$ Light One-Point Torus Conformal Block", "abstract": "We study the light asymptotic limit of the one-point torus conformal block in $A_{n-1}$ Toda field theory. Through the AGT correspondence, this problem can be translated into the computation of the instanton partition function of four-dimensional ${\\cal N}=2^{\\ast}$ $U(n)$ supersymmetric Yang--Mills theory, which we then examine in the limit $b\\to 0$ at fixed conformal dimensions. We show that, in this regime, the instanton sum simplifies drastically: for each Young diagram, only boxes with specific arm lengths contribute to the bifundamental factors. Exploiting this property, we derive an explicit representation for the light one-point torus $W_n$ conformal block valid for arbitrary $n\\ge 2$. As a consistency check, we specialize our construction to the Liouville case $n=2$ and compare it with the previously known hypergeometric representation of the torus block in the light limit. We also discuss the $W_3$ case and its relation to a known alternative representation obtained by the shadow formalism.", "url": "https://arxiv.org/abs/2604.01804", "type": "理论", "summary": "我们研究了$A_{n-1}$ Toda 场论中单点环面共角块的光渐近极限。通过AGT对应关系，这个问题可以转化为四维${\\cal N}=2^{\\ast}$ $U(n)$超对称Yang--Mills理论的瞬子配分函数的计算，然后我们在固定共形维数的极限$b\\to 0$中检验该理论。我们表明，在这种情况下，瞬时子和大大简化：对于每个杨氏图，只有具有特定臂长的盒子对双基本因子有贡献。利用这一属性，我们得出了对任意 $n\\ge 2$ 有效的光单点环面 $W_n$ 保形块的显式表示。作为一致性检查，我们将我们的构造专门针对 Liouville 情况 $n=2$ 并将其与先前已知的光极限下环面块的超几何表示进行比较。我们还讨论了 $W_3$ 情况及其与通过影子形式主义获得的已知替代表示的关系。", "authors": [{"name": "Armen Poghosyan"}, {"name": "Hasmik Poghosyan"}], "featured_authors": [{"name": "Armen Poghosyan"}, {"name": "Hasmik Poghosyan"}], "author_count": 2}, {"id": "2604.01883", "category": "hep-th", "title": "Symmetries and Critical Dimensions of Tensionless Branes", "abstract": "In this work, we investigate the worldsheet symmetry of bosonic brane theories and its quantum consistency in the tensionless limit. We find that the residual worldsheet symmetry after specific gauge fixing is generated by a novel algebra, denoted as $g^{(p)}_\\lambda$. To achieve full quantization of the tensionless brane, we introduce a $bc$ ghost system and derive the overall BRST charge. Moreover, we calculate the quantum anomaly of the $g^{(p)}_\\lambda$ algebra for general parameters $p$ and $\\lambda$ in the framework of canonical quantization. After demanding that this quantum anomaly vanishes, we successfully derive the critical dimensions of the bosonic brane theories. Especially, we obtain nontrivial solutions: $p=3$ in $D=4$ spacetime dimensions when $\\lambda=-3$ and $p=6$ in $D=7$ spacetime dimensions when $\\lambda=3$.", "url": "https://arxiv.org/abs/2604.01883", "type": "理论", "summary": "在这项工作中，我们研究了玻色膜理论的世界面对称性及其在无张力极限下的量子一致性。我们发现特定规范固定后的剩余世界面对称性是由一个新颖的代数生成的，表示为 $g^{(p)}_\\lambda$。为了实现无张力膜的完全量化，我们引入了 $bc$ 幽灵系统并推导出总体 BRST 电荷。此外，我们在规范量子化框架下计算了通用参数$p$和$\\lambda$的$g^{(p)}_\\lambda$代数的量子异常。在要求这种量子异常消失后，我们成功推导了玻色膜理论的临界尺寸。特别是，我们得到了非平凡的解：当$\\lambda=-3$时，在$D=4$时空维度中$p=3$；当$\\lambda=3$时，在$D=7$时空维度中$p=6$。", "authors": [{"name": "Bin Chen"}, {"name": "Zezhou Hu"}], "featured_authors": [{"name": "Bin Chen"}, {"name": "Zezhou Hu"}], "author_count": 2}, {"id": "2604.02133", "category": "hep-th", "title": "Effective Field Theory for Superconducting Phase Transitions", "abstract": "Employing the Schwinger-Keldysh formalism, we formulate an effective field theory for s-wave superconducting phase transition, where the dynamical variables consist of electromagnetic gauge field and a complex scalar order parameter. Symmetry-constrained effective action allows systematic handling of dissipations and fluctuations. In particular, we explore the physical implications of higher-order terms, including those involving additional dynamical fields as well as higher time derivatives, for the real-time dynamics near the superconducting critical point. When appropriately truncated, the effective field theory reproduces the phenomenological Ginzburg-Landau equations. Upon crossing the critical temperature into the low-temperature phase, the electromagnetic gauge symmetry undergoes spontaneous breaking induced by the condensate of the order parameter. Collective excitation analysis reveals that the Higgs mode behaves as an overdamped diffusive mode near the critical point, while the phase fluctuation is absorbed into the gauge field via the Higgs mechanism. Via the holographic Schwinger-Keldysh technique, rigorous validation in a holographic superconductor confirms the structure of the effective action and quantifies the Wilsonian coefficients. The holographic results uncover a complex relaxation parameter that is indicative of oscillatory dynamics, a hallmark of strongly coupled systems.", "url": "https://arxiv.org/abs/2604.02133", "type": "理论", "summary": "采用 Schwinger-Keldysh 形式，我们提出了 s 波超导相变的有效场论，其中动力学变量由电磁规范场和复标量阶参数组成。对称约束的有效作用允许系统地处理耗散和波动。特别是，我们探索了高阶项的物理含义，包括涉及附加动力场以及更高时间导数的项，对于超导临界点附近的实时动力学。当适当截断时，有效场论再现了唯象金兹堡-朗道方程。当跨越临界温度进入低温阶段时，电磁规范对称性会因有序参数的凝聚而发生自发破缺。集体激励分析表明，希格斯模式在临界点附近表现为过阻尼扩散模式，而相位涨落通过希格斯机制被吸收到规范场中。\n\n通过全息施温格-凯尔迪什技术，全息超导体中的严格验证确认了有效作用的结构并量化了威尔逊系数。全息结果揭示了一个复杂的弛豫参数，该参数表示振荡动力学，这是强耦合系统的标志。", "authors": [{"name": "Yanyan Bu"}, {"name": "Zexin Yang"}], "featured_authors": [{"name": "Yanyan Bu"}, {"name": "Zexin Yang"}], "author_count": 2}, {"id": "2604.02228", "category": "hep-th", "title": "Gravitational null rays: Covariant Quantization and the Dressing Time", "abstract": "We quantize the degrees of freedom on a gravitational null ray segment in a fully gauge-invariant manner by using the dressing time as a quantum reference frame (QRF). Our work goes beyond previous models in that the QRF we employ is made out of the gravitational field itself, and accounts for the full group of diffeomorphisms along the ray, not just a locally compact subgroup. The key tool we introduce is covariant normal ordering, a QRF-dependent but background-independent renormalization prescription that restores diffeomorphism covariance at the quantum level. This enables the definition of a quantum dressing map whose image is the algebra of gauge-invariant observables. We find that this algebra carries the structure of a Virasoro crossed product, and that the dressing map induces a deformed product on gauge-fixed operators which can be understood as a quantization of the Dirac bracket, with consequences for the fluctuations of observables. We explain how to cancel anomalies in the physical Hilbert space representation of the gauge-invariant algebra by including a deformation at the classical level, thereby eliminating all spurious degrees of freedom at the quantum level. The physical Hilbert space admits a Page-Wootters reduction map to the perspective of the dressing time, and we show that the dressing time is non-ideal in the sense that its distinct coherent states have non-vanishing overlaps governed by the Teo-Takhtajan energy, i.e. the Kähler potential for Virasoro coadjoint orbits.", "url": "https://arxiv.org/abs/2604.02228", "type": "理论", "summary": "我们通过使用修整时间作为量子参考系（QRF），以完全规范不变的方式量化引力零射线段上的自由度。我们的工作超越了以前的模型，因为我们采用的 QRF 是由引力场本身构成的，并且解释了沿射线的完整微分同胚群，而不仅仅是局部紧致子群。我们引入的关键工具是协变正态排序，这是一种依赖于 QRF 但与背景无关的重整化方案，可以在量子水平上恢复微分同胚协方差。这使得能够定义量子修整图，其图像是规范不变可观测量的代数。我们发现该代数具有 Virasoro 交叉积的结构，并且修整图会在规范固定算子上引起变形积，这可以理解为狄拉克括号的量化，从而对可观测量的波动产生影响。我们解释了如何通过在经典水平上包含变形来消除规范不变代数的物理希尔伯特空间表示中的异常，从而消除量子水平上的所有虚假自由度。\n\n物理希尔伯特空间允许从修整时间的角度看佩奇-伍特斯简化图，并且我们表明修整时间是非理想的，因为其不同的相干态具有由 Teo-Takhtajan 能量控制的非零重叠，即 Virasoro 共伴轨道的凯勒势。", "authors": [{"name": "Laurent Freidel"}, {"name": "Josh Kirklin"}], "featured_authors": [{"name": "Laurent Freidel"}, {"name": "Josh Kirklin"}], "author_count": 2}, {"id": "2604.02294", "category": "hep-th", "title": "Recursive relations from diffeomorphism in the Randall-Sundrum model", "abstract": "Models of gravity in warped extra dimensions enjoy invariance under diffeomorphism. We derive the nonlinear transformation rules for the metric perturbations in the unitary gauge. As an off-shell symmetry, the main consequence of diffeomorphism is a set of recursive relations linking consecutive orders in the field expansion of the effective Lagrangian. The physical consequences are briefly explored for the Randall-Sundrum model with hard branes.", "url": "https://arxiv.org/abs/2604.02294", "type": "理论", "summary": "扭曲额外维度中的引力模型在微分同胚下具有不变性。我们推导出酉规范中度量扰动的非线性变换规则。作为离壳对称性，微分同胚的主要结果是在有效拉格朗日场展开中连接连续阶的一组递归关系。简要探讨了具有硬膜的 Randall-Sundrum 模型的物理后果。", "authors": [{"name": "Haiying Cai"}, {"name": "Giacomo Cacciapaglia"}], "featured_authors": [{"name": "Haiying Cai"}, {"name": "Giacomo Cacciapaglia"}], "author_count": 2}, {"id": "2604.02313", "category": "hep-th", "title": "Topological Effects in Neural Network Field Theory", "abstract": "Neural network field theory formulates field theory as a statistical ensemble of fields defined by a network architecture and a density on its parameters. We extend the construction to topological settings via the inclusion of discrete parameters that label the topological quantum number. We recover the Berezinskii--Kosterlitz--Thouless transition, including the spin-wave critical line and the proliferation of vortices at high temperatures. We also verify the T-duality of the bosonic string, showing invariance under the exchange of momentum and winding on $S^1$, the transformation of the sigma model couplings according to the Buscher rules on constant toroidal backgrounds, the enhancement of the current algebra at self-dual radius, and non-geometric T-fold transition functions.", "url": "https://arxiv.org/abs/2604.02313", "type": "理论", "summary": "神经网络场论将场论表述为由网络架构及其参数密度定义的场的统计集合。我们通过包含标记拓扑量子数的离散参数将构造扩展到拓扑设置。我们恢复了Berezinskii-Kosterlitz-Thouless转变，包括高温下的自旋波临界线和涡旋扩散。我们还验证了玻色弦的 T 对偶性，显示在 $S^1$ 上动量交换和缠绕下的不变性、根据布歇尔规则在恒定环形背景上进行 sigma 模型耦合的变换、自对偶半径下当前代数的增强以及非几何 T 折叠过渡函数。", "authors": [{"name": "Christian Ferko"}, {"name": "James Halverson"}, {"name": "Vishnu Jejjala"}, {"name": "Brandon Robinson"}], "featured_authors": [{"name": "Christian Ferko"}, {"name": "James Halverson"}, {"name": "Vishnu Jejjala"}, {"name": "Brandon Robinson"}], "author_count": 4}, {"id": "2604.01387", "category": "math-ph", "title": "Symmetries of (quasi)periodic materials: Superposability vs. Indistinguishability", "abstract": "This work is devoted to the study of the symmetries of (quasi)periodic architectured materials. For this purpose, the weaker symmetry criterion of indistinguishability is used. It relies on a statistical description of the mesostructure and is defined in terms of the spatial autocorrelation functions of the material under consideration. By using the representation of these autocorrelation functions in Fourier space, the space groups of both periodic and quasiperiodic materials can be obtained. In this context, an image processing methodology is proposed to identify the key characteristics of a material's space group (i.e its point group and its symmorphism) directly from the Fourier transform of the mesostructure. The method is validated on synthetic two-dimensional images of (quasi)periodic architectured materials and it is pointed out, as an illustrative example, that the rotational symmetry of the classical Penrose tiling is of order ten.", "url": "https://arxiv.org/abs/2604.01387", "type": "理论", "summary": "这项工作致力于研究（准）周期性建筑材料的对称性。为此，使用不可区分性的较弱对称性准则。它依赖于细观结构的统计描述，并根据所考虑材料的空间自相关函数来定义。通过使用这些自相关函数在傅里叶空间中的表示，可以获得周期性和准周期性材料的空间群。在这种背景下，提出了一种图像处理方法，可以直接从介观结构的傅立叶变换中识别材料空间群的关键特征（即其点群及其同态）。该方法在（准）周期结构材料的合成二维图像上得到验证，并且作为说明性示例指出，经典彭罗斯平铺的旋转对称性为十阶。", "authors": [{"name": "Markus Hubert"}, {"name": "Christelle Combescure"}, {"name": "Renald Brenner"}, {"name": "Nicolas Auffray"}], "featured_authors": [{"name": "Markus Hubert"}, {"name": "Christelle Combescure"}, {"name": "Renald Brenner"}, {"name": "Nicolas Auffray"}], "author_count": 4}, {"id": "2604.01424", "category": "math-ph", "title": "A Note on the Resolvent Algebra and Functional Integral Approach to the Free Bose Einstein Condensation", "abstract": "In this paper, we present a systematic description of the structure of Bose-Einstein condensation (BEC) in the free Bose gas from the viewpoint of the correspondence between the operator-algebraic formulation based on the resolvent algebra and the functional integral representation. By clarifying the representation-theoretic structure of finite-temperature BEC states and rigorously analyzing the correspondence between their direct integral decomposition and the ergodic decomposition of the associated probability measures, we provide a framework in which general features of phase transitions-such as the emergence of order parameters, the decomposition of states, and clustering properties-are explicitly described using BEC in the free Bose gas as a concrete example. Furthermore, we construct in detail the correspondence between the decomposition of measures in the functional integral approach and that of operator-algebraic representations, thereby establishing the equivalence between the probabilistic and algebraic aspects, and providing a guiding principle for isolating the essential structures by disentangling the additional mathematical complications arising from the treatment of infrared singularities in interacting systems. These results lay a foundation for the rigorous analysis of phase transitions in non-relativistic constructive quantum field theory and quantum statistical mechanics, and serve as a starting point for extensions to interacting models.", "url": "https://arxiv.org/abs/2604.01424", "type": "理论", "summary": "在本文中，我们从基于分解代数的算子代数公式与泛函积分表示之间的对应关系的角度，对自由玻色气体中的玻色-爱因斯坦凝聚（BEC）的结构进行了系统的描述。通过阐明有限温度 BEC 态的表示理论结构，并严格分析其直接积分分解与相关概率测度的遍历分解之间的对应关系，我们提供了一个框架，其中使用自由玻色气体中的 BEC 作为具体示例，明确描述了相变的一般特征，例如序参数的出现、状态分解和聚类属性。\n\n此外，我们详细构建了函数积分方法中的测度分解与算子代数表示之间的对应关系，从而建立了概率和代数方面之间的等价性，并通过解开相互作用系统中红外奇​​点处理所产生的额外数学复杂性，为隔离基本结构提供了指导原则。这些结果为非相对论构造量子场论和量子统计力学中相变的严格分析奠定了基础，并作为扩展相互作用模型的起点。", "authors": [{"name": "Yoshitsugu Sekine"}], "featured_authors": [{"name": "Yoshitsugu Sekine"}], "author_count": 1}, {"id": "2604.01584", "category": "math-ph", "title": "Edge localization and Lifshitz tails for graphs with Ahlfors regular volume growth", "abstract": "In this work, we study the Anderson model on graphs with Ahlfors $\\alpha$-regular volume growth. We show that, under mild regularity assumptions of the random distribution, Lifshitz-tail type estimates near the bottom of the spectrum lead to exponential decay of fractional moments of the Green's function and thus spectral and dynamical localization at low energies. This generalizes the result of [4] from the lattice $\\mathbb{Z}^d$ to Ahlfors $\\alpha$-regular graphs. In addition, we establish Lifshitz tail estimates for the integrated density of states, with the Lifshitz exponent determined by the ratio of the volume growth rate and the random walk dimension of the underlying graphs, under certain assumptions on low lying eigenvalues of the Dirichlet and Neumann Laplacian on the graph. As an application, we verify all conditions on the Sierpinski gasket graph and obtain that, under mild regularity assumptions of the random distribution, for any fixed disorder, the Anderson model on the Sierpinski gasket graph has pure point spectrum and exhibits strong dynamical localization near the bottom of the spectrum.", "url": "https://arxiv.org/abs/2604.01584", "type": "理论", "summary": "在这项工作中，我们研究了具有 Ahlfors $\\alpha$-常规体积增长图的 Anderson 模型。我们表明，在随机分布的温和规律性假设下，光谱底部附近的 Lifshitz 尾型估计会导致格林函数分数矩的指数衰减，从而导致低能量下的光谱和动力学局域化。这将 [4] 的结果从格子 $\\mathbb{Z}^d$ 推广到 Ahlfors $\\alpha$-正则图。此外，在对图上狄利克雷和诺伊曼拉普拉斯算子的低特征值的某些假设下，我们建立了积分态密度的 Lifshitz 尾部估计，Lifshitz 指数由基础图的体积增长率和随机游走维数之比确定。作为一个应用，我们验证了 Sierpinski 垫片图上的所有条件，并得出，在随机分布的温和规律性假设下，对于任何固定无序，Sierpinski 垫片图上的 Anderson 模型具有纯点谱，并且在谱底部附近表现出强动态局部化。", "authors": [{"name": "Laura Shou"}, {"name": "Wei Wang"}, {"name": "Shiwen Zhang"}], "featured_authors": [{"name": "Laura Shou"}, {"name": "Wei Wang"}, {"name": "Shiwen Zhang"}], "author_count": 3}, {"id": "2604.01744", "category": "math-ph", "title": "Functional relations in renormalization group methods for a class of ordinary differential equations", "abstract": "We develop a renormalization group (RG)-based perturbation scheme for a class of ordinary differential equations, including first-order systems with semisimple or nilpotent linear parts, as well as scalar higher-order equations. The key observation is that the secular coefficients arising in naive perturbation theory satisfy an exact functional relation. This yields, in a unified manner, several fundamental features of the RG method: the renormalized amplitudes satisfy a closed functional relation with a group-like structure, the RG equation governing their slow dynamics is obtained directly, the absence of secular terms is ensured to all orders, and the relation between bare and renormalized amplitudes admits an explicit inversion. The results extend earlier ones for second-order scalar equations.", "url": "https://arxiv.org/abs/2604.01744", "type": "理论", "summary": "我们为一类常微分方程开发了一种基于重正化群（RG）的微扰方案，包括具有半简单或幂零线性部分的一阶系统，以及标量高阶方程。关键的观察是朴素微扰理论中产生的长期系数满足精确的函数关系。这以统一的方式产生了 RG 方法的几个基本特征：重整化幅度满足具有类群结构的封闭函数关系，直接获得控制其慢动力学的 RG 方程，确保所有阶不存在世俗项，并且裸幅度和重整化幅度之间的关系允许显式反演。结果扩展了二阶标量方程的早期结果。", "authors": [{"name": "Atsuo Kuniba"}, {"name": "Rurika Motohashi"}], "featured_authors": [{"name": "Atsuo Kuniba"}, {"name": "Rurika Motohashi"}], "author_count": 2}, {"id": "2604.02013", "category": "math-ph", "title": "A Rigorous Functional-Integral Construction of Toral Chern-Simons Theory", "abstract": "We construct the functional integral of Abelian Chern-Simons theory with toral gauge group $\\mathbb T=\\mathfrak t/\\Lambda \\cong U(1)^n$ at level $K$, where $K:\\Lambda\\times\\Lambda\\to\\mathbb Z$ is an even, integral, nondegenerate symmetric bilinear form, by exact zeta-regularized Gaussian evaluation of the formal quotient integral over connections modulo gauge. For closed $3$-manifolds, this yields a topological invariant; for manifolds with boundary, the relative functional integral produces the canonical boundary state. The resulting theory satisfies the required axioms of a $(2+1)$-dimensional TQFT.", "url": "https://arxiv.org/abs/2604.02013", "type": "理论", "summary": "我们通过对模规范连接上的形式商积分进行精确 zeta 正则化高斯求值，在 $K$ 级上构造阿贝尔陈-西蒙斯理论的函数积分，其中 $\\mathbb T=\\mathfrak t/\\Lambda \\cong U(1)^n$ 为 $K$ 级，其中 $K:\\Lambda\\times\\Lambda\\to\\mathbb Z$ 是偶数、积分、非简并对称双线性形式。对于封闭的 $3$ 流形，这会产生拓扑不变量；对于有边界的流形，相对函数积分产生规范边界状态。由此产生的理论满足 $(2+1)$ 维 TQFT 所需的公理。", "authors": [{"name": "Daniel Galviz"}], "featured_authors": [{"name": "Daniel Galviz"}], "author_count": 1}, {"id": "2604.02269", "category": "math-ph", "title": "Tensor invariants for multipartite entanglement classification", "abstract": "Organising the space of entanglement structures of a multipartite quantum system is a much more challenging task than its bipartite version: while the local unitary (LU) orbit of a bipartite pure state can be conveniently characterized by its entanglement spectrum, invariants of multipartite entanglement structures are comparatively difficult to define and work with. The root cause of this difference is that the bipartite problem can be reduced to the analysis of matrix invariants, while its multipartite version is governed by a much richer space of tensor invariants. The present work explores the latter through the lens of so-called trace-invariants, which are in one-to-one correspondence with combinatorial objects known as colored graphs. We first explain why trace-invariant evaluations can serve as labels of LU-orbits of multipartite pure states, how this strategy extends to random states, and how the effect of local operations (LO) can be analyzed through such data. We then focus on entanglement classification within an (infinite-dimensional) subspace of reference states, whose basic building blocks are GHZ states of various dimensions. We show that relatively simple subclasses of trace-invariants are sufficient to separate the LU-orbits of reference states, and enable a complete (resp. an incomplete) characterization of their relations in the LO (resp. LOCC) resource theory of entanglement. Finally, we investigate how a (still infinite) subclass of reference states of local dimension N can be efficiently distinguished at leading and subleading orders in an asymptotic large-N expansion (among themselves, or from Haar-random states). This analysis relies crucially on combinatorial quantities associated to colored graphs, some of which have already played instrumental roles in the recent literature on random tensors. Results of broader relevance are reported along the way.", "url": "https://arxiv.org/abs/2604.02269", "type": "理论", "summary": "组织多部分量子系统的纠缠结构空间比其二部分版本更具挑战性：虽然二部分纯态的局域酉（LU）轨道可以通过其纠缠谱方便地表征，但多部分纠缠结构的不变量相对难以定义和使用。这种差异的根本原因是二分问题可以简化为矩阵不变量的分析，而其多分版本则由更丰富的张量不变量空间控制。目前的工作通过所谓的迹不变量的镜头来探索后者，这些不变量与称为彩色图的组合对象一一对应。我们首先解释为什么迹不变评估可以作为多部分纯状态的 LU 轨道的标签，该策略如何扩展到随机状态，以及如何通过这些数据分析局部操作（LO）的效果。然后，我们重点关注参考态（无限维）子空间内的纠缠分类，其基本构建块是各种维度的 GHZ 态。\n\n我们证明相对简单的迹不变量子类足以分离参考态的 LU 轨道，并能够完整（或不完整）地描述它们在 LO（或 LOCC）资源纠缠理论中的关系。最后，我们研究了如何在渐进大 N 展开中（在其自身之间或从 Haar 随机状态）中有效地区分局部维度 N 的参考状态的（仍然无限）子类的前导和次导阶。这种分析主要依赖于与彩色图相关的组合量，其中一些组合量已经在最近的随机张量文献中发挥了重要作用。在此过程中报告了更广泛相关的结果。", "authors": [{"name": "Sylvain Carrozza"}, {"name": "Johann Chevrier"}, {"name": "Luca Lionni"}], "featured_authors": [{"name": "Sylvain Carrozza"}, {"name": "Johann Chevrier"}, {"name": "Luca Lionni"}], "author_count": 3}, {"id": "2604.02297", "category": "math-ph", "title": "Commutator Estimates for Low-Temperature Fermi Gases", "abstract": "We investigate the semiclassical regularity of thermal equilibria in the presence of a harmonic potential at low temperature; that is, we obtain the asymptotic behavior of the Schatten norms of commutators of the one-body operators associated with these equilibria and the position and momentum operators. We also obtain upper bounds in the magnetic field case for the Fock-Darwin Hamiltonian. Our estimates, in particular, allow us to observe several regimes depending on the joint behavior of the Planck constant, the temperature, and the strength of the magnetic field.", "url": "https://arxiv.org/abs/2604.02297", "type": "理论", "summary": "我们研究了低温下谐波势存在时热平衡的半经典规律；也就是说，我们获得了与这些平衡以及位置和动量算子相关的单体算子的交换子的 Schatten 范数的渐近行为。我们还获得了福克-达尔文哈密顿量在磁场情况下的上限。特别是，我们的估计使我们能够根据普朗克常数、温度和磁场强度的联合行为观察几种状态。", "authors": [{"name": "Jacky J. Chong"}, {"name": "Laurent Lafleche"}, {"name": "Jinyeop Lee"}, {"name": "Chiara Saffirio"}], "featured_authors": [{"name": "Jacky J. Chong"}, {"name": "Laurent Lafleche"}, {"name": "Jinyeop Lee"}, {"name": "Chiara Saffirio"}], "author_count": 4}, {"id": "2604.01250", "category": "quant-ph", "title": "Hybrid Classical--Quantum Optimization of Wireless Routing Using QAOA and Quantum Walks", "abstract": "Routing in wireless communication networks is shaped by mobility, interference, congestion, and competing service requirements, making route selection a high-dimensional constrained optimization problem rather than a simple shortest-path task. This paper investigates the use of hybrid classical--quantum methods for wireless routing, focusing on the Quantum Approximate Optimization Algorithm (QAOA) and quantum walks as candidate mechanisms for exploring complex routing spaces. The paper examines how wireless routing can be expressed as a constrained graph optimization problem in which routing objectives, flow constraints, connectivity requirements, and interference effects are mapped into quantum-compatible Hamiltonian representations. It then discusses how these approaches can be integrated into a hybrid architecture in which classical systems perform network monitoring, graph construction, pre-processing, and deployment, while quantum subroutines are used for selected optimization components. The analysis shows that the potential value of quantum routing lies primarily in the treatment of difficult combinatorial subproblems rather than end-to-end replacement of classical routing frameworks. The paper also highlights practical limitations arising from state preparation, constraint encoding, oracle construction, hardware noise, limited qubit resources, and hybrid execution overhead. It is argued that any meaningful near-term advantage will depend on careful problem decomposition, compact encoding, and tight classical--quantum integration.", "url": "https://arxiv.org/abs/2604.01250", "type": "理论+数值", "summary": "无线通信网络中的路由由移动性、干扰、拥塞和竞争服务需求决定，使得路由选择成为高维约束优化问题，而不是简单的最短路径任务。本文研究了混合经典量子方法在无线路由中的使用，重点关注量子近似优化算法（QAOA）和量子游走作为探索复杂路由空间的候选机制。该论文研究了如何将无线路由表示为约束图优化问题，其中路由目标、流量约束、连接要求和干扰效应被映射为量子兼容的哈密顿表示。然后讨论如何将这些方法集成到混合架构中，其中经典系统执行网络监控、图形构建、预处理和部署，而量子子例程用于选定的优化组件。\n\n分析表明，量子路由的潜在价值主要在于处理困难的组合子问题，而不是端到端替代经典路由框架。该论文还强调了状态准备、约束编码、预言构建、硬件噪声、有限的量子位资源和混合执行开销所产生的实际限制。有人认为，任何有意义的近期优势都将取决于仔细的问题分解、紧凑的编码和严格的经典量子积分。", "authors": [{"name": "Eric Howard"}, {"name": "Hardique Dasore"}, {"name": "Hom Nath Dhungana"}, {"name": "Radhika Kuttala"}, {"name": "Samuel Murphy"}, {"name": "Emma Soo"}, {"name": "Shah Haque"}], "featured_authors": [{"name": "Eric Howard"}, {"name": "Hardique Dasore"}, {"name": "Hom Nath Dhungana"}, {"name": "Samuel Murphy"}, {"name": "Emma Soo"}, {"name": "Shah Haque"}], "author_count": 7}, {"id": "2604.01296", "category": "quant-ph", "title": "Bootstrapping Symmetries in Quantum Many-Body Systems from the Cross Spectral Form Factor", "abstract": "Symmetries play a central role in quantum many-body physics, yet uncovering them systematically remains challenging. We introduce a bootstrap framework designed to reconstruct the representation theory of hidden finite group symmetries of quantum many-body lattice Hamiltonians, using only a known symmetry subgroup $N$ and spectral correlations between its symmetry sectors. We introduce a novel variant of the spectral form factor, the cross spectral form factor (xSFF), which we compute via exact diagonalization to seed the bootstrap algorithm. By applying the constraints derived from these data alongside the algebraic conditions of the fusion rules, our bootstrap procedure sharply restricts the set of candidate groups $G$. Remarkably, without any prior assumptions regarding the full symmetry group $G$, our method can systematically recover its representation-theoretic data, including the number and dimensions of the irreducible representations, their branching rules with respect to $N$, the fusion algebra, and the full character table. This framework applies equally well to chaotic and integrable many-body systems and accommodates both unitary and anti-unitary symmetries. Through various examples, we demonstrate that the underlying group $G$ can be uniquely identified. In particular, our bootstrap independently recovers the $\\mathbb{Z}_4$ symmetry at the self-dual point of the three-state quantum torus chain, detects signatures of projective representations in the effective Hamiltonian of the driven Bose-Hubbard model, and rediscovers the $\\eta$-pairing $\\mathrm{SO}(4)$ symmetry of the one-dimensional Fermi-Hubbard model. Our framework thus establishes a practical route to identify symmetries directly from dynamical spectral observables.", "url": "https://arxiv.org/abs/2604.01296", "type": "理论+数值", "summary": "对称性在量子多体物理学中发挥着核心作用，但系统地揭示它们仍然具有挑战性。我们引入了一个引导框架，旨在仅使用已知的对称子群 $N$ 及其对称扇区之间的谱相关性来重建量子多体晶格哈密顿量的隐藏有限群对称性的表示理论。我们引入了光谱形状因子的一种新变体，即交叉光谱形状因子（xSFF），我们通过精确对角化来计算它，以作为引导算法的种子。通过应用从这些数据导出的约束以及融合规则的代数条件，我们的引导程序严格限制了候选组 $G$ 的集合。值得注意的是，在没有关于完全对称群 $G$ 的任何事先假设的情况下，我们的方法可以系统地恢复其表示论数据，包括不可约表示的数量和维数、它们相对于 $N$ 的分支规则、融合代数和完整的字符表。该框架同样适用于混沌和可积多体系统，并适应酉对称和反酉对称。\n\n通过各种例子，我们证明了底层组$G$可以被唯一标识。特别是，我们的引导程序独立地恢复了三态量子环链自对偶点的 $\\mathbb{Z}_4$ 对称性，检测驱动 Bose-Hubbard 模型的有效哈密顿量中投影表示的签名，并重新发现一维 Fermi-Hubbard 模型的 $\\eta$ 配对 $\\mathrm{SO}(4)$ 对称性。因此，我们的框架建立了一条直接从动态光谱可观测量中识别对称性的实用途径。", "authors": [{"name": "Chen Bai"}, {"name": "Zihan Zhou"}, {"name": "Bastien Lapierre"}, {"name": "Shinsei Ryu"}], "featured_authors": [{"name": "Chen Bai"}, {"name": "Zihan Zhou"}, {"name": "Bastien Lapierre"}, {"name": "Shinsei Ryu"}], "author_count": 4}, {"id": "2604.01353", "category": "quant-ph", "title": "Constructing Fermionic Dynamics with Closed Moment Hierarchies", "abstract": "We construct a broad class of completely positive maps and Go\\-rini--Kossakowski--Sudarshan-Lindblad generators for fermionic systems induced by linear transformations of system and environment modes. For these maps, we derive explicit Heisenberg-picture formulas for arbitrary normally ordered monomials in terms of minors of the underlying mode-transformation matrices and environment correlation tensors. We show that for even environment states the linear span of monomials up to any fixed order is invariant, which yields closed equations for low-order moments and makes their computation efficient. We also discuss the relation of this construction to second quantization of non-Hermitian one-particle contractions and extend the formalism to completely positive maps arising from post-selection.", "url": "https://arxiv.org/abs/2604.01353", "type": "理论", "summary": "我们为由系统和环境模式的线性变换引起的费米子系统构建了一大类完全正映射和 Go\\-rini--Kossakowski--Sudarshan-Lindblad 生成器。对于这些映射，我们根据底层模式转换矩阵和环境相关张量的次要项，推导出任意正序单项式的显式海森堡图公式。我们证明，即使是环境状态，单项式的线性跨度直到任何固定阶数都是不变的，这会产生低阶矩的闭合方程，并使它们的计算高效。我们还讨论了这种构造与非厄米单粒子收缩的第二量子化的关系，并将形式主义扩展到由后选择产生的完全正映射。", "authors": [{"name": "A. E. Teretenkov"}], "featured_authors": [{"name": "A. E. Teretenkov"}], "author_count": 1}, {"id": "2604.01408", "category": "quant-ph", "title": "Quantum polymorphism characterisation of commutativity gadgets in all quantum models", "abstract": "Commutativity gadgets provide a technique for lifting classical reductions between constraint satisfaction problems to quantum-sound reductions between the corresponding nonlocal games. We develop a general framework for commutativity gadgets in the setting of quantum homomorphisms between finite relational structures. Building on the notion of quantum homomorphism spaces, we introduce a uniform notion of commutativity gadget capturing the finite-dimensional quantum, quantum approximate, and commuting-operator models. In the robust setting, we use the weighted-algebra formalism for approximate quantum homomorphisms to capture corresponding notions of robust commutativity gadgets. Our main results characterize both non-robust and robust commutativity gadgets purely in terms of quantum polymorphism spaces: in any model, existence of a commutativity gadget is equivalent to the collapse of the corresponding quantum polymorphisms to classical ones at arity $|A|^2$, and robust gadgets are characterized by stable commutativity of the appropriate weighted polymorphism algebra. We use this characterisation to show relations between the classes of commutativity gadget, notably that existence of a robust commutativity gadget is equivalent to the existence of a corresponding non-robust one. Finally, we prove that quantum polymorphisms of complete graphs $K_n$ have a very special structure, wherein the noncommutative behaviour only comes from the quantum permutation group $S_n^+$. Combining this with techniques from combinatorial group theory, we construct separations between commutativity-gadget classes: we exhibit a relational structure admitting a finite-dimensional commutativity gadget but no quantum approximate gadget, and, conditional on the existence of a non-hyperlinear group, a structure admitting a quantum approximate commutativity gadget but no commuting-operator gadget.", "url": "https://arxiv.org/abs/2604.01408", "type": "理论", "summary": "交换性小工具提供了一种将约束满足问题之间的经典约简提升为相应非局域博弈之间的量子声音约简的技术。我们在有限关系结构之间的量子同态设置中开发了交换性小工具的通用框架。基于量子同态空间的概念，我们引入了交换性小工具的统一概念，捕获有限维量子、量子近似和交换算子模型。在鲁棒设置中，我们使用加权代数形式来近似量子同态，以捕获鲁棒交换性小工具的相应概念。我们的主要结果纯粹根据量子多态性空间来描述非鲁棒和鲁棒交换性小工具：在任何模型中，交换性小工具的存在等价于相应的量子多态性在元数 $|A|^2$ 上崩溃为经典多态性，而鲁棒性小工具的特征是适当加权多态代数的稳定交换性。\n\n我们使用这种表征来显示交换性小工具类别之间的关系，特别是鲁棒交换性小工具的存在等同于相应的非鲁棒交换性小工具的存在。最后，我们证明完全图$K_n$的量子多态性具有非常特殊的结构，其中非交换行为仅来自量子置换群$S_n^+$。将其与组合群论的技术相结合，我们构建了交换性小工具类之间的分离：我们展示了一个允许有限维交换性小工具但没有量子近似小工具的关系结构，并且以非超线性群的存在为条件，展示了一个允许量子近似交换性小工具但没有交换算子小工具的结构。", "authors": [{"name": "Eric Culf"}, {"name": "Josse van Dobben de Bruyn"}, {"name": "Peter Zeman"}], "featured_authors": [{"name": "Eric Culf"}, {"name": "Josse van Dobben de Bruyn"}, {"name": "Peter Zeman"}], "author_count": 3}, {"id": "2604.01426", "category": "quant-ph", "title": "Distributed Variational Quantum Linear Solver", "abstract": "This paper develops a distributed variational quantum algorithm for solving large-scale linear equations. For a linear system of the form $Ax=b$, the large square matrix $A$ is partitioned into smaller square block submatrices, each of which is known only to a single noisy intermediate-scale quantum (NISQ) computer. Each NISQ computer communicates with certain other quantum computers in the same row and column of the block partition, where the communication patterns are described by the row- and column-neighbor graphs, both of which are connected. The proposed algorithm integrates a variant of the variational quantum linear solver at each computer with distributed classical optimization techniques. The derivation of the quantum cost function provides insight into the design of the distributed algorithm. Numerical quantum simulations demonstrate that the proposed distributed quantum algorithm can solve linear systems whose size scales with the number of computers and is therefore not limited by the capacity of a single quantum computer.", "url": "https://arxiv.org/abs/2604.01426", "type": "理论+数值", "summary": "本文开发了一种用于求解大规模线性方程的分布式变分量子算法。对于 $Ax=b$ 形式的线性系统，大方阵 $A$ 被划分为更小的方块子矩阵，每个子矩阵仅由单个噪声中级量子 (NISQ) 计算机所知。每台 NISQ 计算机与块分区的同一行和同一列中的某些其他量子计算机进行通信，其中通信模式由行和列邻居图描述，两者都是连接的。所提出的算法将每台计算机上的变分量子线性求解器的变体与分布式经典优化技术相集成。量子成本函数的推导为分布式算法的设计提供了深入的见解。数值量子模拟表明，所提出的分布式量子算法可以解决线性系统，其大小与计算机数量成比例，因此不受单个量子计算机容量的限制。", "authors": [{"name": "Tong Shen"}, {"name": "Zeru Zhu"}, {"name": "Ji Liu"}], "featured_authors": [{"name": "Tong Shen"}, {"name": "Zeru Zhu"}, {"name": "Ji Liu"}], "author_count": 3}, {"id": "2604.01478", "category": "quant-ph", "title": "Twisted Fiber Bundle Codes over Group Algebras", "abstract": "We introduce a twisted fiber-bundle construction of quantum CSS codes over group algebras \\(R=\\mathbb F_2[G]\\), where each base generator carries a generator-dependent \\(R\\)-linear fiber twist satisfying a flatness condition. This construction extends the untwisted lifted product code, recovered when all twists are identities. We show that invertible twists (satisfying a flatness condition) give a complex chain-isomorphic to the untwisted one, so the resulting binary CSS codes have the same blocklength \\(n\\) and encoded dimension \\(k\\). In contrast, singular chain-compatible twists can lower boundary ranks and increase the number of logical qubits. Examples over \\(R=\\mathbb F_2[D_3]\\) show that the twisted fiber bundle code can outperform the corresponding untwisted lifted-product code in \\(k\\) while keeping the same \\(n\\) and, in our examples, the same minimum distance \\(d\\).", "url": "https://arxiv.org/abs/2604.01478", "type": "理论", "summary": "我们在群代数 \\(R=\\mathbb F_2[G]\\) 上引入了量子 CSS 代码的扭曲纤维束结构，其中每个基本生成器都带有一个与生成器相关的 \\(R\\)-满足平坦度条件的线性纤维扭曲。这种结构扩展了未扭曲的提升产品代码，当所有扭曲都是身份时恢复。我们证明，可逆扭曲（满足平坦度条件）给出了与未扭曲链同构的复杂链，因此生成的二进制 CSS 代码具有相同的块长度 \\(n\\) 和编码维度 \\(k\\)。相反，单一链兼容的扭曲可以降低边界等级并增加逻辑量子位的数量。 \\(R=\\mathbb F_2[D_3]\\) 的示例表明，在保持相同的 \\(n\\) 以及在我们的示例中保持相同的最小距离 \\(d\\) 的同时，绞合光纤束代码可以优于 \\(k\\) 中相应的未绞合提升产品代码。", "authors": [{"name": "Chaobin Liu"}], "featured_authors": [{"name": "Chaobin Liu"}], "author_count": 1}, {"id": "2604.01507", "category": "quant-ph", "title": "The Quantum Walk Characteristic Polynomial Distinguishes All Strongly Regular Graphs of Prime Orde", "abstract": "Let $G$ be a strongly regular graph of prime order $p$ with connection degree $k \\geq 6$. We prove that the \\emph{quantum walk characteristic polynomial} $\\chi_q(G,\\lambda) \\coloneqq \\det(\\lambda I - U_G)$, where $U_G$ is the coined quantum walk operator on $G$, completely determines $G$ up to isomorphism within the class of strongly regular graphs of the same order. The proof proceeds in three steps. First, we show that $U_G$ block-diagonalizes under the discrete Fourier transform over $\\Z_p$, yielding $p$ blocks $U_G^{(j)}$ of size $k \\times k$. Second, we prove an explicit formula \\[ \\chi_q\\!\\bigl(U_G^{(j)}, \\lambda\\bigr) = (\\lambda-1)^{(k-2)/2}(\\lambda+1)^{(k-2)/2} \\!\\left(\\lambda^2 - \\tfrac{2\\widehat{A}_G(j)}{k}\\,\\lambda + 1\\right), \\] from which the Fourier coefficient $\\widehat{A}_G(j)$ is recovered as the unique real part of an eigenvalue of $U_G^{(j)}$ distinct from $\\pm 1$. Third, the inverse discrete Fourier transform recovers the connection set $S$ of $G$, and Turner's theorem (1967) identifies $G$ up to isomorphism. As a consequence, graph isomorphism is decidable in polynomial time within this class using the quantum walk spectrum, without resorting to the general quasi-polynomial algorithm of Babai (2016).", "url": "https://arxiv.org/abs/2604.01507", "type": "理论+数值", "summary": "设 $G$ 是素数阶 $p$ 的强正则图，连接度 $k \\geq 6$。我们证明，\\emph{量子游走特征多项式} $\\chi_q(G,\\lambda) \\coloneqq \\det(\\lambda I - U_G)$，其中$U_G$是$G$上创造的量子游走算子，完全决定了$G$在同阶强正则图类中的同构。证明分三步进行。首先，我们证明 $U_G$ 在 $\\Z_p$ 上的离散傅立叶变换下进行块对角化，产生大小为 $k \\times k$ 的 $p$ 块 $U_G^{(j)}$。其次，我们证明一个显式公式 \\[ \\chi_q\\!\\bigl(U_G^{(j)}, \\lambda\\bigr) = (\\lambda-1)^{(k-2)/2}(\\lambda+1)^{(k-2)/2} \\!\\left(\\lambda^2 - \\tfrac{2\\widehat{A}_G(j)}{k}\\,\\lambda + 1\\right), \\] ，其中傅立叶系数$\\widehat{A}_G(j)$ 被恢复为与 $\\pm 1$ 不同的 $U_G^{(j)}$ 特征值的唯一实部。第三，离散傅里叶逆变换恢复$G$的连接集$S$，特纳定理(1967)将$G$识别为同构。\n\n因此，图同构可以使用量子游走谱在此类内的多项式时间内判定，而无需求助于 Babai (2016) 的一般拟多项式算法。", "authors": [{"name": "Diego Roldan"}], "featured_authors": [{"name": "Diego Roldan"}], "author_count": 1}, {"id": "2604.01519", "category": "quant-ph", "title": "DQC1-completeness of normalized trace estimation for functions of log-local Hamiltonians", "abstract": "We study the computational complexity of estimating the normalized trace $2^{-n}Tr[f(A)]$ for a log-local Hamiltonian $A$ acting on $n$ qubits. This problem arises naturally in the DQC1 model, yet its complexity is only understood for a limited class of functions $f(x)$. We show that if $f(x)$ is a continuous function with approximate degree $\\Omega({\\rm poly}(n))$, then estimating $2^{-n}Tr[f(A)]$ up to constant additive error is DQC1-complete, under a technical condition on the polynomial approximation error of $f(x)$. This condition holds for a broad class of functions, including exponentials, trigonometric functions, logarithms, and inverse-type functions. We further prove that when $A$ is sparse, the classical query complexity of this problem is exponential in the approximate degree, assuming a conjectured lower bound for a trace variant of the $k$-Forrelation problem in the DQC1 query model. Together, these results identify the approximate degree as the key parameter governing the complexity of normalized trace estimation: it characterizes both the quantum complexity (via efficient DQC1 algorithms) and, conditionally, the classical hardness, yielding an exponential quantum-classical separation. Our proof develops a unified framework that cleanly combines circuit-to-Hamiltonian constructions, periodic Jacobi operators, and tools from polynomial approximation theory, including the Chebyshev equioscillation theorem.", "url": "https://arxiv.org/abs/2604.01519", "type": "理论+数值", "summary": "我们研究了估计作用于 $n$ 量子位的对数局部哈密顿量 $A$ 的归一化迹 $2^{-n}Tr[f(A)]$ 的计算复杂性。这个问题在 DQC1 模型中自然出现，但只有有限类函数 $f(x)$ 才能理解其复杂性。我们证明，如果 $f(x)$ 是近似度 $\\Omega({\\rm poly}(n))$ 的连续函数，则在 $f(x)$ 多项式逼近误差的技术条件下，估计 $2^{-n}Tr[f(A)]$ 达到恒定加性误差是 DQC1 完全的。此条件适用于多种函数，包括指数、三角函数、对数和反函数。我们进一步证明，当 $A$ 稀疏时，该问题的经典查询复杂度在近似程度上呈指数级，假设 DQC1 查询模型中 $k$-Forrelation 问题的迹变体的推测下界。\n\n总之，这些结果将近似度确定为控制归一化迹估计复杂性的关键参数：它表征了量子复杂性（通过有效的 DQC1 算法），并且有条件地表征了经典硬度，从而产生指数量子经典分离。我们的证明开发了一个统一的框架，它干净地结合了电路到哈密尔顿结构、周期性雅可比算子和多项式逼近理论的工具，包括切比雪夫等振荡定理。", "authors": [{"name": "Zhengfeng Ji"}, {"name": "Tongyang Li"}, {"name": "Changpeng Shao"}, {"name": "Xinzhao Wang"}, {"name": "Yuxin Zhang"}], "featured_authors": [{"name": "Zhengfeng Ji"}, {"name": "Tongyang Li"}, {"name": "Changpeng Shao"}, {"name": "Xinzhao Wang"}, {"name": "Yuxin Zhang"}], "author_count": 5}, {"id": "2604.01555", "category": "quant-ph", "title": "Scalable Ground-State Certification of Quantum Spin Systems via Structured Noncommutative Polynomial Optimization", "abstract": "A fundamental challenge in quantum physics is determining the ground-state properties of many-body systems. Whereas standard approaches, such as variational calculations, consist of writing down a wave function ansatz and minimizing over the possible states expressible by this ansatz, one can alternatively formulate the problem as a noncommutative polynomial optimization problem. This optimization problem can then be addressed using a hierarchy of semidefinite programming relaxations. In contrast to variational calculations, the semidefinite program can provide lower bounds for ground state energies and upper and lower bounds on observable expectation values. However, this approach typically suffers from severe scalability issues, limiting its applicability to small-to-medium-scale systems. In this article, we demonstrate that leveraging the inherent structures of the system can significantly mitigate these scalability challenges and thus allows us to compute meaningful bounds for quantum spin systems on up to $16\\times16$ square lattices.", "url": "https://arxiv.org/abs/2604.01555", "type": "理论+数值", "summary": "量子物理学的一个基本挑战是确定多体系统的基态特性。尽管标准方法（例如变分计算）包括写下波函数 ansatz 并最小化该 ansatz 可表达的可能状态，但也可以将问题表述为非交换多项式优化问题。然后可以使用半定规划松弛的层次结构来解决该优化问题。与变分计算相反，半定程序可以提供基态能量的下限以及可观测期望值的上限和下限。然而，这种方法通常会遇到严重的可扩展性问题，限制了其对中小型系统的适用性。在本文中，我们证明利用系统的固有结构可以显着缓解这些可扩展性挑战，从而使我们能够在高达 16\\times16$ 的方格上计算量子自旋系统的有意义的边界。", "authors": [{"name": "Jie Wang"}, {"name": "David Jansen"}, {"name": "Irénée Frerot"}, {"name": "Marc-Olivier Renou"}, {"name": "Victor Magron"}, {"name": "Antonio Acín"}], "featured_authors": [{"name": "Jie Wang"}, {"name": "David Jansen"}, {"name": "Irénée Frerot"}, {"name": "Marc-Olivier Renou"}, {"name": "Victor Magron"}, {"name": "Antonio Acín"}], "author_count": 6}, {"id": "2604.01638", "category": "quant-ph", "title": "Mechanism for scale-free skin effect in one-dimensional systems", "abstract": "Non-Hermitian skin effect (NHSE) is one of the most fascinating phenomena in non-Hermitian systems, which refers to enormous eigenstates localize at the boundary exponentially under open boundary condition (OBC). For typical NHSE, the localization length for a skin mode is independent of the system's size. Recently, some studies have revealed that for specific $1$-dimensional model, the localization length for eigenstates are proportional to the system's length under generalized boundary condition (GBC), and such phenomenon is dubbed as scale-free skin effect (SFSE). Further, SFSE is discovered in $1$-dimensional Hermitian chain with pure imaginary impurity at the end. In this work, we propose a mechanism for SFSE in 1-dimensional systems, which is model-independent. Our work provide a viewpoint for researching SFSE and shed new light on understanding finite size effect in non-Hermitian systems.", "url": "https://arxiv.org/abs/2604.01638", "type": "理论", "summary": "非厄米趋肤效应（NHSE）是非厄米系统中最令人着迷的现象之一，它是指在开放边界条件（OBC）下，巨大的本征态以指数方式局域于边界。对于典型的 NHSE，趋肤模式的定位长度与系统的尺寸无关。最近，一些研究表明，对于特定的1维模型，在广义边界条件（GBC）下，本征态的局域化长度与系统的长度成正比，这种现象被称为无标度集肤效应（SFSE）。此外，SFSE 是在 $1$ 维 Hermitian 链中发现的，末端有纯虚数杂质。在这项工作中，我们提出了一种一维系统中的 SFSE 机制，该机制与模型无关。我们的工作为研究 SFSE 提供了一个观点，并为理解非厄米系统中的有限尺寸效应提供了新的思路。", "authors": [{"name": "Shu-Xuan Wang"}], "featured_authors": [{"name": "Shu-Xuan Wang"}], "author_count": 1}, {"id": "2604.01773", "category": "quant-ph", "title": "Distribution of Bell State Entanglement in Qubit Networks via Collision Models", "abstract": "We propose a general scheme to controllably distribute pairwise entanglement in a quantum network of qubits by exploiting environmental ancilla qubits interacting with the network nodes through tunable Hamiltonians. Our approach leverages collision models, in which a quantum syatem interacts sequentially with ancilla units. We explore two distinct scenarios within this framework: one in which the ancilla is reset to its initial coherent state after each interaction (the traditional collision model), and another where the ancilla is not reset but its state is simply carried over to the next interaction, which we dub the repeated interaction model. In both scenarios, we ensure that the system-ancilla correlations are discarded between steps. We also demonstrate how varying the ancilla-system interaction patterns enables selective generation of entanglement between different qubit pairs, including non-neighbouring nodes that do not directly interact. The scheme is analyzed in networks up to three qubits under both collision and repeated interaction dynamics, revealing the genaration of maximally entangled bell pairs even in configurations where the interacting ancilla couples to only a single node. Our results provide a systematic and physically implementable route to entanglement distribution, offering potential applications in quantum communication, metrology and modular quantum computing.", "url": "https://arxiv.org/abs/2604.01773", "type": "理论", "summary": "我们提出了一种通用方案，通过利用可调谐哈密顿量与网络节点交互的环境辅助量子位，在量子位的量子网络中可控地分布成对纠缠。我们的方法利用碰撞模型，其中量子系统与辅助单元顺序相互作用。我们在这个框架内探索了两种不同的场景：一种是每次交互后辅助部件重置为其初始相干状态（传统碰撞模型），另一种是辅助部件不重置，但其状态简单地转移到下一次交互，我们将其称为重复交互模型。在这两种情况下，我们确保在步骤之间丢弃系统辅助相关性。我们还演示了如何改变辅助系统交互模式，从而能够选择性地生成不同量子位对之间的纠缠，包括不直接交互的非相邻节点。\n\n该方案在碰撞和重复相互作用动力学下在多达三个量子位的网络中进行了分析，揭示了即使在相互作用的辅助仅耦合到单个节点的配置中，最大纠缠钟对的生成。我们的研究结果提供了一种系统的、物理上可实现的纠缠分布途径，为量子通信、计量学和模块化量子计算提供了潜在的应用。", "authors": [{"name": "Mert Doğan"}, {"name": "Öner Faruk Ödemiş"}, {"name": "Elif Yunt"}, {"name": "Özgür E. Müstecaplıoğlu"}], "featured_authors": [{"name": "Mert Doğan"}, {"name": "Öner Faruk Ödemiş"}, {"name": "Elif Yunt"}, {"name": "Özgür E. Müstecaplıoğlu"}], "author_count": 4}, {"id": "2604.01856", "category": "quant-ph", "title": "Curvature-induced bound states in quantum wires", "abstract": "A classical particle under spatial constraints is strictly confined to live on a specific space manifold or path, but this assumption is incompatible with the zero-point fluctuations of a quantum particle. One way to describe quantum mechanics under constraints is the confinement potential approach (CPA). For a non-relativistic particle, the CPA maps the problem onto the solution of a Schrödinger-type equation in an isometrically embedded Riemannian submanifold of Euclidean space while the motion along orthogonal directions are decoupled and spatially confined. This approach respects quantum uncertainty, and one of its key results is the appearance of geometry- and metric-induced potentials that affect the stationary states and the dynamics of the particle. For particles constrained to different spaces, such as structures hosting sharp bents, vertices, wedges, conical apices, tips, or self-intersections, a formalism beyond the CPA is needed. Here, a step towards a CPA extension for irregular spaces is presented. After classifying the possible geometric irregularities concerning the CPA formalism, the presentation is focused on a sharply bent quantum wire modeled as an embedded curve with singular (but absolute integrable) curvature. For a subclass fulfilling the additional requirement that the geometric potential is a distribution of first order, a solution scheme for the confined Schrödinger equation is presented based on singular Sturm-Liouville theory and operator theoretic methods. The analytical considerations and numerical simulations evidence the existence of curvature-induced bound states with non-differentiable wave functions localized around the singular point, with an extension well beyond the singularity. Furthermore, a multitude of scattering states appear that may affect the transport and optical properties of the system.", "url": "https://arxiv.org/abs/2604.01856", "type": "理论+数值", "summary": "空间约束下的经典粒子被严格限制为生活在特定的空间流形或路径上，但这种假设与量子粒子的零点涨落不相容。描述约束下量子力学的一种方法是限制势方法（CPA）。对于非相对论性粒子，CPA 将问题映射到欧几里得空间的等距嵌入黎曼子流形中薛定谔型方程的解，同时沿正交方向的运动是解耦且空间受限的。这种方法尊重量子不确定性，其关键结果之一是影响粒子稳态和动力学的几何和度量诱导势的出现。对于限制在不同空间的粒子，例如具有锐利弯曲、顶点、楔形、圆锥形顶点、尖端或自相交的结构，需要超越 CPA 的形式主义。这里提出了针对不规则空间的 CPA 扩展的一个步骤。\n\n在对与 CPA 形式有关的可能的几何不规则性进行分类之后，演示的重点是急剧弯曲的量子线，该量子线被建模为具有奇异（但绝对可积）曲率的嵌入曲线。对于满足几何势为一阶分布的附加要求的子类，基于奇异Sturm-Liouville理论和算子理论方法，提出了受限薛定谔方程的解方案。分析考虑和数值模拟证明了曲率引起的束缚态的存在，其不可微分的波函数位于奇点周围，并且延伸远远超出了奇点。此外，出现的多种散射态可能会影响系统的传输和光学特性。", "authors": [{"name": "Tim Bergmann"}, {"name": "Benjamin Schwager"}, {"name": "Jamal Berakdar"}], "featured_authors": [{"name": "Tim Bergmann"}, {"name": "Benjamin Schwager"}, {"name": "Jamal Berakdar"}], "author_count": 3}, {"id": "2604.01874", "category": "quant-ph", "title": "Transversal non-Clifford gates on almost-good quantum LDPC and quantum locally testable codes", "abstract": "We exhibit nontrivial transversal logical multi-controlled-$Z$ gates on $[\\![N,\\Theta(N),\\tilde\\Theta(N)]\\!]$ quantum low-density parity-check codes and $[\\![N,\\Theta(N),\\tilde\\Theta(N)]\\!]$ quantum locally testable codes with soundness $\\tilde\\Theta(1)$, combining nearly optimal code parameters with fault-tolerant non-Clifford gates for the first time. Remarkably, our proofs are almost entirely algebraic-topological, showing that such presumably intricate logical gates naturally arise as a fundamental topological phenomenon. We develop a general framework for constructing a rich new family of homological invariant forms which we call ''cupcap gates'' that induce transversal logical multi-controlled-$Z$ and, building on insights from [Li et al., arXiv:2603.25831 ], covering space methods to certify their nontriviality. The claimed almost-good code results follow immediately as examples.", "url": "https://arxiv.org/abs/2604.01874", "type": "理论", "summary": "我们在$[\\![N,\\Theta(N),\\tilde\\Theta(N)]\\!]$量子低密度奇偶校验码和$[\\![N,\\Theta(N),\\tilde\\Theta(N)]\\!]$量子本地可测试代码上展示了非平凡的横向逻辑多控$Z$门，具有健全性$\\tilde\\Theta(1)$，将近乎最优的代码参数与容错相结合第一次非克利福德大门。值得注意的是，我们的证明几乎完全是代数拓扑的，表明这种复杂的逻辑门自然会作为一种基本的拓扑现象出现。我们开发了一个通用框架，用于构建一个丰富的新同源不变形式家族，我们称之为“cupcap 门”，它诱导横向逻辑多控制-$Z$，并基于 [Li et al., arXiv:2603.25831] 的见解，涵盖空间方法来证明其非平凡性。所声称的几乎良好的代码结果立即作为示例。", "authors": [{"name": "Yiming Li"}, {"name": "Zimu Li"}, {"name": "Zi-Wen Liu"}], "featured_authors": [{"name": "Yiming Li"}, {"name": "Zimu Li"}, {"name": "Zi-Wen Liu"}], "author_count": 3}, {"id": "2604.01891", "category": "quant-ph", "title": "A Loop-Shaping Approach to Coherent Feedback Control in Cavity Optomechanical Cooling", "abstract": "We present a loop-shaping approach to coherent feedback (CF) control. By formulating the coupling between a quantum system and its environment in terms of the noise power spectrum, our method enables direct manipulation of the effective dissipation coefficients through spectral shaping. A systematic design framework for CF controllers is also developed, in which transfer functions are shaped to realize desired spectral responses. Applying this framework to optomechanical sideband cooling, we demonstrate that suppression of the Stokes process and enhancement of the anti-Stokes process can be simultaneously achieved, enabling ground-state cooling even in the unresolved-sideband regime. This loop-shaping framework provides an intuitive and general foundation for the design of CF controllers and can be extended to a wide class of quantum systems in which interactions with environments are characterized by noise power spectra.", "url": "https://arxiv.org/abs/2604.01891", "type": "数值", "summary": "我们提出了一种相干反馈（CF）控制的环路整形方法。通过根据噪声功率谱制定量子系统与其环境之间的耦合，我们的方法可以通过频谱整形直接操纵有效耗散系数。还开发了 CF 控制器的系统设计框架，其中传递函数被塑造以实现所需的光谱响应。将该框架应用于光机械边带冷却，我们证明可以同时实现斯托克斯过程的抑制和反斯托克斯过程的增强，即使在未解析的边带状态下也能实现基态冷却。这种环路整形框架为 CF 控制器的设计提供了直观且通用的基础，并且可以扩展到各种量子系统，其中与环境的相互作用以噪声功率谱为特征。", "authors": [{"name": "Aoi Fujimoto"}, {"name": "Hiroyuki Ichihara"}, {"name": "Rina Kanamoto"}], "featured_authors": [{"name": "Aoi Fujimoto"}, {"name": "Hiroyuki Ichihara"}, {"name": "Rina Kanamoto"}], "author_count": 3}, {"id": "2604.01918", "category": "quant-ph", "title": "Universal critical timescales in slow non-Hermitian dynamics", "abstract": "Non-Hermitian systems driven along slow parametric loops undergo non-adiabatic transitions whose outcome depends sensitively on the driving speed, yet no explicit formula has been available for the critical timescale $T_{\\mathrm{cr}}$ at which these transitions develop. Using a $2\\times 2$ Hamiltonian with circular parameter trajectories, we derive $T_{\\mathrm{cr}} = \\mathcal{G}\\,\\ln(1/|\\Delta|)$ in closed form for non-encircling loops, phase-shifted loops, offset loops, and loops encircling exceptional points, where $\\mathcal{G}$ is a geometry-dependent growth factor and $\\Delta$ is the instability seed. This formula sharply separates the regime where the system remains in the averagely dominant eigenstate ($T< T_{\\mathrm{cr}}$) from the superadiabatic regime where the instantaneous dominant eigenstate takes over ($T> T_{\\mathrm{cr}}$), resolving the apparent tension between the previous literature. We identify two competing seeds: a geometric Stokes multiplier and the finite-precision floor. When the geometric seed vanishes, precision alone governs the transition, yielding $T_{\\mathrm{cr}} \\propto m\\ln\\beta$, linear in the number of precision bits $m$. This provides a purely forward-evolution manifestation of precision-induced irreversibility (PIR)~\\cite{PIR}, demonstrating that the fundamental limit identified through echo protocols also controls the outcome of slow non-Hermitian dynamics without requiring time reversal. For PT-symmetric energy spectra, $T_{\\mathrm{cr}}$ additionally determines the onset of chirality: the dynamics is non-chiral for $T< T_{\\mathrm{cr}}$ and chiral for $T> T_{\\mathrm{cr}}$.", "url": "https://arxiv.org/abs/2604.01918", "type": "理论", "summary": "沿着慢速参数循环驱动的非厄米系统会经历非绝热转变，其结果敏感地取决于驱动速度，但对于这些转变发生的关键时间尺度 $T_{\\mathrm{cr}}$ 还没有明确的公式可用。使用具有圆形参数轨迹的 $2\\times 2$ 哈密顿量，我们推导出非包围环、相移环、偏移环和包围异常点的环的闭合形式 $T_{\\mathrm{cr}} = \\mathcal{G}\\,\\ln(1/|\\Delta|)$，其中 $\\mathcal{G}$ 是依赖于几何形状的增长因子，$\\Delta$ 是不稳定种子。该公式将系统保持平均主导本征态 ($T< T_{\\mathrm{cr}}$) 的状态与瞬时主导本征态接管的超绝热状态 ($T> T_{\\mathrm{cr}}$) 区分开来，解决了先前文献之间的明显紧张关系。我们确定了两个相互竞争的种子：几何斯托克斯乘数和有限精度下限。当几何种子消失时，仅精度控制转换，产生 $T_{\\mathrm{cr}} \\propto m\\ln\\beta$，与精度位数 $m$ 呈线性关系。\n\n这提供了精确诱导不可逆性（PIR）的纯粹前向演化表现，证明通过回波协议识别的基本极限也可以控制缓慢非厄米动力学的结果，而不需要时间反转。对于 PT 对称能谱，$T_{\\mathrm{cr}}$ 还决定了手性的开始：$T< T_{\\mathrm{cr}}$ 的动力学是非手性的，而 $T> T_{\\mathrm{cr}}$ 的动力学是手性的。", "authors": [{"name": "Giorgos Pappas"}, {"name": "Diego Bautista Avilés"}, {"name": "Luis E. F. Foa Torres"}, {"name": "Vassos Achilleos"}], "featured_authors": [{"name": "Giorgos Pappas"}, {"name": "Diego Bautista Avilés"}, {"name": "Luis E. F. Foa Torres"}, {"name": "Vassos Achilleos"}], "author_count": 4}, {"id": "2604.01930", "category": "quant-ph", "title": "Quantum-Inspired Geometric Classification with Correlation Group Structures and VQC Decision Modeling", "abstract": "We propose a geometry-driven quantum-inspired classification framework that integrates Correlation Group Structures (CGR), compact SWAP-test-based overlap estimation, and selective variational quantum decision modelling. Rather than directly approximating class posteriors, the method adopts a geometry-first paradigm in which samples are evaluated relative to class medoids using overlap-derived Euclidean-like and angular similarity channels. CGR organizes features into anchor-centered correlation neighbourhoods, generating nonlinear, correlation-weighted representations that enhance robustness in heterogeneous tabular spaces. These geometric signals are fused through a non-probabilistic margin-based fusion score, serving as a lightweight and data-efficient primary classifier for small-to-moderate datasets. On Heart Disease, Breast Cancer, and Wine Quality datasets, the fusion-score classifier achieves 0.8478, 0.8881, and 0.9556 test accuracy respectively, with macro-F1 scores of 0.8463, 0.8703, and 0.9522, demonstrating competitive and stable performance relative to classical baselines. For large-scale and highly imbalanced regimes, we construct compact Delta-distance contrastive features and train a variational quantum classifier (VQC) as a nonlinear refinement layer. On the Credit Card Fraud dataset (0.17% prevalence), the Delta + VQC pipeline achieves approximately 0.85 minority recall at an alert rate of approximately 1.31%, with ROC-AUC 0.9249 and PR-AUC 0.3251 under full-dataset evaluation. These results highlight the importance of operating-point-aware assessment in rare-event detection and demonstrate that the proposed hybrid geometric-variational framework provides interpretable, scalable, and regime-adaptive classification across heterogeneous data settings.", "url": "https://arxiv.org/abs/2604.01930", "type": "理论+数值", "summary": "我们提出了一种几何驱动的量子启发分类框架，该框架集成了相关群结构（CGR）、基于紧凑 SWAP 测试的重叠估计和选择性变分量子决策建模。该方法不是直接近似类后验，而是采用几何优先范例，其中使用重叠导出的类欧几里得通道和角度相似通道相对于类中心点来评估样本。 CGR 将特征组织成以锚为中心的相关邻域，生成非线性、相关加权表示，从而增强异构表格空间中的鲁棒性。这些几何信号通过基于非概率边缘的融合分数进行融合，充当中小型数据集的轻量级且数据高效的主要分类器。在心脏病、乳腺癌和葡萄酒质量数据集上，融合评分分类器的测试准确率分别达到 0.8478、0.8881 和 0.9556，宏观 F1 评分分别为 0.8463、0.8703 和 0.9522，相对于经典基线，表现出有竞争力和稳定的性能。\n\n对于大规模和高度不平衡的情况，我们构建紧凑的 Delta 距离对比特征，并训练变分量子分类器（VQC）作为非线性细化层。在信用卡欺诈数据集（发生率为 0.17%）上，Delta + VQC 管道以约 1.31% 的警报率实现了约 0.85 的少数召回率，在完整数据集评估下 ROC-AUC 为 0.9249 和 PR-AUC 0.3251。这些结果强调了操作点感知评估在罕见事件检测中的重要性，并证明所提出的混合几何变分框架提供了跨异构数据设置的可解释、可扩展和机制自适应分类。", "authors": [{"name": "Nishikanta Mohanty"}, {"name": "Arya Ansuman Priyadarshi"}, {"name": "Bikash K. Behera"}, {"name": "Badshah Mukherjee"}], "featured_authors": [{"name": "Nishikanta Mohanty"}, {"name": "Arya Ansuman Priyadarshi"}, {"name": "Bikash K. Behera"}, {"name": "Badshah Mukherjee"}], "author_count": 4}, {"id": "2604.02064", "category": "quant-ph", "title": "Quantitative Universal Approximation for Noisy Quantum Neural Networks", "abstract": "We provide here a universal approximation theorem with precise quantitative error bounds for noisy quantum neural networks. We focus on applications to Quantitative Finance, where target functions are often given as expectations. We further provide a detailed numerical analysis, testing our results on actual noisy quantum hardware.", "url": "https://arxiv.org/abs/2604.02064", "type": "理论+数值", "summary": "我们在这里为噪声量子神经网络提供了一个具有精确定量误差界限的通用逼近定理。我们专注于定量金融的应用，其中目标函数通常作为期望给出。我们进一步提供了详细的数值分析，在实际的噪声量子硬件上测试我们的结果。", "authors": [{"name": "Lukas Gonon"}, {"name": "Antoine Jacquier"}, {"name": "Marcel Mordarski"}], "featured_authors": [{"name": "Lukas Gonon"}, {"name": "Antoine Jacquier"}, {"name": "Marcel Mordarski"}], "author_count": 3}, {"id": "2604.02112", "category": "quant-ph", "title": "Q2NS Demo: A Quantum Network Simulator Based on ns-3", "abstract": "Q2NS is an open-source quantum network simulator built on ns-3, the de facto standard for classical network simulation. By inheriting ns-3's mature classical stack and event-driven execution model, Q2NS enables faithful co-simulation of quantum-network dynamics and classical signaling, a core requirement for the functioning of any quantum network. Its modular architecture is designed for extensibility, with pluggable quantum-state backends (state-vector, density matrix, stabilizer) and a clean separation between network control and node-level operations. Q2NS comes with a quantum network visualizer Q2NSViz, supporting interactive inspection of both physical- and entanglement-induced connectivity graphs, helping users interpret protocol behavior and entanglement manipulation processes. We present a demonstration of Q2NS, highlighting its ability to capture and simulate the coexistence of quantum and classical communication. The proposed demonstration presents quantum communication scenarios of increasing complexity: from entanglement distribution basics to multipartite graph-state manipulation, complemented by pre-loaded examples in Q2NSViz that require no prior quantum communication or coding experience.", "url": "https://arxiv.org/abs/2604.02112", "type": "理论+数值", "summary": "Q2NS 是一个基于 ns-3 构建的开源量子网络模拟器，ns-3 是经典网络模拟的事实上的标准。通过继承 ns-3 成熟的经典堆栈和事件驱动执行模型，Q2NS 能够忠实地协同模拟量子网络动力学和经典信号，这是任何量子网络运行的核心要求。其模块化架构专为可扩展性而设计，具有可插拔的量子态后端（状态向量、密度矩阵、稳定器）以及网络控制和节点级操作之间的清晰分离。 Q2NS 配备了量子网络可视化工具 Q2NSViz，支持物理和纠缠引起的连接图的交互式检查，帮助用户解释协议行为和纠缠操纵过程。我们展示了 Q2NS 的演示，强调其捕获和模拟量子通信和经典通信共存的能力。\n\n拟议的演示呈现了日益复杂的量子通信场景：从纠缠分布基础知识到多部分图状态操作，并辅以 Q2NSViz 中预加载的示例，无需事先具备量子通信或编码经验。", "authors": [{"name": "Francesco Mazza"}, {"name": "Adam Pearson"}, {"name": "Marcello Caleffi"}, {"name": "Angela Sara Cacciapuoti"}], "featured_authors": [{"name": "Francesco Mazza"}, {"name": "Adam Pearson"}, {"name": "Marcello Caleffi"}, {"name": "Angela Sara Cacciapuoti"}], "author_count": 4}, {"id": "2604.02218", "category": "quant-ph", "title": "High-bandwidth Coherence Cloning using Optical-Phase-Locking Feedforward", "abstract": "Ultra-narrow-linewidth lasers with suppressed high-frequency phase noise are critical for quantum control and precision metrology. While optical phase locking (OPL) is the standard technique for cloning the coherence of such sources, its effectiveness is often limited at high frequencies by feedback latency. We present a robust feedforward architecture that overcomes this limitation by recycling and demodulating the existing master-slave beat signal to drive a single electro-optic modulator for near-instantaneous noise cancellation. This approach eliminates the extraneous sidebands and transmission losses typical of more complex modulators. Through active stabilization of the beat amplitude and demodulation phase, we demonstrate robust suppression exceeding 30 dB from 10 kHz to 10 MHz. This hardware-efficient framework is readily compatible with standard OPL setups, offering a scalable solution for high-fidelity coherent control.", "url": "https://arxiv.org/abs/2604.02218", "type": "理论", "summary": "具有抑制高频相位噪声的超窄线宽激光器对于量子控制和精密计量至关重要。虽然光学锁相 (OPL) 是克隆此类源的相干性的标准技术，但其有效性在高频下通常会受到反馈延迟的限制。我们提出了一种强大的前馈架构，通过回收和解调现有的主从差拍信号来驱动单个电光调制器以实现近乎瞬时的噪声消除，从而克服了这一限制。这种方法消除了更复杂的调制器典型的无关边带和传输损耗。通过主动稳定拍幅和解调相位，我们展示了从 10 kHz 到 10 MHz 超过 30 dB 的稳健抑制。这种硬件高效的框架很容易与标准 OPL 设置兼容，为高保真相干控制提供可扩展的解决方案。", "authors": [{"name": "Chen Jia"}, {"name": "Zhen-Xing Hua"}, {"name": "Yu-Xin Chao"}, {"name": "Meng Khoon Tey"}], "featured_authors": [{"name": "Chen Jia"}, {"name": "Zhen-Xing Hua"}, {"name": "Yu-Xin Chao"}, {"name": "Meng Khoon Tey"}], "author_count": 4}, {"id": "2604.02233", "category": "quant-ph", "title": "Quantum Time-Space Tradeoffs for Exponential Dynamic Programming", "abstract": "We investigate the quantum algorithms for dynamic programming by Ambainis et al. (SODA'19). While giving provable complexity speedups and applicable to a variety of NP-hard problems, these algorithms have a notable drawback: they require a large amount of Quantum Random Access Memory (QRAM), which potentially could be very challenging to implement in a physical quantum computer. In this work, we study how we can improve the space complexity by trading it for time, while still retaining a speedup over the classical algorithms. We show novel quantum time-space tradeoffs, which we obtain by adjusting the parameters of these algorithms and combining them with \"quantized\" classical strategies.", "url": "https://arxiv.org/abs/2604.02233", "type": "数值", "summary": "我们研究了 Ambainis 等人的动态规划量子算法。 （SODA'19）。虽然提供了可证明的复杂性加速并适用于各种 NP 难问题，但这些算法有一个显着的缺点：它们需要大量的量子随机存取存储器 (QRAM)，这在物理量子计算机中实现起来可能非常具有挑战性。在这项工作中，我们研究了如何通过以时间换取空间复杂度来提高空间复杂度，同时仍然保持比经典算法更快的速度。我们展示了新颖的量子时空权衡，这是通过调整这些算法的参数并将其与“量化”经典策略相结合而获得的。", "authors": [{"name": "Susanna Caroppo"}, {"name": "Jevgēnijs Vihrovs"}, {"name": "Dārta Zajakina"}, {"name": "Aleksejs Zajakins"}], "featured_authors": [{"name": "Susanna Caroppo"}, {"name": "Jevgēnijs Vihrovs"}, {"name": "Dārta Zajakina"}, {"name": "Aleksejs Zajakins"}], "author_count": 4}, {"id": "2604.02301", "category": "quant-ph", "title": "Lemniscate phase trajectories for high-fidelity GHZ state preparation in trapped-ion chains", "abstract": "In trapped-ion chains, multipartite GHZ states can be prepared natively with the help of a single bichromatic laser pulse. However, higher-order terms in the expansion in the Lamb-Dicke parameter $\\eta$ limit the GHZ state preparation infidelity for rectangular and bell-like pulses to the order of $\\eta^4$. For tens of ions, the infidelity caused by out-of-Lamb-Dicke effects can reach several percents. We propose an amplitude and phase-modulated pulse shape, an \"echoed lemniscate pulse\", which cancels this contribution into error in the leading order. For the proposed pulse, the infidelity scales as $\\eta^6$. The improved scaling is achieved because of a special phase trajectory of a collective motional mode following the figure-eight curve (lemniscate). We demonstrate that the lemniscate pulse allows achieving lower infidelity than bell-like pulses, which can be as low as $10^{-4}$ for $20$-ion chains.", "url": "https://arxiv.org/abs/2604.02301", "type": "理论", "summary": "在捕获离子链中，多部分 GHZ 态可以借助单个双色激光脉冲自然制备。然而，Lamb-Dicke 参数 $\\eta$ 展开中的高阶项将矩形和钟形脉冲的 GHZ 状态准备不保真度限制为 $\\eta^4$ 的量级。对于数十个离子，由非兰姆-迪克效应引起的不忠可以达到几个百分点。我们提出了一种幅度和相位调制的脉冲形状，即“回声双纽线脉冲”，它消除了对前导顺序误差的影响。对于提议的脉冲，不忠程度为 $\\eta^6$。由于遵循八字形曲线（双纽线）的集体运动模式的特殊相轨迹，实现了改进的缩放。我们证明双纽带脉冲可以实现比钟形脉冲更低的不忠度，对于 20 美元的离子链来说，钟形脉冲可以低至 10 美元^{-4} 美元。", "authors": [{"name": "Evgeny V. Anikin"}, {"name": "Andrey Chuchalin"}, {"name": "Dimitrii Donchenko"}, {"name": "Olga Lakhmanskaya"}, {"name": "Kirill Lakhmanskiy"}], "featured_authors": [{"name": "Evgeny V. Anikin"}, {"name": "Andrey Chuchalin"}, {"name": "Dimitrii Donchenko"}, {"name": "Olga Lakhmanskaya"}, {"name": "Kirill Lakhmanskiy"}], "author_count": 5}, {"id": "2604.02311", "category": "quant-ph", "title": "Space-Efficient Quantum Algorithm for Elliptic Curve Discrete Logarithms with Resource Estimation", "abstract": "Solving the Elliptic Curve Discrete Logarithm Problem (ECDLP) is critical for evaluating the quantum security of widely deployed elliptic-curve cryptosystems. Consequently, minimizing the number of logical qubits required to execute this algorithm is a key object. In implementations of Shor's algorithm, the space complexity is largely dictated by the modular inversion operation during point addition. Starting from the extended Euclidean algorithm (EEA), we refine the register-sharing method of Proos and Zalka and propose a space-efficient reversible modular inversion algorithm. We use length registers together with location-controlled arithmetic to store the intermediate variables in a compact form throughout the computation. We then optimize the stepwise update rules and give concrete circuit constructions for the resulting controlled arithmetic components. This leads to a modular inversion circuit that uses $3n + 4\\lfloor \\log_2 n \\rfloor + O(1)$ logical qubits and $204n^2\\log_2 n + O(n^2)$ Toffoli gates. By inserting this modular inversion component into the controlled affine point-addition circuit, we obtain a space-efficient algorithm for the ECDLP with $5n + 4\\lfloor \\log_2 n \\rfloor + O(1)$ qubits and $O(n^3)$ Toffoli gates. In particular, for a 256-bit prime-field curve, our estimate reduces the logical-qubit count to 1333, compared with 2124 in the previous low-width implementation of Häner et al.", "url": "https://arxiv.org/abs/2604.02311", "type": "理论+数值", "summary": "解决椭圆曲线离散对数问题 (ECDLP) 对于评估广泛部署的椭圆曲线密码系统的量子安全性至关重要。因此，最小化执行该算法所需的逻辑量子位的数量是一个关键目标。在 Shor 算法的实现中，空间复杂度很大程度上由点加法期间的模求逆运算决定。我们从扩展欧几里德算法（EEA）出发，改进了Proos和Zalka的寄存器共享方法，并提出了一种节省空间的可逆模逆算法。我们使用长度寄存器和位置控制算术来在整个计算过程中以紧凑的形式存储中间变量。然后，我们优化逐步更新规则，并为所得的受控算术组件给出具体的电路结构。这导致模块化反转电路使用 $3n + 4\\lfloor \\log_2 n \\rfloor + O(1)$ 逻辑量子位和 $204n^2\\log_2 n + O(n^2)$ Toffoli 门。\n\n通过将此模块化求逆组件插入到受控仿射点加法电路中，我们获得了具有 $5n + 4\\lfloor \\log_2 n \\rfloor + O(1)$ 量子位和 $O(n^3)$ Toffoli 门的 ECDLP 空间高效算法。特别是，对于 256 位素数场曲线，我们的估计将逻辑量子位计数减少到 1333，而 Häner 等人之前的低宽度实现中的逻辑量子位计数为 2124。", "authors": [{"name": "Han Luo"}, {"name": "Ziyi Yang"}, {"name": "Ziruo Wang"}, {"name": "Yuexin Su"}, {"name": "Tongyang Li"}], "featured_authors": [{"name": "Han Luo"}, {"name": "Ziyi Yang"}, {"name": "Ziruo Wang"}, {"name": "Yuexin Su"}, {"name": "Tongyang Li"}], "author_count": 5}, {"id": "2604.02314", "category": "quant-ph", "title": "Towards High-Brightness Perfect Photon Blockade", "abstract": "Single-photon sources with high single-photon purity and high brightness are key elements of many future quantum technologies. While photon blockade (PB) is widely exploited in the development of such sources, achieving the coexistence of high purity and high brightness remains a long-standing challenge. Here, we identify a novel mechanism for high-brightness PB and demonstrate that near-ideal purity and near-ideal brightness can be simultaneously achieved in an extended nondegenerate two-photon Jaynes-Cummings model with two-body and three-body interactions. This mechanism is underpinned by a distinctive energy-level structure arising from the combined action of the two interactions. The energy levels in the multi-excitation manifold essentially retain a harmonic ladder of degenerate doublets, whereas in the single-excitation subspace the doublet degeneracy is lifted, with a finite splitting between the two
