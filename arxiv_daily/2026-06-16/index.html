  <style>

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2606.14751", "category": "cond-mat", "title": "Kinematic Inconsistencies and Initial-Value Boundary Paradoxes in Rate-Dependent Viscoelastic Yield Stress Models", "abstract": "We present a rigorous analysis of the mathematical boundaries and kinematic consistency of a recently proposed rate-dependent relaxation time framework intended to unify pre- and post-yield dynamics in yield-stress fluids. By evaluating the governing constitutive equations under an idealized transient creep protocol from a state of physical rest, we show that the model encounters an unavoidable boundary paradox. To avoid predicting perfectly rigid solid behavior or falling into a division-by-zero mathematical singularity under a constant applied stress below the yield threshold ($\\sigma \\le \\sigma_y$), the framework requires an unphysical, instantaneous velocity or strain-rate step at $t = 0^+$. We show that assuming a non-zero initial strain rate explicitly violates momentum conservation and fluid inertia. Consequently, the framework preserves the piecewise, discontinuous drawbacks of classic viscoplastic models.", "url": "https://arxiv.org/abs/2606.14751", "type": "理论", "summary": "我们对最近提出的速率相关松弛时间框架的数学边界和运动学一致性进行了严格分析，旨在统一屈服应力流体中屈服前和屈服后的动力学。通过从物理静止状态评估理想化瞬态蠕变协议下的控制本构方程，我们表明该模型遇到了不可避免的边界悖论。为了避免预测完全刚性的固体行为或在低于屈服阈值 ($\\sigma \\le \\sigma_y$) 的恒定施加应力下陷入被零除的数学奇点，该框架需要在 $t = 0^+$ 处采用非物理的瞬时速度或应变率步长。我们表明，假设非零初始应变率明显违反了动量守恒和流体惯性。因此，该框架保留了经典粘塑性模型的分段、不连续的缺点。", "authors": [{"name": "Lalit Kumar"}], "featured_authors": [{"name": "Lalit Kumar"}], "author_count": 1}, {"id": "2606.14789", "category": "cond-mat", "title": "Plateau Gaps of Poisson Correctors Encode Metastable Reaction Rates", "abstract": "Metastable reaction rates are commonly inferred from transition-state fluxes, mean first-passage times, or fitted kinetic models. We show that they are directly encoded in the plateau gap of an occupation-time Poisson corrector. For a centered basin-occupation observable, the Poisson corrector develops metastable plateaus in the reactant and product basins, and their separation determines the forward and backward transition rates. This construction requires only the generator, stationary measure, and metastable partition, and therefore does not rely on a predefined transition-state surface. In overdamped and underdamped double-well dynamics, the plateau-gap rate recovers the Kramers, Grote-Hynes, and Pollak-Grabert-Hänggi hierarchy. The same corrector-martingale decomposition yields a reactive-noise density, revealing where stochastic forcing contributes to transitions in configuration or phase space. Thus, reaction rates and their fluctuation sources emerge from a single corrector field.", "url": "https://arxiv.org/abs/2606.14789", "type": "理论", "summary": "亚稳态反应速率通常根据过渡态通量、平均首次通过时间或拟合动力学模型推断。我们证明它们直接编码在占用时间泊松校正器的平台间隙中。对于中心盆占据可观测值，泊松校正器在反应物盆和产物盆中形成亚稳态平台，它们的分离决定了向前和向后的转变率。这种结构仅需要生成器、固定测量和亚稳态分区，因此不依赖于预定义的过渡态表面。在过阻尼和欠阻尼双井动力学中，平台间隙率恢复了 Kramers、Grote-Hynes 和 Pollak-Grabert-Hänggi 层次结构。相同的校正鞅分解产生反应噪声密度，揭示随机强迫在何处促成构型或相空间的转变。因此，反应速率及其波动源来自单个校正器场。", "authors": [{"name": "Sang Yang"}, {"name": "Zhixin Peng"}], "featured_authors": [{"name": "Sang Yang"}, {"name": "Zhixin Peng"}], "author_count": 2}, {"id": "2606.14814", "category": "cond-mat", "title": "A Multi-Level Architecture for Reusable Materials Ontologies -- The OntoCrafter Ceramics Ontology (OCO) as Reference Implementation", "abstract": "The Materials Science and Engineering ontology landscape is fragmented along multiple axes simultaneously. Horizontally: a recent survey identified 94 ontologies of which over 40 are structurally incompatible; each new application domain -- ceramics, polymers, batteries, smart materials -- typically restarts ontology design from scratch. Vertically: EU regulation (CSRD, CSDDD, PPWR, CBAM, R2R, AI Act, ESPR) forces material, manufacturing, supply-chain, and lifecycle data into integrated digital product passports, leaving ontologies that only address horizontal fragmentation incomplete for any contemporary consumer. And mechanistically: a vocabulary that records that BNT-BT has $d_{33} \\approx 580$ pC/N stores a fact but cannot surface why -- Bi-6s$^2$ lone-pair stereo-activity, anomalous Born effective charges, soft modes, defect chemistry -- without a systematic explanation skeleton. We propose a multi-level modular architecture with two independent classification axes -- level of abstraction (L0 bridges, L1 material-agnostic laboratory-notebook, L2 material-class-specific, L3 categorical reasoning) and consumer audience (material vs. compliance) -- in which the material-specific level is internally organised by a seven-tier mechanistic-explanation skeleton (Symmetry, Energy/DFT, Thermo/CALPHAD, Kinetics, Microstructure, Defect chemistry, Bonding) applicable to any crystalline ionic oxide. The level-and-audience modularity dissolves the horizontal fragmentation, the compliance audience absorbs the vertical regulation pressure, and the seven-tier organisation of Level 2 delivers the mechanistic explanation depth. We instantiate the architecture as the OntoCrafter Ceramics Ontology (OCO v0.94): 5,196 classes across 44 modules; 167,348 OWL axioms (40,454 logical); 1,674 properties; 829 cross-ontology bridge mappings; 1,172 SHACL shapes; 163 published competency questions.", "url": "https://arxiv.org/abs/2606.14814", "type": "理论+数值", "summary": "材料科学与工程本体景观同时沿多个轴碎片化。横向：最近的一项调查确定了 94 个本体，其中 40 多个本体在结构上不兼容；每个新的应用领域——陶瓷、聚合物、电池、智能材料——通常都会从头开始重新启动本体设计。纵向：欧盟法规（CSRD、CSDDD、PPWR、CBAM、R2R、AI Act、ESPR）强制将材料、制造、供应链和生命周期数据纳入集成的数字产品护照中，使得仅解决水平碎片化问题的本体对于任何当代消费者来说都是不完整的。从机械上讲：记录 BNT-BT 有 $d_{33} \\approx 580$ pC/N 的词汇存储了一个事实，但无法揭示原因 - Bi-6s$^2$ 孤对立体活性、异常 Born 有效电荷、软模式、缺陷化学 - 没有系统的解释框架。我们提出了一种具有两个独立分类轴的多级模块化架构——抽象级别（L0 桥、L1 与材料无关的实验室笔记本、L2 材料类别特定、L3 分类推理）和消费者受众（材料与内容）。\n\n合规性）——其中材料特定级别由适用于任何晶体离子氧化物的七层机械解释骨架（对称性、能量/DFT、热/CALPHAD、动力学、微观结构、缺陷化学、键合）内部组织。层级和受众的模块化化解了横向碎片化，合规受众吸收了纵向监管压力，二级的七层组织提供了机械化的解释深度。我们将该架构实例化为 OntoCrafter Ceramics Ontology (OCO v0.94)：跨 44 个模块的 5,196 个类； 167,348 个 OWL 公理（40,454 个逻辑）； 1,674 处房产； 829个跨本体桥接映射； 1,172 个 SHACL 形状； 163 个已发布的能力问题。", "authors": [{"name": "Thomas Pannek"}, {"name": "Wolfgang Grond"}], "featured_authors": [{"name": "Thomas Pannek"}, {"name": "Wolfgang Grond"}], "author_count": 2}, {"id": "2606.14851", "category": "cond-mat", "title": "Jahn-Teller effect in $j = 3/2$ Mott insulators: Ground states and thermal fluctuations", "abstract": "The interplay of strong atomic spin-orbit coupling with Jahn-Teller (JT) lattice distortions is an important theme in quantum materials hosting heavy atoms. A prototypical example of such a system is a degenerate $j = 3/2$ multiplet coupled to local phonon modes. Here, we study the multipolar ground states of this system as realized in Mott insulators, explore its thermal phase diagram via an $SU(4)$ spin Monte Carlo approach coupled to JT phonons, and study the temperature dependent splittings of the $j = 3/2$ multiplet as relevant to spectroscopic probes. Our work sheds light on coexisting distinct multipolar orders engendered by phonon coupling, role of thermal JT fluctuations, and the entropy of the coupled multipole-phonon system. We discuss broad implications for double perovskites $\\rm Ba_2MgReO_6$, $\\rm Ba_2NaOsO_6$ and lacunar spinels such as $\\rm GaTa_4Se_8$ and $\\rm GaNb_4Se_8$.", "url": "https://arxiv.org/abs/2606.14851", "type": "数值", "summary": "强原子自旋轨道耦合与 Jahn-Teller (JT) 晶格畸变的相互作用是承载重原子的量子材料的一个重要主题。这种系统的一个典型例子是与局部声子模式耦合的简并 $j = 3/2$ 多重态。在这里，我们研究了在莫特绝缘体中实现的该系统的多极基态，通过与 JT 声子耦合的 $SU(4)$ 自旋蒙特卡罗方法探索其热相图，并研究与光谱探针相关的 $j = 3/2$ 多重态的温度依赖性分裂。我们的工作揭示了声子耦合产生的共存的不同多极级、热 JT 涨落的作用以及耦合多极声子系统的熵。我们讨论了双钙钛矿 $\\rm Ba_2MgReO_6$、$\\rm Ba_2NaOsO_6$ 和空穴尖晶石（例如 $\\rm GaTa_4Se_8$ 和 $\\rm GaNb_4Se_8$）的广泛影响。", "authors": [{"name": "Kathleen Hart"}, {"name": "Ruairidh Sutcliffe"}, {"name": "Arun Paramekanti"}], "featured_authors": [{"name": "Kathleen Hart"}, {"name": "Ruairidh Sutcliffe"}, {"name": "Arun Paramekanti"}], "author_count": 3}, {"id": "2606.14872", "category": "cond-mat", "title": "Dominant spin Hall torque and negligible orbital Hall torque in α-W/ferromagnet heterostructures with artifacts-free angular momentum detectors", "abstract": "{\\alpha}-phased W was theoretically predicted to have a negative spin Hall conductivity and a positive orbital Hall conductivity at the same time, leaving the physical origin of the current-induced torque a critical open question. Here, we develop two angular momentum detectors of Cu/Ni/Cu and Cu/FeCoB/Cu that are free of artifacts torques (e.g., self-induced torque and spin-vorticity torque) and clarify that the spin-orbit torque contributed by W remains negative and predominantly from the spin Hall effect in the entire thickness regime. With both detectors, the damping-like torque exhibits a monotonic decay as the W thickness increases above 5 nm, which results from the structural phase transition from \\b{eta}-W to {\\alpha}-W. The negative torque in the entire thickness regime suggests negligible orbital Hall torque and orbital current from the {\\alpha}-W. This result is consistent with the theory that the orbital Hall effect from simplified band structure calculations is not a non-local angular momentum source. These findings suggest poor generality or even universal absence of orbital current.", "url": "https://arxiv.org/abs/2606.14872", "type": "理论+数值", "summary": "理论上预测 {α} 相 W 同时具有负自旋霍尔电导率和正轨道霍尔电导率，这使得电流感应扭矩的物理起源成为一个关键的悬而未决的问题。在这里，我们开发了两种 Cu/Ni/Cu 和 Cu/FeCoB/Cu 角动量探测器，它们没有伪影扭矩（例如自感扭矩和自旋涡量扭矩），并阐明 W 贡献的自旋轨道扭矩仍然为负，并且主要来自整个厚度范围内的自旋霍尔效应。对于这两个探测器，当 W 厚度增加到 5 nm 以上时，类阻尼扭矩表现出单调衰减，这是由从 β-W 到 α-W 的结构相变引起的。整个厚度范围内的负扭矩表明来自 {\\alpha}-W 的轨道霍尔扭矩和轨道电流可以忽略不计。这一结果与简化能带结构计算得出的轨道霍尔效应不是非局部角动量源的理论是一致的。这些发现表明轨道电流的普遍性较差，甚至普遍不存在。", "authors": [{"name": "Taiyang Zhang"}, {"name": "Lujun Zhu"}, {"name": "Qianbiao Liu"}, {"name": "Lijun Zhu"}], "featured_authors": [{"name": "Taiyang Zhang"}, {"name": "Lujun Zhu"}, {"name": "Qianbiao Liu"}, {"name": "Lijun Zhu"}], "author_count": 4}, {"id": "2606.14888", "category": "cond-mat", "title": "Atomistic insights into the structural, thermal, and mechanical evolution of $Zr_{47.5}Cu_{47.5}Ag_{5}$ bulk metallic glass", "abstract": "Bulk metallic glasses (BMGs) are distinguished by amorphous atomic structures that confer superior mechanical performance; however, the evolution of these properties in ternary bulk configurations remains insufficiently explored. In this study, we employed large-scale molecular dynamics simulations to investigate the structural, thermal, and mechanical properties of $Zr_{47.5}Cu_{47.5}Ag_{5}$ BMGs. Our thermodynamic and topological analyses, utilizing potential energy regression and the Modified Wendt-Abraham parameter, identified a glass transition temperature ($T_g$) of approximately $692\\text{ K}$. Structural characterization via Voronoi tessellation and partial radial distribution functions reveals that the amorphous matrix is stabilized by icosahedral clusters, with Ag atoms inducing significant chemical heterogeneity through localized nano-clustering. Thermal transport properties, computed via the Green-Kubo formalism, demonstrate a monotonic decrease in conductivity with temperature, consistent with structural scattering saturation in disordered lattices. Mechanical tensile testing reveals that the material exhibits robust rate- and temperature-dependent behavior, with yield strengths reaching $\\approx 2.3\\text{ GPa}$ at room temperature. We show that macroscopic strain-softening is intrinsically linked to the thermally induced collapse of rigid icosahedral motifs, which facilitates shear band percolation. These findings provide a structural rationale for the beneficial role of Ag dopants in enhancing the resilience of multicomponent metallic glasses.", "url": "https://arxiv.org/abs/2606.14888", "type": "理论+数值", "summary": "块状金属玻璃 (BMG) 的特点是非晶原子结构，具有卓越的机械性能；然而，这些特性在三元块体构型中的演变仍未得到充分探索。在这项研究中，我们采用大规模分子动力学模拟来研究 $Zr_{47.5}Cu_{47.5}Ag_{5}$ BMG 的结构、热和机械性能。我们的热力学和拓扑分析，利用势能回归和修正的 Wendt-Abraham 参数，确定玻璃化转变温度 ($T_g$) 约为 $692\\text{ K}$。通过 Voronoi 镶嵌和部分径向分布函数进行的结构表征表明，非晶基质通过二十面体簇稳定，其中 Ag 原子通过局部纳米簇诱导显着的化学异质性。通过 Green-Kubo 形式计算的热传输特性表明电导率随温度单调下降，与无序晶格中的结构散射饱和一致。\n\n机械拉伸测试表明，该材料表现出鲁棒的速率和温度依赖性行为，室温下屈服强度达到 $\\approx 2.3\\text{ GPa}$。我们表明，宏观应变软化与刚性二十面体图案的热致塌陷有着内在的联系，这有利于剪切带渗透。这些发现为银掺杂剂在增强多组分金属玻璃的弹性方面的有益作用提供了结构原理。", "authors": [{"name": "N. Mendez"}, {"name": "S. Jaroszewicz"}, {"name": "M. P. Beccar-Varela"}, {"name": "M. C. Mariani"}], "featured_authors": [{"name": "N. Mendez"}, {"name": "S. Jaroszewicz"}, {"name": "M. P. Beccar-Varela"}, {"name": "M. C. Mariani"}], "author_count": 4}, {"id": "2606.14928", "category": "cond-mat", "title": "Controlling Porosity in Supraparticles Composed of Colloidal Rods and Spheres", "abstract": "Supraparticles (SPs) are assemblies of colloidal particles whose properties can be tuned by modifying the chemistry, shape, and size of the colloidal particles as well as their arrangement in the SP. SPs with internal porosity are of particular interest for catalysis, photonics, and adsorption applications because of their high surface area and tunable pore size distribution. SPs are often fabricated by droplet drying, and the nonequilibrium nature of drying processes may provide an additional handle to control particle arrangement within the SP. Here, we use mesoscale particle-based simulations to explore the drying-induced assembly of SPs made from rod-shaped and spherical colloidal particles. We selectively remove one type of particle after drying and characterize the structure of the resulting porous SP. We find that the remaining particles form connected networks for most compositions, with rods percolating at lower volume fractions than spheres. Most of the resulting void volume forms a single contiguous space whose surface area closely follows the total surface area of the remaining component. The pore-size distribution, however, depends strongly on sphere size and on the removed component, reflecting differences in sphere-clustering and rod-bundling before removal. This work provides new insight into how particle size and shape, as well as processing conditions, might be used to manipulate porosity in SPs.", "url": "https://arxiv.org/abs/2606.14928", "type": "理论+数值", "summary": "超颗粒 (SP) 是胶体颗粒的集合体，其特性可以通过改变胶体颗粒的化学性质、形状和尺寸以及它们在 SP 中的排列来调节。具有内部孔隙的SP由于其高表面积和可调的孔径分布而在催化、光子学和吸附应用中受到特别关注。 SP 通常是通过液滴干燥制造的，干燥过程的非平衡性质可以为控制 SP 内的颗粒排列提供额外的方法。在这里，我们使用基于介观粒子的模拟来探索由棒状和球形胶体颗粒制成的 SP 的干燥诱导组装。我们在干燥后选择性地去除一种类型的颗粒，并表征所得多孔 SP 的结构。我们发现，对于大多数组合物，其余颗粒形成连接的网络，棒状颗粒的渗透体积分数低于球状颗粒。所产生的大部分空隙体积形成单个连续空间，其表面积紧随其余组件的总表面积。\n\n然而，孔径分布在很大程度上取决于球体尺寸和去除的成分，反映了去除前球体聚集和棒束化的差异。这项工作为如何利用颗粒尺寸和形状以及加工条件来控制 SP 的孔隙率提供了新的见解。", "authors": [{"name": "Kritika Kritika"}, {"name": "Michael P. Howard"}, {"name": "Arash Nikoubashman"}], "featured_authors": [{"name": "Kritika Kritika"}, {"name": "Michael P. Howard"}, {"name": "Arash Nikoubashman"}], "author_count": 3}, {"id": "2606.14938", "category": "cond-mat", "title": "Fermi-Level-Dependent Defect Chemistry and Oxygen Evolution Reaction Activity of Fe-Doped and Oxygen-Deficient \\ce{SrTiO3}(001)", "abstract": "The oxygen evolution reaction (OER) on perovskite oxides is controlled by the interplay of dopant chemistry, defect charge states, and surface segregation, yet these factors are rarely treated on equal footing. Using first-principles density functional theory, we investigate how Fe dopants (\\FeTi{}) and oxygen vacancies (\\VO{}) in different charge states affect the OER on TiO$_2$-terminated \\ce{SrTiO3}(001). We combine charge-dependent defect formation energies, segregation energies, and charge transition levels with OER free-energy profiles obtained in the computational hydrogen electrode framework. Neutral \\FeTix{} preserves near-pristine activity, with overpotentials of $0.43$--$0.48$~V compared to $0.45$~V for the pristine surface, whereas the reduced states \\FeTip{} and \\FeTipp{} raise the overpotential to as much as $1.35$~V when intermediates bind to Ti sites adjacent to surface Fe. Oxygen vacancies segregate to the surface across the entire band gap ($\\Delta E_\\mathrm{seg} = -0.50$ to $-0.80$~eV) but do not improve the activity: \\VOx{} and \\VOp{} overstabilize oxygenated intermediates ($\\eta$ up to $2.13$~V), and only \\VOpp{} retains a balanced pathway ($\\eta = 0.45$~V in the bulk-like region). Because the stable charge state and the segregation tendency of each defect are set by the Fermi level, the OER overpotential itself becomes a Fermi-level-dependent quantity. These results establish Fermi-level engineering as a framework for assessing and tuning defect-mediated OER activity in perovskite oxides.", "url": "https://arxiv.org/abs/2606.14938", "type": "理论+数值", "summary": "钙钛矿氧化物上的析氧反应（OER）由掺杂剂化学、缺陷电荷态和表面偏析的相互作用控制，但这些因素很少被平等对待。利用第一性原理密度泛函理论，我们研究了不同电荷状态下的 Fe 掺杂剂 (\\FeTi{}) 和氧空位 (\\VO{}) 如何影响 TiO$_2$ 端接 \\ce{SrTiO3}(001) 上的 OER。我们将电荷相关的缺陷形成能、偏析能和电荷跃迁能级与在计算氢电极框架中获得的 OER 自由能曲线相结合。中性\\FeTix{}保留了接近原始的活性，与原始表面的$0.45$~V相比，超电势为$0.43$--$0.48$~V，而当中间体与表面Fe相邻的Ti位点结合时，还原态\\FeTip{}和\\FeTipp{}将超电势提高到$1.35$~V。\n\n氧空位在整个带隙上隔离到表面（$\\Delta E_\\mathrm{seg} = -0.50$ 至 $-0.80$~eV），但不会提高活性：\\VOx{} 和 \\VOp{} 过度稳定含氧中间体（$\\eta$ 高达 $2.13$~V），只有 \\VOpp{} 保留平衡路径（$\\eta = 0.45$~V 在块状区域）。由于每个缺陷的稳定电荷态和偏析趋势是由费米能级决定的，因此OER超电势本身就成为与费米能级相关的量。这些结果将费米能级工程确立为评估和调整钙钛矿氧化物中缺陷介导的 OER 活性的框架。", "authors": [{"name": "Amit Sehrawat"}, {"name": "Jochen Rohrer"}], "featured_authors": [{"name": "Amit Sehrawat"}, {"name": "Jochen Rohrer"}], "author_count": 2}, {"id": "2606.14978", "category": "cond-mat", "title": "Complementary Thermodynamic Mechanisms of Boron and Carbon Segregation at Grain Boundaries in Nickel Alloys", "abstract": "Grain boundary stabilization by light interstitials is central to the performance of Ni-based superalloys, yet the thermodynamic mechanisms governing their interactions with substitutional chemistry remain poorly resolved. Here, we use hybrid Monte Carlo molecular dynamics simulations to quantify how boron and carbon modify the thermodynamic, structural, and chemical ordering of grain boundaries in Ni--Cr alloys. By analyzing interfacial state variables, site-resolved segregation spectra, local chemical ordering, and structural evolution, we show that boron and carbon stabilize grain boundaries through complementary pathways. Carbon drives saturation-controlled stabilization by recruiting Cr and conditioning boundary chemistry, while suppressing temperature-driven structural transformations of the boundary. In contrast, boron stabilizes grain boundaries through a selective mechanism that lowers the interfacial grand potential via localized ordering while permitting gradual structural evolution. These effects arise from coupled interactions between interstitial segregation and Cr redistribution, which together regulate site accessibility, chemical competition, and the range of accessible interfacial states. This work provides a thermodynamic framework for grain boundary engineering and suggests design principles for leveraging interstitial-substitutional interactions in alloys.", "url": "https://arxiv.org/abs/2606.14978", "type": "理论+数值", "summary": "轻质间隙原子的晶界稳定是镍基高温合金性能的核心，但控制其与替代化学相互作用的热力学机制仍不清楚。在这里，我们使用混合蒙特卡罗分子动力学模拟来量化硼和碳如何改变镍铬合金中晶界的热力学、结构和化学排序。通过分析界面状态变量、位点解析偏析谱、局部化学排序和结构演化，我们表明硼和碳通过互补途径稳定晶界。碳通过吸收 Cr 和调节边界化学来驱动饱和控制稳定，同时抑制温度驱动的边界结构转变。相比之下，硼通过选择性机制稳定晶界，通过局部有序降低界面大势，同时允许逐渐的结构演化。\n\n这些效应是由间隙偏析和 Cr 重新分布之间的耦合相互作用产生的，它们共同调节位点可及性、化学竞争和可及界面状态的范围。这项工作为晶界工程提供了一个热力学框架，并提出了利用合金中间隙取代相互作用的设计原则。", "authors": [{"name": "Tyler D. Doležal"}, {"name": "Rodrigo Freitas"}, {"name": "Ju Li"}], "featured_authors": [{"name": "Tyler D. Doležal"}, {"name": "Rodrigo Freitas"}, {"name": "Ju Li"}], "author_count": 3}, {"id": "2606.15051", "category": "cond-mat", "title": "Ternary-composition tuning of the anomalous Nernst effect in amorphous-like Gd-Co-Pt films", "abstract": "We report composition tuning of the anomalous Nernst effect in amorphous-like Gd-Co-Pt ternary films. Pt incorporation into Gd-Co films modifies the anomalous Nernst coefficient and induces a sign reversal of S_ANE, whereas Gd incorporation into Co-Pt films suppresses S_ANE but reduces thermal conductivity. Owing to the balance between transverse thermoelectric response and thermal transport, the heat-flux sensitivity reaches approximately 0.24 {\\mu}m/A. Composition maps reveal that the magnitude and heat-flux sensitivity of the anomalous Nernst effect can be systematically tuned in the Gd-Co-Pt ternary composition space. This work extends ANE material design from binary-alloy optimization to ternary-composition engineering.", "url": "https://arxiv.org/abs/2606.15051", "type": "数值", "summary": "我们报告了类非晶态 Gd-Co-Pt 三元薄膜中反常能斯特效应的成分调整。将 Pt 掺入 Gd-Co 薄膜中会改变反常能斯特系数并引起 S_ANE 的符号反转，而将 Gd 掺入 Co-Pt 薄膜中会抑制 S_ANE 但会降低热导率。由于横向热电响应和热传输之间的平衡，热通量灵敏度达到约0.24 {\\mu}m/A。成分图表明，异常能斯特效应的强度和热通量敏感性可以在 Gd-Co-Pt 三元成分空间中系统地调整。这项工作将 ANE 材料设计从二元合金优化扩展到三元成分工程。", "authors": [{"name": "Tomohiro Koizumi"}, {"name": "Mojtaba Mohammadi"}, {"name": "Hiroto Imaeda"}, {"name": "Hiroyuki Awano"}, {"name": "Kenji Tanabe"}], "featured_authors": [{"name": "Tomohiro Koizumi"}, {"name": "Mojtaba Mohammadi"}, {"name": "Hiroto Imaeda"}, {"name": "Hiroyuki Awano"}, {"name": "Kenji Tanabe"}], "author_count": 5}, {"id": "2606.15100", "category": "cond-mat", "title": "Universal scaling in the rheology of dense cellular systems", "abstract": "Biological tissues must dynamically transition between rigid and fluid-like states during processes like morphogenesis and collective migration, often while simultaneously resisting physiological shear stresses. It remains unclear whether these tissue dynamics are governed by the same non-equilibrium critical phenomena that control conventional disordered matter. Here we show that model cell monolayers under constant stress display a rich phase diagram of nonlinear rheology. In rigid regimes, small internal fluctuations maintain a solid-like state up to a finite yield stress, above which the tissue shear-thins; conversely, fluid-like regimes exhibit robust continuous and discontinuous shear thickening, culminating in structural arrest via shear jamming. This space-filling shear-jamming transition is accompanied by structural changes including the formation of system-spanning force chains and the emergence of orientational ordering. We demonstrate that the macroscopic viscosity across these disparate regimes is described by universal scaling behavior controlled by the same underlying physical parameters. These results establish confluent tissues as a distinct class of disordered matter, demonstrating that universal jamming phenomena can emerge entirely through shape-driven topological constraints to regulate biological mechanics.", "url": "https://arxiv.org/abs/2606.15100", "type": "理论+数值", "summary": "在形态发生和集体迁移等过程中，生物组织必须在刚性状态和类流体状态之间动态转变，通常同时抵抗生理剪切应力。目前尚不清楚这些组织动力学是否受到控制传统无序物质的相同非平衡临界现象的控制。在这里，我们展示了恒定应力下的模型细胞单层显示出丰富的非线性流变相图。在刚性状态下，小的内部波动在达到有限的屈服应力时保持类固体状态，超过该应力时组织会剪切变薄；相反，类流体状态表现出强大的连续和不连续剪切增稠，最终通过剪切干扰导致结构停滞。这种空间填充剪切干扰转变伴随着结构变化，包括系统跨越力链的形成和方向排序的出现。我们证明，这些不同状态下的宏观粘度是通过由相同的基础物理参数控制的通用标度行为来描述的。\n\n这些结果将汇合组织确立为一类独特的无序物质，表明普遍的干扰现象可以完全通过形状驱动的拓扑约束来调节生物力学。", "authors": [{"name": "Helen S. Ansell"}, {"name": "Daniel M. Sussman"}], "featured_authors": [{"name": "Helen S. Ansell"}, {"name": "Daniel M. Sussman"}], "author_count": 2}, {"id": "2606.15131", "category": "cond-mat", "title": "Quasiparticle Diffusion for the Toda Fluid in Equilibrium", "abstract": "Many-body integrable systems can be understood as a gas of quasiparticles. They propagate ballistically and drive large-scale transport. However, with the exception of the hard rods system, no tools have been available to numerically track such quasiparticles. Focusing on the Toda fluid, whose integrability relies on the availability of a Lax pair, we present a numerical scheme to track quasiparticle trajectories as determined by the time-dependent eigenvectors of the Lax matrix. Simulating the Toda fluid in thermal equilibrium, this tracking scheme is used to numerical confirm Brownian motion of a quasiparticle. Simulated is also the motion of a tagged particle. Our numerical results for the diffusion constant matches with a novel TBA prediction. We believe our numerical scheme can be extended to other classical many-particle models possessing a Lax matrix.", "url": "https://arxiv.org/abs/2606.15131", "type": "理论+数值", "summary": "多体可积系统可以理解为准粒子气体。它们以弹道方式传播并驱动大规模运输。然而，除了硬棒系统之外，还没有任何工具可以对此类准粒子进行数字跟踪。针对 Toda 流体，其可积性依赖于 Lax 对的可用性，我们提出了一种数值方案来跟踪由 Lax 矩阵的时间相关特征向量确定的准粒子轨迹。该跟踪方案模拟热平衡状态下的 Toda 流体，用于数值确认准粒子的布朗运动。模拟的还包括标记粒子的运动。我们的扩散常数数值结果与新颖的 TBA 预测相匹配。我们相信我们的数值方案可以扩展到其他拥有 Lax 矩阵的经典多粒子模型。", "authors": [{"name": "Seema Chahal"}, {"name": "Alberto Brollo"}, {"name": "Indranil Mukherjee"}, {"name": "Abhishek Dhar"}, {"name": "Anupam Kundu"}, {"name": "Herbert Spohn"}], "featured_authors": [{"name": "Seema Chahal"}, {"name": "Alberto Brollo"}, {"name": "Indranil Mukherjee"}, {"name": "Abhishek Dhar"}, {"name": "Anupam Kundu"}, {"name": "Herbert Spohn"}], "author_count": 6}, {"id": "2606.15212", "category": "cond-mat", "title": "Creation and motion of antiferromagnetic skyrmions by edge manipulation", "abstract": "Magnetic racetrack architectures that use topological magnetic particles to store information are one of the most promising concepts for future storage applications. Antiferromagnetic racetracks are particularly appealing as they are not susceptible to external magnetic fields. State-of-the-art racetracks use magnetic fields, spin-transfer and spin-orbit torques caused by electric currents to move the bits across the entire circuit. However, the application of currents in many antiferromagnetic racetracks is limited because many of them are insulating. Recently, however, a concept for ferromagnetic racetrack memories that are free of global driving forces has been proposed. It has been demonstrated that various topological entities can be generated and transported over long distances solely through local magnetization rotation at the sample boundaries, independent of global driving forces. Here, we demonstrate that the local rotation of magnetization at the boundary of an antiferromagnetic sample can be exploited in racetracks to efficiently generate and transmit antiferromagnetic skyrmions. Additionally, we demonstrate that local switching of staggered magnetization at the edge of an antiferromagnetic racetrack can be even more successful than the rotational procedure. A comparison of ferromagnetic and antiferromagnetic processing of skyrmionic bits, together with energy considerations, shows that this procedure is fairly efficient in antiferromagnets.", "url": "https://arxiv.org/abs/2606.15212", "type": "理论", "summary": "使用拓扑磁性粒子来存储信息的磁跑道架构是未来存储应用最有前途的概念之一。反铁磁赛道特别有吸引力，因为它们不易受到外部磁场的影响。最先进的赛道利用电流引起的磁场、自旋转移和自旋轨道扭矩来在整个电路上移动比特。然而，电流在许多反铁磁跑道中的应用受到限制，因为其中许多是绝缘的。然而，最近提出了一种不受全局驱动力影响的铁磁赛道存储器的概念。已经证明，仅通过样本边界处的局部磁化旋转就可以生成各种拓扑实体并长距离传输，而与全局驱动力无关。在这里，我们证明了可以在赛道中利用反铁磁样品边界处的磁化强度的局部旋转来有效地生成和传输反铁磁斯格明子。\n\n此外，我们证明了反铁磁跑道边缘交错磁化强度的局部切换甚至比旋转过程更成功。对斯格明子位的铁磁和反铁磁处理的比较以及能量考虑表明，该过程在反铁磁体中相当有效。", "authors": [{"name": "Aleksey Berg"}, {"name": "Tim Matthies"}, {"name": "Roland Wiesendanger"}, {"name": "Elena Y. Vedmedenko"}], "featured_authors": [{"name": "Aleksey Berg"}, {"name": "Tim Matthies"}, {"name": "Roland Wiesendanger"}, {"name": "Elena Y. Vedmedenko"}], "author_count": 4}, {"id": "2606.15245", "category": "cond-mat", "title": "Interaction and non-Hermiticity controlled transmission in extended Su-Schrieffer-Heeger models", "abstract": "We study the transport characteristics of an extended version of the Su-Schrieffer-Heeger (SSH) model with next-nearest-neighbor (NNN) interactions and non-Hermitian onsite energies. We observed that transport in such a system is significantly modified by the NNN interaction and the non-Hermitian terms. The transmission coefficient exhibits oscillatory behavior as the strength of the NNN interaction varies in a fixed-length chain. Moreover, the transmission coefficient also shows oscillation with system size for a fixed strength of the NNN interaction. We find that novel oscillatory behavior of the transmission coefficient, arising form the NNN interaction, is a unique feature of such a model and has not been reported previously. The presence of the non-Hermitian terms also enhances/reduces the transmission coefficient depending on the values of the other system parameters like intra-, inter- and NNN hopping. It appears from our study that both the NNN interaction and the non-Hermiticity introduce significant changes in the transport properties of the extended SSH chain, which are not observed in the standard Hermitian nearest-neighbour variant of the SSH model.", "url": "https://arxiv.org/abs/2606.15245", "type": "理论", "summary": "我们研究了具有次近邻 (NNN) 相互作用和非厄米现场能量的 Su-Schrieffer-Heeger (SSH) 模型扩展版本的传输特性。我们观察到，NNN 相互作用和非厄米项显着改变了此类系统中的传输。随着固定长度链中 NNN 相互作用强度的变化，传输系数表现出振荡行为。此外，对于固定强度的 NNN 相互作用，传输系数还显示出随系统尺寸的振荡。我们发现，由 NNN 交互作用产生的传输系数的新颖振荡行为是此类模型的独特特征，之前尚未报道过。非埃尔米特项的存在也会根据其他系统参数（如帧内、帧间和 NNN 跳频）的值来增强/降低传输系数。从我们的研究来看，NNN 相互作用和非厄米性都给扩展 SSH 链的传输特性带来了显着的变化，而这在 SSH 模型的标准埃尔米特最近邻变体中没有观察到。", "authors": [{"name": "Syeda Rafisa Rahaman"}, {"name": "Shreekantha Sil"}, {"name": "Nilanjan Bondyopadhaya"}], "featured_authors": [{"name": "Syeda Rafisa Rahaman"}, {"name": "Shreekantha Sil"}, {"name": "Nilanjan Bondyopadhaya"}], "author_count": 3}, {"id": "2606.15279", "category": "cond-mat", "title": "On the flow of electrically charged particles in an elastic solid", "abstract": "This paper is a specialization of a broad and complicated continuum theory [ arXiv:2403.07582 ] to a relatively simple and useful case so that it is more reader friendly. A continuum theory of the flow of charged particles in an elastic solid is presented. It can describe the behavior of soft solid electrolytes and elastic semiconductors. It is nonlinear and is valid for large deformation and strong fields. The theory is derived from a three-continuum mixture model including a charged lattice continuum, a bound charge continuum for electric polarization, and an ideal fluid for the flow of mobile charges. The basic electromechanical laws are applied systematically to the model. The electric fields are quasistatic and are in SI units.", "url": "https://arxiv.org/abs/2606.15279", "type": "理论", "summary": "本文将广泛而复杂的连续统理论 [arXiv:2403.07582] 专门化为一个相对简单且有用的案例，因此对读者更加友好。提出了弹性固体中带电粒子流动的连续介质理论。它可以描述软固体电解质和弹性半导体的行为。它是非线性的，适用于大变形和强场。该理论源自三连续介质混合模型，包括带电晶格连续介质、用于电极化的束缚电荷连续介质以及用于移动电荷流动的理想流体。基本机电定律系统地应用于该模型。电场是准静态的并且采用 SI 单位。", "authors": [{"name": "Jiashi Yang"}], "featured_authors": [{"name": "Jiashi Yang"}], "author_count": 1}, {"id": "2606.15294", "category": "cond-mat", "title": "Identifying Mobility Edge from Finite Temperature Spectral Form Factor", "abstract": "The spectral form factor (SFF) is a measure of energy correlations and has been widely used to identify the transition from the ergodic to the localized phase in interacting many-body quantum systems. In this work, we show that in a disordered Heisenberg spin-$\\frac{1}{2}$ model, the finite temperature SFF can be used to generate a canonical phase diagram exhibiting a critical temperature $T_\\mathrm{MBL}$. Using simple ideas of statistical mechanics, we obtain the critical energy density $\\epsilon_\\mathrm{MBL}$ dual to $T_\\mathrm{MBL}$. We show that the mobility edge (ME), numerically estimated from the spread of local perturbations and the optical conductivity, indeed coincides with $\\epsilon_\\mathrm{MBL}$.", "url": "https://arxiv.org/abs/2606.15294", "type": "理论+数值", "summary": "谱形状因子 (SFF) 是能量相关性的度量，已广泛用于识别相互作用的多体量子系统中从遍历相位到局域相位的转变。在这项工作中，我们证明在无序海森堡自旋$\\frac{1}{2}$模型中，有限温度SFF可用于生成显示临界温度$T_\\mathrm{MBL}$的规范相图。利用统计力学的简单思想，我们获得了与 $T_\\mathrm{MBL}$ 对偶的临界能量密度 $\\epsilon_\\mathrm{MBL}$。我们表明，根据局部扰动的扩散和光导率进行数值估计的迁移率边缘（ME）确实与 $\\epsilon_\\mathrm{MBL}$ 一致。", "authors": [{"name": "Basudha Roy"}, {"name": "Anandamohan Ghosh"}, {"name": "Adway Kumar Das"}], "featured_authors": [{"name": "Basudha Roy"}, {"name": "Anandamohan Ghosh"}, {"name": "Adway Kumar Das"}], "author_count": 3}, {"id": "2606.15312", "category": "cond-mat", "title": "Intrinsic decay length in elastic localization", "abstract": "Localization in finite elastic structures is often studied using infinite-domain solutions, which avoid the explicit treatment of boundaries and admit simpler analytical descriptions. Yet it remains poorly understood when finite-domain localized states can be accurately approximated by their infinite-domain counterparts. In this work, we show that the accuracy is controlled by an intrinsic decay length. Using a prototypical localization model, we show that finite-domain localized solutions converge exponentially to the corresponding infinite-domain localized solution once the structural length exceeds the intrinsic decay length. The intrinsic decay length also explains the markedly different validity regimes of finite- and infinite-domain weakly nonlinear approximations. It further has important implications for numerical computation, since once the structural length exceeds the intrinsic decay length, localized solutions corresponding to different domain lengths differ only by exponentially small quantities, making them increasingly difficult to distinguish numerically. The theoretical predictions are validated using two representative localization problems: bulging in membrane tubes and localized helical buckling in twisted rods. The present work provides a unified geometric framework for understanding localization transition, asymptotic validity, and numerical computation in elastic localization.", "url": "https://arxiv.org/abs/2606.15312", "type": "理论+数值", "summary": "有限弹性​​结构中的局部化通常使用无限域解来研究，这避免了边界的显式处理并允许更简单的分析描述。然而，人们对有限域局域态何时可以用无限域局域态准确地近似仍然知之甚少。在这项工作中，我们证明了精度是由固有的衰减长度控制的。使用原型局部化模型，我们表明，一旦结构长度超过固有衰减长度，有限域局部解就会指数收敛到相应的无限域局部解。固有衰减长度还解释了有限域和无限域弱非线性近似的显着不同的有效性机制。它还对数值计算具有重要意义，因为一旦结构长度超过固有衰减长度，对应于不同域长度的局部解仅以指数级小的量差异，使得它们越来越难以在数值上区分。\n\n使用两个代表性的局部问题验证了理论预测：膜管中的膨胀和扭杆中的局部螺旋屈曲。目前的工作为理解弹性局部化中的局部化转变、渐近有效性和数值计算提供了一个统一的几何框架。", "authors": [{"name": "Xiang Yu"}], "featured_authors": [{"name": "Xiang Yu"}], "author_count": 1}, {"id": "2606.15321", "category": "cond-mat", "title": "Symmetry-aware generative design of flat-band materials beyond known crystal-net prototypes", "abstract": "Flat electronic bands underlie a range of strongly correlated and topological phenomena, whose design in real materials has so far relied on a small catalogue of named geometric motifs such as kagome, Lieb, and pyrochlore nets. This discrete catalogue is by no means to exhaust the geometries that support flat bands in real compounds, as band flatness is a property of network connectivity. Here we combine a continuous geometric representation of crystal sublattices, with a symmetry-constrained generative model, to access a broader design space for materials hosting flat bands. The key step is to choose sublattice motifs that are outside the known geometric clusters, ensuring the novelty of the generated structures. We then introduce SkeleGen, which pins these unconventional skeletons to symmetry-compatible Wyckoff positions while denoising the surrounding chemistry, resulting in 9,352 crystal candidates that survive stability and flatnessscreening. Band flatness is confirmed using high throughput full DFT calculations, which agree well also with the tight-binding spectra of the isolated skeletons, supporting a geometric origin of the band flatness. We demonstrate \"out-of-distribution\" motifs as a new design principle to dramatically expand geometric repertoire for materials discovery, potentially beyond flat bands.", "url": "https://arxiv.org/abs/2606.15321", "type": "理论+数值", "summary": "平面电子能带是一系列强相关和拓扑现象的基础，迄今为止，其在实际材料中的设计依赖于一小部分命名的几何图案，例如戈薇、利布和烧绿石网。这个离散的目录绝不是穷举在实际化合物中支持平坦能带的几何形状，因为能带平坦度是网络连接性的一个属性。在这里，我们将晶体亚晶格的连续几何表示与对称约束生成模型相结合，为承载平带的材料提供更广阔的设计空间。关键步骤是选择已知几何簇之外的亚晶格图案，确保生成的结构的新颖性。然后我们引入了 SkeleGen，它将这些非常规骨架固定到对称兼容的威科夫位置，同时对周围的化学进行去噪，从而产生 9,352 种能够通过稳定性和平坦度筛选的候选晶体。使用高通量全 DFT 计算确认了能带平坦度，该计算也与孤立骨架的紧束缚光谱非常一致，支持了能带平坦度的几何起源。\n\n我们展示了“分布外”图案作为一种新的设计原则，可以极大地扩展材料发现的几何范围，甚至可能超越平带。", "authors": [{"name": "Yihao Wei"}, {"name": "Ivan Savochkin"}, {"name": "Artem Mishchenko"}, {"name": "Xiangwen Wang"}, {"name": "Qian Yang"}], "featured_authors": [{"name": "Yihao Wei"}, {"name": "Ivan Savochkin"}, {"name": "Artem Mishchenko"}, {"name": "Xiangwen Wang"}, {"name": "Qian Yang"}], "author_count": 5}, {"id": "2606.15336", "category": "cond-mat", "title": "Nonlocal Orbital-Free Kinetic Energy Functional from the Jellium-with-Gap Model for Finite Systems", "abstract": "The quasi-linear scaling of orbital-free density functional theory (OF-DFT) with system size makes it a computationally efficient alternative to conventional Kohn--Sham density functional theory for many condensed-matter applications. However, its applicability remains limited, particularly for finite systems such as molecular clusters, due to the lack of accurate kinetic energy density functionals. In this context, the development of nonlocal kinetic energy density functionals (NL-KEDFs) has significantly advanced the practical utility of OF-DFT. Here, following an alternative formulation based on the linear-response kernel derived from the jellium-with-gap model (JGM), we develop an NL-KEDF capable of accurately describing the diverse density regimes characteristic of finite systems, including molecular clusters. Benchmark calculations, together with an analysis of the corresponding Pauli potentials, demonstrate that the proposed functional achieves higher accuracy than state-of-the-art orbital-free approaches for finite systems. Furthermore, the optical properties computed using the present method show good agreement with reference results, highlighting its reliability. These results indicate that the proposed NL-KEDF provides a robust and efficient framework for extending OF-DFT to finite systems, with potential implications for nanomaterial design and a deeper understanding of nanoscale phenomena.", "url": "https://arxiv.org/abs/2606.15336", "type": "理论+数值", "summary": "无轨道密度泛函理论 (OF-DFT) 与系统尺寸的准线性标度使其成为许多凝聚态应用中传统 Kohn-Sham 密度泛函理论的计算高效替代方案。然而，由于缺乏精确的动能密度泛函，它的适用性仍然有限，特别是对于分子簇等有限系统。在此背景下，非局域动能密度泛函（NL-KEDF）的发展极大地推进了 OF-DFT 的实际应用。在这里，遵循基于带间隙凝胶模型 (JGM) 的线性响应核的替代公式，我们开发了一种 NL-KEDF，能够准确描述有限系统（包括分子簇）的不同密度状态特征。基准计算以及对相应泡利势的分析表明，所提出的函数比有限系统的最先进的无轨道方法具有更高的精度。此外，使用本方法计算的光学特性与参考结果显示出良好的一致性，突出了其可靠性。\n\n这些结果表明，所提出的 NL-KEDF 为将 OF-DFT 扩展到有限系统提供了一个强大而有效的框架，对纳米材料设计和对纳米尺度现象的更深入理解具有潜在影响。", "authors": [{"name": "Abhishek Bhattacharjee"}, {"name": "Subrata Jana"}, {"name": "Szymon Smiga"}, {"name": "Prasanjit Samal"}], "featured_authors": [{"name": "Abhishek Bhattacharjee"}, {"name": "Subrata Jana"}, {"name": "Szymon Smiga"}, {"name": "Prasanjit Samal"}], "author_count": 4}, {"id": "2606.15337", "category": "cond-mat", "title": "A Unified Dielectric-Dependent Hybrid Functional for Accurate Band Gaps across Dimensions", "abstract": "Predicting fundamental band gaps across material classes and dimensionalities remains a central challenge in electronic-structure theory. Here, we show that intrinsic dielectric screening provides a unified control parameter for nonlocal exchange from bulk to low-dimensional and heterogeneous materials. We introduce a geometry-independent dielectric response and incorporate it self-consistently into a nonempirical screened-dielectric-dependent hybrid functional. Benchmarks for 100 materials spanning bulk, two-dimensional, one-dimensional, and mixed-dimensional systems show near-GW accuracy at the computational cost of generalized Kohn-Sham theory. These results reveal a screening-exchange-gap relation in which reduced dimensionality weakens intrinsic dielectric screening, strengthens nonlocal exchange, and drives the opening of fundamental gaps.", "url": "https://arxiv.org/abs/2606.15337", "type": "理论", "summary": "预测跨材料类别和维度的基本带隙仍然是电子结构理论的核心挑战。在这里，我们表明，本征介电屏蔽为从块状材料到低维异质材料的非局域交换提供了统一的控制参数。我们引入了与几何无关的介电响应，并将其自洽地合并到非经验屏蔽介电相关的混合泛函中。涵盖块体、二维、一维和混合维系统的 100 种材料的基准测试显示，在广义 Kohn-Sham 理论的计算成本下，精度接近 GW。这些结果揭示了屏蔽-交换-能隙关系，其中降维削弱了固有的介电屏蔽，增强了非局域交换，并推动了基本能隙的打开。", "authors": [{"name": "Subrata Jana"}, {"name": "Manoar Hossain"}, {"name": "Arghya Ghosh"}, {"name": "Gabriel Chirchir"}, {"name": "Prasanjit Samal"}, {"name": "Szymon Smiga"}], "featured_authors": [{"name": "Subrata Jana"}, {"name": "Manoar Hossain"}, {"name": "Arghya Ghosh"}, {"name": "Gabriel Chirchir"}, {"name": "Prasanjit Samal"}, {"name": "Szymon Smiga"}], "author_count": 6}, {"id": "2606.15403", "category": "cond-mat", "title": "Cobalt-Catalysed Chain Transfer Polymerisation Enables Soft Methacrylate Nematic Elastomers for Switchable Pressure-Sensitive Adhesion", "abstract": "Liquid crystal elastomers (LCEs) exhibit unique viscoelastic behavior arising from reversible liquid-crystalline ordering, making them attractive candidates for switchable pressure-sensitive adhesives (PSAs). However, methacrylate-based LCEs are typically highly crosslinked, leading to elevated glass-transition temperatures ($T_g$) and storage moduli ($E'$) that limit adhesive performance. Here, we demonstrate that catalytic chain-transfer polymerization provides an effective strategy for engineering soft methacrylate nematic elastomers through systematic control of network architecture. Incorporation of parts-per-million concentrations of bis(boron difluorodimethylglyoximate)cobalt(II) (CoBF) during photopolymerization reduced the effective crosslink density and increased the molecular weight between crosslinks, producing substantial decreases in $T_g$ and $E'$ while preserving nematic order. Dynamic mechanical analysis revealed that increasing CoBF concentration enhanced viscoelastic dissipation and broadened the accessible nematic temperature window. To further optimize rheological properties for pressure-sensitive adhesion, monofunctional methacrylates and flexible poly(ethylene glycol) dimethacrylate (PEGDMA) were incorporated into the network. The optimized formulation exhibited a $T_g$ near 0~$^\\circ$C, a room-temperature storage modulus of approximately 0.3 MPa, and high damping behavior, approaching the Dahlquist criterion for pressure-sensitive adhesion. As a result, the resulting nematic elastomers displayed strong tack, peel, and lap-shear adhesion in the nematic state, together with rapid, reversible, and residue-free debonding upon heating above the nematic-to-isotropic transition temperature.", "url": "https://arxiv.org/abs/2606.15403", "type": "理论+数值", "summary": "液晶弹性体（LCE）由于可逆液晶有序而表现出独特的粘弹性行为，使其成为可转换压敏粘合剂（PSA）的有吸引力的候选者。然而，基于甲基丙烯酸酯的 LCE 通常是高度交联的，导致玻璃化转变温度 ($T_g$) 和储能模量 ($E'$) 升高，从而限制了粘合性能。在这里，我们证明催化链转移聚合通过系统控制网络结构为工程软甲基丙烯酸酯向列弹性体提供了有效的策略。在光聚合过程中加入百万分之一浓度的双(二氟二甲基乙肟酸硼)钴(II) (CoBF)会降低有效交联密度并增加交联之间的分子量，从而在保持向列顺序的同时显着降低$T_g$和$E'$。动态力学分析表明，增加 CoBF 浓度可增强粘弹性耗散并拓宽可达到的向列温度窗口。\n\n为了进一步优化压敏粘合的流变性能，将单官能甲基丙烯酸酯和柔性聚乙二醇二甲基丙烯酸酯（PEGDMA）纳入网络中。优化后的配方表现出接近0~$^\\circ$C的$T_g$、约0.3 MPa的室温储能模量和高阻尼行为，接近压敏粘合的达尔奎斯特标准。结果，所得向列弹性体在向列态下表现出强粘性、剥离性和搭接剪切粘合力，并且在加热至向列型至各向同性转变温度以上时可快速、可逆且无残留地脱粘。", "authors": [{"name": "Noboru Koshimizu"}, {"name": "Mohand O. Saed"}], "featured_authors": [{"name": "Noboru Koshimizu"}, {"name": "Mohand O. Saed"}], "author_count": 2}, {"id": "2606.15414", "category": "cond-mat", "title": "Cluster-based Message-Passing (CluMP) Optimization for Complex QUBO Problems", "abstract": "Quadratic Unconstrained Boolean Optimization (QUBO) problems are widespread in both industrial applications and scientific studies. A QUBO problem corresponds to the optimization of a system of Ising spins defined on a generally sparse and heterogeneous graph. When the QUBO problem contains conflicting requests, the corresponding Ising system is frustrated, generating a complex energy landscape, which is hard to explore and optimize. Despite extensive algorithmic and hardware developments, finding low-energy configurations in these systems remains challenging (e.g., local-update heuristics typically become trapped in metastable states), especially when the (possibly frustrated) interactions generate extended correlated domains. We introduce CluMP (Cluster-based Message-Passing), an algorithm that performs collective updates on connected clusters of spins using information from Belief Propagation (BP). By controlling the amount of frustration within clusters, CluMP enables BP convergence on large subgraphs and proposes nonlocal rearrangements involving up to hundreds of spins in a single move. We benchmark CluMP against state-of-the-art local-update heuristics on spin-glass models defined on several graph topologies, including random regular graphs and lattice regular graphs in two and three dimensions. Cluster moves consistently bypass local trapping and reach lower energies with fewer effective operations than single-spin dynamics. These results demonstrate that frustration-tolerant cluster updates can be implemented efficiently on sparse graphs. The CluMP framework provides a scalable strategy for large-scale combinatorial optimization and inference problems, where exploiting medium- and long-range correlations is key to navigating complex energy landscapes.", "url": "https://arxiv.org/abs/2606.15414", "type": "理论+数值", "summary": "二次无约束布尔优化 (QUBO) 问题在工业应用和科学研究中广泛存在。 QUBO 问题对应于在通常稀疏且异构的图上定义的伊辛自旋系统的优化。当QUBO问题包含相互冲突的请求时，相应的伊辛系统就会受挫，产生复杂的能源景观，难以探索和优化。尽管算法和硬件得到了广泛的发展，但在这些系统中找到低能量配置仍然具有挑战性（例如，本地更新启发式通常陷入亚稳态），特别是当（可能受挫的）相互作用产生扩展的相关域时。我们引入了 CluMP（基于集群的消息传递），这是一种使用来自置信传播 (BP) 的信息对连接的自旋集群执行集体更新的算法。通过控制集群内的挫败量，CluMP 能够在大型子图上实现 BP 收敛，并提出涉及单次移动中多达数百次旋转的非局部重排。\n\n我们将 CluMP 与在多种图拓扑上定义的自旋玻璃模型上最先进的局部更新启发式进行基准测试，包括二维和三维的随机正则图和格子正则图。与单自旋动力学相比，簇运动始终绕过局部捕获并以更少的有效操作达到较低的能量。这些结果表明，可以在稀疏图上有效地实现容错集群更新。 CluMP 框架为大规模组合优化和推理问题提供了可扩展的策略，其中利用中长期相关性是驾驭复杂能源格局的关键。", "authors": [{"name": "Paolo Rissone"}, {"name": "Stefan Boetcher"}, {"name": "Alfonso Amendola"}, {"name": "Simone Sala"}, {"name": "Federico Ricci-Tersenghi"}], "featured_authors": [{"name": "Paolo Rissone"}, {"name": "Stefan Boetcher"}, {"name": "Alfonso Amendola"}, {"name": "Simone Sala"}, {"name": "Federico Ricci-Tersenghi"}], "author_count": 5}, {"id": "2606.15492", "category": "cond-mat", "title": "Underscreening and related phenomena in strong electrolytes", "abstract": "We propose a heuristic model of underscreening phenomenon in high density Coulomb systems, such as strong electrolytes and electron hole conglomerates under ultra high dose rate (UHDR) radiation in biological tissues. It explains the data on screening length $L$ increasing with charge particle concentration and offers additional insights in understanding the conductivity and reduction potential of concentrated electrolytes. Also, it validates our current understanding of the FLASH radiation treatment of tumors (FLASH-RT) perceived as an analogous system. The underlying physics is that mutual binding creates diffusion barriers which suppress the concentration of mobile particles thus increasing the screening length. Also, they slow down the rates of chemical reactions responsible for generation of biologically active radicals which explains the sparing effect observed under UHDR.", "url": "https://arxiv.org/abs/2606.15492", "type": "理论", "summary": "我们提出了高密度库仑系统中筛选不足现象的启发式模型，例如生物组织中超高剂量率（UHDR）辐射下的强电解质和电子空穴聚集体。它解释了筛选长度 $L$ 随着带电粒子浓度而增加的数据，并提供了了解浓缩电解质的电导率和还原电位的更多见解。此外，它还验证了我们目前对肿瘤闪光放射治疗 (FLASH-RT) 的理解，该治疗被视为一个类似的系统。基本的物理原理是，相互结合会产生扩散屏障，从而抑制移动颗粒的浓度，从而增加筛选长度。此外，它们还减慢了产生生物活性自由基的化学反应的速率，这解释了在 UHDR 下观察到的节约效应。", "authors": [{"name": "Diana Shvydka"}, {"name": "Victor Karpov"}], "featured_authors": [{"name": "Diana Shvydka"}, {"name": "Victor Karpov"}], "author_count": 2}, {"id": "2606.15557", "category": "cond-mat", "title": "Entropic Necks, Dynamic Crossovers, and Fragility in Supercooled Liquids", "abstract": "The dramatic slowdown of dynamics in supercooled liquids is accompanied by a sequence of dynamical crossovers, most notably the transition from high-temperature collision-dominated transport to low-temperature activated structural relaxation. A particularly striking manifestation of this change is the crossover from Rosenfeld excess-entropy scaling to the Adam--Gibbs relation. In this work we develop a theoretical framework based on a configuration-space extension of Zwanzig's entropic-neck picture and combine it with a Mori--Zwanzig memory-function formalism to address anomalies of supercooled liquids. The central idea is that structural relaxation is controlled by the narrowing of configurational pathways connecting metastable basins of the inherent-structure landscape. Starting from coupled slow variables describing intrabasin motion and neck fluctuations, we derive a reduced generalized Langevin description in which elimination of the neck coordinate generates a long-lived memory kernel and naturally leads to entropy-controlled activated dynamics. At high temperatures the neck is broad and readily accessible, yielding Rosenfeld-type transport governed primarily by local structural entropy. Upon cooling, progressive neck constriction produces an increasing entropy deficit, leading to Adam--Gibbs behavior and activated relaxation. Within this picture, fragility acquires a simple geometric interpretation: fragile liquids are characterized by a rapid collapse of the effective configurational neck with decreasing temperature, whereas strong liquids exhibit a much slower evolution of accessible pathways. The framework does not by itself compute the configurational entropy, mismatch penalty, or cooperative length from microscopic interactions; its aim is to provide a dynamical and geometrical interpretation.", "url": "https://arxiv.org/abs/2606.15557", "type": "理论", "summary": "过冷液体动力学的急剧减慢伴随着一系列动力学交叉，最显着的是从高温碰撞主导的传输到低温激活的结构松弛的转变。这种变化的一个特别引人注目的表现是从罗森菲尔德过剩熵标度到亚当-吉布斯关系的交叉。在这项工作中，我们开发了一个基于 Zwanzig 熵颈图的构型空间扩展的理论框架，并将其与 Mori-Zwanzig 记忆函数形式相结合，以解决过冷液体的异常问题。中心思想是，结构松弛是通过连接固有结构景观的亚稳盆地的构型路径的缩小来控制的。从描述盆地内运动和颈部波动的耦合慢变量开始，我们推导了简化的广义朗之万描述，其中颈部坐标的消除生成了长寿命的记忆内核，并自然导致熵控制的激活动力学。\n\n在高温下，颈部很宽且易于接近，产生主要由局部结构熵控制的罗森菲尔德型传输。冷却后，渐进的颈部收缩会产生不断增加的熵赤字，导致亚当-吉布斯行为和激活的放松。在这张图中，脆弱性获得了一个简单的几何解释：脆弱液体的特点是随着温度的降低，有效构型颈部迅速崩溃，而强液体则表现出可及路径的演化要慢得多。该框架本身并不计算微观相互作用的构型熵、失配惩罚或合作长度；其目的是提供动力学和几何解释。", "authors": [{"name": "Biman Bagchi"}], "featured_authors": [{"name": "Biman Bagchi"}], "author_count": 1}, {"id": "2606.15588", "category": "cond-mat", "title": "Topological Tricritical Ising Universality Class in One Dimension", "abstract": "Recent advances have revealed that quantum critical universality can be enriched by nontrivial topology. Here we study the tricritical point of the one-dimensional cluster O Brien-Fendley model and show that it realizes a topologically nontrivial tricritical Ising ($\\text{TCI}^*$) universality class. The transition shares the local bulk conformal data of ordinary TCI criticality, while realizing a distinct symmetry-enriched topological sector, manifested through a protected twofold degeneracy under open boundary conditions. We further show that TCI criticality admits two spontaneously fixed boundary conditions, realized respectively through symmetry enrichment and boundary renormalization-group flow, which are distinguished by the $\\mathbb{Z}_2^T$ charge of the disorder field. Remarkably, we find that the topological twofold degeneracy at the $\\text{TCI}^*$ critical point exhibits an exponential energy splitting, in stark contrast to the algebraic splitting at the $\\text{Ising}^*$ critical point. These results reveal a symmetry-enriched form of TCI criticality and uncover topologically distinct boundary structures beyond those of the ordinary TCI theory.", "url": "https://arxiv.org/abs/2606.15588", "type": "理论", "summary": "最近的进展表明，非平凡拓扑可以丰富量子临界普遍性。在这里，我们研究一维簇 O Brien-Fendley 模型的三临界点，并证明它实现了拓扑上非平凡的三临界 Ising ($\\text{TCI}^*$) 普适类。该转变共享普通 TCI 临界点的局部体共形数据，同时实现了独特的对称性丰富的拓扑扇区，这通过开放边界条件下受保护的双重简并性来体现。我们进一步表明，TCI 临界性承认两个自发固定的边界条件，分别通过对称性富集和边界重正化群流实现，它们通过无序场的 $\\mathbb{Z}_2^T$ 电荷来区分。值得注意的是，我们发现 $\\text{TCI}^*$ 临界点处的拓扑双重简并表现出指数能量分裂，与 $\\text{Ising}^*$ 临界点处的代数分裂形成鲜明对比。这些结果揭示了 TCI 临界性的对称丰富形式，并揭示了超出普通 TCI 理论的拓扑独特的边界结构。", "authors": [{"name": "Sheng Yang"}, {"name": "Hai-Qing Lin"}, {"name": "Xue-Jia Yu"}], "featured_authors": [{"name": "Sheng Yang"}, {"name": "Hai-Qing Lin"}, {"name": "Xue-Jia Yu"}], "author_count": 3}, {"id": "2606.15605", "category": "cond-mat", "title": "Dressed Floquet scars from protected zero modes in a Rydberg chain", "abstract": "In this Letter, we present an approximate analytic construction of two zero quasienergy quantum many-body scars in a periodically driven model of Rydberg atoms on a ring, which persist over a range of driving amplitudes and frequencies for finite sizes. An index theorem protects an exponentially large number (in system size) of exact zero energy modes of the Floquet Hamiltonian in this setting. Unlike most of these zero modes which continuously change with drive parameters, these two quantum many-body scars retain the memory of particular states. They can be expressed as {\\it dressed versions} of two contrasting states, the Rydberg vacuum and a unitarily rotated variant of a volume-law scar [Ivanov and Motrunich, Phys. Rev. Lett. {\\bf 134}, 050403 (2025)], respectively. We provide an analytic understanding of their existence using a Floquet perturbation theory and show their resilience beyond the perturbative regime using exact diagonalization in finite systems. Our study provides insight into the structure of protected zero modes in interacting Floquet settings.", "url": "https://arxiv.org/abs/2606.15605", "type": "理论+数值", "summary": "在这封信中，我们提出了环上里德伯原子周期性驱动模型中两个零准能量子多体疤痕的近似解析构造，该模型在有限尺寸的驱动振幅和频率范围内持续存在。在此设置中，指数定理保护了 Floquet 哈密顿量的指数级大数量（系统规模）的精确零能量模式。与大多数随驱动参数不断变化的零模式不同，这两个量子多体疤痕保留了特定状态的记忆。它们可以表示为两种对比状态的{\\它的版本}，即里德伯真空和体积定律疤痕的统一旋转变体[Ivanov and Motrunich, Phys.莱特牧师。 {\\bf 134}, 050403 (2025)]，分别。我们使用 Floquet 微扰理论对它们的存在进行了分析理解，并使用有限系统中的精确对角化展示了它们超越微扰状态的弹性。我们的研究深入了解了交互 Floquet 设置中受保护的零模式的结构。", "authors": [{"name": "Saptadip Roy"}, {"name": "Bhaskar Mukherjee"}, {"name": "K. Sengupta"}, {"name": "Arnab Sen"}], "featured_authors": [{"name": "Saptadip Roy"}, {"name": "Bhaskar Mukherjee"}, {"name": "K. Sengupta"}, {"name": "Arnab Sen"}], "author_count": 4}, {"id": "2606.15613", "category": "cond-mat", "title": "Unveiling AlSb as a Promising Zincblende Semiconductor for Visible-Light Shift-Current Generation", "abstract": "We use density functional theory to investigate the shift-current response in zincblende III--V (AlP, AlAs, AlSb, GaP, GaAs, InP, InAs, and InSb) and II--VI (ZnS, ZnSe, ZnTe, CdS, CdSe, and CdTe) semiconductors. Our main goal is to identify which material generates the largest shift-current under illumination and to examine the factors influencing this response. We find that aluminum-containing semiconductors, particularly AlSb, exhibit the highest shift-current responses, while CdSe shows the lowest. We analyze the contributions of specific band-to-band transitions to the shift-current in AlSb by selectively summing valence and conduction bands. Additionally, we calculate delocalization indices to investigate the electron delocalization, which correlates with the shift current. Hydrostatic pressure does not enhance the shift current in these materials. These findings have potential applications in optoelectronics and identify the most promising zincblende semiconductors for efficient shift-current generation under visible-light illumination", "url": "https://arxiv.org/abs/2606.15613", "type": "理论+数值", "summary": "我们使用密度泛函理论来研究闪锌矿 III--V（AlP、AlAs、AlSb、GaP、GaAs、InP、InAs 和 InSb）和 II--VI（ZnS、ZnSe、ZnTe、CdS、CdSe 和 CdTe）半导体的位移电流响应。我们的主要目标是确定哪种材料在光照下产生最大的位移电流，并检查影响该响应的因素。我们发现含铝半导体，特别是 AlSb，表现出最高的位移电流响应，而 CdSe 表现出最低。我们通过选择性地求和价带和导带来分析特定能带间跃迁对 AlSb 中移位电流的贡献。此外，我们计算离域指数来研究电子离域，这与位移电流相关。静水压力不会增强这些材料的位移电流。这些发现在光电子学方面具有潜在的应用，并确定了最有前途的闪锌矿半导体，用于在可见光照明下有效地产生移位电流", "authors": [{"name": "César Castillo-Quevedo"}, {"name": "Edgar Paredes-Sotelo"}, {"name": "Peter L. Rodríguez-Kessler"}, {"name": "Gerardo Martínez-Guajardo"}, {"name": "Jose Luis Cabellos"}], "featured_authors": [{"name": "César Castillo-Quevedo"}, {"name": "Edgar Paredes-Sotelo"}, {"name": "Peter L. Rodríguez-Kessler"}, {"name": "Gerardo Martínez-Guajardo"}, {"name": "Jose Luis Cabellos"}], "author_count": 5}, {"id": "2606.15620", "category": "cond-mat", "title": "Dimensional Crossover of Mass Anisotropy in Ta-doped WTe2", "abstract": "The observation of extremely large magnetoresistance in WTe2 has attracted considerable attention towards understanding its underlying origin. With its layered van der Waals structure, the question that remains largely unexplored is whether the three-dimensional anisotropic transport characteristics of WTe2 persists under chemical substitution. Here, we present a systematic angle-dependent magneto-transport study of single-crystalline TaxW1-xTe2 (x = 0, 0.05, 0.1). The results are analysed within a mass anisotropy scaling framework to extract the mass anisotropy parameter {\\gamma} as a function of temperature and doping. It is observed that Ta substitution leads to monotonic increase of {\\gamma} across all temperatures, indicating a progressive deepening of quasi-two-dimensional Fermi surface character. Ta doping also leads to a substantial improvement in crystalline quality, reflected in a pronounced increase in the residual resistivity ratio. Despite weakening electron-hole compensation, the magnetoresistance rises sharply to ~58,211% at x = 0.1, which is assigned to a substantial enhancement in carrier mobility. Rietveld refinement confirms a systematic c-axis contraction with Ta content, identifying the structural origin of the enhanced anisotropy. The mass anisotropy scaling that holds for x = 0 and x = 0.05 breaks down for x = 0.1, where the angular magneto-resistance anisotropy substantially exceeds single-ellipsoid predictions, pointing to a multi-pocket Fermi surface with distinct anisotropies. Nonlinear Hall resistivity provides independent evidence for the underlying multiband character of transport in this system. These findings demonstrate that Fermi surface anisotropy, carrier compensation, and mobility are independent parameters that can lead to tuneable control of large magnetoresistance in topological semimetal WTe2.", "url": "https://arxiv.org/abs/2606.15620", "type": "理论", "summary": "WTe2 中极大磁阻的观察引起了人们对理解其潜在起源的广泛关注。由于其层状范德华结构，目前尚未探索的问题是 WTe2 的三维各向异性输运特性是否在化学替代下持续存在。在这里，我们提出了单晶 TaxW1-xTe2 (x = 0, 0.05, 0.1) 的系统角度依赖性磁输运研究。在质量各向异性标度框架内分析结果，以提取质量各向异性参数 {\\gamma} 作为温度和掺杂的函数。据观察，Ta 取代导致在所有温度下 {\\gamma} 单调增加，表明准二维费米表面特征逐渐加深。 Ta 掺杂还导致晶体质量的显着改善，反映在残余电阻率比的显着增加。尽管电子空穴补偿减弱，但在 x = 0.1 时磁阻急剧上升至约 58,211%，这归因于载流子迁移率的显着增强。\n\nRietveld 精修证实了 c 轴随 Ta 含量的系统收缩，从而确定了各向异性增强的结构起源。 x = 0 和 x = 0.05 时的质量各向异性标度在 x = 0.1 时被分解，其中角磁阻各向异性大大超过单椭球预测，指向具有明显各向异性的多口袋费米表面。非线性霍尔电阻率为该系统中传输的基本多带特征提供了独立证据。这些发现表明，费米表面各向异性、载流子补偿和迁移率是独立参数，可以实现拓扑半金属 WTe2 中大磁阻的可调控制。", "authors": [{"name": "P. Das"}, {"name": "D. Das"}, {"name": "P. Kumar"}, {"name": "Monika"}, {"name": "S. Patnaik"}], "featured_authors": [{"name": "P. Das"}, {"name": "D. Das"}, {"name": "P. Kumar"}, {"name": "Monika"}, {"name": "S. Patnaik"}], "author_count": 5}, {"id": "2606.15649", "category": "cond-mat", "title": "Carbon Layer Orientation and Closed-Pore Construction Achieving Ultra-Low Specific Surface Area Hard Carbon for High-Performance Na-ion Storage", "abstract": "Addressing the critical trade-off between initial Coulombic efficiency (ICE) and reversible capacity in hard carbon anodes for Na-ion batteries (NIBs), we introduce a novel coupling strategy that combines carbon layer orientation reconstruction with closed-pore construction to produce hard carbon with an ultra-low specific surface area. We demonstrate that the nanographite domains within the hard carbon precursor undergo entropy-driven orientation reconstruction through the synergistic regulation of heteroatom doping and medium-temperature carbonization. This process not only increases interlayer spacing and promotes structural disorder but also enables the formation of dense, closed pores and ultramicropores at domain boundaries via confined atomic migration, while simultaneously encapsulating surface open pores within internal closed ones. Due to this unique pore architecture, our hard carbon exhibits an ultra-low specific surface area of 1.89 m2 g-1 with a markedly higher proportion of closed pores. As a result, our hard carbon achieves a remarkable reversible capacity of 342.3 mAh g-1 at 20 mA g-1, with an exceptional ICE of 90.4% and a dominant plateau capacity of 262.3 mAh g-1 (76.6%) for NIBs. We believe this coupling strategy provides a new paradigm for the structural engineering of high-ICE anode materials in advanced NIBs.", "url": "https://arxiv.org/abs/2606.15649", "type": "理论", "summary": "为了解决钠离子电池（NIB）硬碳阳极的初始库仑效率（ICE）和可逆容量之间的关键权衡问题，我们引入了一种新颖的耦合策略，该策略将碳层取向重建与闭孔结构相结合，以生产具有超低比表面积的硬碳。我们证明，硬碳前驱体中的纳米石墨域通过杂原子掺杂和中温碳化的协同调节进行熵驱动的取向重建。该过程不仅增加了层间距并促进结构无序，而且还能够通过受限的原子迁移在域边界处形成致密的封闭孔和超微孔，同时将表面开放孔封装在内部封闭孔内。由于这种独特的孔隙结构，我们的硬碳具有 1.89 m2 g-1 的超低比表面积，并且闭孔比例明显更高。\n\n因此，我们的硬碳在 20 mA g-1 下实现了 342.3 mAh g-1 的显着可逆容量，具有 90.4% 的卓越 ICE 和 NIB 的 262.3 mAh g-1 (76.6%) 的主要平台容量。我们相信这种耦合策略为先进 NIB 中高 ICE 阳极材料的结构工程提供了新的范例。", "authors": [{"name": "Bowen Wang"}, {"name": "Zihan Yang"}, {"name": "Minghui Zhao"}, {"name": "Wenjie Mai"}, {"name": "Qing Xu"}, {"name": "Huan Li"}, {"name": "Liang Zhang"}, {"name": "Chul Gyu Jhun"}, {"name": "Le Chen"}, {"name": "Wentao Zhang"}, {"name": "Jingtai Zhao"}, {"name": "Jinliang Li"}], "featured_authors": [{"name": "Bowen Wang"}, {"name": "Zihan Yang"}, {"name": "Minghui Zhao"}, {"name": "Wentao Zhang"}, {"name": "Jingtai Zhao"}, {"name": "Jinliang Li"}], "author_count": 12}, {"id": "2606.15711", "category": "cond-mat", "title": "Mapping the Stability of Spin Qubits in Superconducting Pseudogap Systems", "abstract": "Superconducting spin qubits, realized as Yu-Shiba-Rusinov spin-doublet states in quantum-dot-superconductor systems, represent a cornerstone of current research in quantum technologies. We analyze these ground states of quantum impurities in superconducting pseudogap systems, namely systems with a pseudogap tunneling density of states $\\rho(\\epsilon) \\sim |\\epsilon|^r$ for energies $|\\epsilon|\\gg \\Delta$ ($\\Delta$ being a $s$-wave pairing potential). For $r=1$, these hosts are realized as Dirac materials (graphene or 3D topological insulator surfaces) in proximity to conventional superconductors, or as $d+i s$ superconductors. Using effective field theory and numerical renormalization group, we map the phase diagram against the pseudogap exponent $r > 0$ and particle-hole symmetry-breaking perturbations. At particle-hole symmetry, increasing $r$ also increases the critical value, $J_c$, of the Kondo coupling that triggers the transition from spin doublet to singlet. Unlike the gapless pseudogap Kondo systems, numerical and analytical evidence suggest that Andreev reflection stabilizes a singlet ground state at $J$ for all $r > 0$. Breaking particle-hole symmetry -- by potential scattering or chemical potential -- eventually restores the transition at lower $J_c$. Our results indicate that coupling to superconducting hosts with large pseudogap exponents enhances the stability of spin qubits at large Kondo coupling.", "url": "https://arxiv.org/abs/2606.15711", "type": "理论+数值", "summary": "超导自旋量子位在量子点超导体系统中以 Yu-Shiba-Rusinov 自旋双态形式实现，代表了当前量子技术研究的基石。我们分析了超导赝能隙系统中量子杂质的基态，即具有赝能隙隧道密度状态 $\\rho(\\epsilon) \\sim |\\epsilon|^r$ 的系统，能量为 $|\\epsilon|\\gg \\Delta$（$\\Delta$ 是 $s$ 波配对势）。对于 $r=1$，这些主体被实现为接近传统超导体的狄拉克材料（石墨烯或 3D 拓扑绝缘体表面），或作为 $d+i s$ 超导体。使用有效场论和数值重正化群，我们根据赝能隙指数 $r > 0$ 和粒子空穴对称性破缺扰动绘制相图。在粒子空穴对称性下，增加 $r$ 也会增加触发从自旋双线态到单线态转变的近藤耦合的临界值 $J_c$。与无间隙赝能隙 Kondo 系统不同，数值和分析证据表明，对于所有 $r > 0$，Andreev 反射将单线态基态稳定在 $J$。\n\n通过势散射或化学势打破粒子空穴对称性最终恢复较低 $J_c$ 的转变。我们的结果表明，与具有大赝能隙指数的超导主体的耦合增强了大近藤耦合下自旋量子位的稳定性。", "authors": [{"name": "Chen-How Huang"}, {"name": "Miguel A. Cazalilla"}], "featured_authors": [{"name": "Chen-How Huang"}, {"name": "Miguel A. Cazalilla"}], "author_count": 2}, {"id": "2606.15721", "category": "cond-mat", "title": "Ground States and Excitations of Magnetic Impurities in Pseudogap Superconducting Systems", "abstract": "Combining effective field theory and numerical renormalization-group (NRG), we study the ground-state phase diagram and single-particle excitations of a spin-$\\tfrac{1}{2}$ impurity in a superconducting system with a tunneling density of states behaving as $\\rho(\\epsilon) \\sim |\\epsilon|^{r}$, for $|\\epsilon|\\gg \\Delta$ ($\\Delta$ being the $s$-wave pairing potential). We focus on the properties of the doublet-singlet transition at large Kondo coupling. The effective field theory for the singlet phase is inferred from a strong coupling expansion in the Kondo coupling. For $\\Delta \\neq 0$, it contains a local pairing term which drives the system into a spin-singlet phase with enhanced paring correlations. We study how the singet-doublet phase boundary is affected by particle-hole symmetry breaking perturbations such as a scattering potential and/or the chemical potential. Results for the $T$-matrix spectral function are also reported near the transition both at particle-hole symmetry and away from it. It is shown that the singlet-doublet transition can be induced by the chemical potential rather than the Kondo coupling strength. At particle-hole symmetry, a resonance-like feature is observed for $r= 1$ and related to a two-quasiparticle excitation using a single-site model which is derived from effective field theory.", "url": "https://arxiv.org/abs/2606.15721", "type": "理论+数值", "summary": "结合有效场理论和数值重正化群 (NRG)，我们研究了超导系统中自旋 $\\tfrac{1}{2}$ 杂质的基态相图和单粒子激发，其状态隧道密度表现为 $\\rho(\\epsilon) \\sim |\\epsilon|^{r}$，对于 $|\\epsilon|\\gg \\Delta$（$\\Delta$ 是 $s$ 波配对）潜力）。我们重点关注大型 Kondo 耦合下双线态-单线态转变的性质。单重态相的有效场理论是从近藤耦合中的强耦合展开推断出来的。对于 $\\Delta \\neq 0$，它包含一个局部配对项，该配对项驱动系统进入具有增强配对相关性的自旋单重相。我们研究单双峰相界如何受到粒子孔对称性破缺扰动（例如散射势和/或化学势）的影响。 $T$ 矩阵谱函数的结果也报告在粒子空穴对称性和远离粒子空穴对称性的过渡附近。结果表明，单重态-双重态转变可以由化学势而不是近藤耦合强度诱导。\n\n在粒子孔对称性下，在 $r= 1$ 时观察到类似共振的特征，并且与使用源自有效场理论的单点模型的两个准粒子激发相关。", "authors": [{"name": "Miguel A. Cazalilla"}, {"name": "Chen-How Huang"}], "featured_authors": [{"name": "Miguel A. Cazalilla"}, {"name": "Chen-How Huang"}], "author_count": 2}, {"id": "2606.15799", "category": "cond-mat", "title": "Machine Learning Topological Order from Defect Partition Functions", "abstract": "We introduce a machine learning framework for extracting Ising topological order from defect partition functions of the two-dimensional Ising model on a torus. Restricted Boltzmann Machines (RBMs) are trained on Ising model data sampled at criticality across topological sectors. We take a component-wise square-root map of the learned distributions which naturally produces candidate wavefunctions for the (2+1)-dimensional Ising TQFT. As a nontrivial consistency check, we extract the modular S-matrix from overlaps of the resulting states and recover the expected Ising modular data. Our results demonstrate that neural network representations can capture both critical fluctuations and emergent topological structure, providing a data-driven route from lattice statistical mechanics to topological quantum field theory.", "url": "https://arxiv.org/abs/2606.15799", "type": "理论+数值", "summary": "我们引入了一种机器学习框架，用于从环面上的二维 Ising 模型的缺陷分配函数中提取 Ising 拓扑序。受限玻尔兹曼机 (RBM) 使用跨拓扑扇区的临界采样的 Ising 模型数据进行训练。我们采用学习分布的分量平方根图，自然地生成 (2+1) 维伊辛 TQFT 的候选波函数。作为一项重要的一致性检查，我们从结果状态的重叠中提取模块化 S 矩阵并恢复预期的 Ising 模块化数据。我们的结果表明，神经网络表示可以捕获临界涨落和涌现的拓扑结构，提供从晶格统计力学到拓扑量子场论的数据驱动途径。", "authors": [{"name": "Kazem Bitaghsir Fadafan"}, {"name": "Wei Cui"}, {"name": "Babak Haghighat"}, {"name": "Shailesh Lal"}], "featured_authors": [{"name": "Kazem Bitaghsir Fadafan"}, {"name": "Wei Cui"}, {"name": "Babak Haghighat"}, {"name": "Shailesh Lal"}], "author_count": 4}, {"id": "2606.15853", "category": "cond-mat", "title": "Surface-Sensitive Mapping of Anisotropic Phonon Cascades in T$_{d}$-WTe$_{2}$", "abstract": "Understanding how energy flows from photoexcited carriers into the lattice is essential for describing nonequilibrium phenomena in low-symmetry quantum materials. Here, we use ultrafast low-energy electron diffraction and diffuse scattering to probe momentum-resolved phonon dynamics at the surface of T$_{d}$-WTe$_{2}$, a strongly anisotropic semimetal. Following optical excitation, the Debye-Waller suppression of Bragg peaks reveals a biexponential increase of the mean-squared atomic displacement, indicating sequential lattice relaxation. Analysis of the diffuse background reveals a preferential intensity build-up parallel to the tungsten-chain axis in the material, attributed to anisotropic electron-phonon coupling during electronic cooling. Diffuse intensity subsequently redistributes across the surface Brillouin zone and finally accumulates near the zone centre, consistent with anharmonic phonon-phonon scattering and the gradual population of low-frequency acoustic modes on a 30--100 ps timescale. The results reveal a hierarchical relaxation pathway in which energy is first deposited into selected finite-momentum phonons before spreading through the broader lattice bath. Our work highlights the importance of momentum-resolved diffuse scattering for disentangling electron-phonon and phonon-phonon relaxation in anisotropic topological semimetals.", "url": "https://arxiv.org/abs/2606.15853", "type": "理论+数值", "summary": "了解能量如何从光激发载流子流入晶格对于描述低对称性量子材料中的非平衡现象至关重要。在这里，我们使用超快低能电子衍射和漫散射来探测 T$_{d}$-WTe$_{2}$（一种强各向异性半金属）表面的动量分辨声子动力学。光激发后，布拉格峰的德拜-沃勒抑制揭示了均方原子位移的双指数增加，表明连续晶格弛豫。对漫射背景的分析揭示了材料中平行于钨链轴的优先强度累积，这归因于电子冷却过程中的各向异性电子-声子耦合。随后，漫射强度在表面布里渊区重新分布，并最终在区中心附近累积，这与非谐波声子-声子散射以及低频声模在 30--100 ps 时间尺度上的逐渐分布一致。结果揭示了一种分层弛豫路径，其中能量首先沉积到选定的有限动量声子中，然后传播到更广泛的晶格浴中。\n\n我们的工作强调了动量分辨漫散射对于解开各向异性拓扑半金属中电子-声子和声子-声子弛豫的重要性。", "authors": [{"name": "Alp Akbiyik"}, {"name": "Felix Kurtz"}, {"name": "Sergey V. Yalunin"}, {"name": "Claus Ropers"}, {"name": "Hannes Böckmann"}], "featured_authors": [{"name": "Alp Akbiyik"}, {"name": "Felix Kurtz"}, {"name": "Sergey V. Yalunin"}, {"name": "Claus Ropers"}, {"name": "Hannes Böckmann"}], "author_count": 5}, {"id": "2606.15929", "category": "cond-mat", "title": "Wavelet Localisation and Local Modulation Freezing in MRW Unwrapping", "abstract": "We develop a localised wavelet formulation of multifractal random walk unwrapping based on the local multiplicative modulation freezing. The framework is motivated by the observation that finite-support wavelet localisation may induce approximate local factorisation of multiplicatively modulated stochastic fields, allowing the modulation component to become effectively frozen within sufficiently localised probing domains. Within this regime, logarithmic wavelet amplitudes admit an approximate additive decomposition linking local wavelet statistics directly to the underlying modulation field. This viewpoint reformulates covariance-based MRW unwrapping as a localised multiscale operator problem in which wavelet coefficients act as finite-support probes of multiplicative organisation. The validity of the approximation depends explicitly on support geometry, scale-dependent overlap, and residual multiscale mixing generated by internal modulation variability. We show that these effects naturally produce finite-scale deviations from ideal logarithmic covariance scaling and lead to structured covariance distortions whose form depends on the interaction between the modulation field and the geometry of the wavelet representation. In the resulting framework, localisation itself becomes the operational mechanism enabling multiscale probing of local stochastic organisation. Numerical investigations using orthonormal wavelet decompositions support the proposed interpretation and demonstrate the emergence of scale-dependent freezing regimes, residual covariance mixing, and finite-support breakdown effects consistent with the theory. The proposed framework suggests a broader connection between wavelet localisation, local regularity organisation, and finite-support multiscale stochastic operators. Wavelet localisation becomes an operational mechanism for probing localised multiscale structure.", "url": "https://arxiv.org/abs/2606.15929", "type": "理论+数值", "summary": "我们开发了基于局部乘法调制冻结的多重分形随机游走展开的局部小波公式。该框架的动机是观察到有限支持小波定位可能会引起乘法调制随机场的近似局部因式分解，从而允许调制分量有效地冻结在足够局部化的探测域内。在这种情况下，对数小波幅度允许近似加法分解，将局部小波统计数据直接链接到底层调制场。该观点将基于协方差的 MRW 展开重新表述为局部多尺度算子问题，其中小波系数充当乘法组织的有限支持探针。近似的有效性明确取决于支撑几何结构、尺度相关重叠以及由内部调制可变性生成的残余多尺度混合。\n\n我们表明，这些效应自然会产生与理想对数协方差缩放的有限尺度偏差，并导致结构化协方差失真，其形式取决于调制场和小波表示的几何形状之间的相互作用。在由此产生的框架中，本地化本身成为能够对本地随机组织进行多尺度探测的运行机制。使用正交小波分解的数值研究支持了所提出的解释，并证明了与理论一致的尺度相关冻结机制、残余协方差混合和有限支撑击穿效应的出现。所提出的框架提出了小波局域化、局部正则组织和有限支持多尺度随机算子之间更广泛的联系。小波局域化成为探测局域多尺度结构的操作机制。", "authors": [{"name": "Mateusz Polakowski"}, {"name": "Zbigniew R. Struzik"}], "featured_authors": [{"name": "Mateusz Polakowski"}, {"name": "Zbigniew R. Struzik"}], "author_count": 2}, {"id": "2606.16013", "category": "cond-mat", "title": "The limits of interpretability in multiple linear regression", "abstract": "Interpreting machine-learning models has attracted increasing attention, particularly in the physical sciences, where one often seeks to understand the underlying mechanisms rather than merely make predictions. Multiple linear regression is often regarded as an interpretable alternative to more complex models, such as deep neural networks, because its predictions are expressed as explicit weighted sums of input features. However, when input features are strongly correlated, namely in the presence of multicollinearity, the learned weights can exhibit large dataset-to-dataset fluctuations and oscillatory behavior across physically similar features, making their interpretation difficult or even impossible. Although the instability of the weights under multicollinearity is well known in statistics, its consequences for physical interpretation, in particular its connection to oscillatory weights across physically similar features, have not been systematically clarified. Here, we theoretically discuss the mechanism behind this loss of interpretability by analyzing the eigenmodes of the feature correlation matrix. We show that small-eigenvalue modes associated with multicollinearity amplify fluctuations in the weights and generate oscillatory patterns that do not necessarily reflect meaningful contributions. We test this theoretical picture numerically on physics datasets and show that Ridge regularization suppresses these unstable modes, although the resulting weights must still be interpreted with caution. We further confirm the generality of our findings beyond physics by analyzing a diverse collection of publicly available datasets. Our results clarify why, in the presence of multicollinearity, physical interpretation can remain difficult even for linear regression models.", "url": "https://arxiv.org/abs/2606.16013", "type": "理论+数值", "summary": "解释机器学习模型引起了越来越多的关注，特别是在物理科学领域，人们常常寻求理解潜在的机制，而不仅仅是做出预测。多元线性回归通常被认为是更复杂模型（例如深度神经网络）的可解释替代方案，因为它的预测表示为输入特征的显式加权和。然而，当输入特征强相关时，即存在多重共线性时，学习的权重可能会在物理相似的特征上表现出较大的数据集到数据集波动和振荡行为，从而使其解释变得困难甚至不可能。尽管多重共线性下权重的不稳定性在统计学中是众所周知的，但其对物理解释的影响，特别是其与物理相似特征上的振荡权重的联系，尚未系统地阐明。在这里，我们通过分析特征相关矩阵的本征模，从理论上讨论了这种可解释性损失背后的机制。\n\n我们表明，与多重共线性相关的小特征值模式会放大权重的波动并产生不一定反映有意义的贡献的振荡模式。我们在物理数据集上对这一理论图进行了数值测试，并表明岭正则化抑制了这些不稳定模式，尽管仍必须谨慎解释所得的权重。通过分析各种公开可用的数据集，我们进一步证实了我们的研究结果在物理学之外的普遍性。我们的结果阐明了为什么在存在多重共线性的情况下，即使对于线性回归模型，物理解释仍然很困难。", "authors": [{"name": "Anand Sharma"}, {"name": "Chen Liu"}, {"name": "Daniele Coslovich"}, {"name": "Misaki Ozawa"}], "featured_authors": [{"name": "Anand Sharma"}, {"name": "Chen Liu"}, {"name": "Daniele Coslovich"}, {"name": "Misaki Ozawa"}], "author_count": 4}, {"id": "2606.16025", "category": "cond-mat", "title": "Universality in the target arrival statistics of non-conservative search processes", "abstract": "Stochastic search processes in which searchers are continuously introduced to and removed from a target search domain are fundamental to a wide class of physical and artificial systems. The theory of such non-conservative search processes is, however, much less developed than for search processes with a fixed number of particles. Here we exploit a natural mapping between non-conservative stochastic search and queueing theory to derive the full time-dependent distribution of target arrivals under minimal assumptions on the underlying search process. Remarkably, we find that the steady-state inter-arrival time distribution is exactly exponential, regardless of the details of the search process, showing a robust universality that emerges directly from the queueing framework. Thus, counterintuitively, the arrival statistics of a non-conservative search process are much simpler than sequential search-and-capture processes involving a fixed number of searchers. This has major implications for target resource accumulation, where the delivery of resources is counter-balanced by their downstream consumption.", "url": "https://arxiv.org/abs/2606.16025", "type": "理论+数值", "summary": "在随机搜索过程中，搜索者不断地被引入目标搜索域或从目标搜索域中移除，这是各种物理和人工系统的基础。然而，这种非保守搜索过程的理论远不如具有固定数量粒子的搜索过程那么发达。在这里，我们利用非保守随机搜索和排队论之间的自然映射，在对基本搜索过程的最小假设下导出目标到达的完全时间相关分布。值得注意的是，我们发现，无论搜索过程的细节如何，稳态到达间隔时间分布都是指数分布，这显示出直接从排队框架中出现的强大的普遍性。因此，与直觉相反，非保守搜索过程的到达统计比涉及固定数量搜索器的顺序搜索和捕获过程简单得多。这对目标资源积累具有重大影响，其中资源的交付与其下游消耗相平衡。", "authors": [{"name": "José Giral-Barajas"}, {"name": "Samantha Linn"}, {"name": "Paul C. Bressloff"}], "featured_authors": [{"name": "José Giral-Barajas"}, {"name": "Samantha Linn"}, {"name": "Paul C. Bressloff"}], "author_count": 3}, {"id": "2606.16032", "category": "cond-mat", "title": "Machine learning enables roughness-driven inverse design of milling processes", "abstract": "Interest in applying data-driven approaches in manufacturing has grown significantly, particularly for mapping complex, high-dimensional relationships. The milling process is one area where predictive models can link influential parameters to surface roughness metrics prior to in situ operations. While this appr
