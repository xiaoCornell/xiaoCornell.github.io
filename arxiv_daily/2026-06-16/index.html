oach offers clear advantages, it faces challenges due to limited datasets and robustness issues in inverse design paradigms. To address these challenges, this paper proposes a machine learning (ML)-based framework for the inverse design of the surface milling process, with a focus on surface roughness as the design objective. The framework employs forward training of two ML models, a deep neural network (DNN) and a random forest (RF) ensemble, both developed using a high-fidelity synthetic dataset generated from a computational simulation framework. These trained models are integrated into a Bayesian optimization (BO) procedure to overcome the multiplicity problem arising from the many-to-one mapping inherent in the dataset. The approach identifies top-performing milling process configurations, considering both process and tool parameters, and presents them from the full solution space. The models achieve average relative errors below 5% when compared to reference results, thereby demonstrating the robustness and reliability of the proposed methodology.", "url": "https://arxiv.org/abs/2606.16032", "type": "理论+数值", "summary": "人们对在制造中应用数据驱动方法的兴趣显着增长，特别是在映射复杂的高维关系方面。铣削过程是预测模型可以在现场操作之前将影响参数与表面粗糙度指标联系起来的领域之一。虽然这种方法具有明显的优势，但由于数据集有限和逆向设计范式中的稳健性问题，它面临着挑战。为了应对这些挑战，本文提出了一种基于机器学习（ML）的表面铣削工艺逆向设计框架，重点关注表面粗糙度作为设计目标。该框架采用了两个机器学习模型的前向训练，即深度神经网络 (DNN) 和随机森林 (RF) 集成，这两个模型都是使用计算模拟框架生成的高保真合成数据集开发的。这些经过训练的模型被集成到贝叶斯优化 (BO) 过程中，以克服数据集中固有的多对一映射所产生的多重性问题。\n\n该方法考虑工艺和刀具参数来确定最佳铣削工艺配置，并从完整的解决方案空间中呈现它们。与参考结果相比，这些模型的平均相对误差低于 5%，从而证明了所提出方法的稳健性和可靠性。", "authors": [{"name": "Hadi Bakhshan"}, {"name": "Sima Farshbaf"}, {"name": "Fernando Rastellini"}, {"name": "Josep Maria Carbonell"}], "featured_authors": [{"name": "Hadi Bakhshan"}, {"name": "Sima Farshbaf"}, {"name": "Fernando Rastellini"}, {"name": "Josep Maria Carbonell"}], "author_count": 4}, {"id": "2606.16108", "category": "cond-mat", "title": "Optically Active Fractional Wannier-Center Displacement Drives Giant Second-Harmonic Generation", "abstract": "Electric polarization is a static ground-state Berry-phase property, whereas second-harmonic generation (SHG) and shift current are dynamical optical responses. Their connection is encoded in the shift vector, whose Brillouin-zone average is governed by the band-resolved Berry-phase polarization difference between the optically connected initial and final states. Here we exploit this geometric relation in quantized formal polarization (QFP) crystals, where symmetry-quantized formal-polarization branches correspond to fractional Wannier-center sectors. First-principles screening identifies noncentrosymmetric QFP materials with giant SHG responses, including $\\mathrm{InNbBr}_6$ and $\\mathrm{InPS}_3$. Band-resolved Berry-phase analysis shows that their dominant optical transitions connect occupied and low-lying unoccupied states whose Wannier centers lie at distinct fractional Wyckoff positions, producing a large transition-resolved Wannier-center displacement. This displacement gives rise to a large shift vector and a dominant shift-vector-related intraband contribution to the static SHG susceptibility. Our results show that symmetry-quantized formal polarization can become optically active through transitions between fractional Wannier-center sectors, providing a symmetry-guided route to giant SHG and shift-current responses.", "url": "https://arxiv.org/abs/2606.16108", "type": "理论+数值", "summary": "电极化是静态基态贝里相特性，而二次谐波产生（SHG）和位移电流是动态光学响应。它们的连接被编码在位移矢量中，其布里渊区平均值由光学连接的初始状态和最终状态之间的带分辨贝里相偏振差控制。在这里，我们在量化形式偏振（QFP）晶体中利用了这种几何关系，其中对称量子化形式偏振分支对应于分数万尼尔中心扇区。第一性原理筛选识别出具有巨大倍频响应的非中心对称 QFP 材料，包括 $\\mathrm{InNbBr}_6$ 和 $\\mathrm{InPS}_3$。带分辨贝里相分析表明，它们的主要光学跃迁连接占据态和低位未占据态，其万尼尔中心位于不同的分数威科夫位置，产生大的跃迁分辨万尼尔中心位移。这种位移产生了大的位移矢量以及与位移矢量相关的带内对静态二次谐波敏感度的主要贡献。\n\n我们的结果表明，对称量子化形式偏振可以通过分数万尼尔中心扇区之间的转变而变得具有光学活性，从而为巨大的倍频和位移电流响应提供对称引导的途径。", "authors": [{"name": "Hongsheng Pang"}, {"name": "Lixin He"}], "featured_authors": [{"name": "Hongsheng Pang"}, {"name": "Lixin He"}], "author_count": 2}, {"id": "2606.16128", "category": "cond-mat", "title": "Luttinger liquid parameters in one-dimensional Rydberg arrays", "abstract": "We investigate Berezinskii-Kosterlitz-Thouless (BKT) transitions in one-dimensional Rydberg chains, where commensurate critical regimes associated with the melting of crystalline orders with period larger than five and incommensurate floating phases are both described by Luttinger liquid theory. The central quantity is the Luttinger liquid parameter $K$, which characterizes the universal low-energy theory and controls the relevance of perturbations driving BKT transitions. We extract $K$ using Friedel oscillations and the recently developed crosscap method introduced in Phys. Rev. Lett. 134, 076501 (2025). As benchmarks, we first apply the crosscap method to a $\\mathbb{Z}_3$ dual hard-core boson chain and a spin-1 XY chain with single-ion anisotropy, obtaining BKT transition points consistent with previous results after finite-size extrapolation. We then compute $K$ in the Rydberg chain along lines with fixed correlation-oscillation period near BKT transitions. Along the commensurate period-five line, the critical values of $K$ predicted by sine-Gordon theory reveal two BKT transitions separating the disordered phase, the critical phase, and the $\\mathbb{Z}_5$ crystalline phase. The results from Friedel oscillations and the crosscap method agree with each other and are further supported by energy-gap scaling and Binder-cumulant analysis. To obtain reliable values of $K$ from Friedel oscillations, we use a multi-harmonic fitting scheme throughout the analysis. Along incommensurate lines, the BKT points obtained from Friedel oscillations agree with those extracted from entanglement entropy. Finally, we show that the values of $K$ obtained from the two methods are mutually consistent inside the incommensurate floating phase.", "url": "https://arxiv.org/abs/2606.16128", "type": "理论", "summary": "我们研究了一维里德伯链中的别列津斯基-科斯特利茨-托利斯 (BKT) 转变，其中与周期大于 5 的晶序熔化相关的相称临界状态和不相称的浮动相均由 Luttinger 液体理论描述。中心量是 Luttinger 液体参数 $K$，它表征了通用低能理论并控制驱动 BKT 跃迁的扰动的相关性。我们使用 Friedel 振荡和最近开发的 Phys 中引入的 crosscap 方法提取 $K$。莱特牧师。 134, 076501 (2025)。作为基准，我们首先将 crosscap 方法应用于 $\\mathbb{Z}_3$ 双硬核玻色子链和具有单离子各向异性的 spin-1 XY 链，在有限尺寸外推后获得与先前结果一致的 BKT 转变点。然后，我们沿着 BKT 跃迁附近具有固定相关振荡周期的线计算里德伯链中的 $K$。沿着相应的五周期线，正弦戈登理论预测的 $K$ 的临界值揭示了两个 BKT 转变，将无序相、临界相和 $\\mathbb{Z}_5$ 结晶相分开。\n\nFriedel 振荡和 crosscap 方法的结果彼此一致，并得到能隙标度和 Binder 累积量分析的进一步支持。为了从弗里德尔振荡中获得可靠的 $K$ 值，我们在整个分析过程中使用了多谐波拟合方案。沿着不公度线，从弗里德尔振荡获得的 BKT 点与从纠缠熵中提取的 BKT 点一致。最后，我们证明了两种方法获得的$K$值在不相通的浮动相内是相互一致的。", "authors": [{"name": "Shu-Ao Liao"}, {"name": "Li-Ping Yang"}, {"name": "Jin Zhang"}], "featured_authors": [{"name": "Shu-Ao Liao"}, {"name": "Li-Ping Yang"}, {"name": "Jin Zhang"}], "author_count": 3}, {"id": "2606.16129", "category": "cond-mat", "title": "Collective relaxation eigenmodes and anisotropic magnon thermal transport in $α$-MnTe", "abstract": "The intrinsic magnon thermal transport in the altermagnet $\\alpha$-MnTe is studied by solving the three-dimensional linearized Boltzmann transport equation with the four-magnon collision matrix. Diagonalizing the collision matrix gives direct access to the relaxation eigenmodes beyond the relaxation-time approximation. We show that Umklapp scattering lifts the momentum-related zero modes of the Normal-only collision operator and substantially modifies the low-lying relaxation spectrum. Using the same collision matrix, we compute the magnon thermal conductivity tensor. The full linearized Boltzmann transport equation result exceeds the relaxation-time approximation by more than an order of magnitude at low temperature and reveals a strong transport anisotropy, with the out-of-plane thermal conductivity remaining larger than the in-plane component over the studied temperature range. A mode-resolved analysis shows that the dominant heat-carrying modes retain momentum-like character inherited from the Normal-only zero modes, and that the larger out-of-plane conductivity mainly originates from the stronger out-of-plane group-velocity contribution, rather than from a large difference in relaxation lifetimes.", "url": "https://arxiv.org/abs/2606.16129", "type": "理论+数值", "summary": "通过用四磁振子碰撞矩阵求解三维线性玻尔兹曼输运方程，研究了交变磁体$\\alpha$-MnTe中的本征磁振子热输运。对角化碰撞矩阵可以直接访问松弛时间近似之外的松弛本征模式。我们表明，Umklapp 散射提升了仅法向碰撞算子的动量相关零模式，并显着修改了低位弛豫谱。使用相同的碰撞矩阵，我们计算磁振子热导率张量。完全线性化的玻尔兹曼输运方程结果在低温下超出弛豫时间近似一个数量级以上，并显示出很强的输运各向异性，在研究的温度范围内，面外热导率仍然大于面内热导率。\n\n模式解析分析表明，主要的载热模式保留了从纯正态零模式继承的类动量特征，并且较大的面外电导率主要源于较强的面外群速度贡献，而不是源于弛豫寿命的巨大差异。", "authors": [{"name": "Rui-Jie Yao"}, {"name": "Lei Wang"}, {"name": "Bo-Ye Sun"}], "featured_authors": [{"name": "Rui-Jie Yao"}, {"name": "Lei Wang"}, {"name": "Bo-Ye Sun"}], "author_count": 3}, {"id": "2606.16133", "category": "cond-mat", "title": "InvDesMobility: a reliability-gated first-principles feedback framework for closed-loop materials discovery", "abstract": "Inverse materials design starts from target functionality and searches for structures that can realize it. Its value in closed-loop discovery depends not only on prediction performance, but also on whether expensive first-principles results are independently validated, provenance-recorded, and admitted as feedback only when evidence is sufficient. This is especially important for composite properties such as carrier mobility, where a final scalar value hides intermediate quantities, fit quality, convergence history, and workflow assumptions. Here we present InvDesMobility, a reliability-gated first-principles feedback framework that integrates multi-agent automated DFT, evidence stratification, generative structure proposal, acquisition ranking, and auditable release. Using 516 2DMatPedia-derived candidates, the workflow produced 280 QC-passed materials and 573 retained carrier-direction seed channels after channel-level reliability gating. These records were split into two feedback objects: relaxed structures updated the generative model, while retained mobility channels trained the acquisition model and set validation priority. Over multiple iterations, InvDesMobility screened 2.4 x 10^6 structures, submitted 102 candidates for DFT validation, and retained 86 reliability-gated generated channels across 41 formulas. Overall, the main contribution is not a fixed list of high-mobility materials, but a transferable feedback contract that makes closed-loop inverse design both useful and auditable when learning from expensive calculated properties. All source data, retained feedback records, and workflows are available at this https URL , with an accompanying evidence website at this https URL .", "url": "https://arxiv.org/abs/2606.16133", "type": "理论+数值", "summary": "逆向材料设计从目标功能出发，寻找能够实现它的结构。它在闭环发现中的价值不仅取决于预测性能，还取决于昂贵的第一原理结果是否经过独立验证、出处记录以及仅在证据充足时才被接受为反馈。这对于载流子迁移率等复合材料特性尤其重要，其中最终标量值隐藏了中间量、拟合质量、收敛历史和工作流程假设。在这里，我们提出了 InvDesMobility，一个可靠性门控第一原理反馈框架，集成了多智能体自动 DFT、证据分层、生成结构提案、获取排名和可审计发布。使用 516 个 2DMatPedia 衍生的候选材料，该工作流程产生了 280 个通过 QC 的材料，并在通道级可靠性门控后保留了 573 个保留的载流子方向种子通道。这些记录被分为两个反馈对象：宽松的结构更新生成模型，而保留的移动通道训练获取模型并设置验证优先级。\n\n经过多次迭代，InvDesMobility 筛选了 2.4 x 10^6 结构，提交了 102 个候选结构进行 DFT 验证，并在 41 个公式中保留了 86 个可靠性门控生成通道。总体而言，主要贡献不是高迁移率材料的固定列表，而是可转移的反馈契约，该契约使得闭环逆向设计在从昂贵的计算属性中学习时既有用又可审计。所有源数据、保留的反馈记录和工作流程均可在此 https URL 上获取，并在该 https URL 上提供随附的证据网站。", "authors": [{"name": "Wen-Kao Li"}, {"name": "Ze-Feng Gao"}, {"name": "Peng-Jie Guo"}, {"name": "Wei Ji"}, {"name": "Zhong-Yi Lu"}], "featured_authors": [{"name": "Wen-Kao Li"}, {"name": "Ze-Feng Gao"}, {"name": "Peng-Jie Guo"}, {"name": "Wei Ji"}, {"name": "Zhong-Yi Lu"}], "author_count": 5}, {"id": "2606.16169", "category": "cond-mat", "title": "A Geometrically Exact Treatment of Percolation Through Voids around Faceted Regular and Structurally Disordered Grains", "abstract": "Fluid and charge flow through interstitial volumes among impermeable randomly placed grains in porous materials ceases to occur at a critical concentration where networks of void volumes are disrupted at macroscopic scales. This critical density for void percolation can be difficult to calculate due to the irregular shape of the void regions. We develop and implement a geometrically exact method, scaling only linearly in the system volume, for identifying the shape and size of contiguous voids. In this manner, we calculate percolation thresholds for both grain cluster percolation (where system spanning networks of overlapping grains begin to appear with increasing density) and void percolation at much higher grain concentrations where networks of interstitial volumes no longer exist on macroscopic scales. For both the former and the latter, we calculate critical concentrations for inclusions in the shape of the Platonic solids (as well as truncated icosahedra) for both aligned and randomly oriented grains. In the case of critical densities for void percolation, the accuracy of our results is significantly improved relative to prior benchmarks. We also incorporate structural disorder of inclusions by considering impermeable grains in the form of cubes subject to a series of randomly placed and oriented fracture planes to mimic aggressively fractured inclusions found in nature. As the number of sustained slices becomes large, we find that the critical porosity for void percolation tends to 5%", "url": "https://arxiv.org/abs/2606.16169", "type": "理论", "summary": "流体和电荷流过多孔材料中不可渗透的随机放置的颗粒之间的间隙体积，在达到临界浓度时不再发生，其中空隙体积网络在宏观尺度上被破坏。由于空隙区域的形状不规则，空隙渗透的临界密度可能难以计算。我们开发并实施了一种几何精确方法，仅在系统体积中线性缩放，用于识别连续空隙的形状和大小。通过这种方式，我们计算了颗粒簇渗滤（随着密度的增加，跨越重叠颗粒网络的系统开始出现）和在更高颗粒浓度下的空隙渗滤（其中间隙体积网络在宏观尺度上不再存在）的渗滤阈值。对于前者和后者，我们计算了对齐和随机取向晶粒的柏拉图固体（以及截断二十面体）形状的夹杂物的临界浓度。在空隙渗透的临界密度的情况下，我们的结果的准确性相对于之前的基准显着提高。\n\n我们还通过考虑立方体形式的不渗透颗粒，使其受到一系列随机放置和定向的断裂面的影响，以模拟自然界中发现的剧烈断裂的内含物，从而纳入内含物的结构无序性。随着持续切片数量变大，我们发现孔隙渗流的临界孔隙率趋于5%", "authors": [{"name": "D. J. Priour Jr"}], "featured_authors": [{"name": "D. J. Priour Jr"}], "author_count": 1}, {"id": "2606.16217", "category": "cond-mat", "title": "symveig: Verified eigenvalue enclosures for symmetry-decomposed Hermitian matrices", "abstract": "Exact diagonalization of quantum lattice Hamiltonians returns floating-point eigenvalues whose accuracy is not certified: rounding error, eigensolver behaviour, and ill-conditioning can corrupt a result without warning. We present \\texttt{symveig}, a pure NumPy/SciPy package that computes rigorous, machine-checkable enclosures of all eigenvalues of a Hermitian matrix, with an optional symmetry-sector decomposition. For a matrix that commutes with an abelian conserved quantity diagonal in the working basis (for example the total magnetization of a spin model), the package verifies each symmetry sector independently. Because each sector block is much smaller than the full matrix, this yields enclosures that are both tighter (by a factor of $3$-$9$ across system sizes $L = 4$-$12$) and dramatically faster (a wall-clock speedup of up to $130\\times$ at $L = 12$) than verifying the full matrix, while never forming or diagonalizing it. Every enclosure half-width is a guaranteed upper bound on the distance from a computed eigenvalue to the nearest true eigenvalue under IEEE~754 round-to-nearest arithmetic, obtained by explicit floating-point error analysis with no heuristic slack. The implementation requires neither INTLAB nor MATLAB, bringing rigorously verified eigenvalue enclosure into the standard scientific-Python stack used in computational physics. We validate the package on $1$D Heisenberg (open and periodic), $J_1$-$J_2$ Heisenberg, and $2$D Heisenberg lattices, confirming that every computed eigenvalue is contained in its enclosure across all tested configurations.", "url": "https://arxiv.org/abs/2606.16217", "type": "理论+数值", "summary": "量子晶格哈密顿量的精确对角化返回浮点特征值，其准确性未经认证：舍入误差、特征求解器行为和病态条件可能会在没有警告的情况下破坏结果。我们提出了 \\texttt{symveig}，一个纯 NumPy/SciPy 包，它可以计算 Hermitian 矩阵所有特征值的严格的、机器可检查的封装，并具有可选的对称扇形分解。对于在工作基础上与阿贝尔守恒量对角线交换的矩阵（例如自旋模型的总磁化强度），该包独立验证每个对称扇区。由于每个扇区块比完整矩阵小得多，因此产生的外壳比验证完整矩阵更紧密（系统尺寸 $L = 4$-$12$ 的范围为 $3$-$9$），并且速度显着更快（在 $L = 12$ 时挂钟加速高达 $130\\times$），同时不会形成或对角化它。每个包围半宽是 IEEE~754 舍入到最近算法下从计算的特征值到最近的真实特征值的距离的保证上限，通过显式浮点误差分析获得，没有启发式松弛。\n\n该实现既不需要 INTLAB 也不需要 MATLAB，将经过严格验证的特征值封装引入计算物理中使用的标准科学 Python 堆栈中。我们在 $1$D 海森堡（开放和周期性）、$J_1$-$J_2$ 海森堡和 $2$D 海森堡格上验证了该包，确认每个计算的特征值都包含在所有测试配置的其外壳中。", "authors": [{"name": "Sarang Vehale"}, {"name": "Ritu Goel"}], "featured_authors": [{"name": "Sarang Vehale"}, {"name": "Ritu Goel"}], "author_count": 2}, {"id": "2606.16225", "category": "cond-mat", "title": "The free energy of the square lattice Ising model with interactions alternating in horizontal and vertical directions", "abstract": "The free energy of the Ising model on the square lattice with alternating interactions in both horizontal and vertical directions is exactly derived. This model is distinct from the checkerboard Ising model. The result includes Onsager's free energy as a special case, and also includes Lee-Yang's free energy with an imaginary field, and relates these two solutions via continuous parameters. It is also derived that each imaginary magnetic field $i\\pi/2$ applied to a lattice site corresponds to a single frustrated square in its dual lattice.", "url": "https://arxiv.org/abs/2606.16225", "type": "理论", "summary": "准确推导了水平和垂直方向交替相互作用的方晶格上伊辛模型的自由能。该模型与棋盘伊辛模型不同。结果包括作为特例的 Onsager 自由能，还包括具有虚场的 Lee-Yang 自由能，并通过连续参数将这两个解联系起来。还得出施加到晶格位点的每个虚磁场 $i\\pi/2$ 对应于其双晶格中的单个受抑正方形。", "authors": [{"name": "Kazuhiko Minami"}], "featured_authors": [{"name": "Kazuhiko Minami"}], "author_count": 1}, {"id": "2606.16233", "category": "cond-mat", "title": "Hidden chirality and half-vortex formation in exciton-polariton condensates", "abstract": "We show that a radially symmetric, nonresonantly pumped spinor exciton-polariton condensate can acquire chirality without a rotating drive, chiral geometry, or pump orbital angular momentum. Spin relaxation in a two-reservoir system shifts the reservoir-induced blueshift relative to the gain profile, creating an effective non-Hermitian chiral potential. A reduced angular-mode theory reveals tunable exceptional points and non-reciprocal coupling between counter-rotating modes. Full driven-dissipative Gross-Pitaevskii simulations show that this hidden chirality enables all-optical formation of spin-selective half-vortices.", "url": "https://arxiv.org/abs/2606.16233", "type": "理论+数值", "summary": "我们证明，径向对称、非共振泵浦的自旋激子-极化子凝聚体无需旋转驱动、手性几何或泵浦轨道角动量即可获得手性。双储层系统中的自旋弛豫会相对于增益分布改变储层引起的蓝移，从而产生有效的非厄米手性势。简化角模式理论揭示了可调异常点和反向旋转模式之间的非互易耦合。全驱动耗散 Gross-Pitaevskii 模拟表明，这种隐藏的手性能够实现自旋选择性半涡旋的全光学形成。", "authors": [{"name": "A. N. Osipov"}, {"name": "I. Y. Chestnov"}, {"name": "P. G. Lagoudakis"}, {"name": "A. V. Yulin"}], "featured_authors": [{"name": "A. N. Osipov"}, {"name": "I. Y. Chestnov"}, {"name": "P. G. Lagoudakis"}, {"name": "A. V. Yulin"}], "author_count": 4}, {"id": "2606.16249", "category": "cond-mat", "title": "Multiband transport hierarchy and large Nernst effect in EuAuBi: Establishing a Nernst scaling for asymmetric multiband systems", "abstract": "In correlated materials, coexisting pockets of vastly different carrier densities raise two fundamental questions: which pocket governs the various transport coefficients, and does the conventional Nernst scaling $\\nu/T \\propto \\mu/E_F$, originally derived for single-band systems, still hold? We address both questions in the polar semimetal EuAuBi, where a dilute electron pocket ($n_e \\sim 10^{16}~\\mathrm{cm}^{-3}$) coexists with a dense hole pocket ($n_h \\sim 10^{21}~\\mathrm{cm}^{-3}$). We find a clear hierarchy: the hole pocket dominates the longitudinal resistivity; the Hall effect crosses from electron- to hole-dominance with increasing field; the Seebeck coefficient is dominated by the electron pocket at low temperature and by both pockets at high temperature. Remarkably, the Nernst effect is governed entirely by the ultrahigh-mobility electron pocket, yielding a large low-field signal of $\\sim 5~\\mu\\mathrm{V/K}$ near 1~T at 202~K, comparable to anomalous Nernst signals in magnetic Weyl semimetals. By analyzing the two-band thermoelectric conductivity, we show that the Nernst coefficient follows a scaling $\\nu/T \\propto \\mu_e/{E_{F, tot}}$. This scaling originates from a compensation between the electron-to-hole conductivity ratio and the Fermi-energy ratio, establishing that the large Nernst effect is a semiclassical multiband phenomenon rather than a topological Berry-curvature contribution. This understanding advances the thermoelectric transport physics of multiband electronic systems and offers a guiding principle for low-field transverse thermoelectric design.", "url": "https://arxiv.org/abs/2606.16249", "type": "理论", "summary": "在相关材料中，载流子密度截然不同的共存袋提出了两个基本问题：哪个袋控制各种输运系数，以及最初为单带系统导出的传统能斯特标度 $\\nu/T \\propto \\mu/E_F$ 是否仍然成立？我们在极性半金属 EuAuBi 中解决了这两个问题，其中稀电子袋 ($n_e \\sim 10^{16}~\\mathrm{cm}^{-3}$) 与密集空穴袋 ($n_h \\sim 10^{21}~\\mathrm{cm}^{-3}$) 共存。我们发现了一个清晰的层次结构：孔穴主导纵向电阻率；随着场的增加，霍尔效应从电子主导转变为空穴主导；塞贝克系数在低温下由电子袋主导，在高温下由两个电子袋主导。值得注意的是，能斯特效应完全由超高迁移率电子袋控制，在 202~K 1~T 附近产生 $\\sim 5~\\mu\\mathrm{V/K}$ 的大低场信号，与磁性韦尔半金属中的反常能斯特信号相当。通过分析两带热电导率，我们表明能斯特系数遵循缩放$\\nu/T \\propto \\mu_e/{E_{F, tot}}$。\n\n这种缩放源于电子与空穴电导率比和费米能量比之间的补偿，确定大能斯特效应是半经典多带现象而不是拓扑贝里曲率贡献。这种理解推进了多频带电子系统的热电输运物理学，并为低场横向热电设计提供了指导原则。", "authors": [{"name": "Weimin Quan"}, {"name": "Xiaodong Guo"}, {"name": "Lingxiao Zhao"}, {"name": "Shengwei Chi"}, {"name": "Gang Xu"}, {"name": "Zengwei Zhu"}, {"name": "Xiaokang Li"}], "featured_authors": [{"name": "Weimin Quan"}, {"name": "Xiaodong Guo"}, {"name": "Lingxiao Zhao"}, {"name": "Gang Xu"}, {"name": "Zengwei Zhu"}, {"name": "Xiaokang Li"}], "author_count": 7}, {"id": "2606.16260", "category": "cond-mat", "title": "Tuning superconductivity and charge density wave order by next-nearest-neighbor hopping integral in honeycomb Holstein model", "abstract": "By using unbiased determinant quantum Monte Carlo simulations, we investigate the interplay between superconductivity and charge density wave order in the Holstein model on a honeycomb lattice with next-nearest-neighbor hopping \\(t^{\\prime}\\). We find that a finite negative \\(t^{\\prime}\\) enhances \\(s\\)-wave superconducting pairing susceptibility near the van Hove fillings in the weak electron-phonon coupling regime, while it suppresses superconductivity and promotes charge density wave order at intermediate electron-phonon coupling strengths. The effect of \\(t^{\\prime}\\) on a charge density wave is filling-dependent: It suppresses the charge density wave at half filling but enhances it near the van Hove singularities. A spectral analysis reveals the opening of a gap at low temperatures, highlighting the competitive relationship between superconducting and charge density wave orders mediated by electron-phonon coupling and tuned by \\(t^{\\prime}\\).", "url": "https://arxiv.org/abs/2606.16260", "type": "理论+数值", "summary": "通过使用无偏行列式量子蒙特卡罗模拟，我们研究了具有次近邻跳跃 \\(t^{\\prime}\\) 的蜂窝晶格上荷斯坦模型中超导性和电荷密度波序之间的相互作用。我们发现，有限的负\\(t^{\\prime}\\)增强了弱电子-声子耦合范围内范霍夫填充附近的\\(s\\)波超导配对敏感性，同时抑制了超导性并促进了中等电子-声子耦合强度下的电荷密度波序。 \\(t^{\\prime}\\) 对电荷密度波的影响与填充相关：它在半填充时抑制电荷密度波，但在范霍夫奇点附近增强电荷密度波。光谱分析揭示了低温下间隙的打开，强调了由电子声子耦合介导并由\\(t^{\\prime}\\)调节的超导和电荷密度波序之间的竞争关系。", "authors": [{"name": "Hongxing Liu"}, {"name": "Lufeng Zhang"}, {"name": "Tianxing Ma"}], "featured_authors": [{"name": "Hongxing Liu"}, {"name": "Lufeng Zhang"}, {"name": "Tianxing Ma"}], "author_count": 3}, {"id": "2606.16314", "category": "cond-mat", "title": "Endoreversible Carnot machines with long-time reversible limit", "abstract": "The well-known Curzon-Ahlborn (CA) engine [Am. J. Phys. {\\bf 43}, 22 (1975)] runs in finite time and yields a finite power output. In order to recover the standard Carnot cycle from the CA model, the limit of quasi-static operation has to be concurrent with the reversible limit, a condition strangely missing from the CA model. We augment this model by specifying the duration of the isothermal process as a monotonic decreasing function of the temperature difference between the working substance and the reservoir. As an illustration, we analyze the machine's operation in the low-dissipation regime in which the entropy production in each isothermal branch is inversely proportional to the duration of the process. The modified model is able to determine the optimal durations of isothermal processes as well as heat and work per cycle, while retaining the optimal power conditions of the CA model.", "url": "https://arxiv.org/abs/2606.16314", "type": "理论", "summary": "著名的 Curzon-Ahlborn (CA) 发动机 [Am。 J. Phys。 {\\bf 43}, 22 (1975)] 在有限时间内运行并产生有限的功率输出。为了从 CA 模型恢复标准卡诺循环，准静态操作的极限必须与可逆极限同时存在，而 CA 模型奇怪地缺少这个条件。我们通过将等温过程的持续时间指定为工作物质和储层之间温差的单调递减函数来增强该模型。作为说明，我们分析了机器在低耗散状态下的运行，其中每个等温分支中的熵产生与过程的持续时间成反比。修改后的模型能够确定等温过程的最佳持续时间以及每个周期的热量和功，同时保留 CA 模型的最佳功率条件。", "authors": [{"name": "Ramandeep S. Johal"}, {"name": "Rajeshree Chakraborty"}], "featured_authors": [{"name": "Ramandeep S. Johal"}, {"name": "Rajeshree Chakraborty"}], "author_count": 2}, {"id": "2606.16320", "category": "cond-mat", "title": "Implementation of rotational invariance for first-principles phonons and application to low-dimensional materials", "abstract": "The acoustic flexural (phonon) modes of low-dimensional materials should show a quadratic dispersion close to the Brillouin zone center. Any departure from this behavior in Density Functional Theory calculations is typically associated with a breaking of the rotational invariance, with few methods available to correct it. In this work, we reexamine this issue based on a reciprocal-space imposition of this condition, with corrections on the zone-center IFCs and their first and second derivatives with respect to the phonon wavevector. We propose two correction schemes for the short-range part of the interatomic force constants, one based on the Moore-Penrose pseudoinverse, that we implement in the ABINIT software package, and one based on the straight modification of the on-site antisymmetric part of the first-order derivative of the dynamical matrix with respect to the wavevector. We investigate the impact of imposing rotational invariance for different system dimensionalities and pseudopotentials. Finally, we discuss rotational invariance in the context of long-range electrostatics contribution to the IFCs. We observe that the usual treatment of electrostatics is by construction not rotationally invariant. This is found especially critical when correcting the second derivatives of the IFCs.", "url": "https://arxiv.org/abs/2606.16320", "type": "理论+数值", "summary": "低维材料的声学弯曲（声子）模式应在布里渊区中心附近表现出二次色散。密度泛函理论计算中任何偏离这种行为的行为通常都与旋转不变性的破坏有关，几乎没有可用的方法来纠正它。在这项工作中，我们基于此条件的倒易空间强加重新检查了这个问题，并对区域中心 IFC 及其相对于声子波矢的一阶和二阶导数进行了修正。我们提出了两种原子间力常数短程部分的校正方案，一种基于摩尔-彭罗斯伪逆，我们在ABINIT软件包中实现，另一种基于动态矩阵关于波矢的一阶导数的现场反对称部分的直接修正。我们研究了对不同系统维度和赝势施加旋转不变性的影响。最后，我们在长程静电对 IFC 的贡献的背景下讨论旋转不变性。\n\n我们观察到静电的通常处理是通过构造而不是旋转不变的。在校正 IFC 的二阶导数时，这一点尤其重要。", "authors": [{"name": "Benoit Van Troeye"}, {"name": "Xavier Gonze"}, {"name": "Geoffrey Pourtois"}], "featured_authors": [{"name": "Benoit Van Troeye"}, {"name": "Xavier Gonze"}, {"name": "Geoffrey Pourtois"}], "author_count": 3}, {"id": "2606.16338", "category": "cond-mat", "title": "Non-stationary longitudinal Josephson effect in electron-hole bilayers", "abstract": "The non-stationary longitudinal Josephson effect in bilayer systems with pairing of spatially separated electrons and holes is investigated. The tunneling current between two (right and left) weakly coupled electron-hole condensates is analyzed in the presence of an external voltage applied along the layers. Two limiting regimes are considered: the high-density regime, where pairing occurs in momentum space similarly to conventional superconductors, and the low-density regime corresponding to a Bose-Einstein condensate of spatially indirect excitons. Using the tunneling Hamiltonian approach, expressions for the quasiparticle, superconducting and interference contributions to the tunneling current are derived. It is shown that in the high-density limit the quasiparticle and interference currents vanish at zero temperature below a threshold voltage determined by the energy gap, so that only the supercurrent remains. In contrast, in the low-density regime the gapless spectrum of collective excitations leads to finite dissipative contributions even at zero temperature, resulting in damping of Josephson oscillations. For spatially separated tunneling barriers with distance exceeding the coherence length, phase jumps occur at each barrier, resulting in voltage oscillations across the electron and hole barriers and a non-sinusoidal current-phase relation governed by the critical currents of the two barriers.", "url": "https://arxiv.org/abs/2606.16338", "type": "理论", "summary": "研究了具有空间分离的电子和空穴配对的双层系统中的非平稳纵向约瑟夫森效应。在沿层施加外部电压的情况下，分析两个（右和左）弱耦合电子空穴凝聚体之间的隧道电流。考虑了两个限制区域：高密度区域，其中配对发生在动量空间中，类似于传统的超导体，以及低密度区域，对应于空间间接激子的玻色-爱因斯坦凝聚。使用隧道哈密顿方法，导出了准粒子、超导和干扰对隧道电流的贡献的表达式。结果表明，在高密度极限下，准粒子和干扰电流在零温度下消失，低于由能隙确定的阈值电压，因此仅保留超电流。相反，在低密度状态下，即使在零温度下，集体激发的无间隙谱也会产生有限的耗散贡献，从而导致约瑟夫森振荡的阻尼。\n\n对于距离超过相干长度的空间分离的隧道势垒，每个势垒处都会发生相位跳跃，导致电子和空穴势垒上的电压振荡以及由两个势垒的临界电流控制的非正弦电流相位关系。", "authors": [{"name": "O.M. Konstantynov"}, {"name": "S.I. Shevchenko"}], "featured_authors": [{"name": "O.M. Konstantynov"}, {"name": "S.I. Shevchenko"}], "author_count": 2}, {"id": "2606.16339", "category": "cond-mat", "title": "Thermodynamic Uncertainty Relation For a Multi-Phase Alternating Renewal Random Walk", "abstract": "Thermodynamic Uncertainty Relations (TURs) impose universal bounds linking current precision to entropy production in nonequilibrium systems. While general bounds like the Proesmans--Van den Broeck (PV) relation provide a broad framework, they often remain loose for processes characterized by renewal events. In this work, we derive a generalized entropic bound for current fluctuations in renewal-reward processes. By utilizing a rigorous variance decomposition within the framework of renewal-reward theory, we obtain a model-independent bound that is not only rigorous but tighter than the standard PV relation. Notably, in the linear-response regime, our bound correctly scales with the renewal rate and identifies a precision penalty arising from cycle-length fluctuations. These results provide a physically informative constraint on the precision of run-and-tumble-type dynamics and highlight the universal limits of transport in complex stochastic walkers.", "url": "https://arxiv.org/abs/2606.16339", "type": "理论", "summary": "热力学不确定性关系 (TUR) 强加了将电流精度与非平衡系统中的熵产生联系起来的通用界限。虽然像 Proesmans-Van den Broeck (PV) 关系这样的一​​般界限提供了一个广泛的框架，但它们对于以更新事件为特征的过程通常仍然宽松。在这项工作中，我们得出了更新奖励过程中当前波动的广义熵界。通过在更新奖励理论框架内利用严格的方差分解，我们获得了一个与模型无关的界限，该界限不仅严格而且比标准 PV 关系更紧密。值得注意的是，在线性响应机制中，我们的界限正确地随更新率缩放，并识别周期长度波动引起的精度损失。这些结果为运行和翻滚型动力学的精度提供了物理信息约束，并强调了复杂随机步行器中运输的普遍限制。", "authors": [{"name": "Fatemeh Karimi"}, {"name": "Farhad H. Jafarpour"}], "featured_authors": [{"name": "Fatemeh Karimi"}, {"name": "Farhad H. Jafarpour"}], "author_count": 2}, {"id": "2606.16399", "category": "cond-mat", "title": "Non-Equilibrium Model Selection via Finite-Time Thermodynamics", "abstract": "Information criteria such as WAIC and WBIC extend model selection to singular learning machines, but they are usually derived for equilibrium posteriors. We formulate a finite-time analogue of WBIC by replacing the equilibrium posterior with an effective ensemble generated by learning dynamics under a resource constraint. When this ensemble admits an analytic effective potential, singular learning theory yields a resource-dependent real log canonical threshold. The resulting estimator gives a computable thermodynamic contribution to time-bounded MDL and identifies the finite-time singular complexity relevant to the structural information measured by epiplexity.", "url": "https://arxiv.org/abs/2606.16399", "type": "理论", "summary": "WAIC 和 WBIC 等信息标准将模型选择扩展到奇异学习机，但它们通常是针对平衡后验推导的。我们通过用在资源约束下学习动态生成的有效集成替换平衡后验来制定 WBIC 的有限时间模拟。当这个集合承认分析有效潜力时，奇异学习理论会产生依赖于资源的实对数规范阈值。由此产生的估计器给出了对有时间限制的 MDL 的可计算热力学贡献，并识别与由表皮复杂性测量的结构信息相关的有限时间奇异复杂性。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2606.16424", "category": "cond-mat", "title": "Real-space spectral functions of three-dimensional billion-size topological non-Hermitian matter with tensor networks", "abstract": "Non-Hermitian systems host a wide range of unconventional topological phenomena while large-scale simulations in finite three dimensional systems remain challenging because of the rapidly growing number of sites. In particular, higher-order topological corner modes are often studied only in small lattices, where strong finite-size effects can mask their intrinsic behavior. Here, we develop a tensor-network framework that combines quantics tensor cross interpolation with the kernel polynomial method, enabling compact representations of large non-Hermitian tight-binding Hamiltonians and direct calculations of real-space spectral functions for systems exceeding one billion lattice sites. Using this approach, we investigate three-dimensional non-Hermitian higher-order topological insulators with with structured real-space geometries. The unprecedented system size enables direct access to the macroscopic regime and allows corner-mode spectral responses to be resolved in genuinely three-dimensional this http URL tuning the loss strength, we identify distinct in-gap corner modes across weak- and strong-loss this http URL results establish tensor-network algorithms as a powerful strategy to perform real-space spectral calculations in exceptionally large non-Hermitian systems.", "url": "https://arxiv.org/abs/2606.16424", "type": "理论+数值", "summary": "非厄米系统拥有广泛的非常规拓扑现象，而有限三维系统中的大规模模拟由于站点数量的快速增长仍然具有挑战性。特别是，高阶拓扑角模式通常仅在小晶格中进行研究，其中强大的有限尺寸效应可以掩盖其内在行为。在这里，我们开发了一个张量网络框架，它将量子张量交叉插值与核多项式方法相结合，能够紧凑地表示大型非厄米紧束缚哈密顿量，并直接计算超过十亿格点的系统的实空间谱函数。使用这种方法，我们研究了具有结构化实空间几何形状的三维非厄米高阶拓扑绝缘体。\n\n前所未有的系统规模使得能够直接访问宏观体系，并允许在真正的三维中解决角模光谱响应，该http URL调整损失强度，我们在弱和强损失中识别不同的间隙角模式，该http URL结果将张量网络算法建立为在异常大的非厄米系统中执行实空间光谱计算的强大策略。", "authors": [{"name": "Yitao Sun"}, {"name": "Jose L. Lado"}, {"name": "Guangze Chen"}], "featured_authors": [{"name": "Yitao Sun"}, {"name": "Jose L. Lado"}, {"name": "Guangze Chen"}], "author_count": 3}, {"id": "2606.16443", "category": "cond-mat", "title": "Persistence Properties of a Phase-ordering System with Competing Dynamics", "abstract": "We investigate the persistence properties during phase ordering in the two-dimensional ($d=2$) Ising model evolving under competing nonconserved spin-flip and conserved spin-exchange dynamics by means of Monte Carlo simulations at zero temperature. We examine three distinct persistence probabilities: (i) the total persistence probability, defined as the probability that a lattice site has never experienced a change in the sign of the spin residing there; (ii) the spin-flip persistence probability, which exclusively measures the fraction of sites that have never undergone a spin-flip event; and (iii) the composite persistence probability, defined as the fraction of sites that have experienced neither a spin-flip nor a spin-exchange event. In the asymptotic regime, both the total and spin-flip persistence probabilities exhibit identical power-law decay, irrespective of the relative occurrence probability of the spin-flip move $p_r$. The corresponding persistence exponent $\\theta_i \\approx 0.225$, is found to be consistent with the value reported for systems evolving purely under nonconserved dynamics. We further demonstrate that both persistence measures satisfy the scaling relation $d-d_f^i=\\theta_i/\\alpha_i$, where $d_f^i$ is the fractal dimension of the corresponding persistence lattice and $\\alpha_i\\approx 1/2$ characterizes the asymptotic power-law growth of spatially correlated regions of non-persistent spins. In contrast, although the composite persistence probability also exhibits asymptotic power-law decay, both the corresponding persistence exponent $\\theta_{\\rm c}$ and the fractal dimension $d_f^{\\rm c}$ of the persistence lattice show strong dependence on $p_r$. Combined with the presence of a universal growth exponent $\\alpha_{\\rm c}\\approx 1/2$, this leads to the breakdown of the scaling relation among the characteristic exponents for the composite persistence.", "url": "https://arxiv.org/abs/2606.16443", "type": "理论+数值", "summary": "我们通过零温度下的蒙特卡罗模拟，研究了在竞争性非保守自旋翻转和保守自旋交换动力学下演化的二维 ($d=2$) Ising 模型中相排序过程中的持久性特性。我们研究了三种不同的持久性概率：（i）总持久性概率，定义为晶格位点从未经历过驻留在那里的自旋符号变化的概率； (ii) 自旋翻转持续概率，专门衡量从未经历过自旋翻转事件的位点比例； (iii) 复合持久概率，定义为既没有经历过自旋翻转也没有经历过自旋交换事件的位点的分数。在渐进状态下，总概率和自旋翻转持久性概率都表现出相同的幂律衰减，而不管自旋翻转移动 $p_r$ 的相对发生概率如何。发现相应的持久性指数 $\\theta_i \\approx 0.225$ 与纯粹在非守恒动力学下演化的系统报告的值一致。\n\n我们进一步证明，两种持久性度量都满足缩放关系 $d-d_f^i=\\theta_i/\\alpha_i$，其中 $d_f^i$ 是相应持久性晶格的分形维数，$\\alpha_i\\approx 1/2$ 表征非持久自旋空间相关区域的渐近幂律增长。相比之下，虽然复合持久概率也表现出渐近幂律衰减，但相应的持久指数 $\\theta_{\\rm c}$ 和持久晶格的分形维数 $d_f^{\\rm c}$ 都表现出对 $p_r$ 的强烈依赖性。再加上通用增长指数 $\\alpha_{\\rm c}\\approx 1/2$ 的存在，这导致了复合持久性的特征指数之间的缩放关系的崩溃。", "authors": [{"name": "Shubham Thwal"}, {"name": "Suman Majumder"}], "featured_authors": [{"name": "Shubham Thwal"}, {"name": "Suman Majumder"}], "author_count": 2}, {"id": "2606.16459", "category": "cond-mat", "title": "Superconducting diode effect via Floquet topological Fulde-Ferrell phase in driven Rashba nanowire", "abstract": "Much has been studied on Floquet engineering in Rashba nanowire model regarding topological superconductivity hosting Majorana $0$- and anomalous $\\pi$-modes, here we theoretically investigate the possible emergence of finite momentum Fulde-Ferrell (FF) superconducting state in quasi-energy of the above model under the periodic modulation of in-plane and out-of-plane magnetic fields while the static limit does not host a FF ground state. We demonstrate controllable switching between Floquet Majorana $0$- and $\\pi$-modes via reversal of the supercurrent direction, revealing pronounced nonreciprocal supercurrent signatures which is a manifestation of the FF pairing. We validate the onset of FF pairing following a self-consistent mean-field analysis where externally applied supercurrent facilitates nonreciprocal signatures in quasi-energy spectra. The above findings directly indicates to the intriguing phenomenon of superconducting diode effect (SDE). The drive amplitude serves as a parameter to regulate the diode efficiency with chemical potential. Our study thus reveals a rich interplay between Floquet topological superconductivity and finite-momentum FF pairing, providing a tunable way to switch between different Floquet Majorana modes and realize the SDE with high efficiency.", "url": "https://arxiv.org/abs/2606.16459", "type": "理论", "summary": "Rashba 纳米线模型中的 Floquet 工程已经对马约拉纳 $0$- 和反常 $\\pi$- 模式的拓扑超导进行了很多研究，在这里，我们从理论上研究了上述模型在面内和面外磁场的周期性调制下，在静态极限不存在 FF 基态的情况下，在准能量下可能出现的有限动量 Fulde-Ferrell (FF) 超导态。我们通过反转超电流方向演示了 Floquet Majorana $0$- 和 $\\pi$-模式之间的可控切换，揭示了明显的非互易超电流特征，这是 FF 配对的表现。我们在自洽平均场分析后验证了 FF 配对的开始，其中外部施加的超电流促进了准能谱中的不可逆特征。上述发现直接表明了超导二极管效应（SDE）这一有趣的现象。驱动幅度作为用化学势调节二极管效率的参数。\n\n因此，我们的研究揭示了 Floquet 拓扑超导性和有限动量 FF 配对之间丰富的相互作用，提供了一种在不同 Floquet Majorana 模式之间切换并高效实现 SDE 的可调方法。", "authors": [{"name": "Sayak Bhowmik"}, {"name": "Arijit Saha"}, {"name": "Tanay Nag"}], "featured_authors": [{"name": "Sayak Bhowmik"}, {"name": "Arijit Saha"}, {"name": "Tanay Nag"}], "author_count": 3}, {"id": "2606.16483", "category": "cond-mat", "title": "Geometric decomposition of the $d$-dimensional hard-sphere partition function", "abstract": "We introduce a geometric decomposition of the hard-sphere partition function. Using a close-packing-inspired geometric bound on the available insertion volume, made rigorous when a corresponding local density certificate is available, we establish a reference upper bound $Q^\\ast$ on the configurational integral. Factoring this upper bound out of the statistical geometric partition function of Speedy yields a new form for the $d$-dimensional partition function, $Q(N,V,T)=Q^\\ast \\exp(-N \\mathcal{J})$, where $\\mathcal{J}$ depends strictly on the boundary-to-volume ratio of the voids and the close-packing density. Overall, this work deepens our statistical geometric understanding of the hard-sphere system.", "url": "https://arxiv.org/abs/2606.16483", "type": "理论", "summary": "我们引入了硬球配分函数的几何分解。在可用插入体积上使用紧堆积启发的几何边界，当相应的局部密度证书可用时变得严格，我们在构型积分上建立了参考上限 $Q^\\ast$。将这个上限从 Speedy 的统计几何配分函数中分解出来，得到 $d$ 维配分函数的新形式 $Q(N,V,T)=Q^\\ast \\exp(-N \\mathcal{J})$，其中 $\\mathcal{J}$ 严格取决于空隙的边界与体积之比和密堆积密度。总的来说，这项工作加深了我们对硬球系统的统计几何理解。", "authors": [{"name": "Luke K. Davis"}], "featured_authors": [{"name": "Luke K. Davis"}], "author_count": 1}, {"id": "2606.16536", "category": "cond-mat", "title": "Vortex-core size and quantum geometry in flat-band superconductors", "abstract": "We investigate the real-space vortex structure of a flat-band superconductor described by the attractive Hubbard model on the Mielke checkerboard lattice. Using a momentum-space mean-field analysis, we derive a closed-form expression for the coherence length in terms of the quantum metric of the Bloch states and a particle-hole-symmetric pair density. Self-consistent Bogoliubov-de Gennes calculations on a finite disk confirm this prediction across a wide range of fillings and interaction strengths. The coherence length is minimized at half filling, diverges toward both band edges as the pair density vanishes, and depends only logarithmically on the interaction strength. These features differ qualitatively from the conventional BCS picture, which relies on a well-defined Fermi surface and a kinetic mechanism for pair transport. Instead, the vortex-core size is governed by a geometric pair mass arising from virtual interband processes encoded in the quantum metric. Our results establish the vortex core as a direct real-space manifestation of flat-band quantum geometry.", "url": "https://arxiv.org/abs/2606.16536", "type": "理论+数值", "summary": "我们研究了由 Mielke 棋盘晶格上有吸引力的 Hubbard 模型描述的平带超导体的实空间涡旋结构。使用动量空间平均场分析，我们根据布洛赫态的量子度量和粒子空穴对称对密度推导了相干长度的封闭式表达式。有限圆盘上的自洽 Bogoliubov-de Gennes 计算在各种填充物和相互作用强度下证实了这一预测。相干长度在半填充时最小化，当对密度消失时向两个能带边缘发散，并且仅与相互作用强度呈对数关系。这些特征与传统的 BCS 图有质的不同，传统的 BCS 图依赖于明确的费米表面和对传输的动力学机制。相反，涡核尺寸由以量子度量编码的虚拟带间过程产生的几何对质量控制。我们的结果将涡核确立为平带量子几何的直接实空间表现。", "authors": [{"name": "M. Özkurt"}, {"name": "M. Iskin"}], "featured_authors": [{"name": "M. Özkurt"}, {"name": "M. Iskin"}], "author_count": 2}, {"id": "2606.16550", "category": "cond-mat", "title": "Lattice Matching Dictates the Growth Mode and Quality of Deuterium Crystallization in Confined Spherical Shells", "abstract": "Cryogenic hydrogen isotope fuel layers with high structural integrity and atomic-scale smoothness are prerequisites for symmetric implosion and ignition in inertial confinement fusion (ICF). Using deuterium (D$_2$) as model fuel, we perform large-scale molecular dynamics simulations with a Feynman-Hibbs corrected Silvera-Goldman potential to describe nuclear quantum effects at low temperatures, systematically investigating D$_2$ crystallization inside spherical ablator capsules. By varying substrate lattice constant from 3.1 angstrom to 3.9 angstrom, we demonstrate that lattice matching dictates the transition from coherent epitaxial growth to polycrystalline formation, establishing it as the primary design principle for high-performance targets. When the substrate lattice closely matches the equilibrium hexagonal-close-packed (HCP) spacing of cryogenic D$_2$ (approximately 3.5 angstrom), D$_2$ forms coherent layer-by-layer epitaxial growth consistent with Ostwald's stepwise nucleation theory, yielding HCP-dominated near-single crystals with minimal dislocations and ultra-smooth inner surfaces. In contrast, large lattice mismatch destabilizes coherent growth and causes island-like growth, producing polycrystalline structures with mixed HCP/FCC phases, elevated defects, and greatly increased surface roughness. Radial stress analysis shows that interfacial stress from mismatch localizes within 2-3 molecular layers near the interface, triggering subsequent defect-mediated growth. These findings highlight substrate lattice matching in regulating confined solid growth and crystallization quality, establish it as a key principle for ablator inner-surface engineering in ICF cryogenic targets, and offer atomic guidance for growing high-quality single-crystal deuterium-tritium (DT) fuel layers with optimal smoothness.", "url": "https://arxiv.org/abs/2606.16550", "type": "理论+数值", "summary": "具有高结构完整性和原子级平滑度的低温氢同位素燃料层是惯性约束聚变（ICF）中对称内爆和点火的先决条件。我们使用氘 (D$_2$) 作为模型燃料，利用 Feynman-Hibbs 校正的 Silvera-Goldman 势进行大规模分子动力学模拟，以描述低温下的核量子效应，系统地研究球形烧蚀胶囊内的 D$_2$ 结晶。通过将衬底晶格常数从 3.1 埃改变到 3.9 埃，我们证明晶格匹配决定了从相干外延生长到多晶形成的转变，将其确立为高性能靶材的主要设计原则。当基底晶格与低温D$_2$的平衡六方密排（HCP）间距（约3.5埃）紧密匹配时，D$_2$形成符合奥斯特瓦尔德逐步成核理论的相干逐层外延生长，产生具有最小位错和超光滑内表面的以HCP为主的近单晶。\n\n相反，大的晶格失配会破坏相干生长的稳定性并导致岛状生长，产生具有混合 HCP/FCC 相、增加的缺陷和大大增加的表面粗糙度的多晶结构。径向应力分析表明，不匹配产生的界面应力集中在界面附近的 2-3 个分子层内，引发随后的缺陷介导的生长。这些发现强调了基底晶格匹配在调节受限固体生长和结晶质量方面的作用，将其确立为ICF低温靶烧蚀体内表面工程的关键原则，并为生长具有最佳平滑度的高质量单晶氘氚（DT）燃料层提供原子指导。", "authors": [{"name": "Peng Bi"}, {"name": "Yu-Shen Wan"}, {"name": "Wei Zhang"}, {"name": "Jian Chen"}, {"name": "Yong Yi"}, {"name": "Qi-Feng Chen"}], "featured_authors": [{"name": "Peng Bi"}, {"name": "Yu-Shen Wan"}, {"name": "Wei Zhang"}, {"name": "Jian Chen"}, {"name": "Yong Yi"}, {"name": "Qi-Feng Chen"}], "author_count": 6}, {"id": "2606.16622", "category": "cond-mat", "title": "Intervalley coherence and flavor polarization in three-valley moiré systems", "abstract": "We investigate interaction-induced symmetry breaking in moiré superlattices created by twisting two identical materials where the electronic low-energy degrees of freedom reside in the vicinity of the $M$ points. Based on general symmetry arguments, we identify and classify the possible candidate instabilities that, besides flavor polarized states, also involve a variety of intervalley-coherent (IVC) orders. This complexity is related primarily to the presence of three valleys, instead of the well-studied scenario of two, e.g., in graphene: IVC states can couple all three valleys identically, with a non-trivial sign structure, or even with different magnitudes. We study the energetics using an analytical strong-coupling framework and unrestricted Hartree-Fock applied to the full continuum model, with very good agreement between the two approaches. Interestingly, depending on stacking, IVC instabilities not only appear due to superexchange at moderate bandwidths, but also deep in the strong-coupling regime as a result of deviations from the flat-metric condition. Our work demonstrates that twisted $M$-point materials provide a rich playground for complex correlated physics and highlights differences and similarities to twisted multilayer graphene.", "url": "https://arxiv.org/abs/2606.16622", "type": "理论+数值", "summary": "我们研究了通过扭曲两种相同材料而产生的莫尔超晶格中相互作用引起的对称性破缺，其中电子低能自由度位于 $M$ 点附近。基于一般对称性论证，我们对可能的候选不稳定性进行了识别和分类，这些不稳定性除了风味偏振态之外，还涉及各种间隔相干（IVC）阶。这种复杂性主要与三个谷的存在有关，而不是与两个谷的存在有关，例如在石墨烯中：IVC 状态可以通过不平凡的符号结构，甚至具有不同的大小，以相同的方式耦合所有三个谷。我们使用分析强耦合框架和应用于完整连续介质模型的无限制 Hartree-Fock 来研究能量学，两种方法之间具有很好的一致性。有趣的是，根据堆叠的不同，IVC 不稳定性不仅是由于中等带宽下的超交换而出现，而且还由于与平坦度量条件的偏差而深陷强耦合状态。\n\n我们的工作表明，扭曲的 $M$ 点材料为复杂的相关物理提供了丰富的游乐场，并强调了与扭曲的多层石墨烯的差异和相似之处。", "authors": [{"name": "Jeyong Park"}, {"name": "Laura Classen"}, {"name": "Mathias S. Scheurer"}], "featured_authors": [{"name": "Jeyong Park"}, {"name": "Laura Classen"}, {"name": "Mathias S. Scheurer"}], "author_count": 3}, {"id": "2606.16674", "category": "cond-mat", "title": "Possible high temperature superconductivity induced by coupling to proximate hyperbolic photon modes", "abstract": "The hyperbolic mode (HM) refers to a polariton mode in a polar insulator where the dielectric function is negative in some direction of propagation. Within a frequency window the light occupies a greatly expanded region in momentum space. The HM in hexagonal Boron Nitride (hBN) has been under intense study and we consider placing a metal directly on top hBN and ask whether its physical properties can be strongly affected. While the problem resembles superficially the electron phonon coupling problem, there are important differences. Due to the longitudinal nature of the HM mode the coupling is driven by time dependent charge fluctuations which results in a coupling that strongly increases with the energy difference of the initial and final states. We find a significant modification of the wavefunction and velocity renormalization and we identify the dimensionless coupling constant $\\lambda_0$ that controls this effect. The virtual exchange of HM leads to a repulsive interaction. However, due to its strong energy dependence, pairing is possible by a process analogous to the Anderson-Morel mechanism, but in energy space instead of frequency space. We estimate the effective pairing interaction and find that very high $T_c$ is possible, even for small $\\lambda_0$ where the theory is controlled. We provide estimates using realistic parameters.", "url": "https://arxiv.org/abs/2606.16674", "type": "理论", "summary": "双曲模式（HM）是指极性绝缘体中的极化子模式，其中介电函数在某些传播方向上为负。在频率窗口内，光在动量空间中占据了极大扩展的区域。六方氮化硼 (hBN) 中的 HM 一直在深入研究中，我们考虑将金属直接放置在 hBN 顶部，并询问其物理性能是否会受到强烈影响。虽然该问题表面上类似于电子声子耦合问题，但存在重要差异。由于 HM 模式的纵向性质，耦合是由时间相关的电荷波动驱动的，这导致耦合随着初始状态和最终状态的能量差而强烈增加。我们发现波函数和速度重整化的显着修改，并且我们确定了控制这种效应的无量纲耦合常数 $\\lambda_0$。 HM的虚拟交换导致了排斥相互作用。然而，由于其强烈的能量依赖性，可以通过类似于安德森-莫雷尔机制的过程进行配对，但在能量空间而不是频率空间中。\n\n我们估计了有效的配对相互作用，并发现非常高的 $T_c$ 是可能的，即使对于理论受控的小 $\\lambda_0$ 也是如此。我们使用实际参数提供估计。", "authors": [{"name": "Zhiyu Dong"}, {"name": "Patrick A. Lee"}], "featured_authors": [{"name": "Zhiyu Dong"}, {"name": "Patrick A. Lee"}], "author_count": 2}, {"id": "2606.16676", "category": "cond-mat", "title": "Optical vortex probe of loop-current chirality in moiré materials", "abstract": "We propose a symmetry-resolved optical probe of intrinsic loop-current chirality in moiré materials, with twisted bilayer graphene as a representative realization. Interlayer interference generates chiral electronic circulation on triangular plaquettes, giving rise to an intrinsic geometric chirality that enters the second-order response through a $C_3$-selected angular harmonic of the Berry curvature and can be isolated by the orbital-angular-momentum difference $\\Delta\\ell$ of interfering optical vortex beams. When moiré $C_3$ symmetry is preserved, the intrinsic contribution appears in the $\\Delta\\ell=3$ channel of the helicity-dependent dc photocurrent, whereas $C_3$-breaking perturbations activate additional channels. These results establish angular-momentum-resolved nonlinear optics as a route to probing geometric chirality in moiré and other symmetry-engineered quantum materials.", "url": "https://arxiv.org/abs/2606.16676", "type": "理论+数值", "summary": "我们提出了一种对称分辨光学探针，用于检测莫尔材料中的固有环路电流手性，以扭曲双层石墨烯作为代表性实现。层间干涉在三角形小板上产生手性电子循环，产生内在的几何手性，该几何手性通过贝里曲率的$C_3$选择的角谐波进入二阶响应，并且可以通过干涉光学涡旋光束的轨道角动量差$\\Delta\\ell$来隔离。当莫尔 $C_3$ 对称性被保留时，内在贡献出现在螺旋度相关直流光电流的 $\\Delta\\ell=3$ 通道中，而 $C_3$ 破坏扰动会激活其他通道。这些结果确立了角动量分辨非线性光学作为探测莫尔条纹和其他对称工程量子材料中几何手性的途径。", "authors": [{"name": "Nobuhiko Yokoshi"}, {"name": "Akihito Kato"}], "featured_authors": [{"name": "Nobuhiko Yokoshi"}, {"name": "Akihito Kato"}], "author_count": 2}, {"id": "2606.16702", "category": "cond-mat", "title": "Activated Migration of Localized Ligand-Field Excitons in Atomically Thin CrCl3", "abstract": "Two-dimensional crystals with densely packed atoms exhibit a range of emerging properties, particularly a wide variety of excitonic behaviors. Thickness-variable layered chromium trihalides with finite surface recombination sites provide an ideal system for understanding how excitons confined in octahedral ligand fields migrate on nanometer length scales, a regime that defies conventional transport probes. In this work, we demonstrate that Cr3+-derived photoluminescence in CrCl3 is spectrally thickness-independent, but its relaxation dynamics are strongly sensitive to thickness and temperature, thereby indicating significant activated migration. A diffusion-coupled surface recombination model reveals an effective out-of-plane diffusivity of 4.5 x 10-6 cm2/s for the ligand-field excitons and a diffusion activation energy of 130 meV. The latter is comparable to the reorganization energy independently estimated from optical Stokes shifts, suggesting that exciton transport is coupled to local lattice relaxation. Furthermore, we show that the relaxation dynamics can be systematically tuned by either enhancing or suppressing surface recombination through controlled surface reactions or encapsulation. This work not only reveals the nanoscopic transport of localized ligand-field excitons but also establishes a spectroscopic transport probe applicable to various 2D materials.", "url": "https://arxiv.org/abs/2606.16702", "type": "理论", "summary": "具有密集原子的二维晶体表现出一系列新兴特性，特别是各种各样的激子行为。具有有限表面复合位点的厚度可变的层状三卤化铬为理解八面体配体场中的激子如何在纳米长度尺度上迁移提供了一个理想的系统，这是传统传输探针无法企及的。在这项工作中，我们证明了 CrCl3 中 Cr3+ 衍生的光致发光与光谱厚度无关，但其弛豫动力学对厚度和温度非常敏感，从而表明显着的激活迁移。扩散耦合表面复合模型显示配体场激子的有效面外扩散率为 4.5 x 10-6 cm2/s，扩散激活能为 130 meV。后者与根据光学斯托克斯位移独立估计的重组能相当，表明激子传输与局部晶格弛豫耦合。\n\n此外，我们表明，可以通过受控表面反应或封装来增强或抑制表面复合，从而系统地调节弛豫动力学。这项工作不仅揭示了局域配体场激子的纳米级输运，而且建立了适用于各种二维材料的光谱输运探针。", "authors": [{"name": "Hyesun Kim"}, {"name": "Renlong Liu"}, {"name": "Sangho Yoon"}, {"name": "Hyunjong Lim"}, {"name": "Takashi Taniguchi"}, {"name": "Kenji Watanabe"}, {"name": "Jonghwan Kim"}, {"name": "Changgu Lee"}, {"name": "Sunmin Ryu"}], "featured_authors": [{"name": "Hyesun Kim"}, {"name": "Renlong Liu"}, {"name": "Sangho Yoon"}, {"name": "Jonghwan Kim"}, {"name": "Changgu Lee"}, {"name": "Sunmin Ryu"}], "author_count": 9}, {"id": "2606.16704", "category": "cond-mat", "title": "Field-selected seven-site topological magnons in a classical frustrated triangular-lattice K-$Γ$-$Γ'$ magnet", "abstract": "Defining magnon topology in strongly frustrated magnets is often hindered by the absence of a simple harmonic magnon vacuum at zero field. Within a classical-spin ground-state search followed by linear spin-wave theory (LSWT), we demonstrate that a representative triangular-lattice K-Gamma-Gamma' model in a dominant-Gamma exchange regime has an in-plane-field-selected compact, noncoplanar seven-site order. This field-selected state provides a controlled classical reference state and hosts magnon bands with field-tunable Chern numbers. Increasing the field drives a Dirac-like band touching that transfers Berry curvature between the fifth and sixth bands, altering the Chern vector from (0, 1, 0, -2, 1, 0, 0) to (0, 1, 0, -2, -1, 2, 0). This topological transition reorganizes the band-resolved thermal Hall conductivity, driving the total $\\kappa_{xy}(T)$ through a near-zero crossing once the upper bands are thermally populated. The dynamical structure factor places roughly half of the coherent spectral weight on the Chern-active branches, offering a spectroscopic route to identify the topological branches. These results define a controlled semiclassical benchmark for magnon topology in this pure nearest-neighbor exchange model.", "url": "https://arxiv.org/abs/2606.16704", "type": "理论+数值", "summary": "在强受抑磁体中定义磁振子拓扑结构通常会因零场处简谐振动磁振子真空的缺失而受到阻碍。在线性自旋波理论（LSWT）之后的经典自旋基态搜索中，我们证明了占主导地位的伽玛交换体系中的代表性三角晶格K-Gamma-Gamma'模型具有面内场选择的紧凑、非共面七位点顺序。这种场选择状态提供了受控的经典参考状态，并承载具有场可调陈数的磁振子带。增加场会驱动类似狄拉克的带接触，从而在第五和第六带之间转移贝里曲率，将陈矢量从 (0, 1, 0, -2, 1, 0, 0) 更改为 (0, 1, 0, -2, -1, 2, 0)。这种拓扑转变重新组织了能带分辨的热霍尔电导率，一旦上能带热填充，就会驱动总 $\\kappa_{xy}(T)$ 通过接近零的交叉。动态结构因子将大约一半的相干光谱权重放在陈活跃分支上，提供了识别拓扑分支的光谱路线。\n\n这些结果定义了这个纯最近邻交换模型中磁振子拓扑的受控半经典基准。", "authors": [{"name": "Bin Xi"}, {"name": "Jie Lu"}, {"name": "Shun-Li Yu"}, {"name": "Yafang Xu"}], "featured_authors": [{"name": "Bin Xi"}, {"name": "Jie Lu"}, {"name": "Shun-Li Yu"}, {"name": "Yafang Xu"}], "author_count": 4}, {"id": "2606.16752", "category": "cond-mat", "title": "Refining Unified Colored-Noise Approximation", "abstract": "Countless biological and physical systems experience fluctuations that exhibit non-trivial temporal correlations. The Unified Colored-Noise Approximation (UCNA) is a framework providing an approximate description of such stochastic dynamics with colored noise, valid in the limits of vanishing and infinite correlation time of the noise. We first pinpoint and address some criticalities in its original derivation, recasting the result through a time-scale separation procedure. By using our approach, we derive the next-to-leading order correction to the dynamics in both limiting regimes, and highlight the relevant physical scalings of these approximations. Our result helps frame the limits of validity of both the original and the refined formulas, especially in comparison with those derived through different approximation procedures. We show our findings in two paradigmatic examples, a quartic potential and a stochastic logistic growth with multiplicative noise.", "url": "https://arxiv.org/abs/2606.16752", "type": "理论", "summary": "无数的生物和物理系统都经历着表现出不平凡的时间相关性的波动。统一有色噪声近似（UCNA）是一个框架，提供了这种带有有色噪声的随机动力学的近似描述，在噪声消失和无限相关时间的限制下有效。我们首先查明并解决其原始推导中的一些关键问题，通过时间尺度分离程序重新构建结果。通过使用我们的方法，我们得出了两个限制状态下动力学的次领先阶修正，并强调了这些近似值的相关物理尺度。我们的结果有助于确定原始公式和改进公式的有效性限制，特别是与通过不同近似程序得出的公式进行比较。我们通过两个典型示例展示了我们的发现，即四次势和带有乘性噪声的随机逻辑增长。", "authors": [{"name": "Alessandro Corso"}, {"name": "Daniel M. Busiello"}], "featured_authors": [{"name": "Alessandro Corso"}, {"name": "Daniel M. Busiello"}], "author_count": 2}, {"id": "2606.16791", "category": "cond-mat", "title": "Riviera model with egoistical settlers", "abstract": "The Riviera model mimics a densifying settlement along the coastline. In the lattice version, houses are built sequentially in empty sites with the constraint that every newly built house has at least one empty neighboring site. The distribution of clusters of adjacent houses does not obey a closed set of evolutionary equations, but the void-cluster-void distribution does. We compute the latter and extract the cluster distribution from it. In the jammed state, when all voids have length one and the evolution ceases, the cluster distribution has a neat form and exhibits a factorial decay with the length of the cluster. To investigate finite systems, we employ a static approach directly treating jammed states. If the coastline is a finite segment, we determine the statistics of the number of empty sites in the jammed state (the average, variance, and higher cumulants). We also study a continuum version in which houses are built along the line so that each newly built house is sufficiently separated from at least one neighboring house.", "url": "https://arxiv.org/abs/2606.16791", "type": "理论", "summary": "里维埃拉模型模仿了沿着海岸线的密集定居点。在格子版本中，房屋是在空地上顺序建造的，限制是每栋新建房屋至少有一个空的相邻场地。相邻房屋簇的分布不服从一组封闭的演化方程，但空-簇-空分布却服从。我们计算后者并从中提取聚类分布。在堵塞状态下，当所有空隙的长度为一且演化停止时，簇分布具有整齐的形式，并随着簇的长度呈现阶乘衰减。为了研究有限系统，我们采用静态方法直接处理堵塞状态。如果海岸线是有限段，我们确定堵塞状态下的空站点数量的统计数据（平均值、方差和较高累积量）。我们还研究了一种连续体版本，其中房屋沿线建造，以便每栋新建房屋与至少一栋相邻房屋充分分开。", "authors": [{"name": "P. L. Krapivsky"}], "featured_authors": [{"name": "P. L. Krapivsky"}], "author_count": 1}, {"id": "2606.16812", "category": "cond-mat", "title": "Data-Driven Micromechanical Characterization and Mapping of Shale Rocks Using High Speed Nanoindentation", "abstract": "This study investigates the potential of high-speed nanoindentation in collaboration with data analytics and phase volume fractions to achieve micromechanical characterization of heterogeneous rocks. While micromechanical characterization can be performed using mechanical testing alone, integrating chemical analysis-such as elemental mapping techniques-provides essential phase identification. This enables more accurate interpretation of phase-specific mechanical properties. However, incorporating chemical analysis increases the complexity of the process. Hence, this study proposes data-driven micromechanical characterization and mapping of heterogeneous rocks based primarily on mechanical data and limited dependence on chemical analysis. In this study, Mancos shale rock is analyzed using high-speed nanoindentation to determine the mechanical properties at the microscale. Subsequently, a suite of unsupervised statistical learning techniques, such as Uniform Manifold Approximation and Projection (UMAP) with k-means Clustering, Gaussian Mixture Model (GMM), Dirichlet Process Mixture Model (DPMM), and Density-Based Spatial Clustering of Applications with Noise (DBSCAN), are applied to the nanoindentation data. Additionally, an automated image processing and segmentation technique was developed and tested. The results from each technique have been systematically compared against the conventional chemo-mechanical approach using two metrics: weighted error and spatial error. Based on the results, UMAP with k-means clustering is the most appropriate technique, while DBSCAN, DPMM, and image segmentation techniques are more suitable as secondary approaches. This study demonstrates the capability of high-speed nanoindentation combined with machine learning techniques for micromechanical characterization with reduced analytical complexity and improved workflow efficiency.", "url": "https://arxiv.org/abs/2606.16812", "type": "理论+数值", "summary": "这项研究探讨了高速纳米压痕与数据分析和相体积分数相结合的潜力，以实现非均质岩石的微观力学表征。虽然可以单独使用机械测试来进行微机械表征，但集成化学分析（例如元素映射技术）可以提供必要的相识别。这使得能够更准确地解释特定相的机械特性。然而，结合化学分析增加了过程的复杂性。因此，本研究提出主要基于机械数据和对化学分析的有限依赖的数据驱动的非均质岩石微观机械表征和绘图。在这项研究中，使用高速纳米压痕分析曼科斯页岩，以确定微观尺度的机械特性。\n\n随后，一系列无监督统计学习技术，例如带有 k 均值聚类的均匀流形逼近和投影 (UMAP)、高斯混合模型 (GMM)、狄利克雷过程混合模型 (DPMM) 和基于密度的噪声应用空间聚类 (DBSCAN)，被应用于纳米压痕数据。此外，还开发并测试了自动图像处理和分割技术。使用加权误差和空间误差这两个指标，将每种技术的结果与传统的化学机械方法进行系统比较。根据结果​​，采用 k 均值聚类的 UMAP 是最合适的技术，而 DBSCAN、DPMM 和图像分割技术更适合作为次要方法。这项研究展示了高速纳米压痕与机器学习技术相结合进行微机械表征的能力，同时降低了分析复杂性并提高了工作流程效率。", "authors": [{"name": "Shaziya Ahmed Banu"}, {"name": "Xukai Zhang"}, {"name": "Samah A. Mahgoub"}, {"name": "Christopher C. Walker"}, {"name": "George M. Pharr"}, {"name": "Arash Noshadravan"}, {"name": "Sara Abedi"}], "featured_authors": [{"name": "Shaziya Ahmed Banu"}, {"name": "Xukai Zhang"}, {"name": "Samah A. Mahgoub"}, {"name": "George M. Pharr"}, {"name": "Arash Noshadravan"}, {"name": "Sara Abedi"}], "author_count": 7}, {"id": "2606.16848", "category": "cond-mat", "title": "Exact solution of the Glauber-Ising model on the finite-length semi-open chain", "abstract": "The exact time-space correlation function of the $1D$ Glauber-Ising model, quenched to temperature $T=0$ and on a semi-open lattice of finite size $N$, is obtained. This also allows to deduce the exact empty-interval probability of the dual $1D$ coagulation-diffusion process on a periodic finite ring and to reproduce the long-time decay of the particle concentration. These results are consistent with the generic expectations of dynamical finite-size scaling theory.", "url": "https://arxiv.org/abs/2606.16848", "type": "理论+数值", "summary": "获得 $1D$ Glauber-Ising 模型的精确时空相关函数，淬火至温度 $T=0$，并在有限尺寸 $N$ 的半开晶格上。这还允许推导周期性有限环上双 $1D$ 凝结扩散过程的精确空区间概率，并重现粒子浓度的长时间衰减。这些结果与动态有限尺寸缩放理论的一般期望一致。", "authors": [{"name": "Malte Henkel"}], "featured_authors": [{"name": "Malte Henkel"}], "author_count": 1}, {"id": "2606.16884", "category": "cond-mat", "title": "Distinguishing between Direct and Parametric Driving in Nanomechanics Using a Vibrating Carbon Nanotube", "abstract": "Parametric driving is a powerful route to amplification and nonlinear control in nanomechanical resonators, but its signatures can be ambiguous because standard dc electrical readout does not directly reveal the frequency of motion. Here we resolve this ambiguity by measuring the motional frequency of a vibrating carbon nanotube independently of the drive frequency. We operate the nanotube as an electromechanical mixer and detect microwave sidebands using a low-noise superconducting amplifier. This frequency-resolved readout distinguishes direct motion of the first overtone from parametric motion of the fundamental, even when the corresponding drive frequencies nearly coincide. The two mechanisms are further separated by their drive-power dependence. Beyond conventional parametric resonance at $2f_0$, we observe responses to driving at $3f_0$ and $4f_0$, consistent with high-order parametric excitation associated with nonlinear stiffness terms.", "url": "https://arxiv.org/abs/2606.16884", "type": "数值", "summary": "参数驱动是纳米机械谐振器中放大和非线性控制的强大途径，但其特征可能不明确，因为标准直流电读数不能直接揭示运动频率。在这里，我们通过独立于驱动频率测量振动碳纳米管的运动频率来解决这个模糊性。我们将纳米管用作机电混频器，并使用低噪声超导放大器检测微波边带。即使相应的驱动频率几乎重合，这种频率分辨读数也能区分第一泛音的直接运动和基波的参量运动。这两种机制因其驱动功率依赖性而进一步分开。除了 $2f_0$ 处的传统参数共振之外，我们还观察到 $3f_0$ 和 $4f_0$ 处的驱动响应，这与与非线性刚度项相关的高阶参数激励一致。", "authors": [{"name": "Sam Dicker"}, {"name": "Patrick Steger"}, {"name": "Deepanjan Das"}, {"name": "Saba M. Khan"}, {"name": "Edward A. Laird"}], "featured_authors": [{"name": "Sam Dicker"}, {"name": "Patrick Steger"}, {"name": "Deepanjan Das"}, {"name": "Saba M. Khan"}, {"name": "Edward A. Laird"}], "author_count": 5}, {"id": "2606.16968", "category": "cond-mat", "title": "Electronic Green's function across the pseudogap to stripe transition in the $t$-$t'$-$J$ model", "abstract": "Superconducting domes in strongly correlated electronic systems are often accompanied by charge density waves and peculiar features in the electronic structure. The appearance of a pseudogap, in particular, and its relation to charge density waves remains insufficiently understood. Here, we investigate the electronic Green's function of the underdoped $t$-$t'$-$J$ model of the cuprate superconductors using tensor network algorithms for finite temperature dynamics on cylinders of width $4$. We find the prominent momentum differentiation, the hallmark of the pseudogap, to be strongly dependent on $t'$, which develops into a momentum-dependent opening of a gap upon decreasing temperature, consistent with the formation of a Fermi arc at intermediate temperatures. The nodal gap around ${\\bf k}=(\\pi/2,\\pi/2)$ closes and fills with increasing temperature as coherent stripe order melts into a regime of fluctuating charge clusters.", "url": "https://arxiv.org/abs/2606.16968", "type": "理论+数值", "summary": "强相关电子系统中的超导穹顶通常伴随着电荷密度波和电子结构的特殊特征。特别是赝能隙的出现及其与电荷密度波的关系仍然没有得到充分的了解。在这里，我们使用张量网络算法研究了铜酸盐超导体的欠掺杂 $t$-$t'$-$J$ 模型的电子格林函数，以实现宽度为 $4$ 的圆柱体上的有限温度动力学。我们发现显着的动量微分（赝能隙的标志）强烈依赖于$t'$，当温度降低时，它会发展成动量相关的能隙打开，与中间温度下费米弧的形成一致。随着相干条纹顺序融入波动电荷簇的状态，${\\bf k}=(\\pi/2,\\pi/2)$ 周围的节点间隙随着温度的升高而闭合并填充。", "authors": [{"name": "Martin Ulaga"}, {"name": "Aritra Sinha"}, {"name": "Alexander Wietek"}], "featured_authors": [{"name": "Martin Ulaga"}, {"name": "Aritra Sinha"}, {"name": "Alexander Wietek"}], "author_count": 3}, {"id": "2606.16998", "category": "cond-mat", "title": "Progress toward a better BOCS: Systematic coarse-graining with local density potentials", "abstract": "We describe version 5.0 of the Bottom-up Open-source Coarse-graining Software (BOCS) package. BOCS employs the force-matching variational principle to parameterize potentials for coarse-grained (CG) models directly from atomically detailed simulations. BOCS version 5.0 significantly extends previous versions by treating potentials that depend upon the local density (LD) around each particle, as well as potentials that depend upon the square gradient (SG) of this local density. We also describe a new package, PKG-BOCS, for simulating these potentials in LAMMPS. This software treats complex molecular topologies and provides considerable flexibility for defining the local density, as well as the LD and SG potentials. We present numerical calculations that provide physical insight into these potentials and demonstrate the accuracy of our implementation. Finally, we demonstrate that LD potentials can significantly improve the structural fidelity, thermodynamic properties, and transferability of CG models for water.", "url": "https://arxiv.org/abs/2606.16998", "type": "理论+数值", "summary": "我们描述了自下而上开源粗粒度软件 (BOCS) 包的 5.0 版。 BOCS 采用力匹配变分原理，直接从原子详细模拟中参数化粗粒度 (CG) 模型的势。 BOCS 5.0 版通过处理取决于每个粒子周围的局部密度 (LD) 的电势以及取决于该局部密度的平方梯度 (SG) 的电势，显着扩展了以前的版本。我们还描述了一个新的包 PKG-BOCS，用于在 LAMMPS 中模拟这些潜力。该软件可处理复杂的分子拓扑结构，并为定义局部密度以及 LD 和 SG 势提供相当大的灵活性。我们提出的数值计算可以提供对这些潜力的物理洞察，并证明我们实施的准确性。最后，我们证明 LD 势可以显着提高水的 CG 模型的结构保真度、热力学性质和可传递性。", "authors": [{"name": "Maria C. Lesniewski"}, {"name": "Michael R. DeLyser"}, {"name": "W. G. Noid"}], "featured_authors": [{"name": "Maria C. Lesniewski"}, {"name": "Michael R. DeLyser"}, {"name": "W. G. Noid"}], "author_count": 3}, {"id": "2606.17018", "category": "cond-mat", "title": "Distributed Acoustic Sensing for Urban Monitoring: Coverage Thresholds and Percolation", "abstract": "Distributed Acoustic Sensing (DAS) enables the repurposing of existing fiber-optic networks as ultra-dense, long-range seismic arrays for urban monitoring. However, constraints imposed by real-world fiber infrastructure topology and components limit its use for city-scale applications. Recent technological developments have paved the way for short-range, on-chip DAS. Assuming their availability, and based on a Graph Theory framework, we show that monitoring applications fall along a coverage spectrum with two critical thresholds that define three distinct regimes. Low coverage (<10%) can, with optimal design, resolve earthquake early warning, groundwater monitoring, geological mapping, and urban activity tracking. A percolation transition occurs at 51.6% coverage, beyond which the city effectively becomes fully covered and statistical traffic monitoring is possible. Only for effectively complete coverage, infrastructure monitoring, individual vehicle tracking, and pedestrian movement analysis become possible. Thus, privacy-related risks remain very low. We show and exemplify how, for metropolises around the world, an optimal sensing network can be designed for earthquake early warning, traffic monitoring, and urban activity tracking. This framework provides a near-future roadmap for deploying urban DAS networks as a backbone of smart city sensing.", "url": "https://arxiv.org/abs/2606.17018", "type": "理论", "summary": "分布式声学传感 (DAS) 可以将现有光纤网络重新利用为用于城市监测的超密集、远程地震阵列。然而，现实世界的光纤基础设施拓扑和组件所施加的限制限制了其在城市规模应用中的使用。最近的技术发展为短程片上 DAS 铺平了道路。假设它们可用，并基于图论框架，我们表明监控应用程序属于具有两个关键阈值的覆盖范围，这两个阈值定义了三种不同的机制。低覆盖率（<10%），通过优化设计，可以解决地震预警、地下水监测、地质测绘、城市活动跟踪等问题。渗透过渡发生在 51.6% 的覆盖率时，超过该覆盖率，城市实际上就完全覆盖了，并且可以进行统计交通监控。只有有效的全覆盖，基础设施监控、单车跟踪、行人运动分析才成为可能。因此，与隐私相关的风险仍然很低。\n\n我们展示并举例说明了如何为世界各地的大都市设计用于地震早期预警、交通监控和城市活动跟踪的最佳传感网络。该框架为部署城市 DAS 网络作为智能城市传感的支柱提供了近期的路线图。", "authors": [{"name": "Khen Cohen"}, {"name": "Ariel Lellouch"}], "featured_authors": [{"name": "Khen Cohen"}, {"name": "Ariel Lellouch"}], "author_count": 2}, {"id": "2606.17033", "category": "cond-mat", "title": "Milestoning Markov-jump dynamics: Stationary properties, thermodynamic consistency, kinetic hysteresis, and fluctuation symmetries", "abstract": "We derive an exact coarse graining of generic Markov-jump processes into observable semi-Markov dynamics. Exact results for waiting-time distributions for jumps between observable states are derived and proved that these decompose into conditionally independent dwell and transition times. Dwell times are proved to be a local property of mesostates - they depend on the initial but not final state. Conversely, transition-path times depend on both states, trigger kinetic hysteresis, and, under suitable conditions on the hidden sub-network, are shown to obey a reflection symmetry. We characterize the stationary properties of the milestoned dynamics, prove its thermodynamic consistency, and demonstrate robustness to milestone positioning. Surprisingly, even in the limit of a time-scale separation rendering the observed dynamics approximately Markovian, the effect of kinetic hysteresis on the dissipation persists. A minimal example shows how the results lay the foundation for inferring affinities of hidden dissipative cycles from observations of transition-path times.", "url": "https://arxiv.org/abs/2606.17033", "type": "理论", "summary": "我们将通用马尔可夫跳跃过程的精确粗粒度推导为可观察的半马尔可夫动力学。导出了可观察状态之间跳跃的等待时间分布的精确结果，并证明这些结果可分解为条件独立的驻留时间和转换时间。停留时间被证明是介态的局部属性——它们取决于初始状态而不是最终状态。相反，过渡路径时间取决于两种状态，触发动力学滞后，并且在隐藏子网络上的适当条件下，显示出服从反射对称性。我们描述了里程碑动力学的稳态特性，证明了其热力学一致性，并证明了里程碑定位的稳健性。令人惊讶的是，即使在时间尺度分离的限制下，观察到的动力学近似马尔可夫，动力学滞后对耗散的影响仍然存在。一个最小的例子展示了结果如何为根据过渡路径时间的观察推断隐藏耗散周期的亲和力奠定基础。", "authors": [{"name": "Tassilo Schwarz"}, {"name": "David Hartich"}, {"name": "Aljaž Godec"}], "featured_authors": [{"name": "Tassilo Schwarz"}, {"name": "David Hartich"}, {"name": "Aljaž Godec"}], "author_count": 3}, {"id": "2606.17045", "category": "cond-mat", "title": "Compact Spin-Charge Separated Neural Quantum States for Valence-Bond States", "abstract": "Neural-network quantum states (NQS) provide a flexible nonlinear representation of quantum many-body wavefunctions, but their efficiency depends sensitively on whether the architecture reflects the sign structure and constrained Hilbert space of the target state. In this work, we propose a solvable-point-guided strategy: design the architecture at an exactly solvable point where the correct local rules can be read off, then refine to the non-exact regime by enlarging only the kernel size and hidden dimension. The strategy is built from four physics-motivated designs: a stride-matched local-rule convolution, geometric pooling, a sign-resolving $\\tanh(x^{2k+1})$ activation, and explicit spin-hole sector separation. We test this approach on quasi-one-dimensional valence-bond-solid (VBS) states and their doped soliton variants (sVBS), the exact ground states of a $t$-$J$-like model with a single mobile hole. In finite-size benchmarks, this architecture reaches high fidelity for the exact sVBS state with substantially fewer parameters than generic fully connected, convolutional, and transformer baselines tested under the same setup. For the spin sector, the learned local rule transfers from small to larger systems without retraining. Away from the solvable point, increasing kernel size and hidden dimension systematically improves accuracy, and the model shows approximately $L^2$ parameter scaling in the gapless regime for system size $L$, compared with approximately $L^4$ for matrix-product states in the same regime. Our work establishes a recipe for compact NQS in sign-structured, constrained Hilbert spaces and paves the pathway to physics-informed architectures for the broader $t$-$J$ and Hubbard families.", "url": "https://arxiv.org/abs/2606.17045", "type": "理论", "summary": "神经网络量子态 (NQS) 提供了量子多体波函数的灵活非线性表示，但其效率敏感地取决于该体系结构是否反映目标态的符号结构和受限希尔伯特空间。在这项工作中，我们提出了一种可解点引导策略：在精确可解点设计架构，可以读取正确的局部规则，然后通过仅扩大内核大小和隐藏维度来细化到非精确机制。该策略基于四种物理驱动的设计：步长匹配的局部规则卷积、几何池、符号解析 $\\tanh(x^{2k+1})$ 激活和显式自旋孔扇区分离。我们在准一维价键固体 (VBS) 态及其掺杂孤子变体 (sVBS) 上测试了这种方法，这是具有单个移动空穴的 $t$-$J$ 类模型的精确基态。在有限大小的基准测试中，与在相同设置下测试的通用全连接、卷积和变压器基线相比，该架构使用的参数少得多，从而达到了精确 sVBS 状态的高保真度。\n\n对于纺织行业，学到的本地规则可以从小型系统转移到大型系统，而无需重新培训。远离可解点，增加内核大小和隐藏维度可以系统地提高准确性，并且该模型显示系统大小 $L$ 在无间隙状态下的参数缩放约为 $L^2$，而相同状态下矩阵乘积状态的参数缩放约为 $L^4$。我们的工作为符号结构、受限希尔伯特空间中的紧凑 NQS 建立了一个配方，并为更广泛的 $t$-$J$ 和 Hubbard 系列的物理信息架构铺平了道路。", "authors": [{"name": "Ang-Kun Wu"}, {"name": "Louis Primeau"}, {"name": "Yixin Zhang"}, {"name": "Jingtao Zhang"}, {"name": "Adrian Del Maestro"}, {"name": "Yang Zhang"}], "featured_authors": [{"name": "Ang-Kun Wu"}, {"name": "Louis Primeau"}, {"name": "Yixin Zhang"}, {"name": "Jingtao Zhang"}, {"name": "Adrian Del Maestro"}, {"name": "Yang Zhang"}], "author_count": 6}, {"id": "2606.14733", "category": "hep-th", "title": "O(N) BCFT: new data from conformal partial wave expansions", "abstract": "The $\\mathsf{O}(N)$ $\\mathsf{BCFT}$ is analyzed in the large $N$ expansion in a generic bulk dimension $2<d+1<4$. Focus is on boundary conditions corresponding to the ordinary transition, however techniques used can be generalized to special or extraordinary transitions. We study the system of bulk $2$-pt functions $\\langle \\phi\\phi\\rangle$, $\\langle \\phi^2 \\phi^2\\rangle$ and $\\langle \\sigma\\sigma \\rangle$, where $\\sigma$ is the Hubbard--Stratonovich field. They are expanded in bulk/boundary conformal partial waves. The coefficient functions of this expansion -- the spectral functions -- encode $\\mathsf{BCFT}$ data and determine bulk/boundary conformal block expansions. We prove conjectures about boundary spectral functions in Dujava et al. [ arXiv:2503.16345 ] and reproduce the bulk expansion of $\\langle \\phi\\phi \\rangle$ in Giombi et al. [ arXiv:2007.04955 ]. The bulk expansion of $\\langle\\sigma\\sigma\\rangle$ is new and allows to extract the leading large $N$ expression for an unknown OPE coefficient $C_{\\sigma\\sigma\\sigma^3}$ (the computation outputs as a byproduct also a mixing coefficient, which matches an existing result by Derkachov et al. [ arXiv:hep-th/9705020 ], providing further support for the main result). Besides these derived data infinitely many constraints are produced, though due to operator mixing growing in complexity as degeneracy increases, they cannot be disentangled without further input.", "url": "https://arxiv.org/abs/2606.14733", "type": "理论", "summary": "$\\mathsf{O}(N)$ $\\mathsf{BCFT}$ 在通用批量维度 $2<d+1<4$ 的大 $N$ 扩展中进行分析。重点是与普通转变相对应的边界条件，但是所使用的技术可以推广到特殊或异常转变。我们研究了散装 $2$-pt 函数 $\\langle \\phi\\phi\\rangle$、$\\langle \\phi^2 \\phi^2\\rangle$ 和 $\\langle \\sigma\\sigma \\rangle$ 的系统，其中 $\\sigma$ 是 Hubbard-Stratonovich 场。它们以体/边界共形分波形式展开。该扩展的系数函数（谱函数）对 $\\mathsf{BCFT}$ 数据进行编码并确定体/边界共形块扩展。我们证明了 Dujava 等人关于边界谱函数的猜想。 [ arXiv:2503.16345 ] 并重现 Giombi 等人中 $\\langle \\phi\\phi \\rangle$ 的批量扩展。 [arXiv:2007.04955]。 $\\langle\\sigma\\sigma\\rangle$ 的批量扩展是新的，允许提取未知 OPE 系数 $C_{\\sigma\\sigma\\sigma^3}$ 的前导大 $N$ 表达式（计算输出作为副产品也是一个混合系数，这与 Derkachov 等人的现有结果相匹配。\n\n[ arXiv:hep-th/9705020 ]，为主要结果提供进一步支持）。除了这些派生数据之外，还会产生无限多的约束，尽管由于算子混合随着简并性的增加而变得复杂，如果没有进一步的输入，它们就无法被解开。", "authors": [{"name": "Jozef Csipes"}, {"name": "Petr Vaško"}], "featured_authors": [{"name": "Jozef Csipes"}, {"name": "Petr Vaško"}], "author_count": 2}, {"id": "2606.14834", "category": "hep-th", "title": "Entropy Quantization and Quasi-normal Modes of Dyonic Kerr-Sen Black Holes", "abstract": "We explore the properties of inner and outer horizon thermodynamics of dyonic Kerr-Sen black hole (DKSBH). It is observed that the entropy (or area) product is universal, depending only on the angular momentum of the BH. We then proceed to study the dual conformal field theory~(CFT) in the Kerr/CFT correspondence using thermodynamic relations and compute the central charges from 2D CFT. The central charges are found to be universal with only angular momentum dependence. By comparing to Kerr-Newman BH, it is found that the essential difference is in the right-moving sector of the CFT. Interestingly, we can then explicitly produce the non-vanishing central charges related to its static solution, the dyonic dilaton BH, using the thermodynamic method. Moreover, from the CFT relations to multi-horizon thermodynamics, we find the analytical expression of the quasi-normal modes~(QNM) spectra in terms of BH parameters.", "url": "https://arxiv.org/abs/2606.14834", "type": "理论", "summary": "我们探索了动力克尔森黑洞（DKSBH）的内外视界热力学性质。据观察，熵（或面积）乘积是通用的，仅取决于 BH 的角动量。然后，我们继续使用热力学关系研究 Kerr/CFT 对应中的双共形场论 (CFT)，并根据 2D CFT 计算中心电荷。发现中心电荷是普遍存在的，仅与角动量相关。通过与Kerr-Newman BH比较，发现本质区别在于CFT的右移扇区。有趣的是，我们可以使用热力学方法明确地产生与其静态解（动态膨胀 BH）相关的非消失中心电荷。此外，从CFT关系到多视野热力学，我们找到了准正规模~(QNM)谱的BH参数的解析表达式。", "authors": [{"name": "Muhammad Fitrah Alfian Rangga Sakti"}, {"name": "Piyabut Burikham"}], "featured_authors": [{"name": "Muhammad Fitrah Alfian Rangga Sakti"}, {"name": "Piyabut Burikham"}], "author_count": 2}, {"id": "2606.15119", "category": "hep-th", "title": "Stability analysis of de Sitter solution in the Einstein-Grisaru-Zanon gravity using the dynamical system method", "abstract": "In this paper, we would like to investigate the stability of de Sitter solution in the Einstein-Grisaru-Zanon gravity, which is a novel fourth-order gravity model considered recently in a paper [Phys. Lett. B {\\bf 855} (2024) 138811]. As a result, we are able to derive the corresponding field equations for the Einstein-Grisaru-Zanon gravity by using an effective method based on the Euler-Lagrange equations. Unfortu
