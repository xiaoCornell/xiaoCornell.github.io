mary": "收集信息并据此采取行动的能力是每个学习代理的核心。但是量子力学对智能体感知外部输入并将其转化为行动的能力有何影响？在这里，我们解决了量子尺度学习机构原型任务的问题：根据单个原子收集的信息旋转单个自旋。我们确定了该任务的最终性能限制，揭示了传感阶段的纠缠和行动阶段的相干性之间的基本权衡：如果单原子传感器不与充当代理内部存储器的量子系统纠缠，那么最佳学习策略需要将量子信息从传感器连贯地传输到控制代理行为的系统。相反，如果传感器最初与代理的记忆纠缠在一起，那么就不再需要量子信息的传输。我们的结果表明，传感器的量子特性从根本上影响将外部刺激转化为动作的最佳方式，揭示了量子传感与量子代理行为之间的联系。", "authors": [{"name": "Yin Mo"}, {"name": "Emilio Bagan"}, {"name": "Giulio Chiribella"}], "featured_authors": [{"name": "Yin Mo"}, {"name": "Emilio Bagan"}, {"name": "Giulio Chiribella"}], "author_count": 3}, {"id": "2606.15083", "category": "quant-ph", "title": "REGRID-QAOA: A Resource-Efficient Graph-Reduced Hybrid QAOA Framework for Physics-Constrained Power System Islanding", "abstract": "Quantum computing has rapidly emerged as a powerful paradigm for tackling computationally demanding problems. In particular, quantum optimization shows strong promise for hard combinatorial problems in power systems, where increasing distributed energy penetration heightens the need for intentional islanding to maintain grid reliability and resilience. However, power system islanding is an NP-hard combinatorial optimization problem that becomes computationally prohibitive for classical solvers as network size grows, motivating the use of quantum computing as a promising alternative pipeline. This study develops a resource-efficient hybrid QAOA islanding framework that brings physics-constrained power-system partitioning into the quantum optimization workflow. The framework combines coherency-informed graph reduction, physics-aware constraint modeling, and structured post-processing to efficiently convert shallow-circuit QAOA samples into high-quality feasible islanding decisions without deep circuits or large shot budgets. The proposed framework is validated on the standard IEEE benchmark systems (9-, 14-, 24-, 30-, 39-, and 57-bus), demonstrating that the hybrid workflow achieves Gurobi-optimal solution quality with a clear quantum resource advantage over vanilla QAOA, while the resulting islanding solutions satisfy all physical feasibility requirements after network separation. This study establishes QAOA-based islanding as a viable quantum approach for critical infrastructure, with structured post-processing as the key enabler of quantum resource efficiency.", "url": "https://arxiv.org/abs/2606.15083", "type": "理论+数值", "summary": "量子计算已迅速成为解决计算要求高的问题的强大范例。特别是，量子优化在解决电力系统中的硬组合问题方面显示出强大的前景，其中分布式能源渗透率的提高提高了对有意孤岛以维持电网可靠性和弹性的需求。然而，电力系统孤岛是一个 NP 难组合优化问题，随着网络规模的增长，经典求解器在计算上变得难以承受，从而促使使用量子计算作为一种有前途的替代管道。本研究开发了一种资源高效的混合 QAOA 孤岛框架，将物理约束的电力系统划分引入量子优化工作流程。该框架结合了相干性图缩减、物理感知约束建模和结构化后处理，可有效地将浅电路 QAOA 样本转换为高质量可行的孤岛决策，而无需深电路或大量镜头预算。\n\n所提出的框架在标准 IEEE 基准系统（9、14、24、30、39 和 57 总线）上进行了验证，证明混合工作流程实现了 Gurobi 最优解决方案质量，与普通 QAOA 相比具有明显的量子资源优势，而所得的孤岛解决方案满足网络分离后的所有物理可行性要求。这项研究将基于 QAOA 的孤岛效应确立为关键基础设施的可行量子方法，并将结构化后处理作为量子资源效率的关键推动者。", "authors": [{"name": "Yuqi Jiang"}, {"name": "Yuqi Zhang"}, {"name": "Zhiding Liang"}, {"name": "Qiang Guan"}, {"name": "Yan Li"}, {"name": "Ganesh Kumar Venayagamoorthy"}], "featured_authors": [{"name": "Yuqi Jiang"}, {"name": "Yuqi Zhang"}, {"name": "Zhiding Liang"}, {"name": "Qiang Guan"}, {"name": "Yan Li"}, {"name": "Ganesh Kumar Venayagamoorthy"}], "author_count": 6}, {"id": "2606.15108", "category": "quant-ph", "title": "Temporal modulation as a resource: enhanced frequency estimation in continuous variable systems", "abstract": "Frequency estimation, a cornerstone of quantum metrology, has been significantly enhanced by advanced quantum sensing strategies. However, most protocols rely either on static or time-independent encoding mechanisms, inherently limiting their achievable precision scaling, or on control strategies requiring changing the Hamiltonian and/or implementing feedback mechanisms. To overcome this, we investigate a simpler dynamical encoding protocol where the quantum oscillator is driven by a general continuous temporal frequency modulation $\\Omega(t) = \\omega_0 f(t)$. We analytically demonstrate that for a given modulation profile $f(t)$ and its corresponding time-integral $F(t)$, the quantum Fisher information (QFI) scales as $\\mathcal{O}(F(t)^2)$. This enhancement stems from the fact that temporal encoding fundamentally alters the mechanism of dynamical phase accumulation. Crucially, when evaluated under the energy and evolution-time constraints, this framework reveals a genuine precision enhancement over the conventional time-independent baseline. By analyzing explicit polynomial and exponential modulations, we establish that arbitrary precision scaling can be deterministically engineered, with ultimate bounds that are asymptotically saturable via optimal homodyne detection. Our framework provides a universal paradigm for exploiting time-dependent quantum control in next-generation sensors.", "url": "https://arxiv.org/abs/2606.15108", "type": "理论+数值", "summary": "频率估计是量子计量学的基石，先进的量子传感策略已显着增强频率估计。然而，大多数协议要么依赖于静态或与时间无关的编码机制，本质上限制了它们可实现的精度缩放，要么依赖于需要改变哈密顿量和/或实现反馈机制的控制策略。为了克服这个问题，我们研究了一种更简单的动态编码协议，其中量子振荡器由通用连续时间频率调制 $\\Omega(t) = \\omega_0 f(t)$ 驱动。我们分析证明，对于给定的调制配置文件 $f(t)$ 及其相应的时间积分 $F(t)$，量子费希尔信息 (QFI) 缩放为 $\\mathcal{O}(F(t)^2)$。这种增强源于这样一个事实：时间编码从根本上改变了动态相位积累的机制。至关重要的是，当在能量和演化时间约束下进行评估时，该框架显示出相对于传统的与时间无关的基线的真正精度增强。\n\n通过分析显式多项式和指数调制，我们确定可以确定性地设计任意精度缩放，并通过最佳零差检测使最终界限渐近饱和。我们的框架为利用下一代传感器中的时间相关量子控制提供了一个通用范例。", "authors": [{"name": "Ningxin Kong"}, {"name": "Qiongyi He"}, {"name": "Matteo G. A. Paris"}], "featured_authors": [{"name": "Ningxin Kong"}, {"name": "Qiongyi He"}, {"name": "Matteo G. A. Paris"}], "author_count": 3}, {"id": "2606.15113", "category": "quant-ph", "title": "Optimal Toffoli-Depth Multi-Controlled Toffoli Decomposition in 2D Qubit Layout", "abstract": "The multi-controlled Toffoli (MCT) gate is a key primitive in quantum arithmetic, oracle construction, and quantum cryptanalysis. Although recent work has established optimal Toffoli-depth MCT decompositions under all-to-all qubit connectivity, their realization on near-term quantum hardware with restricted qubit connectivity remains largely unexplored. While general-purpose quantum mappers can route arbitrary circuits, they do not explicitly exploit the repeated interaction patterns inherent in MCT decompositions. In our present paper, we study architecture-aware mappings of optimal Toffoli-depth MCT decompositions onto restricted two-dimensional qubit layouts. We begin with a structured geometric placements that preserve the parallelism of state-of-the-art Toffoli and MCT decompositions with no additional depth overhead. We further introduce a motif-based packing framework in which decomposition layers are represented by interaction motifs derived from basic Toffoli gates. By embedding these motifs vertex-disjointly into hardware graphs, we characterize the minimum-size topologies supporting the required qubit resources and derive explicit bounds on the resulting depth overhead under tight qubit budgets. Finally, we compare these bounds with routing-aware placement heuristics and empirically evaluate the effectiveness of embedding different motifs across a range of hardware topologies.", "url": "https://arxiv.org/abs/2606.15113", "type": "理论+数值", "summary": "多控托夫利 (MCT) 门是量子算术、预言构建和量子密码分析中的关键原语。尽管最近的工作已经在所有量子位连接下建立了最佳的 Toffoli 深度 MCT 分解，但它们在具有受限量子位连接的近期量子硬件上的实现仍然很大程度上未被探索。虽然通用量子映射器可以路由任意电路，但它们没有明确利用 MCT 分解中固有的重复交互模式。在我们目前的论文中，我们研究了最佳 Toffoli 深度 MCT 分解到受限二维量子位布局的架构感知映射。我们从结构化的几何布局开始，它保留了最先进的 Toffoli 和 MCT 分解的并行性，而没有额外的深度开销。我们进一步介绍了一种基于主题的打包框架，其中分解层由源自基本 Toffoli 门的交互主题表示。\n\n通过将这些主题以顶点不相交的方式嵌入到硬件图中，我们描述了支持所需量子位资源的最小尺寸拓扑，并在紧张的量子位预算下得出了最终深度开销的明确界限。最后，我们将这些边界与路由感知布局启发式进行比较，并根据经验评估在一系列硬件拓扑中嵌入不同主题的有效性。", "authors": [{"name": "Anik Basu Bhaumik"}, {"name": "Suman Dutta"}, {"name": "Anupam Chattopadhyay"}], "featured_authors": [{"name": "Anik Basu Bhaumik"}, {"name": "Suman Dutta"}, {"name": "Anupam Chattopadhyay"}], "author_count": 3}, {"id": "2606.15190", "category": "quant-ph", "title": "Lattice surgery for near-term experimental logical qubit entanglement creation in planar architectures", "abstract": "In the era of early fault-tolerant quantum computing, basic demonstrations of entanglement operations between a few logical qubits are at the frontier of recent developments in quantum computing. In this work, we describe in detail, at both the logical and physical qubit levels, a logical teleportation protocol between two surface code logical qubits based on lattice surgery. We address several aspects of the teleportation protocol pertinent to superconducting qubit architectures. We explore the modularity constraints in the number and location of stabilizer readouts and compare variants of the teleportation protocol in this regard. Additionally, we investigate potential performance improvements related to in-sequence decision logic and the optimal size of the interface region between two surface code patches on a superconducting chip. Based on our simulations, we show possible near-term improvements in lattice surgery protocols that facilitate fault-tolerant quantum computing in superconducting circuit architectures.", "url": "https://arxiv.org/abs/2606.15190", "type": "实验", "summary": "在早期容错量子计算时代，几个逻辑量子位之间纠缠操作的基本演示处于量子计算最新发展的前沿。在这项工作中，我们在逻辑和物理量子位层面上详细描述了基于晶格手术的两个表面代码逻辑量子位之间的逻辑隐形传态协议。我们讨论了与超导量子位架构相关的隐形传态协议的几个方面。我们探讨了稳定器读数的数量和位置的模块化限制，并比较了这方面的隐形传输协议的变体。此外，我们还研究了与顺序决策逻辑相关的潜在性能改进以及超导芯片上两个表面代码补丁之间的接口区域的最佳尺寸。根据我们的模拟，我们展示了晶格手术协议的近期可能的改进，以促进超导电路架构中的容错量子计算。", "authors": [{"name": "Lukas Bödeker"}, {"name": "Áron Márton"}, {"name": "Luis Colmenarez"}, {"name": "Ilya Besedin"}, {"name": "Andreas Wallraff"}, {"name": "Markus Müller"}], "featured_authors": [{"name": "Lukas Bödeker"}, {"name": "Áron Márton"}, {"name": "Luis Colmenarez"}, {"name": "Ilya Besedin"}, {"name": "Andreas Wallraff"}, {"name": "Markus Müller"}], "author_count": 6}, {"id": "2606.15213", "category": "quant-ph", "title": "Quantum-classical hybrid models based on error correction for time series forecasting", "abstract": "Time series forecasting largely benefits from combining the strengths of different models, especially using a scheme where a model corrects another model by capturing supplementary patterns from forecasting errors. Concurrently, quantum models are providing a means to augment the classical capacity, including in time series forecasting, by acting alongside classical models in hybrid architectures. In this work, we propose the first forecasting system based on error correction that jointly uses quantum and classical models. Here, quantum models first extract patterns by exploring quantum phenomena, and classical models capture the remaining patterns from the quantum errors. Compared to classical single models and classical-classical hybrid models based on error correction, the complementary capacity that emerges from this quantum-classical system provided the best results in most of the addressed problems. Therefore, this work paves the way to introduce quantum models in established hybridization schemes for time series forecasting.", "url": "https://arxiv.org/abs/2606.15213", "type": "理论", "summary": "时间序列预测在很大程度上受益于结合不同模型的优势，特别是使用一个模型通过捕获预测误差的补充模式来纠正另一个模型的方案。同时，量子模型通过与混合架构中的经典模型一起作用，提供了一种增强经典能力的方法，包括时间序列预测。在这项工作中，我们提出了第一个基于误差校正的预测系统，联合使用量子和经典模型。在这里，量子模型首先通过探索量子现象来提取模式，而经典模型则从量子误差中捕获剩余的模式。与基于纠错的经典单一模型和经典-经典混合模型相比，该量子-经典系统产生的互补能力在大多数已解决的问题中提供了最佳结果。因此，这项工作为在已建立的时间序列预测混合方案中引入量子模型铺平了道路。", "authors": [{"name": "Jonathan H. A. de Carvalho"}, {"name": "Filipe C. de L. Duarte"}, {"name": "Fernando M. de Paula Neto"}, {"name": "Paulo S. G. de Mattos Neto"}], "featured_authors": [{"name": "Jonathan H. A. de Carvalho"}, {"name": "Filipe C. de L. Duarte"}, {"name": "Fernando M. de Paula Neto"}, {"name": "Paulo S. G. de Mattos Neto"}], "author_count": 4}, {"id": "2606.15303", "category": "quant-ph", "title": "Inverted Dirac oscillator", "abstract": "The Dirac oscillator is obtained from the Dirac Hamiltonian $H^{\\mathrm{D}} = \\left( c\\vec{\\alpha}\\cdot \\vec{p} + mc^{2}\\beta \\right)$ by modifying the momentum through a non-Hermitian substitution $\\overrightarrow{p} \\rightarrow \\overrightarrow{p} \\pm i\\omega \\beta \\overrightarrow{q}$. Despite the non-Hermitian nature of this momentum operator, the full Hamiltonian remains Hermitian due to the presence of the Dirac matrix $\\vec{\\alpha}$. However, if one instead introduces a Hermitian modification of the form $\\vec{p} \\rightarrow \\vec{p} \\pm \\omega \\beta \\overrightarrow{q}$, the resulting Hamiltonian is no longer Hermitian. In this case, the system corresponds to an inverted Dirac oscillator $H^{\\mathrm{r}}$, where the potential becomes unbounded from below, the energy spectrum becomes continuous, and the eigenfunctions fail to be square-integrable, leading to normalization difficulties. We show that the Hamiltonian $H^{\\mathrm{r}}$ is a pseudo-$\\mathcal{PT}$-symmetric operator, and we introduce an unbounded, non-unitary transformation that establishes a connection between $H^{\\mathrm{r}}$ and $H^{\\mathrm{D}}$. The purpose of this work is to analyze this relativistic quantum system -- known as the Dirac inverted oscillator -- which, despite its various applications, admits an exact analytical solution", "url": "https://arxiv.org/abs/2606.15303", "type": "理论", "summary": "狄拉克振子由狄拉克哈密顿量 $H^{\\mathrm{D}} = \\left( c\\vec{\\alpha}\\cdot \\vec{p} + mc^{2}\\beta \\right)$ 获得，通过非厄米代换 $\\overrightarrow{p} \\rightarrow \\overrightarrow{p} \\pm i\\omega \\beta \\overrightarrow{q}$ 修改动量。尽管该动量算子具有非厄米性质，但由于狄拉克矩阵 $\\vec{\\alpha}$ 的存在，完整的哈密顿量仍然是厄米性质。然而，如果引入 $\\vec{p} \\rightarrow \\vec{p} \\pm \\omega \\beta \\overrightarrow{q}$ 形式的埃尔米特修正，则生成的哈密顿量不再是埃尔米特式。在这种情况下，系统相当于一个倒置的狄拉克振子$H^{\\mathrm{r}}$，其中势从下方变得无界，能谱变得连续，并且特征函数无法平方可积，导致归一化困难。我们证明哈密顿量 $H^{\\mathrm{r}}$ 是一个伪 $\\mathcal{PT}$ 对称算子，并且我们引入了无界、非酉变换，在 $H^{\\mathrm{r}}$ 和 $H^{\\mathrm{D}}$ 之间建立联系。\n\n这项工作的目的是分析这个相对论量子系统——称为狄拉克倒置振荡器——尽管它有各种应用，但它承认一个精确的解析解", "authors": [{"name": "Mustapha Maamache"}], "featured_authors": [{"name": "Mustapha Maamache"}], "author_count": 1}, {"id": "2606.15398", "category": "quant-ph", "title": "Watching a Superconducting Coplanar Waveguide Heat Up with a Single Color Center", "abstract": "Single color centers in diamond offer a local probe of their cryogenic environment, providing a direct way to quantify heating in spin-control hardware. Here, we establish a single spectrally stable tin-vacancy (SnV) center as an on-chip thermometer for a diamond membrane and use it to characterize microwave- and radio-frequency-induced heating in a superconducting coplanar waveguide patterned on the same chip. We first calibrate the temperature dependence of the optical C-transition frequency and linewidth from $20\\,\\mathrm{K}$ down to the few-kelvin regime. At lower temperatures, where the optical response becomes weakly temperature dependent, we use the spin-lattice relaxation time $T_1$ as a complementary thermometer and tune its sensitivity with the transverse magnetic-field component. Applying this local thermometer to a niobium coplanar waveguide, we observe magnetic-field-dependent superconducting breakdown under GHz drive, accompanied by abrupt heating of the diamond. In contrast, at $20\\,\\mathrm{MHz}$ and $400\\,\\mathrm{mT}$, relevant for nuclear-spin control, we detect no measurable heating up to the breakdown threshold of $9.4\\,\\mathrm{dBm}$, corresponding to $B_\\mathrm{ac}\\sim1.2\\,\\mathrm{mT}$. These results define a safe operating window for superconducting microwave and RF control structures in diamond-based quantum nodes.", "url": "https://arxiv.org/abs/2606.15398", "type": "理论", "summary": "金刚石中的单色中心提供了对其低温环境的局部探测，从而提供了量化自旋控制硬件中的加热的直接方法。在这里，我们建立了一个光谱稳定的锡空位（SnV）中心作为金刚石膜的片上温度计，并用它来表征同一芯片上图案化的超导共面波导中的微波和射频感应加热。我们首先将光学 C 跃迁频率和线宽的温度依赖性从 $20\\,\\mathrm{K}$ 校准到几开尔文范围。在较低温度下，光学响应变得与温度无关，我们使用自旋晶格弛豫时间 $T_1$ 作为补充温度计，并通过横向磁场分量调整其灵敏度。将这种局部温度计应用于铌共面波导，我们观察到在 GHz 驱动下磁场相关的超导击穿，并伴随着金刚石的突然加热。\n\n相比之下，在与核自旋控制相关的$20\\,\\mathrm{MHz}$和$400\\,\\mathrm{mT}$处，我们没有检测到可测量的加热达到$9.4\\,\\mathrm{dBm}$的击穿阈值，对应于$B_\\mathrm{ac}\\sim1.2\\,\\mathrm{mT}$。这些结果为基于金刚石的量子节点中的超导微波和射频控制结构定义了一个安全操作窗口。", "authors": [{"name": "Ioannis Karapatzakis"}, {"name": "Jeremias Resch"}, {"name": "David Hunger"}, {"name": "Wolfgang Wernsdorfer"}], "featured_authors": [{"name": "Ioannis Karapatzakis"}, {"name": "Jeremias Resch"}, {"name": "David Hunger"}, {"name": "Wolfgang Wernsdorfer"}], "author_count": 4}, {"id": "2606.15421", "category": "quant-ph", "title": "Scheme for Transport-based Global Entanglement Distribution using Quantum Processors", "abstract": "We propose a scheme for distributing entanglement over global distances in a heralded manner by using satellites to physically transport entangled processor nodes with rare-earth-ion qubits. A full analysis of channel losses, errors and background light is performed to determine the fidelity and number of entangled pairs that can be distributed between two ground stations. We show that the scheme works already with a single satellite and can distribute close to the theoretical maximum number of entangled pairs that can be generated in a satellite overpass. In addition, we argue that in theory transportation-based schemes outperform other satellite-based schemes and can be scaled up to a constellation without additional channel losses. Daytime operation seems feasible as long as the sky is clear, with an EPR pair fidelity ranging from 99.3% at shorter network lengths to 93.9% with global coverage and can be further improved by active error correction or entanglement purification.", "url": "https://arxiv.org/abs/2606.15421", "type": "理论", "summary": "我们提出了一种方案，通过使用卫星以物理方式传输具有稀土离子量子位的纠缠处理器节点，以一种预示的方式在全球距离上分布纠缠。对信道损耗、误差和背景光进行全面分析，以确定两个地面站之间可以分布的纠缠对的保真度和数量。我们证明该方案已经适用于单个卫星，并且可以分布接近在卫星立交桥中生成的纠缠对的理论最大数量。此外，我们认为理论上基于运输的方案优于其他基于卫星的方案，并且可以扩展到星座而不会产生额外的信道损耗。只要天空晴朗，白天操作似乎是可行的，EPR 对保真度范围从较短网络长度的 99.3% 到全球覆盖的 93.9%，并且可以通过主动纠错或纠缠净化进一步提高。", "authors": [{"name": "Erik Lundblad"}, {"name": "Mira Abu Yahia"}, {"name": "Antonius Johannes Renders"}, {"name": "Andreas Walther"}, {"name": "Adam Kinos"}, {"name": "Lars Rippe"}], "featured_authors": [{"name": "Erik Lundblad"}, {"name": "Mira Abu Yahia"}, {"name": "Antonius Johannes Renders"}, {"name": "Andreas Walther"}, {"name": "Adam Kinos"}, {"name": "Lars Rippe"}], "author_count": 6}, {"id": "2606.15481", "category": "quant-ph", "title": "Connecting entanglement growth with local integrals of motion in the disordered Fermi-Hubbard model", "abstract": "Generically a quantum system initialized in an unentangled state will, under unitary dynamics, rapidly become entangled, a process closely related to information transport and to thermalization. Disorder can suppress the growth of entanglement and result in memory of initial conditions. In non-interacting systems this arises from localization of single-particle states, the occupancy of which is fixed by the initial condition. In interacting systems similar localized conserved quantities persist, but with the added feature that they are coupled, resulting in entanglement growth which is distinct from both non-interacting localized systems and from generic ergodic systems. The Fermi-Hubbard model has two degrees of freedom per site -- charge and spin -- and disorder may be present in both of these. We study the growth of entanglement in two scenarios -- disorder in charge equal and unequal to that in spin, and determine the distinct contributions of charge and spin degrees of freedom by expanding the Hamiltonian in terms of a set of optimally localized conserved quantities with separate charge and spin character. We find that coupling between charge and spin is significantly weaker than charge-charge and spin-spin coupling. While this decoupling is present in all our results, it is only apparent when the strength of the disorder in the two sectors is different such that there is a separation between the characteristic timescales of the contributions to entanglement made by charge and by spin.", "url": "https://arxiv.org/abs/2606.15481", "type": "理论", "summary": "一般来说，以非纠缠态初始化的量子系统将在幺正动力学下迅速变得纠缠，这一过程与信息传输和热化密切相关。无序可以抑制纠缠的增长并导致对初始条件的记忆。在非相互作用系统中，这是由单粒子态的局域化引起的，单粒子态的占据由初始条件决定。在相互作用的系统中，类似的局域守恒量仍然存在，但附加的特征是它们是耦合的，导致纠缠增长，这与非相互作用的局域系统和通用遍历系统都不同。费米-哈伯德模型的每个位点有两个自由度——电荷和自旋——并且这两个自由度都可能存在无序。我们研究了两种情况下纠缠的增长——电荷无序等于和不等于自旋无序，并通过根据一组具有单独电荷和自旋特性的最优局域守恒量扩展哈密顿量来确定电荷和自旋自由度的不同贡献。\n\n我们发现电荷和自旋之间的耦合明显弱于电荷-电荷和自旋-自旋耦合。虽然这种解耦存在于我们的所有结果中，但只有当两个扇区中的无序强度不同时，这种解耦才会明显，从而导致电荷和自旋对纠缠的贡献的特征时间尺度之间存在分离。", "authors": [{"name": "Ahad Nokhostin Helm"}, {"name": "Brandon Leipner-Johns"}, {"name": "Rachel Wortis"}], "featured_authors": [{"name": "Ahad Nokhostin Helm"}, {"name": "Brandon Leipner-Johns"}, {"name": "Rachel Wortis"}], "author_count": 3}, {"id": "2606.15484", "category": "quant-ph", "title": "Quantum Fisher Information and the Speed of Entanglement", "abstract": "We investigate the speed at which entanglement can be generated by an interaction parameter encoded in a two-qubit Hamiltonian, quantified by the derivative of concurrence with respect to the coupling parameter. For arbitrary pure two-qubit states evolving under a general nonlocal interaction, we derive a bound relating this entanglement speed to the quantum Fisher information (QFI). Specifically, we show that $|\\partial_g C| \\le \\sqrt{F_Q^{(g)}}$, where $F_Q^{(g)}$ is the QFI associated with estimation of the parameter. This establishes $\\sqrt{F_Q}$ as a an upper bound on the speed of entanglement generation in parameter space. We further derive the saturation conditions and identify the states and dynamical regimes for which equality is attained. At saturation, concurrence evolves at the maximum rate permitted by the distinguishability of the underlying quantum state. These results reveal a direct connection between quantum metrology and entanglement generation, showing that the same information-theoretic quantity that governs parameter-estimation precision also limits the speed at which entanglement resources can be created.", "url": "https://arxiv.org/abs/2606.15484", "type": "理论", "summary": "我们研究了通过以两个量子位哈密顿量编码的相互作用参数生成纠缠的速度，该参数通过耦合参数的并发导数来量化。对于在一般非局域相互作用下演化的任意纯二量子位态，我们得出了一个将纠缠速度与量子费希尔信息（QFI）联系起来的界限。具体来说，我们表明 $|\\partial_g C| \\le \\sqrt{F_Q^{(g)}}$，其中 $F_Q^{(g)}$ 是与参数估计相关的 QFI。这将 $\\sqrt{F_Q}$ 建立为参数空间中纠缠生成速度的上限。我们进一步推导饱和条件并确定达到平等的状态和动态机制。在饱和时，并发以底层量子态的可区分性所允许的最大速率演化。这些结果揭示了量子计量学和纠缠生成之间的直接联系，表明控制参数估计精度的相同信息论量也限制了纠缠资源创建的速度。", "authors": [{"name": "Zain H. Saleem"}], "featured_authors": [{"name": "Zain H. Saleem"}], "author_count": 1}, {"id": "2606.15518", "category": "quant-ph", "title": "Suppressing Intrinsic Spin-Phonon Errors in Trapped-Ion Quantum Simulation", "abstract": "Trapped-ion quantum simulators realize programmable spin models through phonon-mediated interactions. For Hamiltonians with noncommuting terms, however, the same phonon bus generates intrinsic spin-phonon errors that strongly distort the target dynamics. Because these errors are governed by the full time history of the spin-dependent phonon motion, they survive standard loop-closing control and limit simulation accuracy. Using a sequence of frame transformations, we isolate the residual error dynamics and show that this intrinsic error can be strongly suppressed while preserving programmable Ising couplings. Full spin-boson simulations of multi-ion chains demonstrate orders-of-magnitude lower error than both constant-drive and conventional loop-closing protocols. These results remove a central precision barrier in trapped-ion analog quantum simulation and enable accurate programmable simulation of noncommuting many-body Hamiltonians and dynamical protocols.", "url": "https://arxiv.org/abs/2606.15518", "type": "理论+数值", "summary": "俘获离子量子模拟器通过声子介导的相互作用实现可编程自旋模型。然而，对于具有非对易项的哈密顿量，相同的声子总线会产生固有的自旋声子误差，从而严重扭曲目标动力学。由于这些误差受自旋相关声子运动的整个时间历史的控制，因此它们不受标准闭环控制的影响并限制了模拟精度。使用一系列框架变换，我们隔离了残余误差动态，并表明可以在保留可编程伊辛耦合的同时强烈抑制这种固有误差。多离子链的完整自旋玻色子模拟表明，与恒定驱动和传统闭环协议相比，误差要低几个数量级。这些结果消除了捕获离子模拟量子模拟中的中心精度障碍，并实现了非交换多体哈密顿量和动力学协议的精确可编程模拟。", "authors": [{"name": "Dylan Sheils"}, {"name": "James Wang"}, {"name": "Or Katz"}], "featured_authors": [{"name": "Dylan Sheils"}, {"name": "James Wang"}, {"name": "Or Katz"}], "author_count": 3}, {"id": "2606.15558", "category": "quant-ph", "title": "Degeneracy Cannot Violate the Quantum Hamming Bound", "abstract": "The quantum Hamming bound is the standard finite-length sphere-packing bound for exact correction of arbitrary qubit errors. Whether degeneracy can evade this bound has remained unresolved in full generality for nearly three decades: distinct correctable errors may act identically on the code space, so the usual disjoint-sphere argument breaks down. We prove that every exact binary quantum subspace code with $K>1$ obeys the bound, without assuming either nondegeneracy or additivity. Our proof turns the Li--Xing linear-programming polynomial into an exact intersection count for quaternary Hamming balls. Monotonicity in block length and in ball-center separation then reduces the problem to a local node--edge charging inequality at the shortest admissible length. Thus degeneracy can merge correctable error sectors, but cannot enlarge the finite-length binary Hamming bound.", "url": "https://arxiv.org/abs/2606.15558", "type": "理论+数值", "summary": "量子汉明界是标准有限长度球堆积界，用于精确校正任意量子位错误。近三十年来，简并性是否能够逃避这个界限一直没有得到完全普遍的解决：不同的可纠正错误可能在代码空间上表现相同，因此通常的不相交球论论证就站不住脚了。我们证明$K>1$ 的每个精确的二进制量子子空间代码都遵守界限，而不假设非简并性或可加性。我们的证明将李兴线性规划多项式转化为四元汉明球的精确交集计数。然后，块长度和球中心分离的单调性将问题简化为本地节点——最短允许长度处的边缘充电不平等。因此简并性可以合并可纠正的错误扇区，但不能扩大有限长度的二进制汉明界。", "authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "featured_authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "author_count": 2}, {"id": "2606.15586", "category": "quant-ph", "title": "Quantum Illumination with Symmetry-Constrained Random Unitaries", "abstract": "Quantum illumination provides a quantum advantage in detecting weakly reflecting objects embedded in a noisy environment, even when environmental noise destroys most of the initial entanglement. We investigate this advantage using Haar-random probe states constrained to symmetry-resolved subspaces. Employing tools from quantum channel discrimination and asymptotic hypothesis testing, we derive the discrimination exponents associated with Haar-random probe ensembles and identify the role of symmetry in determining their performance. We show that typical states drawn from fixed-charge sectors achieve the same asymptotic quantum-illumination advantage as maximally entangled probes. In particular, we show that the effective thermal-noise suppression and the corresponding Chernoff exponent are governed by the dimension of the accessible symmetry sector. Our results reveal that the operational resource underlying quantum illumination can be generalized from fine-tuned structure of a specific probe state to the existence of a large symmetry-protected correlation subspace. These findings establish a direct connection between quantum illumination, symmetry-resolved typicality, and quantum channel discrimination, and demonstrate that near-optimal quantum hypothesis testing resources can emerge naturally from generic many-body quantum states constrained by conservation laws.", "url": "https://arxiv.org/abs/2606.15586", "type": "理论+数值", "summary": "量子照明在检测嵌入在噪声环境中的弱反射物体方面提供了量子优势，即使环境噪声破坏了大部分初始纠缠。我们使用受限于对称解析子空间的哈尔随机探测状态来研究这一优势。利用量子通道辨别和渐近假设检验的工具，我们推导了与哈尔随机探针集合相关的辨别指数，并确定了对称性在确定其性能中的作用。我们证明，从固定电荷扇区得出的典型态实现了与最大纠缠探针相同的渐近量子照明优势。特别是，我们表明有效的热噪声抑制和相应的切尔诺夫指数由可到达对称扇区的尺寸决定。我们的结果表明，量子照明背后的操作资源可以从特定探测状态的微调结构推广到大型对称保护相关子空间的存在。\n\n这些发现在量子照明、对称解析的典型性和量子通道辨别之间建立了直接联系，并证明接近最优的量子假设检验资源可以自然地从受守恒定律约束的通用多体量子态中产生。", "authors": [{"name": "Sooryansh Asthana"}, {"name": "Sai Vinjanampathy"}], "featured_authors": [{"name": "Sooryansh Asthana"}, {"name": "Sai Vinjanampathy"}], "author_count": 2}, {"id": "2606.15607", "category": "quant-ph", "title": "A New Definition of Quantum Superposition", "abstract": "The usual description of the superposition of two (pure quantum) states is ambiguous, since the binary operation of summation in a Hilbert space does not pass down to the quotient projective space. Even though Dirac noted this as early as 1930, it is often asserted that the superposition is a binary operation acting on two states with a value that is a unique state. The goal for this note is to motivate a rigorous, geometrical definition of the superposition of states in the setting of complex projective space, which has been argued elsewhere to be the natural geometric phase space for quantum theory. The upshot is that the new definition of the superposition of two pure states, viewed as two distinct points in the projective space, is the unique (complex) line on which those two points lie. Finally, a comparison is given between superposition and expansion in an orthonormal basis.", "url": "https://arxiv.org/abs/2606.15607", "type": "理论", "summary": "两个（纯量子）态叠加的通常描述是不明确的，因为希尔伯特空间中求和的二元运算不会向下传递到商射影空间。尽管狄拉克早在 1930 年就注意到了这一点，但人们经常断言叠加是作用于两个状态的二元运算，其值为唯一状态。本笔记的目标是在复杂射影空间的设置中激发对状态叠加的严格几何定义，该空间在其他地方被认为是量子理论的自然几何相空间。结果是，两个纯态叠加的新定义（被视为射影空间中的两个不同点）是这两个点所在的唯一（复杂）线。最后，在正交基上对叠加和展开进行了比较。", "authors": [{"name": "Stephen Bruce Sontz"}], "featured_authors": [{"name": "Stephen Bruce Sontz"}], "author_count": 1}, {"id": "2606.15664", "category": "quant-ph", "title": "Synthesizing Arbitrary Non-Hermitian Hamiltonian with Stochastic Floquet Engineering", "abstract": "The conventional Floquet engineering scheme synthesizes a given target Hamiltonian with a deterministic temporal periodic driving field. In this work, we introduce the stochastic Floquet engineering scheme that can synthesize an arbitrary non-Hermitian target Hamiltonian using a time-periodic driving field with noisy amplitude. Our method is rooted in the Hermitian dynamics taking noise as a valuable quantum resource with no need for loss or gain in prior. We apply our method to engineer a cavity Hamiltonian with dissipative coupling between Fock states, and to prepare a given quantum state from a generally arbitrary quantum state. The stochastic Floqut engineering also provides a way to generate non-unitary quantum gates, which take advantage in certain tasks compared to unitary quantum computing, without the need for ancillae or state-dependent updating.", "url": "https://arxiv.org/abs/2606.15664", "type": "理论", "summary": "传统的 Floquet 工程方案将给定的目标哈密顿量与确定性时间周期驱动场综合起来。在这项工作中，我们介绍了随机 Floquet 工程方案，该方案可以使用具有噪声幅度的时间周期驱动场合成任意非厄米目标哈密顿量。我们的方法植根于厄米动力学，将噪声视为一种宝贵的量子资源，无需事先损失或增益。我们应用我们的方法来设计具有福克态之间耗散耦合的空腔哈密顿量，并从一般任意的量子态制备给定的量子态。随机 Floqut 工程还提供了一种生成非酉量子门的方法，与酉量子计算相比，它在某些任务中具有优势，而不需要辅助或状态相关的更新。", "authors": [{"name": "Lingzhen Guo"}, {"name": "Hui Jing"}], "featured_authors": [{"name": "Lingzhen Guo"}, {"name": "Hui Jing"}], "author_count": 2}, {"id": "2606.15744", "category": "quant-ph", "title": "Comparative Performance Analysis of NIST PQC Standards: From STM32 Software Limitations to FPGA-SoC Acceleration", "abstract": "The rapid advancement of quantum computing poses a significant threat to classical public-key cryptographic systems, necessitating the transition to Post-Quantum Cryptography (PQC). This study investigates the implementation challenges of NISTstandardized signature schemes on resource-constrained embedded hardware. We present a comparative analysis of SPHINCS+ and CRYSTALS-Dilithium on an ARM Cortex-M4 (STM32F407G) microcontroller. Our findings reveal that SPHINCS+ is practically unusable in this software-only environment, with impractical execution times. Furthermore, the reference Dilithium implementation failed to execute entirely on the MCU due to severe RAM and timing constraints. To overcome these hardware limitations, we integrated a hardware-accelerated Dilithium core onto a Xilinx Zynq-7000 ZedBoard SoC. By implementing a specialized Number Theoretic Transform (NTT) accelerator in the FPGA fabric, we achieved successful execution with performance rates for key generation and signature generation at millisecond levels. These results demonstrate that while pure software PQC is non-viable for standard microcontrollers, a hardware-software codesign approach provides the necessary efficiency for quantumresistant embedded systems.", "url": "https://arxiv.org/abs/2606.15744", "type": "理论", "summary": "量子计算的快速发展对经典公钥密码系统构成了重大威胁，需要向后量子密码学（PQC）过渡。本研究调查了 NIST 标准化签名方案在资源受限的嵌入式硬件上的实施挑战。我们对 ARM Cortex-M4 (STM32F407G) 微控制器上的 SPHINCS+ 和 CRYSTALS-Dilithium 进行了比较分析。我们的研究结果表明，SPHINCS+ 在这种纯软件环境中实际上无法使用，执行时间也不切实际。此外，由于严格的 RAM 和时序限制，参考 Dilithium 实现无法完全在 MCU 上执行。为了克服这些硬件限制，我们将硬件加速的 Dilithium 内核集成到 Xilinx Zynq-7000 ZedBoard SoC 上。通过在 FPGA 架构中实施专用的数论变换 (NTT) 加速器，我们成功执行了密钥生成和签名生成的性能，并达到了毫秒级的性能。\n\n这些结果表明，虽然纯软件 PQC 对于标准微控制器来说是不可行的，但硬件-软件协同设计方法为抗量子嵌入式系统提供了必要的效率。", "authors": [{"name": "Mustafa Akif Yıldırım"}, {"name": "Osman Tokluoglu"}], "featured_authors": [{"name": "Mustafa Akif Yıldırım"}, {"name": "Osman Tokluoglu"}], "author_count": 2}, {"id": "2606.15801", "category": "quant-ph", "title": "MAPS: A Novel Multi-Axial Projective Sphere for Geometrically Visualizing Higher d-Valued Quantum State-Space of Qudits", "abstract": "Visualizing the d-valued quantum state-space of quantum systems serves as a foundational pillar for the scientific research and practical applications in quantum computing and information science, where d >= 2. The 2-valued quantum states of a qubit are elegantly visualized on the three-dimensional Bloch sphere. In contrast, expanding this geometrical paradigm to visualize higher d-valued quantum states of a qudit (d >= 3), e.g., a qutrit (d=3), ququadit (d=4), and quintit (d=5), leads to severe structural and topological complexities. This paper introduces a new generalized three-dimensional framework to effectively visualize higher d-valued quantum states of a qudit, in the aspects of ease of illustration, structural simplicity, and natural representation for researchers and engineers. We called this new framework the \"multi-axial projective sphere (MAPS)\", which consists of n projectional intersecting spatial axes, where d-1 <= n <= 0. We also propose a group of novel d-valued phase axial-based gates, to swivel and shift d-valued quantum states of a qudit along these n axes. Our generalized framework could be used for visualizing high-dimensional data for practical applications, e.g., machine learning, quantum machine learning, and quantum chemistry, where every axis of the MAPS represents a single feature of such data with its corresponding distinct values.", "url": "https://arxiv.org/abs/2606.15801", "type": "理论+数值", "summary": "可视化量子系统的 d 值量子态空间是量子计算和信息科学中科学研究和实际应用的基础支柱，其中 d >= 2。量子位的 2 值量子态在三维布洛赫球上被优雅地可视化。相反，扩展这种几何范式以可视化 qudit (d >= 3) 的更高 d 值量子态，例如 qutrit (d=3)、ququadit (d=4) 和 quintit (d=5)，会导致严重的结构和拓扑复杂性。本文介绍了一种新的广义三维框架，可以有效地可视化量子体的更高 d 值量子态，在易于说明、结构简单和研究人员和工程师的自然表示等方面。我们将这个新框架称为“多轴射影球体（MAPS）”，它由 n 个投影相交空间轴组成，其中 d-1 <= n <= 0。我们还提出了一组新颖的基于 d 值相位轴的门，以沿这 n 个轴旋转和移动量子体的 d 值量子态。\n\n我们的通用框架可用于可视化实际应用中的高维数据，例如机器学习、量子机器学习和量子化学，其中 MAPS 的每个轴代表此类数据的单个特征及其相应的不同值。", "authors": [{"name": "Ali Al-Bayaty"}], "featured_authors": [{"name": "Ali Al-Bayaty"}], "author_count": 1}, {"id": "2606.15808", "category": "quant-ph", "title": "Trainable Quantum Channels as Computational Primitives for Quantum Learning", "abstract": "Variational quantum learning is traditionally constrained to unitary dynamics, often treating quantum channels as detrimental noise. In this work, we reformulate the quantum channels as trainable computational primitives and establish a non-unitary quantum machine learning framework grounded in open-system dynamics. We demonstrate that the outputs of channel-enhanced quantum models form a structured superposition of multiple functional components. Each component is governed by an effective observable whose spectrum can be adaptively modulated during training, a significant departure from the spectral invariance in unitary transformations. Moreover, the proposed framework generalizes conventional unitary quantum models by retaining them as a special case while introducing additional non-unitary degrees of freedom. Furthermore, we reveal that trainable quantum channels enrich the optimization geometry through ensemble-averaged gradient and additional optimization directions induced by the Kraus operators. Empirical evaluations on classification tasks using trainable amplitude-damping and phase-damping channels confirm enhanced optimization dynamics and predictive performance. Our work provides a principled approach for leveraging quantum channels as trainable resources and advances the design of high-performance quantum learning architectures.", "url": "https://arxiv.org/abs/2606.15808", "type": "理论+数值", "summary": "变分量子学习传统上仅限于单一动力学，通常将量子通道视为有害噪声。在这项工作中，我们将量子通道重新表述为可训练的计算原语，并建立了一个基于开放系统动力学的非单一量子机器学习框架。我们证明了通道增强量子模型的输出形成了多个功能组件的结构化叠加。每个分量都由有效可观测量控制，其频谱可以在训练期间自适应调制，这与酉变换中的频谱不变性有很大不同。此外，所提出的框架通过将传统的酉量子模型保留为特例，同时引入额外的非酉自由度，从而概括了传统的酉量子模型。此外，我们揭示了可训练的量子通道通过集合平均梯度和克劳斯算子引起的额外优化方向丰富了优化几何结构。使用可训练的振幅阻尼和相位阻尼通道对分类任务进行的实证评估证实了增强的优化动态和预测性能。\n\n我们的工作提供了一种利用量子通道作为可训练资源的原则性方法，并推进了高性能量子学习架构的设计。", "authors": [{"name": "Jingwei Wen"}, {"name": "Ling Qian"}, {"name": "Shijie Wei"}, {"name": "Guilu Long"}], "featured_authors": [{"name": "Jingwei Wen"}, {"name": "Ling Qian"}, {"name": "Shijie Wei"}, {"name": "Guilu Long"}], "author_count": 4}, {"id": "2606.15873", "category": "quant-ph", "title": "Complete Relational Description of Spin in a Quantum Background", "abstract": "The standard description of the state of a spin in quantum mechanics presupposes externally fixed directions -- a classical background. Can a spin be fully described instead in relation to other quantum mechanical systems? Poulin suggested twenty years ago group averaging over rotations the joint state of a fundamental spin and a reference spin with large angular momentum which, however, yields a classical bit in a probabilistic mixture. We revisit this idea and show that when the quantum reference system is augmented to \\emph{two} large spins, the standard quantum mechanical description of a spin is recovered in the limit of large quantum numbers for the reference system.", "url": "https://arxiv.org/abs/2606.15873", "type": "理论", "summary": "量子力学中自旋状态的标准描述预设了外部固定方向——这是一个经典背景。可以相对于其他量子力学系统来完整地描述自旋吗？二十年前，普林建议对基本自旋和具有大角动量的参考自旋的联合状态的旋转进行平均，然而，这在概率混合中产生了经典位。我们重新审视这个想法，并表明，当量子参考系统增强到 \\emph{two} 大自旋时，自旋的标准量子力学描述在参考系统的大量子数的极限内恢复。", "authors": [{"name": "Hannah Troger"}, {"name": "Ofek Bengyat"}, {"name": "Thomas D. Galley"}, {"name": "Marios Christodoulou"}], "featured_authors": [{"name": "Hannah Troger"}, {"name": "Ofek Bengyat"}, {"name": "Thomas D. Galley"}, {"name": "Marios Christodoulou"}], "author_count": 4}, {"id": "2606.15922", "category": "quant-ph", "title": "A Gauge-Covariant Geometric Framework for Non-Hermitian Quantum Systems", "abstract": "We develop a comprehensive, gauge-covariant geometric framework for non-Hermitian quantum systems in the quasi-Hermitian regime, that is, the region of parameter space where the non-Hermitian Hamiltonian admits a real spectrum and a positive-definite metric operator. We build this framework by elevating the Dyson map to a central geometric object. This map is the transformation that converts a non-Hermitian Hamiltonian into an equivalent Hermitian one. From it we construct the Dyson connection and decompose it into Hermitian and anti-Hermitian parts, identified respectively as {\\it stretching } and {\\it rotation } components. This decomposition cleanly separates the genuine physical metric deformations from the unitary gauge redundancies. Working with manifestly gauge-covariant states, we then derive the complex non-Hermitian Berry phase and the quantum geometric tensor (QGT), and show that the non-Hermitian geometric curvature originates from the non-commutativity of the stretching components at the operator level. We further analyse the geometric singularities near an exceptional point (EP) and uncover a distinct hierarchy of divergences. For a general two-level non-Hermitian model, the quantum metric tensor (QMT) exhibits a leading-order divergence $\\sim |\\epsilon_\\mu|^{-2}$, while the Berry curvature shows a weaker, subleading divergence $\\sim |\\epsilon_\\mu|^{-3/2}$, with $\\epsilon_\\mu$ denoting the parameter displacement from the EP along an individual parameter axis $\\mu$. Finally, we examine physical realizations of this model, including the non-Hermitian Su--Schrieffer--Heeger (SSH) and Hatano--Nelson (HN) models, where exact analytical results confirm the predicted critical scaling laws and illustrate the metric-deformation-driven non-Hermitian geometries.", "url": "https://arxiv.org/abs/2606.15922", "type": "理论", "summary": "我们为准厄米体系中的非厄米量子系统开发了一个全面的规范协变几何框架，即非厄米哈密顿量允许实谱和正定度量算符的参数空间区域。我们通过将戴森地图提升为中心几何对象来构建这个框架。该映射是将非厄米哈密顿量转换为等效厄米哈密顿量的变换。由此我们构造戴森连接并将其分解为埃尔米特和反埃尔米特部分，分别标识为{\\it 拉伸 } 和 {\\it 旋转 } 分量。这种分解清楚地将真正的物理度量变形与单一规范冗余分开。利用明显的规范协变态，我们推导出复杂的非厄米特贝里相和量子几何张量（QGT），并表明非厄米特几何曲率源于算子级别拉伸分量的非交换性。我们进一步分析了异常点（EP）附近的几何奇点，并揭示了明显的发散层次。\n\n对于一般的两级非厄米模型，量子度量张量 (QMT) 表现出前导散度 $\\sim |\\epsilon_\\mu|^{-2}$，而贝里曲率表现出较弱的次前导散度 $\\sim |\\epsilon_\\mu|^{-3/2}$，其中 $\\epsilon_\\mu$ 表示沿单个参数轴从 EP 的参数位移$\\mu$。最后，我们研究了该模型的物理实现，包括非埃尔米特 Su-Schrieffer-Heeger (SSH) 和 Hatano-Nelson (HN) 模型，其中精确的分析结果证实了预测的临界缩放定律，并说明了度量变形驱动的非埃尔米特几何。", "authors": [{"name": "Gargi Das"}, {"name": "Sudhanshu Shekhar"}, {"name": "Bhabani Prasad Mandal"}], "featured_authors": [{"name": "Gargi Das"}, {"name": "Sudhanshu Shekhar"}, {"name": "Bhabani Prasad Mandal"}], "author_count": 3}, {"id": "2606.15995", "category": "quant-ph", "title": "Influence of the Electron's Anomalous Magnetic Dipole Moment on High-Atomic-Number Atoms", "abstract": "Super-heavy atoms ($Z > 100$) are usually studied in the context of the so-called ``Quantum Electrodynamics of Strong Fields''. In this theory the problem of the singularity in the electron energy whenever $Z > 137$ is overcome. This is done by considering the finite size of the nucleus and leads to interesting phenomena, such as the spontaneous production of positrons. Here, we show that taking into account the contribution from the Anomalous Magnetic Dipole Moment of the electron (by means of an effective theory), within a point-nucleus model, is a sufficient condition to obtain regular wave functions and physically acceptable energy values for $Z > 137$.", "url": "https://arxiv.org/abs/2606.15995", "type": "理论", "summary": "超重原子（$Z > 100$）通常在所谓的“强场量子电动力学”的背景下进行研究。在这个理论中，只要 $Z > 137$ 就克服了电子能量的奇点问题。这是通过考虑原子核的有限尺寸来完成的，并导致有趣的现象，例如正电子的自发产生。在这里，我们表明，在点核模型中考虑电子反常磁偶极矩的贡献（通过有效的理论）是获得规则波函数和物理上可接受的能量值（$Z > 137$）的充分条件。", "authors": [{"name": "C. A. S. Almeida"}, {"name": "J. Auto-Neto"}], "featured_authors": [{"name": "C. A. S. Almeida"}, {"name": "J. Auto-Neto"}], "author_count": 2}, {"id": "2606.16037", "category": "quant-ph", "title": "Adiabatically-induced Kawaguchi geometry and jerk in quantum-classical systems", "abstract": "Adiabatically eliminating the quantum degrees of freedom in a mixed quantum-classical system produces an effective force in the classical equation of motion. The elimination can be made to any order in the adiabatic parameter, generating a series of higher order forces. By applying a sequence of near-identity unitary transformations to the quantum state, we derive a hierarchy of increasingly accurate effective actions for the classical variables. The third order Euler-Lagrange equation is non-Newtonian as the force depends on the jerk, the third order time derivative of position. We find that the third order terms induce a special kind of Kawaguchi geometry on the space of classical variables. This geometry is characterized by an almost symplectic structure and a differential line element that depends on the acceleration in addition to the velocity. Our results can be used to efficiently capture higher order nonadiabatic effects in molecular dynamics simulations.", "url": "https://arxiv.org/abs/2606.16037", "type": "理论+数值", "summary": "绝热消除混合量子经典系统中的量子自由度会在经典运动方程中产生有效力。可以对绝热参数中的任何阶进行消除，产生一系列更高阶的力。通过将一系列近恒等酉变换应用于量子态，我们推导出经典变量的越来越准确的有效作用的层次结构。三阶欧拉-拉格朗日方程是非牛顿方程，因为力取决于加加速度（位置的三阶时间导数）。我们发现三阶项在经典变量空间上引发了一种特殊的川口几何。这种几何结构的特点是几乎辛的结构和微分线元素，除了速度之外还取决于加速度。我们的结果可用于有效捕获分子动力学模拟中的高阶非绝热效应。", "authors": [{"name": "Athanasios Chatzistavrakidis"}, {"name": "Larisa Jonke"}, {"name": "Ryan Requist"}], "featured_authors": [{"name": "Athanasios Chatzistavrakidis"}, {"name": "Larisa Jonke"}, {"name": "Ryan Requist"}], "author_count": 3}, {"id": "2606.16090", "category": "quant-ph", "title": "Enhancing Quantum Machine Learning with Anyons", "abstract": "The power of quantum computing and quantum machine learning relies on harnessing uniquely quantum phenomena as computational resources. While superposition, coherence and entanglement have been central to this effort, the role of particle exchange statistics remains largely unexplored. Here, we introduce a quantum kernel framework that unifies bosonic, fermionic, and anyonic (fractional) exchange statistics within a single learning paradigm. We study this family of kernels from three perspectives. At the representation level, Haar-averaged effective-dimension analysis shows that fractional exchange phases access feature-space directions inaccessible to the purely symmetric or antisymmetric limits. At the level of kernel geometry, the corresponding Gram matrices show greater separation from the distinguishable-particle baseline and reduced label-dependent model complexity. Finally, on learning benchmarks, anyonic kernels consistently outperform their bosonic and fermionic counterparts, with stronger target alignment and more favorable class geometry. Together, these findings show that exchange statistics reshape the structure and geometry of quantum feature space, leading to enhanced learning performance. Our work identifies particle exchange statistics as an overlooked computational ingredient for quantum machine learning and provides the first systematic comparison of quantum learning models across exchange phases.", "url": "https://arxiv.org/abs/2606.16090", "type": "理论+数值", "summary": "量子计算和量子机器学习的力量依赖于利用独特的量子现象作为计算资源。虽然叠加、相干和纠缠是这项工作的核心，但粒子交换统计的作用在很大程度上仍未被探索。在这里，我们引入了一个量子内核框架，它将玻色子、费米子和任意子（分数）交换统计数据统一在一个学习范式中。我们从三个角度研究这个内核家族。在表示层面，哈尔平均有效维数分析表明，分数交换相访问纯对称或反对称极限无法访问的特征空间方向。在核几何级别，相应的 Gram 矩阵显示出与可区分粒子基线的更大分离，并降低了依赖于标签的模型复杂性。最后，在学习基准上，任意子内核始终优于其玻色子和费米子内核，具有更强的目标对齐和更有利的类几何结构。\n\n总之，这些发现表明交换统计重塑了量子特征空间的结构和几何形状，从而提高了学习性能。我们的工作将粒子交换统计确定为量子机器学习中被忽视的计算成分，并首次系统地比较了跨交换阶段的量子学习模型。", "authors": [{"name": "Da Zhang"}, {"name": "Wen-Qiang Liu"}, {"name": "Zhaohui Wei"}, {"name": "Zhang-Qi Yin"}], "featured_authors": [{"name": "Da Zhang"}, {"name": "Wen-Qiang Liu"}, {"name": "Zhaohui Wei"}, {"name": "Zhang-Qi Yin"}], "author_count": 4}, {"id": "2606.16221", "category": "quant-ph", "title": "QALM: Escaping Local Minima via Interleaved Exploration and Exploitation in Quantum Circuit Optimization", "abstract": "Quantum circuit optimizers face a fundamental limitation in how they tolerate temporary cost increases. At one extreme, greedy rule-based optimizers immediately apply any cost-reducing transformation, achieving high efficiency but quickly becoming trapped in local minima. At the other extreme, search-based optimizers accept cost-increasing moves to explore the circuit space and escape such minima. However, because search-based optimizers cannot determine within a reasonable time budget whether a given point is promising, that is, whether its neighborhood contains a deeper local minimum, they must blindly explore higher-cost regions. As a result, escaping the current basin to reach a promising point takes exponentially many steps. In this work, we show that this limitation can be overcome with a hybrid framework that interleaves the exhaustive exploration capabilities of search algorithms with the efficiency of rule-based optimization. We implement this framework as QALM, a novel optimizer designed to escape local minima without incurring the runtime penalties of pure search. Crucially, our results demonstrate that QALM does not merely strike a balance; it outperforms existing rule-based and search-based optimizers in circuit reduction rates while operating with the computational efficiency of rule-based systems. In a comprehensive evaluation across 248 circuits, QALM matches or exceeds the fidelity of the strongest baseline on 83.9% of these circuits, given the same time budget.", "url": "https://arxiv.org/abs/2606.16221", "type": "数值", "summary": "量子电路优化器在如何承受暂时的成本增加方面面临着根本性的限制。在一种极端情况下，贪婪的基于规则的优化器会立即应用任何降低成本的转换，实现高效率，但很快就会陷入局部最小值。在另一个极端，基于搜索的优化器接受增加成本的举措来探索电路空间并逃脱这种最小值。然而，由于基于搜索的优化器无法在合理的时间预算内确定给定点是否有希望，即其邻域是否包含更深的局部最小值，因此它们必须盲目地探索更高成本的区域。因此，逃离当前盆地并到达有希望的点需要指数级的许多步骤。在这项工作中，我们表明可以通过混合框架来克服这一限制，该混合框架将搜索算法的详尽探索能力与基于规则的优化的效率交织在一起。我们将此框架实现为 QALM，这是一种新颖的优化器，旨在逃避局部最小值，而不会产生纯搜索的运行时损失。\n\n至关重要的是，我们的结果表明 QALM 不仅实现了平衡，而且还实现了平衡。它在电路减少率方面优于现有的基于规则和基于搜索的优化器，同时具有基于规则的系统的计算效率。在对 248 个电路进行的综合评估中，在时间预算相同的情况下，QALM 在 83.9% 的电路上达到或超过了最强基线的保真度。", "authors": [{"name": "Aidan Wagner"}, {"name": "Mingkuan Xu"}, {"name": "Pengyu Liu"}, {"name": "Zhihao Jia"}, {"name": "Umut A. Acar"}], "featured_authors": [{"name": "Aidan Wagner"}, {"name": "Mingkuan Xu"}, {"name": "Pengyu Liu"}, {"name": "Zhihao Jia"}, {"name": "Umut A. Acar"}], "author_count": 5}, {"id": "2606.16265", "category": "quant-ph", "title": "Bi-qutrit entangled edge states of positive partial transposes with largest ranks", "abstract": "Whenever $E$ is an eight dimensional subspace of the bi-qutrit quantum system whose orthogonal complement is spanned by a vector of Schmidt rank three, we show that there exist PPT entangled edge states with the range space $E$ whose partial transposes are of rank six, which is the largest possible rank. In this way, we exhibit a huge family of bi-qutrit PPT entangled edge states of type $(8,6)$. They make faces of the convex set of all PPT states, and we find bi-qutrit PPT entangled edge states of other types on the boundaries of such faces.", "url": "https://arxiv.org/abs/2606.16265", "type": "理论", "summary": "每当$E$是bi-qutrit量子系统的一个八维子空间，其正交补集由施密特三阶向量跨越时，我们证明存在范围空间$E$的PPT纠缠边缘态，其部分转置为六阶，这是最大可能的阶。通过这种方式，我们展示了一个巨大的 $(8,6)$ 类型的 bi-qutrit PPT 纠缠边缘态家族。他们制作了所有 PPT 状态的凸集的面，并且我们在这些面的边界上发现了其他类型的 bi-qutrit PPT 纠缠边缘状态。", "authors": [{"name": "Kyung Hoon Han"}, {"name": "Seung-Hyeok Kye"}], "featured_authors": [{"name": "Kyung Hoon Han"}, {"name": "Seung-Hyeok Kye"}], "author_count": 2}, {"id": "2606.16418", "category": "quant-ph", "title": "A short proof of the modified Kretschmann-Schlingemann-Werner conjecture", "abstract": "Let $\\Phi_1, \\Phi_2 : \\mathbb{M}_d(\\mathbb{C})\\to \\mathbb{M}_n(\\mathbb{C})$ be two quantum channels with respective Stinespring isometries $V_1, V_2 : \\mathbb{C}^{d}\\to \\mathbb{C}^{n} \\otimes \\mathbb{C}^{m}$ on any common dilation space $\\mathbb{C}^{m}$. We prove that there exists a unitary $U$ on $\\mathbb{C}^{m}$ such that $\\|V_1-({\\bf1}\\otimes U)V_2\\|_\\infty\\leq\\sqrt{2\\|\\Phi_1-\\Phi_2\\|_\\diamond},$ thus resolving vom Ende's modification of the Kretschmann-Schlingemann-Werner conjecture in the affirmative.", "url": "https://arxiv.org/abs/2606.16418", "type": "理论", "summary": "设 $\\Phi_1, \\Phi_2 : \\mathbb{M}_d(\\mathbb{C})\\to \\mathbb{M}_n(\\mathbb{C})$ 为两个具有各自 Stinespring 等距的量子通道 $V_1, V_2 : \\mathbb{C}^{d}\\to \\mathbb{C}^{n} \\otimes \\mathbb{C}^{m}$在任意公共膨胀空间 $\\mathbb{C}^{m}$ 上。我们证明$\\mathbb{C}^{m}$上存在酉$U$使得$\\|V_1-({\\bf1}\\otimes U)V_2\\|_\\infty\\leq\\sqrt{2\\|\\Phi_1-\\Phi_2\\|_\\diamond},$从而解决了vom Ende对Kretschmann-Schlingemann-Werner猜想的修改是的。", "authors": [{"name": "Satvik Singh"}], "featured_authors": [{"name": "Satvik Singh"}], "author_count": 1}, {"id": "2606.16425", "category": "quant-ph", "title": "Worst-case depth hierarchy for shallow quantum circuits", "abstract": "Circuit depth is a central resource in complexity theory. While bounded-depth classical circuits admit well-understood hierarchy theorems, the internal structure of constant-depth quantum computation remains comparatively unexplored. We prove an explicit depth hierarchy theorem for $\\mathsf{QNC}^0$. For each $d\\ge 12$, we construct a family of two-round interactive problems on which no depth-$(d-1)$ quantum circuit can achieve near-perfect success, regardless of gate set, circuit size, or ancillary qubits. In contrast, we prove that our construction admits realizations by simple bounded fan-in quantum circuits of depth larger than $d$ by a small constant factor. Moreover, all bounded fan-in classical circuits of sublogarithmic depth (in the input size) fail to achieve perfect success on these tasks for every $d$, yielding a hierarchy of problems that show unconditional quantum advantage of $\\mathsf{QNC}^0$ over $\\mathsf{NC}^0$. A key obstacle is the scarcity of lower bound techniques for quantum circuits. To address this, we develop methods to analyze how depth affects a circuit's ability to realize nonlocal correlations amongst its output qubits in a fine-grained manner. Our approach exploits the correspondence between constraint systems and nonlocal games, translating group-theoretic constructions into rigid operator-valued constraint systems and then into non-local games. In particular, we construct constraint systems whose unique faithful operator-valued solutions require every perfect strategy, and every near-perfect strategy to a fixed precision, to implement multi-controlled phase operations. This reduces to a nonlocal unitary-synthesis problem, yielding depth lower bounds for both shallow quantum and classical circuits. These results show that increasing depth strictly increases computational power within $\\mathsf{QNC}^0$, establishing a genuinely quantum hierarchy.", "url": "https://arxiv.org/abs/2606.16425", "type": "理论", "summary": "电路深度是复杂性理论的核心资源。虽然有界深度经典电路承认易于理解的层次结构定理，但恒定深度量子计算的内部结构仍然相对未经探索。我们证明了 $\\mathsf{QNC}^0$ 的显式深度层次定理。对于每个 $d\\ge 12$，我们构建了一系列两轮交互问题，在这些问题上，无论门设置、电路大小或辅助量子位如何，深度 $(d-1)$ 量子电路都无法取得近乎完美的成功。相比之下，我们证明我们的构造允许通过简单的有界扇入量子电路来实现，其深度比 $d$ 大一个小的常数因子。此外，所有亚对数深度（输入大小）的有界扇入经典电路都无法在每 $d$ 的这些任务上取得完美成功，从而产生一系列问题，显示 $\\mathsf{QNC}^0$ 相对于 $\\mathsf{NC}^0$ 的无条件量子优势。一个主要障碍是量子电路下限技术的缺乏。为了解决这个问题，我们开发了方法来分析深度如何影响电路以细粒度方式实现其输出量子位之间的非局部相关性的能力。\n\n我们的方法利用约束系统和非局部博弈之间的对应关系，将群论构造转化为严格的算子值约束系统，然后转化为非局部博弈。特别是，我们构建了约束系统，其独特的忠实算子值解决方案需要每一个完美的策略，并且每一个近乎完美的策略都达到固定的精度，以实现多控制阶段操作。这简化为非局部酉综合问题，产生浅量子和经典电路的深度下界。这些结果表明，增加深度严格增加了 $\\mathsf{QNC}^0$ 内的计算能力，建立了真正的量子层次结构。", "authors": [{"name": "Min-Hsiu Hsieh"}, {"name": "Michael de Oliveira"}, {"name": "Sathyawageeswar Subramanian"}, {"name": "Xingjian Zhang"}], "featured_authors": [{"name": "Min-Hsiu Hsieh"}, {"name": "Michael de Oliveira"}, {"name": "Sathyawageeswar Subramanian"}, {"name": "Xingjian Zhang"}], "author_count": 4}, {"id": "2606.16712", "category": "quant-ph", "title": "Complete entanglement detection using polynomial invariants", "abstract": "Existing methods for deciding whether a bipartite quantum state is separable or entangled typically fall into one of two categories: they are either complete but require access to an explicit density matrix followed by numerical optimization, or they can be evaluated directly by measuring the quantum system but are incomplete, in the sense that they cannot detect all forms of entanglement. In this work, we overcome both limitations in a unified framework. First, we bypass numerical optimization by deriving separability criteria in the form of universal bounds on tensor powers of separable states. We prove that these bounds are complete: every entangled state violates them for sufficiently large tensor powers. Second, we explicitly construct a corresponding complete family of nonlinear entanglement witnesses, which can detect all forms of entanglement without requiring an explicit density matrix. The witnesses we construct are moreover basis-independent, in the sense that they are invariant under conjugation by local unitaries. Altogether, our results expand the toolbox for entanglement detection in arbitrary local dimensions in a manifestly invariant way.", "url": "https://arxiv.org/abs/2606.16712", "type": "理论+数值", "summary": "确定二分量子态是可分离还是纠缠的现有方法通常分为两类之一：它们要么是完整的，但需要访问显式密度矩阵，然后进行数值优化，要么可以通过测量量子系统直接评估，但不完整，因为它们无法检测所有形式的纠缠。在这项工作中，我们在统一框架中克服了这两个限制。首先，我们通过以可分离态张量幂的通用界限的形式导出可分离性标准来绕过数值优化。我们证明这些界限是完整的：每个纠缠态都违反了足够大的张量幂。其次，我们显式地构造了一个相应的完整的非线性纠缠见证家族，它可以检测所有形式的纠缠，而不需要显式的密度矩阵。此外，我们构建的见证是基础无关的，因为它们在局部酉共轭下是不变的。总而言之，我们的结果以明显不变的方式扩展了任意局部维度中纠缠检测的工具箱。", "authors": [{"name": "Thomas C. Fraser"}, {"name": "Vjosa Blakaj"}, {"name": "Roberto Rubboli"}, {"name": "Felix Huber"}, {"name": "Marco Fanizza"}], "featured_authors": [{"name": "Thomas C. Fraser"}, {"name": "Vjosa Blakaj"}, {"name": "Roberto Rubboli"}, {"name": "Felix Huber"}, {"name": "Marco Fanizza"}], "author_count": 5}, {"id": "2606.16764", "category": "quant-ph", "title": "Charging Quantum Batteries with Chiral Squeezing", "abstract": "We propose a quantum-battery charger based on a driven bosonic Kitaev chain (BKC), where chiral squeezing converts passive input fluctuations into ordered, non-passive battery states. While a coherent input pulse exhibits phase-sensitive chiral transport, the charging dynamics is dominated by bidirectionally propagating fluctuations that are amplified and squeezed into orthogonal quadratures at opposite chain ends. In contrast to conventional phase-preserving amplifiers, our scheme stores largely extractable energy and achieves a work-like signal-to-noise ratio (SNR) near unity, even in the presence of thermal noise and moderate symmetry-preserving disorder.", "url": "https://arxiv.org/abs/2606.16764", "type": "理论", "summary": "我们提出了一种基于驱动玻色基塔耶夫链（BKC）的量子电池充电器，其中手性挤压将被动输入波动转换为有序的非被动电池状态。虽然相干输入脉冲表现出相敏手性输运，但充电动力学由双向传播的波动主导，这些波动在相对的链端被放大并挤压成正交正交。与传统的保相放大器相比，我们的方案存储了大量可提取的能量，并且即使在存在热噪声和适度的对称性保持无序的情况下，也能实现接近一致的工作信噪比（SNR）。", "authors": [{"name": "Borhan Ahmadi"}, {"name": "André H. A. Malavazi"}, {"name": "Janine Splettstoesser"}, {"name": "Paweł Horodecki"}, {"name": "Lei Du"}], "featured_authors": [{"name": "Borhan Ahmadi"}, {"name": "André H. A. Malavazi"}, {"name": "Janine Splettstoesser"}, {"name": "Paweł Horodecki"}, {"name": "Lei Du"}], "author_count": 5}, {"id": "2606.16823", "category": "quant-ph", "title": "Physically Motivated Ansatz for Open Fermionic Systems on Quantum Computer", "abstract": "Determining non-equilibrium steady states (NESS) of open fermionic systems is a fundamental problem akin to finding ground states of closed systems. To address this, variational quantum algorithms can be used to solve the Lindblad master equation, much like the Schrödinger equation, yet ansatz design for NESS remains challenging. Existing approaches rely mostly on hardware-efficient ansätze (HEA), which suffer from the barren plateau problem. Here, we introduce a physically motivated ansatz named NE-UCC. Numerical simulations demonstrate that NE-UCC reliably converges to the steady state even in strongly correlated regimes far from equilibrium, reducing the infidelity by up to ten orders of magnitude compared to HEA. Furthermore, NE-UCC facilitates the exploration of excited eigenmodes with specific symmetries.", "url": "https://arxiv.org/abs/2606.16823", "type": "理论+数值", "summary": "确定开放费米子系统的非平衡稳态（NESS）是一个类似于寻找封闭系统基态的基本问题。为了解决这个问题，可以使用变分量子算法来求解 Lindblad 主方程，就像薛定谔方程一样，但 NESS 的 ansatz 设计仍然具有挑战性。现有的方法主要依赖于硬件高效的 ansätze (HEA)，该方法受到贫瘠高原问题的困扰。在这里，我们介绍一个名为 NE-UCC 的物理激励 ansatz。数值模拟表明，即使在远离平衡的强相关状态下，NE-UCC 也能可靠地收敛到稳态，与 HEA 相比，将不忠实度降低多达十个数量级。此外，NE-UCC 有助于探索具有特定对称性的激发本征模。", "authors": [{"name": "Yi Liu"}, {"name": "Xiaopeng Li"}, {"name": "Zhen Liu"}, {"name": "Zhenyu Li"}], "featured_authors": [{"name": "Yi Liu"}, {"name": "Xiaopeng Li"}, {"name": "Zhen Liu"}, {"name": "Zhenyu Li"}], "author_count": 4}, {"id": "2606.16854", "category": "quant-ph", "title": "3D Ising criticality with Platonic lattice superconducting qubits", "abstract": "The three-dimensional (3D) Ising model is a foundational model in statistical physics and critical phenomena, yet its analytical intractability has long impeded the precise determination of universal critical exponents. While high-precision estimates have been obtained through classical numerical methods and conformal bootstrap techniques, a direct quantum simulation of the 3D Ising criticality remains challenging, requiring nontrivial connectivity, sufficient system size, and high spectral resolution. In this work, assisted by the state-operator correspondence of conformal field theory, we perform a digital quantum simulation of the 3D Ising critical exponents using a multiply-connected 9-qubit superconducting quantum processor with a Platonic lattice geometry. Employing an extended variational quantum eigensolver equipped with a phase-based loss function, we variationally prepare the low-energy eigenstates of the transverse-field Ising model on a cubic Platonic lattice encoded in an 8-qubit register. The four lowest eigenenergies are extracted via Fourier-transform analysis and high-precision numerical fitting, agreeing with the exact diagonalization values up to +/- 0.001. The resulting scaling dimension Delta_epsilon = 1.5850 and critical exponent nu = 0.7067 match well with theory.", "url": "https://arxiv.org/abs/2606.16854", "type": "理论+数值", "summary": "三维 (3D) 伊辛模型是统计物理和临界现象的基础模型，但其分析的棘手性长期以来阻碍了通用临界指数的精确确定。虽然通过经典数值方法和共形自举技术获得了高精度估计，但 3D Ising 临界点的直接量子模拟仍然具有挑战性，需要非凡的连接性、足够的系统尺寸和高光谱分辨率。在这项工作中，在共形场论的状态算子对应的帮助下，我们使用具有柏拉图晶格几何结构的多重连接 9 量子位超导量子处理器对 3D Ising 临界指数进行了数字量子模拟。采用配备基于相位损失函数的扩展变分量子本征解算器，我们在 8 量子位寄存器中编码的立方柏拉图晶格上以变分方式准备横向场 Ising 模型的低能本征态。通过傅里叶变换分析和高精度数值拟合提取四个最低本征能，与高达 +/- 0.001 的精确对角化值一致。\n\n得到的缩放维度 Delta_epsilon = 1.5850 和临界指数 nu = 0.7067 与理论吻合良好。", "authors": [{"name": "Liyang Sui"}, {"name": "Hong-Hao Song"}, {"name": "Sainan Huai"}, {"name": "Yufan Li"}, {"name": "Zhiwen Zong"}, {"name": "Kunliang Bu"}, {"name": "Xiaopei Yang"}, {"name": "Xingrui Liu"}, {"name": "Wenyan Jin"}, {"name": "Bowen Chen"}, {"name": "Xutao Zhang"}, {"name": "Jianlan Wu"}, {"name": "Yicong Zheng"}, {"name": "Shengyu Zhang"}, {"name": "Gang v. Chen"}, {"name": "Yi Yin"}], "featured_authors": [{"name": "Liyang Sui"}, {"name": "Hong-Hao Song"}, {"name": "Sainan Huai"}, {"name": "Shengyu Zhang"}, {"name": "Gang v. Chen"}, {"name": "Yi Yin"}], "author_count": 16}, {"id": "2606.16865", "category": "quant-ph", "title": "Morphology-resolved scrambling in a chaotic quantum billiard", "abstract": "Chaotic quantum systems can retain spatial memory through scarred eigenstates, but whether these static structures control scrambling remains unclear. This work establishes a morphology-resolved connection between scarred eigenstates and eigenstate-resolved OTOCs in a peanut-shaped quantum billiard. Scalar localisation diagnostics, including differential entropy and continuum participation ratios, detect anomalous concentration but discard spatial architecture. A scale-normalised density overlap, in contrast, directly compares probability density profiles, revealing families of orthogonal eigenstates with nearly identical spatial morphology. Comparing the complete OTOC time traces of these orthogonal eigenstates reveals that morphological recurrence has dynamical content: moderate density overlap yields no universal prediction, whereas strongly recurring morphologies exhibit nearly identical OTOC growth and saturation. Thus, scarred structures act as spatial templates for operator growth, not merely static violations of ergodicity. This morphology-resolved framework turns eigenstate shape into a quantitative predictor of scrambling and provides a scale-controlled diagnostic of weak ergodicity breaking in quantum chaos.", "url": "https://arxiv.org/abs/2606.16865", "type": "数值", "summary": "混沌量子系统可以通过伤痕累累的本征态保留空间记忆，但这些静态结构是否控制扰乱仍不清楚。这项工作在花生形量子台球中的疤痕本征态和本征态解析的 OTOC 之间建立了形态解析的联系。标量定位诊断，包括微分熵和连续体参与比，检测异常浓度，但丢弃空间结构。相反，尺度归一化密度重叠直接比较概率密度分布，揭示具有几乎相同空间形态的正交本征态族。比较这些正交本征态的完整 OTOC 时间轨迹表明，形态重现具有动态内容：中等密度重叠不会产生通用预测，而强烈重现的形态表现出几乎相同的 OTOC 生长和饱和度。因此，疤痕结构充当算子增长的空间模板，而不仅仅是遍历性的静态违反。\n\n这种形态解析框架将本征态形状转变为扰乱的定量预测器，并提供量子混沌中弱遍历性破坏的尺度控制诊断。", "authors": [{"name": "Pranaya Pratik Das"}], "featured_authors": [{"name": "Pranaya Pratik Das"}], "author_count": 1}, {"id": "2606.16945", "category": "quant-ph", "title": "Counterdiabatic Raman Atom Optics for Compact High-Sensitivity Gravimetry", "abstract": "Large-momentum-transfer (LMT) atom interferometry provides a route toward enhanced inertial sensitivity in compact quantum sensors, but its scalability is limited by the accumulation of pulse-transfer errors across long Raman pulse sequences. We investigate theoretically the use of stimulated Raman shortcut-to-adiabatic passage (STIRSAP) for high-fidelity LMT atom optics in a Mach--Zehnder interferometer geometry. The counterdiabatic correction is encoded directly into the Raman pulse envelopes, eliminating the need for auxiliary microwave or radio-frequency control fields. Numerical simulations based on an effective Raman model show that $1~\\mu\\mathrm{s}$ STIRSAP pulses achieve single-pulse transfer fidelities of $F_\\pi = 0.99902$ while maintaining negligible pulse-time overhead even at high momentum order. We analyze the resulting tradeoff between interferometric phase enhancement and compound contrast decay and identify an unconstrained shot-noise optimum near $n\\approx270$. The analysis further shows that practical operation at extreme LMT order is constrained by wave-packet separation, vibration noise, Doppler detuning, and accumulated systematic effects rather than by pulse duration itself. These results establish superadiabatic Raman control as a promising approach for scalable high-fidelity atom optics and clarify the physical limitations governing compact high-order atom interferometers.", "url": "https://arxiv.org/abs/2606.16945", "type": "理论+数值", "summary": "大动量转移（LMT）原子干涉测量为增强紧凑型量子传感器的惯性灵敏度提供了一条途径，但其可扩展性受到长拉曼脉冲序列上脉冲转移误差累积的限制。我们从理论上研究了受激拉曼绝热捷径 (STIRSAP) 在马赫-曾德干涉仪几何结构中用于高保真 LMT 原子光学的用途。反绝热校正直接编码到拉曼脉冲包络中，无需辅助微波或射频控制场。基于有效拉曼模型的数值模拟表明，$1~\\mu\\mathrm{s}$ STIRSAP 脉冲实现了 $F_\\pi = 0.99902$ 的单脉冲传输保真度，同时即使在高动量阶数下也能保持可忽略不计的脉冲时间开销。我们分析了干涉相位增强和复合对比度衰减之间的权衡，并确定了接近 $n\\approx270$ 的无约束散粒噪声最佳值。\n\n分析进一步表明，极端 LMT 阶数的实际操作受到波包分离、振动噪声、多普勒失谐和累积系统效应的限制，而不是脉冲持续时间本身。这些结果确立了超绝热拉曼控制作为可扩展的高保真原子光学的一种有前途的方法，并阐明了控制紧凑型高阶原子干涉仪的物理限制。", "authors": [{"name": "Asad Ali"}, {"name": "Hamid Arian Zad"}, {"name": "Saif Al-Kuwari"}, {"name": "Muhammad Irtiza Hussain"}, {"name": "Muhammad Talha Rahim"}, {"name": "Hashir Kuniyil"}, {"name": "Tim Byrnes"}, {"name": "James Q. Quach"}, {"name": "Saeed Haddadi"}], "featured_authors": [{"name": "Asad Ali"}, {"name": "Hamid Arian Zad"}, {"name": "Saif Al-Kuwari"}, {"name": "Tim Byrnes"}, {"name": "James Q. Quach"}, {"name": "Saeed Haddadi"}], "author_count": 9}, {"id": "2606.16959", "category": "quant-ph", "title": "Diagonal-Budgeted Trotterization for Efficient Quantum Hamiltonian Simulation", "abstract": "Efficient classical simulation of quantum Hamiltonian dynamics is often bottlenecked by exponential state growth and the overhead of generic sparse linear algebra. We introduce diagonal-budgeted Trotterization, a structure-aware strategy that decomposes Hamiltonians into factors preserving diagonal sparsity while tightly controlling fidelity loss. Our implementation, HamSim, utilizes a compact diagonal-sparse data layout and specialized C++/CUDA kernels to bypass the overheads of generic formats like CSR. By leveraging SIMD vectorization, multithreading, and GPU acceleration, HamSim achieves high performance across heterogeneous architectures. Benchmarks on the HamLib suite show that HamSim significantly outperforms Qiskit-Aer. On CPUs, HamSim attains speedups of $182$--$1,269\\times$ on optimization instances (TSP, MaxCut) and $4.8$--$841\\times$ on physical models (TFIM, Heisenberg). On GPUs, it achieves up to $178\\times$ speedup for $12$--$16$ qubit problems. Unlike traditional Trotterization, HamSim maintains near-perfect fidelity without requiring exponential steps. This demonstrates that diagonal-aware numerical kernels provide a scalable foundation for high-fidelity classical Hamiltonian simulation.", "url": "https://arxiv.org/abs/2606.16959", "type": "理论+数值", "summary": "量子哈密顿动力学的高效经典模拟通常受到指数状态增长和通用稀疏线性代数开销的瓶颈。我们引入对角预算 Trotterization，这是一种结构感知策略，它将哈密顿量分解为保持对角线稀疏性的因子，同时严格控制保真度损失。我们的实现 HamSim 利用紧凑的对角稀疏数据布局和专门的 C++/CUDA 内核来绕过 CSR 等通用格式的开销。通过利用 SIMD 矢量化、多线程和 GPU 加速，HamSim 跨异构架构实现了高性能。 HamLib 套件的基准测试表明 HamSim 的性能明显优于 Qiskit-Aer。在 CPU 上，HamSim 在优化实例（TSP、MaxCut）上实现了 $182$--$1,269\\times$ 的加速，在物理模型（TFIM、Heisenberg）上实现了 $4.8$-$841\\times$ 的加速。在 GPU 上，它可以为 12$--16$ 量子位问题实现高达 178\\times$ 的加速。与传统的 Trotterization 不同，HamSim 无需指数级步骤即可保持近乎完美的保真度。\n\n这表明对角感知数值内核为高保真经典哈密顿模拟提供了可扩展的基础。", "authors": [{"name": "Srikar Chundury"}, {"name": "Blake Burgstahler"}, {"name": "Jiajia Li"}, {"name": "In-Saeng Suh"}, {"name": "Frank Mueller"}], "featured_authors": [{"name": "Srikar Chundury"}, {"name": "Blake Burgstahler"}, {"name": "Jiajia Li"}, {"name": "In-Saeng Suh"}, {"name": "Frank Mueller"}], "author_count": 5}, {"id": "2606.17036", "category": "quant-ph", "title": "Grid-state deformation in a no-jump non-Hermitian bosonic dimer", "abstract": "We study the no-jump evolution of ideal grid states in a lossy bosonic dimer with differential decay. The effective non-Hermitian quadratic dynamics induces a complex symplectic flow in phase space that deforms both the primitive lattice vectors and the origin seed. The average decay rate controls common attenuation, while coherent hopping and differential decay control the reduced dimer deformation. The reduced sector contains elliptic, parabolic, and hyperbolic regimes with imaginary spectra, an exceptional point, and real spectra, producing oscillatory, linear, and exponential lattice deformations. Although projected lattice areas can change, the deformation comes from a determinant-one complex symplectic flow on the full four-dimensional phase space. For a Gaussian regularization of the origin seed, we derive the associated complex width matrix and identify the positivity conditions that preserve Gaussian form. For an initial two-mode qunaught product state, the lossless limit recovers the standard beam-splitter generation of a square GKP$+$ Bell pair, while the no-jump dynamics produces its non-Hermitian deformation with a postselection cost set by the no-jump probability.", "url": "https://arxiv.org/abs/2606.17036", "type": "理论", "summary": "我们研究了具有差分衰​​减的有损玻色子二聚体中理想网格状态的无跳跃演化。有效的非厄米二次动力学在相空间中引起复杂的辛流，使原始晶格向量和原始种子变形。平均衰减率控制共同衰减，而相干跳跃和差异衰减控制减少的二聚体变形。缩减扇区包含椭圆、抛物线和双曲区域，具有虚谱、特异点和实谱，产生振荡、线性和指数晶格变形。尽管投影晶格面积可以改变，但变形来自全四维相空间上的行列式一复辛流。对于原始种子的高斯正则化，我们导出相关的复宽度矩阵并确定保留高斯形式的正性条件。对于初始的双模 qunaught 产品状态，无损极限恢复方形 GKP$+$ Bell 对的标准分束器生成，而无跳跃动力学产生其非厄米变形，其后选择成本由无跳跃概率设置。", "authors": [{"name": "B. M. Rodriguez-Lara"}, {"name": "H. Ghaemi-Dizicheh"}, {"name": "S. Dehdashti"}, {"name": "A. Hanke"}, {"name": "A. Touhami"}, {"name": "J. Nötzel"}], "featured_authors": [{"name": "B. M. Rodriguez-Lara"}, {"name": "H. Ghaemi-Dizicheh"}, {"name": "S. Dehdashti"}, {"name": "A. Hanke"}, {"name": "A. Touhami"}, {"name": "J. Nötzel"}], "author_count": 6}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
