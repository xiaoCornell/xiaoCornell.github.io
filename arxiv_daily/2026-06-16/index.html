nately, one of the obtained field equations does not coincide with that derived in the original paper of the Einstein-Grisaru-Zanon gravity due to a gap between higher-order derivative terms. However, our de Sitter solution is still identical to one solved in the original paper of the Einstein-Grisaru-Zanon gravity due to the vanishing of the gap. Furthermore, a stability analysis based on the dynamical system method is performed to indicate that the obtained de Sitter solution is always unstable, no matter it presents an inflationary phase or expanding phase of universe. This result confirms the validity of stability investigation carried out in the original paper of the Einstein-Grisaru-Zanon gravity.", "url": "https://arxiv.org/abs/2606.15119", "type": "理论", "summary": "在本文中，我们想研究爱因斯坦-格里萨鲁-扎农引力中德西特解的稳定性，这是最近在一篇论文中考虑的一种新颖的四阶引力模型 [Phys.莱特。 B {\\bf 855}（2024）138811]。因此，我们能够利用基于欧拉-拉格朗日方程的有效方法推导相应的爱因斯坦-格里萨鲁-扎农引力场方程。不幸的是，由于高阶导数项之间存在差距，所获得的场方程之一与爱因斯坦-格里萨鲁-扎农引力的原始论文中导出的场方程并不相符。然而，由于间隙消失，我们的德西特解仍然与爱因斯坦-格里萨鲁-扎农引力原始论文中解的解相同。此外，基于动力系统方法的稳定性分析表明，无论呈现宇宙膨胀阶段还是膨胀阶段，所获得的德西特解总是不稳定的。这一结果证实了爱因斯坦-格里萨鲁-扎农引力的原始论文中进行的稳定性研究的有效性。", "authors": [{"name": "Tuan Q. Do"}], "featured_authors": [{"name": "Tuan Q. Do"}], "author_count": 1}, {"id": "2606.15173", "category": "hep-th", "title": "The Holographic Multi-Entropy Cone", "abstract": "We generalize the holographic entropy cone (HEC) to the holographic multi-entropy cone (HMEC) by adjoining multi-entropy coordinates to the standard bipartition entropy coordinates. We show that holographic states, through their multi-entropy vectors, form a rational polyhedral cone in multi-entropy space, and multicontraction maps provide exact certificates for holographic multi-entropy inequalities (HMEIs). We determine all facets of the $n=3,4$ HMECs, where $n$ includes the purifier, and obtain seven fundamental HMEI orbits: two for $n=3$ and five for $n=4$. We further propose two structural conjectures: HEC facet inequalities are convex combinations of HMEC facet inequalities, and HMEC facets obey a balanced-but-not-too-balanced principle.", "url": "https://arxiv.org/abs/2606.15173", "type": "理论", "summary": "我们通过将多熵坐标与标准二分熵坐标相邻，将全息熵锥（HEC）推广到全息多熵锥（HMEC）。我们证明全息态通过其多熵向量在多熵空间中形成有理多面体锥体，并且多重收缩图为全息多熵不等式（HMEI）提供了精确的证明。我们确定 $n=3,4$ HMEC 的所有方面，其中 $n$ 包括净化器，并获得七个基本 HMEI 轨道：两个用于 $n=3$，五个用于 $n=4$。我们进一步提出两个结构猜想：HEC 面不等式是 HMEC 面不等式的凸组合，并且 HMEC 面遵循平衡但不太平衡的原则。", "authors": [{"name": "Xin-Xiang Ju"}, {"name": "Yang Zhao"}], "featured_authors": [{"name": "Xin-Xiang Ju"}, {"name": "Yang Zhao"}], "author_count": 2}, {"id": "2606.15261", "category": "hep-th", "title": "On the Schubert calculus of the quantum K-theory for partial flag manifolds: a 3d A-model perspective", "abstract": "We further investigate the 3d gauged linear sigma model (GLSM)/quantum K-theory correspondence for partial flag manifolds $X \\equiv {\\rm Fl}(\\boldsymbol{k};n)$. This is a 3d uplift of the 2d GLSM/quantum cohomology correspondence with the 3d theory compactified on $\\mathbb{R}^2\\times S^1_\\beta$. Recently, a set of half-BPS line operators, called Schubert line defects, were constructed that correspond to the Schubert classes in the K-theory ring of $X$. Utilizing algebro-geometric algorithms, we compute $2$-point and $3$-point correlation functions of these line operators in the 3d A-model regime of the theory. These are interpreted as genus-$0$ K-theoretic Gromov--Witten invariants, and they produce the K-theoretic Littlewood--Richardson coefficients of the quantum K-theory ring of $X$. We show how this works explicitly in examples. Taking the small $\\beta$ limit, we apply these techniques to the resulting 2d GLSM. We explicitly compute the quantum cohomology ring relations of $X$ for some cases and match with existing results in the literature in examples.", "url": "https://arxiv.org/abs/2606.15261", "type": "理论", "summary": "我们进一步研究了部分标志流形 $X \\equiv {\\rm Fl}(\\boldsymbol{k};n)$ 的 3d 计量线性 sigma 模型 (GLSM)/量子 K 理论对应关系。这是 2d GLSM/量子上同调对应关系与在 $\\mathbb{R}^2\\times S^1_\\beta$ 上压缩的 3d 理论的 3d 提升。最近，构造了一组半 BPS 线算子，称为舒伯特线缺陷，对应于 $X$ 的 K 理论环中的舒伯特类。利用代数几何算法，我们在理论的 3d A 模型体系中计算这些线算子的 $2$ 点和 $3$ 点相关函数。这些被解释为 genus-$0$ K 理论 Gromov-Witten 不变量，并且它们产生 $X$ 量子 K 理论环的 K 理论 Littlewood-Richardson 系数。我们在示例中明确展示了它是如何工作的。考虑到较小的 $\\beta$ 限制，我们将这些技术应用于生成的 2d GLSM。我们明确计算了某些情况下 $X$ 的量子上同调环关系，并与示例中文献中的现有结果相匹配。", "authors": [{"name": "Zhihao Duan"}, {"name": "Osama Khlaif"}, {"name": "Hao Zou"}], "featured_authors": [{"name": "Zhihao Duan"}, {"name": "Osama Khlaif"}, {"name": "Hao Zou"}], "author_count": 3}, {"id": "2606.15270", "category": "hep-th", "title": "Generalized Schwarzian Dynamics from a Bulk-First BF Perspective", "abstract": "We investigate the emergence of generalized Schwarzian dynamics from a bulk-first BF perspective. Starting from two-dimensional BF gravity, we analyze the associated boundary phase space and its Drinfeld-Sokolov reductions. For the sl(2,R) theory, we recover the ordinary Schwarzian action as the reduced boundary dynamics arising from a particular sector of the BF asymptotic phase space. We then extend this construction to sl(3,R), where the reduced dynamics is governed by the second and third Wilczynski invariants, providing a natural higher-rank generalization of the Schwarzian derivative. In this framework, generalized Schwarzian dynamics emerges directly from flat BF connections and their companion forms rather than being introduced as an independent boundary theory. We further relate the resulting projective invariants to Casimir charges, monodromy data, and generalized Schwarzian thermodynamics, including monodromy spectra and semiclassical thermodynamics. In particular, constant projective invariants determine the corresponding Casimir sectors and monodromy data, which in turn organize the thermodynamic structure of the theory. Our results provide a unified bulk-first description of Schwarzian and generalized Schwarzian dynamics and reveal a direct link between BF gravity, asymptotic symmetry reductions, projective geometry, and boundary thermodynamics.", "url": "https://arxiv.org/abs/2606.15270", "type": "理论", "summary": "我们从体优先 BF 的角度研究了广义施瓦茨动力学的出现。从二维 BF 引力出发，我们分析了相关的边界相空间及其 Drinfeld-Sokolov 约简。对于 sl(2,R) 理论，我们将普通施瓦茨作用恢复为 BF 渐近相空间特定扇区产生的简化边界动力学。然后，我们将此构造扩展到 sl(3,R)，其中简化的动力学由第二个和第三个 Wilczynski 不变量控制，从而提供 Schwarzian 导数的自然高阶概括。在此框架中，广义施瓦茨动力学直接从平面 BF 连接及其伴生形式中产生，而不是作为独立的边界理论引入。我们进一步将所得的射影不变量与卡西米尔电荷、一元数据和广义施瓦茨热力学（包括一元光谱和半经典热力学）联系起来。特别是，恒定的射影不变量决定了相应的卡西米尔扇区和单峰数据，这反过来又组织了理论的热力学结构。\n\n我们的结果提供了施瓦茨动力学和广义施瓦茨动力学的统一体优先描述，并揭示了 BF 引力、渐近对称性约简、射影几何和边界热力学之间的直接联系。", "authors": [{"name": "H. T. Özer"}, {"name": "Aytül Filiz"}], "featured_authors": [{"name": "H. T. Özer"}, {"name": "Aytül Filiz"}], "author_count": 2}, {"id": "2606.15562", "category": "hep-th", "title": "Quantum Corrections to Page Curve of Charged Near-AdS$_2$ Black Holes", "abstract": "We study the evaporation and Page curve of charged near-AdS$_2$ black holes coupled to a non-gravitating bath at fixed temperature and chemical potential. The low-energy dynamics is governed by the Schwarzian reparametrization mode together with a $U(1)$ phase mode. We average the boundary energy and the outgoing flux over these two soft modes and obtain corrected balance equations for the temperature and chemical potential. We then use the corrected background to calculate the no-island and island entropies and the Page time shifts. We find that the two soft sectors affect the Page transition in our low-temperature semiclassical regime. The $U(1)$ phase mode correction delays the Page transition, while the Schwarzian correction tends to move it earlier. The total Page time shift is therefore determined by the competition between the Schwarzian and $U(1)$ sectors.", "url": "https://arxiv.org/abs/2606.15562", "type": "理论", "summary": "我们研究了在固定温度和化学势下与非引力浴耦合的带电近 AdS$_2$ 黑洞的蒸发和佩奇曲线。低能动力学由 Schwarzian 重参数化模式和 $U(1)$ 相位模式控制。我们对这两种软模式的边界能量和输出通量进行平均，并获得温度和化学势的校正平衡方程。然后，我们使用校正后的背景来计算无岛和岛熵以及页面时间偏移。我们发现这两个软扇区影响低温半经典体系中的页面转变。 $U(1)$ 相位模式校正会延迟页面转换，而 Schwarzian 校正往往会使其提前移动。因此，总页时间偏移由 Schwarzian 和 $U(1)$ 扇区之间的竞争决定。", "authors": [{"name": "Zi-Qing Xiao"}], "featured_authors": [{"name": "Zi-Qing Xiao"}], "author_count": 1}, {"id": "2606.15661", "category": "hep-th", "title": "Strong primordial inhomogeneities of axion-like field in Einstein-Gauss-Bonnet gravity", "abstract": "In this paper we consider complex scalar field with Mexican hat potential coupled with Gauss-Bonnet scalar resulting in restored U(1) symmetry at the stage of inflation, corresponding to the modern cosmological horizon. In our model, the phase transition takes place during inflation, avoiding large-scale axion isocurvature perturbations. Our model provides strong primordial inhomogeneities on small scales and ultra-light axion-like particle as either a fuzzy dark matter candidate or a candidate for inhomogeneous dark energy. We also study the possibility of black hole formation and gravitational wave background in this scenario. We find that in the case when the symmetry breaking field does not backreact on inflation, black hole production is not feasible. However, under specific conditions, gravitational waves fitting the NANOGrav band can be obtained.", "url": "https://arxiv.org/abs/2606.15661", "type": "理论", "summary": "在本文中，我们考虑具有墨西哥帽势的复标量场与高斯-博内特标量相结合，从而在暴涨阶段恢复 U(1) 对称性，对应于现代宇宙视界。在我们的模型中，相变发生在暴胀期间，避免了大规模轴子等曲率扰动。我们的模型在小尺度和超轻轴子状粒子上提供了强烈的原始不均匀性，作为模糊暗物质候选者或不均匀暗能量的候选者。我们还研究了这种情况下黑洞形成和引力波背景的可能性。我们发现，在对称破缺场不对暴胀产生反作用的情况下，黑洞的产生是不可行的。然而，在特定条件下，可以获得拟合NANOGrav波段的引力波。", "authors": [{"name": "M.A. Krasnov"}, {"name": "D.Z. Berkimbayev"}, {"name": "A. Addazi"}, {"name": "Y. Aldabergenov"}, {"name": "M.Y. Khlopov"}], "featured_authors": [{"name": "M.A. Krasnov"}, {"name": "D.Z. Berkimbayev"}, {"name": "A. Addazi"}, {"name": "Y. Aldabergenov"}, {"name": "M.Y. Khlopov"}], "author_count": 5}, {"id": "2606.15732", "category": "hep-th", "title": "Flat Gauging of Continuous (Non-invertible) Symmetries and Non-compact BF SymTFT for Compact Boson", "abstract": "We study flat gauging of continuous symmetries by summing over flat gauge-field configurations. We focus on the two-dimensional compact boson and construct the torus partition function with general flat $U(1)_M\\times U(1)_W$ backgrounds. We show that flat gauging either $U(1)_M$ or $U(1)_W$ decompactifies the theory to the non-compact free boson, and that the dual $\\mathbb{Z}$ background combines with the remaining $U(1)$ background into a non-compact $\\mathbb{R}$ symmetry background due to the mixed anomaly. We also revisit the self-dual radius, where flat gauging the diagonal $SO(3)\\subset (SU(2)_L\\times SU(2)_R)/\\mathbb{Z}_2$, first pointed out by Gaberdiel and Suchanek, gives the continuous orbifold which lies outside the usual $c=1$ moduli space. On the orbifold branch, we study finite and continuous non-invertible flat gaugings and explain why the continuous case requires a prescription for zero-measure fixed loci on the moduli space. Finally, we formulate the SymTFT of torus sigma models as a non-compact BF theory, whose topological boundary states encode the Narain moduli space and the $O(D,D;\\mathbb{Z})$ T-duality action.", "url": "https://arxiv.org/abs/2606.15732", "type": "理论", "summary": "我们通过对平坦规范场配置求和来研究连续对称性的平坦计量。我们关注二维紧致玻色子，并构造具有一般平坦 $U(1)_M\\times U(1)_W$ 背景的环面配分函数。我们表明，平面测量 $U(1)_M$ 或 $U(1)_W$ 将理论解压缩为非紧致自由玻色子，并且由于混合异常，对偶 $\\mathbb{Z}$ 背景与剩余的 $U(1)$ 背景结合成非紧致 $\\mathbb{R}$ 对称背景。我们还重新审视了自对偶半径，其中平面测量对角线 $SO(3)\\subset (SU(2)_L\\times SU(2)_R)/\\mathbb{Z}_2$，首先由 Gaberdiel 和 Suchanek 指出，给出了位于通常 $c=1$ 模空间之外的连续轨道折叠。在轨道分支上，我们研究了有限连续的不可逆平面测量，并解释了为什么连续情况需要模空间上零测量固定轨迹的规定。最后，我们将环面 sigma 模型的 SymTFT 表述为非紧 BF 理论，其拓扑边界状态编码 Narain 模空间和 $O(D,D;\\mathbb{Z})$ T 对偶作用。", "authors": [{"name": "Qiang Jia"}, {"name": "Yi Zhang"}], "featured_authors": [{"name": "Qiang Jia"}, {"name": "Yi Zhang"}], "author_count": 2}, {"id": "2606.15792", "category": "hep-th", "title": "Entanglement islands of 2D charged scalar-hairy black holes on the brane", "abstract": "We investigate the entanglement dynamics and Page curve of a 2D brane Maxwell-Scalar (MS) black hole coupled to thermal baths in double holography. Computing the entanglement entropy via the island formula, we find that injecting electric charge and scalar source into the system produce opposite effects: the former increases the degrees of freedom (DOF) on the brane by enhancing the effective global tension, thereby raising the saturation entropy of the system; conversely, the latter reduces the DOF on the brane by lowering the effective local tension near the IR geometry, ultimately suppressing the entanglement. Despite the non-trivial backreaction from the matter fields, the pre-saturation entanglement dynamics remain robust. We identify an early-time quadratic growth corresponding to the pre-local-thermalization phase, which smoothly transitions into a late-time linear growth. Furthermore, the scale of the Page time is governed by a competition between thermal excitations and the brane DOF. Higher temperatures accelerate the onset of the Page time by exciting more Hawking modes, while abundant DOF delay it by increasing the saturated entropy.", "url": "https://arxiv.org/abs/2606.15792", "type": "理论", "summary": "我们研究了双全息中与热浴耦合的二维膜麦克斯韦标量 (MS) 黑洞的纠缠动力学和佩奇曲线。通过岛公式计算纠缠熵，我们发现向系统中注入电荷和标量源会产生相反的效果：前者通过增强有效全局张力来增加膜上的自由度（DOF），从而提高系统的饱和熵；相反，后者通过降低红外几何结构附近的有效局部张力来减少膜上的自由度，最终抑制纠缠。尽管物质场产生了不小的反反应，但预饱和纠缠动力学仍然强劲。我们确定了与局部热化前阶段相对应的早期二次增长，该阶段顺利过渡到后期线性增长。此外，页面时间的大小由热激发和膜自由度之间的竞争决定。较高的温度通过激发更多的霍金模式来加速页面时间的开始，而丰富的自由度通过增加饱和熵来延迟它。", "authors": [{"name": "Qingsong Li"}, {"name": "Yuxuan Liu"}, {"name": "Wenjie Zhu"}], "featured_authors": [{"name": "Qingsong Li"}, {"name": "Yuxuan Liu"}, {"name": "Wenjie Zhu"}], "author_count": 3}, {"id": "2606.15794", "category": "hep-th", "title": "An integrable deformation of the sine(sinh)-Gordon model -- Malcev algebra", "abstract": "In this paper we present an integrable model in two dimensions. It is a deformation of the sine(sinh)-Gordon model. We give its Lax connection. We also obtain its (classical) $r$-matrix. It satisfies the classical Yang-Baxter equation. Thus, the model is a classical integrable field theory in two dimensions. The underlying algebra is a ${\\cal Z}$-graded non-Lie Malcev algebra. It is a direct sum of $sl(2, {\\rm I\\!R})$ Lie algebras with a shared common Cartan. A Malcev algebra is the tangent space at the identity of an analytic Moufang loop as a Lie algebra is the tangent space at the identity of a Lie group. We expect the model to be integrable at the quantum level. We also give a family of classically integrable models which are related to the Poisson-Boltzmann equation in two dimensions.", "url": "https://arxiv.org/abs/2606.15794", "type": "理论", "summary": "在本文中，我们提出了一个二维可积模型。它是 sine(sinh)-Gordon 模型的变形。我们给出其宽松的联系。我们还获得了它的（经典）$r$-矩阵。它满足经典的Yang-Baxter方程。因此，该模型是经典的二维可积场论。底层代数是 ${\\cal Z}$ 分级的非李马尔切夫代数。它是具有共享公共嘉当的 $sl(2, {\\rm I\\!R})$ 李代数的直和。马尔切夫代数是解析 Moufang 环恒等式处的切空间，正如李代数是李群恒等式处的切空间一样。我们期望该模型在量子水平上可积。我们还给出了一系列与二维泊松-玻尔兹曼方程相关的经典可积模型。", "authors": [{"name": "Meseret Asrat"}], "featured_authors": [{"name": "Meseret Asrat"}], "author_count": 1}, {"id": "2606.15988", "category": "hep-th", "title": "Dressed Fock Spaces in Gauge Theory and Gravity", "abstract": "Four-dimensional gauge and gravitational theories exhibit long-range interactions that require asymptotic particles to be dressed by clouds of soft photons and gravitons. Faddeev-Kulish dressings render scattering amplitudes infrared-finite, but the resulting multi-particle states do not factorise into tensor products of dressed one-particle states. We show that this loss of Fock-space factorisation is not fundamental, but reflects an inappropriate choice of infrared variables. The real soft divergence is reproduced by the Goldstone modes of asymptotic symmetries, while the Coulomb phase is reproduced by new zero modes of the radiative fields that we introduce here. In these variables, infrared-finite dressed multi-particle states admit the usual Fock-space factorisation into single-particle dressed states.", "url": "https://arxiv.org/abs/2606.15988", "type": "理论", "summary": "四维规范和引力理论表现出长程相互作用，需要渐近粒子被软光子和引力子云装饰。 Faddeev-Kulish 敷料使散射振幅为红外有限，但所得的多粒子态不会因式分解为经过敷料的单粒子态的张量积。我们证明福克空间分解的这种损失不是根本性的，而是反映了红外变量的不适当选择。真正的软发散由渐近对称的戈德斯通模式再现，而库仑相位由我们在此介绍的辐射场的新零模式再现。在这些变量中，红外有限修饰的多粒子状态允许通常的福克空间因式分解为单粒子修饰状态。", "authors": [{"name": "Sangmin Choi"}, {"name": "Prahar Mitra"}], "featured_authors": [{"name": "Sangmin Choi"}, {"name": "Prahar Mitra"}], "author_count": 2}, {"id": "2606.16024", "category": "hep-th", "title": "The O(4)-breaking bubble", "abstract": "False vacuum decay in field theory is thought to be dominated by Coleman's O(4)-symmetric bounce, the minimum action nontrivial solution of the imaginary time equations of motion. Beyond the bounce, non-constructive existence proofs of O(4)-breaking solutions are available in the mathematics literature, but the solutions themselves, and their physics, have remained unknown. Considering the simple, bounded-below, scalar field potential $V(\\phi)=\\frac{m^2}{2}\\phi^2-\\frac{\\lambda}{4}\\phi^4+\\frac{g}{6}\\phi^6$, we construct a nonradial solution explicitly: two bubble-tubes of opposite sign wrapping orthogonal rings, invariant under ${\\rm O}(2)\\times{\\rm O}(2)$ rotations combined with a parity that exchanges the rings. The solution admits valid Cauchy data for real time evolution from a $t=0$ slice, and supports an odd number of unstable deformation modes.", "url": "https://arxiv.org/abs/2606.16024", "type": "理论", "summary": "场论中的假真空衰变被认为是由科尔曼的 O(4) 对称弹跳主导，这是运动虚数时间方程的最小作用非平凡解。除了反弹之外，数学文献中还提供了 O(4) 破坏解的非构造性存在证明，但解本身及其物理原理仍然未知。考虑到简单的下界标量场势 $V(\\phi)=\\frac{m^2}{2}\\phi^2-\\frac{\\lambda}{4}\\phi^4+\\frac{g}{6}\\phi^6$，我们显式构造一个非径向解：两个符号相反的气泡管包裹正交环，在 ${\\rm O}(2)\\times{\\rm O}(2)$ 旋转下不变，并结合交换环的奇偶校验。该解决方案允许从 $t=0$ 切片进行实时演化的有效柯西数据，并支持奇数个不稳定变形模式。", "authors": [{"name": "Guy Avraham"}, {"name": "Kfir Blum"}, {"name": "Omri Rosner"}, {"name": "Isaac G. Smith"}], "featured_authors": [{"name": "Guy Avraham"}, {"name": "Kfir Blum"}, {"name": "Omri Rosner"}, {"name": "Isaac G. Smith"}], "author_count": 4}, {"id": "2606.16406", "category": "hep-th", "title": "Effect of $ξRϕ^2$ non-minimal coupling on gravitational light bending", "abstract": "We investigate the bending of massless fields by a massive object in the presence of a curvature-scalar $\\sqrt{-g}\\xi R \\phi^2$ non-minimal coupling up to one loop, using the perturbative quantum gravity computations. It is well known that without such coupling a self interacting scalar field theory cannot be renormalised in the presence of gravity. The massive object is modelled by a massive scalar $\\phi$, and it is assumed to be non-relativistic, e.g., a star. We compute the 2-2 scattering of massless scalar and photons off this object via graviton exchanges. Assuming both $\\xi$ and the bending angle to be small, we use the eikonal approximation to compute the angle up to ${\\cal O}(\\xi G^2)$. At tree level $({\\cal O}(\\xi G))$ we find no bending, and hence the ${\\cal O}(\\xi G^2)$ result happens to be leading in this case. The non-minimal vertices are qualitatively different from that of the standard minimal ones, e.g. $ \\sqrt{G} h_{\\mu\\nu} T^{\\mu\\nu}$, as the former contains explicit momenta of the gravitons instead of the scalar, complementing the second. The bending angle is found to behave like $\\sim b^{-7}$, where $b$ is the impact parameter. We have emphasised the qualitative differences of our results from that of the well studied minimal case.", "url": "https://arxiv.org/abs/2606.16406", "type": "理论", "summary": "我们使用微扰量子引力计算，研究在曲率标量 $\\sqrt{-g}\\xi R \\phi^2$ 非最小耦合到一个环的情况下，大质量物体对无质量场的弯曲。众所周知，如果没有这种耦合，自相互作用标量场理论就无法在重力存在的情况下重整化。大质量物体由大质量标量 $\\phi$ 建模，并且假定它是非相对论性的，例如恒星。我们通过引力子交换计算该物体的无质量标量和光子的 2-2 散射。假设 $\\xi$ 和弯曲角度都很小，我们使用 eikonal 近似来计算最大 ${\\cal O}(\\xi G^2)$ 的角度。在树级别 $({\\cal O}(\\xi G))$ 我们发现没有弯曲，因此 ${\\cal O}(\\xi G^2)$ 结果恰好在这种情况下领先。非最小顶点与标准最小顶点有质的不同，例如$ \\sqrt{G} h_{\\mu\\nu} T^{\\mu\\nu}$，因为前者包含引力子的显式动量而不是标量，补充了第二个。发现弯曲角度的行为类似于 $\\sim b^{-7}$，其中 $b$ 是冲击参数。\n\n我们强调了我们的结果与经过充分研究的最小案例的质量差异。", "authors": [{"name": "Ayan Kumar Naskar"}, {"name": "Avijit Sen Majumder"}, {"name": "Sourav Bhattacharya"}], "featured_authors": [{"name": "Ayan Kumar Naskar"}, {"name": "Avijit Sen Majumder"}, {"name": "Sourav Bhattacharya"}], "author_count": 3}, {"id": "2606.16444", "category": "hep-th", "title": "Complexified Virasoro Flow and the Logarithmic Graviton at the Chiral Point", "abstract": "At the chiral point of topologically massive gravity, the massive graviton becomes degenerate with the left-moving graviton, leading to the appearance of a logarithmic mode and a corresponding rank-two Jordan structure. This logarithmic graviton plays a central role in the conjectured AdS$_3$/LCFT$_2$ correspondence, where it has been widely interpreted as the bulk counterpart of a logarithmic partner in the putative boundary logarithmic conformal field theory. In this work, we develop a geometric interpretation of this Jordan structure based on complexified Virasoro evolution. Starting from the logarithmic graviton of Grumiller and Johansson, we show that its logarithmic coefficient \\[ y(\\tau,\\rho) = -i\\tau-\\ln\\cosh\\rho \\] admits, near the AdS$_3$ boundary, the asymptotic form \\[ y(\\tau,\\rho) = -s+\\ln2+\\mathcal O(e^{-2\\rho}), \\qquad s=\\rho+i\\tau. \\] The same complex parameter naturally appears in the exponentiation of the Virasoro generator $L_0$ acting on a rank-two Jordan cell, \\[ L_0=h\\mathbf1+N, \\qquad N^2=0, \\] for which \\[ e^{sL_0} = e^{sh}(1+sN). \\] We show that the resulting Jordan evolution reproduces the characteristic logarithmic mixing of the logarithmic sector, while analytic continuation $s\\rightarrow s+2\\pi i$ generates the corresponding logarithmic monodromy. From this perspective, radial evolution, temporal evolution, Jordan mixing, and logarithmic monodromy may be viewed as different manifestations of a single complexified Virasoro flow. The analysis suggests a geometric interpretation of the indecomposable structures characteristic of logarithmic conformal field theory and offers a new perspective on the logarithmic graviton within the conjectural AdS$_3$/LCFT$_2$ framework.", "url": "https://arxiv.org/abs/2606.16444", "type": "理论", "summary": "在拓扑大质量引力的手征点，大质量引力子随着左移引力子而退化，导致对数模式和相应的二阶乔丹结构的出现。这种对数引力子在推测的 AdS$_3$/LCFT$_2$ 对应关系中起着核心作用，它被广泛解释为假定边界对数共形场论中对数伙伴的体块对应物。在这项工作中，我们基于复杂的维拉索罗演化对乔丹结构进行了几何解释。从 Grumiller 和 Johansson 的对数引力子开始，我们证明它的对数系数 \\[ y(\\tau,\\rho) = -i\\tau-\\ln\\cosh\\rho \\] 在 AdS$_3$ 边界附近承认渐近形式 \\[ y(\\tau,\\rho) = -s+\\ln2+\\mathcal O(e^{-2\\rho})， \\qquad s=\\rho+i\\tau。 \\] 相同的复数参数自然出现在作用于二级 Jordan 单元的 Virasoro 生成器 $L_0$ 的求幂中，\\[ L_0=h\\mathbf1+N, \\qquad N^2=0, \\] 其中 \\[ e^{sL_0} = e^{sh}(1+sN)。\n\n\\] 我们表明，由此产生的 Jordan 演化再现了对数扇区的特征对数混合，而解析延拓 $s\\rightarrow s+2\\pi i$ 生成相应的对数单峰。从这个角度来看，径向演化、时间演化、乔丹混合和对数单峰可以被视为单一复杂维拉索罗流的不同表现形式。该分析提出了对对数共形场论不可分解结构特征的几何解释，并在猜想的 AdS$_3$/LCFT$_2$ 框架内提供了对对数引力子的新视角。", "authors": [{"name": "Yannick Mvondo-She"}], "featured_authors": [{"name": "Yannick Mvondo-She"}], "author_count": 1}, {"id": "2606.16547", "category": "hep-th", "title": "Self-gravitating electromagnetic waves in the dark bubble model", "abstract": "We construct embeddings of gravitational and electromagnetic waves in the dark bubble scenario using pp-wave geometries in AdS5, motivated by the fact that pp-wave spacetimes often provide exact solutions to the equations of motion. The setup is realised by gluing two AdS5 pp-wave spacetimes across a three-brane. As an application, we analyse localised beams of light and their gravitational backreaction. Imposing suitable mixed boundary conditions in AdS5, we find gravitational corrections consistent with a weakening of 4d gravity at the 5d AdS scale.", "url": "https://arxiv.org/abs/2606.16547", "type": "理论", "summary": "我们使用 AdS5 中的 pp 波几何结构在暗气泡场景中构建引力波和电磁波的嵌入，其动机是 pp 波时空通常为运动方程提供精确的解。该装置是通过将两个 AdS5 pp 波时空粘合在一个三膜上来实现的。作为一个应用，我们分析局部光束及其重力反作用。在 AdS5 中施加适当的混合边界条件，我们发现重力修正与 5d AdS 尺度上 4d 重力的减弱一致。", "authors": [{"name": "Ulf Danielsson"}, {"name": "Daniel Panizo"}, {"name": "Vincent Van Hemelryck"}], "featured_authors": [{"name": "Ulf Danielsson"}, {"name": "Daniel Panizo"}, {"name": "Vincent Van Hemelryck"}], "author_count": 3}, {"id": "2606.16630", "category": "hep-th", "title": "The supergravity dual of a finite duality cascade", "abstract": "This proceedings contribution summarizes the main results of the original paper arXiv:2506.18988 . Cascading RG flows are characteristic of $\\mathcal{N}=1$ gauge theories realized by D3-branes probing singularities in the presence of fractional branes. A celebrated example is the Klebanov-Strassler model, which exhibits an infinite cascade that ends with confinement. In this work, we explore a related setup where the addition of an orientifold plane modifies the cascade structure: the RG flow now consists of a finite number of steps, originating from a UV fixed point with a finite number of degrees of freedom. We provide a supergravity solution dual to this flow, that reproduces all its salient features.", "url": "https://arxiv.org/abs/2606.16630", "type": "理论", "summary": "本论文集总结了原始论文 arXiv:2506.18988 的主要结果。级联 RG 流是 $\\mathcal{N}=1$ 规范理论的特征，通过 D3 膜在存在分数膜的情况下探测奇点而实现。一个著名的例子是 Klebanov-Strassler 模型，它展示了以限制结束的无限级联。在这项工作中，我们探索了一个相关的设置，其中添加东方平面修改了级联结构：RG 流现在由有限数量的步骤组成，源自具有有限自由度的 UV 固定点。我们提供了与该流动双重的超重力解决方案，重现了其所有显着特征。", "authors": [{"name": "Pietro Moroni"}], "featured_authors": [{"name": "Pietro Moroni"}], "author_count": 1}, {"id": "2606.16640", "category": "hep-th", "title": "Holographic study of heavy quark potential, free energy, and running coupling in backgrounds with broken translational symmetry", "abstract": "We study heavy-quark observables including static interquark potential, thermal free energy and running coupling via a five-dimensional asymptotically AdS spacetime with translational symmetry breaking (TSB). The Einstein-Maxwell-axion geometry involves two scales: chemical potential $\\mu$ for finite baryon density, and TSB parameter $\\beta$ for momentum relaxation. Numerical simulations at finite and zero temperature reveal that both $\\mu$ and $\\beta$ weaken color interactions and facilitate quarkonium dissociation in strongly coupled quark-gluon plasmas through different mechanisms. The chemical potential dominates color screening and modifies the heavy-quark potential and running coupling, while $\\beta$ mainly affects plasma entropy and corrects thermal free energy. At zero temperature, thermal contributions vanish, and the renormalized free energy becomes a medium-modified static potential with an approximate Coulombic form. Finite baryon density suppresses $Q\\bar{Q}$ binding much more strongly than momentum dissipation at all temperatures. We extract the color screening length and dissociation scale, and discuss phenomenological implications for quarkonium in heavy-ion collisions. This work clarifies medium correction mechanisms for color interactions and thermodynamics, and presents a consistent picture for heavy-quark probes in dense dissipative plasmas.", "url": "https://arxiv.org/abs/2606.16640", "type": "理论", "summary": "我们通过平移对称破缺 (TSB) 的五维渐近 AdS 时空研究重夸克可观测量，包括静态夸克势、热自由能和运行耦合。爱因斯坦-麦克斯韦轴子几何涉及两个尺度：有限重子密度的化学势 $\\mu$ 和动量弛豫的 TSB 参数 $\\beta$。有限温度和零温度下的数值模拟表明，$\\mu$ 和 $\\beta$ 都通过不同的机制削弱了颜色相互作用并促进强耦合夸克-胶子等离子体中的夸克离子解离。化学势主导颜色筛选并修改重夸克势和运行耦合，而 $\\beta$ 主要影响等离子体熵并校正热自由能。在零温度下，热贡献消失，重整化自由能变成具有近似库仑形式的介质修正静态势。在所有温度下，有限重子密度对 $Q\\bar{Q}$ 结合的抑制作用比动量耗散更强。\n\n我们提取了颜色筛选长度和解离尺度，并讨论了夸克离子在重离子碰撞中的现象学含义。这项工作阐明了颜色相互作用和热力学的介质校正机制，并为稠密耗散等离子体中的重夸克探针提供了一致的图像。", "authors": [{"name": "Wenxing Cheng"}, {"name": "Zi-qiang Zhang"}], "featured_authors": [{"name": "Wenxing Cheng"}, {"name": "Zi-qiang Zhang"}], "author_count": 2}, {"id": "2606.16714", "category": "hep-th", "title": "On the Representation Theory of Non-Admissible $W$-Algebras: Part I", "abstract": "Motivated by the mirror symmetry for circle compactified 4d $N=2$ theories, we propose a geometric framework for studying the representation theory of non-admissible $W$-algebras $W^{k}(\\mathfrak g,f)$ at levels $k=-h^\\vee+\\frac{1}{n}\\frac{m}{u}$, using the geometry of generalized affine Springer fibers $Sp_{\\nu}(\\tilde{g},f)$ with slope $\\nu=u/m$. The central proposal is that each non-empty $C^*$-fixed locus, labeled by a double coset $\\tilde w\\in W_\\nu\\backslash\\tilde{W}/W_f$, gives rise to simple modules whose highest weight is determined by the map $\\tilde w\\mapsto\\tilde w(k\\Lambda_0+\\tilde\\rho)-\\tilde\\rho$, while the dimension of the fixed variety encodes additional non-semisimple structure (logarithmic modules). We verify this correspondence in numerous examples, including $D_4$, $E_6$, $E_8$, and twisted theories of type $^3D_4$ and $^2A_3$, where our geometric counting reproduces known results for both admissible and non-admissible $W$-algebras.", "url": "https://arxiv.org/abs/2606.16714", "type": "理论", "summary": "受圆紧致 4d $N=2$ 理论镜像对称性的启发，我们提出了一个几何框架，用于研究 $k=-h^\\vee+\\frac{1}{n}\\frac{m}{u}$ 水平上的不可容许 $W$-代数 $W^{k}(\\mathfrak g,f)$ 的表示论，使用广义仿射施普林格纤维的几何结构$Sp_{\\nu}(\\tilde{g},f)$，斜率 $\\nu=u/m$。中心建议是每个非空 $C^*$ 固定轨迹，由双陪集 $\\tilde w\\in W_\\nu\\backslash\\tilde{W}/W_f$ 标记，产生简单模块，其最高权重由映射 $\\tilde w\\mapsto\\tilde w(k\\Lambda_0+\\tilde\\rho)-\\tilde\\rho$ 确定，而固定品种的维度编码附加非半简单结构（对数模块）。我们在许多例子中验证了这种对应关系，包括 $D_4$、$E_6$、$E_8$ 以及 $^3D_4$ 和 $^2A_3$ 类型的扭曲理论，其中我们的几何计数再现了可接受和不可接受的 $W$ 代数的已知结果。", "authors": [{"name": "Dan Xie"}], "featured_authors": [{"name": "Dan Xie"}], "author_count": 1}, {"id": "2606.16716", "category": "hep-th", "title": "Effective Lifshitz-Born-Infeld black holes from general covariance breaking", "abstract": "In this work we present an effective Lifshitz black hole solution with Born-Infeld electrodynamics and explore some of its properties. We discuss the mechanism for capturing the solution, achieved through diffeomorphism invariance breaking, study the emergent causal structure, and analyze aspects of critical behavior and local stability in the associated thermodynamics.", "url": "https://arxiv.org/abs/2606.16716", "type": "理论", "summary": "在这项工作中，我们利用 Born-Infeld 电动力学提出了一种有效的 Lifshitz 黑洞解决方案，并探索了它的一些特性。我们讨论了通过微分同胚不变性破坏实现捕获解的机制，研究了涌现的因果结构，并分析了相关热力学中的临界行为和局部稳定性。", "authors": [{"name": "D. C. Moreira"}, {"name": "A. S. Lemos"}, {"name": "F. A. Brito"}], "featured_authors": [{"name": "D. C. Moreira"}, {"name": "A. S. Lemos"}, {"name": "F. A. Brito"}], "author_count": 3}, {"id": "2606.16745", "category": "hep-th", "title": "Effective Goldstone dynamics on cosmological space-times", "abstract": "We derive the Lehmann-Symanzik-Zimmermann reduction formalism for a massive spin-2 particle on Minkowski spacetime and extend the formalism to cosmological spacetimes. The reduction formalism allows for a versatile proof that the Goldstone boson equivalence theorem holds in Friedmann-Lemaître-Robertson-Walker space-times. For the de Sitter and the radiation filled universe, we investigate the Goldstone dynamics and perform an analysis of the range of validity provided by the effective kinetic operator.", "url": "https://arxiv.org/abs/2606.16745", "type": "理论", "summary": "我们推导了闵可夫斯基时空上大质量自旋 2 粒子的 Lehmann-Symanzik-Zimmermann 约简形式，并将该形式扩展到宇宙学时空。还原形式主义提供了戈德斯通玻色子等价定理在弗里德曼-勒梅特-罗伯逊-沃克时空中成立的通用证明。对于德西特和充满辐射的宇宙，我们研究了戈德斯通动力学，并对有效动力学算子提供的有效性范围进行了分析。", "authors": [{"name": "Marc Schneider"}], "featured_authors": [{"name": "Marc Schneider"}], "author_count": 1}, {"id": "2606.16857", "category": "hep-th", "title": "Flux Quantization on 10D Type IIA Superspace via Cyclification from 11D", "abstract": "We produce the dimensional reduction to 10D IIA supergravity (SuGra), via cyclification, of the remarkable result that full 11D SuGra is put on shell just by imposing the duality-symmetric Bianchi identities on C-field super-flux densities over supertorsion-free superspace. Generally, we highlight that when duality-symmetric superspace Bianchi identities are characterized by Whitehead bracket $L_\\infty$-algebras $\\mathfrak{l}\\mathcal{A}$ of a classifying space $\\mathcal{A}$, their dimensional reduction is characterized by the cyclic loop space $\\mathrm{Cyc}(\\mathcal{A})$. We promote this to a general mechanism of dimensional reduction on super-spacetime, compatible with the global (infrared) completion of supergravity theories by flux quantization in non-abelian cohomology with coefficients in $\\mathcal{A}$ and $\\mathrm{Cyc}(\\mathcal{A})$, respectively. In the case of 11D SuGra, the characteristic $L_\\infty$-algebra is $\\mathfrak{l}S^4$ and hence we obtain that full on-shell 10D IIA SuGra is equivalent to $\\mathfrak{l}\\mathrm{Cyc}(S^4)$-Bianchi imposed identities on NS/RR super-flux densities over supertorsion-free 10D super-spacetime. This implies that any space which is $\\mathbb{R}$-rationally equivalent to $\\mathrm{Cyc}(S^4)$ classifies an admissible flux quantization law, which provides a global completion of 10D IIA SuGra that admits oxidation to 11D.", "url": "https://arxiv.org/abs/2606.16857", "type": "理论", "summary": "我们通过环化将维度降维到 10D IIA 超重力 (SuGra)，只需将对偶对称 Bianchi 恒等式强加于无超扭转超空间上的 C 场超通量密度，即可将完整的 11D SuGra 置于壳上。一般来说，我们强调，当对偶对称超空间 Bianchi 恒等式由分类空间 $\\mathcal{A}$ 的怀特海括号 $L_\\infty$-代数 $\\mathfrak{l}\\mathcal{A}$ 表征时，其降维由循环环空间 $\\mathrm{Cyc}(\\mathcal{A})$ 表征。我们将其推广为超时空降维的一般机制，与通过非阿贝尔上同调中的通量量化实现的超引力理论的全局（红外）完成兼容，系数分别为$\\mathcal{A}$和$\\mathrm{Cyc}(\\mathcal{A})$。在 11D SuGra 的情况下，特征 $L_\\infty$ 代数是 $\\mathfrak{l}S^4$，因此我们得到完整的壳上 10D IIA SuGra 等效于 $\\mathfrak{l}\\mathrm{Cyc}(S^4)$-Bianchi 在无超扭转 10D 上对 NS/RR 超通量密度强加恒等式超时空。\n\n这意味着任何 $\\mathbb{R}$ 有理地等价于 $\\mathrm{Cyc}(S^4)$ 的空间都属于一个允许的通量量子化定律，它提供了 10D IIA SuGra 的全局完成，允许氧化到 11D。", "authors": [{"name": "Grigorios Giotopoulos"}, {"name": "Hisham Sati"}], "featured_authors": [{"name": "Grigorios Giotopoulos"}, {"name": "Hisham Sati"}], "author_count": 2}, {"id": "2606.16911", "category": "hep-th", "title": "Quantum gravity and spectral running cutoff", "abstract": "We have recently shown that a natural way to implement the Wilsonian paradigm in gauge theories is through the introduction of a ``spectral cutoff\", a cut on the eigenvalues of the covariant Laplacian, pointing out that this provides the route toward the renormalization group (RG) construction. Here we apply this idea to quantum gravity, resorting to two realizations of the spectral running cutoff: ``hard\" and ``smooth\". We derive the RG equations for the Newton and cosmological constant and find the RG pattern of the asymptotic safety scenario, with a non-Gaussian UV-attractive fixed point.", "url": "https://arxiv.org/abs/2606.16911", "type": "理论", "summary": "我们最近表明，在规范理论中实现威尔逊范式的一种自然方法是引入“光谱截止”，即对协变拉普拉斯特征值的切割，指出这提供了构建重整化群（RG）的途径。在这里，我们将这个想法应用于量子引力，采用光谱运行截止的两种实现：“硬”和“平滑”。我们推导了牛顿和宇宙学常数并找到渐近安全场景的 RG 模式，具有非高斯 UV 吸引不动点。", "authors": [{"name": "Carlo Branchina"}, {"name": "Vincenzo Branchina"}, {"name": "Filippo Contino"}, {"name": "Riccardo Gandolfo"}, {"name": "Arcangelo Pernace"}], "featured_authors": [{"name": "Carlo Branchina"}, {"name": "Vincenzo Branchina"}, {"name": "Filippo Contino"}, {"name": "Riccardo Gandolfo"}, {"name": "Arcangelo Pernace"}], "author_count": 5}, {"id": "2606.16986", "category": "hep-th", "title": "The black hole at the end of the cone: localizing the anomaly polynomial on toric geometries", "abstract": "We consider five-dimensional supergravity coupled to vector multiplets, gauged or ungauged, and propose an efficient method to evaluate the on-shell action of supersymmetric black saddle solutions with toric ${\\rm U}(1)^3$ symmetry and general topology, explicitly known or just assumed to exist, including higher-derivative corrections. This is equivalent to equivariant integration of the anomaly polynomial six-form over simplicial cones obtained by decomposing the toric diagram of the solution. The on-shell action is then expressed as a sum over contributions localized at the tip of each cone. We obtain a simple derivation of recently calculated expressions as well as new predictions, both for the on-shell action of the black saddles and the Wald entropy of the related extremal solutions. These may be asymptotically AdS$_5$ or asymptotically flat. As examples, we discuss black holes, black rings and black lenses, including a black hole in the background of a topological soliton.", "url": "https://arxiv.org/abs/2606.16986", "type": "理论", "summary": "我们考虑将五维超重力耦合到计量或非计量的矢量多重态，并提出一种有效的方法来评估具有环面 ${\\rm U}(1)^3$ 对称性和一般拓扑的超对称黑鞍解的壳上作用，明确已知或假设存在，包括高导数校正。这相当于通过分解解的复曲面图而获得的六型反常多项式在单纯锥体上的等变积分。然后，壳上作用表示为位于每个锥体尖端的贡献的总和。我们获得了最近计算的表达式的简单推导以及新的预测，包括黑鞍的壳上作用和相关极值解的 Wald 熵。这些可能是渐近 AdS$_5$ 或渐近平坦的。作为例子，我们讨论黑洞、黑环和黑透镜，包括拓扑孤子背景中的黑洞。", "authors": [{"name": "Davide Cassani"}, {"name": "Enrico Turetta"}], "featured_authors": [{"name": "Davide Cassani"}, {"name": "Enrico Turetta"}], "author_count": 2}, {"id": "2606.17025", "category": "hep-th", "title": "Solutions in Liouville theory on dS and AdS backgrounds", "abstract": "We find exact solutions of a Liouville-type scalar field theory on $D$-dimensional de Sitter and anti-de Sitter backgrounds, treating the geometry as nondynamical. Using the embedding-space formalism with an auxiliary null vector, we derive first-order (Bäcklund-like) equations whose integrability yields the solution of the Liouville equation for the scalar field. This method produces two classes of analytic solutions, whose physical properties are different for de Sitter and anti-de Sitter spacetimes.", "url": "https://arxiv.org/abs/2606.17025", "type": "理论", "summary": "我们在 $D$ 维德西特和反德西特背景上找到了刘维尔型标量场论的精确解，将几何视为非动力学。使用带有辅助零向量的嵌入空间形式，我们推导出一阶（类 Bäcklund）方程，其可积性产生了标量场的刘维尔方程的解。该方法产生两类解析解，其物理性质对于德西特时空和反德西特时空是不同的。", "authors": [{"name": "Damir Sadekov"}], "featured_authors": [{"name": "Damir Sadekov"}], "author_count": 1}, {"id": "2606.14903", "category": "math-ph", "title": "A Reverse Hard-Core Model in $\\mathbb{A}_2$: an Application of the Pirogov-Sinai Theory", "abstract": "In this paper we use the Pirogov--Sinai theory to analyze a class of particle models of Statistical Mechanics on the unit triangular lattice $\\mathbb{A}_2$. The models are specified by two parameters: the particle activity $u\\in(0,1)$ and a positive Löschian number $t$ interpreted as a maximal squared clearing radius. Admissible configurations are those in which every empty lattice site has an occupied site within squared distance at most $t$, thereby forbidding empty disks of radius exceeding or equal $t$. The Hamiltonian favors configurations with as few occupied sites as possible, while the admissibility condition enforces a positive density of particles. We prove that the periodic ground states of the model, i.e., the configurations achieving an optimal balance of two tendencies, are the ones whose occupied sites form triangular sublattices of explicitly determined squared side-length $d_*(t)$. Furthermore, for sufficiently small values of the activity parameter $u$, some (but not necessarily all) periodic ground states generate extreme Gibbs (DLR) measures. We describe the resulting phase structure and characterize the pure phases associated with stable ground states.", "url": "https://arxiv.org/abs/2606.14903", "type": "理论", "summary": "本文利用Pirogov--Sinai理论来分析单位三角晶格$\\mathbb{A}_2$上的一类统计力学粒子模型。模型由两个参数指定：粒子活动 $u\\in(0,1)$ 和解释为最大平方清除半径的正 Löschian 数 $t$。可接受的配置是每个空格点在平方距离内最多$t$内有一个被占用的配置，从而禁止半径超过或等于$t$的空盘。哈密​​顿量倾向于具有尽可能少的占据位点的配置，而容许条件则强制粒子的正密度。我们证明模型的周期性基态，即实现两种趋势最佳平衡的配置，是其占据位置形成明确确定的平方边长 $d_*(t)$ 的三角形子晶格的配置。此外，对于足够小的活动参数 $u$ 值，一些（但不一定是全部）周期性基态会产生极端吉布斯（DLR）测量。我们描述了所得的相结构并表征了与稳定基态相关的纯相。", "authors": [{"name": "A. Mazel"}, {"name": "I. Stuhl"}, {"name": "Y. Suhov"}], "featured_authors": [{"name": "A. Mazel"}, {"name": "I. Stuhl"}, {"name": "Y. Suhov"}], "author_count": 3}, {"id": "2606.14913", "category": "math-ph", "title": "Structure-Informed Neural Operators for Long-Time Prediction of Parametric Hamiltonian PDEs", "abstract": "Hamiltonian partial differential equations (PDEs) often exhibit long-time dynamics governed by conserved quantities such as mass, momentum, and Hamiltonian energy. Standard Fourier neural operators (FNOs) provide efficient data-driven approximations of solution operators, but may not preserve these invariants during autoregressive rollout, and can develop drift in conserved quantities, phase error, and loss of qualitative accuracy. We propose an energy-projection Fourier neural operator (EP-FNO), a structure-informed operator learning architecture that combines a residual FNO time-stepping update with an invariant projection for long-time prediction of parametric Hamiltonian PDEs. We also provide a theoretical analysis showing that EP-FNO can approximate operators associated with PDEs efficiently, we also suggest a stability estimate. We evaluate the approach on the Zakharov--Kuznetsov, Kadomtsev--Petviashvili, and sine--Gordon equations. Numerical experiments show that the projected model improves long-time stability, and gives more accurate propagation of soliton and coherent wave structures compared with a standard FNO baseline. Our results demonstrate that invariant projection improves the reliability of learned surrogates for long-time Hamiltonian PDE simulation.", "url": "https://arxiv.org/abs/2606.14913", "type": "理论", "summary": "哈密​​顿偏微分方程 (PDE) 通常表现出受质量、动量和哈密顿能量等守恒量控制的长期动态。标准傅里叶神经算子 (FNO) 提供了高效的数据驱动的解算子近似，但在自回归推出期间可能无法保留这些不变量，并且可能会在守恒量、相位误差和定性精度损失方面产生漂移。我们提出了一种能量投影傅立叶神经算子（EP-FNO），这是一种基于结构的算子学习架构，它将残差 FNO 时间步长更新与不变投影相结合，用于参数哈密顿偏微分方程的长期预测。我们还提供了理论分析，表明 EP-FNO 可以有效地逼近与偏微分方程相关的算子，我们还建议进行稳定性估计。我们评估了 Zakharov--Kuznetsov、Kadomtsev--Petviashvili 和 sine--Gordon 方程的方法。数值实验表明，与标准 FNO 基线相比，该投影模型提高了长期稳定性，并提供了更准确的孤子和相干波结构的传播。\n\n我们的结果表明，不变投影提高了长期哈密顿偏微分方程模拟的学习代理的可靠性。", "authors": [{"name": "Victory C. Obieke"}, {"name": "Christopher Chukwuemeka"}, {"name": "Emmanuel E. Oguadimma"}], "featured_authors": [{"name": "Victory C. Obieke"}, {"name": "Christopher Chukwuemeka"}, {"name": "Emmanuel E. Oguadimma"}], "author_count": 3}, {"id": "2606.14952", "category": "math-ph", "title": "Dynamic Doppler Effects on Dirac Spinor Fields", "abstract": "We derive the dynamic Doppler effects of noninertial observer motion on Dirac spinor fields, characterizing how proper acceleration, proper jerk, observer path curvature, torsion, and hyper-torsion modify the inertial quantum description of free particles. We quantify the nonlinear behavior of the amplitude and phase of the Dirac spinor wave field and isolate the spin-induced signatures that have no counterpart in the scalar Klein-Gordon field. For worldlines with constant proper jerk the amplitude scales super-exponentially as $\\exp(j_0\\tau^2/4)$. The complex Frenet-Serret curvature invariants generate both an exponential amplitude factor and a spin-induced phase factor. Spinor structure therefore produces an observable dynamic Doppler signature distinct from any scalar prediction.", "url": "https://arxiv.org/abs/2606.14952", "type": "理论", "summary": "我们推导了非惯性观察者运动对狄拉克旋量场的动态多普勒效应，描述了适当的加速度、适当的加加速度、观察者路径曲率、扭转和超扭转如何修改自由粒子的惯性量子描述。我们量化了狄拉克旋量波场的振幅和相位的非线性行为，并隔离了在标量克莱因-戈登场中没有对应物的自旋引起的特征。对于具有恒定适当加加速度的世界线，振幅按超指数缩放为 $\\exp(j_0\\tau^2/4)$。复杂的 Frenet-Serret 曲率不变量生成指数振幅因子和自旋诱导相位因子。因此，旋量结构产生与任何标量预测不同的可观察的动态多普勒特征。", "authors": [{"name": "Bryce M. Barclay"}, {"name": "Alex Mahalov"}], "featured_authors": [{"name": "Bryce M. Barclay"}, {"name": "Alex Mahalov"}], "author_count": 2}, {"id": "2606.15039", "category": "math-ph", "title": "On the Non-Commutative Geometry of the Electroweak Interaction", "abstract": "In differential geometry, the underlying mathematical structure behind the electroweak theory is a trivial principal $(SU(2)\\times U(1))$--bundle over $\\R^4$ with the Minkowski metric. The aim of this paper is to show that, using non--commutative geometry, the electroweak theory can be described using a trivial quantum principal $SU(2)$--bundle over $C^\\infty_\\C(\\R^4)$ with the Minkowski metric.", "url": "https://arxiv.org/abs/2606.15039", "type": "理论", "summary": "在微分几何中，电弱理论背后的基础数学结构是一个简单的原理 $(SU(2)\\times U(1))$——将 $\\R^4$ 与 Minkowski 度量捆绑在一起。本文的目的是证明，使用非交换几何，可以使用平凡量子原理 $SU(2)$--将 $C^\\infty_\\C(\\R^4)$ 与 Minkowski 度量捆绑来描述电弱理论。", "authors": [{"name": "Gustavo Amilcar Saldaña Moncada"}], "featured_authors": [{"name": "Gustavo Amilcar Saldaña Moncada"}], "author_count": 1}, {"id": "2606.15235", "category": "math-ph", "title": "The Standard Model Gauge Group from the Exceptional Jordan Algebra", "abstract": "We construct the Standard Model gauge group using the exceptional Jordan algebra $\\mathfrak{h}_3(\\mathbb{O})$ and its automorphism group $\\text{F}_4$. The group $\\text{F}_4$ acts on pairs of Jordan subalgebras $X \\subset B \\subset \\mathfrak{h}_3(\\mathbb{O})$ with $X \\cong \\mathfrak{h}_2(\\mathbb{C})$ and $B \\cong \\mathfrak{h}_3(\\mathbb{C})$, and for any such pair the stabilizer of $X$ intersected with the identity component of the stabilizer of $B$ is isomorphic to the Standard Model gauge group. Since $\\mathfrak{h}_2(\\mathbb{C})$ is the Jordan algebra of observables of a qubit and $\\mathfrak{h}_3(\\mathbb{C})$ is the Jordan algebra of observables of a qutrit, we could say $\\mathfrak{h}_3(\\mathbb{O})$ is the Jordan algebra of observables of an 'octonionic qutrit'. In this language our result says roughly that the Standard Model gauge group is the group of symmetries of an octonionic qutrit that restrict to act as unitary operators on an ordinary qutrit and, within that, a qubit.", "url": "https://arxiv.org/abs/2606.15235", "type": "理论", "summary": "我们使用特殊的 Jordan 代数 $\\mathfrak{h}_3(\\mathbb{O})$ 及其自同构群 $\\text{F}_4$ 构建标准模型规范群。群 $\\text{F}_4$ 作用于 Jordan 子代数对 $X \\subset B \\subset \\mathfrak{h}_3(\\mathbb{O})$ 和 $X \\cong \\mathfrak{h}_2(\\mathbb{C})$ 和 $B \\cong \\mathfrak{h}_3(\\mathbb{C})$，并且对于任何这样的子代数对 $X$ 的稳定器与 $B$ 稳定器的恒等分量相交与标准模型规范组同构。由于 $\\mathfrak{h}_2(\\mathbb{C})$ 是量子位可观测量的乔丹代数，$\\mathfrak{h}_3(\\mathbb{C})$ 是 qutrit 可观测量的乔丹代数，我们可以说 $\\mathfrak{h}_3(\\mathbb{O})$ 是量子位可观测量的乔丹代数'八角Qutrit'。用这种语言，我们的结果粗略地说，标准模型规范群是八元 qutrit 的对称性群，它限制为普通 qutrit 以及其中的量子位上的酉算子。", "authors": [{"name": "John C. Baez"}, {"name": "Paul Schwahn"}], "featured_authors": [{"name": "John C. Baez"}, {"name": "Paul Schwahn"}], "author_count": 2}, {"id": "2606.15538", "category": "math-ph", "title": "Generalized symmetries, invariant solutions and conservation laws in the Jaynes-Cummings model", "abstract": "In this work, we investigate the Jaynes--Cummings model (JCM) using Lie symmetry analysis and conservation-law theory. The dynamics is formulated as a system of partial differential equations by projecting the von Neumann equation onto the atomic degrees of freedom and representing the field mode through its characteristic function. We determine the admitted point and generalized symmetries and construct invariant solutions satisfying the physical conditions imposed by quantum mechanics. The conventional dressed-state dynamics is recovered while a second class of solutions with radial dependence expressed through Heun polynomials is obtained for coupled atom--field configurations. We also apply the generating functions methodology to derive local conservation laws of the JCM differential system. Besides recovering the conservation of the total number of excitations, we obtain additional conserved currents involving atomic populations, coherence, reduced-state purity, and moments of the field characteristic function. In particular, we derive a balance equation for a combination of atomic purity and coherence whose evolution is controlled by the atom--field coupling and is linked to atom--field correlation and entanglement dynamics. The symmetry structure further generates generalized symmetries and an infinite hierarchy of conservation laws.", "url": "https://arxiv.org/abs/2606.15538", "type": "理论", "summary": "在这项工作中，我们使用李对称分析和守恒定律理论研究 Jaynes--Cummings 模型 (JCM)。通过将冯诺依曼方程投影到原子自由度上并通过其特征函数表示场模式，将动力学公式化为偏微分方程组。我们确定承认点和广义对称性，并构造满足量子力学施加的物理条件的不变解。恢复了传统的修饰态动力学，同时获得了耦合原子场配置的具有通过 Heun 多项式表达的径向相关性的第二类解。我们还应用生成函数方法来推导 JCM 微分系统的局部守恒定律。除了恢复激发总数的守恒之外，我们还获得了涉及原子布居、相干性、约化态纯度和场特征函数矩的额外守恒电流。\n\n特别是，我们推导了原子纯度和相干性组合的平衡方程，其演化由原子场耦合控制，并与原子场相关性和纠缠动力学相关。对称结构进一步产生广义对称性和守恒定律的无限层次。", "authors": [{"name": "Luis M. Piñuelas"}, {"name": "Pablo C. López Vázquez"}, {"name": "Alexander Yakhno"}], "featured_authors": [{"name": "Luis M. Piñuelas"}, {"name": "Pablo C. López Vázquez"}, {"name": "Alexander Yakhno"}], "author_count": 3}, {"id": "2606.15616", "category": "math-ph", "title": "A High-Order Nyström Method for Coupled Boundary Integral Equations in Oblique-Incidence Scattering by Impedance Cylinders", "abstract": "We study the numerical solution of electromagnetic scattering by an infinitely long impedance cylinder under oblique incidence. After separation of the axial phase factor, the axial electric and magnetic components satisfy a pair of coupled two-dimensional Helmholtz equations. The Leontovich impedance condition couples these components through tangential derivatives, and the associated boundary integral system contains both logarithmic kernels and principal-value tangential derivative terms. Building on existing coupled integral-equation formulations for oblique-incidence cylinder scattering, we construct a high-order Nystrom implementation based on Kress-type logarithmic kernel decomposition, periodic product quadrature, Fourier differentiation for the tangential derivative contribution, and a block diagonal preconditioner associated with the scalar impedance subproblem. Under uniqueness of the continuous scattering problem and a uniform discrete stability assumption, we formulate a high-order convergence framework for the boundary densities and far-field patterns. Numerical experiments include a manufactured Fourier-Bessel benchmark, a plane-wave circular-cylinder validation, a smooth non-circular boundary test, condition-number and GMRES comparisons, and a variable-impedance scattering-width reduction example in a prescribed backward angular sector. The results indicate that the method provides a stable high-accuracy forward solver for the coupled impedance system, rather than a new physical model.", "url": "https://arxiv.org/abs/2606.15616", "type": "理论", "summary": "我们研究了斜入射下无限长阻抗圆柱体电磁散射的数值解。分离轴向相位因子后，轴向电分量和磁分量满足一对耦合的二维亥姆霍兹方程。莱昂托维奇阻抗条件通过切向导数将这些分量耦合起来，相关的边界积分系统包含对数核和主值切向导数项。基于现有的斜入射柱面散射耦合积分方程公式，我们构建了一个基于 Kress 型对数核分解、周期积求积、切向导数贡献的傅立叶微分以及与标量阻抗子问题相关的块对角预处理器的高阶 Nystrom 实现。在连续散射问题的唯一性和均匀离散稳定性假设下，我们为边界密度和远场模式制定了高阶收敛框架。\n\n数值实验包括制造的傅立叶-贝塞尔基准、平面波圆柱体验证、平滑非圆形边界测试、条件数和 GMRES 比较，以及规定的后向角扇区中的可变阻抗散射宽度减少示例。结果表明，该方法为耦合阻抗系统提供了一个稳定的高精度正向求解器，而不是一个新的物理模型。", "authors": [{"name": "Haochen Liu"}, {"name": "Qinghao Yu"}], "featured_authors": [{"name": "Haochen Liu"}, {"name": "Qinghao Yu"}], "author_count": 2}, {"id": "2606.15791", "category": "math-ph", "title": "Flowing to Normality and the Fate of the Single Ring Theorem", "abstract": "Random non-hermitian matrix ensembles with double-sided rotation invariance obey, in the limit of large matrix size, the Single Ring Theorem, which states that the support of the mean eigenvalue distribution in the complex plane is either a disk or an annulus. In contrast, rotational-invariant random normal matrix ensembles can have mean eigenvalue densities supported over any number of concentric annuli in the complex plane. In this paper we introduce and investigate, both analytically and numerically, a non-hermitian matrix model which flows from a generic matrix distribution obeying the Single Ring Theorem to a distribution of normal matrices by tuning a parameter which penalizes non-normality. We observe numerically breakdown of the Single Ring Theorem as the model flows towards normality, and determine the critical value of the parameter at which the transition occurs. We also study in detail the behavior of the singular values of these matrices under the flow. These singular values form a Fermi gas confined to the positive half-line. In particular, we find that at small values of the flow parameter, the interparticle spacings in the gas exhibit Wigner-Dyson repulsion, whereas for asymptotically large values of the flow parameter, at the normal matrix endpoint of the flow, the spacing statistics is Poissonian. The flow interpolates continuously between these two types of statistics. However, this change in statistics is not related directly to breaking of the Single Ring Theorem, which occurs very early-on along the flow, in the regime of Wigner-Dyson statistics. Finally, we introduce a certain ensemble of random permutations associated with the gas, and make a conjecture on how to use it in order to reconstruct approximately the average density of complex eigenvalues from that of the singular values in the large-$N$ limit.", "url": "https://arxiv.org/abs/2606.15791", "type": "理论", "summary": "具有双面旋转不变性的随机非埃尔米特矩阵系综在大矩阵尺寸的限制下遵循单环定理，该定理指出复平面中平均特征值分布的支持要么是圆盘，要么是圆环。相反，旋转不变随机法线矩阵系综可以具有在复平面中任意数量的同心环上支持的平均特征值密度。在本文中，我们从分析和数值角度介绍和研究了一种非埃尔米特矩阵模型，该模型通过调整惩罚非正态性的参数，从遵守单环定理的通用矩阵分布流向正态矩阵分布。当模型趋于正态时，我们观察单环定理的数值分解，并确定发生转变的参数的临界值。我们还详细研究了这些矩阵的奇异值在流动下的行为。这些奇异值形成限制在正半线的费米气体。\n\n特别是，我们发现，在流动参数较小的情况下，气体中的颗粒间距表现出维格纳-戴森排斥力，而对于渐近较大的流动参数值，在流动的法向矩阵端点处，间距统计量是泊松分布的。该流程在这两种类型的统计数据之间连续进行插值。然而，统计数据的这种变化与单环定理的破坏没有直接关系，单环定理在维格纳-戴森统计体系中很早就发生在流程中。最后，我们引入了与气体相关的某种随机排列集合，并推测如何使用它来根据大$N$极限中的奇异值近似重建复特征值的平均密度。", "authors": [{"name": "Joshua Feinberg"}, {"name": "Roman Riser"}, {"name": "Richard Scalettar"}, {"name": "Anthony Zee"}], "featured_authors": [{"name": "Joshua Feinberg"}, {"name": "Roman Riser"}, {"name": "Richard Scalettar"}, {"name": "Anthony Zee"}], "author_count": 4}, {"id": "2606.15895", "category": "math-ph", "title": "N-transform and factorization of the DN-map", "abstract": "Let $(\\Omega,g)$ be a smooth compact 3D Riemannian manifold with the smooth boundary $\\Gamma$, $\\tau(x):={\\rm dist\\,}(x,\\Gamma)$, $x\\in\\Omega$; $\\Omega^\\tau:=\\{x\\in\\Omega\\,|\\,\\,{\\rm dist\\,}(x,\\Gamma)<\\tau$\\}, $\\Gamma^\\tau:=\\{x\\in\\Omega\\,|\\,\\,{\\rm dist\\,}(x,\\Gamma)=\\tau$\\}, $\\tau\\geqslant 0$. For the sake of technical simplicity, we deal with $\\Omega$ diffeomorphic to a ball in $\\Bbb R^3$. Let $\\mathscr P:=\\{\\nabla p\\,|\\,\\,p\\in H^1(\\Omega)\\}$ be the space of the potential vector fields, and let $\\mathscr L_\\lambda:=\\{\\varkappa\\nabla\\tau\\,|\\,\\,\\varkappa\\in L_2(\\Omega)\\}$ be the space of the vector fields parallel to $\\nabla\\tau$. The N-transform is a map from $\\mathscr P$ to $\\mathscr L_\\lambda$ defined layer-wise (in accordance with $\\Omega=\\cup_{\\tau\\geqslant 0}\\Gamma^\\tau$) by $$ Nh\\,\\big|_{\\Gamma^\\tau}:=(P^\\tau h)\\big|_{\\Gamma^{\\tau-0}}, \\qquad\\tau>0, $$ where $P^\\tau$ are the projections in $\\mathscr P$ onto the subspaces $\\mathscr P^\\tau:=\\{h\\in\\mathscr P\\,|\\,\\,{\\rm supp\\,}h\\subset\\overline{\\Omega^\\tau}\\}$. We show that $N$ is a unitary operator. Let $p=p^f(x)$ be a solution to the Dirichlet problem: $\\Delta_g p=0$ in $\\Omega\\setminus\\Gamma$, $p=f$ on $\\Gamma$. The DN-map $\\Lambda$ is defined by $\\Lambda f:=-\\langle\\nabla p^f,\\nabla\\tau\\rangle$ on $\\Gamma$. We show that the N-transform provides a certain factorization $\\Lambda^{-1}=V^*V$ and discuss its possible usefulness for determination of $(\\Omega,g)$ from $\\Lambda$.", "url": "https://arxiv.org/abs/2606.15895", "type": "理论", "summary": "令 $(\\Omega,g)$ 为光滑紧致 3D 黎曼流形，其边界为光滑 $\\Gamma$, $\\tau(x):={\\rm dist\\,}(x,\\Gamma)$, $x\\in\\Omega$; $\\Omega^\\tau:=\\{x\\in\\Omega\\,|\\,\\,{\\rm dist\\,}(x,\\Gamma)<\\tau$\\}, $\\Gamma^\\tau:=\\{x\\in\\Omega\\,|\\,\\,{\\rm dist\\,}(x,\\Gamma)=\\tau$\\}, $\\tau\\geqslant 0$。为了技术简单起见，我们将 $\\Omega$ 处理为 $\\Bbb R^3$ 中球的微分同胚。设 $\\mathscr P:=\\{\\nabla p\\,|\\,\\,p\\in H^1(\\Omega)\\}$ 为势向量场的空间，并令 $\\mathscr L_\\lambda:=\\{\\varkappa\\nabla\\tau\\,|\\,\\,\\varkappa\\in L_2(\\Omega)\\}$ 为与$\\nabla\\tau$。 N 变换是由 $$ Nh\\,\\big|_{\\Gamma^\\tau}:=(P^\\tau h)\\big|_{\\Gamma^{\\tau-0}} 逐层定义的从 $\\mathscr P$ 到 $\\mathscr L_\\lambda$ 的映射（根据 $\\Omega=\\cup_{\\tau\\geqslant 0}\\Gamma^\\tau$）， \\qquad\\tau>0, $$ 其中 $P^\\tau$ 是 $\\mathscr P$ 到子空间 $\\mathscr P^\\tau:=\\{h\\in\\mathscr P\\,|\\,\\,{\\rm support\\,}h\\subset\\overline{\\Omega^\\tau}\\}$ 上的投影。我们证明 $N$ 是酉算子。设$p=p^f(x)$为狄利克雷问题的解：$\\Delta_g p=0$ in $\\Omega\\setminus\\Gamma$, $p=f$ on $\\Gamma$。\n\nDN 映射 $\\Lambda$ 由 $\\Gamma$ 上的 $\\Lambda f:=-\\langle\\nabla p^f,\\nabla\\tau\\rangle$ 定义。我们证明 N 变换提供了一定的因式分解 $\\Lambda^{-1}=V^*V$ 并讨论了它对于从 $\\Lambda$ 确定 $(\\Omega,g)$ 的可能用途。", "authors": [{"name": "M.I.Belishev"}, {"name": "D.V.Korikov"}], "featured_authors": [{"name": "M.I.Belishev"}, {"name": "D.V.Korikov"}], "author_count": 2}, {"id": "2606.15916", "category": "math-ph", "title": "A generalized Stieltjes system with polynomial source", "abstract": "Let $Q$ be a monic polynomial of degree $M+1$. We study the algebraic system \\[ \\sum_{j\\ne i}\\frac{1}{x_i-x_j}=Q(x_i),\\qquad i=1,\\ldots,N, \\] for pairwise distinct complex numbers $x_1,\\ldots,x_N$, modulo permutations of these numbers. The case $M=0$ is, after a translation, the classical Stieltjes system for the zeros of a Hermite polynomial. We prove that, for arbitrary $Q$, the number of solutions is at most $\\binom{N+M}{N}$, and that the coefficient equations for the associated monic Stieltjes polynomial have total intersection multiplicity exactly $\\binom{N+M}{N}$. Consequently the bound is attained for all $Q$ in a non-empty Zariski open subset of the affine space of monic polynomials of degree $M+1$. We also describe the solutions when the coefficient of the linear term of $Q$ is large: the system splits into $M+1$ weakly coupled classical Stieltjes systems, one near each zero of $Q$.", "url": "https://arxiv.org/abs/2606.15916", "type": "理论", "summary": "令$Q$ 为$M+1$ 次的一元多项式。我们研究代数系统 \\[ \\sum_{j\\ne i}\\frac{1}{x_i-x_j}=Q(x_i),\\qquad i=1,\\ldots,N, \\] 的成对不同复数 $x_1,\\ldots,x_N$ 以及这些数字的模排列。经过翻译后，$M=0$ 的情况是 Hermite 多项式零点的经典 Stieltjes 系统。我们证明，对于任意 $Q$，解的数量最多为 $\\binom{N+M}{N}$，并且相关的一元 Stieltjes 多项式的系数方程的总交集重数恰好为 $\\binom{N+M}{N}$。因此，$M+1$ 次一元多项式的仿射空间的非空 Zariski 开子集中的所有 $Q$ 都达到了界限。我们还描述了当 $Q$ 的线性项系数很大时的解：系统分裂为 $M+1$ 弱耦合经典 Stieltjes 系统，$Q$ 的每个零附近都有一个系统。", "authors": [{"name": "D.Masoero"}, {"name": "B.Shapiro"}], "featured_authors": [{"name": "D.Masoero"}, {"name": "B.Shapiro"}], "author_count": 2}, {"id": "2606.16441", "category": "math-ph", "title": "$q$-Deformed Topological Recursion, Weight Vectors and Algebraic Structures", "abstract": "We investigate a $q$-deformation of the shifted topological recursion, extending the construction of Belliard-Bouchard-Kramer-Nelson to the context of quantum algebras. Through the study of highest weight vectors in $q$-deformed of $\\mathcal{W}$-algebra representations, we derive a $q$-analogue of the topological recursion and show it yields $q$-deformed quantum curves. This framework unifies various approaches to quantum integrability and provides new insights into the geometry of $q$-deformed moduli spaces.", "url": "https://arxiv.org/abs/2606.16441", "type": "理论", "summary": "我们研究了移位拓扑递归的 $q$ 变形，将 Belliard-Bouchard-Kramer-Nelson 的构造扩展到量子代数的背景。通过研究 $q$ 变形的 $\\mathcal{W}$ 代数表示中的最高权向量，我们推导出拓扑递归的 $q$ 类似物，并表明它产生 $q$ 变形的量子曲线。该框架统一了量子可积性的各种方法，并为 $q$ 变形模空间的几何提供了新的见解。", "authors": [{"name": "Fridolin Melong"}, {"name": "Raimar Wulkenhaar"}], "featured_authors": [{"name": "Fridolin Melong"}, {"name": "Raimar Wulkenhaar"}], "author_count": 2}, {"id": "2606.16660", "category": "math-ph", "title": "Boundary monopole bubbling and Macdonald kernels for non-minuscule 't Hooft lines in $\\mathcal N=4$ SYM", "abstract": "We study half-BPS boundary 't Hooft lines of non-minuscule magnetic charge in four-dimensional $\\mathcal N=4$ $U(N)$ super Yang--Mills theory with the regular Nahm-pole boundary condition. In contrast to minuscule charges, non-minuscule boundary 't Hooft lines receive monopole bubbling contributions. For all one-row charges $\\lambda=(r,0,\\ldots,0)$ we compute the bubbling-corrected defect half-index and identify the boundary 't Hooft operator with the spherical DAHA element $\\mathbf e h_r(Y)\\mathbf e$. Its difference-operator expansion gives the screened magnetic sectors, while the Macdonald kernel proves equality with the S-dual Neumann Wilson-line half-index. As a consequence we obtain the identity for all dominant magnetic charges of $U(2)$. The boundary fixed-point formula realizes the same coefficients and gives explicit non-minuscule examples in ranks two and three.", "url": "https://arxiv.org/abs/2606.16660", "type": "理论", "summary": "我们研究了四维 $\\mathcal N=4$ $U(N)$ 超杨--米尔斯理论中非微小磁荷的半 BPS 边界 't Hooft 线，并具有规则的纳姆极边界条件。与微小电荷相反，非微小边界霍夫特线受到单极子冒泡的贡献。对于所有单行电荷 $\\lambda=(r,0,\\ldots,0)$，我们计算冒泡校正缺陷半指数，并用球形 DAHA 元素 $\\mathbf e h_r(Y)\\mathbf e$ 识别边界 't Hooft 算子。其差分算子展开给出了屏蔽磁扇区，而麦克唐纳核则证明了与 S-对偶诺依曼威尔逊线半指数相等。因此，我们获得了 $U(2)$ 的所有主导磁荷的恒等式。边界定点公式实现了相同的系数，并在第二和第三级给出了明确的非微小示例。", "authors": [{"name": "Ruiliang Li"}], "featured_authors": [{"name": "Ruiliang Li"}], "author_count": 1}, {"id": "2606.16737", "category": "math-ph", "title": "The Algebra of Units: From Buckingham's Pi-grec Theorem to Latent-Variable Learning", "abstract": "Engineers often measure many quantities-speed, pressure, temperature, length-expressed in different physical units. The Buckingham Pi-grec theorem states that these variables can always be combined into a smaller set of dimensionless numbers whose values fully determine the system's behaviour. Identifying the appropriate dimensionless groups has traditionally required expert knowledge and physical insight. This paper shows that they can instead be discovered automatically from data, without prior knowledge of the governing physics. The key observation is that, after logarithmic transformation, measurements collected under different scalings of the same system lie on a low-dimensional manifold whose geometry is determined by the underlying dimensionless groups. Singular value decomposition (SVD) identifies this manifold directly from data. A subsequent search over integer-exponent combinations recovers candidate dimensionless quantities, while a repeating-variable filter retains only those constructed from the machine's characteristic scales. This procedure recovers familiar engineering groups, including the flow coefficient, head coefficient, and Mach number, while excluding equivalent but less interpretable alternatives. The method is demonstrated on a synthetic compressor dataset containing 16,000 measurements. Starting from raw dimensional variables and no physics input, it recovers the correct dimensionless groups to numerical precision and reproduces the compressor performance map with an error below 0.01%. More broadly, the work reveals a close connection between classical dimensional analysis and modern data-driven learning. Both rely on the same underlying algebraic structure, suggesting new approaches for building physical models that are simultaneously interpretable, scalable, and data-efficient.", "url": "https://arxiv.org/abs/2606.16737", "type": "理论", "summary": "工程师经常测量许多量——速度、压力、温度、长度——以不同的物理单位表示。 Buckingham Pi-grec 定理指出，这些变量总是可以组合成较小的无量纲数，其值完全决定系统的行为。传统上，识别适当的无量纲组需要专业知识和物理洞察力。本文表明，它们可以从数据中自动发现，而无需事先了解控制物理学。关键的观察结果是，在对数变换之后，在同一系统的不同尺度下收集的测量值位于低维流形上，其几何形状由底层无量纲群决定。奇异值分解 (SVD) 直接从数据中识别该流形。随后对整数指数组合的搜索恢复候选无量纲量，而重复变量过滤器仅保留从机器特征尺度构造的那些量。\n\n此过程恢复熟悉的工程组，包括流量系数、水头系数和马赫数，同时排除等效但难以解释的替代方案。该方法在包含 16,000 个测量值的合成压缩机数据集上进行了演示。从原始量纲变量和无物理输入开始，它将正确的无量纲组恢复到数值精度，并以低于 0.01% 的误差再现压缩机性能图。更广泛地说，这项工作揭示了经典维度分析和现代数据驱动学习之间的密切联系。两者都依赖于相同的底层代数结构，提出了构建同时可解释、可扩展和数据高效的物理模型的新方法。", "authors": [{"name": "Mauro Valorani"}], "featured_authors": [{"name": "Mauro Valorani"}], "author_count": 1}, {"id": "2606.16947", "category": "math-ph", "title": "Self-Adjointness of the Standard Model of Non-Relativistic QED", "abstract": "For systems of non-relativistic charged particles minimally coupled to the soft modes of the quantized radiation field, we prove self-adjointness on the domain of the free Hamiltonian. This result is not new, but the proof we give shortens previous arguments. It is based on a comparison of graph norms and Nelson's commutator theorem.", "url": "https://arxiv.org/abs/2606.16947", "type": "理论", "summary": "对于与量化辐射场的软模式最小耦合的非相对论性带电粒子系统，我们证明了自由哈密顿量域上的自共轭性。这个结果并不新鲜，但我们给出的证明缩短了之前的论点。它基于图范数和纳尔逊换向定理的比较。", "authors": [{"name": "Valentin Kußmaul"}], "featured_authors": [{"name": "Valentin Kußmaul"}], "author_count": 1}, {"id": "2606.14822", "category": "quant-ph", "title": "Quantum Machine Learning for Industrial Applications", "abstract": "Recent advances in Machine Learning have transformed numerous industrial sectors, yet classical paradigms face fundamental limitations: rapidly growing data volumes, rising computational costs, significant energy consumption, and the physical scaling limits of conventional hardware architectures. Quantum computing has emerged as a promising computational paradigm to address these challenges, giving rise to the field of Quantum Machine Learning (QML). In this thesis, the theoretical foundations of QML are investigated, with a focus on near-term and future practical applications. Three central challenges are addressed: the trainability of variational quantum circuits, their expressivity, and their resistance to efficient classical simulation. The trainability of Hamming-weight preserving variational quantum circuits is first studied, and theoretical guarantees are established that resolve an open conjecture on the absence of barren plateaus for this circuit family. Subspace-preserving QML algorithms are then introduced, including photonic circuits and quantum convolutional neural networks, and are designed to mimic classical ML subroutines while offering polynomial quantum advantage. Finally, variational quantum circuits are analyzed as quantum Fourier models, and a framework is derived to jointly characterize expressivity and trainability, from which conditions are obtained under which quantum models provably separate from their classical counterparts. These contributions are intended to advance the theoretical roadmap for harnessing near-term and future quantum technologies in real-world applications.", "url": "https://arxiv.org/abs/2606.14822", "type": "理论+数值", "summary": "机器学习的最新进展已经改变了许多工业领域，但经典范例面临着根本性的限制：快速增长的数据量、不断上升的计算成本、大量的能源消耗以及传统硬件架构的物理扩展限制。量子计算已成为解决这些挑战的一种有前景的计算范式，从而催生了量子机器学习（QML）领域。本文研究了 QML 的理论基础，重点关注近期和未来的实际应用。解决了三个核心挑战：变分量子电路的可训练性、它们的表达性以及它们对有效经典模拟的抵抗力。首先研究了保留汉明权的变分量子电路的可训练性，并建立了理论保证，解决了关于该电路族不存在贫瘠平台的开放猜想。然后引入了保留子空间的 QML 算法，包括光子电路和量子卷积神经网络，旨在模仿经典的 ML 子例程，同时提供多项式量子优势。\n\n最后，将变分量子电路作为量子傅里叶模型进行分析，并导出一个框架来共同表征表达性和可训练性，从中获得量子模型可证明与经典模型分离的条件。这些贡献旨在推进在现实应用中利用近期和未来量子技术的理论路线图。", "authors": [{"name": "Léo Monbroussou"}], "featured_authors": [{"name": "Léo Monbroussou"}], "author_count": 1}, {"id": "2606.14847", "category": "quant-ph", "title": "High-fidelity two-qubit gates in a 7-qubit register for quantum networks", "abstract": "Quantum networks based on optically active solid-state spins may enable quantum technologies including long-range quantum communication and distributed quantum computing. Network nodes containing multiple high-fidelity qubits can facilitate large-scale fault-tolerant operation. However, the stringent error thresholds remain out of reach for multi-qubit registers. In this work, we demonstrate high-fidelity two-qubit gates in a 7-qubit register, based on nuclear spins coupled to a nitrogen-vacancy (NV) center in diamond. We analyze crosstalk in highly connected spin systems, develop an efficient optimization procedure, and characterize the gates using gate set tomography. The two-qubit gate fidelities (best: 99.61(5)%, average: 99.18(2)%) demonstrate a multi-qubit register at the threshold for distributed quantum computation. Finally, as an example application, we perform a variational quantum eigensolver (VQE) simulation of the ground-state energy of H2 and LiH molecules. These results demonstrate one of the key prerequisites for scalable quantum networks based on solid-state spins.", "url": "https://arxiv.org/abs/2606.14847", "type": "理论+数值", "summary": "基于光学活性固态自旋的量子网络可以实现包括远程量子通信和分布式量子计算在内的量子技术。包含多个高保真量子位的网络节点可以促进大规模容错操作。然而，多量子位寄存器仍然无法达到严格的错误阈值。在这项工作中，我们基于与金刚石中氮空位 (NV) 中心耦合的核自旋，在 7 量子位寄存器中演示了高保真双量子位门。我们分析高度连接的自旋系统中的串扰，开发有效的优化程序，并使用门组断层扫描来表征门。两个量子位门保真度（最佳：99.61(5)%，平均：99.18(2)%）在分布式量子计算的阈值处展示了多量子位寄存器。最后，作为示例应用，我们对 H2 和 LiH 分子的基态能量进行了变分量子本征求解器 (VQE) 模拟。这些结果证明了基于固态自旋的可扩展量子网络的关键先决条件之一。", "authors": [{"name": "Margriet van Riggelen"}, {"name": "Jiwon Yun"}, {"name": "H. Benjamin van Ommen"}, {"name": "Tim H. Taminiau"}], "featured_authors": [{"name": "Margriet van Riggelen"}, {"name": "Jiwon Yun"}, {"name": "H. Benjamin van Ommen"}, {"name": "Tim H. Taminiau"}], "author_count": 4}, {"id": "2606.14873", "category": "quant-ph", "title": "Finite-Element Matrix Product States for Continuum Models in One Dimension", "abstract": "We present a matrix product state framework for simulating one-dimensional quantum many-body systems in the continuum using non-orthogonal single-particle basis sets. By mapping the physical problem to an auxiliary computational space, we show that the resulting many-body overlap operator can be efficiently encoded as a matrix product operator for sufficiently localized orbitals, thereby generalizing a construction that first appeared in [ arXiv:2405.10285 ]. This construction recasts the variational ground-state search into a generalized eigenvalue problem, which can be solved using a generalized density matrix renormalization group algorithm. As a primary application, we employ a first-order finite-element expansion to study the ground state properties of the Lieb-Liniger gas in the presence of inhomogeneities. This approach also provides a natural setting for exactly refining the lattice, thereby enabling multigrid optimization strategies for matrix product states.", "url": "https://arxiv.org/abs/2606.14873", "type": "理论+数值", "summary": "我们提出了一个矩阵乘积状态框架，用于使用非正交单粒子基组模拟连续体中的一维量子多体系统。通过将物理问题映射到辅助计算空间，我们表明所得到的多体重叠算子可以有效地编码为充分局部化轨道的矩阵乘积算子，从而概括了首次出现在[arXiv:2405.10285]中的结构。这种结构将变分基态搜索重新转化为广义特征值问题，可以使用广义密度矩阵重整化群算法来解决。作为主要应用，我们采用一阶有限元展开来研究存在不均匀性的 Lieb-Liniger 气体的基态特性。这种方法还为精确细化晶格提供了自然设置，从而实现了矩阵乘积状态的多重网格优化策略。", "authors": [{"name": "Akshay Shankar"}, {"name": "Karel Van Acoleyen"}, {"name": "Jutho Haegeman"}], "featured_authors": [{"name": "Akshay Shankar"}, {"name": "Karel Van Acoleyen"}, {"name": "Jutho Haegeman"}], "author_count": 3}, {"id": "2606.14908", "category": "quant-ph", "title": "Optimising Entanglement Distillation Policies", "abstract": "Entanglement distillation is a fundamental operation in quantum information processing used to obtain higher-fidelity entangled pairs from a supply of less entangled quantum states using local operations aided by classical communication (LOCC). In a physically relevant setting, where states with an initial fidelity of $f_0$, probabilistically generated over multiple, $m$, memory pairs distributed between two parties, Alice and Bob, are pairwise distilled, the optimal policy identifies the system-configuration dependent sequence of entanglement generation and distillation operations that need to be performed in order to minimize the expected time to reach some target fidelity $f_T>f_0$. Here, we formulate and systematically analyze this task as a Markov decision problem and using a value iteration algorithm, obtain optimal deterministic policies that minimize the expected waiting time required to reach a target fidelity. Our results show that the expected waiting time under the optimal policy decreases with increasing generation probability $p$ and number of quantum memories $m$ - as expected. In contrast, it exhibits non-monotonic behavior with respect to $f_0$ for a fixed fidelity gap, $(\\Delta f = f_T-f_0)$. While the optimal policy consistently outperforms baseline policies such as the greedy, nested and entanglement pumping policies, its relative advantage is regime-dependent, being determined by the system parameters ($p,f_0,f_T,m$), and exhibits a nontrivial dependence on the fidelity gap $\\Delta f$. Our results highlight the value of formulating entanglement distillation as a Markov decision problem, enabling the systematic design of policies that achieve target fidelity thresholds for quantum information tasks in realistic resource-constrained settings.", "url": "https://arxiv.org/abs/2606.14908", "type": "理论+数值", "summary": "纠缠蒸馏是量子信息处理中的一项基本操作，用于使用经典通信 (LOCC) 辅助的局部操作从纠缠较少的量子态中获取更高保真度的纠缠对。在物理相关的设置中，初始保真度为 $f_0$ 的状态，在分布于两方（Alice 和 Bob）之间的多个 $m$ 内存对上概率生成，并被成对蒸馏，最优策略识别需要执行的系统配置相关的纠缠生成和蒸馏操作序列，以最小化达到某个目标保真度 $f_T>f_0$ 的预期时间。在这里，我们将此任务制定为马尔可夫决策问题并系统地分析，并使用值迭代算法，获得最佳确定性策略，以最小化达到目标保真度所需的预期等待时间。我们的结果表明，正如预期的那样，最优策略下的预期等待时间随着生成概率 $p$ 和量子存储器数量 $m$ 的增加而减少。\n\n相反，对于固定保真度差距 $(\\Delta f = f_T-f_0)$，它相对于 $f_0$ 表现出非单调行为。虽然最优策略始终优于贪婪、嵌套和纠缠泵浦策略等基线策略，但其相对优势是依赖于机制的，由系统参数 ($p,f_0,f_T,m$) 决定，并且表现出对保真度差距 $\\Delta f$ 的非平凡依赖。我们的结果强调了将纠缠蒸馏制定为马尔可夫决策问题的价值，从而能够系统地设计策略，从而在现实资源受限的环境中实现量子信息任务的目标保真度阈值。", "authors": [{"name": "Jigyen Bhavsar"}, {"name": "Rajni Bala"}, {"name": "Siddhartha Santra"}], "featured_authors": [{"name": "Jigyen Bhavsar"}, {"name": "Rajni Bala"}, {"name": "Siddhartha Santra"}], "author_count": 3}, {"id": "2606.14949", "category": "quant-ph", "title": "Initiation of Superradiance from Different Collective Spin States", "abstract": "Superradiance is an extensive cooperative spontaneous emission phenomenon. Some atomic collective spin states exhibit it. However, distinct initial states differ in their decay dynamics. Dicke states with different numbers of excitations have their peak emission intensity shifted in time depending on the number of excitations. Emission intensity in atomic coherent states depends on their polarization. Some specific states undergo a squeezing controlled crossover, making the emission character dependent on the amount of squeezing in the state. We present detailed results on the superradiant dynamics of a representative selection of Dicke states. For large N, we are able to predict fairly accurately the pulse profile in each case using the mean field approximation, an approach based on the Fokker Planck Equation. We also present results on the intensity correlation function of the emission.", "url": "https://arxiv.org/abs/2606.14949", "type": "理论", "summary": "超辐射是一种广泛的合作自发辐射现象。一些原子集体自旋态表现出它。然而，不同的初始状态的衰变动力学有所不同。具有不同激发次数的迪克态的峰值发射强度根据激发次数随时间变化。原子相干态的发射强度取决于它们的偏振。一些特定状态经历压缩控制交叉，使得发射特性取决于该状态中的压缩量。我们提出了狄克态代表性选择的超辐射动力学的详细结果。对于较大的 N，我们能够使用平均场近似（一种基于福克普朗克方程的方法）相当准确地预测每种情况下的脉冲轮廓。我们还提供了发射强度相关函数的结果。", "authors": [{"name": "Adnan Alabbar"}, {"name": "Zhenghao Zhang"}, {"name": "Girish S. Agarwal"}], "featured_authors": [{"name": "Adnan Alabbar"}, {"name": "Zhenghao Zhang"}, {"name": "Girish S. Agarwal"}], "author_count": 3}, {"id": "2606.15061", "category": "quant-ph", "title": "VQE as Initial State Preparation for QPE on Heisenberg Spin-Glass Hamiltonians", "abstract": "Quantum Phase Estimation (QPE) is the quantum algorithmic workhorse for computing ground state energies of quantum Hamiltonians with quantum computers. Ground state energy calculation of physical systems is perhaps the most promising use case for quantum computing in terms of scientific and commercial value with a plausible path to outperformance of classical alternatives. This path, however, hinges on the availability of initial states for QPE with significant overlap with the true ground state. Using extensive (classical) numerical computations, we study whether the NISQ-era algorithm VQE (Variational Quantum Eigensolver) could be used to efficiently prepare high-overlap states of disordered fully-connected anisotropic Heisenberg spin glass quantum Hamiltonians with up to $15$ qubits. We find that (i) -- consistent with widely held, but rarely numerically illustrated beliefs -- VQE is generally unable to efficiently converge to the ground state for our Hamiltonians, which is a well-known issue with VQE due to a variety of factors including vanishing gradients and local minima; (ii) low energy states do not necessarily have large ground-state overlap, but there is typically a correlation between the two measures; (iii) adding more than three layers to the VQE ansatz neither improves overlap nor the energies found; and (iv) the best-found overlap scaling as a function of the Hamiltonian system size is not strongly exponentially decreasing, suggesting potential for VQE to be a heuristic state preparation algorithm for QPE.", "url": "https://arxiv.org/abs/2606.15061", "type": "理论+数值", "summary": "量子相位估计 (QPE) 是使用量子计算机计算量子哈密顿量基态能量的量子算法主力。就科学和商业价值而言，物理系统的基态能量计算可能是量子计算最有前途的用例，并且有可能超越经典替代方案。然而，这条路径取决于 QPE 初始态的可用性，该初始态与真实基态有显着重叠。通过广泛的（经典）数值计算，我们研究了 NISQ 时代的算法 VQE（变分量子本征解算器）是否可用于有效地制备高达 15 美元量子位的无序全连接各向异性海森堡自旋玻璃量子哈密顿量的高重叠态。\n\n我们发现 (i)——与广泛持有但很少用数值说明的信念一致——VQE 通常无法有效地收敛到哈密顿量的基态，这是 VQE 的一个众所周知的问题，原因有多种因素，包括梯度消失和局部最小值； (ii) 低能量态不一定具有较大的基态重叠，但两种测量之间通常存在相关性； (iii) 在 VQE ansatz 中添加超过三层既不能改善重叠，也不能改善发现的能量； (iv) 最佳发现的重叠缩放作为哈密顿系统大小的函数，并没有强烈地呈指数下降，这表明 VQE 有可能成为 QPE 的启发式状态准备算法。", "authors": [{"name": "Elijah Pelofske"}, {"name": "Stephan Eidenbenz"}], "featured_authors": [{"name": "Elijah Pelofske"}, {"name": "Stephan Eidenbenz"}], "author_count": 2}, {"id": "2606.15062", "category": "quant-ph", "title": "Discontinuous strong-to-weak symmetry breaking transition from thermal pure states", "abstract": "We investigate the nonequilibrium dynamics of strong-to-weak spontaneous symmetry breaking in many-body quantum systems undergoing decoherence from thermal pure states. For generic initial pure states with volume-law entanglement entropy, we show that the system undergoes a discontinuous dynamical phase transition at a critical time. This transition is accompanied by a singularity in the entropy of the system, which saturates to its maximum value at the same critical time. Through numerical simulations of the dephasing Ising and hard-core boson models, we establish the universality of this transition across different symmetries. Our results reveal that the dynamical emergence of a decohered mixed state from a highly entangled state is not a gradual asymptotic relaxation, but rather a sharp phase transition driven by a sudden collapse of global coherence.", "url": "https://arxiv.org/abs/2606.15062", "type": "理论+数值", "summary": "我们研究了从热纯态退相干的多体量子系统中强到弱自发对称性破缺的非平衡动力学。对于具有体积定律纠缠熵的一般初始纯态，我们表明系统在关键时刻经历不连续的动态相变。这种转变伴随着系统熵的奇点，该奇点在同一临界时间饱和至最大值。通过对相移伊辛模型和硬核玻色子模型的数值模拟，我们建立了这种跨越不同对称性的转变的普遍性。我们的结果表明，从高度纠缠态动态出现退相干混合态并不是逐渐渐近弛豫，而是由全局相干性突然崩溃驱动的急剧相变。", "authors": [{"name": "Taiki Haga"}, {"name": "Masaya Kunimi"}, {"name": "Masaya Nakagawa"}], "featured_authors": [{"name": "Taiki Haga"}, {"name": "Masaya Kunimi"}, {"name": "Masaya Nakagawa"}], "author_count": 3}, {"id": "2606.15071", "category": "quant-ph", "title": "Quantum learning with a single-atom sensor", "abstract": "The ability to gather information and to act upon it is at the core of every learning agent. But what is the impact of quantum mechanics on an agent's ability to sense external inputs and to translate them into actions? Here we address the question for a prototype task of learning agency at the quantum scale: rotating a single spin based on information gathered by a single atom. We determine the ultimate performance limit for this task, revealing a fundamental tradeoff between entanglement at the sensing stage and coherence at the action stage: if the single-atom sensor is not entangled with the quantum system serving as the agent's internal memory, then the best learning strategy requires a coherent transfer of quantum information from the sensor to the system that controls the agent's actions. In contrast, if the sensor is initially entangled with the agent's memory, then the transfer of quantum information is no longer necessary. Our results indicate that the quantum properties of the sensor radically affect the optimal way to convert external stimuli into actions, revealing a link between quantum sensing and the behavior of quantum agents.", "url": "https://arxiv.org/abs/2606.15071", "type": "理论", "sum
