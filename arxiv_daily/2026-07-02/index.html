  <style>

    .author-note { color: var(--muted); font-size: 12px; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }

  <script>
    const papers = [{"id": "2607.00086", "category": "cond-mat", "title": "Dissipation splits the Mott transition in one dimension", "abstract": "Understanding how dissipation modifies quantum phase transitions is a central challenge in many-body physics. A paradigmatic example is the one-dimensional Mott transition, which in isolated systems separates a conducting Luttinger liquid (LL) from a Mott insulator (MI). Here, we study the fate of this transition in the presence of dissipative baths locally coupled to the density. Using bosonisation and an exact integration of the bath degrees of freedom, we show that dissipation fundamentally reshapes the phase diagram for bath exponents $s<3/2$, where $s$ characterises the low-energy bath spectrum. Rather than undergoing a direct LL-MI transition, the system develops an intermediate dissipative phase (DP) that is compressible and gapless, yet has zero superfluid stiffness. As a result, the conventional Mott transition splits into two distinct critical phenomena: a Berezinskii-Kosterlitz-Thouless transition from the LL to the DP, followed by a new commensurate-incommensurate transition from the DP to the MI. We derive an effective field theory for the latter transition and characterize its universality. For $1<s<3/2$, the critical exponents vary continuously with the bath exponent as $\\beta=\\nu=1/z=s-1$, while for $s<1$ the transition is governed by $\\beta=\\nu=1/z=0$ and the doping vanishes sharper than any power law. State-of-the-art Monte Carlo simulations quantitatively support our predictions. These results demonstrate that dissipation can qualitatively alter the nature of the Mott transition and generate novel critical behaviour in strongly correlated one-dimensional systems.", "url": "https://arxiv.org/abs/2607.00086", "type": "理论+数值", "summary": "了解耗散如何改变量子相变是多体物理学的一个核心挑战。一个典型的例子是一维莫特跃迁，它在隔离系统中将导电的路廷格液体 (LL) 与莫特绝缘体 (MI) 分开。在这里，我们研究了在存在与密度局部耦合的耗散浴的情况下这种转变的命运。使用玻色子化和浴自由度的精确积分，我们表明耗散从根本上重塑了浴指数 $s<3/2$ 的相图，其中 $s$ 表征了低能浴光谱。该系统没有经历直接的 LL-MI 转变，而是开发了可压缩且无间隙的中间耗散相 (DP)，但超流体刚度为零。结果，传统的莫特转变分裂成两个不同的临界现象：从 LL 到 DP 的 Berezinskii-Kosterlitz-Thouless 转变，随后是从 DP 到 MI 的新的相称-不相称转变。我们为后一种转变推导了一种有效的场论，并表征了其普遍性。\n\n对于 $1<s<3/2$，临界指数随浴指数连续变化为 $\\beta=\\nu=1/z=s-1$，而对于 $s<1$，过渡由 $\\beta=\\nu=1/z=0$ 控制，并且掺杂比任何幂律消失得更快。最先进的蒙特卡洛模拟在数量上支持了我们的预测。这些结果表明，耗散可以定性地改变莫特转变的性质，并在强相关的一维系统中产生新的临界行为。", "authors": [{"name": "Oscar Bouverot-Dupuis"}, {"name": "Alberto Rosso"}, {"name": "Laura Foini"}], "featured_authors": [{"name": "Oscar Bouverot-Dupuis"}, {"name": "Alberto Rosso"}, {"name": "Laura Foini"}], "author_count": 3}, {"id": "2607.00134", "category": "cond-mat", "title": "Phase distinction of Gibbs states without symmetry breaking: topological invariants of the 3D toric code", "abstract": "We study the finite-temperature topological order of the three-dimensional $\\mathbb{Z}_2$ toric code in a generic magnetic field, where every higher-form symmetry is explicitly broken and can at most be emergent. We show perturbatively, and confirm by large-scale quantum Monte Carlo, that the topological entanglement entropy stays quantized at $\\gamma = \\ln 2$ throughout the topological phase -- at finite temperature and under the symmetry-breaking field alike -- and collapses to $0$ across the thermal transition, a quantization protected geometrically by the Bianchi identity rather than by any exact symmetry of the system. The plateau $\\gamma = \\ln 2$ is, however, not invariant under quasi-local channels: a constant-depth channel can generate this identical quantized value from a trivial product state. We therefore introduce the decoded Wilson-loop correlation $f_W$, which quantizes to $1$ in the topological phase and $0$ in the trivial phase as $L\\to\\infty$ and, unlike $\\gamma$, is a quasi-local-channel invariant -- a robust topological invariant of the mixed state.", "url": "https://arxiv.org/abs/2607.00134", "type": "理论+数值", "summary": "我们研究了通用磁场中三维 $\\mathbb{Z}_2$ 环面码的有限温度拓扑序，其中每个更高形式的对称性都被明确破坏，并且最多只能出现。我们扰动地证明，并通过大规模量子蒙特卡罗证实，在整个拓扑相中，在有限温度下和对称破缺场下，拓扑纠缠熵保持量子化 $\\gamma = \\ln 2$ ，并在热转变过程中塌陷到 $0$ ，这是一种由比安奇恒等式几何保护的量子化，而不是由系统的任何精确对称性保护。然而，平台 $\\gamma = \\ln 2$ 在准局部通道下并不是不变的：恒定深度通道可以从平凡的乘积状态生成相同的量化值。因此，我们引入了解码的威尔逊环相关性$f_W$，它在拓扑阶段量化为$1$，在平凡阶段量化为$0$，为$L\\to\\infty$，并且与$\\gamma$不同，它是一个准局部通道不变量——混合状态的鲁棒拓扑不变量。", "authors": [{"name": "Haruki Watanabe"}], "featured_authors": [{"name": "Haruki Watanabe"}], "author_count": 1}, {"id": "2607.00150", "category": "cond-mat", "title": "Topological Hall plateau in quasi-2D kagome magnet YMn$_6$Sn$_6$", "abstract": "We examine the impact of the Dzyaloshinskii-Moriya interaction (DMI) in kagome magnets and show that a predominantly planar DMI together with ferromagnetic exchange stabilizes a disordered skyrmion phase in quasi-two-dimensional (2D) YMn$_6$Sn$_6$. Within an ab initio framework combining density functional theory and spin-dynamics simulations, we generate realistic spin textures of disordered skyrmion and find that this phase persists for $B_{ext} < 0.5$ T, with a decreasing skyrmion size as magnetic field increases. We demonstrate the emergence of topological Hall plateau in the range $-0.5 \\leq B_{ext} < 0.5$ T, driven by nearly uniform scalar spin chirality and the resulting constant real-space Berry curvature. This response is anti-symmetric with magnetic field while magnitude and sign of these plateau are determined by a complex interplay between Hund's coupling strength and chemical potential signifying the role of Dirac points and van Hove singularities. In addition, we reveal topological magnon excitations in the disordered skyrmion phase of quasi-2D YMn$_6$Sn$_6$.", "url": "https://arxiv.org/abs/2607.00150", "type": "理论+数值", "summary": "我们研究了 Kagome 磁体中 Dzyaloshinskii-Moriya 相互作用 (DMI) 的影响，结果表明，主要为平面的 DMI 与铁磁交换一起稳定了准二维 (2D) YMn$_6$Sn$_6$ 中的无序斯格明子相。在结合密度泛函理论和自旋动力学模拟的从头开始框架内，我们生成了无序斯格明子的真实自旋纹理，并发现该相持续 $B_{ext} < 0.5$ T，随着磁场的增加，斯格明子尺寸减小。我们证明了拓扑霍尔平台在 $-0.5 \\leq B_{ext} < 0.5$ T 范围内的出现，这是由近乎均匀的标量自旋手性和由此产生的恒定实空间贝里曲率驱动的。这种响应与磁场是反对称的，而这些平台的大小和符号是由洪德耦合强度和化学势之间复杂的相互作用决定的，表明狄拉克点和范霍夫奇点的作用。此外，我们揭示了准二维 YMn$_6$Sn$_6$ 无序斯格明子相中的拓扑磁振子激发。", "authors": [{"name": "Sambit Jena"}, {"name": "Nastaran Salehi"}, {"name": "Manuel Pereiro Lopez"}, {"name": "Olle Eriksson"}, {"name": "Narayan Mohanta"}, {"name": "Karthik V Raman"}, {"name": "Tanay Nag"}, {"name": "Banasree Sadhukhan"}], "featured_authors": [{"name": "Sambit Jena"}, {"name": "Nastaran Salehi"}, {"name": "Manuel Pereiro Lopez"}, {"name": "Karthik V Raman"}, {"name": "Tanay Nag"}, {"name": "Banasree Sadhukhan"}], "author_count": 8}, {"id": "2607.00195", "category": "cond-mat", "title": "Structure-Dependent Chemical Order Modification in Strained Alloy Nanoparticles", "abstract": "Alloy nanoparticles (nanoalloys) exhibit tuneable physicochemical properties that depend sensitively on their atomic arrangement, making control over chemical ordering a central challenge in nanomaterials design. While most theoretical studies consider nanoalloys in vacuum, practical systems are typically supported, where strong cluster-substrate interactions can introduce significant lattice strain. Here, we investigate strain as a control parameter for chemical ordering in bimetallic nanoalloys using atomistic molecular dynamics and Monte Carlo simulations. By imposing controlled tensile and compressive strain through an implicit anchored interface, we systematically probe the response of NiPt nanoparticles with distinct structural motifs. For truncated octahedral particles, we find that chemical ordering and segregation behaviour remain remarkably robust even under large strains, indicating that intrinsic thermodynamic preferences dominate. In contrast, icosahedral nanoparticles exhibit pronounced strain-induced chemical redistribution, with a significant increase in surface Ni concentration under tensile strain. This behaviour is attributed to the combined effects of intrinsic geometric frustration and a high fraction of undercoordinated sites in icosahedral structures. Our results demonstrate that strain can selectively modulate chemical ordering in nanoalloys in a structure-dependent manner, establishing a general framework for understanding strain-induced chemical ordering in nanoalloys.", "url": "https://arxiv.org/abs/2607.00195", "type": "数值", "summary": "合金纳米粒子（纳米合金）表现出可调节的物理化学性质，这些性质敏感地取决于其原子排列，这使得对化学有序性的控制成为纳米材料设计中的核心挑战。虽然大多数理论研究考虑真空中的纳米合金，但通常支持实际系统，其中强的团簇-基底相互作用可能会引入显着的晶格应变。在这里，我们使用原子分子动力学和蒙特卡罗模拟研究应变作为双金属纳米合金化学排序的控制参数。通过通过隐式锚定界面施加受控的拉伸和压缩应变，我们系统地探讨了具有不同结构基序的 NiPt 纳米粒子的响应。对于截断的八面体颗粒，我​​们发现即使在大应变下，化学排序和偏析行为仍然非常稳健，这表明内在的热力学偏好占主导地位。相比之下，二十面体纳米粒子表现出明显的应变诱导化学再分布，在拉伸应变下表面镍浓度显着增加。\n\n这种行为归因于二十面体结构中固有的几何挫败和大部分不协调位点的综合影响。我们的结果表明，应变可以以结构依赖的方式选择性地调节纳米合金中的化学排序，从而建立了理解纳米合金中应变诱导的化学排序的通用框架。", "authors": [{"name": "Yue Wang"}, {"name": "Zibo Chen"}, {"name": "Evropi Toulkeridou"}, {"name": "Joseph Kioseoglou"}, {"name": "Panagiotis Grammatikopoulos"}], "featured_authors": [{"name": "Yue Wang"}, {"name": "Zibo Chen"}, {"name": "Evropi Toulkeridou"}, {"name": "Joseph Kioseoglou"}, {"name": "Panagiotis Grammatikopoulos"}], "author_count": 5}, {"id": "2607.00246", "category": "cond-mat", "title": "Anomalous bulk dealloying below the parting limit", "abstract": "Dealloying has been extensively studied both as a corrosion degradation mechanism in structural materials, including those used in nuclear, aerospace, or marine environments, and as a versatile method to fabricate porous materials for catalysts and other functional applications. Classical dealloying theory in aqueous environments predicts a critical reactive-element concentration (parting limit) for continuous selective dissolution at temperatures where bulk diffusion does not dominate; this threshold is commonly reported around 50~60 at.%. Yet recent studies show that molten salt environments can generate extensive bulk dealloying below this threshold. Despite the importance of this anomalous dealloying behavior in many energy systems and electrochemical applications, its fundamental origin remains elusive. Here, we address this critical gap, revealing a grain boundary (GB)-assisted bulk dealloying mechanism. Using three-dimensional (3D) reconstruction of the dealloyed regions correlated with crystallographic and elemental analyses, we directly map the 3D GB-void architecture and reveal that diffusion-induced recrystallization (DIR) generates a high-density GB network, which then promotes molten-salt infiltration and can drive bulk dealloying far-below the conventionally reported parting limit, producing a distinctive morphology reminiscent of discontinuous precipitation (DP). Understanding this dynamic GB-void interplay is crucial for the prediction and control of dealloying in complex electrochemical environments.", "url": "https://arxiv.org/abs/2607.00246", "type": "理论", "summary": "脱合金已被广泛研究为结构材料（包括核、航空航天或海洋环境中使用的结构材料）的腐蚀降解机制，以及作为制造催化剂和其他功能应用的多孔材料的通用方法。水环境中的经典脱合金理论预测了在体积扩散不占主导地位的温度下连续选择性溶解的临界反应元素浓度（分离极限）；据报道，该阈值通常约为 50~60 at.%。然而最近的研究表明，熔盐环境可以产生低于该阈值的大量脱合金。尽管这种异常脱合金行为在许多能源系统和电化学应用中很重要，但其基本起源仍然难以捉摸。在这里，我们解决了这个关键差距，揭示了晶界（GB）辅助的整体脱合金机制。\n\n利用与晶体学和元素分析相关的脱合金区域的三维（3D）重建，我们直接绘制了3D晶界空隙结构图，并揭示了扩散诱导再结晶（DIR）生成高密度晶界网络，然后促进熔盐渗透，并可以驱动远低于传统报告的分离极限的块体脱合金，产生让人想起不连续沉淀（DP）的独特形态。了解这种动态晶界-空隙相互作用对于复杂电化学环境中脱合金的预测和控制至关重要。", "authors": [{"name": "Weiyue Zhou"}, {"name": "Hooman Gholamzadeh"}, {"name": "Lei Ding"}, {"name": "Kevin Daub"}, {"name": "Mehdi Mosayebi"}, {"name": "Travis Casagrande"}, {"name": "Yingxin Zhu"}, {"name": "Miaomiao Jin"}, {"name": "Mark R. Daymond"}, {"name": "Yang Yang"}, {"name": "Michael P. Short"}, {"name": "Suraj Y. Persaud"}], "featured_authors": [{"name": "Weiyue Zhou"}, {"name": "Hooman Gholamzadeh"}, {"name": "Lei Ding"}, {"name": "Yang Yang"}, {"name": "Michael P. Short"}, {"name": "Suraj Y. Persaud"}], "author_count": 12}, {"id": "2607.00343", "category": "cond-mat", "title": "Universal Scaling of the Spin Hall Effect", "abstract": "We study the spin Hall (SH) effect for the Dirac electrons in terms of the spin and magnetic-moment accumulation coefficients $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy}$. We take short-range nonmagnetic impurities into account within the self-consistent $T$-matrix approximation. Similarly to the universal scaling for the anomalous Hall (AH) effect, we find three disctinct regimes by changing the electric conductivity $\\sigma^{yy}$; the superclean regime with $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy} \\propto \\sigma^{yy}$ owing to the skew scattering, moderately dirty regime with almost constant $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy}$, and dirty regime with a new scaling relation $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy} \\propto (\\sigma^{yy})^{0.6}$ whose exponent differs from that of the AH conductivity. Our results construct a unified theory of the SH effect without any ambiguity of spin current.", "url": "https://arxiv.org/abs/2607.00343", "type": "理论", "summary": "我们根据自旋和磁矩累积系数 $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy}$ 研究狄拉克电子的自旋霍尔 (SH) 效应。我们在自洽 $T$ 矩阵近似中考虑了短程非磁性杂质。与反常霍尔（AH）效应的通用标度类似，我们通过改变电导率 $\\sigma^{yy}$ 发现了三种不同的状态；由于倾斜散射，$-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy} \\propto \\sigma^{yy}$ 的超净状态，具有几乎恒定的 $-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy}$ 的中等脏状态，以及具有新缩放关系的脏状态$-\\Gamma^{00} g_{s(m)z}^{\\phantom{s(m)z} xy} \\propto (\\sigma^{yy})^{0.6}$ 其指数与 AH 电导率不同。我们的结果构建了一个统一的 SH 效应理论，没有任何自旋电流的模糊性。", "authors": [{"name": "Atsuo Shitade"}, {"name": "Naoto Nagaosa"}], "featured_authors": [{"name": "Atsuo Shitade"}, {"name": "Naoto Nagaosa"}], "author_count": 2}, {"id": "2607.00449", "category": "cond-mat", "title": "Slow heat-driven flow in a gas of hard disks", "abstract": "We study a slow heat-driven flow in a gas of elastically colliding hard disks confined to a long channel. The initial state consists of two regions with large temperature and density contrasts but nearly equal pressures, leading to a low-Mach-number, nearly isobaric evolution. In the dilute limit, the corresponding isobaric hydrodynamic theory reduces to a previously known ideal-gas description. We extend this theory to finite densities by incorporating a non-ideal equation of state of a hard-disk fluid, and solve the resulting one-dimensional equations numerically. Finite-density effects produce appreciable deviations from the ideal-gas prediction. We then test the theory directly against event-driven molecular dynamics simulations of hard disks and find very good agreement in both the dilute and finite-density regimes. The results provide, to our knowledge, the first particle-level test of isobaric gas dynamics of a strongly inhomogeneous cooling flow.", "url": "https://arxiv.org/abs/2607.00449", "type": "理论+数值", "summary": "我们研究了限制在长通道内的弹性碰撞硬盘气体中的缓慢热驱动流动。初始状态由温度和密度差异较大但压力几乎相等的两个区域组成，导致低马赫数、近等压演化。在稀极限下，相应的等压流体动力学理论简化为先前已知的理想气体描述。我们通过结合硬盘流体的非理想状态方程将该理论扩展到有限密度，并以数值方式求解所得的一维方程。有限密度效应与理想气体预测产生明显偏差。然后，我们直接针对硬盘的事件驱动分子动力学模拟来测试该理论，并在稀释和有限密度状态下发现非常好的一致性。据我们所知，该结果首次对强烈不均匀冷却流的等压气体动力学进行了颗粒级测试。", "authors": [{"name": "Amit Kumar"}, {"name": "Abhishek Dhar"}, {"name": "Baruch Meerson"}], "featured_authors": [{"name": "Amit Kumar"}, {"name": "Abhishek Dhar"}, {"name": "Baruch Meerson"}], "author_count": 3}, {"id": "2607.00540", "category": "cond-mat", "title": "A general-purpose atomic cluster expansion interatomic potential for niobium", "abstract": "Niobium, a body-centered cubic transition metal, poses a challenge for interatomic potentials, which struggle to capture its properties, such as phonons, high-pressure behavior, energy barriers to dislocation glide, and others. To tackle this challenge, we constructed a general-purpose atomic cluster expansion (ACE) potential for niobium. We trained our ACE on thousands of density functional theory (DFT) structures spanning a diversity of local environments. We validated it across a range of properties and compared it with existing empirical and machine learning (ML) potentials, including a novel universal ML potential. The resulting ACE balances accuracy, efficiency, and robustness, enabling large-scale exploration of niobium with near-DFT precision. Finally, our ACE held its own in a stringent test: a near-million-atom molecular dynamics simulation of fracture", "url": "https://arxiv.org/abs/2607.00540", "type": "理论+数值", "summary": "铌是一种体心立方过渡金属，对原子间势提出了挑战，原子间势很难捕获其特性，例如声子、高压行为、位错滑移的能量势垒等。为了应对这一挑战，我们构建了铌的通用原子团簇扩展（ACE）潜力。我们使用跨越各种本地环境的数千个密度泛函理论 (DFT) 结构来训练我们的 ACE。我们验证了它的一系列属性，并将其与现有的经验和机器学习 (ML) 潜力进行了比较，包括一种新颖的通用 ML 潜力。由此产生的 ACE 平衡了准确性、效率和稳健性，能够以接近 DFT 的精度大规模勘探铌。最后，我们的 ACE 在严格的测试中脱颖而出：近百万个原子的断裂分子动力学模拟", "authors": [{"name": "Aleksei Egorov"}, {"name": "Ralf Drautz"}, {"name": "Thomas Hammerschmidt"}], "featured_authors": [{"name": "Aleksei Egorov"}, {"name": "Ralf Drautz"}, {"name": "Thomas Hammerschmidt"}], "author_count": 3}, {"id": "2607.00599", "category": "cond-mat", "title": "Entropy-Driven Structural Phase Transition in Nb$_3$Cl$_8$ via Density Functional Theory and an Effective Model", "abstract": "As a prototypical flat-band cluster Mott insulator on an effective triangular lattice, Nb$_3$Cl$_8$ is a potential candidate for hosting a quantum spin liquid (QSL) state. Nevertheless, a first-order structural phase transition around 90K transforms the high-temperature paramagnetic $\\alpha$ phase into the low-temperature nonmagnetic $\\beta$ phase, suppressing the candidate QSL regime of the $\\alpha$ phase. To clarify the microscopic origin of this transition, we combine first-principles calculations with an extended Hubbard model to construct a unified free-energy framework. This framework reveals that the transition is jointly driven by phonon and spin entropy: the $\\alpha$ phase is stabilized by softer phonons and larger paramagnetic spin entropy, whereas the $\\beta$ phase is favored by interlayer dimerization, which hardens the phonons and quenches the spin entropy through singlet formation. Furthermore, by evaluating the pressure-dependent generalized enthalpy, we provide a thermodynamic explanation for the suppression of the transition under c-axis uniaxial pressure, where stabilizing the $\\alpha$ phase may allow the candidate QSL regime of the $\\alpha$ phase to be explored at low temperatures.", "url": "https://arxiv.org/abs/2607.00599", "type": "理论+数值", "summary": "作为有效三角晶格上的典型平带团簇莫特绝缘体，Nb$_3$Cl$_8$ 是承载量子自旋液体 (QSL) 态的潜在候选者。然而，90K 左右的一阶结构相变将高温顺磁 $\\alpha$ 相转变为低温非磁 $\\beta$ 相，抑制了 $\\alpha$ 相的候选 QSL 状态。为了阐明这种转变的微观起源，我们将第一性原理计算与扩展的哈伯德模型相结合，构建了一个统一的自由能框架。该框架揭示了这种转变是由声子和自旋熵共同驱动的：$\\alpha$相由较软的声子和较大的顺磁自旋熵稳定，而$\\beta$相则受到层间二聚化的支持，层间二聚化使声子硬化并通过单线态形成猝灭自旋熵。\n\n此外，通过评估压力相关的广义焓，我们为c轴单轴压力下的转变抑制提供了热力学解释，其中稳定$\\alpha$相可以允许在低温下探索$\\alpha$相的候选QSL状态。", "authors": [{"name": "Chenjie Zhu"}, {"name": "Shuai Zhang"}, {"name": "Zhong Fang"}, {"name": "Zhijun Wang"}, {"name": "Quansheng Wu"}, {"name": "Hongming Weng"}], "featured_authors": [{"name": "Chenjie Zhu"}, {"name": "Shuai Zhang"}, {"name": "Zhong Fang"}, {"name": "Zhijun Wang"}, {"name": "Quansheng Wu"}, {"name": "Hongming Weng"}], "author_count": 6}, {"id": "2607.00662", "category": "cond-mat", "title": "Collective phase modes in twisted $d$-wave superconducting bilayers", "abstract": "Twisted cuprate bilayers have been predicted to host high-temperature chiral $d+id'$ superconductivity, originating from higher-order Josephson coupling processes. In such two-dimensional superconducting systems, long-wavelength fluctuations in the phase of the superconducting order parameter constitute gapless collective modes and therefore remain significant even at zero temperature. Here, we perform a theoretical analysis of the low-energy phase fluctuations in twisted $d$-wave superconducting bilayers, systematically retaining Josephson coupling to all orders. We demonstrate that higher-order Josephson coupling processes lead to nontrivial modifications of the phase dynamics. In particular, the stiffness of the relative phase between the two layers is finite even in the normal state, which is a direct consequence of the intralayer U(1) symmetry breaking explicitly induced by interlayer tunneling. Phase fluctuations suppress the relative-phase stiffness but enhance the overall-phase stiffness in the $d+id'$ phase. Furthermore, the relative-phase fluctuations acquire a small but finite excitation gap, which is no longer equal to the Josephson plasma frequency and is strongly suppressed upon approaching the chiral quantum critical point, indicating the breakdown of Josephson phase locking within the superconducting state.", "url": "https://arxiv.org/abs/2607.00662", "type": "理论", "summary": "扭曲的铜酸盐双层预计具有高温手性 $d+id'$ 超导性，源自高阶约瑟夫森耦合过程。在这种二维超导系统中，超导有序参数相位的长波长波动构成无间隙集体模式，因此即使在零温度下也仍然很重要。在这里，我们对扭曲 $d$ 波超导双层中的低能相位涨落进行了理论分析，系统地保留了所有阶次的约瑟夫森耦合。我们证明了高阶约瑟夫森耦合过程会导致相位动力学的不平凡的修改。特别是，即使在正常状态下，两层之间相对相位的刚度也是有限的，这是由层间隧道效应明确引起的层内 U(1) 对称性破缺的直接结果。相位波动抑制了相对相位刚度，但增强了 $d+id'$ 相中的整体相位刚度。\n\n此外，相对相位涨落获得了一个小但有限的激发间隙，该激发间隙不再等于约瑟夫森等离子体频率，并且在接近手性量子临界点时受到强烈抑制，表明超导态内约瑟夫森锁相的破坏。", "authors": [{"name": "Yin Shi"}, {"name": "Mengxian Zhao"}, {"name": "Fei Yang"}, {"name": "Miao Liu"}, {"name": "Sheng Meng"}], "featured_authors": [{"name": "Yin Shi"}, {"name": "Mengxian Zhao"}, {"name": "Fei Yang"}, {"name": "Miao Liu"}, {"name": "Sheng Meng"}], "author_count": 5}, {"id": "2607.00702", "category": "cond-mat", "title": "Weak-coupling tensor cross interpolation impurity solver for nonequilibrium dynamical mean-field theory", "abstract": "Simulating nonequilibrium quantum many-body systems remains a major challenge due to the exponential growth of the computational complexity with real time. Here we implement a nonequilibrium impurity solver based on the weak-coupling expansion and the tensor cross interpolation (TCI), and apply it to nonequilibrium dynamical mean-field theory (DMFT). The method approximates the integrands of the high-dimensional integrals arising in the weak-coupling expansion in a tensor-train form, enabling efficient evaluations without stochastic sampling and thereby mitigating the sign problem affecting continuous-time quantum Monte Carlo (CT-QMC) methods. Benchmark calculations for an exactly solvable nonequilibrium impurity model agree well with the exact results and reveal a low-rank structure of the integrands. When applied to interaction-quench problems in the half-filled Hubbard model, the method reproduces fast thermalization at a critical interaction strength with accuracy comparable to CT-QMC. Away from half filling, where the sign problem becomes even more severe, the present approach remains well controlled, revealing a crossover instead of a sharply defined fast thermalization point in the 3/4-filled case. The solver can also be applied to steady-state DMFT problems, yielding accurate spectral functions in the metallic regime without analytic continuation.", "url": "https://arxiv.org/abs/2607.00702", "type": "理论+数值", "summary": "由于实时计算复杂性呈指数级增长，模拟非平衡量子多体系统仍然是一个重大挑战。这里我们实现了一个基于弱耦合展开和张量交叉插值（TCI）的非平衡杂质求解器，并将其应用于非平衡动态平均场理论（DMFT）。该方法以张量序列形式近似弱耦合展开中产生的高维积分的被积函数，无需随机采样即可进行有效评估，从而减轻影响连续时间量子蒙特卡罗（CT-QMC）方法的符号问题。精确可解的非平衡杂质模型的基准计算与精确结果非常吻合，并揭示了被积函数的低阶结构。当应用于半填充哈伯德模型中的相互作用猝灭问题时，该方法以与 CT-QMC 相当的精度再现了临界相互作用强度下的快速热化。\n\n远离半填充时，符号问题变得更加严重，目前的方法仍然得到很好的控制，在 3/4 填充的情况下揭示了交叉而不是明确定义的快速热化点。该求解器还可以应用于稳态 DMFT 问题，在金属状态下产生精确的谱函数，而无需解析延拓。", "authors": [{"name": "Shuta Matsuura"}, {"name": "Hiroshi Shinaoka"}, {"name": "Philipp Werner"}, {"name": "Naoto Tsuji"}], "featured_authors": [{"name": "Shuta Matsuura"}, {"name": "Hiroshi Shinaoka"}, {"name": "Philipp Werner"}, {"name": "Naoto Tsuji"}], "author_count": 4}, {"id": "2607.00717", "category": "cond-mat", "title": "Atomic Cluster Expansion Potentials for Screw Dislocations in BCC Refractory Metals", "abstract": "Accurate atomistic modeling of screw dislocations in body-centered cubic (bcc) metals remains challenging because their plasticity is governed by a complex dislocation glide behavior due to their compact three-fold symmetric core structure and a strongly temperature-dependent flow stress induced by the large Peierls barrier. In the context of group 6 (V, Nb, Ta) and group 5 (Mo, W) refractory metals (RMs), both classical interatomic potentials and some machine learning potentials consistently fail to reproduce density functional theory (DFT) Peierls barriers and the glide plane. Here, we developed an array of atomic cluster expansion (ACE) potentials for these RMs by extending an existing DFT database. The developed ACE potentials significantly improve the description of screw dislocation properties, achieving near-DFT accuracy for Mo and W and substantial improvement for V, Nb, and Ta. The results show that transferability to screw dislocation behavior depends sensitively on both database composition and element-specific energetics, and that achieving a single-humped Peierls barrier alone is not a sufficient validation metric for accurate prediction of dislocation glide. For Nb, Mo, and W, the developed ACE models also enable reliable calculation of kink-pair activation enthalpies, which are well described by both Kocks' law and a line-tension model.", "url": "https://arxiv.org/abs/2607.00717", "type": "理论+数值", "summary": "体心立方（bcc）金属中螺型位错的精确原子建模仍然具有挑战性，因为其塑性受到复杂位错滑移行为的控制，这是由于其紧凑的三重对称核心结构和由大 Peierls 势垒引起的强烈依赖于温度的流动应力。在第 6 族（V、Nb、Ta）和第 5 族（Mo、W）难熔金属 (RM) 的背景下，经典原子间势和一些机器学习势始终无法重现密度泛函理论 (DFT) Peierls 势垒和滑移面。在这里，我们通过扩展现有的 DFT 数据库，为这些 RM 开发了一系列原子簇扩展 (ACE) 潜力。开发的 ACE 势显着改善了螺位错特性的描述，实现了 Mo 和 W 的接近 DFT 精度，以及 V、Nb 和 Ta 的显着改进。结果表明，螺旋位错行为的可转移性敏感地取决于数据库组成和特定元素的能量学，并且仅实现单峰 Peierls 势垒并不足以准确预测位错滑移的验证指标。\n\n对于 Nb、Mo 和 W，开发的 ACE 模型还能够可靠地计算扭结对激活焓，科克斯定律和线张力模型都很好地描述了这一点。", "authors": [{"name": "Lei Zhang"}, {"name": "Francesco Maresca"}], "featured_authors": [{"name": "Lei Zhang"}, {"name": "Francesco Maresca"}], "author_count": 2}, {"id": "2607.00756", "category": "cond-mat", "title": "The BiP-PRISM algorithm for fast and scalable core-loss STEM-EELS simulations", "abstract": "Quantitative interpretation of atomic-resolution STEM-EELS requires dynamical simulation of the electron probe before and after core-loss transitions, which is computationally expensive. While the PRISM algorithm accelerates this by reusing scattering matrices, we introduce beam partitioning for both the probe-forming ($\\mathcal{S}_1$) and detector-propagating ($\\mathcal{S}_2$) PRISM matrices to further reduce computational and memory costs. Each matrix is calculated on a sparse set of parent beams and reconstructed via natural-neighbor interpolation locally at the ionized atom. A locality result demonstrates that the total error is governed entirely by this on-atom reconstruction error. The resulting BiP-PRISM algorithm removes per-scan exit wave propagation and significantly reduces memory requirements, enabling full-resolution elemental mapping, 4D cubes, and momentum-resolved qEELS on consumer-grade GPUs. We characterize the approximation's validity regime and demonstrate the simulation of a multimodal five-edge oxide-interface map and an FePt nanoparticle Fe-L map at 5x memory reduction, showing that the algorithm achieves high accuracy with significantly lower computational demands.", "url": "https://arxiv.org/abs/2607.00756", "type": "数值", "summary": "原子分辨率 STEM-EELS 的定量解释需要在磁芯损耗转变之前和之后对电子探针进行动态模拟，这在计算上是昂贵的。虽然 PRISM 算法通过重用散射矩阵来加速这一过程，但我们为探针形成 ($\\mathcal{S}_1$) 和探测器传播 ($\\mathcal{S}_2$) PR​​ISM 矩阵引入了光束分区，以进一步降低计算和内存成本。每个矩阵都是在一组稀疏的母束上计算的，并通过电离原子局部的自然邻域插值来重建。局部性结果表明，总误差完全由原子重建误差决定。由此产生的 BiP-PRISM 算法消除了每次扫描的出射波传播，并显着降低了内存需求，从而在消费级 GPU 上实现全分辨率元素映射、4D 立方体和动量分辨 qEELS。\n\n我们表征了近似的有效性体系，并演示了在内存减少 5 倍的情况下对多模态五边氧化物界面图和 FePt 纳米粒子 Fe-L 图的模拟，表明该算法以显着降低的计算需求实现了高精度。", "authors": [{"name": "Philipp Pelz"}], "featured_authors": [{"name": "Philipp Pelz"}], "author_count": 1}, {"id": "2607.00762", "category": "cond-mat", "title": "Deconfined criticality between an antiferromagnetic insulator and a nodal d-wave superconductor: a quantum Monte Carlo study", "abstract": "We present a quantum Monte Carlo study of the transition between the insulating Néel state and the nodal $d$-wave superconductor on the square lattice at half-filling. We access a regime of frustrated magnetic order without a sign problem using a parton representation of the electron in terms of fermionic spinons and bosonic chargons. Both partons move in a background $\\pi$-flux (so the electron experiences no net flux) and are coupled to a quantum fluctuating SU(2) lattice gauge field. In contrast to earlier studies directly on the electronic degrees of freedom, we find evidence for a second-order deconfined quantum phase transition at which both the Néel and $d$-wave superconductivity orders vanish continuously. We compute correlators of the spinon-chargon composite with the same quantum numbers as the electron: we find a gapless Dirac dispersion inside the $d$-wave superconductor, turning into a gapped dispersion in the antiferromagnet.", "url": "https://arxiv.org/abs/2607.00762", "type": "理论+数值", "summary": "我们提出了量子蒙特卡罗研究，研究半填充时方形晶格上的绝缘尼尔态和节点 $d$ 波超导体之间的转变。我们使用电子的费米子自旋子和玻色子电荷的部分子表示来访问不存在符号问题的受挫磁序状态。两个部分子都在背景 $\\pi$ 通量中移动（因此电子没有经历净通量），并耦合到量子涨落 SU(2) 晶格规范场。与早期直接对电子自由度的研究相比，我们发现了二阶去限制量子相变的证据，在该相变中，尼尔波和 $d$ 波超导级连续消失。我们计算了与电子具有相同量子数的自旋-电荷复合材料的相关器：我们发现$d$波超导体内部存在无带隙狄拉克色散，转变为反铁磁体中的有带隙色散。", "authors": [{"name": "Chuang Chen"}, {"name": "Subir Sachdev"}, {"name": "Zi Yang Meng"}], "featured_authors": [{"name": "Chuang Chen"}, {"name": "Subir Sachdev"}, {"name": "Zi Yang Meng"}], "author_count": 3}, {"id": "2607.00765", "category": "cond-mat", "title": "Resilient $j$=3/2 superconductivity in topological semimetal YPtBi", "abstract": "Cooper pairing in most of the known fermionic superfluids occurs via spin-1/2 quasiparticle interactions that lead to spin-singlet or spin-triplet pairing. In the topological semimetal YPtBi, strong spin-orbit coupling results in a band inversion between highly symmetric $s$- and $p$-like electronic bands and a degeneracy at the $\\Gamma$ point that ensures the manifold of $j$=3/2 quasiparticle states thrive near the Fermi level, where superconducting pairing occurs. Here we study the effects of magnetic and nonmagnetic disorder and carrier density on this exotic superconducting pairing state. By varying levels of disorder and carrier densities by nearly two and three orders of magnitude, respectively, we show that the superconducting critical temperature of YPtBi has a remarkable robustness, with little variation across this span. Our results suggest that superconductivity in YPtBi may reside in a regime where phase stiffness, rather than pair formation, governs the transition temperature. The insensitivity of Cooper pairing to dramatic changes in quasiparticle environment in a $j$=3/2 superconductor highlights a new form of protection realized in topological high-spin superconductors.", "url": "https://arxiv.org/abs/2607.00765", "type": "理论", "summary": "大多数已知费米子超流体中的库珀配对是通过自旋 1/2 准粒子相互作用发生的，从而导致自旋单重态或自旋三重态配对。在拓扑半金属 YPtBi 中，强自旋轨道耦合导致高度对称的 $s$- 和 $p$- 类电子带之间的能带反转，以及 $\\Gamma$ 点的简并性，确保 $j$=3/2 准粒子态的流形在费米能级附近蓬勃发展，在那里发生超导配对。在这里，我们研究磁性和非磁性无序以及载流子密度对这种奇异的超导配对状态的影响。通过将无序度和载流子密度分别改变近两个和三个数量级，我们表明 YPtBi 的超导临界温度具有显着的鲁棒性，在整个范围内几乎没有变化。我们的结果表明，YPtBi 中的超导性可能处于相刚度（而不是电子对形成）控制转变温度的状态。\n\n库珀配对对 $j$=3/2 超导体中准粒子环境的剧烈变化不敏感，凸显了拓扑高自旋超导体中实现的新形式的保护。", "authors": [{"name": "Prathum Saraf"}, {"name": "Nicholas A. Crombie"}, {"name": "Rahul Sharma"}, {"name": "Jared Z. Dans"}, {"name": "Danila Sokratov"}, {"name": "Carsyn L. Mueller"}, {"name": "Ram Kumar"}, {"name": "Hyunsoo Kim"}, {"name": "Connor Roncaioli"}, {"name": "Winslow Weiss"}, {"name": "David Graf"}, {"name": "Chandra Shekhar"}, {"name": "Claudia Felser"}, {"name": "Johnpierre Paglione"}], "featured_authors": [{"name": "Prathum Saraf"}, {"name": "Nicholas A. Crombie"}, {"name": "Rahul Sharma"}, {"name": "Chandra Shekhar"}, {"name": "Claudia Felser"}, {"name": "Johnpierre Paglione"}], "author_count": 14}, {"id": "2607.00767", "category": "cond-mat", "title": "Power-Law Relaxation of Non-Gaussian Parameter and Self-Dynamic Structure Factor in Multidimensional Rugged Energy Landscapes", "abstract": "Ruggedness of the underlying energy landscape gives rise to heterogeneous mobility and non-Gaussian diffusion. We develop a theoretical framework for tagged-particle diffusion in multidimensional rugged energy landscapes modeled as correlated quenched Gaussian random fields. Using the self-propagator and self-dynamic structure factor, we characterize finite-time diffusion beyond the effective diffusion coefficient. We determine the effects of dimensionality, spatial correlations, and initial preparation. By introducing a coarse-grained mobility field and a mobility-memory approximation, we relate the non-Gaussian parameter to the time correlation of the mobility sampled by the particle. In the homogenized diffusive regime, the mobility correlation decays algebraically, leading to long-time relaxation of the non-Gaussian parameter as $t^{-1/2}$ in one dimension, $(\\ln t)/t$ in two dimensions, and $t^{-1}$ for $d>2$, with amplitudes that depend on dimensionality and the initial ensemble. Our results show that rugged energy landscapes leave distinct signatures in the effective diffusion coefficient, self-dynamic structure factor, and relaxation of non-Gaussian fluctuations.", "url": "https://arxiv.org/abs/2607.00767", "type": "理论", "summary": "基础能源景观的坚固性导致了异质流动性和非高斯扩散。我们开发了一个多维崎岖能量景观中标记粒子扩散的理论框架，该模型被建模为相关淬火高斯随机场。使用自传播器和自动态结构因子，我们描述了超出有效扩散系数的有限时间扩散。我们确定维度、空间相关性和初始准备的影响。通过引入粗粒度迁移率场和迁移率记忆近似，我们将非高斯参数与粒子采样的迁移率的时间相关性联系起来。在均匀扩散区域中，迁移率相关性以代数方式衰减，导致非高斯参数长时间松弛，在一维中为 $t^{-1/2}$，在二维中为 $(\\ln t)/t$，在 $d>2$ 中为 $t^{-1}$，其幅度取决于维度和初始系综。我们的结果表明，崎岖的能量景观在有效扩散系数、自动态结构因子和非高斯涨落松弛方面留下了明显的特征。", "authors": [{"name": "Bimman Bagchi"}], "featured_authors": [{"name": "Bimman Bagchi"}], "author_count": 1}, {"id": "2607.00892", "category": "cond-mat", "title": "Non-self-averaging topological Anderson insulator", "abstract": "Current research on the disordered topological quantum phases primarily focuses on the uncorrelated and short-range correlated disorder regime. These topological Anderson insulators are typically self-averaging. However, topological quantum systems with long-range correlated disorder have received limited attention due to the absence of tractable analytical methods. In fact, the long-range correlated disorder introduces more complex effects on topological quantum states. Here, we demonstrate that the long-range correlated disorder could induce anomalously statistical feature where the topological Anderson states become non-self-averaging, and the phase diagram is strongly dependent on individual disorder configurations. We term this statistical phase the non-self-averaging topological Anderson insulator. The non-self-averaging property is identified by the non-vanishing finite values of the relative variance of the Lyapunov exponent in the thermodynamic limit, alongside the non-Gaussian distributions of the Lyapunov exponent. Consequently, the topological properties of a single disordered sample deviate from the ensemble average, causing a breakdown of the central limit theorem. The non-self-averaging topological Anderson insulator provides insights into the interplay between correlated disorder and topology.", "url": "https://arxiv.org/abs/2607.00892", "type": "理论+数值", "summary": "目前无序拓扑量子相的研究主要集中在不相关和短程相关无序状态。这些拓扑安德森绝缘体通常是自平均的。然而，由于缺乏易于处理的分析方法，具有长程相关无序的拓扑量子系统受到的关注有限。事实上，长程相关无序对拓扑量子态引入了更复杂的影响。在这里，我们证明，长程相关无序可能会引起异常统计特征，其中拓扑安德森态变得非自平均，并且相图强烈依赖于个体无序配置。我们将此统计相称为非自平均拓扑安德森绝缘体。非自平均特性由热力学极限中李雅普诺夫指数相对方差的非零有限值以及李雅普诺夫指数的非高斯分布来识别。因此，单个无序样本的拓扑性质偏离整体平均值，导致中心极限定理的崩溃。\n\n非自平均拓扑安德森绝缘体提供了对相关无序与拓扑之间相互作用的见解。", "authors": [{"name": "Zheng-Wei Zuo"}, {"name": "Jun-Chong Liu"}], "featured_authors": [{"name": "Zheng-Wei Zuo"}, {"name": "Jun-Chong Liu"}], "author_count": 2}, {"id": "2607.00906", "category": "cond-mat", "title": "Strengthening and interface-mediated plastic co-deformation in an ultrafine Cr-Ni eutectic: A nanomechanical investigation", "abstract": "Ultrafine eutectic heterostructures provide a stringent test of plasticity in high-strength materials, where deformation must be accommodated through interfaces and strain gradients. Room temperature ductility is typically limited by premature fracture of the hard phase, leaving open the fundamental questions regarding the interface spacing, atomic structure and local chemistry that enable plastic co-deformation. Here we address this question using a model system of Cr-Ni binary alloy, processed via electron-beam powder bed fusion that produces a lamellar eutectic microstructure of Cr-rich BCC and Ni-rich FCC phases, with an average interlamellar spacing of ~450 nm. Atomic-resolution STEM revealed a stepped semi-coherent FCC/BCC interface with the Kurdjumov-Sachs orientation relationship and Ni-enrichment confined to a few atomic planes on the BCC side. In situ micro-scale compression and tension tests in SEM demonstrate high flow stresses coupled with large plastic strains without cracking, indicating stable accommodation of plastic incompatibility. Correlative TEM/HR-STEM establishes a deformation sequence: initial plasticity is dominated by strain-gradient driven dislocation accumulation in the FCC lamellae adjacent to interfaces, followed by deformation twinning in FCC and local interfacial shear and reorientation. The BCC phase subsequently develops a high density of mobile dislocations. Atomistic modeling has been employed to understand the influence of the FCC/BCC interface atomic structure and chemistry on the slip activation in the hard phase. These findings show that nanoscale confinement, stepped K-S interfacial structure, and interfacial chemistry collectively promote dislocation glide in a hard phase below its monolithic brittle to ductile transition temperature, and plastic codeformation at high flow strengths.", "url": "https://arxiv.org/abs/2607.00906", "type": "理论", "summary": "超细共晶异质结构为高强度材料的塑性提供了严格的测试，其中必须通过界面和应变梯度来适应变形。室温延展性通常受到硬相过早断裂的限制，从而留下了有关界面间距、原子结构和局部化学的基本问题，从而实现了塑性共变形。在这里，我们使用 Cr-Ni 二元合金模型系统来解决这个问题，该模型系统通过电子束粉末床熔合处理，产生富 Cr BCC 和富 Ni FCC 相的层状共晶微观结构，平均层间距约为 450 nm。原子分辨率 STEM 揭示了阶梯式半相干 FCC/BCC 界面，其具有 Kurdjumov-Sachs 取向关系，并且 Ni 富集仅限于 BCC 一侧的几个原子平面。 SEM 中的原位微尺度压缩和拉伸测试表明，具有高流动应力和大塑性应变，且没有开裂，表明塑料不相容性的稳定调节。\n\n相关 TEM/HR-STEM 建立了一个变形序列：初始塑性主要由界面附近的 FCC 片层中的应变梯度驱动的位错积累主导，随后是 FCC 中的变形孪晶以及局部界面剪切和重新取向。 BCC 阶段随后形成高密度的移动位错。原子建模已被用来了解 FCC/BCC 界面原子结构和化学对硬相滑移激活的影响。这些发现表明，纳米级限制、阶梯式 K-S 界面结构和界面化学共同促进了硬相中低于整体脆性到延性转变温度的位错滑移，以及高流动强度下的塑性共形成。", "authors": [{"name": "Arkajit Ghosh"}, {"name": "Mustafa Tobah"}, {"name": "Jianing Zhou"}, {"name": "Jian Wang"}, {"name": "Amit Misra"}], "featured_authors": [{"name": "Arkajit Ghosh"}, {"name": "Mustafa Tobah"}, {"name": "Jianing Zhou"}, {"name": "Jian Wang"}, {"name": "Amit Misra"}], "author_count": 5}, {"id": "2607.00991", "category": "cond-mat", "title": "Tensor Network Solvers for Ultra-large Tight-binding Hamiltonians: Algorithms and Applications", "abstract": "Understanding quantum materials at meso and even macroscopic scales requires tight-binding calculations on system sizes where explicit matrix representations become prohibitively costly. This represents a major bottleneck to rationalize phenomena in moiré and super-moiré heterostructures and quasicrystals. Here, we present a unified tensor-network methodology to solve tight-binding problems at exceptionally large scales, by mapping a system of $N = 2^L$ sites onto a many-body problem of $L$ pseudospin sites, which is subsequently solved with tensor network algorithms. For Hamiltonians with compressible real-space structure, the tensor network bond dimension remains modest, typically of order a few tens, independent of $N$.Tensor network representations of arbitrary hopping functions including long-range, spatially modulated, and twisted-layer couplings are built with quantics tensor cross interpolation, and all physical observables are evaluated entirely with tensor network algebra without explicit matrix storage or diagonalization. We demonstrate applications to spectral functions, momentum-space spectra via the tensor-network quantum Fourier transform, real-space topological invariants, real-time dynamics, correlation induced symmetry breaking with self-consistent mean-field calculations, non-Hermitian phenomena, and excitonic many-body physics. Our methodology enables routinely solving systems with billions of sites, by leveraging the tensor network compressibility of real-space structures, and establishing a flexible framework to study quantum matter at ultra-large length scales. The methodology is implemented in the open-source Julia package this http URL .", "url": "https://arxiv.org/abs/2607.00991", "type": "理论+数值", "summary": "在中观甚至宏观尺度上理解量子材料需要对系统尺寸进行严格约束的计算，其中显式矩阵表示的成本变得非常昂贵。这代表了莫尔条纹和超莫尔异质结构和准晶体现象合理化的主要瓶颈。在这里，我们提出了一种统一的张量网络方法，通过将 $N = 2^L$ 站点的系统映射到 $L$ 赝自旋站点的多体问题来解决异常大尺度的紧束缚问题，随后用张量网络算法解决该问题。对于具有可压缩实空间结构的哈密顿量，张量网络键维数保持适度，通常为几十量级，与 $N$ 无关。任意跳跃函数（包括长程、空间调制和扭曲层耦合）的张量网络表示是通过量子张量交叉插值构建的，并且所有物理可观测量完全使用张量网络代数进行评估，无需显式矩阵存储或对角化。\n\n我们演示了在谱函数、通过张量网络量子傅里叶变换的动量空间谱、实空间拓扑不变量、实时动力学、自洽平均场计算的相关诱导对称性破缺、非厄米特现象和激子多体物理中的应用。我们的方法通过利用真实空间结构的张量网络可压缩性，并建立一个灵活的框架来研究超大长度尺度的量子物质，可以常规地求解具有数十亿个站点的系统。该方法是在开源 Julia 包中实现的 http URL 。", "authors": [{"name": "Tiago V. C. Antão"}, {"name": "Anouar Moustaj"}, {"name": "Yitao Sun"}, {"name": "Jose L. Lado"}], "featured_authors": [{"name": "Tiago V. C. Antão"}, {"name": "Anouar Moustaj"}, {"name": "Yitao Sun"}, {"name": "Jose L. Lado"}], "author_count": 4}, {"id": "2607.00997", "category": "cond-mat", "title": "Geometry-Driven Magnetoelectric Coupling in Two-Dimensional Compensated Ferrimagnets", "abstract": "The magnetoelectric coupling in compensated magnets enables stray-field-free manipulation of spin-splitting, holding great promise for spintronics, but inherently hindered by the symmetry mismatch between spatial-inversion-broken ferroelectricity and time-reversal-broken spin states. Here, based on a symmetry-decoupled analysis of magnetoelectric coupling in compensated magnets, we establish a geometry-driven spin-ferroelectric coupling mechanism in bilayer breathing kagome lattices. Within this geometric framework interlocking the out-of-plane electric polarization with cooperative intralayer structural distortions, we demonstrate that polarization switching drives a deterministic reversal of the global spin splitting. First-principles calculations on a prototype bilayer Nb3Cl8 successfully validate this mechanism, demonstrating the switching of spin-splitting states through an energetically feasible, asynchronous layer-by-layer transition pathway. Our proposed coupling originates from lattice geometry and structural symmetry, establishing a unique route toward switchable spin splitting in compensated ferrimagnets.", "url": "https://arxiv.org/abs/2607.00997", "type": "理论+数值", "summary": "补偿磁体中的磁电耦合能够实现自旋分裂的无杂散场操纵，这为自旋电子学带来了巨大的希望，但本质上受到空间反转破坏的铁电性和时间反转破坏的自旋态之间的对称性失配的阻碍。在这里，基于补偿磁体磁电耦合的对称解耦分析，我们在双层呼吸戈薇晶格中建立了几何驱动的自旋铁电耦合机制。在这个将面外电极化与协同层内结构畸变联锁的几何框架内，我们证明了偏振切换驱动了全局自旋分裂的确定性反转。对原型双层 Nb3Cl8 的第一性原理计算成功验证了这一机制，证明了通过能量上可行的异步逐层跃迁路径实现自旋分裂态的切换。我们提出的耦合源于晶格几何和结构对称性，建立了补偿亚铁磁体中可切换自旋分裂的独特途径。", "authors": [{"name": "Peibo Xu"}, {"name": "Yixuan Che"}, {"name": "Haifeng Lv"}, {"name": "Xiaojun Wu"}, {"name": "Jinlong Yang"}], "featured_authors": [{"name": "Peibo Xu"}, {"name": "Yixuan Che"}, {"name": "Haifeng Lv"}, {"name": "Xiaojun Wu"}, {"name": "Jinlong Yang"}], "author_count": 5}, {"id": "2607.01004", "category": "cond-mat", "title": "Complex crystal structure prediction using ML-enhanced multi-minima iterative genetic algorithm", "abstract": "Current machine learning (ML) approaches for materials discovery rely heavily on known structural databases, limiting their ability to identify entirely novel structure types. In this work, we develop a multi-minima iterative genetic algorithm (MMIGA) that integrates an artificial-neural-network machine learning (ANN-ML) interatomic potential with an iterative, metadynamics-inspired penalty scheme. We demonstrate the robustness of this method on a complex ternary La-Co-Pb system, characterized by Co-Pb immiscibility and an intricate energy landscape. The ML-enhanced MMIGA successfully predicts the ground-state Pbam structure of the recently synthesized La4Co4Pb antagonistic-pair-phase, a novel structure missed by previous database-reliant ML predictions, while also identifying multiple metastable competing phases. Additionally, we challenged the MMIGA method to predict the structure of La5CoPb2 antagonistic-pair-phase, a new compound discovered during earlier attempts to synthesize the predicted phase La3CoPb. With only knowledge of the composition, our MMIGA approach successfully predicts the orthorhombic structure of La5CoPb2, producing an exact match with the structure independently determined by x-ray diffraction. By efficiently mapping both global minimum and relevant competing metastable states, this approach provides critical theoretical insights into phase selection for novel quantum and magnetic materials.", "url": "https://arxiv.org/abs/2607.01004", "type": "理论+数值", "summary": "当前用于材料发现的机器学习（ML）方法严重依赖已知的结构数据库，限制了它们识别全新结构类型的能力。在这项工作中，我们开发了一种多极小值迭代遗传算法（MMIGA），它将人工神经网络机器学习（ANN-ML）原子间势与迭代、元动力学启发的惩罚方案相结合。我们证明了该方法在复杂三元 La-Co-Pb 系统上的鲁棒性，该系统的特点是 Co-Pb 不混溶性和复杂的能量景观。 ML 增强型 MMIGA 成功预测了最近合成的 La4Co4Pb 拮抗对相的基态 Pbam 结构，这是之前依赖数据库的 ML 预测所错过的一种新颖结构，同时还识别了多个亚稳态竞争相。此外，我们挑战 MMIGA 方法来预测 La5CoPb2 拮抗对相的结构，这是在早期尝试合成预测相 La3CoPb 时发现的一种新化合物。\n\n仅凭借成分知识，我们的 MMIGA 方法就成功预测了 La5CoPb2 的斜方结构，与 X 射线衍射独立确定的结构完全匹配。通过有效地映射全局最小值和相关的竞争亚稳态，该方法为新型量子和磁性材料的相选择提供了重要的理论见解。", "authors": [{"name": "Ling Tang"}, {"name": "Weiyi Xia"}, {"name": "Tyler J. Slade"}, {"name": "Paul C. Canfield"}, {"name": "Cai-Zhuang Wang"}], "featured_authors": [{"name": "Ling Tang"}, {"name": "Weiyi Xia"}, {"name": "Tyler J. Slade"}, {"name": "Paul C. Canfield"}, {"name": "Cai-Zhuang Wang"}], "author_count": 5}, {"id": "2607.01009", "category": "cond-mat", "title": "Phase diagram of a double-occupancy cell model of a fluid with Curie-Weiss interaction", "abstract": "A double-occupancy cell model of a fluid with Curie-Weiss interaction is studied. First, we show that the model is isomorphic to the Blume-Capel model on a complete graph through a simple transformation from spin to occupancy variables. We then investigate its phase behavior within the grand-canonical ensemble using a combination of analytical and numerical methods. Despite its simplicity, the model exhibits a remarkably rich thermodynamic behavior depending on the ratio between the local repulsive and global attractive interactions. We identify regimes characterized by a single critical point, two distinct critical points, tricritical behavior, and triple-point formation. For sufficiently strong repulsion, the system possesses three fluid phases of different densities, leading to both gas-liquid and liquid-liquid coexistence. The locations of the critical, tricritical, and triple points are determined, and the corresponding phase diagrams are constructed. These results demonstrate that the competition between double-occupancy repulsion and long-range attraction is sufficient to generate complex phase behavior in a minimal multiple-occupancy lattice-gas model.", "url": "https://arxiv.org/abs/2607.01009", "type": "理论+数值", "summary": "研究了具有居里-魏斯相互作用的流体的双占据单元模型。首先，我们通过从自旋变量到占用变量的简单转换，证明该模型与完整图上的 Blume-Capel 模型同构。然后，我们结合分析和数值方法研究其在大正则系综中的相行为。尽管很简单，但该模型表现出非常丰富的热力学行为，具体取决于局部排斥相互作用和全局吸引相互作用之间的比率。我们确定了以单个临界点、两个不同的临界点、三临界行为和三重点形成为特征的状态。为了获得足够强的排斥力，该系统具有不同密度的三种流体相，从而导致气-液和液-液共存。确定临界点、三临界点和三相点的位置，并构建相应的相图。这些结果表明，双占据排斥和长程吸引力之间的竞争足以在最小多占据晶格气体模型中产生复杂的相行为。", "authors": [{"name": "R. V. Romanik"}, {"name": "O. A. Dobush"}, {"name": "M. P. Kozlovskii"}, {"name": "I. V. Pylyuk"}, {"name": "M. A. Shpot"}], "featured_authors": [{"name": "R. V. Romanik"}, {"name": "O. A. Dobush"}, {"name": "M. P. Kozlovskii"}, {"name": "I. V. Pylyuk"}, {"name": "M. A. Shpot"}], "author_count": 5}, {"id": "2607.01016", "category": "cond-mat", "title": "Effect of radially heterogeneous band gap collapse on formation of swift heavy ion tracks in Al2O3", "abstract": "We estimate the effects of radial heterogeneity in the collapse of the electronic band gap on the damage in Al2O3 after impact of a swift heavy ion decelerated in the electronic stopping regime. The Monte Carlo code TREKIS describes the initial excitation of the electronic and ionic systems following the ion passage, while the density functional theory based molecular dynamics traces changes in the band structure in the ion track. This combination of methods enables us to compute the profile of energy transferred to the lattice by the time of relaxation of the electronic excitation, accounting for the induced spatial inhomogeneity of the band structure around the ion trajectory. We demonstrate that impact of a 700 MeV Bi ion induces a transient metal-semiconductor heterojunction in Al2O3: the metallization (the band gap collapse) occurs within a radius of about 2 nm from the ion trajectory. The band gap shrinks at distances of about 3-5 nm, while it remains almost unaffected at radii larger than 5 nm. Using this data, we estimate the atomic heating depending on the degree of band gap reduction at different radii from the ion trajectory. This approach refines the damage modeling, producing more pronounced discontinuous damage patterns along the ion path for all crystallographic directions compared to the model that assumes all the energy accumulated in the electron-hole ensemble is delivered to the atoms.", "url": "https://arxiv.org/abs/2607.01016", "type": "理论+数值", "summary": "我们估计了在电子停止状态下减速的快速重离子撞击后电子带隙崩溃中的径向异质性对 Al2O3 损伤的影响。蒙特卡罗代码 TREKIS 描述了离子通过后电子和离子系统的初始激发，而基于密度泛函理论的分子动力学则跟踪离子轨道中能带结构的变化。这种方法的组合使我们能够计算通过电子激发弛豫时间转移到晶格的能量分布，从而解释离子轨迹周围能带结构引起的空间不均匀性。我们证明，700 MeV Bi 离子的撞击会在 Al2O3 中诱发瞬态金属-半导体异质结：金属化（带隙塌陷）发生在距离离子轨迹约 2 nm 的半径内。带隙在距离约 3-5 nm 时收缩，而在半径大于 5 nm 时几乎不受影响。使用这些数据，我们根据离子轨迹不同半径处的带隙减小程度来估计原子加热。\n\n与假设电子空穴系综中积累的所有能量都传递给原子的模型相比，这种方法改进了损伤建模，在所有晶体方向的离子路径上产生更明显的不连续损伤模式。", "authors": [{"name": "Roman Voronkov"}, {"name": "Danil Zainutdinov"}, {"name": "Nikita Medvedev"}, {"name": "Alexander E. Volkov"}], "featured_authors": [{"name": "Roman Voronkov"}, {"name": "Danil Zainutdinov"}, {"name": "Nikita Medvedev"}, {"name": "Alexander E. Volkov"}], "author_count": 4}, {"id": "2607.01038", "category": "cond-mat", "title": "Exact interlayer triplet-pairing eigenstates in the extended Hubbard model", "abstract": "$\\eta$-pairing symmetry generalizes the pairing mechanisms in superconductivity but is broken in the presence of interlayer interactions. In this work, we extend this approach to triplet pairs. We propose interlayer triplet-pairing operators for the multi-layer extended Hubbard model. We find that a set of exact condensate-pair eigenstates can be constructed, which exhibit off-diagonal long-range order. In contrast to the $\\eta$-pairing mechanism, this originates from restricted spectrum generating algebra and is only available for bilayer and trilayer systems in the presence of interlayer Hubbard interactions. Nevertheless, the system also retains the original on-site $\\eta$-pairing symmetry in the absence of interlayer interactions. Consequently, both singlet and triplet pairs coexist in the eigenstates of the multi-layer Hubbard model. We employ quench dynamics to demonstrate the results through numerical simulations. Our findings open avenues for the study of exact condensate-pair states in strongly correlated systems.", "url": "https://arxiv.org/abs/2607.01038", "type": "理论+数值", "summary": "$\\eta$配对对称性概括了超导性中的配对机制，但在存在层间相互作用时被打破。在这项工作中，我们将这种方法扩展到三元组对。我们为多层扩展哈伯德模型提出了层间三元组配对算子。我们发现可以构造一组精确的凝聚对本征态，它们表现出非对角长程有序。与 $\\eta$ 配对机制相反，它源自受限谱生成代数，并且仅适用于存在层间哈伯德相互作用的双层和三层系统。尽管如此，该系统在没有层间相互作用的情况下也保留了原始的现场 $\\eta$ 配对对称性。因此，单线态和三线态对共存于多层哈伯德模型的本征态中。我们采用淬火动力学通过数值模拟来演示结果。我们的研究结果为研究强相关系统中精确的凝聚对态开辟了道路。", "authors": [{"name": "F. X. Liu"}, {"name": "Z. Song"}], "featured_authors": [{"name": "F. X. Liu"}, {"name": "Z. Song"}], "author_count": 2}, {"id": "2607.01062", "category": "cond-mat", "title": "Chiral enhancement of two-magnon bound states in an $S=1/2$ triangular-lattice magnet", "abstract": "We study one- and two-magnon excitations above the fully polarized state of the spin-$1/2$ triangular-lattice $J_1$-$J_2$-$J_3$ Heisenberg model with an additional uniform scalar-chirality interaction. In the one-magnon sector of the Heisenberg model, we identify two special minimum manifolds by rewriting the dispersion in complete-square form. The scalar-chirality term cancels exactly in this sector, leaving the one-magnon dispersion and the single-magnon instability unchanged. In contrast, it survives in the two-magnon sector as an oriented interaction between neighboring flipped spins. Using symmetry-adapted triangular-lattice harmonics, we derive finite-dimensional gap equations at the $\\Gamma$ point in the symmetry-resolved $\\mathsf{A_1}$ and $\\mathsf{E_2}$-type partial-wave channels. The chirality coupling splits the two opposite relative-motion chiralities in the $\\mathsf{E_2}$-type sector, thereby selectively enhancing one two-magnon bound-state channel. Exact diagonalization confirms this mechanism and reveals enhanced binding, as well as additional bound states at $M$ and at incommensurate total momenta. Our results identify scalar chirality as an efficient microscopic mechanism for strengthening two-magnon binding without shifting the one-magnon spectrum, and provide a route toward high-field spin-nematic and multipolar instabilities.", "url": "https://arxiv.org/abs/2607.01062", "type": "理论+数值", "summary": "我们研究自旋 $1/2$ 三角晶格 $J_1$-$J_2$-$J_3$ 海森堡模型的完全极化状态之上的一磁振子和二磁振子激发，并具有额外的均匀标量手性相互作用。在海森堡模型的一磁振子扇区中，我们通过将色散重写为完全平方形式来识别两个特殊的最小流形。标量手性项在该区域中完全抵消，使单磁振子色散和单磁振子不稳定性保持不变。相比之下，它在双磁振子区域中作为相邻翻转自旋之间的定向相互作用而存在。使用对称适应的三角晶格谐波，我们推导了对称解析的$\\mathsf{A_1}$和$\\mathsf{E_2}$型部分波通道中$\\Gamma$点处的有限维间隙方程。手性耦合将 $\\mathsf{E_2}$ 型扇区中的两个相反的相对运动手性分开，从而选择性地增强一个双磁振子束缚态通道。精确的对角化证实了这种机制，并揭示了增强的结合，以及 $M$ 和不相称的总动量下的附加束缚态。\n\n我们的研究结果表明，标量手性是一种有效的微观机制，可以在不改变单磁振子光谱的情况下加强双磁振子结合，并为实现高场自旋向列和多极不稳定性提供了一条途径。", "authors": [{"name": "László Rudner"}, {"name": "Karlo Penc"}], "featured_authors": [{"name": "László Rudner"}, {"name": "Karlo Penc"}], "author_count": 2}, {"id": "2607.01081", "category": "cond-mat", "title": "Exact dimer ground states of long-range spin chains and ladders", "abstract": "Interacting spin chains and ladders are known to support a plethora of quantum phases with complex ground-state phase diagrams. In this work, we study a large family of such models and determine precise, explicit conditions under which an exact dimer state is guaranteed to be the ground state. These general conditions are validated for various generalizations of the Majumdar-Ghosh model using exact diagonalization. Our results provide exact reference points in the phase diagrams of a wide class of spin chains and ladders, including those with anisotropic and arbitrary-range interactions.", "url": "https://arxiv.org/abs/2607.01081", "type": "理论+数值", "summary": "已知相互作用的自旋链和梯子支持大量具有复杂基态相图的量子相。在这项工作中，我们研究了大量此类模型，并确定了精确、明确的条件，在这些条件下，保证精确的二聚体状态为基态。使用精确对角化对 Majumdar-Ghosh 模型的各种推广验证了这些一般条件。我们的结果为多种自旋链和梯子的相图中提供了精确的参考点，包括具有各向异性和任意范围相互作用的自旋链和梯子。", "authors": [{"name": "Jędrzej Wardyn"}, {"name": "Miłosz Panfil"}], "featured_authors": [{"name": "Jędrzej Wardyn"}, {"name": "Miłosz Panfil"}], "author_count": 2}, {"id": "2607.01146", "category": "cond-mat", "title": "Strange Luttinger liquids in a cavity-embedded one-dimensional electronic chain", "abstract": "We study a one-dimensional electronic chain coupled to a homogeneous quantized vacuum field and electron-electron interactions. In the absence of the latter, we derive a low-energy effective description in the presence of light-matter coupling, which we identify as a strange Luttinger liquid. Although it retains a formal resemblance to conventional Luttinger liquid theory, the coupling to the quantum field qualitatively modifies the low-energy sector and breaks the standard velocity relation underlying Luttinger universality. For finite electron-electron interactions, we recover a phase diagram featuring several phases as a function of interaction strength and hopping amplitude, including a phase hosting Majorana-like zero modes. Using exact diagonalization, we compute observables that characterize the phase boundaries and show that the cavity field significantly shifts them. We also study the fate of Majorana-like states under the influence of the cavity field, highlighting their modification by light-matter coupling. Finally, we investigate whether the strange Luttinger liquid description identified in the noninteracting regime continues to hold when electron-electron interactions are introduced.", "url": "https://arxiv.org/abs/2607.01146", "type": "理论+数值", "summary": "我们研究与均匀量子化真空场和电子-电子相互作用耦合的一维电子链。在没有后者的情况下，我们在光-物质耦合存在的情况下得出了低能有效描述，我们将其识别为一种奇怪的卢廷格液体。尽管它在形式上与传统的路廷格液体理论保持相似，但与量子场的耦合定性地修改了低能部分，并打破了路廷格普遍性背后的标准速度关系。对于有限的电子-电子相互作用，我们恢复了一个相图，该相图具有作为相互作用强度和跳跃幅度的函数的多个相，包括托管类马约拉纳零模式的相。使用精确对角化，我们计算了表征相边界的可观测量，并表明腔场显着地改变了相边界。我们还研究了类马约拉纳态在空腔场影响下的命运，强调了它们通过光-物质耦合的改变。\n\n最后，我们研究了当引入电子-电子相互作用时，在非相互作用状态下确定的奇怪的卢廷格液体描述是否继续成立。", "authors": [{"name": "Danh-Phuong Nguyen"}, {"name": "Christophe Mora"}, {"name": "Cristiano Ciuti"}], "featured_authors": [{"name": "Danh-Phuong Nguyen"}, {"name": "Christophe Mora"}, {"name": "Cristiano Ciuti"}], "author_count": 3}, {"id": "2607.01149", "category": "cond-mat", "title": "Topological Hall effect due to electron-skyrmion scattering", "abstract": "Electron scattering from chiral spin textures such as skyrmions is fundamental to the understanding of transport in more complex systems, including skyrmion crystals. Most of the previous studies have focused on the weak-coupling regime, where the exchange interaction is small compared with the electron energy. Real materials, however, often lie in the strong-coupling regime, which exhibits qualitatively different behavior. Using the Lippmann-Schwinger equation and Green's function formalism, valid for all coupling strengths, we uncover several new features in the scattering cross section, including Ramsauer-Townsend minima, pronounced intermediate-coupling resonances, and Landau-level resonances for skyrmions with larger winding numbers. These features strongly influence the topological and spin Hall conductivities, which depend sensitively on the incident electron energy. Our work provides important insights into the Hall transport in collective chiral spin textures such as the skyrmion crystal.", "url": "https://arxiv.org/abs/2607.01149", "type": "理论", "summary": "来自手性自旋纹理（例如斯格明子）的电子散射对于理解更复杂系统（包括斯格明子晶体）中的传输至关重要。以前的大多数研究都集中在弱耦合状态，其中交换相互作用与电子能量相比很小。然而，真实的材料通常处于强耦合状态，表现出性质不同的行为。使用对所有耦合强度都有效的李普曼-施温格方程和格林函数形式，我们发现了散射截面中的几个新特征，包括拉姆绍尔-汤森最小值、明显的中间耦合共振以及具有较大绕数的斯格明子的朗道能级共振。这些特征强烈影响拓扑和自旋霍尔电导率，其敏感地依赖于入射电子能量。我们的工作为集体手性自旋纹理（例如斯格明子晶体）中的霍尔传输提供了重要的见解。", "authors": [{"name": "Arijit Mandal"}, {"name": "Hareram Swain"}, {"name": "B. R. K. Nanda"}, {"name": "S. Satpathy"}], "featured_authors": [{"name": "Arijit Mandal"}, {"name": "Hareram Swain"}, {"name": "B. R. K. Nanda"}, {"name": "S. Satpathy"}], "author_count": 4}, {"id": "2607.00071", "category": "hep-th", "title": "Towards Equations for String Amplitudes", "abstract": "Generic Feynman integrals are widely studied as solutions of Picard-Fuchs equations on moduli spaces of their parameters, and this calls for consideration of this phenomenon at a more basic level - of string amplitudes which are integrals over true non-singular module space of Riemann surfaces and their various generalizations. The main puzzle here is that a single string amplitude involves mane different particle diagrams, corresponding to different parts of the same moduli space, but different particle diagrams are usually believed to satisfy different equations, not unified into a common entity. We begin investigation of this problem, starting from Koba-Nielsen diagrams. While there is nothing interesting at this level for particles, the tree-level open bosonic string amplitudes satisfy non-trivial linear difference equations in kinematic variables. Moreover, the integration-by-parts on moduli space, standing behind Picard-Fuchs equations for particle loops, for strings are operative already at the tree level. We construct a complete system of such equations for arbitrary n-point tree amplitudes, with the number of independent relations matching the kinematic parameters. In variance with the particle case equations are difference ones rather than differential. The low-energy limit $\\alpha \\to 0$ smoothly recovers the algebraic QFT structure.", "url": "https://arxiv.org/abs/2607.00071", "type": "理论", "summary": "通用费曼积分作为 Picard-Fuchs 方程在其参数模空间上的解被广泛研究，这需要在更基本的层面上考虑这种现象 - 弦振幅，它是黎曼曲面的真正非奇异模空间上的积分及其各种推广。这里的主要难题是，单弦振幅涉及许多不同的粒子图，对应于同一模空间的不同部分，但不同的粒子图通常被认为满足不同的方程，而不是统一为一个共同的实体。我们从 Koba-Nielsen 图开始研究这个问题。虽然粒子在这个层面上没有什么有趣的，但树级开放玻色弦振幅满足运动学变量中的非平凡线性差分方程。此外，模空间上的分部积分（支持粒子循环的 Picard-Fuchs 方程）、弦的分部积分已经在树级别起作用。我们针对任意 n 点树振幅构建了一个完整的此类方程组，其中独立关系的数量与运动学参数相匹配。\n\n与粒子情况方程不同的是差分方程而不是微分方程。低能量极限 $\\alpha \\ 到 0$ 平滑地恢复了代数 QFT 结构。", "authors": [{"name": "A.Morozov"}, {"name": "K.Pushkin"}, {"name": "M.Reva"}], "featured_authors": [{"name": "A.Morozov"}, {"name": "K.Pushkin"}, {"name": "M.Reva"}], "author_count": 3}, {"id": "2607.00074", "category": "hep-th", "title": "Holographic Spread Complexity from Branes and Strings", "abstract": "We study Krylov spread complexity in holographic theories using genuine string-theory probes. Building on the proposal that the growth rate of spread complexity is measured by a proper momentum in the bulk, we embed the falling-particle picture in top-down examples. We first analyse a D0 brane in the type IIA AdS$_4\\times {\\mathbb{CP}}^3$ background dual to ABJM theory, identifying it with a dressed monopole operator in the boundary CFT. For purely radial motion the proper-momentum prescription reproduces the expected quadratic growth of the complexity. When the probe carries momentum along an isometric direction, the naive prescription gives an apparent conflict with the short-time behaviour required of Krylov complexity. We propose that the correct fixed-charge description is obtained by Legendre transforming to the Routhian. We support the D0-brane interpretation through the regulated monopole two-point function, whose survival amplitude determines the Krylov moments, and we show that radial fluctuations give controlled corrections to the effective energy governing the complexity growth. We then extend the analysis to a rotating non-BPS D3 brane in AdS$_5\\times S^5$, where angular momentum produces a centrifugal barrier and a sharp condition for radial in-fall. In the falling regime the Routhian prescription again gives the correct short-time behaviour. Finally, we consider a wound fundamental string in AdS$_5\\times S^5$, which reduces to an effective massive falling particle. This clarifies the distinction between Noether charges, which require a fixed-charge Routhian treatment, and winding data, which enter through the effective mass. Our results provide a string-theoretic realisation of holographic spread complexity for point-like and extended excitations, making manifest their dependence on field theory parameters.", "url": "https://arxiv.org/abs/2607.00074", "type": "理论", "summary": "我们使用真正的弦理论探针研究全息理论中的克雷洛夫传播复杂性。基于扩展复杂性的增长率是通过整体的适当动量来衡量的提议，我们将下落粒子的图片嵌入到自上而下的示例中。我们首先分析与 ABJM 理论对偶的 IIA AdS$_4\\times {\\mathbb{CP}}^3$ 背景中的 D0 膜，将其识别为边界 CFT 中的修饰单极算子。对于纯径向运动，固有动量规定再现了复杂性的预期二次增长。当探测器沿着等距方向携带动量时，朴素的规定与克雷洛夫复杂性所需的短时行为存在明显的冲突。我们建议正确的固定电荷描述是通过勒让德变换到劳斯矩阵获得的。我们通过调节单极两点函数支持 D0 膜解释，其生存幅度决定了 Krylov 矩，并且我们表明径向波动对控制复杂性增长的有效能量提供了受控校正。\n\n然后，我们将分析扩展到 AdS$_5\\times S^5$ 中的旋转非 BPS D3 膜，其中角动量产生离心势垒和径向下落的急剧条件。在下降状态中，劳斯处方再次给出了正确的短时行为。最后，我们考虑 AdS$_5\\times S^5$ 中的缠绕基本弦，它减少为有效的大量下落粒子。这澄清了诺特电荷（需要固定电荷劳斯处理）和缠绕数据（通过有效质量进入）之间的区别。我们的结果提供了点状和扩展激励的全息扩展复杂性的弦理论实现，表明它们对场论参数的依赖。", "authors": [{"name": "Dimitrios Chatzis"}, {"name": "Madison Hammond"}, {"name": "Carlos Nunez"}, {"name": "Alfonso V. Ramallo"}, {"name": "Ricardo T. Santamaria"}], "featured_authors": [{"name": "Dimitrios Chatzis"}, {"name": "Madison Hammond"}, {"name": "Carlos Nunez"}, {"name": "Alfonso V. Ramallo"}, {"name": "Ricardo T. Santamaria"}], "author_count": 5}, {"id": "2607.00076", "category": "hep-th", "title": "Localization, Factorization and Dualities for Elliptic Kernels", "abstract": "We study the exact partition function of 4d $\\mathcal N=1$ supersymmetric gauge theories on a torus times a cylinder $\\mathrm{Cyl}=I\\times S^1$, where $I$ is a finite interval carrying two boundary components. Each endpoint supports an independent Dirichlet or Robin-like boundary polarization, so that the partition function is a boundary-to-boundary elliptic kernel. We construct the rigid supersymmetric geometry, determine the BPS locus, and compute the chiral-multiplet 1-loop determinants for the four possible boundary polarizations via equivariant localization. The resulting elementary building blocks are theta functions dressed by cubic phases. We then prove rank-changing Seiberg-type dualities as identities of Jeffrey--Kirwan residues of these elliptic kernels. We also discuss factorization into holomorphic-block cap wavefunctions represented by elliptic Gamma functions, dimensional reductions to three and two dimensions, complete-intersection gauged linear sigma models, and elliptic kernels for 4d $\\mathcal N=4$ super Yang--Mills and the Klebanov--Witten theory, useful for holographic applications.", "url": "https://arxiv.org/abs/2607.00076", "type": "理论", "summary": "我们研究 4d $\\mathcal N=1$ 超对称规范理论在圆环乘以圆柱 $\\mathrm{Cyl}=I\\times S^1$ 上的精确配分函数，其中 $I$ 是带有两个边界分量的有限区间。每个端点支持独立的 Dirichlet 或 Robin-like 边界极化，因此配分函数是边界到边界的椭圆核。我们构造刚性超对称几何，确定 BPS 轨迹，并通过等变局部化计算四种可能边界极化的手性多重 1 环行列式。由此产生的基本构建块是由立方相修饰的 θ 函数。然后，我们证明了等级变化的 Seiberg 型对偶性作为这些椭圆核的 Jeffrey-Kirwan 留数的恒等式。我们还讨论了由椭圆 Gamma 函数表示的全纯块帽波函数的分解、三维和二维的降维、完全相交测量的线性 sigma 模型以及 4d $\\mathcal N=4$ super Yang--Mills 和 Klebanov--Witten 理论的椭圆核，这对全息应用很有用。", "authors": [{"name": "Alessio Fontanarossa"}, {"name": "Fabrizio Nieri"}, {"name": "Antonio Pittelli"}], "featured_authors": [{"name": "Alessio Fontanarossa"}, {"name": "Fabrizio Nieri"}, {"name": "Antonio Pittelli"}], "author_count": 3}, {"id": "2607.00078", "category": "hep-th", "title": "Exploring Line Bundle Standard Models with Transformers", "abstract": "We propose a Transformer-based Reinforcement Learning architecture, \"LB-Explorer\", to search for heterotic line bundle standard models arising from compactifications on smooth Calabi-Yau (CY) threefolds. We construct $E_8\\times E_8$ vacua with $\\text{SU}(5)$ symmetry, where the $\\text{SU}(5)$ can be further broken to the Standard Model gauge group via discrete Wilson lines. We test the LB-Explorer environment on complete intersection Calabi-Yau (CICY) manifolds, though the neural network architecture naturally generalizes to any CY admitting a smooth, simplicial Mori cone and a freely-acting discrete symmetry. The LB-Explorer efficiently learns constraints on the line bundle sums, guaranteeing the $E_8$ gauge embedding, anomaly cancellation, poly-stability (supersymmetry), chirality of the spectrum, and the absence of exotic matter. Valid configurations can be subsequently filtered by imposing the missing constraints, such as the equivariant structure of the line bundle sum and further requirements on the particle spectrum. In this direction, we introduce a hybrid architecture incorporating CP-SAT solvers that aims to impose some of the conditions exactly by perturbing solutions found by the LB-Explorer. The versatility and scalability of the LB-Explorer make it a powerful tool for navigating the string landscape with a large number of moduli. The code and tools necessary to reproduce our findings are available at this https URL", "url": "https://arxiv.org/abs/2607.00078", "type": "理论", "summary": "我们提出了一种基于 Transformer 的强化学习架构“LB-Explorer”，用于搜索由平滑 Calabi-Yau (CY) 三重压缩产生的杂质线丛标准模型。我们构造具有 $\\text{SU}(5)$ 对称性的 $E_8\\times E_8$ 真空，其中 $\\text{SU}(5)$ 可以通过离散 Wilson 线进一步分解为标准模型规范组。我们在完全相交 Calabi-Yau (CICY) 流形上测试 LB-Explorer 环境，尽管神经网络架构自然地推广到任何允许平滑、单纯 Mori 锥体和自由作用离散对称性的 CY。 LB-Explorer 有效地学习线束总和的约束，保证 $E_8$ 规范嵌入、异常消除、多稳定性（超对称性）、光谱的手性以及不存在外来物质。随后可以通过施加缺失的约束来过滤有效配置，例如线束和的等变结构以及对粒子谱的进一步要求。\n\n在这个方向上，我们引入了一种包含 CP-SAT 求解器的混合架构，旨在通过扰动 LB-Explorer 找到的解来精确地施加一些条件。 LB-Explorer 的多功能性和可扩展性使其成为导航具有大量模数的字符串景观的强大工具。重现我们的发现所需的代码和工具可在此 https URL 中找到", "authors": [{"name": "Jacky H. T. Yip"}, {"name": "Alessandro Mininno"}, {"name": "Gary Shiu"}], "featured_authors": [{"name": "Jacky H. T. Yip"}, {"name": "Alessandro Mininno"}, {"name": "Gary Shiu"}], "author_count": 3}, {"id": "2607.00079", "category": "hep-th", "title": "QFT as a set of ODEs: higher dimensions", "abstract": "Correlation functions of local operators in Quantum Field Theory (QFT) in Anti-de Sitter space (AdS) are completely fixed by the QFT data: the set of scaling dimensions $\\Delta_i$ and OPE coefficients $C_{ijk}$ of the boundary operators, and the bulk-boundary (BOE) coefficients $b^{\\hat\\Phi}_i$ encoding how bulk fields decompose into boundary operators. In this work, we generalize the ordinary differential equations (ODEs) that govern the variation of the QFT data under a bulk relevant deformation, originally derived for AdS$_2$ \\cite{Loparco:2026fki}, to the cases of AdS$_3$ and AdS$_4$. We demonstrate that these flow equations natively capture the mechanism of merger-annihilation when a boundary operator hits marginality, as well as level repulsion when different $\\Delta_i$'s approach each other. Furthermore, we address the practical implementation of the framework: we propose substituting the ODE for the OPE coefficients with the crossing equation for greater efficiency, and we observe that Padé approximants dramatically improve the convergence of the sums over boundary operators, at least in free theories. Altogether, these advances lay the groundwork for the future application of the flow equations to the study of strongly coupled QFTs in AdS and their flat space limits.", "url": "https://arxiv.org/abs/2607.00079", "type": "理论", "summary": "反德西特空间 (AdS) 中量子场论 (QFT) 中局部算子的相关函数完全由 QFT 数据固定：边界算子的缩放维度 $\\Delta_i$ 和 OPE 系数 $C_{ijk}$ 的集合，以及编码体域如何分解为边界算子的体边界 (BOE) 系数 $b^{\\hat\\Phi}_i$。在这项工作中，我们将控制 QFT 数据在整体相关变形下变化的常微分方程 (ODE) 推广到 AdS$_3$ 和 AdS$_4$ 的情况，这些常微分方程最初是针对 AdS$_2$ \\cite{Loparco:2026fki} 导出的。我们证明，这些流动方程本身就捕获了边界算子达到边缘时的合并湮灭机制，以及不同的 $\\Delta_i$ 彼此接近时的水平排斥机制。此外，我们还讨论了该框架的实际实现：我们建议用交叉方程代替 OPE 系数以提高效率，并且我们观察到 Padé 近似极大地提高了边界算子上的和的收敛性，至少在自由理论中是这样。\n\n总而言之，这些进展为未来应用流动方程研究 AdS 中的强耦合 QFT 及其平坦空间限制奠定了基础。", "authors": [{"name": "Fabiana De Cesare"}, {"name": "Manuel Loparco"}], "featured_authors": [{"name": "Fabiana De Cesare"}, {"name": "Manuel Loparco"}], "author_count": 2}, {"id": "2607.00082", "category": "hep-th", "title": "Toward Hamiltonian simulations of Maxwell-Chern-Simons theory: constant modes and gauge field truncation", "abstract": "Maxwell-Chern-Simons (MCS) theory in $2+1$ dimensions provides a paradigmatic example of a topological gauge theory with both dynamical and topological degrees of freedom. Its Euclidean formulation suffers from a sign problem, making Hamiltonian numerical approaches particularly attractive. As a first step toward the non-perturbative Hamiltonian study of MCS theory, we investigate the constant mode sector on a spatial torus. Being analytically solvable in the continuum, it provides an ideal benchmark for understanding how the topological properties of the theory are encoded in a finite-dimensional lattice Hilbert space. We construct a finite-dimensional discretization of the torus of flat connections and show that the resulting lattice problem maps onto a generalized Harper-Hofstadter model with twisted boundary conditions. We identify the commensurability conditions under which the finite lattice exactly reproduces the magnetic translation algebra and the topological degeneracy of the continuum theory. A systematic analysis of gauge field truncation and its convergence toward the continuum limit is then presented.", "url": "https://arxiv.org/abs/2607.00082", "type": "理论", "summary": "$2+1$ 维度的麦克斯韦-陈-西蒙斯 (MCS) 理论提供了具有动力学和拓扑自由度的拓扑规范理论的范例。其欧几里得公式存在符号问题，这使得哈密顿数值方法特别有吸引力。作为 MCS 理论非微扰哈密顿研究的第一步，我们研究了空间环面上的常模扇区。它在连续体中可解析求解，为理解理论的拓扑性质如何编码在有限维格子希尔伯特空间中提供了理想的基准。我们构建了平面连接环面的有限维离散化，并表明所得到的晶格问题映射到具有扭曲边界条件的广义 Harper-Hofstadter 模型。我们确定了有限晶格精确再现磁平移代数和连续统理论的拓扑简并性的可通约性条件。然后提出了规范场截断及其向连续极限收敛的系统分析。", "authors": [{"name": "Andrea Bulgarelli"}, {"name": "Maria Cristina Diamantini"}, {"name": "Nico Dichter"}, {"name": "Lena Funcke"}, {"name": "Tobias Hartung"}, {"name": "Karl Jansen"}, {"name": "Enrique Rico Ortega"}, {"name": "Simran Singh"}, {"name": "Lorenzo Spera"}], "featured_authors": [{"name": "Andrea Bulgarelli"}, {"name": "Maria Cristina Diamantini"}, {"name": "Nico Dichter"}, {"name": "Enrique Rico Ortega"}, {"name": "Simran Singh"}, {"name": "Lorenzo Spera"}], "author_count": 9}, {"id": "2607.00096", "category": "hep-th", "title": "Escape from Ostrogradsky via Hidden Ghost Parity", "abstract": "We present a counterexample to Ostrogradsky's famous \"no go\" theorem as usually interpreted in quantum field theory (QFT), namely a four-derivative, UV-complete QFT with a consistent perturbative expansion which describes high energy scattering processes. We carefully quantize the theory on an $\\textit{indefinite}$ space of states - a Krein space - using covariant methods which ensure perturbative causality and unitarity (in the form of the optical theorem) to all orders. We generalize the Born rule to Krein spaces and prove that all tree level transition probabilities are positive in spite of the presence of ghosts. A key role in the proof is played by a hidden \"ghost parity\" symmetry which becomes explicit when the theory is embedded in a two-derivative, two-field $O(1,1)$-symmetric perturbative field theory.", "url": "https://arxiv.org/abs/2607.00096", "type": "理论", "summary": "我们提出了奥斯特罗格拉茨基著名的“不可行”定理的反例，该定理通常在量子场论（QFT）中解释，即具有描述高能散射过程的一致微扰展开的四导数、UV完全QFT。我们仔细量化了 $\\textit{不定}$ 状态空间（Kerin 空间）上的理论，使用协变方法确保所有阶的微扰因果关系和幺正性（以光学定理的形式）。我们将玻恩规则推广到 Kerin 空间，并证明尽管存在鬼魂，所有树级转移概率都是正的。证明中的关键作用是隐藏的“幽灵宇称”对称性，当该理论嵌入到二导数、两场 $O(1,1)$ 对称微扰场论中时，该对称性就会变得明确。", "authors": [{"name": "Sam Bateman"}, {"name": "Neil Turok"}], "featured_authors": [{"name": "Sam Bateman"}, {"name": "Neil Turok"}], "author_count": 2}, {"id": "2607.00187", "category": "hep-th", "title": "From geometry to phenomenology", "abstract": "Precision calculations in quantum field theory rely very often on perturbation theory and thus on the computation of Feynman integrals. Feynman integrals are also fascinating objects from a mathematical point of view and show deep connections to algebraic geometry. Cutting-edge Feynman integrals usually have geometries of \"mixed\" type, for example parts of it may correspond to a K3-surface, other parts may correspond to curves of a certain genus and the simplest parts correspond to points. In this talk I will discuss how to extract the geometric information from a Feynman integral and how this information can be used to compute more efficiently Feynman integrals. Non-trivial mixed geometries already occur in $2 \\rightarrow 2$-processes at two-loops, like Drell-Yan, Bhabha and Moller scattering.", "url": "https://arxiv.org/abs/2607.00187", "type": "理论", "summary": "量子场论中的精确计算通常依赖于微扰理论，从而依赖于费曼积分的计算。从数学的角度来看，费曼积分也是令人着迷的对象，并且显示出与代数几何的深刻联系。最前沿的费曼积分通常具有“混合”类型的几何形状，例如它的一部分可能对应于K3曲面，其他部分可能对应于某个亏格的曲线，最简单的部分对应于点。在本次演讲中，我将讨论如何从费曼积分中提取几何信息以及如何使用该信息来更有效地计算费曼积分。非平凡的混合几何形状已经出现在两个循环的 $2 \\rightarrow 2$ 过程中，例如 Drell-Yan、Bhabha 和 Moller 散射。", "authors": [{"name": "Stefan Weinzierl"}], "featured_authors": [{"name": "Stefan Weinzierl"}], "author_count": 1}, {"id": "2607.00314", "category": "hep-th", "title": "Leggett-Garg inequality in the massive scalar vacuum: No violation under spacelike-separated measurements", "abstract": "We overcome the long-standing noninvasive measurability (NIM) challenge in Leggett-Garg tests by exploiting the causal structure of quantum field theory (QFT). Our protocol uses three independent ensembles of the vacuum state, each measured by a different pair of observers at spacelike-separated events, yielding the three two-time correlators. By placing these events at positions $(0,0)$, $(\\tau,L)$, and $(2\\tau,2L)$ with $L>\\tau+2\\tau_0$, we rigorously ensure that no measurement can influence another. We investigate the vacuum state of a free massive scalar field in 1+1 dimensions, employing the dichotomic observable $Q(f)=\\operatorname{sign}(\\phi(f))$ where $\\phi(f)$ is the smeared field. In the Heisenberg picture, the time evolution is absorbed into a translation of the time-window function, allowing us to derive the two-time correlation function $C(\\tau,L)$ and the Leggett-Garg parameter $K_3=2C(\\tau,L)-C(2\\tau,2L)$. For non-overlapping time windows, we find that the correlation function decays exponentially with $\\tau$ for a massive field. For overlapping windows, our numerical computation for a rectangular time window yields $K_3<1$ across the entire mass range, firmly establishing that the vacuum does not violate the LGI. Thus, under strict noninvasive conditions, the vacuum shows no violation of macrorealism, in stark contrast to its well-known violation of spatial Bell inequalities. Our spacelike-separated protocol provides the first LGI test in QFT with rigorously satisfied NIM, setting a methodological benchmark for future studies and highlighting the fundamental distinction between spacelike entanglement and temporal macrorealism in relativistic quantum fields.", "url": "https://arxiv.org/abs/2607.00314", "type": "理论", "summary": "我们通过利用量子场论 (QFT) 的因果结构克服了 Leggett-Garg 测试中长期存在的无创可测量性 (NIM) 挑战。我们的协议使用三个独立的真空态系综，每个系综由一对不同的观察者在类空间分离的事件中测量，产生三个二次相关器。通过将这些事件放置在位置 $(0,0)$、$(\\tau,L)$ 和 $(2\\tau,2L)$ 且 $L>\\tau+2\\tau_0$ 处，我们严格确保没有测量可以影响另一个测量。我们使用二分可观测量 $Q(f)=\\operatorname{sign}(\\phi(f))$ 研究 1+1 维中自由大标量场的真空态，其中 $\\phi(f)$ 是弥散场。在海森堡图中，时间演化被吸收到时间窗函数的平移中，从而使我们能够导出两次相关函数$C(\\tau,L)$和Leggett-Garg参数$K_3=2C(
