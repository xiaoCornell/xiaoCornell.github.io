\\tau,L)-C(2\\tau,2L)$。对于不重叠的时间窗口，我们发现对于大范围的场，相关函数随 $\\tau$ 呈指数衰减。\n\n对于重叠窗口，我们对矩形时间窗口的数值计算在整个质量范围内产生 $K_3<1$，从而坚定地证明真空不会违反 LGI。因此，在严格的非侵入性条件下，真空没有表现出违反宏观现实主义的情况，这与众所周知的违反空间贝尔不等式形成鲜明对比。我们的类空分离协议提供了 QFT 中的第一个 LGI 测试，并严格满足 NIM，为未来的研究设定了方法基准，并强调了相对论量子场中类空纠缠和时间宏观现实主义之间的根本区别。", "authors": [{"name": "Yang Xiang"}], "featured_authors": [{"name": "Yang Xiang"}], "author_count": 1}, {"id": "2607.00636", "category": "hep-th", "title": "Hidden quantum-informatic symmetries of quasi-de Sitter backgrounds", "abstract": "We investigate how degeneracies in quasi-de Sitter backgrounds, in the sense of Wands' duality, are reflected in real-space quantum correlations of primordial perturbations. Using the continuous-variable Gaussian formalism for coarse-grained scalar fluctuations, we construct the covariance matrix of a pair of spatially localized modes in inflationary spacetime, and extract the symplectic invariants of the system. For a generic Wands-dual pair of backgrounds, we find that while the individual entries of the covariance matrix are highly background-dependent, the symplectic eigenvalues -- and hence the entanglement entropy, mutual information, quantum discord and log-negativity -- all coincide for the two dual realizations. Our results unveil a new ''quantum-informatic symmetry'' of the de Sitter vacuum, according to which local linear entanglement witnesses constructed from coarse-grained fields cannot distinguish between Wands-dual inflationary histories, even though their background trajectories differ. We show that the special nature of the Wands-duality symmetry (of being local, scale-independent canonical transformations) is at the heart of this duality.", "url": "https://arxiv.org/abs/2607.00636", "type": "理论", "summary": "我们研究了在权杖对偶性意义上的准德西特背景的简并如何反映在真实空间的原初扰动的量子相关性中。利用粗粒度标量涨落的连续变量高斯形式，构造了暴涨时空中一对空间局域模态的协方差矩阵，并提取了系统的辛不变量。对于一般的魔杖对偶背景，我们发现虽然协方差矩阵的各个条目高度依赖于背景，但辛特征值——以及因此的纠缠熵、互信息、量子不一致和对数负性——对于两个对偶实现来说都是一致的。我们的结果揭示了德西特真空的一种新的“量子信息对称性”，根据这种对称性，从粗粒度场构建的局部线性纠缠见证者无法区分权杖对偶暴涨历史，即使它们的背景轨迹不同。我们表明，权杖对偶对称性的特殊性质（局部的、与尺度无关的规范变换）是这种二元性的核心。", "authors": [{"name": "Suddhasattwa Brahma"}, {"name": "Jaime Calderon-Figueroa"}, {"name": "Xiancong Luo"}, {"name": "Vincent Vennin"}], "featured_authors": [{"name": "Suddhasattwa Brahma"}, {"name": "Jaime Calderon-Figueroa"}, {"name": "Xiancong Luo"}, {"name": "Vincent Vennin"}], "author_count": 4}, {"id": "2607.00789", "category": "hep-th", "title": "$\\mathcal{N}=1$ spectra, cubic couplings and the rigid fate of DGKT", "abstract": "We show that in the DGKT scenario on a generic Calabi-Yau three-fold, a recently proposed holographic constraint on cubic couplings is satisfied if and only if the Calabi-Yau is rigid, i.e. when $h^{2,1}=0$. More generally, we illustrate how in 4d $\\mathcal{N}=1$ supergravity, extremal cubic couplings are determined by the third derivatives of the real, Kähler-invariant superpotential, while the eigenvalues of its Hessian compute the conformal dimensions of the dual scalar operators. These results extend more broadly beyond 4d $\\mathcal{N}=1$ supergravity. Applying them to supersymmetric DGKT vacua, we prove that extremal cubic couplings always vanish in the Kähler + universal CS/dilaton sector, whereas non-vanishing (super-)extremal couplings are always present in the complex structure sector. It follows that the holographic constraint is satisfied in DGKT if and only if the Calabi-Yau three-fold is rigid with $h^{2,1}=0$.", "url": "https://arxiv.org/abs/2607.00789", "type": "理论", "summary": "我们证明，在通用 Calabi-Yau 三重的 DGKT 场景中，当且仅当 Calabi-Yau 是刚性的时，即当 $h^{2,1}=0$ 时，最近提出的立方耦合全息约束才得到满足。更一般地说，我们说明了在 4d $\\mathcal{N}=1$ 超引力中，极值三次耦合是如何由实数、凯勒不变超势的三阶导数确定的，而其 Hessian 矩阵的特征值计算双标量算子的共角维数。这些结果更广泛地扩展到 4d $\\mathcal{N}=1$ 超重力之外。将它们应用于超对称 DGKT 真空，我们证明极值立方耦合总是在 Kähler + 通用 CS/膨胀扇区中消失，而非消失（超）极值耦合始终存在于复杂结构扇区中。由此可见，当且仅当 Calabi-Yau 三重是刚性且 $h^{2,1}=0$ 时，DGKT 中才满足全息约束。", "authors": [{"name": "Filippo Revello"}, {"name": "Vincent Van Hemelryck"}], "featured_authors": [{"name": "Filippo Revello"}, {"name": "Vincent Van Hemelryck"}], "author_count": 2}, {"id": "2607.00864", "category": "hep-th", "title": "Soft Algebras via Bulk Double Soft Limits", "abstract": "Soft and collinear limits of \"celestial amplitudes\" give rise to infinite dimensional symmetry algebras for two-dimensional (2D) \"celestial\" conformal field theories (CFTs). A small subset of these operators generates the action of the entire set recursively via the commutation relations. Insertion of this subset into celestial CFT correlators gives the boundary version of the first three terms in a soft expansion of the corresponding 4D bulk gravitational scattering amplitude. In this paper, we find that a bulk analog of this, which would allow the entire soft expansion of a gravitational amplitude to be determined via just the first three terms, does not follow trivially from the celestial algebras. We show how the interplay of soft and collinear limits results in subtleties for bulk amplitudes that do not show up in the boundary description.", "url": "https://arxiv.org/abs/2607.00864", "type": "理论", "summary": "“天体振幅”的软和共线极限产生了二维（2D）“天体”共形场理论（CFT）的无限维对称代数。这些运算符的一小部分通过交换关系递归地生成整个集合的动作。将此子集插入天体 CFT 相关器中，给出了相应 4D 体引力散射振幅的软展开中前三项的边界版本。在本文中，我们发现与此类似，仅通过前三项就可以确定引力振幅的整个软展开，这并不是从天体代数中简单得出的。我们展示了软极限和共线极限的相互作用如何导致边界描述中未显示的体振幅的微妙变化。", "authors": [{"name": "Sruthi A. Narayanan"}], "featured_authors": [{"name": "Sruthi A. Narayanan"}], "author_count": 1}, {"id": "2607.00866", "category": "hep-th", "title": "Dissipative hydrodynamic actions and horizon symmetries in gravity", "abstract": "We give a prescription to compute a dissipative action describing the large-scale thermal stress tensor dynamics of a holographic quantum field theory dual to AdS$_4$ gravity, in the context of the Schwinger-Keldysh formalism. Our prescription is valid to quadratic order in perturbations about the thermal equilibrium state. The hydrodynamical degrees of freedom of this action are realised in gravity as relative diffeomorphisms between the black hole horizon and the two asymptotic boundaries of the Crossley-Glorioso-Liu contour. We explicitly compute the action to first order in derivatives, and confirm it correctly reproduces the known hydrodynamic Green's functions. Our prescription requires a choice of horizon boundary conditions for the metric. We study the horizon symmetries that preserve these, and their relation to conjectured hydrodynamic symmetries responsible for many-body quantum chaos.", "url": "https://arxiv.org/abs/2607.00866", "type": "理论", "summary": "我们给出了计算耗散作用的处方，该耗散作用描述了在 Schwinger-Keldysh 形式主义背景下与 AdS$_4$ 引力对偶的全息量子场论的大规模热应力张量动力学。我们的规定对于热平衡状态的扰动的二次阶是有效的。该作用的流体动力学自由度在重力中实现为黑洞视界与 Crossley-Glorioso-Liu 等值线的两个渐近边界之间的相对微分同胚。我们明确地计算导数中的一阶作用，并确认它正确地再现了已知的流体动力学格林函数。我们的规定需要选择度量的范围边界条件。我们研究保留这些的视界对称性，以及它们与推测的造成多体量子混沌的流体动力学对称性的关系。", "authors": [{"name": "Mike Blake"}, {"name": "Arpit Das"}, {"name": "Richard A. Davison"}], "featured_authors": [{"name": "Mike Blake"}, {"name": "Arpit Das"}, {"name": "Richard A. Davison"}], "author_count": 3}, {"id": "2607.00880", "category": "hep-th", "title": "Modular resurgence of topological string", "abstract": "Topological string free energy has a rich collection of non-perturbative contributions which are labeled by D-brane charge vectors, and the associated Stokes constants are conjectured to coincide with BPS or DT invariants, i.e. D-brane multiplicities. In this paper, we provide additional evidence to this conjecture by studying modular properties of non-perturbative contributions. We argue using resurgence theory that non-perturbative contributions form orbits of local monodromy group induced by singular points inside a stability chamber, and that the associated Stokes constants must be the same across the orbits. In some examples, this allows generation of infinitely many Stokes constants, which reproduce the entire BPS spectrum. In addition, following [DK26], we also show that generators of Stokes transformations of non-holomorphic partition function satisfy Lie brackets of the Kontsevich-Soibelman Lie algebra, making it possible to identify the global Stokes transformation with the Kontsevich-Soibelman wall-crossing invariant.", "url": "https://arxiv.org/abs/2607.00880", "type": "理论", "summary": "拓扑弦自由能具有丰富的非微扰贡献集合，这些贡献由 D 膜电荷向量标记，并且相关的斯托克斯常数被推测与 BPS 或 DT 不变量（即 D 膜多重性）一致。在本文中，我们通过研究非微扰贡献的模属性为这一猜想提供了额外的证据。我们使用复苏理论认为，非微扰贡献形成了稳定室内奇异点引起的局部单向群的轨道，并且相关的斯托克斯常数在整个轨道上必须相同。在一些示例中，这允许生成无限多个斯托克斯常数，从而再现整个 BPS 谱。此外，在[DK26]之后，我们还证明了非全纯配分函数的斯托克斯变换的生成元满足Kontsevich-Soibelman李代数的李括号，使得用Kontsevich-Soibelman穿墙不变量识别全局斯托克斯变换成为可能。", "authors": [{"name": "Gengbei Guo"}, {"name": "Jiashen Chen"}, {"name": "Jie Gu"}], "featured_authors": [{"name": "Gengbei Guo"}, {"name": "Jiashen Chen"}, {"name": "Jie Gu"}], "author_count": 3}, {"id": "2607.01107", "category": "hep-th", "title": "${\\cal N}{=}\\,4$ supersymmetric multiparticle systems based on indecomposable multiplets", "abstract": "We construct new multiparticle models of $\\mathcal{N}=4$ supersymmetric mechanics with spin degrees of freedom by employing nonlinear indecomposable supermultiplets ${\\bf (1,4,3){\\supset\\hspace{-1.1em}+}(4,4,0)}$. These systems are proper deformations of those associated with the standard irreducible $d=1, \\mathcal{N}=4$ multiplets. In this way we find a new $\\mathcal{N}=4$ supersymmetric generalization of U$(2)$-spin rational Calogero system invariant under $d=1$ superconformal group OSp$(4|2)$. One more deformed model reproduces $\\mathcal{N}=4$ supersymmetric U$(2)$-spin hyperbolic Calogero system, up to a shift of the Hamiltonian by some U$(1)$ generators.", "url": "https://arxiv.org/abs/2607.01107", "type": "理论", "summary": "我们通过采用非线性不可分解超多重态${\\bf (1,4,3){\\supset\\hspace{-1.1em}+}(4,4,0)}$构建了具有自旋自由度的$\\mathcal{N}=4$超对称力学的新多粒子模型。这些系统是与标准不可约 $d=1, \\mathcal{N}=4$ 多重态相关的系统的适当变形。这样我们就找到了 $d=1$ 超共形群 OSp$(4|2)$ 下 U$(2)$-自旋有理 Calogero 系统不变量的新 $\\mathcal{N}=4$ 超对称推广。另一个变形模型再现了 $\\mathcal{N}=4$ 超对称 U$(2)$ 自旋双曲 Calogero 系统，直到由一些 U$(1)$ 生成器对哈密顿量进行移位。", "authors": [{"name": "Sergey Fedoruk"}, {"name": "Evgeny Ivanov"}, {"name": "Stepan Sidorov"}], "featured_authors": [{"name": "Sergey Fedoruk"}, {"name": "Evgeny Ivanov"}, {"name": "Stepan Sidorov"}], "author_count": 3}, {"id": "2607.01221", "category": "hep-th", "title": "Type IIB Axion--Dilaton Wormholes and the BPS Limit Hessian", "abstract": "I revisit Type-IIB axion--dilaton Euclidean saddles in a specified axion charge sector. In that sector, the solution with $E=0$ is the BPS instanton, while $E>0$ gives non-BPS wormholes with a smooth throat. The two cases solve the same radial equations but define different fluctuation problems. For the $E=0$ instanton, the Hamiltonian constraint, gauge quotient, charge-sector boundary condition, and removal of collective zero modes reduce the quadratic action to a physical Hessian. This Hessian factorizes, $ {\\cal H}_\\nu={\\mathcal Q}_\\nu^\\dagger{\\mathcal Q}_\\nu$. I interpret this as an endpoint theorem, beyond a stability theorem for the full $E>0$ wormhole. This puts Type IIB wormhole spectra on firmer grounds. I also separate the connected two-ended wormhole throat from its long-distance two-end multipole operator term. Once the coefficient matrix $C^{ij}$ is derived, the different-component and same-component placements of the two end insertions are terms in the same quadratic expression. Removing either term requires a genuine projection or cancellation.", "url": "https://arxiv.org/abs/2607.01221", "type": "理论", "summary": "我重新审视了特定轴子电荷扇区中的 IIB 型轴子——膨胀欧几里德鞍。在该扇区中，$E=0$ 的解是 BPS 瞬子，而 $E>0$ 则给出具有平滑喉咙的非 BPS 虫洞。这两种情况求解相同的径向方程，但定义不同的波动问题。对于 $E=0$ 瞬子，哈密顿约束、规范商、电荷扇区边界条件和集体零模式的移除将二次作用减少为物理 Hessian 矩阵。该 Hessian 因式分解 $ {\\cal H}_\\nu={\\mathcal Q}_\\nu^\\dagger{\\mathcal Q}_\\nu$。我将其解释为端点定理，超出了完整 $E>0$ 虫洞的稳定性定理。这为 IIB 型虫洞光谱奠定了更坚实的基础。我还将连接的两端虫洞喉咙与其长距离两端多极算子项分开。一旦导出系数矩阵$C^{ij}$，两端插入的不同分量和相同分量放置就是同一个二次表达式中的项。删除任何一个术语都需要真正的预测或取消。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2607.00656", "category": "math-ph", "title": "On the Application of Poincare-Steklov Operators to the Problem of Resonant Scattering in a Cylinder", "abstract": "The resonant nature of scattering in a waveguide with two barriers is proven in the case of a sufficiently arbitrary deformation of the region between the barriers. The problem is considered as an interior boundary value problem with boundary conditions defined by a Poincare-Steklov operator. A spectral problem is considered whose eigenvalue determines the resonant scattering frequency.", "url": "https://arxiv.org/abs/2607.00656", "type": "理论", "summary": "在势垒之间的区域充分任意变形的情况下，证明了具有两个势垒的波导中的散射的共振性质。该问题被视为具有由 Poincare-Steklov 算子定义的边界条件的内部边值问题。考虑谱问题，其特征值决定共振散射频率。", "authors": [{"name": "A.L Delitsyn"}], "featured_authors": [{"name": "A.L Delitsyn"}], "author_count": 1}, {"id": "2607.00721", "category": "math-ph", "title": "Time Averages for the Vortex Model and Stroboscopic Ergodic Averages", "abstract": "We consider the vortex model on the plane, focusing on the case of vortices with the same sign and, for simplicity, assuming all vortices possess equal circulation. In particular we are interested at the time average of the vorticity density, i.e. the empirical measure associated to the vortices. We conjecture that, for a.e. initial data, the time average of the empirical density is radial. We prove the result for N=3 vortices by exploiting the integrability of the system. For N > 3 vortices we motivate the conjecture by transforming the problem into the independence of ergodic stroboscopic averages from initial data along a single trajectory, when using a suitable rotation angle as the independent variable instead of the time variable.", "url": "https://arxiv.org/abs/2607.00721", "type": "理论", "summary": "我们考虑平面上的涡旋模型，重点关注具有相同符号的涡旋的情况，并且为简单起见，假设所有涡旋具有相等的循环。我们特别对涡度密度的时间平均值感兴趣，即与涡度相关的经验测量。我们推测，对于 a.e.初始数据，经验密度的时间平均值是径向的。我们通过利用系统的可积性证明了 N=3 涡旋的结果。对于 N > 3 涡旋，当使用合适的旋转角度而不是时间变量作为自变量时，我们通过将问题转化为遍历频闪平均值与沿单个轨迹的初始数据的独立性来激发猜想。", "authors": [{"name": "Emanuele Caglioti"}, {"name": "Marco Cecchini"}], "featured_authors": [{"name": "Emanuele Caglioti"}, {"name": "Marco Cecchini"}], "author_count": 2}, {"id": "2607.00859", "category": "math-ph", "title": "On the spherical symmetry and finite-range assumptions of the interaction potential in the low energy study of dilute Bose gases", "abstract": "We consider a Bose gas on the three-dimensional torus in the Gross--Pitaevskii regime and explain how to remove the assumptions of radiality and compact support on the interaction potential in the proof of Bose--Einstein condensation and convergence of the excitation spectrum to Bogoliubov's prediction. In particular, we sketch the proof of [50].", "url": "https://arxiv.org/abs/2607.00859", "type": "理论", "summary": "我们考虑格罗斯-皮塔耶夫斯基体系中三维圆环上的玻色气体，并解释如何在证明玻色-爱因斯坦凝聚和激发光谱收敛到博戈柳博夫的预测时消除相互作用势的径向假设和紧支持。我们特别概述了[50]的证明。", "authors": [{"name": "Lukas Reichmann"}, {"name": "Arnaud Triay"}], "featured_authors": [{"name": "Lukas Reichmann"}, {"name": "Arnaud Triay"}], "author_count": 2}, {"id": "2607.01070", "category": "math-ph", "title": "Scattering, Trapping and Cloaking-Type Effects of Plane Waves by Point Scatterers in Strain Gradient Elasticity", "abstract": "Wave scattering by localized constraints in microstructured solids is strongly influenced by the interplay of material length scales, dispersion and geometry. This work investigates plane-strain scattering of time-harmonic P and SV waves by clusters of rigid point constraints embedded in an infinite strain gradient elastic medium. A closed-form dynamic Green's tensor is derived for the plane-strain problem. Unlike the classical elastodynamic Green's tensor, the strain gradient Green's tensor remains bounded at the source, enabling point constraints to be introduced directly through superposition of fundamental solutions. The multiple-scattering problem is reduced to a finite-dimensional algebraic system for the pin reaction amplitudes. A frequency-domain procedure is developed to identify resonance-like amplification and trapping. Candidate resonant frequencies are associated with local minima of the Green matrix determinant, while higher-order curvature criteria distinguish trapping-dominated resonances from non-localized scattering responses. The results show that the response is governed primarily by the ratio of the microinertial and energetic strain gradient lengths. In the anomalous dispersion regime, sharp resonances produce strong displacement localization, including perimeter-localized trapping modes in dense circular arrays. In the normal dispersion regime, these resonances are strongly attenuated and the pins behave as weak scatterers, producing a cloaking-type response in which the incident field is only weakly perturbed. The influence of Poisson's ratio, incidence angle and compound pin configurations is also examined, demonstrating how intrinsic material lengths and geometric arrangement can be used to tune scattering, trapping and wave-screening mechanisms in microstructured elastic media.", "url": "https://arxiv.org/abs/2607.01070", "type": "理论", "summary": "微结构固体中局部约束的波散射受到材料长度尺度、色散和几何形状相互作用的强烈影响。这项工作通过嵌入无限应变梯度弹性介质中的刚性点约束簇来研究时谐 P 波和 SV 波的平面应变散射。针对平面应变问题导出了封闭式动态格林张量。与经典弹性动力学格林张量不同，应变梯度格林张量在源处保持有界，从而可以通过基本解的叠加直接引入点约束。多重散射问题被简化为销钉反应振幅的有限维代数系统。开发了频域程序来识别类似共振的放大和捕获。候选共振频率与格林矩阵行列式的局部最小值相关，而高阶曲率标准将捕获主导的共振与非局部散射响应区分开来。结果表明，响应主要由微惯性和高能应变梯度长度之比决定。\n\n在反常色散区域中，尖锐的共振会产生强烈的位移局域化，包括密集圆形阵列中的周边局域捕获模式。在正常色散状态下，这些共振被强烈衰减，并且销钉表现为弱散射体，产生隐身型响应，其中入射场仅受到微弱扰动。还检查了泊松比、入射角和复合销配置的影响，展示了如何使用固有材料长度和几何排列来调整微结构弹性介质中的散射、捕获和波屏蔽机制。", "authors": [{"name": "E. Alevras"}, {"name": "Th. Zisis"}, {"name": "P. A. Gourgiotis"}], "featured_authors": [{"name": "E. Alevras"}, {"name": "Th. Zisis"}, {"name": "P. A. Gourgiotis"}], "author_count": 3}, {"id": "2607.01183", "category": "math-ph", "title": "A scheme for topological phases of the Weyl $C^*$-algebra", "abstract": "In this work, we introduce a classification scheme for topological phases of matter based on the topology of the space of pure states of a model $C^*$-algebra. Under it, topological phases are described by homotopy classes of sections of certain fiber bundles of (pure) states. Applying this classification procedure on states of the Weyl $C^*$-algebra that are invariant under translations by a lattice, we recover the $K$-theoretic classification of gapped spectral projectors for topological insulators of types A and AI, thus essentially generalizing this notion.", "url": "https://arxiv.org/abs/2607.01183", "type": "理论", "summary": "在这项工作中，我们基于模型$C^*$-代数的纯态空间拓扑引入了一种物质拓扑相的分类方案。在它之下，拓扑相由某些（纯）态纤维束截面的同伦类来描述。将这种分类过程应用于在晶格平移下不变的 Weyl $C^*$-代数状态，我们恢复了 A 型和 AI 型拓扑绝缘体的带隙光谱投影仪的 $K$ 理论分类，从而从本质上概括了这一概念。", "authors": [{"name": "Giuseppe De Nittis"}, {"name": "Santiago G. Rendel"}], "featured_authors": [{"name": "Giuseppe De Nittis"}, {"name": "Santiago G. Rendel"}], "author_count": 2}, {"id": "2607.00040", "category": "quant-ph", "title": "Quantum Amplitude Estimation in Gradient-Based Stochastic Optimization", "abstract": "In this paper we prove, both mathematically and through a simulation, how the Quantum Amplitude Estimation algorithm can obtain quadratic improvements with respect to the Monte Carlo method in gradient-based stochastic optimization, highlighting the central role of the Quantum Phase Estimation concentration guarantee in achieving the predicted advantage.", "url": "https://arxiv.org/abs/2607.00040", "type": "数值", "summary": "在本文中，我们通过数学和模拟证明了量子振幅估计算法如何在基于梯度的随机优化中相对于蒙特卡罗方法获得二次改进，强调了量子相位估计浓度保证在实现预测优势中的核心作用。", "authors": [{"name": "Raffaele Sarno"}], "featured_authors": [{"name": "Raffaele Sarno"}], "author_count": 1}, {"id": "2607.00059", "category": "quant-ph", "title": "Comment on \"Ideal clocks -- a convenient fiction\" by K. Lorek et al", "abstract": "We correct a subtle oversight in Eq.(19) of K. Lorek et al. [Class. Quantum Grav. 32 175003 (2015)] concerning the decay probability of a uniformly accelerated quantum clock. The original expression included unphysical cross-wedge term ($|\\bar{\\gamma}_{K 1}|^2$) violating the spatial separation of Rindler wedges. We derive the corrected probability using the paper's Rindler conformal coordinates $(\\tau, \\xi)$, retaining only causally consistent thermal terms, and discuss implications for relativistic clock models.", "url": "https://arxiv.org/abs/2607.00059", "type": "理论", "summary": "我们纠正了 K. Lorek 等人的方程（19）中的一个微妙的疏忽。 [班级。量子重力32 175003 (2015)]关于均匀加速量子时钟的衰减概率。原始表达式包含非物理交叉楔项 ($|\\bar{\\gamma}_{K 1}|^2$)，违反了 Rindler 楔的空间分离。我们使用论文的 Rindler 共形坐标 $(\\tau, \\xi)$ 推导校正概率，仅保留因果一致的热项，并讨论对相对论时钟模型的影响。", "authors": [{"name": "Vladimir Toussaint"}], "featured_authors": [{"name": "Vladimir Toussaint"}], "author_count": 1}, {"id": "2607.00193", "category": "quant-ph", "title": "TCL4 Asymptotic Redundancy and Canonically Consistent Master Equations", "abstract": "Left alone, open quantum systems relax toward a Kubo--Martin--Schwinger (KMS) equilibrium state, yet the inner workings of this process remain opaque. It remains unclear why the intricate fourth-order time-convolutionless (TCL4) population generator reproduces the comparatively simple second-order stationary state corrections. Even more surprisingly, stationary-state corrections of such precision can be compressed into a simple virtual coherence pathway: an open quantum systems analogue of virtual transitions, in which populations communicate through coherences that are never occupied. Here we show that this simplification arises through a sequence of stationary-state-preserving transformations that progressively eliminate asymptotically redundant components while preserving the stationary state, ultimately yielding the virtual coherence pathway. This resolves the longstanding stationary-state problem of the Redfield equation and reveals that much of the apparent complexity of the TCL4 generator is asymptotically redundant.", "url": "https://arxiv.org/abs/2607.00193", "type": "理论", "summary": "如果放任不管，开放量子系统会松弛到久保-马丁-施温格（KMS）平衡状态，但这个过程的内部运作仍然是不透明的。目前尚不清楚为什么复杂的四阶无时间卷积 (TC​​L4) 总体生成器会重现相对简单的二阶稳态校正。更令人惊讶的是，这种精度的稳态校正可以被压缩成一个简单的虚拟相干路径：虚拟跃迁的开放量子系统模拟，其中群体通过从未被占用的相干性进行通信。在这里，我们表明，这种简化是通过一系列保持稳态的变换产生的，这些变换在保持稳态的同时逐渐消除渐近冗余分量，最终产生虚拟相干路径。这解决了 Redfield 方程长期存在的稳态问题，并揭示了 TCL4 生成器的许多表面复杂性是渐近冗余的。", "authors": [{"name": "Dragomir Davidovic"}], "featured_authors": [{"name": "Dragomir Davidovic"}], "author_count": 1}, {"id": "2607.00210", "category": "quant-ph", "title": "Classification and Exact Local Masking in Finite-Field Clifford Dual-Unitary Circuits", "abstract": "We classify two-qudit finite-field Clifford dual-unitary gates and apply the classification to exact local masking and operator transport in homogeneous brickwork circuits. Under ordered one-qudit Clifford equivalence, the dual-unitary locus contains $q-2$ perfect-tensor cores, one rank-one core, and one SWAP core. The perfect cores are indexed by \\[ \\delta=\\det B=\\det C, \\] and are related to the ordered cross-ratio $\\lambda$ of the associated $[4,2,3]_q$ MDS configuration through \\[ \\lambda=\\frac{\\delta}{\\delta-1}. \\] Homogeneous repetition separates these cores into five transport phases whose algebraic codimensions in $\\operatorname{Sp}(4,q)$ are $0,1,2,3,4$. The one-site Weyl edge channels determine exact local-masking distances. Perfect-tensor circuits attain \\[ d_1(t)=4t, \\qquad d_2(t)=4t-2, \\] whereas delayed erasers satisfy \\[ d_1(t)=4t-2, \\qquad d_2(t)=4t-4 \\] for $t\\geq 2$. Consequently, sufficiently short quantum messages are completely hidden from every one- or two-qudit output subsystem, even when the input is entangled with a reference, while remaining exactly recoverable from the full output. For $q=3$, we construct an explicit perfect-tensor Clifford gate from two inverse SUM gates. Exhaustive Weyl-support searches for $t=1,2,3$ reproduce the predicted masking distances, and a one-period Choi-channel calculation for a four-qutrit periodic circuit gives numerical residual leakage below $2\\times 10^{-16}$. Under the coherent perturbation considered here, local leakage is linear in the perturbation strength, whereas the infidelity of recovery using the ideal inverse is quadratic near the perfect point.", "url": "https://arxiv.org/abs/2607.00210", "type": "理论+数值", "summary": "我们对二量子有限场 Clifford 双酉门进行分类，并将该分类应用于同质砖砌电路中的精确局部掩蔽和操作员传输。在有序一量子克利福德等价下，双酉轨迹包含$q-2$完美张量核心、一个一级核心和一个SWAP核心。完美核心由 \\[ \\delta=\\det B=\\det C, \\] 索引，并通过 \\[ \\lambda=\\frac{\\delta}{\\delta-1} 与相关 $[4,2,3]_q$ MDS 配置的有序交叉比 $\\lambda$ 相关。 \\] 同质重复将这些核心分为五个传输阶段，其在 $\\operatorname{Sp}(4,q)$ 中的代数余维数为 $0,1,2,3,4$。单点 Weyl 边缘通道确定精确的局部掩蔽距离。对于 $t\\geq 2$，完美张量电路达到 \\[ d_1(t)=4t, \\qquad d_2(t)=4t-2, \\] 而延迟擦除器满足 \\[ d_1(t)=4t-2, \\qquad d_2(t)=4t-4 \\]。因此，即使输入与参考纠缠在一起，足够短的量子消息也对每个一或两个量子输出子系统完全隐藏，同时仍然可以从完整输出中准确恢复。\n\n对于 $q=3$，我们从两个逆 SUM 门构造一个显式完美张量 Clifford 门。对 $t=1,2,3$ 的穷举 Weyl 支持搜索重现了预测的掩蔽距离，并且四量子周期电路的一周期 Choi 通道计算给出了低于 $2\\times 10^{-16}$ 的数值残余泄漏。在此考虑的相干扰动下，局部泄漏与扰动强度呈线性关系，而使用理想逆的恢复的不保真度在完美点附近呈二次方。", "authors": [{"name": "Basanta R Pahari"}], "featured_authors": [{"name": "Basanta R Pahari"}], "author_count": 1}, {"id": "2607.00266", "category": "quant-ph", "title": "Quantum-advantage resource of a two-mode Gaussian state: Analytical theory of convex optimization and a Galois no-go for the closed-form solution", "abstract": "We study the problem of extracting a quantum complexity resource from a mixed Gaussian state of the multimode light. We present the first complete, certificate-checked solution to this problem in a genuinely coupled sector. We carry this out for the two-mode case, the smallest case in which modes are genuinely coupled. Even in this case the solution is highly nontrivial, and we rigorously prove that it cannot be given in a closed form.", "url": "https://arxiv.org/abs/2607.00266", "type": "理论+数值", "summary": "我们研究从多模光的混合高斯态中提取量子复杂性资源的问题。我们在真正耦合的领域中针对这个问题提出了第一个完整的、经过证书检查的解决方案。我们针对双模式情况进行此操作，这是模式真正耦合的最小情况。即使在这种情况下，解决方案也是非常重要的，我们严格证明它不能以封闭形式给出。", "authors": [{"name": "Kunwar Kalra"}, {"name": "V. V. Kocharovsky"}], "featured_authors": [{"name": "Kunwar Kalra"}, {"name": "V. V. Kocharovsky"}], "author_count": 2}, {"id": "2607.00306", "category": "quant-ph", "title": "Scattering, bound states, and resonances in the one-dimensional Dirac equation via supersymmetric quantum mechanics", "abstract": "We develop a unified treatment of scattering and discrete spectra for the one-dimensional Dirac equation with scalar and vector interactions. Under the spin-symmetry condition, the coupled first-order Dirac system maps exactly onto an effective Sturm--Liouville (Schrö\\-din\\-ger-like) problem for a single spinor component. This mapping provides a convenient framework for analyzing transmission, reflection, and analytic continuation. As an explicit application, we consider effective interactions of hyperbolic Pöschl--Teller type and exploit supersymmetric quantum mechanics and shape invariance to obtain a closed-form expression for the transmission probability. The bound-state spectrum is then recovered from the poles of the analytically continued transmission amplitude, reproducing known results and offering a unified description of scattering and bound states. For the barrier configuration, we briefly comment on the resulting pole pattern in the complex momentum plane and its connection with resonance and quasi-normal-mode behavior. Moreover, we use the chiral transformation to relate the spin- and pseudospin-symmetry sectors and translate results between them without repeating the full derivation.", "url": "https://arxiv.org/abs/2607.00306", "type": "理论", "summary": "我们为具有标量和矢量相互作用的一维狄拉克方程开发了散射和离散光谱的统一处理方法。在自旋对称条件下，耦合一阶狄拉克系统精确映射到单个旋量分量的有效 Sturm-Liouville (Schrö\\-din\\-ger-like) 问题。该映射为分析传输、反射和解析延拓提供了方便的框架。作为一个显式应用，我们考虑双曲 Pöschl-Teller 型的有效相互作用，并利用超对称量子力学和形状不变性来获得传输概率的闭合形式表达式。然后从分析连续传输幅度的极点恢复束缚态谱，再现已知结果并提供散射和束缚态的统一描述。对于势垒配置，我们简要评论了复杂动量平面中产生的极点模式及其与共振和准正常模式行为的联系。\n\n此外，我们使用手性变换来关联自旋和赝自旋对称扇区，并在它们之间转换结果，而无需重复完整的推导。", "authors": [{"name": "Camila C. Soares"}, {"name": "Luis B. Castro"}, {"name": "Antonio S. de Castro"}], "featured_authors": [{"name": "Camila C. Soares"}, {"name": "Luis B. Castro"}, {"name": "Antonio S. de Castro"}], "author_count": 3}, {"id": "2607.00307", "category": "quant-ph", "title": "Coupling effect of nearest-neighbor interacting qubit chains to a single qubit system", "abstract": "This study establishes a theorem that provides sufficient criteria for identifying terms in any time-independent Hamiltonian that have no influence on local dynamics, local observables, or any local phenomena, without any approximation. The usefulness of this theorem is demonstrated by predicting the behavior of three systems. The first system consists of multiple qubit chains with Ising interactions. The second system is formed by a single qubit chain, differentiated by the substitution of Dzyalonshinskii-Moriya (DM) interaction for the last Ising interaction. The predictions were verified by analytically deriving the reduced dynamics of both systems. A third system was also considered, namely, a short qubit chain with a transverse magnetic field on the intermediary environment qubit. This transverse magnetic field signals that the commutation relation required by our theorem no longer holds. The third system's local dynamics were also derived analytically, demonstrating that all Hamiltonian constituents contributed to the reduced dynamics. The physical consequences of our theorem's inapplicability were also explored using this third system by analyzing the entanglement dynamics between the qubits that do not directly interact. The results showed that the entanglement is caused by an \\textit{emergent coupling} between the two non-directly interacting subsystems. This \\textit{emergent coupling} arises from the non-commutativity of the intermediate interactions connecting the two subsystems. When searching for these \\textit{emergent couplings}, our theorem can eliminate intermediate interactions that will not produce them.", "url": "https://arxiv.org/abs/2607.00307", "type": "理论", "summary": "这项研究建立了一个定理，为识别任何与时间无关的哈密顿量中的项提供了足够的标准，这些项对局部动力学、局部可观测量或任何局部现象没有影响，无需任何近似。通过预测三个系统的行为证明了该定理的有用性。第一个系统由多个具有伊辛相互作用的量子比特链组成。第二个系统由单个量子比特链形成，其区别在于用 Dzyalonshinskii-Moriya (DM) 相互作用替代了最后一个 Ising 相互作用。通过分析推导两个系统的降低的动态性，验证了这些预测。还考虑了第三种系统，即在中间环境量子位上具有横向磁场的短量子位链。该横向磁场表明我们的定理所需的交换关系不再成立。第三个系统的局部动力学也通过分析推导得出，证明所有哈密顿成分都有助于降低动力学。\n\n我们的定理不适用的物理后果也通过分析不直接相互作用的量子位之间的纠缠动力学，使用第三个系统进行了探索。结果表明，纠缠是由两个非直接交互子系统之间的 \\textit{紧急耦合} 引起的。这种\\textit{紧急耦合}源于连接两个子系统的中间相互作用的非交换性。当搜索这些\\textit{涌现耦合}时，我们的定理可以消除不会产生它们的中间相互作用。", "authors": [{"name": "Manuel Allan L. Orongan"}, {"name": "Lemuel John F. Sese"}, {"name": "Rayda P. Gammag"}], "featured_authors": [{"name": "Manuel Allan L. Orongan"}, {"name": "Lemuel John F. Sese"}, {"name": "Rayda P. Gammag"}], "author_count": 3}, {"id": "2607.00340", "category": "quant-ph", "title": "Wallis Products from the Four-Dimensional Singular Harmonic Oscillator", "abstract": "We present a variational derivation of the Wallis product and its reciprocal from the four-dimensional singular harmonic oscillator. The inverse-square interaction is absorbed into an effective angular parameter $\\nu$, so that the lowest exact energy in a fixed sector is $E_{4d,\\mathrm{exact}}=\\hbar\\omega(\\nu+2)$. Motivated by the radial Kustaanheimo--Stiefel relation $r=\\rho^2$ between the four-dimensional oscillator and the three-dimensional Coulomb problem, we use the quartic trial family $R_a(\\rho)=N\\rho^\\nu e^{-a\\rho^4}$. The minimized variational energy yields an accuracy ratio governed by adjacent Gamma functions. In the large-$\\nu$ semiclassical limit, this ratio approaches unity. Restricting $\\nu$ to the odd sequence $\\nu=2n-1$ gives the standard Wallis product, whereas the even sequence $\\nu=2n$ gives its reciprocal form. The Coulomb-dual interpretation further relates the two branches to integer and half-integer effective angular sectors in the dual Coulomb/MICZ description. The result shows that Wallis-type infinite products persist under an inverse-square deformation of the oscillator and arise from a common Gamma-function structure in radial variational dynamics.", "url": "https://arxiv.org/abs/2607.00340", "type": "理论+数值", "summary": "我们提出了沃利斯积及其倒数从四维奇异谐振子的变分推导。平方反比相互作用被吸收到有效角度参数 $\\nu$ 中，因此固定扇区中的最低精确能量为 $E_{4d,\\mathrm{exact}}=\\hbar\\omega(\\nu+2)$。受四维振子和三维库仑问题之间径向 Kustaan​​heimo-Stiefel 关系 $r=\\rho^2$ 的启发，我们使用四次试验族 $R_a(\\rho)=N\\rho^\\nu e^{-a\\rho^4}$。最小化的变分能量产生由相邻伽玛函数控制的准确率。在大$\\nu$半经典极限中，这个比率接近统一。将 $\\nu$ 限制为奇数序列 $\\nu=2n-1$ 给出标准沃利斯积，而偶数序列 $\\nu=2n$ 给出其倒数形式。库仑对偶解释进一步将两个分支与对偶库仑/MICZ 描述中的整数和半整数有效角扇区联系起来。结果表明，沃利斯型无限积在振子的平方反比变形下持续存在，并且源自径向变分动力学中常见的伽马函数结构。", "authors": [{"name": "Bin Ye"}, {"name": "Ruitao Chen"}, {"name": "Lei Yin"}], "featured_authors": [{"name": "Bin Ye"}, {"name": "Ruitao Chen"}, {"name": "Lei Yin"}], "author_count": 3}, {"id": "2607.00346", "category": "quant-ph", "title": "Extreme volume monogamy via bound-state engineering", "abstract": "Quantum steering ellipsoid (QSE) provides a faithful representation of a two-qubit state. When extended to tripartite systems, the steerability from a trusted party to different receivers is subject to volume monogamy relations, which only constrain the total steerability but cannot individually eliminate the steerability of an untrusted third party, leaving a potential channel for information leakage via steering. Here, we show that this residual steerability can be completely suppressed by selectively engineering bound states in local qubit-environment subsystems, without compromising the steerability between trusted parties. Specifically, when bound states are formed in the subsystems formed by the trusted parties and their environments but absent in the untrusted one, the untrusted party's QSE volume decays to zero, while the trusted party's QSE volume remains finite. Our results establish selective bound-state engineering as a mechanism for extreme volume monogamy, with potential applications in secure quantum communication with an untrusted third party.", "url": "https://arxiv.org/abs/2607.00346", "type": "理论", "summary": "量子转向椭球 (QSE) 提供了两个量子位状态的忠实表示。当扩展到三方系统时，从可信方到不同接收者的可操纵性受到体积一夫一妻制关系的影响，这种关系只能限制总的可操纵性，而不能单独消除不可信第三方的可操纵性，从而为通过操纵而泄漏信息留下了潜在的渠道。在这里，我们表明，可以通过选择性地设计局部量子位环境子系统中的束缚态来完全抑制这种残余可操纵性，而不会损害可信方之间的可操纵性。具体来说，当受信方及其环境形成的子系统中形成了束缚状态，而不受信方的子系统中不存在束缚状态时，不受信方的 QSE 量衰减为零，而受信方的 QSE 量仍然是有限的。我们的结果建立了选择性束缚态工程作为极限体积一夫一妻制的机制，在与不可信第三方的安全量子通信中具有潜在的应用。", "authors": [{"name": "Wen-Jie Zhang"}, {"name": "Jun-Hong An"}], "featured_authors": [{"name": "Wen-Jie Zhang"}, {"name": "Jun-Hong An"}], "author_count": 2}, {"id": "2607.00462", "category": "quant-ph", "title": "Closed-loop control for two-qubit gates with trapped ions", "abstract": "State-of-the-art two-qubit gates with trapped ions employ open-loop control that rely on simplified models to precompute control sequences. Our aim is to introduce closed-loop control for two-qubit gates to correct disturbances as they occur during the gate implementation. We introduce a spectator ion into the ion chain used for quantum logic processing, where it couples with the other ions through collective motional modes. The spectator ion's position is continuously monitored by driving dipole transitions and detecting the resultant fluorescence. We show that incorporating a spectator ion is feasible for linear Paul trap implementations and is expected to reduce the two-qubit gate Bell-state preparation infidelity by an order of magnitude with the deleterious effects of position monitoring being negligible compared to the thermal effects that exist in the system, even in the absence of the spectator ions. Mathematically, we describe driven ion-trap dynamics, including the spectator ion, by a stochastic quantum master equation involving the amplitude-modulation multimode-motional coupling gate, motional drift, thermal effects, recoil from photon scattering, spontaneous decay, and light shift. Our on-the-fly control method employs reinforcement learning with the reward function based on the actual geometric phase of the spectator ion. A key advantage of our approach is that we introduce a control method that involves `learning' and correcting disturbances happening in the trap on-the-fly, thus achieving high-fidelity gates. Our approach will lead to a significantly higher two-qubit gate fidelity at a reduced calibration overhead owing to the small parameter drift in the control system.", "url": "https://arxiv.org/abs/2607.00462", "type": "理论+数值", "summary": "最先进的带有捕获离子的双量子位门采用开环控制，依靠简化模型来预先计算控制序列。我们的目标是为两个量子位门引入闭环控制，以纠正门实现过程中发生的干扰。我们将观察者离子引入用于量子逻辑处理的离子链中，它通过集体运动模式与其他离子耦合。通过驱动偶极跃迁并检测由此产生的荧光来连续监测观察者离子的位置。我们证明，结合观察者离子对于线性保罗陷阱实现是可行的，并且预计可以将两个量子位门贝尔态准备不准确度降低一个数量级，即使在没有观察者离子的情况下，与系统中存在的热效应相比，位置监测的有害影响可以忽略不计。\n\n在数学上，我们通过随机量子主方程描述驱动离子陷阱动力学，包括旁观者离子，该方程涉及调幅多模运动耦合门、运动漂移、热效应、光子散射反冲、自发衰变和光移。我们的动态控制方法采用强化学习，其奖励函数基于观察者离子的实际几何相位。我们的方法的一个关键优点是我们引入了一种控制方法，该方法涉及“学习”并纠正动态陷阱中发生的干扰，从而实现高保真门。由于控制系统中的参数漂移较小，我们的方法将在减少校准开销的情况下显着提高两个量子位门的保真度。", "authors": [{"name": "Eduardo J. Páez"}, {"name": "Seyed Shakib Vedaie"}, {"name": "Barry C. Sanders"}], "featured_authors": [{"name": "Eduardo J. Páez"}, {"name": "Seyed Shakib Vedaie"}, {"name": "Barry C. Sanders"}], "author_count": 3}, {"id": "2607.00463", "category": "quant-ph", "title": "Bridging quantum mechanics and nonlinear optics in Raman scattering", "abstract": "We present a theoretical framework for spontaneous Raman scattering that fundamentally bridges quantum-mechanical and nonlinear-optical approaches. By conceptualizing spontaneous Raman scattering as a stimulated Raman gain or loss event seeded by the quantum vacuum field, we rigorously derive the spontaneous Raman cross-section directly from the third-order nonlinear susceptibility. Crucially, this framework predicts the existence of a hitherto unrecognized phenomenon: \"spontaneous Raman loss\" (sRL), which acts as the vacuum-seeded counterpart to stimulated Raman loss, complementing traditional spontaneous Raman scattering (spontaneous Raman gain, sRG). Furthermore, we establish a rigorous connection to the traditional Kramers-Heisenberg-Dirac (KHD) theory, revealing that the spontaneous process is governed by interference before a detector between the signal field emitted from molecules and the vacuum field itself that stimulates the molecules. This insight uncovers a direct correspondence between the sRG susceptibility and the rotating/counter-rotating interference terms in the KHD formula. Ultimately, we extend the foundational KHD theory by incorporating previously unrecognized essential terms, achieving perfect analytical agreement between the quantum mechanical and nonlinear optical descriptions of Raman scattering.", "url": "https://arxiv.org/abs/2607.00463", "type": "理论", "summary": "我们提出了一个自发拉曼散射的理论框架，从根本上连接了量子力学和非线性光学方法。通过将自发拉曼散射概念化为由量子真空场产生的受激拉曼增益或损失事件，我们直接从三阶非线性磁化率严格推导出自发拉曼截面。至关重要的是，该框架预测了迄今为止尚未认识到的现象的存在：“自发拉曼损耗”（sRL），它充当受激拉曼损耗的真空种子对应物，补充了传统的自发拉曼散射（自发拉曼增益，sRG）。此外，我们与传统的克拉默斯-海森堡-狄拉克（KHD）理论建立了严格的联系，揭示了自发过程是由分子发射的信号场与刺激分子的真空场本身之间的探测器之前的干扰控制的。这一见解揭示了 sRG 磁化率与 KHD 公式中的旋转/反向旋转干扰项之间的直接对应关系。\n\n最终，我们通过合并以前未识别的基本术语来扩展基础 KHD 理论，在拉曼散射的量子力学和非线性光学描述之间实现完美的分析一致性。", "authors": [{"name": "Naoki Fukutake"}, {"name": "Hideaki Kano"}], "featured_authors": [{"name": "Naoki Fukutake"}, {"name": "Hideaki Kano"}], "author_count": 2}, {"id": "2607.00507", "category": "quant-ph", "title": "Robust Quantum Memory Advantage from Contextuality", "abstract": "Quantum contextuality is widely recognized as an essential non-classical resource underlying quantum technology, yet illuminating the precise mechanisms through which it translates into unconditional computational advantages remains an ongoing challenge. We demonstrate an exponential, noise-resilient memory advantage for quantum finite automata arising from graph-theoretic approaches to contextuality. We define a promise problem on an exclusivity graph $G$ for which any classical deterministic automaton acts as a non-contextual hidden variable model requiring at least $N=\\chi(G)$ states, where $\\chi(G)$ is the graph's chromatic number. In contrast, by exploiting a structural phenomenon we term \\textit{representational contextuality}, a QFA solves this task using a memory of dimension at most $d=\\xi(G)+1$, where $\\xi(G)$ is the graph's orthogonal rank. This separation scales exponentially ($d=\\mathcal O(n)$ versus $N=2^{\\Omega(n)}$) for Boolean-orthogonality graphs. Crucially, this memory advantage maintains an $\\mathcal{O}(1)$ threshold against both depolarizing and coherent noise.", "url": "https://arxiv.org/abs/2607.00507", "type": "理论", "summary": "量子情境性被广泛认为是量子技术背后的重要非经典资源，但阐明其转化为无条件计算优势的精确机制仍然是一个持续的挑战。我们展示了量子有限自动机的指数级、抗噪声记忆优势，该优势源自图论上下文方法。我们在排他性图 $G$ 上定义一个承诺问题，其中任何经典的确定性自动机都充当非上下文隐变量模型，需要至少 $N=\\chi(G)$ 状态，其中 $\\chi(G)$ 是图的色数。相比之下，通过利用我们称为 \\textit{表征上下文性} 的结构现象，QFA 使用最多 $d=\\xi(G)+1$ 维度的记忆来解决此任务，其中 $\\xi(G)$ 是图的正交等级。对于布尔正交图，这种分离呈指数级扩展（$d=\\mathcal O(n)$ 与 $N=2^{\\Omega(n)}$）。至关重要的是，这种内存优势保持了针对去偏振和相干噪声的 $\\mathcal{O}(1)$ 阈值。", "authors": [{"name": "Shiroman Prakash"}], "featured_authors": [{"name": "Shiroman Prakash"}], "author_count": 1}, {"id": "2607.00557", "category": "quant-ph", "title": "Configuration-based understanding of superradiant phase transitions in Dicke lattices", "abstract": "The emergence of multiple superradiant phases in Dicke lattice models has attracted considerable attention in the quantum optics community. However, a unified understanding of the origin of multistability and its relation to different superradiant phases is still lacking. Here, we develop a configuration-based understanding to classify the superradiant phases in Dicke lattices. We show that photon hopping naturally organizes the possible superradiant configurations according to the lattice symmetry, providing a unified interpretation of the nonequilibrium phase diagram and the emergence of multistability. For the dissipative four-site Dicke lattice, we obtain the complete phase diagram and identify the coexistence of up to four stable superradiant phases. The proposed classification is further extended to five- and six-site lattices. Moreover, we demonstrate that the same configuration-based understanding also applies to the closed Dicke lattice, where the ground state uniquely selects one of the allowed configurations. Finally, we show that different configurations may belong to either same or distinct nonequilibrium universality classes in the dissipative Dicke lattice, while they share the same equilibrium universality class in the closed Dicke lattice. Our results provide a unified picture for understanding equilibrium and nonequilibrium superradiant phase transitions in Dicke lattices.", "url": "https://arxiv.org/abs/2607.00557", "type": "理论+数值", "summary": "迪克晶格模型中多重超辐射相的出现引起了量子光学界的广泛关注。然而，对于多稳定性的起源及其与不同超辐射相的关系仍然缺乏统一的理解。在这里，我们开发了一种基于构型的理解来对迪克晶格中的超辐射相进行分类。我们证明光子跳跃根据晶格对称性自然地组织可能的超辐射构型，为非平衡相图和多稳定性的出现提供了统一的解释。对于耗散四位迪克晶格，我们获得了完整的相图并确定了多达四个稳定的超辐射相的共存。所提出的分类进一步扩展到五点和六点晶格。此外，我们证明了相同的基于构型的理解也适用于封闭的迪克晶格，其中基态唯一地选择允许的构型之一。\n\n最后，我们证明不同的构型可能属于耗散迪克晶格中相同或不同的非平衡普遍性类，而它们在闭合迪克晶格中共享相同的平衡普遍性类。我们的结果为理解迪克晶格中的平衡和非平衡超辐射相变提供了统一的图景。", "authors": [{"name": "Peng-Fei Wei"}, {"name": "Zhihai Wang"}], "featured_authors": [{"name": "Peng-Fei Wei"}, {"name": "Zhihai Wang"}], "author_count": 2}, {"id": "2607.00583", "category": "quant-ph", "title": "Open Quantum Systems Driven by Chirped Pulses: Quantized versus Semiclassical Fields and the Validity of the Rotating-Wave Approximation", "abstract": "Population transfer via chirped rapid adiabatic passage is studied using open quantum and semiclassical models, with and without the rotating-wave approximation. A time-dependent variational approach based on the multiple-Davydov D$_2$ trial state is employed to simulate the quantum models with an arbitrary finite mean photon number. We examine the accuracy of both the semiclassical field description and the rotating-wave approximation. Robust population transfer is identified over a wide parameter regime controlled by the laser spectral chirp and is found to be insensitive to the spin--phonon coupling strength, Gaussian pulse area, and energy gap of the two-level system.", "url": "https://arxiv.org/abs/2607.00583", "type": "理论+数值", "summary": "使用开放量子和半经典模型，在有或没有旋转波近似的情况下，研究了通过啁啾快速绝热通道的群体转移。采用基于多 Davydov D$_2$ 试验状态的瞬态变分方法来模拟具有任意有限平均光子数的量子模型。我们检查了半经典场描述和旋转波近似的准确性。在由激光光谱啁啾控制的宽参数范围内发现了鲁棒的布居迁移，并且发现鲁棒布居迁移对自旋声子耦合强度、高斯脉冲面积和两能级系统的能隙不敏感。", "authors": [{"name": "Justin Zhengjie Tan"}, {"name": "Frank Großmann"}, {"name": "Yiying Yan"}, {"name": "Maxim Gelin"}, {"name": "Yang Zhao"}], "featured_authors": [{"name": "Justin Zhengjie Tan"}, {"name": "Frank Großmann"}, {"name": "Yiying Yan"}, {"name": "Maxim Gelin"}, {"name": "Yang Zhao"}], "author_count": 5}, {"id": "2607.00600", "category": "quant-ph", "title": "Influence of laser chirp and interferometer delay and imbalance on the performance of a time-bin BB84 quantum key distribution system", "abstract": "We investigate the effect of interferometer delay and imbalance on the performance of a BB84 time-bin quantum key distribution system. We simulate the impact of interference visibility on system performance and measure the visibility of a pair of interferometers as a function of their relative time delay and intensity imbalance. In addition, our analysis highlights the effect of laser chirp on system performance.", "url": "https://arxiv.org/abs/2607.00600", "type": "理论", "summary": "我们研究了干涉仪延迟和不平衡对 BB84 时间仓量子密钥分配系统性能的影响。我们模拟干扰可见度对系统性能的影响，并测量一对干涉仪的可见度作为其相对时间延迟和强度不平衡的函数。此外，我们的分析强调了激光啁啾对系统性能的影响。", "authors": [{"name": "Loïc Millet"}, {"name": "Alberto Boaron"}, {"name": "Rob Thew"}, {"name": "Gianluca Boso"}], "featured_authors": [{"name": "Loïc Millet"}, {"name": "Alberto Boaron"}, {"name": "Rob Thew"}, {"name": "Gianluca Boso"}], "author_count": 4}, {"id": "2607.00653", "category": "quant-ph", "title": "Far-field spatial coherence driven by lossy objects: first-principles approach unifying scattering of quantum light and thermal emission", "abstract": "Far-field spatial coherence dictates the interference properties of scattered light and thermal emission. Traditionally, these phenomena are treated through disjointed paradigms: classical scattering descriptions assume cold objects lacking quantum fluctuations, idealized quantum scattering schemes ignore dissipation, and semiclassical fluctuational electrodynamics relies on phenomenological noise currents, precluding the consistent treatment of incident quantum states. Here, we develop a first-principles framework based on the modified Langevin noise formalism to unify the scattering of quantum light and the intrinsic thermal emission of finite dissipative objects. We demonstrate that the outgoing far-field spatial coherence separates into an algebraic superposition of two geometry-driven mechanisms, coupled by the global unitarity of the radiation-matter dynamics. The first mechanism, elastic scattering, acts as a non-unitary spatial filter, mode-selectively attenuating and reshaping incident quantum correlations. The second mechanism, thermal emission, originates from localized material dissipation and projects the object's absorption profile into the far field, providing a quantum-vectorial derivation of the macroscopic van Cittert-Zernike theorem. Applying this framework across optical regimes, we determine operational bounds for lossy quantum photonics. Under chaotic thermal illumination, we analytically demonstrate thermal cloaking at equilibrium and show that a passive sink casts a structured thermal shadow geometrically identical to a primary emitter. Under coherent illumination, we derive a thermodynamic phase diagram bounding macroscopic phase correlations, demonstrating that subwavelength nanostructures undergo substantial coherence degradation compared to bulk objects. Finally, under spatially entangled illumination...", "url": "https://arxiv.org/abs/2607.00653", "type": "理论+数值", "summary": "远场空间相干性决定了散射光和热发射的干涉特性。传统上，这些现象是通过脱节的范式来处理的：经典散射描述假设冷物体缺乏量子涨落，理想化的量子散射方案忽略耗散，半经典涨落电动力学依赖唯象噪声电流，排除了对入射量子态的一致处理。在这里，我们开发了一个基于修正的朗之万噪声形式主义的第一原理框架，以统一量子光的散射和有限耗散物体的固有热发射。我们证明，传出的远场空间相干性分解为两个几何驱动机制的代数叠加，并与辐射物质动力学的全局幺正性耦合。第一种机制是弹性散射，充当非单一空间滤波器，选择性地衰减和重塑入射量子相关性。\n\n第二种机制是热发射，源自局部材料耗散，并将物体的吸收剖面投射到远场中，从而提供宏观 van Cittert-Zernike 定理的量子矢量推导。通过在光学领域应用这个框架，我们确定了有损量子光子学的操作范围。在混沌热照明下，我们分析证明了平衡时的热隐身，并表明无源接收器投射出与主发射器几何形状相同的结构化热阴影。在相干照明下，我们得出了限制宏观相位相关性的热力学相图，证明亚波长纳米结构与大块物体相比经历了显着的相干性退化。最后，在空间纠缠照明下……", "authors": [{"name": "Alessandro Ciattoni"}], "featured_authors": [{"name": "Alessandro Ciattoni"}], "author_count": 1}, {"id": "2607.00715", "category": "quant-ph", "title": "GsOQDC: A GUI-Driven Interactive Framework for End-to-End Simulation of Optical Quantum Data Centers", "abstract": "We present GsOQDC, an open-source graphical framework integrating optical-network design, distributed quantum-circuit compilation, scheduling, and DES-based remote-gate simulation, enabling end-to-end cross-layer evaluation of entanglement-resource dynamics and system-level performance in Optical Quantum Data Centers.", "url": "https://arxiv.org/abs/2607.00715", "type": "理论+数值", "summary": "我们推出了 GsOQDC，这是一个集成光网络设计、分布式量子电路编译、调度和基于 DES 的远程门仿真的开源图形框架，可对光量子数据中心中的纠缠资源动态和系统级性能进行端到端跨层评估。", "authors": [{"name": "Seyed Navid Elyasi"}, {"name": "Sima Bahrani"}, {"name": "Rui Wang"}, {"name": "Dimitra Simeonidou"}, {"name": "Paolo Monti"}, {"name": "Rui Lin"}], "featured_authors": [{"name": "Seyed Navid Elyasi"}, {"name": "Sima Bahrani"}, {"name": "Rui Wang"}, {"name": "Dimitra Simeonidou"}, {"name": "Paolo Monti"}, {"name": "Rui Lin"}], "author_count": 6}, {"id": "2607.00779", "category": "quant-ph", "title": "Asymmetric Light Scattering from an Atomic System with Gain: A Quantum Analysis", "abstract": "We study the the scattering of light by a binary system of identical atoms in which one of them is incoherently pumped. This system belongs to the kind of non-parity symmetric optical systems in which gains and losses are partially compensated. We carry out a fully quantum analysis of the directionality of the radiation scattered from the atoms when the incident light strikes the system either perpendicular or alongside the interatomic axis. We find that, generally, while the degree of asymmetry depends on the pump rate, the preferred direction for emission depends on the interatomic distance and the detuning of the probe field with respect to the resonant frequency. On physical grounds, for the case of frontal illumination, the asymmetry is the result of the interference of the photons emitted from different atoms. On the contrary, for side lighting, the asymmetry with respect to the side of incidence is caused by both the phase difference between the probe field photons that strike each atom and the interference between the photons emitted from different atoms. Further, for side lighting too, our quantum approach demonstrates that the forward scattered power depends on the side of incidence, which reveals the lack of reciprocity in the quantum optical response of the system. This result conflicts with what is obtained within a classical approach.", "url": "https://arxiv.org/abs/2607.00779", "type": "理论", "summary": "我们研究由相同原子组成的二元系统对光的散射，其中其中一个原子被非相干泵浦。该系统属于增益和损耗部分补偿的非奇偶对称光学系统。当入射光垂直或沿着原子间轴照射到系统时，我们对原子散射的辐射的方向性进行了全面的量子分析。我们发现，一般来说，虽然不对称程度取决于泵浦速率，但发射的首选方向取决于原子间距离和探测场相对于共振频率的失谐。从物理角度来看，对于正面照明的情况，不对称性是不同原子发射的光子干涉的结果。相反，对于侧面照明，相对于入射侧的不对称性是由撞击每个原子的探测场光子之间的相位差以及从不同原子发射的光子之间的干涉引起的。\n\n此外，对于侧面照明，我们的量子方法表明前向散射功率取决于入射侧面，这揭示了系统的量子光学响应缺乏互易性。该结果与经典方法中获得的结果相冲突。", "authors": [{"name": "Lorena Acevedo"}, {"name": "Manuel Donaire"}], "featured_authors": [{"name": "Lorena Acevedo"}, {"name": "Manuel Donaire"}], "author_count": 2}, {"id": "2607.00786", "category": "quant-ph", "title": "Bias-Preserving Gates and Quantum Error Correction With Dual-Rail Cat Codes", "abstract": "Scalable fault-tolerant quantum computation requires quantum error-correcting codes that simultaneously support universal logical operations, suppress hardware-specific noise, and enable efficient handling of photon-loss errors. Bosonic encodings such as the dual-rail and cat codes each offer attractive features but also exhibit important limitations when used in isolation. The dual-rail code enables efficient single-photon-loss detection by converting leakage out of the computational subspace induced by photon-loss errors into an erasure error. In contrast, the cat code provides a resource-efficient, bias-tailored error-correction scheme with bias-preserving logical gate operations. Here, we introduce the dual-rail cat code (DRCC), a concatenated bosonic encoding that combines an inner cat code with an outer dual-rail structure, thereby inheriting and enhancing the advantages of both constituent codes. We analyse the error-correction properties of the DRCC and propose a deterministic single-photon-loss correction protocol by concatenating it with an outer repetition code. Exploiting the code's intrinsic noise bias, we construct a universal set of logical gates using only beam-splitter interactions and demonstrate that all logical operations preserve the erasure-biased noise structure. The DRCC offers several distinctive advantages, including the absence of relative geometric phases during gate operations, deterministic erasure detection and correction, and simultaneous syndrome extraction without interrupting stabilisation. These features make the DRCC a promising bosonic code for hardware-efficient, bias-preserving, and erasure-resilient fault-tolerant quantum computation.", "url": "https://arxiv.org/abs/2607.00786", "type": "理论", "summary": "可扩展的容错量子计算需要同时支持通用逻辑运算、抑制硬件特定噪声并能够有效处理光子损失错误的量子纠错码。诸如双轨和猫码之类的玻色子编码各自提供了有吸引力的功能，但在单独使用时也表现出重要的局限性。双轨代码通过将光子损失误差引起的计算子空间的泄漏转换为擦除误差，实现高效的单光子损失检测。相比之下，cat 代码提供了一种资源高效、偏差定制的纠错方案，具有保留偏差的逻辑门操作。在这里，我们介绍双轨猫码（DRCC），这是一种级联玻色子编码，将内部猫码与外部双轨结构相结合，从而继承和增强了两种组成码的优点。我们分析了 DRCC 的纠错特性，并通过将其与外部重复码连接起来提出了一种确定性单光子丢失校正协议。\n\n利用代码的固有噪声偏差，我们仅使用分束器相互作用构建了一组通用逻辑门，并证明所有逻辑操作都保留了擦除偏差噪声结构。 DRCC 提供了几个独特的优势，包括在门操作期间不存在相对几何相位、确定性擦除检测和校正，以及在不中断稳定的情况下同步校正子提取。这些特性使 DRCC 成为一种有前景的玻色子代码，可用于硬件高效、偏差保持和擦除弹性容错量子计算。", "authors": [{"name": "Debjyoti Biswas"}, {"name": "Nikhil Sharma"}, {"name": "Alberto Salvador"}, {"name": "Rui Wang"}, {"name": "Mats Granath"}, {"name": "Adithi Udupa"}, {"name": "Giulia Ferrini"}], "featured_authors": [{"name": "Debjyoti Biswas"}, {"name": "Nikhil Sharma"}, {"name": "Alberto Salvador"}, {"name": "Mats Granath"}, {"name": "Adithi Udupa"}, {"name": "Giulia Ferrini"}], "author_count": 7}, {"id": "2607.00795", "category": "quant-ph", "title": "Three-qubit nonlocality paradoxes: beyond GHZ", "abstract": "Quantum nonlocality paradoxes, such as that of GHZ, provide maximally sharp logical obstructions to classical probabilistic models of quantum correlations. They are key resources in a broad variety of information-theoretic tasks that exhibit unconditional quantum advantage. For example, in nonlocal games, which are communication tasks that serve as core technical tools in recent landmark results in quantum computational complexity theory. Their role in establishing quantum advantage motivated their study by Abramsky et al. who introduced an infinite family of three-qubit paradoxes exhibiting novel conditional structure. This was later extended by de Silva et al. into a full classification program. In this work, we completely classify all three-qubit nonlocality paradoxes established via a biconditional parity proof; this is a very large class of paradoxes that encompasses all earlier-known examples. We do this by introducing a suite of new structural and combinatorial techniques. We find that the landscape of nonlocality paradoxes is far richer than previously understood, violating regularity conditions underlying all prior constructions.", "url": "https://arxiv.org/abs/2607.00795", "type": "理论", "summary": "量子非局域性悖论，例如 GHZ 悖论，为量子相关性的经典概率模型提供了最尖锐的逻辑障碍。它们是各种信息论任务中的关键资源，表现出无条件的量子优势。例如，在非局域游戏中，这些通信任务在量子计算复杂性理论的最新里程碑式成果中充当了核心技术工具。他们在建立量子优势方面的作用激发了 Abramsky 等人的研究。他引入了一个无限系列的三量子位悖论，表现出新颖的条件结构。后来 de Silva 等人扩展了这一点。进入完整的分类程序。在这项工作中，我们对通过双条件奇偶校验证明建立的所有三量子位非定域性悖论进行了完全分类；这是一大类悖论，涵盖了所有早期已知的例子。我们通过引入一套新的结构和组合技术来做到这一点。我们发现非定域性悖论的情况比以前理解的要丰富得多，违反了所有先前构造的规律性条件。", "authors": [{"name": "Nadish de Silva"}, {"name": "Santanil Jana"}, {"name": "Ming Yin"}], "featured_authors": [{"name": "Nadish de Silva"}, {"name": "Santanil Jana"}, {"name": "Ming Yin"}], "author_count": 3}, {"id": "2607.00837", "category": "quant-ph", "title": "Twisted Gaussian Schell States in Quantum Optics: Twist-Assisted Nonclassicality and Entanglement", "abstract": "We introduce the Twisted Gaussian Schell (TGS) state, a two-mode mixed Gaussian state defined as the quantum-optical analog of the Twisted Gaussian Schell-model beam of classical paraxial optics, characterized by the so-called twist phase. In the TGS state, the twist parameter arises when an asymmetric two-mode thermal state is subject to local squeezing after the action of phase shifters and a beam splitter. Its defining quantum feature is nonclassicality: although the state is separable in its natural bipartition, when the twist parameter is nonzero there are global quadratures that can be squeezed below the shot-noise limit. The nonclassicality has also a direct signature in the joint photon-number distribution, which we obtain in closed form. Moreover, coupling each mode to an ancillary vacuum at a balanced beam splitter yields a four-mode state with entanglement in select $2\\times2$ bipartitions, with local description given by two TGS states, and all $1\\times3$ bipartitions. For fixed input squeezing, increasing the twist parameter activates entanglement where the state is otherwise separable and deepens it where already present. The classical physicality bound on the twist parameter coincides with the quantum physicality condition. These results advance the two-way bridge between classical beam engineering and quantum information.", "url": "https://arxiv.org/abs/2607.00837", "type": "理论", "summary": "我们引入扭曲高斯谢尔 (TGS) 态，这是一种双模混合高斯态，定义为经典近轴光学扭曲高斯谢尔模型光束的量子光学模拟，其特征在于所谓的扭曲相位。在TGS状态下，当不对称的双模热状态在移相器和分束器的作用​​后受到局部挤压时，就会出现扭曲参数。其定义的量子特征是非经典性：尽管状态在其自然二分性中是可分离的，但当扭曲参数非零时，可以将全局正交压缩到散粒噪声极限以下。非经典性在联合光子数分布中也有直接特征，我们以封闭形式获得。此外，将每个模式耦合到平衡分束器处的辅助真空会产生四模态，在选择的 $2\\times2$ 二分区中具有纠缠，并由两个 TGS 状态和所有 $1\\times3$ 二分区给出局部描述。对于固定输入压缩，增加扭曲参数会激活状态可分离的纠缠，并加深已经存在的纠缠。\n\n扭曲参数上的经典物理性界限与量子物理性条件一致。这些结果推进了经典光束工程和量子信息之间的双向桥梁。", "authors": [{"name": "Fabricio Toscano"}, {"name": "G. Cañas"}, {"name": "A. Z. Khoury"}, {"name": "P. H. Souto Ribeiro"}, {"name": "S. P. Walborn"}], "featured_authors": [{"name": "Fabricio Toscano"}, {"name": "G. Cañas"}, {"name": "A. Z. Khoury"}, {"name": "P. H. Souto Ribeiro"}, {"name": "S. P. Walborn"}], "author_count": 5}, {"id": "2607.00945", "category": "quant-ph", "title": "The Dynamical Lie Algebra of QAOA-MaxCut on the Complete Graph", "abstract": "We give an analytical expression for the dynamical Lie algebra corresponding to the QAOA-MaxCut problem on complete graphs, and show that the variance of the associated loss function scales linearly in the number of qubits. This solves an open problem from [ASYZ26] and confirms that such systems do not exhibit barren plateaus. The proof is based on projecting the dynamical Lie algebra generators onto subspaces given by the Schur-Weyl duality between irreducible representations of the unitary and symmetric groups.", "url": "https://arxiv.org/abs/2607.00945", "type": "理论", "summary": "我们给出了与完整图上的 QAOA-MaxCut 问题相对应的动态李代数的解析表达式，并表明相关损失函数的方差随量子比特数呈线性变化。这解决了 [ASYZ26] 中的一个悬而未决的问题，并证实了此类系统不会表现出贫瘠的高原。该证明基于将动态李代数生成器投影到由酉群和对称群的不可约表示之间的 Schur-Weyl 对偶性给出的子空间上。", "authors": [{"name": "Jonathan Allcock"}, {"name": "Pei Yuan"}, {"name": "Shengyu Zhang"}], "featured_authors": [{"name": "Jonathan Allcock"}, {"name": "Pei Yuan"}, {"name": "Shengyu Zhang"}], "author_count": 3}, {"id": "2607.00961", "category": "quant-ph", "title": "Bridging Quantum Computing Paradigms toward Semiconductor Yield: A Controlled CV-versus-DV Comparison on Wafer-Map Defect Classification", "abstract": "Realizing quantum neural networks (QNNs) in industry requires knowing which quantum computing paradigm suits which task. Motivated by AI accelerators and high-bandwidth memory, where die stacking makes wafer-level defect screening central to yield, we study WM-811K wafer-map defect classification (eight classes), comparing the dominant paradigms, continuous-variable (CV) and discrete-variable (DV), under controlled conditions. To isolate the quantum circuit as the sole variable, a shared convolutional backbone (~4.3M parameters) feeds interchangeable heads (classical dense, CV-QNN, or DV-QNN) as the only structural difference; each quantum head is scaled over three sizes (3, 4, 8 qumodes/qubits). The CV head consistently outperforms the DV head: at four qumodes/qubits it reaches 79.7 +/- 1.8% accuracy versus 61.6 +/- 1.4%, a non-overlapping 18-point gap. The advantage is sharpest on the spatially localized Edge-Loc class, easily confused with Scratch, which CV recovers with recall 0.66 +/- 0.06 while DV fails at every size (<=0.05), showing the structured CV layer better captures fine spatial distinctions between defect types. Training curves show the DV limitation is a representational-capacity ceiling, not an optimization failure; at the Fock cutoff used here (d = 2) the CV advantage reflects two intrinsic properties, a structured, neural-network-analogue layer and continuous phase-space encoding, not Hilbert-space dimensionality. On IBM hardware, DV accuracy holds at shallow depth, degrading only at the deepest circuit. Both quantum heads remain below the classical baseline (85.0%), but the controlled setting isolates where a structured head already helps and, as noise and scale improve, which paradigm can deliver practical advantage.", "url": "https://arxiv.org/abs/2607.00961", "type": "理论+数值", "summary": "在工业中实现量子神经网络 (QNN) 需要了解哪种量子计算范式适合哪种任务。在 AI 加速器和高带宽存储器的推动下，裸片堆叠使晶圆级缺陷筛选成为成品率的核心，我们研究了 WM-811K 晶圆图缺陷分类（八类），在受控条件下比较了主要范例、连续变量 (CV) 和离散变量 (DV)。为了将量子电路隔离为唯一变量，共享卷积主干（约 4.3M 参数）提供可互换头（经典密集、CV-QNN 或 DV-QNN）作为唯一的结构差异；每个量子头都有三种尺寸（3、4、8 量子模式/量子位）。 CV 头的性能始终优于 DV 头：在四个量子模式/量子位下，它的准确度达到 79.7 +/- 1.8%，而准确度为 61.6 +/- 1.4%，不重叠的 18 点差距。优势在空间局部化的 Edge-Loc 类上最为明显，很容易与 Scratch 混淆，其中 CV 以 0.66 +/- 0.06 的召回率恢复，而 DV 在每个尺寸上都失败 (<=0.05)，这表明结构化 CV 层可以更好地捕获缺陷类型之间的精细空间区别。\n\n训练曲线显示 DV 限制是表征能力上限，而不是优化失败；在此处使用的 Fock 截止值 (d = 2) 处，CV 优势反映了两个内在属性：结构化神经网络模拟层和连续相空间编码，而不是希尔伯特空间维度。在 IBM 硬件上，DV 精度保持在浅层深度，仅在最深电路处降低。两个量子头都保持在经典基线 (85.0%) 以下，但受控设置隔离了结构化头已经有所帮助的地方，并且随着噪声和规模的改善，该范例可以提供实际优势。", "authors": [{"name": "Yeonhong Kim"}, {"name": "Jonghyeok Im"}, {"name": "Monu Nath Baitha"}, {"name": "Kyoungsik Kim"}], "featured_authors": [{"name": "Yeonhong Kim"}, {"name": "Jonghyeok Im"}, {"name": "Monu Nath Baitha"}, {"name": "Kyoungsik Kim"}], "author_count": 4}, {"id": "2607.01030", "category": "quant-ph", "title": "Analytical connection between exact and approximate solutions of the periodically-driven two-level system starting from the Heun equation", "abstract": "We investigate and establish an analytic connection between the exact solutions describing the dynamics of a two-level system driven by periodic external fields, focusing on the cases of linear driving and the so-called rotating-wave approximation, or circular driving. In both cases, the exact solutions can be obtained by mapping the Schrodinger equation onto Heun equations: the confluent Heun equation for linear driving and the Heun equation for the rotating-wave case. In particular, we demonstrate a direct analytic connection between the exact solutions for linear driving and those for the rotating-wave case. This result is obtained by analyzing local solutions expressed in terms of hypergeometric functions, which, in the case of the confluent Heun equation, can be derived by considering path-multiplicative Floquet solutions involving a bilateral series. This series leads to two continued-fraction expansions that can be perturbatively solved by imposing a suitable consistency condition. The connection between the linear-driving and rotating-wave solutions is established through a perturbative procedure that allows us to recover not only the rotating-wave approximation itself, but also the correct Stark and Bloch-Siegert shifts, as well as the so-called high-frequency approximation.", "url": "https://arxiv.org/abs/2607.01030", "type": "理论+数值", "summary": "我们研究并建立了描述由周期性外部场驱动的两能级系统动力学的精确解之间的分析联系，重点关注线性驱动和所谓的旋转波近似或圆形驱动的情况。在这两种情况下，都可以通过将薛定谔方程映射到 Heun 方程来获得精确解：线性驱动的合流 Heun 方程和旋转波情况的 Heun 方程。特别是，我们展示了线性驱动的精确解与旋转波情况的精确解之间的直接分析联系。该结果是通过分析以超几何函数表示的局部解而获得的，在汇合 Heun 方程的情况下，可以通过考虑涉及双边级数的路径乘法 Floquet 解来导出局部解。该级数导致两个连分数展开式，可以通过施加合适的一致性条件来扰动求解。\n\n线性驱动和旋转波解之间的联系是通过微扰过程建立的，该过程使我们不仅可以恢复旋转波近似本身，还可以恢复正确的斯塔克和布洛赫-西格特位移，以及所谓的高频近似。", "authors": [{"name": "Pietro Follia"}, {"name": "Bassano Vacchini"}], "featured_authors": [{"name": "Pietro Follia"}, {"name": "Bassano Vacchini"}], "author_count": 2}, {"id": "2607.01085", "category": "quant-ph", "title": "Fisher Glasses: Tail-Certified Quantum Metrology in Quenched Environments", "abstract": "Quantum metrological advantage is certified by averaged Fisher responses: contrast, susceptibility, or quantum Fisher information (QFI). This fails in quenched sensors, where slow environmental variables freeze within a session but vary between repetitions: shallow nitrogen-vacancy (NV) centers, superconducting qubits with slow two-level fluctuators, and semiconductor spin qubits in drifting charge noise. They sample session-resolved Fisher geometries, not an averaged channel. Certification conditions on the latent session, projects nuisance directions, inverts to attainable loss, then tail-certifies; this inverse upper-tail loss defines quenched tail-certified information. A no-go theorem: no averaged Fisher data determine this certificate; ensembles sharing averaged Fisher matrix, QFI, and projected information have finite or zero certified precision. A Fisher-zero integrability transition governs collapse: the inverse-loss tail exponent $\\beta$ sets the boundary, with nonintegrable certified loss for $\\beta \\le 1$, even when annealed information is large or scaling. The certified quantum resource is response transverse to latent disorder, not raw amplification sharing its generator; universal design laws: safe windows, nondegenerate portfolios, Fisher reserves, action separation, Fisher-cut criteria. A shallow-NV Ramsey tournament shows average-QFI optimization is tail-catastrophic, whereas tail-certified designs recover nearly three orders of magnitude in certified information at equal shot budget and latent ensemble. These non-self-averaging phases are Fisher glasses, governed by Fisher-zero rare-event statistics.", "url": "https://arxiv.org/abs/2607.01085", "type": "理论+数值", "summary": "量子计量优势通过平均费希尔响应来证明：对比度、磁化率或量子费希尔信息 (QFI)。这在淬灭传感器中会失败，其中缓慢的环境变量在一个会话内冻结，但在重复之间变化：浅氮空位（NV）中心、具有缓慢两级涨落器的超导量子位以及漂移电荷噪声中的半导体自旋量子位。他们对会话解析的 Fisher 几何形状进行采样，而不是平均通道。潜在会话的认证条件，预测干扰方向，反转为可达到的损失，然后进行尾部认证；这种逆上尾损失定义了淬灭尾部认证信息。不可行定理：没有平均费舍尔数据可以确定此证书；共享平均 Fisher 矩阵、QFI 和投影信息的集成具有有限或零认证精度。费舍尔零可积性转变控制崩溃：逆损失尾部指数 $\\beta$ 设置边界，不可积的认证损失为 $\\beta \\le 1$，即使退火信息很大或缩放时也是如此。\n\n经过认证的量子资源是对潜在无序的横向响应，而不是共享其发生器的原始放大；通用设计法则：安全窗、非简并组合、费舍尔储备、作用分离、费舍尔切割准则。浅层 NV Ramsey 锦标赛表明，平均 QFI 优化是尾部灾难性的，而尾部认证的设计在相同的镜头预算和潜在集成的情况下，在认证信息中恢复了近三个数量级。这些非自平均阶段是费舍尔眼镜，由费舍尔零罕见事件统计数据控制。", "authors": [{"name": "El Mustapha Mansouri"}, {"name": "Keigo Arai"}], "featured_authors": [{"name": "El Mustapha Mansouri"}, {"name": "Keigo Arai"}], "author_count": 2}, {"id": "2607.01137", "category": "quant-ph", "title": "Entanglement-spectrum fingerprint of a non-invertible symmetry: the Kramers--Wannier duality defect on the lattice", "abstract": "Non-invertible symmetries are characterized by topological defects of irrational quantum dimension, but their imprint on the entanglement of a quantum many-body state has not been resolved at the level of the spectrum. We show that the categorical data of the canonical example -- the Kramers--Wannier (KW) duality defect of the critical Ising chain, with quantum dimension d_sigma=sqrt(2) -- is encoded in the single-particle entanglement spectrum of its ground state: a maximally mixed Majorana zero mode is the spectral origin of the boundary entropy log g=(1/2)log 2, hence of d_sigma itself. Reading the same duality-twisted ground state along two independent routes -- the transfer-matrix momentum shift and the Casimir curvature of the energy -- pins the twist-field weight h_sigma=1/16 twice over, and the defect Hilbert space organizes into a half-integer sigma-twisted conformal tower. This promotes the boundary entropy from an integrated number to a level-resolved spectral signature of non-invertibility, and supplies an exactly solvable calibration target for tensor-network studies of duality defects that lack a free-fermion shortcut.", "url": "https://arxiv.org/abs/2607.01137", "type": "理论+数值", "summary": "不可逆对称性的特点是非理性量子维度的拓扑缺陷，但它们对量子多体态纠缠的印记尚未在光谱水平上得到解决。我们证明了典型例子的分类数据——关键伊辛链的 Kramers-Wannier (KW) 对偶性缺陷，量子维度 d_sigma=sqrt(2)——被编码在其基态的单粒子纠缠谱中：最大混合马约拉纳零模式是边界熵 log g=(1/2)log 2 的谱原点，因此也是 d_sigma 本身的谱原点。沿着两条独立的路径（传递矩阵动量位移和能量的卡西米尔曲率）读取相同的对偶扭曲基态，将扭曲场权重 h_sigma=1/16 固定两次，并且缺陷希尔伯特空间组织成半整数 sigma 扭曲共角塔。这将边界熵从积分提升为不可逆性的水平分辨光谱特征，并为缺乏自由费米子捷径的对偶缺陷的张量网络研究提供了精确可解的校准目标。", "authors": [{"name": "Yi Liang"}], "featured_authors": [{"name": "Yi Liang"}], "author_count": 1}, {"id": "2607.01151", "category": "quant-ph", "title": "Entanglement fingerprint of a non-invertible symmetry: exact Fibonacci cut charges on the lattice", "abstract": "Non-invertible defects are usually diagnosed through scaling spectra or infrared CFT data. We show that the Fibonacci duality defect of the critical golden chain already carries an exact categorical fingerprint at finite lattice size. The even-length antiferromagnetic ground state has fixed cut-charge weights, giving P_tau/P_1=phi^2 and log g=log phi without finite-size extrapolation. The proof is a finite-dimensional operator identity for the sandwiched cut projectors, combined with a Perron-Frobenius sector theorem for the even-length ground state. This gives a sharp lattice-level boundary entropy for a non-Abelian duality defect. We also separate this exact two-charge result from the finer six-primary tricritical-Ising resolution: the latter is located by the standard scaling-limit Virasoro branching of A_4 affine-TL packets, and is not an assumption in the finite-size theorem.", "url": "https://arxiv.org/abs/2607.01151", "type": "理论", "summary": "不可逆缺陷通常通过缩放光谱或红外 CFT 数据来诊断。我们证明，关键金链的斐波那契对偶缺陷已经在有限的晶格尺寸下携带了精确的分类指纹。偶数长度反铁磁基态具有固定的截止电荷权重，给出 P_tau/P_1=phi^2 和 log g=log phi，无需有限大小外推。证明是夹层切割投影仪的有限维算子恒等式，以及偶数长度基态的 Perron-Frobenius 扇形定理。这为非阿贝尔对偶缺陷提供了尖锐的晶格级边界熵。我们还将这个精确的两电荷结果与更精细的六基三临界伊辛分辨率分开：后者由 A_4 仿射-TL 数据包的标准缩放限制 Virasoro 分支定位，并且不是有限大小定理中的假设。", "authors": [{"name": "Yi Liang"}], "featured_authors": [{"name": "Yi Liang"}], "author_count": 1}];

    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
