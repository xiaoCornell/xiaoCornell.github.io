xed states evolve through pairs of Pauli channels arranged in path-superposition and indefinite causal order configurations. Closed-form expressions for the output states are obtained, and entanglement is quantified using concurrence. By exploring representative channel families across their parameter space, we identify regimes where stochastic entanglement emerges, determine the associated success probabilities, and characterize trade-offs between entanglement and purity.", "url": "https://arxiv.org/abs/2606.09599", "type": "理论", "summary": "从可分离态受控产生量子纠缠仍然是量子信息科学的核心挑战。在这里，我们使用两种相关的控制范式研究纠缠的生成：局部酉运算的相干路径叠加和相干控制下泡利通道的随机实现。我们证明，属于 Bell、GHZ 和 W 类的纠缠态可以通过连贯地叠加局部酉变换的替代集，从完全可分离的输入中确定性地生成。导出了用于纠缠生成的局部算子的条件，并且结果表明所得到的状态是局部酉等价于标准多部分纠缠态的。我们进一步将分析扩展到噪声场景，其中可分离的混合状态通过以路径叠加和不定因果顺序配置排列的泡利通道对演化。获得输出状态的封闭式表达式，并使用并发来量化纠缠。\n\n通过探索参数空间中的代表性通道族，我们确定了出现随机纠缠的状态，确定相关的成功概率，并描述了纠缠和纯度之间的权衡。", "authors": [{"name": "Marco Enriquez"}, {"name": "Francisco Delgado"}], "featured_authors": [{"name": "Marco Enriquez"}, {"name": "Francisco Delgado"}], "author_count": 2}, {"id": "2606.09602", "category": "quant-ph", "title": "Zermelo's navigation problem through the lens of quantum annealing: How the Landau-Zener approximation leads to an efficient classical solution", "abstract": "The river-crossing problem, also known as Zermelo's navigation problem, is a classic example of an optimization problem with practical relevance and a scalable degree of complexity. It asks for the optimal trajectory of a vessel moving through a water flow field and provides a setting in which physics, variational methods, and optimization are naturally intertwined. We state a version of Zermelo's problem and then solve it as formulate it as an adiabatic quantum-computing problem using quantum trits, or qutrits for short. The construction includes a penalty term that enforces the prescribed boundary conditions and an exploration term that allows the system to move through intermediate configurations toward the optimal feasible path. In the adiabatic description, the evolution proceeds through a sequence of avoided crossings, so that the resulting fidelity can be estimated using the Landau-Zener formula. Remarkably, the regime in which this approximation is valid also provides a deterministic way to identify the correct solution with computational effort that scales only quadratically with the problem size. Thus, a quantum formulation initially motivated by the apparent exponential complexity of the problem reveals an underlying classical structure that can be exploited efficiently. Our approach also provides a pedagogical illustration of how a real-world optimization problem can be cast into a quantum-annealing framework and then analyzed using the Schrödinger equation, avoided crossings, and Landau-Zener theory.", "url": "https://arxiv.org/abs/2606.09602", "type": "理论+数值", "summary": "过河问题，也称为泽梅洛导航问题，是具有实际意义和可扩展复杂程度的优化问题的经典示例。它要求船舶在水流场中移动的最佳轨迹，并提供物理、变分方法和优化自然交织在一起的设置。我们提出 Zermelo 问题的一个版本，然后使用量子 trits（简称 qutrits）将其表述为绝热量子计算问题来解决它。该构造包括强制执行规定边界条件的惩罚项和允许系统通过中间配置向最佳可行路径移动的探索项。在绝热描述中，演化通过一系列避免交叉的过程进行，因此可以使用朗道-齐纳公式来估计最终的保真度。值得注意的是，这种近似有效的机制还提供了一种确定性的方法来识别正确的解决方案，其计算量仅与问题大小呈二次方缩放。\n\n因此，最初由问题的明显指数复杂性激发的量子公式揭示了可以有效利用的潜在经典结构。我们的方法还提供了一个教学说明，说明如何将现实世界的优化问题转化为量子退火框架，然后使用薛定谔方程、避免交叉和朗道-齐纳理论进行分析。", "authors": [{"name": "Sølve Selstø"}, {"name": "Tor Kristian Dahle"}, {"name": "Sergiy Denysov"}, {"name": "Yves-Laurent Ariel Rezus"}, {"name": "Leiv Øyehaug"}], "featured_authors": [{"name": "Sølve Selstø"}, {"name": "Tor Kristian Dahle"}, {"name": "Sergiy Denysov"}, {"name": "Yves-Laurent Ariel Rezus"}, {"name": "Leiv Øyehaug"}], "author_count": 5}, {"id": "2606.09618", "category": "quant-ph", "title": "Quantum Algorithms for Modulated Circulant Matrix Vector Multiplication", "abstract": "Modulated circulant matrices form a special class of N-parametric circulant matrices, recently introduced in the literature, with a structured spectral decomposition based on a Vandermonde type basis. Motivated by this definition, in this work we define the Modulated Quantum Fourier Transform (MQFT), a quantum primitive tailored to this matrix family.", "url": "https://arxiv.org/abs/2606.09618", "type": "数值", "summary": "调制循环矩阵形成了一类特殊的 N 参数循环矩阵，最近在文献中引入，具有基于 Vandermonde 型基础的结构化谱分解。受此定义的启发，在这项工作中，我们定义了调制量子傅里叶变换（MQFT），这是一种针对该矩阵族量身定制的量子原语。", "authors": [{"name": "Kimy Agudelo"}, {"name": "Aldo Quelopana Cristina Manzaneda"}], "featured_authors": [{"name": "Kimy Agudelo"}, {"name": "Aldo Quelopana Cristina Manzaneda"}], "author_count": 2}, {"id": "2606.09624", "category": "quant-ph", "title": "Phase-only control of GRAPE shaped pulses", "abstract": "We compare phase-only control with phase-and-amplitude control when designing shaped pulses using the GRAPE algorithm, and explain why phase-only control has significant advantages. Trotterisation can be used to simulate amplitude modulation with phase modulation, indicating that the two approaches are fundamentally equivalent. Pulses designed by either method can be interconverted, but phase-only optimization is faster and simpler. The resulting pulses can then be converted into phase-and-amplitude form for more robust implementation if desired.", "url": "https://arxiv.org/abs/2606.09624", "type": "数值", "summary": "在使用 GRAPE 算法设计整形脉冲时，我们将纯相位控制与相位和幅度控制进行了比较，并解释了为什么纯相位控制具有显着的优势。 Trotterization 可用于模拟幅度调制和相位调制，这表明这两种方法基本上是等效的。通过任一方法设计的脉冲都可以相互转换，但仅相位优化更快、更简单。然后，如果需要，可以将所得脉冲转换为相位和幅度形式，以实现更稳健的实施。", "authors": [{"name": "Andrew J. Baldwin"}, {"name": "Jonathan A. Jones"}], "featured_authors": [{"name": "Andrew J. Baldwin"}, {"name": "Jonathan A. Jones"}], "author_count": 2}, {"id": "2606.09727", "category": "quant-ph", "title": "Sambe Approach to Floquet-Lindblad Open Quantum Systems", "abstract": "We study driven and open quantum systems described by a time-periodic Lindblad master equation. In closed systems, the stroboscopic dynamics can always be described by an effective time-independent Floquet Hamiltonian; this idea is the basis of Floquet engineering. However, in the presence of dissipation, the existence of an effective time-independent Floquet Lindbladian is not guaranteed due to the non-unitary nature of the evolution. Using Floquet theory, we construct a well-defined time-independent Floquet Lindbladian in an extended Sambe-Liouville space, transforming the initial time-dependent problem to a static and non-Hermitian eigenvalue problem. For harmonic driving, we introduce a matrix continued fraction method to nonperturbatively resum multiphoton processes and construct an effective Floquet Lindbladian acting only on the physical Liouville space. Compared to other high-frequency expansions, this method has the advantage of providing the whole infinite series expansion at once. Using a resolvent formalism, we show how to obtain a spectral Floquet representation of correlation functions of an open quantum system. As an application, we consider a dissipating two-level system in a linearly polarized field and calculate its resonance fluorescence spectrum. Furthermore, we consider a parametrically driven quantum dot with pump and loss for which we calculate its spectral function and current-voltage characteristics.", "url": "https://arxiv.org/abs/2606.09727", "type": "理论+数值", "summary": "我们研究由时间周期 Lindblad 主方程描述的驱动和开放量子系统。在封闭系统中，频闪动力学始终可以通过有效的时间无关的 Floquet 哈密顿量来描述；这个想法是 Floquet 工程的基础。然而，在存在耗散的情况下，由于演化的非单一性，不能保证有效的时间无关的 Floquet Lindbladian 的存在。利用 Floquet 理论，我们在扩展的 Sambe-Liouville 空间中构造了一个明确定义的与时间无关的 Floquet Lindbladian，将初始的时间相关问题转化为静态的非 Hermitian 特征值问题。对于谐波驱动，我们引入了矩阵连分式方法来非微扰地恢复多光子过程，并构造了仅作用于物理刘维尔空间的有效 Floquet Lindbladian。与其他高频展开相比，该方法的优点是一次性提供整个无穷级数展开。使用解析形式，我们展示了如何获得开放量子系统相关函数的谱 Floquet 表示。\n\n作为一个应用，我们考虑线性偏振场中的耗散两能级系统并计算其共振荧光光谱。此外，我们考虑具有泵浦和损耗的参数驱动量子点，并计算其光谱函数和电流-电压特性。", "authors": [{"name": "Andriani Keliri"}, {"name": "Marco Schirò"}], "featured_authors": [{"name": "Andriani Keliri"}, {"name": "Marco Schirò"}], "author_count": 2}, {"id": "2606.09728", "category": "quant-ph", "title": "Quantum Cut Sparsifiers", "abstract": "In this paper, we continue a line of research initiated by Basu, Brakensiek, and Putterman [2026] studying the sparsifiability of Hamiltonians. We focus particularly on the sparsifiability of the widely-studied Quantum Cut (QC) Hamiltonians. Our main result is that in an $n$-qubit system, any $n$-qubit QC Hamiltonian can be sparsified to $\\widetilde{O}(n /\\varepsilon^2)$ many terms while preserving the energy of every state up to a factor of $1 \\pm \\varepsilon$. Our result can be interpreted as giving an importance sampling scheme for the edges of an arbitrary graph $G$ such that the \\emph{Kikuchi} graph at level $\\ell$ of the sampled graph is a spectral approximation to the Kikuchi graph of $G$. Importantly, the \\emph{same} sampling scheme works simultaneously for all $\\ell$. The natural approach of leverage score sampling, analyzed via matrix concentration inequalities, yields a polynomially worse bound in our setting because the underlying matrices have dimension $\\sim 2^n$. Instead, our approach relies on decomposing the action of these matrices into invariant subspaces. Then, by using an operator-valued inequality of Alon and Kozma [Ann. Henri Poincaré, 2020], itself building on an \\emph{octopus inequality} of Caputo, Liggett, and Richthammer [J. AMS, 2010], we extend our sparsification technique to all expander graphs. We then invoke expander decomposition to extend our sparsifier to all graphs.", "url": "https://arxiv.org/abs/2606.09728", "type": "理论", "summary": "在本文中，我们继续由 Basu、Brakensiek 和 Putterman [2026] 发起的一系列研究，研究哈密顿量的可稀疏性。我们特别关注广泛研究的量子切割（QC）哈密顿量的可稀疏性。我们的主要结果是，在 $n$-qubit 系统中，任何 $n$-qubit QC 哈密顿量都可以稀疏化为 $\\widetilde{O}(n /\\varepsilon^2)$ 个项，同时将每个状态的能量保留高达 $1 \\pm \\varepsilon$ 的因子。我们的结果可以解释为给出任意图 $G$ 的边缘的重要性采样方案，使得采样图的 $\\ell$ 级别的 \\emph{Kikuchi} 图是 $G$ 的 Kikuchi 图的谱近似。重要的是，\\emph{same} 采样方案同时适用于所有 $\\ell$。通过矩阵集中不等式进行分析的杠杆分数采样的自然方法在我们的设置中产生了多项式更差的界限，因为基础矩阵的维度为 $\\sim 2^n$。相反，我们的方法依赖于将这些矩阵的作用分解为不变子空间。然后，通过使用 Alon 和 Kozma 的运算符值不等式 [Ann.\n\nHenri Poincaré，2020]，其本身建立在 Caputo、Liggett 和 Richthammer 的 \\emph{章鱼不等式} 之上 [J. AMS，2010]，我们将稀疏化技术扩展到所有扩展图。然后，我们调用扩展器分解将稀疏器扩展到所有图。", "authors": [{"name": "Arpon Basu"}, {"name": "Joshua Brakensiek"}, {"name": "Pravesh K. Kothari"}, {"name": "Aaron Putterman"}], "featured_authors": [{"name": "Arpon Basu"}, {"name": "Joshua Brakensiek"}, {"name": "Pravesh K. Kothari"}, {"name": "Aaron Putterman"}], "author_count": 4}, {"id": "2606.09773", "category": "quant-ph", "title": "From Pauli Strings to Quantum Dynamics: A Unified Characterization", "abstract": "Understanding the dynamical properties of quantum systems is an essential task in quantum computing, quantum control, and many-body physics. Tools such as representation theory and Lie theory provide crucial information on reachability and computational power. However, this information can be difficult to access exactly or compute efficiently for arbitrary generating sets. Here we focus on the setting of Pauli strings, which satisfy numerous exceptional properties that simplify the problem. We find deep connections between Pauli Lie algebras and certain subgroups of the Clifford group generated by transvections, through the symplectic properties of the Pauli strings. This allows us to give an invariant-based perspective on these objects and their reachability, in the language of Pauli orbits, symmetries, and invariant subspaces. The invariant-based approach provides efficient algorithms for identifying Lie algebras and orbits, as well as a simple framework for analyzing structured Pauli generating sets. We also show in an elementary way that Clifford subgroups generated by transvections provide 3-designs for the corresponding Pauli Lie groups. We illustrate the framework through structured examples from variational quantum algorithms, restricted quantum computation, many-body systems, and random circuits.", "url": "https://arxiv.org/abs/2606.09773", "type": "理论+数值", "summary": "了解量子系统的动力学特性是量子计算、量子控制和多体物理学中的一项重要任务。表示论和李理论等工具提供了有关可达性和计算能力的重要信息。然而，对于任意生成集，该信息可能难以准确访问或有效计算。在这里，我们重点关注泡利弦的设置，它满足许多简化问题的特殊性质。通过泡利弦的辛性质，我们发现泡利李代数与横对流产生的克利福德群的某些子群之间存在深刻的联系。这使我们能够用泡利轨道、对称性和不变子空间的语言对这些物体及其可达性给出基于不变的视角。基于不变性的方法提供了用于识别李代数和轨道的有效算法，以及用于分析结构化泡利生成集的简单框架。我们还以一种基本的方式展示了由横对流生成的 Clifford 子群为相应的泡利李群提供了 3 设计。\n\n我们通过变分量子算法、受限量子计算、多体系统和随机电路的结构化示例来说明该框架。", "authors": [{"name": "Roberto Gargiulo"}, {"name": "Paul Herringer"}, {"name": "Robert Zeier"}], "featured_authors": [{"name": "Roberto Gargiulo"}, {"name": "Paul Herringer"}, {"name": "Robert Zeier"}], "author_count": 3}, {"id": "2606.09778", "category": "quant-ph", "title": "Who Earns the Safety? Intervention-Aware Quantum Predictive Control with Safety Attribution", "abstract": "Hard safety filters are increasingly placed downstream of learned controllers to guarantee constraint satisfaction at run time. Yet a filtered controller that never violates a constraint may still have learned nothing about safety: the filter can silently repair an incompetent upstream policy, so that post-filter success measures the filter, not the policy. We argue that safe policy learning should ask who earns the safety - the policy or its protective layers - and we make this question measurable. We introduce Intervention-Aware Variational Quantum Differentiable Predictive Control (IA-VQC-DPC), which (i) trains a compact variational quantum circuit (VQC) policy under a primal-dual intervention budget that penalizes reliance on a differentiable Control-Barrier-Function (CBF) projection, and (ii) is evaluated with a safety-attribution protocol that decomposes the executed-trajectory correction into a CBF term and a deployment runtime-guard term, and stress-tests the policy with guard-off evaluation. On closed-loop, high-fidelity BOPTEST building-control emulators (5 seeds, 60 episodes per method), intervention-aware training significantly lowers the quantum policy's raw pre-filter violation and total safety-layer reliance (both p < 10^-4) with no significant energy regression; at an equal approximately 400-parameter budget the quantum policy is significantly safer and more comfortable than a matched classical policy. Guard-off evaluation confirms the improvement is policy-level and exposes a valuable negative result: a learned differentiable energy head is only safe when paired with a distribution-aware runtime guard. The attribution protocol is general beyond quantum policies and buildings.", "url": "https://arxiv.org/abs/2606.09778", "type": "理论+数值", "summary": "硬安全过滤器越来越多地放置在学习控制器的下游，以保证运行时的约束满足。然而，一个从未违反约束的过滤控制器可能仍然对安全一无所知：过滤器可以默默地修复不合格的上游策略，因此过滤器后的成功衡量的是过滤器，而不是策略。我们认为，安全政策学习应该问谁赢得了安全——政策或其保护层——并且我们使这个问题变得可衡量。我们引入了干预感知变分量子可微预测控制（IA-VQC-DPC），它（i）在原对偶干预预算下训练紧凑的变分量子电路（VQC）策略，惩罚对可微控制屏障函数（CBF）投影的依赖，以及（ii）使用安全归因协议进行评估，该协议将执行的轨迹修正分解为 CBF 项和部署运行时保护术语，并通过保护评估对策略进行压力测试。\n\n在闭环、高保真 BOPTEST 楼宇控制模拟器（5 个种子，每种方法 60 次）上，干预感知训练显着降低了量子策略的原始预过滤违规和总安全层依赖（均 p < 10^-4），且没有显着的能量回归；在大约 400 个参数的预算下，量子策略比匹配的经典策略明显更安全、更舒适。防护评估确认了改进是策略级别的，并暴露了一个有价值的负面结果：学习的可微能量头只有与分布感知的运行时防护配对时才是安全的。归因协议的通用性超出了量子政策和建筑物的范围。", "authors": [{"name": "Yifan Wang"}], "featured_authors": [{"name": "Yifan Wang"}], "author_count": 1}, {"id": "2606.09790", "category": "quant-ph", "title": "Operation Mpemba effect: Breakdown of resource-Markovianity of free dynamics", "abstract": "The Mpemba effect refers to faster relaxation of states that are initially farther from equilibrium, yet its characterization is often tied to a chosen distance or resource measure. We introduce resource-Markovianity, an extended concept of quantum Markovianity to quantum resource theories, and formulate the resource Mpemba effect operationally as the breaking of resource-Markovianity by a relaxation operation. This yields a measure-independent operational characterization of resource Mpemba effects in general resource theories, together with quantitative characterizations based on resource-non-Markovianity measures. We illustrate the framework with the Mpemba effect for distinguishability of states, due to its relation to quantum Markovianity, and with the thermomajorization Mpemba effect from an operational perspective. These results reveal a deep interplay between quantum resources, non-Markovianity, and the Mpemba effect.", "url": "https://arxiv.org/abs/2606.09790", "type": "理论", "summary": "姆彭巴效应是指最初远离平衡状态的更快松弛，但其特征通常与所选距离或资源度量相关。我们将资源马尔可夫性（量子马尔可夫性的扩展概念）引入量子资源理论，并将资源 Mpemba 效应在操作上表述为通过松弛操作打破资源马尔可夫性。这产生了一般资源理论中资源 Mpemba 效应的与测度无关的操作特征，以及基于资源非马尔可夫性测度的定量特征。我们用 Mpemba 效应（由于其与量子马尔可夫性的关系）来说明状态的可区分性，并从操作角度用热主化 Mpemba 效应来说明该框架。这些结果揭示了量子资源、非马尔可夫性和 Mpemba 效应之间的深刻相互作用。", "authors": [{"name": "Tian-Ren Jin"}, {"name": "Yu-Ran Zhang"}, {"name": "Heng Fan"}], "featured_authors": [{"name": "Tian-Ren Jin"}, {"name": "Yu-Ran Zhang"}, {"name": "Heng Fan"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
