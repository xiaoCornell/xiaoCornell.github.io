des evidence for the formation of a polaron state, consisting of Mu bonded to a ligand oxygen and a $4f$ electron localized on a nearby Ce site. The crystal-orientation dependence of the Mu$^0$ signal suggests strong anisotropy of the $4f$ electron due to the spin-orbit coupling with lifted degeneracy. Furthermore, the Mu$^0$ state exhibits transition to the Mu$^*$ state that corresponds to another Mu$^0$ state (exhibiting a diamagnetic response due to fast spin/charge fluctuations) at temperatures above $\\approx$10 K, before disappearing above $\\approx$30 K. These findings suggest rapid diffusive motion of the $4f$ electrons and/or Mu (as well as H) at higher temperatures.", "url": "https://arxiv.org/abs/2606.08915", "type": "理论+数值", "summary": "使用 μ 子自旋/弛豫 ($\\mu\\text{SR}$) 和第一性原理密度泛函理论 (DFT) 计算，研究高质量单晶二氧化铈 (CeO$_2$) 中作为氢 (H) 同位素的 μ 子 (Mu) 的局域电子态。正 μ 子注入后，在 $\\approx$10 K 下观察到顺磁 (Mu$^0$) 和反磁 (Mu$^*$) 态。 Mu$^0$ 信号的磁场依赖性与 DFT 结果相结合，为极化子态的形成提供了证据，极化子态由与配体氧键合的 Mu 和位于附近 Ce 位点的 $4f$ 电子组成。 Mu$^0$ 信号的晶体取向依赖性表明，由于自旋轨道耦合与简并度提升，$4f$ 电子具有很强的各向异性。此外，在高于 $\\approx$10 K 的温度下，Mu$^0$ 态表现出向 Mu$^*$ 态的转变，该态对应于另一个 Mu$^0$ 态（由于快速自旋/电荷波动而表现出抗磁响应），然后在 $\\approx$30 K 以上消失。这些发现表明 $4f$ 电子和/或 Mu（以及 H）在较高温度下的快速扩散运动。", "authors": [{"name": "A. Koda"}, {"name": "T. U. Ito"}, {"name": "M. Hiraishi"}, {"name": "H. Okabe"}, {"name": "R. Kadono"}], "featured_authors": [{"name": "A. Koda"}, {"name": "T. U. Ito"}, {"name": "M. Hiraishi"}, {"name": "H. Okabe"}, {"name": "R. Kadono"}], "author_count": 5}, {"id": "2606.08916", "category": "cond-mat", "title": "Chemical tuning of magnetic ordering and cryogenic magnetocaloric response in zircon-type Gd1-xErxVO4", "abstract": "Chemical substitution offers an effective route to tune magnetic ordering and magnetocaloric performance in rare-earth oxides for cryogenic refrigeration. Here we investigate the structural evo lution, magnetic properties, and magnetocaloric effect of polycrystalline zircon-type Gd1-xErxVO4 (x=0, 0.1, 0.25, 0.5, and 0.75). Powder X-ray diffraction confirms that all samples crystallize in the tetragonal zircon structure without detectable impurity phases. Substitution of Gd3+ by the smaller Er3+ ion produces a systematic lattice contraction and modifies the magnetic behavior of the rare-earth sublattice. In particular, the magnetic ordering temperature is suppressed from 3.65(2) K in GdVO4 to 2.76(2) K in Gd0.9Er0.1VO4 , accompanied by a weakening of the spin-flop-like field-induced anomaly observed in the parent compound. A low Er concentration correspondingly improves the low-temperature magnetocaloric performance, with Gd0.9Er0.1VO4 exhibiting a max imum magnetic entropy change of 45.1 J kg-1 K-1 for mu_0 Delta H=7T. These results demonstrate that weak Er substitution effectively tunes the competition among exchange interactions, dipolar coupling, and magnetic anisotropy, optimizing the balance between magnetic ordering and available spin entropy in zircon-type rare-earth vanadates, which is crucial for developing efficient cryogenic refrigeration materials.", "url": "https://arxiv.org/abs/2606.08916", "type": "数值", "summary": "化学替代提供了一种调整低温制冷稀土氧化物磁有序和磁热性能的有效途径。在这里，我们研究了多晶锆石型 Gd1-xErxVO4（x=0、0.1、0.25、0.5 和 0.75）的结构演化、磁性和磁热效应。粉末 X 射线衍射证实所有样品均以四方锆石结构结晶，没有可检测到的杂质相。用较小的 Er3+ 离子替代 Gd3+ 会产生系统的晶格收缩，并改变稀土亚晶格的磁性行为。特别是，磁有序温度从 GdVO4 中的 3.65(2) K 抑制到 Gd0.9Er0.1VO4 中的 2.76(2) K，同时伴随着在母体化合物中观察到的自旋随角异色场诱发异常的减弱。较低的Er浓度相应地提高了低温磁热性能，Gd0.9Er0.1VO4在mu_0 Delta H=7T时表现出最大磁熵变45.1 J kg-1 K-1。\n\n这些结果表明，弱Er取代有效地调节了交换相互作用、偶极耦合和磁各向异性之间的竞争，优化了锆石型稀土钒酸盐中磁有序性和可用自旋熵之间的平衡，这对于开发高效低温制冷材料至关重要。", "authors": [{"name": "Ming Zeng"}, {"name": "Muqing Su"}, {"name": "Liang Ming"}, {"name": "Xiaolong Yang"}, {"name": "Wang Chen"}, {"name": "Lingwei Li"}, {"name": "Hai-Feng Li"}], "featured_authors": [{"name": "Ming Zeng"}, {"name": "Muqing Su"}, {"name": "Liang Ming"}, {"name": "Wang Chen"}, {"name": "Lingwei Li"}, {"name": "Hai-Feng Li"}], "author_count": 7}, {"id": "2606.09106", "category": "cond-mat", "title": "Dynamic scaling and Family-Vicsek universality in the Hubbard model at infinite temperature", "abstract": "We study Family-Vicsek scaling of charge, spin, and energy fluctuations in the one-dimensional Hubbard model at infinite temperature. Using a quantum generating function approach, we compute time-dependent cumulants of transferred conserved quantities and analyze how the corresponding roughness depends on subsystem size and time. We start by focusing on a single interface at half the chain and determine the transport exponents. Then we turn to fluctuations of a small finite interval and study the Family-Vicsek universality of fluctuations over an extended timescale. We find that the long-time scaling behavior is controlled by integrability. In the free limit, charge, spin, and energy all display ballistic transport. In the interacting integrable Hubbard chain, charge and spin cross over to a KPZ scaling regime, while the energy sector remains ballistic. Once integrability is broken by a next-nearest-neighbor density interaction, the long-time dynamics becomes diffusive in all sectors. In every case we also observe a short-time microscopic regime with apparently universal ballistic growth before the hydrodynamic scaling window sets in. The Family-Vicsek setup allows us to determine the growth, the saturation as well as the dynamical exponents.", "url": "https://arxiv.org/abs/2606.09106", "type": "理论+数值", "summary": "我们研究无限温度下一维哈伯德模型中电荷、自旋和能量涨落的 Family-Vicsek 标度。使用量子生成函数方法，我们计算传递守恒量的时间相关累积量，并分析相应的粗糙度如何取决于子系统的大小和时间。我们首先关注链条一半的单个接口并确定传输指数。然后我们转向小有限区间的波动，并研究较长时间尺度上波动的 Family-Vicsek 普遍性。我们发现长时间的缩放行为是由可积性控制的。在自由极限下，电荷、自旋和能量都表现出弹道输运。在相互作用的可积哈伯德链中，电荷和自旋交叉到 KPZ 尺度范围，而能源部门仍然保持弹道状态。一旦可积性被次近邻密度相互作用破坏，长期动态就会在所有部门中扩散。在每种情况下，我们还观察到在流体动力学缩放窗口出现之前具有明显普遍弹道增长的短时微观状态。\n\nFamily-Vicsek 设置使我们能够确定增长、饱和度以及动态指数。", "authors": [{"name": "Cătălin Paşcu Moca"}, {"name": "Doru Sticlet"}, {"name": "Balázs Dóra"}], "featured_authors": [{"name": "Cătălin Paşcu Moca"}, {"name": "Doru Sticlet"}, {"name": "Balázs Dóra"}], "author_count": 3}, {"id": "2606.09194", "category": "cond-mat", "title": "Metal Halide Perovskite/Chalcohalide Heterojunctions for the Photoinduced Oxidative Coupling of p-substituted Thiophenols", "abstract": "The introduction of a semiconductor-semiconductor junction is an effective strategy to enhance the photocatalytic performance of perovskite nanocrystal-based systems. Herein, we optimized the synthesis of CsPbX3/Pb4S3X2 (X= Cl, Br, I) perovskites-chalcohalides heterostructures, whose band alignment can be tuned by halide composition. As a proof-of-concept, we evaluated the photooxidative coupling of p-substituted thiophenols at room temperature, under visible-light, air, and without sacrificial electron donor. Notably, CsPbBr3/Pb4S3Br2 achieved up to 94 % selectivity toward disulfide (p-OCH3 thiophenol with a turnover number of 14300) highlighting the crucial role of the type-II heterojunction to promote charge separation and efficient electron delocalization across the junction.", "url": "https://arxiv.org/abs/2606.09194", "type": "理论+数值", "summary": "引入半导体-半导体结是增强钙钛矿纳米晶体系统光催化性能的有效策略。在此，我们优化了 CsPbX3/Pb4S3X2 (X= Cl、Br、I) 钙钛矿-硫卤化物异质结构的合成，其能带排列可以通过卤化物成分进行调节。作为概念验证，我们评估了对位取代苯硫酚在室温、可见光、空气和无牺牲电子供体的情况下的光氧化偶联。值得注意的是，CsPbBr3/Pb4S3Br2 对二硫化物（周转数为 14300 的 p-OCH3 苯硫酚）实现了高达 94% 的选择性，凸显了 II 型异质结在促进电荷分离和跨结有效电子离域方面的关键作用。", "authors": [{"name": "Anna Cabona"}, {"name": "Stefano Toso"}, {"name": "Alejandro Cortés-Villena"}, {"name": "Ignacio Rosa-Pardo"}, {"name": "Mirko Prato"}, {"name": "Michele Ferri"}, {"name": "Julia Perez-Prieto"}, {"name": "Ilka Kriegel"}, {"name": "Liberato Manna"}, {"name": "Raquel E. Galian"}], "featured_authors": [{"name": "Anna Cabona"}, {"name": "Stefano Toso"}, {"name": "Alejandro Cortés-Villena"}, {"name": "Ilka Kriegel"}, {"name": "Liberato Manna"}, {"name": "Raquel E. Galian"}], "author_count": 10}, {"id": "2606.09201", "category": "cond-mat", "title": "Order parameters and ground-state phase diagram of the interacting topological Su-Schrieffer-Heeger model with extended-range hoppings", "abstract": "Topological insulators have attracted numerous attentions recent years, where the Su-Schrieffer-Heeger (SSH) model is one of the most studied models. While the interacting version of it has been explored recently, the interplay between interactions and long-range hoppings merit further investigations. In this work, we uncover a rich phase diagram of the interacting SSH model with extended-range hoppings, in which it consists of several topological phases, two novel superconducting-like (SC-like) phases and five distinct charge-density-wave (CDW) phases. We substantiate that the SC-like and two CDW phases are direct consequences of imbalanced interactions and extended-range hoppings. We derive the order parameters (OPs) for each of the phases and verify them in large-system simulations, finding consistency with the entanglement entropy and the fidelity in capturing the phase transitions. In contrast to the non-interacting case where the favored hoppings are unidirectional in the topological phases, the derived OPs suggest non-unidirectional hoppings are possible under the influence of interactions.", "url": "https://arxiv.org/abs/2606.09201", "type": "理论+数值", "summary": "近年来，拓扑绝缘体引起了广泛的关注，其中 Su-Schrieffer-Heeger (SSH) 模型是研究最多的模型之一。虽然最近已经探索了它的相互作用版本，但相互作用和远程跳跃之间的相互作用值得进一步研究。在这项工作中，我们揭示了具有扩展范围跳跃的相互作用 SSH 模型的丰富相图，其中它由几个拓扑相、两个新颖的类超导（类 SC）相和五个不同的电荷密度波（CDW）相组成。我们证实类 SC 相和两个 CDW 相是不平衡相互作用和大范围跳跃的直接结果。我们推导出每个相的序参数（OP），并在大型系统模拟中验证它们，找到与纠缠熵的一致性以及捕获相变的保真度。与在拓扑相中受青睐的跳跃是单向的非相互作用情况相反，导出的OP表明在相互作用的影响下非单向跳跃是可能的。", "authors": [{"name": "Tsz Hin Hui"}, {"name": "Pedro D. Sacramento"}, {"name": "Wing Chi Yu"}], "featured_authors": [{"name": "Tsz Hin Hui"}, {"name": "Pedro D. Sacramento"}, {"name": "Wing Chi Yu"}], "author_count": 3}, {"id": "2606.09297", "category": "cond-mat", "title": "Control transition in a temporally random classical spin chain", "abstract": "We theoretically explore a phase transition between controlled and chaotic dynamics in a classical spin chain model subject to chaotic Hamiltonian dynamics and a contractive \"control map\", which alternate in time. The control map drives the system toward a target configuration that is an unstable fixed point under the chaotic dynamics. When the control is strong enough, the target configuration is the globally attracting stable fixed point of the dynamics; for weaker control, the many-body dynamics remains chaotic for almost all initial states. The phase transition between controlled and chaotic phases has a mixed character: As the transition is approached from the chaotic phase, the fraction of the spins that are far from the target configuration goes continuously to zero, and there are diverging spatial and temporal correlation lengths; however, the leading Lyapunov exponent is discontinuous across the transition, jumping from a positive value in the chaotic phase to a negative value in the controlled phase. We present evidence that this transition is in the same universality class as directed percolation in the presence of temporal randomness, a universality class for which we obtain results that are consistent with the dynamical Harris criterion but do not saturate the bound.", "url": "https://arxiv.org/abs/2606.09297", "type": "理论", "summary": "我们从理论上探索了受混沌哈密顿动力学和收缩“控制图”影响的经典自旋链模型中受控动力学和混沌动力学之间的相变，它们随时间交替。控制图驱动系统朝向目标配置，该目标配置是混沌动力学下的不稳定固定点。当控制足够强时，目标构型就是动力学的全局吸引稳定不动点；对于较弱的控制，几乎所有初始状态的多体动力学仍然是混乱的。受控相和混沌相之间的相变具有混合特征：当从混沌相接近相变时，远离目标构型的自旋部分连续变为零，并且存在不同的空间和时间相关长度；然而，领先的李亚普诺夫指数在整个过渡过程中是不连续的，从混沌阶段的正值跳到受控阶段的负值。\n\n我们提供的证据表明，在存在时间随机性的情况下，这种转变与定向渗透属于同一普遍性类别，对于该普遍性类别，我们获得了与动态哈里斯标准一致但不饱和界限的结果。", "authors": [{"name": "Elisha Shmalo"}, {"name": "J. H. Pixley"}, {"name": "Manas Kulkarni"}, {"name": "Sarang Gopalakrishnan"}, {"name": "David A. Huse"}], "featured_authors": [{"name": "Elisha Shmalo"}, {"name": "J. H. Pixley"}, {"name": "Manas Kulkarni"}, {"name": "Sarang Gopalakrishnan"}, {"name": "David A. Huse"}], "author_count": 5}, {"id": "2606.09462", "category": "cond-mat", "title": "Free fermions in disguise without exponential degeneracies", "abstract": "Recently, a number of spin chain models have been discovered that are solvable via hidden free-fermionic structures, going beyond the Jordan-Wigner paradigm. However, all examples in the literature displayed degeneracies that grow exponentially with the volume and that are homogeneous in the spectrum (identical degeneracies for all energy levels). In this note we present a model that can be solved by ``free fermions in disguise'' (FFD), such that the spectrum is free from exponential degeneracies for generic coupling constants. The model can be seen as a particular perturbation of two Ising chains. Alternatively, it can be realized as an interpolation between a standard Jordan-Wigner solvable chain and the original FFD model of Fendley. We used ChatGPT Pro 5.4 and 5.5 as a research assistant; in the Supplemental Material we provide details about the collaboration between the AI and the human author.", "url": "https://arxiv.org/abs/2606.09462", "type": "理论+数值", "summary": "最近，人们发现许多自旋链模型可以通过隐藏的自由费米子结构来求解，超越了 Jordan-Wigner 范式。然而，文献中的所有例子都显示简并度随着体积呈指数增长，并且在光谱中是均匀的（所有能级的简并度相同）。在这篇文章中，我们提出了一个可以通过“伪装的自由费米子”（FFD）来解决的模型，这样频谱就不会出现通用耦合常数的指数简并。该模型可以看作是两个伊辛链的特定扰动。或者，它可以实现为标准 Jordan-Wigner 可解链和 Fendley 原始 FFD 模型之间的插值。我们使用ChatGPT Pro 5.4和5.5作为研究助手；在补充材料中，我们提供了有关人工智能和人类作者之间合作的详细信息。", "authors": [{"name": "Balázs Pozsgay"}], "featured_authors": [{"name": "Balázs Pozsgay"}], "author_count": 1}, {"id": "2606.09506", "category": "cond-mat", "title": "Planar Hall effect in single and bilayer Rashba systems", "abstract": "The planar Hall effect (PHE) is an anisotropic magnetotransport response generated by coplanar electric and magnetic fields. We investigate the PHE in single- and bilayer two-dimensional electron gases (2DEGs) with Rashba spin-orbit coupling and identify two distinct mechanisms: Zeeman coupling and a band geometric channel. In the Zeeman channel, an in-plane magnetic field distorts the Rashba spin-orbit-coupled band dispersion and generates anisotropic carrier velocities, producing a finite PHE. In an asymmetric Rashba bilayer, interlayer electronic delocalization generates finite planar Berry curvature and orbital magnetic moment components, giving rise to a band geometric PHE channel. Using semiclassical Boltzmann transport theory, we calculate the chemical potential and angular dependence of the planar Hall conductivity for both mechanisms. Symmetry analysis shows that the leading response is quadratic in the magnetic field and exhibits the characteristic $\\pi$-periodic angular dependence. For the parameter regime considered here, the Zeeman-induced contribution dominates, while the band geometric channel provides a distinct symmetry-allowed contribution unique to asymmetric Rashba bilayers. Our results reveal microscopic origins of anisotropic magnetotransport in spin-orbit-coupled two-dimensional materials.", "url": "https://arxiv.org/abs/2606.09506", "type": "理论", "summary": "平面霍尔效应 (PHE) 是由共面电场和磁场产生的各向异性磁输运响应。我们利用 Rashba 自旋轨道耦合研究了单层和双层二维电子气 (2DEG) 中的 PHE，并确定了两种不同的机制：塞曼耦合和能带几何通道。在塞曼通道中，面内磁场会扭曲 Rashba 自旋轨道耦合带色散并产生各向异性载流子速度，从而产生有限的 PHE。在不对称的 Rashba 双层中，层间电子离域产生有限的平面贝里曲率和轨道磁矩分量，从而产生带状几何 PHE 通道。使用半经典玻尔兹曼输运理论，我们计算了两种机制的化学势和平面霍尔电导率的角度依赖性。对称分析表明，主导响应在磁场中是二次的，并表现出特征$\\pi$-周期性角度依赖性。\n\n对于此处考虑的参数体系，塞曼引起的贡献占主导地位，而能带几何通道提供了非对称 Rashba 双层所独有的独特的对称性允许贡献。我们的结果揭示了自旋轨道耦合二维材料中各向异性磁输运的微观起源。", "authors": [{"name": "Rahul Biswas"}, {"name": "Sunit Das"}, {"name": "Amit Agarwal"}], "featured_authors": [{"name": "Rahul Biswas"}, {"name": "Sunit Das"}, {"name": "Amit Agarwal"}], "author_count": 3}, {"id": "2606.09552", "category": "cond-mat", "title": "Scaling Behaviors of Work Cumulants in Slow Isothermal Processes", "abstract": "We study the cumulants of work in a slow isothermal process for gapped systems. Using the Martin-Siggia-Rose-De Dominicis-Janssen (MSRDJ) formalism and the properties of connected correlation functions, we show that in this process, the $n$-th cumulant of work scales as $1/T^{n-1}$ , where $T$ is the time duration. This result holds generally for arbitrary smooth protocols. Furthermore, we derive the coefficients of the cumulants from equilibrium properties. These coefficients are found to be relevant to thermodynamic geometric tensors.", "url": "https://arxiv.org/abs/2606.09552", "type": "理论", "summary": "我们研究有间隙系统的缓慢等温过程中的功累积量。使用 Martin-Siggia-Rose-De Dominicis-Janssen (MSRDJ) 形式和连接相关函数的属性，我们表明在此过程中，工作的第 $n$ 个累积量为 $1/T^{n-1}$ ，其中 $T$ 是持续时间。该结果通常适用于任意平滑协议。此外，我们从平衡特性中推导出累积量的系数。发现这些系数与热力学几何张量相关。", "authors": [{"name": "Ruohan Xu"}, {"name": "Yanbo Qiao"}, {"name": "H. T. Quan"}], "featured_authors": [{"name": "Ruohan Xu"}, {"name": "Yanbo Qiao"}, {"name": "H. T. Quan"}], "author_count": 3}, {"id": "2606.09560", "category": "cond-mat", "title": "Predicting Physical and Physical-Chemical Properties of Molecular-Based Materials Using Computational Neural Networks", "abstract": "A computational scheme, which utilizes neural networks, was developed to predict properties of molecular-based materials from chemical structures. The method uses a set of simple algorithms to encode the structure and composition of organic molecules directly into numerical vectors, which is used as input for neural networks. Backpropagation type neural networks are then used to correlate these numeric inputs with a set of desired properties. Calculated results for a series of hydrocarbons, hydrofluorocarbons, and crown ethers demonstrate average accuracies of 0.2-8.1% with maximum deviations of 16-20% for a broad range of thermodynamic, physical, and physical-chemical characteristics (heat capacity, enthalpy, heat of evaporation, boiling point, density, refractive index, stability constants, etc.). In addition, a number of physical and mechanical properties were estimated for polymeric materials and compared with regression analysis. Based on the neural network capabilities of formulating accurate quantitative structure property relationships, a technique called computational synthesis is suggested for performing materials design.", "url": "https://arxiv.org/abs/2606.09560", "type": "数值", "summary": "开发了一种利用神经网络的计算方案来根据化学结构预测分子材料的特性。该方法使用一组简单的算法将有机分子的结构和组成直接编码为数值向量，用作神经网络的输入。然后使用反向传播型神经网络将这些数字输入与一组所需属性相关联。一系列碳氢化合物、氢氟碳化合物和冠醚的计算结果表明，对于广泛的热力学、物理和物理化学特性（热容、焓、蒸发热、沸点、密度、折射率、稳定常数等），平均精度为 0.2-8.1%，最大偏差为 16-20%。此外，还估计了聚合物材料的许多物理和机械性能，并与回归分析进行了比较。基于神经网络制定精确定量结构属性关系的能力，建议使用一种称为计算合成的技术来进行材料设计。", "authors": [{"name": "Andrei A. Gakh"}, {"name": "Bobby G. Sumpter"}, {"name": "Donald W. Noid"}], "featured_authors": [{"name": "Andrei A. Gakh"}, {"name": "Bobby G. Sumpter"}, {"name": "Donald W. Noid"}], "author_count": 3}, {"id": "2606.09575", "category": "cond-mat", "title": "k-Means Clustering in Fingerprint-Based Configuration Selection for Fitting Interatomic Potentials", "abstract": "In this study, we present a method for selecting an arbitrary number of distinct configurations from a larger data set by applying k-means clustering to atomistic configuration fingerprints based on the CrystalNN model and radial distribution function (RDF). This approach improves the accuracy of fitting classical molecular dynamics interatomic potentials to density functional theory (DFT) data for both energies and forces while requiring fewer configurations than random selection. We demonstrate this improvement by fitting an embedded-atom method (EAM) potential for titanium, using various configurational sizes from an initial set of 1800 configurations. The k-means clustering consistently achieves better precision and lower standard deviations for a smaller number of configurations than random selection. The results also suggest that only about 30 configurations are sufficient to obtain an EAM model that describes well the full set of 1800 configurations in terms of energies and forces. Additionally, t-distributed stochastic neighbor embedding (t-SNE) method was used to reduce the configuration fingerprints into 2D space, and it revealed an overlap between two configuration subsets with and without Ti vacancy, indicating similar atomic environments. This similarity is captured by k-means clustering but not by random selection. Furthermore, when the overlapping configurations with vacancies were excluded from the k-means algorithm and used only as a test set, their energy and force predictions showed similar precision to those when they were included. This indicates that the overlapping configurations in the 2D t-SNE space indeed imply potential information redundancy among the atomistic configurations.", "url": "https://arxiv.org/abs/2606.09575", "type": "理论+数值", "summary": "在本研究中，我们提出了一种方法，通过将 k 均值聚类应用于基于 CrystalNN 模型和径向分布函数 (RDF) 的原子构型指纹，从较大的数据集中选择任意数量的不同构型。这种方法提高了将经典分子动力学原子间势与能量和力的密度泛函理论 (DFT) 数据拟合的准确性，同时比随机选择所需的配置更少。我们通过使用初始 1800 种配置中的各种配置尺寸来拟合钛的嵌入原子方法 (EAM) 潜力来证明这一改进。与随机选择相比，k 均值聚类对于较少数量的配置始终能实现更好的精度和更低的标准偏差。结果还表明，只需大约 30 种配置就足以获得 EAM 模型，该模型可以很好地描述能量和力方面的全套 1800 种配置。\n\n此外，使用t分布随机邻域嵌入（t-SNE）方法将配置指纹减少到2D空间，它揭示了有和没有Ti空位的两个配置子集之间的重叠，表明相似的原子环境。这种相似性是通过 k 均值聚类捕获的，而不是通过随机选择捕获的。此外，当具有空位的重叠配置被排除在k均值算法之外并仅用作测试集时，它们的能量和力预测显示出与包含它们时相似的精度。这表明 2D t-SNE 空间中的重叠配置确实意味着原子配置之间存在潜在的信息冗余。", "authors": [{"name": "Miroslav Lebeda"}, {"name": "Jan Drahokoupil"}, {"name": "Ludvík Löbel"}, {"name": "Petr Vlčák"}], "featured_authors": [{"name": "Miroslav Lebeda"}, {"name": "Jan Drahokoupil"}, {"name": "Ludvík Löbel"}, {"name": "Petr Vlčák"}], "author_count": 4}, {"id": "2606.09647", "category": "cond-mat", "title": "Ab initio parametrization of distributed polarizable force fields", "abstract": "Polarizable force fields offer superior transferability and accuracy compared to classical force fields, enabling access to electronic response properties such as refractive index and electronic density of states. Here, we demonstrate two key improvements that significantly enhance their accuracy: (1) assigning atomic polarizability to individual atoms rather than atom types, and (2) employing atomic polarizability tensors instead of scalar values. These modifications extend the applicability of polarizable force fields to cations, anions, and excited states, while also providing more accurate descriptions of neutral molecules. We propose a first-principles-based parameterization procedure for atomic polarizability tensors and scalars, validated on a set of small organic molecules with conjugated building blocks. To overcome the computational cost of ab initio calculations, we train a message-passing graph neural network to predict polarizability parameters, enabling efficient and scalable parameterization. Crucially, this approach imposes no additional computational cost during simulations and provides a clear diagnostic criterion for identifying cases where polarizable force field models fail to accurately describe molecular polarizability.", "url": "https://arxiv.org/abs/2606.09647", "type": "理论+数值", "summary": "Polarizable force fields offer superior transferability and accuracy compared to classical force fields, enabling access to electronic response properties such as refractive index and electronic density of states.在这里，我们展示了两个显着提高其准确性的关键改进：（1）将原子极化率分配给单个原子而不是原子类型，以及（2）使用原子极化率张量而不是标量值。这些修改将极化力场的适用性扩展到阳离子、阴离子和激发态，同时还提供了对中性分子的更准确的描述。 We propose a first-principles-based parameterization procedure for atomic polarizability tensors and scalars, validated on a set of small organic molecules with conjugated building blocks.为了克服从头计算的计算成本，我们训练消息传递图神经网络来预测极化参数，从而实现高效且可扩展的参数化。\n\n至关重要的是，这种方法在模拟过程中不会产生额外的计算成本，并为识别可极化力场模型无法准确描述分子极化性的情况提供了明确的诊断标准。", "authors": [{"name": "Felix Post"}, {"name": "Jean-Philip Filling"}, {"name": "Toulik Maitra"}, {"name": "Falk May"}, {"name": "Michael Wand"}, {"name": "Denis Andrienko"}], "featured_authors": [{"name": "Felix Post"}, {"name": "Jean-Philip Filling"}, {"name": "Toulik Maitra"}, {"name": "Falk May"}, {"name": "Michael Wand"}, {"name": "Denis Andrienko"}], "author_count": 6}, {"id": "2606.09685", "category": "cond-mat", "title": "Crystallography of periodic nanotextures in a strained Mott insulator", "abstract": "Here we investigate stripes of alternating structural phases spontaneously forming in epitaxially strained $Ca_2RuO_4$ thin films below the metal-insulator transition. Using large-volume X-ray reciprocal-space mapping, we show that satellite-pattern intensities across 24 symmetry-inequivalent Bragg reflections collapse onto a single parameter-free curve. The collapse identifies a coherent martensitic laminate of few-nm-wide domains separated by ${012}$ interfaces, with displacements along $\\left\\langle01\\bar{2}\\right\\rangle$. Satellite-extinction analysis demonstrates that both coexisting phases retain the bulk orthorhombic space group despite the pseudocubic $LaAlO_3$ substrate, biaxial epitaxial strain, and intrinsic strain at the interfaces. Classical invariant-plane-strain crystallography thus governs the nanoscale domain geometry of a Mott insulator with intertwined magnetic, electronic, and lattice order.", "url": "https://arxiv.org/abs/2606.09685", "type": "理论", "summary": "在这里，我们研究了金属-绝缘体转变下方的外延应变 $Ca_2RuO_4$ 薄膜中自发形成的交替结构相条纹。使用大体积 X 射线倒易空间映射，我们表明 24 个对称不等价布拉格反射的卫星图案强度塌陷到一条无参数曲线上。塌陷识别出由${012}$界面分隔的几纳米宽域的相干马氏体层压板，位移沿$\\left\\langle01\\bar{2}\\right\\rangle$。卫星消光分析表明，尽管有赝立方 $LaAlO_3$ 基底、双轴外延应变和界面处的固有应变，但两个共存相都保留了块体正交空间群。因此，经典的不变平面应变晶体学控制着具有相互交织的磁序、电子序和晶格序的莫特绝缘体的纳米级域几何形状。", "authors": [{"name": "Benjamin Z. Gregory"}, {"name": "Yorick A. Birkhölzer"}, {"name": "Noah Schnitzer"}, {"name": "Ziming Shao"}, {"name": "Jeff Hodgson"}, {"name": "Suchismita Sarker"}, {"name": "Jacob P. Ruff"}, {"name": "Berit H. Goodge"}, {"name": "David A. Muller"}, {"name": "Kyle M. Shen"}, {"name": "Darrell G. Schlom"}, {"name": "Andrej Singer"}], "featured_authors": [{"name": "Benjamin Z. Gregory"}, {"name": "Yorick A. Birkhölzer"}, {"name": "Noah Schnitzer"}, {"name": "Kyle M. Shen"}, {"name": "Darrell G. Schlom"}, {"name": "Andrej Singer"}], "author_count": 12}, {"id": "2606.09703", "category": "cond-mat", "title": "Elastoinertial effects govern dynamic response of soft hair beds", "abstract": "Fluid-immersed hair beds are ubiquitous in biology-from the endothelial glycocalyx and primary cilia to intestinal microvilli-where they serve as mechanosensors that transduce dynamic flow signals into biochemical regulatory responses. Despite the inherently dynamic nature of physiological flows, the dynamic mechanical properties of fluid-immersed hair beds under time-varying conditions remain poorly characterized. Here we investigate the transient rheological response of elastic hair beds to large-amplitude oscillatory shear flows at low to intermediate Reynolds number. While the hairs and fluid themselves obey linear constitutive laws, their coupled interaction produces a dynamic nonlinear response that depends sensitively on driving frequency and amplitude. We identify a crossover from a stress-lagging regime to a stress-leading regime, which is governed by an interplay between fluid viscosity, fluid inertia, and hair elasticity. A simplified rigid-beam model qualitatively captures the crossover behavior. Characterizing the dynamic flow response of soft hair beds has direct biological implications, since the lag time sensitively determines the stability of mechanosensory signaling in the feedback loops underlying essential biological processes such as vasodilation, ciliary remodeling, and tubular reabsorption. Our results establish a framework for understanding how the physical properties of biological hair beds optimize dynamic information transmission during mechanotransduction.", "url": "https://arxiv.org/abs/2606.09703", "type": "理论+数值", "summary": "流体浸没的毛床在生物学中无处不在——从内皮糖萼和初级纤毛到肠道微绒毛——它们充当机械传感器，将动态流信号转换成生化调节反应。尽管生理流具有固有的动态性质，但时变条件下流体浸没的发床的动态机械特性仍然很少被表征。在这里，我们研究弹性毛床对低至中雷诺数的大幅振荡剪切流的瞬态流变响应。虽然毛发和流体本身遵循线性本构定律，但它们的耦合相互作用会产生动态非线性响应，该响应敏感地依赖于驱动频率和振幅。我们确定了从应力滞后状态到应力领先状态的交叉，这是由流体粘度、流体惯性和头发弹性之间的相互作用控制的。 A simplified rigid-beam model qualitatively captures the crossover behavior.\n\n表征软毛床的动态流动响应具有直接的生物学意义，因为滞后时间敏感地决定了基本生物过程（例如血管舒张、纤毛重塑和肾小管重吸收）反馈回路中机械感觉信号的稳定性。我们的结果建立了一个框架，用于理解生物毛床的物理特性如何优化力转导过程中的动态信息传输。", "authors": [{"name": "Jonas Smucker"}, {"name": "Naiesa Freeman"}, {"name": "Eric Caballero"}, {"name": "Philip J. Morrison"}, {"name": "José Alvarado"}], "featured_authors": [{"name": "Jonas Smucker"}, {"name": "Naiesa Freeman"}, {"name": "Eric Caballero"}, {"name": "Philip J. Morrison"}, {"name": "José Alvarado"}], "author_count": 5}, {"id": "2606.09797", "category": "cond-mat", "title": "Proximity-induced orbital antiferromagnetism in Ising superconductors", "abstract": "We predict a fundamentally new superconducting state in superconductor/antiferromagnet heterostructures with Ising spin--orbit coupling: proximity-induced orbital antiferromagnetism. In this state, the order parameter acquires a periodic phase modulation locked to the magnetic lattice, generating atomic-scale loop currents with opposite orbital moments on neighboring unit cells. Its emergence requires at least three nonequivalent magnetic sublattices per unit cell and finite spin--orbit coupling. Using NbSe$_2$/MnPS$_3$ as a concrete example, we combine first-principles and Bogoliubov--de Gennes calculations to demonstrate that the proximity-induced exchange field leads to robust phase modulation. Unlike FFLO and helical states, the phase gradient is atomic-scale, the state is current-carrying, and it remains uniquely stable over the full parameter range. The state manifests as characteristic finite-energy dips in the local density of states, accessible by STM.", "url": "https://arxiv.org/abs/2606.09797", "type": "理论+数值", "summary": "我们预测具有伊辛自旋轨道耦合的超导体/反铁磁体异质结构中存在一种全新的超导态：邻近引起的轨道反铁磁性。在这种状态下，有序参数获得锁定到磁晶格的周期性相位调制，在相邻晶胞上产生具有相反轨道矩的原子级环电流。它的出现需要每个晶胞至少有三个非等效磁性亚晶格和有限的自旋轨道耦合。以 NbSe$_2$/MnPS$_3$ 作为具体示例，我们结合第一性原理和 Bogoliubov-de Gennes 计算来证明邻近引起的交换场会导致鲁棒的相位调制。与 FFLO 和螺旋态不同，相位梯度是原子级的，状态是载流的，并且在整个参数范围内保持独特的稳定性。该状态表现为局部状态密度的特征性有限能量下降，可通过 STM 访问。", "authors": [{"name": "G. A. Bobkov"}, {"name": "V. A. Bobkov"}, {"name": "T. Karabassov"}, {"name": "I. V. Bobkova"}, {"name": "A. A. Golubov"}], "featured_authors": [{"name": "G. A. Bobkov"}, {"name": "V. A. Bobkov"}, {"name": "T. Karabassov"}, {"name": "I. V. Bobkova"}, {"name": "A. A. Golubov"}], "author_count": 5}, {"id": "2606.09812", "category": "cond-mat", "title": "Persistent currents, whirlpools, and local Chern markers in twisted TMD Chern insulators", "abstract": "Recent materials advances have made it possible to fabricate twisted transition metal dichalcogenide homobilayers. These systems have been shown to host integer and fractional Chern insulating states. Because of spontaneous time reversal symmetry breaking, their ground state harbors intriguing spin-polarized currents with whirlpools on the moiré length scale that can be measured by scanning probe methods. We first provide a quantitative analysis of these persistent currents and then show that the maximum of the amplitude of the current density in the bulk of the sample is an accurate tracker of topological order. We conclude by calculating how the quantization of the Hall conductance is affected by finite-size effects.", "url": "https://arxiv.org/abs/2606.09812", "type": "理论", "summary": "最近的材料进步使得制造扭曲的过渡金属二硫属化物同双层成为可能。这些系统已被证明具有整数和分数陈绝缘态。由于自发的时间反转对称性破缺，它们的基态蕴藏着有趣的自旋极化电流，并在莫尔长度尺度上带有漩涡，可以通过扫描探针方法进行测量。我们首先对这些持续电流进行定量分析，然后表明样品主体中电流密度的最大值是拓扑顺序的准确跟踪器。我们通过计算有限尺寸效应如何影响霍尔电导的量化来得出结论。", "authors": [{"name": "Francesco Cioni"}, {"name": "Lorenzo Cavicchi"}, {"name": "Nazzareno Africani"}, {"name": "Giacomo Mazza"}, {"name": "Fabio Taddei"}, {"name": "Amir Yacoby"}, {"name": "Marco Polini"}], "featured_authors": [{"name": "Francesco Cioni"}, {"name": "Lorenzo Cavicchi"}, {"name": "Nazzareno Africani"}, {"name": "Fabio Taddei"}, {"name": "Amir Yacoby"}, {"name": "Marco Polini"}], "author_count": 7}, {"id": "2606.07737", "category": "hep-th", "title": "Moduli spaces of type II twists", "abstract": "We provide a complete classification of twisting supercharges for type IIA supergravity in a flat background by determining the orbits of square-zero elements in the (1,1) super Poincaré algebra in ten dimensions under the action of the Spin group. Together with recent results for type IIB, this completes the description of the moduli space of twists for type II supergravities. Further, we discuss the origins of these twists as dimensional reductions from eleven dimensions. Using the pure spinor formulation of the superstring, we relate the target space classification to worldsheet twists and identify supergravity counterparts of mixed A/B models. Finally, we work out the action of T-duality that relates twists of type IIA with those of type IIB.", "url": "https://arxiv.org/abs/2606.07737", "type": "理论", "summary": "通过在自旋群的作用下确定十维 (1,1) 超庞加莱代数中的平方零元素的轨道，我们提供了平坦背景下 IIA 型超重力的扭曲增压的完整分类。与 IIB 型的最新结果一起，完成了对 II 型超重力扭曲模空间的描述。此外，我们还讨论了这些扭曲的起源，即十一维维度的降维。使用超弦的纯旋量公式，我们将目标空间分类与世界表扭曲联系起来，并识别混合 A/B 模型的超重力对应物。最后，我们计算出将 IIA 型扭曲与 IIB 型扭曲联系起来的 T 对偶性作用。", "authors": [{"name": "Fabian Hahner"}], "featured_authors": [{"name": "Fabian Hahner"}], "author_count": 1}, {"id": "2606.07738", "category": "hep-th", "title": "New Exotic Operators in the Spectrum of Wilson Lines in General Representations", "abstract": "Wilson lines are fundamental probes of gauge theories. We show that, in sufficiently rich representations, they support a large new class of operator insertions. For half-BPS lines in $\\mathcal{N}=4$ SYM many of these operators have the quantum numbers of the displacement supermultiplet. Their dimension-one superprimaries define natural deformations of the defect theory. By analyzing the associated beta functions, and relating them to specific OPE coefficients, we show that the deformations are marginally relevant. We support our finding with a weak-coupling computation of the four-point function of these operators for any gauge group and representation.", "url": "https://arxiv.org/abs/2606.07738", "type": "理论", "summary": "威尔逊线是规范场理论的基本探索。我们表明，在足够丰富的表示中，它们支持一大批新的运算符插入。对于 $\\mathcal{N}=4$ SYM 中的半 BPS 线，许多算子都具有位移超多重态的量子数。他们的一维超原色定义了缺陷理论的自然变形。通过分析相关的 beta 函数，并将它们与特定的 OPE 系数联系起来，我们表明变形是边际相关的。我们通过对任何规范组和表示的这些运算符的四点函数的弱耦合计算来支持我们的发现。", "authors": [{"name": "Daniele Artico"}, {"name": "Carlo Meneghelli"}, {"name": "Michele Savi"}, {"name": "Rudolfs Treilis"}], "featured_authors": [{"name": "Daniele Artico"}, {"name": "Carlo Meneghelli"}, {"name": "Michele Savi"}, {"name": "Rudolfs Treilis"}], "author_count": 4}, {"id": "2606.07868", "category": "hep-th", "title": "Non-uniqueness of boundary-value problems in Renormalization Group flows", "abstract": "The Renormalization Group flow connects microscopic to macroscopic descriptions of a system and is therefore typically considered as an initial-value problem. Motivated by situations in which different couplings within a system of Renormalization Group equations are constrained at different scales, we instead consider boundary-value problems in Renormalization Group flows. We find that, unlike initial-value problems which provide $n$ conditions for $n$ couplings, boundary-value problems which provide $n$ conditions for $n$ couplings do not always have a unique solution. When the Jacobian matrix, i.e., the matrix of first derivatives of beta functions, has complex eigenvalues, boundary-value problems may be non-unique. We provide a diagnostic tool for non-uniqueness in systems with many couplings. We also provide two examples with potential relevance for physics, namely within the Standard Model as well as within the Einstein-Hilbert truncation of asymptotically safe quantum gravity.", "url": "https://arxiv.org/abs/2606.07868", "type": "理论", "summary": "重整化群流将系统的微观描述与宏观描述联系起来，因此通常被视为初始值问题。受重正化群方程系统内的不同耦合在不同尺度上受到约束的情况的启发，我们转而考虑重正化群流中的边值问题。我们发现，与为$n$耦合提供$n$条件的初值问题不同，为$n$耦合提供$n$条件的边值问题并不总是有唯一的解决方案。当雅可比矩阵（即 beta 函数的一阶导数矩阵）具有复特征值时，边值问题可能不唯一。我们为具有许多耦合的系统的非唯一性提供了诊断工具。我们还提供了两个与物理学潜在相关的例子，即标准模型内以及渐近安全量子引力的爱因斯坦-希尔伯特截断内。", "authors": [{"name": "Astrid Eichhorn"}, {"name": "Zois Gyftopoulos"}, {"name": "Aaron Held"}], "featured_authors": [{"name": "Astrid Eichhorn"}, {"name": "Zois Gyftopoulos"}, {"name": "Aaron Held"}], "author_count": 3}, {"id": "2606.07955", "category": "hep-th", "title": "Spin-charge deconfinement and emergent $\\mathrm{AdS}_3$ structure from a self-consistent dressing of Fierz-complete $(1+1)$d Dirac fermions", "abstract": "Building on a recent derivation of spin-charge separation in $(1+1)$d paired Dirac fermions~\\cite{Haddad2024}, we develop a self-consistent dressing $\\psi(x) = U(x)\\chi(x)$ for the full Fierz-complete four-fermion model, extending that result and providing a more detailed resolution of the chiral-difermion phase structure. A key feature of this approach is that the composite connection $A_\\mu^{\\rm dress} = i(\\partial_\\mu U)U^{-1}$ encodes obstructions to local trivialization of the Dirac operator, i.e., the degree to which the background can be absorbed into the dressing. Using this fact, we prove a trivialization theorem under which three nonperturbative constructions are unified: spin-charge separation in correlated fermion systems, half-infinite Wilson-line dressing in gauge theory, and the holonomy of flat connections. Our approach shows that the three regimes of our model (chiral, difermion, intermediate), are then tied together by an emergent $\\mathfrak{sl}(2,\\mathbb{R})$ gauge field that binds the spin and charge degrees of freedom. In particular, the chiral-difermion transition is a deconfinement transition for these degrees of freedom, diagnosed by closed boost-sector Wilson loops that develop an area law in the chiral phase for which we compute the associated string tension. This provides a concrete realization of the conjectured Faddeev--Niemi link between spin-charge separation and confinement. We close with a unifying geometric picture in which the order-parameter manifold takes hyperbolic form $\\rho^2 - |\\Delta|^2 = \\sigma^2$, promoted to $\\mathrm{AdS}_3 \\cong \\mathrm{SL}(2,\\mathbb{R})$ on inclusion of the charge and difermion phases. The structural matching to the kinematic stage of $\\mathrm{AdS}_3/\\mathrm{CFT}_2$ is identified explicitly, with the conjecture that the dressed model realizes the inverse Pohlmeyer reduction of the $\\mathrm{AdS}_3$ sigma model.", "url": "https://arxiv.org/abs/2606.07955", "type": "理论", "summary": "基于最近对 $(1+1)$d 配对狄拉克费米子中自旋电荷分离的推导~\\cite{Haddad2024}，我们为完整的 Fierz 完全四费米子模型开发了一种自洽的修饰 $\\psi(x) = U(x)\\chi(x)$，扩展了该结果并提供了手性微分子相结构的更详细的分辨率。这种方法的一个关键特征是复合连接 $A_\\mu^{\\rm dress} = i(\\partial_\\mu U)U^{-1}$ 对狄拉克算子局部平凡化的障碍进行编码，即背景可以被吸收到服装中的程度。利用这一事实，我们证明了一个平凡化定理，在该定理下，三种非微扰结构被统一：相关费米子系统中的自旋电荷分离、规范理论中的半无限威尔逊线修整以及平坦连接的完整性。我们的方法表明，我们模型的三个状态（手性、微分子、中间），然后通过一个新兴的 $\\mathfrak{sl}(2,\\mathbb{R})$ 规范场联系在一起，该规范场绑定了自旋和电荷自由度。\n\n特别是，手性微分跃迁是这些自由度的去限制跃迁，由闭合升压扇区威尔逊环诊断，该环在手性相中制定了面积定律，我们可以计算相关的弦张力。这为自旋电荷分离和限制之间的法捷耶夫-尼米猜想联系提供了具体实现。我们以统一的几何图结束，其中序参流形采用双曲形式 $\\rho^2 - |\\Delta|^2 = \\sigma^2$，在包含电荷和微分子相位时提升为 $\\mathrm{AdS}_3 \\cong \\mathrm{SL}(2,\\mathbb{R})$。明确识别了 $\\mathrm{AdS}_3/\\mathrm{CFT}_2$ 运动学阶段的结构匹配，并推测装饰模型实现了 $\\mathrm{AdS}_3$ sigma 模型的逆 Pohlmeyer 约简。", "authors": [{"name": "L. Haddad"}, {"name": "K. Gonzales"}, {"name": "J. Kahanek"}, {"name": "M. Kolding"}, {"name": "J. Maguire"}, {"name": "V. Palombi"}, {"name": "H. Truelson"}], "featured_authors": [{"name": "L. Haddad"}, {"name": "K. Gonzales"}, {"name": "J. Kahanek"}, {"name": "J. Maguire"}, {"name": "V. Palombi"}, {"name": "H. Truelson"}], "author_count": 7}, {"id": "2606.08080", "category": "hep-th", "title": "Weyl conformal geometry vs Riemannian geometry of Weyl invariant dressed metric", "abstract": "Weyl conformal geometry is the natural underlying geometry of gauge theories of the Weyl group (of dilatations and Poincaré symmetry), such as Weyl quadratic gravity and its generalisation, Weyl-Dirac-Born-Infeld action (WDBI). These gauge theories are Weyl-anomaly-free candidates for quantum gravity. We describe Weyl gauge symmetry from a more familiar Riemannian view of Weyl gauge invariant dressed fields by the Wilson line of dilatations. Weyl geometry can then be seen as Riemannian geometry of non-local dressed metric ($g_{\\mu\\nu}^*$), at the cost of non-commutativity in the UV, also induced by the Wilson line. Then Weyl quadratic gravity and WDBI actions of Weyl geometry, which are Weyl gauge invariant in $d$ dimensions, have the same expression in Riemannian geometry defined by $g^*_{\\mu\\nu}$. This is a non-local map between the two geometries and actions in the symmetric phase. Unlike for the metric, the equation of motion of the Weyl gauge field ($\\omega_\\mu$) does not commute with the dressing of the metric. When $\\omega_\\mu$ becomes massive and decouples (broken phase), commutativity and Einstein-Hilbert action are recovered.", "url": "https://arxiv.org/abs/2606.08080", "type": "理论", "summary": "外尔共形几何是外尔群规范理论（膨胀和庞加莱对称性）的自然基础几何，例如外尔二次引力及其推广、外尔-狄拉克-玻恩-因费尔德作用 (WDBI)。这些规范理论是量子引力的无外尔异常的候选理论。我们从更熟悉的黎曼观点通过威尔逊膨胀线描述了外尔规范对称性，即外尔规范不变修饰场。 Weyl 几何可以被视为非局部修饰度量 ($g_{\\mu\\nu}^*$) 的黎曼几何，其代价是 UV 中的非交换性，也是由威尔逊线引起的。那么Weyl 几何的Weyl 二次引力和WDBI 作用（在$d$ 维度上是Weyl 规范不变量）在由$g^*_{\\mu\\nu}$ 定义的黎曼几何中具有相同的表达式。这是对称相中两个几何和动作之间的非局部映射。与度量不同，Weyl 规范场的运动方程 ($\\omega_\\mu$) 不与度量的修整交换。当 $\\omega_\\mu$ 变得巨大并解耦（断相）时，交换性和爱因斯坦-希尔伯特作用就会恢复。", "authors": [{"name": "D. M. Ghilencea"}, {"name": "V.-M. Mandric"}], "featured_authors": [{"name": "D. M. Ghilencea"}, {"name": "V.-M. Mandric"}], "author_count": 2}, {"id": "2606.08143", "category": "hep-th", "title": "Pathways to Real Composite Operators from Non-Hermitian Fermions", "abstract": "A field theory in $3+1$ dimensions contains two fermions, two Abelian gauge fields, and one complex scalar, with dynamics fixed by a BRST symmetry. For a specific parameter configuration, the fermion mass matrix becomes non-Hermitian, and the propagators exhibit complex conjugate poles. We evaluate the one-loop fermion contribution to the two-point function of the composite operator $\\phi^{\\dagger}\\phi$. Once the factor $i$ of the $e^{iS}$ normalization is removed, the contribution is real for real external momentum, which follows from the pairing of complex conjugate terms in the loop integral. The BRST construction of the action sets up a proof of renormalizability.", "url": "https://arxiv.org/abs/2606.08143", "type": "理论", "summary": "$3+1$ 维度的场论包含两个费米子、两个阿贝尔规范场和一个复标量，其动力学由 BRST 对称性固定。对于特定的参数配置，费米子质量矩阵变为非厄米矩阵，并且传播器表现出复共轭极点。我们评估单环费米子对复合算子 $\\phi^{\\dagger}\\phi$ 的两点函数的贡献。一旦 $e^{iS}$ 归一化的因子 $i$ 被移除，对于实际外部动量的贡献就是真实的，这是由循环积分中复共轭项的配对得出的。动作的 BRST 构造建立了可重整性的证明。", "authors": [{"name": "V.E.R. Lemes"}, {"name": "D.G. Tedesco"}], "featured_authors": [{"name": "V.E.R. Lemes"}, {"name": "D.G. Tedesco"}], "author_count": 2}, {"id": "2606.08190", "category": "hep-th", "title": "A note on conserved worldsheet supercharges in heterotic pure spinor superstring", "abstract": "We study conserved worldsheet charges associated with spacetime supersymmetry in heterotic pure-spinor superstrings on curved ten-dimensional superspace backgrounds. Requiring BRST invariance and worldsheet conservation gives a covariant set of superspace constraints. In flat superspace these conditions reproduce the standard ten-dimensional supersymmetry generator. In curved superspace, they organize the requirements for global supersymmetry in terms of a normalizable spinor superfield.", "url": "https://arxiv.org/abs/2606.08190", "type": "理论", "summary": "我们研究了弯曲的十维超空间背景上的异质纯旋量超弦中与时空超对称性相关的守恒世界表电荷。要求 BRST 不变性和世界表守恒给出了超空间约束的协变集。在平坦的超空间中，这些条件再现了标准的十维超对称发生器。在弯曲的超空间中，他们根据可归一化的自旋超场组织了全局超对称性的要求。", "authors": [{"name": "Osvaldo Chandia"}, {"name": "Brenno Carlini Vallilo"}], "featured_authors": [{"name": "Osvaldo Chandia"}, {"name": "Brenno Carlini Vallilo"}], "author_count": 2}, {"id": "2606.08223", "category": "hep-th", "title": "A Numerical Study of Phase-Dependent Kink-Kink Collisions in the Complex Sine-Gordon Model", "abstract": "We investigate the collision dynamics of complex kink solutions in the complex sine-Gordon (CSG) model, focusing on the influence of the relative phase and initial velocity. The model's internal \\( U(1) \\) symmetry gives rise to a variety of solitary wave solutions, including complex kinks, radiative profiles, and Q-ball configurations. Through numerical simulations, we reveal rich and nontrivial phase-dependent behaviors such as the emergence of red and blue critical speeds, radiative emissions, bion and breather formations, and phase-sensitive oscillation modes. Moreover, we identify extreme values in energy and field quantities at the collision point, uncovering discontinuities that signify transition thresholds in the dynamical system. These findings underscore the complex interplay between internal degrees of freedom and dynamical variables in non-integrable soliton systems, offering new insights into field theories with internal symmetries.", "url": "https://arxiv.org/abs/2606.08223", "type": "理论", "summary": "我们研究了复杂正弦戈登 (CSG) 模型中复杂扭结解的碰撞动力学，重点关注相对相位和初始速度的影响。该模型的内部 \\( U(1) \\) 对称性产生了各种孤立波解，包括复杂的扭结、辐射剖面和 Q 球配置。通过数值模拟，我们揭示了丰富且重要的相位相关行为，例如红色和蓝色临界速度的出现、辐射发射、生物体和呼吸器的形成以及相敏振荡模式。此外，我们还确定了碰撞点处能量和场量的极值，揭示了表示动力系统中过渡阈值的不连续性。这些发现强调了不可积孤子系统中内部自由度和动力学变量之间复杂的相互作用，为具有内部对称性的场论提供了新的见解。", "authors": [{"name": "Mohammad Mohammadi"}, {"name": "Farnaz Eizadbaksh"}, {"name": "Vahideh Bagheri"}], "featured_authors": [{"name": "Mohammad Mohammadi"}, {"name": "Farnaz Eizadbaksh"}, {"name": "Vahideh Bagheri"}], "author_count": 3}, {"id": "2606.08244", "category": "hep-th", "title": "Stochastic Survival near Swampland Boundaries", "abstract": "Swampland and compactification data tell us where EFT control can fail; stochastic cosmology asks which histories survive near that edge. We turn this question into a survival problem for fluctuating moduli over cosmological time scales. Hard loss surfaces, soft degradation profiles, finite horizons, and a stochastic generator define a survival probability, whose logarithm is the survival action. The Doob transform then converts this logarithmic survival cost into the drift of the ensemble conditioned to remain on the controlled side. Near a regular hard boundary with nonzero normal diffusion, the answer is universal: surviving histories develop an inward wall response fixed only by proper distance and normal diffusion. In this way, tower/species cutoffs, weak-coupling limits, string and Kaluza-Klein thresholds, and potential-based diagnostics acquire stochastic boundary layers without becoming microscopic forces. The inverse map tests when a conditioned drift is compatible with a scalar operational loss surface and reconstructs its boundary-normal Doob class. The construction therefore gives a stochastic survival interface between quantum-gravity control data and the histories that remain on the landscape side of control.", "url": "https://arxiv.org/abs/2606.08244", "type": "理论", "summary": "沼泽和压实数据告诉我们 EFT 控制在哪里可能失败；随机宇宙学询问哪些历史在该边缘附近幸存下来。我们将这个问题转化为宇宙时间尺度上涨落模的生存问题。硬损失表面、软退化曲线、有限视野和随机生成器定义了生存概率，其对数是生存动作。然后，Doob 变换将此对数生存成本转换为保持在受控侧的系综的漂移。在具有非零法向扩散的规则硬边界附近，答案是普遍的：幸存的历史发展出仅由适当距离和法向扩散固定的内壁响应。通过这种方式，塔/物种截止、弱耦合限制、弦和卡鲁扎-克莱因阈值以及基于势的诊断获得随机边界层，而不会变成微观力。逆映射测试条件漂移何时与标量操作损失表面兼容并重建其边界法线 Doob 类。\n\n因此，该结构在量子重力控制数据和控制景观侧的历史之间提供了一个随机生存界面。", "authors": [{"name": "Omer Guleryuz"}], "featured_authors": [{"name": "Omer Guleryuz"}], "author_count": 1}, {"id": "2606.08387", "category": "hep-th", "title": "Notes on noninvertible quantum symmetries in two dimensions", "abstract": "In this note we describe a systematic procedure for computing partition functions of noninvertible Rep ($G$) quantum symmetry actions on two-dimensional nonabelian $G$ orbifolds. We apply this procedure to multiplicity-free examples for several nonabelian groups, and check explicitly in those examples that the partition function of a two-dimensional Rep ($G$)-gauged $G$ orbifold, for nonabelian $G$, matches that of the original theory, as expected on general principles. This fills a minor gap in the literature, making quantum symmetries in two-dimensional nonabelian orbifolds more concrete.", "url": "https://arxiv.org/abs/2606.08387", "type": "理论", "summary": "在本文中，我们描述了计算二维非交换 $G$ 轨道上不可逆 Rep ($G$) 量子对称作用的配分函数的系统过程。我们将此过程应用于几个非阿贝尔群的无重数示例，并在这些示例中明确检查非阿贝尔 $G$ 的二维 Rep ($G$) 计量 $G$ 轨道的配分函数与原始理论的配分函数是否匹配，正如一般原理所预期的那样。这填补了文献中的一个小空白，使二维非阿贝尔轨道折叠中的量子对称性更加具体。", "authors": [{"name": "P. Banerjee"}, {"name": "E. Sharpe"}], "featured_authors": [{"name": "P. Banerjee"}, {"name": "E. Sharpe"}], "author_count": 2}, {"id": "2606.08427", "category": "hep-th", "title": "An elliptic approach to Reid's fantasy", "abstract": "It is a long-standing problem to prove that the number of distinct topological types of Calabi-Yau threefolds is finite. A related proposition, Reid's fantasy, conjectures that all Calabi-Yau threefolds are connected in a single moduli space through extremal transitions. Finiteness of topological types has been proven for the class of elliptic and genus one fibered Calabi-Yau threefolds, which recently have been shown to constitute the vast majority of known Calabi-Yau threefolds; the moduli space of elliptic CY3's is connected. In this letter, we demonstrate that all non-fibered Calabi-Yau threefolds in two of the largest known classes (toric hypersurfaces and complete intersections in products of projective spaces) are connected to fibered Calabi-Yau threefolds through a simple class of geometric transitions involving the shrinking of a single divisor from a fibered geometry. This suggests that non-fibered Calabi-Yau threefolds are rare special cases that are reached by simplifying fibered Calabi-Yau threefolds, and points to a natural path towards proving finiteness and Reid's fantasy for Calabi-Yau threefolds.", "url": "https://arxiv.org/abs/2606.08427", "type": "理论", "summary": "证明卡拉比-丘三重的不同拓扑类型的数量是有限的是一个长期存在的问题。一个相关的命题，即里德的幻想，推测所有卡拉比-丘三元都通过极值跃迁连接在单个模空间中。椭圆形类和单纤维卡拉比-丘三重体的拓扑类型的有限性已被证明，最近已被证明构成了已知的卡拉比-丘三重体的绝大多数；椭圆 CY3 的模空间是连通的。在这封信中，我们证明了两个最大的已知类别（复曲面超曲面和射影空间乘积中的完全交集）中的所有非纤维 Calabi-Yau 三重体通过一类简单的几何过渡（涉及纤维几何中单个除数的收缩）与纤维 Calabi-Yau 三重体连接。这表明非纤维卡拉比-丘三重是通过简化纤维卡拉比-丘三重而达到的罕见特殊情况，并指出了证明有限性和里德对卡拉比-丘三重的幻想的自然路径。", "authors": [{"name": "Lara Anderson"}, {"name": "James Gray"}, {"name": "Richard Nally"}, {"name": "Washington Taylor"}], "featured_authors": [{"name": "Lara Anderson"}, {"name": "James Gray"}, {"name": "Richard Nally"}, {"name": "Washington Taylor"}], "author_count": 4}, {"id": "2606.08461", "category": "hep-th", "title": "Semi-universality of conformal higher-derivative and conformal higher-spin fields", "abstract": "In this paper, we study thermal partition functions of free exotic conformal field theories, focusing on conformal higher-derivative and conformal higher-spin fields, in the semi-universal limit $|\\omega_i|\\rightarrow 1$. It was recently conjectured in \\cite{Anand:2025mfh} that, in this limit, the thermal partition function develops universal poles in $(1-|\\omega_i|)$, while the corresponding residue functions are theory-dependent. We analyze conformal higher-derivative scalar, fermionic, and vector fields in the semi-universal limit. We then extend the study to the Weyl graviton, the Weyl gravitino, and conformal higher-spin fields (CHS) on $S^1_\\beta\\times S^3$, using both spectral mode-sum and operator-counting methods. In all cases, we find the expected pole structure, with residue functions whose behavior depends on the presence or absence of negative-twist states. For four-dimensional conformal higher-spin fields, we further reproduce the same residue-pole structure from the one-loop partition function of massless higher-spin fields in thermal AdS$_5$. Finally, we show that the semi-universal limit provides a useful diagnostic of negative-twist states, which indicate violations of ANEC-type bounds in these theories, whereas the traditional high-temperature expansion is insensitive to them.", "url": "https://arxiv.org/abs/2606.08461", "type": "理论", "summary": "在本文中，我们研究了自由奇异共形场论的热分配函数，重点关注半通用极限 $|\\omega_i|\\rightarrow 1$ 下的共形高导数和共形高自旋场。最近在 \\cite{Anand:2025mfh} 中推测，在这个极限下，热配分函数在 $(1-|\\omega_i|)$ 中形成通用极点，而相应的留数函数则取决于理论。我们分析了半通用极限下的共形高导数标量场、费米子场和矢量场。然后，我们使用谱模和和算子计数方法将研究扩展到 $S^1_\\beta\\times S^3$ 上的外尔引力子、外尔引力子和共形高自旋场 (CHS)。在所有情况下，我们都找到了预期的极结构，其行为取决于负扭曲态是否存在的残差函数。对于四维共形高自旋场，我们进一步从热 AdS$_5$ 中无质量高自旋场的单环配分函数再现相同的残差极结构。\n\n最后，我们证明半通用极限提供了对负扭曲态的有用诊断，这表明违反了这些理论中的 ANEC 型边界，而传统的高温膨胀对此不敏感。", "authors": [{"name": "Jyotirmoy Mukherjee"}, {"name": "Pabitra Ray"}], "featured_authors": [{"name": "Jyotirmoy Mukherjee"}, {"name": "Pabitra Ray"}], "author_count": 2}, {"id": "2606.08582", "category": "hep-th", "title": "Soft Algebra for ${\\cal N}=4$ SYM", "abstract": "Scattering amplitudes of $n$ particles in nonabelian gauge theories admit factorizations of the general form $\\mathcal{A}_n \\;=\\; \\mathcal{A}^{\\rm soft}_n \\times \\mathcal{A}^{\\rm hard}_n$, where $\\mathcal{A}^{\\rm soft}_n$ is IR divergent, while $\\mathcal{A}^{\\rm hard}_n$ is IR finite and encodes the higher loop corrections to scattering. We specify a particular all-orders definition of this factorization for planar ${\\cal N}=4$ super Yang-Mills (SYM) and argue that the resulting $\\mathcal{A}_n^{\\rm hard}$ obeys an uncorrected tree-level soft theorem. Moreover it furnishes a representation of the undeformed tree-level $\\cal S$-algebra generated by a tower of soft gluons. The results follow from several commonly invoked assumptions for ${\\cal N}=4$ SYM, including BDS one-loop exponentiation of the splitting function and amplitude/Wilson-loop duality.", "url": "https://arxiv.org/abs/2606.08582", "type": "理论", "summary": "非阿贝尔规范理论中 $n$ 个粒子的散射振幅允许一般形式 $\\mathcal{A}_n \\;=\\; 的因式分解\\mathcal{A}^{\\rmsoft}_n \\times \\mathcal{A}^{\\rmhard}_n$，其中 $\\mathcal{A}^{\\rmsoft}_n$ 是 IR 发散的，而 $\\mathcal{A}^{\\rmhard}_n$ 是 IR 有限的，并编码对散射的更高循环校正。我们为平面 ${\\cal N}=4$ super Yang-Mills (SYM) 指定了此因式分解的特定全阶定义，并认为所得的 $\\mathcal{A}_n^{\\rm hard}$ 服从未修正的树级软定理。此外，它还提供了由软胶子塔生成的未变形树级 $\\cal S$ 代数的表示。结果源自 ${\\cal N}=4$ SYM 的几个常用假设，包括分裂函数的 BDS 单环求幂和幅度/威尔逊环对偶性。", "authors": [{"name": "Luis F. Alday"}, {"name": "Andrew Strominger"}], "featured_authors": [{"name": "Luis F. Alday"}, {"name": "Andrew Strominger"}], "author_count": 2}, {"id": "2606.08603", "category": "hep-th", "title": "Self-Gravitating Magnetic Monopoles and Dyons in String-Inspired Models: Structure and Stability", "abstract": "We present classical solutions for magnetic monopoles and dyons induced by global monopoles for string-inspired models, in the presence of gravity. Two distinct scenarios are analyzed. In the first, magnetic monopoles arise from the coupling of a non-trivial massless dilaton field to the electromagnetic (EM) sector. In the second, dyonic solutions emerge in the presence of a non-trivial Kalb-Ramond (KR) axion field and a massless dilaton field, which couples the KR and EM sectors. In both models, the monopole and dyon configurations originate from a global monopole associated with the spontaneous breaking of a global O(3) symmetry. The EM sector is described by Born-Infeld electrodynamics, ensuring regularity of the fields at the core of the monopole and a finite self-energy. The resulting solutions represent particle-like configurations with a well-defined core and positive ADM (Arnowitt-Deser-Misner) mass, and are shown to satisfy all standard energy conditions. We also demonstrate the existence of a minimum nonzero magnetic charge in the limiting case of a magnetic monopole with vanishing mass. We also discuss stability criteria for our magnetic-monopole and dyon solutions. We first demonstrate that the mechanical-stability criteria for these solutions are satisified. These require the finiteness of the total force components and also the outward-pointing nature of the radial component, which indicates the avoidance of collapse. Next we analyse the dynamical (linear perturbative) stability of the self-gravitating Born-Infeld monopole and dyon solutions within Einstein-Born--Infeld-dilaton-axion theory in the Gervalle-Volkov framework, and demonstrate that both monopole and dyonic configurations are linearly stable against electromagnetic perturbations in the exterior region, with dyons exhibiting a birefringent helicity structure due to axion-induced mixing.", "url": "https://arxiv.org/abs/2606.08603", "type": "理论", "summary": "我们提出了在重力存在的情况下，由弦启发模型的全局单极子引起的磁单极子和动力子的经典解决方案。分析了两种不同的场景。首先，磁单极子是由非平凡的无质量膨胀场与电磁（EM）扇区的耦合产生的。在第二个例子中，在存在重要的卡尔布-拉蒙德 (KR) 轴子场和耦合 KR 和 EM 扇区的无质量膨胀场的情况下出现了动力解决方案。在这两个模型中，单极子和动力子构型均源自与全局 O(3) 对称性自发破缺相关的全局单极子。 EM 扇区由 Born-Infeld 电动力学描述，确保单极子核心场的规律性和有限的自能。所得解决方案代表具有明确核心和正 ADM (Arnowitt-Deser-Misner) 质量的粒子状结构，并且显示满足所有标准能量条件。我们还证明了在质量消失的磁单极子的极限情况下存在最小非零磁荷。我们还讨论了磁单极子和动力子解决方案的稳定性标准。\n\n我们首先证明这些解决方案满足机械稳定性标准。这些要求总力分量的有限性以及径向分量的向外指向的性质，这表明避免坍塌。接下来，我们分析了 Gervalle-Volkov 框架中爱因斯坦-玻恩-因菲尔德膨胀轴子理论中自引力玻恩-因费尔德单极子和动力子解的动力学（线性微扰）稳定性，并证明单极子和动力子构型对于外部区域的电磁扰动都是线性稳定的，动力子由于轴子引起的混合而表现出双折射螺旋结构。", "authors": [{"name": "Nick E. Mavromatos"}, {"name": "Sarben Sarkar"}, {"name": "Dionysios P. Theodosopoulos"}], "featured_authors": [{"name": "Nick E. Mavromatos"}, {"name": "Sarben Sarkar"}, {"name": "Dionysios P. Theodosopoulos"}], "author_count": 3}, {"id": "2606.08697", "category": "hep-th", "title": "A Lorentzian Gribov no-pole condition for Yang-Mills theory", "abstract": "For over four decades, Gribov's no-pole condition has been almost exclusively explored in Euclidean space, where the elliptic nature of the Faddeev-Popov operator provides a clear spectral boundary. In physical Minkowski spacetime, however, this operator becomes a hyperbolic wave operator, and the Euclidean positivity criterion collapses. We show that the natural Lorentzian replacement is a real-time boundary-value problem: a gauge configuration remains inside the first Gribov region as long as the Faddeev-Popov wave equation admits no source-free solutions obeying the Feynman boundary condition. For backgrounds localized in time, this condition translates to the injectivity of the negative-frequency block of the classical ghost scattering map. For stationary backgrounds, it becomes a spatial bound-state or threshold-resonance problem under Fourier transformation. Using a Wronskian identity, we prove that pure frequency mixing in stable self-adjoint time-dependent channels is structurally protected and cannot by itself produce the obstruction. While static chromomagnetic backgrounds reproduce the familiar zero-frequency horizon crossing, static chromoelectric potentials reach the horizon at finite, non-vanishing frequency - a uniquely Lorentzian phenomenon arising because $A_0$ couples directly to the ghost time derivative. We also cast the condition in Fredholm form and show that the exact restriction is a functional determinant, which the naive local continuation of the Gribov-Zwanziger action fails to reproduce, leaving the construction of a genuine local real-time action as the central open problem.", "url": "https://arxiv.org/abs/2606.08697", "type": "理论", "summary": "四十多年来，格里波夫的无极点条件几乎完全在欧几里得空间中进行探索，其中法捷夫-波波夫算子的椭圆性质提供了清晰的光谱边界。然而，在物理闵可夫斯基时空中，该算子变成了双曲波算子，欧几里得正性准则崩溃了。我们证明自然洛伦兹替换是一个实时边值问题：只要 Faddeev-Popov 波动方程不承认遵守费曼边界条件的无源解，规范配置就保留在第一 Gribov 区域内。对于时间局部化的背景，此条件转化为经典鬼散射图的负频率块的单射性。对于静止背景，它成为傅里叶变换下的空间束缚态或阈值共振问题。使用朗斯基恒等式，我们证明稳定自伴时间相关通道中的纯混频在结构上受到保护，并且本身不会产生阻塞。\n\n虽然静态色磁背景再现了熟悉的零频率地平线交叉，但静态色电势以有限的、非消失的频率到达地平线——这是一种独特的洛伦兹现象，因为 $A_0$ 直接耦合到鬼时间导数。我们还以 Fredholm 形式表达条件，并表明精确的限制是一个功能决定因素，Gribov-Zwanziger 动作的朴素局部延续无法重现，从而使真正的局部实时动作的构建成为中心开放问题。", "authors": [{"name": "M. S. Guimaraes"}], "featured_authors": [{"name": "M. S. Guimaraes"}], "author_count": 1}, {"id": "2606.08767", "category": "hep-th", "title": "Fire at the Tip of the Throat: Hagedorn Phase after brane-antibrane inflation?", "abstract": "We study the post-inflationary open-string Hagedorn phase in perturbatively moduli stabilized brane-antibrane inflation. In this class of models, the volume modulus is stabilized by perturbative corrections rather than by non-perturbative effects to the superpotential, thereby avoiding the standard brane-antibrane $\\eta$-problem. Since inflation ends through tachyon condensation and brane-antibrane annihilation, the endpoint is intrinsically stringy and need not be described immediately by an ordinary radiation bath. We analyze whether the energy released at annihilation can drive the visible sector into an open-string Hagedorn phase, and study the consequences for dark radiation. If the Standard Model (SM) branes lie in the same throat as where the annihilation occurs, we find that a modest fraction of the released energy deposited into surviving visible open strings is sufficient to enter the Hagedorn regime and can suppress the effective number of relativistic species $\\Delta N_{\\rm eff}$ below current observational bounds. If the SM lies in a different throat, the result depends on inter-throat energy transfer: prompt or delayed transfer can still yield a visible Hagedorn phase. However, the mechanism is most efficient when the local string scale in the SM throat is lower than or comparable to that in the annihilation throat.", "url": "https://arxiv.org/abs/2606.08767", "type": "理论", "summary": "我们研究了扰动模量稳定膜反膜膨胀中的膨胀后开弦哈格多恩相。在此类模型中，体积模量通过微扰校正而不是通过对超电势的非微扰效应来稳定，从而避免了标准的膜反膜$\\eta$问题。由于膨胀是通过快子凝聚和膜反膜湮灭而结束的，因此终点本质上是拉丝的，不需要立即用普通的辐射浴来描述。我们分析湮灭时释放的能量是否可以驱动可见区域进入开弦哈格多恩相，并研究暗辐射的后果。如果标准模型（SM）膜位于与湮灭发生处相同的喉部，我们发现释放到幸存的可见开弦中的一小部分能量足以进入哈格多恩状态，并且可以将相对论物种的有效数量 $\\Delta N_{\\rm eff}$ 抑制在当前观测范围以下。\n\n如果 SM 位于不同的喉咙，结果取决于喉咙间的能量转移：即时或延迟的转移仍然可以产生可见的哈格多恩阶段。然而，当SM喉部的局部弦尺度低于或相当于湮灭喉部的局部弦尺度时，该机制是最有效的。", "authors": [{"name": "Dibya Chakraborty"}, {"name": "Ahmed Rakin Kamal"}], "featured_authors": [{"name": "Dibya Chakraborty"}, {"name": "Ahmed Rakin Kamal"}], "author_count": 2}, {"id": "2606.08889", "category": "hep-th", "title": "Exact Four-Parameter Rotating NS--NS Vacuum in Double Field Theory", "abstract": "We construct an exact rotating vacuum of the NS--NS sector, equivalently a Double Field Theory vacuum. The construction applies compact $\\mathbf{SO}(2)$ S-duality to a rotating Einstein--scalar seed. The solution has four independent parameters $\\{\\mathfrak{m},j,\\mathfrak{q},\\zeta\\}$. To our knowledge, this is the first explicit rotating solution of the pure NS--NS vacuum equations with all three NS--NS fields $\\{g,B,\\phi\\}$ determined analytically, independent dilaton and $H$-flux charges, and no Maxwell sector. The static limit is obtained by taking the rotation parameter $j\\to 0$. In this limit the geometry is not the spherical Burgess--Myers--Quevedo solution. Instead, it is an axial Zipoy--Voorhees branch carrying $H$-flux, so an oblate deformation remains after rotation is switched off. This geometric memory is absent in pure general relativity and in Einstein--Maxwell--dilaton--axion. The two static branches nevertheless share the same $\\ell=0$ parametrized post-Newtonian data $\\{MG,\\beta_{\\mathrm{PPN}},\\gamma_{\\mathrm{PPN}},h\\}$. They give two inequivalent NS--NS geometries at identical monopole charges, with the degeneracy lifted at $\\ell=2$. At the Kerr horizon locus the outer shell is generically singular in curvature. Above the threshold $|\\mathfrak{q}|>\\sqrt{\\mathfrak{m}^{2}-j^{2}}$, polar geodesics are repelled outward and the rotation axis becomes regular in curvature at the shell. On that axis the inverse metric $g^{\\mu\\nu}$ stays finite while the lower-index Riemannian metric components diverge, whereas off the axis the inverse metric itself diverges. This axis-local degeneracy may offer a setting for non-Riemannian geometry in Double Field Theory, where $g_{\\mu\\nu}$ is not fundamental and the $\\mathbf{O}(D,D)$ variables $\\{d,\\mathcal{H}_{AB}\\}$ remain well defined.", "url": "https://arxiv.org/abs/2606.08889", "type": "理论", "summary": "我们构造了一个 NS--NS 扇区的精确旋转真空，相当于双场论真空。该结构将紧凑的 $\\mathbf{SO}(2)$ S-对偶性应用于旋转的爱因斯坦标量种子。该解有四个独立参数$\\{\\mathfrak{m},j,\\mathfrak{q},\\zeta\\}$。据我们所知，这是纯 NS--NS 真空方程的第一个显式旋转解，其中所有三个 NS--NS 场 $\\{g,B,\\phi\\}$ 均通过分析确定，具有独立的膨胀子和 $H$ 磁通电荷，并且没有麦克斯韦扇区。静态限制是通过将旋转参数$j\\设为0$来获得的。在这个极限下，几何形状不是球形的 Burgess--Myers--Quevedo 解。相反，它是一个携带 $H$ 通量的轴向 Zipoy--Voorhees 分支，因此在旋转关​​闭后仍然存在扁圆变形。这种几何记忆在纯广义相对论和爱因斯坦-麦克斯韦-膨胀-轴子中是不存在的。尽管如此，两个静态分支共享相同的 $\\ell=0$ 参数化后牛顿数据 $\\{MG,\\beta_{\\mathrm{PPN}},\\gamma_{\\mathrm{PPN}},h\\}$。他们在相同的单极子电荷下给出了两个不等价的 NS--NS 几何形状，简并性在 $\\ell=2$ 处提升。\n\n在克尔地平线轨迹处，外壳的曲率通常是奇异的。在阈值 $|\\mathfrak{q}|>\\sqrt{\\mathfrak{m}^{2}-j^{2}}$ 之上，极地测地线被向外排斥，并且旋转轴在壳处的曲率变得规则。在该轴上，逆度量 $g^{\\mu\\nu}$ 保持有限，而较低指数的黎曼度量分量发散，而在轴外，逆度量本身发散。这种轴局域简并性可能为双场论中的非黎曼几何提供了一个设置，其中 $g_{\\mu\\nu}$ 不是基本的，并且 $\\mathbf{O}(D,D)$ 变量 $\\{d,\\mathcal{H}_{AB}\\}$ 保持良好定义。", "authors": [{"name": "Hun Jang"}, {"name": "Minkyoo Kim"}, {"name": "Jeong-Hyuck Park"}], "featured_authors": [{"name": "Hun Jang"}, {"name": "Minkyoo Kim"}, {"name": "Jeong-Hyuck Park"}], "author_count": 3}, {"id": "2606.09119", "category": "hep-th", "title": "Post-Newtonian analysis of the quantum signatures of gravity", "abstract": "In a recent work \\href{ this https URL }{PRX QUANTUM 2 (2021) 010325}, a new way of investigating quantum gravity signatures using quantum information theoretic techniques, have been proposed. The primary result of this analysis revealed that non-Gaussianity can arise only through the consideration of a quantum model for the gravity part. Compared to classical gravity, only quantum gravity can result in non-quadratic operators in the Hamiltonian which leads to the non-Gaussian behavior. In our current analysis, we have considered a more realistic scenario taking into effect leading order post-Newtonian corrections in the analysis. We have stayed with the same model of a Bose-Einstein condensate placed inside a harmonic trap potential which indeed works as the detector of the non-Gaussianity generated due to quantum gravitational effects. Bose-Einstein condensates are experimentally well studied; apart from being a single quantum system, they include Feshbach resonances, which helps tuning the strength of the electromagnetic interactions which in principle can be set to zero. This is important since it can help distinguish quantum gravity from electromagnetic interactions without affecting gravitational interactions, and any non-Gaussianity can then be solely attributed to quantum gravity. We observe that the signal to noise ratio gets slightly damped due to the post-Newtonian effects taken under consideration.", "url": "https://arxiv.org/abs/2606.09119", "type": "理论", "summary": "在最近的一项工作 \\href{ 此 https URL }{PRX QUANTUM 2 (2021) 010325} 中，提出了一种使用量子信息理论技术研究量子引力特征的新方法。该分析的主要结果表明，只有通过考虑重力部分的量子模型才能出现非高斯性。与经典引力相比，只有量子引力才能在哈密顿量中产生非二次算子，从而导致非高斯行为。在我们当前的分析中，我们考虑了更现实的场景，在分析中考虑了前导后牛顿修正。我们仍然使用放置在谐波陷阱势内的玻色-爱因斯坦凝聚体的相同模型，该模型确实可以作为由于量子引力效应而产生的非高斯性的探测器。玻色-爱因斯坦凝聚态已通过实验得到了充分研究；除了是一个单量子系统之外，它们还包括费什巴赫共振，这有助于调整电磁相互作用的强度，原则上可以将其设置为零。\n\n这很重要，因为它可以帮助区分量子引力和电磁相互作用，而不影响引力相互作用，并且任何非高斯性都可以完全归因于量子引力。我们观察到，由于考虑了后牛顿效应，信噪比略有衰减。", "authors": [{"name": "Tuhin Chatterjee"}, {"name": "Soham Sen"}, {"name": "Sunandan Gangopadhyay"}], "featured_authors": [{"name": "Tuhin Chatterjee"}, {"name": "Soham Sen"}, {"name": "Sunandan Gangopadhyay"}], "author_count": 3}, {"id": "2606.09170", "category": "hep-th", "title": "Stress Tensor Deformations in dS/CFT: Mixed Boundary Conditions, Spectrum Flow and Pseudo Entropy", "abstract": "We formulate a semiclassical stress tensor deformation dictionary in the context of the dS/CFT correspondence. Using the metric-flow formulation, we propose that stress tensor deformations of the putative boundary theory are encoded holographically as mixed boundary conditions for the bulk metric at future infinity. The coupled flow equations determine the deformed boundary metric and stress tensor, thereby specifying the source--response relation of the deformed boundary theory. We test the proposal in Kerr-dS$_3$/CFT$_2$, where the conserved charges constructed from the holographic boundary stress tensor agree exactly with the boundary spectrum obtained from the field-theoretic flow equation, providing a nontrivial consistency check of the dictionary. As an application, we compute the holographic pseudo entropy of boundary intervals from complexified geodesic saddles in the deformed Kerr-dS$_3$ geometry, and present explicit results for the $T\\bar{T}$ and root-$T\\bar{T}$ deformations.", "url": "https://arxiv.org/abs/2606.09170", "type": "理论", "summary": "我们在 dS/CFT 对应关系的背景下制定了半经典应力张量变形字典。使用度量流公式，我们建议将假定边界理论的应力张量变形全息编码为未来无穷大体度量的混合边界条件。耦合流动方程确定变形边界度量和应力张量，从而指定变形边界理论的源响应关系。我们在 Kerr-dS$_3$/CFT$_2$ 中测试了该提议，其中从全息边界应力张量构造的守恒电荷与从场论流动方程获得的边界谱完全一致，提供了字典的非平凡一致性检查。作为一个应用，我们计算变形 Kerr-dS$_3$ 几何中复杂测地线鞍点的边界间隔的全息伪熵，并给出 $T\\bar{T}$ 和 root-$T\\bar{T}$ 变形的显式结果。", "authors": [{"name": "Feng Hao"}, {"name": "Hao Ouyang"}, {"name": "Xi-Yang Ran"}], "featured_authors": [{"name": "Feng Hao"}, {"name": "Hao Ouyang"}, {"name": "Xi-Yang Ran"}], "author_count": 3}, {"id": "2606.09346", "category": "hep-th", "title": "Asymptotic Algebras and Holography of Information in CGHS Model", "abstract": "Holography of Information (HoI) and the island formula are two recent approaches to the black hole information loss paradox that yield different Page curves. The difference between the Page curves has been argued to be rooted in the algebra that each approach focuses on. In this paper, we study the candidate algebras for the CGHS model. Making the usual assumptions that are made in HoI literature, we establish HoI for the CGHS model coupled to a massless scalar by constructing the radiative phase space and asymptotic algebras at future null infinity. We prove that the quantum state of the right-moving modes can be recovered from an arbitrarily small neighbourhood of the right future null infinity. We then argue that if the Hilbert space factorization between left- and right-moving modes holds in the quantum theory of CGHS, then the island entropy cannot be identified with the von Neumann entropy of any one-sided asymptotic algebra, and that this mismatch constitutes a version of the factorization problem for CGHS/RST models. We discuss the possible distinction between the HoI and island approaches for the CGHS model.", "url": "https://arxiv.org/abs/2606.09346", "type": "理论", "summary": "信息全息术（HoI）和岛公式是解决黑洞信息丢失悖论的两种最新方法，它们产生不同的佩吉曲线。有人认为，佩奇曲线之间的差异源于每种方法所关注的代数。在本文中，我们研究了 CGHS 模型的候选代数。采用 HoI 文献中的常见假设，我们通过构建未来零无穷大处的辐射相空间和渐近代数，为与无质量标量耦合的 CGHS 模型建立 HoI。我们证明了右移模式的量子态可以从右未来零无穷大的任意小邻域中恢复。然后我们认为，如果左移模式和右移模式之间的希尔伯特空间分解在 CGHS 的量子理论中成立，那么岛熵就不能与任何单边渐近代数的冯·诺依曼熵等同，并且这种不匹配构成了 CGHS/RST 模型分解问题的一种版本。我们讨论 CGHS 模型的 HoI 方法和岛方法之间可能存在的区别。", "authors": [{"name": "Waheed A. Dar"}, {"name": "Nirmalya Kajuri"}, {"name": "Rinkesh Panigrahi"}], "featured_authors": [{"name": "Waheed A. Dar"}, {"name": "Nirmalya Kajuri"}, {"name": "Rinkesh Panigrahi"}], "author_count": 3}, {"id": "2606.09349", "category": "hep-th", "title": "Eight-dimensional Manin triples, Yang-Baxter deformations and solutions of Supergravity Equations", "abstract": "Extensive list of 4+4-dimensional Manin triples that was presented recently can be used to find new solutions of supergravity equations via Poisson-Lie T-plurality. To get the solutions we start with 1+3-dimensional flat backgrounds on Poisson-Lie groups corresponding to semi-Abelian Manin triples. For application of the Poisson-Lie T-plurality we identify Manin triples that form various decompositions of the same Drinfeld double. Beside flat backgrounds and plane-parallel waves solving supergravity equations, plurality transformation also produces curved backgrounds with torsion satisfying (generalized) supergravity equations. Many of the Poisson-Lie transformations can be understood as homogeneous Yang-Baxter deformations. Of special interest are the non-unimodular deformations leading to solutions of generalized supergravity equations.", "url": "https://arxiv.org/abs/2606.09349", "type": "理论", "summary": "最近提出的 4+4 维马宁三元组的广泛列表可用于通过泊松李 T 复数找到超重力方程的新解。为了获得解决方案，我们从对应于半阿贝尔曼宁三元组的泊松李群上的 1+3 维平坦背景开始。对于泊松李 T 复数的应用，我们识别了形成同一 Drinfeld 双元的各种分解的 Manin 三元组。除了求解超重力方程的平坦背景和平面平行波之外，多重变换还产生具有满足（广义）超重力方程的扭转的弯曲背景。许多泊松-李变换可以理解为齐次杨-巴克斯特变形。特别令人感兴趣的是导致广义超重力方程解的非幺模变形。", "authors": [{"name": "Ladislav Hlavatý"}, {"name": "Petr Novotný"}, {"name": "Ivo Petr"}], "featured_authors": [{"name": "Ladislav Hlavatý"}, {"name": "Petr Novotný"}, {"name": "Ivo Petr"}], "author_count": 3}, {"id": "2606.09438", "category": "hep-th", "title": "The macroscopic Kaehler metric of Geometric Thermodynamics versus the microscopic one on the Event Manifold: Exact Partition Functions on CV manifolds. Extended Souriau temperatures and spontaneous magnetizations", "abstract": "In this paper we clarify the relation between Geometric Thermodynamics and Information Geometry based on the Fisher matrix. On the macroscopic odd-dimensional contact manifold of thermodynamic variables, we introduce for the first time a metric, whose pull-back on the isoentropic symplectic submanifolds transverse to the Reeb field is Kählerian. The pull-back of such metric on equilibrium states, that are lagrangian submanifolds, is the Fisher Hessian. Then we consider the Souriau-like Thermodynamics that uses Calabi-Vesentini (CV) manifolds as Kaehlerian microscopic event manifolds and the Killing moment maps as observable functions. A systematic use of the theory of compact abelian structures and the setup of Special Kähler Geometry in which CV manifolds are encoded allows us to perform the explicit integration defining the partition function for any entry in the CV Tits Satake universality class. The additional actions completing the abelian structure are non linear Casimir functions of the Killing moment-maps and suggest a generalization of Souriau thermodynamics that partially breaks the isometry group symmetry by means of the non vanishing mean values of the Casimir functions in a manner similar to the spontaneous magnetization in ferromagnetism. Our new exact Gibbs distributions provide the analogue for Cartan Neural Networks of the Gaussian probability distributions in flat space used in conventional Machine Learning.", "url": "https://arxiv.org/abs/2606.09438", "type": "理论", "summary": "本文基于Fisher矩阵阐明了几何热力学与信息几何之间的关系。在热力学变量的宏观奇维接触流形上，我们首次引入了一个度量，其对横向于 Reeb 场的等熵辛子流形的拉回是凯勒式的。这种对平衡状态（拉格朗日子流形）的度量的回拉是 Fisher Hessian。然后我们考虑类 Souriau 热力学，它使用 Calabi-Vesentini (CV) 流形作为 Kaehlerian 微观事件流形，并将杀伤矩图作为可观测函数。系统地使用紧凑阿贝尔结构理论和对 CV 流形进行编码的特殊卡勒几何设置，使我们能够执行显式积分，定义 CV Tits Satake 通用类中任何条目的配分函数。\n\n完成阿贝尔结构的附加作用是杀伤矩图的非线性卡西米尔函数，并提出了苏里奥热力学的推广，该热力学通过卡西米尔函数的非消失平均值以类似于铁磁性中的自发磁化的方式部分打破了等距群对称性。我们新的精确吉布斯分布为嘉当神经网络提供了传统机器学习中使用的平坦空间中高斯概率分布的模拟。", "authors": [{"name": "Pietro Fré"}, {"name": "Alexander S. Sorin"}, {"name": "Mario Trigiante"}], "featured_authors": [{"name": "Pietro Fré"}, {"name": "Alexander S. Sorin"}, {"name": "Mario Trigiante"}], "author_count": 3}, {"id": "2606.09443", "category": "hep-th", "title": "Perturbative study of Supercritical Crossover in Noncommutative-corrected Spacetime", "abstract": "We analytically study the Widom line and supercritical crossover of noncommutative charged AdS black holes. Treating the noncommutative parameter $\\alpha$ perturbatively, we compute thermodynamic quantities and the scaled variance $\\Omega$ in both canonical and extended ensembles. The Widom line is identified as the extremum of $\\Omega$. Using a Landau expansion near the critical point, we derive the two symmetric crossover branches $L^{\\pm}$, which obey $\\delta T\\sim \\left|\\Delta Q\\right|^{\\beta+\\gamma}$, $\\delta S\\sim \\left|\\Delta Q \\right|^\\beta$ in the canonical ensemble and $\\delta P\\sim \\left|\\Delta T\\right|^{\\beta+\\gamma}$, $\\delta \\rho\\sim \\left|\\Delta T\\right|^{\\beta}$ in the extended ensemble. These scaling relations conform to the mean-field universality class ($\\beta=1/2$, $\\gamma=1$), and the noncommutative parameter only shifts subleading amplitudes without altering the universality class. Numerical verification and complete supercritical phase diagrams are also presented using supercritical crossover lines. Our results show that noncommutative corrections preserve the mean-field universality of black hole supercriticality.", "url": "https://arxiv.org/abs/2606.09443", "type": "理论", "summary": "我们分析研究了非交换带电 AdS 黑洞的 Widom 线和超临界交叉。通过扰动地处理非交换参数 $\\alpha$，我们计算了规范系综和扩展系综中的热力学量和缩放方差 $\\Omega$。 Widom 线被识别为 $\\Omega$ 的极值。使用临界点附近的朗道展开式，我们推导出两个对称交叉分支 $L^{\\pm}$，它们服从规范系综中的 $\\delta T\\sim \\left|\\Delta Q\\right|^{\\beta+\\gamma}$、$\\delta S\\sim \\left|\\Delta Q \\right|^\\beta$ 和 $\\delta P\\sim \\left|\\Delta T\\right|^{\\beta+\\gamma}$、$\\delta扩展系综中的 \\rho\\sim \\left|\\Delta T\\right|^{\\beta}$。这些标度关系符合平均场普遍性类别（$\\beta=1/2$，$\\gamma=1$），并且非交换参数仅移动次导振幅而不改变普遍性类别。还使用超临界交叉线给出了数值验证和完整的超临界相图。我们的结果表明，非交换修正保留了黑洞超临界性的平均场普遍性。", "authors": [{"name": "Ankit Anand"}, {"name": "Shoucheng Wang"}], "featured_authors": [{"name": "Ankit Anand"}, {"name": "Shoucheng Wang"}], "author_count": 2}, {"id": "2606.09510", "category": "hep-th", "title": "Effective scalaron--photon interaction in $f(R)$ gravity", "abstract": "We revisit the effective coupling of the scalaron to gauge fields in $f(R)$ gravity minimally coupled to the Standard Model, focusing on the scalaron decay into two photons. Treating the scalaron as an intrinsic component of the Jordan-frame metric, we analyse quantum effects arising from its coupling to the energy--momentum tensor. In this framework, the trace anomaly contributes to the scalaron--gauge boson interaction. Using Fujikawa's method, we derive the anomaly-induced contribution, associated with the transformation of matter fields between the Jordan and Einstein frames, first in QED and then in the full Standard Model. The resulting effective scalaron--photon interaction agrees with direct perturbative calculations that include the trace anomaly and differs from the result obtained when only the classical trace of the energy--momentum tensor is taken into account. In the limit where the scalaron mass is much smaller than the masses of particles circulating in the loop, the diagrammatic contribution cancels the anomaly-induced term, leading to a vanishing effective coupling and a strong suppression of the scalaron decay rate into photons. These results clarify the origin of discrepancies in the literature concerning the effective scalaron coupling to massless gauge fields. The discrepancies arise from inequivalent prescriptions for implementing quantum loop effects in $f(R)$ gravity, leading to different scalaron--gauge field interactions with direct implications for scalaron dark-matter phenomenology.", "url": "https://arxiv.org/abs/2606.09510", "type": "理论", "summary": "我们重新审视 $f(R)$ 重力中标量与规范场的有效耦合，最小化与标准模型的耦合，重点关注标量衰减为两个光子。将标量视为乔丹框架度量的内在组成部分，我们分析了其与能量动量张量耦合所产生的量子效应。在这个框架中，痕量异常有助于标量-规范玻色子相互作用。使用藤川的方法，我们首先在 QED 中，然后在完整的标准模型中推导出与乔丹框架和爱因斯坦框架之间的物质场变换相关的异常引起的贡献。由此产生的有效标量-光子相互作用与包括迹异常的直接微扰计算一致，并且与仅考虑能量-动量张量的经典迹时获得的结果不同。在标量质量远小于环路中循环的粒子质量的极限下，图解贡献抵消了异常引起的项，导致有效耦合消失并强烈抑制标量衰减成光子的速率。\n\n这些结果澄清了文献中有关有效标量耦合到无质量规范场的差异的根源。这些差异源于在 $f(R)$ 引力中实现量子环效应的不等价规定，导致不同的标量-规范场相互作用，对标量暗物质现象学产生直接影响。", "authors": [{"name": "Yuri Shtanov"}], "featured_authors": [{"name": "Yuri Shtanov"}], "author_count": 1}, {"id": "2606.09521", "category": "hep-th", "title": "Negative heat capacities in spherically symmetric sectors of $d$-matrix quantum mechanics", "abstract": "We consider the $SO(d)$ and $O(d)$ invariant sectors of the bosonic $d$-matrix harmonic oscillator with $U(N)$ gauge symmetry. The micro-canonical degeneracy $\\mathcal{Z}( N , d , k )$ for fixed energy $k$ is expressed as a pairing between an $N$-dependent vector and a $d$-dependent vector in the space of partitions of the integer $k$. This pairing formula is derived by counting invariant words in multi-matrix variables $X^i_{j,a}$, using properties of Clebsch-Gordan multiplicities (Kronecker coefficients) for the symmetric group $S_k$, Schur-Weyl duality and harmonic analysis on the homogeneous space $U(d)/SO(d)$. Analytic formulae for large $N$ and $k$ with $ k \\le N $ are obtained using
