    const papers = [{"id": "2606.07609", "category": "cond-mat", "title": "Finite-temperature formation of magnetic plateaus and simplex liquid states on the frustrated ruby lattice", "abstract": "Geometric frustration in quantum systems can stabilize unconventional phases of matter that avoid traditional magnetic ordering at low temperatures. Here, we observe this phenomenon while mapping out the finite temperature phase diagram of the spin-1/2 Heisenberg antiferromagnet on the ruby lattice with next-nearest-neighbor interactions. Using an infinite tensor network state (iTNS) optimized and measured with belief propagation (BP) and corrections to BP, we observe the low temperature formation of stable magnetic plateaus at various magnetic field strengths. We find these plateaus host a novel `simplex liquid state' -- a disordered phase involving strongly paired spin simplices that retains non-zero residual entropy due to an exponentially large subspace of crystalline configurations. We accurately quantify the energy gap associated with these states and show that, as the temperature of the system is lowered, it does not go through a phase transition to reach them: the heat capacity remains finite and continuous at all observed temperatures. Our work demonstrates how BP-based tensor network techniques provide a powerful route to understanding frustrated quantum magnets at finite temperature.", "url": "https://arxiv.org/abs/2606.07609", "type": "理论+数值", "summary": "量子系统中的几何挫败可以稳定物质的非常规相，避免低温下的传统磁有序。在这里，我们在绘制具有次近邻相互作用的红宝石晶格上自旋 1/2 海森堡反铁磁体的有限温度相图时观察到了这一现象。使用通过置信传播 (BP) 和 BP 校正进行优化和测量的无限张量网络状态 (iTNS)，我们观察到在不同磁场强度下稳定磁平台的低温形成。我们发现这些平台存在一种新颖的“单纯形液态”——一种涉及强配对自旋单纯形的无序相，由于晶体构型的指数大子空间而保留非零残余熵。我们准确地量化了与这些状态相关的能隙，并表明，当系统温度降低时，它不会通过相变来达到这些状态：在所有观察到的温度下，热容保持有限且连续。\n\n我们的工作展示了基于 BP 的张量网络技术如何为理解有限温度下受挫量子磁体提供强大的途径。", "authors": [{"name": "Antonio Francesco Mello"}, {"name": "E. Miles Stoudenmire"}, {"name": "Joseph Tindall"}], "featured_authors": [{"name": "Antonio Francesco Mello"}, {"name": "E. Miles Stoudenmire"}, {"name": "Joseph Tindall"}], "author_count": 3}, {"id": "2606.07634", "category": "cond-mat", "title": "Topological Melting of Magnetic Stripes and the Emergence of Macroscopic d-wave Superconductivity in the 2D Hubbard Model", "abstract": "The exact ground state of the two-dimensional Hubbard model is critical for understanding cuprate superconductivity. Previous numerical studies on narrow cylinders found insulating, static stripes that inherently suppress superconductivity. Here, using constrained-path auxiliary-field quantum Monte Carlo on isotropic lattices up to $24 \\times 24$ sites, we show static stripes are boundary artifacts. The true 2D thermodynamic limit yields a topologically melted fluid of dynamically fluctuating magnetic pockets. Furthermore, we reveal the microscopic real-space origin of cuprate particle-hole asymmetry. Hole doping actively melts the magnetic background, driving a Lifshitz transition that unleashes macroscopic $d_{x^2-y^2}$ phase coherence at an optimal $x \\approx 0.150-0.200$. Conversely, electron doping preserves rigid antiferromagnetic domains, confining carriers to narrow fault lines that optimally saturate early at $x \\approx 0.100$. By extracting the macroscopic off-diagonal long-range order across both regimes, we perfectly recover the skewed phenomenological superconducting dome. Our parameter-free theoretical curve aligns with empirical Uemura and Božović scaling relations, capturing the underdoped emergence, distinct optimal peaks, the 1/8 anomaly suppression, and overdoped collapse. These results prove that robust d-wave superconductivity is the intrinsic ground state of the pure Hubbard Hamiltonian.", "url": "https://arxiv.org/abs/2606.07634", "type": "理论+数值", "summary": "二维哈伯德模型的精确基态对于理解铜酸盐超导性至关重要。先前对窄圆柱体的数值研究发现绝缘的静态条纹本质上会抑制超导性。在这里，在高达 $24 \\times 24$ 位点的各向同性晶格上使用约束路径辅助场量子蒙特卡罗，我们发现静态条纹是边界伪影。真正的二维热力学极限产生了动态波动磁袋的拓扑熔化流体。此外，我们揭示了铜酸盐粒子孔不对称性的微观真实空间起源。空穴掺杂会主动熔化磁背景，驱动 Lifshitz 转变，从而在最佳 $x \\大约 0.150-0.200$ 处释放宏观 $d_{x^2-y^2}$ 相位相干性。相反，电子掺杂保留了刚性的反铁磁域，将载流子限制在狭窄的断层线中，该断层线最好在 $x \\大约 0.100$ 处提前饱和。通过提取两种状态下的宏观非对角长程秩序，我们完美地恢复了倾斜的唯象超导穹顶。\n\n我们的无参数理论曲线与经验 Uemura 和 Bozović 标度关系一致，捕获了掺杂不足的出现、明显的最佳峰值、1/8 异常抑制和过度掺杂崩溃。这些结果证明鲁棒的 d 波超导性是纯哈伯德哈伯德哈密顿量的固有基态。", "authors": [{"name": "Jin Hyung Cho"}], "featured_authors": [{"name": "Jin Hyung Cho"}], "author_count": 1}, {"id": "2606.07671", "category": "cond-mat", "title": "Stability and thermodynamic properties of bound magnetic polarons in ferromagnetic semiconductors: Beyond the Gaussian approximation", "abstract": "The formation of bound magnetic polarons (BMPs) is traditionally described using a Gaussian approximation for host magnetization fluctuations. While successful for diluted magnetic semiconductors, this approach fails for ferromagnetic semiconductors like GdN near their Curie temperature Tc, where diverging susceptibility yields unphysical instabilities. We extend the BMP theory beyond the Gaussian approximation by rigorously incorporating cubic and quartic fluctuations of the Ginzburg-Landau-Wilson functional. Two consistent extensions of the Dietl-Spalek framework are presented: (i) a non-local treatment valid for finite spin correlation lengths xi (to first order in lambda) and (ii) a non-perturbative resummation of dominant local fluctuations to a closed exponential form in the strict local limit xi to 0. The latter is justified by a novel polaronic Ginzburg criterion showing that constraint-induced non-localities are suppressed by O(1/N_eff) with N_eff >> 1. Crucially, the theory incorporates variational optimization of the donor orbital size, capturing magnetic self-trapping even above Tc. When applied to GdN (Tc = 55 K), the model eliminates the Gaussian divergence and predicts stable, ferromagnetically ordered BMPs with a non-zero spontaneous spin splitting Delta_0 deep into the paramagnetic phase. For a realistic exchange coupling Jc = 400 meV, the effective polaron ordering temperature reaches T* = 155-160 K. The model further suggests an optimal donor-concentration window near the metal-insulator transition where enhanced dielectric screening maximizes T*. These results establish a microscopic mechanism for persistent BMP-mediated ferromagnetism well above Tc.", "url": "https://arxiv.org/abs/2606.07671", "type": "理论+数值", "summary": "传统上使用主磁化强度波动的高斯近似来描述束缚磁极化子（BMP）的形成。虽然这种方法对于稀释磁性半导体来说是成功的，但对于居里温度 Tc 附近的铁磁半导体（如 GdN）却失败了，因为不同的磁化率会产生非物理的不稳定性。我们通过严格结合 Ginzburg-Landau-Wilson 泛函的三次和四次涨落，将 BMP 理论扩展到高斯近似之外。提出了 Dietl-Spalek 框架的两个一致扩展：(i) 对有限自旋相关长度 xi 有效的非局域处理（在 lambda 中为一阶）和 (ii) 在严格的局域极限 xi 为 0 时将主导局域波动非微扰恢复为封闭指数形式。后者通过新颖的极化 Ginzburg 准则证明是合理的，表明约束引起的非局域性被 O(1/N_eff) 和 N_eff >> 抑制1. 至关重要的是，该理论结合了供体轨道尺寸的变分优化，即使在 Tc 以上也能捕获磁性自捕获。\n\n当应用于 GdN (Tc = 55 K) 时，该模型消除了高斯散度，并预测稳定的铁磁有序 BMP，其非零自发自旋将 Delta_0 深入顺磁相。对于实际的交换耦合 Jc = 400 meV，有效极化子排序温度达到 T* = 155-160 K。该模型进一步提出了金属-绝缘体转变附近的最佳供体浓度窗口，其中增强的介电屏蔽使 T* 最大化。这些结果建立了远高于 Tc 的持续 BMP 介导的铁磁性的微观机制。", "authors": [{"name": "Henryk Bednarski"}], "featured_authors": [{"name": "Henryk Bednarski"}], "author_count": 1}, {"id": "2606.07672", "category": "cond-mat", "title": "Shear-Induced Structural Convergence but Formation-History-Dependent Yielding in Sequentially Gelled Binary Colloidal Networks", "abstract": "Multicomponent colloidal gels can exhibit mechanical responses that depend not only on interaction strengths but also on the temporal pathway by which their networks form. Here, we use particle-based simulations to investigate the steady-shear deformation of binary colloidal gels assembled by sequential gelation with tunable delay time and dominant interspecies attractions. Although varying the gelation delay produces markedly different quiescent morphologies, ranging from well-mixed networks to coarse shell-core structures, steady shear drives the systems toward structurally convergent, mixed states as quantified by cluster, connected-component, and coordination analyses. This structural convergence, however, does not imply rheological equivalence. The transient stress response remains strongly dependent on gelation delay and interspecies attraction strength. For moderate interspecies attractions, increasing delay enhances the stress overshoot, particularly at high shear rates. For stronger interspecies attractions, initially heterogeneous gels exhibit two-step yielding at low shear rates, indicating distinct deformation and restructuring processes. These results show that sequential gelation can imprint a persistent rheological memory in binary colloidal gels, even when shear substantially erases differences in common structural descriptors.", "url": "https://arxiv.org/abs/2606.07672", "type": "数值", "summary": "多组分胶体凝胶可以表现出机械响应，该响应不仅取决于相互作用强度，还取决于其网络形成的时间路径。在这里，我们使用基于粒子的模拟来研究通过具有可调延迟时间和主要种间吸引力的顺序凝胶组装而成的二元胶体凝胶的稳态剪切变形。尽管改变凝胶化延迟会产生明显不同的静态形态，从充分混合的网络到粗糙的壳核结构，稳定的剪切驱动系统走向结构收敛的混合状态，如通过簇、连通分量和配位分析所量化的。然而，这种结构趋同并不意味着流变学上的等同。瞬态应力响应仍然强烈依赖于凝胶延迟和种间吸引力强度。对于中等的种间吸引力，增加延迟会增强应力超调，特别是在高剪切速率下。对于更强的种间吸引力，最初的异质凝胶在低剪切速率下表现出两步屈服，表明明显的变形和重组过程。\n\n这些结果表明，即使剪切基本上消除了常见结构描述符的差异，顺序凝胶化也可以在二元胶体凝胶中留下持久的流变记忆。", "authors": [{"name": "Alexander Kaltashov"}, {"name": "Safa Jamali"}], "featured_authors": [{"name": "Alexander Kaltashov"}, {"name": "Safa Jamali"}], "author_count": 2}, {"id": "2606.07712", "category": "cond-mat", "title": "MatMind: A Structure-Activity Knowledge-Driven Generative Foundation Model for Materials Science", "abstract": "Progress in AI-driven crystal materials science has so far been carried by narrow architectures purpose-built for individual tasks -- graph neural networks for property prediction, diffusion and flow-matching models for crystal generation -- each excelling within its niche yet unable to act as a shared backbone across the full spectrum of materials problems. Generative large language models offer a fundamentally different paradigm, in which structural representation, quantitative prediction, and structure-activity reasoning can be unified within one model, but the materials community has yet to see this paradigm realized at a level competitive with established narrow specialists. Here we present MatMind, a generative foundation model purpose-built for crystal materials science under this paradigm, developed through the coordinated activation of structure-activity knowledge and physics-informed feedback within a progressive training framework -- combining structure-activity knowledge injection, a dual-head architecture that jointly trains language reasoning and numerical regression in a shared representation space, and multi-objective physics-informed reinforcement learning over stability, novelty, and structural diversity. Across three task families, MatMind attains the lowest mean absolute error on energy above hull, bulk modulus, and band gap -- surpassing graph neural network predictors purpose-built for these tasks -- reaches an S.U.N. rate of 65.3% on unconditional crystal generation, and achieves a comparable multiplicative improvement on magnetization-density-conditioned generation, where only 21 positive samples exist within over 600000 training entries. By matching or surpassing narrow specialists on their own ground while operating within a single unified model, MatMind shows that the LLM-based paradigm can serve as a viable backbone for crystal materials science going forward.", "url": "https://arxiv.org/abs/2606.07712", "type": "理论+数值", "summary": "迄今为止，人工智能驱动的晶体材料科学的进展一直是由专门为单个任务构建的狭窄架构所推动的——用于属性预测的图形神经网络、用于晶体生成的扩散和流程匹配模型——每个架构都在其利基市场中表现出色，但无法充当整个材料问题的共享支柱。生成式大语言模型提供了一种根本不同的范式，其中结构表示、定量预测和结构活动推理可以统一在一个模型中，但材料界尚未看到这种范式的实现水平与现有的狭隘专家相竞争。\n\n在这里，我们介绍了 MatMind，这是一种专门为这种范式下的晶体材料科学构建的生成基础模型，通过在渐进式训练框架内协调激活结构活动知识和物理信息反馈而开发，结合​​了结构活动知识注入、在共享表示空间中联合训练语言推理和数值回归的双头架构，以及关于稳定性、新颖性和结构多样性的多目标物理信息强化学习。在三个任务系列中，MatMind 在船体上方能量、体积模量和带隙方面实现了最低的平均绝对误差，超越了专门为这些任务构建的图神经网络预测器，达到了 S.U.N.无条件晶体生成的效率为 65.3%，并且在磁化密度条件生成上实现了类似的乘法改进，其中在超过 600000 个训练条目中仅存在 21 个正样本。\n\n通过在单一统一模型中操作，在自己的领域内匹配或超越狭隘的专家，MatMind 表明，基于法学硕士的范式可以作为晶体材料科学未来发展的可行支柱。", "authors": [{"name": "Zhan'ao Yao"}, {"name": "Boxuan Zhang"}, {"name": "Jingyuan Shu"}, {"name": "Xiaoyu Wu"}, {"name": "Rongyan Wang"}, {"name": "Linjing Li"}, {"name": "Dajun Zeng"}, {"name": "Yudong Yao"}, {"name": "Tingwei Chen"}, {"name": "Youwei Wang"}, {"name": "Xiaolin Zhao"}, {"name": "Jiahui Shi"}, {"name": "Jianjun Liu"}], "featured_authors": [{"name": "Zhan'ao Yao"}, {"name": "Boxuan Zhang"}, {"name": "Jingyuan Shu"}, {"name": "Xiaolin Zhao"}, {"name": "Jiahui Shi"}, {"name": "Jianjun Liu"}], "author_count": 13}, {"id": "2606.07740", "category": "cond-mat", "title": "Phase diagram of magnetic $S^3$ Skyrmions on three-dimensional lattices and the toroidal antiSkyrmion", "abstract": "Magnetic Skyrmions are planar solitons stabilized by the Dzyaloshinskii-Moriya interaction (DMI) and realized in chiral magnets. We study their natural three-dimensional generalization: a sigma model from $\\mathbb{R}^3$ to $S^3$ with a four-component magnetization vector, stabilized by a one-derivative term which is a generalized DMI. We utilize two SO(3)-invariant generalized DMIs discovered recently: an \"$\\alpha$-term\" supporting a spherically symmetric hedgehog Skyrmion and a \"$\\beta$-term\" supporting an axially symmetric Skyrmion that splits into two half-Skyrmions connected by a magnetic string of negative tension, a phenomenon we call \"anti-confinement\". We derive a cubic-lattice discretization that reproduces both continuum theories at long wavelengths and use Monte Carlo simulations to map the finite-temperature phase diagram. We identify spin-spiral, magnetic-string-lattice, Skyrmion-lattice, and antiSkyrmion-lattice phases, as well as a mixed-topology regime with fractional $S^3$ charges localized at string bends. We find, for the first time in the literature to the best of our knowledge, a toroidal (anti-)soliton of unit charge. Our results establish a theoretical and computational framework for three-dimensional topological magnetic textures in systems whose order-parameter manifold is $S^3$.", "url": "https://arxiv.org/abs/2606.07740", "type": "理论+数值", "summary": "磁性斯格明子是通过 Dzyaloshinskii-Moriya 相互作用 (DMI) 稳定的平面孤子，并在手性磁体中实现。我们研究它们的自然三维泛化：从 $\\mathbb{R}^3$ 到 $S^3$ 的 sigma 模型，具有四分量磁化矢量，由一导数项（广义 DMI）稳定。我们利用最近发现的两个 SO(3) 不变广义 DMI：一个支持球对称刺猬斯格明子的“$\\alpha$-项”和一个支持轴对称斯格明子的“$\\beta$-项”，该轴对称斯格明子分裂成两个由负张力磁弦连接的半斯格明子，这种现象我们称之为“反约束”。我们推导了立方晶格离散化，可以在长波长下重现连续介质理论，并使用蒙特卡罗模拟来绘制有限温度相图。我们识别了自旋螺旋、磁弦晶格、斯格明子晶格和反斯格明子晶格相，以及在弦弯曲处具有分数 $S^3$ 电荷的混合拓扑体系。据我们所知，我们在文献中首次发现单位电荷的环形（反）孤子。\n\n我们的结果为有序参数流形为 $S^3$ 的系统中的三维拓扑磁纹理建立了理论和计算框架。", "authors": [{"name": "Niccolò Francini"}, {"name": "Stefano Bolognesi"}, {"name": "Sven Bjarke Gudnason"}, {"name": "Roberto Menta"}], "featured_authors": [{"name": "Niccolò Francini"}, {"name": "Stefano Bolognesi"}, {"name": "Sven Bjarke Gudnason"}, {"name": "Roberto Menta"}], "author_count": 4}, {"id": "2606.07772", "category": "cond-mat", "title": "Machine learning assisted molecular dynamics of charge-transfer mechanisms at Li/Ga-doped Li$_7$La$_3$Zr$_2$O$_{12}$ (LLZO) interfaces", "abstract": "Interfacial charge transfer between solid electrolytes (SEs) and Li metal is a key factor limiting all-solid-state battery performance. Conventional density functional theory and nudged elastic band calculations neglect many-body correlations and finite-temperature effects, which can lead to inaccurate activation barriers. Here, we trained moment tensor potentials (MTPs) for garnet LLZO systems (t-LLZO, c-LLZO, and Ga-LLZO) and Li metal, enabling machine-learning molecular dynamics (MLMD) simulations of Li$^+$ diffusion in the bulk and at Li/SE interfaces. We also introduce a residence-time window method that filters out ion rattling and isolates genuine charge-transfer events. The resulting charge-transfer activation energies are low: 167 meV at the Li/Ga-LLZO interface and 200 meV in Ga-LLZO, corresponding to resistances of $\\sim \\, 10^{-5} \\, \\Omega \\,\\mathrm{cm}^{2}$. These results indicate that intrinsic Li/Ga-LLZO charge transfer is not rate-limiting. Overall, our findings clarify the fast interfacial kinetics in Li/LLZO systems, and the proposed methodology can aid further interface optimization in solid-state batteries.", "url": "https://arxiv.org/abs/2606.07772", "type": "理论+数值", "summary": "固体电解质（SE）和锂金属之间的界面电荷转移是限制全固态电池性能的关键因素。传统的密度泛函理论和微移弹性带计算忽略了多体相关性和有限温度效应，这可能导致激活势垒不准确。在这里，我们训练了石榴石 LLZO 系统（t-LLZO、c-LLZO 和 Ga-LLZO）和 Li 金属的矩张量势 (MTP)，从而能够对 Li$^+$ 在本体中和 Li/SE 界面处的扩散进行机器学习分子动力学 (MLMD) 模拟。我们还引入了一种停留时间窗口方法，可以滤除离子振动并隔离真正的电荷转移事件。由此产生的电荷转移激活能较低：Li/Ga-LLZO 界面处为 167 meV，Ga-LLZO 处为 200 meV，对应于 $\\sim \\, 10^{-5} \\, \\Omega \\,\\mathrm{cm}^{2}$ 的电阻。这些结果表明，本征 Li/Ga-LLZO 电荷转移不受速率限制。总的来说，我们的研究结果阐明了 Li/LLZO 系统中的快速界面动力学，并且所提出的方法可以帮助固态电池中的进一步界面优化。", "authors": [{"name": "Arseniy S. Burov"}, {"name": "Artem M. Abakumov"}, {"name": "Dmitry A. Aksyonov"}], "featured_authors": [{"name": "Arseniy S. Burov"}, {"name": "Artem M. Abakumov"}, {"name": "Dmitry A. Aksyonov"}], "author_count": 3}, {"id": "2606.07774", "category": "cond-mat", "title": "Length-resolved Operator Growth and Path-Entropy Obstructions to Many-Body Localization", "abstract": "For the disordered Ising chain with transverse and longitudinal fields, where couplings and fields are drawn from strictly positive distributions, Cao~\\cite{Cao} has shown that the moments $\\mu_{2k} = \\|[H,\\sigma^z_0]^{(k)}\\|_2^2$ grow almost factorially, $\\mu_{2k}^{1/(2k)}\\sim k/\\ln k$, and thus asymptotically at the maximal allowed rate. We generalize this result by resolving the operator norm in support length and show that the weight at length $\\ell_k \\sim k/\\ln k$ already exhibits almost factorial growth, $\\|[H,\\sigma^z_0]^{(k)}_{\\ell_k}\\|_2 \\gtrsim (k/\\ln k)^k$. This implies maximal spatial delocalization of local operators and, in particular, rules out dynamical locality -- the strongest form of many-body localization -- at any disorder strength. We further establish rigorously a finite-size crossover scale $L\\sim (W/J)^2$, where $W$ is the disorder and $J$ the coupling strength. For $L\\lesssim (W/J)^2$ numerical studies only access a pre-asymptotic regime. Finally, we identify a structural path-entropy obstruction to perturbative LIOM constructions, based on the almost factorial branching of operator content and independent of resonance effects; the same mechanism strongly suggests ballistic real-time operator spreading, so sub-ballistic or localized dynamics would require a presently unidentified cancellation principle acting on almost factorially many disorder-dependent paths with random amplitudes.", "url": "https://arxiv.org/abs/2606.07774", "type": "数值", "summary": "对于具有横向和纵向场的无序伊辛链，其中耦合和场是从严格的正分布中得出的，Cao~\\cite{Cao} 已经证明，矩 $\\mu_{2k} = \\|[H,\\sigma^z_0]^{(k)}\\|_2^2$ 几乎按阶乘增长，$\\mu_{2k}^{1/(2k)}\\sim k/\\ln k$，因此渐近于最大允许速率。我们通过求解支撑长度中的算子范数来概括此结果，并表明长度 $\\ell_k \\sim k/\\ln k$ 处的权重已经表现出几乎阶乘增长，$\\|[H,\\sigma^z_0]^{(k)}_{\\ell_k}\\|_2 \\gtrsim (k/\\ln k)^k$。这意味着局部算子的最大空间离域性，特别是在任何无序强度下排除动态局部性（多体局部化的最强形式）。我们进一步严格建立有限大小的交叉尺度$L\\sim (W/J)^2$，其中$W$是无序度，$J$是耦合强度。对于 $L\\lesssim (W/J)^2$ 数值研究仅访问渐近前状态。\n\n最后，我们基于算子内容的几乎阶乘分支并且与共振效应无关，确定了微扰 LIOM 结构的结构路径熵障碍；同样的机制强烈建议弹道实时算子扩散，因此亚弹道或局部动力学将需要目前未知的抵消原理，作用于几乎阶乘许多具有随机幅度的无序相关路径。", "authors": [{"name": "J. Sirker"}], "featured_authors": [{"name": "J. Sirker"}], "author_count": 1}, {"id": "2606.07815", "category": "cond-mat", "title": "Redox-Active Halide Materials for Cathode Applications", "abstract": "Electrochemically redox-active halide (eREAL) materials are an emerging class of materials that combine high Li-ion conductivity with transition-metal redox activity, making them promising candidates for cathode or catholyte applications. As a redox-active catholyte, they could significantly increase the energy density of solid-state batteries. In this work, we perform first-principles calculations on Li-M-Cl (M = 3d transition metals) ternaries to establish such a theoretical foundation for their stability and electrochemical activity. We map the phase stability of eREAL structures with varying metal-to-Cl ratio, transition-metal species, oxidation states, and anion frameworks, and compute cation and anion redox potentials. We find that the high ionicity of metal-Cl bonds elevates cation redox potentials above those of conventional oxide cathodes, but also will promote Cl oxidation and Cl-Cl dimerization at high voltages, which may limit the stability of these materials. Anion substitution effectively tunes both cation and anion redox potentials, with F substitution standing out as a viable route to extend the reversible voltage window. Beyond the anion redox issue, eREAL compounds generally exhibit flat voltage profiles, which potentially poses an electrochemical compatibility challenge when paired with active materials that operate at different voltage values or over wider voltage ranges. Collectively, our study provides a comprehensive analysis for redox behavior of eREAL materials, paving the way for their rational design and optimization in next-generation battery applications.", "url": "https://arxiv.org/abs/2606.07815", "type": "数值", "summary": "电化学氧化还原活性卤化物（eREAL）材料是一类新兴材料，它将高锂离子电导率与过渡金属氧化还原活性结合在一起，使其成为阴极或阴极电解液应用的有希望的候选材料。作为氧化还原活性阴极电解液，它们可以显着提高固态电池的能量密度。在这项工作中，我们对Li-M-Cl（M = 3d过渡金属）三元化合物进行了第一性原理计算，为其稳定性和电化学活性奠定了理论基础。我们绘制了具有不同金属与 Cl 比率、过渡金属种类、氧化态和阴离子框架的 eREAL 结构的相稳定性，并计算了阳离子和阴离子氧化还原电位。我们发现金属-Cl键的高离子性使阳离子氧化还原电位高于传统氧化物阴极，但也会促进高电压下Cl的氧化和Cl-Cl二聚，这可能会限制这些材料的稳定性。阴离子取代可有效调节阳离子和阴离子氧化还原电位，其中 F 取代是延长可逆电压窗口的可行途径。\n\n除了阴离子氧化还原问题之外，eREAL 化合物通常表现出平坦的电压分布，当与在不同电压值或更宽电压范围内工作的活性材料配对时，这可能会带来电化学兼容性挑战。总的来说，我们的研究对 eREAL 材料的氧化还原行为进行了全面分析，为其在下一代电池应用中的合理设计和优化铺平了道路。", "authors": [{"name": "Zhuohan Li"}, {"name": "Gerbrand Ceder"}], "featured_authors": [{"name": "Zhuohan Li"}, {"name": "Gerbrand Ceder"}], "author_count": 2}, {"id": "2606.07823", "category": "cond-mat", "title": "Exact mean-field phase diagram for self-avoiding active particles in a lattice", "abstract": "We investigate motility-induced phase separation in a lattice gas of self-propelled particles with hard-core exclusion, where an internal director biases particle hopping along the lattice coordination directions while undergoing rotational diffusion, together with a thermal-like translational diffusion. Rather than employing stochastic simulations, we adopt a master-equation formalism within a general mean-field approximation. By linearizing the mean-field master equation around the homogeneous stationary state and applying Bloch's theorem, the stability analysis is reduced to a $z$-dimensional tight-binding eigenvalue problem. A perturbation expansion in the wavenumber near $\\vk = 0$ then yields the spinodal surface in closed analytical form for six Bravais lattices: linear, square, hexagonal, simple cubic, body-centered cubic, and face-centered cubic. The influence of lattice geometry is shown to enter exclusively through a single coefficient $\\mathcal{A}$ which we evaluate exactly for each case. We further show that translational diffusion smooths the interface between the dense and dilute phases. Finally, we determine the rotational probability currents associated with the inhomogeneous stationary states, a distinctive signature of the broken detailed balance underlying active-system dynamics.", "url": "https://arxiv.org/abs/2606.07823", "type": "理论+数值", "summary": "我们研究了具有硬核排斥的自驱动粒子晶格气体中运动引起的相分离，其中内部导向器在经历旋转扩散以及类热平移扩散的同时使粒子沿着晶格配位方向跳跃。我们没有采用随机模拟，而是在一般平均场近似中采用主方程形式。通过对齐次稳态周围的平均场主方程进行线性化并应用布洛赫定理，稳定性分析被简化为 $z$ 维紧束缚特征值问题。然后，在 $\\vk = 0$ 附近的波数中进行微扰展开，得到六种布拉维晶格的封闭解析形式的旋节线表面：线性、方形、六方、简单立方、体心立方和面心立方。晶格几何的影响被证明仅通过单个系数 $\\mathcal{A}$ 进入，我们针对每种情况精确评估该系数。我们进一步表明，平移扩散使密相和稀相之间的界面变得平滑。\n\n最后，我们确定与非均匀静止状态相关的旋转概率流，这是主动系统动力学基础上的详细平衡被破坏的独特特征。", "authors": [{"name": "Felipe Hawthorne"}, {"name": "Cristiano F. Woellner"}, {"name": "José A. Freire"}], "featured_authors": [{"name": "Felipe Hawthorne"}, {"name": "Cristiano F. Woellner"}, {"name": "José A. Freire"}], "author_count": 3}, {"id": "2606.07836", "category": "cond-mat", "title": "Agentic multi-fidelity learning of quasiparticle and excitonic properties", "abstract": "Many-body GW-Bethe-Salpeter equation calculations are essential for accurate simulations of electronic structure and optical properties in modern low-dimensional nanomaterials. However, these methods are computationally demanding and can exhibit localized numerical instabilities or convergence failures that are difficult to detect within high-throughput workflows. We introduce an agent-guided multi-fidelity framework for correcting GW-Bethe-Salpeter excited-state landscapes in strained MoS2-WS2 bilayers. Across stacking registries, strain branches and reciprocal-space samplings, the workflow identifies spike-like excursions, near-zero-gap collapse and cross-fidelity inconsistencies associated with fragile long-wavelength dielectric screening. A structural agent evaluates calculations by assigning confidence weights and selectively using a small number of high-accuracy reference points. Machine learning models then transfer information across related systems and apply Gaussian process corrections to recover improved quasiparticle gaps and exciton binding energies, with calibrated uncertainty estimates. The approach corrects numerically induced artifacts without erasing physical strain dependence and substantially improves agreement with higher-fidelity references relative to a no-agent baseline. These results show that reliable surrogate learning for excited-state materials requires explicit diagnosis of numerical fragility, not direct interpolation of raw first-principles data points. The proposed framework is readily transferable to other optoelectronic nanomaterials characterized by strong quantum confinement, such as quantum dots, nanoribbons, layered two-dimensional semiconductors, and hybrid perovskite nanostructures.", "url": "https://arxiv.org/abs/2606.07836", "type": "理论+数值", "summary": "多体 GW-Bethe-Salpeter 方程计算对于精确模拟现代低维纳米材料的电子结构和光学特性至关重要。然而，这些方法对计算的要求很高，并且可能表现出局部数值不稳定性或收敛失败，这些在高通量工作流程中很难检测到。我们引入了一种代理引导的多保真度框架，用于校正应变 MoS2-WS2 双层中的 GW-Bethe-Salpeter 激发态景观。通过堆叠登记、应变分支和倒易空间采样，该工作流程可以识别与脆弱的长波长电介质屏蔽相关的尖峰状偏移、近零间隙塌陷和交叉保真度不一致。结构代理通过分配置信权重并有选择地使用少量高精度参考点来评估计算。然后，机器学习模型在相关系统之间传输信息，并应用高斯过程校正来恢复改进的准粒子间隙和激子结合能，以及校准的不确定性估计。\n\n该方法纠正了数字引起的伪影，而不消除物理应变依赖性，并且相对于无代理基线，显着提高了与更高保真度参考的一致性。这些结果表明，激发态材料的可靠替代学习需要对数值脆弱性进行明确诊断，而不是对原始第一性原理数据点进行直接插值。所提出的框架很容易转移到其他具有强量子限制特征的光电纳米材料，例如量子点、纳米带、层状二维半导体和混合钙钛矿纳米结构。", "authors": [{"name": "Arnab Neogi"}, {"name": "Aaron Forde"}, {"name": "Christopher A. Lane"}, {"name": "Sergei Tretiak"}, {"name": "Jian-Xin Zhu"}], "featured_authors": [{"name": "Arnab Neogi"}, {"name": "Aaron Forde"}, {"name": "Christopher A. Lane"}, {"name": "Sergei Tretiak"}, {"name": "Jian-Xin Zhu"}], "author_count": 5}, {"id": "2606.07921", "category": "cond-mat", "title": "Coherent control of chirality in Weyl semimetals", "abstract": "Weyl fermions in inversion-symmetric Weyl semimetals occur in pairs of opposite chirality, leading to symmetric optical responses under circularly-polarised light and a vanishing net photocurrent. Here, we show that tailored two-colour light fields break this symmetry and enable selective excitation of individual Weyl nodes. The interference between a circularly-polarised $\\omega$ field and a phase-locked linearly-polarised $2\\omega$ field generates a chirality-dependent redistribution of carriers in momentum space, resulting in a nonzero controllable photocurrent. We demonstrate that both the magnitude and sign of the photocurrent can be tuned via the relative phase and field strength of the two colours, and identify an optimal regime in which chiral selectivity is maximised. Our results establish a general route to optically-controlled chiral charge dynamics in Weyl semimetals using polarisation-structured light.", "url": "https://arxiv.org/abs/2606.07921", "type": "理论", "summary": "反演对称韦尔半金属中的韦尔费米子成对出现相反的手性，导致圆偏振光下的对称光学响应和消失的净光电流。在这里，我们展示了定制的双色光场打破了这种对称性，并能够选择性地激发单个韦尔节点。圆偏振 $\\omega$ 场和锁相线偏振 $2\\omega$ 场之间的干涉会在动量空间中产生载流子的手性相关重新分布，从而产生非零可控光电流。我们证明，光电流的大小和符号都可以通过两种颜色的相对相位和场强来调节，并确定手性选择性最大化的最佳状态。我们的结果建立了使用偏振结构光在外尔半金属中光控手性电荷动力学的一般途径。", "authors": [{"name": "Amar Bharti"}, {"name": "Margarita Khokhlova"}, {"name": "Misha Ivanov"}, {"name": "Gopal Dixit"}], "featured_authors": [{"name": "Amar Bharti"}, {"name": "Margarita Khokhlova"}, {"name": "Misha Ivanov"}, {"name": "Gopal Dixit"}], "author_count": 4}, {"id": "2606.07922", "category": "cond-mat", "title": "A Finite-Lattice Model from a Reciprocal Cost Action: Spectral and Reflection-Positivity Properties", "abstract": "We study the finite-lattice statistical-mechanical model whose nearest-neighbor bond potential is the reciprocal cost $J(e^\\varepsilon)=\\cosh\\varepsilon-1$, selected by the d'Alembert functional equation under the stated regularity and calibration assumptions. The structural inputs are stated explicitly; once they are fixed, the analysis is rigorous mathematics about the bond action $V(\\Delta\\phi)=\\cosh(\\Delta\\phi)-1$ on finite boxes in $\\mathbb Z^3\\times\\mathbb Z/8\\mathbb Z$. Our main result pairs a negative and a positive statement about reflection positivity. For the continuous noncompact model the natural temporal kernel $K(u)=\\exp[-(\\cosh u-1)]$ fails the Bochner positive-definiteness test: an interval-certified quadrature gives $\\widetilde K(3)<0$. Thus the standard Bochner route to Osterwalder-Schrader reflection positivity is obstructed. For a finite-alphabet variant, with field values restricted to a finite symmetric set $\\Phi=v_0\\{-N,\\ldots,N\\}$, reflection positivity holds whenever the finite crossing-bond Toeplitz matrix $(K_{\\Phi(v_0,N)})_{a,b}:=K(b-a), a,b\\in\\Phi$, is positive semidefinite. For $v_0\\in\\{1.2,1.5,2.5\\}$, this is discharged by a rigorous diagonal-dominance certificate uniform in $N$, and the associated one-step transfer operator is then positive and self-adjoint in an explicit reflection-positivity inner product. These finite-volume results do not provide a continuum Wightman theory, Osterwalder-Schrader reconstruction, LSZ scattering, or a continuum mass gap.", "url": "https://arxiv.org/abs/2606.07922", "type": "理论", "summary": "我们研究有限格子统计力学模型，其最近邻键势是倒数成本 $J(e^\\varepsilon)=\\cosh\\varepsilon-1$，由 d'Alembert 函数方程在规定的正则性和校准假设下选择。明确说明结构投入；一旦它们被固定，分析就是关于 $V(\\Delta\\phi)=\\cosh(\\Delta\\phi)-1$ 在 $\\mathbb Z^3\\times\\mathbb Z/8\\mathbb Z$ 中有限盒子上的键作用 $V(\\Delta\\phi)=\\cosh(\\Delta\\phi)-1$ 的严格数学。我们的主要结果将关于反思积极性的消极和积极陈述配对。对于连续非紧模型，自然时间核 $K(u)=\\exp[-(\\cosh u-1)]$ 未通过 Bochner 正定性检验：区间证明的求积给出 $\\widetilde K(3)<0$。因此，通往奥斯特瓦尔德-施拉德反射正性的标准博赫纳路线受到阻碍。对于有限字母变体，字段值限制为有限对称集 $\\Phi=v_0\\{-N,\\ldots,N\\}$，只要有限交叉键托普利茨矩阵 $(K_{\\Phi(v_0,N)})_{a,b}:=K(b-a), a,b\\in\\Phi$ 为半正定，反射正性就成立。\n\n对于 $v_0\\in\\{1.2,1.5,2.5\\}$，这是通过 $N$ 中严格的对角优势证明一致来实现的，并且相关的单步转移算子在显式反射正性内积中是正且自伴的。这些有限体积结果不提供连续体怀特曼理论、奥斯特瓦尔德-施拉德重建、LSZ 散射或连续体质量间隙。", "authors": [{"name": "Jonathan Washburn"}, {"name": "Megan Simons"}], "featured_authors": [{"name": "Jonathan Washburn"}, {"name": "Megan Simons"}], "author_count": 2}, {"id": "2606.07952", "category": "cond-mat", "title": "Translationally Covariant Modulated Symmetries: Classification and Goldstone", "abstract": "Modulated symmetries are global symmetries with a spatially dependent unit of charge, such as the dipole symmetry and the exponential symmetry. We give the generic condition for a modulated symmetry to be compatible with translationally symmetric Hamiltonians, which we define as a translationally covariant modulated symmetry (TCMS). For Abelian TCMSs, we prove that their units of charge can only contain multipole, exponential and harmonic components. Particularly, we classify all the one-dimensional TCMSs by real Jordan normal form blocks. We further derive the generic Goldstone action for SSB phases of continuous TCMSs, by which we show that a broken multipole symmetry gives higher-order gapless Goldstone modes, a broken harmonic symmetry gives gapless Goldstone modes at finite momenta, and a broken exponential symmetry gives no gapless Goldstone modes, modifying the conventional Goldstone theorem.", "url": "https://arxiv.org/abs/2606.07952", "type": "理论", "summary": "调制对称性是具有空间相关电荷单位的全局对称性，例如偶极对称性和指数对称性。我们给出了调制对称性与平移对称哈密顿量兼容的通用条件，我们将其定义为平移协变调制对称性（TCMS）。对于阿贝尔TCMS，我们证明了它们的电荷单位只能包含多极分量、指数分量和谐波分量。特别地，我们通过真正的 Jordan 范式块对所有一维 TCMS 进行分类。我们进一步推导了连续 TCMS 的 SSB 相的通用 Goldstone 作用，通过该作用，我们表明破缺的多极对称性给出了高阶无间隙 Goldstone 模式，破缺的调和对称性给出了有限动量下的无间隙 Goldstone 模式，而破缺的指数对称性给出了无间隙 Goldstone 模式，从而修改了传统的 Goldstone 定理。", "authors": [{"name": "Bo-Ting Chen"}, {"name": "Zihan Zhou"}, {"name": "Biao Lian"}], "featured_authors": [{"name": "Bo-Ting Chen"}, {"name": "Zihan Zhou"}, {"name": "Biao Lian"}], "author_count": 3}, {"id": "2606.08004", "category": "cond-mat", "title": "Tracking metastable phases by complex Lee-Yang zeros", "abstract": "Metastable phases (MPs) are energetically unfavorable states typically suppressed in equilibrium phase diagrams. Rather than remaining ''hidden'', we show that they exist in the complex plane of thermal fields, as regions delineated by Lee-Yang zeros (LYZs). We demonstrate this numerically in a toy model with a tunable density of states featuring three Gaussian peaks and in a more realistic periodically driven system. In both cases, as artificial parameters or drive amplitudes increase, the LYZs bounding the MP approach the real axis and split into separated branches, signaling the emergence and stabilization of the MP within the enlarged gap between two adjacent stable phases. In the driven system, the imaginary part of LYZs correlates with drive strength, linking Lee-Yang theory to terahertz matter manipulation. These findings provide a scheme to describe MPs in phase diagram analysis. By viewing periodic drives as complex thermal fields, it also offers a new perspective for understanding and engineering non-equilibrium collective states.", "url": "https://arxiv.org/abs/2606.08004", "type": "理论+数值", "summary": "亚稳态相 (MP) 是能量上不利的状态，通常在平衡相图中受到抑制。我们证明它们存在于热场的复杂平面中，而不是保持“隐藏”状态，即由李杨零点（LYZ）描绘的区域。我们在一个具有三个高斯峰值的可调状态密度的玩具模型和一个更现实的周期性驱动系统中以数字方式证明了这一点。在这两种情况下，随着人工参数或驱动幅度的增加，限制 MP 的 LYZ 接近实轴并分裂成单独的分支，表明 MP 在两个相邻稳定相之间扩大的间隙内出现并稳定。在驱动系统中，LYZ 的虚部与驱动强度相关，将李杨理论与太赫兹物质操纵联系起来。这些发现提供了一种在相图分析中描述 MP 的方案。通过将周期性驱动视为复杂的热场，它还为理解和设计非平衡集体状态提供了新的视角。", "authors": [{"name": "Yi-Hua Dong"}, {"name": "Ling Liu"}, {"name": "Fang-Cheng Wang"}, {"name": "Qi-Jun Ye"}, {"name": "Xin-Zheng Li"}], "featured_authors": [{"name": "Yi-Hua Dong"}, {"name": "Ling Liu"}, {"name": "Fang-Cheng Wang"}, {"name": "Qi-Jun Ye"}, {"name": "Xin-Zheng Li"}], "author_count": 5}, {"id": "2606.08010", "category": "cond-mat", "title": "DC conductivity of tilted Dirac Fermions across the Lifshitz Transition: short- versus long-range impurities", "abstract": "We theoretically investigate the DC conductivity of two-dimensional tilted Dirac systems subject to short- and long-range impurity scattering. Using the Kubo formalism, we systematically study transport across the subcritical (Type I), critical, and overcritical (Type II) tilt regimes. In the subcritical phase, short-range impurities yield a frequency-independent conductivity that decreases monotonically with tilt. Conversely, long-range Coulomb scattering results in a strongly energy-dependent conductivity governed by a tilt-independent scattering rate. At the Lifshitz transition ($t = 1$), the transport signatures of these impurities diverge fundamentally: the van Hove singularity in the density of states induces a localized conductivity dip for short-range disorder, but a pronounced macroscopic peak for Coulomb impurities. In the overcritical regime, an ultraviolet momentum cutoff is required to regularize the open Fermi surface, leading to distinct behaviors for each impurity type. Notably, the conductivity perpendicular to the tilt direction ($\\sigma_{xx}$) exhibits a cutoff-dependent, non-monotonic peak near $t = \\sqrt{2}$ for short-range defects, while it decays monotonically with increasing tilt for long-range scattering. For both potentials, the conductivity along the tilt axis ($\\sigma_{yy}$) increases without bound, revealing extreme transport anisotropy. For long-range impurities, the energy dependence of the conductivity becomes nearly quadratic and linear for Type I and II, respectively. Furthermore, vertex corrections vanish identically at the Lifshitz transition for both impurity types. Finally, we provide a unified geometric framework for these phenomena, establishing the tilt parameter as a powerful knob for engineering macroscopic transport in Dirac materials.", "url": "https://arxiv.org/abs/2606.08010", "type": "理论", "summary": "我们从理论上研究了受到短程和长程杂质散射的二维倾斜狄拉克系统的直流电导率。使用久保形式主义，我们系统地研究了亚临界（I 型）、临界和超临界（II 型）倾斜状态下的输运。在亚临界相，短程杂质产生与频率无关的电导率，该电导率随着倾斜单调降低。相反，长程库仑散射导致强烈依赖于能量的电导率，该电导率由与倾斜无关的散射率控制。在 Lifshitz 跃迁 ($t = 1$) 处，这些杂质的输运特征从根本上出现分歧：态密度中的范霍夫奇点会导致短程无序的局部电导率下降，但库仑杂质会出现明显的宏观峰值。在超临界状态下，需要紫外动量截止来规范开放费米表面，从而导致每种杂质类型产生不同的行为。\n\n值得注意的是，对于短程缺陷，垂直于倾斜方向 ($\\sigma_{xx}$) 的电导率在 $t = \\sqrt{2}$ 附近表现出依赖截止的非单调峰值，而对于长程散射，它随着倾斜的增加而单调衰减。对于这两种电势，沿倾斜轴 ($\\sigma_{yy}$) 的电导率无限制地增加，揭示了极端的传输各向异性。对于长程杂质，对于类型 I 和类型 II，电导率的能量依赖性分别变得接近二次和线性。此外，对于两种杂质类型，顶点校正在 Lifshitz 转变处同样消失。最后，我们为这些现象提供了一个统一的几何框架，将倾斜参数建立为狄拉克材料中工程宏观输运的强大旋钮。", "authors": [{"name": "Mohammad H. Pakzamir"}, {"name": "Zahra Faraei"}, {"name": "Ali G. Moghaddam"}], "featured_authors": [{"name": "Mohammad H. Pakzamir"}, {"name": "Zahra Faraei"}, {"name": "Ali G. Moghaddam"}], "author_count": 3}, {"id": "2606.08148", "category": "cond-mat", "title": "Inverse design of bespoke interatomic potentials via active learning by information-matching", "abstract": "Interatomic potentials (IPs) enable large-scale atomistic simulations beyond the reach of first-principles methods, but their predictive reliability depends critically on the selection of training data, quantified uncertainty, and model expressiveness. Active learning (AL) provides a principled framework for constructing efficient and accurate IPs, yet most strategies reduce parameter uncertainty without explicitly accounting for the specific material properties being predicted. The information-matching (IM) approach addresses this limitation by requiring that the selected training data provide at least as much parameter space information as needed to achieve prescribed uncertainty targets for selected quantities of interest (QoIs). Here, we apply IM to develop bespoke IPs specifically tailored for predicting plastic strength in metals. Due to the high computational cost of simulating plastic strength, we employ an indirect IM strategy that targets inexpensive intermediate QoIs that correlate with strength. The IM method enables precise parameter constraints with minimal training data, yielding precise predictions for both the intermediate QoIs and plastic strength. Yet, model error remains a key limitation, and a post hoc uncertainty inflation correction provides a viable means to mitigate this limitation. These findings illustrate both the promise and limits of uncertainty-aware AL for predicting complex material properties.", "url": "https://arxiv.org/abs/2606.08148", "type": "理论+数值", "summary": "原子间势 (IP) 能够实现超出第一原理方法范围的大规模原子模拟，但其预测可靠性关键取决于训练数据的选择、量化的不确定性和模型表达能力。主动学习 (AL) 为构建高效、准确的 IP 提供了原则性框架，但大多数策略在没有明确考虑所预测的特定材料属性的情况下降低了参数不确定性。信息匹配 (IM) 方法通过要求所选训练数据提供至少与实现所选感兴趣量 (QoI) 的规定不确定性目标所需的参数空间信息来解决此限制。在这里，我们应用 IM 开发专门用于预测金属塑性强度的定制 IP。由于模拟塑料强度的计算成本很高，我们采用间接 IM 策略，以与强度相关的廉价中间 QoI 为目标。 IM 方法可以使用最少的训练数据实现精确的参数约束，从而对中间 QoIs 和塑性强度产生精确的预测。\n\n然而，模型误差仍然是一个关键限制，而事后不确定性通胀修正提供了缓解这一限制的可行方法。这些发现说明了不确定性感知 AL 在预测复杂材料特性方面的前景和局限性。", "authors": [{"name": "Yonatan Kurniawan"}, {"name": "Logan D. Williams"}, {"name": "Amit Samanta"}, {"name": "Ilia Nikiforov"}, {"name": "Daniel Schwalbe-Koda"}, {"name": "Mark K. Transtrum"}, {"name": "Ellad B. Tadmor"}, {"name": "Vincenzo Lordi"}, {"name": "Vasily V. Bulatov"}], "featured_authors": [{"name": "Yonatan Kurniawan"}, {"name": "Logan D. Williams"}, {"name": "Amit Samanta"}, {"name": "Ellad B. Tadmor"}, {"name": "Vincenzo Lordi"}, {"name": "Vasily V. Bulatov"}], "author_count": 9}, {"id": "2606.08178", "category": "cond-mat", "title": "The fluid-lattice gas isomorphism with application to liquid-vapor equilibrium in physisorbed monolayers", "abstract": "Liquid-gas equilibrium for a simple molecular fluid is considered in view of the existence of the order parameter, in terms of which the symmetry of the binodal is restored not only in the vicinity of the critical point (critical isomorphism) but also globally in the whole coexistence region. This leads to the mapping between fluid and lattice gas (Ising model). We test this approach against the data on the liquid-gas binodal of a two-dimensional Lennard-Jones fluid and monolayers of molecular fluids. The obtained results allow us to speculate about the analog of the Kramers-Wannier duality in such systems and provide the theoretical estimate for $dp/dT$ on the saturation curve at the critical point. The microscopic grounds of the proposed approach are also discussed, and the transition from the continuous fluid model Hamiltonian to the effective quasi-spin lattice model is outlined.", "url": "https://arxiv.org/abs/2606.08178", "type": "理论", "summary": "考虑到有序参数的存在，考虑简单分子流体的液-气平衡，由此不仅在临界点（临界同构）附近而且在整个共存区域全局恢复双节对称性。这导致了流体和晶格气体之间的映射（伊辛模型）。我们根据二维 Lennard-Jones 流体的液-气双节线和分子流体的单层数据测试了这种方法。获得的结果使我们能够推测此类系统中 Kramers-Wannier 对偶性的模拟，并提供临界点饱和曲线上 $dp/dT$ 的理论估计。还讨论了所提出方法的微观基础，并概述了从连续流体模型哈密顿量到有效准自旋晶格模型的转变。", "authors": [{"name": "Lev Shevchenko"}, {"name": "Volodymyr Kulinskii"}], "featured_authors": [{"name": "Lev Shevchenko"}, {"name": "Volodymyr Kulinskii"}], "author_count": 2}, {"id": "2606.08280", "category": "cond-mat", "title": "Fidelity susceptibility and geometric response in flux-tuned Dirac systems: exact results from a low-energy two-level reduction", "abstract": "We study the parametric sensitivity of two-dimensional massive Dirac fermions subject to Aharonov-Bohm flux insertion, using the Bures metric (fidelity susceptibility) as the central statistical-mechanical response function. Near integer values of the reduced flux, the low-energy spectrum undergoes a flux-induced avoided crossing whose structure is controlled by the Dirac mass. Through a controlled low-energy projection of the full Dirac=Aharonov-Bohm operator onto an effective two-level subspace, valid near integer flux, we derive an exact closed-form expression for the ground-state Bures metric, which takes a universal Lorentzian profile centered at integer flux with width set by the mass parameter. The peak value scales as $g^{\\max}_{\\lambda\\lambda}\\sim m^{-2}$, diverging in the chiral limit in direct analogy with the divergence of thermodynamic susceptibilities near critical points. We introduce an integrated geometric susceptibility $\\chi(m) = \\pi/(8m)$, whose inverse-mass scaling is the information-geometric counterpart of power-law critical behavior, with the Dirac mass playing the role of a relevant coupling controlling the distance from the chiral fixed point. The Lorentzian profile is shown to arise from the curvature of the ground-state manifold on the Bloch sphere, requiring no dynamical input beyond the spectral structure. Importantly, this geometric response is independent of Berry curvature and topological invariants, emerging instead from a universal local spectral mechanism. Through its spectral representation, the Bures metric is identified as the geometric (paramagnetic) contribution to the persistent current susceptibility, encoding the sensitivity of persistent currents and orbital magnetization to flux variations and connecting information geometry to measurable response functions in mesoscopic Dirac systems.", "url": "https://arxiv.org/abs/2606.08280", "type": "理论", "summary": "我们使用 Bures 度量（保真度敏感性）作为中心统计机械响应函数，研究受阿哈罗诺夫-玻姆通量插入影响的二维大规模狄拉克费米子的参数灵敏度。在减少通量的整数值附近，低能谱经历通量引起的避免交叉，其结构由狄拉克质量控制。通过将完整的 Dirac=Aharonov-Bohm 算子受控低能投影到有效的两级子空间（有效的近整数通量）上，我们推导出基态 Bures 度量的精确封闭式表达式，该表达式采用以整数通量为中心、宽度由质量参数设置的通用洛伦兹轮廓。峰值缩放为 $g^{\\max}_{\\lambda\\lambda}\\sim m^{-2}$，在手性极限上发散，与临界点附近的热力学敏感性发散直接类比。我们引入了积分几何磁化率 $\\chi(m) = \\pi/(8m)$，其反质量标度是幂律临界行为的信息几何对应物，狄拉克质量起着相关耦合的作用，控制与手性不动点的距离。\n\n洛伦兹轮廓由布洛赫球上基态流形的曲率产生，不需要光谱结构之外的动态输入。重要的是，这种几何响应独立于贝里曲率和拓扑不变量，而是从通用的局部光谱机制中产生。通过其频谱表示，Bures 度量被识别为对持续电流磁化率的几何（顺磁）贡献，编码持续电流和轨道磁化强度对通量变化的敏感性，并将信息几何与介观狄拉克系统中的可测量响应函数连接起来。", "authors": [{"name": "C. A. S. Almeida"}], "featured_authors": [{"name": "C. A. S. Almeida"}], "author_count": 1}, {"id": "2606.08334", "category": "cond-mat", "title": "Enhanced dumbbell diffusion in a periodic potential by the elevator effect", "abstract": "We present molecular dynamics simulations of the random walk of a dumbbell - two beads connected by a spring - in a one-dimensional periodic potential and compare our results in limiting cases to theoretical analytical equations. The relevant parameters in this system are the spring constant, the equilibrium distance of the spring (relative to the periodicity of the potential), and the amplitude of the potential. Dumbbells with equilibrium distances incommensurate with the potential periodicity and with a sufficiently large spring constant exhibit enhanced diffusion. The diffusion constant can exceed that of a single bead in the same potential landscape. In this case, the dumbbell resembles a traction elevator, with the two connected beads acting as the elevator car and counterweight: the ''elevator effect''.", "url": "https://arxiv.org/abs/2606.08334", "type": "理论+数值", "summary": "我们提出了哑铃（由弹簧连接的两个珠子）在一维周期性势中随机行走的分子动力学模拟，并将我们在极限情况下的结果与理论分析方程进行了比较。该系统中的相关参数是弹簧常数、弹簧的平衡距离（相对于电势的周期性）和电势的振幅。平衡距离与潜在周期性不相称且弹簧常数足够大的哑铃表现出增强的扩散。在相同的电位景观中，扩散常数可以超过单个珠子的扩散常数。在这种情况下，哑铃类似于牵引电梯，两个连接的珠子充当电梯轿厢和配重：“电梯效应”。", "authors": [{"name": "B. A. Kiang"}, {"name": "H. Schiessel"}], "featured_authors": [{"name": "B. A. Kiang"}, {"name": "H. Schiessel"}], "author_count": 2}, {"id": "2606.08342", "category": "cond-mat", "title": "A spectral model of power-law decay in natural and engineered systems", "abstract": "We present a first-principles spectral mechanism for the emergence of nonextensive $q$-exponential dilution and power-law relaxation in non-ideal transport systems. By modeling an incompletely mixed reactor as a layered diffusion matrix with an absorbing boundary, we demonstrate that macroscopic power-law tails depend on the geometric interaction between the initial tracer placement and the domain's boundary configuration. For a one-dimensional system, an asymmetric, volumetrically distributed initial concentration profile projects onto the low-wavenumber eigenmodes, generating an emergent Gamma distribution of relaxation rates; at an infinitesimal boundary layer thickness ($\\Delta z \\to 0$), this profile yields the nonextensive $q$-exponential decay function exactly across the entire temporal domain with $q = 5/3$. Extended to $d$ dimensions under a highly localized, boundary-adjacent singular initial condition, the resulting scaling exponents and corresponding $q$ values depend explicitly on the spatial configuration of the absorbing boundaries. However, in the one-dimensional limit ($d=1$), these distinct initial states and boundary formulations intersect, rendering the $q=5/3$ exponent geometrically invariant. Our approach establishes a clear connection between linear diffusion transport and nonextensive statistical mechanics, showing how heavy-tailed transport can be derived from boundary geometry and spectral dimensionality.", "url": "https://arxiv.org/abs/2606.08342", "type": "理论", "summary": "我们提出了非理想传输系统中出现非广延 $q$ 指数稀释和幂律松弛的第一原理谱机制。通过将不完全混合反应器建模为具有吸收边界的分层扩散矩阵，我们证明了宏观幂律尾部取决于初始示踪剂放置和域边界配置之间的几何相互作用。对于一维系统，不对称的、体积分布的初始浓度分布投射到低波数本征模上，产生弛豫率的涌现伽玛分布；在无穷小的边界层厚度（$\\Delta z \\to 0$）下，该轮廓产生精确跨越整个时域的非广延 $q$ 指数衰减函数，其中 $q = 5/3$。在高度局部化、边界相邻的奇异初始条件下扩展到 $d$ 维度，所得的缩放指数和相应的 $q$ 值明确取决于吸收边界的空间配置。\n\n然而，在一维极限 ($d=1$) 中，这些不同的初始状态和边界公式相交，使得 $q=5/3$ 指数几何不变。我们的方法在线性扩散传输和非广延统计力学之间建立了明确的联系，展示了如何从边界几何和光谱维度导出重尾传输。", "authors": [{"name": "Balázs Sándor"}, {"name": "Márk Honti"}, {"name": "Henrique Santos Lima"}], "featured_authors": [{"name": "Balázs Sándor"}, {"name": "Márk Honti"}, {"name": "Henrique Santos Lima"}], "author_count": 3}, {"id": "2606.08399", "category": "cond-mat", "title": "First-Principles Insights into Surface and Ligand Effects in Stoichiometric HgTe Quantum Dots", "abstract": "HgTe quantum dots are promising mid-infrared nanomaterials owing to their exceptional bandgap tunability, yet their electronic structure is strongly influenced by surface coordination and ligand passivation at ultrasmall sizes. Here, we employ atomistic simulations to systematically investigate stoichiometric HgTe nanoclusters with sizes 0.86 to 1.85 nm. The in silico exploration uncovers a transition from confinement-dominated electronic structures with delocalized frontier states in small self-passivated clusters to surface influenced characteristics in larger nanoclusters. Increased coordination and bond-length inhomogeneity in the larger nanoclusters generate localized near-gap states centered on undercoordinated surface atoms. At intermediate sizes, the band edge states become spatially separated on different regions of the cluster without forming deep gap states, marking the onset of surface induced electronic asymmetry. In larger clusters (1.8 nm), common neutral ligands like amines, thiols, phosphines, and alcohols effectively eliminate surface-derived localized states by restoring local coordination and altering the band edge electronic structure through ligand surface hybridization. The sensitivity of the bandgap to ligand identity and binding site underscores the interplay between surface coordination and ligand chemistry in shaping the electronic structure of these nanoclusters. These insights provide an atomistic understanding of size-dependent electronic structures in ultrasmall HgTe clusters. The study further establishes neutral ligands as powerful chemical handles for engineering frontier electronic states relevant to infrared optoelectronic functionality.", "url": "https://arxiv.org/abs/2606.08399", "type": "理论+数值", "summary": "HgTe量子点由于其出色的带隙可调性而成为有前途的中红外纳米材料，但其电子结构在超小尺寸下受到表面配位和配体钝化的强烈影响。在这里，我们采用原子模拟来系统地研究尺寸为 0.86 至 1.85 nm 的化学计量 HgTe 纳米团簇。计算机探索揭示了从小型自钝化团簇中具有离域前沿态的限制主导的电子结构到较大纳米团簇中受表面影响的特征的转变。较大纳米团簇中增加的配位和键长不均匀性产生以欠配位表面原子为中心的局部近带隙态。在中间尺寸下，能带边缘态在团簇的不同区域上在空间上分离，而没有形成深能隙态，这标志着表面诱导电子不对称的开始。\n\n在较大的簇（1.8 nm）中，常见的中性配体（如胺、硫醇、膦和醇）通过配体表面杂化恢复局部配位和改变带边电子结构，有效消除表面衍生的局域态。带隙对配体身份和结合位点的敏感性强调了表面配位和配体化学之间在塑造这些纳米团簇的电子结构中的相互作用。这些见解提供了对超小型 HgTe 团簇中尺寸相关电子结构的原子理解。该研究进一步确立了中性配体作为强大的化学手柄，用于工程与红外光电功能相关的前沿电子态。", "authors": [{"name": "Raagya Arora"}, {"name": "Patrick J. Lohr"}, {"name": "Dibyajyoti Ghosh"}, {"name": "Jennifer Hollingsworth"}, {"name": "Sergei Tretiak"}], "featured_authors": [{"name": "Raagya Arora"}, {"name": "Patrick J. Lohr"}, {"name": "Dibyajyoti Ghosh"}, {"name": "Jennifer Hollingsworth"}, {"name": "Sergei Tretiak"}], "author_count": 5}, {"id": "2606.08509", "category": "cond-mat", "title": "What Is a Pattern in Statistical Mechanics? Formalizing Structure and Patterns in One-Dimensional Spin Lattice Models with Computational Mechanics", "abstract": "This work formalizes the notions of structure and pattern for three distinct one-dimensional spin-lattice models (finite-range Ising, solid-on-solid, and three-body), using information-theoretic and computation-theoretic methods. We begin by presenting a novel derivation of the Boltzmann distribution for finite one-dimensional spin configurations embedded in infinite ones. We next recast this distribution as a stochastic process, thereby enabling us to analyze each spin-lattice model within the theory of computational mechanics. In this framework, the process's structure is quantified by excess entropy (predictable information) and statistical complexity (stored information), and the process's structure-generating mechanism is specified by its epsilon-machine. To assess compatibility with statistical mechanics, we compare the configurations jointly determined by the information measures and epsilon-machines to typical configurations drawn from the Boltzmann distribution, and we find agreement. We also include a self-contained primer on computational mechanics and provide code implementing the information measures and spin-model distributions.", "url": "https://arxiv.org/abs/2606.08509", "type": "理论", "summary": "这项工作使用信息论和计算理论方法，形式化了三种不同的一维自旋晶格模型（有限范围伊辛模型、固体对固体模型和三体模型）的结构和模式概念。我们首先提出了嵌入无限自旋配置的有限一维自旋配置的玻尔兹曼分布的新颖推导。接下来，我们将这种分布重新定义为随机过程，从而使我们能够在计算力学理论中分析每个自旋晶格模型。在此框架中，进程的结构通过过量熵（可预测信息）和统计复杂性（存储信息）来量化，并且进程的结构生成机制由其 epsilon 机指定。为了评估与统计力学的兼容性，我们将信息测量和 epsilon 机联合确定的配置与从玻尔兹曼分布得出的典型配置进行比较，我们发现了一致性。我们还提供了关于计算力学的独立入门读物，并提供了实现信息测量和自旋模型分布的代码。", "authors": [{"name": "Omar Aguilar"}], "featured_authors": [{"name": "Omar Aguilar"}], "author_count": 1}, {"id": "2606.08540", "category": "cond-mat", "title": "Shear Banding in Amorphous Solids as a Nonlinear Screened Soft Mode Instability", "abstract": "Shear banding is a well-known and widespread instability in strained solids: under external strain, the deformation localizes along a line in two dimensions or a plane in three dimensions. Developing a proper theoretical description of this phenomenon is key to understanding mechanical failure in solid materials. Very recently, a nonlinear theory extending classical elasticity to include plastic deformations as topological charges was proposed, offering detailed predictions on the nature and consequences of the shear-banding instability. The theory derives a Hessian operator whose lowest eigenvalue vanishes at the onset of instability, and the corresponding critical eigenmode describes the displacement field across the shear band. The resulting soft mode possesses the selected localization scale and subsequently saturates into a finite-width shear band. The aim of this Letter is to examine this theory numerically, establishing the role of topological screening and nonlinear instability as the mechanisms governing shear banding during athermal quasistatic deformation. We show that the displacement profile around the shear band is directly determined by the screening parameter and the nonlinear coefficient, thereby quantitatively verifying the theoretical predictions. Our results demonstrate that shear banding differs fundamentally from fracture: it arises from a nonlinear instability of an elastic field screened by plastic deformations. This establishes topological screening as the essential mechanism governing shear banding in amorphous solids.", "url": "https://arxiv.org/abs/2606.08540", "type": "理论+数值", "summary": "剪切带是应变固体中众所周知且广泛存在的不稳定性：在外部应变下，变形沿二维线或三维平面局部化。对这种现象进行正确的理论描述是理解固体材料机械失效的关键。最近，提出了一种非线性理论，将经典弹性扩展到包括作为拓扑电荷的塑性变形，提供了对剪切带不稳定性的性质和后果的详细预测。该理论推导了一个 Hessian 算子，其最低特征值在不稳定开始时消失，相应的临界特征模态描述了剪切带上的位移场。所得的软模式具有选定的局部化尺度，并随后饱和到有限宽度的剪切带。这封信的目的是从数值上检验这一理论，确立拓扑屏蔽和非线性不稳定性作为非热准静态变形过程中剪切带控制机制的作用。\n\n我们表明，剪切带周围的位移剖面直接由筛选参数和非线性系数确定，从而定量验证了理论预测。我们的结果表明，剪切带与断裂有根本的不同：​​它是由塑性变形屏蔽的弹性场的非线性不稳定性引起的。这将拓扑筛选确立为控制非晶固体剪切带的基本机制。", "authors": [{"name": "Yang Fu"}, {"name": "Yuliang Jin"}, {"name": "Avanish Kumar"}, {"name": "Itamar Procaccia"}], "featured_authors": [{"name": "Yang Fu"}, {"name": "Yuliang Jin"}, {"name": "Avanish Kumar"}, {"name": "Itamar Procaccia"}], "author_count": 4}, {"id": "2606.08549", "category": "cond-mat", "title": "On the correlation lengths of confined spheres in a cylindrical pore", "abstract": "We investigate the structural correlations of hard spheres confined within a narrow cylindrical pore in the quasi-one-dimensional regime, where interactions are restricted to nearest neighbors. Using a Laplace-space formulation of the radial distribution function (RDF), we determine the correlation lengths and oscillation frequencies associated with its long-distance decay. In addition to the global RDF, we analyze transverse-resolved RDFs that account for the positions of particle pairs across the pore cross section. While these observables are associated with the same underlying pole spectrum, their residues depend on the transverse configuration and can vanish due to symmetry. As a result, different particle-pair configurations may be governed by different leading poles and display different correlation lengths and oscillation frequencies. In particular, the global RDF does not always reflect the longest-ranged correlations found in transverse-resolved observables. We examine how this behavior depends on density and confinement. In the strong-confinement limit, the system approaches the Tonks-gas behavior at finite pressure, and the differences between the RDFs disappear.", "url": "https://arxiv.org/abs/2606.08549", "type": "理论+数值", "summary": "我们研究了准一维范围内狭窄圆柱形孔内硬​​球的结构相关性，其中相互作用仅限于最近的邻居。使用径向分布函数 (RDF) 的拉普拉斯空间公式，我们确定了与其长距离衰减相关的相关长度和振荡频率。除了全局 RDF 之外，我们还分析了横向分辨 RDF，该 RDF 解释了颗粒对在孔隙横截面中的位置。虽然这些可观测量与相同的基础极谱相关，但它们的残差取决于横向配置，并且可能由于对称性而消失。因此，不同的粒子对配置可能由不同的主导极点控制，并显示出不同的相关长度和振荡频率。特别是，全局 RDF 并不总是反映横向分辨可观测值中发现的最长范围的相关性。我们研究了这种行为如何取决于密度和限制。在强约束极限下，系统接近有限压力下的唐克斯气体行为，并且 RDF 之间的差异消失。", "authors": [{"name": "Ana M. Montero"}], "featured_authors": [{"name": "Ana M. Montero"}], "author_count": 1}, {"id": "2606.08550", "category": "cond-mat", "title": "Dimensionality-Driven Charge Stabilization of Group-IV Color Centers in Diamond Ultrathin Films", "abstract": "Neutral group-IV vacancy (XV, X = Si, Ge, Sn, and Pb) centers in diamond are emerging solid-state spin-photon interfaces because of their favorable spin coherence and inversion symmetry-protected optical transitions. However, stabilizing their neutral charge state typically requires stringent Fermi-level engineering in high purity boron-doped diamond, which poses significant materials-growth challenges. Here, we demonstrate that dimensional confinement in diamane provides an alternative route to charge-state stabilization without intentional doping. Using first-principles calculations, we show that quantum confinement and surface termination cooperatively tune the host band gap and shift the occupied defect states upward from the valence-band edge, thereby enlarging the thermodynamic stability window of the neutral charge state and suppressing valence-band assisted excitation pathways. We further reveal that the thickness and surface termination of diamane enable systematic tuning of the electronic structure, zero-field splitting, and spin-orbit coupling of XV centers while largely preserving their optical transition energies. Among the structures considered, hydrogenated diamane offers the most favorable balance between charge-state stability and magneto-optical performance. More broadly, our findings establish dimensional confinement as a general strategy for engineering the charge, optical, and spin properties of solid-state quantum defects.", "url": "https://arxiv.org/abs/2606.08550", "type": "理论+数值", "summary": "金刚石中的中性 IV 族空位（XV、X = Si、Ge、Sn 和 Pb）中心是新兴的固态自旋光子界面，因为它们具有良好的自旋相干性和反演对称性保护的光学跃迁。然而，稳定其中性电荷态通常需要在高纯度硼掺杂金刚石中进行严格的费米能级工程，这对材料生长提出了重大挑战。在这里，我们证明了金刚石中的尺寸限制提供了一种无需有意掺杂即可稳定电荷态的替代途径。利用第一性原理计算，我们表明量子限制和表面终止协同调节主体带隙并将占据的缺陷态从价带边缘向上移动，从而扩大中性电荷态的热力学稳定窗口并抑制价带辅助激发路径。我们进一步揭示，金刚石的厚度和表面终止能够系统地调节电子结构、零场分裂和 XV 中心的自旋轨道耦合，同时在很大程度上保留其光学跃迁能量。\n\n在考虑的结构中，氢化金刚石在电荷态稳定性和磁光性能之间提供了最有利的平衡。更广泛地说，我们的研究结果将维度限制确立为设计固态量子缺陷的电荷、光学和自旋特性的通用策略。", "authors": [{"name": "Jijun Huang"}, {"name": "Bing Huang"}, {"name": "Song Li"}], "featured_authors": [{"name": "Jijun Huang"}, {"name": "Bing Huang"}, {"name": "Song Li"}], "author_count": 3}, {"id": "2606.08613", "category": "cond-mat", "title": "Inhomogeneous Coulomb Models Without Defects are Sick: Domain Wall Energies Scaling as Volume (not Boundary Area)", "abstract": "In this work we show that coulomb models, ones that obey a $\\nabla\\cdot\\left\\langle \\mathbf{B}\\right\\rangle =0$ divergence free constraint - for $\\left\\langle \\mathbf{B}\\right\\rangle $ being some coarse grained variables related to the microscopic degrees of freedom of the lattice system - are sick without the inclusion of defects with $\\nabla\\cdot\\mathbf{B}\\neq0$. We show that for generic boundaries (ones where the fluxes of the pseudo-magnetic fields on the boundary do not cancel: $\\left(\\left\\langle \\mathbf{B}_{R}\\right\\rangle -\\left\\langle \\mathbf{B}_{L}\\right\\rangle \\right)\\cdot\\mathbf{n}\\neq0$ - here $\\mathbf{n}$ is the unit normal and $\\left\\langle \\mathbf{B}_{R/L}\\right\\rangle $ are the two ground state pseudo-magnetic fields on either side of the domain wall) without the inclusion of defects, sharp domain walls (on the order of the width of a unit cell) between different phases of the system cost energy proportional to system size (not boundary area). We present several different examples of this phenomena in the square lattice six vertex model, in quantum dimers and in classical spin ice in the presence of magnetic fields. We also show by example that the condition $\\left(\\left\\langle \\mathbf{B}_{R}\\right\\rangle -\\left\\langle \\mathbf{B}_{L}\\right\\rangle \\right)\\cdot\\mathbf{n}=0$ is a necessary but not sufficient condition for the boundaries to be compatible - that is domain wall energy to scale with domain wall area and not system size. To further present the importance of boundary conditions in Coulomb systems we show that system boundaries, even ones that satisfy $\\int_{\\partial V}\\mathbf{B}\\cdot\\mathbf{n}=0$, have thermodynamic consequences - that is there is a cost, extensive in system size, to the Helmholtz free energy.", "url": "https://arxiv.org/abs/2606.08613", "type": "理论", "summary": "在这项工作中，我们证明了库仑模型，即服从 $\\nabla\\cdot\\left\\langle \\mathbf{B}\\right\\rangle =0$ 无散度约束的库仑模型 - 因为 $\\left\\langle \\mathbf{B}\\right\\rangle $ 是与晶格系统的微观自由度相关的一些粗粒度变量 - 在不包含缺陷的情况下是病态的$\\nabla\\cdot\\mathbf{B}\\neq0$。我们证明，对于通用边界（边界上赝磁场的通量不抵消的边界：$\\left(\\left\\langle \\mathbf{B}_{R}\\right\\rangle -\\left\\langle \\mathbf{B}_{L}\\right\\rangle \\right)\\cdot\\mathbf{n}\\neq0$ - 这里$\\mathbf{n}$是单位法线，$\\left\\langle \\mathbf{B}_{R/L}\\right\\rangle $ 是磁畴壁两侧的两个基态赝磁场，不包含缺陷，系统不同相之间的尖锐磁畴壁（约为晶胞宽度）消耗的能量与系统尺寸（不是边界面积）成正比。我们在方晶格六顶点模型、量子二聚体和磁场存在下的经典自旋冰中提出了这种现象的几个不同例子。\n\n我们还通过示例证明，条件 $\\left(\\left\\langle \\mathbf{B}_{R}\\right\\rangle -\\left\\langle \\mathbf{B}_{L}\\right\\rangle \\right)\\cdot\\mathbf{n}=0$ 是边界兼容的必要但不充分的条件 - 即畴壁能量随畴壁面积而不是系统尺寸缩放。为了进一步展示库仑系统中边界条件的重要性，我们证明系统边界，即使是满足 $\\int_{\\partial V}\\mathbf{B}\\cdot\\mathbf{n}=0$ 的系统边界，也会产生热力学后果 - 也就是说，亥姆霍兹自由能会产生巨大的系统规模成本。", "authors": [{"name": "Garry Goldstein"}], "featured_authors": [{"name": "Garry Goldstein"}], "author_count": 1}, {"id": "2606.08639", "category": "cond-mat", "title": "Nonperturbative isotope effect on light-matter interaction in boron arsenide", "abstract": "The interaction of light and matter under strong isotope disorder gives rise to unconventional physics that goes beyond the quantum perturbation theory. In boron arsenide, the large mass difference between the two stable boron isotopes presents a paradigmatic case where perturbation theory fails, yet a unified theoretical framework across the perturbative and nonperturbative regime has remained elusive. Here, we develop a nonperturbative approach to capture isotope-disorder effect in boron arsenide, which fundamentally alters light-matter interactions. We reveal that coherently mixed vibrations between two boron isotopes reshape the dielectric function in the nonperturbative regime. The nonperturbative isotope interactions dictate the properties of coupled surface phonon polaritons and near-field radiative heat transfer. Two-fold tuning of radiative heat flux is achieved by modulating the surface phonon polariton resonance via isotope engineering. This work establishes a unified framework connecting the perturbative and nonperturbative limits, enabling quantitative predictions across weak to strong disorder regime.", "url": "https://arxiv.org/abs/2606.08639", "type": "理论", "summary": "强同位素无序下光与物质的相互作用产生了超越量子微扰理论的非常规物理学。在砷化硼中，两种稳定硼同位素之间的巨大质量差异代表了微扰理论失败的范例，但跨越微扰和非微扰体系的统一理论框架仍然难以捉摸。在这里，我们开发了一种非微扰方法来捕获砷化硼中的同位素无序效应，这从根本上改变了光与物质的相互作用。我们揭示了两种硼同位素之间的相干混合振动重塑了非微扰状态下的介电函数。非微扰同位素相互作用决定了耦合表面声子极化子和近场辐射传热的特性。通过同位素工程调制表面声子极化子共振，可以实现辐射热通量的两倍调谐。这项工作建立了一个连接微扰和非微扰极限的统一框架，从而能够对弱到强的无序状态进行定量预测。", "authors": [{"name": "Huan Wu"}], "featured_authors": [{"name": "Huan Wu"}], "author_count": 1}, {"id": "2606.08686", "category": "cond-mat", "title": "Information Entropy Based Crystal Structure Prediction of Chemically Disordered Alloys via Graph Convolutional Neural Networks", "abstract": "The phase prediction of chemically disordered alloys poses a significant computational challenge due to the combinatorial complexity of such materials. The high-throughput compositional exploration of chemically disordered alloys, including high-entropy alloys, requires an approach to efficiently explore the potential energy landscape of such complex materials. Additionally, a metric to quantify the potential energy landscape explored for phase prediction of the compositions needs to be defined. We propose an information-theoretic approach to phase prediction in chemically disordered alloys in the present work. We demonstrate the applicability of alchemical Monte Carlo sampling using an efficient Graph Convolutional Neural Network-Based machine learning model. We additionally demonstrate the applicability and limitations of the Bond Disproportion Vector (BDV) as a low-computational-cost descriptor and benchmark it against the state-of-the-art Smooth Overlap of Atomic Positions (SOAP) descriptor. We show the applicability of an information entropy-based metric for the phase prediction of binary (CoNi, MoW, FeNi and TaW), ternary (CoCrNi, CrFeNi), quaternary (CoCrFeNi) and quinary ($\\mathrm{Al_x(CoCrFeNi)_{1-x}}$) alloys. Information entropy-based phase prediction can be applicable in challenging cases where conventional approaches are not feasible.", "url": "https://arxiv.org/abs/2606.08686", "type": "理论+数值", "summary": "由于此类材料的组合复杂性，化学无序合金的相预测提出了重大的计算挑战。化学无序合金（包括高熵合金）的高通量成分探索需要一种有效探索此类复杂材料的势能景观的方法。此外，需要定义一个度量来量化为组合物的相预测而探索的势能景观。在目前的工作中，我们提出了一种信息论方法来预测化学无序合金的相。我们使用基于图卷积神经网络的高效机器学习模型证明了炼金蒙特卡罗采样的适用性。我们还证明了键歧化向量 (BDV) 作为低计算成本描述符的适用性和局限性，并将其与最先进的原子位置平滑重叠 (SOAP) 描述符进行了基准测试。\n\n我们展示了基于信息熵的度量对二元（CoNi、MoW、FeNi 和 TaW）、三元（CoCrNi、CrFeNi）、四元（CoCrFeNi）和五元（$\\mathrm{Al_x(CoCrFeNi)_{1-x}}$）合金相预测的适用性。基于信息熵的相位预测可适用于传统方法不可行的挑战性情况。", "authors": [{"name": "Suman Chabri"}, {"name": "Gautam Anand"}], "featured_authors": [{"name": "Suman Chabri"}, {"name": "Gautam Anand"}], "author_count": 2}, {"id": "2606.08689", "category": "cond-mat", "title": "Dynamical cavity method for continuous-time complex systems on sparse random graphs", "abstract": "Dynamical mean-field theory (DMFT) reduces dense high-dimensional disordered dynamics to a self-consistent effective stochastic process. For sparse and heterogeneous networks, however, local fields contain finitely many strong inputs, so the Gaussian closure mechanisms of dense DMFT need not apply. We develop a continuous-time cavity derivation of sparse-network DMFT at the level of path measures for stochastic dynamics with general pairwise interactions on sparse random graphs. The cavity equations are exact on trees and yield the finite-time thermodynamic description on locally tree-like graphs. They show explicitly how reciprocity changes dynamical closure: fully directed graphs recover the sparse directed path-probability equation, whereas reciprocal or bidirected edges require conditional path kernels driven by the imposed history of the receiving node. Ensemble averaging gives laws over path-probability messages, with barycenters and higher-message moments closing by multilinearity and independence of incoming branches. A causal discrete-time derivation yields the corresponding population-dynamics representation, distinguishing trajectory populations for directed graphs from conditional branch-law or finite-depth tree populations for reciprocal graphs. We also formulate finite-memory numerical closures and test them in an additive-input recurrent neural network specialization. Finally, high-connectivity limits are obtained as projections of the sparse path-measure theory, clarifying when dense drift, noise, and response channels reduce to standard low-dimensional DMFT and when path-level descriptions remain essential.", "url": "https://arxiv.org/abs/2606.08689", "type": "理论+数值", "summary": "动态平均场理论（DMFT）将密集的高维无序动力学简化为自洽的有效随机过程。然而，对于稀疏和异构网络，局部域包含有限多个强输入，因此不需要应用密集 DMFT 的高斯闭包机制。我们在稀疏随机图上具有一般成对相互作用的随机动力学的路径测量水平上开发了稀疏网络 DMFT 的连续时间腔推导。空腔方程在树上是精确的，并在局部树状图上产生有限时间热力学描述。它们明确地展示了互易如何改变动态闭包：全有向图恢复稀疏有向路径概率方程，而互易或双向边需要由接收节点的强加历史驱动的条件路径内核。集合平均给出了路径概率消息的规律，其中重心和更高的消息矩通过多重线性和传入分支的独立性而闭合。\n\n因果离散时间推导产生相应的群体动态表示，将有向图的轨迹群体与倒数图的条件分支律或有限深度树群体区分开来。我们还制定了有限内存数值闭包，并在加性输入递归神经网络专门化中对其进行了测试。最后，获得高连通性限制作为稀疏路径测量理论的投影，阐明何时密集漂移、噪声和响应通道减少到标准低维 DMFT 以及何时路径级描述仍然重要。", "authors": [{"name": "Fernando L. Metz"}, {"name": "Isaac Pérez Castillo"}], "featured_authors": [{"name": "Fernando L. Metz"}, {"name": "Isaac Pérez Castillo"}], "author_count": 2}, {"id": "2606.08732", "category": "cond-mat", "title": "Wave Resistance for Stochastic Motion at Interfaces", "abstract": "Wave resistance is the drag generated by the wave radiation that a source moving at a fluid interface sustains. Under stochastic trajectories, the mean drag is controlled by the ensemble-averaged surface profile built from the trajectory history. We show that the result is a finite resistance below the deterministic radiation threshold and a regularization of the singular response at the minimum phase velocity of the capillary-gravity waves. We derive explicit scaling laws for drifted Brownian trajectories, including a universal high-diffusivity decay. For drifted Lévy flight, we find the mean wave resistance in closed-form, extending wave-drag theory to non-Gaussian trajectories.", "url": "https://arxiv.org/abs/2606.08732", "type": "理论", "summary": "波阻是由在流体界面移动的源所承受的波辐射产生的阻力。在随机轨迹下，平均阻力由根据轨迹历史构建的整体平均表面轮廓控制。我们证明结果是低于确定性辐射阈值的有限电阻以及毛细重力波最小相速度下的奇异响应的正则化。我们得出了漂移布朗轨迹的明确标度定律，包括普遍的高扩散率衰减。对于漂移的莱维飞行，我们找到了封闭形式的平均波阻，将波阻力理论扩展到非高斯轨迹。", "authors": [{"name": "Maxence Arutkin"}, {"name": "Shlomi Reuveni"}, {"name": "Elie Raphael"}], "featured_authors": [{"name": "Maxence Arutkin"}, {"name": "Shlomi Reuveni"}, {"name": "Elie Raphael"}], "author_count": 3}, {"id": "2606.08757", "category": "cond-mat", "title": "Chiral-Angle-Controlled Altermagnetic Spin Splitting in Nanotubes", "abstract": "Altermagnets exhibit momentum-dependent spin splitting despite having zero net magnetization. Here, we show that rolling a two-dimensional (2D) $d$-wave altermagnet into a nanotube transforms this momentum-dependent spin splitting into chiral-angle-controlled one-dimensional (1D) spin splitting through dimensional projection. Using a minimal tight-binding model and first-principles calculations, we demonstrate that the nanotube spin splitting follows a characteristic $\\cos(2\\theta)$ dependence, vanishing for nodal orientations and reaching extrema for antinodal orientations. The mechanism remains robust across a broad class of nanotubes derived from 2D altermagnets. Our results establish dimensional projection as a general route for transferring momentum-dependent altermagnetic spin splitting into 1D systems and provide a framework for engineering spin-split quantum states in low-dimensional magnetic materials.", "url": "https://arxiv.org/abs/2606.08757", "type": "理论+数值", "summary": "尽管交变磁体的净磁化强度为零，但仍表现出动量相关的自旋分裂。在这里，我们证明，将二维（2D）$d$波交替磁体滚动到纳米管中，可以通过维度投影将这种动量相关的自旋分裂转变为手性角度控制的一维（1D）自旋分裂。使用最小紧束缚模型和第一原理计算，我们证明纳米管自旋分裂遵循特征 $\\cos(2\\theta)$ 依赖性，节点方向消失并达到反节点方向的极值。该机制在二维交变磁体衍生的多种纳米管中仍然保持稳健。我们的结果将维度投影确立为将动量相关的互磁自旋分裂转移到一维系统的一般途径，并为低维磁性材料中的自旋分裂量子态的工程提供了框架。", "authors": [{"name": "Ersoy Sasioglu"}, {"name": "Tom. G. Saunderson"}, {"name": "Börge Göbel"}, {"name": "Ingrid Mertig"}, {"name": "Samir Lounis"}], "featured_authors": [{"name": "Ersoy Sasioglu"}, {"name": "Tom. G. Saunderson"}, {"name": "Börge Göbel"}, {"name": "Ingrid Mertig"}, {"name": "Samir Lounis"}], "author_count": 5}, {"id": "2606.08801", "category": "cond-mat", "title": "Fluctuation-stable generalized entropy probes of spectral heterogeneity", "abstract": "Generalized entropy measures are widely used to characterize localization and multifractality, and the regime \\(q>1\\) is often empirically found to exhibit improved numerical stability and cleaner scaling behavior. Here, we develop a fluctuation-stability framework for generalized entropy diagnostics and show that weak-amplitude spectral fluctuations are amplified for \\(q<1\\) and suppressed for \\(q>1\\), thereby providing a theoretical basis for the physically robust \\(q>1\\) regime. A thermodynamic scaling analysis further identifies an asymptotically stable regime beyond a critical threshold. As an application, we introduce the entropy-gradient susceptibility \\(\\chi_q\\) as a coarse-grained probe of spectral heterogeneity. Using the Aubry-André and generalized Aubry-André models, we demonstrate that \\(\\chi_q\\) sharply distinguishes homogeneous localization transitions from mobility-edge coexistence regimes. Our results establish fluctuation stability as a guiding principle for generalized entropy diagnostics in quasiperiodic systems.", "url": "https://arxiv.org/abs/2606.08801", "type": "理论+数值", "summary": "广义熵度量被广泛用于表征局域化和多重分形，并且经验证明\\(q>1\\)经常表现出改进的数值稳定性和更清晰的标度行为。在这里，我们为广义熵诊断开发了一个波动稳定性框架，并表明弱幅度谱波动在 \\(q<1\\) 时被放大，在 \\(q>1\\) 时被抑制，从而为物理稳健的 \\(q>1\\) 机制提供了理论基础。热力学标度分析进一步确定了超出临界阈值的渐近稳定状态。作为一个应用，我们引入熵梯度磁化率 \\(\\chi_q\\) 作为光谱异质性的粗粒度探针。使用 Aubry-André 和广义 Aubry-André 模型，我们证明 \\(\\chi_q\\) 可以清楚地区分同质定位转换与移动边缘共存机制。我们的结果将涨落稳定性确立为准周期系统广义熵诊断的指导原则。", "authors": [{"name": "Arpita Goswami"}], "featured_authors": [{"name": "Arpita Goswami"}], "author_count": 1}, {"id": "2606.08805", "category": "cond-mat", "title": "Predictable Mean-Field Chaos in Random Recurrent Networks", "abstract": "Dynamical mean-field theory recasts deterministic chaos in random recurrent networks as an effective stochastic process. We show that for analytic nonlinearities with sufficiently fast Fourier decay, this stochasticity is only apparent: the continuous past of a realized mean-field trajectory uniquely determines its future. The mean-field theory is therefore not merely an ensemble description, but a conditional prediction theory for individual trajectories. Unfolding the power spectrum into a Krylov state space exposes how this latent determinism is organized across an infinite hierarchy of temporal modes. The associated Krylov growth rate sets the complexity of finite-resolution prediction and upper-bounds the largest Lyapunov exponent in this class of networks. Thus, microscopic sensitivity and predictive complexity are distinct aspects of mean-field chaos. Our results extend Krylov growth ideas developed for Hamiltonian chaotic dynamics to classical dissipative systems.", "url": "https://arxiv.org/abs/2606.08805", "type": "理论", "summary": "动态平均场理论将随机循环网络中的确定性混沌重塑为有效的随机过程。我们表明，对于具有足够快傅立叶衰减的解析非线性，这种随机性只是明显的：已实现的平均场轨迹的连续过去唯一地决定了其未来。因此，平均场理论不仅仅是一种系综描述，而且是个体轨迹的条件预测理论。将功率谱展开到克雷洛夫状态空间中，揭示了这种潜在的决定论是如何在无限的时间模式层次​​结构中组织的。相关的克雷洛夫增长率设定了有限分辨率预测的复杂性以及此类网络中最大李雅普诺夫指数的上限。因此，微观灵敏度和预测复杂性是平均场混沌的不同方面。我们的结果将针对哈密顿混沌动力学开发的克雷洛夫增长思想扩展到经典耗散系统。", "authors": [{"name": "Alkesh Yadav"}, {"name": "Vladimir Shaidurov"}, {"name": "Jonathan Kadmon"}], "featured_authors": [{"name": "Alkesh Yadav"}, {"name": "Vladimir Shaidurov"}, {"name": "Jonathan Kadmon"}], "author_count": 3}, {"id": "2606.08839", "category": "cond-mat", "title": "Time Evolution of Heat Conduction in a Generalized Model of Brownian Motion", "abstract": "We investigate the properties of heat conduction in a network of harmonic oscillators interacting with heat baths, described by a generalized model of Brownian motion. This model includes noise and dissipation terms in both the momentum and position equations. This generalization is motivated by the requirement of consistency with the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) equation. Because standard definitions of heat current based on velocity become mathematically inconsistent in this framework, we derive an analytical expression for the steady-state heat flow based on an extended framework of stochastic energetics. We confirm that Fourier's law (linear thermal response) is satisfied and that the model naturally captures microscopic thermal boundary resistance, analogous to Kapitza resistance. This demonstrates that our generalized model functions as a valid phenomenological framework for simulating non-equilibrium processes, marking a crucial step toward a unified formulation of stochastic and quantum thermodynamics. Furthermore, we analyze the time evolution of heat conduction by numerically solving the corresponding differential equations for the correlation functions. Unlike standard Brownian motion, the generalized model generates continuous and nowhere differentiable trajectories for both momentum and position (as is characteristic of overdamped dynamics). Finally, we show that the heat current exhibits characteristic transient behavior when the inter-particle interaction is switched on. Specifically, an instantaneous heat flow emerges, whose direction is strictly governed by whether the interaction is attractive or repulsive, significantly differing from the predictions of the standard model.", "url": "https://arxiv.org/abs/2606.08839", "type": "理论+数值", "summary": "我们研究了与热浴相互作用的谐振子网络中的热传导特性，通过布朗运动的广义模型进行描述。该模型在动量方程和位置方程中都包含噪声和耗散项。这种概括的动机是要求与 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 方程保持一致。由于基于速度的热流的标准定义在该框架中在数学上变得不一致，因此我们基于随机能量学的扩展框架得出了稳态热流的解析表达式。我们确认满足傅里叶定律（线性热响应），并且该模型自然地捕获微观热边界阻力，类似于卡皮查阻力。这表明我们的广义模型可以作为模拟非平衡过程的有效现象学框架，标志着朝着随机和量子热力学的统一表述迈出了关键的一步。此外，我们通过数值求解相关函数的相应微分方程来分析热传导的时间演化。\n\n与标准布朗运动不同，广义模型为动量和位置生成连续且无处可微的轨迹（这是过阻尼动力学的特征）。最后，我们表明，当粒子间相互作用打开时，热流表现出特征瞬态行为。具体来说，出现了瞬时热流，其方向严格取决于相互作用是吸引还是排斥，与标准模型的预测显着不同。", "authors": [{"name": "T. Koide"}, {"name": "F. Nicacio"}], "featured_authors": [{"name": "T. Koide"}, {"name": "F. Nicacio"}], "author_count": 2}, {"id": "2606.08868", "category": "cond-mat", "title": "Topological invariant responsible for the integer QHE and non-commutative geometry", "abstract": "We consider a wide class of $2D$ tight - binding models of solid state physics. These models are, in the most general case, non - homogeneous. The topological invariant ${\\cal N}_3$ responsible for the quantization of the Hall conductivity, for the specific case of the integer quantum Hall effect in $2D$, is expressed through the Wigner transformation of the two-point electron Matsubara Green function. We express this invariant as a pairing of the element of the $K^{-1}$ group (generated by the Green function) with the specific element of the cyclic cohomology group $HC^3$. According to a set of local index theorems the values of ${\\cal N}_3$ can be shown to be integer for a limited class of tight - binding models.", "url": "https://arxiv.org/abs/2606.08868", "type": "理论", "summary": "我们考虑一类广泛的固态物理 $2D$ 紧束缚模型。在最一般的情况下，这些模型是非同质的。对于 $2D$ 中整数量子霍尔效应的具体情况，负责霍尔电导率量子化的拓扑不变量 ${\\cal N}_3$ 通过两点电子松原格林函数的维格纳变换来表达。我们将此不变量表示为 $K^{-1}$ 群（由格林函数生成）的元素与循环上同调群 $HC^3$ 的特定元素的配对。根据一组局部索引定理，对于有限类紧束缚模型，${\\cal N}_3$ 的值可以显示为整数。", "authors": [{"name": "G. Kovyrshin"}, {"name": "A. Mekrami"}, {"name": "J. Miller"}, {"name": "M.A. Zubkov"}, {"name": "A. Zuevsky"}], "featured_authors": [{"name": "G. Kovyrshin"}, {"name": "A. Mekrami"}, {"name": "J. Miller"}, {"name": "M.A. Zubkov"}, {"name": "A. Zuevsky"}], "author_count": 5}, {"id": "2606.08915", "category": "cond-mat", "title": "Local electronic structure and dynamics of hydrogen in $\\text{CeO}_2$", "abstract": "The local electronic states of muon (Mu) as an isotope of hydrogen (H) in high-quality single-crystalline ceria (CeO$_2$) are investigated using muon spin rotation/relaxation ($\\mu\\text{SR}$) and first-principles density functional theory (DFT) calculations. Upon positive muon implantation, both paramagnetic (Mu$^0$) and diamagnetic (Mu$^*$) states are observed below $\\approx$10 K. Magnetic field dependence of the Mu$^0$ signals combined with DFT results provi
