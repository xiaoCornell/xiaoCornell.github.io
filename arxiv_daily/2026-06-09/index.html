 group integrals over $U(N)$ and $SO(d)$ (or $ O(d)$). The micro-canonical heat capacity in this regime is negative and turns positive, at a critical value $k_{\\rm crit}$, due to finite $N$ modifications to the counting, thus forming what we denote as a characteristic caloric fold in the $ E $ versus $T$ curve. Data from the pairing formula is well fitted by $k_{\\rm crit} \\sim { N^2 \\over 4 }$ for small values of $d$. A derivation of this large $N$ formula is given using a matrix model approximation and semi-classical analysis of the eigenvalue density. The large $N,d$ limit of the degeneracies reveals a key role for ribbon graph combinatorics. The caloric fold is also notably a property of black hole thermodynamics in anti-de-Sitter spaces. We propose the spherically symmetric \\(SO(d)\\) and \\(O(d)\\) invariant sectors of \\(d\\)-matrix quantum mechanics as tractable matrix systems for capturing key features of dual descriptions of black-hole thermodynamics.", "url": "https://arxiv.org/abs/2606.09521", "type": "理论", "summary": "我们考虑具有 $U(N)$ 规范对称性的玻色 $d$ 矩阵谐振子的 $SO(d)$ 和 $O(d)$ 不变扇区。固定能量 $k$ 的微正则简并性 $\\mathcal{Z}( N , d , k )$ 表示为整数 $k$ 分区空间中 $N$ 相关向量和 $d$ 相关向量之间的配对。该配对公式是通过计算多矩阵变量 $X^i_{j,a}$ 中的不变词、使用对称群 $S_k$ 的 Clebsch-Gordan 多重性（克罗内克系数）属性、Schur-Weyl 对偶性以及齐次空间 $U(d)/SO(d)$ 上的调和分析而导出的。使用 $U(N)$ 和 $SO(d)$（或 $O(d)$）上的群积分获得大 $N$ 和 $k$ 以及 $ k \\le N $ 的解析公式。由于对计数进行了有限的 $N$ 修改，该状态下的微规范热容为负值，并在临界值 $k_{\\rm crit}$ 处变为正值，从而形成了我们在 $E $ 与 $T$ 曲线中表示的特征热量折叠。对于较小的 $d$ 值，配对公式中的数据可以通过 $k_{\\rm crit} \\sim { N^2 \\over 4 }$ 很好地拟合。\n\n使用矩阵模型近似和特征值密度的半经典分析给出了这个大 $N$ 公式的推导。简并性的大 $N,d$ 极限揭示了带状图组合学的关键作用。热量折叠也是反德西特空间中黑洞热力学的一个值得注意的特性。我们提出\\(d\\)-矩阵量子力学的球对称\\(SO(d)\\)和\\(O(d)\\)不变扇区作为易于处理的矩阵系统，用于捕获黑洞热力学对偶描述的关键特征。", "authors": [{"name": "Denjoe O'Connor"}, {"name": "Sanjaye Ramgoolam"}], "featured_authors": [{"name": "Denjoe O'Connor"}, {"name": "Sanjaye Ramgoolam"}], "author_count": 2}, {"id": "2606.09752", "category": "hep-th", "title": "Double-Current Deformations of Two-Dimensional QFTs with Anomalies", "abstract": "We construct the double-current deformations of two-dimensional quantum field theories whose partition functions have background gauge-field anomalies. Extending the path integral construction of [1], we couple the seed theory to dynamical gauge fields and compact Stueckelberg fields and insert parallel transport in the anomaly line bundle. The deformed partition function then has the same anomaly as the undeformed one. For flat background gauge fields the Stueckelberg non-zero modes localize the dynamical gauge fields to flat connections, reducing the deformation to a finite-dimensional holonomy integral. We derive the integral kernel on the torus and its higher-genus generalization. For the compact boson, or equivalently the Abelian $U(1)$ WZW model, the kernel gives a Gaussian transform of the torus partition function: at zero background the spectrum is obtained by $k\\to K_\\lambda$, while contact terms and spectral-flow data remain controlled by the original anomaly. We also formulate the anomaly-compatible non-Abelian and homogeneous Yang-Baxter generalization.", "url": "https://arxiv.org/abs/2606.09752", "type": "理论", "summary": "我们构造了二维量子场论的双流变形，其配分函数具有背景规范场异常。扩展[1]的路径积分构造，我们将种子理论与动态规范场和紧致Stueckelberg场耦合，并在异常线束中插入并行传输。变形的配分函数与未变形的配分函数具有相同的异常。对于平坦背景规范场，Stueckelberg 非零模式将动态规范场局部化为平坦连接，从而将变形减少为有限维完整积分。我们推导了环面上的积分核及其更高属的推广。对于紧致玻色子，或者等效的阿贝尔 $U(1)$ WZW 模型，内核给出环面配分函数的高斯变换：在零背景下，谱由 $k\\to K_\\lambda$ 获得，而接触项和谱流数据仍然受原始异常控制。我们还制定了异常兼容的非阿贝尔且齐次的 Yang-Baxter 泛化。", "authors": [{"name": "Zhengyuan Du"}], "featured_authors": [{"name": "Zhengyuan Du"}], "author_count": 1}, {"id": "2606.09769", "category": "hep-th", "title": "All-multiplicity monodromy and KLT relations for AdS string integrals", "abstract": "We propose and study all-multiplicity building blocks for tree-level string amplitudes in AdS. These are worldsheet integrals obtained by dressing the corresponding flat-space disc and sphere integrals with multivariable multiple polylogarithms and their single-valued analogues, respectively. We derive monodromy relations for the open-string building blocks and a KLT factorisation for their closed-string counterparts. This extends the non-commutative AdS uplift of lower-point flat-space structures to general $n$-point kinematics.", "url": "https://arxiv.org/abs/2606.09769", "type": "理论", "summary": "我们提出并研究了 AdS 中树级弦振幅的所有多重性构建块。这些是通过分别用多变量多重多对数及其单值类似物修饰相应的平坦空间圆盘和球积分而获得的世界表积分。我们推导了开弦构建块的一元关系和闭弦构建块的 KLT 分解。这将低点平坦空间结构的非交换 AdS 提升扩展到一般 $n$ 点运动学。", "authors": [{"name": "Maria Nocchi"}, {"name": "Rodrigo Schmidt Pitombo"}, {"name": "Aurélie Strömholm Sangaré"}, {"name": "Yi-Xiao Tao"}], "featured_authors": [{"name": "Maria Nocchi"}, {"name": "Rodrigo Schmidt Pitombo"}, {"name": "Aurélie Strömholm Sangaré"}, {"name": "Yi-Xiao Tao"}], "author_count": 4}, {"id": "2606.09781", "category": "hep-th", "title": "Topological defects and scalar field modes in warped geometries", "abstract": "We develop a general framework for investigating the influence of topological defects on the local characteristics of a quantum scalar field in a warped geometry background. The Ricci tensor and curvature scalar are decomposed into contributions from the warp factor, the radial geometry and the angular defect structure. For an arbitrary curvature coupling parameter, the field equation is separated into independent radial, angular and warp-coordinate parts. A complete set of normalized mode functions is obtained for general values of the angular deficit parameters. The general formalism is applied to several specific cases, such as conformally flat warped spacetimes, generalized cosmic strings, global monopoles and anti-de Sitter (AdS)-type warped geometries. The Hadamard two-point function is then evaluated for a global monopole in AdS spacetime using the obtained mode functions.", "url": "https://arxiv.org/abs/2606.09781", "type": "理论", "summary": "我们开发了一个通用框架，用于研究拓扑缺陷对扭曲几何背景下量子标量场局部特征的影响。 Ricci 张量和曲率标量被分解为翘曲因子、径向几何和角缺陷结构的贡献。对于任意曲率耦合参数，场方程被分成独立的径向、角度和扭曲坐标部分。对于角度赤字参数的一般值，获得了完整的归一化模式函数集。一般形式主义适用于几种具体情况，例如共形平坦扭曲时空、广义宇宙弦、全局单极子和反德西特（AdS）型扭曲几何。然后使用获得的模态函数评估 AdS 时空中的全局单极子 Hadamard 两点函数。", "authors": [{"name": "A. A. Saharian"}, {"name": "E. L. Karapetyan"}, {"name": "G. V. Mirzoyan"}], "featured_authors": [{"name": "A. A. Saharian"}, {"name": "E. L. Karapetyan"}, {"name": "G. V. Mirzoyan"}], "author_count": 3}, {"id": "2606.07826", "category": "math-ph", "title": "The classical boundaries of the EPR argument and quantum ontology", "abstract": "Von Neumann's Hilbert-space formalism of quantum mechanics constitutes a logico-physical theory of observed or measured reality. Imposing the logical constraint of Booleanity, essential for objectively shareable descriptions among observers, reveals the physical meaning of classicality inherently embedded within the formalism itself. Starting from this consideration, the present work reformulates the quantum-classical transition via Hilbert-space classical mechanics (HCM), grounding classicality not in the dynamical limit ($\\hbar \\to 0$), but in the logical constraint of Booleanity (i.e., the mutual commutativity of preparable states). Within this state-centric framework, applying the Einstein-Podolsky-Rosen (EPR) criterion alongside locality and measurement independence reduces standard quantum mechanics to the HCM model. Thus, the EPR argument reveals not quantum incompleteness, but the implicit classical boundaries of its own premises. To resolve this impasse, we articulate a nuanced quantum ontology grounded in a fundamental structural bipartition between the observational environment and the observed object, which accommodates three categorical distinctions: ontic, processional, and tropos-existential. Building on this, we propose a criterion of objective reality wherein descriptive objectivity is treated as merely a sufficient condition for physical reality. This addresses the historical Bohr-Einstein ambiguity, enabling the quantum formalism to ontologically unify objective measured phenomena and non-objective observed interference within a context-dependent framework.", "url": "https://arxiv.org/abs/2606.07826", "type": "理论", "summary": "冯·诺依曼的量子力学希尔伯特空间形式主义构成了观察或测量现实的逻辑物理理论。施加布尔性的逻辑约束对于观察者之间客观地共享描述至关重要，揭示了形式主义本身固有的古典性的物理意义。从这个考虑出发，当前的工作通过希尔伯特空间经典力学（HCM）重新表述了量子经典转变，经典性不是基于动力学极限（$\\hbar \\to 0$），而是基于布尔性的逻辑约束（即可制备态的相互交换性）。在这个以状态为中心的框架内，应用爱因斯坦-波多尔斯基-罗森 (EPR) 准则以及局域性和测量独立性将标准量子力学简化为 HCM 模型。因此，EPR 论证揭示的不是量子不完备性，而是其自身前提的隐含经典边界。\n\n为了解决这一僵局，我们阐明了一种微妙的量子本体论，该本体论基于观测环境和被观测对象之间的基本结构二分，它容纳了三个类别的区别：本体论、过程论和对流存在论。在此基础上，我们提出了客观现实的标准，其中描述性客观性仅被视​​为物理现实的充分条件。这解决了历史上的玻尔-爱因斯坦模糊性，使量子形式主义能够在与上下文相关的框架内本体论上统一客观测量的现象和非客观观察到的干扰。", "authors": [{"name": "Vincenzo Chilla"}], "featured_authors": [{"name": "Vincenzo Chilla"}], "author_count": 1}, {"id": "2606.07927", "category": "math-ph", "title": "Mathematical crystal chemistry: A formal theory for crystal structure prediction by generalized disjunctive programming", "abstract": "Inorganic structural chemistry leads naturally to a theory for crystal structure prediction formalized by a generalized disjunctive programming (GDP), which is formulated using continuous and Boolean variables to involve the algebraic equations, disjunctions, and logic propositions. Since the feasibilities of continuous variables change drastically depending on Boolean variables and vice versa, iterative optimization of continuous and Boolean variables efficiently transforms a randomly generated initial structure into an optimal solution. Boolean variables are introduced to elucidate the ``combinatorial backbone'' of the original continuous optimization problem, which corresponds to the graphs describing crystal structures with clear chemical meanings. Since many subgraphs are discovered in numerous graphs generated through structural optimizations, on-the-fly learning of the feasibilities of them accelerates the discovery of the optimal solutions. This theory enables designing a wide variety of crystal structures with small computations based on only the atomic radii and feasible coordination numbers of each atom.", "url": "https://arxiv.org/abs/2606.07927", "type": "理论", "summary": "无机结构化学自然地产生了一种通过广义析取规划（GDP）形式化的晶体结构预测理论，该理论使用连续变量和布尔变量来制定，涉及代数方程、析取和逻辑命题。由于连续变量的可行性根据布尔变量而发生巨大变化，反之亦然，连续变量和布尔变量的迭代优化有效地将随机生成的初始结构转换为最优解。引入布尔变量来阐明原始连续优化问题的“组合主干”，它对应于描述具有明确化学含义的晶体结构的图。由于在通过结构优化生成的众多图中发现了许多子图，因此对其可行性的即时学习可以加速最佳解决方案的发现。该理论使得仅基于原子半径和每个原子的可行配位数即可通过少量计算来设计各种晶体结构。", "authors": [{"name": "Ryotaro Koshoji"}], "featured_authors": [{"name": "Ryotaro Koshoji"}], "author_count": 1}, {"id": "2606.08215", "category": "math-ph", "title": "Structure of Clifford groups of composite finite quantum systems", "abstract": "In this paper the Clifford groups of general multipartite quantum systems with configuration space $\\mathbb{Z}_{n_1}\\oplus\\cdots\\oplus\\mathbb{Z}_{n_k}$, $k\\geq 1$ are studied. It is known that the Clifford group is a natural semidirect product provided the dimension $N=n_1\\cdots n_k$ of the corresponding Hilbert space is an odd number. For even $N$ special results on the Clifford groups are scattered in the mathematical literature, but they do not concern the semidirect product structure. Using the relation of generators of the associated symplectic group $\\mathrm{Sp}_{[n_1,\\dots,n_k]}$ we prove that for even $N=n_1\\cdots n_k$ both Clifford group and the projective Clifford group are natural semidirect products if and only if $N$ is not divisible by four.", "url": "https://arxiv.org/abs/2606.08215", "type": "理论", "summary": "本文研究了具有配置空间 $\\mathbb{Z}_{n_1}\\oplus\\cdots\\oplus\\mathbb{Z}_{n_k}$, $k\\geq 1$ 的一般多部分量子系统的 Clifford 群。已知如果对应的希尔伯特空间的维度 $N=n_1\\cdots n_k$ 为奇数，Clifford 群是自然半直积。即使是 $N$，Clifford 群的特殊结果也分散在数学文献中，但它们并不涉及半直积结构。利用相关辛群$\\mathrm{Sp}_{[n_1,\\dots,n_k]}$的生成元关系，我们证明即使$N=n_1\\cdots n_k$，Clifford群和射影Clifford群都是自然半直积当且仅当$N$不能被4整除时。", "authors": [{"name": "Miroslav Korbelář"}, {"name": "Jiří Tolar"}], "featured_authors": [{"name": "Miroslav Korbelář"}, {"name": "Jiří Tolar"}], "author_count": 2}, {"id": "2606.08747", "category": "math-ph", "title": "A Unified Framework for Virtual Wave Transform: From Generalized Formulation to Excitation-Specific Projection", "abstract": "We present a unified theoretical framework for the mapping between diffusive and wave-like dynamics, formulated as a spectral integral operator acting on temporal fields. By introducing an analytic continuation in the complex frequency plane, we establish an explicit correspondence between thermal diffusion and a virtual wave field governed by a hyperbolic equation. This mapping is shown to define a causal, compact Fredholm operator that acts as a nonstationary low-pass filter, thereby revealing the intrinsic information loss of diffusive processes and the fundamental ill-posedness of the inverse reconstruction. Within this operator framework, we demonstrate that commonly used excitation schemes-including pulse, lock-in, chirped, and coded excitations-emerge as distinct projections onto subspaces of a single underlying transformation, corresponding to different sampling strategies of its spectral structure. This unifies previously disparate virtual wave formulations and provides a systematic interpretation of excitation design in terms of operator sampling and information encoding. The framework further generalizes to matrix-valued systems and suggests a spectral-geometric interpretation of temporal evolution across diffusive and propagative regimes.", "url": "https://arxiv.org/abs/2606.08747", "type": "理论", "summary": "我们提出了一个统一的理论框架，用于扩散和波状动力学之间的映射，将其表述为作用于时间场的谱积分算子。通过在复频率平面中引入解析延拓，我们在热扩散和由双曲方程控制的虚拟波场之间建立了明确的对应关系。该映射定义了一个因果紧凑的 Fredholm 算子，该算子充当非平稳低通滤波器，从而揭示了扩散过程的内在信息损失和逆重构的基本不适定性。在此算子框架内，我们证明了常用的激励方案（包括脉冲、锁定、线性调频和编码激励）作为单个基础变换的子空间上的不同投影出现，对应于其谱结构的不同采样策略。这统一了以前不同的虚拟波公式，并在算子采样和信息编码方面提供了激励设计的系统解释。\n\n该框架进一步推广到矩阵值系统，并提出了跨扩散和传播机制的时间演化的谱几何解释。", "authors": [{"name": "Pengfei Zhu"}, {"name": "Julien Lecompagnon"}, {"name": "Philipp Daniel Hirsch"}, {"name": "Mathias Ziegler"}], "featured_authors": [{"name": "Pengfei Zhu"}, {"name": "Julien Lecompagnon"}, {"name": "Philipp Daniel Hirsch"}, {"name": "Mathias Ziegler"}], "author_count": 4}, {"id": "2606.08753", "category": "math-ph", "title": "Tight-Binding Spectra of Finite Incidence Geometries: From Spatial Localization to $SU(6)$ Flavor Symmetry", "abstract": "We investigate the spectral properties of tight-binding quantum Hamiltonians defined on the bipartite Levi graphs of finite geometric configurations. In Part I, we analyze the $10_3$ Desargues and Kantor configurations, demonstrating how deterministic spatial deformations induced by real planar embeddings ($\\mathbb{R}\\mathbb{P}^2$) destroy translational symmetry, leading to structural wave localization. We show how embedding in the complex projective plane ($\\mathbb{C}\\mathbb{P}^2$) restores Bloch wave propagation via synthetic gauge phases. In Part II, we evaluate the Schläfli double six ($12_5, 30_2$) and the Cremona-Richmond ($15_3$) configurations in $\\mathbb{R}^3$. We analytically derive their exact spectral decompositions, confirming the existence of macroscopic zero-energy flat bands ($E=0$) driven entirely by geometric frustration. In Part III, we establish a formal structural isomorphism between these discrete tight-binding networks and the flavor symmetry sector of the Standard Model. We map the Schläfli graph to the $SU(6)$ flavor multiplets, where the flat band corresponds to the kinematic freezing of ultra-heavy baryons. Finally, we discuss the complementary Cremona-Richmond $15_3$ topology, demonstrating how its distinct geometric nature (based on tritangent planes rather than point intersections) provides a purely algebraic, topological completion to the $W(E_6)$ symmetry of the 27 lines.", "url": "https://arxiv.org/abs/2606.08753", "type": "理论", "summary": "我们研究了在有限几何构型的二分列维图上定义的紧束缚量子哈密顿量的光谱特性。在第一部分中，我们分析了 $10_3$ Desargues 和 Kantor 配置，展示了真实平面嵌入 ​​($\\mathbb{R}\\mathbb{P}^2$) 引起的确定性空间变形如何破坏平移对称性，从而导致结构波局域化。我们展示了复杂射影平面 ($\\mathbb{C}\\mathbb{P}^2$) 中的嵌入如何通过合成规范相位恢复布洛赫波传播。在第二部分中，我们评估 $\\mathbb{R}^3$ 中的 Schläfli 双六 ($12_5, 30_2$) 和 Cremona-Richmond ($15_3$) 配置。我们通过分析推导了它们精确的光谱分解，证实了完全由几何挫败驱动的宏观零能量平带（$E=0$）的存在。在第三部分中，我们在这些离散紧束缚网络和标准模型的风味对称部分之间建立了正式的结构同构。我们将 Schläfli 图映射到 $SU(6)$ 风味多重态，其中平带对应于超重重子的运动学冻结。\n\n最后，我们讨论互补的克雷莫纳-里士满 $15_3$ 拓扑，展示其独特的几何性质（基于三切平面而不是点交点）如何为 27 条线的 $W(E_6)$ 对称性提供纯代数的拓扑补全。", "authors": [{"name": "Pawel Nurowski"}], "featured_authors": [{"name": "Pawel Nurowski"}], "author_count": 1}, {"id": "2606.08789", "category": "math-ph", "title": "Elastodynamics from a variational standpoint: integral equalities and inequalities", "abstract": "As it is well known, solutions of equations of nonlinear elastodynamics, representing extremals of the action functional, can form shocks. We adapt the classical approach of Emmy Noether to such singular extremals and derive the appropriately generalized integral relations within Calculus of Variations. We apply them to elastodynamical extremals with shocks, obtaining new integral relations involving kinetic and elastic energies. For the extremals representing thermodynamically admissible (entropy) solutions of the corresponding hyperbolic Euler-Lagrange equations, the classical equalities, characterizing the variational approach of Noether, expectedly transform into ineqalities. We show that, rather remarkably, despite the crucial role of material velocity in the fully inertial energy redistribution processes, the corresponding kinetic energy can be completely eliminated from the expression for the dynamically stored elastic energy, even in the presence of shocks.", "url": "https://arxiv.org/abs/2606.08789", "type": "理论", "summary": "众所周知，代表作用函数极值的非线性弹性动力学方程的解可以形成冲击。我们将艾美·诺特 (Emmy Noether) 的经典方法应用于此类奇异极值，并在变分微积分中推导出适当广义的积分关系。我们将它们应用于具有冲击的弹性动力学极值，获得涉及动能和弹性能的新积分关系。对于代表相应双曲欧拉-拉格朗日方程的热力学允许（熵）解的极值，表征诺特变分方法的经典等式预计会转化为不等式。我们发现，相当引人注目的是，尽管材料速度在完全惯性能量重新分配过程中起着至关重要的作用，但即使存在冲击，相应的动能也可以从动态存储的弹性能的表达式中完全消除。", "authors": [{"name": "Yury Grabovsky"}, {"name": "Lev Truskinovsky"}], "featured_authors": [{"name": "Yury Grabovsky"}, {"name": "Lev Truskinovsky"}], "author_count": 2}, {"id": "2606.08818", "category": "math-ph", "title": "Clapeyron-type theorems in nonlinear elasticity", "abstract": "Clapeyron's Theorem of classical linear elasticity provides a way to explicitly express the energy stored in an equilibrium configuration in terms of the work of the forces applied on the boundary. We derive several new integral relations which can be viewed as nonlinear analogs of this classical result, reinterpreting them as rather general statements within Calculus of Variations. These relations reflect specific properties of Lagrangians, that we call ``partial variational symmetries'', since they are more general than classical variational symmetries. In the framework of nonlinear elasticity, partial variational symmetries, such as scale invariance, or scaling homogeneity, lead, via Noether's analysis to different nonlinear generalizations of Clapeyron's Theorem that combine naturally the work of physical and configurational forces. We present a series of illuminating examples showing the effectiveness of the obtained general results in different problems of nonlinear elasticity.", "url": "https://arxiv.org/abs/2606.08818", "type": "理论", "summary": "经典线弹性克拉佩龙定理提供了一种根据施加在边界上的力的功来明确表达平衡配置中存储的能量的方法。我们推导了几个新的积分关系，它们可以被视为这个经典结果的非线性类似物，将它们重新解释为变分微积分中相当一般的陈述。这些关系反映了拉格朗日量的特定性质，我们称之为“偏变分对称性”，因为它们比经典变分对称性更普遍。在非线性弹性的框架中，偏变分对称性，例如尺度不变性或尺度同质性，通过诺特的分析导致了克拉佩龙定理的不同非线性推广，这些推广自然地结合了物理力和构形力的作用。我们提出了一系列具有启发性的例子，展示了所获得的一般结果在不同的非线性弹性问题中的有效性。", "authors": [{"name": "Yury Grabovsky"}, {"name": "Lev Truskinovsky"}], "featured_authors": [{"name": "Yury Grabovsky"}, {"name": "Lev Truskinovsky"}], "author_count": 2}, {"id": "2606.08900", "category": "math-ph", "title": "Symmetry Regularization of 1D Generalized Coulomb Problems", "abstract": "For the 1D generalized Coulomb problems--a family that includes the quantizations of the 1D generalized Kepler problems of Ma-Meng-Xiao \\cite{MMX2025}--we construct two explicit unitary intertwiners $\\hat\\iota_{\\pm}$, the quantum analogs of the classical symmetry regularization maps $\\iota_{\\pm}$ of \\cite{MMX2025}, that unitarily identify each $H_{\\kappa}$-energy-definite portion of the Hilbert space $L^{2}(\\mathbb{R}_{>0},\\mathrm{d}q)$ with a unitary lowest-weight representation of $\\widetilde{\\mathrm{SL}}(2,\\mathbb{R})$.", "url": "https://arxiv.org/abs/2606.08900", "type": "理论", "summary": "对于一维广义库仑问题（包括 Ma-Meng-Xiao \\cite{MMX2025} 的一维广义开普勒问题的量子化），我们构造了两个显式酉交织子 $\\hat\\iota_{\\pm}$，即 \\cite{MMX2025} 的经典对称正则化映射 $\\iota_{\\pm}$ 的量子类似物，统一标识每个$H_{\\kappa}$-希尔伯特空间 $L^{2}(\\mathbb{R}_{>0},\\mathrm{d}q)$ 的能量定部分，具有 $\\widetilde{\\mathrm{SL}}(2,\\mathbb{R})$ 的酉最低权重表示。", "authors": [{"name": "Zhanqiang Bai"}, {"name": "Junwei Ma"}, {"name": "Guowu Meng"}], "featured_authors": [{"name": "Zhanqiang Bai"}, {"name": "Junwei Ma"}, {"name": "Guowu Meng"}], "author_count": 3}, {"id": "2606.09020", "category": "math-ph", "title": "On an $n-$Dimensional Travel Time Tomography Problem", "abstract": "In their seminal works Herglotz (1905) and Wiechert and Zoeppritz (1907) have solved the so-called Travel Time Tomography Problem (TTTP) in the 1-D case. However, the question about stability estimates and uniqueness theorems for an n-D n>= 2 TTTP with formally determined incomplete input data still mostly stands open after more than one hundred years period. \\textquotedblleft Formally determined input data\" means that the number p of free variables in the input data equals the number $n$ of free variables in the unknown right hand side of the governing nonliniear eikonal PDE, p=n. Some previous publications demonstrate that it is possible to develop well performed numerical methods for the TTTP with formally determined input data, which indicates the importance of such data for practical applications. This is the first publication in which the above question is addressed. More precisely, we consider a semi-discrete case, in which a PDE generated by the eikonal equation is written in finite differences with respect to n-1 variables. In addition, it is assumed that the solution of that semi-discrete PDE is represented via a truncated Fourier-like series with respect to a special orthonormal basis of functions, which depend only on the position of the point source. Under these conditions, Lipschitz stability estimate is proven, and this estimate implies uniqueness. An important tool of this paper is a new Carleman estimate. Carleman Weighted Spaces are introduced. Carleman estimates were not applied previously to address questions about stability estimates and uniqueness theorems for the TTTP.", "url": "https://arxiv.org/abs/2606.09020", "type": "理论", "summary": "Herglotz (1905) 以及 Wiechert 和 Zoeppritz (1907) 在他们的开创性著作中解决了一维情况下的所谓走时断层扫描问题 (TTTP)。然而，关于具有正式确定的不完整输入数据的 n-D n>= 2 TTTP 的稳定性估计和唯一性定理的问题在一百多年后仍然悬而未决。 \\textquotedblleft 正式确定的输入数据”意味着输入数据中自由变量的数量 p 等于控制非线性征函数 PDE 未知右侧的自由变量数量 $n$，p=n。之前的一些出版物表明，可以使用正式确定的输入数据为 TTTP 开发性能良好的数值方法，这表明此类数据对于实际应用的重要性。这是解决上述问题的第一个出版物。更准确地说，我们考虑半离散这种情况下，由 eikonal 方程生成的 PDE 被写成关于 n-1 个变量的有限差分。\n\n此外，假设该半离散偏微分方程的解通过关于特殊正交函数基的截断类傅立叶级数表示，该函数仅取决于点源的位置。在这些条件下，Lipschitz 稳定性估计得到证明，并且该估计意味着唯一性。本文的一个重要工具是新的卡尔曼估计。引入卡尔曼加权空间。以前没有应用卡尔曼估计来解决有关 TTTP 稳定性估计和唯一性定理的问题。", "authors": [{"name": "Michael V. Klibanov"}], "featured_authors": [{"name": "Michael V. Klibanov"}], "author_count": 1}, {"id": "2606.09538", "category": "math-ph", "title": "No-Go Theorem for BEC in the Nelson and Pauli--Fierz Models", "abstract": "We construct KMS states for the Nelson model, the spinless Pauli--Fierz model, and the Pauli--Fierz model with spin by functional integral representations, and study point-source models after removal of the infrared and ultraviolet cutoffs. If the physical test-function space can distinguish the zero mode, the absence of off-diagonal long-range order, the vanishing of the zero-mode form, the vanishing of the condensate density, the order-parameter criterion, and the triviality of the BEC directions and the BEC ideal are equivalent. We also describe the infrared quotient and the BEC ideal in the resolvent algebra uniformly for the three models, and formulate an operator-algebraic sufficient condition for separately given spatially translation-invariant KMS states.", "url": "https://arxiv.org/abs/2606.09538", "type": "理论", "summary": "我们通过函数积分表示构建了 Nelson 模型、无自旋 Pauli-Fierz 模型和带自旋 Pauli-Fierz 模型的 KMS 态，并研究了去除红外和紫外截止后的点源模型。如果物理测试函数空间能够区分零模态，则非对角长程有序性的缺失、零模态消失、凝聚体密度消失、阶数参数准则以及BEC方向和BEC理想的平凡性是等价的。我们还统一描述了三个模型的解析代数中的红外商和 BEC 理想，并为单独给定的空间平移不变 KMS 状态制定了算子代数充分条件。", "authors": [{"name": "Yoshitsugu Sekine"}], "featured_authors": [{"name": "Yoshitsugu Sekine"}], "author_count": 1}, {"id": "2606.09695", "category": "math-ph", "title": "Engineering classical waves with quantized energy spectra in periodic media", "abstract": "Field quantization is a central feature of modern physics, that underpins the concept of photons and forms the foundation of quantum electrodynamics as well as much of solid-state theory. Classical linear wave equations are not generally expected to reproduce the quantization arising in quantum systems without introducing additional ingredients such as ad hoc nonlinear constraints, resonant particle-wave couplings or stochastic background fields. Here, we show that appropriately engineered linear wave media can recover fundamental features evocative of energy quantization in quantum mechanics. The key is to tailor periodic media in which wave propagation is strongly suppressed, except over a discrete set of narrow pass bands. In this regime, stationary wave solutions exhibit discrete energy and frequency spectra analogous to those arising in quantum mechanics despite the underlying dynamics remaining linear. Owing to the universality of the proposed mechanism, these effects may be realized experimentally using mechanical, electrical, or electromagnetic waves in appropriately designed periodic media. This work opens new avenues for designing metamaterials that enable control over discrete wave states while strengthening the conceptual bridge between classical and quantum wave physics.", "url": "https://arxiv.org/abs/2606.09695", "type": "理论", "summary": "场量子化是现代物理学的一个核心特征，它支撑着光子的概念，并构成了量子电动力学以及大部分固态理论的基础。如果不引入额外的成分（例如临时非线性约束、共振粒子波耦合或随机背景场），通常不会期望经典线性波动方程能够重现量子系统中出现的量化。在这里，我们表明，适当设计的线性波介质可以恢复量子力学中能量量子化的基本特征。关键是定制周期性介质，其中波传播受到强烈抑制，除了一组离散的窄通带之外。在这种情况下，驻波解表现出类似于量子力学中出现的离散能量和频谱，尽管潜在的动力学保持线性。由于所提出的机制的普遍性，这些效应可以在适当设计的周期性介质中使用机械波、电波或电磁波通过实验实现。\n\n这项工作为设计超材料开辟了新途径，可以控制离散波态，同时加强经典波物理和量子波物理之间的概念桥梁。", "authors": [{"name": "Arnaud Lazarus"}, {"name": "Georgi Gary Rozenman"}, {"name": "John W. M. Bush"}], "featured_authors": [{"name": "Arnaud Lazarus"}, {"name": "Georgi Gary Rozenman"}, {"name": "John W. M. Bush"}], "author_count": 3}, {"id": "2606.07734", "category": "quant-ph", "title": "Exploring the landscape of compact magic-state distillation factories", "abstract": "Producing high-fidelity magic states using the smallest possible amount of physical qubits and operations stands as a very important challenge to achieve fault-tolerant quantum computation at scale. Besides emerging proposals for alternative methods such as cultivation, magic state distillation remains essential for achieving very low error rates. Known distillation protocols are usually built through quantum codes derived from triorthogonal matrices. Here, exploiting the specific noise structure present in magic state distillation protocols, we show that classical error-correcting codes offer a simpler framework for deriving these protocols. This formulation is particularly well suited to systematic numerical and analytical studies of distillation protocols involving a fixed number of qubits. Specifically, we use a SAT solver to derive a series of no-go theorems that relate key figures of merit, including the number of qubits, the protocol depth, the factory distance, and the prefactor in the output error rate. For instance, we prove that any $T$-to-$T$ state distillation protocol using fewer than eight qubits can detect at most three errors, while any $T$-to-$\\mathrm{CC}Z$ state distillation protocol using fewer than eight qubits can detect at most two errors. Our results also include new distillation protocols with the smallest number of qubits for a given distance in the literature, namely distance 4 and 5 $T$-to-$T$ state protocols supported on 10 and 11 qubits, as well as distance 3 and 4 $T$-to-$\\mathrm{CC}Z$ state distillation protocols supported on 9 and 10 qubits.", "url": "https://arxiv.org/abs/2606.07734", "type": "理论+数值", "summary": "使用尽可能少的物理量子位和操作产生高保真魔态是实现大规模容错量子计算的一个非常重要的挑战。除了培育等替代方法的新提议之外，魔法状态蒸馏对于实现极低的错误率仍然至关重要。已知的蒸馏协议通常是通过从三正交矩阵导出的量子代码构建的。在这里，利用魔法状态蒸馏协议中存在的特定噪声结构，我们表明经典纠错码为推导这些协议提供了一个更简单的框架。该公式特别适合涉及固定数量量子位的蒸馏协议的系统数值和分析研究。具体来说，我们使用 SAT 求解器来推导一系列与关键品质因数相关的 no-go 定理，包括量子位数量、协议深度、工厂距离和输出错误率中的前置因子。\n\n例如，我们证明任何使用少于 8 个量子位的 $T$-to-$T$ 状态蒸馏协议最多可以检测到三个错误，而任何使用少于 8 个量子位的 $T$-to-$\\mathrm{CC}Z$ 状态蒸馏协议最多可以检测到两个错误。我们的结果还包括文献中给定距离的量子位数量最少的新蒸馏协议，即在 10 和 11 个量子位上支持的距离 4 和 5 $T$-to-$T$ 状态协议，以及在 9 和 10 个量子位上支持的距离 3 和 4 $T$-to-$\\mathrm{CC}Z$ 状态蒸馏协议。", "authors": [{"name": "Hugo Jacinto"}, {"name": "Xavier Valcarce"}, {"name": "Victor Barizien"}, {"name": "Élie Gouzien"}, {"name": "Nicolas Sangouard"}], "featured_authors": [{"name": "Hugo Jacinto"}, {"name": "Xavier Valcarce"}, {"name": "Victor Barizien"}, {"name": "Élie Gouzien"}, {"name": "Nicolas Sangouard"}], "author_count": 5}, {"id": "2606.07736", "category": "quant-ph", "title": "Exact metastability in a class of driven-dissipative quantum many-body systems", "abstract": "Metastability in many-body quantum systems and its associated exponentially-long timescales have been the subject of considerable recent interest. Here, we focus on a class of driven-dissipative many-body open quantum systems described by a Lindbladian having hidden time-reversal symmetry (a form of quantum detailed balance). Examples include boundary-driven interacting spin chains, bosonic lattice models and driven-dissipative collective spin models. We suggest that for such systems, slow timescales in the vicinity of a dissipative first-order phase transition can be analytically predicted using a special purification of the non-equilibrium steady state. We show the accuracy of our conjecture through detailed studies of a dissipative transverse-field Ising model with collective and local decay, and a driven-dissipative nonlinear cavity model. Our results allow quantitative insights into metastability and slow dynamics for a range of systems, including cases where semiclassical or path-integral instanton approaches are intractable.", "url": "https://arxiv.org/abs/2606.07736", "type": "理论", "summary": "多体量子系统中的亚稳定性及其相关的指数长时间尺度最近一直是人们广泛关注的主题。在这里，我们重点关注 Lindbladian 描述的一类驱动耗散多体开放量子系统，其具有隐藏的时间反转对称性（量子详细平衡的一种形式）。例子包括边界驱动的相互作用自旋链、玻色晶格模型和驱动耗散集体自旋模型。我们建议，对于此类系统，可以使用非平衡稳态的特殊纯化来分析预测耗散一阶相变附近的慢时间尺度。我们通过对具有集体和局部衰减的耗散横向场伊辛模型以及驱动耗散非线性腔模型的详细研究，证明了我们猜想的准确性。我们的结果允许对一系列系统的亚稳态和慢动力学进行定量洞察，包括半经典或路径积分瞬子方法难以处理的情况。", "authors": [{"name": "David D. Noachtar"}, {"name": "Aashish A. Clerk"}], "featured_authors": [{"name": "David D. Noachtar"}, {"name": "Aashish A. Clerk"}], "author_count": 2}, {"id": "2606.07797", "category": "quant-ph", "title": "Floquet Entanglement Generation in Parametrically Driven Coupled Superconducting Qubits", "abstract": "We investigate the dynamical generation of entanglement in a system of two superconducting qubits coupled through a parametrically driven longitudinal interaction. Using Floquet theory and exact numerical simulations, we analyze the time evolution of the system initialized in a separable ground state. Our results reveal a nontrivial mechanism for entanglement generation, fundamentally distinct from the conventional resonant excitation to an entangled eigenstate. We show that this mechanism emerges when two initially separable eigenstates are mixed by the periodic driving under multiphoton resonance conditions. Since the effect cannot be captured within a standard rotating-wave approximation, we employ generalized Van Vleck near-degenerate perturbation theory to derive an effective analytical description. Within this framework, we demonstrate that the sustained entanglement originates from the hybridization of the dominant Floquet states, namely those with the largest overlap with the initial ground state. Furthermore, the degree of entanglement can be efficiently controlled through the driving amplitude. In particular, for specific amplitudes, the entanglement is fully suppressed. We term this phenomenon as coherent destruction of entanglement.", "url": "https://arxiv.org/abs/2606.07797", "type": "理论+数值", "summary": "我们研究了通过参数驱动的纵向相互作用耦合的两个超导量子位系统中纠缠的动态生成。使用 Floquet 理论和精确的数值模拟，我们分析了在可分离基态下初始化的系统的时间演化。我们的结果揭示了一种重要的纠缠生成机制，从根本上不同于纠缠本征态的传统共振激发。我们证明，当两个最初可分离的本征态在多光子共振条件下通过周期性驱动混合时，就会出现这种机制。由于无法在标准旋转波近似中捕获该效应，因此我们采用广义 Van Vleck 近简并扰动理论来导出有效的分析描述。在此框架内，我们证明持续的纠缠源于主要 Floquet 态的杂交，即与初始基态重叠最大的态。此外，可以通过驱动幅度有效地控制缠结程度。特别是，对于特定的振幅，纠缠被完全抑制。\n\n我们将这种现象称为纠缠的相干破坏。", "authors": [{"name": "Gustavo M. Meneses A."}, {"name": "Daniel Dominguez"}, {"name": "María José Sánchez"}], "featured_authors": [{"name": "Gustavo M. Meneses A."}, {"name": "Daniel Dominguez"}, {"name": "María José Sánchez"}], "author_count": 3}, {"id": "2606.07825", "category": "quant-ph", "title": "Projected Inverse Iteration: An Eigenvalue Approach to Ground-State Computation with Neural Quantum States", "abstract": "Deep learning offers a powerful approach to quantum many-body problems via neural network wavefunctions, but their optimization remains a severe bottleneck. Existing optimization methods, including natural gradient descent and stochastic reconfiguration, suffer from spectral gap-dependent convergence that limits their effectiveness on systems fraught with competing orders and nearly degenerate ground states, such as frustrated magnets and strongly correlated electron materials. Here, we introduce Projected Inverse Iteration (PII) by re-framing the ground-state search as an eigenvalue problem. PII achieves rapid, gap-insensitive convergence while preserving the favorable polynomial computational scaling of stochastic reconfiguration. Demonstrated on challenging two-dimensional spin systems, including the highly frustrated $J_1$-$J_2$ model, PII outperforms standard optimization techniques and presents a promising algorithmic strategy for discovering complex quantum states in the presence of small spectral gaps. More broadly, PII can be interpreted as a novel natural gradient method tailored for eigenvalue problems, opening up its application to related challenges within deep learning.", "url": "https://arxiv.org/abs/2606.07825", "type": "理论+数值", "summary": "深度学习通过神经网络波函数提供了解决量子多体问题的强大方法，但其优化仍然是一个严重的瓶颈。现有的优化方法，包括自然梯度下降和随机重构，都受到光谱间隙相关收敛的影响，这限制了它们在充满竞争阶次和近简并基态的系统（例如受挫磁体和强相关电子材料）上的有效性。在这里，我们通过将基态搜索重新定义为特征值问题来引入投影逆迭代（PII）。 PII 实现了快速、间隙不敏感的收敛，同时保留了随机重构的有利多项式计算缩放。 PII 在具有挑战性的二维自旋系统（包括高度受挫的 $J_1$-$J_2$ 模型）上进行了演示，其性能优于标准优化技术，并提出了一种有前景的算法策略，用于在存在小光谱间隙的情况下发现复杂的量子态。\n\n更广泛地说，PII 可以被解释为一种针对特征值问题量身定制的新型自然梯度方法，从而开启了其应对深度学习中相关挑战的应用。", "authors": [{"name": "Hang Zhang"}, {"name": "Victor Armegioiu"}, {"name": "Juan Carrasquilla"}, {"name": "Siddhartha Mishra"}, {"name": "Johannes Müller"}, {"name": "Jannes Nys"}, {"name": "Marius Zeinhofer"}], "featured_authors": [{"name": "Hang Zhang"}, {"name": "Victor Armegioiu"}, {"name": "Juan Carrasquilla"}, {"name": "Johannes Müller"}, {"name": "Jannes Nys"}, {"name": "Marius Zeinhofer"}], "author_count": 7}, {"id": "2606.07880", "category": "quant-ph", "title": "Defining Unique, Redundant, and Synergistic Quantum Information", "abstract": "We extend the classical ideas of the Partial Information Decomposition (PID) to the quantum domain and quantify unique, redundant, and synergistic quantum information. We show that unique information plays the central role in quantum error correction codes: any erasure-correctable subset of encoding qubits must contain zero unique information. Synergistic information between two disjoint subsets of encoding qubits appears when a logical operation is supported on the whole set but not on the subsets separately. In a different application of our PID, we show that redundant quantum information is the crucial feature of the decoherence mechanism proposed by Zurek \\textit{et al.} to explain how the classical world emerges out of the quantum world.", "url": "https://arxiv.org/abs/2606.07880", "type": "理论", "summary": "我们将部分信息分解（PID）的经典思想扩展到量子领域，并量化独特的、冗余的和协同的量子信息。我们证明，唯一信息在量子纠错码中发挥着核心作用：编码量子位的任何可纠删子集都必须包含零唯一信息。当整个集合支持逻辑运算而不是单独的子集支持逻辑运算时，编码量子位的两个不相交子集之间就会出现协同信息。在我们的 PID 的不同应用中，我们表明冗余量子信息是 Zurek \\textit{et al.} 提出的退相干机制的关键特征，用于解释经典世界如何从量子世界中出现。", "authors": [{"name": "Sean Ericson"}, {"name": "Hailin Wang"}, {"name": "S. J. van Enk"}], "featured_authors": [{"name": "Sean Ericson"}, {"name": "Hailin Wang"}, {"name": "S. J. van Enk"}], "author_count": 3}, {"id": "2606.08020", "category": "quant-ph", "title": "Repair Before Veto, When Repair Is Hidden: Quantum-Accessible Features for Repair-Augmented Constraint Learning", "abstract": "Hard-constraint decision systems usually veto infeasible candidates. This is too rigid when the system can act: if a known affordable repair would make an infeasible candidate feasible and valuable, rejection is a false veto rather than a ranking error. We introduce Q-RACL (Quantum Repair-Augmented Constraint Learning), a repair-before-veto framework that first defines RACL decision semantics and then identifies the single inference link where quantum feature access can be load-bearing. RACL accepts a candidate when a sequential repair plan restores feasibility and preference; otherwise it returns structured rejection credit. The hard link is repair-feasibility inference: which repair class restores feasibility from an observed candidate and context. We construct a discrete-logarithm-hidden RACL family where the repair class is a shifted interval rule in the latent exponent a = log_g(x), while the learner observes only x = g^a mod p. Under standard DLP-based learning separation, this coordinate is inaccessible to efficient raw-input classical policies but accessible to a quantum agent through Shor/Fourier structure. Across six primes and ten seeds, bounded raw-input classical policies and a wrong raw-Fourier encoding remain near chance, whereas the Q-DLP policy keeps false-veto rate below 1.1%, wins all paired seeds, and yields QNI_cond = 0.9777 to 0.9972. A classical DLog oracle matches it, isolating feature access rather than classifier capacity. Thus quantum AI is not added as a generic model upgrade; for this DLP-hidden repair family, it supplies the missing feature that closes the repair-before-veto loop.", "url": "https://arxiv.org/abs/2606.08020", "type": "理论", "summary": "硬约束决策系统通常会否决不可行的候选人。当系统可以采取行动时，这太严格了：如果已知的负担得起的修复将使不可行的候选者变得可行和有价值，那么拒绝就是错误的否决而不是排名错误。我们引入了 Q-RACL（量子修复增强约束学习），这是一种否决前修复框架，它首先定义 RACL 决策语义，然后识别量子特征访问可以承载的单个推理链路。当顺序修复计划恢复可行性和偏好时，RACL 接受候选人；否则，它会返回结构化拒绝信用。硬链接是修复可行性推断：哪个修复类从观察到的候选者和上下文中恢复可行性。我们构建了一个离散对数隐藏 RACL 系列，其中修复类是潜在指数 a = log_g(x) 中的移位间隔规则，而学习器仅观察 x = g^a mod p。在标准的基于 DLP 的学习分离下，有效的原始输入经典策略无法访问该坐标，但量子代理可以通过 Shor/Fourier 结构访问该坐标。\n\n在六个素数和十个种子中，有界原始输入经典策略和错误的原始傅里叶编码仍然很可能，而 Q-DLP 策略将错误否决率保持在 1.1% 以下，赢得所有配对种子，并产生 QNI_cond = 0.9777 到 0.9972。经典的 DLog 预言机与之匹配，隔离特征访问而不是分类器容量。因此，量子人工智能并不是作为通用模型升级而添加的；对于这个 DLP 隐藏修复系列，它提供了关闭“否决前修复”循环的缺失功能。", "authors": [{"name": "Yifan Wang"}], "featured_authors": [{"name": "Yifan Wang"}], "author_count": 1}, {"id": "2606.08114", "category": "quant-ph", "title": "Robust applicability of continuous dynamical decoupling to decoherence reduction in longitudinal and transverse-noise settings: The role of anisotropy", "abstract": "We analytically evaluate the efficiency of continuous dynamical decoupling (CDD) to curb decoherence in generic qubit setups where diverse sources of noise can be present. Previous theoretical approaches to CDD have mainly focused on its potential to cope with longitudinal fluctuations. Here, the basic scenario tackled with CDD is generalized. Apart from dealing with pure dephasing induced by diagonal noise, we consider the impact of transverse fluctuations, usually present in the practical arrangements. In particular, the implications of anisotropic noisy inputs are studied. Additionally, we analyze the role of the fluctuations in the dressing of the qubit by the CDD field of control: since the driving field is usually switched on through linear ramps of its characteristic parameters, the associated dressing of the original states can be described in terms of noisy Landau-Zener transitions. In our approach, based on a sequence of unitary transformations, the noise entering the system is cast into effective stochastic terms whose spectral characteristics are dependent on the driving parameters. This description allows the design of strategies to mitigate the impact of the fluctuations using controlled changes in the effective-noise properties. Significant robustness of CDD against the generalization of the basic scenario can be achieved through an appropriate choice of the parameters of control.", "url": "https://arxiv.org/abs/2606.08114", "type": "理论+数值", "summary": "我们分析评估了连续动态解耦（CDD）的效率，以抑制可能存在不同噪声源的通用量子位设置中的退相干。先前的 CDD 理论方法主要集中于其应对纵向波动的潜力。这里概括了 CDD 处理的基本场景。除了处理对角线噪声引起的纯相移之外，我们还考虑了实际布置中通常存在的横向波动的影响。特别是，研究了各向异性噪声输入的影响。此外，我们还分析了 CDD 控制场对量子位修饰波动的作用：由于驱动场通常通过其特征参数的线性斜坡开启，因此原始状态的相关修饰可以用噪声朗道-齐纳跃迁来描述。在我们的方法中，基于一系列幺正变换，进入系统的噪声被转换为有效的随机项，其频谱特性取决于驱动参数。\n\n该描述允许设计策略，以使用有效噪声属性的受控变化来减轻波动的影响。通过适当选择控制参数，可以实现 CDD 对基本场景泛化的显着鲁棒性。", "authors": [{"name": "S. Afonso"}, {"name": "J.M. Gomez Llorente"}, {"name": "J. Plata"}], "featured_authors": [{"name": "S. Afonso"}, {"name": "J.M. Gomez Llorente"}, {"name": "J. Plata"}], "author_count": 3}, {"id": "2606.08290", "category": "quant-ph", "title": "On solutions of the Schrödinger equation for some molecular potentials: Power-series method", "abstract": "We show that the standard power-series method described in many textbooks of quantum-mechanics and quantum-chemistry is simpler and more powerful than the wavefunction approach proposed by Ikhdair and Sever [Cent. Eur. J. Phys. 6, 697 (2008)]. As illustrative examples we choose the pseudoharmonic and Kratzer-Fues potentials already treated by those authors.", "url": "https://arxiv.org/abs/2606.08290", "type": "理论", "summary": "我们证明，许多量子力学和量子化学教科书中描述的标准幂级数方法比 Ikhdair 和 Sever [Cent.1] 提出的波函数方法更简单、更强大。欧元。 J. Phys。 6, 697 (2008)]。作为说明性示例，我们选择这些作者已经处理过的赝谐波势和 Kratzer-Fues 势。", "authors": [{"name": "Francisco M. Fernández"}], "featured_authors": [{"name": "Francisco M. Fernández"}], "author_count": 1}, {"id": "2606.08349", "category": "quant-ph", "title": "Quantum algorithms for stochastic nonlinear differential equations", "abstract": "Stochastic nonlinear dynamics underlie many models in engineering and computational physics, yet accurate high-dimensional simulation remains challenging. We present a quantum algorithm for a broad class of $N$-dimensional stochastic differential equations with dissipation and quadratic drift. The algorithm applies to strongly nonlinear systems with all-to-all interactions, thereby extending the scope of previously known quantum algorithms that were limited to weak nonlinearity and sparse systems. For norm-preserving drifts, a condition satisfied by key fluid dynamics discretizations, our method approximates expectation values of low-order correlation functions with rigorous error bounds at a cost polynomial in $\\log{(N)}$ and linear in the evolution time. Our main technical advance is a subroutine for simulating an auxiliary system of $N$ interacting quantum harmonic oscillators with cost polylogarithmic in $N$. Finally, we formulate turbulence models, including Navier-Stokes and damped Euler equations, within this framework, opening a route to quantum simulation of strongly nonlinear SDEs governing turbulence and nonlinear wave dynamics.", "url": "https://arxiv.org/abs/2606.08349", "type": "理论+数值", "summary": "随机非线性动力学是工程和计算物理中许多模型的基础，但精确的高维模拟仍然具有挑战性。我们提出了一种用于具有耗散和二次漂移的广泛 N$ 维随机微分方程的量子算法。该算法适用于具有所有相互作用的强非线性系统，从而扩展了先前已知的仅限于弱非线性和稀疏系统的量子算法的范围。对于保模漂移（关键流体动力学离散化所满足的条件），我们的方法以 $\\log{(N)}$ 为成本多项式且在演化时间中呈线性，以严格的误差范围逼近低阶相关函数的期望值。我们的主要技术进步是一个子程序，用于模拟 $N$ 相互作用的量子谐振子的辅助系统，成本为 N$ 多对数。最后，我们在此框架内制定了湍流模型，包括纳维-斯托克斯和阻尼欧拉方程，为控制湍流和非线性波动力学的强非线性 SDE 的量子模拟开辟了道路。", "authors": [{"name": "Sergey Bravyi"}, {"name": "Adam Byrne"}, {"name": "Mykhaylo Zayats"}, {"name": "Sergiy Zhuk"}], "featured_authors": [{"name": "Sergey Bravyi"}, {"name": "Adam Byrne"}, {"name": "Mykhaylo Zayats"}, {"name": "Sergiy Zhuk"}], "author_count": 4}, {"id": "2606.08443", "category": "quant-ph", "title": "Quantum Kravchuk Transform using $\\mathfrak{su}(2)$ fast-forwarding", "abstract": "We present a quantum algorithm for the Kravchuk transform that scales logarithmically in both the dimension and the inverse of the error parameter. The quantum Kravchuk transform maps computational basis states to states with amplitudes proportional to Kravchuk functions. We achieve this by combining two key techniques: the structural relationship between the Kravchuk transform and the Lie algebras $\\mathfrak{su}(2)$, and a recent fast-forwarding simulation method for $\\mathfrak{su}(2)$ operators in the oscillator representation. More precisely, we first establish the map from Kravchuk transform in computational basis to $\\mathfrak{su}(2)$ in Fock basis. Then built on this connection, we apply the fast-forwarding to achieve an efficient quantum Kravchuk transform.", "url": "https://arxiv.org/abs/2606.08443", "type": "数值", "summary": "我们提出了一种用于 Kravchuk 变换的量子算法，该算法在误差参数的维度和倒数上均以对数方式缩放。量子克拉夫丘克变换将计算基态映射到振幅与克拉夫丘克函数成比例的状态。我们通过结合两种关键技术来实现这一目标：Kravchuk 变换和李代数 $\\mathfrak{su}(2)$ 之间的结构关系，以及最近在振荡表示中 $\\mathfrak{su}(2)$ 运算符的快进模拟方法。更准确地说，我们首先建立从计算基础上的 Kravchuk 变换到 Fock 基础上的 $\\mathfrak{su}(2)$ 的映射。然后在此连接的基础上，我们应用快进来实现高效的量子 Kravchuk 变换。", "authors": [{"name": "Chaowen Guan"}, {"name": "Akshit Katiyar"}], "featured_authors": [{"name": "Chaowen Guan"}, {"name": "Akshit Katiyar"}], "author_count": 2}, {"id": "2606.08478", "category": "quant-ph", "title": "Impact of spontaneous emission on spin-squeezed quantum sensors", "abstract": "The echo squeezing protocols (ESPs) are techniques that amplify the phase shift in a quantum sensor with one-axis-twist squeezing (OATS). For atomic sensors, spontaneous emission (SE) in the OATS operations is an important imperfection, which, however, is prohibitively difficult to study. SE can transfer atoms to all the Zeeman substates, making the number of relevant collective states excessively large. In this paper, we focus on a relatively simple isotope, namely Sr-88, which only has one Zeeman substate in each of the two ground states. Nevertheless, studying the effect of SE is still challenging because SE will populate all collective states, either symmetric or asymmetric, thus putting the ensemble into a mixed state. Based on analytical derivation and numerical simulations, we conclude that the GESP is more resistant to SE than the conventional echo squeezing protocol (CESP). This is another advantage of the GESP that has not been realized formerly. We also find that for the GESP employing Sr-88, the SE-induced reduction in the signal contrast is the same as that for a Ramsey protocol without squeezing and the quantum noise is suppressed by SE. This is an unexpectedly favorable result. The SE-induced suppression of quantum noise constitutes a previously unrecognized effect that challenges both earlier conclusions and intuitive expectations.", "url": "https://arxiv.org/abs/2606.08478", "type": "数值", "summary": "回波压缩协议 (ESP) 是一种通过单轴扭转压缩 (OATS) 放大量子传感器中相移的技术。对于原子传感器来说，OATS 操作中的自发发射 (SE) 是一个重要的缺陷，但研究起来却极其困难。 SE可以将原子转移到所有塞曼子状态，使得相关集体状态的数量过多。在本文中，我们关注一种相对简单的同位素，即 Sr-88，它在两个基态中的每一个中仅具有一个塞曼亚态。尽管如此，研究SE的影响仍然具有挑战性，因为SE将填充所有集体状态，无论是对称还是不对称，从而使系综进入混合状态。基于分析推导和数值模拟，我们得出结论，GESP 比传统回声压缩协议 (CESP) 更能抵抗 SE。这是GESP的另一个以前没有实现过的优点。我们还发现，对于采用 Sr-88 的 GESP，SE 引起的信号对比度降低与没有压缩的 Ramsey 协议相同，并且 SE 抑制了量子噪声。\n\n这是一个出乎意料的有利结果。 SE引起的量子噪声抑制构成了一种以前未被认识到的效应，挑战了早期的结论和直觉预期。", "authors": [{"name": "Jinyang Li"}, {"name": "Selim M. Shahriar"}], "featured_authors": [{"name": "Jinyang Li"}, {"name": "Selim M. Shahriar"}], "author_count": 2}, {"id": "2606.08482", "category": "quant-ph", "title": "Modified One-Axis-Twist Squeezing for Deterministic Orientation Control of Schrödinger Cat States with Unknown Atom-Number Parity", "abstract": "The Schrödinger cat state protocol (SCSP) makes use of a Schrödinger cat (SC) state generated with one-axis-twist squeezing (OATS) to enhance the sensitivity. In principle, the SCSP can magnify the phase shift by a factor N, the number of atoms under interrogation, accompanied by a quantum noise amplification by a factor of root-N, enabling an atomic sensor to reach the Heisenberg limit. However, the current SCSP can reach this benchmark only if the parity of N is known, which is almost impossible for a large ensemble. The reason is the orientation of the SC state generated with the conventional OATS depends on the parity of N. In this paper, we propose a modified OATS (MOATS) operation that generates the SC state aligned in a certain direction regardless of the parity of N.", "url": "https://arxiv.org/abs/2606.08482", "type": "理论", "summary": "薛定谔猫状态协议（SCSP）利用单轴扭转挤压（OATS）生成的薛定谔猫（SC）状态来增强灵敏度。原则上，SCSP 可以将相移放大 N 倍，即被询问的原子数量，同时将量子噪声放大 N 倍根，使原子传感器能够达到海森堡极限。然而，当前的SCSP只有在知道N的奇偶校验的情况下才能达到这个基准，这对于大型集成来说几乎是不可能的。原因是传统 OATS 生成的 SC 状态的方向取决于 N 的奇偶校验。在本文中，我们提出了一种改进的 OATS (MOATS) 操作，无论 N 的奇偶校验如何，它都会生成沿特定方向对齐的 SC 状态。", "authors": [{"name": "Jinyang Li"}, {"name": "Selim M. Shahriar"}], "featured_authors": [{"name": "Jinyang Li"}, {"name": "Selim M. Shahriar"}], "author_count": 2}, {"id": "2606.08557", "category": "quant-ph", "title": "Dissipative Channels Determine Open Electromagnetic Quantization", "abstract": "We formulate a quantization scheme for open electromagnetic systems with arbitrary passive boundary conditions. Rather than specifying reservoirs phenomenologically, the method identifies them from the dissipation geometry of the Maxwell operator. Factoring the imaginary part of the Maxwell operator gives a bosonic realization of the field operator and separates the fluctuation channels into medium-assisted reservoirs from material absorption and boundary-assisted reservoirs from exchange through the open boundary. Depending on the boundary condition, the latter become free-space radiation modes, impedance-load channels, guided port modes, or more general boundary channels. Green-function input-output relations then follow as an application, yielding frequency-dependent scattering and noise kernels without Markov or single-mode assumptions. To illustrate the practical application, we consider a lossy structure with mixed impedance and outgoing boundaries, and photonic integrated circuit configurations with waveguide port boundaries.", "url": "https://arxiv.org/abs/2606.08557", "type": "理论", "summary": "我们为具有任意无源边界条件的开放电磁系统制定了量化方案。该方法不是从现象学上指定储层，而是从麦克斯韦算子的耗散几何中识别它们。对麦克斯韦算子的虚部进行因式分解，给出了场算子的玻色子实现，并将波动通道分为来自材料吸收的介质辅助储层和来自通过开放边界交换的边界辅助储层。根据边界条件，后者变成自由空间辐射模式、阻抗负载通道、引导端口模式或更一般的边界通道。然后将格林函数输入输出关系作为应用，产生频率相关的散射和噪声内核，而无需马尔可夫或单模假设。为了说明实际应用，我们考虑具有混合阻抗和输出边界的有损结构，以及具有波导端口边界的光子集成电路配置。", "authors": [{"name": "Hyunwoo Choi"}, {"name": "Junwoo Gim"}, {"name": "Thomas E. Roth"}, {"name": "Weng Cho Chew"}, {"name": "Dong-Yeop Na"}], "featured_authors": [{"name": "Hyunwoo Choi"}, {"name": "Junwoo Gim"}, {"name": "Thomas E. Roth"}, {"name": "Weng Cho Chew"}, {"name": "Dong-Yeop Na"}], "author_count": 5}, {"id": "2606.08561", "category": "quant-ph", "title": "A five-qubit 1-resistant graph state and stabilizer marginal certificates", "abstract": "We study particle-loss resistant entanglement within the framework of stabilizer and graph states. A pure state is \\(m\\)-resistant if it remains entangled after the loss of any \\(m\\) particles and becomes fully separable after the loss of any \\(m+1\\) particles. The smallest previously unresolved qubit case was the existence of a five-qubit \\(1\\)-resistant pure state, which is resolved here by the five-cycle graph state \\(\\ket{C_5}\\). A stabilizer-subgroup method is also developed for verifying \\(m\\)-resistance in graph states, using local stabilizers to certify full separability and exact negative partial transpose~(NPT) witnesses to certify entanglement. Applying this to all graph states associated with non-isomorphic graphs on five, six, and seven vertices, we obtain a graph state classification up to local Clifford equivalence, which also classifies stabilizer states up to local Clifford equivalence. Thus, the five-qubit \\(1\\)-resistant stabilizer states are exactly the local Clifford class of \\(C_5\\). Six-qubit \\(2\\)-resistant stabilizer states exist in three distinct local Clifford classes, whereas no seven-qubit stabilizer state is \\(m\\)-resistant for any nonzero admissible \\(m\\). Finally, we prove that the cycle graph states \\(\\ket{C_N}\\) with \\(N\\ge 7\\) are not \\(m\\)-resistant for any \\(0\\le m\\le N-2\\).", "url": "https://arxiv.org/abs/2606.08561", "type": "理论+数值", "summary": "我们在稳定器和图状态的框架内研究抗粒子损失纠缠。如果纯态在失去任何 \\(m\\) 个粒子后仍保持纠缠状态，并且在失去任何 \\(m+1\\) 个粒子后变得完全可分离，则它是 \\(m\\) 抗性的。之前未解决的最小量子位情况是存在五量子位\\(1\\)抵抗纯态，这里通过五周期图状态\\(\\ket{C_5}\\)解决了这个问题。还开发了一种稳定子组方法来验证图状态中的 \\(m\\) 电阻，使用局部稳定器来证明完全可分离性，并使用精确的负部分转置~（NPT）证据来证明纠缠。将此应用于与五个、六个和七个顶点上的非同构图相关的所有图状态，我们获得了达到局部 Clifford 等价的图状态分类，这也将稳定器状态分类到局部 Clifford 等价。因此，五量子位 \\(1\\) 抗稳定器状态正是 \\(C_5\\) 的局部 Clifford 类。\n\n六量子位 \\(2\\) 抗稳定器状态存在于三个不同的局部 Clifford 类中，而对于任何非零允许的 \\(m\\) 来说，没有七量子位稳定器状态是 \\(m\\) 抗性的。最后，我们证明循环图状态 \\(\\ket{C_N}\\) 和 \\(N\\ge 7\\) 对于任何 \\(0\\le m\\le N-2\\) 都不是 \\(m\\) 抗性。", "authors": [{"name": "Zicheng Han"}, {"name": "Wanchen Zhang"}, {"name": "Xiande Zhang"}], "featured_authors": [{"name": "Zicheng Han"}, {"name": "Wanchen Zhang"}, {"name": "Xiande Zhang"}], "author_count": 3}, {"id": "2606.08595", "category": "quant-ph", "title": "Is Exact Markovianity Fundamental Once Time Is Relational?", "abstract": "Markovian open quantum theory assumes evolution with respect to an external classical time parameter, yet no preferred notion of time exists fundamentally in relativistic physics. We resolve this tension by formulating relativistic open quantum dynamics relationally through finite-resolution quantum clocks. Using the Schwinger-Tomonaga formalism, we derive a covariant master equation directly on spacetime hypersurfaces and show that the resulting reduced dynamics is generically non-Markovian even for local interactions. Environmental correlations and clock fluctuations jointly generate the memory kernel, while the Gorini-Kossakowski-Lindblad-Sudarshan (GKLS) structure emerges only after relational coarse-graining, implying that exact Markovian evolution is effective rather than fundamental. In the sharp-clock limit, the formalism reduces to the Anastopoulos-Hu gravitational decoherence equation.", "url": "https://arxiv.org/abs/2606.08595", "type": "理论", "summary": "马尔可夫开放量子理论假设演化相对于外部经典时间参数，但相对论物理学中根本不存在优选的时间概念。我们通过有限分辨率量子时钟相关地制定相对论开放量子动力学来解决这种紧张关系。使用施温格-朝永形式主义，我们直接在时空超曲面上推导出协变主方程，并表明即使对于局部相互作用，所得的简化动力学通常也是非马尔可夫的。环境相关性和时钟波动共同生成记忆内核，而 Gorini-Kossakowski-Lindblad-Sudarshan (GKLS) 结构仅在关系粗粒度之后出现，这意味着精确的马尔可夫进化是有效的而不是根本性的。在尖时钟极限下，形式主义简化为 Anastopoulos-Hu 引力退相干方程。", "authors": [{"name": "Partha Nandi"}, {"name": "Francesco Petruccione"}], "featured_authors": [{"name": "Partha Nandi"}, {"name": "Francesco Petruccione"}], "author_count": 2}, {"id": "2606.08606", "category": "quant-ph", "title": "Hidden Conformal Boundary Data in Finite-Temperature Stabilizer Entropy", "abstract": "We study the finite-temperature stabilizer Rényi entropy of the open critical quantum spin chains. At Rényi index one half, this observable probes the distribution of thermal Pauli-string expectation values and can be written as a sum over absolute values of all square minors of a finite-temperature correlation matrix for the transverse-field Ising chain. We show that this exponentially large sum is exactly reducible to a single Pfaffian. The Pfaffian representation reveals a block Toeplitz--Hankel structure and allows us to extract the large-size scaling in several thermal regimes. In the crossover window where the inverse temperature is proportional to the system size, the stabilizer entropy factorizes into a saturated extensive contribution and a universal finite-size scaling function. We find that this scaling function is a level-eight eta quotient, rather than the ordinary free-boundary Majorana thermal factor. The deviation is exponentially hidden at low temperature but controls the high-temperature crossover, where it gives a Cardy-like asymptotic for the Pauli-string expectation-weight spectrum. These results show that finite-temperature stabilizer entropy reveals hidden defect-like conformal data invisible to ordinary thermodynamic probes.", "url": "https://arxiv.org/abs/2606.08606", "type": "理论+数值", "summary": "我们研究开放临界量子自旋链的有限温度稳定器 Rényi 熵。在 Rényi 指数二分之一处，该可观测量探测了热保利弦期望值的分布，并且可以写为横向场伊辛链的有限温度相关矩阵的所有平方次要值的绝对值之和。我们证明这个指数级的大总和完全可以简化为单个普法夫函数。普法夫表示揭示了块托普利茨-汉克尔结构，使我们能够提取几个热状态下的大尺寸尺度。在温度与系统尺寸成正比的交叉窗口中，稳定器熵分解为饱和扩展贡献和通用有限尺寸缩放函数。我们发现这个标度函数是一个八级 eta 商，而不是普通的自由边界马约拉纳热因子。该偏差在低温下呈指数隐藏，但控制高温交叉，从而为泡利弦期望权重谱提供类 Cardy 渐近。\n\n这些结果表明，有限温度稳定器熵揭示了普通热力学探针不可见的隐藏缺陷类共形数据。", "authors": [{"name": "Reyhaneh Khasseh"}, {"name": "M. A. Rajabpour"}], "featured_authors": [{"name": "Reyhaneh Khasseh"}, {"name": "M. A. Rajabpour"}], "author_count": 2}, {"id": "2606.08704", "category": "quant-ph", "title": "Regularised Arbitrary Gauge non-Relativistic QED", "abstract": "We develop a regularised arbitrary-gauge formulation of nonrelativistic quantum electrodynamics and use it to compare Coulomb and multipolar descriptions with a Lorentzian form factor. We analyse the effect of regularisation in perturbation theory, including alternative partitions of the Hamiltonian into free and interaction parts, and the limits of the electric dipole approximation. The regularised multipolar gauge exhibits a cut-off-dependent trade-off between the strength of individual interaction terms and the localisation of material subsystems that suppresses direct inter-atomic interactions. We discuss the implications of the framework for short-range phenomena, including Dicke criticality.", "url": "https://arxiv.org/abs/2606.08704", "type": "理论", "summary": "我们开发了非相对论量子电动力学的正则化任意规范公式，并用它来将库仑和多极描述与洛伦兹形状因子进行比较。我们分析了微扰理论中正则化的效果，包括将哈密顿量选择性地划分为自由部分和相互作用部分，以及电偶极子近似的极限。正则化多极规范在各个相互作用项的强度与抑制直接原子间相互作用的材料子系统的局部化之间表现出依赖截止的权衡。我们讨论该框架对短期现象的影响，包括迪克临界性。", "authors": [{"name": "Alex Chivers-White"}, {"name": "Adam Stokes"}], "featured_authors": [{"name": "Alex Chivers-White"}, {"name": "Adam Stokes"}], "author_count": 2}, {"id": "2606.08707", "category": "quant-ph", "title": "Simulating quantum circuits with a neural statebank", "abstract": "Predicting the output of quantum circuits is a central bottleneck for verifying quantum processors because a generic wavefunction grows exponentially with system size. We introduce a neural statebank that learns this wavefunction along the circuit trajectory. Each layer is stored as an autoregressive Transformer checkpoint trained from local gate updates to the preceding checkpoint, producing a compact neural representation that can evaluate amplitudes and generate independent samples. On long-range circuits combining entanglement, magic, and non-diagonal branching, a 0.3-million-parameter statebank reaches $\\sim 10^{-2}$ infidelity at 34 qubits, outperforming the other tested approximate simulators while using far less memory than exact state-vector evolution. The same architecture accurately simulates quantum approximate optimization, Clifford+$T$, and Clifford circuits.", "url": "https://arxiv.org/abs/2606.08707", "type": "理论+数值", "summary": "预测量子电路的输出是验证量子处理器的中心瓶颈，因为通用波函数随着系统尺寸呈指数增长。我们引入了一个神经状态库，它沿着电路轨迹学习这个波函数。每层都存储为自回归 Transformer 检查点，从本地门更新到前一个检查点进行训练，产生可以评估幅度并生成独立样本的紧凑神经表示。在结合了纠缠、魔法和非对角分支的长程电路上，一个 30 万参数的状态库在 34 个量子位上达到 $\\sim 10^{-2}$ 不保真度，优于其他测试的近似模拟器，同时使用的内存远少于精确状态向量演化。相同的架构精确地模拟了量子近似优化、Clifford+$T$ 和 Clifford 电路。", "authors": [{"name": "Taige Wang"}, {"name": "Liang Fu"}], "featured_authors": [{"name": "Taige Wang"}, {"name": "Liang Fu"}], "author_count": 2}, {"id": "2606.08771", "category": "quant-ph", "title": "Algebra of Bivariate-Bicycle Surface Codes", "abstract": "We relate the properties of bivariate-bicycle-surface (BBS) codes, constructed from a pair of bivariate polynomials over a finite field, to the number and location of their common roots in the extension field. The number of roots $(x,y)$ with finite, non-zero coordinates -- counted with algebraic multiplicity -- determines the dimension of the codes. This dimension is invariant under monomial automorphisms of the Laurent polynomial ring. Conversely, roots with zero or infinite $x$- or $y$-coordinates indicate that specialized generators are required near the corresponding boundary (e.g., the left or right boundary for a root where $x$ is zero or infinite, respectively). These roots can appear or disappear under monomial transformations, which reveals the structure of tilted boundaries. Based on these results, we formulate a prescription for constructing BBS codes that works for regions with rectangular, diagonal, and arbitrarily tilted boundaries. A key advantage of this approach is that no corner corrections are needed, provided the polynomials satisfy orientation-specific edge conditions.", "url": "https://arxiv.org/abs/2606.08771", "type": "理论", "summary": "我们将由有限域上的一对双变量多项式构造的双变量自行车表面（BBS）码的属性与它们在扩展域中的公共根的数量和位置联系起来。具有有限非零坐标的根 $(x,y)$ 的数量（用代数重数计算）决定了代码的维数。该维数在洛朗多项式环的单项自同构下是不变的。相反，具有零或无限 $x$- 或 $y$- 坐标的根表示在相应边界附近需要专门的生成器（例如，$x$ 分别为零或无限的根的左边界或右边界）。这些根可以在单项变换下出现或消失，这揭示了倾斜边界的结构。基于这些结果，我们制定了构建适用于具有矩形、对角线和任意倾斜边界的区域的 BBS 代码的方案。这种方法的一个关键优点是，只要多项式满足特定方向的边缘条件，就不需要角点校正。", "authors": [{"name": "Renyu Wang"}, {"name": "Leonid P. Pryadko"}], "featured_authors": [{"name": "Renyu Wang"}, {"name": "Leonid P. Pryadko"}], "author_count": 2}, {"id": "2606.08784", "category": "quant-ph", "title": "Randomized simulation of quantum channels using small ancilla", "abstract": "We study the problem of implementing a quantum channel using a small ancilla with classical randomization and postselection on an output failure flag. The simulation is probabilistic, but exact conditioned on success. We prove that any unital channel on a $d$-dimensional system can be simulated with ancilla dimension $k$ and success probability $\\Omega(\\frac{k}{\\log d})$. Equivalently, every unital channel on $n$ qubits can be simulated with constant success probability using only $O(\\log n)$ ancillary qubits. We show that this tradeoff is best possible by constructing a family of channels which cannot be simulated with success probability better than $O(\\frac{k}{\\log d})$. We also show that the class of \\textit{highly noncommutative} channels, which includes random channels, admits constant-success simulation with just a single ancillary qubit. We further show that this model of simulation necessarily fails for strongly non-unital channels and discuss possible extensions involving adaptivity. On the technical side we rely on a partition-based protocol and matrix concentration inequalities, including the recent refinement of noncommutative Khintchine inequalities due to Bandeira, Boedihardjo and van Handel.", "url": "https://arxiv.org/abs/2606.08784", "type": "理论+数值", "summary": "我们研究使用具有经典随机化和输出失败标志后选择的小型辅助装置来实现量子通道的问题。模拟是概率性的，但精确的条件是成功。我们证明 $d$ 维系统上的任何单位通道都可以用辅助维度 $k$ 和成功概率 $\\Omega(\\frac{k}{\\log d})$ 进行模拟。同样，$n$ 量子位上的每个单位通道都可以仅使用 $O(\\log n)$ 辅助量子位以恒定的成功概率进行模拟。我们证明，这种权衡最好通过构建一系列通道来实现，而这些通道的模拟成功概率不能高于 $O(\\frac{k}{\\log d})$。我们还表明，包含随机通道的 \\textit{高度非交换} 通道类允许仅使用单个辅助量子位进行持续成功的模拟。我们进一步表明，这种模拟模型对于强非单位通道必然会失败，并讨论涉及自适应性的可能扩展。\n\n在技​​术方面，我们依赖于基于分区的协议和矩阵集中不等式，包括最近由 Bandeira、Boedihardjo 和 van Handel 改进的非交换辛钦不等式。", "authors": [{"name": "Marcin Kotowski"}, {"name": "Michał Kotowski"}], "featured_authors": [{"name": "Marcin Kotowski"}, {"name": "Michał Kotowski"}], "author_count": 2}, {"id": "2606.08794", "category": "quant-ph", "title": "Graph Neural Networks for Fast Operator Selection in Adaptive VQE", "abstract": "Adaptive variational quantum algorithms like ADAPT-VQE construct tailored ansätze by iteratively selecting operators from a pool using gradient-based criteria. While this avoids oversized parameter spaces, repeatedly scanning the full pool incurs a classical cost that scales linearly with pool size-a major bottleneck for systems with long-range interactions or large operator sets. Here, we reformulate adaptive operator selection as a graph-based decision problem and introduce a graph neural network (GNN) policy that predicts the next entangling operator directly from the interaction graph and state-dependent observables. Training data are generated from exact simulations of disordered long-range spin chains, using gradient magnitudes as supervision signals. The learned policy accurately reproduces the dominant structure of the greedy gradient-based selection rule, significantly outperforming heuristics based solely on interaction strength. Integrated into a variational quantum eigensolver (VQE) workflow, this GNN-VQE approach achieves energy errors close to standard ADAPT-VQE while drastically reducing full-pool gradient evaluations. To test transferability beyond spin models, we evaluate the policy on small active-space molecular benchmarks (LiH and BeH_$2$). We find the GNN is highly effective as a shortlist generator: exact rescoring over just a few GNN-proposed candidates recovers near-oracle rollout behavior while searching only a small fraction of the pool. These results demonstrate that adaptive circuit construction contains learnable structure that can be exploited to accelerate variational quantum algorithms.", "url": "https://arxiv.org/abs/2606.08794", "type": "理论+数值", "summary": "ADAPT-VQE 等自适应变分量子算法通过使用基于梯度的标准从池中迭代选择算子来构造定制的 ansätze。虽然这避免了过大的参数空间，但重复扫描整个池会产生与池大小线性扩展的经典成本，这对于具有远程交互或大型算子集的系统来说是一个主要瓶颈。在这里，我们将自适应算子选择重新表述为基于图的决策问题，并引入图神经网络（GNN）策略，该策略直接从交互图和状态相关的可观察量中预测下一个纠缠算子。训练数据是通过对无序长程自旋链的精确模拟生成的，使用梯度幅度作为监督信号。学习到的策略准确地再现了基于贪婪梯度的选择规则的主导结构，显着优于仅基于交互强度的启发式策略。这种 GNN-VQE 方法集成到变分量子本征求解器 (VQE) 工作流程中，可实现接近标准 ADAPT-VQE 的能量误差，同时大幅减少全池梯度评估。\n\n为了测试自旋模型之外的可转移性，我们评估了小型活性空间分子基准（LiH 和 BeH_$2$）的策略。我们发现 GNN 作为入围名单生成器非常有效：仅对少数 GNN 提出的候选者进行精确重新评分即可恢复接近预言机的推出行为，同时仅搜索池中的一小部分。这些结果表明，自适应电路构造包含可学习的结构，可用于加速变分量子算法。", "authors": [{"name": "Javad Vahedi"}, {"name": "Hadi H. Arefi"}], "featured_authors": [{"name": "Javad Vahedi"}, {"name": "Hadi H. Arefi"}], "author_count": 2}, {"id": "2606.08845", "category": "quant-ph", "title": "Energy-Efficient Satellite Wake-Up via Bosonic Identification: The Role of Synchronization", "abstract": "The information-theoretic concept of identification describes a sender-receiver architecture in which the receiver only checks whether a particular message was sent or not, thereby promising a low-energy receiver design. In low received-energy regimes, quantum receivers are a promising tool for studying the system limits. However, the known information-theoretically optimal identification codes typically assume perfect synchronization. In this work, we study deterministic identification in a satellite setting under explicit synchronization constraints, where a satellite broadcasts the signature of a specific User Equipment (UE) which it assumes to be attached to one out of several possible Ground Station (GS), with the goal of establishing communication with the target UE. Within the proposed design, and assuming a specific phase-encoded coherent-state clock scheme in which the discrete time index is represented by equidistant phase rotations on the unit circle, our results reveal a fundamental asymmetry: At any transmission power, identification performance improves with blocklength, whereas synchronization accuracy degrades. In particular, the energy needed for transmitting the satellite clock to the GS can be several orders of magnitude higher than the one needed for the identification signal. This indicates that synchronization strongly impacts identification performance and motivates the investigation of the error-correcting capabilities of bosonic codes under jitter.", "url": "https://arxiv.org/abs/2606.08845", "type": "理论", "summary": "识别的信息论概念描述了一种发送器-接收器架构，其中接收器仅检查是否发送了特定消息，从而实现了低能耗接收器设计。在低接收能量状态下，量子接收器是研究系统极限的有前途的工具。然而，已知的信息理论上最优的识别码通常假设完美同步。在这项工作中，我们研究了在明确同步约束下的卫星设置中的确定性识别，其中卫星广播特定用户设备（UE）的签名，假设该用户设备连接到多个可能的地面站（GS）之一，其目标是与目标UE建立通信。在所提出的设计中，假设一个特定的相位编码相干状态时钟方案，其中离散时间索引由单位圆上的等距相位旋转表示，我们的结果揭示了一个基本的不对称性：在任何传输功率下，识别性能随着块长度的增加而提高，而同步精度却下降。\n\n特别是，将卫星时钟传输到GS所需的能量可能比识别信号所需的能量高出几个数量级。这表明同步强烈影响识别性能，并激发了对抖动下玻色码纠错能力的研究。", "authors": [{"name": "Gökhan Elmas"}, {"name": "Janis Nötzel"}], "featured_authors": [{"name": "Gökhan Elmas"}, {"name": "Janis Nötzel"}], "author_count": 2}, {"id": "2606.08995", "category": "quant-ph", "title": "Relativistic Effects in Spin Correlations Induced by QED Scattering and Wigner Rotations", "abstract": "We study the relativistic nature of the interactions that, at tree level, generate spin correlations between two electrons in Møller scattering, as well as in an extended process involving a witness particle $C$. The corresponding processes, $e^{-}e^{-}\\rightarrow e^{-}e^{-}$ and $e^{-}e^{-}C\\rightarrow e^{-}e^{-}C$, are analyzed both in the center-of-mass frame and, for the former process, in a Lorentz-boosted frame where Wigner rotations arise. It is found that, through a nonrelativistic approximation of the scattering amplitudes, dipole-dipole and current-dipole interactions are responsible for the emergence of these correlations. This is evidenced by the variation of the von Neumann entropy of one electron for initially separable states, and of $C$ for an initially prepared three-particle entangled W-state. In Wigner rotations, the invariance of entropy under local unitary transformations is maintained at the expense of the emergence of quantum coherence in the density matrix at large rapidities. As a consequence, the final states of both particles are evaluated and shown to encode information about the scattering process through their spin expectation values. This framework is then used to comment on the correlations in the inelastic process $e^{-}e^{+}\\rightarrow\\mu^{-}\\mu^{+}$, for which some research has reported differing results.", "url": "https://arxiv.org/abs/2606.08995", "type": "理论+数值", "summary": "我们研究了相互作用的相对论性质，这种相互作用在树层面上产生了莫勒散射中两个电子之间的自旋相关性，以及涉及见证粒子 $C$ 的扩展过程。相应的过程 $e^{-}e^{-}\\rightarrow e^{-}e^{-}$ 和 $e^{-}e^{-}C\\rightarrow e^{-}e^{-}C$ 在质心坐标系中进行分析，对于前一个过程，在发生维格纳旋转的洛伦兹增强坐标系中进行分析。研究发现，通过散射振幅的非相对论近似，偶极子-偶极子和电流-偶极子相互作用是这些相关性出现的原因。最初可分离态的一个电子的冯诺依曼熵的变化以及最初准备的三粒子纠缠 W 态的 $C$ 的变化证明了这一点。在维格纳旋转中，局部酉变换下熵的不变性得以维持，代价是密度矩阵中高速出现的量子相干性。因此，两个粒子的最终状态都被评估并显示为通过其自旋期望值编码有关散射过程的信息。\n\n然后，该框架用于评论非弹性过程 $e^{-}e^{+}\\rightarrow\\mu^{-}\\mu^{+}$ 中的相关性，对此一些研究报告了不同的结果。", "authors": [{"name": "Juan D. Fonseca"}, {"name": "B. Hiller"}, {"name": "I. G. da Paz"}, {"name": "M. Sampaio"}], "featured_authors": [{"name": "Juan D. Fonseca"}, {"name": "B. Hiller"}, {"name": "I. G. da Paz"}, {"name": "M. Sampaio"}], "author_count": 4}, {"id": "2606.09217", "category": "quant-ph", "title": "Satellite-Based Quantum Communication: Performance Evaluation of Discrete-Variable Quantum Key Distribution Protocols", "abstract": "Quantum Key Distribution (QKD) has emerged as a fundamentally secure approach to communication in the era of quantum computing, offering protection against threats posed to classical cryptographic schemes such as RSA and Diffie-Hellman. This thesis presents a comprehensive performance analysis of satellite-based QKD protocols, focusing on both prepare-and-measure and entanglement-based schemes under realistic atmospheric and operational conditions. The study begins by introducing the theoretical foundations of quantum communication, including qubits, entanglement, and quantum entropy, and motivates the need for satellite-based QKD to overcome the distance limitations of fiber-based systems. Subsequently, the thesis evaluates four prominent QKD protocols-BB84, B92, BBM92, and E91-using a circular beam propagation model that incorporates atmospheric effects such as diffraction, turbulence, attenuation, and pointing errors, along with environmental noise contributions for uplink and downlink. Comparative numerical simulations reveal that protocol performance is strongly influenced by channel asymmetries, beam propagation characteristics, and noise, providing guidance on optimal protocol selection for low Earth orbit (LEO) satellite links. The research further investigates high-dimensional (HD) QKD protocols, specifically HD-BB84 and HD-Extended B92, using the elliptic-beam approximation to account for turbulence-induced distortions for both uplink and downlink. Simulations under vary ing system dimensions, weather conditions, and zenith angles demonstrate that HD-BB84 achieves higher key rates, superior noise tolerance, and more favorable probability distributions of the key rate compared to HD-Extended B92, highlighting the advantages of high-dimensional encoding for robust satellite-based QKD.", "url": "https://arxiv.org/abs/2606.09217", "type": "理论+数值", "summary": "量子密钥分发 (QKD) 已成为量子计算时代一种基本安全的通信方法，可防止 RSA 和 Diffie-Hellman 等经典加密方案面临的威胁。本论文对基于卫星的 QKD 协议进行了全面的性能分析，重点关注现实大气和操作条件下的准备和测量以及基于纠缠的方案。该研究首先介绍了量子通信的理论基础，包括量子位、纠缠和量子熵，并激发了对基于卫星的 QKD 的需求，以克服基于光纤的系统的距离限制。随后，论文使用圆形光束传播模型评估了四种著名的 QKD 协议 - BB84、B92、BBM92 和 E91，该模型考虑了衍射、湍流、衰减和指向误差等大气效应，以及上行链路和下行链路的环境噪声贡献。\n\n比较数值模拟表明，协议性能受到信道不对称性、波束传播特性和噪声的强烈影响，为近地轨道 (LEO) 卫星链路的最佳协议选择提供了指导。该研究进一步研究了高维 (HD) QKD 协议，特别是 HD-BB84 和 HD-Extended B92，使用椭圆波束近似来解释湍流引起的上行链路和下行链路失真。不同系统尺寸、天气条件和天顶角下的仿真表明，与 HD-Extended B92 相比，HD-BB84 实现了更高的密钥速率、卓越的噪声容限以及更有利的密钥速率概率分布，凸显了高维编码对于鲁棒的基于卫星的 QKD 的优势。", "authors": [{"name": "Muskan"}], "featured_authors": [{"name": "Muskan"}], "author_count": 1}, {"id": "2606.09306", "category": "quant-ph", "title": "Range-controlled entanglement in Lindbladian skin states of monitored fermions", "abstract": "Reservoir engineering can stabilize states inaccessible to unitary dynamics. Directed particle-conserving dissipation creates Lindbladian skin states, where Pauli exclusion turns edge accumulation into a many-body density imbalance. In a monitored fermion chain with tunable hopping range, we identify, within a Gaussian trajectory approximation, two finite-size scaling regimes: short-range hopping is consistent with complete skin accumulation and area-law entanglement, whereas sufficiently long-range hopping produces a finite bulk tail and effective algebraic sub-volume-law entanglement. Dissipation and coherent hopping thus jointly control skin localization and quantum entanglement, highlighting their close interconnection.", "url": "https://arxiv.org/abs/2606.09306", "type": "理论+数值", "summary": "油藏工程可以稳定单一动力学无法达到的状态。定向粒子守恒耗散创建了 Lindbladian 趋肤状态，其中泡利排斥将边缘积累转变为多体密度不平衡。在具有可调跳跃范围的受监控费米子链中，我们在高斯轨迹近似内识别出两种有限尺寸缩放机制：短程跳跃与完整的皮肤积累和面积律纠缠一致，而足够长程的跳跃产生有限的体尾和有效的代数子体积律纠缠。因此，耗散和相干跳频共同控制表皮局域化和量子纠缠，突出了它们的紧密互连。", "authors": [{"name": "Gianluca Passarelli"}, {"name": "Angelo Russomanno"}, {"name": "Davide Rossini"}, {"name": "Procolo Lucignano"}], "featured_authors": [{"name": "Gianluca Passarelli"}, {"name": "Angelo Russomanno"}, {"name": "Davide Rossini"}, {"name": "Procolo Lucignano"}], "author_count": 4}, {"id": "2606.09308", "category": "quant-ph", "title": "Energy Transport in Randomly Coupled Quantum Systems: A Perturbative Approach", "abstract": "We study energy transport between two quantum systems coupled through a random interaction. The central feature of our approach is to model the coupling as a Gaussian random matrix, which enables a simple and systematic perturbative expansion. In the large-$N$ limit, we derive explicit expressions for the energy transfer rate and heat conductance up to second order in the coupling strength. Using spectral methods and diagrammatic expansions, we obtain the leading- and next-to-leading-order contributions to the energy transfer rate. We illustrate our results through explicit calculations for Gaussian, constant, semicircular, and Gamma densities of states.", "url": "https://arxiv.org/abs/2606.09308", "type": "理论+数值", "summary": "我们研究通过随机相互作用耦合的两个量子系统之间的能量传输。我们方法的核心特征是将耦合建模为高斯随机矩阵，从而实现简单且系统的微扰展开。在大$N$限制下，我们推导出耦合强度中高达二阶的能量传递率和热导的显式表达式。使用谱方法和图解展开，我们获得了对能量转移率的前导和次前导贡献。我们通过对高斯、常数、半圆和伽马态密度的显式计算来说明我们的结果。", "authors": [{"name": "Tingfei Li"}, {"name": "Runyu Chen"}], "featured_authors": [{"name": "Tingfei Li"}, {"name": "Runyu Chen"}], "author_count": 2}, {"id": "2606.09379", "category": "quant-ph", "title": "Entanglement-assisted continuous-variable concatenated codes for encoding qubits or oscillators", "abstract": "Entanglement-assisted (EA) stabilizer codes enhance the rate of error correction in relation to codes with no pre-shared entanglement. Meanwhile, bosonic error-correcting codes, such as the Gottesman-Kitaev-Preskill (GKP) code, can be concatenated with qubit stabilizer codes to significantly reduce the logical failure probability of those stabilizer codes. First, we combine the above two concepts to propose an EA version of the qubit-into-oscillators concatenated code that chains an EA-stabilizer (outer) code with a GKP (inner) code. As an example we present a three-qubit EA-repetition concatenated with a GKP code. Second, we propose an EA version of the non-Gaussian oscillator-into-oscillators concatenated code that chains a GKP (outer) code with an EA-stabilizer (inner) code. As an example we present a GKP code concatenated with a three-qubit EA repetition code that uses two maximally entangled modes (emodes) and suppresses the variances of both position and momentum quadrature errors of a data mode. Furthermore, we generalize the latter example to a family of GKP code concatenated with a $n$-qubit EA repetition code that uses ${n-1}$ emodes and suppresses the variances of both position and momentum quadrature errors of a data mode by a factor ${1/n}$.", "url": "https://arxiv.org/abs/2606.09379", "type": "理论", "summary": "与没有预共享纠缠的代码相比，纠缠辅助 (EA) 稳定器代码提高了纠错率。同时，玻色子纠错码，例如 Gottesman-Kitaev-Preskill (GKP) 码，可以与量子位稳定器代码级联，以显着降低这些稳定器代码的逻辑失败概率。首先，我们结合上述两个概念提出了量子比特到振荡器级联代码的 EA 版本，该代码将 EA 稳定器（外部）代码与 GKP（内部）代码链接起来。作为示例，我们展示了与 GKP 代码连接的三量子位 EA 重复。其次，我们提出了非高斯振荡器到振荡器级联代码的 EA 版本，它将 GKP（外部）代码与 EA 稳定器（内部）代码链接起来。作为示例，我们提出了与三量子位 EA 重复码连接的 GKP 代码，该代码使用两种最大纠缠模式 (emode) 并抑制数据模式的位置和动量正交误差的方差。\n\n此外，我们将后一个示例推广到与 $n$-qubit EA 重复代码连接的一系列 GKP 代码，该重复代码使用 ${n-1}$ emode 并通过因子 ${1/n}$ 抑制数据模式的位置和动量正交误差的方差。", "authors": [{"name": "Nihar Ranjan Dash"}, {"name": "Sanjoy Dutta"}, {"name": "R. Srikanth"}, {"name": "Subhashish Banerjee"}], "featured_authors": [{"name": "Nihar Ranjan Dash"}, {"name": "Sanjoy Dutta"}, {"name": "R. Srikanth"}, {"name": "Subhashish Banerjee"}], "author_count": 4}, {"id": "2606.09599", "category": "quant-ph", "title": "Entanglement Generation through Coherent and Non-Coherent Control", "abstract": "The controlled generation of quantum entanglement from separable states remains a central challenge in quantum information science. Here, we investigate entanglement generation using two related control paradigms: coherent path superposition of local unitary operations and stochastic implementations of Pauli channels under coherent control. We show that entangled states belonging to the Bell, GHZ and W classes, can be deterministically generated from fully separable inputs by coherently superposing alternative sets of local unitary transformations. Conditions on the local operators for entanglement generation are derived, and the resulting states are shown to be locally unitary equivalent to standard multipartite entangled states. We further extend the analysis to noisy scenarios, where separable mi
