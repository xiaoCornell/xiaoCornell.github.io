Our result gives a polynomial-time quantum algorithm for computing the ground state energy of any Lee-Yang Hamiltonian.", "url": "https://arxiv.org/abs/2607.10765", "type": "理论+数值", "summary": "李杨定理及其量子扩展指出，对于任何图上的一大类哈密顿量，复磁场平面中的配分函数的零点仅位于虚轴上。对于这些哈密顿量，我们证明在任何强度 h 的均匀 Z 场下，基态的谱间隙至少为 h/4，与系统尺寸和耦合强度无关。该证明使用 Asano 和 Suzuki-Fisher 给出的配分函数的零自由度来显示 Z 算子的任何乘积的虚数时间相关性的指数衰减。我们的结果给出了用于计算任何李杨哈密顿量的基态能量的多项式时间量子算法。", "authors": [{"name": "Chaithanya Rayudu"}, {"name": "Jun Takahashi"}], "featured_authors": [{"name": "Chaithanya Rayudu"}, {"name": "Jun Takahashi"}], "author_count": 2}, {"id": "2607.10772", "category": "quant-ph", "title": "Demonstrating Quadratic Monte Carlo Speedup via Quantum Amplitude Estimation: Nuclear Engineering Examples", "abstract": "We demonstrate quantum amplitude estimation (QAE) as a route to quadratic speedup for Monte Carlo-type expectation values in nuclear engineering. Using QPE-based QAE, we study two examples: a discrete fission-neutron-yield expectation and a U-238 resonance integral under a $1/E$ slowing-down spectrum. The toy problem is implemented as a gate-level Qiskit circuit, while the resonance-integral example is simulated through an exact eigendecomposition of the Grover operator to avoid state-preparation decomposition bottlenecks. In both cases, the squared error scales as $O(1/T^2)$ with the number of oracle calls $T$, compared with the classical Monte Carlo scaling $O(1/N)$. For the U-238 example, QAE recovers the resonance integral to approximately $0.03%$ relative error with $m=14$ phase-estimation qubits.", "url": "https://arxiv.org/abs/2607.10772", "type": "数值", "summary": "我们展示了量子振幅估计（QAE）作为核工程中蒙特卡罗型期望值二次加速的途径。使用基于 QPE 的 QAE，我们研究了两个示例：离散裂变中子产额期望和 $1/E$ 减速谱下的 U-238 共振积分。玩具问题被实现为门级 Qiskit 电路，而谐振积分示例则通过 Grover 算子的精确特征分解进行模拟，以避免状态准备分解瓶颈。在这两种情况下，与经典的蒙特卡洛缩放 $O(1/N)$ 相比，平方误差随着预言机调用的数量 $T$ 缩放为 $O(1/T^2)$。对于 U-238 示例，QAE 将共振积分恢复到大约 $0.03%$ 相对误差，其中 $m=14$ 相位估计量子位。", "authors": [{"name": "Jilang Miao"}, {"name": "Miaomiao Jin"}, {"name": "Akira Sone"}], "featured_authors": [{"name": "Jilang Miao"}, {"name": "Miaomiao Jin"}, {"name": "Akira Sone"}], "author_count": 3}, {"id": "2607.10799", "category": "quant-ph", "title": "Quantum-enhanced physical-layer threat detection in metropolitan-scale fiber networks", "abstract": "Network security is widely recognized as a key application of quantum technology. However, its large-scale deployment is hindered by the need for tight coordination between fundamentally different quantum and classical processing steps in conventional protocols. This requirement introduces strong cross-layer interdependencies that conflict with the modular, layered architectures enabling scalability in modern communication networks. Here, we present an alternative strategy that confines all quantum interventions to the physical layer and remains transparently compatible with existing network abstractions. This is achieved by directly embedding quantum features and classical information within the same optical field using bright squeezed light. Physical-layer signals are analyzed using a cumulative sum (CUSUM) method to enable quantum-enhanced threat detection. We validate the practicality of this approach through field deployment over a metropolitan-scale fiber network and further demonstrate network-level security functionalities enabled by physical-layer quantum-enhanced thread detection. These results establish a practical, scalable framework for seamlessly integrating quantum-enhanced security into large-scale communication infrastructure.", "url": "https://arxiv.org/abs/2607.10799", "type": "理论", "summary": "网络安全被广泛认为是量子技术的关键应用。然而，其大规模部署受到传统协议中根本不同的量子和经典处理步骤之间需要紧密协调的阻碍。这一要求引入了强烈的跨层相互依赖性，与现代通信网络中实现可扩展性的模块化、分层架构相冲突。在这里，我们提出了一种替代策略，将所有量子干预限制在物理层，并保持与现有网络抽象的透明兼容。这是通过使用明亮的压缩光将量子特征和经典信息直接嵌入同一光场中来实现的。使用累积和 (CUSUM) 方法分析物理层信号，以实现量子增强威胁检测。我们通过在城域规模光纤网络上的现场部署来验证这种方法的实用性，并进一步演示通过物理层量子增强线程检测实现的网络级安全功能。\n\n这些结果建立了一个实用的、可扩展的框架，用于将量子增强安全性无缝集成到大规模通信基础设施中。", "authors": [{"name": "Yung-Cheng Kao"}, {"name": "Siddharth Pal"}, {"name": "Alex Forencich"}, {"name": "Dylan Cirimelli-Low"}, {"name": "Chaohan Cui"}, {"name": "Jack Postlewaite"}, {"name": "Pao-Kang Chen"}, {"name": "Nicola Alic"}, {"name": "Saikat Guha"}, {"name": "Prithwish Basu"}, {"name": "Linran Fan"}], "featured_authors": [{"name": "Yung-Cheng Kao"}, {"name": "Siddharth Pal"}, {"name": "Alex Forencich"}, {"name": "Saikat Guha"}, {"name": "Prithwish Basu"}, {"name": "Linran Fan"}], "author_count": 11}, {"id": "2607.10867", "category": "quant-ph", "title": "GroupFunctions.jl: computing individual entries of the irreducible representations of the unitary group U(d)", "abstract": "this http URL is a Julia library for computing individual matrix elements of irreducible representations of U(d). These matrix elements, called group functions, can be evaluated symbolically or numerically. For SU(2), they reduce to the Wigner D-functions. The library computes these matrix elements in a carrier-space basis enumerated by Gelfand-Tsetlin patterns. It can also compute entire representation operators, construct input unitaries from parameterisations common in quantum optics, translate Gelfand-Tsetlin patterns into occupation-number kets, and compute the associated Schur functions. Results can be exported in a form compatible with Mathematica.", "url": "https://arxiv.org/abs/2607.10867", "type": "理论+数值", "summary": "此 http URL 是一个 Julia 库，用于计算 U(d) 的不可约表示的各个矩阵元素。这些矩阵元素称为群函数，可以用符号或数字方式进行计算。对于 SU(2)，它们简化为维格纳 D 函数。该库在由 Gelfand-Tsetlin 模式枚举的载体空间基础上计算这些矩阵元素。它还可以计算整个表示算子，从量子光学中常见的参数化构造输入幺正，将 Gelfand-Tsetlin 模式转换为占用数 ket，并计算相关的 Schur 函数。结果可以以与 Mathematica 兼容的形式导出。", "authors": [{"name": "David Amaro-Alcalá"}, {"name": "Konrad Szymański"}], "featured_authors": [{"name": "David Amaro-Alcalá"}, {"name": "Konrad Szymański"}], "author_count": 2}, {"id": "2607.10899", "category": "quant-ph", "title": "Driven Quantum Stars as Controlled Primitives for Real-Time Spin Dynamics", "abstract": "Quantum advantage in real-time spin dynamics should be assessed against the strongest relevant classical substitutes, not merely against the qubit nature of the microscopic system. We develop a physics-based diagnostic for this boundary by reducing a qubit spin model to a spin-Landau--Lifshitz (LL) classical sector and organizing the residual quantum sector as controlled corrections. The control parameter is graph coordination: we study a spin star with \\(d\\) leaves and \\(O(1/d)\\) hub--leaf couplings. In its homogeneous form the star benchmarks the transition from LL-substitutable dynamics to genuinely quantum, discrete-sector interference; in its fully driven form, with time-dependent fields and bilinear couplings, it is the basic message-passing primitive for tree and loopy spin structures. For coherent-state return amplitudes we prove exact leaf elimination and derive a continuous-time \\(1/d\\) hierarchy. L0 is a driven one-spin weak-mean-field theory, while G1 is a Gaussian nonlocal-in-time influence correction coupling leaf two-time kernels to the hub weak two-point function. On bounded finite-time windows away from zeros of the boundary amplitudes, the hierarchy gives \\(\\log\\mathcal A-\\log\\mathcal A_{\\rm L0}=O(1/d)\\) and \\(\\log\\mathcal A-\\log\\mathcal A_{\\rm L0}-\\Delta_{\\rm G1}=O(1/d^2)\\); numerical tests on fully driven anisotropic ensembles give slopes \\(-1.05\\) and \\(-2.03\\). Static, inhomogeneous, aligned, and fully driven stars provide validation rungs, and comparison with a temporal matrix-product influence-matrix baseline delineates complementary regimes. Unlike rank compression on a Trotter grid, the hierarchy is ordered by a physical parameter, formulated in continuous time, and each truncation level is itself a physical theory, with the LL sector as the high-coordination limit.", "url": "https://arxiv.org/abs/2607.10899", "type": "理论+数值", "summary": "实时自旋动力学中的量子优势应该根据最强的相关经典替代品来评估，而不仅仅是根据微观系统的量子比特性质。我们通过将量子位自旋模型简化为自旋朗道-利夫什茨（LL）经典扇区并将剩余量子扇区组织为受控校正，为该边界开发了一种基于物理的诊断方法。控制参数是图协调：我们研究具有\\(d\\)个叶子和\\(O(1/d)\\)轮毂-叶子耦合的自旋星。在其均质形式中，这颗恒星标志着从 LL 可替代动力学到真正量子、离散扇区干涉的转变；以其完全驱动的形式，具有时间相关场和双线性耦合，它是树和循环自旋结构的基本消息传递原语。对于相干态返回幅度，我们证明了精确的叶消除并推导出连续时间 \\(1/d\\) 层次结构。 L0 是一种驱动单自旋弱平均场理论，而 G1 是将叶二次核耦合到中心弱两点函数的高斯非局部时间影响校正。\n\n在远离边界振幅零点的有界有限时间窗口上，层次结构给出 \\(\\log\\mathcal A-\\log\\mathcal A_{\\rm L0}=O(1/d)\\) 和 \\(\\log\\mathcal A-\\log\\mathcal A_{\\rm L0}-\\Delta_{\\rm G1}=O(1/d^2)\\)；对完全驱动的各向异性系综的数值测试给出了斜率 \\(-1.05\\) 和 \\(-2.03\\)。静态、非均匀、对齐和完全驱动的恒星提供了验证梯级，并且与时间矩阵乘积影响矩阵基线的比较描绘了互补机制。与 Trotter 网格上的等级压缩不同，层次结构是按物理参数排序的，在连续时间内制定，每个截断级别本身就是一个物理理论，以 LL 扇区作为高协调极限。", "authors": [{"name": "Michael Chertkov"}], "featured_authors": [{"name": "Michael Chertkov"}], "author_count": 1}, {"id": "2607.10946", "category": "quant-ph", "title": "Randomized Quantum Optimal Control", "abstract": "Quantum optimal control (QOC) aims to find control functions that optimally steer a quantum system toward a target operation. We introduce a \\emph{randomized} QOC framework where optimization is carried over an ensemble of control functions and their probabilities, instead of a single set of functions. Using this framework, we prove that randomized QOC can reach a target accuracy faster than any deterministic protocol under the same resource constraints. We also develop general symmetry-based constructions that convert a given control into an ensemble of controls that can systematically reduce the error. We benchmark these constructions for CNOT implementation and find that the resulting randomized protocol quadratically suppresses the error of the optimized deterministic solution. In addition, we introduce randomized GRAPE, which generalizes GRAPE to directly optimize control ensembles and their associated probabilities. Finally, as a related application, we discuss randomized boundary-pulse constructions {that enhance} robustness against coherent noise.", "url": "https://arxiv.org/abs/2607.10946", "type": "理论+数值", "summary": "量子最优控制（QOC）旨在找到最佳地引导量子系统实现目标操作的控制函数。我们引入了一个\\emph{随机化} QOC 框架，其中优化是在控制函数及其概率的集合上进行的，而不是在单个函数集上进行的。使用这个框架，我们证明在相同的资源约束下，随机 QOC 可以比任何确定性协议更快地达到目标精度。我们还开发了基于通用对称性的结构，将给定的控制转换为可以系统地减少误差的控制集合。我们对 CNOT 实现的这些结构进行基准测试，发现生成的随机协议二次抑制了优化确定性解决方案的误差。此外，我们引入了随机 GRAPE，它将 GRAPE 推广到直接优化控制集合及其相关概率。最后，作为一个相关的应用，我们讨论了随机边界脉冲结构，其增强了针对相干噪声的鲁棒性。", "authors": [{"name": "Leeseok Kim"}, {"name": "Francisco Riberi"}, {"name": "Kevin Baca"}, {"name": "Milad Marvian"}], "featured_authors": [{"name": "Leeseok Kim"}, {"name": "Francisco Riberi"}, {"name": "Kevin Baca"}, {"name": "Milad Marvian"}], "author_count": 4}, {"id": "2607.10950", "category": "quant-ph", "title": "$p$-Form Gauge Dynamics and Digital Quantum Simulation -- Flux and Cosmological Constant Neutralization", "abstract": "I develop a Hamiltonian framework for ${\\mathbb Z}_k$ $p$-form gauge fields on arbitrary oriented cell complexes in arbitrary dimensions. Gauge qudits are defined by $p$-cells, charged boundary qudits by $(p-1)$-cells, Gauss-law generators by boundary map $\\partial_p$, and magnetic checks by $\\partial_{p+1}$. The same cellular structure produces local dressed Wilson operators, and at $k=2$ a Calderbank-Shor-Steane check complex relevant to quantum error correction. I then specialize to $p=2, k=2$, where the magnetic 3-cell term is absent and the one-form Gauss-law can be solved exactly. The physical Hilbert space is parameterized by plaquette electric-flux variables, while the link configuration is reconstructed as the dynamical boundary of the evolving flux domains. The reduced Hamiltonian is an Ising-type plaquette model, where its local transverse-field term is the physical image of the boundary-dressed Wilson operator $\\sigma_p^z\\prod_{\\ell\\in\\partial p}\\tau_\\ell^z$. A tube-cap quench compares two initial flux fillings with the same initial boundary loops. Exact diagonalization on $4\\times4$, $6\\times4$, and $5\\times5$ tori finds that the cap loses $20$-$37\\%$ of its occupied-flux area, while the tube remains nearly pinned. A finite-size scaling locates a dynamical crossover of tension-to-density ratio near $(m/\\varepsilon_E)_c\\simeq1.89$. The unreduced plaquette-plus-link encoding provides local Gauss-law checks and a direct digital implementation, while the reduced plaquette-only Hamiltonian supplies the exact benchmark. The result places the specific top-form discharge and the cosmological constant neutralization calculation inside a general higher-form Hamiltonian and coding framework.", "url": "https://arxiv.org/abs/2607.10950", "type": "理论+数值", "summary": "我为任意维度的任意定向细胞复合体上的 ${\\mathbb Z}_k$ $p$ 形式规范场开发了一个哈密顿框架。计量量子点由 $p$-cells 定义，带电边界量子点由 $(p-1)$-cells 定义，高斯定律发生器由边界图 $\\partial_p$ 定义，磁力检查由 $\\partial_{p+1}$ 定义。相同的细胞结构产生局部着装威尔逊算子，并且在 $k=2$ 时产生与量子纠错相关的 Calderbank-Shor-Steane 校验复合体。然后我专门研究 $p=2, k=2$，其中不存在磁性 3 单元项，并且可以精确求解一式高斯定律。物理希尔伯特空间由斑块电通量变量参数化，而链路配置被重建为不断变化的通量域的动态边界。简化的哈密顿量是伊辛型斑块模型，其局部横向场项是边界修饰威尔逊算子 $\\sigma_p^z\\prod_{\\ell\\in\\partial p}\\tau_\\ell^z$ 的物理图像。管帽淬火将两种初始焊剂填充与相同的初始边界环进行比较。\n\n对 $4\\times4$、$6\\times4$ 和 $5\\times5$ tori 进行精确对角化发现，管帽损失了 $20$-$37\\%$ 的占用通量区域，而管子仍然几乎被固定。有限尺寸缩放将张力与密度比的动态交叉定位在 $(m/\\varepsilon_E)_c\\simeq1.89$ 附近。未简化的斑块加链接编码提供局部高斯定律检查和直接数字实现，而简化的仅斑块哈密顿量提供精确的基准。结果将特定的顶级形式放电和宇宙常数中和计算置于通用的更高形式哈密顿量和编码框架内。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2607.10958", "category": "quant-ph", "title": "The quantum coherence as a phase property of the wave function", "abstract": "The quantum coherence as a phase property of the most fundamental quantum mechanical entity, the wave function, is explained for the first time. Phase-sensitive nonadiabatic dressed states, arising from the interaction of a quantum system and a coherent external electromagnetic field, are used in these considerations. Two types of phase correlations in the multilevel phase-sensitive nonadiabatic dressed states are found: a rapidly changing phase correlation between the real and the virtual components and a stationary phase correlation between different virtual components of these states.", "url": "https://arxiv.org/abs/2607.10958", "type": "理论", "summary": "首次解释了量子相干性作为最基本的量子力学实体波函数的相位特性。在这些考虑中使用了由量子系统和相干外部电磁场的相互作用产生的相敏非绝热修饰态。在多级相敏非绝热修饰状态中发现了两种类型的相位相关性：实部和虚拟分量之间的快速变化的相位相关性以及这些状态的不同虚拟分量之间的平稳相位相关性。", "authors": [{"name": "Ivan Georgiev Koprinkov"}], "featured_authors": [{"name": "Ivan Georgiev Koprinkov"}], "author_count": 1}, {"id": "2607.11201", "category": "quant-ph", "title": "Dynamics of two interacting dipolar two-level systems in a multi-mode electromagnetic cavity: sudden death and revival of the concurrence within the Born-Markov approximation", "abstract": "Interacting dipolar two-level systems form a special class of qubits that interact with a cavity in a particular way. We first prove that the Markovian dynamics of one 1/2-spin in interaction with a quantised magnetic field from a multi-mode cavity at thermal equilibrium is equivalent to a two-level atom interacting in the dipole approximation with the electric field of the cavity. We then use the Born-Markov approximation to study the dynamics of two spins interacting through the antiferromagnetic Heisenberg coupling in the same environment. We find the exact expression of the density matrix of the system, with the off-diagonal coherence decay time and spin relaxation time. The concurrence for the stationary state is explicitly derived for any kind of initial state and the role of the singlet state is brought to light. The temporal evolution of the concurrence is numerically computed for different initial states, the phenomenon of sudden death and revival is observed even within the Born-Markov approximation, and an analysis of its behaviour is conducted for Werner states. We finally derive the equations and the stationary concurrence for the XXZ coupling.", "url": "https://arxiv.org/abs/2607.11201", "type": "理论+数值", "summary": "相互作用的偶极二能级系统形成一类特殊的量子位，它们以特定的方式与空腔相互作用。我们首先证明，在热平衡状态下，一个 1/2 自旋与来自多模腔的量子化磁场相互作用的马尔可夫动力学相当于一个两能级原子在偶极近似中与腔电场相互作用。然后，我们使用玻恩-马尔可夫近似来研究同一环境中通过反铁磁海森堡耦合相互作用的两个自旋的动力学。我们找到了系统密度矩阵的精确表达式，以及非对角相干衰减时间和自旋弛豫时间。对于任何类型的初始状态，都明确导出了稳态的并发性，并且揭示了单重态的作用。对不同初始状态的并发时间演化进行了数值计算，即使在玻恩-马尔可夫近似内也观察到突然死亡和复活的现象，并针对维尔纳状态对其行为进行了分析。我们最终推导出 XXZ 耦合的方程和平稳并发。", "authors": [{"name": "Loann Quien"}, {"name": "Naomichi Hatano"}], "featured_authors": [{"name": "Loann Quien"}, {"name": "Naomichi Hatano"}], "author_count": 2}, {"id": "2607.11206", "category": "quant-ph", "title": "Unique temporal scaling dimension for quantum criticality in open systems weakly coupled to environment", "abstract": "Probing, understanding, predicting, and controlling the real-time dynamics of quantum phase transitions in open systems are of pivotal importance to modern condensed matter physics, statistical physics, and quantum computing, among others. Here it is argued that a distinct temporal renormalization-group eigenvalue is needed for quantum criticality in open systems weakly coupled to their finite-temperature environment. This new physics enables the formulation of a general scaling theory that can accurately account for the critical properties including the specific Kibble-Zurek scaling in such open quantum systems. Remarkably, the critical exponents of time-related quantities are altered nonperturbatively regardless of how weak the coupling is, except for an Ohmic bath. Perspectives for future study are also discussed.", "url": "https://arxiv.org/abs/2607.11206", "type": "理论", "summary": "探测、理解、预测和控制开放系统中量子相变的实时动力学对于现代凝聚态物理、统计物理和量子计算等至关重要。这里有人认为，在与其有限温度环境弱耦合的开放系统中，量子临界性需要一个独特的时间重正化群特征值。这种新的物理学使得能够制定通用标度理论，该理论可以准确地解释关键属性，包括此类开放量子系统中的特定基布尔-祖雷克标度。值得注意的是，无论耦合有多弱，时间相关量的临界指数都会无扰地改变，欧姆浴除外。还讨论了未来研究的前景。", "authors": [{"name": "Fan Zhong"}], "featured_authors": [{"name": "Fan Zhong"}], "author_count": 1}, {"id": "2607.11216", "category": "quant-ph", "title": "Distributed Semantics for Distributed Quantum Computing", "abstract": "We present a quantum process calculus that can split the system state along process boundaries and follow the evolution of each process in isolation, without losing information about the joint state-a property we call spatial compositionality. Compositionality is the key to reasoning about any complex system, yet quantum process calculi have struggled to provide its spatial kind, which would enable analyzing a system one process at a time. Many a quantum process calculi have been proposed, but they invariably rely on a global state representation based on state vectors or density matrices, with no known way to split them without losing information about entanglement. We propose to model quantum states with Deutsch-Hayden descriptors instead, which provide a modular representation of qubit states and their evolution. We adapt these descriptors to allow arbitrary splitting and merging of the store of qubits, leading to an unusual process calculus in which qubit transfer messages carry the actual state of the qubit, where existing calculi transfer only a reference. The calculus gives localized views of system state visible to each process, which can be assembled back together into the joint state. We define a notion of process equivalence with extensive justification grounded in physics and show a bisimulation whose soundness proof is simplified by spatial compositionality. The calculus can model open systems entangled with external processes, and we demonstrate this capability on a fragment of the BB84 key distribution protocol. This exercise shows that Deutsch-Hayden descriptors can successfully track qubit movements across process and system boundaries, though it needs help from density matrices to reason about information flow.", "url": "https://arxiv.org/abs/2607.11216", "type": "理论+数值", "summary": "我们提出了一种量子过程演算，它可以沿着过程边界分割系统状态，并单独跟踪每个过程的演化，而不会丢失有关联合状态的信息——我们称之为空间组合性的属性。组合性是推理任何复杂系统的关键，但量子过程演算一直在努力提供其空间类型，这使得能够一次分析一个系统的一个过程。已经提出了许多量子过程演算，但它们总是依赖于基于状态向量或密度矩阵的全局状态表示，没有已知的方法可以在不丢失纠缠信息的情况下分割它们。我们建议使用 Deutsch-Hayden 描述符来模拟量子态，它提供了量子位态及其演化的模块化表示。我们调整这些描述符以允许任意分割和合并量子位存储，从而导致一种不寻常的过程演算，其中量子位传输消息携带量子位的实际状态，而现有演算仅传输参考。\n\n微积分给出了每个进程可见的系统状态的局部视图，这些视图可以重新组装成联合状态。我们定义了过程等价的概念，并具有基于物理学的广泛理由，并展示了一种互模拟，其健全性证明通过空间组合性得到简化。微积分可以对与外部进程纠缠在一起的开放系统进行建模，我们在 BB84 密钥分发协议的片段上演示了这种功能。这项练习表明，Deutsch-Hayden 描述符可以成功跟踪跨进程和系统边界的量子位运动，尽管它需要密度矩阵的帮助来推理信息流。", "authors": [{"name": "Jun Inoue"}], "featured_authors": [{"name": "Jun Inoue"}], "author_count": 1}, {"id": "2607.11217", "category": "quant-ph", "title": "Quantum Multiscale Modeling: A Hierarchy of Algorithms for Complex Chemical Systems", "abstract": "Multiscale modeling of complex chemical systems requires algorithms that operate coherently across electronic, atomistic, mesoscopic, and continuum scales. While quantum algorithms have been proposed for each regime, no systematic framework exists to compose them across scale boundaries. Here, we identify the conditions under which fault-tolerant quantum algorithms might preserve scale-specific quantum advantages. We map quantum phase estimation, Hamiltonian simulation with Gibbs state preparation, quantum random walks, and quantum partial differential equation solvers onto electronic structure, molecular dynamics, mesoscopic kinetics, and continuum reactor physics, respectively. Crucially, these correspondences do not imply unconditional end-to-end quantum advantage; speedups depend heavily on state preparation, memory architectures, matrix conditioning, and classical readout costs. Six unresolved questions define this composition problem, illustrated via a quantum hierarchy for \\ce{CO} oxidation over \\ce{Pt(111)}. We propose viewing inter-scale transfer as a quantum channel composition problem at the interface of algorithm design and non-equilibrium statistical mechanics, and ask whether information loss at scale boundaries is intrinsic to multiscale modeling or merely a consequence of lossy classical transduction between algorithmic layers. The resulting roadmap suggests that multiscale quantum advantage is governed primarily by the structure of information transfer between algorithmic layers, rather than by performance at individual scales alone.", "url": "https://arxiv.org/abs/2607.11217", "type": "理论+数值", "summary": "复杂化学系统的多尺度建模需要在电子、原子、介观和连续尺度上一致运行的算法。虽然已经针对每种机制提出了量子算法，但不存在系统框架来跨尺度边界组合它们。在这里，我们确定了容错量子算法可以保留特定尺度的量子优势的条件。我们将量子相位估计、吉布斯态准备的哈密顿模拟、量子随机游走和量子偏微分方程求解器分别映射到电子结构、分子动力学、介观动力学和连续反应堆物理上。至关重要的是，这些对应关系并不意味着无条件的端到端量子优势；加速在很大程度上取决于状态准备、内存架构、矩阵调节和经典读出成本。六个未解决的问题定义了这个组成问题，通过 \\ce{CO} 氧化在 \\ce{Pt(111)} 上的量子层次来说明。\n\n我们建议将尺度间传递视为算法设计和非平衡统计力学接口处的量子通道组成问题，并询问尺度边界处的信息丢失是否是多尺度建模所固有的，或者仅仅是算法层之间有损经典转换的结果。由此产生的路线图表明，多尺度量子优势主要由算法层之间的信息传输结构决定，而不是仅由单个尺度的性能决定。", "authors": [{"name": "Seenivasan Hariharan"}, {"name": "Kareljan Schoutens"}, {"name": "Sachin Kinge"}, {"name": "Lucas Visscher"}], "featured_authors": [{"name": "Seenivasan Hariharan"}, {"name": "Kareljan Schoutens"}, {"name": "Sachin Kinge"}, {"name": "Lucas Visscher"}], "author_count": 4}, {"id": "2607.11252", "category": "quant-ph", "title": "Deployment of Entanglement-Based QKD in Financial Infrastructure", "abstract": "We demonstrate the feasibility of entanglement-based quantum key distribution (eQKD) in high-security financial infrastructure over a 22 km fiber link with 8 dB loss between two data centers using polarization entanglement. The fully automated system continuously generated secure keys for four months at an average rate of 63.8 kb/s, which were stored into a key management system and consumed to establish a VPN tunnel. The setup achieved 93.7% total up-time, with no downtime caused by the quantum optical components. Active polarization control kept the quantum bit error rate below 2% for 97.4% of the time and timing synchronization based on the entangled photon pairs' intrinsic temporal correlations achieved sub-300 ps precision. Our standalone system requires neither polarized guide lasers nor external high-precision time references. These results show practical integration of eQKD into operational financial infrastructure.", "url": "https://arxiv.org/abs/2607.11252", "type": "理论", "summary": "我们展示了在高安全性金融基础设施中基于纠缠的量子密钥分发 (eQKD) 的可行性，该基础设施使用偏振纠缠在两个数据中心之间的 22 公里光纤链路上实现 8 dB 损耗。全自动系统以平均 63.8 kb/s 的速度持续生成安全密钥长达四个月，这些密钥被存储到密钥管理系统中并用于建立 VPN 隧道。该设置实现了 93.7% 的总正常运行时间，没有出现因量子光学组件而导致的停机情况。主动偏振控制使量子误码率在 97.4% 的时间内保持在 2% 以下，并且基于纠缠光子对的内在时间相关性的定时同步实现了 300 ps 以下的精度。我们的独立系统既不需要偏振引导激光器，也不需要外部高精度时间参考。这些结果表明 eQKD 已实际集成到运营金融基础设施中。", "authors": [{"name": "Mirela Selimović"}, {"name": "Roman Solar"}, {"name": "Jonathan Gruner"}, {"name": "Sebastian Mair"}, {"name": "Mario Wenzl"}, {"name": "Thomas Heine"}, {"name": "Matej Pivoluska"}, {"name": "Rupert Ursin"}, {"name": "Sebastian Philipp Neumann"}], "featured_authors": [{"name": "Mirela Selimović"}, {"name": "Roman Solar"}, {"name": "Jonathan Gruner"}, {"name": "Matej Pivoluska"}, {"name": "Rupert Ursin"}, {"name": "Sebastian Philipp Neumann"}], "author_count": 9}, {"id": "2607.11282", "category": "quant-ph", "title": "Barium-based Rydberg atom quantum technologies with long Rydberg coherence", "abstract": "The short Doppler-limited coherence time of the laser-excited Rydberg state, usually orders of magnitude shorter than the lifetime of the Rydberg state, hinders the Rydberg-mediated quantum technologies. Here, we show that a 649~nm~$-$~658~nm two-photon excitation of the $6sng~^1G_4$ Rydberg state from a long-lived d-orbital clock state of barium can be achieved with a two-photon wavevector that is tiny, which effectively removes the Doppler-limited decoherence. Moreover, the $6sng~^1G_4$ Rydberg state has strong dipole-dipole interaction due to small Förster defect with nearby Rydberg states and possesses long radiative lifetime. These can benefit quantum computing based on individually trapped neutral atoms, and can enable long-lived Rydberg polaritons in atomic media, which brings fresh opportunities in all-optical quantum information.", "url": "https://arxiv.org/abs/2607.11282", "type": "理论", "summary": "激光激发里德堡态的短多普勒限制相干时间通常比里德堡态的寿命短几个数量级，阻碍了里德堡介导的量子技术。在这里，我们证明，可以用很小的双光子波矢量实现从长寿命的 d 轨道时钟态的钡 $6sng~^1G_4$ Rydberg 态的 649~nm~$-$~658~nm 双光子激发，这有效地消除了多普勒限制的退相干。此外，$6sng~^1G_4$里德堡态由于与附近的里德堡态存在小福斯特缺陷而具有很强的偶极-偶极相互作用，并且具有较长的辐射寿命。这些可以使基于单独捕获的中性原子的量子计算受益，并且可以在原子介质中实现长寿命的里德伯极化激元，这为全光量子信息带来了新的机遇。", "authors": [{"name": "Xiao-Feng Shi"}], "featured_authors": [{"name": "Xiao-Feng Shi"}], "author_count": 1}, {"id": "2607.11380", "category": "quant-ph", "title": "Toward Quantum Utility in Correlated Topological Matter: Variational Preparation of Fractional Quantum Hall Manifolds", "abstract": "We investigate the use of variational quantum algorithms to prepare and characterize fractional quantum Hall states on near-term quantum processors. Focusing on the $\\nu=1/3$ Laughlin phase described by the $V_1$ Haldane pseudopotential, we formulate the lowest-Landau-level problem in second quantization, and implement particle-number-preserving variational circuits combined with the variational quantum eigensolver (VQE) and variational quantum deflation (VQD). We benchmark the approach in two complementary geometries: Haldane sphere and torus shape. On the Haldane sphere, the target state is a unique zero-energy Laughlin ground state, providing a controlled test of the variational workflow and of excited-state reconstruction. On the torus, the problem retains the genuinely two-dimensional periodic character of the quantum Hall liquid and exhibits the threefold topological ground-state degeneracy expected for the $\\nu=1/3$ fractional filling factor. This feature makes the torus a more demanding benchmark than the quasi-one-dimensional cylinder or thin-torus limits commonly exploited in state-preparation quantum protocols. We benchmark the hardware-optimized variational states against exact diagonalization using energy estimates, error-mitigated observables, and subspace-containment diagnostics. Our results show that hybrid quantum algorithms can approximately reconstruct the low-energy structure of small fractional quantum Hall systems, including the topological ground-state manifold on the torus. Beyond serving as a benchmark for quantum hardware, this geometry-resolved approach provides a route toward quantum simulations of fractional Chern insulators and strongly correlated topological phases in realistic two-dimensional materials.", "url": "https://arxiv.org/abs/2607.11380", "type": "理论+数值", "summary": "我们研究使用变分量子算法在近期量子处理器上准备和表征分数量子霍尔态。针对$V_1$ Haldane赝势描述的$\\nu=1/3$ Laughlin相，我们提出了第二量子化中的最低朗道级问题，并结合变分量子本征解算器（VQE）和变分量子紧缩（VQD）实现了粒子数保持变分电路。我们在两种互补的几何形状中对该方法进行了基准测试：Haldane 球体和环面形状。在霍尔丹球上，目标态是独特的零能量劳克林基态，提供变分工作流程和激发态重建的受控测试。在环面上，该问题保留了量子霍尔液体的真正二维周期性特征，并表现出 $\\nu=1/3$ 分数填充因子所预期的三重拓扑基态简并性。这一特性使得环面成为比状态准备量子协议中常用的准一维圆柱或薄环面限制更苛刻的基准。\n\n我们使用能量估计、误差减轻的可观测值和子空间包含诊断来针对精确对角化对硬件优化的变分状态进行基准测试。我们的结果表明，混合量子算法可以近似重建小型分数量子霍尔系统的低能结构，包括环面上的拓扑基态流形。除了作为量子硬件的基准之外，这种几何解析方法还为分数陈绝缘体和现实二维材料中强相关拓扑相的量子模拟提供了一条途径。", "authors": [{"name": "Sergio F. Expósito"}, {"name": "Unai Aseginolaza"}, {"name": "Raúl Guerrero-Avilés"}, {"name": "Joaquim Jornet-Somoza"}, {"name": "Francisco Guinea"}, {"name": "Juan Borge"}], "featured_authors": [{"name": "Sergio F. Expósito"}, {"name": "Unai Aseginolaza"}, {"name": "Raúl Guerrero-Avilés"}, {"name": "Joaquim Jornet-Somoza"}, {"name": "Francisco Guinea"}, {"name": "Juan Borge"}], "author_count": 6}, {"id": "2607.11401", "category": "quant-ph", "title": "From Leaves to Clusters: Depth-Efficient SAT-Oracle Synthesis Based on the HRSE Model", "abstract": "Quantum oracles are a common building block of many quantum algorithms, where circuit depth is a primary cost that directly affects overall performance. Synthesizing oracles for SAT (CNF) formulas under a limited ancilla budget, however, tends to yield deep circuits, as existing methods underexploit clause-level parallelism. In this work, we present the Clustered Synthesis Tree (CST), a depth-oriented framework whose core idea is to group the individual clause leaves of a hierarchical synthesis tree into clusters, exposing instance-dependent clause-level parallelism under ancilla constraints. CST comprises three parts: the clause-grouping problem it induces, which we formulate as an ancilla-constrained scheduling problem and prove NP-complete in general, is addressed by SeedGrow, a polynomial-time $O(m^2 k)$ heuristic; ClausePack, a reversible oracle that evaluates a cluster's clauses in parallel at only a logarithmic-depth overhead; and CST-Map, which compiles the clustered tree into an executable SAT-oracle. On random $4$-CNF under the same ancilla budgets, CST reduces the oracle's circuit depth over the state-of-the-art (SOTA) baseline by $68\\%$--$94\\%$. On the standard SATLIB benchmarks, CST achieves about a $2.6\\times$--$43.2\\times$ reduction over the SOTA baseline, with the largest gains under dense variable sharing, and matches the baseline's maximum-budget depth using only $3.7\\%$--$20\\%$ of its ancilla qubits. A Grover-search resource estimate shows the advantage carries over to the full algorithm, reducing total circuit depth by $70\\%$--$89\\%$.", "url": "https://arxiv.org/abs/2607.11401", "type": "理论+数值", "summary": "量子预言机是许多量子算法的常见构建块，其中电路深度是直接影响整体性能的主要成本。然而，在有限的辅助预算下合成 SAT (CNF) 公式的预言机往往会产生深层电路，因为现有方法未充分利用子句级并行性。在这项工作中，我们提出了聚类综合树（CST），这是一种面向深度的框架，其核心思想是将分层综合树的各个子句叶分组为聚类，在辅助约束下公开依赖于实例的子句级并行性。 CST 包含三个部分：它引发的子句分组问题，我们将其表述为辅助约束调度问题并证明一般情况下是 NP 完全的，由 SeedGrow 解决，这是一个多项式时间 $O(m^2 k)$ 启发式算法； ClausePack，一个可逆的预言机，仅以对数深度的开销并行评估集群的子句； CST-Map，它将聚类树编译成可执行的 SAT-oracle。在相同辅助预算下的随机 $4$-CNF 上，CST 将预言机的电路深度相对于最先进 (SOTA) 基线减少了 $68\\%$--$94\\%$。\n\n在标准 SATLIB 基准上，CST 比 SOTA 基线减少了约 $2.6\\times$--$43.2\\times$，在密集变量共享下收益最大，并且仅使用 $3.7\\%$-$20\\%$ 的辅助量子位来匹配基线的最大预算深度。 Grover 搜索资源估计显示该优势延续到了完整算法，将总电路深度减少了 $70\\%$--$89\\%$。", "authors": [{"name": "Zhihang Li"}, {"name": "Wei Zi"}, {"name": "Shuai Yang"}, {"name": "Bei Zhou"}, {"name": "Zongjiang Yi"}, {"name": "Woji He"}, {"name": "Yingjie Lin"}, {"name": "Kaixiang Ji"}, {"name": "Heru Du"}, {"name": "Jinchen Xu"}], "featured_authors": [{"name": "Zhihang Li"}, {"name": "Wei Zi"}, {"name": "Shuai Yang"}, {"name": "Kaixiang Ji"}, {"name": "Heru Du"}, {"name": "Jinchen Xu"}], "author_count": 10}, {"id": "2607.11410", "category": "quant-ph", "title": "Quantum algorithms for second-order boundary value problems", "abstract": "Second-order boundary value problems are central to computational science, yet standard matrix-based numerical formulations can obscure the local geometric structure that quantum circuits may exploit. Here we introduce a framework for explicitly constructing finite-dimensional counterparts of continuous differential operators in a form compatible with quantum computation. Starting from the exterior derivative, its adjoint, and the Hodge operator, we derive discrete realizations of second-order operators on primal--dual cell complexes and reformulate them as star-local update rules expressed through explicit functions that return the relevant bounding chains rather than through matrix representations. This yields simple, uniform, and scalable quantum circuits. We demonstrate the construction for div--grad and curl--curl operators, showing that the same star-local compilation principle extends across different operators, cell complexes, and manifold dimensions within a common framework. More generally, the framework provides a systematic route to quantum algorithms for partial differential equations.", "url": "https://arxiv.org/abs/2607.11410", "type": "理论+数值", "summary": "二阶边值问题是计算科学的核心，但基于标准矩阵的数值公式可能会掩盖量子电路可能利用的局部几何结构。在这里，我们介绍了一个框架，用于以与量子计算兼容的形式显式构造连续微分算子的有限维对应物。从外导数、其伴随函数和 Hodge 算子开始，我们推导了原始双元胞复合体上二阶算子的离散实现，并将它们重新表述为通过返回相关边界链的显式函数而不是通过矩阵表示来表达的星局部更新规则。这产生了简单、统一且可扩展​​的量子电路。我们演示了 div--grad 和curl--curl 运算符的构造，表明相同的星局部编译原理可以在公共框架内跨越不同的运算符、单元复合体和流形维度。更一般地说，该框架提供了偏微分方程量子算法的系统途径。", "authors": [{"name": "Lauri Kettunen"}, {"name": "Tejas Shinde"}], "featured_authors": [{"name": "Lauri Kettunen"}, {"name": "Tejas Shinde"}], "author_count": 2}, {"id": "2607.11454", "category": "quant-ph", "title": "Tunable non-Hermitian skin effect and topological phases in ladders with staggered nonreciprocal inter-leg hopping", "abstract": "We investigate the non-Hermitian skin effect (NHSE) and topological phases in a ladder model with staggered nonreciprocal inter-leg hopping, consisting of an Su-Schrieffer-Heeger (SSH) chain coupled to a normal tight-binding chain. By tuning the system parameters, we show that the direction of the NHSE under open boundary conditions can be reversed and can even become energy dependent. The NHSE is further characterized by the spectral winding number under periodic boundary conditions. We further demonstrate that the inter-leg coupling significantly enlarges the topologically nontrivial parameter regime. Remarkably, the zero-energy topological edge modes reside on different legs of the ladder and are characterized by real-space winding numbers $W=\\pm1$. Furthermore, increasing the nonreciprocity of the inter-leg hopping modifies the topological phase boundaries and eventually drives the system into a topologically trivial phase. Our results establish staggered nonreciprocal inter-leg hopping as an effective mechanism for engineering both the non-Hermitian skin effect and topological phases in ladder systems.", "url": "https://arxiv.org/abs/2607.11454", "type": "理论", "summary": "我们研究了梯形模型中的非厄米集肤效应 (NHSE) 和拓扑相，该梯形模型具有交错的非互易腿间跳跃，由与正常紧束缚链耦合的 Su-Schrieffer-Heeger (SSH) 链组成。通过调整系统参数，我们表明在开放边界条件下 NHSE 的方向可以逆转，甚至可以变得依赖于能量。 NHSE 的进一步特征是周期性边界条件下的谱缠绕数。我们进一步证明，腿间耦合显着扩大了拓扑非平凡参数范围。值得注意的是，零能量拓扑边缘模式位于梯子的不同腿上，并以实空间缠绕数 $W=\\pm1$ 为特征。此外，增加腿间跳跃的不可逆性会改变拓扑相边界，并最终驱动系统进入拓扑平凡相。我们的结果建立了交错非互易腿间跳跃作为设计梯子系统中非厄米集肤效应和拓扑相位的有效机制。", "authors": [{"name": "Pu-Xuan Li"}, {"name": "Qi-Bo Zeng"}], "featured_authors": [{"name": "Pu-Xuan Li"}, {"name": "Qi-Bo Zeng"}], "author_count": 2}, {"id": "2607.11483", "category": "quant-ph", "title": "Strong Zero Modes in Supersymmetry-Inspired Quantum Circuits", "abstract": "We investigate discrete dynamics in quantum circuits with gates corresponding to the S-matrix of a supersymmetric 1+1D quantum field theory. We show that for a brick-wall configuration such circuits support both localized and delocalized dynamically conserved operators known as strong zero modes (SZM), the number of which depends on the parameter regime. We demonstrate that, while some of the SZM remain localized at boundaries, other SZM propagate ballistically, guided by a choice of circuit parameters. Such propagation can be explained by a strong Dzyaloshinskii Moriya term appearing in the dynamics. We describe how to exploit propagating SZM for quantum information transport and discuss the robustness to various types of noise.", "url": "https://arxiv.org/abs/2607.11483", "type": "理论", "summary": "我们研究量子电路中的离散动力学，其门对应于超对称 1+1D 量子场论的 S 矩阵。我们表明，对于砖墙配置，此类电路支持局部和离域动态守恒算子，称为强零模式（SZM），其数量取决于参数机制。我们证明，虽然一些 SZM 仍然局限于边界，但其他 SZM 在选择电路参数的指导下以弹道方式传播。这种传播可以通过动力学中出现的强 Dzyaloshinskii Moriya 项来解释。我们描述了如何利用传播 SZM 进行量子信息传输，并讨论了对各种类型噪声的鲁棒性。", "authors": [{"name": "Alberto Zorzato"}, {"name": "Pietro Richelli"}, {"name": "Jiri Minář"}, {"name": "Kareljan Schoutens"}], "featured_authors": [{"name": "Alberto Zorzato"}, {"name": "Pietro Richelli"}, {"name": "Jiri Minář"}, {"name": "Kareljan Schoutens"}], "author_count": 4}, {"id": "2607.11596", "category": "quant-ph", "title": "Moment-Structured Block Encodings of Periodic Finite-Difference Operators", "abstract": "Block encoding is the standard technique for accessing matrix data in quantum linear-algebra algorithms. Its implementation directly affects its subnormalization, which in turn controls the algorithm's success probability, simulation time, and downstream costs. Explicit construction of block encodings with provably optimal subnormalization exists for only a handful of operators, with bespoke calculations used in its design. In this work, we develop a framework to block encode translation-invariant finite-difference operators on a periodic grid. These operators are the finite-difference discretizations of the constant-coefficient partial differential equations that sit at the core of scientific computing. We show that the moment order of these stencils can be used to simultaneously determine the continuum operator approximated, the vanishing order of the Fourier symbol, and the cost of the block encoding. From there, we derive a closed-form optimality criterion as a function of the stencil coefficients, which certifies whether the construction attains the optimal subnormalization for an entire operator family, uniformly in grid size, and quantifies the gap when it does not. The framework subsumes optimal constructions for the Laplacian operator in the literature and can be used to certify new instances at higher even orders, including the biharmonic operator. Furthermore, we derive success-probability floors parameterized by spectral properties of the operator's symbol and find explicit constants for the block encoding of the advection-diffusion family for which no prior explicit spatial block encoding exists.", "url": "https://arxiv.org/abs/2607.11596", "type": "理论+数值", "summary": "块编码是在量子线性代数算法中访问矩阵数据的标准技术。它的实现直接影响其次归一化，进而控制算法的成功概率、模拟时间和下游成本。具有可证明的最佳次归一化的块编码的显式构造仅适用于少数运算符，并且在其设计中使用了定制计算。在这项工作中，我们开发了一个框架来对周期性网格上的平移不变有限差分算子进行块编码。这些算子是科学计算核心的常系数偏微分方程的有限差分离散化。我们表明，这些模板的矩阶可用于同时确定近似的连续统算子、傅立叶符号的消失阶以及块编码的成本。从那里，我们得出了一个封闭形式的最优标准作为模板系数的函数，它证明该构造是否达到了整个算子族的最佳次归一化，网格大小一致，并在没有达到时量化差距。\n\n该框架包含文献中拉普拉斯算子的最佳结构，可用于验证更高偶数阶的新实例，包括双调和算子。此外，我们推导了由运算符符号的频谱属性参数化的成功概率下限，并找到了先前不存在显式空间块编码的平流扩散族的块编码的显式常量。", "authors": [{"name": "Jishnu Mahmud"}, {"name": "Rebekah Herrman"}], "featured_authors": [{"name": "Jishnu Mahmud"}, {"name": "Rebekah Herrman"}], "author_count": 2}, {"id": "2607.11637", "category": "quant-ph", "title": "From Circuits to Hardware: Benchmarking Standard and Qubit-Efficient Quantum Optimization on Real Hardware", "abstract": "Despite rapid progress in quantum optimization, broad real-hardware benchmarks comparing multiple algorithmic families across diverse combinatorial problems under a common protocol remain limited. We benchmark gate-based quantum optimization on four NP-hard problems: multi-dimensional knapsack (MDKP), maximum independent set (MIS), quadratic assignment (QAP), and market-share (MSP). We study VQE, CVaR-VQE, standard, multi-angle, and warm-start QAOA, together with qubit-efficient PCE and QRAO, on IBM Heron r1/r2 processors using resilience-level-2 mitigation. To our knowledge, this includes the first real-hardware QRAO results and the first multi-problem PCE hardware benchmark. Across 247 method-instance combinations, we report transpiled circuit size, hardware outcomes, and an independent-error gate-count fidelity proxy, $F_{\\mathrm{est}}$. For MDKP and MIS, an empirical operating point near $F_{\\mathrm{est}}\\approx 0.1$, corresponding to about 770 two-qubit gates at the median Heron-r2 CZ error rate, marks the onset of noise-dominated execution. QAP exposes a separate bottleneck: dense one-hot encodings and an exponentially sparse feasible manifold, with feasible fraction $10!/2^{100}$ at $n=10$; no tested hardware method produces a feasible assignment. Compiled QAOA-family circuits are generally noise dominated, and a matched uniform-random control shows that most feasible low-fidelity outcomes fall within the random range, apart from one finite-sample MIS warm-start exception. A SWAP-aware, fractional-gate, Nighthawk-topology compilation counterfactual reduces two-qubit counts but leaves all circuits below $F_{\\mathrm{est}}=10^{-3}$. These conclusions apply to the tested implementations rather than QAOA in general. Qubit-efficient methods extend runnable instance sizes, but only within the empirical fidelity budget.", "url": "https://arxiv.org/abs/2607.11637", "type": "数值", "summary": "尽管量子优化取得了快速进展，但在通用协议下比较不同组合问题的多个算法系列的广泛实际硬件基准仍然有限。我们在四个 NP 难题上对基于门的量子优化进行基准测试：多维背包 (MDKP)、最大独立集 (MIS)、二次分配 (QAP) 和市场份额 (MSP)。我们在使用弹性级别 2 缓解的 IBM Heron r1/r2 处理器上研究 VQE、CVaR-VQE、标准、多角度和热启动 QAOA，以及量子位高效的 PCE 和 QRAO。据我们所知，这包括第一个真实硬件 QRAO 结果和第一个多问题 PCE 硬件基准测试。在 247 个方法实例组合中，我们报告了转译电路大小、硬件结果和独立错误门计数保真度代理 $F_{\\mathrm{est}}$。对于 MDKP 和 MIS，接近 $F_{\\mathrm{est}}\\approx 0.1$ 的经验操作点（对应于 Heron-r2 CZ 错误率中值的约 770 个双量子位门）标志着噪声主导执行的开始。\n\nQAP 暴露了一个单独的瓶颈：密集的单热编码和指数稀疏的可行流形，可行分数 $10!/2^{100}$ 在 $n=10$ 处；没有经过测试的硬件方法可以产生可行的分配。编译的 QAOA 系列电路通常以噪声为主，并且匹配的均匀随机控制表明，除了一个有限样本 MIS 热启动异常之外，大多数可行的低保真结果都落在随机范围内。 SWAP 感知、分数门、夜鹰拓扑编译反事实减少了两个量子位计数，但使所有电路低于 $F_{\\mathrm{est}}=10^{-3}$。这些结论适用于经过测试的实现，而不是一般的 QAOA。量子位高效方法扩展了可运行实例的大小，但仅限于经验保真度预算内。", "authors": [{"name": "Monit Sharma"}, {"name": "Hoong Chuin Lau"}], "featured_authors": [{"name": "Monit Sharma"}, {"name": "Hoong Chuin Lau"}], "author_count": 2}, {"id": "2607.11668", "category": "quant-ph", "title": "Multi-Stage Mamba-Based Architecture for Fast and Scalable Superconducting Qubit Readout", "abstract": "Reliable qubit readout is a critical bottleneck toward fault-tolerant quantum computing (FTQC). In superconducting quantum processors, readout operations are both error-prone and high-latency. These challenges become more severe in frequency-multiplexed architectures, where signal crosstalk among neighboring qubits significantly degrades readout fidelity. Existing machine learning (ML)-based approaches rely on feed-forward neural networks (FNNs) that suffer from large parameter sizes and lack an end-to-end network that jointly addresses relaxation errors and discriminates qubit states. In this work, we present a multi-stage qubit state discriminator based on the Mamba model, which enables efficient sequence modeling with linear complexity. The first stage performs initial state discrimination, followed by a refinement stage that identifies and mitigates relaxation-induced errors. Our lightweight model achieves a geometric mean readout fidelity of 0.906, outperforming the best-reported state-of-the-art method while reducing parameter size by 49.6%; our optimal model further reaches 0.911. Both models remain robust across varying input trace lengths, maintaining a high fidelity of 0.893 at readout durations as short as 500 $ns$, achieving up to a 26% reduction in logical error rate over prior work in quantum error correction (QEC).", "url": "https://arxiv.org/abs/2607.11668", "type": "理论+数值", "summary": "可靠的量子位读出是容错量子计算（FTQC）的关键瓶颈。在超导量子处理器中，读出操作容易出错且延迟较高。这些挑战在频率复用架构中变得更加严重，其中相邻量子位之间的信号串扰显着降低了读出保真度。现有的基于机器学习 (ML) 的方法依赖于前馈神经网络 (FNN)，该网络存在较大的参数大小，并且缺乏共同解决松弛误差和区分量子位状态的端到端网络。在这项工作中，我们提出了一种基于 Mamba 模型的多级量子位状态鉴别器，它能够实现具有线性复杂度的高效序列建模。第一阶段执行初始状态辨别，然后是识别并减轻松弛引起的错误的细化阶段。我们的轻量级模型实现了 0.906 的几何平均读数保真度，优于报道最好的最先进方法，同时将参数大小减少了 49.6%；我们的最佳模型进一步达到 0.911。\n\n两种模型在不同的输入迹线长度上都保持稳健，在短至 500 $ns$ 的读出持续时间下保持 0.893 的高保真度，与之前的量子纠错 (QEC) 工作相比，逻辑错误率降低了 26%。", "authors": [{"name": "Luca Otting"}, {"name": "Xiaorang Guo"}, {"name": "Emmanouil Giortamis"}, {"name": "Benjamin Lienhard"}, {"name": "Pramod Bhatotia"}, {"name": "Martin Schulz"}], "featured_authors": [{"name": "Luca Otting"}, {"name": "Xiaorang Guo"}, {"name": "Emmanouil Giortamis"}, {"name": "Benjamin Lienhard"}, {"name": "Pramod Bhatotia"}, {"name": "Martin Schulz"}], "author_count": 6}, {"id": "2607.11793", "category": "quant-ph", "title": "Private Capacity of Quantum Channels Induced by Non-stabilizer Environmental States", "abstract": "We investigate the private capacity of quantum channels using the recently proposed quantum convolution theory for discrete-variable quantum systems. We focus on the role of the magic resource played in this framework. Firstly, for a large class of convolutional channels, we find that the private capacity is zero if the fixed environmental state is a stabilizer state. Moreover, we show that the private capacity can be nonzero for some magic environmental states. Furthermore, we show that the private capacity of a discrete beam splitter unitary is upper-bounded by the amount of magic of the environmental state. In addition, if the environmental state exhibits a certain symmetric structure, even if it is magic, the corresponding private capacity will also vanish for a class of convolution. These results emphasize the role of magic resources in quantum communication", "url": "https://arxiv.org/abs/2607.11793", "type": "理论", "summary": "我们使用最近提出的离散变量量子系统的量子卷积理论来研究量子通道的私有容量。我们重点关注魔法资源在这个框架中所扮演的角色。首先，对于一大类卷积通道，我们发现如果固定环境状态是稳定器状态，则私有容量为零。此外，我们表明，对于某些神奇的环境状态，私人能力可以不为零。此外，我们还表明，离散分束器单元的私有容量受到环境状态魔力大小的上限。另外，如果环境状态呈现出某种对称结构，即使是魔法，对于一类卷积来说，相应的私有能力也会消失。这些结果强调了神奇资源在量子通信中的作用", "authors": [{"name": "Chunhe Xiong"}, {"name": "Sunho Kim"}, {"name": "Long Long"}, {"name": "Junde Wu"}], "featured_authors": [{"name": "Chunhe Xiong"}, {"name": "Sunho Kim"}, {"name": "Long Long"}, {"name": "Junde Wu"}], "author_count": 4}, {"id": "2607.11823", "category": "quant-ph", "title": "Multiparameter Quantum Estimation in a Raman-Coupled Two-Qubit System", "abstract": "We investigate multiparameter quantum estimation in a Raman-coupled two-qubit system at thermal equilibrium. Analytical expressions for the quantum Fisher information matrix are derived to characterize the simultaneous estimation of the temperature and Raman coupling strength. The corresponding quantum Cramér--Rao bounds are obtained and compared with those of individual estimation strategies. Our results reveal optimal operating regimes determined by the interplay between thermal fluctuations and coherent interactions. In particular, quantum thermometry exhibits a well-defined optimal temperature window, whereas the estimation of the Raman coupling strength is significantly enhanced in the low-temperature and weak-coupling regime. We further show that simultaneous estimation can outperform independent estimation within appropriate parameter regions, highlighting the advantages of multiparameter quantum metrology. These results provide analytical insights into the ultimate precision limits of Raman-coupled two-qubit systems and identify promising operating regimes for quantum sensing and quantum thermometry.", "url": "https://arxiv.org/abs/2607.11823", "type": "理论", "summary": "我们研究热平衡拉曼耦合双量子位系统中的多参数量子估计。推导了量子费希尔信息矩阵的解析表达式来表征温度和拉曼耦合强度的同时估计。获得了相应的量子 Cramér-Rao 界限，并将其与各个估计策略的界限进行了比较。我们的结果揭示了由热波动和相干相互作用之间的相互作用决定的最佳运行状态。特别是，量子测温法表现出明确的最佳温度窗口，而拉曼耦合强度的估计在低温和弱耦合状态下显着增强。我们进一步表明，在适当的参数区域内，同时估计可以优于独立估计，突出了多参数量子计量的优势。这些结果为拉曼耦合双量子位系统的最终精度极限提供了分析见解，并确定了量子传感和量子测温的有前途的操作机制。", "authors": [{"name": "Omar Bachain"}, {"name": "Mohamed Amazioug"}, {"name": "Rachid Ahl Laamara"}], "featured_authors": [{"name": "Omar Bachain"}, {"name": "Mohamed Amazioug"}, {"name": "Rachid Ahl Laamara"}], "author_count": 3}, {"id": "2607.11847", "category": "quant-ph", "title": "Optimal tomography of bosonic and fermionic Gaussian states", "abstract": "The sample complexity is the minimum number of copies required to learn an accurate classical description of a quantum state. Bosonic and fermionic Gaussian quantum states are families of quantum states that play a key role in quantum science and technology, from quantum optics and many-body physics to quantum chemistry, quantum computing, and quantum information theory. Despite their importance, their sample complexity had not been fully determined. We settle this open problem and show that both bosonic and fermionic Gaussian states can be learned using a number of copies that scales quadratically in the number of modes, regardless of whether the state is pure or mixed, and independently of any energy bound on the state. We derive these results by using the representation theory of Gaussian unitaries and by putting forth a generalization of the random purification channel to this setting and beyond.", "url": "https://arxiv.org/abs/2607.11847", "type": "理论", "summary": "样本复杂度是学习量子态的准确经典描述所需的最小副本数。玻色子和费米子高斯量子态是量子态家族，在量子科学和技术中发挥着关键作用，从量子光学和多体物理到量子化学、量子计算和量子信息论。尽管它们很重要，但它们的样本复杂性尚未完全确定。我们解决了这个悬而未决的问题，并表明，玻色子和费米子高斯态都可以使用大量副本来学习，这些副本在模式数量上呈二次方缩放，无论状态是纯状态还是混合状态，并且与状态上束缚的任何能量无关。我们通过使用高斯酉表示理论并提出随机净化通道对此设置及更高设置的推广来得出这些结果。", "authors": [{"name": "Senrui Chen"}, {"name": "Marco Fanizza"}, {"name": "Filippo Girardi"}, {"name": "Ludovico Lami"}, {"name": "Francesco Anna Mele"}, {"name": "Michael Walter"}, {"name": "Freek Witteveen"}], "featured_authors": [{"name": "Senrui Chen"}, {"name": "Marco Fanizza"}, {"name": "Filippo Girardi"}, {"name": "Francesco Anna Mele"}, {"name": "Michael Walter"}, {"name": "Freek Witteveen"}], "author_count": 7}, {"id": "2607.11856", "category": "quant-ph", "title": "Trotter error compensation with polylogarithmic precision and nested-commutator scaling without ancillas", "abstract": "Product formulas are among the most practical approaches to Hamiltonian simulation, requiring no ancillary qubits and exhibiting error bounds governed by nested commutators rather than only by Hamiltonian norms. Their circuit size, however, scales polynomially with the inverse precision. We develop a high-order nested-commutator compensation (HNCC) algorithm that preserves the main advantages of product formulas while achieving polylogarithmic precision dependence in the circuit size and the standard $\\mathcal{O}(\\varepsilon^{-2})$ sampling cost. HNCC uses a truncated Baker--Campbell--Hausdorff expansion to represent high-order Trotter errors by products of nested commutators and compensates these errors at the superoperator level through randomly sampled Pauli-rotation channels, avoiding Hadamard tests and ancillary qubits. For a fixed $K$-th order product formula applied to a $k$-local Hamiltonian on $N$ qubits with $\\Gamma$ Pauli terms and local interaction strength $g_0$, HNCC estimates $\\operatorname{tr}[Oe^{-\\mathrm{i} tH}\\rho e^{\\mathrm{i} tH}]$ to additive precision $\\varepsilon\\|O\\|$ using $\\mathcal{O}(\\varepsilon^{-2})$ repetitions and a maximum gate count per circuit of $\\mathcal{O}(N^{\\frac{2}{2K+1}} (k g_0 t \\log(1/\\varepsilon))^{1+\\frac{1}{2K+1}} k(\\Gamma+\\log(1/\\varepsilon)))$. The resulting time dependence matches that of a product formula of order $2K+1$. Finite-size resource estimates for the periodic Heisenberg chain indicate that HNCC achieves the lowest CNOT and $T$-gate counts per circuit among the product-formula-based methods considered.", "url": "https://arxiv.org/abs/2607.11856", "type": "理论+数值", "summary": "乘积公式是哈密顿模拟最实用的方法之一，不需要辅助量子位，并且表现出由嵌套交换子控制的误差范围，而不仅仅是由哈密顿范数控制。然而，它们的电路尺寸与精度的倒数成多项式缩放。我们开发了一种高阶嵌套换向器补偿（HNCC）算法，该算法保留了乘积公式的主要优点，同时实现了电路尺寸和标准 $\\mathcal{O}(\\varepsilon^{-2})$ 采样成本的多对数精度依赖性。 HNCC 使用截断的 Baker-Campbell-Hausdorff 展开式来表示嵌套换向器乘积的高阶 Trotter 误差，并通过随机采样的泡利旋转通道在超级算子级别补偿这些误差，避免了 Hadamard 测试和辅助量子位。\n\n对于应用于具有 $\\Gamma$ 泡利项和局部相互作用强度 $g_0$ 的 $N$ 量子位上的 $k$ 局部哈密顿量的固定 $K$ 阶乘积公式，HNCC 使用以下方法估计 $\\operatorname{tr}[Oe^{-\\mathrm{i} tH}\\rho e^{\\mathrm{i} tH}]$ 到附加精度 $\\varepsilon\\|O\\|$ $\\mathcal{O}(\\varepsilon^{-2})$ 重复次数，每个电路的最大门数为 $\\mathcal{O}(N^{\\frac{2}{2K+1}} (k g_0 t \\log(1/\\varepsilon))^{1+\\frac{1}{2K+1}} k(\\Gamma+\\log(1/\\varepsilon)))$。所得时间依赖性与 $2K+1$ 阶乘积公式的时间依赖性相匹配。周期性海森堡链的有限大小资源估计表明，在所考虑的基于乘积公式的方法中，HNCC 实现了每个电路的最低 CNOT 和 $T$ 门计数。", "authors": [{"name": "Xinzhao Wang"}, {"name": "Shuo Zhou"}, {"name": "Ziruo Wang"}, {"name": "Pei Zeng"}, {"name": "Jinzhao Sun"}, {"name": "Qi Zhao"}, {"name": "Tom Gur"}, {"name": "Tongyang Li"}], "featured_authors": [{"name": "Xinzhao Wang"}, {"name": "Shuo Zhou"}, {"name": "Ziruo Wang"}, {"name": "Qi Zhao"}, {"name": "Tom Gur"}, {"name": "Tongyang Li"}], "author_count": 8}, {"id": "2607.11857", "category": "quant-ph", "title": "Noise Resilience of Quantum Key Distribution Protocols Secured Against Independent Attacks With One-Way Communication", "abstract": "We investigate the resilience to noise of single-qubit quantum key distribution (QKD) protocols in the scenario of security against independent eavesdropping attacks and key distillation based on one-way classical communication. To this end, we introduce a noise-based metric that quantifies the efficiency of QKD protocols. Within this framework, we analyze the maximal noise levels that allow Alice and Bob to asymptotically establish a secure secret key. Using this assumption, we compare the noise tolerance of general single-qubit QKD protocols, in particular the BB84, B92, E91, and six-state protocols. Our main result determines the noise level threshold for QKD allowing one to distill an asymptotically secure secret key. Additionally, we demonstrate that the six-state protocol achieves the greatest resistance to noise while simultaneously yielding a higher post-selection efficiency than the other analyzed single-qubit protocols, confirming its robustness within the considered security model. Finally, we perform an analysis of the proposed noise-based metric and the conventional quantum bit error rate (QBER) metric.", "url": "https://arxiv.org/abs/2607.11857", "type": "理论", "summary": "我们研究了单量子位量子密钥分发（QKD）协议在针对独立窃听攻击和基于单向经典通信的密钥蒸馏的安全场景中的抗噪声能力。为此，我们引入了一种基于噪声的指标来量化 QKD 协议的效率。在此框架内，我们分析了允许 Alice 和 Bob 渐近建立安全密钥的最大噪声水平。使用这个假设，我们比较了一般单量子位 QKD 协议的噪声容限，特别是 BB84、B92、E91 和六态协议。我们的主要结果确定了 QKD 的噪声水平阈值，允许人们提取渐近安全的密钥。此外，我们证明六态协议实现了最大的抗噪声能力，同时比其他分析的单量子位协议产生更高的选择后效率，证实了其在所考虑的安全模型中的稳健性。最后，我们对所提出的基于噪声的度量和传统的量子误码率（QBER）度量进行了分析。", "authors": [{"name": "Adam Bílek"}, {"name": "Ryszard Kukulski"}, {"name": "Paulina Lewandowska"}, {"name": "Łukasz Pawela"}, {"name": "Zbigniew Puchała"}], "featured_authors": [{"name": "Adam Bílek"}, {"name": "Ryszard Kukulski"}, {"name": "Paulina Lewandowska"}, {"name": "Łukasz Pawela"}, {"name": "Zbigniew Puchała"}], "author_count": 5}, {"id": "2607.11867", "category": "quant-ph", "title": "Paraparticles intrinsically exhibit Hardy-space breakdown", "abstract": "The memory kernel of an open quantum system obeys Kramers--Kronig (KK) relations if and only if its Laplace transform is analytic in the upper half-plane -- a property known as Hardy-space analyticity. Here we show that non-unitary exchange statistics, the defining property of paraparticles, intrinsically breaks Hardy-space analyticity. The metric $\\eta$ that guarantees a real closed-system spectrum for these particles necessarily differs from the physical Born inner product ($\\|\\eta - I\\|_F / \\|I\\|_F = 0.51$) -- a mathematical consequence of the R-matrix's non-unitarity, not a parameter choice. This metric is a \"shadow metric\": Schur's lemma forces it to commute with every bilinear observable, making the distortion physically invisible in the closed system. But when the paraparticle is coupled to a bath, any coupling operator that lies outside the symmetry algebra -- that is, any interaction that sees the internal flavour structure -- exposes the distortion. The memory kernel then develops upper-half-plane poles at coupling $g_c \\approx 0.1$, breaking standard dispersion relations before the closed-system spectrum complexifies. Fermions and bosons, whose exchange is unitary ($\\eta = I$ as an analytic fact of the canonical anticommutation algebra), are immune at any coupling, because there is no distortion to expose. The violation is intrinsic: it distinguishes non-unitary exchange statistics from ordinary particle statistics at the level of the memory kernel's analytic structure.", "url": "https://arxiv.org/abs/2607.11867", "type": "理论", "summary": "当且仅当其拉普拉斯变换在上半平面上是解析的时，开放量子系统的存储内核遵循克拉默斯-克罗尼格（KK）关系，这种性质称为哈代空间解析性。在这里，我们表明，非酉交换统计（副粒子的定义属性）本质上打破了哈代空间的分析性。保证这些粒子的真实封闭系统谱的度量 $\\eta$ 必然不同于物理玻恩内积 ($\\|\\eta - I\\|_F / \\|I\\|_F = 0.51$)——R 矩阵非单位性的数学结果，而不是参数选择。这个度量是一个“影子度量”：舒尔引理迫使它与每个双线性可观测量进行交换，使得扭曲在封闭系统中物理上不可见。但是，当副粒子与浴耦合时，对称代数之外的任何耦合算子（即看到内部风味结构的任何相互作用）都会​​暴露失真。然后，内存内核在耦合 $g_c \\approx 0.1$ 处形成上半平面极点，在闭合系统谱复杂化之前打破标准色散关系。\n\n费米子和玻色子的交换是酉的（$\\eta = I$ 作为规范反交换代数的分析事实），在任何耦合下都是免疫的，因为没有任何扭曲可以暴露。这种违反是内在的：它在内存内核的分析结构级别上将非单一交换统计与普通粒子统计区分开来。", "authors": [{"name": "Kejun Liu"}], "featured_authors": [{"name": "Kejun Liu"}], "author_count": 1}, {"id": "2607.11882", "category": "quant-ph", "title": "An efficient algorithm for approximate shadow Hamiltonian simulation", "abstract": "We propose an efficient algorithm based on shadow Hamiltonian simulation to approximately simulate the real-time dynamics of observables under time-independent Hamiltonians. Shadow Hamiltonian simulation works at the level of the operator algebra generated by the observables through commutators with the Hamiltonian. Exactly encoding the quantum state in this picture is generally inefficient for interacting systems due to the exponential growth of the operator algebra. Our algorithm overcomes this bottleneck by systematically identifying the elements of the algebra most relevant to the target observables. This targeted approach is a controlled approximation that yields a highly efficient quantum state encoding that substantially reduces the size of the qubit register required to perform the time evolution using the shadow Hamiltonian. We propose two main pruning schemes, one based on a predefined operator basis and another on a constructed Krylov basis. We also present a hybrid scheme that builds a Krylov basis within a pruned algebra in the predefined basis. We benchmark our algorithm using lattice spin systems in one and two dimensions, for both one- and higher-point correlators as observables.", "url": "https://arxiv.org/abs/2607.11882", "type": "理论+数值", "summary": "我们提出了一种基于影子哈密顿量模拟的有效算法，以近似模拟与时间无关的哈密顿量下可观测量的实时动态。影子哈密顿量模拟在算子代数的层面上进行，该算子代数由可观测量通过带有哈密顿量的换向器生成。由于算子代数的指数增长，对图中的量子态进行精确编码对于交互系统来说通常效率较低。我们的算法通过系统地识别与目标可观测值最相关的代数元素来克服这一瓶颈。这种有针对性的方法是一种受控近似，可产生高效的量子态编码，从而大大减少使用影子哈密顿量执行时间演化所需的量子位寄存器的大小。我们提出了两种主要的剪枝方案，一种基于预定义的算子基础，另一种基于构造的 Krylov 基础。我们还提出了一种混合方案，该方案在预定义基的修剪代数内构建 Krylov 基。\n\n我们使用一维和二维晶格自旋系统对我们的算法进行基准测试，将一点和更高点的相关器作为可观察量。", "authors": [{"name": "Abhijit Chakraborty"}, {"name": "Bharath Sambasivam"}, {"name": "Karunya Shirali"}, {"name": "Hunter Nelson"}, {"name": "Mafalda Ramôa"}, {"name": "Sophia E. Economou"}, {"name": "Edwin Barnes"}], "featured_authors": [{"name": "Abhijit Chakraborty"}, {"name": "Bharath Sambasivam"}, {"name": "Karunya Shirali"}, {"name": "Mafalda Ramôa"}, {"name": "Sophia E. Economou"}, {"name": "Edwin Barnes"}], "author_count": 7}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
