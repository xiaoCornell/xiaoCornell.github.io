  <style>

    }

    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }

    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }

  <script>
    const papers = [{"id": "2607.09761", "category": "cond-mat", "title": "SlaKoNet-VQD: A universal Slater-Koster tight-binding Hamiltonian for variational quantum band-structure calculations on near-term hardware", "abstract": "Variational quantum algorithms such as VQE and VQD are promising for near-term electronic structure calculations, but for periodic solids their reach is limited by the cost of building a faithful second-quantized Hamiltonian, typically via DFT plus Wannierization or hand-fit tight-binding parameters. SlaKoNet addresses this by combining deep learning with the Slater-Koster tight-binding formalism to fit hopping and overlap parameters across 65 elements, enabling deterministic Hamiltonian construction for any crystal built from these elements. Here we couple a SlaKoNet model trained on JARVIS-TBmBJ with a Qiskit-based VQD algorithm, replacing costly Hamiltonian construction with a universal neural Hamiltonian generator. The resulting SlaKoNet-VQD workflow is structure-agnostic, differentiable, and suited to high-throughput bandstructure screening. We benchmark on silicon, recovering the full eight-band structure along the standard k-path with mean absolute deviation of 1.78 meV from exact diagonalization on a 3-qubit simulator, and extend to five conventional superconductors (Al, Ta, Nb, V, ZrN) with similar accuracy. We demonstrate execution on IBM Quantum hardware for a k-point ground-state calculation on aluminum (MAE ~0.37 eV). We further promote the Hamiltonian to a correlated Hubbard model solved via dynamical mean-field theory, recovering weakening correlations across group-5 metals and strong quasiparticle renormalization in La2CuO4, identifying the impurity problem as a natural quantum solver target. This pipeline enables high-throughput VQA benchmarking across the periodic table and gradient-based ansatz-Hamiltonian co-optimization for materials discovery. Web app: this https URL .", "url": "https://arxiv.org/abs/2607.09761", "type": "理论+数值", "summary": "VQE 和 VQD 等变分量子算法对于近期电子结构计算很有前景，但对于周期性固体，它们的范围受到构建忠实的第二量子化哈密顿量的成本的限制，通常通过 DFT 加上 Wannierization 或手动拟合紧束缚参数。 SlaKoNet 通过将深度学习与 Slater-Koster 紧束缚形式相结合来解决这个问题，以适应 65 个元素的跳跃和重叠参数，从而为由这些元素构建的任何晶体提供确定性的哈密顿构造。在这里，我们将在 JARVIS-TBmBJ 上训练的 SlaKoNet 模型与基于 Qiskit 的 VQD 算法结合起来，用通用神经哈密顿生成器取代了昂贵的哈密顿构造。由此产生的 SlaKoNet-VQD 工作流程与结构无关、可微分，并且适合高通量能带结构筛选。我们在硅上进行基准测试，沿标准 k 路径恢复完整的八能带结构，与 3 量子位模拟器上的精确对角化平均绝对偏差为 1.78 meV，并以类似的精度扩展到五种传统超导体（Al、Ta、Nb、V、ZrN）。\n\n我们演示了在 IBM Quantum 硬件上对铝进行 k 点基态计算的执行情况 (MAE ~0.37 eV)。我们进一步将哈密顿量推广为通过动态平均场理论求解的相关哈伯德模型，恢复第 5 族金属之间减弱的相关性和 La2CuO4 中的强准粒子重正化，将杂质问题确定为自然量子求解器目标。该流程可实现跨元素周期表的高通量 VQA 基准测试以及基于梯度的 ansatz-Hamiltonian 材料发现协同优化。 Web 应用程序：此 https URL 。", "authors": [{"name": "Akshaya Ajith"}, {"name": "Jaehyung Lee"}, {"name": "Charles Rhys Campbell"}, {"name": "Kamal Choudhary"}], "featured_authors": [{"name": "Akshaya Ajith"}, {"name": "Jaehyung Lee"}, {"name": "Charles Rhys Campbell"}, {"name": "Kamal Choudhary"}], "author_count": 4}, {"id": "2607.09859", "category": "cond-mat", "title": "Landau-Zener tunneling and quantum interference of Andreev states", "abstract": "With the aid of a microscopic theory we derive an effective Hamiltonian that controls quantum dynamics of Andreev states in superconducting nanojunctions out of equilibrium. Resolving the corresponding Schrödinger-like equation we obtain the \"wave functions\" for Andreev levels and evaluate electric current across the junction in the presence of an external voltage bias. We demonstrate that quantum interference of Andreev states may yield pronounced coherent oscillations of the supercurrent as a function of the Josephson phase in junctions with barrier transmissions slightly below unity. Further implications of this novel effect are expected for junctions with diffusive barriers.", "url": "https://arxiv.org/abs/2607.09859", "type": "理论+数值", "summary": "借助微观理论，我们推导了一种有效的哈密顿量，可以控制超导纳米结中安德烈夫态的量子动力学失去平衡。通过求解相应的类薛定谔方程，我们获得了安德烈夫能级的“波函数”，并在存在外部电压偏置的情况下评估了结上的电流。我们证明，安德烈夫态的量子干涉可能会产生明显的超电流相干振荡，作为势垒传输略低于单位的结中约瑟夫森相位的函数。预计这种新效应对于具有扩散障碍的连接点会有进一步的影响。", "authors": [{"name": "Mikhail S. Kalenkov"}, {"name": "Andrei D. Zaikin"}], "featured_authors": [{"name": "Mikhail S. Kalenkov"}, {"name": "Andrei D. Zaikin"}], "author_count": 2}, {"id": "2607.09881", "category": "cond-mat", "title": "Approximate explicit formulas for Stoner-Wohlfarth hysteresis loops", "abstract": "Approximate explicit formulas for the hysteresis loops in the Stoner-Wohlfarth model are derived. We consider the hysteresis loops both for a single particle with a fixed easy-axis direction and for an ensemble of particles with randomly oriented anisotropy axes. The physical assumption used to derive the formulas is that the particle magnetic moment lies in the vicinity of the easy axis or the external field direction, at low and high fields, respectively. Surprisingly, the low-field formula is approximately valid even near the Stoner-Wohlfarth astroid, where the reduced magnetic field h0 is not very small. The general piecewise formula is obtained by an appropriate matching of the functions defined on different intervals of the magnetic field, which are chosen to maximize the formula accuracy. For the averaged hysteresis loop, the maximal, but reasonably small, deviation of our formula from numerically calculated magnetization occurs at h0 = 0.5, which corresponds to the sharp change in magnetization slope.", "url": "https://arxiv.org/abs/2607.09881", "type": "理论+数值", "summary": "推导了 Stoner-Wohlfarth 模型中磁滞回线的近似显式公式。我们考虑具有固定易轴方向的单个粒子和具有随机定向各向异性轴的粒子集合的磁滞回线。用于推导公式的物理假设是，在低场和高场下，粒子磁矩分别位于易磁化轴或外部场方向附近。令人惊讶的是，即使在斯通纳-沃尔法斯小行星附近，低场公式也近似有效，那里减少的磁场 h0 并不是很小。一般分段公式是通过适当匹配在磁场的不同间隔上定义的函数来获得的，选择这些函数是为了最大化公式精度。对于平均磁滞回线，我们的公式与数值计算的磁化强度的最大但相当小的偏差发生在 h0 = 0.5 处，这对应于磁化斜率的急剧变化。", "authors": [{"name": "Savin Vladimir P."}, {"name": "Koksharov Yury A"}], "featured_authors": [{"name": "Savin Vladimir P."}, {"name": "Koksharov Yury A"}], "author_count": 2}, {"id": "2607.09910", "category": "cond-mat", "title": "Auditing Machine-Learning Models and Their Training Data with Explainability and First-Principles Verification: Application to Spin Hall Conductivity", "abstract": "Machine-learning models for materials properties rest on two assumptions that standard validation never tests: that a model's features reflect the physics of the property rather than accidents of the training distribution, and that the training labels are themselves correct. We introduce a model-agnostic audit protocol for both, combining SHAP attribution, counterfactual partial dependence analysis, and Rashomon-style cross-model verification, with every finding adjudicated by targeted density functional theory (DFT). Demonstrated on intrinsic spin Hall conductivity using a composition-only Random Forest, the model needs no relaxed crystal structure, reaching accuracy competitive with structure-aware graph networks while remaining applicable to the far larger space of compositions for which no structure has been computed. The model audit reveals that the average p-valence descriptor becomes statistically entangled with Pt content - a property of the learned representation rather than the physics; DFT confirms the consequence, a Pt-free compound (HgOsPb$_2$) whose true SHC is nearly four times the prediction. The data audit exposes a thirtyfold error in the HfC training label, inherited undetectably by every black-box model trained on the same data. The protocol audits a model and its training data for the cost of a few DFT calculations, wherever one element dominates the high-property regime.", "url": "https://arxiv.org/abs/2607.09910", "type": "理论+数值", "summary": "材料属性的机器学习模型基于标准验证从未测试的两个假设：模型的特征反映属性的物理特性而不是训练分布的偶然性，以及训练标签本身是正确的。我们为两者引入了一种与模型无关的审计协议，结合了 SHAP 归因、反事实部分依赖分析和罗生门式跨模型验证，每项发现都由目标密度泛函理论 (DFT) 裁决。该模型使用仅成分随机森林演示了本征自旋霍尔电导率，不需要松弛的晶体结构，达到了与结构感知图网络相媲美的精度，同时仍然适用于尚未计算结构的更大的成分空间。模型审核表明，平均 p 价描述符在统计上与 Pt 含量纠缠在一起——这是学习表示的属性，而不是物理属性； DFT 证实了这一结果，即一种无 Pt 化合物 (HgOsPb$_2$)，其真实 SHC 几乎是预测值的四倍。\n\n数据审计暴露了 HfC 训练标签中的三十倍错误，每个在相同数据上训练的黑盒模型都无法察觉地继承了该错误。该协议会审核模型及其训练数据，以计算一些 DFT 计算的成本，只要一个元素在高属性体系中占主导地位。", "authors": [{"name": "Mohammed Mahshook"}, {"name": "Rudra Banerjee"}], "featured_authors": [{"name": "Mohammed Mahshook"}, {"name": "Rudra Banerjee"}], "author_count": 2}, {"id": "2607.09928", "category": "cond-mat", "title": "Odd Polycatenanes Tank-Tread in Strong Shear Flow", "abstract": "Polycatenanes are mechanically interlocked polymers composed of ring molecules linked through mechanical bonds. Here, we investigate the single-molecule dynamics of linear polycatenanes under strong steady shear flow using coarse-grained Brownian dynamics simulations with hydrodynamic interactions. We identify a stable tank-treading state in which individual rings rotate continuously while the overall polymer remains highly extended and aligned with the flow direction, adopting conformations typically associated with extensional flow. Remarkably, tank-treading is observed almost exclusively in odd polycatenanes, polycatenanes with an odd number of rings. We attribute this odd-even effect to the orientation of the terminal rings within the flow-gradient plane, where they act as anchors that stabilize polymer extension, a configuration accessible only to odd polycatenanes. Furthermore, our simulations and a Markov state model demonstrate that this dynamic behavior remains stable over long timescales. Finally, we show that tank treading polycatenanes can be used to fully extend other molecules in strong shear flow, hinting at applications of this behavior to manipulate molecules in rotational flows.", "url": "https://arxiv.org/abs/2607.09928", "type": "理论+数值", "summary": "聚链烷是由通过机械键连接的环分子组成的机械联锁聚合物。在这里，我们使用具有流体动力学相互作用的粗粒布朗动力学模拟研究了强稳定剪切流下线性聚链烷的单分子动力学。我们确定了一种稳定的坦克踩踏状态，其中各个环连续旋转，同时整个聚合物保持高度延伸并与流动方向对齐，采用通常与拉伸流动相关的构象。值得注意的是，坦克踩踏几乎只在奇数聚环烯中观察到，即具有奇数环的聚环烯。我们将这种奇偶效应归因于流动梯度平面内末端环的取向，它们充当稳定聚合物延伸的锚，这是一种仅适用于奇数聚链烷的结构。此外，我们的模拟和马尔可夫状态模型表明，这种动态行为在很长一段时间内保持稳定。\n\n最后，我们表明，坦克踩踏聚链烷可用于在强剪切流中完全延伸其他分子，暗示应用这种行为来操纵旋转流中的分子。", "authors": [{"name": "Ali Seyedi"}, {"name": "Charles W. Manke"}, {"name": "Alex Albaugh"}], "featured_authors": [{"name": "Ali Seyedi"}, {"name": "Charles W. Manke"}, {"name": "Alex Albaugh"}], "author_count": 3}, {"id": "2607.09977", "category": "cond-mat", "title": "Thermodynamics of hydride formation: Anisotropic size-dependent coupled chemo-thermo-mechanical effects at Ni/NiH interfaces", "abstract": "Ni nanoparticles are frequently used as catalysts for hydrogenation reactions as well as in hydrogen storage applications. Recently, we have shown that small Ni nanoparticles can absorb hydrogen at < 10 bar pressure to form Ni hydride. During this process, the hydride growth is anisotropic, and a coherent Ni/NiH interface is formed. In order to explain the anisotropy and to comprehensively account for the coupling chemical, mechanical and thermal effects, we develop in this study a simplified chemo-thermo-mechanical enthalpy model for Ni/NiH interfaces in thin films. This model captures the combined influence of extent of hydride formation x, temperature T, pressure P, size effect ($l$), and the ${\\alpha}$/${\\beta}$ interface energy ${\\lambda}$. Two different ${\\alpha}$/${\\beta}$ interface orientations, namely (100) and (111), are investigated. The model is shown to correctly predict the enthalpy and volume changes over a wide range of length scales, from atomically thin layers (~1 nm) to micron scale and larger. This work provides the basis for the development of similar enthalpy models for other solid-state hydrogen storage nanostructured materials where anisotropic growth of hydride phases is also observed.", "url": "https://arxiv.org/abs/2607.09977", "type": "理论", "summary": "镍纳米粒子经常用作加氢反应以及储氢应用的催化剂。最近，我们发现小型镍纳米粒子可以在 < 10 bar 压力下吸收氢气形成氢化镍。在此过程中，氢化物的生长是各向异性的，并形成连贯的 Ni/NiH 界面。为了解释各向异性并综合考虑化学、机械和热的耦合效应，我们在本研究中开发了薄膜中 Ni/NiH 界面的简化化学-热-机械焓模型。该模型捕捉了氢化物形成程度 x、温度 T、压力 P、尺寸效应 ($l$) 和 ${\\alpha}$/${\\beta}$ 界面能 ${\\lambda}$ 的综合影响。研究了两种不同的${\\alpha}$/${\\beta}$界面方向，即（100）和（111）。该模型可以正确预测从原子薄层（~1 nm）到微米级甚至更大的各种长度尺度上的焓和体积变化。\n\n这项工作为其他固态储氢纳米结构材料开发类似的焓模型奠定了基础，在这些材料中也观察到氢化物相的各向异性生长。", "authors": [{"name": "Sourabh Singha"}, {"name": "Abhijit Chatterjee"}], "featured_authors": [{"name": "Sourabh Singha"}, {"name": "Abhijit Chatterjee"}], "author_count": 2}, {"id": "2607.10002", "category": "cond-mat", "title": "Anisotropic representations for E(3)-equivariant machine learning coarse-grained potentials", "abstract": "Coarse-graining (CG) lowers the computational cost of atomistic simulations by representing groups of atoms as effective interaction sites, reducing the degrees of freedom of the system but often compromising structural fidelity or requiring system-specific parameterization. Here, we introduce a novel anisotropic machine learning CG potential that extends the point particle representation of atomic nuclei to massive ellipsoidal beads with orientation-dependent features, enabling the learning of energies, forces, and torques directly from atomistic data. The anisotropic representation is physically motivated for polar and asymmetric molecules, where directional interactions and shape anisotropy play important roles in determining structure and dynamics. Using an equivariant message-passing neural network, the model accurately reproduces radial and angular distribution functions as well as relative orientation correlations in liquid water, demonstrating that both translational and rotational dynamics are well captured. Comparison with an isotropic baseline reveals that the lack of orientation information leads to systematic errors in short and long range order and degradation of angular correlations, proving orientation features are essential for accurate coarse-graining. The anisotropic model also exposes rotational structural observables fundamentally inaccessible to isotropic representations, with minimal computational overhead. Even for coarse-graining just three degrees of freedom, CG simulations achieve 7-27$\\times$ speedups while preserving structural fidelity, highlighting the efficiency gains of this systemic reduction. This framework establishes the feasibility and necessity of learned equivariant representations for anisotropic CG modeling and provides a path towards accurate and efficient mesoscopic simulations of complex molecular liquids, polymers, and biomolecular systems.", "url": "https://arxiv.org/abs/2607.10002", "type": "理论+数值", "summary": "粗粒度（CG）通过将原子组表示为有效的相互作用位点来降低原子模拟的计算成本，降低系统的自由度，但通常会损害结构保真度或需要系统特定的参数化。在这里，我们引入了一种新颖的各向异性机器学习 CG 势，它将原子核的点粒子表示扩展到具有方向相关特征的大量椭球珠，从而能够直接从原子数据中学习能量、力和扭矩。各向异性表示的物理动机是极性和不对称分子，其中方向相互作用和形状各向异性在确定结构和动力学方面发挥着重要作用。该模型使用等变消息传递神经网络，准确地再现了液态水中的径向和角度分布函数以及相对方向相关性，证明了平移和旋转动力学都得到了很好的捕捉。\n\n与各向同性基线的比较表明，方向信息的缺乏会导致短程和长程有序的系统误差以及角度相关性的退化，证明方向特征对于精确的粗粒度至关重要。各向异性模型还以最小的计算开销暴露了各向同性表示根本无法访问的旋转结构可观测量。即使对于仅三个自由度的粗粒度，CG 模拟也能实现 7-27$\\times$ 的加速，同时保持结构保真度，突出了这种系统性减少的效率增益。该框架确立了学习各向异性 CG 建模的等变表示的可行性和必要性，并为复杂分子液体、聚合物和生物分子系统的准确有效的介观模拟提供了一条途径。", "authors": [{"name": "Varun Shankar"}, {"name": "Emil Annevelink"}], "featured_authors": [{"name": "Varun Shankar"}, {"name": "Emil Annevelink"}], "author_count": 2}, {"id": "2607.10045", "category": "cond-mat", "title": "Flux Jamming and Bimodal Dynamics in Bounded Spin Networks", "abstract": "We present a quantitative framework for predicting how kinetic barriers governing temperature dependent relaxation arise in finite square magnetic networks. By formulating a series of non homogeneous transfer matrices from the adjacency spectrum of the underlying graph, we show how local coordination shapes the energy landscape and identifies geometric regions that act as bottlenecks for flux transport. Our approach predicts bimodal kinetic behavior, in which long intervals of trapping within charge compensated manifolds are interrupted by sudden, avalanche like relaxation episodes. Representing finite systems with a Husimi tree, we find that low temperature data from forty generations collapse onto a single curve consistent with a power law scaling form, implying that boundary truncation alone can give rise to scale invariant flux arrest, analogous to athermal granular jamming. By employing transition probabilities constructed from local Boltzmann factors, this framework connects equilibrium energy landscape concepts to non equilibrium phenomena, including kinetic arrest and telegraph noise, thereby enabling the prediction and design of intermittent transport in finite, frustrated networks.", "url": "https://arxiv.org/abs/2607.10045", "type": "理论", "summary": "我们提出了一个定量框架，用于预测有限方形磁网络中如何出现控制温度依赖性弛豫的动力学势垒。通过根据底层图的邻接谱制定一系列非齐次传输矩阵，我们展示了局部协调如何塑造能量景观并识别充当通量传输瓶颈的几何区域。我们的方法预测双峰动力学行为，其中电荷补偿流形内的长时间俘获间隔被突然的雪崩式弛豫事件打断。用 Husimi 树表示有限系统，我们发现四十代的低温数据崩溃到与幂律标度形式一致的单条曲线上，这意味着仅边界截断就可以引起标度不变通量抑制，类似于无热粒状干扰。\n\n通过采用由局部玻尔兹曼因子构建的转移概率，该框架将平衡能量景观概念与非平衡现象（包括动力学停止和电报噪声）联系起来，从而能够预测和设计有限的受挫网络中的间歇性传输。", "authors": [{"name": "Paula Mellado"}, {"name": "Hanu Arava"}], "featured_authors": [{"name": "Paula Mellado"}, {"name": "Hanu Arava"}], "author_count": 2}, {"id": "2607.10076", "category": "cond-mat", "title": "Geometric Universality and Thermodynamic Microstructure of Real Fluids in a Unified Entropic Framework", "abstract": "We introduce a unified entropic framework for real fluids that encompasses the van der Waals, Berthelot, Redlich Kwong, and Peng Robinson equations of state within a common thermodynamic description. The corresponding microscopic interactions are then explored using Geometrothermodynamics, GTD, through the scalar curvature $mathcal{R}$ of the equilibrium manifold. We show that curvature singularities accurately reproduce macroscopic critical phenomena, while vanishing curvature $\\mathcal{R}=0$ identifies specific thermodynamic states where attractive and repulsive intermolecular forces effectively balance. Furthermore, we introduce a set of dimensionless critical-amplitude ratios $Q^i_{j}$, which reveal universal geometric features of the critical regime. Although individual critical amplitudes exhibit a logarithmic dependence on the system size, these invariant ratios organize different molecular species according to the strength of criticality and encode universal scaling features, suggesting their potential as robust classification parameters. Finally, employing Bayesian inference and Markov Chain Monte Carlo, MCMC methods, we statistically reconstruct the zero-curvature curves. The posterior distributions support the consistency of the geometric scaling behavior, demonstrating that the GTD manifold encodes non-trivial information about the underlying thermodynamical models.", "url": "https://arxiv.org/abs/2607.10076", "type": "理论+数值", "summary": "我们引入了真实流体的统一熵框架，其中包含通用热力学描述中的范德华、贝特洛、Redlich Kwong 和 Peng Robinson 状态方程。然后使用几何热力学 GTD 通过平衡流形的标量曲率 $mathcal{R}$ 来探索相应的微观相互作用。我们证明曲率奇点准确地再现了宏观临界现象，而消失曲率 $\\mathcal{R}=0$ 则确定了分子间吸引力和排斥力有效平衡的特定热力学状态。此外，我们引入了一组无量纲临界振幅比 $Q^i_{j}$，它揭示了临界状态的普遍几何特征。尽管单个临界振幅表现出对系统大小的对数依赖性，但这些不变的比率根据临界强度组织不同的分子种类并编码通用缩放特征，表明它们作为稳健分类参数的潜力。最后，采用贝叶斯推理和马尔可夫链蒙特卡罗、MCMC 方法，我们统计重建了零曲率曲线。\n\n后验分布支持几何缩放行为的一致性，证明 GTD 流形编码有关基础热力学模型的重要信息。", "authors": [{"name": "Carlos E. Romero-Figueroa"}, {"name": "Jose Miguel Ladino"}, {"name": "Sasha A. Zaldivar"}, {"name": "Hernando Quevedo"}], "featured_authors": [{"name": "Carlos E. Romero-Figueroa"}, {"name": "Jose Miguel Ladino"}, {"name": "Sasha A. Zaldivar"}, {"name": "Hernando Quevedo"}], "author_count": 4}, {"id": "2607.10091", "category": "cond-mat", "title": "Dynamical Nonrelativistic Spin Splitting via THz Nonlinear Phononics", "abstract": "Nonrelativistic spin splitting (NRSS) in collinear antiferromagnets offers a route to high-frequency spintronics immune to stray fields, but its dynamic control has remained elusive. We demonstrate, using density functional theory (DFT) and nonlinear phononics, that THz laser pulses can achieve ultrafast, reversible control of NRSS on picosecond timescales in antiferromagnets. We derive two symmetry criteria, accounting for phonon and magnetic wavevector compatibility and order-parameter parity, to identify which Raman-active phonon modes can activate or amplify NRSS. Applying these rules to NiO and LaFeO$_3$, we show that resonant driving of an infrared-active mode at 11.08 THz transiently converts spin-degenerate NiO into an NRSS state via biquadratic anharmonic coupling, generating a time-averaged spin splitting of $\\sim$40 meV. In LaFeO$_3$, selective excitation amplifies the existing NRSS by about 100%. In both cases, the induced spin splitting is accompanied by a transient SOC-induced net moment detectable via the magneto-optical Kerr effect. This framework establishes nonlinear phononics as a general route for ultrafast manipulation of spin-split antiferromagnetic phases well beyond the reach of static strain.", "url": "https://arxiv.org/abs/2607.10091", "type": "理论+数值", "summary": "共线反铁磁体中的非相对论自旋分裂（NRSS）​​为不受杂散场影响的高频自旋电子学提供了一条途径，但其动态控制仍然难以捉摸。我们利用密度泛函理论 (DFT) 和非线性声学证明，太赫兹激光脉冲可以在反铁磁体中的皮秒时间尺度上实现 NRSS 的超快、可逆控制。我们推导出两个对称标准，考虑声子和磁波矢量兼容性以及序参数奇偶性，以确定哪些拉曼活性声子模式可以激活或放大 NRSS。将这些规则应用于 NiO 和 LaFeO$_3$，我们表明，在 11.08 THz 下红外主动模式的谐振驱动通过双二次非谐耦合将自旋简并 NiO 瞬时转换为 NRSS 态，产生 $\\sim$40 meV 的时间平均自旋分裂。在 LaFeO$_3$ 中，选择性激发将现有的 NRSS 放大了约 100%。在这两种情况下，诱发的自旋分裂都伴随着可通过磁光克尔效应检测到的瞬态 SOC 诱发的净矩。\n\n该框架将非线性声子学建立为超快操纵自旋分裂反铁磁相的一般途径，远远超出静态应变的范围。", "authors": [{"name": "Linding Yuan"}, {"name": "ChanJu You"}, {"name": "Ankit Disa"}, {"name": "James M. Rondinelli"}], "featured_authors": [{"name": "Linding Yuan"}, {"name": "ChanJu You"}, {"name": "Ankit Disa"}, {"name": "James M. Rondinelli"}], "author_count": 4}, {"id": "2607.10122", "category": "cond-mat", "title": "Correlated Plasmonic Excitation in Twisted Nematic Plasmonic Superlattices", "abstract": "Superlattices with twisted configurations, such as moire lattices, have recently been extensively exploited for their unique electronic, magnetic, and optical properties. One remarkable feature of nanoscale twisted superlattices is the distinct lattice symmetries and the continuous phase transitions between periodic or aperiodic phases, representing a unique opportunity to study many emerging physical phenomena. Here, we report a correlated light and matter interaction between the collective polarization effect of nematic plasmonic superstructures and the plasmonic excitation of individual constituent nanorods in reconfigurable twisted plasmonic superlattices. Using hybrid Fe3O4 and Au nanorods as building blocks, we assembled plasmonic nematic liquid crystals with unidirectionally aligned nanorods, which could be further assembled into moire plasmonic lattices through a vertical stacking assembly method. A twist angle dependent plasmonic excitation is recognized in the twisted bilayer of two plasmonic superlattices, featuring enhanced transverse and longitudinal plasmonic excitation at a twisting angle of 0 degree and 90 degree, respectively. Such correlated plasmonic excitation in twisted plasmonic superstructures is induced by the correlation between the collective polarization effect of the liquid crystal phases and the anisotropic plasmonic excitation of individual nanorods. The magnetic orientation control allows for precise alignment of hybrid Fe3O4 and Au nanorods in polymer substrates and enables the coding of nematic domains and plasmonic patterns in each sublattice. The correlated plasmonic excitation and light polarization create reconfigurable photonic moire superlattices with well-defined domain colors, feature sizes, periodicities, symmetries, and dimensions determined by twist angles and displacements in the twisted plasmonic lattices.", "url": "https://arxiv.org/abs/2607.10122", "type": "理论", "summary": "具有扭曲结构的超晶格，例如莫尔晶格，最近因其独特的电子、磁和光学特性而被广泛开发。纳米级扭曲超晶格的一个显着特征是独特的晶格对称性以及周期性或非周期性相之间的连续相变，为研究许多新兴物理现象提供了独特的机会。在这里，我们报告了向列等离子体超结构的集体偏振效应与可重构扭曲等离子体超晶格中单个组成纳米棒的等离子体激发之间的相关光和物质相互作用。使用混合 Fe3O4 和 Au 纳米棒作为构建块，我们组装了具有单向排列纳米棒的等离子体向列液晶，可以通过垂直堆叠组装方法将其进一步组装成莫尔等离子体晶格。在两个等离激元超晶格的扭曲双层中发现了扭转角相关的等离激元激发，其特征是分别在0度和90度的扭转角下增强了横向和纵向等离激元激发。\n\n扭曲等离子体超结构中的这种相关等离子体激发是由液晶相的集体偏振效应与单个纳米棒的各向异性等离子体激发之间的相关性引起的。磁取向控制允许在聚合物基底中精确排列混合 Fe3O4 和 Au 纳米棒，并能够在每个亚晶格中编码向列域和等离子体图案。相关的等离子体激发和光偏振产生可重构的光子莫尔超晶格，其具有明确的域颜色、特征尺寸、周期性、对称性以及由扭曲等离子体晶格中的扭曲角和位移确定的尺寸。", "authors": [{"name": "Rui Huang"}, {"name": "Jordan Austin-Frank Wilson"}, {"name": "Anders Dollard"}, {"name": "Nicholas C Fisher"}, {"name": "Zixian Fang"}, {"name": "John T. Fourkas"}, {"name": "Zhiwei Li"}], "featured_authors": [{"name": "Rui Huang"}, {"name": "Jordan Austin-Frank Wilson"}, {"name": "Anders Dollard"}, {"name": "Zixian Fang"}, {"name": "John T. Fourkas"}, {"name": "Zhiwei Li"}], "author_count": 7}, {"id": "2607.10181", "category": "cond-mat", "title": "Anyons and Inherently Complex F-symbols", "abstract": "Anyons in $2+1$ dimensions are not only characterized by exotic braiding statistics but also by intricate fusion properties. Two anyons may fuse into multiple topological charge sectors, and associativity of fusing three anyons to produce a fixed charge sector is governed by $F$-symbols. While braiding invariants, such as the modular data, are typically complex valued, a complete description of general anyon models requires understanding the arithmetic properties of its fusion associativity data as well. The $F$-symbols for many of the most common $2+1$d topological orders, including all Abelian anyon models as well as Fibonacci and Ising anyons, can be made real valued. We show this phenomenon is not universal by exhibiting braided fusion categories whose $F$-symbols cannot be made real. We call such $F$-symbols \\lq\\lq inherently complex.\" The examples we study lack a charge-conjugation symmetry and our results are therefore consistent with the converse of a statement proved in a companion work linking real $F$-symbols in braided fusion categories with the existence of a suitable charge-conjugation symmetry. We analyse the smallest-rank braided fusion categories we know of with inherently complex $F$-symbols: ${\\rm Rep}(\\mathbb{Z}_7\\rtimes\\mathbb{Z}_3)$ and ${\\rm Rep}(\\mathbb{Z}_5\\rtimes\\mathbb{Z}_4)$. Consequently, the corresponding $\\mathcal Z({\\rm Rep}(\\mathbb{Z}_7\\rtimes\\mathbb{Z}_3))$ and $\\mathcal Z({\\rm Rep}(\\mathbb{Z}_5\\rtimes\\mathbb{Z}_4))$ anyon models also have inherently complex $F$-symbols. Our presentation connects these examples with recent results on classifying anyons beyond modular data.", "url": "https://arxiv.org/abs/2607.10181", "type": "理论", "summary": "$2+1$ 维度的任意子不仅具有奇异的编织统计特征，而且还具有复杂的融合特性。两个任意子可以融合成多个拓扑电荷扇区，并且融合三个任意子以产生固定电荷扇区的结合性由$F$符号控制。虽然编织不变量（例如模块化数据）通常具有复数值，但一般任意子模型的完整描述还需要了解其融合关联性数据的算术属性。许多最常见的 $2+1$d 拓扑顺序的 $F$ 符号，包括所有阿贝尔任意子模型以及斐波那契和伊辛任意子，都可以进行实值化。我们通过展示其 $F$ 符号无法成为现实的编织融合类别来证明这种现象并不普遍。我们称这种 $F$ 符号本质上是复杂的。”我们研究的例子缺乏电荷共轭对称性，因此我们的结果与另一篇同伴著作中证明的陈述的相反观点一致，该著作将编织融合类别中的真实 $F$ 符号与适当的电荷共轭对称性的存在联系起来。\n\n我们分析了我们所知道的具有固有复杂$F$符号的最小秩编织融合类别：${\\rm Rep}(\\mathbb{Z}_7\\rtimes\\mathbb{Z}_3)$和${\\rm Rep}(\\mathbb{Z}_5\\rtimes\\mathbb{Z}_4)$。因此，相应的 $\\mathcal Z({\\rm Rep}(\\mathbb{Z}_7\\rtimes\\mathbb{Z}_3))$ 和 $\\mathcal Z({\\rm Rep}(\\mathbb{Z}_5\\rtimes\\mathbb{Z}_4))$ 任意子模型也具有固有的复杂 $F$ 符号。我们的演示将这些示例与模块化数据之外的任意子分类的最新结果联系起来。", "authors": [{"name": "Matthew Buican"}, {"name": "Peter Huston"}, {"name": "Jiannis K. Pachos"}], "featured_authors": [{"name": "Matthew Buican"}, {"name": "Peter Huston"}, {"name": "Jiannis K. Pachos"}], "author_count": 3}, {"id": "2607.10234", "category": "cond-mat", "title": "Topological delocalisation of confined 3D active nematics", "abstract": "Defect lines in 3D active nematic systems are intriguing topological singularities whose out-of-equilibrium dynamics remain elusive in confined settings. Here, we numerically study 3D active nematics confined within closed cylinders to elucidate the roles of geometry and activity. We reveal a competition between passive elasticity, which causes localisation of defects near edges, and activity, which endows defects with motility and gives rise to disorderly, delocalised dynamics. Varying boundary curvature, activity strength, and cylinder radius reveals a state space of static and dynamic localisation states, including handle-like configurations and chaotic motion bounded within the cylinder endcap. As activity is tuned to induce delocalisation, we identify phase transition signatures, including pronounced fluctuations and an emergent power law scaling of defect number and average defect length. We find that these scaling properties are strongly altered by confinement: unlike in bulk systems where activity governs length distributions, confinement tunes an activity-independent characteristic length, with an exponent reminiscent of self-avoiding confined polymers. These results establish confinement of inhomogeneous curvature as a versatile mechanism for controlling active topological dynamics.", "url": "https://arxiv.org/abs/2607.10234", "type": "理论+数值", "summary": "3D 活性向列系统中的缺陷线是有趣的拓扑奇点，其非平衡动力学在受限环境中仍然难以捉摸。在这里，我们对封闭圆柱体内的 3D 活性向列进行数值研究，以阐明几何形状和活性的作用。我们揭示了被动弹性和活动之间的竞争，被动弹性导致边缘附近的缺陷局部化，而活动赋予缺陷运动性并产生无序、离域的动态。不同的边界曲率、活动强度和圆柱体半径揭示了静态和动态定位状态的状态空间，包括圆柱体端盖内的手柄状配置和混沌运动。当调整活动以诱导离域时，我们识别了相变特征，包括明显的波动以及缺陷数量和平均缺陷长度的新兴幂律缩放。我们发现，这些缩放特性会因限制而发生强烈改变：与活动控制长度分布的本体系统不同，限制调整了与活动无关的特征长度，其指数让人想起自回避限制聚合物。\n\n这些结果将非均匀曲率的限制确立为控制主动拓扑动力学的通用机制。", "authors": [{"name": "Louise C. Head"}, {"name": "Pasquale Digregorio"}, {"name": "Davide Marenduzzo"}, {"name": "Ignacio Pagonabarraga"}, {"name": "Daniel A. Beller"}, {"name": "Giuseppe Negro"}], "featured_authors": [{"name": "Louise C. Head"}, {"name": "Pasquale Digregorio"}, {"name": "Davide Marenduzzo"}, {"name": "Ignacio Pagonabarraga"}, {"name": "Daniel A. Beller"}, {"name": "Giuseppe Negro"}], "author_count": 6}, {"id": "2607.10328", "category": "cond-mat", "title": "Lifshitz-Kosevich Theory of Anomalous Landau Levels in Topological Flat Bands", "abstract": "In conventional metals, quantum oscillations arise from Landau quantization of Fermi-surface cyclotron orbits, whose dynamics are governed by the Fermi velocity and cyclotron effective mass within Lifshitz-Kosevich (LK) theory. A perfectly flat band, by contrast, has vanishing group velocity, which would naively imply an infinite cyclotron mass and complete thermal suppression of quantum oscillations. Yet topological flat bands can support anomalous Landau levels (LLs) whose finite-field spacing is generated by quantum geometry rather than band curvature, allowing quantum oscillations to persist. This work addresses how such anomalous flat-band LLs behave within the LK framework and whether their thermal damping can reveal quantum geometric information. Using a minimal model with exactly flat topological bands, we derive an LK theory for these anomalous LLs and analyze fixed-density magnetization oscillations. The resulting oscillations exhibit a finite LK effective mass that is substantially larger than the normal-band value and possesses a strong magnetic-field dependence. In the weak-field limit, this anomalous mass reflects the quantum geometric origin of the LL spacing and scales inversely with both the magnetic field and the trace of the quantum metric. Thus, thermal damping of flat-band quantum oscillations directly measures the quantum metric, establishing quantum oscillations as a probe to flat-band quantum geometry.", "url": "https://arxiv.org/abs/2607.10328", "type": "理论", "summary": "在传统金属中，量子振荡源自费米表面回旋加速器轨道的朗道量子化，其动力学由 Lifshitz-Kosevich (LK) 理论中的费米速度和回旋加速器有效质量控制。相比之下，完全平坦的带具有消失的群速度，这天真地意味着无限的回旋加速器质量和对量子振荡的完全热抑制。然而，拓扑平带可以支持反常朗道能级（LL），其有限场间距是由量子几何而不是能带曲率生成的，从而允许量子振荡持续存在。这项工作探讨了这种异常平带 LL 在 LK 框架内的行为方式以及它们的热阻尼是否可以揭示量子几何信息。使用具有完全平坦拓扑带的最小模型，我们推导了这些反常 LL 的 LK 理论并分析了固定密度磁化振荡。由此产生的振荡表现出有限的 LK 有效质量，该质量远大于正常带值，并且具有很强的磁场依赖性。\n\n在弱场极限下，这种异常质量反映了 LL 间距的量子几何起源，并且与磁场和量子度量的迹线成反比。因此，平带量子振荡的热阻尼直接测量量子度量，将量子振荡建立为平带量子几何的探针。", "authors": [{"name": "Chao-Xing Liu"}], "featured_authors": [{"name": "Chao-Xing Liu"}], "author_count": 1}, {"id": "2607.10337", "category": "cond-mat", "title": "Interwoven long-range order induced by random fields", "abstract": "We propose a distinct type of long-range ordered phase that can occur in classical and quantum many-particle systems. It is induced by impurities and defects that locally break a subset of the order-parameter symmetries, i.e., by random-field disorder that couples to a composite vestigial order parameter. The proposed ``implectic'' phase is characterized by spontaneous symmetry breaking on the background of the spatially interwoven domain structure created by the random fields. We explicitly demonstrate the existence of this phase in a layered $J_1-J_2$ Ising magnet by means of large-scale Monte Carlo simulations. We then discuss numerous potential applications in systems featuring charge and spin density wave order including frustrated magnets, cuprate and iron-based superconductors, and ultracold atoms.", "url": "https://arxiv.org/abs/2607.10337", "type": "理论+数值", "summary": "我们提出了一种独特类型的长程有序相，它可以出现在经典和量子多粒子系统中。它是由局部破坏有序参数对称性子集的杂质和缺陷引起的，即由耦合到复合残留有序参数的随机场无序引起的。所提出的“隐含”相的特征是在随机场创建的空间交织域结构的背景下自发对称性破缺。我们通过大规模蒙特卡罗模拟明确证明了层状 $J_1-J_2$ Ising 磁体中该相的存在。然后，我们讨论了具有电荷和自旋密度波序的系统中的许多潜在应用，包括受挫磁体、铜酸盐和铁基超导体以及超冷原子。", "authors": [{"name": "Jeremiah Bender"}, {"name": "Thomas Vojta"}], "featured_authors": [{"name": "Jeremiah Bender"}, {"name": "Thomas Vojta"}], "author_count": 2}, {"id": "2607.10355", "category": "cond-mat", "title": "Staggered orbital magnetization from itinerant electrons: orbital antiferro- and ferrimagnetic phases", "abstract": "Because electronic orbital angular momentum in solids is inherently non-local, its contribution to magnetism is usually cast in terms of a net orbital magnetization. Here, we show that itinerant electrons can generate orbital magnetic phases with ferromagnetic, antiferromagnetic, or ferrimagnetic orders. We demonstrate this possibility in a honeycomb lattice, using both the standard and a modified Haldane model. Employing real-space formulations, we decompose the itinerant orbital magnetization into sublattice contributions, $M_A$ and $M_B$. Their net ($M_z=M_A+M_B$) and staggered ($M_z^s=M_A-M_B$) combinations are then used to identify the orbital order. By varying the sublattice potential and the Fermi energy, we find distinct regimes: a (PT)-symmetric orbital antiferromagnet in the modified Haldane model, an orbital ferromagnet in the standard Haldane model, ferrimagnetic metallic states where net and staggered orbital magnetizations coexist, and insulating regimes in which the ferro- and antiferromagnetic orbital characters can be this http URL findings are explained by a low-energy theory in terms of two distinct valley mechanisms: valley-dependent Dirac masses in the standard Haldane model and valley-dependent energy shifts in its modified version.", "url": "https://arxiv.org/abs/2607.10355", "type": "理论", "summary": "由于固体中的电子轨道角动量本质上是非局域的，因此它对磁性的贡献通常用净轨道磁化强度来表示。在这里，我们证明巡回电子可以产生铁磁、反铁磁或亚铁磁级的轨道磁相。我们使用标准模型和修改后的 Haldane 模型在蜂窝晶格中证明了这种可能性。采用真实空间公式，我们将巡回轨道磁化强度分解为亚晶格贡献 $M_A$ 和 $M_B$。然后使用它们的净（$M_z=M_A+M_B$）和交错（$M_z^s=M_A-M_B$）组合来识别轨道顺序。\n\n通过改变亚晶格势和费米能量，我们发现了不同的状态：改进的 Haldane 模型中的 (PT) 对称轨道反铁磁体、标准 Haldane 模型中的轨道铁磁体、净轨道磁化强度和交错轨道磁化共存的亚铁磁金属态，以及铁磁和反铁磁轨道特征可以是这种 http URL 发现的绝缘状态，通过低能理论用两种不同的谷机制来解释：标准 Haldane 模型中依赖于谷的狄拉克质量及其修改版本中依赖于谷的能量变化。", "authors": [{"name": "Lucas L. Lage"}, {"name": "Kevin J. U. Vidarte"}, {"name": "Tarik P. Cysne"}, {"name": "Tatiana G. Rappoport"}, {"name": "A. Latgé"}, {"name": "R. B. Muniz"}], "featured_authors": [{"name": "Lucas L. Lage"}, {"name": "Kevin J. U. Vidarte"}, {"name": "Tarik P. Cysne"}, {"name": "Tatiana G. Rappoport"}, {"name": "A. Latgé"}, {"name": "R. B. Muniz"}], "author_count": 6}, {"id": "2607.10361", "category": "cond-mat", "title": "Anomalous Compressibility and Electronic Robustness of Metallic Delafossite PdCoO$_2$ under Pressure", "abstract": "The layered delafossite PdCoO$_2$ is an exceptional oxide metal whose ultrahigh conductivity arises from a Pd-derived nearly-free-electron band. Here, high-pressure single-crystal X-ray diffraction combined with first-principles calculations is used to investigate its structural, bonding, and electronic evolution up to 10 GPa. PdCoO$_2$ retains the rhombohedral R-3m structure throughout the investigated pressure range, with no structural phase transition. The lattice exhibits an unusual anisotropic compression, with the in-plane a-axis contracting more strongly than the stacking c-axis, opposite to the behavior of most layered materials. Despite this anomalous compressibility, only minor changes are observed in the local Pd-O and Co-O coordination environments, indicating a remarkably rigid bonding framework. Crystal orbital Hamilton population analysis reveals only subtle strengthening of the existing bonding interactions, without the emergence of destabilizing Pd-related antibonding states. Consistent with these findings, the Pd-derived metallic band and quasi-two-dimensional Fermi surface remain essentially unchanged under compression. Boltzmann transport calculations further show that the in-plane conductivity is nearly pressure-independent, whereas the out-of-plane conductivity decreases modestly, resulting in a slight increase in transport anisotropy. These results demonstrate that the anomalous compressibility of PdCoO$_2$ originates from its robust chemical bonding network, which preserves both the crystal structure and the highly conductive Pd-derived metallic state under pressure.", "url": "https://arxiv.org/abs/2607.10361", "type": "理论+数值", "summary": "层状铜铁矿 PdCoO$_2$ 是一种特殊的氧化物金属，其超高导电率源于 Pd 衍生的近自由电子带。在这里，高压单晶 X 射线衍射与第一原理计算相结合，用于研究其结构、成键和高达 10 GPa 的电子演化。 PdCoO$_2$ 在整个研究压力范围内保留菱形 R-3m 结构，没有结构相变。该晶格表现出不寻常的各向异性压缩，面内 a 轴比堆叠 c 轴收缩更强烈，这与大多数层状材料的行为相反。尽管存在这种异常的压缩性，但在局部 Pd-O 和 Co-O 配位环境中仅观察到微小的变化，这表明具有非常刚性的键合框架。晶体轨道汉密尔顿布居分析仅揭示了现有键合相互作用的微妙增强，而没有出现与 Pd 相关的不稳定的反键合态。与这些发现一致的是，Pd 衍生的金属带和准二维费米面在压缩下基本保持不变。\n\n玻尔兹曼输运计算进一步表明，面内电导率几乎与压力无关，而面外电导率略有下降，导致输运各向异性略有增加。这些结果表明，PdCoO$_2$ 的异常压缩性源于其强大的化学键合网络，该网络在压力下保留了晶体结构和高导电性的 Pd 衍生金属态。", "authors": [{"name": "Cheng Peng"}, {"name": "Pahuni Jain"}, {"name": "Tyler Harper"}, {"name": "Chris Leighton"}, {"name": "Weiwei Xie"}], "featured_authors": [{"name": "Cheng Peng"}, {"name": "Pahuni Jain"}, {"name": "Tyler Harper"}, {"name": "Chris Leighton"}, {"name": "Weiwei Xie"}], "author_count": 5}, {"id": "2607.10381", "category": "cond-mat", "title": "Revisiting the non-equilibrium phase transitions of the continuous-trait Axelrod model", "abstract": "We investigate the non-equilibrium phase transitions of the continuous-trait Axelrod model, an agent-based framework where individual culture is represented by a vector of $F$ continuous features confined to the interval $(0,1)$. Local interactions are governed by a metric similarity threshold $d$, which acts as a continuous control parameter of social tolerance. The dynamics inevitably freeze into one of two absorbing configuration classes: an ordered, homogeneous monocultural state at high tolerance, or a highly fragmented, disordered state at low tolerance. While previous studies characterized the transition as hybrid based on the continuous behavior of the domain density $\\mu$ alongside a discontinuous jump in the largest domain fraction $\\rho$, we show that this apparent continuity is an artifact of severe finite-size masking effects. By shifting the methodological focus to the scaling of the median $\\tilde{\\mu}$ and analyzing the full probability distributions $P(\\mu)$, we unveil a clear bimodal structure with disjoint maxima across independent simulation runs. Our results reveal that for $F=2$, the system undergoes a genuinely hybrid transition in the contemporary sense, featuring a tiny but finite latent jump ($\\mu_c \\approx 0.089$) at the critical threshold $d_c \\approx 0.0784$ while scaling toward it from below via a non-analytical power law with a mean-field exponent $\\beta \\approx 1/2$. Conversely, for $F=3$, the higher trait-space dimensionality suppresses local fluctuations, yielding a traditional, non-hybrid first-order transition. We apply this framework to the alternative discrete Poisson variant of the model, successfully confirming its known continuous transition for $F=2$ and discontinuous, non-hybrid transition for $F=3$, thereby establishing a unified characterization of phase transitions in Axelrod-like systems.", "url": "https://arxiv.org/abs/2607.10381", "type": "理论+数值", "summary": "我们研究了连续特征 Axelrod 模型的非平衡相变，这是一个基于主体的框架，其中个体文化由限制在 $(0,1)$ 区间内的 $F$ 连续特征向量表示。本地交互由度量相似性阈值 $d$ 控制，该阈值充当社会容忍度的连续控制参数。这种动态不可避免地会冻结成两个吸引人的配置类别之一：高容忍度下的有序、同质单一文化状态，或低容忍度下的高度碎片化、无序状态。虽然之前的研究将这种转变描述为基于域密度 $\\mu$ 的连续行为以及最大域分数 $\\rho$ 的不连续跳跃的混合，但我们表明这种明显的连续性是严重的有限尺寸掩蔽效应的产物。通过将方法论焦点转移到中位数 $\\tilde{\\mu}$ 的缩放上并分析完整的概率分布 $P(\\mu)$，我们揭示了一个清晰的双峰结构，在独立的模拟运行中具有不相交的最大值。\n\n我们的结果表明，对于 $F=2$，系统经历了当代意义上的真正的混合转变，在临界阈值 $d_c \\approx 0.0784$ 处具有微小但有限的潜在跳跃（$\\mu_c \\approx 0.089$），同时通过平均场指数 $\\beta \\approx 1/2$ 的非解析幂律从下方向其扩展。相反，对于 $F=3$，较高的特征空间维度会抑制局部波动，从而产生传统的非混合一阶转换。我们将此框架应用于模型的替代离散泊松变体，成功确认了其已知的 $F=2$ 的连续转变和 $F=3$ 的不连续、非混合转变，从而建立了类 Axelrod 系统中相变的统一表征。", "authors": [{"name": "Sandro M. Reia"}, {"name": "Paulo R. A. Campos"}, {"name": "José F. Fontanari"}], "featured_authors": [{"name": "Sandro M. Reia"}, {"name": "Paulo R. A. Campos"}, {"name": "José F. Fontanari"}], "author_count": 3}, {"id": "2607.10468", "category": "cond-mat", "title": "Nonperturbative magnetotransport from band geometry in Weyl semimetals", "abstract": "We develop a nonperturbative semiclassical theory of magnetotransport in Weyl semimetals, retaining the full magnetic-field dependence of the Fermi-surface conductivity in the presence of Berry curvature and orbital magnetic moment effects. We obtain closed-form expressions valid to all orders in the magnetic field within the semiclassical regime. We show that the exact continuum formulation exhibits an intrinsic infrared sensitivity associated with the singular behavior of the orbital magnetic moment, requiring a physically motivated regularization. While the full conductivity tensor reduces to the standard quadratic magnetoconductivity, we demonstrate that magnetic-field expansion and momentum integration do not commute, leading to nonanalytic contributions at the level of scalar transport coefficients. Our results identify a regime, relevant for low carrier densities or moderate magnetic fields, where magnetotransport becomes intrinsically nonperturbative and cannot be captured by conventional weak-field expansions.", "url": "https://arxiv.org/abs/2607.10468", "type": "理论", "summary": "我们开发了外尔半金属磁输运的非微扰半经典理论，在贝里曲率和轨道磁矩效应存在的情况下保留了费米表面电导率的完全磁场依赖性。我们获得了对半经典体系内磁场中所有阶均有效的闭合形式表达式。我们证明，精确的连续介质公式表现出与轨道磁矩奇异行为相关的固有红外敏感性，需要物理驱动的正则化。虽然全电导率张量降低到标准二次磁导率，但我们证明磁场膨胀和动量积分不会交换，导致标量输运系数水平上的非解析贡献。我们的结果确定了一种与低载流子密度或中等磁场相关的机制，其中磁输运本质上变得非微扰，并且无法通过传统的弱场展开来捕获。", "authors": [{"name": "L. Medel Onofre"}, {"name": "A. Martín-Ruiz"}], "featured_authors": [{"name": "L. Medel Onofre"}, {"name": "A. Martín-Ruiz"}], "author_count": 2}, {"id": "2607.10503", "category": "cond-mat", "title": "A Cascade of Volterra-Operator BBP Transitions in a Correlated Wigner Matrix", "abstract": "We study a Wigner-type random matrix in which the off-diagonal correlation between entries is generated by a random factor shared among all entries in a given row and column, with the coupling strength held fixed as the matrix size grows. Although the bulk spectral moments remain those of the pure semicircle law, we show that the underlying correlation matrix decomposes into a vanishing bulk together with a countable family of outlier eigenvalues that, at fixed rank $k$, converge to the singular values of a compact Volterra (cumulative-sum) integral operator -- obtained in closed form via the classical Karhunen--Loève expansion of Brownian motion and confirmed numerically to better than one percent across the top twenty such values. Each singular value drives an independent Baik--Ben Arous--Péché (BBP) transition as the coupling strength increases, producing an evenly spaced, discrete hierarchy of critical points -- rather than a single transition -- at each of which one further eigenvalue detaches from the semicircle edge, in close agreement with direct diagonalization. We show that this mechanism generalizes to a broader family of correlation structures, with the critical hierarchy in every case set by the spectrum of an associated compact integral operator.", "url": "https://arxiv.org/abs/2607.10503", "type": "理论+数值", "summary": "我们研究了维格纳型随机矩阵，其中条目之间的非对角相关性是由给定行和列中的所有条目共享的随机因子生成的，随着矩阵大小的增长，耦合强度保持固定。尽管体谱矩仍然是纯半圆定律的谱矩，但我们表明，底层相关矩阵分解为一个消失体，以及一系列可数的离群特征值，这些特征值在固定秩 $k$ 下收敛到紧凑 Volterra（累积和）积分算子的奇异值——通过布朗运动的经典 Karhunen-Loève 展开以闭合形式获得，并在数值上证实在前 20 个此类值中优于百分之一。随着耦合强度的增加，每个奇异值驱动独立的 Baik--Ben Arous--Péché (BBP) 转变，产生均匀间隔的离散临界点层次结构（而不​​是单个转变），在每个转变处，另一个特征值从半圆边缘分离，与直接对角化密切一致。\n\n我们表明，这种机制可以推广到更广泛的相关结构族，每种情况下的关键层次结构都由相关紧凑积分算子的谱设定。", "authors": [{"name": "Masato Hisakado"}], "featured_authors": [{"name": "Masato Hisakado"}], "author_count": 1}, {"id": "2607.10509", "category": "cond-mat", "title": "Surface Variables Description of Axion Topological Materials", "abstract": "We study the response of axion topological materials under the presence of external static electric and magnetic fields. We focus on the macroscopic quasi-static magnetoelectric response of topological insulators. We use techniques based on surface variables that have been previously employed in soft condensed matter problems for the description of heterogeneous systems composed of multiple homogeneous materials. A complete description of the whole system is written in terms of surface degrees of freedom, which in this case correspond to effective surface charge and surface current densities. We obtain a set of integral equations satisfied by these variables. We present exact analytic solutions for axial-symmetric cases. We develop a numerical method for the solution of the integral equations by means of a boundary finite element method. We apply the numerical method to topological insulators with different geometries such as spheres, hollow spheres and toroidal surfaces. We show that that a variational principle can be used to recover the surface variables equations.", "url": "https://arxiv.org/abs/2607.10509", "type": "理论+数值", "summary": "我们研究轴子拓扑材料在外部静电和磁场存在下的响应。我们关注拓扑绝缘体的宏观准静态磁电响应。我们使用基于表面变量的技术，这些技术先前已在软凝聚态问题中使用，用于描述由多种均质材料组成的异质系统。整个系统的完整描述是根据表面自由度编写的，在这种情况下对应于有效表面电荷和表面电流密度。我们获得了这些变量满足的一组积分方程。我们提出了轴对称情况的精确解析解。我们开发了一种通过边界有限元法求解积分方程的数值方法。我们将数值方法应用于具有不同几何形状的拓扑绝缘体，例如球体、空心球体和环形表面。我们证明变分原理可以用来恢复表面变量方程。", "authors": [{"name": "Francisco J. Solis"}, {"name": "Hugo García-Compeán"}], "featured_authors": [{"name": "Francisco J. Solis"}, {"name": "Hugo García-Compeán"}], "author_count": 2}, {"id": "2607.10513", "category": "cond-mat", "title": "Spectral Signatures of Replica Symmetry Breaking in Optimization-Induced Random Matrices", "abstract": "We study optimization-induced matrix ensembles generated by Gibbs measures. The same quenched disorder that weights configurations also supplies the matrix entries observed on them. For glassy Gibbs measures this raises a natural question: does the induced spectrum inherit the underlying glassy Gibbs geometry? In a dense tensor optimization model we find a selective answer. A single induced matrix has a universal leading bulk that washes out the glassy organization. The difference of two matrices built from independent thermal samples in the same disorder does not: its spectrum gives an explicit image of the glassy Gibbs geometry, encoded by the distribution of mutual overlaps between samples. Parisi theory and Monte Carlo confirm this mechanism across simple and glassy phases.", "url": "https://arxiv.org/abs/2607.10513", "type": "理论+数值", "summary": "我们研究由吉布斯测度生成的优化引发的矩阵系综。加权配置的相同淬灭无序也提供了在它们上观察到的矩阵条目。对于玻璃吉布斯测量，这提出了一个自然的问题：诱导光谱是否继承了底层的玻璃吉布斯几何？在密集张量优化模型中，我们找到了一个选择性答案。单一诱导基质具有通用的主导体积，可以洗掉玻璃状组织。由相同无序的独立热样本构建的两个矩阵的差异则不然：它的光谱给出了玻璃吉布斯几何的清晰图像，由样本之间相互重叠的分布编码。帕里西理论和蒙特卡罗证实了这种跨简单相和玻璃相的机制。", "authors": [{"name": "Isaac Pérez Castillo"}], "featured_authors": [{"name": "Isaac Pérez Castillo"}], "author_count": 1}, {"id": "2607.10570", "category": "cond-mat", "title": "Spectral-Domain Deep Learning of Intrinsic Scattering Operators for Arbitrarily Shaped Compact 3D Particles", "abstract": "Rapid prediction of optical scattering from arbitrarily shaped three-dimensional particles is important for particle optics and photonic characterization, but remains challenging because of the large variability of complex morphologies and the strong angular dependence of their scattering responses. To address both issues, a dual spectral-domain neural scattering model is introduced in which morphology and scattering are represented in physically ordered bases: particle geometry is compressed into only 256 spherical-harmonic coefficients, and the optical response is encoded by the complex T-matrix in a spherical-vector-wave basis. The morphology spectrum replaces high-dimensional Euclidean geometry representations, such as voxel grids, point clouds, or meshes, with a compact ordered descriptor, while the T-matrix represents a geometry-determined scattering operator that can be queried for different incidence directions, polarizations, and observation angles. A spectral-token Transformer trained on 50{,}000 irregular particles at 1064~nm maps the morphology spectrum directly to the T-matrix. The predicted operators recover modal structure and reproduce full-angle differential scattering maps and incidence-angle scans. Generalization to out-of-distribution synthetic shapes and natural sand-particle morphologies shows that the dual spectral architecture learns an intrinsic relation from the geometry spectrum to multipolar scattering. This establishes spectral-domain operator learning as a compact route for reusable, angle- and polarization-resolved optical scattering prediction of complex 3D particles.", "url": "https://arxiv.org/abs/2607.10570", "type": "理论+数值", "summary": "快速预测任意形状的三维粒子的光学散射对于粒子光学和光子表征非常重要，但由于复杂形态的巨大变化及其散射响应的强烈角度依赖性，仍然具有挑战性。为了解决这两个问题，引入了双谱域神经散射模型，其中形态和散射以物理有序的基础表示：粒子几何形状被压缩为仅 256 个球谐系数，光学响应由球矢量波基础上的复杂 T 矩阵编码。形态谱用紧凑的有序描述符取代了高维欧几里得几何表示，例如体素网格、点云或网格，而 T 矩阵表示几何确定的散射算子，可以查询不同的入射方向、偏振和观察角度。在 1064~nm 下对 50{,}000 个不规则粒子进行训练的光谱令牌 Transformer 将形态光谱直接映射到 T 矩阵。\n\n预测算子恢复模态结构并再现全角度差分散射图和入射角扫描。对非分布合成形状和天然沙粒形态的推广表明，双光谱架构学习了从几何光谱到多极散射的内在关系。这将谱域算子学习建立为复杂 3D 粒子的可重复使用、角度和偏振分辨光学散射预测的紧凑途径。", "authors": [{"name": "Daize Li"}, {"name": "Jiafu Shen"}, {"name": "Yifei Liu"}, {"name": "Bonan Zhang"}, {"name": "Heping Xie"}], "featured_authors": [{"name": "Daize Li"}, {"name": "Jiafu Shen"}, {"name": "Yifei Liu"}, {"name": "Bonan Zhang"}, {"name": "Heping Xie"}], "author_count": 5}, {"id": "2607.10584", "category": "cond-mat", "title": "Nonlinear Tellegen limit", "abstract": "The Tellegen limit is the fundamental electromagnetic stability bound on magnetoelectric media. We show that nonlinear magnetoelectric coupling gives rise to a new Tellegen limit, which we term the nonlinear Tellegen limit. Unlike the linear Tellegen limit, which is fixed by material parameters, the nonlinear Tellegen limit is field-tunable -- a static electric or magnetic field drives the system toward electromagnetic instability at a material-specific critical field determined by the magnetic point group symmetry. The approach to this limit is accompanied by a field-tunable Faraday rotation that grows linearly with the applied field and is bounded from above by a universal maximum set by the nonlinear Tellegen limit -- beyond which the medium becomes electromagnetically unstable. We demonstrate the nonlinear Tellegen limit and the field-space stability phase diagram in two magnetically ordered material systems -- a d-wave altermagnet and an M-type hexagonal ferrite -- showing that the symmetry of the magnetic point group governs both the structure of the nonlinear magnetoelectric tensor and the resulting electromagnetic instability.", "url": "https://arxiv.org/abs/2607.10584", "type": "理论+数值", "summary": "特勒根极限是磁电介质上的基本电磁稳定性界限。我们证明非线性磁电耦合产生了新的特勒根极限，我们将其称为非线性特勒根极限。与由材料参数固定的线性特勒根极限不同，非线性特勒根极限是场可调的——静电或磁场驱动系统在由磁点群对称性确定的特定材料临界场处趋向电磁不稳定。接近这一极限的同时伴随着场可调法拉第旋转，该旋转随着施加的场线性增长，并且从上方受到非线性特勒根极限设置的通用最大值的限制——超过该极限，介质就会变得电磁不稳定。我们演示了两种磁有序材料系统（d 波交变磁体和 M 型六方铁氧体）中的非线性特勒根极限和场空间稳定性相图，表明磁点组的对称性控制着非线性磁电张量的结构以及由此产生的电磁不稳定性。", "authors": [{"name": "Abhinava Chatterjee"}, {"name": "Nikhil Kalyanapuram"}], "featured_authors": [{"name": "Abhinava Chatterjee"}, {"name": "Nikhil Kalyanapuram"}], "author_count": 2}, {"id": "2607.10770", "category": "cond-mat", "title": "Learning as a Geometric Phase Transition: Renormalization Group Flow and Anisotropic Symmetry Breaking in Deep Networks", "abstract": "We formulate feature learning as a geometric critical phenomenon of the lifted tensor-product learning metric. The central object is not a scalar overlap, but the target-active geometry of \\[ \\mathcal N_{0,L}=\\frac1N\\sum_{r=1}^{L}\\Sigma_{r\\to L}\\otimes T_{0\\to r-1}, \\] which entangles forward pullback survival with backward push-forward visibility. The neutral phase is target-isotropic: after restriction to endpoint target-active states and trace normalization, the lifted metric is proportional to the identity. Learning corresponds to an instability of this target-isotropic fixed point and to the emergence of traceless target-aligned eigentensors. We derive discrete Dyson expansions for local anisotropic insertions and their continuous Callan--Symanzik flow. Crucially, before constructing the full temporal mean-field theory, we identify the local spatial source of the $\\beta$-functions directly from microscopic kinematics: asynchronous gradient updates generate synchronous metric strains, whose target-active symmetric traceless components act as curvature-like defects. The Wilsonian depth RG flow is then governed by the transport, balance, and coarse-grained irrelevance of these defects. Heavy-tailed spectra arise, under a scale-free counting hypothesis, as the spectrum of the target-active lifted geometry, with exponent addition in the matched pullback--push-forward sector. Finally, we relate this depth RG picture to temporal stochastic training dynamics and to the kinematic imprint of the learned channel on empirical weight Gram matrices.", "url": "https://arxiv.org/abs/2607.10770", "type": "理论", "summary": "我们将特征学习表述为提升张量积学习度量的几何临界现象。中心对象不是标量重叠，而是目标活动几何结构 \\[ \\mathcal N_{0,L}=\\frac1N\\sum_{r=1}^{L}\\Sigma_{r\\to L}\\otimes T_{0\\to r-1}, \\] ，它将前向回拉生存与后向前推可见性纠缠在一起。中性相是目标各向同性的：在限制端点目标活动状态和迹线归一化之后，提升的度量与身份成正比。学习对应于该目标各向同性固定点的不稳定性以及无痕目标对齐特征张量的出现。我们推导出局部各向异性插入及其连续 Callan-Symanzik 流的离散戴森展开式。至关重要的是，在构建全时间平均场理论之前，我们直接从微观运动学中识别 $\\beta$ 函数的局部空间源：异步梯度更新生成同步度量应变，其目标主动对称无迹分量充当类曲率缺陷。\n\n然后，威尔逊深度 RG 流由这些缺陷的传输、平衡和粗粒度无关性控制。在无标度计数假设下，重尾光谱作为目标主动提升几何的光谱出现，并在匹配的回拉-前推扇区中进行指数加法。最后，我们将这个深度 RG 图片与时间随机训练动力学以及经验权重 Gram 矩阵上学习通道的运动学印记联系起来。", "authors": [{"name": "G. Le Pera"}, {"name": "C. Nordio"}], "featured_authors": [{"name": "G. Le Pera"}, {"name": "C. Nordio"}], "author_count": 2}, {"id": "2607.10835", "category": "cond-mat", "title": "Evolution from an acoustic-plasmon-mediated superconductivity to an acoustic-phonon-mediated superconductivity in bilayers", "abstract": "Motivated by recent developments in van der Waals heterostructures, we revisit the acoustic plasmon mechanism of superconductivity in bilayer systems composed of a light layer (LL) and heavy layer (HL) by employing Eliashberg theory. The exchange of virtual plasmons in the HL can lead to a retarded in time attractive interaction between electrons of LL that we model through the screened interaction in the bilayer system within the random phase approximation. We explore the evolution from acoustic plasmon mediated superconductivity to phonon mediated superconductivity by studying the evolution of $T_c$ as the HL mass is increased by a few orders of magnitude compared with the electronic mass in LL. The lower HL mass corresponds to the bilayer acoustic plasmon, while the latter regime is closer to the Born-Oppenheimer regime of acoustic phonon mediated strongly retarded pairing. The heavy HL mass limit is known to obey Migdal's theorem by virtue of the small ratio of the two individual layer masses. We study the nonadiabatic effects for the arbitrary mass ratio with no small parameter systematically by using a frequency cut off in the Eliashberg theory, providing $T_c$ as a function of this cut off.", "url": "https://arxiv.org/abs/2607.10835", "type": "理论", "summary": "受范德华异质结构最新发展的启发，我们采用 Eliashberg 理论重新审视了由轻层 (LL) 和重层 (HL) 组成的双层系统中的超导声等离子体机制。 HL 中虚拟等离激元的交换可以导致 LL 电子之间的吸引力相互作用在时间上延迟，我们通过随机相位近似内双层系统中的屏蔽相互作用进行建模。当 HL 质量与 LL 中的电子质量相比增加了几个数量级时，我们通过研究 $T_c$ 的演化来探索从声等离子体介导的超导到声子介导的超导的演化。较低的 HL 质量对应于双层声等离激元，而后者的状态更接近于声声子介导的强延迟配对的玻恩-奥本海默状态。由于两个单层质量之比较小，已知重 HL 质量极限遵循 Migdal 定理。\n\n我们通过使用 Eliashberg 理论中的频率截止来系统地研究具有不小的参数的任意质量比的非绝热效应，并提供 $T_c$ 作为该截止的函数。", "authors": [{"name": "Shuyang Wang"}, {"name": "Sankar Das Sarma"}, {"name": "Jay D. Sau"}], "featured_authors": [{"name": "Shuyang Wang"}, {"name": "Sankar Das Sarma"}, {"name": "Jay D. Sau"}], "author_count": 3}, {"id": "2607.10857", "category": "cond-mat", "title": "Catalog of Altermagnetism in Magnetic Wallpaper/Space Groups and Nonsymmorphic Altermagnets", "abstract": "Conventional altermagnetism, characterized by compensated collinear spin alignment and spin splitting, exhibits identical spin states at opposite momenta. In this work, we employ a non-spatial global symmetry $S$, the spinless time-reversal symmetry, which effectively replaces inversion symmetry in preserving the spin-state equivalence; hence, we systematically extend the classification of altermagnetism to all possible non-centrosymmetric crystals. By analyzing the necessary symmetry conditions, we provide a complete catalog of altermagnetic orders for all 2D magnetic wallpaper groups and all 3D magnetic space groups, identifying 17 altermagnetic wallpaper groups (12 centrosymmetric and 5 non-centrosymmetric) and 422 altermagnetic space groups (160 centrosymmetric and 262 non-centrosymmetric). This catalog assigns each altermagnetic wallpaper and space group to one of the six altermagnetic wave types established in the literature and presents its distinct spin distribution in the Brillouin zone (BZ); notably, the low-energy wave-type description does not necessarily extend throughout the full BZ, since the spin-degenerate nodal lines and planes can be unpinned from the high-symmetry planes. Beyond the catalog, nonsymmorphic symmetries further bring new patterns of the altermagnetic BZs through the emergence of hourglass dispersions, which arise from the compatibility relations between two symmetry-protected degenerate manifolds: same-spin and opposite-spin degeneracies. In both the non-centrosymmetric altermagnetism and the emergence of the hourglass dispersion, the spinless time-reversal symmetry plays the key role. Our work extends the symmetry catalog of altermagnetism and reveals that nonsymmorphic symmetries are essential for realizing altermagnetic band structures beyond the six established wave types, such as an $i$-wave-like spin winding in a tetragonal BZ.", "url": "https://arxiv.org/abs/2607.10857", "type": "理论", "summary": "传统的交变磁性的特点是补偿共线自旋排列和自旋分裂，在相反的动量下表现出相同的自旋状态。在这项工作中，我们采用非空间全局对称性$S$，即无自旋时间反转对称性，它有效地取代了反演对称性以保持自旋态等价性；因此，我们系统地将交变磁性的分类扩展到所有可能的非中心对称晶体。通过分析必要的对称条件，我们提供了所有 2D 磁性壁纸群和所有 3D 磁性空间群的完整交磁序目录，识别了 17 个交磁壁纸群（12 个中心对称和 5 个非中心对称）和 422 个交磁空间群（160 个中心对称和 262 个非中心对称）。\n\n该目录将每个交变磁壁纸和空间群分配给文献中建立的六种交变磁波类型之一，并呈现其在布里渊区 (BZ) 中独特的自旋分布；值得注意的是，低能波型描述不一定延伸到整个 BZ，因为自旋简并节点线和平面可以从高对称平面上解除固定。除了目录之外，非对称对称性通过沙漏色散的出现进一步带来了互磁 BZ 的新模式，沙漏色散是由两个对称保护的简并流形（同自旋和相反自旋简并流形）之间的相容关系产生的。在非中心对称交变磁性和沙漏色散的出现中，无自旋时间反转对称性起着关键作用。我们的工作扩展了交变磁学的对称目录，并揭示了非对称对称性对于实现六种已建立的波类型之外的交变磁带结构至关重要，例如四方 BZ 中的 $i$ 波状自旋缠绕。", "authors": [{"name": "Congcong Le"}, {"name": "Fan Cui"}, {"name": "Iao-Fai Io"}, {"name": "Moritz Hirschmann"}, {"name": "Xianxin Wu"}, {"name": "Ching-Kai Chiu"}], "featured_authors": [{"name": "Congcong Le"}, {"name": "Fan Cui"}, {"name": "Iao-Fai Io"}, {"name": "Moritz Hirschmann"}, {"name": "Xianxin Wu"}, {"name": "Ching-Kai Chiu"}], "author_count": 6}, {"id": "2607.10865", "category": "cond-mat", "title": "Dimensional and Spin Interpolation for the O$(n)$ Model: From Exact Anchors to RG-Improved Critical Exponents", "abstract": "We develop a two-axis interpolation framework for the O$(n)$ universality family, treating the spatial dimension $D$ and the spin-component number $n$ as independent continuous parameters connecting exact limiting solutions. On the spatial axis, anchoring between the Onsager solution at $D=2$ and mean-field theory at $D\\to\\infty$ yields a closed-form prediction for the 3D Ising critical coupling that agrees well with Monte Carlo benchmarks $K_c = 0.2204$ (benchmark: $0.22165$) with no adjustable parameters. Wilson--Fisher-constrained polynomial interpolation gives $\\nu=2/3$, $\\beta=31/96$, and $\\eta=35/864$ at $D=3$ (benchmarks: $0.6299$, $0.3265$, $0.0362$), and reproduces conformal-bootstrap results across $3 \\le D < 4$. On the spin axis, we establish a necessary compatibility criterion: two-anchor interpolation succeeds only for observables that vary monotonically between the anchor values. The critical coupling $K_c(n)$ violates this criterion because the Heisenberg value falls below the spherical limit, whereas the correlation-length exponent $\\nu(n)$ satisfies it. A perturbative $1/n^2$ expansion yields $\\nu(3) = 0.7493$ (benchmark: $0.7112$), and propagation through exact scaling relations gives $\\beta(3) = 0.3797$ (benchmark: $0.3689$) and $\\gamma(3) = 1.489$ (benchmark: $1.396$), without introducing additional parameters. The framework naturally extends to non-integer spin, producing the prediction $\\nu(2.5) = 0.7143$ for the O$(2.5)$ universality class. These results establish dimensional and spin interpolation as a unified and predictive approach to critical phenomena, while clarifying the structural conditions under which interpolation succeeds.", "url": "https://arxiv.org/abs/2607.10865", "type": "理论+数值", "summary": "我们为 O$(n)$ 普适性族开发了一个两轴插值框架，将空间维度 $D$ 和自旋分量数 $n$ 视为连接精确极限解的独立连续参数。在空间轴上，在 $D=2$ 处的 Onsager 解和 $D\\to\\infty$ 处的平均场理论之间的锚定产生了 3D Ising 临界耦合的封闭式预测，该预测与蒙特卡罗基准 $K_c = 0.2204$（基准：$0.22165$）非常吻合，没有可调整的参数。 Wilson--Fisher 约束多项式插值在 $D=3$ 处给出 $\\nu=2/3$、$\\beta=31/96$ 和 $\\eta=35/864$（基准：$0.6299$、$0.3265$、$0.0362$），并在 $3 \\le D < 4$ 上重现共形自举结果。在自旋轴上，我们建立了必要的兼容性标准：双锚点插值仅对于在锚点值之间单调变化的可观测值成功。临界耦合 $K_c(n)$ 违反了此标准，因为海森堡值低于球面极限，而相关长度指数 $\\nu(n)$ 满足该标准。\n\n扰动 $1/n^2$ 展开产生 $\\nu(3) = 0.7493$（基准：$0.7112$），通过精确缩放关系的传播给出 $\\beta(3) = 0.3797$（基准：$0.3689$）和 $\\gamma(3) = 1.489$（基准：$1.396$），无需引入额外参数。该框架自然地扩展到非整数自旋，为 O$(2.5)$ 通用类生成预测 $\\nu(2.5) = 0.7143$。这些结果将维度和自旋插值确立为关键现象的统一和预测方法，同时阐明了插值成功的结构条件。", "authors": [{"name": "Kumar Ghosh"}], "featured_authors": [{"name": "Kumar Ghosh"}], "author_count": 1}, {"id": "2607.10877", "category": "cond-mat", "title": "Pinwheel-shaped bound triplet pairs in the magnetization plateaus of SrCu$_2$(BO$_3$)$_2$", "abstract": "The sequence of magnetization plateaus at 1/8, 2/15, 1/6, 1/4, 1/3, 2/5, and 1/2 of the saturation observed in SrCu$_2$(BO$_3$)$_2$ remained a puzzle until tensor-networks-based numerical simulations suggested that the low-magnetization plateaus are stabilized as Wigner crystals of spin-2 bound states, and not as one of the standard configurations (semiclassical up-down, or crystals of triplets). We report on $^{63,65}$Cu nuclear magnetic resonance spectra up to 41.9 T: Based on constraints deduced from the 1/3 plateau, we show that the spectra in the 1/8 and 2/15 plateaus indeed agree with the prediction for the spin-2 bound states, while being incompatible with a crystal of triplets. This adds the formation of Wigner crystals of bound states as an alternative fundamental paradigm in the theory of magnetization plateaus.", "url": "https://arxiv.org/abs/2607.10877", "type": "理论+数值", "summary": "在 SrCu$_2$(BO$_3$)$_2$ 中观察到的饱和度的 1/8、2/15、1/6、1/4、1/3、2/5 和 1/2 处的磁化平台序列仍然是一个谜，直到基于张量网络的数值模拟表明低磁化平台稳定为自旋 2 束缚态的维格纳晶体，而不是作为标准配置之一（半古典上下，或三胞胎晶体）。我们报告了高达 41.9 T 的 $^{63,65}$Cu 核磁共振谱：基于从 1/3 平台推导出的约束，我们表明 1/8 和 2/15 平台中的光谱确实与自旋 2 束缚态的预测一致，但与三重态晶体不相容。这增加了束缚态维格纳晶体的形成，作为磁化平台理论中的替代基本范式。", "authors": [{"name": "Igor Vinograd"}, {"name": "Philippe Corboz"}, {"name": "Steffen Krämer"}, {"name": "Yanan Li"}, {"name": "Frédéric Mila"}, {"name": "Hiroshi Kageyama"}, {"name": "Masashi Takigawa"}, {"name": "Mladen Horvatić"}], "featured_authors": [{"name": "Igor Vinograd"}, {"name": "Philippe Corboz"}, {"name": "Steffen Krämer"}, {"name": "Hiroshi Kageyama"}, {"name": "Masashi Takigawa"}, {"name": "Mladen Horvatić"}], "author_count": 8}, {"id": "2607.10937", "category": "cond-mat", "title": "A minimal model for the Weyl nodes and Fermi arcs of PtBi$_2$", "abstract": "Weyl semimetals host topologically protected Fermi arcs on their surfaces, originating from the Chern number of the bulk Weyl nodes. In trigonal PtBi$_2$, superconducting signatures have been associated with the Fermi arcs. Theoretical descriptions of this surface superconductivity have so far relied on effective models that are not directly tied to the microscopic electronic structure of the material. In this work we develop a minimal description of the low-energy bands guided by density functional theory calculations and fully constrained by the relevant crystalline and time-reversal symmetries. The model captures the evolution of the Weyl nodes with spin-orbit coupling, including node annihilations, and is able to describe the spin-momentum locking of the surface Fermi arcs. It reproduces the orbital content and the band topology of PtBi$_2$ and provides a starting point for further studies.", "url": "https://arxiv.org/abs/2607.10937", "type": "理论+数值", "summary": "外尔半金属的表面具有受拓扑保护的费米弧，这些弧源自大块外尔节点的陈数。在三角 PtBi$_2$ 中，超导特征与费米弧相关。迄今为止，这种表面超导性的理论描述依赖于与材料的微观电子结构没有直接关系的有效模型。在这项工作中，我们在密度泛函理论计算的指导下开发了对低能带的最小描述，并完全受到相关晶体和时间反转对称性的约束。该模型捕获了具有自旋轨道耦合的韦尔节点的演化，包括节点湮灭，并且能够描述表面费米弧的自旋动量锁定。它再现了 PtBi$_2$ 的轨道含量和能带拓扑，并为进一步研究提供了起点。", "authors": [{"name": "Tobias Cristófoli"}, {"name": "Manuel Alonso Lemos"}, {"name": "Jorge I. Facio"}, {"name": "Pablo S. Cornaglia"}], "featured_authors": [{"name": "Tobias Cristófoli"}, {"name": "Manuel Alonso Lemos"}, {"name": "Jorge I. Facio"}, {"name": "Pablo S. Cornaglia"}], "author_count": 4}, {"id": "2607.11009", "category": "cond-mat", "title": "Layer-Resolved Topological Metals in the Bilayer Lieb Lattice", "abstract": "We identify a two-dimensional time-reversal-invariant topological metallic phase on a bilayer Lieb lattice, characterized by a quantized layer--resolved pseudo-spin Chern number. Without the orbital-angular-momentum-dependent (OAM-dependent) coupling, the system gives rise to a time-reversal-invariant topological semimetal with a zero indirect gap and quantized pseudo-spin Chern number. Opposite-sign intralayer OAM-dependent coupling immediately converts the zero-indirect-gap semimetal into a metal, in which the global spectrum is metallic while the layer--resolved pseudo-spin Chern number remains well defined as long as the direct gap at each crystal momentum and the pseudo-spin gap remain open. The model also exhibits asymmetric boundary states: in the semimetallic regime, one edge hosts perfectly flat bands, whereas the opposite edge supports gapless counter-propagating modes forming a one-dimensional Dirac cone. An edge-localized interlayer coupling gaps only the counter-propagating edge states, leaving the flat-band edge essentially intact, while intralayer OAM-dependent coupling bends the exact flat band into a dispersive boundary mode without affecting the gapped Dirac edge. These results open a route toward the controlled engineering of layer--resolved topological gapless phases in synthetic and quantum materials.", "url": "https://arxiv.org/abs/2607.11009", "type": "理论+数值", "summary": "我们在双层利布晶格上识别出二维时间反转不变的拓扑金属相，其特征在于量子化层解析的伪自旋陈数。如果没有轨道角动量相关（OAM 相关）耦合，系统会产生时间反转不变的拓扑半金属，其间接能隙为零，并且具有量化的赝自旋陈数。相反符号层内 OAM 依赖耦合立即将零间接能隙半金属转化为金属，其中全局光谱是金属性的，而只要每个晶体动量处的直接能隙和赝自旋能隙保持开放，层解析的赝自旋陈数就保持良好定义。该模型还表现出不对称边界态：在半金属状态下，一个边缘具有完全平坦的能带，而另一边缘则支持形成一维狄拉克锥的无间隙反向传播模式。边缘局部层间耦合仅使反向传播的边缘态产生间隙，使平带边缘基本完整，而层内 OAM 相关耦合将精确的平带弯曲为色散边界模式，而不影响有间隙的狄拉克边缘。\n\n这些结果为合成材料和量子材料中层分辨拓扑无间隙相的受控工程开辟了道路。", "authors": [{"name": "Mengjie Yang"}, {"name": "S Rahul"}, {"name": "Giandomenico Palumbo"}], "featured_authors": [{"name": "Mengjie Yang"}, {"name": "S Rahul"}, {"name": "Giandomenico Palumbo"}], "author_count": 3}, {"id": "2607.11055", "category": "cond-mat", "title": "Generalized Keldysh formalism for nonequilibrium correlation functions and its application to fluctuation dynamics", "abstract": "Recent advances in time-resolved spectroscopies provide increasing access to collective dynamics in correlated quantum materials. However, computing the corresponding nonequilibrium two-particle correlation functions remains a major challenge. Here, by introducing a contour-dependent virtual probe field within the generalized Keldysh formalism, we propose an approach that computes such correlation functions with the vertex corrections essential for describing collective dynamics. In particular, we introduce a linear integral equation that computes the correlation functions without explicitly constructing the four-time vertex kernel, and develop its matrix-free Krylov solver based on quantics tensor trains. Combining our method with nonequilibrium dynamical mean-field theory, we show that the fluctuation dynamics of the order parameter in a nonequilibrium symmetry-broken state depends significantly on whether vertex corrections are included, and that the fluctuation and its decay time grow near the nonthermal critical point. Our approach thus provides a practical route for evaluating nonequilibrium correlation functions, which are emerging as key observables for characterizing states far from equilibrium.", "url": "https://arxiv.org/abs/2607.11055", "type": "理论+数值", "summary": "时间分辨光谱学的最新进展为了解相关量子材料的集体动力学提供了越来越多的机会。然而，计算相应的非平衡双粒子相关函数仍然是一个重大挑战。在这里，通过在广义凯尔迪什形式主义中引入依赖于轮廓的虚拟探测场，我们提出了一种通过描述集体动力学所必需的顶点校正来计算此类相关函数的方法。特别是，我们引入了一种无需显式构造四次顶点内核即可计算相关函数的线性积分方程，并开发了基于量子张量序列的无矩阵 Krylov 求解器。将我们的方法与非平衡动态平均场理论相结合，我们发现非平衡对称破缺状态下序参数的涨落动力学很大程度上取决于是否包括顶点校正，并且涨落及其衰减时间在非热临界点附近增长。\n\n因此，我们的方法提供了评估非平衡相关函数的实用途径，非平衡相关函数正在成为表征远离平衡状态的关键可观察量。", "authors": [{"name": "Ken Inayoshi"}, {"name": "Hiroshi Shinaoka"}, {"name": "Yuta Murakami"}], "featured_authors": [{"name": "Ken Inayoshi"}, {"name": "Hiroshi Shinaoka"}, {"name": "Yuta Murakami"}], "author_count": 3}, {"id": "2607.11058", "category": "cond-mat", "title": "Neural-network-based reconstruction of spin and orbital angular momentum from X-ray magnetic circular dichroism spectra", "abstract": "X-ray magnetic circular dichroism (XMCD) is a powerful probe of element-specific spin and orbital angular momentum. Conventional analyses based on sum rules, however, rely on integrated spectral intensities and can become insufficient when multiple parameters influence the spectral line shape. Here, we formulate XMCD analysis as an inverse problem and develop a neural-network (NN) based approach to reconstruct spin and orbital angular momentum directly from full spectral line shapes. Using many-body multiplet calculations of Fe, Co, and Ni $L_{2,3}$-edge X-ray absorption spectra (XAS) and XMCD spectra as a physically well-defined training dataset, we systematically vary key parameters including crystal-field splitting, spin--orbit coupling, and exchange field. The NN is trained to map spectral line shapes onto the expectation values of spin and orbital angular momentm $\\langle S_z \\rangle$ and $\\langle L_z \\rangle$, and validated using strictly test-only data. The results demonstrate accurate and unbiased reconstruction, establishing a proof of concept for data-driven inverse reconstruction from XAS and XMCD spectra. These findings show that exploiting the full XAS and XMCD line shapes provide access to information beyond conventional sum-rule analyses while remaining consistent with established theoretical frameworks.", "url": "https://arxiv.org/abs/2607.11058", "type": "理论+数值", "summary": "X 射线磁圆二色性 (XMCD) 是元素特定自旋和轨道角动量的强大探针。然而，基于求和规则的传统分析依赖于积分光谱强度，并且当多个参数影响谱线形状时可能会变得不够充分。在这里，我们将 XMCD 分析制定为反问题，并开发一种基于神经网络 (NN) 的方法，直接从全谱线形状重建自旋和轨道角动量。使用 Fe、Co 和 Ni $L_{2,3}$ 边缘 X 射线吸收光谱 (XAS) 和 XMCD 光谱的多体多重计算作为物理定义良好的训练数据集，我们系统地改变了关键参数，包括晶体场分裂、自旋轨道耦合和交换场。神经网络经过训练，将谱线形状映射到自旋和轨道角动量 $\\langle S_z \\rangle$ 和 $\\langle L_z \\rangle$ 的期望值上，并使用严格的仅测试数据进行验证。结果证明了准确且无偏差的重建，为 XAS 和 XMCD 光谱的数据驱动逆重建建立了概念证明。\n\n这些发现表明，利用完整的 XAS 和 XMCD 线形可以访问传统求和规则分析之外的信息，同时与既定的理论框架保持一致。", "authors": [{"name": "Tetsuro Ueno"}], "featured_authors": [{"name": "Tetsuro Ueno"}], "author_count": 1}, {"id": "2607.11066", "category": "cond-mat", "title": "Finite-time Scaling of the surface special transition in a 3D classical Heisenberg model", "abstract": "We investigate nonequilibrium driven dynamics across the special surface phase transition in the three-dimensional classical Heisenberg model with open boundaries, where tuning the surface coupling gives access to an extraordinary-log boundary critical state characterized by logarithmic, rather than power-law, decay of correlations. Using Monte Carlo simulations, we realize four driving protocols: temperature heating and cooling across the special transition, and surface-coupling ramps from the ordinary and extraordinary-log critical states into the special point. For temperature-driven protocols, the surface order parameter obeys a generalization of the finite-time scaling (FTS) and the Kibble-Zurek mechanism. The central finding emerges when the system is driven from the extraordinary-log critical state: the large-rate scaling relation acquires a logarithmic correction and takes the novel form $M^{2}_{s}\\propto R^{(1+\\eta_{s})/r_{s}}[\\log(LR^{1/\\eta_{s}})]^{-q}$ , where $R$ is the driving rate, $L$ the system size, $\\eta_{s}$ the surface anomalous dimension, $r_{s}$ the scaling dimension of $R$, and $q$ the exponent governing the logarithmic boundary criticality. We demonstrate that this form follows from the general FTS framework by incorporating the logarithmic initial-state memory, and we achieve excellent data collapse over a wide range of system sizes and driving rates. Our results establish that extraordinary-log initial states alter nonequilibrium critical scaling, extending boundary FTS beyond conventional power-law initial conditions.", "url": "https://arxiv.org/abs/2607.11066", "type": "理论+数值", "summary": "我们研究了具有开放边界的三维经典海森堡模型中特殊表面相变的非平衡驱动动力学，其中调整表面耦合可以获得以对数而不是幂律相关性衰减为特征的异常对数边界临界状态。使用蒙特卡罗模拟，我们实现了四种驱动协议：特殊转变期间的温度加热和冷却，以及从普通和非常对数临界状态到特殊点的表面耦合斜坡。对于温度驱动协议，表面序参数遵循有限时间缩放 (FTS) 和 Kibble-Zurek 机制的推广。当系统从异常对数临界状态驱动时，核心发现就出现了：大速率缩放关系获得对数校正并采用新颖的形式 $M^{2}_{s}\\propto R^{(1+\\eta_{s})/r_{s}}[\\log(LR^{1/\\eta_{s}})]^{-q}$ ，其中 $R$ 是驱动速率，$L$ 是系统大小， $\\eta_{s}$ 为表面异常维度，$r_{s}$ 为 $R$ 的缩放维度，$q$ 为控制对数边界临界性的指数。\n\n我们证明，这种形式通过结合对数初始状态存储器来遵循通用 FTS 框架，并且我们在各种系统规模和驱动速率下实现了出色的数据崩溃。我们的结果表明，异常对数初始状态改变了非平衡临界标度，将边界 FTS 扩展到传统幂律初始条件之外。", "authors": [{"name": "Dongxu Liu"}, {"name": "Zhe Wang"}, {"name": "Shuai Yin"}, {"name": "Zheng Yan"}], "featured_authors": [{"name": "Dongxu Liu"}, {"name": "Zhe Wang"}, {"name": "Shuai Yin"}, {"name": "Zheng Yan"}], "author_count": 4}, {"id": "2607.11077", "category": "cond-mat", "title": "Effect of annealing temperature on the structure and properties of co-sputtered Fe-Mn-Sn films near 2:1:1 ratio", "abstract": "Research in recent years has focused on the thin-film synthesis of high-quality ternary alloys, identified for their tunable properties and potential in spintronics (e.g., Heusler alloys, Kagome magnets). In a previous study, we identified the conditions for stabilizing Fe$_2$MnSn, a Kagome magnet with a high Curie temperature and magnetic anisotropy. However, ternary phases such as Fe$_2$MnSn are challenging to synthesize and stabilize within a narrow temperature window, as binary and elemental phases can also form during the growth process. To highlight these observations, we investigated the thin film phases in the Fe-Mn-Sn system near the 2:1:1 ratio as a function of annealing temperature, ranging from 400 to 700\\degree C. The elemental Fe, Mn, and Sn targets were pre-calibrated to a close to 2:1:1 ratio and co-sputtered at room temperature, followed by annealing. Two binary hexagonal structures, Fe$_3$Sn$_2$ and Fe$_5$Sn$_3$, along with the elemental Fe phase, are stabilized between 400-550\\degree C, but disappear at 580\\degree C, where Fe$_2$MnSn is the only stable phase. Elemental Mn phase starts to appear starting from 600\\degree C, and becomes dominant by 750\\degree C. Electrical, magnetic and magneto-optical properties are observed to correlate with the structural findings and the best properties are observed in the temperature range where Fe$_2$MnSn is the dominant phase. In general, our study highlights the difficulty in growing phase-pure ternary alloys such as Fe$_2$MnSn, which is very strongly based on precise temperature conditions. We also observed significant disordered growth below 100 nm for Fe$_2$MnSn, implying poor thickness scaling behavior.", "url": "https://arxiv.org/abs/2607.11077", "type": "理论", "summary": "近年来的研究重点是高质量三元合金的薄膜合成，因其可调特性和自旋电子学潜力（例如 Heusler 合金、Kagome 磁体）而被确定。在之前的研究中，我们确定了稳定具有高居里温度和磁各向异性的 Kagome 磁体 Fe$_2$MnSn 的条件。然而，三元相（例如 Fe$_2$MnSn）很难在狭窄的温度窗口内合成和稳定，因为在生长过程中也可能形成二元相和元素相。为了强调这些观察结果，我们研究了 Fe-Mn-Sn 系统中接近 2:1:1 比例的薄膜相与退火温度（范围从 400 到 700°C）的函数关系。元素 Fe、Mn 和 Sn 靶材被预先校准到接近 2:1:1 的比例，并在室温下共溅射，然后进行退火。两种二元六方结构 Fe$_3$Sn$_2$ 和 Fe$_5$Sn$_3$ 以及元素 Fe 相在 400-550°C 之间稳定，但在 580°C 时消失，其中 Fe$_2$MnSn 是唯一的稳定相。单质Mn相从600℃开始出现，到750℃时占主导地位。\n\n观察到电、磁和磁光特性与结构发现相关，并且在 Fe$_2$MnSn 为主相的温度范围内观察到最佳特性。总的来说，我们的研究强调了生长纯相三元合金（例如 Fe$_2$MnSn）的难度，这在很大程度上取决于精确的温度条件。我们还观察到 Fe$_2$MnSn 在 100 nm 以下存在显着的无序生长，这意味着厚度缩放行为较差。", "authors": [{"name": "Lance Griswold"}, {"name": "Dipanjan Mazumdar"}], "featured_authors": [{"name": "Lance Griswold"}, {"name": "Dipanjan Mazumdar"}], "author_count": 2}, {"id": "2607.11105", "category": "cond-mat", "title": "Tiling decomposition multiplicity predicts
