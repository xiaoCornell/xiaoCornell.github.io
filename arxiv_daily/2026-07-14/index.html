JSJ 分解密切相关。拼接通过沿着环面粘合来构建流形，而 JSJ 分解则沿着基本环面将流形切割成规范片段。从 TQFT 的角度来看，这将链接补状态表示为与 JSJ 片段相关的基本运算符网络。\n\n我们通过研究 Seifert 纤维链互补链、Hopf 链互补链和 Whitehead 双 Hopf 链互补链的纠缠熵来说明这个框架，展示它们不同的 JSJ 结构如何导致不同的纠缠模式。", "authors": [{"name": "Nikolaos Angelinos"}], "featured_authors": [{"name": "Nikolaos Angelinos"}], "author_count": 1}, {"id": "2607.11125", "category": "hep-th", "title": "Evading Cosmological Strong Coupling in Non-minimally Coupled Vector Gravity", "abstract": "Recent analyses of Proca theories with non-minimal curvature couplings have uncovered an additional scalar degree of freedom with an identically vanishing propagation speed, $c_s^2=0$, signaling a scale-dependent strong-coupling problem. In this {\\it Letter}, we show that an additional derivative interaction can lift this zero-speed degeneracy and restore a non-degenerate quadratic dynamics for the scalar perturbations. In an open region of parameter space, the scalar kinetic matrix is positive definite and the high-frequency propagation speeds are real and positive. At quadratic order, this removes the specific signature of strong coupling associated with the $c_s^2=0$ mode. We also uncover a non-uniform limit as the temporal vector condensate approaches zero: at fixed nonzero $A_0$, the formal extreme-ultraviolet regime develops a ghost, while the kinetic structure of the exactly vanishing-condensate branch is different. The momentum scale at which this ghost appears is pushed toward increasingly high values as $A_0\\to0$. Whether the ghost scale ultimately lies above the EFT cutoff depends on an independent determination of the EFT cutoff. Finally, we identify a stable de Sitter fixed point with $A_0\\neq0$, surrounded by a finite region in which the scalar no-ghost and high-frequency stability conditions remain satisfied.", "url": "https://arxiv.org/abs/2607.11125", "type": "理论", "summary": "最近对非最小曲率耦合的普罗卡理论的分析发现了一个额外的标量自由度，其传播速度同样消失，$c_s^2=0$，表明存在尺度相关的强耦合问题。在这封信中，我们证明了额外的导数相互作用可以提升这种零速简并性并恢复标量扰动的非简并二次动力学。在参数空间的开域中，标量运动矩阵是正定的，高频传播速度是正实数。在二次阶上，这消除了与 $c_s^2=0$ 模式相关的强耦合的特定特征。当时间矢量凝聚接近零时，我们还发现了一个非均匀极限：在固定的非零 $A_0$ 处，形式的极紫外区域产生了鬼影，而精确消失的凝聚分支的动力学结构是不同的。这个幽灵出现的动量规模被推向越来越高的值，如 $A_0\\to0$。重影标度最终是否位于 EFT 截止值之上取决于 EFT 截止值的独立确定。\n\n最后，我们用 $A_0\\neq0$ 确定一个稳定的德西特不动点，该不动点被有限区域包围，在该区域中标量无重影和高频稳定性条件保持满足。", "authors": [{"name": "Antonio De Felice"}, {"name": "Seishi Enomoto"}, {"name": "Nagisa Hiroshima"}, {"name": "Atsushi Naruko"}], "featured_authors": [{"name": "Antonio De Felice"}, {"name": "Seishi Enomoto"}, {"name": "Nagisa Hiroshima"}, {"name": "Atsushi Naruko"}], "author_count": 4}, {"id": "2607.11150", "category": "hep-th", "title": "Conjugate Boundary Conditions, Kaluza-Klein Fermions, and an Extended Seesaw Model", "abstract": "In this paper, we discuss the conjugate boundary condition (CBC), which has recently been studied as a way of realizing a Majorana fermion within a compactified five-dimensional theory ($\\mathcal M^4\\otimes S^1/Z_2$). The Majorana fermion which plays a crucial role in the seesaw scenario arises as a zero mode (lowest mode) by imposing the CBC. Although each nonzero Kaluza-Klein (KK) mode is also naively expected to be described by two Majorana fermions, we show by direct calculation that they can be combined into a Dirac spinor in the free theory or up to the level of the quadratic term in the Lagrangian. This difference comes from the fact that an accidental U(1) symmetry exists in the KK mode sector, though such a symmetry does not appear in the zero mode sector. We also point out that the compatibility between the CBC and the axial U(1) transformation plays a crucial role in the diagonalization of the KK mode. We also investigate interactions compatible with both the CBC and the chiral orbifold projection. We find that a nontrivial bulk interaction between a CBC fermion and a chiral-orbifold fermion is allowed. As an application, we construct an extended seesaw scenario by utilizing both boundary conditions and such nontrivial bulk interactions. The resulting seesaw scenario has a different property in contrast with the conventional extended seesaw scenario; namely, the above new non-trivial interactions cause lepton number violation (LNV), while the Majorana mass term in our model does not violate lepton number.", "url": "https://arxiv.org/abs/2607.11150", "type": "理论", "summary": "在本文中，我们讨论了共轭边界条件（CBC），它最近被研究为在紧凑五维理论（$\\mathcal M^4\\otimes S^1/Z_2$）中实现马约拉纳费米子的一种方法。在跷跷板场景中起着至关重要作用的马约拉纳费米子通过施加 CBC 而出现为零模式（最低模式）。尽管每个非零卡鲁扎-克莱因（KK）模式也天真地期望由两个马约拉纳费米子来描述，但我们通过直接计算表明它们可以组合成自由理论中的狄拉克旋量或高达拉格朗日中二次项的水平。这种差异源于这样的事实：KK 模扇区中存在偶然的 U(1) 对称性，尽管这种对称性不会出现在零模扇区中。我们还指出，CBC 和轴向 U(1) 变换之间的兼容性在 KK 模式的对角化中起着至关重要的作用。我们还研究了与 CBC 和手性 Orbifold 投影兼容的相互作用。我们发现 CBC 费米子和手性轨道费米子之间存在非平凡的体相互作用是允许的。\n\n作为一个应用程序，我们利用边界条件和这种重要的体相互作用构建了一个扩展的跷跷板场景。与传统的扩展跷跷板场景相比，所得到的跷跷板场景具有不同的属性；也就是说，上述新的非平凡相互作用会导致轻子数违规（LNV），而我们模型中的马约拉纳质量项不会违反轻子数。", "authors": [{"name": "Yugo Abe"}, {"name": "Yuki Adachi"}, {"name": "Yukihiro Fujimoto"}], "featured_authors": [{"name": "Yugo Abe"}, {"name": "Yuki Adachi"}, {"name": "Yukihiro Fujimoto"}], "author_count": 3}, {"id": "2607.11322", "category": "hep-th", "title": "Belinfante Symmetrization from Metric-Affine Conservation Laws: Hypermomentum as the Improvement Term -- The Cases of QED and QCD", "abstract": "We derive the Belinfante--Rosenfeld symmetrization procedure from the metric-affine conservation law by means of an affine lift of flat-spacetime field theories. Following minimal coupling to an independent affine connection, variation of the action with respect to the connection defines the hypermomentum current. Taking the flat-spacetime limit of the resulting conservation law, we recover the Belinfante--Rosenfeld relation, with the divergence of the hypermomentum current reproducing the Belinfante improvement term. We thoroughly study the form of the couplings with this property and their physical significance. The construction is illustrated for Quantum Electrodynamics and Quantum Chromodynamics.", "url": "https://arxiv.org/abs/2607.11322", "type": "理论", "summary": "我们借助平坦时空场论的仿射升力，从度量仿射守恒定律中推导出Belinfante--Rosenfeld 对称化过程。在与独立仿射连接的最小耦合之后，相对于连接的动作的变化定义了超动量电流。采用由此产生的守恒定律的平坦时空极限，我们恢复了 Belinfante-Rosenfeld 关系，其中超动量电流的发散再现了 Belinfante 改进项。我们深入研究了具有这种性质的耦合形式及其物理意义。该结构用于量子电动力学和量子色动力学。", "authors": [{"name": "Damianos Iosifidis"}], "featured_authors": [{"name": "Damianos Iosifidis"}], "author_count": 1}, {"id": "2607.11332", "category": "hep-th", "title": "Large $N$ conformal bootstrap and chirality", "abstract": "We use the large $N$ critical point formalism to examine the interplay of supersymmetry and chiral symmetry on the location or otherwise of multiple zetas in the renormalization group functions of several related field theories. In particular we determine that the anomalous dimension of the matter field of the Lagrangian corresponding to the bosonic sector of the $O(N)$ Wess-Zumino is free of multiple zetas to $O(1/N^3)$.", "url": "https://arxiv.org/abs/2607.11332", "type": "理论", "summary": "我们使用大 $N$ 临界点形式来检查超对称性和手性对称性在几个相关场论的重正化群函数中多个 zeta 的位置或其他方面的相互作用。特别是，我们确定对应于 $O(N)$ Wess-Zumino 玻色子扇区的拉格朗日物质场的异常维度不存在 $O(1/N^3)$ 的多个 zeta。", "authors": [{"name": "J.A. Gracey"}], "featured_authors": [{"name": "J.A. Gracey"}], "author_count": 1}, {"id": "2607.11394", "category": "hep-th", "title": "Brouwer Degree of Thermodynamic Multicritical Points in Black Holes", "abstract": "In this manuscript, we propose a novel topological framework based on the heat capacity of black holes to investigate the topology of thermodynamic multicritical points. We construct a two-dimensional thermodynamic vector field whose isolated zeros correspond to the critical points of the system. The local topology of each critical point is characterized by its Brouwer degree, which serves as a locally conserved topological quantity. Applying this formalism to several AdS black hole solutions, we demonstrate that each system possesses a globally conserved topological charge. Although the number of thermodynamic critical points changes as the thermodynamic parameters are varied, the total topological charge remains invariant throughout the evolution. We show that these topological transitions are governed by the creation or annihilation of topologically neutral defect pairs carrying opposite Brouwer degrees. Our results provide a unified topological framework for understanding the emergence, evolution, and classification of thermodynamic multicritical points in black hole systems.", "url": "https://arxiv.org/abs/2607.11394", "type": "理论", "summary": "在这篇手稿中，我们提出了一种基于黑洞热容的新颖拓扑框架，以研究热力学多临界点的拓扑。我们构造一个二维热力学矢量场，其孤立零点对应于系统的临界点。每个临界点的局部拓扑由其布劳威尔度来表征，布劳威尔度作为局部守恒拓扑量。将这种形式应用于几个 AdS 黑洞解决方案，我们证明每个系统都拥有全局守恒的拓扑电荷。尽管热力学临界点的数量随着热力学参数的变化而变化，但总拓扑电荷在整个演化过程中保持不变。我们表明，这些拓扑转变是由具有相反布劳威尔度的拓扑中性缺陷对的产生或湮灭所控制的。我们的结果为理解黑洞系统中热力学多临界点的出现、演化和分类提供了一个统一的拓扑框架。", "authors": [{"name": "Bidyut Hazarika"}, {"name": "Prabwal Phukon"}], "featured_authors": [{"name": "Bidyut Hazarika"}, {"name": "Prabwal Phukon"}], "author_count": 2}, {"id": "2607.11468", "category": "hep-th", "title": "Superconformal mechanics from N-extended Euler-Calogero-Moser and Calogero models", "abstract": "In this paper, we considered two-particle variants of the N-extended Euler-Calogero-Moser and Calogero models. Due the translation invariance, the center of mass can be decoupled (together with the corresponding fermions), leaving us with specific superconformal mechanics. Additional bosonic variables (spin variables) can easily be incorporated into the supercharges and the Hamiltonian. In the case of the Euler-Calogero-Moser model, the supersymmetry in the two-particle cases admits an unexpected extension from Osp(N|2) to SU(1,1|N) superconformal symmetry. The case of the Calogero model leads to purely Osp(N|2) superconformal mechanics. The way to get rid of the well-known problems along this path is to have a higher number of fermions present in the system.", "url": "https://arxiv.org/abs/2607.11468", "type": "理论", "summary": "在本文中，我们考虑了 N 扩展 Euler-Calogero-Moser 和 Calogero 模型的双粒子变体。由于平移不变性，质心可以解耦（与相应的费米子一起），给我们留下特定的超共形力学。额外的玻色子变量（自旋变量）可以轻松地合并到增压和哈密顿量中。在 Euler-Calogero-Moser 模型中，双粒子情况下的超对称性允许从 Osp(N|2) 到 SU(1,1|N) 超共形对称性的意外扩展。 Calogero 模型的情况导致纯粹的 Osp(N|2) 超共形力学。解决这条道路上众所周知的问题的方法是在系统中存在更多数量的费米子。", "authors": [{"name": "S.Krivonos"}, {"name": "A.Sutulin"}], "featured_authors": [{"name": "S.Krivonos"}, {"name": "A.Sutulin"}], "author_count": 2}, {"id": "2607.11609", "category": "hep-th", "title": "Multi-rotating black holes with non-aligned angular momenta in 5D Kaluza-Klein theory", "abstract": "We present an exact solution describing multi-rotating black holes in 4D Einstein-Maxwell-dilaton theory, which can be obtained from 5D Kaluza--Klein theory via dimensional reduction. The solution represents a multi-centered configuration of rotating black holes carrying both electric and magnetic charges, with each black hole possessing a non-aligned angular momentum. This work generalizes our previous solution for black holes with aligned angular momenta to the more general case of non-aligned angular momenta. It includes, as special cases, the Majumdar--Papapetrou solution, the recent multi-centered rotating black hole solutions of Teo and Wan, and our previous solution with unequal electric and magnetic charges. The resulting spacetimes are free of curvature singularities and closed timelike curves, both on and outside the horizons, provided that the magnitude of the spin angular momentum of each black hole remains below a certain upper bound.", "url": "https://arxiv.org/abs/2607.11609", "type": "理论", "summary": "我们提出了4D爱因斯坦-麦克斯韦膨胀理论中描述多旋转黑洞的精确解，该解可以通过5D Kaluza-Klein理论通过降维得到。该解决方案代表了携带电荷和磁荷的旋转黑洞的多中心配置，每个黑洞都拥有不对齐的角动量。这项工作将我们之前对具有对齐角动量的黑洞的解决方案推广到更一般的非对齐角动量情况。作为特例，它包括 Majumdar-Papapetrou 解、最近 Teo 和 Wan 的多中心旋转黑洞解，以及我们之前的不等电荷和磁荷解。所得到的时空在视界内外都没有曲率奇点和闭合类时曲线，只要每个黑洞的自旋角动量的大小保持在某个上限以下。", "authors": [{"name": "Shinya Tomizawa"}, {"name": "Hideo Furugori"}, {"name": "Jun-ichi Sakamoto"}, {"name": "Ryotaku Suzuki"}], "featured_authors": [{"name": "Shinya Tomizawa"}, {"name": "Hideo Furugori"}, {"name": "Jun-ichi Sakamoto"}, {"name": "Ryotaku Suzuki"}], "author_count": 4}, {"id": "2607.11617", "category": "hep-th", "title": "Bethe Ansatz without Nesting", "abstract": "We develop a non-nested Bethe ansatz description of rational $\\mathfrak{gl}_\\ell$ spin chains in the vector representation. Starting from the quantum spectral curve and the separation-of-variables framework, we derive closed systems of Bethe equations involving only the momentum-carrying Bethe roots. The construction is worked out explicitly for the $\\mathfrak{gl}_3$ and $\\mathfrak{gl}_4$ spin chains and then generalized to arbitrary rank. A central result of this work is the identification of a recursive hierarchy associated with the fundamental transfer matrices. The hierarchy is generated by regularity conditions of the lower transfer matrices and closes through a universal rank-$\\ell$ equation $\\mathcal{R}_{\\ell}=0$. This equation replaces the final level of the conventional nested Bethe ansatz and eliminates all auxiliary Bethe roots. Consequently, the complete spectral data of an eigenstate are encoded solely in the first Baxter polynomial $Q_{1}(u)$. We further obtain explicit expressions for the eigenvalues of all fundamental transfer matrices in terms of the momentum-carrying roots alone. The resulting formulation provides a compact characterization of the spectrum of rational $\\mathfrak{gl}_\\ell$ spin chains and reveals a direct connection between the quantum spectral curve, transfer-matrix fusion relations, and a truncated $Q$-system underlying the non-nested description. Finally, we investigate the quasi-classical (Gaudin) limit of the non-nested Bethe equations. For the $\\mathfrak{gl}_3$ spin chain, we show that the leading non-trivial contribution gives rise to Gaudin equations whose pole-free form naturally defines a scalar third-order $\\mathfrak{gl}_3$ oper.", "url": "https://arxiv.org/abs/2607.11617", "type": "理论", "summary": "我们开发了向量表示中的有理 $\\mathfrak{gl}_\\ell$ 自旋链的非嵌套 Bethe ansatz 描述。从量子谱曲线和变量分离框架出发，我们推导了仅涉及动量贝特根的贝特方程的闭合系统。该构造是针对 $\\mathfrak{gl}_3$ 和 $\\mathfrak{gl}_4$ 自旋链明确计算出来的，然后推广到任意等级。这项工作的核心成果是识别与基本传递矩阵相关的递归层次结构。该层次结构由较低传递矩阵的正则条件生成，并通过通用等级 $\\ell$ 方程 $\\mathcal{R}_{\\ell}=0$ 闭合。该方程取代了传统嵌套 Bethe ansatz 的最后一级，并消除了所有辅助 Bethe 根。因此，本征态的完整光谱数据仅在第一个巴克斯特多项式 $Q_{1}(u)$ 中编码。我们进一步获得了所有基本传递矩阵的特征值的显式表达式，仅用动量承载根表示。\n\n由此产生的公式提供了有理 $\\mathfrak{gl}_\\ell$ 自旋链谱的紧凑表征，并揭示了量子谱曲线、转移矩阵融合关系和非嵌套描述下的截断 $Q$ 系统之间的直接联系。最后，我们研究非嵌套贝特方程的准经典（高丁）极限。对于 $\\mathfrak{gl}_3$ 自旋链，我们表明主要的非平凡贡献产生了高丁方程，其无极点形式自然定义了标量三阶 $\\mathfrak{gl}_3$ 运算。", "authors": [{"name": "Gleb Arutyunov"}, {"name": "Hrachya Babujian"}, {"name": "Minghao Gao"}], "featured_authors": [{"name": "Gleb Arutyunov"}, {"name": "Hrachya Babujian"}, {"name": "Minghao Gao"}], "author_count": 3}, {"id": "2607.11641", "category": "hep-th", "title": "Holographic Timelike Entanglement and Subregion Complexity in Localized AdS3*S3*T4 Black Holes", "abstract": "We study timelike entanglement entropy and timelike subregion complexity in localized black holes with asymptotic AdS3*S3*T4 geometry, focusing on the black-pole solution. Unlike the BTZ solution, the black pole exhibits a nontrivial dependence on the internal sphere through the functions $K_y(r,\\theta)$ and $G(r,\\theta)$. Both observables are constructed from spacelike and timelike Lorentzian branches, but they probe the geometry in different ways: timelike entanglement yields a complex lifted area, while timelike complexity gives a real, finite renormalized volume. We employ a localized timelike prescription in which the branch profile is built at an angular label $\\theta_0$ and subsequently lifted over the physical internal angle $\\theta$. In the large-$r$ regime, the leading angular dependence drops out, recovering the expected short-interval behaviour. In the exact black-pole geometry, the temporal families become non-monotonic, making a fixed-boundary-interval selection essential. As the boundary interval increases, the selected branches move inward and become sensitive to the localized cap-horizon transition region. These results demonstrate that timelike Lorentzian observables probe localized-geometry effects that are absent in BTZ and in the leading large-$r$ description.", "url": "https://arxiv.org/abs/2607.11641", "type": "理论", "summary": "我们研究具有渐近 AdS3*S3*T4 几何结构的局域黑洞中的类时纠缠熵和类时子区域复杂性，重点关注黑极解。与 BTZ 解不同，黑极通过函数 $K_y(r,\\theta)$ 和 $G(r,\\theta)$ 表现出对内部球体的非平凡依赖性。两个可观测量都是由类空和类时洛伦兹分支构建的，但它们以不同的方式探测几何：类时纠缠产生复杂的提升区域，而类时复杂性给出真实的、有限的重正化体积。我们采用局部类时规定，其中分支轮廓在角度标签 $\\theta_0$ 处构建，然后提升到物理内角 $\\theta$ 上。在大$r$状态下，主要的角度依赖性消失，恢复了预期的短间隔行为。在精确的黑极几何中，时间族变得非单调，使得固定边界间隔选择至关重要。随着边界间隔的增加，选定的分支向内移动并对局部帽地平线过渡区域变得敏感。\n\n这些结果表明，类时洛伦兹可观测量探测了 BTZ 和领先的大型 $r$ 描述中不存在的局域几何效应。", "authors": [{"name": "Jitendra Pal"}, {"name": "Yu Shi"}], "featured_authors": [{"name": "Jitendra Pal"}, {"name": "Yu Shi"}], "author_count": 2}, {"id": "2607.11645", "category": "hep-th", "title": "Notes on the bootstrap of four-point conformal integrals", "abstract": "We set up a bootstrap workflow to study four-point conformal integrals in position space, using leading singularities, single-valued multiple polylogarithmic ansätze and boundary data from expansion by regions. These four-point conformal integrals are general in the sense that they are generated by the four-point projections of all possible $f$-graphs, including all non-planar $f$-graph sectors. For three-loop cases, fourteen of the fifteen inequivalent integrand basis can be directly calculated by \\texttt{HyperlogProcedures} and the last one is fixed by Gram identity. Then we concentrate on how far the bootstrap workflow can go for four-loop cases, though it works for three-loop cases as well. We show that integrals with several leading singularities can be made tractable by decomposing them into pieces with simpler cut structure. Some four-loop integrals which can not be calculated or very hard to be calculated by other methods for now are obtained in this way. We also provide a package with skill files which is suitable to be read and used by current AI models.", "url": "https://arxiv.org/abs/2607.11645", "type": "理论", "summary": "我们建立了一个引导工作流程来研究位置空间中的四点共形积分，使用前导奇点、单值多重多对数 ansätze 和来自区域扩展的边界数据。这些四点共形积分是通用的，因为它们是由所有可能的 $f$ 图（包括所有非平面 $f$ 图扇区）的四点投影生成的。对于三循环情况，十五个不等价被积函数基中的十四个可以直接通过 \\texttt{HyperlogProcedures} 计算，最后一个由 Gram 恒等式固定。然后我们关注引导工作流程对于四循环情况可以走多远，尽管它也适用于三循环情况。我们证明，通过将具有多个主要奇点的积分分解为具有更简单切割结构的片段，可以使积分变得易于处理。一些目前用其他方法无法计算或很难计算的四环积分就是用这种方法得到的。我们还提供了一个包含技能文件的包，适合当前人工智能模型读取和使用。", "authors": [{"name": "Xuhang Jiang"}], "featured_authors": [{"name": "Xuhang Jiang"}], "author_count": 1}, {"id": "2607.11828", "category": "hep-th", "title": "Modular structures in the DSSYK partition function", "abstract": "We study the low-temperature expansion of the disk partition function $Z(\\beta)$ of the double-scaled SYK model (DSSYK) at fixed coupling $\\lambda=2p^{2}/N$, where $N$ is the number of Majorana fermions and $p$ is the number of fermions in each interaction term, both taken to infinity. We show that the exact Bessel-function representation of $Z(\\beta)$, expanded at large argument (corresponding to low temperature), can be organized in terms of the classical ring of quasi-modular Eisenstein series $E_{2},E_{4},E_{6}$ and their differential identities. Exploiting the modular $S$-duality properties of this ring, we derive the semiclassical (small $\\lambda$) low-temperature expansion of $Z(\\beta)$, splitting it into a perturbative tower and a non-perturbative sector controlled by $\\widetilde q=e^{-4\\pi^{2}/\\lambda}$. At each order in $\\widetilde q$, we determine the non-perturbative correction in closed form up to second order in $\\lambda$; the resulting series resums into a compact expression in the same Eisenstein series, extending previous semiclassical results beyond their strict $\\beta\\to\\infty$ limit. We further show that this entire structure follows from a single, exact differential equation coupling a modular derivative to derivatives with respect to temperature. Finally, we prove that the non-perturbative sector of $Z(\\beta)$ is exactly supported, to all orders in $\\lambda$, on the same exponents as the on-shell actions of known bilocal-Liouville saddles of the DSSYK Schwarzian limit, pointing to a well-defined bulk origin for these non-perturbative corrections.", "url": "https://arxiv.org/abs/2607.11828", "type": "理论", "summary": "我们研究了双尺度SYK模型（DSSYK）的盘配分函数$Z(\\beta)$在固定耦合$\\lambda=2p^{2}/N$下的低温展开，其中$N$是马约拉纳费米子的数量，$p$是每个相互作用项中费米子的数量，两者都取为无穷大。我们证明，在大参数（对应于低温）下展开的 $Z(\\beta)$ 的精确贝塞尔函数表示可以根据准模爱森斯坦级数 $E_{2},E_{4},E_{6}$ 的经典环及其微分恒等式进行组织。利用该环的模$S$对偶性质，我们推导了$Z(\\beta)$的半经典（小$\\lambda$）低温展开，将其分成一个微扰塔和一个由$\\widetilde q=e^{-4\\pi^{2}/\\lambda}$控制的非微扰扇区。在 $\\widetilde q$ 中的每个阶，我们确定 $\\lambda$ 中高达二阶的封闭形式的非微扰修正；所得级数恢复为同一爱森斯坦级数中的紧凑表达式，将先前的半经典结果扩展到其严格的 $\\beta\\to\\infty$ 限制之外。\n\n我们进一步表明，整个结构遵循一个精确的微分方程，将模导数与温度导数耦合起来。最后，我们证明，对于 $\\lambda$ 中的所有阶数，$Z(\\beta)$ 的非微扰扇区在与 DSSYK 施瓦茨极限的已知双局部刘维尔鞍的壳上作用相同的指数上得到精确支持，指出这些非微扰校正的明确定义的体原点。", "authors": [{"name": "Matteo Beccaria"}, {"name": "Eleonora Alfinito"}], "featured_authors": [{"name": "Matteo Beccaria"}, {"name": "Eleonora Alfinito"}], "author_count": 2}, {"id": "2607.11848", "category": "hep-th", "title": "Effective dynamics and quantum information in de Sitter wedge holography", "abstract": "In this paper, we study codimension-two holography in a de Sitter (dS) wedge setup, based on the idea of wedge holography. We consider a $d+1$-dimensional Anti-de Sitter (AdS) bulk spacetime bounded by two end-of-the-world branes with $d$-dimensional de Sitter geometry. We propose that this configuration is holographically dual to a conformal field theory (CFT) living on a $d-1$-dimensional sphere. Our computations of the partition function and holographic entanglement entropy support this duality and indicate that the dual CFT is non-unitary. We also analyze the mass spectrum in dS wedge holography. We verify the first law of entanglement entropy within this framework. Finally, we make use of the island prescription to study the Page curve in a simplified model within our dS wedge holography framework.", "url": "https://arxiv.org/abs/2607.11848", "type": "理论", "summary": "在本文中，我们基于楔形全息术的思想，研究德西特（dS）楔形装置中的余维二全息术。我们考虑 $d+1$ 维反德西特 (AdS) 体时空，其边界是两个具有 $d$ 维德西特几何的世界末日膜。我们提出，这种配置与$d-1$维球体上的共形场论（CFT）是全息对偶的。我们对配分函数和全息纠缠熵的计算支持这种对偶性，并表明对偶 CFT 是非酉的。我们还分析了 dS 楔形全息术中的质谱。我们在此框架内验证了纠缠熵第一定律。最后，我们利用岛处方来研究 dS 楔形全息框架内简化模型中的佩奇曲线。", "authors": [{"name": "Sabyasachi Maulik"}, {"name": "Soumen Pari"}], "featured_authors": [{"name": "Sabyasachi Maulik"}, {"name": "Soumen Pari"}], "author_count": 2}, {"id": "2607.09703", "category": "math-ph", "title": "The Dirac equation in (split-)octonions: origins, variants, and modern context", "abstract": "Octonions and split-octonions have been used to express the Dirac equation in physics in several conceptually distinct ways. This review sorts them into four groups: the 2-factor (direct-product), 3-factor, and projection representations, which use (split-)octonion basis elements natively to model a spacetime basis; and the conventional use of octonions to carry Dirac algebra acting on spinors. Pointers to their modern use, and to recent methods for native split-octonionic analysis, are given throughout. Within the 2-factor approach, we document its origin (J. Köplinger, Appl. Math. Computation 182 (2006) 443, following a conjecture of C. Musès). As a side aspect, we examine the \"split octonionic Dirac equation\" of M. Gogberashvili and A. Gurchumelia (Int. J. Geom. Meth. Mod. Phys. 21 (2024) 2450214). An explicit structure-preserving rotation shows it to be this same direct-product representation, up to relabeling: an independent verification rather than \"the novel forms\" [the opening words of the authors' abstract]. Its genuine contributions are credited.", "url": "https://arxiv.org/abs/2607.09703", "type": "理论", "summary": "八元数和分裂八元数已被用来以几种概念上不同的方式表达物理学中的狄拉克方程。本综述将它们分为四组：2 因子（直接乘积）、3 因子和投影表示，它们本身使用（分裂）八元数基本元素来对时空基础进行建模；以及传统使用八元数来进行作用于旋量的狄拉克代数。全文给出了它们的现代使用以及本地分裂八元分析的最新方法的指针。在 2 因素方法中，我们记录了它的起源（J. Köplinger, Appl. Math. Computation 182 (2006) 443，遵循 C. Musès 的猜想）。作为一个侧面，我们研究了 M. Gogberashvili 和 A. Gurchumelia 的“分裂八元狄拉克方程”（Int. J. Geom. Meth. Mod. Phys. 21 (2024) 2450214）。显式的结构保留旋转表明它是相同的直接产品表示，直到重新标记：独立验证而不是“新颖的形式”[作者摘要的开头词]。它的真正贡献是值得赞扬的。", "authors": [{"name": "J. Köplinger"}], "featured_authors": [{"name": "J. Köplinger"}], "author_count": 1}, {"id": "2607.10097", "category": "math-ph", "title": "PBW bases and centralisers for the $q$-Onsager algebra", "abstract": "We settle five conjectures concerning PBW bases and centralisers for the $q$-Onsager algebra. We first prove that the Baseilhac--Kolb root vectors give a PBW basis in every linear order whenever $q$ is not a root of unity, removing the previous transcendence hypothesis. We next establish twelve PBW bases in the alternating generators and show that they persist under arbitrary scalar central specialisation of the alternating central extension. This proves conjectures of Terwilliger and of Baseilhac and Belliard. Finally, we determine the centralisers of the negative and imaginary alternating subalgebras and show that all four single-family alternating polynomial subalgebras are maximal commutative. The proofs combine explicit straightening for Damiani root vectors, the degeneration $\\mathrm{gr} O_q \\simeq U_q^+(\\widehat{\\mathfrak{sl}}_2)$, and large-index triangular crossing arguments.", "url": "https://arxiv.org/abs/2607.10097", "type": "理论", "summary": "我们解决了关于 $q$-Onsager 代数的 PBW 基和中心化器的五个猜想。我们首先证明只要 $q$ 不是单位根，Baseilhac-Kolb 根向量就可以在每个线性阶中给出 PBW 基，从而消除之前的超越假设。接下来，我们在交替发生器中建立了 12 个 PBW 基础，并表明它们在交替中心扩展的任意标量中心特化下持续存在。这证明了特威利格以及巴塞亚克和贝利亚德的猜想。最后，我们确定了负和虚交替子代数的中心化子，并证明所有四个单族交替多项式子代数都是最大交换的。该证明结合了 Damiani 根向量的显式拉直、退化 $\\mathrm{gr} O_q \\simeq U_q^+(\\widehat{\\mathfrak{sl}}_2)$ 和大索引三角交叉参数。", "authors": [{"name": "Haoran Zhu"}], "featured_authors": [{"name": "Haoran Zhu"}], "author_count": 1}, {"id": "2607.10259", "category": "math-ph", "title": "The existence of full dimensional KAM tori for infinite dimensional Hamiltonian systems with long range interactions", "abstract": "We prove the existence of full dimensional KAM tori for infinite dimensional mechanical systems exhibiting long range interactions, under a Diophantine condition of Bourgain type [Bourgain2005JFA], in which the radius of the invariant tori satisfies a slower decay.", "url": "https://arxiv.org/abs/2607.10259", "type": "理论", "summary": "我们证明了在布尔干型丢番图条件下表现出长程相互作用的无限维机械系统全维 KAM 环面的存在性 [Bourgain2005JFA]，其中不变环面的半径满足较慢的衰减。", "authors": [{"name": "Hongzi Cong"}, {"name": "Wanran Ding"}, {"name": "Zhihan Zhang"}, {"name": "Juan Zhao"}], "featured_authors": [{"name": "Hongzi Cong"}, {"name": "Wanran Ding"}, {"name": "Zhihan Zhang"}, {"name": "Juan Zhao"}], "author_count": 4}, {"id": "2607.10493", "category": "math-ph", "title": "Path-Dependent Entropic Lagrangian for Probability Flows: Balance--Entropy Routing and Composable Information Potentials", "abstract": "Probability distributions are central to information theory, statistical inference, and modern probabilistic learning. Maximum entropy selects a probability state under prescribed constraints, but it does not specify how that state is reached, how probability is transported, or how dissipation and external information exchange are accounted for along the path. We develop a path-dependent entropic Lagrangian calculus that extends static state selection to probability-path evolution through restricted generators, upper-limit history terms, and explicit balance--entropy port routing. The construction yields the thermal state relation, conservative probability balance, and nonnegative production under standard mobility closure. Its KL/Shannon sector recovers maximum-entropy and Bayesian laws as stationary no-flux states, while time-dependent information potentials separate internal dissipation from supplied information power. Composable information and structural potentials control tails, sparsity, robustness, regularization, and nonlocal multimodality without changing the accounting architecture. Two numerical examples verify mass conservation, energy decomposition, and the total free-energy ledger.", "url": "https://arxiv.org/abs/2607.10493", "type": "理论", "summary": "概率分布是信息论、统计推断和现代概率学习的核心。最大熵在规定的约束下选择一个概率状态，但它没有指定如何达到该状态，如何传输概率，或者如何考虑沿路径的耗散和外部信息交换。我们开发了一种路径相关的熵拉格朗日演算，通过受限生成器、上限历史项和显式平衡熵端口路由，将静态选择扩展到概率路径演化。该构造产生热状态关系、保守概率平衡以及标准移动性闭合下的非负产生。其 KL/香农扇区将最大熵和贝叶斯定律恢复为静态无通量状态，而时间相关信息势将内部耗散与提供的信息功率分开。可组合信息和结构势可以控制尾部、稀疏性、鲁棒性、正则化和非局部多模态，而无需改变会计架构。\n\n两个数值示例验证了质量守恒、能量分解和总自由能账本。", "authors": [{"name": "Huilong Ren"}], "featured_authors": [{"name": "Huilong Ren"}], "author_count": 1}, {"id": "2607.10510", "category": "math-ph", "title": "Rigorous bound on the aspect ratio for the formation of a nematic phase in hard rod and hard rectangle systems on $\\mathbb{Z}^2$", "abstract": "We prove the existence of a nematic phase in a model of $l\\times w$ hard rectangles on the square lattice with two allowed orientations and a large aspect ratio $k:=l/w$. The proof is based on a two-scale cluster expansion method developed previously by Disertori--Giuliani for hard rods in 2D and Disertori--Giuliani--Jauslin for hard plates in 3D. Our main contributions lie in explicitly tracking the constants and parameters and completing the arguments left implicit in these works. Hence, the proof produces a sufficient set of quantitative conditions from which estimates for the required aspect ratio can be extracted. A non-optimized evaluation of these conditions yields the bound $k\\ge 10^{72}$. Although it vastly overshoots the numerical prediction, $k_{\\min}=7$, our result appears to be the first rigorous estimate of the aspect ratio required for the formation of a nematic phase in hard rectangle systems.", "url": "https://arxiv.org/abs/2607.10510", "type": "理论", "summary": "我们证明了在具有两个允许方向和大纵横比 $k:=l/w$ 的方晶格上 $l\\times w$ 硬矩形模型中存在向列相。该证明基于 Disertori--Giuliani 先前针对 2D 硬棒和 Disertori--Giuliani-Jauslin 针对 3D 硬板开发的两尺度簇展开方法。我们的主要贡献在于显式跟踪常量和参数并完成这些工作中隐含的参数。因此，证明产生了一组足够的定量条件，从中可以提取所需纵横比的估计值。对这些条件进行非优化评估会产生边界 $k\\ge 10^{72}$。尽管它大大超出了数值预测 $k_{\\min}=7$，但我们的结果似乎是对硬矩形系统中形成向列相所需的纵横比的第一个严格估计。", "authors": [{"name": "Qidong He"}], "featured_authors": [{"name": "Qidong He"}], "author_count": 1}, {"id": "2607.10833", "category": "math-ph", "title": "Jordan Pair Quantum Theory and the Standard Model", "abstract": "Jordan pairs and hermitian Jordan triples were discovered by mathematicians studying Jordan algebras, which describe the possible algebras of observables in quantum mechanics. We point out a striking correspondence between the doubly exceptional hermitian Jordan triple (the so-called ``bi-Cayley'' triple) and the structure of the Standard Model of particle physics. We also point out how ordinary quantum mechanics may be reformulated, and generalized, using hermitian Jordan triples.", "url": "https://arxiv.org/abs/2607.10833", "type": "理论", "summary": "乔丹对和厄米乔丹三元组是由研究乔丹代数的数学家发现的，乔丹代数描述了量子力学中可观测量的可能代数。我们指出双例外厄米乔丹三元组（所谓的“双凯莱”三元组）与粒子物理标准模型的结构之间的惊人对应。我们还指出如何使用厄米乔丹三元组重新表述和推广普通量子力学。", "authors": [{"name": "John C. Baez"}, {"name": "Endre Bokor"}, {"name": "Latham Boyle"}], "featured_authors": [{"name": "John C. Baez"}, {"name": "Endre Bokor"}, {"name": "Latham Boyle"}], "author_count": 3}, {"id": "2607.11350", "category": "math-ph", "title": "Beyond Critical Slowing Down: Slow Modes, Extreme Tails, and Field Decoherence in Tipping Transitions", "abstract": "We study early-warning signals of climate tipping in the metastable stochastic Ghil--Sellers energy balance model. Rather than relying on a single scalar indicator, we analyze the transition through three complementary lenses: reduced Ruelle--Pollicott (RP) resonances, extreme value statistics, and full-field data-adaptive harmonic modes. This distinguishes bulk relaxation, tail excursions, and spatial phase organization as interacting aspects of tipping. First, using a reduced transfer-operator construction for global mean temperature and meridional thermal contrast, we estimate reduced RP resonances and Kolmogorov modes. Near tipping, several dominant decay rates drop and their modes harmonize along a common slow direction. Consequently, Green's functions aligned with this direction acquire coherent delayed-recovery tails and enhanced low-frequency susceptibility. The warning is thus carried by a bundle of slow modes rather than a single spectral gap. Second, Extreme Value Theory reveals that the cold tail of the global mean temperature anomaly becomes less sharply bounded and more persistent near the transition. The shape and extremal indices show an asymmetric organization: cold excursions probing the escape direction become more accessible and clustered. Third, Data-Adaptive Harmonic Mode (DAHM) analysis of the full temperature field shows that near tipping, leading modes still capture the large-scale trend, but fixed-rank reconstruction degrades and the DAHM phase distribution broadens. We interpret this as multivariate phase decoherence: the field retains a coherent transition component while losing sharp latitudinal phase organization. Ultimately, metastable tipping is marked by a joint reorganization of reduced spectral response, extreme-event statistics, and full-field phase coherence.", "url": "https://arxiv.org/abs/2607.11350", "type": "理论", "summary": "我们在亚稳态随机 Ghil-Sellers 能量平衡模型中研究气候倾斜的预警信号。我们不依赖单个标量指标，而是通过三个互补的透镜来分析过渡：减少的 Ruelle-Pollicott (RP) 共振、极值统计和全场数据自适应谐波模式。这将体积弛豫、尾部偏移和空间相组织区分为倾斜的相互作用方面。首先，使用全球平均温度和经向热对比度的简化传递算子结构，我们估计了简化的 RP 共振和柯尔莫哥洛夫模式。接近倾倒时，几个主要的衰减率会下降，并且它们的模式沿着共同的慢速方向协调一致。因此，与该方向一致的格林函数获得相干的延迟恢复尾部和增强的低频敏感性。因此，警告是由一组慢模而不是单个光谱间隙来承载的。其次，极值理论揭示，全球平均气温异常的冷尾在转变附近变得不那么尖锐，并且更加持久。\n\n形状和极值指数显示出不对称的组织：探测逃逸方向的冷旅行变得更容易接近和聚集。第三，全温度场的数据自适应谐波模式（DAHM）分析表明，在接近倾斜时，主导模式仍然捕捉到大尺度趋势，但固定秩重建退化并且DAHM相位分布变宽。我们将其解释为多元相位退相干：场保留相干过渡分量，同时失去尖锐的纬度相位组织。最终，亚稳态倾斜的标志是减少光谱响应、极端事件统计和全场相位相干性的联合重组。", "authors": [{"name": "Mickaël D. Chekroun"}, {"name": "Valerio Lucarini"}], "featured_authors": [{"name": "Mickaël D. Chekroun"}, {"name": "Valerio Lucarini"}], "author_count": 2}, {"id": "2607.11376", "category": "math-ph", "title": "Correlated and uncorrelated long--time asymptotics of type D ASEP", "abstract": "The type D ASEP is an asymmetric two--species interacting particle system on $\\Z$, in which two separately conserved species hop, bind into a composite ``bound pair'', and split. The model, along with its reversible measures and orthogonal polynomial duality, was constructed using the representation theory of $U_q(\\so_{2n})$. The reversible measures and orthogonal polynomial duality are each a product of two copies of the single-species ASEP reversible measures and orthogonal polynomial duality. In this paper, we study the long-time asymptotics of the type D ASEP. In the fixed--$q$ regime, using an exact current--decoupling identity, we prove that the asymptotic hydrodynamic limit and Tracy--Widom fluctuations decouple, as predicted from the duality. In the weak--asymmetry (Edwards--Wilkinson) regime, when $q=1-c/N^2$, we prove that the two density fluctuation fields \\underline{decouple}: each converges to a linear stochastic heat equation, with no cross--coupling in either the drift or the noise, the limiting noises having vanishing cross--correlation. More surprisingly, we then prove that the two limiting normal random variables are \\underline{correlated} with a seemingly new correlation function. The correlation is exactly equal to $(1-e^{-4c})/(4c)$, with the positive parts of the normal random variables having correlations expressed by the Bessel--Struve function. This paper, with the exception of the abstract and introduction, was written entirely by Claude Opus 4.8 and Fable 5. The proofs were then formalized in Lean, using Aristotle by Harmonic AI. The human author of this paper verified the proofs manually.", "url": "https://arxiv.org/abs/2607.11376", "type": "理论", "summary": "D型ASEP是$\\Z$上的不对称双物种相互作用粒子系统，其中两个单独保守的物种跳跃，结合成复合“结合对”，然后分裂。该模型及其可逆测度和正交多项式对偶性是使用 $U_q(\\so_{2n})$ 表示理论构建的。可逆测度和正交多项式对偶性均是单物种 ASEP 可逆测度和正交多项式对偶性的两个副本的乘积。在本文中，我们研究了 D 型 ASEP 的长时间渐近。在固定 $q$ 体系中，使用精确的电流解耦恒等式，我们证明了渐近流体动力学极限和 Tracy-Widom 涨落解耦，正如对偶性所预测的那样。在弱不对称（Edwards--Wilkinson）体系中，当$q=1-c/N^2$时，我们证明两个密度波动场\\underline{解耦}：每个都收敛到线性随机热方程，漂移或噪声中没有交叉耦合，极限噪声具有消失的互相关性。\n\n更令人惊讶的是，我们随后证明两个限制正态随机变量与看似新的相关函数是\\underline{相关}。相关性恰好等于 $(1-e^{-4c})/(4c)$，正态随机变量的正数部分具有由 Bessel-Struve 函数表示的相关性。这篇论文除了摘要和引言外，完全由 Claude Opus 4.8 和 Fable 5 撰写。然后，证明通过 Harmonic AI 使用亚里士多德在 Lean 中形式化。本文的人类作者手动验证了证明。", "authors": [{"name": "Jeffrey Kuan"}], "featured_authors": [{"name": "Jeffrey Kuan"}], "author_count": 1}, {"id": "2607.11547", "category": "math-ph", "title": "On The Eigenvalue Rigidity of the Laguerre Unitary Ensemble", "abstract": "In this paper, we establish an optimal global rigidity estimate for the eigenvalues of the Laguerre unitary ensemble. Using the central limit theorem, we first construct a random measure via the eigenvalue counting function and then prove its convergence to a Gaussian multiplicative chaos measure, which yields the desired rigidity result. To prove this convergence, we apply a sufficient condition due to Claeys et al. [7] and carry out an asymptotic analysis of the corresponding exponential moments.", "url": "https://arxiv.org/abs/2607.11547", "type": "理论", "summary": "在本文中，我们为拉盖尔酉系综的特征值建立了最优全局刚度估计。使用中心极限定理，我们首先通过特征值计数函数构造随机测度，然后证明其收敛于高斯乘法混沌测度，从而产生所需的刚性结果。为了证明这种收敛性，我们应用了 Claeys 等人提出的充分条件。 [7]并对相应的指数矩进行渐近分析。", "authors": [{"name": "Chenhao Lu"}, {"name": "Xiaolu Yue"}], "featured_authors": [{"name": "Chenhao Lu"}, {"name": "Xiaolu Yue"}], "author_count": 2}, {"id": "2607.09855", "category": "quant-ph", "title": "Ergotropic and passive contributions on the phase-space information geometry of Gaussian states", "abstract": "We establish a direct connection between quantum thermodynamics and information geometry by introducing an ergotropic decomposition of the Wigner-Fisher information for Gaussian quantum states. We derive an analytical expression for the Wigner-Fisher information in terms of the phase-space covariance matrix and mean vector, and show that it naturally separates into passive and ergotropic contributions. The passive term is shown to be entirely determined by the Wigner entropy rate of the associated passive state. The ergotropic contribution, in turn, quantifies how displacement and squeezing resources modify the statistical velocity and length of the system trajectory in phase space. As an application, we analyze the recently proposed ergotropic Mpemba effect and demonstrate that it can be traced to the anomalous geometric evolution of the passive state associated with squeezed thermal states. Our results reveal how the extractable work stored in a quantum state constrains its information-geometric structure, establishing a framework that links ergotropy, entropy production rate, and statistical geometry in continuous-variable quantum systems.", "url": "https://arxiv.org/abs/2607.09855", "type": "理论", "summary": "我们通过引入高斯量子态维格纳-费舍尔信息的各向分解，在量子热力学和信息几何之间建立了直接联系。我们根据相空间协方差矩阵和均值向量推导了维格纳-费舍尔信息的解析表达式，并表明它自然地分为被动贡献和各向贡献。被动项完全由相关被动状态的维格纳熵率决定。各向各向贡献反过来又量化了位移和挤压资源如何修改相空间中系统轨迹的统计速度和长度。作为一个应用，我们分析了最近提出的各向异性 Mpemba 效应，并证明它可以追溯到与压缩热态相关的被动态的反常几何演化。我们的结果揭示了存储在量子态中的可提取功如何限制其信息几何结构，建立了一个将连续变量量子系统中的各向异性、熵产生率和统计几何联系起来的框架。", "authors": [{"name": "Ivan Medina"}, {"name": "Camila Raupp"}, {"name": "Pedro B. Melo"}, {"name": "Diogo O. Soares-Pinto"}], "featured_authors": [{"name": "Ivan Medina"}, {"name": "Camila Raupp"}, {"name": "Pedro B. Melo"}, {"name": "Diogo O. Soares-Pinto"}], "author_count": 4}, {"id": "2607.09857", "category": "quant-ph", "title": "Gauge-invariant thermodynamics of a finite-time quantum Otto engine", "abstract": "We investigate a finite-time quantum Otto engine within the framework of gauge-invariant quantum thermodynamics, using the Lipkin-Meshkov-Glick model as the working medium. In this formulation, thermodynamic quantities are defined on equivalence classes of thermodynamically indistinguishable states, leading naturally to gauge-invariant notions of work, heat, entropy, and efficiency. We derive explicit expressions for these quantities and show that the usual work performed during the unitary strokes decomposes into an invariant contribution, associated with changes in the instantaneous energy spectrum and populations, and a coherent contribution arising from finite-time quantum coherences. This decomposition induces the corresponding splittings of engine efficiency and entropy production, providing a geometric interpretation of finite-time irreversibility and clarifying the role of coherence in work extraction. By analyzing the cycle's dependence on driving speed and system size, we identify the engine's operating region and investigate the influence of criticality. We show that crossing the critical region substantially reduces the parameter space in which the cycle operates as a heat engine. At the same time, whenever the engine condition remains satisfied, the discrepancy between the conventional and gauge-invariant descriptions becomes strongly suppressed, indicating that the gauge-invariant sector predominantly carries the extracted work. These results establish a direct connection between gauge-invariant thermodynamics, finite-time irreversibility, and work extraction in many-body quantum thermal machines.", "url": "https://arxiv.org/abs/2607.09857", "type": "理论", "summary": "我们使用 Lipkin-Meshkov-Glick 模型作为工作介质，在规范不变量子热力学框架内研究有限时间量子奥托发动机。在这个公式中，热力学量是在热力学上不可区分的状态的等价类上定义的，自然导致了功、热、熵和效率的规范不变概念。我们推导了这些量的显式表达式，并表明在单一笔画期间执行的通常工作分解为与瞬时能谱和布居的变化相关的不变贡献，以及由有限时间量子相干性产生的相干贡献。这种分解引起了发动机效率和熵产生的相应分裂，提供了有限时间不可逆性的几何解释，并阐明了相干性在功提取中的作用。通过分析循环对行驶速度和系统尺寸的依赖性，我们确定了发动机的工作区域并研究了临界性的影响。\n\n我们表明，跨越临界区域大大减少了循环作为热机运行的参数空间。同时，只要发动机状况保持满足，传统描述和轨距不变描述之间的差异就会被强烈抑制，表明轨距不变部分主要承载提取的功。这些结果在多体量子热机中的规范不变热力学、有限时间不可逆性和功提取之间建立了直接联系。", "authors": [{"name": "Midana Baial Sambú"}, {"name": "Thiago R. de Oliveira"}, {"name": "Lucas C. Céleri"}], "featured_authors": [{"name": "Midana Baial Sambú"}, {"name": "Thiago R. de Oliveira"}, {"name": "Lucas C. Céleri"}], "author_count": 3}, {"id": "2607.09875", "category": "quant-ph", "title": "Revealing Entanglement-Growth Mechanisms through the Magic Barrier", "abstract": "Quantum entanglement and magic are complementary resources underlying quantum computational advantage, yet their dynamical relation in many-body systems remains poorly understood. In this Letter, we show that the mechanism of bipartite entanglement growth is encoded in the relative timescale between the entropy-growth-rate peak and the magic barrier, defined as the transient peak of the anti-flatness of the entanglement spectrum. When entanglement is locally built, the same microscopic process increases the entropy and reshapes the Schmidt spectrum, so the magic-barrier peak occurs in the time window of maximal entropy growth. When entanglement is mainly transported or redistributed, entropy can grow before appreciable spectral non-flatness is generated, naturally separating the two peak times. We demonstrate this distinction in the random-field XXZ chain: the two peaks remain strongly correlated in the thermal regime, while their separation grows systematically across the thermal--MBL crossover. We further validate this theoretical framework by employing Bell-pair initial states alongside a tunable SWAP--Haar random circuit. Our results reveal an intrinsic dynamical connection between entanglement and magic, establishing the magic barrier as a powerful spectral diagnostic of how quantum information is generated, transported, and reshaped.", "url": "https://arxiv.org/abs/2607.09875", "type": "理论", "summary": "量子纠缠和魔法是量子计算优势的互补资源，但它们在多体系统中的动力学关系仍然知之甚少。在这封信中，我们证明了二分纠缠增长的机制被编码在熵增长速率峰值和魔障之间的相对时间尺度中，魔障被定义为纠缠谱反平坦度的瞬态峰值。当局部建立纠缠时，相同的微观过程会增加熵并重塑施密特谱，因此魔障峰值出现在最大熵增长的时间窗口中。当纠缠主要传输或重新分布时，熵会在产生明显的光谱不平坦性之前增长，自然地分离两个峰值时间。我们在随机场 XXZ 链中证明了这种区别：两个峰在热状态下保持强烈相关，而它们的分离在热-MBL 交叉过程中系统性地增长。我们通过采用贝尔对初始状态以及可调谐 SWAP-Haar 随机电路进一步验证了这一理论框架。\n\n我们的结果揭示了纠缠和魔法之间的内在动态联系，将魔法屏障建立为量子信息如何生成、传输和重塑的强大光谱诊断。", "authors": [{"name": "Lv Zhang"}, {"name": "Shi-Xin Zhang"}, {"name": "Heng Fan"}, {"name": "Shuo Liu"}], "featured_authors": [{"name": "Lv Zhang"}, {"name": "Shi-Xin Zhang"}, {"name": "Heng Fan"}, {"name": "Shuo Liu"}], "author_count": 4}, {"id": "2607.09882", "category": "quant-ph", "title": "Benchmarking Zero-Setup Quantum Circuit Simulators", "abstract": "Practitioners increasingly rely on hosted simulation environments, but their performance characteristics remain poorly documented. We present a systematic benchmarking study of GPU-accelerated approximate quantum simulation across two widely used methods: matrix product states (MPS) and Pauli path simulation (PPS), comparing BlueQubit (a hosted tool that handles hardware provisioning, simulator configuration, and job orchestration) against AWS Braket, Quantum Rings, PPS-Qiskit, and this http URL . For MPS, we find that GPU runtime yields sub-quadratic scaling with bond dimension, with a growing advantage over CPU at increasing scale. For Pauli path simulation on IBM's 127-qubit kicked Ising benchmark, GPUs deliver up to $1{,}400\\times$ speedup at fine truncation thresholds ($\\delta = 2.5 \\times 10^{-5}$, 27.6M Pauli terms), and are the only backends that reach accuracy regimes below $\\delta = 10^{-5}$, which remained inaccessible to the commodity CPU-based implementations and self-contained SDKs evaluated here. We also provide a reproducible characterization of these simulators across regimes, including tradeoffs that isolated evaluations do not show. To support transparency and reuse, we provide a public GitHub repository containing all benchmarking code and configurations.", "url": "https://arxiv.org/abs/2607.09882", "type": "数值", "summary": "从业者越来越依赖托管模拟环境，但其性能特征的记录仍然很少。我们针对两种广泛使用的方法（矩阵乘积状态 (MPS) 和泡利路径模拟 (PPS)）对 GPU 加速的近似量子模拟进行了系统的基准测试研究，将 BlueQubit（一种处理硬件配置、模拟器配置和作业编排的托管工具）与 AWS Braket、Quantum Rings、PPS-Qiskit 和此 http URL 进行比较。对于 MPS，我们发现 GPU 运行时会产生键维数的次二次缩放，随着规模的增加，其相对于 CPU 的优势越来越大。对于 IBM 127 量子位启动 Ising 基准的 Pauli 路径模拟，GPU 在精细截断阈值（$\\delta = 2.5 \\times 10^{-5}$，2760 万个 Pauli 项）下提供高达 $1{,}400\\times$ 的加速，并且是唯一达到低于 $\\delta = 10^{-5}$ 精度范围的后端，而商品仍然无法访问该精度范围此处评估基于 CPU 的实现和独立 SDK。我们还提供了这些模拟器在不同制度下的可重复特征，包括孤立评估未显示的权衡。\n\n为了支持透明度和重用，我们提供了一个公共 GitHub 存储库，其中包含所有基准测试代码和配置。", "authors": [{"name": "Arul Rhik Mazumder"}, {"name": "Mohammed Zuhair Mullath"}, {"name": "Hayk Tepanyan"}], "featured_authors": [{"name": "Arul Rhik Mazumder"}, {"name": "Mohammed Zuhair Mullath"}, {"name": "Hayk Tepanyan"}], "author_count": 3}, {"id": "2607.09893", "category": "quant-ph", "title": "An End-to-End Hybrid Quantum--Classical Sampling Workflow for Discrete Markov Random Fields: A Reproducible Case Study", "abstract": "Sampling from discrete Markov random fields (MRFs) is a hard problem. We study amplitude-encoded i.i.d. sampling for small MRFs where $2^n$ target probabilities are precomputed classically. This removes quantum exponential speedup but allows a clean comparison against classical MCMC based on independent circuit samples ($\\tau \\approx 1$). Across 60 instances spanning five graph families (1k-step burn-in, 3k retained samples), the mean ESS ratios of Quantum to Single-Site Gibbs, Block Gibbs, Tuned-Block, and Parallel Tempering are $16.35$, $7.29$, $1.82$, and $1.79$, showing modern classical samplers substantially close this gap. Amortizing $O(2^n)$ preprocessing into wall-clock time, exact inverse-CDF sampling yields $17.7\\text{M}$ ESS/s versus $488\\text{K}$ ESS/s for the quantum sampler ($36\\times$ mean rate, $153\\times$ per-instance), confirming no wall-clock advantage. We characterize MCMC autocorrelation costs and benchmark amplitude-encoded state preparation at $n \\in \\{8,10,12\\}$. An MPS scaling study ($n \\le 40$) shows bond dimension $\\chi=32$ achieves $F=0.721\\pm0.059$ at $n=40$. Finally, a matched-budget VQC vs. MPS comparison at $n \\in \\{8,10,12\\}$ shows VQC fidelities fall far below MPS: $(F_{\\mathrm{VQC}}, F_{\\mathrm{MPS}}) = (0.31, 0.99), (0.21, 0.96), (0.17, 0.88)$ at compressions $10.7\\times$, $34.1\\times$, and $113.8\\times$.", "url": "https://arxiv.org/abs/2607.09893", "type": "理论+数值", "summary": "从离散马尔可夫随机场 (MRF) 中采样是一个难题。我们研究幅度编码 i.i.d。对小型 MRF 进行采样，其中 $2^n$ 目标概率是按经典方法预先计算的。这消除了量子指数加速，但允许与基于独立电路样本的经典 MCMC 进行清晰的比较（$\\tau \\approx 1$）。在跨越 5 个图形系列（1k 步老化、3k 保留样本）的 60 个实例中，量子与单点 Gibbs、Block Gibbs、Tuned-Block 和 Parallel Tempering 的平均 ESS 比率分别为 $16.35$、$7.29$、$1.82$ 和 $1.79$，表明现代经典采样器大大缩小了这一差距。将 $O(2^n)$ 预处理分摊到挂钟时间中，精确逆 CDF 采样产生 $17.7\\text{M}$ ESS/s，而量子采样器则产生 $488\\text{K}$ ESS/s（平均速率 $36\\times$，每个实例 $153\\times$），确认没有挂钟优势。我们在 $n \\in \\{8,10,12\\}$ 处描述了 MCMC 自相关成本和基准幅度编码状态准备。 MPS 标度研究 ($n \\le 40$) 显示键维 $\\chi=32$ 在 $n=40$ 时达到 $F=0.721\\pm0.059$。最后，匹配预算的 VQC 与\n\n$n \\in \\{8,10,12\\}$ 处的 MPS 比较显示 VQC 保真度远低于 MPS：$(F_{\\mathrm{VQC}}, F_{\\mathrm{MPS}}) = (0.31, 0.99), (0.21, 0.96), (0.17, 0.88)$ 在压缩 $10.7\\times$ 时， $34.1\\times$ 和 $113.8\\times$。", "authors": [{"name": "Arul Rhik Mazumder"}], "featured_authors": [{"name": "Arul Rhik Mazumder"}], "author_count": 1}, {"id": "2607.09906", "category": "quant-ph", "title": "Depth-Efficient Quantum Topological Data Analysis for Regime-Specific Detection of Financial Stress", "abstract": "We present, to our knowledge, the first adaptation of Pauli Correlation Encoding (PCE) to quantum topological data analysis, reformulating Betti number estimation as a depth-efficient variational optimization over a compressed qubit register. From a Takens embedding and Vietoris--Rips filtration of S&P~500 returns, we extract combinatorial Laplacians and recast null-space counting as a continuous-PCE Rayleigh-quotient minimization with variational deflation, encoding $n_k$ simplex indices into $O(n_k^{1/\\kappa})$ qubits with shallow, ancilla-free circuits. Because the resulting loss is rational rather than bilinear in the correlators, the barren-plateau bound of~\\cite{Sciorilli25} does not transfer; empirically the gradient variance decays only polynomially, with no exponential barren plateau, over $n=4$--$12$ qubits. The classical stage matches ripser~\\cite{bauer2021ripser} on all 190 sliding windows (2007-2009). On the real market Laplacians ($\\beta_1=1$--$22$), warm-starting from a classical null-space surrogate allows PCE-VQE to recover $\\beta_1$ exactly at every scale, placing the obstacle in the optimisation landscape rather than the encoding. Chronologically split classification gives in-regime ROC AUC $0.818$, but out-of-distribution evaluation on the 2020 COVID shock and 2022 rate cycle (AUC $0.009$, $0.515$) shows the calibration does not generalize across crisis regimes.", "url": "https://arxiv.org/abs/2607.09906", "type": "理论+数值", "summary": "据我们所知，我们首次将泡利相关编码（PCE）应用于量子拓扑数据分析，将贝蒂数估计重新表述为压缩量子位寄存器上的深度高效变分优化。从 S&P~500 收益的 Takens 嵌入和 Vietoris-Rips 过滤中，我们提取组合拉普拉斯算子，并将零空间计数重铸为具有变分通货紧缩的连续 PCE 瑞利商最小化，将 $n_k$ 单纯形索引编码为具有浅层、无辅助电路的 $O(n_k^{1/\\kappa})$ 量子位。因为相关器中产生的损失是有理的而不是双线性的，所以 ~\\cite{Sciorilli25} 的贫瘠高原界限不会转移；根据经验，在 $n=4$-$12$ 量子位上，梯度方差仅按多项式衰减，没有指数贫瘠平台。经典阶段在所有 190 个滑动窗口（2007-2009）上与 ripser~\\cite{bauer2021ripser} 匹配。在真实市场拉普拉斯算子（$\\beta_1=1$--$22$）上，从经典零空间代理开始热启动允许 PCE-VQE 在每个尺度上精确地恢复 $\\beta_1$，将障碍置于优化环境而不是编码中。\n\n按时间顺序划分的分类给出了体制内 ROC AUC 0.818 美元，但对 2020 年 COVID 冲击和 2022 年利率周期的分布外评估（AUC 0.009 美元，0.515 美元）显示，校准并不能推广到整个危机体制。", "authors": [{"name": "Arul Rhik Mazumder"}, {"name": "Shreyan Ronit Mazumder"}], "featured_authors": [{"name": "Arul Rhik Mazumder"}, {"name": "Shreyan Ronit Mazumder"}], "author_count": 2}, {"id": "2607.10057", "category": "quant-ph", "title": "Quantum Circuit Vision: Cost-Aware Evaluation of Visual AI Agents for Quantum Code Generation", "abstract": "Can AI agents visually comprehend quantum circuit diagrams and generate verified executable code--and at what cost? We present Quantum Circuit Vision, a cost-aware evaluation framework for multimodal AI agents on quantum circuit visual understanding. We construct a 132-circuit benchmark spanning 13 categories ($1$--$10$ qubits) with executable Amazon Braket code and unitary-fidelity verification. Evaluating three frontier Claude-family models at different capability-cost tiers with $n=5$ repeated trials, we find that the mid-tier model (Sonnet 4.6, $1.30\\times$ credits) offers the most favorable balance on the cost-accuracy frontier: 91% pass rate on the core subset at 18% of the per-call cost of the strongest model (Opus 4.6), whose accuracy advantage is not statistically significant (paired $t$: $p=0.083$). Logistic regression confirms that circuit depth--not qubit count--is the primary predictor of failure ($p<0.001$). Chain-of-thought prompting shows no statistically significant effect (all $p>0.18$, $n=5$), suggesting that visual pattern recognition outweighs explicit reasoning strategy for structurally coupled diagrams. We propose a cascade routing strategy (cheap $\\rightarrow$ expensive models) that achieves 84% accuracy at 38% of single-model cost, demonstrating that model routing dominates prompt engineering as a cost lever. We release QCV-Dataset (132 circuits, 5 modalities, 1,931 files) on Hugging Face Hub as an open evaluation infrastructure with structured metadata for discoverability, interoperability, and responsible AI documentation, and all evaluation code, cost logs, and verification scripts on GitHub for full reproducibility.", "url": "https://arxiv.org/abs/2607.10057", "type": "理论", "summary": "人工智能代理能否直观地理解量子电路图并生成经过验证的可执行代码——成本是多少？我们提出了量子电路视觉，这是一种针对多模式人工智能代理在量子电路视觉理解方面的成本感知评估框架。我们构建了一个涵盖 13 个类别（$1$-$10$ 量子位）的 132 电路基准测试，具有可执行的 Amazon Braket 代码和统一保真度验证。通过 $n=5$ 重复试验评估不同能力成本层级的三个前沿 Claude-family 模型，我们发现中间层模型（Sonnet 4.6，$1.30\\times$ 学分）在成本准确性前沿提供了最有利的平衡：核心子集的通过率为 91%，最强模型 (Opus 4.6) 每次调用成本的 18%，其准确性优势在统计上并不显着（配对） $t$：$p=0.083$)。逻辑回归证实电路深度（而不是量子位计数）是故障的主要预测因素（$p<0.001$）。思想链提示没有显示出统计上显着的效果（所有$p>0.18$，$n=5$），这表明视觉模式识别胜过结构耦合图的显式推理策略。\n\n我们提出了一种级联路由策略（便宜的 $\\rightarrow$ 昂贵的模型），该策略以单模型成本的 38% 实现了 84% 的准确率，证明模型路由作为成本杠杆在即时工程中占主导地位。我们在 Hugging Face Hub 上发布了 QCV 数据集（132 个电路、5 种模式、1,931 个文件），作为开放评估基础设施，具有用于可发现性、互操作性和负责任的 AI 文档的结构化元数据，以及 GitHub 上的所有评估代码、成本日志和验证脚本，以实现完全可重复性。", "authors": [{"name": "Dongping Liu"}, {"name": "Aoyu Zhang"}, {"name": "Luyao Zhang"}], "featured_authors": [{"name": "Dongping Liu"}, {"name": "Aoyu Zhang"}, {"name": "Luyao Zhang"}], "author_count": 3}, {"id": "2607.10227", "category": "quant-ph", "title": "Code-space recovery for sample-based quantum diagonalization beyond native symmetry constraints", "abstract": "Sample-based quantum diagonalization (SQD) diagonalizes a Hamiltonian in a compact subspace built from quantum samples, and its performance often relies on recovery procedures that exploit native constraints such as particle-number symmetry. For a broad class of eigenvalue problems, however, no analogous constraint is guaranteed, limiting the applicability of SQD-type recovery. Here, we introduce code-space recovery, which engineers recoverable structure through encoding rather than assuming it in the target problem. Using a dual-rail representation, each logical qubit is mapped to a physical pair, $|0\\rangle \\to |01\\rangle$ and $|1\\rangle \\to |10\\rangle$, making code-space violations in noisy samples detectable and repairable. We combine this encoding with self-consistent recovery and benchmark it on transverse- and mixed-field Ising models with up to 36 spin sites. Despite increased circuit overhead, code-space recovery yields lower projected Ritz energies than unencoded sample-support diagonalization even at smaller projected-basis dimensions, suggesting that engineered recoverable structure can extend SQD beyond native constraints.", "url": "https://arxiv.org/abs/2607.10227", "type": "理论+数值", "summary": "基于样本的量子对角化 (SQD) 在由量子样本构建的紧凑子空间中对哈密顿量进行对角化，其性能通常依赖于利用粒子数对称性等原生约束的恢复过程。然而，对于一大类特征值问题，无法保证类似的约束，从而限制了 SQD 类型恢复的适用性。在这里，我们引入代码空间恢复，它通过编码来设计可恢复的结构，而不是在目标问题中假设它。使用双轨表示，每个逻辑量子位都映射到物理对，$|0\\rangle \\to |01\\rangle$ 和 $|1\\rangle \\to |10\\rangle$，使得噪声样本中的代码空间违规可检测和修复。我们将这种编码与自洽恢复相结合，并在具有多达 36 个自旋位点的横向和混合场 Ising 模型上进行基准测试。尽管增加了电路开销，但即使在较小的投影基础尺寸下，代码空间恢复产生的投影 Ritz 能量也比未编码的样本支持对角化低，这表明工程可恢复结构可以将 SQD 扩展到本地限制之外。", "authors": [{"name": "Byeongyong Park"}, {"name": "Sanha Kang"}, {"name": "Doyeol Ahn"}, {"name": "Keunhong Jeong"}], "featured_authors": [{"name": "Byeongyong Park"}, {"name": "Sanha Kang"}, {"name": "Doyeol Ahn"}, {"name": "Keunhong Jeong"}], "author_count": 4}, {"id": "2607.10262", "category": "quant-ph", "title": "HSF-S: Speed-Optimized Compilation and Acceleration for Hybrid Schrodinger-Feynman Quantum Circuit Emulation", "abstract": "Hybrid Schrodinger-Feynman (HSF) simulation offers an attractive memory-path tradeoff for exact quantum-circuit emulation, but its practical runtime is often dominated by exponential path growth from cross-boundary two-qubit gates. Existing GPU and FPGA quantum simulators are largely optimized for full-state Schrodinger execution and therefore do not align well with HSF's path-centric workflow. This paper presents HSF-S, a compiler-accelerator co-designed framework for exact HSF-based quantum circuit emulation. HSF-S lowers input circuits to an HSF-compatible basis, formulates a rank-aware effective path-cost model, and applies dependency-preserving reordering together with discounted-gain SWAP insertion to suppress recurring cross-boundary interactions while preserving exact circuit semantics. A regression-free selector guarantees that the compiled circuit never increases effective path cost relative to the naive lowered baseline. We further design a dedicated HSF-S accelerator and execution flow, and integrate them into a stand-alone processor for efficient per-path dual-slice evaluation and final accumulation without materializing the full state vector. Across 56 benchmark circuits, HSF-S matches reference amplitudes to within floating-point precision, reduces effective path cost by up to 90.0%, and substantially improves practical tractability, including representative timeout-to-sub-second reductions under a 1-hour budget. On the resulting compiled workloads, the HSF-S processor prototype delivers up to 4.34x additional speedup.", "url": "https://arxiv.org/abs/2607.10262", "type": "理论+数值", "summary": "混合薛定谔-费曼 (HSF) 模拟为精确的量子电路模拟提供了有吸引力的内存路径权衡，但其实际运行时间通常由跨界两量子位门的指数路径增长主导。现有的 GPU 和 FPGA 量子模拟器在很大程度上针对全状态薛定谔执行进行了优化，因此与 HSF 以路径为中心的工作流程不太相符。本文介绍了 HSF-S，这是一种编译器-加速器共同设计的框架，用于基于 HSF 的精确量子电路仿真。 HSF-S 将输入电路降低到 HSF 兼容的基础，制定排序感知的有效路径成本模型，并应用保留依赖的重新排序和折扣增益交换插入来抑制重复的跨边界交互，同时保留精确的电路语义。无回归选择器保证编译的电路相对于原始降低的基线永远不会增加有效路径成本。我们进一步设计了专用的HSF-S加速器和执行流程，并将它们集成到独立处理器中，以实现高效的每路径双片评估和最终累加，而无需实现完整的状态向量。\n\n在 56 个基准电路中，HSF-S 将参考幅度与浮点精度相匹配，将有效路径成本降低高达 90.0%，并显着提高实际可处理性，包括在 1 小时预算下将代表性超时减少到亚秒。在生成的编译工作负载上，HSF-S 处理器原型可提供高达 4.34 倍的额外加速。", "authors": [{"name": "Sechan Park"}, {"name": "Kyeongwon Lee"}, {"name": "Mundo Jeong"}, {"name": "Chaebin Jung"}, {"name": "Woojoo Lee"}], "featured_authors": [{"name": "Sechan Park"}, {"name": "Kyeongwon Lee"}, {"name": "Mundo Jeong"}, {"name": "Chaebin Jung"}, {"name": "Woojoo Lee"}], "author_count": 5}, {"id": "2607.10280", "category": "quant-ph", "title": "Scaling Adaptive Non-Local Observable Quantum Super-Resolution via Matrix Product States", "abstract": "This work presents a matrix product state (MPS) simulation framework for adaptive non-local observable variational quantum circuits (ANO-VQCs) in image super-resolution (SR) beyond the practical limits of statevector simulation. Runtime benchmarks on a single NVIDIA RTX 4070 GPU show that, under the tested shallow-circuit setting, MPS completes ANO-VQC forward feature extraction for individual inputs up to 16 x 16 pixels (256 qubits), whereas statevector simulation encounters a memory bottleneck at 6 x 6 inputs (36 qubits) and exact tensor-network (Exact TN) contraction becomes computationally impractical beyond 12 x 12 inputs (144 qubits). For a fixed 7 x 7 input (49 qubits), a bond-dimension sweep over depths L = 1 to L = 4 shows that the required MPS bond dimension increases with circuit depth. Using Exact TN contraction as the reference, the bond dimension required for near-exact agreement increases from chi = 2 at L = 1 to chi = 16 at L = 4. Finally, 7 x 7 to 28 x 28 Fashion-MNIST SR training with chi = 16 shows that the shallow L = 1 model achieves the lowest loss and best LPIPS, PSNR, and SSIM among the tested depths. These results highlight MPS as a scalable and controllable simulation backend for ANO-VQC image SR and as a practical tool for studying large-scale quantum algorithms.", "url": "https://arxiv.org/abs/2607.10280", "type": "理论+数值", "summary": "这项工作提出了一种矩阵乘积状态（MPS）模拟框架，用于图像超分辨率（SR）中的自适应非局部可观测变分量子电路（ANO-VQC），超出了状态向量模拟的实际限制。单个 NVIDIA RTX 4070 GPU 上的运行时基准测试表明，在测试的浅电路设置下，MPS 对高达 16 x 16 像素（256 量子位）的单个输入完成了 ANO-VQC 前向特征提取，而状态向量模拟在 6 x 6 输入（36 量子位）时遇到内存瓶颈，并且超过 12 x 12 输入时，精确张量网络 (Exact TN) 收缩在计算上变得不切实际（144 个量子位）。对于固定的 7 x 7 输入（49 个量子位），深度 L = 1 到 L = 4 的键维扫描表明，所需的 MPS 键维随电路深度而增加。使用 Exact TN 收缩作为参考，接近精确一致性所需的键维数从 L = 1 时的 chi = 2 增加到 L = 4 时的 chi = 16。最后，chi = 16 的 7 x 7 到 28 x 28 Fashion-MNIST SR 训练表明，浅层 L = 1 模型在测试深度中实现了最低的损失和最佳的 LPIPS、PSNR 和 SSIM。\n\n这些结果凸显了 MPS 作为 ANO-VQC 图像 SR 的可扩展且可控的模拟后端，以及作为研究大规模量子算法的实用工具。", "authors": [{"name": "Shih-Lung Yu"}, {"name": "Ming-Kang Ho"}, {"name": "Tai-Yue Li"}, {"name": "Sheng Yun Wu"}], "featured_authors": [{"name": "Shih-Lung Yu"}, {"name": "Ming-Kang Ho"}, {"name": "Tai-Yue Li"}, {"name": "Sheng Yun Wu"}], "author_count": 4}, {"id": "2607.10283", "category": "quant-ph", "title": "Resolvent algebras and limit states of interacting canonical ensembles", "abstract": "The limit states of canonical ensembles of a large number of interacting bosons at a given temperature, which are confined by harmonic forces, are studied in the framework of the resolvent algebra. It is shown that the limits satisfy the KMS condition or are ground states, regardless of the type of interaction. In case of attractive forces, where the ensembles collapse, observables that become meaningless in the limit disappear from the limit representations. For repulsive forces, this can also happen if condensates with an infinite number of particles in the same state (proper condensates) appear in the limit. The resulting structures and their interpretation are illustrated by a simple model. The study of vanishing harmonic forces (thermodynamic limit) involves changes of the dynamics. It is conveniently based on derivations acting on the algebra. They are given by the commutator of the Hamiltonians with the elements of the algebra. To ensure that the images remain in the algebra, the interaction must be regularized. This is accomplished in a manner that has only a minor impact on the dynamics and may be of broader interest. With this input a relation between the strength of the confining harmonic forces and the number of particles in the ensembles is derived from the condition that the limit states are to be stationary (invariant) under the adjoint action of the unconfined, spatially homogeneous limit dynamics. This relation encompasses the conditions that are frequently used in studies of Bose-Einstein condensates.", "url": "https://arxiv.org/abs/2607.10283", "type": "理论", "summary": "在解析代数的框架中研究了给定温度下大量相互作用的玻色子的正则系综的极限态，这些玻色子受到简谐力的限制。结果表明，无论相互作用的类型如何，极限都满足 KMS 条件或者是基态。在吸引力的情况下，系综崩溃，在极限中变得无意义的可观测量将从极限表示中消失。对于排斥力，如果极限中出现具有无限数量的相同状态的粒子的凝聚体（本征凝聚体），也会发生这种情况。由此产生的结构及其解释通过一个简单的模型来说明。对消失简谐力（热力学极限）的研究涉及动力学的变化。它方便地基于代数的推导。它们由哈密顿量的交换子和代数元素给出。为了确保图像保留在代数中，必须对相互作用进行正则化。这是以一种对动态影响很小并且可能引起更广泛兴趣的方式实现的。\n\n通过此输入，从以下条件导出限制谐波力的强度与系综中粒子数量之间的关系：在无约束的空间均匀极限动力学的伴随作用下，极限状态是静止（不变）的。这种关系涵盖了玻色-爱因斯坦凝聚体研究中经常使用的条件。", "authors": [{"name": "Detlev Buchholz"}], "featured_authors": [{"name": "Detlev Buchholz"}], "author_count": 1}, {"id": "2607.10334", "category": "quant-ph", "title": "Static entanglement structure and adiabatic Bell-state preparation in the tripartite quantum Rabi model", "abstract": "The tripartite quantum Rabi model couples two qubits to a bosonic mode through a collective spin-oscillator interaction, providing a simple setting for studying two-qubit entanglement. In the zero-detuning limit, the triplet part of the spectrum splits into branches with zero and maximal entanglement, while the antisymmetric singlet ladder remains exactly decoupled. Within the triplet sector, finite detuning turns the crossings between these branches into avoided crossings and redistributes this entanglement. We identify an eigenbranch whose entanglement grows from nearly zero to a nearly maximal value through such avoided-crossing mixing. The weak-coupling level ordering yields a simple analytic criterion for whether this eigenbranch has a separable weak-coupling endpoint. A three-state effective model explains how the Bell-state component becomes dominant as the coupling increases. We further use a finite-time linear ramp of the collective coupling to benchmark the final coupling and ramp time required for high Bell-state fidelity. These results show how collective spin-oscillator coupling reorganizes spectral entanglement and connects static branch structure to finite-time Bell-state preparation.", "url": "https://arxiv.org/abs/2607.10334", "type": "理论", "summary": "三方量子拉比模型通过集体自旋振荡器相互作用将两个量子位耦合到玻色子模式，为研究两个量子位纠缠提供了简单的设置。在零失谐极限下，光谱的三重态部分分裂成具有零纠缠和最大纠缠的分支，而反对称单重态阶梯保持完全解耦。在三重态扇区内，有限失谐将这些分支之间的交叉转变为避免交叉，并重新分布这种纠缠。通过这种避免交叉的混合，我们确定了一个本征分支，其纠缠从接近零增长到接近最大值。弱耦合水平排序产生了一个简单的分析标准，用于判断该特征分支是否具有可分离的弱耦合端点。三态有效模型解释了贝尔态分量如何随着耦合的增加而变得占主导地位。我们进一步使用集体耦合的有限时间线性斜坡来对高贝尔状态保真度所需的最终耦合和斜坡时间进行基准测试。\n\n这些结果显示了集体自旋振荡器耦合如何重组光谱纠缠并将静态分支结构与有限时间贝尔态准备连接起来。", "authors": [{"name": "Li-Li Gao"}, {"name": "Zi-Xuan Chen"}, {"name": "Long-Jie Li"}, {"name": "Zi-Cheng Liu"}, {"name": "A-Long Zhou"}, {"name": "Chuan-Cun Shu"}, {"name": "Zi-Min Li"}], "featured_authors": [{"name": "Li-Li Gao"}, {"name": "Zi-Xuan Chen"}, {"name": "Long-Jie Li"}, {"name": "A-Long Zhou"}, {"name": "Chuan-Cun Shu"}, {"name": "Zi-Min Li"}], "author_count": 7}, {"id": "2607.10360", "category": "quant-ph", "title": "Gram-Certified Resource Continuation for Structured Quantum Representation Audits", "abstract": "Dense representation of an $n$-qubit pure state requires $2^n$ complex amplitudes, precluding dense classical materialization at large $n$. We develop Gram-certified resource continuation for structured quantum-representation workloads and ask when a solution obtained under a lower-cost resource model remains a justified initialization for a richer one. For coarse and fine state ensembles connected by a declared isometry, fine, coarse, and cross complex amplitude overlaps form a positive-semidefinite block Gram matrix. A signed operator of dimension at most twice the sample count has the nonzero signed spectrum of the fine density minus the lifted coarse density, yielding trace- and operator-norm diagnostics without constructing either density operator. We prove that a coarse weighted spectral flag with objective suboptimality $\\delta_c$ has fine-level suboptimality at most $\\delta_c+2\\varepsilon$, where $\\varepsilon$ is the empirical trace distance; the factor two is attainable. We distinguish encoder change from exact feasible-family prolongation, give a gap-dependent subspace-stability test, and show that continuation cannot overcome a final Schmidt-rank ceiling. In deterministic synthetic controls over an 8-to-40-qubit ladder, exact ancilla lifts agree to numerical precision. Transferred initialization reduces final-rung block updates from 30 to 20, but the complete cascade costs $4.80$--$5.43$ times a direct final-rung solve, without material objective improvement. Reordering eight Bell pairs reduces the maximum matrix-product-state bond from 256 to 2. Thus continuation is justified only when cross-rung mismatch, feasible-family inclusion, topology, and total work jointly satisfy prespecified audits. These noise-free classical results neither establish generic 40-qubit simulability nor claim hardware performance or quantum advantage.", "url": "https://arxiv.org/abs/2607.10360", "type": "理论+数值", "summary": "$n$ 量子位纯态的密集表示需要 $2^n$ 复振幅，排除了大 $n$ 处的密集经典物化。我们为结构化量子表示工作负载开发了 Gram 认证的资源延续，并询问在较低成本资源模型下获得的解决方案何时仍然是更丰富的资源模型的合理初始化。对于通过声明的等距连接的粗略和精细状态系综，精细、粗略和交叉复振幅重叠形成正半定块 Gram 矩阵。维数最多为样本计数两倍的有符号算子具有精细密度减去提升的粗密度的非零有符号谱，无需构造任一密度算子即可产生迹线和算子范数诊断。我们证明，具有客观次优性 $\\delta_c$ 的粗加权谱标志最多具有精细次优性 $\\delta_c+2\\varepsilon$，其中 $\\varepsilon$ 是经验迹距离；因子二是可以实现的。我们将编码器变化与精确的可行族延长区分开来，给出了间隙相关的子空间稳定性测试，并表明连续性无法克服最终的施密特秩上限。\n\n在对 8 至 40 个量子位梯进行确定性综合控制时，精确的辅助提升与数值精度一致。转移初始化将最终梯级块更新从 30 次减少到 20 次，但完整的级联成本为直接最终梯级求解的 4.80 美元 - 5.43 美元倍，没有实质性目标改进。重新排序八个贝尔对将最大矩阵-产品-状态键从 256 减少到 2。因此，只有当跨梯级不匹配、可行族包含、拓扑和总工作共同满足预先指定的审核时，延续才是合理的。这些无噪声经典结果既没有建立通用的 40 量子位可模拟性，也没有声称硬件性能或量子优势。", "authors": [{"name": "Azadeh Alavi"}, {"name": "Fatemeh Kouchmeshki"}, {"name": "Hossein Akhoundi"}, {"name": "Abdolrahman Alavi"}], "featured_authors": [{"name": "Azadeh Alavi"}, {"name": "Fatemeh Kouchmeshki"}, {"name": "Hossein Akhoundi"}, {"name": "Abdolrahman Alavi"}], "author_count": 4}, {"id": "2607.10473", "category": "quant-ph", "title": "Quantum algorithm for Clifford multiplication", "abstract": "Given two dense multivectors of the Clifford algebra $C\\ell(V, Q)$ with $N=2^{p+q}$ coefficients, the fastest known classical algorithms compute their geometric product in $O(N^{\\omega/2})$ arithmetic operations, where $\\omega$ denotes the matrix multiplication exponent. I show that, under amplitude encoding, a quantum computer executes the geometric product in $O(\\operatorname{polylog} N)$ time, using logarithmic space with sublogarithmic circuit depth. This exponential speedup establishes Clifford multiplication as a quantum primitive, providing an efficient computational foundation for quantum geometric algorithms and relativistic simulations.", "url": "https://arxiv.org/abs/2607.10473", "type": "数值", "summary": "给定 Clifford 代数 $C\\ell(V, Q)$ 的两个稠密多向量，系数为 $N=2^{p+q}$，最快的已知经典算法在 $O(N^{\\omega/2})$ 算术运算中计算其几何乘积，其中 $\\omega$ 表示矩阵乘法指数。我证明，在幅度编码下，量子计算机使用具有亚对数电路深度的对数空间，在 $O(\\operatorname{polylog} N)$ 时间内执行几何乘积。这种指数加速将克利福德乘法确立为量子原语，为量子几何算法和相对论模拟提供了有效的计算基础。", "authors": [{"name": "Kagwe A. Muchane"}], "featured_authors": [{"name": "Kagwe A. Muchane"}], "author_count": 1}, {"id": "2607.10550", "category": "quant-ph", "title": "Coherent Quantum Schrodinger Bridge: Two-Boundary Optimal Control for Quantum Algorithm Design", "abstract": "Quantum algorithms are intrinsically two-boundary processes: an input state is prepared, and an output state or subspace is selected as the computational answer. We formulate this observation as a coherent Quantum Schrödinger Bridge (QSB), a pure-state Hamiltonian counterpart of Schrödinger bridge theory in which the endpoint constraint is imposed on state vectors and the transport cost is the quadratic control action. In this setting Aharonov's two-state vector becomes the natural optimal-control pair: a forward state from the input and a backward state from the target. Pontryagin's principle then yields a universal optimal Hamiltonian whose weak value is purely imaginary in the geodesic gauge. Thus weak values are not an auxiliary interpretation; they are the local response functions that quantify the drift of the pre-selected state toward the post-selected boundary. Applying this framework to unstructured search, periodicity finding, and matrix arithmetic, we reconstruct Grover's algorithm, the quantum Fourier transform underlying Shor's algorithm, and quantum singular value transformation (QSVT). The usual circuit components -- oracles, diffusion reflections, controlled phases, and signal-processing rotations -- emerge as Lie-algebraic syntheses of the optimal weak-value drift. This perspective unifies distinct algorithmic paradigms into a single geometric principle: algorithm design is the problem of choosing computational boundary conditions and realizing the corresponding optimal flow.", "url": "https://arxiv.org/abs/2607.10550", "type": "理论+数值", "summary": "量子算法本质上是双边界过程：准备输入状态，选择输出状态或子空间作为计算答案。我们将这一观察表述为相干量子薛定谔桥（QSB），这是薛定谔桥理论的纯态哈密顿对应物，其中端点约束施加于状态向量，传输成本是二次控制动作。在这种设置中，阿哈罗诺夫的两状态向量成为自然的最优控制对：来自输入的前向状态和来自目标的后向状态。然后，庞特里亚金原理产生一个通用的最优哈密顿量，其弱值在测地线规范中纯粹是虚数。因此，弱值并不是一种辅助解释；而是一种辅助解释。它们是局部响应函数，用于量化预选状态向后选边界的漂移。将该框架应用于非结构化搜索、周期性查找和矩阵运算，我们重建了 Grover 算法、Shor 算法底层的量子傅立叶变换和量子奇异值变换 (QSVT)。\n\n常用的电路组件——预言机、扩散反射、受控相位和信号处理旋转——作为最佳弱值漂移的李代数综合出现。这种观点将不同的算法范式统一为单一的几何原理：算法设计是选择计算边界条件并实现相应的最优流程的问题。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2607.10707", "category": "quant-ph", "title": "MDQEC-QAS: Meta-Decoding for Quantum Error Correction with Hardware-Aware VQC Search and Confidence-Gated Recovery", "abstract": "We propose a unified meta-decoding framework for quantum error correction that learns syndrome-to-recovery mappings across multiple stabilizer codes and noise settings, without requiring separate decoders for each configuration. The benchmark includes FiveQubit, Steane, Planar3x3, and Planar5x5 codes, four noise families, and five evaluation regimes: interpolation, unseen-p transfer, unseen-noise transfer, few-shot unseen-code adaptation, and few-shot held-out-size adaptation. We compare a classical Meta-MLP teacher-trained baseline with variational quantum circuit (VQC) meta-decoders selected through hardware-aware quantum architecture search over qubit count, circuit depth, and entangling topology. The Meta-MLP achieves teacher-label accuracies of 0.9993, 0.9118, 0.9342, 0.6304, and 0.7548 across the five regimes, while the hardware-aware VQC achieves 0.9400, 0.8495, 0.8415, 0.5678, and 0.7143. However, logical-level evaluation shows that high teacher-label accuracy alone is insufficient in the most challenging Planar5x5 setting. During interpolation, the raw logical-failure ratios relative to the teacher are 12.08 and 25.91 for the Meta-MLP and VQC, respectively, whereas confidence-gated fallback reduces them to 1.71 and 1.11. These results support confidence-aware selective recovery rather than unconditional teacher replacement.", "url": "https://arxiv.org/abs/2607.10707", "type": "数值", "summary": "我们提出了一个用于量子纠错的统一元解码框架，该框架可以学习跨多个稳定器代码和噪声设置的综合症到恢复映射，而不需要为每种配置使用单独的解码器。该基准包括 FiveQubit、Steane、Planar3x3 和 Planar5x5 代码、四个噪声系列和五种评估机制：插值、未见 p 传输、未见噪声传输、少样本未见代码适应和少样本保留大小适应。我们将经典 Meta-MLP 教师训练基线与通过对量子位计数、电路深度和纠缠拓扑进行硬件感知量子架构搜索而选择的变分量子电路 (VQC) 元解码器进行比较。 Meta-MLP 在五个方案中实现了教师标签精度 0.9993、0.9118、0.9342、0.6304 和 0.7548，而硬件感知 VQC 实现了 0.9400、0.8495、0.8415、0.5678 和 0.7143。然而，逻辑级评估表明，在最具挑战性的 Planar5x5 设置中，仅靠教师标签的高准确度是不够的。\n\n插值期间，Meta-MLP 和 VQC 相对于教师的原始逻辑失败率分别为 12.08 和 25.91，而置信门控回退将其降低至 1.71 和 1.11。这些结果支持有信心的选择性恢复，而不是无条件的教师更换。", "authors": [{"name": "Prashant Kumar Choudhary"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}, {"name": "Rajeev Singh"}], "featured_authors": [{"name": "Prashant Kumar Choudhary"}, {"name": "Nouhaila Innan"}, {"name": "Muhammad Shafique"}, {"name": "Rajeev Singh"}], "author_count": 4}, {"id": "2607.10714", "category": "quant-ph", "title": "Nonlocal nonstabilizerness for slightly entangled quantum many-body states", "abstract": "Nonlocal nonstabilizerness quantifies the irreducible magic resource encoded in bipartite entanglement, but its evaluation is generally hindered by a highly nonconvex optimization over local unitary transformations. Here we propose a Schmidt-reference-state framework that replaces this optimization by a direct construction from the sorted Schmidt spectrum. We conjecture that the nonlocal stabilizer Rényi entropy (SRE) is given by the SRE of the corresponding reference state, and support this conjecture through analytical and numerical evidences. Our framework makes nonlocal nonstabilizerness efficiently accessible for weakly entangled many-body states whenever the entanglement spectrum is available. Applying it to Haar-random states, critical spin chains, and PXP dynamics, we show that nonlocal SRE captures nonstabilizer structures in the entanglement spectrum that are invisible to conventional entanglement measures. Our results establish entanglement spectra as a powerful window into irreducible nonstabilizer correlations, opening a broadly applicable route to studying nonlocal magic resources of quantum many-body systems in and out of equilibrium.", "url": "https://arxiv.org/abs/2607.10714", "type": "理论+数值", "summary": "非局部非稳定性量化了二分纠缠中编码的不可约魔法资源，但其评估通常受到局部酉变换的高度非凸优化的阻碍。在这里，我们提出了一个施密特参考状态框架，通过从排序的施密特谱直接构造来取代这种优化。我们推测非局域稳定器 Rényi 熵（SRE）是由相应参考态的 SRE 给出的，并通过分析和数值证据支持了这一猜想。只要纠缠谱可用，我们的框架就可以有效地实现弱纠缠多体态的非局域非稳定化。将其应用于哈尔随机态、临界自旋链和 PXP 动力学，我们表明非局域 SRE 捕获了纠缠谱中的非稳定结构，而这些结构对于传统的纠缠措施来说是不可见的。我们的研究结果将纠缠谱建立为不可约非稳定相关性的强大窗口，为研究处于平衡状态和非平衡状态的量子多体系统的非局域魔法资源开辟了一条广泛适用的途径。", "authors": [{"name": "Lei-Yi-Nan Liu"}, {"name": "Jian Cui"}], "featured_authors": [{"name": "Lei-Yi-Nan Liu"}, {"name": "Jian Cui"}], "author_count": 2}, {"id": "2607.10743", "category": "quant-ph", "title": "Connectivity-induced surface-loss penalty in superconducting qubit-coupler lattices", "abstract": "Recent advances in design and fabrication have increased the energy-relaxation times of isolated superconducting transmon qubits to the hundreds-of-microseconds regime, with reported values exceeding 500 $\\mu$s. However, the same progress has not automatically translated to multiqubit processors, where qubits are embedded in connected qubit-coupler lattices and often exhibit much shorter lifetimes than isolated qubits. To identify possible sources of this discrepancy, here we use finite-element simulation to investigate how surface participation ratios and the resulting surface dielectric loss change when a qubit is embedded in a flip-chip qubit-coupler lattice. Controlled comparisons show that higher connectivity can indeed lead to larger surface loss: in the simulated lattice, connecting a qubit to two and four couplers increases the surface loss by factors of 1.3 and 1.8, respectively. We attribute this change to the combined effects of added edge fields from coupling claws, field redistribution over the larger connected metal network, and hybridization with coupler modes. We further examine how this connectivity-induced surface-loss penalty depends on the geometric design parameters of both the qubit electrodes and the coupling claws, and derive guidelines for designing low-loss multiqubit processors.", "url": "https://arxiv.org/abs/2607.10743", "type": "数值", "summary": "设计和制造方面的最新进展已将隔离超导传输量子位的能量弛豫时间增加到数百微秒，报告值超过 500 $\\mu$s。然而，同样的进展并没有自动转化为多量子位处理器，在多量子位处理器中，量子位嵌入在连接的量子位耦合器晶格中，并且通常表现出比孤立量子位短得多的寿命。为了确定这种差异的可能来源，我们在这里使用有限元模拟来研究当量子位嵌入倒装芯片量子位耦合器晶格中时表面参与比和由此产生的表面介电损耗如何变化。受控比较表明，更高的连通性确实会导致更大的表面损耗：在模拟晶格中，将一个量子位连接到两个和四个耦合器会使表面损耗分别增加 1.3 和 1.8 倍。我们将这种变化归因于耦合爪增加的边缘场、更大的连接金属网络上的场重新分布以及耦合器模式的混合的综合效应。\n\n我们进一步研究了这种连接引起的表面损耗损失如何取决于量子位电极和耦合爪的几何设计参数，并得出设计低损耗多量子位处理器的指南。", "authors": [{"name": "Xu-Yang Gu"}, {"name": "Gui-Han Liang"}, {"name": "Ming-Chuan Wang"}, {"name": "Yongxi Xiao"}, {"name": "Cheng-Lin Deng"}, {"name": "Zheng-He Liu"}, {"name": "Tian-Ming Li"}, {"name": "Kai Xu"}, {"name": "Zhongcheng Xiang"}, {"name": "Heng Fan"}], "featured_authors": [{"name": "Xu-Yang Gu"}, {"name": "Gui-Han Liang"}, {"name": "Ming-Chuan Wang"}, {"name": "Kai Xu"}, {"name": "Zhongcheng Xiang"}, {"name": "Heng Fan"}], "author_count": 10}, {"id": "2607.10765", "category": "quant-ph", "title": "Spectral gap of Lee-Yang Hamiltonians", "abstract": "The Lee-Yang theorem and its quantum extensions state that, for a broad class of Hamiltonians on any graph, the partition function's zeros in the complex magnetic field plane lie only on the imaginary axis. For these Hamiltonians, we prove that under a uniform Z-field of any strength h, the ground state has a spectral gap of at least h/4, independent of the system size and of the coupling strengths. The proof uses the zero-freeness of the partition function as given by Asano and Suzuki-Fisher to show exponential decay of the imaginary-time correlations for any product of Z-operators.
