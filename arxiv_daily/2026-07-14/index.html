stability of GaN(0001) surface reconstructions", "abstract": "The stable adatom configurations of a semiconductor surface have traditionally been sought by sampling: density functional theory (DFT) energies steer a heuristic or Bayesian search through a configuration space far too large to cover. Here we show that, for the GaN(0001)-$(6\\times6)$ surface under the electron counting (EC) rule, the search can instead be posed as a discrete tiling problem and solved exhaustively. Enumerating all rhombus tilings of the surface lattice, together with all EC-compatible adatom arrangements built on them, yields the complete catalog of 416,683 configurations at fixed stoichiometry (3 Ga adatoms and 18 H atoms), organized by symmetry into 14 Ga placement classes. The number of tilings compatible with a given configuration, its tiling decomposition multiplicity $n_\\mathrm{til}$, predicts stability. Within each class, the configuration maximizing $n_\\mathrm{til}$ is the most stable. The rule holds strictly in 13 of the 14 classes; in the remaining class the minimum is itself among the highest-multiplicity configurations, with the $n_\\mathrm{til}$-max configuration only 8.5 meV above it; this ordering is reproduced by independent DFT calculations, and the difference is negligible at growth temperature. Stability screening uses a machine-learning interatomic potential validated against 710 DFT-computed structures. The rule reduces the candidate set for first-principles evaluation from 416,683 to 24 configurations, all of which have been evaluated with DFT. Analysis of the rule identifies the local mechanism, the avoidance of adjacent bare surface sites, while the existence of a compatible tiling remains a separate requirement with an energy cost of its own. Enumeration thus provides what sampling cannot: a coverage guarantee, and a route to stable-structure prediction in which first-principles input enters only at the final ranking step.", "url": "https://arxiv.org/abs/2607.11105", "type": "理论+数值", "summary": "传统上，半导体表面的稳定吸附原子构型是通过采样来寻找的：密度泛函理论 (DFT) 能量引导启发式​​或贝叶斯搜索穿过太大而无法覆盖的构型空间。在这里，我们表明，对于电子计数（EC）规则下的 GaN(0001)-$(6\\times6)$ 表面，搜索可以作为离散平铺问题并彻底解决。枚举表面晶格的所有菱形镶嵌，以及在其上构建的所有 EC 兼容的吸附原子排列，产生固定化学计量的 416,683 个配置的完整目录（3 个 Ga 吸附原子和 18 个 H 原子），按对称性组织成 14 个 Ga 放置类别。与给定配置兼容的平铺数量，其平铺分解重数 $n_\\mathrm{til}$，可预测稳定性。在每个类中，最大化 $n_\\mathrm{til}$ 的配置是最稳定的。\n\n该规则严格适用于 14 个类别中的 13 个类别；在其余类别中，最小值本身就是最高多重性配置之一，$n_\\mathrm{til}$-max 配置仅比它高 8.5 meV；这种排序是通过独立的 DFT 计算重现的，并且在生长温度下差异可以忽略不计。稳定性筛选使用针对 710 个 DFT 计算结构进行验证的机器学习原子间势。该规则将第一原理评估的候选集从 416,683 个配置减少到 24 个配置，所有这些配置都已使用 DFT 进行了评估。对规则的分析确定了局部机制，避免相邻的裸露表面位置，而兼容瓷砖的存在仍然是一个单独的要求，其本身具有能源成本。因此，枚举提供了采样所不能提供的功能：覆盖率保证，以及稳定结构预测的途径，其中第一原理输入仅在最终排序步骤中进入。", "authors": [{"name": "Tetsuji Kuboyama"}, {"name": "Akira Kusaba"}, {"name": "Karol Kawka"}, {"name": "Pawel Kempisty"}], "featured_authors": [{"name": "Tetsuji Kuboyama"}, {"name": "Akira Kusaba"}, {"name": "Karol Kawka"}, {"name": "Pawel Kempisty"}], "author_count": 4}, {"id": "2607.11115", "category": "cond-mat", "title": "Strain-Tuned Nodal Superconductivity in the Charge-Ordered Kagome Metal CsV$_3$Sb$_5$", "abstract": "The nature of the superconducting pairing symmetry in the kagome metal CsV$_3$Sb$_5$ and its relationship with the charge density wave (CDW) order are central unresolved issues. Here, we investigate the evolution of superconductivity in CsV$_3$Sb$_5$ under in-situ uniaxial pressure using $^{121}$Sb nuclear quadrupole resonance (NQR). We find that tensile strain significantly enhances the superconducting transition temperature, $T_{\\rm c}$, while the CDW remains unchanged, demonstrating that superconductivity can be tuned independently of the bulk charge order. At a tensile strain of $\\varepsilon$ = +0.90%, the nuclear spin-lattice relaxation rate reveals a remarkable double transition: an upper transition at $T_{\\rm c1}$ = 3.6 K to a nodal gap state, and a lower one at $T_{\\rm c2}$ = 3.0 K characterized by a nodeless gap. These results evidence degenerate superconducting states with different gap symmetry in the kagome metal at ambient pressure which split under strain. Our work demonstrates a high tunability of superconductivity by uniaxial pressure.", "url": "https://arxiv.org/abs/2607.11115", "type": "理论+数值", "summary": "kagome 金属 CsV$_3$Sb$_5$ 中超导配对对称性的性质及其与电荷密度波 (CDW) 阶数的关系是未解决的核心问题。在这里，我们使用 $^{121}$Sb 核四极共振（NQR）研究了 CsV$_3$Sb$_5$ 在原位单轴压力下超导性的演化。我们发现拉伸应变显着提高了超导转变温度 $T_{\\rm c}$，而 CDW 保持不变，这表明超导性可以独立于体电荷顺序进行调节。在 $\\varepsilon$ = +0.90% 的拉伸应变下，核自旋晶格弛豫率显示出显着的双跃迁：在 $T_{\\rm c1}$ = 3.6 K 处的上部跃迁到节点间隙状态，以及在 $T_{\\rm c2}$ = 3.0 K 处的下部跃迁，其特征是无节点间隙。这些结果证明戈薇金属在环境压力下具有不同间隙对称性的简并超导态，在应变下分裂。我们的工作证明了单轴压力对超导性的高度可调性。", "authors": [{"name": "Yusuke Takeuchi"}, {"name": "Akito Kobayashi"}, {"name": "Saki Uchida"}, {"name": "Takumi Nagao"}, {"name": "Seigo Ogawa"}, {"name": "Rui Zhou"}, {"name": "Shinji Kawasaki"}, {"name": "Fei Song"}, {"name": "Hao Ni"}, {"name": "Yong Zhao"}, {"name": "Guo-qing Zheng"}], "featured_authors": [{"name": "Yusuke Takeuchi"}, {"name": "Akito Kobayashi"}, {"name": "Saki Uchida"}, {"name": "Hao Ni"}, {"name": "Yong Zhao"}, {"name": "Guo-qing Zheng"}], "author_count": 11}, {"id": "2607.11135", "category": "cond-mat", "title": "Molecular Dynamics-Derived Coloured Noise Mediates Anderson Localisation and Environment-Assisted Transport of Tryptophan Excitons in Tubulin", "abstract": "The tryptophan residues in tubulin $\\alpha\\beta$-dimers form an ordered aromatic network that has been proposed to support quantum exciton transport even under physiological environmental noise. Existing studies of this system mostly assume white-noise dephasing, but the statistical properties of the protein-solvent bath coupled to tryptophan sites remain uncharacterised under physiological conditions. Here we characterise this fluctuation bath via all-atom molecular dynamics simulations of a solvated tubulin dimer at 310~K, combining high-frequency and long-time trajectories with 10~fs and 10~ps sampling intervals. The resulting autocorrelation of the site-energy fluctuations is tri-exponential, with three well-separated decay modes: sub-100-fs and picosecond fluctuations driven by water dynamics, and a nanosecond mode originating from protein conformational rearrangements. All three modes fall deep within the non-Markovian regime. We further demonstrate that the slow protein mode introduces strong quasi-static disorder, which results in Anderson localisation, while the two fast water modes frequently tune chromophore pairs through resonance, enabling environment-assisted quantum transport (ENAQT). On the full eight-site network, the coloured-noise bath confines excitons predominantly to strongly coupled proximal tryptophan pairs, in marked contrast to the more uniform delocalisation predicted by the standard white-noise Haken--Strobl model. Our workflow generalises to other pigment--protein systems with solvent-exposed chromophores.", "url": "https://arxiv.org/abs/2607.11135", "type": "理论+数值", "summary": "微管蛋白$\\alpha\\beta$-二聚体中的色氨酸残基形成有序的芳香族网络，即使在生理环境噪声下也能支持量子激子传输。该系统的现有研究大多假设白噪声相移，但与色氨酸位点耦合的蛋白质溶剂浴的统计特性在生理条件下仍未表征。在这里，我们通过溶剂化微管蛋白二聚体在 310~K 下的全原子分子动力学模拟来表征这种波动浴，将高频和长时间轨迹与 10~fs 和 10~ps 采样间隔相结合。由此产生的位点能量波动的自相关性是三指数的，具有三种完全分离的衰减模式：由水动力学驱动的亚100飞秒和皮秒波动，以及源自蛋白质构象重排的纳秒模式。所有三种模式都深深地属于非马尔可夫政权。\n\n我们进一步证明，慢蛋白质模式引入了强烈的准静态无序，从而导致安德森局域化，而两种快速水模式经常通过共振调整发色团对，从而实现环境辅助量子传输（ENAQT）。在完整的八位点网络上，有色噪声浴主要将激子限制在强耦合的近端色氨酸对上，这与标准白噪声 Haken-Strobl 模型预测的更均匀的离域形成鲜明对比。我们的工作流程可推广到其他色素-具有暴露于溶剂的发色团的蛋白质系统。", "authors": [{"name": "Chen Xin"}], "featured_authors": [{"name": "Chen Xin"}], "author_count": 1}, {"id": "2607.11176", "category": "cond-mat", "title": "A Generalized Frank-Bilby Equation for Interfaces in Crystalline Materials", "abstract": "The classical Frank-Bilby equation (FBE) is commonly used to predict the structure of interfaces in crystalline materials in terms of interfacial dislocation networks. However, in general, the line defects in interfaces are disconnections, possessing both dislocation and step character, which are not captured by the classical FBE. As a result, the FBE cannot fully describe the structure of most interfaces of practical interest. To address this issue, we derive a generalized Frank-Bilby equation (GFBE) that explicitly incorporates both dislocation and step components of interfacial defects. We demonstrate its application to several representative interface systems.", "url": "https://arxiv.org/abs/2607.11176", "type": "理论", "summary": "经典的 Frank-Bilby 方程 (FBE) 通常用于根据界面位错网络来预测晶体材料中的界面结构。然而，一般来说，界面中的线缺陷是断线，同时具有位错和阶梯特征，这是经典FBE无法捕获的。因此，FBE 无法完全描述大多数实际感兴趣的接口的结构。为了解决这个问题，我们推导了一个广义的 Frank-Bilby 方程（GFBE），它明确地包含了位错和界面缺陷的阶梯分量。我们演示了它在几个有代表性的界面系统中的应用。", "authors": [{"name": "Dongsong Tao"}, {"name": "Luchan Zhang"}, {"name": "David J. Srolovitz"}, {"name": "Yang Xiang"}, {"name": "Jian Han"}], "featured_authors": [{"name": "Dongsong Tao"}, {"name": "Luchan Zhang"}, {"name": "David J. Srolovitz"}, {"name": "Yang Xiang"}, {"name": "Jian Han"}], "author_count": 5}, {"id": "2607.11253", "category": "cond-mat", "title": "Impact of Electronic Energy Dissipation on Primary Radiation Damage Formation in Silicon", "abstract": "In this work, we investigate the role of ion-electron coupling in simulations of radiation damage formation in silicon using molecular dynamics simulations within a two-temperature model. We explore predictions of a threshold-free approach to the coupling that accounts for both the electronic stopping and electron-phonon coupling using a local electron density-based formalism. We compare two different coupling functions across a range of primary knock-on atom energies using two interatomic potentials. Our results demonstrate that the functional form of the ion-electron coupling plays a critical role in determining defect production efficiency, clustering, and recombination, and must therefore be carefully considered for accurate modeling of radiation damage formation. Furthermore, we find that the impact of the coupling in particular on the recombination of defects during the cooling phase of the cascade depends on the choice of interatomic potential, emphasizing the importance of physically grounded descriptions for both electronic effects and atom-atom interactions for reliable radiation damage predictions.", "url": "https://arxiv.org/abs/2607.11253", "type": "理论+数值", "summary": "在这项工作中，我们使用双温度模型内的分子动力学模拟研究了离子电子耦合在硅辐射损伤形成模拟中的作用。我们探索了一种无阈值耦合方法的预测，该方法使用基于局域电子密度的形式主义来解释电子停止和电子-声子耦合。我们使用两个原子间势比较了一系列初级碰撞原子能量的两种不同的耦合函数。我们的结果表明，离子电子耦合的功能形式在确定缺陷产生效率、聚类和重组方面起着至关重要的作用，因此必须仔细考虑以准确建模辐射损伤形成。此外，我们发现耦合的影响，尤其是级联冷却阶段缺陷重组的影响取决于原子间势的选择，强调了电子效应和原子间相互作用的物理基础描述对于可靠的辐射损伤预测的重要性。", "authors": [{"name": "Nadezda Korepanova"}, {"name": "Rafael Nuñez-Palacio"}, {"name": "Andrea E. Sand"}], "featured_authors": [{"name": "Nadezda Korepanova"}, {"name": "Rafael Nuñez-Palacio"}, {"name": "Andrea E. Sand"}], "author_count": 3}, {"id": "2607.11278", "category": "cond-mat", "title": "Mode-locking instability and multiple soliton formation in GaN polariton waveguide cavities", "abstract": "We study the emergence of multi-soliton regimes in 1D ridge polariton waveguides of two different lengths. We show that by varying the position of the gain, which in out-of-equilibrium polariton systems is provided by the pumping laser and its associated excitonic reservoir, it is possible to tune the regime of soliton formation between single and multiple solitons. This soliton dynamics can be quantitatively reproduced by solving the Gross-Pitaevskii equations of the coupled exciton-photon system, which show that the soliton splitting mechanism is governed by the exciton reservoir dynamics.", "url": "https://arxiv.org/abs/2607.11278", "type": "理论", "summary": "我们研究了两种不同长度的一维脊形极化子波导中多孤子状态的出现。我们表明，通过改变增益的位置（在非平衡极化子系统中由泵浦激光器及其相关的激子库提供增益），可以调整单个孤子和多个孤子之间的孤子形成状态。这种孤子动力学可以通过求解激子-光子耦合系统的 Gross-Pitaevskii 方程来定量再现，该方程表明孤子分裂机制受激子库动力学控制。", "authors": [{"name": "O. Bahrova"}, {"name": "V. Develay"}, {"name": "H. Souissi"}, {"name": "C. Brimont"}, {"name": "L. Doyennette"}, {"name": "B. Alloing"}, {"name": "E. Cambril"}, {"name": "S. Bouchoule"}, {"name": "T. Ackemann"}, {"name": "J. Zuniga-Perez"}, {"name": "D. Solnyshkov"}, {"name": "G. Malpuech"}, {"name": "T. Guillet"}], "featured_authors": [{"name": "O. Bahrova"}, {"name": "V. Develay"}, {"name": "H. Souissi"}, {"name": "D. Solnyshkov"}, {"name": "G. Malpuech"}, {"name": "T. Guillet"}], "author_count": 13}, {"id": "2607.11371", "category": "cond-mat", "title": "Conformal Nature of Quantum Phase Transitions via Fuzzy Three-Sphere Regularization", "abstract": "Conformal field theory (CFT) offers a modern viewpoint for understanding phase transitions. However, directly accessing the conformal algebra and microscopically uncovering the emergent conformal symmetry, especially in higher dimensions, remains a significant challenge. Motivated by recent advances in revealing CFT features via the fuzzy two-sphere, here we generalize this approach to higher dimensions and aim to expose the conformality at the (3+1)-D quantum critical point. We demonstrate this framework by investigating quantum phase transitions belonging to the Ising and Yang-Lee universality classes in a (3+1)-D quantum model (equivalent to a classical four-dimensional system), realized via Landau level projection on the fuzzy three-sphere. By computing the energy spectra at criticality, we explicitly verify the state-operator correspondence, a hallmark of conformal invariance. Together with prior advances, this work establishes a new pathway for the microscopic study of emergent conformality in higher-dimensional phase transitions.", "url": "https://arxiv.org/abs/2607.11371", "type": "理论", "summary": "共形场论（CFT）为理解相变提供了一种现代观点。然而，直接访问共形代数并在微观上揭示新出现的共形对称性，特别是在更高维度中，仍然是一个重大挑战。受最近通过模糊二球体揭示 CFT 特征的进展的推动，我们将这种方法推广到更高维度，旨在揭示 (3+1)-D 量子临界点处的共形性。我们通过研究 (3+1)-D 量子模型（相当于经典的四维系统）中属于 Ising 和 Yang-Lee 普适性类的量子相变来演示该框架，该模型通过模糊三球体上的朗道能级投影实现。通过计算临界点的能谱，我们明确验证了状态算子对应关系，这是共形不变性的标志。与先前的进展一起，这项工作为高维相变中涌现共形性的微观研究建立了一条新途径。", "authors": [{"name": "Xue Meng"}, {"name": "Liangdong Hu"}, {"name": "Wei Zhu"}], "featured_authors": [{"name": "Xue Meng"}, {"name": "Liangdong Hu"}, {"name": "Wei Zhu"}], "author_count": 3}, {"id": "2607.11384", "category": "cond-mat", "title": "Amorphous materials as a frontier challenge for universal interatomic potentials", "abstract": "Pre-trained or 'foundational' machine-learned interatomic potentials (MLIPs) are now widely used in materials modelling. However, early pre-trained models and benchmarks have largely focused on ordered, crystalline structures, and their transferability to non-crystalline solids remains unclear. Here, we show that the amorphous state is indeed a central challenge for future universal MLIPs, based on a systematic evaluation of current mainstream models in this domain. We introduce a benchmarking framework built on a curated reference dataset of canonical amorphous systems, as well as validation for structures and properties. Our study identifies limitations in the transferability of many current pre-trained models and investigates fine-tuning strategies tailored to disordered phases. Together, our results can facilitate future applications of MLIPs in the fast-growing field of amorphous functional materials, and they provide guidance for designing next-generation training datasets and transferable atomistic models.", "url": "https://arxiv.org/abs/2607.11384", "type": "理论", "summary": "预训练或“基础”机器学习原子间势（MLIP）现在广泛用于材料建模。然而，早期的预训练模型和基准主要集中在有序的晶体结构上，它们向非晶体固体的可转移性仍不清楚。在这里，我们基于对该领域当前主流模型的系统评估，表明非晶态确实是未来通用 MLIP 的核心挑战。我们引入了一个基于规范非晶系统精选参考数据集构建的基准测试框架，以及结构和属性的验证。我们的研究确定了许多当前预训练模型的可迁移性的局限性，并研究了针对无序阶段的微调策略。总之，我们的结果可以促进 MLIP 在快速增长的非晶功能材料领域的未来应用，并为设计下一代训练数据集和可转移原子模型提供指导。", "authors": [{"name": "Natascia L. Fragapane"}, {"name": "Volker L. Deringer"}], "featured_authors": [{"name": "Natascia L. Fragapane"}, {"name": "Volker L. Deringer"}], "author_count": 2}, {"id": "2607.11395", "category": "cond-mat", "title": "A method for measuring the dispersion of elastic waves in disordered computer-solids", "abstract": "The dispersion of elastic waves in disordered solids plays a key role in determining the vibrational density of states and harmonic wave attenuation rates. As such, the availability of robust computational approaches to the precise extraction of the dispersion is of key importance. Here we present a simple method -- the imposed wave method (IWM) -- , which provides direct access to the dispersion of elastic waves in computer models of solids, without any fitting involved. We directly benchmark the method against the `ground-truth' obtained from direct diagonalization of solids' hessian matrices, to find good agreement. We discuss limitations of and finite-size effects in the method, and show that exploiting the method's finite-size scaling provides access to a fundamental quantifier of mechanical disorder that determines wave attenuation rates and spectral widths.", "url": "https://arxiv.org/abs/2607.11395", "type": "理论+数值", "summary": "无序固体中弹性波的色散在确定振动态密度和谐波衰减率方面起着关键作用。因此，提供可靠的计算方法来精确提取色散至关重要。在这里，我们提出了一种简单的方法——强加波法（IWM）——它可以直接获取固体计算机模型中弹性波的色散，无需任何拟合。我们直接将该方法与通过固体粗麻布矩阵的直接对角化获得的“地面实况”进行基准测试，以找到良好的一致性。我们讨论了该方法的局限性和有限尺寸效应，并表明利用该方法的有限尺寸缩放可以访问确定波衰减率和谱宽度的机械紊乱的基本量词。", "authors": [{"name": "Edan Lerner"}], "featured_authors": [{"name": "Edan Lerner"}], "author_count": 1}, {"id": "2607.11406", "category": "cond-mat", "title": "Ab initio path integral Monte Carlo study of the 2D uniform electron liquid at finite temperatures", "abstract": "We present extensive \\emph{ab initio} path integral Monte Carlo (PIMC) simulations of the two-dimensional uniform electron gas (2DEG), covering a broad range of density parameters $r_s=0.1,\\dots,50$ and temperatures $\\Theta=k_\\textnormal{B}T/E_\\textnormal{Fermi}=0.5,\\dots,16$. This allows us to analyze various structural, linear density response and spectral properties. We find clear evidence of a \\emph{roton-type} feature in the dynamic structure factor at strong coupling and intermediate wavenumbers. We also benchmark novel dielectric theory implementations for the 2DEG~[Kalkavouras \\emph{et al.}~ arXiv:2601.14989 ] for structural and spectral properties across the liquid phase diagram. The PIMC results can be used to benchmark existing theories and approximations, and guide the development of new methodologies.", "url": "https://arxiv.org/abs/2607.11406", "type": "理论+数值", "summary": "我们提出了二维均匀电子气 (2DEG) 的广泛 \\emph{ab initio} 路径积分蒙特卡罗 (PIMC) 模拟，涵盖了广泛的密度参数 $r_s=0.1,\\dots,50$ 和温度 $\\Theta=k_\\textnormal{B}T/E_\\textnormal{Fermi}=0.5,\\dots,16$。这使我们能够分析各种结构、线密度响应和光谱特性。我们在强耦合和中间波数的动态结构因子中发现了 emph{roton-type} 特征的明显证据。我们还对 2DEG~[Kalkavouras \\emph{et al.}~ arXiv:2601.14989 ] 的新颖介电理论实现进行了基准测试，以了解整个液相图中的结构和光谱特性。 PIMC 结果可用于对现有理论和近似值进行基准测试，并指导新方法的开发。", "authors": [{"name": "Tobias Dornheim"}, {"name": "Fotios Kalkavouras"}, {"name": "Paul Hamann"}, {"name": "Zhandos A. Moldabekov"}, {"name": "Jan Vorberger"}, {"name": "Panagiotis Tolias"}], "featured_authors": [{"name": "Tobias Dornheim"}, {"name": "Fotios Kalkavouras"}, {"name": "Paul Hamann"}, {"name": "Zhandos A. Moldabekov"}, {"name": "Jan Vorberger"}, {"name": "Panagiotis Tolias"}], "author_count": 6}, {"id": "2607.11420", "category": "cond-mat", "title": "Extended Landau--Lifshitz equation for nanomagnets: a path-integral derivation of surface-induced magnetization nutation", "abstract": "An effective dynamical equation for the magnetization of a nanomagnet with surface anisotropy is derived from an atomistic spin Hamiltonian using the spin coherent-state path integral formalism. The derivation proceeds in two steps. First, the continuum Euclidean action for the many-spin nanomagnet is obtained, including the Wess--Zumino--Witten (Berry phase) term, as well as exchange, Zeeman, and core/surface anisotropy contributions. Second, the local magnetization density is decomposed into a slowly varying macrospin component and transverse spin-misalignment fluctuations driven by surface effects. A systematic expansion of the action is then performed up to quadratic order in the transverse-fluctuation variables. Under the adiabatic approximation, in which transverse modes relax much faster than the macrospin, these modes are eliminated by using their static Green's function solution. This results in a closed, extended Landau--Lifshitz equation for the macrospin, featuring an effective field with nontrivial corrections from spin misalignment. These corrections renormalize both the Zeeman and anisotropy fields and introduce additional terms that act as nutation- and damping-like contributions. ... Together, these results establish a microscopic foundation for surface-induced magnetization nutation in nanomagnets and provide a framework to estimate corrections to the precession frequency and effective damping. The corresponding shift in the ferromagnetic-resonance frequency and linewidth is measurable with standard GHz spectrometers, and the underlying adiabatic-elimination mechanism is expected to generalize to any slow magnetic variable coupled to a bath of fast-fluctuating modes.", "url": "https://arxiv.org/abs/2607.11420", "type": "理论", "summary": "使用自旋相干态路径积分形式从原子自旋哈密顿量导出具有表面各向异性的纳米磁体磁化的有效动力学方程。推导分两步进行。首先，获得多自旋纳米磁体的连续欧几里得作用，包括 Wess-Zumino-Witten（贝里相）项，以及交换、塞曼和芯/表面各向异性贡献。其次，局部磁化密度被分解为缓慢变化的宏观自旋分量和由表面效应驱动的横向自旋失准波动。然后对横向波动变量进行系统扩展直至二次阶。在绝热近似下，横向模式的弛豫速度比宏自旋快得多，这些模式可以通过使用其静态格林函数解来消除。这产生了一个封闭的、扩展的宏自旋朗道-利夫什茨方程，其特点是有效场具有自旋错位的非平凡校正。\n\n这些修正重新规范了塞曼场和各向异性场，并引入了充当章动和阻尼类贡献的附加项。 ...这些结果共同为纳米磁体中表面感应磁化章动奠定了微观基础，并提供了估计进动频率和有效阻尼修正的框架。铁磁共振频率和线宽的相应变化可以用标准 GHz 光谱仪测量，并且潜在的绝热消除机制有望推广到与快速波动模式耦合的任何慢磁变量。", "authors": [{"name": "H. Kachkachi"}, {"name": "P. Thibaudeau"}], "featured_authors": [{"name": "H. Kachkachi"}, {"name": "P. Thibaudeau"}], "author_count": 2}, {"id": "2607.11474", "category": "cond-mat", "title": "Colloid recovery from porous structures under ambient flow: enhanced extraction via phoretic and osmotic mechanisms", "abstract": "Chemical gradients are widely employed to enhance particle transport in porous media, such as laundry detergency and enhanced oil recovery. Diffusiophoresis and diffusioosmosis refer to the movement of colloid and movement of near-surface fluid in response to electrolyte gradients, respectively. These mechanisms play a crucial role in colloid and drug transport in constricted regions where bulk transport is infeasible. Our earlier work [Tiwari et al., Langmuir 41, 18583 (2025)] has shown that phoretic and osmotic transport in dead-end micro-pores can be controlled by orienting salt gradients into or out of the pores; however, the extent to which this orientation influences large-scale spatiotemporal patterns and colloid extraction is not thoroughly explored. In this work, we study the phoretic and osmotic colloidal extraction from porous structure exposed to an ambient flow. We characterize the impact of solute gradient orientation, such as solute-out (i.e., solute-emitting porous media) and solute-in (i.e., solute-consuming media) modes. The two-dimensional porous structure is made of a number of pillars/fibers arranged in a lattice ordered hexagonal packing with equal spacing. The results from finite-element simulations show that phoretic colloidal extraction exhibits a qualitatively distinct behavior in the two modes: in the solute-out mode, colloids are extracted from the peripheral region of the porous structure, whereas in the solute-in mode, extraction predominantly occurs from the stagnant core. Diffusioosmotic slip on the internal surface of pillars/fibres further amplifies extraction in both modes, with a relatively larger enhancement in the solute-in mode due to internal spatiotemporal flow patterns. Beyond demonstrating the sensitivity of osmotic transport in porous media, these insights can guide enhanced membrane filtration, laundry detergency, and enhanced oil recovery.", "url": "https://arxiv.org/abs/2607.11474", "type": "数值", "summary": "化学梯度广泛用于增强多孔介质中的颗粒传输，例如洗衣去污力和提高采油率。扩散电泳和扩散渗透分别是指响应电解质梯度的胶体运动和近表面流体的运动。这些机制在无法进行批量运输的狭窄区域的胶体和药物运输中发挥着至关重要的作用。我们的早期工作 [Tiwari et al., Langmuir 41, 18583 (2025)] 表明，可以通过将盐梯度定向进出孔隙来控制死端微孔中的泳动和渗透传输；然而，这种方向对大规模时空模式和胶体提取的影响程度尚未得到彻底探讨。在这项工作中，我们研究了从暴露于环境流的多孔结构中进行电泳和渗透胶体萃取。我们描述了溶质梯度方向的影响，例如溶质流出（即，溶质发射多孔介质）和溶质流入（即，溶质消耗介质）模式。二维多孔结构由许多柱/纤维以等间距排列成晶格有序六边形堆积而成。\n\n有限元模拟的结果表明，电泳胶体萃取在两种模式下表现出性质不同的行为：在溶出模式下，胶体从多孔结构的外围区域萃取，而在溶质进入模式下，萃取主要从停滞的核心发生。柱/纤维内表面上的扩散渗透滑移进一步放大了两种模式的萃取，由于内部时空流动模式，溶质进入模式的增强相对较大。除了证明多孔介质中渗透输送的敏感性之外，这些见解还可以指导增强膜过滤、洗衣去污力和提高油回收率。", "authors": [{"name": "Jitendra Dhakar"}, {"name": "Kapil Upadhyaya"}, {"name": "Akash Choudhary"}], "featured_authors": [{"name": "Jitendra Dhakar"}, {"name": "Kapil Upadhyaya"}, {"name": "Akash Choudhary"}], "author_count": 3}, {"id": "2607.11518", "category": "cond-mat", "title": "Microscopic equivalence of the vortex-entry current and the depairing current in a superconducting thin-film strip", "abstract": "The current at which vortices enter a superconducting strip is usually identified in Pearl--London theory with the disappearance of an edge barrier. This work reformulates the same question microscopically as the loss of local stability of the vortex-free current-carrying state, using the fixed-current Gibbs functional of dirty-limit Usadel theory, which is valid at arbitrary temperatures. For an ideal homogeneous thin-film strip at zero applied field, with self-field effects neglected, the stability of the vortex-free state is examined against both spatially uniform and nonuniform perturbations. The barrier-disappearance current is shown to be set by the uniform perturbation and to coincide exactly with the depairing current.", "url": "https://arxiv.org/abs/2607.11518", "type": "理论", "summary": "在 Pearl-London 理论中，涡流进入超导带的电流通常用边缘势垒的消失来确定。这项工作使用在任意温度下有效的脏极限 Usadel 理论的固定电流吉布斯函数，从微观上重新阐述了与无涡流载流状态局部稳定性损失相同的问题。对于零施加场下的理想均匀薄膜带，忽略自场效应，针对空间均匀和非均匀扰动检查无涡状态的稳定性。势垒消失电流是由均匀扰动设定的，并且与脱配对电流完全一致。", "authors": [{"name": "Takayuki Kubo"}], "featured_authors": [{"name": "Takayuki Kubo"}], "author_count": 1}, {"id": "2607.11524", "category": "cond-mat", "title": "Harnessing finite-size effects to gauge aging in the $2D$ Ising model", "abstract": "The relaxation behavior towards equilibrium of the $2D$ Ising model with nearest-neighbor interactions has been studied with focus on the two-time autocorrelator $C(t,s)$. Finite-size effects affecting the growing magnetic domains lead to the saturation of $C(t,s)$ with a distinct plateau of height $C_{\\infty}^{(2)}(s,L)$ scaling algebraically with waiting time $s$ and lattice size $L$. These scaling relations are used to produce precise estimates for the autocorrelation exponent $\\lambda$ and dynamical exponent $z$ with deliberately small lattices. Treating smooth domain walls in a similar manner to the lattice boundaries, their effect on $C(t,s)$ can be understood as premature finite-size phenomenon, extending our ansatz to systems not yet in equilibrium.", "url": "https://arxiv.org/abs/2607.11524", "type": "理论", "summary": "研究了具有最近邻相互作用的 $2D$ Ising 模型趋于平衡的松弛行为，重点关注二次自相关器 $C(t,s)$。影响不断增长的磁畴的有限尺寸效应导致 $C(t,s)$ 饱和，并具有高度 $C_{\\infty}^{(2)}(s,L)$ 的明显平台，随等待时间 $s$ 和晶格尺寸 $L$ 进行代数缩放。这些标度关系用于通过特意设计的小晶格对自相关指数 $\\lambda$ 和动态指数 $z$ 进行精确估计。以与晶格边界类似的方式处理光滑畴壁，它们对 $C(t,s)$ 的影响可以理解为过早的有限尺寸现象，将我们的模拟扩展到尚未平衡的系统。", "authors": [{"name": "Dustin Warkotsch"}, {"name": "Malte Henkel"}, {"name": "Wolfhard Janke"}], "featured_authors": [{"name": "Dustin Warkotsch"}, {"name": "Malte Henkel"}, {"name": "Wolfhard Janke"}], "author_count": 3}, {"id": "2607.11532", "category": "cond-mat", "title": "Stripe-Ordered Altermagnetism Emerging from Correlation-Driven Spin-Density-Wave Instability", "abstract": "Altermagnetism is conventionally identified within the paradigm of collinear antiferromagnets. Its potential realization within other spin instabilities, such as a spin-density wave (SDW), remains a fundamentally compelling open question. Here, we combine Hartree-Fock mean-field and unbiased determinant quantum Monte Carlo methods to investigate a minimal Hubbard model relevant to iron pnictides. We reveal a novel $d_{xy}$-wave stripe-ordered altermagnetic (SOAM) insulating phase driven fundamentally by the correlation-induced $(\\pi,0)$ SDW instability. Within this phase, an introduced uniaxial staggered electric potential alters the underlying symmetry: it breaks the original combined time-reversal and spatial translation symmetry ($T_{d}\\mathcal{T}$) and retains a combined time-reversal and mirror invariance ($M\\mathcal{T}$), thereby unlocking the pronounced nonrelativistic spin splitting. Crucially, the exact finite-size scaling from our determinant quantum Monte Carlo simulations confirms that this correlation-driven SOAM phase stably survives at accessible finite temperatures. Our study pushes the frontier of altermagnetism beyond the conventional antiferromagnetic paradigm into the realm of SDW instability, advancing the fundamental understanding of altermagnetism in strongly correlated electron systems.", "url": "https://arxiv.org/abs/2607.11532", "type": "理论+数值", "summary": "交变磁性通常在共线反铁磁体的范式中被识别。它在其他自旋不稳定性（例如自旋密度波（SDW））中的潜在实现仍然是一个根本上引人注目的悬而未决的问题。在这里，我们结合 Hartree-Fock 平均场和无偏行列式量子蒙特卡罗方法来研究与铁磷族元素相关的最小哈伯德模型。我们揭示了一种新颖的 $d_{xy}$ 波条带有序交变磁 ​​(SOAM) 绝缘相，该相从根本上由相关引起的 $(\\pi,0)$ SDW 不稳定性驱动。在此阶段中，引入的单轴交错电势改变了潜在的对称性：它打破了原始组合的时间反转和空间平移对称性（$T_{d}\\mathcal{T}$）并保留了组合的时间反转和镜像不变性（$M\\mathcal{T}$），从而解锁了明显的非相对论自旋分裂。至关重要的是，行列式量子蒙特卡罗模拟的精确有限尺寸缩放证实了这种相关驱动的 SOAM 相在可达到的有限温度下稳定存在。\n\n我们的研究将交变磁性的前沿推向了传统反铁磁范式之外，进入了 SDW 不稳定性领域，推进了对强相关电子系统中交变磁性的基本理解。", "authors": [{"name": "Zenghui Fan"}, {"name": "Jingyao Meng"}, {"name": "Tianxing Ma"}], "featured_authors": [{"name": "Zenghui Fan"}, {"name": "Jingyao Meng"}, {"name": "Tianxing Ma"}], "author_count": 3}, {"id": "2607.11554", "category": "cond-mat", "title": "Robust Spin Qubit Coupler via Minimal Kitaev Chain", "abstract": "While a minimal Kitaev chain is promised to host unprotected Majorana zero modes, its role for spin qubits is relatively underappreciated. Following recent breakthroughs in the fine control of transport behaviors, we propose to use minimal Kitaev chain as a robust coupling module between spin qubits. Long-distance, anisotropic exchange coupling can be mediated by the Andreev bound states (ABSs) in the hybrid segment. The chemical potential of ABS gives a simple way to selectively control the coupling strength and its response to local perturbations. Moreover, this additional control degree of freedom creates a unique sweet spot, allowing both strong coupling and first-order immunity against charge noise. The protected qubit encoded on the minimal Kitaev chain at the sweet spot is shown to boast over 200 fold improvement in decoherence time.", "url": "https://arxiv.org/abs/2607.11554", "type": "理论", "summary": "虽然最小的基塔耶夫链承诺承载不受保护的马约拉纳零模式，但它在自旋量子位中的作用相对未被充分认识。随着最近在传输行为精细控制方面取得突破，我们建议使用最小的 Kitaev 链作为自旋量子位之间的鲁棒耦合模块。长距离、各向异性交换耦合可以由混合段中的安德烈夫束缚态（ABS）介导。 ABS 的化学势提供了一种简单的方法来选择性地控制耦合强度及其对局部扰动的响应。此外，这种额外的控制自由度创造了独特的最佳点，允许强耦合和一阶抗电荷噪声能力。在最佳点的最小 Kitaev 链上编码的受保护量子位显示，退相干时间提高了 200 倍以上。", "authors": [{"name": "Jiaan Qi"}, {"name": "Hongqi Xu"}], "featured_authors": [{"name": "Jiaan Qi"}, {"name": "Hongqi Xu"}], "author_count": 2}, {"id": "2607.11647", "category": "cond-mat", "title": "Anomalous Dissipation in Current Biased Josephson Systems", "abstract": "A new phase diffusive regime in a current biased Josephson junction is theoretically explored which originates from embedding the junction in a circuit environment with anomalous dissipation. This is realized by placing parallel to the junction a resistor in series with a capacitor such that electromagnetic fluctuations effectively couple also to the charge of the junction. This leads to rich Josephson dynamics, in particular for the switching of the junction out of a zero voltage state. Modelled as the escape process of a fictitious phase-particle out of a metastable well, a detailed study reveals that anomalous dissipation has a strong impact at low temperatures when quantum tunneling dominates against thermal activation. As a manifestation, a regime is found, where for realistic circuit parameters the quantum escape process is substantially enhanced, followed by a short voltage pulse and re-trapping with high probability. This class of circuits may be leveraged for detecting microwave photons or dissipative quantum annealing processes. In addition, the analysis provides a general framework for engineering dissipative dynamics in nonlinear systems using anomalous environments.", "url": "https://arxiv.org/abs/2607.11647", "type": "理论", "summary": "从理论上探索了电流偏置约瑟夫森结中的新相位扩散机制，该机制源于将结嵌入具有异常耗散的电路环境中。这是通过与结点并联放置一个与电容器串联的电阻器来实现的，这样电磁波动也有效地耦合到结点的电荷。这导致丰富的约瑟夫森动力学，特别是对于将结从零电压状态切换出来的情况。模拟为虚拟相粒子从亚稳态井中逸出的过程，详细研究表明，当量子隧道效应对热激活占主导地位时，反常耗散在低温下会产生强烈影响。作为一种表现，发现了一种状态，其中对于实际电路参数，量子逃逸过程显着增强，随后是短电压脉冲并以高概率重新捕获。此类电路可用于检测微波光子或耗散量子退火过程。此外，该分析还为使用异常环境的非线性系统中的耗散动力学工程提供了通用框架。", "authors": [{"name": "Johannes Hauff"}, {"name": "Niklas Gaiser"}, {"name": "Joachim Ankerhold"}, {"name": "Dominik Maile"}], "featured_authors": [{"name": "Johannes Hauff"}, {"name": "Niklas Gaiser"}, {"name": "Joachim Ankerhold"}, {"name": "Dominik Maile"}], "author_count": 4}, {"id": "2607.11650", "category": "cond-mat", "title": "How do 3M Command strips work? A fracture mechanics approach", "abstract": "Removable adhesive systems such as 3M Command strips are designed to support substantial loads while allowing clean, damage-free removal from the substrate. These systems rely on a highly extensible adhesive strip that bonds strongly during use but releases when stretched, causing the adhesive layer to elongate and progressively debond from the surfaces. A central challenge in the design of stretch-release adhesives is therefore to maximize load-bearing capacity while minimizing the force required for removal. This study investigates the finite-deformation mechanics governing both load support and tape release in a hyperelastic stretch-release adhesive system, with particular focus on the 3M Command tape geometry. Explicit analytical expressions are derived for the energy release rate of interfacial cracks under both load-bearing and release conditions and are validated against $J$-integral evaluations from finite element simulations. The results show that the ratio of maximum supported load to release force scales linearly with the ratio of bonded length to adhesive thickness, which is typically very large. We also investigate geometry-driven alternating crack propagation between the backing and substrate interfaces, governing tape removal, by analytical solutions and simulations. Parametric studies of competing interfacial fracture toughnesses produce failure envelopes that provide a predictive framework for estimating release forces and unstable crack propagation in multilayer stretch-release adhesive systems.", "url": "https://arxiv.org/abs/2607.11650", "type": "理论+数值", "summary": "可移除粘合剂系统（例如 3M Command 胶条）旨在支撑大量负载，同时允许从基材上干净、无损坏地移除。这些系统依赖于高度可延伸的粘合带，该粘合带在使用过程中牢固粘合，但在​​拉伸时释放，导致粘合层伸长并逐渐从表面脱粘。因此，拉伸剥离粘合剂设计的一个核心挑战是最大限度地提高承载能力，同时最大限度地减少去除所需的力。本研究研究了超弹性拉伸剥离粘合剂系统中控制负载支撑和胶带剥离的有限变形力学，特别关注 3M Command 胶带几何形状。导出了在承载和释放条件下界面裂纹能量释放率的显式解析表达式，并根据有限元模拟的 $J$ 积分评估进行了验证。结果表明，最大支撑载荷与剥离力的比率与粘合长度与粘合剂厚度的比率成线性比例，该比率通常非常大。\n\n我们还通过分析解决方案和模拟研究了背衬和基材界面之间几何驱动的交替裂纹扩展，控制胶带的去除。竞争界面断裂韧性的参数研究产生了失效包络线，为估计多层拉伸剥离粘合剂系统中的剥离力和不稳定裂纹扩展提供了预测框架。", "authors": [{"name": "Xue-Ling Luo"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "featured_authors": [{"name": "Xue-Ling Luo"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "author_count": 3}, {"id": "2607.11661", "category": "cond-mat", "title": "Thermal phase transitions in a mixed-spin Ising model on the Lieb lattice: Exact results beyond zero magnetic field", "abstract": "We investigate the ground-state and finite-temperature properties of a mixed spin-1/2 and spin-1 Ising model on a decorated square (Lieb) lattice incorporating a uniaxial single-ion anisotropy and magnetic field. By employing the generalized decoration-iteration transformation, the model is mapped exactly onto an effective spin-1/2 Ising model on the square lattice characterized by an effective nearest-neighbor interaction and an effective field. The studied model consequently becomes exactly solvable even for finite values of the applied magnetic field whenever the effective field vanishes. The ground-state analysis reveals three distinct phases: ferrimagnetic phase (FRI), disordered phase (DP), and ferromagnetic (FM) phase. The ground-state boundary between FRI and DP phases gives rise to a dome-shaped surface of discontinuous thermal phase transitions, which is terminated by a line of Ising-type critical points associated with continuous thermal phase transitions. Both continuous and discontinuous thermal phase transitions belong to the exactly solvable parameter regime defined by a vanishing effective field in spite of the fact that the applied magnetic field is finite. Two consecutive discontinuous thermally-induced reentrant phase transitions DP-FRI-DP are identified in a narrow parameter region. The exact analytical predictions including reentrance, field- and thermally-driven phase transitions are independently verified by classical Monte Carlo simulations.", "url": "https://arxiv.org/abs/2607.11661", "type": "理论+数值", "summary": "我们研究了结合单轴单离子各向异性和磁场的装饰方形 (Lieb) 晶格上混合自旋 1/2 和自旋 1 Ising 模型的基态和有限温度特性。通过采用广义装饰迭代变换，该模型被精确地映射到以有效最近邻相互作用和有效场为特征的方晶格上的有效自旋1/2伊辛模型。因此，当有效场消失时，即使对于所施加磁场的有限值，所研究的模型也变得精确可解。基态分析揭示了三个不同的相：亚铁磁相 (FRI)、无序相 (DP) 和铁磁 (FM) 相。 FRI 和 DP 相之间的基态边界产生不连续热相变的圆顶形表面，其终止于与连续热相变相关的伊辛型临界点线。尽管所施加的磁场是有限的，连续和不连续的热相变都属于由消失的有效场定义的精确可解的参数范围。\n\n在狭窄的参数区域中识别出两个连续的不连续热致重入相变 DP-FRI-DP。包括重入、场驱动和热驱动相变在内的精确分析预测均通过经典蒙特卡罗模拟独立验证。", "authors": [{"name": "Jozef Strecka"}, {"name": "Katarina Karlova"}], "featured_authors": [{"name": "Jozef Strecka"}, {"name": "Katarina Karlova"}], "author_count": 2}, {"id": "2607.11662", "category": "cond-mat", "title": "Emergent quantum chaos from correlations on a random graph", "abstract": "This work demonstrates that sparse long-range random bonds on a one-dimensional lattice alone can generate quantum-chaotic spectral correlations and also drive a localization transition in a noninteracting single-particle Hamiltonian. The model is a one-dimensional ring in which each pair of sites is connected independently with a probability $p_{ij}= d_{ij}^{-(1+\\sigma)}$. Each bond carries identical unit hopping and on-site disorder is absent. Despite the absence of on-site disorder and interaction, the model displays quantum chaotic spectra with Gaussian orthogonal ensemble (GOE) level statistics at small $\\sigma$ and localized eigenstates with Poisson statistics at larger $\\sigma$. The transition occurs in the range $ 0.80 \\lesssim \\sigma_c \\lesssim 0.85$, far above the summability threshold of the mean hopping profile ($\\sigma=0$). A Gaussian field theory retaining only the mean and variance of the Bernoulli bonds instead predicts a threshold at $\\sigma=1$, suggesting that higher cumulants are infrared-relevant. Our findings hint towards a universality class that is distinct from both the power-law random banded matrix model and the standard Anderson transition.", "url": "https://arxiv.org/abs/2607.11662", "type": "理论", "summary": "这项工作证明，仅一维晶格上的稀疏长程随机键就可以产生量子混沌谱相关性，并且还可以驱动非相互作用单粒子哈密顿量中的局域化转变。该模型是一个一维环，其中每对站点以概率 $p_{ij}= d_{ij}^{-(1+\\sigma)}$ 独立连接。每个键都带有相同的单元跳跃并且不存在现场无序。尽管不存在现场无序和相互作用，该模型在小 $\\sigma$ 处显示具有高斯正交系综 (GOE) 级统计的量子混沌光谱，在较大 $\\sigma$ 处显示具有泊松统计的局域本征态。转变发生在 $ 0.80 \\lesssim \\sigma_c \\lesssim 0.85$ 范围内，远高于平均跳变曲线的可求和阈值 ($\\sigma=0$)。仅保留伯努利键的均值和方差的高斯场论预测阈值为 $\\sigma=1$，这表明较高的累积量与红外相关。我们的研究结果暗示了一个普遍性类别，它不同于幂律随机带状矩阵模型和标准安德森转变。", "authors": [{"name": "Mrinal Sarkar"}, {"name": "Valerio Pagni"}, {"name": "Tilman Enss"}, {"name": "Nicolò Defenu"}], "featured_authors": [{"name": "Mrinal Sarkar"}, {"name": "Valerio Pagni"}, {"name": "Tilman Enss"}, {"name": "Nicolò Defenu"}], "author_count": 4}, {"id": "2607.11669", "category": "cond-mat", "title": "Still life in a classic Blume-Capel model: pseudo-transitions in a spin-1 diamond chain", "abstract": "We exactly investigate the ground-state, magnetic, and thermodynamic properties of a spin-1 Blume-Capel diamond chain in a magnetic field by means of the transfer-matrix method. After establishing the complete ground-state phase diagram and characterizing each ground-state spin configuration, we examine the finite-temperature behavior in the vicinity of selected phase boundaries and triple points. It is demonstrated that an extremely small energy gap between a nondegenerate ground state and competing macroscopically degenerate low-lying excited states gives rise to entropically-driven pseudo-transitions. These pseudo-transitions manifest themselves through abrupt but continuous changes in the magnetization and entropy resembling discontinuous jumps, while the magnetic susceptibility and specific heat exhibit exceptionally sharp yet finite peaks resembling divergences. Our results provide the exact evidence that pseudo-transitions can also emerge in the classical spin-1 Blume-Capel model and thereby extend the class of one-dimensional spin systems known to display pseudo-transitions.", "url": "https://arxiv.org/abs/2607.11669", "type": "理论+数值", "summary": "我们通过转移矩阵方法精确研究了自旋 1 Blume-Capel 金刚石链在磁场中的基态、磁性和热力学性质。在建立完整的基态相图并表征每个基态自旋配置后，我们检查了选定相边界和三相点附近的有限温度行为。研究表明，非简并基态和竞争性宏观简并低位激发态之间的极小能隙会产生熵驱动的赝跃迁。这些赝跃迁通过磁化强度和熵的突然但连续的变化（类似于不连续跳跃）表现出来，而磁化率和比热表现出异常尖锐但有限的峰值（类似于发散）。我们的结果提供了确切的证据，证明赝跃迁也可以出现在经典的 spin-1 Blume-Capel 模型中，从而扩展了已知显示赝跃迁的一维自旋系统的类别。", "authors": [{"name": "Elham Shahhosseini Shahrabadi"}, {"name": "Majid Moradi"}, {"name": "Jozef Strecka"}], "featured_authors": [{"name": "Elham Shahhosseini Shahrabadi"}, {"name": "Majid Moradi"}, {"name": "Jozef Strecka"}], "author_count": 3}, {"id": "2607.11704", "category": "cond-mat", "title": "Thermodynamic bound on the Fano factor of a coherent thermoelectric heat engine", "abstract": "We show that for fermionic coherent thermoelectric transport, selecting heat-engine operation yields a thermodynamic uncertainty relation for the charge current that imposes a universal lower limit of $F > 1/2$ on the corresponding Fano factor. We find that violations of the thermodynamic uncertainty relation for classical Markov processes, typically associated with a quantum advantage, are far more restricted for heat engines than what is allowed by a generic thermodynamic process. For bosonic and classical carriers, the minimum Fano factor increases to $F > 1$, and the thermodynamic uncertainty relation for classical Markov processes is never violated. We provide numerical evidence that all the obtained bounds are tight and can be saturated by properly designed transmissions.", "url": "https://arxiv.org/abs/2607.11704", "type": "理论+数值", "summary": "我们表明，对于费米子相干热电输运，选择热机操作会产生充电电流的热力学不确定性关系，该关系对相应的 Fano 因子施加 $F > 1/2$ 的通用下限。我们发现，对于热机来说，违反经典马尔可夫过程的热力学不确定性关系（通常与量子优势相关）比一般热力学过程所允许的限制要严格得多。对于玻色子和经典载流子，最小 Fano 因子增加到 $F > 1$，并且经典马尔可夫过程的热力学不确定性关系永远不会被违反。我们提供的数值证据表明，所有获得的边界都是严格的，并且可以通过正确设计的传输来饱和。", "authors": [{"name": "Nahual Sobrino"}, {"name": "Rosario Fazio"}, {"name": "Matteo Acciai"}], "featured_authors": [{"name": "Nahual Sobrino"}, {"name": "Rosario Fazio"}, {"name": "Matteo Acciai"}], "author_count": 3}, {"id": "2607.11729", "category": "cond-mat", "title": "Exchange topology and criticality in ferrite and chromium spinels: a unified Monte Carlo analysis", "abstract": "We report a unified analysis of Metropolis Monte Carlo results for two families of magnetic spinels: inverse ferrites Fe$^{3+}_{A}$[M$^{2+}$Fe$^{3+}$]$_{B}$O$_4$ (M = Co, Cu, Fe, Ni), where superexchange couples two chemically distinct sublattices, and chromium spinels $A$Cr$_2X_4$ ($A$ = Zn, Cd, Hg, $X$ = S, Se) together with the breathing-lattice chromates Li$M$Cr$_4$O$_8$ ($M$ = Ga, In), where a single Cr$^{3+}$ species occupies a corner-sharing tetrahedral network. Placing the exchange constants, transition temperatures, critical exponents, hysteresis, and magnetocaloric responses of these systems on a common footing, we introduce two reduced quantities not previously reported: the ratio $\\theta_{\\mathrm{CW}}/T_C$ for the ferrites and the normalized ordering scale $t^{*}=k_BT_C/[J_1S(S+1)]$ for the chromium compounds. The ferrites cluster in the range $\\theta_{\\mathrm{CW}}/T_C = 0.94$-$1.19$, close to the mean-field expectation of unity and the signature of dominant, unfrustrated A-B superexchange, and their exponents ($\\beta = 0.20$-$0.26$, $\\gamma = 1.23$-$1.27$, $\\delta = 4.76$-$4.78$) follow the three-dimensional Ising class. The chromium systems split into three regimes: $t^{*} \\approx 1.4$-$1.9$ for Ising-treated sulfides, $t^{*} \\approx 0.99$ for Heisenberg-treated selenides, and $t^{*} \\approx 0.24$-$0.25$ for the antiferromagnetic breathing chromates, quantifying the combined suppression of $T_C$ by continuous spin symmetry and by geometric frustration. Finite-thickness simulations of Fe$_3$O$_4$ resolve a dimensionality crossover between two and four unit cells. We identify the Ising-versus-Heisenberg dependence of the predicted universality class in frustrated chromites as the principal open problem.", "url": "https://arxiv.org/abs/2607.11729", "type": "理论+数值", "summary": "我们报告了两个磁性尖晶石家族的 Metropolis Monte Carlo 结果的统一分析：反铁氧体 Fe$^{3+}_{A}$[M$^{2+}$Fe$^{3+}$]$_{B}$O$_4$ (M = Co, Cu, Fe, Ni)，其中超交换耦合两个化学上不同的亚晶格，以及铬尖晶石 $A$Cr$_2X_4$ ($A$ = Zn、Cd、Hg、$X$ = S、Se) 与呼吸晶格铬酸盐 Li$M$Cr$_4$O$_8$ ($M$ = Ga、In)，其中单个 Cr$^{3+}$ 物种占据共享角的四面体网络。将这些系统的交换常数、转变温度、临界指数、磁滞和磁热响应放在共同的基础上，我们引入了两个先前未报道的减少量：铁氧体的比率 $\\theta_{\\mathrm{CW}}/T_C$ 和铬化合物的归一化排序尺度 $t^{*}=k_BT_C/[J_1S(S+1)]$。铁氧体簇在 $\\theta_{\\mathrm{CW}}/T_C = 0.94$-$1.19$ 范围内，接近统一的平均场期望和占主导地位的、不受挫的 A-B 超级交换的签名，及其指数 ($\\beta = 0.20$-$0.26$, $\\gamma = 1.23$-$1.27$, $\\delta = 4.76$-$4.78$)遵循三维伊辛级。\n\n铬系统分为三种状态：对于伊辛处理的硫化物，$t^{*}\\约1.4$-$1.9$；对于海森堡处理的硒化物，$t^{*}\\约0.99$；对于反铁磁呼吸铬酸盐，$t^{*}\\约0.24$-$0.25$，量化连续自旋对$T_C$的组合抑制对称性和几何挫折。 Fe$_3$O$_4$ 的有限厚度模拟解决了两个和四个晶胞之间的维度交叉问题。我们将受挫铬铁矿中预测的普遍性类别的伊辛与海森堡依赖性确定为主要的开放问题。", "authors": [{"name": "Keltoum Khallouq"}, {"name": "Ayoub El Maazouzi"}, {"name": "Kamal Boumhara"}, {"name": "Rachid Masrour"}], "featured_authors": [{"name": "Keltoum Khallouq"}, {"name": "Ayoub El Maazouzi"}, {"name": "Kamal Boumhara"}, {"name": "Rachid Masrour"}], "author_count": 4}, {"id": "2607.11755", "category": "cond-mat", "title": "A Fokker-Planck approach to a stochastic multiplicative wealth model with taxation and redistribution", "abstract": "We develop a Fokker-Planck description of the dynamics of wealth distribution in a stochastic multiplicative economic growth model with taxation and redistribution, as introduced by P.M.C. de Oliveira. Extending the original formulation, our theoretical framework includes general redistribution protocols, encompassing a broad class of state-dependent transfer mechanisms. As a particular case, we investigate a two-state protocol designed to emulate conditional cash transfer programs. Analytical expressions for the stationary wealth distributions are derived, revealing how the interplay between multiplicative noise, taxation, and redistribution shapes the emergence of inequality. The theoretical results are corroborated by agent-based simulations. To quantify and compare the impact of the different protocols, we employ the Gini index as a measure of inequality. Our analysis highlights how specific nonuniform redistribution schemes can significantly mitigate wealth disparities.", "url": "https://arxiv.org/abs/2607.11755", "type": "理论+数值", "summary": "我们对带有税收和再分配的随机乘法经济增长模型中的财富分配动态进行了福克-普朗克描述，正如 P.M.C. 所介绍的那样。德奥利维拉。扩展原始的表述，我们的理论框架包括一般的重新分配协议，涵盖广泛的依赖于状态的传输机制。作为一个特殊案例，我们研究了一个旨在模拟有条件现金转移计划的两国协议。推导了固定财富分配的分析表达式，揭示了乘性噪声、税收和再分配之间的相互作用如何塑造不平等的出现。基于代理的模拟证实了理论结果。为了量化和比较不同协议的影响，我们采用基尼指数作为不平等的衡量标准。我们的分析强调了特定的非均匀再分配计划如何能够显着缩小财富差距。", "authors": [{"name": "Iago Nascimento Barros"}, {"name": "Marcelo Lobato Martins"}, {"name": "Celia Anteneodo"}], "featured_authors": [{"name": "Iago Nascimento Barros"}, {"name": "Marcelo Lobato Martins"}, {"name": "Celia Anteneodo"}], "author_count": 3}, {"id": "2607.11786", "category": "cond-mat", "title": "Correlation-renormalized spin-fluctuation pairing and the stabilization of $s_{\\pm}$ superconductivity in pressurized La$_3$Ni$_2$O$_7$", "abstract": "The superconducting gap symmetry of pressurized La$_3$Ni$_2$O$_7$ remains unsettled because conventional weak-coupling calculations often place the system close to competing sign-changing $s$- and $d$-wave instabilities. Using the four-orbital Wannier Hamiltonian of Xia et al., we combine single-site two-orbital dynamical mean-field theory (DMFT) with a self-energy-renormalized random-phase approximation (RPA). The central step is to replace the bare particle-hole bubble $G_0G_0$ of ordinary RPA by a $G_{\\rm DMFT}G_{\\rm DMFT}$ bubble, while keeping the same residual Slater--Kanamori interaction vertices. In the bare RPA benchmark, the leading pairing eigenvalue belongs to the $B_{2g}$ $d_{xy}$ channel. Once the DMFT self-energy is included, the hierarchy is reversed: the $A_{1g}$ sign-changing $s_{\\pm}$ state becomes dominant, the $B_{1g}$ $d_{x^2-y^2}$ channel is subleading, and the original $B_{2g}$ instability is strongly suppressed. Pocket-pair decomposition and orbital-resolved susceptibilities show that the reversal originates from orbital-selective renormalization of the $d_{3z^2-r^2}$ sector, which filters the $\\gamma$-pocket scattering processes that stabilize $d_{xy}$ pairing in bare RPA while preserving distributed inter-pocket processes favorable to $s_{\\pm}$ pairing. As an independent two-particle validation, we further compute the static spin susceptibility using the dual Bethe--Salpeter equation with the local DMFT vertex. The resulting susceptibility retains a broad finite-momentum magnetic response and is weak near $\\Gamma$, strengthening the spin-fluctuation background for the correlation-stabilized $s_{\\pm}$ state. Our results demonstrate that strong correlations are not a secondary correction in La$_3$Ni$_2$O$_7$: an appropriate treatment of correlation-renormalized quasiparticles is essential for predicting the superconducting pairing symmetry.", "url": "https://arxiv.org/abs/2607.11786", "type": "理论+数值", "summary": "加压 La$_3$Ni$_2$O$_7$ 的超导能隙对称性仍然不稳定，因为传统的弱耦合计算通常使系统接近竞争的符号变化 $s$ 和 $d$ 波不稳定性。利用 Xia 等人的四轨道 Wannier Hamiltonian，我们将单点二轨道动态平均场理论 (DMFT) 与自能重正化随机相位近似 (RPA) 结合起来。核心步骤是用 $G_{\\rm DMFT}G_{\\rm DMFT}$ 气泡替换普通 RPA 的裸粒子孔气泡 $G_0G_0$，同时保留相同的剩余 Slater-Kanamori 相互作用顶点。在裸 RPA 基准中，领先的配对特征值属于 $B_{2g}$ $d_{xy}$ 通道。一旦包含 DMFT 自能，层次结构就会反转：$A_{1g}$ 符号变换 $s_{\\pm}$ 状态成为主导，$B_{1g}$ $d_{x^2-y^2}$ 通道处于次主导地位，而原始的 $B_{2g}$ 不稳定性被强烈抑制。\n\n袋对分解和轨道分辨磁化率表明，逆转源于$d_{3z^2-r^2}$扇区的轨道选择性重正化，它过滤了$\\gamma$袋散射过程，稳定了裸RPA中的$d_{xy}$配对，同时保留了有利于$s_{\\pm}$配对的分布式口袋间过程。作为独立的双粒子验证，我们使用具有局部 DMFT 顶点的对偶 Bethe-Salpeter 方程进一步计算静态自旋敏感性。由此产生的磁化率保留了广泛的有限动量磁响应，并且在 $\\Gamma$ 附近较弱，增强了相关稳定 $s_{\\pm}$ 状态的自旋涨落背景。我们的结果表明，强相关性并不是 La$_3$Ni$_2$O$_7$ 中的二次修正：相关性重正化准粒子的适当处理对于预测超导配对对称性至关重要。", "authors": [{"name": "Shuhong Tang"}, {"name": "Liang-Jian Zou"}], "featured_authors": [{"name": "Shuhong Tang"}, {"name": "Liang-Jian Zou"}], "author_count": 2}, {"id": "2607.11799", "category": "cond-mat", "title": "Universal scalings and switching entropy in yield-stress fluids", "abstract": "Yield-stress fluids undergo a singular solid-to-liquid transition at a critical stress threshold. While conventionally investigated under steady shear, large-amplitude oscillatory tests force these materials to cyclically navigate between arrested and fluidized states. Here, we uncover a hidden universality in their non-linear oscillatory response: at sufficiently low frequencies their first-harmonic viscoelastic moduli collapse onto master curves against strain amplitude. This collapse reflects an invariant intra-cycle stress plateau, showing that the material rearranges almost instantaneously to maintain a constant stress state governed by a unique temporal trajectory of its relaxation time. We capture this phenomenology using a new fluidity model derived from a Lyapunov function exhibiting symmetry breaking. Our framework reveals that recoverable elastic energy, fragility, and the entropy produced during stress inversion are fundamentally intertwined, defining a single viscoplastic parameter that governs yielding abruptness and provides a novel thermomechanical foundation for the dynamic yield stress.", "url": "https://arxiv.org/abs/2607.11799", "type": "理论", "summary": "屈服应力流体在临界应力阈值下经历单一的固液转变。虽然传统上是在稳定剪切下进行研究，但大振幅振荡测试迫使这些材料在停滞状态和流化状态之间循环移动。在这里，我们发现了它们的非线性振荡响应中隐藏的普遍性：在足够低的频率下，它们的一次谐波粘弹性模量崩溃到针对应变幅度的主曲线上。这种塌陷反映了不变的循环内应力平台，表明材料几乎立即重新排列，以维持由其松弛时间的独特时间轨迹控制的恒定应力状态。我们使用从表现出对称性破缺的李亚普诺夫函数导出的新流动性模型来捕获这种现象。我们的框架揭示了可恢复弹性能、脆性和应力反演过程中产生的熵从根本上是相互交织的，定义了控制屈服突变的单个粘塑性参数，并为动态屈服应力提供了新颖的热机械基础。", "authors": [{"name": "Rajam Elancheliyan"}, {"name": "Jean Marc Fromental"}, {"name": "Edouard Chauveau"}, {"name": "Domenico Truzzolillo"}], "featured_authors": [{"name": "Rajam Elancheliyan"}, {"name": "Jean Marc Fromental"}, {"name": "Edouard Chauveau"}, {"name": "Domenico Truzzolillo"}], "author_count": 4}, {"id": "2607.11877", "category": "cond-mat", "title": "Slow is fast: raising barriers to accelerate thermal relaxation", "abstract": "For a reversible system relaxing to equilibrium, the obvious fastest strategy is to lower all kinetic barriers (open all gates). We find that such intuition holds at three levels: the all-open-gate strategy achieves the highest local conductance, it maximizes the instantaneous speed of approach in every $f$-divergence, and it simultaneously maximizes all relaxation eigenvalues. Nevertheless, we show that a counter-intuitive finite-time optimum lies beyond this intuition and operates at a fourth level, invisible to all three: eigenvector rotation. Noncommutativity enables timed schedules to reproject residual amplitudes across relaxation modes, thereby achieving faster relaxation. Optimal schedules are bang--bang. In our illustrative example, the best-found schedule also employs counter-gating, transiently raising selected barriers, and reduces the terminal residual by a factor of $130$ relative to all-open, and by $7$ relative to the best static landscape. A no-go theorem shows that noncommutativity is necessary: commuting generators collapse every schedule to a static time-averaged landscape, worse than the intuitive static control. In the reverse problem, the dual schedule preserves nonequilibrium free energy far more effectively than intuitively keeping all barriers at maximum heights. Whether accelerating or delaying relaxation, barrier control performs no work on the reduced Markov system; it only re-times a fixed total dissipation budget.", "url": "https://arxiv.org/abs/2607.11877", "type": "理论", "summary": "对于放松到平衡的可逆系统，明显最快的策略是降低所有动力障碍（打开所有大门）。我们发现这种直觉在三个层面上成立：全开门策略实现了最高的局部电导，它最大化了每个 $f$ 发散中的瞬时逼近速度，并且同时最大化了所有松弛特征值。然而，我们表明，反直觉的有限时间最优超出了这种直觉，并在第四个层次上运行，这对所有三个层次来说都是不可见的：特征向量旋转。非交换性使定时计划能够重新投影弛豫模式中的残余振幅，从而实现更快的弛豫。最佳的日程安排是非常好的。在我们的说明性示例中，找到的最佳时间表还采用了反门控，暂时提高了选定的障碍，并将终端残差相对于全开放减少了 130 美元，相对于最佳静态景观减少了 7 美元。不可行定理表明，非交换性是必要的：通勤发电机将每个时间表折叠成静态时间平均景观，这比直观的静态控制更糟糕。\n\n在相反的问题中，对偶时间表比直观地将所有障碍保持在最大高度更有效地保留非平衡自由能。无论加速还是延迟弛豫，屏障控制对约简马尔可夫系统都不起作用；它仅对固定的总耗散预算进行重新计时。", "authors": [{"name": "Yubo Wang"}, {"name": "Zhiyue Lu"}], "featured_authors": [{"name": "Yubo Wang"}, {"name": "Zhiyue Lu"}], "author_count": 2}, {"id": "2607.09847", "category": "hep-th", "title": "Carrollian limit of NS-NS and Heterotic Supergravity", "abstract": "We construct the Carrollian limit of NS--NS and heterotic supergravity through an ultra-relativistic expansion of the fields. An appropriate scaling of the dilaton renders the measure finite and compensates the divergences arising from the NS-NS supergravity Lagrangian, giving a finite action as $w\\rightarrow\\infty$. We then extend the construction to heterotic supergravity (neglecting fermions) by incorporating the non-Abelian gauge field together with the Green--Schwarz (GS) mechanism. The resulting theory contains a finite gauge sector consistently coupled to gravity, and the GS mechanism for the Carrollian 1-form field can be trivialized imposing field redefinitions. Then, we investigate the Carrollian equations of motion by both expanding the relativistic equations and deriving them from a variational principle. We also show that the leading $\\alpha'$-corrected $\\hat{\\rm Riem}^2$ contribution remains finite under a rescaling of the string parameter $\\alpha'\\rightarrow \\frac{\\alpha'_c}{w^2}$, opening further research towards the full four-derivative effective action. Finally, we discuss the potential connection with the worldsheet formalism of the Carrollian string theory.", "url": "https://arxiv.org/abs/2607.09847", "type": "理论", "summary": "我们通过场的超相对论扩展构建了 NS--NS 的卡罗尔极限和异质超引力。膨胀子的适当缩放使测量变得有限，并补偿 NS-NS 超重力拉格朗日产生的发散，给出有限作用 $w\\rightarrow\\infty$。然后，我们通过将非阿贝尔规范场与格林-施瓦茨（GS）机制结合起来，将结构扩展到异质超引力（忽略费米子）。由此产生的理论包含一个始终与重力耦合的有限规范扇区，并且卡罗尔 1 型场的 GS 机制可以通过施加场重新定义而变得简单。然后，我们通过扩展相对论方程并从变分原理推导它们来研究卡罗尔运动方程。我们还表明，在重新调整弦参数 $\\alpha'\\rightarrow \\frac{\\alpha'_c}{w^2}$ 下，领先的 $\\hat{\\rm Riem}^2$ 校正 $\\hat{\\rm Riem}^2$ 贡献仍然有限，从而开启了对完整四导数有效作用的进一步研究。最后，我们讨论与卡罗尔弦理论的世界表形式主义的潜在联系。", "authors": [{"name": "Romina Ballesteros"}, {"name": "Eric Lescano"}, {"name": "Sergio Patiño-López"}], "featured_authors": [{"name": "Romina Ballesteros"}, {"name": "Eric Lescano"}, {"name": "Sergio Patiño-López"}], "author_count": 3}, {"id": "2607.09879", "category": "hep-th", "title": "Anomaly cancellation for two $U(1)$ factors", "abstract": "We show that solving the abelian part of the local anomaly cancellation conditions for a 4-d gauge theory whose gauge Lie algebra has an abelian summand with rank $K \\geq 1$ is equivalent to the problem in algebraic/arithmetic geometry of finding $(K-1)$-dimensional projective linear subspaces of a cubic hypersurface over the rational numbers, where the cubic is determined by the data of the semisimple summand and the representation thereof carried by the Weyl fermions. We then use this reformulation to solve a variety of examples with rank 2. The simplest non-trivial example from physics, namely gauge Lie group $U(1)^2$ and six fermions, nevertheless has a rich (and well-studied) geometry: it corresponds to the Fano variety of lines in the Segre cubic primal threefold. This is a surface with 15 irreducible components that are planes (which correspond to lines lying in the 15 planes in the Segre cubic primal and which give rise to non-chiral fermions) and 6 components that are split del Pezzo surfaces of degree 5 (which give rise to chiral fermions). These components are all rational varieties, enabling all solutions to the anomaly cancellation conditions to be parametrized and their collective properties (e.g. their topology and asymptotic distribution) to be described.", "url": "https://arxiv.org/abs/2607.09879", "type": "理论", "summary": "我们证明，求解 4 维规范理论的局部异常消除条件的阿贝尔部分，其规范李代数具有秩为 $K \\geq 1$ 的阿贝尔被加数，相当于代数/算术几何中寻找有理数上三次超曲面的 $(K-1)$ 维射影线性子空间的问题，其中三次由半单被数的数据及其由韦尔费米子。然后，我们使用这个重新公式来求解各种秩为 2 的示例。物理学中最简单的非平凡示例，即规范李群 $U(1)^2$ 和六个费米子，仍然具有丰富的（且经过充分研究的）几何结构：它对应于 Segre 立方原始三重中的 Fano 线变体。该表面具有 15 个不可约分量，即平面（对应于 Segre 立方原初中 15 个平面中的线，产生非手性费米子）和 6 个 5 度分裂 del Pezzo 表面的分量（产生手性费米子）。\n\n这些组件都是有理变体，使得异常消除条件的所有解决方案都能够被参数化，并且它们的集体属性（例如它们的拓扑和渐近分布）能够被描述。", "authors": [{"name": "Ben Gripaios"}, {"name": "Khoi Le Nguyen Nguyen"}], "featured_authors": [{"name": "Ben Gripaios"}, {"name": "Khoi Le Nguyen Nguyen"}], "author_count": 2}, {"id": "2607.09935", "category": "hep-th", "title": "Bosonization versus the Nielsen-Ninomiya theorem", "abstract": "Thanks to bosonization, bosonic lattice models can offer a lattice regularization of chiral fermions. We construct chiral lattice fermion operators in the 2D modified Villain scalar model and evaluate their correlation functions. This microscopic bosonic model has an ultra-local action and an ultra-local symmetry that realizes the fermionic chiral symmetry under bosonization. The reconstructed lattice Dirac operator has no doublers, but is consistent with the Nielsen-Ninomiya theorem because it turns out to be non-local. The non-locality of this derived quantity at finite lattice spacing does not pose any obstructions to gauging the non-anomalous symmetries of the model, which is itself ultra-local.", "url": "https://arxiv.org/abs/2607.09935", "type": "理论", "summary": "由于玻色化，玻色子晶格模型可以提供手性费米子的晶格正则化。我们在二维修正的 Villain 标量模型中构造了手性晶格费米子算子并评估了它们的相关函数。这种微观玻色子模型具有超局域作用和超局域对称性，实现了玻色化下的费米子手性对称性。重建的格子狄拉克算子没有倍增器，但与尼尔森-二宫定理一致，因为它是非局部的。该导出量在有限晶格间距下的非定域性不会对测量模型的非反常对称性造成任何障碍，该模型本身就是超局域的。", "authors": [{"name": "Saif Ullah Baig"}, {"name": "Shi Chen"}, {"name": "Aleksey Cherman"}, {"name": "Maria Neuzil"}], "featured_authors": [{"name": "Saif Ullah Baig"}, {"name": "Shi Chen"}, {"name": "Aleksey Cherman"}, {"name": "Maria Neuzil"}], "author_count": 4}, {"id": "2607.10006", "category": "hep-th", "title": "Color-factor symmetry using perturbiner methods for tree-level amplitudes of Yang-Mills theory coupled to matter", "abstract": "Bern-Carrasco-Johansson relations are helicity-independent constraints among the partial amplitudes of tree-level processes containing gluons and possibly also matter fields. They are a consequence of color-kinematic duality, but alternatively can be derived using the color-factor symmetry of tree-level amplitudes. We use recursive perturbiner methods to present a general, streamlined proof of the color-factor symmetry of all tree-level amplitudes containing an arbitrary number of fundamental spin-zero or spin-one-half matter fields and at least one gluon.", "url": "https://arxiv.org/abs/2607.10006", "type": "理论", "summary": "Bern-Carrasco-Johansson 关系是包含胶子和可能还有物质场的树级过程的部分振幅之间的螺旋性无关的约束。它们是颜色运动二元性的结果，但也可以使用树级振幅的颜色因子对称性导出。我们使用递归微扰器方法来提出一种通用的、简化的证明，证明所有树级振幅的颜色因子对称性，其中包含任意数量的基本自旋零或自旋二分之一物质场和至少一个胶子。", "authors": [{"name": "Abigail R. Chriss"}, {"name": "Mia Karlsson"}, {"name": "Stephen G. Naculich"}], "featured_authors": [{"name": "Abigail R. Chriss"}, {"name": "Mia Karlsson"}, {"name": "Stephen G. Naculich"}], "author_count": 3}, {"id": "2607.10133", "category": "hep-th", "title": "Superspace invariants and 3-point correlators in 3d $\\mathcal{N}=3,4$ SCFTs", "abstract": "We use the auxiliary polarization spinor formalism together with superspace techniques to construct a complete and minimal list of 3-point invariant structures in three-dimensional superconformal field theories (SCFTs) with $\\mathcal{N}=3$ and $\\mathcal{N}=4$ superconformal symmetry. The existence of non-abelian $R$-symmetry for $\\mathcal{N}=3,4$ gives rise to novel invariant structures built from the antisymmetric invariant tensor. These invariants are used to enumerate the structural form of spinning 3-point correlators of general as well as conserved spinning superfield operators in 3d SCFTs. For conserved operators, we find that the $\\mathcal{N}=3$ correlators are fixed upto one parity-even and one parity-odd structure, while $\\mathcal{N}=4$ conserved correlators admit two parity-even structures and one parity-odd structure, with the second parity-even structure associated with mirror symmetry breaking.", "url": "https://arxiv.org/abs/2607.10133", "type": "理论", "summary": "我们使用辅助偏振旋量形式主义和超空间技术，在具有 $\\mathcal{N}=3$ 和 $\\mathcal{N}=4$ 超共形对称性的三维超共形场论（SCFT）中构建完整且最小的 3 点不变结构列表。 $\\mathcal{N}=3,4$ 的非阿贝尔 $R$ 对称性的存在产生了由反对称不变张量构建的新颖的不变结构。这些不变量用于枚举 3d SCFT 中一般旋转超场算子以及守恒旋转超场算子的旋转 3 点相关器的结构形式。对于保守算子，我们发现$\\mathcal{N}=3$相关器固定为一个奇偶校验结构和一个奇偶校验结构，而$\\mathcal{N}=4$保守相关器允许两个奇偶校验结构和一个奇偶校验结构，第二个奇偶校验结构与镜像对称破缺相关。", "authors": [{"name": "Aditya Jain"}, {"name": "Amin A. Nizami"}], "featured_authors": [{"name": "Aditya Jain"}, {"name": "Amin A. Nizami"}], "author_count": 2}, {"id": "2607.10448", "category": "hep-th", "title": "D-branes in $AdS_2 \\times H^2 \\times H^2$ under the non-Abelian T-duality", "abstract": "We proceed to construct a non-Abelian dual pair for the $AdS_2 \\times H^2 \\times H^2$ background by applying the non-Abelian T-duality (here as Poisson-Lie T-duality on a semi-Abelian double). By using a certain parameterization of the $6$-dimensional Lie group ${A}_2 \\otimes {A}_2 \\otimes A_2$ we construct the original $\\sigma$-model including the $AdS_2 \\times H^2 \\times H^2$ metric in the absence of $B$-field. It is shown that the dual background constructed by means of the Poisson-Lie T-duality is supported by a $B$-field and a metric whose contains a physical singularity. By studying the behavior of the dual spacetime at small $(r , y, u)$ coordinates, we show that the dual metric with a zero field strength and a non-trivial dilaton field make up a solution for the vanishing of the one-loop beta-function equations. Furthermore, at large $(r , y, u)$, it is shown that the $AdS_2 \\times H^2 \\times H^2$ solution is preserved under the non-Abelian T-duality. Finally, using the duality map obtained from the canonical transformation description of the Poisson-Lie T-duality for the gluing matrix which locally defines the properties of the D-brane, we find seven different cases of the gluing matrices for the $AdS_2 \\times H^2 \\times H^2$ $\\sigma$-model and its dual pair. In this way, it is found a symmetric duality action on the branes linking together in a duality chain.", "url": "https://arxiv.org/abs/2607.10448", "type": "理论", "summary": "我们继续通过应用非阿贝尔 T 对偶性（此处为半阿贝尔双偶上的泊松李 T 对偶）为 $AdS_2 \\times H^2 \\times H^2$ 背景构建非阿贝尔对偶对。通过使用 $6$ 维李群 ${A}_2 \\otimes {A}_2 \\otimes A_2$ 的某种参数化，我们构建了原始 $\\sigma$ 模型，包括在没有 $B$ 字段的情况下的 $AdS_2 \\times H^2 \\times H^2$ 度量。结果表明，通过泊松李 T 对偶性构造的对偶背景得到 $B$ 场和包含物理奇点的度量的支持。通过研究小 $(r , y, u)$ 坐标处对偶时空的行为，我们证明了具有零场强和非平凡膨胀场的对偶度量构成了单环 beta 函数方程消失的解。此外，在大 $(r , y, u)$ 处，$AdS_2 \\times H^2 \\times H^2$ 解在非阿贝尔 T 对偶性下得以保留。\n\n最后，使用从局部定义 D 膜属性的粘合矩阵的泊松李 T-对偶性的规范变换描述获得的对偶图，我们发现 $AdS_2 \\times H^2 \\times H^2$ $\\sigma$ 模型及其对偶对的粘合矩阵的七种不同情况。通过这种方式，发现了对偶链中连接在一起的膜的对称对偶作用。", "authors": [{"name": "Ali Eghbali"}], "featured_authors": [{"name": "Ali Eghbali"}], "author_count": 1}, {"id": "2607.10454", "category": "hep-th", "title": "Krylov Complexity for Time-Dependent Hamiltonians", "abstract": "We investigate Krylov spread complexity for states evolving under time-dependent Hamiltonians. For periodically driven systems, we formulate the problem within Floquet theory and show how the Magnus expansion provides a systematic approximation when the Floquet Hamiltonian is not available in closed form. We then extend this framework beyond periodic driving and demonstrate that, in addition to the globally truncated Magnus expansion, a piecewise Magnus expansion provides a reliable method when the global expansion loses convergence or accuracy. Our results provide practical tools for analyzing complexity growth in a broad class of time-dependent quantum systems.", "url": "https://arxiv.org/abs/2607.10454", "type": "理论", "summary": "我们研究了在依赖时间的哈密顿量下演化的状态的克雷洛夫传播复杂性。对于周期性驱动系统，我们在 Floquet 理论中阐述了该问题，并展示了当 Floquet 哈密顿量不以封闭形式提供时，马格努斯展开式如何提供系统逼近。然后，我们将该框架扩展到周期性驱动之外，并证明，除了全局截断的马格努斯展开之外，分段马格努斯展开在全局展开失去收敛或准确性时提供了可靠的方法。我们的结果为分析一类与时间相关的量子系统中的复杂性增长提供了实用的工具。", "authors": [{"name": "Amin Faraji Astaneh"}, {"name": "Parsa Kafashi"}], "featured_authors": [{"name": "Amin Faraji Astaneh"}, {"name": "Parsa Kafashi"}], "author_count": 2}, {"id": "2607.10561", "category": "hep-th", "title": "Quantum Horizon and Quantum Membrane Paradigm from Black Hole Quantum Mechanics", "abstract": "We develop a microscopic quantum membrane paradigm from the matrix quantum mechanics of black holes [1]. It was proposed that a quantum black hole is described by a fuzzy sphere together with a half-filled Fermi sea of horizon partons. We show that the topology of the fuzzy sphere induces a Berry monopole, providing a microscopic origin for the monopole appearing in the tunneling description of the decay of quantum black hole. Because the partons couple to the fuzzy sphere as fundamental degrees of freedom, they are sensitive to this monopole and form Lowest-Landau-Level (LLL) states rather than ordinary propagating two-dimensional fermions. Their guiding-center dynamics generates Ohmic, Hall, and polarization currents on the horizon. To couple these currents to an external electromagnetic field, we introduce a two-block matrix configuration comprising black-hole, environmental, and bifundamental link sectors. Off-diagonal link modes become tachyonic near the fuzzy sphere and condense, dynamically locking the horizon gauge field to the boundary value of the external Maxwell field. The parton current thereby becomes a physical boundary source for the exterior field. Our construction replaces the fictitious membrane of the classical paradigm with a dynamical quantum membrane populated by microscopic LLL degrees of freedom. The resulting boundary condition generalizes the classical ingoing membrane condition and yields explicit quantum, frequency-dependent, and helicity-dependent corrections, offering a possible probe of the microscopic quantum structure of the horizon.", "url": "https://arxiv.org/abs/2607.10561", "type": "理论", "summary": "我们根据黑洞矩阵量子力学开发了一种微观量子膜范式 [1]。有人提出，量子黑洞可以用模糊球体和半填充的费米视界部分子海来描述。我们证明了模糊球体的拓扑结构会产生贝里单极子，为量子黑洞衰变的隧道描述中出现的单极子提供了微观起源。由于部分子作为基本自由度耦合到模糊球体，因此它们对单极子敏感并形成最低朗道能级 (LLL) 状态，而不是普通传播的二维费米子。它们的引导中心动力学在地平线上产生欧姆电流、霍尔电流和极化电流。为了将这些电流耦合到外部电磁场，我们引入了由黑洞、环境和双基本链接部分组成的双块矩阵配置。非对角线链接模式在模糊球体附近变成快子并凝聚，动态地将地平规场锁定到外部麦克斯韦场的边界值。因此，部分子电流成为外部场的物理边界源。\n\n我们的结构用由微观 LLL 自由度填充的动态量子膜取代了经典范式的虚拟膜。由此产生的边界条件概括了经典的进入膜条件，并产生显式的量子、频率相关和螺旋度相关的校正，为视界的微观量子结构提供了可能的探测。", "authors": [{"name": "Chong-Sun Chu"}], "featured_authors": [{"name": "Chong-Sun Chu"}], "author_count": 1}, {"id": "2607.10663", "category": "hep-th", "title": "Certified boundary-magic witness for state-dependent proto-area in a holographic code", "abstract": "We study a four-qubit product-EPR holographic code whose reconstructing region contains matter and one leg of a geometry bond. Seven deformations compare local, bipartite, bond-stabilizing, and bond-moving operators. Exact spectra show that only matter-controlled bond motion produces a leading quadratic logical-state dependence of the boundary entropy. We select one state-independent physical recovery by optimizing coherent information of the channel Choi state. A separate semidefinite program maximizes entanglement fidelity over all channels. At fixed coupling the physical recovery attains that optimum to numerical precision, while recovered-entropy subtraction leaves a nonzero variational proto-area response. Total stabilizer Renyi magic is also nonzero for deformations with no boundary response, so it does not characterize the effect. Projecting the exact stabilizer-Renyi quadratic form away from pairwise Pauli tangents defines a leading-order boundary witness. Its global convex minimum is positive for the bond-moving deformation and zero for the six comparisons. For the reference-matter-geometry resource partition, however, pairwise tangents span the full projective tangent space at the product-EPR base, so the witness vanishes for every Hermitian deformation. A two-bound extension retains this degeneracy but exhibits a split-geometry structural residual and a logical-state-dependent cut switch. These results establish a finite-code witness, not a universal magic law or continuum gravitational dynamics.", "url": "https://arxiv.org/abs/2607.10663", "type": "理论", "summary": "我们研究了一种四量子位产品 EPR 全息码，其重建区域包含物质和几何键的一条腿。七个变形比较局部、二分、键稳定和键移动算子。精确的光谱表明，只有物质控制的键运动才会产生边界熵的主要二次逻辑状态依赖性。我们通过优化信道 Choi 状态的相干信息来选择一种与状态无关的物理恢复。单独的半定程序可最大限度地提高所有通道上的纠缠保真度。在固定耦合下，物理恢复达到最佳的数值精度，而恢复熵减法则留下非零变分原面积响应。对于没有边界响应的变形，总稳定器 Renyi 魔法也是非零的，因此它不表征效果。将精确的稳定器-Renyi 二次形式投影到远离成对泡利切线的位置定义了主序边界见证。其全局凸最小值对于键移动变形为正，对于六次比较为零。\n\n然而，对于参考物质几何资源划分，成对切线跨越产品 EPR 基础处的完整射影切线空间，因此对于每个埃尔米特变形，见证都会消失。二界延伸保留了这种简并性，但表现出分裂几何结构残差和逻辑状态依赖的切割开关。这些结果建立了有限代码见证，而不是普遍的魔法定律或连续引力动力学。", "authors": [{"name": "Luis Lozano"}], "featured_authors": [{"name": "Luis Lozano"}], "author_count": 1}, {"id": "2607.10906", "category": "hep-th", "title": "The Euler-Heisenberg action for a $U(1)\\times U(1)$ dyon quantum electrodynamics", "abstract": "The one-loop effective Lagrangian of quantum electrodynamics for dyons (dQED) with a $U(1) \\times U(1)$ gauge symmetry is derived using the Schwinger proper-time method. We identify the analog of the Schwinger pair-production limit and compute the corresponding nonlinear equations of motion. The electromagnetic response of the model is analyzed by linearizing the equations of motion around a purely magnetic background. From the resulting plane-wave solutions, we obtain the effective permittivity and permeability tensors, along with the associated dispersion relations and refractive indices for parallel and perpendicular polarization modes. The refractive indices involve hybrid superpositions of both gauge sectors, as illustrated in the symmetric case $q_{(1)} = q_{(2)}$. In this background, the model exhibits vacuum birefringence, indicating that the quantum vacuum behaves as an anisotropic medium. All results consistently reduce to the standard Euler-Heisenberg predictions of QED when the magnetic charge vanishes.", "url": "https://arxiv.org/abs/2607.10906", "type": "理论", "summary": "使用 Schwinger 原时方法导出具有 $U(1) \\times U(1)$ 规范对称性的单环有效拉格朗日量子电动力学 (dQED)。我们确定了施温格对生产极限的模拟并计算相应的非线性运动方程。通过对纯磁背景周围的运动方程进行线性化来分析模型的电磁响应。从所得的平面波解中，我们获得了有效介电常数和磁导率张量，以及相关的色散关系和平行和垂直偏振模式的折射率。折射率涉及两个规范扇区的混合叠加，如对称情况 $q_{(1)} = q_{(2)}$ 所示。在此背景下，该模型表现出真空双折射，表明量子真空表现为各向异性介质。当磁荷消失时，所有结果一致地降低到 QED 的标准欧拉-海森堡预测。", "authors": [{"name": "D.O.R. Azevedo"}, {"name": "T.S. Dias"}, {"name": "E.D. Pereira"}], "featured_authors": [{"name": "D.O.R. Azevedo"}, {"name": "T.S. Dias"}, {"name": "E.D. Pereira"}], "author_count": 3}, {"id": "2607.10921", "category": "hep-th", "title": "Krylov Complexity from Loschmidt Amplitude", "abstract": "Krylov complexity is a powerful diagnostic of quantum dynamics, with clear connections to other measures of quantum chaos and operator growth. One such measure is the Loschmidt amplitude, defined as the overlap of initially identical states evolved under two slightly different Hamiltonians. Its decay in certain systems is controlled by the classical Lyapunov exponent. Using the algebraic properties of the Krylov complexity operator, we express Krylov complexity as the derivative of a Loschmidt amplitude whose perturbation is parameterized by an angular variable $\\phi$. This formulation allows us to define a spectral propagator that encodes the entire complexity distribution, which we characterize for specific types of systems. We study the two-dimensional quantum geometry spanned by time and $\\phi$ where the original and deformed trajectories reside, demonstrating that Krylov complexity is upper-bounded by its volume. We also express the time derivative of Krylov complexity in terms of a distinct Loschmidt amplitude. Depending on the growth of the Lanczos coefficients, the perturbation term in this amplitude can be truncated. We propose that the strength of this perturbation provides a classification scheme for Krylov complexity dynamics and relate it to the $\\phi$-derivative of the spectral propagator. Using this analytical framework, we derive general relations between the time-dependence of the survival amplitude and Krylov space measures.", "url": "https://arxiv.org/abs/2607.10921", "type": "理论", "summary": "克雷洛夫复杂度是量子动力学的有力诊断，与量子混沌和算子增长的其他度量有着明确的联系。其中一种度量是洛施密特振幅，定义为在两个略有不同的哈密顿量下演化的最初相同状态的重叠。它在某些系统中的衰变由经典李雅普诺夫指数控制。利用 Krylov 复杂度算子的代数性质，我们将 Krylov 复杂度表示为 Loschmidt 幅度的导数，其扰动由角度变量 $\\phi$ 参数化。这个公式使我们能够定义一个对整个复杂性分布进行编码的谱传播器，我们可以针对特定类型的系统来表征该复杂性分布。我们研究了由时间和原始轨迹和变形轨迹所在的 $\\phi$ 跨越的二维量子几何，证明克雷洛夫复杂度以其体积为上限。我们还用不同的洛施密特振幅来表达克雷洛夫复杂度的时间导数。根据 Lanczos 系数的增长，可以截断该幅度的扰动项。\n\n我们提出，这种扰动的强度为 Krylov 复杂度动力学提供了一种分类方案，并将其与谱传播器的 $\\phi$ 导数联系起来。使用这个分析框架，我们得出了生存幅度的时间依赖性与克雷洛夫空间测量之间的一般关系。", "authors": [{"name": "Debarghya Chakraborty"}], "featured_authors": [{"name": "Debarghya Chakraborty"}], "author_count": 1}, {"id": "2607.10981", "category": "hep-th", "title": "Revisiting wormhole-induced global symmetry breaking", "abstract": "It is widely believed that global symmetries cannot exist in a consistent theory of quantum gravity. A prominent mechanism underlying this expectation is provided by gravitational instantons or Euclidean wormholes, whose contributions to the Euclidean path integral generates local symmetry-breaking operators in the effective action with couplings parametrized by the $\\alpha$-parameters $\\overrightarrow{\\alpha}=(\\alpha_1^{},\\alpha_2^{},\\cdots)$. The appearance of these $\\alpha$-parameters is often taken as evidence that wormholes explicitly break global symmetries. In this paper, we argue that this conclusion is premature. The fate of the symmetry is determined by the ensemble average over these $\\alpha$-parameters. We show that, under broad situations, this average can be sharply dominated by the symmetric point $\\overrightarrow{\\alpha}=0$, while contributions from other symmetry-breaking critical points $\\overrightarrow{\\alpha}\\neq 0$ are typically suppressed by a doubly exponential factor $\\exp(-e^{2S_{\\rm ins}})$, where $S_{\\rm ins}$ is the instanton action. In particular, standard $\\mathrm{U}(1)^{}$ Peccei--Quinn models fall into this class, implying that the conventional axion quality problem does not arise in the wormhole-induced effective theory. Our analysis is formulated for general $\\mathrm{U}(1)^{}$ $p$-form global symmetries.", "url": "https://arxiv.org/abs/2607.10981", "type": "理论", "summary": "人们普遍认为，全局对称性不可能存在于一致的量子引力理论中。这一期望背后的一个重要机制是由引力瞬子或欧几里德虫洞提供的，它们对欧几里德路径积分的贡献在与$\\alpha$-参数$\\overrightarrow{\\alpha}=(\\alpha_1^{},\\alpha_2^{},\\cdots)$参数化的耦合的有效作用中生成局部对称破缺算子。这些 $\\alpha$ 参数的出现通常被视为虫洞明确破坏全局对称性的证据。在本文中，我们认为这个结论还为时过早。对称性的命运由这些 $\\alpha$ 参数的整体平均值决定。我们表明，在广泛的情况下，该平均值可能会受到对称点 $\\overrightarrow{\\alpha}=0$ 的强烈支配，而来自其他对称破缺临界点 $\\overrightarrow{\\alpha}\\neq 0$ 的贡献通常会受到双指数因子 $\\exp(-e^{2S_{\\rm ins}})$ 的抑制，其中 $S_{\\rm ins}$ 是瞬子作用。\n\n特别是，标准 $\\mathrm{U}(1)^{}$ Peccei--Quinn 模型属于此类，这意味着在虫洞诱导有效理论中不会出现传统的轴子质量问题。我们的分析是针对一般 $\\mathrm{U}(1)^{}$ $p$ 形式的全局对称性制定的。", "authors": [{"name": "Kiyoharu Kawana"}], "featured_authors": [{"name": "Kiyoharu Kawana"}], "author_count": 1}, {"id": "2607.11108", "category": "hep-th", "title": "A TQFT perspective on satellite constructions and toral decompositions", "abstract": "We consider the classical satellite and splice constructions of knot theory from the perspective of link-complement states in three-dimensional topological quantum field theory (TQFT). These states are prepared by a TQFT on a link-complement manifold, namely a manifold with multiple disjoint torus boundaries, obtained by removing a thickened link from a closed ambient three-manifold. In this setting, satellite and splice constructions are realized by gluing manifolds along torus boundaries, and the TQFT assigns to these building blocks multilinear operators acting on the corresponding torus Hilbert spaces. We give explicit prescriptions for these operators and show how they can be used to build link-complement states. This construction is closely related to the JSJ decomposition of link-complement manifolds. While splicing builds manifolds by gluing along tori, the JSJ decomposition cuts a manifold along essential tori into canonical pieces. From the TQFT point of view, this expresses a link-complement state as a network of elementary operators associated with the JSJ pieces. We illustrate this framework by studying the entanglement entropy of Seifert-fibered link complements, Hopf-chain complements, and complements of Whitehead-doubled Hopf chains, showing how their different JSJ structures lead to distinct entanglement patterns.", "url": "https://arxiv.org/abs/2607.11108", "type": "理论", "summary": "我们从三维拓扑量子场论（TQFT）中的链路补态的角度考虑结理论的经典卫星和剪接结构。这些状态是通过在链接补流形上进行 TQFT 来准备的，即具有多个不相交环面边界的流形，通过从封闭的环境三流形中删除加厚的链接来获得。在此设置中，卫星和拼接结构是通过沿环面边界粘合流形来实现的，并且 TQFT 为这些构建块分配作用于相应环面希尔伯特空间的多线性算子。我们为这些运算符给出了明确的规定，并展示了如何使用它们来构建链接补码状态。这种构造与链补流形的
