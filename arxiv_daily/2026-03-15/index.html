s": [{"name": "Dimitrios Karamitros"}, {"name": "Thomas McKelvey"}, {"name": "Snehit Panghal"}, {"name": "Apostolos Pilaftsis"}], "featured_authors": [{"name": "Dimitrios Karamitros"}, {"name": "Thomas McKelvey"}, {"name": "Snehit Panghal"}, {"name": "Apostolos Pilaftsis"}], "author_count": 4}, {"id": "2603.12088", "category": "quant-ph", "title": "Climbing the Clifford Hierarchy", "abstract": "The Clifford Hierarchy has been a central topic in quantum computation due to its strong connections with fault-tolerant quantum computation, magic state distillation, and more. Nevertheless, only sections of the hierarchy are fully understood, such as diagonal gates and third level gates. The diagonal part of the hierarchy can be climbed by taking square roots and adding controls. Similarly, square roots of Pauli gates (first level) are Clifford gates (climb to the second level). Based on this theme, we study gates whose square roots climb to the next level. In particular, we fully characterize Clifford gates whose square roots climb to the third level.", "url": "https://arxiv.org/abs/2603.12088", "type": "理论", "summary": "由于与容错量子计算、魔法状态蒸馏等密切相关，Clifford 层次结构一直是量子计算的中心主题。然而，只有层次结构的部分被完全理解，例如对角线门和第三层门。层次结构的对角部分可以通过求平方根和添加控件来攀爬。同样，保利门（第一层）的平方根是克利福德门（爬到第二层）。基于这个主题，我们研究平方根上升到下一个级别的门。特别是，我们充分描述了克利福德门的平方根上升到第三层的特征。", "authors": [{"name": "Luca Bastioni"}, {"name": "Samuel Glandon"}, {"name": "Tefjol Pllaha"}, {"name": "Madison Stewart"}, {"name": "Phillip Waitkevich"}], "featured_authors": [{"name": "Luca Bastioni"}, {"name": "Samuel Glandon"}, {"name": "Tefjol Pllaha"}, {"name": "Madison Stewart"}, {"name": "Phillip Waitkevich"}], "author_count": 5}, {"id": "2603.12114", "category": "quant-ph", "title": "Measurement-Induced State transitions in Inductively-Shunted Transmons", "abstract": "Fast and high-fidelity qubit measurement plays a key role in quantum error correction. In superconducting qubits, measurement is typically performed using a resonant microwave drive on a readout resonator dispersively coupled to the qubit. Shorter measurement times require larger numbers of photons populating the readout resonator, which ultimately leads to undesired measurementinduced state transitions (MIST) of the qubit. MIST can be particularly problematic because these transitions often leave the qubit in a high energy state, and the MIST locations in readout parameter space drift as a function of qubit offset charge. In transmon qubits, these drifts have been avoided using very large qubit-resonator detunings or dedicated offset charge biases. In this work, we take an alternative approach and add an inductive shunt to the transmon to eliminate the offset charge dependence and stabilize the MIST. We experimentally characterize MIST in several different inductively-shunted transmons, in agreement with quantum and semiclassical models for MIST. These results extend to other inductively-shunted qubits.", "url": "https://arxiv.org/abs/2603.12114", "type": "实验", "summary": "快速、高保真度的量子位测量在量子纠错中发挥着关键作用。在超导量子位中，通常使用谐振微波驱动器在色散耦合到量子位的读出谐振器上执行测量。较短的测量时间需要更多数量的光子填充读出谐振器，这最终会导致量子位出现不需要的测量诱导状态转换 (MIST)。 MIST 可能特别成问题，因为这些转变通常使量子位处于高能状态，并且读出参数空间中的 MIST 位置会随着量子位偏移电荷的变化而漂移。在传输量子位中，使用非常大的量子位谐振器失谐或专用的偏移电荷偏置可以避免这些漂移。在这项工作中，我们采用替代方法，在 transmon 中添加一个电感分流器，以消除偏移电荷依赖性并稳定 MIST。我们通过实验表征了几种不同的感应分流传输转换器中的 MIST，与 MIST 的量子和半经典模型一致。这些结果扩展到其他感应分流量子位。", "authors": [{"name": "Nicholas Zobrist"}, {"name": "John Mark Kreikebaum"}, {"name": "Mostafa Khezri"}, {"name": "Sergei V. Isakov"}, {"name": "Brian J. Lester"}, {"name": "Yaxing Zhang"}, {"name": "Agustin Di Paolo"}, {"name": "Daniel Sank"}, {"name": "W. Clarke Smith"}], "featured_authors": [{"name": "Nicholas Zobrist"}, {"name": "John Mark Kreikebaum"}, {"name": "Mostafa Khezri"}, {"name": "Agustin Di Paolo"}, {"name": "Daniel Sank"}, {"name": "W. Clarke Smith"}], "author_count": 9}, {"id": "2603.12127", "category": "quant-ph", "title": "The Geometry of Clifford Algorithms: Bernstein-Vazirani as Classical Computation in a Rotated Basis", "abstract": "The Bernstein-Vazirani (BV) algorithm is frequently taught as a canonical example of quantum parallelism, yet the standard interference-based explanation often obscures its underlying simplicity. We present a geometric reframing in which the Hadamard gate \"wrapping\" acts as a global basis rotation rather than a generator of computational complexity. This perspective reveals that the algorithm is effectively a classical linear computation over GF(2) performed in the conjugate Fourier basis, with the apparent parallelism arising from coordinate transformation. Building on Mermin's earlier pedagogical shortcut, which presented a 'classical' circuit equivalent but stopped short of explicitly labeling it as such, we elevate this to a formal geometric framework. In the extension, we distinguish between globally rotated circuits--which we reveal as classical linear computations--and topologically twisted circuits that generate quantum entanglement. We introduce a pedagogical taxonomy distinguishing (1) pure computational-basis circuits, (2) globally rotated circuits (exemplified by Bernstein-Vazirani), and (3) topologically twisted circuits involving non-aligned subsystem bases. This framework allows viewing the Gottesman-Knill theorem from a new angle, extends students' understanding of phase kickback and the 'Ricochet Property'. Furthermore, it provides a more intuitive starting point for explaining Bell-pair extensions through concrete circuit derivations and Qiskit simulations suitable for undergraduate quantum information courses. The outlook explores how this geometric view paves the way for understanding entanglement as topological twists.", "url": "https://arxiv.org/abs/2603.12127", "type": "理论+数值", "summary": "Bernstein-Vazirani (BV) 算法经常被视为量子并行性的典型示例，但基于干扰的标准解释常常掩盖了其潜在的简单性。我们提出了一种几何重构，其中哈达玛门“包裹”充当全局基础旋转，而不是计算复杂性的生成器。从这个角度来看，该算法实际上是在共轭傅立叶基上执行的 GF(2) 的经典线性计算，具有由坐标变换产生的明显并行性。在 Mermin 早期的教学捷径的基础上，我们将其提升为正式的几何框架，该捷径提出了“经典”电路等效项，但没有明确标记它。在扩展中，我们区分了全局旋转电路（我们将其揭示为经典线性计算）和产生量子纠缠的拓扑扭曲电路。我们引入了一种教学分类法，区分（1）纯计算基础电路，（2）全局旋转电路（以 Bernstein-Vazirani 为例），以及（3）涉及非对齐子系统基础的拓扑扭曲电路。\n\n该框架允许从新的角度查看 Gottesman-Knill 定理，扩展学生对相位反冲和“跳弹特性”的理解。此外，它还通过适合本科量子信息课程的具体电路推导和 Qiskit 模拟来解释贝尔对扩展提供了更直观的起点。该展望探讨了这种几何视图如何为将纠缠理解为拓扑扭曲铺平道路。", "authors": [{"name": "Bartosz Chmura"}], "featured_authors": [{"name": "Bartosz Chmura"}], "author_count": 1}, {"id": "2603.12130", "category": "quant-ph", "title": "Entanglement cost of bipartite quantum channel discrimination under positive partial transpose operations", "abstract": "Quantum channel discrimination is a fundamental task in quantum information processing. In the one-shot regime, discrimination between two candidate channels is characterized by the diamond norm. Beyond this basic setting, however, many scenarios in distributed quantum information processing remain unresolved, motivating notions of distinguishability that capture the power of the available resources. In this work, we formulate a theory of testers for bipartite channel discrimination, leading to the concept of the entanglement cost of bipartite channel discrimination: the minimum Schmidt rank $k$ of a shared maximally entangled state required for local protocols to achieve the globally optimal success probability. We introduce $k$-injectable testers as a tester-based description of entanglement-assisted local discrimination and, in particular, study the class of $k$-injectable positive-partial-transpose (PPT) testers, which constitutes a numerically tractable relaxation of the practically relevant class of LOCC testers. For every $k$, we derive a semidefinite program (SDP) for the optimal success probability, which in turn yields an efficiently computable one-shot PPT entanglement cost. To render these optimization problems numerically feasible, we prove a symmetry-reduction principle for covariant channel pairs, thereby reducing the effective dimension of the associated SDPs. Finally, by dualizing the SDP, we derive bounds on the composite channel-discrimination problem and illustrate our framework with proof-of-principle examples based on the depolarizing channel, the depolarized SWAP channel, and the Werner--Holevo channels.", "url": "https://arxiv.org/abs/2603.12130", "type": "理论+数值", "summary": "量子通道辨别是量子信息处理中的一项基本任务。在一次性机制中，两个候选通道之间的区分以钻石范数为特征。然而，除了这个基本设置之外，分布式量子信息处理中的许多场景仍然悬而未决，激发了捕捉可用资源力量的可区分性概念。在这项工作中，我们制定了二分通道辨别的测试者理论，引出了二分通道辨别的纠缠成本的概念：本地协议实现全局最优成功概率所需的共享最大纠缠状态的最小施密特等级 $k$。我们引入 $k$-可注入测试器作为纠缠辅助局部辨别的基于测试器的描述，特别是研究 $k$-可注入正部分转置（PPT）测试器类别，它构成了实际相关的 LOCC 测试器类别的数值上可处理的松弛。\n\n对于每 $k$，我们都会导出一个半​​定程序 (SDP) 以获得最佳成功概率，从而产生一个可有效计算的一次性 PPT 纠缠成本。为了使这些优化问题在数值上可行，我们证明了协变通道对的对称性减少原理，从而减少了相关 SDP 的有效维度。最后，通过对偶 SDP，我们推导了复合通道判别问题的界限，并通过基于去极化通道、去极化 SWAP 通道和 Werner-Holevo 通道的原理验证示例来说明我们的框架。", "authors": [{"name": "Chengkai Zhu"}, {"name": "Shuyu He"}, {"name": "Gereon Koßmann"}, {"name": "Xin Wang"}], "featured_authors": [{"name": "Chengkai Zhu"}, {"name": "Shuyu He"}, {"name": "Gereon Koßmann"}, {"name": "Xin Wang"}], "author_count": 4}, {"id": "2603.12132", "category": "quant-ph", "title": "History state formalism for time series with application to finance", "abstract": "We present a method for analyzing general time series by employing the history state formalism of quantum mechanics. This formalism allows us to describe a complete evolution based on a single quantum state, the history state, which simultaneously includes -also as a quantum system- the reference clock. It naturally leads to the concept of system-time entanglement, with the ensuing entanglement entropy constituting a measure of the effective number of distinguishable states visited in the history. Through a quantum coherent state embedding of the time series data, it is then possible to associate a quantum history state to the series. The gaussian overlap between these coherent states provides thus a smooth measure of distinguishability between the series data. The eigenvalues of the corresponding overlap matrix determine in fact the entanglement spectrum and entropy of the history state, which provide a rigorous characterization of the evolution. As illustration, the formalism is applied to typical financial time-series data. Through the entanglement entropy and spectrum, different evolution regimes can be identified. Entanglement based volatility indicators are also derived, and compared with standard volatility measures.", "url": "https://arxiv.org/abs/2603.12132", "type": "理论", "summary": "我们提出了一种利用量子力学的历史状态形式来分析一般时间序列的方法。这种形式主义使我们能够描述基于单个量子状态（历史状态）的完整演化，它同时包括（也作为量子系统）参考时钟。它自然地引出了系统时间纠缠的概念，随之而来的纠缠熵构成了历史上访问的可区分状态的有效数量的度量。通过时间序列数据的量子相干态嵌入，可以将量子历史状态与该序列相关联。因此，这些相干态之间的高斯重叠提供了系列数据之间可区分性的平滑测量。相应重叠矩阵的特征值实际上决定了历史状态的纠缠谱和熵，这提供了演化的严格表征。作为说明，该形式主义应用于典型的金融时间序列数据。通过纠缠熵和谱，可以识别不同的演化机制。\n\n还导出了基于纠缠的波动性指标，并与标准波动性度量进行了比较。", "authors": [{"name": "F. Lomoc"}, {"name": "N. Canosa"}, {"name": "A.P. Boette"}, {"name": "R. Rossignoli"}], "featured_authors": [{"name": "F. Lomoc"}, {"name": "N. Canosa"}, {"name": "A.P. Boette"}, {"name": "R. Rossignoli"}], "author_count": 4}, {"id": "2603.12148", "category": "quant-ph", "title": "The Constrained Origin of Canonical and Microcanonical Ensembles in Quantum Theory", "abstract": "In quantum theory, equilibrium statistical mechanics is usually formulated through the canonical ensemble, whose privileged status is tied to the Euclidean continuation of time evolution. The microcanonical ensemble, by contrast, is commonly introduced as a separate spectral construction. In this work we show that this asymmetry is representational rather than structural. We formulate the system in an extended Hilbert space in which time is promoted to an auxiliary clock degree of freedom and physical states are selected by a reparametrization-invariant constraint operator $\\hat C = \\hat P_T + \\hat H$. The corresponding projector $\\delta(\\hat C)$ provides a single unified object from which both canonical and microcanonical ensembles emerge as complementary projections in the clock sector. In the clock-time representation, a purely imaginary clock separation yields the Euclidean kernel and the canonical partition function. In the conjugate clock-energy representation, the same projector reduces to the spectral operator $\\delta(\\hat H-E)$ and hence to the microcanonical density of states. The main consequence is structural: canonical and microcanonical statistics need not be introduced as independent constructions, since both are already encoded in the same constrained quantum dynamics.", "url": "https://arxiv.org/abs/2603.12148", "type": "理论", "summary": "在量子理论中，平衡统计力学通常是通过正则系综来表述的，其特权地位与时间演化的欧几里得延续有关。相比之下，微正则系综通常作为单独的光谱结构引入。在这项工作中，我们表明这种不对称是代表性的而不是结构性的。我们在扩展希尔伯特空间中制定系统，其中时间被提升为辅助时钟自由度，并且物理状态由重参数化不变约束算子 $\\hat C = \\hat P_T + \\hat H$ 选择。相应的投影仪 $\\delta(\\hat C)$ 提供了一个统一的对象，规范和微规范系综都从该对象中作为时钟扇区中的互补投影出现。在时钟时间表示中，纯虚数时钟分离产生欧几里得核和规范配分函数。在共轭时钟能量表示中，同一投影仪简化为谱算子$\\delta(\\hat H-E)$，从而简化为微正则态密度。\n\n主要结果是结构性的：规范和微规范统计不需要作为独立的结构引入，因为两者已经被编码在相同的约束量子动力学中。", "authors": [{"name": "Loris Di Cairano"}], "featured_authors": [{"name": "Loris Di Cairano"}], "author_count": 1}, {"id": "2603.12161", "category": "quant-ph", "title": "Quantum lower bounds for simulating fluid dynamics", "abstract": "Developing quantum algorithms to simulate fluid dynamics has become an active area of research, as accelerating fluid simulations could have significant impact in both industry and fundamental science. While many approaches have been proposed for simulating fluid dynamics on quantum computers, it is largely unclear whether these algorithms will provide speedup over existing classical approaches. In this paper we give evidence that quantum computers cannot significantly outperform classical simulations of fluid dynamics in general. We study two models of fluids: the Korteweg-de Vries (KdV) equation, which models shallow water waves, and the incompressible Euler equations, which model ideal, inviscid fluids. We show that any quantum algorithm simulating the KdV equation or the Euler equations for time $T$ requires $\\Omega(T^2)$ and $e^{\\Omega(T)}$ copies of the initial state in the worst case, respectively. These lower bounds hold for the task of preparing the final state, and similar bounds hold for history state preparation. We prove the lower bound for the KdV equation by investigating divergence of solitons. For the Euler equations, we show that instabilities enable fast state discrimination.", "url": "https://arxiv.org/abs/2603.12161", "type": "理论+数值", "summary": "开发模拟流体动力学的量子算法已成为一个活跃的研究领域，因为加速流体模拟可能对工业和基础科学产生重大影响。尽管已经提出了许多在量子计算机上模拟流体动力学的方法，但目前还不清楚这些算法是否会比现有的经典方法提供加速。在本文中，我们提供的证据表明，量子计算机总体上不能显着优于流体动力学的经典模拟。我们研究两种流体模型：模拟浅水波的 Korteweg-de Vries (KdV) 方程和模拟理想无粘流体的不可压缩欧拉方程。我们证明，任何模拟时间 $T$ 的 KdV 方程或欧拉方程的量子算法在最坏情况下分别需要 $\\Omega(T^2)$ 和 $e^{\\Omega(T)}$ 初始状态的副本。这些下限适用于准备最终状态的任务，类似的界限适用于历史状态准备。我们通过研究孤子的散度证明了 KdV 方程的下界。\n\n对于欧拉方程，我们表明不稳定性可以实现快速状态区分。", "authors": [{"name": "Abtin Ameri"}, {"name": "Joseph Carolan"}, {"name": "Andrew M. Childs"}, {"name": "Hari Krovi"}], "featured_authors": [{"name": "Abtin Ameri"}, {"name": "Joseph Carolan"}, {"name": "Andrew M. Childs"}, {"name": "Hari Krovi"}], "author_count": 4}, {"id": "2603.12197", "category": "quant-ph", "title": "Commutation Groups and State-Independent Contextuality", "abstract": "We introduce an algebraic structure for studying state-independent contextuality arguments, a key form of quantum non-classicality exemplified by the well-known Peres-Mermin magic square, and used as a source of quantum advantage. We introduce \\emph{commutation groups} presented by generators and relations, and analyse them in terms of a string rewriting system. There is also a linear algebraic construction, a directed version of the Heisenberg group. We introduce \\emph{contextual words} as a general form of contextuality witness. We characterise when contextual words can arise in commutation groups, and explicitly construct non-contextual value assignments in other cases. We give unitary representations of commutation groups as subgroups of generalized Pauli $n$-groups.", "url": "https://arxiv.org/abs/2603.12197", "type": "理论", "summary": "我们引入了一种用于研究与状态无关的上下文论证的代数结构，这是量子非经典性的一种关键形式，以著名的佩雷斯-梅明幻方为例，并用作量子优势的来源。我们引入由生成器和关系表示的\\emph{交换群}，并根据字符串重写系统对其进行分析。还有一个线性代数构造，即海森堡群的有向版本。我们引入\\emph{上下文词}作为上下文见证的一般形式。我们描述了上下文词何时可以出现在交换组中，并在其他情况下显式地构造非上下文值分配。我们将交换群的酉表示作为广义泡利$n$群的子群。", "authors": [{"name": "Samson Abramsky"}, {"name": "Serban-Ion Cercelescu"}, {"name": "Carmen-Maria Constantin"}], "featured_authors": [{"name": "Samson Abramsky"}, {"name": "Serban-Ion Cercelescu"}, {"name": "Carmen-Maria Constantin"}], "author_count": 3}, {"id": "2603.12236", "category": "quant-ph", "title": "Onset of Ergodicity Across Scales on a Digital Quantum Processor", "abstract": "Understanding how isolated quantum many-body systems thermalize remains a central question in modern physics. We study the onset of ergodicity in a two-dimensional disordered Heisenberg Floquet model using digital quantum simulation on IBM's Nighthawk superconducting processor, reaching system sizes of up to $10\\times10$ qubits. We probe ergodicity across different length scales by coarse-graining the system into spatial patches of varying sizes and introducing a measure based on the collision entropy of each patch, enabling a detailed study of when ergodic behavior emerges across scales. The high sampling rate of superconducting quantum processing units, together with an optimal sample estimator, allow us to access patches of sizes up to $3\\times3$. We observe that as the Heisenberg coupling $J$ increases, the noiseless system undergoes a smooth crossover from subergodic to ergodic behavior, with smaller patches approaching their random-matrix-theory values first, thereby revealing a hierarchy across scales. In the region of parameter space where classical tensor-network simulations are reliable, small patches or small values of $J$, we find excellent agreement with the error-mitigated quantum simulation. Beyond this regime, volume-law entanglement and contraction complexity growth causes the cost of classical methods to rise sharply. Our results open new directions for the use of quantum computers in the study of quantum thermalization.", "url": "https://arxiv.org/abs/2603.12236", "type": "理论+数值", "summary": "了解孤立的量子多体系统如何热化仍然是现代物理学的一个中心问题。我们使用 IBM Nighthawk 夜鹰超导处理器上的数字量子模拟来研究二维无序 Heisenberg Floquet 模型中遍历性的开始，系统规模高达 10\\times10$ 量子位。我们通过将系统粗粒度化为不同大小的空间斑块并引入基于每个斑块的碰撞熵的测量来探测不同长度尺度的遍历性，从而能够详细研究何时跨尺度出现遍历行为。超导量子处理单元的高采样率以及最佳样本估计器使我们能够访问大小高达 $3\\times3$ 的补丁。我们观察到，随着海森堡耦合 $J$ 的增加，无噪声系统会经历从次遍历行为到遍历行为的平滑交叉，较小的补丁首先接近其随机矩阵理论值，从而揭示了跨尺度的层次结构。\n\n在经典张量网络模拟可靠的参数空间区域、小补丁或 $J$ 的小值中，我们发现与误差减轻的量子模拟非常一致。除了这种制度之外，体积定律纠缠和收缩复杂性的增长导致经典方法的成本急剧上升。我们的研究结果为量子计算机在量子热化研究中的使用开辟了新的方向。", "authors": [{"name": "Faisal Alam"}, {"name": "Marcos Crichigno"}, {"name": "Elizabeth Crosson"}, {"name": "Steven T. Flammia"}, {"name": "Filippo Maria Gambetta"}, {"name": "Max Hunter Gordon"}, {"name": "Michael Kreshchuk"}, {"name": "Ashley Montanaro"}, {"name": "Alberto Nocera"}, {"name": "Raul A. Santos"}], "featured_authors": [{"name": "Faisal Alam"}, {"name": "Marcos Crichigno"}, {"name": "Elizabeth Crosson"}, {"name": "Ashley Montanaro"}, {"name": "Alberto Nocera"}, {"name": "Raul A. Santos"}], "author_count": 10}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
