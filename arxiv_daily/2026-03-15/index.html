高压单晶 X 射线衍射直接解决了 Cr-Se 和 Nb-Se 键距、配位多面体和连通性的演变，揭示了由在保留的晶体学对称性内逐渐但协作的键重排驱动的完全可逆的半金属-半导体-半金属转变。\n\n与不可逆地改变成分并引入无序的化学取代相比，压力作为一种干净、连续的控制参数，可以在不破坏结构对称性的情况下重塑键合景观。这些结果将 CrNbSe$_5$ 确立为通过可调化学键进行电子驱动相转换的模型系统，强调等对称键重组作为压力控制电子和自旋电子功能的强大设计原理。", "authors": [{"name": "Mingyu Xu"}, {"name": "Peng Cheng"}, {"name": "Shuyuan Huyan"}, {"name": "Wenli Bi"}, {"name": "Su-Yang Xu"}, {"name": "Sergey L. Bud'ko"}, {"name": "Paul C. Canfield"}, {"name": "Weiwei Xie"}], "featured_authors": [{"name": "Mingyu Xu"}, {"name": "Peng Cheng"}, {"name": "Shuyuan Huyan"}, {"name": "Sergey L. Bud'ko"}, {"name": "Paul C. Canfield"}, {"name": "Weiwei Xie"}], "author_count": 8}, {"id": "2603.12181", "category": "cond-mat", "title": "Pressure-Induced Chemical Bonding Effects on Lattice and Magnetic Instabilities in Antiferromagnetic Insulating CaMn$_2$Sb$_2$", "abstract": "Exotic quantum phenomena often emerge near an electronic delocalization transition (EDT) from an antiferromagnetic insulating phase to a strongly correlated metallic state under pressure. We report the pressure-induced structural and magnetic evolution of the antiferromagnetic insulator CaMn$_2$Sb$_2$. Single-crystal X-ray diffraction reveals a first-order phase transition near 5.4 GPa from a trigonal P-3m1 structure to a monoclinic P2$_1$/m phase, accompanied by a ~7% volume collapse. Residual electron density analysis at intermediate pressures reveals charge localization along Mn-Sb chains, signaling electronic instability preceding the structural transition. Bonding analysis indicates anisotropic Mn-Sb orbital reconfiguration under pressure, driving a distorted square-pyramidal geometry. Neutron scattering confirms the transition and identifies a pressure-induced incommensurate magnetic order, distinct from the ambient antiferromagnetic state. In the monoclinic phase, zigzag Mn chains exhibit antiferromagnetic coupling along the ac-plane, enabled by enhanced orbital overlap. These results establish CaMn$_2$Sb$_2$ as a model system for studying the coupling of structural distortion, charge redistribution, and magnetic order in layered Mn pnictides under pressure.", "url": "https://arxiv.org/abs/2603.12181", "type": "理论", "summary": "奇异的量子现象经常出现在压力下从反铁磁绝缘相到强相关金属态的电子离域跃迁 (EDT) 附近。我们报告了反铁磁绝缘体 CaMn$_2$Sb$_2$ 的压力引起的结构和磁性演化。单晶 X 射线衍射揭示了在 5.4 GPa 附近从三角 P-3m1 结构到单斜 P2$_1$/m 相的一级相变，并伴随着约 7% 的体积塌陷。中间压力下的残余电子密度分析揭示了沿 Mn-Sb 链的电荷定位，表明结构转变之前的电子不稳定性。键合分析表明，Mn-Sb 轨道在压力下会发生各向异性重构，从而形成扭曲的方锥体几何结构。中子散射证实了这种转变，并识别出压力引起的不相称磁序，与周围的反铁磁态不同。在单斜晶相中，锯齿状锰链沿着交流平面表现出反铁磁耦合，这是通过增强的轨道重叠实现的。\n\n这些结果将 CaMn$_2$Sb$_2$ 建立为模型系统，用于研究压力下层状锰磷族化物中结构畸变、电荷重新分布和磁序的耦合。", "authors": [{"name": "Matt Boswell"}, {"name": "Antonio M. dos Santos"}, {"name": "Mingyu Xu"}, {"name": "Madalynn Marshall"}, {"name": "Su-Yang Xu"}, {"name": "Weiwei Xie"}], "featured_authors": [{"name": "Matt Boswell"}, {"name": "Antonio M. dos Santos"}, {"name": "Mingyu Xu"}, {"name": "Madalynn Marshall"}, {"name": "Su-Yang Xu"}, {"name": "Weiwei Xie"}], "author_count": 6}, {"id": "2603.12183", "category": "cond-mat", "title": "Proof-Carrying Materials: Falsifiable Safety Certificates for Machine-Learned Interatomic Potentials", "abstract": "Machine-learned interatomic potentials (MLIPs) are deployed for high-throughput materials screening without formal reliability guarantees. We show that a single MLIP used as a stability filter misses 93% of density functional theory (DFT)-stable materials (recall 0.07) on a 25,000-material benchmark. Proof-Carrying Materials (PCM) closes this gap through three stages: adversarial falsification across compositional space, bootstrap envelope refinement with 95% confidence intervals, and Lean 4 formal certification. Auditing CHGNet, TensorNet and MACE reveals architecture-specific blind spots with near-zero pairwise error correlations (r <= 0.13; n = 5,000), confirmed by independent Quantum ESPRESSO validation (20/20 converged; median DFT/CHGNet force ratio 12x). A risk model trained on PCM-discovered features predicts failures on unseen materials (AUC-ROC = 0.938 +/- 0.004) and transfers across architectures (cross-MLIP AUC-ROC ~ 0.70; feature importance r = 0.877). In a thermoelectric screening case study, PCM-audited protocols discover 62 additional stable materials missed by single-MLIP screening - a 25% improvement in discovery yield.", "url": "https://arxiv.org/abs/2603.12183", "type": "理论+数值", "summary": "机器学习原子间势 (MLIP) 用于高通量材料筛选，但没有正式的可靠性保证。我们表明，在 25,000 种材料的基准上，用作稳定性过滤器的单个 MLIP 会错过 93% 的密度泛函理论 (DFT) 稳定材料（召回率 0.07）。证明材料 (PCM) 通过三个阶段缩小了这一差距：跨组合空间的对抗性伪造、具有 95% 置信区间的引导包络细化以及精益 4 正式认证。审核 CHGNet、TensorNet 和 MACE 揭示了特定于架构的盲点，其成对误差相关性接近于零（r <= 0.13；n = 5,000），这已通过独立 Quantum ESPRESSO 验证（20/20 收敛；中值 DFT/CHGNet 力比 12x）证实。根据 PCM 发现的特征训练的风险模型可预测未见过的材料上的故障 (AUC-ROC = 0.938 +/- 0.004) 并跨架构转移 (跨 MLIP AUC-ROC ~ 0.70；特征重要性 r = 0.877)。在热电筛选案例研究中，PCM 审核方案发现了单 MLIP 筛选遗漏的 62 种额外稳定材料 - 发现率提高了 25%。", "authors": [{"name": "Abhinaba Basu"}, {"name": "Pavan Chakraborty"}], "featured_authors": [{"name": "Abhinaba Basu"}, {"name": "Pavan Chakraborty"}], "author_count": 2}, {"id": "2603.12184", "category": "cond-mat", "title": "Non-Markovian Entropy Dynamics in Living Systems from the Keldysh Formalism", "abstract": "Living systems are open nonequilibrium systems that continuously exchange energy, matter, and information with their environments, leading to stochastic dynamics with memory and active fluctuations. In this study, we develop a non-Markovian theoretical framework for the entropy dynamics of living systems based on the Keldysh functional formalism and stochastic thermodynamics. The approach naturally incorporates colored environmental noise, memory-dependent dissipation, and many-body interactions, yielding generalized Langevin dynamics and non-Markovian master equations. Within this framework we derive an exact frequency-domain expression for the entropy production rate and show that violations of the fluctuation-dissipation relation provide a direct thermodynamic signature of active biological fluctuations. We further demonstrate that environmental memory enhances low-frequency fluctuations and entropy production, leading to critical slowing down near dynamical instability. These results provide a microscopic physical foundation for the entropy \"bathtub\" picture of living systems and connect entropy evolution with development, aging, and death in nonequilibrium dynamics.", "url": "https://arxiv.org/abs/2603.12184", "type": "理论", "summary": "生命系统是开放的非平衡系统，不断地与环境交换能量、物质和信息，从而导致具有记忆和主动波动的随机动力学。在这项研究中，我们基于凯尔迪什泛函形式主义和随机热力学，开发了生命系统熵动力学的非马尔可夫理论框架。该方法自然地结合了有色环境噪声、依赖于记忆的耗散和多体相互作用，产生广义朗之万动力学和非马尔可夫主方程。在这个框架内，我们推导出熵产生率的精确频域表达式，并表明违反波动耗散关系提供了活跃生物波动的直接热力学特征。我们进一步证明，环境记忆增强了低频波动和熵产生，导致动态不稳定附近的严重减速。这些结果为生命系统的熵“浴缸”图提供了微观物理基础，并将熵演化与非平衡动力学中的发育、衰老和死亡联系起来。", "authors": [{"name": "Feiyi Liu"}, {"name": "Min Guo"}, {"name": "Hongwei Tan"}, {"name": "Yang Wang"}], "featured_authors": [{"name": "Feiyi Liu"}, {"name": "Min Guo"}, {"name": "Hongwei Tan"}, {"name": "Yang Wang"}], "author_count": 4}, {"id": "2603.12196", "category": "cond-mat", "title": "A superconducting half-dome in bilayer nickelates", "abstract": "Understanding how superconductivity emerges and collapses in correlated electron systems remains a central challenge in condensed matter physics. As a recently discovered member of the high temperature superconductor family, bilayer nickelates provide a new opportunity for examining this problem. Their pronounced sensitivity to oxygen stoichiometry, while posing challenges for stabilizing superconductivity, simultaneously offers an effective control parameter for tuning electronic phases. Here we report a superconducting half-dome in compressively strained bilayer nickelate thin films as a function of continuous tuning of oxygen stoichiometry. Starting from an optimally superconducting state, increasing oxygen stoichiometry gradually suppresses superconductivity toward a metallic phase, whereas decreasing oxygen stoichiometry drives a granular superconductor-to-insulator transition while leaving the superconducting onset intact. This half-dome structure can be understood to arise from the contrasting roles played by interstitial oxygen versus oxygen vacancies - namely the dominance of doping versus scattering. Notably, the half-dome emerges consistently across samples with different rare-earth combinations, with or without alkaline-earth doping, revealing a general feature of the bilayer nickelate phase diagram.", "url": "https://arxiv.org/abs/2603.12196", "type": "理论+数值", "summary": "了解超导如何在相关电子系统中出现和崩溃仍然是凝聚态物理学的一个核心挑战。作为最近发现的高温超导体家族的成员，双层镍酸盐为研究这个问题提供了新的机会。它们对氧化学计量的显着敏感性，虽然对稳定超导性提出了挑战，但同时为调整电子相位提供了有效的控制参数。在这里，我们报告了压缩应变双层镍酸​​盐薄膜中的超导半圆顶作为氧化学计量连续调节的函数。从最佳超导状态开始，增加氧化学计量逐渐抑制向金属相的超导性，而降低氧化学计量则驱动粒状超导体到绝缘体的转变，同时保持超导起始完好。这种半圆顶结构可以理解为间隙氧与氧空位所起的对比作用，即掺杂与散射的主导地位。\n\n值得注意的是，半圆顶在具有不同稀土组合的样品中一致出现，无论有或没有碱土掺杂，揭示了双层镍酸盐相图的一般特征。", "authors": [{"name": "Yidi Liu"}, {"name": "Bai Yang Wang"}, {"name": "Jiarui Li"}, {"name": "Yaoju Tarn"}, {"name": "Lopa Bhatt"}, {"name": "Michael Colletta"}, {"name": "Yi-Ming Wu"}, {"name": "Cheng-Tai Kuo"}, {"name": "Jun-Sik Lee"}, {"name": "Berit H. Goodge"}, {"name": "David A. Muller"}, {"name": "Zhi-Xun Shen"}, {"name": "Srinivas Raghu"}, {"name": "Harold Y. Hwang"}, {"name": "Yijun Yu"}], "featured_authors": [{"name": "Yidi Liu"}, {"name": "Bai Yang Wang"}, {"name": "Jiarui Li"}, {"name": "Srinivas Raghu"}, {"name": "Harold Y. Hwang"}, {"name": "Yijun Yu"}], "author_count": 15}, {"id": "2603.12198", "category": "cond-mat", "title": "Kinetic obstruction to pairing in the doped Kitaev-Heisenberg ladder", "abstract": "We investigate the hole-doped Kitaev-Heisenberg ($t$-$J$-$K$) model on a two-leg ladder geometry using the density-matrix renormalization group (DMRG). We first consider the behavior of the antiferromagnetic Kitaev (AFK) spin-liquid phase as a function of hopping strength $t$ and doping level. This reveals intriguing pairing tendencies only for $\\frac{t}{K} \\lesssim 0.65$, consistent with prior results on three-leg ladders, and firmly supports the emerging picture that the physics of doped Kitaev spin liquids strongly depends on the kinetic energy of the doped holes. Analysis of one- and two-hole doping uncovers close links between the spatial profiles of the plaquette operator and the charge density. We construct a doping-dependent phase diagram for antiferromagnetic Heisenberg interactions and intermediate hopping $t=1$. Upon doping, the rung-singlet region develops dominant superconducting correlations. Charge-density-wave correlations dominate at weak doping near the transition to the stripy phase. Spin-density wave-like behavior is found in the AFK and ferromagnetic Kitaev limits, and in the stripy phase.", "url": "https://arxiv.org/abs/2603.12198", "type": "理论+数值", "summary": "我们使用密度矩阵重正化群 (DMRG) 研究了两腿梯几何上的空穴掺杂 Kitaev-Heisenberg ($t$-$J$-$K$) 模型。我们首先考虑反铁磁 Kitaev (AFK) 自旋液相的行为作为跳跃强度 $t$ 和掺杂水平的函数。这揭示了仅 $\\frac{t}{K} \\lesssim 0.65$ 的有趣配对趋势，与三腿梯子的先前结果一致，并坚定地支持了掺杂基塔耶夫自旋液体的物理特性强烈依赖于掺杂空穴的动能的新观点。对一孔和两孔掺杂的分析揭示了斑块算子的空间分布与电荷密度之间的密切联系。我们构建了反铁磁海森堡相互作用和中间跳跃 $t=1$ 的掺杂相关相图。掺杂后，梯级单线区域形成显着的超导相关性。电荷-密度-波相关性在向带状相过渡附近的弱掺杂中占主导地位。在 AFK 和铁磁基塔耶夫极限以及条纹相中发现了自旋密度波状行为。", "authors": [{"name": "Bradraj Pandey"}, {"name": "Bo Xiao"}, {"name": "Satoshi Okamoto"}, {"name": "Gonzalo Alvarez"}, {"name": "Gábor B. Halász"}, {"name": "Elbio Dagotto"}, {"name": "Pontus Laurell"}], "featured_authors": [{"name": "Bradraj Pandey"}, {"name": "Bo Xiao"}, {"name": "Satoshi Okamoto"}, {"name": "Gábor B. Halász"}, {"name": "Elbio Dagotto"}, {"name": "Pontus Laurell"}], "author_count": 7}, {"id": "2603.12234", "category": "cond-mat", "title": "Thermalisation as Diffusion in Hilbert Space", "abstract": "We develop a microscopic theory of thermalisation for a thermometer coupled to a many-body bath beyond standard Markovian and Fermi-golden-rule assumptions. By modeling interaction matrix elements in the non-interacting basis as independent random variables, we derive a diffusion-propagator expression for the reduced dynamics and show that relaxation is controlled by the distribution of interaction-induced level broadenings. The theory predicts a thermalisation timescale set by the inverse typical broadening and yields a non-Markovian generalization of global balance. Exact-diagonalization tests for heavy-tailed L{é}vy couplings, an all-to-all transverse-field Ising model, and the one-dimensional Imbrie model show good agreement with these predictions.", "url": "https://arxiv.org/abs/2603.12234", "type": "理论", "summary": "我们开发了一种与多体浴耦合的温度计的热化微观理论，超出了标准马尔可夫和费米黄金法则的假设。通过将非相互作用基础中的相互作用矩阵元素建模为独立的随机变量，我们导出了简化动力学的扩散传播表达式，并表明松弛是由相互作用引起的能级展宽的分布控制的。该理论预测了由逆典型展宽设定的热化时间尺度，并产生了全球平衡的非马尔可夫概括。重尾 L{é}vy 耦合、全横向场 Ising 模型和一维 Imbrie 模型的精确对角化测试与这些预测表现出良好的一致性。", "authors": [{"name": "Aleksey Lunkin"}], "featured_authors": [{"name": "Aleksey Lunkin"}], "author_count": 1}, {"id": "2603.11157", "category": "hep-th", "title": "UV/IR relations from the worldsheet", "abstract": "We derive universal scaling relations for the low-energy effective action of string theory, connecting the vacuum energy and gauge couplings to higher-derivative Wilson coefficients. At one-loop in string perturbation theory, these generic parametric relations follow from modular and conformal invariance of the worldsheet, independently of the specific low-energy phase of the theory, and they become non-trivial in species limits. As a result, we substantially strengthen our previous case for the emergent string conjecture and connect UV/IR mixing to swampland principles. We argue that our results persist to higher loops, hinting at a pathway to study strong couplings using dualities. Further accounting for open-string contributions, if any, our results lead to parametric inequalities which reproduce holographic bounds and support the magnetic weak-gravity conjecture and the dark dimension scenario.", "url": "https://arxiv.org/abs/2603.11157", "type": "理论", "summary": "我们推导了弦理论低能有效作用的通用标度关系，将真空能量和规范耦合与更高导数的威尔逊系数联系起来。在弦微扰理论的单循环中，这些通用参数关系遵循世界表的模不变性和共形不变性，独立于理论的特定低能相，并且它们在物种限制中变得不平凡。因此，我们大大加强了之前关于新兴弦猜想的案例，并将紫外/红外混合与沼泽原理联系起来。我们认为我们的结果持续到更高的循环，暗示了利用对偶性研究强耦合的途径。进一步考虑开弦贡献（如果有的话），我们的结果会导致参数不等式，它再现全息边界并支持磁弱引力猜想和暗维度场景。", "authors": [{"name": "Christian Aoufia"}, {"name": "Ivano Basile"}, {"name": "Giorgio Leone"}, {"name": "Matteo Lotito"}], "featured_authors": [{"name": "Christian Aoufia"}, {"name": "Ivano Basile"}, {"name": "Giorgio Leone"}, {"name": "Matteo Lotito"}], "author_count": 4}, {"id": "2603.11163", "category": "hep-th", "title": "Alice in Warpland: KK modes, Warped Compactifications and the Swampland", "abstract": "We investigate the asymptotic behavior of Kaluza-Klein (KK) towers in warped compactifications to Minkowski space. Focusing on the overall decompactification limit, we derive the scaling of KK masses at large KK momentum for scalar fluctuations in lower-dimensional Planck units. In codimension-one warped backgrounds sourced by a higher-dimensional exponential potential, we solve explicitly for the internal profiles and obtain a closed expression for the exponential mass decay rate $\\lambda_{\\rm KK}$ of the tower in terms of the moduli space distance. We find that warping reduces $\\lambda_{\\rm KK}$ relative to the unwarped case, in such a way that sufficiently strong warping could in principle violate the Sharpened Distance Conjecture bound. Remarkably, this sharpened bound is still satisfied precisely when the higher-dimensional potential obeys the condition forbidding asymptotic accelerated expansion, establishing a direct link between the Sharpened Distance Conjecture and the Strong de Sitter condition in one higher dimension. We also argue that for higher-codimension warped backgrounds the asymptotic KK scaling remains unmodified.", "url": "https://arxiv.org/abs/2603.11163", "type": "理论", "summary": "我们研究了 Kaluza-Klein (KK) 塔在 Minkowski 空间的扭曲紧化中的渐近行为。着眼于总体解紧极限，我们推导了低维普朗克单元中标量波动在大 KK 动量下 KK 质量的缩放。在由高维指数势产生的余维一扭曲背景中，我们显式求解内部轮廓，并根据模空间距离获得塔的指数质量衰减率 $\\lambda_{\\rm KK}$ 的闭合表达式。我们发现，相对于未扭曲的情况，扭曲会减少$\\lambda_{\\rm KK}$，因此足够强的扭曲原则上可能违反锐化距离猜想界限。值得注意的是，当高维势服从禁止渐近加速膨胀的条件时，仍然精确地满足这种锐化界限，从而在一个更高维度的锐化距离猜想和强德西特条件之间建立了直接联系。我们还认为，对于更高维度的扭曲背景，渐近 KK 缩放仍然保持不变。", "authors": [{"name": "Salvatore Raucci"}, {"name": "Ignacio Ruiz"}, {"name": "Irene Valenzuela"}], "featured_authors": [{"name": "Salvatore Raucci"}, {"name": "Ignacio Ruiz"}, {"name": "Irene Valenzuela"}], "author_count": 3}, {"id": "2603.11164", "category": "hep-th", "title": "Learning to Unscramble: Simplifying Symbolic Expressions via Self-Supervised Oracle Trajectories", "abstract": "We present a new self-supervised machine learning approach for symbolic simplification of complex mathematical expressions. Training data is generated by scrambling simple expressions and recording the inverse operations, creating oracle trajectories that provide both goal states and explicit paths to reach them. A permutation-equivariant, transformer-based policy network is then trained on this data step-wise to predict the oracle action given the input expression. We demonstrate this approach on two problems in high-energy physics: dilogarithm reduction and spinor-helicity scattering amplitude simplification. In both cases, our trained policy network achieves near perfect solve rates across a wide range of difficulty levels, substantially outperforming prior approaches based on reinforcement learning and end-to-end regression. When combined with contrastive grouping and beam search, our model achieves a 100\\% full simplification rate on a representative selection of 5-point gluon tree-level amplitudes in Yang-Mills theory, including expressions with over 200 initial terms.", "url": "https://arxiv.org/abs/2603.11164", "type": "理论", "summary": "我们提出了一种新的自监督机器学习方法，用于复杂数学表达式的符号简化。训练数据是通过打乱简单表达式并记录逆运算来生成的，创建预言机轨迹，提供目标状态和达到目标的明确路径。然后，基于该数据逐步训练排列等变、基于变压器的策略网络，以预测给定输入表达式的预言机操作。我们在高能物理中的两个问题上演示了这种方法：二对数约简和自旋螺旋散射振幅简化。在这两种情况下，我们训练有素的策略网络在各种难度级别上都实现了近乎完美的解决率，大大优于基于强化学习和端到端回归的先前方法。当与对比分组和波束搜索相结合时，我们的模型在杨米尔斯理论中代表性的 5 点胶子树级振幅选择上实现了 100% 的完全简化率，包括具有 200 多个初始项的表达式。", "authors": [{"name": "David Shih"}], "featured_authors": [{"name": "David Shih"}], "author_count": 1}, {"id": "2603.11173", "category": "hep-th", "title": "Holes in Calabi-Yau Effective Cones", "abstract": "Motivated by their role in non-perturbative potentials in string theory, we study divisors in effective cones of Calabi-Yau threefolds. We give examples of geometries for which some divisor classes in the effective cone are not themselves effective: i.e., they have no global sections. We call these non-holomorphic divisor classes \"holes,\" and characterize their behavior in an ensemble of toric hypersurface Calabi-Yau threefolds. We prove some necessary and sufficient conditions for the existence of holes, show consequences of holes that follow from the minimal model program, and demonstrate that a class of holes come in semigroups (with this class conjectured to constitute all holes). Furthermore, we provide moduli-dependent bounds on the volumes of four-cycles representing holes.", "url": "https://arxiv.org/abs/2603.11173", "type": "理论", "summary": "受其在弦理论中非微扰势中的作用的启发，我们研究了卡拉比-丘三重有效锥中的除数。我们给出了一些几何形状的例子，对于这些几何形状，有效锥体中的一些除数类本身并不有效：即它们没有全局截面。我们将这些非全纯除数类称为“空洞”，并在环面超曲面 Calabi-Yau 三重集合中表征它们的行为。我们证明了空洞存在的一些必要和充分条件，显示了从最小模型程序得出的空洞的后果，并证明了一类空洞是半群的（推测此类空洞构成了所有空洞）。此外，我们还提供了代表孔的四循环体积的模数相关界限。", "authors": [{"name": "Naomi Gendler"}, {"name": "Elijah Sheridan"}, {"name": "Michael Stillman"}, {"name": "David H. Wu"}], "featured_authors": [{"name": "Naomi Gendler"}, {"name": "Elijah Sheridan"}, {"name": "Michael Stillman"}, {"name": "David H. Wu"}], "author_count": 4}, {"id": "2603.11181", "category": "hep-th", "title": "The phase diagram of the D1-D5 CFT and localized black holes", "abstract": "In this paper we analyze the phases that dominate the microcanonical ensemble at various energies in the D1-D5 CFT, which is dual to type II string theory on $AdS_3 \\times S^3\\times T^4$. We focus on black hole solutions, and on the dependence of the phase structure on the ratio of the size of the torus to the AdS scale; as small localized black holes (with horizon topology $S^8$) grow, they can start to fill the $S^3$ or the $T^4$ or both, and we analyze the general aspects of the transitions between the various phases of uniform and non-uniform black holes, incorporating known solutions and discussing the properties of additional unknown solutions. Some features of the transitions between these phases are similar to higher dimensional AdS spaces, while other features are different. We provide evidence that when the torus is much larger than the AdS radius, there is a large range of energies where the typical states are a novel phase, described by a lattice (in the $T^4$ directions) of black holes with horizon topology $S^5\\times S^3$. In this phase the entropy is linear in the energy, with a coefficient that is of order the AdS radius.", "url": "https://arxiv.org/abs/2603.11181", "type": "理论", "summary": "在本文中，我们分析了 D1-D5 CFT 中不同能量下主导微正则系综的相，它与 $AdS_3 \\times S^3\\times T^4$ 上的 II 型弦理论对偶。我们关注黑洞解，以及相结构对环面尺寸与 AdS 尺度之比的依赖性；随着小型局域黑洞（具有视界拓扑 $S^8$）的增长，它们可以开始填充 $S^3$ 或 $T^4$ 或两者，我们分析均匀和非均匀黑洞的各个阶段之间过渡的一般方面，结合已知的解决方案并讨论其他未知解决方案的属性。这些阶段之间的过渡的某些特征与高维 AdS 空间相似，而其他特征则不同。我们提供的证据表明，当环面远大于 AdS 半径时，存在很大的能量范围，其中典型状态是新相，由具有水平拓扑 $S^5\\times S^3$ 的黑洞晶格（在 $T^4$ 方向）描述。在此阶段，熵与能量呈线性关系，系数为 AdS 半径。", "authors": [{"name": "Ofer Aharony"}, {"name": "Ronny Frumkin"}, {"name": "Jonathan Mehl"}], "featured_authors": [{"name": "Ofer Aharony"}, {"name": "Ronny Frumkin"}, {"name": "Jonathan Mehl"}], "author_count": 3}, {"id": "2603.11291", "category": "hep-th", "title": "The role of p_1-structures in 3-dimensional Chern-Simons theories", "abstract": "Our recent paper~\\cite{FST} with Claudia Scheimbauer uses the cobordism hypothesis to construct fully local Chern-Simons theories. Here we expose some physics motivations: Yang-Mills plus Chern-Simons in the bosonic case and the free Majorana-Weyl spinor field in the fermionic case. We also give expositions of tangential structures and invertible field theories, in particular the 'gravitational Chern-Simons theory' used by Witten to obtain topological field theories from the physical theories.", "url": "https://arxiv.org/abs/2603.11291", "type": "理论", "summary": "我们最近与 Claudia Schimbauer 合作的论文~\\cite{FST} 使用共边假设来构建完全局部的 Chern-Simons 理论。在这里，我们揭示了一些物理动机：玻色子情况下的杨-米尔斯加陈-西蒙斯和费米子情况下的自由马约拉纳-韦尔旋量场。我们还阐述了切向结构和可逆场论，特别是威滕用来从物理理论获得拓扑场论的“引力陈-西蒙斯理论”。", "authors": [{"name": "Daniel S. Freed"}, {"name": "Constantin Teleman"}], "featured_authors": [{"name": "Daniel S. Freed"}, {"name": "Constantin Teleman"}], "author_count": 2}, {"id": "2603.11343", "category": "hep-th", "title": "One-loop mass corrections and decay widths of Type II heavy string states", "abstract": "We start a systematic investigation of the one-loop mass corrections to (super-)string massive higher-spin states. While the imaginary part of the relevant amplitudes are finite, being related to the width of the decay of the states into two lower-mass states at tree level, the real part is generally IR-divergent and needs regularization and renormalization. We mostly focus on states of the first Regge trajectory in the NS-NS sector of Type-II string theories. We explicitly derive a closed-form expression for the integral over the insertion point, relying on properties of elliptic functions and lattice sums. We then regularize the IR divergent integral over the modular parameter of the torus, applying the $i\\varepsilon$-prescription in string theory. As a result we compute the desired mass corrections up to level $N = 10$ and analyze their behavior at increasing $N$. Finally, we speculate on the existence of mixing among lower-spin states and conjecture that the one-loop mass matrix be governed by some random matrix theory.", "url": "https://arxiv.org/abs/2603.11343", "type": "理论", "summary": "我们开始对（超）弦大量高自旋态的单环质量校正进行系统研究。虽然相关振幅的虚部是有限的，与树级状态衰减到两个较低质量状态的宽度有关，但实部通常是 IR 发散的，需要正则化和重正化。我们主要关注 II 型弦理论 NS-NS 扇区中第一 Regge 轨迹的状态。我们依赖于椭圆函数和格和的性质，明确地导出了插入点积分的封闭式表达式。然后，我们应用弦理论中的 $i\\varepsilon$ 规定，对环面模参数上的 IR 发散积分进行正则化。因此，我们计算了 $N = 10$ 水平所需的质量修正，并分析了它们在增加 $N$ 时的行为。最后，我们推测低自旋态之间存在混合，并推测单环质量矩阵受某种随机矩阵理论控制。", "authors": [{"name": "Massimo Bianchi"}, {"name": "Maurizio Firrotta"}, {"name": "Lorenzo Grimaldi"}], "featured_authors": [{"name": "Massimo Bianchi"}, {"name": "Maurizio Firrotta"}, {"name": "Lorenzo Grimaldi"}], "author_count": 3}, {"id": "2603.11459", "category": "hep-th", "title": "Diving into booklet wormholes", "abstract": "arXiv:2508.17898 proposed the booklet wormhole as the holographic dual of the GHZ state. This paper extends the investigation into this geometry, particularly focusing on the junction conditions for matter fields. We show that the symmetry of the GHZ state requires the bulk to admit special Killing vector fields that standard manifolds cannot realize. Moreover, these bulk symmetries require unprecedented quantum non-local junction conditions at the multi-way interface: Observers entering from different horizons will perceive different states inside the wormhole, where the junction conditions appear as constraints on the observables of different sets of observers. We finally discuss how to render booklet wormholes traversable via boundary deformations. A localized wave packet injected from one page generally evolves into a non-local mixed state on each remaining page, with the information encoded in the entanglement between different pages.", "url": "https://arxiv.org/abs/2603.11459", "type": "理论", "summary": "arXiv:2508.17898 提出小册子虫洞作为 GHZ 态的全息对偶。本文将研究扩展到这种几何形状，特别关注物质场的结条件。我们证明了 GHZ 态的对称性要求体承认标准流形无法实现的特殊杀伤矢量场。此外，这些体对称性需要多路接口处前所未有的量子非局域结条件：从不同视界进入的观察者将感知到虫洞内的不同状态，其中结条件表现为对不同观察者组的可观测值的约束。我们最后讨论如何通过边界变形渲染可穿越的小册子虫洞。从一页注入的局域波包通常会演变成每个剩余页面上的非局域混合状态，信息编码在不同页面之间的纠缠中。", "authors": [{"name": "Libo Jiang"}, {"name": "Yan Liu"}], "featured_authors": [{"name": "Libo Jiang"}, {"name": "Yan Liu"}], "author_count": 2}, {"id": "2603.11626", "category": "hep-th", "title": "Gauge invariant non-perturbative Wilson action in quantum electrodynamics", "abstract": "By employing the gradient flow exact renormalization group (GFERG), we study the renormalization group (RG) flow of a manifestly gauge or BRST invariant non-perturbative ansatz of the 1PI Wilson action in quantum electrodynamics. The gauge invariance of the Wilson action is \\emph{exactly\\/} preserved under the RG flow. We explicitly solve the GFERG equation in the leading and partially the next to leading orders of the large $N_f$ approximation, where $N_f$ is the number of flavors. We obtain gauge invariant critical exponents and the gauge invariant 1PI Wilson action at an infrared (IR) fixed point for~$D<4$, where $D$ is the spacetime dimension.", "url": "https://arxiv.org/abs/2603.11626", "type": "理论", "summary": "通过采用梯度流精确重正化群 (GFERG)，我们研究了量子电动力学中 1PI Wilson 作用的明显规范或 BRST 不变非微扰拟像的重正化群 (RG) 流。威尔逊作用的规范不变性在 RG 流下保持 \\emph{exactly\\/}。我们显式地求解大 $N_f$ 近似的前导和部分次前导阶中的 GFERG 方程，其中 $N_f$ 是口味的数量。我们在~$D<4$ 的红外 (IR) 固定点获得规范不变临界指数和规范不变 1PI Wilson 作用，其中 $D$ 是时空维度。", "authors": [{"name": "Sorato Nagao"}, {"name": "Hiroshi Suzuki"}], "featured_authors": [{"name": "Sorato Nagao"}, {"name": "Hiroshi Suzuki"}], "author_count": 2}, {"id": "2603.11724", "category": "hep-th", "title": "Quantum backreaction and stability of topological wormholes", "abstract": "We investigate the quantum stability of a timelike topological wormhole with a simple geometry $M_2 \\times S^2$, supported classically by anisotropic fluid. We compute the one-loop quantum backreaction generated by the vacuum fluctuations of a minimally coupled, massive scalar field propagating on the wormhole background. Using dimensional regularization we renormalize the one-loop energy-momentum tensor and identify the necessary gravitational counterterms. We then solve the semiclassical Einstein equations to linear order in $\\hbar$ for both time-dependent and static metric {\\it Ansätze}. Depending on the choice of finite counterterms, the quantum effects can induce either negative or positive angular pressure, which will tend to destabilize or stablize the wormhole, respectively. We also show that a classically traversable wormhole will remain traversable when the quantum backreaction is taken into account. It would be of interest to investigate whether these conclusions remain true when the equations of semiclassical gravity are self-consistently solved.", "url": "https://arxiv.org/abs/2603.11724", "type": "理论", "summary": "我们研究了具有简单几何结构 $M_2 \\times S^2$ 的类时拓扑虫洞的量子稳定性，并由各向异性流体经典支持。我们计算了在虫洞背景上传播的最小耦合的大规模标量场的真空涨落所产生的单环量子反反应。使用维度正则化，我们重新规范化单环能量动量张量并确定必要的引力反项。然后，我们将半经典爱因斯坦方程求解为 $\\hbar$ 中的线性阶，以获得瞬态度量和静态度量 {\\it Ansätze}。根据有限反项的选择，量子效应可以引起负角压力或正角压力，这将分别导致虫洞不稳定或稳定。我们还表明，当考虑到量子反反应时，经典可穿越的虫洞将保持可穿越。当半经典引力方程自洽求解时，研究这些结论是否仍然正确，这将是很有趣的。", "authors": [{"name": "Haris Mehulic"}, {"name": "Tomislav Prokopec"}], "featured_authors": [{"name": "Haris Mehulic"}, {"name": "Tomislav Prokopec"}], "author_count": 2}, {"id": "2603.11923", "category": "hep-th", "title": "On the Sugawara Current Algebra Proposal for M-Theory", "abstract": "We examine the proposal of [29] that M-theory may admit a Sugawara-type current algebra formulation based on $E_{11} \\otimes_s l_1$. Motivated by the role of generalized coordinates in E-theory, we ask whether current algebra relations of this type can be derived in a setting that includes those coordinates systematically. We show that such a construction can indeed be carried out for a rigid $E_{11}$ model in which the generalized coordinates are treated as inert under the rigid symmetry, in contrast with E-theory. We also argue that the bilinear form entering the Schwinger term requires closer scrutiny, since any natural ad-invariant extension of the $E_{11}$ Cartan-Killing form to $E_{11} \\otimes_s l_1$ is degenerate.", "url": "https://arxiv.org/abs/2603.11923", "type": "理论", "summary": "我们研究了 [29] 的建议，即 M 理论可能承认基于 $E_{11} \\otimes_s l_1$ 的菅原型电流代数公式。受广义坐标在 E 理论中的作用的启发，我们询问是否可以在系统地包含这些坐标的设置中导出这种类型的当前代数关系。我们证明，这种构造确实可以用于刚性 $E_{11}$ 模型，其中广义坐标在刚性对称下被视为惰性，与 E 理论相反。我们还认为，进入施温格项的双线性形式需要更仔细的审查，因为 $E_{11}$ Cartan-Killing 形式到 $E_{11} \\otimes_s l_1$ 的任何自然广告不变扩展都是退化的。", "authors": [{"name": "Keith Glennon"}], "featured_authors": [{"name": "Keith Glennon"}], "author_count": 1}, {"id": "2603.11966", "category": "hep-th", "title": "Soft cutoffs in the covariant phase space of dynamical reference frames", "abstract": "We construct covariant theories incorporating fluctuating boundaries and soft cutoffs by introducing dynamical reference frames (DRFs). This framework generalizes the covariant action from a hard-cutoff to a soft-cutoff formulation, utilizing smearing functions and their corresponding operator expansions. This generalization initially leads to a loss of diffeomorphism covariance, which is recovered solely by restricting the DRFs, along with both their associated and linear MCFs, to specific forms, and by imposing suitable boundary conditions on the smearing functions. Satisfying these conditions restores covariance in relational spacetime, thereby enabling the consistent definition of subsystems. Within the covariant phase space formalism, we derive the charges of the soft-cutoff theory while explicitly addressing the inherent ambiguities arising from the boundary Lagrangian. We demonstrate that introducing an additional pointwise dependence is essential to resolve these ambiguities and ensure the integrability of the charges, even under fluctuating boundary conditions. Finally, in the context of General Relativity (GR), we establish the conditions under which holographic renormalization results at the asymptotic boundary coincide with the Noether charges derived from our soft-cutoff procedure.", "url": "https://arxiv.org/abs/2603.11966", "type": "理论", "summary": "我们通过引入动态参考系（DRF）构建了包含波动边界和软截止的协变理论。该框架利用涂抹函数及其相应的算子扩展，将协变动作从硬截止公式推广到软截止公式。这种概括最初会导致微分同胚协方差的损失，而这种损失只能通过将 DRF 及其相关的线性 MCF 限制为特定形式，并在涂抹函数上施加适当的边界条件来恢复。满足这些条件可以恢复关系时空的协变性，从而实现子系统的一致定义。在协变相空间形式主义中，我们推导了软截止理论的电荷，同时明确解决了边界拉格朗日产生的固有模糊性。我们证明，即使在波动的边界条件下，引入额外的点依赖对于解决这些模糊性并确保电荷的可积性至关重要。\n\n最后，在广义相对论（GR）的背景下，我们建立了渐近边界处的全息重整化结果与从我们的软截止程序导出的诺特电荷一致的条件。", "authors": [{"name": "Kang Liu"}, {"name": "Wei Guo"}, {"name": "Xiao-Mei Kuang"}], "featured_authors": [{"name": "Kang Liu"}, {"name": "Wei Guo"}, {"name": "Xiao-Mei Kuang"}], "author_count": 3}, {"id": "2603.11993", "category": "hep-th", "title": "More on Bulk Local State in Flat Holography", "abstract": "We revisit and extend the construction of bulk local states in flat holography, focusing on the induced representation obtained from the flat limit of the AdS highest-weight conditions. In three dimensions we clarify the scaling mismatch between bra and ket states in the flat basis and resolve it by introducing a dual basis, which yields a smooth flat limit and reproduces the correct Green's function. For higher dimensions we construct bulk local states explicitly, both in the momentum basis and in an alternative tilde basis. The flat limit of the AdS$_{d+1}$ construction is shown to be non-uniform in the descendant level and the Riemann-sum treatment over the scaling window $n\\sim l$ converts the discrete descendant expansion into the continuum momentum representation, recovering the massive propagator. The tilde basis generalizes seamlessly to any dimension and is related to the three-dimensional flat basis by a sign factor. These results establish the induced representation as the correct algebraic foundation for bulk reconstruction in flat holography and provide a unified framework valid for arbitrary dimension.", "url": "https://arxiv.org/abs/2603.11993", "type": "理论", "summary": "我们重新审视并扩展了平面全息中大块局部状态的构造，重点关注从 AdS 最高权重条件的平面限制获得的诱导表示。在三个维度中，我们澄清了平坦基中 bra 和 ket 状态之间的标度不匹配，并通过引入双基来解决它，这产生了平滑的平坦极限并再现了正确的格林函数。对于更高的维度，我们在动量基础和替代波形符基础上明确构建大量局部状态。 AdS$_{d+1}$ 构造的平坦极限在后代水平中显示为不均匀，并且缩放窗口 $n\\sim l$ 上的黎曼和处理将离散后代展开转换为连续动量表示，恢复大规模传播器。波形符基础可以无缝地推广到任何维度，并且通过符号因子与三维平面基础相关。这些结果将诱导表示建立为平面全息术中体重建的正确代数基础，并提供了对任意维度有效的统一框架。", "authors": [{"name": "Peng-Xiang Hao"}, {"name": "Kotaro Shinmyo"}, {"name": "Yu-ki Suzuki"}, {"name": "Shunta Takahashi"}], "featured_authors": [{"name": "Peng-Xiang Hao"}, {"name": "Kotaro Shinmyo"}, {"name": "Yu-ki Suzuki"}, {"name": "Shunta Takahashi"}], "author_count": 4}, {"id": "2603.11997", "category": "hep-th", "title": "Large-$N$ Torus Knots in Lens Spaces and Their Quiver Structure", "abstract": "We study torus knot invariants in the lens space $S^{3}/\\mathbb{Z}_{p}$ within Chern--Simons theory. Using the surgery and modular description of lens spaces, we derive a general expression for the invariant of an $(\\alpha,\\beta)$ torus knot in this background. In the large-$N$ limit these invariants simplify and acquire a universal form: the invariant of an $(\\alpha,\\beta)$ torus knot in $S^{3}/\\mathbb{Z}_{p}$ can be expressed in terms of the invariant of the $(\\alpha,\\alpha+p\\beta)$ torus knot in $S^{3}$. After an appropriate redefinition of knot variables, the generating functions of these invariants exhibit a structure analogous to quiver partition functions. Since the associated quiver is independent of the rank $N$ and level $k$ of Chern--Simons theory, the large-$N$ result provides a direct way to identify the underlying quiver, allowing us to determine the quiver structure associated with torus knots in $S^{3}/\\mathbb{Z}_{p}$.", "url": "https://arxiv.org/abs/2603.11997", "type": "理论", "summary": "我们研究陈-西蒙斯理论中透镜空间 $S^{3}/\\mathbb{Z}_{p}$ 中的环面结不变量。利用透镜空间的手术和模块化描述，我们推导出这种背景下 $(\\alpha,\\beta)$ 环面结不变量的一般表达式。在大$N$限制下，这些不变量简化并获得通用形式：$S^{3}/\\mathbb{Z}_{p}$中$(\\alpha,\\beta)$环面结的不变量可以用$S^{3}$中$(\\alpha,\\alpha+p\\beta)$环面结的不变量来表示。在对结变量进行适当的重新定义之后，这些不变量的生成函数表现出类似于箭袋配分函数的结构。由于相关的箭袋与 Chern-Simons 理论的等级 $N$ 和级别 $k$ 无关，因此大 $N$ 结果提供了识别潜在箭袋的直接方法，使我们能够确定与 $S^{3}/\\mathbb{Z}_{p}$ 中的环面结相关的箭袋结构。", "authors": [{"name": "Ritabrata Bhattacharya"}, {"name": "Suvankar Dutta"}, {"name": "Naman Pasari"}, {"name": "Nitin Verma"}], "featured_authors": [{"name": "Ritabrata Bhattacharya"}, {"name": "Suvankar Dutta"}, {"name": "Naman Pasari"}, {"name": "Nitin Verma"}], "author_count": 4}, {"id": "2603.12084", "category": "hep-th", "title": "The disk 1-point function in timelike Liouville theory", "abstract": "We compute the disk 1-point function in timelike Liouville theory. Using the Coulomb gas formalism and analytically continuing in the number of screening operators, we derive an explicit formula, which is shown to satisfy the correct reflection symmetry, to have the expected self-dual properties, to fulfill the bootstrap shift-equations, and to reduce to previous known results in the appropriate limits. In the limit of zero cosmological constant, our result reproduces the one recently obtained in arXiv:2505.09390 .", "url": "https://arxiv.org/abs/2603.12084", "type": "理论", "summary": "我们用类时刘维尔理论计算圆盘 1 点函数。使用库仑气体形式主义并在筛选算子的数量上进行分析连续，我们推导出一个显式公式，该公式被证明满足正确的反射对称性，具有预期的自对偶性质，满足自举移位方程，并在适当的限制内减少到先前已知的结果。在宇宙学常数为零的极限下，我们的结果再现了最近在 arXiv:2505.09390 中获得的结果。", "authors": [{"name": "Gaston Giribet"}, {"name": "Bruno Sivilotti"}], "featured_authors": [{"name": "Gaston Giribet"}, {"name": "Bruno Sivilotti"}], "author_count": 2}, {"id": "2603.12113", "category": "hep-th", "title": "Integrability from Homotopy Algebras", "abstract": "Homotopy algebraic methods have become increasingly influential in studying field theories. We consider semi-holomorphic Chern-Simons theory and its relation with the principal chiral model. In particular, we establish an explicit quasi-isomorphism between the cyclic $L_\\infty$-algebras governing both theories which directly gives the Lax connection. This provides a concrete example for studying integrability of a two-dimensional system through the homotopy algebraic lens.", "url": "https://arxiv.org/abs/2603.12113", "type": "理论", "summary": "同伦代数方法在场论研究中的影响力越来越大。我们考虑半全纯陈-西蒙斯理论及其与主要手性模型的关系。特别是，我们在控制两个直接给出 Lax 连接的理论的循环 $L_\\infty$ 代数之间建立了显式的准同构。这为通过同伦代数透镜研究二维系统的可积性提供了具体的例子。", "authors": [{"name": "Luigi Alfonsi"}, {"name": "Leron Borsten"}, {"name": "Mehran Jalali Farahani"}, {"name": "Hyungrok Kim"}, {"name": "Martin Wolf"}, {"name": "Charles Alastair Stephen Young"}], "featured_authors": [{"name": "Luigi Alfonsi"}, {"name": "Leron Borsten"}, {"name": "Mehran Jalali Farahani"}, {"name": "Hyungrok Kim"}, {"name": "Martin Wolf"}, {"name": "Charles Alastair Stephen Young"}], "author_count": 6}, {"id": "2603.12199", "category": "hep-th", "title": "Hawking Radiation from Tunneling in Black Hole Quantum Mechanics", "abstract": "It was proposed in \\cite{Chu:2024qil} that a quantum black hole can be described by a fuzzy sphere together with a half-filled Fermi sea. In this paper we propose that the tunneling of a fuzzy sphere system to a small one describes the quantum decay of black hole by Hawking radiation. Since the Fermi sea shrinks and the quantum mechanical Hamiltonian conserves fermion number, the amplitude of transition naively vanishes unless the tunneling path provides exact number of zero modes to soak up the excess fermi states. We show that a monopole on fuzzy sphere does exactly that. This fixes the tunneling path. The resulting tunneling rate reproduces Page's result for the semi-classical decay rate of black hole. We propose to identify the fermi states released by the monopole as the Hawking radiation. At the level of probability, the Hawking radiation is found to be given by a Boltzmann distribution at the Hawking temperature. One can go beyond the probabilistic description by determining the full wave function of the multi-partite Hawking quanta. This is possible with a real time formulation of the tunneling process. Unitarity is manifest in our quantum mechanics.", "url": "https://arxiv.org/abs/2603.12199", "type": "理论", "summary": "\\cite{Chu:2024qil} 中提出，量子黑洞可以用模糊球体和半填充的费米海来描述。在本文中，我们提出模糊球体系统向小球体系统的隧道效应描述了霍金辐射引起的黑洞的量子衰变。由于费米海收缩并且量子力学哈密顿量守恒费米子数，除非隧道路径提供精确数量的零模式来吸收多余的费米态，否则跃迁幅度会自然消失。我们证明了模糊球体上的单极子正是这样做的。这修复了隧道路径。由此产生的隧道速率再现了佩奇关于黑洞半经典衰变速率的结果。我们建议将单极子释放的费米态识别为霍金辐射。在概率水平上，发现霍金辐射由霍金温度下的玻尔兹曼分布给出。通过确定多部分霍金量子的完整波函数，我们可以超越概率描述。这可以通过实时制定隧道过程来实现。统一性体现在我们的量子力学中。", "authors": [{"name": "Chong-Sun Chu"}], "featured_authors": [{"name": "Chong-Sun Chu"}], "author_count": 1}, {"id": "2603.11581", "category": "math-ph", "title": "Autoparallels and the Inverse Problem of the Calculus of Variations", "abstract": "We prove that autoparallel curves associated with a torsion-free but not necessarily metric-compatible affine connection can be derived from an action principle. We explicitly construct the action functional and show by standard variational techniques that it produces the desired equations. Our analysis is based on systematically solving the inverse problem of the calculus of variation and the associated Helmholtz conditions. This demonstrates that the dynamics of autoparallels admit a consistent variational formulation even in the presence of non-metricity. Our results provide a variational framework for particle motion in metric-affine geometries and thereby contribute to the mathematical foundations of the geodesic principle in relativistic gravity.", "url": "https://arxiv.org/abs/2603.11581", "type": "理论", "summary": "我们证明，与无扭转但不一定与度量兼容的仿射连接相关的自动平行曲线可以从作用原理中导出。我们明确地构造了动作泛函，并通过标准变分技术表明它产生了所需的方程。我们的分析基于系统地解决变分演算的反问题和相关的亥姆霍兹条件。这表明，即使存在非度量性，自动平行的动力学也允许一致的变分公式。我们的结果为度量仿射几何中的粒子运动提供了一个变分框架，从而为相对论引力中的测地线原理的数学基础做出了贡献。", "authors": [{"name": "Lavinia Heisenberg"}], "featured_authors": [{"name": "Lavinia Heisenberg"}], "author_count": 1}, {"id": "2603.11674", "category": "math-ph", "title": "Systems of partial differential equations describing pseudo-spherical or spherical surfaces", "abstract": "In this paper, we study systems of nonlinear partial differential equations which describe surfaces of constant curvature. From the flatness condition of connection 1-forms, we present a classification of systems of Camassa-Holm-type equations of the form \\begin{equation*} \\left\\{ \\begin{aligned} u_{t} - u_{xxt} &= F(x, t, u, u_{x}, \\dots, \\partial ^{m} u/\\partial _x^{m}, v, v_{x}, \\dots, \\partial ^{n} v/\\partial _x^{n}), \\\\ v_{t} - v_{xxt} &= G(x, t, u, u_{x}, \\dots, \\partial ^{m} u/\\partial _x^{m}, v, v_{x}, \\dots, \\partial ^{n} v/\\partial _x^{n}), \\end{aligned} \\right. \\end{equation*} with $m,n\\geq2$, for $F$ and $G$ smooth functions, describing pseudospherical or spherical surfaces. We also establish classification results for a special type of third-order system. Applications of the results provide new examples of such systems, such as the Song-Qu-Qiao system, the two-component Camassa-Holm system with cubic nonlinearity, and the modified Camass-Holm-type system. Moreover, we construct the nonlocal symmetry and a non-trivial solutions for the two-component Camassa-Holm system with cubic nonlinearity from the gradients of spectral parameters.", "url": "https://arxiv.org/abs/2603.11674", "type": "理论", "summary": "在本文中，我们研究描述常曲率表面的非线性偏微分方程组。根据连接1-形式的平坦条件，我们提出了形式为 \\begin{equation*} \\left\\{ \\begin{aligned} u_{t} - u_{xxt} &= F(x, t, u, u_{x}, \\dots, \\partial ^{m} u/\\partial _x^{m}, v, v_{x}, \\dots, \\partial ^{n} v/\\partial _x^{n}), \\\\ v_{t} - v_{xxt} &= G(x, t, u, u_{x}, \\dots, \\partial ^{m} u/\\partial _x^{m}, v, v_{x}, \\dots, \\partial ^{n} v/\\partial _x^{n}), \\end{对齐} \\right。 \\end{equation*} 与 $m,n\\geq2$，用于 $F$ 和 $G$ 平滑函数，描述伪球面或球面。我们还为特殊类型的三阶系统建立了分类结果。结果的应用为此类系统提供了新的例子，例如宋曲桥系统、具有三次非线性的二分量Camassa-Holm系统以及修正的Camass-Holm型系统。此外，我们根据谱参数的梯度构造了具有三次非线性的二分量 Camassa-Holm 系统的非局部对称性和非平凡解。", "authors": [{"name": "Mingyue Guo"}, {"name": "Jing Kang"}, {"name": "Zhenhua Shi"}], "featured_authors": [{"name": "Mingyue Guo"}, {"name": "Jing Kang"}, {"name": "Zhenhua Shi"}], "author_count": 3}, {"id": "2603.12019", "category": "math-ph", "title": "On Exotic Materials in 3D Linear Elasticity with High Symmetry Classes", "abstract": "An anisotropic elastic material is referred to as exotic when, under specific loadings, its mechanical response exhibits a higher degree of symmetry than that prescribed by its intrinsic material symmetry. Such materials, which may be regarded as lying, conceptually and functionally, between two distinct symmetry classes, are of significant practical relevance. They enable the tailored design of metamaterials capable of reconciling otherwise incompatible mechanical requirements; for example, achieving directional isotropy of the Young's modulus in an intrinsically anisotropic medium. This work focuses on the systematic classification of exotic structures within the framework of three-dimensional linear elasticity. An exhaustive classification is carried out, leading to the enumeration of 18 exotic structures corresponding to symmetry classes higher than orthotropy. Representative examples of exotic elastic behaviours are analysed in detail.", "url": "https://arxiv.org/abs/2603.12019", "type": "理论", "summary": "当在特定载荷下，各向异性弹性材料的机械响应表现出比其固有材料对称性规定的更高程度的对称性时，各向异性弹性材料被称为奇异弹性材料。这些材料在概念上和功能上都可以被视为位于两种不同的对称类别之间，具有重要的实际意义。它们实现了超材料的定制设计，能够协调其他不兼容的机械要求；例如，在本质各向异性介质中实现杨氏模量的方向各向同性。这项工作的重点是在三维线性弹性框架内对奇异结构进行系统分类。进行了详尽的分类，列举了 18 种奇异结构，对应于高于正交各向异性的对称性类别。详细分析了奇异弹性行为的代表性例子。", "authors": [{"name": "Nicolas Auffray"}, {"name": "Guangjin Mou"}, {"name": "Boris Desmorat"}], "featured_authors": [{"name": "Nicolas Auffray"}, {"name": "Guangjin Mou"}, {"name": "Boris Desmorat"}], "author_count": 3}, {"id": "2603.12241", "category": "math-ph", "title": "The Euclidean $ϕ^4_2$ theory as a limit of an inhomogeneous Bose gas", "abstract": "We prove that the grand canonical Gibbs state of an interacting two-dimensional quantum Bose gas confined by a trapping potential converges to the complex Euclidean field theory with local quartic self-interaction, when the density of the gas becomes large and the range of the interaction becomes small. We obtain convergence of the relative partition function and convergence in $L^1 \\cap L^\\infty$ of the renormalised reduced density matrices. The field theory is supported on distributions of negative regularity, which requires a renormalisation by divergent mass and energy counterterms. Unlike previous results in the homogeneous setting of the torus without a trapping potential, the counterterms are not given by a finite collection of scalars but by diverging counterterm functions. This leads to significant new mathematical challenges. For our proof, we also derive quantitative bounds on the Green function of Schrödinger operators and of its gradient, which might be of independent interest.", "url": "https://arxiv.org/abs/2603.12241", "type": "理论", "summary": "我们证明，当气体密度变大且相互作用范围变小时，由俘获势限制的相互作用的二维量子玻色气体的大正则吉布斯态收敛于具有局部四次自相互作用的复杂欧几里得场论。我们获得了相对配分函数的收敛性以及重整化约简密度矩阵的 $L^1 \\cap L^\\infty$ 的收敛性。场论得到负正则性分布的支持，这需要通过发散的质量和能量反项进行重整化。与之前在没有捕获势的环面均匀设置中的结果不同，反项不是由有限的标量集合给出，而是由发散的反项函数给出。这导致了重大的新数学挑战。为了我们的证明，我们还推导了薛定谔算子的格林函数及其梯度的定量界限，这可能是独立的兴趣。", "authors": [{"name": "Cristina Caraci"}, {"name": "Antti Knowles"}, {"name": "Alessio Ranallo"}, {"name": "Pedro Torres Giesteira"}], "featured_authors": [{"name": "Cristina Caraci"}, {"name": "Antti Knowles"}, {"name": "Alessio Ranallo"}, {"name": "Pedro Torres Giesteira"}], "author_count": 4}, {"id": "2603.11079", "category": "quant-ph", "title": "Quantum batteries and time dilation", "abstract": "Is spacetime fundamental or can it be derived through quantum interactions? We propose here a way to describe time dilation solely from quantum mechanics. First we start by observing that any operational notion of time must imply some sort of regular motion and, crucially, some sort of memory. Thus the clock model we use here is a simple example of a quantum memory: a charging battery. We describe here the charging of such batteries with quantum open dynamics. The expected value of these batteries grow linearly in time like $\\varphi t$. The open dynamics is dependent on an auxiliar state $\\sigma$. Therefore, with a different auxiliar state we have a different $\\varphi$. We can describe time dilation and thus a metric this way. We exemplify with a black hole metric.", "url": "https://arxiv.org/abs/2603.11079", "type": "理论", "summary": "时空是基本的还是可以通过量子相互作用衍生出来？我们在这里提出一种仅从量子力学来描述时间膨胀的方法。首先，我们首先观察到任何可操作的时间概念都必须意味着某种规则运动，最重要的是意味着某种记忆。因此，我们这里使用的时钟模型是量子存储器的一个简单示例：充电电池。我们在这里描述了利用量子开放动力学对此类电池进行充电。这些电池的预期价值随时间线性增长，如$\\varphi t$。开放动态依赖于辅助状态 $\\sigma$。因此，对于不同的辅助状态，我们有不同的 $\\varphi$。我们可以用这种方式描述时间膨胀和度量。我们以黑洞度量为例。", "authors": [{"name": "Esteban Martínez-Vargas"}], "featured_authors": [{"name": "Esteban Martínez-Vargas"}], "author_count": 1}, {"id": "2603.11156", "category": "quant-ph", "title": "Low $T$-count preparation of nuclear eigenstates with tensor networks", "abstract": "We present an efficient protocol leveraging classical computation to support Initial State Preparation for strongly correlated fermionic systems, a critical bottleneck for fault-tolerant quantum simulation. Focusing on nuclear shell model eigenstates, we first demonstrate that the Density Matrix Renormalization Group algorithm can efficiently approximate target states as Matrix Product States, capitalizing on the favourable entanglement structure of these fermionic systems. These high-fidelity approximations are then leveraged as a classical resource in a variational circuit optimization scheme to compile shallow quantum circuits. We establish concrete resource estimates by decomposing the resulting circuits into the industry-standard Clifford$+T$ gateset, exploring the benefits of specialized $U3$ synthesis techniques. For all nuclear systems tested, on up to 76 qubit Hamiltonians, we consistently find low $T$-count circuits preparing the nuclear eigenstates to high fidelity with $\\sim 2\\times 10^4$ total $T$ gates. This low number gives confidence these eigenstates can be prepared on early fault-tolerant quantum computers. Our work establishes a viable path toward practical ground state preparation for nuclear structure and other fermionic applications.", "url": "https://arxiv.org/abs/2603.11156", "type": "理论+数值", "summary": "我们提出了一种利用经典计算的有效协议来支持强相关费米子系统的初始状态准备，这是容错量子模拟的关键瓶颈。着眼于核壳模型本征态，我们首先证明密度矩阵重整化群算法可以有效地将目标态近似为矩阵积态，利用这些费米子系统有利的纠缠结构。然后，这些高保真近似被用作变分电路优化方案中的经典资源来编译浅量子电路。我们通过将生成的电路分解为行业标准 Clifford$+T$ 门集来建立具体的资源估计，探索专门的 $U3$ 合成技术的好处。对于所有测试的核系统，在多达 76 个量子位哈密顿量上，我们一致发现低 $T$ 计数电路通过 $\\sim 2\\times 10^4$ 总 $T$ 门将核本征态准备为高保真度。这个低数字使人们有信心可以在早期的容错量子计算机上准备这些本征态。\n\n我们的工作为核结构和其他费米子应用的实际基态准备建立了一条可行的道路。", "authors": [{"name": "Joe Gibbs"}, {"name": "Lukasz Cincio"}, {"name": "Chandan Sarma"}, {"name": "Zoë Holmes"}, {"name": "Paul Stevenson"}], "featured_authors": [{"name": "Joe Gibbs"}, {"name": "Lukasz Cincio"}, {"name": "Chandan Sarma"}, {"name": "Zoë Holmes"}, {"name": "Paul Stevenson"}], "author_count": 5}, {"id": "2603.11185", "category": "quant-ph", "title": "Engineering Higher-order Effective Hamiltonians", "abstract": "Advancing quantum technologies requires precise and robust coherent control of quantum systems. Robust higher-order Hamiltonian engineering is essential for high-precision control and for accessing effective dynamics absent at zeroth order. Here, we introduce a systematic methodology for achieving the precision, robustness, and complexity required for quantum control through the engineering of higher-order processes and effective Hamiltonians. We identify the minimal subspace of achievable effective Hamiltonian at each order and provide universal cost functions for achieving desired targets. Examples include robust sequences for decoupling, three-body interactions and detuning/interaction correlations.", "url": "https://arxiv.org/abs/2603.11185", "type": "理论", "summary": "推进量子技术需要对量子系统进行精确和鲁棒的相干控制。鲁棒的高阶哈密顿工程对于高精度控制和获得零阶上不存在的有效动力学至关重要。在这里，我们介绍了一种系统方法，通过高阶过程和有效哈密顿量的设计来实现量子控制所需的精度、鲁棒性和复杂性。我们确定每个阶可实现的有效哈密顿量的最小子空间，并提供通用成本函数以实现期望的目标。例子包括用于解耦、三体相互作用和失谐/相互作用相关性的鲁棒序列。", "authors": [{"name": "Jiahui Chen"}, {"name": "David Cory"}], "featured_authors": [{"name": "Jiahui Chen"}, {"name": "David Cory"}], "author_count": 2}, {"id": "2603.11189", "category": "quant-ph", "title": "DysonNet: Constant-Time Local Updates for Neural Quantum States", "abstract": "Neural quantum states (NQS) provide a flexible variational framework for many-body wavefunctions, but suffer from high computational cost and limited interpretability. We introduce DysonNet, a broad class of NQS that couples strictly local nonlinearities through global linear layers. This structure is analogous to a truncated Dyson series which gives an intuitive interpretation of local wavefunction updates as scattering from static impurities. By resumming the scattering series, single-spin-flip updates can be computed in $\\mathcal{O}(1)$ time, independent of system size, using an algorithm we call ABACUS. Implementing DysonNet with the state-space model S4, we obtain up to $230\\times$ speedups over Vision-Transformers for computing the local estimator. This corresponds to an asymptotic $\\mathcal{O}(N^2)$ improvement in training-time scaling, reaching $\\mathcal{O}(N \\log^2 N)$ total training complexity in area-law phases. Benchmarks on the 1D long-range Ising model and frustrated $J_1$-$J_2$ chains show that DysonNet matches state-of-the-art NQS accuracy while removing the dominant local-update overhead. More broadly, our results suggest a route to scalable NQS architectures where physical interpretability directly enables computational efficiency.", "url": "https://arxiv.org/abs/2603.11189", "type": "理论+数值", "summary": "神经量子态（NQS）为多体波函数提供了灵活的变分框架，但面临计算成本高和可解释性有限的问题。我们引入 DysonNet，这是一类广泛的 NQS，它通过全局线性层耦合严格的局部非线性。这种结构类似于截断的戴森级数，它给出了局部波函数更新作为静态杂质散射的直观解释。通过恢复散射序列，可以使用我们称为 ABACUS 的算法在 $\\mathcal{O}(1)$ 时间内计算出单次自旋翻转更新，而与系统大小无关。使用状态空间模型 S4 实现 DysonNet，我们在计算局部估计量时比 Vision-Transformers 获得高达 230 倍的加速。这对应于训练时间缩放的渐近 $\\mathcal{O}(N^2)$ 改进，达到 $\\mathcal{O}(N \\log^2 N)$ 面积律阶段的总训练复杂度。一维远程 Ising 模型和受挫的 $J_1$-$J_2$ 链的基准表明，DysonNet 与最先进的 NQS 精度相匹配，同时消除了主要的本地更新开销。\n\n更广泛地说，我们的结果提出了一条通往可扩展 NQS 架构的途径，其中物理可解释性直接提高了计算效率。", "authors": [{"name": "Lucas Winter"}, {"name": "Andreas Nunnenkamp"}], "featured_authors": [{"name": "Lucas Winter"}, {"name": "Andreas Nunnenkamp"}], "author_count": 2}, {"id": "2603.11207", "category": "quant-ph", "title": "Kraus map closed-form solution for general master equation dynamics", "abstract": "The Kraus representation of quantum channels allows for a precise emulation of the complex dynamics that take place on quantum processors, whether for benchmarking algorithms, predicting the performance of error correction and mitigation, or in the myriad other uses of compiled digital sequences. Nonetheless, starting from first principles to obtain continuous quantum master equations involves various approximations such as weak coupling to the environment. Further, converting these equations to Kraus operators cannot generally be obtained in closed-form due to the complicated commutator structure of the problem. In our work, we bridge this gap by providing a general closed form formulation for arbitrarily strong driving while remaining linear in the dissipator. The Kraus solution is expressed as a Riemann sum where higher terms can converge quickly to high precision, which we demonstrate numerically. Such a formulation is highly relevant to quantum computing and gate-based models, where effective models are highly sought for large rotation gate angles, even under the influence of underlying non-trivial noise mechanisms.", "url": "https://arxiv.org/abs/2603.11207", "type": "理论+数值", "summary": "量子通道的克劳斯表示可以精确模拟量子处理器上发生的复杂动态，无论是用于基准算法、预测纠错和缓解的性能，还是用于编译数字序列的无数其他用途。尽管如此，从第一原理出发获得连续量子主方程涉及各种近似，例如与环境的弱耦合。此外，由于问题的换向器结构复杂，通常无法以封闭形式将这些方程转换为克劳斯算子。在我们的工作中，我们通过提供通用封闭形式公式来弥补这一差距，以实现任意强驱动，同时在耗散器中保持线性。克劳斯解被表示为黎曼和，其中更高的项可以快速收敛到高精度，我们用数值证明了这一点。这种公式与量子计算和基于门的模型高度相关，即使在潜在的非平凡噪声机制的影响下，对于大旋转门角度也高度寻求有效的模型。", "authors": [{"name": "Shahrukh Chishti"}, {"name": "Francisco Andrés Cárdenas-López"}, {"name": "Felix Motzoi"}], "featured_authors": [{"name": "Shahrukh Chishti"}, {"name": "Francisco Andrés Cárdenas-López"}, {"name": "Felix Motzoi"}], "author_count": 3}, {"id": "2603.11221", "category": "quant-ph", "title": "Higher-Order Quantum Objects are Strong Profunctors", "abstract": "We explore the sense in which the existing constructions for higher-order maps on quantum theory based on causality constraints and compositionality constraints respectively, coincide. More precisely, we construct a functor F : Caus(C) -> StProf(C1) from higher-order causal categories to the category of strong profunctors over first-order causal processes that is lax-lax duoidal, full, faithful, and strongly closed whenever C is additive. When C = CP this embedding is furthermore strong on the sequencer for duoidal categories, expressing the possibility to interpret one-way signalling (but not general non-signalling) constraints in terms of the coend calculus for profunctors. We conclude that insofar as compositional constraints can be used to express causality constraints, the profunctorial approach generalises higher-order quantum theory to a construction over general symmetric monoidal categories.", "url": "https://arxiv.org/abs/2603.11221", "type": "理论", "summary": "我们探讨了分别基于因果约束和组合约束的量子理论高阶映射的现有构造的重合意义。更准确地说，我们构造一个函子 F : Caus(C) -> StProf(C1)，从高阶因果范畴到一阶因果过程上的强函子范畴，只要 C 是可加性的，它就是松松二元的、完全的、忠实的、强闭的。当 C = CP 时，这种嵌入在二元类别的定序器上更加强大，表示根据函子的共端演算解释单向信令（但不是一般非信令）约束的可能性。我们的结论是，只要组合约束可以用来表达因果关系约束，那么专业方法就将高阶量子理论推广到一般对称幺半群范畴上的构造。", "authors": [{"name": "Matt Wilson"}, {"name": "James Hefford"}], "featured_authors": [{"name": "Matt Wilson"}, {"name": "James Hefford"}], "author_count": 2}, {"id": "2603.11236", "category": "quant-ph", "title": "A First-Principles Thermodynamic Uncertainty Relation for Shortcuts to Adiabaticity", "abstract": "We study the fundamental limitations of implementing time-dependent Hamiltonian protocols when ''time'' is provided by a quantum clock rather than an external classical parameter. For a parametric harmonic oscillator controlled through a shortcut-to-adiabaticity (STA) schedule and coupled to a minimal clock degree of freedom, tracing out the clock yields an effective reduced dynamics that is a mixture of unitary Gaussian trajectories. Within a noise-dominated regime, we compute the energetic deviation from the target STA outcome and its fluctuations, together with the fidelity to the target evolution and the purity loss of the reduced state, for vacuum and coherent initial states. Combining these observables produces a thermodynamic-uncertainty-type tradeoff that links achievable precision to an irreducible loss of purity set by the clock precision and the protocol sensitivity.", "url": "https://arxiv.org/abs/2603.11236", "type": "理论+数值", "summary": "我们研究了当“时间”由量子时钟而不是外部经典参数提供时实现依赖于时间的哈密顿协议的基本限制。对于通过绝热捷径 (STA) 时间表控制并耦合到最小时钟自由度的参数谐振子，追踪时钟会产生有效的简化动态，该动态是酉高斯轨迹的混合。在噪声主导的范围内，我们计算真空和相干初始态与目标 STA 结果的能量偏差及其波动，以及目标演化的保真度和还原态的纯度损失。结合这些可观察到的结果会产生热力学不确定性类型的权衡，将可实现的精度与由时钟精度和协议灵敏度设定的不可减少的纯度损失联系起来。", "authors": [{"name": "Guillermo Perna"}, {"name": "Federico Centrone"}, {"name": "Esteban Calzetta"}], "featured_authors": [{"name": "Guillermo Perna"}, {"name": "Federico Centrone"}, {"name": "Esteban Calzetta"}], "author_count": 3}, {"id": "2603.11300", "category": "quant-ph", "title": "Many-Body Entanglement Properties of Finite Interacting Fermionic Hamiltonians", "abstract": "We analyze many-body entanglement in interacting fermionic systems by using the $M$-body reduced density matrix. We demonstrate that if a particle number conserving fermionic Hamiltonian contains only up to $M$-body interaction terms, then its $N$-particle ground state cannot be maximally $M$-body entangled. As a key step in the proof, we show that the energy expectation value of a maximally $M$-body mixed state is equal to the spectral mean of the Hamiltonian on the corresponding $N$-particle subspace. We further demonstrate that the many-body entanglement structure of a ground state can place quantitative constraint on the interaction strength of its parent Hamiltonian. We illustrate the theorem and its implications in Hubbard and extended SYK models. Going beyond ground states, we analyze entanglement generation under unitary dynamics from Slater-determinant initial states in these models. We determine early-time growth and estimate entanglement saturation times. Finally, we derive explicit symmetry-refined saturation upper bounds for $M$-body entanglement in the presence of an Abelian symmetry.", "url": "https://arxiv.org/abs/2603.11300", "type": "理论", "summary": "我们使用 $M$ 体约简密度矩阵来分析相互作用费米子系统中的多体纠缠。我们证明，如果粒子数守恒费米子哈密顿量仅包含最多 $M$-体相互作用项，则其 $N$-粒子基态不能最大程度地与 $M$-体纠缠。作为证明的关键一步，我们证明最大 $M$ 体混合态的能量期望值等于相应 $N$ 粒子子空间上哈密顿量的谱平均值。我们进一步证明基态的多体纠缠结构可以对其父哈密顿量的相互作用强度进行定量约束。我们在 Hubbard 和扩展 SYK 模型中说明了该定理及其含义。超越基态，我们从这些模型中的 Slater 行列式初始状态分析了酉动力学下的纠缠生成。我们确定早期增长并估计纠缠饱和时间。最后，我们在阿贝尔对称性存在的情况下推导出 $M$ 体纠缠的显式对称细化饱和上限。", "authors": [{"name": "Irakli Giorgadze"}, {"name": "Grayson Welch"}, {"name": "Haixuan Huang"}, {"name": "Elio J. König"}, {"name": "Jukka I. Väyrynen"}], "featured_authors": [{"name": "Irakli Giorgadze"}, {"name": "Grayson Welch"}, {"name": "Haixuan Huang"}, {"name": "Elio J. König"}, {"name": "Jukka I. Väyrynen"}], "author_count": 5}, {"id": "2603.11568", "category": "quant-ph", "title": "Quantum Error Correction by Purification", "abstract": "We present a general-purpose quantum error correction primitive based on state purification via the SWAP test, which we refer to as purification quantum error correction (PQEC). This method operates on $N$ noisy copies, requires minimally $O(M\\log_2 N)$ data qubits to process the $M$-qubit inputs. In a similar way to standard QEC, the purification steps may be interleaved within a quantum algorithm to suppress the logical error rate. No postselection is performed and no knowledge of the state is required. We analyze its performance under a variety of error channels and find that PQEC is highly effective at boosting fidelity and reducing logical error rates, particularly for the depolarizing channel. Error thresholds for the local depolarizing channel are found to be $ 75 \\%$ for any register size. For local dephasing, the error threshold is reduced to $ 50 \\% $ but may be boosted using twirling.", "url": "https://arxiv.org/abs/2603.11568", "type": "数值", "summary": "我们通过 SWAP 测试提出了一种基于状态净化的通用量子纠错原语，我们将其称为净化量子纠错（PQEC）。此方法在 $N$ 个噪声副本上运行，最少需要 $O(M\\log_2 N)$ 个数据量子位来处理 $M$ 个量子位输入。以与标准 QEC 类似的方式，纯化步骤可以在量子算法内交织以抑制逻辑错误率。不进行后选择，也不需要了解状态。我们分析了其在各种错误通道下的性能，发现 PQEC 在提高保真度和降低逻辑错误率方面非常有效，特别是对于去极化通道。对于任何寄存器大小，局部去极化通道的误差阈值均为 $ 75 \\%$。对于局部相移，误差阈值降低至 $ 50 \\% $，但可以使用旋转来提高。", "authors": [{"name": "Jonathan Raghoonanan"}, {"name": "Tim Byrnes"}], "featured_authors": [{"name": "Jonathan Raghoonanan"}, {"name": "Tim Byrnes"}], "author_count": 2}, {"id": "2603.11574", "category": "quant-ph", "title": "Surpassing Quantum Noise Limits with Nonlinear Amplification", "abstract": "Linear quantum amplifiers are indispensable tools for quantum technologies, yet their performance is fundamentally limited by quantum noise, precluding any signal-to-noise ratio (SNR) enhancement unless supplemented by post-selection or non-classical resources. To surpass this limitation, we propose a nonlinear quantum amplification strategy that exploits the interplay between a gain-stabilized bright eigenmode of a coupled two-mode bosonic system and Kerr nonlinearity. We demonstrate that this interplay enables the signal gain to surpass the noise gain in a selected quadrature, leading to a net increase in the SNR beyond the quantum limits of conventional linear amplifiers. Our work thus establishes a novel nonlinear amplification paradigm capable of enhancing the SNR, with promising applications across quantum information processing, quantum communications, and quantum metrology.", "url": "https://arxiv.org/abs/2603.11574", "type": "理论", "summary": "线性量子放大器是量子技术不可或缺的工具，但其性能从根本上受到量子噪声的限制，无法实现任何信噪比 (SNR) 增强，除非通过后选择或非经典资源进行补充。为了超越这一限制，我们提出了一种非线性量子放大策略，该策略利用耦合双模玻色子系统的增益稳定的明亮本征模与克尔非线性之间的相互作用。我们证明，这种相互作用使信号增益能够超过选定正交中的噪声增益，从而导致 SNR 的净增加超出传统线性放大器的量子极限。因此，我们的工作建立了一种能够提高信噪比的新型非线性放大范例，在量子信息处理、量子通信和量子计量领域具有广阔的应用前景。", "authors": [{"name": "Ya-Long Ren"}, {"name": "Rong-Teng Cao"}, {"name": "Sheng-Li Ma"}, {"name": "Ren Zhang"}, {"name": "Fu-Li Li"}, {"name": "Franco Nori"}, {"name": "Peng-Bo Li"}], "featured_authors": [{"name": "Ya-Long Ren"}, {"name": "Rong-Teng Cao"}, {"name": "Sheng-Li Ma"}, {"name": "Fu-Li Li"}, {"name": "Franco Nori"}, {"name": "Peng-Bo Li"}], "author_count": 7}, {"id": "2603.11587", "category": "quant-ph", "title": "Criticality-enhanced global frequency sensing with a monitored Kerr parametric oscillator via extended Kalman filter", "abstract": "We analyze a global sensing scenario in which the frequency of a monitored Kerr parametric oscillator is estimated assuming limited prior information. The frequency is estimated in real-time by continuously monitoring the oscillator quadrature through homodyne detection and processing the resulting photocurrent with an extended Kalman filter (EKF). Due to the sensor nonlinearity, individual EKF trajectories do not always converge to the true unknown frequency in the long-time limit. However, we show that the statistical distribution of the frequency estimates does exhibit a sharp peak around the true value in the same limit. Leveraging this key statistical property, we develop a global sensing protocol assisted by adaptive control of the sensor parameters to harness critical enhancement. We present numerical evidence that this criticality-enhanced frequency estimation remains robust under low detection efficiency.", "url": "https://arxiv.org/abs/2603.11587", "type": "理论+数值", "summary": "我们分析了一个全局传感场景，其中假设有限的先验信息来估计受监控的克尔参量振荡器的频率。通过零差检测连续监测振荡器正交并使用扩展卡尔曼滤波器 (EKF) 处理产生的光电流，实时估计频率。由于传感器的非线性，单个 EKF 轨迹在长时间限制内并不总是收敛到真正的未知频率。然而，我们表明频率估计的统计分布确实在相同极限内的真实值周围呈现出尖锐的峰值。利用这一关键的统计特性，我们开发了一种全局传感协议，辅以传感器参数的自适应控制，以利用关键的增强功能。我们提供的数值证据表明，这种关键性增强的频率估计在低检测效率下仍然保持稳健。", "authors": [{"name": "Cheng Zhang"}, {"name": "Mauro Cirio"}, {"name": "Xin-Qi Li"}, {"name": "Pengfei Liang"}], "featured_authors": [{"name": "Cheng Zhang"}, {"name": "Mauro Cirio"}, {"name": "Xin-Qi Li"}, {"name": "Pengfei Liang"}], "author_count": 4}, {"id": "2603.11857", "category": "quant-ph", "title": "On Contextuality as a Feature of Logic and Probability Theory", "abstract": "In quantum mechanics, not everything that can be observed can be observed simultaneously. Observational data exhibits \\emph{contextuality} -- a generalisation of nonlocality -- if the result of an observation is necessarily dependent on which combination of observables was measured. This article gives a mathematical introduction to contextuality, emphasising its nature as a general feature of probability theory and logic, rather than of any particular quantum theory.", "url": "https://arxiv.org/abs/2603.11857", "type": "理论", "summary": "在量子力学中，并不是所有可以观察到的东西都可以同时观察到。如果观测结果必然取决于测量的可观测值的组合，那么观测数据就会表现出\\emph{上下文性}——非定域性的概括。本文对语境性进行了数学介绍，强调其本质是概率论和逻辑的一般特征，而不是任何特定的量子理论的一般特征。", "authors": [{"name": "Ask Ellingsen"}], "featured_authors": [{"name": "Ask Ellingsen"}], "author_count": 1}, {"id": "2603.11889", "category": "quant-ph", "title": "Probing the memory of a superconducting qubit environment", "abstract": "Achieving fault tolerance with superconducting quantum processors requires qubits to operate within the regime of threshold theorems based on the Born-Markov approximation. This approximation, which models dissipation as constant energy decay into a memoryless environment, breaks down when qubits couple to long-lived two-level systems (TLSs) that become polarized during operation and retain memory of past qubit states. Here, we show that non-Poissonian quantum jump traces carry the information required to distinguish long-lived TLSs from the standard Markovian bath. By fitting the Solomon equations to measured quantum jumps dynamics arising naturally due to thermal fluctuations, we can disentangle the coupling of the qubit to the two environments. Sweeping the qubit frequency reveals distinct peaks, each associated with a TLS that outlives the qubit, providing a handle to understand their microscopic origin.", "url": "https://arxiv.org/abs/2603.11889", "type": "理论", "summary": "使用超导量子处理器实现容错需要量子位在基于玻恩-马尔可夫近似的阈值定理范围内运行。这种近似将耗散建模为无记忆环境中的恒定能量衰减，当量子位耦合到长寿命的两级系统（TLS）时就会崩溃，该系统在运行过程中会被极化并保留过去量子位状态的记忆。在这里，我们证明非泊松量子跃迁轨迹携带了区分长寿命 TLS 和标准马尔可夫浴所需的信息。通过将所罗门方程拟合到由于热波动而自然产生的测量的量子跃迁动力学，我们可以解开量子位与两种环境的耦合。扫描量子位频率会发现不同的峰值，每个峰值都与比量子位寿命更长的 TLS 相关，从而提供了了解其微观起源的句柄。", "authors": [{"name": "Nicolas Gosling"}, {"name": "Denis Bénâtre"}, {"name": "Nicolas Zapata"}, {"name": "Paul Kugler"}, {"name": "Mitchell Field"}, {"name": "Sumeru Hazra"}, {"name": "Simon Günzler"}, {"name": "Thomas Reisinger"}, {"name": "Martin Spiecker"}, {"name": "Mathieu Féchant"}, {"name": "Ioan M. Pop"}], "featured_authors": [{"name": "Nicolas Gosling"}, {"name": "Denis Bénâtre"}, {"name": "Nicolas Zapata"}, {"name": "Martin Spiecker"}, {"name": "Mathieu Féchant"}, {"name": "Ioan M. Pop"}], "author_count": 11}, {"id": "2603.11925", "category": "quant-ph", "title": "Lectures on Open Quantum Systems", "abstract": "These notes are a short introduction to the mathematical theory of open quantum systems. They are meant to serve as an entry point into a broad research area which has applications across the quantum sciences dealing with systems subjected to external noise. The guiding idea is to let the key structures of the theory emerge from a concrete model. By working through the dissipative Jaynes-Cummings model the reader will dis- cover explicitly how irreversible dynamics arises from a unitary system-reservoir evolution. The notions of the continuous mode limit, correlation functions, spectral density appear in a natural manner and lead to the evolution equation of the open system in form of a master equation. This sets the stage for the more general analysis of completely positive, trace preserving (CPTP) maps and the study of quantum dynamical semigroups. We motivate and prove the Kraus representation theorem, the dilation theorem and the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) theorem. Working through the exercises (for which full solutions are supplied) will reinforce the ideas introduced in the main text.", "url": "https://arxiv.org/abs/2603.11925", "type": "理论", "summary": "这些笔记是对开放量子系统数学理论的简短介绍。它们旨在作为广泛研究领域的切入点，该领域在涉及外部噪声系统的量子科学中具有应用。指导思想是让理论的关键结构从具体模型中显现出来。通过研究耗散杰恩斯-卡明斯模型，读者将清楚地发现不可逆动力学是如何从单一系统-储层演化中产生的。连续模式极限、相关函数、谱密度的概念以自然的方式出现，并导致开放系统的演化方程以主方程的形式出现。这为更全面的完全正迹保留（CPTP）图分析和量子动力学半群的研究奠定了基础。我们激发并证明了 Kraus 表示定理、膨胀定理和 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 定理。通过练习（提供完整的解决方案）将强化正文中介绍的想法。", "authors": [{"name": "Marco Merkli"}, {"name": "Ángel Neira"}], "featured_authors": [{"name": "Marco Merkli"}, {"name": "Ángel Neira"}], "author_count": 2}, {"id": "2603.11982", "category": "quant-ph", "title": "Approximate Reduced Lindblad Dynamics via Algebraic and Adiabatic Methods", "abstract": "We present an algebraic framework for approximate model reduction of Markovian open quantum dynamics that guarantees complete positivity and trace preservation by construction. First, we show that projecting a Lindblad generator on its center manifold -- the space spanned by eigenoperators with purely imaginary eigenvalue -- yields an asymptotically exact reduced quantum dynamical semigroup whose dynamics is unitary, with exponentially decaying transient error controlled by the generator's spectral gap. Second, for analytic perturbations of a Lindblad generator with a tractable center manifold, we propose a perturbative reduction that keeps the reduced space fixed at the unperturbed center manifold. The resulting generator is shown to remain a valid Lindbladian for arbitrary perturbation strengths, and explicit finite-time error bounds, that quantify leakage from the unperturbed center sector, are provided. We further clarify the connection to adiabatic elimination methods, by both showing how the algebraic reduction can be directly related to a first-order adiabatic-elimination and by providing sufficient conditions under which the latter method can be applied while preserving complete positivity. We showcase the usefulness of our techniques in dissipative many-body quantum systems exhibiting non-stationary long-time dynamics.", "url": "https://arxiv.org/abs/2603.11982", "type": "理论", "summary": "我们提出了一个用于马尔可夫开放量子动力学近似模型简化的代数框架，该框架通过构造保证了完全的正性和痕迹保存。首先，我们证明将 Lindblad 生成器投影到其中心流形（由具有纯虚数特征值的本征算子跨越的空间）上产生一个渐近精确的约化量子动力学半群，其动力学是酉的，具有由生成器的谱间隙控制的指数衰减瞬态误差。其次，对于具有易处理中心流形的 Lindblad 发生器的分析扰动，我们提出了一种扰动约简，使减少的空间固定在未扰动的中心流形上。结果表明，对于任意扰动强度，生成的生成器仍然是有效的 Lindbladian，并且提供了量化来自未扰动中心扇区的泄漏的明确的有限时间误差界限。\n\n我们进一步阐明了与绝热消除方法的联系，通过展示代数约简如何与一阶绝热消除直接相关，并提供充分的条件，在该条件下可以应用后一种方法，同时保持完全的积极性。我们展示了我们的技术在表现出非平稳长期动态的耗散多体量子系统中的有用性。", "authors": [{"name": "Tommaso Grigoletto"}, {"name": "Alain Sarlette"}, {"name": "Francesco Ticozzi"}, {"name": "Lorenza Viola"}], "featured_authors": [{"name": "Tommaso Grigoletto"}, {"name": "Alain Sarlette"}, {"name": "Francesco Ticozzi"}, {"name": "Lorenza Viola"}], "author_count": 4}, {"id": "2603.11998", "category": "quant-ph", "title": "Quantum simulation of Liouville equation in geometrical optics with partial transmission and reflection via Schrödingerization", "abstract": "This paper investigates quantum simulation algorithms for the Liouville equation in geometrical optics with partial transmission and reflection at sharp interfaces, based on the Schrödingerization method. By means of a warped phase transformation in one higher dimension, the Schrödingerization method converts linear partial differential equations into a system of Schrödinger-type equations with unitary evolution, thereby rendering them suitable for quantum simulation. In this work, the Schrödingerization method is combined with a Hamiltonian-preserving scheme that incorporates partial transmission and reflection into the numerical flux. A main difficulty is that the interface treatment in the classical scheme relies on threshold-dependent \"if/else\" procedures, making it highly nontrivial to reformulate the method in a matrix form suitable for quantum simulation. To overcome this difficulty, we encode the interface conditions into a partial transmission and reflection matrix prepared a priori, rather than during the time evolution. We present detailed constructions of the resulting quantum algorithms and show through complexity analysis that the proposed methods achieve polynomial quantum advantage in the precision parameter $\\epsilon$ over their classical counterparts.", "url": "https://arxiv.org/abs/2603.11998", "type": "理论+数值", "summary": "本文研究基于薛定谔化方法的几何光学中具有锐界面部分透射和反射的刘维尔方程的量子模拟算法。薛定谔化方法通过一维中的扭曲相变，将线性偏微分方程转换为具有酉演化的薛定谔型方程组，从而使其适合量子模拟。在这项工作中，薛定谔化方法与哈密顿保持方案相结合，将部分透射和反射纳入数值通量中。主要困难在于经典方案中的界面处理依赖于阈值相关的“if/else”过程，使得以适合量子模拟的矩阵形式重新表述该方法变得非常重要。为了克服这个困难，我们将界面条件编码到先验准备的部分透射和反射矩阵中，而不是在时间演化过程中。\n\n我们提出了由此产生的量子算法的详细结构，并通过复杂性分析表明，所提出的方法在精度参数 $\\epsilon$ 方面比经典方法实现了多项式量子优势。", "authors": [{"name": "Shi Jin"}, {"name": "Shuyi Zhang"}], "featured_authors": [{"name": "Shi Jin"}, {"name": "Shuyi Zhang"}], "author_count": 2}, {"id": "2603.12004", "category": "quant-ph", "title": "Propagation of Two-Photon Zernike States in Atmospheric Turbulence", "abstract": "We analyze propagation and detection of two-photon states expanded in Zernike modes through atmospheric turbulence using the extended Huygens-Fresnel formalism. For SPDC states prepared with a single Zernike pump mode, we analytically reduce the 8-dimensional continuous propagation integrals to an exact, discrete modal expansion. In the absence of turbulence, Zernike addition enforces conservation of azimuthal index and a strict radial-order bound. Turbulence relaxes these constraints, driving structured azimuthal and radial crosstalk dominated by low-order aberration modes. By explicitly removing the lowest-order terms from the discrete turbulence sum, we demonstrate that partial adaptive optics correcting only up to the sixth radial order is sufficient to heavily suppress this crosstalk and restore near-ideal spatial correlations.", "url": "https://arxiv.org/abs/2603.12004", "type": "理论", "summary": "我们使用扩展的惠更斯-菲涅尔形式主义分析了通过大气湍流以泽尼克模式扩展的双光子态的传播和检测。对于使用单一 Zernike 泵浦模式准备的 SPDC 状态，我们通过分析将 8 维连续传播积分简化为精确的离散模态展开。在没有湍流的情况下，泽尼克加法强制保持方位角指数和严格的径向顺序界限。湍流放松了这些限制，驱动由低阶像差模式主导的结构化方位角和径向串扰。通过明确地从离散湍流和中删除最低阶项，我们证明仅校正第六径向阶的部分自适应光学就足以严重抑制这种串扰并恢复接近理想的空间相关性。", "authors": [{"name": "Hakob Avetisyan"}, {"name": "Vahagn Abgaryan"}], "featured_authors": [{"name": "Hakob Avetisyan"}, {"name": "Vahagn Abgaryan"}], "author_count": 2}, {"id": "2603.12054", "category": "quant-ph", "title": "Noise Correlations as a Resource in Pauli-Twirled Circuits", "abstract": "Randomized compiling (RC) is an established tool to tailor arbitrary quantum noise channels into Pauli errors. The effect of both spatial and temporal noise correlations in randomly compiled circuits, however, is not fully understood. Here, we show that for a broad class of correlated Gaussian noise, RC reduces both the strength and temporal range of correlations. For Clifford circuits, we derive a simple analytical expression for the circuit fidelity of randomly compiled circuits. Surprisingly, we show that this fidelity is always increased by the presence of correlations, suggesting that correlations are a resource in randomly compiled circuits. To leading order in system-bath coupling, we also show that RC suppresses the quantum component of bath correlations, implying that one can safely treat weak noise as being classical. Finally, through extensive numerical simulations, we show that our results remain valid for many relevant non-Clifford circuits. These results clarify how RC mitigates memory effects and enhances circuit robustness.", "url": "https://arxiv.org/abs/2603.12054", "type": "数值", "summary": "随机编译 (RC) 是一种成熟的工具，可将任意量子噪声通道定制为泡利误差。然而，随机编译电路中空间和时间噪声相关性的影响尚未完全理解。在这里，我们表明，对于一大类相关高斯噪声，RC 会降低相关性的强度和时间范围。对于 Clifford 电路，我们推导出随机编译电路的电路保真度的简单解析表达式。令人惊讶的是，我们表明这种保真度总是因相关性的存在而增加，这表明相关性是随机编译电路中的一种资源。对于系统-浴耦合的主导顺序，我们还表明 RC 抑制了浴相关的量子分量，这意味着可以安全地将弱噪声视为经典噪声。最后，通过广泛的数值模拟，我们表明我们的结果对于许多相关的非 Clifford 电路仍然有效。这些结果阐明了 RC 如何减轻记忆效应并增强电路鲁棒性。", "authors": [{"name": "Antoine Brillant"}, {"name": "Rohan N Rajmohan"}, {"name": "Peter Groszkowski"}, {"name": "Alireza Seif"}, {"name": "Jens Koch"}, {"name": "Aashish Clerk"}], "featured_authors": [{"name": "Antoine Brillant"}, {"name": "Rohan N Rajmohan"}, {"name": "Peter Groszkowski"}, {"name": "Alireza Seif"}, {"name": "Jens Koch"}, {"name": "Aashish Clerk"}], "author_count": 6}, {"id": "2603.12061", "category": "quant-ph", "title": "Critical Unstable Qubits in Particle Physics", "abstract": "We study in detail the dynamics of unstable two-level quantum systems by adopting the Bloch-vector representation. We identify a novel class of critical scenarios in which the so-called energy-level and decay-width vectors, ${\\bf E}$ and ${\\bf\\Gamma}$, are orthogonal to one another, and the parameter $r = |{\\bf \\Gamma}|/(2|{\\bf E}|)$ is less than~1. Most remarkably, we find that critical unstable qubit systems exhibit atypical behaviours like coherence--decoherence oscillations when analysed in an appropriately defined co-decaying frame of the system. By making use of a Fourier series decomposition, we define anharmonicity observables that quantify the degree of non-sinusoidal oscillation of a CUQ. We apply the results of our formalism to the neutral-meson systems and derive generic upper limits on these new observables. In particular, we provide a compilation table of all well-explored meson--antimeson two-level systems in terms of Bloch-sphere parameters.", "url": "https://arxiv.org/abs/2603.12061", "type": "理论", "summary": "我们通过采用布洛赫矢量表示来详细研究不稳定两能级量子系统的动力学。我们确定了一类新的关键场景，其中所谓的能量水平和衰减宽度向量 ${\\bf E}$ 和 ${\\bf\\Gamma}$ 彼此正交，并且参数 $r = |{\\bf \\Gamma}|/(2|{\\bf E}|)$ 小于~1。最值得注意的是，我们发现，在适当定义的系统共衰变框架中进行分析时，关键的不稳定量子位系统表现出非典型行为，例如相干-退相干振荡。通过利用傅里叶级数分解，我们定义了量化 CUQ 非正弦振荡程度的非谐可观测量。我们将形式主义的结果​​应用于中性介子系统，并得出这些新可观测量的通用上限。特别是，我们提供了所有经过充分探索的介子-反介子两能级系统的布洛赫球参数的汇编表。", "author
