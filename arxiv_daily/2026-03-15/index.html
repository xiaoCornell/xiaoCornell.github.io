  <style>
    :root {

    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }

    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }

  <script>
    const papers = [{"id": "2603.11176", "category": "cond-mat", "title": "Can electronic quantum criticality drive phonon-induced linear-in-temperature resistivity?", "abstract": "Optical phonons naturally generate linear-in-$T$ resistivity in the high-temperature equipartition regime, but their finite gap prevents this mechanism from surviving to asymptotically low temperatures. Here we analyze whether proximity to an electronic quantum critical point can remove this obstruction by strongly softening an optical phonon. We first derive a model-independent criterion for such softened phonons to control low-temperature transport: besides reducing the renormalized optical gap, the Landau-damped phonon must acquire a dynamical exponent $z_p>d$, where $d$ is the spatial dimension of the phonon, so that a sufficiently large thermally occupied phase space survives as $T\\to 0$. We then analyze a concrete mechanism in which the phonon couples nonlinearly to long-wavelength electronic collective modes near a $\\vec{Q}=0$ quantum critical point, and apply it to the Ising-nematic case. Within a large-$N$ field theoretic formulation, the phonon softening is enhanced near criticality, but in the clean theory the resulting dynamics lies at or near the marginal boundary for asymptotic $T$-linear scattering. Including feedback from the softened phonon back onto the electronic critical sector further weakens the tendency toward robust low-temperature $T$-linear transport. Our results sharpen both the promise and the limitations of phonon-based explanations of strange-metal transport near electronic criticality.", "url": "https://arxiv.org/abs/2603.11176", "type": "理论", "summary": "光学声子在高温均分状态下自然会产生线性$T$电阻率，但其有限的间隙阻止了这种机制在渐近低温下持续存在。在这里，我们分析接近电子量子临界点是否可以通过强烈软化光学声子来消除这种障碍。我们首先推导出此类软化声子控制低温输运的与模型无关的标准：除了减少重正化光学间隙之外，朗道阻尼声子必须获得动力学指数 $z_p>d$，其中 $d$ 是声子的空间维度，以便足够大的热占据相空间在 $T\\to 0$ 时存在。然后，我们分析了声子在 $\\vec{Q}=0$ 量子临界点附近与长波长电子集体模式非线性耦合的具体机制，并将其应用于伊辛向列情况。在大$N$场理论公式中，声子软化在临界点附近增强，但在干净的理论中，所得动力学位于或接近渐近$T$线性散射的边缘边界。\n\n将软化声子的反馈包括回电子关键部分进一步削弱了稳健的低温 $T$ 线性传输的趋势。我们的结果强化了基于声子的对电子临界附近奇异金属输运的解释的前景和局限性。", "authors": [{"name": "Haoyu Guo"}, {"name": "Debanjan Chowdhury"}], "featured_authors": [{"name": "Haoyu Guo"}, {"name": "Debanjan Chowdhury"}], "author_count": 2}, {"id": "2603.11182", "category": "cond-mat", "title": "Controlled localization of anyons in a graphene quantum Hall interferometer", "abstract": "Exchange statistics are a fundamental principle of quantum mechanics, dictating the symmetry of identical particle wavefunctions and thereby enabling emergent phenomena of many-body quantum states. The exchange-induced unitary transformation of both abelian and non-abelian anyonic wavefunctions can be probed using electronic fractional quantum Hall (FQH) interferometers, where quasiparticles propagating along the interfering FQH edge braid with those localized within the interferometer. Here, we add a gate-controlled dot/anti-dot in the center of a bilayer graphene FQH interferometer cavity to tune the number of enclosed anyons. We observe hundreds of controlled phase slips in the diagonal conductance across the interferometer for both abelian and non-abelian states, consistent with discrete changes in the localized quasiparticle population. For abelian anyons, the observed phase slips agree with the theoretically expected value. At half filling, our results suggest the interfering edge carries charge $|e^*/e| = 1/2$ abelian excitations, whereas charge $|e^*/e| = 1/4$ putative non-abelian anyons remain localized in the interferometer cavity. Controlling the population of localized $e/4$ anyons in an interferometer marks a significant milestone towards observing their non-local exchange statistics and building a fault tolerant topological qubit based on non-abelian anyon manipulation.", "url": "https://arxiv.org/abs/2603.11182", "type": "理论", "summary": "交换统计是量子力学的基本原理，它规定了相同粒子波函数的对称性，从而实现了多体量子态的涌现现象。阿贝尔和非阿贝尔任意子波函数的交换引起的酉变换可以使用电子分数量子霍尔 (FQH) 干涉仪进行探测，其中准粒子沿着干涉 FQH 边缘编织物与干涉仪内的那些局部粒子传播。在这里，我们在双层石墨烯 FQH 干涉仪腔的中心添加了一个门控点/反点，以调整封闭的任意子的数量。我们观察到阿贝尔态和非阿贝尔态的干涉仪对角线电导中存在数百个受控相滑移，这与局域准粒子群的离散变化一致。对于阿贝尔任意子，观察到的相滑与理论预期值一致。在半填充时，我们的结果表明干扰边缘带有电荷 $|e^*/e| = 1/2$ 阿贝尔激励，而电荷 $|e^*/e| = 1/4$ 假定的非阿贝尔任意子仍然位于干涉仪腔中。\n\n控制干涉仪中局部 $e/4$ 任意子的数量标志着观察其非局部交换统计数据和构建基于非阿贝尔任意子操作的容错拓扑量子位的一个重要里程碑。", "authors": [{"name": "Christina E. Henzinger"}, {"name": "James R. Ehrets"}, {"name": "Rikuto Fushio"}, {"name": "Junkai Dong"}, {"name": "Thomas Werkmeister"}, {"name": "Marie E. Wesson"}, {"name": "Kenji Watanabe"}, {"name": "Takashi Taniguchi"}, {"name": "Ashvin Vishwanath"}, {"name": "Bertrand I. Halperin"}, {"name": "Amir Yacoby"}, {"name": "Philip Kim"}], "featured_authors": [{"name": "Christina E. Henzinger"}, {"name": "James R. Ehrets"}, {"name": "Rikuto Fushio"}, {"name": "Bertrand I. Halperin"}, {"name": "Amir Yacoby"}, {"name": "Philip Kim"}], "author_count": 12}, {"id": "2603.11186", "category": "cond-mat", "title": "Hall conductance in a weakly time-reversal invariant open system", "abstract": "The quantum Hall effect and the quantum anomalous Hall effect both require time-reversal invariance to be broken. We show that non-equilibrium effects can cause Hall physics to arise even when the system is weakly time-reversal symmetric and no magnetic field is applied. In our model, this occurs due to a fermionic subsystem breaking time-reversal invariance even if the system as a whole does not. The fermions receive a TRI-breaking self-energy, caused by interactions with bosonic degrees of freedom in the system and with an external reservoir. As a result, the fermions develop a non-quantized Hall conductance. We demonstrate that, unlike in the equilibrium case, the presence of a mass term is insufficient for the Hall conductance to appear, and wave-function renormalization effects have to be included.", "url": "https://arxiv.org/abs/2603.11186", "type": "理论", "summary": "量子霍尔效应和量子反常霍尔效应都需要打破时间反转不变性。我们证明，即使系统是弱时间反演对称且不施加磁场，非平衡效应也会导致霍尔物理现象的出现。在我们的模型中，这是由于费米子子系统打破了时间反转不变性而发生的，即使整个系统没有打破时间反转不变性。费米子接收 TRI 破坏的自能，这是由系统中的玻色子自由度和外部储存库的相互作用引起的。结果，费米子产生非量化霍尔电导。我们证明，与平衡情况不同，质量项的存在不足以使霍尔电导出现，并且必须包括波函数重正化效应。", "authors": [{"name": "Alexander Fagerlund"}, {"name": "Christopher Ekman"}, {"name": "Rodrigo Arouca"}], "featured_authors": [{"name": "Alexander Fagerlund"}, {"name": "Christopher Ekman"}, {"name": "Rodrigo Arouca"}], "author_count": 3}, {"id": "2603.11192", "category": "cond-mat", "title": "Pattern stability in reaction-diffusion systems depends on path entropy", "abstract": "Reaction-diffusion systems driven far from thermodynamic equilibrium through the injection of energy can support multiple distinct spatial patterns that persist as long-lived dynamical phases. The stability of these metastable phases is not determined by thermodynamics, but by the transition paths connecting them. At finite particle numbers, intrinsic stochasticity induces rare transitions between competing patterns, rendering continuum mean-field descriptions insufficient, while exact stochastic simulations become computationally prohibitive in spatially extended systems. Here, we develop a nonequilibrium instanton framework that enables efficient computation of transition rates between metastable patterns from a single optimal transition path and its fluctuations. Using this theoretical framework, we show that an effective entropy in path space can qualitatively alter stability at finite particle numbers by increasing the exit rates of metastable patterns. By studying models of varying complexity, this work establishes path entropy as a key organizing principle for nonequilibrium pattern formation.", "url": "https://arxiv.org/abs/2603.11192", "type": "理论+数值", "summary": "通过注入能量而远离热力学平衡的反应扩散系统可以支持多种不同的空间模式，这些模式作为长寿命的动态相持续存在。这些亚稳态相的稳定性不是由热力学决定的，而是由连接它们的转变路径决定的。在有限的粒子数下，内在的随机性会引起竞争模式之间的罕见转变，导致连续平均场描述不足，而精确的随机模拟在空间扩展的系统中在计算上变得令人望而却步。在这里，我们开发了一个非平衡瞬子框架，可以有效计算来自单个最佳转换路径的亚稳态模式之间的转换率及其波动。使用这个理论框架，我们表明路径空间中的有效熵可以通过增加亚稳态模式的退出率来定性地改变有限粒子数的稳定性。通过研究不同复杂性的模型，这项工作将路径熵确立为非平衡模式形成的关键组织原则。", "authors": [{"name": "Eric R. Heller"}, {"name": "David T. Limmer"}], "featured_authors": [{"name": "Eric R. Heller"}, {"name": "David T. Limmer"}], "author_count": 2}, {"id": "2603.11203", "category": "cond-mat", "title": "Statistical Mechanics of Density- and Temperature-Dependent Potentials: Application to Condensed Phases within GenDPDE", "abstract": "Coarse-grain Lagrangian methods, such as Dissipative Particle Dynamics ( Hoogerbrugge et al., EPL, 1992), are suitable for describing mesoscopic fluid systems that include thermal fluctuations. However, the realistic simulation of liquids using these methods represents a longstanding problem. In this work, we develop a local thermodynamic (LTh) model for the description of condensed phases within the framework of the Generalized Dissipative Particle Dynamics with Energy Conservation (GenDPDE) method (Bonet Avalos et al., PCCP 2019). Such a model is appropriate for the analysis of liquids, due to the explicit account of the thermal expansion coefficient and isothermal compressibility at the mesoscale. We demonstrate the accuracy of the LTh model by examining the thermodynamic properties of argon at both liquid and supercritical conditions, through equilibrium simulations performed around two key reference states (125.7 K, 85.31 MPa, 1419.7 kg/m3 for liquid Ar, and 418.8 K, 85.31 MPa, 695.99 kg/m3 for supercritical Ar). Remarkably, we show that the model is also valid over a range of thermodynamic conditions near the reference states, allowing a correct description of the physics of systems with spatial variations in density and temperature. We further derive analytical expressions for the macroscopic pressure and energy equations of state based on the model parameters, discussing their validity and limitations. We demonstrate that, even at the mean-field level, accurately capturing local particle arrangements is essential for predicting macroscopic thermodynamic properties from mesoscopic data. We also assess the applicability of the HNC approximation in predicting the radial distribution function of the GenDPDE system, exploring its strengths and limitations. With the LTh model, GenDPDE offers a dependable and versatile tool for analysing condensed phases through coarse-grain techniques.", "url": "https://arxiv.org/abs/2603.11203", "type": "理论+数值", "summary": "粗粒拉格朗日方法，例如耗散粒子动力学（Hoogerbrugge 等人，EPL，1992），适合描述包含热波动的介观流体系统。然而，使用这些方法对液体进行真实模拟是一个长期存在的问题。在这项工作中，我们开发了一个局部热力学（LTh）模型，用于在能量守恒广义耗散粒子动力学（GenDPDE）方法的框架内描述凝聚相（Bonet Avalos 等人，PCCP 2019）。由于明确考虑了介观尺度的热膨胀系数和等温压缩性，这种模型适用于液体分析。我们通过在两个关键参考状态（液态氩为 125.7 K、85.31 MPa、1419.7 kg/m3，超临界氩为 418.8 K、85.31 MPa、695.99 kg/m3）附近进行平衡模拟，检查液态和超临界条件下氩的热力学性质，证明了 LTh 模型的准确性。\n\n值得注意的是，我们表明该模型在参考状态附近的一系列热力学条件下也是有效的，从而可以正确描述具有密度和温度空间变化的系统的物理特性。我们进一步根据模型参数推导了宏观压力和能量状态方程的解析表达式，并讨论了其有效性和局限性。我们证明，即使在平均场水平上，准确捕获局部粒子排列对于从介观数据预测宏观热力学性质也至关重要。我们还评估了 HNC 近似在预测 GenDPDE 系统径向分布函数中的适用性，探索其优点和局限性。借助 LTh 模型，GenDPDE 提供了一种可靠且多功能的工具，用于通过粗粒度技术分析凝聚相。", "authors": [{"name": "Giuseppe Colella"}, {"name": "Allan D. Mackie"}, {"name": "James P. Larentzos"}, {"name": "Fernando Bresme"}, {"name": "Josep Bonet Avalos"}], "featured_authors": [{"name": "Giuseppe Colella"}, {"name": "Allan D. Mackie"}, {"name": "James P. Larentzos"}, {"name": "Fernando Bresme"}, {"name": "Josep Bonet Avalos"}], "author_count": 5}, {"id": "2603.11263", "category": "cond-mat", "title": "Crossover to Sachdev-Ye-Kitaev criticality in an infinite-range quantum Heisenberg spin glass", "abstract": "We study the equilibrium dynamics of an infinite-range quantum Heisenberg model with random couplings, in which local magnetic moments arise from $\\mathcal{N}_f$ flavors of spinful fermions. We employ an expansion in $\\mathcal{N}_f$, which controls the strength of quantum fluctuations, and self-consistently include $1/\\mathcal{N}_f$ corrections to the Luttinger-Ward functional. In the large-$\\mathcal{N}_f$ limit, where quantum fluctuations are weak, the high- and low-temperature phases are respectively paramagnetic and spin glass ordered, with a transition temperature independent of $\\mathcal{N}_f$. For small numbers of fermionic flavors, however, quantum fluctuations substantially suppress the ordering temperature. We show that this behavior reflects the proximity of the system to a Sachdev-Ye-Kitaev (SYK) phase, where both fermionic and spin spectral densities display critical behavior over a broad range of finite frequencies, with the latter exhibiting the scale-invariant form $\\chi''(\\omega)\\sim \\operatorname{sgn}(\\omega)$. At the lowest energies and temperatures, spin-glass dynamics ultimately take over, producing a universal sub-Ohmic dynamical spin susceptibility $\\chi''(\\omega)\\sim \\operatorname{sgn}(\\omega)\\sqrt{|\\omega|}$. Our results establish a minimal framework for understanding dynamical crossovers between SYK criticality and spin-glass ordering.", "url": "https://arxiv.org/abs/2603.11263", "type": "理论", "summary": "我们研究具有随机耦合的无限范围量子海森堡模型的平衡动力学，其中局部磁矩源自自旋费米子的 $\\mathcal{N}_f$ 风味。我们采用 $\\mathcal{N}_f$ 的扩展来控制量子涨落的强度，并且自洽地包括对 Luttinger-Ward 泛函的 $1/\\mathcal{N}_f$ 修正。在大$\\mathcal{N}_f$极限下，量子涨落较弱，高温相和低温相分别是顺磁相和自旋玻璃有序相，其转变温度与$\\mathcal{N}_f$无关。然而，对于少量费米子风味，量子涨落显着抑制有序温度。我们表明，这种行为反映了系统接近 Sachdev-Ye-Kitaev (SYK) 相，其中费米子和自旋谱密度在广泛的有限频率上都表现出临界行为，后者表现出尺度不变形式 $\\chi''(\\omega)\\sim \\operatorname{sgn}(\\omega)$。\n\n在最低的能量和温度下，自旋玻璃动力学最终占据主导地位，产生通用的亚欧姆动态自旋敏感性 $\\chi''(\\omega)\\sim \\operatorname{sgn}(\\omega)\\sqrt{|\\omega|}$。我们的结果建立了一个最小的框架来理解 SYK 临界性和旋转玻璃有序性之间的动态交叉。", "authors": [{"name": "Hossein Hosseinabadi"}, {"name": "Subir Sachdev"}, {"name": "Jamir Marino"}], "featured_authors": [{"name": "Hossein Hosseinabadi"}, {"name": "Subir Sachdev"}, {"name": "Jamir Marino"}], "author_count": 3}, {"id": "2603.11322", "category": "cond-mat", "title": "From Embeddings to Dyson Series: Transformer Mechanics as Non-Hermitian Operator Theory", "abstract": "Transformer architectures are typically described in algorithmic and statistical terms, leaving their internal mechanics without a familiar structural language for researchers trained in physical theories. To bridge this gap, we develop a complementary operator-theoretic framework that recasts their mechanics in a language familiar to many-body physics. Beginning from the token as a discrete index without intrinsic geometry, we show that embedding corresponds to a basis transformation into a continuous representation space. Once such a reference basis is established, self-attention naturally assumes the role of a non-Hermitian interaction operator, and network depth implements an ordered composition of these interactions. Within this formulation, several empirical properties of deep Transformers -- including stability at large depth, representational saturation, and the effectiveness of multi-head decomposition -- find natural structural interpretations as consequences of regulated operator composition. Together, spectral geometry, channel factorization, and normalization emerge as organizing structural logic rather than isolated architectural choices. This perspective does not rely on post-hoc analogy, but follows a constructive path in which each parallel arises from the preceding structural step. By recasting Transformer mechanics in operator language, the framework lowers the conceptual barrier between deep learning and many-body physics through shared mathematical structure, making tools and intuitions from each domain more readily legible to the other.", "url": "https://arxiv.org/abs/2603.11322", "type": "理论+数值", "summary": "Transformer 架构通常用算法和统计术语来描述，这使得受过物理理论培训的研究人员没有熟悉的结构语言来描述其内部机制。为了弥补这一差距，我们开发了一个互补的算子理论框架，用多体物理学熟悉的语言重新构建了它们的力学。从作为没有内在几何的离散索引的标记开始，我们表明嵌入对应于到连续表示空间的基础变换。一旦建立了这样的参考基础，自注意力自然地承担了非厄米交互算子的角色，并且网络深度实现了这些交互的有序组合。在这个公式中，深度 Transformer 的几个经验特性——包括大深度的稳定性、代表性饱和度和多头分解的有效性——找到了作为受监管算子组合结果的自然结构解释。谱几何、通道分解和归一化共同作为组织结构逻辑而不是孤立的架构选择而出现。\n\n这种观点并不依赖于事后类比，而是遵循一条建设性的路径，其中每个相似之处都源于前面的结构步骤。通过用算子语言重塑 Transformer 机制，该框架通过共享的数学结构降低了深度学习和多体物理之间的概念障碍，使每个领域的工具和直觉更容易被另一个领域理解。", "authors": [{"name": "Po-Hao Chang"}], "featured_authors": [{"name": "Po-Hao Chang"}], "author_count": 1}, {"id": "2603.11326", "category": "cond-mat", "title": "Unraveling anomalous relaxation effects in the thermodynamic limit", "abstract": "We address two central open problems in the theory of anomalous Mpemba-like relaxations: their extension beyond one spatial dimension and their consistent formulation in the thermodynamic limit. Our framework is the antiferromagnetic Ising model on a square lattice under an externally applied magnetic field, which enables us to work in the presence of a phase transition. The rich phase diagram contains two control parameters: temperature and magnetic field. We demonstrate that the standard assumption of relaxation dominated by a single leading exponential is inconsistent for intensive observables exhibiting standard fluctuations. Instead, as the system size increases, a continuous spectrum of time scales emerges. Nevertheless, we make the ansatz that, in the vicinity of the phase transition, the spectral projector onto the slowest time scales can be effectively characterized in terms of an equilibrium thermodynamic quantity: the susceptibility associated with the order parameter of the metastable phase. Combined with the richness of the phase diagram, this ansatz yields qualitative and semi-quantitative predictions for optimal protocols leading to a variety of anomalous relaxation phenomena involving simultaneous variations of temperature and magnetic field. These include direct and inverse Mpemba effects, cooling-heating asymmetries, and faster heating induced by precooling. Careful Monte Carlo simulations validate our theoretical predictions. Furthermore, minimal post-optimization suffices to convert our analytically guided protocols into fully optimal ones that display anomalous relaxations in their most pronounced form.", "url": "https://arxiv.org/abs/2603.11326", "type": "理论+数值", "summary": "我们解决了反常 Mpemba 类松弛理论中的两个核心开放问题：它们超出一个空间维度的扩展以及它们在热力学极限中的一致公式。我们的框架是外部施加磁场下方形晶格上的反铁磁伊辛模型，这使我们能够在相变存在的情况下工作。丰富的相图包含两个控制参数：温度和磁场。我们证明，由单个领先指数主导的松弛标准假设对于表现出标准波动的密集可观测量是不一致的。相反，随着系统规模的增加，会出现连续的时间尺度范围。尽管如此，我们得出结论，在相变附近，最慢时间尺度上的光谱投影可以用平衡热力学量有效地表征：与亚稳态相的有序参数相关的磁化率。\n\n结合丰富的相图，该模拟可以对最佳方案进行定性和半定量预测，从而导致涉及温度和磁场同时变化的各种异常弛豫现象。其中包括直接和反向 Mpemba 效应、冷却-加热不对称以及预冷引起的更快加热。仔细的蒙特卡罗模拟验证了我们的理论预测。此外，最小的后优化足以将我们的分析引导协议转换为完全最优的协议，以最明显的形式显示异常松弛。", "authors": [{"name": "Emilio Pomares"}, {"name": "Víctor Martín-Mayor"}, {"name": "Antonio Lasanta"}, {"name": "Gabriel Álvarez"}], "featured_authors": [{"name": "Emilio Pomares"}, {"name": "Víctor Martín-Mayor"}, {"name": "Antonio Lasanta"}, {"name": "Gabriel Álvarez"}], "author_count": 4}, {"id": "2603.11373", "category": "cond-mat", "title": "Enhanced carrier binding and bond correlations in the Hubbard-Su-Schrieffer-Heeger model with dispersive optical phonons", "abstract": "Electron-phonon (e-ph) interactions play a crucial role in determining many properties of materials. In this context, the Su-Schrieffer-Heeger (SSH) model, where atomic motion modulates the electronic hopping, has gained significant attention due to its potential for strong electron pairing in relation to high-Tc superconductivity. Previous studies of the SSH models have addressed many aspects of this problem, but have focused heavily on either dilute or half-filled models with dispersionless (Einstein) phonons. Here, we study the effects of dispersive optical phonons on the lightly doped one-dimensional optical Hubbard-SSH model using the density matrix renormalization group. We observe a significant enhancement in singlet binding driven by phonon dispersion; however, by calculating various correlation functions, we find that the enhanced binding does not translate to increased superconducting correlations but rather robust bond correlations in the studied parameter regime. Nevertheless, the significant impact of phonon dispersion on these correlations highlights the need to go beyond the Einstein phonon limit while modeling realistic quantum materials.", "url": "https://arxiv.org/abs/2603.11373", "type": "理论", "summary": "电子-声子 (e-ph) 相互作用在决定材料的许多特性方面发挥着至关重要的作用。在此背景下，原子运动调节电子跳跃的 Su-Schrieffer-Heeger (SSH) 模型因其与高温超导相关的强电子配对潜力而受到广泛关注。以前对 SSH 模型的研究已经解决了这个问题的许多方面，但主要集中在具有无色散（爱因斯坦）声子的稀释或半填充模型上。在这里，我们使用密度矩阵重正化群研究色散光学声子对轻掺杂一维光学 Hubbard-SSH 模型的影响。我们观察到声子色散驱动的单线态结合显着增强；然而，通过计算各种相关函数，我们发现增强的结合并没有转化为超导相关性的增加，而是在所研究的参数范围内转化为稳健的键相关性。然而，声子色散对这些相关性的重大影响凸显了在模拟现实量子材料时超越爱因斯坦声子极限的必要性。", "authors": [{"name": "Debshikha Banerjee"}, {"name": "Alberto Nocera"}, {"name": "Steven Johnston"}], "featured_authors": [{"name": "Debshikha Banerjee"}, {"name": "Alberto Nocera"}, {"name": "Steven Johnston"}], "author_count": 3}, {"id": "2603.11416", "category": "cond-mat", "title": "Atomic-Scale Mechanisms of SiO$_2$ Plasma-Enhanced Chemical Vapor Deposition Revealed by Molecular Dynamics with a Machine-Learning Interatomic Potential", "abstract": "Plasma-enhanced chemical vapor deposition (PECVD) of silicon dioxide (SiO$_2$) is widely used for low-temperature fabrication of dielectric thin films, yet its atomic-scale growth mechanisms remain incompletely understood. In this work, we investigate SiO$_2$ PECVD using silane and N$_2$O as source gases via molecular dynamics simulations driven by a machine-learning interatomic potential. By systematically varying the oxidant-to-silane-derived species ratio $r$, we elucidate the evolution of film stoichiometry, density, and hydrogen content. Formation of the Si-O-Si network primarily proceeds via oxidation of surface Si-H groups to form Si-OH species, followed by condensation of neighboring Si-OH groups that produces H$_2$O as the dominant byproduct. At low $r$, H$_2$ formation via reactions between Si-H and Si-OH groups also contributes to the network formation. Increasing oxidant supply promotes the network formation through oxidation of residual Si-H species, suppressing hydrogen incorporation and leading to saturation of the Si/O ratio. Rapid chemisorption of silane-derived species, together with steric hindrance from pre-deposited species, results in localized growth and surface roughness. We further show that high-kinetic-energy plasma species can etch SiO$_2$ films, which potentially limits growth rates and enhances surface roughness under high RF-power conditions. These results provide atomic-scale insight into PECVD growth and guidance for optimizing film composition and quality.", "url": "https://arxiv.org/abs/2603.11416", "type": "理论+数值", "summary": "二氧化硅 (SiO$_2$) 的等离子体增强化学气相沉积 (PECVD) 广泛用于介电薄膜的低温制造，但其原子级生长机制仍不完全清楚。在这项工作中，我们通过机器学习原子间势驱动的分子动力学模拟，研究使用硅烷和 N$_2$O 作为源气体的 SiO$_2$ PECVD。通过系统地改变氧化剂与硅烷衍生的物质比率$r$，我们阐明了薄膜化学计量、密度和氢含量的演变。 Si-O-Si 网络的形成主要通过表面 Si-H 基团的氧化形成 Si-OH 物质，然后邻近的 Si-OH 基团缩合，产生 H$_2$O 作为主要副产物。在低 $r$ 下，通过 Si-H 和 Si-OH 基团之间的反应形成 H$_2$ 也有助于网络的形成。增加氧化剂供应可通过氧化残留的 Si-H 物质促进网络形成，抑制氢的掺入并导致 Si/O 比饱和。\n\n硅烷衍生物质的快速化学吸附以及预沉积物质的空间位阻导致局部生长和表面粗糙度。我们进一步表明，高动能等离子体物质可以蚀刻 SiO$_2$ 薄膜，这可能会限制生长速率并在高射频功率条件下提高表面粗糙度。这些结果为 PECVD 生长提供了原子尺度的见解，并为优化薄膜成分和质量提供了指导。", "authors": [{"name": "Jaehoon Kim"}, {"name": "Minseok Moon"}, {"name": "Hyunsung Cho"}, {"name": "Hyeon-Deuk Kim"}, {"name": "Rokyeon Kim"}, {"name": "Gyehyun Park"}, {"name": "Seungwu Han"}, {"name": "Youngho Kang"}], "featured_authors": [{"name": "Jaehoon Kim"}, {"name": "Minseok Moon"}, {"name": "Hyunsung Cho"}, {"name": "Gyehyun Park"}, {"name": "Seungwu Han"}, {"name": "Youngho Kang"}], "author_count": 8}, {"id": "2603.11450", "category": "cond-mat", "title": "Time irreversibility and entropy production in non-Hermitian Model A field theories", "abstract": "We develop a systematic framework to quantify irreversibility in scalar Model A field theories with a generic non-Hermitian term driving the dynamics. Using the stochastic path-integral formalism, we perform a controlled small-noise expansion, allowing the computation of the entropy production rate (EPR) and violations of the fluctuation-dissipation theorem (FDT). We show that the local EPR is entirely determined by the anti-Hermitian part of the linearised Langevin equation. Around steady states, the non-Hermitian component produces linear corrections to FDT violations and contributes quadratically to the EPR. As an illustration of the applicability of our approach, we analyse a minimal non-Hermitian extension of the Ginzburg-Landau $\\psi^4$ theory describing a non-reciprocal Ising model at coarse-grained scales, for which we obtain explicit expressions of the local EPR, showing that it localises at interfaces in non-uniform states. Our results provide a general characterisation of TRS breaking in non-Hermitian scalar field theories.", "url": "https://arxiv.org/abs/2603.11450", "type": "理论", "summary": "我们开发了一个系统框架来量化标量模型 A 场论中的不可逆性，并使用驱动动力学的通用非厄米术语。使用随机路径积分形式，我们执行受控的小噪声展开，允许计算熵产生率（EPR）并违反波动耗散定理（FDT）。我们证明局部 EPR 完全由线性朗之万方程的反厄米部分决定。在稳定状态附近，非厄米分量对 FDT 违规产生线性校正，并对 EPR 做出二次贡献。作为我们方法的适用性的说明，我们分析了 Ginzburg-Landau $\\psi^4$ 理论的最小非埃尔米特扩展，该理论描述了粗粒度尺度上的非互易 Ising 模型，为此我们获得了局部 EPR 的显式表达式，表明它定位在非均匀状态的界面上。我们的结果提供了非厄米标量场理论中 TRS 破坏的一般特征。", "authors": [{"name": "Matthias Carosi"}, {"name": "Ot Garcés"}, {"name": "Adrià Garcés"}, {"name": "Demian Levis"}], "featured_authors": [{"name": "Matthias Carosi"}, {"name": "Ot Garcés"}, {"name": "Adrià Garcés"}, {"name": "Demian Levis"}], "author_count": 4}, {"id": "2603.11463", "category": "cond-mat", "title": "Bootstrap Embedding for Interacting Electrons in Phonon Coherent-state Mean Field", "abstract": "We develop a fermi-bose bootstrap embedding (fb-BE) framework for the ground state of interacting elec- trons coupled to phonon mean field. The method combines bootstrap embedding for correlated electrons with a self-consistent coherent-state mean-field treatment for phonons. This method models the interacting electron-phonon problem as a system of correlated electrons traveling in a self-consistently specified potential landscape, allowing for efficient treatment of large lattice systems. Convergence of the methods for frag- ment size and total system size are demonstrated for one-dimensional Hubbard-Holstein model for up to 350 sites. Finite-size scaling is performed to extrapolate to infinite system size. Benchmarking against density matrix renormalization group for small 8-site system at half- and quarter-filling shows orders-of-magnitude runtime advantage. The comparison further reveals that the method performs best in regimes dominated by localization, such as the Mott insulating phase and the strong-coupling tiny polaron regime, where the local embedding ansatz is still valid. However, due to the mean-field treatment for phonons, we find limitations of our methods in the weakly coupled delocalized region and at the Peierls transition, where quantum phonon fluctuations and long-range kinetic correlations become substantial.", "url": "https://arxiv.org/abs/2603.11463", "type": "理论+数值", "summary": "我们开发了一个费米-玻色自举嵌入（fb-BE）框架，用于耦合到声子平均场的相互作用电子的基态。该方法将相关电子的自举嵌入与声子的自洽相干态平均场处理相结合。该方法将相互作用的电子声子问题建模为在自洽指定的电势景观中运动的相关电子系统，从而可以有效地处理大型晶格系统。对于多达 350 个位点的一维 Hubbard-Holstein 模型，证明了片段大小和总系统大小方法的收敛性。执行有限尺寸缩放以推断无限系统尺寸。对半填充和四分之一填充的小型 8 站点系统的密度矩阵重整化组进行基准测试显示了数量级的运行时间优势。比较进一步表明，该方法在局部化主导的区域中表现最佳，例如莫特绝缘相和强耦合微小极化子区域，其中局部嵌入拟像仍然有效。\n\n然而，由于声子的平均场处理，我们发现我们的方法在弱耦合离域区域和 Peierls 跃迁处存在局限性，其中量子声子涨落和长程动力学相关性变得很大。", "authors": [{"name": "Shariful Islam"}, {"name": "Joel Bierman"}, {"name": "Yuan Liu"}], "featured_authors": [{"name": "Shariful Islam"}, {"name": "Joel Bierman"}, {"name": "Yuan Liu"}], "author_count": 3}, {"id": "2603.11488", "category": "cond-mat", "title": "Anomalous Coulomb-Enhanced Charge Transport in Triangular Triple Quantum Dots Systems", "abstract": "Electron correlation and quantum interference are pivotal in mesoscopic transport. We theoretically study the nonequilibrium transport dynamics of a triangular triple quantum dot (TTQD) molecule connected to fermionic reservoirs using the exact hierarchical equations of motion (HEOM) formalism. We demonstrate a counter-intuitive transport signature where the stationary current is significantly enhanced by increasing the $U$, a behavior distinct from the suppression typically observed in linear quantum dot arrays. By analyzing the evolution of spectral functions, we attribute this enhancement to the interplay between Coulomb interaction-induced energy shifts and quantum interference effects unique to the triangular topology. We also explore how the circulation of chiral currents and electrode coupling strength modulates these interaction effects. Finally, we present a three-dimensional map of the transport current as a function of inter-dot tunneling ($t$) and Coulomb interaction ($U$), illustrating their combined effect on the current magnitude and its applications.", "url": "https://arxiv.org/abs/2603.11488", "type": "理论", "summary": "电子相关和量子干涉在介观输运中至关重要。我们使用精确的层次运动方程 (HEOM) 形式从理论上研究了连接到费米子库的三角形三重量子点 (TTQD) 分子的非平衡输运动力学。我们展示了一种反直觉的传输特征，其中通过增加 $U$ 来显着增强稳态电流，这种行为与线性量子点阵列中通常观察到的抑制不同。通过分析光谱函数的演化，我们将这种增强归因于库仑相互作用引起的能量转移和三角形拓扑特有的量子干涉效应之间的相互作用。我们还探索了手性电流的循环和电极耦合强度如何调节这些相互作用效应。最后，我们提出了作为点间隧道效应 ($t$) 和库仑相互作用 ($U$) 函数的输运电流的三维图，说明了它们对电流大小及其应用的综合影响。", "authors": [{"name": "Shuo Dong"}, {"name": "Junqing Li"}, {"name": "Jianhua Wei"}], "featured_authors": [{"name": "Shuo Dong"}, {"name": "Junqing Li"}, {"name": "Jianhua Wei"}], "author_count": 3}, {"id": "2603.11496", "category": "cond-mat", "title": "Valley-dependent electron-phonon scattering in thermoelectric semimetal Ta$_2$PdSe$_6$", "abstract": "Quasi-one-dimensional transition-metal chalcogenide Ta$_2$PdSe$_6$ is a promising thermoelectric semimetal due to the strong electron-hole asymmetry in the carrier lifetime. However, the microscopic origin of such a strong asymmetry remains unclear. In this study, we theoretically investigate electron-phonon scattering in Ta$_2$PdSe$_6$. There is a soft phonon mode mainly consisting of atomic displacements in PdSe$_4$ chains. This soft mode is strongly coupled with the highest valence band at the $\\Gamma$ point, which lies slightly below the Fermi energy, and causes strong electron-phonon scattering. The bottom of the electron pocket energetically overlapped with that band also suffers from strong intervalley scattering, by which the imaginary part of the electron self-energy exhibits a sharp change near the Fermi level. On the other hand, the imaginary part of the self-energy for carriers in the hole pocket shows a moderate energy dependence. Thus, we find that electron-phonon scattering is strongly valley-dependent. Our finding will help us to understand the distinctive transport properties observed in Ta$_2$PdSe$_6$.", "url": "https://arxiv.org/abs/2603.11496", "type": "理论", "summary": "准一维过渡金属硫族化物Ta$_2$PdSe$_6$由于载流子寿命中强烈的电子空穴不对称性而成为一种很有前途的热电半金属。然而，这种强烈不对称性的微观起源仍不清楚。在本研究中，我们从理论上研究了 Ta$_2$PdSe$_6$ 中的电子声子散射。存在一种软声子模式，主要由 PdSe$_4$ 链中的原子位移组成。这种软模式与$\\Gamma$点处的最高价带强耦合，该点略低于费米能量，并引起强烈的电子声子散射。与该能带能量重叠的电子袋底部也遭受强烈的层间散射，由此电子自能的虚部在费米能级附近表现出急剧变化。另一方面，空穴中载流子的自能虚部表现出适度的能量依赖性。因此，我们发现电子声子散射强烈依赖于谷。我们的发现将帮助我们了解在 Ta$_2$PdSe$_6$ 中观察到的独特输运特性。", "authors": [{"name": "Masayuki Ochi"}, {"name": "Hitoshi Mori"}, {"name": "Akitoshi Nakano"}], "featured_authors": [{"name": "Masayuki Ochi"}, {"name": "Hitoshi Mori"}, {"name": "Akitoshi Nakano"}], "author_count": 3}, {"id": "2603.11517", "category": "cond-mat", "title": "Meta-generalized gradient approximation made in the Hartree gauge", "abstract": "In density functional theory (DFT), exact constraints, fundamental mathematical properties of the exchange-correlation (XC) energy and its underlying XC hole, along with paradigm systems such as the uniform electron gas and the hydrogen atom have been instrumental in developing exchange- correlation (XC) density functional approximations (DFAs). However, since the spatial XC energy density is not uniquely defined, its exact constraints can only be formulated within a chosen gauge and are therefore seldom utilized in DFA construction. Here, we propose a meta-generalized gradient approximation for the exchange energy, explicitly constructed within the Hartree gauge, using the hydrogen atom's exchange energy density for gauge alignment in core and asymptotic regions. By formulating DFAs at the XC energy density level, this approach expands reference datasets for machine learning and establishes a foundation for more accurate nonlocal density functionals requiring gauge alignment.", "url": "https://arxiv.org/abs/2603.11517", "type": "理论+数值", "summary": "在密度泛函理论 (DFT) 中，精确约束、交换相关 (XC) 能量及其潜在 XC 空穴的基本数学特性，以及均匀电子气和氢原子等范式系统，在开发交换相关 (XC) 密度泛函近似 (DFA) 方面发挥了重要作用。然而，由于空间 XC 能量密度不是唯一定义的，其精确约束只能在选定的规范内制定，因此很少在 DFA 构建中使用。在这里，我们提出了交换能量的元广义梯度近似，在 Hartree 规范中明确构建，使用氢原子的交换能量密度在核心和渐进区域中进行规范对齐。通过在 XC 能量密度水平上制定 DFA，该方法扩展了机器学习的参考数据集，并为需要规范对齐的更准确的非局域密度泛函奠定了基础。", "authors": [{"name": "Yan Oueis"}, {"name": "Akilan Ramasamy"}, {"name": "James W. Furness"}, {"name": "Jamin Kidd"}, {"name": "Timo Lebeda"}, {"name": "Jianwei Sun"}], "featured_authors": [{"name": "Yan Oueis"}, {"name": "Akilan Ramasamy"}, {"name": "James W. Furness"}, {"name": "Jamin Kidd"}, {"name": "Timo Lebeda"}, {"name": "Jianwei Sun"}], "author_count": 6}, {"id": "2603.11518", "category": "cond-mat", "title": "Effect of flow kinematics on extensional viscosity of dilute polymer solutions", "abstract": "We investigate the effect of flow kinematics on the extensional viscosity of dilute polymer solutions by conducting dissipative particle dynamics simulations under uniaxial, planar, and biaxial extensional flows. At high extension rates, dilute polymer solutions exhibit strain hardening under these flows, while the quantitative behavior depends on the flow type. To elucidate the physical origin of this flow-kinematics dependence, we relate the extensional viscosity to polymer conformation using an analytical expression derived from a single-chain model. The resulting relation allows us to separate the contribution of flow-induced polymer conformational changes and the purely kinematic contribution determined by the structure of the velocity gradient tensor. When polymers remain almost unperturbed by extensional flows, differences in the extensional viscosity are governed primarily by the purely kinematic effects. In contrast, as polymers are stretched, the gyration radius in the extensional direction becomes the dominant factor, and differences in the stretching degree in this direction lead to corresponding variations in the extensional viscosity.", "url": "https://arxiv.org/abs/2603.11518", "type": "理论+数值", "summary": "我们通过在单轴、平面和双轴拉伸流下进行耗散粒子动力学模拟，研究流动运动学对稀聚合物溶液拉伸粘度的影响。在高延伸率下，稀聚合物溶液在这些流动下表现出应变硬化，而定量行为取决于流动类型。为了阐明这种流动运动学依赖性的物理起源，我们使用源自单链模型的分析表达式将拉伸粘度与聚合物构象联系起来。由此产生的关系使我们能够区分流动引起的聚合物构象变化的贡献和由速度梯度张量的结构决定的纯运动学贡献。当聚合物几乎不受拉伸流动干扰时，拉伸粘度的差异主要由纯运动学效应决定。相反，当聚合物被拉伸时，拉伸方向上的回转半径成为主导因素，并且该方向上拉伸程度的差异导致拉伸粘度相应的变化。", "authors": [{"name": "Yusuke Koide"}, {"name": "Takato Ishida"}, {"name": "Takashi Uneyama"}, {"name": "Yuichi Masubuchi"}], "featured_authors": [{"name": "Yusuke Koide"}, {"name": "Takato Ishida"}, {"name": "Takashi Uneyama"}, {"name": "Yuichi Masubuchi"}], "author_count": 4}, {"id": "2603.11522", "category": "cond-mat", "title": "Third-order transitions in Ising and Potts models on Watts--Strogatz small-world networks", "abstract": "We study third-order transitions in the two-dimensional Ising and Potts model on regular lattices and Watts--Strogatz small-world networks. Cluster observables are used to track post-critical boundary reorganization and pre-critical cluster breakup. For the Ising model, the critical temperature $T_c$ is calibrated independently from Binder-cumulant crossings and susceptibility peaks, whereas for the Potts model on small-world networks it is identified operationally from the dominant critical peak of $\\mathrm d\\langle P\\rangle/\\mathrm dT$. The independent and dependent third-order transitions are identified from the isolated-spin peak and the post-critical structural extremum, respectively. For both lattice and small-world topologies, we find the robust ordering $T_{\\mathrm{ind}}<T_c<T_{\\mathrm{dep}}$. Increasing the rewiring probability shifts all three characteristic temperatures upward and enhances the visibility of the post-critical transition. The effect is especially clear in the Potts model, where perimeter-based observables are more sensitive to multistate boundary fluctuations. The systematic persistence of the characteristic temperature hierarchy across topologies and finite sizes argues against interpreting these features as incidental finite-size irregularities. Instead, our results support their interpretation as genuine third-order transitions whose structural detectability can be amplified by network topology.", "url": "https://arxiv.org/abs/2603.11522", "type": "理论", "summary": "我们研究了规则晶格和 Watts-Strogatz 小世界网络上的二维 Ising 和 Potts 模型中的三阶跃迁。集群可观测量用于跟踪临界后边界重组和临界前集群分解。对于 Ising 模型，临界温度 $T_c$ 是独立于 Binder 累积量交叉和磁化率峰值进行校准的，而对于小世界网络上的 Potts 模型，它是根据 $\\mathrm d\\langle P\\rangle/\\mathrm dT$ 的主要临界峰值进行操作识别的。独立和依赖的三阶跃迁分别由孤立自旋峰和后临界结构极值确定。对于晶格和小世界拓扑，我们发现稳健的排序 $T_{\\mathrm{ind}}<T_c<T_{\\mathrm{dep}}$。增加重新接线概率会使所有三个特征温度向上移动，并增强后临界转变的可见性。这种效应在 Potts 模型中尤其明显，其中基于周界的可观测量对多态边界涨落更加敏感。\n\n跨拓扑和有限尺寸的特征温度层次结构的系统持续性反对将这些特征解释为偶然的有限尺寸不规则性。相反，我们的结果支持他们将其解释为真正的三阶跃迁，其结构可检测性可以通过网络拓扑放大。", "authors": [{"name": "Fangfang Wang"}, {"name": "Wei Liu"}, {"name": "Ke Zhang"}, {"name": "Yongjian He"}, {"name": "Kai Qi"}, {"name": "Ying Tang"}, {"name": "Zengru Di"}], "featured_authors": [{"name": "Fangfang Wang"}, {"name": "Wei Liu"}, {"name": "Ke Zhang"}, {"name": "Kai Qi"}, {"name": "Ying Tang"}, {"name": "Zengru Di"}], "author_count": 7}, {"id": "2603.11608", "category": "cond-mat", "title": "High-fidelity level-set modeling of polycrystalline grain growth", "abstract": "Accurate modeling of polycrystalline microstructure evolution under strong crystallographic heterogeneities remains a major challenge for full-field numerical methods at the mesoscopic scale. In this work, we present a high-fidelity level-set framework for capillarity-driven grain growth in polycrystals with highly-heterogeneous, disorientation-dependent grain boundary energies. The novel framework represents a polycrystalline extension of our level-set formulation, previously developed and validated using a single triple junction benchmark case. In-depth comparisons with three established level-set models demonstrate that the proposed method yields the most energetically-consistent evolution of grain statistics, disorientation distribution function, and triple junction dihedral angles. Accuracy and robustness are maintained across the entire heterogeneity spectrum. To the best of our knowledge, this approach delivers the highest-fidelity front-capturing level-set modeling of grain growth based on Mullins' mean curvature flow theory, paving the way for state-of-the-art digital twins for annealing applications.", "url": "https://arxiv.org/abs/2603.11608", "type": "理论+数值", "summary": "强晶体异质性下多晶微观结构演化的精确建模仍然是介观尺度全场数值方法的主要挑战。在这项工作中，我们提出了一个高保真水平设定框架，用于具有高度异质性、取向依赖的晶界能量的多晶中毛细管驱动的晶粒生长。该新颖的框架代表了我们的水平集公式的多晶扩展，该公式先前使用单个三结基准案例进行了开发和验证。与三个已建立的水平集模型的深入比较表明，所提出的方法产生了颗粒统计、迷失方向分布函数和三联结二面角的最能量一致的演化。在整个异质性范围内保持准确性和稳健性。据我们所知，这种方法基于 Mullins 的平均曲率流理论，提供了最高保真度的晶粒生长前捕获水平集建模，为用于退火应用的最先进的数字孪生铺平了道路。", "authors": [{"name": "Tianchi Li"}, {"name": "Marc Bernacki"}], "featured_authors": [{"name": "Tianchi Li"}, {"name": "Marc Bernacki"}], "author_count": 2}, {"id": "2603.11637", "category": "cond-mat", "title": "Double-twisted surface spectrum from hybridized Majorana Kramers pairs and wallpaper fermions", "abstract": "We theoretically investigate the superconducting surface states of wallpaper fermions, which are surface quasiparticles of topological nonsymmorphic crystalline insulators protected by a wallpaper group $p4g$ symmetry, based on a tight-binding model for the space group $P4/mbm$ (No. 127). A symmetry-based analysis shows that four types of on-site pair potentials are allowed. Using the symmetries of the wallpaper group $p4g$ and the one-dimensional topological invariants, we clarify that for the $\\mathrm{A_{1u}}$ representation, wallpaper fermions and two Majorana Kramers pairs coexist, and hybridization between them give rise to a double-twisted surface state and produces four peaks in the surface density of states. We further find that the mirror Chern number vanishes, indicating that our system realizes mirror-helicity-free surface states. This distinguishes superconducting wallpaper fermions from the other superconducting topological (crystalline) insulators, such as $\\mathrm{Cu}_x\\mathrm{Bi}_2\\mathrm{Se}_3$ and $\\mathrm{Sn}_{1-x}\\mathrm{In}_x\\mathrm{Te}$.", "url": "https://arxiv.org/abs/2603.11637", "type": "理论", "summary": "我们从理论上研究了壁纸费米子的超导表面态，壁纸费米子是受壁纸群 $p4g$ 对称性保护的拓扑非同形晶体绝缘体的表面准粒子，基于空间群 $P4/mbm$ 的紧束缚模型（第 127 号）。基于对称性的分析表明，允许四种类型的现场对电势。利用壁纸群 $p4g$ 的对称性和一维拓扑不变量，我们澄清了对于 $\\mathrm{A_{1u}}$ 表示，壁纸费米子和两个马约拉纳克莱默对共存，它们之间的杂交产生了双扭曲表面态，并在表面态密度中产生了四个峰值。我们进一步发现镜像陈数消失，表明我们的系统实现了无镜像螺旋性表面态。这将超导壁纸费米子与其他超导拓扑（晶体）绝缘体区分开来，例如 $\\mathrm{Cu}_x\\mathrm{Bi}_2\\mathrm{Se}_3$ 和 $\\mathrm{Sn}_{1-x}\\mathrm{In}_x\\mathrm{Te}$。", "authors": [{"name": "Kaito Yoda"}, {"name": "Ai Yamakage"}], "featured_authors": [{"name": "Kaito Yoda"}, {"name": "Ai Yamakage"}], "author_count": 2}, {"id": "2603.11681", "category": "cond-mat", "title": "Foliated-Exotic Duality and Anomaly Inflow in Fracton Quantum Field Theories", "abstract": "Fracton phases are new types of phases of matter characterized by subsystem global symmetry, which is a generalized global symmetry whose symmetry operator is partially topological. Their continuum low-energy effective descriptions admit two different formulations: an exotic quantum field theory (QFT) using exotic tensor gauge fields, and a foliated QFT constructed from a foliation structure and foliated gauge fields. For certain fracton QFTs, these two descriptions are equivalent, which is called the foliated-exotic duality. In this dissertation, we extend the foliated-exotic duality by combining it with the anomaly inflow mechanism for 't Hooft anomalies of subsystem symmetries. This dissertation has two main results. First, we discuss the exotic and foliated $BF$ theories in 2+1 dimensions, which exhibit the mixed 't Hooft anomaly of $\\mathbb{Z}_N \\times \\mathbb{Z}_N$ subsystem symmetry. This anomaly is captured by a subsystem symmetry-protected topological (SSPT) phase for $\\mathbb{Z}_N \\times \\mathbb{Z}_N$ subsystem symmetry in one dimension higher. By extending the foliated-exotic duality in the fractonic $BF$ theory to the SSPT phase, we establish the field correspondences in the SSPT phase and construct the foliated description of the SSPT phase. Second, we discuss the exotic $\\phi$-theory in 2+1 dimensions -- a fractonic gapless scalar field theory, which has the 't Hooft anomaly of $U(1) \\times U(1)$ subsystem symmetry. The anomaly is captured by an SSPT phase for $U(1) \\times U(1)$ subsystem symmetry in 3+1 dimensions via the anomaly inflow mechanism. Extending the foliated-exotic duality to the $\\phi$-theory, we establish field correspondences in the $\\phi$-theory and construct the foliated $\\phi$-theory that is equivalent to the exotic $\\phi$-theory. This provides the first example of the foliated-exotic duality in gapless theories.", "url": "https://arxiv.org/abs/2603.11681", "type": "理论", "summary": "分形相是以子系统全局对称性为特征的新型物质相，子系统全局对称性是其对称算子是部分拓扑的广义全局对称性。他们的连续低能有效描述允许两种不同的公式：使用奇异张量规范场的奇异量子场论（QFT），以及由叶状结构和叶状规范场构造的叶状 QFT。对于某些分形 QFT，这两种描述是等价的，这被称为叶状-奇异对偶性。在本论文中，我们通过将叶状-奇异二元性与子系统对称性的't Hooft异常的异常流入机制相结合来扩展它。本论文有两个主要成果。首先，我们讨论 2+1 维度中奇异的叶状 $BF$ 理论，该理论表现出 $\\mathbb{Z}_N \\times \\mathbb{Z}_N$ 子系统对称性的混合 't Hooft 异常。这种异常现象是由子系统对称保护拓扑 (SSPT) 相捕获的，该相的子系统对称性在更高一维中为 $\\mathbb{Z}_N \\times \\mathbb{Z}_N$ 子系统对称性。\n\n通过将分形$BF$理论中的叶状-奇异二元性推广到SSPT相，我们建立了SSPT相的场对应，并构造了SSPT相的叶状描述。其次，我们讨论 2+1 维度中奇异的 $\\phi$ 理论——一种分形无间隙标量场理论，它具有 $U(1) \\times U(1)$ 子系统对称性的 't Hooft 异常。通过异常流入机制，$U(1) \\times U(1)$ 子系统对称性在 3+1 维度上由 SSPT 阶段捕获异常。将叶状-奇异二元性扩展到$\\phi$-理论，我们在$\\phi$-理论中建立场对应，并构造与奇异$\\phi$-理论等价的叶状$\\phi$-理论。这提供了无间隙理论中叶状-奇异二元性的第一个例子。", "authors": [{"name": "Shutaro Shimamura"}], "featured_authors": [{"name": "Shutaro Shimamura"}], "author_count": 1}, {"id": "2603.11688", "category": "cond-mat", "title": "Machine Learning of Topological Insulator and Anderson Insulator in One-Dimensional Extended Su-Schrieffer-Heeger Chain", "abstract": "We study disorder effects in the extended Su-Schrieffer-Heeger (SSH) model using a convolutional neural network (CNN) trained on reduced correlation matrices (RCMs) of disorder-free systems to predict winding number phase diagrams in systems with off-diagonal and diagonal disorder. The trained CNN model generalizes to chiral-symmetry-preserving off-diagonal disorder system but fails in the presence of chiral-symmetry-breaking diagonal disorder system. Using principal component analysis (PCA) of the RCM feature space, we demonstrate that disorder-free and symmetry-preserving systems share overlapping feature manifolds, whereas symmetry-breaking disorder causes them to diverge. Inverse participation ratio (IPR) and energy spectrum analysis further demonstrate that off-diagonal disorder preserves topological edge states, whereas diagonal disorder drives a transition to an Anderson insulator. Our results position machine learning not merely as a classifier, but as a sensitive probe for the symmetry-protected nature of quantum matter.", "url": "https://arxiv.org/abs/2603.11688", "type": "理论+数值", "summary": "我们使用在无序系统的简化相关矩阵 (RCM) 上训练的卷积神经网络 (CNN) 研究扩展 Su-Schrieffer-Heeger (SSH) 模型中的无序效应，以预测非对角线和对角线无序系统中的绕组数相图。经过训练的 CNN 模型可推广到手性对称性保持的非对角无序系统，但在手性对称性破坏的对角无序系统存在时会失败。使用 RCM 特征空间的主成分分析（PCA），我们证明了无序和对称保持系统共享重叠的特征流形，而对称破坏的无序导致它们发散。逆参与比（IPR）和能谱分析进一步证明，非对角无序保留了拓扑边缘态，而对角无序则驱动向安德森绝缘体的转变。我们的结果将机器学习不仅定位为分类器，而且定位为量子物质对称性保护性质的敏感探针。", "authors": [{"name": "Zhekai Yin"}, {"name": "C. K. Ong"}], "featured_authors": [{"name": "Zhekai Yin"}, {"name": "C. K. Ong"}], "author_count": 2}, {"id": "2603.11712", "category": "cond-mat", "title": "Weak integrability breaking perturbations in classical integrable models on the lattice", "abstract": "We show how to systematically construct weak integrability breaking perturbations (WIBs) for classical integrable models on the lattice. These perturbations, which allow quasi-conserved quantities, have mostly been explored in quantum systems, where they are expected to delay the onset of thermalization and diffusive transport to timescales far exceeding those predicted by Fermi's golden rule. However, accessing such long-time dynamics in quantum models is computationally challenging. Classical integrable lattice models offer a complementary setting for probing transport and long-time dynamics under WIBs. In this work, we specialize our general framework to construct several families of WIBs for the Ishimori model, the Toda chain, and the Harmonic Oscillator Chain (HOC). Such constructions can help quantify how WIBs contribute to anomalous transport and serve as a benchmark for thermalization studies in perturbed integrable models. An important example is the Fermi-Pasta-Ulam-Tsingou (FPUT) model: Starting from the HOC, we show that the cubic nonlinearity (the alpha-FPUT interaction) is a genuine WIB perturbation. Using the integrals of motion (IoMs) of the Toda lattice, we explicitly construct corrections to the entire hierarchy of the HOC IoMs, thereby obtaining an infinite tower of quasi-conserved quantities for the alpha-FPUT chain. We further identify the corresponding adiabatic gauge potential (AGP) as a nontrivial trilocal generator in real space, and show that, more generally, any cubic, translationally invariant, momentum-conserving perturbation of the HOC admits such a generator and is therefore a WIB. Together with our transport and AGP-variance studies, our results provide a unified classical framework for weak integrability breaking and for diagnosing anomalous thermalization and transport in nearly integrable Hamiltonian lattice systems.", "url": "https://arxiv.org/abs/2603.11712", "type": "理论", "summary": "我们展示了如何系统地为晶格上的经典可积模型构建弱可积破坏扰动（WIB）。这些允许准守恒量的扰动主要在量子系统中进行了探索，预计它们会将热化和扩散传输的开始延迟到远远超过费米黄金法则预测的时间尺度。然而，在量子模型中获取如此长时间的动态在计算上具有挑战性。经典的可积晶格模型为探测 WIB 下的输运和长期动力学提供了补充设置。在这项工作中，我们专门构建了 Ishimori 模型、Toda 链和谐波振荡器链 (HOC) 的几个 WIB 系列的通用框架。这种结构可以帮助量化 WIB 对异常输运的影响，并作为扰动可积模型中热化研究的基准。一个重要的例子是 Fermi-Pasta-Ulam-Tsingou (FPUT) 模型：从 HOC 开始，我们证明三次非线性（α-FPUT 相互作用）是真正的 WIB 扰动。\n\n使用 Toda 晶格的运动积分 (IoM)，我们明确地构建了对 HOC IoM 整个层次结构的校正，从而获得了 alpha-FPUT 链的准守恒量的无限塔。我们进一步将相应的绝热规范势（AGP）识别为实空间中的非平凡三局域生成元，并表明，更一般地，HOC 的任何三次、平移不变、动量守恒扰动都承认这样的生成元，因此是 WIB。与我们的输运和 AGP 方差研究一起，我们的结果为弱可积破坏和诊断近可积哈密顿晶格系统中的反常热化和输运提供了一个统一的经典框架。", "authors": [{"name": "Sara Vanovac"}, {"name": "Catherine McCarthy"}, {"name": "Federica Maria Surace"}, {"name": "Olexei I. Motrunich"}], "featured_authors": [{"name": "Sara Vanovac"}, {"name": "Catherine McCarthy"}, {"name": "Federica Maria Surace"}, {"name": "Olexei I. Motrunich"}], "author_count": 4}, {"id": "2603.11713", "category": "cond-mat", "title": "Intrinsic violation of the Wiedemann-Franz law in interacting systems", "abstract": "The Wiedemann-Franz (WF) law dictates a universal ratio between thermal and electrical conductivities, is widely obeyed by Fermi liquid systems. Here, we identify a fundamental yet often overlooked, thermodynamic mechanism for the violation of WF law: the temperature-dependent renormalization of the electronic band structure. We demonstrate that the interaction-induced energy drift $\\partial\\epsilon_k/\\partial T$, acts as an effective driving force that fundamentally decouples heat transport from charge transport. We derive a generalized transport relation linking the Lorenz ratio deviation directly to the thermoelectric response. Our findings provide a unified framework for understanding thermal transport in interacting topological phases and suggest the Lorenz ratio as a probe for distinguishing topological robustness from Fermi liquid instabilities.", "url": "https://arxiv.org/abs/2603.11713", "type": "理论", "summary": "维德曼-弗朗茨 (WF) 定律规定了热导率和电导率之间的通用比率，费米液体系统广泛遵循该定律。在这里，我们确定了违反 WF 定律的一个基本但经常被忽视的热力学机制：电子能带结构的温度依赖性重正化。我们证明，相互作用引起的能量漂移 $\\partial\\epsilon_k/\\partial T$ 是一种有效的驱动力，从根本上将热传输与电荷传输解耦。我们推导出将洛伦兹比偏差直接与热电响应联系起来的广义输运关系。我们的研究结果为理解相互作用的拓扑相中的热传输提供了一个统一的框架，并建议将洛伦兹比作为区分拓扑鲁棒性和费米液体不稳定性的探针。", "authors": [{"name": "YuanDong Wang"}, {"name": "Zhen-Gang Zhu"}], "featured_authors": [{"name": "YuanDong Wang"}, {"name": "Zhen-Gang Zhu"}], "author_count": 2}, {"id": "2603.11722", "category": "cond-mat", "title": "Melting of thin silicon films: a molecular dynamics study with two machine learning potentials", "abstract": "Thermal stability of silicene and thin silicon films is studied by molecular dynamics using two machine-learning potentials, SNAP and GAP. For SNAP potential, systems ranging from a single silicene layer to films of 36 layers are considered. Silicene is found to lose its structure at 500 K. The decomposition temperature increases with film thikness and reaches saturation at about 28 layers, corresponding to the bulk melting point of the SNAP model (1380 K). Thin films up to 8 layers exibit two-phase coexistence upon decomposition, while thicker films undergo surface melting followed by complete collapse into the liquid state. The GAP potential, although more accurate for bulk silicon, fails to describe the gas phase: silicene modelled with GAP decomposes into a set of small clusters. The results are compared with earlier data for the Stillinger-Weber potential.", "url": "https://arxiv.org/abs/2603.11722", "type": "理论+数值", "summary": "使用两种机器学习势（SNAP 和 GAP）通过分子动力学研究硅烯和硅薄膜的热稳定性。对于 SNAP 潜力，考虑的系统范围从单个硅烯层到 36 层薄膜。研究发现硅烯在 500 K 时失去其结构。分解温度随着薄膜厚度的增加而增加，并在大约 28 层时达到饱和，对应于 SNAP 模型的整体熔点 (1380 K)。多达 8 层的薄膜在分解时表现出两相共存，而较厚的薄膜经历表面熔化，然后完全塌陷成液态。 GAP 势虽然对于块体硅来说更准确，但无法描述气相：用 GAP 建模的硅烯分解成一组小簇。将结果与早期斯蒂林格-韦伯势数据进行比较。", "authors": [{"name": "Yu. D. Fomin"}, {"name": "E. N. Tsiok"}, {"name": "V. N. Ryzhov"}], "featured_authors": [{"name": "Yu. D. Fomin"}, {"name": "E. N. Tsiok"}, {"name": "V. N. Ryzhov"}], "author_count": 3}, {"id": "2603.11732", "category": "cond-mat", "title": "Scaling Laws and Paradoxical Metastable States in Nanofilament Entropic Separation", "abstract": "Entropic forces play a fundamental role in nanoscale phenomena, from colloidal self-assembly to biomolecular disaggregation. Here, we develop an exact analytical theory and find general scaling laws for the entropic separation of tether-mediated nanofilament bundles, revealing that a single dimensionless parameter--the ratio of the excluded-volume radius to the tether length--dictates whether filaments are pushed apart or, contrary to the usual expectation, pulled together. This unexpected regime challenges the view that entropic forces invariably promote disaggregation, instead uncovering conditions under which the bundles can remain in attractive metastable states. Brownian dynamics simulations confirm this paradoxical effect, offering predictive insights for applications in biophysics, soft matter physics, and nanotechnology.", "url": "https://arxiv.org/abs/2603.11732", "type": "理论+数值", "summary": "熵力在从胶体自组装到生物分子解聚的纳米级现象中发挥着重要作用。在这里，我们开发了一种精确的分析理论，并找到了系链介导的纳米丝束熵分离的一般标度定律，揭示了一个无量纲参数——排除体积半径与系链长度的比率——决定了细丝是被推开，还是与通常的预期相反，被拉到一起。这种意想不到的状态挑战了熵力总是促进分解的观点，而是揭示了束可以保持在有吸引力的亚稳态的条件。布朗动力学模拟证实了这种矛盾效应，为生物物理学、软物质物理学和纳米技术的应用提供了预测见解。", "authors": [{"name": "Jose M. G. Vilar"}, {"name": "J. Miguel Rubi"}, {"name": "Leonor Saiz"}], "featured_authors": [{"name": "Jose M. G. Vilar"}, {"name": "J. Miguel Rubi"}, {"name": "Leonor Saiz"}], "author_count": 3}, {"id": "2603.11771", "category": "cond-mat", "title": "Theoretical proposal of superconductivity in hole-doped reduced bilayer nickelate La3Ni2O6: a manifestation of orbital-space bilayer model with incipient bands", "abstract": "A correspondence exists between the multi-orbital Hubbard model and the bilayer Hubbard model, in which superconductivity is optimized in an incipient-band regime in both cases. In the multi-orbital system, the orbital level offset $\\Delta E$ plays a role analogous to the interlayer hopping in bilayer systems, and superconductivity is enhanced for large $\\Delta E$. We refer to such a multi-orbital model as an orbital-space bilayer model (OSBM). In this study, we theoretically propose that a reduced bilayer nickelate La$_3$Ni$_2$O$_6$ can be a candidate for a superconductor described by OSBM when an appropriate amount of holes is doped. By constructing a tight-binding model based on first-principles calculations, a large $\\Delta E$ between the Ni $d_{x^2-y^2}$ and the other $d$ orbitals is obtained due to the absence of outer apical oxygens. Furthermore, our fluctuation exchange approximation calculations indicate the emergence of $s\\pm$-wave superconductivity driven by interorbital interactions in an incipient-band situation, where the superconducting gap function changes its sign between the $d_{x^2-y^2}$ and other $d$ orbital bands. We also investigate the energetic and dynamical stability of the crystal structure under atomic substitution and pressure. Although La$_3$Ni$_2$O$_7$ and La$_3$Ni$_2$O$_6$ share a similar chemical formula, our study shows that an entirely different pairing mechanism can take place in the latter.", "url": "https://arxiv.org/abs/2603.11771", "type": "理论+数值", "summary": "多轨道哈伯德模型和双层哈伯德模型之间存在对应关系，其中在两种情况下超导性都在初始能带范围内得到优化。在多轨道系统中，轨道能级偏移$\\Delta E$起到了类似于双层系统中的层间跳跃的作用，$\\Delta E$大时超导性增强。我们将这种多轨道模型称为轨道空间双层模型（OSBM）。在这项研究中，我们从理论上提出，当掺杂适量的空穴时，还原双层镍酸盐La$_3$Ni$_2$O$_6$可以成为OSBM描述的超导体的候选者。通过构建基于第一性原理计算的紧束缚模型，由于不存在外顶氧，Ni $d_{x^2-y^2}$ 和其他 $d$ 轨道之间获得了较大的 $\\Delta E$。此外，我们的涨落交换近似计算表明，在初始能带情况下，由轨道间相互作用驱动的$s\\pm$波超导性的出现，其中超导间隙函数在$d_{x^2-y^2}$和其他$d$轨道带之间改变其符号。\n\n我们还研究了原子取代和压力下晶体结构的能量和动力学稳定性。尽管La$_3$Ni$_2$O$_7$和La$_3$Ni$_2$O$_6$具有相似的化学式，但我们的研究表明后者可以发生完全不同的配对机制。", "authors": [{"name": "Shu Kamiyama"}, {"name": "Reo Kohno"}, {"name": "Yuto Hoshi"}, {"name": "Kensei Ushio"}, {"name": "Daiki Nakaoka"}, {"name": "Hirofumi Sakakibara"}, {"name": "Kazuhiko Kuroki"}], "featured_authors": [{"name": "Shu Kamiyama"}, {"name": "Reo Kohno"}, {"name": "Yuto Hoshi"}, {"name": "Daiki Nakaoka"}, {"name": "Hirofumi Sakakibara"}, {"name": "Kazuhiko Kuroki"}], "author_count": 7}, {"id": "2603.11819", "category": "cond-mat", "title": "Cold source field-effect transistor with type-III band-aligned HfS$_2$/WTe$_2$ heterostructure", "abstract": "The cold source field-effect transistor (CSFET) is promising for reducing power dissipation in integrated circuits by engineering the density of states at the injecting source. Existing CSFET designs utilizing Dirac-source metals or p-Metal-n stacks are challenged by Schottky barriers at the metal-semiconductor interface. In this work, a 2D WTe$_2$/HfS$_2$ heterojunction with type-III band alignment is proposed to be an excellent design of cold source and CSFET. The architecture has a high band-to-band transport mechanism by removing the detrimental Schottky barrier issues. Importantly, the proposed CSFET has the same channel barrier modulation principle as conventional MOSFET to enable a high on-state current. Using first-principles-based quantum transport modeling, we predict a very high $I_{\\rm on}$/$I_{\\rm off}$ ratio at $\\sim$ 10$^{10}$, a low subthreshold swing below the thermal limit for a wide range of gate voltages, reaching as small as 41.3 mV/dec, at low source-drain bias $V_{DS}=0.3$ $\\rm V$. These findings establish a design principles for next-generation low-power nanoelectronic switches leveraging 2D van der Waals heterostructures.", "url": "https://arxiv.org/abs/2603.11819", "type": "理论", "summary": "冷源场效应晶体管（CSFET）有望通过设计注入源处的状态密度来降低集成电路的功耗。现有的利用狄拉克源金属或 p-金属-n 堆叠的 CSFET 设计受到金属-半导体界面处肖特基势垒的挑战。在这项工作中，具有 III 型能带排列的 2D WTe$_2$/HfS$_2$ 异质结被认为是冷源和 CSFET 的出色设计。该架构通过消除有害的肖特基势垒问题，具有高带间传输机制。重要的是，所提出的 CSFET 具有与传统 MOSFET 相同的沟道势垒调制原理，可实现高导通电流。使用基于第一原理的量子输运模型，我们预测在 $\\sim$ 10$^{10}$ 时会出现非常高的 $I_{\\rm on}$/$I_{\\rm off}$ 比率，在各种栅极电压下，亚阈值摆幅低于热极限，小至 41.3 mV/dec，在低源漏偏压 $V_{DS}=0.3$ $\\rm V$ 时。这些发现为利用 2D 范德华异质结构的下一代低功耗纳米电子开关建立了设计原则。", "authors": [{"name": "Shujin Guo"}, {"name": "Qing Shi"}, {"name": "Deping Guo"}, {"name": "Fei Liu"}, {"name": "Xianghua Kong"}, {"name": "Yonghong Zhao"}, {"name": "Hong Guo"}], "featured_authors": [{"name": "Shujin Guo"}, {"name": "Qing Shi"}, {"name": "Deping Guo"}, {"name": "Xianghua Kong"}, {"name": "Yonghong Zhao"}, {"name": "Hong Guo"}], "author_count": 7}, {"id": "2603.11844", "category": "cond-mat", "title": "Emergence of polar monoclinic phase in heterohalogen substituted CsGeX$_3$", "abstract": "The occurrence of ferroelectricity in inorganic germanium-based halide perovskites has provided an alternative to oxide counterparts. Using first-principles methods, we have studied CsGeX$_3$ materials with heterohalogen substitution at the X site in a 2:1 configuration. Structurally, such variation alters the octahedral environment more strongly than in pristine materials, giving rise to a polar monoclinic phase at room temperature. The occurrence of the monoclinic phase is also confirmed through the energetics of structures generated by the displacements of atoms in accordance with soft mode eigenvectors of the dynamical matrix along various directions. In the chemically tuned phase, the polarization is along [101] and increases by 10-15\\% compared to pristine ones. The electronic structure analysis reveals that spin-splitting energy ranges from 25 to 250 meV in the valence band and from 9 to 80 meV in the conduction band in chemically tuned structures. In addition, these structures exhibit Rashba and persistent spin textures, which are coupled to the polarization direction. The parameters of the symmetry-dependent \\textbf{k.p } Hamiltonian provide insights into the strength of spin-splitting and the nature of spin-texture. The semiconducting and spin-polarized nature of CsGeX$_3$ materials makes them strong candidates for Datta-Das spin transistors.", "url": "https://arxiv.org/abs/2603.11844", "type": "理论", "summary": "无机锗基卤化物钙钛矿中铁电性的出现为氧化物对应物提供了替代品。使用第一原理方法，我们研究了在 X 位点以 2:1 构型进行异卤素取代的 CsGeX$_3$ 材料。在结构上，这种变化比原始材料更强烈地改变八面体环境，从而在室温下产生极性单斜相。单斜晶相的出现也通过原子根据动力学矩阵的软模式特征向量沿各个方向的位移产生的结构的能量学得到证实。在化学调谐相中，极化沿[101]方向，与原始状态相比增加了 10-15%。电子结构分析表明，在化学调谐结构中，价带中的自旋分裂能量范围为 25 至 250 meV，导带中的自旋分裂能量范围为 9 至 80 meV。此外，这些结构还表现出 Rashba 和持久自旋纹理，它们与偏振方向耦合。\n\n对称相关的 \\textbf{k.p } 哈密顿量的参数提供了对自旋分裂强度和自旋纹理性质的见解。 CsGeX$_3$ 材料的半导体和自旋极化性质使其成为 Datta-Das 自旋晶体管的有力候选者。", "authors": [{"name": "Sourabh Vairat"}, {"name": "Balachandra G. Hegde"}, {"name": "Brajesh Tiwari"}, {"name": "Ravi Kashikar"}], "featured_authors": [{"name": "Sourabh Vairat"}, {"name": "Balachandra G. Hegde"}, {"name": "Brajesh Tiwari"}, {"name": "Ravi Kashikar"}], "author_count": 4}, {"id": "2603.11865", "category": "cond-mat", "title": "Spin Chern phases and persistent spin texture in a quasi 2D SSH model", "abstract": "We construct a quasi-two-dimensional Su Schrieffer-Heeger model (SSH) like model and uncover a rich set of topological phases with nontrivial spin textures in the presence of complex hopping and spin orbit coupling. Despite its simple structure, the combined effect of complex hopping and spin orbit interaction gives rise not only to the conventional quantum anomalous Hall insulating (QAHI) phase, but also to distinct combinations of spin Chern phases, namely quantum anomalous spin Hall insulating (QASHI) phase. Furthermore, we demonstrate that the bulk bands of this model can host persistent spin textures, whose formation and stability are governed by the relative strengths of nearest and next nearest neighbor complex hopping. To elucidate the underlying mechanisms, we develop a low energy continuum theory that captures the emergence of these topological phases and clarifies the origin of the persistent spin textures. Interestingly, the resulting spin textures closely resemble those typically observed in conventional semiconductor systems with topologically trivial band structures. However, in our case, they emerge within a nontrivial topological framework, enabled by carefully engineered hopping patterns that intertwine lattice geometry, complex hopping, and spin orbit coupling", "url": "https://arxiv.org/abs/2603.11865", "type": "理论", "summary": "我们构建了一个类似准二维 Su Schrieffer-Heeger 模型（SSH）的模型，并在存在复杂的跳跃和自旋轨道耦合的情况下揭示了一组丰富的具有非平凡自旋纹理的拓扑相。尽管其结构简单，但复杂的跳跃和自旋轨道相互作用的综合效应不仅产生了传统的量子反常自旋霍尔绝缘（QAHI）相，而且还产生了自旋陈相的独特组合，即量子反常自旋霍尔绝缘（QASHI）相。此外，我们证明该模型的体能带可以容纳持久的自旋纹理，其形成和稳定性由最近和次近邻复合跳跃的相对强度决定。为了阐明潜在的机制，我们开发了一种低能连续体理论，该理论捕获了这些拓扑相的出现并阐明了持久自旋纹理的起源。有趣的是，所得的自旋纹理非常类似于具有拓扑平凡能带结构的传统半导体系统中通常观察到的自旋纹理。\n\n然而，在我们的例子中，它们出现在一个不平凡的拓扑框架内，通过精心设计的跳跃模式来实现，这些跳跃模式将晶格几何、复杂的跳跃和自旋轨道耦合交织在一起", "authors": [{"name": "Hemant K Sharma"}, {"name": "Saptarshi Mandal"}, {"name": "Kush Saha"}], "featured_authors": [{"name": "Hemant K Sharma"}, {"name": "Saptarshi Mandal"}, {"name": "Kush Saha"}], "author_count": 3}, {"id": "2603.11973", "category": "cond-mat", "title": "Metadensity functional learning for classical fluids: Regularizing with pair correlations", "abstract": "We investigate and exploit consequences of the recent neural metadensity functional theory [Kampa et al., Phys. Rev. Lett. 134, 107301 (2025), https://doi.org/10.1103/PhysRevLett.134.107301 ] for describing the physics of inhomogeneous fluids. The metadensity dependence on the pair potential is relevant for soft matter design and Henderson inversion and it allows one to change the pair potential on the fly at prediction stage. Here we consider one-dimensional systems with short-ranged (truncated) interparticle forces and draw on the functional pair potential dependence to investigate 'metadirect' routes towards the bulk fluid pair correlation structure. Classical density functional theory provides the required functional relationships. Efficient variational calculus is implemented by neural functional line integration and automatic differentiation. We regularize local learning of neural functionals by comparing the pair structure from different routes. Thereby results from metadirect functional differentiation are matched against accurate test particle data from an initial locally trained metadensity functional. Accessing the pair structure via the metadensity functional dependence circumvents Ornstein-Zernike inversion and it is based on first principles.", "url": "https://arxiv.org/abs/2603.11973", "type": "理论+数值", "summary": "我们研究并利用了最近神经元密度泛函理论的结果 [Kampa et al., Phys.莱特牧师。 134, 107301 (2025), https://doi.org/10.1103/PhysRevLett.134.107301] 用于描述非均匀流体的物理学。元密度对电对势的依赖性与软物质设计和亨德森反演相关，并且它允许人们在预测阶段动态地改变电对势。在这里，我们考虑具有短程（截断）粒子间力的一维系统，并利用功能对潜在依赖性来研究通向整体流体对相关结构的“元直接”路线。经典密度泛函理论提供了所需的函数关系。通过神经功能线积分和自动微分来实现高效的变分演算。我们通过比较不同路径的配对结构来规范神经泛函的局部学习。因此，元直接函数微分的结果与来自初始本地训练的元密度函数的准确测试粒子数据相匹配。\n\n通过元密度函数依赖性访问对结构可以规避 Ornstein-Zernike 反演，并且它基于第一原理。", "authors": [{"name": "Stefanie M. Kampa"}, {"name": "Florian Sammüller"}, {"name": "Matthias Schmidt"}], "featured_authors": [{"name": "Stefanie M. Kampa"}, {"name": "Florian Sammüller"}, {"name": "Matthias Schmidt"}], "author_count": 3}, {"id": "2603.11995", "category": "cond-mat", "title": "What is a minimum work transition in stochastic thermodynamics?", "abstract": "We reassess the concept of transition at minimum work in classical stochastic finite-time thermodynamics, when the system dynamics is modelled by a diffusion process. We show that a well-posed formulation of the optimal control problem corresponding to the minimization of the mean work done on the system during a finite-time transition necessarily requires taking into account speed limits on control protocols. This fact has major qualitative consequences. First, it permits to discriminate between optimal swift engineered equilibration and transitions at minimum work. Second, it shows that in the limit when speed limits are removed, only transitions specified by generalized Schrödinger bridges admit a consistent physical interpretation. To illustrate these points, we focus on the simplest model problem: a levitating particle in a Gaussian moving trap.", "url": "https://arxiv.org/abs/2603.11995", "type": "理论", "summary": "当系统动力学通过扩散过程建模时，我们重新评估经典随机有限时间热力学中最小功转变的概念。我们表明，与有限时间转换期间系统上所做的平均功的最小化相对应的最优控制问题的适定表述必然需要考虑控制协议的速度限制。这一事实具有重大的定性后果。首先，它允许区分最佳的快速工程平衡和最小工作量的转换。其次，它表明，在取消速度限制的情况下，只有广义薛定谔桥指定的过渡才允许一致的物理解释。为了说明这些观点，我们关注最简单的模型问题：高斯移动陷阱中的悬浮粒子。", "authors": [{"name": "Paolo Muratore-Ginanneschi"}, {"name": "Julia Sanders"}], "featured_authors": [{"name": "Paolo Muratore-Ginanneschi"}, {"name": "Julia Sanders"}], "author_count": 2}, {"id": "2603.12066", "category": "cond-mat", "title": "Ferromagnetic resonance modes in trilayer artificial spin ices subject to interfacial Dzyaloshinskii-Moriya interaction", "abstract": "Artificial spin ices are metamaterials that can host several ferromagnetic resonances as well as spin waves. As the field advances towards the creation of three-dimensional geometries, a trilayer square artificial spin ice has been already found to exhibit many interesting properties. Here, we numerically investigate a strongly-coupled trialyer square artificial spin ice under the effect of interfacial Dzyaloshinskii-Moriya interaction (DMI). This interaction affords non-reciprocity to waves, leading to changes in the standing wave modes established in confined geometries. We find that the interplay between the non-reciprocity, an applied field, and the stray field within the artificial spin ice results in frequency split additional edge modes. The edge modes are favored by the DMI sign and exhibit destructive and constructive interference depending on both the DMI magnitude and the external magnetic field. Our results demonstrate the non-reciprocity in small nanoislands can affect the long-range states stabilized in the artificial spin ice due to the strong coupling between layers.", "url": "https://arxiv.org/abs/2603.12066", "type": "数值", "summary": "人造自旋冰是一种超材料，可以产生多种铁磁共振和自旋波。随着三维几何形状领域的发展，三层方形人造自旋冰已经被发现表现出许多有趣的特性。在这里，我们对界面 Dzyaloshinskii-Moriya 相互作用 (DMI) 作用下的强耦合三层方形人造自旋冰进行了数值研究。这种相互作用为波提供了非互易性，导致在受限几何形状中建立的驻波模式发生变化。我们发现，人造自旋冰内的非互易性、施加场和杂散场之间的相互作用会导致频率分割附加边缘模式。边缘模式受到 DMI 符号的青睐，并根据 DMI 幅度和外部磁场表现出破坏性和建设性干扰。我们的结果表明，由于层之间的强耦合，小纳米岛中的非互易性会影响人造自旋冰中稳定的长程状态。", "authors": [{"name": "V. Vanga"}, {"name": "G. Alatteili"}, {"name": "E. Iacocca"}], "featured_authors": [{"name": "V. Vanga"}, {"name": "G. Alatteili"}, {"name": "E. Iacocca"}], "author_count": 3}, {"id": "2603.12079", "category": "cond-mat", "title": "Spatiotemporal crystallization of an active fluid", "abstract": "The emergence of long-range spatiotemporal order from intrinsic chaos is a central challenge in far-from-equilibrium physics. In active fluids, such as cytoskeletal networks driving cellular motion, self-generated flows typically produce \"active turbulence\", lacking translational symmetry. Here we show that a chaotic active nematic can self-organize into a spatiotemporal crystal, forming a regular lattice of density, orientation, and vorticity that breaks both spatial and temporal translational symmetry. Using a microtubule/kinesin active nematic interfaced with a lamellar liquid crystal and confined in microfluidic channels, we observe robust spatiotemporal lattices without external forcing. The ordering emerges from spontaneous synchronization of intrinsic flow instabilities, mediated by confinement and feedback between the active layer and the passive anisotropic interface. Continuum nematohydrodynamics simulations support our interpretation, highlighting how intrinsic length and time scales shape the active crystals. These results reconcile chaos and crystallinity in active matter and provide a strategy for engineering order in self-driven, far-from-equilibrium soft materials.", "url": "https://arxiv.org/abs/2603.12079", "type": "理论+数值", "summary": "从内在混沌中出现长程时空秩序是远非平衡物理学的一个核心挑战。在活跃的流体中，例如驱动细胞运动的细胞骨架网络，自生流动通常会产生“活跃的湍流”，缺乏平移对称性。在这里，我们证明了混沌活性向列可以自组织成时空晶体，形成密度、方向和涡度的规则晶格，打破空间和时间的平移对称性。使用与层状液晶连接并限制在微流体通道中的微管/驱动蛋白活性向列相，我们在没有外力的情况下观察到了坚固的时空晶格。这种排序是由内在流动不稳定性的自发同步产生的，由有源层和被动各向异性界面之间的限制和反馈介导。连续体线虫流体动力学模拟支持了我们的解释，强调了内在长度和时间尺度如何塑造活性晶体。这些结果协调了活性物质中的混沌性和结晶性，并为自驱动、非平衡软材料的工程秩序提供了策略。", "authors": [{"name": "Olga Bantysh"}, {"name": "Ramon Reigada"}, {"name": "Rodrigo C.V. Coelho"}, {"name": "Pau Guillamat"}, {"name": "Jordi Ignés-Mullol"}, {"name": "Francesc Sagués"}], "featured_authors": [{"name": "Olga Bantysh"}, {"name": "Ramon Reigada"}, {"name": "Rodrigo C.V. Coelho"}, {"name": "Pau Guillamat"}, {"name": "Jordi Ignés-Mullol"}, {"name": "Francesc Sagués"}], "author_count": 6}, {"id": "2603.12080", "category": "cond-mat", "title": "Spatiotemporal Characterization of Active Brownian Dynamics in Channels", "abstract": "Accumulation at boundaries represents a widely observed phenomenon in active systems with implications for microbial ecology and engineering applications. To rationalize the underlying physics, we provide analytical predictions for the first-passage properties and spatial distributions of a confined active Brownian particle (ABP). We show that ABPs with absorbing and hard-wall boundary conditions are Siegmund duals, yielding a direct mapping between the propagators of the two problems. We analyze the system across low and high activity regimes -- quantifying persistent motion relative to diffusion -- and show that active motion, together with a favorable initial orientation, typically lowers the mean first-passage time relative to passive diffusion. Notably, the full time-dependent propagator between hard walls approaches a wall-accumulated stationary state given by the derivative of the splitting probability as a consequence of Siegmund duality.", "url": "https://arxiv.org/abs/2603.12080", "type": "理论+数值", "summary": "边界处的积累代表了活性系统中广泛观察到的现象，对微生物生态学和工程应用具有影响。为了合理化基础物理，我们提供了对受限活性布朗粒子（ABP）的首次通过特性和空间分布的分析预测。我们证明具有吸收和硬壁边界条件的 ABP 是齐格蒙德对偶，从而在两个问题的传播子之间产生直接映射。我们分析了低活动状态和高活动状态下的系统——量化相对于扩散的持续运动——并表明主动运动以及有利的初始方向通常会降低相对于被动扩散的平均首次通过时间。值得注意的是，硬墙之间的全时间相关传播器接近由西格蒙德对偶性的分裂概率导数给出的墙累积稳态。", "authors": [{"name": "Yanis Baouche"}, {"name": "Mathis Guéneau"}, {"name": "Christina Kurzthaler"}], "featured_authors": [{"name": "Yanis Baouche"}, {"name": "Mathis Guéneau"}, {"name": "Christina Kurzthaler"}], "author_count": 3}, {"id": "2603.12081", "category": "cond-mat", "title": "Direct Boltzmann inversion method from particle configurations at arbitrary state points", "abstract": "We introduce a direct Boltzmann inversion method to infer the interaction potential in particle systems using as input particle configurations generated at an arbitrary state point of the system. Unlike iterative Boltzmann inversion, the proposed method does not require performing a new Monte Carlo simulation at each step of the iteration process. It relies instead on enforcing consistency between two independent estimates of the pair correlation function, respectively obtained from interparticle distances and from pairwise forces. As a result, the approach is computationally inexpensive and straightforward to implement. Because it relies on the sole expression of interparticle forces, our method naturally applies to any state point, including when the density is large and alternative methods may fail. Here we present the basic principles of the method and benchmark its performance on a diverse set of test potentials studied using computer simulations. Practical aspects and detailed implementation of the method are also discussed. Owing to its simplicity and generality, the method should be broadly applicable, from the construction of coarse-grained interaction potentials to the inference of effective interactions in non-equilibrium systems.", "url": "https://arxiv.org/abs/2603.12081", "type": "数值", "summary": "我们引入了直接玻尔兹曼反演方法，使用在系统任意状态点生成的输入粒子配置来推断粒子系统中的相互作用势。与迭代玻尔兹曼反演不同，所提出的方法不需要在迭代过程的每一步执行新的蒙特卡罗模拟。相反，它依赖于强制对相关函数的两个独立估计之间的一致性，这两个估计分别是从粒子间距离和成对力获得的。因此，该方法的计算成本低廉且易于实施。因为它依赖于粒子间力的唯一表达，所以我们的方法自然适用于任何状态点，包括当密度很大且替代方法可能失败时。在这里，我们介绍了该方法的基本原理，并在使用计算机模拟研究的一组不同的测试电位上对其性能进行了基准测试。还讨论了该方法的实际方面和详细实施。\n\n由于其简单性和通用性，该方法应该具有广泛的适用性，从粗粒度相互作用势的构造到非平衡系统中有效相互作用的推断。", "authors": [{"name": "Olivier Coquand"}, {"name": "Davide Paolino"}, {"name": "Ludovic Berthier"}], "featured_authors": [{"name": "Olivier Coquand"}, {"name": "Davide Paolino"}, {"name": "Ludovic Berthier"}], "author_count": 3}, {"id": "2603.12085", "category": "cond-mat", "title": "Emergent criticality in the Aubry-André model with periodic modulation", "abstract": "The Aubry-André model describes a system with quasiperiodic lattice modulation. In one dimension the AAH model is known to exhibit a sharp metal to insulator transition at a self-dual critical point at which all the states in the spectrum are critical or multifractal in nature. While such criticality is immediately destroyed by an additional onsite periodic modulation, we show an emergent criticality in the limit of strong periodic modulation strength under proper conditions. The resulting strong-modulation critical phase exhibits multifractal eigenstates and singular continuous spectra, belonging to the universality class of the critical Harper model. Moreover, we reveal that additional periodic potential of period N in the quasiperiodic chain folds the spectrum into N bands with quasiperiodicity being enhanced by a factor of N, producing N numbers of Hofstadter butterflies in each band. Our results reveal a general mechanism for engineering robust criticality and spectral replication in quasiperiodic systems.", "url": "https://arxiv.org/abs/2603.12085", "type": "理论", "summary": "Aubry-André 模型描述了具有准周期晶格调制的系统。在一维中，已知 AAH 模型在自对偶临界点处表现出急剧的金属到绝缘体的转变，在该临界点处，光谱中的所有状态本质上都是临界状态或多重分形。虽然这种临界性会立即被额外的现场周期性调制所破坏，但我们在适当的条件下显示了强周期性调制强度极限的紧急临界性。由此产生的强调制临界相表现出多重分形本征态和奇异连续谱，属于临界哈珀模型的普适性类别。此外，我们发现准周期链中周期 N 的附加周期势将光谱折叠成 N 个带，准周期性增强了 N 倍，在每个带中产生 N 个霍夫施塔特蝴蝶。我们的结果揭示了准周期系统中鲁棒临界性和谱复制的一般机制。", "authors": [{"name": "Sitaram Maity"}, {"name": "Nilanjan Roy"}, {"name": "Tapan Mishra"}], "featured_authors": [{"name": "Sitaram Maity"}, {"name": "Nilanjan Roy"}, {"name": "Tapan Mishra"}], "author_count": 3}, {"id": "2603.12169", "category": "cond-mat", "title": "Observation of Iso-Symmetric Structural and Lifshitz Transitions in Quasi-one-dimensional CrNbSe$_5$", "abstract": "Chalcogenides-rich transition metal compounds host a rich landscape of emergent quantum phenomena that are intimately governed by their quasi-one-dimensional chemical-bonding frameworks and their response to external perturbations such as pressure. Here, we report a pressure-induced iso-symmetric structural transition in the quasi-one-dimensional compound CrNbSe$_5$, in which the electronic ground state is controlled not by symmetry breaking but by a continuous reorganization of local bonding interactions. Applied pressure reversibly tunes CrNbSe$_5$ between semiconducting and semimetallic states, enabling access to low- and high-carrier electronic regimes through direct modulation of metal-chalcogen bonding. High-pressure single-crystal X-ray diffraction directly resolves the evolution of Cr-Se and Nb-Se bond distances, coordination polyhedra, and connectivity, revealing a fully reversible semimetal-semiconductor-semimetal transition driven by gradual yet cooperative bond rearrangements within a preserved crystallographic symmetry. In contrast to chemical substitution, which irreversibly alters composition and introduces disorder, pressure acts as a clean, continuous control parameter that reshapes the bonding landscape without disrupting structural symmetry. These results establish CrNbSe$_5$ as a model system for electronically driven phase switching via tunable chemical bonding, highlighting iso-symmetric bond reorganization as a powerful design principle for pressure-controlled electronic and spintronic functionalities.", "url": "https://arxiv.org/abs/2603.12169", "type": "理论", "summary": "富含硫族化物的过渡金属化合物拥有丰富的涌现量子现象，这些现象受到其准一维化学键框架及其对压力等外部扰动的响应的密切控制。在这里，我们报告了准一维化合物 CrNbSe$_5$ 中压力诱导的等对称结构转变，其中电子基态不是通过对称性破缺控制，而是通过局部键合相互作用的连续重组来控制。施加的压力可在半导体和半金属状态之间可逆地调节 CrNbSe$_5$，从而能够通过直接调制金属-硫族键合来获得低载流子和高载流子电子状态。
