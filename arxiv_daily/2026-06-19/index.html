  <style>

    .author-note { color: var(--muted); font-size: 12px; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2606.19418", "category": "cond-mat", "title": "Sequential replica exchange with solute tempering for atomistic modeling of supramolecular polymer structures", "abstract": "Predicting detailed atomistic structures of self-assembling systems remains a challenge for all-atom molecular dynamics simulations. Replica exchange with solute tempering (REST) has been used to study those systems by accelerating all monomers in a global and uniform manner. While such a global approach can in principle predict any morphology of the system, it has computational drawbacks such as inefficient replica traversal due to order-disorder transitions and the growing number of replicas with system size. To address these issues, here we propose an alternative, stepwise construction approach to modeling supramolecular polymers under the assumption of one-dimensional polymerization. Specifically, we generate polymer structures by adding new monomers one by one to the system and applying REST to the new monomers to find their optimal binding positions based on an energy-based scoring function. The monomer addition and enhanced sampling are repeated sequentially until a polymer of desired length is obtained. We test the above procedure using a model supramolecular polymer in explicit solvent, and show that it can generate a polymer structure with characteristic H-bonding patterns at reduced computational costs, while also improving the efficiency of replica traversal significantly. We thus expect that the sequential REST will be useful for modeling supramolecular polymers, particularly for cases where global REST simulations are too demanding computationally.", "url": "https://arxiv.org/abs/2606.19418", "type": "理论+数值", "summary": "预测自组装系统的详细原子结构仍然是全原子分子动力学模拟的一个挑战。复制品交换与溶质回火 (REST) 已用于通过以全局且统一的方式加速所有单体来研究这些系统。虽然这种全局方法原则上可以预测系统的任何形态，但它具有计算缺陷，例如由于有序-无序转换导致的副本遍历效率低下以及副本数量随着系统规模的增长而增加。为了解决这些问题，我们在这里提出了一种替代的逐步构建方法，在一维聚合的假设下对超分子聚合物进行建模。具体来说，我们通过将新单体一一添加到系统中，并对新单体应用 REST，根据基于能量的评分函数找到它们的最佳结合位置，从而生成聚合物结构。依次重复单体添加和加强取样，直到获得所需长度的聚合物。\n\n我们在显式溶剂中使用模型超分子聚合物测试了上述过程，结果表明它可以以降低的计算成本生成具有特征氢键模式的聚合物结构，同时还显着提高复制遍历的效率。因此，我们预计顺序 REST 将有助于超分子聚合物建模，特别是对于全局 REST 模拟计算要求过高的情况。", "authors": [{"name": "Hadi H. Arefi"}, {"name": "Takeshi Yamamoto"}], "featured_authors": [{"name": "Hadi H. Arefi"}, {"name": "Takeshi Yamamoto"}], "author_count": 2}, {"id": "2606.19421", "category": "cond-mat", "title": "Electrical magnetochiral anisotropy in Rashba superconductors", "abstract": "We theoretically investigate the role of higher-order Lifshitz invariants in nonreciprocal charge transport in two-dimensional noncentrosymmetric superconductors with Rashba spin-orbit coupling. In the superconducting state, these symmetry-allowed terms give rise to critical-current nonreciprocity, while in the normal state near the superconducting transition they generate a pronounced magnetochiral anisotropy. Using symmetry-constrained group-theoretical methods, we systematically construct the allowed Lifshitz invariants and derive the corresponding vector structure of the nonreciprocal current. To describe nonlinear transport in the fluctuation regime, we apply a generalized time-dependent Ginzburg-Landau theory that incorporates both the Aslamazov-Larkin contribution from fluctuation-induced Cooper pairs and the Maki-Thompson contribution associated with quantum interference in the Cooper channel. We further analyze the effects of disorder scattering and dephasing on the resulting nonreciprocal response.", "url": "https://arxiv.org/abs/2606.19421", "type": "理论+数值", "summary": "我们从理论上研究了高阶 Lifshitz 不变量在具有 Rashba 自旋轨道耦合的二维非中心对称超导体中非互易电荷传输中的作用。在超导状态下，这些对称项会产生临界电流非互易性，而在超导转变附近的正常状态下，它们会产生明显的磁手性各向异性。利用对称约束群论方法，我们系统地构造了允许的Lifshitz不变量，并推导了相应的不可逆电流的矢量结构。为了描述涨落体系中的非线性输运，我们应用了广义的时间相关的金兹堡-朗道理论，该理论结合了涨落引起的库珀对的阿斯拉马佐夫-拉金贡献和与库珀通道中的量子干涉相关的马基-汤普森贡献。我们进一步分析了无序散射和相移对所产生的不可逆响应的影响。", "authors": [{"name": "Joaquim Telles de Miranda"}, {"name": "Maxim Khodas"}, {"name": "Alex Levchenko"}], "featured_authors": [{"name": "Joaquim Telles de Miranda"}, {"name": "Maxim Khodas"}, {"name": "Alex Levchenko"}], "author_count": 3}, {"id": "2606.19426", "category": "cond-mat", "title": "Three-dimensional Foliated Fractional Quantum Hall Phases", "abstract": "Foliated topological orders in three dimensions are layered systems in which anyons are free to move within a layer but cannot hop between them. A simple model with such a phase is a stack of decoupled two-dimensional electron gases in a strong magnetic field, each in the same fractional quantum Hall state. By focusing on the case of filling $\\nu=1/3$ of the lowest Landau level in each layer, we show that (i) the limit of decoupled Laughlin states is stable upon introducing interlayer interactions and (ii) the system can enter a spontaneously layer-trimerized foliated non-Abelian Fibonacci phase. We support our claims by numerical exact diagonalization of up to 10 layers as well as perturbative analytical calculations. Specifically, we show that the foliated Fibonacci phase exists in the 9-layer system with pseudopotential interactions within and between neighboring layers. We identify the phase via quasihole counting and by calculating the overlap with a model wave function which we derive from the associated conformal field theory. Our numerical results suggest the possibility of realizing these phases in layered van der Waals crystals in strong magnetic fields, as well as in multilayer heterostructures.", "url": "https://arxiv.org/abs/2606.19426", "type": "理论+数值", "summary": "三维叶状拓扑序是分层系统，其中任意子可以在层内自由移动，但不能在层之间跳跃。具有这种相的简单模型是强磁场中的一堆解耦二维电子气，每个电子气都处于相同的分数量子霍尔态。通过关注每层中填充最低朗道能级 $\\nu=1/3$ 的情况，我们表明（i）解耦劳克林态的极限在引入层间相互作用时是稳定的，并且（ii）系统可以进入自发的层三聚叶状非阿贝尔斐波那契相。我们通过最多 10 层的数值精确对角化以及微扰分析计算来支持我们的主张。具体来说，我们表明叶状斐波那契相存在于 9 层系统中，相邻层内部和层​​之间具有赝势相互作用。我们通过准空穴计数并计算与模型波函数的重叠来识别相位，该模型波函数是从相关的共形场理论推导出来的。\n\n我们的数值结果表明在强磁场中的层状范德华晶体以及多层异质结构中实现这些相的可能性。", "authors": [{"name": "Sahana Das"}, {"name": "Navketan Batra"}, {"name": "Andrea Kouta Dagnino"}, {"name": "Dan Mao"}, {"name": "Nicolas Regnault"}, {"name": "Glenn Wagner"}, {"name": "Titus Neupert"}], "featured_authors": [{"name": "Sahana Das"}, {"name": "Navketan Batra"}, {"name": "Andrea Kouta Dagnino"}, {"name": "Nicolas Regnault"}, {"name": "Glenn Wagner"}, {"name": "Titus Neupert"}], "author_count": 7}, {"id": "2606.19431", "category": "cond-mat", "title": "Odd fluids from chiral cellular automata", "abstract": "Cellular automata are discrete dynamical systems defined on a lattice, in which each site carries a finite set of states that evolve in time according to local deterministic rules. An important application of cellular automata is in lattice gas models of fluids, where the cellular automaton framework provides a particle-based microscopic description of hydrodynamic behavior. The macroscopic fluid equations emerge after coarse-graining over many lattice sites and time steps, offering a bottom-up route to hydrodynamics. A celebrated example is the Frisch-Hasslacher-Pomeau (FHP) model, an automaton defined on a two-dimensional triangular lattice that yields the two-dimensional Navier-Stokes equations upon coarse-graining. In this work, we construct a parity-breaking generalization of the FHP model through two modifications: introducing chiral two-body collision rules and systematically rotating particle velocities to mimic the effect of a background magnetic field. We show that this automaton yields a hydrodynamic model with odd viscosity, a transverse transport coefficient that is a hallmark of odd fluids. We verify the analytical transport coefficients using Poiseuille-flow simulations of the chiral FHP automaton. Our results demonstrate that the chiral automaton introduced here provides a bridge between microscopic parity-breaking scattering processes and macroscopic odd-fluid hydrodynamics.", "url": "https://arxiv.org/abs/2606.19431", "type": "理论+数值", "summary": "元胞自动机是在晶格上定义的离散动力系统，其中每个位点都承载一组有限的状态，这些状态根据局部确定性规则随时间演化。元胞自动机的一个重要应用是在流体的晶格气体模型中，其中元胞自动机框架提供了基于粒子的流体动力学行为的微观描述。宏观流体方程在许多晶格位点和时间步长上进行粗粒度化后出现，为流体动力学提供了一条自下而上的途径。一个著名的例子是 Frisch-Hasslacher-Pomeau (FHP) 模型，这是一种在二维三角晶格上定义的自动机，可在粗粒度时生成二维纳维-斯托克斯方程。在这项工作中，我们通过两项修改构建了 FHP 模型的宇称破缺推广：引入手性二体碰撞规则和系统地旋转粒子速度以模拟背景磁场的影响。我们表明，该自动机产生具有奇数粘度的流体动力学模型，横向传输系数是奇数流体的标志。\n\n我们使用手性 FHP 自动机的泊肃叶流模拟来验证分析传输系数。我们的结果表明，这里引入的手性自动机在微观宇称破缺散射过程和宏观奇数流体流体动力学之间架起了一座桥梁。", "authors": [{"name": "Andrew A. Allocca"}, {"name": "Shiva Heidari"}, {"name": "Thomas Iadecola"}, {"name": "Armin Rahmani"}, {"name": "Pouyan Ghaemi"}, {"name": "Sriram Ganeshan"}], "featured_authors": [{"name": "Andrew A. Allocca"}, {"name": "Shiva Heidari"}, {"name": "Thomas Iadecola"}, {"name": "Armin Rahmani"}, {"name": "Pouyan Ghaemi"}, {"name": "Sriram Ganeshan"}], "author_count": 6}, {"id": "2606.19437", "category": "cond-mat", "title": "Many-Body Protection of Topological Edge Memory in Strong Interacting Quenches", "abstract": "Quantum quenches drive edge states far from equilibrium, yet whether the memory of a topological initial state survives in a non-integrable, interacting system has remained largely unexplored. We study this question in the bond-alternating XXZ chain -- an interacting Su--Schrieffer--Heeger model hosting symmetry-protected topological edge modes with markedly enhanced boundary magnetization -- and analyze quenches across all combinations of single-particle and many-body initial and final Hamiltonians. The results organize by a single distinction as we rigorously establish in this work: whether the post-quench Hamiltonian is free or genuinely interacting. For a free post-quench Hamiltonian, the dynamics is solved exactly by a correlation-matrix approach; the boundary-mode return amplitude decays as $t^{-3/2}$, and initial interactions enter only through a dressed one-body density matrix. For a genuinely interacting post-quench Hamiltonian, finite-time stability bounds prove that away from local resonances the first-dimer magnetization remains stable on time windows growing as arbitrarily large powers of the inverse inter-dimer coupling. Matrix product state simulations across all four protocols show that interactions in the final Hamiltonian markedly extend finite-time boundary memory -- with local suppression near the isotropic $SU(2)$ point -- revealing a many-body protection mechanism in a non-integrable system where scrambling would otherwise wash out initial-state memory fast.", "url": "https://arxiv.org/abs/2606.19437", "type": "理论+数值", "summary": "量子淬灭使边缘态远离平衡，但拓扑初始态的记忆是否在不可积的相互作用系统中仍然存在，很大程度上仍未得到探索。我们在键交替 XXZ 链中研究这个问题——一个相互作用的 Su--Schrieffer--Heeger 模型，其托管对称保护的拓扑边缘模式，边界磁化强度显着增强——并分析单粒子和多体初始和最终哈密顿量的所有组合的淬灭。结果通过我们在这项工作中严格建立的单一区别来组织：淬火后哈密顿量是自由的还是真正相互作用的。对于自由的淬火后哈密顿量，动力学可以通过相关矩阵方法精确求解；边界模式返回幅度衰减为 $t^{-3/2}$，并且初始相互作用仅通过穿着的单体密度矩阵进入。对于真正相互作用的淬火后哈密顿量，有限时间稳定性界限证明，远离局部共振，第一二聚体磁化强度在随着二聚体间反向耦合的任意大幂增长的时间窗口上保持稳定。\n\n所有四种协议的矩阵乘积状态模拟表明，最终哈密顿量中的交互显着扩展了有限时间边界记忆（在各向同性 $SU(2)$ 点附近进行局部抑制），揭示了不可积系统中的多体保护机制，否则加扰会快速清除初始状态记忆。", "authors": [{"name": "Yuxiao Hang"}, {"name": "Stephan Haas"}, {"name": "Rishabh Jha"}], "featured_authors": [{"name": "Yuxiao Hang"}, {"name": "Stephan Haas"}, {"name": "Rishabh Jha"}], "author_count": 3}, {"id": "2606.19465", "category": "cond-mat", "title": "Exact operator dynamics in Lindbladian Wess-Zumino-Witten conformal field theories", "abstract": "Understanding the time evolution of physical observables in open quantum many-body systems coupled to external environments is a natural and difficult problem, and exact results are still rare. In this work, we study this problem for Wess-Zumino-Witten (WZW) conformal field theories with Lindblad jump operators linear in Kac-Moody current modes. We investigate the exact operator dynamics generated by these Lindbladians, identifying classes of current operators whose Heisenberg equations close and can therefore be solved analytically using the underlying current algebra. In Abelian $U(1)_k$ WZW theories, this closure of operator dynamics holds for arbitrary settings of jump rates and includes exactly tractable cooling dynamics. In contrast, for non-Abelian WZW theories, exact closure occurs only for symmetric current-mode dissipation, where upward and downward current-mode transitions occur with equal rates, and even then it leads to a simple closed evolution only for a single current operator. Generic imbalances, including those needed for cooling, produce additional non-Abelian terms and prevent closure of the opeartor dynamics. Consequently, the current algebra gives rise to a broad family of exactly solvable dissipative dynamics in the Abelian setting, whereas in the non-Abelian case it singles out only a special exactly solvable dynamics corresponding to an infinite-temperature bath.", "url": "https://arxiv.org/abs/2606.19465", "type": "理论+数值", "summary": "理解与外部环境耦合的开放量子多体系统中物理可观测量的时间演化是一个自然而困难的问题，确切的结果仍然很少。在这项工作中，我们研究了 Wess-Zumino-Witten (WZW) 共形场论的这个问题，其中 Lindblad 跳跃算子在 Kac-Moody 电流模式下呈线性。我们研究了这些 Lindbladians 生成的精确算子动力学，识别了其海森堡方程接近的电流算子类别，因此可以使用基础电流代数进行分析求解。在阿贝尔 $U(1)_k$ WZW 理论中，算子动力学的这种闭包适用于跳跃率的任意设置，并且包括精确易处理的冷却动力学。相比之下，对于非阿贝尔 WZW 理论，精确闭合仅发生在对称电流模式耗散的情况下，其中向上和向下电流模式转变以相同的速率发生，即使如此，它也会导致仅针对单个电流算子的简单闭合演化。一般的不平衡，包括冷却所需的不平衡，会产生额外的非阿贝尔项并阻止算子动力学的闭合。\n\n因此，当前的代数在阿贝尔设置中产生了一系列精确可解的耗散动力学，而在非阿贝尔情况下，它仅挑选出与无限温度浴相对应的特殊精确可解动力学。", "authors": [{"name": "Qicheng Tang"}, {"name": "Ruhanshi Barad"}, {"name": "Xueda Wen"}], "featured_authors": [{"name": "Qicheng Tang"}, {"name": "Ruhanshi Barad"}, {"name": "Xueda Wen"}], "author_count": 3}, {"id": "2606.19571", "category": "cond-mat", "title": "Optical spin injection in graphane and fluorographene", "abstract": "We theoretically investigate the optical spin-injection response in different stoichiometric configurations of graphane and fluorographene using density functional theory. Our goal is to determine which configuration yields the strongest degree of spin polarization. The results show that the fluorographene zigzag configuration yields the best degree of spin polarization response (${\\cal DSP}^{\\mathrm{z}}$), with 98\\% spin polarized electrons at the band edge and over a wide range of excitation photon energies. In contrast, other graphane and fluorographene configurations achieve a ${\\cal DSP}^{\\mathrm{z}}$ of roughly 83--100\\%, but only within a limited photon-excitation energy range. In structures with low spin-orbit coupling, the degree of spin polarization is close to 100\\% over a wide range of photon energies. For higher spin-orbit coupling, this strong response appears, but only in a narrow photon energy region. Additionally, under the band-resolved decomposition scheme, the contributions of different band-to-band transitions to the ${\\cal DSP}^{\\mathrm{z}}$ spectrum are identified by summing only the selected valence and conduction bands. Our findings show that almost the entire ${\\cal DSP}^{\\mathrm{z}}$ spectrum of the fluorographene zigzag configuration comes from transitions that involve only the top valence band, which is a mixture of C--p and F--p states.", "url": "https://arxiv.org/abs/2606.19571", "type": "理论+数值", "summary": "我们利用密度泛函理论从理论上研究了石墨烷和荧光石墨烯不同化学计量构型的光学自旋注入响应。我们的目标是确定哪种配置产生最强程度的自旋极化。结果表明，荧光石墨烯之字形配置产生最佳程度的自旋极化响应（${\\cal DSP}^{\\mathrm{z}}$），在带边和较宽的激发光子能量范围内具有 98\\% 自旋极化电子。相比之下，其他石墨烷和荧光石墨烯配置实现了大约 83--100\\% 的 ${\\cal DSP}^{\\mathrm{z}}$，但仅在有限的光子激发能量范围内。在低自旋轨道耦合的结构中，自旋极化程度在很宽的光子能量范围内接近 100%。对于更高的自旋轨道耦合，会出现这种强烈的响应，但仅出现在狭窄的光子能量区域中。此外，在能带解析分解方案下，不同带间跃迁对 ${\\cal DSP}^{\\mathrm{z}}$ 谱的贡献通过仅对选定的价带和导带求和来确定。\n\n我们的研究结果表明，荧光石墨烯之字形构型的几乎整个 ${\\cal DSP}^{\\mathrm{z}}$ 光谱都来自仅涉及顶部价带的跃迁，该价带是 C--p 和 F--p 态的混合。", "authors": [{"name": "Angélica Marina López-Martínez"}, {"name": "César Castillo-Quevedo"}, {"name": "Cesar Camas-Flores"}, {"name": "Analila Luna-Valenzuela"}, {"name": "Jose Luis Cabellos"}], "featured_authors": [{"name": "Angélica Marina López-Martínez"}, {"name": "César Castillo-Quevedo"}, {"name": "Cesar Camas-Flores"}, {"name": "Analila Luna-Valenzuela"}, {"name": "Jose Luis Cabellos"}], "author_count": 5}, {"id": "2606.19582", "category": "cond-mat", "title": "Deposition and Growth of the AlCoCuFeNi High-Entropy Alloy Thin Film: Molecular Dynamics Simulation", "abstract": "The growth of a thin film of a high-entropy AlCoCuFeNi alloy on a silicon (100) substrate was studied using molecular dynamics modeling. The simulation was carried out using the embedded atom model to describe the interactions among Al, Co, Cu, Ni, and Fe atoms. The interaction between Al, Co, Cu, Fe, Ni atoms and the Si substrate was modeled using the Lennard-Jones potential, while the interaction between silicon atoms was described using the Stillinger-Weber potential. The total simulation time was 50 ns. It was found that small clusters were formed at the first stage of deposition and that crystallization started after approximately 5 ns of simulation, when the characteristic cluster size was about 2 nm. At the end of the simulation, after 50 ns of modeling, the simulated film contained face-centered cubic, body-centered cubic, hexagonal close-packed, and amorphous phases. Analysis of the radial distribution function made it possible to determine nearest-neighbor distances and estimate the lattice parameters of these phases.", "url": "https://arxiv.org/abs/2606.19582", "type": "理论+数值", "summary": "使用分子动力学模型研究了高熵 AlCoCuFeNi 合金薄膜在硅 (100) 基底上的生长。使用嵌入式原子模型进行模拟来描述 Al、Co、Cu、Ni 和 Fe 原子之间的相互作用。 Al、Co、Cu、Fe、Ni 原子与 Si 基底之间的相互作用使用 Lennard-Jones 势进行建模，而硅原子之间的相互作用则使用 Stillinger-Weber 势进行描述。总仿真时间为 50 ns。研究发现，在沉积的第一阶段形成了小簇，并且在模拟大约 5 ns 后开始结晶，此时簇的特征尺寸约为 2 nm。在模拟结束时，经过 50 ns 的建模，模拟薄膜包含面心立方、体心立方、六方密排和非晶相。对径向分布函数的分析使得确定最近邻距离并估计这些相的晶格参数成为可能。", "authors": [{"name": "Oleksandr I. Kushnerov"}, {"name": "Valerij F. Bashev"}, {"name": "Sergey I. Ryabtsev"}], "featured_authors": [{"name": "Oleksandr I. Kushnerov"}, {"name": "Valerij F. Bashev"}, {"name": "Sergey I. Ryabtsev"}], "author_count": 3}, {"id": "2606.19740", "category": "cond-mat", "title": "Enhanced electronic correlations and altermagnetic ground state of two-dimensional CsCr3Sb5 monolayers", "abstract": "Recently, layered corrected kagome metal CsCr3Sb5 have garnered significant attention attributed to its flat bands near the Fermi level (EF) and altermagnetic ground state [ Yi Liu et al., Nature 632, 1032 (2024)]. However, the van Hove singularities (vHSs) in bulk CsCr3Sb5 are far away from the EF, while an effective modulation of VHS toward the EF is essential for exploring intriguing electron transport properties. In this work, using first-principles calculations, we investigate electronic structures of two-dimensional (2D) Cr3Sb5 and CsCr3Sb5 monolayers which may be mechanically exfoliated from bulk materials. Notably, it is revealed that both flat bands and vHSs simultaneously reside in close proximity to the EF in Cr3Sb5 monolayer, signifying enhanced electronic correlations. Importantly, a tensile strain further shifts the incipient flat bands and vHSs of two monolayers simultaneously to the vicinity of the EF, suggesting strain tunable electronic correlations and concomitant quantum effects. Furthermore, altermagnetic ground state is also revealed due to retained mirror symmetry between two sublattices in these two monolayers. Thus, this work advances understanding and modulations of electronic properties of 2D CsCr3Sb5 monolayers, strengthening their great potential for exploring unconventional quantum phenomena and altermagnetism.", "url": "https://arxiv.org/abs/2606.19740", "type": "理论+数值", "summary": "最近，层状校正kagome金属CsCr3Sb5因其费米能级（EF）附近的平带和交变磁基态而引起了广泛关注[Yi Liu et al., Nature 632, 1032 (2024)]。然而，块状 CsCr3Sb5 中的范霍夫奇点 (vHS) 远离 EF，而 VHS 向 EF 的有效调制对于探索有趣的电子传输特性至关重要。在这项工作中，我们利用第一性原理计算，研究了可以从块体材料上机械剥离的二维 (2D) Cr3Sb5 和 CsCr3Sb5 单层的电子结构。值得注意的是，研究表明平带和 vHS 同时位于 Cr3Sb5 单层中的 EF 附近，这表明电子相关性增强。重要的是，拉伸应变进一步将两个单层的初始平带和 vHS 同时移动到 EF 附近，表明应变可调的电子相关性和伴随的量子效应。此外，由于这两个单层中的两个子晶格之间保留了镜像对称性，还揭示了交变磁基态。\n\n因此，这项工作促进了对 2D CsCr3Sb5 单层电子特性的理解和调制，增强了它们探索非常规量子现象和交变磁性的巨大潜力。", "authors": [{"name": "Z. H. Guan"}, {"name": "Z. L. Peng"}, {"name": "W. Z. Zhuo"}, {"name": "G. Tian"}, {"name": "Z. P. Hou"}, {"name": "D. Y. Chen"}, {"name": "Z. Fan"}, {"name": "X. B. Lu"}, {"name": "X. S. Gao"}, {"name": "M. H. Qin"}, {"name": "J. M. Liu"}], "featured_authors": [{"name": "Z. H. Guan"}, {"name": "Z. L. Peng"}, {"name": "W. Z. Zhuo"}, {"name": "X. S. Gao"}, {"name": "M. H. Qin"}, {"name": "J. M. Liu"}], "author_count": 11}, {"id": "2606.19780", "category": "cond-mat", "title": "Thickness-Dependent Interlayer Coupling and Semiconductor-to-Semimetal Crossover in Arsenene Multilayers", "abstract": "Interlayer interactions in layered materials are often assumed to transfer from the bilayer to the bulk, but this assumption can fail when chemically active out-of-plane orbitals participate in bonding. We combine diffusion quantum Monte Carlo (DMC) and density functional theory (DFT) to determine how interlayer coupling evolves in arsenene multilayers. DMC shows that bulk gray arsenic is compact, whereas the corresponding few-layer structures remain at substantially larger interlayer separations despite sharing the same nominal A$_{1}$B$_{-1}$ adjacent-layer registry. Registry alone therefore does not determine the bonding regime; thickness and coordination reshape the interlayer interaction. Among the tested functionals, SCAN+rVV10 most closely reproduces DMC equilibrium separations and stacking energetics. Using the DMC-benchmarked SCAN+rVV10 calculations, we predict a thickness-driven stacking sequence from A$_{1}$A$_{1}$ to A$_{1}$B$_{1}$ and finally bulk-like A$_{1}$B$_{-1}$. The structural crossover coincides with a stacking-dependent DFT band-gap collapse driven by enhanced interlayer As p$_{z}$ hybridization.", "url": "https://arxiv.org/abs/2606.19780", "type": "理论+数值", "summary": "通常认为层状材料中的层间相互作用从双层转移到本体，但当化学活性的面外轨道参与键合时，这种假设可能会失败。我们结合扩散量子蒙特卡罗（DMC）和密度泛函理论（DFT）来确定砷烯多层中层间耦合如何演化。 DMC 表明，块状灰砷是致密的，而相应的几层结构尽管共享相同的标称 A$_{1}$B$_{-1}$ 相邻层注册表，但仍保持较大的层间间距。因此，登记处本身并不能决定担保制度；厚度和协调重塑了层间相互作用。在测试的泛函中，SCAN+rVV10 最接近地再现了 DMC 平衡分离和堆积能量。使用 DMC 基准 SCAN+rVV10 计算，我们预测从 A$_{1}$A$_{1}$ 到 A$_{1}$B$_{1}$ 到最终块状 A$_{1}$B$_{-1}$ 的厚度驱动堆叠序列。结构交叉与由增强的层间 As p$_{z}$ 杂化驱动的堆叠相关的 DFT 带隙塌陷相一致。", "authors": [{"name": "Jeonghwan Ahn"}, {"name": "Seoung-Hun Kang"}, {"name": "Jaron T. Krogel"}], "featured_authors": [{"name": "Jeonghwan Ahn"}, {"name": "Seoung-Hun Kang"}, {"name": "Jaron T. Krogel"}], "author_count": 3}, {"id": "2606.19977", "category": "cond-mat", "title": "Interplay of Altermagnetism and Coupled Quasi-Altermagnetic states in Sliding Two-dimensional Square Lattice", "abstract": "The emergence of non-relativistic spin splitting (NRSS) in altermagnetic systems has introduced a new paradigm in antiferromagnets with vanishing net magnetization. Although sliding-induced valley-polarized phases have recently been demonstrated in two-dimensional altermagnets, the observed valley-polarized state represents only a partial manifestation of altermagnetism, and a comprehensive classification based on spinsplitting characteristics remains lacking. Here, using first-principles calculations, general stacking theory, and spin-Laue symmetry analysis, we propose a coupled quasialtermagnetic state representing a distinct subclass of altermagnetism, in which reversible type-IV NRSS is controlled through interlayer sliding. Accordingly, the sliding-induced phases are classified into two categories: altermagnetic and quasi-altermagnetic states. We establish a direct correspondence between reciprocal-space spin splitting and real-space switching between the two quasi-altermagnetic states. Importantly, the spin-polarized bands in these states remain spin split at {\\Gamma} point even in the absence of spin-orbit coupling (SOC), distinguishing them within the proposed classification framework. To demonstrate the interplay between altermagnetic and quasi-altermagnetic states, we investigate the two-dimensional Lieb-lattice material Mn2WS4 and its Janus derivative Mn2WS2Se2, analysing how changes in the local environment influence the different magnetic phases. Importantly, the underlying mechanism is broadly applicable to a wide class of twodimensional square-lattice systems. We further investigate the effects of SOC, focusing on spin texture and transport signatures in coupled quasi-altermagnetic states.", "url": "https://arxiv.org/abs/2606.19977", "type": "理论+数值", "summary": "交变磁系统中非相对论自旋分裂（NRSS）​​的出现引入了净磁化强度消失的反铁磁体的新范例。尽管最近在二维互变磁体中证明了滑动引起的谷极化相，但观察到的谷极化态仅代表了互变磁体的部分表现，并且仍然缺乏基于自旋分裂特性的综合分类。在这里，利用第一性原理计算、一般堆积理论和自旋劳厄对称分析，我们提出了一种耦合准变磁态，代表了交替磁性的一个独特子类，其中可逆 IV 型 NRSS 通过层间滑动来控制。因此，滑动引起的相分为两类：交变磁态和准交变磁态。我们在倒易空间自旋分裂和两个准交变磁态之间的实空间切换之间建立了直接对应关系。\n\n重要的是，即使在没有自旋轨道耦合（SOC）的情况下，这些状态的自旋极化带仍然在 {\\Gamma} 点保持自旋分裂，从而在提出的分类框架中区分它们。为了证明交变磁态和准交变磁态之间的相互作用，我们研究了二维利勃晶格材料 Mn2WS4 及其 Janus 导数 Mn2WS2Se2，分析了局部环境的变化如何影响不同的磁相。重要的是，底层机制广泛适用于各种二维方格系统。我们进一步研究 SOC 的影响，重点关注耦合准交变磁态下的自旋纹理和输运特征。", "authors": [{"name": "Bhautik R Dhori"}, {"name": "Deepak Upadhyay"}, {"name": "Prafulla K Jha"}], "featured_authors": [{"name": "Bhautik R Dhori"}, {"name": "Deepak Upadhyay"}, {"name": "Prafulla K Jha"}], "author_count": 3}, {"id": "2606.20020", "category": "cond-mat", "title": "Effects of interaction range on the mean-field dynamics of Bose polarons", "abstract": "We consider the three-dimensional Bose polaron problem in the regime of finite range interactions and competing length scales. Working in the reference frame of the impurity, we study both static and out of equilibrium properties of the system, in particular the transfer of momentum between the impurity and the host gas. We find that relaxation dynamics can occur via damped oscillations of the impurity velocity with simple dependence on the interaction strength. Furthermore, the equilibration process is sensitive to the type of the impurity-bath interaction. Specifically, interatomic forces describing ion-atom systems lead to much longer timescales and more pronounced oscillations in the strong coupling regime with respect to local interaction potentials. We also find that the effective masses can differ by a large amount between the two scenarios, even if the number of atoms in the polaron cloud remains similar for both cases.", "url": "https://arxiv.org/abs/2606.20020", "type": "理论", "summary": "我们在有限范围相互作用和竞争长度尺度的体系中考虑三维玻色极化子问题。在杂质的参考系中，我们研究系统的静态和非平衡特性，特别是杂质和主体气体之间的动量传递。我们发现弛豫动力学可以通过杂质速度的阻尼振荡发生，并且简单地依赖于相互作用强度。此外，平衡过程对杂质浴相互作用的类型敏感。具体来说，描述离子-原子系统的原子间力会导致强耦合区域中相对于局部相互作用势更长的时间尺度和更明显的振荡。我们还发现，两种情况下的有效质量可能相差很大，即使两种情况下极化子云中的原子数量保持相似。", "authors": [{"name": "Piotr Wysocki"}, {"name": "Ubaldo Cavazos Olivas"}, {"name": "Marek Tylutki"}, {"name": "Krzysztof Jachymski"}], "featured_authors": [{"name": "Piotr Wysocki"}, {"name": "Ubaldo Cavazos Olivas"}, {"name": "Marek Tylutki"}, {"name": "Krzysztof Jachymski"}], "author_count": 4}, {"id": "2606.20040", "category": "cond-mat", "title": "Electrostatic effects in nano-reactor-confined charge regulated macroions", "abstract": "We formulate a thermodynamic model of a nano-reactor containing charge-regulated macroions within an electrolyte-permeable enclosure. The model is then formalized within the Poisson-Boltzmann electrostatics augmented by the consistent inclusion of the charge dissociation of molecular groups residing on the surface of the entrapped macroions via charge regulation formalism. By solving the basic equilibrium equations in the linearized Debye-Hückel type approximation, we analyze the salient features of the inhomogeneous electrolyte distribution and macroion charge. We found that the surface charge asymmetry/symmetry of the macroions strongly affects the spatial profile of electrostatic potential. The effective screening length shows the non-monotonic behavior, arising from the complex interplay between the bathing external solution and macroion effective charges, which govern charge regulation equilibria. The total pressure at the nano-reactor enclosure boundary decreases monotonically as the enclosure radius and the ionic bulk salt concentration increase. Also, the resulting pressure is strongly influenced by the surface charge densities of the nano-reactor and the number of confined macroions.", "url": "https://arxiv.org/abs/2606.20040", "type": "理论", "summary": "我们制定了纳米反应器的热力学模型，该纳米反应器在电解质可渗透的外壳内含有电荷调节的大离子。然后，该模型在泊松-玻尔兹曼静电学中形式化，通过电荷调节形式一致地包含驻留在被捕获的大离子表面上的分子基团的电荷解离来增强。通过求解线性化 Debye-Hückel 型近似中的基本平衡方程，我们分析了不均匀电解质分布和大离子电荷的显着特征。我们发现大离子的表面电荷不对称性/对称性强烈影响静电势的空间分布。有效筛选长度显示出非单调行为，这是由沐浴外部溶液和控制电荷调节平衡的宏离子有效电荷之间复杂的相互作用引起的。纳米反应器外壳边界处的总压力随着外壳半径和离子散装盐浓度的增加而单调减小。\n\n此外，产生的压力受到纳米反应器的表面电荷密度和受限大离子数量的强烈影响。", "authors": [{"name": "Manit Klawtanong"}, {"name": "Petch Khunpetch"}, {"name": "Huaqiong Li"}, {"name": "Shigeyuki Komura"}], "featured_authors": [{"name": "Manit Klawtanong"}, {"name": "Petch Khunpetch"}, {"name": "Huaqiong Li"}, {"name": "Shigeyuki Komura"}], "author_count": 4}, {"id": "2606.20049", "category": "cond-mat", "title": "Constraint-Limited Tube Orientation of Entangled Polymers in Oscillatory Shear Deformation", "abstract": "We develop a molecularly motivated description of the nonlinear index (NLI) in oscillatory shear deformation of entangled polymers. The central assumption is that the shear component of the tube-orientation tensor cannot grow without bound. Convective constraint release (CCR), chain stretch, and tube dilation progressively reduce the number and lifetime of orientational constraints, but the maximum shear alignment of a tube segment is geometrically limited by $S_{xy}\\leq 1/2$. This motivates a constraint-limited orientation closure in which the NLI first grows approximately with strain amplitude and then approaches the limiting value $\\mathrm{NLI}_{\\max}=3$ asymptotically rather than through an artificial cutoff. The same framework yields a molecular expression for the characteristic half-saturation strain $\\gamma_s$, defined by $\\mathrm{NLI}(\\gamma_s)=3/2$, in terms of the entanglement number, oscillation frequency, and a critical number of remaining orientational constraints. We further derive architecture-dependent expressions for the nonlinear onset strain $\\gamma_c$ for linear, sparsely long-chain-branched, and more regularly branched polymers. The resulting framework provides a compact bridge between Fourier harmonic analysis, CCR-based tube dynamics, and the progressive loss of orientational memory in highly deformed entangled polymer liquids.", "url": "https://arxiv.org/abs/2606.20049", "type": "理论", "summary": "我们开发了缠结聚合物振荡剪切变形中非线性指数（NLI）的分子驱动描述。中心假设是管方向张量的剪切分量不能无限制地增长。对流约束释放 (CCR)、链拉伸和管膨胀逐渐减少方向约束的数量和寿命，但管段的最大剪切对齐在几何上受到 $S_{xy}\\leq 1/2$ 的限制。这激发了约束限制的方向闭合，其中 NLI 首先近似随应变幅度增长，然后渐近地接近极限值 $\\mathrm{NLI}_{\\max}=3$ 而不是通过人为截止。相同的框架产生了特征半饱和应变 $\\gamma_s$ 的分子表达式，由 $\\mathrm{NLI}(\\gamma_s)=3/2$ 定义，根据纠缠数、振荡频率和剩余取向约束的临界数量。我们进一步推导了线性、稀疏长链支化和更规则支化聚合物的非线性起始应变 $\\gamma_c$ 的结构相关表达式。\n\n由此产生的框架在傅立叶谐波分析、基于 CCR 的管动力学和高度变形缠结聚合物液体中方向记忆的逐渐丧失之间提供了一个紧凑的桥梁。", "authors": [{"name": "Dario Nichetti"}, {"name": "Alessio Zaccone"}], "featured_authors": [{"name": "Dario Nichetti"}, {"name": "Alessio Zaccone"}], "author_count": 2}, {"id": "2606.20070", "category": "cond-mat", "title": "\\textit{E.\\ coli} bacterium near corrugated surfaces: near-suface swimming, escape, and hydrodynamic trapping}", "abstract": "Bacteria often swim in complex environments where surfaces are ubiquitous and rarely flat. Surface topography and curvature can strongly affect bacterial motility, with important consequences for surface exploration, adhesion, and biofilm formation. Here, we investigate the swimming of a non-tumbling \\textit{Escherichia coli} bacterium near an undulating no-slip surface using hydrodynamic simulations of a detailed model bacterium. The latter is described by a rigid spherocylindrical cell body and flexible flagella modeled with the Kirchhoff rod theory, while the surrounding fluid is simulated using the method of multi-particle collision dynamics. At low curvatures of the sinusoidal surface modulations, the bacterium exhibits persistent near-surface swimming and clockwise trajectories, consistent with the known behavior near flat no-slip walls. As the curvature increases, bacteria swimming toward a ridge can escape from the surface, which we use to estimate a critical curvature where surface detachment is more likely. At larger curvatures, we find that the surface geometry promotes oscillatory swimming along the groove direction, which reduces escape opportunities and, therefore, enhances bacterial trapping. Indeed, the confinement around the groove reverses the swimming of the bacterium from clockwise to counter-clockwise, as we demonstrate by two minimal models. Thus our work highlights the importance of the three-dimensional surface topography in bacterial surface exploration.", "url": "https://arxiv.org/abs/2606.20070", "type": "理论+数值", "summary": "细菌经常在复杂的环境中游泳，这些环境中的表面无处不在，很少是平坦的。表面形貌和曲率可以强烈影响细菌的运动性，对表面探索、粘附和生物膜形成产生重要影响。在这里，我们使用详细模型细菌的流体动力学模拟来研究非翻滚的大肠杆菌细菌在起伏的无滑表面附近的游泳。后者采用基尔霍夫杆理论建模的刚性球圆柱细胞体和柔性鞭毛来描述，而周围流体则采用多粒子碰撞动力学方法进行模拟。在正弦表面调制的低曲率下，细菌表现出持续的近表面游动和顺时针轨迹，与平坦无滑移壁附近的已知行为一致。随着曲率增加，向脊游动的细菌可以从表面逃逸，我们用它来估计更可能发生表面分离的临界曲率。\n\n在较大的曲率下，我们发现表面几何形状促进沿凹槽方向的振荡游动，这减少了逃逸机会，因此增强了细菌捕获。事实上，凹槽周围的限制使细菌的游动从顺时针方向逆转为逆时针方向，正如我们通过两个最小模型所证明的那样。因此，我们的工作强调了三维表面形貌在细菌表面探索中的重要性。", "authors": [{"name": "Pierre Martin"}, {"name": "Gonçalo C. Antunes"}, {"name": "Holger Stark"}], "featured_authors": [{"name": "Pierre Martin"}, {"name": "Gonçalo C. Antunes"}, {"name": "Holger Stark"}], "author_count": 3}, {"id": "2606.20168", "category": "cond-mat", "title": "Norms, overlaps and Yangian descendants for the Haldane--Shastry spin chain", "abstract": "The Haldane-Shastry spin chain is a prototypical integrable model with long-range interactions, notable for hosting quasiparticles with fractional statistics and serving as a discrete analogue of a conformal field theory. Its remarkable simplicity is closely tied to a full Yangian spin symmetry. While the highest-weight states for this symmetry are known explicitly, a systematic treatment of the descendant states, needed for the computation of various physical quantities, has remained incomplete. In this work, we provide a detailed construction of these descendants in terms of the algebraic Bethe ansatz following recent work of Ferrando et al. In the limit of extreme twist, it includes the Gelfand-Tsetlin basis. As an application, we derive product and determinant formulae for norms and overlaps of these states.", "url": "https://arxiv.org/abs/2606.20168", "type": "理论", "summary": "Haldane-Shastry 自旋链是一种具有长程相互作用的原型可积模型，以具有分数统计的准粒子和作为共形场论的离散模拟而闻名。其非凡的简单性与完整的杨安自旋对称性密切相关。虽然这种对称性的最高权重状态是明确已知的，但计算各种物理量所需的后代状态的系统处理仍然不完整。在这项工作中，我们根据 Ferrando 等人最近的工作，根据代数 Bethe ansatz 提供了这些后代的详细构造。在极端扭曲的极限下，它包括 Gelfand-Tsetlin 基础。作为一个应用，我们推导出这些状态的范数和重叠的乘积和行列式公式。", "authors": [{"name": "Yunfeng Jiang"}, {"name": "Jules Lamers"}, {"name": "Yuan Miao"}], "featured_authors": [{"name": "Yunfeng Jiang"}, {"name": "Jules Lamers"}, {"name": "Yuan Miao"}], "author_count": 3}, {"id": "2606.20182", "category": "cond-mat", "title": "Anomalous Transverse Response in Nodal line Semimetal Mn$_{3}$SnC", "abstract": "The interplay of topological surface states and magnetism gives rise to unconventional transport behaviors such as the anomalous Hall effect (AHE) and anomalous Nernst effect (ANE). Antiperovskites such as Mn$3$SnC, which are nodal-line semimetals and exhibit concurrent antiferromagnetic (AFM) and ferromagnetic (FM) ordering, provide a fertile ground for anomalous transport phenomena. Here, we report that the anomalous transport (AHE and ANE) in this compound is predominantly governed by the intrinsic Berry-curvature effect. We establish a unified relationship between the AHE and ANE using Mott's relation. Electron scattering by both AFM and FM magnons is manifested in the anomalous Nernst signal. The ratio of the anomalous Nernst conductivity to the anomalous Hall conductivity, $|\\alpha^A{xy}|/\\sigma^A_{xy}$, constitutes a sizable fraction of $k_B/e$, indicating a strong Berry-curvature contribution to the ANE.", "url": "https://arxiv.org/abs/2606.20182", "type": "理论", "summary": "拓扑表面态和磁性的相互作用产生了非常规的输运行为，例如反常霍尔效应（AHE）和反常能斯特效应（ANE）。 Mn$3$SnC 等反钙钛矿是节线半金属，同时表现出反铁磁 (AFM) 和铁磁 (FM) 有序性，为异常输运现象提供了肥沃的土壤。在这里，我们报告该化合物中的异常传输（AHE 和 ANE）主要受固有的贝里曲率效应控制。我们使用 Mott 关系在 AHE 和 ANE 之间建立统一的关系。 AFM 和 FM 磁振子的电子散射都体现在反常的能斯特信号中。反常能斯特电导率与反常霍尔电导率的比率 $|\\alpha^A{xy}|/\\sigma^A_{xy}$ 构成 $k_B/e$ 的相当大的一部分，表明贝里曲率对 ANE 的贡献很大。", "authors": [{"name": "Sunil Gangwar"}, {"name": "C. S. Yadav"}], "featured_authors": [{"name": "Sunil Gangwar"}, {"name": "C. S. Yadav"}], "author_count": 2}, {"id": "2606.20190", "category": "cond-mat", "title": "Independent Control of Transport and Order in a Ratcheted Colloidal Suspension", "abstract": "We study directed transport in a two-dimensional suspension of repulsively interacting colloids driven by a stochastic asymmetric piecewise-linear flashing ratchet using large-scale molecular dynamics simulations. The driving frequency and the ratchet asymmetry offer two independent ways of controlling the particle current, but they affect the suspension differently. At fixed asymmetry, the current shows a resonance with ratcheting frequency that is set by the collective relaxation dynamics of the interacting particles. The resulting increase in transport is accompanied by defect-mediated structural changes, showing density-dependent hexatic and solid-like states, with larger currents generally associated with weaker ordering. By contrast, at fixed frequency, changing the ratchet asymmetry mainly alters the strength of the directed bias and can significantly enhance the current while leaving the hexatic order largely unchanged. Near the equilibrium hexatic-melting regime, this makes it possible to generate substantial directed currents without strongly disrupting sixfold orientational order. These results show that frequency tuning couples transport to structural reorganization, whereas asymmetry tuning primarily controls transport leaving the structure largely unaltered, providing distinct and complementary routes for manipulating transport and order in driven colloidal suspensions.", "url": "https://arxiv.org/abs/2606.20190", "type": "理论+数值", "summary": "我们使用大规模分子动力学模拟研究由随机不对称分段线性闪光棘轮驱动的排斥相互作用胶体的二维悬浮液中的定向输运。驱动频率和棘轮不对称性提供了两种独立的控制粒子电流的方法，但它们对悬架的影响不同。在固定的不对称性下，电流显示出与棘轮频率的共振，该频率由相互作用粒子的集体弛豫动力学设定。由此产生的传输增加伴随着缺陷介导的结构变化，显示出密度依赖的六方和类固体状态，较大的电流通常与较弱的有序性相关。相比之下，在固定频率下，改变棘轮不对称性主要改变定向偏压的强度，并且可以显着增强电流，同时使六进制阶数基本不变。在平衡六方熔化状态附近，这使得可以产生大量的定向电流，而不会强烈破坏六方取向顺序。\n\n这些结果表明，频率调谐耦合传输到结构重组，而不对称调谐主要控制传输，使结构基本不变，为操纵驱动胶体悬浮液中的传输和秩序提供独特和互补的途径。", "authors": [{"name": "Sudipta Mandal"}, {"name": "Dipanjan Chakraborty"}, {"name": "Debasish Chaudhuri"}], "featured_authors": [{"name": "Sudipta Mandal"}, {"name": "Dipanjan Chakraborty"}, {"name": "Debasish Chaudhuri"}], "author_count": 3}, {"id": "2606.20253", "category": "cond-mat", "title": "On representation of macroscopic crack in periodic fine-scale discrete mechanical models", "abstract": "In multiscale modeling of heterogeneous softening materials, boundary conditions (BC) in the fine-scale model strongly influence the strain localization pattern and the macroscopic response. For rectilinear models (e.g., squares or cubes), standard Periodic BCs produce artificially ductile behavior with excessive energy dissipation when the localization band inclination does not match the periodicity directions. Recently proposed Tessellation and Percolation-path-aligned BCs promise to address this by adapting the periodicity frame to align with the evolving localization bands. Alternatively, spherical/circular models provide an orientation independent response by design. Unfortunately, the standard Periodic BCs do not allow development of proper localization band crossing spherical model's boundaries. A recently proposed modification addresses this by adding a displacement jump to the spherical periodic BCs. This study evaluates the applicability of these novel BCs to a mesoscale discrete particle model of concrete. Two-dimensional square and circular models under uniaxial tension with different loading directions are analyzed, with the selected approaches extended to three-dimensional cube models. Results show that Percolation-path-aligned BCs exhibit major shortcomings: they can lead to multiple localization bands due to uneven straining of the two boundary sections and their weakly constrained section can be prone to spurious strain localization. In contrast, Tessellation BCs consistently yield a well-defined localization band, whose length is determined solely by the model geometry, making it straightforward to account for in post-processing. Periodic boundary conditions augmented with a displacement jump applied to a circular model sometimes incorrect produce crack patterns similar to those under the standard Periodic BCs.", "url": "https://arxiv.org/abs/2606.20253", "type": "理论+数值", "summary": "在异质软化材料的多尺度建模中，细尺度模型中的边界条件 (BC) 强烈影响应变局部化模式和宏观响应。对于直线模型（例如，正方形或立方体），当定位带倾斜与周期性方向不匹配时，标准周期性 BC 会产生人为的延性行为，并导致过多的能量耗散。最近提出的 Tessellation 和 Percolation-path-aligned BC 有望通过调整周期性框架以与不断发展的定位频带保持一致来解决这个问题。或者，球形/圆形模型通过设计提供与方向无关的响应。不幸的是，标准周期BC不允许开发跨越球形模型边界的适当定位带。最近提出的修改通过向球形周期性 BC 添加位移跳跃来解决此问题。本研究评估了这些新型BC在混凝土中尺度离散颗粒模型中的适用性。\n\n分析了不同加载方向的单轴拉伸下的二维方形和圆形模型，并将所选方法扩展到三维立方体模型。结果表明，渗流路径对齐的BC表现出主要缺点：由于两个边界部分的应变不均匀，它们可能导致多个局部化带，并且其弱约束部分可能容易出现虚假应变局部化。相比之下，Tessellation BC 始终会产生明确定义的定位带，其长度仅由模型几何形状决定，因此在后处理中可以直接考虑。周期性边界条件通过应用于圆形模型的位移跳跃而增强，有时会错误地产生与标准周期性 BC 下的裂纹模式类似的裂纹模式。", "authors": [{"name": "Jan Raisinger"}, {"name": "Jan Eliáš"}], "featured_authors": [{"name": "Jan Raisinger"}, {"name": "Jan Eliáš"}], "author_count": 2}, {"id": "2606.20260", "category": "cond-mat", "title": "Effects of nonlocal interactions on s- and d-wave superconducting correlations in the extended Hubbard model", "abstract": "We investigate the influence of nonlocal interactions on superconducting correlations within the extended Hubbard model. In addition to the on-site Coulomb interaction and nearest-neighbor hopping, we include next-nearest-neighbor hopping together with several physically relevant nonlocal terms, namely nearest-neighbor Coulomb interaction, correlated hopping, exchange interaction, and pair hopping. Using Lanczos exact diagonalization on a $4\\times4$ cluster, supported by projector quantum Monte Carlo simulations for selected parameter regimes, we analyze pairing correlations in both the s- and d-wave channels. We demonstrate that nonlocal interactions exert a highly nontrivial and symmetry-dependent influence on superconducting correlations. While the on-site repulsion in cooperation with next-nearest-neighbor hopping enhances d-wave pairing tendencies, correlated hopping and nearest-neighbor Coulomb interaction strongly promote s-wave correlations, whereas exchange and pair-hopping interactions can efficiently suppress superconductivity beyond relatively small critical strengths. When all nonlocal interactions are considered simultaneously, the resulting phase diagrams reveal a complex interplay and competition between different pairing symmetries. Our results highlight the crucial role of extended interactions in shaping the pairing landscape of strongly correlated systems and demonstrate that a comprehensive treatment beyond the minimal Hubbard model is essential for a realistic description of unconventional superconductivity.", "url": "https://arxiv.org/abs/2606.20260", "type": "理论+数值", "summary": "我们研究了扩展哈伯德模型中非局域相互作用对超导相关性的影响。除了现场库仑相互作用和最近邻跳跃之外，我们还包括次最近邻跳跃以及几个物理相关的非局部术语，即最近邻库仑相互作用、相关跳跃、交换相互作用和对跳跃。在 $4\\times4$ 簇上使用 Lanczos 精确对角化，并由投影仪量子蒙特卡罗模拟对选定的参数范围进行支持，我们分析了 s 波通道和 d 波通道中的配对相关性。我们证明非局域相互作用对超导相关性产生高度重要且依赖于对称性的影响。虽然现场排斥与次近邻跳跃的配合增强了 d 波配对趋势，但相关跳跃和最近邻库仑相互作用强烈促进了 s 波相关性，而交换和配对跳跃相互作用可以有效地抑制超导性，使其超出相对较小的临界强度。\n\n当同时考虑所有非局域相互作用时，所得相图揭示了不同配对对称性之间复杂的相互作用和竞争。我们的结果强调了扩展相互作用在塑造强相关系统的配对景观中的关键作用，并证明超越最小哈伯德模型的综合处理对于非常规超导性的现实描述至关重要。", "authors": [{"name": "Pavol Farkasovsky"}], "featured_authors": [{"name": "Pavol Farkasovsky"}], "author_count": 1}, {"id": "2606.20261", "category": "cond-mat", "title": "Activity driven buckling and pattern formation in shells of oriented solids", "abstract": "We investigate shells of active oriented solid, materials in which orientationally ordered active particles are embedded in a deformable elastic surface. Focusing on cylindrical geometries, we show that active stresses drive a new class of buckling instabilities and nonlinear patterns absent in passive shells. Linear stability analysis reveals that the unstable buckling mode is selected by the nematic orientation and activity sign, leading to axial, circumferential, and helical deformations. Remarkably, circumferential modes become unstable at arbitrarily small activity due to the absence of stretching costs. The results of the linear stability analysis are corroborated by full nonlinear simulations, which further uncover steady diamond shaped patterns and persistent dynamical states including oscillations, traveling domain walls, and propagating waves. Our results establish fundamental buckling modes and emergent patterns in shells of active oriented solid materials, with potential relevance to active biological tissues and engineered responsive materials.", "url": "https://arxiv.org/abs/2606.20261", "type": "数值", "summary": "我们研究了活性定向固体材料的壳，其中定向有序的活性颗粒嵌入可变形的弹性表面中。重点关注圆柱形几何形状，我们表明主动应力会导致被动壳中不存在的新型屈曲不稳定性和非线性模式。线性稳定性分析表明，不稳定屈曲模式是由向列取向和活动符号选择的，导致轴向、周向和螺旋变形。值得注意的是，由于不存在拉伸成本，圆周模式在任意小的活动下变得不稳定。线性稳定性分析的结果得到了完全非线性模拟的证实，进一步揭示了稳定的菱形图案和持续的动态状态，包括振荡、行进畴壁和传播波。我们的结果建立了活性定向固体材料壳的基本屈曲模式和涌现模式，与活性生物组织和工程响应材料具有潜在相关性。", "authors": [{"name": "Niels de Graaf Sousa"}, {"name": "Varun Venkatesh"}, {"name": "Amin Doostmohammadi"}], "featured_authors": [{"name": "Niels de Graaf Sousa"}, {"name": "Varun Venkatesh"}, {"name": "Amin Doostmohammadi"}], "author_count": 3}, {"id": "2606.20339", "category": "cond-mat", "title": "Diagnosing the origin of quantum oscillation beating in graphene", "abstract": "Magnetic quantum oscillations are usually periodic in inverse magnetic field, and their amplitude can show beating when two nearby frequencies interfere. In graphene-based hexagonal systems, such beating can arise from strain-induced pseudomagnetic fields, unequal valley populations, valley-dependent energy shifts, spin-orbit coupling-induced band splitting, or Kekulé distortions. Here, we show that the carrier density and magnetic field dependence of the beating nodes can distinguish these mechanisms. Starting from Onsager's quantization relation, we derive scaling relations for the critical carrier density $N_c$ for the beating nodes as a function of critical magnetic field $B_c$. A pseudomagnetic field gives $N_c\\propto B_c^2$, whereas a density-independent valley imbalance gives $N_c\\propto B_c$. A constant Dirac-band energy splitting by Zeeman-like spin-orbit coupling also gives quadratic field scaling, but with a different node sequence: $N_{c,j}\\propto(2j+1)B_{c,j}^2$ for a pseudomagnetic field and $N_{c,j}\\propto(2j+1)^2B_{c,j}^2$ for energy splitting, where $j$ labels the beating node indices. These results provide quantitative constraints on different microscopic origins of valley- and spin-dependent band splittings in graphene-based systems.", "url": "https://arxiv.org/abs/2606.20339", "type": "理论", "summary": "磁量子振荡在逆磁场中通常是周期性的，当两个附近的频率发生干扰时，它们的振幅会出现跳动。在基于石墨烯的六边形系统中，这种跳动可能是由应变引起的赝磁场、不等的谷分布、谷相关的能量转移、自旋轨道耦合引起的能带分裂或凯库勒畸变引起的。在这里，我们证明跳动节点的载流子密度和磁场依赖性可以区分这些机制。从 Onsager 的量化关系开始，我们推导出跳动节点的临界载流子密度 $N_c$ 与临界磁场 $B_c$ 的函数关系。赝磁场给出 $N_c\\propto B_c^2$，而与密度无关的谷不平衡给出 $N_c\\propto B_c$。通过类似塞曼自旋轨道耦合的恒定狄拉克带能量分裂也给出了二次场缩放，但具有不同的节点序列：$N_{c,j}\\propto(2j+1)B_{c,j}^2$用于赝磁场，$N_{c,j}\\propto(2j+1)^2B_{c,j}^2$用于能量分裂，其中$j$标记跳动节点索引。\n\n这些结果为基于石墨烯的系统中谷和自旋相关的能带分裂的不同微观起源提供了定量约束。", "authors": [{"name": "Akash Adhikary"}, {"name": "Sunit Das"}, {"name": "Divya Sahani"}, {"name": "Aveek Bid"}, {"name": "Amit Agarwal"}], "featured_authors": [{"name": "Akash Adhikary"}, {"name": "Sunit Das"}, {"name": "Divya Sahani"}, {"name": "Aveek Bid"}, {"name": "Amit Agarwal"}], "author_count": 5}, {"id": "2606.20377", "category": "cond-mat", "title": "Charge imprinting biases topology of correlated insulator in hBN-aligned rhombohedral multilayer graphene", "abstract": "Rhombohedral multilayer graphene aligned with hexagonal boron nitride (RMG-hBN) hosts correlated Chern phases, but the microscopic role of hBN stacking remains unclear, especially when the active carriers are displaced away from the moiré interface. Using Hartree-Fock calculations over layer numbers, twist angles, displacement fields, fillings, and hBN alignments, we show that correlated insulators are most robust at small twist angles and intermediate layer number ($N\\simeq 6$), where bandwidth suppression is balanced by layer delocalization of the wavefunctions of the active carriers. Under moiré-distant conditions at filling $\\nu=1$, the topology of the insulating state is strongly biased by charge imprinting: the hBN alignment shapes the occupied valence-band charge texture near the interface via moiré potential, which acts through long-range Coulomb interactions as a remote electrostatic template for doped conduction electrons. Depending on the alignment, this template favors either triangular charge localization associated with trivial insulators or honeycomb-like charge networks compatible with Chern insulators. Our results identify valence-band charge textures as a microscopic route by which a remote moiré interface controls correlated topology in multilayer graphene.", "url": "https://arxiv.org/abs/2606.20377", "type": "数值", "summary": "与六方氮化硼（RMG-hBN）排列的菱形多层石墨烯具有相关的陈相，但六方氮化硼堆叠的微观作用仍不清楚，特别是当活性载流子远离莫尔界面时。使用 Hartree-Fock 对层数、扭转角、位移场、填充和六方氮化硼排列的计算，我们表明相关绝缘体在小扭转角和中间层数 ($N\\simeq 6$) 下最稳健，其中带宽抑制通过有源载流子波函数的层离域来平衡。在填充 $\\nu=1$ 的莫尔远距条件下，绝缘态的拓扑结构受到电荷印记的强烈偏置：六方氮化硼排列通过莫尔势在界面附近形成占据的价带电荷纹理，莫尔势通过长程库仑相互作用充当掺杂传导电子的远程静电模板。根据对齐方式，该模板支持与普通绝缘体相关的三角形电荷定位或与陈绝缘体兼容的蜂窝状电荷网络。\n\n我们的结果将价带电荷纹理确定为远程莫尔界面控制多层石墨烯中相关拓扑的微观途径。", "authors": [{"name": "Lei Qiao"}, {"name": "Xin Lu"}, {"name": "Fu-Chun Zhang"}, {"name": "Jianpeng Liu"}], "featured_authors": [{"name": "Lei Qiao"}, {"name": "Xin Lu"}, {"name": "Fu-Chun Zhang"}, {"name": "Jianpeng Liu"}], "author_count": 4}, {"id": "2606.20445", "category": "cond-mat", "title": "Space-time duality approach to (inhomogeneous) integrable quenches", "abstract": "Characterising the universal aspects of non-equilibrium quantum many-body dynamics is one of the key goals of this century's physics research. Progress, however, is hindered by the lack of general theoretical frameworks for studying interacting quantum matter far from equilibrium. A recent breakthrough has been the realization that several key non-equilibrium quantities, such as the rate of growth of entanglement or the fluctuations of conserved charges within finite subsystems, can be related to equilibrium properties through a space-time duality that effectively exchanges the roles of space and time. This observation effectively enables the study of non-equilibrium phenomena using tools and concepts borrowed from equilibrium statistical mechanics and thermodynamics. A first proof of principle of this framework, dubbed space-time duality approach (SDA), was provided by interacting integrable systems, where thermodynamic properties can often be characterized exactly, while dynamical quantities typically remain beyond analytical reach. Subsequent developments, however, revealed that the SDA suffered from an intrinsic ambiguity, restricting its applicability to homogeneous quenches and to charge fluctuations arising from symmetric initial states. Here we resolve this ambiguity from first principles and derive closed-form predictions for entanglement growth and charge fluctuations after general quantum quenches. We benchmark our results against the exact analytical solution of the Rule 54 quantum cellular automaton and extensive TEBD simulations of the XXZ chain. Moreover we show that, when specialised to the entanglement entropy, our framework naturally reproduces the predictions of the quasiparticle picture.", "url": "https://arxiv.org/abs/2606.20445", "type": "理论+数值", "summary": "表征非平衡量子多体动力学的普遍方面是本世纪物理学研究的关键目标之一。然而，由于缺乏研究远离平衡态的相互作用量子物质的通用理论框架，进展受到阻碍。最近的一项突破是认识到几个关键的非平衡量，例如纠缠的增长率或有限子系统内守恒电荷的涨落，可以通过有效交换空间和时间的角色的时空二元性与平衡性质相关。这一观察结果有效地使得利用从平衡统计力学和热力学借用的工具和概念来研究非平衡现象成为可能。该框架的第一个原理证明被称为时空对偶方法（SDA），是由相互作用的可积系统提供的，其中热力学性质通常可以精确表征，而动力学量通常仍然超出分析范围。\n\n然而，随后的发展表明，SDA 存在固有的模糊性，限制了其对均匀淬火和对称初始态引起的电荷波动的适用性。在这里，我们从第一原理解决了这种模糊性，并得出了一般量子淬灭后纠缠增长和电荷波动的封闭式预测。我们将我们的结果与规则 54 量子细胞自动机的精确分析解决方案和 XXZ 链的广泛 TEBD 模拟进行基准比较。此外，我们表明，当专门研究纠缠熵时，我们的框架自然地再现了准粒子图像的预测。", "authors": [{"name": "Riccardo Travaglino"}, {"name": "Pasquale Calabrese"}, {"name": "Katja Klobas"}, {"name": "Bruno Bertini"}], "featured_authors": [{"name": "Riccardo Travaglino"}, {"name": "Pasquale Calabrese"}, {"name": "Katja Klobas"}, {"name": "Bruno Bertini"}], "author_count": 4}, {"id": "2606.20460", "category": "cond-mat", "title": "Scaling, fractal dynamics, and critical exponents in the equilibrium phase transition", "abstract": "Statistical methods are essential for understanding thermodynamic systems with many degrees of freedom. For systems in equilibrium, a very useful method is that of correlation functions, which establish a correlation between a field phi(x), which depends on the spatial position x, and the same field evaluated at another position, phi(x0). Fisher [Journal of Mathematical Physics 5, 944322 (1964)] introduced the autocorrelation function for fluctuations of the order parameter, which has been an important mathematical tool for understanding second-order phase transitions in equilibrium. However, his analysis is restricted to a Euclidean space of dimension d, and an exponent eta is introduced to correct the spatial behavior of the correlation function at T = Tc. In a recent work, Lima et al. [Phys. Rev. E 110, L062107 (2024)] demonstrated that a modern fractional differential analysis is necessary for a complete description of the correlation function at Tc. In this study, we highlight the deep connection among scaling behavior, critical exponents, and fractal geometry. Our results provide a unified geometric interpretation of critical exponents and fractal dimensions, broadly applicable to thermodynamic phase transitions. However, the approach does not apply to topological phase transitions, which lack local order parameters and the associated scale-invariant fractal geometry. We verify its predictions for several cornerstone thermodynamic models: the Ising, Potts, XY, and Heisenberg systems.", "url": "https://arxiv.org/abs/2606.20460", "type": "理论+数值", "summary": "统计方法对于理解多自由度热力学系统至关重要。对于平衡系统，一种非常有用的方法是相关函数，它在取决于空间位置 x 的场 phi(x) 与在另一个位置 phi(x0) 处评估的同一场之间建立相关性。 Fisher [数学物理学杂志 5, 944322 (1964)] 引入了阶次参数涨落的自相关函数，它是理解平衡状态下二阶相变的重要数学工具。然而，他的分析仅限于 d 维的欧几里得空间，并引入指数 eta 来校正相关函数在 T = Tc 时的空间行为。在最近的一项工作中，利马等人。 [物理。 Rev. E 110, L062107 (2024)] 证明，现代分数微分分析对于完整描述 Tc 处的相关函数是必要的。在这项研究中，我们强调了缩放行为、临界指数和分形几何之间的深层联系。\n\n我们的结果提供了临界指数和分形维数的统一几何解释，广泛适用于热力学相变。然而，该方法不适用于拓扑相变，因为拓扑相变缺乏局部有序参数和相关的尺度不变分形几何。我们验证了它对几个基础热力学模型的预测：伊辛、波茨、XY 和海森堡系统。", "authors": [{"name": "Adauto F. Souza"}, {"name": "Henrique A Lima"}, {"name": "Anderson L. R. Barbosa"}, {"name": "Fernando A. Oliveira"}], "featured_authors": [{"name": "Adauto F. Souza"}, {"name": "Henrique A Lima"}, {"name": "Anderson L. R. Barbosa"}, {"name": "Fernando A. Oliveira"}], "author_count": 4}, {"id": "2606.20462", "category": "cond-mat", "title": "Polymer-polymer interdiffusion: effects of entanglements and a polymeric source", "abstract": "Many industrial applications and biological scenarios involve the interdiffusion of two polymeric species. Motivated by biological subcellular source-driven processes, we study polymer-polymer interdiffusion problems in the absence or the presence of a polymeric source, for both unentangled and entangled scenarios. Utilizing a two-fluid formalism, we arrive at scaling relations, self-similar reductions, and analytical solutions, which are confirmed with one- and two-dimensional numerical simulations. The introduction of a source term breaks the self-similar structure, modifying the boundary conditions and the domain of integration. Nevertheless, we show that the front characteristics of the diffusing droplet exhibit similar spatial structures as in the absence of a source. Our results allow deeper understanding of polymer-polymer interdiffusion and nonlinear transport, especially in the presence of a source.", "url": "https://arxiv.org/abs/2606.20462", "type": "理论+数值", "summary": "许多工业应用和生物场景涉及两种聚合物物质的相互扩散。在生物亚细胞源驱动过程的推动下，我们研究了在不存在或存在聚合物源的情况下，对于非缠结和缠结情况下的聚合物-聚合物相互扩散问题。利用二流体形式主义，我们得到了标度关系、自相似约简和解析解，并通过一维和二维数值模拟得到了证实。源项的引入打破了自相似结构，修改了边界条件和积分域。尽管如此，我们表明扩散液滴的前部特征表现出与没有源时相似的空间结构。我们的结果使人们能够更深入地了解聚合物-聚合物相互扩散和非线性传输，特别是在存在源的情况下。", "authors": [{"name": "Avraham Moriel"}, {"name": "Howard A. Stone"}], "featured_authors": [{"name": "Avraham Moriel"}, {"name": "Howard A. Stone"}], "author_count": 2}, {"id": "2606.20466", "category": "cond-mat", "title": "Correlated Mott semi-metal in the topological heavy fermion model", "abstract": "The topological heavy-fermion model provides a minimal framework for describing the coexistence of localized moments and itinerant Dirac electrons in magic-angle twisted bilayer graphene (MATBG). Several analytical and numerical methods have been applied to this model; however, whether they provide a realistic description of MATBG remains incompletely understood. In this work, we develop an Hubbard operator approach that incorporates non-local correlations beyond the single-site limit. We benchmark the approximate calculations against numerically exact determinant quantum Monte Carlo simulations of a lattice-regularized model. We show that commonly used local approximations, such as Hubbard-I, fail to capture the coupling between localized and itinerant degrees of freedom, leading to incorrect spectral properties in the local-moment regime. In contrast, the Hubbard operator method provides a controlled description of both correlation functions and spectral features over a regime of parameters, in good agreement with exact numerical methods.", "url": "https://arxiv.org/abs/2606.20466", "type": "理论+数值", "summary": "拓扑重费米子模型提供了一个最小框架，用于描述魔角扭曲双层石墨烯（MATBG）中局域矩和流动狄拉克电子的共存。多种分析和数值方法已应用于该模型；然而，它们是否提供了 MATBG 的真实描述仍不完全清楚。在这项工作中，我们开发了一种哈伯德算子方法，该方法结合了超出单站点限制的非局部相关性。我们将近似计算与晶格正则化模型的数值精确行列式量子蒙特卡罗模拟进行了基准测试。我们表明，常用的局部近似（例如 Hubbard-I）无法捕获局部自由度和流动自由度之间的耦合，导致局部矩状态下的谱特性不正确。相比之下，哈伯德算子方法提供了参数范围内相关函数和光谱特征的受控描述，与精确数值方法非常一致。", "authors": [{"name": "Emile Pangburn"}, {"name": "Igor de Melo Froldi"}, {"name": "Anurag Banerjee"}], "featured_authors": [{"name": "Emile Pangburn"}, {"name": "Igor de Melo Froldi"}, {"name": "Anurag Banerjee"}], "author_count": 3}, {"id": "2606.20522", "category": "cond-mat", "title": "Transfer-matrix functions for algebraically decaying interactions in variational infinite matrix product states", "abstract": "Variational infinite matrix product state (iMPS) calculations usually make Hamiltonians with algebraically decaying interactions compatible with standard MPO algorithms by first replacing the target Hamiltonian with a finite-pole sum-of-exponentials surrogate, thereby introducing a Hamiltonian-representation residual. We formulate the fixed-$D$ variational energy without introducing such a surrogate. For a fixed finite-$D$ MPS, the algebraic tail can be summed directly through the connected transfer matrix: the tail $e^{\\mathrm{i} Qr}/r^\\alpha$ is represented by the matrix function $F_{\\alpha,Q}(\\widetilde{T}_A)$, with $F_{\\alpha,Q}(z)=\\operatorname{Li}_\\alpha(e^{\\mathrm{i} Q}\\,z)/z$. We evaluate the resulting matrix-function action using a Krylov method and obtain stable gradients by combining a Fréchet adjoint with implicit fixed-point differentiation. Benchmarks on long-range free fermions and the inverse-square Heisenberg family, including the Haldane--Shastry point, validate the transfer-matrix-function formulation. A long-range Ising-chain calculation illustrates a practical consequence of avoiding a finite-pole Hamiltonian representation. At a fixed, independently known critical field, finite-pole surrogate Hamiltonians can bias a critical diagnostic away from criticality, whereas the matrix-function calculation retains the expected critical signatures of the target algebraic Hamiltonian.", "url": "https://arxiv.org/abs/2606.20522", "type": "理论+数值", "summary": "变分无限矩阵乘积状态 (iMPS) 计算通常通过首先用有限极点指数和代理项替换目标哈密顿量，从而引入哈密顿表示残差，从而使具有代数衰减相互作用的哈密顿量与标准 MPO 算法兼容。我们在不引入此类替代项的情况下制定了固定 $D$ 变分能量。对于固定的有限 $D$ MPS，代数尾部可以直接通过连接的传输矩阵求和：尾部 $e^{\\mathrm{i} Qr}/r^\\alpha$ 由矩阵函数 $F_{\\alpha,Q}(\\widetilde{T}_A)$ 表示，其中 $F_{\\alpha,Q}(z)=\\operatorname{Li}_\\alpha(e^{\\mathrm{i} Q}\\,z)/z$。我们使用 Krylov 方法评估所得的矩阵函数作用，并通过将 Fréchet 伴随与隐式定点微分相结合来获得稳定的梯度。远程自由费米子和平方反比海森堡族（包括 Haldane-Shastry 点）的基准验证了传递矩阵函数公式。长程伊辛链计算说明了避免有限极点哈密顿表示的实际结果。\n\n在固定的、独立已知的临界场处，有限极点代理哈密顿量可以使关键诊断偏离临界性，而矩阵函数计算保留目标代数哈密顿量的预期关键特征。", "authors": [{"name": "Qi Yang"}], "featured_authors": [{"name": "Qi Yang"}], "author_count": 1}, {"id": "2606.20552", "category": "cond-mat", "title": "On the Renormalization Group Flow of Active Flocks", "abstract": "In this paper, we study the statistical field-theoretic renormalization of active flocks via the MSRDJ action formulation for stochastic systems, focusing on the Toner-Tu theory of `Malthusian flocks', or polar-ordered, momentum non-conserving active fluids where relaxation times for density fluctuations are so short that they can be eliminated as a hydrodynamic variable. Working in the limit of isotropic diffusion in two spatial dimensions, we compute the renormalization of the couplings and their anomalous dimensions to all orders, facilitated by a non-linear realization of a generalized \\textit{Galileon} symmetry and its associated Ward identities. We find a range of behavior depending on the parameters of the theory. If $\\kappa$ is the diffusion coefficient and $\\Delta$ is the variance of the noise, we find a line of fixed points and a marginal vertex instability at $\\Delta/\\kappa = 2\\pi$. This instability separates Gaussian, and strongly interacting, symmetry-protected gapless phases, realizing non-equilibrium critical behavior beyond conventional Wilson--Fisher criticality. The existence of gapless excitations in both phases can be traced to the soft (Adler zero) theorems associated with the generalized Galileon symmetry, and implies the persistence of long range order when $\\Delta/\\kappa$ is below the critical value. We revisit and contextualize various claims and counter-claims in the literature in light of our findings, and discuss extensions of our analysis to anisotropic diffusion, and towards flocks where density fluctuations are reintroduced.", "url": "https://arxiv.org/abs/2606.20552", "type": "理论", "summary": "在本文中，我们通过随机系统的 MSRDJ 作用公式研究了活性团簇的统计场论重正化，重点关注“马尔萨斯团簇”的 Toner-Tu 理论，或极性有序的动量非守恒活性流体，其中密度涨落的弛豫时间非常短，以至于可以将其作为流体动力学变量消除。在二维空间维度各向同性扩散的极限下，我们计算耦合的重正化及其对所有阶的反常维度，这通过广义 \\textit{Galileon} 对称性及其相关 Ward 恒等式的非线性实现来促进。我们发现一系列取决于理论参数的行为。如果 $\\kappa$ 是扩散系数，$\\Delta$ 是噪声方差，我们会在 $\\Delta/\\kappa = 2\\pi$ 处找到一条固定点线和边缘顶点不稳定性。这种不稳定性将高斯、强相互作用、对称保护的无间隙相分开，实现了超越传统威尔逊-费舍尔临界性的非平衡临界行为。\n\n两个相位中无间隙激励的存在可以追溯到与广义伽利略对称性相关的软（阿德勒零）定理，并且意味着当 $\\Delta/\\kappa$ 低于临界值时长程有序的持续存在。根据我们的发现，我们重新审视文献中的各种主张和反主张，并对其进行背景分析，并讨论将我们的分析扩展到各向异性扩散，以及重新引入密度波动的群体。", "authors": [{"name": "Kevin T. Grosvenor"}, {"name": "Subodh P. Patil"}], "featured_authors": [{"name": "Kevin T. Grosvenor"}, {"name": "Subodh P. Patil"}], "author_count": 2}, {"id": "2606.19420", "category": "hep-th", "title": "Bootstrapping Pion Form Factors at Large $N$", "abstract": "We initiate a bootstrap study of pion form factors in large $N$ QCD. We consider the mixed system of the vector-current two-point function, the pion vector form factor, and the pion scattering amplitude in the chiral limit. At large $N$ these observables are meromorphic, with spectral data constrained by unitarity, crossing symmetry, and Regge boundedness. We obtain bounds of two kinds. The first are rigorous and universal: from analyticity, unitarity and the asymptotic Brodsky-Farrar scaling, we constrain low-energy form-factor coefficients. The second are more phenomenological, of the Shifman-Vainshtein-Zakharov type: feeding in the perturbative ultraviolet behavior at a finite scale lets us bound the pion decay constant, convert a large $N$ lattice measurement into a lower bound on the scale at which asymptotic freedom sets in, and constrain the pion charge radius. Combining these inputs, the space of allowed chiral Lagrangians shrinks toward the region where large $N$ QCD is expected to sit. Our results illustrate how local gauge-invariant probes provide a canonical bridge between the hadronic bootstrap and the microscopic QCD Lagrangian.", "url": "https://arxiv.org/abs/2606.19420", "type": "理论", "summary": "我们对大型 $N$ QCD 中的 pion 形状因子进行了引导研究。我们考虑矢量-电流两点函数、π 介子矢量形状因子和手性极限下的 π 介子散射幅度的混合系统。总的来说，$N$ 这些可观测量是亚纯的，光谱数据受到幺正性、交叉对称性和 Regge 有界性的约束。我们获得两种界限。第一个是严格和普遍的：从解析性、幺正性和渐近布罗德斯基-法拉标度，我们限制低能量形状因子系数。第二个更加现象学，属于 Shifman-Vainshtein-Zakharov 类型：在有限尺度上输入微扰紫外线行为，让我们可以限制 π 介子衰变常数，将大的 $N$ 晶格测量转换为渐近自由度出现的尺度下限，并限制介子电荷半径。结合这些输入，允许的手性拉格朗日量的空间缩小到预计大型 $N$ QCD 所在的区域。我们的结果说明了局部规范不变探针如何在强子自举和微观 QCD 拉格朗日之间提供规范的桥梁。", "authors": [{"name": "Jan Albert"}, {"name": "Dilara Kosva"}, {"name": "Leonardo Rastelli"}], "featured_authors": [{"name": "Jan Albert"}, {"name": "Dilara Kosva"}, {"name": "Leonardo Rastelli"}], "author_count": 3}, {"id": "2606.19423", "category": "hep-th", "title": "Calabi-Yau Orientifold Hypersurfaces and their F-theory Uplifts", "abstract": "We present an algorithm that constructs Calabi-Yau threefold orientifolds and their $F$-theory uplifts to elliptically-fibered Calabi-Yau fourfolds, embedded in toric varieties at codimension one and two respectively. The resulting Calabi-Yau fourfolds arise from triangulations of $6d$ reflexive polytopes -- which our method constructs from orientifold data -- and are smooth away from isolated terminal singularities. For many of our fourfolds, the construction of the mirror manifold is immediate, enabling the computation of fourfold periods, and thus the seven-brane superpotential. We present multiple examples that demonstrate these capabilities. Our algorithms work with $\\mathtt{CYTools}$ and are available through a GitHub repository.", "url": "https://arxiv.org/abs/2606.19423", "type": "理论", "summary": "我们提出了一种构造 Calabi-Yau 三重东方折叠的算法，并将其 $F$ 理论提升为椭圆纤维 Calabi-Yau 四折叠，分别嵌入在余维一和二维的复曲面簇中。由此产生的 Calabi-Yau 四重体由 $6d$ 自反多面体的三角剖分产生——我们的方法从东方数据构建——并且平滑地远离孤立的终端奇点。对于我们的许多四重体来说，镜像流形的构造是立即的，使得能够计算四重体周期，从而计算七膜超势。我们提供了多个示例来展示这些功能。我们的算法与 $\\mathtt{CYTools}$ 一起使用，并且可以通过 GitHub 存储库获取。", "authors": [{"name": "Bjoern Hassfeld"}, {"name": "Jakob Moritz"}], "featured_authors": [{"name": "Bjoern Hassfeld"}, {"name": "Jakob Moritz"}], "author_count": 2}, {"id": "2606.19440", "category": "hep-th", "title": "Moduli Stabilisation for ADD and the Dark Dimension Scenario", "abstract": "We provide a moduli stabilisation mechanism for realising anisotropic string compactifications with one or two large extra dimensions, corresponding to the ADD and Dark Dimension scenarios. This is achieved within the type IIB Large Volume Scenario, where an exponentially large Calabi-Yau volume in string units can naturally generate a parametrically low Kaluza-Klein scale. Anisotropy is realised by considering a Calabi-Yau threefold which is a K3 fibration over a $\\mathbb{P}^1$ base. The volume of the 4D K3 fibre is stabilised at relatively small values by perturbative corrections to the effective action, in particular string loops and higher-derivative effects, leaving an exponentially large volume of the 2D $\\mathbb{P}^1$ base. We argue that complex structure moduli stabilisation can dynamically deform the $\\mathbb{P}^1$ base, corresponding to a Tyurin degeneration limit where the internal geometry effectively develops a single large 1D cycle. Within a unified description, the ADD case is instead recovered as a symmetric alternative limit. The potential can feature either a dS vacuum or a quintessence runaway, although in both cases some degree of tuning is required to match the observed cosmological constant scale. We also present an explicit Calabi-Yau orientifold example with consistent brane setup, tadpole cancellation and moduli stabilisation. We analyse the resulting moduli spectrum and associated phenomenological constraints, including supersymmetry breaking, cosmological moduli overproduction and fifth force bounds.", "url": "https://arxiv.org/abs/2606.19440", "type": "理论", "summary": "我们提供了一种模稳定机制，用于实现具有一个或两个大额外维度的各向异性弦压缩，对应于 ADD 和暗维度场景。这是在 IIB 型大体积场景中实现的，其中以弦为单位的指数级大 Calabi-Yau 体积可以自然地生成参数低的 Kaluza-Klein 尺度。各向异性是通过考虑 Calabi-Yau 三重来实现的，它是 $\\mathbb{P}^1$ 基上的 K3 纤维。通过对有效作用（特别是弦环和高导数效应）的扰动校正，4D K3 纤维的体积稳定在相对较小的值，从而留下指数级大的 2D $\\mathbb{P}^1$ 基体体积。我们认为复杂的结构模量稳定性可以动态地使 $\\mathbb{P}^1$ 基底变形，这对应于内部几何结构有效地形成单个大一维循环的 Tyurin 退化极限。在统一描述中，ADD 情况被恢复为对称替代极限。\n\n势能具有 dS 真空或精髓失控的特征，尽管在这两种情况下都需要一定程度的调整以匹配观测到的宇宙常数尺度。我们还提出了一个明确的 Calabi-Yau orientifold 示例，具有一致的膜设置、蝌蚪消除和模量稳定。我们分析了由此产生的模量谱和相关的唯象约束，包括超对称破缺、宇宙模量过剩和第五力界。", "authors": [{"name": "Andreas P. Braun"}, {"name": "Michele Cicoli"}, {"name": "Riccardo Milioli"}, {"name": "Roberto Valandro"}], "featured_authors": [{"name": "Andreas P. Braun"}, {"name": "Michele Cicoli"}, {"name": "Riccardo Milioli"}, {"name": "Roberto Valandro"}], "author_count": 4}, {"id": "2606.19467", "category": "hep-th", "title": "Membrane instantons and non-perturbative effects in $\\mathrm{AdS}_{4}/\\mathrm{CFT}_{3}$", "abstract": "We study Euclidean M2-brane instantons in Freund-Rubin backgrounds $\\mathrm{AdS}_{4}\\times \\mathrm{Y}_7$. For a seven-dimensional weak $G_{2}$ manifold $\\mathrm{Y}_7$, we show that the BPS condition for an M2-brane wrapping a three-cycle $\\Sigma\\subset \\mathrm{Y}_7$ is equivalent to the associativity condition with respect to the nearly parallel $G_{2}$-structure. When $\\mathrm{Y}_7$ is Sasaki-Einstein, we identify a special class of BPS M2-branes that preserve both real internal Killing spinors and correspond to invariant three-dimensional submanifolds inheriting a Sasakian structure. We analyse the quadratic fluctuations around BPS M2-brane instantons in these backgrounds. For the special class of M2-branes in Sasaki-Einstein manifolds, the fluctuation problem reduces to transversely elliptic complexes, and the one-loop partition function can be expressed in terms of the corresponding equivariant indices. We then apply the index formula for the one-loop partition function to invariant M2-branes in $S^{7}/\\mathbb{Z}_{k}$, recovering the known result for the $S^3/\\mathbb{Z}_k$ instantons and discussing more general invariant BPS cycles. As a further application, we consider M2-brane instantons with $S^3$-quotient worldvolumes in the $(p,q)$-model geometry.", "url": "https://arxiv.org/abs/2606.19467", "type": "理论", "summary": "我们研究了 Freund-Rubin 背景 $\\mathrm{AdS}_{4}\\times \\mathrm{Y}_7$ 中的欧几里得 M2 膜瞬时子。对于七维弱$G_{2}$流形$\\mathrm{Y}_7$，我们证明了包裹三周期$\\Sigma\\subset \\mathrm{Y}_7$的M2膜的BPS条件等价于几乎平行的$G_{2}$结构的结合性条件。当 $\\mathrm{Y}_7$ 是 Sasaki-Einstein 时，我们识别出一类特殊的 BPS M2 膜，它保留了真实的内部 Killing 旋量，并对应于继承 Sasaki 结构的不变三维子流形。我们分析了这些背景下 BPS M2 膜瞬时子周围的二次波动。对于Sasaki-Einstein流形中的一类特殊的M2膜，涨落问题简化为横向椭圆复形，并且单环配分函数可以用相应的等变指数来表示。然后，我们将单循环配分函数的索引公式应用于 $S^{7}/\\mathbb{Z}_{k}$ 中的不变 M2 膜，恢复 $S^3/\\mathbb{Z}_k$ 瞬子的已知结果并讨论更一般的不变 BPS 循环。\n\n作为进一步的应用，我们考虑 $(p,q)$ 模型几何中具有 $S^3$ 商世界体积的 M2 膜瞬子。", "authors": [{"name": "Stefan A. Kurlyand"}], "featured_authors": [{"name": "Stefan A. Kurlyand"}], "author_count": 1}, {"id": "2606.19479", "category": "hep-th", "title": "Generating Function of single-centered Black Hole Index in CHL Models", "abstract": "We present the construction of the generating function of single-centered black hole index in general $\\mathbb{Z}_N$ CHL models. This is done by subtracting from the index of quarter BPS dyons, described by a meromorphic Siegel modular form, the generating function for the index of two-centered black holes. We use black hole bound state metamorphosis in CHL models for the construction of the generating function of two-centered black hole index. We prove the convergence of the generating function for the cases $N=2,3$.", "url": "https://arxiv.org/abs/2606.19479", "type": "理论", "summary": "我们提出了一般 $\\mathbb{Z}_N$ CHL 模型中单中心黑洞指数生成函数的构造。这是通过从亚纯西格尔模形式描述的四分之一 BPS 达子的指数中减去双中心黑洞指数的生成函数来完成的。我们利用CHL模型中的黑洞束缚态变态来构造二中心黑洞指数的生成函数。我们证明了 $N=2,3$ 情况下生成函数的收敛性。", "authors": [{"name": "Ranveer Kumar Singh"}], "featured_authors": [{"name": "Ranveer Kumar Singh"}], "author_count": 1}, {"id": "2606.19678", "category": "hep-th", "title": "Operational Tube-Sector Theory of Quantum State Distinguishability Under Generalized Symmetries", "abstract": "A variational principle for quantum-state distinguishability is established in many-body systems with generalized symmetries, including noninvertible cases described by fusion categories. Standard fidelity and symmetry-resolved diagnostics emerge as coarse-grained limits of a more refined operational structure. When symmetry actions terminate at entanglement cuts, distinguishability is governed by boundary tube algebras within a symmetry-constrained measurement resource theory. The physically admissible instruments are characterized by complete positivity, entanglement-cut locality, boundary-module covariance, and sequential stability. The resulting optimal measurement structure is uniquely fixed by the center of the boundary tube algebra, $\\mathcal{A}_{\\mathrm{phys}} = Z\\!\\left(\\mathrm{Tube}_{\\mathcal{C}}(\\mathcal{M}_A)\\right)$, whose primitive idempotents define tube-sector probabilities that refine fidelity-based and symmetry-resolved descriptions. The associated tube positive-operator-valued measures (POVM) are extremal and yield optimal one-shot hypothesis-testing distinguishability under symmetry constraints. The construction is universal across fusion categories and independent of microscopic realization.", "url": "https://arxiv.org/abs/2606.19678", "type": "理论", "summary": "量子态可区分性的变分原理是在具有广义对称性的多体系统中建立的，包括由融合类别描述的不可逆情况。标准保真度和对称解析诊断作为更精细的操作结构的粗粒度限制而出现。当对称作用在纠缠切割处终止时，可区分性由对称约束测量资源理论中的边界管代数控制。物理上可接受的工具具有完全正性、纠缠切割局部性、边界模协方差和顺序稳定性的特征。由此产生的最佳测量结构由边界管代数 $\\mathcal{A}_{\\mathrm{phys}} = Z\\!\\left(\\mathrm{Tube}_{\\mathcal{C}}(\\mathcal{M}_A)\\right)$ 的中心唯一固定，其本原幂等定义了管扇区概率，可细化基于保真度和对称性解析的描述。相关的管正算子值测量（POVM）是极值的，并且在对称约束下产生最佳的一次性假设检验可区分性。\n\n该结构在融合类别中是通用的，并且与微观实现无关。", "authors": [{"name": "Song He"}], "featured_authors": [{"name": "Song He"}], "author_count": 1}, {"id": "2606.19732", "category": "hep-th", "title": "Quantum models with the Yang-Lee phase transition", "abstract": "In this article, we present four different $1+1$D quantum models that realize the Yang-Lee (YL) phase transition under a deformation that preserves $PT$ symmetry. These are the antiferromagnetic Ising spin chain in transverse and longitudinal magnetic fields, the massive Schwinger model, the Blume-Capel model, and the three-state quantum clock model. Using the state-operator correspondence, we identify the YL critical point, compute the scaling dimensions of the lowest operators in each model, and find perfect agreement with the exact results for the YL criticality in two dimensions. Using bosonization for the Schwinger model and the Polyakov-Hubbard transformation for the other models, we show that in all of these quantum models the YL critical point is described, as expected, by a massless bosonic field with an $i \\phi^3$ interaction. In the quantum clock model, this critical field interacts with a massive bosonic field, and we identify the massless and massive states in the Hamiltonian spectrum. In addition, we numerically compute the two-point function of $\\phi$ at the Yang-Lee critical point and show that it grows with distance, in agreement with theoretical expectations.", "url": "https://arxiv.org/abs/2606.19732", "type": "理论", "summary": "在本文中，我们提出了四种不同的 $1+1$D 量子模型，这些模型在保持 $PT$ 对称性的变形下实现了 Yang-Lee (YL) 相变。它们是横向和纵向磁场中的反铁磁伊辛自旋链、大规模施温格模型、布卢姆-卡佩尔模型和三态量子钟模型。使用状态算子对应关系，我们识别 YL 临界点，计算每个模型中最低算子的缩放维度，并找到与二维 YL 临界点的精确结果完全一致的结果。使用 Schwinger 模型的玻色化和其他模型的 Polyakov-Hubbard 变换，我们表明，在所有这些量子模型中，正如预期的那样，YL 临界点由具有 $i \\phi^3$ 相互作用的无质量玻色子场描述。在量子钟模型中，这个临界场与巨大的玻色子场相互作用，我们识别了哈密顿谱中的无质量和质量状态。此外，我们数值计算了 Yang-Lee 临界点处 $\\phi$ 的两点函数，并表明它随着距离的增加而增长，与理论预期一致。", "authors": [{"name": "Erick Arguello Cruz"}, {"name": "Grigory Tarnopolsky"}], "featured_authors": [{"name": "Erick Arguello Cruz"}, {"name": "Grigory Tarnopolsky"}], "author_count": 2}, {"id": "2606.19877", "category": "hep-th", "title": "Factorized Quantum Curves and Voronoi Polytopes in 3D Duality Cascades with FI Parameters", "abstract": "In the study of duality cascades in three-dimensional gauge theories without FI parameters, an important role is played by a fundamental domain whose vertices correspond to brane configurations with vanishing relative ranks. Through the Fermi gas formalism, such brane configurations are known to be represented by factorized quantum curves. In this paper, we show that this factorized description extends naturally to quantum curves associated with del Pezzo geometries possessing exceptional Weyl-group symmetries in the presence of FI parameters. We find that the vertices of the corresponding fundamental domains, identified with Voronoi polytopes of exceptional root lattices, are realized as factorized quantum curves built from canonical operators interpreted as 5-branes dressed with FI parameters. This provides a physical realization of the vertices of the Voronoi polytopes as ``extremal'' brane configurations.", "url": "https://arxiv.org/abs/2606.19877", "type": "理论", "summary": "在没有 FI 参数的三维规范理论中的对偶级联研究中，基本域发挥着重要作用，其顶点对应于相对等级消失的膜构型。通过费米气体形式，已知这种膜构型可以用因式分解的量子曲线表示。在本文中，我们证明这种因式分解的描述自然地扩展到与 del Pezzo 几何相关的量子曲线，在 FI 参数存在的情况下，该几何具有特殊的 Weyl 群对称性。我们发现，相应基本域的顶点（用异常根晶格的 Voronoi 多面体标识）被实现为由规范算子构建的分解量子曲线，解释为带有 FI 参数的 5 膜。这提供了 Voronoi 多胞体顶点作为“极值”膜构型的物理实现。", "authors": [{"name": "Sanefum
