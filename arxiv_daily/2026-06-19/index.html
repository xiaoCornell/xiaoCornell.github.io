i Moriyama"}], "featured_authors": [{"name": "Sanefumi Moriyama"}], "author_count": 1}, {"id": "2606.19917", "category": "hep-th", "title": "Metastable and critical-bubble branches of Coleman--Weinberg monopoles", "abstract": "We revisit the Coleman--Weinberg monopole problem introduced by Kiselev, where radiative symmetry breaking makes the broken vacuum metastable. We construct the associated static monopole--critical-bubble configuration in the full coupled radial Higgs--gauge system and show that it is a saddle of the static energy functional. The metastable monopole and monopole--critical-bubble branches are characterized by their profiles, energies, and radial Hessian spectra. The monopole--bubble solution carries a negative radial mode, while the metastable monopole remains locally stable until its lowest radial Hessian eigenvalue approaches zero. The resulting branch structure gives a direct static picture of how Coleman--Weinberg monopoles lose metastability, with critical rescaled scalar mass parameter \\(\\mu_c=0.064352(1)\\).", "url": "https://arxiv.org/abs/2606.19917", "type": "理论", "summary": "我们重新审视基谢列夫提出的科尔曼-温伯格单极子问题，其中辐射对称性破缺使得破缺的真空亚稳态。我们在全耦合径向希格斯规范系统中构造了相关的静态单极子临界气泡配置，并表明它是静态能量泛函的鞍座。亚稳态单极子和单极子临界气泡分支的特征在于它们的轮廓、能量和径向 Hessian 谱。单极子-气泡解带有负径向模式，而亚稳态单极子保持局部稳定，直到其最低径向 Hessian 特征值接近零。由此产生的分支结构给出了科尔曼-温伯格单极子如何失去亚稳态的直接静态图像，其中具有临界重新缩放的标量质量参数 \\(\\mu_c=0.064352(1)\\)。", "authors": [{"name": "Sumit Shaw"}], "featured_authors": [{"name": "Sumit Shaw"}], "author_count": 1}, {"id": "2606.20018", "category": "hep-th", "title": "Leading UV Formula for Finite-Volume Vertex Operator Expectation Values in the Sine-Gordon Model from Kink NLIE", "abstract": "We study the ultraviolet (UV) limit of finite-volume expectation values of vertex operators in the sine-Gordon model using the kink nonlinear integral equation (NLIE) description of the conformal limit. By analysing the integrable formulation of vacuum expectation values in the small-volume regime, we conjecture an explicit analytic expression for the leading asymptotic term in the small-volume expansion, formulated in terms of kink functions. This establishes a direct connection between the integrable finite-volume description and the expected conformal asymptotics determined by the 3-point functions of the underlying conformal field theory (CFT). The proposed formula is tested against the analytic expression known from complex Liouville conformal field theory using high-precision numerics, showing agreement to at least 19 significant digits.", "url": "https://arxiv.org/abs/2606.20018", "type": "理论", "summary": "我们使用共形极限的扭结非线性积分方程 (NLIE) 描述来研究正弦戈登模型中顶点算子的有限体积期望值的紫外 (UV) 极限。通过分析小体积状态下真空期望值的可积公式，我们猜想了小体积展开中领先渐近项的显式解析表达式，用扭结函数表示。这在可积有限体积描述和由基础共形场论 (CFT) 的 3 点函数确定的预期共形渐近之间建立了直接联系。使用高精度数值，针对复杂刘维尔共形场理论已知的解析表达式对所提出的公式进行了测试，结果显示与至少 19 位有效数字相符。", "authors": [{"name": "Arpad Hegedus"}, {"name": "Apor Roth"}], "featured_authors": [{"name": "Arpad Hegedus"}, {"name": "Apor Roth"}], "author_count": 2}, {"id": "2606.20066", "category": "hep-th", "title": "Quantization of Brane-Skyrmions via Physics-Informed Neural Networks", "abstract": "In this work, we investigate the canonical quantization of topological solitons appearing in braneworld scenarios. In particular, we focus on Brane-Skyrmions, topological field configurations analogous to standard Skyrmions, which emerge as solutions of the Dirac-Nambu-Goto action supplemented by an induced curvature term. By quantizing the (iso)spin collective coordinates of the Brane-Skyrmion, we obtain a Hamiltonian that we solve perturbatively via an expansion in powers of $J^2$, in contrast to the standard Skyrme model. Furthermore, we implement a Physics-Informed Neural Network (PINN) to determine the soliton profile that minimizes the energy, consistently incorporating the backreaction from the quantized spin degrees of freedom. We conclude with a discussion of the potential applications of this framework to the description of hadronic spectra. Our results highlight both the theoretical potential of brane-defect models and the growing role of neural network methods in theoretical physics.", "url": "https://arxiv.org/abs/2606.20066", "type": "理论", "summary": "在这项工作中，我们研究了膜世界场景中出现的拓扑孤子的规范量化。我们特别关注膜-斯格明子，这是类似于标准斯格明子的拓扑场配置，它是狄拉克-南布-后藤作用的解，并辅以诱导曲率项。通过量化 Brane-Skyrmion 的（等）自旋集体坐标，我们获得了一个哈密顿量，与标准 Skyrme 模型相反，我们通过 $J^2$ 的幂展开来扰动求解该哈密顿量。此外，我们实现了物理信息神经网络（PINN）来确定最小化能量的孤子分布，始终结合量化自旋自由度的反反应。最后我们讨论了该框架在强子谱描述中的潜在应用。我们的结果强调了膜缺陷模型的理论潜力以及神经网络方法在理论物理学中日益增长的作用。", "authors": [{"name": "Jose A. R. Cembranos"}, {"name": "Alberto García Martín-Caro"}, {"name": "Sergio S. Rentero"}], "featured_authors": [{"name": "Jose A. R. Cembranos"}, {"name": "Alberto García Martín-Caro"}, {"name": "Sergio S. Rentero"}], "author_count": 3}, {"id": "2606.20220", "category": "hep-th", "title": "Higher-loop wormhole length in sine-dilaton gravity from DSSYK Krylov complexity", "abstract": "The quantum wormhole length in sine-dilaton gravity has been shown to equal the Krylov spread complexity in the double-scaled SYK model. In the infinite temperature limit, we compute the five-loop semiclassical expansion of DSSYK complexity by singular perturbation of the operator Liouville-type equations of motion, extending the existing one-loop results. The same method is applied to evaluate the Krylov variance and third-order cumulant, related to the connected two- and three-point functions of the length operator at coincident points. The small- and large-time behaviour of these observables is also studied. In particular, for the large-time slope of the wormhole linear growth, we provide a conjecture for the resummation of the perturbative series, and discuss non-perturbative corrections revealed by numerical data.", "url": "https://arxiv.org/abs/2606.20220", "type": "理论", "summary": "正弦膨胀引力中的量子虫洞长度已被证明等于双尺度 SYK 模型中的 Krylov 扩展复杂度。在无限温度极限下，我们通过算子Liouville型运动方程的奇异摄动计算了DSSYK复杂度的五循环半经典展开式，扩展了现有的一循环结果。使用相同的方法来评估与重合点处长度算子的连通两点和三点函数相关的克雷洛夫方差和三阶累积量。还研究了这些可观测值的小时间和大时间行为。特别是，对于虫洞线性增长的大时间斜率，我们提供了微扰级数恢复的猜想，并讨论了数值数据揭示的非微扰修正。", "authors": [{"name": "Eleonora Alfinito"}, {"name": "Matteo Beccaria"}], "featured_authors": [{"name": "Eleonora Alfinito"}, {"name": "Matteo Beccaria"}], "author_count": 2}, {"id": "2606.20314", "category": "hep-th", "title": "Macroscopic Black-Hole Remnants in a Nonlocal Field Theory: Towards Hawking Radiation in SFT", "abstract": "We demonstrate that, for a large black hole of radius $a$, Hawking radiation terminates around the scrambling time $u_{\\text{scr}} \\equiv 2a \\log(a/\\ell)$ due to the nonlocal, exponential suppression of trans-Planckian interactions inherent in string field theory (SFT). Modifying a massless scalar field's interaction with a dynamical black hole background via the smearing operator $e^{\\ell^2\\Box}$ (where $\\ell$ denotes the string length scale), we calculate the time-dependent number expectation value $\\langle \\hat{N}(u) \\rangle$ of outgoing Hawking particles at retarded time $u$. While the standard Planck spectrum at the Hawking temperature is reproduced at early times ($u \\ll u_{\\text{scr}}$), the particle number approaches zero shortly after the scrambling time. This early shutoff reflects the property that the collapsing shell becomes effectively invisible to trans-Planckian modes, offering an alternative resolution to the black hole information paradox via a macroscopic remnant.", "url": "https://arxiv.org/abs/2606.20314", "type": "理论", "summary": "我们证明，对于半径为 $a$ 的大黑洞，霍金辐射在扰乱时间 $u_{\\text{scr}} \\equiv 2a \\log(a/\\ell)$ 附近终止，这是由于弦场理论 (SFT) 中固有的跨普朗克相互作用的非局域、指数抑制。通过涂抹算子 $e^{\\ell^2\\Box}$ （其中 $\\ell$ 表示弦长度尺度）修改无质量标量场与动态黑洞背景的相互作用，我们计算了延迟时间 $u$ 时传出霍金粒子的时间相关数字期望值 $\\langle \\hat{N}(u) \\rangle$。虽然在早期再现了霍金温度下的标准普朗克谱 ($u \\ll u_{\\text{scr}}$)，但在扰乱时间后不久粒子数就接近零。这种早期关闭反映了坍缩壳层对于跨普朗克模式实际上变得不可见的特性，通过宏观残余为黑洞信息悖论提供了替代解决方案。", "authors": [{"name": "Feng-Yin Cheng"}, {"name": "Pei-Ming Ho"}, {"name": "Wei-Hsiang Shao"}], "featured_authors": [{"name": "Feng-Yin Cheng"}, {"name": "Pei-Ming Ho"}, {"name": "Wei-Hsiang Shao"}], "author_count": 3}, {"id": "2606.20334", "category": "hep-th", "title": "The magic of the gravitational vacuum", "abstract": "The black hole information paradox challenges us to do something that is seemingly impossible: find a violation of the semiclassical approximation in a region where all curvatures are low. The vecro hypothesis proposes a structure of the gravitational vacuum that can accomplish this task. In this article we explain the hypothesis, and give a lattice model to describe the essence of its idea. The Hamiltonian of the model is completely local, but the vacuum exhibits correlations among planck scale fluctuations which fall off relatively slowly with distance. These extended-scale correlations are able to `feel around' the region where a closed trapped surface is about to form, and to react by nucleating fuzzball structure that destroys semiclassical spacetime.", "url": "https://arxiv.org/abs/2606.20334", "type": "理论", "summary": "黑洞信息悖论挑战我们做一些看似不可能的事情：在所有曲率都很低的区域中找到违反半经典近似的地方。韦克罗假说提出了一种可以完成这项任务的引力真空结构。在本文中，我们解释了这一假设，并给出了一个格子模型来描述其思想的本质。该模型的哈密顿量是完全局部的，但真空表现出普朗克尺度波动之间的相关性，这些波动随着距离的增加相对缓慢地下降。这些扩展尺度的相关性能够“感知”即将形成封闭陷阱表面的区域，并通过破坏半经典时空的毛球结构成核来做出反应。", "authors": [{"name": "Samir D. Mathur"}], "featured_authors": [{"name": "Samir D. Mathur"}], "author_count": 1}, {"id": "2606.20353", "category": "hep-th", "title": "Fortuity beyond counting: an explicit construction", "abstract": "We reconsider the \"fortuity'' mechanism in the D1D5 CFT focusing on the K3 symmetric orbifold. Going beyond the counting of BPS states, we investigate perturbatively how the explicit form of the BPS cohomologies is modified by the twist-two deformations. We calculate the action of the supercharges in the sector $(h,j)=(1,0)$ for different values of the central charge and derive explicit expressions for the primary states. Equipped with this information, we compare some protected three-point couplings in the free and the gravity regime. We show that agreement between the two descriptions imposes non-trivial constraints on the identification of monotone and fortuitous states. In particular, we argue that the map relating theories with different values of the central charge must and can be defined so as to commute with the supercharges that define the cochain complex. We then study the three-point correlators between the fortuitous and monotone states identified in our analysis to assess whether the two sectors are dynamically decoupled. We find an explicit example of a non-vanishing coupling between two monotone and a fortuitous state, providing evidence that the two sectors are dynamically connected.", "url": "https://arxiv.org/abs/2606.20353", "type": "理论", "summary": "我们重新考虑 D1D5 CFT 中的“偶然性”机制，重点关注 K3 对称轨道。除了 BPS 态的计数之外，我们还扰动地研究了 BPS 上同调的显式形式是如何通过扭转二变形来修改的。我们计算扇区 $(h,j)=(1,0)$ 中的增压对于中心电荷的不同值的作用，并导出主态的显式表达式。有了这些信息，我们比较自由和重力状态下的一些受保护的三点耦合，我们表明这两种描述之间的一致性对单调和偶然状态的识别施加了重要的约束，我们认为必须并且可以定义与中心电荷不同值相关的理论，以便与定义共链复合体的增压进行交换。解耦。\n\n我们发现了两个单调和偶然状态之间的非消失耦合的明确示例，提供了这两个扇区动态连接的证据。", "authors": [{"name": "Stefano Giusto"}, {"name": "James Inglis"}, {"name": "Rodolfo Russo"}], "featured_authors": [{"name": "Stefano Giusto"}, {"name": "James Inglis"}, {"name": "Rodolfo Russo"}], "author_count": 3}, {"id": "2606.20433", "category": "hep-th", "title": "Shadow Completion in Celestial OPEs", "abstract": "We argue that celestial OPEs must be supplemented by shadow-basis operators. Although the shadow transform does not introduce new bulk degrees of freedom, it provides a distinct primary state in the boundary celestial theory. From OPE consistency, we show that the ordinary celestial OPE does not close on Mellin-basis exchanges alone. Rather, the same exchanged bulk particle must also appear through its shadow-basis representative. This leads to a shadow-completed OPE, with the shadow OPE coefficient fixed by the ordinary collinear coefficient through the universal shadow factor. We discuss the corresponding boundary Hilbert-space interpretation, extend this argument to gluons and gravitons, and verify the shadow exchange directly in tree-level regular celestial amplitudes, including a scalar $2\\rightarrow n$ analysis and an explicit five-point example.", "url": "https://arxiv.org/abs/2606.20433", "type": "理论", "summary": "我们认为天体 OPE 必须辅以影子基础算子。尽管阴影变换没有引入新的体自由度，但它在边界天体理论中提供了独特的初级状态。从 OPE 一致性来看，我们表明普通天体 OPE 不会仅在梅林基础交换上关闭。相反，相同的交换体粒子也必须通过其基于阴影的代表出现。这导致了阴影完成的 OPE，其中阴影 OPE 系数通过通用阴影因子由普通共线系数固定。我们讨论相应的边界希尔伯特空间解释，将此论证扩展到胶子和引力子，并直接在树级规则天体振幅中验证阴影交换，包括标量 $2\\rightarrow n$ 分析和明确的五点示例。", "authors": [{"name": "Reiko Liu"}, {"name": "Zijian Liu"}, {"name": "Wen-Jie Ma"}], "featured_authors": [{"name": "Reiko Liu"}, {"name": "Zijian Liu"}, {"name": "Wen-Jie Ma"}], "author_count": 3}, {"id": "2606.20486", "category": "hep-th", "title": "Cosmological history after higher dimensional inflation", "abstract": "It was proposed that extra dimensions can acquire large size by higher dimensional inflation connecting two large hierarchies in particle physics and cosmology, namely the weakness of the actual gravitational force to the largeness of the observable universe, in terms of one fundamental scale. This proposal is consistent with the observed approximate scale invariant power spectrum of primordial density perturbations only for one or two extra dimensions of around the micron size. Assuming a stabilisation mechanism of the extra dimensions at the end of inflation, here we propose a cosmological history that describes the Universe evolution after the end of inflation up to the reheating temperature, that guarantees the absence of bulk gravitons at earlier times, avoiding their overproduction in the early universe. The proposed cosmological history connects the period of higher dimensional inflation to the beginning of the standard cosmology.", "url": "https://arxiv.org/abs/2606.20486", "type": "理论", "summary": "有人提出，额外维度可以通过连接粒子物理学和宇宙学中两个大层次结构的高维膨胀来获得大尺寸，即在一个基本尺度上，实际引力对可观测宇宙的巨大性的弱点。该提议与观察到的原始密度扰动的近似尺度不变功率谱一致，仅针对微米尺寸的一两个额外维度。假设暴胀结束时存在额外维度的稳定机制，在这里我们提出了一个宇宙学历史，描述了暴胀结束后直到再加热温度的宇宙演化，这保证了早期不存在大体积引力子，避免了它们在早期宇宙中的过度产生。所提出的宇宙学历史将高维膨胀时期与标准宇宙学的开始联系起来。", "authors": [{"name": "Luis A. Anchordoqui"}, {"name": "Ignatios Antoniadis"}, {"name": "Jules Cunat"}], "featured_authors": [{"name": "Luis A. Anchordoqui"}, {"name": "Ignatios Antoniadis"}, {"name": "Jules Cunat"}], "author_count": 3}, {"id": "2606.19845", "category": "math-ph", "title": "Universal Properties of Nonlinearly Perturbed Maxwell Theory", "abstract": "We show that a general nonlinearly perturbed Maxwell theory of electromagnetism possesses three universal fundamental properties: (i) A finite-energy electric point charge. (ii) Exclusion of finite-energy magnetic monopoles and dually charged dyons. (iii) Arbitrary smallness of the effective radius of a point electric charge and the associated local undetectedness of the electric charge and energy. In particular, this last property offers a classical explanation for the invisibility of the electron, as a point electric charge, in accordance with the smallness of its effective radius. This nonlinear theory of electromagnetism has the feature that it minimally perturbs the Maxwell theory with a nonlinearity profile that is as general as possible such that the three universal properties stated above are all maintained.", "url": "https://arxiv.org/abs/2606.19845", "type": "理论", "summary": "我们证明了一般的非线性扰动麦克斯韦电磁理论具有三个普遍的基本属性：（i）有限能量的点电荷。 (ii) 排除有限能量磁单极子和双荷电子。 (iii) 点电荷有效半径的任意小以及相关的电荷和能量的局部未检测到。特别是，最后一个性质为电子作为点电荷的不可见性提供了经典的解释，因为它的有效半径很小。这种电磁学非线性理论的特点是，它对麦克斯韦理论的干扰最小化，其非线性分布尽可能通用，使得上述三个普遍性质都得以保留。", "authors": [{"name": "Tengyang Liu"}, {"name": "Yisong Yang"}], "featured_authors": [{"name": "Tengyang Liu"}, {"name": "Yisong Yang"}], "author_count": 2}, {"id": "2606.20012", "category": "math-ph", "title": "Dirac structures on tangent bundles: a geometric framework for variational principles, constrained dynamics, and symmetry reduction", "abstract": "We introduce a Dirac structure on the tangent bundle of a configuration manifold, called a \\textit{Lagrange--Dirac structure}, which is naturally induced by the Lagrangian two-form associated with a (possibly degenerate) Lagrangian and a constraint distribution. This structure provides a unified geometric framework for Lagrange--Dirac dynamical systems, encompassing nonholonomic, degenerate Lagrangian, and symmetric systems. In the hyperregular case, the system recovers a first-order formulation of the Lagrange--d'Alembert equations. Although nonholonomic dynamics does not preserve the Lagrangian two-form, we show that the underlying Lagrange--Dirac structure is preserved up to gauge transformations, yielding a natural gauge covariance property. We also formulate an intrinsic variational principle directly on the tangent bundle, referred to as the \\textit{Lagrange--d'Alembert--Dirac principle}, which recovers Hamilton's principle in the unconstrained case and the Lagrange--d'Alembert principle in the hyperregular constrained case. Furthermore, we develop a reduction theory for systems with Lie group symmetry, deriving a reduced Lagrange--Dirac structure over the Lie algebra that yields the Euler--Poincaré--Dirac equations and a corresponding reduced variational principle. Finally, we illustrate the theory through examples including charged particles, electric circuits, and systems with Lagrangians linear in velocity, and present an infinite-dimensional extension to ideal fluids that naturally incorporates the incompressibility constraint and recovers the Euler equations.", "url": "https://arxiv.org/abs/2606.20012", "type": "理论", "summary": "我们在构型流形的切丛上引入狄拉克结构，称为 \\textit{Lagrange--Dirac 结构}，它是由与（可能是简并的）拉格朗日和约束分布相关的拉格朗日二元形式自然导出的。这种结构为拉格朗日-狄拉克动力系统提供了统一的几何框架，包括非完整系统、简并拉格朗日系统和对称系统。在超正则情况下，系统恢复拉格朗日-达朗贝尔方程的一阶公式。尽管非完整动力学不保留拉格朗日两种形式，但我们表明，底层的拉格朗日-狄拉克结构在规范变换之前都得到保留，从而产生了自然的规范协方差性质。我们还直接在切丛上制定了一个内在变分原理，称为 \\textit{Lagrange--d'Alembert--Dirac 原理}，它恢复了无约束情况下的 Hamilton 原理和超正则约束情况下的 Lagrange--d'Alembert 原理。\n\n此外，我们还为具有李群对称性的系统开发了一种简化理论，在李代数上推导了简化的拉格朗日-狄拉克结构，从而产生了欧拉-庞加莱-狄拉克方程和相应的简化变分原理。最后，我们通过带电粒子、电路和速度呈线性的拉格朗日系统等例子来说明该理论，并提出理想流体的无限维扩展，自然地包含不可压缩约束并恢复欧拉方程。", "authors": [{"name": "Hiroaki Yoshimura"}], "featured_authors": [{"name": "Hiroaki Yoshimura"}], "author_count": 1}, {"id": "2606.20505", "category": "math-ph", "title": "On the Emergence of Discrete Spectrum for Weakly Disordered Schrödinger Operators", "abstract": "We investigate the spectral properties of the Anderson operator perturbed by a localized negative potential, \\(-V\\). Specifically, we analyze the random Schrödinger operator defined by \\(H = -\\Delta +\\ve \\sum_{n} \\omega_n \\chi_n - V\\), where the unperturbed operator exhibits a disordered energy landscape. Our primary focus is to establish precise estimates on the number of negative eigenvalues (bound states) induced by the attractive perturbation. By analyzing the competition between Anderson localization and the binding capacity of the potential, we provide quantitative bounds on the discrete spectrum. These results offer new insights into how randomness enhances the eigenvalue bounds.", "url": "https://arxiv.org/abs/2606.20505", "type": "理论", "summary": "我们研究了受局部负电势 \\(-V\\) 扰动的安德森算子的光谱特性。具体来说，我们分析了由 \\(H = -\\Delta +\\ve \\sum_{n} \\omega_n \\chi_n - V\\) 定义的随机薛定谔算子，其中未受扰动的算子表现出无序的能量景观。我们的主要重点是对吸引扰动引起的负特征值（束缚态）的数量进行精确估计。通过分析安德森定位和势的结合能力之间的竞争，我们提供了离散谱的定量界限。这些结果为随机性如何增强特征值界限提供了新的见解。", "authors": [{"name": "Stanislav Molchanov"}, {"name": "Oleg Safronov"}], "featured_authors": [{"name": "Stanislav Molchanov"}, {"name": "Oleg Safronov"}], "author_count": 2}, {"id": "2606.19457", "category": "quant-ph", "title": "Efficient classical representation and quantum state preparation of complete active space wavefunctions", "abstract": "Quantum computers promise to solve the electronic structure problem for a large class of molecules. However, the performance of relevant quantum algorithms hinges on preparing initial states with substantial overlap with the target eigenvector. For classically challenging molecules with strong electron correlation, starting from multi-reference states, such as complete active space (CAS) wavefunctions is necessary. Unfortunately, the most advanced state preparation protocols applied to such states result in a gate complexity that scales exponentially with the active space size $d$. In fact, even encoding a CAS state classically is traditionally believed to be intractable for chemically relevant systems. Here, we draw insights from the recently introduced Quantum Paldus Transform (QPT) to show that there exists an efficient classical representation of CAS states and to design a new state preparation routine outperforming previous ones. The QPT represents a transformation from the Fock basis to a friendlier symmetry-adapted basis. Our main contribution consists in showing that CAS states expanded in this basis can efficiently be represented as a matrix product state (MPS) with a bond dimension scaling as $O(d^2)$. One can then efficiently load the MPS on a quantum computer and use the inverse QPT to transform the state to the Fock basis. Moreover, our method can easily be extended to the efficient preparation of CAS states in first quantisation with similar complexity. Crucially, we demonstrate that the complexity of both state preparation protocols only grows polynomially as $O(d^3)$ , which constitutes to the best of our knowledge an exponential improvement over the state of the art.", "url": "https://arxiv.org/abs/2606.19457", "type": "理论+数值", "summary": "量子计算机有望解决一大类分子的电子结构问题。然而，相关量子算法的性能取决于准备与目标特征向量大量重叠的初始状态。对于具有强电子相关性的经典挑战性分子，从多参考态开始，例如完整的活性空间（CAS）波函数是必要的。不幸的是，应用于此类状态的最先进的状态准备协议会导致门的复杂性随着活动空间大小 $d$ 呈指数级增长。事实上，传统上认为，即使是传统的 CAS 状态编码对于化学相关系统来说也是棘手的。在这里，我们从最近推出的量子 Paldus 变换 (QPT) 中汲取见解，表明存在 CAS 状态的有效经典表示，并设计了一种优于以前状态准备例程的新状态准备例程。 QPT 代表从 Fock 基到更友好的对称适应基的转变。\n\n我们的主要贡献在于表明在此基础上扩展的 CAS 状态可以有效地表示为矩阵乘积状态 (MPS)，键维缩放为 $O(d^2)$。然后，人们可以有效地将 MPS 加载到量子计算机上，并使用逆 QPT 将状态转换为 Fock 基。此外，我们的方法可以轻松扩展到具有相似复杂性的首次量化中 CAS 状态的有效准备。至关重要的是，我们证明了两种状态准备协议的复杂性仅以多项式增长 $O(d^3)$ ，据我们所知，这构成了对现有技术的指数级改进。", "authors": [{"name": "Hamza Jnane"}], "featured_authors": [{"name": "Hamza Jnane"}], "author_count": 1}, {"id": "2606.19502", "category": "quant-ph", "title": "Entanglement Scaling and Problem Structure in Quantum Approximate and Adiabatic Optimization Algorithms", "abstract": "Entanglement is widely regarded as a key resource underlying the power of quantum algorithms and their potential to achieve quantum advantage. With the emergence of variational quantum algorithms, however, questions have arisen regarding how entanglement relates to problem structure and algorithmic performance in near-term quantum applications. Here, we examine this relationship through the Quantum Approximate Optimization Algorithm (QAOA), a specific class of variational algorithms, applied to the MaxCut problem. We show that suboptimal variational parameter training can significantly modify the observed entanglement profile, obscuring its scaling behavior. By employing a high-performance optimizer, we find empirical evidence that QAOA exhibits entanglement scaling consistent with that of fermionic Gaussian states (up to a scaling factor) across a broad range of MaxCut instances. We further compare these results with adiabatic quantum computation, observing annealing-schedule-dependent entanglement profiles whose scaling behavior differs markedly from that of QAOA. Together, these findings provide new insight into how entanglement manifests in and distinguishes these two algorithmic paradigms, highlighting its connection to both computational performance and application structure.", "url": "https://arxiv.org/abs/2606.19502", "type": "理论+数值", "summary": "纠缠被广泛认为是量子算法的力量及其实现量子优势的潜力的关键资源。然而，随着变分量子算法的出现，关于纠缠如何与近期量子应用中的问题结构和算法性能相关的问题出现了。在这里，我们通过量子近似优化算法 (QAOA) 检查这种关系，这是一种应用于 MaxCut 问题的特定变分算法。我们表明，次优变分参数训练可以显着修改观察到的纠缠剖面，模糊其缩放行为。通过采用高性能优化器，我们发现经验证据表明 QAOA 在各种 MaxCut 实例中表现出与费米高斯态（高达缩放因子）一致的纠缠缩放。我们进一步将这些结果与绝热量子计算进行比较，观察与退火程序相关的纠缠剖面，其缩放行为与 QAOA 的缩放行为明显不同。\n\n总之，这些发现为纠缠如何在这两种算法范式中体现和区分提供了新的见解，强调了它与计算性能和应用程序结构的联系。", "authors": [{"name": "Georgios Arapantonis"}, {"name": "Paraj Titum"}, {"name": "Gregory Quiroz"}], "featured_authors": [{"name": "Georgios Arapantonis"}, {"name": "Paraj Titum"}, {"name": "Gregory Quiroz"}], "author_count": 3}, {"id": "2606.19510", "category": "quant-ph", "title": "Exact Markovian Dissipation Requires Singular Energy Resources", "abstract": "The Gorini--Kossakowski--Lindblad--Sudarshan (GKLS) equation describes irreversible quantum dynamical semigroups. We show that this description cannot be exact under physically regular energy conditions. We prove that the open-system survival probability under physically regular energy conditions has sublinear decay, whereas any dissipative GKLS semigroup has a linear short-time decay. Hence exact Markovian dissipation requires singular energy resources: an unbounded-below total Hamiltonian or infinite initial energy, and a divergent interaction-energy moment. Therefore, a dissipative time-independent GKLS equation should be regarded as an effective description rather than the exact reduced dynamics of a Hamiltonian dilation satisfying physically regular energy conditions.", "url": "https://arxiv.org/abs/2606.19510", "type": "理论", "summary": "Gorini--Kossakowski--Lindblad--Sudarshan (GKLS) 方程描述了不可逆的量子动力学半群。我们证明，在物理规则的能量条件下，这种描述不可能准确。我们证明了物理规则能量条件下的开放系统生存概率具有亚线性衰减，而任何耗散 GKLS 半群都具有线性短时衰减。因此，精确的马尔可夫耗散需要奇异的能量资源：无界的总哈密顿量或无限的初始能量，以及发散的相互作用能量矩。因此，耗散时间无关的 GKLS 方程应被视为有效描述，而不是满足物理规则能量条件的哈密顿膨胀的精确简化动力学。", "authors": [{"name": "Hiroki Nakabayashi"}], "featured_authors": [{"name": "Hiroki Nakabayashi"}], "author_count": 1}, {"id": "2606.19545", "category": "quant-ph", "title": "Complexity of detecting large coefficients in the Pauli basis", "abstract": "We study the problem of deciding, given a mechanism to prepare a quantum state $\\rho$ and a value $\\varepsilon > 0$, whether there is some non-identity Pauli matrix $P$ such that $|Tr(P \\rho)| \\geq \\varepsilon$. We consider that the state $\\rho$ is described as the result of tracing out some of the qubits of a pure state prepared by a circuit $C$, and we assume the promise that either there is a Pauli matrix satisfying the stated condition or, instead, that for all non-identity Pauli matrices $P$ it is the case that $|Tr(P\\rho)|\\leq \\varepsilon/2$. The problem is in $QCMA$, and we prove that if it belongs to $BQP$ then $NP \\subseteq BQP$. The result is obtained through a reduction from the minimum-weight code problem, and it holds even when $\\rho$ is assumed to be a pure state (i.e. when no qubits are discarded) and $\\varepsilon$ is constant. This resolves an open question regarding the existence of efficient tomographic procedures to find the largest coefficients of a quantum state in the Pauli basis: namely, they do not exist under the standard hypothesis $NP \\nsubseteq BQP$.", "url": "https://arxiv.org/abs/2606.19545", "type": "理论", "summary": "我们研究的问题是，给定一种准备量子态 $\\rho$ 和值 $\\varepsilon > 0$ 的机制，是否存在某些非同一性泡利矩阵 $P$ 使得 $|Tr(P \\rho)| \\geq \\varepsilon$。我们认为状态 $\\rho$ 被描述为追踪电路 $C$ 准备的纯状态的一些量子位的结果，并且我们假设要么存在满足规定条件的泡利矩阵，要么相反，对于所有非恒等式泡利矩阵 $P$，情况是 $|Tr(P\\rho)|\\leq \\varepsilon/2$。问题出在$QCMA$上，我们证明如果它属于$BQP$则$NP \\subseteq BQP$。该结果是通过最小权重代码问题的简化获得的，即使当 $\\rho$ 被假设为纯状态（即没有量子位被丢弃时）并且 $\\varepsilon$ 恒定时，它仍然成立。这解决了一个悬而未决的问题，即是否存在有效的层析成像程序来找到泡利基中量子态的最大系数：即，它们在标准假设 $NP \\nsubseteq BQP$ 下不存在。", "authors": [{"name": "Santiago Cifuentes"}], "featured_authors": [{"name": "Santiago Cifuentes"}], "author_count": 1}, {"id": "2606.19585", "category": "quant-ph", "title": "Electrical Noise Produced by Micron-Sized Particles above a Surface Paul Trap", "abstract": "Electric field noise produced by the surface of ion trap electrodes reduces the fidelity of quantum computing operations. Despite decades of investigation its microscopic origins remain unclear. Here, we measure electric field noise at trapping locations along the symmetry axis of a linear surface Paul trap. We find that noise levels vary by three orders-of-magnitude in one 600$\\,\\mu$m section of the trap. Optical and scanning electron microscope images show micron-sized particles close to the trapping locations with the highest noise levels. We find that modeling the particles as a lossy dielectric with a effective loss tangent $\\tan\\theta=0.33(0.06)$ describes the magnitude of the noise, as well as its spatial and frequency dependence. Our observations may explain the large variation of reported noise levels in literature.", "url": "https://arxiv.org/abs/2606.19585", "type": "理论", "summary": "离子阱电极表面产生的电场噪声降低了量子计算操作的保真度。尽管经过数十年的研究，其微观起源仍不清楚。在这里，我们测量沿着线性表面保罗陷阱的对称轴的捕获位置处的电场噪声。我们发现，在陷阱的一个 600$\\,\\mu$m 部分中，噪声水平变化了三个数量级。光学和扫描电子显微镜图像显示，捕获位置附近的微米级颗粒具有最高的噪声水平。我们发现，将粒子建模为有效损耗角正切 $\\tan\\theta=0.33(0.06)$ 的有损电介质描述了噪声的大小及其空间和频率依赖性。我们的观察可以解释文献中报告的噪声水平的巨大差异。", "authors": [{"name": "Ben Saarel"}, {"name": "Ozgur Sahin"}, {"name": "Hartmut Häffner"}, {"name": "Alpha T. N'Diaye"}], "featured_authors": [{"name": "Ben Saarel"}, {"name": "Ozgur Sahin"}, {"name": "Hartmut Häffner"}, {"name": "Alpha T. N'Diaye"}], "author_count": 4}, {"id": "2606.19593", "category": "quant-ph", "title": "Stalls and Spequlation: Pipelined Execution for Fault Tolerant Quantum Computation", "abstract": "Fault-tolerant quantum computation requires the coordinated action of three distinct systems: classical control logic, quantum hardware, and classical error decoders. Current scheduling models treat logical operations as atomic, hiding the fact that these subsystems operate sequentially and spend significant time idle. We present a pipelined execution framework that decomposes each logical operation into its component stages i.e. Control, Execute, and Decode. Building on this, we discuss some speculation strategies that allow successor operations to begin processing before their predecessors have completed decoding. We evaluate our framework on several common benchmarks and show that pipelining with speculation reduces total pipeline steps by 20-40% compared to a no-speculation baseline. The most aggressive strategy consistently outperforms conservative alternatives, even though partial rollback is needed at times, because the per-rollback penalty is small relative to the parallelism gained. We further show that speculation facilitates load balancing by distributing work more evenly across the heterogeneous subsystems of a fault-tolerant quantum computer, converting idle time into useful computation while also saving on execution time.", "url": "https://arxiv.org/abs/2606.19593", "type": "理论+数值", "summary": "容错量子计算需要三个不同系统的协调行动：经典控制逻辑、量子硬件和经典错误解码器。当前的调度模型将逻辑操作视为原子操作，隐藏了这些子系统按顺序操作并花费大量空闲时间的事实。我们提出了一个流水线执行框架，它将每个逻辑操作分解为其组成阶段，即控制、执行和解码。在此基础上，我们讨论了一些推测策略，这些策略允许后续操作在其前任操作完成解码之前开始处理。我们在几个常见的基准上评估了我们的框架，结果表明，与无推测基线相比，带有推测的流水线将总流水线步骤减少了 20-40%。尽管有时需要部分回滚，但最激进的策略始终优于保守的替代方案，因为每次回滚的惩罚相对于获得的并行性来说很小。\n\n我们进一步表明，推测通过在容错量子计算机的异构子系统之间更均匀地分配工作来促进负载平衡，将空闲时间转化为有用的计算，同时节省执行时间。", "authors": [{"name": "Aditi Awasthi"}, {"name": "Gokul Subramanian Ravi"}, {"name": "Jonathan Mark Baker"}], "featured_authors": [{"name": "Aditi Awasthi"}, {"name": "Gokul Subramanian Ravi"}, {"name": "Jonathan Mark Baker"}], "author_count": 3}, {"id": "2606.19628", "category": "quant-ph", "title": "Subsystem Quantum Error Correction for Noisy Quantum Metrology", "abstract": "Quantum error correction has been successfully applied to enhance the precision of parameter estimation in the presence of noise. Nonetheless, existing methods require a number of noiseless, controllable ancillae and lack efficient encoding and decoding procedures. In this Letter, we demonstrate that subsystem error correction provides a new direction that can substantially simplify the metrological protocol. We derive general conditions under which subsystem stabilizer codes achieve the Heisenberg limit and show that, for broad classes of noise, this can be realized by syndrome-free protocols using at most a single ancilla qubit. Furthermore, we extend this framework to dynamical error correction and show that Floquet codes can protect time-dependent metrological signals in reaching the Heisenberg limit.", "url": "https://arxiv.org/abs/2606.19628", "type": "数值", "summary": "量子误差校正已成功应用于提高存在噪声时参数估计的精度。然而，现有方法需要许多无噪声、可控的辅助设备，并且缺乏有效的编码和解码过程。在这封信中，我们证明子系统纠错提供了一个新的方向，可以大大简化计量协议。我们推导了子系统稳定器代码达到海森堡极限的一般条件，并表明，对于广泛的噪声类别，这可以通过最多使用单个辅助量子位的无综合症协议来实现。此外，我们将该框架扩展到动态误差校正，并表明 Floquet 码可以保护时间相关的计量信号达到海森堡极限。", "authors": [{"name": "Qiushi Liu"}, {"name": "Sisi Zhou"}], "featured_authors": [{"name": "Qiushi Liu"}, {"name": "Sisi Zhou"}], "author_count": 2}, {"id": "2606.19765", "category": "quant-ph", "title": "Sparse positive maps on qutrits with exact nondecomposability thresholds and PPT-entanglement transitions", "abstract": "We study a family of sparse positive maps on qutrits for which positivity, decomposability, and PPT entanglement can all be analysed explicitly. The block structure of the associated Choi matrices reduces positivity to a Hermitian biquadratic form and leads to exact positivity boundaries for three representative parametric families. For the same families we determine the exact transition between decomposable and non-decomposable maps and construct associated PPT states of two classes. The first consists of witness-adapted deformations naturally tied to the non-decomposability analysis. The second consists of analytically tractable families whose full PPT-entangled branch is detected by fixed positive maps, yielding exact thresholds between separability and bound entanglement. For the trace-preserving subclass, we further compare positivity with a recent eigenvalue bound for 2-positive maps, thereby making the gap between positivity and higher-order positivity fully explicit within this family.", "url": "https://arxiv.org/abs/2606.19765", "type": "理论", "summary": "我们研究了 qutrit 上的一系列稀疏正映射，其正性、可分解性和 PPT 纠缠都可以被明确分析。相关 Choi 矩阵的块结构将正性降低为 Hermitian 双二次形式，并导致三个代表性参数族的精确正性边界。对于相同的族，我们确定可分解和不可分解映射之间的确切转换，并构建两个类的相关 PPT 状态。第一个包括与不可分解性分析自然相关的目击适应变形。第二个由分析上易于处理的家族组成，其完整的 PPT 纠缠分支由固定的正图检测到，从而在可分离性和束缚纠缠之间产生精确的阈值。对于保留踪迹的子类，我们进一步将正性与 2-正映射的最近特征值界限进行比较，从而使正性和高阶正性之间的差距在该族中完全明确。", "authors": [{"name": "Davide Poderini"}, {"name": "Angela Rosy Morgillo"}, {"name": "Fabio Benatti"}, {"name": "Fabio Anselmi"}, {"name": "Chiara Macchiavello"}, {"name": "Massimiliano F. Sacchi"}], "featured_authors": [{"name": "Davide Poderini"}, {"name": "Angela Rosy Morgillo"}, {"name": "Fabio Benatti"}, {"name": "Fabio Anselmi"}, {"name": "Chiara Macchiavello"}, {"name": "Massimiliano F. Sacchi"}], "author_count": 6}, {"id": "2606.19873", "category": "quant-ph", "title": "Random Local Stabilizer Codes in Three Dimensions without String or Self-Similar Fractal Logical Operators", "abstract": "Quantum error-correcting codes (QECs) are essential components quantum computation and have deep connections to quantum phases of matter. A key obstruction to passive self-correcting QECs is the presence of string logical operators, which can generate logical errors through constant-energy-barrier processes. Haah's Codes (fracton codes) showed that three-dimensional stabilizer codes can forbid such string logical operators, but their translation-invariant structure supports self-similar fractal logical operators with a logarithmic energy barrier. We introduce the qutrit random cubic codes, a family of local qutrit Calderbank-Shor-Steane stabilizer Hamiltonians with similar cube-check structure as Haah's Code 1 but built from spatially varying stabilizers. We prove that these models retain the no-string property and numerically observe that they have properties distinct from translation-invariant fracton codes: the smallest ground-state degeneracy exponent is $k=2$ for odd $L$ and $k=4$ for even $L$; noncontractible plane-logical operators span the entire logical space; and charge-push diagnostics show that the self-similar fractal operators are absent. These results demonstrate that constrained randomness can fundamentally change the nature of stabilizer codes and improve their self-correction properties. They further point to broader families of quantum error-correcting codes and quantum phases beyond canonical topological and fracton orders.", "url": "https://arxiv.org/abs/2606.19873", "type": "理论+数值", "summary": "量子纠错码（QEC）是量子计算的重要组成部分，与物质的量子相有着深刻的联系。被动自校正 QEC 的一个关键障碍是字符串逻辑运算符的存在，它可以通过恒定能量势垒过程产生逻辑错误。 Haah 代码（分形码）表明三维稳定器代码可以禁止此类字符串逻辑运算符，但其平移不变结构支持具有对数能量势垒的自相似分形逻辑运算符。我们引入了 qutrit 随机立方码，这是一族局部 qutrit Calderbank-Shor-Steane 稳定器哈密顿量，具有与 Haah 代码 1 类似的立方体校验结构，但由空间变化的稳定器构建。我们证明这些模型保留了无串属性，并在数值上观察到它们具有与平移不变分形码不同的属性：奇数 $L$ 的最小基态简并指数为 $k=2$，偶数 $L$ 的最小基态简并指数为 $k=4$；不可收缩平面逻辑运算符跨越整个逻辑空间；电荷推动诊断表明自相似分形算子不存在。\n\n这些结果表明，受约束的随机性可以从根本上改变稳定器代码的性质并提高其自校正性能。他们进一步指出了超出规范拓扑和分形阶数的更广泛的量子纠错码和量子相位系列。", "authors": [{"name": "Han Yan"}], "featured_authors": [{"name": "Han Yan"}], "author_count": 1}, {"id": "2606.20009", "category": "quant-ph", "title": "The use of Peres lattices in periodically driven systems", "abstract": "We demonstrate the strength of the method of Peres lattices in periodically driven quantum systems. The method, which has previously been used mostly in stationary systems, enables us to efficiently detect resonances in the driven system, to monitor the onset of chaos, and to recognize critical properties of the Floquet modes. It also allows quick comparisons of the spectra of Floquet modes for various driving Hamiltonians and transparent tests of the iterative approximation techniques based on effective stationary Hamiltonians.", "url": "https://arxiv.org/abs/2606.20009", "type": "理论", "summary": "我们证明了佩雷斯晶格方法在周期性驱动的量子系统中的优势。该方法以前主要用于固定系统，使我们能够有效地检测驱动系统中的共振，监测混沌的发生，并识别 Floquet 模式的关键属性。它还允许快速比较各种驱动哈密顿量的 Floquet 模态谱，以及基于有效平稳哈密顿量的迭代逼近技术的透明测试。", "authors": [{"name": "Lukáš Honsa"}, {"name": "Jan Střeleček"}, {"name": "Jakub Novotný"}, {"name": "Pavel Cejnar"}], "featured_authors": [{"name": "Lukáš Honsa"}, {"name": "Jan Střeleček"}, {"name": "Jakub Novotný"}, {"name": "Pavel Cejnar"}], "author_count": 4}, {"id": "2606.20024", "category": "quant-ph", "title": "Simulation of Non-Markovian Quantum Accelerated Dynamics via Time-Fractional Schrödinger Equation", "abstract": "The Time-Fractional Schrödinger Equation (TFSE) is an effective tool for simulating the dynamics of non-Markovian quantum systems. The Quantum Speed Limit (QSL) time characterizes the minimum time required for the evolution of a non-Markovian quantum system. In this paper, Wei's TFSE is employed to simulate the non-Markovian quantum accelerated evolution process in the Resonant Dissipative Jaynes-Cummings (RDJC) model. By solving the QSL time of a time-fractional single-qubit open system, the enhancement mechanism of the system evolution speed induced by the non-Markovian memory effects of the environment is revealed. Further studies show that the optimized acceleration of the system evolution can be achieved by jointly regulating the fractional order, coupling strength, and photon number. Comparative analyses indicate that Wei's TFSE can accurately capture the non-Markovian accelerated dynamical features of the system over the entire fractional order range, whereas Naber's TFSE is applicable only within a limited fractional order interval. In addition, the comparisons of the average simulation time for calculating the dynamical trajectory of the excited-state probability demonstrate that Wei's TFSE has a significant simulation advantage in computational efficiency. Therefore, Wei's TFSE is more accurate and efficient for simulating the accelerated dynamics of non-Markovian quantum systems.", "url": "https://arxiv.org/abs/2606.20024", "type": "理论+数值", "summary": "时间分数薛定谔方程 (TFSE) 是模拟非马尔可夫量子系统动力学的有效工具。量子速度极限（QSL）时间表征非马尔可夫量子系统演化所需的最短时间。本文采用Wei的TFSE来模拟共振耗散Jaynes-Cummings（RDJC）模型中的非马尔可夫量子加速演化过程。通过求解时间分数单量子位开放系统的QSL时间，揭示了环境非马尔可夫记忆效应引起的系统演化速度的增强机制。进一步的研究表明，通过联合调节分数阶、耦合强度和光子数可以实现系统演化的优化加速。对比分析表明，Wei 的 TFSE 可以在整个分数阶范围内准确捕捉系统的非马尔可夫加速动力学特征，而 Naber 的 TFSE 只能在有限的分数阶区间内适用。\n\n此外，计算激发态概率动力学轨迹的平均仿真时间的比较表明，Wei的TFSE在计算效率上具有显着的仿真优势。因此，Wei的TFSE对于模拟非马尔可夫量子系统的加速动力学更加准确和高效。", "authors": [{"name": "Dongmei Wei"}, {"name": "Junxiang Wang"}, {"name": "Hanxiu Xu"}, {"name": "Cancan Chen"}, {"name": "Jiaying Wu"}], "featured_authors": [{"name": "Dongmei Wei"}, {"name": "Junxiang Wang"}, {"name": "Hanxiu Xu"}, {"name": "Cancan Chen"}, {"name": "Jiaying Wu"}], "author_count": 5}, {"id": "2606.20123", "category": "quant-ph", "title": "QPU-scale randomized benchmarking via Bell-pair injection", "abstract": "Mirror randomized benchmarking (MRB) is an established technique that provides a global error metric at the scale of a whole QPU. To expand upon this we introduce Mirror Quantum Awesomeness (MQA), a hybrid protocol that adds a structured entangling layer to MRB circuits. This enables per-edge correlation dynamics to be tracked via mutual information while preserving the MRB infidelity estimate. The resulting analysis of the injected entangled pairs locates a critical circuit depth, beyond which rudimentary error mitigation techniques can be expected to fail. A topological variant, Topological MQA, supplies a second critical depth via a decoder based on the surface-code decoding problem. Both are validated in simulation and demonstrated on the 156-qubit \\texttt{ibm\\_fez} and \\texttt{ibm\\_kingston} processors, where MQA closely agrees with MRB on the entanglement infidelity and the critical depth for \\texttt{ibm\\_fez} is found to be $\\sim 50$.", "url": "https://arxiv.org/abs/2606.20123", "type": "理论+数值", "summary": "镜像随机基准测试 (MRB) 是一种成熟的技术，可提供整个 QPU 规模的全局误差度量。为了对此进行扩展，我们引入了 Mirror Quantum Awesomeness (MQA)，这是一种混合协议，可为 MRB 电路添加结构化纠缠层。这使得能够通过互信息跟踪每条边的相关动态，同时保留 MRB 不保真度估计。对注入纠缠对的分析结果确定了一个关键的电路深度，超过该深度，基本的错误缓解技术可能会失败。拓扑变体拓扑 MQA 通过基于表面代码解码问题的解码器提供第二个临界深度。两者均在仿真中得到验证，并在 156 量子位 \\texttt{ibm\\_fez} 和 \\texttt{ibm\\_kingston} 处理器上进行演示，其中 MQA 在纠缠不忠实性方面与 MRB 非常一致，并且发现 \\texttt{ibm\\_fez} 的临界深度为 $\\sim 50$。", "authors": [{"name": "Haripriya Pettugani"}, {"name": "María Aguado-Yáñez"}, {"name": "Astryd Park"}, {"name": "Daniel Bultrini"}, {"name": "James R. Wootton"}], "featured_authors": [{"name": "Haripriya Pettugani"}, {"name": "María Aguado-Yáñez"}, {"name": "Astryd Park"}, {"name": "Daniel Bultrini"}, {"name": "James R. Wootton"}], "author_count": 5}, {"id": "2606.20153", "category": "quant-ph", "title": "Optimizing resource allocation for accuracy in noisy variational quantum algorithms", "abstract": "For quantum algorithms to achieve their full potential, we need methodologies to optimize them, such as reaching a given output accuracy with minimal resource costs. Here, we develop such a methodology for a class of Noisy Intermediate-Scale Quantum (NISQ) algorithms. We leverage simulations of a Variational Quantum Eigensolver (VQE) to propose a phenomenological model of such algorithms that captures the complex relationship between algorithmic accuracy, algorithmic resource costs, and the noise that exists in realistic quantum hardware. For this, we take the algorithmic resource cost to be the total number of quantum gate-operations in the algorithm; minimizing this cost typically makes the algorithm faster and more energy-efficient. We consider the subtle trade-off between quantum circuit size (small circuits are too imprecise, but large ones are too noisy), and the number of iterations of that quantum circuit for the full algorithm to sufficiently converge. Using a noise-metric-resource methodology, we identify the sweet spot (of circuit size versus iterations) that minimizes the algorithmic resource costs for a desired algorithm accuracy. It also gives the circuit size that maximizes algorithm accuracy for a fixed resource cost. Our methodology provides a practical guideline for near-term deployment of variational algorithms on realistic noisy hardware, including hardware that uses error mitigation.", "url": "https://arxiv.org/abs/2606.20153", "type": "理论+数值", "summary": "为了充分发挥量子算法的潜力，我们需要优化它们的方法，例如以最小的资源成本达到给定的输出精度。在这里，我们为一类噪声中尺度量子（NISQ）算法开发了这样的方法。我们利用变分量子本征求解器 (VQE) 的模拟提出此类算法的现象学模型，该模型捕获算法准确性、算法资源成本和现实量子硬件中存在的噪声之间的复杂关系。为此，我们将算法资源成本视为算法中量子门操作的总数；最小化此成本通常会使算法更快、更节能。我们考虑量子电路尺寸（小电路太不精确，但大电路太嘈杂）和整个算法充分收敛的量子电路迭代次数之间的微妙权衡。使用噪声度量资源方法，我们确定了最佳点（电路大小与迭代的关系），可以最大限度地降低算法资源成本，从而实现所需的算法精度。\n\n它还给出了在固定资源成本下最大化算法精度的电路尺寸。我们的方法为近期在现实噪声硬件（包括使用错误缓解的硬件）上部署变分算法提供了实用指南。", "authors": [{"name": "Harshit Verma"}, {"name": "Thomas Ayral"}, {"name": "Alexia Auffèves"}, {"name": "Robert Whitney"}], "featured_authors": [{"name": "Harshit Verma"}, {"name": "Thomas Ayral"}, {"name": "Alexia Auffèves"}, {"name": "Robert Whitney"}], "author_count": 4}, {"id": "2606.20166", "category": "quant-ph", "title": "Applications of quantum annealing to magnetic dipole hyperfine structure constants: First results beyond energies for atoms", "abstract": "We report the first results of the magnetic dipole hyperfine structure (HFS) constants of neutral $\\mathrm{Li}$, Li-like $\\mathrm{Be}$, neutral $\\mathrm{Na}$, and Na-like $\\mathrm{Mg}$ using a modified version of the Quantum Annealer Eigensolver (QAE) algorithm on D-Wave's quantum hardware. The results are benchmarked against relativistic configuration interaction with multiconfiguration Dirac Hartree-Fock (MCDHF) calculations using the General-purpose Relativistic Atomic Structure Package (GRASP), and simulated annealing. In our modified QAE, a zooming-and-sigma-annealing approach with a floating-point encoding scheme is adopted to estimate the ground-state eigenvalue and eigenvector of the relativistic Dirac-Coulomb Hamiltonian matrices ($H_{\\mathrm{DC}}$) constructed from 11 or fewer configuration state functions (CSFs). For calculations with extended correlation orbital sets, we applied a CSF truncation scheme, retaining only CSFs (up to 12) that make significant contributions to the ground-state wavefunction. Our modified QAE precision is kept limited to three decimal places (up to 10 qubits). Hardware demonstrations on the D-Wave quantum processing unit (QPU) yielded results that were completely consistent with GRASP (at the chosen precision) in determining the magnetic dipole HFS constants, with accuracy varying across systems and $H_{\\mathrm{DC}}$ matrix dimensions.", "url": "https://arxiv.org/abs/2606.20166", "type": "理论+数值", "summary": "我们在 D-Wave 量子硬件上使用量子退火本征解算器 (QAE) 算法的修改版本，报告了中性 $\\mathrm{Li}$、类 Li $\\mathrm{Be}$、中性 $\\mathrm{Na}$ 和类 Na $\\mathrm{Mg}$ 的磁偶极超精细结构 (HFS) 常数的第一个结果。结果以使用通用相对论原子结构包 (GRASP) 和模拟退火的多配置 Dirac Hartree-Fock (MCDHF) 计算的相对论配置相互作用为基准。在我们改进的 QAE 中，采用浮点编码方案的缩放和西格玛退火方法来估计由 11 个或更少的配置状态函数 (CSF) 构造的相对论狄拉克-库仑哈密顿矩阵 ($H_{\\mathrm{DC}}$) 的基态特征值和特征向量。对于扩展相关轨道集的计算，我们应用了 CSF 截断方案，仅保留对基态波函数做出重大贡献的 CSF（最多 12 个）。我们修改后的 QAE 精度限制为小数点后三位（最多 10 个量子位）。\n\nD-Wave 量子处理单元 (QPU) 上的硬件演示在确定磁偶极子 HFS 常数时产生了与 GRASP 完全一致的结果（在选定的精度下），精度因系统和 $H_{\\mathrm{DC}}$ 矩阵尺寸而异。", "authors": [{"name": "Boni Paul"}, {"name": "Subimal Deb"}, {"name": "Per Jönsson"}, {"name": "Jörgen Ekman"}, {"name": "Bhanu Pratap Das"}], "featured_authors": [{"name": "Boni Paul"}, {"name": "Subimal Deb"}, {"name": "Per Jönsson"}, {"name": "Jörgen Ekman"}, {"name": "Bhanu Pratap Das"}], "author_count": 5}, {"id": "2606.20176", "category": "quant-ph", "title": "Quantum-Accelerated Self-Consistent Field: A Hybrid Algorithm", "abstract": "We present the Grover adaptive search self-consistent field (GAS-SCF) algorithm. GAS-SCF leverages quantum arithmetic to construct an efficient oracle that marks target states (Fock states) which improve upon some initial classical energy estimate. Amplitude amplification then increases the probability of measuring these states. This approach offers a theoretical quadratic speed-up for the optimization problem encountered in SCF quantum chemistry and establishes a baseline against which structured optimization algorithms, such as QAOA and DQI may be compared. In this work, we classically simulate three examples as proofs of concept of the algorithm, the largest consisting of 26 qubits. We then extend our analysis to two larger systems, with O3 representing the largest case at 330 qubits. These examples are chosen to probe classically challenging SCF regimes. Achieving chemically relevant applications of GAS-SCF will require large-scale, fault-tolerant quantum hardware.", "url": "https://arxiv.org/abs/2606.20176", "type": "理论+数值", "summary": "我们提出了 Grover 自适应搜索自洽场 (GAS-SCF) 算法。 GAS-SCF 利用量子算术构建一个高效的预言机，标记目标状态（福克状态），从而改进一些初始经典能量估计。然后幅度放大增加了测量这些状态的概率。这种方法为 SCF 量子化学中遇到的优化问题提供了理论上的二次加速，并建立了可以与结构化优化算法（例如 QAOA 和 DQI）进行比较的基线。在这项工作中，我们经典地模拟了三个示例作为算法的概念证明，最大的由 26 个量子位组成。然后，我们将分析扩展到两个更大的系统，其中 O3 代表最大的情况，为 330 个量子位。选择这些例子是为了探索具有经典挑战性的 SCF 机制。实现 GAS-SCF 的化学相关应用将需要大规模、容错的量子硬件。", "authors": [{"name": "Alexis Ralli"}, {"name": "Tim Weaving"}, {"name": "Thomas M. Bickley"}, {"name": "Peter V. Coveney"}, {"name": "Peter J. Love"}], "featured_authors": [{"name": "Alexis Ralli"}, {"name": "Tim Weaving"}, {"name": "Thomas M. Bickley"}, {"name": "Peter V. Coveney"}, {"name": "Peter J. Love"}], "author_count": 5}, {"id": "2606.20184", "category": "quant-ph", "title": "Operator Learning for efficient Quantum Computation", "abstract": "An efficient implementation of quantum algorithms is often hindered by the lack of efficient primitives for operators and state preparation. This limits both the ability of near-term quantum hardware to simulate complex problems and the potential of fault-tolerant algorithms to achieve practical quantum advantage. To address this, we propose a full-stack variational framework that transforms arbitrary operators to compact quantum circuits. The resulting variational circuits can be tailored to the connectivity and long-range interaction of the target hardware. The learning process employs backpropagation together with a cost function that efficiently optimizes unitary operators and non-unitary -- dense or sparse -- operators using only a single ancilla qubit for block encoding. Additionally, we introduce a regularization term that reduces the approximation error. The approach is validated for both quantum mechanical and engineering applications. In the former case, we learn propagators that arise in native quantum problems -- such as quantum simulation and quantum chemistry -- and achieve improved resource scaling in comparison to standard Suzuki-Trotter expansions. In the latter case, we demonstrate the approach's ability to implement the second-order central finite difference approximation of the Laplace operator -- relevant for solving partial differential equations -- while improving upon current error metrics. The final example deals with learning a dense, non-unitary operator that arises in the analysis of inviscid potential flow around an airfoil. This universality of the framework opens the door for solving general problems beyond prototypical engineering and quantum applications.", "url": "https://arxiv.org/abs/2606.20184", "type": "理论+数值", "summary": "量子算法的有效实现常常因缺乏有效的算子和状态准备原语而受到阻碍。这既限制了近期量子硬件模拟复杂问题的能力，也限制了容错算法实现实际量子优势的潜力。为了解决这个问题，我们提出了一个全栈变分框架，将任意算子转换为紧凑的量子电路。由此产生的变分电路可以根据目标硬件的连接性和远程交互进行定制。学习过程采用反向传播和成本函数，仅使用单个辅助量子位进行块编码，有效地优化酉算子和非酉算子（密集或稀疏）算子。此外，我们引入了一个正则化项来减少近似误差。该方法经过了量子力学和工程应用的验证。在前一种情况下，我们学习在原生量子问题（例如量子模拟和量子化学）中出现的传播器，并与标准 Suzuki-Trotter 展开相比实现了改进的资源扩展。\n\n在后一种情况下，我们证明了该方法能够实现拉普拉斯算子的二阶中心有限差分近似（与求解偏微分方程相关），同时改进当前的误差度量。最后一个示例涉及学习密集的非单一算子，该算子是在分析机翼周围的无粘势流时出现的。该框架的这种通用性为解决原型工程和量子应用之外的一般问题打开了大门。", "authors": [{"name": "Paul Over"}, {"name": "Sergio Bengoechea"}, {"name": "Leonardo Borello Busilacchi"}, {"name": "Martin Kiffner"}, {"name": "Thomas Rung"}, {"name": "Alexios A. Michailidis"}], "featured_authors": [{"name": "Paul Over"}, {"name": "Sergio Bengoechea"}, {"name": "Leonardo Borello Busilacchi"}, {"name": "Martin Kiffner"}, {"name": "Thomas Rung"}, {"name": "Alexios A. Michailidis"}], "author_count": 6}, {"id": "2606.20271", "category": "quant-ph", "title": "Extracting the physical content of Liouvillian eigenmodes: Semiclassical quantization", "abstract": "Unlike in closed quantum systems where individual energy eigenstates are understood as physical excitations, open quantum systems have distinct right and left eigenstates of the Liouvillian that decay with time and are difficult to interpret. Here we introduce a physically motivated quasiprobability measure combining the two types of eigenstates that interprets a Liouville eigenmode as a set of coherences. This coherence measure is intimately connected to the return probability and allows one to visualize the modes as quasiprobability distributions in a \"doubled\" phase space. Using this measure we show that, remarkably, an oscillator retains its quantized \"orbits\" in phase space for a large class of linear and nonlinear damping, thus providing a formulation of semiclassical quantization for open systems. The orbits have measurable dynamical signatures and are broadened in the presence of a thermal bath, similar to energy levels. For quadratic systems, our results yield an extension of the concept of invariant tori, which play a central role in Hamiltonian systems.", "url": "https://arxiv.org/abs/2606.20271", "type": "理论", "summary": "与封闭量子系统中个体能量本征态被理解为物理激发不同，开放量子系统具有明显的刘维尔右本征态和左本征态，它们随时间衰减并且难以解释。在这里，我们引入了一种物理驱动的准概率测度，结合了两种类型的本征态，将刘维尔本征模解释为一组相干性。这种相干性测量与返回概率密切相关，并且允许人们将模式可视化为“双倍”相空间中的准概率分布。使用这种测量方法，我们发现，值得注意的是，振荡器在相空间中保留了一大类线性和非线性阻尼的量化“轨道”，从而为开放系统提供了半经典量化的公式。这些轨道具有可测量的动力学特征，并且在存在热浴的情况下会变宽，类似于能级。对于二次系统，我们的结果产生了不变环面概念的扩展，它在哈密顿系统中发挥着核心作用。", "authors": [{"name": "Ashlin V Thomas"}, {"name": "Felix Fritzsch"}, {"name": "Masudul Haque"}, {"name": "Shovan Dutta"}], "featured_authors": [{"name": "Ashlin V Thomas"}, {"name": "Felix Fritzsch"}, {"name": "Masudul Haque"}, {"name": "Shovan Dutta"}], "author_count": 4}, {"id": "2606.20278", "category": "quant-ph", "title": "Proposal of quantum arrival-time measurement with a Bose-Einstein condensate", "abstract": "This work shows how a Bose-Einstein condensate of ultracold atoms could be used to address a long-standing question in quantum theory: how much time does it take for a particle to reach a detector? To this end, we propose a realistic experimental setup, whose key idea is not to measure arrival times directly, but the arrival flux on the detector as a function of its position. This novel approach not only solves practical issues with having a detector close to the system, but also results in signals that allow to unambiguously distinguish different theoretical predictions. This proposal raises prospects for resolving the decades-old debate on this fundamental issue.", "url": "https://arxiv.org/abs/2606.20278", "type": "实验", "summary": "这项工作展示了如何使用超冷原子的玻色-爱因斯坦凝聚来解决量子理论中长期存在的问题：粒子到达探测器需要多长时间？为此，我们提出了一种现实的实验装置，其关键思想不是直接测量到达时间，而是测量探测器上的到达通量作为其位置的函数。这种新颖的方法不仅解决了探测器靠近系统的实际问题，而且产生了能够明确地区分不同理论预测的信号。该提案为解决有关这一根本问题数十年的争论带来了前景。", "authors": [{"name": "Pascal Naidon"}, {"name": "Lucas Happ"}, {"name": "Denis Boiron"}], "featured_authors": [{"name": "Pascal Naidon"}, {"name": "Lucas Happ"}, {"name": "Denis Boiron"}], "author_count": 3}, {"id": "2606.20306", "category": "quant-ph", "title": "Quantum Batteries as Work Sources for Phase-Locked Parametric Amplification", "abstract": "Quantum batteries have been proposed as locally precharged work sources for superconducting quantum technologies, suggesting a route to reduce continuously supplied microwave drives. Here we ask whether the pump tone of a quantum-limited parametric amplifier can be replaced, or strongly duty-cycled, by a finite bosonic quantum battery. Quantizing the pump of a nondegenerate parametric amplifier exposes a resource distinction hidden in the classical description: stored pump energy can generate signal-idler photons, but pump phase coherence is required to generate a phase-locked amplifier field. In a closed trilinear model, coherent and phase-randomized coherent pumps with the same photon-number distribution produce comparable pair numbers, yet only the coherent pump produces anomalous two-mode coherence and an EPR-squeezed interference dip. Including leakage, we collect the emitted fields into cascaded temporal modes. At matched collector bandwidth, the coherent pump gives \\(I_{\\min}^{(f)}=0.553\\), whereas the phase-randomized pump gives \\(I_{\\min}^{(f)}=1.94\\) at nearly identical collected energy. Weak amplitude squeezing slightly improves the dip by reducing finite-pump number fluctuations while preserving the coherent displacement. Thus battery-powered parametric amplification requires phase-coherent stored energy, possibly assisted by number-noise reduction, rather than stored energy alone.", "url": "https://arxiv.org/abs/2606.20306", "type": "理论", "summary": "量子电池已被提议作为超导量子技术的局部预充电工作源，这提出了一种减少连续供电的微波驱动的途径。在这里，我们询问量子限制参量放大器的泵浦音是否可以被有限玻色子量子电池取代或强占空比。量化非简并参量放大器的泵浦揭示了隐藏在经典描述中的资源区别：存储的泵浦能量可以生成信号闲频光子，但需要泵浦相位相干性来生成锁相放大器场。在闭合三线性模型中，具有相同光子数分布的相干和相位随机相干泵浦产生可比的对数，但只有相干泵浦产生反常二模相干性和EPR压缩干涉倾角。包括泄漏，我们将发射场收集到级联时间模式中。在匹配的收集器带宽下，相干泵浦给出\\(I_{\\min}^{(f)}=0.553\\)，而相位随机泵浦在几乎相同的收集能量下给出\\(I_{\\min}^{(f)}=1.94\\)。\n\n弱振幅压缩通过减少有限泵浦数波动同时保留相干位移来稍微改善倾角。因此，电池供电的参数放大需要相位相干的存储能量，可能需要通过数噪声降低来辅助，而不是单独存储能量。", "authors": [{"name": "Borhan Ahmadi"}], "featured_authors": [{"name": "Borhan Ahmadi"}], "author_count": 1}, {"id": "2606.20313", "category": "quant-ph", "title": "Entanglement structure of the dynamical phases in the sub-Ohmic spin-boson model", "abstract": "The sub-Ohmic spin-boson model exhibits three distinct dynamical regimes in its spin population dynamics, classified as coherent, incoherent, and pseudo-coherent. Whether these regimes correspond to distinct spin-bath entanglement structures remains an open question. Here we address this using tree tensor network states with projector-splitting time evolution (TTN-TDVP-PS), scanning a broad grid in the sub-Ohmic $(s, \\alpha)$ plane. We find that the spin entanglement entropy $S_\\mathrm{spin}(t)$ reaches a stationary plateau on a timescale shorter than the polarization relaxation, enabling construction of a stationary entropy landscape from the stationary value $S_\\mathrm{stable}$. Within this scalar entropy landscape, the entropy ridge broadly follows the population-based phase boundary at small $s$, but does not reproduce the two-branch structure at large $s$. The ridge remains single-valued within the incoherent region rather than separately tracking both population-based transitions. The Bloch-sphere representation provides a geometric interpretation of this behavior. The entropy plateau corresponds to trajectories settling onto constant-radius shells, with the ridge marking the parameters of smallest stationary Bloch radius. Mode-resolved bath entanglement shows that low-frequency modes dominate the environmental entropy scale and that coherent dynamics enhance bath-mode correlations beyond direct spin--mode correlations. These results establish the stationary spin entanglement entropy as a physically informative observable that complements population-based classifications of dissipative quantum dynamics.", "url": "https://arxiv.org/abs/2606.20313", "type": "理论+数值", "summary": "亚欧姆自旋玻色子模型在其自旋布居动力学中表现出三种不同的动力学机制，分为相干、非相干和伪相干。这些机制是否对应于不同的旋转浴纠缠结构仍然是一个悬而未决的问题。在这里，我们使用具有投影分割时间演化（TTN-TDVP-PS）的树张量网络状态来解决这个问题，扫描亚欧姆 $(s, alpha)$ 平面中的广泛网格。我们发现自旋纠缠熵 $S_\\mathrm{spin}(t)$ 在比极化弛豫更短的时间尺度上达到稳态平台，从而能够从稳态值 $S_\\mathrm{stable}$ 构建稳态熵景观。在这个标量熵景观中，熵脊在小$s$处大致遵循基于群体的相边界，但在大$s$处不再现两分支结构。山脊在不连贯的区域内保持单值，而不是单独跟踪基于人口的转变。布洛赫球体表示提供了这种行为的几何解释。\n\n熵平台对应于恒定半径壳上的轨迹，脊标记最小静止布洛赫半径的参数。模式解析的浴纠缠表明，低频模式在环境熵尺度中占主导地位，并且相干动力学增强了浴模式相关性，超出了直接自旋模式相关性。这些结果将稳态自旋纠缠熵确立为一种物理信息丰富的可观察量，补充了基于群体的耗散量子动力学分类。", "authors": [{"name": "Cunxi Gong"}, {"name": "Zirui Sheng"}, {"name": "Weitang Li"}], "featured_authors": [{"name": "Cunxi Gong"}, {"name": "Zirui Sheng"}, {"name": "Weitang Li"}], "author_count": 3}, {"id": "2606.20316", "category": "quant-ph", "title": "Exploiting More Than Symmetry in Variational Quantum Machine Learning", "abstract": "The success of variational quantum learning models crucially depends on choosing parametrizations that reflect the structure of the problem at hand. Symmetries provide one of the clearest such structures: whenever transformations of the input leave the desired outcome unchanged, this invariance should be built into the model rather than discovered during training. However, imposing a symmetry does not by itself determine a useful ansatz. Even within the symmetry-preserving space, one must decide where the trainable degrees of freedom should be placed. In this work, we study this remaining design freedom in equivariant variational quantum circuits. Building on symmetry-based parameter sharing, we disentangle two architectural choices: how much symmetry should be enforced, and which symmetry-respecting interactions should be trainable. Using Tic-Tac-Toe as a fully enumerable and structurally transparent test case, we find that suitable subgroups preserve most of the generalization benefit. By contrast, the dominant gains arise from gates acting directly on decisive task motifs. Thus, symmetry defines the admissible design space, while effective ansatze require an additional task-informed choice of trainable interactions.", "url": "https://arxiv.org/abs/2606.20316", "type": "理论+数值", "summary": "变分量子学习模型的成功关键取决于选择反映当前问题结构的参数化。对称性提供了最清晰的此类结构之一：只要输入的转换使期望的结果保持不变，这种不变性就应该构建到模型中，而不是在训练过程中发现。然而，强加对称性本身并不能确定有用的拟像。即使在保持对称的空间内，也必须决定可训练的自由度应放置在哪里。在这项工作中，我们研究了等变变分量子电路中剩余的设计自由度。在基于对称性的参数共享的基础上，我们区分了两种架构选择：应该强制执行多少对称性，以及哪些尊重对称性的交互应该是可训练的。使用 Tic-Tac-Toe 作为完全可枚举且结构透明的测试用例，我们发现合适的子组保留了大部分泛化优势。相比之下，主要收益来自直接作用于决定性任务主题的门。\n\n因此，对称性定义了可接受的设计空间，而有效的设计则需要额外的基于任务的可训练交互选择。", "authors": [{"name": "Markus Baumann"}, {"name": "Claudia Linnhoff-Popien"}], "featured_authors": [{"name": "Markus Baumann"}, {"name": "Claudia Linnhoff-Popien"}], "author_count": 2}, {"id": "2606.20380", "category": "quant-ph", "title": "Discrimination of genuinely nonlocal sets without entanglement in multipartite systems", "abstract": "Genuine nonlocality arises when a set of multipartite orthogonal states is locally indistinguishable under any bipartition of the subsystems. The entanglement-assisted discrimination of such genuinely nonlocal orthogonal product sets has attracted significant attention in quantum information. Based on the criterion of local irreducibility, genuine nonlocality is classified into Type I (reducible) and Type II (irreducible). We present entanglement-assisted discrimination schemes for both types of genuinely nonlocal sets that use minimal resources. For low-dimensional cases, Type I sets require only a single EPR pair, whereas Type II sets necessitate only one GHZ state. We extend these protocols to higher-dimensional systems: the discrimination of Type I sets requires only one maximally entangled state in a two-qutrit system, while that of Type II sets similarly demands a single maximally entangled state in a three-qutrit system. For $n$-partite ($n > 3$) systems, Type I sets continue to require only one maximally entangled state, whereas Type II sets necessitate just one additional EPR pair compared to their Type I counterparts. These results provide a robust framework for the efficient discrimination of genuinely nonlocal sets using minimal quantum resources.", "url": "https://arxiv.org/abs/2606.20380", "type": "理论", "summary": "当一组多部分正交状态在子系统的任何二分下局部不可区分时，就会出现真正的非定域性。这种真正的非局域正交积集的纠缠辅助判别已经引起了量子信息领域的广泛关注。根据局部不可约性准则，真正的非定域性分为I型（可约）和II型（不可约）。我们为使用最少资源的两种类型的真正非局部集提出了纠缠辅助判别方案。对于低维情况，I 类集仅需要单个 EPR 对，而 II 类集仅需要一个 GHZ 状态。我们将这些协议扩展到更高维的系统：I 型集合的辨别仅需要二量子体系统中的一个最大纠缠态，而 II 型集合的鉴别同样需要三量子体系统中的单个最大纠缠态。对于 $n$ 分体 ($n > 3$) 系统，I 型集合仍然只需要一个最大纠缠态，而 II 型集合与 I 型对应系统相比只需要一对额外的 EPR 对。\n\n这些结果为使用最少的量子资源有效区分真正的非局域集提供了一个强大的框架。", "authors": [{"name": "Ziying Hou"}, {"name": "Huaqi Zhou"}, {"name": "Limin Gao"}], "featured_authors": [{"name": "Ziying Hou"}, {"name": "Huaqi Zhou"}, {"name": "Limin Gao"}], "author_count": 3}, {"id": "2606.20385", "category": "quant-ph", "title": "Sparse Configuration Interaction for the Electronic Schrödinger Equation Revisited: Complete Basis Set Limit Complexity and Quantum-Encoding Impact", "abstract": "In this article we revisit regularity results for eigenfunctions in the discrete spectrum of the electronic Schrödinger equation and study their consequences for approximation complexity. In particular, for the convergence to the complete basis set limit, it can be shown that the curse of dimensionality in the leading algebraic exponent can be mitigated. That is, for general sparse grid constructions, the main term of the convergence rate with respect to the number of degrees of freedom is independent of the number of electrons. These insights indicate potential benefits for classical numerical solvers of the electronic Schrödinger equation and also for quantum-computing approaches through new qubit-efficient wavefunction encodings.", "url": "https://arxiv.org/abs/2606.20385", "type": "理论+数值", "summary": "在本文中，我们重新审视电子薛定谔方程离散谱中本征函数的正则性结果，并研究它们对近似复杂性的影响。特别是，对于收敛到完全基组极限，可以证明可以减轻主要代数指数中的维数灾难。也就是说，对于一般的稀疏网格结构，关于自由度数量的收敛速度的主要项与电子数量无关。这些见解表明了电子薛定谔方程的经典数值求解器以及通过新的量子位高效波函数编码的量子计算方法的潜在好处。", "authors": [{"name": "Michael Griebel"}, {"name": "Jan Hamaekers"}], "featured_authors": [{"name": "Michael Griebel"}, {"name": "Jan Hamaekers"}], "author_count": 2}, {"id": "2606.20513", "category": "quant-ph", "title": "Approximating optimal decoding of quantum LDPC codes with narrow frontiers", "abstract": "We introduce the Frontier decoder, a pruned dynamic-programming decoder for sparse quantum decoding problems. Frontier processes error variables in a chosen order, merges prefixes with the same residual syndrome and logical label, and approximates logical-coset posterior masses by retaining only a narrow scored frontier. Without pruning, the recursion is exact ordered inference with exponential complexity. In the code-capacity setting, the decoder reaches thresholds close to optimal for the surface code and the color code. In the circuit-level noise model, it achieves state-of-the-art performance with a very small average retained list size: less than 100 for the gross code $[[144,12,12]]$ at a physical error rate of $0.001$. When the list size is constant, the decoder has linear complexity, suggesting the possibility of low-latency implementations.", "url": "https://arxiv.org/abs/2606.20513", "type": "理论", "summary": "我们介绍了 Frontier 解码器，这是一种用于稀疏量子解码问题的修剪动态编程解码器。前沿以选定的顺序处理错误变量，合并具有相同残留综合症和逻辑标签的前缀，并通过仅保留狭窄的评分前沿来近似逻辑陪集后部质量。在没有剪枝的情况下，递归是具有指数复杂度的精确有序推理。在代码容量设置中，解码器达到表面代码和颜色代码接近最佳的阈值。在电路级噪声模型中，它以非常小的平均保留列表大小实现了最先进的性能：总代码 $[[144,12,12]]$ 小于 100，物理错误率为 $0.001$。当列表大小恒定时，解码器具有线性复杂度，这表明低延迟实现的可能性。", "authors": [{"name": "Anthony Leverrier"}, {"name": "Rüdiger Urbanke"}], "featured_authors": [{"name": "Anthony Leverrier"}, {"name": "Rüdiger Urbanke"}], "author_count": 2}, {"id": "2606.20519", "category": "quant-ph", "title": "GPU-accelerated semidefinite programming for causal games", "abstract": "The process matrix formalism describes quantum correlations in scenarios without a fixed causal order between local laboratories. Operational signatures of such correlations can be investigated through causal games. A paradigmatic example is the Guess-Your-Neighbour's-Input game, in which two parties attempt to guess each other's inputs. Correlations compatible with any definite, or probabilistically mixed, causal order cannot achieve a winning probability exceeding $1/2$. The best process-matrix strategy currently known attains a value of approximately $0.6218$ using local dimension $d=5$, while the strongest known dimension-independent upper bound is $0.7592$. In this work, we investigate whether increasing the local dimension beyond $d = 5$ can narrow this gap. To this end, we employ a see-saw optimization scheme in which each step is formulated as a semidefinite program. For scalability, we develop a custom implementation of the SCS solver in which the dominant computational cost, the projection onto the positive-semidefinite cone, is offloaded to a GPU, yielding a six-fold speedup. Using this implementation, we explore local dimensions up to $d = 8$, and we do not find significant improvements over the value at $d=5$. Our results suggest that either qualitatively different strategies are required to approach the known upper bound, or that the bound itself is not tight.", "url": "https://arxiv.org/abs/2606.20519", "type": "理论+数值", "summary": "过程矩阵形式描述了当地实验室之间没有固定因果顺序的情况下的量子相关性。这种相关性的操作特征可以通过因果博弈来研究。一个典型的例子是“猜测你邻居的输入”游戏，其中两方试图猜测对方的输入。与任何确定的或概率混合的因果顺序兼容的相关性无法实现超过 $1/2$ 的获胜概率。目前已知的最佳过程矩阵策略使用局部维度 $d=5$ 获得的值约为 $0.6218$，而已知最强的维度无关上限为 $0.7592$。在这项工作中，我们研究了将局部维度增加到 $d = 5$ 以上是否可以缩小这一差距。为此，我们采用了跷跷板优化方案，其中每个步骤都被制定为半定程序。为了可扩展性，我们开发了 SCS 求解器的自定义实现，其中主要的计算成本（正半定锥上的投影）被卸载到 GPU，从而实现六倍的加速。\n\n使用此实现，我们探索了高达 $d = 8$ 的局部维度，并且我们没有发现相对于 $d=5$ 的值有显着改进。我们的结果表明，要么需要性质不同的策略来接近已知的上限，要么界限本身并不严格。", "authors": [{"name": "Emanuel-Cristian Boghiu"}, {"name": "Kyrylo Simonov"}], "featured_authors": [{"name": "Emanuel-Cristian Boghiu"}, {"name": "Kyrylo Simonov"}], "author_count": 2}, {"id": "2606.20551", "category": "quant-ph", "title": "Benchmark of quantum algorithms for ground state preparation in the presence of noise", "abstract": "We compare the performance of representative cooling, adiabatic, and optimization algorithms for ground-state preparation in the presence of noise. Using an exactly solvable family of quadratic fermionic Hamiltonians subject to depolarizing noise, we derive the scaling of the achievable relative energy as a function of the noise rate and support these results with numerical simulations. The Hamiltonian exhibits two phases, separated by a quantum phase transition. As expected, the performance of the different algorithms depends on the phase: adiabatic evolution is favorable in the trivial phase, while a multi-frequency cooling algorithm, as proposed in [1], becomes competitive or superior in the topological phase, where gap-closing limits adiabatic protocols. We further present numerical results for the quantum approximate optimization algorithm [2], showing that it performs competitively with cooling in the trivial phase but is typically outperformed in the topological regime. Finally, we show that for this model the cooling protocol exhibits enhanced robustness to parameter imperfections, highlighting its potential advantage for realistic implementations of noisy quantum state preparation. The analytical approach developed here, in conjunction with numerical validation, establishes an extendable approach to benchmarking ground-state preparation algorithms.", "url": "https://arxiv.org/abs/2606.20551", "type": "理论+数值", "summary": "我们比较了在存在噪声的情况下用于基态准备的代表性冷却、绝热和优化算法的性能。使用受去极化噪声影响的精确可解的二次费米子哈密顿量族，我们推导了可实现的相对能量作为噪声率函数的比例，并通过数值模拟支持这些结果。哈密​​顿量表现出两个相，由量子相变分开。正如预期的那样，不同算法的性能取决于阶段：绝热演化在平凡阶段是有利的，而如[1]中提出的多频冷却算法在拓扑阶段变得具有竞争力或优越，其中间隙闭合限制了绝热协议。我们进一步给出了量子近似优化算法 [2] 的数值结果，表明它在平凡阶段的冷却性能具有竞争力，但在拓扑状态下通常表现出色。\n\n最后，我们表明，对于该模型，冷却协议对参数缺陷表现出增强的鲁棒性，突出了其在噪声量子态制备的实际实现中的潜在优势。这里开发的分析方法与数值验证相结合，建立了一种可扩展的方法来对基态制备算法进行基准测试。", "authors": [{"name": "Daniel Molpeceres"}, {"name": "Sirui Lu"}, {"name": "J. Ignacio Cirac"}, {"name": "Barbara Kraus"}], "featured_authors": [{"name": "Daniel Molpeceres"}, {"name": "Sirui Lu"}, {"name": "J. Ignacio Cirac"}, {"name": "Barbara Kraus"}], "author_count": 4}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
