  <style>

  <script>
    const papers = [{"id": "2606.12512", "category": "cond-mat", "title": "Spin correlations, low-energy scales, and anisotropy scaling in kagome frustrated magnets", "abstract": "Neutron scattering is central to identifying quantum states of magnetic materials. In the search for quantum spin liquids, broad spectral features of inelastic spectra have been cited as evidence for spinon excitations, but can also arise from magnon excitations excitations in the presence of quenched disorder and strong magnon interactions. We develop a new approach to this problem, based on the adiabatic continuity in the $XXZ$ Heisenberg model on geometrically frustrating (GF) lattices as a function of the model's anisotropy. Using this approach, we identify universal features and energies of finite-temperature spin correlators. Focusing on the kagome lattice, we show that the low-energy spin spectral function contains robust, momentum-independent peaks with frequencies: $\\omega_1 \\approx 3.4 T^*$ and $\\omega_2 \\approx 6.3 T^*$, where the ``hidden energy scale'' $T^*$ is the characteristic scale of a low-temperature peak in the heat capacity, at which many GF magnets also display spin-glass freezing. We show that the spectral features at low energies $\\omega\\lesssim T^*$ arise from single-magnon scattering and identify the magnetizations of the respective excitations. We explore the evolution of the spectral features with temperature and discuss extensions to other GF lattices. Our results provide a sharp spectroscopic criterion for interpreting neutron scattering in kagome and other GF quantum magnets.", "url": "https://arxiv.org/abs/2606.12512", "type": "理论", "summary": "中子散射对于识别磁性材料的量子态至关重要。在寻找量子自旋液体时，非弹性光谱的宽光谱特征已被引用作为自旋激发的证据，但也可以在存在猝灭无序和强磁振子相互作用的情况下由磁振子激发产生。我们开发了一种解决此问题的新方法，该方法基于几何令人沮丧 (GF) 晶格上的 $XXZ$ 海森堡模型中的绝热连续性作为模型各向异性的函数。使用这种方法，我们确定了有限温度自旋相关器的通用特征和能量。着眼于戈薇晶格，我们表明低能自旋谱函数包含鲁棒的、与动量无关的峰值，其频率为：$\\omega_1 \\approx 3.4 T^*$ 和 $\\omega_2 \\approx 6.3 T^*$，其中“隐藏能量尺度”$T^*$ 是热容中低温峰值的特征尺度，在该温度下许多 GF 磁体也表现出自旋玻璃冻结。我们表明，低能量 $\\omega\\lesssim T^*$ 下的光谱特征源自单磁振子散射，并识别了各自激励的磁化强度。\n\n我们探索光谱特征随温度的演变，并讨论对其他 GF 晶格的扩展。我们的结果为解释 kagome 和其他 GF 量子磁体中的中子散射提供了清晰的光谱标准。", "authors": [{"name": "Phillip Popp"}, {"name": "Stephan Rosenkranz"}, {"name": "Arthur P. Ramirez"}, {"name": "Sergey Syzranov"}], "featured_authors": [{"name": "Phillip Popp"}, {"name": "Stephan Rosenkranz"}, {"name": "Arthur P. Ramirez"}, {"name": "Sergey Syzranov"}], "author_count": 4}, {"id": "2606.12525", "category": "cond-mat", "title": "Composite Quantum Geometry and Semiclassical Dynamics", "abstract": "We derive semiclassical equations of motion for general composite bound states in insulators and semiconductors, covering excitations such as excitons and trions. For neutral composites we find that a uniform external electric field does not couple to a Berry curvature term, contrary to the naive expectation from single-electron dynamics. Instead, a distinct quantum geometric quantity appears generically in the equations of motion. This quantity is the difference between inequivalent Berry connections that can be defined for the composite, generalising the concept of the quantum geometric dipole previously studied for excitons. In the case of charged composites such as trions, we find an additional Berry curvature contribution to the equations of motion. As we demonstrate, however, there is an infinite family of inequivalent composite Berry curvatures, and so care must be taken to make the correct choice that describes the physical dynamics. We explain how this choice should be made dependent on the definition of a spatial centre for the composite. We end by discussing composite dynamics that have no single-electron counterpart. We find that trions in magic-angle twisted bilayer graphene undergo a transverse drift under an applied electric field and that this is driven not only by the Berry curvature contribution but also by the quantum geometric dipole. The interplay of these two geometric contributions further imprints itself on the trion's internal dynamics, causing its dipole moment to oscillate in time.", "url": "https://arxiv.org/abs/2606.12525", "type": "理论", "summary": "我们推导出绝缘体和半导体中一般复合束缚态的半经典运动方程，涵盖激子和三重子等激发态。对于中性复合材料，我们发现均匀的外部电场不会耦合到贝里曲率项，这与单电子动力学的天真预期相反。相反，一个独特的量子几何量一般出现在运动方程中。这个量是可以为复合材料定义的不等价贝里连接之间的差异，概括了先前研究的激子的量子几何偶极子的概念。在带电复合材料（例如三重子）的情况下，我们发现贝里曲率对运动方程有额外的贡献。然而，正如我们所证明的，存在无限个不等价复合贝里曲率族，因此必须小心做出描述物理动力学的正确选择。我们解释了如何根据复合材料的空间中心的定义来做出这种选择。最后我们讨论没有单电子对应物的复合动力学。\n\n我们发现魔角扭曲双层石墨烯中的三重子在施加电场下会经历横向漂移，这不仅是由贝里曲率贡献驱动的，而且还受到量子几何偶极子的驱动。这两个几何贡献的相互作用进一步在三重子的内部动力学上留下了印记，导致其偶极矩随时间振荡。", "authors": [{"name": "Henry Davenport"}, {"name": "Yoonseok Hwang"}, {"name": "Johannes Knolle"}, {"name": "Frank Schindler"}], "featured_authors": [{"name": "Henry Davenport"}, {"name": "Yoonseok Hwang"}, {"name": "Johannes Knolle"}, {"name": "Frank Schindler"}], "author_count": 4}, {"id": "2606.12538", "category": "cond-mat", "title": "Influence-solvability: a systematic theory of $(1+1)D$ solvability and its application to brickwork circuits", "abstract": "`Solvable' circuits, such as dual unitaries and its generalisations, have arisen as paradigmatic examples of tractable chaotic non-equilibrium dynamics, both in classical and quantum systems. However, while increasingly more complicated sufficient conditions have been proposed, a systematic theory classifying and understanding general features of solvable circuits is missing. We develop such a theory by introducing influence-solvable circuits, a class of $(1+1)D$ circuits whose influence matrix, which represents the `bath' generated by its own evolution, is given by a uniform MPS with finite bond-dimension $\\chi$. This property allows for efficient computation of subsystem dynamics and essentially contains all known examples of solvable circuits. We derive a set of necessary and sufficient local conditions by using a version of the fundamental theorem of MPS for open boundary conditions. Next we apply our theory to brickwork circuits with $\\chi=1$ influence-solvability and perform a systematic classification of classical brickwork circuits with local dimension up to $d=3$ and quantum brickwork circuits with $d=2$. Our search reveals new solvable circuits that are not captured by known solvability conditions.", "url": "https://arxiv.org/abs/2606.12538", "type": "理论", "summary": "“可解”电路，例如对偶酉及其概括，已成为经典系统和量子系统中易于处理的混沌非平衡动力学的范例。然而，尽管提出了越来越复杂的充分条件，但仍然缺乏对可解电路的一般特征进行分类和理解的系统理论。我们通过引入影响可解电路来发展这样的理论，这是一类 $(1+1)D$ 电路，其影响矩阵代表其自身演化生成的“浴”，由具有有限键维 $\\chi$ 的均匀 MPS 给出。该属性允许对子系统动力学进行有效计算，并且本质上包含可解电路的所有已知示例。我们通过使用 MPS 基本定理的开放边界条件版本推导出一组必要且充分的局部条件。接下来，我们将我们的理论应用于具有 $\\chi=1$ 影响可解性的砖砌电路，并对局部维度高达 $d=3$ 的经典砖砌电路和 $d=2$ 的量子砖砌电路进行系统分类。\n\n我们的搜索揭示了已知可解条件未捕获的新可解电路。", "authors": [{"name": "Friedrich Hübner"}, {"name": "Sun Woo P. Kim"}], "featured_authors": [{"name": "Friedrich Hübner"}, {"name": "Sun Woo P. Kim"}], "author_count": 2}, {"id": "2606.12572", "category": "cond-mat", "title": "The formation of magnetic reentrancy in the Ising model on a decorated square lattice", "abstract": "In our work, based on an exact solution of the Ising model on a decorated square lattice with an arbitrary number of decorating spins, we have demonstrated the fundamental possibility of describing the phenomenon of multiple magnetic phase transitions (magnetic reentrancy) in the regime of competing exchange interactions. We analyzed the magnetic behavior of the system and established the conditions for the occurrence of magnetic reentrancy. We have determined the relationships of the model parameter under which the formation of one, three, and even five magnetic phase transitions is possible, which is confirmed by a complicated magnetic phase diagram. We have also proposed a unique method for finding critical temperatures that allows for the precise determination of their number and values, including those at extremely low temperatures.", "url": "https://arxiv.org/abs/2606.12572", "type": "理论+数值", "summary": "在我们的工作中，基于伊辛模型在具有任意数量的装饰自旋的装饰方晶格上的精确解，我们证明了描述竞争交换相互作用状态下的多个磁相变（磁重入）现象的基本可能性。我们分析了系统的磁行为并建立了磁重入发生的条件。我们确定了可以形成1个、3个甚至5个磁相变的模型参数关系，并通过复杂的磁相图证实了这一点。我们还提出了一种寻找临界温度的独特方法，可以精确确定其数量和值，包括极低温度下的数量和值。", "authors": [{"name": "A. V. Zarubin"}, {"name": "F. A. Kassan-Ogly"}], "featured_authors": [{"name": "A. V. Zarubin"}, {"name": "F. A. Kassan-Ogly"}], "author_count": 2}, {"id": "2606.12591", "category": "cond-mat", "title": "Computationally efficient method for determining limiting velocities of edge dislocations in anisotropic crystals", "abstract": "The continuum-limit theory of dislocations in crystals predicts divergences in the elastic energy at crystal-geometry dependent limiting velocities $v_L$, which separate subsonic, transsonic, and supersonic dislocation glide regimes and are therefore import for material strength models at high strain rates. Although it is known how to calculate those limiting velocities, there is one special case - edge dislocations with reflection symmetry, but non-vanishing elastic constants $c'_{16}$ or $c'_{26}$ - where previous methods have been notoriously slow. In this letter, we address this deficiency by deriving a computationally efficient method for determining the limiting velocities of edge dislocations with reflection symmetry.", "url": "https://arxiv.org/abs/2606.12591", "type": "理论", "summary": "晶体位错的连续极限理论预测了晶体几何相关的极限速度 $v_L$ 下弹性能的发散，它区分了亚音速、跨音速和超音速位错滑移状态，因此对于高应变率下的材料强度模型很重要。尽管已知如何计算这些极限速度，但有一种特殊情况 - 具有反射对称性的边缘位错，但非消失弹性常数 $c'_{16}$ 或 $c'_{26}$ - 以前的方法非常慢。在这封信中，我们通过推导一种计算有效的方法来确定具有反射对称性的刃位错的极限速度来解决这一缺陷。", "authors": [{"name": "Daniel N. Blaschke"}], "featured_authors": [{"name": "Daniel N. Blaschke"}], "author_count": 1}, {"id": "2606.12606", "category": "cond-mat", "title": "Spontaneous symmetry breaking under Bose--Einstein condensation", "abstract": "Due to high current interest to Bose-Einstein condensation, the related topics, such as spontaneous gauge symmetry breaking, ergodic decomposition, and particle fluctuations, are intensively discussed in literature. These discussions, unfortunately, involve quite a number of controversies and confusions. The goal of the present brief survey is to clarify some of these confusions, concentrating on the principal points, such as the relationship between the conditions of Bose-Einstein condensation, the Bogolubov method of quasiaverages, spontaneous gauge symmetry breaking, ergodic decomposition, the presumed existence of nonthermodynamic particle fluctuations leading to the so-called ``grand canonical catastrophe\", and the requirements for system stability.", "url": "https://arxiv.org/abs/2606.12606", "type": "理论", "summary": "由于当前对玻色-爱因斯坦凝聚的高度关注，相关主题，例如自发规范对称破缺、遍历分解和粒子涨落，在文献中得到了深入讨论。不幸的是，这些讨论涉及相当多的争议和困惑。本简短概述的目的是澄清其中一些混淆，重点关注要点，例如玻色-爱因斯坦凝聚的条件之间的关系、准平均的博戈卢博夫方法、自发规范对称性破缺、遍历分解、导致所谓“大正则灾难”的非热力学粒子涨落的假定存在以及系统稳定性的要求。", "authors": [{"name": "V.I. Yukalov"}], "featured_authors": [{"name": "V.I. Yukalov"}], "author_count": 1}, {"id": "2606.12665", "category": "cond-mat", "title": "Hall conductivity reveals the nature of quantum coherence in strongly correlated metals", "abstract": "Linear-in-temperature resistivity is a hallmark for strange metallic transport, and appears universally in many strongly correlated electron systems. However, the focus on the longitudinal channel often overshadows the profound microscopic insights contained within the transverse response. Here, we utilize numerically exact determinantal quantum Monte Carlo simulations of the doped Hubbard model in a magnetic field to calculate longitudinal and transverse transport. We demonstrate that while the resistivity is robustly $T$-linear across parameter sets, the Hall response is highly sensitive to particle-hole asymmetry, Fermi surface topology, and many-body correlation effects. Specifically, the combination of these effects determine a crossover scale in which the system becomes quantum-coherent, and is reflected in the Hall conductivity. Our results demonstrate that while the $T$-linearity in resistivity appears universal, the Hall response reveals a crossover from semi-classical to quantum-coherent transport otherwise masked in the longitudinal channel.", "url": "https://arxiv.org/abs/2606.12665", "type": "理论+数值", "summary": "温度线性电阻率是奇怪金属输运的标志，并且普遍出现在许多强相关电子系统中。然而，对纵向通道的关注常常掩盖了横向响应中包含的深刻的微观见解。在这里，我们利用磁场中掺杂哈伯德模型的数值精确行列式量子蒙特卡罗模拟来计算纵向和横向输运。我们证明，虽然电阻率在参数集上是稳健的 $T$ 线性，但霍尔响应对粒子空穴不对称性、费米表面拓扑和多体相关效应高度敏感。具体来说，这些效应的组合决定了系统变得量子相干的交叉尺度，并反映在霍尔电导率中。我们的结果表明，虽然电阻率中的 $T$ 线性似乎是普遍存在的，但霍尔响应揭示了从半经典传输到量子相干传输的交叉，否则在纵向通道中被掩盖。", "authors": [{"name": "Emily Z. Zhang"}, {"name": "Thomas P. Devereaux"}], "featured_authors": [{"name": "Emily Z. Zhang"}, {"name": "Thomas P. Devereaux"}], "author_count": 2}, {"id": "2606.12738", "category": "cond-mat", "title": "How alignment controls heat transport in polymer chains with kinks?", "abstract": "Thermal transport in long polymer molecules is commonly attributed to ballistic propagation of long-wavelength acoustic phonons, which act as Goldstone modes arising from translational symmetry, while the transport of other phonons is suppressed by Anderson localization. This mechanism leads to thermal conductivity that increases with molecular length. Consistent with this picture, strongly aligned polymers exhibit exceptionally high thermal conductivity, whereas poorly aligned polymers are orders of magnitude less conductive and function as thermal insulators. Here we show that this strong sensitivity to molecular alignment originates from phonon scattering by molecular kinks. Even in the long-wavelength limit, the kink scattering remains strong because kinks break translational symmetry both for longitudinal and transverse phonons. As a result, randomly oriented kinks cause a rapid decrease in thermal conductivity with increasing molecular length. These findings identify alignment control by means of kink engineering as a route for tuning thermal transport in polymers.", "url": "https://arxiv.org/abs/2606.12738", "type": "理论", "summary": "长聚合物分子中的热传输通常归因于长波长声子的弹道传播，其充当由平移对称性产生的戈德斯通模式，而其他声子的传输则受到安德森局域化的抑制。这种机制导致热导率随着分子长度的增加而增加。与此图一致，强排列的聚合物表现出极高的导热率，而排列不良的聚合物的导热率要低几个数量级，并且充当热绝缘体。在这里，我们表明，这种对分子排列的强烈敏感性源于分子扭结的声子散射。即使在长波长限制下，扭结散射仍然很强，因为扭结破坏了纵向和横向声子的平移对称性。因此，随着分子长度的增加，随机取向的扭结会导致热导率迅速下降。这些发现表明，通过扭结工程进行排列控制是调节聚合物热传输的一种途径。", "authors": [{"name": "Igor V. Parshin"}, {"name": "Igor V. Rubtsov"}, {"name": "Alexander L. Burin"}], "featured_authors": [{"name": "Igor V. Parshin"}, {"name": "Igor V. Rubtsov"}, {"name": "Alexander L. Burin"}], "author_count": 3}, {"id": "2606.12750", "category": "cond-mat", "title": "Intrinsic Ductility from Shear Amorphization: From Pure Metals to Multi-Principal-Element Alloys", "abstract": "Direct links between electronic structure and intrinsic ductility remain elusive for metals. A framework is proposed that reduces the complexities of valence charge distribution, band filling, and shear strain effects into structure-property relationships describing the intrinsic ductility of metals and alloys. Rather than relying on crystal cleavage and dislocation nucleation at preexisting crack tips, we show that a lower energy fracture criterion, i.e., the activation energy density for amorphization, enables accurate predictions of both intrinsic ductility and ductile-to-brittle transition temperatures. From analytical expressions and tabulated ab-initio stiffness constants, lattice parameters, and binary interaction energies, we present a unified theory that reconciles ductile flow in pure metals and solid-solution alloys. Phase diagrams generated for the Nb-Ta-V-Ti system simultaneously explain its high strength and room-temperature tensile ductility, validating this framework as a practical one for rapid design of structural multi-principal-element alloys.", "url": "https://arxiv.org/abs/2606.12750", "type": "理论+数值", "summary": "对于金属来说，电子结构和固有延展性之间的直接联系仍然难以捉摸。提出了一个框架，将价电荷分布、能带填充和剪切应变效应的复杂性降低为描述金属和合金固有延展性的结构-性能关系。我们不依赖于预先存在的裂纹尖端的晶体解理和位错成核，而是证明较低能量的断裂准则，即非晶化的活化能密度，可以准确预测固有延展性和延性到脆性的转变温度。根据解析表达式和表格从头算刚度常数、晶格参数和二元相互作用能，我们提出了一个统一的理论，可以协调纯金属和固溶合金中的延性流动。 Nb-Ta-V-Ti 系统生成的相图同时解释了其高强度和室温拉伸延展性，验证了该框架作为结构多元素合金快速设计的实用框架。", "authors": [{"name": "Morgan R. Jones"}, {"name": "Duane D. Johnson"}, {"name": "Nicolas Argibay"}], "featured_authors": [{"name": "Morgan R. Jones"}, {"name": "Duane D. Johnson"}, {"name": "Nicolas Argibay"}], "author_count": 3}, {"id": "2606.12778", "category": "cond-mat", "title": "Revealing nonvolatile behaviors in magneto-thermal switching using microstructure-controlled superconducting composites", "abstract": "Thermal conductivity in a conductor changes by the application of an external magnetic field, which functions as a magneto-thermal switch. For superconductors, a large magneto-thermal switching can occur through a superconducting-to-normal conducting phase transition due to the change in the electron contribution in thermal conductivity. Arima et al. recently reported a nonvolatile nature of the magneto-thermal switching for superconducting solders, which consist of phase-separated Sn and Pb domains. Although they clarified that magnetic flux trapping is required to induce the nonvolatile magneto-thermal switching, a rule for such material design is still unclear. Here, we investigate the microstructure dependence of magneto-thermal switching in superconducting Sn/Pb multilayered composites, which are created by an accumulative roll bonding method. The thickness of each layer, that is the scale of microstructure, can be systematically controlled by the repetition number of roll bonding while the whole sample size and average composition are unchanged. We find that, as the formation of micro-scaled Sn domains proceeds by increasing the repetition number, a nonvolatility in the magneto-thermal conductivity gradually appears in correlation with the remanent magnetization. This study directly confirms that the inclusions with a size comparable to or less than the magnetic vortex in superconducting matrix is essential for magnetic flux trapping, enabling the nonvolatile magneto-thermal switching in superconducting composites.", "url": "https://arxiv.org/abs/2606.12778", "type": "理论", "summary": "导体中的热导率通过施加外部磁场而改变，其起到磁热开关的作用。对于超导体，由于电子在热导率中的贡献的变化，可以通过超导到常导相变来发生大的磁热转换。有马等人。最近报道了超导焊料磁热切换的非易失性，该焊料由相分离的锡和铅域组成。尽管他们澄清需要磁通量捕获来引发非易失性磁热转换，但这种材料设计的规则仍不清楚。在这里，我们研究了通过累积辊压粘合方法创建的超导 Sn/Pb 多层复合材料中磁热转换的微观结构依赖性。每层的厚度，即微观结构的尺度，可以通过辊压粘合的重复次数来系统地控制，而整个样品的尺寸和平均成分不变。\n\n我们发现，随着重复次数的增加，微尺度锡域的形成不断进行，磁热导率的非易失性逐渐出现，与剩余磁化强度相关。这项研究直接证实了超导基体中尺寸与磁涡流相当或小于磁涡的夹杂物对于磁通量捕获至关重要，从而实现超导复合材料中的非易失性磁热切换。", "authors": [{"name": "Keigo Ito"}, {"name": "Yui Sakamoto"}, {"name": "Hossein Sepehri-Amin"}, {"name": "Yuto Watanabe"}, {"name": "Poonam Rani"}, {"name": "Kumpei Imamura"}, {"name": "Takamasa Hirai"}, {"name": "Keisuke Hirata"}, {"name": "Shunsuke Mori"}, {"name": "Yusuke Nakanishi"}, {"name": "Kenichiro Hashimoto"}, {"name": "Takasada Shibauchi"}, {"name": "Yoshikazu Mizuguchi"}, {"name": "Ken-ichi Uchida"}, {"name": "Fuyuki Ando"}], "featured_authors": [{"name": "Keigo Ito"}, {"name": "Yui Sakamoto"}, {"name": "Hossein Sepehri-Amin"}, {"name": "Yoshikazu Mizuguchi"}, {"name": "Ken-ichi Uchida"}, {"name": "Fuyuki Ando"}], "author_count": 15}, {"id": "2606.12779", "category": "cond-mat", "title": "Molecular reference corrections for quantum Monte Carlo adsorption energies", "abstract": "Accurate surface thermochemistry requires balanced error cancellation between extended slabs and molecular reference states. This balance can fail whenever the electronic-structure error is not transferable across the chemically distinct species entering a thermodynamic cycle. Here we examine this problem in single-determinant fixed-node diffusion Monte Carlo (SD-FNDMC) for oxygenated ORR intermediates on Pt(111). Gas-phase thermochemistry is used to diagnose the reference-state imbalance, and a hybrid cycle is introduced to separate slab-adsorbate binding from molecular formation. The hybrid cycle keeps the surface binding term at the SD-FNDMC level, where cancellation is expected to be most favorable, and replaces the molecular formation contribution with a benchmark coupled cluster reference. For Pt(111), the resulting correction is small for O and OH but larger for OOH, while the geometry-matched refinement gives only a secondary correction. Applying the same cycle to HCO and COH on Cu(111) gives corrections of opposite sign, showing that the bias is controlled primarily by the electronic structure of the molecular reference rather than by adsorbate geometry alone. This decomposition identifies molecular reference imbalance as a separable source of error in SD-FNDMC surface thermochemistry and reduces the corresponding bias without modifying the SD-FNDMC slab-binding contribution.", "url": "https://arxiv.org/abs/2606.12779", "type": "理论+数值", "summary": "准确的表面热化学需要在扩展板和分子参考状态之间平衡误差消除。当电子结构误差无法在进入热力学循环的化学上不同的物质之间转移时，这种平衡就会失败。在这里，我们在 Pt(111) 上含氧 ORR 中间体的单行列式固定节点扩散蒙特卡罗 (SD-FNDMC) 中检查这个问题。气相热化学用于诊断参考态不平衡，并引入混合循环来将板吸附物结合与分子形成分开。混合循环将表面结合项保持在 SD-FNDMC 水平，其中取消预计是最有利的，并用基准耦合簇参考代替分子形成贡献。对于 Pt(111)，O 和 OH 的校正结果较小，但 OOH 的校正结果较大，而几何匹配细化仅提供二次校正。对 Cu(111) 上的 HCO 和 COH 应用相同的循环给出了相反符号的校正，表明偏差主要由分子参考的电子结构控制，而不是仅由吸附物几何形状控制。\n\n这种分解将分子参考不平衡识别为 SD-FNDMC 表面热化学中的一个可分离的误差源，并在不修改 SD-FNDMC 板结合贡献的情况下减少相应的偏差。", "authors": [{"name": "Roman Fanta"}, {"name": "Michal Bajdich"}], "featured_authors": [{"name": "Roman Fanta"}, {"name": "Michal Bajdich"}], "author_count": 2}, {"id": "2606.12795", "category": "cond-mat", "title": "When proofreading improves both speed and accuracy", "abstract": "Proofreading is generally thought to improve accuracy at the expense of speed. We show that this trade-off can be reversed in stochastic processes with long-lived stalled states. Using a non-Markovian renewal framework, we derive exact expressions for the error rate and completion time under proofreading for arbitrary stall-time distributions. Our analysis reveals that fluctuations in stall durations, rather than their mean alone, determine whether proofreading can simultaneously increase speed and accuracy. In the limit of strong stalling, this regime emerges when the coefficient of variation of the stall time exceeds a threshold set by the intrinsic error rate. These results provide a general criterion for proofreading in systems ranging from self-assembly and polymer replication to immune recognition and other nonequilibrium information-processing systems.", "url": "https://arxiv.org/abs/2606.12795", "type": "理论", "summary": "人们普遍认为校对可以提高准确性，但会牺牲速度。我们证明，这种权衡可以在具有长期停滞状态的随机过程中逆转。使用非马尔可夫更新框架，我们在校对任意停顿时间分布的情况下推导出错误率和完成时间的精确表达式。我们的分析表明，决定校对是否可以同时提高速度和准确性的是停顿持续时间的波动，而不是其平均值。在强失速的限制下，当失速时间的变异系数超过由固有错误率设定的阈值时，就会出现这种情况。这些结果为从自组装和聚合物复制到免疫识别和其他非平衡信息处理系统的系统校对提供了通用标准。", "authors": [{"name": "Arup Biswas"}, {"name": "L. Mahadevan"}], "featured_authors": [{"name": "Arup Biswas"}, {"name": "L. Mahadevan"}], "author_count": 2}, {"id": "2606.12914", "category": "cond-mat", "title": "Quantum charge pumping in helical systems: A comparative study of short- and long-range hopping", "abstract": "Using the Keldysh non-equilibrium Green's function approach, we investigate charge pumping through a single-stranded helical structure described by a tight-binding model that includes either short-range hopping (SRH) or long-range hopping (LRH). While quantum pumping has been studied in various low-dimensional systems, the detailed behavior of the spectral current and the pumped dc current in helical geometries in the presence of higher-order electron hopping (beyond nearest neighbors) has not yet been systematically explored. Here, we focus on the interplay between helicity and extended hopping ranges, analyzing how they jointly control the energy-resolved and dc pumped currents under time-periodic end potentials. For LRH, the pumped dc current exhibits pronounced plateau-like regions as a function of chemical potential when energy levels are sparsely spaced -- consistent with adiabatic transport -- whereas SRH yields more parameter-sensitive currents without clear plateaus. The plateau stability is controlled by the drive frequency: at higher frequencies, Floquet side-band mixing destroys the plateaus, leading to oscillatory currents. The phase dependence remains nearly sinusoidal, and the current vanishes at zero phase lag, confirming the necessity of out-of-phase potentials. Crucially, in helical systems, the decay exponent $(\\ell_c)$ acts as an effective structural parameter that can tune both the magnitude and sign of the pumped current, offering a geometric knob for controlling quantum pumping. Our findings not only fill a gap in the understanding of spectral and pumped currents in helical systems with extended hopping but also provide tools that can be applied to analyze similar phenomena in other chiral or quasi-one-dimensional systems.", "url": "https://arxiv.org/abs/2606.12914", "type": "理论+数值", "summary": "使用凯尔迪什非平衡格林函数方法，我们研究了通过紧束缚模型描述的单链螺旋结构的电荷泵，该模型包括短程跳跃（SRH）或长程跳跃（LRH）。虽然量子泵浦已经在各种低维系统中进行了研究，但在存在高阶电子跳跃（超出最近邻居）的情况下，螺旋几何结构中的光谱电流和泵浦直流电流的详细行为尚未得到系统地探索。在这里，我们重点关注螺旋性和扩展跳跃范围之间的相互作用，分析它们如何在时间周期端电位下共同控制能量分辨电流和直流泵浦电流。对于 LRH，当能级间隔稀疏时，泵浦直流电流表现出明显的平台状区域，作为化学势的函数（与绝热传输一致），而 SRH 产生更多参数敏感电流，没有明显的平台。平台稳定性由驱动频率控制：在较高频率下，Floquet 边带混频会破坏平台，导致振荡电流。\n\n相位依赖性保持接近正弦曲线，并且电流在零相位滞后时消失，证实了异相电势的必要性。至关重要的是，在螺旋系统中，衰减指数 $(\\ell_c)$ 充当有效的结构参数，可以调整泵浦电流的大小和符号，为控制量子泵浦提供几何旋钮。我们的研究结果不仅填补了对具有扩展跳跃的螺旋系统中的光谱和泵浦电流的理解的空白，而且还提供了可用于分析其他手性或准一维系统中的类似现象的工具。", "authors": [{"name": "Leila Eslami"}, {"name": "Santanu K. Maiti"}, {"name": "Fatemeh Bourbour"}], "featured_authors": [{"name": "Leila Eslami"}, {"name": "Santanu K. Maiti"}, {"name": "Fatemeh Bourbour"}], "author_count": 3}, {"id": "2606.12928", "category": "cond-mat", "title": "Continuum Neural Momentum Eigenstate for Variationally Solving Quasiparticles", "abstract": "We design the first neural quantum state for continuum particles that, for any chosen allowed momentum $\\mathbf{k}$, is by construction an exact eigenstate of total momentum with eigenvalue $\\mathbf{k}$. Our architecture, EVE, enables off-the-shelf VMC to solve for momentum-sector ground states. We test EVE on 2D bosons with mutual $1/r$ interactions, finding that a single unified ansatz is capable of describing four qualitatively different states: superfluid, roton, crystal, and phonon. At different densities, we extract the underlying phase of matter from the dispersion's shape. At $r_s = 20.0$, we see the roton minimum at finite $k$ expected of a superfluid. At $r_s = 100.0$, we see striking zone folding indicative of crystalline order, with periodically spaced minima representing floating crystals connected by phonon arcs in between. Using density-density correlation functions, we confirm the phase diagnoses and probe the excitations' correlation structures. Finally, we analyze the roton's phase texture and find unexpected multi-particle phase strings, formed when several vortex dipoles merge, leaving two vortices connected by a phase slip.", "url": "https://arxiv.org/abs/2606.12928", "type": "理论+数值", "summary": "我们设计了连续粒子的第一个神经量子态，对于任何选定的允许动量 $\\mathbf{k}$，通过构造具有特征值 $\\mathbf{k}$ 的总动量的精确本征态。我们的架构 EVE 使现成的 VMC 能够求解动量扇区基态。我们在具有相互 $1/r$ 相互作用的 2D 玻色子上测试 EVE，发现单个统一的 ansatz 能够描述四种性质不同的状态：超流体、旋转、晶体和声子。在不同的密度下，我们从分散体的形状中提取出物质的底层相。在 $r_s = 20.0$ 处，我们看到超流体预期的旋转最小值为有限 $k$。在 $r_s = 100.0$ 处，我们看到显着的区域折叠表明晶体顺序，周期性间隔的最小值代表浮动晶体，中间通过声子弧连接。使用密度-密度相关函数，我们确认相位诊断并探测激励的相关结构。最后，我们分析了转子的相结构，发现了意想不到的多粒子相串，这些相串是在几个涡旋偶极子合并时形成的，留下两个通过相滑连接的涡旋。", "authors": [{"name": "David D. Dai"}, {"name": "Marin Soljačić"}], "featured_authors": [{"name": "David D. Dai"}, {"name": "Marin Soljačić"}], "author_count": 2}, {"id": "2606.12932", "category": "cond-mat", "title": "Conditional spinodal decomposition in Li-Mg anodes for lithium metal batteries", "abstract": "The development of batteries with high energy density, short charging times and use of sustainable materials is critical for decarbonization. Magnesium (Mg)-based anodes for lithium (Li) metal batteries promote homogeneous Li plating, thereby avoiding the formation of Li dendrites that cause short circuits and battery failure. However, microstructural modifications induced by Li-alloying and their influence on battery operation remain elusive. Here, we unveil the previously unknown formation of an ordered B2 phase, which creates a conditional spinodal decomposition with the \\b{eta}-body-centered cubic phase. Chemical fluctuations characteristic of spinodal decomposition give rise to uniformly dispersed Li-rich \\b{eta}-BCC and Li-poor B2 continuous interconnected phases, with the former providing a fast diffusion pathway for Li diffusion towards the anode, hence decreasing the propensity for dendrite formation at elevated current density. This is achieved using Earth-abundant and inexpensive Mg.", "url": "https://arxiv.org/abs/2606.12932", "type": "理论", "summary": "开发具有高能量密度、短充电时间和使用可持续材料的电池对于脱碳至关重要。用于锂（Li）金属电池的镁（Mg）基阳极可促进均匀的锂镀层，从而避免形成导致短路和电池故障的锂枝晶。然而，锂合金化引起的微观结构变化及其对电池运行的影响仍然难以捉摸。在这里，我们揭示了以前未知的有序 B2 相的形成，它创建了具有 \\b{eta}-体心立方相的条件旋节线分解。旋节线分解的化学波动特征产生均匀​​分散的富锂\\b{eta}-BCC和贫锂B2连续互连相，前者为锂向阳极扩散提供了快速扩散路径，从而降低了在升高的电流密度下形成枝晶的倾向。这是通过使用地球上丰富且廉价的镁来实现的。", "authors": [{"name": "Leonardo Shoji Aota"}, {"name": "Aubin Leray"}, {"name": "Yuqi Liu"}, {"name": "Frederic de Geuser"}, {"name": "Chanwon Jung"}, {"name": "Shyam Katnagallu"}, {"name": "Tim M. Schwarz"}, {"name": "Alisson Kwiatkowski da Silva"}, {"name": "Júlio César Pereira dos Santos"}, {"name": "Eric Marchezini Mazzer"}, {"name": "Poonam Yadav"}, {"name": "Christoph Freysoldt"}, {"name": "Frank Stein"}, {"name": "Yug Joshi"}, {"name": "Se-Ho Kim"}, {"name": "Dierk Raabe"}, {"name": "Baptiste Gault"}], "featured_authors": [{"name": "Leonardo Shoji Aota"}, {"name": "Aubin Leray"}, {"name": "Yuqi Liu"}, {"name": "Se-Ho Kim"}, {"name": "Dierk Raabe"}, {"name": "Baptiste Gault"}], "author_count": 17}, {"id": "2606.12933", "category": "cond-mat", "title": "A micromagnetic model with bidirectional magneto-thermal coupling", "abstract": "Most conventional micromagnetic frameworks in spin caloritronics rely on a unidirectional coupling approximation, wherein thermal fluctuations drive magnetization dynamics while the feedback of magnetic dissipation onto the thermal reservoir is neglected. Here, we establish a rigorously self-consistent bidirectional magneto-thermal coupling model by integrating the stochastic Landau-Lifshitz-Gilbert (sLLG) equation with a generalized heat transfer equation. In this closed-loop framework, the local temperature acts as a dynamical variable, and the damping-induced dissipation alongside stochastic work dynamically feeds back into the thermal bath as localized heat sources. Utilizing Ito stochastic calculus, we analytically prove that this coupled system strictly obeys the first law of thermodynamics and spontaneously recovers the correct Boltzmann statistics at equilibrium. Spatially resolved micromagnetic simulations further validate the energy exchange mechanism, capturing the finite-bath temperature reduction induced by spatial variation of magnetic moments and the modified density of states under exchange interactions. This bidirectional framework provides a robust microscopic foundation for investigating complex nonequilibrium magneto-thermal dynamics, such as the unidirectional spin-wave heat conveyer effect, paving the way for advanced spin-caloritronic applications.", "url": "https://arxiv.org/abs/2606.12933", "type": "理论+数值", "summary": "自旋热电子学中的大多数传统微磁框架依赖于单向耦合近似，其中热波动驱动磁化动力学，而忽略热储层上磁耗散的反馈。在这里，我们通过将随机 Landau-Lifshitz-Gilbert (sLLG) 方程与广义传热方程相结合，建立了严格自洽的双向磁热耦合模型。在这个闭环框架中，局部温度充当动态变量，阻尼引起的耗散以及随机功动态地反馈到热浴中作为局部热源。利用伊藤随机微积分，我们分析证明该耦合系统严格遵守热力学第一定律，并在平衡时自发地恢复正确的玻尔兹曼统计。空间分辨微磁模拟进一步验证了能量交换机制，捕获了磁矩空间变化引起的有限浴温度降低以及交换相互作用下态密度的变化。\n\n这种双向框架为研究复杂的非平衡磁热动力学（例如单向自旋波传热效应）提供了坚实的微观基础，为先进的自旋热电子学应用铺平了道路。", "authors": [{"name": "Peiru Yi"}, {"name": "Zian Xia"}, {"name": "Weichao Yu"}], "featured_authors": [{"name": "Peiru Yi"}, {"name": "Zian Xia"}, {"name": "Weichao Yu"}], "author_count": 3}, {"id": "2606.13045", "category": "cond-mat", "title": "A solvable model for unsupervised federated learning", "abstract": "We introduce a theoretical framework for analyzing federated learning in a generative setting through a teacher-multiple interacting students scenario, in which each student receives a distinct realization of the data, either through a different noise corruption or by accessing a different subset, possibly of varying size. Using theoretical tools in equilibrium disordered system, we analytically show that interactions among students systematically enhance learning performance: highly noisy students require fewer samples to recover the underlying pattern, while low-noise students achieve a larger overlap with the ground-truth signal. We derive the optimal Bayesian conditions for teacher recovery as functions of the sample complexity, noise level, and interaction strength, and validate these predictions through numerical simulations. The resulting dynamics can be mapped onto equilibrium sampling in a Restricted Boltzmann Machine with a structured hidden layer, providing a principled theoretical understanding of how interactions improve distributed generative modeling.", "url": "https://arxiv.org/abs/2606.13045", "type": "理论+数值", "summary": "我们引入了一个理论框架，用于通过教师与多个学生交互的场景来分析生成环境中的联邦学习，其中每个学生通过不同的噪声损坏或通过访问可能大小不同的不同子集来接收数据的独特实现。使用平衡无序系统中的理论工具，我们分析表明，学生之间的互动系统地提高了学习成绩：高噪音学生需要更少的样本来恢复潜在模式，而低噪音学生则与地面实况信号实现更大的重叠。我们推导出教师恢复的最佳贝叶斯条件作为样本复杂性、噪声水平和交互强度的函数，并通过数值模拟验证这些预测。由此产生的动力学可以映射到具有结构化隐藏层的受限玻尔兹曼机中的平衡采样，从而为交互如何改进分布式生成建模提供原则性的理论理解。", "authors": [{"name": "Giovanni Catania"}, {"name": "Aurélien Decelle"}, {"name": "Gianluca Manzan"}, {"name": "Beatriz Seoane"}, {"name": "Daniele Tantari"}], "featured_authors": [{"name": "Giovanni Catania"}, {"name": "Aurélien Decelle"}, {"name": "Gianluca Manzan"}, {"name": "Beatriz Seoane"}, {"name": "Daniele Tantari"}], "author_count": 5}, {"id": "2606.13070", "category": "cond-mat", "title": "Collective alignment controls rotation frustration in granular flows of elongated particles", "abstract": "Dense granular flows made of elongated particles exhibit a strong inhibition of particle rotation compared to spherical grains, but the mechanisms responsible for this effect remain unclear. Using three-dimensional discrete element simulations, we investigate the angular dynamics of elongated particles in dense, confined shear flows. We systematically vary particle aspect ratio, interparticle friction, and boundary conditions to elucidate their respective roles. We show that the reduction of the average angular velocity cannot be attributed to particle shape, friction, or solid fraction alone. Instead, it is controlled by the degree of collective alignment developed under shear, quantified by a nematic order parameter. Based on this observation, we propose a simple scaling law linking the average angular velocity to the local shear rate through a hampering parameter that depends solely on the orientational order via the nematic order parameter. This scaling successfully collapses data obtained for different particle properties (shape, friction), different flow patterns, and, remarkably, remains valid for two additional flow configurations.", "url": "https://arxiv.org/abs/2606.13070", "type": "理论+数值", "summary": "与球形颗粒相比，由细长颗粒组成的致密颗粒流表现出对颗粒旋转的强烈抑制，但造成这种效应的机制仍不清楚。使用三维离散元模拟，我们研究了致密、受限剪切流中细长颗粒的角动力学。我们系统地改变颗粒长宽比、颗粒间摩擦力和边界条件，以阐明它们各自的作用。我们表明，平均角速度的降低不能仅仅归因于颗粒形状、摩擦力或固体分数。相反，它是由剪切下形成的集体排列程度控制的，并由向列序参数量化。基于这一观察，我们提出了一个简单的比例定律，通过一个仅依赖于通过向列序参数的取向序的阻碍参数将平均角速度与局部剪切速率联系起来。这种缩放成功地折叠了针对不同颗粒属性（形状、摩擦）、不同流动模式获得的数据，并且值得注意的是，对于另外两种流动配置仍然有效。", "authors": [{"name": "Antonio Pol"}, {"name": "Riccardo Artoni"}, {"name": "Patrick Richard"}], "featured_authors": [{"name": "Antonio Pol"}, {"name": "Riccardo Artoni"}, {"name": "Patrick Richard"}], "author_count": 3}, {"id": "2606.13290", "category": "cond-mat", "title": "Understanding quantum behaviors of an electron in a uniform magnetic field alternatively", "abstract": "Quantum mechanically, an electron moving in a uniform magnetic field forms Landau levels. A curious feature is that for states with a negative angular quantum number, the total probability current vanishes, which appears to contradict the classical picture of cyclotron motion. While a geometric interpretation based on classical orbits exists, alternative interpretations remain of interest. In this paper, we examine the probability current density and identify a critical radius that naturally partitions the plane into an inner clockwise-flow region and an outer counterclockwise-flow region. We show that the vanishing total current results from an exact cancellation between these two regions. Furthermore, by defining a partitioned kinetic angular momentum with respect to the critical radius, we reveal an intrinsic competitive structure: the electron simultaneously carries two opposing rotational components. The negative quantum number manifests in the strength of the inner counter-rotation, while the net kinetic angular momentum remains positive. This bidirectional flow picture also provides a dynamical interpretation of the infinite degeneracy of Landau levels.", "url": "https://arxiv.org/abs/2606.13290", "type": "理论", "summary": "从量子力学的角度来看，在均匀磁场中运动的电子形成朗道能级。一个奇怪的特征是，对于具有负角量子数的状态，总概率电流消失，这似乎与回旋运动的经典图像相矛盾。虽然存在基于经典轨道的几何解释，但替代解释仍然令人感兴趣。在本文中，我们检查了概率电流密度并确定了一个临界半径，该半径将平面自然地划分为内部顺时针流动区域​​和外部逆时针流动区域​​。我们表明，总电流的消失是由于这两个区域之间的精确抵消造成的。此外，通过定义相对于临界半径的分区动角动量，我们揭示了一种内在的竞争结构：电子同时携带两个相反的旋转分量。负量子数表现为内部反向旋转的强度，而净动角动量仍然为正。这种双向流图还提供了朗道能级无限简并性的动力学解释。", "authors": [{"name": "Jin-Ming Wang"}, {"name": "Yuan-Zao Gao"}, {"name": "Dai-Lin Cun"}, {"name": "Jian Jing"}], "featured_authors": [{"name": "Jin-Ming Wang"}, {"name": "Yuan-Zao Gao"}, {"name": "Dai-Lin Cun"}, {"name": "Jian Jing"}], "author_count": 4}, {"id": "2606.13342", "category": "cond-mat", "title": "Variational Monte Carlo study of a two-orbital Hubbard model for the iron pnictides", "abstract": "We study a two-orbital Hubbard-Kanamori model, which has been originally proposed for iron-based superconductors, using variational Monte Carlo. We span the nonmagnetic sector at both hole-doping and electron-doping, with respect to the half-filled case $n=2$. We report the presence of a superconductive region with a $s^{\\pm}$ symmetry only when the half-filled system is in a Mott state, while orbital selectivity is absent. These results are qualitatively different from what was reported in the three-orbital Hubbard-Kanamori model, where a more extended superconductive region was observed with a concomitant development of orbital selectivity, and they are to some extent more reminiscent of the single-band Hubbard model.", "url": "https://arxiv.org/abs/2606.13342", "type": "理论+数值", "summary": "我们使用变分蒙特卡罗研究了双轨道 Hubbard-Kanamori 模型，该模型最初是针对铁基超导体提出的。相对于半填充的情况 $n=2$，我们在空穴掺杂和电子掺杂方面跨越非磁性扇区。我们报告仅当半填充系统处于莫特态时才存在具有 $s^{\\pm}$ 对称性的超导区域，而轨道选择性不存在。这些结果与三轨道哈伯德-金森模型中报道的结果有质的不同，在三轨道哈伯德-金森模型中观察到了更广泛的超导区域，同时轨道选择性也随之发展，并且在某种程度上更让人想起单带哈伯德模型。", "authors": [{"name": "Vito Marino"}, {"name": "Gabriele Gatti"}, {"name": "Massimo Capone"}, {"name": "Luca F. Tocchio"}], "featured_authors": [{"name": "Vito Marino"}, {"name": "Gabriele Gatti"}, {"name": "Massimo Capone"}, {"name": "Luca F. Tocchio"}], "author_count": 4}, {"id": "2606.13498", "category": "cond-mat", "title": "Population dynamics of surface-mediated autocatalytic processes", "abstract": "We investigate the population dynamics of surface-mediated autocatalytic processes, in which particles diffuse in a complex environment towards surface regions where they can be either killed or replicated. These opposite mechanisms compete with each other and lead to a sophisticated stochastic evolution of the population size. We provide a systematic analysis of the generating function of the population size. We also deduce its distribution, mean, variance and higher-order moments. For this purpose, we employ several equivalent descriptions of these quantities in terms of nonlinear integral equations and partial differential equations with nonlinear boundary conditions. We inspect the long-time behavior of the population dynamics in three regimes when the mean population size vanishes, reaches a steady-state level, or grows exponentially. A numerical solution of the underlying integral equations and independent Monte Carlo simulations support our theoretical predictions.", "url": "https://arxiv.org/abs/2606.13498", "type": "理论+数值", "summary": "我们研究了表面介导的自催化过程的群体动力学，其中颗粒在复杂的环境中扩散到表面区域，在那里它们可以被杀死或复制。这些相反的机制相互竞争，导致种群规模的复杂随机演化。我们对人口规模的生成函数进行了系统分析。我们还推导了它的分布、均值、方差和高阶矩。为此，我们采用非线性积分方程和具有非线性边界条件的偏微分方程来对这些量进行几种等效描述。当平均人口规模消失、达到稳态水平或呈指数增长时，我们检查了三种制度下人口动态的长期行为。基础积分方程的数值解和独立的蒙特卡罗模拟支持我们的理论预测。", "authors": [{"name": "Denis S. Grebenkov"}, {"name": "Yilin Ye"}], "featured_authors": [{"name": "Denis S. Grebenkov"}, {"name": "Yilin Ye"}], "author_count": 2}, {"id": "2606.13512", "category": "cond-mat", "title": "Current patterns and loss contributions in CORT cables carrying AC current", "abstract": "Conductor-on-round-tube (CORT) cables are a potential solution for carrying AC power in a small cross-section. Due to the geometry of the cable and the helical arrangement of the coated conductors (CC), the current follows a non-trivial pattern inside each CC. For instance, for the case of a single-layer cable, the current flow is mostly axial along the outer face of the CCs and mostly azimuthal along their inner face. Such a current distribution, known as the Garber current pattern, affects the transport AC losses. In numerical models, commonly adopted simplifications are either based on straight conductors or infinitely thin CCs. Such approaches neglect the Garber current pattern and thus misrepresent both the detailed current flow within the CC and the resulting 3D distribution of the fields. In this work, the detailed 3D current distribution in the CCs is investigated in a one-layer CORT cable, as a function of the cable geometrical parameters such as the conductor thickness, the pitch angle, and the gap between adjacent CCs. In particular, the impact of the Garber current pattern is studied on the two largest contributions to the AC losses, namely the surface losses (associated with the penetration of the component of the magnetic field parallel to the wide faces of the superconducting layer) and the edge losses (associated with the penetration of the perpendicular component of the magnetic field occurring in the vicinity of the gaps between the CCs). The detailed distribution of the currents in the CCs is examined and its relationship with the different AC loss mechanisms is established. This study is carried out by means of an effective 2D model that uses a system of coordinates conforming with the helical structure of the cable.", "url": "https://arxiv.org/abs/2606.13512", "type": "理论+数值", "summary": "圆管导体 (CORT) 电缆是在小横截面中传输交流电源的潜在解决方案。由于电缆的几何形状和涂层导体 (CC) 的螺旋排列，每个 CC 内的电流遵循不平凡的模式。例如，对于单层电缆的情况，电流大部分是沿着CC的外表面轴向流动，并且大部分是沿着CC的内表面方位流动。这种电流分布称为加伯电流模式，会影响传输交流损耗。在数值模型中，普遍采用的简化要么基于直导体，要么基于无限薄 CC。此类方法忽略了加伯电流模式，因此错误地表示了 CC 内的详细电流以及由此产生的场的 3D 分布。在这项工作中，研究了单层 CORT 电缆中 CC 中详细的 3D 电流分布，该分布是电缆几何参数（例如导体厚度、节距角和相邻 CC 之间的间隙）的函数。\n\n特别是，研究了加伯电流模式对交流损耗的两个最大贡献的影响，即表面损耗（与平行于超导层宽面的磁场分量的穿透相关）和边缘损耗（与发生在 CC 之间的间隙附近的磁场垂直分量的穿透相关）。检查了 CC 中电流的详细分布，并建立了其与不同交流损耗机制的关系。这项研究是通过有效的二维模型进行的，该模型使用符合电缆螺旋结构的坐标系。", "authors": [{"name": "Benoît Vanderheyden"}, {"name": "Julien Dular"}, {"name": "Louis Denis"}, {"name": "Steffen Elschner"}, {"name": "Christophe Geuzaine"}, {"name": "Mariusz Wozniak"}, {"name": "Francesco Grilli"}], "featured_authors": [{"name": "Benoît Vanderheyden"}, {"name": "Julien Dular"}, {"name": "Louis Denis"}, {"name": "Christophe Geuzaine"}, {"name": "Mariusz Wozniak"}, {"name": "Francesco Grilli"}], "author_count": 7}, {"id": "2606.13526", "category": "cond-mat", "title": "Quantum geometric anomalous Hall response in orbitally nonunitary superconductors", "abstract": "We investigate the anomalous Hall response (AHR) in a multiband superconductor at optical frequencies, a phenomenon intimately related to the polar Kerr effect, a key probe of time-reversal symmetry breaking in superconductors. In translationally invariant multiband systems with purely intraband pairing, Galilean invariance decouples center-of-mass and relative motion of Cooper pairs, leading to the widespread expectation that a finite AHR requires either disorder or finite interband pairing amplitudes. However, this restriction can be lifted by the quantum geometric effects inherent to multiband Bloch states. Using a honeycomb lattice tight-binding model with Kane-Mele spin-orbit coupling, we analyze the AHR for the time-reversal symmetry broken chiral $d$-wave spin-singlet and chiral $p$-wave equal-spin-triplet pairing states with intraband pairing only. We demonstrate, through both analytical and numerical calculations, that the spin-singlet state yields a vanishing AHR, even with its broken time-reversal symmetry, whereas the equal-spin triplet state exhibits a finite AHR, even when it is spin-unitary. We attribute the latter to orbital nonunitarity, which, in the presence of spin-orbit coupling, generates the spin-polarized Bogoliubov quasiparticle states required for a finite AHR. The response is mediated by interband velocity matrix elements governed by the quantum geometry. This finding establishes that spin-unitary, but orbitally nonunitary pairing, can generate a finite AHR even without interband pairing and thereby revises the criteria for Kerr signals in superconductors.", "url": "https://arxiv.org/abs/2606.13526", "type": "理论+数值", "summary": "我们研究了多带超导体在光频率下的反常霍尔响应（AHR），这种现象与极克尔效应密切相关，极克尔效应是超导体中时间反转对称性破缺的关键探针。在具有纯带内配对的平移不变多带系统中，伽利略不变性解耦了库珀对的质心和相对运动，导致人们普遍期望有限的 AHR 需要无序或有限的带间配对幅度。然而，这种限制可以通过多带布洛赫态固有的量子几何效应来解除。使用带有 Kane-Mele 自旋轨道耦合的蜂窝晶格紧束缚模型，我们分析了仅具有带内配对的时间反演对称性破缺的手性 $d$ 波自旋单线态和手性 $p$ 波等自旋三线态配对状态的 AHR。我们通过分析和数值计算证明，即使时间反转对称性被破坏，自旋单重态也会产生消失的 AHR，而等自旋三重态即使是自旋酉态，也会表现出有限的 AHR。\n\n我们将后者归因于轨道非幺正性，在存在自旋轨道耦合的情况下，产生有限 AHR 所需的自旋极化 Bogoliubov 准粒子态。该响应由量子几何控制的带间速度矩阵元素介导。这一发现表明，即使没有带间配对，自旋酉但轨道非酉配对也可以产生有限的 AHR，从而修改了超导体中克尔信号的标准。", "authors": [{"name": "Viktor Frilen"}, {"name": "Annica M. Black-Schaffer"}, {"name": "Ankita Bhattacharya"}], "featured_authors": [{"name": "Viktor Frilen"}, {"name": "Annica M. Black-Schaffer"}, {"name": "Ankita Bhattacharya"}], "author_count": 3}, {"id": "2606.13586", "category": "cond-mat", "title": "Exploratory digital alchemy for colloidal crystal discovery", "abstract": "Digital Alchemy (DA), introduced by Van Anders et al., is a statistical mechanics-based generalized thermodynamic ensemble method that employs computer simulations to optimize colloidal particle design. This approach applies the principles of statistical mechanics to predict and tailor particle attributes that lead to desired self-assembled structures or material properties. However, as an inverse design method, its main limitation is that the target structure must be known \\textit{a priori}. Therefore, the optimal design from DA does not guarantee the targeted structure is the most or the only stable one. This highlights the importance of forward design with an exploratory scheme for optimizing novel colloid designs, which becomes more suitable in such cases. In this paper, we introduce Exploratory Digital Alchemy (EDA), an enhanced forward design scheme that begins by releasing the constraint of the target crystal from DA, followed by an exploration-oriented bias that has been extensively used in enhanced sampling methods such as metadynamics (MetaD). We demonstrate the utility of EDA through examples involving particles interacting via a two-dimensional Lennard-Jones Gauss potential (LJGP) and a three-dimensional oscillating pair potential (OPP). We applied EDA to study the free energy landscapes given different potential parameters of LJGP at different temperatures. With the exploratory scheme, we've also successfully identified a wide range of OPP potential parameters that stabilize metastable Frank-Kasper phases. Our approach fuses the standard DA framework with metadynamics, which could potentially be useful for studying alchemical reactions in a generalized ensemble.", "url": "https://arxiv.org/abs/2606.13586", "type": "数值", "summary": "Van Anders 等人提出的数字炼金术 (DA) 是一种基于统计力学的广义热力学系综方法，采用计算机模拟来优化胶体颗粒设计。这种方法应用统计力学原理来预测和定制颗粒属性，从而产生所需的自组装结构或材料特性。然而，作为一种逆向设计方法，其主要限制是目标结构必须已知\\textit{先验}。因此，DA的优化设计并不能保证目标结构是最稳定的或唯一稳定的。这凸显了通过探索性方案来优化新型胶体设计的正向设计的重要性，这在这种情况下变得更合适。在本文中，我们介绍了探索性数字炼金术（EDA），这是一种增强的正向设计方案，首先从 DA 中释放目标晶体的约束，然后是探索导向的偏差，该偏差已广泛应用于元动力学（MetaD）等增强采样方法中。\n\n我们通过涉及粒子通过二维 Lennard-Jones 高斯势 (LJGP) 和三维振荡对势 (OPP) 相互作用的示例来展示 EDA 的实用性。我们应用 EDA 来研究不同温度下 LJGP 不同势参数的自由能景观。通过探索性方案，我们还成功确定了一系列稳定亚稳态 Frank-Kasper 相的 OPP 电位参数。我们的方法将标准 DA 框架与元动力学融合在一起，这可能有助于研究广义系综中的炼金反应。", "authors": [{"name": "Shih-Kuang"}, {"name": "Sun-Ting Tsai"}, {"name": "Sharon C. Glotzer"}], "featured_authors": [{"name": "Shih-Kuang"}, {"name": "Sun-Ting Tsai"}, {"name": "Sharon C. Glotzer"}], "author_count": 3}, {"id": "2606.13617", "category": "cond-mat", "title": "Geometric formulation of state-dependent Langevin dynamics using scalar free energy", "abstract": "Stochastic dynamics with state-dependent diffusion are widely used for Brownian motion in confined, anisotropic, and hydrodynamically coupled systems. The conventional Langevin formulation includes a spurious drift associated with multiplicative noise, but its free energy generally does not transform as a scalar, meaning that the covariance is not explicit. Here, we formulate a geometrically consistent Langevin equation by introducing a scalar free energy and using the diffusion tensor as a metric on configuration space. The spurious drift is then expressed as a Christoffel contribution of the diffusion metric. While our formulation is equivalent to the conventional one through the relation between the non-scalar and scalar free energies, it makes the coordinate covariance explicit. We demonstrate its consistency in representative examples of state-dependent diffusion arising from coordinate transformations, geometrical confinement, and projection from curved to flat spaces.", "url": "https://arxiv.org/abs/2606.13617", "type": "理论", "summary": "具有状态相关扩散的随机动力学广泛用于受限、各向异性和流体动力学耦合系统中的布朗运动。传统的朗之万公式包括与乘性噪声相关的寄生漂移，但其自由能通常不会转换为标量，这意味着协方差不明确。在这里，我们通过引入标量自由能并使用扩散张量作为配置空间的度量来制定几何一致的朗之万方程。然后，杂散漂移被表示为扩散度量的 Christoffel 贡献。虽然我们的公式通过非标量和标量自由能之间的关系与传统公式等效，但它使坐标协方差变得明确。我们在坐标变换、几何限制以及从弯曲空间到平面空间的投影所产生的状态相关扩散的代表性例子中证明了其一致性。", "authors": [{"name": "Kento Yasuda"}, {"name": "Zhongqiang Xiong"}, {"name": "Zhanglin Hou"}, {"name": "Kenta Ishimoto"}, {"name": "Xinpeng Xu"}, {"name": "Shigeyuki Komura"}], "featured_authors": [{"name": "Kento Yasuda"}, {"name": "Zhongqiang Xiong"}, {"name": "Zhanglin Hou"}, {"name": "Kenta Ishimoto"}, {"name": "Xinpeng Xu"}, {"name": "Shigeyuki Komura"}], "author_count": 6}, {"id": "2606.13645", "category": "cond-mat", "title": "Driven dynamics of an attractive Bose polaron", "abstract": "We study the out-of-equilibrium dynamics of an impurity driven by a constant external force through a system of homogeneous weakly-interacting bosons in one spatial dimension. The impurity-boson interaction is assumed to be attractive. We show that the impurity exhibits drifted Bloch oscillations in a wide range of forces in the absence of a lattice. We characterize the dynamical response of the host bosons and explain the mechanism underlying the Bloch oscillations. We analyse the behavior of the drift velocity, the Bloch amplitude and the time period of oscillations in a wide range of forces and other system parameters. In contrast to the case of repulsive impurity-boson interaction, the drift velocity exhibits a sub-linear dependence on a weak applied force, $V_d\\sim {F}^{\\alpha}$ with a positive exponent $\\alpha$ smaller than unity. The drift velocity monotonically increases with force, though the scaling behavior varies considerably across different regimes of $F$. Moreover, the amplitude of the velocity oscillations displays rich behavior: it first undergoes a decay with force, reaches a minimum, and then presents a revival, increasing with force.", "url": "https://arxiv.org/abs/2606.13645", "type": "理论", "summary": "我们通过一个空间维度上的均质弱相互作用玻色子系统研究由恒定外力驱动的杂质的不平衡动力学。杂质-玻色子相互作用被认为是有吸引力的。我们表明，在没有晶格的情况下，杂质在各种力的作用下表现出漂移的布洛赫振荡。我们描述了主体玻色子的动态响应，并解释了布洛赫振荡的机制。我们分析了各种力和其他系统参数下的漂移速度、布洛赫振幅和振荡时间周期的行为。与排斥性杂质-玻色子相互作用的情况相反，漂移速度表现出对弱施加力 $V_d\\sim {F}^{\\alpha}$ 的亚线性依赖性，其正指数 $\\alpha$ 小于 1。漂移速度随力单调增加，尽管不同 $F$ 范围内的缩放行为差异很大。此外，速度振荡的振幅表现出丰富的行为：它首先随力衰减，达到最小值，然后呈现复兴，随力增大。", "authors": [{"name": "Saptarshi Majumdar"}, {"name": "Aleksandra Petković"}], "featured_authors": [{"name": "Saptarshi Majumdar"}, {"name": "Aleksandra Petković"}], "author_count": 2}, {"id": "2606.12510", "category": "hep-th", "title": "Infinite-Order Lattice Chiral Anomalies and CPT", "abstract": "A key property of a global symmetry's anomaly is its order: the smallest integer $n$ for which the diagonal symmetry of the $n$-copy system is anomaly-free. While many familiar lattice anomalies have finite order, perturbative anomalies in the continuum$-$those captured by Feynman diagrams$-$have infinite order. In this paper, we show that the Onsager symmetry, a lattice realization of the chiral symmetry of a 1+1d massless Dirac fermion, has an order-two anomaly. However, imposing lattice CPT symmetry enhances this anomaly from order two to infinite order, yielding a lattice chiral symmetry structure that more faithfully matches the continuum chiral anomaly. We also discuss the corresponding 2+1d symmetry-protected topological phases for these infinite-order lattice anomalies.", "url": "https://arxiv.org/abs/2606.12510", "type": "理论", "summary": "全局对称异常的一个关键属性是它的阶数：$n$ 复制系统的对角对称性无异常的最小整数 $n$。虽然许多熟悉的晶格异常具有有限阶，但费曼图$-$捕获的连续体$-$中的微扰异常具有无限阶。在本文中，我们证明了 Onsager 对称性（1+1d 无质量狄拉克费米子手性对称性的晶格实现）具有二阶反常现象。然而，强加晶格 CPT 对称性将这种异常从二阶增强到无限阶，​​产生更忠实地匹配连续手性异常的晶格手性对称结构。我们还讨论了这些无限阶晶格异常的相应 2+1d 对称保护拓扑相。", "authors": [{"name": "Elijah Lew-Smith"}, {"name": "Salvatore D. Pace"}, {"name": "Shu-Heng Shao"}], "featured_authors": [{"name": "Elijah Lew-Smith"}, {"name": "Salvatore D. Pace"}, {"name": "Shu-Heng Shao"}], "author_count": 3}, {"id": "2606.12513", "category": "hep-th", "title": "Localization of Chiral Electromagnetic Waves on Thick Axion Domain Walls", "abstract": "We analyze Maxwell theory coupled to an axion domain wall as a spectral boundary value problem. We find that a finite-width axion domain wall generically supports a localized normalizable chiral electromagnetic mode with linear, gapless dispersion. This mode arises from helicity-dependent coupling sourced by the axion gradient: one polarization experiences an effective attractive potential and forms a bound state, while the opposite polarization is repelled. The existence of this chiral surface photon is robust over a wide regime of wall structures and axion masses. Our result shows that axion domain walls generically support a localized chiral photon that has been missed in previous analyses.", "url": "https://arxiv.org/abs/2606.12513", "type": "理论", "summary": "我们将与轴子畴壁耦合的麦克斯韦理论分析为谱边值问题。我们发现有限宽度的轴子畴壁通常支持具有线性、无间隙色散的局部可归一化手性电磁模式。这种模式是由轴子梯度产生的螺旋性耦合产生的：一种极化经历有效的吸引势并形成束缚态，而相反的极化则被排斥。这种手性表面光子的存在在广泛的壁结构和轴子质量范围内是稳健的。我们的结果表明，轴子畴壁通常支持局部手性光子，这在之前的分析中被忽略了。", "authors": [{"name": "Nemanja Kaloper"}], "featured_authors": [{"name": "Nemanja Kaloper"}], "author_count": 1}, {"id": "2606.12515", "category": "hep-th", "title": "Mapping the Infrared Phase Space of Gravity to Finite Subregions", "abstract": "We construct the phase space for an arbitrary cut of a null hypersurface in Minkowski spacetime and demonstrate that it is symplectomorphic to the infrared phase space of asymptotically flat gravity. Fluctuations of the cut are mapped to the leading soft graviton mode. Furthermore, the supertranslation Goldstone mode is mapped to the product of the size of the cut with its symplectic partner, the null time offset.", "url": "https://arxiv.org/abs/2606.12515", "type": "理论", "summary": "我们构造了闵可夫斯基时空中零超曲面的任意切割的相空间，并证明它与渐近平坦引力的红外相空间辛同构。切割的波动被映射到领先的软引力子模式。此外，超平移戈德斯通模式被映射到切割尺寸与其辛伙伴零时间偏移的乘积。", "authors": [{"name": "Luca Ciambelli"}, {"name": "Temple He"}, {"name": "Marc S. Klinger"}, {"name": "Kathryn M. Zurek"}], "featured_authors": [{"name": "Luca Ciambelli"}, {"name": "Temple He"}, {"name": "Marc S. Klinger"}, {"name": "Kathryn M. Zurek"}], "author_count": 4}, {"id": "2606.12526", "category": "hep-th", "title": "Multi-entropy in heavy local quenches", "abstract": "We study the time evolution of tripartite entanglement in heavy local quenches in two-dimensional holographic conformal field theories. Our diagnostic is the genuine multi-entropy of adjacent intervals, computed from both bulk and boundary perspectives. A perturbative bulk analysis shows that the first-order small-mass perturbation around the vacuum geodesic network cancels identically at any time after the quench. In the fully back-reacted geometry, a vacuum-subtracted genuine multi-entropy arises from a mismatch between the winding selected by the trivalent geodesic network and the windings selected independently by the pairwise geodesics. In the sharp quench limit, the time dependence of genuine multi-entropy is kinematically fixed to logarithms of rational functions of time and is independent of the heavy operator dimension. The CFT calculation reproduces the same formula within the heavy-light vacuum block approximation, where the branch choice in the heavy-background uniformization map corresponds to the winding selection in the bulk. These results indicate that, in this setup, the genuine multi-entropy is controlled by global saddle selection, rather than by a local energy response or quasiparticle propagation.", "url": "https://arxiv.org/abs/2606.12526", "type": "理论", "summary": "我们研究了二维全息共形场论中重局部淬灭中三方纠缠的时间演化。我们的诊断是从整体和边界角度计算的相邻区间的真正多熵。扰动体分析表明，真空测地线网络周围的一阶小质量扰动在淬火后的任何时间都相同地抵消。在完全反反应几何结构中，真空减去的真正多熵是由三价测地线网络选择的绕组与成对测地线独立选择的绕组之间的不匹配引起的。在尖锐的淬灭极限中，真正的多熵的时间依赖性在运动学上固定为时间有理函数的对数，并且与重算子维数无关。 CFT 计算在重-轻真空块近似中重现了相同的公式，其中重-背景均匀化图中的分支选择对应于体中的绕组选择。\n\n这些结果表明，在这种设置中，真正的多熵是由全局鞍选择控制的，而不是由局部能量响应或准粒子传播控制。", "authors": [{"name": "Kosei Fujiki"}, {"name": "Kenya Tasuki"}], "featured_authors": [{"name": "Kosei Fujiki"}, {"name": "Kenya Tasuki"}], "author_count": 2}, {"id": "2606.12528", "category": "hep-th", "title": "How traversable is a traversable wormhole?", "abstract": "To answer the above question, we study low-frequency scattering in the four-dimensional traversable wormhole of Maldacena, Milekhin, and Popov. The resulting transmission probabilities reveal that wormhole traversability depends strongly on the nature of the probe. For scalar probes, both neutral and charged, traversability depends on the time scale. On time scales of order the light-crossing time after sending in a signal, the transmission is parametrically suppressed, with most of the incoming signal reflected or temporarily trapped inside the wormhole throat. As time progresses, the trapped signal gradually leaks out, so that at late times the accumulated transmission cross-section approaches one half of the corresponding black hole absorption cross-section. Despite this generic suppression at low frequencies, the transmission spectrum also exhibits resonant frequencies at which transmission becomes perfect. Charged massless fermions tell a very different story. Unlike scalars, they traverse the wormhole with essentially unit probability at low energies. The same mechanism underlies their efficient absorption by magnetic black holes and realizes a channel closely analogous to the Callan-Rubakov effect, revealing unexpected connections with monopole-fermion scattering. Putting everything together, we conclude that scalar probes are best suited for uncovering distinct features of these magnetic wormholes, while charged massless fermions are the ideal carriers of information through them.", "url": "https://arxiv.org/abs/2606.12528", "type": "理论", "summary": "为了回答上述问题，我们研究了 Maldacena、Milekhin 和 Popov 的四维可穿越虫洞中的低频散射。由此产生的传输概率表明，虫洞的可穿越性在很大程度上取决于探测器的性质。对于中性和带电的标量探针，可穿越性取决于时间尺度。在发送信号后光穿过时间的时间尺度上，传输受到参数抑制，大部分传入信号被反射或暂时困在虫洞喉咙内。随着时间的推移，捕获的信号逐渐泄漏，以致后期累积的传输截面接近相应黑洞吸收截面的一半。尽管在低频处存在这种一般抑制，但传输频谱还表现出传输变得完美的谐振频率。带电无质量费米子讲述了一个截然不同的故事。与标量不同，它们在低能量下基本上以单位概率穿过虫洞。\n\n相同的机制是磁黑洞有效吸收的基础，并实现了与卡兰-鲁巴科夫效应非常相似的通道，揭示了与单极子费米子散射的意想不到的联系。综上所述，我们得出的结论是，标量探测器最适合揭示这些磁性虫洞的独特特征，而带电无质量费米子是通过它们传递信息的理想载体。", "authors": [{"name": "Ben Freivogel"}, {"name": "Alessandro Fumagalli"}, {"name": "Marija Tomašević"}], "featured_authors": [{"name": "Ben Freivogel"}, {"name": "Alessandro Fumagalli"}, {"name": "Marija Tomašević"}], "author_count": 3}, {"id": "2606.12529", "category": "hep-th", "title": "Analytic approaches to perturbations of strongly coupled Yang-Mills plasma", "abstract": "We study perturbations of Yang-Mills plasma, represented by scalar quasinormal modes of AdS black branes, as functions of the wave number $q$ in the entire range from zero to infinity. At finite $q$, these modes can be computed by classical spectral methods based on truncating the boundary value problem. We show that this truncation admits a natural analytic interpretation in terms of quantum Seiberg--Witten periods in the Nekrasov--Shatashvili limit, with the spectral condition organised as an instanton expansion around small values of the counting parameter. The physical black-brane problem corresponds to evaluating this series at a finite value of the counting parameter, and the Seiberg--Witten formulation provides a systematic way to analyse when the truncation is under control. In particular, it reveals that, as $q$ or the mode number $N$ increases, the physical point approaches the boundary of the domain of convergence of the instanton expansion, limiting the validity of the truncation approach. We overcome this limitation through an exact WKB analysis in which $q^{-1}$ acts as the expansion parameter. The resulting exact quantisation conditions, expressed in terms of period integrals and the associated Stokes geometry, incorporate both perturbative and non-perturbative corrections. The resummed quasinormal modes remain accurate far beyond the strict large-$q$ regime and can be analytically continued all the way to $q=0$, notably by using the Seiberg--Witten approach, providing a consistent description of the QNM spectrum.", "url": "https://arxiv.org/abs/2606.12529", "type": "理论", "summary": "我们研究杨-米尔斯等离子体的扰动，以 AdS 黑膜的标量准正态模式为代表，作为波数 $q$ 在从零到无穷大的整个范围内的函数。在有限的$q$下，这些模式可以通过基于截断边值问题的经典谱方法来计算。我们表明，这种截断允许根据内克拉索夫-沙塔什维利极限中的量子塞伯格-维滕周期进行自然分析解释，并且谱条件被组织为围绕计数参数的小值的瞬子展开。物理黑膜问题对应于在计数参数的有限值下评估该级数，而 Seiberg--Witten 公式提供了一种系统的方法来分析何时截断受到控制。特别是，它表明，随着 $q$ 或模数 $N$ 的增加，物理点接近瞬子展开收敛域的边界，限制了截断方法的有效性。我们通过精确的 WKB 分析克服了这一限制，其中 $q^{-1}$ 充当扩展参数。\n\n由此产生的精确量化条件（以周期积分和相关斯托克斯几何表示）包含微扰和非微扰校正。恢复的拟正规模式仍然准确，远远超出了严格的大 $q$ 范围，并且可以一直分析持续到 $q=0$，特别是通过使用 Seiberg--Witten 方法，提供 QNM 频谱的一致描述。", "authors": [{"name": "Inês Aniceto"}, {"name": "Paolo Arnaudo"}, {"name": "Alex Ratcliffe"}, {"name": "Michał Spaliński"}], "featured_authors": [{"name": "Inês Aniceto"}, {"name": "Paolo Arnaudo"}, {"name": "Alex Ratcliffe"}, {"name": "Michał Spaliński"}], "author_count": 4}, {"id": "2606.12534", "category": "hep-th", "title": "Higher Gauge Theory via Differential Nonabelian Cohomology", "abstract": "This is a streamlined introduction to the global (infrared) completion of Maxwell-type higher gauge fields (as in the higher gauge sectors of higher dimensional supergravity and its brane probes) by electromagnetic flux quantization in differential nonabelian cohomology, using cohesive homotopy theory. Applications include D/NS brane charge in (unstable) K-theory, M-brane charge in unstable Cohomotopy and geometric engineering of topological quantum order on probe M5-branes.", "url": "https://arxiv.org/abs/2606.12534", "type": "理论", "summary": "这是使用内聚同伦理论，通过微分非贝尔上同调中的电磁通量量子化，对麦克斯韦型高规范场（如高维超重力的高规范扇区及其膜探针）的全局（红外）完成的简化介绍。应用包括（不稳定）K 理论中的 D/NS 膜电荷、不稳定同伦性中的 M-膜电荷以及探针 M5 膜上拓扑量子序的几何工程。", "authors": [{"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "featured_authors": [{"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "author_count": 2}, {"id": "2606.12537", "category": "hep-th", "title": "Wigner continuous-spin equations in $\\mathbf{AdS_D}$: bosonic and fermionic cases", "abstract": "We construct Wigner-like equations of motion for symmetric continuous-spin fields in anti-de Sitter space of arbitrary dimension, treating both the bosonic and fermionic cases. We generalise the classical flat-space Wigner constraints for bosonic continuous-spin fields, and for the fermionic case we adopt the equations proposed by Bekaert and Mourad as our starting point. This is achieved by covariantising the ordinary derivatives and deforming the resulting constraints so that they form a closed algebra. The construction is carried out in a metric-like formalism and yields a system of first-class constraints that define a representation of the $\\mathfrak{so}(2,D-1)$ isometry algebra, realised via the Lie-Lorentz derivative. Using these constraints, we compute the eigenvalues of the quadratic and quartic Casimir operators and compare the obtained values with Metsaev's classification of continuous-spin representations for both the bosonic and fermionic cases. A crucial algebraic role is played by special operators of the (super)algebra Howe-dual to the Lorentz subalgebra $\\mathfrak{so}(1,D-1)$: the $\\mathfrak{sl}(2)$ Casimir operator in the bosonic case, and the Casimir's ghost of the $\\mathfrak{osp}(1|2)$ superalgebra in the fermionic case. Both objects naturally organise the constraint algebra and ensure its consistency.", "url": "https://arxiv.org/abs/2606.12537", "type": "理论", "summary": "我们为任意维度的反德西特空间中的对称连续自旋场构造了类维格纳运动方程，同时处理玻色子和费米子情况。我们推广了玻色连续自旋场的经典平坦空间维格纳约束，对于费米子情况，我们采用 Bekaert 和 Mourad 提出的方程作为起点。这是通过对普通导数进行协变并对所得约束进行变形以使其形成闭代数来实现的。该构造以类似度量的形式进行，并产生一个一流的约束系统，该系统定义 $\\mathfrak{so}(2,D-1)$ 等距代数的表示，通过李-洛伦兹导数实现。使用这些约束，我们计算二次和四次卡西米尔算子的特征值，并将获得的值与玻色子和费米子情况的连续自旋表示的 Metsaev 分类进行比较。\n\n洛伦兹子代数 $\\mathfrak{so}(1,D-1)$ 的（超）代数 Howe 的特殊算子起着至关重要的代数作用：玻色子情况下的 $\\mathfrak{sl}(2)$ 卡西米尔算子，以及费米子情况下 $\\mathfrak{osp}(1|2)$ 超代数的卡西米尔幽灵。两个对象自然地组织约束代数并确保其一致性。", "authors": [{"name": "Lev N. Astrakhantsev"}, {"name": "Anastasia A. Golubtsova"}, {"name": "Mikhail A. Podoinitsyn"}], "featured_authors": [{"name": "Lev N. Astrakhantsev"}, {"name": "Anastasia A. Golubtsova"}, {"name": "Mikhail A. Podoinitsyn"}], "author_count": 3}, {"id": "2606.12540", "category": "hep-th", "title": "Toward Entanglement Bootstrap for Conformal Field Theory in Any Dimension", "abstract": "Given a quantum critical wavefunction in any dimension, we propose a reconstructed Hamiltonian, analogous to the ones previously found for 1+1d CFT and for 2+1d bosonic liquid topologically-ordered states. We test numerically that, for known regularized approximate CFT groundstates (on the icosahedron and the fuzzy sphere), (1) they are close to the groundstate of their reconstructed Hamiltonian, and (2) the spectrum of their reconstructed Hamiltonian on the unit sphere has CFT properties (integer spacing of descendants) and matches known low-lying energies. We show that this provides an automated method to improve the finite-size effects in a fixed Hilbert space.", "url": "https://arxiv.org/abs/2606.12540", "type": "理论", "summary": "给定任意维度的量子临界波函数，我们提出了一个重构的哈密顿量，类似于之前为 1+1d CFT 和 2+1d 玻色液体拓扑有序态发现的哈密顿量。我们在数值上测试，对于已知的正则化近似 CFT 基态（在二十面体和模糊球体上），（1）它们接近于其重构哈密顿量的基态，并且（2）其重构哈密顿量在单位球上的谱具有 CFT 特性（后代的整数间距）并与已知的低能量相匹配。我们证明这提供了一种自动化方法来改善固定希尔伯特空间中的有限尺寸效应。", "authors": [{"name": "Rolando Ramirez Camasca"}, {"name": "Xiang Li"}, {"name": "Ting-Chun Lin"}, {"name": "John McGreevy"}], "featured_authors": [{"name": "Rolando Ramirez Camasca"}, {"name": "Xiang Li"}, {"name": "Ting-Chun Lin"}, {"name": "John McGreevy"}], "author_count": 4}, {"id": "2606.12547", "category": "hep-th", "title": "Vacuum photon emission and mean electromagnetic field in pair-creating external backgrounds", "abstract": "We develop a perturbative description of vacuum radiative processes in quantum electrodynamics with a prescribed external electromagnetic background capable of producing electron-positron pairs. Since the initial vacuum is then unstable and the in- and out-vacua are inequivalent, radiative observables require a real-time formulation beyond the ordinary in-out approach of vacuum-stable QED. Using the Keldysh-Schwinger-Fradkin nonequilibrium technique, we derive the mean number density of emitted photons through the second nonvanishing order in the fine-structure constant. The leading term, of order $\\alpha$, reproduces the known vertex and tadpole mechanisms, while the complete order-$\\alpha^2$ correction contains interference, loop, and induced-current contributions. We also give an independent derivation based on the spectral decomposition of the identity operator in the in-Fock space, where the photon number density is represented as a sum of squared transition amplitudes and vacuum-disconnected terms are canceled by the optical theorem generalized to an unstable vacuum. In addition, we compute the mean electromagnetic field through order $e^3$, including the electromagnetic dressing of the induced vacuum current, and verify it using the corresponding Schwinger-Dyson equations. The final formulas are expressed in terms of exact solutions and propagators of the Dirac equation in the external background and apply to general spacetime-dependent field configurations.", "url": "https://arxiv.org/abs/2606.12547", "type": "理论", "summary": "我们开发了量子电动力学中真空辐射过程的微扰描述，具有规定的外部电磁背景，能够产生电子-正电子对。由于初始真空不稳定并且真空内和真空外不等价，因此辐射可观测值需要超越真空稳定 QED 的普通输入-输出方法的实时公式。使用凯尔迪什-施温格-弗拉德金非平衡技术，我们通过精细结构常数中的第二非零阶推导出发射光子的平均数密度。 $\\alpha$ 阶的首项再现了已知的顶点和蝌蚪机制，而完整的 $\\alpha^2$ 阶校正包含干扰、环路和感应电流贡献。我们还基于 in-Fock 空间中恒等算子的谱分解给出了独立推导，其中光子数密度表示为跃迁振幅的平方和，并且真空断开项被推广到不稳定真空的光学定理抵消。\n\n此外，我们通过$e^3$阶计算平均电磁场，包括感应真空电流的电磁场，并使用相应的Schwinger-Dyson方程进行验证。最终公式以外部背景下狄拉克方程的精确解和传播子表示，并适用于一般的时空相关场配置。", "authors": [{"name": "I. A. Aleksandrov"}, {"name": "E. V. Perelygin"}, {"name": "D. V. Chubukov"}], "featured_authors": [{"name": "I. A. Aleksandrov"}, {"name": "E. V. Perelygin"}, {"name": "D. V. Chubukov"}], "author_count": 3}, {"id": "2606.12549", "category": "hep-th", "title": "Tachyonic Encore: A universal shift of inflationary observables", "abstract": "We propose a generic, largely inflaton-potential-independent mechanism in which a light axion spectator, initialized near the hilltop of its potential, reshapes inflationary observables through purely gravitational multi-field dynamics. During inflation the axion is frozen and the background follows an effectively single-field trajectory. After inflation ends, the axion rolls, inducing a turn in field space and transient tachyonic phases of the isocurvature mode. The resulting ``tachyonic encore'' occurs entirely on super-horizon scales. These phases generate a nearly scale-invariant enhancement of the curvature power spectrum, suppressing the tensor-to-scalar ratio and shifting the scalar tilt to a weighted combination of adiabatic and entropic tilts at horizon crossing. We show that these effects can reconcile otherwise disfavored inflaton potentials with current CMB constraints. The same dynamics predict local non-Gaussianity, $f_{\\rm NL}^{\\rm loc.}\\sim \\mathcal{O}(1)$, within reach of upcoming surveys.", "url": "https://arxiv.org/abs/2606.12549", "type": "理论", "summary": "我们提出了一种通用的、很大程度上与暴胀子势无关的机制，其中光轴子观察者在其势能的山顶附近初始化，通过纯引力多场动力学重塑暴胀可观测值。在膨胀过程中，轴子被冻结，背景遵循有效的单场轨迹。膨胀结束后，轴子滚动，引起场空间的转动和等曲率模式的瞬态快子相。由此产生的“快音重演”完全发生在超视距尺度上。这些阶段产生曲率功率谱的几乎尺度不变的增强，抑制张量与标量比并将标量倾斜转变为地平线交叉处的绝热倾斜和熵倾斜的加权组合。我们表明，这些效应可以使原本不利的暴胀潜力与当前宇宙微波背景约束相协调。同样的动态预测局部非高斯性，$f_{\\rm NL}^{\\rm loc.}\\sim \\mathcal{O}(1)$，在即将进行的调查的范围内。", "authors": [{"name": "Diogo S. Gorgulho"}, {"name": "Margherita Putti"}, {"name": "Rodrigo Gonzalez Quaglia"}, {"name": "Ema Dimastrogiovanni"}, {"name": "Matteo Fasiello"}, {"name": "Diederik Roest"}], "featured_authors": [{"name": "Diogo S. Gorgulho"}, {"name": "Margherita Putti"}, {"name": "Rodrigo Gonzalez Quaglia"}, {"name": "Ema Dimastrogiovanni"}, {"name": "Matteo Fasiello"}, {"name": "Diederik Roest"}], "author_count": 6}, {"id": "2606.12560", "category": "hep-th", "title": "The state/defect correspondence", "abstract": "We formulate a one-to-one correspondence between states and defects for higher-form gauge theories in arbitrary dimensions. The correspondence is not predicated on conformal invariance, as these theories are in general not conformal. Instead, it relies on the existence of infinitely many conserved charges associated with the mixed anomaly of electric and magnetic higher-form symmetries. In $p$-form Maxwell theory, these charges generate an extended Kac-Moody algebra that acts simultaneously on states and on extended operators. We show that this algebra organizes the Hilbert space on $S^p \\times S^{d-p-1}$ into highest-weight representations allowing for a direct identification between states and $p$-dimensional defects. In particular, Wilson-'t Hooft defects dressed with local gauge-invariant operators are mapped to squeezed energy eigenstates. We further relate these novel symmetries to higher-spin currents and demonstrate that their construction persists in a class of interacting non-linear electrodynamics theories.", "url": "https://arxiv.org/abs/2606.12560", "type": "理论", "summary": "我们为任意维度的更高形式规范理论制定了状态和缺陷之间的一一对应关系。对应关系并不基于共形不变性，因为这些理论通常不是共形的。相反，它依赖于与电和磁高级形式对称性的混合异常相关的无限多个守恒电荷的存在。在 $p$ 形式的麦克斯韦理论中，这些电荷生成一个扩展的 Kac-Moody 代数，它同时作用于状态和扩展算子。我们证明这个代数将 $S^p \\times S^{d-p-1}$ 上的希尔伯特空间组织成最高权重表示，允许直接识别状态和 $p$ 维缺陷。特别是，用局部规范不变算子修饰的 Wilson-'t Hooft 缺陷被映射到压缩能量本征态。我们进一步将这些新颖的对称性与高自旋电流联系起来，并证明它们的结构在一类相互作用的非线性电动力学理论中持续存在。", "authors": [{"name": "Adrien Arbalestrier"}, {"name": "Elise Paznokas"}, {"name": "Stathis Vitouladitis"}], "featured_authors": [{"name": "Adrien Arbalestrier"}, {"name": "Elise Paznokas"}, {"name": "Stathis Vitouladitis"}], "author_count": 3}, {"id": "2606.12580", "category": "hep-th", "title": "Scalar Quantum Fields: Theory Space and its Geometry", "abstract": "Scalar fields provide perhaps the simplest playground in which to develop our understanding of quantum field theory. In this lecture, we consider what it means to write down a scalar quantum field theory and how we can give geometrical interpretations to the space of such theories: the theory space.", "url": "https://arxiv.org/abs/2606.12580", "type": "理论", "summary": "标量场也许提供了发展我们对量子场论的理解的最简单的游乐场。在本讲座中，我们将考虑写下标量量子场论意味着什么，以及如何对此类理论的空间（理论空间）给出几何解释。", "authors": [{"name": "Viola Gattus"}, {"name": "Peter Millington"}], "featured_authors": [{"name": "Viola Gattus"}, {"name": "Peter Millington"}], "author_count": 2}, {"id": "2606.12584", "category": "hep-th", "title": "The $μ$-extension of iterated integrals and nested sums", "abstract": "The analytic integration of single-scale Feynman integrals emerging in perturbative calculations in quantum field theories can be performed within special classes of functions, which appear as consecutive generalizations of the polylogarithm in form of Kummer-Poincaré iterative integrals over special alphabets and extensions thereof. These are the polylogarithms, Nielsen integrals, the iterated integrals over linear denominator terms, cyclotomic letters, letters induced by quadratic forms, and square-root valued letters. These integrals are solutions of first-order factorizing differential equations. They are related to specific nested sums via the Mellin transform and their expansions around $x=0$. We construct the $\\mu$-extensions of these iterated integrals and the associated nested sums. We present closed form solutions or provide algorithms in the case of more involved cases to derive the respective $\\mu$-extensions and study the algebras of the $\\mu$-extended function spaces. Except for the case of square-root valued alphabets, the $\\mu$-extension maps into the same function space polynomially in $\\mu$. This is also the case for the associated nested sums. For square-root valued alphabets or sums containing central binomials, the $\\mu$-extension leads to higher transcendental functions. In all other cases the $\\mu$-extension preserves the Hopf algebra structure implied by the (quasi)shuffle product, by supplementing $\\mu$ to the ground field.", "url": "https://arxiv.org/abs/2606.12584", "type": "理论", "summary": "量子场论中微扰计算中出现的单尺度费曼积分的解析积分可以在特殊类别的函数内执行，这些函数以库默-庞加莱迭代积分形式在特殊字母表及其扩展上表现为多对数的连续推广。这些是多对数、尼尔森积分、线性分母项上的迭代积分、分圆字母、二次形式导出的字母和平方根值字母。这些积分是一阶因式分解微分方程的解。它们通过梅林变换及其围绕 $x=0$ 的扩展与特定的嵌套和相关。我们构造这些迭代积分和相关嵌套和的 $\\mu$ 扩展。我们提出封闭形式的解决方案或在更多涉及的情况下提供算法来导出相应的$\\mu$-扩展并研究$\\mu$-扩展函数空间的代数。除了平方根值字母表的情况外，$\\mu$ 扩展映射到 $\\mu$ 中的相同函数空间多项式。关联的嵌套总和也是如此。\n\n对于平方根值字母表或包含中心二项式的和， $\\mu$ 扩展会导致更高的超越函数。在所有其他情况下，$\\mu$ 扩展通过将 $\\mu$ 补充到地面场来保留（准）洗牌积所隐含的 Hopf 代数结构。", "authors": [{"name": "J. Blümlein"}, {"name": "A.M. Gavrilik"}, {"name": "U.Y. Lunga"}, {"name": "O. Mykhailiv"}], "featured_authors": [{"name": "J. Blümlein"}, {"name": "A.M. Gavrilik"}, {"name": "U.Y. Lunga"}, {"name": "O. Mykhailiv"}], "author_count": 4}, {"id": "2606.12622", "category": "hep-th", "title": "Analytic structure of the QCD phase diagram in the complex-temperature plane", "abstract": "We study the analytic structure of the QCD phase diagram by treating temperature as a complex variable. The nearest Yang-Lee edge singularities in the complex $T$ plane bound the domain of analyticity of temperature-dependent thermodynamic observables and complement the more commonly studied singularities in the complex chemical-potential plane. Our analysis combines three complementary perspectives: universal critical scaling, a first-principles extraction from lattice-QCD data, and explicit illustrations in effective models. We illustrate the resulting structure in a random-matrix model and in a quark-meson model, where the singularity trajectories can be followed explicitly. At small real chemical potential, the leading complex-temperature singularity admits an analytic expansion in $\
