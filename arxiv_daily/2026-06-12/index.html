{Tr}[\\eta e^{-\\beta H}A]$ satisfies all three analytic KMS conditions, using the Hadamard three-line theorem and Bari's theorem on Riesz bases. The result is non-trivial: the transported state $\\hat\\omega(X) = \\rm{Tr}[e^{-\\beta h}X\\eta]/Z_\\eta$ differs from the Gibbs state of the isospectral Hermitian partner $h = \\eta^{1/2}H\\eta^{-1/2}$ whenever $[\\eta,h]\\neq 0$, so the KMS property cannot be deduced from the Hermitian theory by similarity. The gap between this result and the full Haag--Hugenholtz--Winnink $C^*$-algebraic framework is identified. Failure modes at exceptional points and for complex spectra are analysed, and the relation to the Fagnola--Umanità quantum detailed balance condition for open systems is discussed.", "url": "https://arxiv.org/abs/2606.13251", "type": "理论", "summary": "我们研究了 Kubo-Martin-Schwinger (KMS) 热平衡条件到具有实谱和双正交本征系统的非厄米哈密顿量的扩展，通过三个互补途径提供了系统分析。我们的中心结果是准厄米性的热力学表征：对于 $H \\in M_d(\\mathbb{C})$ 可与实谱对角化，双正交吉布斯函数 $\\omega_{\\rm{bi}}(A) = Z_{\\rm{bi}}^{-1} \\sum_n e^{-\\beta E_n}\\langle\\phi_n|A|\\psi_n\\rangle$当且仅当 $H$ 是准厄米特矩阵时，所有 $A$ 都满足 $\\omega_{\\rm{bi}}(A^†A) \\geq 0$。该证明通过 Riesz 表示定理直接从 $\\omega_{\\rm{bi}}$ 的特征投影构造度量 $\\eta$，无需事先选择 $\\eta$，从而在 Mostafazadeh-Scholtz 框架之外提供了准厄米性的无度量证明。在完全准厄米特假设下，我们使用哈达玛三线定理和基于里斯的巴里定理证明了 $\\eta$-吉布斯态 $\\omega_\\eta(A) = Z_\\eta^{-1}\\, \\rm{Tr}[\\eta e^{-\\beta H}A]$ 满足所有三个解析 KMS 条件。\n\n结果很重要：每当 $[\\eta,h]\\neq 0$ 时，传输状态 $\\hat\\omega(X) = \\rm{Tr}[e^{-\\beta h}X\\eta]/Z_\\eta$ 与等谱埃尔米特伙伴 $h = \\eta^{1/2}H\\eta^{-1/2}$ 的吉布斯状态不同，因此无法从埃尔米特状态推导出 KMS 属性相似性理论。该结果与完整的 Haag--Hugenholtz--Winnink $C^*$-代数框架之间的差距已被确定。分析了异常点和复杂谱的失效模式，并讨论了开放系统与 Fagnola--Umanità 量子详细平衡条件的关系。", "authors": [{"name": "Chen Lan"}, {"name": "Luyao Ma"}, {"name": "Hao Yang"}], "featured_authors": [{"name": "Chen Lan"}, {"name": "Luyao Ma"}, {"name": "Hao Yang"}], "author_count": 3}, {"id": "2606.13284", "category": "quant-ph", "title": "Where a Quantum Reservoir Works: A Transferable Operating Band", "abstract": "In quantum reservoir computing, a fixed quantum system transforms an input signal, while learning reduces to training a simple linear readout on its measured outputs. Since the quantum dynamics themselves are never optimized, the method is well suited to today's hardware. Yet these dynamics must still be chosen carefully, because their settings remain fixed throughout training and inference. It therefore remains an open question where, in its control space, a fixed quantum system learns well. We address this question for a dissipative reservoir by mapping performance over three central physical controls: the strength of the input drive, the coupling between neighboring qubits, and the rate of dissipation. Good performance concentrates in a single, well-defined operating region of this control space. This region transfers across tasks and reservoir initializations, and the same memory-defined regime persists under architectural changes. It is also mechanistically grounded, since it disappears whenever any of the mechanisms that create it is removed. Finally, the region can be located cheaply before any task is run, using a simple memory diagnostic.", "url": "https://arxiv.org/abs/2606.13284", "type": "数值", "summary": "在量子库计算中，固定的量子系统转换输入信号，而学习则简化为在其测量的输出上训练简单的线性读数。由于量子动力学本身从未优化过，因此该方法非常适合当今的硬件。然而，这些动态仍然必须仔细选择，因为它们的设置在整个训练和推理过程中保持固定。因此，固定量子系统在其控制空间中学习效果如何仍然是一个悬而未决的问题。我们通过映射三个中心物理控制的性能来解决耗散储层的这个问题：输入驱动的强度、相邻量子位之间的耦合以及耗散率。良好的性能集中在该控制空间的单个、明确定义的操作区域中。该区域跨任务和存储库初始化进行传输，并且相同的内存定义机制在架构变化下仍然存在。它也是机械接地的，因为只要任何创建它的机制被移除，它就会消失。最后，可以在任何任务运行之前使用简单的内存诊断廉价地定位该区域。", "authors": [{"name": "Markus Baumann"}, {"name": "Itamar Fink"}, {"name": "Johannes Wittmann"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "featured_authors": [{"name": "Markus Baumann"}, {"name": "Itamar Fink"}, {"name": "Johannes Wittmann"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "author_count": 5}, {"id": "2606.13377", "category": "quant-ph", "title": "Steady-State Noise Signatures of Lindbladian Exceptional Points", "abstract": "Exceptional points (EPs) are non-Hermitian degeneracies at which two or more eigenvalues and their corresponding eigenvectors coalesce. In open quantum systems, exceptional points can arise in the Lindbladian governing the dissipative dynamics. Their signatures have so far been mainly identified in finite-time observables, such as transient currents, while steady-state average currents generally provide no direct evidence of the underlying exceptional-point structure. In this work, we demonstrate that signatures of Lindbladian EPs can nevertheless be accessed in the steady-state regime through current noise. We derive general expressions for current correlation functions within a Lindblad master-equation framework and show, in particular, how exceptional points affect their behaviour as a function of the time delay. We illustrate these results with the paradigmatic example of two interacting qubits coupled to two reservoirs, where the steady-state noise clearly distinguishes overdamped, underdamped, and critical regimes. Our results establish current correlation functions as a steady-state probe of Lindbladian EPs in open quantum systems.", "url": "https://arxiv.org/abs/2606.13377", "type": "理论", "summary": "例外点 (EP) 是两个或多个特征值及其相应特征向量合并的非厄米简并性。在开放量子系统中，控制耗散动力学的 Lindbladian 中可能会出现异常点。迄今为止，它们的特征主要是在有限时间可观测值中识别的，例如瞬态电流，而稳态平均电流通常无法提供潜在异常点结构的直接证据。在这项工作中，我们证明了 Lindbladian EP 的签名仍然可以通过电流噪声在稳态状态下访问。我们在 Lindblad 主方程框架内推导了当前相关函数的一般表达式，并特别展示了异常点如何影响其作为时间延迟函数的行为。我们用两个相互作用的量子位耦合到两个存储库的典型示例来说明这些结果，其中稳态噪声清楚地区分了过阻尼、欠阻尼和临界状态。我们的结果建立了当前的相关函数作为开放量子系统中 Lindbladian EP 的稳态探针。", "authors": [{"name": "Shihang Pan"}, {"name": "Gianmichele Blasi"}, {"name": "Géraldine Haack"}], "featured_authors": [{"name": "Shihang Pan"}, {"name": "Gianmichele Blasi"}, {"name": "Géraldine Haack"}], "author_count": 3}, {"id": "2606.13383", "category": "quant-ph", "title": "Beyond the Unruh vacuum: multi-time correlations in black hole collapse and evaporation", "abstract": "The black hole information paradox originates from the thermal character of Hawking radiation, which appears to erase information about the collapsing matter. However, thermality constrains only observables defined at a single time and leaves the structure of temporal quantum correlations largely unexplored. Here we show that multi-time quantum-field correlations provide a concrete mechanism for the survival of pre-collapse information in black hole evaporation. Using a two-dimensional model of gravitational collapse and evaporation, we demonstrate that late-time multi-time correlations are not fully reproduced by the Unruh vacuum. In particular, they contain a contribution that depends explicitly on parameters characterizing the pre-collapse state, despite the thermal character of the asymptotic radiation. Our results identify measurable multi-time correlations as carriers of information in Hawking radiation and suggest that formulations of the black hole information paradox based solely on single-time observables are incomplete.", "url": "https://arxiv.org/abs/2606.13383", "type": "理论", "summary": "黑洞信息悖论源于霍金辐射的热特性，它似乎消除了有关坍缩物质的信息。然而，热度仅约束在单个时间定义的可观测量，并且使得时间量子相关性的结构在很大程度上未被探索。在这里，我们证明多时间量子场相关性为黑洞蒸发中坍缩前信息的保存提供了具体机制。使用引力塌缩和蒸发的二维模型，我们证明了安鲁真空不能完全再现晚期多时间相关性。特别是，尽管渐近辐射具有热特性，但它们的贡献明显取决于表征塌缩前状态的参数。我们的结果将可测量的多时间相关性确定为霍金辐射中信息的载体，并表明仅基于单时间可观测值的黑洞信息悖论的表述是不完整的。", "authors": [{"name": "Konstantinos Xenos"}, {"name": "Charis Anastopoulos"}, {"name": "Andreas F. Terzis"}], "featured_authors": [{"name": "Konstantinos Xenos"}, {"name": "Charis Anastopoulos"}, {"name": "Andreas F. Terzis"}], "author_count": 3}, {"id": "2606.13404", "category": "quant-ph", "title": "Characterizing the functional role of quantum coherence in energy transfer", "abstract": "Quantum coherence is understood to play a role in excitation energy transfer in open quantum systems, yet a quantitative approach to assessing its influence on the transfer process is still missing. Using Nakajima-Zwanzig projection operators, we derive a general memory kernel identity that enables us to characterize and quantify the impact of coherence in the eigenenergy basis on a generalized rate of energy transfer. Applying our approach to the electronic dynamics of a dimer coupled to a structured phonon bath, we demonstrate how quantum coherence acts to modulate energy transfer.", "url": "https://arxiv.org/abs/2606.13404", "type": "理论", "summary": "据了解，量子相干性在开放量子系统中的激发能量转移中发挥着作用，但仍然缺乏评估其对转移过程影响的定量方法。使用 Nakajima-Zwanzig 投影算子，我们得出了一个通用的内存内核恒等式，使我们能够表征和量化本征能量基础上的相干性对广义能量转移率的影响。将我们的方法应用于与结构化声子浴耦合的二聚体的电子动力学，我们演示了量子相干性如何调节能量转移。", "authors": [{"name": "Hallmann Óskar Gestsson"}, {"name": "Alexandra Olaya-Castro"}], "featured_authors": [{"name": "Hallmann Óskar Gestsson"}, {"name": "Alexandra Olaya-Castro"}], "author_count": 2}, {"id": "2606.13504", "category": "quant-ph", "title": "A refined thermodynamic analysis of nonsecular master equations", "abstract": "We present a systematic thermodynamic analysis of nonsecular master equations. We consider master equations resulting either from the partial secular and the geometric-arithmetic approximations, two approximations ensuring the positivity of the system's dynamics when some of its transition frequencies are too small to enable the full secular approximation. Both cause the system to relax towards a steady state which is not the Gibbs state of its bare Hamiltonian. Nonetheless, we build a unified, consistent thermodynamic framework for those dynamics. Starting from a microscopic expression of the second law based on system-environment correlations, we employ a systematic perturbation theory to preserve the positivity of the second law despite the approximations done on the dynamics. We show that, in spite of the weak system-bath coupling, the system-bath interaction energy participates to the energy balance, as well as the Lamb-shift. Those extra contributions give rise to work performed by the system on the bath when the former is out of equilibrium. We compare this microscopic entropy production with the definition based on the contractivity of the reduced system dynamics (Spohn inequality). We show that, unlike for secular master equations, the two entropy production rates differ because of the presence of non-vanishing stationary coherences in the energy eigenbasis. However, in the case of a single thermal bath, the difference is purely transient, and no work can be cyclically extracted from the steady-state despite its non-Gibbs form. Finally, we illustrate our results with a simple example, clarifying and completing the thermodynamic picture of Markovian dynamics in the quantum regime.", "url": "https://arxiv.org/abs/2606.13504", "type": "理论", "summary": "我们提出了非世俗主方程的系统热力学分析。我们考虑由部分长期近似和几何算术近似产生的主方程，当某些过渡频率太小而无法实现完全长期近似时，这两种近似可确保系统动力学的正性。两者都会导致系统松弛到稳定状态，这不是其裸哈密顿量的吉布斯状态。尽管如此，我们为这些动力学构建了一个统一、一致的热力学框架。从基于系统-环境相关性的第二定律的微观表达开始，我们采用系统摄动理论来保持第二定律的积极性，尽管对动力学进行了近似。我们表明，尽管系统-浴耦合较弱，但系统-浴相互作用能量参与能量平衡以及兰姆位移。当前者失去平衡时，这些额外的贡献会导致系统在浴上做功。\n\n我们将这种微观熵产生与基于简化系统动力学的收缩性（斯波恩不等式）的定义进行比较。我们表明，与长期主方程不同，由于能量本征基中存在非零平稳相干性，两个熵产生率不同。然而，在单个热浴的情况下，差异纯粹是瞬态的，尽管其是非吉布斯形式，但无法从稳态中循环提取功。最后，我们用一个简单的例子来说明我们的结果，阐明并完善了量子状态下马尔可夫动力学的热力学图景。", "authors": [{"name": "Mohamed Boubakour"}, {"name": "Talia Szikman"}, {"name": "Cyril Elouard"}], "featured_authors": [{"name": "Mohamed Boubakour"}, {"name": "Talia Szikman"}, {"name": "Cyril Elouard"}], "author_count": 3}, {"id": "2606.13521", "category": "quant-ph", "title": "Quantum Logic Codes: Complete Transversal Logical Clifford Instruction Sets for High-Rate Stabilizer Quantum Error Correcting Codes", "abstract": "We study the structure and transversal logical capabilities of stabilizer quantum error correcting codes. Among our results, we identify universal lower bounds on circuit depth to generate a full logical Clifford algebra, and develop novel constructions of logical transversal gates including a new depth-one transversal phase $\\mathrm{\\overline{S}}$ gate in the rotated surface code and a depth-one intra-block $\\mathrm{\\overline{CZ}}$ gate in the 2D-toric code that generalizes to all odd distances and all lengths $L\\ge3$, respectively. Finally, we construct a high-rate non-LDPC CSS code family with parameters $[[n,\\sqrt{n},\\Theta({n^{\\beta}})]]$ where $\\beta \\approx 0.2823$ in one demonstrated case, that provably possesses a constant-depth complete 2-local transversal logical Clifford basis instruction set architecture (ISA) composed of all individually targeted $\\mathrm{\\overline{S}}$, $\\mathrm{\\overline{SHS}} = \\sqrt{X}$, and $\\mathrm{\\overline{CZ}}$ gates. This ISA is depth-one for certain subfamilies that we design and generally constant-depth under certain conditions. The code family is built from a small code with parameters $[[n_0, 2, d_0]]$, and is tunable in the standard way: it tiles out to form utility-scale logical qubit counts, and it scales up through concatenation to achieve higher distances and error suppression. We show that this construction preserves the depth-one complete transversal logical Clifford basis ISA when composed with these commuting construction actions, inheriting structure from the core codes so that at scale the complete logical Clifford basis ISA remains depth-one up to depth-two addressable operations between tiled cores. We call these Quantum Logic Codes.", "url": "https://arxiv.org/abs/2606.13521", "type": "理论", "summary": "我们研究稳定器量子纠错码的结构和横向逻辑能力。在我们的结果中，我们确定了电路深度的通用下界，以生成完整的逻辑 Clifford 代数，并开发了逻辑横向门的新颖结构，包括旋转表面代码中的新深度一横向相 $\\mathrm{\\overline{S}}$ 门和 2D-toric 代码中的深度一内块 $\\mathrm{\\overline{CZ}}$ 门，可推广到所有奇数距离和所有长度分别为$L\\ge3$。最后，我们构建了一个带有参数 $[[n,\\sqrt{n},\\Theta({n^{\\beta}})]]$ 的高速非 LDPC CSS 代码族，其中 $\\beta \\approx 0.2823$ 在一个演示的情况下，可证明拥有一个恒定深度的完整 2 局部横向逻辑 Clifford 基础指令集架构 (ISA)，由所有单独的目标 $\\mathrm{\\overline{S}}$ 组成， $\\mathrm{\\overline{SHS}} = \\sqrt{X}$ 和 $\\mathrm{\\overline{CZ}}$ 门。对于我们设计的某些子系列，该 ISA 是深度一的，并且在某些条件下通常是恒定深度。\n\n该代码系列由带有参数 $[[n_0, 2, d_0]]$ 的小代码构建，并且可以标准方式进行调整：它平铺以形成实用规模的逻辑量子位计数，并通过串联进行扩展以实现更高的距离和错误抑制。我们证明，当与这些交换构造动作组合时，这种构造保留了深度一完整横向逻辑克利福德基础 ISA，继承了核心代码的结构，以便在规模上完整逻辑克利福德基础 ISA 在平铺核心之间保持深度一到深度二可寻址操作。我们称这些为量子逻辑代码。", "authors": [{"name": "Adam Holmes"}], "featured_authors": [{"name": "Adam Holmes"}], "author_count": 1}, {"id": "2606.13525", "category": "quant-ph", "title": "Generalized Exact Fractional Quantum Information Model with Memory Effects", "abstract": "In this paper, we analyze quantum information measures in fractional quantum mechanics using the Riemann-Liouville derivative formalism adopted here. In this case, we initially reconsider the conventional definitions of Shannon entropy and Fisher information, subsequently extending them to fractional quantum systems described by nonlocal differential operator frameworks adopted. Within this generalized formulation, fractional expressions of Shannon entropy and Fisher information are constructed and their mathematical structures examined thoroughly. Also, the formalism is then applied to the quantum harmonic oscillator, yielding explicit analytical expressions derived as functions of the fractional parameter therein. The obtained results demonstrate that fractional derivatives alter the localization properties of probability densities and generate nontrivial variations in information content and sensitivity across system behavior. In this context, the fractional parameter plays a central role in controlling deviations from the standard quantum information measures framework. Also, the study establishes a consistent framework for describing information-theoretic properties of quantum systems governed by nonlocal dynamics.", "url": "https://arxiv.org/abs/2606.13525", "type": "理论", "summary": "在本文中，我们使用此处采用的黎曼-刘维尔导数形式来分析分数量子力学中的量子信息度量。在这种情况下，我们首先重新考虑香农熵和费舍尔信息的传统定义，随后将它们扩展到采用非局部微分算子框架描述的分数量子系统。在这个广义公式中，构建了香农熵和费舍尔信息的分数表达式，并彻底检查了它们的数学结构。而且，该形式随后被应用于量子谐振子，产生作为其中分数参数的函数导出的显式解析表达式。获得的结果表明，分数阶导数改变了概率密度的局部化特性，并在系统行为的信息内容和敏感性方面产生了非平凡的变化。在这种情况下，分数参数在控制与标准量子信息测量框架的偏差方面发挥着核心作用。\n\n此外，该研究还建立了一个一致的框架来描述非局域动力学控制的量子系统的信息论特性。", "authors": [{"name": "Abdelmalek Bouzenada"}, {"name": "Allan R. P. Moreira"}], "featured_authors": [{"name": "Abdelmalek Bouzenada"}, {"name": "Allan R. P. Moreira"}], "author_count": 2}, {"id": "2606.13570", "category": "quant-ph", "title": "Approximability limits for bounded-degree max-LINSAT and implications for decoded quantum interferometry", "abstract": "For general max-k-XORSAT with $k \\geq 3$, no polynomial-time algorithm can do substantially better than random guessing on worst-case instances unless $\\mathsf{P} = \\mathsf{NP}$: approximating beyond the random-assignment value of $1/2$ is $\\mathsf{NP}$-hard. The picture changes when each variable appears in at most $D$ constraints. In that bounded-degree setting, polynomial-time algorithms can provably beat the random baseline by an additive amount of order $1/\\sqrt{D}$. For Boolean instances, this scaling is known to be optimal: the matching hardness result is due to Trevisan, while the corresponding algorithmic guarantee was established by Barak et al. Whether the same holds over general finite fields, and what it implies for quantum algorithms, has not been established. We make this connection explicit and extend the hardness to max-E$k$-LINSAT$(q,r)$ with bounded degree $D$ and over arbitrary finite fields $\\mathbb{F}_q$, proving that it is $\\mathsf{NP}$-hard to exceed $r/q + \\mathcal{O}_{q,r}(1/\\sqrt{D})$. These results provide the complexity-theoretic benchmark for the bounded-degree instances targeted by decoded quantum interferometry (DQI), QAOA, and classical heuristics. Any quantum advantage on bounded-degree instances is therefore confined to the constant prefactor. We further show that in the context of DQI and on $(k,D)$-regular instances, this prefactor is sensitive to the nature of the decoder: DQI with classical decoders faces an information-theoretic $1/\\sqrt{D \\log D}$ barrier that prevents it from matching the hardness scaling, while DQI with quantum decoders is compatible with the $1/\\sqrt{D}$ scaling -- identifying quantum decoding as the key ingredient for matching the complexity-theoretic scaling with DQI.", "url": "https://arxiv.org/abs/2606.13570", "type": "理论+数值", "summary": "对于 $k \\geq 3$ 的一般 max-k-XORSAT，任何多项式时间算法都无法比最坏情况下的随机猜测做得更好，除非 $\\mathsf{P} = \\mathsf{NP}$：近似超过 $1/2$ 的随机分配值是 $\\mathsf{NP}$-hard。当每个变量最多出现在 $D$ 约束中时，情况就会发生变化。在有界度设置中，多项式时间算法可以证明以 $1/\\sqrt{D}$ 阶数的附加量击败随机基线。对于布尔实例，这种缩放已知是最佳的：匹配的硬度结果来自 Trevisan，而相应的算法保证是由 Barak 等人建立的。同样的情况是否适用于一般有限域，以及它对量子算法意味着什么，尚未确定。我们将这种联系明确化，并将难度扩展到 max-E$k$-LINSAT$(q,r)$，有界度 $D$ 和任意有限域 $\\mathbb{F}_q$，证明 $\\mathsf{NP}$ 很难超过 $r/q + \\mathcal{O}_{q,r}(1/\\sqrt{D})$。这些结果为解码量子干涉测量 (DQI)、QAOA 和经典启发法所针对的有界度实例提供了复杂性理论基准。\n\n因此，有界度实例上的任何量子优势都仅限于常数前因子。我们进一步表明，在 DQI 和 $(k,D)$ 常规实例中，该前因子对解码器的性质很敏感：经典解码器的 DQI 面临信息论 $1/\\sqrt{D \\log D}$ 障碍，阻止其匹配硬度缩放，而量子解码器的 DQI 与 $1/\\sqrt{D}$ 缩放兼容 - 将量子解码识别为将复杂性理论缩放与 DQI 匹配的关键要素。", "authors": [{"name": "Maximilian J. Kramer"}, {"name": "Carsten Schubert"}, {"name": "Jens Eisert"}], "featured_authors": [{"name": "Maximilian J. Kramer"}, {"name": "Carsten Schubert"}, {"name": "Jens Eisert"}], "author_count": 3}, {"id": "2606.13606", "category": "quant-ph", "title": "Diffusive Dynamics of Nonstabilizerness", "abstract": "Symmetries shape the quantum-information dynamics of many-body systems, but their effect on nonstabilizerness, the resource complementary to entanglement, is less understood. We compute the stabilizer Rényi entropy, a measure of nonstabilizerness, in $\\mathrm{U}(1)$-symmetric one-dimensional random circuits. The disorder-averaged dynamics is captured by a four-replica tensor network, which we evaluate by $S_4$-adapted infinite time-evolving block decimation (iTEBD) directly in the thermodynamic limit. Together with a hydrodynamic argument, our results identify a diffusive universality class for the late-time approach of nonstabilizerness to its random-state value, with the stabilizer Rényi entropy gap closing as $1/t$. The same scaling is verified in an energy-conserving nonintegrable Ising chain. More broadly, our framework provides a hydrodynamic perspective on nonstabilizerness generation and offers insight into the design of approximate Haar-random states in Hamiltonian dynamics.", "url": "https://arxiv.org/abs/2606.13606", "type": "理论+数值", "summary": "对称性塑造了多体系统的量子信息动力学，但它们对非稳定器（纠缠的补充资源）的影响却知之甚少。我们计算 $\\mathrm{U}(1)$ 对称一维随机电路中的稳定器 Rényi 熵，即非稳定性的度量。无序平均动力学由四副本张量网络捕获，我们直接在热力学极限下通过 $S_4$ 适应的无限时间演化块抽取 (iTEBD) 对其进行评估。与流体动力学论证一起，我们的结果确定了非稳定器对其随机状态值的后期方法的扩散普遍性类别，稳定器 Rényi 熵差接近为 1/t 美元。相同的缩放比例在节能的不可积 Ising 链中得到了验证。更广泛地说，我们的框架提供了非稳定剂生成的流体动力学视角，并提供了对哈密顿动力学中近似哈尔随机态设计的见解。", "authors": [{"name": "Zhenyu Xiao"}, {"name": "Shinsei Ryu"}], "featured_authors": [{"name": "Zhenyu Xiao"}, {"name": "Shinsei Ryu"}], "author_count": 2}, {"id": "2606.13638", "category": "quant-ph", "title": "Optimal classical shadow estimation of unitary channels at Heisenberg limit", "abstract": "Full tomography of an unknown quantum evolution is resource-intensive and often unnecessary when the goal is only to predict selected properties. This motivates the study of classical shadow estimation of unitary channels (CSEU), a task in which one queries an unknown $d$-dimensional unitary $U$ and stores classical data that can later be used to predict expectation values $\\mathrm{tr}[O \\cdot U\\rho U^\\dagger]$ up to additive error $\\varepsilon$ for arbitrary input states $\\rho$ and observables $O$. We propose a parallel, non-adaptive CSEU protocol using $\\mathcal{O}(d\\varepsilon^{-1})$ queries when the input states or observables have constant rank. This achieves Heisenberg scaling with respect to $\\varepsilon$ and is query-optimal, as we prove a matching $\\Omega(d\\varepsilon^{-1})$ lower bound that remains valid even with stronger access to the unknown unitary. Our query-optimal CSEU protocol provides a versatile and powerful tool for quantum learning theory, pushing the performance limits of several fundamental learning tasks, including unitary channel tomography, Hamiltonian learning, boundary-regime quantum channel tomography, Pauli transfer matrix learning, inverse-free amplitude estimation, pure-state property estimation, and shallow-circuit learning. Remarkably, we show that optimal unitary channel tomography can be achieved using only parallel queries, closing the gap between the best achievable efficiency of parallel and sequential tomography protocols. Together, these applications establish our framework as a fundamental tool for learning properties of quantum processes, particularly for certain key tasks that require high precision.", "url": "https://arxiv.org/abs/2606.13638", "type": "理论", "summary": "未知量子演化的完整断层扫描是资源密集型的，并且当目标只是预测选定的属性时通常是不必要的。这激发了对单一通道经典阴影估计（CSEU）的研究，这是一项任务，其中查询未知的 $d$ 维单一 $U$ 并存储经典数据，这些数据稍后可用于预测任意输入状态 $\\rho$ 和可观测值 $O$ 的期望值 $\\mathrm{tr}[O \\cdot U\\rho U^\\dagger]$ 直至附加误差 $\\varepsilon$。当输入状态或可观察量具有恒定等级时，我们提出了一种并行的、非自适应的 CSEU 协议，使用 $\\mathcal{O}(d\\varepsilon^{-1})$ 查询。这实现了相对于 $\\varepsilon$ 的海森堡缩放，并且是查询最优的，因为我们证明了匹配的 $\\Omega(d\\varepsilon^{-1})$ 下界，即使对未知酉的访问更强，该下界仍然有效。\n\n我们的查询最优 CSEU 协议为量子学习理论提供了一个多功能且强大的工具，突破了几个基本学习任务的性能极限，包括酉通道层析成像、哈密顿学习、边界区域量子通道层析成像、泡利转移矩阵学习、无逆幅度估计、纯态属性估计和浅电路学习。值得注意的是，我们表明仅使用并行查询就可以实现最佳的单一通道断层扫描，从而缩小了并行和顺序断层扫描协议的最佳可实现效率之间的差距。这些应用程序共同将我们的框架建立为学习量子过程特性的基本工具，特别是对于某些需要高精度的关键任务。", "authors": [{"name": "Entong He"}, {"name": "Zihao Li"}, {"name": "Noam Scully"}, {"name": "Sisi Zhou"}, {"name": "Yuxiang Yang"}], "featured_authors": [{"name": "Entong He"}, {"name": "Zihao Li"}, {"name": "Noam Scully"}, {"name": "Sisi Zhou"}, {"name": "Yuxiang Yang"}], "author_count": 5}, {"id": "2606.13641", "category": "quant-ph", "title": "Generalized two-qubit Hamiltonian for Projective Quantum Feature Maps", "abstract": "Projected quantum feature maps provide a strategy for using quantum processors as feature generators for classical machine-learning models. Building on counterdiabatic Ising-glass and one-dimensional Heisenberg PQFMs, we introduce a generalized two-qubit Hamiltonian-based PQFM that provides a unified way to encode classical features through local Pauli fields and pairwise two-qubit Pauli interactions. This construction allows distinct classical variables to be embedded along different Pauli axes of the same qubit, increasing the information density of shallow circuits while remaining compatible with hardware constraints. We develop and implement these methods in pqfmlib, a publicly available Python library for constructing, executing, and benchmarking Hamiltonian-based this http URL then benchmark the generalized Hamiltonian PQFMs against reference PQFMs on four biomedical classification datasets under a nested cross-validation protocol with paired statistical tests. Quantum features are generated using both IBM quantum processors with up to 156 qubits and statevector simulations. Our results show that the generalized two-qubit Hamiltonian family provides the most consistent pattern of statistically supported gains over matched classical baselines, although the performance of all methods depends on the dataset, encoding strategy, measured observables, and hardware conditions. These findings support generalized Hamiltonian PQFMs as a promising route toward near-term quantum utility.", "url": "https://arxiv.org/abs/2606.13641", "type": "理论+数值", "summary": "投影量子特征图提供了一种使用量子处理器作为经典机器学习模型的特征生成器的策略。在反绝热量伊辛玻璃和一维海森堡 PQFM 的基础上，我们引入了一种基于哈密顿量的广义双量子位 PQFM，它提供了一种通过局部泡利场和成对双量子位泡利相互作用来编码经典特征的统一方法。这种结构允许沿着同一量子位的不同泡利轴嵌入不同的经典变量，增加浅层电路的信息密度，同时保持与硬件限制的兼容。我们在 pqfmlib 中开发和实现这些方法，pqfmlib 是一个公开可用的 Python 库，用于构建、执行和基准测试基于哈密顿量的此 http URL，然后在嵌套交叉验证协议和配对统计测试下，针对四个生物医学分类数据集上的参考 PQFM 对广义哈密顿量 PQFM 进行基准测试。量子特征是使用具有高达 156 个量子位的 IBM 量子处理器和状态向量模拟生成的。\n\n我们的结果表明，尽管所有方法的性能都取决于数据集、编码策略、测量的可观测值和硬件条件，但广义二量子位哈密顿家族提供了与匹配的经典基线相比最一致的统计支持增益模式。这些发现支持广义哈密顿 PQFM 作为实现近期量子实用性的一条有前途的途径。", "authors": [{"name": "Rafael Simões do Carmo"}, {"name": "Edson Amaro Junior"}, {"name": "Felipe Fanchini"}], "featured_authors": [{"name": "Rafael Simões do Carmo"}, {"name": "Edson Amaro Junior"}, {"name": "Felipe Fanchini"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
