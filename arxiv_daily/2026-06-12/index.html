\mu^2$, while near a critical point it crosses over to the universal Puiseux form dictated by Ising critical scaling. We show that the complex-$T$ and complex-$\\mu$ trajectories are controlled by the same scaling variables and mapping coefficients, so their comparison provides a stringent consistency test of critical-point searches and constrains the extent of the critical scaling regime. Finally, we analyze lattice-QCD data at $\\mu=0$ using an iterated conformal-Pade approach and extract the continuum location of the nearest complex-temperature singularity. The result is consistent with the expectation that, at physical quark masses, the real part of the leading singularity lies between the chiral-limit transition temperature and the physical-mass chiral-susceptibility peak temperature, while its imaginary part remains nonzero.", "url": "https://arxiv.org/abs/2606.12622", "type": "理论", "summary": "我们通过将温度视为复杂变量来研究 QCD 相图的解析结构。复杂$T$平面中最近的杨-李边缘奇点限制了温度相关热力学可观测量的分析域，并补充了复杂化学势平面中更常研究的奇点。我们的分析结合了三个互补的观点：通用临界标度、从晶格 QCD 数据中提取第一性原理以及有效模型中的明确说明。我们在随机矩阵模型和夸克介子模型中说明了所得结构，其中可以明确地遵循奇点轨迹。在较小的实际化学势下，领先的复杂温度奇点允许以 $\\mu^2$ 为单位进行解析展开式，而在接近临界点时，它会跨越伊辛临界标度所规定的通用 Puiseux 形式。我们表明，complex-$T$ 和complex-$\\mu$ 轨迹由相同的缩放变量和映射系数控制，因此它们的比较提供了临界点搜索的严格一致性测试，并限制了临界缩放机制的范围。\n\n最后，我们使用迭代共角 Pade 方法分析 $\\mu=0$ 处的晶格 QCD 数据，并提取最近的复温度奇点的连续体位置。结果与预期一致，即在物理夸克质量下，主奇点的实部位于手性极限转变温度和物理质量手性磁化率峰值温度之间，而其虚部保持非零。", "authors": [{"name": "Gokce Basar"}, {"name": "Vladimir V. Skokov"}], "featured_authors": [{"name": "Gokce Basar"}, {"name": "Vladimir V. Skokov"}], "author_count": 2}, {"id": "2606.12636", "category": "hep-th", "title": "Quantum Stochastic Inflation", "abstract": "We formulate stochastic inflation in an open quantum system framework. The field coarse-grained in a patch of fixed physical size, and the total momentum of that patch, form a canonical pair and act on a one-mode Fock space which we identify as the \"bulk\". At each time step, new comoving modes join the coarse-grained patch and the bulk has to be redefined. This redefinition produces an entangled mode that is traced over, yielding a non-unitary evolution equation for the bulk's density matrix. For a free test field in de Sitter, one obtains GKLS dynamics, generated by an effective Hamiltonian and a single non-Hermitian Lindblad operator, hence diffusion and Hubble friction originate from the same quantum channel. The Wigner-Weyl transform of the GKLS equation leads to a Fokker-Planck equation for the Wigner function, which matches the one that applies to the classical phase-space distribution of stochastic inflation. We also provide several schemes under which one can unravel the GKLS dynamics into stochastic Schrodinger equations when continuous measurements of the decoupled mode are performed, making contact with Langevin formulations of stochastic inflation. In the light-field regime, an additional overdamped reduction can be performed by integrating out the momentum variable in the Wigner distribution, leading to Starobinsky's slow-roll Fokker-Planck equation. In that regime, the purity of the patch is strongly suppressed. In contrast, for heavy fields, field diffusion is suppressed and the coarse-grained patch remains close to a pure underdamped oscillator, which prevents a classical stochastic treatment.", "url": "https://arxiv.org/abs/2606.12636", "type": "理论", "summary": "我们在开放的量子系统框架中制定随机膨胀。固定物理尺寸的斑块中的粗粒度场以及该斑块的总动量形成规范对，并作用于单模福克空间，我们将其称为“块”。在每个时间步长，新的共动模式都会加入粗粒度补丁中，并且必须重新定义块体。这种重新定义产生了一种可追踪的纠缠模式，从而产生了体密度矩阵的非酉演化方程。对于德西特的自由测试场，可以获得由有效哈密顿算子和单个非厄米林德布拉德算子生成的 GKLS 动力学，因此扩散和哈勃摩擦源自同一量子通道。 GKLS 方程的维格纳-韦尔变换得出维格纳函数的福克-普朗克方程，该方程与适用于随机膨胀的经典相空间分布的方程相匹配。我们还提供了几种方案，在这些方案下，当执行解耦模式的连续测量时，可以将 GKLS 动力学分解为随机薛定谔方程，从而与随机膨胀的 Langevin 公式建立联系。\n\n在光场状态下，可以通过对维格纳分布中的动量变量进行积分来执行额外的过阻尼减少，从而得到斯塔罗宾斯基的慢滚福克-普朗克方程。在这种情况下，补丁的纯度受到强烈抑制。相反，对于重场，场扩散受到抑制，并且粗粒斑块保持接近纯欠阻尼振荡器，这阻止了经典的随机处理。", "authors": [{"name": "Robson Christie"}, {"name": "Jaewoo Joo"}, {"name": "Greg Kaplanek"}, {"name": "Vincent Vennin"}, {"name": "David Wands"}], "featured_authors": [{"name": "Robson Christie"}, {"name": "Jaewoo Joo"}, {"name": "Greg Kaplanek"}, {"name": "Vincent Vennin"}, {"name": "David Wands"}], "author_count": 5}, {"id": "2606.12901", "category": "hep-th", "title": "Quantum Gravity Induced Entanglement from Propagating Gravitons", "abstract": "In this work, we show how the interaction between propagating modes of the quantized gravitational field and two massive particles trapped in a harmonic oscillator potential can cause the two particles to become entangled. To demonstrate this, we employ an operator-based approach within the framework of the Feynman-Vernon influence functional. Through this method, we find that the effect of the gravitational field on the generated entanglement is encoded in the commutation relations of the gravitational field. This result indicates that, within the framework of the model considered, entanglement arises through the quantum contributions of the gravitational field. Furthermore, this work also shows that entanglement is not formed instantaneously after the two particles interact with the gravitational field. Instead, there exists a time delay, proportional to the distance between the particles, before entanglement is established. This result reflects the causal propagation nature of gravitational interactions. In general, the entanglement generated through this mechanism is extremely small. Nevertheless, if the initial quantum states of the two massive particles are chosen to be squeezed states, the amount of generated entanglement can be enhanced, although the resulting effect remains very small.", "url": "https://arxiv.org/abs/2606.12901", "type": "理论", "summary": "在这项工作中，我们展示了量子化引力场的传播模式与被困在谐振子势中的两个大质量粒子之间的相互作用如何导致这两个粒子纠缠。为了证明这一点，我们在费曼-弗农影响函数的框架内采用了基于算子的方法。通过这种方法，我们发现引力场对生成纠缠的影响被编码在引力场的交换关系中。这一结果表明，在所考虑的模型框架内，纠缠是通过引力场的量子贡献而产生的。此外，这项工作还表明，两个粒子与引力场相互作用后，纠缠并不是立即形成的。相反，在建立纠缠之前，存在与粒子之间的距离成比例的时间延迟。这一结果反映了引力相互作用的因果传播性质。一般来说，通过这种机制产生的纠缠是极小的。\n\n然而，如果将两个大质量粒子的初始量子态选择为压缩态，则可以增强生成的纠缠量，尽管产生的效果仍然非常小。", "authors": [{"name": "Anom Trenggana"}, {"name": "Freddy P. Zen"}], "featured_authors": [{"name": "Anom Trenggana"}, {"name": "Freddy P. Zen"}], "author_count": 2}, {"id": "2606.12929", "category": "hep-th", "title": "Double copy of form factors with multiple operator insertions", "abstract": "Extending the double copy of scattering amplitudes to more general physical quantities involving local gauge-invariant operators is a central open question. While progress has been made in the double copy of form factors (FFs) with a single-operator insertion, it has led to two intriguing features: poles that are spurious from the FF viewpoint become physical propagators in gravity, and FFs obey hidden factorization relations on these poles. This picture is difficult to generalize to FFs with multiple operator insertions due to even more complicated spurious pole structures. We resolve this problem by introducing a \"dyeing\" procedure that promotes color-singlet operators to adjoint colored states, while the original FF is recovered by the inverse \"bleaching\" (U(1) decoupling) operation. In this new picture, the spurious poles are propagators of the dyed state, and the hidden factorization relations follow from BCJ relations of the dyed amplitudes. For multiple operator insertions, this framework uncovers a new scalar-ordering structure that survives the double copy to gravity.", "url": "https://arxiv.org/abs/2606.12929", "type": "理论", "summary": "将散射振幅的双副本扩展到涉及局部规范不变算子的更一般的物理量是一个中心悬而未决的问题。虽然在单算子插入的形状因子 (FF) 的双重副本方面取得了进展，但它带来了两个有趣的特征：从 FF 角度来看，虚假的极点变成了重力的物理传播者，并且 FF 服从这些极点上的隐藏因式分解关系。由于杂散极点结构更加复杂，该图很难推广到具有多个算子插入的 FF。我们通过引入“染色”过程来解决这个问题，该“染色”过程促进颜色单峰算子伴随有色状态，同时通过逆“漂白”（U(1) 解耦）操作恢复原始 FF。在这张新图中，杂散极点是染色态的传播者，隐藏的因式分解关系来自染色振幅的 BCJ 关系。对于多个运算符插入，该框架揭示了一种新的标量排序结构，该结构在双重复制重力作用下仍然存在。", "authors": [{"name": "Xinyue Li"}, {"name": "Gang Yang"}, {"name": "Guorui Zhu"}], "featured_authors": [{"name": "Xinyue Li"}, {"name": "Gang Yang"}, {"name": "Guorui Zhu"}], "author_count": 3}, {"id": "2606.13064", "category": "hep-th", "title": "Exact Relevant Stress-Tensor Flows and a Causality No-Go in Self-Dual Electrodynamics", "abstract": "Can a classically relevant stress-tensor deformation be exactly solvable, duality preserving, and physically causal? We construct an exact power-law family of nonlinear electrodynamics preserving electromagnetic duality, together with a parallel two-dimensional Lax-integrable realization. Its auxiliary geometry yields the full characteristic-cone phase diagram and a universal finite-energy fold. For the Maxwell seed, every nonzero relevant branch is acausal, whereas every causal branch is caustic-free; undeformed Maxwell theory is the only causal point in the relevant regime.", "url": "https://arxiv.org/abs/2606.13064", "type": "理论", "summary": "经典相关的应力张量变形是否可以完全求解、保持对偶性并且具有物理因果关系？我们构建了一个保留电磁对偶性的非线性电动力学的精确幂律族，以及并行二维 Lax 可积实现。其辅助几何结构产生完整的特征锥相图和通用的有限能量折叠。对于麦克斯韦种子，每个非零相关分支都是非因果的，而每个因果分支都是无腐蚀性的；未变形的麦克斯韦理论是相关体系中唯一的因果点。", "authors": [{"name": "H. Babaei-Aghbolagh"}, {"name": "Bin Chen"}, {"name": "Song He"}, {"name": "Jue Hou"}], "featured_authors": [{"name": "H. Babaei-Aghbolagh"}, {"name": "Bin Chen"}, {"name": "Song He"}, {"name": "Jue Hou"}], "author_count": 4}, {"id": "2606.13098", "category": "hep-th", "title": "The Graviton Propagator in Asymptotically Safe Gravity with Non-Local Form Factors", "abstract": "We analyze the flow of the background graviton propagator driven by the running of asymptotically safe form factors in four-dimensional quantum gravity at quadratic order in the curvature expansion. We construct the propagator in the $k=0$ limit and investigate its momentum dependence. The non-local form factors are then analytically continued to Minkowski spacetime, from which the corresponding Minkowskian propagator is obtained. We find a single pole at $q^2=0$ with positive residue and no additional ghost poles at this level of approximation. The corresponding Newtonian potential is found to be regular at $r=0$.", "url": "https://arxiv.org/abs/2606.13098", "type": "理论", "summary": "我们分析了由四维量子引力中曲率展开的二次阶渐近安全形状因子运行驱动的背景引力子传播器的流动。我们在 $k=0$ 限制下构建传播器并研究其动量依赖性。然后将非局部形状因子解析延续到闵可夫斯基时空，从中获得相应的闵可夫斯基传播器。我们在 $q^2=0$ 处找到一个具有正残差的单极点，并且在此近似水平上没有额外的鬼极点。发现相应的牛顿势在 $r=0$ 处是规则的。", "authors": [{"name": "Emiliano Maria Glaviano"}], "featured_authors": [{"name": "Emiliano Maria Glaviano"}], "author_count": 1}, {"id": "2606.13388", "category": "hep-th", "title": "From 2D Yang-Mills to Calogero-Sutherland via a colored particle", "abstract": "We study Yang-Mills theory coupled to a particle on a cylinder, where gauge invariance and compactness reduce the dynamics to a finite dimensional quantum system. In the Abelian case, this yields a model equivalent to the Landau problem on a torus, with a degenerate ground state structure. We generalize this construction to non-Abelian gauge groups and show that, for SU(N), the system reduces to a one dimensional quantum many body problem with a singular Calogero-Sutherland-type interaction.", "url": "https://arxiv.org/abs/2606.13388", "type": "理论", "summary": "我们研究与圆柱体上的粒子耦合的杨-米尔斯理论，其中规范不变性和紧致性将动力学降低到有限维量子系统。在阿贝尔情况下，这产生了一个与环面上的朗道问题等效的模型，具有简并的基态结构。我们将这种构造推广到非阿贝尔规范群，并表明，对于 SU(N)，系统可简化为具有奇异 Calogero-Sutherland 型相互作用的一维量子多体问题。", "authors": [{"name": "Marcia Tenser"}, {"name": "Amilcar R. Queiroz"}], "featured_authors": [{"name": "Marcia Tenser"}, {"name": "Amilcar R. Queiroz"}], "author_count": 2}, {"id": "2606.13539", "category": "hep-th", "title": "Conformally Invariant Corrections to the Anomaly-Induced Effective Action and Black Hole Evaporation in Four Dimensions", "abstract": "When matter fields are integrated out in a large N approximation, the conformal anomaly induces an effective action up to conformally invariant correction terms. In the present work, we consider the implications on black hole evaporation of such a term involving a conformal invariant found by Fefferman and Graham. Working in an approximation where the spacetime is static, we compute the induced stress tensor around a Schwarzschild black hole. The boundary conditions select an Unruh-like asymptotic sector, but not a unique stress tensor. A new one-parameter family of quantum hair emerges which changes the stress tensor in the near-horizon region. This suggests a new semiclassical mechanism by which information about black hole formation could be encoded outside the horizon.", "url": "https://arxiv.org/abs/2606.13539", "type": "理论", "summary": "当物质场以大 N 近似积分时，共形异常会产生有效的作用，直至共形不变校正项。在目前的工作中，我们考虑了涉及费弗曼和格雷厄姆发现的共形不变量这一术语对黑洞蒸发的影响。在时空静态的近似下，我们计算史瓦西黑洞周围的诱导应力张量。边界条件选择类 Unruh 渐近扇区，但不是唯一的应力张量。一种新的单参数量子毛发族的出现，改变了近地平线区域的应力张量。这提出了一种新的半经典机制，通过该机制可以在视界外编码有关黑洞形成的信息。", "authors": [{"name": "Bing-Nan Liu"}, {"name": "David A. Lowe"}], "featured_authors": [{"name": "Bing-Nan Liu"}, {"name": "David A. Lowe"}], "author_count": 2}, {"id": "2606.13546", "category": "hep-th", "title": "Logarithmic corrections to the entropy of near-extremal black holes in New Massive Gravity", "abstract": "We study the one-loop correction to the entropy of near-extremal black holes in three-dimensional massive gravity at the special point where the theory exhibits a unique maximally symmetric vacuum and non-constant curvature hairy black holes can achieve extremality even in the static case. Focusing on the near-horizon AdS$_2\\times S^1$ geometry, we evaluate the contribution of boundary graviton modes that become exact zero modes in the extremal limit. We show that the resulting one-loop partition function generates logarithmic corrections to the semiclassical entropy, providing a new extension to higher-curvature gravity of what has been recently obtained for near-extremal black holes in General Relativity.", "url": "https://arxiv.org/abs/2606.13546", "type": "理论", "summary": "我们研究了三维大质量引力中近极值黑洞熵在特殊点上的单环修正，该理论表现出独特的最大对称真空和非等曲率毛状黑洞即使在静态情况下也能达到极值。着眼于近地平线 AdS$_2\\times S^1$ 几何结构，我们评估了在极值极限下变成精确零模的边界引力子模的贡献。我们表明，由此产生的单循环配分函数对半经典熵产生对数校正，为最近在广义相对论中近极值黑洞获得的更高曲率引力提供了新的扩展。", "authors": [{"name": "Lucas Acito"}, {"name": "Mariano Chernicoff"}, {"name": "Julio Oliva"}, {"name": "Cielo Ramirez de Arellano Torres"}, {"name": "Matías Sempe"}], "featured_authors": [{"name": "Lucas Acito"}, {"name": "Mariano Chernicoff"}, {"name": "Julio Oliva"}, {"name": "Cielo Ramirez de Arellano Torres"}, {"name": "Matías Sempe"}], "author_count": 5}, {"id": "2606.13551", "category": "hep-th", "title": "A ribbon ZX calculus for gauge theory", "abstract": "ZX calculus provides a graphical formalism for reasoning about quantum processes, built from two interacting Frobenius algebras associated with the Z and X bases of a qubit. While it has found widespread application in quantum information and computing, its relationship to quantum field theory has only recently begun to be explored. In this work, we further develop this connection by providing a generalization of ZX calculus to two-dimensional Yang Mills theory with a compact gauge group. The key observation is that both frameworks can be organized around the Hopf Frobenius algebraic structure associated with a group algebra, which can in turn be described by the diagrammatics of two dimensional topological quantum field theory. Given the well known relationship between gauge theory and gravity in two and three dimensions, our work paves the way for applications of ZX to low dimensional gravity.", "url": "https://arxiv.org/abs/2606.13551", "type": "理论", "summary": "ZX 演算提供了用于推理量子过程的图形形式，由与量子位的 Z 和 X 基相关的两个相互作用的 Frobenius 代数构建而成。虽然它在量子信息和计算中得到了广泛的应用，但它与量子场论的关系最近才开始被探索。在这项工作中，我们通过将 ZX 微积分推广到具有紧凑规范组的二维 Yang Mills 理论，进一步发展了这种联系。关键的观察结果是，这两个框架都可以围绕与群代数相关的 Hopf Frobenius 代数结构进行组织，而群代数又可以通过二维拓扑量子场论的图解来描述。鉴于规范理论与二维和三维引力之间众所周知的关系，我们的工作为 ZX 在低维引力中的应用铺平了道路。", "authors": [{"name": "Gabriel Wong"}, {"name": "Razin A. Shaikh"}, {"name": "William Donnelly"}], "featured_authors": [{"name": "Gabriel Wong"}, {"name": "Razin A. Shaikh"}, {"name": "William Donnelly"}], "author_count": 3}, {"id": "2606.13599", "category": "hep-th", "title": "Black Hole Thermodynamics Meets On-Shell Amplitudes: Local Detailed Balance and Thermal Spectrum from Spin Universality and Unitarity", "abstract": "We develop an on-shell framework for thermal dissipation and radiation by macroscopic objects, whose large degeneracy of internal states is encoded in their entropy. In this framework, equilibrium asymptotic states are represented as on-shell particles, while non-equilibrium processes are described by on-shell transition amplitudes between them. A central observation is that spinning states remain essential even for macroscopically non-rotating objects. Consistency with macroscopic symmetries then implies spin universality, whereby all spinning states are governed by a single universal coupling. A key consequence is that absorption and emission probabilities are controlled by the same coupling, yielding local detailed balance directly from on-shell data. Applied to black holes, our framework reproduces the thermal emission spectrum and relates the Hawking temperature to the condition of maximal absorption consistent with unitary time evolution.", "url": "https://arxiv.org/abs/2606.13599", "type": "理论", "summary": "我们开发了一个用于宏观物体热耗散和辐射的壳上框架，其内部状态的大量简并被编码在它们的熵中。在这个框架中，平衡渐近态被表示为壳上粒子，而非平衡过程则由它们之间的壳上跃迁幅度来描述。一个中心观察是，即使对于宏观上不旋转的物体，旋转状态仍然至关重要。与宏观对称性的一致性意味着自旋普遍性，即所有自旋状态都由单个普遍耦合控制。一个关键的结果是吸收和发射概率由相同的耦合控制，直接从壳上数据产生局部详细平衡。应用于黑洞，我们的框架再现了热发射光谱，并将霍金温度与与单一时间演化一致的最大吸收条件联系起来。", "authors": [{"name": "Dogan Akpinar"}, {"name": "Katsuki Aoki"}, {"name": "Andrea Cristofoli"}, {"name": "Hyun Jeong"}, {"name": "Kaho Yoshimura"}], "featured_authors": [{"name": "Dogan Akpinar"}, {"name": "Katsuki Aoki"}, {"name": "Andrea Cristofoli"}, {"name": "Hyun Jeong"}, {"name": "Kaho Yoshimura"}], "author_count": 5}, {"id": "2606.13611", "category": "hep-th", "title": "Cosmological Dynamics of the Thermal Scalar Near the Hagedorn Temperature", "abstract": "We study the cosmological dynamics of the thermal scalar the winding string mode that becomes massless at the Hagedorn transition by coupling it to the string-frame gravi dilaton effective action. This provides a field-theoretic framework for investigating winding mode dynamics near the Hagedorn temperature and their role in string cosmology. Below the Hagedorn temperature, the phase space contains static configurations in which the thermal scalar balances the shifted dilaton evolution. These configurations are boundary states rather than attractors, and when the thermal scalar mass depends on the scale factor, winding mode back reaction opposes expansion and can reverse it. Above the Hagedorn temperature, the tachyonic thermal scalar generates negative effective energy density while preserving the null energy condition, enabling branch changes of the Brustein Veneziano type. These transitions do not provide the graceful exit required to connect the Hagedorn phase to standard cosmological evolution. At the Hagedorn temperature itself, the quadratic effective theory breaks down and higher order interactions become essential. Because the thermal scalar originates as a Euclidean order parameter, our Lorentzian treatment should be viewed as an effective dynamical model of the Hagedorn transition. Within this framework, the thermal scalar clarifies the dynamical structure surrounding the Hagedorn transition and shows how the Hagedorn exit problem cannot be resolved within the quadratic effective theory alone.", "url": "https://arxiv.org/abs/2606.13611", "type": "理论", "summary": "我们通过将热标量与弦框架重力膨胀有效作用耦合来研究在哈格多恩转变时变得无质量的热标量的宇宙学动力学。这为研究哈格多恩温度附近的缠绕模式动力学及其在弦宇宙学中的作用提供了一个场论框架。在哈格多恩温度以下，相空间包含静态配置，其中热标量平衡了位移膨胀子演化。这些配置是边界态而不是吸引子，当热标量质量取决于比例因子时，卷绕模式反作用会阻止膨胀并可以反转它。高于哈格多恩温度时，快子热标量会产生负有效能量密度，同时保持零能量条件，从而实现 Brustein Veneziano 类型的分支变化。这些转变并没有提供将哈格多恩阶段与标准宇宙演化连接起来所需的优雅退出。在哈格多恩温度下，二次有效理论失效，高阶相互作用变得至关重要。\n\n由于热标量源自欧几里德阶参数，因此我们的洛伦兹处理应被视为哈格多恩转变的有效动力学模型。在这个框架内，热标量阐明了哈格多恩转变周围的动力学结构，并表明哈格多恩出口问题如何无法仅在二次有效理论中得到解决。", "authors": [{"name": "Arnab Pradhan"}, {"name": "Luis Rufino"}, {"name": "Scott Watson"}], "featured_authors": [{"name": "Arnab Pradhan"}, {"name": "Luis Rufino"}, {"name": "Scott Watson"}], "author_count": 3}, {"id": "2606.13627", "category": "hep-th", "title": "A Graphical Coaction for FRW Integrals from Partial/Relative Twisted (Co)homology", "abstract": "We construct a graphical coaction for Friedmann-Robertson-Walker (FRW) integrals at all loop orders in conformally-coupled scalar theories with non-conformal polynomial interactions. Our construction makes use of intersection theory in the context of (partial/relative) twisted (co)homology, which we use to decompose FRW integrals (and their discontinuities and derivatives) into building blocks that can be represented as decorations of the original Feynman diagram. This facilitates a purely graphical description of the coaction, up to rational prefactors that can be read off from the graph. Our construction provides a comprehensive combinatorial framework for dissecting the analytic properties of cosmological observables; in particular, we demonstrate that the combinatorics of the differential equations that govern FRW integrals -- their so-called kinematic flow -- is a natural consequence of our coaction. We have also developed a user-friendly web application that computes the graphical coaction of any graph: this https URL . Whenever possible, the web application also computes the differentials and discontinuities. A Mathematica notebook with the same functionality is also hosted at on a public GitHub repository.", "url": "https://arxiv.org/abs/2606.13627", "type": "理论", "summary": "我们在具有非共形多项式相互作用的共形耦合标量理论中，为所有循环阶数的 Friedmann-Robertson-Walker (FRW) 积分构建了图形相互作用。我们的构造在（部分/相对）扭曲（共）同调的背景下使用相交理论，我们用它来将 FRW 积分（及其不连续性和导数）分解为可以表示为原始费曼图的装饰的构建块。这有助于对相互作用进行纯粹的图形描述，直至可以从图中读出的理性先因子。我们的构建提供了一个全面的组合框架来剖析宇宙学可观测量的分析特性；特别是，我们证明了控制 FRW 积分的微分方程的组合——它们所谓的运动流——是我们共同作用的自然结果。我们还开发了一个用户友好的 Web 应用程序，可以计算任何图形的图形交互：此 https URL 。只要有可能，Web 应用程序还会计算差异和不连续性。\n\n具有相同功能的 Mathematica 笔记本也托管在公共 GitHub 存储库上。", "authors": [{"name": "Andrew J. McLeod"}, {"name": "Andrzej Pokraka"}, {"name": "Lecheng Ren"}], "featured_authors": [{"name": "Andrew J. McLeod"}, {"name": "Andrzej Pokraka"}, {"name": "Lecheng Ren"}], "author_count": 3}, {"id": "2606.13665", "category": "hep-th", "title": "One-loop five-point gluing analytically", "abstract": "The one-loop five-point function of stress tensor multiplets in N=4 super Yang-Mills theory in four dimensions has previously been studied by integrability methods. The finite-size viz gluing corrections defining it were originally matched on the known field theory result - establishing many features of the formalism on the way - and later to a good extent also analytically evaluated. For the first time, we present a full analytic evaluation of all processes. The starting point is the re-summation of series of residues into Euler integrals. These are directly integrated where possible or otherwise recovered from intersection theory for generalised hypergeometric functions.", "url": "https://arxiv.org/abs/2606.13665", "type": "理论", "summary": "先前已经用可积法研究了N=4超Yang-Mills理论中四维应力张量多重态的一环五点函数。定义它的有限尺寸即粘合校正最初与已知的场论结果相匹配 - 在此过程中建立了形式主义的许多特征 - 后来在很大程度上也进行了分析评估。我们第一次对所有流程进行全面的分析评估。起点是将一系列留数重新求和为欧拉积分。这些在可能的情况下直接积分，或者从广义超几何函数的交集理论中恢复。", "authors": [{"name": "B. Eden"}, {"name": "M. Gottwald"}], "featured_authors": [{"name": "B. Eden"}, {"name": "M. Gottwald"}], "author_count": 2}, {"id": "2606.12453", "category": "math-ph", "title": "Flux-explicit Cheeger bounds for magnetic Laplacians on compact metric graphs", "abstract": "Let (\\Gamma) be a finite compact connected metric graph and let (A\\in L^\\infty(\\Gamma)) be a real magnetic potential. The magnetic Laplacian (H_A) with standard vertex conditions is defined by the closed quadratic form [ q_A[u]=\\sum_e\\int_e |(-i\\partial_x-A_e)u_e|^2,dx. ] A magnetic Cheeger constant is introduced by adding to the usual boundary term the frustration index of the potential on subgraphs. The first point of the paper is that, on a metric graph, this frustration index is exactly a finite dimensional (\\ell^1) flux distance determined by the periods of (A) on cycles. Consequently the Cheeger constant can be written directly in terms of Aharonov Bohm fluxes. We prove a Cheeger type lower bound for the bottom of the spectrum and derive the corresponding explicit lower estimate in terms of the distance of the global cycle flux vector from the integral flux lattice. The estimate also gives (L^2) decay bounds for the magnetic heat semigroup and for the magnetic energy. The constants are not asserted to be sharp; the emphasis is on the flux dependence and on the self contained metric graph formulation.", "url": "https://arxiv.org/abs/2606.12453", "type": "理论", "summary": "令 (\\Gamma) 为有限紧连通度量图，并令 (A\\in L^\\infty(\\Gamma)) 为实磁势。标准顶点条件的磁拉普拉斯 (H_A) 由闭二次形式 [ q_A[u]=\\sum_e\\int_e |(-i\\partial_x-A_e)u_e|^2,dx 定义。 ] 通过将子图上势的挫败指数添加到通常的边界项中，引入了磁奇格常数。论文的第一点是，在度量图上，这个挫败指数恰好是由周期上的 (A) 的周期确定的有限维 (\\ell^1) 通量距离。因此，奇格常数可以直接写成阿哈罗诺夫玻姆通量。我们证明了频谱底部的 Cheeger 型下界，并根据全局循环通量向量与积分通量晶格的距离得出相应的显式下限估计。该估计还给出了磁热半群和磁能的 (L^2) 衰减界限。这些常数并不被认为是尖锐的；重点是通量依赖性和独立的度量图表公式。", "authors": [{"name": "Björn Dahlke"}], "featured_authors": [{"name": "Björn Dahlke"}], "author_count": 1}, {"id": "2606.12455", "category": "math-ph", "title": "King Function for Shifted Gaussian: Laguerre Structure, Spectral Theory and Density", "abstract": "We study King function arising as radial kernels in the laboratory-frame spherical harmonic expansion of shifted Gaussian distributions. We first clarify their relation with the co-moving Laguerre hierarchy by means of a King--Laguerre expansion. We then derive the King differential equation and show that the associated self-adjoint operator in a Gaussian-weighted Hilbert space is unitarily equivalent to the free radial Schrödinger operator on the half-line. This yields the spectral representation and generalized eigenfunction. Finally, we prove that real-parameter King function, lies in the resolvent set, form a dense non-orthogonal system in a natural radial velocity space, providing an approximation-theoretic basis for King mixture representations. Weighted \\(L^1\\)-integrability criteria and closed-form moment formulas are also derived, justifying the normalization of King function.", "url": "https://arxiv.org/abs/2606.12455", "type": "理论", "summary": "我们研究了在平移高斯分布的实验室框架球调和展开中作为径向核出现的 King 函数。我们首先通过King-Laguerre展开来阐明它们与共同移动的Laguerre层级的关系。然后我们推导了 King 微分方程，并证明高斯加权希尔伯特空间中的相关自伴算子酉等价于半线上的自由径向薛定谔算子。这产生了谱表示和广义本征函数。最后，我们证明了实参King函数位于解析集合中，在自然径向速度空间中形成稠密非正交系统，为King混合表示提供了近似理论基础。还推导了加权\\(L^1\\)可积准则和闭式矩公式，证明了King函数的归一化。", "authors": [{"name": "Yanpeng Wang"}, {"name": "Zhe Gao"}], "featured_authors": [{"name": "Yanpeng Wang"}, {"name": "Zhe Gao"}], "author_count": 2}, {"id": "2606.12458", "category": "math-ph", "title": "Quasi-Product States and Factor Types for the One-Dimensional Hard-Core Model", "abstract": "We study a quasi-product state associated with the one-dimensional hard-core Gibbs measure. After coding the model by the topological Markov chain, we construct the standard path $AF$-algebra of admissible hard-core words and show that the stationary Markov measure induces on it a faithful diagonal state in the sense of Evans. We then analyze the von Neumann algebra generated by the corresponding GNS representation. The resulting algebra is a hyperfinite factor, and its type is determined by the single parameter \\(\\kappa=q/p^2,\\) where \\(\\begin{pmatrix}p&q\\\\ 1&0\\end{pmatrix}\\) is the transition matrix of the Markov chain. More precisely, the factor is of type $\\mathrm{II}_1$ when $\\kappa =1$, and of type $\\mathrm{III}_ł$ with \\( ł=\\min\\{\\kappa,\\kappa^{-1}\\}\\) for $\\k\\neq 1$. We also specify the centralizer and the weight flow for the resulting factor.", "url": "https://arxiv.org/abs/2606.12458", "type": "理论", "summary": "我们研究与一维硬核吉布斯测度相关的准乘积状态。在用拓扑马尔可夫链对模型进行编码后，我们构造了可接受的硬核词的标准路径$AF$-代数，并表明平稳马尔可夫测度在其上诱导出埃文斯意义上的忠实对角状态。然后我们分析由相应的 GNS 表示生成的冯诺依曼代数。生成的代数是超有限因子，其类型由单个参数 \\(\\kappa=q/p^2,\\) 确定，其中 \\(\\begin{pmatrix}p&q\\\\ 1&0\\end{pmatrix}\\) 是马尔可夫链的转移矩阵。更准确地说，当 $\\kappa =1$ 时，因子的类型为 $\\mathrm{II}_1$；当 $\\k\\neq 1$ 时，因子的类型为 $\\mathrm{III}_ł$，其中 \\( ł=\\min\\{\\kappa,\\kappa^{-1}\\}\\)。我们还指定了扶正器和结果因子的权重流。", "authors": [{"name": "Farrukh Mukhamedov"}, {"name": "Yuri Suhov"}], "featured_authors": [{"name": "Farrukh Mukhamedov"}, {"name": "Yuri Suhov"}], "author_count": 2}, {"id": "2606.12463", "category": "math-ph", "title": "Thermodynamic coefficients in third-order relativistic fluid dynamics", "abstract": "We developed the third-order hydrodynamic equations using relativistic extended thermodynamics of gases with 14 independent fields. The resulting fluid equations are based on the relativity principle, the entropy principle, and the requirement of hyperbolic, and hence finite, propagation of disturbances, which is automatically incorporated. The expressions of entropy, four-current, shear-stress tensor, dynamic pressure, and heat flux are expanded up to third order (cubic). We explicitly present the newly calculated coefficients in the equilibrium properties of an ultra-relativistic gas regime and the non-degenerate relativistic gas. Contrary to the general cases, the non-degenerate regime eliminates fugacity from the coefficients, allowing for the easy normalization of these coefficients, and the ultra-relativistic regime provides us with the upper bounds of these coefficients. We found good agreement on some of the coefficients as compared to calculations from earlier models, specifically in kinetic theory, and other coefficients had slightly different values to those obtained in kinetic theory.", "url": "https://arxiv.org/abs/2606.12463", "type": "理论", "summary": "我们利用具有 14 个独立场的气体相对论扩展热力学开发了三阶流体动力学方程。由此产生的流体方程基于相对论原理、熵原理以及双曲线的要求，因此是有限的扰动传播，这是自动合并的。将熵、四流、剪应力张量、动压、热通量的表达式展开至三阶（三次）。我们明确地给出了超相对论气体状态和非简并相对论气体的平衡性质中新计算的系数。与一般情况相反，非简并状态消除了系数的逸度，从而可以轻松地对这些系数进行归一化，而超相对论状态为我们提供了这些系数的上限。与早期模型（特别是动力学理论）的计算结果相比，我们发现某些系数具有良好的一致性，而其他系数与动力学理论中获得的值略有不同。", "authors": [{"name": "Teboho Abram Moloi"}, {"name": "Azwinndini Muronga"}], "featured_authors": [{"name": "Teboho Abram Moloi"}, {"name": "Azwinndini Muronga"}], "author_count": 2}, {"id": "2606.13075", "category": "math-ph", "title": "Chiral Long-Range Order in three Euclidean Lattice Gross-Neveu Models", "abstract": "We prove the existence of Long-Range Order in a class of two-dimensional Euclidean lattice Gross-Neveu models with an even number of fermion flavors, covering three standard lattice discretizations, including naive and staggered fermions widely used in numerical studies. By performing a Hubbard-Stratonovich transformation, we map the fermionic systems to bosonic ones and establish Reflection Positivity for the resulting measures. Exploiting this structure, we combine Chessboard Estimates with a Peierls-type contour argument to prove Long-Range Order for the chirally charged fermion-mass bilinear $\\overline{\\psi}\\psi$ at sufficiently small coupling and sufficiently large flavor number. Our analysis is robust with respect to the choice of lattice discretization and applies uniformly across different realizations of the same underlying continuum model. Moreover, we obtain uniform pointwise bounds on the bosonic two-point function, equivalently on the fermionic mass-mass correlator, showing that it is quantitatively controlled by the minimizers of the effective potential. This provides a fully rigorous and non-perturbative demonstration of Long-Range Order in lattice Gross-Neveu models and establishes a direct connection between the rigorous theory and its large-$N$ (mean-field) predictions.", "url": "https://arxiv.org/abs/2606.13075", "type": "理论", "summary": "我们证明了一类具有偶数费米子风格的二维欧几里得晶格 Gross-Neveu 模型中长程序的存在，涵盖了三种标准晶格离散化，包括数值研究中广泛使用的朴素费米子和交错费米子。通过执行哈伯德-斯特拉托诺维奇变换，我们将费米子系统映射到玻色子系统，并为结果测量建立反射正性。利用这种结构，我们将棋盘估计与 Peierls 型轮廓论证相结合，以证明手性带电费米子质量双线性 $\\overline{\\psi}\\psi$ 在足够小的耦合和足够大的风味数下的长程有序。我们的分析在晶格离散化的选择方面是稳健的，并且统一适用于同一底层连续体模型的不同实现。此外，我们在玻色子两点函数上获得了均匀的点向界限，等效于费米子质量-质量相关器，表明它是由有效势的最小值来定量控制的。\n\n这为格罗斯-奈芙模型中的长程有序提供了完全严格且非微扰的证明，并在严格理论与其大$N$（平均场）预测之间建立了直接联系。", "authors": [{"name": "Simone Fabbri"}, {"name": "Leonardo Goller"}], "featured_authors": [{"name": "Simone Fabbri"}, {"name": "Leonardo Goller"}], "author_count": 2}, {"id": "2606.13453", "category": "math-ph", "title": "Rapid mixing for Gibbs measures in Riemannian manifolds", "abstract": "Langevin dynamics on Riemannian manifolds is analyzed. Conditions ensuring the existence of a suitable logarithmic Sobolev inequality (rapid mixing to the Gibbs measure) are identified. These conditions involve the curvature of the manifold, the inverse temperature, escaping directions from saddle points, and exclude barren plateaus and spurious local minima. We show that when these conditions are met, mixing times polynomial in the dimension of the manifold are achievable. This result is obtained through a relation between Langevin processes in the domain and in the image of a Riemannian submersion. Such a relation can be of independent interest.", "url": "https://arxiv.org/abs/2606.13453", "type": "理论", "summary": "分析了黎曼流形上的朗之万动力学。确定了确保存在合适的对数索博列夫不等式（快速混合吉布斯测度）的条件。这些条件涉及流形的曲率、逆温度、鞍点的逃逸方向，并排除贫瘠的平台和虚假的局部最小值。我们证明，当满足这些条件时，可以实现流形维数中的混合时间多项式。该结果是通过域中的朗之万过程与黎曼淹没图像中的朗之万过程之间的关系获得的。这种关系可以具有独立的利益。", "authors": [{"name": "Ángela Capel"}, {"name": "Marco Castrillón-López"}, {"name": "Sofyan Iblisdir"}, {"name": "Angelo Lucia"}, {"name": "Pablo Páez-Velasco"}, {"name": "David Pérez-García"}], "featured_authors": [{"name": "Ángela Capel"}, {"name": "Marco Castrillón-López"}, {"name": "Sofyan Iblisdir"}, {"name": "Angelo Lucia"}, {"name": "Pablo Páez-Velasco"}, {"name": "David Pérez-García"}], "author_count": 6}, {"id": "2606.12444", "category": "quant-ph", "title": "Effective Geometry and Position-Dependent Mass in Dual-$q$ Quantum Mechanics", "abstract": "This work investigates the deformed-derivative formalism introduced by Borges, with emphasis on the relation between the linear operator $D_{(q)}$ and its nonlinear dual counterpart $D^{(q)}$. Directly inserting the dual derivative into the kinetic term leads to a nonlinear Schrödinger equation and obscures the usual interpretation of superposition and probability. We show that this nonlinearity can be removed by a simultaneous transformation of the coordinate and of the wave function. The transformed problem is an ordinary linear Schrödinger equation in a deformed coordinate, and its representation in the physical coordinate is equivalent to a Hermitian position-dependent-mass (PDM) Hamiltonian. In this formulation, the deformation parameter $q$ determines both the effective mass profile and the associated metric. The formalism is applied to the free particle, the infinite square well, the rectangular barrier, and the harmonic oscillator in the weak-deformation regime. Comparison with the nonadditive-translation approach of Costa Filho \\emph{et al.} shows that the Borges dual-$q$ framework provides an alternative route to the same effective geometric structure. For $q<1$, the effective confinement length is reduced, which raises the bound-state spectrum and enhances tunneling; for $q>1$, the effective length is increased, which lowers the spectrum and suppresses tunneling relative to the undeformed limit $q=1$.", "url": "https://arxiv.org/abs/2606.12444", "type": "理论", "summary": "这项工作研究了博尔赫斯引入的变形导数形式主义，重点是线性算子 $D_{(q)}$ 与其非线性对偶对应物 $D^{(q)}$ 之间的关系。直接将对偶导数插入到动力学项中会导致非线性薛定谔方程，并模糊了叠加和概率的通常解释。我们证明，这种非线性可以通过坐标和波函数的同时变换来消除。变换后的问题是变形坐标中的普通线性薛定谔方程，其在物理坐标中的表示相当于埃尔米特位置相关质量 (PDM) 哈密顿量。在此公式中，变形参数 $q$ 确定有效质量分布和相关度量。该形式适用于自由粒子、无限方阱、矩形势垒和弱变形状态下的谐振子。与 Costa Filho \\emph{et al.} 的非加性平移方法的比较表明，博尔赫斯双 $q$ 框架为相同有效的几何结构提供了替代途径。\n\n对于$q<1$，有效限制长度减小，这提高了束缚态谱并增强了隧道效应；对于 $q>1$，有效长度增加，相对于未变形极限 $q=1$，这降低了频谱并抑制了隧道效应。", "authors": [{"name": "A. Boumali"}, {"name": "A. Makhlouf"}], "featured_authors": [{"name": "A. Boumali"}, {"name": "A. Makhlouf"}], "author_count": 2}, {"id": "2606.12445", "category": "quant-ph", "title": "SAT, MaxSAT, and SMT for QLDPC Distance Computation: A Large-Scale Empirical Study", "abstract": "Exact distance computation for quantum LDPC (QLDPC) codes plays a central role in validating candidate fault-tolerant quantum-code constructions, yet the computational structure of this problem remains poorly understood. Despite substantial recent progress in QLDPC design, it remains unclear which algorithmic principles govern the practical scalability of exact distance computation and which classes of exact solvers are best suited to this task. To address these questions, we conduct a systematic study of SAT- and MaxSAT-based formulations for exact QLDPC distance computation across representative codes. We further compare these formulations against several established exact-distance approaches in order to better understand the algorithmic landscape of exact QLDPC distance computation. Our study challenges and refines several prevailing intuitions about exact QLDPC distance computation. First, despite the XOR-rich structure of QLDPC parity checks, practical scalability appears to be governed more by the handling of cardinality constraints and optimization bounds than by parity reasoning alone. Accordingly, XOR-aware reasoning does not provide a systematic advantage across our benchmark suite. Second, Brouwer-Zimmermann-style search, long regarded as the benchmark paradigm for exact distance computation in sparse classical codes, no longer maintains its traditional scalability advantage in the QLDPC setting. This finding challenges the expectation that techniques successful for sparse classical codes remain dominant for QLDPC codes. Third, substantial qualitative differences arise even among MaxSAT solvers themselves. Branch-and-bound MaxSAT significantly outperforms unsat-core-based MaxSAT on challenging benchmarks, demonstrating that solver architecture and optimization strategy play a decisive role in practical scalability.", "url": "https://arxiv.org/abs/2606.12445", "type": "理论+数值", "summary": "量子 LDPC (QLDPC) 码的精确距离计算在验证候选容错量子码结构中发挥着核心作用，但该问题的计算结构仍然知之甚少。尽管 QLDPC 设计最近取得了重大进展，但仍不清楚哪些算法原理控制精确距离计算的实际可扩展性以及哪些类别的精确求解器最适合此任务。为了解决这些问题，我们对基于 SAT 和 MaxSAT 的公式进行了系统研究，以跨代表性代码进行精确的 QLDPC 距离计算。我们进一步将这些公式与几种已建立的精确距离方法进行比较，以便更好地理解精确 QLDPC 距离计算的算法景观。我们的研究挑战并完善了关于精确 QLDPC 距离计算的几种流行直觉。首先，尽管 QLDPC 奇偶校验检查具有丰富的 XOR 结构，但实际的可扩展性似乎更多地由基数约束和优化边界的处理来控制，而不是单独由奇偶校验推理来控制。\n\n因此，异或感知推理并没有在我们的基准测试套件中提供系统性优势。其次，Brouwer-Zimmermann 式搜索长期以来被视为稀疏经典代码中精确距离计算的基准范式，但在 QLDPC 设置中不再保持其传统的可扩展性优势。这一发现挑战了稀疏经典码的成功技术对于 QLDPC 码仍然占主导地位的预期。第三，即使在 MaxSAT 求解器本身之间也存在显着的质量差异。在具有挑战性的基准测试中，分支定界 MaxSAT 显着优于基于 unsat 核心的 MaxSAT，这表明求解器架构和优化策略在实际可扩展性中发挥着决定性作用。", "authors": [{"name": "Yu-Fang Chen"}, {"name": "Seyed Mohammad Reza Jafari"}, {"name": "Ching-Yi Lai"}], "featured_authors": [{"name": "Yu-Fang Chen"}, {"name": "Seyed Mohammad Reza Jafari"}, {"name": "Ching-Yi Lai"}], "author_count": 3}, {"id": "2606.12480", "category": "quant-ph", "title": "Geometric Algebra Quantum Gate Decomposition", "abstract": "Quantum gates are usually described through matrix and tensor-product formalisms that often obscure their geometric structure. In this work, we formulate the Pauli and Clifford groups within the complex Geometric Algebra (GA) framework. We show that the Pauli group is naturally identified with the group of blades up to a global phase, thereby providing a geometric interpretation of Pauli operators and their commutation relations in terms of oriented subspaces. We further prove that Clifford operators are generated by products of {\\pi}/4-Pauli rotors and introduce a greedy Pauli rotor decomposition algorithm whose empirical behavior suggests unexpectedly compact decompositions for Clifford operators. Finally, we show that Clifford+T universality admits a natural geometric interpretation through {\\pi}/8-rotors within this framework.", "url": "https://arxiv.org/abs/2606.12480", "type": "数值", "summary": "量子门通常通过矩阵和张量积形式来描述，这常常掩盖了它们的几何结构。在这项工作中，我们在复杂的几何代数 (GA) 框架内制定了泡利群和克利福德群。我们证明，泡利群自然地与叶片群一致，直到全局阶段，从而提供了泡利算子及其在定向子空间方面的交换关系的几何解释。我们进一步证明 Clifford 算子是由 {\\pi}/4-Pauli 转子的乘积生成的，并引入了贪婪的 Pauli 转子分解算法，其经验行为表明 Clifford 算子的分解出乎意料地紧凑。最后，我们证明 Clifford+T 的普遍性允许通过此框架内的 {\\pi}/8-rotors 进行自然的几何解释。", "authors": [{"name": "Youssef Amraoui"}, {"name": "Zeno Toffano"}], "featured_authors": [{"name": "Youssef Amraoui"}, {"name": "Zeno Toffano"}], "author_count": 2}, {"id": "2606.12539", "category": "quant-ph", "title": "Unifying spacetime approaches to quantum mechanics", "abstract": "Recent efforts to formulate quantum mechanics in a way that treats space and time on a more equal footing have led to a large variety of spacetime-oriented approaches. In this work we present a detailed study of spacetime states, the objects that play the role of quantum states in the recently introduced framework of spacetime quantum mechanics, and show that the main proposals in the literature are different manifestations of the same underlying object. Path integrals, quantum states over time, pseudo-density matrices, the Page and Wootters mechanism, superdensity operators, and timelike-entanglement proposals all arise from spacetime states through particular evaluations, reduced information, linear maps, or quantum channels. This unification provides explicit mathematical representations of these formalisms, reveals relations among them, and clarifies the spacetime information each one captures. We also study the broader relevance of the spacetime-state point of view for Leggett-Garg inequalities, OTOCs, temporal tensor networks, fermionic systems, relativistic QFTs, quantum reference frames, and classical physics, together with additional insights and perspectives revealed by the common unifying framework.", "url": "https://arxiv.org/abs/2606.12539", "type": "理论+数值", "summary": "最近以更加平等地对待空间和时间的方式制定量子力学的努力已经产生了多种面向时空的方法。在这项工作中，我们对时空态进行了详细研究，时空态是在最近引入的时空量子力学框架中扮演量子态角色的物体，并表明文献中的主要建议是同一基础物体的不同表现形式。路径积分、随时间变化的量子态、伪密度矩阵、佩奇和伍特斯机制、超密度算子和类时纠缠建议都是通过特定的评估、简化信息、线性映射或量子通道从时空状态产生的。这种统一提供了这些形式主义的明确数学表示，揭示了它们之间的关系，并阐明了每种形式主义捕获的时空信息。\n\n我们还研究时空态观点与 Leggett-Garg 不等式、OTOC、时间张量网络、费米子系统、相对论 QFT、量子参考系和经典物理的更广泛相关性，以及共同统一框架揭示的其他见解和观点。", "authors": [{"name": "N. L. Diaz"}, {"name": "M. Cerezo"}, {"name": "Paolo Braccia"}], "featured_authors": [{"name": "N. L. Diaz"}, {"name": "M. Cerezo"}, {"name": "Paolo Braccia"}], "author_count": 3}, {"id": "2606.12545", "category": "quant-ph", "title": "Spectral analysis of equilibration: information leakage in isolated quantum systems", "abstract": "We develop a unified dynamical-spectral framework for equilibration in isolated quantum systems based on a subspace coarse-graining approach. Central to our formulation is the Leakage Fidelity Function (LFF), defined as the probability that a unitarily evolving state escapes the support of its initial subspace. This quantity provides a direct, operational measure of information flow and memory loss without invoking ensemble assumptions or perturbative arguments. We derive universal bounds on temporal fluctuations of the LFF, in terms of the spectral gap structure and the square of the effective dimension, evincing that large spectral delocalization suppresses fluctuations and guarantees equilibration on average. By introducing spectral power distributions and associated entropic measures, we establish a quantitative link between phase mixing, gap participation, and dynamical stability. We further investigate the equilibration timescale by connecting the LFF to quantum speed limits, thereby revealing the average time required for equilibration. Our results provide a state-dependent, geometrically transparent perspective on how spectral complexity and subspace information leakage jointly govern irreversibility in closed quantum many-body systems.", "url": "https://arxiv.org/abs/2606.12545", "type": "理论", "summary": "我们开发了一个统一的动态谱框架，用于基于子空间粗粒度方法的孤立量子系统中的平衡。我们的公式的核心是泄漏保真度函数（LFF），定义为单一演化状态脱离其初始子空间支持的概率。这个量提供了信息流和记忆损失的直接、可操作的测量，而无需调用整体假设或扰动论证。我们根据光谱间隙结构和有效维度的平方推导了 LFF 时间波动的通用界限，证明大光谱离域抑制了波动并保证了平均平衡。通过引入光谱功率分布和相关的熵测量，我们在相位混合、间隙参与和动态稳定性之间建立了定量联系。我们通过将 LFF 连接到量子速度极限来进一步研究平衡时间尺度，从而揭示平衡所需的平均时间。\n\n我们的结果为光谱复杂性和子空间信息泄漏如何共同控制封闭量子多体系统中的不可逆性提供了一个依赖于状态的、几何透明的视角。", "authors": [{"name": "André T. Cesário"}, {"name": "Marcos G. Alpino"}, {"name": "Reinaldo O. Vianna"}, {"name": "Tiago Debarba"}], "featured_authors": [{"name": "André T. Cesário"}, {"name": "Marcos G. Alpino"}, {"name": "Reinaldo O. Vianna"}, {"name": "Tiago Debarba"}], "author_count": 4}, {"id": "2606.12557", "category": "quant-ph", "title": "New bounds on private simultaneous quantum message passing", "abstract": "In the private simultaneous message (PSM) setting, $k$ players obtain inputs $x_i\\in\\{0,1\\}^n$ and then each send messages to a referee, who should learn $f(x_1,...,x_k)$ but no other information about $(x_1,...,x_k)$. The PSM setting was introduced as a minimal model for secure multiparty computation and has connections to Boolean function complexity. In the quantum setting, PSM has been related to non-local quantum computation (NLQC). The communication and correlation cost of implementing PSM remains poorly understood. Here, we give new upper and lower bounds on the (quantum) PSM model. For lower bounds, we show: 1) Nečiporuk's measure lower bounds the entanglement required for $k$-player quantum PSM with perfect correctness. This leads to quadratic lower bounds for explicit functions. 2) The rank of the communication matrix of $f(x_1,x_2)$ lower bounds 2-player quantum PSM with perfect privacy but imperfect correctness. This implies a previously unknown lower bound on classical PSM with imperfect correctness. When allowing quantum communication and shared entanglement, these are the first lower bounds on quantum PSM that make use of the privacy condition. For upper bounds, we show: 1) Letting $s$ be the size of a quantum circuit computing $f$, $d_f$ be the circuit depth, $k$ the number of players, $n$ the number of bits received by each player, and $\\epsilon$ a correctness parameter, we obtain $\\mathsf{PSM}_k^*(f) \\leq (kn +s) \\cdot \\log^{O(d_f)}(s/\\epsilon)$. 2) The square of the Fourier 1 norm of $f$, $\\Vert \\hat{f}\\Vert_1^2$, upper bounds the classical PSM complexity, $\\mathsf{PSM}(f)\\leq O(\\Vert \\hat{f} \\Vert^2_1)$. In proving the first upper bound, we generalize existing $T$-depth based techniques for NLQC from $2$ to $k\\geq 2$ parties, and consider cases where the Clifford layers are restricted to having small light cones.", "url": "https://arxiv.org/abs/2606.12557", "type": "理论", "summary": "在私人同步消息 (PSM) 设置中，$k$ 玩家获取输入 $x_i\\in\\{0,1\\}^n$，然后各自向裁判发送消息，裁判应学习 $f(x_1,...,x_k)$，但不了解有关 $(x_1,...,x_k)$ 的其他信息。 PSM 设置是作为安全多方计算的最小模型引入的，并且与布尔函数复杂性有关。在量子环境中，PSM 与非局域量子计算（NLQC）相关。实施 PSM 的沟通和关联成本仍然知之甚少。在这里，我们给出了（量子）PSM 模型的新上限和下限。对于下限，我们显示： 1) Nečiporuk 的测量下限是 $k$ 玩家量子 PSM 所需的纠缠，并且具有完美的正确性。这导致显式函数的二次下界。 2) $f(x_1,x_2)$ 通信矩阵的秩降低了具有完美隐私但不完美正确性的 2 人量子 PSM。这意味着经典 PSM 存在一个先前未知的下限，且正确性不完善。当允许量子通信和共享纠缠时，这些是利用隐私条件的量子 PSM 的第一个下限。\n\n对于上限，我们显示： 1) 令 $s$ 为计算 $f$ 的量子电路的大小，$d_f$ 为电路深度，$k$ 为玩家数量，$n$ 为每个玩家接收到的位数，$\\epsilon$ 为正确性参数，我们得到 $\\mathsf{PSM}_k^*(f) \\leq (kn +s) \\cdot \\log^{O(d_f)}(s/\\epsilon)$。 2) $f$ 的傅立叶 1 范数的平方，$\\Vert \\hat{f}\\Vert_1^2$，是经典 PSM 复杂度的上限，$\\mathsf{PSM}(f)\\leq O(\\Vert \\hat{f} \\Vert^2_1)$。在证明第一个上限时，我们将现有的基于 $T$ 深度的 NLQC 技术从 $2$ 推广到 $k\\geq 2$ 方，并考虑 Clifford 层仅限于具有小光锥的情况。", "authors": [{"name": "Uma Girish"}, {"name": "Alex May"}, {"name": "Natalie Parham"}, {"name": "Henry Yuen"}], "featured_authors": [{"name": "Uma Girish"}, {"name": "Alex May"}, {"name": "Natalie Parham"}, {"name": "Henry Yuen"}], "author_count": 4}, {"id": "2606.12637", "category": "quant-ph", "title": "Roto-Reflection Geometry of Pure Two-Qubit Entanglement", "abstract": "Pure two-qubit entanglement is usually characterized by scalar quantities such as concurrence. Here we show that it also has a natural geometric form. In the Pauli correlation tensor, maximally entangled states appear as improper orthogonal maps between two local Bloch spheres. These maps are roto-reflections. For partially entangled pure states, the same roto-reflection geometry is recovered after separating the contraction associated with concurrence. We call the corresponding geometric object the Entanglement Roto-Reflection Plane (ERRP). It organizes the maximally correlated directions of the two-qubit state and provides a covariant geometric complement to the scalar magnitude of entanglement.", "url": "https://arxiv.org/abs/2606.12637", "type": "理论", "summary": "纯两个量子位纠缠通常以标量为特征，例如并发。在这里我们表明它也具有自然的几何形式。在泡利相关张量中，最大纠缠态显示为两个局部布洛赫球之间的不正确正交映射。这些地图是旋转反射。对于部分纠缠的纯态，在分离与并发相关的收缩后恢复相同的旋转反射几何形状。我们将相应的几何对象称为纠缠旋转反射平面（ERRP）。它组织了两个量子位状态的最大相关方向，并为纠缠的标量幅度提供了协变几何补充。", "authors": [{"name": "Stanislav Filatov"}, {"name": "Marcis Auzinsh"}], "featured_authors": [{"name": "Stanislav Filatov"}, {"name": "Marcis Auzinsh"}], "author_count": 2}, {"id": "2606.12682", "category": "quant-ph", "title": "Supersymmetry of dissipative Bose-Fermi systems with application to Jaynes-Cummings and Dicke models", "abstract": "We demonstrate how supersymmetries of Hamiltonians for coupled Bose-Fermi systems can be used to place the Hamiltonians of the Jaynes-Cummings model and Dicke model under the rotating wave approximation in matrix form and provide explicit analytic solutions for their eigenvalues. We then use this supersymmetry to place the Liouvillians of the associated Markovian open systems in matrix form and provide explicit solutions for their eigenvalues. These results are a consequence of the fact that the Hamiltonian of the Jaynes-Cummings model commutes with the linear Casimir invariant of the superalgebra $u(1|1)$ and that the Hamiltonian of the Dicke model commutes both with the linear invariant of $\\sum_{i} u_{i}(1|1)$ and with the invariant of an additional $su(2)$ algebra. Our methods apply to various coupled Bose-Fermi systems with $u(1|1)$ and more generally with $u(n|m)$ dynamical superalgebras, and may provide efficient tools for studying more complicated examples.", "url": "https://arxiv.org/abs/2606.12682", "type": "理论", "summary": "我们演示了如何使用耦合 Bose-Fermi 系统的哈密顿量的超对称性将 Jaynes-Cummings 模型和 Dicke 模型的哈密顿量置于矩阵形式的旋转波近似下，并为其特征值提供显式解析解。然后，我们使用这种超对称性将相关马尔可夫开放系统的刘维尔方程置于矩阵形式，并为其特征值提供显式解。这些结果是以下事实的结果：Jaynes-Cummings 模型的哈密顿量与超代数 $u(1|1)$ 的线性卡西米尔不变量交换，而 Dicke 模型的哈密顿量与 $\\sum_{i} u_{i}(1|1)$ 的线性不变量交换以及附加 $su(2)$ 代数的不变量交换。我们的方法适用于各种具有 $u(1|1)$ 的耦合 Bose-Fermi 系统，更广泛地适用于 $u(n|m)$ 动态超代数，并且可以为研究更复杂的例子提供有效的工具。", "authors": [{"name": "Colin V. Coane"}, {"name": "Francesco Iachello"}], "featured_authors": [{"name": "Colin V. Coane"}, {"name": "Francesco Iachello"}], "author_count": 2}, {"id": "2606.12724", "category": "quant-ph", "title": "Block algebra for morphing circuits", "abstract": "Morphing circuits are a new paradigm for quantum error correction that relaxes hardware requirements. We present four constructions for CNOT-based CSS morphing circuits with explicit qubit connectivity degrees. All four constructions are specified in block algebra notation, with entries in algebras generated by permutation matrices. The first three are obtained by rewriting existing surface- and color-code morphing circuits; the fourth is a new three-round construction modeled on the 6.6.6 color code. The surface-code construction recovers the morphing circuit of Ref. [ST25] for two-block group algebra codes. Numerical search then instantiates these permutation matrices using regular representations of finite groups. [ST25] M. H. Shaw and B. M. Terhal, Phys. Rev. Lett. 134(9), 090602 (2025).", "url": "https://arxiv.org/abs/2606.12724", "type": "理论+数值", "summary": "变形电路是量子纠错的新范例，可以放宽硬件要求。我们提出了四种基于 CNOT 的 CSS 变形电路的结构，具有明确的量子位连接度。所有四种结构均以块代数表示法指定，代数中的条目由置换矩阵生成。前三个是通过重写现有的表面和颜色代码变形电路获得的；第四个是仿照 6.6.6 颜色代码的新三轮结构。表面代码构造恢复了参考文献的变形电路。 [ST25] 用于二块群代数代码。然后数值搜索使用有限群的正则表示来实例化这些置换矩阵。 [ST25] M. H. Shaw 和 B. M. Terhal，物理学家。莱特牧师。 134(9), 090602 (2025)。", "authors": [{"name": "Rui Chao"}], "featured_authors": [{"name": "Rui Chao"}], "author_count": 1}, {"id": "2606.12761", "category": "quant-ph", "title": "Instabilities in a Non-KAM System via Information Scrambling: A Note", "abstract": "We study operator growth in quantized non-KAM systems using out-of-time-ordered correlators (OTOCs), focusing on the kicked harmonic oscillator as a representative example. Since the classical harmonic oscillator is degenerate, the dynamics fall outside the usual Kolmogorov-Arnold-Moser (KAM) framework, and resonances play a central role in shaping the phase space. We examine the system near resonances, where the ratio between the oscillator and driving frequencies takes integer values. Even though the classical Lyapunov exponent remains small at these points, and hence no conventional chaos, the phase space still undergoes strong structural changes. The OTOCs are particularly sensitive to these resonances, with a quadratic-in-time growth at resonance compared to linear growth away from it. Within a perturbative treatment, we derive closed-form expressions for the OTOCs and uncover a number-theoretic structure emerging in the behavior of OTOCs, governed by the Euler totient function of the frequency ratio. Overall, the results we present in this short note imply that resonant structures can play an important role in controlling information spreading.", "url": "https://arxiv.org/abs/2606.12761", "type": "理论", "summary": "我们使用乱序相关器 (OTOC) 研究量化非 KAM 系统中的算子增长，重点关注踢谐振子作为代表性示例。由于经典谐振子是简并的，动力学超出了通常的柯尔莫哥洛夫-阿诺德-莫泽 (KAM) 框架，并且共振在塑造相空间方面发挥着核心作用。我们检查谐振附近的系统，其中振荡器频率和驱动频率之间的比率取整数值。尽管经典李亚普诺夫指数在这些点仍然很小，因此不存在传统的混沌，但相空间仍然经历强烈的结构变化。 OTOC 对这些共振特别敏感，与远离共振的线性增长相比，共振时的时间呈二次方增长。在微扰处理中，我们推导了 OTOC 的封闭式表达式，并揭示了 OTOC 行为中出现的数论结构，该结构由频率比的欧拉 totient 函数控制。总的来说，我们在这篇简短的文章中提出的结果意味着共振结构可以在控制信息传播方面发挥重要作用。", "authors": [{"name": "Naga Dileep Varikuti"}], "featured_authors": [{"name": "Naga Dileep Varikuti"}], "author_count": 1}, {"id": "2606.12769", "category": "quant-ph", "title": "Matrix phase-space representations for quantum symmetries", "abstract": "We introduce a general phase-space representation that includes global quantum symmetries in the basis expansion. This method, called matrix phase-space, projects the basis onto a reduced Hilbert space, which can greatly reduce sampling errors of many-body quantum simulations and unifies several previous phase-space methods. The purpose of this paper is to provide detailed proofs of basic theorems and operator identities. We also treat several different types of symmetries. To illustrate the benefits of matrix phase-space methods, we give a detailed derivation of a recent application to the topical problem of verifying the outputs of Gaussian boson sampling (GBS) quantum computers with photon number resolving detectors. This has exponential complexity, and using parity symmetry reduces sampling errors by very large factors relative to earlier methods.", "url": "https://arxiv.org/abs/2606.12769", "type": "理论+数值", "summary": "我们引入了一种通用的相空间表示，其中包括基础展开中的全局量子对称性。这种方法称为矩阵相空间，将基础投影到简化的希尔伯特空间上，可以大大减少多体量子模拟的采样误差，并统一了以前的几种相空间方法。本文的目的是提供基本定理和算子恒等式的详细证明。我们还处理几种不同类型的对称性。为了说明矩阵相空间方法的优点，我们详细推导了最近在验证具有光子数分辨探测器的高斯玻色子采样（GBS）量子计算机的输出的热门问题中的应用。这具有指数复杂性，并且相对于早期方法，使用奇偶对称可以将采样误差减少很多倍。", "authors": [{"name": "Peter D. Drummond"}, {"name": "Alexander S. Dellios"}, {"name": "Margaret D. Reid"}], "featured_authors": [{"name": "Peter D. Drummond"}, {"name": "Alexander S. Dellios"}, {"name": "Margaret D. Reid"}], "author_count": 3}, {"id": "2606.12770", "category": "quant-ph", "title": "Explicit Quantum Circuit Simulation of Nonlinear 1-Dimensional Fluid with Carleman-linearized Boltzmann Method", "abstract": "Quantum computation of fluid dynamics has attracted growing attention as a key application of fault-tolerant quantum computers anticipated in the coming decade, with lattice Boltzmann methods emerging as a particularly promising approach. Explicit and efficient elementary-gate-level circuit simulations, however, have so far been demonstrated only in the linear case. Here we include the leading nonlinearity through second-order Carleman linearization of the one-dimensional Boltzmann equation, and demonstrate, via explicit quantum-circuit simulation, the preparation of the final-time state using a Taylor-expansion-based ODE solver based on the quantum singular value transformation. With this construction, we analyze the gate and qubit complexities, which scale logarithmically with the grid size, the nonlinearity captured by the higher-order Carleman linearization, and the practical utility of higher-order expansions in the Taylor ODE solver. The construction provides a concrete baseline for computational cost reduction and further developments such as extensions to higher dimensions, complex geometries, and the extraction of physical quantities, towards industrially useful quantum CFD.", "url": "https://arxiv.org/abs/2606.12770", "type": "理论+数值", "summary": "流体动力学的量子计算作为未来十年预计的容错量子计算机的关键应用而受到越来越多的关注，其中格子玻尔兹曼方法作为一种特别有前途的方法而出现。然而，迄今为止，仅在线性情况下证明了显式且高效的基本门级电路仿真。在这里，我们通过一维玻尔兹曼方程的二阶卡尔曼线性化引入了主要的非线性，并通过显式量子电路模拟演示了使用基于量子奇异值变换的基于泰勒展开式的 ODE 求解器来准备最终时间状态。通过这种结构，我们分析了门和量子位的复杂性（它们与网格大小呈对数关系）、高阶卡尔曼线性化捕获的非线性，以及泰勒 ODE 求解器中高阶展开式的实用性。\n\n该结构为降低计算成本和进一步发展提供了具体的基准，例如扩展到更高维度、复杂几何形状和提取物理量，以实现工业上有用的量子 CFD。", "authors": [{"name": "Keita Kanno"}, {"name": "Kazumasa Ueno"}, {"name": "Hayato Higuchi"}, {"name": "Morimasa Okamoto"}, {"name": "Yuya Yoshizuru"}, {"name": "Ryoya Ishimaru"}, {"name": "Towa Takagi"}, {"name": "Kentaro Sakamoto"}], "featured_authors": [{"name": "Keita Kanno"}, {"name": "Kazumasa Ueno"}, {"name": "Hayato Higuchi"}, {"name": "Ryoya Ishimaru"}, {"name": "Towa Takagi"}, {"name": "Kentaro Sakamoto"}], "author_count": 8}, {"id": "2606.12781", "category": "quant-ph", "title": "Quantum Network Routing based on Surface Code Error Correction", "abstract": "Quantum networks encounter unavoidable channel noises and erasure errors, presenting a huge obstacle in designing protocols that attain both high reliability and efficiency. Typically, quantum networks fall into two categories: those utilize quantum entanglements for quantum teleportation, and those directly transfer the actual quantum messages. In this paper, we present SurfNet, a quantum network that inherits the main advantages from both categories. It employs surface codes as logical qubits for encoding messages, and utilizes two parallel communication channels to fault-tolerantly transfer each surface code in a modular manner. Our approach of using surface codes can timely correct both operational and photon loss errors within the network, and the integration of the two channels within the network can greatly improve network throughput. For the implementation of SurfNet, we propose a novel network architecture, designed to better integrate surface codes into quantum networks. We also propose a novel error correction decoder, designed to fully utilize the modular characteristic of surface codes within our network. Simulation results demonstrate that SurfNet with its decoder significantly enhances the communication fidelity within quantum networks.", "url": "https://arxiv.org/abs/2606.12781", "type": "理论+数值", "summary": "量子网络会遇到不可避免的信道噪声和擦除错误，这给设计同时实现高可靠性和高效率的协议带来了巨大障碍。通常，量子网络分为两类：利用量子纠缠进行量子隐形传态的网络，以及直接传输实际量子消息的网络。在本文中，我们提出了 SurfNet，这是一种继承了这两个类别的主要优点的量子网络。它采用表面代码作为逻辑量子位来编码消息，并利用两个并行通信通道以模块化方式容错地传输每个表面代码。我们使用表面编码的方法可以及时纠正网络内的操作错误和光子丢失错误，并且网络内两个通道的集成可以极大地提高网络吞吐量。为了实现 SurfNet，我们提出了一种新颖的网络架构，旨在更好地将表面代码集成到量子网络中。我们还提出了一种新颖的纠错解码器，旨在充分利用我们网络中表面代码的模块化特征。\n\n仿真结果表明 SurfNet 及其解码器显着增强了量子网络内的通信保真度。", "authors": [{"name": "Tianjie Hu"}, {"name": "Jindi Wu"}, {"name": "Qun Li"}], "featured_authors": [{"name": "Tianjie Hu"}, {"name": "Jindi Wu"}, {"name": "Qun Li"}], "author_count": 3}, {"id": "2606.12816", "category": "quant-ph", "title": "Graph Reinforcement Learning for Calibration-Aware Quantum Circuit Routing", "abstract": "Quantum circuit routing is a key step in compiling programs for noisy intermediate-scale quantum processors. Routes that appear efficient by standard overhead metrics can still lose fidelity when they pass through poorly calibrated couplers. We study a calibration-aware graph reinforcement-learning router that uses same-day IBM Heron r2 calibration data to choose hardware-edge SWAPs. We train the policy with proximal policy optimization and evaluate it with exact simulated fidelity across nine Munich Quantum Toolkit (MQT) Bench circuits and three calibration snapshots. Across these evaluations, pooled mean exact fidelity is $0.727$, compared with $0.440$ for SABRE-best20 and $0.481$ for target-aware SABRE. Fidelity gains come with higher routed two-qubit counts and are concentrated in the 5q and 8q circuit families; under the fixed tree action graph, all 10q families favor SABRE-best20. Overall, our results show that calibration-aware learned routing can improve fidelity beyond gate-count-driven compilation.", "url": "https://arxiv.org/abs/2606.12816", "type": "数值", "summary": "量子电路布线是为噪声中等规模量子处理器编译程序的关键步骤。按照标准开销指标看来高效的路由在经过校准不良的耦合器时仍然可能会失去保真度。我们研究了一种校准感知图强化学习路由器，它使用当天的 IBM Heron r2 校准数据来选择硬件边缘交换。我们通过近端策略优化来训练策略，并通过九个慕尼黑量子工具包 (MQT) 基准电路和三个校准快照的精确模拟保真度对其进行评估。在这些评估中，汇总平均精确保真度为 0.727 美元，而 SABRE-best20 的平均精确保真度为 0.440 美元，目标感知 SABRE 为 0.481 美元。保真度增益伴随着更高的路由二量子位计数，并且集中在 5q 和 8q 电路系列中；在固定树动作图下，所有 10q 家族都支持 SABRE-best20。总的来说，我们的结果表明，校准感知的学习路由可以提高门数驱动编译之外的保真度。", "authors": [{"name": "Yash Vardhan Tomar"}, {"name": "Dheeraj Peddireddy"}, {"name": "Vaneet Aggarwal"}], "featured_authors": [{"name": "Yash Vardhan Tomar"}, {"name": "Dheeraj Peddireddy"}, {"name": "Vaneet Aggarwal"}], "author_count": 3}, {"id": "2606.12856", "category": "quant-ph", "title": "Quantum walk-based optimisation for capacitated vehicle routing with homogeneous and heterogeneous fleets", "abstract": "The capacitated vehicle routing problem (CVRP) is an appealing candidate for quantum optimisation due to its combinatorial complexity and practical importance. However, the problem's constrained search space poses a challenge for such quantum algorithms. We introduce a quantum walk-based optimisation algorithm (QWOA) for the CVRP with homogeneous or heterogeneous vehicle fleets, addressing this challenge through a continuous-time quantum walk over a product space that coincides with combinatorial structures intrinsic to the CVRP solution space. Relative to the prior QWOA-based formulation, this approach reduces the per-layer gate complexity from $\\mathcal{O}(n^{3}\\log n)$ to $\\mathcal{O}(n^{2}\\log n)$ and supports a circuit parameterisation schedule generated by a fixed number of classical parameters. Exact state-vector simulation on instances with up to $n=8$ customers and $K=3$ vehicles demonstrates improved convergence to low-cost solutions using markedly fewer objective function evaluations, with the advantage broadening as problem size increases. These results identify structured product-space walks as a promising tool for optimisation over constrained combinatorial spaces.", "url": "https://arxiv.org/abs/2606.12856", "type": "数值", "summary": "容量车辆路径问题（CVRP）由于其组合复杂性和实际重要性而成为量子优化的一个有吸引力的候选者。然而，该问题的有限搜索空间对此类量子算法提出了挑战。我们为具有同质或异构车队的 CVRP 引入了基于量子行走的优化算法 (QWOA)，通过在与 CVRP 解决方案空间固有的组合结构一致的乘积空间上进行连续时间量子行走来解​​决这一挑战。相对于之前基于 QWOA 的公式，该方法将每层门复杂度从 $\\mathcal{O}(n^{3}\\log n)$ 降低到 $\\mathcal{O}(n^{2}\\log n)$，并支持由固定数量的经典参数生成的电路参数化时间表。对最多 $n=8$ 客户和 $K=3$ 车辆的实例进行精确状态向量模拟表明，使用明显更少的目标函数评估，可以更好地收敛到低成本解决方案，并且随着问题规模的增加，优势也会扩大。这些结果表明，结构化产品空间行走是一种有前途的优化受限组合空间的工具。", "authors": [{"name": "Edric Matwiejew"}, {"name": "Aidan Smith"}, {"name": "Callum Neill"}, {"name": "Paulo Santos"}, {"name": "Ugo Varetto"}, {"name": "Jingbo Wang"}], "featured_authors": [{"name": "Edric Matwiejew"}, {"name": "Aidan Smith"}, {"name": "Callum Neill"}, {"name": "Paulo Santos"}, {"name": "Ugo Varetto"}, {"name": "Jingbo Wang"}], "author_count": 6}, {"id": "2606.12877", "category": "quant-ph", "title": "Quantum Otto engine powered by an anisotropic Heisenberg XYZ model under independent local magnetic fields", "abstract": "We study a quantum Otto heat engine whose working substance is an anisotropic two-qubit Heisenberg XYZ model. Independent local magnetic fields are used to control each spin individually. The influence of the longitudinal coupling, anisotropy, transverse coupling, and local fields on the net work output and efficiency is systematically examined. Reducing the longitudinal coupling is found to markedly improve both the maximum work and the peak efficiency. The engine performance reaches an optimum at a particular value of the anisotropy parameter. A local work analysis clarifies how work is produced during the cycle. Because of the asymmetric local fields and the intrinsic spin-spin interaction, the two qubits play markedly different thermodynamic roles; the interaction term itself contributes crucially to the total work. We further analyze the variation of quantum entanglement, quantified by concurrence, along the cycle. The results indicate that a pronounced change in entanglement between the hot and cold isomagnetic strokes is closely correlated with the efficiency enhancement. This work offers new insight into the operating principles and control of quantum Otto heat engines.", "url": "https://arxiv.org/abs/2606.12877", "type": "理论", "summary": "我们研究了量子奥托热机，其工作物质是各向异性双量子位海森堡 XYZ 模型。独立的局部磁场用于单独控制每个自旋。系统地研究了纵向耦合、各向异性、横向耦合和局部场对网络输出和效率的影响。研究发现，减少纵向耦合可以显着提高最大功和峰值效率。发动机性能在各向异性参数的特定值处达到最佳。本地工作分析阐明了周期内工作是如何产生的。由于不对称的局域场和固有的自旋-自旋相互作用，这两个量子位发挥着明显不同的热力学作用。交互项本身对整个工作起着至关重要的作用。我们进一步分析了量子纠缠沿周期的变化，通过并发量化。结果表明，热等磁冲程和冷等磁冲程之间的缠结的显着变化与效率的提高密切相关。这项工作为量子奥托热机的工作原理和控制提供了新的见解。", "authors": [{"name": "Meiru Li"}, {"name": "Maimaitiyiming Tusun"}, {"name": "Fang Zhao"}, {"name": "Hasiyatihan Abudoula"}, {"name": "Tongcheng Wei"}], "featured_authors": [{"name": "Meiru Li"}, {"name": "Maimaitiyiming Tusun"}, {"name": "Fang Zhao"}, {"name": "Hasiyatihan Abudoula"}, {"name": "Tongcheng Wei"}], "author_count": 5}, {"id": "2606.13010", "category": "quant-ph", "title": "QuBE/Qubex: an integrated hardware-software system for superconducting qubit experiments with broadband control", "abstract": "Achieving high-fidelity operation in large-scale superconducting qubit systems requires not only control hardware with broad frequency coverage, low crosstalk, and tight synchronization but also software that coordinates system configuration, experiment execution, and data analysis. Here we present an integrated qubit-control system that combines broadband microwave hardware with a pulse-level software stack for scalable superconducting qubit experiments. The hardware provides broadband microwave coverage, including an instantaneous span of up to 1.6 GHz from a control output, while the software reduces setup and calibration overhead through automated configuration and built-in experiment workflows. We validate the system on a 64-qubit fixed-frequency transmon chip through full-chip frequency identification and representative demonstrations, including multi-unit far-detuned cross-resonance calibration and benchmarking that yields a measured two-qubit gate fidelity of 98.34%, and multilevel readout beyond the computational subspace. By disclosing the hardware architecture and releasing the software stack as open source, this work provides an inspectable hardware-software foundation for scalable superconducting qubit control experiments.", "url": "https://arxiv.org/abs/2606.13010", "type": "实验", "summary": "在大规模超导量子比特系统中实现高保真操作不仅需要具有宽频率覆盖、低串扰和紧密同步的控制硬件，还需要协调系统配置、实验执行和数据分析的软件。在这里，我们提出了一种集成的量子位控制系统，它将宽带微波硬件与脉冲级软件堆栈相结合，用于可扩展的超导量子位实验。硬件提供宽带微波覆盖范围，包括来自控制输出的高达 1.6 GHz 的瞬时跨度，而软件则通过自动配置和内置实验工作流程减少设置和校准开销。我们通过全芯片频率识别和代表性演示，在 64 量子位固定频率 Transmon 芯片上验证了该系统，包括多单元远失谐交叉谐振校准和基准测试，测量的两量子位门保真度为 98.34%，以及超出计算子空间的多级读出。\n\n通过公开硬件架构并将软件堆栈作为开源发布，这项工作为可扩展的超导量子位控制实验提供了可检查的硬件软件基础。", "authors": [{"name": "Akinori Machino"}, {"name": "Kazuhisa Ogawa"}, {"name": "Takefumi Miyoshi"}, {"name": "Hidehisa Shiomi"}, {"name": "Shinichi Morisaka"}, {"name": "Ryo Matsuda"}, {"name": "Nilton F. G. Filho"}, {"name": "Koichiro Ban"}, {"name": "Takafumi Miyanaga"}, {"name": "Keisuke Koike"}, {"name": "Ryutaro Ohira"}, {"name": "Toshi Sumida"}, {"name": "Yoshinori Kurimoto"}, {"name": "Yuuya Sugita"}, {"name": "Yosuke Ito"}, {"name": "Yasunari Suzuki"}, {"name": "Peter A. Spring"}, {"name": "Shiyu Wang"}, {"name": "Hiroto Mukai"}, {"name": "Arvind Mamgain"}, {"name": "Shuhei Tamate"}, {"name": "Yutaka Tabuchi"}, {"name": "Yasunobu Nakamura"}, {"name": "Makoto Negoro"}], "featured_authors": [{"name": "Akinori Machino"}, {"name": "Kazuhisa Ogawa"}, {"name": "Takefumi Miyoshi"}, {"name": "Yutaka Tabuchi"}, {"name": "Yasunobu Nakamura"}, {"name": "Makoto Negoro"}], "author_count": 24}, {"id": "2606.13034", "category": "quant-ph", "title": "A Quantum Algorithm for Random Number Generation", "abstract": "We present a quantum algorithm for random number generation that achieves a provable quadratic speedup over classical Markov chain mixing, building on the Diaconis-Shahshahani Fourier analysis of the top-to-random card shuffle. The algorithm integrates three quantum primitives into a unified mixing circuit: the Quantum Fourier Transform (QFT), which diagonalizes the Markov transition operator; controlled phase rotations, which encode the shuffle eigenvalue spectrum; and the Grover diffusion operator, which acts as a quantum analogue of the Aldous-Diaconis strong uniform stopping time by reflecting amplitudes about their mean at each iteration. For an n-qubit register, the mixing time is O(\\sqrt{n \\log n}) iterations. Extending to m qudits of local dimension d reduces this to O(\\sqrt{\\log_d N}) iterations, where N = d^m, compared to the classical O(n \\log n) bound. The qudit formulation further reduces QFT circuit depth from O(\\log^2 N) to O(\\log_d^2 N) gates per layer by encoding the same N-state space using m = \\log_d N subsystems instead of \\log_2 N qubits. We validate both variants on IBM superconducting hardware.", "url": "https://arxiv.org/abs/2606.13034", "type": "理论+数值", "summary": "我们提出了一种用于随机数生成的量子算法，该算法基于从顶部到随机洗牌的 Diaconis-Shahshahani 傅里叶分析，实现了比经典马尔可夫链混合可证明的二次加速。该算法将三个量子原语集成到一个统一的混合电路中：量子傅里叶变换（QFT），它将马尔可夫转移算子对角化；受控相位旋转，对混洗特征值谱进行编码； Grover 扩散算子，它通过反映每次迭代时平均值的振幅，充当 Aldous-Diaconis 强均匀停止时间的量子模拟。对于 n 量子位寄存器，混合时间为 O(\\sqrt{n \\log n}) 次迭代。与经典的 O(n \\log n) 界限相比，扩展到局部维度 d 的 m 个 qdits 将其减少到 O(\\sqrt{\\log_d N}) 次迭代，其中 N = d^m。通过使用 m = \\log_d N 个子系统而不是 \\log_2 N 个量子位对相同的 N 状态空间进行编码，qudit 公式进一步将 QFT 电路深度从每层 O(\\log^2 N) 减少到 O(\\log_d^2 N) 个门。我们在 IBM 超导硬件上验证了这两种变体。", "authors": [{"name": "Aastha Kataria"}, {"name": "Devansh Desai"}, {"name": "Ashwini Dalvi"}, {"name": "Sagar Korde"}, {"name": "Abhijeet Pasi"}, {"name": "Irfan N A Siddavatam"}, {"name": "Sudhir Ranjan Jain"}], "featured_authors": [{"name": "Aastha Kataria"}, {"name": "Devansh Desai"}, {"name": "Ashwini Dalvi"}, {"name": "Abhijeet Pasi"}, {"name": "Irfan N A Siddavatam"}, {"name": "Sudhir Ranjan Jain"}], "author_count": 7}, {"id": "2606.13052", "category": "quant-ph", "title": "Simple analytical flux-tuned iSWAP pulses for leakage suppression", "abstract": "Fast, high-fidelity two-qubit gates are a key requirement for fault-tolerant quantum computation. Tunable coupler architectures provide a flexible approach for implementing entangling gates through flux control with large on-off ratios, but fast flux modulation can induce diabatic transitions and population leakage to non-computational states, limiting gate performance. Here we present an analytical flux control method enabling derivative removal by adiabatic gate ($\\Phi$-DRAG) for suppressing leakage in flux tunable two-qubit gates. We show that $\\Phi$-DRAG differs fundamentally from conventional microwave implementations and derive modified flux modulation protocols that suppress leakage below $10^{-4}$ for fast entangling gates. The method remains effective across a range of asymmetry between qubit anharmonicities and different circuit parameters, enabling high-fidelity two-qubit gates within the fifteen nanosecond range.", "url": "https://arxiv.org/abs/2606.13052", "type": "理论", "summary": "快速、高保真双量子位门是容错量子计算的关键要求。可调谐耦合器架构提供了一种灵活的方法，通过具有大开关比的通量控制来实现纠缠门，但快速通量调制可能会导致非绝热跃迁和群体泄漏到非计算状态，从而限制了门的性能。在这里，我们提出了一种分析通量控制方法，可以通过绝热门（$\\Phi$-DRAG）去除导数，以抑制通量可调双量子位门中的泄漏。我们证明 $\\Phi$-DRAG 与传统微波实现有根本的不同，并推导出改进的通量调制协议，将快速纠缠门的泄漏抑制在 $10^{-4}$ 以下。该方法在量子位非谐波和不同电路参数之间的一系列不对称性范围内仍然有效，从而在十五纳秒范围内实现高保真双量子位门。", "authors": [{"name": "Dimitrios Georgiadis"}, {"name": "Boxi Li"}, {"name": "Asier Galicia"}, {"name": "Rami Barends"}, {"name": "F.A. Cárdenas-López"}, {"name": "Felix Motzoi"}], "featured_authors": [{"name": "Dimitrios Georgiadis"}, {"name": "Boxi Li"}, {"name": "Asier Galicia"}, {"name": "Rami Barends"}, {"name": "F.A. Cárdenas-López"}, {"name": "Felix Motzoi"}], "author_count": 6}, {"id": "2606.13200", "category": "quant-ph", "title": "Interference of critical dynamics associated with zero modes", "abstract": "We study the interference of critical dynamics associated with zero modes (ICDZM) in the generalized Creutz ladders using closed quench paths that pass through two critical points successively. By reading out the final zero-mode transfer probability, we find rich ICDZM interference patterns dependent on the quench path. In particular, when the closed path links two topologically nontrivial phases, the ICDZM pattern may either vanish or exhibit period doubling. Within the framework of WKB analysis, this phenomenon is well clarified by the interference phase accumulated in the quench procedure. We also demonstrate that the zero-mode transfer probability can be detected by the deviation of the boundary particle number from its initial fractional value, which arises from the blending of bulk modes in the critical dynamics. As an edge defect, the zero-mode transfer probability captures both the ICDZM oscillation and the known anomalous defect production in a non-closed quench path. These results identify ICDZM and the corresponding edge defect as probes for critical dynamics associated with topological zero modes.", "url": "https://arxiv.org/abs/2606.13200", "type": "理论", "summary": "我们使用连续通过两个临界点的封闭淬灭路径研究了广义 Creutz 梯中与零模式 (ICDZM) 相关的临界动力学的干扰。通过读出最终的零模式转移概率，我们发现丰富的 ICDZM 干涉图案依赖于淬灭路径。特别是，当闭合路径连接两个拓扑上不平凡的相时，ICDZM 图案可能会消失或表现出周期加倍。在 WKB 分析的框架内，这种现象可以通过淬火过程中积累的干扰相得到很好的阐明。我们还证明，零模式传递概率可以通过边界粒子数与其初始分数值的偏差来检测，该偏差是由临界动力学中体模的混合引起的。作为边缘缺陷，零模式转移概率捕获了 ICDZM 振荡和非闭合失超路径中已知的异常缺陷产生。这些结果将 ICDZM 和相应的边缘缺陷确定为与拓扑零模式相关的临界动力学的探针。", "authors": [{"name": "Zhi-Han Zhang"}, {"name": "Han-Chuan Kou"}, {"name": "Peng Li"}], "featured_authors": [{"name": "Zhi-Han Zhang"}, {"name": "Han-Chuan Kou"}, {"name": "Peng Li"}], "author_count": 3}, {"id": "2606.13205", "category": "quant-ph", "title": "Achieving Heisenberg limit under noisy conditions with quantum Zeno dynamics and dynamical decoupling", "abstract": "Quantum Zeno dynamics (QZD) and dynamical decoupling (DD) are useful tools that enable the effective suppression of noise in quantum systems. We consider the problem of when (i) noise can be suppressed and (ii) Heisenberg limit (HL) can be achieved in quantum metrology, and prove necessary and sufficient conditions for when QZD and DD are useful for achieving these two goals. We also show that in the Markovian regime, there are scenarios where preventing errors using QZD/DD may enable HL to be achieved where current QEC methods may not. Finally, we demonstrate that the combination of both techniques can allow individually imperfect QZD and DD strategies to saturate HL.", "url": "https://arxiv.org/abs/2606.13205", "type": "理论", "summary": "量子芝诺动力学 (QZD) 和动态解耦 (DD) 是有效抑制量子系统中噪声的有用工具。我们考虑量子计量学中何时可以抑制噪声和何时可以实现海森堡极限 (HL) 的问题，并证明 QZD 和 DD 何时可用于实现这两个目标的充分必要条件。我们还表明，在马尔可夫体系中，在某些情况下，使用 QZD/DD 防止错误可能使 HL 得以实现，而当前的 QEC 方法可能无法实现。最后，我们证明这两种技术的结合可以允许单独不完美的 QZD 和 DD 策略使 HL 饱和。", "authors": [{"name": "Ke Zeng"}, {"name": "Bakmou Lahcen"}, {"name": "Yu Jiang"}, {"name": "Kok Chuan Tan"}], "featured_authors": [{"name": "Ke Zeng"}, {"name": "Bakmou Lahcen"}, {"name": "Yu Jiang"}, {"name": "Kok Chuan Tan"}], "author_count": 4}, {"id": "2606.13244", "category": "quant-ph", "title": "Coupling-Grouped XY-QAOA for Joint Anomaly-Feature Selection", "abstract": "Selecting anomalous samples and explanatory features under fixed budgets defines a coupled constrained-optimization problem. Sequential feature-first selection ranks features before choosing samples, which can overlook features whose utility depends on which samples are selected, especially when scores are calibrated from reference data that may be limited, noisy, or drifting. We instead formulate the task as joint sample-feature selection under the same fixed counts. In the analyzed formal model, calibration-error sensitivity grows linearly with the number of samples for feature-first ordering but stays constant for joint selection. We introduce Coupling-Grouped XY-QAOA, a constraint-preserving grouped-angle variant for the resulting optimization problem. On matched sparse IBM Heron R3 benchmarks, a hardware-aware implementation reduces circuit depth by 45.9%-61.3% and two-qubit gates by 2.6%-5.2% relative to Qiskit optimization level 3 on the CZ-basis target. It enables, to our knowledge, the largest reported width-depth configurations for constraint-preserving bipartite-selection QAOA hardware executions with feasible-sector retention: 64 qubits at p=2 and 36 qubits at p=3. The 20-qubit p=5 runs retain 63% valid samples. Across 36-64 qubits, fixed-angle runs yield lower-energy feasible samples than matched random-feasible sampling. Warm starts reduce the gap to strict-feasible classical references by 57.5%-80.5%, and near-budget repair matches the sparse classical reference at 36 qubits. Benchmarks show gains in balanced fixed-budget regimes, and noiseless simulations show that problem-structured angle grouping improves over same-depth XY-QAOA and matched-parameter, type-preserving randomization controls. Overall, the results support calibrated joint selection and hardware-realizable constrained-mixer execution in the tested regimes.", "url": "https://arxiv.org/abs/2606.13244", "type": "理论+数值", "summary": "在固定预算下选择异常样本和解释性特征定义了耦合约束优化问题。顺序特征优先选择在选择样本之前对特征进行排序，这可能会忽略其效用取决于选择的样本的特征，尤其是当根据可能有限、有噪声或漂移的参考数据校准分数时。相反，我们将任务制定为相同固定计数下的联合样本特征选择。在分析的形式模型中，对于特征优先排序，校准误差敏感性随着样本数量线性增长，但对于联合选择则保持恒定。我们引入了耦合分组 XY-QAOA，这是一种针对所得优化问题的保留约束的分组角度变体。在匹配的稀疏 IBM Heron R3 基准测试中，相对于 CZ 目标上的 Qiskit 优化级别 3，硬件感知实现将电路深度减少了 45.9%-61.3%，两个量子位门减少了 2.6%-5.2%。据我们所知，它为具有可行扇区保留的约束保留二分选择 QAOA 硬件执行提供了报告的最大宽度深度配置：p=2 时 64 个量子位，p=3 时 36 个量子位。\n\n20 量子位 p=5 运行保留了 63% 的有效样本。在 36-64 个量子位中，固定角度运行产生的可行样本比匹配的随机可行采样能量更低。热启动将与严格可行的经典参考的差距缩小了 57.5%-80.5%，接近预算的修复与 36 个量子位的稀疏经典参考相匹配。基准测试显示了平衡固定预算制度的收益，无噪声模拟表明，问题结构的角度分组比相同深度的 XY-QAOA 和匹配参数、类型保留的随机化控制有所改进。总体而言，结果支持在测试方案中校准的联合选择和硬件可实现的约束混合器执行。", "authors": [{"name": "Pauli Taipale"}], "featured_authors": [{"name": "Pauli Taipale"}], "author_count": 1}, {"id": "2606.13251", "category": "quant-ph", "title": "Kubo-Martin-Schwinger conditions for non-Hermitian systems", "abstract": "We investigate the extension of the Kubo--Martin--Schwinger (KMS) thermal equilibrium condition to non-Hermitian Hamiltonians with real spectra and biorthogonal eigensystems, providing a systematic analysis through three complementary routes. Our central result is a thermodynamic characterisation of quasi-Hermiticity: for $H \\in M_d(\\mathbb{C})$ diagonalisable with real spectrum, the biorthogonal Gibbs functional $\\omega_{\\rm{bi}}(A) = Z_{\\rm{bi}}^{-1} \\sum_n e^{-\\beta E_n}\\langle\\phi_n|A|\\psi_n\\rangle$ satisfies $\\omega_{\\rm{bi}}(A^†A) \\geq 0$ for all $A$ if and only if $H$ is quasi-Hermitian. The proof constructs the metric $\\eta$ directly from the eigenprojectors of $\\omega_{\\rm{bi}}$ via the Riesz representation theorem, with no prior choice of $\\eta$, providing a metric-free certificate of quasi-Hermiticity outside the Mostafazadeh--Scholtz framework. Under the full quasi-Hermitian hypothesis, we prove that the $\\eta$-Gibbs state $\\omega_\\eta(A) = Z_\\eta^{-1}\\, \\rm
