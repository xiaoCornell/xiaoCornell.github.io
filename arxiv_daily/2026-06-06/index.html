06.06019", "type": "理论", "summary": "“聚合物量子力学”是受环量子引力启发的量子化方案的名称，其中理论的构型空间被选择为具有离散拓扑。聚合物量子化产生了规范交换关系的表示，该表示与传统的“薛定谔”表示真正不同。在本文中，我们总结了聚合物量子力学的主要特征，并详细研究了具有经典紧配置空间的系统的聚合物量子化。我们明确地展示了如何使用聚合物态的标准构造来产生在有限点图上定义的希尔伯特态空间。通过示例，我们找到了在此类晶格上定义的环上粒子和盒子中粒子的精确能量本征值和本征函数，并讨论了与标准薛定谔量子力学的异同。我们还探索了这些系统中状态的连续统极限，并详细演示了位置表示中的精确本征函数如何接近其连续统对应项。", "authors": [{"name": "Maxwell R. Siebersma"}, {"name": "Basie Seibert"}, {"name": "Samuel Shuman"}, {"name": "David A. Craig"}], "featured_authors": [{"name": "Maxwell R. Siebersma"}, {"name": "Basie Seibert"}, {"name": "Samuel Shuman"}, {"name": "David A. Craig"}], "author_count": 4}, {"id": "2606.06070", "category": "quant-ph", "title": "Efficient Quantum Circuit Construction of Controlled Time-Evolution for Arbitrary Pauli-Sum Hamiltonians", "abstract": "Controlled time-evolution circuits select forward or backward Hamiltonian time evolution according to the state of an ancilla qubit. They are fundamental building blocks in quantum eigenvalue transformation of unitaries, Hamiltonian filtering, and related quantum algorithms. A direct realization adds ancilla control to the elementary gates of the time-evolution circuit and therefore increases the two-qubit gate count, compiled T depth and CX depth. We develop an efficient recursive algorithm that, for an arbitrary Pauli-sum Hamiltonian, partitions the input Pauli terms into groups and assigns to each group a sign-flip Pauli string that anti-commutes with the in-group terms, thereby removing ancilla control from the grouped time-evolution blocks. Numerical benchmarks on random Hamiltonians and structured spin Hamiltonians show reductions in compiled T depth and compiled CX depth. For a Kagome Hamiltonian with 24 spins under full connectivity, the proposed construction reduces the compiled T depth by 85.2% and the compiled CX depth by 68.9%, compared with a conventional implementation that decomposes the Hamiltonian into individual Pauli terms and implements the controlled time evolution of each term by directly adding the ancilla qubit to the corresponding Pauli-rotation circuit.", "url": "https://arxiv.org/abs/2606.06070", "type": "理论+数值", "summary": "受控时间演化电路根据辅助量子位的状态选择前向或后向哈密顿时间演化。它们是幺正量子特征值变换、哈密顿滤波和相关量子算法的基本构建模块。直接实现为时间演化电路的基本门添加了辅助控制，因此增加了两个量子位门的数量、编译的 T 深度和 CX 深度。我们开发了一种高效的递归算法，对于任意的泡利和哈密顿量，将输入泡利项分成组，并为每个组分配一个与组内项反交换的符号翻转泡利串，从而从分组的时间演化块中删除辅助控制。随机哈密顿量和结构化自旋哈密顿量的数值基准显示编译的 T 深度和编译的 CX 深度有所减少。\n\n对于全连接下具有 24 个自旋的 Kagome 哈密顿量，与将哈密顿量分解为单独的泡利项并通过直接将辅助量子位添加到相应的泡利旋转电路来实现每个项的受控时间演化的传统实现相比，所提出的结构将编译的 T 深度减少了 85.2%，编译的 CX 深度减少了 68.9%。", "authors": [{"name": "Shintaro Fujiwara"}, {"name": "Naoki Yamamoto"}, {"name": "Naoki Ishikawa"}], "featured_authors": [{"name": "Shintaro Fujiwara"}, {"name": "Naoki Yamamoto"}, {"name": "Naoki Ishikawa"}], "author_count": 3}, {"id": "2606.06107", "category": "quant-ph", "title": "Deployed trusted-node quantum key distribution over 300 km with a multi-core fiber access link", "abstract": "Quantum key distribution (QKD) is increasingly considered for deployment in realistic communication networks, where long distances, heterogeneous fiber infrastructure, and coexistence with classical traffic present substantial challenges. Here, we demonstrate trusted-node QKD between Linköping University and the Stockholm hub of the Swedish national quantum communication infrastructure over 270 km of deployed single-mode fiber, extended by a 33 km multi-core fiber (MCF) segment emulating a metropolitan access link, for a total distance of 303 km. The two sub-links use commercial QKD systems whose receivers are interfaced with external superconducting nanowire single-photon detectors, enabling operation at losses beyond those supported by standard internal gated-mode detectors. We operate the link while actively switching the QKD channel between two MCF cores, with co-propagating Ethernet traffic and injected broadband optical noise in the other cores. The results demonstrate the integration of commercial QKD into demanding, dynamically reconfigurable fiber infrastructure relevant to future hybrid quantum-classical networks. Finally, using the generated secret keys, we illustrate how limited and time-varying QKD throughput affects one-time-pad-protected image transmission: image fidelity depends strongly on the available QKD-generated key budget and the choice of compression algorithm, highlighting application-level challenges for QKD-based encryption in realistic scenarios.", "url": "https://arxiv.org/abs/2606.06107", "type": "数值", "summary": "量子密钥分发 (QKD) 越来越多地被考虑部署在现实通信网络中，其中长距离、异构光纤基础设施以及与传统流量的共存带来了巨大的挑战。在这里，我们演示了林雪平大学和瑞典国家量子通信基础设施斯德哥尔摩中心之间超过 270 公里的已部署单模光纤的可信节点 QKD，并通过模拟城市接入链路的 33 公里多核光纤 (MCF) 段进行延伸，总距离为 303 公里。这两个子链路使用商用 QKD 系统，其接收器与外部超导纳米线单光子探测器连接，从而能够以超出标准内部门控模式探测器支持的损耗运行。我们在操作链路的同时，在两个 MCF 核心之间主动切换 QKD 通道，并在其他核心中共同传播以太网流量和注入宽带光噪声。结果表明，商业 QKD 已集成到与未来混合量子经典网络相关的高要求、动态可重构光纤基础设施中。\n\n最后，使用生成的密钥，我们说明了有限且随时间变化的 QKD 吞吐量如何影响一次一密保护的图像传输：图像保真度在很大程度上取决于可用的 QKD 生成的密钥预算和压缩算法的选择，突出了现实场景中基于 QKD 的加密的应用程序级挑战。", "authors": [{"name": "Martin Clason"}, {"name": "Joakim Argillander"}, {"name": "Didrik Bergström"}, {"name": "Daniel Spegel-Lexne"}, {"name": "Giulio Foletto"}, {"name": "Ashraf El Hassan"}, {"name": "Mohamed Bourennane"}, {"name": "Onur Günlü"}, {"name": "Katia Gallo"}, {"name": "Rui Lin"}, {"name": "Guilherme B. Xavier"}], "featured_authors": [{"name": "Martin Clason"}, {"name": "Joakim Argillander"}, {"name": "Didrik Bergström"}, {"name": "Katia Gallo"}, {"name": "Rui Lin"}, {"name": "Guilherme B. Xavier"}], "author_count": 11}, {"id": "2606.06246", "category": "quant-ph", "title": "Multiple Quantum Hypothesis Testing: One-Shot Pairwise Bounds and Sharp Asymptotics", "abstract": "We consider Bayesian discrimination among multiple quantum states and establish a dimension-free one-shot upper bound on the minimum probability of error in terms of the sum of pairwise errors. This resolves a conjecture of Audenaert and Mosonyi [J. Math. Phys. 55 (2014)] and improves the multiple quantum Chernoff bound of Li [Ann. Statist. 44 (2016)] by removing its dimension-dependent prefactor. In the asymptotic many-copy regime, our bound proves the achievability of the multiple quantum Chernoff distance for arbitrary separable Hilbert spaces, thereby settling the previously open infinite-dimensional case, and further yields constant-factor sharp asymptotics for the optimal error probability. In binary quantum hypothesis testing, we prove that the minimum error probability is characterized, up to universal constants, by a trace harmonic-mean quantity. Consequently, the optimal binary quantum error probability is within a factor of two of the optimal classical error probability for the associated Nussbaum-Szkoła distributions, complementing the lower bound of Nussbaum and Szkoła [Ann. Statist. 37 (2009)].", "url": "https://arxiv.org/abs/2606.06246", "type": "理论", "summary": "我们考虑多个量子态之间的贝叶斯判别，并根据成对误差之和建立最小误差概率的无维一次性上限。这解决了 Audenaert 和 Mosonyi 的猜想 [J.数学。物理。 55 (2014)] 并改进了 Li 的多量子切尔诺夫界 [Ann. 55 (2014)]国家主义者。 44 (2016)]通过删除其维度相关的前因子。在渐近多拷贝机制中，我们的界限证明了任意可分离希尔伯特空间的多量子切尔诺夫距离的可实现性，从而解决了先前开放的无限维情况，并进一步产生了最优误差概率的常数因子锐渐近。在二元量子假设检验中，我们证明最小误差概率是由痕量调和平均量表征的，直至通用常数。因此，最佳二元量子误差概率在相关 Nussbaum-Szkoła 分布的最佳经典误差概率的两倍以内，补充了 Nussbaum 和 Szkoła 的下限 [Ann.国家主义者。 37（2009）]。", "authors": [{"name": "Hao-Chung Cheng"}, {"name": "Po-Chieh Liu"}], "featured_authors": [{"name": "Hao-Chung Cheng"}, {"name": "Po-Chieh Liu"}], "author_count": 2}, {"id": "2606.06287", "category": "quant-ph", "title": "Quantum Algorithms for Triangle Cut Sparsification", "abstract": "Triangles capture higher-order structures in graphs and are fundamental to applications such as clustering and network analysis. To enable efficient use of such structures at scale, we study the problem of \\emph{triangle cut sparsification}, which aims to reduce the graph size while approximately preserving triangle counts across every cut. We investigate \\emph{quantum algorithms} for this problem, using triangle listing as our main technical ingredient. In particular, we present a quantum algorithm for triangle listing that, for a graph with $n$ vertices, $m$ edges, and $t$ triangles, runs in time $T_{\\mathrm{q\\text{-}list}} =$ $\\widetilde{O}\\bigl(\\min(n^{5/4}t^{7/12} + n^{7/6}t^{7/9}, m + m^{3/4}t^{1/2},$ $n^{3/2}t^{1/2})\\bigr)$, improving upon the best known classical bounds over a broad range of parameters. Our algorithm is based on a heavy-light vertex partition and an extension of triangle detection via quantum walks and Grover search. Leveraging this result, we design a quantum algorithm for constructing $\\varepsilon$-triangle cut sparsifiers of size $\\widetilde{O}(n/\\varepsilon^2)$ in time $\\widetilde{O}(T_{\\mathrm{q\\text{-}list}} + \\sqrt{mn}/\\varepsilon)$. Finally, we demonstrate applications to clustering algorithms based on triangle-related measures and prove a lower bound of $\\Omega(n/\\varepsilon^2)$ on the size of any $\\varepsilon$-triangle cut sparsifiers.", "url": "https://arxiv.org/abs/2606.06287", "type": "理论+数值", "summary": "三角形捕获图形中的高阶结构，是聚类和网络分析等应用的基础。为了能够大规模有效地使用此类结构，我们研究了 emph{三角形切割稀疏化} 问题，其目的是减小图的大小，同时大致保留每次切割的三角形计数。我们研究了这个问题的\\emph{量子算法}，使用三角形列表作为我们的主要技术成分。特别是，我们提出了一种用于三角形列表的量子算法，对于具有 $n$ 个顶点、$m$ 边和 $t$ 个三角形的图，运行时间为 $T_{\\mathrm{q\\text{-}list}} =$ $\\widetilde{O}\\bigl(\\min(n^{5/4}t^{7/12} + n^{7/6}t^{7/9}, m + m^{3/4}t^{1/2},$ $n^{3/2}t^{1/2})\\bigr)$，在广泛的参数范围内改进了最著名的经典边界。我们的算法基于重轻顶点划分以及通过量子行走和 Grover 搜索进行三角形检测的扩展。利用这一结果，我们设计了一种量子算法，用于在 $\\widetilde{O}(T_{\\mathrm{q\\text{-}list}} + \\sqrt{mn}/\\varepsilon)$ 时间内构造大小为 $\\widetilde{O}(n/\\varepsilon^2)$ 的 $\\varepsilon$-三角形切割稀疏器。\n\n最后，我们演示了基于三角形相关度量的聚类算法的应用，并证明了任何 $\\varepsilon$ 三角形切割稀疏器大小的 $\\Omega(n/\\varepsilon^2)$ 下界。", "authors": [{"name": "Shan Jiang"}, {"name": "Pan Peng"}], "featured_authors": [{"name": "Shan Jiang"}, {"name": "Pan Peng"}], "author_count": 2}, {"id": "2606.06316", "category": "quant-ph", "title": "Quantum enhanced rare event discovery and sampling", "abstract": "Financial crashes, cascading failures in infrastructure, and critical errors in AI systems are frequently triggered by events that occur with extremely small probability. Efficiently discovering and sampling events with probability below a threshold is therefore of critical interest. Yet this task is highly non-trivial using existing classical or quantum methods. Being rare, such events require an immense sampling overhead to collect sufficient data samples. Moreover, because the rare events are not known in advance, they cannot be flagged for amplification using standard techniques. Here, we introduce a quantum algorithm for rare-event discovery and sampling without first learning which events are rare. The algorithm achieves the optimal quantum scaling with the rarity threshold. We further demonstrate that this can achieve a quadratic speedup for heavy-tailed systems whose tail has nonvanishing total mass, and translates into a robust polynomial speedup for stationary stochastic processes, with the exponent determined by its entropy-rate structure.", "url": "https://arxiv.org/abs/2606.06316", "type": "理论+数值", "summary": "金融崩溃、基础设施的连锁故障以及人工智能系统的严重错误常常是由概率极小的事件引发的。因此，有效地发现和采样概率低于阈值的事件至关重要。然而，使用现有的经典或量子方法，这项任务非常重要。此类事件很少见，需要巨大的采样开销来收集足够的数据样本。此外，由于罕见事件事先未知，因此无法使用标准技术对其进行标记以进行放大。在这里，我们引入了一种用于罕见事件发现和采样的量子算法，而无需首先了解哪些事件是罕见的。该算法在稀有度阈值下实现了最优的量子缩放。我们进一步证明，这可以为尾部总质量不为零的重尾系统实现二次加速，并转化为平稳随机过程的鲁棒多项式加速，其指数由其熵率结构决定。", "authors": [{"name": "Naixu Guo"}, {"name": "Po-Wei Huang"}, {"name": "Qisheng Wang"}, {"name": "Jayne Thompson"}, {"name": "Patrick Rebentrost"}, {"name": "Mile Gu"}, {"name": "Chengran Yang"}], "featured_authors": [{"name": "Naixu Guo"}, {"name": "Po-Wei Huang"}, {"name": "Qisheng Wang"}, {"name": "Patrick Rebentrost"}, {"name": "Mile Gu"}, {"name": "Chengran Yang"}], "author_count": 7}, {"id": "2606.06318", "category": "quant-ph", "title": "Reliability of asymptotic work extraction", "abstract": "Extracting work from quantum states is a fundamental task in quantum thermodynamics. Previous studies have primarily focused on determining the best achievable rate of work extraction, and remarkably, this characterization appeared to remain unchanged regardless of the choice of allowed processes: whether one considers the operationally motivated class of energy-conserving thermal operations, or the axiomatic class of Gibbs-preserving operations, the optimal extractable work is given by the Helmholtz free energy. Here, we challenge this perspective, showing that a more refined analysis of the asymptotic performance of work extraction reveals significant differences in the performance for the two different classes of free operations. Precisely, we focus on the trade-off between the extraction rate and its reliability, characterized by the optimal asymptotic speed at which the extraction error can be suppressed. We establish that the reliability of Gibbs-preserving operations and of thermal operations are respectively characterized by the Petz and the sandwiched Rényi relative entropies, demonstrating that the former in general strictly outperforms the latter, and providing new interpretations of several information-theoretic divergences. Our analysis reveals that operational constraints such as energy conservation impose stronger limitations on the achievable precision of quantum tasks than can be inferred from their asymptotic rates, thereby questioning the use of Gibbs-preserving operations as a mathematically convenient substitute for the physically realizable thermal processes.", "url": "https://arxiv.org/abs/2606.06318", "type": "理论", "summary": "从量子态中提取功是量子热力学的一项基本任务。以前的研究主要集中在确定最佳可实现的功提取率，值得注意的是，无论选择何种允许的过程，这种特征似乎都保持不变：无论是考虑节能热操作的操作动机类，还是吉布斯守恒操作的公理类，最佳可提取功都由亥姆霍兹自由能给出。在这里，我们挑战这个观点，表明对工作提取的渐近性能的更精细的分析揭示了两种不同类别的自由操作的性能的显着差异。准确地说，我们关注的是提取率和可靠性之间的权衡，其特征是可以抑制提取误差的最佳渐近速度。\n\n我们建立了吉布斯守恒运算和热运算的可靠性分别用 Petz 和夹层 Rényi 相对熵来表征，证明前者总体上严格优于后者，并为几种信息论分歧提供了新的解释。我们的分析表明，能量守恒等运算约束对量子任务可实现的精度施加了比从渐近率推断出的更严格的限制，从而质疑使用吉布斯守恒运算作为物理上可实现的热过程的数学上方便的替代品。", "authors": [{"name": "Kaito Watanabe"}, {"name": "Bartosz Regula"}, {"name": "Marco Tomamichel"}, {"name": "Ryuji Takagi"}], "featured_authors": [{"name": "Kaito Watanabe"}, {"name": "Bartosz Regula"}, {"name": "Marco Tomamichel"}, {"name": "Ryuji Takagi"}], "author_count": 4}, {"id": "2606.06341", "category": "quant-ph", "title": "Benchmarking Floquet Master Equations for Periodically Driven Open Quantum Systems", "abstract": "The dynamics of open quantum systems is commonly described by quantum master equations derived under the assumption of weak system-bath coupling and a separation of timescales between system and bath. When the system is additionally subjected to a periodic driving, the validity of the resulting Floquet master equations is further restricted to regimes of weak or high-frequency driving. Here, we benchmark a set of commonly used Floquet master equations for a model of two locally driven spins coupled to a shared Ohmic reservoir at finite temperature. We systematically probe the accuracy of the equations as a function of the driving parameters, thus identifying limits of their applicability. Dynamical maps predicted by each master equation are compared against numerically exact non-Markovian simulations, tracking the full relaxation dynamics. We find that the accuracy of each master equation closely reflects the assumptions underlying its derivation. For the Floquet-Lindblad equation, errors can be strongly amplified near resonances where the secular approximation breaks down, while approaches that avoid the secular approximation perform better and exhibit a more systematic dependence of the error on driving frequency and amplitude.", "url": "https://arxiv.org/abs/2606.06341", "type": "理论+数值", "summary": "开放量子系统的动力学通常通过在弱系统-浴耦合和系统与浴之间的时间尺度分离的假设下导出的量子主方程来描述。当系统另外受到周期性驱动时，所得 Floquet 主方程的有效性进一步限于弱或高频驱动的状态。在这里，我们对一组常用的 Floquet 主方程进行了基准测试，用于在有限温度下耦合到共享欧姆储层的两个局部驱动自旋的模型。我们系统地探讨了方程作为驱动参数函数的准确性，从而确定了其适用性的限制。将每个主方程预测的动态图与数值精确的非马尔可夫模拟进行比较，跟踪完整的松弛动态。我们发现每个主方程的准确性密切反映了其推导背后的假设。\n\n对于 Floquet-Lindblad 方程，在长期近似失效的谐振附近，误差会被强烈放大，而避免长期近似的方法表现更好，并且表现出误差对驱动频率和幅度的更系统的依赖性。", "authors": [{"name": "Konrad Mickiewicz"}, {"name": "Valentin Link"}, {"name": "Walter T. Strunz"}], "featured_authors": [{"name": "Konrad Mickiewicz"}, {"name": "Valentin Link"}, {"name": "Walter T. Strunz"}], "author_count": 3}, {"id": "2606.06392", "category": "quant-ph", "title": "Robustness of Entanglement Manipulation for almost i.i.d. sources", "abstract": "We study the robustness of asymptotic entanglement manipulation beyond the exact i.i.d. regime, focusing on Mazzola--Sutter--Renner (MSR) almost i.i.d. sources, which allow a sublinear number of deviations from a tensor-power structure. For pure MSR sources along a bipartite reference state $|{\\phi}\\rangle_{AB}$, we prove that the entanglement concentration rate is robust: every rate below the entropy of entanglement $S(\\phi_A)$ remains achievable. Moreover, this can be done by a single Schur--Weyl concentration protocol that is universal within the MSR class, depending only on the reference state and not on the particular source sequence. For mixed MSR sources along a reference state $\\rho_{AB}$, we prove a source-dependent entanglement-distillation achievability result: every rate below the coherent information $I(A\\rangle B)_\\rho$ of the reference state is achievable, although the entanglement distillation protocol may depend on the particular MSR source sequence. For the reverse task of entanglement dilution, we prove a rate-robustness theorem: the asymptotic entanglement cost of any MSR target sequence along $\\rho_{AB}$ is at most $E_F^\\infty(\\rho_{AB})$, the regularized entanglement of formation of the reference state. To establish these results, we prove structural and entropic properties of MSR almost i.i.d. sequences which may be useful in other information-theoretic settings. Thus, for the achievability statements considered here, MSR almost i.i.d. perturbations exhibit the same asymptotic behaviour as their i.i.d. reference states, despite allowing sublinear deviations from a tensor-power structure.", "url": "https://arxiv.org/abs/2606.06392", "type": "理论", "summary": "我们研究了超越精确 i.i.d 的渐近纠缠操纵的鲁棒性。政权，重点关注 Mazzola-Sutter-Renner (MSR) 几乎独立同分布。源，允许与张量幂结构的次线性偏差。对于沿二分参考状态 $|{\\phi}\\rangle_{AB}$ 的纯 MSR 源，我们证明纠缠集中率是稳健的：低于纠缠熵 $S(\\phi_A)$ 的每个速率仍然可以实现。此外，这可以通过 MSR 类中通用的单一 Schur-Weyl 浓度方案来完成，仅取决于参考状态而不取决于特定的源序列。对于沿着参考状态 $\\rho_{AB}$ 的混合 MSR 源，我们证明了依赖于源的纠缠蒸馏可实现性结果：低于参考状态的相干信息 $I(A\\rangle B)_\\rho$ 的每个速率都是可以实现的，尽管纠缠蒸馏协议可能取决于特定的 MSR 源序列。\n\n对于纠缠稀释的逆向任务，我们证明了速率鲁棒性定理：任何MSR目标序列沿$\\rho_{AB}$的渐近纠缠成本至多为$E_F^\\infty(\\rho_{AB})$，即参考态形成的正则化纠缠。为了建立这些结果，我们证明了 MSR 的结构和熵特性几乎独立同分布。在其他信息论环境中可能有用的序列。因此，对于此处考虑的可实现性陈述，MSR 几乎独立同分布。扰动表现出与其独立同分布相同的渐近行为。参考状态，尽管允许与张量幂结构的亚线性偏差。", "authors": [{"name": "Nilanjana Datta"}], "featured_authors": [{"name": "Nilanjana Datta"}], "author_count": 1}, {"id": "2606.06442", "category": "quant-ph", "title": "Nanostructure modelling with early fault tolerant quantum computers", "abstract": "Semiconductor nanostructures are central to many developing technologies. Notably, double quantum dots are especially important for semiconductor spin-qubit architectures, quantum sensing applications, and quantum-dot solar cells. Accurate modelling is highly desirable but conventional methods can struggle when dynamics involve more than two interacting electrons. In this work, we present a quantum simulation framework capable of addressing multi-electron double quantum dots. We adopt an efficiently scaling 1$^\\text{st}$ quantised representation of the system and develop algorithms based on both Trotterisation and qubitisation. Incorporating insights from classical simulations enables us to produce resource estimates that are more realistic than those obtained from theoretical error bounds. Using a standard surface code model with physical noise at $10^{-3}$, our results indicate that the ground-state energy of four electrons in a double quantum dot can be estimated in approximately 24 hours using 226k physical qubits, or an eight-electron system in 3.4 days with 314k qubits (with runtimes falling dramatically when more qubits are available). We anticipate that incorporating very recent advances including dense surface code architectures (Low et al. arXiv:2605.30455 ) may reduce these costs significantly further. We conclude that early fault tolerant computers may prove to be valuable tools for designing mature-era quantum technologies.", "url": "https://arxiv.org/abs/2606.06442", "type": "理论+数值", "summary": "半导体纳米结构是许多开发技术的核心。值得注意的是，双量子点对于半导体自旋量子位架构、量子传感应用和量子点太阳能电池尤其重要。精确的建模是非常理想的，但当动力学涉及两个以上相互作用的电子时，传统方法可能会很困难。在这项工作中，我们提出了一种能够解决多电子双量子点问题的量子模拟框架。我们采用系统的有效缩放 1$^\\text{st}$ 量化表示，并开发基于 Trotterization 和 qubitization 的算法。结合经典模拟的见解使我们能够产生比从理论误差范围获得的资源估计更现实的资源估计。使用物理噪声为 10^{-3}$ 的标准表面代码模型，我们的结果表明，使用 226k 物理量子位，可以在大约 24 小时内估算出双量子点中四个电子的基态能量，或者使用 314k 量子位，在 3.4 天内估算出八电子系统的基态能量（当有更多量子位可用时，运行时间会急剧下降）。\n\n我们预计，结合包括密集表面代码架构（Low 等人 arXiv:2605.30455）在内的最新进展可能会进一步显着降低这些成本。我们的结论是，早期的容错计算机可能被证明是设计成熟时代量子技术的宝贵工具。", "authors": [{"name": "Zhu Sun"}, {"name": "Christian Binder"}, {"name": "Balint Koczor"}, {"name": "Simon Benjamin"}], "featured_authors": [{"name": "Zhu Sun"}, {"name": "Christian Binder"}, {"name": "Balint Koczor"}, {"name": "Simon Benjamin"}], "author_count": 4}, {"id": "2606.06452", "category": "quant-ph", "title": "Energy-Modulated Time-Asymmetric Spontaneous Collapse: Forward-Backward Dynamics from Stochastic Ito Reversal and Bright Solitons", "abstract": "We present a rigorous theoretical framework for symmetry breaking and quantum irreversibility arising from stochastic Ito field reversal within a cubic-quintic nonlinear Schrodinger equation (CQ-NLSE) formalism. Starting from three physically motivated considerations, forward and backward nonlinear stochastic differential equations are derived via the Ito calculus. Kinematic time-reversal is shown to be fundamentally incompatible with the Ito stochastic structure, yielding the universal asymmetry-coupling parameter of 2/3. An energy-driven collapse operator proportional to the product of noise strength, local probability density, and excitation energy squared is introduced, amplifying the collapse in high-density, high-excitation regions. Exactly bright soliton solutions are obtained for a quasi-one-dimensional BEC of attractive Li-7 atoms, with forward and backward amplitude ratio of 1.870. Heat map analysis of the parameter planes reveals that the forward collapse operator grows monotonically in time while the backward counterpart decays, achieving a ratio approximately 1030, sharply distinguishing this framework from conventional symmetric collapse models.", "url": "https://arxiv.org/abs/2606.06452", "type": "理论", "summary": "我们提出了一个严格的理论框架，用于解决三次五次非线性薛定谔方程（CQ-NLSE）形式中随机伊藤场反转引起的对称破缺和量子不可逆性。从三个物理驱动的考虑出发，通过伊藤微积分导出前向和后向非线性随机微分方程。运动学时间反转被证明与伊藤随机结构根本上不相容，产生 2/3 的通用不对称耦合参数。引入了与噪声强度、局部概率密度和激励能量平方的乘积成正比的能量驱动塌缩算子，放大了高密度、高激励区域的塌缩。对于有吸引力的Li-7原子的准一维BEC，获得了精确明亮的孤子解，其前向和后向振幅比为1.870。参数平面的热图分析表明，前向塌陷算子随时间单调增长，而后向塌陷算子则随时间衰减，达到约 1030 的比率，使该框架与传统的对称塌陷模型截然不同。", "authors": [{"name": "Ikechukwu C. Okoro"}, {"name": "Mike O. Osiele"}, {"name": "Godfrey E. Akpojotor"}], "featured_authors": [{"name": "Ikechukwu C. Okoro"}, {"name": "Mike O. Osiele"}, {"name": "Godfrey E. Akpojotor"}], "author_count": 3}, {"id": "2606.06456", "category": "quant-ph", "title": "Quantum element-wise transforms", "abstract": "Quantum algorithms for basic numerical linear algebraic tasks have proven essential for translating diverse problems to a unified quantum computational context. Many of these tasks -- e.g., applying a polynomial function to the spectrum of a matrix embedded in a unitary process (a so-called block encoding), or taking linear combinations of block encodings -- are well-addressed by techniques like quantum singular value transformation (QSVT) or linear combination of unitaries (LCU). However, there exist useful matrix transforms whose realization by existing quantum algorithms is unclear or inefficient. In this work we construct improved quantum algorithms for some of these transforms, the simplest of which is a polynomial function applied element-wise. We show the space required to compute quantum element-wise transforms can be reduced exponentially in the degree of the applied function compared to prior work, and raise and rectify errors in previous constructions. We present our algorithms alongside applications to machine learning, simulation, and signal processing.", "url": "https://arxiv.org/abs/2606.06456", "type": "数值", "summary": "事实证明，用于基本数值线性代数任务的量子算法对于将不同问题转化为统一的量子计算环境至关重要。其中许多任务——例如，将多项式函数应用于嵌入酉过程中的矩阵谱（所谓的块编码），或者采用块编码的线性组合——可以通过量子奇异值变换（QSVT）或酉线性组合（LCU）等技术很好地解决。然而，存在有用的矩阵变换，其通过现有量子算法的实现不清楚或效率低下。在这项工作中，我们为其中一些变换构建了改进的量子算法，其中最简单的是逐元素应用的多项式函数。我们证明，与之前的工作相比，计算量子逐元素变换所需的空间可以在应用函数的程度上呈指数级减少，并提出并纠正之前构造中的错误。我们展示我们的算法以及机器学习、模拟和信号处理的应用。", "authors": [{"name": "Zane M. Rossi"}, {"name": "Rahul Sarkar"}], "featured_authors": [{"name": "Zane M. Rossi"}, {"name": "Rahul Sarkar"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
