  <style>
    :root {

    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }

    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }

  <script>
    const papers = [{"id": "2606.05210", "category": "cond-mat", "title": "Superconducting Triple Point in UTe$_2$: Thermodynamics and Symmetry", "abstract": "Three lines of second-order phase transitions between the normal phase and two distinct superconducting phases meet at a single point on the phase diagram of UTe$_2$. Contrary to common belief, there are no thermodynamic constraints for such triple points. The phase diagram is interpreted within Landau theory in terms of two superconducting order parameters with different gauge symmetries. Such an interpretation is unique under the assumption of spatial uniformity.", "url": "https://arxiv.org/abs/2606.05210", "type": "理论+数值", "summary": "正常相和两个不同超导相之间的三条二阶相变线在 UTe$_2$ 相图上的单个点处相遇。与普遍看法相反，这种三相点不存在热力学约束。相图在朗道理论中用具有不同规范对称性的两个超导有序参数来解释。在空间均匀性的假设下，这种解释是独特的。", "authors": [{"name": "L.A.Melnikovsky"}], "featured_authors": [{"name": "L.A.Melnikovsky"}], "author_count": 1}, {"id": "2606.05231", "category": "cond-mat", "title": "Nambu Nonequilibrium Thermodynamics and the Lyapunov Structure of Open Systems", "abstract": "In open nonequilibrium systems, the thermodynamic entropy of a subsystem is not generally a Lyapunov function. Even during relaxation toward equilibrium, it may decrease temporarily because of exchanges with external reservoirs. This raises a basic question: what thermodynamic quantity, if any, organizes irreversible relaxation in an open system? We address this question using an explicit open-piston model coupled to both a pressure reservoir and a heat bath. The reversible sector is formulated as a Nambu rotational flow generated by the extended energy and the subsystem entropy, while the irreversible sector is written as a gradient flow generated by a dissipation potential $S_{NB}$. In the adiabatic reversible limit, the Nambu bracket produces the oscillatory piston motion on the intersection of conserved level surfaces. After coupling to a heat bath and adding friction, the subsystem entropy $S$ can exhibit nonmonotonic oscillations, whereas $S_{NB}=S-H_{1}/T_{b}$ increases monotonically under the proposed positive-semidefinite dissipative structure. We show that this monotonicity is not a consequence of identifying $S_{NB}$ with thermodynamic entropy. Rather, it follows from two geometric conditions: the reversible Nambu flow preserves $S_{NB}$, and the irreversible dynamics can be written as a positive-semidefinite gradient flow generated by $S_{NB}$. The open-piston model therefore provides a minimal macroscopic realization in which thermodynamic entropy, dissipation potential, reversible temporal order, and irreversible relaxation can be separated explicitly.", "url": "https://arxiv.org/abs/2606.05231", "type": "理论", "summary": "在开放非平衡系统中，子系统的热力学熵通常不是李亚普诺夫函数。即使在趋于平衡的松弛过程中，由于与外部储存库的交换，它也可能暂时减少。这就提出了一个基本问题：什么热力学量（如果有的话）在开放系统中组织不可逆弛豫？我们使用与压力容器和热浴耦合的显式开式活塞模型来解决这个问题。可逆扇区被表述为由扩展能量和子系统熵生成的南部旋转流，而不可逆扇区被写为由耗散势$S_{NB}$生成的梯度流。在绝热可逆极限下，Nambu 支架在守恒水平面的相交处产生振荡活塞运动。耦合到热浴并增加摩擦后，子系统熵 $S$ 可以表现出非单调振荡，而 $S_{NB}=S-H_{1}/T_{b}$ 在所提出的正半定耗散结构下单调增加。我们证明这种单调性并不是用热力学熵来识别 $S_{NB}$ 的结果。\n\n相反，它遵循两个几何条件：可逆南部流保留 $S_{NB}$，不可逆动力学可以写为由 $S_{NB}$ 生成的正半定梯度流。因此，开式活塞模型提供了最小的宏观实现，其中热力学熵、耗散势、可逆时间顺序和不可逆弛豫可以明确分离。", "authors": [{"name": "So Katagiri"}], "featured_authors": [{"name": "So Katagiri"}], "author_count": 1}, {"id": "2606.05293", "category": "cond-mat", "title": "Breakdown of Thermalization from Real-Time Dynamics in the Two-Dimensional Hubbard Model", "abstract": "Thermalization in strongly correlated fermionic systems remains a central open problem in quantum many-body physics. In this work, we investigate the real-time dynamics and the approach to thermalization in the two-dimensional Hubbard model, a paradigmatic framework for correlated electrons, relevant to high-temperature superconductivity and ultracold quantum simulation. Focusing on the half-filled square lattice, we monitor the time evolution of the double occupancy following a quench in the on-site interaction $U$, and assess whether its long-time value is captured by a canonical thermal ensemble. We employ time-dependent variational Monte Carlo methods combined with transformer-based Neural-Network Quantum States to accurately describe the nonequilibrium dynamics of fermions, especially for the behavior at long times, thereby accessing regimes that were previously inaccessible to numerical simulations. Our results reveal two distinct dynamical behaviors: for weak to intermediate interactions, the long-time double occupancy agrees with the thermal prediction, consistent with ergodic relaxation; beyond a critical interaction $U_{C}$, the dynamics deviate markedly from the thermal expectation, revealing clear signatures of thermalization breaking. These results establish numerical simulation as a powerful tool to probe nonequilibrium quantum phenomena in correlated fermionic matter.", "url": "https://arxiv.org/abs/2606.05293", "type": "理论+数值", "summary": "强相关费米子系统中的热化仍然是量子多体物理学中的一个核心开放问题。在这项工作中，我们研究了二维哈伯德模型中的实时动力学和热化方法，该模型是相关电子的范式框架，与高温超导和超冷量子模拟相关。着眼于半填充的方形晶格，我们监测了现场交互 $U$ 中猝灭后双人占用的时间演变，并评估其长期值是否被规范热系综捕获。我们采用与时间相关的变分蒙特卡洛方法与基于变压器的神经网络量子态相结合来准确描述费米子的非平衡动力学，特别是对于长时间的行为，从而获得以前无法通过数值模拟获得的状态。\n\n我们的结果揭示了两种不同的动力学行为：对于弱到中等的相互作用，长时间的双重占据与热预测一致，与遍历松弛一致；除了关键相互作用 $U_{C}$ 之外，动力学明显偏离热预期，揭示了热化破坏的清晰特征。这些结果使数值模拟成为探测相关费米子物质中非平衡量子现象的有力工具。", "authors": [{"name": "Alessandro Sinibaldi"}, {"name": "Luciano Loris Viteritti"}, {"name": "Riccardo Rende"}, {"name": "Fakher F. Assaad"}, {"name": "Giuseppe Carleo"}], "featured_authors": [{"name": "Alessandro Sinibaldi"}, {"name": "Luciano Loris Viteritti"}, {"name": "Riccardo Rende"}, {"name": "Fakher F. Assaad"}, {"name": "Giuseppe Carleo"}], "author_count": 5}, {"id": "2606.05302", "category": "cond-mat", "title": "Magnetochiral anisotropy in strained superconducting transition metal dichalcogenides", "abstract": "We present a theoretical study of nonreciprocal charge transport in two-dimensional noncentrosymmetric superconductors, focusing on transition-metal dichalcogenide MoS$_2$ as a representative example. In the normal state, the electrical response of a material to the relative orientation of the current and magnetic field is suppressed to leading order in the symmetry-breaking perturbations. In the vicinity of the superconducting transition, magnetochiral anisotropy is strongly enhanced. We consider contributions to the nonreciprocal current originating from order-parameter fluctuations and quantum-interference processes. These terms are linked to higher-order Lifshitz invariants generically allowed in the Ginzburg-Landau free energy of superconductors with broken inversion and time-reversal symmetries. We further show that strain enables additional vector components in the nonlinear current response.", "url": "https://arxiv.org/abs/2606.05302", "type": "理论", "summary": "我们提出了二维非中心对称超导体中非互易电荷输运的理论研究，重点以过渡金属二硫属化物MoS$_2$为代表。在正常状态下，材料对电流和磁场相对方向的电响应被抑制到对称破缺扰动的前导阶。在超导转变附近，磁手性各向异性强烈增强。我们考虑源自有序参数涨落和量子干涉过程的不可逆电流的贡献。这些术语与高阶 Lifshitz 不变量相关，这些不变量通常在具有破缺反转和时间反转对称性的超导体的 Ginzburg-Landau 自由能中被允许。我们进一步表明，应变可以在非线性电流响应中产生额外的矢量分量。", "authors": [{"name": "Joaquim Telles de Miranda"}, {"name": "Maxim Khodas"}, {"name": "Alex Levchenko"}], "featured_authors": [{"name": "Joaquim Telles de Miranda"}, {"name": "Maxim Khodas"}, {"name": "Alex Levchenko"}], "author_count": 3}, {"id": "2606.05325", "category": "cond-mat", "title": "Hydrogen-induced lattice cohesion weakening favors atomic displacement", "abstract": "Atomic displacement -- the fundamental process underlying diverse deformation and damage phenomena in metals, from irradiation defect production to stress-driven dislocation motion -- is governed by interatomic cohesion strength. Here, lattice-dissolved hydrogen (LDH) occurring in metals under direct hydrogen exposure is identified to effectively weaken lattice cohesion, and thereby facilitating atomic displacement and dislocation movement upon plastic deformation in sub-threshold stress regime. This atomic-scale insight provides a physically transparent mechanism for hydrogen-enhanced localized plasticity implicated in hydrogen embrittlement. We quantitatively verify the hydrogen-induced lattice cohesion weakening effect on metal surfaces exposed to low-energy hydrogen plasma, where massive defects are generated despite the absence of sufficient ion momentum for direct displacement damage. By unprecedentedly quantifying the cohesion-weakening effect of LDH independently from defect-trapped H, we establish a new paradigm to understand hydrogen embrittlement.", "url": "https://arxiv.org/abs/2606.05325", "type": "数值", "summary": "原子位移——金属中各种变形和损伤现象的基本过程，从辐照缺陷的产生到应力驱动的位错运动——由原子间的内聚强度控制。在这里，在直接氢暴露下金属中发生的晶格溶解氢（LDH）被认为可以有效削弱晶格内聚力，从而促进亚阈值应力状态下塑性变形时的原子位移和位错运动。这种原子尺度的见解为与氢脆相关的氢增强局部塑性提供了物理透明的机制。我们定量验证了氢诱导的晶格内聚力弱化对暴露于低能氢等离子体的金属表面的影响，尽管缺乏足够的离子动量来直接位移损伤，但仍会产生大量缺陷。通过前所未有地量化LDH的内聚力减弱效应，独立于缺陷捕获的H，我们建立了一个新的范式来理解氢脆。", "authors": [{"name": "Liang Gao"}, {"name": "Yiran Mao"}, {"name": "Markus Wilde"}, {"name": "Xiaoou Yi"}, {"name": "Cong Li"}, {"name": "Shiwei Wang"}, {"name": "Thomas Schwarz-Selinger"}, {"name": "Jan Coenen"}, {"name": "Richard Kembleton"}, {"name": "Sebastijan Brezinsek"}, {"name": "Christian Linsmeier"}, {"name": "Guanghong Lu"}], "featured_authors": [{"name": "Liang Gao"}, {"name": "Yiran Mao"}, {"name": "Markus Wilde"}, {"name": "Sebastijan Brezinsek"}, {"name": "Christian Linsmeier"}, {"name": "Guanghong Lu"}], "author_count": 12}, {"id": "2606.05349", "category": "cond-mat", "title": "Opinion dynamics on social proximity disordered networks", "abstract": "Understanding how local social pressure shapes collective opinion formation is essential in modern society, with implications in sociology, politics, finance, and technology. Complex networks are a powerful framework for investigating these processes and for representing social interactions in emergent phenomena, and canonical models such as random, scale-free, and small-world networks remain most relevant when Euclidean geometric proximity and contiguous interactions are not the dominant organizing factors. Our investigation explores the effects of Gabriel graphs, a spatially embedded network that utilizes proximity-based interactions, on social opinion dynamics. Using a geometric disorder parameter that randomly displaces agent coordinates, we transition from square lattices of social interactions to spatial random networks that preserve local constraints while introducing strong topological heterogeneity. Opinion dynamics operate through social pressure, with a level of nonconformity that affects dissent among opinions. We analyze magnetization, susceptibility, and Binder's fourth-order cumulant to characterize the emergence and breakdown of global social consensus. The model exhibits second-order phase transitions whose behavior depends on both geometric disorder and nonconformity levels. We use volumetric scaling and provide a reference frame appropriate for characterizing criticality in regular and heterogeneous interaction topologies. We find that the standard critical exponents remain compatible with the two-dimensional Ising universality class. Furthermore, the results suggest that spatially constrained, planar, and globally connected interaction topologies preserve the dimensionality of space in critical dynamics analysis.", "url": "https://arxiv.org/abs/2606.05349", "type": "理论", "summary": "了解当地社会压力如何影响集体意见的形成对于现代社会至关重要，这对社会学、政治、金融和技术都有影响。复杂网络是研究这些过程和表示新兴现象中的社会互动的强大框架，当欧几里得几何接近性和连续相互作用不是主导组织因素时，随机、无标度和小世界网络等规范模型仍然最相关。我们的研究探讨了加布里埃尔图（一种利用基于邻近度的交互的空间嵌入式网络）对社会舆论动态的影响。使用随机置换代理坐标的几何无序参数，我们从社交互动的方格转变为空间随机网络，该网络保留局部约束，同时引入强拓扑异质性。舆论动态通过社会压力发挥作用，不同程度的不一致会影响意见之间的异议。我们分析磁化强度、磁化率和宾德四阶累积量来表征全球社会共识的出现和崩溃。\n\n该模型表现出二阶相变，其行为取决于几何无序和不合格水平。我们使用体积缩放并提供适合表征常规和异构交互拓扑中的关键性的参考框架。我们发现标准临界指数仍然与二维伊辛普适性类兼容。此外，结果表明，空间受限、平面和全局连接的交互拓扑在临界动力学分析中保留了空间的维度。", "authors": [{"name": "Fellipe Aranha"}, {"name": "Giuliano G. Porciúncula"}, {"name": "Adauto J. F. de Souza"}, {"name": "Paulo R. A. Campos"}, {"name": "André L. M. Vilela"}], "featured_authors": [{"name": "Fellipe Aranha"}, {"name": "Giuliano G. Porciúncula"}, {"name": "Adauto J. F. de Souza"}, {"name": "Paulo R. A. Campos"}, {"name": "André L. M. Vilela"}], "author_count": 5}, {"id": "2606.05502", "category": "cond-mat", "title": "Complexity of the Laughlin wave function from the Dyson-orbital perspective", "abstract": "The Fermi sea is a simple and common concept in physics. However, a related and equally simple concept -- the Dyson orbital -- is far less discussed in physics, especially in textbooks. Yet, Dyson orbitals offer a valuable tool for characterizing the complexity of a fermionic wave functions, particularly in distinguishing between Fermi-sea-like and non-Fermi-sea-like states. As a preliminary application, we examine the Laughlin wave function and find the fortunate fact that the Dyson orbitals can be determined analytically. Further numerical data provides \\emph{quantitative} evidence that the Laughlin wave function describes a strongly correlated, non-Fermi liquid state.", "url": "https://arxiv.org/abs/2606.05502", "type": "数值", "summary": "费米海是物理学中一个简单而常见的概念。然而，一个相关且同样简单的概念——戴森轨道——在物理学中的讨论要少得多，尤其是在教科书中。然而，戴森轨道为表征费米波函数的复杂性提供了一个有价值的工具，特别是在区分费米海状和非费米海状状态方面。作为初步应用，我们研究了劳克林波函数，并发现了一个幸运的事实：戴森轨道可以通过分析确定。进一步的数值数据提供了 \\emph{定量} 证据，证明劳克林波函数描述了强相关的非费米液态。", "authors": [{"name": "J. M. Zhang"}, {"name": "Y. Liu"}], "featured_authors": [{"name": "J. M. Zhang"}, {"name": "Y. Liu"}], "author_count": 2}, {"id": "2606.05746", "category": "cond-mat", "title": "Majorana-like fermion physics: Emergence of topologically protected vortical states in graphene interacting with an electromagnetic field", "abstract": "Within the framework of a quasi-relativistic model of graphene that admits topologically nontrivial Majorana-like quasiparticle excitations, appearance of such vortex states in the frequency dependencies of the complex dielectric permittivity of the system subjected to an external electromagnetic field has been examined. The vortex graphene states possess topological charges (flavours ) being nonzero Zak phases. Interaction effects of Majorana-like modes have been qualitatively related to the formation of Fano resonances in the optical response. The constructed topological model of graphene may be considered as a toy model of three-flavour mass-neutrino oscillations.", "url": "https://arxiv.org/abs/2606.05746", "type": "理论", "summary": "在石墨烯准相对论模型的框架内，该模型允许拓扑上非平凡的类马约拉纳准粒子激发，在受到外部电磁场影响的系统的复介电常数的频率依赖性中，这种涡旋态的出现已经得到了检验。涡旋石墨烯态具有非零 Zak 相的拓扑电荷（味道 ）。类马约拉纳模式的相互作用效应与光学响应中法诺共振的形成定性相关。所构建的石墨烯拓扑模型可以被视为三味质量中微子振荡的玩具模型。", "authors": [{"name": "H. V. Grushevskaya"}, {"name": "George Krylov"}], "featured_authors": [{"name": "H. V. Grushevskaya"}, {"name": "George Krylov"}], "author_count": 2}, {"id": "2606.05803", "category": "cond-mat", "title": "Strong Optical-Optical Avoided Crossings Suppress Thermal Conductivity in Ga-Substituted TlInTe$_2$", "abstract": "In crystalline solids, avoided crossing between acoustic and optical phonons is widely recognized as an effective mechanism for suppressing lattice thermal conductivity ($\\kappa_l$). However, the role of avoided crossings among optical phonons remains largely unexplored due to their weak contribution to heat transport. Here, using first-principles calculations combined with the linearized Wigner transport equation (LWTE), we demonstrate that optical-optical avoided crossings can effectively reduce ($\\kappa_l$) in TlIn$_{0.5}$Ga$_{0.5}$Te$_2$. Pristine TlInTe$_2$ exhibits strong optical phonon-dominated heat transport, where optical phonons contribute nearly 63% of $\\kappa_l$. The phonon dispersion of TlInTe$_2$ shows several crossing points in the optical region, which evolve into avoided crossings after 50% Ga substitution. Irreducible representation analysis reveals that the crossing phonon branches in TlInTe$_2$ belong to different symmetry representations, whereas the corresponding branches in TlIn$_{0.5}$Ga$_{0.5}$Te$_2$ possess the same symmetry representation, which enables phonon modes to couple and results in gap opening at the crossing points. These avoided crossings significantly suppress the optical phonon group velocity, thereby reducing the optical phonon contribution from 63% to 44% and lowering $\\kappa_l$ from 0.568 to 0.482 Wm$^{-1}$K$^{-1}$ at 300 K. Mode-averaged transport analysis further confirms that the suppression of $\\kappa_l$ is primarily governed by reduced phonon group velocity ($v_g$), while enhanced anharmonic scattering provides an additional secondary contribution. Our results establish symmetry-modified optical-optical avoided crossing as an effective route to suppress optical phonon transport and reduce $\\kappa_l$ in systems where optical phonons significantly contribute to heat transport.", "url": "https://arxiv.org/abs/2606.05803", "type": "理论+数值", "summary": "在晶体固体中，避免声学和光学声子之间的交叉被广泛认为是抑制晶格热导率的有效机制（$\\kappa_l$）。然而，由于光学声子对热传输的贡献较弱，避免光学声子之间的交叉的作用在很大程度上仍未被探索。在这里，使用第一原理计算结合线性维格纳输运方程（LWTE），我们证明了光学避免交叉可以有效减少 TlIn$_{0.5}$Ga$_{0.5}$Te$_2$ 中的 ($\\kappa_l$)。原始的 TlInTe$_2$ 表现出强大的光学声子主导的热传输，其中光学声子贡献了 $\\kappa_l$ 的近 63%。 TlInTe$_2$的声子色散显示出光学区域中的几个交叉点，这些交叉点在50% Ga取代后演变成避免交叉。不可约表示分析表明，TlInTe$_2$中的交叉声子分支属于不同的对称表示，而TlIn$_{0.5}$Ga$_{0.5}$Te$_2$中的相应分支具有相同的对称表示，这使得声子模式能够耦合并导致交叉点处的能隙打开。\n\n这些避免的交叉显着抑制了光学声子群速度，从而将光学声子贡献从 63% 降低到 44%，并将 $\\kappa_l$ 在 300 K 时从 0.568 Wm$^{-1}$K$^{-1}$ 降低到 0.482 Wm$^{-1}$K$^{-1}$。模平均输运分析进一步证实，$\\kappa_l$ 的抑制主要是由降低的声子群速度决定的($v_g$)，而增强的非谐波散射提供了额外的二次贡献。我们的结果表明，对称修改的光学-光学避免交叉是抑制光学声子传输并减少光学声子对热传输有显着贡献的系统中的 $\\kappa_l$ 的有效途径。", "authors": [{"name": "Sayan Paul"}, {"name": "Swapan K Pati"}], "featured_authors": [{"name": "Sayan Paul"}, {"name": "Swapan K Pati"}], "author_count": 2}, {"id": "2606.05822", "category": "cond-mat", "title": "Study on the validity of IPT+parquet method as an impurity solver in DMFT focusing on orbital fluctuations", "abstract": "A breakdown of calculations with exact impurity solvers in the dynamical mean field theory in multiband systems easily occurs due to the expensive numerical cost. To overcome this practical difficulty, three of the present authors developed an inexpensive and reliable impurity solver by combining the iterative perturbation theory (IPT) and parquet equation, and named it IPT+parquet [R. Mizuno, et al., Phys. Rev. B 104, 035160 (2021).]. In this study, we validate IPT+parquet focusing on the orbital fluctuation by comparing the numerically exact impurity solvers. We confirm that IPT+parquet can capture competition between orbital fluctuation channels, which the conventional IPT cannot capture.", "url": "https://arxiv.org/abs/2606.05822", "type": "理论+数值", "summary": "由于昂贵的数值成本，多带系统动态平均场理论中的精确杂质求解器的计算很容易出现故障。为了克服这个实际困难，三位作者通过结合迭代微扰理论（IPT）和 parquet 方程开发了一种廉价且可靠的杂质求解器，并将其命名为 IPT+parquet [R. Mizuno 等人，物理学。修订版 B 104, 035160 (2021).]。在本研究中，我们通过比较数值精确的杂质求解器来验证 IPT+parquet，重点关注轨道涨落。我们证实IPT+parquet可以捕获轨道涨落通道之间的竞争，这是传统IPT无法捕获的。", "authors": [{"name": "Aira Yamada"}, {"name": "Ryota Mizuno"}, {"name": "Masayuki Ochi"}, {"name": "Kazuhiko Kuroki"}, {"name": "Takuma Ohashi"}], "featured_authors": [{"name": "Aira Yamada"}, {"name": "Ryota Mizuno"}, {"name": "Masayuki Ochi"}, {"name": "Kazuhiko Kuroki"}, {"name": "Takuma Ohashi"}], "author_count": 5}, {"id": "2606.05837", "category": "cond-mat", "title": "Odd-parity magnons in the Haldane-Hubbard model from topological exciton condensation", "abstract": "Odd-wave magnets are the counterparts to even-wave altermagnets realizing odd-parity spin splitting. Normally discussed for noncollinear systems, they have recently been shown to appear in collinear magnetic states in the presence of loop currents. Here we study collective excitations of the paramagnetic and magnetic phase of the seminal Haldane-Hubbard model. We identify the existence topological excitons in the paramagnetic phase, and their condensation as the driving mechanism into the collinear Néel state. The latter realizes an odd-wave magnet with odd-parity magnons displaying a characteristic $f$-wave splitting. We further uncover that an electron bandgap closing ensures magnon bandgap closing causing a change in odd-parity magnon topology, as well as a drastically enlarged spin splitting. Our results establish the presence of topological excitons and odd-parity magnons in the Haldane-Hubbard, with potential realizations in Floquet-driven materials and cold atomic gases.", "url": "https://arxiv.org/abs/2606.05837", "type": "理论", "summary": "奇数波磁体是偶数波交流磁体的对应物，可实现奇宇称自旋分裂。通常讨论非共线系统，但最近研究表明，在存在环路电流的情况下，它们会出现共线磁态。在这里，我们研究开创性霍尔丹-哈伯德模型的顺磁相和磁相的集体激发。我们确定了顺磁相中拓扑激子的存在，以及它们的凝聚作为共线尼尔态的驱动机制。后者实现了具有奇宇称磁振子的奇波磁体，显示出特征$f$波分裂。我们进一步发现，电子带隙闭合确保磁振子带隙闭合，从而导致奇宇称磁振子拓扑结构的变化以及自旋分裂的急剧扩大。我们的结果证实了 Haldane-Hubbard 中拓扑激子和奇宇称磁振子的存在，并有可能在 Floquet 驱动材料和冷原子气体中实现。", "authors": [{"name": "Rintaro Eto"}, {"name": "Johannes Knolle"}], "featured_authors": [{"name": "Rintaro Eto"}, {"name": "Johannes Knolle"}], "author_count": 2}, {"id": "2606.05845", "category": "cond-mat", "title": "Breakdown of Fluctuational Electrodynamics in the Extreme Near Field", "abstract": "Fluctuational electrodynamics relies on the assumption that thermal fluctuations in distinct bodies are statistically independent. We show that this approximation breaks down in the extreme near-field regime, where overlapping evanescent surface fields hybridize optical phonons across nanometric vacuum gaps and generate fluctuating-current cross correlations between opposite interfaces. Using a microscopic coupled-oscillator model combined with a Green-tensor formulation of the Poynting vector, we derive the resulting correlation-induced correction to the radiative heat flux. For polar materials supporting surface phonon-polaritons, these correlations become significant when the hybridization energy is comparable to the intrinsic damping rate and can substantially modify conventional fluctuational-electrodynamics predictions at subnanometric separations. Our results establish a microscopic framework for correlated thermal fluctuations in the extreme near-field regime and quantify their impact on radiative heat transfer.", "url": "https://arxiv.org/abs/2606.05845", "type": "理论", "summary": "波动电动力学依赖于这样的假设：不同物体的热波动在统计上是独立的。我们表明，这种近似在极端近场范围内会崩溃，其中重叠的渐逝表面场在纳米真空间隙上杂化光学声子，并在相对界面之间产生脉动电流互相关。使用微观耦合振荡器模型与坡印廷矢量的格林张量公式相结合，我们得出了对辐射热通量的相关引起的校正。对于支持表面声子极化子的极性材料，当杂化能与固有阻尼率相当时，这些相关性变得很重要，并且可以显着修改亚纳米分离下的传统涨落电动力学预测。我们的结果建立了极端近场区域中相关热波动的微观框架，并量化了它们对辐射传热的影响。", "authors": [{"name": "Philippe Ben-Abdallah"}], "featured_authors": [{"name": "Philippe Ben-Abdallah"}], "author_count": 1}, {"id": "2606.05856", "category": "cond-mat", "title": "Understanding deconfined quantum critical points from crystalline categorical Landau paradigm", "abstract": "Deconfined quantum critical points (DQCPs) involving lattice symmetries evade the conventional Landau paradigm because the competing orders break incompatible internal and crystalline symmetries. We show that a class of DQCPs can nevertheless be understood as Landau-type transitions after gauging anomalous onsite symmetries. For spin chains with Lieb-Schultz-Mattis (LSM) anomalies, gauging produces a noninvertible lattice translation whose fusion closes only up to ordinary translations, giving rise to a crystalline categorical symmetry. In the gauged description, the original DQCP becomes a transition between different symmetry breaking patterns of this categorical symmetry. We demonstrate this mechanism in microscopic lattice models; the magnetic-valence-bond-solid (VBS) DQCP realizes a Rep($D_8$)-type crystalline categorical Landau transition, whereas a y-antiferromagnetic-VBS DQCP realizes a Rep($H_8$)-type one. Although Rep($D_8$) and Rep($H_8$) share the same fusion rules, they have inequivalent $F$-symbols and therefore define distinct categorical descriptions. Our results show that the universal categorical structure underlying these DQCPs is encoded in the full fusion category, rather than in the fusion ring alone.", "url": "https://arxiv.org/abs/2606.05856", "type": "理论", "summary": "涉及晶格对称性的解禁量子临界点（DQCP）避开了传统的朗道范式，因为竞争级数打破了不相容的内部对称性和晶体对称性。我们表明，在测量异常现场对称性后，一类 DQCP 仍然可以被理解为朗道型跃迁。对于具有 Lieb-Schultz-Mattis (LSM) 异常的自旋链，测量会产生不可逆的晶格平移，其融合仅接近普通平移，从而产生晶体分类对称性。在规范描述中，原始 DQCP 成为这种分类对称性的不同对称破缺模式之间的过渡。我们在微观晶格模型中证明了这种机制；磁价键固体 (VBS) DQCP 实现 Rep($D_8$) 型晶体分类朗道跃迁，而 y 反铁磁 VBS DQCP 实现 Rep($H_8$) 型。尽管 Rep($D_8$) 和 Rep($H_8$) 共享相同的融合规则，但它们具有不等价的 $F$ 符号，因此定义了不同的分类描述。\n\n我们的结果表明，这些 DQCP 背后的通用分类结构是在完整融合类别中编码的，而不是单独在融合环中编码。", "authors": [{"name": "Hiromi Ebisu"}, {"name": "Bo Han"}, {"name": "Weiguang Cao"}], "featured_authors": [{"name": "Hiromi Ebisu"}, {"name": "Bo Han"}, {"name": "Weiguang Cao"}], "author_count": 3}, {"id": "2606.05862", "category": "cond-mat", "title": "Aqueous-alcohol mixtures in dimension two: miscibility and micro-segregation", "abstract": "Two dimensional site interaction models of water and alcohols are mixed in various proportions and studied by Monte Carlo simulations, with the purpose to clarify problems related to simulation of real micro-heterogeneous systems. Three alcohols are considered, methanol, pentanol and octanol. The main finding is that, while real alcohols demix with water from butanol onward, their 2D analogs are always fully miscible, while developing increasingly pronounced micro-segregation as the alcohol tail length increases. This is not a consequence of the intrinsically higher fluctuations in 2D, but rather a reorganization of these fluctuations under the charge ordering mechanism. The second finding is that water drives the micro-segregation through strong self-aggregation, but this is not enough to achieve full phase separation because of the water-alcohol contact at the outer rim of the water domains. In this work we examine how this local heterogeneity develops with increasing alcohol alkyl tails, monitored with the study of pair correlation functions, structure factors and Kirkwood-Buff integrals. The absence of clear local self-averaging of the latter provides an illustration of the tension between energy driven maintaining of local structures and entropy driven global homogeneity. In that, the 2D modelisation of real hydrogen bonding mixtures allows to better capture and reveal the physics behind the chemistry of these liquids.", "url": "https://arxiv.org/abs/2606.05862", "type": "理论+数值", "summary": "将水和醇以不同比例混合的二维位点相互作用模型通过蒙特卡罗模拟进行研究，旨在阐明真实微观非均相系统模拟的相关问题。考虑三种醇：甲醇、戊醇和辛醇。主要发现是，虽然真正的醇从丁醇开始就与水分层，但它们的二维类似物始终完全混溶，同时随着醇尾长度的增加，微偏析越来越明显。这并不是二维本质上较高波动的结果，而是这些波动在电荷排序机制下的重组。第二个发现是，水通过强烈的自聚集驱动微分离，但这不足以实现完全相分离，因为水域外缘处存在水-醇接触。在这项工作中，我们研究了这种局部异质性如何随着醇烷基尾部的增加而发展，并通过对相关函数、结构因子和 Kirkwood-Buff 积分的研究进行监测。\n\n后者缺乏明显的局部自平均，说明了能量驱动的局部结构维持与熵驱动的全局同质性之间的紧张关系。因此，真实氢键混合物的二维建模可以更好地捕获和揭示这些液体化学背后的物理原理。", "authors": [{"name": "Camille de la Vaissiere"}, {"name": "Ayse Butuner"}, {"name": "Aurélien Perera"}], "featured_authors": [{"name": "Camille de la Vaissiere"}, {"name": "Ayse Butuner"}, {"name": "Aurélien Perera"}], "author_count": 3}, {"id": "2606.05866", "category": "cond-mat", "title": "Symmetry-Selective Stabilization of Charge-Density Wave in ScV$_6$Sn$_6$", "abstract": "Charge-density-wave (CDW) order in kagome metals is highly sensitive to external tuning parameters such as chemical substitution and hydrostatic pressure, which generally suppress long-range order. Here, using high-resolution X-ray diffraction under controlled uniaxial strain, we show that anisotropic lattice deformation instead stabilizes and enhances the CDW state in ScV$_6$Sn$_6$. Compression along the [H00] and [HH0] directions lowers the crystal symmetry from hexagonal to orthorhombic, lifts the degeneracy between symmetry-equivalent in-plane CDW domains, and promotes long-range order while preserving the underlying trimer instability. Phonon calculations indicate only a moderate stabilization of the imaginary flat phonon mode, demonstrating that the increase in T$_\\mathrm{CDW}$ is primarily driven by the in-plane ordering of the Sn$^\\mathrm{T}$--Sc--Sn$^\\mathrm{T}$ \\textit{rattling} chains within the frustrated kagome lattice. A phenomenological model incorporating strain-dependent Ising couplings within a three-state Potts framework successfully reproduces the evolution of T$_\\mathrm{CDW}$ under compression and captures the continuous nature of the transition. Our results establish uniaxial strain as a powerful symmetry-selective tuning parameter for order-disorder transformations in frustrated lattices.", "url": "https://arxiv.org/abs/2606.05866", "type": "理论+数值", "summary": "kagome 金属中的电荷密度波 (CDW) 有序度对化学取代和静水压力等外部调节参数高度敏感，这些参数通常会抑制长程有序度。在这里，利用受控单轴应变下的高分辨率 X 射线衍射，我们表明各向异性晶格变形反而稳定并增强了 ScV$_6$Sn$_6$ 中的 CDW 态。沿 [H00] 和 [HH0] 方向的压缩降低了晶体对称性，从六方晶系变为斜方晶系，提升了对称等效面内 CDW 域之间的简并性，并促进了长程有序，同时保留了潜在的三聚体不稳定性。声子计算表明，假想平面声子模式只有适度的稳定性，表明 T$_\\mathrm{CDW}$ 的增加主要是由受挫 kagome 晶格内 Sn$^\\mathrm{T}$--Sc--Sn$^\\mathrm{T}$ \\textit{ratttle} 链的面内排序驱动的。在三态 Potts 框架内结合应变相关伊辛耦合的现象学模型成功地再现了压缩下 T$_\\mathrm{CDW}$ 的演化，并捕获了转变的连续性质。\n\n我们的结果将单轴应变确立为受挫晶格中有序无序变换的强大对称选择性调整参数。", "authors": [{"name": "A. Korshunov"}, {"name": "C.-Y. Lim"}, {"name": "J. Corral-Sertal"}, {"name": "G. Garbarino"}, {"name": "D. Chernyshov"}, {"name": "A. Rajapitamahuni"}, {"name": "C. Yi"}, {"name": "S. Roychowdhury"}, {"name": "C. Shekhar"}, {"name": "C. Felser"}, {"name": "V. Pardo"}, {"name": "Ella M. Schmidt"}, {"name": "S. Blanco-Canosa"}], "featured_authors": [{"name": "A. Korshunov"}, {"name": "C.-Y. Lim"}, {"name": "J. Corral-Sertal"}, {"name": "V. Pardo"}, {"name": "Ella M. Schmidt"}, {"name": "S. Blanco-Canosa"}], "author_count": 13}, {"id": "2606.05886", "category": "cond-mat", "title": "Polylogarithmic Structure of Bragg Diffraction in Finite-Coherence Lattices", "abstract": "We develop a polylogarithmic structure for Bragg diffraction based on a weighted multi-plane interference model. Within this kind of construction, the scattering amplitude is expressed as a polylogarithmic generating function. By introducing extra contributions with power-law and the usual exponential decay, it takes the form $F(\\theta) = \\mathrm{Li}_m\\left(e^{i\\theta_{\\mathrm{eff}} - \\epsilon}\\right)$, where $\\epsilon$ is a finite coherence length. In the limit where $\\epsilon \\rightarrow 0$, the argument of the polylogarithm approaches the unit circle and the classical Bragg condition corresponds to the approach of the polylogarithm argument toward its branch point $z=1$. This formulation provides a compact analytical framework for describing diffraction line shapes within a generalized correlation model in which peak positions, widths, and line shapes arise from a single analytic structure. Although we are able to recover the standard Bragg law for ideal crystals, the polylogarithm model captures deviations due to finite correlation length, disorder and non-uniform lattice coherence. We show that if Bragg peaks correspond to boundary singularities of the polylogarithm, a connection between diffraction theory and complex analysis arise. The proposed theoretical model may be particularly relevant for disordered or partially coherent materials, where conventional diffraction models often require additional phenomenological broadening assumptions.", "url": "https://arxiv.org/abs/2606.05886", "type": "理论", "summary": "我们基于加权多平面干涉模型开发了布拉格衍射的多对数结构。在这种结构中，散射幅度被表示为多对数生成函数。通过引入幂律和通常的指数衰减的额外贡献，它采用 $F(\\theta) = \\mathrm{Li}_m\\left(e^{i\\theta_{\\mathrm{eff}} - \\epsilon}\\right)$ 的形式，其中 $\\epsilon$ 是有限相干长度。在 $\\epsilon \\rightarrow 0$ 的极限下，多对数的参数逼近单位圆，经典布拉格条件对应于多对数参数逼近其分支点 $z=1$。该公式提供了一个紧凑的分析框架，用于描述广义相关模型内的衍射线形状，其中峰位置、宽度和线形状来自单个分析结构。尽管我们能够恢复理想晶体的标准布拉格定律，但多对数模型会捕获由于有限相关长度、无序和不均匀晶格相干性而导致的偏差。\n\n我们证明，如果布拉格峰对应于多对数的边界奇点，则衍射理论和复分析之间就会产生联系。所提出的理论模型可能与无序或部分相干材料特别相关，其中传统衍射模型通常需要额外的唯象展宽假设。", "authors": [{"name": "Evangelos G. Filothodoros"}], "featured_authors": [{"name": "Evangelos G. Filothodoros"}], "author_count": 1}, {"id": "2606.05974", "category": "cond-mat", "title": "The KNN rollercoaster: from bulk ceramics to phase engineered wafer-scale thin films", "abstract": "Since the initial disclosure of the extraordinary piezoelectric coefficients of Potassium sodium niobate (KNN) in near-equimolar bulk ceramics, its development trajectory has resembled a rollercoaster, with its integration into microelectronics severely lagging due to thermodynamic stability issues and poor planar process compatibility. In this work, we revisit the bulk-derived phase diagram for the specific case of thin films integrated on silicon. By systematically investigating Mn-doped K1-xNaxNbO3 films grown on 8-inch wafers, we demonstrate that the optimal stoichiometry for thin films fundamentally diverges from the bulk equimolar standard. A Na-rich composition (> 70 at.%) is required to overcome substrate-induced constraints, effectively suppressing pyrochlore formation and chemical phase segregation while promoting dense columnar growth with a complete (001) out-of-plane polar orientation. Consequently, Na-rich films deliver outstanding functional properties, reaching remanent polarizations up to 14 uC cm-2, with piezoelectric coefficients of d33f= 79 pm/V and e31f = 10 C/m2. Supported by Density Functional Theory simulations, we correlate this enhancement with improved stability and a strain-driven structural reorientation toward a lower-symmetry monoclinic phase with tilted polarization. By redefining the phase engineering rules for wafer-scale thin films, our results establish a clear route toward KNN integration in microsystems.", "url": "https://arxiv.org/abs/2606.05974", "type": "理论+数值", "summary": "自从首次披露铌酸钾钠（KNN）在近等摩尔块体陶瓷中的非凡压电系数以来，其发展轨迹就像过山车一样，由于热力学稳定性问题和平面工艺兼容性差，其在微电子领域的集成严重滞后。在这项工作中，我们重新审视了硅上集成薄膜的具体情况的体相图。通过系统地研究在 8 英寸晶圆上生长的 Mn 掺杂 K1-xNaxNbO3 薄膜，我们证明薄膜的最佳化学计量从根本上偏离了本体等摩尔标准。需要富含钠的成分（> 70 at.%）来克服基质引起的限制，有效抑制烧绿石的形成和化学相偏析，同时促进具有完全（001）面外极性取向的致密柱状生长。因此，富钠薄膜具有出色的功能特性，剩余极化高达 14 uC cm-2，压电系数为 d33f= 79 pm/V 和 e31f = 10 C/m2。\n\n在密度泛函理论模拟的支持下，我们将这种增强与稳定性的提高以及应变驱动的结构重新定向到具有倾斜偏振的低对称性单斜晶相相关联。通过重新定义晶圆级薄膜的相工程规则，我们的结果为微系统中的 KNN 集成建立了一条清晰的路线。", "authors": [{"name": "Giulia Pavese"}, {"name": "Federico Orlando"}, {"name": "Fabio Melzi"}, {"name": "Walter Piazzi"}, {"name": "Andrea Pescarolo"}, {"name": "Federico Maspero"}, {"name": "Marco Asa"}, {"name": "Riccardo Gianola"}, {"name": "Andrea Picco"}, {"name": "Andrea Serafini"}, {"name": "Kui Yao"}, {"name": "Silvia Picozzi"}, {"name": "Laura Castoldi"}, {"name": "Miguel-Ángel Badillo-Ávila"}, {"name": "Riccardo Bertacco"}], "featured_authors": [{"name": "Giulia Pavese"}, {"name": "Federico Orlando"}, {"name": "Fabio Melzi"}, {"name": "Laura Castoldi"}, {"name": "Miguel-Ángel Badillo-Ávila"}, {"name": "Riccardo Bertacco"}], "author_count": 15}, {"id": "2606.06001", "category": "cond-mat", "title": "Resolving room temperature microscale fracture and plasticity of iron oxides along the cascade of iron ore reduction via nanoindentation and microcantilever bending", "abstract": "Understanding the fundamental mechanical behaviour of iron oxide phases is essential for controlling attrition and fracture during iron ore reduction process, particularly in hydrogen-based direct reduction systems. This study investigates the room temperature plasticity and fracture behaviour of single-crystal hematite, magnetite, and Wustite using nanoindentation and micro-cantilever fracture testing. Hematite exhibited the highest hardness, H and elastic modulus, E (H=18.5 GPa, E=281 GPa), followed by magnetite (H=8.7 GPa, E=165 GPa) and Wustite (H=7.5 GPa, E=145 GPa), reflecting differences in slip activity along the iron oxide reduction sequence. Furthermore, fracture toughness was measured using notched microcantilevers for all three iron oxide phases, aligned along low index and high index crystallographic planes, respectively. For the low index-oriented case hematite showed increased fracture toughness owing to crack deviation and faceting while magnetite and Wustite exhibited single plane cleavage fracture. Distinct changes in the deformation behavior in terms of plasticity and cracking of the three iron oxides were evident from both methods. Further investigation of a magnetite-gangue interface, particularly relevant to low-concentration ores, revealed significantly reduced fracture toughness compared to the magnetite phase. Overall, these results provide a comprehensive set of mechanical properties of iron oxides with potential application in material models for predicting fracture and attrition during hydrogen-based direct reduction.", "url": "https://arxiv.org/abs/2606.06001", "type": "理论", "summary": "了解氧化铁相的基本机械行为对于控制铁矿石还原过程中的磨损和断裂至关重要，特别是在氢基直接还原系统中。本研究利用纳米压痕和微悬臂梁断裂测试研究了单晶赤铁矿、磁铁矿和维铁矿的室温塑性和断裂行为。赤铁矿表现出最高的硬度、H 和弹性模量 E（H=18.5 GPa，E=281 GPa），其次是磁铁矿（H=8.7 GPa，E=165 GPa）和维铁矿（H=7.5 GPa，E=145 GPa），反映了沿氧化铁还原顺序滑移活性的差异。此外，使用缺口微悬臂梁测量了所有三个氧化铁相的断裂韧性，分别沿着低折射率和高折射率晶面排列。对于低折射率取向的情况，赤铁矿由于裂纹偏差和刻面而表现出断裂韧性增加，而磁铁矿和维铁矿表现出单平面解理断裂。两种方法都可以明显看出三种氧化铁的塑性和开裂变形行为的明显变化。\n\n对磁铁矿-脉石界面的进一步研究，特别是与低浓度矿石相关的研究，表明与磁铁矿相相比，断裂韧性显着降低。总的来说，这些结果提供了氧化铁的一套全面的机械性能，在材料模型中具有潜在的应用价值，用于预测氢基直接还原过程中的断裂和磨损。", "authors": [{"name": "Shreehard Sahu"}, {"name": "James P. Best"}, {"name": "Gerhard Dehm"}, {"name": "Anwesha Kanjilal"}], "featured_authors": [{"name": "Shreehard Sahu"}, {"name": "James P. Best"}, {"name": "Gerhard Dehm"}, {"name": "Anwesha Kanjilal"}], "author_count": 4}, {"id": "2606.06017", "category": "cond-mat", "title": "Superconductivity beyond band geometry: emergence of pair quantum geometry", "abstract": "Quantum geometry shapes the effective mass of Bloch particles through the geometric properties of single-particle states. Here we show that this principle extends to paired states. Starting from a generic multiband Hubbard model, we derive an exact effective-mass theorem for two-body bound states and its many-body counterpart for Cooper pairs near the critical temperature within Gaussian fluctuation theory. In both cases, the inverse effective mass separates into a ``conventional'' band-structure contribution and a new geometric contribution, pair quantum geometry, governed by quantum metrics on the pairing manifold, which becomes nontrivial when pairing is non-uniform across sublattices. In the many-body setting, analytic continuation renders the fluctuation kernel non-Hermitian, producing a biorthogonal pair geometry and a generally complex Cooper-pair effective mass whose imaginary part reflects Landau damping. Exact calculations on one-, two-, and three-dimensional lattice models show that pair quantum geometry can make quantitatively significant contributions to the effective mass. These results establish pair quantum geometry as a fundamental ingredient of superconductivity beyond conventional band geometry.", "url": "https://arxiv.org/abs/2606.06017", "type": "理论+数值", "summary": "量子几何通过单粒子态的几何特性来塑造布洛赫粒子的有效质量。在这里，我们证明这一原理可以扩展到配对状态。从通用的多带哈伯德模型开始，我们推导了高斯涨落理论中临界温度附近的二体束缚态及其多体对应物的精确有效质量定理。在这两种情况下，逆有效质量都分为“传统”能带结构贡献和新的几何贡献，即配对量子几何，由配对流形上的量子度量控制，当子晶格中的配对不均匀时，配对量子几何就变得很重要。在多体环境中，解析延拓使涨落核变得非厄米特，产生双正交对几何形状和一般复杂的库珀对有效质量，其虚部反映朗道阻尼。对一维、二维和三维晶格模型的精确计算表明，对量子几何结构可以对有效质量做出定量的显着贡献。\n\n这些结果确立了对量子几何结构作为超越传统能带几何结构的超导性的基本要素。", "authors": [{"name": "Mehmet Akif Keskiner"}, {"name": "Menderes Işkın"}], "featured_authors": [{"name": "Mehmet Akif Keskiner"}, {"name": "Menderes Işkın"}], "author_count": 2}, {"id": "2606.06111", "category": "cond-mat", "title": "A microscopic design rule for spin supersolids in triangular-lattice magnets", "abstract": "Spin supersolids emerge as a central topic in frustrated magnetism, motivating the search for realization in quantum materials. To this end, we study the origin of exchange anisotropy, $\\Delta$, in triangular-lattice cobaltate families $X_2$$Y$Co(PO$_4$)$_2$ and $X_2$Co(SeO$_3$)$_2$ ($X$ = Na, K, Rb, Cs; $Y$ = Mg, Ca, Sr, Ba) by tailoring realistic spin models. We show that $\\Delta$ is determined by the ratio of trigonal crystal field to spin-orbit coupling strength. This framework explains contrasting anisotropies in these families, predicts systematic trends in $\\Delta$ across $X/Y$-substitutions, and identifies candidate materials for spin supersolids. Our results establish trigonal field engineering as a microscopic route toward the design of spin supersolids.", "url": "https://arxiv.org/abs/2606.06111", "type": "理论", "summary": "自旋超固体成为受挫磁性的中心主题，激发了对量子材料实现的探索。为此，我们通过定制真实的自旋模型，研究三角晶格钴酸盐族 $X_2$$Y$Co(PO$_4$)$_2$ 和 $X_2$Co(SeO$_3$)$_2$ ($X$ = Na, K, Rb, Cs; $Y$ = Mg, Ca, Sr, Ba) 中交换各向异性 $\\Delta$ 的起源。我们证明$\\Delta$是由三角晶体场与自旋轨道耦合强度之比决定的。该框架解释了这些家族中对比各向异性，预测了 $X/Y$ 替代中 $\\Delta$ 的系统趋势，并确定了自旋超固体的候选材料。我们的结果将三角场工程确立为自旋超固体设计的微观途径。", "authors": [{"name": "Ryota Ono"}, {"name": "Jun'ichi Ieda"}, {"name": "Michiyasu Mori"}, {"name": "Sadamichi Maekawa"}], "featured_authors": [{"name": "Ryota Ono"}, {"name": "Jun'ichi Ieda"}, {"name": "Michiyasu Mori"}, {"name": "Sadamichi Maekawa"}], "author_count": 4}, {"id": "2606.06128", "category": "cond-mat", "title": "Ferroelectric brightening of spin forbidden dark excitons in a WSe2/hybrid perovskite heterostructure", "abstract": "Long-lived dark excitons in monolayer WSe2 present promising candidates for carrying spin and valley information, but their optical access and spin manipulation have conventionally required the use of strong external magnetic fields. Here, using a ferroelectric hybrid perovskite heterostructure, we leverage the ferroelectric proximity effect to break the WSe2's in-plane rotational symmetry and brighten the spin-forbidden dark excitons under zero magnetic field conditions. Furthermore, we show that the twist angle between the WSe2 and perovskite crystals controls the ferroelectric coupling strength and valley-contrasting polarization. Our proposed mechanism, supported by a four-band tight-binding model, suggests that the ferroelectric proximity effect induces an asymmetric intersublattice interaction, generating an effective in-plane spin-orbit coupling (SOC) field that rotates spin/valley polarization and brightens dark excitons. Our work establishes ferroelectric proximity coupling as an electrically reconfigurable, magnetic-field-free strategy for spin exciton control in two-dimensional semiconductors.", "url": "https://arxiv.org/abs/2606.06128", "type": "理论", "summary": "单层 WSe2 中的长寿命暗激子是携带自旋和谷信息的有希望的候选者，但它们的光学访问和自旋操纵通常需要使用强外部磁场。在这里，我们使用铁电杂化钙钛矿异质结构，利用铁电邻近效应打破WSe2的面内旋转对称性，并在零磁场条件下照亮自旋禁止的暗激子。此外，我们还表明，WSe2 和钙钛矿晶体之间的扭转角控制着铁电耦合强度和谷对比极化。我们提出的机制得到了四能带紧束缚模型的支持，表明铁电邻近效应会引起不对称的子晶格间相互作用，产生有效的面内自旋轨道耦合（SOC）场，该场可以旋转自旋/谷极化并使暗激子变亮。我们的工作将铁电邻近耦合建立为二维半导体中自旋激子控制的电可重构、无磁场策略。", "authors": [{"name": "Xinyun Wang"}, {"name": "Magdalena Grzeszczyk"}, {"name": "Maxim Trushin"}, {"name": "Ivan Verzhbitskiy"}, {"name": "Dmitrii Litvinov"}, {"name": "Yi Wei Ho"}, {"name": "Yuan Chen"}, {"name": "Zhenyue Wu"}, {"name": "Mykola Telychko"}, {"name": "Chuanqi Zhang"}, {"name": "Andres Granados del Aguila"}, {"name": "Kuan Eng Johnson Goh"}, {"name": "Xinwei Li"}, {"name": "Goki Eda"}, {"name": "Shaffique Adam"}, {"name": "Maciej Koperski"}, {"name": "Kian Ping Loh"}], "featured_authors": [{"name": "Xinyun Wang"}, {"name": "Magdalena Grzeszczyk"}, {"name": "Maxim Trushin"}, {"name": "Shaffique Adam"}, {"name": "Maciej Koperski"}, {"name": "Kian Ping Loh"}], "author_count": 17}, {"id": "2606.06169", "category": "cond-mat", "title": "Endowing variational phase-field fracture models with custom strength criteria", "abstract": "By now, several approaches have been proposed to endow phase-field fracture models with the ability to describe crack nucleation under multiaxial stress states. These include techniques for splitting the free energy, direct modifications of the phase-field driving or resisting forces that sacrifice the variational structure of the problem, and the introduction of additional internal variables, such as plastic strains or other nonlinear strains. In this paper, we propose a fundamentally different strategy for incorporating arbitrary elastic domains into phase-field fracture models, formulated within the variational framework of generalized standard materials. The proposed approach relies on letting the dissipation potential depend on the current state of the material. In this way, the variational structure of the problem is preserved, while elastic degradation and the strength criterion remain two distinct and independently controllable aspects of the material response. Simple yet representative models are presented and thoroughly discussed to demonstrate the effectiveness of the proposed methodology. The resulting evolution of the elastic domain is investigated in both strain and stress spaces. Moreover, numerical simulations demonstrate a range of crack nucleation processes under multiaxial loading conditions for various analytical strength surfaces. This work paves the way for future developments and applications in several directions.", "url": "https://arxiv.org/abs/2606.06169", "type": "理论+数值", "summary": "到目前为止，已经提出了几种方法来赋予相场断裂模型描述多轴应力状态下裂纹形核的能力。其中包括分裂自由能的技术、直接修改相场驱动或阻力（牺牲问题的变分结构）以及引入额外的内部变量，例如塑性应变或其他非线性应变。在本文中，我们提出了一种根本不同的策略，将任意弹性域纳入相场断裂模型中，并在广义标准材料的变分框架内制定。所提出的方法依赖于让耗散势取决于材料的当前状态。通过这种方式，问题的变分结构得以保留，而弹性退化和强度准则仍然是材料响应的两个不同且独立可控的方面。提出了简单但具有代表性的模型并进行了深入讨论，以证明所提出方法的有效性。\n\n在应变和应力空间中研究了由此产生的弹性域的演化。此外，数值模拟演示了各种分析强度表面在多轴加载条件下的一系列裂纹成核过程。这项工作为未来多个方向的开发和应用铺平了道路。", "authors": [{"name": "Roberto Alessi"}, {"name": "Matteo Brunetti"}, {"name": "Roshan Udaram Patil"}, {"name": "Jacinto Ulloa"}], "featured_authors": [{"name": "Roberto Alessi"}, {"name": "Matteo Brunetti"}, {"name": "Roshan Udaram Patil"}, {"name": "Jacinto Ulloa"}], "author_count": 4}, {"id": "2606.06184", "category": "cond-mat", "title": "The mesoscopic foundations of non equilibrium thermodynamics and the arrow of time in the Dual Model of Liquids", "abstract": "This manuscripts has two goals. The first goal is to show that the interaction in the Dual Model of Liquids between the solidlike molecule aggregates and the lattice excitations is appropriate to represent the link between the behaviour at macroscopic scale of normal liquids and the physical processes characterizing those systems at mesoscopic scale. The second goal is to show that the duality allows identifying a time arrow on the mesoscopic scale in liquids. The interaction of quanta of elastic energy with the molecular clusters introduces a privileged direction, which is relevant in time dependent and dissipative macroscopic processes, although the interaction remains temporally reversible", "url": "https://arxiv.org/abs/2606.06184", "type": "理论", "summary": "这份手稿有两个目标。第一个目标是证明液体对偶模型中固体分子聚集体和晶格激发之间的相互作用适合代表正常液体宏观尺度的行为与表征这些系统在介观尺度的物理过程之间的联系。第二个目标是证明二元性允许识别液体介观尺度上的时间箭头。弹性能量子与分子簇的相互作用引入了一个优先方向，该方向与时间相关和耗散的宏观过程相关，尽管相互作用在时间上仍然是可逆的", "authors": [{"name": "Fabio Peluso"}], "featured_authors": [{"name": "Fabio Peluso"}], "author_count": 1}, {"id": "2606.06185", "category": "cond-mat", "title": "Non-adiabatic Ehrenfest dynamics with norm-conserving and ultra-soft pseudo-potentials with nuclear velocity corrections on the atomic orbitals within the Projector Augmented Wave Method framework", "abstract": "We derive the first-principles Ehrenfest molecular dynamics describing non-adiabatic processes with the inclusion of the nuclear-velocity-dependent phases (also known as electron-translation factors) on the atomic-orbital basis. These phases, appearing when nuclei are treated dynamically, affect effective Hamiltonians constructed from localised orbitals. In this work, we focus on the effects in the first-principles pseudo-potential Hamiltonian, both for the norm-conserving and ultra-soft cases, derived within the Projector-Augmented-Wave (PAW) method framework. Peierls-like phases depending on the nuclear velocities appear in the non-local part of the potential, while additional nuclear velocity and acceleration-dependent corrections appear in the ultra-soft pseudo-potential case. The use of velocity-including atomic orbital basis enables a Galilean-invariant description of the non-adiabatic Ehrenfest molecular dynamics, removing spurious non-adiabatic couplings that arise from neglecting the nuclear velocity phases in the atomic orbitals.", "url": "https://arxiv.org/abs/2606.06185", "type": "理论+数值", "summary": "我们推导了描述非绝热过程的埃伦费斯特分子动力学第一原理，其中包含了原子轨道基础上的核速度相关相（也称为电子平移因子）。当原子核被动态处理时出现的这些相会影响由局域轨道构建的有效哈密顿量。在这项工作中，我们重点关注在投影增强波 (PAW) 方法框架内导出的第一原理赝势哈密顿量的影响，无论是对于范数守恒还是超软情况。取决于核速度的类 Peierls 相位出现在势的非局部部分，而额外的核速度和加速度相关的校正出现在超软赝势情况中。使用包含速度的原子轨道基础可以对非绝热埃伦费斯特分子动力学进行伽利略不变描述，消除由于忽略原子轨道中的核速度相位而产生的虚假非绝热耦合。", "authors": [{"name": "Paolo Fachin"}, {"name": "Francesco Macheda"}, {"name": "Paolo Barone"}, {"name": "Francesco Mauri"}], "featured_authors": [{"name": "Paolo Fachin"}, {"name": "Francesco Macheda"}, {"name": "Paolo Barone"}, {"name": "Francesco Mauri"}], "author_count": 4}, {"id": "2606.06257", "category": "cond-mat", "title": "Investigating frictional instability due to pressurization in granular media: insights from coupled computational fluid dynamics discrete element method", "abstract": "Fluid pressurization can reactivate subcritically stressed granular layers in faults, slopes, and injection-perturbed reservoirs, but grain-scale feedbacks among pressure diffusion, drainage, and contact-network degradation remain unresolved. Here, 3D coupled CFD-DEM simulations investigate pore-pressure-induced reactivation of confined, fluid-saturated granular shear layers under imposed shear stress. Strain-controlled tests define the Mohr-Coulomb strength envelope; stress-controlled simulations then impose subcritical shear stresses while basal pore pressure increases under drained and undrained conditions. Instability is governed not by pore pressure alone, but by its coupled evolution with effective stress, drainage, dilation or compaction, hydraulic connectivity, and granular fabric. Undrained boundaries retain excess pore pressure, whereas drained boundaries maintain vertical gradients and suppress excess pressure. Internal fields reveal alternating dilation and compaction bands and reorganization of a porosity-derived permeability proxy, showing that hydraulic pathways evolve during deformation. Micromechanical diagnostics identify localized particle rotation, force-chain reorganization, porosity redistribution, and coordination-number variations controlled mainly by imposed shear-stress level rather than drainage. Second-order fabric metrics show that post-failure weakening coincides with loss of directional force-chain organization, especially at lower shear. Friction-velocity and friction-porosity trajectories indicate a transition from dilatancy-dominated strengthening to pore-pressure-driven weakening. Viscous-number scaling partially organizes the low-Iv creeping response, 10^-8 <= Iv <= 10^-5, but not onto a unique local rheology. These results clarify how drainage-controlled hydromechanical feedbacks and fabric degradation convert pore-pressure forcing into instability.", "url": "https://arxiv.org/abs/2606.06257", "type": "理论+数值", "summary": "流体加压可以重新激活断层、斜坡和注入扰动储层中的亚临界应力颗粒层，但压力扩散、排水和接触网络退化之间的颗粒尺度反馈仍未解决。在这里，3D 耦合 CFD-DEM 模拟研究了在施加剪切应力下孔隙压力引起的受限流体饱和颗粒剪切层的重新激活。应变控制测试定义了莫尔-库仑强度包络线；然后，应力控制模拟会施加亚临界剪切应力，同时在排水和不排水条件下底孔压力增加。不稳定性不仅受孔隙压力的影响，还受其与有效应力、排水、膨胀或压实、水力连通性和粒状结构的耦合演化的影响。不排水边界保留多余的孔隙压力，而排水边界则保持垂直梯度并抑制多余的压力。内部场揭示了交替的膨胀带和压实带以及孔隙度衍生的渗透率代理的重组，表明水力路径在变形过程中演化。\n\n微机械诊断可识别局部颗粒旋转、力链重组、孔隙率重新分布和配位数变化，这些变化主要由施加的剪切应力水平而不是排水控制。二阶结构指标表明，失效后的弱化与定向力链组织的损失同时发生，特别是在较低的剪切力下。摩擦速度和摩擦孔隙度轨迹表明从剪胀性主导的强化到孔隙压力驱动的弱化的转变。粘性数缩放部分组织了低 Iv 蠕变响应，10^-8 <= Iv <= 10^-5，但没有形成独特的局部流变学。这些结果阐明了排水控制的流体力学反馈和织物退化如何将孔隙压力强迫转化为不稳定性。", "authors": [{"name": "Bimal Chhushyabaga"}, {"name": "Behrooz Ferdowsi"}], "featured_authors": [{"name": "Bimal Chhushyabaga"}, {"name": "Behrooz Ferdowsi"}], "author_count": 2}, {"id": "2606.06304", "category": "cond-mat", "title": "Eigenmodes of synthetic antiferromagnetic skyrmions", "abstract": "We investigate the excitation modes of confined synthetic-antiferromagnetic (SAF) skyrmions using micromagnetic eigenvalue and ringdown simulations. Starting from a single skyrmion in a ferromagnetic layer, where the lowest-frequency modes are a gyrotropic and a breathing mode, we study how antiferromagnetic interlayer coupling modifies the dynamics in SAF bilayers. We consider several geometries: single SAF skyrmions in square and rectangular confinement, unequal layer thicknesses, and strips containing multiple skyrmions. The antiferromagnetic coupling strongly modifies the low-frequency dynamics. The square geometry exhibits two nearly degenerate gyrotropic modes, where in each both layers have the same rotation sense. In rectangular geometries, we instead find nearly linear SAF skyrmion translation emerging from opposite gyration sense in the two layers. These translational modes become the characteristic low-frequency excitations of SAF skyrmion chains. For skyrmion chains, we identify collective translational and breathing modes with standing-wave-like spatial profiles. Beyond ferromagnetic-like breathing modes, the SAF geometry supports breathing oscillations in which the two layers oscillate out of phase. We further demonstrate signal propagation along extended SAF skyrmion chains with propagation velocities comparable to ferromagnetic skyrmion chains. These results provide a systematic description of the collective dynamics of SAF skyrmions arising from the interplay of geometric confinement, intralayer, and interlayer coupling.", "url": "https://arxiv.org/abs/2606.06304", "type": "理论+数值", "summary": "我们使用微磁特征值和振铃模拟研究了受限合成反铁磁（SAF）斯格明子的激发模式。从铁磁层中的单个斯格明子开始，其中最低频率模式是回旋模式和呼吸模式，我们研究反铁磁层间耦合如何改变 SAF 双层的动力学。我们考虑几种几何形状：方形和矩形限制中的单个 SAF 斯格明子、不等的层厚度以及包含多个斯格明子的条带。反铁磁耦合强烈改变低频动力学。方形几何结构表现出两种近简并的陀螺模式，其中每一层都具有相同的旋转方向。在矩形几何结构中，我们发现近乎线性的 SAF 斯格明子平移是从两层中相反的回转方向产生的。这些平移模式成为 SAF 斯格明子链的特征低频激励。对于斯格明子链，我们通过驻波状空间轮廓识别集体平移和呼吸模式。\n\n除了类铁磁呼吸模式之外，SAF 几何结构还支持呼吸振荡，其中两层异相振荡。我们进一步证明了信号沿着扩展的 SAF 斯格明子链传播，其传播速度与铁磁斯格明子链相当。这些结果系统地描述了由几何限制、层内和层间耦合相互作用产生的 SAF 斯格明子的集体动力学。", "authors": [{"name": "Kauser Zulfiqar"}, {"name": "Martin Lang"}, {"name": "Samuel J. R. Holt"}, {"name": "Swapneel Amit Pathak"}, {"name": "Florian Bruckner"}, {"name": "Hans Fangohr"}], "featured_authors": [{"name": "Kauser Zulfiqar"}, {"name": "Martin Lang"}, {"name": "Samuel J. R. Holt"}, {"name": "Swapneel Amit Pathak"}, {"name": "Florian Bruckner"}, {"name": "Hans Fangohr"}], "author_count": 6}, {"id": "2606.06343", "category": "cond-mat", "title": "$E_\\infty^{1,2}$-type Lieb-Schultz-Mattis anomalies, deconfined quantum critical points, and non-invertible symmetry breaking", "abstract": "We study deconfined quantum critical points (DQCP) associated with Lieb-Schultz-Mattis (LSM) anomalies in one-dimensional spin chains. Our starting point is a structural characterization of the LSM anomaly in the Lyndon-Hochschild-Serre spectral sequence: $\\omega_{\\mathrm{LSM}}\\in E_\\infty^{1,2}= H^1(\\mathbb Z_{\\mathrm{trans}},H^2(G_{\\mathrm{int}},\\mathrm{U}(1)))\\subseteq H^3(G_{\\mathrm{int}}\\rtimes_{\\rho}\\mathbb Z_{\\mathrm{trans}},\\mathrm{U}(1))$. Physically, this class decorates a translation defect with a projective representation of the internal symmetry $G_\\mathrm{int}$. We show that gauging the internal symmetry in the presence of an $E_\\infty^{1,2}$-type anomaly necessarily produces a non-invertible dual symmetry. This gives a general mechanism for type-II DQCP: in contrast to type-I examples with $E_\\infty^{2,1}$-type anomalies which are dual to ordinary group-like symmetry breaking, type-II transitions are dual to spontaneous breaking of a non-invertible symmetry. We illustrate the mechanism using a spin-$1/2$ chain with an anomalous $D_8$ LSM symmetry. We construct a dimer-to-ferromagnet DQCP candidate, provide numerical evidence for a critical theory with central charge $c\\approx 1$, and show, using both category theory and explicit lattice constructions, that gauging the internal symmetry yields the non-invertible $\\mathrm{Rep}(H_8)$ dual symmetry.", "url": "https://arxiv.org/abs/2606.06343", "type": "理论+数值", "summary": "我们研究与一维自旋链中的 Lieb-Schultz-Mattis (LSM) 异常相关的解禁量子临界点 (DQCP)。我们的出发点是 Lyndon-Hochschild-Serre 谱序列中 LSM 异常的结构表征： $\\omega_{\\mathrm{LSM}}\\in E_\\infty^{1,2}= H^1(\\mathbb Z_{\\mathrm{trans}},H^2(G_{\\mathrm{int}},\\mathrm{U}(1)))\\subseteq H^3(G_{\\mathrm{int}}\\rtimes_{\\rho}\\mathbb Z_{\\mathrm{trans}},\\mathrm{U}(1))$.从物理上讲，此类用内部对称性 $G_\\mathrm{int}$ 的投影表示来修饰平移缺陷。我们证明，在存在 $E_\\infty^{1,2}$ 型异常的情况下测量内部对称性必然会产生不可逆的对偶对称性。这给出了 II 型 DQCP 的一般机制：与具有 $E_\\infty^{2,1}$ 型异常的 I 型示例相反，这些异常与普通类群对称性破缺是对偶的，II 型跃迁与不可逆对称性的自发破缺是对偶的。我们使用具有异常 $D_8$ LSM 对称性的 spin-$1/2$ 链来说明该机制。\n\n我们构建了一个二聚体到铁磁体 DQCP 候选者，为中心电荷 $c\\approx 1$ 的临界理论提供了数值证据，并使用范畴论和显式晶格结构证明，测量内部对称性产生了不可逆的 $\\mathrm{Rep}(H_8)$ 对偶对称性。", "authors": [{"name": "Hao-Ran Zhang"}, {"name": "Hanlin Lin"}, {"name": "Shuo Yang"}, {"name": "Qing-Rui Wang"}], "featured_authors": [{"name": "Hao-Ran Zhang"}, {"name": "Hanlin Lin"}, {"name": "Shuo Yang"}, {"name": "Qing-Rui Wang"}], "author_count": 4}, {"id": "2606.06362", "category": "cond-mat", "title": "A closed system setting for quantum thermalisation in free fermions", "abstract": "We study thermalisation and the possible occurrence of the Mpemba effect in a closed quantum setting that mimics the interaction of a system with thermal reservoirs coupled only at its boundaries. Specifically, we consider a tripartite geometry in which a finite chain, initially prepared at a finite temperature, is suddenly connected on both sides to two semi-infinite chains of the same nature held at a different temperature. These outer chains act as thermal baths, while the full system evolves unitarily under a homogeneous Hamiltonian. This setup provides a simple quantum realisation of a temperature quench and closely resembles the original scenario in which the classical Mpemba effect was first observed. We focus on two paradigmatic free-fermion models, the XX chain and the transverse-field Ising chain, which respectively preserve and break the global $U(1)$ particle-number symmetry. As a probe of relaxation, we consider the Frobenius distance between the time-evolved reduced density matrix of the central subsystem and its stationary state, which is the thermal state at the bath temperature. Exploiting the free-fermionic structure of both models, the dynamics remains Gaussian and the Frobenius distance can be expressed exactly in terms of two-point correlation functions. Combining this representation with generalised hydrodynamics, we derive analytical predictions for the Frobenius distance in the hydrodynamic limit, providing a complete characterisation of the thermalisation process. Using these results, we investigate the possible occurrence of the Mpemba effect. We find that, despite the genuine non-equilibrium dynamics displayed by the system, no Mpemba effect arises in this setting. Our analysis identifies a broad class of boundary-driven thermalisation protocols in which relaxation is fully characterised analytically and exhibits no anomalous acceleration of equilibration.", "url": "https://arxiv.org/abs/2606.06362", "type": "理论", "summary": "我们研究热化作用以及在封闭量子环境中可能发生的姆彭巴效应，该环境模拟系统与仅在其边界耦合的热储层的相互作用。具体来说，我们考虑一种三方几何结构，其中最初在有限温度下制备的有限链突然在两侧连接到在不同温度下保持的相同性质的两条半无限链。这些外链充当热浴，而整个系统在齐次哈密顿量下统一演化。该设置提供了温度猝灭的简单量子实现，并且与首次观察到经典 Mpemba 效应的原始场景非常相似。我们关注两个典型的自由费米子模型，XX 链和横向场 Ising 链，它们分别保持和打破全局 $U(1)$ 粒子数对称性。作为弛豫的探针，我们考虑中心子系统的时间演化约化密度矩阵与其稳态（浴温下的热态）之间的弗罗贝尼乌斯距离。\n\n利用两个模型的自由费米子结构，动力学保持高斯分布，并且弗罗贝尼乌斯距离可以用两点相关函数精确表达。将此表示与广义流体动力学相结合，我们得出了流体力学极限中弗罗贝尼乌斯距离的分析预测，提供了热化过程的完整表征。利用这些结果，我们研究了 Mpemba 效应发生的可能性。我们发现，尽管系统显示出真正的非平衡动力学，但在这种情况下不会出现姆潘巴效应。我们的分析确定了一大类边界驱动的热化协议，其中弛豫得到了充分的分析表征，并且没有表现出异常的平衡加速。", "authors": [{"name": "Purvaash Panduranghan-Udhayashankar"}, {"name": "Filiberto Ares"}, {"name": "Pasquale Calabrese"}], "featured_authors": [{"name": "Purvaash Panduranghan-Udhayashankar"}, {"name": "Filiberto Ares"}, {"name": "Pasquale Calabrese"}], "author_count": 3}, {"id": "2606.06412", "category": "cond-mat", "title": "Nonreversible Gauge Fields in Fokker--Planck Dynamics: Supersymmetric Hamiltonians and Learned Finite Forces", "abstract": "We formulate stationary-density-preserving nonreversible perturbations of Fokker--Planck dynamics as gauge fields that deform relaxation spectra while leaving the invariant state fixed. When detailed balance holds, a similarity transformation maps the reversible Fokker--Planck operator to a Witten-Laplacian-type supersymmetric Hamiltonian; nonreversible gauges then appear as non-Hermitian perturbations that preserve the zero mode but modify the excited spectrum. This operator viewpoint gives a common language for relaxation gaps, circulating probability currents, hypocoercive acceleration, and finite control costs. We represent admissible gauge currents by antisymmetric tensor fields and identify the detailed-balance-violating Ohzeki--Ichiki force as a constant symplectic example whose infinite-strength limit is Hamiltonian dynamics. The continuous-time spectral gap alone does not select a finite gauge strength, so we introduce a finite-time regularized objective and an actor--critic procedure for learning the gauge. An exactly solvable anisotropic Gaussian Ornstein--Uhlenbeck benchmark separates the spectral transition from the finite-time optimum and shows that the learned gauge recovers the Lyapunov-equation optimum. A double-well benchmark then illustrates the same constrained selection in a nonconvex metastable landscape. Stochastic gradient methods enter this framework as physically relevant Fokker--Planck systems: mini-batch noise acts as an effective diffusion tensor, and adaptive methods such as Adam correspond to metric choices with possible nonequilibrium currents.", "url": "https://arxiv.org/abs/2606.06412", "type": "理论", "summary": "我们将福克-普朗克动力学的平稳密度保持不可逆扰动公式化为规范场，该规范场使弛豫谱变形，同时保持不变状态固定。当详细平衡成立时，相似变换将可逆福克-普朗克算子映射到维滕-拉普拉斯型超对称哈密顿量；然后，不可逆规范表现为非厄米扰动，保留零模式但修改激发光谱。这种算子观点为松弛间隙、循环概率流、低矫顽​​加速度和有限控制成本提供了通用语言。我们用反对称张量场表示允许的规范电流，并将详细破坏平衡的 Ohzeki-Ichiki 力识别为常数辛示例，其无限强度极限是哈密顿动力学。连续时间谱间隙本身并不能选择有限的规范强度，因此我们引入了有限时间正则化目标和用于学习规范的演员-评论家程序。\n\n精确可解的各向异性高斯 Ornstein--Uhlenbeck 基准将光谱过渡与有限时间最优值分开，并表明学习的规范恢复了 Lyapunov 方程最优值。然后，双井基准说明了非凸亚稳态景观中的相同约束选择。随机梯度方法作为物理相关的福克-普朗克系统进入该框架：小批量噪声充当有效的扩散张量，而 Adam 等自适应方法对应于可能存在非平衡电流的度量选择。", "authors": [{"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Masayuki Ohzeki"}], "author_count": 1}, {"id": "2606.06465", "category": "cond-mat", "title": "Superconducting triode effect in a quantum-dot Josephson junction with a biased top gate", "abstract": "Non-reciprocal supercurrents enable non-dissipative rectification, holding great promise for superconducting electronics. Conventionally, this non-reciprocity, termed the superconducting diode effect, requires the simultaneous breaking of time-reversal and parity symmetries. Here, we propose a superconducting triode effect in an asymmetric quantum-dot Josephson junction coupled to an additional metallic top gate, which breaks the parity symmetry while explicitly preserving time-reversal symmetry. We demonstrate that the supercurrent across this junction exhibits a strong non-reciprocal effect that can be continuously manipulated via the top gate to achieve an ideal unidirectional supercurrent, thus manifesting a superconducting triode effect. Furthermore, under radio-frequency radiation, this junction exhibits highly asymmetric Shapiro steps, realizing fully quantized supercurrent rectification. Our work not only provides an alternative physical mechanism for the superconducting diode effect observed in Josephson junctions with explicit time-reversal symmetry, but also introduces a new tuning knob to manipulate supercurrent non-reciprocity.", "url": "https://arxiv.org/abs/2606.06465", "type": "理论", "summary": "不可逆超电流实现非耗散整流，为超导电子学带来了巨大的希望。传统上，这种非互易性被称为超导二极管效应，需要同时打破时间反转和奇偶校验对称性。在这里，我们提出了在与附加金属顶栅耦合的不对称量子点约瑟夫森结中的超导三极管效应，这打破了奇偶校验对称性，同时明确地保持了时间反转对称性。我们证明，穿过该结的超电流表现出很强的不可逆效应，可以通过顶栅连续操纵，以实现理想的单向超电流，从而表现出超导三极管效应。此外，在射频辐射下，该结表现出高度不对称的夏皮罗阶跃，实现了完全量化的超电流整流。我们的工作不仅为在具有明确时间反转对称性的约瑟夫森结中观察到的超导二极管效应提供了一种替代物理机制，而且还引入了一种新的调谐旋钮来操纵超电流非互易性。", "authors": [{"name": "Yu-Hang Li"}, {"name": "Xiaan Du"}, {"name": "Hua Jiang"}, {"name": "X. C. Xie"}], "featured_authors": [{"name": "Yu-Hang Li"}, {"name": "Xiaan Du"}, {"name": "Hua Jiang"}, {"name": "X. C. Xie"}], "author_count": 4}, {"id": "2606.06466", "category": "cond-mat", "title": "Enhancement of charge correlations and real-space topological marker on an interacting non-Hermitian Su-Schrieffer-Heeger model", "abstract": "We investigate the interacting non-Hermitian Su-Schrieffer-Heeger (SSH) model, focusing on the interplay between topology and charge ordering. Using a real-space topological marker, charge correlations, and the complex many-body spectrum, we map out the phase diagram under periodic and open boundary conditions. We show that the topological marker remains a robust diagnostic of non-Hermitian topological phases in the presence of interactions and consistently signals their breakdown at the onset of a charge density wave (CDW). We further demonstrate that non-Hermiticity enhances interaction effects: While moderate changes occur under periodic boundary conditions, open boundary conditions lead to a pronounced amplification of staggered charge correlations near exceptional points. This enhancement arises from the accumulation of low-energy states near exceptional points, which promotes electronic instabilities and strengthens CDW tendencies.", "url": "https://arxiv.org/abs/2606.06466", "type": "理论+数值", "summary": "我们研究了相互作用的非埃尔米特 Su-Schrieffer-Heeger (SSH) 模型，重点关注拓扑和电荷排序之间的相互作用。使用真实空间拓扑标记、电荷相关性和复杂的多体谱，我们绘制了周期性和开放边界条件下的相图。我们表明，在存在相互作用的情况下，拓扑标记仍然是对非厄米拓扑相的可靠诊断，并且在电荷密度波（CDW）开始时始终发出它们的分解信号。我们进一步证明非厄米性增强了相互作用效应：虽然在周期性边界条件下发生适度的变化，但开放边界条件导致异常点附近交错电荷相关性的显着放大。这种增强是由于异常点附近低能态的积累而产生的，这会促进电子不稳定性并增强 CDW 趋势。", "authors": [{"name": "Sebastião dos A. Sousa-Júnior"}, {"name": "Pedro B. Melo"}, {"name": "Rubem Mondaini"}, {"name": "Arnob Kumar Ghosh"}, {"name": "Rodrigo Arouca"}], "featured_authors": [{"name": "Sebastião dos A. Sousa-Júnior"}, {"name": "Pedro B. Melo"}, {"name": "Rubem Mondaini"}, {"name": "Arnob Kumar Ghosh"}, {"name": "Rodrigo Arouca"}], "author_count": 5}, {"id": "2606.05279", "category": "hep-th", "title": "Hypergroup Symmetry in Relative Quantum Field Theories and Chiral Algebras", "abstract": "A QFT is said to be relative if it lives at the boundary of a topological QFT in one higher dimension. We develop a general framework for working with noninvertible symmetries of relative theories in two spacetime dimensions, extending several well-known results for absolute QFTs. We emphasize various new features which arise in the relative setting, including the role of topological surfaces of the bulk, and the appearance of hypergroups and certain generalizations of tube algebras known as dome algebras. Our formalism is particularly well-suited for studying rational chiral algebras, where it predicts that finite symmetries are in explicit one-to-one correspondence with conformal embeddings of finite index. We describe several implications of our framework for absolute theories. First, we explain how to \"glue\" together symmetries of the left- and right-moving chiral algebras of a 2D CFT to produce topological line defects of the full theory. Second, we derive a precise correspondence between boundary conditions of a 2D CFT and symmetries of its chiral algebra. This correspondence has several structural corollaries: in diagonal rational CFTs, we demonstrate that the topological line defects of the theory act transitively on its boundary conditions, and further that the identity Cardy state has the smallest $g$-function amongst all boundary conditions, including those which only preserve Virasoro symmetry. We conclude by illustrating our results in a variety of examples. For instance, we show that, if there exists a rational chiral algebra with central charge $c=8$ whose modular tensor category is the Drinfeld center of the Haagerup fusion category, then it must arise as the fixed points of a rank-2 hypergroup acting on the $SU(3)_1\\otimes (E_{6})_1$ chiral algebra.", "url": "https://arxiv.org/abs/2606.05279", "type": "理论", "summary": "如果 QFT 位于一个更高维度的拓扑 QFT 的边界，则该 QFT 被认为是相对的。我们开发了一个通用框架，用于处理两个时空维度中相对理论的不可逆对称性，扩展了绝对 QFT 的几个众所周知的结果。我们强调在相对环境中出现的各种新特征，包括体的拓扑表面的作用、超群的出现以及被称为圆顶代数的管代数的某些概括。我们的形式主义特别适合研究有理手性代数，它预测有限对称性与有限索引的共角嵌入具有明确的一一对应关系。我们描述了绝对理论框架的几个含义。首先，我们解释如何将 2D CFT 的左右移动手性代数的对称性“粘合”在一起，以产生完整理论的拓扑线缺陷。其次，我们推导了 2D CFT 的边界条件与其手性代数的对称性之间的精确对应关系。\n\n这种对应关系有几个结构推论：在对角有理 CFT 中，我们证明理论的拓扑线缺陷对其边界条件具有传递作用，并且进一步证明恒等 Cardy 态在所有边界条件（包括仅保留 Virasoro 对称性的边界条件）中具有最小的 $g$ 函数。最后，我们通过各种示例说明我们的结果。例如，我们证明，如果存在一个中心电荷 $c=8$ 的有理手性代数，其模张量范畴是 Haagerup 融合范畴的 Drinfeld 中心，那么它必须作为作用于 $SU(3)_1\\otimes (E_{6})_1$ 手性代数的 2 阶超群的不动点出现。", "authors": [{"name": "Terry Gannon"}, {"name": "Brandon C. Rayhaun"}], "featured_authors": [{"name": "Terry Gannon"}, {"name": "Brandon C. Rayhaun"}], "author_count": 2}, {"id": "2606.05280", "category": "hep-th", "title": "Kaleidoscopes, Waves and the Prepotential", "abstract": "Isomorphic flops are topology-changing transitions connecting two diffeomorphic families of Calabi-Yau threefolds. They correspond to the generators of certain Coxeter groups acting on the moduli space. As a consequence of these symmetries, the prepotential of 4D $\\mathcal{N} = 2$ Type IIA compactifications on such varieties must assemble into Coxeter-invariant functions. We construct a database of all Coxeter symmetries from isomorphic flops in Kähler-favorable CICYs. The action of the Coxeter group on the Kähler moduli space leaves a symmetric bilinear form invariant, which we interpret as a metric and construct its associated Laplace-Beltrami operator. We argue that the Coxeter-invariant functions featured in the prepotential solve the Helmholtz equation with this Laplacian, and that the prepotential can then be resummed into a decomposition in terms of eigenfunctions of the Laplace-Beltrami operator. The convergence rate of the raw orbit sums of worldsheet instanton contributions and the resummed expressions are complementary, with the latter sharply localizing around the first few terms in the interior of the moduli space.", "url": "https://arxiv.org/abs/2606.05280", "type": "理论", "summary": "同构触发器是连接卡拉比-丘三重的两个微分同构家族的拓扑改变转变。它们对应于作用于模空间的某些 Coxeter 群的生成元。由于这些对称性，此类簇上 4D $\\mathcal{N} = 2$ IIA 型紧化的预势必须组装成 Coxeter 不变函数。我们从 Kähler 有利的 CICY 中的同构触发器构建了所有 Coxeter 对称性的数据库。 Coxeter 群在 Kähler 模空间上的作用留下了对称双线性形式不变量，我们将其解释为度量并构造其关联的 Laplace-Beltrami 算子。我们认为，预势中的考克塞特不变函数用拉普拉斯算子求解亥姆霍兹方程，然后预势可以根据拉普拉斯-贝尔特拉米算子的本征函数恢复为分解。世界表瞬子贡献的原始轨道和的收敛速度与恢复的表达式是互补的，后者急剧地集中在模空间内部的前几项周围。", "authors": [{"name": "Rafael Álvarez-García"}, {"name": "Fabian Ruehle"}], "featured_authors": [{"name": "Rafael Álvarez-García"}, {"name": "Fabian Ruehle"}], "author_count": 2}, {"id": "2606.05282", "category": "hep-th", "title": "The Double Well Done Doubly-Well", "abstract": "The symmetric double-well potential is one of the simplest quantum-mechanical systems in which perturbative and non-perturbative physics are deeply entangled. Its energy levels have non-analytic expansions in inverse powers of the inter-well separation, with factorially growing coefficients, while the parity splitting is exponentially small and invisible to perturbation theory. Resurgence ties the two features together, organizing the exact spectrum into a single tightly-constrained trans-series. This paper gives a self-contained account of this trans-series from two complementary approaches: exact WKB and the Euclidean path integral, developed in a common notation with explicit calculations through the four-instanton level and three-loop order. In exact WKB, Stokes phenomena encoded in the Delabaere--Dillinger--Pham relations control the analytic continuation of the wavefunction past turning points. The quantization condition expressed in terms of Voros symbols then determines the full trans-series. The DDP relations are local and do not require knowing the global topology of the energy surface, but that surface is an elliptic curve. In the path integral, elliptic curves enter differently: the classical saddle points are doubly-periodic elliptic functions of Euclidean time, and Stokes phenomena play out within the finite-dimensional manifold of quasi-zero modes rather than through analytic continuation of the wavefunction. A Lefschetz thimble decomposition determines which saddles contribute, and the resulting partition function trans-series is much simpler than the energy trans-series: at each instanton order the $T$-dependence is a polynomial fixed by the quasi-zero-mode thimble integrals. Together, the two approaches deploy a shared mathematical infrastructure in complementary ways, showing that the double well is an ideal setting to explore resurgence.", "url": "https://arxiv.org/abs/2606.05282", "type": "理论", "summary": "对称双阱势是最简单的量子力学系统之一，其中微扰和非微扰物理深深纠缠在一起。其能级在井间分离的反幂上具有非解析展开式，系数呈阶乘增长，而奇偶分裂呈指数级小且对微扰理论来说是不可见的。中兴将这两个功能联系在一起，将精确的频谱组织成一个严格约束的跨系列。本文通过两种互补的方法给出了这种跨级数的独立说明：精确的 WKB 和欧几里得路径积分，它们以通用符号开发，并通过四瞬时级和三环阶进行显式计算。在精确的 WKB 中，Delabaere-Dillinger-Pham 关系中编码的斯托克斯现象控制着波函数在转折点之后的解析延拓。然后，以 Voros 符号表示的量化条件决定了完整的跨系列。 DDP 关系是局部的，不需要知道能量表面的全局拓扑，但该表面是椭圆曲线。\n\n在路径积分中，椭圆曲线的输入方式不同：经典鞍点是欧几里德时间的双周期椭圆函数，斯托克斯现象在准零模的有限维流形中发挥作用，而不是通过波函数的解析延拓。 Lefschetz 顶针分解决定了哪些鞍座有贡献，并且所得配分函数反序列比能量反序列简单得多：在每个瞬时阶，$T$ 依赖性是由准零模式顶针积分固定的多项式。这两种方法以互补的方式部署了共享的数学基础设施，表明双井是探索复兴的理想环境。", "authors": [{"name": "Aurélien Dersy"}, {"name": "Matthew D. Schwartz"}], "featured_authors": [{"name": "Aurélien Dersy"}, {"name": "Matthew D. Schwartz"}], "author_count": 2}, {"id": "2606.05287", "category": "hep-th", "title": "String dualities and wedge singularities", "abstract": "We study strings propagating in backgrounds with a wedge singularity, namely whose internal sector describes a wedge sum of closed manifolds. We focus on the wedge sum of two circles, which was recently argued to provide a quantum geometry for an M-theoretic description of type 0 strings, along with a much wider non-supersymmetric duality web stemming from quotients thereof. In the context of this proposal, we investigate whether the worldsheet features of type IIA strings, together with strong-coupling ingredients, can consistently reproduce the expectation of a weakly coupled type 0A frame. To this end, we combine worldsheet effects due to the wedge singularity with the emergence proposal applied to D0-branes probing it. We find that the resulting potential reproduces the correct tree-level mass of the tachyon in a specific scaling limit. We also discuss the possibility of kinematic obstructions to our worldsheet approach using the framework of topological modular forms, and comment on some puzzles and open questions.", "url": "https://arxiv.org/abs/2606.05287", "type": "理论", "summary": "我们研究在具有楔奇点的背景中传播的弦，即其内部扇区描述了闭流形的楔和。我们关注两个圆的楔和，最近有人认为它为 0 型弦的 M 理论描述提供了量子几何，以及源自其商的更广泛的非超对称对偶网络。在本提案的背景下，我们研究了 IIA 型字符串的世界表特征以及强耦合成分是否能够一致地再现弱耦合 0A 型框架的期望。为此，我们将楔奇点引起的世界表效应与应用于探测它的 D0 膜的涌现提议结合起来。我们发现，由此产生的势能在特定的缩放限制下再现了快子的正确树级质量。我们还讨论了使用拓扑模块化形式的框架对我们的世界表方法进行运动学障碍的可能性，并对一些难题和悬而未决的问题进行了评论。", "authors": [{"name": "Ivano Basile"}, {"name": "Dieter Lust"}], "featured_authors": [{"name": "Ivano Basile"}, {"name": "Dieter Lust"}], "author_count": 2}, {"id": "2606.05289", "category": "hep-th", "title": "Unitarity, Recursion and Soft Limits in (EA)dS through Dressing", "abstract": "Using the recently developed framework in which cosmological correlators in (E)AdS are represented as flat-space amplitudes dressed by auxiliary propagators, we show that several structural properties of the cosmological observables have a direct flat-space origin. We derive cosmological cutting rules for spinning correlators from the flat-space optical theorem, obtain the cosmological tree theorem from the Feynman tree theorem, and uplift BCFW recursion relations to (E)AdS via dressing. We also show that flat-space soft theorems reproduce the soft limits of (E)AdS correlators, and find indications of an emergent universal structure in subleading soft limits. These results provide evidence that key features of cosmological correlators can be systematically understood as dressed manifestations of flat-space physics.", "url": "https://arxiv.org/abs/2606.05289", "type": "理论", "summary": "使用最近开发的框架，其中（E）AdS中的宇宙学相关器被表示为由辅助传播器修饰的平坦空间振幅，我们表明宇宙学可观测量的几个结构特性具有直接的平坦空间起源。我们从平坦空间光学定理推导出旋转相关器的宇宙学切割规则，从费曼树定理获得宇宙学树定理，并通过修整将BCFW递归关系提升到(E)AdS。我们还表明，平坦空间软定理再现了 (E)AdS 相关器的软极限，并在次领先软极限中找到了新兴通用结构的迹象。这些结果提供了证据，证明宇宙学相关器的关键特征可以系统地理解为平坦空间物理学的装扮表现。", "authors": [{"name": "Arhum Ansari"}, {"name": "Deep Mazumdar"}, {"name": "Brijesh Thakkar"}], "featured_authors": [{"name": "Arhum Ansari"}, {"name": "Deep Mazumdar"}, {"name": "Brijesh Thakkar"}], "author_count": 3}, {"id": "2606.05303", "category": "hep-th", "title": "Krylov Complexity: Flat bands and Carroll breaking deformations", "abstract": "Systems with flat band structures, when written in the language of Compact Localised States (CLS), have been shown to be explicitly invariant under supertranslation symmetries, making Carrollian symmetries inherently important for such systems. In this work, we explore the state dynamics of these systems, focusing on quenches induced by Carroll breaking perturbations, through the probe of Krylov (spread) Complexity. We specialise to Fermionic ladder Hamiltonians with all bands flat (ABF) scenario, augmented by a supertranslation preserving interaction, and discuss Krylov state complexity for quenches across critical lines. We further discuss how the growth of Krylov complexity sharply resolves the phase-dependent resilience of Carrollian sectors against delocalising perturbations. This is augmented by a complementary mechanism for Krylov growth in a continuum Carroll scalar field theory with a gradient deformation, which exhibits strong ultraviolet sensitivity (UV/IR mixing).", "url": "https://arxiv.org/abs/2606.05303", "type": "理论", "summary": "具有平带结构的系统，当用紧定域态（CLS）语言编写时，已被证明在超平移对称性下具有明确的不变性，这使得卡罗尔对称性对于此类系统本质上很重要。在这项工作中，我们通过对克雷洛夫（传播）复杂性的探索，探索这些系统的状态动力学，重点关注卡罗尔破坏扰动引起的猝灭。我们专门研究具有所有能带平坦 (ABF) 场景的费米子梯哈密顿量，通过超平移保留相互作用进行增强，并讨论跨临界线淬灭的 Krylov 状态复杂性。我们进一步讨论克雷洛夫复杂性的增长
