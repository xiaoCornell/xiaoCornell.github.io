如何急剧解决卡罗尔扇区对抗离域扰动的相依赖弹性。具有梯度变形的连续卡罗尔标量场理论中的克雷洛夫生长的补充机制增强了这一点，该理论表现出很强的紫外线敏感性（紫外线/红外线混合）。", "authors": [{"name": "Aritra Banerjee"}, {"name": "Arpan Bhattacharyya"}, {"name": "Rudranil Basu"}, {"name": "Sayan Das"}], "featured_authors": [{"name": "Aritra Banerjee"}, {"name": "Arpan Bhattacharyya"}, {"name": "Rudranil Basu"}, {"name": "Sayan Das"}], "author_count": 4}, {"id": "2606.05314", "category": "hep-th", "title": "Mass-Flow Invariance of $Q$-Cohomology in BMN Matrix Quantum Mechanics", "abstract": "We study the dependence of the dynamical supercharges of BMN matrix quantum mechanics on the mass parameter $\\mu$. Taking the $\\mu$-derivative at fixed canonical matrix variables, we show that the sixteen-component supercharge evolves by the adjoint action of a Hermitian quadratic bosonic operator $\\mathcal{K}$, together with the spinor-space factor $i\\gamma^{123}$. After projection to a $\\gamma^{123}$-eigenspace, this flow integrates to a finite similarity transformation. For the nilpotent component $Q(\\mu)=\\mathcal Q^4_-(\\mu)$, one obtains $Q(\\mu)=M(\\mu,\\mu_0)Q(\\mu_0)M(\\mu,\\mu_0)^{-1}$, giving an algebraic mass-flow non-renormalization statement for the $Q$-cohomology. The corresponding Hilbert-space statement has an analytic qualification, parallel to Witten's argument for supersymmetric quantum mechanics: $M$ is non-unitary and unbounded, so its action on the normalizable domain must be controlled. We formulate a small-step criterion by comparing the quadratic growth of $M$ with the Gaussian falloff of BMN oscillator wavefunctions within each component $\\mu>0$ or $\\mu<0$. As a concrete check, we evaluate this condition in the $N=2$ theory, whose two vacuum sectors are built on the trivial vacuum and the irreducible fuzzy-sphere vacuum. We also compute the induced $Q_{\\rm BPS}$-action on the corresponding BPS letters: in the trivial sector it agrees with the standard BMN-sector BPS-letter differential of $\\mathcal{N}=4$ SYM, while in the irreducible sector it vanishes.", "url": "https://arxiv.org/abs/2606.05314", "type": "理论", "summary": "我们研究了 BMN 矩阵量子力学的动态增压对质量参数 $\\mu$ 的依赖性。采用固定正则矩阵变量处的 $\\mu$ 导数，我们表明十六分量增压是通过埃尔米特二次玻色子算子 $\\mathcal{K}$ 与旋量空间因子 $i\\gamma^{123}$ 的伴随作用演化的。投影到 $\\gamma^{123}$-特征空间后，该流程积分为有限相似变换。对于幂零分量 $Q(\\mu)=\\mathcal Q^4_-(\\mu)$，得到 $Q(\\mu)=M(\\mu,\\mu_0)Q(\\mu_0)M(\\mu,\\mu_0)^{-1}$，给出 $Q$-上同调的代数质量流非重整化语句。相应的希尔伯特空间陈述具有解析资格，与维滕关于超对称量子力学的论证平行：$M$ 是非统一且无界的，因此必须控制其在可归一化域上的作用。我们通过比较 $M$ 的二次增长与每个分量 $\\mu>0$ 或 $\\mu<0$ 内 BMN 振荡器波函数的高斯衰减来制定小步准则。\n\n作为具体的检验，我们在$N=2$理论中评估这个条件，该理论的两个真空扇区建立在平凡真空和不可约模糊球真空之上。我们还计算相应 BPS 字母上的诱导 $Q_{\\rm BPS}$ 作用：在平凡扇区中，它与 $\\mathcal{N}=4$ SYM 的标准 BMN 扇区 BPS 字母微分一致，而在不可约扇区中，它消失。", "authors": [{"name": "Chi-Ming Chang"}, {"name": "Zhengyuan Du"}, {"name": "Sarthak Duary"}, {"name": "Kangning Liu"}, {"name": "Yi-Xiao Tao"}], "featured_authors": [{"name": "Chi-Ming Chang"}, {"name": "Zhengyuan Du"}, {"name": "Sarthak Duary"}, {"name": "Kangning Liu"}, {"name": "Yi-Xiao Tao"}], "author_count": 5}, {"id": "2606.05319", "category": "hep-th", "title": "Non-linear evolution of five-dimensional black strings in effective field theory", "abstract": "We use numerical relativity to study the non-linear instability of five-dimensional black strings in Einstein-Gauss-Bonnet gravity. Black strings evolve into a series of black holes joined by thinner string-like segments, but key features of the dynamics depend on the sign of the Gauss-Bonnet coupling. For positive coupling, favored by UV considerations, the growth of curvature invariants is limited within the validity of effective field theory (EFT), suggesting a mechanism for restoring weak cosmic censorship. For negative coupling this cap is absent and curvatures may grow until the EFT breaks down.", "url": "https://arxiv.org/abs/2606.05319", "type": "理论", "summary": "我们利用数值相对论来研究爱因斯坦-高斯-博内引力中五维黑弦的非线性不稳定性。黑弦演化成一系列由更细的弦状片段连接起来的黑洞，但动力学的关键特征取决于高斯-博内耦合的符号。对于受到紫外线考虑的正耦合，曲率不变量的增长受到有效场论（EFT）有效性的限制，这表明了一种恢复弱宇宙审查的机制。对于负耦合，该上限不存在，并且曲率可能会增长，直到 EFT 崩溃。", "authors": [{"name": "Pau Figueras"}, {"name": "Áron D. Kovács"}, {"name": "Shunhui Yao"}], "featured_authors": [{"name": "Pau Figueras"}, {"name": "Áron D. Kovács"}, {"name": "Shunhui Yao"}], "author_count": 3}, {"id": "2606.05370", "category": "hep-th", "title": "Novel $\\mathcal{N}=2$ higher-spin supercurrents", "abstract": "We study cubic interactions of $\\mathcal N=2$ massless integer-spin gauge supermultiplets in harmonic superspace. We construct the complete class of abelian $(\\mathbf{s},\\mathbf{s_1},\\mathbf{s_2})$ cubic vertices with the minimal number of space-time derivatives. Such vertices exist only for $\\mathbf{s}\\geq \\mathbf{s_1}+\\mathbf{s_2}$ and universally take the form of the gauge prepotential coupled to the conserved higher-spin supercurrent. For~$\\mathbf{s_1}\\neq\\mathbf{s_2}$, we find the novel complex principal supercurrent, whose real and imaginary parts generate the parity-invariant and the parity-breaking interactions, respectively. The supercurrents are constructed from gauge-invariant $\\mathcal N=2$ higher-spin Weyl supertensors associated with the spin-$\\mathbf{s_1}$ and spin-$\\mathbf{s_2}$ gauge multiplets. These supertensors are defined in terms of unconstrained higher-spin analytic prepotentials. We also derive the complete set of conserved component higher-spin currents associated with the $(s,s_1,s_2)$ vertices, including both traceless currents and currents with the non-vanishing trace.", "url": "https://arxiv.org/abs/2606.05370", "type": "理论", "summary": "我们研究调和超空间中 $\\mathcal N=2$ 无质量整数自旋规范超多重态的立方相互作用。我们用最少数量的时空导数构建了完整的阿贝尔$(\\mathbf{s},\\mathbf{s_1},\\mathbf{s_2})$立方顶点类。这样的顶点仅存在于 $\\mathbf{s}\\geq \\mathbf{s_1}+\\mathbf{s_2}$ 中，并且普遍采用与守恒的高自旋超流耦合的规范预势的形式。对于~$\\mathbf{s_1}\\neq\\mathbf{s_2}$，我们找到了新颖的复主超流，其实部和虚部分别产生宇称不变和宇称破缺相互作用。超电流是由与自旋 $\\mathbf{s_1}$ 和自旋 $\\mathbf{s_2}$ 规范多重态相关的规范不变 $\\mathcal N=2$ 高自旋 Weyl 超张量构成的。这些超张量是根据无约束的高自旋解析预势来定义的。我们还推导了与 $(s,s_1,s_2)$ 顶点相关的完整的守恒分量高自旋电流，包括无迹电流和非消失迹电流。", "authors": [{"name": "Nikita Zaigraev"}], "featured_authors": [{"name": "Nikita Zaigraev"}], "author_count": 1}, {"id": "2606.05388", "category": "hep-th", "title": "BPS Non-Renormalization in the BMN Matrix Model", "abstract": "We show in the $(0+1)$-dimensional Berenstein-Maldacena-Nastase matrix model, dual to M-theory on a pp-wave background, that the coupling can be changed between any two finite, non-zero values using a special class of deformations, known as conjugation deformations. Importantly, we prove that they preserve normalizability of the states. This implies that BPS states in the model cannot lift as the couplings are varied, and hence their (unsigned) number cannot change, except at the free point and Banks-Fischler-Shenker-Susskind point.", "url": "https://arxiv.org/abs/2606.05388", "type": "理论", "summary": "我们在 $(0+1)$ 维 Berenstein-Maldacena-Nastase 矩阵模型（与 pp 波背景上的 M 理论对偶）中表明，可以使用一类特殊的变形（称为共轭变形）在任意两个有限的非零值之间改变耦合。重要的是，我们证明它们保持了国家的正常化。这意味着模型中的 BPS 状态不能随着耦合的变化而提升，因此它们的（无符号）数不能改变，除了自由点和 Banks-Fischler-Shenker-Susskind 点。", "authors": [{"name": "Sean Colin-Ellerin"}, {"name": "Kyriakos Papadodimas"}], "featured_authors": [{"name": "Sean Colin-Ellerin"}, {"name": "Kyriakos Papadodimas"}], "author_count": 2}, {"id": "2606.05401", "category": "hep-th", "title": "Carrollian holography with agentic AI: Real mass is imaginary", "abstract": "We introduce LACIA, a verification-driven agentic AI workflow for theoretical physics, and apply it with independent human checks to construct Carrollian conformal bases. We develop the Poincare-Carrollian intertwiner as the central method. It reproduces the celestial and Carrollian conformal bases for massless particles and constructs the missing Carrollian bases for massive and tachyonic particles. The massive basis requires a complex momentum shift in scattering amplitudes.", "url": "https://arxiv.org/abs/2606.05401", "type": "理论", "summary": "我们引入了 LACIA，一种用于理论物理的验证驱动的代理 AI 工作流程，并将其与独立的人工检查一起应用来构建卡罗尔共形基。我们开发了庞加莱-卡罗尔交织器作为核心方法。它再现了无质量粒子的天体和卡罗尔共形基底，并为大质量和快子粒子构造了缺失的卡罗尔基底。巨大的基础需要散射幅度的复杂动量变化。", "authors": [{"name": "Reiko Liu"}, {"name": "Wen-Jie Ma"}, {"name": "Hu Zheng"}, {"name": "Yu-fan Zheng"}], "featured_authors": [{"name": "Reiko Liu"}, {"name": "Wen-Jie Ma"}, {"name": "Hu Zheng"}, {"name": "Yu-fan Zheng"}], "author_count": 4}, {"id": "2606.05431", "category": "hep-th", "title": "Optical properties of gravitating strings", "abstract": "We study the optical properties of gravitating Abelian-Higgs cosmic strings and compare them with those of the idealized infinitely thin string. We analyze the structure of the corresponding vortex solutions, characterizing their width, curvature profile, and approach to the ideal string limit. By investigating photon propagation in the string spacetime, we show that the finite core of the vortex gives rise to distinctive observational signatures absent in the ideal string approximation, including a characteristic triple-imaging configuration, strong demagnification of the central image, and a nontrivial Shapiro time delay between external and internal images. We determine how these effects depend on the parameters of the Abelian-Higgs model and show that the sign of the time delay is controlled by the ratio of the gauge boson mass to the Higgs boson mass, causing the string core to behave as either a temporal shortcut or a temporal barrier. Our results demonstrate that lensing effects can reveal information about the vortex formation and internal structure.", "url": "https://arxiv.org/abs/2606.05431", "type": "理论", "summary": "我们研究了引力阿贝尔-希格斯宇宙弦的光学特性，并将其与理想化的无限细弦的光学特性进行了比较。我们分析了相应涡旋解的结构，表征了它们的宽度、曲率轮廓和理想弦极限的方法。通过研究弦时空中的光子传播，我们表明涡旋的有限核心产生了理想弦近似中不存在的独特观测特征，包括特征三成像配置、中心图像的强烈缩小以及外部和内部图像之间的重要夏皮罗时间延迟。我们确定了这些效应如何取决于阿贝尔-希格斯模型的参数，并表明时间延迟的符号是由规范玻色子质量与希格斯玻色子质量之比控制的，导致弦核心表现为时间捷径或时间障碍。我们的结果表明，透镜效应可以揭示有关涡流形成和内部结构的信息。", "authors": [{"name": "Marcos Silva"}, {"name": "Azadeh Mohammadi"}], "featured_authors": [{"name": "Marcos Silva"}, {"name": "Azadeh Mohammadi"}], "author_count": 2}, {"id": "2606.05500", "category": "hep-th", "title": "The spectrum of the bosonic ambitwistor string revisited", "abstract": "We revisit the calculation of the spectrum of the bosonic ambitwistor string, understood as the BRST cohomology or, equivalently, as the semi-infinite cohomology of the $\\mathrm{BMS}_3$ Lie algebra relative to the centre with values in a particular module. We work in momentum space, which allows us to work algebraically and interpret the BRST cohomology as inducing representations of the Poincaré group. In agreement with the existing literature, we find that all the cohomology resides in the massless sector, but a careful representation-theoretic analysis of the spectrum reveals, in addition to the usual massless sector of the closed bosonic string (dilaton, metric and Kalb--Ramond field), also a massless vector. We devote a large part of the paper to describing the cohomology at a massless momentum $p$ as a module over the stabiliser $H$ of $p$ in the Lorentz group, a task which is made difficult due to $H$ not acting reducibly when $p\\neq 0$. This allows us to conclude that the spectrum is not unitary, forbidding the interpretation of the extra massless vector as a Maxwell field.", "url": "https://arxiv.org/abs/2606.05500", "type": "理论", "summary": "我们重新审视玻色子双扭弦谱的计算，将其理解为 BRST 上同调，或者等效地理解为 $\\mathrm{BMS}_3$ 李代数相对于特定模中的值的中心的半无限上同调。我们在动量空间中工作，这使我们能够进行代数工作并将 BRST 上同调解释为庞加莱群的归纳表示。与现有文献一致，我们发现所有上同调都位于无质量部分，但对频谱的仔细表示理论分析表明，除了封闭玻色弦（膨胀、度量和卡尔布-拉蒙德场）的通常无质量部分之外，还有一个无质量矢量。我们用本文的大部分内容来描述无质量动量 $p$ 下的上同调，作为洛伦兹群中 $p$ 的稳定器 $H$ 上的一个模块，这项任务由于 $H$ 在 $p\\neq 0$ 时不能简化而变得困难。这使我们得出结论，谱不是单一的，禁止将额外的无质量矢量解释为麦克斯韦场。", "authors": [{"name": "José M. Figueroa-O'Farrill"}, {"name": "Girish S. Vishwa"}], "featured_authors": [{"name": "José M. Figueroa-O'Farrill"}, {"name": "Girish S. Vishwa"}], "author_count": 2}, {"id": "2606.05505", "category": "hep-th", "title": "Dirichlet walls and the end of time", "abstract": "We study evolution in Einstein-Hilbert gravity with Dirichlet boundary conditions imposed on a finite surface. We argue that there are open sets of initial data where such evolutions terminate at finite times due to singularities that reach the boundary. In any dimension, the simplest such examples occur in cosmologies. However, in 2+1 dimensions we also show that Dirichlet walls initially outside a BTZ black hole can fall through the horizon, and that this also leads to generic singularities. A similar construction in higher dimensions leads to trapped surfaces that reach the wall, though the end result of such evolutions is more difficult to study.", "url": "https://arxiv.org/abs/2606.05505", "type": "理论", "summary": "我们通过在有限表面上施加狄利克雷边界条件来研究爱因斯坦-希尔伯特引力的演化。我们认为，存在开放的初始数据集，其中由于到达边界的奇点，此类演化在有限时间终止。在任何维度中，最简单的例子都出现在宇宙学中。然而，在 2+1 维度中，我们还表明，BTZ 黑洞外部最初的狄利克雷壁可以穿过视界，这也会导致通用奇点。更高维度的类似结构会导致被困表面到达墙壁，尽管这种演变的最终结果更难以研究。", "authors": [{"name": "Hanako Helton"}, {"name": "Gary T. Horowitz"}, {"name": "Donald Marolf"}], "featured_authors": [{"name": "Hanako Helton"}, {"name": "Gary T. Horowitz"}, {"name": "Donald Marolf"}], "author_count": 3}, {"id": "2606.05530", "category": "hep-th", "title": "Hodge theory and $G_4$ fluxes in weighted projective spaces: Galois action", "abstract": "We extend the explicit study of $G_4$-fluxes and general Hodge cycles from the ordinary Fermat sextic fourfold to tame Fermat-type hypersurfaces in weighted projective space. The main new feature in the weighted setting is that the Galois action on the cyclotomic period data need not preserve the $(2,2)$-subspace. As a consequence, the rational reconstruction of an integral self-dual class can involve additional middle-cohomology components, increasing the norm of the corresponding flux. We work at maximally symmetric Fermat points, where the period matrices and symmetry-invariant Hodge loci can be computed explicitly. Using Movasati's description of periods, cyclotomic period matrices, and Hermite/Smith normal form reductions, we construct the relevant integral lattices of symmetric self-dual classes in middle cohomology. This gives a controlled test of whether symmetric general Hodge cycles can satisfy the M2-brane tadpole bound. Our main conclusion is empirical. In the degree 12 example in $\\mathbb{P}_{1,1,1,1,4,4}$, and in the degree 8 weighted example used as a comparison, the shortest computed symmetric general Hodge cycles overshoot the tadpole bound. In the degree 36 example in $\\mathbb{P}_{1,1,1,9,12,12}$, which has $h^{1,1}=11$, the most general example we have, the tadpole conjecture is indeed verified at the maximally symmetric locus, although the computations get difficult and computationally expensive. These computations suggest that, in weighted Fermat examples, the relevant notion of a ``symmetric flux'' must take into account not only automorphisms of the variety but also the Galois action on the period field. Non-uniform Galois orbits provide a natural arithmetic mechanism by which symmetric Hodge classes can acquire large tadpole charge.", "url": "https://arxiv.org/abs/2606.05530", "type": "理论", "summary": "我们将$G_4$-通量和一般霍奇循环的显式研究从普通费马六次四重扩展到加权射影空间中的费马型超曲面。加权设置中的主要新功能是对分圆周期数据的伽罗瓦作用不需要保留$(2,2)$子空间。因此，积分自对偶类的理性重构可能涉及额外的中上同调分量，从而增加相应通量的范数。我们在最大对称费马点上工作，其中可以显式计算周期矩阵和对称不变霍奇轨迹。利用 Movasati 对周期、分圆周期矩阵和 Hermite/Smith 范式约简的描述，我们构造了中上同调中对称自对偶类的相关积分格。这给出了对称一般霍奇循环是否能够满足 M2 膜蝌蚪界的受控测试。我们的主要结论是经验性的。在 $\\mathbb{P}_{1,1,1,1,4,4}$ 的 12 阶示例中，以及用作比较的 8 阶加权示例中，计算出的最短对称一般霍奇循环超出了蝌蚪界。\n\n在 $\\mathbb{P}_{1,1,1,9,12,12}$ 中的 36 次示例中，其中 $h^{1,1}=11$（我们拥有的最一般的示例）中，蝌蚪猜想确实在最大对称轨迹处得到了验证，尽管计算变得困难且计算成本昂贵。这些计算表明，在加权费马例子中，“对称通量”的相关概念不仅必须考虑簇的自同构，而且还必须考虑周期场上的伽罗瓦作用。非均匀伽罗瓦轨道提供了一种自然的算术机制，对称霍奇类可以通过该机制获得大的蝌蚪电荷。", "authors": [{"name": "Hugo Fortin"}, {"name": "Daniel López Garcia"}], "featured_authors": [{"name": "Hugo Fortin"}, {"name": "Daniel López Garcia"}], "author_count": 2}, {"id": "2606.05543", "category": "hep-th", "title": "Notes on (-2)-form symmetries", "abstract": "We study $(-2)$-form symmetries of a $d$-dimensional quantum field theory, via a $(-1)$-form symmetry of its $(d+1)$-dimensional Symmetry Topological Field Theory (SymTFT), realized by a non-genuine codimension-one defect in the SymTFT bulk attached to a spacetime-filling topological operator. Unlike a $(-1)$-form symmetry of a $d$-dimensional theory, which merely shifts a parameter of the absolute theory, a $(-2)$-form symmetry modifies the SymTFT action, and thereby relates theories whose ordinary global symmetries differ by anomaly data or by the associator data of a non-invertible symmetry. We illustrate the construction in two-dimensional toy models, three-dimensional ABJM-type theories, four-dimensional generalized Yang--Mills theory, and in a fusion-categorical example relating the non-invertible symmetries $\\operatorname{Rep}(D_4)$ and $\\operatorname{Rep}(Q_8)$. We then develop a club-sandwich realization, in which a quarter-gauging operation interfaces between IR phases of distinct RG flows of a common UV theory, and an alternative realization via nested discrete gauging. Finally, we present a holographic, top-down realization in which the type IIA Romans mass plays the role of a $(-2)$-form background for a three-dimensional Chern--Simons-matter theory, with shifts of the Romans mass realizing shifts of the boundary anomaly coefficients. We also discuss related constructions for coupled bulk--boundary systems.", "url": "https://arxiv.org/abs/2606.05543", "type": "理论", "summary": "我们通过 $(d+1)$ 维对称拓扑场论 (SymTFT) 的 $(-1)$ 形式对称性来研究 $d$ 维量子场论的 $(-2)$ 形式对称性，该理论是通过附加到时空填充拓扑算子的 SymTFT 体中的非真实余维一缺陷来实现的。与 $d$ 维理论的 $(-1)$ 形式对称性不同，$(-2)$ 形式对称性仅改变绝对理论的参数，$(-2)$ 形式对称性修改了 SymTFT 作用，从而将其普通全局对称性因异常数据或不可逆对称性的关联子数据而不同的理论联系起来。我们用二维玩具模型、三维 ABJM 型理论、四维广义 Yang--Mills 理论以及与不可逆对称性 $\\operatorname{Rep}(D_4)$ 和 $\\operatorname{Rep}(Q_8)$ 相关的融合分类示例来说明构造。然后，我们开发了一种俱乐部三明治实现，其中四分之一测量操作在常见 UV 理论的不同 RG 流的 IR 阶段之间进行接口，以及通过嵌套离散测量的替代实现。\n\n最后，我们提出了一种全息的、自上而下的实现，其中IIA型罗马质量在三维陈-西蒙斯物质理论中扮演$(-2)$形式背景的角色，罗马质量的移动实现了边界异常系数的移动。我们还讨论了耦合体边界系统的相关结构。", "authors": [{"name": "Pinak Banerjee"}, {"name": "Alonso Perez-Lona"}, {"name": "Daniel Robbins"}, {"name": "Subham Roy"}, {"name": "Eric Sharpe"}, {"name": "Xingyang Yu"}], "featured_authors": [{"name": "Pinak Banerjee"}, {"name": "Alonso Perez-Lona"}, {"name": "Daniel Robbins"}, {"name": "Subham Roy"}, {"name": "Eric Sharpe"}, {"name": "Xingyang Yu"}], "author_count": 6}, {"id": "2606.05562", "category": "hep-th", "title": "Charting the different phases of Yang-Mills-Chern-Simons-Higgs theories", "abstract": "We explore Yang-Mills-Chern-Simons theories coupled to a Higgs-like field in the fundamental representation of $SU(2)$ quantized in linear covariant gauges in three Euclidean dimensions. We analyze the modifications in the analytic structure of the gluon propagator due to the elimination of infinitesimal Gribov copies. The interplay between the Higgs, the Chern-Simons and Gribov mass parameters is investigated. Two different phases are identified: a confining one, where all poles are complex, and a deconfined one, where would-be physical gluon excitation can appear. Unlike previous works, the Gribov parameter is consistently fixed by its gap equation as a function of the other mass parameters and the gauge coupling. This imposes a constraint in the parameter space and makes transparent how the competition of the mass parameters affects the relevance of the Gribov parameter for the characterization of the spectrum of the theory.", "url": "https://arxiv.org/abs/2606.05562", "type": "理论", "summary": "我们探索与希格斯场耦合的杨-米尔斯-陈-西蒙斯理论，以三个欧几里得维度的线性协变规范量子化的 $SU(2)$ 的基本表示形式。我们分析了由于消除了无穷小的 Gribov 副本而导致的胶子传播器解析结构的修改。研究了希格斯、陈-西蒙斯和格里波夫质量参数之间的相互作用。确定了两个不同的阶段：一个是限制阶段，其中所有极点都是复杂的，另一个是去限制阶段，其中可能出现物理胶子激发。与之前的工作不同，Gribov 参数始终由其间隙方程固定，作为其他质量参数和规范耦合的函数。这在参数空间中施加了约束，并使质量参数的竞争如何影响 Gribov 参数与理论谱表征的相关性变得透明。", "authors": [{"name": "Daniel O. R. Azevedo"}, {"name": "Gustavo P. de Brito"}, {"name": "Philipe De Fabritiis"}, {"name": "Antonio D. Pereira"}], "featured_authors": [{"name": "Daniel O. R. Azevedo"}, {"name": "Gustavo P. de Brito"}, {"name": "Philipe De Fabritiis"}, {"name": "Antonio D. Pereira"}], "author_count": 4}, {"id": "2606.05656", "category": "hep-th", "title": "On Quantum Aspects of 1-Form Symmetries I: BV-BRST Cohomology and Anomaly Polynomials", "abstract": "We investigate the quantum aspects of gauging continuous 1-form global symmetries. In this paper, we study the BV-BRST quantization of a $U(1)$ 2-form gauge field, described geometrically by a $U(1)$ gerbe. Starting from the local Čech data of the gerbe, we construct the corresponding infinitesimal symmetry structure in terms of a Lie 2-algebroid, and show that, together with the associated exact Courant algebroid, it provides a natural geometric framework for the BV-BRST complex of this higher-form gauge theory. In this formulation, the field-ghost tower is encoded directly in the local gerbe data, and the higher Russian formula arises naturally from the relations among the connective structure, the curving, and the 3-form curvature. We further show that the resulting Čech-de Rham bicomplex provides a natural setting for anomaly descent for $U(1)$ 1-form symmetries, and illustrate the construction with explicit examples in Maxwell theory.", "url": "https://arxiv.org/abs/2606.05656", "type": "理论", "summary": "我们研究了测量连续一型全局对称性的量子方面。在本文中，我们研究 $U(1)$ 2 型规范场的 BV-BRST 量化，由 $U(1)$ gerbe 进行几何描述。从格布的局部 Čech 数据开始，我们根据李 2 代数体构造了相应的无穷小对称结构，并表明，与相关的精确库朗代数体一起，它为这种更高形式规范理论的 BV-BRST 复合体提供了一个自然的几何框架。在这个公式中，场鬼塔直接编码在当地的戈布数据中，而更高的俄罗斯公式自然地从连接结构、弯曲和三形曲率之间的关系中产生。我们进一步表明，由此产生的 Čech-de Rham 双复形为 $U(1)$ 1 型对称性的异常下降提供了自然的设置，并用麦克斯韦理论中的明确示例说明了该结构。", "authors": [{"name": "Weizhen Jia"}, {"name": "Yi-Nan Wang"}, {"name": "Yi Zhang"}], "featured_authors": [{"name": "Weizhen Jia"}, {"name": "Yi-Nan Wang"}, {"name": "Yi Zhang"}], "author_count": 3}, {"id": "2606.05757", "category": "hep-th", "title": "Detecting Topological Transitions and Anisotropy through Multipartite Entanglement in Holographic Weyl Semimetals", "abstract": "We study multipartite entanglement structures in the zero-temperature holographic Weyl semimetal, focusing on tripartite and four-partite structures. For strip regions, we compute the conditional mutual information, the entanglement wedge cross section, tripartite measures $\\kappa$ and the Markov gap, multi-EWCS, and two multi-EWCS based four-partite signals $\\Delta$ and $g$. These quantities are studied as functions of the strip width $l$ and the tuning parameter across the topological transition. At large $l$, their $l$ dependence takes a power-law form governed by the IR scaling of the system. At fixed large $l$, all these entanglement quantities develop clear features near the critical point, showing that tripartite and four-partite entanglement structures can diagnose the topological quantum phase transition. We further study strips pointing in different directions to probe the anisotropy of the system. The anisotropic large l behavior distinguishes the nontrivial phase from the trivial phase. These results establish multipartite holographic entanglement as a sensitive, nonlocal probe of topological phase transitions and anisotropic IR physics.", "url": "https://arxiv.org/abs/2606.05757", "type": "理论", "summary": "我们研究零温全息韦尔半金属中的多部分纠缠结构，重点关注三部分和四部分结构。对于带状区域，我们计算条件互信息、纠缠楔形横截面、三方测度 $\\kappa$ 和马尔可夫间隙、多 EWCS 以及两个基于多 EWCS 的四部分信号 $\\Delta$ 和 $g$。这些量被研究为带宽度 $l$ 和跨拓扑过渡的调整参数的函数。在大的 $l$ 情况下，它们的 $l$ 依赖性采用幂律形式，由系统的 IR 缩放控制。在固定的大$l$下，所有这些纠缠量在临界点附近都呈现出清晰的特征，表明三部分和四部分纠缠结构可以诊断拓扑量子相变。我们进一步研究指向不同方向的条带以探测系统的各向异性。各向异性大 l 行为将非平凡相与平凡相区分开来。这些结果将多部分全息纠缠确立为拓扑相变和各向异性红外物理的敏感非局域探针。", "authors": [{"name": "Xiantong Chen"}, {"name": "Xuanting Ji"}, {"name": "Wen-Peng Li"}, {"name": "Ya-Wen Sun"}], "featured_authors": [{"name": "Xiantong Chen"}, {"name": "Xuanting Ji"}, {"name": "Wen-Peng Li"}, {"name": "Ya-Wen Sun"}], "author_count": 4}, {"id": "2606.05978", "category": "hep-th", "title": "Lecture notes: Introduction to the Off-shell Double Copy Program", "abstract": "The present notes are based on a series of lectures prepared for an introductory eight-class course on the modern framework of the off-shell double copy. The course was held from April 16 to May 4, 2026, at Universidad de Buenos Aires (UBA). These lectures, aimed at PhD and master's students, are self-contained and require only a basic knowledge of classical field theory. The main goal is to review the fundamental concepts of gauge and gravitational theories in order to explore the off-shell frameworks of the single and double copy. In the final part of the course, we explore modern approaches to reinterpreting the single and double copy within T-duality-invariant frameworks.", "url": "https://arxiv.org/abs/2606.05978", "type": "理论", "summary": "本笔记基于为有关脱壳双副本现代框架的八节介绍性课程准备的一系列讲座。该课程于2026年4月16日至5月4日在布宜诺斯艾利斯大学（UBA）举行。这些讲座针对博士生和硕士生，内容独立，只需要经典场论的基础知识。主要目标是回顾规范和引力理论的基本概念，以探索单副本和双副本的离壳框架。在课程的最后部分，我们探索在 T 对偶不变框架内重新解释单副本和双副本的现代方法。", "authors": [{"name": "Eric Lescano"}], "featured_authors": [{"name": "Eric Lescano"}], "author_count": 1}, {"id": "2606.06221", "category": "hep-th", "title": "Chiral symmetry breaking in models with unconventional supersymmetry", "abstract": "We investigate dynamical mass generation in a geometrically constructed gauge theory based on the super Lie algebra $su(2,2|3)$, in which gravity, Yang-Mills fields, and fermions are unified as components of a single gauge connection. The model contains no elementary scalar fields and no ad hoc four-fermion interactions. Instead, fermionic self-interactions arise unavoidably from the geometric structure of the theory, through nonminimal couplings and torsion associated with the unified connection. Upon reduction to an effective low-energy description, these interactions generate a Nambu-Jona-Lasinio--type potential that triggers chiral symmetry breaking and the formation of a fermion mass gap. In this framework, mass generation emerges as a direct consequence of the underlying gauge-geometric and algebraic structure, rather than as an independent dynamical assumption.", "url": "https://arxiv.org/abs/2606.06221", "type": "理论", "summary": "我们研究基于超李代数 $su(2,2|3)$ 的几何构造规范理论中的动态质量生成，其中重力、杨米尔斯场和费米子统一为单个规范连接的组成部分。该模型不包含基本标量场，也不包含特别的四费米子相互作用。相反，费米子自相互作用不可避免地从理论的几何结构中产生，通过与统一连接相关的非最小耦合和扭转。在简化为有效的低能描述后，这些相互作用会产生 Nambu-Jona-Lasinio 型势，触发手性对称性破缺并形成费米子质量间隙。在这个框架中，质量生成是作为底层规范几何和代数结构的直接结果出现的，而不是作为独立的动力学假设。", "authors": [{"name": "Pedro D. Alvarez"}, {"name": "Cristian Villavicencio"}, {"name": "Jorge Zanelli"}], "featured_authors": [{"name": "Pedro D. Alvarez"}, {"name": "Cristian Villavicencio"}, {"name": "Jorge Zanelli"}], "author_count": 3}, {"id": "2606.06277", "category": "hep-th", "title": "A note on the 2D NLSM free energy", "abstract": "This note contains the perturbative computation of the 2D non-linear sigma model (NLSM) energy-density in a chemical potential $h$, at the fourth order in the coupling constant expansion. The result is in fully agreement with the $h\\rightarrow \\infty$ asymptotics extracted from the thermodynamical Bethe ansatz (TBA).", "url": "https://arxiv.org/abs/2606.06277", "type": "理论", "summary": "本说明包含化学势 $h$ 中耦合常数展开四阶的二维非线性 sigma 模型 (NLSM) 能量密度的微扰计算。结果与从热力学 Bethe ansatz (TBA) 中提取的 $h\\rightarrow \\infty$ 渐近线完全一致。", "authors": [{"name": "Yizhuang Liu"}], "featured_authors": [{"name": "Yizhuang Liu"}], "author_count": 1}, {"id": "2606.06326", "category": "hep-th", "title": "Spinning bulk-to-boundary correlators in the massless theories with Poincaré symmetry", "abstract": "We classify the bulk-to-boundary correlators for general integer-spin $s$ operators in a Poincaré-invariant theory by imposing suitable fall-off conditions near future/past null infinity. Any bulk-to-boundary correlator is a linear superposition of a set of basic tensor structures fixed by the little group \\text{ISO}(2) of massless particles. We map the independent tensor structures to all possible non-crossing double-line diagrams. A further mapping of the double-line diagrams to circular diagrams shows that all independent tensor structures are tensor products of loop diagrams. By extrapolating the bulk-to-boundary correlators to boundary-to-boundary correlators, we find a rich structure for general spin-$s$ operators. Furthermore, we show that the extrapolated operator lies in a type Ib spin-$s$ multiplet representation of Carrollian conformal field theory (CCFT). This is a net representation that generated by the Wigner translation generators.", "url": "https://arxiv.org/abs/2606.06326", "type": "理论", "summary": "我们通过在未来/过去零无穷大附近施加适当的衰减条件，对庞加莱不变理论中一般整数自旋 $s$ 算子的体到边界相关器进行分类。任何体到边界相关器都是由无质量粒子的小群 \\text{ISO}(2) 固定的一组基本张量结构的线性叠加。我们将独立张量结构映射到所有可能的不交叉双线图。双线图到圆形图的进一步映射表明，所有独立张量结构都是环图的张量积。通过将批量到边界相关器外推到边界到边界相关器，我们发现了通用自旋$s$运算符的丰富结构。此外，我们表明外推算子位于卡罗尔共形场论（CCFT）的 Ib 型自旋$s$多重表示中。这是由维格纳翻译生成器生成的网络表示。", "authors": [{"name": "Jiang Long"}, {"name": "Yu-Xuan Wei"}, {"name": "Xin-Hao Zhou"}], "featured_authors": [{"name": "Jiang Long"}, {"name": "Yu-Xuan Wei"}, {"name": "Xin-Hao Zhou"}], "author_count": 3}, {"id": "2606.06372", "category": "hep-th", "title": "Quantum Geometry from Area Fluctuations", "abstract": "We construct a quantum-statistical analogue of Einstein's fluctuation argument for black-body radiation in the context of causal-diamond geometry. Starting from the phase space of a stretched horizon inside a Minkowski causal diamond, we quantize the Poisson algebra generated by the fields averaged over stretched-horizon time. We then compute the fluctuations of the averaged area density of the transverse two-spheres in a thermal state constructed in analogue with the black-body thermal state. In the null limit, where the stretched horizon approaches the causal-diamond boundary, this yields a thermal fluctuation formula of the boundary area operator that contains two terms, in direct analogue with the black-body radiation. The term quadratic in the expectation value is the ``classical'' contribution, while the linear term has the Verlinde--Zurek scaling characteristic of independent microscopic constituents. In direct analogue with Einstein's interpretation of black-body energy fluctuations as evidence for light quanta, we interpret the linear area-fluctuation term as a statistical signature of discrete quanta of geometry. This provides bottom-up evidence for quantum area degrees of freedom and supports the embadon picture of null quantum geometry.", "url": "https://arxiv.org/abs/2606.06372", "type": "理论", "summary": "我们在因果钻石几何的背景下构建了爱因斯坦关于黑体辐射的涨落论证的量子统计模拟。从闵可夫斯基因果菱形内部拉伸视界的相空间开始，我们量化由在拉伸视界时间上平均的场生成的泊松代数。然后，我们计算与黑体热态类似构造的热态中横向两个球体的平均面密度的波动。在零极限中，拉伸的视界接近因果菱形边界，这产生了边界面积算子的热涨落公式，其中包含两项，与黑体辐射直接类似。期望值中的二次项是“经典”贡献，而线性项具有独立微观成分的 Verlinde-Zurek 标度特征。与爱因斯坦对黑体能量波动作为光量子证据的解释直接类似，我们将线性面积波动项解释为几何离散量子的统计特征。\n\n这为量子区域自由度提供了自下而上的证据，并支持了零量子几何的嵌入图。", "authors": [{"name": "Jerzy Kowalski-Glikman"}, {"name": "Ludovic Varrin"}], "featured_authors": [{"name": "Jerzy Kowalski-Glikman"}, {"name": "Ludovic Varrin"}], "author_count": 2}, {"id": "2606.06404", "category": "hep-th", "title": "Smooth horizons from topology change in canonical quantum gravity", "abstract": "We propose a resolution of the firewall paradox in JT gravity by incorporating topology change into canonical quantization under relational time evolution. The gravitational Hamiltonian acts on the black hole interior through a pair of pants interaction, mapping between a single interior sector and a connected two interior sector. To describe dynamics in the interior while keeping track of the exterior, we pass to an extended phase space description obtained by splitting the bulk Hilbert space across the event horizon. The split introduces boost edge modes at the horizon, which the Hawking modes become gravitationally dressed to. Covariance of the resulting crossed product algebra provides a precise gravitational realization of the firewall: a one sided boost of the interior edge mode relative to the exterior holding the matter fixed, or equivalently, a relative phase between the interior and exterior Hawking partners holding the edge modes fixed. Although each topology changing transition is exponentially suppressed, evolution over a Page time causes the connected two interior branch to dominate. One of these is the naive semiclassical interior, which we show carries a nontrivial one sided boost upon gluing the interior back to the exterior, and hence a firewall. The other interior is shown to be a zero mode of the one sided boost generator. Gluing the interior back to the exterior quotients by the gravitational constraints, which annihilates the firewall branch. On the surviving branch, we show the horizon vacuum measurement and the early radiation purity measurement become the same Dirac observable. Equivalently, we show that Page time dynamics induces a large diffeomorphism on the connected branch under which the operator algebra of the interior Hawking partner and that of the decoded early radiation are identified.", "url": "https://arxiv.org/abs/2606.06404", "type": "理论", "summary": "我们提出通过将拓扑变化纳入关系时间演化下的规范量化来解决 JT 引力中的防火墙悖论。引力哈密顿量通过裤子相互作用作用于黑洞内部，在单个内部扇区和相连的两个内部扇区之间进行映射。为了在跟踪外部的同时描述内部的动力学，我们通过在事件视界上分割大量希尔伯特空间来获得扩展的相空间描述。这种分裂在地平线上引入了增强边缘模式，霍金模式受到引力影响。由此产生的交叉积代数的协方差提供了防火墙的精确引力实现：内部边缘模式相对于外部保持物质固定的单向增强，或者等效地，内部和外部霍金伙伴之间的相对相位保持边缘模式固定。尽管每个拓扑变化的转变都会被指数抑制，但页面时间的演变会导致连接的两个内部分支占主导地位。\n\n其中之一是朴素的半古典内饰，我们展示的它在将内部粘回外部时带来了不平凡的单面提升，从而形成了防火墙。另一个内部显示为单侧升压发生器的零模式。通过重力约束将内部胶粘回外部商，从而消灭了防火墙分支。在幸存的分支上，我们表明地平线真空测量和早期辐射纯度测量成为相同的狄拉克可观测量。同样，我们表明，页时间动力学在连接的分支上引起了大的微分同胚，在该微分同胚下，内部霍金伙伴的算子代数和解码的早期辐射的算子代数被识别。", "authors": [{"name": "Venkatesa Chandrasekaran"}], "featured_authors": [{"name": "Venkatesa Chandrasekaran"}], "author_count": 1}, {"id": "2606.05204", "category": "math-ph", "title": "xCPS: an xAct package for covariant phase space, Noether charges, and entropy", "abstract": "xCPS is an xAct tensor algebra package for symbolic computations within the covariant phase space formalism of field theories. From a generic Lagrangian, xCPS automates the derivation of equations of motion and symplectic currents. It systematically determines whether an infinitesimal transformation in the space of fields is a Noether symmetry and computes the associated Noether charge. Additionally, xCPS can in many cases determine whether a tensorial expression is a divergence and, if so, find its divergence potential. By implementing vertical exterior calculus through a graded, supercommutative wedge product and vertical operators, the package enables efficient computations in gauge theories and higher-derivative models of gravity, including the derivation of thermodynamic quantities like Wald's entropy. xCPS is open-source under the GPL license and available at this https URL .", "url": "https://arxiv.org/abs/2606.05204", "type": "理论", "summary": "xCPS 是一个 xAct 张量代数包，用于场论协变相空间形式中的符号计算。 xCPS 从通用拉格朗日算子中自动推导运动方程和辛电流。它系统地确定场空间中的无穷小变换是否是诺特对称性并计算相关的诺特电荷。此外，xCPS 在许多情况下可以确定张量表达式是否发散，如果是，则找到其发散潜力。通过分级、超交换楔积和垂直算子实现垂直外部微积分，该软件包能够在规范理论和重力的高导数模型中进行高效计算，包括诸如沃尔德熵之类的热力学量的推导。 xCPS 是 GPL 许可证下的开源软件，可通过 https URL 获取。", "authors": [{"name": "Juan Margalef-Bentabol"}], "featured_authors": [{"name": "Juan Margalef-Bentabol"}], "author_count": 1}, {"id": "2606.05217", "category": "math-ph", "title": "The Score Hamiltonian: Mapping Diffusion Models to Adiabatic Transport", "abstract": "We exhibit an exact correspondence between sampling with score-based diffusion models and adiabatic transport of ground states for a family of Schrödinger operators we call Score Hamiltonians, built from the learned score's quantum potential. We obtain novel density reconstruction bounds and principled annealing schedules via adiabatic theorems for Fokker-Planck equations with time-varying potentials. We find the fundamental limit of sampling is set by the ratio of squared score-matching error to Score Hamiltonian spectral gap - the inverse Poincaré constant of the data density.", "url": "https://arxiv.org/abs/2606.05217", "type": "理论", "summary": "我们展示了基于分数的扩散模型的采样与一系列薛定谔算子（我们称为分数哈密顿量）的基态绝热传输之间的精确对应关系，这些算子是根据学习分数的量子势构建的。我们通过具有时变势的 Fokker-Planck 方程的绝热定理获得了新的密度重建界限和原则退火方案。我们发现采样的基本限制是由平方分数匹配误差与分数哈密顿谱间隙（数据密度的逆庞加莱常数）的比率决定的。", "authors": [{"name": "Peter Halmos"}, {"name": "Boris Hanin"}], "featured_authors": [{"name": "Peter Halmos"}, {"name": "Boris Hanin"}], "author_count": 2}, {"id": "2606.05416", "category": "math-ph", "title": "Universal deformations and universal residual stresses in incompressible isotropic Cauchy elasticity", "abstract": "We study universal deformations in incompressible isotropic Cauchy elastic solids with residual stress, without assuming any specific origin for the residual stress. Starting from the constitutive representation of the Cauchy stress as an isotropic tensor-valued function of strain and residual stress, we derive the universality constraints for residually-stressed incompressible isotropic Cauchy elastic solids. We show that for the six known families of universal deformations the set of universal deformations is identical to that of incompressible isotropic elasticity in the absence of residual stress. We also show that residual stress does not enlarge the space of universal deformations. We then determine the universal residual stress fields corresponding to the six known families of universal deformations. Assuming that the residual stress field has the same symmetry as the corresponding universal deformation, the universality constraints reduce to systems of ordinary differential equations that can be solved explicitly. The resulting universal residual stress fields are characterized and discussed for each family.", "url": "https://arxiv.org/abs/2606.05416", "type": "理论", "summary": "我们研究具有残余应力的不可压缩各向同性柯西弹性固体中的通用变形，而不假设残余应力的任何特定来源。从柯西应力作为应变和残余应力的各向同性张量值函数的本构表示出发，我们推导了残余应力不可压缩各向同性柯西弹性固体的普遍性约束。我们表明，对于六个已知的通用变形族，通用变形集与没有残余应力的情况下不可压缩各向同性弹性的集合相同。我们还表明，残余应力不会扩大通用变形的空间。然后，我们确定与六个已知的通用变形族相对应的通用残余应力场。假设残余应力场与相应的通用变形具有相同的对称性，则通用性约束简化为可以显式求解的常微分方程组。对每个族所产生的通用残余应力场进行了表征和讨论。", "authors": [{"name": "Arash Yavari"}], "featured_authors": [{"name": "Arash Yavari"}], "author_count": 1}, {"id": "2606.05542", "category": "math-ph", "title": "Thermalization with Gaussian Quantum Cellular Automata", "abstract": "We study the long-time dynamics of many-body bosonic lattice systems under translation-invariant Gaussian quantum cellular automata. We formulate two sets of conditions on GQCAs which separately guarantee thermalization of any state on the local Weyl algebra to the infinite temperature state, whenever the state is locally normal and has uniformly bounded particle density. Our main intermediate result is a quantum many-body generalization of the classic Riemann-Lebesgue lemma which is a bound on expectation values of local Weyl operators involving their support and the state's particle density.", "url": "https://arxiv.org/abs/2606.05542", "type": "理论", "summary": "我们研究平移不变高斯量子细胞自动机下多体玻色子晶格系统的长期动力学。我们在 GQCA 上制定了两组条件，分别保证局部 Weyl 代数上的任何状态热化到无限温度状态，只要该状态是局部正规的并且具有均匀有界粒子密度。我们的主要中间结果是经典黎曼-勒贝格引理的量子多体推广，该引理是局部外尔算子期望值的界限，涉及其支持和状态的粒子密度。", "authors": [{"name": "Roman Geiko"}, {"name": "Jake Gerenraich"}], "featured_authors": [{"name": "Roman Geiko"}, {"name": "Jake Gerenraich"}], "author_count": 2}, {"id": "2606.05590", "category": "math-ph", "title": "A stochastic model for fog forecasting", "abstract": "Despite significant advancements in parameterizations of boundary layer processes, forecasting, and nowcasting low-level clouds using numerical models remain challenging. The purpose of this study is to test a prototype of a high-resolution stochastic-deterministic model designed to simulate the life cycle of fog cover based on the Ising model from statistical mechanics. The case of advection fog around St. John's Airport in Newfoundland (Canada) has been considered. The model demonstrates promising capabilities in forecasting mean fog cover and replicating the horizontal structure observed in satellite imagery, including bands, rolls, and closed or open cells. We evaluate the model's predictive skill by analyzing its effectiveness in reproducing the evolution of fog cover across three representative cases. A contingency table and associated performance metrics are used to assess its accuracy.", "url": "https://arxiv.org/abs/2606.05590", "type": "理论", "summary": "尽管边界层过程参数化取得了重大进展，但使用数值模型预测和预报低层云仍然具有挑战性。本研究的目的是测试高分辨率随机确定性模型的原型，该模型旨在基于统计力学的伊辛模型来模拟雾盖的生命周期。我们考虑了加拿大纽芬兰圣约翰机场周围平流雾的情况。该模型在预测平均雾覆盖和复制卫星图像中观察到的水平结构（包括带状、卷动以及闭合或开放单元）方面展示了良好的能力。我们通过分析模型在三个代表性案例中重现雾覆盖演变的有效性来评估模型的预测能力。列联表和相关的性能指标用于评估其准确性。", "authors": [{"name": "Elsa Cardoso-Bihlo"}, {"name": "Boualem Khouider"}], "featured_authors": [{"name": "Elsa Cardoso-Bihlo"}, {"name": "Boualem Khouider"}], "author_count": 2}, {"id": "2606.05973", "category": "math-ph", "title": "Liouville-Preserving Hamiltonian Scattering on Finite Metric Graphs", "abstract": "A metric graph with a mechanical Hamiltonian on each edge does not, by itself, define a deterministic classical motion through a branching vertex: conservation of energy fixes only the outgoing speed, not the outgoing edge-end. We study the deterministic problem obtained after this missing vertex datum is supplied. On each edge $e$, with coordinate $q\\in[0,\\ell_e]$, the Hamiltonian is $H_e(q,p)=p^2/2+V_e(q)$, where $V$is continuous on the graph and $C^2$ on every edge. At each vertex we prescribe an energy-preserving Borel isomorphism from incoming to outgoing nonzero boundary covectors. The resulting phase space is the measurable quotient that identifies each incoming boundary covector with its prescribed outgoing one. After excluding the finitely many energy levels $V(v)$, the edgewise Hamilton equations and the vertex laws concatenate to a global one-parameter group of bimeasurable transformations. The group preserves energy and the quotient measure induced by the edgewise Liouville measures $dq\\,dp$. The proof uses no smooth symplectic structure on the quotient; the invariance follows from ordinary edgewise Liouville invariance, a uniform no-Zeno estimate on compact regular energy windows, and preservation of the transverse Liouville flux $r\\,dr$ by the speedwise vertex permutations. If the vertex laws are compatible with momentum reversal, then the quotient dynamics is reversible. On regular energy surfaces satisfying the usual regular-value condition, the induced time-parametrization measure is invariant as well.", "url": "https://arxiv.org/abs/2606.05973", "type": "理论", "summary": "每条边上都有机械哈密顿量的度量图本身并不能定义通过分支顶点的确定性经典运动：能量守恒仅固定传出速度，而不固定传出边缘末端。我们研究提供缺失的顶点数据后获得的确定性问题。在每条边 $e$ 上，坐标为 $q\\in[0,\\ell_e]$，哈密顿量为 $H_e(q,p)=p^2/2+V_e(q)$，其中 $V$ 在图上连续，$C^2$ 在每条边上连续。在每个顶点，我们规定从传入到传出的非零边界协向量的能量守恒 Borel 同构。得到的相空间是可测量的商，它标识每个输入边界协向量与其规定的输出边界协向量。排除有限多个能级 $V(v)$ 后，边向哈密顿方程和顶点定律连接成全局单参数双可测变换组。该群保留能量以及由边向刘维尔测度 $dq\\,dp$ 引起的商测度。\n\n该证明在商上没有使用平滑辛结构；该不变性源自普通的边向刘维尔不变性、紧致正则能量窗的统一非芝诺估计以及通过速度方向顶点排列保存横向刘维尔通量 $r\\,dr$。如果顶点定律与动量反转兼容，则商动力学是可逆的。在满足通常规则值条件的规则能量表面上，诱导的时间参数化测度也是不变的。", "authors": [{"name": "Philip Hierhager"}], "featured_authors": [{"name": "Philip Hierhager"}], "author_count": 1}, {"id": "2606.05197", "category": "quant-ph", "title": "Reply to \"Interpreting Bohm quantum potentials in `Computing quantum waves exactly from classical action'\"", "abstract": "The recent arXiv posting arXiv:2605.20443 by Lohmiller and Slotine attempts to address the omission of the Bohm quantum potential in their proposed exact equivalence between classical action and the Schrödinger equation. They introduce a position-dependent time transformation to argue that the spatial derivatives of the probability density amplitude vanish for the Feynman kernel. A rigorous mathematical examination of this transformation reveals a violation of the multivariable chain rule. The spatial derivatives do not vanish in the physical reference frame. The mathematical framework presented by the authors remains identical to the well-established semiclassical Van Vleck propagator, which is exact exclusively for quadratic potentials.", "url": "https://arxiv.org/abs/2606.05197", "type": "理论", "summary": "Lohmiller 和 Slotine 最近发布的 arXiv 文章 arXiv:2605.20443 试图解决他们提出的经典作用与薛定谔方程之间的精确等价中玻姆量子势的遗漏问题。他们引入了位置相关的时间变换来证明费曼核的概率密度振幅的空间导数消失。对这种变换的严格数学检查揭示了对多变量链式法则的违反。空间导数在物理参考系中不会消失。作者提出的数学框架与完善的半经典范弗莱克传播器相​​同，它专门针对二次势。", "authors": [{"name": "Gabor Vattay"}], "featured_authors": [{"name": "Gabor Vattay"}], "author_count": 1}, {"id": "2606.05278", "category": "quant-ph", "title": "Frustrated superradiant phases in one- and two-dimensional lattices", "abstract": "Understanding how frustration and symmetry breaking shape collective behavior is a central problem in quantum many-body systems. In this work, we investigate this problem in large one- and two-dimensional arrays of coupled Dicke models on a periodic lattice, where strong light-matter coupling gives rise to a superradiant phase and competition between neighboring order parameters induces spontaneous translational symmetry breaking. Such Dicke lattice models constitute a fundamentally new class of quantum many-body systems, as they simultaneously realize the thermodynamic limit associated with the lattice size and an intrinsic thermodynamic limit arising from collective on-site interactions with quantum emitters. We show that frustration drives photonic density-wave ordering, and that the resulting broken periodicity can be predicted from the excitation spectrum of the symmetric phase, without requiring computationally prohibitive thermodynamic energy minimization. Furthermore, we demonstrate that an emergent Nambu-Goldstone mode arises near the critical point in a one-dimensional chain despite the presence of only discrete symmetry, and uncover the mechanism that enables this otherwise forbidden gapless excitation. We also find quasi-periodic ordering in the superradiant phase, reminiscent of quasicrystals, and demonstrate that synthetic magnetic flux provides a powerful knob to control the nature of translational symmetry breaking. Our results establish a new direction in quantum many-body physics where the coexistence of local and global thermodynamic limits gives rise to unconventional symmetry breaking and emergent collective behavior.", "url": "https://arxiv.org/abs/2606.05278", "type": "理论", "summary": "了解挫败感和对称性破缺如何塑造集体行为是量子多体系统的核心问题。在这项工作中，我们在周期性晶格上的耦合迪克模型的大型一维和二维阵列中研究了这个问题，其中强光-物质耦合产生超辐射相，并且相邻有序参数之间的竞争导致自发平移对称性破缺。这种迪克晶格模型构成了一类全新的量子多体系统，因为它们同时实现了与晶格尺寸相关的热力学极限以及由与量子发射器的集体现场相互作用产生的内在热力学极限。我们表明，挫折驱动光子密度波排序，并且可以从对称相的激发光谱预测由此产生的破坏周期性，而不需要计算上令人望而却步的热力学能量最小化。\n\n此外，我们证明，尽管仅存在离散对称性，但在一维链的临界点附近会出现新兴的南部-戈德斯通模式，并揭示了实现这种原本禁止的无间隙激发的机制。我们还在超辐射相中发现了准周期排序，让人想起准晶体，并证明合成磁通量提供了一个强大的旋钮来控制平移对称性破缺的性质。我们的结果为量子多体物理学确立了一个新方向，其中局部和全局热力学极限的共存导致了非常规对称性破缺和涌现的集体行为。", "authors": [{"name": "Jongjun M. Lee"}, {"name": "Myung-Joong Hwang"}], "featured_authors": [{"name": "Jongjun M. Lee"}, {"name": "Myung-Joong Hwang"}], "author_count": 2}, {"id": "2606.05288", "category": "quant-ph", "title": "Emergent Self-Similar Quantum Revivals in Spiral Drives", "abstract": "We uncover a distinct form of nonequilibrium temporal order: self-similar quantum revivals in a many-body system driven by quasiperiodic spiral kicks, where the system recurrently returns close to its initial state at a hierarchically nested sequence of times. We demonstrate that both the fidelity and entanglement entropy exhibit this self-similar temporal structure. It originates from an emergent dynamical attractor, which we identify, such that all momentum modes eventually fall into the same closed orbits at self-similar times. We analytically justify this behavior and show that, for special momentum modes, this attractor arises as a consequence of a generalized spin echo process, and more generally we prove its existence using quasiperiodic SU(2) cocycles. Interestingly, the dynamics between consecutive revivals supports either volume- or area-law entanglement scaling, tunable via the driving parameters. In the presence of integrability-breaking perturbations, the system eventually heats up, but a long-lived prethermal regime with algebraically tunable lifetime occurs before heating sets in. Our results establish self-similar quantum revivals as a new paradigm for nonequilibrium quantum matter and provide a realistic route for its observation in current quantum simulators.", "url": "https://arxiv.org/abs/2606.05288", "type": "理论", "summary": "我们发现了一种独特形式的非平衡时间顺序：由准周期螺旋踢驱动的多体系统中的自相似量子复兴，其中系统以分层嵌套的时间序列反复返回到接近其初始状态。我们证明保真度和纠缠熵都表现出这种自相似的时间结构。它起源于我们所识别的新兴动力吸引子，使得所有动量模式最终在自相似时间落入相同的闭合轨道。我们分析证明了这种行为的合理性，并表明，对于特殊动量模式，该吸引子是广义自旋回波过程的结果，更一般地，我们使用准周期 SU(2) 余循环证明了它的存在。有趣的是，连续复兴之间的动态支持体积定律或面积定律纠缠缩放，可通过驱动参数进行调整。在存在破坏可积性的扰动的情况下，系统最终会升温，但在加热开始之前会出现寿命可代数可调的长寿命预热状态。\n\n我们的结果将自相似量子复兴确立为非平衡量子物质的新范式，并为当前量子模拟器中的观察提供了一条现实的途径。", "authors": [{"name": "Xin-Chi Zhou"}, {"name": "Liang-Hong Mo"}, {"name": "Hongzheng Zhao"}, {"name": "Bastien Lapierre"}], "featured_authors": [{"name": "Xin-Chi Zhou"}, {"name": "Liang-Hong Mo"}, {"name": "Hongzheng Zhao"}, {"name": "Bastien Lapierre"}], "author_count": 4}, {"id": "2606.05294", "category": "quant-ph", "title": "Isospectrality and Operator Complexity", "abstract": "We study a pair of exactly solvable, isospectral fermion chains, one strongly interacting and one quadratic, that nevertheless display remarkably different phase structures and operator dynamics. A nonlocal nonlinear unitary transformation maps one onto the other while preserving the entire many-body spectrum and converting local fermion operators into extended many-body strings. Thus, operators that evolve within a closed linear subspace in the quadratic model become interacting operators that generate increasingly higher-body terms and exhibit asymptotic Lanczos growth $b_n\\propto\\sqrt n$. Despite their identical spectra, the two models realize distinct phases and sharply different notions of operator complexity. Our results demonstrate that free many-body spectra and interacting operator dynamics are fundamentally compatible.", "url": "https://arxiv.org/abs/2606.05294", "type": "理论", "summary": "我们研究了一对完全可解的同谱费米子链，一个是强相互作用的，一个是二次的，但它们显示出明显不同的相结构和算子动力学。非局部非线性酉变换将一个变换到另一个上，同时保留整个多体谱并将局部费米子算子转换为扩展的多体弦。因此，在二次模型的闭合线性子空间内演化的算子成为交互算子，生成越来越多的高体项并表现出渐近 Lanczos 增长 $b_n\\propto\\sqrt n$。尽管它们具有相同的谱，但这两个模型实现了不同的阶段和截然不同的算子复杂度概念。我们的结果表明，自由多体谱和相互作用的算子动力学从根本上是兼容的。", "authors": [{"name": "Pradip Kattel"}, {"name": "Yicheng Tang"}, {"name": "Natan Andrei"}], "featured_authors": [{"name": "Pradip Kattel"}, {"name": "Yicheng Tang"}, {"name": "Natan Andrei"}], "author_count": 3}, {"id": "2606.05297", "category": "quant-ph", "title": "Continuous-variable ADAPT-VQE for bosonic lattice models", "abstract": "We present a continuous-variable adaptive variational quantum eigensolver (CV-ADAPT-VQE). As concrete examples, we consider the ground-state preparation for (i) the Bose-Hubbard model and (ii) the bosonic Kitaev chain, including its extension with an on-site Kerr interaction. The former conserves the total boson number, while the latter conserves global parity. We construct symmetry-preserving operator pools tailored to each case and show, using GPU-based classical simulations, that CV-ADAPT-VQE results in significantly shallower circuits compared to Hamiltonian-based VQE approaches. Our results point toward direct applications in quantum simulations of condensed-matter systems, quantum chemistry, and high-energy physics.", "url": "https://arxiv.org/abs/2606.05297", "type": "理论+数值", "summary": "我们提出了一种连续变量自适应变分量子本征求解器（CV-ADAPT-VQE）。作为具体例子，我们考虑 (i) Bose-Hubbard 模型和 (ii) 玻色基塔耶夫链的基态准备，包括其与现场克尔相互作用的扩展。前者守恒玻色子总数，后者守恒全局宇称性。我们构建了针对每种情况量身定制的保持对称的算子池，并使用基于 GPU 的经典模拟表明，与基于哈密顿量的 VQE 方法相比，CV-ADAPT-VQE 会导致显着更浅的电路。我们的结果指向凝聚态系统的量子模拟、量子化学和高能物理的直接应用。", "authors": [{"name": "Dimitrios Athanasakos"}, {"name": "Gloria Tejedor-García"}, {"name": "Jack Y. Araz"}, {"name": "Mafalda Ramôa"}, {"name": "Bharath Sambasivam"}, {"name": "Sophia E. Economou"}, {"name": "Felix Ringer"}], "featured_authors": [{"name": "Dimitrios Athanasakos"}, {"name": "Gloria Tejedor-García"}, {"name": "Jack Y. Araz"}, {"name": "Bharath Sambasivam"}, {"name": "Sophia E. Economou"}, {"name": "Felix Ringer"}], "author_count": 7}, {"id": "2606.05311", "category": "quant-ph", "title": "Setting angles in quantum approximate optimization at utility-scale", "abstract": "The quantum approximate optimization algorithm (QAOA) is a powerful heuristic that seeks to solve combinatorial optimization problems using quantum hardware and classical optimization in tandem. Various methods exist to train the parameterized quantum circuits that serve as an ansatz in QAOA. However, which method works best to identify optimal angles for a given problem instance remains poorly understood, especially at utility-scale, i.e., $100$ qubits or more. In this work, we address this challenge through utility-scale benchmarks from which we distill operational guidance for QAOA practitioners. First, we investigate approximation techniques, such as matrix product states and Pauli propagation, to find optimal angles. Second, we train QAOA on small-scale representative problems and transfer the angles to larger ones. We then validate the results on quantum hardware for utility-scale problem instances that can be meaningfully executed. In this way, we identify insights for QAOA angle setting strategies that work best for problems at the utility scale, including as a function of resource cost for the search. Crucially, the operational implications we draw from our benchmarks will help quantum optimization practitioners execute QAOA end-to-end pipelines efficiently on current and future hardware.", "url": "https://arxiv.org/abs/2606.05311", "type": "数值", "summary": "量子近似优化算法 (QAOA) 是一种强大的启发式算法，旨在同时使用量子硬件和经典优化来解决组合优化问题。存在多种方法来训练参数化量子电路，这些电路充当 QAOA 中的模拟。然而，对于给定问题实例确定最佳角度的最佳方法仍然知之甚少，特别是在公用事业规模（即 100 美元或更多量子位）下。在这项工作中，我们通过公用事业规模的基准来应对这一挑战，从中我们为 QAOA 从业者提炼操作指南。首先，我们研究近似技术，例如矩阵乘积状态和泡利传播，以找到最佳角度。其次，我们在小规模的代表性问题上训练 QAOA，并将角度转移到更大的问题上。然后，我们在量子硬件上验证可以有意义执行的公用事业规模问题实例的结果。通过这种方式，我们确定了最适合公用事业规模问题的 QAOA 角度设置策略的见解，包括作为搜索资源成本的函数。\n\n至关重要的是，我们从基准中得出的操作影响将帮助量子优化从业者在当前和未来的硬件上高效地执行 Q​​AOA 端到端管道。", "authors": [{"name": "Maosheng Guo"}, {"name": "Joel Jurado Diaz"}, {"name": "Anurag Ramesh"}, {"name": "Conrad J. Haupt"}, {"name": "Alberto Baiardi"}, {"name": "Dimitrios Athanasakos"}, {"name": "M. Emre Sahin"}, {"name": "Oscar Wallis"}, {"name": "George Pennington"}, {"name": "Christian Arenz"}, {"name": "Sebastian Brandhofer"}, {"name": "Georgios Korpas"}, {"name": "Ieva Čepaitė"}, {"name": "J. A. Montañez-Barrera"}, {"name": "Jakub Marecek"}, {"name": "Davide Venturelli"}, {"name": "Stephan Eidenbenz"}, {"name": "David E. Bernal Neira"}, {"name": "Daniel J. Egger"}], "featured_authors": [{"name": "Maosheng Guo"}, {"name": "Joel Jurado Diaz"}, {"name": "Anurag Ramesh"}, {"name": "Stephan Eidenbenz"}, {"name": "David E. Bernal Neira"}, {"name": "Daniel J. Egger"}], "author_count": 19}, {"id": "2606.05397", "category": "quant-ph", "title": "Multi-Qubit Dyadic Phase Fixing for Fault-Tolerant Quantum Compilation", "abstract": "Fault-tolerant quantum computing requires translating application-level quantum circuits into the Clifford+$T$ gate set, where the $T$ gate is the dominant resource cost. Phase kickback is an ancilla-based technique that can dramatically reduce $T$-count for rotations with dyadic angles, but has previously been limited to highly structured circuit families. We present Dyadic Phase Fixing (DPF), a general multi-qubit synthesis tool that extends phase kickback to general quantum circuits. DPF uses numerical unitary synthesis to greedily extract dyadic angle rotations from any input circuit. Combined with a decision matrix to automatically size the final phase gradient register, our end-to-end workflow achieves up to 70% reduction in $T$-count compared to \\texttt{gridsynth} and up to 60% compared to Repeat-Until-Success synthesis on a diverse set of benchmarks. We map these compiled circuits to a surface-code architecture to evaluate space-time volume, demonstrating up to a 60\\% reduction in this metric as well. However, for some circuits and mapping strategies the two metrics diverge significantly, demonstrating that $T$-count alone is a useful but incomplete proxy for fault-tolerant program costs.", "url": "https://arxiv.org/abs/2606.05397", "type": "数值", "summary": "容错量子计算需要将应用级量子电路转换为 Clifford+$T$ 门集，其中 $T$ 门是主要资源成本。相位反冲是一种基于辅助的技术，可以显着减少二进角旋转的 $T$ 计数，但之前仅限于高度结构化的电路系列。我们提出了二元相位固定（DPF），这是一种通用的多量子位综合工具，可将相位反冲扩展到通用量子电路。 DPF 使用数值酉综合从任何输入电路中贪婪地提取二进角旋转。与自动调整最终相位梯度寄存器大小的决策矩阵相结合，我们的端到端工作流程与 \\texttt{gridsynth} 相比，$T$ 计数减少了高达 70%，与在一组不同的基准上重复直到成功合成相比，减少了高达 60%。我们将这些编译电路映射到表面代码架构以评估时空体积，证明该指标也减少了 60%。\n\n然而，对于某些电路和映射策略，这两个指标存在显着差异，这表明仅 $T$ 计数对于容错程序成本来说是有用但不完整的代理。", "authors": [{"name": "Justin Kalloor"}, {"name": "Mathias Weiden"}, {"name": "Ed Younis"}, {"name": "John Kubiatowicz"}, {"name": "Costin Iancu"}], "featured_authors": [{"name": "Justin Kalloor"}, {"name": "Mathias Weiden"}, {"name": "Ed Younis"}, {"name": "John Kubiatowicz"}, {"name": "Costin Iancu"}], "author_count": 5}, {"id": "2606.05579", "category": "quant-ph", "title": "A Class of Multipartite Entangled States Based on State Transitions", "abstract": "We introduce Transition states (T states), denoted by $\\ket{T_k^n}$, as a class of multipartite entangled states characterized by a fixed number of state transitions between adjacent qubits. These states form equal-amplitude superpositions over all states with a specified transition count. Unlike Bell states based on two-qubit correlations, GHZ states characterized by global correlations among all qubits, and W and Dicke states based on fixed numbers of qubit excitations, T states are defined by transition counts along an ordered sequence of qubits. We prove that T states are unitarily equivalent to Dicke states through a chain of CX (controlled-X) operations, thereby establishing a direct correspondence between transition-based and excitation-based representations of multipartite entanglement.", "url": "https://arxiv.org/abs/2606.05579", "type": "理论", "summary": "我们引入过渡态（T 态），用 $\\ket{T_k^n}$ 表示，作为一类多部分纠缠态，其特征是相邻量子位之间有固定数量的状态转换。这些状态在具有指定转换计数的所有状态上形成等幅叠加。与基于两个量子位相关性的 Bell 状态、以所有量子位之间的全局相关性为特征的 GHZ 状态以及基于固定数量的量子位激励的 W 和 Dicke 状态不同，T 状态由沿量子位有序序列的跃迁计数定义。我们通过一系列 CX（受控 X）操作证明 T 状态统一等价于 Dicke 状态，从而在多部分纠缠的基于转换和基于激励的表示之间建立直接对应关系。", "authors": [{"name": "Jehn-Ruey Jiang"}], "featured_authors": [{"name": "Jehn-Ruey Jiang"}], "author_count": 1}, {"id": "2606.05603", "category": "quant-ph", "title": "Quantum Radar Cross Section with two-photon entangled states", "abstract": "We study two-photon entangled states for quantum radar cross section (QRCS), which is an extension of a single-photon QRCS formula. Since signal-idler entanglement does not provide any enhancement of the QRCS [Brandsema's PhD Thesis (2017)], we focus on signal-signal entanglement and derive the corresponding biphoton QRCS. We show that it can provide an enhancement over the single-photon QRCS and two-photon separable QRCS, where the performance is evaluated for various two-dimensional target geometries in monostatic/bistatic configurations. Furthermore, using the double-Gaussian approximation, we derive QRCS formula for biphoton states with arbitrary degree of entanglement and compute the resulting scattering patterns.", "url": "https://arxiv.org/abs/2606.05603", "type": "理论+数值", "summary": "我们研究量子雷达截面（QRCS）的双光子纠缠态，它是单光子 QRCS 公式的扩展。由于信号-闲频纠缠不会对 QRCS 提供任何增强 [Brandsema 的博士论文 (2017)]，因此我们专注于信号-信号纠缠并推导相应的双光子 QRCS。我们证明它可以提供对单光子 QRCS 和双光子可分离 QRCS 的增强，其中针对单基地/双基地配置中的各种二维目标几何形状评估性能。此外，使用双高斯近似，我们推导了具有任意纠缠度的双光子态的 QRCS 公式，并计算了所得的散射图案。", "authors": [{"name": "Sunghwa Kang"}, {"name": "Jihwan Kim"}, {"name": "Zaeill Kim"}, {"name": "Duk Y. Kim"}, {"name": "Yong Sup Ihn"}, {"name": "Su-Yong Lee"}, {"name": "Sean Crowe"}, {"name": "Stefan Evans"}, {"name": "Marcio de Andrade"}, {"name": "Joanna Ptasinski"}], "featured_authors": [{"name": "Sunghwa Kang"}, {"name": "Jihwan Kim"}, {"name": "Zaeill Kim"}, {"name": "Stefan Evans"}, {"name": "Marcio de Andrade"}, {"name": "Joanna Ptasinski"}], "author_count": 10}, {"id": "2606.05604", "category": "quant-ph", "title": "Decoder-Consistent Hamiltonians for POVM-Based Quantum Relaxations", "abstract": "In compression-based quantum relaxations like QRAO, classical variables are encoded into qubits and decoded after optimization. We formalize that the choice of the quantum Hamiltonian is fundamentally determined by this decoder. By representing the decoder as a POVM, we define a unique decoder-consistent Hamiltonian via the pullback of the post-decoding expected objective value. Using this framework, we reveal that standard QRAO Hamiltonians are inconsistent for certain mixed-degree quadratic functions, and we provide new approximation guarantees for the MaxCut problem based directly on POVM decoder design.", "url": "https://arxiv.org/abs/2606.05604", "type": "理论+数值", "summary": "在 QRAO 等基于压缩的量子弛豫中，经典变量被编码为量子位并在优化后解码。我们形式化地表明，量子哈密顿量的选择从根本上是由该解码器决定的。通过将解码器表示为 POVM，我们通过解码后预期目标值的回调来定义唯一的解码器一致哈密顿量。使用该框架，我们揭示了标准 QRAO 哈密顿量对于某些混合度二次函数是不一致的，并且我们直接基于 POVM 解码器设计为 MaxCut 问题提供了新的近似保证。", "authors": [{"name": "Takayuki Suzuki"}], "featured_authors": [{"name": "Takayuki Suzuki"}], "author_count": 1}, {"id": "2606.05690", "category": "quant-ph", "title": "Learning Hamiltonians at Long Times", "abstract": "We study the problem of learning an unknown $n$-qubit Hamiltonian $H$ from $U = e^{-iHt}$ for a single time $t$, where $t$ may be arbitrarily large. For broad families of local Hamiltonians, we prove that, with high probability over $H$ and $t$, any sum of local observables $A$ that is normalized and orthogonal to $H$ satisfies $\\tfrac{1}{2^n}\\|[U(t),A]\\|_F^2 \\geq 1/\\text{poly}(n)$. The Hamiltonian is therefore the unique approximately conserved local observable, and we can efficiently recover $H$, up to scale, as the approximate null vector of a data matrix built from random product-state inputs and classical shadows. As a corollary, we obtain a weak equilibration statement: the infinite-temperature autocorrelation of every sum of local observables orthogonal to $H$ decays by at least an inverse-polynomial amount.", "url": "https://arxiv.org/abs/2606.05690", "type": "理论", "summary": "我们研究从 $U = e^{-iHt}$ 学习未知 $n$-qubit 哈密顿量 $H$ 单次 $t$ 的问题，其中 $t$ 可能是任意大。对于广泛的局部哈密顿量族，我们证明，在 $H$ 和 $t$ 上的概率很高，任何归一化且与 $H$ 正交的局部可观测量 $A$ 之和满足 $\\tfrac{1}{2^n}\\|[U(t),A]\\|_F^2 \\geq 1/\\text{poly}(n)$。因此，哈密顿量是唯一的近似保守的局部可观测量，我们可以有效地按比例恢复 $H$，作为从随机产品状态输入和经典阴影构建的数据矩阵的近似空向量。作为推论，我们得到了一个弱平衡陈述：与 $H$ 正交的局部可观测量的每个总和的无限温度自相关至少衰减了一个逆多项式量。", "authors": [{"name": "Constantin Cedillo Vayson de Pradenne"}, {"name": "Jordan Cotler"}, {"name": "Hsin-Yuan Huang"}], "featured_authors": [{"name": "Constantin Cedillo Vayson de Pradenne"}, {"name": "Jordan Cotler"}, {"name": "Hsin-Yuan Huang"}], "author_count": 3}, {"id": "2606.05777", "category": "quant-ph", "title": "Periodic Symmetry-Adapted Encoding: Qubit Reduction in Crystalline Electronic Structure", "abstract": "We extend the symmetry-adapted encoding (SAE) framework to periodic electronic structure, enabling qubit-efficient quantum simulation of crystalline materials. By constructing a $\\Gamma$-point supercell Hamiltonian from a folded $k$-point calculation and systematically identifying all applicable space-group symmetry generators -- including spin-parity, point-group, and crystal translation symmetries -- we obtain qubit Hamiltonians with fewer qubits than the Jordan--Wigner starting point. We benchmark diamond, silicon, 3C-SiC, MgO, NaCl, CsCl, h-BN, wurtzite AlN, $\\alpha$-quartz SiO$_2$, and MgF$_2$ using active spaces chosen to preserve complete near-degenerate frontier manifolds across cubic, hexagonal, trigonal, and tetragonal space groups. Across the suite the periodic SAE removes 4--8 qubits. The B2 CsCl benchmark realises eight independent Boolean generators, i.e. a symmetry group isomorphic to $\\mathbb{Z}_2^8$, reducing CAS(6,7) from 14 to 6 qubits. This exceeds the $\\mathbb{Z}_2^5$ maximum of molecular SAE, where only two spin parities and at most three independent Boolean point-group generators are available, because the folded crystal supplies three additional half-translation symmetries. Noiseless UCCSD-VQE benchmarks against exact diagonalisation in the active-space sector show that the reduced encodings preserve the target energies to well below chemical accuracy while reducing variational parameter counts by $3$--$8\\times$ and CNOT counts by up to $309\\times$. The largest circuit savings occur when translation and point-group generators act independently in the active space, demonstrating that periodic symmetry can be converted directly into both qubit and ansatz compression. The method is implemented in the open-source QuantumSymmetry package and requires no manual specification of symmetry generators.", "url": "https://arxiv.org/abs/2606.05777", "type": "理论+数值", "summary": "我们将对称适应编码（SAE）框架扩展到周期性电子结构，从而实现晶体材料的量子位高效量子模拟。通过从折叠 $k$ 点计算构建 $\\Gamma$ 点超晶胞哈密顿量，并系统地识别所有适用的空间群对称生成器（包括自旋宇称、点群和晶体平移对称性），我们获得了比 Jordan-Wigner 起点更少量子位的量子位哈密顿量。我们使用选定的活动空间对金刚石、硅、3C-SiC、MgO、NaCl、CsCl、h-BN、纤锌矿 AlN、$\\alpha$-quartz SiO$_2$ 和 MgF$_2$ 进行基准测试，以保留立方、六方、三方和四方空间群中完整的近简并前沿流形。在整个套件中，周期性 SAE 删除了 4--8 个量子位。 B2 CsCl 基准测试实现了八个独立的布尔生成器，即与 $\\mathbb{Z}_2^8$ 同构的对称群，将 CAS(6,7) 从 14 个量子位减少到 6 个量子位。\n\n这超过了分子 SAE 的 $\\mathbb{Z}_2^5$ 最大值，其中只有两个自旋宇称和最多三个独立的布尔点群生成器可用，因为折叠晶体提供了三个额外的半平移对称性。针对活动空间扇区中精确对角化的无噪声 UCCSD-VQE 基准表明，减少的编码将目标能量保持在远低于化学精度的水平，同时将变分参数计数减少 $3$--$8\\times$，CNOT 计数减少高达 $309\\times$。当平移和点群生成器在活动空间中独立运行时，可以实现最大的电路节省，这表明周期性对称性可以直接转换为量子位和模拟压缩。该方法在开源 QuantumSymmetry 包中实现，不需要对称生成器的手动规范。", "authors": [{"name": "Dario Picozzi"}], "featured_authors": [{"name": "Dario Picozzi"}], "author_count": 1}, {"id": "2606.05815", "category": "quant-ph", "title": "Engineered dissipation for faster adiabatic state preparation", "abstract": "Adiabatic state preparation is often slowed by nonadiabatic leakage near small spectral gaps. We propose an engineered dissipative protocol that uses a filtered reservoir to induce predominantly downward transitions in the instantaneous energy eigenbasis while leaving the instantaneous ground state dark. The leaked population generated by nonadiabatic driving is therefore continuously relaxed back toward the low-energy sector. An effective avoided-crossing analysis shows that in the regime where the engineered relaxation strength is much larger than the minimum gap, the runtime scaling can improve from the closed-system behavior $\\mathcal{O}(\\Delta^{-2})$ to $\\mathcal{O}(\\Delta^{-1})$ Finite-temperature upward transitions introduce a thermal error floor, but the enhancement survives when this heating rate remains below the target error tolerance. Numerical results show improved ground-state preparation over closed-system annealing. We also discuss a possible superconducting-circuit implementation using structured bosonic reservoirs.", "url": "https://arxiv.org/abs/2606.05815", "type": "数值", "summary": "绝热状态的准备通常会因小光谱间隙附近的非绝热泄漏而减慢。我们提出了一种工程耗散协议，该协议使用过滤储层来诱导瞬时能量本征基主要向下跃迁，同时使瞬时基态保持黑暗。因此，非绝热驱动产生的泄漏人口不断地回到低能耗领域。有效的避免交叉分析表明，在工程松弛强度远大于最小间隙的情况下，运行时缩放可以从封闭系统行为 $\\mathcal{O}(\\Delta^{-2})$ 改善到 $\\mathcal{O}(\\Delta^{-1})$ 有限温度向上转变会引入热误差底限，但当加热速率保持低于目标误差容限时，增强效果仍然存在。数值结果表明，与封闭系统退火相比，基态制备得到了改善。我们还讨论了使用结构化玻色子储存器的可能的超导电路实现。", "authors": [{"name": "Yuanyang Zhou"}, {"name": "Biao Wu"}], "featured_authors": [{"name": "Yuanyang Zhou"}, {"name": "Biao Wu"}], "author_count": 2}, {"id": "2606.05865", "category": "quant-ph", "title": "Symmetry-adapted qubit encoding with complete active space and Bravyi--Kitaev mapping for quantum chemistry on a quantum computer", "abstract": "We present a symmetry-adapted qubit encoding with complete active space (SAE-CAS) for quantum chemistry on fault-tolerant and near-term quantum processors. Building on exact-symmetry encodings, we extend symmetry-adapted mappings to approximate $Z$-symmetries corresponding to frozen-core and virtual orbitals, thereby reducing qubit requirements without significant loss of accuracy. We derive the mapping from the second-quantised Hamiltonian to active-space qubit Hamiltonians, prove its equivalence to the canonical CAS Hamiltonian with frozen-core and virtual-orbital projection, and integrate it with point-group and spin-parity symmetry encodings via affine Clifford transformations to maximise qubit reduction while preserving the target symmetry sector. The same framework also accommodates the Bravyi--Kitaev mapping, yielding an SAE-CAS-BK variant that is unitarily equivalent to SAE-CAS. Numerical benchmarking on nine small molecules using UCCSD and a hardware-efficient shifted-circular-alternating (HE-SCA) ansatz shows that SAE-CAS reduces qubit counts and Pauli-operator weight, yields shallower circuits with fewer parameters, and often accelerates VQE convergence; with HE-SCA it consistently reaches CAS reference energies in cases where JW-CAS does not converge within the tested budgets. We provide an open-source implementation in the Python package QuantumSymmetry. SAE-CAS offers a route to resource-efficient molecular simulations on fault-tolerant and near-term quantum processors.", "url": "https://arxiv.org/abs/2606.05865", "type": "理论+数值", "summary": "我们提出了一种具有完整活动空间的对称自适应量子位编码（SAE-CAS），用于容错和近期量子处理器上的量子化学。在精确对称编码的基础上，我们将对称适应映射扩展到与冻结核心和虚拟轨道相对应的近似 $Z$ 对称，从而减少了量子位需求，而不会显着损失准确性。我们导出了从第二量子化哈密顿量到活动空间量子位哈密顿量的映射，证明其与具有冻结核心和虚拟轨道投影的规范CAS哈密顿量的等价性，并通过仿射克利福德变换将其与点群和自旋宇称对称编码集成，以最大限度地减少量子位，同时保留目标对称扇区。同一框架还适应 Bravyi--Kitaev 映射，产生与 SAE-CAS 统一等效的 SAE-CAS-BK 变体。\n\n使用 UCCSD 和硬件高效的移位循环交替 (HE-SCA) ansatz 对九个小分子进行的数值基准测试表明，SAE-CAS 减少了量子位计数和泡利算子权重，产生参数更少的更浅的电路，并且通常加速 VQE 收敛；使用 HE-SCA，在 JW-CAS 未收敛于测试预算的情况下，它始终能够达到 CAS 参考能量。我们在 Python 包 QuantumSymmetry 中提供了一个开源实现。 SAE-CAS 提供了一种在容错和近期量子处理器上进行资源高效分子模拟的途径。", "authors": [{"name": "Dario Picozzi"}, {"name": "Jonathan Tennyson"}], "featured_authors": [{"name": "Dario Picozzi"}, {"name": "Jonathan Tennyson"}], "author_count": 2}, {"id": "2606.05904", "category": "quant-ph", "title": "Non-equilibrium quantum thermodynamics of a memory-bearing open-system process", "abstract": "We show the emergence of memory effects in the dynamics of a driven two-level system interacting with a composite environment, and analyze their influence on work, heat and entropy production. We further investigate how the interplay between driving, dissipation and memory effects, stemming from the finiteness of the environment, shapes the thermodynamic response of the system, thus providing insight into quantum thermodynamics beyond the Markovian approximation.", "url": "https://arxiv.org/abs/2606.05904", "type": "理论", "summary": "我们展示了与复合环境相互作用的驱动两级系统动力学中记忆效应的出现，并分析了它们对功、热量和熵产生的影响。我们进一步研究了由于环境的有限性而产生的驱动、耗散和记忆效应之间的相互作用如何塑造系统的热力学响应，从而提供超越马尔可夫近似的量子热力学的见解。", "authors": [{"name": "Biagio G. Banigi"}, {"name": "Eric Lutz"}, {"name": "Mauro Paternostro"}], "featured_authors": [{"name": "Biagio G. Banigi"}, {"name": "Eric Lutz"}, {"name": "Mauro Paternostro"}], "author_count": 3}, {"id": "2606.05928", "category": "quant-ph", "title": "Broadband AC Magnetic Field Sensing via Continuous wave optically detected magnetic resonance with NV Centers in diamond", "abstract": "The nitrogen-vacancy (NV) center in diamond has attracted considerable attention as a highly sensitive quantum sensor that can operate at room temperature. In particular, continuous-wave optically detected magnetic resonance (CW-ODMR) is promising for a wide range of applications because of its simplicity. However, conventional AC magnetic-field sensing schemes based on CW-ODMR suffer from a limited detection bandwidth: the detectable frequency is either fixed by intrinsic physical parameters of the NV center or, even when tunable, restricted to a narrow range of only a few MHz. Here, we propose a broadband AC magnetometry scheme based on CW-ODMR with NV centers using microwave-driven dressed this http URL theoretical analysis and numerical simulations, we show that the proposed scheme enables the detection of AC magnetic fields with frequencies up to the order of 100 MHz, which has been difficult to achieve using conventional CW-ODMR-based methods.", "url": "https://arxiv.org/abs/2606.05928", "type": "数值", "summary": "金刚石中的氮空位（NV）中心作为一种可在室温下工作的高灵敏度量子传感器引起了人们的广泛关注。特别是，连续波光学检测磁共振（CW-ODMR）由于其简单性而具有广泛的应用前景。然而，基于 CW-ODMR 的传统交流磁场传感方案受到检测带宽的限制：可检测频率要么由 NV 中心的固有物理参数固定，要么即使可调谐，也仅限于几 MHz 的狭窄范围。在这里，我们提出了一种基于 CW-ODMR 的宽带交流磁力测量方案，采用微波驱动的 NV 中心，理论分析和数值模拟表明，该方案能够检测频率高达 100 MHz 量级的交流磁场，这是使用传统的基于 CW-ODMR 的方法难以实现的。", "authors": [{"name": "Ryohei Dokai"}, {"name": "Ryusei Okaniwa"}, {"name": "Miku Ishizaki"}, {"name": "Junko Ishi-Hayase"}, {"name": "Yuichiro Matsuzaki"}], "featured_authors": [{"name": "Ryohei Dokai"}, {"name": "Ryusei Okaniwa"}, {"name": "Miku Ishizaki"}, {"name": "Junko Ishi-Hayase"}, {"name": "Yuichiro Matsuzaki"}], "author_count": 5}, {"id": "2606.05947", "category": "quant-ph", "title": "Double-bracket quantum algorithms for thermal state preparation", "abstract": "We propose quantum algorithms for preparing thermal states via the simulation of the thermofield double states. The key idea is to leverage double-bracket quantum algorithms to implement imaginary-time evolution on thermofield double states, whose reduced state realizes the Gibbs state. Our method, termed double-bracket thermofield double (DB-TFD), introduces two variants. The first, the vanilla DB-TFD algorithm, directly implements imaginary-time evolution using double-bracket quantum imaginary-time evolution. The second, poly DB-TFD, employs double-bracket quantum signal processing to approximate the imaginary-time evolution operator via a polynomial transformation. We demonstrate that the complexity of the poly DB-TFD algorithm scales exponentially with the inverse temperature in a broad practical regime. This scaling is consistent with existing methods, and numerical simulations support the corresponding theoretical bound. We further demonstrate the utility of DB-TFD in quantum Boltzmann machines for generative modeling, achieving improved performance compared with variational imaginary-time evolution approaches. These results establish DB-TFD as a promising route for thermal state preparation in the near-term and early-fault-tolerant regimes.", "url": "https://arxiv.org/abs/2606.05947", "type": "理论+数值", "summary": "我们提出了通过模拟热场双态来准备热态的量子算法。其关键思想是利用双括号量子算法在热场双态上实现虚时演化，其约化态实现了吉布斯态。我们的方法称为双括号热场双 (DB-TFD)，引入了两种变体。第一种是普通的 DB-TFD 算法，使用双括号量子虚时间演化直接实现虚时间演化。第二种是 Poly DB-TFD，采用双括号量子信号处理通过多项式变换来近似虚数时间演化算子。我们证明了在广泛的实际情况下，poly DB-TFD 算法的复杂性随着逆温度呈指数级增长。这种缩放与现有方法一致，并且数值模拟支持相应的理论界限。我们进一步证明了 DB-TFD 在量子玻尔兹曼机中用于生成建模的实用性，与变分虚数时间演化方法相比，实现了更高的性能。\n\n这些结果表明 DB-TFD 是近期和早期容错机制中热状态准备的一种有前途的途径。", "authors": [{"name": "Andrew Wright"}, {"name": "Reyhaneh Aghaei Saem"}, {"name": "Supanut Thanasilp"}, {"name": "Yudai Suzuki"}, {"name": "Zoë Holmes"}], "featured_authors": [{"name": "Andrew Wright"}, {"name": "Reyhaneh Aghaei Saem"}, {"name": "Supanut Thanasilp"}, {"name": "Yudai Suzuki"}, {"name": "Zoë Holmes"}], "author_count": 5}, {"id": "2606.05955", "category": "quant-ph", "title": "Magnetic flux as a quantized Lorentz pseudoscalar and its relation to electric charge quantization", "abstract": "In this paper, we re-examine the well-known question of why electric charges exist only in quantized portions. In this context, we revisit the motion of a charged particle in a field-free region around a current-carrying solenoid. Solving the corresponding Schrödinger equation leads to a simultaneous quantization condition for the magnetic flux and the electric charge. We also demonstrate the Lorentz invariance of this condition by showing that the magnetic flux behaves like a pseudoscalar under Lorentz transformations.", "url": "https://arxiv.org/abs/2606.05955", "type": "理论", "summary": "在本文中，我们重新审视了为什么电荷仅存在于量子化部分这一众所周知的问题。在这种情况下，我们重新审视带电粒子在载流螺线管周围无场区域中的运动。求解相应的薛定谔方程可得出磁通量和电荷的同时量子化条件。我们还通过证明磁通量在洛伦兹变换下表现得像伪标量来证明这种条件的洛伦兹不变性。", "authors": [{"name": "Cyril Belardinelli"}], "featured_authors": [{"name": "Cyril Belardinelli"}], "author_count": 1}, {"id": "2606.05968", "category": "quant-ph", "title": "Shattering the Symmetry Trap in Fixed-Ansatz VQE: An Accelerated ADAPT-VQE Study of Three Pillar Molecules under Bravyi-Kitaev Mapping", "abstract": "Fixed-ansatz Variational Quantum Eigensolvers (VQE), such as the Unitary Coupled Cluster with Singles and Doubles (UCCSD) framework, frequently suffer from severe initialization paralyzation and zero-gradient traps when evaluated using the non-local Bravyi-Kitaev (BK) fermion-to-qubit mapping. In this work, we systematically demonstrate how the Adaptive Derivative-Assembled Pseudo-Trotter (ADAPT-VQE) framework shatters these structural limitations across three distinct electronic and geometric molecular pillars: Lithium Hydride ($\\text{LiH}$), Hydrogen Fluoride ($\\text{HF}$), and Water ($\\text{H}_2\\text{O}$), under heavily stretched or asymmetric multi-reference configurations. While conventional UCCSD-VQE flatlines completely at a zero energy shift ($0.000000$~Ha) due to global phase cancellations inherent to the BK tree structures, our dynamic ADAPT-VQE loop successfully isolates the dominant symmetry-breaking operators using analytical commutator gradients. To bypass the severe $\\mathcal{O}(N^3)$ computational bottlenecks of dense matrix exponentiation and Singular Value Decomposition on larger registers, we implement a highly optimized, vector-based Taylor series expansion state-evolution engine. Our numerical results show that the accelerated ADAPT-VQE framework achieves instant, exact Full Configuration Interaction (FCI) convergence within the very first macro-cycle across all three molecular systems, maintaining absolute numerical stability up to a 12-qubit register space. This study establishes a robust, hardware-efficient path for simulating strongly correlated, highly polarized triatomic chemical environments on near-term local architectures.", "url": "https://arxiv.org/abs/2606.05968", "type": "理论+数值", "summary": "固定变换变分量子本征解算器 (VQE)，例如具有单数和双数的酉耦合簇 (UCCSD) 框架，在使用非局部 Bravyi-Kitaev (BK) 费米子到量子位映射进行评估时，经常遭受严重的初始化瘫痪和零梯度陷阱。在这项工作中，我们系统地演示了自适应导数组装伪-Trotter (ADAPT-VQE) 框架如何在严重拉伸或不对称的多参考配置下打破三个不同电子和几何分子支柱的结构限制：氢化锂 ($\\text{LiH}$)、氟化氢 ($\\text{HF}$) 和水 ($\\text{H}_2\\text{O}$)。虽然由于 BK 树结构固有的全局相位抵消，传统的 UCCSD-VQE 完全在零能量偏移 ($0.000000$~Ha) 处保持平坦，但我们的动态 ADAPT-VQE 循环使用分析换向器梯度成功地隔离了主要的对称破缺算子。\n\n为了绕过较大寄存器上的密集矩阵求幂和奇异值分解的严重 $\\mathcal{O}(N^3)$ 计算瓶颈，我们实现了一个高度优化的、基于向量的泰勒级数展开状态演化引擎。我们的数值结果表明，加速的 ADAPT-VQE 框架在所有三个分子系统的第一个宏周期内实现了即时、精确的全配置交互 (FCI) 收敛，保持了高达 12 量子位寄存器空间的绝对数值稳定性。这项研究建立了一条稳健、硬件高效的路径，用于在近期局部架构上模拟强相关、高度极化的三原子化学环境。", "authors": [{"name": "Hermawan Kresno Dipojono"}], "featured_authors": [{"name": "Hermawan Kresno Dipojono"}], "author_count": 1}, {"id": "2606.06019", "category": "quant-ph", "title": "Polymer quantum mechanics on compact configuration spaces", "abstract": "\"Polymer quantum mechanics\" is the name given to a quantization scheme inspired by loop quantum gravity in which the configuration space of the theory is chosen to have a discrete topology. Polymer quantization yields a representation of the canonical commutation relations that is genuinely distinct from the conventional \"Schrödinger\" representation. In this paper, we summarize the main features of polymer quantum mechanics and investigate in detail the polymer quantization of systems with configuration spaces that are classically compact. We show explicitly how using the standard construction of polymer states leads to a Hilbert space of states defined on a finite graph of points. By way of example, we find the exact energy eigenvalues and eigenfunctions for a particle on a ring and a particle in a box defined on such lattices, and discuss similarities and differences from standard Schrödinger quantum mechanics. We also explore the continuum limit of states in these systems, and demonstrate in detail how the exact eigenfunctions in the position representation approach their continuum counterparts.", "url": "https://arxiv.org/abs/26
