  <style>

  <script>
    const papers = [{"id": "2607.20624", "category": "cond-mat", "title": "Ideal Bands in Tight-Binding Models", "abstract": "A band is called ideal when its Dirichlet functional saturates the topological lower bound. We study ideal bands in finite-band tight-binding models with conventional two-dimensional lattice translation symmetries, allowing the bands to have non-flat dispersion. We first provide an analytic construction of isolated Chern-ideal bands with Chern number $|\\mathrm{Ch}|=1$ in finite-band models with exponentially decaying hopping. This construction applies only when at least two orbitals have different embedded positions (modulo lattice vectors), complementing the previously known construction for $|\\mathrm{Ch}|>1$. We then show that isolated Chern-ideal bands with any nonzero Chern number cannot exist in finite-band models with finite-range hopping, regardless of the embedded orbital positions. The conclusion holds even if there are isolated band touching points, as long as the Berry curvature does not diverge anywhere in the Brillouin zone. We finally generalize the conclusions to Wilson-loop-ideal bands with zero total Chern number, such as Kane-Mele $\\mathbb{Z}_2$-ideal bands.", "url": "https://arxiv.org/abs/2607.20624", "type": "理论", "summary": "当一个带的狄利克雷泛函饱和拓扑下界时，该带被称为理想带。我们研究具有传统二维晶格平移对称性的有限带紧束缚模型中的理想能带，使能带具有非平坦色散。我们首先在具有指数衰减跳变的有限带模型中提供孤立陈理想带的解析构造，其中陈数 $|\\mathrm{Ch}|=1$。这种结构仅适用于至少两个轨道具有不同嵌入位置（模晶格向量）的情况，补充了先前已知的 $|\\mathrm{Ch}|>1$ 的结构。然后我们证明，无论嵌入的轨道位置如何，具有任何非零陈数的孤立陈理想带不能存在于具有有限范围跳跃的有限带模型中。即使存在孤立的带接触点，只要贝里曲率在布里渊区的任何地方都不会发散，结论就成立。最后，我们将结论推广到总陈数为零的 Wilson 环理想带，例如 Kane-Mele $\\mathbb{Z}_2$ 理想带。", "authors": [{"name": "Lexu Zhao"}, {"name": "Yang Ge"}, {"name": "Shinsei Ryu"}, {"name": "Jiabin Yu"}], "featured_authors": [{"name": "Lexu Zhao"}, {"name": "Yang Ge"}, {"name": "Shinsei Ryu"}, {"name": "Jiabin Yu"}], "author_count": 4}, {"id": "2607.20629", "category": "cond-mat", "title": "Ferromagnetic transition in a chiral spin chain", "abstract": "We study the zero-temperature properties of a spin-$1/2$ Heisenberg chain with an additional three-site chiral term of strength $g$. The model is known to be integrable and previous work using Bethe ansatz has identified a phase transition from the usual critical state for $g< g_c = 2/\\pi$ to a chiral phase for $g>g_c$. Here we combine analytical and computational approaches to demonstrate that the transition point comprises an unusual Lifshitz transition with dynamical critical exponent $z=3$, and the chiral phase is a partially spin-polarized phase which spontaneously breaks SU(2) symmetry. We derive a strongly interacting chiral boson field theory for the critical point, and show that even its small-momentum, low-energy response is non-trivial. We also determine the universal properties of the chiral phase, and specifically show that it has a simultaneous quadratically dispersing ferromagnetic \"magnon\" mode coexisting with the power-law singularities and linearly dispersing excitations typical of a Luttinger liquid. Our conclusions are validated using numerics based on matrix product state methods and exact diagonalization.", "url": "https://arxiv.org/abs/2607.20629", "type": "理论+数值", "summary": "我们研究了自旋 $1/2$ 海森堡链的零温度特性，该链具有额外的三位点手性强度 $g$。该模型已知是可积的，并且之前使用 Bethe ansatz 的工作已经确定了从 $g< g_c = 2/\\pi$ 的通常临界状态到 $g>g_c$ 的手性相的相变。在这里，我们结合分析和计算方法来证明转变点包含一个不寻常的 Lifshitz 转变，其动力学临界指数 $z=3$，并且手性相是自发破坏 SU(2) 对称性的部分自旋极化相。我们针对临界点推导了强相互作用的手性玻色子场理论，并表明即使它的小动量、低能量响应也不是微不足道的。我们还确定了手性相的普遍性质，并特别表明它具有同时二次色散的铁磁“磁振子”模式，与幂律奇点和路廷格液体典型的线性色散激发共存。我们的结论使用基于矩阵乘积状态方法和精确对角化的数值进行了验证。", "authors": [{"name": "Yuan Xiao"}, {"name": "Rimika Jaiswal"}, {"name": "Oleg A. Starykh"}, {"name": "Leon Balents"}], "featured_authors": [{"name": "Yuan Xiao"}, {"name": "Rimika Jaiswal"}, {"name": "Oleg A. Starykh"}, {"name": "Leon Balents"}], "author_count": 4}, {"id": "2607.20681", "category": "cond-mat", "title": "A high-dimensional neural network potential for finite-temperature phenomena in NiTi martensite", "abstract": "We present a high-dimensional neural network potential (HDNNP) for the martensitic phase of the NiTi shape-memory alloy trained to density functional theory (DFT) data. A central aspect of this work is the systematic validation of the potential with respect to the underlying DFT reference method for key properties governing structural evolution, including equilibrium crystal structures, elastic constants, generalized-stacking fault energies, and vibrational spectra. The HDNNP accurately describes the relative stability of the B19$^\\prime$ and B33 phases, including subtle energy differences on the order of meV/atom. The predicted stacking-fault energy landscape is strongly anisotropic and reveals a preferential shear pathway, providing atomistic insight into deformation and twinning mechanisms. Finite-temperature molecular dynamics simulations further enable the investigation of unconstrained structural evolution as a function of temperature. Overall, the developed HDNNP provides a robust basis for atomistic simulations of the complex structural and functional behavior of martensitic NiTi systems containing hundreds of thousands of atoms on nanosecond time scales.", "url": "https://arxiv.org/abs/2607.20681", "type": "理论+数值", "summary": "我们提出了一种针对 NiTi 形状记忆合金马氏体相的高维神经网络势 (HDNNP)，并根据密度泛函理论 (DFT) 数据进行了训练。这项工作的一个核心方面是对控制结构演化的关键特性（包括平衡晶体结构、弹性常数、广义堆垛层错能和振动谱）的基础 DFT 参考方法的潜力进行系统验证。 HDNNP 准确地描述了 B19$^\\prime$ 和 B33 相的相对稳定性，包括 meV/原子数量级的细微能量差异。预测的堆垛层错能量景观具有强烈的各向异性，并揭示了优先剪切路径，为变形和孪晶机制提供了原子学的见解。有限温度分子动力学模拟进一步能够研究作为温度函数的无约束结构演化。总体而言，开发的 HDNNP 为纳秒时间尺度上包含数十万个原子的马氏体 NiTi 系统的复杂结构和功能行为的原子模拟提供了坚实的基础。", "authors": [{"name": "Petr Jaroš"}, {"name": "Petr Sedlák"}, {"name": "Petr Šesták"}, {"name": "Miroslav Černý"}, {"name": "Jörg Behler"}, {"name": "Hanuš Seiner"}], "featured_authors": [{"name": "Petr Jaroš"}, {"name": "Petr Sedlák"}, {"name": "Petr Šesták"}, {"name": "Miroslav Černý"}, {"name": "Jörg Behler"}, {"name": "Hanuš Seiner"}], "author_count": 6}, {"id": "2607.20702", "category": "cond-mat", "title": "High Order Geometric Channels for Nonlinear Transport in Bloch Bands", "abstract": "We develop a geometric perturbation theory of Bloch states for perturbations coupling via the interband Berry connection. The gauge-invariant Bargmann trace builds the dressed dispersion and connection order by order as a hierarchy \\(Q^{(N)}\\), starting with the quantum geometric tensor. Higher members encode multiband geometry beyond the quantum metric and Berry curvature. Connected amplitudes control vertex-order corrections, while strict-order corrections reduce to disconnected products. For a uniform electric field we find the fully coherent, purely geometric sector of the third-order response.", "url": "https://arxiv.org/abs/2607.20702", "type": "理论", "summary": "我们开发了一种布洛赫态的几何微扰理论，用于通过带间贝里连接进行微扰耦合。规范不变的巴格曼迹从量子几何张量开始，将修饰的色散和连接顺序构建为层次结构 \\(Q^{(N)}\\)。更高的成员编码超出量子度量和贝里曲率的多带几何形状。连接的幅度控制顶点顺序校正，而严格的顺序校正则减少到断开连接的产品。对于均匀电场，我们找到三阶响应的完全相干、纯几何扇区。", "authors": [{"name": "Sami Farrag"}, {"name": "Eugene Mele"}, {"name": "Tony Low"}], "featured_authors": [{"name": "Sami Farrag"}, {"name": "Eugene Mele"}, {"name": "Tony Low"}], "author_count": 3}, {"id": "2607.20726", "category": "cond-mat", "title": "Exact Nagaoka-to-spiral transition in the doped infinite-U triangular lattice", "abstract": "We study the single-hole infinite-$U$ Hubbard model on the triangular lattice with nearest- and next-nearest-neighbor hoppings $t_1$ and $t_2$. A frustrating $t_2$ destabilizes Nagaoka ferromagnetism through a Lifshitz transition to a long-wavelength coplanar spiral at $t_{2,c}/t_1=-0.182$. We determine the critical point analytically by reducing the many-body problem to an effective two-body hole--magnon scattering problem in which the hard-core hole--magnon constraint is treated exactly. Numerical calculations confirm the spiral ground state and reveal a coherent spin polaron with quasiparticle weight $Z\\simeq0.92$ at the Lifshitz-shifted momentum $\\mathbf{K}=-\\mathbf{Q}^*$. These results establish the first quantum instability of the triangular-lattice Nagaoka ferromagnet and provide the magnetic baseline for magnon-mediated pairing at finite doping.", "url": "https://arxiv.org/abs/2607.20726", "type": "理论+数值", "summary": "我们研究了三角晶格上的单孔无限 $U$ 哈伯德模型，具有最近邻和次近邻跳跃 $t_1$ 和 $t_2$。令人沮丧的 $t_2$ 通过 Lifshitz 转变到 $t_{2,c}/t_1=-0.182$ 处的长波长共面螺旋，破坏了长冈铁磁性。我们通过将多体问题简化为有效的二体空穴磁振子散射问题来分析确定临界点，其中精确处理核心空穴磁振子约束。数值计算证实了螺旋基态，并揭示了在 Lifshitz 位移动量 $\\mathbf{K}=-\\mathbf{Q}^*$ 下具有准粒子重量 $Z\\simeq0.92$ 的相干自旋极化子。这些结果建立了三角晶格长冈铁磁体的第一个量子不稳定性，并为有限掺杂下的磁振子介导配对提供了磁性基线。", "authors": [{"name": "Yang Zhang"}, {"name": "Cristian D. Batista"}], "featured_authors": [{"name": "Yang Zhang"}, {"name": "Cristian D. Batista"}], "author_count": 2}, {"id": "2607.20728", "category": "cond-mat", "title": "Analytical Forces from the Bethe-Salpeter Equation for Large-Scale Excited-State Relaxation", "abstract": "We present an efficient plane-wave implementation of analytical nuclear forces for electronic excited states described by the Bethe-Salpeter equation (BSE). The formulation combines density-matrix perturbation theory with a Lagrangian approach, and avoids both explicit empty-state summations and the response calculations for each atomic displacement, required by conventional approaches based on density functional perturbation theory. Together with GPU acceleration, these advances make BSE forces calculations tractable for solid-state systems containing hundreds of atoms. We demonstrate the method on two point defects with distinct dielectric environments: the nitrogen-vacancy center in diamond, where BSE and time-dependent density functional theory (TDDFT) yield consistent excited-state relaxations, and the carbon-dimer defect in two-dimensional hexagonal boron nitride, where the screened electron-hole interaction included in the BSE stabilizes the localized defect excitation and corrects the relaxation pattern predicted by semilocal TDDFT. These results establish a scalable framework for BSE-level studies of excited-state relaxation and vibronic coupling in heterogeneous condensed systems.", "url": "https://arxiv.org/abs/2607.20728", "type": "理论+数值", "summary": "我们提出了 Bethe-Salpeter 方程 (BSE) 描述的电子激发态分析核力的有效平面波实现。该公式将密度矩阵微扰理论与拉格朗日方法相结合，并避免了基于密度泛函微扰理论的传统方法所需的显式空态求和和每个原子位移的响应计算。这些进步与 GPU 加速相结合，使得包含数百个原子的固态系统的 BSE 力计算变得易于处理。我们在具有不同介电环境的两个点缺陷上演示了该方法：金刚石中的氮空位中心，其中 BSE 和时间相关密度泛函理论 (TDDFT) 产生一致的激发态弛豫；以及二维六方氮化硼中的碳二聚体缺陷，其中 BSE 中包含的屏蔽电子-空穴相互作用稳定了局域缺陷激发并校正了半局域 TDDFT 预测的弛豫模式。\n\n这些结果为异质凝聚系统中激发态弛豫和振动耦合的 BSE 水平研究建立了一个可扩展的框架。", "authors": [{"name": "Yu Jin"}, {"name": "Victor Wen-zhe Yu"}, {"name": "Marco Govoni"}, {"name": "Giulia Galli"}], "featured_authors": [{"name": "Yu Jin"}, {"name": "Victor Wen-zhe Yu"}, {"name": "Marco Govoni"}, {"name": "Giulia Galli"}], "author_count": 4}, {"id": "2607.20856", "category": "cond-mat", "title": "Exceptional Points in a Parallel Double-Quantum-Dot Josephson Junction Coupled to a Ferromagnetic Reservoir", "abstract": "We investigate exceptional points (EPs) in a parallel double-quantum-dot Josephson junction coupled to a dissipative reservoir. By integrating out the leads, we obtain a non-Hermitian Bogoliubov-de Gennes description wherein the superconducting phase difference and orbital flux govern the complex Andreev spectrum. For spin-independent dissipation, the second-order EPs identified within the infinite superconducting gap limit are eliminated when the finite superconducting gap is properly incorporated. In contrast, spin-dependent dissipation originating from a ferromagnetic reservoir, in conjunction with magnetic flux, gives rise to second-order EPs that persist in superconducting leads with finite gap. Moreover, flux tuning enables the coalescence of two second-order EPs into a third-order EP, whose eigenvalue splitting exhibits cubic-root scaling behavior. A many-body parity analysis establishes the connection between the contrasting finite-gap behavior and the spectral relationship between the even- and odd-parity sectors. Finally, Josephson currents calculated from both the free-energy derivative and the surrogate-model density matrix demonstrate consistency and remain continuous across the EPs. These findings establish spin-selective dissipation and interferometric flux as effective control parameters for robust non-Hermitian singularities in superconducting nanostructures.", "url": "https://arxiv.org/abs/2607.20856", "type": "理论", "summary": "我们研究了与耗散储存器耦合的并行双量子点约瑟夫森结中的异常点（EP）。通过对导联进行积分，我们获得了非厄米特 Bogoliubov-de Gennes 描述，其中超导相位差和轨道通量控制着复杂的安德烈夫谱。对于与自旋无关的耗散，当适当地合并有限超导间隙时，在无限超导间隙极限内确定的二阶EP被消除。相比之下，源自铁磁库的自旋相关耗散与磁通量相结合，产生了在有限间隙的超导引线中持续存在的二阶EP。此外，通量调整可以将两个二阶 EP 合并为一个三阶 EP，其特征值分裂表现出立方根标度行为。多体奇偶校验分析建立了对比有限间隙行为与偶数和奇数奇偶校验扇区之间的谱关系之间的联系。\n\n最后，根据自由能导数和替代模型密度矩阵计算出的约瑟夫森电流证明了一致性，并且在整个 EP 中保持连续。这些发现将自旋选择性耗散和干涉通量确立为超导纳米结构中鲁棒非厄米奇点的有效控制参数。", "authors": [{"name": "Yiyan Wang"}, {"name": "Ruixin Zhou"}, {"name": "Bing Dong"}], "featured_authors": [{"name": "Yiyan Wang"}, {"name": "Ruixin Zhou"}, {"name": "Bing Dong"}], "author_count": 3}, {"id": "2607.20885", "category": "cond-mat", "title": "Long- and Short-Range Anion Order in SrTiO$_{3-x}$H$_x$ Perovskite Oxyhydrides: DFT+$U$ Sensitivity and HSE06 Cluster Expansion", "abstract": "Anion ordering in perovskite oxyhydrides can remain significant even in disordered states, particularly at non-dilute hydrogen concentrations. Nevertheless, hydride substitution poses challenges for accurate simulations based on density functional theory due to configurational complexity and Ti 3$d$ reduction. Here, we develop a cluster expansion (CE) framework for SrTiO$_{3-x}$H$_x$ incorporating HSE06 hybrid-DFT energetics. We first demonstrate that calculated mixing energies and ordering stability are highly sensitive to the choice of DFT+$U$, with maximum variations on the order of 100 meV/anion. We benchmark ordering energetics against HSE06 calculations and identify $U$ = 3.3 eV as an HSE06 proxy, which enables extensive configurational exploration while limiting costly HSE06 calculations to key configurations for efficient learning of ordering energetics. Together, ground-state orderings, correlations between octahedral configurations and structural stability, and MC sampling of CE models all support a strong preference for the O$_4$H$_2$ cis configuration in SrTiO$_{3-x}$H$_x$, in which two hydride ions occupy first-nearest-neighbor anion sites. This cis-type preference was overlooked in previous ATiO$_{3-x}$H$_x$ studies, despite its sizable stabilization of ~200 meV per hydride comparable to reported anion-migration and polaron-formation energies. This study addresses both the previously underexplored sensitivity of CE-based ordering analyses to DFT+$U$ and anion-ordering in perovskite oxyhydrides.", "url": "https://arxiv.org/abs/2607.20885", "type": "理论+数值", "summary": "即使在无序状态下，钙钛矿氢氧化物中的阴离子排序仍然很重要，特别是在非稀氢浓度下。然而，由于结构的复杂性和 Ti 3$d$ 的减少，氢化物替代对基于密度泛函理论的精确模拟提出了挑战。在这里，我们开发了一个结合 HSE06 混合 DFT 能量学的 SrTiO$_{3-x}$H$_x$ 簇扩展 (CE) 框架。我们首先证明计算的混合能和有序稳定性对 DFT+$U$ 的选择高度敏感，最大变化约为 100 meV/阴离子。我们根据 HSE06 计算对有序能量学进行基准测试，并将 $U$ = 3.3 eV 确定为 HSE06 代理，这使得能够进行广泛的配置探索，同时将昂贵的 HSE06 计算限制在关键配置上，从而有效学习有序能量学。总之，基态排序、八面体构型和结构稳定性之间的相关性以及 CE 模型的 MC 采样都支持 SrTiO$_{3-x}$H$_x$ 中 O$_4$H$_2$ 顺式构型的强烈偏好，其中两个氢负离子占据第一最近邻阴离子位点。\n\n这种顺式偏好在之前的 ATiO$_{3-x}$H$_x$ 研究中被忽视了，尽管它每个氢化物具有约 200 meV 的相当大的稳定性，与报道的阴离子迁移和极化子形成能量相当。这项研究解决了先前未充分探索的基于 CE 的排序分析对 DFT+$U$ 的敏感性以及钙钛矿氢氧化物中的阴离子排序。", "authors": [{"name": "Tzu-chen Liu"}, {"name": "Chris Wolverton"}], "featured_authors": [{"name": "Tzu-chen Liu"}, {"name": "Chris Wolverton"}], "author_count": 2}, {"id": "2607.21092", "category": "cond-mat", "title": "Tunnel magnetoresistance effect with a Cr-doped $\\mathrm{RuO_{2}}(110)$ altermagnet", "abstract": "Antiferromagnets can have a finite spin-polarization in the momentum space when their magnetic structure breaks the macroscopic time-reversal symmetry. This spin-polarization can produce a spin-polarized electric current even in antiferromagnets with vanishingly small net magnetizaton, which supports the antiferromagentic tunnel magnetoresistance (TMR) effect. In this paper, using first-principles calculations, we study the TMR effect with a doped altermagnet $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}$ with $(110)$ orientation, whose collinear antiferromagnetic structure breaks the time-reversal symmetry macroscopically. The momentum-dependent spin-polarization combined with the $(110)$ crystal orientation makes the electric current spin-polarized through bulk $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$. We further calculate the TMR effect in the $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)/\\mathrm{TiO_{2}}(110)/\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$ tunnel junction and show that a finite TMR effect emerges. Based on the analysis of the tunneling transport, the TMR effect is attributed to the spin polarized tunneling transport with momentum dependence and the interfacial magnetic structures, as well as the spin-polarized electric current in a bulk form of $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$.", "url": "https://arxiv.org/abs/2607.21092", "type": "理论+数值", "summary": "当反铁磁体的磁性结构打破宏观时间反转对称性时，它们在动量空间中可以具有有限的自旋极化。即使在净磁化强度极小的反铁磁体中，这种自旋极化也可以产生自旋极化电流，这支持了反铁磁隧道磁阻（TMR）效应。在本文中，我们利用第一性原理计算，研究了具有$(110)$取向的掺杂交变磁体$\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}$的TMR效应，其共线反铁磁结构在宏观上打破了时间反演对称性。动量相关的自旋极化与 $(110)$ 晶体取向相结合，使得电流通过块体 $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$ 进行自旋极化。我们进一步计算了 $\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)/\\mathrm{TiO_{2}}(110)/\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$ 隧道结中的 TMR 效应，并表明有限TMR效应显现。\n\n基于对隧道传输的分析，TMR效应归因于动量依赖性的自旋极化隧道传输和界面磁结构，以及$\\mathrm{Ru}_{1-x}\\mathrm{Cr}_{x}\\mathrm{O}_{2}(110)$体形式的自旋极化电流。", "authors": [{"name": "Katsuhiro Tanaka"}, {"name": "Takuya Nomoto"}, {"name": "Ryotaro Arita"}], "featured_authors": [{"name": "Katsuhiro Tanaka"}, {"name": "Takuya Nomoto"}, {"name": "Ryotaro Arita"}], "author_count": 3}, {"id": "2607.21133", "category": "cond-mat", "title": "Helical stability of double-stranded semiflexible chains with interstrand interactions", "abstract": "The mechanical and structural properties of dsDNA have been successfully described by models with varying levels of complexity and coarse-graining schemes. Prior work has characterized local stacking/twist effects and force-torque phase diagrams under external constraints. However, the role of base-pairing and torsional elasticity in global morphological transitions remain poorly characterized in the absence of external constraints. Here we investigate the delicate balance required for the strength of base-pairing interactions and the twisting energy to preserve the double-helix structure in a model made up of two semiflexible chains. We found that the model exhibits several distinct morphological phases: flat, random coil, double-helix, and the unwound double-helix. We calculate the Gauss linking number to characterize transitions between these phases.", "url": "https://arxiv.org/abs/2607.21133", "type": "理论+数值", "summary": "双链 DNA 的机械和结构特性已通过具有不同复杂程度和粗粒度方案的模型成功描述。先前的工作已经描述了外部约束下的局部堆叠/扭曲效应和力-扭矩相图。然而，在没有外部约束的情况下，碱基配对和扭转弹性在整体形态转变中的作用仍然很少被描述。在这里，我们研究了碱基配对相互作用的强度和扭转能量所需的微妙平衡，以在由两条半柔性链组成的模型中保留双螺旋结构。我们发现该模型表现出几个不同的形态阶段：扁平、无规卷曲、双螺旋和展开双螺旋。我们计算高斯链接数来表征这些阶段之间的转变。", "authors": [{"name": "Farisan Dary"}, {"name": "Donn Liew"}, {"name": "Haiyi Liang"}, {"name": "Ee Hou Yong"}], "featured_authors": [{"name": "Farisan Dary"}, {"name": "Donn Liew"}, {"name": "Haiyi Liang"}, {"name": "Ee Hou Yong"}], "author_count": 4}, {"id": "2607.21148", "category": "cond-mat", "title": "Exceptional-Point Geometry of Weak Topological Boundary States", "abstract": "In this article, we demonstrate that weak topology can be formulated geometrically in terms of exceptional singularities of an analytically continued Bloch Hamiltonian. A general plaquette chiral model in two dimensions serves as a minimal realization of dual weak topology, possessing two independent families of weak topological invariants, one for each spatial direction. The weak-topological edge states correspond to exceptional points in complex momentum space, while corner zero modes emerge from exceptional curves obtained by complexifying both momenta. Compact localized states arise when the exceptional roots collapse to the origin. This framework provides a unified complex-momentum description of edge, corner, and compact localization.", "url": "https://arxiv.org/abs/2607.21148", "type": "理论", "summary": "在本文中，我们证明弱拓扑可以根据分析连续的布洛赫哈密顿量的异常奇点以几何形式表示。二维的通用小板手性模型是对偶弱拓扑的最小实现，拥有两个独立的弱拓扑不变量族，每个空间方向一个。弱拓扑边缘态对应于复动量空间中的异常点，而角零模式则来自通过复化两个动量而获得的异常曲线。当特殊的根塌陷到原点时，就会出现紧凑的局部状态。该框架提供了边缘、角点和紧凑定位的统一复杂动量描述。", "authors": [{"name": "Rafael A. Molina"}, {"name": "Kevin González"}, {"name": "Pedro A. Orellana"}], "featured_authors": [{"name": "Rafael A. Molina"}, {"name": "Kevin González"}, {"name": "Pedro A. Orellana"}], "author_count": 3}, {"id": "2607.21157", "category": "cond-mat", "title": "Thermal Hall Resistivity as a Unifying Description of Phonon Thermal Hall Effect in Various Insulators", "abstract": "A considerable phonon thermal Hall effect was recently discovered across a diverse collection of materials. To clarify this enigmatic thermal Hall response in various insulators, we investigate the doped Mott insulator La$_{5/3}$Sr$_{1/3}$NiO$_4$ as an example material system and reveal a characteristic phonon-dominated thermal Hall effect. As a sensitive probe of the transverse thermal response, the thermal Hall resistivity $w_{xy}$ exhibits an insulating-like temperature dependence $w_{xy}(T)$, a linear magnetic-field dependence $w_{xy}(H)$ near $H=0$, and a $T$-linear thermal Hall angle at low temperatures. The presence of similar phenomena across a series of insulators suggests that $w_{xy}$ serves as a unifying description of phonon thermal Hall effect, corroborated by an apparent correlation between the insulating-like $w_{xy}(T)$ and material's localized electronic state.", "url": "https://arxiv.org/abs/2607.21157", "type": "理论", "summary": "最近在多种材料中发现了相当大的声子热霍尔效应。为了阐明各种绝缘体中这种神秘的热霍尔响应，我们研究了掺杂莫特绝缘体 La$_{5/3}$Sr$_{1/3}$NiO$_4$ 作为示例材料系统，并揭示了特征声子主导的热霍尔效应。作为横向热响应的敏感探针，热霍尔电阻率 $w_{xy}$ 表现出类似绝缘的温度依赖性 $w_{xy}(T)$、$H=0$ 附近的线性磁场依赖性 $w_{xy}(H)$ 以及低温下的 $T$ 线性热霍尔角。一系列绝缘体中存在类似现象表明 $w_{xy}$ 可以作为声子热霍尔效应的统一描述，并通过类绝缘体 $w_{xy}(T)$ 与材料的局域电子态之间的明显相关性得到证实。", "authors": [{"name": "Dirui Wu"}, {"name": "Ying Kit Tsui"}, {"name": "Xavier Loh"}, {"name": "Minseong Lee"}, {"name": "Eun Sang Choi"}, {"name": "Takao Sasagawa"}, {"name": "Toshimitsu Ito"}, {"name": "Xiao Renshaw Wang"}, {"name": "Pinaki Sengupta"}, {"name": "Xinyang Zhang"}, {"name": "Christos Panagopoulos"}], "featured_authors": [{"name": "Dirui Wu"}, {"name": "Ying Kit Tsui"}, {"name": "Xavier Loh"}, {"name": "Pinaki Sengupta"}, {"name": "Xinyang Zhang"}, {"name": "Christos Panagopoulos"}], "author_count": 11}, {"id": "2607.21221", "category": "cond-mat", "title": "Circular phonon dichroism in $d$-wave altermagnets", "abstract": "Altermagnets, a new class of collinear antiferromagnets, exhibit momentum-dependent spin splitting and offer compelling advantages for antiferromagnetic spintronics. However, the magnetic order is intrinsically difficult to read out, which hinders practical applications. We propose finite-momentum circular phonon dichroism as a direct probe of Néel vector in two-dimensional $d$-wave altermagnets. Combining Onsager reciprocity with $C_{2z}$ lattice symmetry, we find that the dichroic signal reverses sign when the Néel vector is flipped for the in-plane phonon wave vectors. Moreover, a channel-resolved decomposition identifies the circular phonon dichroism originates from the interband coherent transitions. Representative finite-momentum cuts show pronounced dichroic asymmetric ratio, with $|\\eta_{\\mathrm{CPD}}|=37.3\\%$. Our work reveals that the circular-ultrasound absorption acts as a direct probe of the Néel vector of $d$-wave altermagnets.", "url": "https://arxiv.org/abs/2607.21221", "type": "理论+数值", "summary": "交替磁体是一种新型共线反铁磁体，表现出动量相关的自旋分裂，并为反铁磁自旋电子学提供了引人注目的优势。然而，磁序本质上难以读出，这阻碍了实际应用。我们提出有限动量圆声子二色性作为二维$d$波交变磁体中尼尔矢量的直接探测。将Onsager互易性与$C_{2z}$晶格对称性相结合，我们发现当面内声子波矢量翻转Néel矢量时，二向色信号符号反转。此外，通道解析分解识别出源自带间相干跃迁的圆声子二色性。代表性的有限动量切割显示出明显的二向色不对称比，$|\\eta_{\\mathrm{CPD}}|=37.3\\%$。我们的工作表明，圆形超声吸收充当 $d$ 波交变磁体的尼尔矢量的直接探针。", "authors": [{"name": "Ding Li"}, {"name": "Tao Qin"}, {"name": "Jianhui Zhou"}], "featured_authors": [{"name": "Ding Li"}, {"name": "Tao Qin"}, {"name": "Jianhui Zhou"}], "author_count": 3}, {"id": "2607.21226", "category": "cond-mat", "title": "Entanglement asymmetry and quantum Mpemba effect for Kramers-Wannier duality", "abstract": "The Kramers-Wannier duality is the prototypical example of a non-invertible symmetry, yet little is known about its fate away from criticality and out of equilibrium. We introduce the Kramers-Wannier entanglement asymmetry, a quantum-information measure that quantifies the breaking of this non-invertible symmetry in the transverse-field Ising chain. We first investigate its equilibrium properties, showing that it exhibits a striking crossover between the ordered and disordered phases together with a pronounced dip at the critical point that becomes increasingly sharp with subsystem size. We then study quantum quenches from both gapped phases to criticality and show that the Kramers-Wannier entanglement asymmetry decays to zero, signaling the dynamical restoration of the non-invertible symmetry. Remarkably, we uncover the emergence of a quantum Mpemba effect: under suitable conditions, states initially farther from equilibrium restore the Kramers-Wannier symmetry faster than states prepared closer to it. We provide both analytical and numerical evidence for this phenomenon and identify the mechanism responsible for its occurrence. Our work establishes entanglement asymmetry as a powerful probe of non-invertible symmetries beyond equilibrium and opens new perspectives on the dynamics of dualities in quantum many-body systems.", "url": "https://arxiv.org/abs/2607.21226", "type": "理论+数值", "summary": "克莱默-万尼尔对偶性是不可逆对称性的典型例子，但人们对其远离临界点和失衡的命运知之甚少。我们引入了 Kramers-Wannier 纠缠不对称性，这是一种量子信息度量，可以量化横向场伊辛链中这种不可逆对称性的破缺。我们首先研究了它的平衡特性，表明它在有序相和无序相之间表现出惊人的交叉，并且在临界点处出现明显的下降，随着子系统尺寸的增大，该下降变得越来越尖锐。然后，我们研究了从两个带隙相到临界点的量子淬灭，并表明 Kramers-Wannier 纠缠不对称性衰减到零，这标志着不可逆对称性的动态恢复。值得注意的是，我们发现了量子 Mpemba 效应的出现：在适当的条件下，最初远离平衡状态的状态恢复 Kramers-Wannier 对称性的速度比接近平衡状态准备的状态更快。我们为这种现象提供了分析和数值证据，并确定了其发生的机制。\n\n我们的工作将纠缠不对称性建立为超越平衡的不可逆对称性的有力探针，并为量子多体系统中对偶性的动力学开辟了新的视角。", "authors": [{"name": "Milo Vescovo"}, {"name": "Pasquale Calabrese"}, {"name": "Filiberto Ares"}], "featured_authors": [{"name": "Milo Vescovo"}, {"name": "Pasquale Calabrese"}, {"name": "Filiberto Ares"}], "author_count": 3}, {"id": "2607.21232", "category": "cond-mat", "title": "Driven criticality links universal computation and optimal representations", "abstract": "Near-critical dynamics are often linked to enhanced computation, but the underlying mechanism remains unclear. We address this question in reservoir computing, where a fixed recurrent network maps input sequences into high-dimensional states and only a simple readout is trained. We extend fixed-reservoir universality results to discrete-time input-driven reservoirs and connect their key geometric condition, neighborhood separation, to dynamics. To this end, we introduce a finite-resolution neighborhood separability index and an input-conditioned maximal Lyapunov exponent. We find that neighborhood separability, chaotic time-series prediction, and smooth high-dimensional representation geometry are optimized in the same narrow window of marginal driven stability. In this regime, the covariance spectrum approaches the power-law scaling expected for near-optimal smooth representations. Our results link edge-of-instability computation, universality, readout performance, and optimal representation geometry within a common dynamical framework.", "url": "https://arxiv.org/abs/2607.21232", "type": "理论+数值", "summary": "近临界动力学通常与增强计算有关，但其潜在机制仍不清楚。我们在水库计算中解决了这个问题，其中固定的循环网络将输入序列映射到高维状态，并且仅训练简单的读数。我们将固定储层普遍性结果扩展到离散时间输入驱动储层，并将其关键几何条件、邻域分离与动力学联系起来。为此，我们引入了有限分辨率邻域可分离性指数和输入条件最大李亚普诺夫指数。我们发现邻域可分离性、混沌时间序列预测和平滑高维表示几何在边缘驱动稳定性的同一窄窗口中得到优化。在这种情况下，协方差谱接近接近最优平滑表示所期望的幂律缩放。我们的结果将不稳定边缘计算、通用性、读出性能和通用动力学框架内的最佳表示几何联系起来。", "authors": [{"name": "Adrián Roig"}, {"name": "Miguel A. Muñoz"}, {"name": "Guillermo B. Morales"}], "featured_authors": [{"name": "Adrián Roig"}, {"name": "Miguel A. Muñoz"}, {"name": "Guillermo B. Morales"}], "author_count": 3}, {"id": "2607.21254", "category": "cond-mat", "title": "Quasiparticle specific heat of two-component Fermi mixtures: The atomic 163Dy-40K mixture", "abstract": "Ultracold Fermi gases can enter a regime of normal superfluid phase separation, with an unpolarized superfluid component surrounded by a partially polarized normal component. Mass-imbalanced two-component Fermi mixtures on the Bardeen Cooper Schrieffer side of the crossover are studied using mean-field theory within the local density approximation, assuming s-wave pairing induced by a Feshbach resonance and imposing the phase-equilibrium conditions for the phase-separated state. The imbalance chemical potential is chosen to be smaller than the energy gap, so that other possible phases are avoided in the regime considered here. The energy gap and Hartree Fock potentials are obtained self- consistently. The effects of interaction strength and mass ratio on the phase diagram, superfluid density of states, and quasiparticle specific heat are then examined. Within the investigated parameter range, increasing the magnitude of the interaction strength increases the average and imbalance chemical potentials, while reducing the energy gap and the superfluid density of states. The total quasiparticle specific heat decreases with increasing imbalance chemical potential and interaction strength, but increases with mass ratio. Results for the Fermi Fermi mixture of dysprosium and potassium atoms show that the specific heat provides a thermal signature of mass-asymmetric pairing.", "url": "https://arxiv.org/abs/2607.21254", "type": "理论+数值", "summary": "超冷费米气体可以进入正常超流体相分离状态，其中未极化的超流体组分被部分极化的正常组分包围。使用局域密度近似内的平均场理论研究了交叉的 Bardeen Cooper Schrieffer 侧的质量不平衡双组分费米混合物，假设由 Feshbach 共振引起的 s 波配对并为相分离状态施加相平衡条件。选择不平衡化学势小于能隙，以便在此考虑的体系中避免其他可能的相。能隙和 Hartree Fock 势是自洽获得的。然后检查相互作用强度和质量比对相图、超流体态密度和准粒子比热的影响。在研究的参数范围内，增加相互作用强度的大小会增加平均和不平衡化学势，同时减少能隙和超流体态密度。\n\n总准粒子比热随着不平衡化学势和相互作用强度的增加而减小，但随着质量比的增加而增加。镝和钾原子的费米费米混合物的结果表明，比热提供了质量不对称配对的热特征。", "authors": [{"name": "Neda Ebrahimian"}], "featured_authors": [{"name": "Neda Ebrahimian"}], "author_count": 1}, {"id": "2607.21359", "category": "cond-mat", "title": "Thermal pseudo-transitions in a frustrated spin-pseudospin sawtooth chain", "abstract": "We present an exact analysis of a spin--pseudospin X sawtooth chain that incorporates three distinct valence states of copper ions and serves as a minimal model for one-dimensional cuprates composed of corner-sharing copper triangles. The model includes magnetic exchange and electrostatic coupling constants both along the base sites and between base and apex sites capturing the competition between spin and charge degrees of freedom. Using the transfer-matrix method, we derive exact expressions for the free energy and obtain an analytical condition defining the pseudo-critical line associated with pronounced thermodynamic anomalies. The ground-state analysis reveals, besides an antiferromagnetic phase, three frustrated phases characterized by distinct residual entropies. At finite temperatures, these zero-temperature phase boundaries evolve into narrow entropy ridges signaling pseudo-transitions between the corresponding quasi-phases. The specific heat and the avoided-crossing scale exhibit sharp but continuous peaks at the pseudo-critical temperature, whereas the physical correlation length may be controlled by a different subleading eigenvalue. Local correlation functions uncover a cooperative rearrangement from charge-dominated to magnetically correlated regimes. Our results demonstrate that the sawtooth geometry promotes frustration and short-range coherence leading to pronounced pseudo-transition behavior.", "url": "https://arxiv.org/abs/2607.21359", "type": "理论", "summary": "我们对自旋-赝自旋 X 锯齿链进行了精确分析，该锯齿链包含铜离子的三种不同价态，并作为由共享角的铜三角形组成的一维铜酸盐的最小模型。该模型包括沿着基点以及基点和顶点之间的磁交换和静电耦合常数，捕获自旋和电荷自由度之间的竞争。使用传递矩阵方法，我们推导了自由能的精确表达式，并获得了定义与明显热力学异常相关的伪临界线的分析条件。基态分析显示，除了反铁磁相之外，还存在三个以不同残余熵为特征的受抑相。在有限温度下，这些零温度相边界演变成狭窄的熵脊，表示相应准相之间的伪转变。比热和避免交叉尺度在伪临界温度下表现出尖锐但连续的峰值，而物理相关长度可以由不同的次领先特征值控制。\n\n局部相关函数揭示了从电荷主导到磁相关状态的合作重排。我们的结果表明，锯齿几何形状会促进挫败感和短程相干性，从而导致明显的伪过渡行为。", "authors": [{"name": "Onofre Rojas"}, {"name": "Jozef Strečka"}], "featured_authors": [{"name": "Onofre Rojas"}, {"name": "Jozef Strečka"}], "author_count": 2}, {"id": "2607.21379", "category": "cond-mat", "title": "Free-volume origin of diverging direct correlations in hard crystals: insights from an exact one-dimensional model", "abstract": "Second order direct correlation functions in three-dimensional hard-sphere crystals have much larger amplitudes (of the order of $1/n_{\\mathrm{vac}}$ where $n_{\\mathrm{vac}}$ is the vacancy concentration) and a more strongly structured spatial form of apparent shorter range than their liquid-state counterparts. We separate the two underlying questions---why the correlations are large and why they have the form they do---using the exact one-dimensional Percus functional for hard rods. A periodic crystal-like density is represented by Gaussian peaks with occupation probability $q=1-n_{\\mathrm{vac}}$. The relevant thermodynamic quantity is the local insertion free volume $A(x)$. Its minimum can be written as $A_{\\mathrm{min}} =\\Delta_{\\alpha a}+(1-\\Delta_{\\alpha a})n_{\\mathrm{vac}}$, where $\\Delta_{\\alpha a}$ is the residual free volume at full occupation caused by finite localization (characterized by a width parameter $\\alpha$) and lattice spacing $a$. The first and second direct correlations therefore contain the singular dependences $c^{(1)}\\sim\\ln A_{\\mathrm{min}} $ and $c^{(2)} \\sim-1/A_{\\mathrm{min}} $. The observed $1/n_{\\mathrm{vac}}$ dependence is the vacancy-dominated limit $n_{\\mathrm{vac}}\\gg\\Delta_{\\alpha a}$, rather than the most general result. The spatial form of $c^{(2)}$ has a separate geometrical origin: the hard-rod weight functions select configurations in which exclusion intervals and their boundaries intersect regions of small free volume. This produces plateaus, edges, and localized ridges tied to the underlying periodic density. A numerical solution of the inhomogeneous Ornstein--Zernike equation shows how these singular direct correlations are redistributed in the total and pair correlations. The model provides a minimal free-volume explanation for both the magnitude and the lattice-specific form of crystalline direct correlation functions.", "url": "https://arxiv.org/abs/2607.21379", "type": "理论+数值", "summary": "与液态晶体相比，三维硬球晶体中的二阶直接相关函数具有更大的振幅（约为 $1/n_{\\mathrm{vac}}$，其中 $n_{\\mathrm{vac}}$ 是空位浓度），并且具有更强的结构性空间形式，其范围明显更短。我们使用硬棒的精确一维 Percus 泛函来分离两个基本问题——为什么相关性很大以及为什么它们具有这样的形式。周期性晶体状密度由高斯峰表示，占据概率为 $q=1-n_{\\mathrm{vac}}$。相关热力学量是局部插入自由体积$A(x)$。其最小值可以写为 $A_{\\mathrm{min}} =\\Delta_{\\alpha a}+(1-\\Delta_{\\alpha a})n_{\\mathrm{vac}}$，其中 $\\Delta_{\\alpha a}$ 是由有限局域化（由宽度参数 $\\alpha$ 表征）和晶格间距 $a$ 引起的完全占据时的剩余自由体积。因此，第一和第二个直接相关性包含奇异相关性 $c^{(1)}\\sim\\ln A_{\\mathrm{min}} $ 和 $c^{(2)} \\sim-1/A_{\\mathrm{min}} $。\n\n观察到的 $1/n_{\\mathrm{vac}}$ 依赖性是空位主导的极限 $n_{\\mathrm{vac}}\\gg\\Delta_{\\alpha a}$，而不是最一般的结果。 $c^{(2)}$ 的空间形式具有单独的几何起源：硬棒权重函数选择排除区间及其边界与小自由体积区域相交的配置。这会产生与底层周期密度相关的平台、边缘和局部脊。非齐次 Ornstein-Zernike 方程的数值解显示了这些奇异直接相关性如何在总相关性和对相关性中重新分布。该模型为晶体直接相关函数的大小和晶格特定形式提供了最小自由体积解释。", "authors": [{"name": "Alessandro Simon"}, {"name": "Martin Oettel"}], "featured_authors": [{"name": "Alessandro Simon"}, {"name": "Martin Oettel"}], "author_count": 2}, {"id": "2607.21478", "category": "cond-mat", "title": "Pseudogap formation in the moderate correlated layered attractive Hubbard model", "abstract": "We consider the layered attractive Hubbard model with a moderate interaction strength at quarter filling. The Green's function, self-energy, and density of states are calculated for relatively large clusters using the fluctuating local field method within the approximation of vanishing effective interaction. The emergence of a pseudogap is demonstrated for the cluster system, and it is shown that integration over the fluctuating field is equivalent to the summation of zero-mode ladder diagrams above critical temperature. For the large layered system, a pseudogap in the density of states is obtained within a cluster scheme that treats the coupling between layers as a static $U(1)$ symmetry-breaking field.", "url": "https://arxiv.org/abs/2607.21478", "type": "理论", "summary": "我们考虑分层有吸引力的哈伯德模型，在季度填充时具有适度的相互作用强度。使用波动局部场方法在有效相互作用消失的近似范围内计算相对较大团簇的格林函数、自能和态密度。证明了团簇系统中赝能隙的出现，并且表明脉动场上的积分相当于临界温度以上的零模梯图的求和。对于大型分层系统，状态密度中的赝能隙是在簇方案中获得的，该簇方案将层之间的耦合视为静态$U(1)$对称破缺场。", "authors": [{"name": "A. V. Belov"}, {"name": "A. N. Rubtsov"}, {"name": "B. Krippa"}], "featured_authors": [{"name": "A. V. Belov"}, {"name": "A. N. Rubtsov"}, {"name": "B. Krippa"}], "author_count": 3}, {"id": "2607.21490", "category": "cond-mat", "title": "Strong correlations and local self-energies from on-site ensembles", "abstract": "Addressing the many-body electronic-structure problem is a central goal of modern condensed-matter physics. Paramagnetic Mott insulators, in particular, have long represented a challenge for standard approaches, such as density-functional theory. Historically, these systems have been tackled either by considering many-body dynamics, as in the case of dynamical mean-field theory (DMFT), or, more recently, by invoking a polymorphous description consisting of large supercells populated with static symmetry-broken motifs whose spatial average restores the paramagnetic state. Inspired by these viewpoints, we introduce the on-site dephased ensemble (DE) approximation, in which the local electronic-structure problem is described by a thermal ensemble of all accessible local static solutions; this gives rise to a strong frequency dependence of the local electronic self-energy, as seen in DMFT or in the coherent-potential approximation of disordered alloys. We show that the DE successfully recovers defining hallmarks of strongly correlated Mott systems, both in terms of the self-energy as well as the persistence of local moments in time, in quantitative agreement with DMFT. By bypassing expensive quantum Monte Carlo solvers or large supercell calculations, this approach offers efficient routes to treating paramagnetic Mott systems in a first-principles setting, and highlights a deeper connection between the physics of strong correlations and that of disorder.", "url": "https://arxiv.org/abs/2607.21490", "type": "理论+数值", "summary": "解决多体电子结构问题是现代凝聚态物理学的中心目标。特别是顺磁莫特绝缘体长期以来一直是密度泛函理论等标准方法的挑战。从历史上看，这些系统要么通过考虑多体动力学来解决，如动态平均场理论（DMFT），要么最近通过调用由大型超级单元组成的多态描述，这些超级单元填充有静态对称破缺图案，其空间平均恢复顺磁状态。受这些观点的启发，我们引入了现场相移系综（DE）近似，其中局部电子结构问题由所有可访问的局部静态解的热系综来描述；这导致局域电子自能具有很强的频率依赖性，如 DMFT 或无序合金的相干势近似中所见。我们证明 DE 成功地恢复了强相关莫特系统的定义特征，无论是在自能方面还是局部时刻持续性方面，与 DMFT 的定量一致。\n\n通过绕过昂贵的量子蒙特卡罗求解器或大型超级单元计算，这种方法提供了在第一性原理设置中处理顺磁莫特系统的有效途径，并强调了强相关物理与无序物理之间更深层的联系。", "authors": [{"name": "Alberto Carta"}, {"name": "Hugo U. R. Strand"}, {"name": "Michael Schüler"}, {"name": "Nicola Marzari"}], "featured_authors": [{"name": "Alberto Carta"}, {"name": "Hugo U. R. Strand"}, {"name": "Michael Schüler"}, {"name": "Nicola Marzari"}], "author_count": 4}, {"id": "2607.21581", "category": "cond-mat", "title": "Symmetry and Quantum Geometry in Bloch Bands", "abstract": "Quantum geometric quantities have featured heavily in the discussion of the properties of quantum systems in recent years. Among quantities most commonly discussed is the variance of Berry curvature and the integral of the trace of the quantum metric tensor. Despite their usefulness, it is known that they suffer from one significant complication: for a tight-binding model, the quantum geometric quantities depend not only on the parameters of the tight-binding model itself, but also the real space geometry of the tight-binding model, the so-called \"orbital embedding\". One explicitly geometry-independent quantity is therefore the minimal value of the quantum geometric quantity out of all possible real space geometries. In this work, we demonstrate that, if the tight-binding model is compatible with certain spatial symmetries, then the real space geometry that minimizes the variance of the Berry curvature or the integral of the trace of the quantum metric tensor must obey all those spatial symmetries. We further show that the statement is applicable to systems with magnetic translation symmetries and other composite symmetries, with implications for the quantum geometry of the Hofstadter model.", "url": "https://arxiv.org/abs/2607.21581", "type": "理论", "summary": "近年来，量子几何量在量子系统性质的讨论中占据重要地位。最常讨论的量是贝里曲率的方差和量子度量张量的迹的积分。尽管它们很有用，但众所周知，它们面临一个显着的复杂性：对于紧束缚模型，量子几何量不仅取决于紧束缚模型本身的参数，还取决于紧束缚模型的真实空间几何，即所谓的“轨道嵌入”。因此，一个明确的与几何无关的量是所有可能的真实空间几何中量子几何量的最小值。在这项工作中，我们证明，如果紧束缚模型与某些空间对称性兼容，那么最小化贝里曲率方差或量子度量张量迹积分的真实空间几何必须遵守所有这些空间对称性。\n\n我们进一步表明，该陈述适用于具有磁平移对称性和其他复合对称性的系统，并对霍夫施塔特模型的量子几何产生影响。", "authors": [{"name": "Ziwei Wang"}, {"name": "Charlie Raca"}, {"name": "Steven H. Simon"}], "featured_authors": [{"name": "Ziwei Wang"}, {"name": "Charlie Raca"}, {"name": "Steven H. Simon"}], "author_count": 3}, {"id": "2607.21583", "category": "cond-mat", "title": "Complexity transition in the Dicke model of light-matter interaction", "abstract": "Tuning the coupling strength $g$ of an interacting quantum system may drive a sudden change in its ground-state or thermal properties. To identify and grasp non-analytical, or even discontinuous, transitions in far-from-equilibrium dynamics proves more challenging. Recently Krylov complexity $C_K$ has offered fresh insights about operator growth, thermalization, and chaos in quantum dynamics. Yet it remains unclear if, and how, changing $g$ can trigger a sharp transition in the complexity measures. Here we present evidence for such a transition by mapping out the complexity phase diagram of the paradigmatic Dicke model describing two-level atoms coupled to a cavity photon mode. Two qualitatively different regimes of dynamics are identified and characterized. At the transition, the slope of $C_K$ changes suddenly to coincide with a jump in the Krylov entropy. We elucidate the nature of the regime change from the wave packet dynamics in Krylov space, where a particle is confined by a roughly linear potential but hops as if it lives in a Rindler reference frame. The competition between confinement, which leads to bouncing, and deconfinement by Rindler hopping, which leads to the destruction of wave packet analogous to gravitational spaghettification, is sensitive to the disorder in Lanczos coefficients. The framework outlined here can be applied to other quantum many-body systems.", "url": "https://arxiv.org/abs/2607.21583", "type": "理论+数值", "summary": "调整相互作用的量子系统的耦合强度 $g$ 可能会导致其基态或热性质的突然变化。事实证明，识别和掌握非分析的、甚至不连续的、远离平衡动力学的转变更具挑战性。最近，克雷洛夫复杂度 $C_K$ 为量子动力学中的算子增长、热化和混沌提供了新的见解。然而，目前尚不清楚改变 $g$ 是否以及如何引发复杂性指标的急剧转变。在这里，我们通过绘制描述与腔光子模式耦合的两级原子的典型迪克模型的复杂性相图来提供这种转变的证据。两种性质不同的动态机制被识别和表征。在转变时，$C_K$ 的斜率突然变化，与克雷洛夫熵的跳跃一致。我们从克雷洛夫空间的波包动力学中阐明了状态变化的本质，其中一个粒子受到大致线性势的限制，但会跳跃，就好像它生活在 Rindler 参考系中一样。\n\n限制（导致弹跳）与通过 Rindler 跳跃（导致类似于引力面条化的波包破坏）的解除限制之间的竞争对 Lanczos 系数的无序很敏感。这里概述的框架可以应用于其他量子多体系统。", "authors": [{"name": "Yicheng Zhang"}, {"name": "Erhai Zhao"}], "featured_authors": [{"name": "Yicheng Zhang"}, {"name": "Erhai Zhao"}], "author_count": 2}, {"id": "2607.20567", "category": "hep-th", "title": "Tensor resonances in teleparallel Gauss-Bonnet branes", "abstract": "We construct an analytical thick-brane solution in linear teleparallel Gauss-Bonnet gravity using a first-order formalism generated by a sine-Gordon superpotential. The resulting asymptotically $\\mathrm{AdS}_5$ configurations exhibit brane splitting controlled by the dimensionless parameter $q=4\\alpha k^2$. An analytical splitting condition is derived and combined with tensor-stability requirements to identify the physically viable parameter region. We show that the tensor spectrum is free of tachyonic instabilities and supports a normalizable graviton zero mode. The massive sector exhibits odd-parity gravitational resonances whose quasi-localization is significantly enhanced near the stability boundary. Our results establish a direct link between brane splitting, tensor stability, and gravitational resonances in teleparallel Gauss-Bonnet braneworlds.", "url": "https://arxiv.org/abs/2607.20567", "type": "理论", "summary": "我们使用正弦戈登超势生成的一阶形式主义构建了线性远程平行高斯-邦内重力的解析厚膜解。由此产生的渐近 $\\mathrm{AdS}_5$ 配置表现出由无量纲参数 $q=4\\alpha k^2$ 控制的膜分裂。导出分析分裂条件并与张量稳定性要求相结合，以确定物理上可行的参数区域。我们证明张量谱没有快子不稳定性，并且支持可归一化的引力子零模式。大质量扇区表现出奇宇称引力共振，其准局域化在稳定边界附近显着增强。我们的结果建立了远平行高斯-邦内膜世界中膜分裂、张量稳定性和引力共振之间的直接联系。", "authors": [{"name": "J. V. R. Alencar"}, {"name": "A. R. P. Moreira"}, {"name": "F. C. E. Lima"}, {"name": "J. B. R. Silva"}], "featured_authors": [{"name": "J. V. R. Alencar"}, {"name": "A. R. P. Moreira"}, {"name": "F. C. E. Lima"}, {"name": "J. B. R. Silva"}], "author_count": 4}, {"id": "2607.20603", "category": "hep-th", "title": "Moduli-Space Laplacians, Asymptotic Geometry, and the Emergent String Conjecture", "abstract": "At asymptotic limits of moduli spaces of quantum gravity vacua, we argue that the masses of the lightest particle towers are eigenfunctions of the moduli-space Laplacian. The associated eigenvalues are quantized by the Emergent String Conjecture and determine the exponential decay rates of axionic directions in these limits. We also connect the quantization of Laplacian eigenvalues to the spectrum of instantons for the theory. We support our claims with diverse examples that preserve between 4 and 32 supercharges.", "url": "https://arxiv.org/abs/2607.20603", "type": "理论", "summary": "在量子引力真空模空间的渐近极限处，我们认为最轻的粒子塔的质量是模空间拉普拉斯算子的本征函数。相关的特征值通过涌现弦猜想进行量化，并确定轴子方向在这些极限内的指数衰减率。我们还将拉普拉斯特征值的量化与理论的瞬子谱联系起来。我们通过保留 4 到 32 个增压的各种示例来支持我们的主张。", "authors": [{"name": "Christian Aoufia"}, {"name": "Muldrow Etheredge"}, {"name": "Bernardo Fraiman"}, {"name": "Sanjay Raman"}, {"name": "Alexander Stewart"}], "featured_authors": [{"name": "Christian Aoufia"}, {"name": "Muldrow Etheredge"}, {"name": "Bernardo Fraiman"}, {"name": "Sanjay Raman"}, {"name": "Alexander Stewart"}], "author_count": 5}, {"id": "2607.20607", "category": "hep-th", "title": "Towards Generalized Dimers for GTPs: $\\mathcal{N}=2$ Fractional Branes at Infinite Coupling", "abstract": "Generalized Toric Polygons (GTPs) extend the geometric realization of $5d$ superconformal field theories beyond toric Calabi-Yau 3-folds to general $(p,q)$ 5-brane webs ending on 7-branes. We take significant steps towards the generalization of brane tilings for GTPs, or equivalently, the corresponding quiver theories. We focus on GTPs connected to ordinary toric diagrams by polytope mutations. Parallel 5-brane legs of a $(p,q)$ web define $\\mathcal{N}=2$ fractional branes bounded by the corresponding parallel zig-zag paths in the brane tiling obtained by treating the GTP as an ordinary toric diagram. We propose that terminating multiple 5-branes on a common 7-brane, the defining feature of GTPs, translates into bringing these zig-zag paths together, thereby shrinking the corresponding $\\mathcal{N}=2$ fractional branes to zero size in a process we call $\\mathcal{N}=2$ strip condensation. We show that strip condensation follows from mirror symmetry when the coefficients in the Newton polynomial are tuned to the GTP point. We further support this proposal through several non-trivial consistency checks. In particular, it correctly reproduces the expected number of gauge groups, given equivalently by that of the mutation-related toric diagram or by the number of $T$-cones in a tessellation of the GTP. We verify this for all examples previously considered in the literature, as well as for a new infinite family of GTPs with arbitrarily large $T$-cones. Strip condensation drives the corresponding gauge groups to infinite coupling. Confinement then yields quivers that coincide with those of the mutation-related toric diagrams up to vector pairs and adjoint fields, suggesting that GTP quivers are related to those of the corresponding toric diagrams by relevant deformations, extending to GTPs the known correspondence between polytope mutations and relevant deformations.", "url": "https://arxiv.org/abs/2607.20607", "type": "理论", "summary": "广义环面多边形 (GTP) 将 $5d$ 超共形场论的几何实现扩展到环面 Calabi-Yau 3 倍之外，扩展到以 7 膜结尾的通用 $(p,q)$ 5 膜网。我们在 GTP 的膜平铺（或相应的箭袋理论）的推广方面迈出了重要的一步。我们重点关注通过多表位突变与普通环面图连接的 GTP。 $(p,q)$ 网的平行 5 膜腿定义 $\\mathcal{N}=2$ 分数膜，其边界是通过将 GTP 视为普通环面图而获得的膜平铺中相应的平行锯齿形路径。我们建议，在一个共同的 7 膜上终止多个 5 膜（GTP 的定义特征），转化为将这些锯齿形路径聚集在一起，从而在我们称为 $\\mathcal{N}=2$ 带状冷凝的过程中将相应的 $\\mathcal{N}=2$ 分数膜缩小到零大小。我们证明，当牛顿多项式中的系数调整到 GTP 点时，带状凝聚遵循镜面对称。我们通过几次重要的一致性检查进一步支持该提案。\n\n特别是，它正确地再现了预期的规范组数量，相当于由突变相关的环面图或 GTP 镶嵌中 $T$ 锥体的数量给出。我们对文献中先前考虑的所有示例以及具有任意大 $T$ 锥体的新无限 GTP 系列验证了这一点。带状冷凝驱动相应的仪表组无限耦合。然后，限制产生与突变相关环面图一致的颤动，直到向量对和伴随场，这表明 GTP 颤动通过相关变形与相应环面图的颤动相关，将多胞形突变和相关变形之间的已知对应关系扩展到 GTP。", "authors": [{"name": "Sebastián Franco"}, {"name": "Diego Rodríguez-Gómez"}], "featured_authors": [{"name": "Sebastián Franco"}, {"name": "Diego Rodríguez-Gómez"}], "author_count": 2}, {"id": "2607.20613", "category": "hep-th", "title": "New Type IIB Poly-instanton Effects and Axion Quintessence", "abstract": "Previous studies of poly-instantons in type IIB Calabi-Yau orientifolds found that these effects arise when Euclidean D3-branes wrap rigid cycles with a Wilson line. In this work, we extend this result through a general analysis of instanton zero modes, revealing the existence of new poly-instanton effects for rigid cycles with a deformation, provided that O3-planes are localised on the worldvolume of the Euclidean D3-brane. We provide concrete Calabi-Yau examples with explicit orientifold involution and brane setup. One of them is particularly well suited for realising axion hilltop quintessence. In particular, the double exponential suppression of poly-instanton effects allows to reproduce the observed vacuum energy for natural values of the underlying parameters.", "url": "https://arxiv.org/abs/2607.20613", "type": "理论", "summary": "先前对 IIB 型 Calabi-Yau 东方褶皱中的聚瞬子的研究发现，当欧几里德 D3 膜用威尔逊线包裹刚性循环时，就会出现这些效应。在这项工作中，我们通过对瞬子零模态的一般分析扩展了这一结果，揭示了变形刚性循环中新的多瞬子效应的存在，前提是 O3 平面位于欧几里德 D3 膜的世界体积上。我们提供了具体的 Calabi-Yau 示例，具有明确的东方对合和膜设置。其中之一特别适合实现轴子山顶精髓。特别是，多瞬时效应的双指数抑制允许重现观察到的真空能量以获得基础参数的自然值。", "authors": [{"name": "Luca Caraffi"}, {"name": "Federico Carta"}, {"name": "Michele Cicoli"}], "featured_authors": [{"name": "Luca Caraffi"}, {"name": "Federico Carta"}, {"name": "Michele Cicoli"}], "author_count": 3}, {"id": "2607.20622", "category": "hep-th", "title": "Sp(4,Z) actions on 3d U(1)^2 symmetric theories: Order-five duality and bilayer quantum Hall hierarchies", "abstract": "The $\\mathrm{SL}(2,\\mathbb{Z})$ electromagnetic duality of 4d Maxwell theory induces theory-generating operations on 3d theories with $U(1)$ global symmetry. For theories with $U(1)^n$ symmetry, this structure generalizes to $\\mathrm{Sp}(2n,\\mathbb{Z})$. Focusing on the $U(1)^2$ case, we formulate the bulk $\\mathrm{Sp}(4,\\mathbb{Z})$ action and derive the corresponding boundary operations. We identify an intrinsically two-component element of order five, which generalizes the order-three $ST$ element of the single-$U(1)$ theory. Although its fifth power acts trivially in the bulk, the corresponding boundary operation closes only up to a decoupled $U(1)_1$ invertible phase, suggesting a mixed duality-gravitational anomaly. We realize the resulting theory-generating web for Abelian Chern-Simons theories within the $K$-matrix formalism and apply it to bilayer fractional quantum Hall systems. Recasting the Haldane--Halperin hierarchy construction as a sequence of $\\mathrm{SL}(2,\\mathbb{Z})$ operations, we generalize it to systems with charge $U(1)_c$ and pseudospin $U(1)_s$ symmetries. The resulting bilayer hierarchies contain branches terminating in an interlayer-correlated bosonic $(221)$ daughter sector, yielding candidate Abelian states at the even-denominator equal-layer fillings $3/8+3/8$ and $5/12+5/12$. Integral changes of anyon basis establish the equivalence of these states to their corresponding Abelian composite-fermion descriptions. We further discuss the spin-charge constraints that arise when the electromagnetic background field is treated as a spin-$c$ connection.", "url": "https://arxiv.org/abs/2607.20622", "type": "理论", "summary": "4d 麦克斯韦理论的 $\\mathrm{SL}(2,\\mathbb{Z})$ 电磁对偶性引发了具有 $U(1)$ 全局对称性的 3d 理论的理论生成操作。对于具有 $U(1)^n$ 对称性的理论，该结构可推广到 $\\mathrm{Sp}(2n,\\mathbb{Z})$。着眼于$U(1)^2$情况，我们制定了批量$\\mathrm{Sp}(4,\\mathbb{Z})$动作并推导了相应的边界操作。我们确定了本质上五阶的二元元素，它概括了单 $U(1)$ 理论的三阶 $ST$ 元素。尽管它的五次方在整体上作用微不足道，但相应的边界运算仅接近解耦的$U(1)_1$可逆相，这表明混合对偶引力异常。我们在 $K$ 矩阵形式主义中实现了阿贝尔陈-西蒙斯理论的理论生成网络，并将其应用于双层分数量子霍尔系统。将 Haldane-Halperin 层次结构重新构造为 $\\mathrm{SL}(2,\\mathbb{Z})$ 操作序列，我们将其推广到具有电荷 $U(1)_c$ 和赝自旋 $U(1)_s$ 对称性的系统。\n\n由此产生的双层层次结构包含终止于层间相关玻色子 $(221)$ 子扇区的分支，产生偶数分母等层填充 $3/8+3/8$ 和 $5/12+5/12$ 处的候选阿贝尔态。任意子基的积分变化建立了这些状态与其相应的阿贝尔复合费米子描述的等价性。我们进一步讨论当电磁背景场被视为自旋 $c$ 连接时出现的自旋电荷约束。", "authors": [{"name": "Yasin F. Alam"}, {"name": "Andreas Karch"}, {"name": "Da-Chuan Lu"}, {"name": "Ryan C. Spieler"}], "featured_authors": [{"name": "Yasin F. Alam"}, {"name": "Andreas Karch"}, {"name": "Da-Chuan Lu"}, {"name": "Ryan C. Spieler"}], "author_count": 4}, {"id": "2607.20678", "category": "hep-th", "title": "Uniqueness of null-local modular flow", "abstract": "In arXiv:2306.01837 , it was conjectured that one can engineer a large class of quantum field theory states for which the modular flow on a spacelike slice is \"instantaneously local.\" Here we show that on null slices, such flows are highly constrained; ultraviolet universality essentially requires null-local modular flow to be unique. Concretely, we study massless Klein-Gordon theory in Minkowski spacetime, and construct, for any sufficiently regular future-directed vector field on the past null boundary of a causal diamond, a state that has this vector field as its instantaneous modular flow. We then show by explicit computation that no two distinct states in this class can be realized in the same local Hilbert space. Using a more abstract argument, we also show that in the vacuum sector of the theory, the only null-local modular flow in a causal diamond is provided by the vacuum state itself. We also comment on the construction of null-local modular flow for massive scalars, free Maxwell fields, free gravitons, and in curved backgrounds.", "url": "https://arxiv.org/abs/2607.20678", "type": "理论", "summary": "在 arXiv:2306.01837 中，人们推测人们可以设计一大类量子场论状态，其中类空间切片上的模流是“瞬时局部的”。在这里，我们表明，在空切片上，此类流受到高度约束；紫外线普遍性本质上要求零局部模流是唯一的。具体来说，我们研究了闵可夫斯基时空中的无质量克莱因-戈登理论，并为因果菱形的过去零边界上的任何足够规则的未来导向向量场构造了一个以该向量场作为其瞬时模流的状态。然后，我们通过显式计算表明，在同一局部希尔伯特空间中不能实现此类中的两个不同状态。使用更抽象的论证，我们还表明，在理论的真空部分中，因果菱形中唯一的零局部模流是由真空状态本身提供的。我们还评论了大标量、自由麦克斯韦场、自由引力子和弯曲背景下的零局部模流的构造。", "authors": [{"name": "Gautam Satishchandran"}, {"name": "Jonathan Sorce"}], "featured_authors": [{"name": "Gautam Satishchandran"}, {"name": "Jonathan Sorce"}], "author_count": 2}, {"id": "2607.20777", "category": "hep-th", "title": "Flux Vacua Near the Boundary of Large Complex Structure", "abstract": "Three-form fluxes generate a potential for the complex structure moduli in type IIB string compactifications on Calabi-Yau threefolds. In the large complex structure patch, the potential consists of a perturbative contribution and a convergent series of instanton corrections. We present examples of vacua near the boundary of large complex structure, where the minimum of the potential is essentially determined by the perturbative contribution and the first instanton correction, while the effect of all higher instantons is negligible. This phenomenon occurs when fluxes are such that the magnitude of the perturbative potential in certain directions in moduli space is of the same size as the first instanton contribution. Analysing an ensemble of flux vacua, we find that this phenomenon is statistically quite common. We also discover more subtle phenomena where instanton terms affect the multiplicity of the solutions and induce monodromy shifts.", "url": "https://arxiv.org/abs/2607.20777", "type": "理论", "summary": "三种形式的通量在 Calabi-Yau 三重上的 IIB 型弦紧化中产生复杂结构模量的潜力。在大型复杂结构斑块中，势由微扰贡献和一系列收敛的瞬子校正组成。我们提出了大型复杂结构边界附近的真空示例，其中势的最小值本质上由微扰贡献和第一瞬子校正决定，而所有更高瞬子的影响可以忽略不计。当通量使得模空间中某些方向上的微扰势的大小与第一瞬子贡献的大小相同时，就会发生这种现象。通过分析真空通量的集合，我们发现这种现象在统计上相当普遍。我们还发现了更微妙的现象，其中瞬子项影响解的多重性并引起单性转变。", "authors": [{"name": "Aman Chauhan"}, {"name": "Michele Cicoli"}, {"name": "Anshuman Maharana"}, {"name": "Pellegrino Piantadosi"}], "featured_authors": [{"name": "Aman Chauhan"}, {"name": "Michele Cicoli"}, {"name": "Anshuman Maharana"}, {"name": "Pellegrino Piantadosi"}], "author_count": 4}, {"id": "2607.20899", "category": "hep-th", "title": "Quantum Mpemba effect in holography", "abstract": "We investigate the quantum Mpemba effect in a holographic superfluid, in which states with stronger initial symmetry breaking relax faster toward the symmetry-restored equilibrium. We demonstrate its emergence by identifying the shifted free energy computed from the energy flux into the black hole horizon as monotonic distance measure. By decomposing the nonlinear bulk dynamics based on quasinormal modes, we reveal that the anomalous relaxation is governed by a dynamical competition in which the slowest-decaying mode is suppressed while the second mode is amplified. These findings provide a holographic perspective on the quantum Mpemba effect in nonequilibrium relaxation involving strongly coupled degrees of freedom.", "url": "https://arxiv.org/abs/2607.20899", "type": "理论", "summary": "我们研究了全息超流体中的量子姆潘巴效应，其中初始对称性破缺较强的状态会更快地松弛到对称性恢复平衡。我们通过将进入黑洞视界的能量通量计算出的移动自由能识别为单调距离度量来证明它的出现。通过基于准正则模式分解非线性体动力学，我们揭示了反常弛豫是由动态竞争控制的，其中最慢衰减模式被抑制，而第二模式被放大。这些发现为涉及强耦合自由度的非平衡弛豫中的量子 Mpemba 效应提供了全息视角。", "authors": [{"name": "Xian-Hui Ge"}, {"name": "Shuta Ishigaki"}, {"name": "Yu-Qi Lei"}, {"name": "Yu Tian"}], "featured_authors": [{"name": "Xian-Hui Ge"}, {"name": "Shuta Ishigaki"}, {"name": "Yu-Qi Lei"}, {"name": "Yu Tian"}], "author_count": 4}, {"id": "2607.20927", "category": "hep-th", "title": "Coherent states versus Glauber-Sudarshan States: Bootstrapping, Schwinger-Keldysh Contours and Lefschetz Thimbles", "abstract": "We investigate how, in a highly constrained system such as a four-dimensional diffeomorphism-invariant theory with vanishing bulk Hamiltonian and non-trivial interactions between the metric and additional degrees of freedom, transient excited states--called Glauber-Sudarshan states--can be constructed over supersymmetric minima. These states are generically non-supersymmetric and, although they are not minima of any potential, they admit positive-energy metric configurations that effectively mimic four-dimensional quasi-de Sitter backgrounds. We analyze how such states differ from conventional coherent states by studying their time evolution both in the canonical formalism--via boundary Hamiltonians--and in the in-in path-integral framework through Schwinger-Keldysh contours. We also examine the consistency of the construction across three complementary descriptions: the 1PI effective action, the Wilsonian (or exact renormalization group) effective action, and the Picard-Lefschetz (Lefschetz-thimble) decomposition of the Schwinger-Keldysh path integral, which provides the trans-series organization of the theory. In the presence of gauge-fixing and ghost sectors, we show that the dynamics of these transient configurations are governed by a nontrivial bootstrap relation that simultaneously constrains their behavior near supersymmetric Minkowski vacua and along quasi-de Sitter-like trajectories. Finally, we examine the Wheeler-DeWitt equation, the notion of time in the presence of transient excited states, and the emergence of the bulk Schrodinger equation. We further show that these states admit a natural structural interpretation analogous to the vertex operators that arise in the two-dimensional world-sheet formulation of string theory.", "url": "https://arxiv.org/abs/2607.20927", "type": "理论", "summary": "我们研究了如何在高度约束的系统中，例如四维微分同胚不变理论，具有消失的体积哈密顿量以及度量和附加自由度之间的非平凡相互作用，瞬态激发态（称为格劳伯-苏达山态）可以在超对称最小值上构造。这些状态通常是非超对称的，尽管它们不是任何势的最小值，但它们承认有效模仿四维准德西特背景的正能量度量配置。我们通过研究它们在规范形式主义（通过边界哈密顿量）和通过 Schwinger-Keldysh 轮廓的内内路径积分框架中的时间演化，来分析这些状态与传统相干态的不同之处。我们还检查了三个互补描述的构造的一致性：1PI 有效作用、威尔逊（或精确重整化群）有效作用以及 Schwinger-Keldysh 路径积分的 Picard-Lefschetz（Lefschetz-顶针）分解，它提供了理论的跨级数组织。\n\n在存在规范固定和鬼扇区的情况下，我们表明这些瞬态配置的动力学受非平凡的自举关系控制，该关系同时约束它们在超对称明可夫斯基真空附近和沿着准德西特轨迹的行为。最后，我们研究了惠勒-德威特方程、瞬态激发态存在下的时间概念以及体薛定谔方程的出现。我们进一步表明，这些状态承认类似于弦理论的二维世界表公式中出现的顶点算子的自然结构解释。", "authors": [{"name": "Heliudson Bernardo"}, {"name": "Tatsuya Daniel"}, {"name": "Keshav Dasgupta"}, {"name": "Brayden Hull"}, {"name": "Yue Katherine Lei"}, {"name": "Yiya Selina Li"}], "featured_authors": [{"name": "Heliudson Bernardo"}, {"name": "Tatsuya Daniel"}, {"name": "Keshav Dasgupta"}, {"name": "Brayden Hull"}, {"name": "Yue Katherine Lei"}, {"name": "Yiya Selina Li"}], "author_count": 6}, {"id": "2607.20936", "category": "hep-th", "title": "Boundary Completion of Vacuum Persistence Probability", "abstract": "The vacuum persistence probability, encoded in the imaginary part of the in-out effective action, is a basic measure of vacuum instability and particle production. However, its evaluation may appear prescription-dependent: the Bogoliubov prescription and the Green's function prescription can yield different expressions. We show that this apparent ambiguity arises because the Green's function prescription omits the nontrivial contribution from the endpoint vacuum wavefunctionals, which should be present in the complete in-out amplitude. Including this contribution accomplishes the boundary completion of the Green's function prescription. The ambiguity is thereby resolved, and the complete result agrees with the Bogoliubov expression.", "url": "https://arxiv.org/abs/2607.20936", "type": "理论", "summary": "真空持续概率，编码在输入输出有效作用的虚部中，是真空不稳定性和粒子产生的基本度量。然而，它的评估可能看起来依赖于处方：Bogoliubov 处方和格林函数处方可以产生不同的表达式。我们表明，出现这种明显的模糊性是因为格林函数规定忽略了端点真空波泛函的重要贡献，而端点真空波函数应该存在于完整的输入输出幅度中。 Including this contribution accomplishes the boundary completion of the Green's function prescription. The ambiguity is thereby resolved, and the complete result agrees with the Bogoliubov expression.", "authors": [{"name": "Yu Zhou"}, {"name": "Hai-Qing Zhang"}], "featured_authors": [{"name": "Yu Zhou"}, {"name": "Hai-Qing Zhang"}], "author_count": 2}, {"id": "2607.20991", "category": "hep-th", "title": "Flavour current correlators and the non-Abelian hydrodynamic approximation: the charged sector", "abstract": "Flavor-current correlators are studied in strongly-coupled dense (holographic) matter, at finite quark chemical potential $\\mu_q$ and finite isospin asymmetry. The non-Abelian hydrodynamic description of the charged currents is derived in the presence of an isospin chemical potential $\\mu_3$. The two-point correlators of charged currents are then computed holographically at finite quark and isospin chemical potentials. In the near-extremal hydrodynamic regime, $\\omega, k, T, \\mu_3 \\ll \\mu \\equiv \\sqrt{\\mu_q^2+\\mu_3^2}$, relevant for cold strongly coupled matter, the IR properties of the correlators are studied. It is shown that in this regime, the correlators agree with the non-Abelian hydrodynamic predictions. Therefore, the traditional regime of validity of standard hydrodynamics extends beyond $\\omega, k \\ll T \\ll \\mu$ to the so-called extended hydrodynamic regime $T\\ll \\omega, k \\ll \\mu$. The holographic product formula is applied to the present non-Abelian system, and is used to propose an extended hydrodynamic approximation capturing both hydrodynamic-like poles and the leading effect of AdS$_2$ poles, by resumming the low-$\\omega$ logarithms. The results are verified through a detailed numerical analysis of the exact correlators and quasi-normal mode spectrum.", "url": "https://arxiv.org/abs/2607.20991", "type": "理论", "summary": "在强耦合致密（全息）物质、有限夸克化学势 $\\mu_q$ 和有限同位旋不对称性下研究味流相关器。带电电流的非阿贝尔流体动力学描述是在同位旋化学势 $\\mu_3$ 存在的情况下导出的。然后在有限夸克和同位旋化学势下全息计算带电电流的两点相关器。在与冷强耦合物质相关的近极值流体动力学状态 $\\omega, k, T, \\mu_3 \\ll \\mu \\equiv \\sqrt{\\mu_q^2+\\mu_3^2}$ 中，研究了相关器的红外特性。结果表明，在这种情况下，相关器与非阿贝尔流体动力学预测一致。因此，标准流体动力学的传统有效性范围超出了 $\\omega, k \\ll T \\ll \\mu$ 到所谓的扩展流体动力学范围 $T\\ll \\omega, k \\ll \\mu$。将全息乘积公式应用于当前的非阿贝尔系统，并通过恢复低 $\\omega$ 对数，提出一种扩展的流体动力学近似，捕获类似流体动力学的极点和 AdS$_2$ 极点的主导效应。\n\n通过对精确相关器和准简正模谱的详细数值分析来验证结果。", "authors": [{"name": "Thomas Apostolidis"}, {"name": "Matti Järvinen"}, {"name": "Elias Kiritsis"}, {"name": "Francesco Nitti"}, {"name": "Andrea Olzi"}, {"name": "Edwan Préau"}], "featured_authors": [{"name": "Thomas Apostolidis"}, {"name": "Matti Järvinen"}, {"name": "Elias Kiritsis"}, {"name": "Francesco Nitti"}, {"name": "Andrea Olzi"}, {"name": "Edwan Préau"}], "author_count": 6}, {"id": "2607.21030", "category": "hep-th", "title": "Selecting Complex Extremal Surfaces with the Kontsevich--Segal--Witten Criterion", "abstract": "Complex extremal surfaces naturally arise in holographic observables associated with timelike subregions in AdS/CFT and with holographic observables in dS/CFT, but their integration contours are generally ambiguous. In this work, we propose a method for constructing complex bulk metrics from families of complex extremal surfaces, thereby generating candidate complex geometries relevant to the gravitational path integral. This construction provides a concrete realization of how complex bulk geometry may emerge from timelike entanglement, extending the familiar idea that spacetime geometry is encoded in quantum entanglement. We use the Kontsevich--Segal--Witten (KSW) criterion as a strong consistency condition to constrain the corresponding contours. The same framework also explains why spacelike entanglement naturally selects a real Lorentzian section. In several AdS and dS examples, the KSW condition uniquely determines the admissible contour within the class considered. We also identify configurations for which the resulting complex geometry violates the KSW bound near the asymptotic boundary, revealing both the scope and the limitations of the construction. These results highlight KSW admissibility as a useful organizing principle for complex saddles in real-time holography.", "url": "https://arxiv.org/abs/2607.21030", "type": "理论", "summary": "复杂的极值表面自然出现在与 AdS/CFT 中的类时子区域以及 dS/CFT 中的全息可观测量相关的全息可观测量中，但它们的积分轮廓通常是不明确的。在这项工作中，我们提出了一种从复杂极值表面族构造复杂体积度量的方法，从而生成与重力路径积分相关的候选复杂几何形状。这种结构提供了复杂体几何如何从类时纠缠中出现的具体实现，扩展了时空几何被编码在量子纠缠中的熟悉想法。我们使用 Kontsevich--Segal--Witten (KSW) 准则作为强一致性条件来约束相应的轮廓。同样的框架也解释了为什么类空间纠缠自然地选择真正的洛伦兹截面。在几个 AdS 和 dS 示例中，KSW 条件唯一确定所考虑类别内的允许轮廓。我们还确定了所产生的复杂几何形状违反渐近边界附近的 KSW 边界的配置，揭示了构造的范围和局限性。\n\n这些结果强调了 KSW 的可接纳性是实时全息中复杂鞍座的有用组织原则。", "authors": [{"name": "Wu-zhong Guo"}], "featured_authors": [{"name": "Wu-zhong Guo"}], "author_count": 1}, {"id": "2607.21052", "category": "hep-th", "title": "Gauge-Theoretical Method in Solving Zero-curvature Equations III --Gauge Theoretical Method and the Bäcklund Transformations for Solitons--", "abstract": "In soliton theory, both the gauge-theoretical method and the Bäcklund transformation yield soliton equations from the compatibility condition of a pair of linear equations. Therefore, it is necessary to clarify the similarities and differences between these two methods. The Bäcklund transformation defines a transformation from one soliton solution to another. In particular, restricting the transformation to solutions with different soliton numbers yields interesting insights. Using several examples, we demonstrate how soliton solutions with different soliton numbers are constructed.", "url": "https://arxiv.org/abs/2607.21052", "type": "理论", "summary": "在孤子理论中，规范理论方法和贝克伦德变换都从一对线性方程的相容条件产生孤子方程。因此，有必要明确这两种方法的异同。贝克伦德变换定义了从一种孤子解到另一种孤子解的变换。特别是，将转换限制为具有不同孤子数的解决方案会产生有趣的见解。通过几个例子，我们演示了如何构造具有不同孤子数的孤子解。", "authors": [{"name": "Takahiro Azuma"}, {"name": "Takao Koikawa"}], "featured_authors": [{"name": "Takahiro Azuma"}, {"name": "Takao Koikawa"}], "author_count": 2}, {"id": "2607.21107", "category": "hep-th", "title": "One-point holographic correlator in the expanding universe", "abstract": "In this article, we have calculated the time-dependent thermal one-point function of massive operators within an expanding universe. We employ the Randall-Sundrum II braneworld model combined with a $p$-brane gas in the bulk, enabling us to represent various matter-dominated cosmological scenarios localised on the brane. Applying the geodesic formula introduced by Grinberg and Maldacena in \\cite{Grinberg:2020fdj}, we have calculated the thermal one-point functions of massive operators within the universe. The time-dependent one-point functions for different matter-dominated universes, both single-component and multi-component, are derived from the brane's evolving radial position. The time-dependent positions of the branes have been obtained using the second Israel junction condition. Additionally, we have analyzed the early and late-time behaviors of the thermal one-point function across various matter-dominated universes.", "url": "https://arxiv.org/abs/2607.21107", "type": "理论", "summary": "在本文中，我们计算了膨胀宇宙中大质量算子的瞬态热单点函数。我们采用 Randall-Sundrum II 膜世界模型与大量 $p$ 膜气体相结合，使我们能够代表膜上局部的各种物质主导的宇宙学场景。应用 Grinberg 和 Maldacena 在 \\cite{Grinberg:2020fdj} 中引入的测地线公式，我们计算了宇宙中大质量算子的热单点函数。不同物质主导的宇宙（单组分和多组分）的时间相关单点函数是从膜不断演化的径向位置导出的。使用第二以色列结条件获得了膜的时间依赖性位置。此外，我们还分析了各种物质主导宇宙中热单点函数的早期和晚期行为。", "authors": [{"name": "Souvik Paul"}, {"name": "Gopinath Guin"}, {"name": "Sunandan Gangopadhyay"}], "featured_authors": [{"name": "Souvik Paul"}, {"name": "Gopinath Guin"}, {"name": "Sunandan Gangopadhyay"}], "author_count": 3}, {"id": "2607.21124", "category": "hep-th", "title": "Carroll fermions of arbitrary spin", "abstract": "Electric and magnetic Carrollian actions for fermions of arbitrary spin in any spacetime dimension are defined as inequivalent $c \\to 0$ limits of the relativistic Fang-Fronsdal actions.", "url": "https://arxiv.org/abs/2607.21124", "type": "理论", "summary": "任意时空维度中任意自旋费米子的电和磁卡罗尔作用被定义为相对论性 Fang-Fronsdal 作用的不等价 $c \\to 0$ 极限。", "authors": [{"name": "Andrea Campoleoni"}, {"name": "Lea Mele"}], "featured_authors": [{"name": "Andrea Campoleoni"}, {"name": "Lea Mele"}], "author_count": 2}, {"id": "2607.21139", "category": "hep-th", "title": "Energy-Energy Correlators at Strong Coupling", "abstract": "We study energy-energy correlators (EEC) in planar $\\mathcal{N}=4$ super Yang-Mills theory at strong 't Hooft coupling $\\lambda$. We consider the EEC in states created by half-BPS operators of arbitrary dimension $p$, and determine the corresponding event-shape function up to order $\\lambda^{-3/2}$ from the worldsheet representation of the AdS Virasoro-Shapiro amplitude with Kaluza-Klein external states. For $p=2$ we compute the second curvature correction, which completes the EEC through order $\\lambda^{-2}$; the new contribution improves the agreement with recently derived non-perturbative bounds at intermediate coupling. We further develop a complementary method in which the strong-coupling expansion coefficients of the EEC are extracted directly from the Wilson coefficients of low-energy expansion of the AdS Virasoro-Shapiro amplitude, and find the two approaches in perfect agreement.", "url": "https://arxiv.org/abs/2607.21139", "type": "理论", "summary": "我们研究平面 $\\mathcal{N}=4$ 超杨-米尔斯理论中强 't Hooft 耦合 $\\lambda$ 下的能量-能量相关器 (EEC)。我们考虑由任意维度 $p$ 的 half-BPS 算子创建的状态中的 EEC，并根据具有 Kaluza-Klein 外部状态的 AdS Virasoro-Shapiro 振幅的世界表表示确定高达 $\\lambda^{-3/2}$ 阶的相应事件形状函数。对于$p=2$，我们计算第二个曲率校正，它通过阶$\\lambda^{-2}$完成EEC；新的贡献提高了与最近得出的中间耦合非微扰边界的一致性。我们进一步开发了一种补充方法，其中 EEC 的强耦合展开系数直接从 AdS Virasoro-Shapiro 振幅的低能展开威尔逊系数中提取，并发现两种方法完全一致。", "authors": [{"name": "Max Jackson"}, {"name": "Lecheng Ren"}, {"name": "Bo Wang"}, {"name": "Congkao Wen"}], "featured_authors": [{"name": "Max Jackson"}, {"name": "Lecheng Ren"}, {"name": "Bo Wang"}, {"name": "Congkao Wen"}], "author_count": 4}, {"id": "2607.21270", "category": "hep-th", "title": "Defect entanglement entropy for superconformal RG Interfaces", "abstract": "We study the defect contribution to the entanglement entropy of a spherical region centred on four-dimensional superconformal RG interfaces. These interfaces are supersymmetric codimension one defects separating the Leigh--Strassler SCFT vacuum and the $\\mathcal{N}=4$ SYM theory deformed by spatially varying mass terms. Exploiting the holographic dual to these interfaces, we extract a cutoff-independent interface contribution to the entanglement entropy, $\\mathcal{C}^I$. We quantify the non-trivial dependence of $\\mathcal{C}^I$ on the supersymmetric mass deformation, and observe a scaling regime for large deformations. We further relate $\\mathcal{C}^I$ to the renormalized on-shell action and the stress-tensor one-point function of the interface theory. Our results provide the first fully backreacted holographic computation of this entanglement quantity for superconformal RG interfaces in more than two dimensions.", "url": "https://arxiv.org/abs/2607.21270", "type": "理论", "summary": "我们研究了缺陷对以四维超共形 RG 界面为中心的球形区域的纠缠熵的贡献。这些界面是超对称余维一缺陷，将 Leigh--Strassler SCFT 真空与空间变化质量项变形的 $\\mathcal{N}=4$ SYM 理论分开。利用这些界面的全息对偶，我们提取了对纠缠熵 $\\mathcal{C}^I$ 的与截止无关的界面贡献。我们量化了 $\\mathcal{C}^I$ 对超对称质量变形的重要依赖性，并观察了大变形的缩放机制。我们进一步将 $\\mathcal{C}^I$ 与重整化的壳上作用和界面理论的应力张量单点函数联系起来。我们的结果首次提供了二维以上超共形 RG 界面纠缠量的完全反反应全息计算。", "authors": [{"name": "Evangelos Afxonidis"}, {"name": "Christopher Rosen"}], "featured_authors": [{"name": "Evangelos Afxonidis"}, {"name": "Christopher Rosen"}], "author_count": 2}, {"id": "2607.21311", "category": "hep-th", "title": "Diagonally gauged anomaly-free 6D supergravities and their vacua", "abstract": "We describe a bounded search for local and global anomaly-free six-dimensional $(1,0)$ models with tensor number $T=1$ and gauge group containing a diagonal abelian factor $U(1)_{R+}$. The abelian factor is the diagonal combination of the usual gauged $U(1)_R$ and a $U(1)\\subset Sp(n_H)$ acting on hypermultiplets. We have searched for locally and globally anomaly-free $G_1\\times U(1)_{R+}$ and $G_1\\times G_2\\times U(1)_{R+}$ models, subject to restrictions on the ranks of the simple factors and on the maximal charges carried by matter. We find that, unlike the case of $U(1)_R$ gauged models which are relatively rare, the diagonally gauged ones offer a rich landscape. We also study the 6D vacua of these models and find that they admit supersymmetric 6D Minkowski vacua, for which the diagonal nature of the R-symmetry gauging is necessary.", "url": "https://arxiv.org/abs/2607.21311", "type": "理论", "summary": "我们描述了对局部和全局无异常六维 $(1,0)$ 模型的有界搜索，其中张量数 $T=1$ 和包含对角阿贝尔因子 $U(1)_{R+}$ 的规范组。阿贝尔因子是通常测量的 $U(1)_R$ 和作用于超多重态的 $U(1)\\子集 Sp(n_H)$ 的对角组合。我们搜索了局部和全局无异常的 $G_1\\times U(1)_{R+}$ 和 $G_1\\times G_2\\times U(1)_{R+}$ 模型，但受到简单因子等级和物质携带的最大电荷的限制。我们发现，与相对罕见的 $U(1)_R$ 测量模型的情况不同，对角测量模型提供了丰富的景观。我们还研究了这些模型的 6D 真空，发现它们承认超对称 6D Minkowski 真空，为此 R 对称测量的对角线性质是必要的。", "authors": [{"name": "Xu Guo"}, {"name": "Yi Pang"}, {"name": "Henning Samtleben"}, {"name": "Ergin Sezgin"}], "featured_authors": [{"name": "Xu Guo"}, {"name": "Yi Pang"}, {"name": "Henning Samtleben"}, {"name": "Ergin Sezgin"}], "author_count": 4}, {"id": "2607.21386", "category": "hep-th", "title": "High-Order Pole-Skipping in Near-Extremal Holography", "abstract": "We develop a systematic analytic method for studying high-order pole-skipping in near-extremal holographic black holes. In the near-extremal regime, approaching the limit $T\\to0$, the near-horizon geometry develops an approximately $\\mathrm{AdS}_2 \\times \\mathbb{R}^{d-1}$ structure; we show that the mode index $q$ labeling pole-skipping points is identified with the IR conformal dimension $\\Delta_{\\mathrm{IR}} = q$ in the emergent $\\mathrm{AdS}_2/\\mathrm{CFT}_1$ correspondence, providing a concrete physical interpretation of the subleading pole-skipping tower. The method reorganizes the near-horizon Frobenius expansion according to powers of temperature. This reveals a temperature-graded hierarchical structure that reduces the $n$-th-order pole-skipping condition to a factorized algebraic equation:each pole-skipping momentum depends only on the mode index $q$, not on the order $n$. This $n$-independence produces a high degeneracy as $T\\to 0$, where pole-skipping momenta at all orders collapse onto a discrete set of values determined by near-horizon geometry and the scalar field mass; these values can be expressed in terms of thermodynamic quantities such as entropy density and specific heat. In the limit $n \\gg 1$ (with $nT$ remaining small), the leading pole-skipping momenta grow asymptotically as $k_{n,n} \\propto n$. We compute leading temperature corrections and verify our predictions through numerical analysis of the Dyonic Gubser--Rocha model. The results confirm that high-order pole-skipping at low temperature is governed by near-horizon physics. This provides analytic access to pole-skipping points well beyond those accessible by standard determinant methods and clarifies the structure of holographic Green's functions in the low-temperature regime.", "url": "https://arxiv.org/abs/2607.21386", "type": "理论", "summary": "我们开发了一种系统分析方法来研究近极值全息黑洞中的高阶跳极。在近极值状态下，接近极限$T\\to0$，近地平线几何形成近似$\\mathrm{AdS}_2 \\times \\mathbb{R}^{d-1}$结构；我们证明，标记跳极点的模式索引 $q$ 与新出现的 $\\mathrm{AdS}_2/\\mathrm{CFT}_1$ 对应关系中的 IR 共形维数 $\\Delta_{\\mathrm{IR}} = q$ 进行识别，从而提供了对次领先跳极塔的具体物理解释。该方法根据温度的幂重新组织近地平线弗罗贝尼乌斯展开式。这揭示了一种温度分级的层次结构，将$n$阶跳极条件
