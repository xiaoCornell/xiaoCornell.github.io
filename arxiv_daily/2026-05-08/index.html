}], "author_count": 4}, {"id": "2605.05369", "category": "quant-ph", "title": "Toward Hop-Independent Fidelity in Quantum Data Centers: Resource Requirements for Entanglement Purification", "abstract": "Quantum data-center networks must distribute entanglement between QPUs over paths whose length grows with system scale, but each entanglement-swapping step reduces the quality of the raw end-to-end state. Topology, multiplexing, and repeated connection attempts can increase the number of raw end-to-end copies available for a request, yet they do not answer the central resource question: whether those copies are sufficient to remove, via entanglement purification, the fidelity loss caused by multi-hop distribution. We study this question through a topology-independent black-box model of the network. Each elementary link is modeled as a Werner state with parameter $w_0$, so ideal swapping over an $\\ell$-link path produces equal-quality raw copies with Werner parameter $w_0^\\ell$; purification succeeds if it outputs at least one state with Werner parameter at least $w_0$ with probability at least $p_{\\mathrm{th}}$. We compare recursive BBPSSW purification with higher-order $r$-to-$1$ bilocal-Clifford purification protocols of Jansen \\emph{et al.}, using an all-in recursive schedule whose success probability is computed by exact dynamic programming. The resulting resource landscapes show a threshold structure governed by the Werner entanglement condition $w_0^\\ell>1/3$ and demonstrate that multi-copy purification substantially improves both feasibility and copy efficiency. Across the evaluated grid, the Jansen family requires fewer copies than BBPSSW at more than $96\\%$ of shared feasible points; at $p_{\\mathrm{th}}=0.70$, the median copy budget drops from $268$ to $30$. These results provide a quantitative purification-resource benchmark for assessing whether future quantum data-center architectures can practically support hop-independent end-to-end entanglement quality.", "url": "https://arxiv.org/abs/2605.05369", "type": "理论+数值", "summary": "量子数据中心网络必须在长度随系统规模增长的路径上分配 QPU 之间的纠缠，但每个纠缠交换步骤都会降低原始端到端状态的质量。拓扑、多路复用和重复的连接尝试可以增加可用于请求的原始端到端副本的数量，但它们并不能回答核心资源问题：这些副本是否足以通过纠缠净化消除由多跳分发引起的保真度损失。我们通过与拓扑无关的网络黑盒模型来研究这个问题。每个基本链接都被建模为具有参数 $w_0$ 的 Werner 状态，因此理想的 $\\ell$-link 路径交换会产生具有 Werner 参数 $w_0^\\ell$ 的同等质量的原始副本；如果它输出至少一种状态，且沃纳参数至少为 $w_0$，且概率至少为 $p_{\\mathrm{th}}$，则净化成功。我们将递归 BBPSSW 纯化与 Jansen \\emph{et al.} 的高阶 $r$-to-$1$ 双局部 Clifford 纯化协议进行比较，使用全递归计划，其成功概率通过精确动态规划计算。\n\n由此产生的资源景观显示了由 Werner 纠缠条件 $w_0^\\ell>1/3$ 控制的阈值结构，并证明多拷贝纯化大大提高了可行性和拷贝效率。在评估的网格中，Jansen 系列需要的副本比 BBPSSW 少，共享可行点超过 $96\\%$；当 $p_{\\mathrm{th}}=0.70$ 时，复制预算中位数从 $268$ 下降到 $30$。这些结果提供了定量的纯化资源基准，用于评估未来的量子数据中心架构是否能够实际支持与跳无关的端到端纠缠质量。", "authors": [{"name": "Mohadeseh Azari"}, {"name": "Anoosha Fayyaz"}, {"name": "Amy Babay"}, {"name": "David Tipper"}, {"name": "Prashant Krishnamurthy"}, {"name": "Kaushik Seshadreesan"}], "featured_authors": [{"name": "Mohadeseh Azari"}, {"name": "Anoosha Fayyaz"}, {"name": "Amy Babay"}, {"name": "David Tipper"}, {"name": "Prashant Krishnamurthy"}, {"name": "Kaushik Seshadreesan"}], "author_count": 6}, {"id": "2605.05479", "category": "quant-ph", "title": "Quantum Simulation of the Real-time Dynamics in the multi-flavor Gross-Neveu Model at the utility scale using Superconducting Quantum Computers", "abstract": "We present a scalable quantum simulation framework for real-time dynamics of the multi-flavor Gross-Neveu model in 1+1 dimensions. Using superconducting quantum processors at utility scale, we develop a hardware-efficient Trotterization whose per-step circuit depth scales with fermion flavor number rather than total system size, enabling simulations beyond 100 qubits. A central contribution of this work is the Localized Diagonal Operator Approximation (LDOA), which systematically reduces the overhead associated with quartic interactions. We formulate diagonal unitary synthesis as a structured least-squares problem in phase space and obtain analytic solutions via the Moore-Penrose pseudoinverse. This formulation provides a principled and quantitatively controlled approximation: in the small Trotter-step regime, the unitary error is directly linked to the phase reconstruction error and vanishes asymptotically as the Trotter step size decreases. This establishes a clear mathematical foundation for the LDOA while significantly reducing two-qubit gate counts and circuit depth, and is broadly applicable to diagonal quantum operators with long-range structure, making it particularly well suited for quantum hardware with limited qubit connectivity. Using these techniques, we run large-scale simulations on IBM superconducting processors and study real-time observables, including density-density correlators. We benchmark against exact diagonalization and tensor network-based methods, finding strong agreement across system sizes. These results show that combining hardware-aware circuit design with rigorous approximations enables practical near-term simulation of interacting fermionic field theories and provides a scalable pathway toward more complex quantum field theory simulations.", "url": "https://arxiv.org/abs/2605.05479", "type": "理论+数值", "summary": "我们提出了一个可扩展的量子模拟框架，用于 1+1 维度的多风味 Gross-Neveu 模型的实时动态。使用公用事业规模的超导量子处理器，我们开发了一种硬件高效的 Trotterization，其每步电路深度随费米子风味数而不是总系统大小缩放，从而实现超过 100 个量子位的模拟。这项工作的一个核心贡献是局部对角算子近似（LDOA），它系统地减少了与四次交互相关的开销。我们将对角幺正综合表示为相空间中的结构化最小二乘问题，并通过 Moore-Penrose 伪逆获得解析解。该公式提供了一种原理性且定量控制的近似：在小 Trotter 步长范围内，酉误差与相位重构误差直接相关，并且随着 Trotter 步长减小而渐近消失。\n\n这为 LDOA 奠定了清晰的数学基础，同时显着减少了两个量子位门数和电路深度，并且广泛适用于具有长程结构的对角量子算子，使其特别适合量子位连接有限的量子硬件。使用这些技术，我们在 IBM 超导处理器上运行大规模模拟并研究实时可观测值，包括密度-密度相关器。我们对精确对角化和基于张量网络的方法进行基准测试，发现跨系统规模的强烈一致性。这些结果表明，将硬件感知电路设计与严格近似相结合，可以实现相互作用费米子场论的实用近期模拟，并为更复杂的量子场论模拟提供可扩展的途径。", "authors": [{"name": "Talal Ahmed Chowdhury"}, {"name": "Seokwon Choi"}, {"name": "Kyoungchul Kong"}, {"name": "Kwangmin Yu"}], "featured_authors": [{"name": "Talal Ahmed Chowdhury"}, {"name": "Seokwon Choi"}, {"name": "Kyoungchul Kong"}, {"name": "Kwangmin Yu"}], "author_count": 4}, {"id": "2605.05604", "category": "quant-ph", "title": "Temporal Coarse-Graining as the Origin of Macroscopic Friction in Quantum Spin Chains via Data-Driven Liouvillian Extraction", "abstract": "Understanding the emergence of macroscopic irreversible hydrodynamics from the reversible unitary dynamics of isolated quantum many-body systems remains a fundamental challenge. Conventional approaches often force spin density dynamics into purely diffusive models, obscuring the microscopic interplay of pressure, spin current, and local friction. Furthermore, reconciling true irreversibility with strictly unitary evolution raises profound questions about the role of the observer's temporal resolution. In this paper, we introduce a fully data-driven framework based on generalized Extended Dynamic Mode Decomposition (gEDMD) integrated with the Mori-Zwanzig projection. By expanding the observable dictionary to explicitly include spin currents, we directly extract the Navier-Stokes hydrodynamic coefficients from a chaotic XXZ spin chain across varying temporal coarse-graining scales. Our unconstrained extraction reveals a profound physical dichotomy: the mechanical elasticity ($c^2$) is intrinsically derived from the exact unitary dynamics, preserving strict microscopic reversibility. In stark contrast, the macroscopic friction ($\\gamma$) and kinematic viscosity ($\\nu$) exhibit zero net dissipation, oscillating rapidly around zero in the exact-derivative limit. We demonstrate that genuine macroscopic transport cannot be established without finite temporal coarse-graining. By introducing a finite observation timescale ($\\Delta t_{\\rm cg} > 0$), the system passes through a distinct crossover timescale where these reversible fluctuations average out, establishing an intermediate functional regime that yields strictly positive friction and viscosity. Our results clearly demonstrate that macroscopic friction in isolated quantum systems is not an absolute property, but fundamentally an emergent phenomenon dictated by the temporal resolution of the observer.", "url": "https://arxiv.org/abs/2605.05604", "type": "理论", "summary": "从孤立量子多体系统的可逆酉动力学中理解宏观不可逆流体动力学的出现仍然是一个基本挑战。传统方法常常迫使自旋密度动力学进入纯粹的扩散模型，从而模糊了压力、自旋流和局部摩擦的微观相互作用。此外，调和真正的不可逆性与严格的单一演化引发了关于观察者时间分辨率的作用的深刻问题。在本文中，我们介绍了一种基于广义扩展动态模式分解（gEDMD）与 Mori-Zwanzig 投影集成的完全数据驱动框架。通过扩展可观测字典以明确包含自旋流，我们直接从不同时间粗粒度尺度的混沌 XXZ 自旋链中提取纳维-斯托克斯流体动力学系数。我们的无约束提取揭示了深刻的物理二分法：机械弹性（$c^2$）本质上源自精确的酉动力学，保留了严格的微观可逆性。\n\n与此形成鲜明对比的是，宏观摩擦 ($\\gamma$) 和运动粘度 ($\\nu$) 表现出零净耗散，在精确导数极限内快速围绕零振荡。我们证明，如果没有有限的时间粗粒度，就无法建立真正的宏观传输。通过引入有限的观测时间尺度（$\\Delta t_{\\rm cg} > 0$），系统通过一个独特的交叉时间尺度，其中这些可逆波动达到平均，建立一个产生严格正摩擦和粘度的中间功能状态。我们的结果清楚地表明，孤立量子系统中的宏观摩擦并不是绝对的属性，而是从根本上说是由观察者的时间分辨率决定的新兴现象。", "authors": [{"name": "Seiki Saito"}], "featured_authors": [{"name": "Seiki Saito"}], "author_count": 1}, {"id": "2605.05617", "category": "quant-ph", "title": "Static-Field Tunneling Ionization in Space-Fractional Quantum Mechanics", "abstract": "Tunneling ionization in static or slowly varying electric fields is a cornerstone of strong-field physics and provides the entry point for semiclassical descriptions of above-threshold ionization and high-harmonic generation. In conventional quantum mechanics, the Perelomov--Popov--Terent'ev (PPT) theory and its Ammosov--Delone--Krainov (ADK) form yield an ionization rate whose defining feature is an exponential dependence governed by an under-barrier (imaginary-time) action. Here we develop an analytical ADK-like tunneling model within \\emph{space-fractional} quantum mechanics, where the quadratic kinetic energy is replaced by the Riesz fractional Laplacian of order $1<\\alpha\\le2$. Working in a static electric field in the length gauge, we derive a closed-form tunneling exponent for a triangular exit barrier. The fractional kinetic operator deforms the conventional $I_p^{3/2}$ scaling to $I_p^{1+1/\\alpha}$ and introduces a characteristic $\\sin(\\pi/\\alpha)$ factor encoding the complex-phase structure associated with nonlocal dispersion. We position this benchmark relative to prior tunneling studies in fractional quantum mechanics (primarily scattering through model barriers and fractal potentials) and provide a validation protocol for testing the exponent in time-dependent simulations of the fractional Schrödinger equation under a constant field. The result establishes a transparent reference for static-field ionization in nonlocal quantum dynamics and a baseline for strong-field approaches extensions.", "url": "https://arxiv.org/abs/2605.05617", "type": "理论+数值", "summary": "静态或缓慢变化电场中的隧道电离是强场物理的基石，并为阈值以上电离和高次谐波产生的半经典描述提供了切入点。在传统的量子力学中，Perelomov--Popov--Terent’ev (PPT) 理论及其 Ammosov-Delone--Krainov (ADK) 形式产生电离率，其定义特征是由下势垒（虚数时间）作用控制的指数依赖性。在这里，我们在\\emph{空间分数}量子力学中开发了一个类似 ADK 的分析隧道模型，其中二次动能被 $1<\\alpha\\le2$ 阶的 Riesz 分数拉普拉斯算子取代。在长度计的静电场中工作，我们得出了三角形出口势垒的封闭式隧道指数。分数动力学算子将传统的 $I_p^{3/2}$ 缩放变形为 $I_p^{1+1/\\alpha}$ 并引入了特征 $\\sin(\\pi/\\alpha)$ 因子，编码与非局域色散相关的复杂相结构。\n\n我们将此基准相对于分数量子力学中的先前隧道研究（主要是通过模型势垒和分形势进行散射）进行定位，并提供了一个验证协议，用于测试恒定场下分数薛定谔方程的时间相关模拟中的指数。结果为非局域量子动力学中的静态场电离建立了透明的参考，并为强场方法扩展奠定了基线。", "authors": [{"name": "Marcelo F. Ciappina"}], "featured_authors": [{"name": "Marcelo F. Ciappina"}], "author_count": 1}, {"id": "2605.05625", "category": "quant-ph", "title": "Quantum Kernels for Parity-Structured Classification: A Hybrid Pipeline", "abstract": "Parity (XOR) classification requires detecting discrete, high-order feature interactions that smooth classical kernels cannot efficiently capture. We study how quantum kernel advantage depends on parity complexity, the number of features entering the XOR rule, and find a clear threshold behavior. We pair a ZZ quantum feature map with binary {0, pi} encoding (features median thresholded before circuit input) to expose parity structure. A binary encoding ablation, RBF SVM trained on the identical {0, pi} features, separates encoding from circuit effects: at low complexity (n = 5 features), binary RBF achieves 83.4% +/- 1.7% and the quantum kernel 81.2% +/- 1.9%, showing encoding drives performance there. At high complexity (n = 11 features, 11 qubits, r = 3 ZZ repetitions), all classical methods collapse to near-random (approx. 50%), binary RBF reaches only 54.3% +/- 1.1%, and the quantum ZZ kernel achieves 66.3% +/- 3.2% (mean +/- std, 10 seeds), a +12.0 percentage-point margin over the binary ablation and approx. 7x higher kernel-target alignment (0.094 +/- 0.020 vs. 0.013 +/- 0.001). These results identify parity complexity as a concrete axis along which genuine quantum kernel advantage, not attributable to encoding alone, emerges.", "url": "https://arxiv.org/abs/2605.05625", "type": "理论", "summary": "奇偶校验 (XOR) 分类需要检测离散的高阶特征交互，而平滑经典内核无法有效捕获这些交互。我们研究了量子内核优势如何取决于奇偶校验复杂性、进入异或规则的特征数量，并找到了明确的阈值行为。我们将 ZZ 量子特征图与二进制 {0, pi} 编码（在电路输入之前对特征中值进行阈值化）配对以暴露奇偶校验结构。二进制编码消融，RBF SVM 在相同的 {0, pi} 特征上进行训练，将编码与电路效应分开：在低复杂度（n = 5 个特征）下，二进制 RBF 达到 83.4% +/- 1.7%，量子内核达到 81.2% +/- 1.9%，显示编码驱动那里的性能。在高复杂性下（n = 11 个特征，11 个量子位，r = 3 ZZ 重复），所有经典方法都崩溃到接近随机（约 50%），二元 RBF 仅达到 54.3% +/- 1.1%，而量子 ZZ 内核达到 66.3% +/- 3.2%（平均值 +/- std，10 个种子），比二元消融高出 +12.0 个百分点和大约。内核目标对齐提高 7 倍（0.094 +/- 0.020 与 0.013 +/- 0.001）。\n\n这些结果将奇偶校验复杂性确定为一个具体的轴，沿着该轴出现真正的量子内核优势，而不仅仅归因于编码。", "authors": [{"name": "Tushar Pandey"}], "featured_authors": [{"name": "Tushar Pandey"}], "author_count": 1}, {"id": "2605.05764", "category": "quant-ph", "title": "Weighted Phase-Space Paths for Exact Wigner Dynamics", "abstract": "A quantum state can be written in phase space, but the resulting object is not generally the probability density of a positive stochastic process on ordinary phase space. We spell this out for Wigner dynamics. If a positive phase-space process is required only to reproduce the Born density after integrating over momentum, the requirement fixes only an integrated current; the local drift and diffusion remain underdetermined. If one instead requires all Weyl-ordered expectation values, the phase-space object is fixed to be the Wigner function. For non-quadratic potentials the Wigner--Moyal generator contains higher-order, signed momentum-transfer terms, so it is not the Fokker--Planck generator of a positive Brownian diffusion. The exact Wigner function must therefore be reconstructed, in a stochastic representation, as a weighted empirical measure \\[ \\FW(\\z,t)=\\E_{\\Pp}[W_t\\delta(\\z-\\z_t)], \\qquad \\z=(q,p), \\] rather than the unweighted density of sampled carrier trajectories. With classical Hamiltonian flow as the carrier, all nonclassical correction beyond classical transport sits in the Moyal residual and can be represented by signed weights or branching events. The same split defines a residual diagnostic that vanishes for quadratic Hamiltonians and measures what classical carrier transport misses in anharmonic dynamics. The formulation also gives a forward--reverse relation for signed Wigner path measures. The ratio of forward and reversed contributions separates into a positive magnitude factor and a sign factor. This sign records the parity of the Wigner interference contribution; it is not a thermodynamic entropy production.", "url": "https://arxiv.org/abs/2605.05764", "type": "理论", "summary": "量子态可以写在相空间中，但所得对象通常不是普通相空间上正随机过程的概率密度。我们用维格纳动力学来阐明这一点。如果仅需要正相空间过程来在对动量进行积分后再现玻恩密度，则仅需要固定积分电流；局部漂移和扩散仍然不确定。如果需要所有 Weyl 有序期望值，则相空间对象固定为 Wigner 函数。对于非二次势，Wigner--Moyal 生成器包含高阶、有符号动量传递项，因此它不是正布朗扩散的 Fokker--Planck 生成器。因此，必须以随机表示形式将精确的维格纳函数重建为加权经验度量 \\[ \\FW(\\z,t)=\\E_{\\Pp}[W_t\\delta(\\z-\\z_t)], \\qquad \\z=(q,p), \\] 而不是采样载流子轨迹的未加权密度。以经典哈密顿流为载体，经典传输之外的所有非经典校正都位于莫亚尔残差中，并且可以用符号权重或分支事件表示。\n\n同样的分裂定义了对于二次哈密顿量来说消失的残差诊断，并测量了非调和动力学中经典载流子传输的遗漏。该公式还给出了带符号维格纳路径测度的正向-反向关系。正向和反向贡献的比率分为正幅度因子和符号因子。该符号记录了维格纳干扰贡献的奇偶性；它不是热力学熵的产生。", "authors": [{"name": "Surachate Limkumnerd"}, {"name": "Panat Phanthaphanitkul"}], "featured_authors": [{"name": "Surachate Limkumnerd"}, {"name": "Panat Phanthaphanitkul"}], "author_count": 2}, {"id": "2605.05785", "category": "quant-ph", "title": "Optical Pulling Force in Carbon Nanotubes: Manifestation of Nonlocal Conductivity", "abstract": "We develop a new theory of an optical force exerted on a carbon nanotube (CNT) with a nonlocal conductivity. The optical force is expressed in terms of the surface current density and the axial electric field on the CNT surface. To determine these quantities, we employ an integral-equation-based approach in terms of the current density. The analysis is constructed for a finite-length cylindrical CNT by rigorously accounting for edge effects. In addition to numerical solutions of the integral equation, we obtain an approximate analytical expression for the optical force acting on the CNT, which shows good agreement with numerical simulations. We also demonstrate the existence of some frequency ranges in which the optical force becomes negative, corresponding to the optical pulling effect. Such a pulling behavior is shown to originate from the nonlocality of the conductivity and to vanish in the local limit. This work advances theoretical understanding of optomechanical interactions in finite-length low-dimensional conductors and clarifies the role of spatial dispersion in the emergence of optical pulling forces.", "url": "https://arxiv.org/abs/2605.05785", "type": "理论+数值", "summary": "我们开发了一种关于施加在具有非局域电导率的碳纳米管（CNT）上的光学力的新理论。光学力以CNT表面的表面电流密度和轴向电场来表示。为了确定这些量，我们采用基于积分方程的电流密度方法。通过严格考虑边缘效应，针对有限长度圆柱形 CNT 构建了分析。除了积分方程的数值解之外，我们还获得了作用在碳纳米管上的光学力的近似解析表达式，该表达式与数值模拟吻合良好。我们还证明了某些频率范围的存在，其中光力变为负值，对应于光牵引效应。这种拉动行为被证明源于电导率的非定域性，并在局部极限内消失。这项工作推进了对有限长度低维导体中光机械相互作用的理论理解，并阐明了空间色散在光学拉力出现中的作用。", "authors": [{"name": "Tomer Berghaus"}, {"name": "Touvia Miloh"}, {"name": "Gregory Ya. Slepyan"}], "featured_authors": [{"name": "Tomer Berghaus"}, {"name": "Touvia Miloh"}, {"name": "Gregory Ya. Slepyan"}], "author_count": 3}, {"id": "2605.05830", "category": "quant-ph", "title": "Three wave mixing vacuum squeezing generation in a SNAIL-based Traveling-Wave Parametric Amplifier with alternated flux polarity", "abstract": "Recent demonstrations of squeezing generation using Traveling Wave Parametric Amplifiers (TWPAs) have opened the way for the application of broadband microwave squeezing in quantum sensing, quantum-enhanced detection, and continuous-variable quantum information. Here we demonstrate vacuum squeezing generation via residual three-wave mixing (3WM) in a Josephson TWPA based on superconducting nonlinear asymmetric inductive elements (SNAILs) with alternated magnetic flux polarity. By investigating competition between four-wave mixing (4WM) and 3WM nonlinearities, we prove that vacuum squeezing generation via residual 3WM is possible when a careful choice of the operating flux point is adopted. Our study provides valuable insights on the impact of competing nonlinearities on TWPA squeezers, potentially extending the range of applications in the framework of microwave photonics.", "url": "https://arxiv.org/abs/2605.05830", "type": "理论", "summary": "最近使用行波参量放大器（TWPA）进行压缩生成的演示为宽带微波压缩在量子传感、量子增强检测和连续可变量子信息中的应用开辟了道路。在这里，我们演示了通过约瑟夫森 TWPA 中的残余三波混频 (3WM) 产生真空挤压，该 TWPA 基于具有交替磁通极性的超导非线性不对称感应元件 (SNAIL)。通过研究四波混频 (4WM) 和 3WM 非线性之间的竞争，我们证明，当仔细选择工作通量点时，通过剩余 3WM 产生真空挤压是可能的。我们的研究提供了关于竞争非线性对 TWPA 压缩器影响的宝贵见解，有可能扩展微波光子学框架中的应用范围。", "authors": [{"name": "Isita Chatterjee"}, {"name": "Pegah Darvehi"}, {"name": "Antonio Orsi"}, {"name": "Anna Levochkina"}, {"name": "Pasquale Mastrovito"}, {"name": "Gwenel Le Gal"}, {"name": "Arpit Ranadive"}, {"name": "Giulio Cappelli"}, {"name": "Alberto Porzio"}, {"name": "Francesco Tafuri"}, {"name": "Davide Massarotti"}, {"name": "Martina Esposito"}], "featured_authors": [{"name": "Isita Chatterjee"}, {"name": "Pegah Darvehi"}, {"name": "Antonio Orsi"}, {"name": "Francesco Tafuri"}, {"name": "Davide Massarotti"}, {"name": "Martina Esposito"}], "author_count": 12}, {"id": "2605.05881", "category": "quant-ph", "title": "Surface-Code Thresholds and Qubit Footprints in Shuttling-Based Spin-Qubit Railways", "abstract": "We present a fault-tolerant mapping of rotated surface codes onto a $2\\times N$ silicon spin-qubit railway architecture, utilizing electron shuttling to resolve the wiring fan-out bottleneck. Employing circuit-level noise modeling, we evaluate threshold performances across various noise biases. We demonstrate that shuttling check qubits instead of data qubits fundamentally improves system thresholds. Crucially, under a noise model biased towards dephasing for spin-qubit shuttling, the non-CSS XZZX surface code outperforms standard CSS variants. By tailoring the topological code to this specific inherent bias, we show that the Megaquop footprint is achievable with a distance 7 code requiring a $p = 10^{-3}$ physical error rate, highlighting a pathway for substantial hardware reductions in early fault-tolerant quantum processors.", "url": "https://arxiv.org/abs/2605.05881", "type": "理论+数值", "summary": "我们提出了旋转表面代码到 $2\\times N$ 硅自旋量子位铁路架构上的容错映射，利用电子穿梭来解决布线扇出瓶颈。采用电路级噪声建模，我们评估各种噪声偏差的阈值性能。我们证明，穿梭检查量子位而不是数据量子位从根本上提高了系统阈值。至关重要的是，在偏向于自旋量子位穿梭移相的噪声模型下，非 CSS XZZX 表面代码的性能优于标准 CSS 变体。通过根据这种特定的固有偏差定制拓扑代码，我们表明，Megaquop 足迹可以通过距离 7 的代码实现，需要 $p = 10^{-3}$ 物理错误率，这突出了早期容错量子处理器中大幅减少硬件的途径。", "authors": [{"name": "Arun John Moncy"}, {"name": "Reza Dastbasteh"}, {"name": "Josu Etxezarreta Martinez"}, {"name": "Ryo Nagai"}, {"name": "Pedro M. Crespo"}, {"name": "Normann Mertig"}, {"name": "Charles Smith"}, {"name": "Ruben M. Otxoa"}], "featured_authors": [{"name": "Arun John Moncy"}, {"name": "Reza Dastbasteh"}, {"name": "Josu Etxezarreta Martinez"}, {"name": "Normann Mertig"}, {"name": "Charles Smith"}, {"name": "Ruben M. Otxoa"}], "author_count": 8}, {"id": "2605.05914", "category": "quant-ph", "title": "Quantum-enhanced Large Language Models on Quantum Hardware via Cayley Unitary Adapters", "abstract": "Large language models (LLMs) have transformed artificial intelligence, yet classical architectures impose a fundamental constraint: every trainable parameter demands classical memory that scales unfavourably with model size. Quantum computing offers a qualitatively different pathway, but practical demonstrations on real hardware have remained elusive for models of practical relevance. Here we show that Cayley-parameterised unitary adapters -- quantum circuit blocks inserted into the frozen projection layers of pre-trained LLMs and executed on a 156-qubit IBM Quantum System Two superconducting processor -- improve the perplexity of Llama 3.1 8B, an 8-billion-parameter model in widespread use, by 1.4% with only 6,000 additional parameters and end-to-end inference validated on real Quantum Processing Unit (QPU). A systematic study on SmolLM2 (135M parameters), chosen for its tractability, reveals monotonically improving perplexity with unitary block dimension, 83% recovery of compression-induced degradation, and correct answers to questions that both classical baselines fail -- with a sharp noise-expressivity phase transition identifying the concrete path to quantum utility at larger qubit scales.", "url": "https://arxiv.org/abs/2605.05914", "type": "理论", "summary": "大型语言模型 (LLM) 已经改变了人工智能，但经典架构施加了一个基本约束：每个可训练参数都需要经典内存，而经典内存会随着模型大小而不利地扩展。量子计算提供了一条本质上不同的途径，但对于具有实际意义的模型来说，在真实硬件上的实际演示仍然难以捉摸。在这里，我们展示了 Cayley 参数化单一适配器（将量子电路块插入预先训练的 LLM 的冻结投影层中并在 156 量子位 IBM Quantum System Two 超导处理器上执行）将 Llama 3.1 8B（一个广泛使用的 80 亿参数模型）的复杂度提高了 1.4%，仅使用 6,000 个附加参数和在真实环境中验证的端到端推理量子处理单元 (QPU)。\n\n对 SmolLM2（135M 参数）的系统研究，因其易处理性而被选择，揭示了单一块维度单调改善的困惑度、压缩引起的退化的 83% 恢复率，以及对两个经典基线都失败的问题的正确答案——通过尖锐的噪声表达性相变，确定了在更大量子位尺度上实现量子效用的具体路径。", "authors": [{"name": "Borja Aizpurua"}, {"name": "Sukhbinder Singh"}, {"name": "Augustine Kshetrimayum"}, {"name": "Saeed S. Jahromi"}, {"name": "Roman Orus"}], "featured_authors": [{"name": "Borja Aizpurua"}, {"name": "Sukhbinder Singh"}, {"name": "Augustine Kshetrimayum"}, {"name": "Saeed S. Jahromi"}, {"name": "Roman Orus"}], "author_count": 5}, {"id": "2605.05942", "category": "quant-ph", "title": "Architecture Shape Governs QNN Trainability: Jacobian Null Space Growth and Parameter Efficiency", "abstract": "Variational quantum circuits with angle encoding implement truncated Fourier series, and architectures arranging $N$ qubits with $L$ encoding layers each -- sharing encoding budget $E = NL$ -- generate identical frequency spectra, identical frequency redundancy, and require the same minimum parameter count for coefficient control. Despite this equivalence, trainability varies substantially with architecture shape $(N,L)$ at fixed $E$. We identify structural rank deficiency of the coefficient matching Jacobian $J$ as the mechanism responsible. For serial single-qubit architectures, we prove $\\mathrm{rank}(J) \\leq 2L+1$ regardless of parameter count $P$, with $\\dim(\\ker J) \\geq P-(2L+1)$ growing without bound -- a phenomenon we term \\emph{structural gradient starvation}: a growing fraction of parameters become structurally decoupled from the loss as $P$ increases at fixed $L$. Parallel architectures avoid this via independent phase trajectories, ensuring $\\sigma_{\\min}(J^{(\\mathrm{par})}) > 0$ generically for $P \\leq 2E+1$, so no parameter lies in $\\ker J$. For practitioners, we further show that the two natural routes to increasing parameter count have fundamentally different effects: adding feature map (FM) layers monotonically strengthens the Jacobian QFIM eigenvalue spectrum and achieves $R^2 \\geq 0.95$ with $1.6$--$2.2\\times$ fewer parameters than adding trainable blocks across all tested architectures, while trainable blocks improve training only through the classical interpolation mechanism with no quantum-specific benefit.", "url": "https://arxiv.org/abs/2605.05942", "type": "理论+数值", "summary": "具有角度编码的变分量子电路实现截断傅里叶级数，并且架构安排 $N$ 量子位，每个量子位具有 $L$ 编码层 - 共享编码预算 $E = NL$ - 生成相同的频谱、相同的频率冗余，并且需要相同的最小参数计数来进行系数控制。尽管存在这种等价性，但可训练性随着固定 $E$ 的架构形状 $(N,L)$ 的变化而有很大变化。我们将匹配雅可比行列式 $J$ 的系数的结构等级缺陷确定为造成这种情况的机制。对于串行单量子位架构，我们证明 $\\mathrm{rank}(J) \\leq 2L+1$ 无论参数数量 $P$ 为何，$\\dim(\\ker J) \\geq P-(2L+1)$ 无限制增长——我们称之为 \\emph{结构梯度饥饿} 的现象：随着 $P$ 以固定 $L$ 增加，越来越多的参数在结构上与损失脱钩。并行架构通过独立的相位轨迹避免了这种情况，确保 $\\sigma_{\\min}(J^{(\\mathrm{par})}) > 0$ 一般对于 $P \\leq 2E+1$，因此没有参数位于 $\\ker J$ 中。\n\n对于实践者来说，我们进一步表明，增加参数数量的两种自然途径具有根本不同的效果：添加特征映射（FM）层单调地增强了雅可比 QFIM 特征值谱，并以比在所有测试架构中添加可训练块少 1.6$--$2.2\\times$ 的参数实现了 $R^2 \\geq 0.95$，而可训练块仅通过经典插值机制改进训练，没有量子特定的好处。", "authors": [{"name": "Michael Poppel"}, {"name": "David Bucher"}, {"name": "Maximilian Zorn"}, {"name": "Markus Baumann"}, {"name": "Sebastian Wölckert"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Philipp Altmann"}, {"name": "Jonas Stein"}], "featured_authors": [{"name": "Michael Poppel"}, {"name": "David Bucher"}, {"name": "Maximilian Zorn"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Philipp Altmann"}, {"name": "Jonas Stein"}], "author_count": 8}, {"id": "2605.06122", "category": "quant-ph", "title": "Variationally Compressing Quantum Circuits to Approximate Nonadiabatic Molecular Quantum Dynamics", "abstract": "Quantum simulation has begun to penetrate the field of quantum chemistry in hopes of efficiently calculating ground state energies and approximating real-time evolution. With modern research highlighting nonadiabatic dynamics, tunably approximating deep circuits representing potential landscapes becomes crucial for simulating real quantum systems. Variationally approximating unitaries allows for shallower circuits and accuracy tunable to hardware fidelity, so long as the observable quantities are preserved. We show the variational compression of Trotter terms preserve reaction rate coefficients via classical emulation of a hybrid quantum-classical optimization method, as well as fast-forwarded adiabatic dynamics on quantum hardware. Compressed circuits can be incorporated with product-formula-based time evolution to approximate dynamics of a particle in two coupled harmonic potentials, allowing tunability when removing high-cost qubit interactions. Approximate rate coefficients are recovered after substituting terms in a nonadiabatic dynamic process, giving proof-of-principle for observable preservation under variational optimization. Attention is paid to minimizing qubit and gate-count resources.", "url": "https://arxiv.org/abs/2605.06122", "type": "理论+数值", "summary": "量子模拟已经开始渗透到量子化学领域，希望能够有效计算基态能量并近似实时演化。随着现代研究强调非绝热动力学，代表潜在景观的可调谐近似深度电路对于模拟真实的量子系统变得至关重要。只要保留可观测的量，变分近似幺正就可以实现更浅的电路和可调节到硬件保真度的精度。我们展示了 Trotter 项的变分压缩，通过混合量子经典优化方法的经典仿真以及量子硬件上的快进绝热动力学来保留反应速率系数。压缩电路可以与基于乘积公式的时间演化相结合，以近似两个耦合谐波势中粒子的动力学，从而在消除高成本量子位相互作用时实现可调谐。在非绝热动态过程中替换项后，恢复了近似速率系数，为变分优化下可观察的保留提供了原理证明。\n\n注意最小化量子位和门数资源。", "authors": [{"name": "Joshua M. Courtney"}, {"name": "P.C. Stancil"}], "featured_authors": [{"name": "Joshua M. Courtney"}, {"name": "P.C. Stancil"}], "author_count": 2}, {"id": "2605.06251", "category": "quant-ph", "title": "Meromorphic Quantum Computing", "abstract": "We consider the kinematic axioms of quantum mechanics projectively. Instead of normalized (pure) states up to global phase, states become one-dimensional subspaces of vector spaces. This process of projectivization is functorial and lax monoidal. For qubits it identifies the Bloch sphere with the Riemann sphere. We interpret a fragment of the ZXW-calculus projectively and thereby provide an alternate derivation of the arithmetic GHZ/W-calculus of Coecke et al. We find meromorphic functions that characterize the coherent behaviour of circuits for logical state preparation of quantum codes and magic state distillation.", "url": "https://arxiv.org/abs/2605.06251", "type": "理论", "summary": "我们投影地考虑量子力学的运动学公理。状态不再是达到全局阶段的归一化（纯）状态，而是成为向量空间的一维子空间。这个投影化过程是函数性的和松散的幺半群的。对于量子位，它将布洛赫球与黎曼球等同起来。我们投影地解释了 ZXW 演算的片段，从而提供了 Coecke 等人的算术 GHZ/W 演算的替代推导。我们发现亚纯函数可以表征电路的相干行为，用于量子代码的逻辑状态准备和魔态蒸馏。", "authors": [{"name": "Simon Burton"}, {"name": "Hussain Anwar"}], "featured_authors": [{"name": "Simon Burton"}, {"name": "Hussain Anwar"}], "author_count": 2}, {"id": "2605.06430", "category": "quant-ph", "title": "Revisiting the multi-mode rhombus circuit as a biased-noise qubit", "abstract": "In this work, we revisit the idea of using an interferometer of pairs of Josephson junctions as a protected rhombus qubit. Unlike in the original proposal, where the qubit states are encoded into odd and even parity charge states, here, we intentionally alter the energy of one of the junctions to investigate the soft version of the rhombus qubit. This approach allows us to directly probe the qubit transitions over several GHz and reduce the potential drawbacks of the interferometer-based protection. Away from a half flux quantum external field, the large shunting capacitors of the circuit ensure localized qubit states in different phase valleys, leading to a biased-noise qubit. In the realized circuit, we measure an average $T_1\\approx500\\,\\mu$s relaxation time in the biased-noise regime (with a Ramsey dephasing time of $T^{R}_\\varphi\\approx90\\,$ns), while an average $T_1\\approx27\\,\\mu$s relaxation time at frustration (with $T^{R}_\\varphi\\approx670\\,$ns). Our loss analysis on this multi-mode circuit indicates that at low frequencies, flux noise and quasiparticle tunneling limit the relaxation times, pointing toward the presence of an optimal operating regime of around a few GHz.", "url": "https://arxiv.org/abs/2605.06430", "type": "理论", "summary": "在这项工作中，我们重新审视了使用约瑟夫森结对干涉仪作为受保护的菱形量子位的想法。与最初的提议不同，在最初的提议中，量子位状态被编码为奇数和偶数奇偶校验电荷态，在这里，我们有意改变其中一个结的能量来研究菱形量子位的软版本。这种方法使我们能够直接探测几个 GHz 范围内的量子位跃迁，并减少基于干涉仪的保护的潜在缺点。远离半通量量子外部场，电路的大分流电容器确保不同相谷中的局部量子位状态，从而产生偏置噪声量子位。在实现的电路中，我们测量了偏置噪声状态下的平均松弛时间 $T_1\\approx500\\,\\mu$s（Ramsey 移相时间为 $T^{R}_\\varphi\\approx90\\,$ns），而挫败时的平均松弛时间为 $T_1\\approx27\\,\\mu$s（$T^{R}_\\varphi\\approx670\\,$ns）。我们对这种多模电路的损耗分析表明，在低频下，通量噪声和准粒子隧道效应限制了弛豫时间，表明存在几 GHz 左右的最佳工作状态。", "authors": [{"name": "Pablo Aramburu Sanchez"}, {"name": "Trevyn F. Q. Larson"}, {"name": "Anthony P. McFadden"}, {"name": "Constantin Schrade"}, {"name": "Joshua Combes"}, {"name": "András Gyenis"}], "featured_authors": [{"name": "Pablo Aramburu Sanchez"}, {"name": "Trevyn F. Q. Larson"}, {"name": "Anthony P. McFadden"}, {"name": "Constantin Schrade"}, {"name": "Joshua Combes"}, {"name": "András Gyenis"}], "author_count": 6}, {"id": "2605.06452", "category": "quant-ph", "title": "Tight Contraction Rates for Primitive Channels under Quantum $f$-Divergences", "abstract": "Data-processing inequalities capture the phenomenon that two probability distributions can only become less distinguishable under any common post-processing. For more fine-grained inequalities, one turns to strong data-processing inequality (SDPI) constants, which give the strongest inequalities for a given channel and reference state for a fixed measure of distinguishability. These quantities have been used to quantify the rate at which time-homogeneous Markov chains contract towards a fixed point both in the classical and quantum setting. In this work, we establish that quantum $f$-divergences satisfy a local reverse Pinsker inequality, which implies the asymptotic contraction rate of a primitive channel to its stationary state is upper bounded by the SDPI constant of any non-commutative $\\chi^2$-divergence. Using quantum-detailed balance, we establish a sufficient condition for these bounds to be tight. Finally, we apply these results to Petz, Matsumoto, and Hirche-Tomamichel $f$-divergences, establishing new and strengthening previously known results.", "url": "https://arxiv.org/abs/2605.06452", "type": "理论", "summary": "数据处理不等式捕获了这样一种现象：在任何常见的后处理下，两个概率分布只能变得难以区分。对于更细粒度的不等式，人们转向强数据处理不等式（SDPI）常数，它为给定通道和参考状态提供最强的不等式，以实现固定的可区分性度量。这些量已用于量化经典和量子环境中时间同质马尔可夫链收缩到固定点的速率。在这项工作中，我们确定量子 $f$ 散度满足局部逆平斯克不等式，这意味着原始通道到其稳态的渐近收缩率的上限受到任何非交换 $\\chi^2$ 散度的 SDPI 常数的上限。使用量子细节平衡，我们建立了这些边界严格的充分条件。最后，我们将这些结果应用于 Petz、Matsumoto 和 Hirche-Tomamichel $f$ 分歧，建立新的并强化先前已知的结果。", "authors": [{"name": "Matthew Simon Tan"}, {"name": "Marco Tomamichel"}, {"name": "Ian George"}], "featured_authors": [{"name": "Matthew Simon Tan"}, {"name": "Marco Tomamichel"}, {"name": "Ian George"}], "author_count": 3}, {"id": "2605.06577", "category": "quant-ph", "title": "Entanglement generation in a two-body Schrödinger--Newton model", "abstract": "The Schrödinger--Newton (SN) equation provides a semiclassical framework for the evolution of self-gravitating of massive quantum systems. We propose a two-body Schrödinger--Newton model that separates local nonlinear self-localization from the nonseparable Newtonian pair potential. Analytically, we show that the nonlinear self-field preserves the Schmidt spectrum, whereas direct entanglement generation arises from the nonseparable pair potential. Using numerical simulations in a regularized one-dimensional geometry, we find that entanglement generation depends sensitively on the initial spatial configuration and on the mass ratio. Highly localized, self-bound wavepackets experience minimal entanglement growth during scattering. Spatial delocalization and kinetic dispersion broaden the interaction region, amplifying the entangling power of the pair potential and exciting higher-order spatial modes. For dispersive Gaussian initial states, mass asymmetry shatters the lighter particle, producing Wigner negativity and rapid entanglement growth, whereas stationary SN profiles strongly suppress this effect. Stationary SN profiles isolate the bare pair-potential contribution; dispersive Gaussian initial states inflate it.", "url": "https://arxiv.org/abs/2605.06577", "type": "理论+数值", "summary": "薛定谔-牛顿（SN）方程为大规模量子系统的自引力演化提供了一个半经典框架。我们提出了一种二体薛定谔-牛顿模型，它将局部非线性自定位与不可分离的牛顿对势分开。通过分析，我们表明非线性自场保留了施密特谱，而直接纠缠的产生则源于不可分离的电对势。使用正则化一维几何中的数值模拟，我们发现纠缠的产生敏感地依赖于初始空间构型和质量比。高度局域化的自束缚波包在散射过程中经历最小的纠缠增长。空间离域和动力学色散拓宽了相互作用区域，放大了电势对的纠缠力并激发了高阶空间模式。对于色散高斯初始态，质量不对称会粉碎较轻的粒子，产生维格纳负性和快速纠缠增长，而静止的 SN 剖面强烈抑制这种效应。\n\n固定 SN 剖面隔离了裸对电势贡献；色散高斯初始状态使其膨胀。", "authors": [{"name": "Marcin Płodzień"}, {"name": "Julia Osęka-Lenart"}, {"name": "Maciej Lewenstein"}, {"name": "Michał Eckstein"}], "featured_authors": [{"name": "Marcin Płodzień"}, {"name": "Julia Osęka-Lenart"}, {"name": "Maciej Lewenstein"}, {"name": "Michał Eckstein"}], "author_count": 4}, {"id": "2605.06633", "category": "quant-ph", "title": "Machine Learning Approaches to Building Quantum Circuits for Sets of Matrices", "abstract": "Machine learning nowadays becomes a useful instrument in many subjects. In this paper we use interpretable machine learning to build quantum algorithm. By studying the parameters of the machine learning algorithm we were able to construct universal shortest analytic quantum algorithm for arbitrary diagonal matrix of any size.", "url": "https://arxiv.org/abs/2605.06633", "type": "数值", "summary": "如今，机器学习已成为许多学科的有用工具。在本文中，我们使用可解释的机器学习来构建量子算法。通过研究机器学习算法的参数，我们能够构建任意大小的任意对角矩阵的通用最短解析量子算法。", "authors": [{"name": "Matvei Fedin"}, {"name": "Andrei Morozov"}], "featured_authors": [{"name": "Matvei Fedin"}, {"name": "Andrei Morozov"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
