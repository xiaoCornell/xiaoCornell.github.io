or the magnetization, saturating once the Eu$^{2+}$ moments are polarized. The field-enhancement of the phonon-dominated thermal conductivity is interpreted through the lifting of a degeneracy of spin configurations, and the subsequent saturation due to quenched magnetostrain in high field. Comparison with spin-glass insulators suggests that this phenomenon is not a byproduct but rather the driver of electron delocalization due to the suppression of strong phonon scattering arising from exchange frustration.", "url": "https://arxiv.org/abs/2605.06649", "type": "理论", "summary": "鉴于与典型的钙钛矿锰酸盐和掺杂的铕硫族化物形成鲜明对比，新一代基于Eu$^{2+}$的反铁磁体中出现的巨大磁阻非常有趣。在这项研究中，测量了 Eu$_5$Sn$_2$As$_6$（此类代表之一）的热导率和磁致伸缩，以更好地了解晶格的作用。这两种特性都强烈依赖于场，并反映磁化强度，一旦 Eu$^{2+}$ 磁矩极化，就会饱和。声子主导的热导率的场增强是通过自旋构型的简并性的提升以及随后由于高场中的淬灭磁致应变而导致的饱和来解释的。与自旋玻璃绝缘体的比较表明，这种现象不是副产品，而是由于交换挫败引起的强声子散射受到抑制而导致电子离域的驱动因素。", "authors": [{"name": "Luke Pritchard Cairns"}, {"name": "Kohtaro Yamakawa"}, {"name": "Shengzhi Zhang"}, {"name": "Youzhe Chen"}, {"name": "Bernard Field"}, {"name": "Rainer Reczek"}, {"name": "Ryan P. Day"}, {"name": "Joel E. Moore"}, {"name": "Marcelo Jaime"}, {"name": "Sinead M. Griffin"}, {"name": "Robert J. Birgeneau"}, {"name": "James G. Analytis"}], "featured_authors": [{"name": "Luke Pritchard Cairns"}, {"name": "Kohtaro Yamakawa"}, {"name": "Shengzhi Zhang"}, {"name": "Sinead M. Griffin"}, {"name": "Robert J. Birgeneau"}, {"name": "James G. Analytis"}], "author_count": 12}, {"id": "2605.06661", "category": "cond-mat", "title": "Pro-Tensor Network", "abstract": "We introduce the pro-tensor network, a categorification of the tensor network, as a fully rigorous yet graphically transparent framework for studying the collection of many many-body theories, which we dub many-many-body theory. We provide a comprehensive toolbox for the graphical calculations using pro-tensor networks. As applications, we recover the Levin-Wen model as a \"uniform\" pro-tensor network and generalize a result of Kitaev and Kong by characterizing particles as modules over promonads. One can also interpret the string-net pro-tensor network as the space of symmetric tensor networks, thus our framework also applies to the study of generalized symmetry and topological holography. Notably, our generalization dispenses with the assumptions of semisimplicity, finiteness, and rigidity, potentially facilitating the exploration of many-body physics beyond these constraints.", "url": "https://arxiv.org/abs/2605.06661", "type": "理论+数值", "summary": "我们引入了原张量网络（张量网络的一种分类），作为一个完全严格且图形透明的框架，用于研究许多多体理论的集合，我们将其称为多多体理论。我们为使用原张量网络的图形计算提供了一个全面的工具箱。作为应用，我们将 Levin-Wen 模型恢复为“均匀”前张量网络，并通过将粒子表征为前导模块来概括 Kitaev 和 Kong 的结果。我们也可以将弦网前张量网络解释为对称张量网络的空间，因此我们的框架也适用于广义对称性和拓扑全息的研究。值得注意的是，我们的概括消除了半简单性、有限性和刚性的假设，有可能促进超越这些限制的多体物理探索。", "authors": [{"name": "Gen Yue"}, {"name": "Ansi Bai"}, {"name": "Linqian Wu"}, {"name": "Tian Lan"}], "featured_authors": [{"name": "Gen Yue"}, {"name": "Ansi Bai"}, {"name": "Linqian Wu"}, {"name": "Tian Lan"}], "author_count": 4}, {"id": "2605.05291", "category": "hep-th", "title": "Baby Universe in a Coupled SYK Model", "abstract": "We analyze three saddle points of the path integral computing the partition function of the SYK model with a Maldacena-Qi coupling in the double scaling limit. The three saddle points are holographically dual to three topologically different spacetimes: a pair of Euclidean black holes (two thermal disks), a thermal AdS$_2$ (a cylinder), and a thermal AdS$_2$ with a baby universe (a cylinder with a handle). We develop explicit chord rules that span and probe these three bulk geometries. We derive the rules by expanding the effective $G,\\Sigma$ action in powers of the coupling $\\mathcal{J}$ and writing the partition function as a weighted sum of chord diagrams. By slicing the diagrams open, we generate a Hilbert space description on a spatial slice for each saddle point. The Hartle-Hawking chord state for the third saddle point has genuine entanglement between the baby universe and the external spacetimes, providing evidence that a closed universe can support a nontrivial Hilbert space.", "url": "https://arxiv.org/abs/2605.05291", "type": "理论", "summary": "我们分析了路径积分的三个鞍点，计算双尺度极限下具有 Maldacena-Qi 耦合的 SYK 模型的配分函数。这三个鞍点全息对偶于三个拓扑不同的时空：一对欧几里得黑洞（两个热盘）、一个热AdS$_2$（一个圆柱体）和一个带有婴儿宇宙的热AdS$_2$（一个带手柄的圆柱体）。我们开发了明确的弦规则来跨越和探测这三个整体几何形状。我们通过扩展耦合 $\\mathcal{J}$ 的幂中的有效 $G,\\Sigma$ 作用并将配分函数写为弦图的加权和来导出规则。通过将图切开，我们在每个鞍点的空间切片上生成希尔伯特空间描述。第三鞍点的哈特尔-霍金弦状态在婴儿宇宙和外部时空之间具有真正的纠缠，这提供了封闭宇宙可以支持非平凡希尔伯特空间的证据。", "authors": [{"name": "Andrew Sontag"}, {"name": "Herman Verlinde"}], "featured_authors": [{"name": "Andrew Sontag"}, {"name": "Herman Verlinde"}], "author_count": 2}, {"id": "2605.05295", "category": "hep-th", "title": "Ultraviolet completion of Starobinsky inflation", "abstract": "We construct an $N=1$ supergravity action whose bosonic part contains an arbitrary function of the scalar curvature, the so-called $F(R)$ gravity. As in $R+R^2$ supergravity, it can be described in terms of two chiral superfields of no-scale supergravity: one contains the scalaron which plays the role of the Starobinsky inflaton and the other contains the goldstone fermion of spontaneously broken supersymmetry during the inflation plateau. Its (complex) scalar component acquires a non-tachyonic mass in the presence of the string dilaton and can be set to zero, together with the pseudoscalar partner of the scalaron, so that the scalar potential is reduced to the one of $F(R)$ gravity. In a perturbative expansion in powers of $R$, one obtains a small deformation of the Starobinsky cosmological model that solves the problem of initial conditions within the validity of the effective field theory, below the scale of tower of states predicted by the swampland distance conjecture. We also show that a particular example of an underlying microscopic theory with such properties is provided by a four-dimensional heterotic string model containing the Standard Model of particle physics.", "url": "https://arxiv.org/abs/2605.05295", "type": "理论", "summary": "我们构造一个 $N=1$ 超重力作用，其玻色子部分包含标量曲率的任意函数，即所谓的 $F(R)$ 重力。与 $R+R^2$ 超引力一样，它可以用无尺度超引力的两个手性超场来描述：一个包含充当 Starobinsky 暴胀作用的标量，另一个包含在暴涨平台期间自发破缺超对称性的金石费米子。它的（复）标量分量在存在弦膨胀子的情况下获得非快子质量，并且可以与标量的伪标量伙伴一起设置为零，以便标量势能减少到 $F(R)$ 重力之一。在 $R$ 幂的微扰展开中，人们获得了 Starobinsky 宇宙学模型的一个小变形，该模型解决了有效场论有效性内的初始条件问题，低于沼泽距离猜想预测的状态塔规模。我们还表明，包含粒子物理标准模型的四维异质弦模型提供了具有此类属性的基础微观理论的一个特定示例。", "authors": [{"name": "Ignatios Antoniadis"}, {"name": "Chrysoula Markou"}, {"name": "Dimitri V. Nanopoulos"}], "featured_authors": [{"name": "Ignatios Antoniadis"}, {"name": "Chrysoula Markou"}, {"name": "Dimitri V. Nanopoulos"}], "author_count": 3}, {"id": "2605.05305", "category": "hep-th", "title": "Positivity of the gravitational path integral implies the axionic weak gravity conjecture", "abstract": "The gravitational path integral can compute inner products between different states of open and closed universes. To have a well-defined Hilbert space, these inner products should be positive semi-definite, which is not manifest in the low-energy effective theory. In this letter, we analyze the constraints that the positivity of inner products imposes on gravitational theories coupled to axions. If the axion has an exact shift symmetry, we show that, under mild assumptions, a combined positivity constraint on closed and open universes is violated when one includes certain wormholes. In low-energy effective theories where these wormholes are perturbatively stable, positivity requires that the wormholes have a non-perturbative instability that breaks the shift symmetry. This leads to a sharp version of the axion weak gravity conjecture, including precise numerical constants. We relate the bound to possible extensions of other swampland conjectures, arguing for an imaginary continuation of the distance conjecture. We comment on how the bound applies to axions in string theory and discuss phenomenological implications.", "url": "https://arxiv.org/abs/2605.05305", "type": "理论", "summary": "引力路径积分可以计算开放宇宙和封闭宇宙不同状态之间的内积。为了具有明确定义的希尔伯特空间，这些内积应该是正半定的，这在低能有效理论中并不明显。在这封信中，我们分析了内积的正性对与轴子耦合的引力理论施加的约束。如果轴子具有精确的平移对称性，我们表明，在温和的假设下，当包含某些虫洞时，封闭宇宙和开放宇宙的组合正约束就会被违反。在低能有效理论中，这些虫洞是微扰稳定的，正性要求虫洞具有打破位移对称性的非微扰不稳定性。这导致轴子弱引力猜想的尖锐版本，包括精确的数值常数。我们将界限与其他沼泽猜想的可能扩展联系起来，主张距离猜想的想象延续。我们评论了界限如何应用于弦理论中的轴子，并讨论了现象学含义。", "authors": [{"name": "Gabriele Di Ubaldo"}, {"name": "Luca V. Iliesiu"}, {"name": "Henry W. Lin"}, {"name": "Cynthia Yan"}], "featured_authors": [{"name": "Gabriele Di Ubaldo"}, {"name": "Luca V. Iliesiu"}, {"name": "Henry W. Lin"}, {"name": "Cynthia Yan"}], "author_count": 4}, {"id": "2605.05307", "category": "hep-th", "title": "Perturbative, Nonperturbative and Exact Aspects of Crystalline Phases in the Gross-Neveu Model", "abstract": "We study the crystalline phase of the $O(2N)$ Gross--Neveu model with a chemical potential for $a \\leq N-2$ of the fermions. We analyze the problem in three independent ways: using perturbative QFT methods, a semiclassical large $N$ analysis, and integrability techniques (both at finite and large $N$). The resulting picture is consistent across all three approaches: at sufficiently large chemical potential $h$, an inhomogeneous phase emerges in which $a$-particle bound states condense and which, at large $N$, corresponds to a periodically oscillating chiral condensate. In this phase, the usual dynamically generated scale $\\Lambda$ is replaced by two new dynamically generated scales $\\Lambda_{\\rm n}$ and $\\Lambda_{\\rm c}$. These two scales govern the multiple nonperturbative effects in the theory, corresponding in particular to the mass gaps of neutral and charged excitations on top of the inhomogeneous vacuum, respectively. They also control the nonperturbative corrections to observables such as the free energy and provide the parameters characterizing the oscillatory profile of the mean field at large $N$. In this paper, we provide the necessary details of each of the three methods, thereby complementing the results announced in a previous, shorter publication.", "url": "https://arxiv.org/abs/2605.05307", "type": "理论", "summary": "我们研究 $O(2N)$ Gross--Neveu 模型的晶相，其化学势为 $a \\leq N-2$ 费米子。我们以三种独立的方式分析该问题：使用微扰 QFT 方法、半经典大 $N$ 分析和可积技术（有限和大 $N$ 下）。三种方法得出的结果是一致的：在足够大的化学势 $h$ 下，出现一个不均匀相，其中 $a$ 粒子束缚态凝结，并且在大的 $N$ 下对应于周期性振荡的手性凝聚态。在此阶段，通常的动态生成尺度$\\Lambda$被两个新的动态生成尺度$\\Lambda_{\\rm n}$和$\\Lambda_{\\rm c}$取代。这两个尺度控制着理论中的多重非微扰效应，特别分别对应于不均匀真空顶部的中性和带电激发的质量间隙。它们还控制对自由能等可观测量的非微扰修正，并提供表征大$N$处平均场振荡剖面的参数。\n\n在本文中，我们提供了三种方法中每种方法的必要细节，从而补充了之前较短的出版物中宣布的结果。", "authors": [{"name": "Francesco Benini"}, {"name": "Ohad Mamroud"}, {"name": "Tomas Reis"}, {"name": "Marco Serone"}], "featured_authors": [{"name": "Francesco Benini"}, {"name": "Ohad Mamroud"}, {"name": "Tomas Reis"}, {"name": "Marco Serone"}], "author_count": 4}, {"id": "2605.05317", "category": "hep-th", "title": "Inflation and topology from the no-boundary state", "abstract": "The no-boundary wavefunction for slow-roll inflation on the 3-sphere exponentially favors a small universe, in sharp disagreement with observations. We show that this problem is resolved by changing the spatial topology to the 3-torus. The sum over the ${\\rm SL}(3,\\mathbb{Z})$ family of geometries, computed using the theory of automorphic forms for ${\\rm GL}(3)$, produces a wavefunction favoring a large inflating universe with ${\\cal N} \\gtrsim 250$ $e$-folds. We also compute corrections to the CMB power spectrum induced by torus moduli fluctuations.", "url": "https://arxiv.org/abs/2605.05317", "type": "理论", "summary": "3 球体上慢速暴胀的无边界波函数以指数方式有利于小宇宙，这与观测结果截然相反。我们证明这个问题可以通过将空间拓扑更改为 3 环面来解决。 ${\\rm SL}(3,\\mathbb{Z})$ 几何族的总和，使用 ${\\rm GL}(3)$ 的自守形式理论计算，产生一个有利于 ${\\cal N} \\gtrsim 250$ $e$ 折叠的大膨胀宇宙的波函数。我们还计算了由环面模量波动引起的 CMB 功率谱的修正。", "authors": [{"name": "Victor Godet"}], "featured_authors": [{"name": "Victor Godet"}], "author_count": 1}, {"id": "2605.05322", "category": "hep-th", "title": "Automorphic Structures of Heterotic Vacua", "abstract": "We study moduli stabilization in 4D effective field theories with Sp(4,$\\mathbb{Z}$) self-duality inspired by heterotic orbifold compactifications with Wilson lines. The target-space duality group of these theories is enhanced from SL$(2,\\mathbb{Z})$ to Sp$(4,\\mathbb{Z})$, making Siegel modular forms the appropriate language to formulate the effective supergravity action. We construct the corresponding effective theory including moduli-dependent threshold corrections to the gauge kinetic function and nonperturbative effects in the superpotential. The degeneration limit of the Wilson lines distinguishes different sectors and dictates which combination of cusp forms appears in threshold corrections. We compute the resulting scalar potential and prove several general statements about its extrema. In particular, we show that the fixed points of Sp$(4,\\mathbb{Z})$ are extrema of the potential, and derive genus-2 analogues of no-go theorems for de Sitter vacua. Finally, we show how positive-energy metastable minima can arise once supersymmetry is broken in the dilaton direction by nonperturbative contributions to the Kähler potential.", "url": "https://arxiv.org/abs/2605.05322", "type": "理论", "summary": "我们研究了具有 Sp(4,$\\mathbb{Z}$) 自对偶性的 4D 有效场论中的模稳定性，其灵感来自威尔逊线的异质轨道折叠紧化。这些理论的目标空间对偶群从 SL$(2,\\mathbb{Z})$ 增强到 Sp$(4,\\mathbb{Z})$，使得西格尔模形式成为制定有效超重力作用的适当语言。我们构建了相应的有效理论，包括对规范动力学函数的模数相关阈值校正和超电势的非微扰效应。威尔逊线的退化极限区分了不同的扇区，并决定了阈值校正中出现的尖点形式的组合。我们计算所得的标量势并证明关于其极值的几个一般陈述。特别是，我们证明了 Sp$(4,\\mathbb{Z})$ 的不动点是势的极值，并导出了德西特真空定理的 genus-2 类似物。最后，我们展示了一旦​​超对称性因对凯勒势的非微扰贡献而在膨胀方向上被打破，正能量亚稳态最小值是如何产生的。", "authors": [{"name": "Jacob M. Leedom"}, {"name": "Nicole Righi"}, {"name": "Alexander Westphal"}], "featured_authors": [{"name": "Jacob M. Leedom"}, {"name": "Nicole Righi"}, {"name": "Alexander Westphal"}], "author_count": 3}, {"id": "2605.05326", "category": "hep-th", "title": "A Quantum Singularity Theorem for the Evaporating Black Hole", "abstract": "We prove a singularity theorem in semiclassical gravity without assuming global hyperbolicity or the null energy/curvature condition; the former is replaced by the weaker causality conditions of stable causality and past reflectivity, and the latter is replaced as is standard by the Generalized Second Law. This establishes in particular that the standard models of evaporating black holes are singular - i.e. they are null geodesically incomplete.", "url": "https://arxiv.org/abs/2605.05326", "type": "理论", "summary": "我们在不假设全局双曲性或零能量/曲率条件的情况下证明了半经典引力的奇点定理；前者被稳定因果关系和过去反射性等较弱的因果关系条件所取代，而后者则被广义第二定律所取代。这特别确定了蒸发黑洞的标准模型是奇异的——即它们在测地线上是不完整的。", "authors": [{"name": "Netta Engelhardt"}, {"name": "Ivri Nagar"}], "featured_authors": [{"name": "Netta Engelhardt"}, {"name": "Ivri Nagar"}], "author_count": 2}, {"id": "2605.05333", "category": "hep-th", "title": "Towards Wedge Construction of Four-Dimensional Non-Supersymmetric Theories and Torsion Classes", "abstract": "Motivated by recent proposals relating non-supersymmetric Type 0A theory to M-theory compactified on a singular wedge geometry, we study an M-theory compactification on a seven-manifold with G_2 structure, realized as a deformed K3 fibration over a compact three-manifold. In the Morrison--Vafa limit, the deformed K3 may be described locally as a non-trivial torus fibration over a base that is itself a pinched circle fibered over an interval. Once the doubled-spectrum decomposition and the local pinched structure are specified, we show that the G_2 torsion classes provide a natural and efficient way to characterize both the torsion of the seven-manifold and the resulting supersymmetry breaking in four dimensions. Reducing the system to ten dimensions in two inequivalent ways leads respectively to Type 0A and Type 0 heterotic theories compactified on two different non-Kahler manifolds, for which the SU(3) torsion classes furnish the appropriate mathematical description. In particular, we argue that the pinching deformation lies in the 27 of G_2, and that under the two reductions it is distributed differently into the W_2 and W_3 torsion classes of the corresponding SU(3) structures. In the supersymmetric limit, and under suitable assumptions, the two resulting theories may become U-dual to one another. Away from that limit, however, we argue that any such duality should be treated with considerable caution.", "url": "https://arxiv.org/abs/2605.05333", "type": "理论", "summary": "受最近将非超对称 0A 型理论与奇异楔形几何上的紧致 M 理论相关的提议的推动，我们研究了具有 G_2 结构的七流形上的 M 理论紧致化，实现为紧凑三流形上的变形 K3 纤维。在 Morrison-Vafa 极限中，变形的 K3 可以局部描述为基底上的非平凡环面纤维，该基底本身是在一段间隔上纤维化的收缩圆。一旦指定了双谱分解和局部收缩结构，我们表明 G_2 扭转类提供了一种自然而有效的方法来表征七流形的扭转以及由此产生的四维超对称破缺。以两种不等价的方式将系统减少到十维，分别导致在两个不同的非卡勒流形上压缩的 0A 型和 0 型杂变理论，其中 SU(3) 挠率类提供了适当的数学描述。特别是，我们认为箍缩变形位于 G_2 的 27 处，并且在两次缩减下，它以不同的方式分布到相应 SU(3) 结构的 W_2 和 W_3 扭转类别中。\n\n在超对称极限下，在适当的假设下，所得的两个理论可能彼此变为 U-对偶。然而，除了这个限制之外，我们认为任何此类二元性都应该相当谨慎地对待。", "authors": [{"name": "Keshav Dasgupta"}, {"name": "Radu Tatar"}], "featured_authors": [{"name": "Keshav Dasgupta"}, {"name": "Radu Tatar"}], "author_count": 2}, {"id": "2605.05334", "category": "hep-th", "title": "Carroll fermions from null reduction: A case of good and bad fermions", "abstract": "We derive Carrollian fermionic actions using the null reduction method from Bargmann spacetimes. In the Lorentzian light-cone formulation, the Dirac spinor naturally decomposes into dynamical and constrained degrees of freedom $-$ the so-called `good' and `bad' fermions $\\Psi_{(\\pm)}$. These light-cone projections are intrinsically adapted to the null frame and, unlike the chiral decomposition into left- and right-handed spinors $\\Psi_{L(R)}$, are valid in arbitrary spacetime dimensions, both even and odd. As in the case of bosons, the magnetic Carroll sector for fermions is governed by the dynamical modes of the parent theory, while the electric sector arises from the constrained modes. Upon deforming to a Bargmann spacetime, these constraints are removed, promoting the `bad' fermions to dynamical modes that describe the electric Carroll fermions. We construct the Clifford algebra on the Carroll manifold through its embedding in the ambient Bargmann manifold, and obtain both electric and magnetic Carroll fermion actions from a \\textit{single} Bargmann-invariant Dirac action. We analyze the canonical structure of both theories, establish their invariance under Carroll transformations, and compute the corresponding two-point functions, which exhibit the expected behavior in both sectors. We conclude with some comments on the quantization of these Carrollian theories.", "url": "https://arxiv.org/abs/2605.05334", "type": "理论", "summary": "我们使用巴格曼时空的零归约方法推导出卡罗尔费米子作用。在洛伦兹光锥公式中，狄拉克旋量自然地分解为动态和约束自由度 $-$ 所谓的“好”和“坏”费米子 $\\Psi_{(\\pm)}$。这些光锥投影本质上适应零框架，并且与左手和右手旋量 $\\Psi_{L(R)}$ 的手性分解不同，在任意时空维度（偶数和奇数）中都是有效的。与玻色子的情况一样，费米子的磁卡罗尔扇区受母体理论的动力学模式控制，而电扇区则由约束模式产生。在变形到巴格曼时空后，这些约束被消除，将“坏”费米子提升为描述电卡罗尔费米子的动力学模式。我们通过将克利福德代数嵌入到环境巴格曼流形中来构造卡罗尔流形上的克利福德代数，并从 \\textit{single} 巴格曼不变狄拉克作用获得电和磁卡罗尔费米子作用。\n\n我们分析了两种理论的规范结构，建立了它们在卡罗尔变换下的不变性，并计算了相应的两点函数，该函数在两个领域都表现出了预期的行为。最后我们对这些卡罗尔理论的量化进行了一些评论。", "authors": [{"name": "Sucheta Majumdar"}, {"name": "Aditya Sharma"}, {"name": "Sourav Singha"}], "featured_authors": [{"name": "Sucheta Majumdar"}, {"name": "Aditya Sharma"}, {"name": "Sourav Singha"}], "author_count": 3}, {"id": "2605.05336", "category": "hep-th", "title": "Wormholes and the imaginary distance bound", "abstract": "Some of the simplest wormhole solutions involve massless scalar fields that take imaginary values. Massless fields can be interpreted as coupling constants in asymptotically flat or asymptotically AdS gravity theories. We argue that wormhole effects imply an imaginary distance bound, an upper limit for the analytic continuation of the theory to imaginary values of these couplings. In string theory examples, we find explicit effects that render the low-energy theory invalid either before or precisely at this wormhole limit. We argue that the existence of such effects enforcing the distance bound is a general feature of string theories containing wormholes. In some cases, the bounds we discuss coincide with the weak gravity conjecture, and with the Kontsevich-Segal-Witten condition on complex metrics.", "url": "https://arxiv.org/abs/2605.05336", "type": "理论", "summary": "一些最简单的虫洞解决方案涉及采用虚值的无质量标量场。无质量场可以解释为渐近平坦或渐近 AdS 引力理论中的耦合常数。我们认为，虫洞效应意味着一个虚距离界限，即理论对这些耦合的虚值的解析延拓的上限。在弦理论的例子中，我们发现了明显的效应，使得低能理论在虫洞极限之前或恰好在该虫洞极限处无效。我们认为，这种强制距离限制的效应的存在是包含虫洞的弦理论的一般特征。在某些情况下，我们讨论的界限与弱引力猜想以及复杂度量上的 Kontsevich-Segal-Witten 条件一致。", "authors": [{"name": "Juan Maldacena"}, {"name": "Alexander Maloney"}, {"name": "Brian McPeak"}], "featured_authors": [{"name": "Juan Maldacena"}, {"name": "Alexander Maloney"}, {"name": "Brian McPeak"}], "author_count": 3}, {"id": "2605.05350", "category": "hep-th", "title": "Challenges to Understanding Celestial Holography from the Bottom Up", "abstract": "In the bottom-up approach to celestial holography, it is tempting to define celestial amplitudes by transforming momentum-space amplitudes order by order in perturbation theory. We test this prescription in the exactly solvable two-dimensional Sinh-Gordon model. Because the full non-perturbative S-matrix is known, we can compare two operations directly: first transform and then expand, or first expand and then transform. They do not agree, already at leading nontrivial order in the coupling. More broadly, this suggests that naive term-by-term celestial transforms should not be assumed valid in generic quantum field theories with asymptotic weak-coupling expansions. This has an immediate consequence for proposed CCFT duals: if one tries to test them by taking celestial transforms of perturbative bulk amplitudes term-by-term, a mismatch need not falsify the proposal. This makes bottom-up tests of celestial dualities far more subtle than one might have expected.", "url": "https://arxiv.org/abs/2605.05350", "type": "理论", "summary": "在天体全息术的自下而上方法中，很容易通过微扰理论中的逐阶变换动量空间振幅来定义天体振幅。我们在精确可解的二维 Sinh-Gordon 模型中测试了这个处方。因为完整的非微扰S矩阵是已知的，所以我们可以直接比较两个操作：先变换然后扩展，或者先扩展然后变换。他们不同意，已经在耦合中处于领先地位。更广泛地说，这表明，在具有渐近弱耦合展开的通用量子场论中，不应假设天真的逐项天体变换是有效的。这对所提出的 CCFT 对偶有一个直接的影响：如果试图通过逐项进行微扰体振幅的天体变换来测试它们，则不匹配不一定会证伪该提议。这使得自下而上的天体二元性测试比人们想象的更加微妙。", "authors": [{"name": "Adam Tropper"}], "featured_authors": [{"name": "Adam Tropper"}], "author_count": 1}, {"id": "2605.05357", "category": "hep-th", "title": "Small Vacuum Energy and Tunneling in a Modified Bousso-Polchinski Model", "abstract": "We propose a simplified model for the cosmological constant in string theory flux vacua motivated by type IIB and F-theory compactifications. Relative to the Bousso-Polchinski model, small vacuum energy spacing occurs in thin wafers rather than thin shells. The model is applied to the entire Schöller-Skarke database of Calabi-Yau fourfolds, which exhibit $532,600,483$ distinct sets of Hodge numbers. The overwhelming majority of those ($99.95\\%$ percent for some choices of parameters) exhibit a vacuum energy spacing of~$10^{-120}$ in Planck units or smaller. Brown-Teitelboim membrane nucleation transitions can populate this landscape of flux vacua. In the thin-wall approximation, and ignoring gravitational corrections, we find that the bubble transitions are always dominated by giant leaps in flux space. The age of the universe places a bound on Calabi-Yau topology that is satisfied for the entire Schöller-Skarke database.", "url": "https://arxiv.org/abs/2605.05357", "type": "理论", "summary": "我们提出了一个由 IIB 型和 F 理论紧致化驱动的弦理论通量真空中的宇宙常数的简化模型。相对于 Bousso-Polchinski 模型，较小的真空能量间距出现在薄晶圆而不是薄壳中。该模型应用于 Calabi-Yau 四重的整个 Schöller-Skarke 数据库，该数据库展示了 $532,600,483$ 的不同 Hodge 数集。其中绝大多数（对于某些参数选择为 99.95\\%$%）表现出真空能量间距为~$10^{-120}$（以普朗克单位表示或更小）。布朗-泰特尔博伊姆膜成核转变可以填充这种通量真空景观。在薄壁近似中，忽略引力修正，我们发现气泡转变总是由通量空间中的巨大跳跃主导。宇宙的年龄给 Calabi-Yau 拓扑设置了一个界限，整个 Schöller-Skarke 数据库都满足这个界限。", "authors": [{"name": "James Halverson"}, {"name": "Justin Khoury"}, {"name": "Cody Long"}], "featured_authors": [{"name": "James Halverson"}, {"name": "Justin Khoury"}, {"name": "Cody Long"}], "author_count": 3}, {"id": "2605.05363", "category": "hep-th", "title": "Celestial dual of conformal gravity MHV amplitudes: an OPE analysis", "abstract": "In an earlier paper [ arXiv:2511.03669 ] we extracted the OPE of celestial CFT operator duals of positive helicity graviton and scalar particles from the Mellin transformed relevant MHV amplitudes of conformal gravity, realised as the bosonic subsector of the Berkovits-Witten theory. A soft theorem analysis of bulk MHV amplitudes established that this conformal gravity exhibits a chiral $\\mathfrak{bms}_4$ symmetry on the celestial sphere with the associated $\\mathfrak{sl}(2,\\mathbb{R})$ current algebra, which acquires a non-trivial central extension, unlike the Einstein gravity. Here we construct a $2d$ chiral CFT free-field realisation of the relevant chiral $\\mathfrak{bms}_4$ algebra in terms of three free scalars ($\\phi_i$) and three $(\\beta_i,\\gamma_i)$ ghost pairs, and propose vertex operators for the positive-helicity graviton primary $G^{++}_{\\Delta}(z,\\bar{z})$ as well as the scalar primary $\\Phi_{\\Delta}(z,\\bar{z})$, and compute their OPEs. These OPEs reproduce exactly those obtained from the bulk conformal gravity MHV amplitudes, providing a concrete celestial dual description of its MHV sector.", "url": "https://arxiv.org/abs/2605.05363", "type": "理论", "summary": "在早期的论文 [ arXiv:2511.03669 ] 中，我们从 Mellin 变换的共形引力的相关 MHV 振幅中提取了正螺旋引力子和标量粒子的天体 CFT 算子对偶的 OPE，实现为 Berkovits-Witten 理论的玻色子扇区。对体 MHV 振幅的软定理分析表明，这种共形引力在天球上表现出手性 $\\mathfrak{bms}_4$ 对称性，并具有相关的 $\\mathfrak{sl}(2,\\mathbb{R})$ 当前代数，与爱因斯坦引力不同，它获得了非平凡的中心扩展。在这里，我们根据三个自由标量 ($\\phi_i$) 和三个 $(\\beta_i,\\gamma_i)$ 鬼对构造相关手性 $\\mathfrak{bms}_4$ 代数的 $2d$ 手性 CFT 自由场实现，并提出正螺旋性引力子初级 $G^{++}_{\\Delta}(z,\\bar{z})$ 以及标量初级的顶点算子$\\Phi_{\\Delta}(z,\\bar{z})$，并计算它们的 OPE。这些 OPE 准确地再现了从整体共形重力 MHV 振幅获得的结果，提供了其 MHV 扇区的具体天体双重描述。", "authors": [{"name": "Nirmal Ghorai"}, {"name": "Partha Paul"}, {"name": "Nemani V. Suryanarayana"}], "featured_authors": [{"name": "Nirmal Ghorai"}, {"name": "Partha Paul"}, {"name": "Nemani V. Suryanarayana"}], "author_count": 3}, {"id": "2605.05375", "category": "hep-th", "title": "Stochastic modes in postquantum classical gravity", "abstract": "We study fluctuations of the metric in the postquantum theory of classical gravity, a covariant theory which couples a classical spacetime with quantum matter fields. Mathematical consistency requires spacetime to evolve stochastically. Starting from the classical-quantum path integral, we linearize around Minkowski space and perform a scalar-vector-tensor decomposition, identifying the stochastic modes: a classical spin-2 field and spin-0 scalar, both diffusing around their respective wave equations. There is also a non-dynamical vector and scalar field. These are related to the degrees of freedom found in quadratic gravity, but here interpreted as stochastic contributions to spacetime. We show that the action is positive semi-definite (PSD) on all dynamical modes, which is a necessary condition for the theory to consistently treat spacetime classically. We compute the two-point function and power spectral density corresponding to fluctuations of the Newtonian potential, and compare it to the excess noise found in LISA Pathfinder. This sets a bound on one combination of the two dimensionless coupling constants of the theory, while bounds on the stochastic gravitational wave energy density in a FLRW background constrain another combination. We derive the effective action for matter distributions, and find that bounds from decoherence experiments are constrained by fluctuations in the Newtonian potential $\\Phi$ and the curvature perturbation $\\psi$. Finally, we show consistency between different formulations of the pure gravity theory, the Onsager-Machlup form of the action, the Martin-Siggia-Rose form, and that given by stochastic differential equations.", "url": "https://arxiv.org/abs/2605.05375", "type": "理论", "summary": "我们研究经典引力后量子理论中度量的涨落，这是一种将经典时空与量子物质场耦合起来的协变理论。数学一致性要求时空随机演化。从经典量子路径积分开始，我们围绕 Minkowski 空间进行线性化并执行标量-矢量-张量分解，识别随机模式：经典自旋 2 场和自旋 0 标量，两者都围绕各自的波动方程扩散。还有非动态矢量和标量场。这些与二次引力中的自由度有关，但这里解释为对时空的随机贡献。我们证明，该作用在所有动力学模式上都是正半定（PSD）的，这是该理论始终以经典方式处理时空的必要条件。我们计算与牛顿势波动相对应的两点函数和功率谱密度，并将其与 LISA Pathfinder 中发现的过量噪声进行比较。\n\n这对理论的两个无量纲耦合常数的一种组合设定了界限，而 FLRW 背景中的随机引力波能量密度的界限则限制了另一种组合。我们推导了物质分布的有效作用，并发现退相干实验的界限受到牛顿势 $\\Phi$ 和曲率扰动 $\\psi$ 波动的限制。最后，我们证明了纯引力理论的不同表述、作用的 Onsager-Machlup 形式、Martin-Siggia-Rose 形式以及随机微分方程给出的形式之间的一致性。", "authors": [{"name": "Jonathan Oppenheim"}, {"name": "Muhammad Sajjad"}], "featured_authors": [{"name": "Jonathan Oppenheim"}, {"name": "Muhammad Sajjad"}], "author_count": 2}, {"id": "2605.05903", "category": "hep-th", "title": "Trace anomaly, effective approach, and gravitational potential", "abstract": "We explore and discuss corrections to the Newton potential from the quantum effects of conformal matter fields. In this special case, one can compare different approaches, including that of effective quantum gravity and another, based on the conformal (trace) anomaly. The comparison of these two methods is the main focus in the present work. Using the anomaly-induced effective action of gravity requires fixing the quantum vacuum state, similar to what is done in the description of black hole evaporation. In the Boulware vacuum state, we compute the anomaly-induced stress tensor and the first-order correction to the classical gravitational law. The quantum correction to the Newton's potential derived in this way, differs from the result calculated in a way analogous to the effective approach to quantum gravity. The only way to reconcile the two approaches for deriving the leading semiclassical corrections to Newtonian potential is to modify the asymptotic behavior of the average of the energy-momentum tensor in the Boulware vacuum state, as has been recently discussed in the literature.", "url": "https://arxiv.org/abs/2605.05903", "type": "理论", "summary": "我们探索并讨论了共形物质场的量子效应对牛顿势的修正。在这种特殊情况下，人们可以比较不同的方法，包括有效量子引力的方法和基于共形（痕量）异常的另一种方法。这两种方法的比较是本工作的主要焦点。利用异常引起的有效引力作用需要固定量子真空态，类似于黑洞蒸发的描述中所做的事情。在布尔韦尔真空状态下，我们计算异常引起的应力张量和对经典引力定律的一阶修正。以这种方式得出的对牛顿势的量子校正不同于以类似于量子引力的有效方法的方式计算的结果。调和两种方法的唯一方法是导出牛顿势的主要半经典修正，即修改布尔韦尔真空态下能量动量张量平均值的渐近行为，正如最近在文献中讨论的那样。", "authors": [{"name": "Riccardo Fecchio"}, {"name": "Ilya L. Shapiro"}], "featured_authors": [{"name": "Riccardo Fecchio"}, {"name": "Ilya L. Shapiro"}], "author_count": 2}, {"id": "2605.05916", "category": "hep-th", "title": "Squeezed Gravitons and One-Loop Self-Energy under Light-Cone Smearing", "abstract": "We investigate light-cone smearing induced by quantum fluctuations of gravitons and its implications for the ultraviolet structure of quantum field theory. By treating the first-order correction to Synge's world function as an operator, we show that the retarded Green's function is smeared by the variance of graviton fluctuations. The smearing width depends on the quantum state of gravitons: vacuum fluctuations generate a Gaussian smearing of the light cone, coherent states shift the light-cone position, and squeezed states modify the smearing width itself. We then apply the smeared Feynman propagator to one-loop self-energies in interacting scalar field theories. In both the $\\phi^3$ bubble diagram and the $\\phi^4$ tadpole diagram, the short-distance singularities responsible for the usual ultraviolet divergences are regularized by a nonzero smearing width. We also estimate the contribution from primordial gravitons generated during inflation and show that it induces a finite correction of order $10^{-10}$ to the one-loop self-energy. Our results suggest that the quantum state of gravitons can leave a finite imprint on the causal and short-distance structure of quantum field theory.", "url": "https://arxiv.org/abs/2605.05916", "type": "理论", "summary": "我们研究了由引力子的量子涨落引起的光锥涂抹及其对量子场论紫外结构的影响。通过将 Synge 世界函数的一阶修正视为算子，我们发现延迟的格林函数被引力子涨落的方差所掩盖。弥散宽度取决于引力子的量子态：真空涨落产生光锥的高斯弥散，相干态改变光锥位置，压缩态修改弥散宽度本身。然后，我们将涂抹的费曼传播器应用于相互作用标量场论中的单环自能。在 $\\phi^3$ 气泡图和 $\\phi^4$ 蝌蚪图中，导致通常紫外线发散的短距离奇点通过非零涂抹宽度进行正则化。我们还估计了暴涨期间产生的原始引力子的贡献，并表明它对单环自能产生了 $10^{-10}$ 阶的有限修正。\n\n我们的结果表明，引力子的量子态可以在量子场论的因果和短距离结构上留下有限的印记。", "authors": [{"name": "Hiroki Matsui"}], "featured_authors": [{"name": "Hiroki Matsui"}], "author_count": 1}, {"id": "2605.06001", "category": "hep-th", "title": "Ultraviolet-Finite Perturbative Expansion of Quantum Gravity at Null Infinity", "abstract": "We present a perturbative formulation of quantum gravity for asymptotically flat vacuum spacetimes based on the Null Surface Formulation (NSF), in which the expansion is ultraviolet-finite term by term up to the orders computed, without the need for renormalization. The outgoing Bondi shear operators are constructed explicitly up to fourth order, with interaction kernels determined recursively from on-shell gravitational data at null infinity. Ultraviolet finiteness at each order follows from the on-shell structure of the construction and the restriction of all integrations to the compact celestial sphere, eliminating off-shell propagators. The map between the in and out states admits a perturbative construction, and unitarity is verified explicitly up to fourth order. The outgoing operators satisfy the same commutation relations as the incoming ones, indicating that the transformation is canonical and consistent with the unitary implementation. Collinear configurations give rise to infrared singularities, as expected in massless quantum field theories, but do not affect the ultraviolet behavior established here. In coherent states, the expectation value of the shear reproduces the known finite classical graviton scattering at lowest nontrivial order. These results provide a perturbative framework for quantum gravity with improved ultraviolet behavior relative to the covariant approach.", "url": "https://arxiv.org/abs/2605.06001", "type": "理论", "summary": "我们提出了基于零表面公式（NSF）的渐近平坦真空时空的量子引力的微扰公式，其中膨胀是逐项紫外线有限的，直到计算的数量级，而不需要重整化。传出的 Bondi 剪切算子显式构造为四阶，相互作用内核根据零无穷大的壳上重力数据递归确定。每个阶次的紫外线有限性源于结构的壳上结构以及对致密天球的所有积分的限制，从而消除了壳外传播器。进出状态之间的地图承认微扰结构，并且幺正性被明确验证到四阶。传出算子满足与传入算子相同的交换关系，表明该变换是规范的并且与酉实现一致。正如无质量量子场论中所预期的那样，共线配置会产生红外奇点，但不会影响此处建立的紫外行为。\n\n在相干态中，剪切的期望值再现了最低非平凡阶的已知有限经典引力子散射。这些结果为量子引力提供了一个微扰框架，相对于协变方法，该框架具有改进的紫外行为。", "authors": [{"name": "Carlos N. Kozameh"}, {"name": "Gerardo O. Depaola"}], "featured_authors": [{"name": "Carlos N. Kozameh"}, {"name": "Gerardo O. Depaola"}], "author_count": 2}, {"id": "2605.06159", "category": "hep-th", "title": "Non-abelian field cohomology, its relation with spontaneous symmetry breaking and Morse's Theorem", "abstract": "We show that, for an $SU(2)$ gauge field (the reasoning extends trivially to $SU(N)$), spontaneous symmetry breaking changes the field cohomology. This defines a new field with cohomological properties characteristic of matter fields. Consequently, the construction of a renormalizable unitary gauge fixing, following Morse's problem of functional extremization, leads to the Gribov condition being automatically solved on-shell. This result occurs because a specific combination of fields is cohomologically matter-like and therefore free of the Gribov problem.", "url": "https://arxiv.org/abs/2605.06159", "type": "理论", "summary": "我们证明，对于 $SU(2)$ 规范场（推理可以简单地扩展到 $SU(N)$），自发对称性破缺会改变场上同调。这定义了一个具有物质场上同调特性特征的新场。因此，根据莫尔斯函数极值化问题，构造可重整的单一规范固定，导致格里波夫条件在壳上自动求解。出现这个结果是因为特定的场组合是上同调类物质的，因此不存在格里波夫问题。", "authors": [{"name": "V.E.R.Lemes"}], "featured_authors": [{"name": "V.E.R.Lemes"}], "author_count": 1}, {"id": "2605.06193", "category": "hep-th", "title": "Causal self-dual nonlinear electrodynamics from the Born-Infeld theory", "abstract": "Recently we have proposed a new auxiliary-field formulation for self-dual nonlinear electrodynamics (NLED) which makes use of two building blocks: (i) a seed self-dual theory $L(F_{\\mu\\nu};g)$, where $F_{\\mu \\nu}$ is the electromagnetic field strength and $g$ a duality-invariant coupling constant; and (ii) a scalar potential $W(\\psi)$. Our formulation is based on the Lagrangian $ \\mathfrak{L}(F_{\\mu\\nu};\\psi) = L(F_{\\mu\\nu};\\psi) + W(\\psi)$, where $\\psi$ is an auxiliary scalar field. Integrating out $\\psi$, using its equation of motion, one obtains a $\\mathsf{U}(1)$ duality-invariant NLED. Different self-dual NLEDs are derived by choosing different potentials $W(\\psi)$. In the case that the seed Lagrangian defines the Born-Infeld theory, in this paper we demonstrate that the resulting models for self-dual NLED are causal and provide a general solution of the self-duality equation. We also elaborate on the procedure to relate our formulation to that developed by Russo and Townsend.", "url": "https://arxiv.org/abs/2605.06193", "type": "理论", "summary": "最近，我们提出了一种新的自对偶非线性电动力学（NLED）辅助场公式，它利用了两个构建模块：（i）种子自对偶理论$L(F_{\\mu\\nu};g)$，其中$F_{\\mu\\nu}$是电磁场强度，$g$是对偶不变耦合常数； (ii) 标量势 $W(\\psi)$。我们的公式基于拉格朗日 $ \\mathfrak{L}(F_{\\mu\\nu};\\psi) = L(F_{\\mu\\nu};\\psi) + W(\\psi)$，其中 $\\psi$ 是辅助标量场。利用其运动方程对 $\\psi$ 进行积分，即可获得 $\\mathsf{U}(1)$ 对偶不变 NLED。通过选择不同的电势$W(\\psi)$可以得到不同的自对偶NLED。在种子拉格朗日定义了 Born-Infeld 理论的情况下，在本文中，我们证明了自对偶 NLED 的结果模型是因果的，并提供了自对偶方程的通解。我们还详细阐述了将我们的配方与 Russo 和 Townsend 开发的配方联系起来的程序。", "authors": [{"name": "Sergei M. Kuzenko"}, {"name": "Jonah Ruhl"}], "featured_authors": [{"name": "Sergei M. Kuzenko"}, {"name": "Jonah Ruhl"}], "author_count": 2}, {"id": "2605.06224", "category": "hep-th", "title": "Modular wedge localization, Majorana fields and the Tsirelson limit of the Bell-CHSH inequality", "abstract": "The massive Majorana field in $1+1$ dimension is employed to investigate the violation of the Bell-CHSH inequality in relativistic Quantum Field Theory. We give an explicit rapidity-space realization of the Summers-Werner modular-localization construction and reduce the vacuum Bell-CHSH correlator to a single spectral weight $h^2(\\omega)$ for the modular operator. The resulting analytic families approach the Tsirelson bound in the vacuum state as their spectral weight concentrates near $\\omega\\approx0$, corresponding to the eigenvalue $\\lambda^2 \\approx 1$ of the modular operator.", "url": "https://arxiv.org/abs/2605.06224", "type": "理论", "summary": "利用$1+1$维的大马约拉纳场来研究相对论量子场论中Bell-CHSH不等式的违反情况。我们给出了 Summers-Werner 模定位结构的显式快速空间实现，并将模算子的真空 Bell-CHSH 相关器减少到单个谱权重 $h^2(\\omega)$。由此产生的解析族接近真空态下的 Tsirelson 边界，因为它们的谱权重集中在 $\\omega\\approx0$ 附近，对应于模算子的特征值 $\\lambda^2 \\approx 1$。", "authors": [{"name": "J. G.A. Caribé"}, {"name": "M. S. Guimaraes"}, {"name": "I. Roditi"}, {"name": "S. P. Sorella"}], "featured_authors": [{"name": "J. G.A. Caribé"}, {"name": "M. S. Guimaraes"}, {"name": "I. Roditi"}, {"name": "S. P. Sorella"}], "author_count": 4}, {"id": "2605.06287", "category": "hep-th", "title": "Half-Spacetime Gauging of 2-Group Symmetry in 3d", "abstract": "We construct a class of non-invertible duality defects, in (2+1)d quantum field theories, arising from half-spacetime gauging of a 2-group symmetry. Starting from a parent theory with two discrete and Abelian 0-form symmetries and a prescribed mixed anomaly, we show that gauging one factor produces a theory with a 2-group symmetry, while gauging the other yields a theory with a non-invertible 0-form symmetry, whose fusion rules we derive explicitly. When the parent theory possesses three such symmetries with a cyclic anomaly structure, gauging different factors can produce mutually dual theories and the half-spacetime gauging of the 2-group is implemented by a non-invertible duality defect, whose fusion rules we obtain. We illustrate the construction with explicit examples, including a $U(1)\\times U(1)\\times U(1)$ gauge theory and a general class of product theories. We also include a self-contained pedagogical introduction to the cohomological tools employed throughout the article.", "url": "https://arxiv.org/abs/2605.06287", "type": "理论", "summary": "我们在 (2+1)d 量子场论中构造了一类不可逆对偶缺陷，这些缺陷源自 2 群对称性的半时空测量。从具有两个离散阿贝尔 0 型对称性和规定的混合异常的父理论出发，我们表明，衡量一个因素会产生具有 2 群对称性的理论，而衡量另一个因素会产生具有不可逆 0 型对称性的理论，我们明确推导了其融合规则。当母理论具有三个这样的具有循环异常结构的对称性时，衡量不同因素可以产生互对偶理论，并且2-群的半时空衡量是通过不可逆对偶缺陷实现的，我们得到了其融​​合规则。我们用明确的例子来说明这个结构，包括 $U(1)\\times U(1)\\times U(1)$ 规范理论和一类一般的乘积理论。我们还对整篇文章中使用的上同调工具进行了独立的教学介绍。", "authors": [{"name": "Davide Bason"}, {"name": "Wei Cui"}, {"name": "Lorenzo Ruggeri"}], "featured_authors": [{"name": "Davide Bason"}, {"name": "Wei Cui"}, {"name": "Lorenzo Ruggeri"}], "author_count": 3}, {"id": "2605.06379", "category": "hep-th", "title": "Systematic Extraction of Exact Yang-Mills Solutions via Algebraic Tensor Ring Decomposition", "abstract": "The non-linear nature of Yang-Mills theory presents a challenge for extracting exact classical solutions, which are useful for understanding non-perturbative vacuum structures. In this paper, an algebraic tensor ring decomposition framework is introduced to systematically map the non-linear partial differential equations (PDEs) of Yang-Mills theory into tractable differential-algebraic systems. By promoting static pure-gauge backgrounds to dynamical variables, the reference state acts as a geometric template whose Maurer-Cartan forms generate the algebraic cross-terms necessary to stabilize non-linear self-interactions. To analytically resolve the resulting differential ideals, specific differential-algebraic quotient rings are employed as evaluation tools, and the solution space is organized by an algebraic bifurcation analysis. Applying this framework, three distinct classes of exact solutions are extracted: (i) relativistic $SU(2)$ color waves evaluated over an elliptic quotient ring, where the differential ideal bifurcates into a Decoupled Branch and two Coupled Branches, the latter exhibiting mass gap generation; (ii) dynamical dyonic flux tubes obtained from a time-dependent helical template, where the Gauss law ideal bifurcates the system into Coulomb, Dyonic, and symmetric Meissner branches. In the Meissner branch, an Artinian asymptotic truncation yields Bessel-type exponential screening, stabilized by a temporal dominance condition; and (iii) dynamical $SU(3)$ configurations where the Gauss law ideal bifurcates the solution space into four distinct phases. The non-trivial branches enforce a kinetic cancellation mechanism that maps the amplitude dynamics onto a generalized $x^2y^2$ chaotic oscillator. Across these settings, the framework provides a methodical approach to characterize the classical solution space of strongly coupled gauge theories.", "url": "https://arxiv.org/abs/2605.06379", "type": "理论", "summary": "杨-米尔斯理论的非线性性质对提取精确的经典解提出了挑战，这对于理解非微扰真空结构很有用。本文引入代数张量环分解框架，将 Yang-Mills 理论的非线性偏微分方程（PDE）系统地映射到易于处理的微分代数系统。通过将静态纯规范背景提升为动态变量，参考状态充当几何模板，其毛雷尔-嘉当形式生成稳定非线性自相互作用所需的代数交叉项。为了分析求解所得的微分理想，采用特定的微分代数商环作为评估工具，并通过代数分岔分析来组织解空间。\n\n应用该框架，提取了三类不同的精确解：(i) 在椭圆商环上评估相对论性 $SU(2)$ 彩色波，其中微分理想分为一个解耦分支和两个耦合分支，后者表现出质量隙生成； (ii) 从时间相关螺旋模板获得的动态动态通量管，其中高斯定律理想将系统分为库仑分支、动态分支和对称迈斯纳分支。在迈斯纳分支中，Artinian 渐近截断产生贝塞尔型指数筛选，通过时间优势条件稳定； (iii) 动态 $SU(3)$ 配置，其中高斯定律理想将解空间分为四个不同的阶段。非平凡的分支强制执行动力学抵消机制，将振幅动力学映射到广义 $x^2y^2$ 混沌振荡器。在这些设置中，该框架提供了一种系统方法来表征强耦合规范理论的经典解空间。", "authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "featured_authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "author_count": 2}, {"id": "2605.06465", "category": "hep-th", "title": "Non-planar corrections in the symmetric orbifold", "abstract": "We calculate the non-planar corrections to the anomalous dimensions of certain quarter BPS states in the symmetric product orbifold $\\text{Sym}^N \\big({\\mathbb{T}^4}\\big)$. We find that some of the degeneracies in the spectrum for large twist $w$ and large $N$ are lifted by these contributions. We furthermore find signatures of quantum chaos, namely level repulsion and random matrix statistics. This suggests that integrability is only present in the symmetric orbifold in the planar (i.e. large $N$) limit.", "url": "https://arxiv.org/abs/2605.06465", "type": "理论", "summary": "我们计算对称积轨道 $\\text{Sym}^N \\big({\\mathbb{T}^4}\\big)$ 中某些四分之一 BPS 状态的异常尺寸的非平面校正。我们发现，大扭曲 $w$ 和大 $N$ 谱中的一些简并性被这些贡献所提升。我们还发现了量子混沌的特征，即能级排斥和随机矩阵统计。这表明可积性仅存在于平面（即大 $N$）极限的对称轨道中。", "authors": [{"name": "Matthias R. Gaberdiel"}, {"name": "Beat Nairz"}, {"name": "Cheng Peng"}], "featured_authors": [{"name": "Matthias R. Gaberdiel"}, {"name": "Beat Nairz"}, {"name": "Cheng Peng"}], "author_count": 3}, {"id": "2605.06497", "category": "hep-th", "title": "The Hagedorn Temperature as a Nonequilibrium Dynamical Bottleneck in String Thermodynamics", "abstract": "The Hagedorn regime of string theory is usually understood as an equilibrium limiting phenomenon: the exponential growth of the density of states makes the canonical partition function singular at the Hagedorn temperature, while in the microcanonical description additional energy is absorbed predominantly by highly excited long-string configurations. In this work we revisit this regime from a nonequilibrium perspective using Steepest-Entropy-Ascent Quantum Thermodynamics (SEAQT), where thermodynamic evolution is formulated directly on the state manifold and does not require a globally well-defined canonical ensemble. The inverse temperature is treated as an instantaneous, state-dependent quantity, and we derive its exact scalar evolution equation. In the commuting limit, this dynamics is controlled by higher-order fluctuation moments, showing that the Hagedorn regime may act as a dynamical bottleneck for the response of the effective intensive variable. We then extend the construction to an open-system setting through a system--reservoir splitting of the SEAQT metric and show that reservoir coupling can drive the subsystem toward effective Hagedorn slowing-down. A diagonal Hagedorn evaluation further shows that the strength of this bottleneck depends not only on the exponential density of states, but also on its algebraic prefactor. These results provide a nonequilibrium interpretation of Hagedorn behavior and suggest a connection between long-string dominance, thermodynamic slowing-down, and the breakdown of effective descriptions in quantum gravity.", "url": "https://arxiv.org/abs/2605.06497", "type": "理论", "summary": "弦理论的哈格多恩体系通常被理解为一种平衡极限现象：态密度的指数增长使得正则配分函数在哈格多恩温度下呈奇异性，而在微正则描述中，额外的能量主要被高度激发的长弦配置吸收。在这项工作中，我们使用最速熵上升量子热力学（SEAQT）从非平衡的角度重新审视这一状态，其中热力学演化直接在状态流形上制定，不需要全局明确定义的规范系综。逆温度被视为瞬时的、与状态相关的量，我们推导出其精确的标量演化方程。在通勤极限下，这种动力学由高阶涨落矩控制，表明哈格多恩状态可能充当有效强度变量响应的动力学瓶颈。然后，我们通过 SEAQT 度量的系统储层分裂将结构扩展到开放系统设置，并表明储层耦合可以驱动子系统实现有效的 Hgedorn 减速。\n\n对角哈格多恩评估进一步表明，该瓶颈的强度不仅取决于状态的指数密度，还取决于其代数前因子。这些结果提供了哈格多恩行为的非平衡解释，并表明长弦优势、热力学减速和量子引力有效描述的崩溃之间存在联系。", "authors": [{"name": "Cesar Damian"}, {"name": "Oscar Loaiza-Brito"}], "featured_authors": [{"name": "Cesar Damian"}, {"name": "Oscar Loaiza-Brito"}], "author_count": 2}, {"id": "2605.06542", "category": "hep-th", "title": "de Sitter Wavefunction from Quadrangular Polylogarithms: Chain Graphs", "abstract": "We present an explicit formula for the $n$-site chain graph contribution to the cosmological wavefunction for conformally coupled $\\phi^3$ theory in de Sitter space. Our result relies on the recent finding that the symbol of this function satisfies total compatibility with respect to the $A_{2n-2}$ cluster algebra, and that Rudenko's quadrangular polylogarithms provide, by construction, a complete basis for such functions. We prove our formula by directly relating a recursive set of differential equations satisfied by these wavefunction coefficients to a recursive coproduct formula for quadrangular polylogarithms.", "url": "https://arxiv.org/abs/2605.06542", "type": "理论", "summary": "我们提出了一个显式公式，用于说明德西特空间中共形耦合 $\\phi^3$ 理论的 $n$ 位链图对宇宙波函数的贡献。我们的结果依赖于最近的发现，即该函数的符号满足与 $A_{2n-2}$ 簇代数的完全兼容性，并且 Rudenko 的四角多对数通过构造为此类函数提供了完整的基础。我们通过将这些波函数系数满足的一组递归微分方程直接与四角多对数的递归余积公式相关来证明我们的公式。", "authors": [{"name": "Livia Ferro"}, {"name": "Tomasz Lukowski"}, {"name": "Lecheng Ren"}, {"name": "Marcus Spradlin"}, {"name": "Anastasia Volovich"}, {"name": "He-Chen Weng"}, {"name": "Yao-Qi Zhang"}], "featured_authors": [{"name": "Livia Ferro"}, {"name": "Tomasz Lukowski"}, {"name": "Lecheng Ren"}, {"name": "Anastasia Volovich"}, {"name": "He-Chen Weng"}, {"name": "Yao-Qi Zhang"}], "author_count": 7}, {"id": "2605.06550", "category": "hep-th", "title": "Hadrons in $\\mathcal{N}=2$ supersymmetric QCD from non-Abelian string on 2D black hole", "abstract": "We continue the study of non-Abelian vortex string in 4D $\\mathcal{N}=2$ supersymmetric QCD as critical superstring, and extend this analysis to $U(N)$ gauge theory with arbitrary even $N$ and $N_f=2N$ number of quarks. We introduce a special mass deformation and show that the SQCD hadron spectrum is still given by the string spectrum on the 2D $\\mathcal{N}=2$ supersymmetric black hole. We perform a cross-check by computing the multiplicity of hadronic states of the high-energy part of the spectrum both from string and field theory pictures. We also clarify the spontaneous breaking of the global flavor symmetry by VEV of the massless baryon. We finally claim, that phase diagram of $\\mathcal{N}=2$ SQCD with $N_f=2N$ consists of the Higgs phase at weak coupling and string/hadronic phase at strong coupling, separated by phase transition, and is seen as a conifold transition from string theory point of view.", "url": "https://arxiv.org/abs/2605.06550", "type": "理论", "summary": "我们继续研究 4D $\\mathcal{N}=2$ 超对称 QCD 中的非阿贝尔涡弦作为临界超弦，并将此分析扩展到具有任意偶数 $N$ 和 $N_f=2N$ 夸克数的 $U(N)$ 规范理论。我们引入了一种特殊的质量变形，并表明 SQCD 强子谱仍然由二维 $\\mathcal{N}=2$ 超对称黑洞上的弦谱给出。我们通过从弦论和场论图片计算光谱高能部分的强子态的多重性来进行交叉检查。我们还阐明了无质量重子的 VEV 对全局风味对称性的自发破缺。我们最后声称，$\\mathcal{N}=2$ SQCD 的相图（$N_f=2N$）由弱耦合时的希格斯相和强耦合时的弦/强子相组成，通过相变分开，从弦理论的角度来看，它被视为一个圆锥形过渡。", "authors": [{"name": "E. Ievlev"}, {"name": "A. Marshakov"}, {"name": "G. Sumbatian"}, {"name": "A. Yung"}], "featured_authors": [{"name": "E. Ievlev"}, {"name": "A. Marshakov"}, {"name": "G. Sumbatian"}, {"name": "A. Yung"}], "author_count": 4}, {"id": "2605.06613", "category": "hep-th", "title": "The Phases of the Scalar S-Matrix Island", "abstract": "The two-to-two four-dimensional scattering amplitude of identical scalars obeys rigorous two-sided non-perturbative bounds derived via the modern numerical S-matrix bootstrap. These bounds carve out an allowed region with a rich boundary structure, featuring edges and vertices. In this work we further tighten this region and uncover the physics of its boundary by analyzing the asymptotic Regge behavior of the amplitude and the spectrum of resonances and virtual states. We find that the S-matrices along a given edge exhibit universal behavior, sharply contrasting with that on other edges. This reveals a classification of the boundary into distinct phases, corresponding to different UV mechanisms by which a gapped scalar arises.", "url": "https://arxiv.org/abs/2605.06613", "type": "理论", "summary": "相同标量的二到二四维散射幅度遵循通过现代数值 S 矩阵自举法导出的严格两侧非微扰界限。这些边界划分出一个具有丰富边界结构的允许区域，具有边缘和顶点。在这项工作中，我们通过分析振幅以及共振谱和虚态的渐近 Regge 行为，进一步收紧该区域并揭示其边界的物理原理。我们发现沿着给定边的 S 矩阵表现出普遍的行为，与其他边上的 S 矩阵形成鲜明对比。这揭示了边界分为不同阶段的分类，对应于产生带隙标量的不同 UV 机制。", "authors": [{"name": "Joan Elias Miro"}, {"name": "Andrea Guerrieri"}, {"name": "Mehmet Asim Gumus"}], "featured_authors": [{"name": "Joan Elias Miro"}, {"name": "Andrea Guerrieri"}, {"name": "Mehmet Asim Gumus"}], "author_count": 3}, {"id": "2605.06653", "category": "hep-th", "title": "From Baby Universes to Narain Moduli: Topological Boundary Averaging in SymTFTs", "abstract": "We propose a SymTFT interpretation of ensemble averaging in low-dimensional holography. The central operation is to keep fixed both the SymTFT and the physical boundary condition, while averaging over topological boundary conditions at the other end of the SymTFT slab. Each such boundary condition gives an absolute completion of the same relative theory, so the ensemble is interpreted as an average over topological completions rather than over arbitrary local dynamics. We formulate this construction in terms of cap functionals and their natural groupoid or Haar-type measures, and illustrate it in two examples. In the closed-string sector of the Marolf--Maxfield model, topological boundary conditions are labelled by finite sets, and the groupoid sum reproduces the Poisson/Bell-polynomial moments. In the Narain case, compact topological boundary conditions of an $\\mathbb{R}$-valued BF SymTFT are identified with maximal isotropic subgroups, so that topological-boundary averaging becomes the usual Narain moduli average with Zamolodchikov measure. We also discuss possible extensions to JT gravity, random matrix theory, Virasoro T(Q)FT, and 3D gravity.", "url": "https://arxiv.org/abs/2605.06653", "type": "理论", "summary": "我们提出了低维全息中整体平均的 SymTFT 解释。中心操作是保持 SymTFT 和物理边界条件固定，同时对 SymTFT 板另一端的拓扑边界条件进行平均。每个这样的边界条件都给出了相同相对理论的绝对完成，因此系综被解释为拓扑完成的平均值，而不是任意局部动力学的平均值。我们根据帽泛函及其自然群形或哈尔型测度来制定这种结构，并用两个例子进行说明。在 Marolf-Maxfield 模型的闭弦扇区中，拓扑边界条件由有限集标记，群形和再现了泊松/贝尔多项式矩。在 Narain 情况下，$\\mathbb{R}$ 值 BF SymTFT 的紧拓扑边界条件用最大各向同性子群来识别，因此拓扑边界平均变成了通常的 Narain 模量平均与 Zamolodchikov 测度。我们还讨论了 JT 引力、随机矩阵理论、Virasoro T(Q)FT 和 3D 引力的可能扩展。", "authors": [{"name": "Xingyang Yu"}], "featured_authors": [{"name": "Xingyang Yu"}], "author_count": 1}, {"id": "2605.05398", "category": "math-ph", "title": "Equivariant 2-Poisson Algebra Bundles over Configuration Spaces", "abstract": "We study equivariant vector bundles over configuration spaces with diagonals included, viewed as orbifold quotients $M^n/\\mathfrak{S}_n$ by permutation groups. Working in the equivalent language of equivariant vector bundles, we construct an induced-equivariance functor and prove its adjunction with restriction. We then define Hadamard and Cauchy tensor products and show that they form a symmetric $2$-monoidal structure. We construct the corresponding tensor and symmetric algebra bundles and prove that, for a local vector bundle $V \\rightarrow M$, the bundle $\\mathbf{S}^{\\boxtimes} \\big( \\mathbf{S}^{\\otimes}(V) \\big)$ is the free commutative $2$-algebra generated by $V$. Finally, we show that any skew-symmetric bundle map $k : V \\boxtimes V \\rightarrow \\mathbf{I}_{\\otimes}$ induces a compatible Poisson bracket on this $2$-algebra bundle.", "url": "https://arxiv.org/abs/2605.05398", "type": "理论", "summary": "我们研究包含对角线的配置空间上的等变向量丛，通过排列组将其视为轨道商 $M^n/\\mathfrak{S}_n$ 。使用等变向量丛的等价语言，我们构造了一个诱导等变函子并证明了它的限制附加性。然后，我们定义 Hadamard 和 Cauchy 张量积，并证明它们形成对称的 $2$-monoidal 结构。我们构造相应的张量和对称代数丛，并证明，对于局部向量丛 $V \\rightarrow M$，丛 $\\mathbf{S}^{\\boxtimes} \\big( \\mathbf{S}^{\\otimes}(V) \\big)$ 是由 $V$ 生成的自由交换 $2$-代数。最后，我们证明任何斜对称丛映射 $k : V \\boxtimes V \\rightarrow \\mathbf{I}_{\\otimes}$ 在这个 $2$ 代数丛上引入一个兼容的泊松括号。", "authors": [{"name": "Hai Châu Nguyên"}], "featured_authors": [{"name": "Hai Châu Nguyên"}], "author_count": 1}, {"id": "2605.06079", "category": "math-ph", "title": "Accessory Parameter of Confluent Heun Equations, Voros Periods and classical irregular conformal blocks", "abstract": "For the Heun differential equation and all of its confluent equations, we derive formal series expansions of the accessory parameters using the Voros periods. We then compare these expansions with the classical conformal blocks recently obtained by Bonelli--Shchechkin--Tanzini, and examine the Zamolodchikov-type conjecture expected to hold between them, allowing for irregular singularities. In particular, as an extension of the previous works of Mironov--Morozov, Piatek--Pietrykowski and Lisovyy--Naidiuk, we provide a detailed prescription for choosing cycles on the spectral curve that yield the Voros period which corresponds to the classical (regular or irregular) conformal blocks through the accessory parameter.", "url": "https://arxiv.org/abs/2605.06079", "type": "理论", "summary": "对于 Heun 微分方程及其所有合流方程，我们使用 Voros 周期推导出辅助参数的形式级数展开式。然后，我们将这些展开式与 Bonelli-Shchechkin-Tanzini 最近获得的经典共角块进行比较，并检查预期在它们之间成立的 Zamolodchikov 型猜想，允许不规则奇点。特别是，作为 Mironov-Morozov、Piatek-Pietrykowski 和 Lisovyy-Naidiuk 先前作品的扩展，我们提供了在光谱曲线上选择周期的详细规定，这些周期产生通过辅助参数对应于经典（规则或不规则）共形块的 Voros 周期。", "authors": [{"name": "Kohei Iwaki"}, {"name": "Hajime Nagoya"}, {"name": "Ayato Shukuta"}], "featured_authors": [{"name": "Kohei Iwaki"}, {"name": "Hajime Nagoya"}, {"name": "Ayato Shukuta"}], "author_count": 3}, {"id": "2605.06099", "category": "math-ph", "title": "Non-relativistic limit of generalized relativistic Pauli operators by Feynman-Kac formulae", "abstract": "The non-relativistic limit of a generalized relativistic Pauli operator\\[H_c^{S,\\alpha}=\\left(2c^{\\beta}\\bigl(\\sigma\\cdot(-i\\nabla-a)\\bigr)^2+(mc^\\gamma)^{2/\\alpha}\\right)^{\\alpha/2}-mc^\\gamma+V\\]on $L^2(\\mathbb{R}^3;\\mathbb{C}^2)$ is investigated under the constraint$2\\alpha=\\gamma\\beta+\\gamma^2$.This operator generalizes the relativistic Pauli operator within the framework of Bernstein this http URL associated heat semigroup $e^{-tH_c^{S,\\alpha}}$ admits a Feynman--Kac representation involving Brownian motion, a subordinator, and a Poisson this http URL this representation, we prove that the semigroup $e^{-tH_c^{S,\\alpha}}$ converges strongly to $e^{-tH^{S,\\alpha}}$ as $c\\to\\infty$, where the limiting generator is given by\\[H^{S,\\alpha}=\\frac{\\alpha}{2m^{\\frac{2}{\\alpha}-1}}\\bigl(\\sigma\\cdot(-i\\nabla-a)\\bigr)^2+V.\\]The non-relativistic limit of a generalized relativistic Schrödinger operator is also investigated.", "url": "https://arxiv.org/abs/2605.06099", "type": "理论", "summary": "广义相对论泡利算子\\[H_c^{S,\\alpha}=\\left(2c^{\\beta}\\bigl(\\sigma\\cdot(-i\\nabla-a)\\bigr)^2+(mc^\\gamma)^{2/\\alpha}\\right)^{\\alpha/2}-mc^\\gamma+V\\]的非相对论极限$L^2(\\mathbb{R}^3;\\mathbb{C}^2)$ 在约束$2\\alpha=\\gamma\\beta+\\gamma^2$ 下进行研究。该算子在 Bernstein 框架内推广了相对论 Pauli 算子，此 http URL 相关热半群 $e^{-tH_c^{S,\\alpha}}$ 承认涉及布朗运动、从属子和泊松的 Feynman--Kac 表示这个 http URL 这个表示，我们证明半群 $e^{-tH_c^{S,\\alpha}}$ 强烈收敛到 $e^{-tH^{S,\\alpha}}$ 作为 $c\\to\\infty$，其中给出了限制生成器通过\\[H^{S,\\alpha}=\\frac{\\alpha}{2m^{\\frac{2}{\\alpha}-1}}\\bigl(\\sigma\\cdot(-i\\nabla-a)\\bigr)^2+V.\\]还研究了广义相对论薛定谔算子的非相对论极限。", "authors": [{"name": "Soichiro Sakamoto"}], "featured_authors": [{"name": "Soichiro Sakamoto"}], "author_count": 1}, {"id": "2605.06396", "category": "math-ph", "title": "Dynamical cooling driven by self-similar fronts in the 2D nonlinear Schrödinger model", "abstract": "We analyze the dynamics towards partial thermalization and subsequent cooling in the defocusing two-dimensional nonlinear Schrödinger model, using direct simulations and insights from the wave-kinetic equations (WKE) and a fourth-order differential approximation model (DAM). We show that the evolving WKE spectrum exhibits two distinct similarity ranges--the quasi-thermal core and the ultraviolet tail--whereas in the DAM, an additional range of infrared self-similarity appears. By stretching the quasi-thermal region, the self-similar fronts drive an effective dynamical cooling process towards the formal but ill-defined equilibrium state at vanishing temperature--analogous to an ultraviolet catastrophe in a system of classical waves.", "url": "https://arxiv.org/abs/2605.06396", "type": "理论", "summary": "我们利用波动力学方程 (WKE) 和四阶微分近似模型 (DAM) 的直接模拟和见解，分析了散焦二维非线性薛定谔模型中部分热化和随后冷却的动力学。我们表明，不断演变的 WKE 光谱表现出两个不同的相似范围——准热核心和紫外尾部——而在 DAM 中，出现了额外的红外自相似范围。通过拉伸准热区域，自相似前沿驱动有效的动态冷却过程，以达到消失温度下正式但不明确的平衡状态——类似于经典波系统中的紫外线灾难。", "authors": [{"name": "Jason Laurie"}, {"name": "Simon Thalabard"}, {"name": "Sergey Nazarenko"}], "featured_authors": [{"name": "Jason Laurie"}, {"name": "Simon Thalabard"}, {"name": "Sergey Nazarenko"}], "author_count": 3}, {"id": "2605.06504", "category": "math-ph", "title": "Eigenstates with Infinite Position Moments", "abstract": "We prove necessary and sufficient conditions for the Schrödinger operators to have zero-energy bound states at the threshold of the essential spectrum such that they have bounded $k$-th moment. This result is the extension of the results published in D. Hundertmark, M. Jex, and M. Lange [Forum Mathematics, Sigma 11(2023)].", "url": "https://arxiv.org/abs/2605.06504", "type": "理论", "summary": "我们证明了薛定谔算子在基本谱阈值处具有零能量束缚态的充分必要条件，使得它们具有有界 $k$-th 矩。该结果是 D. Hundertmark、M. Jex 和 M. Lange [Forum Mathematics, Sigma 11(2023)] 中发表的结果的延伸。", "authors": [{"name": "Michal Jex"}], "featured_authors": [{"name": "Michal Jex"}], "author_count": 1}, {"id": "2605.05239", "category": "quant-ph", "title": "Quantizing gravitational fields with an entropy-corrected action principle", "abstract": "A variational framework for the quantization of gravitational fields is developed based on an extension of the stationary action principle. Within this framework, the Wheeler-DeWitt equation for the gravitational wave functional is recovered without assuming operator promotion of the canonical momentum, thus avoiding the ambiguity of operator ordering in canonical quantization. The derivation is based on three main ingredients. First, motivated by information-theoretic considerations, the classical stationary action principle is generalized by incorporating a correction term constructed from the relative entropy associated with field fluctuations. Second, an ensemble formulation on superspace is enhanced to incorporate this entropy correction. Third, the formalism is further refined to provide a unified treatment of quantization and constraints, thereby addressing the long-standing ambiguity concerning the ordering of quantization and constraint reduction. The framework is then applied to gravitational fields coupled to a massless scalar field. Using an emergent time parameter defined via the rate equation of the gravitational fields, a Schrodinger equation for the scalar-field wave functional is recovered, supplemented by an additional quantum correction term suppressed at order $G\\hbar^2$. Finally, we comment on possible connections between the notion of relative entropy employed here and holographic dualities in quantum gravity.", "url": "https://arxiv.org/abs/2605.05239", "type": "理论+数值", "summary": "基于静止作用原理的扩展，开发了引力场量子化的变分框架。在此框架内，在不假设算子提升正则动量的情况下恢复了引力波泛函的Wheeler-DeWitt方程，从而避免了正则量子化中算子排序的模糊性。该推导基于三个主要成分。首先，受信息论考虑的启发，通过结合由与场涨落相关的相对熵构造的校正项来推广经典稳态作用原理。其次，增强了超空间的系综公式以纳入这种熵校正。第三，进一步细化形式主义，以提供量化和约束的统一处理，从而解决长期以来有关量化和约束减少的顺序的模糊性。然后将该框架应用于与无质量标量场耦合的引力场。\n\n使用通过引力场速率方程定义的涌现时间参数，恢复标量场波函数的薛定谔方程，并辅以抑制在 $G\\hbar^2$ 阶上的附加量子校正项。最后，我们评论这里使用的相对熵概念与量子引力中的全息对偶性之间可能的联系。", "authors": [{"name": "Jianhao M. Yang"}], "featured_authors": [{"name": "Jianhao M. Yang"}], "author_count": 1}, {"id": "2605.05268", "category": "quant-ph", "title": "Quantum Proper Scoring Rules: Minimax Estimation and Resource-Theoretic Advantages", "abstract": "We generalize proper scoring rules to the quantum domain, replacing probability distributions with density operators. We define Quantum Value Functionals via operator convex generators and establish a complete duality theory yielding proper quantum scoring rules. We derive minimax optimal bounds for quantum state tomography under McCarthy-type incentives, proving a Quantum Cramér-Rao-McCarthy Bound that explicitly links minimax risk to the curvature of the generating function and the Quantum Fisher Information. We quantify the economic value of quantum resources (coherence, entanglement, adaptivity) in forecasting tasks, establishing scaling separations between classical and quantum estimation strategies. Our results guide the design of quantum sensors, incentive-compatible quantum data markets, and robust quantum machine learning protocols.", "url": "https://arxiv.org/abs/2605.05268", "type": "理论+数值", "summary": "我们将适当的评分规则推广到量子领域，用密度算子代替概率分布。我们通过算子凸生成器定义量子值泛函，并建立完整的对偶理论，产生适当的量子评分规则。我们推导了麦卡锡型激励下量子态层析成像的极小极大最优界限，证明了量子克拉美-拉奥-麦卡锡界限，该界限明确地将极小极大风险与生成函数的曲率和量子费希尔信息联系起来。我们量化了预测任务中量子资源（相干性、纠缠性、适应性）的经济价值，建立了经典估计策略和量子估计策略之间的尺度分离。我们的研究结果指导了量子传感器、激励兼容的量子数据市场和强大的量子机器学习协议的设计。", "authors": [{"name": "M.W. AlMasri"}], "featured_authors": [{"name": "M.W. AlMasri"}], "author_count": 1}, {"id": "2605.05290", "category": "quant-ph", "title": "Krylov Dynamics and Operator Growth in Time-Dependent Systems via Lie Algebras", "abstract": "We study quantum dynamics generated by time-dependent Hamiltonians in Krylov space, the minimal subspace in which the evolution takes place. We establish a direct link between dynamics in the time-dependent Krylov subspace and the underlying Lie-algebraic structure of the Hamiltonian. We develop a general framework in which the dynamics in the time-dependent Krylov subspace is generated by ladder operators of the associated Lie algebra. In particular, we identify the minimal conditions under which the exact time-dependent Krylov dynamics is naturally determined by the interaction-picture Hamiltonian and governed by an embedded $\\mathfrak{sl}(2,\\mathbb{C})$ subalgebra. We further show that an exact single-exponential representation of the time-evolution operator gives rise to a distinct time-independent Krylov dynamics in a unitarily related basis, from which the exact time-dependent Krylov dynamics can nevertheless be recovered. We also extend the framework to the oscillator algebra as the simplest extension of the nilpotent Heisenberg--Weyl algebra, and provide further examples, including the translated and dilated harmonic oscillator, systems governed by closed Virasoro subalgebras, a spin in a rotating magnetic field, and higher-dimensional generalizations for multi-level systems. In addition, we introduce a new quantum speed limit to the complexity growth rate generated by a time-dependent generator and show that, for evolutions governed by a Lie algebra, it retains the same functional form as in the time-independent case. Remarkably, saturation of this bound is strongly affected by temporal driving and persists only when the Hamiltonian commutes with itself at different times. These results establish a unified framework for characterizing operator growth and Krylov complexity in time-dependent quantum systems with underlying Lie-algebraic structures.", "url": "https://arxiv.org/abs/2605.05290", "type": "理论+数值", "summary": "我们研究由时间相关的哈密顿量在克雷洛夫空间（演化发生的最小子空间）中产生的量子动力学。我们在时间相关的克雷洛夫子空间中的动力学与哈密顿量的基础李代数结构之间建立了直接联系。我们开发了一个通用框架，其中与时间相关的克雷洛夫子空间中的动力学由相关李代数的梯子算子生成。特别是，我们确定了精确的时间相关克雷洛夫动力学自然由交互图哈密顿量确定并由嵌入的 $\\mathfrak{sl}(2,\\mathbb{C})$ 子代数控制的最小条件。我们进一步表明，时间演化算子的​​精确单指数表示在酉相关的基础上产生了独特的时间无关的克雷洛夫动力学，从中仍然可以恢复精确的时间相关的克雷洛夫动力学。\n\n我们还将框架扩展到振子代数，作为幂零海森堡外尔代数的最简单扩展，并提供了进一步的示例，包括平移和扩张谐振子、封闭 Virasoro 子代数控制的系统、旋转磁场中的自旋以及多级系统的高维推广。此外，我们对时间相关生成器生成的复杂性增长率引入了新的量子速度限制，并表明，对于李代数控制的演化，它保留了与时间无关情况下相同的函数形式。值得注意的是，该界限的饱和度受到时间驱动的强烈影响，并且仅当哈密顿量在不同时间与自身交换时才持续存在。这些结果建立了一个统一的框架，用于表征具有底层李代数结构的时间相关量子系统中的算子增长和 Krylov 复杂性。", "authors": [{"name": "András Grabarits"}, {"name": "E. Medina-Guerra"}, {"name": "Adolfo del Campo"}], "featured_authors": [{"name": "András Grabarits"}, {"name": "E. Medina-Guerra"}, {"name": "Adolfo del Campo"}], "author_count": 3}, {"id": "2605.05299", "category": "quant-ph", "title": "Universal Neural Propagator: Learning Time Evolution in Many-Body Quantum Systems", "abstract": "Conventional approaches to simulating quantum many-body dynamics produce a single trajectory: if the Hamiltonian or the initial state is changed, the computation must be re-performed. Recent efforts toward foundation models have begun to address this limitation, yet existing methods transfer across either Hamiltonians or initial states, but not both. In this work, we introduce the Universal Neural Propagator (UNP), a single, unified model that learns the functional mapping from driving protocols to time-evolution propagators. Trained in an entirely self-supervised way, a single UNP model predicts dynamics across a function space of driving protocols and an exponentially large Hilbert space of initial states simultaneously. We benchmark on a two-dimensional driven Ising model and demonstrate the UNP's accuracy and transferability across product and entangled initial states, as well as for both in- and out-of-distribution driving protocols. The UNP remains accurate at system sizes beyond exact diagonalization, and can be efficiently fine-tuned across all initial states using observable data. By shifting the object of learning from quantum states to operators, this work opens a route toward transferable simulation of driven quantum matter.", "url": "https://arxiv.org/abs/2605.05299", "type": "理论+数值", "summary": "模拟量子多体动力学的传统方法会产生单一轨迹：如果哈密顿量或初始状态发生变化，则必须重新执行计算。最近对基础模型的努力已经开始解决这一限制，但现有方法可以跨哈密顿量或初始状态转移，但不能同时转移。在这项工作中，我们引入了通用神经传播器（UNP），这是一个单一的、统一的模型，可以学习从驱动协议到时间演化传播器的功能映射。以完全自我监督的方式进行训练，单个 UNP 模型可以同时预测驱动协议函数空间和初始状态的指数级大希尔伯特空间的动态。我们以二维驱动的 Ising 模型为基准，并展示了 UNP 在产品和纠缠初始状态以及分布内和分布外驱动协议中的准确性和可转移性。 UNP 在超出精确对角化的系统尺寸下保持准确，并且可以使用可观测数据在所有初始状态上进行有效的微调。\n\n通过将学习对象从量子态转移到算子，这项工作开辟了一条通往受驱动量子物质的可转移模拟的道路。", "authors": [{"name": "Zihao Qi"}, {"name": "Christopher Earls"}, {"name": "Yang Peng"}], "featured_authors": [{"name": "Zihao Qi"}, {"name": "Christopher Earls"}, {"name": "Yang Peng"}], "author_count": 3}, {"id": "2605.05315", "category": "quant-ph", "title": "Two Layers, No Swaps: Biplanar SPOQC Architecture Improves Runtime of Fermi-Hubbard Simulation", "abstract": "We estimate the cost of simulating the two-dimensional Fermi-Hubbard model on a biplanar spin-optical quantum computing (SPOQC) architecture. Qubits are encoded in the honeycomb Floquet code, and we use a circuit-level noise model with explicit timings for each native physical operation. We benchmark lattice surgery and magic state preparation within each plane, and transversal CNOT gates between corresponding logical qubits across planes. We compile a plaquette-based Trotterization of the time evolution operator, mapping the two spin sectors of the Fermi-Hubbard model onto two physical planes. This architectural co-design eliminates fermionic swap operations and reduces the depth of each Trotter step to $4t_{\\mathrm{synth}} + 90$ logical timesteps, where $t_\\mathrm{synth}$ is the logical timestep cost of arbitrary-angle rotations, compared to $6t_\\mathrm{synth} + 354$ in prior single-plane compilations. All error sources - algorithmic (Trotter), logical noise, magic state infidelity, and rotation synthesis - are treated jointly within a single 1% diamond norm budget. For an $L\\times L$ lattice with hopping amplitude $t$ and on-site interaction strength $U$, setting $L=8$ and $U/t=8$, we estimate a total runtime of approximately $2$ hours using $1.35\\times 10^6$ physical qubits. We find that fallback-based rotation synthesis methods become a scalability bottleneck: the probability that all $L^2$ parallel rotations succeed on the first attempt vanishes exponentially with system size, causing the failure branch to dominate the expected runtime already at moderate $L$.", "url": "https://arxiv.org/abs/2605.05315", "type": "理论+数值", "summary": "我们估计了在双平面自旋光量子计算 (SPOQC) 架构上模拟二维费米-哈伯德模型的成本。量子位以蜂窝状 Floquet 代码进行编码，我们使用电路级噪声模型，为每个本机物理操作提供明确的时序。我们对每个平面内的晶格手术和魔法状态准备以及跨平面的相应逻辑量子位之间的横向 CNOT 门进行基准测试。我们编译了一个基于板状图的时间演化算子 Trotterization，将费米-哈伯德模型的两个自旋扇区映射到两个物理平面上。这种架构协同设计消除了费米子交换操作，并将每个 Trotter 步骤的深度减少到 $4t_{\\mathrm{synth}} + 90$ 逻辑时间步长，其中 $t_\\mathrm{synth}$ 是任意角度旋转的逻辑时间步长成本，而之前单平面编译中的 $6t_\\mathrm{synth} + 354$ 则为 $6t_\\mathrm{synth} + 354$。所有错误源 - 算法 (Trotter)、逻辑噪声、魔法状态不忠和旋转合成 - 均在单个 1% 钻石范数预算内共同处理。\n\n对于具有跳跃幅度 $t$ 和现场相互作用强度 $U$ 的 $L\\times L$ 晶格，设置 $L=8$ 和 $U/t=8$，我们使用 $1.35\\times 10^6$ 物理量子位估计总运行时间约为 $2$ 小时。我们发现基于回退的旋转合成方法成为可扩展性瓶颈：所有 $L^2$ 并行旋转在第一次尝试中成功的概率随着系统规模呈指数级消失，导致失败分支在中等 $L$ 下主导预期运行时间。", "authors": [{"name": "Boris Bourdoncle"}, {"name": "Peter-Jan Derks"}, {"name": "Théo Dessertaine"}, {"name": "Johannes Frank"}], "featured_authors": [{"name": "Boris Bourdoncle"}, {"name": "Peter-Jan Derks"}, {"name": "Théo Dessertaine"}, {"name": "Johannes Frank"}], "author_count": 4}, {"id": "2605.05321", "category": "quant-ph", "title": "Analytical Angle-Finding and Series Expansions for Quantum Signal Processing via Orthogonal Polynomial Theory", "abstract": "Quantum signal processing is a powerful framework in quantum algorithms, playing a central role in Hamiltonian simulation and related applications. The sequence of polynomials implemented at each step of this protocol provides a polynomial basis for block-encoding any polynomial of a unitary. We characterize the achievable polynomial bases in terms of their orthogonality or biorthogonality with respect to a linear functional admitting an integral representation. Explicit expressions for the quantum signal processing angles are derived for families of polynomial sequences, including Hermite, Jacobi, and Rogers-Szegő polynomials. We show that $2n+2$ rotation angles are required to encode a sequence of polynomials in these classes up to degree $n$. We use this result to show that an $\\epsilon$-approximation of a smooth function $f$ can be block-encoded using $O(\\log(1/\\epsilon))$ gates via its Hermite series expansion. The connections established with the theory of orthogonal and biorthogonal polynomials lead to a new method for solving the quantum signal processing angle-finding problem, yielding explicit expressions for the angles. They also provide a complete characterization of the polynomials achievable by $\\mathrm{SU}(1,1)$-QSP in terms of their roots. Biorthogonality properties are shown to hold in the bivariate QSP setting, yielding a set of necessary conditions for achievable polynomials.", "url": "https://arxiv.org/abs/2605.05321", "type": "理论+数值", "summary": "量子信号处理是量子算法中的强大框架，在哈密顿模拟和相关应用中发挥着核心作用。在该协议的每个步骤中实现的多项式序列为对任何酉多项式进行块编码提供了多项式基础。我们根据相对于允许积分表示的线性函数的正交性或双正交性来描述可实现的多项式基。针对多项式序列族导出了量子信号处理角度的显式表达式，包括 Hermite、Jacobi 和 Rogers-Szegő 多项式。我们证明需要 $2n+2$ 旋转角度来编码这些类别中高达 $n$ 次的多项式序列。我们使用这个结果来表明平滑函数 $f$ 的 $\\epsilon$ 近似可以通过其 Hermite 级数展开使用 $O(\\log(1/\\epsilon))$ 门进行块编码。与正交和双正交多项式理论建立的联系带来了一种解决量子信号处理寻角问题的新方法，产生角度的显式表达式。\n\n它们还提供了 $\\mathrm{SU}(1,1)$-QSP 可通过其根实现的多项式的完整表征。双变量 QSP 设置显示了双正交性属性，从而产生了可实现多项式的一组必要条件。", "authors": [{"name": "Pierre-Antoine Bernard"}, {"name": "Nathan Wiebe"}], "featured_authors": [{"name": "Pierre-Antoine Bernard"}, {"name": "Nathan Wiebe"}], "author_count": 2}, {"id": "2605.05335", "category": "quant-ph", "title": "Geometric and Topological Obstructions to Hermitianization in Quasi-Hermitian Quantum Systems", "abstract": "Quasi-Hermitian quantum systems, including $\\mathcal{PT}$-symmetric ones, can be mapped to equivalent Hermitian systems via a similarity transformation that redefines the inner product with a positive-definite metric operator. Although an instantaneous algebraic Hermitianization can be obtained locally from a positive metric operator, a stronger requirement is needed for dynamical equivalence: the similarity transformation must be proper, globally single-valued, and compatible with the modified quasi-Hermitian Schrodinger equation. We identify two distinct obstructions: geometric obstructions arising from the curvature of a metric-induced connection, and topological obstructions originating from non-trivial holonomies around non-contractible loops in parameter space. We derive explicit criteria for these obstructions and illustrate them with concrete examples. Our results establish a geometric and topological foundation for the Hermitianization of quasi-Hermitian systems, clarifying when they can be globally reduced to Hermitian ones and when intrinsic non-Hermitian features persist.", "url": "https://arxiv.org/abs/2605.05335", "type": "理论", "summary": "准厄米量子系统，包括 $\\mathcal{PT}$ 对称系统，可以通过相似变换映射到等效的厄米系统，该相似变换使用正定度量算子重新定义内积。虽然瞬时代数埃尔米特化可以从正度量算子局部获得，但对动态等价性有更强的要求：相似变换必须是适当的、全局单值的，并且与修正的拟埃尔米特薛定谔方程兼容。我们识别出两种不同的障碍：由度量引起的连接的曲率产生的几何障碍，以及源自参数空间中不可收缩环周围的非平凡完整的拓扑障碍。我们为这些障碍得出明确的标准，并用具体的例子来说明它们。我们的结果为准厄米系统的厄米化奠定了几何和拓扑基础，阐明了何时可以将它们全局简化为厄米系统以及何时持续存在内在的非厄米特征。", "authors": [{"name": "Ming-Zhang Wang"}, {"name": "Xu-Yang Hou"}, {"name": "Hao Guo"}], "featured_authors": [{"name": "Ming-Zhang Wang"}, {"name": "Xu-Yang Hou"}, {"name": "Hao Guo"}], "author_count": 3}, {"id": "2605.05337", "category": "quant-ph", "title": "Efficient Quantum Fourier Transforms For Semisimple Algebras", "abstract": "The quantum Fourier transform (QFT) is a fundamental primitive in quantum computation and quantum information. In this work, we generalize the QFT for finite groups to a QFT for finite-dimensional semisimple algebras, and give efficient quantum Fourier transforms for the partition algebra $P_n(d)$, Brauer algebra $B_n(d)$, and walled Brauer algebra $B_{r,s}(d)$. These algebras play important roles in generalized Schur-Weyl duality, statistical physics and many-body systems, and have recently found several applications in quantum algorithms. Unlike the group case, the Fourier transform over a semisimple algebra can be non-unitary. Nevertheless, we show that when the parameter $d$ is sufficiently large, the Fourier transform is well approximated by a unitary operator. Furthermore, we show that for each of the algebras $A$ from above, such an approximate Fourier transform can be implemented efficiently: we give a quantum algorithm with gate complexity $\\mathrm{poly}(n,\\log d,\\log(1/\\varepsilon))$ for approximating the Fourier transform to error $(d^{-1/2} + \\varepsilon) \\cdot \\mathrm{poly}(|A|)$. Along the way, we establish several properties of the Fourier basis of semisimple algebras that may be of independent interest.", "url": "https://arxiv.org/abs/2605.05337", "type": "理论+数值", "summary": "量子傅里叶变换（QFT）是量子计算和量子信息中的基本原语。在这项工作中，我们将有限群的 QFT 推广到有限维半简单代数的 QFT，并给出分区代数 $P_n(d)$、布劳尔代数 $B_n(d)$ 和壁布劳尔代数 $B_{r,s}(d)$ 的高效量子傅里叶变换。这些代数在广义 Schur-Weyl 对偶性、统计物理和多体系统中发挥着重要作用，并且最近在量子算法中发现了一些应用。与群情况不同，半简单代数上的傅立叶变换可以是非酉的。尽管如此，我们表明，当参数 $d$ 足够大时，傅立叶变换可以很好地由酉算子近似。此外，我们表明，对于上面的每个代数 $A$，可以有效地实现这样的近似傅里叶变换：我们给出了一个门复杂度为 $\\mathrm{poly}(n,\\log d,\\log(1/\\varepsilon))$ 的量子算法，用于将傅里叶变换逼近到误差 $(d^{-1/2} + \\varepsilon) \\cdot \\mathrm{poly}(|A|)$。\n\n在此过程中，我们建立了半简单代数傅立叶基的几个性质，这些性质可能具有独立的意义。", "authors": [{"name": "Ben Foxman"}, {"name": "Barak Nehoran"}, {"name": "Yongshan Ding"}], "featured_authors": [{"name": "Ben Foxman"}, {"name": "Barak Nehoran"}, {"name": "Yongshan Ding"}], "author_count": 3}, {"id": "2605.05347", "category": "quant-ph", "title": "The true cost of factoring: Linking magic and number-theoretic complexity in Shor's algorithm", "abstract": "The execution cost of quantum algorithms is typically quantified through asymptotic gate counts and qubit register sizes, yet these metrics do not directly capture which genuinely quantum resources, and in what amount, must be created and maintained for the computation to succeed. The systematic quantification of such information-theoretic requirements in quantum computing protocols remains an extremely challenging open problem, despite their direct role in establishing quantum advantage. To address this gap, we investigate the generation of non-stabilizerness (or magic), one of the key resources, in the paradigmatic Shor's factoring algorithm, revealing a deep connection between intrinsic quantum complexity and the computational hardness of the underlying number-theoretic problem. By developing an explicit analytic theory, we demonstrate the fundamental role of magic in the successful execution of the algorithm, and show that Shor's routine maximally exploits the quantum resource in practically relevant regimes. Our findings create a concise conceptual link between the classical algorithmic difficulty of a task and the non-stabilizer price to solve it on quantum hardware, complementing standard circuit-cost analyses with a resource-based metric that is naturally aligned with the real bottlenecks of fault-tolerant quantum computing.", "url": "https://arxiv.org/abs/2605.05347", "type": "理论+数值", "summary": "量子算法的执行成本通常通过渐近门计数和量子位寄存器大小来量化，但这些指标并不能直接捕获必须创建和维护哪些真正的量子资源以及数量，才能使计算成功。量子计算协议中此类信息论要求的系统量化仍然是一个极具挑战性的开放问题，尽管它们在建立量子优势方面发挥着直接作用。为了解决这一差距，我们研究了范式肖尔因式分解算法中关键资源之一的非稳定性（或魔力）的生成，揭示了内在量子复杂性与潜在数论问题的计算难度之间的深层联系。通过发展明确的分析理论，我们证明了魔法在算法成功执行中的基本作用，并表明 Shor 的例程在实际相关的情况下最大限度地利用了量子资源。\n\n我们的研究结果在任务的经典算法难度和在量子硬件上解决该问题的非稳定器价格之间建立了简洁的概念联系，用基于资源的指标补充了标准电路成本分析，该指标自然与容错量子计算的真正瓶颈保持一致。", "authors": [{"name": "Alessio Paviglianiti"}, {"name": "Matteo Seclì"}, {"name": "Emanuele Tirrito"}, {"name": "Vincenzo Savona"}], "featured_authors": [{"name": "Alessio Paviglianiti"}, {"name": "Matteo Seclì"}, {"name": "Emanuele Tirrito"}, {"name": "Vincenzo Savona"
