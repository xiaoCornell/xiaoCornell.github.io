  <script>
    const papers = [{"id": "2605.05288", "category": "cond-mat", "title": "Charge Scrambling in Strong-to-Weak Spontaneous Symmetry Breaking", "abstract": "Strong-to-weak spontaneous symmetry breaking (SWSSB) is diagnosed by nonlinear correlators, but its direct static implication for conserved charge fluctuations is not automatic. We show that, for continuous symmetries, long-range Rényi-1 correlator, together with a sufficiently rapid approach to its nonzero asymptotic value, forces subsystem charge indefiniteness: the block-charge variance has an extensive lower bound; equivalently, the truncated symmetry expectation has extensive curvature. This gives a precise static fluctuation footprint of charge scrambling. We construct examples to show that the implication is conditional and non-reversible: dephased superfluids retain Rényi-1 SWSSB with subextensive charge variance when the Rényi-1 tail is too slow, while sparse fixed-charge projectors have extensive charge variance but no local charge-transfer Rényi-1 order or long-range conditional mutual information. Finally, we introduce a \\emph{twist overlap} correlator, which serves as an analogue of charge variance applicable to both discrete and continuous symmetries. This naturally decomposes local block-charge fluctuations into strong- and weak-symmetry channels. We found that the weak-symmetry channel isolates coherent charge fluctuations and is directly related to the Wigner--Yanase skew information. Taken together, these results give a unified understanding for distinguishing nonlinear SWSSB order, local charge indefiniteness, and coherent charge fluctuations.", "url": "https://arxiv.org/abs/2605.05288", "type": "理论", "summary": "强弱自发对称破缺（SWSSB）是通过非线性相关器来诊断的，但它对守恒电荷涨落的直接静态影响并不是自动的。我们证明，对于连续对称性，长程 Rényi-1 相关器以及对其非零渐近值的足够快速的逼近，迫使子系统电荷不确定：块电荷方差具有广泛的下界；等价地，截断的对称期望具有广泛的曲率。这给出了电荷扰乱的精确静态波动足迹。我们构造了例子来证明其含义是有条件且不可逆的：当 Rényi-1 尾部太慢时，相移超流体保留具有次广泛电荷方差的 Rényi-1 SWSSB，而稀疏固定电荷投影仪具有广泛的电荷方差，但没有局部电荷转移 Rényi-1 阶或远程条件互信息。最后，我们引入一个\\emph{扭曲重叠}相关器，它作为电荷方差的模拟，适用于离散和连续对称性。这自然地将局部块电荷波动分解为强对称通道和弱对称通道。\n\n我们发现弱对称通道隔离了相干电荷波动，并且与 Wigner-Yanase 偏斜信息直接相关。总而言之，这些结果为区分非线性 SWSSB 阶次、局域电荷不确定性和相干电荷涨落提供了统一的理解。", "authors": [{"name": "Jong Yeon Lee"}], "featured_authors": [{"name": "Jong Yeon Lee"}], "author_count": 1}, {"id": "2605.05294", "category": "cond-mat", "title": "Competing nonlinearities, criticality, and order-to-chaos transition in deep networks", "abstract": "Deep neural networks owe their expressive power to nonlinear activation functions. The effective field theory of signal propagation at initialization reveals a few distinct universality classes of activations that exhibit different depth scaling. Tuning across these, especially with analytical control, is an open problem. We show that a statistical mixture of activations, where each neuron independently and randomly draws its activation from a two-component distribution with mixing fraction $p$, provides a new mechanism for a continuous phase transition. Applied to a mixture of Tanh and Swish, the transition is sharp in the depth scaling of the preactivation variance, separating a variance-collapsing from a variance-inflating phase; at $p_c$, the network acquires statistical scale invariance, with depth-independent variance, without sacrificing smoothness. This resolves a longstanding tension, where scale-invariant propagation has previously required the non-smooth ReLU family, rendering such networks ill-suited to curvature-based optimizers, physics-informed architectures, and neural-network quantum states. We corroborate the transition through variance propagation, parallel and perpendicular susceptibilities, and Lyapunov exponents. Training multilayer perceptrons on real datasets reveals non-monotonic test performance as a function of $p$, with an optimum near the theoretically predicted $p_c$, confirming that the initialization-level transition has direct consequences for learned representations. The quenched activation disorder acts as a structural regularizer, suppressing memorization of corrupted labels while preserving generalization. Our framework establishes statistical activation mixtures as a controlled tool for navigating the phase diagram of deep network universality classes.", "url": "https://arxiv.org/abs/2605.05294", "type": "理论+数值", "summary": "深度神经网络的表达能力归功于非线性激活函数。初始化时信号传播的有效场论揭示了一些不同的激活的普遍性类别，这些激活表现出不同的深度缩放。调整这些，特别是分析控制，是一个悬而未决的问题。我们证明了激活的统计混合，其中每个神经元独立且随机地从具有混合分数 $p$ 的二元分布中提取其激活，为连续相变提供了一种新机制。应用于 Tanh 和 Swish 的混合时，预激活方差的深度缩放中的过渡是急剧的，将方差崩溃与方差膨胀阶段分开；在 $p_c$ 处，网络获得统计尺度不变性，具有与深度无关的方差，且不牺牲平滑度。这解决了一个长期存在的矛盾，即尺度不变传播以前需要非平滑 ReLU 系列，使得此类网络不适合基于曲率的优化器、物理信息架构和神经网络量子态。\n\n我们通过方差传播、平行和垂直磁化率以及李亚普诺夫指数证实了转变。在真实数据集上训练多层感知器揭示了作为 $p$ 函数的非单调测试性能，最佳值接近理论预测的 $p_c$，证实初始化级别转换对学习表示有直接影响。猝灭的激活紊乱充当结构正则化器，抑制对损坏标签的记忆，同时保持泛化。我们的框架将统计激活混合物建立为一种受控工具，用于导航深层网络普遍性类的相图。", "authors": [{"name": "Omri Lesser"}, {"name": "Debanjan Chowdhury"}], "featured_authors": [{"name": "Omri Lesser"}, {"name": "Debanjan Chowdhury"}], "author_count": 2}, {"id": "2605.05316", "category": "cond-mat", "title": "Light-Induced Even-Wave Spin Splittings in Nonmagnetic Centrosymmetric Systems with Spin-Orbit Coupling", "abstract": "Spin splitting underpins a vast range of spin-dependent phenomena. Traditionally, two primary mechanisms generate such splitting: relativistic spin-orbit coupling (SOC) and nonrelativistic magnetic exchange coupling (MEC). Governed by distinct symmetry constraints, they produce splittings of opposite parity -- odd for SOC and even for MEC -- a dichotomy that underpins the distinct spin physics of nonmagnetic and magnetic systems. In this work, we break this dichotomy by demonstrating the dynamic generation of even-parity spin splitting in centrosymmetric, nonmagnetic systems driven by circularly polarized light. We show that the symmetry of the induced splitting is controlled by the angular character of the underlying orbitals, enabling the realization of s-wave, d-wave, and g-wave spin-split band structures identical to those of ferromagnets and altermagnets. Furthermore, we find that these spin-split bands can naturally host a Chern insulator phase. We also discuss the associated spin and orbital magnetization. Our results establish a direct and previously unrecognized conceptual link between the two fundamental mechanisms of spin splitting.", "url": "https://arxiv.org/abs/2605.05316", "type": "理论", "summary": "自旋分裂是大量自旋相关现象的基础。传统上，两种主要机制会产生这种分裂：相对论自旋轨道耦合（SOC）和非相对论磁交换耦合（MEC）。在不同的对称性约束下，它们会产生相反宇称的分裂——对于 SOC 来说是奇数，对于 MEC 来说是偶数——这种二分法支撑着非磁性和磁性系统的独特自旋物理。在这项工作中，我们通过演示在圆偏振光驱动的中心对称非磁性系统中动态生成偶宇称自旋分裂来打破这种二分法。我们表明，诱导分裂的对称性是由底层轨道的角度特征控制的，从而能够实现与铁磁体和交流磁体相同的 s 波、d 波和 g 波自旋分裂能带结构。此外，我们发现这些自旋分裂带可以自然地容纳陈绝缘体相。我们还讨论了相关的自旋和轨道磁化强度。我们的结果在自旋分裂的两种基本机制之间建立了直接且先前未被认识的概念联系。", "authors": [{"name": "Xiao-Jiao Wang"}, {"name": "Dongling Liu"}, {"name": "Di Zhu"}, {"name": "Zheng-Yang Zhuang"}, {"name": "Zhongbo Yan"}], "featured_authors": [{"name": "Xiao-Jiao Wang"}, {"name": "Dongling Liu"}, {"name": "Di Zhu"}, {"name": "Zheng-Yang Zhuang"}, {"name": "Zhongbo Yan"}], "author_count": 5}, {"id": "2605.05345", "category": "cond-mat", "title": "Squeezed Vibrational States in Superfluid Helium", "abstract": "Ultrafast birefringence oscillations observed in superfluid helium provide evidence for anisotropic quantum squeezing of quasiparticle pairs. The measured response is a superposition of contributions from all vibrational modes, with dominant contributions from rotons, maxons, and Pitaevskii's plateau. The nonzero initial phase follows naturally from multimode interference.", "url": "https://arxiv.org/abs/2605.05345", "type": "理论", "summary": "在超流氦中观察到的超快双折射振荡为准粒子对的各向异性量子压缩提供了证据。测量到的响应是所有振动模式贡献的叠加，其中主要贡献来自旋子、麦克振和皮塔耶夫斯基平台。非零初始相位自然地来自多模干扰。", "authors": [{"name": "Lev A. Melnikovsky"}], "featured_authors": [{"name": "Lev A. Melnikovsky"}], "author_count": 1}, {"id": "2605.05364", "category": "cond-mat", "title": "Structural effects of liquid infiltration of 3Y-Zirconia with Sc, Mg and Y", "abstract": "The current work has investigated the effect of co-doping 3Y-Zirconia (3YSZ) with Sc, Mg and Y by wet infiltration. Pre-sintered discs of 3YSZ were immersed in diluted nitric acid solutions containing Sc, Mg or Y, and combinations of the three, trapping liquid within the porosities of the samples. Upon drying, the cations are maintained inside the pellet, making the basis for the co-doping. After sintering, mass increase confirms the co-doping effect and X-ray diffraction analysis show clear variations in atomic structure depending on the doping element. Rietveld refinements show that the wet-infiltrated samples contain the tetragonal t, t double prime and cubic c-phase in various fractions depending on the doping elements. Sc-infiltrated samples show a tendency to higher tetragonality, while the Mg-infiltrated sample obtained a single cubic phase. The multi-phase wet-infiltrated samples have a similar phase separation after sintering as 5Y-Zirconia (5YSZ), as calculated by the tetragonality deviation parameter. 3YSZ and 5YSZ sintered for 0 hours and 2 hours at 1500 degrees C show the effect of sintering time on the phase segregation. To evaluate the material properties in an application-based perspective, the Knoop hardness, translucency and grain size was measured. We conclude that liquid infiltration is a viable route to perform co-doping of Zirconia with various co-doping elements.", "url": "https://arxiv.org/abs/2605.05364", "type": "数值", "summary": "目前的工作通过湿法渗透研究了 3Y-氧化锆 (3YSZ) 与 Sc、Mg 和 Y 的共掺杂效果。将 3YSZ 预烧结圆盘浸入含有 Sc、Mg 或 Y 以及三者组合的稀硝酸溶液中，将液体捕获在样品的孔隙内。干燥后，阳离子保留在颗粒内部，为共掺杂奠定了基础。烧结后，质量增加证实了共掺杂效应，X 射线衍射分析显示原子结构随掺杂元素的不同而发生明显变化。 Rietveld 改进表明，湿法渗透样品含有不同比例的四方 t、t 双素相和立方 c 相，具体取决于掺杂元素。 Sc 渗透的样品显示出更高的四方相的趋势，而 Mg 渗透的样品则获得了单一的立方相。根据四方性偏差参数计算，多相湿法渗透样品在烧结后具有与 5Y-氧化锆 (5YSZ) 类似的相分离。 3YSZ和5YSZ在1500℃下烧结0小时和2小时显示了烧结时间对相偏析的影响。\n\n为了从基于应用的角度评估材料特性，测量了努氏硬度、半透明度和晶粒尺寸。我们得出的结论是，液体渗透是氧化锆与各种共掺杂元素共掺杂的可行途径。", "authors": [{"name": "Asbjoern Slagtern Fjellvaag"}, {"name": "Oystein Slagtern Fjellvaag"}, {"name": "Amund Ruud"}], "featured_authors": [{"name": "Asbjoern Slagtern Fjellvaag"}, {"name": "Oystein Slagtern Fjellvaag"}, {"name": "Amund Ruud"}], "author_count": 3}, {"id": "2605.05366", "category": "cond-mat", "title": "Frustrated Fields: Statistical Field Theory for Frustrated Brownian Particles on 2D Manifolds", "abstract": "We develop a statistical field theory that describes the large-N limit of a system of Brownian particles with quenched random pairwise interactions on a compact two-dimensional Riemannian manifold. The resulting Frustrated Fields (F2) model is a non-linear field theory for a smooth self-interacting density field $\\rho$ on the manifold, with local and non-local (in space and time) self-interactions characteristic of spin-glass dynamics. Particle simulations show \\emph{adiabatic dimension reduction}: on $S^2$, the density concentrates on a slowly precessing great-circle ring whose orientation is a director ($\\hat{\\mathbf{n}} \\sim -\\hat{\\mathbf{n}}$, even profile). Conditioned on this simulation-supported ring saddle and on a Born-Oppenheimer separation between the slow orientation and the gapped density fluctuations, symmetry fixes the low-energy dynamics to be the nonlinear sigma model (NLSM) on the real projective plane $S^2/\\mathbb{Z}_2 = \\mathbb{RP}^2$ (the $\\mathbb{RP}^2$ NLSM on the projective rotor space) in $(0+1)$ dimensions, governed by a single low-energy constant, the rotational diffusion coefficient $D_{\\text{rot}}$. With $D_{\\text{rot}}$ and the static ring profile $f_0$ measured from particle simulations, the resulting effective theory reproduces multiple independent orientation- and density-sector diagnostics with no further adjustable parameters.", "url": "https://arxiv.org/abs/2605.05366", "type": "理论+数值", "summary": "我们开发了一种统计场论，描述了在紧致二维黎曼流形上具有淬火随机成对相互作用的布朗粒子系统的大 N 极限。由此产生的受抑场 (F2) 模型是流形上平滑自相互作用密度场 $\\rho$ 的非线性场论，具有自旋玻璃动力学的局部和非局部（在空间和时间上）自相互作用特征。粒子模拟显示 \\emph{绝热降维}：在 $S^2$ 上，密度集中在一个缓慢进动的大圆环上，其方向为指向矢（$\\hat{\\mathbf{n}} \\sim -\\hat{\\mathbf{n}}$，偶轮廓）。以该模拟支持的环鞍以及慢速方向和带隙密度涨落之间的玻恩-奥本海默分离为条件，对称性将低能动力学固定为实际射影平面 $S^2/\\mathbb{Z}_2 = \\mathbb{RP}^2$ （射影转子空间上的 $\\mathbb{RP}^2$ NLSM） $(0+1)$ 上的非线性 sigma 模型 (NLSM)维度，由单个低能量常数旋转扩散系数 $D_{\\text{rot}}$ 控制。\n\n通过 $D_{\\text{rot}}$ 和通过粒子模拟测量的静环轮廓 $f_0$，所得的有效理论再现了多个独立的方向和密度扇区诊断，无需进一步调整参数。", "authors": [{"name": "Igor Halperin"}], "featured_authors": [{"name": "Igor Halperin"}], "author_count": 1}, {"id": "2605.05423", "category": "cond-mat", "title": "Band Unfolding via the Quadratic Pseudospectrum", "abstract": "Band theory provides the foundation for understanding electronic structure in crystalline materials, but its reliance on exact translational symmetry limits its applicability to systems with defects, disorder, incommensurate modulations, or large unit cells. Here, we introduce a band unfolding framework that directly generalizes traditional band theory to systems where exact periodicity is absent, and which remains well-defined for both aperiodic and finite systems. To do so, we employ a pseudospectral approach to identify approximate joint eigenvectors of a system's Hamiltonian and translation operators, thereby yielding an unfolded band structure whose features are directly connected to the manifestation of approximate extended states simultaneously localized in energy and crystalline momentum. To reveal bulk-only spectral phenomena in finite systems, we further show that this pseudospectral framework naturally accommodates additional operators that suppress contributions from boundary-localized states, enabling the systematic isolation of intrinsic bulk behavior. We benchmark the scheme on several representative systems in one and two dimensions, including a Fibonacci chain, where our approach is able to both reveal a dispersive envelope while preserving the underlying hierarchy of spectral gaps. Looking forward, this pseudospectral approach may yield a broad framework for predicting momentum-resolved material responses in aperiodic, disordered, and finite systems where conventional band-theoretic methods are not applicable.", "url": "https://arxiv.org/abs/2605.05423", "type": "理论+数值", "summary": "能带理论为理解晶体材料中的电子结构提供了基础，但它对精确平移对称性的依赖限制了它对具有缺陷、无序、不相称调制或大晶胞的系统的适用性。在这里，我们引入了一个能带展开框架，该框架直接将传统能带理论推广到不存在精确周期性的系统，并且对于非周期和有限系统仍然有明确的定义。为此，我们采用伪谱方法来识别系统哈密顿量和平移算子的近似联合特征向量，从而产生展开的能带结构，其特征直接与同时位于能量和晶体动量中的近似扩展态的表现相关。为了揭示有限系统中的仅体谱现象，我们进一步表明，这种伪谱框架自然地容纳了额外的算子，这些算子抑制了边界局域态的贡献，从而实现了固有体行为的系统隔离。\n\n我们在一维和二维的几个代表性系统（包括斐波那契链）上对该方案进行了基准测试，我们的方法能够揭示色散包络，同时保留光谱间隙的底层层次结构。展望未来，这种伪谱方法可能会产生一个广泛的框架，用于预测传统能带理论方法不适用的非周期、无序和有限系统中的动量分辨材料响应。", "authors": [{"name": "Christopher A. Bairnsfather"}, {"name": "Ralph M. Kaufmann"}, {"name": "Terry A. Loring"}, {"name": "Alexander Cerjan"}], "featured_authors": [{"name": "Christopher A. Bairnsfather"}, {"name": "Ralph M. Kaufmann"}, {"name": "Terry A. Loring"}, {"name": "Alexander Cerjan"}], "author_count": 4}, {"id": "2605.05445", "category": "cond-mat", "title": "Resonance Proliferation Across Localization Transitions", "abstract": "Models of many-body localization (MBL) exhibit slow numerical drifts towards delocalization with increasing system size, for which no satisfactory theory exists. Numerics indicates that these drifts are driven by the proliferation of many-body resonances at intermediate disorder strengths. We develop a statistical method to predict the distribution of resonance oscillation frequencies which captures how the formation of resonances at larger frequency scales subsequently affects the formation of resonances at lower frequencies. Working within the statistical Jacobi approximation (SJA), we derive a flow equation for a power-law exponent $\\theta(w)$ characterizing the density of resonances at frequency scale $w$. A localized phase is described by a line of fixed points with $\\theta(w)>0$, while an instability of the flow signals resonance proliferation and the onset of thermalization. The predicted $\\theta(w)$ matches numerics on the Anderson model on random regular graphs and the Lévy-Rosenzweig-Porter random matrix ensemble, both of which host resonance-driven delocalization transitions. We further connect the flow to eigenstate properties such as the participation ratio and to dynamical observables such as the return probability. The predicted $\\theta(w)$ also matches what is numerically measured in real-space models of MBL at intermediate disorder strengths, representing a significant step towards explaining the finite-size drifts observed in MBL.", "url": "https://arxiv.org/abs/2605.05445", "type": "理论+数值", "summary": "随着系统尺寸的增加，多体定位（MBL）模型表现出缓慢的离域数值漂移，对此尚不存在令人满意的理论。数值表明这些漂移是由中等无序强度的多体共振的扩散驱动的。我们开发了一种统计方法来预测共振振荡频率的分布，该方法捕获较大频率范围内共振的形成如何影响较低频率共振的形成。在统计雅可比近似 (SJA) 内，我们推导出幂律指数 $\\theta(w)$ 的流动方程，表征频率尺度 $w$ 上的共振密度。局部相由 $\\theta(w)>0$ 的固定点线描述，而流动信号的不稳定性则表示共振扩散和热化的开始。预测的 $\\theta(w)$ 与随机正则图上的 Anderson 模型和 Lévy-Rosenzweig-Porter 随机矩阵系综上的数字相匹配，两者都承载共振驱动的离域转变。\n\n我们进一步将流与本征态属性（例如参与率）和动态可观测量（例如返回概率）联系起来。预测的 $\\theta(w)$ 也与在中等无序强度的 MBL 实空间模型中数值测量的结果相匹配，这代表着在解释 MBL 中观察到的有限尺寸漂移方面迈出了重要一步。", "authors": [{"name": "Carlo Vanoni"}, {"name": "David M. Long"}, {"name": "Anushya Chandran"}], "featured_authors": [{"name": "Carlo Vanoni"}, {"name": "David M. Long"}, {"name": "Anushya Chandran"}], "author_count": 3}, {"id": "2605.05448", "category": "cond-mat", "title": "Breakdown of Emergent Chiral Order and Defect Chaos in Nonreciprocal Flocks", "abstract": "We show that chiral order in two-dimensional nonreciprocal flocking mixtures is generically unstable. Combining large-scale agent-based simulations with a coarse-grained continuum description, we demonstrate that rotating chiral states emerging from antisymmetric couplings are destroyed by the proliferation of topological defects. The resulting dynamics is spatiotemporally chaotic and characterized by a finite correlation length that diverges as nonreciprocity vanishes. On length scales below this cutoff, density and orientational order fluctuations remain scale-free, but the associated scaling exhibits nonuniversal exponents. We attribute this atypical behavior to the coupling between density and order, which causes topological defects to act as persistent sources of nonlinear fluctuations.", "url": "https://arxiv.org/abs/2605.05448", "type": "理论+数值", "summary": "我们表明，二维非互易植绒混合物中的手性顺序通常是不稳定的。将大规模基于主体的模拟与粗粒度连续描述相结合，我们证明了反对称耦合中出现的旋转手性态会被拓扑缺陷的扩散破坏。由此产生的动力学是时空混沌的，其特征是有限的相关长度，随着非互易性的消失而发散。在低于该截止值的长度尺度上，密度和取向顺序波动保持无标度，但相关的标度表现出非通用指数。我们将这种非典型行为归因于密度和有序之间的耦合，这导致拓扑缺陷成为非线性波动的持久源。", "authors": [{"name": "Charlotte Myin"}, {"name": "Suropriya Saha"}, {"name": "Benoît Mahault"}], "featured_authors": [{"name": "Charlotte Myin"}, {"name": "Suropriya Saha"}, {"name": "Benoît Mahault"}], "author_count": 3}, {"id": "2605.05504", "category": "cond-mat", "title": "Exact theory of plasmon reflection and transmission in partially gated two-dimensional system", "abstract": "We develop an exact theory of plasmon scattering at the boundary between gated and ungated regions of a two-dimensional electron system (2DES). Using the Wiener-Hopf technique, we derive analytical expressions for the complex reflection and transmission coefficients of plasmons incident from both sides of the interface. The theory fully accounts for evanescent fields at the gate edge and radiative losses into free-space electromagnetic waves. In the non-retarded limit and for small gate-2DES separation, the reflected plasmon dominates the total electric field, while radiative losses are negligible when plasmon scattering. The amplitudes and phases of the reflection and transmission coefficients for plasmons incident from both sides have a complex dependence from 2DES-gate separation and conductivity of 2DES. Our results provide a rigorous foundation for modeling tunable plasmonic crystals based on 2DES for terahertz detection and modulation.", "url": "https://arxiv.org/abs/2605.05504", "type": "理论", "summary": "我们开发了二维电子系统 (2DES) 门控区域和非门控区域之间边界处的等离激元散射的精确理论。使用维纳-霍普夫技术，我们推导出从界面两侧入射的等离子体激元的复杂反射和透射系数的解析表达式。该理论充分考虑了栅极边缘的渐逝场和自由空间电磁波的辐射损耗。在非延迟极限和小栅极 2DES 分离中，反射的等离激元在总电场中占主导地位，而等离激元散射时的辐射损失可以忽略不计。从两侧入射的等离子体激元的反射和透射系数的幅度和相位与 2DES 门间隔和 2DES 电导率具有复杂的依赖性。我们的结果为基于 2DES 的太赫兹检测和调制的可调谐等离子体晶体建模提供了严格的基础。", "authors": [{"name": "I.M. Moiseenko"}, {"name": "D.A. Svintsov"}], "featured_authors": [{"name": "I.M. Moiseenko"}, {"name": "D.A. Svintsov"}], "author_count": 2}, {"id": "2605.05533", "category": "cond-mat", "title": "Thermodynamics and emergent thermomechanical response of a quantum ring with nonminimal spin--orbit coupling", "abstract": "We investigate the thermodynamic and emergent thermomechanical properties of fermions confined to a one-dimensional quantum ring with effective spin--orbit interactions induced by nonminimal couplings to antisymmetric tensor fields. Using the exact spectrum obtained in the companion work, we develop canonical and grand-canonical descriptions and show that the coupling parameter~$\\xi$ deforms the angular-momentum branches, reorganizing the low-energy spectrum and leaving clear signatures in the internal energy, entropy, heat capacity, and spin--orbit response functions. We also formulate an effective thermomechanical description by treating the ring circumference as a quasi-static thermodynamic variable. This leads to a pressure-like quantity and associated response coefficients, directly linked to the microscopic spectrum. In the grand-canonical ensemble, Fermi statistics strongly enhance the response, producing coupling-dependent instabilities and sign changes reminiscent of mesoscopic de~Haas--van Alphen oscillations. Finally, we introduce a phenomenological interacting extension based on an exponential resummation of the free energy, showing that collective effects can sharpen the thermomechanical response and induce anomalous thermal contraction. Our results connect spectral deformation, finite-size thermodynamics, and emergent mechanical behavior in spin--orbit-active quantum rings.", "url": "https://arxiv.org/abs/2605.05533", "type": "理论", "summary": "我们研究了局限于一维量子环的费米子的热力学和涌现热机械性质，该环具有由与反对称张量场的非最小耦合引起的有效自旋轨道相互作用。利用在配套工作中获得的精确谱，我们开发了正则和大正则描述，并表明耦合参数~$\\xi$使角动量分支变形，重新组织低能谱，并在内能、熵、热容和自旋轨道响应函数中留下清晰的特征。我们还通过将环周长视为准静态热力学变量来制定有效的热机械描述。这导致了类似压力的量和相关的响应系数，与微观光谱直接相关。在大正则系综中，费米统计极大地增强了响应，产生耦合相关的不稳定性和符号变化，让人想起介观德哈斯-范阿尔芬振荡。\n\n最后，我们引入了基于自由能指数恢复的唯象相互作用扩展，表明集体效应可以加剧热机械响应并引起异常热收缩。我们的结果将光谱变形、有限尺寸热力学和自旋轨道活跃量子环中的涌现机械行为联系起来。", "authors": [{"name": "João A. A. S. Reis"}, {"name": "L. Lisboa-Santos"}, {"name": "Edilberto O. Silva"}], "featured_authors": [{"name": "João A. A. S. Reis"}, {"name": "L. Lisboa-Santos"}, {"name": "Edilberto O. Silva"}], "author_count": 3}, {"id": "2605.05589", "category": "cond-mat", "title": "Galois Solvability of Finite-Size Bethe Solutions in the Heisenberg Chain", "abstract": "The spin-1/2 Heisenberg antiferromagnetic chain is the canonical example of an integrable quantum many-body model. Despite its exact solvability, explicit finite-size solutions are typically only accessible via numerical evaluation of the Bethe ansatz equations. Here, we analyse the algebraic structure of the exact, symbolic ground states for chains up to ten sites using the coordinate Bethe ansatz. We show that both the ground state wavefunction and the Bethe-roots rapidly develop algebraic complexity with respect to system size, but at different rates. The Bethe-roots appear to become Galois unsolvable for chains of eight or more sites, whereas the ground state wavefunction coefficients and energy appear to become unsolvable for ten or more sites. This demonstrates a lack of explicit analytic tractability in a quantum integrable model due to algebraic complexity.", "url": "https://arxiv.org/abs/2605.05589", "type": "理论+数值", "summary": "自旋 1/2 海森堡反铁磁链是可积量子多体模型的典型例子。尽管具有精确的可解性，但显式有限尺寸解通常只能通过 Bethe ansatz 方程的数值计算来获得。在这里，我们使用坐标 Bethe ansatz 分析了多达 10 个位点的精确、符号基态的代数结构。我们表明，基态波函数和贝特根都随着系统尺寸的变化而快速发展代数复杂性，但速度不同。对于八个或更多位点的链，贝特根似乎变得伽罗瓦不可解，而基态波函数系数和能量似乎对于十个或更多位点变得不可解。这表明由于代数复杂性，量子可积模型缺乏明确的分析可处理性。", "authors": [{"name": "Oliver R. Bellwood"}, {"name": "William J. Munro"}], "featured_authors": [{"name": "Oliver R. Bellwood"}, {"name": "William J. Munro"}], "author_count": 2}, {"id": "2605.05655", "category": "cond-mat", "title": "Inter-harmonic ratio structure and saturation of Bernstein modes in graphene", "abstract": "Bernstein modes (BM) in graphene are finite-wavevector magnetoplasmons excited by contact near fields, whereas ordinary cyclotron resonance (CR) probes $q\\approx0$. We derive the BM peak absorption in the quasiclassical ballistic regime and show that it factorizes into a launch spectrum, Bernstein-mode splitting, turning-point enhancement, and residual dielectric-response factor. At fixed excitation frequency, BM overtones ($n\\ge2$) are sampled, to leading order, at the same momentum $q\\simeq\\omega/v_F$. Smooth launch and screening factors therefore cancel in inter-harmonic peak ratios, yielding $I_n/I_m\\simeq m/n$, modified by linewidth corrections and one residual response ratio for each harmonic pair. In smooth-launcher synthetic tests, noisy full-$q$ spectra recover the residual ratio within errors: moderate launcher/dielectric misspecification within this benchmark family shifts it by only $\\sim\\!1$--$2\\%$, whereas linewidth assumptions shift it by $\\sim\\!10$--$30\\%$. The same factorization connects low-power amplitudes to nonlinear saturation. If BM harmonics share the same cooling region and bolometric readout, the low-power slope times onset intensity is harmonic independent, while BM and CR power sweeps obey distinct normalized saturation curves with linewidth scalings $\\Gamma^{-1/2}$ and $\\Gamma^{-1}$.", "url": "https://arxiv.org/abs/2605.05655", "type": "理论", "summary": "石墨烯中的伯恩斯坦模式（BM）是由接触近场激发的有限波矢量磁等离子体，而普通回旋共振（CR）探针$q\\approx0$。我们推导了准经典弹道状态下的 BM 峰值吸收，并表明它分解为发射谱、伯恩斯坦模式分裂、转折点增强和残余介电响应因子。在固定激励频率下，BM 泛音 ($n\\ge2$) 以相同的动量 $q\\simeq\\omega/v_F$ 采样到前导顺序。因此，平滑启动和筛选因子会抵消谐波间峰值比，产生 $I_n/I_m\\simeq m/n$，并通过线宽校正和每个谐波对的一个残余响应比进行修改。在平滑发射器综合测试中，噪声全 $q$ 光谱恢复了误差内的残差比：该基准系列中的中等发射器/电介质错误指定仅将其移动 $\\sim\\!1$--$2\\%$，而线宽假设将其移动 $\\sim\\!10$--$30\\%$。相同的因式分解将低功率幅度与非线性饱和联系起来。\n\n如果 BM 谐波共享相同的冷却区域和测辐射热读数，则低功率斜率时间起始强度与谐波无关，而 BM 和 CR 功率扫描遵循不同的归一化饱和曲线，线宽缩放 $\\Gamma^{-1/2}$ 和 $\\Gamma^{-1}$。", "authors": [{"name": "Miguel Tierz"}], "featured_authors": [{"name": "Miguel Tierz"}], "author_count": 1}, {"id": "2605.05675", "category": "cond-mat", "title": "A Scalable Translationally Invariant Variational Theory of Ab Initio Polarons", "abstract": "We introduce a scalable, translationally invariant variational theory for ab initio polarons that remains applicable across coupling regimes without resorting to supercells. Our approach combines a momentum-projected Toyozawa-type wavefunction with a low-rank factorization of the electron-phonon kernel, enabling near-linear scaling with the number of $\\mathbf{k}$-points while capturing both delocalized and self-trapped carriers. Benchmarks for the Fröhlich model, LiF, and anatase and rutile TiO$_2$ yield accurate polaron binding energies, thermodynamic-limit band structures, and transparent real-space measures of polaron extent. For LiF, comparison with first-principles diagrammatic Monte Carlo (DiagMC) reveals close agreement for the weak-coupling electron-polaron ground state and band structure. However, in the hole-polaron of LiF, which is in the strong-coupling regime, we found a significant bias in DiagMC results. These results establish momentum-projected variational wavefunctions as a systematically improvable route to thermodynamic limit studies of polarons in real materials.", "url": "https://arxiv.org/abs/2605.05675", "type": "理论+数值", "summary": "我们引入了一种可扩展的、平移不变的从头算极化子变分理论，该理论在不依赖超晶胞的情况下仍然适用于整个耦合机制。我们的方法将动量投影丰泽型波函数与电子声子内核的低阶因式分解相结合，实现了 $\\mathbf{k}$ 点数量的近线性缩放，同时捕获离域和自陷载流子。 Fröhlich 模型、LiF、锐钛矿和金红石 TiO$_2$ 的基准可产生准确的极化子结合能、热力学极限能带结构以及极化子范围的透明实空间测量。对于 LiF，与第一原理图解蒙特卡罗 (DiagMC) 的比较揭示了弱耦合电子极化子基态和能带结构的密切一致性。然而，在处于强耦合状态的 LiF 的空穴极化子中，我们发现 DiagMC 结果存在显着偏差。这些结果将动量投影变分波函数确立为实际材料中极化子热力学极限研究的系统可改进途径。", "authors": [{"name": "Moritz K. A. Baumgarten"}, {"name": "Hamlin Wu"}, {"name": "Tong Jiang"}, {"name": "Joonho Lee"}], "featured_authors": [{"name": "Moritz K. A. Baumgarten"}, {"name": "Hamlin Wu"}, {"name": "Tong Jiang"}, {"name": "Joonho Lee"}], "author_count": 4}, {"id": "2605.05858", "category": "cond-mat", "title": "A Comparative Study of Projected and Unprojected Schemes for Micromagnetic Simulations", "abstract": "In micromagnetic simulations, the constant magnitude of the magnetization can be derived from the continuity equation. Since the time evolution of the magnetization in the continuity equation is perpendicular to the plane determined by the magnetization and the effective field, taking the inner product of both sides of the model with the magnetization shows that the evolution rate of the magnitude of the magnetization is zero, thus keeping the magnitude constant. From this perspective, the equation itself can maintain the constraint of constant magnetization magnitude. We discretized the continuity equation and compared two first-order semi-implicit strategies in time: one is the implicit Gauss-Seidel method, and the other is the semi-implicit Backward Differentiation Formula (BDF) method. We considered the comparison between these two schemes with and without the projection step. The results of micromagnetic simulations show that when the dissipation coefficient is large, the implicit Gauss-Seidel method without the projection step has significant differences from the method with the projection step in both the achieved steady state and domain wall motion. When an appropriate dissipation coefficient is selected, the difference between the two narrows, and both the steady state and domain wall motion can be simulated. For the other method, BDF1, whether the dissipation coefficient is large or small, the results with and without the projection step are quite consistent, and it can effectively simulate the domain wall motion.", "url": "https://arxiv.org/abs/2605.05858", "type": "理论+数值", "summary": "在微磁模拟中，磁化强度的恒定大小可以从连续性方程导出。由于连续性方程中磁化强度的时间演化垂直于磁化强度和有效场确定的平面，因此模型两边与磁化强度的内积表明磁化强度的演化速率为零，从而保持强度恒定。从这个角度来看，方程本身可以保持磁化强度恒定的约束。我们对连续性方程进行离散化，并在时间上比较了两种一阶半隐式策略：一种是隐式高斯-赛德尔方法，另一种是半隐式后向微分公式（BDF）方法。我们考虑了有和没有投影步骤的这两种方案之间的比较。微磁模拟结果表明，当耗散系数较大时，不带投影步骤的隐式Gauss-Seidel方法与带投影步骤的方法在达到稳态和磁畴壁运动方面均存在显着差异。\n\n当选择合适的耗散系数时，两者之间的差异缩小，并且可以模拟稳态和畴壁运动。对于另一种方法BDF1，无论耗散系数大还是小，有投影步骤和没有投影步骤的结果都相当一致，并且可以有效地模拟磁畴壁运动。", "authors": [{"name": "Changjian Xie"}], "featured_authors": [{"name": "Changjian Xie"}], "author_count": 1}, {"id": "2605.05915", "category": "cond-mat", "title": "Lack of self-averaging of the critical internal energy in a weakly-disordered Baxter model", "abstract": "We investigate the first two moments of the critical internal energy $E$ in a weakly disordered two-dimensional Baxter eight-vertex model as a function of the system size $L$, evaluated at the pseudo-critical point. Disorder is introduced via an equivalent representation of the pure eight-vertex model in terms of two ferromagnetic Ising models coupled by a four-spin interaction of strength $g_0$, where the Ising couplings consist of a uniform ferromagnetic part $J>0$ supplemented by weak Gaussian spatial disorder. In the critical regime, the model is formulated in terms of interacting Grassmann-Majorana spinor fields with quartic interactions and analyzed, for small positive $g_0$, using a combination of replica and renormalization-group methods. We also run extensive numerical simulations measuring the critical internal energy. Our results show that its relative variance increases with $L$ and approaches a finite constant as $L \\to \\infty$ for both $\\pm g_0$. Hence, fluctuations remain relevant independently of the sign of $g_0$ (and thus of the specific-heat exponent), implying a lack of self-averaging of both the critical internal energy and the free energy. Consequently, reliable estimates of these quantities require averaging over many disorder realizations. In addition, we numerically confirm earlier predictions concerning the absence of self-averaging of the critical internal energy in the disordered Ising model.", "url": "https://arxiv.org/abs/2605.05915", "type": "理论+数值", "summary": "我们研究了弱无序二维 Baxter 八顶点模型中临界内能 $E$ 的前两个矩，作为系统尺寸 $L$ 的函数，并在伪临界点进行评估。无序是通过纯八顶点模型的等效表示引入的，即通过强度 $g_0$ 的四自旋相互作用耦合的两个铁磁 Ising 模型，其中 Ising 耦合由均匀铁磁部分 $J>0$ 组成，并辅以弱高斯空间无序。在临界状态下，该模型根据具有四次相互作用的相互作用的 Grassmann-Majorana 旋量场来制定，并使用复制和重正化群方法的组合对小正 $g_0$ 进行分析。我们还进行了大量的数值模拟来测量临界内能。我们的结果表明，其相对方差随着 $L$ 的增加而增加，并且对于 $\\pm g_0$ 而言，接近于一个有限常数 $L \\to \\infty$。因此，波动仍然与 $g_0$ 的符号无关（因此与比热指数无关），这意味着临界内能和自由能都缺乏自平均。\n\n因此，对这些数量的可靠估计需要对许多无序实现进行平均。此外，我们在数值上证实了早期关于无序伊辛模型中临界内能不存在自平均的预测。", "authors": [{"name": "Ramgopal Agrawal"}, {"name": "Victor Dotsenko"}, {"name": "Maxym Dudka"}, {"name": "Marco Picco"}, {"name": "Enzo Marinari"}, {"name": "Gleb Oshanin"}], "featured_authors": [{"name": "Ramgopal Agrawal"}, {"name": "Victor Dotsenko"}, {"name": "Maxym Dudka"}, {"name": "Marco Picco"}, {"name": "Enzo Marinari"}, {"name": "Gleb Oshanin"}], "author_count": 6}, {"id": "2605.05934", "category": "cond-mat", "title": "Emergent conserved quantities via irreversibility", "abstract": "Conserved quantities increasingly underpin the inference of physical models. Recently new conserved quantities have been found in this context, that currently lack an interpretation. Here, we show that irreversible reactions in CRNs and Markov Chains lead to emergent conservation laws and broken cycles. Linearly dependent currents - characterized by the \"co-production index\" - arise due to irreversible reactions. We derive a law relating conserved quantities, broken cycles, and co-production. This resolves a recent conundrum posed by a machine-discovered candidate for a non-integer conservation law. Our findings introduce heretofore overlooked extensions to a widely used index law for CRNs and Markov Chains that undercounts conservation laws. This furnishes new tools and immediate applications for the inference and analysis of models based on conservation laws.", "url": "https://arxiv.org/abs/2605.05934", "type": "理论", "summary": "守恒量日益成为物理模型推论的基础。最近在这方面发现了新的守恒量，但目前缺乏解释。在这里，我们证明 CRN 和马尔可夫链中的不可逆反应会导致出现守恒定律和破坏循环。线性相关电流（以“联产指数”为特征）是由于不可逆反应而产生的。我们推导出一条有关守恒量、破坏循环和共同生产的定律。这解决了机器发现的非整数守恒定律候选者最近提出的难题。我们的研究结果引入了迄今为止被忽视的对 CRN 和马尔可夫链指数定律的广泛使用的扩展，该定律低估了守恒定律。这为基于守恒定律的模型的推理和分析提供了新的工具和直接的应用。", "authors": [{"name": "Alex Blokhuis"}, {"name": "Martijn van Kuppeveld"}, {"name": "Daan van de Weem"}, {"name": "Robert Pollice"}], "featured_authors": [{"name": "Alex Blokhuis"}, {"name": "Martijn van Kuppeveld"}, {"name": "Daan van de Weem"}, {"name": "Robert Pollice"}], "author_count": 4}, {"id": "2605.06075", "category": "cond-mat", "title": "Probing critical phases in quasiperiodic systems via subsystem information capacity", "abstract": "We systematically investigate the entanglement dynamics of quasiperiodic systems across their extended, critical, and localized phases, aiming to identify dynamical signatures that can clearly distinguish the critical phase from the other two. Focusing on the extended Harper model, we complement the half-chain entanglement entropy with the spatially resolved subsystem information capacity (SIC) and demonstrate that the critical phase exhibits a pronounced spatial heterogeneity that is absent in the extended and localized phases. In the steady state, the SIC reveals a stepwise ramp as a function of subsystem size, reflecting an underlying fragmentation of the chain into weakly connected subregions. Dynamically, information initially localized within such a subregion can undergo coherent long-lived oscillations, dubbed subregion echoes, whose period scales with the subregion length, in quantitative agreement with a quasiparticle picture of confined quasiparticle reflections. We trace this internal fragmentation to the incommensurately distributed zeros (IDZs) in the off-diagonal hopping terms of the Hamiltonian. To establish the generality of the SIC as a diagnostic tool, we further apply it to a mobility-edge phase with coexisting extended and localized states and to a critical phase that does not originate from IDZ fragmentation, and show that the SIC can cleanly distinguish these scenarios through their distinct steady-state profiles, initial-site sensitivities and the presence of subregion echoes. Our results establish the SIC as a powerful real-space probe for diagnosing critical phases and for uncovering the bottlenecked connectivity that underlies their multifractal structure.", "url": "https://arxiv.org/abs/2605.06075", "type": "理论+数值", "summary": "我们系统地研究了准周期系统在扩展相、临界相和局域相中的纠缠动力学，旨在识别能够清楚区分临界相和其他两个相的动力学特征。着眼于扩展哈珀模型，我们用空间分辨子系统信息容量（SIC）补充半链纠缠熵，并证明关键相表现出扩展相和局部相中不存在的明显空间异质性。在稳定状态下，SIC 显示出作为子系统大小的函数的逐步斜坡，反映了链潜在的碎片化为弱连接的子区域。动态地，最初定位在这样一个子区域内的信息可以经历相干的长寿命振荡，称为子区域回波，其周期与子区域长度成比例，与受限准粒子反射的准粒子图像定量一致。我们将这种内部碎片追溯到哈密顿量的非对角跳跃项中的不通约分布零点 (IDZ)。\n\n为了建立 SIC 作为诊断工具的通用性，我们进一步将其应用于具有共存扩展状态和局部状态的移动边缘相以及并非源自 IDZ 碎片的关键相，并表明 SIC 可以通过其独特的稳态剖面、初始位点灵敏度和子区域回波的存在来清晰地区分这些情况。我们的结果将 SIC 确立为强大的真实空间探测器，用于诊断关键相并揭示其多重分形结构背后的瓶颈连接性。", "authors": [{"name": "Huaijin Dong"}, {"name": "Long Zhang"}], "featured_authors": [{"name": "Huaijin Dong"}, {"name": "Long Zhang"}], "author_count": 2}, {"id": "2605.06089", "category": "cond-mat", "title": "Floquet-induced suppression of thermalization in a quasiperiodic Ising chain", "abstract": "Many-body localized (MBL) systems are known to thermalize in periodically driven systems. In this work, we demonstrate that under proper driving protocol, this thermalization this thermalization can be resisted such that the MBL phase turns into a non-ergodic extended phase, known as the many-body critical (MBC) phase. Considering a kicked quasiperiodic Ising chain, we show that while at high-frequency driving the ergodic, MBL, and the MBC phases coexist, at moderate driving frequencies the MBL phase is completely suppressed and the MBC phase proliferates in the parameter space. Using quasienergy statistics, Floquet eigenstates, autocorrelation dynamics, and entanglement growth, we characterize the emergent phases and identify non-monotonic signatures revealing richness of the nonergodic phases. Our results establish Floquet driving as a powerful route to stabilizing nonergodic extended many-body phases beyond the conventional Floquet-MBL paradigm.", "url": "https://arxiv.org/abs/2605.06089", "type": "理论", "summary": "众所周知，多体局域 (MBL) 系统会在周期性驱动系统中热化。在这项工作中，我们证明，在适当的驱动协议下，这种热化可以被抵抗，使得 MBL 相变成非遍历扩展相，称为多体临界 (MBC) 相。考虑踢准周期伊辛链，我们表明，在高频驱动时，遍历、MBL 和 MBC 相位共存，在中等驱动频率下，MBL 相位被完全抑制，MBC 相位在参数空间中扩散。使用准能量统计、Floquet 本征态、自相关动力学和纠缠增长，我们描述了涌现相并识别了揭示非遍历相丰富性的非单调特征。我们的结果表明 Floquet 驱动是一种超越传统 Floquet-MBL 范式的稳定非遍历扩展多体相的有效途径。", "authors": [{"name": "Biswajit Paul"}, {"name": "Nilanjan Roy"}, {"name": "Tapan Mishra"}], "featured_authors": [{"name": "Biswajit Paul"}, {"name": "Nilanjan Roy"}, {"name": "Tapan Mishra"}], "author_count": 3}, {"id": "2605.06114", "category": "cond-mat", "title": "Transformation-mediated twinning governs plasticity in body-centered cubic nanocrystals under extreme loading", "abstract": "Plasticity in body-centered cubic (BCC) nanocrystals is often associated with twin nucleation phenomena under extreme loading conditions. Here, we reveal unconventional twinning pathways that operate at the intersection of crystal plasticity and structural phase transitions. We show that the classical shear-driven twinning mode becomes progressively suppressed with increasing pressure, giving rise to transformation-mediated twinning pathways involving transient HCP or FCC phases. In BCC Fe, Ta, and Nb nanocrystals of moderate elastic stiffness, plasticity is consistently initiated by an elastic instability that triggers a dual-shuffle process mediated by stable or metastable hexagonal closed-packed (HCP) phases. This pathway operates independently of the characteristic {112} twin boundary planes and is driven by compression, challenging the conceptual paradigm for metal plasticity in which plastic deformation arises from shear stresses resolved on specific planes. By contrast, in the archetypal elastically stiffer BCC Mo and W nanocrystals, plastic deformation proceeds via two alternative twinning pathways associated with shear-driven elastic instabilities mediated by highly-distorted face-centered cubic (FCC) phases. Comprehensive analyses of the energy landscapes to the competing nanoscale twinning modes provide mechanistic insight into their activation, establishing a unified framework for transformation-mediated twinning in BCC nanocrystals across a broad range of loading conditions.", "url": "https://arxiv.org/abs/2605.06114", "type": "理论+数值", "summary": "体心立方（BCC）纳米晶体的塑性通常与极端负载条件下的孪晶成核现象有关。在这里，我们揭示了在晶体塑性和结构相变交叉点起作用的非常规孪生途径。我们表明，经典的剪切驱动孪生模式随着压力的增加而逐渐受到抑制，从而产生涉及瞬态 HCP 或 FCC 相的转化介导的孪生路径。在具有中等弹性刚度的 BCC Fe、Ta 和 Nb 纳米晶体中，塑性始终是由弹性不稳定性引发的，弹性不稳定性触发了由稳定或亚稳态六方密堆积 (HCP) 相介导的双洗牌过程。该路径独立于特征{112}孪晶边界平面运行，并由压缩驱动，挑战了金属塑性的概念范式，其中塑性变形是由特定平面上解析的剪切应力引起的。\n\n相比之下，在典型的弹性刚度 BCC Mo 和 W 纳米晶体中，塑性变形通过与高度扭曲的面心立方 (FCC) 相介导的剪切驱动弹性不稳定性相关的两种替代孪生路径进行。对竞争纳米级孪生模式的能量景观进行全面分析，提供了对其激活的机制洞察，为 BCC 纳米晶体在各种负载条件下的转化介导孪生建立了统一的框架。", "authors": [{"name": "Jan Očenášek"}, {"name": "Jesper Byggmästar"}, {"name": "Guanying Wei"}, {"name": "F. Javier Dominguez-Gutierrez"}, {"name": "Jorge Alcalá"}], "featured_authors": [{"name": "Jan Očenášek"}, {"name": "Jesper Byggmästar"}, {"name": "Guanying Wei"}, {"name": "F. Javier Dominguez-Gutierrez"}, {"name": "Jorge Alcalá"}], "author_count": 5}, {"id": "2605.06244", "category": "cond-mat", "title": "Large Deviation Functions for Open Quantum Systems with a Strong Symmetry", "abstract": "In open quantum systems with strong symmetries, the global scaled cumulant generating function (SCGF) is generally nonanalytic, so the Gärtner-Ellis theorem cannot directly yield the genuine large-deviation rate function. To address this issue, we propose that the theorem remains valid within blocks of the systems' operator space: we first obtain local rate functions for each block via the theorem and then recover the global one by minimization. This approach is justified by the dissipative freezing phenomenon in such systems. We demonstrate the scheme in an analytical model and a three-spin model with XX interaction. In the latter, we find that the vanishing of a nonanalytic point in the global SCGF under dephasing appears as an avoided ``level'' crossing, and we quantify this behavior using a degenerate perturbation theory.", "url": "https://arxiv.org/abs/2605.06244", "type": "理论", "summary": "在具有强对称性的开放量子系统中，全局尺度累积生成函数（SCGF）通常是非解析的，因此Gärtner-Ellis定理不能直接产生真正的大偏差率函数。为了解决这个问题，我们提出该定理在系统算子空间的块内仍然有效：我们首先通过定理获得每个块的局部速率函数，然后通过最小化恢复全局速率函数。这种方法的合理性是由此类系统中的耗散冻结现象所证明的。我们在分析模型和具有 XX 相互作用的三自旋模型中演示了该方案。在后者中，我们发现去相位下全局 SCGF 中非解析点的消失表现为避免的“水平”交叉，并且我们使用简并扰动理论量化了这种行为。", "authors": [{"name": "Fei Liu"}, {"name": "Jiayi Gu"}, {"name": "Hailong Wang"}, {"name": "Shanhe Su"}], "featured_authors": [{"name": "Fei Liu"}, {"name": "Jiayi Gu"}, {"name": "Hailong Wang"}, {"name": "Shanhe Su"}], "author_count": 4}, {"id": "2605.06293", "category": "cond-mat", "title": "Solvent-induced memory effects in a model electrolyte", "abstract": "The fluctuations of ions in polar solvents remain poorly understood theoretically due to the complex coupling between ionic motion and solvent polarization. Indeed, while all-atom resolution can be achieved in numerical simulations, analytical approaches require suitable levels of coarse-graining. In this work, we describe ions and solvent molecules as interacting Brownian particles and use stochastic density functional theory to derive a generalized Langevin equation for the ionic charge density, explicitly accounting for solvent-mediated memory effects. In the regime where there is a clear timescale separation between fast solvent and slow ion dynamics, we obtain simple expressions for dynamical charge structure factors, which are validated by BD simulations. For slow solvents, we predict an emerging two-step relaxation in ionic dynamics. These results provide a mesoscopic approach for ion-solvent dynamics and open pathways to study fluctuation-induced phenomena in electrolytes.", "url": "https://arxiv.org/abs/2605.06293", "type": "理论+数值", "summary": "由于离子运动和溶剂极化之间的复杂耦合，极性溶剂中离子的波动在理论上仍然知之甚少。事实上，虽然在数值模拟中可以实现全原子分辨率，但分析方法需要适当的粗粒度水平。在这项工作中，我们将离子和溶剂分子描述为相互作用的布朗粒子，并使用随机密度泛函理论推导出离子电荷密度的广义朗之万方程，明确地解释了溶剂介导的记忆效应。在快溶剂和慢离子动力学之间存在明显时间尺度分离的情况下，我们获得了动态电荷结构因子的简单表达式，并通过 BD 模拟进行了验证。对于慢溶剂，我们预测离子动力学中会出现两步弛豫。这些结果为离子溶剂动力学提供了一种介观方法，并为研究电解质中波动引起的现象开辟了途径。", "authors": [{"name": "Sleeba Varghese"}, {"name": "Benjamin Rotenberg"}, {"name": "Pierre Illien"}], "featured_authors": [{"name": "Sleeba Varghese"}, {"name": "Benjamin Rotenberg"}, {"name": "Pierre Illien"}], "author_count": 3}, {"id": "2605.06302", "category": "cond-mat", "title": "Quantum Electron Quasicrystal", "abstract": "The strongly correlated phases of the homogeneous electron gas constitute the vocabulary of many-body condensed matter physics and find a natural realization in semiconductors. In this setting, recent neural-network variational Monte Carlo calculations discovered an unexpected quantum phase of matter in wide quantum wells: an electronic quasicrystal formed by a bilayer Wigner crystals with a 30-degrees twist. This state defies classical expectations and emerges in a regime dominated by quantum fluctuations. Here, we develop an analytical framework to reveal its origin. By computing zero-point energy corrections to bilayer Wigner crystal configurations, we show that quantum fluctuations qualitatively reshape the energetic landscape, destabilizing the classical honeycomb state and selecting the 30-degrees quasicrystalline ground state over a broad parameter range. Our results identify zero-point motion as the mechanism stabilizing the electronic quasicrystal and establish a route to spontaneous moiré physics driven by many-body quantum effects.", "url": "https://arxiv.org/abs/2605.06302", "type": "数值", "summary": "均质电子气的强相关相构成了多体凝聚态物理的词汇，并在半导体中得到了自然的实现。在这种情况下，最近的神经网络变分蒙特卡罗计算在宽量子阱中发现了意想不到的物质量子相：由扭转 30 度的双层维格纳晶体形成的电子准晶体。这种状态违背了经典预期，并出现在由量子涨落主导的状态中。在这里，我们开发了一个分析框架来揭示其起源。通过计算双层维格纳晶体结构的零点能量修正，我们表明量子涨落定性地重塑了能量景观，破坏了经典蜂窝态的稳定性，并在广泛的参数范围内选择了 30 度准晶基态。我们的结果将零点运动确定为稳定电子准晶体的机制，并建立了一条由多体量子效应驱动的自发莫尔物理的途径。", "authors": [{"name": "Pierre-Antoine Graham"}, {"name": "Filippo Gaggioli"}, {"name": "Liang Fu"}], "featured_authors": [{"name": "Pierre-Antoine Graham"}, {"name": "Filippo Gaggioli"}, {"name": "Liang Fu"}], "author_count": 3}, {"id": "2605.06383", "category": "cond-mat", "title": "Genus-protected higher-order topological phases", "abstract": "Higher-order topological phases (HOTPs) feature protected gapless modes on boundaries of higher codimension, such as the corners or hinges of a crystal. They are understood as being protected by lattice symmetries: If the latter are broken, it becomes possible to remove the boundary modes without closing the bulk gap. In this work, we present construction schemes for HOTPs protected solely by the bulk gap, by fundamental symmetries, and by the global topology of the system shape (its genus, or number of holes), independent of any crystalline symmetries. As long as the fundamental local symmetries are preserved, the resulting boundary states cannot be removed by any purely-surface perturbation.", "url": "https://arxiv.org/abs/2605.06383", "type": "理论", "summary": "高阶拓扑相 (HOTP) 在较高维边界（例如晶体的角或铰链）上具有受保护的无间隙模式。它们被理解为受到晶格对称性的保护：如果晶格对称性被破坏，则可以在不关闭体间隙的情况下去除边界模式。在这项工作中，我们提出了仅受体能隙、基本对称性和系统形状的全局拓扑（其属或孔数）保护的 HOTP 的构造方案，与任何晶体对称性无关。只要保留基本的局域对称性，所产生的边界态就不能通过任何纯表面扰动来消除。", "authors": [{"name": "Shahroze Shahab"}, {"name": "Hui Liu"}, {"name": "Daniel Varjas"}, {"name": "Ion Cosma Fulga"}], "featured_authors": [{"name": "Shahroze Shahab"}, {"name": "Hui Liu"}, {"name": "Daniel Varjas"}, {"name": "Ion Cosma Fulga"}], "author_count": 4}, {"id": "2605.06394", "category": "cond-mat", "title": "Lecture Notes on Statistical Physics and Neural Networks", "abstract": "These lecture notes introduce some topics of classical statistical physics, particularly those that are relevant for neural networks and deep learning. Statistical physics is treated as a branch of probability theory or statistics, with the goal of making concepts such as phase transitions and the renormalization group accessible to readers without prior knowledge of physics. We introduce the Boltzmann-Gibbs distribution and the thermodynamic potentials on a finite configuration space, notably for Ising spins and spin-glass models on a lattice, and then define phase transitions as discontinuities that arise in the limit that the number of lattice points goes to infinity. We further introduce Hopfield networks and Boltzmann machines, which are governed by the same energy function as spin-glass models, and discuss the learning algorithm for restricted Boltzmann machines. In this algorithm hidden neurons are integrated out as in the renormalization group. Finally, modern deep learning is introduced, whose early developments were in part motivated by restricted Boltzmann machines in that they carry many layers of hidden neurons. A description of large language models is given.", "url": "https://arxiv.org/abs/2605.06394", "type": "理论+数值", "summary": "这些讲义介绍了经典统计物理学的一些主题，特别是与神经网络和深度学习相关的主题。统计物理学被视为概率论或统计学的一个分支，其目标是让没有物理学先验知识的读者能够理解相变和重整化群等概念。我们引入了有限构型空间上的玻尔兹曼-吉布斯分布和热力学势，特别是晶格上的伊辛自旋和自旋玻璃模型，然后将相变定义为在晶格点数量达到无穷大的极限中出现的不连续性。我们进一步介绍了霍普菲尔德网络和玻尔兹曼机，它们与自旋玻璃模型受相同的能量函数控制，并讨论了受限玻尔兹曼机的学习算法。在该算法中，隐藏神经元与重整化群中一样被积分。最后，介绍了现代深度学习，其早期发展部分受到受限玻尔兹曼机的推动，因为它们携带许多层隐藏神经元。给出了大语言模型的描述。", "authors": [{"name": "Olaf Hohm"}], "featured_authors": [{"name": "Olaf Hohm"}], "author_count": 1}, {"id": "2605.06422", "category": "cond-mat", "title": "Superconducting and correlated phases of an effective Hubbard model on the BCC lattice", "abstract": "We investigate the electronic phases of an effective Hubbard model on the body-centered-cubic lattice, motivated by alkali-doped fulleride molecular solids. The model incorporates renormalized on-site interactions and an effective inverted Hund's coupling originating from electron-phonon interactions. To access complementary interaction regimes, we employ two theoretical approaches. In the intermediate-coupling regime, the on-site repulsive interaction is approximated by a long-range interaction in momentum space, yielding an exactly solvable Hatsugai-Kohmoto model supplemented by a BCS-type pairing term. Within this framework, we analyze the superconducting instability and demonstrate a first-order normal-superconducting phase transition, characterized by a discontinuous jump of the order parameter. In the strong-coupling regime, where pairing fluctuations are suppressed, we apply the spin rotationally invariant slave-boson formalism to map out the temperature-interaction phase diagram. This analysis reveals first-order transitions between a Fermi-liquid phase, an antiferromagnetic phase, and a Mott insulating phase, with a narrow intermediate region where all three phases compete. The resulting phase diagram captures the interplay of itinerancy, magnetic order, and Mott localization in three dimensions and provides a unified perspective on superconducting and correlation-driven phenomena in fulleride-inspired lattice systems.", "url": "https://arxiv.org/abs/2605.06422", "type": "理论+数值", "summary": "我们在碱掺杂富勒烯分子固体的推动下，研究了体心立方晶格上有效哈伯德模型的电子相。该模型结合了重正化的现场相互作用和源自电子-声子相互作用的有效倒洪德耦合。为了获得互补的相互作用机制，我们采用了两种理论方法。在中间耦合状态下，现场排斥相互作用通过动量空间中的长程相互作用来近似，产生一个精确可解的 Hatsugai-Kohmoto 模型，并辅以 BCS 型配对项。在此框架内，我们分析了超导不稳定性并演示了一阶常超导相变，其特征是阶次参数的不连续跳跃。在强耦合状态下，配对涨落受到抑制，我们应用自旋旋转不变的从玻色子形式来绘制温度相互作用相图。\n\n该分析揭示了费米液相、反铁磁相和莫特绝缘相之间的一阶转变，以及所有三相竞争的狭窄中间区域。由此产生的相图捕获了三个维度中的行程、磁序和莫特局域化的相互作用，并为受富勒烯启发的晶格系统中的超导和相关驱动现象提供了统一的视角。", "authors": [{"name": "Theja N. De Silva"}], "featured_authors": [{"name": "Theja N. De Silva"}], "author_count": 1}, {"id": "2605.06424", "category": "cond-mat", "title": "Finite-Time Optimal Control by Noisy Traps", "abstract": "The optimal control of passive systems in equilibrium typically favours quasistatic (infinite-time) protocols. We show that a breakdown of quasistatic optimality occurs when the controller itself is dissipative. Concretely, we study a Brownian particle confined by a harmonic trap with stochastically fluctuating stiffness, driven by an external protocol. When these fluctuations violate detailed balance, the probe-controller coupling continuously exchanges work with the system, altering the optimisation landscape. In this regime, optimal protocols are characterised by a finite duration which vanishes above a critical fluctuation strength. This transition can be directly observed in a short-time expansion of the mean work functional. When imposing an endpoint constraint, the transition to zero duration disappears and finite duration protocols remain optimal for all values of the controller fluctuations. These results demonstrate that finite-time optimality can emerge in passive systems under nonequilibrium control.", "url": "https://arxiv.org/abs/2605.06424", "type": "理论", "summary": "处于平衡状态的无源系统的最优控制通常有利于准静态（无限时间）协议。我们证明，当控制器本身耗散时，准静态最优性就会崩溃。具体来说，我们研究了由谐波陷阱限制的布朗粒子，该谐波陷阱具有随机波动的刚度，由外部协议驱动。当这些波动违反详细平衡时，探头-控制器耦合会不断地与系统交换工作，从而改变优化景观。在这种情况下，最优协议的特点是有限的持续时间，超过临界波动强度就会消失。这种转变可以在平均功函数的短时展开中直接观察到。当施加端点约束时，到零持续时间的过渡消失，并且有限持续时间协议对于控制器波动的所有值仍然是最佳的。这些结果表明，在非平衡控制下的被动系统中可以出现有限时间最优性。", "authors": [{"name": "Luca Cocconi"}, {"name": "Henry Alston"}, {"name": "Thibault Bertrand"}], "featured_authors": [{"name": "Luca Cocconi"}, {"name": "Henry Alston"}, {"name": "Thibault Bertrand"}], "author_count": 3}, {"id": "2605.06425", "category": "cond-mat", "title": "Comparative Study of Potts Machine Dynamics and Performance for Max-k-Cut", "abstract": "Combinatorial optimization problems in logistics, finance, energy, and scheduling routinely involve multi-state decision variables. Ising machines (IMs) require binary expansions (e.g., one-hot encoding) to encode such variables, whereas Potts machines (PMs) represent them natively. By doing so, PMs are expected to outperform IMs on multi-state problems. To the best of our knowledge, no systematic study of PM models has yet assessed whether this expectation holds. We therefore benchmark five representative PMs against a reference IM on Max-3-Cut and Max-4-Cut, using 800-vertex GSet graphs and random graphs of up to 50 vertices. Surprisingly, the reference IM still outperforms every PM, and the IM supremacy increases significantly in going from Max-3-Cut to Max-4-Cut. These results provide clear evidence that current PM dynamics underperform relative to binary approaches, even in regimes where they are presumed advantageous. We provide a way forward by quantifying the underperformance of current PMs, as well as by identifying three dynamical properties that correlate strongly with their performance ranking. Our work stresses the need for more systematic assessments of algorithmic performance in order to guide the design of more effective Potts machines.", "url": "https://arxiv.org/abs/2605.06425", "type": "理论+数值", "summary": "物流、金融、能源和调度中的组合优化问题通常涉及多状态决策变量。 Ising 机 (IM) 需要二进制扩展（例如，one-hot 编码）来编码此类变量，而 Potts 机 (PM) 本身就表示它们。通过这样做，PM 有望在多状态问题上优于 IM。据我们所知，尚未对 PM 模型进行系统研究来评估这一预期是否成立。因此，我们使用 800 顶点 GSet 图和最多 50 个顶点的随机图，在 Max-3-Cut 和 Max-4-Cut 上对五个代表性 PM 与参考 IM 进行基准测试。令人惊讶的是，参考 IM 仍然优于每个 PM，并且从 Max-3-Cut 到 Max-4-Cut，IM 优势显着增加。这些结果提供了明确的证据，表明当前的 PM 动态相对于二元方法表现不佳，即使在它们被认为有利的情况下也是如此。我们通过量化当前 PM 的不佳表现以及识别与绩效排名密切相关的三个动态属性来提供前进的方向。\n\n我们的工作强调需要对算法性能进行更系统的评估，以指导更有效的波茨机的设计。", "authors": [{"name": "Bjarke Almer Frederiksen"}, {"name": "Robbe De Prins"}, {"name": "Peter Bienstman"}], "featured_authors": [{"name": "Bjarke Almer Frederiksen"}, {"name": "Robbe De Prins"}, {"name": "Peter Bienstman"}], "author_count": 3}, {"id": "2605.06436", "category": "cond-mat", "title": "Criticality around the Spinodal Point of First-Order Quantum Phase Transitions", "abstract": "Universality and scaling are hallmarks of second-order phase transitions but are generally unexpected in first-order quantum phase transitions (FOQPTs). We present a microscopic theory showing that quantum criticality can emerge around the quantum spinodal point of FOQPTs where metastability disappears. We demonstrate that, at this instability, resonant local excitations dynamically decouple a Hilbert subspace characterized by an emergent discrete translational symmetry. Projecting the original Hamiltonian onto this subspace yields an effective Hamiltonian that exhibits a genuine second-order quantum phase transition (SOQPT) and the Kibble-Zurek scaling. We validate this framework in the tilted Ising chain which breaks Z_2 symmetry, and predict the absence of criticality in the staggered-field PXP model. This work indicates that the FOQPT dynamics is usually governed by an emergent critical point around the quantum spinodal point. Our study establishes a bridge between the dynamics of the FOQPT and SOQPT, and thus sheds new light on the long-standing conundrum of the dynamics of the FOQPT.", "url": "https://arxiv.org/abs/2605.06436", "type": "理论", "summary": "普遍性和尺度性是二阶相变的标志，但在一阶量子相变（FOQPT）中通常是意想不到的。我们提出了一种微观理论，表明量子临界性可以在 FOQPT 的量子旋节点附近出现，此时亚稳态消失。我们证明，在这种不稳定性下，共振局部激励动态解耦以出现的离散平移对称性为特征的希尔伯特子空间。将原始哈密顿量投影到该子空间上会产生有效的哈密顿量，该哈密顿量表现出真正的二阶量子相变 (SOQPT) 和 Kibble-Zurek 标度。我们在破坏 Z_2 对称性的倾斜伊辛链中验证了该框架，并预测交错场 PXP 模型中不存在临界性。这项工作表明 FOQPT 动力学通常由量子旋节点周围的新兴临界点控制。我们的研究在 FOQPT 动力学和 SOQPT 动力学之间建立了一座桥梁，从而为长期存在的 FOQPT 动力学难题提供了新的线索。", "authors": [{"name": "Fan Zhang"}, {"name": "Chiao Wang"}, {"name": "H. T. Quan"}], "featured_authors": [{"name": "Fan Zhang"}, {"name": "Chiao Wang"}, {"name": "H. T. Quan"}], "author_count": 3}, {"id": "2605.06456", "category": "cond-mat", "title": "Activation in Vesicle-Mediated Signaling Shaped by Batch Arrival Statistics", "abstract": "Vesicle-mediated secretion of ions or molecules is a central mechanism of cellular communication, for example in processes such as neurotransmission or hormone release. These events are inherently stochastic: vesicle fusions lead to bursts of variable sizes, releasing discrete packets of transmitters that are subsequently cleared or degraded. The dynamics break time-reversal symmetry due to the interplay of spontaneous bursts and continuous degradation. Using generating functions and a recursion relation, we derive an exact solution for the full time-dependent probability distribution of a general batch arrival-degradation model. This framework also enables a full analysis of first-passage times to a concentration threshold representing downstream activation. We show that activation kinetics are not determined by mean dynamics alone, but depend sensitively on the temporal statistics of arrival events, batch-size variability, and degradation. In particular, different arrival processes with identical mean rates can lead to qualitatively distinct first-passage behavior, reflecting the role of time-asymmetric fluctuations. We also discuss extensions incorporating vesicle depletion. Our results provide a transparent link between stochastic release dynamics and activation timing in vesicle-mediated signaling.", "url": "https://arxiv.org/abs/2605.06456", "type": "理论+数值", "summary": "囊泡介导的离子或分子分泌是细胞通讯的核心机制，例如在神经传递或激素释放等过程中。这些事件本质上是随机的：囊泡融合导致不同大小的爆发，释放离散的发射器数据包，随后被清除或降解。由于自发爆发和持续退化的相互作用，动力学打破了时间反转对称性。使用生成函数和递归关系，我们得出了一般批量到达-退化模型的全时间相关概率分布的精确解。该框架还能够对代表下游激活的浓度阈值的首次传代时间进行全面分析。我们表明，激活动力学不仅仅由平均动力学决定，而是敏感地依赖于到达事件的时间统计、批量大小变异性和退化。特别是，具有相同平均速率的不同到达过程可能导致质量上不同的首次通过行为，反映了时间不对称波动的作用。我们还讨论了囊泡耗尽的扩展。\n\n我们的结果提供了囊泡介导的信号传导中随机释放动力学和激活时间之间的透明联系。", "authors": [{"name": "Jan Hauke"}, {"name": "Julian B. Voits"}, {"name": "Ulrich S. Schwarz"}], "featured_authors": [{"name": "Jan Hauke"}, {"name": "Julian B. Voits"}, {"name": "Ulrich S. Schwarz"}], "author_count": 3}, {"id": "2605.06473", "category": "cond-mat", "title": "Engineering a driven-dissipative bath of altermagnetic quantum magnons for controlling classical dynamics of spins hosting spin waves, domain walls, or skyrmions", "abstract": "Using Schwinger-Keldysh field theory (SKFT), we engineer a dissipative and driven (i.e., out of equilibrium) bosonic bath acting on classical localized spins within a ferromagnetic insulator (FI) layer whose dynamics is governed by the Landau-Lifshitz-Gilbert equation, as is usually assumed in spintronics and magnonics. The bosonic bath is comprised of quantum magnons within a layer of altermagnetic insulator (AMI) that is attached to a conventional FI layer, often one of the key ingredients within spintronic and magnonic multilayers, so that interaction between slow classical (in the FI layer) and fast quantum (in the AMI layer) localized spins ensues. Such a bath, including its driving to produce a nonequilibrium distribution of altermagnetic magnons, generates a rich structure of the SKFT-derived extended LLG equation for classical spins within the FI layer. Our LLG equation contains two damping terms, both of which are spatially nonlocal and anisotropic, while one of them is also intrinsically non-Markovian, i.e., nonlocal in time. We demonstrate how to exploit these terms for tuning spintronic and magnonic effects within the FI layer of AMI/FI bilayers that involve spin wave or domain wall propagation, as well as skyrmion annihilation.", "url": "https://arxiv.org/abs/2605.06473", "type": "理论", "summary": "利用 Schwinger-Keldysh 场理论 (SKFT)，我们设计了一个耗散驱动（即不平衡）的玻色子浴，作用于铁磁绝缘体 (FI) 层内的经典局域自旋，其动力学由 Landau-Lifshitz-Gilbert 方程控制，正如自旋电子学和磁振子学中通常假设的那样。玻色子浴由一层交变磁绝缘体 (AMI) 内的量子磁振子组成，该绝缘体连接到传统的 FI 层，这通常是自旋电子和磁振子多层中的关键成分之一，因此慢速经典（在 FI 层中）和快速量子（在 AMI 层中）局域自旋之间会发生相互作用。这样的浴，包括其产生非平衡分布的交变磁振子的驱动，为 FI 层内的经典自旋生成了 SKFT 导出的扩展 LLG 方程的丰富结构。我们的 LLG 方程包含两个阻尼项，两者都是空间非局域且各向异性的，而其中之一本质上也是非马尔可夫的，即时间非局域的。\n\n我们演示了如何利用这些术语来调节 AMI/FI 双层的 FI 层内的自旋电子和磁振子效应，这些效应涉及自旋波或畴壁传播以及斯格明子湮灭。", "authors": [{"name": "Felipe Reyes-Osorio"}, {"name": "Branislav K. Nikolic"}], "featured_authors": [{"name": "Felipe Reyes-Osorio"}, {"name": "Branislav K. Nikolic"}], "author_count": 2}, {"id": "2605.06513", "category": "cond-mat", "title": "Cooking crystalline candies and the ductile to brittle transition in concentrated suspensions", "abstract": "The existence and origin of the ductile to brittle transition in non-Brownian suspensions and pastes is underexplored despite the ubiquity of such materials in practical applications. We demonstrate the phenomenon in candies of sugar crystals in a water-protein-fat matrix prepared by boiling a sugar-cream-butter mixture (known as 'fudge' in some countries). As cooking time or final cooking temperature increases, we observe a transition from a fluid to a ductile solid, then to a brittle solid that abruptly fractures in compression. We propose that this is driven by rising solid sugar crystal volume fraction, and indeed find the same sequence of behaviour in a suspension of non-Brownian calcite particles as the solid fraction moves from frictional jamming to random close packing. Particle-based simulations reveal the sensitivity of the observed phenomenon to boundary conditions.", "url": "https://arxiv.org/abs/2605.06513", "type": "理论+数值", "summary": "尽管这种材料在实际应用中普遍存在，但非布朗悬浮液和糊剂中延性到脆性转变的存在和起源尚未得到充分探索。我们证明了糖果中糖晶体存在于水-蛋白质-脂肪基质中的现象，该基质是通过煮沸糖-奶油-黄油混合物（在一些国家称为“软糖”）制备的。随着烹饪时间或最终烹饪温度的增加，我们观察到从流体到延性固体的转变，然后到在压缩时突然破裂的脆性固体的转变。我们认为这是由固体糖晶体体积分数上升所驱动的，并且确实在非布朗方解石颗粒的悬浮液中发现了相同的行为序列，因为固体分数从摩擦干扰转变为随机密堆积。基于粒子的模拟揭示了观察到的现象对边界条件的敏感性。", "authors": [{"name": "Andreia F. Silva"}, {"name": "James A. Richards"}, {"name": "Fiona Jeffrey"}, {"name": "Rory E. O'Neill"}, {"name": "Daniel J. M. Hodgson"}, {"name": "Christopher Ness"}, {"name": "Wilson C. K. Poon"}], "featured_authors": [{"name": "Andreia F. Silva"}, {"name": "James A. Richards"}, {"name": "Fiona Jeffrey"}, {"name": "Daniel J. M. Hodgson"}, {"name": "Christopher Ness"}, {"name": "Wilson C. K. Poon"}], "author_count": 7}, {"id": "2605.06514", "category": "cond-mat", "title": "Pair-Breaking and Dimensionality in Spin-Orbit Coupled Superconductors", "abstract": "The response of ultra-thin superconducting materials under parallel magnetic fields is often leveraged to obtain insight into the nature of the condensate, including features attributable to unconventional forms of pairing. Despite there being multiple competing mechanisms responsible for suppressing superconductivity, it is common for these analyses to overlook certain depairing channels. Here we report an analysis of thickness dependent superconductivity in thin films of \\ce{LaBi2} using the multi-mechanism Kharitonov-Feigel'man framework . By resolving field-enhanced superconductivity in the thin-limit, we obtain an estimate the role of spin exchange scattering, in addition to paramagnetic and orbital effects. Our analyses offer insight into how fundamental quantities such as the critical temperature as well as Pauli limit are defined, recasting the landscape for how scattering times in two-dimensional superconductors can be interpreted.", "url": "https://arxiv.org/abs/2605.06514", "type": "理论", "summary": "通常利用超薄超导材料在平行磁场下的响应来深入了解凝聚态的性质，包括非常规配对形式的特征。尽管存在多种相互竞争的机制来抑制超导性，但这些分析通常会忽略某些脱配对通道。在这里，我们报告了使用多机制 Kharitonov-Feigel'man 框架对 \\ce{LaBi2} 薄膜中的厚度相关超导性进行的分析。通过解析薄极限中的场增强超导性，除了顺磁和轨道效应之外，我们还对自旋交换散射的作用进行了估计。我们的分析提供了如何定义临界温度和泡利极限等基本量的见解，重塑了二维超导体中散射时间的解释方式。", "authors": [{"name": "Reiley Dorrian"}, {"name": "Mizuki Ohno"}, {"name": "Elena Williams"}, {"name": "Adrian Llanos"}, {"name": "Joseph Falson"}], "featured_authors": [{"name": "Reiley Dorrian"}, {"name": "Mizuki Ohno"}, {"name": "Elena Williams"}, {"name": "Adrian Llanos"}, {"name": "Joseph Falson"}], "author_count": 5}, {"id": "2605.06531", "category": "cond-mat", "title": "Non-Local Particle Flows Become Local When Considering Dissipative Stress", "abstract": "Dense granular and suspension flows under inhomogeneous shear exhibit persistent particle motion in regions where the local yield criterion is subcritical, an apparent breakdown of locality that has motivated the development of a generation of nonlocal rheological models. Using particle-resolved simulations of frictionless dense suspensions in two-dimensional Kolmogorov flow, we show that two independent considerations together account for this signature. First, replacing the conventional shear stress by a shear-rate-weighted dissipative stress $\\tau_W=\\langle \\tau \\dot \\gamma \\rangle/\\langle \\dot \\gamma \\rangle$, which isolates the component of stress that performs irreversible work, restores the homogeneous $\\mu(J)$ law throughout the bulk of the flow, with the inferred friction remaining strictly above yield. Second, a simple geometric mixing-length construction, applied with conventional stresses and requiring no fluctuation input, accounts for the residual sub-yielding within a sub-diameter layer at flow reversals. Each approach is based on a different philosophy and mechanism, and together they suggest that much of the apparent non-locality in this geometry and frictionless case is an artefact of how stress is measured and averaged rather than an intrinsic breakdown of local rheology.", "url": "https://arxiv.org/abs/2605.06531", "type": "理论+数值", "summary": "不均匀剪切下的致密颗粒和悬浮液流在局部屈服准则为亚临界的区域中表现出持续的颗粒运动，这是局部性的明显破坏，这促使了一代非局部流变模型的发展。使用二维柯尔莫哥洛夫流中无摩擦致密悬浮液的粒子解析模拟，我们表明两个独立的考虑因素共同解释了这一特征。首先，用剪切率加权耗散应力 $\\tau_W=\\langle \\tau \\dot \\gamma \\rangle/\\langle \\dot \\gamma \\rangle$ 替换传统的剪切应力，它隔离了执行不可逆功的应力分量，恢复了整个流动的均匀 $\\mu(J)$ 定律，推断的摩擦力严格保持在屈服之上。其次，简单的几何混合长度结构，施加常规应力并且不需要波动输入，解释了流动逆转时亚直径层内的残余亚屈服。\n\n每种方法都基于不同的原理和机制，并且它们共同表明，在这种几何形状和无摩擦情况下，许多明显的非局部性是应力测量和平均方式的人为因素，而不是局部流变学的内在破坏。", "authors": [{"name": "Martin Trulsson"}], "featured_authors": [{"name": "Martin Trulsson"}], "author_count": 1}, {"id": "2605.06539", "category": "cond-mat", "title": "On Fano effect in IR spectra of hydrogenated nanodiamonds", "abstract": "Hydrogenated nanodiamonds may show a \"transmission window\" in infra-red spectra in the vicinity of diamond Raman frequency. This phenomenon is a manifestation of resonance coupling of incident photons with continuum states (Fano resonance). Hpwever, precise mechanism of appearence of the resonance and of related conductivity - surface hydrogenation or specific type of surface reconstruction - remains debatable. We present detailed analysis of infra-red spectra of nanodiamonds of different sizes (2.6-30 nm) possessing the \"transmission window\" and show that the C-H stretch vibrations of adsorbed functional groups cannot be responsible the the Fano resonance. At the same time, it is suggested that a bending mode of monohydride termination on nanodiamond (111) face may couple with diamond optical phonon, explaining the Fano resonance in some cases. The relative importance of the monohydride contribution and of the graphitic islets to the appearence of the \"transmission window\" and conductivity is likely dependent on dominating morphology and size distribution of nanodiamond grains.", "url": "https://arxiv.org/abs/2605.06539", "type": "理论", "summary": "氢化纳米金刚石可以在金刚石拉曼频率附近的红外光谱中显示出“传输窗口”。这种现象是入射光子与连续态的共振耦合（法诺共振）的表现。然而，共振和相关电导率出现的精确机制——表面氢化或特定类型的表面重建——仍然存在争议。我们对具有“传输窗口”的不同尺寸（2.6-30 nm）纳米金刚石的红外光谱进行了详细分析，并表明吸附官能团的 C-H 伸缩振动不能解释法诺共振。同时，有人提出纳米金刚石（111）面上一氢化物终端的弯曲模式可能与金刚石光学声子耦合，从而解释了某些情况下的法诺共振。一氢化物贡献和石墨岛对“传输窗口”和电导率的出现的相对重要性可能取决于纳米金刚石颗粒的主要形态和尺寸分布。", "authors": [{"name": "Andrei A. Shiryaev"}, {"name": "Evgeni A. Ekimov"}], "featured_authors": [{"name": "Andrei A. Shiryaev"}, {"name": "Evgeni A. Ekimov"}], "author_count": 2}, {"id": "2605.06543", "category": "cond-mat", "title": "A Rayleigh criterion for mechanical instability: inducing activity by chemo-mechanical coupling", "abstract": "Instabilities in thermodynamic systems are often undesirable, as they can lead to loss of control or even catastrophic behavior. Yet, the same mechanisms can also generate rich nonequilibrium behavior and may play a constructive role in living systems. We introduce a theoretical framework, inspired by Rayleigh's analysis of thermoacoustic instabilities, to study the emergence of mechanical activity. In particular, we derive Rayleigh-like criteria governing the onset of activity and the generation of rotational motion in a slow Newtonian probe coupled to driven chemical processes, described by Markov jump processes. These criteria are expressed in terms of the phase relation between entropic and frenetic contributions, providing a transparent condition for when chemical driving results in sustained rotational or active mechanical motion.", "url": "https://arxiv.org/abs/2605.06543", "type": "理论", "summary": "热力学系统的不稳定性通常是不受欢迎的，因为它们可能导致失控甚至灾难性的行为。然而，同样的机制也可以产生丰富的非平衡行为，并可能在生命系统中发挥建设性作用。受瑞利热声不稳定性分析的启发，我们引入了一个理论框架来研究机械活动的出现。特别是，我们推导出了类似瑞利的标准，该标准控制着与驱动化学过程耦合的慢速牛顿探针中的活动开始和旋转运动的产生，由马尔可夫跳跃过程描述。这些标准以熵和狂热贡献之间的相位关系来表达，为化学驱动导致持续旋转或主动机械运动提供了透明的条件。", "authors": [{"name": "Aaron Beyen"}, {"name": "Francesco Casini"}, {"name": "Christian Maes"}], "featured_authors": [{"name": "Aaron Beyen"}, {"name": "Francesco Casini"}, {"name": "Christian Maes"}], "author_count": 3}, {"id": "2605.06551", "category": "cond-mat", "title": "Twisted Kagome Bilayers: Higher-Order Magic Angles, Topological Flat Bands, and Sublattice Interference", "abstract": "We develop a low-energy continuum model to describe the moiré physics of heterostructures, which is a generalization of the celebrated Bistritzer-MacDonald (BM) method [R. Bistritzer and A. H. MacDonald, Proc. Natl. Acad. Sci. U.S.A. 108, 12233 (2011)]. We take as an example the moiré physics of electrons in twisted bilayer kagomé (TBK) metals near $1/3$ filling where monolayer Dirac cones lie. We demonstrate the emergence of higher-order magic angles where significant local band flattening occurs as a high-order Van Hove singularity emerges and show how twisting alone can induce non-trivial topology. We, furthermore, show that while sublattice interference effects are present, their role is not as prominent as in monolayer kagome.", "url": "https://arxiv.org/abs/2605.06551", "type": "理论", "summary": "我们开发了一个低能连续介质模型来描述异质结构的莫尔物理，这是著名的 Bistritzer-MacDonald (BM) 方法 [R. Bistritzer 和 A. H. MacDonald，Proc。国家。阿卡德。科学。美国 108, 12233 (2011)]。我们以单层狄拉克锥所在的 1/3$ 填充附近的扭曲双层 Kagomé (TBK) 金属中的电子莫尔物理为例。我们证明了高阶魔角的出现，其中随着高阶范霍夫奇点的出现，会发生显着的局部能带平坦化，并展示了单独的扭曲如何引起非平凡的拓扑。此外，我们还表明，虽然存在亚晶格干涉效应，但其作用并不像单层戈薇那样突出。", "authors": [{"name": "David T. S. Perkins"}, {"name": "Joseph J. Betouras"}], "featured_authors": [{"name": "David T. S. Perkins"}, {"name": "Joseph J. Betouras"}], "author_count": 2}, {"id": "2605.06574", "category": "cond-mat", "title": "Molecular dynamics simulation study of mechanical properties of 3C-SiC with extended defects", "abstract": "In this study, large-scale molecular dynamics simulations with the Vashishta potential and the analytic bond-order potential (ABOP) were performed to investigate the effect of extended defects on the elastic properties of cubic silicon carbide (3C-SiC). Specifically, we focused on systems containing Shockley partial dislocations terminating stacking faults, along with double and triple dislocation complexes. The changes in the independent elastic stiffness constants C11, C12 and C44 upon varying the mentioned extended defects concentrations were quantified. Using the values of these constants, the effective bulk, shear, and Young's moduli were calculated for different defect types and concentrations. The moduli were calculated along particular crystallographic directions aligned with the mentioned defect configurations as well as evaluated using Voigt-Reuss-Hill averaging to provide overall orientation-independent characterization of the defect-altered lattice. The obtained results reveal a general trend of diminishing the material's stiffness with increasing densities of Shockley partial dislocations and dislocation complexes. Depending on the defect configuration, the average elastic moduli decrease by up to approximately 6 % with the Vashishta potential and up to about 4 % using the analytic bond-order potential. At this, triple dislocation complexes induce smaller perturbations. These findings demonstrate that extended defect networks can measurably modify the elastic response of 3C-SiC and should be considered in further scientific research and practical applications of this material.", "url": "https://arxiv.org/abs/2605.06574", "type": "理论+数值", "summary": "在本研究中，利用 Vashishta 势和解析键序势 (ABOP) 进行了大规模分子动力学模拟，以研究扩展缺陷对立方碳化硅 (3C-SiC) 弹性性能的影响。具体来说，我们重点关注包含终止堆垛层错的肖克利部分位错以及双位错和三位错复合体的系统。对改变上述扩展缺陷浓度时独立弹性刚度常数 C11、C12 和 C44 的变化进行了量化。使用这些常数的值，计算不同缺陷类型和浓度的有效体积模量、剪切模量和杨氏模量。沿着与上述缺陷配置对齐的特定晶体方向计算模量，并使用 Voigt-Reuss-Hill 平均进行评估，以提供缺陷改变晶格的与方向无关的整体表征。获得的结果揭示了随着肖克利部分位错和位错复合体密度的增加，材料的刚度减小的总体趋势。\n\n根据缺陷配置，使用 Vashishta 势时，平均弹性模量最多可降低 6% 左右；使用解析键序势时，平均弹性模量最多可降低 4% 左右。此时，三重位错复合体引起较小的扰动。这些发现表明，扩展缺陷网络可以显着改变 3C-SiC 的弹性响应，在该材料的进一步科学研究和实际应用中应予以考虑。", "authors": [{"name": "Serhii Shmahlii"}, {"name": "Andrey Sarikov"}], "featured_authors": [{"name": "Serhii Shmahlii"}, {"name": "Andrey Sarikov"}], "author_count": 2}, {"id": "2605.06645", "category": "cond-mat", "title": "Electrically controlled Heat Assisted Magnetic Recording in Intercalated 2D Magnets", "abstract": "The ever-increasing demand for fast, reliable, and energy-efficient information storage continues to push magnetic memory technologies toward their fundamental limits. Conventional scaling strategies, which rely on reducing bit size, inevitably run into the \"magnetic recording trilemma,\" where signal-to-noise ratio, thermal stability, and writability cannot all be optimized simultaneously. Heat-assisted magnetic recording (HAMR) has emerged as the leading solution, enabling high-density storage by transiently heating the medium during the write cycle. However, the reliance on laser optics and plasmonic transducers restricts HAMR primarily to hard-disk drives, limiting its integration with on-chip or embedded architectures. Here, we demonstrate an electronic variant of HAMR in which Joule heating from low-current density current pulses facilitates data writing, while the anomalous Hall effect provides electronic readout. Employing intercalated 2D magnet Ni$_{1/4}$TaSe$_2$, we show direct evidence that current pulses heat the material above its Curie temperature, during which a small magnetic field of ~2mT (100 times smaller than the coercive field) enables efficient data writing. The all-electronic approach combined with the 2D magnetic medium creates timely opportunities to revisit the energy-assisted magnetization recording, enabling new recording schemes that combine fundamental novelty with technological impact.", "url": "https://arxiv.org/abs/2605.06645", "type": "数值", "summary": "对快速、可靠和节能信息存储的不断增长的需求继续将磁存储技术推向其基本极限。传统的缩放策略依赖于减小位大小，不可避免地会遇到“磁记录三难困境”，即信噪比、热稳定性和可写性无法同时优化。热辅助磁记录 (HAMR) 已成为领先的解决方案，通过在写入周期期间瞬时加热介质来实现高密度存储。然而，对激光光学和等离子体传感器的依赖将 HAMR 主要限制在硬盘驱动器上，从而限制了其与片上或嵌入式架构的集成。在这里，我们演示了 HAMR 的电子变体，其中低电流密度电流脉冲产生的焦耳热有利于数据写入，而反常霍尔效应则提供电子读出。采用插层二维磁体 Ni$_{1/4}$TaSe$_2$，我们展示了直接证据，表明电流脉冲将材料加热到居里温度以上，在此期间约 2mT 的小磁场（比矫顽场小 100 倍）可以实现高效的数据写入。\n\n全电子方法与二维磁介质相结合，为重新审视能量辅助磁化记录创造了及时的机会，从而实现了将基本新颖性与技术影响相结合的新记录方案。", "authors": [{"name": "Josue Rodriguez"}, {"name": "Ruishi Qi"}, {"name": "Catherine Xu"}, {"name": "Feng Wang"}, {"name": "James G. Analytis"}, {"name": "Hossein Taghinejad"}], "featured_authors": [{"name": "Josue Rodriguez"}, {"name": "Ruishi Qi"}, {"name": "Catherine Xu"}, {"name": "Feng Wang"}, {"name": "James G. Analytis"}, {"name": "Hossein Taghinejad"}], "author_count": 6}, {"id": "2605.06649", "category": "cond-mat", "title": "Colossal Magnetoresistance and Phonon Driven Exchange Dynamics in Eu$_5$Sn$_2$As$_6$", "abstract": "The emergence of colossal magnetoresistance in a new generation of Eu$^{2+}$-based antiferromagnets is intriguing given stark contrasts to the archetypal perovskite manganites and doped Eu-chalcogenides. In this study the thermal conductivity and magnetostriction of Eu$_5$Sn$_2$As$_6$ -- one such representative -- have been measured to better understand the role of the crystal lattice. Both properties are strongly field-dependent and mirr
