oe Kjelsnes"}, {"name": "Eirik Eik Svanes"}, {"name": "Vegard Undheim"}], "featured_authors": [{"name": "Eirik Høgmoe Kjelsnes"}, {"name": "Eirik Eik Svanes"}, {"name": "Vegard Undheim"}], "author_count": 3}, {"id": "2604.12207", "category": "hep-th", "title": "Arithmetic turbulence: Algebraic derivation of the Euler ensemble attractor", "abstract": "The Euler ensemble was recently supported by large-scale ($4096^3$) direct numerical simulations as the universal statistical attractor of decaying fluid turbulence. Previous mathematical derivations of this ensemble relied on measure-theoretic limits of discrete polygonal loop equations. In this Letter, we present a continuous algebraic derivation. By reformulating the Navier-Stokes equation as a covariant derivative operator flow in the Lagrangian frame, we analytically eliminate advection. Applying Feynman's operational calculus, the 3D non-commutative operator algebra maps to ordering discontinuities (finite-difference jumps) on a 1D momentum loop. This continuous formalism reduces to the discrete, number-theoretic geometric quantization of the Euler ensemble via roots of unity without requiring spatial lattice approximations, demonstrating that macroscopic fluid chaos is a deterministic projection of the Farey sequence.", "url": "https://arxiv.org/abs/2604.12207", "type": "理论", "summary": "欧拉系综最近得到了大规模（$4096^3$）直接数值模拟的支持，作为衰减流体湍流的通用统计吸引子。该系综先前的数学推导依赖于离散多边形环方程的测度理论限制。在这封信中，我们提出了连续代数推导。通过将纳维-斯托克斯方程重新表述为拉格朗日框架中的协变导数算子流，我们分析地消除了平流。应用费曼的运算微积分，3D 非交换算子代数映射到 1D 动量环上的有序不连续性（有限差分跳跃）。这种连续形式主义通过统一根简化为欧拉系综的离散数论几何量化，而不需要空间晶格近似，证明宏观流体混沌是法雷序列的确定性投影。", "authors": [{"name": "Alexander Migdal"}], "featured_authors": [{"name": "Alexander Migdal"}], "author_count": 1}, {"id": "2604.12716", "category": "hep-th", "title": "Fermion-fermion scattering in a Rarita-Schwinger model with Yukawa-like interaction", "abstract": "In this work, we investigate the scattering of spin-$3/2$ fermionic particles mediated by a Yukawa-like coupling in the context of the massive Rarita-Schwinger model. The interaction is introduced by replacing $m \\to m_{\\psi} + g\\phi$ in the free spin-$3/2$ Lagrangian. The analysis is performed at both zero and finite temperatures. In the latter case, thermal effects are incorporated using the Thermofield Dynamics (TFD) formalism. In both regimes, we obtain the differential and total cross sections and examine their behavior in the short-range ($m_{\\phi} \\neq 0$) and long-range ($m_{\\phi} = 0$) limits, in order to analyze the influence of zero- and finite-temperature effects.", "url": "https://arxiv.org/abs/2604.12716", "type": "理论", "summary": "在这项工作中，我们研究了在大规模 Rarita-Schwinger 模型的背景下由类 Yukawa 耦合介导的自旋 $3/2$ 费米子粒子的散射。通过将自由旋转 $3/2$ 拉格朗日中的 $m \\ 替换为 m_{\\psi} + g\\phi$ 来引入相互作用。分析在零温度和有限温度下进行。在后一种情况下，使用热场动力学 (TFD) 形式结合热效应。在这两种情况下，我们都获得了微分截面和总截面，并检查了它们在短程 ($m_{\\phi} \\neq 0$) 和长程 ($m_{\\phi} = 0$) 限制下的行为，以分析零温度和有限温度效应的影响。", "authors": [{"name": "M. C. Araújo"}, {"name": "J. G. Lima"}, {"name": "J. Furtado"}, {"name": "T. Mariz"}], "featured_authors": [{"name": "M. C. Araújo"}, {"name": "J. G. Lima"}, {"name": "J. Furtado"}, {"name": "T. Mariz"}], "author_count": 4}, {"id": "2604.12826", "category": "hep-th", "title": "Symmetries of massless QCD", "abstract": "We present a pedagogical review of certain exact theoretical results concerning the physics of an imaginary world where one quark or more are deprived of their masses.", "url": "https://arxiv.org/abs/2604.12826", "type": "理论", "summary": "我们对有关一个或多个夸克被剥夺质量的想象世界的物理学的某些精确理论结果进行了教学回顾。", "authors": [{"name": "A.V. Smilga"}], "featured_authors": [{"name": "A.V. Smilga"}], "author_count": 1}, {"id": "2604.12854", "category": "hep-th", "title": "Mixed-helicity bracket of celestial symmetries", "abstract": "Celestial symmetries of gravity and gauge theory can be enhanced to a $w_{1+\\infty}$ algebra and an $S$-algebra respectively, when restricting to a single graviton/gluon helicity sector. Difficulties in combining both sectors in the full theory have been pointed out in the previous literature. In this work, we face this problem from the covariant phase space perspective and analyze in detail the structure of the mixed-helicity bracket of the higher-spin charges for both gravity and Yang--Mills theory. We show that, when restricting one of the two helicities to the wedge sector, a closed algebra can be obtained for all spins in terms of a notion of shadow charge we introduce. Furthermore, when focusing on the lower spin subalgebra sectors, in the case of gravity, we show that a dual mass extension of the BMS algebra can be consistently constructed; in the case of Maxwell theory, inclusion of magnetic charges allows us to recover a non-vanishing expression for the electromagnetic central charge previously obtained through different methods.", "url": "https://arxiv.org/abs/2604.12854", "type": "理论", "summary": "当限制于单个引力子/胶子螺旋扇区时，引力和规范理论的天体对称性可以分别增强为 $w_{1+\\infty}$ 代数和 $S$-代数。先前的文献已经指出了在完整的理论中将这两个部分结合起来的困难。在这项工作中，我们从协变相空间的角度面对这个问题，并详细分析了重力和杨-米尔斯理论的高自旋电荷的混合螺旋支架的结构。我们证明，当将两个螺旋之一限制在楔形扇区时，根据我们引入的影子电荷概念，可以为所有自旋获得一个封闭代数。此外，当关注低自旋子代数部分时，在重力情况下，我们表明可以一致地构造 BMS 代数的双质量扩展；就麦克斯韦理论而言，包含磁荷使我们能够恢复先前通过不同方法获得的电磁中心电荷的非零表达式。", "authors": [{"name": "Daniele Pranzetti"}, {"name": "Domenico Giuseppe Salluce"}], "featured_authors": [{"name": "Daniele Pranzetti"}, {"name": "Domenico Giuseppe Salluce"}], "author_count": 2}, {"id": "2604.12873", "category": "hep-th", "title": "The Hidden Symmetries of Yang-Mills Theory in (1+1)-dimensions", "abstract": "We present an integral formulation of classical Yang-Mills theory coupled to fermionic and scalar matter fields in (1+1)-dimensional Minkowski spacetime. By reformulating the local dynamics in terms of loop-space holonomies, we demonstrate that the path independence of the holonomy eigenvalues constitutes a conservation law, yielding an infinite hierarchy of gauge-invariant, dynamically conserved charges. While a zero-curvature equation is associated with a necessary condition for this path invariance, we note that it is not strictly sufficient on its own. Employing a first-order symplectic formalism, we show that these non-abelian charges generate global symmetry transformations on the fundamental phase-space variables. We rigorously prove that these transformations preserve the physical dynamics, leaving the total Hamiltonian invariant up to first-class constraints. Furthermore, an analysis of the Poisson algebra reveals that these conserved charges are in involution, provided the boundary integration constant lies within the center of the gauge group. This exact, lower-dimensional framework provides a highly tractable setting to investigate the algebraic structures of these hidden symmetries and the meaning of the conserved charges as physical observables, establishing a classical foundation for exploring their role in the quantum regime, such as in strongly coupled lattice gauge theories.", "url": "https://arxiv.org/abs/2604.12873", "type": "理论", "summary": "我们提出了经典杨-米尔斯理论与 (1+1) 维闵可夫斯基时空中的费米子和标量物质场耦合的积分公式。通过用循环空间完整函数重新表述局部动力学，我们证明了完整函数特征值的路径独立性构成了守恒定律，从而产生了规范不变的动态守恒电荷的无限层次结构。虽然零曲率方程与该路径不变性的必要条件相关，但我们注意到它本身并不够严格。采用一阶辛形式主义，我们证明这些非交换电荷在基本相空间变量上产生全局对称变换。我们严格证明这些变换保留了物理动力学，使总哈密顿量不变量达到一流的约束。此外，泊松代数的分析表明，只要边界积分常数位于规范组的中心内，这些守恒电荷就会对合。\n\n这种精确的低维框架提供了一个高度易于处理的环境来研究这些隐藏对称性的代数结构以及守恒电荷作为物理可观测量的含义，为探索它们在量子体系中的作用奠定了经典基础，例如在强耦合晶格规范理论中。", "authors": [{"name": "L. A. Ferreira"}, {"name": "G. Luchini"}, {"name": "H. Malavazzi"}], "featured_authors": [{"name": "L. A. Ferreira"}, {"name": "G. Luchini"}, {"name": "H. Malavazzi"}], "author_count": 3}, {"id": "2604.12910", "category": "hep-th", "title": "Infrared Spectral Gap in a Gluonic Dark Sector as the Origin of the Galactic Acceleration Scale", "abstract": "The radial acceleration relation reveals a nearly universal acceleration scale of order $10^{-10}\\,\\mathrm{ms^{-2}}$ in galactic dynamics, whose origin remains unexplained within conventional cold dark matter scenarios. We propose that this scale arises from an intrinsic infrared spectral property of the dark sector. Specifically, we hypothesize that a long-lived, color-neutral gluonic vacuum component survives the post-inflationary expansion era and, at large distances, develops a spectrally rigid lowest-weight structure. The microscopic seed for this infrared organization is provided by the QCD trace anomaly, which breaks classical scale invariance and, through dimensional transmutation, generates an intrinsic infrared scale in the gluonic sector. Requiring Lorentz covariance together with a positive-energy lowest-weight unitary realization then selects the Anti de Sitter algebra $\\mathfrak{so}(2,3)$ as the simplest symmetry admitting a discrete tower of states with a representation-theoretically protected gap. The associated gap introduces a finite correlation length $r_{\\texttt{c}}$ that controls the large-scale coherence of the dark sector. A self-gravitating condensate dominated by the lowest-weight mode generates a characteristic acceleration $g^{}_\\star = G M_h / r_{\\texttt{c}}^2$, naturally of the same order as the observed galactic acceleration scale, within standard Newtonian gravity. In this framework, the galactic acceleration scale appears as the gravitational imprint of a trace-anomaly-seeded infrared spectral gap in a coherent gluonic dark sector, rather than as a consequence of modified gravity or of galaxy-by-galaxy formation histories.", "url": "https://arxiv.org/abs/2604.12910", "type": "理论", "summary": "径向加速度关系揭示了星系动力学中几乎普遍存在的$10^{-10}\\,\\mathrm{ms^{-2}}$量级的加速度尺度，其起源在传统的冷暗物质场景中仍然无法解释。我们认为这个尺度是由暗区固有的红外光谱特性产生的。具体来说，我们假设一种寿命长、颜色中性的胶子真空成分在后膨胀时代中幸存下来，并且在很远的距离上形成了光谱刚性的最低重量结构。这种红外组织的微观种子是由 QCD 迹异常提供的，它打破了经典的尺度不变性，并通过维度嬗变，在胶子区域产生了固有的红外尺度。需要洛伦兹协方差以及正能量最低权重酉实现，然后选择反德西特代数 $\\mathfrak{so}(2,3)$ 作为最简单的对称性，允许具有表示理论上受保护的间隙的离散态塔。相关的间隙引入了有限的相关长度$r_{\\texttt{c}}$来控制暗区的大规模相干性。\n\n由最低重量模式主导的自引力凝聚体产生特征加速度 $g^{}_\\star = G M_h / r_{\\texttt{c}}^2$，自然与标准牛顿重力内观测到的银河加速度尺度相同。在这个框架中，星系加速尺度表现为相干胶子暗区中微量异常种子红外光谱间隙的引力印记，而不是引力修正或逐个星系形成历史的结果。", "authors": [{"name": "Gilles Cohen-Tannoudji"}, {"name": "Jean-Pierre Gazeau"}, {"name": "Hamed Pejhan"}, {"name": "Jean-Pierre Treuil"}], "featured_authors": [{"name": "Gilles Cohen-Tannoudji"}, {"name": "Jean-Pierre Gazeau"}, {"name": "Hamed Pejhan"}, {"name": "Jean-Pierre Treuil"}], "author_count": 4}, {"id": "2604.12980", "category": "hep-th", "title": "State counting in gravity and maximal entropy principle", "abstract": "It is known that the semiclassical approximation to the gravity path integral can be leveraged to explain certain inherently quantum aspects of gravity. One such aspect is the state-counting interpretation of the Bekenstein-Hawking entropy of black holes. A second aspect is the Page curve for the entanglement entropy of Hawking radiation, which agrees with expectations from unitarity. We show that these two questions are equivalent from the gravity path integral point of view. In particular, the Hawking's information loss puzzle gets resolved automatically by considering any (over)complete basis of black hole microstates which is compatible with black hole entropy. The tool which relates the two questions is a convex optimization problem for the von Neumann entropy of Hawking radiation.", "url": "https://arxiv.org/abs/2604.12980", "type": "理论", "summary": "众所周知，重力路径积分的半经典近似可以用来解释重力的某些固有的量子方面。其中之一是黑洞贝肯斯坦-霍金熵的状态计数解释。第二个方面是霍金辐射纠缠熵的佩奇曲线，它与幺正性的期望一致。我们证明从重力路径积分的角度来看这两个问题是等价的。特别是，通过考虑与黑洞熵兼容的黑洞微观状态的任何（过）完整基础，霍金的信息丢失难题可以自动解决。将这两个问题联系起来的工具是霍金辐射冯诺依曼熵的凸优化问题。", "authors": [{"name": "Juan Hernandez"}, {"name": "Mikhail Khramtsov"}], "featured_authors": [{"name": "Juan Hernandez"}, {"name": "Mikhail Khramtsov"}], "author_count": 2}, {"id": "2604.11976", "category": "math-ph", "title": "Effective Dynamics for the Bose Polaron in the Large-Volume Mean-Field Limit", "abstract": "We consider the dynamics of the Bose polaron system, a dense quantum gas consisting of $N$ bosons evolving in $\\mathbb{R}^3$ in the presence of an impurity particle. The system is studied in the mean-field scaling with initially high density $\\rho$ and large volume $\\Lambda$ of the gas. In the initial state, almost all bosons are in the Bose-Einstein condensate, with a few excitations. We derive from the microscopic dynamics, in the joint limit of large densities and volumes, with the constraint $\\Lambda^3 \\ll \\rho$, the effective description by the translation-invariant Bogoliubov-Fröhlich Hamiltonian, which couples the quantum field of excitations linearly to the impurity particle.", "url": "https://arxiv.org/abs/2604.11976", "type": "理论", "summary": "我们考虑玻色极化子系统的动力学，这是一种由 $N$ 玻色子组成的致密量子气体，在存在杂质粒子的情况下在 $\\mathbb{R}^3$ 中演化。该系统在初始高密度 $\\rho$ 和大体积 $\\Lambda$ 的平均场标度中进行了研究。在初始状态下，几乎所有玻色子都处于玻色-爱因斯坦凝聚态，并有一些激发态。我们从微观动力学中推导出，在大密度和体积的联合极限下，约束 $\\Lambda^3 \\ll \\rho$ 是平移不变的 Bogoliubov-Fröhlich 哈密顿量的有效描述，它将激发的量子场线性耦合到杂质粒子。", "authors": [{"name": "Jonas Lampart"}, {"name": "Peter Pickl"}, {"name": "Siegfried Spruck"}], "featured_authors": [{"name": "Jonas Lampart"}, {"name": "Peter Pickl"}, {"name": "Siegfried Spruck"}], "author_count": 3}, {"id": "2604.12111", "category": "math-ph", "title": "Quantum mechanical model for charge excitation: Surface binding and dispersion", "abstract": "By an idealized quantum mechanical model, we formally describe the dispersion of nonretarded electromagnetic surface waves that express charge density oscillations near a fixed plane in three spatial dimensions (3D) at zero temperature. Our goal is to capture the interplay of microscopic scales that include a confinement length in the emergence of the surface plasmon, a collective low-energy charge excitation in the vicinity of the plane. We start with a time-dependent Hartree-type equation in 3D. This model accounts for particle binding to the plane and the repulsive Coulomb interaction associated with the induced charge density relative to the ground state. By linearizing the equation of motion, we formulate a homogeneous integral equation for the scattering amplitude of the particle wave function in the (z-) coordinate vertical to the plane. For a binding potential proportional to a negative delta function and symmetric-in-z wave function, we apply the Laplace transform with respect to positive z and convert the integral equation into a functional equation that involves several values of the transformed solution. The scattering amplitude and dispersion relation are derived exactly in terms of rapidly convergent series via the Mittag-Leffler theorem. In the semiclassical regime, our result furnishes an asymptotic expansion for the energy excitation spectrum. The leading-order term is found in agreement with the prediction of a classical hydrodynamic model based on a projected-Euler-Poisson system.", "url": "https://arxiv.org/abs/2604.12111", "type": "理论", "summary": "通过理想化的量子力学模型，我们正式描述了非延迟电磁表面波的色散，这些表面波表达了零温度下三个空间维度 (3D) 中固定平面附近的电荷密度振荡。我们的目标是捕捉微观尺度的相互作用，其中包括表面等离子体激元出现时的限制长度，表面等离子体是平面附近的集体低能电荷激发。我们从 3D 中与时间相关的 Hartree 型方程开始。该模型解释了粒子与平面的结合以及与相对于基态的感应电荷密度相关的排斥库仑相互作用。通过对运动方程进行线性化，我们为粒子波函数在垂直于平面的 (z) 坐标中的散射幅度制定了齐次积分方程。对于与负 delta 函数和 z 轴对称波函数成比例的结合势，我们应用相对于正 z 的拉普拉斯变换，并将积分方程转换为涉及变换解的多个值的函数方程。\n\n散射幅度和色散关系是通过 Mittag-Leffler 定理根据快速收敛级数精确导出的。在半经典体系中，我们的结果提供了能量激发谱的渐近展开。发现主阶项与基于投影欧拉-泊松系统的经典流体动力学模型的预测一致。", "authors": [{"name": "Dionisios Margetis"}], "featured_authors": [{"name": "Dionisios Margetis"}], "author_count": 1}, {"id": "2604.12393", "category": "math-ph", "title": "The parity operator for parafermions and parabosons", "abstract": "In this paper we reexamine the definition of parafermions and parabosons by means of Green's triple relations, and extend these relations by including a parity operator $P$ which is also determined by means of triple relations. As a consequence, we are dealing with new algebraic structures. It is shown that the algebra underlying a set of $n$ parafermions together with $P$ is the orthogonal Lie algebra $so(2n+2)$. The Fock spaces correspond to particular irreducible representations of $so(2n+2)$, and the action of $P$ in these spaces leads to interesting observations. Next, we show that the algebra underlying a set of $n$ parabosons together with $P$ is the orthosymplectic Lie superalgebra $osp(2|2n)$. In this case, the Fock spaces correspond to certain irreducible infinite-dimensional representations of $osp(2|2n)$. Both for parafermions and parabosons the spectrum of $P$ is closely related to the so-called order of statistics $p$, introduced by Green.", "url": "https://arxiv.org/abs/2604.12393", "type": "理论", "summary": "在本文中，我们通过格林三重关系重新审视了对费米子和抛玻色子的定义，并通过包含同样由三重关系确定的宇称算子$P$来扩展这些关系。因此，我们正在处理新的代数结构。结果表明，一组 $n$ 副费米子与 $P$ 的基础代数是正交李代数 $so(2n+2)$。 Fock 空间对应于 $so(2n+2)$ 的特定不可约表示，$P$ 在这些空间中的作用导致了有趣的观察。接下来，我们证明一组 $n$ 抛物子与 $P$ 一起的代数是正交李超代数 $osp(2|2n)$。在这种情况下，Fock 空间对应于 $osp(2|2n)$ 的某些不可约无限维表示。对于平费米子和抛玻色子来说，$P$ 的频谱都与 Green 引入的所谓统计顺序 $p$ 密切相关。", "authors": [{"name": "N.I. Stoilova"}, {"name": "J. Van der Jeugt"}], "featured_authors": [{"name": "N.I. Stoilova"}, {"name": "J. Van der Jeugt"}], "author_count": 2}, {"id": "2604.12402", "category": "math-ph", "title": "Contact Geometry of Relativistic Particle Motion", "abstract": "We introduce a new geometric framework for relativistic particle dynamics based on contact geometry and suitable for treating dissipative processes like particle decay. The dynamics is formulated on a nine--dimensional extended phase space consisting of four position coordinates, four momenta, and an additional variable (functioning as a geometric variant of the particle's proper time). In this setting, the evolution is generated by an evolution contact vector field with a contact Hamiltonian encoding the mass shell. By promoting the proper time to an independent variable, the relativistic Hamilton canonical equations are rewritten in a fully geometric form without having to identify the proper time with a parameter along the worldlines. This makes for instance the evolution of massless particles (photons) well-defined without the need of reparametrization. The framework is then applied to decaying particles. Finally, we formulate a covariant kinetic theory and show how decaying particles can be described geometrically in this framework, changing the entropy.", "url": "https://arxiv.org/abs/2604.12402", "type": "理论", "summary": "我们引入了一种基于接触几何的相对论粒子动力学的新几何框架，适用于处理粒子衰变等耗散过程。动力学是在九维扩展相空间上表述的，该空间由四个位置坐标、四个动量和一个附加变量（充当粒子固有时间的几何变体）组成。在此设置中，演化由演化接触向量场和编码质量壳的接触哈密顿量生成。通过将固有时间提升为自变量，相对论汉密尔顿正则方程可以以完全几何形式重写，而无需使用沿世界线的参数来识别固有时间。例如，这使得无质量粒子（光子）的演化得到明确定义，而无需重新参数化。然后将该框架应用于衰变粒子。最后，我们制定了协变动力学理论，并展示了如何在这个框架中以几何方式描述衰变粒子，从而改变熵。", "authors": [{"name": "Begum Atesli"}, {"name": "Ogul Esen"}, {"name": "Michal Pavelka"}], "featured_authors": [{"name": "Begum Atesli"}, {"name": "Ogul Esen"}, {"name": "Michal Pavelka"}], "author_count": 3}, {"id": "2604.12819", "category": "math-ph", "title": "Generalised (bi-)Hamiltonian structures of hydrodynamic type and (bi-)flat F-manifolds", "abstract": "We introduce the notions of generalised (bi-)Hamiltonian structures which generalise naturally the (bi-)Hamiltonian structures of evolutionary partial differential equations. In the hydrodynamic case, these structures are characterised in terms of geometric data. Furthermore, we show that a generalised (bi)-Hamiltonian structure of hydrodynamic type can be associated with any (bi-)flat F-manifold, and it is compatible with the corresponding principal hierarchy.", "url": "https://arxiv.org/abs/2604.12819", "type": "理论", "summary": "我们引入了广义（双）哈密顿结构的概念，它自然地概括了演化偏微分方程的（双）哈密顿结构。在流体动力学情况下，这些结构用几何数据来表征。此外，我们证明了流体动力类型的广义（双）哈密尔顿结构可以与任何（双）平面F流形相关联，并且它与相应的主层次结构兼容。", "authors": [{"name": "Paolo Lorenzoni"}, {"name": "Zhe Wang"}], "featured_authors": [{"name": "Paolo Lorenzoni"}, {"name": "Zhe Wang"}], "author_count": 2}, {"id": "2604.12822", "category": "math-ph", "title": "Conservative field equations and scalar fields (equations for leptons)", "abstract": "This paper proposes SU(2)-gauge-invariant field equations involving interaction with a scalar field. A connection with the Dirac equation is discussed.", "url": "https://arxiv.org/abs/2604.12822", "type": "理论", "summary": "本文提出了涉及与标量场相互作用的 SU(2)-规范不变场方程。讨论了与狄拉克方程的联系。", "authors": [{"name": "Nikolay Marchuk"}], "featured_authors": [{"name": "Nikolay Marchuk"}], "author_count": 1}, {"id": "2604.12858", "category": "math-ph", "title": "Scattering and inverse scattering for multipoint potentials at high energies", "abstract": "We consider the Schrödinger equation with a multipoint potential of Bethe-Peierls-Thomas-Fermi type. For this singular potential, we develop scattering and inverse scattering at high energies. In particular, in this framework, our results include analogs of the \"regular\" Born-Faddeev formula for the scattering amplitude and analogs of related \"regular\" inverse scattering reconstructions at high energies. Related results for scattering solutions at high energies are also presented.", "url": "https://arxiv.org/abs/2604.12858", "type": "理论", "summary": "我们考虑具有 Bethe-Peiierls-Thomas-Fermi 型多点势的薛定谔方程。对于这种奇异的势，我们开发了高能量下的散射和逆散射。特别是，在这个框架中，我们的结果包括散射幅度的“常规”Born-Faddeev 公式的类似物以及高能量下相关“常规”逆散射重建的类似物。还提供了高能量散射解决方案的相关结果。", "authors": [{"name": "P.C. Kuo"}, {"name": "R.G. Novikov"}], "featured_authors": [{"name": "P.C. Kuo"}, {"name": "R.G. Novikov"}], "author_count": 2}, {"id": "2604.12984", "category": "math-ph", "title": "A variationally consistent mesoscopic Cosserat theory with distributed defects and configurational forces", "abstract": "We develop a variationally consistent mesoscopic extension of Cosserat elasticity motivated by the breakdown of compatibility in classical formulations. By admitting compatibility-breaking perturbations, the classical theory ceases to remain closed under admissible variations, necessitating an enlargement of the constitutive framework. This leads naturally to a formulation in which torsion and curvature are treated as independent distributed measures of defects. The theory is constructed using a Palatini-type variational approach, with the coframe and connection as independent fields. The resulting Euler--Lagrange equations yield both the standard balance laws and defect-related excitation fields. Material invariance gives rise to configurational forces and moments, which emerge as Noether currents and are directly linked to defect transport governed by the Bianchi identities. The framework provides a unified description of defect kinematics, configurational mechanics, and microstructural evolution. Illustrative examples and numerical evaluations demonstrate how defect transport generates configurational forces and highlight the underlying Maxwell-type structure of the theory. The proposed formulation offers a consistent geometric foundation for the analysis of structured solids with evolving internal geometry and provides a basis for future developments in defect dynamics and dissipative processes.", "url": "https://arxiv.org/abs/2604.12984", "type": "理论", "summary": "我们开发了 Cosserat 弹性的变分一致介观扩展，其动机是经典配方中相容性的破坏。通过承认破坏相容性的扰动，经典理论不再在允许的变化下保持封闭状态，从而需要扩大本构框架。这自然导致了一种公式，其中扭转和曲率被视为缺陷的独立分布测量。该理论是使用 Palatini 型变分方法构建的，其中 coframe 和连接作为独立的字段。由此产生的欧拉-拉格朗日方程产生标准平衡定律和与缺陷相关的激励场。材料不变性产生构型力和力矩，它们以诺特电流的形式出现，并与比安奇恒等式控制的缺陷输运直接相关。该框架提供了缺陷运动学、构型力学和微观结构演化的统一描述。说明性示例和数值评估展示了缺陷输运如何产生构型力，并强调了该理论的潜在麦克斯韦型结构。\n\n所提出的公式为分析具有不断变化的内部几何形状的结构化固体提供了一致的几何基础，并为缺陷动力学和耗散过程的未来发展提供了基础。", "authors": [{"name": "Lev Steinberg"}], "featured_authors": [{"name": "Lev Steinberg"}], "author_count": 1}, {"id": "2604.11814", "category": "quant-ph", "title": "After 100 Years of Quantum Mechanics: Toward a Constructive Observation-Centered Perspective", "abstract": "Quantum mechanics owes much of its extraordinary success to a Hilbertian program of mathematical formalization. Yet, the formalism remains poorly aligned with the practical limitations of computations in finite dimensions and under finite accuracy. In this perspective, we argue that this mismatch points to the need for a new mathematical program: a rigorous constructive theory for effective descriptions to identify essential degrees of freedom. We propose an observation-centered point of view in which signals are treated as the primary objects of analysis, while wave functions and Hamiltonians are reconstructed as auxiliary structures to rationalize the observed data. Our starting point is a signal-based spectral equation that reformulates frequency analysis as an operator problem. We connect this point of view to results on prolate Fourier theory, spectral analysis with finite observation time, and short-time quantum simulation. We highlight a sharp accuracy transition relating necessary observation time to the effective spectral density of a signal for achieving accurate resolution. The resulting framework integrates approximation as a fundamental necessity more directly into the foundations of quantum mechanics and points toward a broader program for the effective description of complex quantum systems, such as those found in the molecular sciences.", "url": "https://arxiv.org/abs/2604.11814", "type": "理论+数值", "summary": "量子力学的非凡成功很大程度上归功于数学形式化的希尔伯特计划。然而，这种形式主义仍然与有限维度和有限精度下的计算的实际限制不太相符。从这个角度来看，我们认为这种不匹配表明需要一种新的数学程序：一种严格的构造性理论，用于有效描述以确定基本自由度。我们提出了一种以观测为中心的观点，其中信号被视为主要分析对象，而波函数和哈密顿量被重构为辅助结构，以使观测数据合理化。我们的出发点是基于信号的频谱方程，它将频率分析重新表述为一个算子问题。我们将这一观点与长傅里叶理论、有限观测时间谱分析和短时量子模拟的结果联系起来。我们强调了将必要的观察时间与信号的有效谱密度相关联的急剧精度转变，以实现精确的分辨率。\n\n由此产生的框架将近似作为一种基本必要性更直接地整合到量子力学的基础中，并指向一个更广泛的计划，以有效描述复杂的量子系统，例如分子科学中发现的系统。", "authors": [{"name": "Timothy Stroschein"}, {"name": "Markus Reiher"}], "featured_authors": [{"name": "Timothy Stroschein"}, {"name": "Markus Reiher"}], "author_count": 2}, {"id": "2604.11823", "category": "quant-ph", "title": "Perspectivist Account of Truth-Theoretic Semantics in Quantum Mechanics", "abstract": "According to various no-go results in the foundations of quantum mechanics, for any system associated to a Hilbert space of dimension higher than two, it is not possible to assign definite truth values to all propositions pertaining to the system without generating a Kochen-Specker contradiction. In this respect, the Bub-Clifton uniqueness theorem is utilized for arguing that truth-value definiteness is consistently restored with respect to a determinate sublattice of propositions defined by the state of the quantum system concerned and a particular observable to be measured. On this basis, a perspectivist/contextual account of truth valuation in the quantum domain is produced that satisfies Tarski's criterion of material adequacy for a theory of truth. In light of the latter, perspectivist truth conforms to perspective or context-bound correspondence of a de re nature, designating locally an objectively existing state of affairs. Such an account derives by virtue of the microphysical nature of physical reality in displaying a context-dependence of facts; thus, it essentially opposes a non-perspectival, metaphysically fixed point of reference, or a panoptical standpoint from which to state all facts of nature.", "url": "https://arxiv.org/abs/2604.11823", "type": "理论", "summary": "根据量子力学基础中的各种不可行的结果，对于任何与高于二维的希尔伯特空间相关的系统，不可能在不产生科亨-斯佩克矛盾的情况下为与该系统有关的所有命题分配明确的真值。在这方面，布布-克利夫顿唯一性定理用于论证，对于由相关量子系统的状态和要测量的特定可观测值定义的命题的确定子格，真值确定性是一致恢复的。在此基础上，产生了量子领域中真理评估的透视主义/语境解释，满足塔斯基关于真理理论的物质充足性标准。鉴于后者，视角主义真理符合观点或上下文相关的自然对应，局部指定客观存在的事态。\n\n这种解释源于物理现实的微观物理性质，显示了事实的背景依赖性；因此，它本质上反对一种非透视的、形而上学固定的参照点，或者一种全景的立场来陈述所有自然事实。", "authors": [{"name": "Vassilios Karakostas"}], "featured_authors": [{"name": "Vassilios Karakostas"}], "author_count": 1}, {"id": "2604.11825", "category": "quant-ph", "title": "Quantum algorithms for Young measures: applications to nonlinear partial differential equations", "abstract": "Many nonlinear PDEs have singular or oscillatory solutions or may exhibit physical instabilities or uncertainties. This requires a suitable concept of physically relevant generalized solutions. Dissipative measure-valued solutions have been an effective analytical tool to characterize PDE behavior in such singular regimes. They have also been used to characterize limits of standard numerical schemes on classical computers. The measure-valued formulation of a nonlinear PDE yields an optimization problem with a linear cost functional and linear constraints, which can be formulated as a linear programming problem. However, this linear programming problem can suffer from the curse of dimensionality. In this article, we propose solving it using quantum linear programming (QLP) algorithms and discuss whether this approach can reduce costs compared to classical algorithms. We show that some QLP algorithms, such as the quantum central path algorithm, have up to polynomial advantage over the classical interior point method. For problems where one is interested in the dissipative weak solution, namely the expected values of the Young measure, we show that the QLP algorithms offer no advantage over direct classical solvers. Moreover, for random PDEs, there can be up to polynomial advantage in obtaining the Young measure over direct classical PDE solvers. This is a significant advantage over standard PDE solvers, since the Young measure provides a more detailed description of the solution. We also propose some open questions for future development in this direction.", "url": "https://arxiv.org/abs/2604.11825", "type": "理论+数值", "summary": "许多非线性偏微分方程具有奇异或振荡解，或者可能表现出物理不稳定性或不确定性。这需要物理相关的通用解决方案的适当概念。耗散测值解已成为描述此类奇异状态下偏微分方程行为的有效分析工具。它们还被用来描述经典计算机上标准数值方案的限制。非线性偏微分方程的测值公式产生具有线性成本函数和线性约束的优化问题，可以将其公式化为线性规划问题。然而，这个线性规划问题可能会受到维数灾难的影响。在本文中，我们建议使用量子线性规划（QLP）算法来解决它，并讨论与经典算法相比，这种方法是否可以降低成本。我们证明了一些 QLP 算法，例如量子中心路径算法，比经典内点方法具有多项式优势。\n\n对于对耗散弱解（即杨氏测度的期望值）感兴趣的问题，我们表明 QLP 算法比直接经典求​​解器没有任何优势。此外，对于随机偏微分方程，与直接经典偏微分方程求解器相比，在获得杨氏测度方面可能具有多项式优势。与标准 PDE 求解器相比，这是一个显着的优势，因为杨氏测度提供了解决方案的更详细描述。我们还为这个方向的未来发展提出了一些悬而未决的问题。", "authors": [{"name": "Shi Jin"}, {"name": "Nana Liu"}, {"name": "Maria Lukacova-Medvidova"}, {"name": "Yuhuan Yuan"}], "featured_authors": [{"name": "Shi Jin"}, {"name": "Nana Liu"}, {"name": "Maria Lukacova-Medvidova"}, {"name": "Yuhuan Yuan"}], "author_count": 4}, {"id": "2604.11830", "category": "quant-ph", "title": "A skepticism on the concept of quantum state related to quantum field theory on curved spacetime", "abstract": "Some skeptical arguments on the physical reality of quantum states are given. First, I argue that the algebraic formalism of quantum field theory in curved spacetime (algebraic QFTCS, AQFTCS) leads to such a skepticism. Of course we have the purely mathematical notion of states on a $C^{*}$-algebra $\\mathfrak{A}$, but usually in non-relativistic quantum mechanics and quantum field theory in Minkowski spacetime (QFTM), not all of them are considered to be physically real; Some of them are physically real (or realizable) states, but others are non-physical ``fictional'' states. Only the states which can be expressed as a density matrix on a fixed ``physical Hilbert space'' (the GNS representation space of $\\mathfrak{A}$ w.r.t. the vacuum) are viewed to be physically real. On the other hand, in QFTCS, there is no distinguished physical Hilbert space; no distinguished vacuum state. Thus we cannot distinguish physically real states from fictional states. The second part of my argument is a counterargument to what I call ``pragmatic realism on quantum states'', which insists as follows: ``We are permitted to regard a quantum state as a physical reality, because the concept of quantum state is indispensable in quantum physics.'' I argue that the concept of quantum state is indeed dispensable in non-relativistic QM, and hence this pragmatic realist thesis is vacuous there. I give a conjecture that it is also dispensable in QFTM and QFTCS, and some preliminary considerations on it.", "url": "https://arxiv.org/abs/2604.11830", "type": "理论", "summary": "给出了一些关于量子态物理现实的怀疑论据。首先，我认为弯曲时空中量子场论的代数形式主义（代数 QFTCS，AQFTCS）导致了这样的怀疑。当然，我们有$C^{*}$-代数$\\mathfrak{A}$上的纯数学状态概念，但通常在非相对论量子力学和闵可夫斯基时空中的量子场论（QFTM）中，并非所有这些都被认为是物理真实的；其中一些是物理上真实的（或可实现的）状态，但另一些是非物理的“虚构”状态。只有可以在固定“物理希尔伯特空间”（$\\mathfrak{A}$ w.r.t. 真空的 GNS 表示空间）上表示为密度矩阵的状态才被视为物理真实。另一方面，在QFTCS中，不存在区分的物理希尔伯特空间；没有明显的真空状态。因此，我们无法区分物理上的真实状态和虚构状态。\n\n我的论点的第二部分是对我所说的“量子态的实用实在论”的反驳，它坚持如下：“我们被允许将量子态视为物理现实，因为量子态的概念在量子物理学中是不可或缺的。”我认为，量子态的概念在非相对论量子力学中确实是可有可无的，因此这种实用实在论的论点在那里是空洞的。笔者提出一个猜想，即它在QFTM和QFTCS中也是可有可无的，并对此做了一些初步的思考。", "authors": [{"name": "Hideyasu Yamashita"}], "featured_authors": [{"name": "Hideyasu Yamashita"}], "author_count": 1}, {"id": "2604.11831", "category": "quant-ph", "title": "Q-LINK: Quantum Layerwise Information Residual Network via a Messenger Qubit for Barren Plateaus Mitigation", "abstract": "In hybrid classical-quantum computing, variational quantum algorithms (VQAs) have emerged as a promising approach in the Noisy Intermediate-Scale Quantum (NISQ) era; however, their performance is often hindered by barren plateaus, where gradients vanish exponentially, rendering optimization ineffective. In this work, we introduce a residual-inspired quantum circuit architecture that incorporates a single messenger qubit, referred to as Q-LINK. By conducting numerical simulations on random quantum states, we observe that Q-LINK significantly enhances optimization behavior by sustaining larger gradient variance and accelerating convergence. Additionally, Q-LINK improves convergence efficiency by 4-6 times and increases gradient variance by up to two orders of magnitude compared with the Vanilla model. To further characterize the impact of the proposed structure, we analyze the expressibility of the circuits before and after introducing Q-LINK and find that the overall expressibility value remains largely unchanged, indicating that the original representational capacity of the circuit is preserved. In addition, we visualize the loss landscapes of different architectures to provide insights into how the proposed design reshapes the cost function landscape. These results demonstrate that introducing only a single messenger qubit can effectively mitigate barren plateau effects while maintaining the ability to explore the Hilbert space of variational quantum circuits.", "url": "https://arxiv.org/abs/2604.11831", "type": "理论+数值", "summary": "在混合经典量子计算中，变分量子算法（VQA）已成为噪声中尺度量子（NISQ）时代的一种有前景的方法；然而，它们的性能常常受到贫瘠高原的阻碍，其中梯度呈指数级消失，渲染优化无效。在这项工作中，我们引入了一种受残差启发的量子电路架构，它包含单个信使量子位，称为 Q-LINK。通过对随机量子态进行数值模拟，我们观察到 Q-LINK 通过维持更大的梯度方差和加速收敛来显着增强优化行为。此外，与 Vanilla 模型相比，Q-LINK 的收敛效率提高了 4-6 倍，梯度方差提高了两个数量级。为了进一步表征所提出结构的影响，我们分析了引入 Q-LINK 前后电路的可表达性，发现整体可表达性值基本保持不变，表明电路的原始表示能力得以保留。\n\n此外，我们将不同架构的损失景观可视化，以深入了解所提出的设计如何重塑成本函数景观。这些结果表明，仅引入单个信使量子位可以有效减轻贫瘠平台效应，同时保持探索变分量子电路希尔伯特空间的能力。", "authors": [{"name": "Zhehao Yi"}, {"name": "Rahul Bhadani"}], "featured_authors": [{"name": "Zhehao Yi"}, {"name": "Rahul Bhadani"}], "author_count": 2}, {"id": "2604.11857", "category": "quant-ph", "title": "Blind Catalytic Quantum Error Correction: Target-State Estimation and Fidelity Recovery Without \\textit{A Priori} Knowledge", "abstract": "Catalytic quantum error correction (CQEC) recovers quantum states via catalytic covariant transformations but requires full knowledge of the target state. We introduce \\emph{blind CQEC}, which estimates the target from the noisy output alone before catalytic recovery. Five estimation strategies are benchmarked across three noise models (dephasing, depolarizing, amplitude damping), four quantum algorithms ($d = 4$--$64$), Haar-random states up to $d = 256$, and mixed-state targets with variable purity. Key results: (i)~coherence maximization achieves $ F_{ rec } > 0.95$ for $d \\leq 16$ without noise-model knowledge, matching the oracle to within $4\\%$; (ii)~channel inversion is required at $d = 64$ ($ F_{ rec } = 0.905$); (iii)~estimation and recovery fidelities are linearly correlated ($r > 0.99$), identifying target estimation as the sole bottleneck; (iv)~an analytical crossover dimension $d^* \\approx 25$--$40$ separates noise-model-free and noise-informed regimes, bridged by a hybrid interpolation strategy; (v)~copy scaling follows $1 - F(n) \\sim n^{-\\alpha}$ with $\\alpha \\in [0.4, 2.2]$, spanning the statistical averaging and denoising synergy limits. Standard linear inversion tomography fails as a CQEC target estimator, validating the need for decoherence-aware strategies. An end-to-end VQE demonstration for H$_2$ shows $3.4\\times$ energy-error reduction with channel-inversion blind CQEC.", "url": "https://arxiv.org/abs/2604.11857", "type": "理论+数值", "summary": "催化量子纠错（CQEC）通过催化协变变换恢复量子态，但需要充分了解目标态。我们引入\\emph{blind CQEC}，它在催化回收之前仅根据噪声输出来估计目标。五种估计策略针对三种噪声模型（移相、去极化、振幅阻尼）、四种量子算法（$d = 4$--$64$）、高达 $d = 256$ 的 Haar 随机状态以及具有可变纯度的混合状态目标进行基准测试。主要结果：(i)~相干性最大化在没有噪声模型知识的情况下，在 $d\\leq 16$ 上实现了 $F_{rec} > 0.95$，将预言机匹配到 $4\\%$ 范围内； (ii)~$d = 64$ ($ F_{rec} = 0.905$) 时需要通道反转； (iii)~估计和恢复保真度是线性相关的 ($r > 0.99$)，将目标估计确定为唯一的瓶颈； (iv)~分析交叉维度 $d^* \\approx 25$--$40$ 将无噪声模型和有噪声信息的机制分开，并通过混合插值策略桥接； (v)~复制缩放遵循 $1 - F(n) \\sim n^{-\\alpha}$ 和 $\\alpha \\in [0.4, 2.2]$，跨越统计平均和去噪协同限制。\n\n标准线性反相断层扫描无法作为 CQEC 目标估计器，这验证了对退相干感知策略的需求。 H$_2$ 的端到端 VQE 演示显示，通过通道反转盲 CQEC，能量误差减少了 3.4\\times$。", "authors": [{"name": "Hikaru Wakaura"}], "featured_authors": [{"name": "Hikaru Wakaura"}], "author_count": 1}, {"id": "2604.11858", "category": "quant-ph", "title": "From Symmetry and Reduction to Physically Meaningful Relational Observables in Many-Body Quantum Theory", "abstract": "We consider symmetries and reduction in non-relativistic many-body quantum mechanics, with the aim of identifying physically meaningful observables in systems such as molecules and crystalline solids. To this end, we propose a unified framework based on two additional postulates supplementing the standard quantum-mechanical formalism. For stable systems, the physically relevant states are normalizable stationary states, while physically meaningful observables are required to be invariant under a selected subgroup of the symmetry group and under Galilean boosts. In addition, we postulate the existence of a map from the set of all observables allowed by quantum mechanics to the corresponding invariant physically meaningful observables. The originality of the present work does not lie in specific reductions, but in the unified framework that connects symmetry reduction and relational many-body quantum theory. We interpret entities like superselection rules and quantum reference frames as important parts of the postulated process of obtaining the physically meaningful relational description. In particular, the requirement of Galilean-boost invariance added strengthens the criterion for physical observability by excluding quantities that depend on the choice of inertial frame. An important consequence of the postulates is that in the considered cases every physically meaningful observable necessarily depends on more than one non-invariant observable, the latter being typically associated with degrees of freedom assigned to a single particle. The postulates thus lead to theories that are well aligned with the literature on reduction and the description of molecules, while at the same time being consistent with the relational interpretation of quantum mechanics, according to which the complete physical description of a system is defined only relative to other systems.", "url": "https://arxiv.org/abs/2604.11858", "type": "理论", "summary": "我们考虑非相对论多体量子力学中的对称性和约简，目的是识别分子和晶体固体等系统中具有物理意义的可观察量。为此，我们提出了一个基于补充标准量子力学形式主义的两个附加假设的统一框架。对于稳定系统，物理相关状态是可归一化的稳态，而物理上有意义的可观测量需要在对称群的选定子群和伽利略增强下保持不变。此外，我们假设存在从量子力学允许的所有可观测量集到相应的不变物理有意义的可观测量的映射。本工作的独创性不在于具体的约简，而在于连接对称性约简和关系多体量子理论的统一框架。我们将超选择规则和量子参考系等实体解释为获取物理上有意义的关系描述的假设过程的重要组成部分。\n\n特别是，增加的伽利略增强不变性的要求通过排除依赖于惯性系选择的量来加强物理可观测性的标准。这些假设的一个重要结果是，在所考虑的情况下，每个物理上有意义的可观测量必然取决于多个非不变可观测量，后者通常与分配给单个粒子的自由度相关。因此，这些假设产生的理论与还原和分子描述的文献非常一致，同时与量子力学的关系解释一致，根据量子力学，一个系统的完整物理描述仅是相对于其他系统来定义的。", "authors": [{"name": "Ville J. Härkönen"}], "featured_authors": [{"name": "Ville J. Härkönen"}], "author_count": 1}, {"id": "2604.11864", "category": "quant-ph", "title": "Spectral-angular parametrization of open qudit dynamics", "abstract": "We present a parametrization of density matrices (mixed states) in a finite-dimensional Hilbert space $\\mathbb{C}^n$, particularly suited to the description of their time evolution as open quantum systems governed by GKLS dynamics. A generic (non-degenerate) density matrix $rho_{\\mathbf{r},\\pmb{\\phi}}$, characterized by $n^2-1$ real parameters, naturally decomposes into two sets: (i) an $(n-1)$-tuple $\\mathbf{r}$ of spectral parameters, constrained to lie in a convex polytope, and (ii) a set of $n^2-n$ angular variables $\\pmb{\\phi}$, associated with the flag manifold $\\simeq \\mathrm{SU}(n)/\\mathbb{T}^{n-1}$, where $\\mathbb{T}^{n-1}$ is the standard maximal diagonal torus, in the spirit of the Tilma--Sudarshan construction. A key observation is that the spectral parameters $\\mathbf{r} = (r_1, \\ldots, r_{n-1})$ admit a natural Lie-algebraic interpretation: they are precisely the simple root coordinates of the eigenvalue vector in the Cartan subalgebra of $A_{n-1} = \\mathfrak{sl}(n)$, with each $r_i = p_i - p_{i+1}$ corresponding to the simple root $\\alpha_i = e_i - e_{i+1}$. The convex polytope constraining $\\mathbf{r}$ is thus the positive Weyl chamber of $A_{n-1}$, and the full spectral domain $R_{n-1}$ is the corresponding weight polytope. This parametrization leads to a partial decoupling of the dynamics: the evolution of the angular variables depends on both the Hamiltonian and the dissipative part of the Lindblad generator, whereas the evolution of the spectral parameters involves only the dissipative contribution. Low-dimensional examples for $n=2$ and $n=3$ are discussed in detail, including an application to the trichromatic structure of human colour perception, and we propose an alternative definition of purity expressed solely in terms of the spectral parameters $\\mathbf{r}$.", "url": "https://arxiv.org/abs/2604.11864", "type": "理论", "summary": "我们提出了有限维希尔伯特空间 $\\mathbb{C}^n$ 中密度矩阵（混合态）的参数化，特别适合将其时间演化描述为受 GKLS 动力学控制的开放量子系统。通用（非简并）密度矩阵 $rho_{\\mathbf{r},\\pmb{\\phi}}$，以 $n^2-1$ 实参数为特征，自然分解为两组：(i) 光谱参数的 $(n-1)$ 元组 $\\mathbf{r}$，约束位于凸多面体中，以及 (ii) 一组 $n^2-n$ 角度变量$\\pmb{\\phi}$，与标志流形 $\\simeq \\mathrm{SU}(n)/\\mathbb{T}^{n-1}$ 相关，其中 $\\mathbb{T}^{n-1}$ 是标准最大对角环面，符合 Tilma-Sudarshan 构造的精神。一个关键的观察结果是谱参数 $\\mathbf{r} = (r_1, \\ldots, r_{n-1})$ 接受自然的李代数解释：它们正是 $A_{n-1} = \\mathfrak{sl}(n)$ 的嘉当子代数中特征值向量的简单根坐标，每个 $r_i = p_i - p_{i+1}$ 对应于简单根 $\\alpha_i = e_i - e_{i+1}$。\n\n因此，约束 $\\mathbf{r}$ 的凸多面体是 $A_{n-1}$ 的正 Weyl 室，全谱域 $R_{n-1}$ 是相应的权重多面体。这种参数化导致动力学的部分解耦：角度变量的演化取决于哈密顿量和 Lindblad 发生器的耗散部分，而谱参数的演化仅涉及耗散贡献。详细讨论了 $n=2$ 和 $n=3$ 的低维示例，包括在人类颜色感知的三色结构中的应用，并且我们提出了仅用光谱参数 $\\mathbf{r}$ 表示的纯度的替代定义。", "authors": [{"name": "Jean-Pierre Gazeau"}, {"name": "Kaoutar El Bachiri"}, {"name": "Zakaria Bouameur"}, {"name": "Yassine Hassouni"}], "featured_authors": [{"name": "Jean-Pierre Gazeau"}, {"name": "Kaoutar El Bachiri"}, {"name": "Zakaria Bouameur"}, {"name": "Yassine Hassouni"}], "author_count": 4}, {"id": "2604.11872", "category": "quant-ph", "title": "Eigenstate thermalization", "abstract": "We provide a pedagogical introduction to eigenstate thermalization. This phenomenon, which occurs in generic systems, allows one to understand why thermalization takes place in isolated quantum systems under unitary dynamics. We motivate eigenstate thermalization using random matrix theory and discuss recent complementary results for the volume-law entanglement entropy of Haar-random states. We discuss numerical results that highlight the corresponding behaviors in quantum many-body systems.", "url": "https://arxiv.org/abs/2604.11872", "type": "理论+数值", "summary": "我们提供本征态热化的教学介绍。这种发生在通用系统中的现象使人们能够理解为什么在单一动力学下的孤立量子系统中会发生热化。我们使用随机矩阵理论激发本征态热化，并讨论哈尔随机态体积律纠缠熵的最新补充结果。我们讨论强调量子多体系统中相应行为的数值结果。", "authors": [{"name": "Rohit Patil"}, {"name": "Marcos Rigol"}], "featured_authors": [{"name": "Rohit Patil"}, {"name": "Marcos Rigol"}], "author_count": 2}, {"id": "2604.11876", "category": "quant-ph", "title": "Quantum Mpemba effect in chaotic systems with conservation laws", "abstract": "Closed chaotic quantum systems relax after a quench into a Gibbs ensemble. At late times, the relaxation speed is determined by their conservation laws and hydrodynamics. As a result, there exist pairs of initial states which thermalize to the same ensemble, yet exhibit drastically different hydrodynamic relaxation. We show in two chaotic spin chains how this enables a simple and robust realization of the quantum Mpemba effect: a system initially closer to equilibrium relaxes slower than one that starts farther away, despite both approaching the same final state.", "url": "https://arxiv.org/abs/2604.11876", "type": "理论", "summary": "封闭的混沌量子系统在淬灭后松弛成吉布斯系综。在后期，弛豫速度由它们的守恒定律和流体动力学决定。因此，存在成对的初始状态，它们热化为相同的系综，但表现出截然不同的流体动力学弛豫。我们在两个混沌自旋链中展示了这如何能够简单而稳健地实现量子姆潘巴效应：最初接近平衡的系统比开始较远的系统松弛得慢，尽管两者都接近相同的最终状态。", "authors": [{"name": "Thomas Martin Müller"}, {"name": "Silvia Pappalardi"}, {"name": "Rosario Fazio"}], "featured_authors": [{"name": "Thomas Martin Müller"}, {"name": "Silvia Pappalardi"}, {"name": "Rosario Fazio"}], "author_count": 3}, {"id": "2604.11952", "category": "quant-ph", "title": "A Relativizing MIP for BQP", "abstract": "Complexity class containments involving interactive proof classes are famously nonrelativizing: although $\\mathsf{IP} = \\mathsf{PSPACE}$, Fortnow and Sipser showed that that there exists an oracle relative to which $\\mathsf{coNP} \\not\\subseteq \\mathsf{IP}$. In contrast, the question of whether the containment $\\mathsf{BQP} \\subseteq \\mathsf{IP}$ is relativizing remains wide open. In this work we make progress towards resolving this question by showing that the containment $\\mathsf{BQP} \\subseteq \\mathsf{MIP}$ holds with respect to any classical oracle. We obtain this result by constructing, for any classical oracle $O$, a $\\mathsf{PCP}$ proof system for $\\mathsf{BQP}^{O}$ where the verifier makes polynomially many classical queries to an exponentially-long proof, and to the oracle $O$. Our construction is inspired by the state synthesis algorithm of Grover and Rudolph, and serves as a complement to the \"exponential PCP\" constructed by Aharonov, Arad, and Vidick, which achieves similar parameters but which is based on different ideas and does not relativize. We propose relativization as a proxy for prover efficiency, and hope that progress towards an $\\mathsf{IP}$ for $\\mathsf{BQP}$ in the oracle world will lead to a non-cryptographic interactive protocol for proving any quantum computation to a classical skeptic in the unrelativized world, which is a longstanding open problem in quantum complexity theory.", "url": "https://arxiv.org/abs/2604.11952", "type": "理论+数值", "summary": "众所周知，涉及交互式证明类的复杂性类包含是非相对化的：尽管 $\\mathsf{IP} = \\mathsf{PSPACE}$，Fortnow 和 Sipser 表明存在一个相对于 $\\mathsf{coNP} \\not\\subseteq \\mathsf{IP}$ 的预言。相比之下，遏制 $\\mathsf{BQP} \\subseteq \\mathsf{IP}$ 是否相对化的问题仍然悬而未决。在这项工作中，我们通过证明包含 $\\mathsf{BQP} \\subseteq \\mathsf{MIP}$ 对于任何经典预言都成立，在解决这个问题方面取得了进展。我们通过为任何经典预言机 $O$ 构建 $\\mathsf{BQP}^{O}$ 的 $\\mathsf{PCP}$ 证明系统来获得此结果，其中验证者对指数长证明和预言机 $O$ 进行多项式许多经典查询。我们的构建受到了 Grover 和 Rudolph 的状态综合算法的启发，并作为对 Aharonov、Arad 和 Vidick 构建的“指数 PCP”的补充，其实现了相似的参数，但基于不同的想法并且没有相对化。\n\n我们提出相对化作为证明者效率的代理，并希望在预言机世界中 $\\mathsf{BQP}$ 的 $\\mathsf{IP}$ 的进展将导致一种非加密交互协议，用于向非相对化世界中的经典怀疑论者证明任何量子计算，这是量子复杂性理论中长期存在的开放问题。", "authors": [{"name": "Scott Aaronson"}, {"name": "Anand Natarajan"}, {"name": "Avishay Tal"}, {"name": "Agi Villanyi"}], "featured_authors": [{"name": "Scott Aaronson"}, {"name": "Anand Natarajan"}, {"name": "Avishay Tal"}, {"name": "Agi Villanyi"}], "author_count": 4}, {"id": "2604.12094", "category": "quant-ph", "title": "Why does the wavefunction 'collapse' in relational approaches to quantum mechanics?", "abstract": "I argue that there is a straightforward way to understand the occurrence of wavefunction collapses or 'quantum events' in relational approaches to quantum mechanics: we necessarily encounter a discontinuity in our description when a system interacts with the reference relative to which we are describing it, since the reference system cannot be described relative to itself. This makes it clear how recent concerns around quantum events in relational quantum mechanics should be resolved. However, the solution requires accepting that quantum mechanics is not a complete description of all physical facts, and moreover I argue that this is most likely inevitable if we want to be able to give a precise description of quantum events.", "url": "https://arxiv.org/abs/2604.12094", "type": "数值", "summary": "我认为，有一种直接的方法可以理解量子力学关系方法中波函数塌缩或“量子事件”的发生：当一个系统与我们描述它的相对参考相互作用时，我们必然会在描述中遇到不连续性，因为参考系统无法相对于其自身进行描述。这清楚地表明了最近应如何解决关系量子力学中量子事件的担忧。然而，解决方案需要接受量子力学并不是对所有物理事实的完整描述，而且我认为，如果我们希望能够对量子事件进行精确描述，这很可能是不可避免的。", "authors": [{"name": "Emily Adlam"}], "featured_authors": [{"name": "Emily Adlam"}], "author_count": 1}, {"id": "2604.12131", "category": "quant-ph", "title": "Dequantizing Short-Path Quantum Algorithms", "abstract": "The short-path quantum algorithm introduced by Hastings (Quantum 2018, 2019) is a variant of adiabatic quantum algorithms that enables an easier worst-case analysis by avoiding the need to control the spectral gap along a long adiabatic path. Dalzell, Pancotti, Campbell, and Brandão (STOC 2023) recently revisited this framework and obtained a clear analysis of the complexity of the short-path algorithm for several classes of constraint satisfaction problems (MAX-$k$-CSPs), leading to quantum algorithms with complexity $2^{(1-c)n/2}$ for some constant $c>0$. This suggested a super-quadratic quantum advantage over classical algorithms. In this work, we identify an explicit classical mechanism underlying a substantial part of this line of work, and show that it leads to clean dequantizations. As a consequence, we obtain classical algorithms that run in time $2^{(1-c')n}$, for some constant $c'>c$, for the same classes of constraint satisfaction problems. This shows that current short-path quantum algorithms for these problems do not achieve a super-quadratic advantage. On the positive side, our results provide a new ``quantum-inspired'' approach to designing classical algorithms for important classes of constraint satisfaction problems.", "url": "https://arxiv.org/abs/2604.12131", "type": "理论+数值", "summary": "Hastings 引入的短路径量子算法（Quantum 2018、2019）是绝热量子算法的一种变体，通过避免控制长绝热路径上的光谱间隙，可以更轻松地进行最坏情况分析。 Dalzell、Pancotti、Campbell 和 Brandão (STOC 2023) 最近重新审视了该框架，并对几类约束满足问题 (MAX-$k$-CSP) 的短路径算法的复杂性进行了清晰的分析，从而得出对于某些常数 $c>0$ 复杂性为 $2^{(1-c)n/2}$ 的量子算法。这表明相对于经典算法具有超二次量子优势。在这项工作中，我们确定了该工作大部分内容背后的一个明确的经典机制，并表明它会导致干净的反量化。因此，对于相同类别的约束满足问题，对于某些常数 $c'>c$，我们获得了在时间 $2^{(1-c')n}$ 下运行的经典算法。这表明当前针对这些问题的短路径量子算法并未实现超二次优势。\n\n从积极的一面来看，我们的结果提供了一种新的“量子启发”方法来为重要类别的约束满足问题设计经典算法。", "authors": [{"name": "François Le Gall"}, {"name": "Suguru Tamaki"}], "featured_authors": [{"name": "François Le Gall"}, {"name": "Suguru Tamaki"}], "author_count": 2}, {"id": "2604.12142", "category": "quant-ph", "title": "Fault-tolerant simulation of the electronic structure using Projector Augmented-Waves and Bloch orbitals", "abstract": "Strongly correlated materials are a natural target for fault-tolerant quantum computers, but they require tools beyond those developed for molecules. Electronic wavefunctions vary rapidly near nuclei yet remain delocalized across many unit cells, and bulk properties must be converged systematically with respect to finite-size errors. To resolve such issues, we present the Bloch--UPAW framework that combines Bloch-orbital $k$-space structure with unitary projector-augmented-wave (UPAW) augmentation. The UPAW Hamiltonian, expressed directly in the Bloch basis, retains explicit control of Brillouin-zone sampling, and incorporates near-nuclear physics through strictly local on-site corrections. The construction is independent of the underlying one-particle representation, so it applies to both plane-wave and localized bases, and it handles supercells for symmetry-breaking phenomena more efficiently. We derive a linear-combination-of-unitaries decomposition and a block-encoding circuit suitable for qubitization; UPAW augmentation adds one ancilla qubit and no Toffoli gates at leading order relative to a Bloch-only block encoding. Asymptotically, the Toffoli cost scales as $\\mathcal{O}(N_k^3)$ when refining the $k$-mesh and as $\\mathcal{O}(N_a^{3.5})$ when enlarging the supercell, enabling convergence to be steered by the most favorable route for a given material. Resource estimates for bulk diamond show approximately an order-of-magnitude reduction in Toffoli count relative to prior work on periodic solids.", "url": "https://arxiv.org/abs/2604.12142", "type": "理论+数值", "summary": "强相关材料是容错量子计算机的自然目标，但它们需要的工具超出了为分子开发的工具。电子波函数在原子核附近快速变化，但在许多晶胞中仍然是离域的，并且体特性必须相对于有限尺寸误差系统地收敛。为了解决这些问题，我们提出了 Bloch--UPAW 框架，该框架将 Bloch 轨道 $k$ 空间结构与单一投影增强波 (UPAW) 增强相结合。 UPAW 哈密顿量直接以布洛赫基表示，保留了对布里渊区采样的明确控制，并通过严格的局部现场校正结合了近核物理。该结构独立于底层的单粒子表示，因此它适用于平面波和局域基，并且可以更有效地处理超晶胞以实现对称破缺现象。我们推导了酉分解的线性组合和适合量子化的块编码电路；相对于仅 Bloch 块编码，UPAW 增强在前导顺序上添加了一个辅助量子位并且没有 Toffoli 门。\n\n渐进地，当细化 $k$ 网格时，Toffoli 成本会缩放为 $\\mathcal{O}(N_k^3)$，而当放大超单元时，Toffoli 成本会缩放为 $\\mathcal{O}(N_a^{3.5})$，从而能够通过对给定材料最有利的路线来引导收敛。散装钻石的资源估算表明，相对于之前对周期性固体的研究，Toffoli 计数大约减少了一个数量级。", "authors": [{"name": "Rishabh Bhardwaj"}, {"name": "Alexander Reed Muñoz"}, {"name": "Travis E. Jones"}, {"name": "John Golden"}], "featured_authors": [{"name": "Rishabh Bhardwaj"}, {"name": "Alexander Reed Muñoz"}, {"name": "Travis E. Jones"}, {"name": "John Golden"}], "author_count": 4}, {"id": "2604.12157", "category": "quant-ph", "title": "Scalable Qumode-Qubit State Transfer and Fast-forward Quantum Fourier Transform using Oscillators", "abstract": "Transferring the information stored in the expansion coefficients of a multi-qubit state to the coefficients of a continuous-variable state is an important protocol for communicating quantum information. It was shown in previous work how to transfer an $n$-qubit state to a single qumode in $\\mathcal{O}(2^n)$ time. We show that by transferring this state to $m$ qumodes, the runtime can be improved to $\\mathcal{O}(2^{n/m})$. Furthermore, we demonstrate how multi-qumode state transfer can be used as a subroutine for approximately realizing the $n$-qubits quantum Fourier transform on $m$-qumode with runtime scaling $\\mathcal{O}(m2^{n/m}/\\epsilon+m^2)$, accelerating qubit quantum Fourier transform using qumodes. This work presents a scalable approach to convert discrete and continuous quantum information between an arbitrary number of qubits and qumodes. It represents a crucial step forward in mixed analog-digital quantum signal processing for computing, sensing, and communication.", "url": "https://arxiv.org/abs/2604.12157", "type": "理论", "summary": "将存储在多量子位状态的展开系数中的信息传输到连续变量状态的系数是用于通信量子信息的重要协议。之前的工作展示了如何在 $\\mathcal{O}(2^n)$ 时间内将 $n$-qubit 状态转移到单个 qumode。我们证明，通过将此状态转移到 $m$ qumodes，运行时间可以提高到 $\\mathcal{O}(2^{n/m})$。此外，我们还演示了如何使用多 qumode 状态转移作为子程序，在 $m$-qumode 上近似实现 $n$-qubits 量子傅里叶变换，并具有运行时缩放 $\\mathcal{O}(m2^{n/m}/\\epsilon+m^2)$，从而使用 qumode 加速量子位量子傅里叶变换。这项工作提出了一种可扩展的方法，可以在任意数量的量子位和量子模式之间转换离散和连续量子信息。它代表了计算、传感和通信混合模拟数字量子信号处理向前迈出的关键一步。", "authors": [{"name": "Joel Bierman"}, {"name": "Shubdeep Mohapatra"}, {"name": "Huiyang Zhou"}, {"name": "Yuan Liu"}], "featured_authors": [{"name": "Joel Bierman"}, {"name": "Shubdeep Mohapatra"}, {"name": "Huiyang Zhou"}, {"name": "Yuan Liu"}], "author_count": 4}, {"id": "2604.12186", "category": "quant-ph", "title": "Quantum Message Passing for Factor Graphs over Finite Abelian Groups", "abstract": "We develop a quantum message-passing framework for factor graphs over finite abelian groups. Our starting point is the task of discriminating between a collection of quantum states indexed by the elements of a finite abelian group $\\mathcal{G}$ whose overlaps respect the structure of a group-covariant pure-state channel (PSC). For such channels, we show that the Gram matrix constructed from the output states is diagonalized by the character basis of the dual group $\\widehat{\\mathcal{G}}$. Hence, the channel is characterized, up to isometric equivalence, by its character-indexed eigen list. Based on this representation, we analyze the induced classical-quantum channels associated with check, equality, homomorphism, marginalization, and automorphism factors. For each factor, we derive explicit update rules showing that if the incoming messages are heralded mixtures of group-covariant PSCs, then the outgoing message remains in the same class. This provides a closed quantum message-passing framework for tree-structured factor graphs assembled from these primitives. The framework applies directly to several standard code families over finite abelian groups, including polar codes, LDPC codes, and convolutional and turbo codes. It recovers the previously studied $q$-ary formulation as the special case $(\\mathcal{G}=\\mathbb{Z}_q)$, while extending the belief propagation with quantum messages (BPQM) framework introduced by Renes to non-cyclic alphabets and more general factor-graph constraints described by homomorphisms between products of abelian groups.", "url": "https://arxiv.org/abs/2604.12186", "type": "理论", "summary": "我们为有限交换群上的因子图开发了一个量子消息传递框架。我们的出发点是区分由有限交换群 $\\mathcal{G}$ 的元素索引的量子态集合，这些量子态的重叠遵循群协变纯态通道（PSC）的结构。对于此类通道，我们证明从输出状态构造的 Gram 矩阵通过对偶群 $\\widehat{\\mathcal{G}}$ 的字符基对角化。因此，通道通过其字符索引特征列表来表征，直到等距等价。基于这种表示，我们分析了与检查、相等、同态、边缘化和自同构因子相关的诱导经典量子通道。对于每个因素，我们推导出明确的更新规则，表明如果传入消息预示着组协变 PSC 的混合，则传出消息仍属于同一类。这为由这些原语组装的树形结构因子图提供了一个封闭的量子消息传递框架。\n\n该框架直接适用于有限阿贝尔群上的多个标准码族，包括极坐标码、LDPC 码以及卷积码和 Turbo 码。它将先前研究的 $q$-ary 公式恢复为特殊情况 $(\\mathcal{G}=\\mathbb{Z}_q)$，同时将 Renes 引入的量子消息置信传播 (BPQM) 框架扩展到非循环字母表和由阿贝尔群乘积之间的同态描述的更一般的因子图约束。", "authors": [{"name": "Avijit Mandal"}, {"name": "Henry D. Pfister"}], "featured_authors": [{"name": "Avijit Mandal"}, {"name": "Henry D. Pfister"}], "author_count": 2}, {"id": "2604.12187", "category": "quant-ph", "title": "A Bundle Isomorphism Relating Complex Velocity to Quantum Fisher Operators", "abstract": "We show that averaging matter dynamics over stochastic gravitational fluctuations gives rise to a complex velocity field \\(\\eta_{\\mu} = \\pi_{\\mu} - i u_{\\mu}\\) living as a section of the pullback bundle \\(E = \\pi_{2}^{*}(T^{*}M)\\to \\mathcal{C}\\times M\\). We prove that \\(\\eta_{\\mu}\\) is isomorphic, via the Schrödinger representation, to the symmetric logarithmic derivative (SLD) operator \\(L_{\\mu}\\) on the Hilbert space \\(\\mathcal{H}_{x} = L^{2}(\\mathcal{C})\\), up to a trace-zero projection. This isomorphism \\(\\widetilde{\\mathcal{T}}:\\Gamma (E / \\sim)\\to \\Gamma (\\mathcal{L})\\) is a bundle isomorphism preserving the flat \\(U(1)\\) connection (proved in \\cite{meza2026topological}) and the quantum Fisher metric. The quantum Fisher information metric \\(g_{\\mu \\nu}^{\\mathrm{FS}}\\) is expressed directly in terms of \\(\\eta_{\\mu}\\) as \\(g_{\\mu \\nu}^{\\mathrm{FS}} = - \\frac{4m^{2}}{\\hbar^{2}}\\mathrm{Re}\\langle (\\eta_{\\mu} - \\langle \\eta_{\\mu}\\rangle)(\\eta_{\\nu} - \\langle \\eta_{\\nu}\\rangle)\\rangle_{\\mathcal{P}}\\). The holonomy of \\(\\eta_{\\mu}\\) is quantized, leading to topological phases observable in atom interferometry.", "url": "https://arxiv.org/abs/2604.12187", "type": "理论", "summary": "我们证明，对随机引力涨落的物质动力学进行平均会产生一个复杂的速度场 \\(\\eta_{\\mu} = \\pi_{\\mu} - i u_{\\mu}\\)，作为回拉束的一部分 \\(E = \\pi_{2}^{*}(T^{*}M)\\to \\mathcal{C}\\times M\\)。我们通过薛定谔表示，证明 \\(\\eta_{\\mu}\\) 与希尔伯特空间 \\(\\mathcal{H}_{x} = L^{2}(\\mathcal{C})\\) 上的对称对数导数 (SLD) 算子 \\(L_{\\mu}\\) 同构，直至零迹投影。这个同构 \\(\\widetilde{\\mathcal{T}}:\\Gamma (E / \\sim)\\to \\Gamma (\\mathcal{L})\\) 是一个束同构，保留了平面 \\(U(1)\\) 连接（在 \\cite{meza2026topological} 中证明）和量子费希尔度量。量子费希尔信息度量 \\(g_{\\mu \\nu}^{\\mathrm{FS}}\\) 直接用 \\(\\eta_{\\mu}\\) 表示为 \\(g_{\\mu \\nu}^{\\mathrm{FS}} = - \\frac{4m^{2}}{\\hbar^{2}}\\mathrm{Re}\\langle (\\eta_{\\mu} - \\langle \\eta_{\\mu}\\rangle)(\\eta_{\\nu} - \\langle \\eta_{\\nu}\\rangle)\\rangle_{\\mathcal{P}}\\)。 \\(\\eta_{\\mu}\\) 的完整性被量子化，导致在原子干涉测量中可观察到拓扑相位。", "authors": [{"name": "Jorge Meza-Domínguez"}], "featured_authors": [{"name": "Jorge Meza-Domínguez"}], "author_count": 1}, {"id": "2604.12224", "category": "quant-ph", "title": "Current conservation and amplitude regularisation of the Landau problem: Bohm--Madelung description", "abstract": "This work investigates the dynamics of a charged particle in a uniform magnetic field within the Bohm--Madelung formulation of quantum mechanics. In this representation, the stationary Schrodinger equation separates into coupled amplitude and phase equations, where the amplitude sector admits a Sturm--Liouville structure supporting Ermakov--Lewis invariants. The analysis considers two complementary regularisation schemes: a global Fisher--information--based regularisation and a local canonical (shell) Bohm regularisation derived from stationary flux closure. These are applied within distinct classes of stationary flow, characterised by vanishing and nonvanishing component currents. It is shown that the radial and axial sectors remain globally regularisable, preserving analytic structure across the domain. In contrast, the azimuthal sector develops a nonseparable, generally complex-valued amplitude structure due to gauge-induced coupling. Nevertheless, a consistent local regularity is recovered at the level of canonical branches, where amplitude--momentum relations organise the solution in a well-defined manner. Regularisation thus acts as a structural reorganisation mechanism in amplitude space, preserving the Landau spectral scale while reorganising the flux-sector structure through branch-wise amplitude--momentum relations, thus establishing branch-wise organisation as a natural framework for describing stationary Bohmian dynamics in the Landau problem.", "url": "https://arxiv.org/abs/2604.12224", "type": "理论", "summary": "这项工作研究了量子力学玻姆-马德隆公式中均匀磁场中带电粒子的动力学。在此表示中，平稳薛定谔方程分为耦合幅度和相位方程，其中幅度部分允许支持 Ermakov-Lewis 不变量的 Sturm-Liouville 结构。该分析考虑了两种互补的正则化方案：基于费希尔信息的全局正则化和源自平稳通量闭合的局部规范（壳）玻姆正则化。这些应用于不同类别的静态流，其特征是消失和非消失分量电流。结果表明，径向和轴向扇区保持全局可规则性，从而保留了整个域的分析结构。相比之下，方位角扇区由于规范引起的耦合而形成不可分离的、通常为复值的振幅结构。尽管如此，在规范分支级别上恢复了一致的局部规律性，其中幅度-动量关系以明确定义的方式组织了解决方案。\n\n因此，正则化充当幅度空间中的结构重组机制，保留朗道谱尺度，同时通过分支幅度-动量关系重组通量扇区结构，从而将分支组织建立为描述朗道问题中的稳态波姆动力学的自然框架。", "authors": [{"name": "Anand Aruna Kumar"}], "featured_authors": [{"name": "Anand Aruna Kumar"}], "author_count": 1}, {"id": "2604.12267", "category": "quant-ph", "title": "Quantum Chaos and Quantum Information: Interactions and Implications", "abstract": "The notion of Shannon entropy is crucial for the theory of classical information. In quantum information theory, an analogous key role is played by the von Neumann entropy: quantum information processing is closely related to entropy dynamics. This reveals a direct link with the theory of quantum chaotic systems, which can be characterized by a positive entropy production. Furthermore, noise, which inevitably affects any quantum system, can be modeled by a random quantum operation or by coupling to an environment in a generic chaotic state. In this contribution, we emphasize the universality of quantum chaotic dynamics and discuss its implications for quantum information processing.", "url": "https://arxiv.org/abs/2604.12267", "type": "理论", "summary": "香农熵的概念对于经典信息理论至关重要。在量子信息论中，冯·诺依曼熵也发挥着类似的关键作用：量子信息处理与熵动力学密切相关。这揭示了与量子混沌系统理论的直接联系，其特征在于正熵产生。此外，不可避免地影响任何量子系统的噪声可以通过随机量子操作或通过耦合到一般混沌状态的环境来建模。在这篇文章中，我们强调了量子混沌动力学的普遍性，并讨论了它对量子信息处理的影响。", "authors": [{"name": "Arul Lakshminarayan"}, {"name": "Karol Życzkowski"}], "featured_authors": [{"name": "Arul Lakshminarayan"}, {"name": "Karol Życzkowski"}], "author_count": 2}, {"id": "2604.12276", "category": "quant-ph", "title": "Periodic dynamics in an Ising chain with a quadratic transverse field", "abstract": "A quadratic well plays a central role in a wide variety of modern physical theories and applications. In this work, we investigate many-body dynamics in a quadratic well, using an Ising chain as a paradigmatic example. In contrast to a uniform Ising chain, where the quantum phase transition is driven by the field strength, the present system exhibits spatially varying quantum phases along the chain. Through analysis of the Majorana representation, we obtain exact solutions for localized modes, revealing a topologically degenerate spectrum in the thermodynamic limit. In the case of a finite-size quantum phase region, the Kramers-like degeneracy is lifted by a constant shift, leading to periodic oscillations for a finite-temperature thermal initial state. Numerical simulations of the magnetization, local density of state, and quench fidelity support our conclusions. Our findings enrich the understanding of many-body dynamics in a trapping field.", "url": "https://arxiv.org/abs/2604.12276", "type": "理论+数值", "summary": "二次井在各种现代物理理论和应用中发挥着核心作用。在这项工作中，我们使用伊辛链作为范例研究二次井中的多体动力学。与量子相变由场强驱动的均匀伊辛链相反，本系统沿着链表现出空间变化的量子相。通过分析马约拉纳表示，我们获得了局域模式的精确解，揭示了热力学极限下的拓扑简并谱。在有限尺寸量子相区的情况下，类克拉默简并性通过恒定位移而提升，导致有限温度热初始状态的周期性振荡。磁化强度、局部态密度和失超保真度的数值模拟支持了我们的结论。我们的发现丰富了对捕获场中多体动力学的理解。", "authors": [{"name": "H. P. Zhang"}, {"name": "Z. Song"}], "featured_authors": [{"name": "H. P. Zhang"}, {"name": "Z. Song"}], "author_count": 2}, {"id": "2604.12279", "category": "quant-ph", "title": "Numerically optimized amplitude-robust controlled-Z gate for ultracold neutral atoms with individual addressing capability", "abstract": "We numerically optimized a scheme for a neutral atom Rydberg blockade symmetric controlled-Z (CZ) gate to increase its robustness to variations in the Rabi frequency. This gate scheme uses analytically defined phase profiles of the laser pulse and demonstrates increased robustness to variations in the Rabi frequency almost by an order of magnitude compared to previous proposals. We demonstrate the applicability of our gate protocol to individual addressing in Rydberg excitation, taking into account the asymmetry of Rabi frequencies for two atoms that are individually excited by tightly focused laser beams. This allows for reducing the effects of residual thermal motion of trapped atoms and beam pointing instability on gate fidelities. We investigated the performance of our gate protocol for single-photon and two-photon Rydberg excitation schemes and showed its advantages for individual addressing at finite temperatures of trapped atoms.", "url": "https://arxiv.org/abs/2604.12279", "type": "理论+数值", "summary": "我们对中性原子里德堡封锁对称控制 Z (CZ) 门的方案进行了数值优化，以提高其对拉比频率变化的鲁棒性。该门方案使用分析定义的激光脉冲相位分布，并且与之前的方案相比，对拉比频率变化的鲁棒性提高了几乎一个数量级。我们证明了我们的门协议对里德伯激发中单独寻址的适用性，考虑到由紧密聚焦的激光束单独激发的两个原子的拉比频率的不对称性。这可以减少被捕获原子的残余热运动和光束指向不稳定性对栅极保真度的影响。我们研究了单光子和双光子里德伯激发方案的门协议的性能，并展示了其在捕获原子的有限温度下进行单独寻址的优势。", "authors": [{"name": "K.V. Kozenko"}, {"name": "V.V. Gromyko"}, {"name": "I.I. Beterov"}, {"name": "I.I. Ryabtsev"}], "featured_authors": [{"name": "K.V. Kozenko"}, {"name": "V.V. Gromyko"}, {"name": "I.I. Beterov"}, {"name": "I.I. Ryabtsev"}], "author_count": 4}, {"id": "2604.12345", "category": "quant-ph", "title": "Quantum Kicked Top: A Paradigmatic Model", "abstract": "The quantum kicked top (QKT) is one of the most widely studied models in quantum chaos, providing a minimal yet powerful framework for exploring the relationship between classical nonlinear dynamics and quantum behavior. Unlike many chaotic systems with infinite-dimensional Hilbert spaces, the QKT possesses a finite-dimensional Hilbert space, making it analytically and numerically controllable while still showing a rich dynamical phenomena. In this chapter, we present a comprehensive introduction to the QKT as a paradigmatic model of quantum chaos. Starting from the classical kicked top, we derive the discrete nonlinear map governing the dynamics on the unit sphere and analyze its phase space structure through fixed points, stability analysis, bifurcations and Lyapunov exponents. We then discuss the role of symmetries, including rotational and time-reversal symmetry, and how their breaking modifies the dynamics. The quantum description is developed using Floquet theory, where the periodically driven spin system is represented by a unitary Floquet operator acting on a $(2j+1)$-dimensional Hilbert space. Within this framework, signatures of quantum chaos such as spectral statistics, entanglement generation and recurrences are discussed. The model also admits an interpretation as a system of interacting qubits, enabling explicit few-qubit realizations and direct connections with quantum information measures through reduced density matrices and entanglement entropy. By linking classical phase space structures with quantum dynamical indicators, the QKT provides a clear setting to investigate the emergence of chaotic behavior in the semiclassical limit. The chapter, therefore, highlights the quantum kicked top as a bridge between nonlinear classical dynamics, quantum chaos and modern quantum information science.", "url": "https://arxiv.org/abs/2604.12345", "type": "理论+数值", "summary": "量子踢顶（QKT）是量子混沌中研究最广泛的模型之一，为探索经典非线性动力学和量子行为之间的关系提供了一个最小但强大的框架。与许多具有无限维希尔伯特空间的混沌系统不同，QKT 拥有有限维希尔伯特空间，使其在分析和数值上可控，同时仍然表现出丰富的动力学现象。在本章中，我们全面介绍了 QKT 作为量子混沌的范式模型。从经典的踢顶开始，我们推导了控制单位球体动力学的离散非线性图，并通过不动点、稳定性分析、分岔和李雅普诺夫指数分析了其相空间结构。然后我们讨论对称性的作用，包括旋转对称性和时间反转对称性，以及它们的破缺如何改变动力学。量子描述是使用 Floquet 理论开发的，其中周期性驱动的自旋系统由作用于 $(2j+1)$ 维希尔伯特空间的酉 Floquet 算子表示。\n\n在此框架内，讨论了量子混沌的特征，例如光谱统计、纠缠生成和递归。该模型还允许将其解释为相互作用的量子位系统，从而实现显式的少量子位实现，并通过降低密度矩阵和纠缠熵与量子信息测量直接连接。通过将经典相空间结构与量子动力学指标联系起来，QKT 为研究半经典极限下混沌行为的出现提供了一个清晰的环境。因此，本章强调量子作为非线性经典动力学、量子混沌和现代量子信息科学之间的桥梁。", "authors": [{"name": "Avadhut V. Purohit"}, {"name": "Udaysinh T. Bhosale"}], "featured_authors": [{"name": "Avadhut V. Purohit"}, {"name": "Udaysinh T. Bhosale"}], "author_count": 2}, {"id": "2604.12347", "category": "quant-ph", "title": "Noise-Enhanced Self-Healing Dynamics in Non-Hermitian Systems", "abstract": "Self-healing is the ability of a wave packet to spontaneously restore its spatial profile after scattering. As an emergent feature of non-unitary dynamics, it has attracted significant interest in non-Hermitian physics. Here, we systematically investigate how stochastic noise influences edge self-healing. Counterintuitively, we find that noise can constructively enhance this dynamical process. Weak noise prolongs the self-healing window by aligning the finite-time Lyapunov exponent of the reference state with the maximum imaginary part of the energy spectrum. Remarkably, strong noise universally stabilizes asymptotic profile recovery across the entire spectrum by inducing an effective non-unitary drift-diffusion dynamics. We analytically elucidate these distinct mechanisms using a general finite-time Lyapunov exponent analysis, complemented by a dedicated perturbation theory for the strong-noise regime. Our results provide concrete guidance for realizing robust non-Hermitian dynamics in realistic noisy environments.", "url": "https://arxiv.org/abs/2604.12347", "type": "理论", "summary": "自愈是波包在散射后自发恢复其空间轮廓的能力。作为非酉动力学的一个新兴特征，它引起了非厄米物理学的极大兴趣。在这里，我们系统地研究随机噪声如何影响边缘自我修复。与直觉相反，我们发现噪声可以建设性地增强这一动态过程。弱噪声通过将参考态的有限时间李亚普诺夫指数与能谱的最大虚部对齐来延长自愈窗口。值得注意的是，强噪声通过诱导有效的非单一漂移扩散动力学普遍稳定了整个频谱的渐近轮廓恢复。我们使用一般的有限时间李雅普诺夫指数分析来分析阐明这些不同的机制，并辅以强噪声状态的专用扰动理论。我们的结果为在现实的噪声环境中实现鲁棒的非厄米动力学提供了具体的指导。", "authors": [{"name": "Wuping Yang"}, {"name": "H. Huang"}], "featured_authors": [{"name": "Wuping Yang"}, {"name": "H. Huang"}], "author_count": 2}, {"id": "2604.12361", "category": "quant-ph", "title": "Noise-Robust Ultrafast Entanglement Generation in Rydberg Atoms via Quantum Optimal Control", "abstract": "We present a comprehensive theoretical analysis of ultrafast entanglement generation between two Rydberg-blockaded atoms, explicitly accounting for realistic laser noise. Using femtosecond Gaussian pulses as a baseline, we systematically evaluate Bell-state fidelity sensitivity to amplitude and phase noise across white, pink (1/f), and Ornstein-Uhlenbeck spectra using Monte Carlo ensemble simulations. Our results show that amplitude noise is well tolerated, with fidelities above 90% even at 30% noise levels, while phase noise is the primary limiting factor, causing fidelity to drop rapidly beyond about 1% noise amplitude. The spectral structure of the noise is also important: pink noise consistently causes less fidelity loss than white noise of the same amplitude. By applying quantum optimal control theory (QOCT) with the D-MORPH algorithm under multiple equality constraints, we obtain a double-pulse structure with a spectral notch that achieves approximately 99% fidelity in the noise-free case and maintains high fidelity under moderate amplitude noise. A breakdown threshold near 1% amplitude noise is identified, beyond which even optimized pulses cannot sustain coherent control. These results offer practical benchmarks for the development of ultrafast neutral-atom quantum processors operating in the femtosecond regime.", "url": "https://arxiv.org/abs/2604.12361", "type": "理论+数值", "summary": "我们对两个里德堡封锁原子之间的超快纠缠生成进行了全面的理论分析，明确地解释了现实的激光噪声。使用飞秒高斯脉冲作为基线，我们使用蒙特卡罗系综模拟系统地评估了白色、粉红色 (1/f) 和 Ornstein-Uhlenbeck 光谱中贝尔态保真度对幅度和相位噪声的敏感性。我们的结果表明，幅度噪声具有良好的耐受性，即使在 30% 的噪声水平下，保真度也高于 90%，而相位噪声是主要限制因素，导致保真度在噪声幅度超过约 1% 时迅速下降。噪声的频谱结构也很重要：粉红噪声始终比相同幅度的白噪声造成更少的保真度损失。通过在多重等式约束下应用量子最优控制理论（QOCT）和D-MORPH算法，我们获得了具有谱陷波的双脉冲结构，该结构在无噪声情况下实现了大约99%的保真度，并且在中等幅度噪声下保持了高保真度。确定了接近 1% 幅度噪声的击穿阈值，超过该阈值，即使优化的脉冲也无法维持相干控制。\n\n这些结果为开发在飞秒范围内运行的超快中性原子量子处理器提供了实用的基准。", "authors": [{"name": "Tanveer Ahmad"}, {"name": "Muhammad Muneer"}], "featured_authors": [{"name": "Tanveer Ahmad"}, {"name": "Muhammad Muneer"}], "author_count": 2}, {"id": "2604.12369", "category": "quant-ph", "title": "A Periodic Orbit Trace Formula for Quantum Scrambling: The Role of the Normally Hyperbolic Invariant Manifold", "abstract": "Out-of-Time-Order Correlators (OTOCs) quantify quantum information scrambling, but their connection to localized phase-space structures, such as chemical transition states, requires formal development. We derive a leading-order semiclassical expansion for the local microcanonical OTOC in systems with an index-1 saddle point, expressing the scrambling rate as a coherent sum over unstable periodic orbits on the Normally Hyperbolic Invariant Manifold (NHIM). Valid in the semiclassical limit and the intermediate-time regime before the Ehrenfest time, our derivation utilizes the Normal Form theory of the transition state, which transforms the Hamiltonian near the saddle into an integrable (though generally non-separable) form dependent on conserved actions. We outline the derivation of the microcanonical trace, the semiclassical propagator for integrable systems, the factorization of the stability matrix, and the Schur complement reduction of the stationary phase approximation. Our result extends periodic-orbit trace methods to scrambling observables, yielding a local instability exponent {\\Lambda}(J) governing the leading semiclassical growth window. As a special case, when the observation time coincides with the intrinsic periods of the contributing orbits, the trace sum reduces to an effective 1.5{\\Lambda} scaling, resulting from the competition between local hyperbolic growth and wavepacket dilution. This simplified form is conditional; the full expansion retains a coherent sum over orbit periods. Finally, we discuss how the dependence of the instability on transverse actions establishes a theoretical mechanism for mode-selective control of scrambling, and outline a numerical evaluation strategy to test these predictions.", "url": "https://arxiv.org/abs/2604.12369", "type": "理论+数值", "summary": "无序相关器 (OTOC) 可以量化量子信息扰乱，但它们与局部相空间结构（例如化学过渡态）的连接需要正式开发。我们推导了具有索引 1 鞍点的系统中局部微正则 OTOC 的前序半经典展开式，将置乱率表示为常双曲不变流形 (NHIM) 上不稳定周期轨道上的相干和。我们的推导在半经典极限和埃伦菲斯特时间之前的中间时间状态下有效，利用过渡态的范式理论，将鞍点附近的哈密顿量转换为依赖于守恒行为的可积（尽管通常不可分）形式。我们概述了微正则迹的推导、可积系统的半经典传播子、稳定性矩阵的因式分解以及固定相近似的 Schur 补约化。我们的结果将周期轨道追踪方法扩展到扰乱可观测量，产生控制领先半经典增长窗口的局部不稳定指数 {\\Lambda}(J)。\n\n作为一种特殊情况，当观测时间与贡献轨道的固有周期一致时，由于局部双曲增长和波包稀释之间的竞争，迹线和减少到有效的 1.5{\\Lambda} 缩放。这种简化形式是有条件的；完全展开在轨道周期内保持相干和。最后，我们讨论了不稳定性对横向作用的依赖性如何建立扰乱模式选择性控制的理论机制，并概述了测试这些预测的数值评估策略。", "authors": [{"name": "Stephen Wiggins"}], "featured_authors": [{"name": "Stephen Wiggins"}], "author_count": 1}, {"id": "2604.12381", "category": "quant-ph", "title": "Enhanced quantum illumination of a lossy target: A sequential interaction model", "abstract": "The effectiveness of quantum illumination (QI) of a lossy target is investigated in a realistic setting in which the signal sequentially interacts with a noisy environment and the target. The target is considered at a temperature distinct from its surroundings, while both the interactions are modeled as an action of independent beam splitters with different reflectivities. The detection performance is quantified using the signal-to-noise ratio (SNR) and the quantum Chernoff bound (QCB), the latter providing an upper bound on the error probability. The performance of the Gaussian two-mode squeezed state (TMSS) is compared with that of the optimal classical protocol based on coherent states (CS). The proposed model shows that TMSS consistently achieves a higher SNR than CS for a low-reflectivity target and an arbitrary phase change and remains robust against thermal noise. Furthermore, a sufficiently lower QCB is obtained for TMSS than in previously reported results, indicating greater distinguishability between the presence and absence of the target. These findings underscore the role of realistic modeling in improving QI-based detection of lossy targets, with potential relevance to quantum radar and lidar systems.", "url": "https://arxiv.org/abs/2604.12381", "type": "理论", "summary": "在现实环境中研究有损目标的量子照明 (QI) 的有效性，其中信号依次与噪声环境和目标相互作用。目标被认为处于与其周围环境不同的温度，而两种相互作用都被建模为具有不同反射率的独立分束器的作用​​。使用信噪比 (SNR) 和量子切尔诺夫界 (QCB) 来量化检测性能，后者提供错误概率的上限。将高斯二模压缩态（TMSS）的性能与基于相干态（CS）的最优经典协议的性能进行了比较。所提出的模型表明，对于低反射率目标和任意相变，TMSS 始终能够实现比 CS 更高的 SNR，并且对热噪声保持鲁棒性。此外，与之前报道的结果相比，TMSS 获得了足够低的 QCB，表明目标存在与不存在之间的区分度更大。\n\n这些发现强调了现实建模在改进基于 QI 的有损目标检测方面的作用，并与量子雷达和激光雷达系统具有潜在相关性。", "authors": [{"name": "Shilpi Srivastava"}, {"name": "Shubhrangshu Dasgupta"}], "featured_authors": [{"name": "Shilpi Srivastava"}, {"name": "Shubhrangshu Dasgupta"}], "author_count": 2}, {"id": "2604.12395", "category": "quant-ph", "title": "Permutationally symmetric molecular aggregates", "abstract": "Linear optical spectra of molecular aggregates are often approximated by classical optics methods such as the discrete-dipole approximation (DDA), coherent exciton scattering (CES), and coherent potential approximation (CPA), where the only quantum-mechanical input to the calculation is the linear susceptibility of the monomers. However, the limits of validity of these classical optics methods remain opaque. Here, starting from a quantum mechanical Hamiltonian for the aggregate, we identify a limit where DDA/CPA/CES is exact: all-to-all coupled permutationally symmetric aggregates of $N \\to \\infty$ monomers. The permutational symmetry of this molecular version of the Lipkin-Meshkov-Glick model, which is closely related to that of the molecular polariton problem of many identical molecules coupled to a single-cavity mode, allows us to borrow recent techniques developed for the latter. In particular, we identify a $1/N$ expansion that corrects the classical optics limit with finite $N$ corrections to the linear response of the aggregate. These corrections feature as Raman-like transitions of a single monomer. We illustrate these findings with calculations on the very physically-relevant setup of a homodimer. Our findings clarify how quantum optical features that go beyond classical optics can already be present in simple arrays of quantum emitters such as molecular aggregates.", "url": "https://arxiv.org/abs/2604.12395", "type": "理论+数值", "summary": "分子聚集体的线性光谱通常通过经典光学方法来近似，例如离散偶极子近似（DDA）、相干激子散射（CES）和相干势近似（CPA），其中计算的唯一量子力学输入是单体的线性磁化率。然而，这些经典光学方法的有效性限制仍然不透明。在这里，从聚合的量子力学哈密顿量开始，我们确定了 DDA/CPA/CES 精确的极限：$N \\to \\infty$ 单体的全部耦合排列对称聚合。 Lipkin-Meshkov-Glick 模型的分子版本的排列对称
