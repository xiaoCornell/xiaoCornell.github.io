  <style>

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }

  <script>
    const papers = [{"id": "2604.11846", "category": "cond-mat", "title": "Hierarchical localization in disordered Apollonian networks", "abstract": "We investigate localization properties of the Apollonian network (AN) in the presence of diagonal and off-diagonal disorder. By employing a site-resolved localization measure, we show that the localization degree is strongly dependent on the energy and tied to the hierarchical topology of the network. At the spectral edges, eigenstates are strongly localized on highly connected sites originating from previous generations, a behavior that persists under both disorder mechanisms. In contrast, around zero energy localization is associated with the lowest-degree sites. As disorder breaks the underlying C3 symmetry of the AN, it promotes spatial reconfiguration of these states while preserving their support on low-degree nodes. For diagonal disorder, localization is enhanced over a broad range of negative energies, whereas off-diagonal disorder induces weakening of localization in this region. Finally, we show that the hub dominates the spectral edges but has negligible contribution near the band center, indicating that its associated localized states are robust against disorder. These results highlight how topology and disorder jointly shape localization in complex networks.", "url": "https://arxiv.org/abs/2604.11846", "type": "理论+数值", "summary": "我们研究了存在对角线和非对角线无序情况下阿波罗网络 (AN) 的定位特性。通过采用站点解析的定位方法，我们表明定位程度强烈依赖于能量并与网络的分层拓扑相关。在光谱边缘，本征态强烈地集中在源自前几代的高度连接的位点上，这种行为在两种无序机制下都持续存在。相反，零能量附近的定位与最低度位点相关。由于无序性破坏了 AN 的基本 C3 对称性，它促进了这些状态的空间重新配置，同时保留了它们对低度节点的支持。对于对角线无序，定位在广泛的负能量上得到增强，而非对角线无序则导致该区域的定位减弱。最后，我们表明中心在光谱边缘占主导地位，但在能带中心附近的贡献可以忽略不计，这表明其相关的局部状态对无序具有鲁棒性。这些结果强调了拓扑和无序如何共同塑造复杂网络中的定位。", "authors": [{"name": "Eduardo M. K. Souza"}, {"name": "Francisco A. B. F. de Moura"}, {"name": "Guilherme M. A. Almeida"}], "featured_authors": [{"name": "Eduardo M. K. Souza"}, {"name": "Francisco A. B. F. de Moura"}, {"name": "Guilherme M. A. Almeida"}], "author_count": 3}, {"id": "2604.11850", "category": "cond-mat", "title": "Surface-enhanced Raman scattering and density functional theory study of selected-lanthanide-citrate complexes (lanthanide: Tb, Dy, Ho, Er, Tm, Yb and Lu)", "abstract": "In this study, surface-enhanced Raman scattering (SERS) and density functional theory (DFT) calculations were combined to investigate the SERS spectra of Ln-citrate complexes (Ln: Tb, Dy, Ho, Er, Tm, Yb, and Lu) under 488 and 532 nm excitation. Peak assignment was supported by simulated SERS spectra calculated with an optimized DFT method using large-core effective core potentials. The main bands near 935, 1060, 1315, and 1485 cm-1 were assigned to (C-COO-) + (CH2), (CH2) + (C-O -- Ln), sym(COO-) + (CH2), and asym(COO-) + (CH2), respectively. Relative peak intensities were evaluated by normalizing the bands near 935, 1060, and 1485 cm-1 to that near 1315 cm-1. The ratios I_935/I_1315 and I_1485/I_1315 generally increased from Dy-citrate to Lu-citrate, whereas the I_1060/I_1315 ratio decreased. These trends were observed under both excitation wavelengths. The decrease in relative SERS peak intensity of the 1060 cm-1 band is attributed to stronger Ln-O interaction and reduced polarizability change, whereas the increases of the 935 and 1485 cm-1 bands are likely related to changes in local electronic distribution and effective symmetry sensitivity.", "url": "https://arxiv.org/abs/2604.11850", "type": "理论+数值", "summary": "在本研究中，结合表面增强拉曼散射（SERS）和密度泛函理论（DFT）计算，研究了Ln-柠檬酸盐配合物（Ln：Tb、Dy、Ho、Er、Tm、Yb和Lu）在488和532 nm激发下的SERS光谱。峰分配得到了模拟 SERS 光谱的支持，该光谱是使用大核有效核电势通过优化的 DFT 方法计算得出的。 935、1060、1315和1485 cm-1附近的主带分别分配给(C-COO-) + (CH2)、(CH2) + (C-O -- Ln)、sym(COO-) + (CH2)和asym(COO-) + (CH2)。通过将 935、1060 和 1485 cm-1 附近的谱带标准化为 1315 cm-1 附近的谱带来评估相对峰强度。从柠檬酸镝到柠檬酸镝，I_935/I_1315 和 I_1485/I_1315 比率普遍增加，而 I_1060/I_1315 比率降低。在两种激发波长下都观察到了这些趋势。 1060 cm-1 谱带相对 SERS 峰强度的降低归因于更强的 Ln-O 相互作用和减少的极化率变化，而 935 和 1485 cm-1 谱带的增加可能与局部电子分布和有效对称灵敏度的变化有关。", "authors": [{"name": "Hao Jin"}, {"name": "Yuko S. Yamamoto"}], "featured_authors": [{"name": "Hao Jin"}, {"name": "Yuko S. Yamamoto"}], "author_count": 2}, {"id": "2604.11880", "category": "cond-mat", "title": "Classification and correlation signatures of chiral spin liquids on the pyrochlore lattice", "abstract": "We present a systematic classification and variational study of chiral quantum spin liquids on the pyrochlore lattice based on fermionic parton constructions. Focusing on chiral $\\mathrm{U(1)}$ and $\\mathbb{Z}_2$ spin-liquid Ansätze, we characterize their symmetry properties, flux structures, and low-energy spinon spectra within a projective symmetry group framework, and incorporate gauge fluctuations through Gutzwiller-projected wave functions studied by variational Monte Carlo. From the equal-time spin structure factor, we develop correlation-based diagnostics that distinguish gauge-dominated Coulomb phases from states with substantial matter-field and short-range contributions. Distinct chiral flux sectors, though close in energy, exhibit markedly different degrees of emergent $\\mathrm{U(1)}$ gauge-field dominance, reflected in the geometry and contrast of pinch-point singularities. Although these states are not competitive ground states of the nearest-neighbor Heisenberg model, they define a physically meaningful family of proximate chiral phases relevant to extended pyrochlore Hamiltonians.", "url": "https://arxiv.org/abs/2604.11880", "type": "理论+数值", "summary": "我们提出了基于费米子结构的烧绿石晶格上手性量子自旋液体的系统分类和变分研究。重点关注手性 $\\mathrm{U(1)}$ 和 $\\mathbb{Z}_2$ 自旋液体 Ansätze，我们在射影对称群框架内表征了它们的对称性、通量结构和低能自旋谱，并通过变分蒙特卡罗研究的 Gutzwiller 投影波函数纳入了规范涨落。从等时自旋结构因子出发，我们开发了基于相关性的诊断方法，将规范主导的库仑相与具有大量物质场和短程贡献的状态区分开来。不同的手性通量扇区虽然能量接近，但表现出明显不同程度的新兴 $\\mathrm{U(1)}$ 规范场优势，反映在夹点奇点的几何形状和对比度上。尽管这些态不是最近邻海森堡模型的竞争基态，但它们定义了与扩展烧绿石哈密顿量相关的具有物理意义的近似手性相族。", "authors": [{"name": "Chunxiao Liu"}, {"name": "Leon Balents"}, {"name": "Yasir Iqbal"}], "featured_authors": [{"name": "Chunxiao Liu"}, {"name": "Leon Balents"}, {"name": "Yasir Iqbal"}], "author_count": 3}, {"id": "2604.11997", "category": "cond-mat", "title": "Raman response in superconducting multiorbital systems with application to nickelates", "abstract": "The recent discovery of high-$T_c$ superconductivity in pressurized and thin film nickelates is nowadays one of the most relevant and active topics in solid-state physics. The origin of superconductivity together with the relevance of multiorbital physics are highly discussed issues in this field. Knowledge of the size of the gap and its symmetry is of fundamental interest to uncover the superconducting mechanism at play in the nickelates. Electronic Raman scattering is a powerful tool to investigate the main characteristics of the gap. Here, we investigate the Raman response in the superconducting phase for three different models: Two-orbital models, including $d_{x^2-y^2}$ and $d_{z^2}$ orbitals, with one and two layers; as well as a bilayer model with the $d_{x^2-y^2}$ orbital as the only active one. For each of these models, we consider different pairing symmetries and determine their characteristic fingerprints in the Raman response. For the two-orbital models, we perform full multiorbital calculations including interorbital and intraorbital scattering, and compare the results with those obtained using the additive Raman response where each band is considered separately. Our results should be useful for discussing the minimal model for superconductivity and its pairing symmetry in nickelates. The obtained results and discussions, as well as the presented formalism, are also of general interest for other multiorbital systems.", "url": "https://arxiv.org/abs/2604.11997", "type": "理论+数值", "summary": "最近在加压和薄膜镍酸盐中发现高$T_c$超导性是当今固态物理学中最相关和最活跃的主题之一。超导性的起源以及多轨道物理的相关性是该领域备受讨论的问题。了解间隙的大小及其对称性对于揭示镍酸盐中起作用的超导机制至关重要。电子拉曼散射是研究间隙主要特征的有力工具。在这里，我们研究了三种不同模型的超导相拉曼响应： 双轨道模型，包括 $d_{x^2-y^2}$ 和 $d_{z^2}$ 轨道，有一层和两层；以及以 $d_{x^2-y^2}$ 轨道作为唯一活跃轨道的双层模型。对于每个模型，我们考虑不同的配对对称性并确定它们在拉曼响应中的特征指纹。对于双轨道模型，我们执行完整的多轨道计算，包括轨道间和轨道内散射，并将结果与​​使用单独考虑每个波段的加性拉曼响应获得的结果进行比较。\n\n我们的结果对于讨论镍酸盐中超导性的最小模型及其配对对称性应该有用。所获得的结果和讨论以及所提出的形式主义也引起了其他多轨道系统的普遍兴趣。", "authors": [{"name": "Matías Bejas"}, {"name": "Jun Zhan"}, {"name": "Xianxin Wu"}, {"name": "Andreas P. Schnyder"}, {"name": "Andrés Greco"}], "featured_authors": [{"name": "Matías Bejas"}, {"name": "Jun Zhan"}, {"name": "Xianxin Wu"}, {"name": "Andreas P. Schnyder"}, {"name": "Andrés Greco"}], "author_count": 5}, {"id": "2604.12030", "category": "cond-mat", "title": "Phase-space origin of superfluid stability in ring Bose-Einstein condensates", "abstract": "We present a kinetic description of superfluid currents in ring-shaped Bose-Einstein condensates based on the Wigner phase-space formalism. Starting from the Gross-Pitaevskii equation in a toroidal geometry, we derive a Vlasov-type equation for the angular Wigner function, in which the mean-field interaction generates an effective force proportional to the density gradient. Within this framework, we obtain the dispersion relation of collective modes and recover the Bogoliubov spectrum in the long-wavelength limit. We show that the Landau criterion for superfluidity can be interpreted as the absence of resonant phase-space trajectories satisfying the condition \\(\\omega = q v_\\ell\\). In a ring geometry, the quantization of angular momentum leads to a discrete set of velocities, which suppresses the availability of resonant states and strongly inhibits Landau damping. In contrast, in the continuous limit \\(R \\to \\infty\\), the spectrum becomes quasi-continuous and the standard Landau damping mechanism is recovered, establishing a direct connection between kinetic resonances and the energetic criterion for superfluidity. We further analyze the role of Bogoliubov depletion by considering a finite-width angular momentum distribution. Although resonant states formally exist in this case, we show that, for flow velocities below the sound velocity, the phase-space distribution does not provide the gradients required for energy transfer, and the superfluid current remains dynamically stable. Our results provide a unified phase-space interpretation of superfluidity, highlighting the role of angular momentum quantization and the structure of the distribution function in determining the stability of persistent currents.", "url": "https://arxiv.org/abs/2604.12030", "type": "理论", "summary": "我们基于维格纳相空间形式主义提出了环形玻色-爱因斯坦凝聚体中超流体流的动力学描述。从环形几何中的 Gross-Pitaevskii 方程出发，我们推导出角维格纳函数的 Vlasov 型方程，其中平均场相互作用产生与密度梯度成比例的有效力。在此框架内，我们获得了集体模式的色散关系并恢复了长波长极限内的Bogoliubov谱。我们证明超流性的朗道准则可以解释为不存在满足条件 \\(\\omega = q v_\\ell\\) 的共振相空间轨迹。在环形几何结构中，角动量的量子化会产生一组离散的速度，这会抑制谐振态的可用性并强烈抑制朗道阻尼。相反，在连续极限 \\(R \\to \\infty\\) 下，谱变得准连续，标准朗道阻尼机制得到恢复，在运动共振和超流能量准则之间建立了直接联系。\n\n我们通过考虑有限宽度角动量分布来进一步分析 Bogoliubov 损耗的作用。尽管在这种情况下形式上存在共振态，但我们表明，对于低于声速的流速，相空间分布不提供能量传递所需的梯度，并且超流体电流保持动态稳定。我们的结果提供了超流性的统一相空间解释，强调了角动量量化和分布函数结构在确定持续电流稳定性中的作用。", "authors": [{"name": "M. O. C. Pires"}], "featured_authors": [{"name": "M. O. C. Pires"}], "author_count": 1}, {"id": "2604.12098", "category": "cond-mat", "title": "Preserving elastic anisotropy with tessellations of granular packings", "abstract": "Multiscale periodic metamaterials have been designed for numerous applications, such as impact absorption, acoustic cloaking, photonic band gaps, and mechanical logic gates. This prior work has focused on optimizing mesoscale structure for desired bulk isotropic properties. In contrast, we seek to develop materials with highly anisotropic elastic properties. To quantify elastic anisotropy, we introduce two rotationally invariant, normalized quantities that characterize the anisotropic response to shear and compression, respectively, $A_G$ and $A_C$. We find that typical crystalline solids possess average elastic anisotropy $\\overline{A}_G \\approx 0.15$ and $\\overline{A}_C \\approx 0.09$. Compared to atomic crystals, jammed granular materials can attain elastic anisotropies that are several orders of magnitude larger. Since grain rearrangements reduce anisotropy in granular materials, to preserve strong elastic anisotropy, we design tessellated granular materials that consist of multiple connected grain-filled voxels, which limit rearrangements and enable highly anisotropic elastic properties. Bulk granular packings with $N$ grains prepared at pressure $p$ have maximal anisotropy for $pN^2\\sim1$ and become isotropic in the large-$pN^2$ limit. We show that homogeneously tessellated granular systems can inherit the elastic response of the constituent voxel configurations with elastic anisotropy up to $100$ times that of crystalline compounds over a range of $pN^2$. We show further methods to tune the elastic anisotropy of tessellations by designing heterogeneously patterned voxel configurations and tessellations that allow large boundary deformations.", "url": "https://arxiv.org/abs/2604.12098", "type": "理论+数值", "summary": "多尺度周期性超材料被设计用于多种应用，例如冲击吸收、声学隐身、光子带隙和机械逻辑门。这项先前的工作重点是优化介观结构以获得所需的整体各向同性特性。相反，我们寻求开发具有高度各向异性弹性特性的材料。为了量化弹性各向异性，我们引入了两个旋转不变的归一化量，分别表征对剪切和压缩的各向异性响应，$A_G$ 和 $A_C$。我们发现典型的结晶固体具有平均弹性各向异性 $\\overline{A}_G \\approx 0.15$ 和 $\\overline{A}_C \\approx 0.09$。与原子晶体相比，堵塞颗粒材料可以获得大几个数量级的弹性各向异性。由于颗粒重排减少了颗粒材料的各向异性，为了保持强弹性各向异性，我们设计了由多个连接的颗粒填充体素组成的棋盘格颗粒材料，这限制了重排并实现了高度各向异性的弹性特性。\n\n在 $p$ 压力下制备的具有 $N$ 颗粒的散装颗粒填料对于 $pN^2\\sim1$ 具有最大各向异性，并在大 $pN^2$ 限制下变为各向同性。我们证明，均匀镶嵌的颗粒系统可以继承组成体素构型的弹性响应，弹性各向异性在 $pN^2$ 范围内高达晶体化合物的 100$ 倍。我们展示了通过设计允许大边界变形的异质图案体素配置和镶嵌来调整镶嵌的弹性各向异性的进一步方法。", "authors": [{"name": "Annie Z. Xia"}, {"name": "Dong Wang"}, {"name": "Catherine La Riviere"}, {"name": "Rebecca Kramer-Bottiglio"}, {"name": "Mark D. Shattuck"}, {"name": "Corey S. O'Hern"}], "featured_authors": [{"name": "Annie Z. Xia"}, {"name": "Dong Wang"}, {"name": "Catherine La Riviere"}, {"name": "Rebecca Kramer-Bottiglio"}, {"name": "Mark D. Shattuck"}, {"name": "Corey S. O'Hern"}], "author_count": 6}, {"id": "2604.12107", "category": "cond-mat", "title": "Disentangling microstructural elements of shear thickening suspensions via computer simulations of a minimal model", "abstract": "We use a minimal model for a dense suspension undergoing thickening and thinning to investigate microstructural changes in 2d simulations. Our simulations show that in steady flow the contact network contains distinct building blocks which are clearly signaled by sharp peaks in the radial distribution function, similar to what is observed in granular jamming. These structures {deform} during thinning. Non-Gaussian stress fluctuations that only emerge during thickening are associated to power law tails in the distribution of local contact forces, which tend to emerge when the flow-induced building blocks form large spanning assemblies. The subset of the contact network characterized by strong contact forces and connectivity large enough to be rigid or over-constrained is increasingly likely to percolate as the system starts to thicken, and to percolate over larger strain windows during thickening. The tendency of these structures to span the sample and to persist is dramatically reduced during thinning, where instead their deformation allows for a more homogeneous spatial redistribution of contact forces, significantly reducing the fluctuations of the macroscopic stress over time.", "url": "https://arxiv.org/abs/2604.12107", "type": "理论+数值", "summary": "我们使用稠密悬浮液经历增稠和稀化的最小模型来研究二维模拟中的微观结构变化。我们的模拟表明，在稳定流中，接触网络包含不同的构建块，这些构建块通过径向分布函数中的尖峰清楚地发出信号，类似于在粒状干扰中观察到的情况。这些结构在减薄过程中{变形}。仅在增厚过程中出现的非高斯应力波动与局部接触力分布中的幂律尾部相关，当流引起的构件形成大跨度组件时，往往会出现这种情况。当系统开始增厚时，以强接触力和连接性大到刚性或过度约束为特征的接触网络子集越来越有可能渗透，并在增厚过程中渗透到更大的应变窗口。这些结构跨越样品并持续存在的趋势在减薄过程中显着降低，相反，它们的变形允许接触力更均匀的空间重新分布，从而显着减少宏观应力随时间的波动。", "authors": [{"name": "William C. J. Buchholtz"}, {"name": "Daniel L. Blair"}, {"name": "Jeffrey S. Urbach"}, {"name": "H. A. Vinutha"}, {"name": "Emanuela Del Gado"}], "featured_authors": [{"name": "William C. J. Buchholtz"}, {"name": "Daniel L. Blair"}, {"name": "Jeffrey S. Urbach"}, {"name": "H. A. Vinutha"}, {"name": "Emanuela Del Gado"}], "author_count": 5}, {"id": "2604.12203", "category": "cond-mat", "title": "Spherical-tensor description of the Jahn--Teller--Hubbard molecule and local electron--phonon entanglement", "abstract": "We investigate the localized-electron character of the Mott-insulating phase in A$_3$C$_{60}$ using a single-site multiorbital electron model coupled to anisotropic molecular vibrations (Jahn--Teller phonons). We apply the spherical-tensor formalism, a framework originally developed in nuclear physics, to analyze the electron--phonon-coupled ground-state multiplet. Focusing on multipole moments, we find that both the conventional electronic quadrupole moment and the lattice displacement associated with the molecular vibrations vanish, even though the degenerate ground-state multiplet implies the presence of quadrupolar degrees of freedom. By analyzing these degrees of freedom within the spherical-tensor framework, we introduce composite (two-body) quadrupole operators involving both electrons and phonons and study their parameter dependence numerically. Furthermore, using quasispin selection rules, we demonstrate that the composite quadrupole does not couple to either the conventional quadrupole or lattice-displacement operators, thereby distinguishing it fundamentally from standard quadrupolar degrees of freedom. In addition, we investigate the nature of the electron--phonon entanglement and characterize it from the viewpoint of angular momentum. Analysis of the entanglement spectrum reveals that the ground state consists of superpositions of multi-phonon states with angular momenta $L_{\\rm ph}=2$ and $L_{\\rm ph}=3$, formed through coupling to three-electron states with $L=1$ and $L=2$.", "url": "https://arxiv.org/abs/2604.12203", "type": "理论+数值", "summary": "我们使用与各向异性分子振动（Jahn--Teller 声子）耦合的单点多轨道电子模型研究了 A$_3$C$_{60}$ 中莫特绝缘相的局域电子特征。我们应用球张量形式主义（一种最初在核物理中开发的框架）来分析电子声子耦合基态多重态。着眼于多极矩，我们发现传统的电子四极矩和与分子振动相关的晶格位移都消失了，尽管简并基态多重态意味着四极自由度的存在。通过分析球张量框架内的这些自由度，我们引入了涉及电子和声子的复合（二体）四极算子，并在数值上研究了它们的参数依赖性。此外，使用准自旋选择规则，我们证明复合四极杆不耦合到传统的四极杆或晶格位移算子，从而从根本上区别于标准四极自由度。\n\n此外，我们还研究了电子-声子纠缠的性质，并从角动量的角度对其进行了表征。纠缠谱分析表明，基态由角动量为 $L_{\\rm ph}=2$ 和 $L_{\\rm ph}=3$ 的多声子态叠加组成，通过耦合到 $L=1$ 和 $L=2$ 的三电子态而形成。", "authors": [{"name": "Koichiro Takahashi"}, {"name": "Shuichiro Ebata"}, {"name": "Naotaka Yoshinaga"}, {"name": "Shintaro Hoshino"}], "featured_authors": [{"name": "Koichiro Takahashi"}, {"name": "Shuichiro Ebata"}, {"name": "Naotaka Yoshinaga"}, {"name": "Shintaro Hoshino"}], "author_count": 4}, {"id": "2604.12225", "category": "cond-mat", "title": "Steady-State Equilibrium and Nonequilibrium Noisy Network Dynamics", "abstract": "The fluctuating dynamics of a network about its stable, noise-free steady state are theoretically investigated. Various causes of non-equilibrium dynamics are identified in terms of the properties and symmetry of the network connections and the noise covariance matrices. Several equivalent conditions are derived for the dynamics of the noisy network at equilibrium. In particular, non-equilibrium steady state (NESS) dynamics are analyzed in terms of the steady-state probability current and the drift velocity relative to the effective potential surface. Conventional physical Brownian dynamics for overdamped fluctuating dynamics is analyzed from the perspective of the linearized fluctuating noisy network dynamics. Connection with the network reconstruction from time-series data is discussed. It is demonstrated that the overdamped Brownian dynamics in the physical system is a special case of the general noisy directed network in a NESS. Furthermore, a general fluctuation-dissipation relation is derived for the general non-equilibrium noisy network dynamics. These theoretical results are verified by numerical simulations.", "url": "https://arxiv.org/abs/2604.12225", "type": "理论+数值", "summary": "从理论上研究了网络关于其稳定、无噪声稳态的波动动力学。根据网络连接和噪声协方差矩阵的属性和对称性来识别非平衡动力学的各种原因。导出了平衡时噪声网络动态的几个等效条件。特别是，根据稳态概率电流和相对于有效势面的漂移速度来分析非平衡稳态（NESS）动力学。从线性化脉动噪声网络动力学的角度分析了过阻尼脉动动力学的传统物理布朗动力学。讨论了与时间序列数据的网络重建的连接。结果表明，物理系统中的过阻尼布朗动力学是 NESS 中一般噪声定向网络的特例。此外，针对一般非平衡噪声网络动力学推导了一般波动耗散关系。这些理论结果通过数值模拟得到了验证。", "authors": [{"name": "Pik-Yin Lai"}], "featured_authors": [{"name": "Pik-Yin Lai"}], "author_count": 1}, {"id": "2604.12249", "category": "cond-mat", "title": "Orbital-selective correlations and angular momentum coupling in heavy actinides Am, Cm, Bk, and Cf under pressure: A many-body perspective", "abstract": "We systematically investigate the electronic structures of americium (Am), curium (Cm), berkelium (Bk), and californium (Cf) in both the ambient-pressure double hexagonal close-packed (dhcp) and high-pressure face-centered cubic (fcc) phases, using density functional theory combined with embedded dynamical mean-field approach. Our results reveal that Am exhibits moderate correlation strength and localized 5f states dominated by jj angular momentum coupling scheme. In Cm and Bk, strong electron correlations drive the system into a localized regime, characterized by Hubbard band formation, large effective electron masses, and non-Fermi liquid behavior. Their magnetic ground states are governed by exchange interactions within an intermediate coupling scheme that shifts toward LS coupling. Remarkably, Cf reenters a jj coupling regime while exhibiting the strongest orbital-selective correlations among the series. Atomic eigenstate probabilities show moderate configurational mixing in Am, whereas Cm, Bk, and Cf maintain nearly fixed trivalent configurations, indicating localized 5f states. Compared with the dhcp phase, the fcc structure generally enhances correlation effects, as evidenced by wider Hubbard bandgaps and increased valence state fluctuation in Am. Analyses of kinetic energy, potential energy, spin susceptibility, and charge susceptibility further corroborate the progressive localization of 5f electrons and the emergence of orbital-selective correlations from Am to Cf. This work establishes a unified picture of 5f electron evolution across the Am-Cf series, elucidating the interplay between spin-orbit coupling, electron correlation, and crystal structure in heavy actinides and offering insights into their behavior under high pressure.", "url": "https://arxiv.org/abs/2604.12249", "type": "理论+数值", "summary": "我们利用密度泛函理论与嵌入式动态平均场方法相结合，系统地研究了镅（Am）、锔（Cm）、锫（Bk）和锎（Cf）在常压双六方密堆积（dhcp）和高压面心立方（fcc）相中的电子结构。我们的结果表明，Am 表现出中等的相关强度和由 jj 角动量耦合方案主导的局域 5f 态。在 Cm 和 Bk 中，强电子相关性驱动系统进入局域状态，其特征是哈伯德带形成、大有效电子质量和非费米液体行为。它们的磁基态受向 LS 耦合转变的中间耦合方案内的交换相互作用控制。值得注意的是，Cf 重新进入 jj 耦合状态，同时表现出该系列中最强的轨道选择性相关性。原子本征态概率显示 Am 中存在适度的构型混合，而 Cm、Bk 和 Cf 保持几乎固定的三价构型，表明局部 5f 态。\n\n与 dhcp 相相比，fcc 结构通常增强相关效应，Am 中更宽的哈伯德带隙和增加的价态波动证明了这一点。对动能、势能、自旋磁化率和电荷磁化率的分析进一步证实了 5f 电子的渐进定位以及从 Am 到 Cf 的轨道选择性相关性的出现。这项工作建立了 Am-Cf 系列 5f 电子演化的统一图景，阐明了重锕系元素中自旋轨道耦合、电子关联和晶体结构之间的相互作用，并提供了对其在高压下行为的见解。", "authors": [{"name": "Haiyan Lu"}], "featured_authors": [{"name": "Haiyan Lu"}], "author_count": 1}, {"id": "2604.12264", "category": "cond-mat", "title": "Polymer-free van der Waals assembly of 2D material heterostructures using muscovite crystals", "abstract": "The advent of van der Waals (vdW) heterostructures has enabled formation of bespoke materials with atomic precision, where numerous quantum and topological phenomena have already been discovered. This atomic-layer tunability, however, comes at a cost: individual 2D layers must be picked up, moved, and placed in a deterministic manner while keeping their interfaces atomically clean. Recent advances in machine learning and robotics place even stronger emphasis on the deterministic aspect of vdW assembly. Current polymer-based transfer methods satisfy neither the determinism nor cleanliness requirements. To this end, solutions are needed where adhesion can be dynamically and deterministically controlled without leaving organic contamination. Here, we present a polymer free transfer technique employing thin muscovite (mica) crystals. Temperature control over mica adhesion enables deterministic pick-up, stacking, and release of 2D materials, while their crystalline, inorganic nature ensures pristine interfaces and suppresses strain. Fully compatible with existing fabrication workflows, this approach enables the assembly of demanding vdW heterostructures, including those with exposed conductive layers, moiré superlattices and suspended membranes. Our method represents a promising strategy for vdW heterostructure fabrication toward its automatization.", "url": "https://arxiv.org/abs/2604.12264", "type": "理论+数值", "summary": "范德华（vdW）异质结构的出现使得能够形成具有原子精度的定制材料，并且已经发现了许多量子和拓扑现象。然而，这种原子层的可调性是有代价的：必须以确定性的方式拾取、移动和放置各个 2D 层，同时保持其接口原子干净。机器学习和机器人技术的最新进展更加强调了 vdW 组装的确定性。目前基于聚合物的转移方法既不能满足确定性要求，也不能满足清洁度要求。为此，需要能够动态且确定地控制粘附力而不留下有机污染的解决方案。在这里，我们提出了一种采用薄白云母（云母）晶体的无聚合物转移技术。对云母粘附的温度控制可以实现二维材料的确定性拾取、堆叠和释放，而其结晶、无机性质确保原始界面并抑制应变。\n\n这种方法与现有的制造工作流程完全兼容，能够组装要求严格的 vdW 异质结构，包括具有外露导电层、莫尔超晶格和悬浮膜的异质结构。我们的方法代表了 vdW 异质结构制造自动化的一种有前景的策略。", "authors": [{"name": "Ian Babich"}, {"name": "Timofey M. Savilov"}, {"name": "Natalia A. Mamchik"}, {"name": "Kristina Vaklinova"}, {"name": "Nansi Zhou"}, {"name": "Denis S. Baranov"}, {"name": "Dmitrii A. Litvinov"}, {"name": "Virgil Gavriliuc"}, {"name": "Yue Yuan"}, {"name": "Amoz Chua"}, {"name": "Kenji Watanabe"}, {"name": "Takashi Taniguchi"}, {"name": "Mario Lanza"}, {"name": "Maciej Koperski"}, {"name": "Kostya S. Novoselov"}, {"name": "Alexey I. Berdyugin"}, {"name": "Makars Šiškins"}], "featured_authors": [{"name": "Ian Babich"}, {"name": "Timofey M. Savilov"}, {"name": "Natalia A. Mamchik"}, {"name": "Kostya S. Novoselov"}, {"name": "Alexey I. Berdyugin"}, {"name": "Makars Šiškins"}], "author_count": 17}, {"id": "2604.12328", "category": "cond-mat", "title": "Charge-4e/6e superconductivity and chiral metal from 3D chiral superconductor", "abstract": "Unconventional superconductivity (SC) characterized by multi-fermion orderings has attracted substantial attention. However, previous studies have largely focused on 2D systems or 3D systems with effective 2D symmetries. Here, we investigate the vestigial phases arising from thermal fluctuations of chiral SC in 3D systems governed by the cubic $O_h$ point group. By constructing low-energy effective Hamiltonians via Ginzburg-Landau analysis and conducting Monte Carlo simulations, we systematically investigate the phase fluctuations of chiral orders within the $E_g$ and $T_{2g}/T_{1u}$ irreducible representations (IRRPs). We identify a phase diagram topology different from 2D counterparts, where the multi-phase intersection manifests as a tetracritical point rather than the triple point typically found in 2D systems. We elucidate the evolution of these phases under thermal fluctuations. Our findings reveal that for both $E_g$ and $T_{2g}/T_{1u}$ IRRPs, the primary chiral orders could melt into a chiral metallic phase across specific parameter regimes. Moreover, for the $E_g$ IRRP, phase fluctuation could also induce a charge-$4e$ phase under certain regime, while for the $T_{2g}$ and $T_{1u}$ IRRPs, it leads to a higher-order charge-$6e$ SC state. Our work paves the way for exploring exotic vestigial orders driven by non-trivial 3D crystalline symmetries.", "url": "https://arxiv.org/abs/2604.12328", "type": "理论+数值", "summary": "以多费米子有序为特征的非常规超导（SC）引起了广泛关注。然而，之前的研究主要集中在 2D 系统或具有有效 2D 对称性的 3D 系统。在这里，我们研究了由立方 $O_h$ 点群控制的 3D 系统中手性 SC 的热波动引起的残留相。通过 Ginzburg-Landau 分析构建低能有效哈密顿量并进行蒙特卡洛模拟，我们系统地研究了 $E_g$ 和 $T_{2g}/T_{1u}$ 不可约表示 (IRRP) 内手性序的相位涨落。我们确定了与二维对应物不同的相图拓扑，其中多相交叉表现为四临界点，而不是二维系统中常见的三相点。我们阐明了热波动下这些相的演变。我们的研究结果表明，对于 $E_g$ 和 $T_{2g}/T_{1u}$ IRRP，初级手性级可以在特定参数范围内融化成手性金属相。\n\n此外，对于$E_g$ IRRP，相位波动在某些情况下还可能引起电荷-$4e$相位，而对于$T_{2g}$和$T_{1u}$ IRRP，它会导致高阶电荷-$6e$ SC状态。我们的工作为探索由非平凡的 3D 晶体对称性驱动的奇异残留秩序铺平了道路。", "authors": [{"name": "Chu-Tian Gao"}, {"name": "Chen Lu"}, {"name": "Yu-Bo Liu"}, {"name": "Zhiming Pan"}, {"name": "Fan Yang"}], "featured_authors": [{"name": "Chu-Tian Gao"}, {"name": "Chen Lu"}, {"name": "Yu-Bo Liu"}, {"name": "Zhiming Pan"}, {"name": "Fan Yang"}], "author_count": 5}, {"id": "2604.12367", "category": "cond-mat", "title": "Kinetic instability and superconductivity in Li$_2$AuH$_6$ and Li$_2$AgH$_6$ at ambient pressure", "abstract": "Li$_2$AuH$_6$ and Li$_2$AgH$_6$ have been proposed as promising candidates for high-temperature superconductors under ambient pressure. While previous studies confirm the dynamic stability of these two thermodynamically unstable systems, their kinetic stability remains to be verified. In this work, we use path integral molecular dynamics simulations to examine the kinetic stability of Li$_2$AuH$_6$ and Li$_2$AgH$_6$ under ambient pressure. We find both compounds are kinetically unstable. Li$_2$AgH$_6$ undergoes lattice collapse, whereas Li$_2$AuH$_6$ retains a stable fluorite-type Li-Au sublattice, but hydrogen atoms partially dimerize into molecules and diffuse within the host lattice. Using the stochastic path-integral approach, which is a nonperturbative approach applicable to systems with diffusive atoms, we investigate the superconductivity of Li$_2$AuH$_6$ in this state. We predict a superconducting transition temperature of 22 K, well below earlier predictions, due to the low density of states at the Fermi level caused by the collapse of hydrogen sublattice and hydrogen dimerization.", "url": "https://arxiv.org/abs/2604.12367", "type": "数值", "summary": "Li$_2$AuH$_6$ 和 Li$_2$AgH$_6$ 被认为是环境压力下高温超导体的有希望的候选材料。虽然之前的研究证实了这两个热力学不稳定系统的动态稳定性，但它们的动力学稳定性仍有待验证。在这项工作中，我们使用路径积分分子动力学模拟来检查 Li$_2$AuH$_6$ 和 Li$_2$AgH$_6$ 在环境压力下的动力学稳定性。我们发现这两种化合物在动力学上都不稳定。 Li$_2$AgH$_6$ 经历晶格塌陷，而 Li$_2$AuH$_6$ 保留稳定的萤石型 Li-Au 亚晶格，但氢原子部分二聚成分子并在主晶格内扩散。使用随机路径积分方法（一种适用于具有扩散原子的系统的非微扰方法），我们研究了这种状态下 Li$_2$AuH$_6$ 的超导性。我们预测超导转变温度为 22 K，远低于之前的预测，这是由于氢亚晶格塌陷和氢二聚导致费米能级的态密度较低。", "authors": [{"name": "Yucheng Ding"}, {"name": "Haoran Chen"}, {"name": "Junren Shi"}], "featured_authors": [{"name": "Yucheng Ding"}, {"name": "Haoran Chen"}, {"name": "Junren Shi"}], "author_count": 3}, {"id": "2604.12430", "category": "cond-mat", "title": "Generalized BChS Model with Group Interactions: Shift in the Critical Point and Mean-Field Ising Universality", "abstract": "We introduce a generalized version of the Biswas-Chatterjee-Sen (BChS) model \\cite{Biswas} with group interactions of size $q$, extending the original pairwise interaction dynamics. Within a mean-field framework, we derive an exact expression for the critical noise $p_c(q)$, showing that it increases monotonically with $q$ and approaches $1/2$ in the large-$q$ limit, consistent with a Gaussian approximation. Despite this shift in the phase boundary, the critical behavior remains unchanged across all $q$: the order parameter scales as $(p_c(q)-p)^{1/2}$, and the relaxation timescale diverges as $|p-p_c(q)|^{-1}$, identical to the original BChS model \\cite{Biswas}. Finite-size scaling of the Binder cumulant, order parameter, and its fluctuations confirm that the system belongs to the mean-field Ising universality class for all $q$. Our results demonstrate that higher-order interactions modify the location of the transition without altering its universality class.", "url": "https://arxiv.org/abs/2604.12430", "type": "理论+数值", "summary": "我们引入了 Biswas-Chatterjee-Sen (BChS) 模型的广义版本 \\cite{Biswas} ，其群体相互作用的大小为 $q$，扩展了原始的成对相互作用动力学。在平均场框架内，我们推导了临界噪声 $p_c(q)$ 的精确表达式，表明它随 $q$ 单调增加，并在大 $q$ 限制中接近 $1/2$，与高斯近似一致。尽管相界发生了这种变化，但所有 $q$ 的临界行为保持不变：顺序参数缩放为 $(p_c(q)-p)^{1/2}$，弛豫时间尺度发散为 $|p-p_c(q)|^{-1}$，与原始 BChS 模型 \\cite{Biswas} 相同。 Binder 累积量、阶次参数及其波动的有限尺寸缩放确认系统属于所有 $q$ 的平均场 Ising 普适性类。我们的结果表明，高阶相互作用改变了转变的位置，而不改变其普遍性类别。", "authors": [{"name": "Amit Pradhan"}], "featured_authors": [{"name": "Amit Pradhan"}], "author_count": 1}, {"id": "2604.12475", "category": "cond-mat", "title": "Explicit proof of Anderson's orthogonality catastrophe for the one-dimensional Fermi polaron with attractive interaction", "abstract": "We provide a fully analytical derivation of Anderson's orthogonality catastrophe for the one dimensional Fermi polaron integrable model, describing a system of $N$ spin-up fermions, with fixed density $n=N/L$, interacting with a single spin-down fermion via an attractive contact potential. The proof combines the determinant representations of the norm of the many-body wave function and of its scalar product with the noninteracting ground state, obtained from the Bethe ansatz solution, with the special properties of Cauchy matrices. We derive the leading asymptotics of the two determinants in the thermodynamic limit and show that the quasi-particle residue $Z$ decays algebraically, $Z=W N^{-\\theta}$. We confirm that the Anderson exponent $\\theta$ is equal to $2\\delta_F^2/\\pi^2$, where $\\delta_F$ is the Bethe-ansatz phase shift at the Fermi edge. The prefactor $W$ is obtained numerically as a function of the interaction parameter.", "url": "https://arxiv.org/abs/2604.12475", "type": "理论+数值", "summary": "我们为一维费米极化子可积模型提供了安德森正交灾难的完整分析推导，描述了一个由 $N$ 自旋向上费米子组成的系统，具有固定密度 $n=N/L$，通过吸引接触势与单个自旋向下费米子相互作用。该证明结合了多体波函数范数及其标量积与非相互作用基态的行列式表示（从 Bethe ansatz 解获得）以及柯西矩阵的特殊性质。我们推导了热力学极限中两个行列式的先行渐近式，并表明准粒子留数 $Z$ 以代数方式衰减，$Z=W N^{-\\theta}$。我们确认安德森指数 $\\theta$ 等于 $2\\delta_F^2/\\pi^2$，其中 $\\delta_F$ 是费米边的 Bethe-ansatz 相移。前因子 $W$ 是作为交互参数的函数以数字方式获得的。", "authors": [{"name": "Giuliano Orso"}], "featured_authors": [{"name": "Giuliano Orso"}], "author_count": 1}, {"id": "2604.12531", "category": "cond-mat", "title": "Kinetic Arrest of a First Order Phase Transition", "abstract": "We report a phenomenological theory for the kinetic arrest (KA) of a first-order phase transition, taking the Mott metal-insulator transition in $V_2O_3$ as a test case. By defining a order parameter $\\phi$ related to the monoclinic distortion of the high temperature metallic and mapping its Time-Dependent Ginzburg-Landau (TDGL) dynamics onto a disorder-influenced Imry-Wortis landscape, we derive a universal transcendental condition for the mechanism of the kinetic arrest. We demonstrate that epitaxial substrate-induced clamping in (001)-oriented $V_2O_3$ thin films elevates the elastic activation barriers, trapping the high-symmetry corundum phase down to 4.2~K. This structural suppression of the insulating state robustly explains the observed hysteretic $V$-$I$ switching a hallmark of memristive behaviour. Our work identifies a \"Mott-Glass\" as a structurally arrested non-equilibrium state in the strained thin-film of V$_2$O$_3$. Our work provides a predictive framework for engineering strain-tuned neuromorphic synapses.", "url": "https://arxiv.org/abs/2604.12531", "type": "理论+数值", "summary": "我们以 $V_2O_3$ 中的莫特金属-绝缘体转变作为测试用例，报告了一级相变的动力学停止 (KA) 的现象学理论。通过定义与高温金属的单斜变形相关的有序参数 $\\phi$ 并将其随时间变化的 Ginzburg-Landau (TDGL) 动力学映射到受无序影响的 Imry-Wortis 景观上，我们推导出了动力学停止机制的通用先验条件。我们证明，(001) 取向 $V_2O_3$ 薄膜中的外延基板诱导夹紧提高了弹性激活势垒，将高对称性刚玉相捕获至 4.2~K。这种绝缘状态的结构抑制有力地解释了观察到的滞后$V$-$I$切换忆阻行为的标志。我们的工作将“莫特玻璃”确定为 V$_2$O$_3$ 应变薄膜中结构上抑制的非平衡态。我们的工作为工程应变调整的神经形态突触提供了一个预测框架。", "authors": [{"name": "Sindhunil Barman Roy"}], "featured_authors": [{"name": "Sindhunil Barman Roy"}], "author_count": 1}, {"id": "2604.12583", "category": "cond-mat", "title": "Electrochemical Performance of Gold Monolayers for Lithium-Ion Batteries: A First Principles Study", "abstract": "Being motivated by recent synthesis of a monolayer of gold, named goldene, from the nano-laminated ternary ceramic phase of Ti3AuC2, we are proposing two phases of goldene viz. goldene-I and goldene-II as anode material for Lithium-Ion batteries using first principles study. This innovative goldene-I monolayer, composed of triangular motifs of gold atoms, exhibits remarkable properties owing to its unique geometric configuration and intrinsic stability. In contrast, a theoretical structure known as goldene-II, featuring a combination of triangular and hexagonal motifs, has been proposed. This structure possesses intrinsic, periodically distributed pores among Au atoms and demonstrates structural integrity and mechanical robustness, even under lithium adsorption. The electronic band spectra and projected density of states reveal the metallic nature of both phases of goldene. Electrochemical evaluations reveal that goldene-II offers favorable lithium-ion adsorption energies, efficient charge transfer, and volumetric capacities. Goldene-I achieves a volumetric capacity of 0.713 Ah/cm3, while goldene-II reaches 0.783 Ah/cm3, confirming its high suitability for lithium storage volumetric capability. Moreover, goldene-I has an ultra-low barrier height of 15 meV, which supports rapid lithium-ion transport.", "url": "https://arxiv.org/abs/2604.12583", "type": "理论", "summary": "受最近从 Ti3AuC2 纳米层压三元陶瓷相合成单层金（称为 Goldene）的启发，我们提出了 Goldene 的两相。使用第一原理研究将goldene-I 和goldene-II 作为锂离子电池负极材料。这种创新的goldene-I单层由金原子的三角形图案组成，由于其独特的几何构型和内在稳定性而表现出卓越的特性。相比之下，一种被称为goldene-II的理论结构被提出，其特点是三角形和六边形图案的组合。这种结构在金原子之间具有固有的、周期性分布的孔，即使在锂吸附的情况下，也表现出结构完整性和机械鲁棒性。电子能带谱和投影态密度揭示了金矿两相的金属性质。电化学评估表明，goldene-II 具有良好的锂离子吸附能、高效的电荷转移和体积容量。\n\nGoldene-I的体积容量达到0.713 Ah/cm3，而goldene-II则达到0.783 Ah/cm3，证实了其对锂存储体积容量的高度适用性。此外，goldene-I具有15meV的超低势垒高度，支持快速锂离子传输。", "authors": [{"name": "Ajay Kumara"}, {"name": "Pritam Samanta"}, {"name": "Prakash Parida"}], "featured_authors": [{"name": "Ajay Kumara"}, {"name": "Pritam Samanta"}, {"name": "Prakash Parida"}], "author_count": 3}, {"id": "2604.12585", "category": "cond-mat", "title": "Finite temperature correlation functions of the sine--Gordon model", "abstract": "The sine-Gordon model serves as a foundational $1+1$-dimensional quantum field theory with numerous applications in condensed matter physics. Despite its integrability, characterizing its finite-temperature behavior remains a significant theoretical challenge. Here we use the previously developed Method of Random Surfaces (MRS) to evaluate two-point and higher-order correlation functions. We cross-check these results with known analytical limits, demonstrating that the MRS provides reliable, non-perturbative data in intermediate regimes where traditional form-factor expansions and semiclassical methods are inapplicable. Furthermore, we derive an exact result for arbitrary $N$-point functions satisfying an appropriate selection rule, providing a direct computational method for complex multi-point observables at finite temperature. We also characterize the non-Gaussianity of correlations and demonstrate that the results align with intuitive theoretical expectations.", "url": "https://arxiv.org/abs/2604.12585", "type": "理论+数值", "summary": "正弦戈登模型是基础的 1+1 维量子场论，在凝聚态物理中有广泛的应用。尽管它具有可积性，但表征其有限温度行为仍然是一个重大的理论挑战。在这里，我们使用先前开发的随机曲面​​方法（MRS）来评估两点和高阶相关函数。我们将这些结果与已知的分析极限进行交叉检查，证明 MRS 在传统形状因子扩展和半经典方法不适用的中间状态下提供了可靠的、非扰动的数据。此外，我们得出了满足适当选择规则的任意$N$点函数的精确结果，为有限温度下复杂的多点可观测量提供了直接计算方法。我们还描述了相关性的非高斯性，并证明结果与直观的理论预期相符。", "authors": [{"name": "M. Tóth"}, {"name": "J. H. Pixley"}, {"name": "G. Takács"}, {"name": "M. Kormos"}], "featured_authors": [{"name": "M. Tóth"}, {"name": "J. H. Pixley"}, {"name": "G. Takács"}, {"name": "M. Kormos"}], "author_count": 4}, {"id": "2604.12605", "category": "cond-mat", "title": "Quantum dynamics of coupled quasinormal modes and quantum emitters interacting via finite-delay propagating photons", "abstract": "A time-dependent theory for the interactions between spatially separated lossy cavities in a homogeneous background medium using quantized quasinormal modes (QNMs) is presented. The cavities interact via a bath of traveling photons, described by non-bosonic operators that are orthogonal to the open-cavity QNMs. The retarded (i.e., time-delayed) inter-cavity dynamics are fully described by system-bath correlation functions, in which the emission from one cavity appears as the input field for another. Coupling between quantum emitters (described as two-level systems), placed inside a cavity or embedded in an external medium, and the electromagnetic field (cavity modes and bath photons) is included in the theory, which gives rise to both bath-mediated and QNM-mediated interactions between the emitters.", "url": "https://arxiv.org/abs/2604.12605", "type": "理论+数值", "summary": "提出了一种使用量化准正态模式 (QNM) 的均匀背景介质中空间分离的有损腔之间相互作用的时间相关理论。空腔通过行进光子浴相互作用，由与开腔 QNM 正交的非玻色子算子描述。延迟（即时间延迟）的腔间动力学可以通过系统浴相关函数来充分描述，其中一个腔的发射表现为另一个腔的输入场。理论中包括放置在腔内或嵌入外部介质中的量子发射器（描述为两级系统）和电磁场（腔模式和浴光子）之间的耦合，这会引起发射器之间浴介导和 QNM 介导的相互作用。", "authors": [{"name": "Robert Meiners Fuchs"}, {"name": "Juanjuan Ren"}, {"name": "Sebastian Franke"}, {"name": "Stephen Hughes"}, {"name": "Marten Richter"}], "featured_authors": [{"name": "Robert Meiners Fuchs"}, {"name": "Juanjuan Ren"}, {"name": "Sebastian Franke"}, {"name": "Stephen Hughes"}, {"name": "Marten Richter"}], "author_count": 5}, {"id": "2604.12609", "category": "cond-mat", "title": "Symmetry breaking structural relaxation and optical transitions of native defects and carbon impurities in LiGa$_5$O$_8$", "abstract": "LiGa$_5$O$_8$ in a spinel type structure has recently been claimed to be an unintentional p-type ultra-wide-band-gap oxide semiconductor. While previous computational work did not yet identify the origin of p-type doping and in fact predicted insulating behavior by compensation of deep acceptors by shallow donors, defect characterization in terms of its optical signatures remains important. Rather than focusing on thermodynamics transition levels, as in earlier work, this present paper focuses on the vertical transitions in a defect configuration diagram of defects in different charge states, representing absorption and emission processes involving carrier capture/emission from/to band edges. In addition, the structural relaxation of several native defects is revisited by allowing for more complex symmetry-breaking distortions in an effort to reconcile conflicting results in the previous literature. Special attention is given to the Li vacancy because it is the shallowest native acceptor. For this defect, the previously reported transition levels are revised on the basis of symmetry-breaking relaxations. The structural relaxations, band structures, and densities of states are compared between the symmetry-broken polaronic and symmetry-conserving non-polaronic states. Finally, we also study carbon impurities, which are likely to originate from growth methods involving organic precursors.", "url": "https://arxiv.org/abs/2604.12609", "type": "理论", "summary": "尖晶石型结构的 LiGa$_5$O$_8$ 最近被声称是一种无意的 p 型超宽带隙氧化物半导体。 While previous computational work did not yet identify the origin of p-type doping and in fact predicted insulating behavior by compensation of deep acceptors by shallow donors, defect characterization in terms of its optical signatures remains important. Rather than focusing on thermodynamics transition levels, as in earlier work, this present paper focuses on the vertical transitions in a defect configuration diagram of defects in different charge states, representing absorption and emission processes involving carrier capture/emission from/to band edges. In addition, the structural relaxation of several native defects is revisited by allowing for more complex symmetry-breaking distortions in an effort to reconcile conflicting results in the previous literature.特别关注 Li 空位，因为它是最浅的本地受体。对于这个缺陷，之前报道的跃迁能级在对称破缺弛豫的基础上进行了修改。\n\n比较了对称破缺极化子态和对称守恒非极化子态的结构弛豫、能带结构和态密度。最后，我们还研究了碳杂质，这些杂质可能源自涉及有机前体的生长方法。", "authors": [{"name": "Klichchupong Dabsamut"}, {"name": "Adisak Boonchun"}, {"name": "Walter R. L. Lambrecht"}], "featured_authors": [{"name": "Klichchupong Dabsamut"}, {"name": "Adisak Boonchun"}, {"name": "Walter R. L. Lambrecht"}], "author_count": 3}, {"id": "2604.12636", "category": "cond-mat", "title": "Nonmonotonic Scaling of the Anomalous Hall Effect in a Bicollinear Antiferromagnet", "abstract": "An anomalous Hall effect (AHE) in antiferromagnetic (AF) systems with no net magnetization is of considerable interest for both fundamental physics and spintronic applications. Of particular interest is the two-dimensional van der Waals antiferromagnet FeTe that has an unusual fully magnetically compensated bicollinear AF structure and exhibits pronounced Kondo interaction leading to strong band renormalization. Here, we investigate the AHE in epitaxial FeTe thin films grown by molecular beam epitaxy. A large anomalous Hall conductivity is exhibited below the Neel temperature (T_N ~ 60 K) and, strikingly, becomes nonlinear at high fields within a narrow temperature window around 49 K, deviating from conventional AHE scaling behavior versus its longitudinal conductivity. Linear fits reveal a pronounced negative peak in the intercept, accompanied by a field-induced canted magnetic moment. The AHE responses are related to the Berry curvature derived from FeTe's topological band structure, highlighting the intricate interplay between topology, magnetism, and electronic transport.", "url": "https://arxiv.org/abs/2604.12636", "type": "理论", "summary": "无净磁化的反铁磁 (AF) 系统中的反常霍尔效应 (AHE) 对于基础物理和自旋电子学应用都具有很大的意义。特别令人感兴趣的是二维范德华反铁磁体 FeTe，它具有不寻常的完全磁补偿双共线 AF 结构，并表现出明显的近藤相互作用，导致强能带重正化。在这里，我们研究了通过分子束外延生长的外延 FeTe 薄膜的 AHE。在尼尔温度 (T_N ~ 60 K) 以下，表现出较大的反常霍尔电导率，并且引人注目的是，在 49 K 左右的窄温度窗口内的高场下，霍尔电导率变得非线性，这偏离了传统的 AHE 缩放行为与其纵向电导率的关系。线性拟合显示截距中存在明显的负峰值，并伴有场感应倾斜磁矩。 AHE 响应与源自 FeTe 拓扑能带结构的贝里曲率相关，突出了拓扑、磁性和电子传输之间复杂的相互作用。", "authors": [{"name": "Ruifeng Wang"}, {"name": "Chi Fang"}, {"name": "Ilya Kostanovski"}, {"name": "Ke Xiao"}, {"name": "Felix Küster"}, {"name": "Jenny Davern"}, {"name": "Naoto Nagaosa"}, {"name": "Stuart S. P. Parkin"}], "featured_authors": [{"name": "Ruifeng Wang"}, {"name": "Chi Fang"}, {"name": "Ilya Kostanovski"}, {"name": "Jenny Davern"}, {"name": "Naoto Nagaosa"}, {"name": "Stuart S. P. Parkin"}], "author_count": 8}, {"id": "2604.12670", "category": "cond-mat", "title": "Role of diffusion-induced grain boundary migration during molten salt corrosion of a Ni-30Cr alloy", "abstract": "The response of Ni-Cr alloys to exposure to molten chloride and fluoride salts is typically characterized by Cr dealloying with the formation of a Cr-depleted bi-continuous porous subsurface layer. The exact mechanism behind the loss of Cr over distances unattainable by lattice diffusion alone is still debated. To address this question, two different surface finishes, namely electropolished and sanded, of a Ni-30Cr alloy were exposed to LiCl-KCl-2wt% EuCl3 eutectic salt at 500 °C for 96 hours. In the absence of fast diffusion pathways, dissolution occurred layer by layer and was kinetically controlled by Ni dissolution, as observed over the grain interiors of the electropolished sample. Grain boundaries were subject to diffusion-induced grain boundary migration (DIGM), leading to the formation of pure Ni islands above grain boundaries. This overall behavior contrasted with the sanded surface response that was characterized by several micrometer deep interconnected porosity and complete Cr depletion. DIGM of the dense grain boundaries created by recrystallization of the sanded surface was responsible for the observed sub-surface microstructure. This work unequivocally establishes DIGM as a key mechanism in alloy molten salt corrosion, and microstructure as a decisive contributor to an alloy's corrosion response.", "url": "https://arxiv.org/abs/2604.12670", "type": "理论", "summary": "Ni-Cr 合金对熔融氯化物和氟化物盐的响应通常以 Cr 脱合金为特征，并形成贫 Cr 双连续多孔地下层。 Cr 在仅通过晶格扩散无法达到的距离上损失的确切机制仍然存在争议。为了解决这个问题，将 Ni-30Cr 合金的两种不同表面处理（即电解抛光和打磨）在 500 °C 下暴露于 LiCl-KCl-2wt% EuCl3 共晶盐中 96 小时。在没有快速扩散途径的情况下，溶解逐层发生，并由镍溶解进行动力学控制，如在电解抛光样品的颗粒内部观察到的那样。晶界受到扩散诱导晶界迁移（DIGM）的影响，导致在晶界上方形成纯镍岛。这种整体行为与砂磨表面响应形成鲜明对比，砂磨表面响应的特征是几微米深的互连孔隙度和完全的 Cr 耗尽。由砂磨表面再结晶产生的致密晶界的 DIGM 是观察到的亚表面微观结构的原因。\n\n这项工作明确地将 DIGM 确立为合金熔盐腐蚀的关键机制，并将微观结构确立为合金腐蚀响应的决定性因素。", "authors": [{"name": "Konnor Walter"}, {"name": "Jagadeesh Sure"}, {"name": "Adrien Couet"}, {"name": "Emmanuelle A. Marquis"}], "featured_authors": [{"name": "Konnor Walter"}, {"name": "Jagadeesh Sure"}, {"name": "Adrien Couet"}, {"name": "Emmanuelle A. Marquis"}], "author_count": 4}, {"id": "2604.12701", "category": "cond-mat", "title": "Supercurrent-induced phonon angular momentum", "abstract": "We propose a mechanism of supercurrent-induced phonon angular momentum in mixed parity superconductors and s-wave superconductors with spin orbit coupling. We derive analytical expressions of phonon angular momentum induced by the supercurrent by perturbative calculation. The physical interpretation of this effect is also discussed.", "url": "https://arxiv.org/abs/2604.12701", "type": "数值", "summary": "我们提出了一种在具有自旋轨道耦合的混合宇称超导体和横波超导体中超电流感应声子角动量的机制。通过微扰计算，推导了超流引起的声子角动量的解析表达式。还讨论了这种效应的物理解释。", "authors": [{"name": "Takehito Yokoyama"}], "featured_authors": [{"name": "Takehito Yokoyama"}], "author_count": 1}, {"id": "2604.12722", "category": "cond-mat", "title": "Spintronic THz emitters based on NiCu alloys", "abstract": "We study THz emission from ferromagnet / nonmagnetic material (FM/NM) spintronic nanostructures in which the $Ni_xCu_{1-x}$ alloy with different $x$ is used as an FM, an NM, or both layers. The stoichiometric composition of the NiCu alloys standing at two positions (we denote it as [FM] or [PM]) is chosen so that it is ferromagnetic at room temperature in the case it is used as the FM layer, and is paramagnetic at room temperature for the NM layer. Besides, we choose the nickel ratio $x$ close to each other for both [FM] and [PM] types of the alloy (the difference is only $10\\%$). We show that although NiCu[PM] does not contain heavy metal it acts as an effective converter of spin current into the electric one in our structure showing only 2.8 times smaller efficiency than Pt. Besides, the NiCu[FM] alloy, despite having quite small Curie temperature (approximately $65 ^\\circ C$), acts as an effective spin source having the efficiency only 2 times smaller than Co in similar structures. This shows up the importance of boundary matching in the spintronic THz sources. Our NiCu-based THz sources reveal a possibility of effective thermally induced control of emission of THz radiation due to a unique combination of high emission rate and relatively small Curie temperature.", "url": "https://arxiv.org/abs/2604.12722", "type": "理论", "summary": "我们研究铁磁体/非磁性材料 (FM/NM) 自旋电子纳米结构的太赫兹发射，其中具有不同 $x$ 的 $Ni_xCu_{1-x}$ 合金用作 FM、NM 或两层。选择处于两个位置的 NiCu 合金的化学计量成分（我们将其表示为 [FM] 或 [PM]），使其在用作 FM 层的情况下在室温下呈铁磁性，而在用作 NM 层的情况下在室温下呈顺磁性。此外，对于[FM]和[PM]类型的合金，我们选择彼此接近的镍比率$x$（差异仅$10\\%$）。我们表明，尽管 NiCu[PM] 不含重金属，但在我们的结构中，它可以作为自旋电流到电电流的有效转换器，效率仅比 Pt 小 2.8 倍。此外，NiCu[FM]合金尽管具有相当低的居里温度（大约$65^\\circ C$），但作为有效的自旋源，其效率仅比类似结构中的Co小两倍。这显示了自旋电子太赫兹源中边界匹配的重要性。\n\n我们的镍铜基太赫兹源揭示了由于高发射率和相对较小的居里温度的独特组合，有效热诱导控制太赫兹辐射的可能性。", "authors": [{"name": "E. A. Karashtin"}, {"name": "I. Yu. Pashen'kin"}, {"name": "A. V. Gorbatova"}, {"name": "E. D. Lebedeva"}, {"name": "P. Yu. Avdeev"}, {"name": "N. V. Bezvikonnyi"}, {"name": "A. M. Buryakov"}], "featured_authors": [{"name": "E. A. Karashtin"}, {"name": "I. Yu. Pashen'kin"}, {"name": "A. V. Gorbatova"}, {"name": "P. Yu. Avdeev"}, {"name": "N. V. Bezvikonnyi"}, {"name": "A. M. Buryakov"}], "author_count": 7}, {"id": "2604.12732", "category": "cond-mat", "title": "Quantum percolation in honeycomb lattices under random spin-orbit coupling", "abstract": "We investigate quantum percolation in a honeycomb lattice with site dilution and random spin-orbit coupling. Using exact diagonalization combined with finite-size scaling analysis, we study the metal-insulator transition, extracting the quantum percolation threshold $p_q$, and the correlation-length exponent, $\\nu$. In the absence of spin-orbit coupling, we find that $p_q$ remains finite and demonstrate that the quantum threshold is significantly higher than the classical site-percolation threshold $p_c$ of the honeycomb lattice. When spin-orbit coupling is present, the spectral statistics exhibit a crossover from the Gaussian orthogonal ensemble to the Gaussian symplectic ensemble, reflecting the change in symmetry class. Simultaneously, the quantum percolation threshold shifts systematically to lower occupation probabilities, indicating that the spin-orbit coupling favors delocalization. For sufficiently strong spin-orbit coupling, $p_q$ tends to saturate, while the critical exponent approaches the expected one of the two-dimensional symplectic universality class.", "url": "https://arxiv.org/abs/2604.12732", "type": "理论+数值", "summary": "我们研究了具有位点稀释和随机自旋轨道耦合的蜂窝晶格中的量子渗流。使用精确对角化与有限尺寸缩放分析相结合，我们研究了金属-绝缘体转变，提取了量子渗流阈值 $p_q$ 和相关长度指数 $\\nu$。在没有自旋轨道耦合的情况下，我们发现 $p_q$ 仍然有限，并证明量子阈值明显高于蜂窝晶格的经典位点渗流阈值 $p_c$。当存在自旋轨道耦合时，谱统计表现出从高斯正交系综到高斯辛系综的交叉，反映了对称类的变化。同时，量子渗透阈值系统地转向较低的占据概率，表明自旋轨道耦合有利于离域。对于足够强的自旋轨道耦合，$p_q$趋于饱和，而临界指数接近二维辛普适性类的预期指数。", "authors": [{"name": "W. S. Oliveira"}, {"name": "Julián Faúndez"}, {"name": "Welles Morgado"}], "featured_authors": [{"name": "W. S. Oliveira"}, {"name": "Julián Faúndez"}, {"name": "Welles Morgado"}], "author_count": 3}, {"id": "2604.12759", "category": "cond-mat", "title": "Localization and Flat Bands in Edge-Inflated Lattices", "abstract": "We study localization and flat-band formation in lattices generated by repeated edge inflation of square, honeycomb, and triangular parent lattices. Replacing each bond by a finite tight-binding chain produces several distinct classes of flat bands: chain-induced flat bands at the eigenenergies of the inserted chains, symmetry-protected zero-energy flat bands in bipartite edge-inflated lattices, and nearly flat junction bands near the spectral edges for sufficiently long chains. We analyze these mechanisms for ordered Lieb-$L$, super$^{L}$honeycomb, and super$^{L}$triangular lattices, and examine their response to bond disorder, site disorder, random magnetic flux, and randomness in the inflation process itself. While bond and site disorder broaden most flat bands, the zero-energy chiral band and the junction-induced flat bands remain robust under certain perturbations. Remarkably, substantial flat-band features also persist in randomly edge-inflated graphs, even in the absence of translational symmetry. In particular, the number of zero-energy states is found to be well estimated by the matching deficiency $N-2\\nu(G)$, indicating that local tree-like structure continues to control the low-energy nullity. These results identify edge-inflated lattices as a broad class of systems in which geometry alone generates robust localization in both ordered and random settings.", "url": "https://arxiv.org/abs/2604.12759", "type": "理论", "summary": "我们研究了由方形、蜂窝状和三角形母晶格重复边缘膨胀生成的晶格中的局域化和平带形成。用有限紧束缚链代替每个键会产生几种不同类型的平带：插入链本征能处的链诱导平带、二分边缘膨胀晶格中对称保护的零能量平带，以及足够长链的光谱边缘附近的近乎平坦的连接带。我们分析了有序 Lieb-$L$、super$^{L}$ 蜂窝和 super$^{L}$ 三角晶格的这些机制，并检查它们对键无序、位点无序、随机磁通量和膨胀过程本身的随机性的响应。虽然键和位点无序拓宽了大多数平带，但零能量手性带和结引起的平带在某些扰动下仍然保持稳健。值得注意的是，即使不存在平移对称性，大量的平带特征也存在于随机边缘膨胀图中。\n\n特别是，发现零能量态的数量可以通过匹配缺陷 $N-2\\nu(G)$ 很好地估计，表明局部树状结构继续控制低能量零。这些结果将边缘膨胀晶格识别为一类广泛的系统，其中几何形状单独在有序和随机设置中产生稳健的定位。", "authors": [{"name": "Richard Berkovits"}], "featured_authors": [{"name": "Richard Berkovits"}], "author_count": 1}, {"id": "2604.12764", "category": "cond-mat", "title": "Exact demagnetisation field for periodic one-dimensional array of rectangular prisms", "abstract": "The magnetic field from a uniformly magnetised, rectangular prism is known exactly, which is the basis for a large number of micromagnetic simulations. Here we derive an analytical solution for the field from a periodically repeating infinite array of prisms aligned end-to-end, which becomes exact on the center axis in the limit of infinitesimally thin prisms. Using the same method we derive the on-axis field for a one-dimensional array of point dipoles. We validate the obtained results numerically and furthermore compare with the common macrogeometry approach and more recent uniform magnetisation method, demonstrating an excellent convergence rate for the novel method.", "url": "https://arxiv.org/abs/2604.12764", "type": "理论+数值", "summary": "均匀磁化的矩形棱柱的磁场是已知的，这是大量微磁模拟的基础。在这里，我们从端对端对齐的周期性重复的无限棱镜阵列中得出场的解析解，在无限薄棱镜的限制下，该解析解在中心轴上变得精确。使用相同的方法，我们得出一维点偶极子阵列的轴上场。我们对所获得的结果进行了数值验证，并与常见的宏观几何方法和更新的均匀磁化方法进行了比较，证明了该新方法具有出色的收敛速度。", "authors": [{"name": "Frederik Laust Durhuus"}, {"name": "Andrea Roberto Insinga"}, {"name": "Rasmus Bjørk"}], "featured_authors": [{"name": "Frederik Laust Durhuus"}, {"name": "Andrea Roberto Insinga"}, {"name": "Rasmus Bjørk"}], "author_count": 3}, {"id": "2604.12824", "category": "cond-mat", "title": "All optical ultrafast pure spin current in the altermagnet Cr$_2$SO", "abstract": "All-optical generation of pure spin current -- the flow of spin in the absence of a corresponding charge flow -- relies on a symmetry based compensation of valley charge. The 2d $d$-wave altermagnets, ideal spintronics materials due to a very low spin-orbit coupling, possess a magnetic point group and highly anisotropic valley manifolds that would appear to preclude such current compensation, excluding them as materials for the ultrafast generation of pure spin current. Here we show that infra-red valley excitation combined with a THz pulse envelope allows the generation of large and nearly 100\\% pure spin currents in the altermagnet Cr$_2$SO. Our approach is based on a valley selection rule coupling linearly polarized light to spin opposite valleys, along with the intrinsic momentum shift that a co-occurring THz pulse imbues a valley spin excitation with. These results thus provide a practical and all-optical route to the generation of pure spin current in $d$-wave 2d altermagnets, opening a route to lightwave control of spin in an environment with very low intrinsic spin mixing.", "url": "https://arxiv.org/abs/2604.12824", "type": "理论", "summary": "纯自旋电流（在没有相应电荷流的情况下的自旋流）的全光生成依赖于基于对称性的谷电荷补偿。二维 $d$ 波交变磁体是理想的自旋电子材料，由于自旋轨道耦合非常低，具有磁点群和高度各向异性的谷流形，这似乎排除了这种电流补偿，排除它们作为超快产生纯自旋电流的材料。在这里，我们表明，红外谷激发与太赫兹脉冲包络相结合，可以在交流磁体 Cr$_2$SO 中产生大量且接近 100% 的纯自旋电流。我们的方法基于谷选择规则，将线性偏振光耦合到旋转相反的谷，以及同时发生的太赫兹脉冲赋予谷旋转激发的内在动量变化。因此，这些结果为$d$波二维交流磁体中产生纯自旋电流提供了一条实用的全光学途径，为在具有非常低的本征自旋混合的环境中光波控制自旋开辟了一条途径。", "authors": [{"name": "Deepika Gill"}, {"name": "Ruikai Wu"}, {"name": "Peter Elliott"}, {"name": "Sangeeta Sharma"}, {"name": "Sam Shallcross"}], "featured_authors": [{"name": "Deepika Gill"}, {"name": "Ruikai Wu"}, {"name": "Peter Elliott"}, {"name": "Sangeeta Sharma"}, {"name": "Sam Shallcross"}], "author_count": 5}, {"id": "2604.12939", "category": "cond-mat", "title": "Dynamical Poles in Non-Hermitian Impurity Scattering", "abstract": "In Hermitian impurity scattering, each isolated late-time exponential is the fingerprint of a bound state. We show that this correspondence breaks down in non-Hermitian bands. For a single impurity in a non-Hermitian lattice, the late-time signal is controlled by isolated complex frequencies selected by the analytic continuation of the Green's function relevant to real-time dynamics, which we term dynamical poles (DPs). DPs need not coincide with static bound states: one may appear without any bound-state counterpart, while a static bound state may be dynamically invisible. The remainder of the signal is an incoherent background set by complex continuum edges. Our results establish that the real-time analytic structure of the Green's function, not the static eigenvalue problem alone, organizes non-Hermitian impurity scattering.", "url": "https://arxiv.org/abs/2604.12939", "type": "理论", "summary": "在埃尔米特杂质散射中，每个孤立的后期指数都是束缚态的指纹。我们证明这种对应关系在非厄米能带中被打破。对于非厄米晶格中的单个杂质，后期信号由与实时动态相关的格林函数的解析延拓选择的隔离复频率控制，我们将其称为动态极点（DP）。 DP 不需要与静态束缚态一致：DP 可能出现时没有任何对应的束缚态，而静态束缚态可能是动态不可见的。信号的其余部分是由复杂的连续边缘设置的不相干背景。我们的结果表明，格林函数的实时解析结构（而不​​是单独的静态特征值问题）组织了非厄米杂质散射。", "authors": [{"name": "Ao Yang"}, {"name": "Kai Zhang"}, {"name": "Chen Fang"}], "featured_authors": [{"name": "Ao Yang"}, {"name": "Kai Zhang"}, {"name": "Chen Fang"}], "author_count": 3}, {"id": "2604.12975", "category": "cond-mat", "title": "Probing spinon interactions in the spin-1 bilinear-biquadratic chain", "abstract": "We study the dynamical spin and nematic correlations in the bilinear-biquadratic spin-1 chain in the critical phase hosting deconfined spinons. We demonstrate how spinon interactions can be directly probed in the presence of a magnetic field or a single-ion anisotropy. Our analytical predictions are supported by numerical matrix-product-state (MPS) simulations of the underlying microscopic model.", "url": "https://arxiv.org/abs/2604.12975", "type": "理论+数值", "summary": "我们研究了双线性双二次自旋 1 链中存在去限域自旋子的关键相中的动态自旋和向列相关性。我们演示了如何在磁场或单离子各向异性存在的情况下直接探测自旋相互作用。我们的分析预测得到了底层微观模型的数值矩阵产品状态 (MPS) 模拟的支持。", "authors": [{"name": "Yonatan Lin"}, {"name": "Oleg A. Starykh"}, {"name": "Anna Keselman"}], "featured_authors": [{"name": "Yonatan Lin"}, {"name": "Oleg A. Starykh"}, {"name": "Anna Keselman"}], "author_count": 3}, {"id": "2604.12979", "category": "cond-mat", "title": "Evidence for Umklapp electron scattering emission from metal photocathodes", "abstract": "Comparison of the measured spectral emission properties of single-crystal Cu(001) and W(111) photocathodes to established photoemission theories reveal evidence for an additional one photon emission process predominantly affecting electron emission near and below the photoemission threshold. This additional photoemission process is postulated to be due to a momentum-resonant Franck-Condon mechanism mediated by inelastic Umklapp electron scattering. An initial first-principles simulation of this emission process (involving the electron thermal effective mass, the inelastic electron mean free path at the vacuum level, and the number of Fermi surfaces in the metal), when combined with a direct one-step band emission model, is consistent with the measured spectral dependencies of both the quantum efficiency and mean transverse energy of electron photoemission from the two single-crystal metal photocathodes.", "url": "https://arxiv.org/abs/2604.12979", "type": "理论+数值", "summary": "将单晶 Cu(001) 和 W(111) 光电阴极测量的光谱发射特性与已建立的光电发射理论进行比较，揭示了额外的一个光子发射过程主要影响接近和低于光电发射阈值的电子发射的证据。这种额外的光电发射过程被认为是由非弹性 Umklapp 电子散射介导的动量共振弗兰克-康登机制造成的。该发射过程的初始第一性原理模拟（涉及电子热有效质量、真空能级的非弹性电子平均自由程以及金属中费米面的数量）与直接单步能带发射模型相结合，与测量的两个单晶金属光电阴极电子光发射的量子效率和平均横向能量的光谱依赖性一致。", "authors": [{"name": "I-J. Shan"}, {"name": "L.A. Angeloni"}, {"name": "W. Andreas Schroeder"}], "featured_authors": [{"name": "I-J. Shan"}, {"name": "L.A. Angeloni"}, {"name": "W. Andreas Schroeder"}], "author_count": 3}, {"id": "2604.11877", "category": "hep-th", "title": "Generalized symmetries and emergence in axion effective field theories", "abstract": "We study the phenomenological consequences of higher symmetry structures in axion effective field theories. Higher-group and non-invertible symmetries impose parametric constraints on the energy scales at which different symmetries can emerge in the infrared, providing a guide to the ultraviolet physics. We clarify and analyze these emergence constraints in axion EFTs coupled to abelian and non-abelian gauge bosons, with and without charged matter. We show that emergence constraints are universally saturated by anomaly inflow onto topological defects, while in perturbative UV completions they are supererogatory owing to the parametric separation of scales.", "url": "https://arxiv.org/abs/2604.11877", "type": "理论", "summary": "我们研究轴子有效场论中更高对称结构的现象学后果。高群和不可逆对称性对能量尺度施加了参数约束，在该能量尺度上可以在红外线中出现不同的对称性，从而为紫外线物理学提供了指导。我们澄清并分析了与阿贝尔和非阿贝尔规范玻色子（带电物质和不带电物质）耦合的轴子 EFT 中的这些出现约束。我们表明，涌现约束普遍被拓扑缺陷上的异常流入所饱和，而在微扰 UV 完成中，由于尺度的参数分离，它们是多余的。", "authors": [{"name": "Dan Sehayek"}, {"name": "Nathaniel Craig"}], "featured_authors": [{"name": "Dan Sehayek"}, {"name": "Nathaniel Craig"}], "author_count": 2}, {"id": "2604.11884", "category": "hep-th", "title": "Manifest duality and Lorentz covariance for linearised gravity as edge modes", "abstract": "We present the first formulation of linearised gravity in four dimensions which is manifestly Lorentz covariant and democratic, i.e. treats the two frames related by electric-magnetic duality on equal footing. It is well-known that four-dimensional linearised gravity belongs to a class of singleton representations of the four-dimensional conformal algebra $\\mathfrak{so}(2,4)$. Our key insight is viewing this algebra as the isometry of $\\text{AdS}_5$ and realising the massless spin-2 field as an edge mode of a five-dimensional topological field taking values in a specific finite-dimensional representation of $\\mathfrak{so}(2,4)$. The desired four-dimensional action is then found by a covariant boundary reduction procedure.", "url": "https://arxiv.org/abs/2604.11884", "type": "理论", "summary": "我们提出了第一个在四个维度上线性化引力的公式，它显然是洛伦兹协变和民主的，即平等地对待由电磁二象性相关的两个框架。众所周知，四维线性化引力属于四维共形代数 $\\mathfrak{so}(2,4)$ 的一类单例表示。我们的主要见解是将这个代数视为 $\\text{AdS}_5$ 的等距，并将无质量自旋 2 场实现为五维拓扑场的边缘模式，以 $\\mathfrak{so}(2,4)$ 的特定有限维表示形式取值。然后通过协变边界简化过程找到所需的四维作用。", "authors": [{"name": "Calvin Y.-R. Chen"}, {"name": "Euihun Joung"}, {"name": "Karapet Mkrtchyan"}], "featured_authors": [{"name": "Calvin Y.-R. Chen"}, {"name": "Euihun Joung"}, {"name": "Karapet Mkrtchyan"}], "author_count": 3}, {"id": "2604.11894", "category": "hep-th", "title": "Thermodynamics of Chern-Simons AdS$_5$ black holes coupled to $\\mathrm{SU}(2)$ solitons", "abstract": "We investigate properties of the five-dimensional Chern--Simons AdS black hole coupled to $\\mathrm{SU}(2)$ solitons by means of a minisuperspace approximation adapted to static, spherically symmetric configurations. The reduced action reproduces the known branch of solutions and provides a variational framework in which the boundary terms determine the conserved quantities and their conjugate variables. In particular, we recover the energy and the $\\mathrm{U}(1)$ charge previously obtained by Hamiltonian methods, while the enlarged parameter space also reveals a momentum conjugate to the trace-torsion mode. The Euclidean action yields an entropy satisfying the first law of black hole thermodynamics. In contrast to many other torsional black hole models, the axial torsion parameter, describing the secondary black hole hair, together with the trace-torsion mode, contributes nontrivially to the entropy. The expression for the entropy obtained in this way is further confirmed by the other two methods found in the literature.", "url": "https://arxiv.org/abs/2604.11894", "type": "理论", "summary": "我们通过适应静态、球对称配置的微超空间近似来研究与 $\\mathrm{SU}(2)$ 孤子耦合的五维陈-西蒙斯 AdS 黑洞的性质。简化的作用再现了解的已知分支，并提供了一个变分框架，其中边界项确定了守恒量及其共轭变量。特别是，我们恢复了先前通过哈密顿方法获得的能量和 $\\mathrm{U}(1)$ 电荷，而扩大的参数空间也揭示了迹扭转模式的动量共轭。欧几里得作用产生满足黑洞热力学第一定律的熵。与许多其他扭转黑洞模型相比，描述次级黑洞毛发的轴向扭转参数与迹扭转模式一起对熵做出了重要贡献。以这种方式获得的熵的表达式得到了文献中其他两种方法的进一步证实。", "authors": [{"name": "Laura Andrianopoli"}, {"name": "Dušan Đorđević"}, {"name": "Olivera Miskovic"}], "featured_authors": [{"name": "Laura Andrianopoli"}, {"name": "Dušan Đorđević"}, {"name": "Olivera Miskovic"}], "author_count": 3}, {"id": "2604.11896", "category": "hep-th", "title": "Strong coupling dynamics of defect RG flows in ABJM", "abstract": "Wilson loop operators in ABJM theory provide a rich arena for studying defect conformal field theories (dCFTs) and the renormalization group (RG) flows connecting them. While these are well understood at weak coupling, a complete strong-coupling picture remains an open problem. In this paper, we present a systematic analysis of defect RG flows in ABJM at strong coupling, via holography. By examining fluctuations of fundamental strings in the AdS$_4 \\times \\mathbb{CP}^3$ background around classical AdS$_2$ solutions, we map worldsheet excitations to the operators in the dual dCFT which are responsible for the flows and determine their scaling dimensions, including subleading corrections from one-loop worldsheet effects. We show how different boundary conditions on string coordinates correspond to distinct operators and provide a geometric realization of the RG flows through interpolating boundary conditions. We apply this framework to fermionic 1/2 BPS, bosonic 1/6 BPS, and non-supersymmetric Wilson loops, establishing a coherent strong-coupling picture in which the 1/2 BPS loop is IR stable, the 1/6 BPS loop acts as a saddle point, and the non-supersymmetric configuration emerges as a natural UV fixed point. We also advance a proposal for the holographic dual of a second non-supersymmetric loop, in terms of averaging over Dirichlet boundary conditions.", "url": "https://arxiv.org/abs/2604.11896", "type": "理论", "summary": "ABJM 理论中的威尔逊环算子为研究缺陷共形场论 (dCFT) 和连接它们的重正化群 (RG) 流提供了丰富的舞台。虽然这些在弱耦合下已经被很好地理解，但完整的强耦合图仍然是一个悬而未决的问题。在本文中，我们通过全息术对强耦合下 ABJM 中的缺陷 RG 流进行了系统分析。通过检查围绕经典 AdS$_2$ 解决方案的 AdS$_4 \\times \\mathbb{CP}^3$ 背景中基本字符串的波动，我们将世界表激励映射到双 dCFT 中的运算符，这些运算符负责流并确定其缩放维度，包括来自单循环世界表效应的子引导修正。我们展示了字符串坐标上的不同边界条件如何对应于不同的运算符，并通过插值边界条件提供 RG 流的几何实现。\n\n我们将该框架应用于费米子 1/2 BPS、玻色子 1/6 BPS 和非超对称威尔逊环，建立了一个相干强耦合图像，其中 1/2 BPS 环是红外稳定的，1/6 BPS 环充当鞍点，非超对称配置作为自然紫外固定点出现。我们还根据狄利克雷边界条件的平均提出了第二个非超对称环的全息对偶提案。", "authors": [{"name": "Marco S. Bianchi"}, {"name": "Luigi Castiglioni"}, {"name": "Silvia Penati"}, {"name": "Marcia Tenser"}, {"name": "Diego Trancanelli"}], "featured_authors": [{"name": "Marco S. Bianchi"}, {"name": "Luigi Castiglioni"}, {"name": "Silvia Penati"}, {"name": "Marcia Tenser"}, {"name": "Diego Trancanelli"}], "author_count": 5}, {"id": "2604.11902", "category": "hep-th", "title": "Universal formulae for correlators of a broad class of models", "abstract": "A simple method is presented for deriving universal formulae for the correlators, frequently denoted $W_{g,n}(\\{z_i\\}), i=1,..n$, of a wide range of models of physical and mathematical interest. While many alternative methods exist for constructing such correlators, these formulae can be simply written in terms of one defining function and its derivatives. The method has been applied to the Airy and Bessel models, various minimal string and superstring theories, and their associated intersection theory settings, ordinary and various kinds of supersymmetric Weil-Petersson volumes, and more besides. For all these cases, their $W_{g,n}(\\{z_i\\})$ are just all specializations of the {\\it same} universal formulae. A special variant of the method useful for ${N}{=}1$ supersymmetric cases is also presented. It allows for swift derivations of Norbury's three closed-form formulae for the volumes $V_{g,n}$ ($g{=}1,2,3$) of ${ N}{=}1$ supersymmetric Weil-Petersson volumes, and generalizations of them to a wider set of models. Moreover a new closed-form formula for the genus 4 case $V_{4,n}$ is derived. The straightforward method for how to derive such formulae for $g{>}4$ cases is described. Throughout, crucial roles are played by the underlying integrable KdV flows, as well as the Gel'fand-Dikii equation.", "url": "https://arxiv.org/abs/2604.11902", "type": "理论", "summary": "提出了一种简单的方法来推导相关器的通用公式，通常表示为各种物理和数学模型的 $W_{g,n}(\\{z_i\\}), i=1,..n$。虽然存在许多用于构造此类相关器的替代方法，但这些公式可以简单地用一个定义函数及其导数来编写。该方法已应用于艾里和贝塞尔模型、各种最小弦和超弦理论及其相关的交集理论设置、普通和各种超对称 Weil-Petersson 体积等等。对于所有这些情况，它们的 $W_{g,n}(\\{z_i\\})$ 只是通用公式的所有特化。还提出了该方法的一个特殊变体，适用于 ${N}{=}1$ 超对称情况。它允许快速推导 ${ N}{=}1$ 超对称 Weil-Petersson 体积的 $V_{g,n}$ ($g{=}1,2,3$) 的 Norbury 三个封闭式公式，并将它们推广到更广泛的模型。此外，还导出了属 4 情况 $V_{4,n}$ 的新封闭式公式。描述了如何针对 $g{>}4$ 情况导出此类公式的简单方法。\n\n自始至终，底层可积 KdV 流以及 Gel'fand-Dikii 方程都发挥着关键作用。", "authors": [{"name": "Clifford V. Johnson"}], "featured_authors": [{"name": "Clifford V. Johnson"}], "author_count": 1}, {"id": "2604.12037", "category": "hep-th", "title": "From Vacuum to Nucleon: Exact Fixed-Scale Matching of Holographic Current Correlators to QCD", "abstract": "Holographic QCD reproduces the leading short-distance vector-current two-point function in vacuum, fixing the bulk gauge coupling by matching the logarithmic $Q^2$ dependence of the boundary current correlator. We show that this vacuum matching extends to the off-forward hadronic current-current correlator relevant for DDVCS/DVCS. Starting from the fixed-$j$ $t$-channel Witten diagram, we derive a factorized holographic Compton amplitude whose ultraviolet photon vertex is universal and model independent, while all infrared sensitivity is isolated in hadronic conformal moments. In the conformal limit this upper vertex depends only on the pure-AdS bulk wave functions of the virtual photons and yields an exact Gauss hypergeometric kernel. In the collinear window and at a single matching scale $Q=\\mu=\\mu_0=\\mu_\\ast$, this kernel matches exactly the $\\pm$-basis Wilson coefficients of the singlet conformal operator product expansion in perturbative QCD. The channel dictionary is fixed dynamically: the closed-string branch matches the protected $(-)$ eigenchannel, while the open-string branch matches the unprotected $(+)$ eigenchannel, with the first physical even moment $j=2$ and the distinct $\\sqrt{j-2}$ versus $\\sqrt{j-1}$ branch points providing the sharpest anchor. The result is therefore an exact fixed-scale matching statement for the hadronic current-current correlator in the fixed-$j$ channel. It identifies the holographic DDVCS/DVCS amplitude as a hadronic generalization of the familiar vacuum current-correlator matching.", "url": "https://arxiv.org/abs/2604.12037", "type": "理论", "summary": "全息 QCD 再现了真空中领先的短距离矢量电流两点函数，通过匹配边界电流相关器的对数 $Q^2$ 依赖性来固定体积规耦合。我们证明这种真空匹配扩展到与 DDVCS/DVCS 相关的偏向强子电流-电流相关器。从固定$j$$t$通道维滕图开始，我们推导了因式分解的全息康普顿振幅，其紫外光子顶点是通用的且与模型无关，而所有红外灵敏度在强子共角矩中是孤立的。在共形极限中，该上顶点仅取决于虚拟光子的纯 AdS 体波函数，并产生精确的高斯超几何内核。在共线窗口和单个匹配尺度 $Q=\\mu=\\mu_0=\\mu_\\ast$ 下，该内核与微扰 QCD 中单重态共形算子乘积展开的 $\\pm$ 基威尔逊系数完全匹配。\n\n通道字典是动态固定的：闭串分支与受保护的 $(-)$ 特征通道匹配，而开串分支与不受保护的 $(+)$ 特征通道匹配，第一个物理偶矩 $j=2$ 和不同的 $\\sqrt{j-2}$ 与 $\\sqrt{j-1}$ 分支点提供最尖锐的锚点。因此，结果是固定 $j$ 通道中强子电流-电流相关器的精确固定比例匹配语句。它将全息 DDVCS/DVCS 幅度识别为熟悉的真空电流相关器匹配的强子推广。", "authors": [{"name": "Kiminad A. Mamo"}], "featured_authors": [{"name": "Kiminad A. Mamo"}], "author_count": 1}, {"id": "2604.12038", "category": "hep-th", "title": "Holographic Open/Closed Exchange in Double Deeply Virtual Compton Scattering: Fixed--$j$ Structural Matching to the $\\pm$-Basis Wilson Coefficients", "abstract": "We show that, in the collinear regime, the fixed--$j$ holographic double deeply virtual Compton scattering (DDVCS) amplitude contains the same hypergeometric hard kernel as the $\\pm$-basis Wilson coefficients of perturbative QCD. Starting from the $t$--channel Witten diagram, we derive the closed-string fixed--$j$ amplitude and obtain the even-spin open-string channel by a parallel replacement rule. After holographic collinear factorization, the upper photon vertex is universal and model independent: in the conformal limit it depends only on the pure-AdS bulk wave functions of the two virtual photons and yields an exact Gauss hypergeometric function of $\\eta^2/\\xi^2$. The Mellin exponent $\\delta_X(j)=j+\\Delta_X(j)-2=2j+\\gamma_X(j)$ is fixed by Witten-diagram $z$-power counting, while all infrared model dependence is isolated in lower hadronic conformal moments. Comparing with the singlet vector Compton form factor in the conformal operator product expansion, we find that at a single matching scale $Q=\\mu=\\mu_0=\\mu_\\ast$ the open channel matches the $(+)$ eigenchannel and the closed channel matches the protected $(-)$ eigenchannel. The sharpest anchor is the first physical even moment $j=2$, together with the distinct $\\sqrt{j-1}$ and $\\sqrt{j-2}$ branch-point structure of the open and closed trajectories. Logarithmic running deforms only the scale dependence, not the channel dictionary. The result is a fixed--$j$, fixed-scale structural matching statement for holographic DDVCS/DVCS, not a claim of all-scale equality or a global fit.", "url": "https://arxiv.org/abs/2604.12038", "type": "理论", "summary": "我们表明，在共线区域中，固定的-$j$全息双深虚拟康普顿散射（DDVCS）振幅包含与微扰QCD的$\\pm$基威尔逊系数相同的超几何硬核。从$t$--通道维滕图出发，推导出闭弦固定--$j$幅度，并通过并行替换规则得到偶自旋开弦通道。经过全息共线分解后，上光子顶点是通用的且与模型无关：在共角极限下，它仅取决于两个虚拟光子的纯 AdS 体波函数，并产生精确的高斯超几何函数 $\\eta^2/\\xi^2$。梅林指数 $\\delta_X(j)=j+\\Delta_X(j)-2=2j+\\gamma_X(j)$ 由维滕图 $z$ 功率计数固定，而所有红外模型依赖性在较低的强子共形矩中被隔离。与共形算子乘积展开中的单重态向量康普顿形状因子进行比较，我们发现在单个匹配尺度$Q=\\mu=\\mu_0=\\mu_\\ast$下，开放通道与$(+)$特征通道匹配，闭合通道与受保护的$(-)$特征通道匹配。\n\n最尖锐的锚点是第一个物理偶矩$j=2$，以及开放和封闭轨迹的不同$\\sqrt{j-1}$和$\\sqrt{j-2}$分支点结构。对数运行仅使尺度依赖性变形，而不使通道字典变形。结果是全息 DDVCS/DVCS 的固定--$j$、固定尺度结构匹配声明，而不是全尺度平等或全局拟合的主张。", "authors": [{"name": "Kiminad A. Mamo"}], "featured_authors": [{"name": "Kiminad A. Mamo"}], "author_count": 1}, {"id": "2604.12055", "category": "hep-th", "title": "On a Deformed Holomorphic Chern-Simons Theory", "abstract": "We deform classical holomorphic Chern--Simons theory on a Calabi--Yau three-fold $X$ by deforming the complex structure by a deformation parameter $h \\in\\mathscr{H}^{0,1}(T^{1,0}X)$. The corresponding equations of motion admit new \"instanton solutions\" which which are invariant under re-scalings of $h$, and are perhaps more reminiscent of $G_2$-instantons for $G_2$ manifolds. We give examples of such instantons. In particular, when $h$ has non-vanishing Yukawa coupling ${\\rm Yuk}(h,h,h)\\neq 0$, it may be used to define a connection on ${\\rm End}(T^{1,0}X)$ solving the instanton constraint. Interestingly, this connection gives rise to a hermitian (self-adjoint) connection for a real gauge theory on the real bundle ${\\rm End}(TX)$ for only specific directions in deformation space, which may be classified using Morse theory. We quantize the deformed theory around these instanton backgrounds, and derive explicit expressions for the partition function in the limit where the complex structure deformation is large. We study anomalies, and the $h$-dependece of the partition function. In particular, coupling the theory to additional gravitational degrees of freedom, we find that the special directions in deformation space give rise to novel anomaly free theories on ${\\rm End}(T^{1,0}X)$.", "url": "https://arxiv.org/abs/2604.12055", "type": "理论", "summary": "我们通过变形参数 $h \\in\\mathscr{H}^{0,1}(T^{1,0}X)$ 使复杂结构变形，从而使 Calabi-Yau 三重 $X$ 上的经典全纯陈-西蒙斯理论变形。相应的运动方程允许新的“瞬时解”，这些解在 $h$ 的重新缩放下保持不变，并且可能更让人想起 $G_2$ 流形的 $G_2$-瞬时值。我们给出了此类瞬子的例子。特别是，当 $h$ 具有非零汤川耦合 ${\\rm Yuk}(h,h,h)\\neq 0$ 时，它可用于定义 ${\\rm End}(T^{1,0}X)$ 上的连接，求解瞬子约束。有趣的是，这种联系产生了实束 ${\\rm End}(TX)$ 上的实规范理论的埃尔米特（自伴随）联系，仅适用于变形空间中的特定方向，可以使用莫尔斯理论进行分类。我们围绕这些瞬子背景量化了变形理论，并在复杂结构变形较大的极限下推导出配分函数的显式表达式。我们研究异常情况以及配分函数的 $h$ 依赖性。\n\n特别是，将该理论与附加的重力自由度耦合，我们发现变形空间中的特殊方向产生了关于 ${\\rm End}(T^{1,0}X)$ 的新颖的无异常理论。", "authors": [{"name": "Eirik Høgm
