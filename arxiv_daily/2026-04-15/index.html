性与许多相同分子耦合到单腔模式的分子极化子问题密切相关，使我们能够借用为后者开发的最新技术。特别是，我们确定了 $1/N$ 扩展，通过对聚合的线性响应进行有限 $N$ 校正来校正经典光学极限。这些校正的特征是单个单体的类拉曼跃迁。\n\n我们通过对同二聚体的物理相关设置的计算来说明这些发现。我们的研究结果阐明了超越经典光学的量子光学特征如何已经存在于简单的量子发射器阵列（例如分子聚集体）中。", "authors": [{"name": "Sricharan Raghavan-Chitra"}, {"name": "Arghadip Koner"}, {"name": "Joel Yuen-Zhou"}], "featured_authors": [{"name": "Sricharan Raghavan-Chitra"}, {"name": "Arghadip Koner"}, {"name": "Joel Yuen-Zhou"}], "author_count": 3}, {"id": "2604.12410", "category": "quant-ph", "title": "Notes on some inequalities, resulting uncertainty relations and correlations. 1. General mathematical formalism", "abstract": "We analyze the Schwarz inequality and its generalizations, as well as inequalities resulting from the Jensen inequality. They are used in quantum theory to derive the Heisenberg-Robertson (HR) and Schroedinger-Robertson (SR) uncertainty relation for two non-commuting observables and their generalizations to three or more non-commuting observables. Jensen's inequality, in turn, is helpful in deriving various the \"sum uncertainty relations\" for two or more observables. Using these inequalities, we derive various types of generalized uncertainty relations for more than two non--commuting observables and analyze their properties and critical points. We also study the connections between the generalizations of the HR and SR uncertainty relations for two and more observables and the correlations of these observables in the state of the quantum system under study. In this analysis, we pay special attention to the consequences of the generalized SR uncertainty relation for three non--commuting observables on their correlations in a given state of a quantum system and to the connections of this relation with the appropriate correlation matrix, whose matrix elements are the quantum versions of the Pearson coefficient. We show also that the SR uncertainty relation (including the generalized ones) can be written in an equivalent way using these Pearson coefficients.", "url": "https://arxiv.org/abs/2604.12410", "type": "理论", "summary": "我们分析了施瓦茨不等式及其概括，以及由詹森不等式引起的不平等。它们在量子理论中用于推导两个非对易可观测量的海森堡-罗伯逊 (HR) 和薛定谔-罗伯逊 (SR) 不确定性关系，以及它们对三个或更多非对易可观测量的推广。反过来，詹森不等式有助于导出两个或多个可观察量的各种“总不确定性关系”。利用这些不等式，我们推导出两个以上非通勤可观测量的各种类型的广义不确定性关系，并分析它们的属性和临界点。我们还研究了两个或多个可观测量的 HR 和 SR 不确定性关系的概括之间的联系，以及这些可观测量在所研究的量子系统状态下的相关性。\n\n在此分析中，我们特别关注三个非交换可观测量的广义 SR 不确定性关系对其在量子系统给定状态下的相关性的影响，以及该关系与适当相关矩阵的联系，该矩阵元素是皮尔逊系数的量子版本。我们还表明，SR 不确定性关系（包括广义关系）可以使用这些 Pearson 系数以等效方式编写。", "authors": [{"name": "Krzysztof Urbanowski"}], "featured_authors": [{"name": "Krzysztof Urbanowski"}], "author_count": 1}, {"id": "2604.12450", "category": "quant-ph", "title": "$\\mathbb{Z}_{2}$ Skin Channels and Scale-Dependent Dynamical Quantum Phase Transitions", "abstract": "We analytically describe the dynamically separated $\\mathbb{Z}_{2}$ skin channels (wavepacket evolutions) under periodic boundary condition (PBC) in non-Hermitian systems with anomalous time-reversal symmetry (ATRS), by combining the semiclassical worldline perspective with an enhanced understanding of skin effects. These channels, tied to the initial state and relevant symmetries, exhibit individually exponential-dominated time evolution in momentum space, where their amplitude maxima evolve toward the dominant momenta. In real space, they circulate around the one-dimensional (1D) chain, tracing semiclassical worldlines. Such circulations imply quantum revivals and dynamical quantum phase transitions (DQPTs) regardless of any wavepackets' phase interference, with the latter showing scale-dependent behavior, a feature distinct from conventional DQPTs. This work rigorously demonstrates our previous findings on worldline windings and the winding-control mechanism, confirming that the core physics is shared with the ordinary skin effect.", "url": "https://arxiv.org/abs/2604.12450", "type": "理论", "summary": "通过将半经典世界线视角与对趋肤效应的增强理解相结合，我们分析性地描述了具有反常时间反转对称性（ATRS）的非厄米系统中周期性边界条件（PBC）下动态分离的$\\mathbb{Z}_{2}$趋肤通道（波包演化）。这些通道与初始状态和相关对称性相关，在动量空间中表现出单独的指数主导的时间演化，其中它们的振幅最大值向主导动量演化。在现实空间中，它们围绕一维（1D）链循环，追踪半经典世界线。这种循环意味着量子复兴和动态量子相变（DQPT），无论任何波包的相位干扰如何，后者都表现出与尺度相关的行为，这是与传统 DQPT 不同的特征。这项工作严格证明了我们之前关于世界线绕线和绕线控制机制的发现，证实了核心物理与普通趋肤效应相同。", "authors": [{"name": "Yongxu Fu"}], "featured_authors": [{"name": "Yongxu Fu"}], "author_count": 1}, {"id": "2604.12465", "category": "quant-ph", "title": "Demonstrating Record Fidelity for the Quantum Fourier Transform", "abstract": "We demonstrate the Parity Architecture on quantum hardware, using the quantum Fourier transform (QFT) as a benchmark. As a result, a record performance in both fidelity and qubit count is achieved using quantum processors with a native CZ-based instruction set. On the IBM Heron r3 chip, a process fidelity of the QFT algorithm of ${F \\approx 10^{-2}}$ for ${N=50}$ qubits is achieved. The scaling of the speedup compared to previous swap-based methods is super-exponential $\\mathcal{O}(\\exp(N^2))$. Furthermore, we show that the scaling can be improved further by including iSWAP gates in the instruction set.", "url": "https://arxiv.org/abs/2604.12465", "type": "数值", "summary": "我们使用量子傅里叶变换（QFT）作为基准，在量子硬件上演示了奇偶校验架构。因此，使用具有基于 CZ 的原生指令集的量子处理器在保真度和量子位计数方面实现了创纪录的性能。在 IBM Heron r3 芯片上，对于 ${N=50}$ 个量子位，QFT 算法的过程保真度达到 ${F \\approx 10^{-2}}$。与之前基于交换的方法相比，加速比例是超指数$\\mathcal{O}(\\exp(N^2))$。此外，我们还表明，通过在指令集中包含 iSWAP 门可以进一步提高扩展能力。", "authors": [{"name": "Philipp Aumann"}, {"name": "Michael Fellner"}, {"name": "David Alber"}, {"name": "Max Cykiert"}, {"name": "Christoph Fleckenstein"}, {"name": "Roeland ter Hoeven"}, {"name": "Leo Stenzel"}, {"name": "Riccardo J. Valencia-Tortora"}, {"name": "Wolfgang Lechner"}], "featured_authors": [{"name": "Philipp Aumann"}, {"name": "Michael Fellner"}, {"name": "David Alber"}, {"name": "Leo Stenzel"}, {"name": "Riccardo J. Valencia-Tortora"}, {"name": "Wolfgang Lechner"}], "author_count": 9}, {"id": "2604.12516", "category": "quant-ph", "title": "Scattering Faddeev calculations in the double continuum", "abstract": "We use the configuration-space Faddeev formalism to study scattering of three particles in the double continuum where all particles are free. All scattering processes, starting from and ending in both single and double continua, are collected in a unique matrix. We apply our method to the benchmark system of neutron-deuteron scattering.", "url": "https://arxiv.org/abs/2604.12516", "type": "数值", "summary": "我们使用配置空间 Faddeev 形式来研究双连续体中三个粒子的散射，其中所有粒子都是自由的。所有以单连续体和双连续体开始和结束的散射过程都收集在一个独特的矩阵中。我们将我们的方法应用于中子-氘核散射的基准系统。", "authors": [{"name": "Romain Guérout"}], "featured_authors": [{"name": "Romain Guérout"}], "author_count": 1}, {"id": "2604.12560", "category": "quant-ph", "title": "Design automation and space-time reduction for surface-code logical operations using a SAT-based EDA kernel compatible with general encodings", "abstract": "Fault-tolerant quantum computers (FTQCs) based on surface codes and lattice surgery have been widely studied, and there is strong demand for a framework that can identify logical operations with low space-time cost, verify their functionality and fault tolerance, and demonstrate their optimality within a given search space, much like electronic design automation (EDA) in classical circuit design. In this paper, we propose KOVAL-Q, an EDA kernel that verifies and optimizes surface-code logical operations by formulating them as a satisfiability (SAT) problem. Compared with existing SAT-based frameworks such as LaSsynth, our method can handle logical qubits with more flexible surface-code encodings, both as target configurations and as intermediate states. This extension enables the optimization of advanced layouts, such as fast blocks, and broadens the search space for logical operations. We demonstrate that KOVAL-Q can determine the minimum execution time of fundamental logical operations in given spatial layouts, such as $d$-cycle logical CNOTs and $2d$-cycle patch rotations. Their use reduces the execution time of widely studied FTQC applications by about 10% under a simplified scheduling model. KOVAL-Q consists of three subkernels corresponding to different types of constraints, which facilitates its integration as a submodule into scalable heuristic frameworks. Thus, our proposal provides an essential framework for optimizing and validating core FTQC subroutines.", "url": "https://arxiv.org/abs/2604.12560", "type": "理论+数值", "summary": "基于表面编码和晶格手术的容错量子计算机（FTQC）已被广泛研究，并且强烈需要一种框架能够以低时空成本识别逻辑运算，验证其功能和容错性，并在给定搜索空间内证明其最优性，就像经典电路设计中的电子设计自动化（EDA）一样。在本文中，我们提出了 KOVAL-Q，这是一种 EDA 内核，通过将表面代码逻辑操作表述为可满足性 (SAT) 问题来验证和优化它们。与现有的基于 SAT 的框架（例如 LaSsynth）相比，我们的方法可以使用更灵活的表面代码编码来处理逻辑量子位，无论是作为目标配置还是作为中间状态。此扩展可以优化高级布局（例如快速块），并扩大逻辑运算的搜索空间。我们证明 KOVAL-Q 可以确定给定空间布局中基本逻辑操作的最小执行时间，例如 $d$ 周期逻辑 CNOT 和 $2d$ 周期补丁旋转。\n\n在简化的调度模型下，它们的使用将广泛研究的 FTQC 应用程序的执行时间减少了约 10%。 KOVAL-Q 由三个子内核组成，对应于不同类型的约束，这有助于将其作为子模块集成到可扩展的启发式框架中。因此，我们的建议为优化和验证核心 FTQC 子程序提供了一个基本框架。", "authors": [{"name": "Wang Liao"}, {"name": "Rei Tokami"}, {"name": "Yasunari Suzuki"}], "featured_authors": [{"name": "Wang Liao"}, {"name": "Rei Tokami"}, {"name": "Yasunari Suzuki"}], "author_count": 3}, {"id": "2604.12629", "category": "quant-ph", "title": "Mutual information harvesting for circularly accelerated detectors", "abstract": "We investigate the mutual information harvesting of two circularly accelerated detectors that interact with the massless scalar fields near a reflecting boundary. We consider that the two detectors share a common rotational axis with the same acceleration and trajectory radius. As the interdetector separation increases, the mutual information may exhibit oscillatory behavior at large acceleration and small radius. For a fixed radius, a larger acceleration leads to a larger peak value of the mutual information. Near the boundary, the mutual information may oscillate and the maximum can be obtained. As the acceleration increases, the mutual information in a small interdetector separation first increases and then decreases. For an intermediate interdetector separation, the mutual information may oscillate with the increase of acceleration. For a not large interdetector separation, when we take large acceleration and small radius, as the energy gap increases, the mutual information first decreases, then oscillates, and finally goes to zero. The combination of large acceleration and small radius corresponds to the fast rotation, which significantly modifies the vacuum fluctuations of the field, leading to the oscillatory behavior. Furthermore, the oscillation intensifies near the boundary, which indicates that it is related to the coherent superposition of boundary reflections.", "url": "https://arxiv.org/abs/2604.12629", "type": "理论", "summary": "我们研究了两个循环加速探测器的相互信息收集，这两个探测器与反射边界附近的无质量标量场相互作用。我们认为两个探测器共享一个具有相同加速度和轨迹半径的公共旋转轴。随着探测器间间距的增加，互信息可能会在大加速度和小半径下表现出振荡行为。对于固定半径，加速度越大，互信息的峰值越大。在边界附近，互信息可能会振荡并且可以获得最大值。随着加速度的增加，较小的探测器间距内的互信息先增加然后减少。对于中间探测器间间隔，互信息可能会随着加速度的增加而振荡。对于探测器间距不大的情况，当我们采用大加速度和小半径时，随着能隙的增大，互信息首先减小，然后振荡，最后趋于零。\n\n大加速度和小半径的组合对应于快速旋转，这显着改变了场的真空波动，导致振荡行为。此外，振荡在边界附近增强，这表明它与边界反射的相干叠加有关。", "authors": [{"name": "Mingkun Quan"}, {"name": "Runhu Li"}, {"name": "Zixu Zhao"}], "featured_authors": [{"name": "Mingkun Quan"}, {"name": "Runhu Li"}, {"name": "Zixu Zhao"}], "author_count": 3}, {"id": "2604.12646", "category": "quant-ph", "title": "Interferometrically Enhanced Asymmetry in Strong-field Ionization with Bright Squeezed Vacuum", "abstract": "We demonstrate that quantum light statistics can be used to control strong-field ionization at the tunneling step. Using a bichromatic linearly polarized field composed of a strong coherent driver and a weak bright squeezed vacuum (BSV), we show through simulation that photoelectron momentum distributions (PMDs) exhibit asymmetries that exceed those obtained with classical fields of comparable intensity by orders of magnitude. This enhancement is uniquely linked to the nonclassical statistics of the BSV field. A semiclassical analysis based on the strong-field approximation (SFA) reveals that the effect originates from fluctuations in the instantaneous field amplitude, which strongly modify the tunneling ionization probability while leaving the electron's continuum dynamics essentially unchanged. This selective control enables reconstruction of ionization pathways and provides a robust route to extract sub-cycle dynamics from strong-field observables.", "url": "https://arxiv.org/abs/2604.12646", "type": "理论+数值", "summary": "我们证明量子光统计可用于控制隧道步骤中的强场电离。使用由强相干驱动器和弱亮压缩真空 (BSV) 组成的双色线性偏振场，我们通过模拟表明，光电子动量分布 (PMD) 表现出的不对称性比具有相当强度的经典场所获得的不对称性高出几个数量级。这一增强与 BSV 领域的非经典统计数据有着独特的联系。基于强场近似（SFA）的半经典分析表明，该效应源于瞬时场振幅的波动，这极大地改变了隧道电离概率，同时使电子的连续动力学基本保持不变。这种选择性控制能够重建电离路径，并提供从强场可观测值中提取子循环动力学的可靠途径。", "authors": [{"name": "G. Singh"}, {"name": "T. Rook"}, {"name": "J. Rivera-Dean"}, {"name": "C. Figueira de Morisson Faria"}], "featured_authors": [{"name": "G. Singh"}, {"name": "T. Rook"}, {"name": "J. Rivera-Dean"}, {"name": "C. Figueira de Morisson Faria"}], "author_count": 4}, {"id": "2604.12684", "category": "quant-ph", "title": "Quasi-Orthogonal Stabilizer Design for Efficient Quantum Error Suppression", "abstract": "Orthogonal geometric constructions are the basis of many many quantum error-correcting codes (QEC), but strict orthogonality constraints limit design flexibility and resource efficiency. We introduce a quasi-orthogonal geometric framework for stabilizer codes that relaxes these constraints while preserving the symplectic commutation structure on the binary symplectic space $\\mathbb{F}_{2}^{2}$. The approach permits controlled overlap between X- and Z-check supports, leading to quasi-orthogonal Pauli operators and a generalized notion of effective distance defined via induced anti-commutation with logical operators. This relaxation expands the stabilizer design space, enabling codes that approach the Gilbert-Varshamov regime with improved logical rates at moderate distances. Finite-length constructions, including quasi-orthogonal variants of the $[[8,3,\\approx 3]]$, $[[10,4,\\approx 3]]$, $[[13,1,5]]$, and $[[29,1,11]]$ codes, demonstrate consistent improvements over strictly orthogonal counterparts. Under depolarizing noise with error rates up to $p=0.30$, logical error rates, fidelities, and trace distances improve by up to two orders of magnitude. These improvements reflect the increased connectivity of the underlying stabilizer geometry while remaining compatible with standard decoding schemes. The proposed framework offers a principled extension of stabilizer code design through quasi-orthogonal geometric structures.", "url": "https://arxiv.org/abs/2604.12684", "type": "理论", "summary": "正交几何结构是许多量子纠错码（QEC）的基础，但严格的正交性约束限制了设计灵活性和资源效率。我们为稳定器代码引入了一种准正交几何框架，该框架放宽了这些约束，同时保留了二元辛空间 $\\mathbb{F}_{2}^{2}$ 上的辛交换结构。该方法允许 X 和 Z 检验支持之间的受控重叠，从而产生准正交泡利算子以及通过逻辑算子的诱导反交换定义的有效距离的广义概念。这种放松扩展了稳定器的设计空间，使代码能够接近 Gilbert-Varshamov 体系，并在中等距离处提高了逻辑速率。有限长度结构，包括 $[[8,3,\\approx 3]]$、$[[10,4,\\approx 3]]$、$[[13,1,5]]$ 和 $[[29,1,11]]$ 代码的准正交变体，与严格正交的对应结构相比，表现出一致的改进。在错误率高达 $p=0.30$ 的去极化噪声下，逻辑错误率、保真度和走线距离提高了两个数量级。\n\n这些改进反映了底层稳定器几何结构的连通性增强，同时保持与标准解码方案的兼容性。所提出的框架通过准正交几何结构提供了稳定器代码设计的原则性扩展。", "authors": [{"name": "Valentine Nyirahafashimana"}, {"name": "Sharifah Kartini Said Husain"}, {"name": "Umair Abdul Halim"}, {"name": "Ahmed Jellal"}, {"name": "Nurisya Mohd Shah"}], "featured_authors": [{"name": "Valentine Nyirahafashimana"}, {"name": "Sharifah Kartini Said Husain"}, {"name": "Umair Abdul Halim"}, {"name": "Ahmed Jellal"}, {"name": "Nurisya Mohd Shah"}], "author_count": 5}, {"id": "2604.12690", "category": "quant-ph", "title": "An Introduction to Quantum Graphs and Current Applications", "abstract": "Quantum graphs are a paradigmatic model for quantum chaos as well as for spectral theory. We give a concise didactical introduction to quantum graphs, or Schrödinger Hamiltonians on metric graphs, with a focus on results related to quantum chaos, periodic orbit theory and spectral theory. We summarise related seminal results, and give an overview over a few more recent developments.", "url": "https://arxiv.org/abs/2604.12690", "type": "理论", "summary": "量子图是量子混沌和谱理论的范例模型。我们对量子图或度量图上的薛定谔哈密顿量进行简明的教学介绍，重点关注与量子混沌、周期轨道理论和谱理论相关的结果。我们总结了相关的开创性结果，并概述了一些最新的进展。", "authors": [{"name": "Gregory Berkolaiko"}, {"name": "Sven Gnutzmann"}], "featured_authors": [{"name": "Gregory Berkolaiko"}, {"name": "Sven Gnutzmann"}], "author_count": 2}, {"id": "2604.12707", "category": "quant-ph", "title": "Quantum analogues of exponential sensitivity: from Loschmidt echo to Krylov complexity", "abstract": "One of the fundamental manifestations of classical chaos is exponential sensitivity to initial conditions that is, two trajectories starting from nearly identical initial states diverge exponentially over time. This behavior is quantified by the Lyapunov exponents. Due to the unitary nature of quantum mechanics, such exponential divergence is elusive in quantum systems. As a result, several alternative quantities have been proposed and studied in recent years to capture analogous behavior. In this article, we present a pedagogical overview of three such quantities that have been the focus of intense research in recent years: the Loschmidt echo, out-of-time-order correlators (OTOCs), and Krylov complexity.", "url": "https://arxiv.org/abs/2604.12707", "type": "理论", "summary": "经典混沌的基本表现之一是对初始条件的指数敏感性，即从几乎相同的初始状态开始的两条轨迹随着时间的推移呈指数发散。这种行为由李亚普诺夫指数量化。由于量子力学的统一性，这种指数发散在量子系统中是难以捉摸的。因此，近年来人们提出并研究了几种替代量来捕捉类似的行为。在本文中，我们对近年来成为研究热点的三个此类量进行了教学概述：洛施密特回波、乱序相关器 (OTOC) 和克雷洛夫复杂度。", "authors": [{"name": "Ignacio García-Mata"}, {"name": "Diego A. Wisnicki"}], "featured_authors": [{"name": "Ignacio García-Mata"}, {"name": "Diego A. Wisnicki"}], "author_count": 2}, {"id": "2604.12763", "category": "quant-ph", "title": "Path Integral Approach to Quantum Fisher Information", "abstract": "We present a real-time path-integral formulation of the quantum Fisher information for dynamical parameter estimation. For pure states undergoing unitary evolution, we show that the quantum Fisher information can be expressed as a connected symmetrized covariance of a time-integrated action deformation, equivalently as an integrated insertion of $\\partial_\\lambda S$ in the propagator. This reformulation avoids explicit state reconstruction by rewriting the quantum Fisher information in terms of real-time correlators that are natural targets for many-body methods. We further embed the construction into the Schwinger-Keldysh closed-time-path formalism, identifying the quantum Fisher information with the Keldysh component of an appropriate contour-ordered correlator generated by forward and backward propagating sources. Finally, using the Van Vleck-Gutzwiller approximation we re-derive the compact semiclassical quantum Fisher information expression, clarifying how classical trajectory data control leading-order metrological sensitivity.", "url": "https://arxiv.org/abs/2604.12763", "type": "理论", "summary": "我们提出了用于动态参数估计的量子费希尔信息的实时路径积分公式。对于经历酉演化的纯态，我们证明量子费希尔信息可以表示为时间积分作用变形的连通对称协方差，相当于传播器中 $\\partial_\\lambda S$ 的集成插入。这种重新表述通过根据实时相关器重写量子费希尔信息来避免显式状态重建，实时相关器是多体方法的自然目标。我们进一步将该构造嵌入到 Schwinger-Keldysh 闭合时间路径形式中，将量子费希尔信息与由前向和反向传播源生成的适当轮廓排序相关器的 Keldysh 分量识别。最后，使用 Van Vleck-Gutzwiller 近似，我们重新推导了紧凑的半经典量子 Fisher 信息表达式，阐明了经典轨迹数据如何控制前导计量灵敏度。", "authors": [{"name": "Francis J. Headley"}, {"name": "Mahdi RouhbakhshNabati"}, {"name": "Henry Harper-Gardner"}, {"name": "Daniel Braun"}, {"name": "Henning Schomerus"}, {"name": "Emre Köse"}], "featured_authors": [{"name": "Francis J. Headley"}, {"name": "Mahdi RouhbakhshNabati"}, {"name": "Henry Harper-Gardner"}, {"name": "Daniel Braun"}, {"name": "Henning Schomerus"}, {"name": "Emre Köse"}], "author_count": 6}, {"id": "2604.12823", "category": "quant-ph", "title": "The use of the output states generated by the broadcasting of entanglement in quantum teleportation", "abstract": "In this article, we find a theorem that gives a relation between the maximal fidelity of teleportation and the concurrence of the inseparable $X$ state used as a quantum channel in this process. Furthermore, we evaluate the concurrence of the output states generated by the local and nonlocal asymmetric broadcasting of entanglement and prove that the concurrence is greater in the case of nonlocal broadcasting. We analyze the possibility of using the output states obtained by the broadcasting of entanglement as quantum channels in quantum teleportation. We prove, with the help of the above-mentioned theorem, that all the inseparable states given by the local and nonlocal asymmetric broadcasting of entanglement are useful for quantum teleportation. Finally, we show that the maximal fidelity of teleportation is greater in the case when the second scenario is used, i.e., when the quantum channel is generated by the nonlocal asymmetric broadcasting of entanglement.", "url": "https://arxiv.org/abs/2604.12823", "type": "理论+数值", "summary": "在本文中，我们发现了一个定理，该定理给出了隐形传态的最大保真度与在此过程中用作量子通道的不可分离的 $X$ 状态的并发性之间的关系。此外，我们评估了纠缠的局部和非局部非对称广播产生的输出状态的并发性，并证明在非局部广播的情况下并发性更大。我们分析了使用通过纠缠广播获得的输出状态作为量子隐形传态中的量子通道的可能性。借助上述定理，我们证明了局域和非局域非对称纠缠广播给出的所有不可分离态对于量子隐形传态都是有用的。最后，我们表明，在使用第二种情况的情况下，即当量子信道是由纠缠的非局域非对称广播生成时，隐形传态的最大保真度更高。", "authors": [{"name": "Iulia Ghiu"}, {"name": "Catalina Cirneci"}, {"name": "George Alexandru Nemnes"}], "featured_authors": [{"name": "Iulia Ghiu"}, {"name": "Catalina Cirneci"}, {"name": "George Alexandru Nemnes"}], "author_count": 3}, {"id": "2604.12976", "category": "quant-ph", "title": "Hamiltonian Chaos", "abstract": "Through semiclassical methods the subject of quantum chaos motivates and depends on Hamiltonian chaos research. Presented here is a selection of Hamiltonian chaos topics that in this way get directly related to any of a variety of quantum chaos research problems. The chapter begins with a description of various useful theoretical and computational tools of chaos research, e.g.~surfaces of section, paradigms of chaos, stability analysis, and symbolic dynamics... This is followed by discussions regarding the geometry of chaos, how chaotic systems respond to perturbations, and the complexification of Hamiltonian dynamics. The emphasis is on intuitive explanations and illustrations of various ideas with the references containing more mathematically rigorous expositions.", "url": "https://arxiv.org/abs/2604.12976", "type": "理论", "summary": "通过半经典方法，量子混沌主题激发并依赖于哈密顿混沌研究。这里介绍的是一系列哈密顿混沌主题，通过这种方式，这些主题与各种量子混沌研究问题直接相关。本章首先描述了混沌研究的各种有用的理论和计算工具，例如截面曲面、混沌范式、稳定性分析和符号动力学……接下来是关于混沌几何、混沌系统如何响应扰动以及哈密顿动力学的复杂化的讨论。重点是对各种想法的直观解释和说明，以及包含更严格的数学阐述的参考文献。", "authors": [{"name": "Steven Tomsovic"}], "featured_authors": [{"name": "Steven Tomsovic"}], "author_count": 1}, {"id": "2604.12982", "category": "quant-ph", "title": "Opportunistic QKD: Exploiting Idle Capacity of Classical WDM Systems", "abstract": "While Quantum Key Distribution (QKD) has been proven in lab environments, large-scale implementation requires integration with existing infrastructure. This paper proposes an opportunistic QKD framework that takes advantage of idle spectral capacity, that is, unused channels in classical fibers, to perform QKD while prioritizing classical traffic. To mitigate crosstalk during the co-propagation of classical and quantum signals, we require a guardband of unused channels between classical and quantum signals. We propose a stochastic traffic model, with a deterministic day-night cycle and fractional Gaussian noise. Monte-Carlo simulations of an 80-channel WDM system with our stochastic traffic model demonstrate that 45-65% of unused spectrum can be repurposed for QKD, depending on the traffic conditions. We also model a key reservoir model, with Available and Recovery states. We define the Reliability Horizon as the 3{\\sigma} depletion threshold. We find a trade-off between buffer reset levels: increasing the buffer reset level extends the reliability horizon but linearly increases recovery time, resulting in longer service \"dark windows\". Furthermore, simulations indicate that the first-passage time follows a heavy-tailed distribution, which is accurately characterized by a composite model combining a diurnal trend and a Bihill transition function. This framework enables network operators to optimize buffer parameters for specific Service Level Agreements (SLAs) in real-world environments.", "url": "https://arxiv.org/abs/2604.12982", "type": "理论+数值", "summary": "虽然量子密钥分发 (QKD) 已在实验室环境中得到验证，但大规模实施需要与现有基础设施集成。本文提出了一种机会性 QKD 框架，该框架利用空闲频谱容量（即经典光纤中未使用的通道）来执行 QKD，同时优先考虑经典流量。为了减轻经典信号和量子信号共同传播期间的串扰，我们需要经典信号和量子信号之间未使用通道的保护带。我们提出了一种随机流量模型，具有确定性的昼夜循环和分数高斯噪声。使用我们的随机流量模型对 80 通道 WDM 系统进行的蒙特卡罗模拟表明，45-65% 的未使用频谱可以重新用于 QKD，具体取决于流量条件。我们还对一个关键的油藏模型进行建模，其中包含可用状态和采收率状态。我们将可靠性范围定义为 3{\\sigma} 耗尽阈值。我们发现缓冲区重置级别之间存在权衡：增加缓冲区重置级别可以延长可靠性范围，但会线性增加恢复时间，从而导致更长的服务“暗窗口”。\n\n此外，模拟表明，首次通过时间遵循重尾分布，该分布可以通过结合日趋势和 Bihill 转换函数的复合模型准确表征。该框架使网络运营商能够优化现实环境中特定服务级别协议（SLA）的缓冲区参数。", "authors": [{"name": "Sumit Chaudhary"}, {"name": "Pere Munar Vallespir"}, {"name": "Alonso Viladomat Jasso"}, {"name": "Janis Nötzel"}], "featured_authors": [{"name": "Sumit Chaudhary"}, {"name": "Pere Munar Vallespir"}, {"name": "Alonso Viladomat Jasso"}, {"name": "Janis Nötzel"}], "author_count": 4}, {"id": "2604.13022", "category": "quant-ph", "title": "Classical and Quantum Speedups for Non-Convex Optimization via Energy Conserving Descent", "abstract": "The Energy Conserving Descent (ECD) algorithm was recently proposed (De Luca & Silverstein, 2022) as a global non-convex optimization method. Unlike gradient descent, appropriately configured ECD dynamics escape strict local minima and converge to a global minimum, making it appealing for machine learning optimization. We present the first analytical study of ECD, focusing on the one-dimensional setting for this first installment. We formalize a stochastic ECD dynamics (sECD) with energy-preserving noise, as well as a quantum analog of the ECD Hamiltonian (qECD), providing the foundation for a quantum algorithm through Hamiltonian simulation. For positive double-well objectives, we compute the expected hitting time from a local to the global minimum. We prove that both sECD and qECD yield exponential speedup over respective gradient descent baselines--stochastic gradient descent and its quantization. For objectives with tall barriers, qECD achieves a further speedup over sECD.", "url": "https://arxiv.org/abs/2604.13022", "type": "理论+数值", "summary": "最近提出了能量守恒下降 (ECD) 算法（De Luca & Silverstein，2022）作为全局非凸优化方法。与梯度下降不同，适当配置的 ECD 动力学可以逃避严格的局部最小值并收敛到全局最小值，这使其对机器学习优化很有吸引力。我们提出了 ECD 的第一个分析研究，重点关注第一部分的一维设置。我们形式化了具有能量守恒噪声的随机 ECD 动力学 (sECD)，以及 ECD 哈密顿量 (qECD) 的量子模拟，通过哈密顿模拟为量子算法提供了基础。对于正双井目标，我们计算从局部最小值到全局最小值的预期命中时间。我们证明 sECD 和 qECD 都在各自的梯度下降基线（随机梯度下降及其量化）上产生指数加速。对于具有高障碍的目标，qECD 比 sECD 实现了进一步的加速。", "authors": [{"name": "Yihang Sun"}, {"name": "Huaijin Wang"}, {"name": "Patrick Hayden"}, {"name": "Jose Blanchet"}], "featured_authors": [{"name": "Yihang Sun"}, {"name": "Huaijin Wang"}, {"name": "Patrick Hayden"}, {"name": "Jose Blanchet"}], "author_count": 4}, {"id": "2604.13026", "category": "quant-ph", "title": "A complexity phase transition at the EPR Hamiltonian", "abstract": "We study the computational complexity of 2-local Hamiltonian problems generated by a positive-weight symmetric interaction term, encompassing many canonical problems in statistical mechanics and optimization. We show these problems belong to one of three complexity phases: QMA-complete, StoqMA-complete, and reducible to a new problem we call EPR*. The phases are physically interpretable, corresponding to the energy level ordering of the local term. The EPR* problem is a simple generalization of the EPR problem of King. Inspired by empirically efficient algorithms for EPR, we conjecture that EPR* is in BPP. If true, this would complete the complexity classification of these problems, and imply EPR* is the transition point between easy and hard local Hamiltonians. Our proofs rely on perturbative gadgets. One simple gadget, when recursed, induces a renormalization-group-like flow on the space of local interaction terms. This gives the correct complexity picture, but does not run in polynomial time. To overcome this, we design a gadget based on a large spin chain, which we analyze via the Jordan-Wigner transformation.", "url": "https://arxiv.org/abs/2604.13026", "type": "理论+数值", "summary": "我们研究由正权重对称交互项生成的 2 局部哈密顿问题的计算复杂性，涵盖统计力学和优化中的许多典型问题。我们证明这些问题属于三个复杂阶段之一：QMA-complete、StoqMA-complete，并且可简化为我们称为 EPR* 的新问题。这些相是物理上可解释的，对应于局部项的能级排序。 EPR* 问题是 King 的 EPR 问题的简单推广。受 EPR 经验有效算法的启发，我们推测 EPR* 位于 BPP 中。如果为真，这将完成这些问题的复杂性分类，并意味着 EPR* 是简单局部哈密顿量和困难局部哈密顿量之间的过渡点。我们的证明依赖于微扰装置。一个简单的小工具在递归时会在局部交互项的空间上引发类似重整化群的流。这给出了正确的复杂性图片，但不会在多项式时间内运行。为了克服这个问题，我们设计了一个基于大型自旋链的小工具，并通过 Jordan-Wigner 变换对其进行分析。", "authors": [{"name": "Kunal Marwaha"}, {"name": "James Sud"}], "featured_authors": [{"name": "Kunal Marwaha"}, {"name": "James Sud"}], "author_count": 2}, {"id": "2604.13027", "category": "quant-ph", "title": "Floquet Many-Body Cages", "abstract": "Many-body cages have very recently emerged as a general route for nonergodic behaviour in quantum matter. Here, we show that new types of many-body cages can be engineered in Floquet circuits with the potential to realize novel nonequilibrium quantum states. For that purpose, we first identify an explicit, general construction of Floquet circuits capable of hosting many-body cages. We then present a generic strategy to engineer and structure Floquet many-body cages. We demonstrate the developed scheme for the quantum hard disk model as a generic constrained model system, realizable for instance in Rydberg atom arrays. We construct Floquet circuits yielding Floquet many-body cages with topological properties and $\\pi$-quasienergy modes, implying `time crystalline' spatiotemporal order. Our results can be directly extended to general quantum circuits, thus providing a new tool to engineer nonequilibrium behaviour in driven systems.", "url": "https://arxiv.org/abs/2604.13027", "type": "理论", "summary": "最近，多体笼成为量子物质中非遍历行为的一般途径。在这里，我们展示了可以在 Floquet 电路中设计新型多体笼，并有可能实现新颖的非平衡量子态。为此，我们首先确定了一种能够容纳多体笼的 Floquet 电路的明确通用结构。然后，我们提出了一种通用策略来设计和构建 Floquet 多体笼。我们将量子硬盘模型的开发方案展示为通用约束模型系统，例如可以在里德堡原子阵列中实现。我们构建了 Floquet 电路，产生具有拓扑特性和 $\\pi$-准能量模式的 Floquet 多体笼，这意味着“时间晶体”时空顺序。我们的结果可以直接扩展到通用量子电路，从而为设计驱动系统中的非平衡行为提供了一种新工具。", "authors": [{"name": "Tom Ben-Ami"}, {"name": "Roderich Moessner"}, {"name": "Markus Heyl"}], "featured_authors": [{"name": "Tom Ben-Ami"}, {"name": "Roderich Moessner"}, {"name": "Markus Heyl"}], "author_count": 3}, {"id": "2604.13033", "category": "quant-ph", "title": "Partial majorization and Schur concave functions on the sets of quantum and classical states", "abstract": "We construct for a Schur concave function $f$ on the set of quantum states a tight upper bound on the difference $f(\\rho)-f(\\sigma)$ for a quantum state $\\rho$ with finite $f(\\rho)$ and any quantum state $\\sigma$ $m$-partially majorized by the state $\\rho$ in the sense described in [1]. We also obtain a tight upper bound on this difference under the additional condition $\\frac{1}{2}\\|\\rho-\\sigma\\|_1\\leq\\varepsilon$ and find simple sufficient conditions for vanishing this bound with $\\,\\min\\{\\varepsilon,1/m\\}\\to0\\,$. The obtained results are applied to the von Neumann entropy. The concept of $\\varepsilon$-sufficient majorization rank of a quantum state with finite entropy is introduced and a tight upper bound on this quantity is derived and applied to the Gibbs states of a quantum oscillator. We also show how the obtained results can be reformulated for Schur concave functions on the set of probability distributions with a finite or countable set of outcomes.", "url": "https://arxiv.org/abs/2604.13033", "type": "理论", "summary": "我们为量子态集合上的 Schur 凹函数 $f$ 构造了一个严格上限，该上限对于具有有限 $f(\\rho)$ 的量子态 $\\rho$ 和任何量子态 $\\sigma$ $m$ 的差值 $f(\\rho)-f(\\sigma)$ 来说是严格的上限，在[1]中描述的意义上，部分由状态 $\\rho$ 决定。我们还在附加条件 $\\frac{1}{2}\\|\\rho-\\sigma\\|_1\\leq\\varepsilon$ 下获得了此差异的严格上限，并找到了用 $\\,\\min\\{\\varepsilon,1/m\\}\\to0\\,$ 消除此边界的简单充分条件。获得的结果应用于冯诺依曼熵。引入了具有有限熵的量子态的$\\varepsilon$-足够大化秩的概念，并导出了该量的严格上限并将其应用于量子振荡器的吉布斯态。我们还展示了如何将获得的结果重新表述为具有有限或可数结果集的概率分布集上的 Schur 凹函数。", "authors": [{"name": "M.E.Shirokov"}], "featured_authors": [{"name": "M.E.Shirokov"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
