  <style>

  <script>
    const papers = [{"id": "2605.03013", "category": "cond-mat", "title": "Universal Theory of Incoherent Metals", "abstract": "Numerous unconventional superconductors such as cuprates, heavy-fermions, and twisted-bilayer graphene exhibit incoherent metallic transport above the superconducting critical temperature. This phenomenon cannot be described with Fermi-liquid theory and has presented a significant theoretical challenge to overcome. We utilize the two-dimensional Yukawa-SYK model of fermions with spatially random coupling to quantum-critical bosons to study transport in a manner which is non-perturbative in the coupling strength. Our work provides a microscopic model of quantum-critical incoherent metals and their concomitant properties, including a non-Boltzmann transport formula between resistivity and quasi-particle lifetime, violation of the Mott-Ioffe-Regel resistivity bound, and violation of the Kovtun-Son-Starinets shear viscosity to entropy density bound.", "url": "https://arxiv.org/abs/2605.03013", "type": "理论", "summary": "许多非常规超导体，如铜酸盐、重费米子和扭曲双层石墨烯，在超导临界温度以上表现出不相干的金属输运。这种现象无法用费米液体理论来描述，并且提出了需要克服的重大理论挑战。我们利用与量子临界玻色子空间随机耦合的费米子二维 Yukawa-SYK 模型，以耦合强度非微扰的方式研究输运。我们的工作提供了量子临界非相干金属及其伴随特性的微观模型，包括电阻率和准粒子寿命之间的非玻尔兹曼输运公式，违反了 Mott-Ioffe-Regel 电阻率界限，以及违反了 Kovtun-Son-Starinets 剪切粘度与熵密度界限。", "authors": [{"name": "Aaron Kleger"}, {"name": "Nikolay Gnezdilov"}, {"name": "Rufus Boyack"}], "featured_authors": [{"name": "Aaron Kleger"}, {"name": "Nikolay Gnezdilov"}, {"name": "Rufus Boyack"}], "author_count": 3}, {"id": "2605.03026", "category": "cond-mat", "title": "Tunable Odd-Parity Spin Splittings in Altermagnets", "abstract": "Momentum-dependent spin splitting and its relation to inversion ($P$) and time-reversal ($T$) symmetries are central to nonrelativistic spintronics. Representative examples include collinear altermagnets with $(P,T)=(+,-)$ and non-collinear odd-parity magnets with $(P,T)=(-,+)$. In this work, we develop a theoretical framework to induce odd-parity spin splittings in the more abundant collinear altermagnets through two mechanisms: driving by a two-color linearly polarized light field or coupling to a $P$-odd loop-current order. Properly phase-locked two-color driving induces a static $(P,T)=(-,-)$ order, symmetry-equivalent to a translationally invariant $P$-odd loop-current order. Coupling this order to an altermagnet produces a controllable mixed-parity spin texture, opening new avenues for the electrical and optical manipulation of spin-polarized currents in spintronics applications. The same mechanism applied to a collinear $PT$-symmetric magnet induces a distinct $(P,T)=(+,+)$ state with a nonrelativistic dissipationless anomalous spin Hall conductivity. We present group-theory and microscopic Floquet theory to highlight the emergent responses.", "url": "https://arxiv.org/abs/2605.03026", "type": "理论", "summary": "动量相关的自旋分裂及其与反转 ($P$) 和时间反转 ($T$) 对称性的关系是非相对论自旋电子学的核心。代表性示例包括具有 $(P,T)=(+,-)$ 的共线交流磁体和具有 $(P,T)=(-,+)$ 的非共线奇宇称磁体。在这项工作中，我们开发了一个理论框架，通过两种机制在更丰富的共线交替磁体中诱导奇宇称自旋分裂：由双色线性偏振光场驱动或耦合到$P$-奇数环路电流顺序。正确的锁相双色驱动会产生静态 $(P,T)=(-,-)$ 顺序，对称性等效于平移不变的 $P$-奇数环路电流顺序。将这种顺序与交替磁体耦合产生可控的混合奇偶校验自旋纹理，为自旋电子学应用中自旋极化电流的电学和光学操纵开辟了新途径。应用于共线 $PT$ 对称磁体的相同机制会产生独特的 $(P,T)=(+,+)$ 状态，并具有非相对论耗散反常自旋霍尔电导率。我们提出群论和微观 Floquet 理论来强调紧急反应。", "authors": [{"name": "Yue Yu"}], "featured_authors": [{"name": "Yue Yu"}], "author_count": 1}, {"id": "2605.03047", "category": "cond-mat", "title": "Beam canalization by a non-Abelian gauge field", "abstract": "Hyperbolic and quasi-flat isofrequency contours (IFCs) are used for beam canalization and can be created by tilted Dirac points in photonic systems. Dirac points in microcavities are generated by the combination of transverse-electric/transverse-magnetic splitting and linear birefringence. We show that the canalization is here strongly assisted by the coupling between the spatial dynamics and polarization pseudospin precession. This dynamics is well described analytically and numerically as the action of a non-Abelian gauge field on emergent charges (spin current). We demonstrate a ten-fold enhancement of the canalization for a Gaussian beam by the gauge field, as compared to a description based solely on the group velocity associated with the IFCs.", "url": "https://arxiv.org/abs/2605.03047", "type": "数值", "summary": "双曲和准平坦等频轮廓 (IFC) 用于光束通道，可以通过光子系统中的倾斜狄拉克点创建。微腔中的狄拉克点是通过横向电/横向磁分裂和线性双折射的组合产生的。我们表明，空间动力学和极化赝自旋进动之间的耦合有力地促进了渠道化。这种动力学在分析和数值上被很好地描述为非阿贝尔规范场对涌现电荷（自旋流）的作用。与仅基于与 IFC 相关的群速度的描述相比，我们证明了规范场对高斯光束的渠化增强了十倍。", "authors": [{"name": "Olha Bahrova"}, {"name": "Jiahao Ren"}, {"name": "Feng Jin"}, {"name": "Rui Su"}, {"name": "Guillaume Malpuech"}, {"name": "Dmitry Solnyshkov"}], "featured_authors": [{"name": "Olha Bahrova"}, {"name": "Jiahao Ren"}, {"name": "Feng Jin"}, {"name": "Rui Su"}, {"name": "Guillaume Malpuech"}, {"name": "Dmitry Solnyshkov"}], "author_count": 6}, {"id": "2605.03087", "category": "cond-mat", "title": "Bogoliubov mode dynamics and non-adiabatic transitions in time-varying condensed media", "abstract": "This study investigates non-adiabatic wave dynamics in condensed media and the transition from adiabatic stability to spectral chaos. We introduce a dimensionless parameter, as a universal metric to quantify phase-mode redistribution at sub-wavelength inhomogeneities. Our framework treats defects as localized sites of adiabaticity violation triggering non-adiabatic parametric excitation of the ground state. Numerical validation in an expanded 50-level bosonic basis demonstrates that the framework accurately distinguishes between adiabatic regimes in ENZ-metamaterials and non-adiabatic transitions in ultrafast magnetic media . We establish a universal scaling law governed by the non-adiabaticity-to-regulation ratio, proving that the proposed metric remains a robust metrological tool for identifying sub-wavelength inhomogeneities across diverse material classes. Computational singularities observed at extreme loads identify the rigorous operational boundaries for coherent mode-mixing. The robustness of the proposed framework is numerically validated, proving the method's reliability for a wide class of non-linear condensed media satisfying the stability criterion. This result provides a rigorous physical justification for the dynamic Hilbert space truncation (effective fermion-like dynamics), ensuring metrological consistency in complex structural environments. These results provide a theoretical foundation for probing ultrafast collective excitations and latent internal stresses, extending structural analysis beyond the traditional diffraction barrier.", "url": "https://arxiv.org/abs/2605.03087", "type": "理论+数值", "summary": "这项研究研究了凝聚介质中的非绝热波动力学以及从绝热稳定性到谱混沌的转变。我们引入无量纲参数作为量化亚波长不均匀性下相模重新分布的通用度量。我们的框架将缺陷视为绝热破坏的局部位置，触发基态的非绝热参数激发。扩展的 50 级玻色子基础中的数值验证表明，该框架准确地区分了 ENZ 超材料中的绝热状态和超快磁介质中的非绝热转变。我们建立了一个由非绝热性与调节比控制的通用标度律，证明所提出的度量仍然是识别不同材料类别的亚波长不均匀性的强大计量工具。在极端负载下观察到的计算奇点确定了相干模式混合的严格操作边界。所提出框架的鲁棒性经过数值验证，证明了该方法对于满足稳定性标准的多种非线性凝聚介质的可靠性。\n\n这一结果为动态希尔伯特空间截断（有效的类费米子动力学）提供了严格的物理论证，确保了复杂结构环境中的计量一致性。这些结果为探测超快集体激发和潜在内应力提供了理论基础，将结构分析扩展到传统衍射势垒之外。", "authors": [{"name": "A.M. Tishin"}], "featured_authors": [{"name": "A.M. Tishin"}], "author_count": 1}, {"id": "2605.03191", "category": "cond-mat", "title": "Non-Markovian entropy production fluctuation theorem driven by a time-dependent electric field", "abstract": "Fluctuation theorems are key to understanding both fundamental and applied aspects of non-equilibrium thermodynamics of small systems. We study the non-Markovian entropy production fluctuation theorem for the diffusion process of charged particles in a gas inside a harmonic potential and under the action of a time-dependent electric field, using a generalized Langevin equation. By considering the influence of the electric field on both the tagged Brownian particle and the bath particles, an \"induced\" electric force arises. Despite the additional force, we demonstrate that Kubo's second fluctuation-dissipation theorem (FDT) remains unchanged. The FDT allows us to obtain the Gaussian probability density for the position along a single stochastic trajectory, which is the key to demonstrating the validity of the detailed fluctuation theorem (DFT) for the total entropy production. We study the specific result of an Ornstein-Uhlenbeck-type friction memory kernel and an oscillating electric field, and analyze the average work and entropy production in different parameter regimes.", "url": "https://arxiv.org/abs/2605.03191", "type": "理论+数值", "summary": "涨落定理是理解小系统非平衡热力学的基础和应用方面的关键。我们使用广义朗之万方程研究了谐波势内气体中带电粒子在时变电场作用下扩散过程的非马尔可夫熵产涨落定理。通过考虑电场对标记的布朗粒子和浴粒子的影响，会产生“感应”电力。尽管有额外的力，我们证明了久保第二个涨落耗散定理（FDT）仍然保持不变。 FDT 使我们能够获得沿单个随机轨迹的位置的高斯概率密度，这是证明总熵产生的详细波动定理（DFT）有效性的关键。我们研究了 Ornstein-Uhlenbeck 型摩擦记忆核和振荡电场的具体结果，并分析了不同参数状态下的平均功和熵产生。", "authors": [{"name": "K. S. Rodríguez-Vigil"}, {"name": "M. A. Bastarrachea-Magnani"}, {"name": "J. I. Jiménez-Aquino"}], "featured_authors": [{"name": "K. S. Rodríguez-Vigil"}, {"name": "M. A. Bastarrachea-Magnani"}, {"name": "J. I. Jiménez-Aquino"}], "author_count": 3}, {"id": "2605.03192", "category": "cond-mat", "title": "Universal criticality of entropy production in chemical reaction networks", "abstract": "Stochastic thermodynamics gives universal relations for microscopic entropy production, yet its critical behavior at macroscopic nonequilibrium transitions remains unclassified. We study well-mixed reversible chemical reaction networks in the macroscopic-first limit, where transitions arise as local bifurcations of mass-action dynamics. Using linear-noise formulas, center-manifold normal forms, and Floquet theory, we obtain generic exponents for entropy-production fluctuations and responses at pitchfork, transcritical, saddle-node, and Hopf bifurcations. Beyond this low-order classification, a trajectory-space Cramér-Rao type bound yields the universal scaling inequality $\\alpha - 2\\beta \\geq 0$. Hence divergent responses require divergent fluctuations, but not conversely, making entropy-production fluctuations a sharper probe of nonequilibrium criticality.", "url": "https://arxiv.org/abs/2605.03192", "type": "理论", "summary": "随机热力学给出了微观熵产生的普遍关系，但其在宏观非平衡转变时的关键行为仍然未分类。我们研究宏观第一极限下的混合良好的可逆化学反应网络，其中转变作为质量作用动力学的局部分叉而出现。使用线性噪声公式、中心流形范式和 Floquet 理论，我们获得了干草叉、跨临界、鞍节点和 Hopf 分岔处的熵产生波动和响应的通用指数。除了这个低阶分类之外，轨迹空间 Cramér-Rao 类型界限产生通用缩放不等式 $\\alpha - 2\\beta \\geq 0$。因此，发散的响应需要发散的波动，但反过来则不然，这使得熵产生波动成为对非平衡临界性的更尖锐的探测。", "authors": [{"name": "Kyota Tamano"}, {"name": "Keiji Saito"}], "featured_authors": [{"name": "Kyota Tamano"}, {"name": "Keiji Saito"}], "author_count": 2}, {"id": "2605.03325", "category": "cond-mat", "title": "Time-boundary scattering and topological resonant transmissions", "abstract": "Time boundaries (TBs), temporal analogues of spatial interfaces, offer a powerful handle to engineer quantum systems. However, unlike the well-developed stationary scattering theory at spatial interfaces, a unified framework for quantum scattering at TBs has been missing. Here we develop a Bloch-wave scattering theory for TBs by introducing a temporal scattering matrix $S$ between incoming and outgoing Bloch channels. We uncover topological resonant transmissions (RTs) -- poles of $S$ that yield perfect interband transmission and dynamical freezing of the quantum state. We establish a bulk-time-boundary correspondence for all integer Altland-Zirnbauer classes: the number of RTs equals the jump of the bulk topological invariant across the TB. In one dimension this gives a time-domain Levinson's theorem. A topological analysis further reveals a striking dimensional dependence. In even dimensions RTs are robust to temporal modulations and disorder, whereas in odd dimensions they can be destroyed by dynamical symmetry breaking. Our work places temporal and spatial scattering on the same footing and opens new avenues for engineering and probing quantum dynamics.", "url": "https://arxiv.org/abs/2605.03325", "type": "理论", "summary": "时间边界（TB）是空间界面的时间模拟，为设计量子系统提供了强大的工具。然而，与空间界面上成熟的稳态散射理论不同，TB 处的量子散射一直缺乏统一的框架。在这里，我们通过在传入和传出布洛赫通道之间引入时间散射矩阵 $S$ 来开发 TB 的布洛赫波散射理论。我们发现了拓扑谐振传输（RT）——$S$ 的极点，它产生完美的带间传输和量子态的动态冻结。我们为所有整数 Altland-Zirnbauer 类建立了批量时间边界对应关系：RT 的数量等于批量拓扑不变量在 TB 上的跳跃。在一个维度上，这给出了时域莱文森定理。拓扑分析进一步揭示了惊人的尺寸依赖性。在偶数维度中，RT 对时间调制和无序具有鲁棒性，而在奇数维度中，它们可能会被动态对称性破缺所破坏。我们的工作将时间和空间散射放在同一基础上，为工程和探测量子动力学开辟了新的途径。", "authors": [{"name": "Haiping Hu"}], "featured_authors": [{"name": "Haiping Hu"}], "author_count": 1}, {"id": "2605.03394", "category": "cond-mat", "title": "From Enhanced Sampling to Human-Readable Representations of Protein Dynamics", "abstract": "Understanding protein conformational dynamics is essential for elucidating biological function but remains challenging due to the wide range of timescales and the complexity of collective motions. Enhanced sampling methods overcome timescale limitations of conventional molecular dynamics, yet their effectiveness depends on the choice of collective variables (CVs), which are often difficult to define and may lack physical interpretability. In particular, collective variables derived from machine learning or collective vibrational modes can efficiently capture slow dynamics but are not easily mapped onto intuitive structural descriptors. Here, we present a fully automated framework that transforms enhanced sampling trajectories into human-readable representations of protein dynamics. Our approach combines enhanced sampling along CVs derived from frequency-selective anharmonic mode analysis with a post hoc analysis of biased trajectories using weighted dynamic cross-correlation matrices. From these, we identify residue pairs and domains exhibiting correlated and anti-correlated motions, yielding simple domain-domain distances that serve as physically interpretable CVs. We apply this method to five proteins, including KRAS and HIV-1 protease, and show that it consistently identifies biologically relevant domains and motions without prior system-specific knowledge. Projection onto these distances produces free energy surfaces that reproduce known conformational states with low statistical uncertainty while maximizing independent dynamical information. This workflow enables systematic recasting of complex CVs into simple geometric descriptors without loss of essential dynamics. Its generality and automation make it broadly applicable for interpreting enhanced sampling simulations and generating interpretable conformational ensembles for integration with emerging machine learning approaches.", "url": "https://arxiv.org/abs/2605.03394", "type": "数值", "summary": "了解蛋白质构象动力学对于阐明生物功能至关重要，但由于时间尺度的广泛性和集体运动的复杂性，仍然具有挑战性。增强采样方法克服了传统分子动力学的时间尺度限制，但其有效性取决于集体变量（CV）的选择，而集体变量通常难以定义并且可能缺乏物理可解释性。特别是，从机器学习或集体振动模式导出的集体变量可以有效地捕获慢速动态，但不容易映射到直观的结构描述符。在这里，我们提出了一个完全自动化的框架，可将增强的采样轨迹转换为人类可读的蛋白质动力学表示。我们的方法将源自频率选择性非谐模式分析的 CV 增强采样与使用加权动态互相关矩阵对偏置轨迹进行事后分析相结合。从这些中，我们识别出表现出相关和反相关运动的残基对和域，产生简单的域-域距离，作为物理上可解释的CV。\n\n我们将此方法应用于五种蛋白质，包括 KRAS 和 HIV-1 蛋白酶，并表明它能够一致地识别生物学相关的域和运动，而无需事先了解系统特定的知识。投影到这些距离上会产生自由能表面，该表面可以以较低的统计不确定性重现已知的构象状态，同时最大化独立的动力学信息。该工作流程能够将复杂的 CV 系统地重铸为简单的几何描述符，而不会损失基本的动态。它的通用性和自动化使其广泛适用于解释增强的采样模拟和生成可解释的构象集合，以便与新兴的机器学习方法集成。", "authors": [{"name": "Souvik Mondal"}, {"name": "Michael A. Sauer"}, {"name": "Matthias Heyden"}], "featured_authors": [{"name": "Souvik Mondal"}, {"name": "Michael A. Sauer"}, {"name": "Matthias Heyden"}], "author_count": 3}, {"id": "2605.03444", "category": "cond-mat", "title": "Coupled phase transitions in crystalline solids with extreme chemical disorder", "abstract": "Structural phase transitions often couple to magnetic and electronic degrees of freedom, enabling emergent phenomena in solids. In high-entropy oxides (HEOs), which typically stabilize in highly symmetric cubic phases, such transitions are considered rare due to the extreme chemical disorder-analogous to the behavior observed in high-entropy alloys. This raises a fundamental question: can the rich physics of coupled phase transitions persist in such disordered systems? Here, we show that targeted design of compositionally complex oxides (CCOs) can trigger symmetry-lowering transitions, with spinel-type materials serving as a representative case. For instance, [Mn$_{0.2}$Co$_{0.2}$Ni$_{0.2}$Cu$_{0.2}$Zn$_{0.2}$]Cr$_2$O$_4$, having two Jahn-Teller (J-T) active ions, undergoes two successive coupled structural transitions upon cooling: an orbital-driven transition at 100 K and a magnetism-driven transition at 40 K. Systematic substitution of $A$-site cations reveals that both Ni and Cu are essential for these transitions. Element specific local structure investigations uncover distinct and opposing local distortions around Ni and Cu, while Mn, Co, and Zn remain largely undistorted. These results establish that CCOs can host coupled phase transitions through `cooperation via competition' among local distortions in a chemically disordered lattice. This discovery expands the design principles for complex oxides, introducing a new paradigm for tuning structural and functional properties in high-entropy systems beyond conventional symmetry constraints.", "url": "https://arxiv.org/abs/2605.03444", "type": "理论", "summary": "结构相变通常与磁和电子自由度耦合，从而在固体中产生涌现现象。高熵氧化物（HEO）通常稳定在高度对称的立方相中，由于极端的化学无序，这种转变被认为是罕见的——类似于在高熵合金中观察到的行为。这就提出了一个基本问题：耦合相变的丰富物理现象能否在这种无序系统中持续存在？在这里，我们证明了复合氧化物（CCO）的有针对性的设计可以触发降低对称性的转变，其中尖晶石型材料是一个典型案例。例如，[Mn$_{0.2}$Co$_{0.2}$Ni$_{0.2}$Cu$_{0.2}$Zn$_{0.2}$]Cr$_2$O$_4$，具有两个 Jahn-Teller (J-T) 活性离子，在冷却时经历两个连续的耦合结构转变：100 K 下的轨道驱动转变和 40 K 下的磁驱动转变。 $A$ 位点阳离子表明 Ni 和 Cu 对于这些转变都是必需的。元素特定的局部结构研究揭示了 Ni 和 Cu 周围明显且相反的局部扭曲，而 Mn、Co 和 Zn 基本上保持未扭曲。\n\n这些结果表明，CCO 可以通过化学无序晶格中局部扭曲之间的“竞争合作”来实现耦合相变。这一发现扩展了复杂氧化物的设计原理，引入了一种新的范式，用于调整高熵系统中超越传统对称性约束的结构和功能特性。", "authors": [{"name": "Subha Dey"}, {"name": "Rukma Nevgi"}, {"name": "Suresh Chandra Joshi"}, {"name": "Sourav Chowdhury"}, {"name": "Nandana Bhattacharya"}, {"name": "Kashish Kapoor"}, {"name": "Tinku Dan"}, {"name": "Subhadip Chowdhury"}, {"name": "Sabyasachi Karmakar"}, {"name": "S. D. Kaushik"}, {"name": "Shibabrata Nandi"}, {"name": "Christoph Klewe"}, {"name": "Manuel Valvidares"}, {"name": "Moritz Hoesch"}, {"name": "George E. Sterbinsky"}, {"name": "Srimanta Middey"}], "featured_authors": [{"name": "Subha Dey"}, {"name": "Rukma Nevgi"}, {"name": "Suresh Chandra Joshi"}, {"name": "Moritz Hoesch"}, {"name": "George E. Sterbinsky"}, {"name": "Srimanta Middey"}], "author_count": 16}, {"id": "2605.03448", "category": "cond-mat", "title": "Nature of magnetism in bilayer nickelate La3Ni2O7 single crystals", "abstract": "The recent discovery of high-temperature superconductivity in pressurized and thin film nickelates has generated intense interest, yet the nature of magnetism in their ambient-pressure parent phases remains poorly understood, despite its potentially crucial role in pairing. Here we use neutron scattering to resolve the spin order and dynamics of single-crystalline La3Ni2O7, an ambient-pressure parent of this class. Well defined spin excitations are observed at Q = (0, 0.5, 2.5), featuring a~5 meV spin gap and anisotropic in-plane dispersions, with zone-boundary softening along the transverse direction indicative of competing exchange interactions. The excitations exhibit pronounced out-of-plane modulations with bilayer periodicity, providing direct evidence for antiferromagnetic interlayer coupling. Their dispersion is well described by a bilayer Heisenberg Hamiltonian with strong interlayer exchange and competing in-plane couplings within a stripe-type magnetic order. Normalization of the spectra to absolute units reveals that, although the spin-wave bandwidth is only about 25% of that in cuprates, the local dynamic susceptibility at comparable energies is significantly enhanced, yielding a total fluctuating moment of comparable magnitude. These results highlight intense mid-energy spin excitations rooted in substantial electronic correlations as a defining feature of this family, establishing a magnetic framework distinct from cuprates and directly relevant to understanding superconductivity in this system.", "url": "https://arxiv.org/abs/2605.03448", "type": "理论", "summary": "最近在加压镍酸盐和薄膜镍酸盐中发现的高温超导性引起了人们的浓厚兴趣，但其环境压力母相中的磁性性质仍然知之甚少，尽管它在配对中具有潜在的关键作用。在这里，我们使用中子散射来解析单晶 La3Ni2O7（此类的环境压力母体）的自旋顺序和动力学。在 Q = (0, 0.5, 2.5) 处观察到明确定义的自旋激发，具有 ~5 meV 自旋间隙和各向异性面内色散，沿横向的区域边界软化表明存在竞争交换相互作用。激发表现出具有双层周期性的明显的面外调制，为反铁磁层间耦合提供了直接证据。它们的色散可以通过双层海森堡哈密顿量来很好地描述，该双层海森堡哈密顿量具有强的层间交换和带状磁序内的竞争性面内耦合。\n\n将光谱归一化为绝对单位表明，尽管自旋波带宽仅为铜酸盐的 25% 左右，但在可比能量下的局部动态磁化率显着增强，产生了可比量级的总脉动矩。这些结果强调了植根于大量电子相关性的强烈中能自旋激发，作为该家族的一个定义特征，建立了一个不同于铜氧化物的磁性框架，并与理解该系统中的超导性直接相关。", "authors": [{"name": "Lixing Chen"}, {"name": "Enkang Zhang"}, {"name": "Yiqing Hao"}, {"name": "Yinghao Zhu"}, {"name": "Bingkun Cui"}, {"name": "Douglas L. Abernathy"}, {"name": "Travis J. Williams"}, {"name": "Yoichi Ikeda"}, {"name": "Hao Zhang"}, {"name": "Feiyang Liu"}, {"name": "Wenbin Wang"}, {"name": "Qisi Wang"}, {"name": "Jun Zhao"}], "featured_authors": [{"name": "Lixing Chen"}, {"name": "Enkang Zhang"}, {"name": "Yiqing Hao"}, {"name": "Wenbin Wang"}, {"name": "Qisi Wang"}, {"name": "Jun Zhao"}], "author_count": 13}, {"id": "2605.03455", "category": "cond-mat", "title": "Dynamic properties of a confined quasi-two-dimensional granular fluid driven by a stochastic bath with friction", "abstract": "This paper investigates the dynamic properties of a confined quasi-two-dimensional granular fluid at moderate densities, modeled within the framework of the Enskog kinetic equation. The system is described using the so-called $\\Delta$-model, which incorporates energy injection through modified collision rules, and is further extended to account for the influence of an interstitial gas via a viscous drag force and a stochastic Langevin-like term. By applying the Chapman-Enskog method, the Navier-Stokes transport coefficients and the cooling rate are derived analytically considering the leading terms in a Sonine polynomial expansion. The study focuses on steady-state conditions and examines how the combined effects of inelastic collisions and external driving influence transport properties such as the viscosity and the thermal conductivity. Theoretical predictions for the steady temperature and the kurtosis are validated against direct simulation Monte Carlo (DSMC) results, showing excellent agreement. The findings reveal that the external driving significantly alters the transport coefficients compared to dry (no gas phase) granular systems, challenging previous assumptions that neglected these effects. Additionally, a linear stability analysis demonstrates that the homogeneous steady state is stable across the explored parameter space.", "url": "https://arxiv.org/abs/2605.03455", "type": "理论+数值", "summary": "本文研究了中等密度的受限准二维颗粒流体的动态特性，在恩斯科格动力学方程的框架内建模。该系统使用所谓的 $\\Delta$ 模型进行描述，该模型通过修改碰撞规则合并能量注入，并进一步扩展以通过粘性阻力和随机朗之万项来解释间隙气体的影响。通过应用 Chapman-Enskog 方法，考虑 Sonine 多项式展开中的主导项，分析导出 Navier-Stokes 输运系数和冷却速率。该研究重点关注稳态条件，并研究非弹性碰撞和外部驱动的综合效应如何影响粘度和导热率等输运特性。针对稳定温度和峰度的理论预测经过直接模拟蒙特卡罗 (DSMC) 结果的验证，显示出极好的一致性。\n\n研究结果表明，与干燥（无气相）颗粒系统相比，外部驱动显着改变了输运系数，挑战了之前忽略这些影响的假设。此外，线性稳定性分析表明，均匀稳态在探索的参数空间中是稳定的。", "authors": [{"name": "David González Méndez"}, {"name": "Rubén Gómez González"}, {"name": "Vicente Garzó"}], "featured_authors": [{"name": "David González Méndez"}, {"name": "Rubén Gómez González"}, {"name": "Vicente Garzó"}], "author_count": 3}, {"id": "2605.03457", "category": "cond-mat", "title": "Energy dissipation at the atomic scale explains how fracture energy depends on crack velocity in silica glass", "abstract": "The fracture energy of brittle materials rises with crack velocity, and this effect is typically attributed to surface roughening from path instabilities. Here we show, using molecular dynamics simulations of silica glass with a first-principles machine learned interatomic potential, that the structural fracture energy rises by up to 33 % already below the branching threshold, showing that fracture energy is not a constant material property. This rise in fracture energy is roughly equally partitioned between an increase in the intrinsic surface energy density and nanoscale roughening that increases the real fracture surface area. Results demonstrate that dynamic fracture in silica glass increases the fracture energy not merely by creating more apparent surface, but also by creating a fundamentally different surface at the nanoscale.", "url": "https://arxiv.org/abs/2605.03457", "type": "数值", "summary": "脆性材料的断裂能随着裂纹速度的增加而增加，这种效应通常归因于路径不稳定性导致的表面粗糙化。在这里，我们使用第一原理机器学习原子间势对石英玻璃进行分子动力学模拟，结果显示结构断裂能上升了 33%，已经低于分支阈值，这表明断裂能不是恒定的材料特性。断裂能的增加大致相等地分配在固有表面能量密度的增加和增加实际断裂表面积的纳米级粗糙化之间。结果表明，石英玻璃的动态断裂不仅通过产生更明显的表面，而且通过在纳米尺度上产生根本不同的表面来增加断裂能。", "authors": [{"name": "Marthe Grønlie Guren"}, {"name": "Sigbjørn Løland Bore"}, {"name": "François Renard"}, {"name": "Henrik Andersen Sveinsson"}], "featured_authors": [{"name": "Marthe Grønlie Guren"}, {"name": "Sigbjørn Løland Bore"}, {"name": "François Renard"}, {"name": "Henrik Andersen Sveinsson"}], "author_count": 4}, {"id": "2605.03459", "category": "cond-mat", "title": "Cubic edge dispersion in a semi-Dirac Chern insulator", "abstract": "Topological edge states in Chern insulators are typically characterized by a linear dispersion relation inherited from the Dirac structure of the bulk Hamiltonian. Here we show that this paradigm can be fundamentally altered in systems with anisotropic semi-Dirac band structures. We introduce a minimal two-band lattice model realizing a semi-Dirac Chern insulator and determine its topological phase diagram analytically. Using a mass-domain-wall approach in a semi-infinite geometry, we derive an explicit expression for the chiral edge states and find that their low-energy dispersion scales cubically with momentum, $E(k)\\propto k^3$. Numerical diagonalization of the corresponding tight-binding ribbon confirms the analytical prediction. Our results demonstrate that unconventional bulk band structures can produce qualitatively different boundary excitations, providing a route to engineering nonstandard chiral edge dynamics in topological materials and synthetic quantum systems.", "url": "https://arxiv.org/abs/2605.03459", "type": "理论+数值", "summary": "陈绝缘体中的拓扑边缘态通常以继承自体哈密顿量的狄拉克结构的线性色散关系为特征。在这里，我们证明这种范式可以在具有各向异性半狄拉克能带结构的系统中从根本上改变。我们引入了实现半狄拉克陈绝缘体的最小二能晶格模型，并分析确定了其拓扑相图。在半无限几何中使用质量域壁方法，我们推导了手征边缘态的显式表达式，并发现它们的低能量色散随动量 $E(k)\\propto k^3$ 呈三次方缩放。相应紧束缚带的数值对角化证实了分析预测。我们的结果表明，非常规体能带结构可以产生性质不同的边界激发，为拓扑材料和合成量子系统中的非标准手性边缘动力学工程提供了一条途径。", "authors": [{"name": "Marta García Olmos"}, {"name": "David Martín Tejedor"}, {"name": "Mario Amado"}, {"name": "Yuriko Baba"}, {"name": "Rafael A. Molina"}], "featured_authors": [{"name": "Marta García Olmos"}, {"name": "David Martín Tejedor"}, {"name": "Mario Amado"}, {"name": "Yuriko Baba"}, {"name": "Rafael A. Molina"}], "author_count": 5}, {"id": "2605.03515", "category": "cond-mat", "title": "Scale-Dependent Input Representation and Confidence Estimation for LLMs in Materials Property Prediction", "abstract": "Large language models (LLMs) are increasingly applied to materials science. However, the relationship between prediction accuracy, input representation, and model scale remains unclear, and reliable methods for assessing prediction confidence have not yet been established. In this study, we fine-tune two Llama models of different scales (1B and 8B) using low-rank adaptation (LoRA) on an inorganic crystal structure dataset. We systematically evaluate five input representations, namely chemical composition, crystal summary, local environment description, full text description, and crystallographic information files (CIF), for formation energy and bandgap prediction. Our results show that the optimal input representation depends on model scale. The 1B model performs better with compact representations, whereas the 8B model maintains high accuracy even with longer natural-language descriptions and CIF inputs. Across both model scales, crystal summaries that include space-group information consistently outperform composition-only inputs, indicating that symmetry information serves as a robust and informative feature. We further analyze the relationship between prediction error and the mean negative log-likelihood (mean NLL) of tokens corresponding to predicted numerical values. While no clear correlation is observed in base models, fine-tuned models exhibit a consistent trend in which lower mean NLL corresponds to smaller prediction errors. This result suggests that mean NLL can serve as a practical confidence indicator without requiring additional training. These findings demonstrate that both input representation and model scale play critical roles in LLM-based materials property prediction, and that mean NLL provides an effective and computationally efficient measure of prediction confidence.", "url": "https://arxiv.org/abs/2605.03515", "type": "理论+数值", "summary": "大型语言模型（LLM）越来越多地应用于材料科学。然而，预测精度、输入表示和模型规模之间的关系仍不清楚，并且尚未建立评估预测置信度的可靠方法。在本研究中，我们在无机晶体结构数据集上使用低秩适应 (LoRA) 微调两个不同尺度的 Llama 模型（1B 和 8B）。我们系统地评估了五种输入表示，即化学成分、晶体摘要、局部环境描述、全文描述和晶体信息文件（CIF），用于形成能和带隙预测。我们的结果表明，最佳输入表示取决于模型规模。 1B 模型在紧凑表示方面表现更好，而 8B 模型即使在较长的自然语言描述和 CIF 输入下也能保持高精度。在这两个模型尺度上，包含空间群信息的晶体摘要始终优于仅组成的输入，这表明对称信息是一个强大且信息丰富的特征。\n\n我们进一步分析预测误差与预测数值对应的标记的平均负对数似然（mean NLL）之间的关系。虽然在基础模型中没有观察到明显的相关性，但微调模型表现出一致的趋势，即较低的平均 NLL 对应于较小的预测误差。这一结果表明，平均 NLL 可以作为实用的置信度指标，而不需要额外的训练。这些发现表明，输入表示和模型规模在基于 LLM 的材料性能预测中都发挥着关键作用，这意味着 NLL 提供了一种有效且计算高效的预测置信度度量。", "authors": [{"name": "Shuichiro Ozawa"}, {"name": "Izumi Takahara"}, {"name": "Teruyasu Mizoguchi"}], "featured_authors": [{"name": "Shuichiro Ozawa"}, {"name": "Izumi Takahara"}, {"name": "Teruyasu Mizoguchi"}], "author_count": 3}, {"id": "2605.03530", "category": "cond-mat", "title": "Theory of transmittance of narrow quantum wires intersection in 2D systems", "abstract": "The transmittance of intersection between narrow quantum strips is studied. It is assumed that strip widths are less than the electron wavelength, so that they are tunnel conductors. In this assumption the Schrödinger equation is reduced to the Laplace one, which can be solved by the conformal mappings. The transmittances of T-like and X-like wire crossings are found.", "url": "https://arxiv.org/abs/2605.03530", "type": "理论+数值", "summary": "研究了窄量子带之间交叉点的透射率。假设条带宽度小于电子波长，因此它们是隧道导体。在这一假设中，薛定谔方程被简化为拉普拉斯方程，可以通过共角映射来求解。求出 T 型和 X 型导线交叉点的透射率。", "authors": [{"name": "L. Braginsky"}, {"name": "M. V. Entin"}], "featured_authors": [{"name": "L. Braginsky"}, {"name": "M. V. Entin"}], "author_count": 2}, {"id": "2605.03539", "category": "cond-mat", "title": "Gauge-Field-Mediated Symmetry Breaking of Matters Under Electromagnetic Fields and Its Impact on Spin Dynamics", "abstract": "When a condensed-matter system is subjected to external electromagnetic fields, the gauge-invariant formulation of physical operators must explicitly incorporate the gauge-field contribution. However, in the context of spin-orbit coupling (SOC), this gauge-field term is often regarded as negligible or merely additive compared to the canonical SOC, which is typically localized near atomic cores. Here, we demonstrate that the symmetry breaking and consequent spin dynamics are governed by the gauge-field term, without which the spins remain symmetry-constrained. We perform real-time time-dependent density functional theory calculations to investigate spin-orbit dynamics, focusing on representative cases with mirror, glide, and screw-rotational symmetry. We demonstrate that when the gauge-field term in the time-dependent Hamiltonian perturbs the symmetry of the canonical term, a dynamical spin state gradually develops during the time evolution, beyond the symmetry-frozen states. We suggest that, for nonequilibrium spin-orbit dynamics, the gauge-invariant formulation of SOC is not only formally required but also quantitatively essential, even for a weak external field.", "url": "https://arxiv.org/abs/2605.03539", "type": "理论+数值", "summary": "当凝聚态物质系统受到外部电磁场影响时，物理算子的规范不变公式必须明确包含规范场贡献。然而，在自旋轨道耦合 (SOC) 的背景下，与通常位于原子核心附近的规范 SOC 相比，该规范场项通常被视为可忽略不计或仅是相加的。在这里，我们证明了对称性破缺和随之而来的自旋动力学是由规范场项控制的，没有规范场项，自旋仍然受到对称性约束。我们进行实时依赖时间的密度泛函理论计算来研究自旋轨道动力学，重点关注具有镜像、滑移和螺旋旋转对称性的代表性案例。我们证明，当时间相关的哈密顿量中的规范场项扰乱规范项的对称性时，动态自旋态在时间演化过程中逐渐发展，超越对称冻结态。我们认为，对于非平衡自旋轨道动力学，SOC 的规范不变公式不仅在形式上是必需的，而且在定量上也是必要的，即使对于弱外场也是如此。", "authors": [{"name": "Uiseok Jeong"}, {"name": "Esmaeil Taghizadeh Sisakht"}, {"name": "Angel Rubio"}, {"name": "Carsten A. Ullrich"}, {"name": "Kyeong-Whan Kim"}, {"name": "Noejung Park"}], "featured_authors": [{"name": "Uiseok Jeong"}, {"name": "Esmaeil Taghizadeh Sisakht"}, {"name": "Angel Rubio"}, {"name": "Carsten A. Ullrich"}, {"name": "Kyeong-Whan Kim"}, {"name": "Noejung Park"}], "author_count": 6}, {"id": "2605.03568", "category": "cond-mat", "title": "Optimal Navigation in Stochastic and Disordered Gridworlds", "abstract": "Navigation in complex and noisy environments is a key issue in diverse fields from biology to engineering. Despite extensive progress in numerical optimization methods for computing navigation policies, insights into how disorder reshapes optimal navigation remain elusive. To address this question, we investigate the navigation of a Brownian particle in a disordered energy landscape, modeled as a lattice with randomly distributed traps. Using dynamic programming, we compute the optimal navigation policies that minimize the mean first-passage time to a target site. To quantify the impact of disorder, we introduce a density of change from a Kullback-Leibler divergence, which captures how the optimal policy is reshaped by either the presence of disorder or the knowledge of its configuration. Our results reveal a non-monotonic dependence of the change of the policy on trap concentration, with a pronounced maximum. In the fluctuation-dominated regime where the navigation bias is weak, we derive an analytical expression for the density of change, and demonstrate that the maximum occurs unexpectedly at low trap concentrations.", "url": "https://arxiv.org/abs/2605.03568", "type": "理论+数值", "summary": "在复杂和嘈杂的环境中进行导航是从生物学到工程学等各个领域的关键问题。尽管计算导航策略的数值优化方法取得了广泛进展，但对无序如何重塑最佳导航的见解仍然难以捉摸。为了解决这个问题，我们研究了布朗粒子在无序能量景观中的导航，建模为具有随机分布陷阱的晶格。使用动态规划，我们计算最佳导航策略，最大限度地减少到达目标站点的平均首次通过时间。为了量化无序的影响，我们引入了 Kullback-Leibler 散度的变化密度，它捕捉了最优政策如何通过无序的存在或其配置的知识来重塑。我们的结果揭示了政策变化对陷阱浓度的非单调依赖性，并具有明显的最大值。在导航偏差较弱的涨落主导状态下，我们推导了变化密度的解析表达式，并证明最大值在低陷阱浓度下意外出现。", "authors": [{"name": "Kévin Bilaï Biloa"}, {"name": "Olivier Pierre-Louis"}], "featured_authors": [{"name": "Kévin Bilaï Biloa"}, {"name": "Olivier Pierre-Louis"}], "author_count": 2}, {"id": "2605.03582", "category": "cond-mat", "title": "Renormalization group analysis for bosonization coefficients in half-odd-integer Kitaev spin chains", "abstract": "Based on a renormalization group (RG) analysis, we study the bosonization formulas in spin-S Kitaev-Gamma and Kitaev-Heisenberg-Gamma chains in the (K < 0, Gamma > 0, J > 0) parameter region, where S is a half-odd integer. We find that the effects associated with the breaking of emergent continuous symmetries in bosonization formulas scale as 1/S in the large-S limit, which is in qualitative agreement with DMRG numerical results for Kitaev-Gamma chains. In Kitaev-Heisenberg-Gamma chains, symmetry analysis reveals ten independent bosonization coefficients, five of which are predicted by the RG analysis to have no dependence on the Heisenberg coupling up to linear order. Our work may offer valuable input for determining magnetic ordering tendencies in two-dimensional Kitaev spin models within a quasi-one-dimensional approach.", "url": "https://arxiv.org/abs/2605.03582", "type": "理论+数值", "summary": "基于重整化群（RG）分析，我们研究了（K < 0，Gamma > 0，J > 0）参数区域中自旋-S Kitaev-Gamma 和 Kitaev-Heisenberg-Gamma 链的玻色化公式，其中 S 是半奇整数。我们发现，与玻色化公式中出现的连续对称性破缺相关的效应在大 S 极限下缩放为 1/S，这与 Kitaev-Gamma 链的 DMRG 数值结果定性一致。在 Kitaev-Heisenberg-Gamma 链中，对称性分析揭示了 10 个独立的玻色化系数，其中 5 个经 RG 分析预测不依赖于线性阶的海森堡耦合。我们的工作可以为确定准一维方法中二维基塔耶夫自旋模型中的磁排序趋势提供有价值的输入。", "authors": [{"name": "Jianxun Li"}, {"name": "Chao Xu"}, {"name": "Wang Yang"}], "featured_authors": [{"name": "Jianxun Li"}, {"name": "Chao Xu"}, {"name": "Wang Yang"}], "author_count": 3}, {"id": "2605.03700", "category": "cond-mat", "title": "Numerical evidence of a critical point in the (2+1)D SO(5) nonlinear sigma model with Wess-Zumino-Witten term", "abstract": "We develop an optimized continuous-field quantum Monte Carlo (QMC) algorithm to investigate the SO(5) nonlinear sigma model with a Wess-Zumino-Witten term, which describes half-filled Dirac fermions in 2+1 space-time dimensions akin to graphene and Yukawa coupled to a quintuplet of compatible mass terms. To regularize the theory, we project onto the lowest Landau level for both spherical and torus geometries. Our algorithm reduces the computational complexity to $O(\\beta N_{\\mathbf{q}} N_\\phi^2)$, yielding a speedup of a factor of $N_\\phi$ (the number of magnetic fluxes, i.e., system size) relative to prior works [1-3]. This advance enables us to simulate system sizes up to $N_\\phi=140$ on torus and $N_\\phi=49$ on sphere, far exceeding the maximum sizes accessed, and to map out the universal phase diagram of the model on both geometries. Most notably, we identify and characterize a critical point that separates an SO(5)-broken ordered phase at small coupling from an SO(5)-symmetric disordered phase at large coupling. The critical point becomes multicritical upon the inclusion of terms that break the SO(5) symmetry down to $\\mathrm{U}(1) \\times \\mathrm{SU}(2)$, relevant for the deconfined phase transition between Néel antiferromagnetic and valence-bond-solid orders in quantum magnets. While the precise nature of the disordered phase in the thermodynamic limit remains to be determined, we argue that it is neither conformal nor trivially gapped, akin to a chiral quantum spin liquid with a small gap. Our finding of a multicritical point in the phase diagram of the SO(5) nonlinear sigma model with Wess-Zumino-Witten term resolves the long-standing open question of its global structure, and our QMC framework opens a new avenue for systematic studies of projected Hamiltonians, ranging from correlated flat bands to fractional quantum (anomalous) Hall systems.", "url": "https://arxiv.org/abs/2605.03700", "type": "理论+数值", "summary": "我们开发了一种优化的连续场量子蒙特卡罗 (QMC) 算法，用于研究具有 Wess-Zumino-Witten 项的 SO(5) 非线性 sigma 模型，该模型描述了 2+1 时空维度中的半填充狄拉克费米子，类似于石墨烯和 Yukawa 耦合到兼容质量项的五元组。为了规范该理论，我们将球面和环面几何形状投影到最低的朗道能级上。我们的算法将计算复杂度降低到 $O(\\beta N_{\\mathbf{q}} N_\\phi^2)$，相对于先前的工作 [1-3] ，加速了 $N_\\phi$ 倍（磁通量的数量，即系统大小）。这一进步使我们能够在圆环上模拟高达 $N_\\phi=140$ 的系统尺寸，在球体上模拟高达 $N_\\phi=49$ 的系统尺寸，远远超过所访问的最大尺寸，并在两种几何形状上绘制模型的通用相图。最值得注意的是，我们确定并表征了一个临界点，该临界点将小耦合下的 SO(5) 破坏有序相与大耦合下的 SO(5) 对称无序相分开。\n\n当包含将 SO(5) 对称性破坏为 $\\mathrm{U}(1) \\times \\mathrm{SU}(2)$ 的项时，临界点变为多临界点，这与量子磁体中尼尔反铁磁序和价键固体序之间的解除限制相变相关。虽然热力学极限中无序相的精确性质仍有待确定，但我们认为它既不是共形的也不是微不足道的间隙，类似于具有小间隙的手性量子自旋液体。我们在带有 Wess-Zumino-Witten 项的 SO(5) 非线性 sigma 模型相图中发现的多临界点解决了其全局结构的长期悬而未决的问题，并且我们的 QMC 框架为投影哈密顿量的系统研究开辟了新途径，范围从相关平带到分数量子（反常）霍尔系统。", "authors": [{"name": "Yuan Da Liao"}, {"name": "Bin-Bin Chen"}, {"name": "Fakher F. Assaad"}, {"name": "Lukas Janssen"}, {"name": "Zi Yang Meng"}], "featured_authors": [{"name": "Yuan Da Liao"}, {"name": "Bin-Bin Chen"}, {"name": "Fakher F. Assaad"}, {"name": "Lukas Janssen"}, {"name": "Zi Yang Meng"}], "author_count": 5}, {"id": "2605.03728", "category": "cond-mat", "title": "Linear and Non-Linear Rheology of Single and Double Cross-Linked Biopolymer Networks under Viscous Shear Flow", "abstract": "In this research study, a numerical tool, which is based on a version of Slender Body theory, has been used and also modified to simulate the mechanical behaviour of single- and double-cross-linked biopolymer networks (hydrogel) under oscillatory shear flow. The hydrodynamic interactions among fibres of intertwined networks were considered. Then, the stress and Fourier coefficients (i.e. shear moduli) were evaluated for both linear and nonlinear regimes. It was found that the double peaks (two-step yielding) of two double network at 100% maximum strain amplitude (nonlinear regime) cannot happen due to changes in fibre alignments and seed numbers, although the crosslinkers between two subnetworks present, which was previously reported in the literature. In fact, we also observed two peaks for single network in nonlinear regime. Furthermore, it was shown that the stress-strain curve of double network is not predicted by just superimposing the results from the corresponding single networks at 5% maximum strain amplitude (linear regime), but this prediction can be provided at 100% maximum strain amplitude (nonlinear regime). The Fourier coefficients and corresponding amplitude (an indication of nonlinearity effects) for double network were quite considerable from zero to fifth modes in nonlinear regime, despite enough zero and first modes in linear regime. It was also shown that the nonlinearity effects can be related to the morphology of the initial structure, i.e. the seed number rather than the flow condition for the single network. These results can help scientists to better design enhance fibrous materials used in wound healing or tissue engineering.", "url": "https://arxiv.org/abs/2605.03728", "type": "理论+数值", "summary": "在这项研究中，使用并修改了基于细长体理论版本的数值工具来模拟单交联和双交联生物聚合物网络（水凝胶）在振荡剪切流下的机械行为。考虑了交织网络的纤维之间的流体动力相互作用。然后，评估线性和非线性状态下的应力和傅立叶系数（即剪切模量）。研究发现，尽管两个子网络之间存在交联剂，但由于纤维排列和种子数量的变化，两个双网络在 100% 最大应变幅度（非线性状态）下不会出现双峰（两步屈服），这在文献中已有报道。事实上，我们还观察到非线性状态下单个网络的两个峰值。此外，结果表明，双网络的应力-应变曲线不能仅通过叠加 5% 最大应变幅（线性状态）下相应单网络的结果来预测，但可以在 100% 最大应变幅（非线性状态）下提供此预测。\n\n尽管线性区域中有足够的零模和第一模，但双网络的傅里叶系数和相应的幅度（非线性效应的指示）在非线性区域从零到第五模相当大。研究还表明，非线性效应可能与初始结构的形态有关，即种子数而不是单个网络的流动条件。这些结果可以帮助科学家更好地设计用于伤口愈合或组织工程的增强纤维材料。", "authors": [{"name": "Nasrollah Hajaliakbari"}, {"name": "David Head"}, {"name": "Oliver Harlen"}], "featured_authors": [{"name": "Nasrollah Hajaliakbari"}, {"name": "David Head"}, {"name": "Oliver Harlen"}], "author_count": 3}, {"id": "2605.03731", "category": "cond-mat", "title": "A Correction Method for Crack Area Overestimation in Phase-Field Fracture", "abstract": "Phase-field fracture models are known to overestimate the crack area, a discrepancy that compromises the accuracy of fracture predictions. This issue stems from the diffuse crack representation and numerical artifacts, such as strain localization, where the phase-field variable artificially saturates across finite elements. Existing correction strategies, including mesh-dependent factors and skeletonization algorithms, have significant limitations. Mesh-based corrections are often unreliable for unstructured meshes, while skeletonization can be complex and inaccurate for intricate crack topologies, especially in three dimensions. This paper introduces a novel and robust framework to correct this overestimation. Our approach is founded on the principle of energy equipartition, where the energy contributions from the phase-field and its gradient are equal as the length-scale parameter approaches zero. Since numerical artifacts primarily affect the phase-field term while leaving the gradient term largely unperturbed, we propose that the crack area can be accurately approximated as twice the gradient-dependent energy. This method is inherently mesh-independent and readily applicable to the entire domain, including 3D simulations. The proposed methodology is validated against benchmarks with analytical solutions and compared with established methods like skeletonization to demonstrate its accuracy. It is then applied to complex geometries with curvilinear crack paths and evaluated in a three-dimensional simulation.", "url": "https://arxiv.org/abs/2605.03731", "type": "理论+数值", "summary": "众所周知，相场断裂模型会高估裂纹面积，这种差异会影响断裂预测的准确性。这个问题源于扩散裂纹表示和数值伪影，例如应变局部化，其中相场变量在有限元上人为地饱和。现有的校正策略，包括网格相关因素和骨架化算法，具有很大的局限性。对于非结构化网格，基于网格的校正通常不可靠，而对于复杂的裂纹拓扑（尤其是在三维空间中），骨架化可能很复杂且不准确。本文介绍了一种新颖且强大的框架来纠正这种高估。我们的方法基于能量均分原理，其中当长度尺度参数接近零时，相场及其梯度的能量贡献相等。由于数值伪影主要影响相场项，而梯度项很大程度上不受干扰，因此我们建议裂纹面积可以精确地近似为梯度相关能量的两倍。\n\n该方法本质上是与网格无关的，并且很容易适用于整个域，包括 3D 模拟。所提出的方法通过分析解决方案的基准进行验证，并与骨架化等现有方法进行比较，以证明其准确性。然后将其应用于具有曲线裂纹路径的复杂几何形状，并在三维模拟中进行评估。", "authors": [{"name": "M. Castillón"}, {"name": "J. Segurado"}, {"name": "I. Romero"}], "featured_authors": [{"name": "M. Castillón"}, {"name": "J. Segurado"}, {"name": "I. Romero"}], "author_count": 3}, {"id": "2605.03738", "category": "cond-mat", "title": "Defect-Engineered Beryllium Dinitride (BeN2) Monolayer with Light-Metal Decoration for Reversible High-Capacity Hydrogen Storage", "abstract": "Hydrogen (H2) possesses the highest gravimetric energy density of any chemical fuel and is the most abundant element in the universe. However, its extremely low volumetric energy density at standard conditions imposes a fundamental materials challenge for safe, efficient, and reversible storage. Here, we report a defect-engineered 2D beryllium dinitride (BeN2) monolayer that enables stable light-metal functionalization for high-capacity H2 storage. A 2 x 2 supercell containing two intrinsic beryllium vacancies accommodates four Li, Na, and K atoms without clustering, exhibiting strong average metal-vacancy binding energies of -3.80, -2.94, and -3.18 eV, respectively. Ab initio molecular dynamics simulations at 400 K confirm the thermal stability of the metal-decorated frameworks and the suppression of metal aggregation. The vacancy-stabilized alkali-metal centers generate localized charge polarization that facilitates the adsorption of up to 20 H2 molecules per supercell, with average adsorption energies of -0.182 eV (Li), -0.191 eV (Na), and -0.171 eV (K), making the adsorption reversible under near-ambient conditions. The corresponding gravimetric H2 storage capacities reach 11.64, 9.82, and 8.49 wt percent, respectively, significantly exceeding the US Department of Energy (DOE) ultimate target of 6.50 wt percent. Moreover, thermodynamic analysis further confirms favorable adsorption-desorption behavior within practical operating windows. These results establish vacancy-defected light-metal decorated BeN2 as a viable design strategy for high-density, reversible H2 storage, providing a scalable framework for engineering polar lightweight materials for energy storage applications.", "url": "https://arxiv.org/abs/2605.03738", "type": "理论+数值", "summary": "氢（H2）拥有所有化学燃料中最高的重量能量密度，并且是宇宙中最丰富的元素。然而，其在标准条件下极低的体积能量密度对安全、高效和可逆存储提出了基本的材料挑战。在这里，我们报告了一种缺陷工程的二维二氮化铍（BeN2）单层，它能够实现稳定的轻金属功能化以实现高容量氢气存储。包含两个本征铍空位的 2 x 2 超级晶胞可容纳四个 Li、Na 和 K 原子而不会聚集，表现出分别为 -3.80、-2.94 和 -3.18 eV 的强平均金属空位结合能。 400 K 下的从头算分子动力学模拟证实了金属装饰框架的热稳定性和金属聚集的抑制。空位稳定的碱金属中心产生局部电荷极化，有利于每个超级电池吸附多达 20 个 H2 分子，平均吸附能为 -0.182 eV (Li)、-0.191 eV (Na) 和 -0.171 eV (K)，使得吸附在接近环境条件下可逆。\n\n相应的重量氢气存储容量分别达到11.64、9.82和8.49 wt%，大大超过美国能源部（DOE）6.50 wt%的最终目标。此外，热力学分析进一步证实了在实际操作窗口内良好的吸附-解吸行为。这些结果确立了空位缺陷轻金属装饰 BeN2 作为高密度、可逆氢气存储的可行设计策略，为能源存储应用的极性轻质材料工程提供了可扩展的框架。", "authors": [{"name": "Wael Othman"}, {"name": "Ibrahim Alghoul"}, {"name": "K-F. Aguey-Zinsou"}, {"name": "Nacir Tit"}, {"name": "Tanveer Hussain"}], "featured_authors": [{"name": "Wael Othman"}, {"name": "Ibrahim Alghoul"}, {"name": "K-F. Aguey-Zinsou"}, {"name": "Nacir Tit"}, {"name": "Tanveer Hussain"}], "author_count": 5}, {"id": "2605.03757", "category": "cond-mat", "title": "Information-Geometric Signatures of Nonconservative Driving", "abstract": "We propose an information-geometric signature of nonconservative driving that detects violations of detailed balance using the Kullback--Leibler divergence and the Fisher information. For Markov jump processes satisfying detailed balance, we show that, near equilibrium, the acceleration of the Kullback--Leibler divergence relative to the equilibrium state is given by twice the Fisher information with respect to time. In contrast, for relaxation toward a nonequilibrium steady state, this relation is generally violated even near the steady state. We refer to the resulting discrepancy as the relaxation gap and derive a lower bound on the steady-state entropy production rate in terms of this gap. We demonstrate that this bound is particularly tight for networks with simple cyclic topologies. Finally, we show that analogous relations and bounds hold for Fokker--Planck dynamics.", "url": "https://arxiv.org/abs/2605.03757", "type": "理论", "summary": "我们提出了非保守驾驶的信息几何签名，该签名使用 Kullback-Leibler 散度和 Fisher 信息来检测详细平衡的违反情况。对于满足详细平衡的马尔可夫跳跃过程，我们表明，在接近平衡时，Kullback--Leibler 散度相对于平衡状态的加速度由相对于时间的费舍尔信息的两倍给出。相反，对于向非平衡稳态的弛豫，即使在稳态附近，这种关系通常也会被违反。我们将由此产生的差异称为松弛间隙，并根据该间隙得出稳态熵产率的下限。我们证明，对于具有简单循环拓扑的网络来说，这个界限特别严格。最后，我们证明了福克-普朗克动力学也存在类似的关系和界限。", "authors": [{"name": "Andrea Auconi"}, {"name": "Sosuke Ito"}], "featured_authors": [{"name": "Andrea Auconi"}, {"name": "Sosuke Ito"}], "author_count": 2}, {"id": "2605.03774", "category": "cond-mat", "title": "First-Order Transitions in Weak Ising Spin-Orbit-Coupled Superconductors", "abstract": "Ising spin-orbit coupling (ISOC) can strongly protect superconductivity against exchange-field-induced depairing, typically leading to critical fields far exceeding the Pauli limit and continuous (second-order) phase transitions. Here, using a free-energy approach, we demonstrate that first-order transitions can emerge in superconductors with weak ISOC under large exchange fields. In this regime, conventional theoretical approaches based on the gap equation fail to determine the thermodynamic critical field and instead yield only the supercooling field. Moreover, we identify two pronounced in-gap coherence peaks in the quasiparticle spectra, which represent the weak-ISOC manifestation of the previously reported mirage-gap states. Our results establish the importance of free-energy analysis in describing the first-order phase transitions in Ising superconductors and reveal distinct spectroscopic signatures of the weak-ISOC regime.", "url": "https://arxiv.org/abs/2605.03774", "type": "理论", "summary": "伊辛自旋轨道耦合 (ISOC) 可以强有力地保护超导免受交换场引起的脱配对，通常导致临界场远远超过泡利极限和连续（二阶）相变。在这里，我们使用自由能方法证明了在大交换场下具有弱 ISOC 的超导体中可以出现一阶跃迁。在这种情况下，基于间隙方程的传统理论方法无法确定热力学临界场，而只能产生过冷场。此外，我们在准粒子光谱中发现了两个明显的带隙内相干峰，它们代表了先前报道的海市蜃楼带隙态的弱 ISOC 表现。我们的结果确立了自由能分析在描述伊辛超导体一级相变中的重要性，并揭示了弱 ISOC 体系的独特光谱特征。", "authors": [{"name": "Xusheng Wang"}, {"name": "Gaomin Tang"}, {"name": "Shuai-hua Ji"}], "featured_authors": [{"name": "Xusheng Wang"}, {"name": "Gaomin Tang"}, {"name": "Shuai-hua Ji"}], "author_count": 3}, {"id": "2605.03826", "category": "cond-mat", "title": "Coherent transport in non-Abelian quantum graphs", "abstract": "We study quantum charge transport in two-dimensional networks in the presence of a magnetic field and spin-orbit interaction. The interplay of the corresponding Abelian and non-Abelian gauge fields leads to an intricate behavior of the conductance, which has different periodicities in the diffusive and ballistic regimes. We classify all configurations of magnetic and spin-orbit fields where a logarithmically divergent weak-(anti)localization correction appears in the diffusive regime. The conductivity of topologically distinct configurations is the same in the diffusive regime but different in the ballistic regime. The proposed setup provides a feasible realization of quantum graphs with non-Abelian gauge fields.", "url": "https://arxiv.org/abs/2605.03826", "type": "理论", "summary": "我们研究存在磁场和自旋轨道相互作用的二维网络中的量子电荷传输。相应的阿贝尔规范场和非阿贝尔规范场的相互作用导致了电导的复杂行为，其在扩散和弹道状态下具有不同的周期性。我们对所有磁场和自旋轨道场的配置进行分类，其中在扩散区域中出现对数发散的弱（反）局域化校正。拓扑不同构型的电导率在扩散区域中是相同的，但在弹道区域中是不同的。所提出的设置提供了具有非阿贝尔规范场的量子图的可行实现。", "authors": [{"name": "A. V. Poshakinskiy"}, {"name": "L. E. Golub"}], "featured_authors": [{"name": "A. V. Poshakinskiy"}, {"name": "L. E. Golub"}], "author_count": 2}, {"id": "2605.03865", "category": "cond-mat", "title": "Plasmons in Holographic Ersatz Fermi Liquids", "abstract": "We solve an infrared effective holographic model of a non-Fermi liquid at finite temperature that satisfies Luttinger's theorem and incorporates long-range Coulomb interactions. Motivated by the absence of a Luttinger-counting Fermi surface in standard Reissner-Nordstrom holographic metals, we consider a Maxwell-Chern-Simons theory in a static anti-de Sitter-Schwarzschild background, coupled to an LU(1) gauge field rather than a conventional U(1) gauge field. By an appropriate choice of boundary conditions, we obtain a damped collective plasmon mode whose plasma frequency scales as predicted by Luttinger's theorem. We further analyze the density-density correlator in the absence of long-range Coulomb interactions and identify a contribution consistent with a Lindhard-like continuum.", "url": "https://arxiv.org/abs/2605.03865", "type": "理论", "summary": "我们求解了有限温度下非费米液体的红外有效全息模型，该模型满足拉廷格定理并包含长程库仑相互作用。由于标准 Reissner-Nordstrom 全息金属中不存在 Luttinger 计数费米面，我们考虑在静态反德西特-史瓦西背景下的麦克斯韦-陈-西蒙斯理论，耦合到 LU(1) 规范场而不是传统的 U(1) 规范场。通过适当选择边界条件，我们获得了阻尼集体等离子体激元模式，其等离子体频率按卢廷格定理预测。我们进一步分析了在没有长程库仑相互作用的情况下的密度-密度相关器，并确定了与类 Lindhard 连续体一致的贡献。", "authors": [{"name": "Eli Ismailov"}, {"name": "Ulf Gran"}, {"name": "Eric Nilsson"}], "featured_authors": [{"name": "Eli Ismailov"}, {"name": "Ulf Gran"}, {"name": "Eric Nilsson"}], "author_count": 3}, {"id": "2605.03891", "category": "cond-mat", "title": "Parameterized Families of Toric Code Phase: $em$-duality family and higher-order anyon pumping", "abstract": "Within the toric-code phase, we study parameterized families of topologically ordered states. We construct $1$- and $2$-parameter families of local Hamiltonians and confirm their non-triviality via topological pumping. For the $1$-parameter family, we show that the $em$-exchange defect is pumped into the bond Hilbert space of a tensor-network representation. For the $2$-parameter case, we construct a ``pump of a pump'' that transports an $S^1$-family of a system in one lower spatial dimension. Using similar methods, we also present a $1$-parameter family with a higher-order anyon pump that produces corner-localized anyon modes. These constructions provide explicit lattice realizations and concrete diagnostics of family-level topology. We use recently developed boundary algebra methods to study the non-triviality of these families.", "url": "https://arxiv.org/abs/2605.03891", "type": "理论+数值", "summary": "在环面代码阶段，我们研究拓扑有序状态的参数化族。我们构建了当地哈密顿量的 $1$ 和 $2$ 参数族，并通过拓扑泵浦证实了它们的非平凡性。对于 $1$ 参数族，我们表明 $em$ 交换缺陷被泵入张量网络表示的键希尔伯特空间中。对于 $2$ 参数的情况，我们构建了一个“泵的泵”，它在一个较低的空间维度上传输 $S^1$ 系统系列。使用类似的方法，我们还提出了一个具有高阶任意子泵的 1 美元参数族，可产生角局域任意子模式。这些结构提供了族级拓扑的显式晶格实现和具体诊断。我们使用最近开发的边界代数方法来研究这些族的非平凡性。", "authors": [{"name": "Shuhei Ohyama"}, {"name": "Takamasa Ando"}, {"name": "Ryan Thorngren"}], "featured_authors": [{"name": "Shuhei Ohyama"}, {"name": "Takamasa Ando"}, {"name": "Ryan Thorngren"}], "author_count": 3}, {"id": "2605.03987", "category": "cond-mat", "title": "Quantum Metric Localization and Quantum Metric Protection", "abstract": "The study of disorder effects in electronic systems is one of the central themes in physics. It is well established that in the Anderson localization regime, the localization length of electrons decreases monotonically as the disorder strength increases. Here, we demonstrate that the conventional Anderson localization paradigm fails completely in describing an isolated band with quantum metric, where the quantum metric of the band defines a length scale called the quantum metric length. For an isolated band with a finite bandwidth separated from other bands by a band gap $\\Delta$, weak disorder results in conventional Anderson localization behavior. However, as the disorder increases, the localization length ceases to decrease and becomes pinned at a value approximately twice the quantum metric length, forming a localization length plateau. We term the regime within this localization length plateau as the quantum metric localization regime. Remarkably, the localization length does not deviate from the plateau until the disorder strength far exceeds $\\Delta$. We refer to this strong protection against disorder, characterized by the quantum metric length, as quantum metric protection. In this work, we first numerically demonstrate quantum metric localization using a 1D Lieb lattice. We then provide a simple physical picture based on the properties of Wannier functions to explain the origin of the localization length plateau. A supersymmetric field theory approach explains why the localization length is approximately twice the quantum metric length and captures the crossover from Anderson localization to quantum metric localization. Our conclusions are broadly applicable to disordered electronic, photonic, and acoustic systems.", "url": "https://arxiv.org/abs/2605.03987", "type": "理论+数值", "summary": "电子系统无序效应的研究是物理学的中心主题之一。众所周知，在安德森局域化机制中，电子的局域长度随着无序强度的增加而单调减少。在这里，我们证明传统的安德森定位范式完全无法用量子度量来描述孤立的带，其中带的量子度量定义了称为量子度量长度的长度尺度。对于具有有限带宽的孤立带，通过带隙 $\\Delta$ 与其他带分开，弱无序会导致传统的安德森定位行为。然而，随着无序度的增加，局域长度停止减少，并固定在大约两倍于量子度量长度的值，形成局域长度平台。我们将该定位长度平台内的状态称为量子度量定位状态。值得注意的是，直到无序强度远远超过 $\\Delta$ 之前，定位长度不会偏离平台。\n\n我们将这种以量子度量长度为特征的针对无序的强大保护称为量子度量保护。在这项工作中，我们首先使用一维利布晶格数值演示量子度量定位。然后，我们根据 Wannier 函数的特性提供一个简单的物理图片来解释本地化长度平台的起源。超对称场论方法解释了为什么局域长度大约是量子度量长度的两倍，并捕获了从安德森局域到量子度量局域的交叉。我们的结论广泛适用于无序电子、光子和声学系统。", "authors": [{"name": "Wen-Bo Dai"}, {"name": "Jinchao Zhao"}, {"name": "Shuai A. Chen"}, {"name": "K.T. Law"}], "featured_authors": [{"name": "Wen-Bo Dai"}, {"name": "Jinchao Zhao"}, {"name": "Shuai A. Chen"}, {"name": "K.T. Law"}], "author_count": 4}, {"id": "2605.03005", "category": "hep-th", "title": "Taxonomy of Instanton Corrections in Infinite Distance Limits", "abstract": "Using the BPS-protected higher derivative $R^4$-term as an exactly solvable example, we analyze which instanton corrections are generated by a one-loop Schwinger integral over the light towers of states that arise in infinite distance limits in moduli space. We find that the Schwinger integral fully captures precisely those instantons whose action lies parametrically in the window $(\\Lambda_{\\rm sp}/M_{\\rm light})^{-1}\\le {\\rm S}_{\\rm inst}\\le \\Lambda_{\\rm sp}/M_{\\rm light}$, that is, instantons whose action is bounded by the ratio of the gravity cutoff and the mass scale of the lightest tower. This proposal is supported by considering the entire moduli space of toroidal compactifications in eight dimensions, together with a number of limits in seven dimensions. In each case, integrating out the light towers via the Schwinger integral reproduces the complete contribution of the instantons within the above window. We further recast the proposal in terms of the taxonomy classification, allowing us to determine the emergent instantonic spectrum associated with any infinite distance limit.", "url": "https://arxiv.org/abs/2605.03005", "type": "理论", "summary": "使用 BPS 保护的高阶导数 $R^4$ 项作为精确可解的示例，我们分析了哪些瞬子校正是由模空间中无限距离限制中出现的状态灯塔上的单环施温格积分生成的。我们发现施温格积分完全准确地捕捉了那些其作用参数化地位于窗口 $(\\Lambda_{\\rm sp}/M_{\\rm light})^{-1}\\le {\\rm S}_{\\rm inst}\\le \\Lambda_{\\rm sp}/M_{\\rm light}$ 中的瞬时子，即其作用受重力截止与最轻塔的质量尺度之比限制的瞬时子。该提议通过考虑八维环形紧致化的整个模空间以及七维中的许多限制来支持。在每种情况下，通过施温格积分对灯塔进行积分可再现上述窗口内瞬时子的完整贡献。我们根据分类学分类进一步重新制定了该提案，使我们能够确定与任何无限距离限制相关的新兴瞬时谱。", "authors": [{"name": "Manuel Artime"}, {"name": "Ralph Blumenhagen"}, {"name": "Panagiotis Leivadaros"}], "featured_authors": [{"name": "Manuel Artime"}, {"name": "Ralph Blumenhagen"}, {"name": "Panagiotis Leivadaros"}], "author_count": 3}, {"id": "2605.03015", "category": "hep-th", "title": "The Fate of Nucleated Black Holes in de Sitter Quantum Gravity", "abstract": "The Euclidean Nariai geometry has long been proposed as the instanton describing the nucleation of maximal-mass black holes in de Sitter space. We place this interpretation on firmer footing by showing that, once an observer is included, the gravitational path integral produces the imaginary phase required for a transition rate. As a warmup, we revisit the Hawking-Moss instanton and, as a byproduct, find that scalar fields can enhance black-hole nucleation, suggesting a quantum-gravity bound on scalar potentials with de Sitter solutions. We then study the subsequent semiclassical evolution of the nucleated black hole. We show that the previously claimed \"anti-evaporation\" channel is unphysical, arising from a quantum state with singular horizons. In a smooth state, the black hole instead undergoes standard thermal Hawking evaporation. We verify explicit agreement with the no-boundary state and argue that this evaporation is not subject to large quantum-gravity corrections. The nucleated black hole thus evaporates completely back to the maximally-entropic empty de Sitter vacuum, making the full process a Boltzmann fluctuation.", "url": "https://arxiv.org/abs/2605.03015", "type": "理论", "summary": "欧几里德纳里艾几何长期以来一直被提出作为描述德西特空间中最大质量黑洞成核的瞬子。我们通过证明一旦包括观察者，引力路径积分就会产生转变率所需的虚相，从而使这种解释具有更坚实的基础。作为热身，我们重新审视霍金-莫斯瞬子，作为副产品，发现标量场可以增强黑洞成核，这表明德西特解在标量势上存在量子引力界。然后我们研究随后的有核黑洞的半经典演化。我们表明，先前声称的“反蒸发”通道是非物理的，是由具有奇异视界的量子态产生的。在平滑状态下，黑洞反而会经历标准的热霍金蒸发。我们验证了与无边界态的明确一致性，并认为这种蒸发不受大的量子引力校正的影响。因此，有核黑洞完全蒸发回到最大熵空德西特真空，使整个过程成为玻尔兹曼涨落。", "authors": [{"name": "Xiaoyi Shi"}, {"name": "Gustavo J. Turiaci"}, {"name": "Chih-Hung Wu"}], "featured_authors": [{"name": "Xiaoyi Shi"}, {"name": "Gustavo J. Turiaci"}, {"name": "Chih-Hung Wu"}], "author_count": 3}, {"id": "2605.03037", "category": "hep-th", "title": "Generalized Free Fields in de Sitter from 1D CFT", "abstract": "We show that a pair of identical large $N$ 1D CFTs, like the low-energy limit of the SYK model or a line-defect inside a higher dimensional CFT, contains a natural sub-algebra of operators that comprise a generalized free field algebra living on a time-like geodesic in d+1-dimensional de Sitter spacetime. The construction uses large $N$ factorization, 1D conformal symmetry, and the split representation of de Sitter Green functions. We show that for 3D de Sitter spacetime, the holographic map extends into the bulk and reduces to the standard HKLL prescription adjusted to de Sitter spacetime. We describe how our construction is automatically implemented in a covariant version of Schwarzian quantum mechanics and comment on the relevance of our results to the de Sitter/DSSYK correspondence.", "url": "https://arxiv.org/abs/2605.03037", "type": "理论", "summary": "我们证明，一对相同的大型 $N$ 1D CFT，如 SYK 模型的低能极限或高维 CFT 内的线缺陷，包含算子的自然子代数，该算子包括生活在 d+1 维德西特时空中类时间测地线上的广义自由场代数。该构造使用大型 $N$ 分解、一维共角对称和 de Sitter Green 函数的分割表示。我们表明，对于 3D 德西特时空，全息图延伸到整体并减少到调整为德西特时空的标准 HKLL 处方。我们描述了如何在 Schwarzian 量子力学的协变版本中自动实现我们的构造，并评论我们的结果与 de Sitter/DSSYK 对应关系的相关性。", "authors": [{"name": "Kanato Goto"}, {"name": "Alexey Milekhin"}, {"name": "Herman Verlinde"}, {"name": "Jiuci Xu"}], "featured_authors": [{"name": "Kanato Goto"}, {"name": "Alexey Milekhin"}, {"name": "Herman Verlinde"}, {"name": "Jiuci Xu"}], "author_count": 4}, {"id": "2605.03038", "category": "hep-th", "title": "Squeezed-state radiation in shockwave scattering: QCD-Gravity double copy", "abstract": "Gluon and graviton radiation in strong field shockwave scattering are described by effective Lipatov vertices, with the graviton Lipatov vertex proportional to the bilinear of its QCD counterpart. We show here that the n-particle gluon radiation spectrum can be described as a generalized Susskind-Glogower (gSG) squeezed coherent state and discuss the properties of such squeezed states. The double copy structure of the radiative frameworks suggests that multi-graviton radiation can be similarly described as a gSG state. We examine the physical parameter space and show that very large squeezing parameters $\\sim \\ln({\\bar n})$ (where ${\\bar n}$ is the mean graviton occupancy) are feasible for nearly minimal uncertainty configurations of the gSG state. Quantum noise in the corresponding gravitational wave spectrum is enhanced above the sensitivity of current and future gravitational wave detectors. Our results point to the importance of a comprehensive study of the strong field Lipatov regime of gravitational radiation.", "url": "https://arxiv.org/abs/2605.03038", "type": "理论", "summary": "强场冲击波散射中的胶子和引力子辐射由有效 Lipatov 顶点描述，引力子 Lipatov 顶点与其 QCD 对应物的双线性成比例。我们在这里表明，n 粒子胶子辐射谱可以描述为广义 Susskind-Glogower (gSG) 压缩相干态，并讨论了这种压缩态的性质。辐射框架的双拷贝结构表明多引力子辐射可以类似地描述为 gSG 态。我们检查了物理参数空间，并表明非常大的压缩参数 $\\sim \\ln({\\bar n})$ （其中 ${\\bar n}$ 是平均引力子占有率）对于 gSG 状态的几乎最小不确定性配置是可行的。相应引力波谱中的量子噪声增强到超过当前和未来引力波探测器的灵敏度。我们的结果指出了对引力辐射强场李帕托夫体系进行全面研究的重要性。", "authors": [{"name": "Anna M. Staśto"}, {"name": "Himanshu Raj"}, {"name": "Raju Venugopalan"}], "featured_authors": [{"name": "Anna M. Staśto"}, {"name": "Himanshu Raj"}, {"name": "Raju Venugopalan"}], "author_count": 3}, {"id": "2605.03051", "category": "hep-th", "title": "Pseudo-Evanescent Feynman Integrals from Local Subtraction", "abstract": "We introduce a new approach for the computation of the class of Feynman integrals whose integrands vanish in strictly four-dimensions, so-called ''pseudo-evanescent'' integrals. We argue that, up to $\\mathcal{O}(\\epsilon)$ corrections, local subtraction techniques can be used to express pseudo-evanescent integrals in terms of contributions from infrared and ultraviolet regions of loop-momentum space. We study two-loop examples and find that many pseudo-evanescent Feynman integrals are reduced to either products of one-loop integrals or one-fold integrals thereof. As a demonstration of the power of our approach, we use it to recompute the two-loop all-plus five-point amplitude. We find that, up to scheme-dependent logarithms, all contributions from soft and collinear regions cancel exactly against known infrared structure and that the finite remainder is entirely given by contributions from ultraviolet regions.", "url": "https://arxiv.org/abs/2605.03051", "type": "理论", "summary": "我们引入了一种计算费曼积分类的新方法，其被积函数在严格的四维中消失，即所谓的“伪渐逝”积分。我们认为，在 $\\mathcal{O}(\\epsilon)$ 校正范围内，局部减法技术可用于根据环动量空间的红外和紫外区域的贡献来表达伪倏逝积分。我们研究了双环示例，发现许多伪渐逝费曼积分被简化为单环积分或其一重积分的乘积。为了证明我们的方法的强大功能，我们使用它来重新计算两环全加五点幅度。我们发现，直到依赖于方案的对数，来自软区域和共线区域的所有贡献与已知的红外结构完全抵消，并且有限余数完全由来自紫外区域的贡献给出。", "authors": [{"name": "Alessandro Georgoudis"}, {"name": "Ben Page"}], "featured_authors": [{"name": "Alessandro Georgoudis"}, {"name": "Ben Page"}], "author_count": 2}, {"id": "2605.03119", "category": "hep-th", "title": "From Quivers to Geometry: 5d Conformal Matter", "abstract": "We show that all 5d balanced (ADE-shaped) special unitary quivers with no Chern-Simons level admit a UV completion which is a 5d conformal matter SCFT. We give explicit local Calabi-Yau threefolds realizing each of these models in M-theory. This unified description enables a systematic exploration of their physical properties, such as their Higgs Branch, as well as connections to class-S constructions and the affine Grassmannian.", "url": "https://arxiv.org/abs/2605.03119", "type": "理论", "summary": "我们证明，所有没有 Chern-Simons 能级的 5d 平衡（ADE 形）特殊单一箭袋都承认 UV 完成，这是 5d 共形物质 SCFT。我们给出了明确的局部 Calabi-Yau 三重，以实现 M 理论中的每个模型。这种统一的描述使得能够系统地探索它们的物理特性，例如它们的希格斯分支，以及与 S 类结构和仿射格拉斯曼结构的联系。", "authors": [{"name": "Antoine Bourget"}, {"name": "Mario De Marco"}, {"name": "Michele Del Zotto"}, {"name": "Julius F. Grimminger"}, {"name": "Andrea Sangiovanni"}], "featured_authors": [{"name": "Antoine Bourget"}, {"name": "Mario De Marco"}, {"name": "Michele Del Zotto"}, {"name": "Julius F. Grimminger"}, {"name": "Andrea Sangiovanni"}], "author_count": 5}, {"id": "2605.03155", "category": "hep-th", "title": "Flat Space Physics from AdS Actions", "abstract": "Flat spacetimes are foliated by hyperbolic slices that are geometrically three-dimensional de Sitter or anti-de Sitter spaces. As such, it is possible to construct flat space holographic dualities by applying the AdS/CFT bulk-to-boundary dictionary slice by slice. In this work, we reduce 4D actions for massless scalars in both Minkowski space and Klein space and massive scalars in Minkowski space to actions on these 3D dS and AdS slices. In both Minkowski and Klein space, the reduced theories have a continuous spectrum of fields originating from the reduction over the noncompact $x^2$ direction. These actions are linked by boundary terms arising from field configurations discontinuous across the lightcone. In the massless case, different asymptotic limits of the reduced field near the boundary of the unit hyperbolic slice replicate either light cone or null infinity limits of the field; in the massive case, only one boundary mode of the reduced field has a simple geometric interpretation.", "url": "https://arxiv.org/abs/2605.03155", "type": "理论", "summary": "平坦时空由双曲切片组成，双曲切片在几何上是三维德西特空间或反德西特空间。因此，可以通过逐片应用 AdS/CFT 块体到边界字典来构造平坦空间全息对偶性。在这项工作中，我们将 Minkowski 空间和 Klein 空间中的无质量标量以及 Minkowski 空间中的大量标量的 4D 动作减少为这些 3D dS 和 AdS 切片上的动作。在闵可夫斯基和克莱因空间中，简化理论具有源自非紧 $x^2$ 方向上的简化的连续场谱。这些动作通过光锥上不连续的场配置产生的边界项联系起来。在无质量的情况下，单位双曲线切片边界附近简化场的不同渐近极限复制光锥或场的零无穷大极限；在大规模情况下，只有一种简化场的边界模式具有简单的几何解释。", "authors": [{"name": "Walker Melton"}], "featured_authors": [{"name": "Walker Melton"}], "author_count": 1}, {"id": "2605.03250", "category": "hep-th", "title": "Modular flow of Celestial Conformal Field Theory", "abstract": "We present the vector flow and modular flows in celestial field theory and Klein CFTs, and discuss their structure in Lifshitz and other exotic field theories.", "url": "https://arxiv.org/abs/2605.03250", "type": "理论", "summary": "我们提出了天体场论和克莱因 CFT 中的矢量流和模流，并讨论了它们在 Lifshitz 和其他奇异场论中的结构。", "authors": [{"name": "Mahdis Ghodrati"}], "featured_authors": [{"name": "Mahdis Ghodrati"}], "author_count": 1}, {"id": "2605.03277", "category": "hep-th", "title": "Quasinormal modes and continuum response of de Sitter black holes via complex scaling method", "abstract": "We apply the complex scaling method to black-hole perturbations in four-dimensional Schwarzschild--de~Sitter (dS) spacetimes. The method converts the outgoing-wave boundary-value problem into a non-Hermitian spectral problem and enables quasinormal-mode poles and the rotated continuum to be treated in a common framework. We focus in particular on the continuum level density, which characterizes the continuum response beyond isolated quasinormal-mode frequencies. Using Regge--Wheeler-type perturbation equations for scalar, electromagnetic, and gravitational fields, we investigate how a nonzero cosmological constant modifies the pole and continuum sectors. We also discuss a possible extension to string-inspired coupled-channel systems, and illustrate that higher-dimensional dS black holes can be treated within the same framework, at least in tensor- and vector-type sectors. Our results indicate that complex scaling offers a useful spectral framework for analyzing both quasinormal modes and continuum response in black-hole physics.", "url": "https://arxiv.org/abs/2605.03277", "type": "理论", "summary": "我们将复标度方法应用于四维史瓦西-德西特 (dS) 时空中的黑洞扰动。该方法将出射波边值问题转换为非厄米谱问题，并使准正规模极点和旋转连续体能够在通用框架中处理。我们特别关注连续谱能级密度，它表征了超出孤立准简正模频率的连续谱响应。使用标量场、电磁场和引力场的 Regge--Wheeler 型微扰方程，我们研究了非零宇宙常数如何修改极点和连续介质扇区。我们还讨论了弦启发耦合通道系统的可能扩展，并说明可以在同一框架内处理高维 dS 黑洞，至少在张量和矢量类型扇区中。我们的结果表明，复杂的标度为分析黑洞物理中的准正规模式和连续谱响应提供了有用的光谱框架。", "authors": [{"name": "Shoya Ogawa"}, {"name": "Okuto Morikawa"}, {"name": "Takuya Hirose"}], "featured_authors": [{"name": "Shoya Ogawa"}, {"name": "Okuto Morikawa"}, {"name": "Takuya Hirose"}], "author_count": 3}, {"id": "2605.03341", "category": "hep-th", "title": "Stable Magnetic Lorentz-Violating Vacua in Gauge-Invariant Nonlinear Electrodynamics", "abstract": "We investigate gauge-invariant nonlinear electrodynamics in the Plebański first-order Hamiltonian formulation, taking the single-invariant potential $\\hat V(P)$ as the primary object. Our focus is on the existence of stable Lorentz-violating magnetic vacua. For three explicit two-parameter models -- rational asymmetric, logarithmic, and exponential -- we determine the regions of parameter space in which nontrivial constant electromagnetic vacua are compatible with an effective Hamiltonian bounded from below and a positive-semidefinite Hessian. In all three cases, physically admissible Lorentz-violating vacua are realized in the magnetic branch. We further discuss the electric branch and several additional one-parameter models, illustrating that Hamiltonian boundedness by itself does not ensure spontaneous Lorentz symmetry breaking. We also comment on how the symmetry-breaking conditions are related to known strong-field causality criteria.", "url": "https://arxiv.org/abs/2605.03341", "type": "理论", "summary": "我们以单不变势 $\\hat V(P)$ 作为主要对象，研究 Plebański 一阶哈密顿公式中的规范不变非线性电动力学。我们的重点是稳定的洛伦兹破坏磁真空的存在。对于三个显式双参数模型（有理非对称模型、对数模型和指数模型），我们确定参数空间的区域，其中非平凡常数电磁真空与下界有效哈密顿量和正半定赫斯矩阵兼容。在所有三种情况下，物理上允许的洛伦兹破坏真空都在磁分支中实现。我们进一步讨论电分支和几个附加的单参数模型，说明哈密顿有界性本身并不能确保自发洛伦兹对称性破缺。我们还评论了对称性破缺条件如何与已知的强场因果关系标准相关。", "authors": [{"name": "E. Plácido-Flores"}, {"name": "Román Linares"}, {"name": "V. López"}, {"name": "C. A. Escobar"}], "featured_authors": [{"name": "E. Plácido-Flores"}, {"name": "Román Linares"}, {"name": "V. López"}, {"name": "C. A. Escobar"}], "author_count": 4}, {"id": "2605.03525", "category": "hep-th", "title": "The weak gravity conjecture in perturbative strings", "abstract": "In this note we give a summary of [ arXiv:2401.14449 ] in which we proposed a proof of the weak gravity conjecture in perturbative string theory. While the WGC is well established, checked in many examples, and many of the ingredients we use have previously appeared in the literature, a comprehensive proof from the top-down was still missing. The present work focuses on the bosonic string as a proof of concept, while the generalization to superstring cases is to appear in a forthcoming paper. This note is based heavily on [ arXiv:2401.14449 ] and on a talk given at the Corfu2025 Workshop on Quantum Gravity and Strings.", "url": "https://arxiv.org/abs/2605.03525", "type": "理论", "summary": "在这篇笔记中，我们给出了 [ arXiv:2401.14449 ] 的总结，其中我们提出了微扰弦理论中弱引力猜想的证明。虽然 WGC 已经很成熟，检查了很多例子，而且我们使用的许多成分之前已经出现在文献中，但仍然缺乏自上而下的全面证明。目前的工作重点是玻色弦作为概念证明，而对超弦情况的推广将出现在即将发表的论文中。本说明主要基于 [ arXiv:2401.14449 ] 以及 Corfu2025 量子引力和弦研讨会上的演讲。", "authors": [{"name": "Matteo Lotito"}], "featured_authors": [{"name": "Matteo Lotito"}], "author_count": 1}, {"id": "2605.03611", "category": "hep-th", "title": "On the Algebraic Origin of Four-Dimensional Space-time in the IIB Matrix Model: Dimensional Selection via Rigid Supersymmetry", "abstract": "This paper presents a novel analytical derivation of four-dimensional (4D) space-time within the framework of the IIB matrix model (IKKT model). We address the long-standing question of why our universe exhibits a (3+1)-dimensional structure from a non-perturbative perspective. By investigating the consistency between quantum-induced radial corrections in the all-loop effective action and the geometric requirement of a rigid supersymmetric algebra, we identify a fundamental consistency filter. In the original ten-dimensional formulation, the rigid superalgebra imposes a massive tensor obstruction consisting of 120 independent algebraic degrees of freedom, which forbids any scale-dependent quantum evolution. We demonstrate that this obstruction vanishes uniquely in four dimensions due to the algebraic degeneracy of the Clifford algebra and Hodge duality, a mechanism we define as ``algebraic locking.'' Our results suggest that 4D space-time is not a dynamical accident but a mathematical necessity for a consistent supersymmetric quantum vacuum.", "url": "https://arxiv.org/abs/2605.03611", "type": "理论", "summary": "本文提出了 IIB 矩阵模型（IKKT 模型）框架内四维 (4D) 时空的新颖分析推导。我们从非微扰的角度解决了一个长期存在的问题：为什么我们的宇宙呈现出 (3+1) 维结构。通过研究全环有效作用中量子诱导径向校正与刚性超对称代数的几何要求之间的一致性，我们确定了一个基本的一致性滤波器。在最初的十维公式中，刚性超代数施加了由 120 个独立代数自由度组成的巨大张量障碍，这禁止任何依赖于尺度的量子演化。我们证明，由于克利福德代数和霍奇对偶性的代数简并性，我们将这种机制定义为“代数锁定”，这种阻碍在四个维度中唯一消失。我们的结果表明，4D时空不是动力学偶然，而是一致的超对称量子真空的数学必然性。", "authors": [{"name": "Tetsuyuki Muramatsu"}], "featured_authors": [{"name": "Tetsuyuki Muramatsu"}], "author_count": 1}, {"id": "2605.03643", "category": "hep-th", "title": "Algebraic constructions of code lattices in Narain conformal field theories", "abstract": "We give new results on the structure and representations of the three lattices $\\mathbf{\\Lambda }_{\\mathrm{k}},\\mathbf{\\Lambda }_{\\mathrm{k}\\mathcal{C}},\\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ relevant to code CFTs realizing Narain conformal field theories. In this construction, $\\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ denotes the dual of the even lattice $\\mathbf{\\Lambda }_{\\mathrm{k}}$ and $\\mathbf{\\Lambda }_{\\mathrm{k}\\mathcal{C}}$ is an even self-dual intermediate lattice with a (d,d) signature. We study the inclusion relations $\\mathbf{\\Lambda }_{\\mathrm{k}}\\subset \\mathbf{\\Lambda } _{\\mathrm{k}\\mathcal{C}}\\subset \\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ characterized by the discriminant group $\\mathbf{\\Lambda } _{\\mathrm{k}}^{\\ast }/\\mathbf{\\Lambda }_{\\mathrm{k}}$ isomorphic to $\\mathbb{Z}_{\\mathrm{k}}$ and provide explicit constructions of these $\\mathbb{R}^{(\\mathrm{r}d,\\mathrm{r}d)}$ lattices first for rank $\\mathrm{r}=d=1$ and then for higher dimensional Lie algebras with $\\mathrm{r}=d>1$. Additional structural features and generalisations are also discussed.", "url": "https://arxiv.org/abs/2605.03643", "type": "理论", "summary": "我们给出了与实现 Narain 共形场论的代码 CFT 相关的三个格 $\\mathbf{\\Lambda }_{\\mathrm{k}}、\\mathbf{\\Lambda }_{\\mathrm{k}\\mathcal{C}}、\\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ 的结构和表示的新结果。在此构造中， $\\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ 表示偶格 $\\mathbf{\\Lambda }_{\\mathrm{k}}$ 的对偶，而 $\\mathbf{\\Lambda }_{\\mathrm{k}\\mathcal{C}}$ 是具有 (d,d) 签名的偶自对偶中间格。我们研究由判别组 $\\mathbf{\\Lambda } 表征的包含关系 $\\mathbf{\\Lambda }_{\\mathrm{k}}\\subset \\mathbf{\\Lambda } _{\\mathrm{k}\\mathcal{C}}\\subset \\mathbf{\\Lambda }_{\\mathrm{k}}^{\\ast }$ _{\\mathrm{k}}^{\\ast }/\\mathbf{\\Lambda }_{\\mathrm{k}}$ 同构于 $\\mathbb{Z}_{\\mathrm{k}}$ 并首先提供这些 $\\mathbb{R}^{(\\mathrm{r}d,\\mathrm{r}d)}$ 晶格的显式构造$\\mathrm{r}=d=1$，然后对于高维李代数 $\\mathrm{r}=d>1$。还讨论了其他结构特征和概括。", "authors": [{"name": "E.H Saidi"}, {"name": "R. Sammani"}], "featured_authors": [{"name": "E.H Saidi"}, {"name": "R. Sammani"}], "author_count": 2}, {"id": "2605.03649", "category": "hep-th", "title": "Virasoro flow, monodromy, and indecomposable structures in critical AdS$_3$ topologically massive gravi
