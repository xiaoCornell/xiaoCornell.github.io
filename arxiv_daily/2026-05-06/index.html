ty", "abstract": "We develop a representation-theoretic framework for the relation between asymptotic symmetry evolution and monodromy in critical topologically massive gravity at the chiral point $\\mu \\ell=1$. We show that continuous evolution generated by the Virasoro zero mode $L_0$ and analytic continuation around branch points can be unified as different regimes of a single complex one-parameter flow. At the chiral point, $L_0$ becomes non-diagonalizable and takes the form $L_0=h \\mathbf{1}+N$, with $N$ nilpotent. We demonstrate that this nilpotent component governs identical mixing structures in both real and imaginary flow parameters, producing linear mixing under continuous evolution and logarithmic mixing under monodromy. In this sense, the logarithmic sector is characterized by a single indecomposable structure in state space probed uniformly by both transformations. Logarithmic modes arise naturally as generalized eigenstates of $L_0$, and the sector decomposition admits an algebraic interpretation in terms of invariant and generalized invariant subspaces. This provides a unified description of logarithmic structures in critical topologically massive gravity and clarifies their role in the representation theory of asymptotic symmetries.", "url": "https://arxiv.org/abs/2605.03649", "type": "理论", "summary": "我们为手性点 $\\mu \\ell=1$ 处临界拓扑质量引力中渐近对称演化与单向性之间的关系开发了一个表示理论框架。我们证明，由 Virasoro 零模式 $L_0$ 生成的连续演化和围绕分支点的解析连续可以统一为单个复杂单参数流的不同状态。在手性点，$L_0$ 变得不可对角化，并采用 $L_0=h \\mathbf{1}+N$ 的形式，其中 $N$ 幂零。我们证明了这种幂零分量在实部和虚部流动参数中控制相同的混合结构，在连续演化下产生线性混合，在单向性下产生对数混合。从这个意义上说，对数扇区的特征是状态空间中的单个不可分解结构由两个变换统一探测。对数模式自然地作为 $L_0$ 的广义本征态出现，并且扇区分解允许根据不变子空间和广义不变子空间进行代数解释。\n\n这提供了临界拓扑质量引力中对数结构的统一描述，并阐明了它们在渐近对称表示论中的作用。", "authors": [{"name": "Yannick Mvondo-She"}], "featured_authors": [{"name": "Yannick Mvondo-She"}], "author_count": 1}, {"id": "2605.03887", "category": "hep-th", "title": "Classical correlation functions at strong coupling from hexagonalization", "abstract": "We study correlation functions of half-BPS operators in planar $\\mathcal{N}=4$ Super-Yang-Mills at strong coupling, in the classical limit where operator dimensions scale with the coupling. We focus on the two-dimensional kinematics corresponding in the dual description to strings propagating in $AdS_{3}\\times S^{3}$. Using the hexagon formalism, we show that correlation functions exponentiate in this regime and are governed by the free energy of an associated set of Thermodynamic Bethe Ansatz (TBA) equations. These equations are structurally equivalent to the Gaiotto--Moore--Neitzke equations encoding BPS spectra in $\\mathcal{N}=2$ supersymmetric field theories. Exploiting this correspondence, we apply wall-crossing techniques to extend the TBA framework and formulate a $\\chi$-system applicable both to polygonal hexagon tilings and to closed geometries describing correlators of single-trace operators. In particular, for four-point functions, this construction generalizes the results of Caetano and Toledo for minimal surfaces in $AdS_{2}\\times S^{1}$.", "url": "https://arxiv.org/abs/2605.03887", "type": "理论", "summary": "我们研究强耦合下平面 $\\mathcal{N}=4$ Super-Yang-Mills 中半 BPS 算子的相关函数，在算子维度随耦合缩放的经典极限下。我们关注在对偶描述中对应于 $AdS_{3}\\times S^{3}$ 中传播的字符串的二维运动学。使用六边形形式，我们表明相关函数在此状态下呈指数分布，并受一组相关热力学 Bethe Ansatz (TBA) 方程的自由能控制。这些方程在结构上等价于 $\\mathcal{N}=2$ 超对称场论中编码 BPS 谱的 Gaiotto--Moore--Neitzke 方程。利用这种对应关系，我们应用穿墙技术来扩展 TBA 框架，并制定一个既适用于多边形六边形平铺又适用于描述单迹算子相关器的闭合几何的 $\\chi$ 系统。特别是，对于四点函数，此构造概括了 Caetano 和 Toledo 对于 $AdS_{2}\\times S^{1}$ 中最小曲面的结果。", "authors": [{"name": "Benjamin Basso"}, {"name": "Erkan Kaluç"}, {"name": "Didina Serban"}], "featured_authors": [{"name": "Benjamin Basso"}, {"name": "Erkan Kaluç"}, {"name": "Didina Serban"}], "author_count": 3}, {"id": "2605.03963", "category": "hep-th", "title": "Constraining F-theory Model Building with QCD Axions", "abstract": "In this paper, we investigate axion physics in 4D F-theory MSSM models. We derive the axion coupling term with QCD gauge fields and the axion potential from a top-down perspective, from both IIB superstring and the dual M-theory picture. For the explicit geometric model, we employ the \"quadrillion\" landscape of 4D F-theory models with the exact Standard Model chiral spectrum, and study simple base threefolds such as $\\mathbb{P}^3$, $\\mathbb{P}^1\\times\\mathbb{P}^2$, the generalized Hirzebruch threefold $\\tilde{\\mathbb{F}}_3$ and $\\mathbb{P}^1\\times\\mathbb{P}^1\\times\\mathbb{P}^1$. We derive exclusion constraints on the Kähler moduli space of the base threefold from the CP violation angle, the Standard Model gauge coupling constants and the stretched Kähler cone condition. We find stringent constraints on the set of base divisors that should be rigid or rigidified by the inclusion of flux. For the allowed regions of the parameter space, we estimate the typical mass of detectable QCD axions to be around $10^{-9}$eV, and the axion decay constant to be around $f_a\\sim 10^{15}$GeV.", "url": "https://arxiv.org/abs/2605.03963", "type": "理论", "summary": "在本文中，我们研究了 4D F 理论 MSSM 模型中的轴子物理。我们从 IIB 超弦和对偶 M 理论图景中，从自上而下的角度推导了具有 QCD 规范场的轴子耦合项和轴子势。对于显式几何模型，我们采用具有精确标准模型手性谱的 4D F 理论模型的“四万亿”景观，并研究简单的基三重，例如 $\\mathbb{P}^3$、$\\mathbb{P}^1\\times\\mathbb{P}^2$、广义 Hirzebruch 三重 $\\tilde{\\mathbb{F}}_3$ 和$\\mathbb{P}^1\\times\\mathbb{P}^1\\times\\mathbb{P}^1$。我们从 CP 破坏角、标准模型规范耦合常数和拉伸的凯勒锥体条件推导出三重基部凯勒模空间的排除约束。我们发现对基除数集的严格约束应该是刚性的或通过包含通量而刚性化。对于参数空间允许的区域，我们估计可检测 QCD 轴子的典型质量约为 $10^{-9}$eV，轴子衰减常数约为 $f_a\\sim 10^{15}$GeV。", "authors": [{"name": "Keren Chen"}, {"name": "Qinjian Lou"}, {"name": "Yi-Nan Wang"}], "featured_authors": [{"name": "Keren Chen"}, {"name": "Qinjian Lou"}, {"name": "Yi-Nan Wang"}], "author_count": 3}, {"id": "2605.04016", "category": "hep-th", "title": "Entangling gates for the SU(N) anyons", "abstract": "The model of a topological quantum computer is a promising one due to its natural resistance to noise and other errors. Operations in such a computer are implemented by braiding the trajectories of anyons. While it is easy to understand how to build one-qubit operations, two-qubit operations are more difficult. In arXiv:2412.20931 we suggested an approach to build such operations for a topological quantum computer based on SU(2) Chern-Simons theory with arbitrary level using cabling of knots. In this paper we discuss how this approach should be generalized to the SU(N) case, what the differences are, and which new problems arise.", "url": "https://arxiv.org/abs/2605.04016", "type": "理论", "summary": "拓扑量子计算机模型由于其对噪声和其他错误的天然抵抗力而成为一种很有前途的模型。这种计算机中的操作是通过编织任意子的轨迹来实现的。虽然如何构建一量子位运算很容易理解，但两量子位运算则比较困难。在 arXiv:2412.20931 中，我们提出了一种基于 SU(2) Chern-Simons 理论使用结的任意级别为拓扑量子计算机构建此类操作的方法。在本文中，我们讨论如何将这种方法推广到 SU(N) 情况、差异是什么以及出现哪些新问题。", "authors": [{"name": "Sergey Mironov"}, {"name": "Andrey Morozov"}], "featured_authors": [{"name": "Sergey Mironov"}, {"name": "Andrey Morozov"}], "author_count": 2}, {"id": "2605.04020", "category": "hep-th", "title": "Late-Time Relaxation from Landau Singularities", "abstract": "Nonlinear hydrodynamic interactions can change the relaxation of fluctuations from exponential to power-law decay at late times. Schwinger-Keldysh effective field theory provides a standard framework for describing such fluctuation effects, where the nonlinear late-time behavior is encoded in loop corrections. Extracting this behavior requires identifying the singularities of loop integrals, whose structure becomes increasingly intricate beyond simple models. We apply Landau singularity analysis to two-point functions in effective field theories and determine the singularities induced by nonlinear interactions without performing the loop integrations explicitly. From these frequency-space singularities, we extract nonlinear relaxation modes that control the late-time behavior. When gapless modes are present, these modes produce power-law decay at late times. Our results give a systematic singularity-based description of nonlinear late-time relaxation in a broad class of macroscopic effective theories.", "url": "https://arxiv.org/abs/2605.04020", "type": "理论", "summary": "非线性流体动力学相互作用可以将波动的弛豫从指数衰减改变为幂律衰减。施温格-凯尔迪什有效场理论为描述这种波动效应提供了一个标准框架，其中非线性后期行为被编码在环路校正中。提取这种行为需要识别循环积分的奇点，其结构变得越来越复杂，超出了简单的模型。我们将朗道奇点分析应用于有效场论中的两点函数，并确定非线性相互作用引起的奇点，而无需显式执行循环积分。从这些频率空间奇点中，我们提取了控制后期行为的非线性松弛模式。当存在无间隙模式时，这些模式会在后期产生幂律衰减。我们的结果在广泛的宏观有效理论中给出了基于奇点的非线性后期弛豫的系统描述。", "authors": [{"name": "Dong-Lin Wang"}, {"name": "Shi Pu"}], "featured_authors": [{"name": "Dong-Lin Wang"}, {"name": "Shi Pu"}], "author_count": 2}, {"id": "2605.04032", "category": "hep-th", "title": "Holographic Derivation of BPZ-Type Null State Equations in Higher Dimensional CFTs", "abstract": "A set of linear differential equations was recently put forward as higher-dimensional generalizations of the BPZ null-state equations in two-dimensional CFTs at large central charge. In this work, we derive these higher-dimensional equations from gravity, based on the AdS/CFT correspondence. A near-boundary expansion is employed to analyze a light scalar field equation in a black hole background. There is a decoupling mechanism in the bulk perturbative series at certain conformal dimensions, resulting in isolated lower-order equations. We find that the results agree with the previously proposed four-dimensional CFT equations, which capture the resummed contributions from minimal-twist multi-stress tensor operators. The holographic calculation also allows one to obtain additional CFT differential equations that extend beyond the near-lightcone regime.", "url": "https://arxiv.org/abs/2605.04032", "type": "理论", "summary": "最近提出了一组线性微分方程，作为大中心电荷二维 CFT 中 BPZ 零状态方程的高维推广。在这项工作中，我们根据 AdS/CFT 对应关系从重力推导出这些高维方程。采用近边界展开来分析黑洞背景中的光标量场方程。在某些共形维度上，体微扰级数存在解耦机制，从而产生孤立的低阶方程。我们发现结果与之前提出的四维 CFT 方程一致，该方程捕获了最小扭转多应力张量算子的恢复贡献。全息计算还允许获得超出近光锥区域的附加 CFT 微分方程。", "authors": [{"name": "Kuo-Wei Huang"}], "featured_authors": [{"name": "Kuo-Wei Huang"}], "author_count": 1}, {"id": "2605.04041", "category": "hep-th", "title": "Jordan Frame in Supergravity and Cosmology", "abstract": "The superconformal action can be gauge-fixed in a gauge where is leads to the Einstein frame supergravity defined by a \\K potential $\\mathcal{K}(z, \\bar z)$, or in a gauge where it leads to a Jordan frame supergravity defined by the frame function $\\Omega(z, \\bar z)$, in addition to $\\mathcal{K}(z, \\bar z)$. We present {\\it new supergravity $\\xi$-attractor models with non-minimal coupling to gravity}, which offer some advantages over the previously known $\\xi$-attractors. New attractors include exponential and polynomial $\\xi$-attractors and have some features similar to those of the Palatini attractors. However, we show that the Palatini gravity with nonminimal scalar coupling and an independent affine connection has no supergravity embedding.", "url": "https://arxiv.org/abs/2605.04041", "type": "理论", "summary": "超共形作用可以在规范中进行规范固定，其中它导致由 \\K 势 $\\mathcal{K}(z, \\bar z)$ 定义的爱因斯坦框架超重力，或者在规范中，除了 $\\mathcal{K}(z, \\bar z)$ 之外，它导致由框架函数 $\\Omega(z, \\bar z)$ 定义的乔丹框架超重力。我们提出了{\\它具有与重力非最小耦合的新超重力 $\\xi$-吸引子模型}，它比之前已知的 $\\xi$-吸引子具有一些优势。新吸引子包括指数和多项式 $\\xi$-吸引子，并且具有一些与 Palatini 吸引子类似的特征。然而，我们证明具有非最小标量耦合和独立仿射连接的帕拉蒂尼引力没有超引力嵌入。", "authors": [{"name": "Renata Kallosh"}], "featured_authors": [{"name": "Renata Kallosh"}], "author_count": 1}, {"id": "2605.03960", "category": "math-ph", "title": "Two Regularized Determinants of Laplacian through Resurgence theory", "abstract": "We study two types of regularizations of the determinant of Laplacian on Riemann manifold from the viewpoint of resurgence theory. One is the formal logarithmic derivative of the determinant, and the other is its exponential deformation. Under appropriate conditions, the close formulas for both regularized determinant are established through Borel-Laplace resummation which takes into account the contribution of the singularities along the analytic continuation of Theta series $\\hat{\\Theta}_{D_X}$. The series resembles the trace of the heat kernel, but is defined via the spectrum of the square-root of the Laplacian. As applications, we revisit the well known formal logarithmic derivative of determinant on $S^1$ and compact Riemann surface with higher genus ($\\geq2$) corresponding to the Poisson summation formula and Selberg trace formula respectively. Furthermore, the 1-Gevrey asymptotic behavior of the exponential deformation regularization at infinity is considered whose coefficients are determined by the trace of the heat kernel. In the end, we establish the relationship between the two regularized determinants. In fact, they have the same derivatives when the deformation parameter tends to $0$ in exponentially deformed regularization.", "url": "https://arxiv.org/abs/2605.03960", "type": "理论", "summary": "我们从复兴理论的角度研究了黎曼流形上拉普拉斯行列式的两类正则化。一是行列式的形式对数导数，二是其指数变形。在适当的条件下，通过 Borel-Laplace 恢复建立了两个正则化行列式的闭合公式，该恢复考虑了 Theta 级数 $\\hat{\\Theta}_{D_X}$ 解析延拓上奇点的贡献。该级数类似于热核的迹线，但通过拉普拉斯算子的平方根的频谱来定义。作为应用，我们重新审视了著名的行列式在 $S^1$ 上的形式对数导数和分别对应于泊松求和公式和 Selberg 迹公式的高隶属紧致黎曼曲面 ($\\geq2$)。此外，还考虑了无穷远指数变形正则化的1-Gevrey渐近行为，其系数由热核的迹确定。最后，我们建立了两个正则化行列式之间的关系。\n\n事实上，在指数变形正则化中，当变形参数趋于$0$时，它们具有相同的导数。", "authors": [{"name": "Wen Shen"}, {"name": "Shanzhong Sun"}], "featured_authors": [{"name": "Wen Shen"}, {"name": "Shanzhong Sun"}], "author_count": 2}, {"id": "2605.04027", "category": "math-ph", "title": "Pade Approximants for Geodesy", "abstract": "In this note we analyze the use of Padé approximants for downward continuation beyond the radius of convergence of spherical harmonic expansions (SHEs), and for identifying the complex singularities of the gravitational potential. SHEs are, in essence, expansions in 1/r, i.e., expansions about the point at infinity. Their domain of convergence is generically the exterior of the Brillouin sphere. However, for synthetic models with analytic topography and density the region of convergence may be larger, with the deviation decreasing as the structural complexity of the planet increases.", "url": "https://arxiv.org/abs/2605.04027", "type": "理论", "summary": "在本文中，我们分析了 Padé 近似在球谐展开式 (SHE) 收敛半径之外的向下延拓中的使用，以及识别引力势的复奇点。 SHE 本质上是 1/r 的展开，即关于无穷远点的展开。它们的收敛域一般是布里渊球的外部。然而，对于具有解析地形和密度的合成模型，收敛区域可能会更大，并且随着行星结构复杂性的增加，偏差会减小。", "authors": [{"name": "Ovidiu Costin"}, {"name": "Gerald V. Dunne"}, {"name": "Crichton Ogle"}], "featured_authors": [{"name": "Ovidiu Costin"}, {"name": "Gerald V. Dunne"}, {"name": "Crichton Ogle"}], "author_count": 3}, {"id": "2605.02995", "category": "quant-ph", "title": "Page Curve for Local-Operator Entanglement from Free Probability", "abstract": "The local-operator entanglement (LOE) measures the classical simulability of a Heisenberg operator and is conjectured to witness many-body chaos in locally interacting systems. Using tools from free probability, we analytically compute its value for Haar random dynamics for all Rényi indices. We find that it asymptotically reproduces the Page curve for random states in the case of traceless operators, with exponentially deviating corrections. In contrast to higher-order out-of-time ordered correlators, which depend on operator correlations via free cumulants, the leading-order LOE is independent of the initial operator. Guided by our Haar result, we therefore argue that the long-time value of the LOE entropies in chaotic systems will depend only on autocorrelation functions of the initial operator up to exponentially small corrections, suggesting that the higher-order structure of the full Eigenstate Thermalization Hypothesis is not necessary to describe it.", "url": "https://arxiv.org/abs/2605.02995", "type": "理论", "summary": "局部算子纠缠（LOE）测量海森堡算子的经典可模拟性，并被推测见证了局部交互系统中的多体混沌。使用自由概率工具，我们分析计算所有 Rényi 指数的 Haar 随机动态值。我们发现，在无迹算子的情况下，它渐近地再现了随机状态的 Page 曲线，并具有指数偏差的修正。与依赖于通过自由累积量的算子相关性的高阶超时有序相关器相比，前阶 LOE 独立于初始算子。因此，在 Haar 结果的指导下，我们认为混沌系统中 LOE 熵的长期值将仅取决于初始算子的自相关函数直至指数小修正，这表明完整本征态热化假设的高阶结构没有必要来描述它。", "authors": [{"name": "Neil Dowling"}, {"name": "Silvia Pappalardi"}], "featured_authors": [{"name": "Neil Dowling"}, {"name": "Silvia Pappalardi"}], "author_count": 2}, {"id": "2605.03011", "category": "quant-ph", "title": "Rigorous error bounds for dissipative thermal state preparation from weak system-bath coupling", "abstract": "Thermal state preparation is a central challenge in the simulation of quantum many-body systems. Yet, provably efficient algorithms for this task were only introduced recently [Chen et al. Nature 646, 561 (2025)]. These algorithms are based on dissipative Lindbladian evolution which exactly fixes the thermal state. Controlled and efficient digital simulation of this evolution, although possible in principle, remains out of reach for present-day quantum hardware. Subsequent work has therefore focused on analog approximations of the proposed Lindbladians via `collision models' with relatively modest requirements -- a resettable bath of ancilla qubits whose couplings to the system can be tuned in time-dependent fashion -- while still admitting rigorous fixed-point error bounds. Existing rigorous approaches, however, do not exploit the fact that these constructions generically implement not only the desired Lindblad dynamics, but also an additional unitary evolution generated by the system Hamiltonian which may aid convergence to the thermal state [Lloyd and Abanin arXiv:2506.21318 (2025)]. Here, we show that this unitary contribution does indeed tighten the fixed-point error bound and demonstrate that it is rigorously controlled by the system-bath coupling strength $J$, scaling as $J^2$. This demonstrates that the effect of the spurious `Lamb shift' term generated by the system-bath interaction can be controlled by tuning $J$. We clarify the role, previously observed, of a randomized implementation in suppressing possible resonances of the drive with the many-body spectrum, and bound the additional variance that this randomization imposes on observables. Finally, we numerically study aspects of the protocol which are relevant for its practical realization, such as the mixing time.", "url": "https://arxiv.org/abs/2605.03011", "type": "理论+数值", "summary": "热态准备是量子多体系统模拟中的一个核心挑战。然而，针对此任务的可证明有效的算法最近才被引入[Chen 等人。自然 646, 561 (2025)]。这些算法基于耗散 Lindbladian 演化，它精确地固定了热状态。对这种演化的受控且高效的数字模拟虽然原则上是可能的，但对于当今的量子硬件来说仍然遥不可及。因此，后续的工作重点是通过“碰撞模型”对所提出的 Lindbladians 进行模拟近似，其要求相对适中——可重置的辅助量子位元，其与系统的耦合可以以时间相关的方式进行调整——同时仍然承认严格的定点误差界限。然而，现有的严格方法并没有利用这样一个事实：这些结构通常不仅实现了所需的 Lindblad 动力学，而且还实现了由系统哈密顿量生成的额外酉演化，这可能有助于收敛到热状态 [Lloyd 和 Abanin arXiv:2506.21318 (2025)]。\n\n在这里，我们证明这种单一贡献确实收紧了定点误差界限，并证明它受到系统浴耦合强度 $J$ 的严格控制，缩放比例为 $J^2$。这表明系统-浴相互作用产生的虚假“兰姆位移”项的影响可以通过调整$J$来控制。我们阐明了先前观察到的随机实现在抑制驱动器与多体谱的可能共振方面的作用，并限制了这种随机化对可观察量施加的额外方差。最后，我们对协议中与其实际实现相关的方面进行了数值研究，例如混合时间。", "authors": [{"name": "Christopher Ong"}, {"name": "S. A. Parameswaran"}, {"name": "Benedikt Placke"}, {"name": "Dominik Hahn"}], "featured_authors": [{"name": "Christopher Ong"}, {"name": "S. A. Parameswaran"}, {"name": "Benedikt Placke"}, {"name": "Dominik Hahn"}], "author_count": 4}, {"id": "2605.03020", "category": "quant-ph", "title": "Exact Quantum Many-Body Scars by a generalized Matrix-Product Ansatz", "abstract": "We construct exact eigenstates of quantum many-body systems with Hamiltonians that are not frustration-free in matrix product form, based on a local error cancellation ansatz motivated by the Derrida-Evans-Hakim-Pasquier method for finding the stationary state of the asymmetric simple exclusion process. We demonstrate the approach with explicit examples in both one and two spatial dimensions.", "url": "https://arxiv.org/abs/2605.03020", "type": "理论", "summary": "我们基于由 Derrida-Evans-Hakim-Pasquier 方法激发的局部误差消除 ansatz，用哈密顿量构造了量子多体系统的精确本征态，该哈密顿量在矩阵乘积形式中并非无挫折，用于寻找不对称简单排除过程的稳态。我们通过一维和二维空间维度的明确示例来演示该方法。", "authors": [{"name": "Sascha Gehrmann"}, {"name": "Fabian H.L. Essler"}], "featured_authors": [{"name": "Sascha Gehrmann"}, {"name": "Fabian H.L. Essler"}], "author_count": 2}, {"id": "2605.03023", "category": "quant-ph", "title": "Arts & crafts: Strong random unitaries and geometric locality", "abstract": "We study the problem of constructing strong approximate unitary $k$-designs on $D$-dimensional grids (and more generally on Cartesian products of graphs), building on the work of Schuster et al. arXiv:2509.26310 which establishes strong unitary designs in 1D and in all-to-all connectivity. We provide two constructions. The first construction leverages the existing all-to-all connectivity result with general routing theory to provide flexible (but slightly suboptimal) strong $k$-designs in arbitrary connectivities. The second construction is more direct, requires no auxiliaries and has provably optimal depth (in the number of qubits $n$) for $D$-dimensional grids with constant dimension. Combining these techniques also allows us to construct strong pseudorandom unitaries on $D$-dimensional grids with provably optimal depth.", "url": "https://arxiv.org/abs/2605.03023", "type": "理论", "summary": "我们以 Schuster 等人的工作为基础，研究在 $D$ 维网格（更普遍的是在图的笛卡尔积上）构建强近似酉 $k$ 设计的问题。 arXiv:2509.26310，在一维和全连接方面建立了强大的统一设计。我们提供两种结构。第一种结构利用现有的全对全连接结果和一般路由理论，在任意连接中提供灵活（但稍微次优）的强 $k$ 设计。第二种结构更直接，不需要辅助设备，并且对于具有恒定尺寸的 $D$ 维网格具有经过证明的最佳深度（以量子位 $n$ 的数量表示）。结合这些技术还允许我们在具有可证明最佳深度的 $D$ 维网格上构建强大的伪随机酉。", "authors": [{"name": "Marten Folkertsma"}, {"name": "Lorenzo Grevink"}, {"name": "Jonas Helsen"}, {"name": "Alicja Dutkiewicz"}], "featured_authors": [{"name": "Marten Folkertsma"}, {"name": "Lorenzo Grevink"}, {"name": "Jonas Helsen"}, {"name": "Alicja Dutkiewicz"}], "author_count": 4}, {"id": "2605.03027", "category": "quant-ph", "title": "Relations between different definitions of the quantum Wasserstein distance for qubits", "abstract": "The quantum Wasserstein distances defined by Golse, Mouhot, Paul, and Caglioti and by De Palma and Trevisan coincide for qubits when a single operator appears in the cost function. As a consequence, the self-distance equals the Wigner-Yanase skew information in this case.", "url": "https://arxiv.org/abs/2605.03027", "type": "理论", "summary": "当成本函数中出现单个算子时，Golse、Mouhot、Paul 和 Caglioti 以及 De Palma 和 Trevisan 定义的量子 Wasserstein 距离对于量子位来说是一致的。因此，在这种情况下，自距离等于 Wigner-Yanase 偏斜信息。", "authors": [{"name": "Géza Tóth"}, {"name": "József Pitrik"}], "featured_authors": [{"name": "Géza Tóth"}, {"name": "József Pitrik"}], "author_count": 2}, {"id": "2605.03043", "category": "quant-ph", "title": "Information in Many-body Eigenstates: A Question of Learnability", "abstract": "To what extent do individual eigenstates encode information of their underlying Hamiltonian, and how does this depend on their spectral position? For many-body quantum systems, this issue is widely understood in terms of the differing nature of the eigenstates near the spectral edges (low-entanglement, highly-structured eigenstates) and those far from the spectral edges (high-entanglement, near-random eigenstates). Utilizing the availability of machine learning tools, we introduce a new way to quantify the information contained in eigenstates: for a particular learning architecture, how precisely can the Hamiltonian be reconstructed from a single eigenstate? We refer to this property as learnability; it serves as a new, alternative measure of the information content of eigenstates, made possible by machine learning. Using an encoder-decoder neural network and a physics-inspired loss function, we demonstrate how the distinction between two types of eigenstates is manifested as a difference in learnability. For spectral-edge eigenstates, the prediction accuracy is much better, and fewer eigenstates are required to learn the Hamiltonian, compared to mid-spectrum eigenstates.", "url": "https://arxiv.org/abs/2605.03043", "type": "理论+数值", "summary": "各个本征态在多大程度上编码其基础哈密顿量的信息，以及这如何取决于它们的光谱位置？对于多体量子系统，这个问题被广泛理解为靠近光谱边缘的本征态（低纠缠，高结构本征态）和远离光谱边缘的本征态（高纠缠，近随机本征态）的不同性质。利用机器学习工具的可用性，我们引入了一种量化本征态中包含的信息的新方法：对于特定的学习架构，从单个本征态重建哈密顿量的精确度如何？我们将此属性称为可学习性；它是通过机器学习实现的本征态信息内容的一种新的替代度量。使用编码器-解码器神经网络和受物理启发的损失函数，我们演示了两种类型本征态之间的区别如何表现为可学习性的差异。与中谱本征态相比，对于谱边缘本征态，预测精度要好得多，并且学习哈密顿量所需的本征态更少。", "authors": [{"name": "Maksymilian Kliczkowski"}, {"name": "Jarosław Pawłowski"}, {"name": "Masudul Haque"}], "featured_authors": [{"name": "Maksymilian Kliczkowski"}, {"name": "Jarosław Pawłowski"}, {"name": "Masudul Haque"}], "author_count": 3}, {"id": "2605.03056", "category": "quant-ph", "title": "Exchange-Only Silicon Based Spin Qubits: Charge Noise, PINN Optimised Pulse Sequences,and Gate-Level Fidelity", "abstract": "Exchange-only (EO) spin qubits in silicon realise all-electrical qubit control through pairwise Heisenberg exchange interactions, making them attractive for scalable quantum computation. Their principal vulnerability is charge noise, which couples multiplicatively to the exchange coupling and degrades gate fidelity. We present a \\emph{two-stage} Physics-Informed Neural Network (PINN) framework for per-gate pulse optimisation. In \\textbf{Stage~I} (iterations~1--100) the PINN maximises the noise-averaged gate fidelity toward a threshold of $\\Fth=0.99$; the pulse duration is held fixed at its nominal hardware value. Once the threshold is crossed, \\textbf{Stage~II} (iterations~101--250) progressively compresses the total pulse time while maintaining $F\\geq\\Fth$ via continuous fine-tuning of the pulse-shape parameters. The cost function is a Monte-Carlo ensemble mean-squared error (MSE) averaged over $N_{\\rm real}=2000$ quasi-static Gaussian noise realisations drawn fresh at every iteration. We benchmark the framework on the single-qubit gate set $\\{X,Y,Z,H\\}$ and the two-qubit set $\\{X,Y,Z,H,\\mathrm{CX}\\}$ at noise levels $\\sigmaJ/J\\in\\{1\\%,5\\%,10\\%\\}$. All single-qubit gates cross $\\Fth$ within the first 100 iterations across all noise levels; Stage~II then reduces pulse durations by 20--40\\% from their nominal values. The two-qubit gates follow the same two-phase behaviour, with the CX gate compressing from its nominal \\SI{31}{\\nano\\second} to $\\approx\\SI{22}{\\nano\\second}$ at 1\\% noise.", "url": "https://arxiv.org/abs/2605.03056", "type": "理论", "summary": "硅中的仅交换（EO）自旋量子位通过成对的海森堡交换相互作用实现全电量子位控制，这使得它们对于可扩展的量子计算具有吸引力。它们的主要弱点是电荷噪声，它与交换耦合成倍地耦合并降低了栅极保真度。我们提出了一个用于每门脉冲优化的\\emph{两级}物理信息神经网络（PINN）框架。在 \\textbf{Stage~I}（迭代~1--100）中，PINN 将噪声平均门保真度最大化，达到 $\\Fth=0.99$ 的阈值；脉冲持续时间固定为其标称硬件值。一旦超过阈值，\\textbf{Stage~II}（迭代~101--250）将逐渐压缩总脉冲时间，同时通过不断微调脉冲形状参数来维持$F\\geq\\Fth$。成本函数是在每次迭代时新鲜绘制的 $N_{\\rm real}=2000$ 准静态高斯噪声实现上平均得到的蒙特卡罗系综均方误差 (MSE)。我们在单量子位门集 $\\{X,Y,Z,H\\}$ 和两量子位门集 $\\{X,Y,Z,H,\\mathrm{CX}\\}$ 上对框架进行基准测试，噪声水平为 $\\sigmaJ/J\\in\\{1\\%,5\\%,10\\%\\}$。\n\n所有单量子位门在所有噪声水平的前 100 次迭代内都会穿过 $\\Fth$；然后，Stage~II 将脉冲持续时间从其标称值减少 20--40\\%。双量子位门遵循相同的两相行为，CX 门在 1\\% 噪声下从其标称 \\SI{31}{\\nano\\second} 压缩到 $\\approx\\SI{22}{\\nano\\second}$。", "authors": [{"name": "Rajdeep Rameshchandra Dwivedi"}, {"name": "Amitoj Singh Miglani"}, {"name": "Vishvendra Singh Poonia"}], "featured_authors": [{"name": "Rajdeep Rameshchandra Dwivedi"}, {"name": "Amitoj Singh Miglani"}, {"name": "Vishvendra Singh Poonia"}], "author_count": 3}, {"id": "2605.03123", "category": "quant-ph", "title": "ffsim: Faster simulation of fermionic quantum circuits", "abstract": "We present ffsim, an open-source software library for fast simulation of fermionic quantum circuits. ffsim exploits conservation of particle number and the z component of spin, symmetries present in a wide range of fermionic systems, to dramatically reduce memory usage and simulation time compared to general-purpose quantum circuit simulators. Compared to FQE, a library with similar functionality, ffsim differs in software design and is faster on a representative set of simulation benchmarks. Beyond state vector evolution by basic fermionic gates, ffsim offers a number of additional features including variational ansatzes, Hamiltonian time evolution via Trotter-Suzuki product formulas, efficient sampling of Slater determinants, seamless integration with Qiskit and PySCF, and comprehensive documentation. We demonstrate ffsim's capabilities on scientific applications involving quantum circuits of up to 64 qubits.", "url": "https://arxiv.org/abs/2605.03123", "type": "理论+数值", "summary": "我们推出 ffsim，一个用于快速模拟费米子量子电路的开源软件库。 ffsim 利用粒子数守恒和自旋 z 分量守恒以及各种费米子系统中存在的对称性，与通用量子电路模拟器相比，可显着减少内存使用量和模拟时间。与具有类似功能的 FQE 库相比，ffsim 在软件设计上有所不同，并且在一组代表性的仿真基准上速度更快。除了通过基本费米子门进行状态向量演化之外，ffsim 还提供了许多附加功能，包括变分分析、通过 Trotter-Suzuki 乘积公式的哈密顿时间演化、Slater 行列式的高效采样、与 Qiskit 和 PySCF 的无缝集成以及全面的文档。我们展示了 ffsim 在涉及高达 64 个量子位的量子电路的科学应用中的功能。", "authors": [{"name": "Kevin J. Sung"}, {"name": "Inho Choi"}, {"name": "Mirko Amico"}, {"name": "Bartholomew Andrews"}, {"name": "Esra Ayantuna"}, {"name": "Yukio Kawashima"}, {"name": "Wan-Hsuan Lin"}, {"name": "David Omanovic"}, {"name": "Samuele Piccinelli"}, {"name": "Javier Robledo Moreno"}, {"name": "Abdullah Ash Saki"}, {"name": "James Shee"}, {"name": "Soyoung Shin"}, {"name": "Minh C. Tran"}, {"name": "Kento Ueda"}, {"name": "Haimeng Zhang"}, {"name": "Mario Motta"}], "featured_authors": [{"name": "Kevin J. Sung"}, {"name": "Inho Choi"}, {"name": "Mirko Amico"}, {"name": "Kento Ueda"}, {"name": "Haimeng Zhang"}, {"name": "Mario Motta"}], "author_count": 17}, {"id": "2605.03194", "category": "quant-ph", "title": "Mapping correlations between quantum discord and Bell non-locality", "abstract": "We present a numerical framework for the certification and systematic analysis of the relationship between Bell nonlocality and quantum discord. By determining the minimum discord required for a bipartite state to manifest a specific Bell violation, we establish lower bounds for these correlations. We evaluate this methodology across six distinct Bell expressions, comparing their performance through the minimal discord values observed under varying intensities of white noise. Analysis of the resulting optimization landscape suggests the existence of two characteristic classes of optimized states, categorized by their minimized quantum discord.", "url": "https://arxiv.org/abs/2605.03194", "type": "理论+数值", "summary": "我们提出了一个数字框架，用于验证和系统分析贝尔非局域性和量子不和谐之间的关系。通过确定两方国家表现出特定贝尔违规所需的最小不和谐度，我们为这些相关性建立了下限。我们通过六种不同的贝尔表达式来评估这种方法，通过在不同强度的白噪声下观察到的最小不一致值来比较它们的性能。对所得优化景观的分析表明，存在两种特征类别的优化状态，按其最小化的量子不和谐进行分类。", "authors": [{"name": "Robert Okuła"}, {"name": "Adrian Misiak"}, {"name": "Piotr Mironowicz"}], "featured_authors": [{"name": "Robert Okuła"}, {"name": "Adrian Misiak"}, {"name": "Piotr Mironowicz"}], "author_count": 3}, {"id": "2605.03248", "category": "quant-ph", "title": "General perturbation theory for local quantum uncertainty and its formulation in the linear-response regime", "abstract": "We develop a general perturbation theory for the local quantum uncertainty (LQU), a discord-type quantifier of nonclassicality based on the Wigner-Yanase skew information. Starting from a perturbed density matrix $\\rho = \\rho_0 + \\epsilon\\rho_1$,we derive an explicit first-order expansion of $\\rho^{1/2}$ using an integral representation based on the gamma function, and reduce the LQU optimization to the diagonalization of a $(d_1^2-1) \\times (d_1^2-1)$ matrix $w = w^0 + w^1$ defined in terms of the $\\mathrm{SU}(d_1)$ generators. The framework is valid for composite systems of arbitrary dimension $d_1 \\times d_2$ and provides a direct computational route to the LQU from the spectral decomposition of the unperturbed state. We further specialize the theory to the quantum linear response regime, where the perturbation is generated by a time-dependent external field, and $w^1$ acquires explicit dependence on the driving frequency $\\omega$, the eigenstates and occupation probabilities of the equilibrium Hamiltonian $H_0$, and the matrix elements of the coupling operator $\\hat{A}$. As an illustration, we apply the formalism to the isotropic Heisenberg model of two coupled spins driven by a local periodic magnetic field, obtaining closed-form expressions for the LQU as a function of temperature $T$ and frequency $\\omega$. Comparison with the concurrence shows that above the entanglement critical temperature $T_c$, the external field induces a resonantly enhanced quantum discord without generating entanglement, demonstrating that frequency acts as a tunable modulator of nonclassicality -- an effect of purely quantum-discord type inaccessible to entanglement-based quantifiers.", "url": "https://arxiv.org/abs/2605.03248", "type": "理论+数值", "summary": "我们开发了局域量子不确定性 (LQU) 的一般微扰理论，这是一种基于 Wigner-Yanase 偏斜信息的非经典性不和谐量词。从扰动密度矩阵 $\\rho = \\rho_0 + \\epsilon\\rho_1$ 开始，我们使用基于 gamma 函数的积分表示导出 $\\rho^{1/2}$ 的显式一阶展开式，并将 LQU 优化简化为 $(d_1^2-1) \\times (d_1^2-1)$ 矩阵 $w = w^0 + w^1$ 的对角化，定义为$\\mathrm{SU}(d_1)$ 生成器。该框架对于任意维度 $d_1 \\times d_2$ 的复合系统有效，并提供从未扰动状态的谱分解到 LQU 的直接计算路径。我们进一步将理论专门化为量子线性响应体系，其中扰动由时间相关的外部场产生，并且 $w^1$ 获得对驱动频率 $\\omega$、平衡哈密顿量 $H_0$ 的本征态和占据概率以及耦合算子 $\\hat{A}$ 的矩阵元素的明确依赖。\n\n作为说明，我们将形式主义应用于由局部周期性磁场驱动的两个耦合自旋的各向同性海森堡模型，获得作为温度 $T$ 和频率 $\\omega$ 函数的 LQU 的闭合形式表达式。与并发的比较表明，在纠缠临界温度$T_c$之上，外部场会引起共振增强的量子不和谐而不产生纠缠，这表明频率充当非经典性的可调调制器——这是基于纠缠的量词无法达到的纯量子不和谐类型的效果。", "authors": [{"name": "A. A. Jimenez-Romero"}, {"name": "F. Rojas"}], "featured_authors": [{"name": "A. A. Jimenez-Romero"}, {"name": "F. Rojas"}], "author_count": 2}, {"id": "2605.03324", "category": "quant-ph", "title": "Superposition of quasi coherent Bohm Madelung waves", "abstract": "We examine the problem of superposition of stationary quantum states in the Bohm Madelung formulation, where amplitude and phase obey coupled nonlinear equations and linear superposition is not generally valid. In the quasi-coherent regime of near degenerate stationary branches, the dynamics separates into a hierarchical structure: the mean amplitude evolves according to an Ermakov-Pinney equation governed by a Wronskian invariant, while the difference amplitude obeys a parametrically driven Hill Mathieu equation determined by the energy splitting. Despite this intrinsic nonlinearity, a linear spectral structure re-emerges through a Jacobi Anger expansion, yielding a Fourier Bessel representation with square-summable coefficients and translation covariant weights. Applications to aperture geometries and spatially separated sources demonstrate how amplitude modulation and phase induced sidebands organise interference patterns within a nonlinear amplitude phase framework. Keywords Bohm Madelung, Ermakov Pinney, nonlinear superposition, quasi coherent states, Mathieu Hill, Fourier Bessel, quantum interference.", "url": "https://arxiv.org/abs/2605.03324", "type": "理论", "summary": "我们研究了玻姆马德隆公式中静止量子态的叠加问题，其中幅度和相位服从耦合非线性方程，而线性叠加通常不成立。在近简并静止分支的准相干体系中，动力学分解为分层结构：平均振幅根据由朗斯基不变量控制的 Ermakov-Pinney 方程演化，而差振幅服从由能量分裂确定的参数驱动的 Hill Mathieu 方程。尽管存在这种固有的非线性，但线性谱结构通过雅可比安格展开重新出现，产生具有平方可求系数和平移协变权重的傅里叶贝塞尔表示。孔径几何结构和空间分离源的应用展示了幅度调制和相位感应边带如何在非线性幅度相位框架内组织干涉图案。关键词 玻姆·马德隆、叶尔马科夫·平尼、非线性叠加、准相干态、马蒂厄·希尔、傅立叶·贝塞尔、量子干涉。", "authors": [{"name": "Anand Aruna Kumar"}], "featured_authors": [{"name": "Anand Aruna Kumar"}], "author_count": 1}, {"id": "2605.03336", "category": "quant-ph", "title": "Centralizing Task-based Approach to Quantum Network Control", "abstract": "For the last decade, layered stacks have dominated the way of reasoning about architectures for quantum networks. However, layered architectures impose stringent design and timing constraints on quantum networks, adding additional latency to the time required to serve an entanglement generation request. Moreover, increasing delays from the layered approach to network control causes degradation of state, effectively minimizing achievable fidelities. In this work we simulate a resource-centric, task-based approach to quantum network control by utilizing a centralized controller. Using the SeQUeNCe quantum network simulator, we implement the centralized controller which tracks quantum memory availability across all nodes, and schedules objectives in an offline fashion using a priority-based scheduler. We evaluate the performance of this controller on multiple topologies (bottleneck, grid, star, caveman) of significant scale, with varying reservation patterns; thereby we demonstrate the viability of the resource-centric task-based quantum network control framework for scaling. Our simulation results show that the caveman and grid topologies have a higher fraction of delivered requests with low delay compared to the star topology, but with a higher fraction of highly delayed requests as well. Furthermore, we find a linear shift of the CDFs in terms of queue size for all topologies depending on the reservation delay. More interestingly, we conclude that the CDFs of priority queues for the star topology converge fast into saturation for increasing request arrival rates, demonstrating together with the other results that the framework is robust for high load scenarios in quantum networks.", "url": "https://arxiv.org/abs/2605.03336", "type": "理论+数值", "summary": "在过去的十年中，分层堆栈主导了量子网络架构的推理方式。然而，分层架构对量子网络施加了严格的设计和时序限制，从而增加了服务纠缠生成请求所需的时间的额外延迟。此外，网络控制的分层方法增加的延迟会导致状态退化，从而有效地最小化可实现的保真度。在这项工作中，我们利用集中控制器模拟一种以资源为中心、基于任务的量子网络控制方法。使用 SeQUeNCe 量子网络模拟器，我们实现了集中控制器，该控制器跟踪所有节点上的量子内存可用性，并使用基于优先级的调度程序以离线方式调度目标。我们评估了该控制器在多种具有不同预留模式的大规模拓扑（瓶颈、网格、星形、穴居人）上的性能；因此，我们证明了以资源为中心、基于任务的量子网络控制框架用于扩展的可行性。\n\n我们的模拟结果表明，与星型拓扑相比，穴居人和网格拓扑具有更高比例的低延迟交付请求，但也具有更高比例的高延迟请求。此外，我们发现所有拓扑的 CDF 在队列大小方面都存在线性变化，具体取决于预留延迟。更有趣的是，我们得出的结论是，星形拓扑的优先级队列的 CDF 快速收敛到饱和状态，以提高请求到达率，与其他结果一起证明该框架对于量子网络中的高负载场景具有鲁棒性。", "authors": [{"name": "Alexander Pirker"}, {"name": "Robert J. Hayek"}, {"name": "Alexander Kolar"}, {"name": "Igor Kadota"}, {"name": "Joaquin Chung"}, {"name": "Rajkumar Kettimuthu"}], "featured_authors": [{"name": "Alexander Pirker"}, {"name": "Robert J. Hayek"}, {"name": "Alexander Kolar"}, {"name": "Igor Kadota"}, {"name": "Joaquin Chung"}, {"name": "Rajkumar Kettimuthu"}], "author_count": 6}, {"id": "2605.03381", "category": "quant-ph", "title": "Nonlinear semigroups with unbounded generators under Carleman linearization", "abstract": "We treat the convergence of Carleman linearization of nonlinear evolutionary equations through the approximation theory of strongly continuous semigroups, by Carleman embedding the underlying nonlinear semigroups as linear semigroups. Linear semigroup theory then lets one replace the norm constraint on the convergence of Carleman linearization in the form used by quantum algorithms for a class of semi-discretized evolution equations by a dissipativity constraint, simplifying arguments for convergence. Applying Trotter-Kato approximation theorem to the linearized semigroup realizes the semigroup as a limit finite dimensional operator exponentials, reducing the question of convergence rate of Carleman linearization to that of the Trotter-Kato approximation. We then examine convergence of the Carleman linearization as the operators become unbounded, treating the hyperviscuous Burger's equation as an example. Next we consider the perturbation theory of the Carleman semigroup and obtain conditions when polynomial nonlinearities correspond to the Carleman linearized semigroup being a $1$-integrated semigroup, so convergence is implied by variants of Trotter-Kato approximation for integrated semigroups.", "url": "https://arxiv.org/abs/2605.03381", "type": "理论+数值", "summary": "我们通过强连续半群的逼近理论来处理非线性演化方程的卡尔曼线性化的收敛性，通过卡尔曼将底层非线性半群嵌入为线性半群。然后，线性半群理论让人们用耗散性约束来取代一类半离散演化方程的量子算法所使用的卡尔曼线性化收敛的范数约束，从而简化了收敛性的论证。将Trotter-Kato近似定理应用于线性化半群，将半群实现为极限有限维算子指数，将Carleman线性化的收敛速度问题简化为Trotter-Kato近似的收敛速度问题。然后，我们以超粘性 Burger 方程为例，检查当算子变得无界时卡尔曼线性化的收敛性。\n\n接下来我们考虑卡尔曼半群的微扰理论，并获得当多项式非线性对应于卡尔曼线性化半群是 $1$ 积分半群时的条件，因此积分半群的 Trotter-Kato 近似的变体暗示了收敛性。", "authors": [{"name": "Sitanshu Gakkhar"}, {"name": "Ala Shayeghi"}, {"name": "David C. Del Rey Fernández"}], "featured_authors": [{"name": "Sitanshu Gakkhar"}, {"name": "Ala Shayeghi"}, {"name": "David C. Del Rey Fernández"}], "author_count": 3}, {"id": "2605.03467", "category": "quant-ph", "title": "Quantum Resource Estimation for Minimising Energy Grid Losses", "abstract": "Distribution network reconfiguration (DNR) can minimise power losses by identifying the optimal topology of the electricity grid. Determining the minimum loss configuration is NP-hard, and classical optimisation methods struggle to scale to real-world distribution grids. This paper explores the use of gate-based quantum computing to solve DNR for power loss reduction. We formulate DNR as a higher-order unconstrained binary optimisation (HUBO) problem, avoiding the need for auxiliary variables, thereby reducing the required number of qubits. This is applied to a real medium voltage (MV) network operated by Alliander, a Dutch distribution system operator (DSO). For each biconnected component in the network graph, we construct the corresponding HUBO, derive the cost and mixer operators, and determine the number of required logical qubits and rotation gates. These are then mapped to physical qubits and execution time estimates using quantum resource estimation (QRE). The results suggest that the quantum resource requirements depend not only on component size but also on structural characteristics such as connectivity and cyclicity. Overall, the novelty of this work lies in directly framing the optimisation problem as a HUBO, applying it to real-world MV networks, and performing a QRE to assess future feasibility.", "url": "https://arxiv.org/abs/2605.03467", "type": "理论", "summary": "配电网重新配置（DNR）可以通过确定电网的最佳拓扑来最大限度地减少功率损失。确定最小损耗配置是 NP 困难的，经典的优化方法很难扩展到现实世界的配电网。本文探讨了使用基于门的量子计算来解决 DNR 以减少功率损耗。我们将 DNR 表述为高阶无约束二元优化（HUBO）问题，避免了对辅助变量的需要，从而减少了所需的量子比特数。这适用于由荷兰配电系统运营商 (DSO) Alliander 运营的真实中压 (MV) 网络。对于网络图中的每个双连接组件，我们构造相应的 HUBO，导出成本和混合器运算符，并确定所需的逻辑量子位和旋转门的数量。然后使用量子资源估计 (QRE) 将它们映射到物理量子位和执行时间估计。结果表明，量子资源需求不仅取决于组件尺寸，还取决于连接性和循环性等结构特征。\n\n总的来说，这项工作的新颖之处在于直接将优化问题构建为 HUBO，将其应用于现实世界的 MV 网络，并执行 QRE 来评估未来的可行性。", "authors": [{"name": "Camille de Valk"}, {"name": "Milou van Nederveen"}, {"name": "Koen Reerink"}, {"name": "Werner van Westering"}], "featured_authors": [{"name": "Camille de Valk"}, {"name": "Milou van Nederveen"}, {"name": "Koen Reerink"}, {"name": "Werner van Westering"}], "author_count": 4}, {"id": "2605.03503", "category": "quant-ph", "title": "Harnessing DEN models for quantum computing tasks on neutral atom QPUs", "abstract": "We present our work on effectively representing unit-disk graphs on the registers of neutral atom quantum machines. Specifically, we aimed to embed graphs corresponding to proteins and cellular antenna networks into unit-disk graphs, ensuring compatibility with the registers of two real QPUs: Orion Alpha by PASQAL and Aquila by QuEra. To address machine-specific constraints, we made adjustments and integrated Distance Encoder Networks (DEN) from our previous work. Despite these challenges, we successfully embedded up to 76% of protein-representing graphs for a quantum machine learning classification task on the Aquila QPU, and all subgraphs derived from 90 antenna geographical positions in Turin, Italy, on the Orion Alpha QPU. In the latter case, the graphs represented instances of the graph coloring problem, which we tackled using the hybrid quantum-classical algorithm BBQ-mIS. These promising results underscore the effectiveness and versatility of our embedding approach for representing unit-disk graphs on neutral atom quantum computers across diverse applications.", "url": "https://arxiv.org/abs/2605.03503", "type": "理论+数值", "summary": "我们展示了在中性原子量子机寄存器上有效表示单位圆盘图的工作。具体来说，我们的目标是将与蛋白质和蜂窝天线网络相对应的图嵌入到单位盘图中，确保与两个真实 QPU 的寄存器兼容：PASQAL 的 Orion Alpha 和 QuEra 的 Aquila。为了解决机器特定的限制，我们对之前的工作进行了调整并集成了距离编码器网络（DEN）。尽管面临这些挑战，我们还是成功地在 Aquila QPU 上嵌入了高达 76% 的用于量子机器学习分类任务的蛋白质表示图，并在 Orion Alpha QPU 上嵌入了来自意大利都灵 90 个天线地理位置的所有子图。在后一种情况下，图表示图着色问题的实例，我们使用混合量子经典算法 BBQ-mIS 来解决该问题。这些有希望的结果强调了我们的嵌入方法在跨不同应用的中性原子量子计算机上表示单位圆盘图的有效性和多功能性。", "authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Alberto Scionti"}, {"name": "Olivier Terzo"}, {"name": "Bartolomeo Montrucchio"}], "featured_authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Alberto Scionti"}, {"name": "Olivier Terzo"}, {"name": "Bartolomeo Montrucchio"}], "author_count": 6}, {"id": "2605.03524", "category": "quant-ph", "title": "BBQ-mIS: a parallel quantum algorithm for graph coloring problems", "abstract": "Among the limitations of current quantum machines, the qubits count represents one of the most critical challenges for porting reasonably large computational problems, such as those coming from real-world applications, to the scale of the quantum hardware. In this regard, one possibility is to decompose the problems at hand and exploit parallelism over multiple size-limited quantum resources. To this purpose, we designed a hybrid quantum-classical algorithm, i.e., BBQ-mIS, to solve graph coloring problems on Rydberg atoms quantum machines. The BBQ-mIS algorithm combines the natural representation of Maximum Independent Set (MIS) problems onto the machine Hamiltonian with a Branch&Bound (BB) approach to identify a proper graph coloring. In the proposed solution, the graph representation emerges from qubit interactions (qubits represent vertexes of the graph), and the coloring is then retrieved by iteratively assigning one color to a maximal set of independent vertexes of the graph, still minimizing the number of colors with the Branch&Bound approach. We emulated real quantum hardware onto an IBM Power9-based cluster, with 32 cores/node and 256 GB/node, and exploited an MPI-enhanced library to implement the parallelism for the BBQ-mIS algorithm. Considering this use case, we also identify some technical requirements and challenges for an effective HPC-QC integration. The results show that our problem decomposition is effective in terms of graph coloring solutions quality, and provide a reference for applying this methodology to other quantum technologies or applications.", "url": "https://arxiv.org/abs/2605.03524", "type": "理论+数值", "summary": "在当前量子机器的局限性中，量子比特数是将相当大的计算问题（例如来自现实世界应用的问题）移植到量子硬件规模的最关键挑战之一。在这方面，一种可能性是分解手头的问题并利用多个大小受限的量子资源的并行性。为此，我们设计了一种混合量子经典算法，即 BBQ-mIS，来解决里德堡原子量子机上的图着色问题。 BBQ-mIS 算法将最大独立集 (MIS) 问题的自然表示与分支限界 (BB) 方法结合到机器哈密顿量上，以识别正确的图形着色。在所提出的解决方案中，图形表示来自量子位交互（量子位代表图形的顶点），然后通过迭代地将一种颜色分配给图形的最大独立顶点集来检索着色，同时仍然使用分支限界方法最小化颜色数量。\n\n我们在基于 IBM Power9 的集群上模拟真实的量子硬件，该集群具有 32 个核心/节点和 256 GB/节点，并利用 MPI 增强库来实现 BBQ-mIS 算法的并行性。考虑到这个用例，我们还确定了有效 HPC-QC 集成的一些技术要求和挑战。结果表明，我们的问题分解在图着色解决方案质量方面是有效的，并为将该方法应用于其他量子技术或应用提供了参考。", "authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Edoardo Giusto"}, {"name": "Alberto Scionti"}, {"name": "Andrea Scarabosio"}, {"name": "Olivier Terzo"}, {"name": "Bartolomeo Montrucchio"}], "featured_authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Andrea Scarabosio"}, {"name": "Olivier Terzo"}, {"name": "Bartolomeo Montrucchio"}], "author_count": 8}, {"id": "2605.03559", "category": "quant-ph", "title": "Sensitivity limits of non-stationary quantum sensors", "abstract": "The concept of the dissipative quantum limit (DQL) was first put forward in 1980s and was analyzed in detail much later in Ref. [Phys. Rev. A 103, 043721 (2021)] for the particular case of stationary (invariant with respect to a shift of time) systems. Here we extend that analysis to the general non-stationary case.", "url": "https://arxiv.org/abs/2605.03559", "type": "理论", "summary": "耗散量子极限 (DQL) 的概念于 20 世纪 80 年代首次提出，并在稍后的参考文献 中进行了详细分析。 [物理。 Rev. A 103, 043721 (2021)]适用于固定（相对于时间变化不变）系统的特殊情况。在这里，我们将该分析扩展到一般的非平稳情况。", "authors": [{"name": "Farid Ya. Khalili"}], "featured_authors": [{"name": "Farid Ya. Khalili"}], "author_count": 1}, {"id": "2605.03565", "category": "quant-ph", "title": "Neural optimization for quantum architectures: graph embedding problems with Distance Encoder Networks", "abstract": "Quantum machines are among the most promising technologies expected to provide significant improvements in the following years. However, bridging the gap between real-world applications and their implementation on quantum hardware is still a complicated task. One of the main challenges is to represent through qubits (i.e., the basic units of quantum information) the problems of interest. According to the specific technology underlying the quantum machine, it is necessary to implement a proper representation strategy, generally referred to as embedding. This paper introduces a neural-enhanced optimization framework to solve the constrained unit disk problem, which arises in the context of qubits positioning for neutral atoms-based quantum hardware. The proposed approach involves a modified autoencoder model, i.e., the Distances Encoder Network, and a custom loss, i.e., the Embedding Loss Function, respectively, to compute Euclidean distances and model the optimization constraints. The core idea behind this design relies on the capability of neural networks to approximate non-linear transformations to make the Distances Encoder Network learn the spatial transformation that maps initial non-feasible solutions of the constrained unit disk problem into feasible ones. The proposed approach outperforms classical solvers, given fixed comparable computation times, and paves the way to address other optimization problems through a similar strategy.", "url": "https://arxiv.org/abs/2605.03565", "type": "理论+数值", "summary": "量子机器是最有前途的技术之一，预计将在未来几年内带来重大改进。然而，弥合现实世界应用与其在量子硬件上的实现之间的差距仍然是一项复杂的任务。主要挑战之一是通过量子位（即量子信息的基本单位）来表示感兴趣的问题。根据量子机底层的具体技术，需要实现适当的表示策略，一般称为嵌入。本文介绍了一种神经增强优化框架来解决约束单位圆盘问题，该问题是在基于中性原子的量子硬件的量子位定位的背景下出现的。所提出的方法分别涉及修改后的自动编码器模型（即距离编码器网络）和自定义损失（即嵌入损失函数），以计算欧几里德距离并对优化约束进行建模。\n\n该设计背后的核心思想依赖于神经网络逼近非线性变换的能力，使距离编码器网络学习空间变换，将受限单位圆盘问题的初始不可行解映射为可行解。在给定固定的可比计算时间的情况下，所提出的方法优于经典求解器，并为通过类似策略解决其他优化问题铺平了道路。", "authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Alberto Scionti"}, {"name": "Andrea Scarabosio"}, {"name": "Olivier Terzo"}, {"name": "Edoardo Giusto"}, {"name": "Bartolomeo Montrucchio"}], "featured_authors": [{"name": "Chiara Vercellino"}, {"name": "Giacomo Vitali"}, {"name": "Paolo Viviani"}, {"name": "Olivier Terzo"}, {"name": "Edoardo Giusto"}, {"name": "Bartolomeo Montrucchio"}], "author_count": 8}, {"id": "2605.03579", "category": "quant-ph", "title": "Quantum Spin Liquid State of a Dual-Species Atomic Array on Kagome Lattice", "abstract": "Dual-species arrays of ultracold neutral atoms have recently attracted increased interest due to the ability to independently control different atomic species and tune the interatomic interactions. This capability provides additional flexibility essential for both quantum computing and quantum simulation. In this work we theoretically investigate a quantum spin liquid (QSL) state to be simulated on a programmable quantum simulator based on a dual-species atomic array, arranged on a Kagome lattice. The Kagome lattice is formed by corner sharing triangles. This specific spatial arrangement enhances the competing interactions between atoms and is often considered as a model for realising QSL states. When the atoms are excited into Rydberg states, long-range interactions result in Rydberg blockade. The geometric frustration of the Kagome lattice, combined with the Rydberg blockade, drives the system into exotic phases with topological order and long-range entanglement. To drive an array into the QSL state, we use a sweep-quench-sweep protocol, when the atoms are quasiadiabatically excited into Rydberg state with individually controlled detuning from the resonance for each atomic species. The filling fraction, indicating emergence of a QSL state, is represented by a density of Rydberg excitations. We identified the conditions required for QSL state in a dual-species array with non-uniform interaction energies. We calculated the correlation length and studied the mutual information as a function of the size of the subset of the system. The existence of a topological order was proved by estimating the Kitaev-Preskill topological quantum entanglement entropy.", "url": "https://arxiv.org/abs/2605.03579", "type": "理论+数值", "summary": "超冷中性原子的双物种阵列最近引起了越来越多的兴趣，因为它能够独立控制不同的原子物种并调整原子间相互作用。此功能提供了量子计算和量子模拟所必需的额外灵活性。在这项工作中，我们从理论上研究了要在基于双物质原子阵列的可编程量子模拟器上模拟的量子自旋液体（QSL）态，该阵列排列在 Kagome 晶格上。 Kagome 晶格由共享角的三角形组成。这种特定的空间排列增强了原子之间的竞争相互作用，通常被认为是实现 QSL 态的模型。当原子被激发到里德伯态时，长程相互作用会导致里德伯封锁。戈薇晶格的几何挫败与里德堡封锁相结合，使系统进入具有拓扑有序和长程纠缠的奇异相。\n\n为了将阵列驱动到 QSL 状态，我们使用扫描-淬灭-扫描协议，此时原子被准绝热激发到里德伯态，并且每个原子种类的共振失谐受到单独控制。填充分数表示 QSL 状态的出现，由里德伯激发密度表示。我们确定了具有非均匀相互作用能的双物种阵列中 QSL 状态所需的条件。我们计算了相关长度并研究了互信息作为系统子集大小的函数。通过估计Kitaev-Preskill拓扑量子纠缠熵证明了拓扑序的存在。", "authors": [{"name": "Ahmed M. Farouk"}, {"name": "Ilya I. Beterov"}, {"name": "Ghadeer Suliman"}, {"name": "Junxi Chen"}, {"name": "Igor I. Ryabtsev"}], "featured_authors": [{"name": "Ahmed M. Farouk"}, {"name": "Ilya I. Beterov"}, {"name": "Ghadeer Suliman"}, {"name": "Junxi Chen"}, {"name": "Igor I. Ryabtsev"}], "author_count": 5}, {"id": "2605.03612", "category": "quant-ph", "title": "A Critical Comment on 'Entropy Computing: A Paradigm for Optimization in Open Photonic Systems'", "abstract": "In this article, we take a close look at Entropy Quantum Computing (EQC), a computational paradigm developed by Quantum Computing Inc. (QCi), which deviates from mainstream quantum computing by embracing rather than battling environmental noise and decoherence arXiv:2407.04512 . In their words this approach purports EQC as an open quantum system that turns \"entropy into super-power fuels of its computing engine\". We show that some of the claims in the main article can be made more rigorous, and yet these are still not good enough to beat state of the art classical algorithms on conventional classical computers. Note that these conclusions reflect the technology's current early stage of development and are not meant to discourage its pursuit. Continued rigorous exploration is necessary to fully assess the long-term viability and potential advantages of this distinct computational approach.", "url": "https://arxiv.org/abs/2605.03612", "type": "理论+数值", "summary": "在本文中，我们仔细研究了熵量子计算 (EQC)，这是由量子计算公司 (QCi) 开发的一种计算范式，它通过拥抱而不是对抗环境噪声和退相干来偏离主流量子计算 arXiv:2407.04512 。用他们的话来说，这种方法声称 EQC 是一个开放的量子系统，可以将“熵转化为计算引擎的超级燃料”。我们表明，主文章中的一些主张可以更加严格，但这些仍然不足以击败传统经典计算机上最先进的经典算法。请注意，这些结论反映了该技术当前的早期发展阶段，并不意味着阻止其追求。为了充分评估这种独特计算方法的长期可行性和潜在优势，需要持续严格的探索。", "authors": [{"name": "Ali Hamed Moosavian"}, {"name": "Bahram Abedi Ravan"}], "featured_authors": [{"name": "Ali Hamed Moosavian"}, {"name": "Bahram Abedi Ravan"}], "author_count": 2}, {"id": "2605.03616", "category": "quant-ph", "title": "Reducing Postselection Overhead in Magic-State Cultivation by In-Patch Multiplexing", "abstract": "Fault-tolerant quantum computing requires high-fidelity logical magic states for implementing non-Clifford operations. Magic-state cultivation provides a lower-overhead route to logical magic-state preparation, but its efficiency is limited by postselection loss during the early injection-and-cultivation stages. In this work, we propose an in-patch multiplexing scheme that uses early-stage idle resources within a single logical patch to create multiple local cultivation opportunities. A candidate that passes the early stages is forwarded to the standard escape pathway, while the escape stage and the decoder-based acceptance procedure are kept identical to those of the single-site baseline. Under a uniform depolarizing noise model with idle noise, the proposed protocol substantially reduces the injection-and-cultivation discard rate and the expected number of attempts required to obtain an accepted early-stage candidate. At a physical error rate of \\(p=2\\times10^{-3}\\), the injection-and-cultivation expected attempts are reduced by \\(45.46\\%\\) for \\(d_1=3\\) and by \\(72.91\\%\\) for \\(d_1=5\\), relative to the single-site MSC baseline. In the direct full-cycle evaluation including escape, the expected attempts per kept logical output are further reduced by \\(49.04\\%\\) for \\(d_1=3\\) and by \\(78.69\\%\\) for \\(d_1=5\\) at the same physical error rate. The full-cycle cost curves are shifted toward smaller expected attempts, while the final logical-error behavior remains governed by the escape-stage gap threshold. These results show that in-patch multiplexing can reduce postselection overhead while preserving the standard magic-state cultivation framework.", "url": "https://arxiv.org/abs/2605.03616", "type": "理论", "summary": "容错量子计算需要高保真逻辑魔法状态来实现非 Clifford 操作。魔法状态培养为逻辑魔法状态准备提供了一种较低开销的途径，但其效率受到早期注入和培养阶段的选择后损失的限制。在这项工作中，我们提出了一种补丁内复用方案，该方案使用单个逻辑补丁内的早期空闲资源来创建多个本地培养机会。通过早期阶段的候选者将被转发到标准逃逸路径，而逃逸阶段和基于解码器的接受程序保持与单站点基线相同。在具有闲置噪声的均匀去极化噪声模型下，所提出的协议大大降低了注射和培养丢弃率以及获得可接受的早期候选者所需的预期尝试次数。在物理错误率为 \\(p=2\\times10^{-3}\\) 时，相对于单点 MSC 基线，\\(d_1=3\\) 的注射和培养预期尝试减少了 \\(45.46\\%\\)，\\(d_1=5\\) 的注射和培养预期尝试减少了 \\(72.91\\%\\)。\n\n在包括逃逸的直接全周期评估中，在相同的物理错误率下，每个保留逻辑输出的预期尝试进一步减少了 \\(d_1=3\\) 的 \\(49.04\\%\\) 和 \\(d_1=5\\) 的 \\(78.69\\%\\)。全周期成本曲线转向较小的预期尝试，而最终的逻辑错误行为仍然由逃逸阶段间隙阈值控制。这些结果表明，补丁内复用可以减少选择后开销，同时保留标准的魔法状态培养框架。", "authors": [{"name": "Dongmin Kim"}, {"name": "Jeonggeun Seo"}, {"name": "Aniket Patra"}, {"name": "Youngsun Han"}], "featured_authors": [{"name": "Dongmin Kim"}, {"name": "Jeonggeun Seo"}, {"name": "Aniket Patra"}, {"name": "Youngsun Han"}], "author_count": 4}, {"id": "2605.03629", "category": "quant-ph", "title": "Adversarial Effects on Expressibility and Trainability in Distributed Variational Quantum Algorithms", "abstract": "Distributed quantum algorithms offer a promising pathway to scale variational quantum algorithms beyond the constraints of noisy intermediate-scale quantum hardware. However, existing approaches implicitly assume a trusted entanglement-sharing layer across quantum processors. We show that this assumption introduces a fundamental vulnerability: adversarial perturbations of shared entanglement induce structured gate-level noise that directly impacts quantum learning. We develop a framework that maps entanglement-level perturbations to gate-level noise via an explicit Kraus representation. To quantify their impact, we introduce Kraus expressibility, a metric that generalizes unitary expressibility to noisy quantum channels. We then establish a trade-off between Kraus expressibility and trainability of noisy quantum circuits through gradient variance analysis. Our analysis reveals that an adversary can manipulate Kraus expressibility to maintain sufficiently large cost gradients (avoiding barren plateaus) while systematically biasing optimization toward incorrect solutions. We validate these findings through numerical simulations, demonstrating adversarial degradation of expressibility and trainability.", "url": "https://arxiv.org/abs/2605.03629", "type": "理论+数值", "summary": "分布式量子算法提供了一种有希望的途径来扩展变分量子算法，使其超越嘈杂的中等规模量子硬件的限制。然而，现有方法隐含地假设跨量子处理器的可信纠缠共享层。我们证明，这种假设引入了一个根本性的漏洞：共享纠缠的对抗性扰动会引起直接影响量子学习的结构化门级噪声。我们开发了一个框架，通过显式的克劳斯表示将纠缠级扰动映射到门级噪声。为了量化它们的影响，我们引入了 Kraus 可表达性，这是一种将单一可表达性推广到噪声量子通道的度量。然后，我们通过梯度方差分析在噪声量子电路的克劳斯可表达性和可训练性之间建立权衡。我们的分析表明，对手可以操纵克劳斯的可表达性来维持足够大的成本梯度（避免贫瘠的平台），同时系统地将优化偏向错误的解决方案。\n\n我们通过数值模拟验证了这些发现，证明了可表达性和可训练性的对抗性退化。", "authors": [{"name": "Abhishek Sadhu"}, {"name": "Sharu Theresa Jose"}], "featured_authors": [{"name": "Abhishek Sadhu"}, {"name": "Sharu Theresa Jose"}], "author_count": 2}, {"id": "2605.03685", "category": "quant-ph", "title": "Quantum Multi-Level Estimation of Functionals of Discrete Distributions", "abstract": "We propose a quantum multi-level estimation framework for a functional $\\sum_{i=1}^n f(p_i)$ of a discrete distribution $(p_i)_{i=1}^n$. We partition the values $p_i$ into logarithmically many intervals whose length decays exponentially. For each interval, we perform non-destructive singular value discrimination to isolate the relevant $p_i$, enabling adaptive estimation of the partial sum over this interval. Unlike previous variable-time approaches, our method avoids high control overhead and requires only constant extra ancilla qubits. As an application, we present efficient quantum estimators for the $q$-Tsallis entropy of discrete distributions. Specifically: (i) For $q > 1$, we obtain a near-optimal quantum algorithm with query complexity $\\tilde{\\Theta}(1/\\varepsilon^{\\max\\{1/(2(q-1)), 1\\}})$, improving the prior best $O(1/\\varepsilon^{1+1/(q-1)})$ due to Liu and Wang (SODA 2025; IEEE Trans. Inf. Theory 2026). (ii) For $0 < q < 1$, we obtain a quantum algorithm with query complexity $\\tilde{O}(n^{1/q-1/2}/\\varepsilon^{1/q})$, exhibiting a quantum speedup over the near-optimal classical estimators due to Jiao, Venkat, Han, and Weissman (IEEE Trans. Inf. Theory 2017). Our results achieve, to our knowledge, the first near-optimal quantum estimators for parameterized $q$-entropy for non-integer $q$.", "url": "https://arxiv.org/abs/2605.03685", "type": "理论+数值", "summary": "我们提出了一个针对离散分布 $(p_i)_{i=1}^n$ 的函数 $\\sum_{i=1}^n f(p_i)$ 的量子多级估计框架。我们将值 $p_i$ 划分为对数个间隔，其长度呈指数衰减。对于每个区间，我们执行非破坏性奇异值辨别来隔离相关的 $p_i$，从而能够自适应估计该区间上的部分和。与以前的可变时间方法不同，我们的方法避免了高控制开销，并且仅需要恒定的额外辅助量子位。作为一个应用，我们提出了离散分布 $q$-Tsallis 熵的有效量子估计器。具体来说：（i）对于 $q > 1$，我们获得了一个查询复杂度为 $\\tilde{\\Theta}(1/\\varepsilon^{\\max\\{1/(2(q-1)), 1\\}})$ 的接近最优量子算法，改进了 Liu 和 Wang 的先验最佳 $O(1/\\varepsilon^{1+1/(q-1)})$ (SODA 2025; IEEE Trans. Inf.理论2026）。 (ii) 对于 $0 < q < 1$，我们获得查询复杂度为 $\\tilde{O}(n^{1/q-1/2}/\\varepsilon^{1/q})$ 的量子算法，由于 Jiao、Venkat、Han 和 Weissman (IEEE Trans. Inf. Theory 2017) 的贡献，比近乎最优的经典估计器表现出量子加速。\n\n据我们所知，我们的结果实现了第一个接近最优的非整数 $q$ 参数化 $q$ 熵的量子估计器。", "authors": [{"name": "Kean Chen"}, {"name": "Minbo Gao"}, {"name": "Tongyang Li"}, {"name": "Qisheng Wang"}, {"name": "Xinzhao Wang"}], "featured_authors": [{"name": "Kean Chen"}, {"name": "Minbo Gao"}, {"name": "Tongyang Li"}, {"name": "Qisheng Wang"}, {"name": "Xinzhao Wang"}], "author_count": 5}, {"id": "2605.03715", "category": "quant-ph", "title": "Real-time Krylov Diagonalisation for Open Quantum Systems", "abstract": "In this chapter we present how real-time quantum subspace methods can be modified to simulate open quantum systems in Lindblad form. We apply these methods to a two-photon driven superconducting Kerr resonator and show how they allow to estimate the Liouvillian gap in the Kerr Cat qubit regime. This is based on work done between November 2025 and January 2026 and on the talk given in early February 2026 at the Kwekfest 2026 conference, to celebrate L.C. Kwek's lifetime achievements.", "url": "https://arxiv.org/abs/2605.03715", "type": "理论", "summary": "在本章中，我们介绍如何修改实时量子子空间方法以模拟 Lindblad 形式的开放量子系统。我们将这些方法应用于双光子驱动的超导克尔谐振器，并展示它们如何能够估计克尔猫量子位体系中的刘维尔能隙。这是基于 2025 年 11 月至 2026 年 1 月期间完成的工作以及 2026 年 2 月上旬 Kwekfest 2026 会议上为庆祝 L.C.郭先生一生的成就。", "authors": [{"name": "D. A. Herrera-Martí"}], "featured_authors": [{"name": "D. A. Herrera-Martí"}], "author_count": 1}, {"id": "2605.03761", "category": "quant-ph", "title": "A density-matrix derivation of the Hartree--Fock equations in a nonorthogonal atomic-orbital basis", "abstract": "We present a pedagogical derivation of the Hartree--Fock equations using the second-quantization atomic-orbital density-matrix formalism developed by Kjærgaard, Jørgensen, Olsen, Coriani, and Helgaker for AO-based response theory. The purpose is to introduce an alternative derivation of the Hartree--Fock equation, showing that the standard AO Hartree--Fock stationarity condition follows naturally from the exponential parametrization of the one-particle density matrix in a nonorthogonal AO basis. This route provides a compact bridge between elementary Hartree--Fock theory and the density-matrix machinery used in modern response theory and linear-scaling formulations.", "url": "https://arxiv.org/abs/2605.03761", "type": "理论", "summary": "我们使用 Kjærgaard、Jørgensen、Olsen、Coriani 和 Helgaker 为基于 AO 的响应理论开发的第二量子化原子轨道密度矩阵形式，提出了 Hartree--Fock 方程的教学推导。目的是引入 Hartree--Fock 方程的另一种推导，表明标准 AO Hartree--Fock 平稳性条件自然地遵循非正交 AO 基础中单粒子密度矩阵的指数参数化。该路线在基本 Hartree-Fock 理论和现代响应理论和线性标度公式中使用的密度矩阵机制之间提供了一座紧凑的桥梁。", "authors": [{"name": "Thomas Kjærgaard"}], "featured_authors": [{"name": "Thomas Kjærgaard"}], "author_count": 1}, {"id": "2605.03794", "category": "quant-ph", "title": "Caustics and catastrophes in strong-field physics -- Picard--Lefschetz theory as a universal approach to saddle-point methods in attosecond science", "abstract": "Ultrashort laser pulses on the attosecond timescale are typically achieved via high-order harmonic generation (HHG), a nonlinear process in which atoms interact with intense light fields to emit a broad spectrum of harmonics. HHG is commonly described in terms of a `quantum orbits' model based on several interfering electron trajectories, thereby incorporating both quantum-mechanical effects and an intuitive picture of classical dynamics. By tuning the parameters of the driving laser field, the interplay between these trajectories can be controlled, shaping the emitted light. Mathematically, this model expresses the harmonic response as a highly oscillatory integral. Applying saddle-point methods to this integral allows it to be decomposed into contributions from distinct saddle points of the semi-classical action, thereby linking quantum dynamics to classical trajectories. However, a general framework for applying these methods across arbitrary parameters and laser configurations has been missing. In this thesis, we introduce Picard--Lefschetz theory and develop practical numerical methods for its application. These enable the evaluation of oscillatory integrals and identification of contributions from individual critical points. We apply these techniques to strong-field ionisation and HHG, focusing on caustics -- enhancement features where trajectories coalesce and standard approximations fail. Our methods remain valid in these regions, allowing systematic analysis of parameter regimes and revealing previously inaccessible features. This work improves the understanding and control of ultrafast light--matter interactions.", "url": "https://arxiv.org/abs/2605.03794", "type": "理论+数值", "summary": "阿秒时间尺度的超短激光脉冲通常通过高阶谐波产生（HHG）来实现，这是一种非线性过程，原子与强光场相互作用以发射广谱谐波。 HHG 通常用基于多个干涉电子轨迹的“量子轨道”模型来描述，从而结合了量子力学效应和经典动力学的直观图像。通过调整驱动激光场的参数，可以控制这些轨迹之间的相互作用，从而塑造发射的光。在数学上，该模型将谐波响应表示为高度振荡积分。对这个积分应用鞍点方法可以将其分解为半经典作用的不同鞍点的贡献，从而将量子动力学与经典轨迹联系起来。然而，缺少在任意参数和激光配置上应用这些方法的通用框架。在本论文中，我们介绍了Picard--Lefschetz理论并为其应用开发了实用的数值方法。\n\n这些可以评估振荡积分并识别各个关键点的贡献。我们将这些技术应用于强场电离和 HHG，重点关注焦散——轨迹合并和标准近似失败的增强功能。我们的方法在这些区域仍然有效，允许对参数范围进行系统分析并揭示以前无法访问的特征。这项工作提高了对超快光与物质相互作用的理解和控制。", "authors": [{"name": "Anne Weber"}], "featured_authors": [{"name": "Anne Weber"}], "author_count": 1}, {"id": "2605.03807", "category": "quant-ph", "title": "The Geometric Part of Decoherence: Quasi-Orthogonality in High-Dimensional Hilbert Spaces", "abstract": "We isolate a geometric mechanism that complements the dynamical suppression of macroscopic interference: In a high-dimensional Hilbert space, almost all state vectors are nearly orthogonal, accommodating an exponentially large reservoir of mutually quasi-orthogonal environmental records. This geometry explains why macroscopic alternatives fail to exhibit visible interference once such records are populated. The argument is conditional and finite-dimensional, and it leaves the interpretive core of quantum mechanics untouched: geometry alone does not select a pointer basis, does not guarantee that a given Hamiltonian drives the system into typical regions of the accessible subspace, and does not turn an improper mixture into a proper one. It merely supplies the vast Hilbert-space capacity that makes decoherence so overwhelmingly effective for all practical purposes.", "url": "https://arxiv.org/abs/2605.03807", "type": "理论", "summary": "我们分离出一种补充宏观干扰动态抑制的几何机制：在高维希尔伯特空间中，几乎所有状态向量几乎正交，容纳指数级大的相互准正交环境记录库。这种几何结构解释了为什么一旦填充此类记录，宏观替代方案就无法表现出可见的干扰。这个论证是有条件的和有限维的，它没有触及量子力学的解释核心：几何本身并不能选择指针基础，不能保证给定的哈密顿量将系统驱动到可访问子空间的典型区域，并且不能将不正确的混合变成适当的混合。它只是提供了巨大的希尔伯特空间容量，使退相干对于所有实际目的都非常有效。", "authors": [{"name": "Karl Svozil"}], "featured_authors": [{"name": "Karl Svozil"}], "author_count": 1}, {"id": "2605.03836", "category": "quant-ph", "title": "Path integral quantization of the electromagnetic field in nonlinear dielectric materials", "abstract": "We construct a quantum theory of light in nonlinear dielectric media with dispersion and absorption. We employ a mesoscopic model for the light-matter interaction that include a fourth-order nonlinearity in the material response. Quantization is performed by constructing an effective action in a path-integral formalism by integrating out matter and bath degrees of freedom. We show how a nonlinear response function associated with Kerr nonlinearity is obtained through the model and, after full field quantization, we derive the Feynman rules from this theory.", "url": "https://arxiv.org/abs/2605.03836", "type": "理论", "summary": "我们构建了具有色散和吸收的非线性介电介质中的光量子理论。我们采用光与物质相互作用的介观模型，其中包括材料响应中的四阶非线性。量化是通过整合物质和浴的自由度来构建路径积分形式主义中的有效动作来执行的。我们展示了如何通过模型获得与克尔非线性相关的非线性响应函数，并且在全场量化后，我们从该理论推导出费曼规则。", "authors": [{"name": "Arman Kashef"}, {"name": "Oscar Perearnau Herrero"}, {"name": "Alexander Szameit"}, {"name": "Marco Ornigotti"}, {"name": "Stefan Scheel"}], "featured_authors": [{"name": "Arman Kashef"}, {"name": "Oscar Perearnau Herrero"}, {"name": "Alexander Szameit"}, {"name": "Marco Ornigotti"}, {"name": "Stefan Scheel"}], "author_count": 5}, {"id": "2605.03906", "category": "quant-ph", "title": "Variational Joint Magnetometry and Gradiometry on Dipolar Spin Chains", "abstract": "Estimating a uniform magnetic field B0 and its spatial gradient g on a dipolar-coupled spin chain calls for a multiparameter figure of merit. The GHZ state, optimal for single-parameter Heisenberg-limited sensing, has a rank-one quantum Fisher information matrix with det(Q^GHZ) = 0 at every chain length N, ruling it out for the two-parameter problem. We present a variational framework that takes det(F) as the objective and a hardware-motivated layered dipolar circuit as the ansatz. Both encoding generators are diagonal in the computational basis, which reduces the search for the quantum Fisher information benchmark to a probability-simplex optimization and yields a tractable best-found benchmark det(Q*) against which variational performance is compared. The same diagonal structure makes the classical Fisher information depend only on basis-state probabilities under any single-qubit decoder, so encoder and decoder parameters are co-trained with CMA-ES in a single run. Decoder optimization past fixed Ramsey adds at most a few percentage points across the grid, in contrast to the persistent decoder gains seen in our prior single-parameter work. Variational probes at L = 3 reach 0.92 of the best-found benchmark at N = 5, a 4.2x SQL advantage in det(F), and concentrate on a four-string motif of the two GHZ extrema and two half-chain-flip strings whose structure follows from the Dicke-sector decomposition of the two generators.", "url": "https://arxiv.org/abs/2605.03906", "type": "理论+数值", "summary": "估计偶极耦合自旋链上的均匀磁场 B0 及其空间梯度 g 需要多参数品质因数。 GHZ 状态是单参数海森堡有限传感的最佳状态，具有一阶量子费希尔信息矩阵，在每个链长度 N 处 det(Q^GHZ) = 0，从而排除了二参数问题。我们提出了一个变分框架，以 det(F) 为目标，以硬件驱动的分层偶极电路作为 ansatz。两个编码生成器在计算基础上都是对角的，这将量子费希尔信息基准的搜索减少到概率单纯形优化，并产生易于处理的最佳找到基准 det(Q*)，与变分性能进行比较。相同的对角线结构使得经典 Fisher 信息仅依赖于任何单量子位解码器下的基态概率，因此编码器和解码器参数在单次运行中与 CMA-ES 共同训练。与我们之前的单参数工作中看到的持续解码器增益相比，超过固定 Ramsey 的解码器优化最多在整个网格中增加几个百分点。\n\nL = 3 时的变分探针达到 N = 5 时最佳发现基准的 0.92，在 det(F) 中具有 4.2 倍的 SQL 优势，并且集中于两个 GHZ 极值和两个半链翻转字符串的四字符串主题，其结构遵循两个生成器的 Dicke 扇区分解。", "authors": [{"name": "Priyam Srivastava"}, {"name": "Xin Jin"}, {"name": "Junyu Liu"}, {"name": "Gurudev Dutt"}, {"name": "Tom Purdy"}, {"name": "Kang Kim"}, {"name": "Kaushik P. Seshadreesan"}], "featured_authors": [{"name": "Priyam Srivastava"}, {"name": "Xin Jin"}, {"name": "Junyu Liu"}, {"name": "Tom Purdy"}, {"name": "Kang Kim"}, {"name": "Kaushik P. Seshadreesan"}], "author_count": 7}, {"id": "2605.03930", "category": "quant-ph", "title": "Time-dependent variational Monte Carlo without bias", "abstract": "When combined with highly expressive ansatz functions such as neural quantum states, variational Monte Carlo (VMC) constitutes a versatile numerical approach to tackle the quantum many-body problem in and out of equilibrium. However, its traditional formulation exhibits a subtle estimation bias leading to inaccuracies, which can be particularly detrimental when addressing real time dynamics. In this work, we investigate two avenues to circumvent said estimation bias. First, we propose an unbiased variant of time-dependent VMC using self-normalized importance sampling with respect to a cutoff-based deformation of the Born distribution. We demonstrate the feasibility and accuracy of the approach in pathological and generic cases of quench dynamics. Furthermore, we explore an alternative sampling strategy based on active learning via the tensor cross interpolation (TCI). While we find that our choice of tensor network architecture lacks the required low rank property, the proposed TCI-based algorithm complements the conventional importance sampling paradigm, providing an alternative perspective that may be further explored in future work.", "url": "https://arxiv.org/abs/2605.03930", "type": "数值", "summary": "当与神经量子态等高度表达的 ansatz 函数相结合时，变分蒙特卡罗 (VMC) 构成了一种通用的数值方法，可以解决平衡态和非平衡态的量子多体问题。然而，其传统公式表现出微妙的估计偏差，导致不准确，这在处理实时动态时尤其有害。在这项工作中，我们研究了两种规避上述估计偏差的途径。首先，我们提出了一种时间相关 VMC 的无偏变体，使用自归一化重要性采样相对于 Born 分布的基于截止的变形。我们证明了该方法在淬火动力学的病理和一般情况下的可行性和准确性。此外，我们通过张量交叉插值（TCI）探索基于主动学习的替代采样策略。虽然我们发现我们选择的张量网络架构缺乏所需的低秩属性，但所提出的基于 TCI 的算法补充了传统的重要性采样范式，提供了可以在未来工作中进一步探索的替代视角。", "authors": [{"name": "Wladislaw Krinitsin"}, {"name": "Markus Schmitt"}], "featured_authors": [{"name": "Wladislaw Krinitsin"}, {"name": "Markus Schmitt"}], "author_count": 2}, {"id": "2605.03958", "category": "quant-ph", "title": "Fisher-Informational Time: A Causal-Geometric Framework for Emergent Clock Time Physical Distinguishability", "abstract": "We develop a Fisher-informational reformulation of physical time in which clock time is not regarded as a fundamental ontological substance, but as an emergent calibration of causally ordered distinguishability among physical states. The operational starting point is that clocks do not measure time itself; rather, they instantiate reproducible physical processes whose distinguishable states are correlated with other events. We introduce a causal-informational parameter, denoted by Lambda_F, defined as an accumulated Fisher-geometric distance along a causally admissible trajectory in state space. In classical statistical systems, this parameter is generated by the Fisher information metric; in quantum systems, the corresponding construction is associated with quantum Fisher information, the Bures metric, and the Fubini-Study geometry of projective Hilbert space. The manuscript distinguishes model-dependent Fisher information from quantum Fisher information, clarifies the reparameterization of Schrodinger dynamics, and gives explicit examples involving a qubit clock, an exponential decay process, and a Fisher characterization of clock quality. The proposal is positioned relative to relational time, the Page-Wootters mechanism, thermal time, quantum speed-limit relations, information geometry, and the problem of time in quantum gravity. We do not claim that relational or emergent time is new. The specific contribution is the use of Fisher distinguishability as an operational precursor from which ordinary clock time can be reconstructed. In this sense, the central statement of the paper is: time is not measured by clocks; clock time is reconstructed from the Fisher distinguishability accumulated along causally ordered physical changes.", "url": "https://arxiv.org/abs/2605.03958", "type": "理论", "summary": "我们开发了物理时间的费希尔信息重构，其中时钟时间不被视为基本本体论实体，而是作为物理状态之间因果有序可区分性的紧急校准。操作的出发点是时钟本身并不测量时间；而是测量时间。相反，它们实例化了可再现的物理过程，其可区分的状态与其他事件相关。我们引入了一个因果信息参数，用 Lambda_F 表示，定义为沿着状态空间中因果允许轨迹累积的费舍尔几何距离。在经典统计系统中，这个参数是由Fisher信息度量生成的；在量子系统中，相应的构造与量子费希尔信息、Bures度量和射影希尔伯特空间的富比尼研究几何相关。该手稿将模型相关的费舍尔信息与量子费舍尔信息区分开来，阐明了薛定谔动力学的重新参数化，并给出了涉及量子位时钟、指数衰减过程和时钟质量的费舍尔表征的明确示例。\n\n该提案的定位涉及关系时间、佩奇-伍特斯机制、热时间、量子速度极限关系、信息几何和量子引力中的时间问题。我们并不认为关系时间或紧急时间是新的。具体贡献是使用费舍尔可区分性作为可以重建普通时钟时间的操作先驱。从这个意义上说，论文的中心论点是：时间不是用钟来测量的；而是用时间来测量的。时钟时间是根据沿着因果顺序的物理变化累积的费舍尔可区分性重建的。", "authors": [{"name": "J. Sumaya-Martinez"}], "featured_authors": [{"name": "J. Sumaya-Martinez"}], "author_count": 1}, {"id": "2605.04011", "category": "quant-ph", "title": "Nonlinear Compton scattering in a frequency-modulated field", "abstract": "When an electron is accelerated, it emits radiation. In the relativistic quantum realm the elementary radiation process is the emission of a single photon, a process known as nonlinear Compton scattering in the case of an electron moving in the presence of a strong electromagnetic wave. This process is typically described within the Furry picture, where the electromagnetic wave is described as a classical background field and the electron-positron field is quantized in the presence of that background field. Equivalently one can quantize the electron-positron field in the vacuum but then the photon emission process is described as a transition from an initial state to a final state both featuring, apart from the electron (the initial state) and the electron and the photon (the final state), the same coherent state of photons appropriately related to the electromagnetic wave. Here, we consider a more general situation where the initial and the final state feature the same squeezed coherent state. Then, we specialize to the case where the coherent state corresponds to a plane-wave field and the mostly populated modes of the coherent state are also squeezed. We show that, when quantum fluctuations induced by the squeezing in the coherent field are negligible, a condition well satisfied at available squeezing levels, the squeezing effects effectively reduce to a frequency modulation of the plane-wave field corresponding to the coherent state. By means of numerical examples we show that at already available squeezing levels the emission spectrum of nonlinear Compton scattering and the total photon yield can be altered significantly. Analytical explanations of the main numerical results are also provided.", "url": "https://arxiv.org/abs/2605.04011", "type": "数值", "summary": "当电子加速时，它会发出辐射。在相对论量子领域，基本辐射过程是单个光子的发射，在电子在强电磁波存在的情况下移动的情况下，该过程称为非线性康普顿散射。这个过程通常在 Furry 图片中描述，其中电磁波被描述为经典背景场，而电子-正电子场在该背景场存在的情况下被量子化。同样，我们可以量化真空中的电子-正电子场，但光子发射过程被描述为从初始状态到最终状态的转变，除了电子（初始状态）以及电子和光子（最终状态）之外，光子发射过程都具有与电磁波适当相关的相同光子相干状态。在这里，我们考虑一种更一般的情况，其中初始状态和最终状态具有相同的压缩相干状态。然后，我们专门研究相干态对应于平面波场并且相干态的大多数分布模式也被压缩的情况。\n\n我们表明，当相干场中的挤压引起的量子涨落可以忽略不计（在可用挤压水平下很好地满足这一条件）时，挤压效应有效地减少到与相干态相对应的平面波场的频率调制。通过数值例子，我们表明，在现有的压缩水平下，非线性康普顿散射的发射光谱和总光子产率可以显着改变。还提供了主要数值结果的分析解释。", "authors": [{"name": "Antonino Di Piazza"}, {"name": "Kenan Qu"}], "featured_authors": [{"name": "Antonino Di Piazza"}, {"name": "Kenan Qu"}], "author_count": 2}, {"id": "2605.04026", "category": "quant-ph", "title": "Entanglement transitions in translation-invariant tensor networks", "abstract": "We study the complexity of approximately contracting translation-invariant tensor networks. The computational cost of row-by-row tensor network contraction, which defines a discrete time evolution governed by a fixed transfer matrix, is associated with the entanglement of the state of a row. By analyzing a family of tensor networks whose transfer matrices interpolate between chaotic Floquet and strongly non-unitary limits, we uncover a transition between volume- and area-law entanglement in states evolved under the transfer matrix. We show that deep in the volume-law phase the spectrum of the transfer matrix in the complex plane consists of a dense ring with a sharp outer edge, reminiscent of behavior identified for non-unitary random matrices. At late times an evolving row state therefore has significant contributions from many eigenvectors with nearly degenerate eigenvalue magnitudes. In the area-law phase, there is instead a distinct leading eigenvalue. Our results establish connections between contraction complexity, spectral propertie
