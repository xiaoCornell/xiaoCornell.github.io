s of the transfer matrix, and purification under non-unitary dynamics.", "url": "https://arxiv.org/abs/2605.04026", "type": "理论+数值", "summary": "我们研究近似收缩平移不变张量网络的复杂性。逐行张量网络收缩的计算成本定义了由固定传输矩阵控制的离散时间演化，与行状态的纠缠相关。通过分析一系列张量网络，其传输矩阵在混沌 Floquet 和强非酉极限之间进行插值，我们发现了在传输矩阵下演化的状态中体积定律和面积定律纠缠之间的转变。我们证明，在体积定律阶段的深处，复平面中的传输矩阵的谱由具有尖锐外边缘的致密环组成，让人想起非酉随机矩阵的行为。因此，在后期，不断演化的行状态具有来自许多具有近简并特征值大小的特征向量的显着贡献。在面积律阶段，有一个明显的主导特征值。我们的结果建立了收缩复杂性、传输矩阵的光谱特性和非酉动力学下的净化之间的联系。", "authors": [{"name": "Yi-Cheng Wang"}, {"name": "Samuel J. Garratt"}, {"name": "Ehud Altman"}], "featured_authors": [{"name": "Yi-Cheng Wang"}, {"name": "Samuel J. Garratt"}, {"name": "Ehud Altman"}], "author_count": 3}, {"id": "2605.04042", "category": "quant-ph", "title": "Ergotropy Protection via Cavity Detuning in Collective Open Quantum Batteries", "abstract": "This study investigates the performance and ergotropy protection of open collective quantum batteries subject to superradiant decay. By employing a passive spectral detuning strategy within an intermediate cavity, an optimal detuning value ($\\Delta^*$) is analytically derived and numerically verified to spectrally isolate the system and protect quantum coherence, achieving up to 1088% ergotropy improvement for single qubits and superextensive collective advantage for $N \\ge 3$. Our analysis resolves a \"non-Markovian paradox,\" revealing that maximizing ergotropy does not strictly require non-Markovian memory; rather, suppressing environmental memory via detuning optimally preserves coherence, which serves as the fundamental resource. Survival maps across different environments demonstrate that thermal noise dissipates coherence more severely than telegraph noise. Finally, we establish that collective amplification of the effective coupling ($g_{\\rm eff} = g\\sqrt{N})$ inevitably drives large qubit arrays into the ultra-strong coupling regime, providing a quantitative ceiling $N_{\\rm max}$ on the validity of the Tavis-Cummings description and the current ergotropy protection protocol.", "url": "https://arxiv.org/abs/2605.04042", "type": "理论+数值", "summary": "这项研究研究了受超辐射衰变影响的开放集体量子电池的性能和各向异性保护。通过在中间腔内采用无源光谱失谐策略，通过分析推导和数值验证最佳失谐值 ($\\Delta^*$)，以光谱隔离系统并保护量子相干性，实现单个量子位高达 1088% 的各向异性改进和 $N \\ge 3$ 的超广泛集体优势。我们的分析解决了“非马尔可夫悖论”，揭示了最大化ergotropy并不严格需要非马尔可夫记忆；相反，通过失谐抑制环境记忆可以最佳地保留作为基本资源的一致性。不同环境下的生存图表明，热噪声比电报噪声更严重地耗散相干性。最后，我们确定有效耦合的集体放大 ($g_{\\rm eff} = g\\sqrt{N})$ 不可避免地会驱动大型量子位阵列进入超强耦合状态，从而为 Tavis-Cummings 描述和当前的逆向性保护协议的有效性提供了定量上限 $N_{\\rm max}$。", "authors": [{"name": "Tariq Zeyad Jawad"}], "featured_authors": [{"name": "Tariq Zeyad Jawad"}], "author_count": 1}, {"id": "2605.04047", "category": "quant-ph", "title": "Sequential vs. Simultaneous Entanglement Swapping under Optimal Link-Layer Control", "abstract": "Connection-less, packet-switched quantum network architectures distribute entanglement across multi-hop paths through sequential entanglement swapping, in which each node acts on purely local state information. The architectural advantages over the connection-oriented alternative -- simultaneous SWAP-ASAP -- are compelling, but sequential swapping holds partial chains in intermediate buffers between successive swaps, exposing them to memory decoherence in a way simultaneous SWAP-ASAP avoids by design. We present a proof-of-principle study at fixed chain length $n = 4$ in which each elementary link is governed by a fixed reinforcement-learning policy optimizing the secret-key rate of the six-state protocol, leaving the network-layer protocol as the sole independent variable. Sweeping the network-layer memory coherence time $T_c^{\\mathrm{ext}}$ over four orders of magnitude reveals a clear regime structure governed by the dimensionless ratio $T_c^{\\mathrm{ext}}/\\tau$, where $\\tau$ is the per-link entanglement heralding latency. Simultaneous SWAP-ASAP delivers a constant rate across the full sweep. Sequential swapping, by contrast, collapses to zero end-to-end deliveries below $T_c^{\\mathrm{ext}}/\\tau = 25$, and begins recovering at $T_c^{\\mathrm{ext}}/\\tau = 50$. It remains limited by the simultaneous rate, which it saturates only at the relaxed end of the sweep. These results suggest that the connection-less penalty is a near-term phenomenon tied to present-day memory coherence rather than a fundamental property of sequential swapping.", "url": "https://arxiv.org/abs/2605.04047", "type": "理论+数值", "summary": "无连接、分组交换的量子网络架构通过顺序纠缠交换在多跳路径上分布纠缠，其中每个节点仅作用于本地状态信息。与面向连接的替代方案（同步 SWAP-ASAP）相比，其架构优势非常引人注目，但顺序交换将部分链保留在连续交换之间的中间缓冲区中，从而使它们暴露在内存退相干的情况下，而同步 SWAP-ASAP 在设计上就避免了这种情况。我们提出了一项固定链长度 $n = 4$ 的原理验证研究，其中每个基本链接都由优化六态协议密钥率的固定强化学习策略控制，将网络层协议作为唯一的自变量。将网络层内存一致性时间 $T_c^{\\mathrm{ext}}$ 扫描四个数量级，揭示了由无量纲比率 $T_c^{\\mathrm{ext}}/\\tau$ 控制的清晰的机制结构，其中 $\\tau$ 是预示延迟的每个链路纠缠。同时 SWAP-ASAP 在整个扫描过程中提供恒定的速率。\n\n相比之下，顺序交换在低于 $T_c^{\\mathrm{ext}}/\\tau = 25$ 时崩溃至零端到端交付，并在 $T_c^{\\mathrm{ext}}/\\tau = 50$ 时开始恢复。它仍然受到同时速率的限制，仅在扫描的松弛端才饱和。这些结果表明，无连接惩罚是一种与当前内存一致性相关的近期现象，而不是顺序交换的基本属性。", "authors": [{"name": "Priyam Srivastava"}, {"name": "Akshat R. Sabavat"}, {"name": "Siddharth Jain"}, {"name": "Alan Scheller-Wolf"}, {"name": "Sridhar Tayur"}, {"name": "David Tipper"}, {"name": "Prashant Krishnamurthy"}, {"name": "Amy Babay"}, {"name": "Kaushik P. Seshadreesan"}], "featured_authors": [{"name": "Priyam Srivastava"}, {"name": "Akshat R. Sabavat"}, {"name": "Siddharth Jain"}, {"name": "Prashant Krishnamurthy"}, {"name": "Amy Babay"}, {"name": "Kaushik P. Seshadreesan"}], "author_count": 9}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
