acer (Parylene C). In the thin-rod regime, the longitudinal phase velocity reduces to $c=\\sqrt{E/\\rho}$, which coincides with the regime in which the elastic modulus of NiTiCu has been measured directly through its acoustic response across the martensitic transformation. Using the standard transfer-matrix method along the heating and cooling branches of the transformation separately, we compute the Bloch band structure of the infinite periodic system and the transmission spectrum of finite composite rods. Because the elastic modulus of NiTiCu follows different paths upon heating and cooling, the same external temperature within the transformation interval corresponds to two different phase fractions and, consequently, to two different phononic spectra. The resulting hysteresis of the underlying material is thus transferred to the collective acoustic response of the periodic structure: stop-band edges trace closed loops in the temperature--frequency plane, and the transmission coefficient of a finite rod at a fixed temperature depends on the previous thermal history. We further show that the geometric filling fraction of the active segment provides a complementary tuning mechanism, modifying the width of the spectral hysteresis loops and the position of specific gap closures independently of temperature. These results illustrate how a first-order structural phase transition with intrinsic thermal hysteresis manifests itself in the dispersion relation of a periodic elastic medium.", "url": "https://arxiv.org/abs/2605.30028", "type": "理论", "summary": "我们研究了一维周期性复合棒中纵向弹性波的传播，该复合棒由形状记忆合金 (NiTiCu) 和聚合物垫片 (Parylene C) 的交替片段组成。在细棒状态下，纵向相速度降低至 $c=\\sqrt{E/\\rho}$，这与通过马氏体转变的声学响应直接测量 NiTiCu 弹性模量的状态一致。使用标准传递矩阵方法分别沿着变换的加热和冷却分支，计算无限周期系统的布洛赫能带结构和有限复合棒的透射谱。由于 NiTiCu 的弹性模量在加热和冷却时遵循不同的路径，因此转变区间内的相同外部温度对应于两个不同的相分数，因此对应于两个不同的声子谱。\n\n由此产生的底层材料的滞后现象被转移到周期性结构的集体声学响应：阻带边缘在温度-频率平面中跟踪闭合环路，并且固定温度下有限杆的传输系数取决于先前的热历史。我们进一步表明，有源段的几何填充分数提供了一种互补的调谐机制，可以独立于温度修改光谱磁滞回线的宽度和特定间隙闭合的位置。这些结果说明了具有固有热滞后的一阶结构相变如何在周期性弹性介质的色散关系中表现出来。", "authors": [{"name": "R. Esquivel-Sirvent"}, {"name": "B. Manzanares-Martínez"}, {"name": "J. Manzanares-Martínez"}], "featured_authors": [{"name": "R. Esquivel-Sirvent"}, {"name": "B. Manzanares-Martínez"}, {"name": "J. Manzanares-Martínez"}], "author_count": 3}, {"id": "2605.30061", "category": "cond-mat", "title": "Slave-rotor theory of correlated altermagnets on the Lieb lattice", "abstract": "We investigate the metal-insulator transition driven by the onsite repulsive interaction $U$ in an altermagnetic Hubbard model defined on a Lieb lattice. Using the slave-rotor approach at half filling, we find that the system exhibits a cascade of interaction-driven phase transitions. As $U$ increases, the system evolves from a normal metal to an altermagnetic metal, then to an altermagnetic insulator, and eventually to an altermagnetic Mott insulator characterized by the complete suppression of the quasiparticle weight. These phases are supported by the calculation of the electronic spectral function, which features spin-split bands in both the metallic and insulating regimes. However, the spin splitting becomes substantially suppressed in the Mott insulating phase. Our results suggest that the observation of spin splitting in the spectral function of $d$-wave altermagnets with a Lieb-lattice-like structure may be limited to the weak-to-moderate correlation regime.", "url": "https://arxiv.org/abs/2605.30061", "type": "理论+数值", "summary": "我们研究了在 Lieb 晶格上定义的交变哈伯德模型中由现场排斥相互作用 $U$ 驱动的金属-绝缘体转变。使用半填充时的从动转子方法，我们发现系统表现出一系列相互作用驱动的相变。随着 $U$ 的增加，系统从普通金属演变为交变磁金属，然后演变为交变磁绝缘体，最终演变为以完全抑制准粒子重量为特征的交变磁莫特绝缘体。这些相得到了电子谱函数计算的支持，该函数在金属和绝缘状态下都具有自旋分裂能带。然而，自旋分裂在莫特绝缘相中被显着抑制。我们的结果表明，具有类利布晶格结构的$d$波交替磁体的谱函数中自旋分裂的观察可能仅限于弱到中等的相关范围。", "authors": [{"name": "Vanuildo S. de Carvalho"}, {"name": "Hermann Freire"}, {"name": "Rodrigo G. Pereira"}], "featured_authors": [{"name": "Vanuildo S. de Carvalho"}, {"name": "Hermann Freire"}, {"name": "Rodrigo G. Pereira"}], "author_count": 3}, {"id": "2605.30084", "category": "cond-mat", "title": "Supercooling of liquids, as described by the Enskog-Vlasov kinetic equation", "abstract": "A model combining Enskog's collision integral for dense fluids with a Vlasov-style description of the van der Waals force is applied to supercooling. First, the spinodal temperature $T_{s}$ is calculated, at which a liquid becomes unstable to small perturbations and transitions to solid. In particular, it turns out that isochoric cooling allows one to reach a lower temperature than isobaric cooling. Second, the surface tension of a supercooled liquid-vapor interface is shown to diverge at $T_{s}$. The singularity is caused by an oscillatory region emerging on the liquid side of the interface as $T\\rightarrow T_{s}$; it develops because the liquid approaches instability, and the interface starts radiating (so far, evanescent) waves. At $T=T_{s}$, the waves cease to be evanescent and the oscillatory region extends to infinity -- hence, the singularity of the surface tension. Since this effect has a clear physical interpretation, it should occur regardless of the model and approximations under which it was obtained. This and the other results of the paper are illustrated using argon and several other fluids.", "url": "https://arxiv.org/abs/2605.30084", "type": "理论", "summary": "将 Enskog 的稠密流体碰撞积分与 Vlasov 式范德华力描述相结合的模型应用于过冷。首先，计算旋节线温度 $T_{s}$，在该温度下液体对小扰动变得不稳定并转变为固体。特别是，事实证明等容冷却可以达到比等压冷却更低的温度。其次，过冷液-汽界面的表面张力在 $T_{s}$ 处发散。奇点是由界面液体侧出现的振荡区域引起的，如 $T\\rightarrow T_{s}$；它的发展是因为液体接近不稳定，并且界面开始辐射（到目前为止，渐逝的）波。在 $T=T_{s}$ 处，波不再消失，振荡区域延伸至无穷大——因此，表面张力具有奇点。由于这种效应有明确的物理解释，因此无论模型和近似值如何获得，它都应该发生。本文的这一结果和其他结果是使用氩气和其他几种流体来说明的。", "authors": [{"name": "E. S. Benilov"}], "featured_authors": [{"name": "E. S. Benilov"}], "author_count": 1}, {"id": "2605.30125", "category": "cond-mat", "title": "Quantum Spin-5/2 Blume-Capel Model in a Random Transverse-Crystalline Field Anisotropy", "abstract": "In this work, we investigate the thermodynamic properties of the quantum Blume-Capel model with spin \\( S = 5/2 \\) in the presence of transverse and random crystalline fields. The system is described by a Hamiltonian that includes ferromagnetic exchange interactions between nearest neighbors, a longitudinal single-ion anisotropy, and a transverse single-ion anisotropy. Using a mean-field approach based on Bogoliubov's inequality for the Gibbs free energy, we derive the fundamental thermodynamic potential and the equation of state for the magnetization. The influence of the longitudinal and transverse anisotropy parameters on the magnetic ordering and phase transitions is analyzed in detail. We present magnetization versus temperature diagrams for various combinations of the anisotropies, exploring both positive and negative values. Our results reveal that the system exhibits standard second-order phase transitions for most parameter ranges, with no evidence of tricritical behavior. However, for certain positive values of the anisotropies, the model displays a first-order phase transition within the ordered phase, characterized by a jump from a higher-spin ordered state to a lower-spin ordered state. The critical temperatures are shown to be sensitive to the magnitude and sign of the anisotropy parameters. In particular, negative transverse anisotropies favor magnetic order, raising the critical temperature, while positive anisotropies promote disorder, lowering the critical temperature. This study provides a comprehensive analysis of the phase diagram of the \\( S = 5/2 \\) quantum Blume-Capel model and highlights the role of transverse fields in modifying the critical behavior.", "url": "https://arxiv.org/abs/2605.30125", "type": "理论+数值", "summary": "在这项工作中，我们研究了在存在横向和随机晶体场的情况下具有自旋 \\( S = 5/2 \\) 的量子 Blume-Capel 模型的热力学性质。该系统由哈密顿量描述，包括最近邻之间的铁磁交换相互作用、纵向单离子各向异性和横向单离子各向异性。使用基于 Bogoliubov 吉布斯自由能不等式的平均场方法，我们推导了基本热力学势和磁化状态方程。详细分析了纵向和横向各向异性参数对磁有序和相变的影响。我们展示了各向异性各种组合的磁化强度与温度的关系图，探索了正值和负值。我们的结果表明，该系统在大多数参数范围内表现出标准的二阶相变，没有三临界行为的证据。\n\n然而，对于某些正值的各向异性，模型显示有序相内的一阶相变，其特征是从较高自旋有序态跃迁到较低自旋有序态。临界温度对各向异性参数的大小和符号敏感。特别是，负横向各向异性有利于磁有序，提高临界温度，而正各向异性则促进无序，降低临界温度。这项研究对\\(S = 5/2\\)量子Blume-Capel模型的相图进行了全面分析，并强调了横向场在修改临界行为中的作用。", "authors": [{"name": "Claudio M. Salgado"}, {"name": "Karollaine C. Leite"}, {"name": "Thiago M. Tunes"}, {"name": "Marcelo F. Z. de Arruda"}, {"name": "Jorge L. B. de Faria"}, {"name": "Alberto S. de Arruda"}], "featured_authors": [{"name": "Claudio M. Salgado"}, {"name": "Karollaine C. Leite"}, {"name": "Thiago M. Tunes"}, {"name": "Marcelo F. Z. de Arruda"}, {"name": "Jorge L. B. de Faria"}, {"name": "Alberto S. de Arruda"}], "author_count": 6}, {"id": "2605.30128", "category": "cond-mat", "title": "Towards exascale fully relativistic pseudopotential density functional theory calculations enabled by mixed-precision computation and compressed-communication using residual based subspace iteration", "abstract": "Noncollinear (NC) magnetism and spin-orbit coupling (SOC) are indispensable for predictive ab initio materials simulations with pronounced relativistic effects and magnetic frustration, yet they significantly increase the cost of cubic-scaling density functional theory (DFT) by introducing complex 2-component wavefunctions per electron and consequently much larger eigenproblems. We present a GPU-centric high-performance framework for NC-SOC DFT that combines: (i) algorithmic advances for solving finite-element (FE) discretized DFT equations; (ii) residual-based Chebyshev filtered subspace iteration (R-ChFSI), tolerant to inexact matrix-vector products, for the resulting sparse generalized eigenproblem; (iii) a matrix-free strategy for accelerating FE Poisson solver; (iv) R-ChFSI-enabled mixed-precision computation with block floating-point compressed MPI communication at compression ratios over 4x, preserving double-precision robustness while reducing compute and data movement costs; and (v) a communication efficient band-partitioning algorithm to improve scalability. Numerical results demonstrate improved time-to-solution and excellent scaling on exascale architectures, enabling fully relativistic pseudopotential DFT simulations of up to 100,000 electrons.", "url": "https://arxiv.org/abs/2605.30128", "type": "理论+数值", "summary": "非共线 (NC) 磁性和自旋轨道耦合 (SOC) 对于具有明显相对论效应和磁挫败的预测性从头开始材料模拟来说是不可或缺的，但它们通过引入每个电子的复杂 2 分量波函数并因此引入更大的本征问题，显着增加了立方尺度密度泛函理论 (DFT) 的成本。我们提出了一个以 GPU 为中心的 NC-SOC DFT 高性能框架，该框架结合了：（i）求解有限元（FE）离散 DFT 方程的算法进步； (ii) 基于残差的切比雪夫滤波子空间迭代（R-ChFSI），能够容忍不精确的矩阵向量乘积，以解决所得的稀疏广义特征问题； (iii) 用于加速有限元泊松求解器的无矩阵策略； (iv) 支持 R-ChFSI 的混合精度计算，采用块浮点压缩 MPI 通信，压缩率超过 4 倍，保持双精度鲁棒性，同时降低计算和数据移动成本； (v) 一种通信高效的频带划分算法，以提高可扩展性。\n\n数值结果表明，解决问题的时间得到了改善，并且在百亿亿级架构上具有出色的扩展性，从而能够对多达 100,000 个电子进行完全相对论赝势 DFT 模拟。", "authors": [{"name": "Nikhil Kodali"}, {"name": "Gourab Panigrahi"}, {"name": "Nishant Gupta"}, {"name": "Kartick Ramakrishnan"}, {"name": "Sundaresan G"}, {"name": "Rudra Panch"}, {"name": "Sambit Das"}, {"name": "Vishwas Rao"}, {"name": "Phani Motamarri"}], "featured_authors": [{"name": "Nikhil Kodali"}, {"name": "Gourab Panigrahi"}, {"name": "Nishant Gupta"}, {"name": "Sambit Das"}, {"name": "Vishwas Rao"}, {"name": "Phani Motamarri"}], "author_count": 9}, {"id": "2605.30185", "category": "cond-mat", "title": "Theory of distribution skewness effect on polydisperse random close packing", "abstract": "We investigate the random close packing density, $\\phi_\\textrm{RCP}$, of polydisperse hard sphere systems using a theoretical framework based on the equilibrium model of crowding. We derive a closed-form solution for $\\phi_\\textrm{RCP}$ in terms of the moments of the diameter distribution, enabling an analytical exploration of the effects of polydispersity ($\\delta$) and skewness ($S$) on packing density. For a binary mixture, it is possible to explore a broader range of dependence of $\\phi_\\textrm{RCP}$ on $\\delta$ for a given $S$ or on $S$ for a given $\\delta$. We show that the dependencies of $\\phi_\\textrm{RCP}$ on skewness for a variety of continuous distributions collapse onto a theoretical master curve obtained for the binary mixture case. By correcting the theory so that it obeys known exact limiting behaviours for extreme size asymmetry, our analytical predictions not only agree with previously obtained numerical results, but also predict previously unexplored regions of the $\\phi_\\textrm{RCP}$ parameter space.", "url": "https://arxiv.org/abs/2605.30185", "type": "理论+数值", "summary": "我们使用基于拥挤平衡模型的理论框架研究多分散硬球系统的随机密堆积密度 $\\phi_\\textrm{RCP}$。我们根据直径分布矩推导出 $\\phi_\\textrm{RCP}$ 的封闭式解，从而能够分析探索多分散性 ($\\delta$) 和偏度 ($S$) 对堆积密度的影响。对于二元混合物，可以探索 $\\phi_\\textrm{RCP}$ 对给定 $S$ 的 $\\delta$ 或给定 $\\delta$ 的 $S$ 的更广泛的依赖性。我们表明，$\\phi_\\textrm{RCP}$ 对各种连续分布的偏度的依赖性崩溃到为二元混合情况获得的理论主曲线上。通过修正理论，使其遵循已知的极端尺寸不对称的精确限制行为，我们的分析预测不仅与先前获得的数值结果一致，而且还预测了 $\\phi_\\textrm{RCP}$ 参数空间中先前未探索的区域。", "authors": [{"name": "Vinay Vaibhav"}, {"name": "Carmine Anzivino"}, {"name": "Alessio Zaccone"}], "featured_authors": [{"name": "Vinay Vaibhav"}, {"name": "Carmine Anzivino"}, {"name": "Alessio Zaccone"}], "author_count": 3}, {"id": "2605.30196", "category": "cond-mat", "title": "Role of structure and charge trapping on the bipolaron formation and magnetic-field response of gated conjugated polymers", "abstract": "Conjugated polymers exhibit unique spin-dependent phenomena arising from weak yet critical hyperfine interactions. Understanding these spin effects, particularly the spin-dependent formation and decay of correlated spin pairs, is important for advancing both organic electronics and polymer-based spintronics. Intrinsic magnetic-field responses such as magnetoresistance have primarily been investigated in diode architectures, where electrons and holes coexist. However, such systems are less suitable for probing bipolaron formation in unipolar transport, and the relationship between polymer structure and bipolaron formation in lightly doped polymers remains unclear. Here, we systematically investigate intrinsic magnetoresistance in representative conjugated polymers using field-effect transistors and observe a generally positive magnetoresistance. First-principles simulations reveal that bipolarons preferentially form on short conjugated segments associated with amorphous regions. Moreover, comparisons across these polymers show that enhanced charge trapping correlates with stronger magnetoresistance, implying promoted bipolaron formation. Bipolaron-incorporated energylevel-alignment modeling near metal/polymer interfaces suggests that charge traps can increase the bipolaron density.", "url": "https://arxiv.org/abs/2605.30196", "type": "理论+数值", "summary": "共轭聚合物表现出由弱但关键的超精细相互作用引起的独特的自旋相关现象。了解这些自旋效应，特别是相关自旋对的自旋依赖性形成和衰变，对于推进有机电子学和基于聚合物的自旋电子学非常重要。磁阻等固有磁场响应主要在电子和空穴共存的二极管结构中进行研究。然而，此类系统不太适合探测单极输运中双极子的形成，并且轻掺杂聚合物中聚合物结构与双极子形成之间的关系仍不清楚。在这里，我们使用场效应晶体管系统地研究了代表性共轭聚合物中的固有磁阻，并观察到普遍的正磁阻。第一原理模拟表明，双极化子优先在与非晶区域相关的短共轭段上形成。此外，对这些聚合物的比较表明，增强的电荷捕获与更强的磁阻相关，这意味着促进双极子的形成。\n\n金属/聚合物界面附近的双极子结合能级对准模型表明，电荷陷阱可以增加双极子密度。", "authors": [{"name": "Zuchong Yang"}, {"name": "Vincent Lemaur"}, {"name": "Melissa Berteau-Rainville"}, {"name": "Olivier Bardagot"}, {"name": "Yoann Olivier"}, {"name": "Emanuele Orgiu"}], "featured_authors": [{"name": "Zuchong Yang"}, {"name": "Vincent Lemaur"}, {"name": "Melissa Berteau-Rainville"}, {"name": "Olivier Bardagot"}, {"name": "Yoann Olivier"}, {"name": "Emanuele Orgiu"}], "author_count": 6}, {"id": "2605.28926", "category": "hep-th", "title": "Multi-Loop Negative Geometries", "abstract": "Scattering amplitudes in planar ${\\cal N}=4$ supersymmetric Yang-Mills theory are dual to expectation values of null polygonal Wilson loops. The Amplituhedron provides a geometric construction for the all-loop integrand as the canonical form on the geometric region in the Grassmannian defined by a certain set of inequalities. For a closely related object, the logarithm of the scattering amplitude, the integrand is reproduced in a similar way using negative geometries. When integrated over all loop momenta except one, the result is infrared (IR) finite and equal to the expectation value of a certain Wilson loop with a Lagrangian insertion. At four points, this quantity, ${\\cal F}(g,z)$ only depends on a single cross ratio $z$ and the 't Hooft coupling $g$. At weak coupling, it is known up to three loops from perturbative Wilson loop computations and at strong coupling through the AdS/CFT correspondence at leading order. In this paper, we explore this object further through the lens of the Amplituhedron and negative geometries, which provide very natural IR finite building blocks. We perform an explicit three-loop computation of all negative geometries and show that the number of internal cycles in the diagram is closely linked to the depth of polylogarithms. We calculate the cusp anomalous dimension $\\Gamma_{\\rm cusp}$ by integrating ${\\cal F}(g,z)$ over $z$. We show that the higher-cycle diagrams are suppressed if we consider separate odd and even zeta contributions. Furthermore, we focus on certain convergent infinite series of one-cycle diagrams, perform all-loop order resummations of such contributions, and discuss various features of the result.", "url": "https://arxiv.org/abs/2605.28926", "type": "理论", "summary": "平面 ${\\cal N}=4$ 超对称杨-米尔斯理论中的散射振幅与零多边形威尔逊环的期望值是对偶的。幅面体为全环被积函数提供了一种几何构造，作为由一组特定的不等式定义的格拉斯曼几何区域的规范形式。对于密切相关的物体，散射幅度的对数，被积函数可以使用负几何以类似的方式再现。当对除一个之外的所有环动量进行积分时，结果是红外 (IR) 有限的，并且等于带有拉格朗日插入的某个威尔逊环的期望值。在四个点上，这个量 ${\\cal F}(g,z)$ 仅取决于单个交叉比 $z$ 和 't Hooft 耦合 $g$。在弱耦合时，通过微扰威尔逊环计算可知最多三个环，在强耦合时，通过前导阶的 AdS/CFT 对应关系可知。在本文中，我们通过幅面体透镜和负几何形状进一步探索这个物体，它们提供了非常自然的红外有限构建块。\n\n我们对所有负几何进行显式三循环计算，并表明图中的内部循环数量与多对数的深度密切相关。我们通过在 $z$ 上积分 ${\\cal F}(g,z)$ 来计算尖点异常尺寸 $\\Gamma_{\\rm cusp}$。我们表明，如果我们考虑单独的奇数和偶数 zeta 贡献，则高周期图会被抑制。此外，我们关注单循环图的某些收敛无限级数，对此类贡献进行全循环阶数恢复，并讨论结果的各种特征。", "authors": [{"name": "Lance J. Dixon"}, {"name": "Umut Oktem"}, {"name": "Shruti Paranjape"}, {"name": "Jaroslav Trnka"}, {"name": "Yongqun Xu"}, {"name": "Shun-Qing Zhang"}], "featured_authors": [{"name": "Lance J. Dixon"}, {"name": "Umut Oktem"}, {"name": "Shruti Paranjape"}, {"name": "Jaroslav Trnka"}, {"name": "Yongqun Xu"}, {"name": "Shun-Qing Zhang"}], "author_count": 6}, {"id": "2605.28933", "category": "hep-th", "title": "Analytic Bootstrap for $O(N)$ Boundary Conformal Field Theories with Interacting Boundaries", "abstract": "We investigate $O(N)$ boundary conformal field theories (BCFTs) with boundary interactions in $d=4-\\epsilon$ and $d=3-\\epsilon$ employing the analytic bootstrap. By deriving universal constraints on conformal data, we show that infinitely many operator expansions can be expressed in terms of a finite set of inputs. Complementing the analytic bootstrap with a perturbative renormalization-group analysis, we identify totally new boundary fixed points in $d=4-\\epsilon$, including non-unitary ones, generated by a boundary cubic coupling, and compute their conformal data to leading order. Moreover, we leverage our solution in $d=3-\\epsilon$ to extract, for the first time, the boundary conformal data for the tricritical $O(N)$ model. Altogether, our approach provides a unified prescription for BCFTs with interacting boundaries and streamlines the determination of bulk and boundary operator expansions.", "url": "https://arxiv.org/abs/2605.28933", "type": "理论", "summary": "我们使用解析自举法研究 $O(N)$ 边界共形场理论 (BCFT)，其边界相互作用在 $d=4-\\epsilon$ 和 $d=3-\\epsilon$ 中。通过推导共形数据的通用约束，我们表明可以用有限的输入集来表达无限多个算子展开式。通过扰动重整化群分析来补充解析自举，我们在 $d=4-\\epsilon$ 中识别出全新的边界不动点，包括由边界三次耦合生成的非酉不动点，并将它们的共形数据计算为前导阶。此外，我们利用 $d=3-\\epsilon$ 中的解决方案首次提取三临界 $O(N)$ 模型的边界共形数据。总而言之，我们的方法为具有相互作用边界的 BCFT 提供了统一的处方，并简化了体和边界算子展开式的确定。", "authors": [{"name": "Xinyu Sun"}, {"name": "Shao-Kai Jian"}, {"name": "Hong Yao"}], "featured_authors": [{"name": "Xinyu Sun"}, {"name": "Shao-Kai Jian"}, {"name": "Hong Yao"}], "author_count": 3}, {"id": "2605.28938", "category": "hep-th", "title": "Gravity Decoupling and Axionic Shift Symmetries", "abstract": "We analyse the rôle of approximate axionic shift symmetries in gravity-decoupling limits arising in type II Calabi-Yau compactifications. Associated with each shift symmetry there is an axionic string whose tension constrains the gradient of the Kähler potential, as expected in regimes where gravity becomes weakly coupled. The gradients of these tensions define vector fields on moduli space, analogous to those associated with BPS particle masses. Together, they characterise the evolution of different effective field theory sectors along asymptotic limits, encoding both their coupling to gravity and their kinetic mixing. By deriving upper bounds on the inner products of these vector fields, we show that they split into mutually orthogonal subsets, one of which decouples from gravity. Finally, we relate the Laplacian of certain axionic string tensions to a divergent moduli space curvature.", "url": "https://arxiv.org/abs/2605.28938", "type": "理论", "summary": "我们分析了 II 型卡拉比-丘致密化中产生的重力解耦极限中近似轴子位移对称性的作用。与每个位移对称性相关联的是轴子弦，其张力限制了凯勒势的梯度，正如在重力弱耦合的情况下所预期的那样。这些张力的梯度定义了模空间上的矢量场，类似于与 BPS 粒子质量相关的矢量场。它们共同描述了不同有效场论部分沿渐近极限的演化，编码了它们与重力的耦合以及它们的动力学混合。通过推导这些向量场的内积的上限，我们表明它们分裂成相互正交的子集，其中之一与重力解耦。最后，我们将某些轴子弦张力的拉普拉斯算子与发散模空间曲率联系起来。", "authors": [{"name": "Christian Aoufia"}, {"name": "Gonzalo F. Casas"}, {"name": "Fernando Marchesano"}], "featured_authors": [{"name": "Christian Aoufia"}, {"name": "Gonzalo F. Casas"}, {"name": "Fernando Marchesano"}], "author_count": 3}, {"id": "2605.28939", "category": "hep-th", "title": "Dynamical Entanglement Phase Transitions in Holographic CFTs", "abstract": "We study the time evolution of the entanglement structure of holographic conformal field theories after a local quench. Using the mutual information between two spatial intervals as a probe, we find that $1+1$-dimensional conformal field theories exhibit a rich pattern of dynamical phase transitions. In the large-central-charge limit, mutual information develops sharp non-analyticities at critical times, providing a concrete entanglement-based realization of dynamical quantum phase transitions. We find that the dynamics organize into six distinct phases of mutual information, each controlled by the dominance of a different conformal block, or equivalently, a different holographic geodesic configuration. This phase structure goes beyond the standard quasi-particle picture, explaining non-analytic features that are not captured by simple light-cone propagation from the quench points. We further identify a dynamical $D_4$ symmetry acting on the interval endpoints that controls the presence or absence of mutual information. The onset of mutual information is governed by the breaking of this symmetry to a $\\mathbb{Z}_2 \\times \\mathbb{Z}_2$ subgroup, suggesting a symmetry-based characterization of non-equilibrium entanglement dynamics analogous to the role of symmetry in equilibrium critical phenomena. Finally, numerical studies of critical spin chains indicate that finite-$c$ effects smooth out the sharp large-$c$ transitions between different mutual-information phases, while the transitions between phases with and without mutual information appear to remain non-analytic. These results offer a unifying perspective on real-time entanglement dynamics and their critical features in conformal many-body systems.", "url": "https://arxiv.org/abs/2605.28939", "type": "理论", "summary": "我们研究了局部淬火后全息共形场论纠缠结构的时间演化。使用两个空间区间之间的互信息作为探针，我们发现$1+1$维共形场论表现出丰富的动态相变模式。在大中心电荷极限下，互信息在关键时刻发展出尖锐的非解析性，为动态量子相变提供了基于纠缠的具体实现。我们发现动力学组织成六个不同的互信息阶段，每个阶段都由不同的共形块或不同的全息测地线配置的主导地位控制。这种相结构超出了标准的准粒子图，解释了从淬灭点的简单光锥传播无法捕获的非分析特征。我们进一步确定了作用于区间端点的动态 $D_4$ 对称性，该对称性控制着互信息的存在或不存在。\n\n互信息的开始是由 $\\mathbb{Z}_2 \\times \\mathbb{Z}_2$ 子群的对称性破缺决定的，这表明非平衡纠缠动力学的基于对称性的表征类似于对称性在平衡临界现象中的作用。最后，临界自旋链的数值研究表明，有限$c$效应平滑了不同互信息相之间急剧的大$c$转变，而具有和不具有互信息的相之间的转变似乎仍然是非解析的。这些结果为实时纠缠动力学及其在共形多体系统中的关键特征提供了统一的视角。", "authors": [{"name": "Joseph Dominicus Lap"}, {"name": "Jad C. Halimeh"}, {"name": "David Horn"}, {"name": "Lukas Ebner"}, {"name": "Clemens Seidl"}, {"name": "Berndt Müller"}, {"name": "Andreas Schäfer"}, {"name": "Jakob Minar"}], "featured_authors": [{"name": "Joseph Dominicus Lap"}, {"name": "Jad C. Halimeh"}, {"name": "David Horn"}, {"name": "Berndt Müller"}, {"name": "Andreas Schäfer"}, {"name": "Jakob Minar"}], "author_count": 8}, {"id": "2605.28946", "category": "hep-th", "title": "Constrained integrability and anyonic chains", "abstract": "We review the notion of Yang-Baxter integrability for spin chains that have Hilbert spaces with constraints, such as a Rydberg blockade. We focus on anyonic chains, whose constraints arise from the fusion rules of the fusion categories on which they are based. We discuss the emergence of Temperley-Lieb algebras and present a new result on which types of anyonic chains exhibit them. We then give an overview of known results for integrable anyonic chains and extend them to several fusion categories up to rank $7$. Using a modification of the boost operator formalism, we find several new integrable anyonic chains and discuss some of their properties. These include spin-$\\frac32$ models for $\\mathfrak{su}(2)_k$ fusion categories, anyonic chains based on the Tambara-Yamagami fusion categories TY$(\\mathbb{Z}_n)$, and product fusion categories Fib$\\times$Fib and Fib$\\times$Ising. We review recent results for spin chains based on the Haagerup-Izumi fusion category HI$(\\mathbb{Z}_3)$, and present preliminary numerics for a HI$(\\mathbb{Z}_5)$ model.", "url": "https://arxiv.org/abs/2605.28946", "type": "理论", "summary": "我们回顾了具有带有约束的希尔伯特空间（例如里德堡封锁）的自旋链的杨-巴克斯特可积性的概念。我们关注任意链，其约束来自于它们所基于的融合类别的融合规则。我们讨论了 Temperley-Lieb 代数的出现，并提出了关于哪些类型的任意子链表现出它们的新结果。然后，我们概述了可积任意子链的已知结果，并将其扩展到等级高达 7 美元的几个融合类别。通过对 boost 算子形式的修改，我们发现了几个新的可积任意子链并讨论了它们的一些属性。其中包括 $\\mathfrak{su}(2)_k$ 融合类别的 spin-$\\frac32$ 模型、基于 Tambara-Yamagami 融合类别 TY$(\\mathbb{Z}_n)$ 的任意链，以及乘积融合类别 Fib$\\times$Fib 和 Fib$\\times$Ising。我们回顾了基于 Haagerup-Izumi 融合类别 HI$(\\mathbb{Z}_3)$ 的自旋链的最新结果，并提出了 HI$(\\mathbb{Z}_5)$ 模型的初步数值。", "authors": [{"name": "Matthew Blakeney"}, {"name": "Luke Corcoran"}, {"name": "Marius de Leeuw"}], "featured_authors": [{"name": "Matthew Blakeney"}, {"name": "Luke Corcoran"}, {"name": "Marius de Leeuw"}], "author_count": 3}, {"id": "2605.28955", "category": "hep-th", "title": "Bootstrapping the Four-Point NMHV Stress-Tensor Form Factor", "abstract": "We bootstrap the two-loop four-point next-to-maximally helicity-violating (NMHV) ratio function for the chiral stress-tensor form factor in planar maximally supersymmetric Yang-Mills theory (sYM) at the symbol level. Starting from an ansatz built from NMHV leading singularities and the known two-loop five-point one-mass integral function space, we impose finiteness, dihedral symmetry, parity and Galois symmetry, spurious-pole cancellation, collinear limits, and finally triple-collinear consistency, which together fix the result uniquely. We then subject the answer to independent soft and double-soft checks. The resulting symbol contains 78 letters, all drawn from the 88-letter alphabet previously identified for the four-point MHV form factor through four loops. This provides the first multi-loop result for a non-MHV form factor, and direct evidence that the 88-letter alphabet extends beyond the MHV sector, which may provide the natural universal alphabet for four-point form factors. Our result supplies new data for the study of physics and mathematics of multi-loop form factors including the antipodal duality, as well as their relations to Higgs-parton amplitudes in QCD.", "url": "https://arxiv.org/abs/2605.28955", "type": "理论", "summary": "我们在符号级别引导平面最大超对称杨-米尔斯理论 (sYM) 中手征应力张量形状因子的二环四点次最大螺旋度破坏 (NMHV) 比率函数。从由 NMHV 主导奇点和已知的双环五点单质量积分函数空间构建的 ansatz 开始，我们施加有限性、二面对称性、奇偶性和伽罗瓦对称性、杂散极点消除、共线极限以及最后的三重共线一致性，它们共同唯一地修复了结果。然后我们对答案进行独立的软检查和双重软检查。生成的符号包含 78 个字母，全部取自先前通过四个循环为四点 MHV 形状系数确定的 88 个字母字母表。这为非 MHV 外形尺寸提供了第一个多循环结果，并直接证明 88 个字母的字母表超出了 MHV 扇区，这可能为四点外形尺寸提供自然的通用字母表。我们的结果为多环形状因子的物理和数学研究提供了新的数据，包括对映二元性，以及它们与 QCD 中希格斯-帕顿振幅的关系。", "authors": [{"name": "Song He"}, {"name": "Jiahao Liu"}, {"name": "Qinglin Yang"}], "featured_authors": [{"name": "Song He"}, {"name": "Jiahao Liu"}, {"name": "Qinglin Yang"}], "author_count": 3}, {"id": "2605.28958", "category": "hep-th", "title": "Quantum State of a Gravitating Region", "abstract": "We propose that any compact $d$-manifold with elliptic data, $\\mathcal{J}$, prepares a quantum state $|\\mathcal{J}\\rangle$ on its $(d-1)$-boundary $\\sigma$. Elliptic data consists of metric and field values, or their conjugates, but not both. No asymptotic structure is required. Inner products and traces are evaluated by the gravitational path integral with closed boundary conditions obtained by gluing elliptic data manifolds. In particular, we give a prescription for the Rényi entropies $S_n$ of a subregion of $\\sigma$. In a class of examples, we find that $S_n$ is nonnegative and nonincreasing with $n$, as required for consistency. We obtain the von Neumann entropy by analytic continuation and find agreement with the minimal surface prescription of Bousso and Penington.", "url": "https://arxiv.org/abs/2605.28958", "type": "理论", "summary": "我们建议任何具有椭圆数据的紧凑$d$流形$\\mathcal{J}$在其$(d-1)$边界$\\sigma$上准备一个量子态$|\\mathcal{J}\\rangle$。椭圆数据由度量值和字段值或其共轭值组成，但不能同时由两者组成。不需要渐近结构。通过粘合椭圆数据流形获得的闭合边界条件的引力路径积分来评估内积和迹线。特别地，我们给出了 $\\sigma$ 子区域的 Rényi 熵 $S_n$ 的处方。在一类示例中，我们发现 $S_n$ 是非负的并且不随 $n$ 递增，这符合一致性的要求。我们通过解析延拓获得了冯诺依曼熵，并与 Bousso 和 Penington 的最小表面规定一致。", "authors": [{"name": "Raphael Bousso"}, {"name": "Sami Kaya"}, {"name": "Guanda Lin"}, {"name": "Arvin Shahbazi-Moghaddam"}], "featured_authors": [{"name": "Raphael Bousso"}, {"name": "Sami Kaya"}, {"name": "Guanda Lin"}, {"name": "Arvin Shahbazi-Moghaddam"}], "author_count": 4}, {"id": "2605.29047", "category": "hep-th", "title": "Asymptotic Quantum Dynamics of Ghost Fields", "abstract": "The dressed propagator of a ghost coupled to ordinary fields develops a pair of complex conjugate poles in the first Riemann sheet above the multi-particle threshold. We study the implications of this pole structure for the asymptotic field and its negative-norm one-particle state. Within the operator formalism of local quantum field theory, we show that interactions between the ghost field and the composite field of the multi-particle state persist at asymptotic times. These induce quantum interference effects that render the negative-norm one-particle state non-orthogonal to, and thus indistinguishable from, a superposition of positive-norm multi-particle states. As a result, no free asymptotic one-particle ghost state exists. The real and imaginary parts of the complex mass admit a clear physical interpretation; in particular, the inverse imaginary part sets the timescale for the onset of non-orthogonality. A freely propagating ghost is therefore confined to time intervals much shorter than its inverse width, so that a detector can never observe an isolated ghost particle asymptotically. Open questions and potential applications are discussed in the conclusions.", "url": "https://arxiv.org/abs/2605.29047", "type": "理论", "summary": "与普通场耦合的鬼魂的修饰传播器在多粒子阈值之上的第一个黎曼片中产生一对复共轭极点。我们研究了这种极结构对渐进场及其负范数单粒子态的影响。在局域量子场论的算子形式中，我们证明了鬼场和多粒子态复合场之间的相互作用在渐近时刻持续存在。这些引起量子干涉效应，使负范数单粒子态与正范数多粒子态的叠加不正交，因此无法区分。结果，不存在自由渐近单粒子鬼态。复杂质量的实部和虚部都有明确的物理解释。特别是，反虚部设置了非正交性开始的时间尺度。因此，自由传播的鬼粒子被限制在比其倒数宽度短得多的时间间隔内，因此探测器永远无法渐近地观察到孤立的鬼粒子。结论中讨论了悬而未决的问题和潜在的应用。", "authors": [{"name": "Luca Buoninfante"}], "featured_authors": [{"name": "Luca Buoninfante"}], "author_count": 1}, {"id": "2605.29159", "category": "hep-th", "title": "Asymptotically Safe Gravitational Form Factors from the Proper-Time Flow Equation", "abstract": "We study the renormalization group flow of non-local form factors in four-dimensional quantum gravity within the proper-time formalism at quadratic order in the curvature expansion. We show that the flow equations can be integrated down to $k=0$, allowing the reconstruction of the full momentum dependence of the form factors. Within this framework, we construct asymptotically safe solutions at this order. We find that asymptotic safety of the flow does not automatically ensure a finite cutoff-independent $\\Lambda\\to\\infty$ limit for the integrated solutions, which in general develop a logarithmic divergence $\\ln(q^2/\\Lambda^2)$, so that a renormalization condition is still required. A finite $\\Lambda\\to\\infty$ limit compatible with asymptotic safety is obtained only when the ultraviolet boundary condition selects the non-Gaussian fixed point. This yields finite dimensionful form factors, removes UV logarithmic contributions, and ensures independence from the renormalization scale $\\mu$. The resulting renormalized asymptotically safe form factors display a power-law decay $\\sim1/q^2$ in the ultraviolet and reproduce the expected logarithmic structure in the infrared, with the Planck scale replacing the renormalization scale.", "url": "https://arxiv.org/abs/2605.29159", "type": "理论", "summary": "我们研究了曲率展开中二次阶的原时形式主义中四维量子引力中非局域形状因子的重整化群流。我们表明，流动方程可以积分到 $k=0$，从而可以重建形状因子的完整动量依赖性。在此框架内，我们按此顺序构建渐近安全解决方案。我们发现，流的渐近安全性并不能自动确保积分解的有限截止独立 $\\Lambda\\to\\infty$ 限制，通常会产生对数散度 $\\ln(q^2/\\Lambda^2)$，因此仍然需要重正化条件。仅当紫外边界条件选择非高斯不动点时，才能获得与渐近安全兼容的有限 $\\Lambda\\to\\infty$ 极限。这会产生有限维的形状因子，消除 UV 对数贡献，并确保独立于重整化尺度 $\\mu$。\n\n由此产生的重正化渐近安全形状因子在紫外线中显示幂律衰减 $\\sim1/q^2$ 并在红外线中再现预期的对数结构，并用普朗克尺度取代重正化尺度。", "authors": [{"name": "Emiliano Maria Glaviano"}], "featured_authors": [{"name": "Emiliano Maria Glaviano"}], "author_count": 1}, {"id": "2605.29282", "category": "hep-th", "title": "Higher Wess-Zumino-Witten term from semistrict higher Chern-Simons theory", "abstract": "We show that in any $2n+2$ dimensions, the higher Chern-Simons action built from a semistrict Lie 2-algebra gives a non-trivial higher Wess-Zumino-Witten (WZW) term under a higher gauge transformation. The key point is that the non-zero Jacobiator directly generates the higher WZW term, hereas it vanishes when reduced to the strict case.", "url": "https://arxiv.org/abs/2605.29282", "type": "理论", "summary": "我们证明，在任何 $2n+2$ 维度中，从半严格李 2 代数构建的更高 Chern-Simons 作用在更高规范变换下给出了非平凡的更高 ​​Wess-Zumino-Witten (WZW) 项。 The key point is that the non-zero Jacobiator directly generates the higher WZW term, hereas it vanishes when reduced to the strict case.", "authors": [{"name": "Mengyao Wu"}], "featured_authors": [{"name": "Mengyao Wu"}], "author_count": 1}, {"id": "2605.29435", "category": "hep-th", "title": "Hypercomplex Yang-Mills Theory as a Bipartite Gauge Field Model", "abstract": "A non-Abelian gauge field framework is proposed using the hypercomplex ring formalism. This extension generates non-compact hyperbolic symmetries, which, alongside the compact gauge symmetries, double the internal degrees of freedom. This will enable the description of bipartite gauge systems and demonstrate how field dissipation operates at the dynamical level. Working within a commutative ring allows for the decoupling of the algebraic structures and facilitates the construction of solutions to the equations of motion.", "url": "https://arxiv.org/abs/2605.29435", "type": "理论", "summary": "A non-Abelian gauge field framework is proposed using the hypercomplex ring formalism.这种扩展产生了非紧双曲对称，它与紧规范对称性一起，使内部自由度加倍。 This will enable the description of bipartite gauge systems and demonstrate how field dissipation operates at the dynamical level.在交换环内工作可以解耦代数结构，并有助于构造运动方程的解。", "authors": [{"name": "C. M. López Arellano"}, {"name": "R. Cartas-Fuentevilla"}], "featured_authors": [{"name": "C. M. López Arellano"}, {"name": "R. Cartas-Fuentevilla"}], "author_count": 2}, {"id": "2605.29789", "category": "hep-th", "title": "Magic Relations and Critical Varieties of Feynman Integrals", "abstract": "Magic relations are a class of integration-by-parts identities where all integrals in the generating sector drop out. Since their presence causes several otherwise successful methods in the Feynman-integral computational pipeline to break down, they are important to detect and understand. In this paper, we take a first step toward a systematic characterization of such identities. Specifically, we observe and argue that the occurrence of magic relations always coincides with the presence of higher-dimensional critical varieties in the generating sector. This provides a practical computational test to check if a family of Feynman integrals can contain magic relations and to find them, which we implement in the ancillary Mathematica file Magic-Test.m. Additionally, we discuss how to count the number of master integrals in the presence of higher-dimensional critical varieties, classify the behavior of magic relations under symmetries, and we discuss their interplay with cuts.", "url": "https://arxiv.org/abs/2605.29789", "type": "理论", "summary": "中文摘要自动翻译失败，请展开查看英文原文。", "authors": [{"name": "Giulio Crisanti"}, {"name": "Hjalte Frellesvig"}, {"name": "Andrzej Pokraka"}, {"name": "Sid Smith"}], "featured_authors": [{"name": "Giulio Crisanti"}, {"name": "Hjalte Frellesvig"}, {"name": "Andrzej Pokraka"}, {"name": "Sid Smith"}], "author_count": 4}, {"id": "2605.29831", "category": "hep-th", "title": "Five-dimensional Geometry from Spinning Amplitudes", "abstract": "Massive spinor-helicity variables in four dimensions are a useful tool for studying amplitudes between higher-spin fields and gravitons. Among them a special, simple set of amplitudes reproduces the linearized stress-energy tensor of a Kerr black hole in the classical limit. In this work we initiate the study of the classical limit of three-point spinor-helicity amplitudes in five dimensions. We introduce the map between the spinor invariants and the expectation values of spin operators and match the amplitude building blocks with those of the multipole expansion. Interestingly, in order to take the classical limit of a general amplitude, we need to augment the multipole structures with the Hodge dual of the classical spin tensor. We study the classical limit of alternative spinning states not described by fully-symmetric products of polarisations and conclude that they can describe the same spacetimes. Finally, by relaxing the orthogonality condition of the spin tensor we are able to model spacetimes with a single rotational isometry and match these to the classical limit of amplitudes allowing for an internal spin shift. Along the way we also identify the class of amplitudes describing the Myers-Perry black hole and comment on its generalization to arbitrary dimensions.", "url": "https://arxiv.org/abs/2605.29831", "type": "理论", "summary": "四维的大量自旋螺旋变量是研究高自旋场和引力子之间振幅的有用工具。其中，一组特殊、简单的振幅再现了经典极限下克尔黑洞的线性应力-能量张量。在这项工作中，我们开始研究五维三点旋量螺旋振幅的经典极限。 We introduce the map between the spinor invariants and the expectation values of spin operators and match the amplitude building blocks with those of the multipole expansion. Interestingly, in order to take the classical limit of a general amplitude, we need to augment the multipole structures with the Hodge dual of the classical spin tensor. We study the classical limit of alternative spinning states not described by fully-symmetric products of polarisations and conclude that they can describe the same spacetimes. Finally, by relaxing the orthogonality condition of the spin tensor we are able to model spacetimes with a single rotational isometry and match these to the classical limit of amplitudes allowing for an internal spin shift.\n\n在此过程中，我们还确定了描述迈尔斯-佩里黑洞的振幅类别，并评论了其对任意维度的推广。", "authors": [{"name": "Lucile Cangemi"}, {"name": "Iustin Surubaru"}], "featured_authors": [{"name": "Lucile Cangemi"}, {"name": "Iustin Surubaru"}], "author_count": 2}, {"id": "2605.29923", "category": "hep-th", "title": "Black Hole Photon Rings Saturate the Quantum Chaos Bound", "abstract": "We study the quantum chaos bound in the photon ring region surrounding black holes. By evaluating the Lyapunov exponent associated with unstable null geodesics in a broad class of generalized Kerr geometries, as well as the temperature induced by a string probe, we show that the quantum chaos bound is exactly saturated on equatorial circular orbits of the photon ring. We confirm our result by deriving the same exponent from out-of-time-order correlators in the near ring region. As a byproduct, we show that the photon ring saturation of the quantum chaos bound implies the saturation of the Bekenstein bound on the rate of information emission from the ringdown phase through the quasi-normal modes in the eikonal limit. Our results extend the known correspondence between black hole thermodynamics and chaotic dynamics, highlighting the role of the photon ring as a probe of the fundamental limits on thermalization and information scrambling in black holes.", "url": "https://arxiv.org/abs/2605.29923", "type": "理论", "summary": "中文摘要自动翻译失败，请展开查看英文原文。", "authors": [{"name": "D. Giataganas"}, {"name": "G.F. Giudice"}, {"name": "A. Kehagias"}, {"name": "F. Quevedo"}, {"name": "A. Riotto"}], "featured_authors": [{"name": "D. Giataganas"}, {"name": "G.F. Giudice"}, {"name": "A. Kehagias"}, {"name": "F. Quevedo"}, {"name": "A. Riotto"}], "author_count": 5}, {"id": "2605.29990", "category": "hep-th", "title": "Perturbative Nicolai-Map Diagrammatics: Application to Poincaré Supergravity", "abstract": "We develop a perturbative, diagrammatic framework for constructing Nicolai maps and apply it to four-dimensional $\\mathcal{N}=1$ Poincaré supergravity expanded around flat Minkowski space. It provides an alternative to the coupling-flow-operator construction, which faces several obstructions when extended to local supersymmetry. Expanding the bosonic effective action and the Nicolai map jointly in the gravitational coupling $\\kappa$ and the loop-counting parameter $\\hbar$, we derive the Nicolai-map defining conditions, i.e. the free-action and determinant-matching conditions, order by order. The diagrammatics enumerates all admissible local terms in the Nicolai-map ansatz from the effective-action diagrams and reduces the construction to a finite system of nonlinear polynomial equations. Carried through order $\\kappa^{2}$, the resulting constraints are found to be independent of the detailed bosonic input and hierarchical, order-$\\kappa^{2}$ consistency further restricting the order-$\\kappa$ data. A consistent Nicolai-map construction for the Einstein--Hilbert graviton sector is found to require the Rarita--Schwinger gravitino already at this order: Einstein gravity admits a Nicolai map only through its $\\mathcal{N}=1$ supersymmetric completion, Poincaré supergravity, supporting Nicolai's characterization of supersymmetry.", "url": "https://arxiv.org/abs/2605.29990", "type": "理论", "summary": "We develop a perturbative, diagrammatic framework for constructing Nicolai maps and apply it to four-dimensional $\\mathcal{N}=1$ Poincaré supergravity expanded around flat Minkowski space.它提供了耦合流算子结构的替代方案，该结构在扩展到局部超对称性时面临一些障碍。 Expanding the bosonic effective action and the Nicolai map jointly in the gravitational coupling $\\kappa$ and the loop-counting parameter $\\hbar$, we derive the Nicolai-map defining conditions, i.e. the free-action and determinant-matching conditions, order by order. The diagrammatics enumerates all admissible local terms in the Nicolai-map ansatz from the effective-action diagrams and reduces the construction to a finite system of nonlinear polynomial equations. Carried through order $\\kappa^{2}$, the resulting constraints are found to be independent of the detailed bosonic input and hierarchical, order-$\\kappa^{2}$ consistency further restricting the order-$\\kappa$ data.\n\n爱因斯坦-希尔伯特引力子扇区的一致尼古拉图构造被发现需要拉里塔-施温格引力子已经处于这个顺序：爱因斯坦引力仅通过其$ \\ mathcal {N} = 1 $超对称完成，庞加莱超引力，支持尼古拉对超对称性的表征，才承认尼古拉图。", "authors": [{"name": "Ji-Seong Chae"}, {"name": "Hun Jang"}, {"name": "Junhyeok Lee"}], "featured_authors": [{"name": "Ji-Seong Chae"}, {"name": "Hun Jang"}, {"name": "Junhyeok Lee"}], "author_count": 3}, {"id": "2605.30098", "category": "hep-th", "title": "Coupling Higher Form Structures of the EFT of Force Free Electrodynamics to Gravity", "abstract": "We know that the charged Reissner Nordstr$ö$m black hole metric is obtained from the Einstein Hilbert gravitational action. This action has the kinetic term $F^2 = (da)^2$. Motivated by the higher-form symmetry structure of the EFT of Force Free Electrodynamics, we replace the Maxwell field-strength contribution in the Einstein Hilbert action by the gauge-invariant combination $(b-da)^2$, where $a_\\mu$ is the worldsheet gauge field and $b_{\\mu\\nu}$ is a background two-form field. This ensures that the new action has a higher form symmetry $b \\rightarrow b+d\\Lambda, a\\rightarrow a+\\Lambda$. Here, unlike in qed, $\\Lambda$ may be any one form (not necessarily a differential one form $\\partial_\\mu \\phi$). The higher form symmetry here is one with the conserved current being a two form and the charge integrated on surfaces. Intuitively, it is the number/current of vector field lines that is conserved here, not the current of particles. Thus, integrating over a surface through which the field lines pierce is sufficient to find the number of these lines that are passing through; so the charge is integrated on surfaces, rather than on the volume. After fixing a particular gauge for the fields $a_\\mu$ and $b_{\\mu\\nu}$, we obtain a generalized black-hole metric. We find that on hypersurfaces satisfying $(r-t)=$ constant, this metric reduces locally to a Reissner Nordstr$ö$m geometry with an effective charge parameter depending on the constant $(r-t)$.", "url": "https://arxiv.org/abs/2605.30098", "type": "理论", "summary": "我们知道带电的Reissner Nordstr$ö$m黑洞度量是从爱因斯坦希尔伯特引力作用得到的。该作用的动力学项为 $F^2 = (da)^2$。受无力电动力学 EFT 更高形式对称结构的启发，我们用规范不变组合 $(b-da)^2$ 代替了爱因斯坦希尔伯特作用中的麦克斯韦场强贡献，其中 $a_\\mu$ 是世界表规范场，$b_{\\mu\\nu}$ 是背景二元场。这确保了新动作具有更高的形式对称性 $b \\rightarrow b+d\\Lambda, a\\rightarrow a+\\Lambda$。这里，与 qed 不同，$\\Lambda$ 可以是任何一种形式（不一定是微分形式 $\\partial_\\mu \\phi$）。这里较高形式的对称性是一种，其中守恒电流是两种形式并且电荷在表面上积分。直观上，这里守恒的是矢量场线的数量/电流，而不是粒子的电流。因此，对磁力线穿过的表面进行积分就足以找到穿过这些磁力线的数量；因此电荷被积分在表面上，而不是体积上。\n\n在为 $a_\\mu$ 和 $b_{\\mu\\nu}$ 字段固定特定的度量后，我们获得了广义的黑洞度量。我们发现，在满足 $(r-t)=$ 常数的超曲面上，该度量局部简化为 Reissner Nordstr$ö$m 几何，其有效电荷参数取决于常数 $(r-t)$。", "authors": [{"name": "Harsh Anand"}], "featured_authors": [{"name": "Harsh Anand"}], "author_count": 1}, {"id": "2605.30276", "category": "hep-th", "title": "Self-dual holography: four-point AdS/CFT correlators in higher-spin gravity", "abstract": "Self-dual theories, being UV-finite, should have their own AdS/CFT dualities. Higher-spin extensions of self-dual theories are attractive to simplify the CFT duals. The maximal self-dual theory is Chiral higher-spin gravity, which should be dual to a subsector of Chern--Simons matter theories. As a step toward establishing self-dual holography, we develop the Fefferman--Graham expansion and holographic dictionary for arbitrary spin self-dual theories. As an application, we derive bulk-to-bulk propagators and compute three- and four-point AdS/CFT correlators in a contraction of Chiral higher-spin gravity, which is a higher-spin extension of self-dual Yang--Mills theory.", "url": "https://arxiv.org/abs/2605.30276", "type": "理论", "summary": "自对偶理论是 UV 有限的，应该有自己的 AdS/CFT 对偶性。自对偶理论的高自旋扩展对于简化 CFT 对偶很有吸引力。最大自对偶理论是手性高自旋引力，它应该与陈省身-西蒙斯物质理论的一个子部门对偶。作为建立自对偶全息术的一步，我们开发了任意自旋自对偶理论的 Fefferman-Graham 展开式和全息字典。作为一个应用，我们导出了体对体传播子，并计算了手性高自旋引力收缩中的三点和四点 AdS/CFT 相关器，这是自对偶杨-米尔斯理论的高自旋扩展。", "authors": [{"name": "Evgeny Skvortsov"}, {"name": "Richard Van Dongen"}], "featured_authors": [{"name": "Evgeny Skvortsov"}, {"name": "Richard Van Dongen"}], "author_count": 2}, {"id": "2605.30354", "category": "hep-th", "title": "Quiver Approach to Symmetry Theories", "abstract": "Global symmetry anomalies of a quantum field theory (QFT) can be packaged as specific couplings of a higher-dimensional symmetry theory (SymTh). In this work we show that for 5D superconformal field theories (SCFTs) engineered from M-theory backgrounds $X$ a Calabi-Yau cone, this data can be extracted from the path algebra of branes probing $X$. This provides a complementary algebraic approach compared with more geometric computations based on the explicit calculation of triple intersection numbers in a resolved geometry and / or $\\eta$-invariants extracted from the boundary geometry $\\partial X$. Our method applies in situations where the counterpart geometric computation is either unknown or combinatorially unwieldy. We illustrate with several toric threefold examples, including orbifolds $\\mathbb{C}^{3} / \\Gamma$ and more general non-orbifold Calabi-Yau cones of Sasaki-Einstein five-manifolds.", "url": "https://arxiv.org/abs/2605.30354", "type": "理论", "summary": "量子场论 (QFT) 的全局对称异常可以打包为高维对称理论 (SymTh) 的特定耦合。在这项工作中，我们表明，对于从 M 理论背景 $X$ 卡拉比-丘锥体设计的 5D 超共形场论 (SCFT)，可以从探测 $X$ 的膜的路径代数中提取该数据。与更多基于解析几何中三重交集数的显式计算和/或从边界几何$\\partial X$中提取的$\\eta$不变量的几何计算相比，这提供了一种补充代数方法。我们的方法适用于对应的几何计算未知或组合笨拙的情况。我们用几个环面三重示例进行说明，包括轨道折叠 $\\mathbb{C}^{3} / \\Gamma$ 和佐佐木-爱因斯坦五流形的更一般的非轨道折叠 Calabi-Yau 锥体。", "authors": [{"name": "Vivek Chakrabhavi"}, {"name": "Mirjam Cvetič"}, {"name": "Jonathan J. Heckman"}, {"name": "Shani Meynet"}], "featured_authors": [{"name": "Vivek Chakrabhavi"}, {"name": "Mirjam Cvetič"}, {"name": "Jonathan J. Heckman"}, {"name": "Shani Meynet"}], "author_count": 4}, {"id": "2605.28856", "category": "math-ph", "title": "Inverse scattering for the linear system associated with the coupled Gerdjikov--Ivanov equations", "abstract": "We consider a certain first-order linear system of ordinary differential equations, and we analyze the direct and inverse scattering problems for that linear system. The linear system involves two potentials in the Schwartz class, and those potentials linearly depend on the spectral parameter. This linear system is related to the integrable system of nonlinear partial differential equations known as the DNLS (derivative nonlinear Schrödinger) system III, which is also known as the Gerdjikov--Ivanov system. When analyzing the direct problem, we describe the pertinent properties of the Jost solutions and the scattering coefficients. The bound states poles and the associated normalization constants are represented via a matrix triplet pair, enabling us to deal with any number of bound states and any multiplicities. The inverse scattering problem comprises the determination of the two potentials when the reflection coefficients and the bound-state information are available. To solve the inverse problem, we establish a linear system of integral equations where the kernel and nonhomogeneous term are determined by the Fourier transforms of the reflection coefficients and the matrix triplet pair representing the bound-state information. This system of linear integral equations is the counterpart of the system of Marchenko integral equations available for the AKNS system associated with the integrable NLS (nonlinear Schrödinger) system. We recover the potentials from the solution of our established Marchenko integral system. When we use the time-evolved reflection coefficients and the time-evolved matrix triplets, the corresponding time-evolved potential pair yields a solution of the Gerdjikov--Ivanov system.", "url": "https://arxiv.org/abs/2605.28856", "type": "理论", "summary": "我们考虑某个常微分方程的一阶线性系统，并分析该线性系统的正散射和逆散射问题。线性系统涉及 Schwartz 类中的两个势，并且这些势线性取决于谱参数。该线性系统与称为 DNLS（导数非线性薛定谔）系统 III 的非线性偏微分方程可积系统相关，该系统也称为 Gerdjikov-Ivanov 系统。在分析直接问题时，我们描述了约斯特解和散射系数的相关性质。束缚态极点和相关的归一化常数通过矩阵三元组对表示，使我们能够处理任意数量的束缚态和任意多重性。逆散射问题包括当反射系数和束缚态信息可用时确定两个势。\n\n为了解决反问题，我们建立了一个积分方程的线性系统，其中核和非齐次项由反射系数和表示束缚态信息的矩阵三元组对的傅里叶变换确定。该线性积分方程组是可用于与可积 NLS（非线性薛定谔）系统关联的 AKNS 系统的 Marchenko 积分方程组的对应系统。我们从已建立的 Marchenko 积分系统的解决方案中恢复潜力。当我们使用随时间演化的反射系数和随时间演化的矩阵三元组时，相应的随时间演化的势对产生了 Gerdjikov-Ivanov 系统的解。", "authors": [{"name": "Ramazan Ercan"}], "featured_authors": [{"name": "Ramazan Ercan"}], "author_count": 1}, {"id": "2605.29134", "category": "math-ph", "title": "Transitions with the same energy difference in the Bohr model of the hydrogen atom", "abstract": "In the Bohr model of the hydrogen atom, the energy levels are a negative constant divided by the square of the level number. It is well known that special pairs of transitions exist that have the same energy difference, and a systematic treatment of this is given in the paper by Do and Phan ( arXiv:2010.08338 ). In this paper we describe a simple method (using equal norms of Gaussian integers, and the Brahmagupta--Fibonacci identity) for finding all such pairs of transitions. We also analyze cascades of equal-frequency transitions, and use a theorem due to Fermat to show that cascades with more than three levels are not possible.", "url": "https://arxiv.org/abs/2605.29134", "type": "理论", "summary": "在氢原子的玻尔模型中，能级是负常数除以能级数的平方。众所周知，存在具有相同能量差的特殊跃迁对，Do 和 Phan 的论文（arXiv:2010.08338）对此进行了系统的处理。在本文中，我们描述了一种简单的方法（使用高斯整数的等范数和 Brahmagupta - 斐波那契恒等式）来查找所有此类转换对。我们还分析了等频跃迁的级联，并使用费马定理来表明超过三级的级联是不可能的。", "authors": [{"name": "Matthias W. Reinsch"}], "featured_authors": [{"name": "Matthias W. Reinsch"}], "author_count": 1}, {"id": "2605.29203", "category": "math-ph", "title": "A Lorentzian construction of timelike Liouville field theory on the cylinder", "abstract": "Timelike Liouville field theory is a candidate model for positive curvature two-dimensional quantum gravity, but a mathematically controlled Lorentzian formulation has remained elusive. In this paper we construct the theory on the cylinder $\\mathbb{R}\\times \\mathbb{S}^1$ in the integer screening sector for a natural algebra of renormalized exponential observables. Starting from a renormalized finite-volume torus regularization, we construct infinite-volume Euclidean correlation functions, prove analytic continuation in the time variables, and identify the resulting Lorentzian boundary values by explicit contour formulas. This yields exact Lorentzian correlators for a natural class of exponential observables. We then prove locality: spacelike separated vertex operators commute in the Lorentzian theory. For smeared observables generated by the integer-charge fields $e^{2nb\\phi}$, these Lorentzian expectation values define a vacuum functional on an ordered $*$-algebra and support an AQFT-type quantization without positivity. More precisely, we obtain isotone local algebras, a complete locally convex space $\\mathcal H$ with dense algebraic subspace $\\mathcal H_0$ carrying a nondegenerate Hermitian form (shown to be indefinite for $b<8^{-1/2}$), a continuous cyclic representation, operator-topologically closed represented local algebras, an action of cylinder translations by continuous linear homeomorphisms, and locality for the represented local net. The construction does not produce a Hilbert space or a Haag-Kastler net of local von Neumann algebras in the usual sense, but it shows that a substantial part of the Euclidean-to-Lorentzian and algebraic reconstruction mechanism survives in this nonpositive setting for timelike Liouville theory on the cylinder.", "url": "https://arxiv.org/abs/2605.29203", "type": "理论", "summary": "类时刘维尔场论是正曲率二维量子引力的候选模型，但数学控制的洛伦兹公式仍然难以捉摸。在本文中，我们针对重正化指数可观测量的自然代数，在整数筛选扇区中构建了关于圆柱体 $\\mathbb{R}\\times \\mathbb{S}^1$ 的理论。从重整化的有限体积环面正则化开始，我们构造无限体积欧几里德相关函数，证明时间变量的解析连续性，并通过显式轮廓公式识别所得的洛伦兹边界值。这为指数可观测量的自然类产生了精确的洛伦兹相关器。然后我们证明局部性：空间分离的顶点算子在洛伦兹理论中是可交换的。对于由整数电荷场 $e^{2nb\\phi}$ 生成的模糊可观测量，这些洛伦兹期望值定义了有序 $*$ 代数上的真空泛函，并支持无正性的 AQFT 型量化。\n\n更准确地说，我们获得等调局部代数，一个完整的局部凸空间$\\mathcal H$，带有稠密代数子空间$\\mathcal H_0$，带有非简并埃尔米特形式（对于$b<8^{-1/2}$显示为不定），连续循环表示，算子拓扑封闭表示的局部代数，连续线性同胚的圆柱平移作用，以及所表示的局部性本地网。该构造不会产生通常意义上的希尔伯特空间或局部冯诺依曼代数的哈格-卡斯特勒网，但它表明欧几里德到洛伦兹和代数重建机制的很大一部分在圆柱体上的类时刘维尔理论的非正设置中仍然存在。", "authors": [{"name": "Sourav Chatterjee"}], "featured_authors": [{"name": "Sourav Chatterjee"}], "author_count": 1}, {"id": "2605.29241", "category": "math-ph", "title": "Connection Factorization in Constrained Quantum Mechanics", "abstract": "We investigate constrained quantum motion on curves and surfaces using connection factorization methods. We show that Laplace operators admit an exact half-connection factorization generated by connection one-forms. The first-order part of the Laplacian is identified with the Darboux rotational connection of the orthogonal frame. Elimination of this rotational connection naturally produces quadratic geometric invariants analogous to supersymmetric Riccati potentials. Using orthonormal moving frames, we derive effective geometric contributions for planar curves, spatial curves, and embedded surfaces. We further analyze Dirac reductions using structure equations and show that for Fermi-type reductions the scalar Jensen--Koppe--da Costa contribution is cancelled in the reduced Dirac sector, leaving a residual first-order spinorial derivative structure. The resulting framework suggests the existence of hidden nilpotent covariant differential complexes naturally generated by geometric connection structures.", "url": "https://arxiv.org/abs/2605.29241", "type": "理论", "summary": "我们使用连接因式分解方法研究曲线和曲面上的约束量子运动。我们证明拉普拉斯算子承认由连接一式生成的精确半连接分解。拉普拉斯算子的一​​阶部分用正交框架的达布旋转连接来识别。消除这种旋转连接自然会产生类似于超对称 Riccati 势的二次几何不变量。使用正交移动坐标系，我们得出了平面曲线、空间曲线和嵌入曲面的有效几何贡献。我们使用结构方程进一步分析狄拉克约简，并表明对于费米型约简，标量 Jensen--Koppe--da Costa 的贡献在约简的狄拉克扇区中被取消，留下剩余的一阶旋导数结构。由此产生的框架表明存在由几何连接结构自然生成的隐藏幂零协变微分复形。", "authors": [{"name": "A. Nuramatov"}], "featured_authors": [{"name": "A. Nuramatov"}], "author_count": 1}, {"id": "2605.29485", "category": "math-ph", "title": "Robustness of Valley-Hall Interface Modes Against Sharp Bending", "abstract": "It is well known that band inversion across a straight interface in a periodic medium gives rise to interface modes that are localized near the interface and propagate along it inside the bulk spectral gap. This phenomenon constitutes the key mechanism underlying the valley-Hall effect. In this paper, we address the long-standing problem of the robustness of such interface modes. We prove that, when the interface is bent through an angle of $\\frac{2\\pi}{3}$, the interface modes persist for every frequency in the bulk spectral gap where the group velocity is non-vanishing, except for a finite exceptional set. We also show that corner-localized modes, if they occur, can appear only at these exceptional frequencies and have finite multiplicity. To the best of our knowledge, this is the first rigorous mathematical theory of the bending immunity of valley-Hall interface modes.", "url": "https://arxiv.org/abs/2605.29485", "type": "理论", "summary": "众所周知，周期性介质中直界面上的能带反转会产生位于界面附近的界面模式，并在体光谱间隙内沿界面传播。这种现象构成了谷霍尔效应的关键机制。在本文中，我们解决了此类接口模式长期存在的鲁棒性问题。我们证明，当界面弯曲 $\\frac{2\\pi}{3}$ 角度时，界面模式对于体谱间隙中的每个频率都持续存在，其中群速度不为零，除了有限的例外集合。我们还表明，角局域模式（如果出现）只能出现在这些特殊频率处，并且具有有限的多重性。据我们所知，这是第一个关于谷-霍尔界面模式的弯曲抗扰度的严格数学理论。", "authors": [{"name": "Habib Ammari"}, {"name": "Jiayu Qiu"}], "featured_authors": [{"name": "Habib Ammari"}, {"name": "Jiayu Qiu"}], "author_count": 2}, {"id": "2605.29594", "category": "math-ph", "title": "Free energy expansion of determinantal Coulomb gases in the quadratic fields with a point charge", "abstract": "We study a determinantal Coulomb gas in the complex plane associated with the external potential $$ Q(z)=\\frac{1}{1-\\tau^2}\\big(|z|^2-\\tau \\text{Re } z^2\\big)-2c\\log|z-a|, $$ where $\\tau\\in[0,1)$, $c\\ge0$, and $a\\ge0$. In the regimes where the associated droplet is simply or doubly connected, we derive the free energy expansion up to and including the constant term, with all coefficients computed explicitly, thereby extending recent results in the isotropic case $\\tau=0$. In particular, we identify the constant term with the Liouville action associated with the droplet. Our result admits a natural interpretation in terms of asymptotic expansions of moments of characteristic polynomials for the elliptic Ginibre ensemble. The proof is based on a deformation framework involving both the singularity location $a$ and the anisotropy parameter $\\tau$, relating variations of the free energy to refined asymptotics of planar orthogonal polynomials. The asymptotic analysis relies on the foliation flow method of Hedenmalm and Wennman, providing an alternative to the Riemann--Hilbert approach used in the isotropic setting. The present work suggests a general framework connecting free energy expansions, refined asymptotics of planar orthogonal polynomials, and conformally invariant geometric functionals, with several intermediate results already formulated for general algebraic Hele-Shaw potentials.", "url": "https://arxiv.org/abs/2605.29594", "type": "理论", "summary": "我们研究与外部势 $$ Q(z)=\\frac{1}{1-\\tau^2}\\big(|z|^2-\\tau \\text{Re } z^2\\big)-2c\\log|z-a|、$$ where $\\tau\\in[0,1)$、$c\\ge0$ 和 $a\\ge0$ 相关的复平面中的行列式库仑气体。在相关液滴简单或双重连接的情况下，我们推导了自由能展开直至并包括常数项，并明确计算了所有系数，从而扩展了各向同性情况 $\\tau=0$ 中的最新结果。特别是，我们确定了与液滴相关的刘维尔作用的常数项。我们的结果承认椭圆 Ginibre 系综的特征多项式矩的渐近展开的自然解释。该证明基于涉及奇点位置 $a$ 和各向异性参数 $\\tau$ 的变形框架，将自由能的变化与平面正交多项式的精炼渐近相关联。渐近分析依赖于 Hedenmalm 和 Wennman 的叶状流方法，为各向同性环境中使用的 Riemann--Hilbert 方法提供了替代方案。\n\n目前的工作提出了一个连接自由能展开式、平面正交多项式的精炼渐近学和共形不变几何泛函的通用框架，以及已经为一般代数 Hele-Shaw 势制定的几个中间结果。", "authors": [{"name": "Sung-Soo Byun"}, {"name": "Meng Yang"}, {"name": "Eui Yoo"}], "featured_authors": [{"name": "Sung-Soo Byun"}, {"name": "Meng Yang"}, {"name": "Eui Yoo"}], "author_count": 3}, {"id": "2605.30006", "category": "math-ph", "title": "Corner Quantization of 4D $BF$ Theory", "abstract": "This note studies the quantized corner structure of four-dimensional $BF$ theory, classifies the associated free and physical corner algebras and constructs possible representations. In the abelian case, for arbitrary closed oriented surfaces and in the presence or absence of a cosmological term, explicit presentations of the corner algebras are obtained in terms of generators and relations, identifying them as infinite-dimensional oscillator-type Lie algebras with an abelian summand. A construction of infinite families of simple modules via bosonic Fock space representations is provided. In the non-abelian case on the torus, the corner algebras are described as quotients constructed from the central extensions of double-loop algebras over certain non-semisimple Lie algebras. A construction of infinite families of simple Fock-type modules of the free corner algebra via an induced module procedure is also provided. The resulting modules descend only trivially to the physical quotient, revealing an obstruction in the present construction in the non-abelian setting.", "url": "https://arxiv.org/abs/2605.30006", "type": "理论", "summary": "本文研究了四维$BF$理论的量化角结构，对相关的自由和物理角代数进行了分类，并构造了可能的表示。在阿贝尔情况下，对于任意闭定向曲面以及存在或不存在宇宙学项的情况下，根据生成元和关系获得角代数的显式表示，将它们识别为具有阿贝尔被加数的无限维振子型李代数。提供了通过玻色福克空间表示的无限简单模块族的构造。在环面的非阿贝尔情况下，角代数被描述为由双环代数的中心扩展在某些非半单李代数上构造的商。还提供了通过归纳模过程构造自由角代数的无限族简单 Fock 型模。由此产生的模块仅简单地下降到物理商，揭示了非阿贝尔环境中当前构造中的障碍。", "authors": [{"name": "Giovanni Canepa"}, {"name": "Alberto S. Cattaneo"}, {"name": "Filippo Fila-Robattino"}, {"name": "Timon Leupp"}], "featured_authors": [{"name": "Giovanni Canepa"}, {"name": "Alberto S. Cattaneo"}, {"name": "Filippo Fila-Robattino"}, {"name": "Timon Leupp"}], "author_count": 4}, {"id": "2605.30176", "category": "math-ph", "title": "The Fermionic Signature Operator in the Reissner-Nordström Geometry in Horizon-Penetrating Coordinates", "abstract": "We study the Dirac equation in the Reissner-Nordström geometry in horizon-penetrating coordinates up to the Cauchy horizon. A mass decomposition theorem is proved, which gives a covariant representation of the spacetime inner product that naturally involves the fermionic signature operator and the fermionic flux operator. We compute their spectra and show that both are bounded symmetric operators on the solution space $\\mathcal{H}_m$ of the massive Dirac equation. The corresponding fermionic projector state is constructed and shown to satisfy the Hadamard condition. Lastly, we give some physical interpretations of the fermionic flux operator.", "url": "https://arxiv.org/abs/2605.30176", "type": "理论", "summary": "我们在直到柯西视界的视界穿透坐标中研究 Reissner-Nordström 几何中的狄拉克方程。证明了质量分解定理，给出了时空内积的协变表示，其中自然涉及费米子签名算子和费米子通量算子。我们计算它们的谱并表明两者都是大规模狄拉克方程的解空间 $\\mathcal{H}_m$ 上的有界对称算子。构造并显示了相应的费米子投影状态以满足哈达玛条件。最后，我们给出了费米子通量算子的一些物理解释。", "authors": [{"name": "Felix Finster"}, {"name": "Christoph Krpoun"}], "featured_authors": [{"name": "Felix Finster"}, {"name": "Christoph Krpoun"}], "author_count": 2}, {"id": "2605.30199", "category": "math-ph", "title": "The Continuum Limit Analysis of Causal Fermion Systems for Curved Spacetimes", "abstract": "We construct the causal fermion system for globally hyperbolic spacetimes starting in the framework of algebraic quantum field theory. The fermionic projector is identified with the one-particle density operator of a quasi-free Hadamard state. The ultraviolet regularization is built into the fermionic projector via a chart-independent $i\\varepsilon$-regularization scheme. The continuum limit analysis is developed in globally hyperbolic spacetimes. It is shown that the Euler-Lagrange equations of the causal action principle are satisfied in this setup if and only if the coupled Einstein-Dirac equations hold.", "url": "https://arxiv.org/abs/2605.30199", "type": "理论", "summary": "我们从代数量子场论的框架开始构建全局双曲时空的因果费米子系统。费米子投影仪用准自由哈达玛态的单粒子密度算子来识别。紫外线正则化通过与图表无关的 $i\\varepsilon$ 正则化方案内置到费米子投影仪中。连续谱极限分析是在全局双曲时空中发展起来的。结果表明，当且仅当耦合的爱因斯坦-狄拉克方程成立时，因果作用原理的欧拉-拉格朗日方程在该设置中得到满足。", "authors": [{"name": "Patrick Fischer"}, {"name": "Felix Finster"}], "featured_authors": [{"name": "Patrick Fischer"}, {"name": "Felix Finster"}], "author_count": 2}, {"id": "2605.28859", "category": "quant-ph", "title": "Analytic Properties of the Jost Functions via the Poincaré-Picard Theorem", "abstract": "The analytic properties of the Jost functions are fundamental in quantum scattering theory and in the analytic continuation of the scattering matrix into the complex energy plane. In this work, the analyticity of the Jost functions is investigated from the perspective of parameter-dependent ordinary differential equations. Starting from the radial Schrödinger equation for a short-range central potential, a first-order differential system is derived for the coefficient functions associated with the Ricatti--Bessel and Ricatti--Neumann solutions. The multivalued dependence on the energy variable is shown to originate from the square-root relation between energy and momentum. By explicitly factorizing the momentum-dependent branching terms, the scattering problem is transformed into a differential system whose coefficients are single-valued analytic functions of the complex energy. Using the classical theory of analytic dependence of solutions of ordinary differential equations on parameters, it is shown that the transformed Jost functions are single-valued analytic functions of the energy variable for finite radial distance. The geometric interpretation of the factorization procedure is also discussed in terms of the topology of the associated Riemann surface.", "url": "https://arxiv.org/abs/2605.28859", "type": "理论", "summary": "约斯特函数的解析性质是量子散射理论以及散射矩阵解析延拓到复能平面中的基础。在这项工作中，从参数相关的常微分方程的角度研究了 Jost 函数的解析性。从短程中心势的径向薛定谔方程出发，导出了与 Ricatti-Bessel 和 Ricatti-Neumann 解相关的系数函数的一阶微分系统。对能量变量的多值依赖性源于能量和动量之间的平方根关系。通过显式分解动量相关分支项，散射问题转化为微分系统，其系数是复能量的单值解析函数。利用常微分方程解对参数解析依赖的经典理论，证明变换后的Jost函数是有限径向距离下能量变量的单值解析函数。\n\n分解过程的几何解释也根据相关黎曼曲面的拓扑进行讨论。", "authors": [{"name": "Yannick Mvondo-She"}], "featured_authors": [{"name": "Yannick Mvondo-She"}], "author_count": 1}, {"id": "2605.28875", "category": "quant-ph", "title": "Quantum and Thermal Properties of the Klein-Gordon Inverted Harmonic Oscillator with Physical Applications", "abstract": "We develop a systematic framework for the quantum and thermal properties of a Klein-Gordon scalar field subject to an inverted harmonic potential $-{1\\over2} m^2\\omega^2 x^2$. Starting from a non-Hermitian momentum substitution $P \\to P - m\\omega x$, we employ a symplectic phase-space rotation $V = \\exp\\!\\left[-\\tfrac{\\pi}{8}(xp+px)\\right]$ to map the system onto an analytically tractable effective harmonic oscillator evaluated at $xe^{i\\pi/4}$. This allows us to define a well-regulated partition function $Z(\\beta,\\omega,m)$ and derive closed-form expressions for the free energy, entropy, and thermal correlation functions. We then apply this framework to three physical settings: (i) scalar field fluctuations during cosmological inflation, (ii) quantum fields near black-hole horizons, and (iii) order-parameter dynamics near second-order phase transitions in condensed matter. Our results unify previously scattered results in the literature and provide new predictions for the finite-temperature spectral density and entanglement entropy of unstable quantum systems.", "url": "https://arxiv.org/abs/2605.28875", "type": "理论+数值", "summary": "我们为受反谐波势 $-{1\\over2} m^2\\omega^2 x^2$ 影响的 Klein-Gordon 标量场的量子和热性质开发了一个系统框架。从非厄米动量替换 $P \\to P - m\\omega x$ 开始，我们采用辛相空间旋转 $V = \\exp\\!\\left[-\\tfrac{\\pi}{8}(xp+px)\\right]$ 将系统映射到在 $xe^{i\\pi/4}$ 处评估的可分析处理的有效谐振子。这使我们能够定义一个良好调节的配分函数 $Z(\\beta,\\omega,m)$ 并导出自由能、熵和热相关函数的封闭式表达式。然后，我们将该框架应用于三个物理设置：（i）宇宙膨胀期间的标量场涨落，（ii）黑洞视界附近的量子场，以及（iii）凝聚态物质中二阶相变附近的序参数动力学。我们的结果统一了文献中先前分散的结果，并为不稳定量子系统的有限温度谱密度和纠缠熵提供了新的预测。", "authors": [{"name": "Kevin Hernández"}], "featured_authors": [{"name": "Kevin Hernández"}], "author_count": 1}, {"id": "2605.28885", "category": "quant-ph", "title": "Polar Fidelities, Holevo Bases, and Unitary Factors of Generalized Fidelity", "abstract": "Motivated by several open problems in the Afham-Ferrie theory of generalized fidelity, we study polar fidelities, Holevo bases, and unitary factors on \\(\\Pd\\), the cone of \\(d\\times d\\) complex positive definite matrices. We prove that, for every fixed pair \\(P,Q\\in\\Pd\\), the one-sided polar fidelities \\(x\\mapsto F_{P^x}(P,Q)\\) and \\(x\\mapsto F_{Q^x}(P,Q)\\), as well as their symmetrization, are nondecreasing on \\((-\\infty,1]\\) and nonincreasing on \\([1,\\infty)\\). Hence the polar paths realize exactly the interval \\([\\FM(P,Q),\\FU(P,Q)]\\) on \\([-1,1]\\), yielding pointwise, generally pair-dependent realizations of all \\(z\\)-fidelity values with \\(z\\ge1/2\\) and of the Log-Euclidean fidelity as generalized fidelities. We also show that for \\(d\\ge2\\) and \\(0<z<1/2\\), such realization fails in general, even for interior fidelities. We further solve the fixed-pair Holevo-base equation \\(F_R(P,Q)=\\FH(P,Q)\\), classify all Holevo bases, and classify exactly which unitary factors of generalized fidelity can arise from a base \\(R\\). These are precisely the unitaries \\(W\\) for which \\(P^{-1/2}Q^{1/2}W\\) is similar to a positive definite matrix. This recovers the special-unitary constraint and disproves the global reverse inclusion \\(SU(d)\\) for \\(d\\ge2\\).", "url": "https://arxiv.org/abs/2605.28885", "type": "理论", "summary": "受 Afham-Ferrie 广义保真度理论中几个未决问题的启发，我们研究了复正定矩阵 \\(\\Pd\\)（\\(d\\times d\\) 锥体）上的极保真度、Holevo 基和酉因子。我们证明，对于每个固定对 \\(P,Q\\in\\Pd\\)，单侧极性保真度 \\(x\\mapsto F_{P^x}(P,Q)\\) 和 \\(x\\mapsto F_{Q^x}(P,Q)\\) 及其对称性在 \\((-\\infty,1]\\) 上不减，在\\([1,\\infty)\\)。因此，极路径精确地实现了 \\([-1,1]\\) 上的区间 \\([\\FM(P,Q),\\FU(P,Q)]\\)，产生所有 \\(z\\)-保真度值与 \\(z\\ge1/2\\) 的点状、一般成对相关的实现，以及作为广义保真度的对数欧几里得保真度。我们还表明，对于 \\(d\\ge2\\) 和 \\(0<z<1/2\\)，这种实现通常会失败，即使对于内部保真度也是如此。我们进一步求解固定对 Holevo 基方程 \\(F_R(P,Q)=\\FH(P,Q)\\)，对所有 Holevo 基进行分类，并准确分类哪些广义保真度的酉因子可以从基 \\(R\\) 中产生。这些正是酉矩阵 \\(W\\)，其中 \\(P^{-1/2}Q^{1/2}W\\) 类似于正定矩阵。\n\n这恢复了特殊酉约束并反驳了 \\(d\\ge2\\) 的全局反向包含 \\(SU(d)\\)。", "authors": [{"name": "Trung Dung Vuong"}], "featured_authors": [{"name": "Trung Dung Vuong"}], "author_count": 1}, {"id": "2605.28906", "category": "quant-ph", "title": "Uncertainty relations in classical and quantum theories of electromagnetism", "abstract": "Sharp uncertainty relations restricting the values of variances in the position space and in the momentum (wavevector) space are derived. They have the same form $\\Delta r\\Delta k\\ge 5/2$ in the classical theory of light beams, in the quantum theory of coherent light beams, and in the quantum theory of individual photons.", "url": "https://arxiv.org/abs/2605.28906", "type": "理论", "summary": "导出了限制位置空间和动量（波矢量）空间中的方差值的尖锐不确定性关系。它们在光束的经典理论、相干光束的量子理论和单个光子的量子理论中具有相同的形式 $\\Delta r\\Delta k\\ge 5/2$。", "authors": [{"name": "Iwo Bialynicki-Birula"}, {"name": "Zofia Bialynicka-Birula"}], "featured_authors": [{"name": "Iwo Bialynicki-Birula"}, {"name": "Zofia Bialynicka-Birula"}], "author_count": 2}, {"id": "2605.28925", "category": "quant-ph", "title": "A local description of strong symmetries and strong-to-weak symmetry breaking in quantum many-body systems", "abstract": "In mixed states of quantum systems, symmetries come in two types: strong and weak. Furthermore, it has been argued that in quantum many-body systems, strong symmetries can be \"spontaneously broken\" down to weak symmetries. An issue is that as previously formulated, such \"strong-to-weak symmetry breaking\" appears to be a fairly non-local effect. In this paper, we show how to understand and diagnose strong symmetries and strong-to-weak symmetry breaking in an explicitly local way. Our main technical tool is a rigorous definition of strong symmetry in the limit of infinite volume, which generalizes the conventional finite-volume definitions, and for which we give several equivalent formulations, including one involving the concept of \"local charge coherence\". Finally, we introduce von Neumann systems, which in infinite-volume symmetries are intermediate between strong and weak symmetries. We derive a Lieb-Schultz-Mattis type anomaly constraint for von Neumann symmetries (and therefore, in particular, strong symmetries) in quantum spin chains.", "url": "https://arxiv.org/abs/2605.28925", "type": "理论", "summary": "在量子系统的混合态中，对称性有两种类型：强对称性和弱对称性。此外，有人认为，在量子多体系统中，强对称性可以“自发破缺”为弱对称性。一个问题是，正如之前所阐述的那样，这种“强到弱的对称性破缺”似乎是一种相当非局部的效应。在本文中，我们展示了如何以明确的局部方式理解和诊断强对称性和强弱对称性破缺。 Our main technical tool is a rigorous definition of strong symmetry in the limit of infinite volume, which generalizes the conventional finite-volume definitions, and for which we give several equivalent formulations, including one involving the concept of \"local charge coherence\".最后，我们介绍冯诺依曼系统，它在无限体积对称性中介于强对称性和弱对称性之间。 We derive a Lieb-Schultz-Mattis type anomaly constraint for von Neumann symmetries (and therefore, in particular, strong symmetries) in quantum spin chains.", "authors": [{"name": "Ruizhi Liu"}, {"name": "Jinmin Yi"}, {"name": "Dominic V. Else"}], "featured_authors": [{"name": "Ruizhi Liu"}, {"name": "Jinmin Yi"}, {"name": "Dominic V. Else"}], "author_count": 3}, {"id": "2605.28927", "category": "quant-ph", "title": "Quantum encodings that preserve persistent homology", "abstract": "Given a data set with a notion of distance, such as a point cloud in Euclidean space, topological data analysis (TDA) uses techniques from algebraic topology and metric geometry to infer the topology of a hypothetical manifold from which the data are sampled. This inference is achieved by calculating topological invariants, some of which are difficult to compute classically. Meanwhile, quantum TDA utilizes quantum processes to extract the invariants used in making such inferences in an attempt to speed up the computations. Because applying transformations to the original classical dataset could alter the associated topological invariants, we investigate which quantum encodings would best preserve the invariants of the original dataset. This line of inquiry is distinct from standard approaches in quantum TDA, whose typical starting point is not from the classical dataset directly, but rather from the associated combinatorial objects, such as simplicial complexes, which typically demand a lot of resources to construct. We take the first step at a more direct approach by focusing on which quantum encodings acting directly on the data are admissible for applying quantum algorithms to extract topological features from classical datasets.", "url": "https://arxiv.org/abs/2605.28927", "type": "理论+数值", "summary": "给定具有距离概念的数据集（例如欧几里得空间中的点云），拓扑数据分析 (TDA) 使用代数拓扑和度量几何技术来推断从中采样数据的假设流形的拓扑。这一推论是通过计算拓扑不变量来实现的，其中一些拓扑不变量很难用经典方法计算。同时，量子 TDA 利用量子过程来提取用于进行此类推论的不变量，以尝试加快计算速度。由于对原始经典数据集应用变换可能会改变相关的拓扑不变量，因此我们研究哪种量子编码最能保留原始数据集的不变量。这种探究路线与量子 TDA 中的标准方法不同，后者的典型起点不是直接来自经典数据集，而是来自相关的组合对象，例如单纯复形，通常需要大量资源来构建。\n\n我们迈出了更直接方法的第一步，重点关注哪些直接作用于数据的量子编码可以应用量子算法从经典数据集中提取拓扑特征。", "authors": [{"name": "Arthur J. Parzygnat"}, {"name": "Andrew Vlasic"}], "featured_authors": [{"name": "Arthur J. Parzygnat"}, {"name": "Andrew Vlasic"}], "author_count": 2}, {"id": "2605.28945", "category": "quant-ph", "title": "Quantum-Enhanced Zero-Error Communication and Storage under Positional Uncertainty", "abstract": "Permutation channels model communication and storage scenarios in which the positional identity of the physical carriers is partially or completely lost, so that the transmitted information is only accessible up to an unknown reordering. Here we show that quantum mechanics can dramatically enhance zero-error communication through such channels. For cyclic reorderings of $n$ $d$-level systems, and in the absence of positional metadata, the number of classical zero-error messages scales asymptotically as $d^n/n$, whereas quantum protocols can fully recover the identity-channel value $d^n$. Ancilla-assisted protocols further increase this number to $d^{2n}/n$, enabling dense coding under positional uncertainty. We also analyze dihedral permutation channels and derive general Pólya-like formulas for the number of distinguishable messages in a broad class of permutation groups. Finally, for the symmetric group $S_n$, corresponding to complete scrambling of the information carriers, the number of distinguishable messages scales as $n^{d-1}$ classically, compared with $n^{d(d+1)/2-1}$ for quantum protocols and $n^{d^2-1}$ in the ancilla-assisted setting. Our results establish a fundamental quantum advantage for communication and storage under positional uncertainty.", "url": "https://arxiv.org/abs/2605.28945", "type": "理论", "summary": "排列信道对通信和存储场景进行建模，其中物理载体的位置标识部分或完全丢失，因此所传输的信息只能在未知的重新排序之前访问。在这里，我们证明量子力学可以通过这种渠道极大地增强零错误通信。对于 $n$ $d$ 级系统的循环重新排序，并且在没有位置元数据的情况下，经典零错误消息的数量渐近缩放为 $d^n/n$，而量子协议可以完全恢复身份通道值 $d^n$。 Ancilla 辅助协议进一步将这个数字增加到 $d^{2n}/n$，从而在位置不确定性下实现密集编码。我们还分析了二面体排列通道，并针对一大类排列群中可区分消息的数量推导了类似于 Pólya 的通用公式。最后，对于对称组 $S_n$，对应于信息载体的完全加扰，传统上可区分消息的数量为 $n^{d-1}$，而量子协议的 $n^{d(d+1)/2-1}$ 和辅助辅助设置中的 $n^{d^2-1}$ 相比。\n\n我们的结果确立了位置不确定性下通信和存储的基本量子优势。", "authors": [{"name": "Arnau Diebra"}, {"name": "David González-Lociga"}, {"name": "Mark Hillery"}, {"name": "John Calsamiglia"}, {"name": "Emili Bagan"}], "featured_authors": [{"name": "Arnau Diebra"}, {"name": "David González-Lociga"}, {"name": "Mark Hillery"}, {"name": "John Calsamiglia"}, {"name": "Emili Bagan"}], "author_count": 5}, {"id": "2605.28967", "category": "quant-ph", "title": "Local Strong-to-Weak Spontaneous Symmetry Breaking", "abstract": "We propose a local notion of strong-to-weak spontaneous symmetry breaking (SW-SSB), through a local one-point fidelity correlator. Compared with the previous definition in terms of a two-point fidelity correlator, our local formulation offers two key advantages: (1) it is easier to detect in large systems: for a system of size $N$ and with ${\\rm poly}(N)$ amount of resources, one can detect the local fidelity order up to volume scale $O(\\log(N))$; and (2) the local SW-SSB order remains well defined in the thermodynamic limit, where the density matrix itself is not well defined. We show that key features of SW-SSB, including stability under finite-depth symmetric channels and long-range conditional mutual information, persist within this local framework. Our definition is conceptually analogous to local thermalization, as exemplified by pure states obeying the eigenstate thermalization hypothesis (ETH). For critical states, the local one-point fidelity correlator defines an interesting class of defect problems. We demonstrate the applicability of the local formulation through several concrete examples, and derive the universal scaling behavior of
