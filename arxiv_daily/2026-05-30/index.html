 the local fidelity correlator in a range of critical systems, including ground states of conformal field theories as well as ballistic and diffusive free-fermion metals.", "url": "https://arxiv.org/abs/2605.28967", "type": "理论", "summary": "我们通过局部单点保真度相关器提出了强弱自发对称破缺（SW-SSB）的局部概念。与之前的两点保真度相关器定义相比，我们的局部公式具有两个关键优势：（1）在大型系统中更容易检测：对于大小为 $N$ 且资源量为 ${\\rm poly}(N)$ 的系统，可以检测到体积规模 $O(\\log(N))$ 的局部保真度阶； (2) 局部 SW-SSB 级数在热力学极限中保持良好定义，而密度矩阵本身并未明确定义。我们证明了 SW-SSB 的关键特征，包括有限深度对称通道下的稳定性和远程条件互信息，在这个局部框架内仍然存在。我们的定义在概念上类似于局部热化，例如服从本征态热化假说（ETH）的纯态。对于临界状态，局部单点保真度相关器定义了一类有趣的缺陷问题。\n\n我们通过几个具体例子证明了局部公式的适用性，并推导了局部保真相关器在一系列关键系统中的通用标度行为，包括共形场论的基态以及弹道和扩散自由费米子金属。", "authors": [{"name": "Francisco Divi"}, {"name": "Leonardo A. Lessa"}, {"name": "Chong Wang"}], "featured_authors": [{"name": "Francisco Divi"}, {"name": "Leonardo A. Lessa"}, {"name": "Chong Wang"}], "author_count": 3}, {"id": "2605.29113", "category": "quant-ph", "title": "Local diagnostics for strong-to-weak spontaneous symmetry breaking and non-equilibrium phase transitions", "abstract": "We construct strongly $\\mathbb{Z}_2$-symmetric local Markov/Lindblad dynamics exhibiting transitions between strong-paramagnetic behavior and strong-to-weak spontaneous symmetry breaking. In 1+1d, an absorbing-state construction gives a transition with scaling consistent with the parity-conserving branching-annihilating random-walk universality class. In 2+1d, a pair-flip variant of Toom's rule provides evidence for a stable strong-paramagnetic/weakly symmetry-broken regime and a transition into an active SWSSB regime. We also introduce a marginal fidelity correlator of radius $R$, a local proxy for the usual SWSSB fidelity order parameter requiring tomography only on $\\mathcal{O}(R^d)$-size regions. For broad classes of states, including symmetry-projected Gibbs-like states satisfying suitable local indistinguishability assumptions, we bound the error between the marginal and global fidelity correlators by terms decaying exponentially in $R$. These marginal fidelities provide a model-independent diagnostic of SWSSB in absorbing-state transitions, where microscopic notions of defects or activity are not universal.", "url": "https://arxiv.org/abs/2605.29113", "type": "理论", "summary": "我们构造了强 $\\mathbb{Z}_2$ 对称局部马尔可夫/林德布拉德动力学，展示了强顺磁行为和强到弱自发对称破缺之间的转变。在 1+1d 中，吸收态构造给出了与奇偶守恒分支湮灭随机游走普遍性类一致的缩放比例的转变。在 2+1d 中，Toom 规则的配对翻转变体为稳定的强顺磁/弱对称破缺状态以及向活跃 SWSSB 状态的转变提供了证据。我们还引入了半径 $R$ 的边际保真度相关器，它是通常 SWSSB 保真度阶参数的本地代理，仅需要在 $\\mathcal{O}(R^d)$ 大小的区域上进行层析成像。对于广泛的状态类别，包括满足适当的局部不可区分性假设的对称投影吉布斯状态，我们通过在 $R$ 中呈指数衰减的项来限制边际保真度相关器和全局保真度相关器之间的误差。这些边际保真度为吸收状态转变中的 SWSSB 提供了一种独立于模型的诊断，其中缺陷或活动的微观概念并不普遍。", "authors": [{"name": "Carolyn Zhang"}], "featured_authors": [{"name": "Carolyn Zhang"}], "author_count": 1}, {"id": "2605.29242", "category": "quant-ph", "title": "Hybrid Gaussian-exponential zero-noise extrapolation for periodic circuits", "abstract": "Zero-noise extrapolation provides a practical means of suppressing gate errors in current noisy intermediate-scale quantum hardware. The accuracy of the zero-noise estimate depends sensitively on the fidelity of the assumed noise model to the actual error scaling. This work introduces a hybrid Gaussian-exponential extrapolation scheme tailored for quantum circuits with periodic structure, which are ubiquitous in quantum algorithms. Under Pauli diagonal errors, by constructing and analyzing an approximate Markov process for the transfer of Pauli operators, we prove a central limit theorem: the noise amplification factor weakly approaches a log-normal distribution, which motivates augmenting the standard exponential model with Gaussian variance corrections. The resulting model requires no prior noise characterization and applies directly to arbitrary periodic circuits. Performance is assessed on Trotterized Ising dynamics, random circuits, and Grover search algorithm using Qiskit noise simulators. For moderate to large circuit depths, the hybrid model yields measurable reductions in bias relative to previous extrapolation variants, indicating its utility for error mitigation on near-term quantum hardware.", "url": "https://arxiv.org/abs/2605.29242", "type": "理论+数值", "summary": "零噪声外推法提供了一种抑制当前噪声中等规模量子硬件中门错误的实用方法。零噪声估计的准确性敏感地取决于假设的噪声模型对实际误差缩放的保真度。这项工作引入了一种混合高斯指数外推方案，专为具有周期性结构的量子电路而设计，这种结构在量子算法中无处不在。在泡利对角误差下，通过构建和分析泡利算子传递的近似马尔可夫过程，我们证明了一个中心极限定理：噪声放大因子弱地接近对数正态分布，这激发了用高斯方差校正来增强标准指数模型。所得模型不需要事先进行噪声表征，并且可以直接应用于任意周期电路。使用 Qiskit 噪声模拟器对 Trotterized Ising 动力学、随机电路和 Grover 搜索算法进行性能评估。\n\n对于中等到大的电路深度，与之前的外推变体相比，混合模型产生了可测量的偏差减少，表明其在近期量子硬件上的错误缓解方面的实用性。", "authors": [{"name": "Tao Wang"}, {"name": "Yun Shang"}], "featured_authors": [{"name": "Tao Wang"}, {"name": "Yun Shang"}], "author_count": 2}, {"id": "2605.29279", "category": "quant-ph", "title": "Permutation Matrix Representation for Quantum Simulation: Comparative Resource Analysis", "abstract": "We present a comparative study of the permutation matrix representation (PMR) method for Hamiltonian simulation alongside other leading quantum algorithms. Our analysis focuses on resource costs for simulating both time-independent and time-dependent Hamiltonians. For the time-independent case, we benchmark PMR against quantum signal processing (QSP) and qubitization, using the Rydberg interaction Hamiltonian as a representative example. For the time-dependent case, we compare the time-dependent extension of PMR with the quantum highly oscillatory protocol (qHOP), applied to a Floquet-driven transverse field Ising model in arbitrary spatial dimensions. In both regimes, we find that PMR offers complementary advantages in resource requirements and exhibits favorable scaling with certain system parameters, suggesting that it may provide practical benefits on resource-constrained quantum hardware.", "url": "https://arxiv.org/abs/2605.29279", "type": "理论+数值", "summary": "我们对哈密顿模拟的置换矩阵表示（PMR）方法与其他领先的量子算法进行了比较研究。我们的分析重点是模拟时间无关和时间相关哈密顿量的资源成本。对于与时间无关的情况，我们使用里德堡相互作用哈密顿量作为代表性示例，将 PMR 与量子信号处理 (QSP) 和量子化进行基准测试。对于时间相关的情况，我们将 PMR 的时间相关扩展与量子高振荡协议 (qHOP) 进行比较，应用于任意空间维度的 Floquet 驱动的横向场 Ising 模型。在这两种情况下，我们发现 PMR 在资源需求方面提供了互补的优势，并且在某些系统参数下表现出良好的扩展性，这表明它可以为资源受限的量子硬件提供实际的好处。", "authors": [{"name": "Hriday Sabharwal"}, {"name": "Itay Hen"}], "featured_authors": [{"name": "Hriday Sabharwal"}, {"name": "Itay Hen"}], "author_count": 2}, {"id": "2605.29374", "category": "quant-ph", "title": "Candidate collapse-noise correlators from Generalized Trace Dynamics: a Hubble-scale spectral line under structural assumptions", "abstract": "We present a conditional construction of candidate CSL-type collapse-noise correlators inspired by Generalized Trace Dynamics (GTD). The construction is not a parameter-free derivation from the minimal GTD Grassmann algebra. It rests on a chain of explicit structural postulates, listed in Section 1; within that auxiliary structure the spectral form and amplitude follow by computation rather than by phenomenological fitting. The resulting narrow-band spectrum at the Hubble scale lies outside the bands of current CSL bounds, so the framework is not in tension with existing high-frequency data. We compute the two-point function of a candidate collapse-noise operator associated with the GTD aikyon decomposition $q_i = q_B + a_0\\beta_i q_F$. In the minimal Grassmann algebra, $q_F$ appears only multiplied by Grassmann generators $\\beta_i$, the reduction of $\\mathrm{Tr}(q_F^\\dagger\\Gamma^\\mu q_F)$ to ghost-mode operators is obstructed by the nilpotent $\\delta\\beta = \\beta_2 - \\beta_1$, and the pure-fermion coefficient $\\beta_1\\beta_2$ has no ordinary sign, modulus, or inverse. We therefore introduce an auxiliary canonical fermionic Fock-space sector for $q_F$, equivalently replacing the nilpotent pure-fermion coefficient by an ordinary effective scalar body parameter. This replacement is an independent structural postulate, not a consequence of the original minimal action. Under this auxiliary postulate, together with a scalar bilinear $J = \\mathrm{Tr}(q_F^\\dagger q_F)$ as bath operator, positive-norm canonical quantization, and an effective sign choice $\\sigma = \\pm1$ for the scalarized pure-fermion sector, elementary Wick contraction gives a Wightman line at $|\\omega| = 2\\omega_0$ with amplitude $A_J = (\\hbar/2m_R\\omega_0 L_{\\mathrm{aik}}^2)^2\\cdot N\\cdot D$. The cosmological identification $\\omega_0 \\sim H_0$ places the line at twice the Hubble scale. [truncated]", "url": "https://arxiv.org/abs/2605.29374", "type": "理论", "summary": "我们提出了受广义迹动力学 (GTD) 启发的候选 CSL 型塌陷噪声相关器的条件构造。该构造不是最小 GTD 格拉斯曼代数的无参数推导。它依赖于第 1 节中列出的一系列明确的结构假设；在该辅助结构内，频谱形式和幅度是通过计算而不是现象学拟合得出的。由此产生的哈勃尺度的窄带频谱位于当前 CSL 范围的频带之外，因此该框架不会与现有的高频数据产生紧张关系。我们计算与 GTD aikyon 分解 $q_i = q_B + a_0\\beta_i q_F$ 相关的候选崩溃噪声算子的两点函数。在最小格拉斯曼代数中，$q_F$仅与格拉斯曼生成器$\\beta_i$相乘，$\\mathrm{Tr}(q_F^\\dagger\\Gamma^\\mu q_F)$到幻影模式算子的约简受到幂零$\\delta\\beta = \\beta_2 - \\beta_1$的阻碍，并且纯费米子系数$\\beta_1\\beta_2$没有普通的符号、模数或倒数。\n\n因此，我们为$q_F$引入了一个辅助的规范费米子福克空间扇区，相当于用普通的有效标量体参数代替了幂零纯费米子系数。这种替换是一个独立的结构假设，而不是原始最小作用的结果。在这个辅助假设下，结合标量双线性 $J = \\mathrm{Tr}(q_F^\\dagger q_F)$ 作为浴算子、正范数正则量化以及标量化纯费米子扇区的有效符号选择 $\\sigma = \\pm1$，初等威克收缩给出了 $|\\omega| 处的怀特曼线。 = 2\\omega_0$，幅度为 $A_J = (\\hbar/2m_R\\omega_0 L_{\\mathrm{aik}}^2)^2\\cdot N\\cdot D$。宇宙学标识 $\\omega_0 \\sim H_0$ 将线置于哈勃尺度的两倍。 [已截断]", "authors": [{"name": "Tejinder P. Singh"}], "featured_authors": [{"name": "Tejinder P. Singh"}], "author_count": 1}, {"id": "2605.29436", "category": "quant-ph", "title": "Total, quantum, and classical measures of anticoherence for mixed spin states", "abstract": "Anticoherent spin states have isotropic low-order spin moments and are relevant to direction-independent metrology and quantum reference-frame alignment. In contrast to pure states, for mixed states such isotropy may originate either from genuine quantum correlations or from classical statistical mixing. We introduce an axiomatic framework for mixed-state $t$-anticoherence based on the symmetric qubit embedding. We distinguish total $t$-anticoherence, non-decreasing under SU(2)-covariant channels, from quantum $t$-anticoherence, defined as a resource monotone relative to a chosen total measure and constrained to coincide with it on pure states. This yields a classical contribution as their difference. We construct total measures based on reduced-state purity, Hilbert-Schmidt distance, and cumulative multipoles, and we discuss fidelity-based total candidates. We construct quantum counterparts via convex-roof extensions of pure-state functionals tied to bipartite entanglement in the symmetric sector. We provide explicit mixed-state examples, identify states with maximal quantum anticoherence supported on anticoherent subspaces, study robustness under particle loss for different types of states, and characterize the trade-off between purity and the maximal achievable anticoherence order.", "url": "https://arxiv.org/abs/2605.29436", "type": "理论", "summary": "反相干自旋态具有各向同性的低阶自旋矩，与方向无关的计量学和量子参考系对准相关。与纯态相反，对于混合态，这种各向同性可能源自真正的量子相关性或源自经典的统计混合。我们引入了基于对称量子位嵌入的混合状态$t$-反相干的公理框架。我们将总 $t$ 反相干性（SU(2) 协变通道下的非递减）与量子 $t$ 反相干性区分开来，量子 $t$ 反相干性定义为相对于所选总测量的资源单调性，并被限制在纯态上与其一致。这产生了作为它们差异的经典贡献。我们基于简化状态纯度、希尔伯特-施密特距离和累积多极构建总测度，并讨论基于保真度的总候选。我们通过与对称扇区中的二分纠缠相关的纯态泛函的凸顶扩展来构造量子对应物。\n\n我们提供了明确的混合态示例，识别反相干子空间支持的具有最大量子反相干的状态，研究不同类型状态在粒子损失下的鲁棒性，并表征纯度和最大可实现反相干阶之间的权衡。", "authors": [{"name": "Jérôme Denis"}, {"name": "Tara Lacaille"}, {"name": "John Martin"}, {"name": "Eduardo Serrano-Ensástiga"}], "featured_authors": [{"name": "Jérôme Denis"}, {"name": "Tara Lacaille"}, {"name": "John Martin"}, {"name": "Eduardo Serrano-Ensástiga"}], "author_count": 4}, {"id": "2605.29508", "category": "quant-ph", "title": "Quantum Markovian Dynamics from a Double Covariance Stochastic Framework", "abstract": "We develop an interacting extension of the Double Covariance Model (DCM), a stochastic subquantum framework in which macroscopic quantum dynamics emerge through coarse-graining of correlated microscopic fluctuations. Starting from local stochastic differential equations on subsystem Hilbert spaces, we derive a closed evolution equation for a coarse-grained double covariance operator using multi-scale Itô calculus and sliding-window averaging. The construction explicitly incorporates two separated temporal scales: a fast microscopic fluctuation scale governing subquantum stochastic processes and a slower macroscopic observation scale associated with coarse-grained dynamics. Within the hydrodynamic limit, where the ratio between microscopic correlation time and averaging-window scale vanishes, rapidly fluctuating corrections disappear and the effective dynamics converges to a deterministic macroscopic transport equation. We show that the emergent macroscopic dynamics has the exact Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) form: coherent Hamiltonian evolution arises from deterministic subquantum flow, while dissipative channels emerge from quadratic noise correlations. The framework further demonstrates how non-separable interaction Hamiltonians can arise from strictly local, state-dependent stochastic feedback fields. In the fluctuation-free limit, the model reduces naturally to the standard von Neumann equation, providing a unified stochastic foundation for both open and closed quantum dynamics.", "url": "https://arxiv.org/abs/2605.29508", "type": "理论", "summary": "我们开发了双协方差模型（DCM）的交互扩展，这是一种随机子量子框架，其中宏观量子动力学通过相关微观波动的粗粒度出现。从子系统 Hilbert 空间上的局部随机微分方程出发，我们使用多尺度 Itô 演算和滑动窗口平均推导了粗粒度双协方差算子的闭合演化方程。该结构明确地结合了两个独立的时间尺度：控制亚量子随机过程的快速微观波动尺度和与粗粒度动力学相关的较慢的宏观观察尺度。在流体动力学极限内，微观相关时间与平均窗口尺度之间的比率消失，快速波动校正消失，有效动力学收敛到确定性宏观输运方程。我们证明，新兴的宏观动力学具有精确的 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 形式：相干哈密顿演化源自确定性亚量子流，而耗散通道则源自二次噪声相关性。\n\n该框架进一步展示了不可分离的相互作用哈密顿量如何从严格局部的、状态相关的随机反馈场中产生。在无涨落极限下，模型自然地简化为标准冯诺依曼方程，为开放和封闭量子动力学提供了统一的随机基础。", "authors": [{"name": "Andrei Khrennikov"}], "featured_authors": [{"name": "Andrei Khrennikov"}], "author_count": 1}, {"id": "2605.29521", "category": "quant-ph", "title": "Ground-state estimation of the Heisenberg model on frustrated lattices with Sample-based Krylov Quantum Diagonalization", "abstract": "Quantum spin simulations of frustrated lattices remain challenging for both classical and quantum algorithms, particularly in parameter regimes relevant to quantum spin liquid (QSL) phases. In this work, we apply Sample-based Krylov Quantum Diagonalization (SKQD) to estimate the ground state of the antiferromagnetic XXZ Heisenberg model on the $J_1$--$J_2$ square lattice, the Kagome lattice, and a 1D chain, studying system sizes from 12 to 72 spins. In our application of SKQD, we identify a ZZ deformation of $\\Delta=2$ as a sufficiently sparse Hamiltonian and introduce two modifications to the SKQD framework tailored to spin models: a canonical bitstring compression scheme that preserves the effectiveness of configuration recovery under spin-flip degeneracy, and the use of multiple Krylov subspaces to improve ground state coverage without any increase in quantum resources. For the 1D chain and Kagome lattice, SKQD achieves sub-percent ground-state energy errors at system sizes up to 24 spins, including a relative error of $0.002\\%$ on the 12-site Kagome lattice, surpassing the best prior VQE result of $0.01\\%$ on the same system while requiring no variational optimization. SKQD further extends to system sizes well beyond the reach of prior quantum algorithm studies, reaching 72 spins across all three geometries. Beyond 24 spins, accuracy degrades to relative errors of $19\\%$--$36\\%$ at 72 sites, but the gradual scaling of error with system size suggests these limits are set by available shot budgets and circuit depth rather than fundamental algorithmic constraints. Although classical tensor network methods remain state-of-the-art for these models, this work establishes a new benchmark for quantum simulation of the frustrated Heisenberg model and demonstrates SKQD as a scalable, hardware-compatible approach for studying strongly correlated spin systems.", "url": "https://arxiv.org/abs/2605.29521", "type": "理论+数值", "summary": "受挫晶格的量子自旋模拟对于经典算法和量子算法来说仍然具有挑战性，特别是在与量子自旋液相（QSL）相关的参数范围中。在这项工作中，我们应用基于样本的 Krylov 量子对角化 (SKQD) 来估计 $J_1$--$J_2$ 方晶格、Kagome 晶格和一维链上反铁磁 XXZ 海森堡模型的基态，研究从 12 到 72 个自旋的系统尺寸。在我们的 SKQD 应用中，我们将 $\\Delta=2$ 的 ZZ 变形识别为足够稀疏的哈密顿量，并对 SKQD 框架进行了两项针对自旋模型的修改：一种规范的位串压缩方案，可在自旋翻转简并下保留配置恢复的有效性，以及使用多个 Krylov 子空间来提高基态覆盖率，而无需增加任何量子资源。对于 1D 链和 Kagome 晶格，SKQD 在高达 24 个自旋的系统尺寸下实现了低于百分之一的基态能量误差，其中包括 12 位点 Kagome 晶格上 $0.002\\%$ 的相对误差，超过了同一系统上 $0.01\\%$ 的先前最佳 VQE 结果，同时无需变分优化。\n\nSKQD 进一步扩展到系统尺寸，远远超出了先前量子算法研究的范围，在所有三种几何结构中达到了 72 个旋转。超过 24 次旋转后，72 个站点的精度会降低到 $19\\%$--$36\\%$ 的相对误差，但误差随系统尺寸的逐渐扩大表明这些限制是由可用的镜头预算和电路深度而不是基本算法约束决定的。尽管经典张量网络方法对于这些模型来说仍然是最先进的，但这项工作为受挫的海森堡模型的量子模拟建立了新的基准，并证明 SKQD 作为一种可扩展的、硬件兼容的方法来研究强相关自旋系统。", "authors": [{"name": "Calvin Brooks"}, {"name": "Henry Zou"}, {"name": "Trevor David Rhone"}], "featured_authors": [{"name": "Calvin Brooks"}, {"name": "Henry Zou"}, {"name": "Trevor David Rhone"}], "author_count": 3}, {"id": "2605.29557", "category": "quant-ph", "title": "Quantum Subliminal Learning", "abstract": "Machine learning models can inherit hidden behavioral traits through innocuous public interfaces, a phenomenon known as subliminal learning. Here we extend this framework to quantum models and study two distillation pathways: an auxiliary channel on random inputs and a restricted task channel in which the student matches a public supervised output while the hidden behavior resides on a disjoint task. Both classical and quantum neural networks (QNNs) exhibit efficient auxiliary-channel subliminal learning, but the task channel shows strong architecture dependence. Classical neural networks transmit little hidden-task information through the public-task interface, whereas QNNs retain most of the hidden-task signal. We show that a unified geometric picture explains both regimes: transmission is controlled by the teacher drift magnitude together with the fraction of hidden-task-relevant drift that remains visible through the public interface. These results identify a concrete security concern for quantum model supply chains and suggest a controlled route for hidden-information transfer in quantum information processing.", "url": "https://arxiv.org/abs/2605.29557", "type": "理论+数值", "summary": "机器学习模型可以通过无害的公共界面继承隐藏的行为特征，这种现象称为潜意识学习。在这里，我们将此框架扩展到量子模型并研究两种蒸馏路径：随机输入的辅助通道和受限任务通道，其中学生匹配公共监督输出，而隐藏行为驻留在不相交的任务上。经典神经网络和量子神经网络（QNN）都表现出高效的辅助通道潜意识学习，但任务通道表现出很强的架构依赖性。经典神经网络通过公共任务接口传输很少的隐藏任务信息，而 QNN 保留大部分隐藏任务信号。我们证明，统一的几何图可以解释这两种情况：传输由教师漂移幅度以及通过公共界面仍然可见的隐藏任务相关漂移的分数来控制。这些结果确定了量子模型供应链的具体安全问题，并提出了量子信息处理中隐藏信息传输的受控路线。", "authors": [{"name": "Shi-Xin Zhang"}, {"name": "Yu-Qin Chen"}], "featured_authors": [{"name": "Shi-Xin Zhang"}, {"name": "Yu-Qin Chen"}], "author_count": 2}, {"id": "2605.29609", "category": "quant-ph", "title": "Engineering recoil heating in coherent-scattering levitated optomechanics", "abstract": "Recoil heating from photon scattering is a fundamental source of decoherence in optical trapping, severely limiting the preparation of nonclassical motional states. In cavity setups in the coherent scattering configuration, a predictive theory of recoil heating rate is missing, as usual perturbative approaches fail in the presence of sharp optical resonances. Hence, current works assume that the recoil heating rate is approximately equal to its free-space value. Here we show that this is not the case, as the electromagnetic environment can strongly modify recoil heating rate by the Purcell effect. Specifically, we predict that this rate can be significantly suppressed in state-of-the-art microcavities, for both center-of-mass and librational motion. To establish these results, we develop a general theoretical framework based on macroscopic quantum electrodynamics and on the few-mode quantization approach developed in nanophotonics. Our method applies to particles trapped in the presence of arbitrary electromagnetic structures, thus providing a route to engineering motional decoherence in levitated optomechanics by photonic structure design.", "url": "https://arxiv.org/abs/2605.29609", "type": "理论", "summary": "光子散射产生的反冲热是光捕获中退相干的基本来源，严重限制了非经典运动态的制备。在相干散射配置的腔体设置中，缺少反冲加热速率的预测理论，因为通常的微扰方法在存在尖锐光学共振的情况下会失败。因此，当前的工作假设反冲加热速率大约等于其自由空间值。在这里，我们证明情况并非如此，因为电磁环境可以通过珀塞尔效应强烈改变反冲加热速率。具体来说，我们预测在最先进的微腔中，对于质心运动和自由运动，该速率可以被显着抑制。为了建立这些结果，我们开发了一个基于宏观量子电动力学和纳米光子学中开发的少模量化方法的通用理论框架。我们的方法适用于在任意电磁结构存在下捕获的粒子，从而提供了通过光子结构设计在悬浮光力学中工程运动退相干的途径。", "authors": [{"name": "Maksim Lednev"}, {"name": "Uroš Delić"}, {"name": "Johannes Feist"}, {"name": "Carlos Gonzalez-Ballestero"}], "featured_authors": [{"name": "Maksim Lednev"}, {"name": "Uroš Delić"}, {"name": "Johannes Feist"}, {"name": "Carlos Gonzalez-Ballestero"}], "author_count": 4}, {"id": "2605.29694", "category": "quant-ph", "title": "Tripartite Interactions Induced Strongly Correlated Quantum Emissions", "abstract": "Efficient generation of multiquanta emission is crucial for quantum information processing but remains challenging due to its typical reliance on higher-order quantum processes. Here, we theoretically demonstrate strongly correlated photon-phonon emission enabled by direct tripartite interaction. This interaction facilitates the formation of high-order multiquanta states without more intermediate state transitions, thereby avoiding the suppressed transition rates associated with multiple sequential processes and substantially improving resonant transitions. As a result, high-efficiency strongly correlated even-quanta emission (e.g., two photons and two phonons) can be achieved in the presences of dissipation. Beyond that, we show that introducing two-photon dissipation enables strongly correlated odd-quanta emission (e.g., two photons and one phonon) in the tripartite interaction system by parity-protected suppression of single-photon loss and reconstruction of higher-order multiquanta processes. Our work extends multiquanta emission into the tripartite coupling regime and holds promising potential for applications in hybrid quantum networks.", "url": "https://arxiv.org/abs/2605.29694", "type": "理论", "summary": "多量子发射的有效生成对于量子信息处理至关重要，但由于其通常依赖于高阶量子过程，因此仍然具有挑战性。在这里，我们从理论上证明了通过直接三方相互作用实现的强相关光子-声子发射。这种相互作用促进了高阶多量子态的形成，而无需更多的中间态跃迁，从而避免了与多个连续过程相关的跃迁速率受到抑制，并显着改善了共振跃迁。因此，在存在耗散的情况下可以实现高效的强相关偶量子发射（例如两个光子和两个声子）。除此之外，我们还表明，通过对单光子损失的奇偶保护抑制和高阶多量子过程的重建，引入双光子耗散可以在三方相互作用系统中实现强相关的奇量子发射（例如，两个光子和一个声子）。我们的工作将多量子发射扩展到三方耦合机制，并在混合量子网络中具有广阔的应用潜力。", "authors": [{"name": "Qian Bin"}, {"name": "Ying Wu"}, {"name": "Franco Nori"}, {"name": "Xin-You Lü"}], "featured_authors": [{"name": "Qian Bin"}, {"name": "Ying Wu"}, {"name": "Franco Nori"}, {"name": "Xin-You Lü"}], "author_count": 4}, {"id": "2605.29724", "category": "quant-ph", "title": "Bound-state-protected phase metrology for a quantum emitter in a Su-Schrieffer-Heeger bath", "abstract": "We study local phase estimation for a single quantum emitter coupled to a bosonic Su-Schrieffer-Heeger (SSH) bath within a microscopic lattice model. Dimerization opens a central gap supporting an in-gap emitter-bath bound state, which suppresses complete relaxation of the emitter coherence. A Dyson-equation analysis yields the local bath Green's function, the in-gap bound-state condition, and the emitter residue controlling the retained phase information. The phase quantum Fisher information links gap formation, detuning, and emitter-bath coupling to the post-transient metrological response. At resonance, stronger coupling enhances transient hybridization but reduces the retained signal by lowering the emitter weight in the bound state. Away from resonance, late-time averages, retention times, and useful interrogation windows track how phase-information protection weakens as the emitter is tuned toward and beyond the band edge. A uniform-chain control shows that the retained signal disappears when the gap closes. In the bulk local-coupling geometry considered here, the response is insensitive to the sign of the dimerization, so the protocol probes spectral-gap physics and bound-state support rather than the SSH winding sector.", "url": "https://arxiv.org/abs/2605.29724", "type": "理论", "summary": "我们研究了微观晶格模型中与玻色子 Su-Schrieffer-Heeger (SSH) 浴耦合的单个量子发射器的局部相位估计。二聚化打开了一个中心间隙，支持间隙内发射极浴束缚态，这抑制了发射极相干性的完全弛豫。戴森方程分析得出局部浴格林函数、带隙内束缚态条件以及控制保留相位信息的发射极残差。相位量子费希尔信息将间隙形成、失谐和发射极浴耦合与瞬态后计量响应联系起来。在共振时，更强的耦合增强了瞬时杂交，但通过降低束缚态的发射器重量而减少了保留的信号。远离谐振，后期平均值、保留时间和有用的询问窗口可以跟踪当发射器调谐到带边缘或超出带边缘时相位信息保护如何减弱。均匀链控制表明，当间隙闭合时，保留的信号消失。\n\n在这里考虑的本体局部耦合几何结构中，响应对二聚化的符号不敏感，因此该协议探测光谱间隙物理和束缚态支持，而不是 SSH 缠绕扇区。", "authors": [{"name": "Sofia Evangelou"}], "featured_authors": [{"name": "Sofia Evangelou"}], "author_count": 1}, {"id": "2605.29725", "category": "quant-ph", "title": "Non-Perturbative Closed Form for the Typical Bipartite Mutual Information of Haar-Random States", "abstract": "The average bipartite quantum mutual information $\\langle I(A{:}B)\\rangle$ of Haar-random pure states can be expressed exactly through Page's formula in terms of digamma functions. We show that this quantity admits a single non-perturbative closed form: $\\langle I(A{:}B)\\rangle = (d_A^2-1)(d_B^2-1)\\,\\mathcal{G}(d_A,d_B,d_E)$, where $\\mathcal{G}$ is given by an explicit convergent integral over a Bose--Einstein kernel. The overall factor $(d_A^2-1)(d_B^2-1)=\\dim[\\mathfrak{su}(d_A)]\\cdot\\dim[\\mathfrak{su}(d_B)]$ is exact, not merely asymptotic. The asymptotic expansion of $\\mathcal{G}$ in $1/N$ yields a Bernoulli-factorised series whose coefficients involve $\\zeta(1{-}2k)$; this series diverges, and our integral is its exact Borel sum. The integral representation also makes $\\langle I\\rangle < (d_A^2{-}1)(d_B^2{-}1)/(2N)$ manifest via a scale-inversion symmetry of the kernel. Our derivation traces the mutual information's structure to an exact decomposition of Page's entropy into a diagonal (Dirichlet) contribution and a Schur-majorisation eigenvalue correction, whose assembly into the mutual information cleanly separates classical from quantum correlations.", "url": "https://arxiv.org/abs/2605.29725", "type": "理论", "summary": "Haar随机纯态的平均二分量子互信息$\\langle I(A{:}B)\\rangle$可以通过Page公式用双伽玛函数精确表达。我们证明这个量承认一个单一的非微扰封闭形式：$\\langle I(A{:}B)\\rangle = (d_A^2-1)(d_B^2-1)\\,\\mathcal{G}(d_A,d_B,d_E)$，其中$\\mathcal{G}$由Bose-Einstein核上的显式收敛积分给出。总因子 $(d_A^2-1)(d_B^2-1)=\\dim[\\mathfrak{su}(d_A)]\\cdot\\dim[\\mathfrak{su}(d_B)]$ 是精确的，而不仅仅是渐近的。 $\\mathcal{G}$ 在 $1/N$ 中的渐近展开产生一个伯努利因式分解级数，其系数涉及 $\\zeta(1{-}2k)$；这个级数发散，我们的积分就是它的精确 Borel 和。积分表示还使得 $\\langle I\\rangle < (d_A^2{-}1)(d_B^2{-}1)/(2N)$ 通过内核的尺度反转对称性显现出来。我们的推导将互信息的结构追溯到佩奇熵精确分解为对角线（狄利克雷）贡献和 Schur 极大化特征值校正，其组装成互信息清楚地将经典相关性与量子相关性分开。", "authors": [{"name": "Zhi-Wei Wang"}, {"name": "Pei-Wen Li"}, {"name": "Samuel L. Braunstein"}], "featured_authors": [{"name": "Zhi-Wei Wang"}, {"name": "Pei-Wen Li"}, {"name": "Samuel L. Braunstein"}], "author_count": 3}, {"id": "2605.29732", "category": "quant-ph", "title": "Exact Geometric Typicality and Bipartite Entanglement from the Projected Central Limit Theorem on Hyperspheres", "abstract": "Starting from the exact Projected Central Limit Theorem on hyperspheres, we rederive the Beta distribution for subsystem occupation probabilities and Lubkin's purity formula from elementary hyperspherical moments, quantifying the finite-size ``platykurtic'' suppression of tails relative to the Gaussian approximation used in standard eigenstate-thermalization and typicality treatments. Our main new result concerns the bipartite quantum mutual information $\\langle I(A{:}B)\\rangle$ for Haar-random pure states. We show that its full asymptotic expansion in $1/N$ admits a Bernoulli-factorized form in which every order $k \\ge 1$ carries the symmetric factor $(d_A^{2k}-1)(d_B^{2k}-1)$ and all higher odd-order corrections vanish identically. Through an exact algebraic reorganization of Page's formula (conjectured in Ref.~\\cite{Page1993} and subsequently proven~\\cite{Foong1994, SanchezRuiz1995, Sen1996}), we establish that the leading finite-size correction separates into a dominant $\\mathfrak{su}(d_A) \\otimes \\mathfrak{su}(d_B)$ bipartite quantum coherence contribution $(d_A^2 - 1)(d_B^2 - 1)/(2N)$ and a subtracted classical-probability (Cartan $\\otimes$ Cartan) contribution $(d_A - 1)(d_B - 1)/(2N)$, and we trace this separation to the difference between diagonal and eigenvalue entropies via Schur's majorisation theorem, with the dimensional counts $(d-1)$ and $(d^2-1)$ acquiring meaning through the Cartan structure of the generalised Bloch decomposition. These results admit a single non-perturbative closed form: the exact typical mutual information factors as $\\langle I(A{:}B)\\rangle = (d_A^2-1)(d_B^2-1)\\,\\mathcal{G}(d_A,d_B,d_E)$, with $\\mathcal{G}$ given by an explicit Bose--Einstein integral whose asymptotic expansion in $1/N$ reproduces the Bernoulli series.", "url": "https://arxiv.org/abs/2605.29732", "type": "理论", "summary": "从精确的超球面投影中心极限定理出发，我们从基本超球面矩重新推导了子系统占据概率的 Beta 分布和 Lubkin 纯度公式，相对于标准本征态热化和典型性处理中使用的高斯近似，量化了尾部的有限尺寸“platykurtic”抑制。我们的主要新结果涉及哈尔随机纯态的二分量子互信息 $\\langle I(A{:}B)\\rangle$。我们证明，它在 $1/N$ 中的完全渐近展开承认伯努利分解形式，其中每个阶 $k \\ge 1$ 都带有对称因子 $(d_A^{2k}-1)(d_B^{2k}-1)$ 并且所有更高的奇数阶校正都相同地消失。\n\n通过对 Page 公式的精确代数重组（在 Ref.~\\cite{Page1993} 中推测并随后证明~\\cite{Foong1994, SanchezRuiz1995, Sen1996}），我们确定领先的有限尺寸校正分离为主导的 $\\mathfrak{su}(d_A) \\otimes \\mathfrak{su}(d_B)$ 二部量子相干贡献 $(d_A^2 - 1)(d_B^2 - 1)/(2N)$ 和减去的经典概率 (Cartan $\\otimes$ Cartan) 贡献 $(d_A - 1)(d_B - 1)/(2N)$，并且我们通过 Schur 的主化定理将这种分离追溯到对角熵和特征值熵之间的差异，维数为 $(d-1)$ $(d^2-1)$ 通过广义布洛赫分解的嘉当结构获得意义。这些结果承认一个单一的非微扰封闭形式：确切的典型互信息因子为 $\\langle I(A{:}B)\\rangle = (d_A^2-1)(d_B^2-1)\\,\\mathcal{G}(d_A,d_B,d_E)$，其中 $\\mathcal{G}$ 由显式 Bose-Einstein 积分给出，其在 $1/N$ 中的渐近展开再现了伯努利级数。", "authors": [{"name": "Zhi-Wei Wang"}, {"name": "Pei-Wen Li"}, {"name": "Samuel L. Braunstein"}], "featured_authors": [{"name": "Zhi-Wei Wang"}, {"name": "Pei-Wen Li"}, {"name": "Samuel L. Braunstein"}], "author_count": 3}, {"id": "2605.29774", "category": "quant-ph", "title": "Quantum algorithms for density functional theory with minimal readout", "abstract": "While quantum computers have shown significant promise for electronic structure calculations, their potential to accelerate density functional theory (DFT) calculations remains unclear. In this work, we present a qubit-efficient encoding scheme for wavefunctions in Kohn--Sham (KS) DFT, together with a quantum algorithm that computes all occupied orbitals simultaneously. We further show that our algorithm is particularly well suited to the Harris functional, enabling the total energy to be evaluated with a potential exponential speedup over classical approaches by entirely avoiding the costly readout of the electronic density. In addition, we propose a second method for achieving self-consistent DFT calculations using multiple copies of the wavefunction, which likewise circumvents density readout. The applicability of our algorithms is demonstrated through several numerical examples, and their efficiency is compared with that of existing approaches.", "url": "https://arxiv.org/abs/2605.29774", "type": "理论+数值", "summary": "虽然量子计算机在电子结构计算方面显示出巨大的前景，但它们加速密度泛函理论（DFT）计算的潜力仍不清楚。在这项工作中，我们提出了 Kohn-Sham (KS) DFT 中波函数的量子位高效编码方案，以及同时计算所有占据轨道的量子算法。我们进一步表明，我们的算法特别适合哈里斯函数，通过完全避免昂贵的电子密度读出，能够以比经典方法潜在的指数加速来评估总能量。此外，我们提出了第二种方法，使用波函数的多个副本来实现自洽 DFT 计算，这同样绕过了密度读数。通过几个数值例子证明了我们算法的适用性，并将其效率与现有方法进行了比较。", "authors": [{"name": "Yuansheng Zhao"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Satoshi Hirose"}, {"name": "Hiroki Sakagami"}, {"name": "Tatsuki Oikawa"}, {"name": "Tatsuya Okayama"}, {"name": "Yu-ichiro Matsushita"}], "featured_authors": [{"name": "Yuansheng Zhao"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Tatsuki Oikawa"}, {"name": "Tatsuya Okayama"}, {"name": "Yu-ichiro Matsushita"}], "author_count": 8}, {"id": "2605.29820", "category": "quant-ph", "title": "Adaptive Stabilizer State Fidelity Certification", "abstract": "Certifying the fidelity of a prepared state to a target stabilizer state is a fundamental task in quantum information processing. Ref. [Phys. Rev. A 99, 042337 (2019)] gave the optimal worst-case lower bound from one fixed stabilizer generator gauge, but gauge dependence can leave a large fidelity ambiguity. We develop an adaptive extension that reports the full certified fidelity interval. First, for a single gauge, we derive the complementary optimal worst-case upper bound. We then formulate gauge selection as an adaptive design problem in which each round solves exact endpoint linear programs and chooses a new gauge by a witness elimination policy. We prove monotonic tightening, exact recovery once all nontrivial stabilizers are covered, and the worst-case necessity of full coverage. Finally, we identify structured syndrome distributions for which adaptivity beats this exponential benchmark, and we numerically confirm faster concentration.", "url": "https://arxiv.org/abs/2605.29820", "type": "理论+数值", "summary": "验证准备状态与目标稳定器状态的保真度是量子信息处理中的一项基本任务。参考号[物理。 Rev. A 99, 042337 (2019)]给出了来自一个固定稳定器发电机规格的最佳最坏情况下界，但规格依赖性可能会留下很大的保真度模糊性。我们开发了一个自适应扩展，可以报告完整的认证保真度区间。首先，对于单个指标，我们得出互补的最佳最坏情况上限。然后，我们将量规选择制定为自适应设计问题，其中每一轮都解决精确的端点线性程序，并通过见证消除策略选择新的量规。我们证明了单调紧缩、一旦覆盖所有重要稳定器后的精确恢复以及完全覆盖的最坏情况的必要性。最后，我们确定了适应性优于指数基准的结构化综合症分布，并在数值上确认了更快的集中度。", "authors": [{"name": "Kun Wang"}], "featured_authors": [{"name": "Kun Wang"}], "author_count": 1}, {"id": "2605.29838", "category": "quant-ph", "title": "Gate Parameter Lee-Yang Zeros and Dynamical Phases in Quantum Circuits", "abstract": "We propose gate-parameter Lee-Yang zeros of Loschmidt amplitudes as probes of dynamical phases in finite quantum circuits. We illustrate this approach using a brickwork model, where the time evolution is generated by repeated application of a Floquet operator. The Loschmidt amplitude can be expressed as a rational function of the gate parameters. At fixed system size and large circuit depth, its zeros in one complexified gate parameter, with the other parameter held fixed, condense onto limiting curves. We show that these curves comprise a universal component governed by equimodular Floquet eigenvalues, as described by the Beraha-Kahane-Weiss theorem, together with state-dependent contributions controlled by the overlap of eigenstate of the Floquet operator with the initial state. As one of the parameters is varied, the set of zeros reorganizes abruptly, providing a finite-qubit diagnostic of a dynamical phase transition. This mechanism does not rely on integrability: while integrability enables an exact calculation of the Loschmidt amplitude, the condensation of zeros follows from spectral competition and local unitarity alone.", "url": "https://arxiv.org/abs/2605.29838", "type": "理论+数值", "summary": "我们提出洛施密特振幅的门参数李杨零点作为有限量子电路中动态相位的探针。我们使用砖砌模型来说明这种方法，其中时间演化是通过重复应用 Floquet 算子生成的。洛施密特振幅可以表示为门参数的有理函数。在固定系统尺寸和大电路深度的情况下，一个复杂的门参数中的零点（在其他参数保持固定的情况下）会浓缩到极限曲线上。我们证明，这些曲线包含由等模 Floquet 特征值控制的通用分量（如 Beraha-Kahane-Weiss 定理所描述的），以及由 Floquet 算子的本征态与初始状态的重叠控制的状态相关贡献。当其中一个参数发生变化时，零值集会突然重新组织，从而提供动态相变的有限量子位诊断。该机制不依赖于可积性：虽然可积性能够精确计算洛施密特振幅，但零值的压缩仅来自谱竞争和局部幺正性。", "authors": [{"name": "Chang Liu"}, {"name": "Yu Wu"}, {"name": "Yunfeng Jiang"}, {"name": "Yang Zhang"}], "featured_authors": [{"name": "Chang Liu"}, {"name": "Yu Wu"}, {"name": "Yunfeng Jiang"}, {"name": "Yang Zhang"}], "author_count": 4}, {"id": "2605.29883", "category": "quant-ph", "title": "Dynamical Casimir photons from rotation of a nonspherical particle", "abstract": "We consider a non-spherical neutral particle spinning in free space and interacting with the electromagnetic quantum vacuum. When the rotation axis is orthogonal to the particle symmetry axis, the scattered field develops frequency sidebands that induce the parametric emission of dynamical Casimir photon pairs. Under the structural constraint of a maximum tip velocity, the emission rate is maximized for a nearly spherical geometry and is further enhanced near a polaritonic resonance. For realistic material parameters, even these optimized upper bounds remain exceedingly small, setting stringent quantitative limits on free-space rotational dynamical Casimir emission with a single nanoparticle.", "url": "https://arxiv.org/abs/2605.29883", "type": "理论+数值", "summary": "我们考虑非球形中性粒子在自由空间中旋转并与电磁量子真空相互作用。当旋转轴与粒子对称轴正交时，散射场会产生频率边带，从而引起动态卡西米尔光子对的参量发射。在最大尖端速度的结构约束下，近球形几何形状的发射速率最大化，并且在极化子共振附近进一步增强。对于实际的材料参数，即使这些优化的上限仍然非常小，对单个纳米颗粒的自由空间旋转动态卡西米尔发射设定了严格的定量限制。", "authors": [{"name": "Guilherme C. Matos"}, {"name": "Lucas Bianchi"}, {"name": "Jeremy N. Munday"}, {"name": "François Impens"}, {"name": "Reinaldo de Melo e Souza"}, {"name": "Paulo A. Maia Neto"}], "featured_authors": [{"name": "Guilherme C. Matos"}, {"name": "Lucas Bianchi"}, {"name": "Jeremy N. Munday"}, {"name": "François Impens"}, {"name": "Reinaldo de Melo e Souza"}, {"name": "Paulo A. Maia Neto"}], "author_count": 6}, {"id": "2605.29944", "category": "quant-ph", "title": "Quadratic Sums-of-Powers for Fixed-Parameter Tractable Quantum-Circuit Simulation", "abstract": "Strongly simulating a quantum circuit, that is, computing an output amplitude, amounts to summing the circuit's Feynman paths, a weighted count over assignments to the Boolean ``path'' variables. The circuit's gates induce correlations among these variables, forming a graph whose structure determines the hardness of the simulation task. This sum-of-powers viewpoint underlies recent simulators built on knowledge-representation tools from artificial intelligence, namely binary decision diagrams and weighted model counting. We show that the structural quantity most accurately governing the difficulty is the rank-width of the path-variable graph, and we give an algorithm that evaluates the amplitude in time that is exponential only in this rank-width and polynomial in the circuit size. Rank-width can be far smaller than the widths that control competing methods: as corollaries, our algorithm reproduces a recent decision-diagram simulation breakthrough as a special case and matches the Markov--Shi tensor-network contraction bound. To complement this, we exhibit circuit families on which our algorithm provably beats both competing methods. The new method applies to every circuit built from Hadamard and diagonal gates, in particular to circuits over Clifford+T. In practical terms, general-purpose decision-diagram and model-counting tools can serve as the workhorse, with our specialized algorithm dispatched to exploit a small rank-width of the associated graph when it is present.", "url": "https://arxiv.org/abs/2605.29944", "type": "理论+数值", "summary": "强烈模拟量子电路，即计算输出幅度，相当于对电路的费曼路径求和，即对布尔“路径”变量赋值的加权计数。电路的门引起这些变量之间的相关性，形成一个图，其结构决定了模拟任务的难度。这种权力总和的观点是基于人工智能知识表示工具（即二元决策图和加权模型计数）构建的最新模拟器的基础。我们证明，最准确地控制难度的结构量是路径变量图的秩宽度，并且我们给出了一种算法，该算法可以评估仅在该秩宽度和电路尺寸中的多项式中呈指数的时间幅度。等级宽度可以远小于控制竞争方法的宽度：作为推论，我们的算法将最近的决策图模拟突破再现为特例，并匹配马尔可夫-施张量网络收缩界限。为了补充这一点，我们展示了电路系列，在这些电路系列上，我们的算法被证明击败了两种竞争方法。\n\n新方法适用于由 Hadamard 和对角门构建的每个电路，特别是 Clifford+T 上的电路。实际上，通用决策图和模型计数工具可以作为主力，我们的专门算法会被调度来利用关联图存在的小排名宽度。", "authors": [{"name": "Alexis de Colnet"}, {"name": "Floris Geerts"}, {"name": "Rihan Hai"}, {"name": "Alfons Laarman"}, {"name": "Joon Hyung Lee"}, {"name": "Guillermo A. Pérez"}], "featured_authors": [{"name": "Alexis de Colnet"}, {"name": "Floris Geerts"}, {"name": "Rihan Hai"}, {"name": "Alfons Laarman"}, {"name": "Joon Hyung Lee"}, {"name": "Guillermo A. Pérez"}], "author_count": 6}, {"id": "2605.29959", "category": "quant-ph", "title": "Quantitative semidefinite certificates for ground-state energies of Pauli Hamiltonians", "abstract": "The $k$-local Hamiltonian problem is a central model for quantum many-body systems and Hamiltonian complexity. Semidefinite programming and noncommutative sum-of-squares hierarchies provide systematic certificates for ground-state energies, but existing finite-convergence results give no quantitative guarantee on the accuracy of the low hierarchy levels accessible in computation. We prove explicit finite-level convergence rates for these hierarchies in the Pauli setting. For $k$-local Hamiltonians whose Pauli expansion contains only even-weight terms, we show that both the NPA-type lower-bound hierarchy and the upper-bound hierarchy on the spectral minimum have error at most $C(k)\\xi^{n,4}_{d+1}/n$, where $\\xi^{n,4}_{d+1}$ is the smallest root of a Krawtchouk polynomial and $C(k)$ is independent of the number of qubits $n$ and the hierarchy level $d$. General $k$-local Hamiltonians reduce to this even-weight case by adding one ancilla qubit while preserving the spectrum. The proof constructs almost-reproducing kernels for the Pauli algebra and relates their spectra to Krawtchouk polynomials, giving a noncommutative analogue of recent kernel-based convergence analyses for commutative polynomial optimization. These results provide the first quantitative finite-level accuracy guarantees for noncommutative semidefinite relaxations of Pauli Hamiltonians.", "url": "https://arxiv.org/abs/2605.29959", "type": "理论+数值", "summary": "$k$ 局部哈密顿问题是量子多体系统和哈密顿复杂性的中心模型。半定规划和非交换平方和层次结构为基态能量提供了系统证明，但现有的有限收敛结果没有对计算中可访问的低层次结构级别的准确性提供定量保证。我们在泡利设置中证明了这些层次结构的显式有限级收敛率。对于泡利展开式仅包含偶权项的 $k$ 局部哈密顿量，我们表明 NPA 型下界层次结构和谱最小值上的上界层次结构的误差至多为 $C(k)\\xi^{n,4}_{d+1}/n$，其中 $\\xi^{n,4}_{d+1}$ 是 Krawtchouk 多项式的最小根，$C(k)$ 与量子位的数量无关$n$ 和层次结构级别 $d$。一般的 $k$ 局部哈密顿量通过在保留谱的同时添加一个辅助量子位来减少到这种偶权情况。\n\n该证明为泡利代数构造了几乎可再现的核，并将它们的谱与 Krawtchouk 多项式联系起来，给出了最近基于核的可交换多项式优化收敛分析的非交换模拟。这些结果为泡利哈密顿量的非交换半定松弛提供了第一个定量的有限级精度保证。", "authors": [{"name": "Igor Klep"}, {"name": "Nando Leijenhorst"}, {"name": "Victor Magron"}], "featured_authors": [{"name": "Igor Klep"}, {"name": "Nando Leijenhorst"}, {"name": "Victor Magron"}], "author_count": 3}, {"id": "2605.30013", "category": "quant-ph", "title": "Elfs, transducers and quantum walks", "abstract": "Electric flow sampling (elfs) is a new tool in the quantum walk toolbox and a useful primitive for solving search, sampling and optimization problems on graphs. We refine this tool by showing that there exists a zero-error transducer for implementing elfs. More broadly, we establish a zero-error transducer for reflecting about the intersection of two subspaces, yielding an errorfree transducer version of the effective gap lemma. Building on this result, we obtain improved quantum walk algorithms for estimating effective resistances and span program witness sizes with an optimal error scaling, and for sampling from the random walk arrival distribution, via the composition of many elfs. Using this last algorithm, we obtain an up-to-quadratic quantum speedup for semi-supervised learning on expander graphs.", "url": "https://arxiv.org/abs/2605.30013", "type": "数值", "summary": "电流采样（elfs）是量子行走工具箱中的一个新工具，也是解决图上搜索、采样和优化问题的有用原语。我们通过证明存在用于实现 elfs 的零误差转换器来完善该工具。更广泛地说，我们建立了一个零误差传感器来反映两个子空间的交集，产生有效间隙引理的无误差传感器版本。在此结果的基础上，我们获得了改进的量子游走算法，用于通过最佳误差缩放来估计有效阻力和跨度程序见证大小，并通过许多精灵的组合从随机游走到达分布中进行采样。使用最后一个算法，我们获得了扩展图半监督学习的高达二次量子加速。", "authors": [{"name": "Simon Apers"}, {"name": "Jérémie Roland"}, {"name": "Yuxin Zhang"}], "featured_authors": [{"name": "Simon Apers"}, {"name": "Jérémie Roland"}, {"name": "Yuxin Zhang"}], "author_count": 3}, {"id": "2605.30026", "category": "quant-ph", "title": "On the question of noise as a resource in quantum computing", "abstract": "Noise is usually regarded as the main obstacle to achieving a scalable quantum advantage, but recent evidence in quantum reservoir computing [L. Domingo, F. Borondo, and G. G. Carlo. Taking advantage of noise in quantum reservoir computing, Scientific Reports, 13:8790, 2023] suggests that certain channels can, in appropriate regimes, improve performance by enriching the reservoir's effective dynamics. Motivated by this idea we propose a geometric mechanism to explain how non-unital noise applied together with a universal gate set leads to a faster approach to Haar-like distributions of the final states. We find that noise of this kind induces an effective volume expansion on the manifold of pure states. In order to intuitively understand this we use a minimal 1 qubit model where we take the amplitude damping channel and combine it with a renormalization rule that associates to each resulting mixed state a representative pure state. This composition defines a globally expanding nonlinear map on the space of pure states. We analytically derive the local area expansion factor and identify the global expansion threshold. Finally, we combine amplitude damping with the G3 = {H, T, CNOT} universal gate set to show how the approach to Haar-like behavior is faster in an appropriate parameter region. This leads us to propose noise as a possible resource in future quantum algorithms.", "url": "https://arxiv.org/abs/2605.30026", "type": "理论+数值", "summary": "噪声通常被认为是实现可扩展量子优势的主要障碍，但量子库计算的最新证据 [L.多明戈、F. Borondo 和 G. G. Carlo。利用量子储层计算中的噪声，Scientific Reports, 13:8790, 2023]表明，某些通道可以在适当的情况下通过丰富储层的有效动态来提高性能。受这个想法的启发，我们提出了一种几何机制来解释非单位噪声如何与通用门集一起应用，从而更快地获得最终状态的类哈尔分布。我们发现这种噪声会引起纯态流形上的有效体积膨胀。为了直观地理解这一点，我们使用最小 1 量子位模型，其中我们采用振幅阻尼通道并将其与重整化规则相结合，该重整化规则将每个结果混合状态与代表性纯状态相关联。该组合定义了纯态空间上的全局扩展非线性映射。我们分析得出局部区域扩展因子并确定全局扩展阈值。\n\n最后，我们将振幅阻尼与 G3 = {H, T, CNOT} 通用门集结合起来，以展示类似哈尔行为的方法如何在适当的参数区域中更快。这促使我们提出噪声作为未来量子算法中可能的资源。", "authors": [{"name": "J. Montes"}, {"name": "F. Borondo"}, {"name": "Gabriel G. Carlo"}], "featured_authors": [{"name": "J. Montes"}, {"name": "F. Borondo"}, {"name": "Gabriel G. Carlo"}], "author_count": 3}, {"id": "2605.30110", "category": "quant-ph", "title": "Alternative adiabatic quantum dynamics with algorithmic applications", "abstract": "In adiabatic quantum computing the aim is to track an eigenstate as the Hamiltonian changes. In the usual setup this is achieved using the natural time-dependent Hamiltonian evolution of the system and the main technical tool is the adiabatic theorem. We propose several alternative processes that achieve the same goal, but can easily be implemented on a gate-based quantum computer without the overhead of simulating time-dependent Hamiltonian evolution. We give a general framework for deriving `adiabatic' theorems for these processes. As an application, we give various algorithms for solving the Quantum Linear Systems Problem (QLSP) with optimal scaling in the condition number. One of these algorithms was previously developed in [Cunningham, Roland 2024] and another can be seen as a randomised version of the discrete adiabatic algorithm of [Costa et al. 2022]. We also describe versions of Trotterisation in our framework, which allows several results from [An et al. 2025] to be reproduced in a randomised setting. In particular, bounds on the Trotter error in terms of the fidelity are obtained that are asymptotically better than the standard bounds.", "url": "https://arxiv.org/abs/2605.30110", "type": "理论+数值", "summary": "在绝热量子计算中，目标是随着哈密顿量的变化来跟踪本征态。在通常的设置中，这是使用系统的自然时间相关哈密顿演化来实现的，主要技术工具是绝热定理。我们提出了几种实现相同目标的替代过程，但可以轻松地在基于门的量子计算机上实现，而无需模拟与时间相关的哈密顿演化的开销。我们给出了推导这些过程的“绝热”定理的一般框架。作为一个应用，我们提供了各种算法来解决量子线性系统问题（QLSP），并在条件数中具有最佳缩放。其中一种算法之前是在 [Cunningham, Roland 2024] 中开发的，另一种算法可以看作是 [Costa 等人，2024] 离散绝热算法的随机版本。 2022]。我们还在我们的框架中描述了 Trotterization 的版本，它允许来自 [An et al. 2025]将在随机设置中复制。特别是，获得的 Trotter 误差在保真度方面的界限渐近优于标准界限。", "authors": [{"name": "Joseph Cunningham"}, {"name": "Jérémie Roland"}], "featured_authors": [{"name": "Joseph Cunningham"}, {"name": "Jérémie Roland"}], "author_count": 2}, {"id": "2605.30124", "category": "quant-ph", "title": "Simulation of smooth models of potentials with singular point using Many-Interacting-Worlds Method", "abstract": "The deterministic many-interacting-worlds method proposed in 2014 showed potential among the numerous interpretation of quantum mechanics. The successful application of this method in harmonic oscillator has been promoted for a long time. In this article we continue the idea about using this method to solve some bounded systems different from harmonic oscillator potential and extend to 2 dimension cases. We focus on the potential with singularity like coulomb potential and finite trap potential by some asymptotic smooth method. The numerical simulation mainly based on the dynamical algorithm proposed in many-interacting-worlds method will be used to approach the stationary states of given systems. Our results shows the consistency to the matrix Numerov method in standard quantum mechanics in solving bounded systems and provides the possibility to solve more complex systems.", "url": "https://arxiv.org/abs/2605.30124", "type": "理论+数值", "summary": "2014 年提出的确定性多相互作用世界方法在量子力学的众多解释中显示出了潜力。该方法在谐振子中的成功应用已得到长期推广。在本文中，我们继续使用此方法来解决一些不同于谐振子势的有界系统的想法，并将其扩展到二维情况。我们通过某种渐近平滑方法关注库仑势和有限陷阱势等具有奇异性的势。主要基于多相互作用世界方法中提出的动态算法的数值模拟将用于接近给定系统的稳态。我们的结果表明了标准量子力学中矩阵Numerov方法在求解有界系统时的一致性，并为求解更复杂的系统提供了可能性。", "authors": [{"name": "Wen Chen"}, {"name": "An Min Wang"}], "featured_authors": [{"name": "Wen Chen"}, {"name": "An Min Wang"}], "author_count": 2}, {"id": "2605.30142", "category": "quant-ph", "title": "Koopman--von Neumann Molecular Dynamics for Green--Kubo Transport Coefficients", "abstract": "We formulate the Green--Kubo transport coefficients of classical molecular dynamics as a readout problem for quantum algorithms using the Koopman--von Neumann (KvN) representation. Both NVE and Nosé--Hoover-type NVT dynamics are derived as unitary evolutions on Hilbert spaces associated with the corresponding classical phase spaces. Numerical benchmarks on finite grids show that the discretization error in the correlation function decreases as a power law in the number of grid points $N_z$. Equivalently, with $N_z=2^{n_z}$, the error decreases exponentially in the register size $n_z$, so a target accuracy $\\epsilon$ requires $n_z=\\mathcal{O}(\\log(1/\\epsilon))$ qubits. To read out a transport coefficient, we input a flux-excited state to quantum phase estimation (QPE). The probability $P_0$ of measuring the QPE ancilla register in the all-zero state corresponds to a Bartlett-windowed Green--Kubo integral. With maximum-likelihood amplitude estimation, the statistical estimation of $P_0$ defined by this QPE oracle improves from the $N_{\\rm queries}^{-1/2}$ scaling of direct shot sampling to scaling close to $N_{\\rm queries}^{-1}$. Our circuit-resource analysis shows that one step of the NVE propagator can be built with $\\mathcal{O}(n^2)$ CX gates, where $n=n_x+n_p$ is the total number of position and momentum qubits. For the NVT propagator, the centered-difference Pauli-decomposition implementation of the Nosé--Hoover friction term scales as $\\mathcal{O}(n_\\xi n_p\\,2^{n_p})$, where $n_p$ and $n_\\xi$ are the numbers of momentum and thermostat qubits, respectively. The proposed framework is a concrete step toward translating the principles of quantum algorithms into the transport-coefficient calculations required in practical molecular simulation.", "url": "https://arxiv.org/abs/2605.30142", "type": "数值", "summary": "我们使用 Koopman-von Neumann (KvN) 表示形式将经典分子动力学的 Green-Kubo 输运系数公式化为量子算法的读出问题。 NVE 和 Nosé--Hoover 型 NVT 动力学都是作为与相应经典相空间相关的希尔伯特空间上的酉演化而导出的。有限网格上的数值基准表明，相关函数中的离散化误差随着网格点数 $N_z$ 的幂律而减小。同样，当 $N_z=2^{n_z}$ 时，寄存器大小 $n_z$ 的误差呈指数下降，因此目标精度 $\\epsilon$ 需要 $n_z=\\mathcal{O}(\\log(1/\\epsilon))$ 个量子位。为了读出输运系数，我们将磁通激发态输入到量子相位估计 (QPE)。在全零状态下测量 QPE 辅助寄存器的概率 $P_0$ 对应于 Bartlett 窗 Green-Kubo 积分。通过最大似然幅度估计，该 QPE 预言机定义的 $P_0$ 的统计估计从直接样本采样的 $N_{\\rm 查询}^{-1/2}$ 缩放提高到接近 $N_{\\rm 查询}^{-1}$ 的缩放。\n\n我们的电路资源分析表明，NVE 传播器的一步可以使用 $\\mathcal{O}(n^2)$ CX 门构建，其中 $n=n_x+n_p$ 是位置和动量量子位的总数。对于 NVT 传播器，Nosé--Hoover 摩擦项的中心差分泡利分解实现缩放为 $\\mathcal{O}(n_\\xi n_p\\,2^{n_p})$，其中 $n_p$ 和 $n_\\xi$ 分别是动量和恒温器量子位的数量。所提出的框架是将量子算法原理转化为实际分子模拟所需的传输系数计算的具体步骤。", "authors": [{"name": "Masari Watanabe"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Shigekazu Hidaka"}, {"name": "Ryo Sakurai"}, {"name": "Yu-ichiro Matsushita"}], "featured_authors": [{"name": "Masari Watanabe"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Shigekazu Hidaka"}, {"name": "Ryo Sakurai"}, {"name": "Yu-ichiro Matsushita"}], "author_count": 6}, {"id": "2605.30143", "category": "quant-ph", "title": "End-to-End Molecular Dynamics with a Langevin Thermostat on Quantum Circuits", "abstract": "We construct a quantum-circuit framework for finite-temperature molecular dynamics in the canonical ensemble (NVT) with a Langevin thermostat, connecting canonical state preparation to subsequent physical-property readouts. The classical nuclear phase-space distribution is encoded as a Koopman--von Neumann (KvN) wave function, and canonical state preparation is formulated as Langevin-type Fokker--Planck relaxation. The Hamiltonian Liouville flow, momentum friction, and momentum diffusion are decomposed into separate circuit blocks. The friction block is represented by a symmetrized momentum-space dilation, whereas the diffusion block is implemented as a cosine filter realized by probabilistic imaginary-time evolution (PITE). We analytically quantify the leading-order temperature bias caused by replacing the Gaussian diffusion kernel with this PITE-realized cosine filter. This analysis yields an internal-temperature correction that targets the desired physical equilibrium distribution. As a proof-of-concept demonstration connecting quantum chemistry to KvN nuclear dynamics, we study the H$_2$ molecule. Numerical simulations show relaxation from a nonequilibrium phase-space distribution to a canonical KvN state. From this canonical state, we demonstrate two complementary readouts: a dynamical quantum-phase-estimation readout of the vibrational density of states associated with the H--H stretch coordinate and a static canonical evaluation of the transition-state-theory (TST) rate constant. This work demonstrates, in a minimal molecular system, a circuit-level protocol that connects Langevin canonical state preparation to physical-property calculations, providing a concrete step toward quantum--classical hybrid molecular dynamics on quantum computers.", "url": "https://arxiv.org/abs/2605.30143", "type": "理论+数值", "summary": "我们使用 Langevin 恒温器构建了规范系综 (NVT) 中有限温度分子动力学的量子电路框架，将规范状态准备与随后的物理性质读数连接起来。经典核相空间分布被编码为库普曼-冯·诺依曼 (KvN) 波函数，规范状态准备被公式化为朗之万型福克-普朗克弛豫。哈密​​顿刘维尔流、动量摩擦和动量扩散被分解为单独的电路块。摩擦块由对称动量空间膨胀表示，而扩散块则实现为通过概率虚数时间演化 (PITE) 实现的余弦滤波器。我们分析量化了用 PITE 实现的余弦滤波器替换高斯扩散核所引起的前阶温度偏差。该分析产生针对所需物理平衡分布的内部温度校正。作为将量子化学与 KvN 核动力学联系起来的概念验证演示，我们研究了 H$_2$ 分子。\n\n数值模拟显示从非平衡相空间分布松弛到规范 KvN 状态。从这个规范状态，我们展示了两个互补的读数：与 H--H 拉伸坐标相关的状态振动密度的动态量子相位估计读数和过渡态理论 (TST) 速率常数的静态规范评估。这项工作在最小分子系统中展示了一种电路级协议，该协议将朗之万规范状态准备与物理性质计算连接起来，为量子计算机上的量子-经典混合分子动力学迈出了具体的一步。", "authors": [{"name": "Masari Watanabe"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Shigekazu Hidaka"}, {"name": "Ryo Sakurai"}, {"name": "Yu-ichiro Matsushita"}], "featured_authors": [{"name": "Masari Watanabe"}, {"name": "Hirofumi Nishi"}, {"name": "Taichi Kosugi"}, {"name": "Shigekazu Hidaka"}, {"name": "Ryo Sakurai"}, {"name": "Yu-ichiro Matsushita"}], "author_count": 6}, {"id": "2605.30165", "category": "quant-ph", "title": "Tunneling phase diagram: A machine-learning framework for multidimensional kinetic isotope effects", "abstract": "The kinetic isotope effect (KIE) is the conventional probe for quantum tunneling, yet its composite nature conflates tunneling with zero-point energy and classical kinetics. Here, we introduce the tunneling phase diagram, a machine-learning framework that decouples true tunneling strength by decoding the nonlinear relationship between KIE and the tunneling factor (\\k{appa}). With exceptional fidelity (R^2 > 0.98, RMSE = 0.21), this framework reveals an anomalous high KIE-low \\k{appa} spanning 300-600 K, thereby defining a paradigm for the quantitative assessment of quantum tunneling.", "url": "https://arxiv.org/abs/2605.30165", "type": "数值", "summary": "动同位素效应（KIE）是量子隧道效应的传统探针，但其复合性质将隧道效应与零点能量和经典动力学混为一谈。在这里，我们介绍隧道相图，这是一种机器学习框架，它通过解码 KIE 和隧道因子 (\\k{appa}) 之间的非线性关系来解耦真实的隧道强度。该框架具有出色的保真度（R^2 > 0.98，RMSE = 0.21），揭示了跨越 300-600 K 的异常高 KIE-低 \\k{appa}，从而定义了量子隧道效应定量评估的范例。", "authors": [{"name": "Xinrui Yang"}, {"name": "Zhigang Wang"}], "featured_authors": [{"name": "Xinrui Yang"}, {"name": "Zhigang Wang"}], "author_count": 2}, {"id": "2605.30217", "category": "quant-ph", "title": "Programmable Dissipation via Partial Quantum Error Correction", "abstract": "Noise is typically treated as the adversary of quantum information processing. For open quantum dynamics, however, dissipation is part of the target physics, creating a tension with fault-tolerant architectures designed to suppress decoherence. Here we show that logical noise can instead be turned into a calibrated resource. We treat the error-correction cycle as a programmable primitive: one fault-tolerant round induces a logical completely positive trace-preserving map, and decoder/recovery randomization generates a controllable family of logical channels whose convex mixtures realize Kraus-channel mixing. This enables direct compilation of target dissipators into effective logical dynamics without explicit ancilla qubits for encoding the bath degree of freedoms. We derive an accuracy criterion for multi-step simulation in which the code distance is chosen so that uncontrolled logical errors remain a small fraction of the intended dissipation per step, rather than being driven below an arbitrarily small closed-system tolerance. Partial quantum error correction thus repurposes fault-tolerant structure to sculpt dissipation, offering a resource-efficient route to quantum simulation of open quantum systems.", "url": "https://arxiv.org/abs/2605.30217", "type": "理论+数值", "summary": "噪声通常被视为量子信息处理的敌人。然而，对于开放量子动力学，耗散是目标物理的一部分，与旨在抑制退相干的容错架构产生了张力。在这里，我们展示了逻辑噪声可以转变成校准资源。我们将纠错周期视为可编程原语：一个容错轮产生逻辑上完全正的轨迹保留映射，并且解码器/恢复随机化生成一系列可控的逻辑通道，其凸混合实现克劳斯通道混合。这使得能够将目标耗散器直接编译成有效的逻辑动力学，而无需用于编码浴自由度的显式辅助量子位。我们推导出多步仿真的准确度标准，其中选择代码距离，以便不受控制的逻辑错误保持为每步预期耗散的一小部分，而不是被驱动到任意小的封闭系统容差以下。\n\n因此，部分量子纠错重新利用了容错结构来塑造耗散，为开放量子系统的量子模拟提供了一条资源有效的途径。", "authors": [{"name": "Sameer Dambal"}, {"name": "Michael AD Taylor"}, {"name": "Yu Zhang"}], "featured_authors": [{"name": "Sameer Dambal"}, {"name": "Michael AD Taylor"}, {"name": "Yu Zhang"}], "author_count": 3}, {"id": "2605.30238", "category": "quant-ph", "title": "Indefinite Causal Order Reverses the Real-Complex Hierarchy", "abstract": "Can causal relations be subject to quantum indefiniteness, similar to other physical properties? The process-matrix framework formalises this possibility: valid processes are defined by what local laboratories can implement, without assuming a global causal order. Standardly, the local labs are assumed to implement arbitrary quantum instruments. We ask what happens when symmetries restrict these local operations. Symmetry constraints, such as those arising from missing reference frames, superselection constraints, or the antiunitary symmetry defining real quantum theory, enlarge the admissible process cone. Do these extra processes generate genuinely new correlations? We prove a sharp dichotomy: no for any finite unitary symmetry, yes for real quantum theory. Recent work has shown that, under fixed and definite causal order, complex quantum theory is strictly richer than real quantum theory. Our work shows that this hierarchy is reversed under indefinite causal order: real quantum theory realizes strictly more process correlations than complex quantum theory.", "url": "https://arxiv.org/abs/2605.30238", "type": "理论", "summary": "类似于其他物理性质，因果关系是否会受到量子不确定性的影响？过程矩阵框架形式化了这种可能性：有效的过程由当地实验室可以实施的内容来定义，而不假设全球因果顺序。标准情况下，假设当地实验室可以实现任意量子仪器。我们问当对称性限制这些局部操作时会发生什么。对称约束，例如因丢失参考系、超选择约束或定义实量子理论的反酉对称而产生的对称约束，会扩大可接受的过程锥。这些额外的过程是否会产生真正的新关联？我们证明了一个尖锐的二分法：对于任何有限酉对称性来说都不是，对于真正的量子理论来说是的。最近的工作表明，在固定且确定的因果顺序下，复杂量子理论比真实量子理论更加丰富。我们的工作表明，这种层次结构在不确定的因果顺序下是相反的：真正的量子理论比复杂的量子理论实现了更多的过程相关性。", "authors": [{"name": "Jacopo Surace"}, {"name": "Shintaro Minagawa"}, {"name": "Ravi Kunjwal"}], "featured_authors": [{"name": "Jacopo Surace"}, {"name": "Shintaro Minagawa"}, {"name": "Ravi Kunjwal"}], "author_count": 3}, {"id": "2605.30252", "category": "quant-ph", "title": "Quantum optimization beyond QUBO for industrial logistics and scheduling", "abstract": "The increasing complexity of industrial scheduling and transport routing problems motivates the study of alternative optimization formulations and computational paradigms. In this work, we study how higher-order unconstrained binary optimization (HUBO) formulations of such problems map onto quantum optimization workflows in both noisy and fault-tolerant regimes. We consider three representative logistics and manufacturing use cases and formulate each as a HUBO problem. This captures process intricacies, such as highly correlated assembly-line scheduling rules, which are difficult to express faithfully with the standard quadratic (QUBO) form, while at the same time reducing the number of binary variables required in the quantum mapping, thus lowering qubit demand. We compare the HUBO formulations with corresponding QUBO encodings, highlighting a key trade-off: while HUBO reduces qubit requirements through compact binary encoding, it introduces higher-order interaction terms that increase circuit depth, limiting feasibility on current quantum hardware. The proposed formulations are validated using classical solvers across several problem instances and benchmark small routing problem instances using bias-field digitized counterdiabatic quantum optimization in classical simulation. We complement these results with a resource and scalability analysis, focusing on the capacitated vehicle routing problem as a representative large-scale industrial use case. Our analysis indicates that while HUBO formulations offer advantages in qubit scaling compared to QUBO encodings, their practical implementation is constrained by gate fidelity, coherence, and circuit depth, making hybrid quantum-classical workflows and early fault-tolerant quantum hardware the most plausible settings for their practical use.", "url": "https://arxiv.org/abs/2605.30252", "type": "理论+数值", "summary": "工业调度和运输路线问题日益复杂，激发了对替代优化公式和计算范式的研究。在这项工作中，我们研究了此类问题的高阶无约束二元优化（HUBO）公式如何映射到噪声和容错机制中的量子优化工作流程。我们考虑三个具有代表性的物流和制造用例，并将每个用例表述为 HUBO 问题。这捕获了复杂的过程，例如高度相关的装配线调度规则，这些规则很难用标准二次（QUBO）形式忠实地表达，同时减少了量子映射中所需的二进制变量的数量，从而降低了量子位需求。我们将 HUBO 公式与相应的 QUBO 编码进行比较，强调了一个关键的权衡：虽然 HUBO 通过紧凑的二进制编码减少了量子位需求，但它引入了增加电路深度的高阶相互作用项，限制了当前量子硬件的可行性。\n\n使用跨多个问题实例的经典求解器对所提出的公式进行了验证，并使用经典模拟中的偏置场数字化反非线性量子优化对小型路由问题实例进行了基准测试。我们通过资源和可扩展性分析来补充这些结果，重点关注作为代表性大规模工业用例的容量车辆路径问题。我们的分析表明，虽然 HUBO 公式与 QUBO 编码相比在量子位缩放方面具有优势，但它们的实际实现受到门保真度、相干性和电路深度的限制，使得混合量子经典工作流程和早期容错量子硬件成为其实际使用的最合理的设置。", "authors": [{"name": "Juan F. R. Hernandez"}, {"name": "Pavle Nikacevic"}, {"name": "Enrique Solano"}, {"name": "Chinonso Onah"}, {"name": "Agneev Guin"}, {"name": "Arne-Christian Voigt"}, {"name": "Archismita Dalal"}], "featured_authors": [{"name": "Juan F. R. Hernandez"}, {"name": "Pavle Nikacevic"}, {"name": "Enrique Solano"}, {"name": "Agneev Guin"}, {"name": "Arne-Christian Voigt"}, {"name": "Archismita Dalal"}], "author_count": 7}, {"id": "2605.30271", "category": "quant-ph", "title": "Quantum Synchronization of Fock States", "abstract": "Synchronization, a ubiquitous phenomenon in classical systems, has recently been extended to the quantum domain. Here, we show quantum synchronization of a bosonic mode exhibiting a Fock state-like limit cycle, manifesting as a steady state with a negative Wigner function. We demonstrate that this non-classical state can be phase-locked to an external drive, achieving synchronization within an Arnold tongue regime. We argue that synchronization is a dynamical property and fundamentally tied to the suppression of phase slips, which we show to occur with exponentially decreasing probability. We introduce a novel method to extract the phase slip rate from the Lindblad time evolution of the system. This work opens new avenues for understanding and manipulating non-classical synchronization dynamics.", "url": "https://arxiv.org/abs/2605.30271", "type": "理论", "summary": "同步是经典系统中普遍存在的现象，最近已扩展到量子领域。在这里，我们展示了玻色子模式的量子同步，表现出类似福克状态的极限环，表现为具有负维格纳函数的稳态。我们证明这种非经典状态可以锁相到外部驱动器，从而在阿诺德舌头机制内实现同步。我们认为同步是一种动态特性，从根本上与相位滑移的抑制有关，我们证明相位滑移发生的概率呈指数下降。我们引入了一种从系统的 Lindblad 时间演化中提取相滑率的新方法。这项工作为理解和操纵非经典同步动力学开辟了新途径。", "authors": [{"name": "Fabian Hassler"}, {"name": "David Scheer"}, {"name": "Samah Saquaque"}, {"name": "Steven Kim"}], "featured_authors": [{"name": "Fabian Hassler"}, {"name": "David Scheer"}, {"name": "Samah Saquaque"}, {"name": "Steven Kim"}], "author_count": 4}, {"id": "2605.30301", "category": "quant-ph", "title": "Improved sample complexity bound for sample-based Lindbladian simulation", "abstract": "We establish improved sample-complexity bounds for sample-based Lindbladian simulation based on the Wave Matrix Lindbladization (WML) algorithm. For a jump operator $L$ with dimension $d$, we derive an explicit non-asymptotic sample complexity bound $n_d^*(t,\\varepsilon) \\le \\left( \\frac{2d+3}{8} \\right) \\|L\\|_\\infty^2 \\left( \\frac{t^2}{\\varepsilon} \\right)$, holding for simulation time $t$ and error $\\varepsilon$. This refines the dimension dependence of the best previously known bound, $O(d^2 t^2/\\varepsilon)$, from [Go et al., Quantum Sci. Tech. 10, 045058 (2025)]. Remarkably, we show that this dimensional overhead can be entirely avoided when $\\| L\\|_\\infty^2 = O(1/d)$, a condition satisfied with high probability for random Lindblad operators, yielding a typical-case sample complexity of $O(t^2/\\varepsilon)$. On the other hand, in the worst case, we show that WML necessarily requires $\\Omega(dt^2/\\varepsilon)$ samples by constructing an explicit example with a rank-one Lindblad operator. Our results reveal a sharp dichotomy between typical and adversarial sample complexities in Lindbladian simulation, thereby strengthening the theoretical foundations of sample-based quantum algorithms.", "url": "https://arxiv.org/abs/2605.30301", "type": "理论+数值", "summary": "我们基于波矩阵 Lindbladization (WML) 算法，为基于样本的 Lindbladian 模拟建立了改进的样本复杂度界限。对于维度为 $d$ 的跳转算子 $L$，我们得出显式非渐近样本复杂度界限 $n_d^*(t,\\varepsilon) \\le \\left( \\frac{2d+3}{8} \\right) \\|L\\|_\\infty^2 \\left( \\frac{t^2}{\\varepsilon} \\right)$，保持模拟时间 $t$ 和误差 $\\varepsilon$。这精炼了先前已知的最佳边界 $O(d^2 t^2/\\varepsilon)$ 的维度依赖性，来自 [Go et al., Quantum Sci.技术。 10、045058（2025）]。值得注意的是，我们表明，当 $\\| 时，可以完全避免这种维度开销。 L\\|_\\infty^2 = O(1/d)$，随机 Lindblad 算子高概率满足的条件，产生 $O(t^2/\\varepsilon)$ 的典型情况样本复杂度。另一方面，在最坏的情况下，我们通过使用排名一的 Lindblad 运算符构建显式示例来证明 WML 必然需要 $\\Omega(dt^2/\\varepsilon)$ 样本。\n\n我们的结果揭示了 Lindbladian 模拟中典型样本复杂性和对抗样本复杂性之间的尖锐二分法，从而加强了基于样本的量子算法的理论基础。", "authors": [{"name": "Siheon Park"}, {"name": "Youngjin Seo"}, {"name": "Byeongseon Go"}, {"name": "Dhrumil Patel"}, {"name": "Mark M. Wilde"}, {"name": "Hyukjoon Kwon"}], "featured_authors": [{"name": "Siheon Park"}, {"name": "Youngjin Seo"}, {"name": "Byeongseon Go"}, {"name": "Dhrumil Patel"}, {"name": "Mark M. Wilde"}, {"name": "Hyukjoon Kwon"}], "author_count": 6}, {"id": "2605.30302", "category": "quant-ph", "title": "Quantum Desynchronization of Limit Cycles", "abstract": "It is well known from classical physics that weakly coupled self-sustained oscillators may spontaneously lock their phases. Just like classical synchronization is known to break down due to noise induced phase slips, we show here how the synchronization of continuous variable quantum systems breaks down by proliferation of quantum phase slips. Within a Keldysh path integral formulation of limit cycles, we analyze the phase dynamics and show how, in spite of strong phase correlations, quantum phase slips degrade the actual phase locking. This approach also allows us to address non-Markovian effects on the synchronization of limit cycles, which we illustrate explicitly for superconducting resonators coupled via a voltage biased double quantum dot.", "url": "https://arxiv.org/abs/2605.30302", "type": "理论", "summary": "从经典物理学中众所周知，弱耦合自持振荡器可以自发地锁定其相位。就像众所周知的经典同步会因噪声引起的相滑而被破坏一样，我们在这里展示了连续可变量子系统的同步如何因量子相滑的扩散而被破坏。在极限环的凯尔迪什路径积分公式中，我们分析了相位动力学，并展示了尽管相位相关性很强，但量子相滑如何降低实际锁相性能。这种方法还允许我们解决对极限环同步的非马尔可夫效应，我们明确地说明了通过电压偏置双量子点耦合的超导谐振器。", "authors": [{"name": "Hans Christiansen"}, {"name": "Jens Paaske"}], "featured_authors": [{"name": "Hans Christiansen"}, {"name": "Jens Paaske"}], "author_count": 2}, {"id": "2605.30304", "category": "quant-ph", "title": "Analytical model for structured light propagation through a turbulent atmosphere", "abstract": "We develop a straightforward analytical framework for the propagation of spatial light modes through a turbulent atmosphere. Built upon the split-step approach with the mode-based optical field representation, it directly assesses how turbulence-induced phase fluctuations deplete the optical power in the original mode and re-distribute it into neighboring spatial modes. Importantly, this power transfer scales linearly with the propagation distance in a uniform channel, yielding a simple solution for arbitrary distances in the form of a matrix exponential. The transfer rate is determined by the spatial spectral overlap between the turbulence spectrum and the acceptance spectrum for a pair of interacting spatial modes. The model predicts the average power in each spatial mode and is exact when a single mode strongly dominates all others. Our predictions show reasonably good agreement with simulations up to medium-to-strong turbulence levels. The model also confirms the scalings with mode order previously known as empirical observations.", "url": "https://arxiv.org/abs/2605.30304", "type": "理论+数值", "summary": "我们开发了一个简单的分析框架，用于空间光模式在湍流大气中的传播。它建立在基于模式的光场表示的分步方法的基础上，直接评估湍流引起的相位波动如何消耗原始模式的光功率并将其重新分配到相邻的空间模式。重要的是，这种功率传输与均匀通道中的传播距离成线性比例，从而以矩阵指数的形式产生任意距离的简单解决方案。传输速率由一对相互作用的空间模式的湍流谱和接受谱之间的空间谱重叠决定。该模型预测每种空间模式的平均功率，并且当单一模式强烈支配所有其他模式时，该模型是准确的。我们的预测与中强湍流水平的模拟相当吻合。该模型还确认了先前称为经验观察的模式顺序的缩放。", "authors": [{"name": "Konstantin Kravtsov"}], "featured_authors": [{"name": "Konstantin Kravtsov"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
