  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2605.28861", "category": "cond-mat", "title": "Comment on \"Spin-1/2 Kagome Heisenberg Antiferromagnet: Machine Learning Discovery of the Spinon Pair-Density-Wave Ground State\"", "abstract": "A recent article [Phys. Rev. X 15, 011047 (2025)] utilizes group-equivariant convolutional neural networks to study the ground state of the kagome Heisenberg antiferromagnet. On the largest finite-size cluster studied to date ($N=108$), the authors report variational energies significantly lower than other numerical methods, including state-of-the-art density matrix renormalization group (DMRG) calculations. In contrast to previous results suggesting a possible spin-liquid ground state, the authors observe a spinon pair-density-wave ground state. We find that: (i) the reported low energies are artifacts of broken ergodicity in the Metropolis--Hastings sampling, since the single-spin-flip update rule utilized by the authors effectively freezes the Markov chains; and (ii) when ergodic sampling is enforced via spin-exchange updates, the neural network converges to energies significantly higher than existing DMRG results, calling the paper's claims into question.", "url": "https://arxiv.org/abs/2605.28861", "type": "理论+数值", "summary": "最近的一篇文章[物理。 Rev. X 15, 011047 (2025)]利用群等变卷积神经网络来研究 kagome 海森堡反铁磁体的基态。在迄今为止研究的最大的有限尺寸簇（$N=108$）上，作者报告说变分能量显着低于其他数值方法，包括最先进的密度矩阵重整化群（DMRG）计算。与之前表明可能存在自旋液体基态的结果相反，作者观察到了自旋对密度波基态。我们发现：（i）报告的低能量是 Metropolis-Hastings 采样中遍历性被破坏的产物，因为作者使用的单自旋翻转更新规则有效地冻结了马尔可夫链； (ii) 当通过自旋交换更新强制遍历采样时，神经网络收敛到的能量明显高于现有的 DMRG 结果，从而使该论文的主张受到质疑。", "authors": [{"name": "Helia Kamal"}, {"name": "Dominik Kufel"}, {"name": "DinhDuy Vu"}, {"name": "Chris R. Laumann"}, {"name": "Norman Y. Yao"}], "featured_authors": [{"name": "Helia Kamal"}, {"name": "Dominik Kufel"}, {"name": "DinhDuy Vu"}, {"name": "Chris R. Laumann"}, {"name": "Norman Y. Yao"}], "author_count": 5}, {"id": "2605.28929", "category": "cond-mat", "title": "Improving CFT Operators Using Machine Learning", "abstract": "Finite-size effects limit the accuracy with which conformal data can be extracted from lattice simulations of critical systems. While action improvement suppresses some corrections to scaling, it does not address operator-dependent effects arising from imperfect lattice representations of continuum conformal fields. In this work, we propose a data-driven method for improving lattice operators themselves, constructing estimators with enhanced overlap with the corresponding primary operators of the continuum conformal field theory. We identify improved lattice representations of leading spin and energy operators in three two-dimensional critical systems: the Ising model, the q = 3 Potts model, and the dilute q = 3 Potts model. In all cases, the resulting operators exhibit reduced corrections to scaling and yield more accurate estimates of scaling dimensions compared to conventional lattice choices. The code and analysis workflows used to produce these results are made available in an accompanying GitHub repository.", "url": "https://arxiv.org/abs/2605.28929", "type": "理论+数值", "summary": "有限尺寸效应限制了从关键系统的晶格模拟中提取共形数据的准确性。虽然动作改进抑制了对缩放的一些校正，但它并没有解决由于连续共形场的不完美晶格表示而引起的依赖于算子的影响。在这项工作中，我们提出了一种数据驱动的方法来改进晶格算子本身，构建与连续共形场论的相应主要算子具有增强重叠的估计器。我们确定了三个二维临界系统中主要自旋和能量算子的改进晶格表示：伊辛模型、q = 3 Potts 模型和稀释 q = 3 Potts 模型。在所有情况下，与传统的晶格选择相比，所得算子表现出减少的缩放校正，并产生更准确的缩放尺寸估计。用于生成这些结果的代码和分析工作流程可在随附的 GitHub 存储库中获取。", "authors": [{"name": "Lior Oppenheim"}, {"name": "Snir Gazit"}, {"name": "Zohar Ringel"}], "featured_authors": [{"name": "Lior Oppenheim"}, {"name": "Snir Gazit"}, {"name": "Zohar Ringel"}], "author_count": 3}, {"id": "2605.28949", "category": "cond-mat", "title": "Order-disorder trade-off in dirty quantum systems", "abstract": "We prove a trade-off theorem for order and disorder parameters in one-dimensional quantum spin systems with quenched disorder. For a disordered ensemble with exact Ising symmetry and average translation symmetry, any gapped ensemble must have one and only one of the following: an $O(1)$ order parameter or an $O(1)$ disorder parameter with even parity, both of the Edwards-Anderson type. The result extends to nearly gapped ensembles that accommodate Griffiths-type rare-region effects. These results offer a powerful and rigorous framework to understand the disorder effects beyond perturbative approaches. As applications, we (1) establish the existence of string order parameters for SPT phases; (2) derive a Lieb-Schultz-Mattis-type constraint for disordered ensembles, which requires a nearly gapped ensemble to spontaneously break the symmetry; and (3) discuss similar trade-off relations for disordered fermion chains, leading to an improved understanding of certain \"intrinsically disordered\" topological phases.", "url": "https://arxiv.org/abs/2605.28949", "type": "理论", "summary": "我们证明了具有淬灭无序的一维量子自旋系统中有序和无序参数的权衡定理。对于具有精确伊辛对称性和平均平移对称性的无序系综，任何有间隙系综必须具有且只有以下之一：$O(1)$ 有序参数或具有偶校验的 $O(1)$ 无序参数，两者都是 Edwards-Anderson 类型。结果扩展到适应格里菲斯型稀有区域效应的几乎有间隙的系综。这些结果提供了一个强大而严格的框架来理解扰动方法之外的紊乱效应。作为应用，我们 (1) 确定 SPT 阶段的字符串顺序参数是否存在； (2) 推导出无序系综的 Lieb-Schultz-Mattis 型约束，这需要近间隙系综才能自发破坏对称性； （3）讨论无序费米子链的类似权衡关系，从而更好地理解某些“本质上无序”的拓扑相。", "authors": [{"name": "Jinmin Yi"}, {"name": "Chong Wang"}], "featured_authors": [{"name": "Jinmin Yi"}, {"name": "Chong Wang"}], "author_count": 2}, {"id": "2605.28993", "category": "cond-mat", "title": "Reinterpreting Memory Effects in Nonequilibrium Systems: From Temporal Dynamics to Steady-State Signatures via NEGF", "abstract": "We investigate memory effects and quantum transport in two-dimensional lattice systems within the framework of non-equilibrium Green's functions and Schwinger-Keldysh non-equilibrium quantum field theory. Starting from a 2D tight-binding Hamiltonian, we employ the Dyson expansion on the Keldysh contour and the second-order Born and self-consistent Born Approximation to derive the electronic self-energies associated with elastic and inelastic scattering this http URL disorder produces a local self-energy and a rapidly decaying memory kernel, characteristic of Markovian dynamics, whereas electron-phonon coupling generates temporally nonlocal self-energies and genuine Non-Markovian behavior. We demonstrate that these distinct memory signatures are directly reflected in the spectral function, which we propose as a diagnostic probe of non-equilibrium memory effects. Further we explore 1PI and 2PI effective actions to see their memory perspectives studying their coarse-graining behavior. Building on this theoretical framework, we further apply the conventional NEGF formalism to two paradigmatic two-dimensional models-the Hofstadter and an RKKY-coupled system to explore how different microscopic Hamiltonians influence Markovian and Non-Markovian nature. Our results provide a unified connection between scattering mechanisms, memory effects, and quantum transport in low-dimensional systems.", "url": "https://arxiv.org/abs/2605.28993", "type": "理论", "summary": "我们在非平衡格林函数和施温格-凯尔迪什非平衡量子场论的框架内研究二维晶格系统中的记忆效应和量子输运。从二维紧束缚哈密顿量开始，我们采用凯尔迪什轮廓上的戴森展开以及二阶玻恩和自洽玻恩近似来推导与弹性和非弹性散射相关的电子自能，这种http URL无序产生局部自能和快速衰减的记忆内核，这是马尔可夫动力学的特征，而电子声子耦合产生时间非局部自能和真正的非马尔可夫行为。我们证明这些不同的记忆特征直接反映在谱函数中，我们建议将其作为非平衡记忆效应的诊断探针。我们进一步探索 1PI 和 2PI 有效行动，以了解他们的记忆视角，研究他们的粗粒度行为。\n\n在此理论框架的基础上，我们进一步将传统的 NEGF 形式主义应用于两个范式二维模型 - Hofstadter 和 RKKY 耦合系统，以探索不同的微观哈密顿量如何影响马尔可夫和非马尔可夫性质。我们的结果提供了低维系统中的散射机制、记忆效应和量子输运之间的统一联系。", "authors": [{"name": "Pragya Chaudhary"}], "featured_authors": [{"name": "Pragya Chaudhary"}], "author_count": 1}, {"id": "2605.29023", "category": "cond-mat", "title": "Critical states and anomalous wave transport in an aperiodic polariton monotile", "abstract": "Recently \"the Hat\" monotile was introduced into the family of aperiodic tilings and quasicrystals boasting physical properties lying at the boundary of ordered and disordered systems. Here we study the two-dimensional wave transport, transverse localization and scaling properties of the quantum modes in a Monotile quasilattice. Our system is based on reconfigurable optical lattices for cavity-polaritons which provide flexible means to study wavepacket dynamics, strong nonlinear phenomena, and power-driven condensation in this new type of an aperiodic tiling. We confirm the existence of localized and critical states in the Monotile through direct diagonalization of the Schrödinger equation. Scaling analysis on the moments of the wavefunction distribution reveals anomalous transport regimes of super-diffusive and near sub-diffusive polariton transport associated with the fractal structure of the Monotile Hilbert space. We propose a strategy using resonantly excited polariton fluids to verify our findings.", "url": "https://arxiv.org/abs/2605.29023", "type": "理论", "summary": "最近，“帽子”单瓦被引入非周期瓦和准晶体家族，其物理特性位于有序和无序系统的边界。在这里，我们研究单瓦准晶格中量子模式的二维波传输、横向局域化和缩放特性。我们的系统基于腔极化子的可重构光学晶格，为研究这种新型非周期平铺中的波包动力学、强非线性现象和功率驱动凝聚提供了灵活的方法。我们通过薛定谔方程的直接对角化证实了单瓦片中局域态和临界态的存在。对波函数分布矩的尺度分析揭示了与单瓦希尔伯特空间的分形结构相关的超扩散和近亚扩散极化子传输的异常传输机制。我们提出了一种使用共振激发极化子流体的策略来验证我们的发现。", "authors": [{"name": "Valtýr Kári Daníelsson"}, {"name": "Helgi Sigurðsson"}], "featured_authors": [{"name": "Valtýr Kári Daníelsson"}, {"name": "Helgi Sigurðsson"}], "author_count": 2}, {"id": "2605.29029", "category": "cond-mat", "title": "Geometry-based Discovery of Calcium Battery Cathodes Accelerated by Foundational Machine-Learned Models", "abstract": "Calcium batteries (CBs) are an attractive post-Li-ion technology, offering the appeal of Ca's natural abundance and high volumetric energy density. However, practical realization of CBs remains limited by the scarcity of positive electrode (cathode) materials that support reversible Ca$^{2+}$ (de)intercalation under electrochemical conditions. To address this challenge, we screen the materials project (MP) database for novel host structures that can intercalate Ca using geometry- and chemistry-based design principles. Specifically, we employ the Voronoi polyhedral volume as a descriptor of site compatibility for hosting Ca in potential frameworks. Further, we down-select candidate structures progressively through criteria including charge neutrality, absence of non-Ca mobile cations, thermodynamic (meta)stability, average voltage, and Ca migration barriers ($E_m$) using foundational machine-learning (ML) models. Subsequently, we validate the ensemble-ML-predicted $E_m$ in a subset of the final candidates using density functional theory based nudged elastic band calculations. Overall, from an initial pool of 52,945 MP structures, our workflow identifies 37 promising Ca cathode candidates, several of which exhibit favorable combinations of thermodynamic (meta)stability, voltage, and Ca-mobility, marking them as strong candidates for synthesis and electrochemical characterization. Particularly, we identify two Ca cathode candidates with markedly low Ca$^{2+}~E_m$ (CaSc$_2$V$_2$O$_8$ and CaVSO$_4$F$_3$), and four cathode candidates with thermodynamically stable charged states (Ca$_3$(CoO$_2$)$_4$, Ca$_3$Mn$_4$(TeO$_6$)$_2$, CaVF$_5$, and CaVSO$_4$F$_3$). Beyond identifying Ca-cathodes, our work establishes geometry-based descriptors and ML-based workflows as transferable methods for high-throughput screening, enabling the rapid discovery of novel materials for battery and other applications.", "url": "https://arxiv.org/abs/2605.29029", "type": "理论+数值", "summary": "钙电池 (CB) 是一种颇具吸引力的后锂离子技术，具有钙的天然丰富性和高体积能量密度的吸引力。然而，CB的实际实现仍然受到电化学条件下支持可逆Ca$^{2+}$（脱）嵌入的正极（阴极）材料的稀缺性的限制。为了应对这一挑战，我们筛选了材料项目 (MP) 数据库，寻找可以使用基于几何和化学的设计原理嵌入 Ca 的新型主体结构。具体来说，我们采用 Voronoi 多面体体积作为在潜在框架中托管 Ca 的站点兼容性的描述符。此外，我们使用基础机器学习 (ML) 模型，通过电荷中性、不存在非 Ca 移动阳离子、热力学（亚）稳定性、平均电压和 Ca 迁移势垒 ($E_m$) 等标准逐步向下选择候选结构。随后，我们使用基于密度泛函理论的微移弹性带计算来验证最终候选子集中的集成 ML 预测的 $E_m$。\n\n总体而言，从 52,945 个 MP 结构的初始池中，我们的工作流程确定了 37 个有前途的 Ca 阴极候选物，其中一些表现出热力学（亚）稳定性、电压和 Ca 迁移率的良好组合，使它们成为合成和电化学表征的有力候选者。特别是，我们确定了两种具有明显低 Ca$^{2+}~E_m$ 的 Ca 阴极候选物（CaSc$_2$V$_2$O$_8$ 和 CaVSO$_4$F$_3$），以及四种具有热力学稳定带电状态的阴极候选物（Ca$_3$(CoO$_2$)$_4$、Ca$_3$Mn$_4$(TeO$_6$)$_2$、CaVF$_5$、和 CaVSO$_4$F$_3$)。除了识别 Ca 阴极之外，我们的工作还建立了基于几何的描述符和基于 ML 的工作流程作为高通量筛选的可转移方法，从而能够快速发现用于电池和其他应用的新型材料。", "authors": [{"name": "Dereje Bekele Tekliye"}, {"name": "Achinthya Krishna Bheemaguli"}, {"name": "Gopalakrishnan Sai Gautam"}], "featured_authors": [{"name": "Dereje Bekele Tekliye"}, {"name": "Achinthya Krishna Bheemaguli"}, {"name": "Gopalakrishnan Sai Gautam"}], "author_count": 3}, {"id": "2605.29034", "category": "cond-mat", "title": "Topological superconductivity from Abelian fractional Chern insulators", "abstract": "Can a Laughlin anyon fluid become a topological superconductor? We answer this question for a $\\nu=1/3$ fractional Chern insulator (FCI) using a $U(3)$ infrared parton theory. Three charge-$e/3$ constituents form the electron, while three constituent pairs form a gauge-invariant charge-$2e$ Cooper pair. The resulting superconductors share an ordinary charge-$2e$ sector but differ in their neutral color response, giving an SC$^\\ast$ with the parent Laughlin $U(1)_3$ order, a chiral topological superconductor with $c_-=3/2$, and a strong-pairing anyon superconductor with $c_-=3$. The same framework organizes a nearby $\\sigma_{xy}=0$ charge density wave (CDW) state. At commensurate filling, the normal state and the $c_-=3$ and $c_-=3/2$ superconducting descendants are naturally tied to a period-three density order background, while the SC$^\\ast$ branch can preserve microscopic translations. Away from commensuration, a chargon metal can pair into the same $c_-=3/2$ topological superconductor. The FCI, reentrant CDW, and chiral superconductivity are unified in the $U(3)$ parton theory.", "url": "https://arxiv.org/abs/2605.29034", "type": "理论", "summary": "劳克林任意子流体能成为拓扑超导体吗？我们使用 $U(3)$ 红外部分子理论回答 $\\nu=1/3$ 分数陈绝缘体 (FCI) 的这个问题。三个电荷-$e/3$ 成分形成电子，而三个成分对形成规范不变的电荷-$2e$ 库珀对。由此产生的超导体共享一个普通的电荷-$2e$扇区，但它们的中性颜色响应不同，给出了具有父劳克林$U(1)_3$顺序的SC$^\\ast$、$c_-=3/2$的手性拓扑超导体以及$c_-=3$的强配对任意子​​超导体。相同的框架组织了附近的$\\sigma_{xy}=0$电荷密度波（CDW）状态。在相应的填充下，正常状态以及 $c_-=3$ 和 $c_-=3/2$ 超导后代自然地与三周期密度顺序背景联系在一起，而 SC$^\\ast$ 分支可以保留微观平移。远离公度，电荷金属可以配对成相同的 $c_-=3/2$ 拓扑超导体。 FCI、重入 CDW 和手性超导统一在 $U(3)$ 部分子理论中。", "authors": [{"name": "Taige Wang"}], "featured_authors": [{"name": "Taige Wang"}], "author_count": 1}, {"id": "2605.29056", "category": "cond-mat", "title": "Multifractal Complexity of the Chandler Wobble and Its Anomalous Disappearance (2015--2020): A MFDFA Study", "abstract": "The Chandler wobble (CW) -- the $\\sim$433-day free nutation of Earth's rotation pole -- experienced an anomalous near-disappearance between 2015 and 2020, followed by a re-excitation with an approximately $180^{\\circ}$ phase reversal. Using Multifractal Detrended Fluctuation Analysis (MFDFA) applied to more than six decades (1962--2024) of daily IERS EOP C04 polar motion data, this study provides the first multifractal characterisation of the CW and its recent anomaly. Global MFDFA shows that the residual polar motion components and the CW amplitude are genuine multifractal processes with strongly $q$-dependent generalised Hurst exponents and broad singularity spectra. Surrogate-data tests with shuffled and phase-randomised ensembles demonstrate that this multifractality originates from the combined action of long-range temporal correlations and heavy-tailed excitation statistics. A sliding-window analysis reveals a pronounced collapse in long-range persistence and multifractal spectral width of the geometric polar motion signal several years before and during the 2015--2020 amplitude minimum, indicating a genuine dynamical regime change rather than a simple suppression of oscillation amplitude. In contrast, the amplitude- and phase-related variables retain broad multifractal spectra and stable scaling exponents across all epochs, revealing a dynamical decoupling between the geometry of the CW and the multiscale structure of its amplitude and phase fluctuations. These findings highlight the CW amplitude as an exceptionally multifractal integrator of geophysical excitation and suggest that multifractal metrics may provide early-warning indicators of major transitions in Earth rotation dynamics.", "url": "https://arxiv.org/abs/2605.29056", "type": "理论", "summary": "钱德勒摆动（CW）——地球自转极 $\\sim$433 天的自由章动 - 在 2015 年至 2020 年间经历了异常的近乎消失，随后重新激发，相位反转约为 $\\sim$180^{\\circ}$。本研究将多重分形去趋势波动分析 (MFDFA) 应用于六十多年（1962--2024）的日常 IERS EOP C04 极移数据，首次提供了 CW 及其近期异常的多重分形特征。全局 MFDFA 显示剩余极移分量和 CW 振幅是真正的多重分形过程，具有强 $q$ 依赖的广义赫斯特指数和宽奇点谱。使用混洗和相位随机集合的替代数据测试表明，这种多重分形源于长程时间相关性和重尾激励统计的联合作用。\n\n滑动窗口分析揭示了几何极移信号在 2015--2020 年振幅最小值之前和期间的长程持久性和多重分形谱宽度的显着崩溃，表明真正的动态状态变化，而不是简单的振荡幅度抑制。相比之下，与幅度和相位相关的变量在所有时期都保留了广泛的多重分形谱和稳定的标度指数，揭示了连续波的几何结构与其幅度和相位波动的多尺度结构之间的动态解耦。这些发现强调了连续波振幅作为地球物理激励的特殊多重分形积分器，并表明多重分形度量可以提供地球自转动力学重大转变的预警指标。", "authors": [{"name": "Sebastián Jaroszewicz"}, {"name": "Nahuel Mendez"}, {"name": "Maria P. Beccar-Varela"}, {"name": "Maria Cristina Mariani"}], "featured_authors": [{"name": "Sebastián Jaroszewicz"}, {"name": "Nahuel Mendez"}, {"name": "Maria P. Beccar-Varela"}, {"name": "Maria Cristina Mariani"}], "author_count": 4}, {"id": "2605.29162", "category": "cond-mat", "title": "Passive memory reshapes active persistence", "abstract": "Many active systems move in complex environments whose mechanical response is slow and history dependent. To address this regime, we study the collective dynamics of self-sustained active particles in non-Markovian media within a generalized Langevin framework with memory. We focus on the competition between the timescales of active persistence and viscoelastic relaxation in the environment. Using a minimal interacting model with an exponential memory kernel, we show that environmental memory qualitatively reshapes motility-induced phase separation of self-propelled active particles. When the memory timescale becomes comparable to the active persistence time, delayed viscoelastic stresses generate an effective anti-persistence that suppresses clustering and produces a broad metastable regime with slow nucleation dynamics. By contrast, for long memory timescales, reduced friction at short times enhances the effective propulsion velocity and restores phase separation. Our results demonstrate that the surrounding medium is not merely a passive background for active motion, but can actively regulate the emergence, stability, and dynamics of collective organization in active matter.", "url": "https://arxiv.org/abs/2605.29162", "type": "理论", "summary": "许多主动系统在复杂的环境中运动，其机械响应缓慢且依赖于历史。为了解决这个问题，我们在具有记忆的广义朗之万框架内研究非马尔可夫介质中自维持活性粒子的集体动力学。我们关注环境中主动持久性和粘弹性松弛的时间尺度之间的竞争。使用具有指数记忆内核的最小相互作用模型，我们表明环境记忆定性地重塑了自驱动活性粒子的运动引起的相分离。当记忆时间尺度与主动持久时间相当时，延迟粘弹性应力会产生有效的反持久性，抑制聚类并产生具有缓慢成核动力学的广泛亚稳态状态。相比之下，对于长记忆时间尺度，短时间内减少摩擦可以提高有效推进速度并恢复相分离。我们的结果表明，周围介质不仅仅是主动运动的被动背景，而且可以主动调节主动物质中集体组织的出现、稳定性和动态。", "authors": [{"name": "Ivan Di Terlizzi"}, {"name": "Lara Koehler"}, {"name": "John D. Treado"}], "featured_authors": [{"name": "Ivan Di Terlizzi"}, {"name": "Lara Koehler"}, {"name": "John D. Treado"}], "author_count": 3}, {"id": "2605.29179", "category": "cond-mat", "title": "Sustainable Metal-Organic Framework Water Harvesters in the Artificial Intelligence Era", "abstract": "Metal-organic frameworks (MOFs) are excellent candidates for water harvesting due to their tunable pore environments, which can be precisely engineered to capture and release water in arid conditions. Integrating artificial intelligence (AI) into MOF discovery can further accelerate the design of high-performance sorbents by identifying structural features that enhance atmospheric water harvesting (AWH), stability, and cycling efficiency. In this Perspective, we examine key MOF design principles, including cooperative adsorption, operational relative humidity (RH), uptake capacity, hysteresis, and scalability. We highlight recent design advancements such as multivariate strategies and long-arm linker extension, and examine how these principles tune pore capacity and hydrophilicity, while preserving stability and crystallinity. Furthermore, we discuss how AI, large language models (LLMs), and data mining can accelerate the discovery process through predictive synthesis, inverse design, and elucidating synthesis-structure-property relationships for the next generation of MOF water harvesters.", "url": "https://arxiv.org/abs/2605.29179", "type": "理论", "summary": "金属有机框架（MOF）因其可调节的孔隙环境而成为集水的绝佳候选者，可以精确设计以在干旱条件下捕获和释放水。将人工智能 (AI) 融入 MOF 发现中，可以通过识别增强大气水收集 (AWH)、稳定性和循环效率的结构特征，进一步加速高性能吸附剂的设计。在本视角中，我们研究了关键的 MOF 设计原理，包括协同吸附、操作相对湿度 (RH)、吸收能力、滞后和可扩展性。我们重点介绍了最新的设计进展，例如多元策略和长臂连接体延伸，并研究了这些原理如何调整孔容量和亲水性，同时保持稳定性和结晶度。此外，我们还讨论了人工智能、大语言模型 (LLM) 和数据挖掘如何通过预测合成、逆向设计以及阐明下一代 MOF 集水器的合成-结构-性能关系来加速发现过程。", "authors": [{"name": "Reid A. Coyle"}, {"name": "Shyam Chand Pal"}, {"name": "Peter Walther"}, {"name": "Saeun Park"}, {"name": "Bin Feng"}, {"name": "Zhiling Zheng"}], "featured_authors": [{"name": "Reid A. Coyle"}, {"name": "Shyam Chand Pal"}, {"name": "Peter Walther"}, {"name": "Saeun Park"}, {"name": "Bin Feng"}, {"name": "Zhiling Zheng"}], "author_count": 6}, {"id": "2605.29185", "category": "cond-mat", "title": "Records, drift, and the longest increasing subsequence of biased Gaussian random walks", "abstract": "The longest increasing subsequence (LIS) of a random walk has so far been studied mainly for zero-mean, symmetric step increments. We numerically investigate the LIS of biased Gaussian random walks, with unit-variance increments and positive drift $\\mu_{p} = \\Phi^{-1}(p)$, where $p = \\mathbb{P}(\\xi>0)$. In contrast with the symmetric case, we find that for every fixed $p>1/2$ the mean LIS length grows linearly, $\\langle L_{n}(p)\\rangle \\sim a(p)n$, with $a(p)$ increasing from $0$ at $p=1/2$ to $1$ as $p \\to 1$. The record count is also linear, with coefficient $\\lambda(p)$ given by Spitzer's formula for the mean ascending ladder epoch, and the LIS becomes increasingly aligned with this record skeleton as $p$ grows. At the symmetric point $p=1/2$, the record skeleton collapses to the Sparre Andersen $\\sqrt{n}$ scale, while the LIS returns to the symmetric finite-variance $\\sqrt{n}\\log{n}$ regime. Near this limit, the excess $a(\\mu_{p})-\\lambda(\\mu_{p})$ vanishes more slowly than linearly in the drift, although our data do not resolve a single power law. The empirical distribution of $L_{n}$ also changes across the singular point, from lognormal-like at $p=1/2$ to fluctuations consistent with Gaussian behavior for every sampled $p>1/2$.", "url": "https://arxiv.org/abs/2605.29185", "type": "数值", "summary": "迄今为止，随机游走的最长递增子序列（LIS）主要针对零均值、对称步长增量进行研究。我们对有单位方差增量和正漂移 $\\mu_{p} = \\Phi^{-1}(p)$ 的有偏高斯随机游走的 LIS 进行数值研究，其中 $p = \\mathbb{P}(\\xi>0)$。与对称情况相反，我们发现对于每个固定的$p>1/2$，平均LIS长度线性增长，$\\langle L_{n}(p)\\rangle \\sim a(p)n$，其中$a(p)$从$p=1/2$处的$0$增加到$1$，$p\\to 1$。记录计数也是线性的，系数 $\\lambda(p)$ 由 Spitzer 的平均上升阶梯历元公式给出，并且随着 $p$ 的增长，LIS 与该记录骨架越来越一致。在对称点 $p=1/2$ 处，记录骨架折叠到 Sparre Andersen $\\sqrt{n}$ 尺度，而 LIS 返回到对称有限方差 $\\sqrt{n}\\log{n}$ 状态。接近这个极限时，多余的 $a(\\mu_{p})-\\lambda(\\mu_{p})$ 在漂移中消失的速度比线性消失得慢，尽管我们的数据不能解决单一幂律问题。\n\n$L_{n}$ 的经验分布也会在奇点上发生变化，从 $p=1/2$ 的对数正态分布到每个采样的 $p>1/2$ 与高斯行为一致的波动。", "authors": [{"name": "J. Ricardo G. Mendonça"}], "featured_authors": [{"name": "J. Ricardo G. Mendonça"}], "author_count": 1}, {"id": "2605.29201", "category": "cond-mat", "title": "Partial Entropy production of active particles with hidden states in potentials", "abstract": "Partially observed stochastic systems can appear (almost) time-reversal symmetric while in fact operating far from equilibrium. The present work extends the perturbative framework introduced in [Phys. Rev. Lett. 136, 198302 (2026)] to calculate in a generic confining potential the partial entropy production, which quantifies the time-reversal asymmetry of a generic active particle with hidden self-propulsion. Focusing on the harmonic case, we apply our framework to reproduce an exact result for the partial entropy production rate of an active Ornstein-Uhlenbeck particle and to derive the partial entropy production rate of a run-and-tumble particle.", "url": "https://arxiv.org/abs/2605.29201", "type": "理论", "summary": "部分观察到的随机系统可能看起来（几乎）时间反转对称，但实际上运行远离平衡。目前的工作扩展了[Phys.莱特牧师。 136, 198302 (2026)]计算通用约束势的部分熵产生，它量化了具有隐藏自推进的通用活性粒子的时间反转不对称性。着眼于谐波情况，我们应用我们的框架来重现活性 Ornstein-Uhlenbeck 粒子的部分熵产生率的精确结果，并推导运行和翻滚粒子的部分熵产生率。", "authors": [{"name": "Jacob Knight"}, {"name": "Gunnar Pruessner"}], "featured_authors": [{"name": "Jacob Knight"}, {"name": "Gunnar Pruessner"}], "author_count": 2}, {"id": "2605.29338", "category": "cond-mat", "title": "Effective Theory of Fermion Quartet Condensation", "abstract": "We develop a theory of superconductivity (or superfluidity) based on condensed fermion quartets focusing on the dilute spin-$\\frac{1}{2}$ systems at zero temperature. In the spirit of the Bardeen--Cooper--Schrieffer ansatz, a variational wavefunction is constructed such that, within the so-called ``dilute quartet approximation\", it is the ground state of an effective quartic Hamiltonian. For a given two-body interaction in favor of quartetting, the gap parameter is suitably defined and the gap equation is also derived. As to the excited states, an intuitive physical picture based on a sixteen-dimensional ``occupation space\" is depicted and the associated eigen-energies are obtained. This theory is applied to compute the superfluid fraction, which is found to be the same as in conventional superconductors, despite the interacting nature of the quartet problem.", "url": "https://arxiv.org/abs/2605.29338", "type": "理论+数值", "summary": "我们开发了一种基于凝聚费米子四重奏的超导（或超流）理论，重点关注零温度下的稀自旋-$\\frac{1}{2}$系统。本着 Bardeen-Cooper-Schrieffer ansatz 的精神，构造了一个变分波函数，在所谓的“稀释四重近似”内，它是有效四次哈密顿量的基态。对于给定的有利于四重的二体相互作用，适当地定义了间隙参数，并导出了间隙方程。对于激发态，基于十六维“占据空间”的直观物理图景被描绘并获得相关的本征能量。该理论应用于计算超流体分数，尽管四重奏问题具有相互作用的性质，但发现它与传统超导体中的超流体分数相同。", "authors": [{"name": "Qiao-Ru Xu"}, {"name": "Congjun Wu"}], "featured_authors": [{"name": "Qiao-Ru Xu"}, {"name": "Congjun Wu"}], "author_count": 2}, {"id": "2605.29520", "category": "cond-mat", "title": "On certain combinatorial expressions of TASEP transition probabilities", "abstract": "We study combinatorial structures arising from finite-time transition probabilities of the Totally Asymmetric Simple Exclusion Process with open boundary conditions. While much of the existing combinatorial theory regarding the TASEP concerns the steady-state distribution, we focus instead on the transient dynamics. We first show that the enumeration of transition sequences between two configurations of the open TASEP is equivalent to the enumeration of standard Young tableaux of a family of non-classical shapes which have been of recent interest in the combinatorial literature. This extends to the open-boundary setting the correspondence between the TASEP with periodic boundaries and cylindric tableaux. We then introduce a family of tableau-like objects associated with Young diagrams in which repetitions of cells are allowed, subject to the partial order induced by the diagram. For each diagram, we collect the numbers of these objects into an exponential generating function. We prove that the entries of the homogeneous open TASEP transition matrix can be expressed as signed sums of such generating functions over suitable families of diagrams. This gives a combinatorial and order-theoretic interpretation of finite-time transition probabilities for the open TASEP, analogous to the combinatorial mappings known for steady-state probabilities.", "url": "https://arxiv.org/abs/2605.29520", "type": "理论", "summary": "我们研究由具有开放边界条件的完全不对称简单排除过程的有限时间转移概率产生的组合结构。虽然 TASEP 的现有组合理论大多涉及稳态分布，但我们关注的是瞬态动力学。我们首先表明，开放 TASEP 的两种配置之间的过渡序列的枚举相当于一系列非经典形状的标准杨氏造型的枚举，这些非经典形状最近在组合文献中引起了人们的兴趣。这延伸到开放边界设置，具有周期性边界的 TASEP 与圆柱画面之间的对应关系。然后，我们引入了一系列与杨氏图相关的类似画面的对象，其中允许单元格的重复，但受到图引起的偏序的影响。对于每个图表，我们将这些对象的数量收集到指数生成函数中。我们证明齐次开放 TASEP 转移矩阵的条目可以表示为此类生成函数在合适的图族上的有符号和。\n\n这给出了开放 TASEP 的有限时间转移概率的组合和序论解释，类似于已知的稳态概率的组合映射。", "authors": [{"name": "Lorenzo Vito Dal Zovo"}], "featured_authors": [{"name": "Lorenzo Vito Dal Zovo"}], "author_count": 1}, {"id": "2605.29552", "category": "cond-mat", "title": "Emergence of Dynamical Anisotropy induced by Demixing in a Binary System with Differential Diffusivity under an External Potential", "abstract": "Spontaneous demixing in active matter is a ubiquitous phenomenon that is crucial for numerous living processes ranging from bacterial swarming to sorting of cells in dense tissues. Here, we systematically investigate the effect of spatially varying potential acting along one direction and packing fraction on the binary mixture of particles with different diffusivities. Our results indicate that the presence of an external potential promotes demixing over a larger range of packing fractions, while also fostering a more pronounced 'hexatic order' within the bands of less diffusive \"cold\") particles formed near the minima of the potential. The mean-squared displacements (MSD) of \"cold\" and \"hot\" particles in different directions exhibit a distinct behavior. In contrast to the long-time sub-diffusive behavior of the \"cold\" particles, the \"hot\" ones display diffusive nature following an intermediate plateau. However, in the direction transverse to the applied potential, both types of particles undergo normal diffusion. Furthermore, interesting non-Gaussian characteristics are observed, corresponding to the spatial distribution of the displacement of \"hot\" and \"cold\" particles. Interestingly, our results reveal the formation of a 'percolating band', and the emergence of such dynamic anisotropy is not observed in the absence of an external potential. These aspects are highly relevant to the dynamics of various systems-including densely packed tissues, bacterial motility in confined spaces, and granular segregation in the pharmaceutical industry.", "url": "https://arxiv.org/abs/2605.29552", "type": "理论", "summary": "活性物质中的自发分层是一种普遍存在的现象，对于从细菌群聚到致密组织中的细胞分类等众多生命过程至关重要。在这里，我们系统地研究了沿一个方向作用的空间变化电势和堆积分数对具有不同扩散率的颗粒二元混合物的影响。我们的结果表明，外部电势的存在促进了更大范围的堆积分数的分层，同时还在电势最小值附近形成的扩散性较小的“冷”）颗粒带内形成了更明显的“六方有序”。 “冷”和“热”粒子在不同方向上的均方位移（MSD）表现出不同的行为。与“冷”粒子的长期亚扩散行为相反，“热”粒子在中间平台之后表现出扩散性质。然而，在横向于施加电势的方向上，两种类型的粒子都经历正常扩散。此外，观察到有趣的非高斯特征，对应于“热”和“冷”粒子位移的空间分布。\n\n有趣的是，我们的结果揭示了“渗透带”的形成，并且在没有外部电势的情况下不会观察到这种动态各向异性的出现。这些方面与各种系统的动力学高度相关，包括密集的组织、有限空间内的细菌运动以及制药行业中的颗粒分离。", "authors": [{"name": "Rashmi Trivedi"}, {"name": "Subhajit Paul"}, {"name": "Sumanta Kundu"}, {"name": "Sunita Kumari"}], "featured_authors": [{"name": "Rashmi Trivedi"}, {"name": "Subhajit Paul"}, {"name": "Sumanta Kundu"}, {"name": "Sunita Kumari"}], "author_count": 4}, {"id": "2605.29617", "category": "cond-mat", "title": "Finite-temperature micromagnetic model bridging atomic- and macro-scale magnetism", "abstract": "A multi-scale finite-temperature micromagnetic model is presented, based on the Landau-Lifshitz equation and the Bernoulli differential equation. This model accurately reproduces classic Maxwell magnetostatics of paramagnets for high temperatures and accurately reproduces standard micromagnetics described by the conventional Landau-Lifshitz model in ferromagnets. The Landau-Lifshitz-Bernoulli (LLBe) model can, by design, directly couple atomic-scale simulations with micromagnetics and output consistent predictions of bulk magnetic properties at finite temperatures, from below to above the material's Curie temperature. The LLBe model is validated against established solvers: MUMAX3 for zero-temperature micromagnetics, and FEMCE for high-temperature classic magnetostatics. We present an application of the LLBe model by simulating Heat-Assisted magnetic recording on a thin magnetic track with local heating, demonstrating the multi-scale finite-temperature capabilities of the LLBe.", "url": "https://arxiv.org/abs/2605.29617", "type": "理论+数值", "summary": "基于Landau-Lifshitz方程和Bernoulli微分方程，提出了多尺度有限温度微磁模型。该模型准确地再现了高温顺磁体的经典麦克斯韦静磁学，并准确地再现了铁磁体中传统 Landau-Lifshitz 模型描述的标准微磁学。 Landau-Lifshitz-Bernoulli (LLBe) 模型通过设计可以直接将原子级模拟与微磁学耦合起来，并在从低于材料的居里温度到高于材料的居里温度的有限温度下输出体磁特性的一致预测。 LLBe 模型针对现有求解器进行了验证：用于零温微磁学的 MUMAX3 和用于高温经典静磁学的 FEMCE。我们通过在局部加热的薄磁道上模拟热辅助磁记录来展示 LLBe 模型的应用，展示了 LLBe 的多尺度有限温度能力。", "authors": [{"name": "R. Kiefe"}, {"name": "J. S. Amaral"}], "featured_authors": [{"name": "R. Kiefe"}, {"name": "J. S. Amaral"}], "author_count": 2}, {"id": "2605.29672", "category": "cond-mat", "title": "Generation of Bloch Points with Controlled Spin Texture Using Geometrical Boundary Conditions", "abstract": "Bloch points are three-dimensional topological singularities in magnetization that play a key role in topological transformations of spin textures, such as skyrmion creation or annihilation. While topology often enforces the existence of Bloch points in confined geometries like cylindrical nanowires, deterministic control over their position and magnetic configuration remains challenging. Here we demonstrate the generation of Bloch points with controlled spin texture by engineering geometrical boundary conditions in three-dimensional nanomagnets. By introducing a chirality interface between two three-dimensional double-helix nanowires of opposite handedness, forming a kinked, non-collinear structure, we impose competing topological constraints that uniquely define the magnetization configuration surrounding the Bloch point. A saturating magnetic field nucleates head-to-head or tail-to-tail domain configurations at the chirality interface, producing a Bloch-point domain wall with deterministic polarity, circulation and helicity. This geometrical approach enables full three-dimensional control of Bloch point domain walls allowing deterministic engineering of their spin texture and its selective coupling to current-induced Oersted fields.", "url": "https://arxiv.org/abs/2605.29672", "type": "理论", "summary": "布洛赫点是磁化中的三维拓扑奇点，在自旋纹理的拓扑变换（例如斯格明子的产生或湮灭）中发挥着关键作用。虽然拓扑通常强制在圆柱形纳米线等受限几何形状中存在布洛赫点，但对其位置和磁性配置的确定性控制仍然具有挑战性。在这里，我们演示了通过设计三维纳米磁体中的几何边界条件来生成具有受控自旋纹理的布洛赫点。通过在两个手性相反的三维双螺旋纳米线之间引入手性界面，形成扭结的非共线结构，我们施加了竞争的拓扑约束，独特地定义了布洛赫点周围的磁化配置。饱和磁场在手性界面上形成头对头或尾对尾的畴结构，产生具有确定性极性、循环和螺旋性的布洛赫点畴壁。\n\n这种几何方法能够对布洛赫点畴壁进行全三维控制，从而能够对其自旋纹理及其与电流感应奥斯特场的选择性耦合进行确定性工程。", "authors": [{"name": "Naëmi Leo"}, {"name": "Daniel Wolf"}, {"name": "Alicia Estela Herguedas Alonso"}, {"name": "Oleksandr Zaiets"}, {"name": "Jakub Jurczyk"}, {"name": "Takeaki Gokita"}, {"name": "John Fullerton"}, {"name": "Dedalo Sanz-Hernandez"}, {"name": "Claire Donnelly"}, {"name": "Andrea Sorrentino"}, {"name": "Eva Pereiro"}, {"name": "Lucia Aballe"}, {"name": "Peter Fischer"}, {"name": "Rachid Belkhou"}, {"name": "Claas Abert"}, {"name": "Dieter Suess"}, {"name": "Axel Lubk"}, {"name": "Aurelio Hierro-Rodriguez"}, {"name": "Amalio Fernández-Pacheco"}], "featured_authors": [{"name": "Naëmi Leo"}, {"name": "Daniel Wolf"}, {"name": "Alicia Estela Herguedas Alonso"}, {"name": "Axel Lubk"}, {"name": "Aurelio Hierro-Rodriguez"}, {"name": "Amalio Fernández-Pacheco"}], "author_count": 19}, {"id": "2605.29730", "category": "cond-mat", "title": "Spin-Orbit Coupling Effects on the Structural and Electronic Properties of Planar Pentagonal p-MS$_{2}$ (M = Si, Ge, and Pb)", "abstract": "Spin-orbit coupling (SOC) plays an important role in determining the structural and electronic properties of recently proposed two-dimensional planar pentagonal materials. In this work, density functional theory calculations are employed to investigate SOC effects in p-MS$_{2}$ systems (M = Si, Ge, and Pb). Our results indicate that the p-SiS$_{2}$ structure is likely unstable, except for p-GeS$_{2}$ and p-PbS$_{2}$. A detailed j-resolved (total angular momentum) orbital analysis reveals that SOC enhances electronic localization, leading to a slight structural contraction and a reconstruction of electronic states near the Fermi level, this effect becoming stronger for heavier M atoms. While p-GeS$_{2}$ remains metallic, SOC drives a metal-semiconductor transition in p-PbS$_{2}$ and opening a quasi-direct band gap of about 0.475 eV. In addition, the conduction band minimum state of p-PbS$_{2}$ exhibits pronounced anisotropy along the S-S bonds. These findings provide insight into SOC-driven structural and electronic reconstruction in planar pentagonal chalcogenides p-MS$_{2}$ and suggest that p-PbS$_{2}$ may be a promising candidate for gas-sensing applications.", "url": "https://arxiv.org/abs/2605.29730", "type": "理论+数值", "summary": "自旋轨道耦合（SOC）在确定最近提出的二维平面五边形材料的结构和电子特性方面发挥着重要作用。在这项工作中，采用密度泛函理论计算来研究 p-MS$_{2}$ 系统（M = Si、Ge 和 Pb）中的 SOC 效应。我们的结果表明，除了 p-GeS$_{2}$ 和 p-PbS$_{2}$ 之外，p-SiS$_{2}$ 结构可能不稳定。详细的 j 分辨（总角动量）轨道分析表明，SOC 增强了电子局域化，导致费米能级附近的轻微结构收缩和电子态重建，对于较重的 M 原子，这种效应变得更强。虽然 p-GeS$_{2}$ 仍然是金属性的，但 SOC 驱动 p-PbS$_{2}$ 中的金属-半导体转变，并打开约 0.475 eV 的准直接带隙。此外，p-PbS$_{2}$ 的导带最低态沿着 S-S 键表现出明显的各向异性。这些发现提供了对平面五边形硫属化物 p-MS$_{2}$ 中 SOC 驱动的结构和电子重建的深入了解，并表明 p-PbS$_{2}$ 可能是气体传感应用的有希望的候选者。", "authors": [{"name": "Phuc-Dang Truong"}, {"name": "Cao-Huu-Tai Nguyen"}, {"name": "Nguyen-Bao-Tran Ngo"}, {"name": "Khanh-Van Huynh"}, {"name": "Jan Minar"}, {"name": "Worawat Meevasana"}, {"name": "Yen-Mi Tran"}, {"name": "Trung-Phuc Vo"}], "featured_authors": [{"name": "Phuc-Dang Truong"}, {"name": "Cao-Huu-Tai Nguyen"}, {"name": "Nguyen-Bao-Tran Ngo"}, {"name": "Worawat Meevasana"}, {"name": "Yen-Mi Tran"}, {"name": "Trung-Phuc Vo"}], "author_count": 8}, {"id": "2605.29743", "category": "cond-mat", "title": "Exact Solution of the Discrete Wormlike Chain Model", "abstract": "We present an exact solution of the discrete wormlike chain (DWLC) model describing a single semiflexible polymer under arbitrary external force. Through exact closure relations between pair angular correlations and single-site angular densities, we derive complete self-consistent equations determining the free energy functional and all thermodynamic properties without additional approximations. The key innovation is an exact closure relation connecting the pair angular distribution function to the single-site angular density, enabling the exact integration of the entropy functional. We validate the theoretical framework against known limits (rigid rod and random coil regimes), compare with continuum wormlike chain predictions, and demonstrate excellent agreement with recent theoretical results (Marantan \\& Mahadevan, 2018). The approach naturally extends to multiple-chain systems and phase transitions, positioning it as a versatile framework for understanding polymer mechanics from the nanoscale to the macroscopic limit.", "url": "https://arxiv.org/abs/2605.29743", "type": "理论", "summary": "我们提出了离散蠕虫链（DWLC）模型的精确解，该模型描述了任意外力下的单一半柔性聚合物。通过对角相关性和单点角密度之间的精确闭合关系，我们推导出完整的自洽方程，无需额外的近似即可确定自由能泛函和所有热力学性质。关键的创新是将角分布函数对与单点角密度连接起来的精确闭包关系，从而实现熵函数的精确积分。我们针对已知极限（刚性棒和随机线圈体系）验证了理论框架，与连续蠕虫链预测进行比较，并证明与最近的理论结果非常一致（Marantan & Mahadevan，2018）。该方法自然延伸到多链系统和相变，将其定位为理解从纳米尺度到宏观极限的聚合物力学的通用框架。", "authors": [{"name": "Benaoumeur Bakhti"}], "featured_authors": [{"name": "Benaoumeur Bakhti"}], "author_count": 1}, {"id": "2605.29745", "category": "cond-mat", "title": "Geometry and localization: Probing Localization Landscape Theory on the Bethe Lattice", "abstract": "The Localization Landscape Theory (LLT) offers a classical analogy for understanding Anderson localization through an effective confining potential, whose percolation threshold has been proposed to mark the mobility edge. While this correspondence shows striking numerical agreement in three dimensions, its theoretical foundations remain an open question. In this work, we extend the analysis of the LLT on the Bethe lattice presented in~\\cite{Tonetti2026}. In this setting in both the Anderson localization transition and the LLT percolation problem admit exact solutions. Our analysis reveals that the two transitions are distinct, with markedly different critical behaviors. Notably, the LLT percolation transition falls into the standard mean-field universality class, in sharp contrast with the unconventional critical behavior of the Anderson transition on the Bethe lattice. Nonetheless, the LLT framework reproduces several exact results, capturing nontrivial features of the very low-disorder regime: it predicts the position of the isolated eigenvalue, the minimal disorder at which both the LLT percolation curve and the mobility edge first appear, and the Aizenman--Warzel lower bound for localization. We also study the dependence of the LLT percolation threshold on the energy shift, evaluate the LLT prediction for the Density of States, and derive several results on the statistical properties of the variables controlling the problem. Finally, we develop an extreme-value analysis showing that the LLT prediction for the Density of States overestimates the amplitude of the tails close to the boundary of the continuous spectrum. These findings provide an exact analytical benchmark showing that, despite its geometric appeal, the LLT does not generally reproduce the quantum critical properties of Anderson localization, while still offering a powerful tool to understand its very low-disorder regime.", "url": "https://arxiv.org/abs/2605.29745", "type": "理论+数值", "summary": "局域化景观理论（LLT）提供了一个经典的类比，通过有效的限制势来理解安德森局域化，其渗透阈值已被提出来标记移动边缘。虽然这种对应关系在三个维度上显示出惊人的数值一致性，但其理论基础仍然是一个悬而未决的问题。在这项工作中，我们扩展了对 Bethe 格的 LLT 分析，参见~\\cite{Tonetti2026}。在这种情况下，安德森定位转换和 LLT 渗透问题都承认精确的解决方案。我们的分析表明，这两种转变是截然不同的，具有明显不同的关键行为。值得注意的是，LLT 渗流跃迁属于标准平均场普适性类别，与 Bethe 晶格上安德森跃迁的非常规临界行为形成鲜明对比。\n\n尽管如此，LLT 框架再现了几个精确的结果，捕获了极低无序状态的重要特征：它预测了孤立特征值的位置、LLT 渗流曲线和迁移率边缘首次出现的最小无序，以及 Aizenman-Warzel 定位下界。我们还研究了 LLT 渗透阈值对能量转移的依赖性，评估了 LLT 对状态密度的预测，并得出了控制问题的变量的统计特性的几个结果。最后，我们进行了极值分析，表明状态密度的 LLT 预测高估了接近连续谱边界的尾部幅度。这些发现提供了精确的分析基准，表明尽管 LLT 具有几何吸引力，但它通常不会重现安德森局域化的量子临界特性，同时仍然提供了一个强大的工具来理解其极低无序状态。", "authors": [{"name": "Lorenzo Tonetti"}, {"name": "Leticia F. Cugliandolo"}, {"name": "Marco Tarzia"}], "featured_authors": [{"name": "Lorenzo Tonetti"}, {"name": "Leticia F. Cugliandolo"}, {"name": "Marco Tarzia"}], "author_count": 3}, {"id": "2605.29746", "category": "cond-mat", "title": "Zeeman Pumping of Higgs Bosons in the Balian--Werthamer State", "abstract": "Based on equations of motion of an SO(5) pseudo-spin, we demonstrate a quantum quench protocol using the magnetic pulse to excite an $\\textit{undamped}$ heavy Higgs boson in the Balian--Werthamer superfluid (or superconductor). To achieve that, it is essential to include the dipolar interaction in the effective Hamiltonian and to calculate the ground state self-consistently. The pumped heavy Higgs mode has the twisted angular momentum $J=2$ with the projection $J^{\\,}_z=0$ and couples to a well-known light Higgs mode ($J=1$, $J^{\\,}_z=0$). The numerical method of 26-point Lebedev quadrature is implemented concretely so as to observe the real-time coupled oscillation.", "url": "https://arxiv.org/abs/2605.29746", "type": "理论+数值", "summary": "基于 SO(5) 赝自旋的运动方程，我们演示了一种量子淬灭协议，使用磁脉冲激发 Balian-Werthamer 超流体（或超导体）中的 $\\textit{无阻尼}$ 重希格斯玻色子。为了实现这一点，必须将偶极相互作用包含在有效哈密顿量中并自洽地计算基态。泵浦重希格斯模式具有扭曲角动量$J=2$，投影为$J^{\\,}_z=0$，并耦合到众所周知的轻希格斯模式（$J=1$，$J^{\\,}_z=0$）。具体实现了26点Lebedev求积的数值方法，以观测实时耦合振荡。", "authors": [{"name": "Qiao-Ru Xu"}], "featured_authors": [{"name": "Qiao-Ru Xu"}], "author_count": 1}, {"id": "2605.29810", "category": "cond-mat", "title": "Criticality in the disordered $N$-color Ashkin-Teller model", "abstract": "The $N$-color Ashkin-Teller model corresponds to $N$ Ising models coupled by four-spin interactions. We consider the two-dimensional case in presence of quenched disorder and use scale invariant scattering theory to determine all the solutions of the exact renormalization group fixed points equations. The weak disorder sector is characterized by a solution that, for any fixed $N$ larger than 1, is a line of fixed points with Ising thermal exponents and continuously varying magnetic exponents. The number of fixed point solutions allowed by the symmetries of the model increases at strong disorder illustrating the growing dependence on the distributions of the two random couplings. The presence of some critical exponents which do not depend on the symmetry parameter $N$ confirms this type of superuniversality as a peculiar feature of random criticality.", "url": "https://arxiv.org/abs/2605.29810", "type": "理论", "summary": "$N$ 颜色 Ashkin-Teller 模型对应于通过四自旋相互作用耦合的 $N$ Ising 模型。我们考虑存在猝灭无序的二维情况，并使用尺度不变散射理论来确定精确重正化群不动点方程的所有解。弱无序扇区的特征在于，对于任何大于 1 的固定 $N$，它是一条具有 Ising 热指数和连续变化磁指数的固定点线。模型的对称性允许的定点解的数量在强无序时增加，这说明对两个随机耦合的分布的依赖性越来越大。一些不依赖于对称参数 $N$ 的临界指数的存在证实了这种类型的超普遍性是随机临界性的一个特殊特征。", "authors": [{"name": "Youssef Makoudi"}, {"name": "Gesualdo Delfino"}], "featured_authors": [{"name": "Youssef Makoudi"}, {"name": "Gesualdo Delfino"}], "author_count": 2}, {"id": "2605.29821", "category": "cond-mat", "title": "Accelerated Discovery of Nitrogen-Coordinated Dual-Atom Hydrogen Evolution Reaction Electrocatalysts via Machine Learning Potentials", "abstract": "The hydrogen evolution reaction (HER) is central to sustainable hydrogen production, and nitrogen coordinated dual atom catalysts (DACs) offer a promising route to noble metal activity at low cost. Yet their vast compositional and coordination design space remains underexplored, as density functional theory (DFT) screening at scale is prohibitive. Here, we map the HER landscape of graphene supported TM2@Nx-Gr DACs, screening 23 transition metals across 20 nitrogen coordination motifs using a machine learning potential (MLP) benchmarked against DFT. Intermediate coordination (2N to 4N) consistently yields near-optimal {\\Delta}GH*, with Ti2@2Na, Mn2@2Na, Fe2@2Na, Cu2@2Na, Rh2@2Na, Zr2@2Na, Zr2@2Nb, Zr2@2Nc, Nb2@2Nc, Zr2@2Nd, Mn2@2Ne, Mn2@2Nf, Ti2@3Na, Au2@3Na, Fe2@3Na, Pd2@3Nb, Rh2@3Nc, Rh2@3Nd, Au2@3Nd, V2@4Na, Ti2@4Nb, Pd2@4Nb, Ti2@4Nc, Cr2@4Nd, Ni2@4Nd, Cu2@4Nd emerging as standout, synthesizable candidates, most exhibiting metallic or narrow gap (<0.25 eV) character. The MLP reaches near-DFT accuracy, with a mean absolute error of 80 meV for Gibbs binding free energies at orders of magnitude lower computational cost, establishing MLP driven screening as a practical engine for next-generation catalyst discovery.", "url": "https://arxiv.org/abs/2605.29821", "type": "理论+数值", "summary": "析氢反应（HER）是可持续制氢的核心，而氮配位双原子催化剂（DAC）为低成本的贵金属活性提供了一条有前途的途径。然而，由于大规模的密度泛函理论（DFT）筛选令人望而却步，它们巨大的组成和协调设计空间仍未得到充分探索。在这里，我们绘制了石墨烯支持的 TM2@Nx-Gr DAC 的 HER 图谱，使用以 DFT 为基准的机器学习势 (MLP) 筛选了 20 个氮配位基序中的 23 种过渡金属。中间配位（2N 至 4N）始终产生接近最佳的 {\\Delta}GH*，其中 Ti2@2Na、Mn2@2Na、Fe2@2Na、Cu2@2Na、Rh2@2Na、Zr2@2Na、Zr2@2Nb、Zr2@2Nc、Nb2@2Nc、Zr2@2Nd、Mn2@2Ne、Mn2@2Nf、 Ti2@3Na、Au2@3Na、Fe2@3Na、Pd2@3Nb、Rh2@3Nc、Rh2@3Nd、Au2@3Nd、V2@4Na、Ti2@4Nb、Pd2@4Nb、Ti2@4Nc、Cr2@4Nd、Ni2@4Nd、Cu2@4Nd 成为突出的可合成候选物，大多数表现出金属或窄间隙（<0.25） eV) 字符。\n\nMLP 达到接近 DFT 的精度，吉布斯结合自由能的平均绝对误差为 80 meV，计算成本低几个数量级，将 MLP 驱动的筛选确立为下一代催化剂发现的实用引擎。", "authors": [{"name": "Yanmei Zang"}, {"name": "Hyun Gyu Park"}, {"name": "Gi Beom Sim"}, {"name": "Tae Hyeon Park"}, {"name": "Ho Jin Lee"}, {"name": "Xiaorong Zou"}, {"name": "D. ChangMo Yang"}, {"name": "Soohaeng Yoo Willow"}, {"name": "Hye Jung Kim"}, {"name": "Chang Woo Myung"}], "featured_authors": [{"name": "Yanmei Zang"}, {"name": "Hyun Gyu Park"}, {"name": "Gi Beom Sim"}, {"name": "Soohaeng Yoo Willow"}, {"name": "Hye Jung Kim"}, {"name": "Chang Woo Myung"}], "author_count": 10}, {"id": "2605.29871", "category": "cond-mat", "title": "Enhanced Density Fluctuations Near a Disordered Chiral Topological Transition", "abstract": "The universal statistics of density fluctuations of localized quantum states may offer unprecedented opportunities to probe and understand quantum transport in connection with dimensionality, coherence, symmetry and disorder. To date, the possible role of topological phase transitions in the fluctuation statistics is not studied yet. Using a Su-Schrieffer-Heeger chain subject to off-diagonal disorder (so that chiral symmetry is preserved), this work investigates how a disorder driven topological phase transition impacts on the spatial fluctuations of the logarithmic wave-packet density $\\ln P(r)$ at distance $r$ from the initial excitation. Away from the transition, in both topological and trivial localized phases, the standard deviation follows the conventional one-dimensional scaling $\\sigma[\\ln P(r)]\\sim r^{\\theta}$ with $\\theta\\simeq 1/2$. Near the transition, however, the fluctuation growth is enhanced: the fitted exponent $\\theta$ increases above $1/2$ in a nonmonotonic manner before returning close to $1/2$ at criticality. We interpret this behavior from the energy-resolved density of states and localization length. Near the transition, several energy sectors carry appreciable spectral weight and exhibit competitive decay rates, preventing a single localization scale from dominating the accessible wave-packet tail and thereby enhancing the fluctuations of $\\ln P(r)$. Our results establish wave-packet fluctuation statistics as a dynamical diagnostic of disordered chiral topological transitions and motivate broader studies of fluctuation phenomena in disordered topological quantum systems.", "url": "https://arxiv.org/abs/2605.29871", "type": "理论+数值", "summary": "局域量子态密度涨落的普遍统计可能为探测和理解与维度、相干性、对称性和无序性相关的量子输运提供前所未有的机会。迄今为止，拓扑相变在涨落统计中的可能作用尚未研究。这项工作使用受非对角无序影响的 Su-Schrieffer-Heeger 链（以便保留手性对称性），研究无序驱动的拓扑相变如何影响距初始激励距离 $r$ 处的对数波包密度 $\\ln P(r)$ 的空间波动。远离转变，在拓扑阶段和平凡局部阶段中，标准差遵循传统的一维缩放 $\\sigma[\\ln P(r)]\\sim r^{\\theta}$ 和 $\\theta\\simeq 1/2$。然而，在过渡附近，波动增长增强：拟合指数 $\\theta$ 以非单调方式增加到 $1/2$ 以上，然后在临界点返回到接近 $1/2$。我们从能量分辨态密度和局域长度来解释这种行为。\n\n在过渡附近，几个能源部门具有相当大的光谱权重并表现出有竞争力的衰减率，从而防止单一局部尺度主导可到达的波包尾部，从而增强 $\\ln P(r)$ 的波动。我们的结果建立了波包涨落统计作为无序手性拓扑跃迁的动态诊断，并激发了对无序拓扑量子系统中涨落现象的更广泛研究。", "authors": [{"name": "Hai-Tao Ding"}, {"name": "Sen Mu"}, {"name": "Leong-Chuan Kwek"}, {"name": "Gabriel Lemarié"}, {"name": "Jiangbin Gong"}], "featured_authors": [{"name": "Hai-Tao Ding"}, {"name": "Sen Mu"}, {"name": "Leong-Chuan Kwek"}, {"name": "Gabriel Lemarié"}, {"name": "Jiangbin Gong"}], "author_count": 5}, {"id": "2605.29875", "category": "cond-mat", "title": "Estimates of ground state energies for the quantum SK and 2D-EA model, using deGennes-Suzuki-Kubo mean-field annealing dynamics", "abstract": "We perform a large scale simulation of quantum annealing in the Sherrington-Kirkpatrick (SK) spin glass up to a system size $N=40000$ to estimate its ground state energy using the deGennes-Suzuki-Kubo mean-field Ising dynamics, extending the earlier results (reported in Eur. Phys. J. B {\\bf 98}, 226 (2025)). Here we numerically solve the deGennes-Suzuki-Kubo annealing dynamics to obtain the spin configurations and subsequently the ground state energy for a given system size at the end of the annealing (to the desired quantum system at the corresponding values of the transverse field), starting from a quantum paramagnetic state. The method shows high efficiency, with an overall algorithmic cost of $O(N^3)$ in estimating the energy of the ground state. We later extend this method to study the ground state energy of the Edwards-Anderson (EA) spin glass on a square lattice.", "url": "https://arxiv.org/abs/2605.29875", "type": "理论+数值", "summary": "我们对 Sherrington-Kirkpatrick (SK) 自旋玻璃中的量子退火进行了大规模模拟，系统尺寸高达 $N=40000$，使用 deGennes-Suzuki-Kubo 平均场 Ising 动力学估计其基态能量，扩展了早期结果（在 Eur. Phys. J. B {\\bf 98}, 226 (2025) 中报告）。在这里，我们对 deGennes-Suzuki-Kubo 退火动力学进行数值求解，以获得自旋构型，并随后从量子顺磁态开始，在退火结束时获得给定系统尺寸的基态能量（在横向场的相应值处达到所需的量子系统）。该方法显示出很高的效率，估计基态能量的总体算法成本为 $O(N^3)$。我们后来扩展了这种方法来研究方形晶格上爱德华兹-安德森 (EA) 自旋玻璃的基态能量。", "authors": [{"name": "Soumyaditya Das"}, {"name": "Soumyajyoti Biswas"}, {"name": "Bikas K. Chakrabarti"}], "featured_authors": [{"name": "Soumyaditya Das"}, {"name": "Soumyajyoti Biswas"}, {"name": "Bikas K. Chakrabarti"}], "author_count": 3}, {"id": "2605.29884", "category": "cond-mat", "title": "Charged Abelian Higgs phase transitions in three-dimensional compact lattice U(1) gauge models with multicharge scalar matter", "abstract": "We consider three-dimensional (3D) lattice Abelian Higgs models, with compact U(1) gauge variables coupled to a doubly-charged $N$-component complex scalar field (CLAH). We focus on their phase transitions between the disordered-confined (DC) and ordered-deconfined (OD) phases. When they are continuous they belong to the 3D Abelian Higgs (AH) universality class associated with the stable charged fixed point (CFP) of the renormalization-group flow of the 3D AH field theory, or scalar electrodynamics, describing $N$-component complex scalar fields minimally coupled to a U(1) gauge field. This CFP exists only for a sufficiently large number of components, i.e., $N \\ge N_d^*$, where the integer $N_d^*$ depends on the spatial dimension $d$ (for example $N_4^*=183$). To estimate $N_3^*$, we look for the minimum number $N_{\\rm cL}$ of scalar components of 3D doubly-charged CLAH models developing continuous transitions along their DC-OD transition line. For this purpose, we present finite-size scaling analyses of Monte Carlo simulations for $N\\in[4,10]$, up to lattice sizes $L\\approx 100$. The results provide evidence of continuous DC-OD transitions for $N=10$, and weak first-order transitions for $N\\le 7$. They are not conclusive for $N=8,\\,9$. Therefore, we estimate $N_{\\rm cL}=9(1)$.", "url": "https://arxiv.org/abs/2605.29884", "type": "理论+数值", "summary": "我们考虑三维 (3D) 晶格阿贝尔希格斯模型，其中紧凑的 U(1) 规范变量耦合到双电荷 $N$ 分量复标量场 (CLAH)。我们重点关注它们在无序限制（DC）和有序解除限制（OD）相之间的相变。当它们连续时，它们属于 3D 阿贝尔希格斯 (AH) 普遍性类，与 3D AH 场论的重正化群流的稳定带电不动点 (CFP) 或标量电动力学相关，描述了与 U(1) 规范场最小耦合的 $N$ 分量复标量场。此 CFP 仅适用于足够多的分量，即 $N \\ge N_d^*$，其中整数 $N_d^*$ 取决于空间维度 $d$（例如 $N_4^*=183$）。为了估计 $N_3^*$，我们寻找沿 DC-OD 转变线发展连续转变的 3D 双电荷 CLAH 模型标量分量的最小数量 $N_{\\rm cL}$。为此，我们提出了 $N\\in[4,10]$ 的蒙特卡罗模拟的有限尺寸缩放分析，直至晶格尺寸 $L\\approx 100$。\n\n结果提供了 $N=10$ 连续 DC-OD 跃迁以及 $N\\le 7$ 弱一阶跃迁的证据。对于 $N=8,\\,9$，它们不是结论性的。因此，我们估计$N_{\\rm cL}=9(1)$。", "authors": [{"name": "Claudio Bonati"}, {"name": "Filippo Mariani"}, {"name": "Ettore Vicari"}], "featured_authors": [{"name": "Claudio Bonati"}, {"name": "Filippo Mariani"}, {"name": "Ettore Vicari"}], "author_count": 3}, {"id": "2605.29925", "category": "cond-mat", "title": "Carrier Localization in Pnictogen-Based Chalcohalides from Defect-Bound Hot Polarons", "abstract": "Pnictogen-based solar absorbers have gained prominence as promising nontoxic and stable alternatives to lead-halide perovskites (LHPs), but are severely limited by carrier localization, preventing their performance from approaching those of LHPs. Recent efforts have uncovered routes to overcome carrier localization, but these early efforts only considered intrinsic factors. Herein, we push beyond these limited early efforts, examining the role of defects, not only on cold carriers but also hot carriers. Focusing on the structurally one-dimensional pnictogen chalcohalide BiSBr, we find that whilst this material intrinsically does not exhibit carrier localization, vacancies introduced during synthesis or post-treatment lead to pronounced extrinsic self-trapping via the formation of defect-bound hot polarons-excited charge-carriers strongly coupled to local defect-induced vibrational modes. These above-gap defect states divert hot carriers from cooling to the band edge, thus depleting the mobile carrier population. Our findings establish the key role of defect-bound hot polarons in mediating extrinsic localization and offer new mechanistic insights into the interplay between defects, lattice coupling, and excited-state charge-carrier transport, which are critical to designing efficient perovskite-inspired solar absorbers.", "url": "https://arxiv.org/abs/2605.29925", "type": "理论", "summary": "基于磷元素的太阳能吸收器作为卤化铅钙钛矿（LHP）的有前途的无毒且稳定的替代品而受到关注，但受到载流子局域化的严重限制，使其性能无法接近LHP。最近的努力已经发现了克服运营商本地化的途径，但这些早期的努力只考虑了内在因素。在这里，我们超越了这些有限的早期努力，研究了缺陷的作用，不仅在冷载流子上，而且在热载流子上。着眼于结构上的一维磷元素硫卤化物BiSBr，我们发现虽然这种材料本质上不表现出载流子局域化，但在合成或后处理过程中引入的空位通过形成与局部缺陷引起的振动模式强烈耦合的缺陷束缚热极化子激发的电荷载流子，导致明显的外在自捕获。这些带隙上方的缺陷态将热载流子从冷却转移到能带边缘，从而耗尽了移动载流子数量。\n\n我们的研究结果确立了缺陷束缚热极化子在介导外在局域化中的关键作用，并为缺陷、晶格耦合和激发态载流子传输之间的相互作用提供了新的机制见解，这对于设计高效的钙钛矿太阳能吸收器至关重要。", "authors": [{"name": "Xiaoyu Guo"}, {"name": "Junzhi Ye"}, {"name": "Cibrán Lopez Alvarez"}, {"name": "Maciej Oskar Liedke"}, {"name": "Maik Butterling"}, {"name": "Mutibah Alanazi"}, {"name": "Yi-Teng Huang"}, {"name": "Jiajie Wu"}, {"name": "Zhilong Zhang"}, {"name": "Lars Van Turnhout"}, {"name": "Yorrick Boeije"}, {"name": "Bofeng Xue"}, {"name": "Qingyu Wang"}, {"name": "Hugh Lohan"}, {"name": "Seán R. Kavanagh"}, {"name": "Andreas Wagner"}, {"name": "Eric Hirschmann"}, {"name": "Robert A. Taylor"}, {"name": "Akshay Rao"}, {"name": "Edgardo Saucedo"}, {"name": "Claudio Cazorla"}, {"name": "Robert L. Z. Hoye"}], "featured_authors": [{"name": "Xiaoyu Guo"}, {"name": "Junzhi Ye"}, {"name": "Cibrán Lopez Alvarez"}, {"name": "Edgardo Saucedo"}, {"name": "Claudio Cazorla"}, {"name": "Robert L. Z. Hoye"}], "author_count": 22}, {"id": "2605.29945", "category": "cond-mat", "title": "Entropy of Liquids and Glasses from Recurring Structural Patterns", "abstract": "We compute the low-temperature configurational entropy of a two-dimensional supercooled liquid. Our method, based on a higher-dimensional version of the Grassberger--Procaccia algorithm, can be implemented in a manner that is entirely agnostic with respect to both the dynamics and the theoretical framework, as any genuine notion of order should be. In this construction, entropy is obtained as the decay rate of recurrent structural patterns with increasing patch size, directly linking entropy reduction to the growing persistence of amorphous order. Because the method requires only particle positions, without any knowledge of the interaction potential or even of the particle sizes, it can be applied directly to both equilibrium and nonequilibrium aging configurations. The resulting configurational entropy, together with the higher-order Rényi complexities, agree quantitatively with values obtained from conventional definitions. Remarkably, the entropies measured during aging coincide with their equilibrium counterparts when compared at the same inherent-structure energy.", "url": "https://arxiv.org/abs/2605.29945", "type": "数值", "summary": "我们计算二维过冷液体的低温构型熵。我们的方法基于 Grassberger-Procaccia 算法的高维版本，可以以一种与动力学和理论框架完全不可知的方式实现，就像任何真正的秩序概念一样。在这种结构中，熵是作为循环结构模式随斑块尺寸增加的衰减率而获得的，将熵减少与无定形秩序的持续增长直接联系起来。由于该方法仅需要颗粒位置，无需了解相互作用势甚至颗粒尺寸，因此它可以直接应用于平衡和非平衡老化配置。由此产生的构型熵以及高阶 Rényi 复杂度在数量上与从传统定义获得的值一致。值得注意的是，在相同的固有结构能量下进行比较时，老化过程中测量的熵与其平衡对应物一致。", "authors": [{"name": "Nina Javerzat"}, {"name": "Gerhard Jung"}, {"name": "Jorge Kurchan"}, {"name": "Misaki Ozawa"}], "featured_authors": [{"name": "Nina Javerzat"}, {"name": "Gerhard Jung"}, {"name": "Jorge Kurchan"}, {"name": "Misaki Ozawa"}], "author_count": 4}, {"id": "2605.29957", "category": "cond-mat", "title": "Universal thermokinetic decomposition of short-time information fluctuations", "abstract": "Biological, artificial, and physical systems dissipate energy to accurately transmit information. While tools of information theory have been used to characterize information-processing capabilities, how reliably this information is acquired along individual trajectories, and which aspects require a thermodynamic cost, is an open question. In this work, we focus on the stochastic predictability of an arbitrary Langevin dynamics, defined as the pointwise mutual information between the current and future states of a system. We show that the fluctuations of predictability obey a universal thermokinetic decomposition at short times, which reveals that information fluctuations are suppressed by energy dissipation and become stronger with increased dynamical activity. Remarkably, we find that the average predictability, i.e., the short-time mutual information, does not carry any dependence on the underlying thermodynamic and kinetic features. Thus, the role of dissipation at short times is not to enhance information, but to reduce its fluctuations. Such dissipative control is effective only when instantiated by nonlinear operations. Moreover, energy consumption governs short- and long-time precision in stochastic oscillators through structurally different mechanisms that can be independently tuned. Our decomposition offers a fundamental thermodynamic basis for understanding the reliability of information transmission in nonequilibrium systems, the constraints on precision in biological systems, and the design of energy-limited control strategies.", "url": "https://arxiv.org/abs/2605.29957", "type": "理论", "summary": "生物、人工和物理系统消耗能量以准确地传输信息。虽然信息论工具已被用来表征信息处理能力，但沿着个体轨迹获取这些信息的可靠性如何，以及哪些方面需要热力学成本，仍然是一个悬而未决的问题。在这项工作中，我们关注任意朗之万动力学的随机可预测性，定义为系统当前状态和未来状态之间的逐点互信息。我们证明，可预测性的波动在短时间内服从普遍的热动力学分解，这表明信息波动受到能量耗散的抑制，并随着动态活动的增加而变得更强。值得注意的是，我们发现平均可预测性，即短时互信息，并不依赖于潜在的热力学和动力学特征。因此，短时间耗散的作用不是增强信息，而是减少其波动。这种耗散控制仅在通过非线性操作实例化时才有效。\n\n此外，能量消耗通过可以独立调节的结构上不同的机制来控制随机振荡器的短期和长期精度。我们的分解为理解非平衡系统中信息传输的可靠性、生物系统精度的限制以及能量限制控制策略的设计提供了基本的热力学基础。", "authors": [{"name": "Giorgio Nicoletti"}, {"name": "Daniel M. Busiello"}], "featured_authors": [{"name": "Giorgio Nicoletti"}, {"name": "Daniel M. Busiello"}], "author_count": 2}, {"id": "2605.29969", "category": "cond-mat", "title": "Prototype-Guided Latent Alignment for Data-Efficient Fine-Tuning of Molecular Foundation Models", "abstract": "Machine learning interatomic potentials (MLIPs) have transformed materials discovery by leveraging graph neural networks (GNNs) to predict material properties with near density functional theory (DFT) accuracy. While large-scale pretrained foundation models offer transferable baseline representations, they frequently struggle to generalise to out-of-distribution (OOD) target systems -- a common challenge in modelling complex or chemically diverse materials. Fine-tuning is the standard remedy, but the high cost of generating DFT-labelled configurations confines adaptation to data-scarce regimes, where over-parameterised GNNs amplify overfitting and degrade target-domain performance. To address this, we propose a prototype-based alignment approach for data-efficient fine-tuning of MLIPs. Our method identifies local structural similarities between the source and target domains by grouping atoms with analogous chemical environments based on their latent representations. Each target-domain atom's energy contribution is aligned to its source-domain prototype, introducing an inductive bias that anchors fine-tuned representations to the pretrained structure, encouraging effective reuse of learned interactions and improving generalisation without restrictive assumptions on the target chemistry. We evaluate our method on the rMD17 benchmark using equivariant MACE and invariant SchNet across varying data budgets, and extend evaluation to the MACE-OFF foundation models on the SPICE dataset. Our approach consistently improves predictive accuracy in the low-data regime, reducing energy MAE by up to 18% over standard fine-tuning baselines.", "url": "https://arxiv.org/abs/2605.29969", "type": "理论+数值", "summary": "机器学习原子间势 (MLIP) 利用图神经网络 (GNN) 以接近密度泛函理论 (DFT) 的精度预测材料特性，从而改变了材料的发现。虽然大规模预训练基础模型提供可转移的基线表示，但它们经常难以推广到分布外 (OOD) 目标系统，这是对复杂或化学多样化材料进行建模时的常见挑战。微调是标准补救措施，但生成 DFT 标记配置的高成本限制了对数据稀缺状况的适应，其中过度参数化的 GNN 会放大过度拟合并降低目标域性能。为了解决这个问题，我们提出了一种基于原型的对齐方法，用于对 MLIP 进行数据高效的微调。我们的方法通过根据原子的潜在表示将具有类似化学环境的原子分组来识别源域和目标域之间的局部结构相似性。\n\n每个目标域原子的能量贡献与其源域原型一致，引入归纳偏差，将微调表示锚定到预训练结构，鼓励有效重用学到的相互作用，并在不对目标化学进行限制性假设的情况下提高泛化能力。我们在不同的数据预算中使用等变 MACE 和不变 SchNet 在 rMD17 基准上评估我们的方法，并将评估扩展到 SPICE 数据集上的 MACE-OFF 基础模型。我们的方法持续提高低数据情况下的预测准确性，与标准微调基线相比，将能源 MAE 降低高达 18%。", "authors": [{"name": "Rushikesh Pawar"}, {"name": "Harshit Rawat"}, {"name": "Ayush Kumar"}, {"name": "Phani Motamarri"}], "featured_authors": [{"name": "Rushikesh Pawar"}, {"name": "Harshit Rawat"}, {"name": "Ayush Kumar"}, {"name": "Phani Motamarri"}], "author_count": 4}, {"id": "2605.29989", "category": "cond-mat", "title": "Thermodynamic and magnetocaloric properties of a triangular spin-1/2 cluster with Dzyaloshinskii-Moriya interaction", "abstract": "We present a theoretical investigation of the magnetic and thermodynamic properties of the triangular spin-1/2 cluster with Dzyaloshinskii-Moriya (DM) interaction, described by a spin-1/2 Heisenberg Hamiltonian with antisymmetric exchange interactions. The energy spectrum and ground-state phase diagram reveal the presence of ferromagnetic (FM), ferrimagnetic (FI), and frustrated (FR) phases, strongly influenced by the total spin and the DM interaction. We analyze magnetization and susceptibility, showing that at low temperatures the system exhibits a characteristic 1/3 magnetization plateau, while thermal fluctuations suppress magnetic order at higher temperatures. The entropy and specific heat display residual entropies due to ground-state degeneracies, Schottky-type anomalies at intermediate temperatures, and additional low-temperature features related to phase transitions. Particular attention is given to the magnetocaloric effect (MCE), characterized by both direct and inverse regimes depending on the magnetic field variation. We find that the DM interaction enhances the complexity of the MCE, leading to nontrivial entropy variations as a function of the magnetic field. These results provide insights into the role of frustration and anisotropy in tuning the MCE of properties triangular spin clusters, with relevance to \\mathrm{Cu}_{3}-based molecular magnets.", "url": "https://arxiv.org/abs/2605.29989", "type": "理论+数值", "summary": "我们对具有 Dzyaloshinskii-Moriya (DM) 相互作用的三角形自旋 1/2 簇的磁性和热力学性质进行了理论研究，由具有反对称交换相互作用的自旋 1/2 海森堡哈密顿量描述。能谱和基态相图揭示了铁磁 (FM)、亚铁磁 (FI) 和受抑 (FR) 相的存在，受总自旋和 DM 相互作用的强烈影响。我们分析了磁化强度和磁化率，结果表明，在低温下，系统表现出特征性的 1/3 磁化平台，而热波动在较高温度下会抑制磁序。熵和比热显示由于基态简并、中间温度下的肖特基型异常以及与相变相关的其他低温特征而产生的残余熵。特别关注磁热效应（MCE），其特征在于取决于磁场变化的正向和反向状态。我们发现 DM 相互作用增强了 MCE 的复杂性，导致作为磁场函数的不平凡的熵变化。\n\n这些结果提供了关于挫败和各向异性在调整三角形自旋簇的 MCE 中的作用的见解，与基于 \\mathrm{Cu}_{3} 的分子磁体相关。", "authors": [{"name": "Jordana Torrico"}, {"name": "Romulo A. Silva"}, {"name": "S. M. de Souza"}, {"name": "Onofre Rojas"}], "featured_authors": [{"name": "Jordana Torrico"}, {"name": "Romulo A. Silva"}, {"name": "S. M. de Souza"}, {"name": "Onofre Rojas"}], "author_count": 4}, {"id": "2605.30007", "category": "cond-mat", "title": "Hidden Ising models from the generalized Yang-Baxter equation", "abstract": "We introduce a one dimensional spin $\\frac{1}{2}$ Hamiltonian with multi-site interactions, but still local. The algebra of its Hamiltonian densities resembles that of the transverse field Ising model. Using this fact we show that its spectrum is free-fermionic but with a huge degeneracy for each level. The source of the degeneracy is a set of local conserved quantities that act like a classical background field for the quantum system. The thermodynamics of this system is contrasted with the standard Ising model. At the gapless points in the energy spectrum, we show that this system can be derived from the quantum inverse scattering method adapted to a multi-site generalization of the Yang-Baxter equation as introduced by E. Rowell and Z. Wang. The $R$-matrix is constructed using generators of extraspecial 2-groups. This helps us extract all the conserved charges and lay the framework for a general mechanism to generate such multi-site interaction spin systems that are transverse field Ising models under the hood. A remark on how to obtain P. Fendley's free-fermion in disguise models in this formalism is also included.", "url": "https://arxiv.org/abs/2605.30007", "type": "理论", "summary": "我们引入了具有多位点相互作用的一维自旋 $\\frac{1}{2}$ 哈密顿量，但仍然是局部的。其哈密顿密度的代数类似于横向场伊辛模型的代数。利用这一事实，我们表明它的光谱是自由费米子的，但每个能级都有巨大的简并性。简并性的根源是一组局部守恒量，其作用类似于量子系统的经典背景场。该系统的热力学与标准伊辛模型进行了对比。在能谱的无间隙点，我们表明该系统可以从量子逆散射方法导出，该方法适用于 E. Rowell 和 Z. Wang 引入的 Yang-Baxter 方程的多位点推广。 $R$ 矩阵是使用超特殊 2 群生成器构建的。这有助于我们提取所有守恒电荷，并为生成这种多位点相互作用自旋系统的通用机制奠定框架，这些系统是横向场伊辛模型。还包括关于如何在这种形式主义中获得 P. Fendley 的伪装模型中的自由费米子的评论。", "authors": [{"name": "Akash Sinha"}, {"name": "Somnath Maity"}, {"name": "Pramod Padmanabhan"}, {"name": "Vladimir Korepin"}], "featured_authors": [{"name": "Akash Sinha"}, {"name": "Somnath Maity"}, {"name": "Pramod Padmanabhan"}, {"name": "Vladimir Korepin"}], "author_count": 4}, {"id": "2605.30012", "category": "cond-mat", "title": "Charting the thermodynamic stability of hybrid perovskite alloys with machine learning", "abstract": "Alloy-based perovskite solar cells offer tunable properties and improved stability, but their complexity has impeded accurate modeling, hindering development. We present a machine-learning (ML) accelerated atomistic modeling approach for the phase stability of (Cs/FA)Pb(Br/I)3 and (Cs/FA)Sn(Br/I)3 perovskites, with FA being formamidinium. To make such quaternary alloys tractable, we adopt a two-level ML strategy, combining 1) graph neural network interatomic potentials trained on density functional theory data for efficient structure relaxations with 2) secondary ML models for direct energy prediction from unrelaxed structures. These models enable computations of free energy landscapes across compositions and phases, capturing alloy disorder and FA molecular orientations. Our results reveal narrower stable composition regions for the Sn-based system compared to its Pb-based counterpart, limiting options for compositional engineering. Maximum stability occurs at high I content, and no stabilization is observed near the center of the composition space. Our results guide the design of stable perovskites.", "url": "https://arxiv.org/abs/2605.30012", "type": "理论+数值", "summary": "合金基钙钛矿太阳能电池具有可调节的特性和更高的稳定性，但其复杂性阻碍了精确建模，从而阻碍了发展。我们提出了一种机器学习 (ML) 加速原子建模方法，用于 (Cs/FA)Pb(Br/I)3 和 (Cs/FA)Sn(Br/I)3 钙钛矿的相稳定性，其中 FA 为甲脒。为了使这种四元合金易于处理，我们采用了两级 ML 策略，结合了 1) 在密度泛函理论数据上训练的图神经网络原子间势，以实现有效的结构松弛；2) 二级 ML 模型，用于从非松弛结构直接进行能量预测。这些模型能够计算跨成分和相的自由能景观，捕获合金无序和 FA 分子取向。我们的结果表明，与铅基系统相比，锡基系统的稳定成分区域更窄，限制了成分工程的选择。在高 I 含量时出现最大稳定性，并且在成分空间中心附近没有观察到稳定性。我们的结果指导稳定钙钛矿的设计。", "authors": [{"name": "Jarno Laakso"}, {"name": "Armi Tiihonen"}, {"name": "Patrick Rinke"}], "featured_authors": [{"name": "Jarno Laakso"}, {"name": "Armi Tiihonen"}, {"name": "Patrick Rinke"}], "author_count": 3}, {"id": "2605.30016", "category": "cond-mat", "title": "Magnetic precession induced spin accumulation in collinear antiferromagnets", "abstract": "Generating and characterizing uniform and staggered spin polarization in antiferromagnets is one of the key challenges for antiferromagnetic spintronic technology. Here, we perform perturbative theory, group-theoretical symmetry analysis, low energy and ab initio simulations to propose that the magnetic precession near the equilibrium magnetic axis could generate finite uniform and staggered spin polarization at the opposite magnetic sublattices (referring to total magnetic and Néel vector generation) in a single AFM semiconductors. This response does not require the heterojunction setup and could eliminate the lattice mismatch issues at the junction. Through scrutinizing all symmetrically-protected vanishing magnetic moment groups and especially focusing on parity-time (PT ) invariant groups, we identify the symmetry constraints that describe the staggered spin accumulation responses, and disclose their fieldlike and dampinglike characters. This unravels a hidden spin accumulation mode in AFM semiconductors. Furthermore, we simulate such an effect using a perturbative approach and suggest that electric gate field and Floquet light-dressing can effectively manipulate these responses.", "url": "https://arxiv.org/abs/2605.30016", "type": "理论+数值", "summary": "在反铁磁体中产生和表征均匀且交错的自旋极化是反铁磁自旋电子技术的关键挑战之一。在这里，我们进行微扰理论、群论对称分析、低能和从头计算，提出平衡磁轴附近的磁进动可以在单个 AFM 半导体中的相反磁性亚晶格处产生有限的均匀且交错的自旋极化（指总磁和尼尔矢量生成）。这种响应不需要异质结设置，并且可以消除结处的晶格失配问题。通过仔细检查所有对称保护的消失磁矩群，特别是宇称时间（PT）不变群，我们确定了描述交错自旋累积响应的对称约束，并揭示了它们的类场和类阻尼特征。这揭示了 AFM 半导体中隐藏的自旋累积模式。\n\n此外，我们使用微扰方法模拟这种效应，并建议电门场和 Floquet 光装饰可以有效地操纵这些响应。", "authors": [{"name": "Q. Xue"}, {"name": "J. Zhou"}], "featured_authors": [{"name": "Q. Xue"}, {"name": "J. Zhou"}], "author_count": 2}, {"id": "2605.30028", "category": "cond-mat", "title": "Hysteretic Acoustic Band Structures in Shape-Memory Composite Thin Rods", "abstract": "We investigate the propagation of longitudinal elastic waves in one-dimensional periodic composite rods composed of alternating segments of a shape-memory alloy (NiTiCu) and a polymer sp
