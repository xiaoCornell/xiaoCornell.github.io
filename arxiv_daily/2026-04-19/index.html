 fields, constructing their corresponding mode solutions in Rindler coordinates. Using normalised field expansions, we compute the Bogoliubov transformations between modes defined in the two null-shifted wedges. Our results demonstrate a fundamental breakdown of thermality: the presence of mass modifies the mode structure, rendering the characteristic exponential mixing of frequencies absent. This suggests that the massive field remains unexcited on this background, leading to a manifestly nonthermal response. These findings highlight that thermality in accelerated frames depends sensitively on the conformal symmetry of the field, which is broken by the introduction of a mass term.", "url": "https://arxiv.org/abs/2604.14453", "type": "理论", "summary": "我们研究了零位移 Rindler 楔子中量子场的行为，并分析了加速观察者感知到的与这些零变形相关的粒子光谱。与标准 Unruh 效应不同，我们的分析比较了通过零位移连接的两个加速框架。我们考虑大量标量场和狄拉克场，在 Rindler 坐标中构造它们相应的模态解。使用归一化场展开，我们计算两个零位移楔中定义的模式之间的 Bogoliubov 变换。我们的结果证明了热度的根本原因：质量的存在改变了模态结构，导致频率的特征指数混合不存在。这表明在这种背景下，巨大的场仍然未被激发，从而导致明显的非热响应。这些发现强调，加速框架中的热度敏感地取决于场的共形对称性，而质量项的引入打破了这一点。", "authors": [{"name": "Rakesh K Jha"}], "featured_authors": [{"name": "Rakesh K Jha"}], "author_count": 1}, {"id": "2604.14492", "category": "hep-th", "title": "Spinning States and Unitarity in 3D Gravity", "abstract": "We revisit the proposal to cure the negative density of states in the three-dimensional gravitational path integral by adding spinning states whose spin scales with the central charge. We show that sub-extremal and extremal spinning states below the black hole threshold can cancel the known negativities, and interpret these states as bulk spinning defects. Additionally, certain overspinning states above the black hole threshold can cure these negativities while preserving the spectral gap. Previously interpreted as classical spinning strings, we instead identify these overspinning states with overspinning BTZ geometries, which are smooth pure gravity quotients of AdS$_3$ with no fixed points. All of these spinning geometries exhibit causal pathologies in their Lorentzian continuations. Moreover, the overspinning geometries arise from mixed elliptic-hyperbolic identifications and contain a right-moving temperature and quasinormal modes. We also generalize the computation of scalar correlators to the extremal and overspinning backgrounds.", "url": "https://arxiv.org/abs/2604.14492", "type": "理论", "summary": "我们重新审视了通过添加自旋态来解决三维引力路径积分中的负态密度的建议，这些自旋态的自旋与中心电荷成比例。我们表明，低于黑洞阈值的次极值和极值旋转状态可以消除已知的负面影响，并将这些状态解释为体旋转缺陷。此外，高于黑洞阈值的某些过度旋转状态可以消除这些负面影响，同时保留光谱间隙。之前被解释为经典的旋转弦，我们用过度旋转 BTZ 几何形状来识别这些过度旋转状态，这些几何形状是 AdS$_3$ 的平滑纯重力商，没有固定点。所有这些旋转几何形状都在其洛伦兹延续中表现出因果病理学。此外，过度旋转的几何形状源自混合椭圆-双曲线辨识，并包含右移温度和拟正规模式。我们还将标量相关器的计算推广到极值和超旋背景。", "authors": [{"name": "Ziyi Li"}], "featured_authors": [{"name": "Ziyi Li"}], "author_count": 1}, {"id": "2604.14508", "category": "hep-th", "title": "Fermionic modes of D-instanton wormholes from broken local supersymmetry", "abstract": "In low-energy supergravity treatment of type IIB superstring on general D-instanton wormhole profiles in the bulk, we obtain non-vanishing scalar two-point functions in addition to the vanishing $\\langle \\tau^* \\tau^* \\rangle$ that corresponds to the BPS amplitude detected by two D-instantons at their respective boundaries. This is exploited to show that the modes of broken local supersymmetry in the bulk deliver the fermionic (diagonal) modes on the boundaries through the deformation by the form of current-current two point functions propagating on the tree level cylinder geometry. Our treatment is generalizable to multi D-instanton cases and general Euclidean branes.", "url": "https://arxiv.org/abs/2604.14508", "type": "理论", "summary": "在对一般D瞬间虫洞剖面进行IIB型超弦低能超引力处理时，除了对应于两个D瞬间在其各自边界处检测到的BPS振幅的消失$\\langle \\tau^* \\tau^* \\rangle$之外，我们还获得了非消失标量两点函数。利用这一点来表明，体中破坏的局部超对称模式通过在树级圆柱体几何形状上传播的电流-电流两点函数的形式的变形，在边界上传递费米子（对角）模式。我们的治疗方法可推广到多 D 瞬时情况和一般欧几里德膜。", "authors": [{"name": "H. Itoyama"}, {"name": "Hikaru Kawai"}, {"name": "Shoichi Kawamoto"}], "featured_authors": [{"name": "H. Itoyama"}, {"name": "Hikaru Kawai"}, {"name": "Shoichi Kawamoto"}], "author_count": 3}, {"id": "2604.14522", "category": "hep-th", "title": "Double-scaled bosonic and fermionic embedded ensembles, complex SYK, and the dual Hilbert space", "abstract": "We derive the density of states along with the $2$- and $4$-point functions of embedded ensembles for both fermions and bosons in the double-scaled limit. It is shown the models are equivalent to the double-scaled Sachdev-Ye-Kitaev model, expanding the double-scaled universality class to include both fermionic and bosonic systems. The models can be solved by introducing the Wick product of non-commuting Gaussian random variables. We show that deriving the Wick product is sufficient for computing the density of states, and properties of the Wick product can be used to compute $n$-point functions directly in the energy basis. In this context, the Wick product is equivalent to normal ordering of $q$-oscillators, which leads to the duality between moments of double-scaled models and expectation values in the chord Hilbert space. By considering operator probes as a second set of oscillators, we extend the duality to compute $n$-point functions. Embedded ensembles are equivalent to complex SYK at fixed charge, and we show working directly with embedded ensembles streamlines the derivations.", "url": "https://arxiv.org/abs/2604.14522", "type": "理论", "summary": "我们推导了双尺度极限下费米子和玻色子的态密度以及嵌入系综的 $2$ 和 $4$ 点函数。结果表明，这些模型相当于双尺度 Sachdev-Ye-Kitaev 模型，将双尺度普适性类别扩展到包括费米子和玻色子系统。该模型可以通过引入非交换高斯随机变量的 Wick 乘积来求解。我们证明，导出 Wick 乘积足以计算态密度，并且 Wick 乘积的属性可用于直接在能量基础中计算 $n$ 点函数。在这种情况下，Wick 乘积相当于 $q$-振荡器的正常排序，这导致双尺度模型的矩与弦希尔伯特空间中的期望值之间的对偶性。通过将算子探针视为第二组振荡器，我们扩展了对偶性来计算 $n$ 点函数。嵌入式集成相当于固定费用的复杂 SYK，我们展示了直接使用嵌入式集成简化了推导。", "authors": [{"name": "Jarod Tall"}, {"name": "Steven Tomsovic"}], "featured_authors": [{"name": "Jarod Tall"}, {"name": "Steven Tomsovic"}], "author_count": 2}, {"id": "2604.14549", "category": "hep-th", "title": "Loop integrals in de Sitter spacetime: The parity-split IBP system and $\\di\\log$-form differential equations", "abstract": "We develop integration-by-parts (IBP) reduction and differential equations for massive loop integrals of cosmological correlators in de Sitter (dS) spacetime, demonstrating the feasibility of this approach. We identify a structural property of the dS IBP system: for an \\(n\\)-propagator family, it splits into \\(2^n\\) closed subsystems classified by the parity of the propagator indices. We further formulate a Baikov representation for loop integrals in dS space and derive the corresponding dimensional recurrence relations. In flat spacetime, intersection theory shows that \\(\\di\\log\\)-form master integrands lead to \\(\\di\\log\\)-form differential equations. Motivated by fibration intersection theory, we conjecture that this construction extends to dS integrands involving Hankel functions. We verify this conjecture in the one-loop bubble family and determine the associated alphabet.", "url": "https://arxiv.org/abs/2604.14549", "type": "理论", "summary": "我们为德西特（dS）时空中宇宙相关器的大规模环积分开发了分部积分（IBP）简化和微分方程，证明了这种方法的可行性。我们确定了 dS IBP 系统的结构属性：对于 \\(n\\)-传播器家族，它分裂为 \\(2^n\\) 个按传播器索引奇偶性分类的封闭子系统。我们进一步在 dS 空间中制定了循环积分的 Baikov 表示，并推导了相应的维数递推关系。在平坦时空中，交集理论表明，\\(\\di\\log\\) 形式的主被积函数导致 \\(\\di\\log\\) 形式的微分方程。受纤维相交理论的启发，我们推测这种构造扩展到涉及 Hankel 函数的 dS 被积函数。我们在单环气泡族中验证了这个猜想并确定了相关的字母表。", "authors": [{"name": "Jiaqi Chen"}, {"name": "Bo Feng"}, {"name": "Zhehan Qin"}, {"name": "Yi-Xiao Tao"}], "featured_authors": [{"name": "Jiaqi Chen"}, {"name": "Bo Feng"}, {"name": "Zhehan Qin"}, {"name": "Yi-Xiao Tao"}], "author_count": 4}, {"id": "2604.14741", "category": "hep-th", "title": "The OPE Approach to Renormalization: Operator Mixing", "abstract": "We extend the OPE-based renormalization algorithm to composite operators with operator mixing, focusing on scalar operators in $\\phi^4$ and $\\phi^3$ models. Using the OPE of operators with a fundamental field, we show that the $Z$-factors of these composite operators are determined by OPE coefficients of lower-dimensional traceless symmetric tensor operators, and establish a recursive renormalization framework. We report the five-loop anomalous dimensions for operators with $\\Delta\\le5$ in the $\\phi^4$ model and the two-loop anomalous dimensions for operators with $\\Delta\\le10$ in the $\\phi^3$ model. These results further demonstrate the versatility and efficiency of the OPE-based algorithm.", "url": "https://arxiv.org/abs/2604.14741", "type": "理论", "summary": "我们将基于 OPE 的重正化算法扩展到具有算子混合的复合算子，重点关注 $\\phi^4$ 和 $\\phi^3$ 模型中的标量算子。利用基本域算子的OPE，我们证明了这些复合算子的$Z$因子是由低维无痕对称张量算子的OPE系数决定的，并建立了递归重整化框架。我们报告了 $\\phi^4$ 模型中具有 $\\Delta\\le5$ 的算子的五环异常维度，以及 $\\phi^3$ 模型中具有 $\\Delta\\le10$ 的算子的两环异常维度。这些结果进一步证明了基于 OPE 的算法的多功能性和效率。", "authors": [{"name": "Jinpeng Zhang"}, {"name": "Qingjun Jin"}], "featured_authors": [{"name": "Jinpeng Zhang"}, {"name": "Qingjun Jin"}], "author_count": 2}, {"id": "2604.14824", "category": "hep-th", "title": "Decrease of the entanglement entropy of the Hawking radiation induced by backreaction in the Bose-Einstein condensate", "abstract": "We analytically study the effect of backreaction from analog Hawking radiation on its entanglement entropy in the Bose-Einstein condensate (BEC). The backreaction is expected to play an essential role in the decrease of the entanglement entropy and in realizing the Page curve. Since the BEC theory has microscopic Hamiltonian and thus exhibits unitarity, it is desirable to reproduce the Page curve explicitly by using the Hamiltonian. In order to analyze this in a concrete example, we study the BEC with a step-like configuration that has been extensively studied in the literature. By using the microscopic theory, we derive an explicit form of backreaction from analog Hawking radiation. Combining it with the known results of the Bogoliubov coefficients, we analytically compute the entanglement entropy of the Hawking radiation, and show that it decreases as expected due to the backreaction for sufficiently low energy modes over a wide range of the parameter characterizing the step-like configuration.", "url": "https://arxiv.org/abs/2604.14824", "type": "理论", "summary": "我们分析研究了模拟霍金辐射的反反应对其在玻色-爱因斯坦凝聚体（BEC）中的纠缠熵的影响。预计逆反应将在减少纠缠熵和实现佩奇曲线方面发挥重要作用。由于BEC理论具有微观哈密顿量，因此表现出幺正性，因此需要使用哈密顿量来明确地再现佩奇曲线。为了在具体示例中对此进行分析，我们研究了具有阶梯式配置的 BEC，该结构已在文献中得到广泛研究。通过使用微观理论，我们从模拟霍金辐射中推导出一种明确的逆反应形式。将其与 Bogoliubov 系数的已知结果相结合，我们分析计算了霍金辐射的纠缠熵，并表明由于在表征阶梯配置的宽范围参数上足够低能量模式的反反应，它按预期减少。", "authors": [{"name": "Tsunehide Kuroki"}], "featured_authors": [{"name": "Tsunehide Kuroki"}], "author_count": 1}, {"id": "2604.14899", "category": "hep-th", "title": "The ODE/IM Correspondence between $C (2)^{(2)}$-type Linear Problems and 2d $\\mathcal{N} = 1$ SCFT", "abstract": "We study the ODE/IM correspondence between the linear problem associated with the supersymmetric affine Toda field equation for the twisted affine Lie superalgebra $C (2)^{(2)} = \\mathfrak{osp} (2 | 2)^{(2)}$ and two-dimensional $\\mathcal{N} = 1$ superconformal field theories (SCFTs). On the ODE side, we introduce a boundary condition more suitable for the conformal limit and the subsequent WKB analysis and diagonalize the resulting Lax operator. This leads to a WKB expansion from which we extract the WKB periods and non-local conserved quantities up to tenth order. On the IM side, we compute the eigenvalues of the local integrals of motion on the cylinder in both the Neveu-Schwarz and Ramond sectors of 2d $\\mathcal{N} = 1$ SCFTs. We then compare the two sides and verify, up to sixth order, that the WKB periods coincide with the eigenvalues of the local integrals of motion for highest-weight states in the Neveu-Schwarz sector.", "url": "https://arxiv.org/abs/2604.14899", "type": "理论", "summary": "我们研究了与扭曲仿射李超代数 $C (2)^{(2)} = \\mathfrak{osp} (2 | 2)^{(2)}$ 的超对称仿射 Toda 场方程相关的线性问题和二维 $\\mathcal{N} = 1$ 超共形场论 (SCFT) 之间的 ODE/IM 对应关系。在 ODE 方面，我们引入了更适合共形极限和后续 WKB 分析的边界条件，并对所得 Lax 算子进行对角化。这导致了 WKB 扩展，我们从中提取 WKB 周期和非局部守恒量直至十阶。在 IM 方面，我们计算 2d $\\mathcal{N} = 1$ SCFT 的 Neveu-Schwarz 和 Ramond 扇区中圆柱体运动的局部积分的特征值。然后，我们比较两侧并验证（直到六阶）WKB 周期与 Neveu-Schwarz 扇区中最高权重状态的局部运动积分的特征值一致。", "authors": [{"name": "Naozumi Tanabe"}], "featured_authors": [{"name": "Naozumi Tanabe"}], "author_count": 1}, {"id": "2604.14939", "category": "hep-th", "title": "Correlators in $T\\bar{T}$ and Root-$T\\bar{T}$ Deformed CFTs", "abstract": "Quasi-primary correlators in two-dimensional conformal field theories deformed simultaneously by $T\\bar T$ and root-$T\\bar T$ are studied. A path-integral formulation motivated by the geometric realization of the combined deformation is used to develop a geometric framework for evaluating the deformed correlators. Within this framework, the two-point function is obtained to all orders in the $T\\bar T$ coupling and to leading order in the root-$T\\bar T$ coupling, while the leading correction to the three-point function is computed. It is further shown that the deformed two-point correlator admits a kernel representation as a weighted average of undeformed CFT correlators over conformal dimensions. This representation is derived explicitly for both the pure $T\\bar T$ deformation and the combined flow. In this way, the mixed $T\\bar T$/root-$T\\bar T$ deformation is incorporated into the geometric description of irrelevant deformations, and the structure of local correlators beyond the pure $T\\bar T$ case is characterized more explicitly.", "url": "https://arxiv.org/abs/2604.14939", "type": "理论", "summary": "研究了$T\\bar T$和根$T\\bar T$同时变形的二维共形场论中的准主相关器。由组合变形的几何实现推动的路径积分公式用于开发用于评估变形相关器的几何框架。在此框架内，获得 $T\\bar T$ 耦合中所有阶数和根 $T\\bar T$ 耦合中的前导阶数的两点函数，同时计算三点函数的前导校正。进一步表明，变形的两点相关器允许核表示作为共形维度上未变形的 CFT 相关器的加权平均值。该表示是针对纯 $T\\bar T$ 变形和组合流显式导出的。这样，混合$T\\bar T$/root-$T\\bar T$变形被纳入不相关变形的几何描述中，并且更明确地表征了超出纯$T\\bar T$情况的局部相关器的结构。", "authors": [{"name": "Bo-Rui Li"}, {"name": "Song He"}, {"name": "Yu-Xiao Liu"}], "featured_authors": [{"name": "Bo-Rui Li"}, {"name": "Song He"}, {"name": "Yu-Xiao Liu"}], "author_count": 3}, {"id": "2604.15018", "category": "hep-th", "title": "Boundary lines and Askey-Wilson type moments", "abstract": "The Wilson line defect half-indices for 3d $\\mathcal{N}=2$ gauge theories with boundary confining phases admit a formulation in terms of the Askey-Wilson type moments. In the dual Landau-Ginzburg description the dual line operators can be realized as vortex line defects which induce singular behavior of chiral multiplets associated with the minimal monopole operators, together with additional one-dimensional degrees of freedom. By incorporating such a singular structure as an effective spin shift into the index computation, we obtain exact closed-form expressions for the line defect half-indices which are Askey-Wilson type moments.", "url": "https://arxiv.org/abs/2604.15018", "type": "理论", "summary": "具有边界限制相的 3d $\\mathcal{N}=2$ 规范理论的威尔逊线缺陷半指数承认采用 Askey-Wilson 型矩的公式。在对偶朗道-金兹堡描述中，双线算子可以被实现为涡线缺陷，其引起与最小单极子算子相关的手性多重态的奇异行为，以及附加的一维自由度。通过将有效自旋位移这样的奇异结构合并到指数计算中，我们获得了线缺陷半指数的精确闭式表达式，即Askey-Wilson型矩。", "authors": [{"name": "Tadashi Okazaki"}, {"name": "Douglas J. Smith"}], "featured_authors": [{"name": "Tadashi Okazaki"}, {"name": "Douglas J. Smith"}], "author_count": 2}, {"id": "2604.15117", "category": "hep-th", "title": "Monodromy Defects for Electric-Magnetic Duality, Hyperbolic Space, and Lines", "abstract": "In this note we explore monodromy defects for non-invertible symmetries in Maxwell theory, exploiting the conformal mapping to $AdS_{3} \\times S^{1}$. With this approach we recover the spectrum of the defect conformal primaries. We also dedicate some time discussing the behaviour of Wilson/'t Hooft lines in the presence of such a monodromy defect, and highlight the following aspects of their behaviour: i) the lines can terminate on the defect, ii) lines of the unit electric (magnetic) charge may seize to be indecomposable, and can be represented as integer powers of some more elementary lines, and iii) they behave as topological objects when brought close to the defect, and this behaviour is governed by a Chern-Simons theory.", "url": "https://arxiv.org/abs/2604.15117", "type": "理论", "summary": "在这篇文章中，我们利用到 $AdS_{3} \\times S^{1}$ 的共形映射，探索麦克斯韦理论中不可逆对称性的单峰缺陷。通过这种方法，我们恢复了缺陷共形原色的光谱。我们还花一些时间讨论威尔逊/特霍夫特线在存在这种单峰缺陷的情况下的行为，并强调其行为的以下方面：i）线可以在缺陷上终止，ii）单位电（磁）电荷的线可能无法分解，并且可以表示为一些更多基本线的整数幂，以及iii）当靠近缺陷时，它们表现为拓扑对象，并且这种行为由陈-西蒙斯控制理论。", "authors": [{"name": "Vladimir Bashmakov"}], "featured_authors": [{"name": "Vladimir Bashmakov"}], "author_count": 1}, {"id": "2604.15187", "category": "hep-th", "title": "Extraordinary Surface Criticalities for Interacting Fermions", "abstract": "Interacting fermions exhibit a rich landscape of surface defects and associated critical phenomena. We investigate novel surface critical behavior in the three-dimensional Gross-Neveu-Yukawa model. For a class of defect renormalization group flows, we obtain exact infrared solutions and show how fermionic anomalies are encoded in the resulting surface dynamics. We further uncover emergent topological and geometric structures in the defect coupling space, and comment on their relation to a defect analogue of the CFT distance conjecture.", "url": "https://arxiv.org/abs/2604.15187", "type": "理论", "summary": "相互作用的费米子表现出丰富的表面缺陷景观和相关的关键现象。我们研究了三维 Gross-Neveu-Yukawa 模型中新颖的表面临界行为。对于一类缺陷重正化群流，我们获得了精确的红外解，并展示了费米子异常如何在所得表面动力学中编码。我们进一步揭示了缺陷耦合空间中出现的拓扑和几何结构，并评论了它们与 CFT 距离猜想的缺陷类比的关系。", "authors": [{"name": "Oleksandr Diatlyk"}, {"name": "Zimo Sun"}, {"name": "Yifan Wang"}], "featured_authors": [{"name": "Oleksandr Diatlyk"}, {"name": "Zimo Sun"}, {"name": "Yifan Wang"}], "author_count": 3}, {"id": "2604.15235", "category": "hep-th", "title": "Sampling the Graviton Pole and Deprojecting the Swampland", "abstract": "We develop a primal bootstrap framework for effective field theories in the presence of a graviton pole, based on finite-resolution sampling rather than smearing, while also allowing direct control over the number of subtractions. We show that this approach reproduces the known projective bounds obtained from smearing in $D{\\ge}6$, while yielding slightly stronger bounds in $D{=}5$. This method also makes it straightforward to impose linearized unitarity directly and provides an access to the extremal spectra. Applying the method to crossing-symmetric dispersion relations, we derive new non-projective bounds that fix the overall scale of the EFT couplings. In $D{=}5$, for example, we find that $\\frac{M}{M_{\\rm P}}{\\lesssim}7.8$, showing that the EFT cutoff cannot be taken parametrically larger than the Planck scale. At the extremal values of the couplings, the spectra exhibit a surprising structure: for projective bounds, they exhibit peaks around quadratic Regge-like trajectories, while for the non-projective bounds they form sharp quadratic bands. In the latter case, the leading coefficients further display an inverse-quadratic dependence on the band number.", "url": "https://arxiv.org/abs/2604.15235", "type": "理论", "summary": "我们为存在引力子极的情况下的有效场论开发了一个原始引导框架，基于有限分辨率采样而不是涂抹，同时还允许直接控制减法次数。我们表明，这种方法再现了通过 $D{\\ge}6$ 中的涂抹获得的已知投影边界，同时在 $D{=}5$ 中产生稍强的边界。该方法还可以直接施加线性化单位性，并提供对极值谱的访问。将该方法应用于交叉对称色散关系，我们得出了新的非投影边界，该边界固定了 EFT 耦合的整体规模。例如，在 $D{=}5$ 中，我们发现 $\\frac{M}{M_{\\rm P}}{\\lesssim}7.8$，这表明 EFT 截止值不能在参数上大于普朗克尺度。在耦合的极值处，光谱表现出令人惊讶的结构：对于射影边界，它们在二次 Regge 状轨迹周围呈现峰值，而对于非射影边界，它们形成尖锐的二次带。在后一种情况下，前导系数进一步显示出对频带数的反二次依赖性。", "authors": [{"name": "Guangzhuo Peng"}, {"name": "Laurentiu Rodina"}, {"name": "Anna Tokareva"}, {"name": "Yongjun Xu"}], "featured_authors": [{"name": "Guangzhuo Peng"}, {"name": "Laurentiu Rodina"}, {"name": "Anna Tokareva"}, {"name": "Yongjun Xu"}], "author_count": 4}, {"id": "2604.15251", "category": "hep-th", "title": "Kontorovich-Lebedev-Fourier Space for de Sitter Correlators", "abstract": "In this work, we build a novel frequency-momentum space for $(d+1)$-dimensional de Sitter (dS) correlators from first principles. This construction follows directly from the decomposition into unitary irreducible representations (UIRs) of the spacetime isometry group $\\mathrm{SO}(1,d+1)$. While the spatial momentum space is given by the standard $d$-dimensional Fourier transform, the frequency space arises from diagonalising the quadratic Casimir operator, leading to the $(d+1)$-dimensional Kontorovich-Lebedev-Fourier (KLF) transform. We show that square-integrable functions decompose only along the principal series, whereas more general functions can receive discrete contributions from other UIRs. Applying this framework to the bulk CFT two-point function reproduces its Källén-Lehmann representation. Using the path integral formulation, we derive the Feynman rules for in-in perturbation theory in KLF space, leading to the introduction of KLF-space correlators, which are simply related to late-time correlation functions through a reduction formula. Furthermore, the KLF-space formulation sheds light on the simple mathematical structure of perturbative computations. In particular, the propagators take the form of simple rational functions, and tree-level diagrams can be written as spectral integrals over known meromorphic functions, as demonstrated in the example of the single-exchange four-point function. At the loop level, we show, through the example of the self-energy correction to the scalar propagator, that the group-theoretical nature of the construction allows the momentum integral to be recast as an orthogonality relation among $\\mathrm{SO}(1,d+1)$ Clebsch-Gordan coefficients.", "url": "https://arxiv.org/abs/2604.15251", "type": "理论", "summary": "在这项工作中，我们根据第一原理为 $(d+1)$ 维德西特 (dS) 相关器构建了一个新颖的频率动量空间。这种构造直接源自时空等距群 $\\mathrm{SO}(1,d+1)$ 的酉不可约表示 (UIR) 的分解。虽然空间动量空间由标准 $d$ 维傅里叶变换给出，但频率空间由对角化二次卡西米尔算子产生，从而产生 $(d+1)$ 维 Kontorovich-Lebedev-Fourier (KLF) 变换。我们证明了平方可积函数仅沿着主级数分解，而更一般的函数可以接收来自其他 UIR 的离散贡献。将此框架应用于批量 CFT 两点函数可重现其 Källén-Lehmann 表示。使用路径积分公式，我们推导了 KLF 空间中的 in-in 扰动理论的费曼规则，从而引入了 KLF 空间相关器，它通过简化公式与后期相关函数简单地相关。此外，KLF 空间公式揭示了微扰计算的简单数学结构。\n\n特别是，传播器采用简单有理函数的形式，并且树级图可以写成已知亚纯函数的谱积分，如单交换四点函数的示例所示。在循环层面，我们通过标量传播器的自能校正示例表明，该结构的群论性质允许将动量积分重新转换为 $\\mathrm{SO}(1,d+1)$ Clebsch-Gordan 系数之间的正交关系。", "authors": [{"name": "Nathan Belrhali"}, {"name": "Arthur Poisson"}, {"name": "Sébastien Renaux-Petel"}, {"name": "Denis Werth"}], "featured_authors": [{"name": "Nathan Belrhali"}, {"name": "Arthur Poisson"}, {"name": "Sébastien Renaux-Petel"}, {"name": "Denis Werth"}], "author_count": 4}, {"id": "2604.14412", "category": "math-ph", "title": "On the inverse scattering transform for the KdV equation with summable initial data", "abstract": "We consider the Cauchy problem for the Korteweg--de Vries equation with real initial data $q$ that is both $L^1$ and $L^2$ summable and supported on (0,\\infty). Using the left reflection coefficient and Hankel operators on the Hardy space $H^2$, we derive a trace-type representation for the corresponding solution. The proof is based on approximation by compactly supported potentials, uniform convergence of the associated reflection coefficients away from the origin, and continuity properties of the resulting Hankel operators. This yields a rigorous inverse scattering construction for a class of summable half-line supported initial data beyond the standard short-range setting.", "url": "https://arxiv.org/abs/2604.14412", "type": "理论", "summary": "我们考虑 Korteweg--de Vries 方程的柯西问题，其实际初始数据 $q$ 是 $L^1$ 和 $L^2$ 可求和的，并且支持 (0,\\infty)。使用 Hardy 空间 $H^2$ 上的左反射系数和 Hankel 算子，我们推导出相应解的迹型表示。该证明基于紧支撑势的近似、相关反射系数远离原点的均匀收敛以及所得 Hankel 算子的连续性特性。这为超出标准短程设置的一类可求和半线支持的初始数据产生了严格的逆散射结构。", "authors": [{"name": "Alexei Rybkin"}], "featured_authors": [{"name": "Alexei Rybkin"}], "author_count": 1}, {"id": "2604.14542", "category": "math-ph", "title": "The $n$-Point Function of $t$-Core Partitions and Topological Vertex", "abstract": "In this paper, we study the $n$-point function of $t$-core partitions. The main tool is the topological vertex, originally developed to study the topological string theory for toric Calabi--Yau 3-folds. By virtue of the topological vertex, we introduce the $q$-deformed $n$-point function that generalizes both the ordinary $n$-point function of all integer partitions studied by Bloch--Okounkov and $t$-core partition case treated here. As a consequence, we provide a closed formula for the $n$-point function of $t$-core partitions in terms of theta functions, and prove that the corresponding correlation functions are quasimodular forms.", "url": "https://arxiv.org/abs/2604.14542", "type": "理论", "summary": "在本文中，我们研究$t$核心分区的$n$点函数。主要工具是拓扑顶点，最初是为了研究环面卡拉比-丘三折的拓扑弦理论而开发的。借助拓扑顶点，我们引入了 $q$ 变形的 $n$ 点函数，该函数概括了 Bloch--Okounkov 研究的所有整数分区的普通 $n$ 点函数和这里处理的 $t$ 核心分区情况。因此，我们用 theta 函数提供了 $t$ 核心分区的 $n$ 点函数的闭合公式，并证明了相应的相关函数是拟模形式。", "authors": [{"name": "Chenglang Yang"}], "featured_authors": [{"name": "Chenglang Yang"}], "author_count": 1}, {"id": "2604.14681", "category": "math-ph", "title": "An inversion formula for the 2-body interaction given the correlation functions", "abstract": "Given a classical gas described by the truncated correlation functions of all orders, we prove convergence of an expansion of the pair interaction part of the (unknown) potential in terms of the truncated correlation functions of all orders, at infinite volume.", "url": "https://arxiv.org/abs/2604.14681", "type": "理论", "summary": "给定由所有阶的截断相关函数描述的经典气体，我们证明了在无限体积下，根据所有阶的截断相关函数，（未知）势的对相互作用部分的扩展的收敛性。", "authors": [{"name": "Fabio Frommer"}, {"name": "Tobias Kuna"}, {"name": "Dimitrios Tsagkarogiannis"}], "featured_authors": [{"name": "Fabio Frommer"}, {"name": "Tobias Kuna"}, {"name": "Dimitrios Tsagkarogiannis"}], "author_count": 3}, {"id": "2604.14835", "category": "math-ph", "title": "Hamiltonian Monodromy in a Tavis-Cummings System with an $A_2$ Singularity", "abstract": "Singular Lagrangian fibrations arising from three-degree-of-freedom integrable Hamiltonian systems remain largely unexplored. While several results describe the global structure of large classes of systems with two degrees of freedom, only a few examples are understood in higher dimensions. We present a three-degree-of-freedom system derived from the two-spin Tavis-Cummings model whose singular Lagrangian fibration exhibits a topology that has not been observed in other physical models. We show that the most degenerate singular fiber is homeomorphic to $\\mathbf{S}^2\\times\\mathbf{S}^1$ with a singularity of $A_2$ type. We further describe the bifurcation diagram and the global topology of the fibration, and we compute its Hamiltonian monodromy.", "url": "https://arxiv.org/abs/2604.14835", "type": "理论", "summary": "由三自由度可积哈密顿系统引起的奇异拉格朗日纤维在很大程度上仍未被探索。虽然一些结果描述了具有两个自由度的大类系统的全局结构，但只有少数例子可以在更高的维度上被理解。我们提出了一个源自二自旋 Tavis-Cummings 模型的三自由度系统，该模型的奇异拉格朗日纤维表现出在其他物理模型中未观察到的拓扑结构。我们证明最简并的奇异纤维与 $\\mathbf{S}^2\\times\\mathbf{S}^1$ 同胚，奇点为 $A_2$ 类型。我们进一步描述了纤维化的分岔图和全局拓扑，并计算了其哈密顿单调性。", "authors": [{"name": "Konstantinos Efstathiou"}, {"name": "Gabriela Jocelyn Gutierrez-Guillen"}, {"name": "Pavao Mardešić"}, {"name": "Dominique Sugny"}], "featured_authors": [{"name": "Konstantinos Efstathiou"}, {"name": "Gabriela Jocelyn Gutierrez-Guillen"}, {"name": "Pavao Mardešić"}, {"name": "Dominique Sugny"}], "author_count": 4}, {"id": "2604.15246", "category": "math-ph", "title": "Blocking of 2D bistable reaction-diffusion fronts by obstacles", "abstract": "We investigate numerically the blocking of two-dimensional bistable reaction diffusion fronts by geometric obstacles. Our goal is to derive quantitative criteria for front propagation in the presence of spatial heterogeneities. Using a conservation law approach, we show that the integral of the reaction term acts as an effective driving force for the front. Combining this insight with the exact one-dimensional traveling wave solution, we construct a reduced analytical model that predicts blocking thresholds. In particular, we obtain explicit conditions for front propagation in a waveguide connected to a conical region of angle theta, valid for widths w less than 4. The model captures the influence of both geometry and nonlinearity, and shows good agreement with numerical simulations. Finally, we extend the analysis to more complex geometries, including checkerboard-like obstacles, and derive simple heuristic rules governing front propagation. ~", "url": "https://arxiv.org/abs/2604.15246", "type": "理论", "summary": "我们对几何障碍物对二维双稳态反应扩散前沿的阻挡进行了数值研究。我们的目标是在存在空间异质性的情况下得出前沿传播的定量标准。使用守恒定律方法，我们表明反应项的积分是前沿的有效驱动力。将这种见解与精确的一维行波解相结合，我们构建了一个预测阻塞阈值的简化分析模型。特别是，我们获得了连接到角度 theta 的圆锥形区域的波导中的前向传播的明确条件，对于宽度 w 小于 4 有效。该模型捕获了几何和非线性的影响，并与数值模拟显示出良好的一致性。最后，我们将分析扩展到更复杂的几何形状，包括棋盘状障碍物，并推导出控制前沿传播的简单启发式规则。 ～", "authors": [{"name": "J.-G. Caputo"}, {"name": "G. Cruz-Pacheco"}, {"name": "J. Gatlik"}, {"name": "B. Sarels"}], "featured_authors": [{"name": "J.-G. Caputo"}, {"name": "G. Cruz-Pacheco"}, {"name": "J. Gatlik"}, {"name": "B. Sarels"}], "author_count": 4}, {"id": "2604.14224", "category": "quant-ph", "title": "Scrambling of Entanglement from Integrability to Chaos: Bootstrapped Time-Integrated Spread Complexity", "abstract": "A time-integrated measure of complexity is proposed for diagnosing the degree of quantum ergodicity. The scrambling dynamics of maximally entangled states within the ensemble of unitary evolutions are quantified by applying numerical bootstrapped realizations of an ensemble of Hamiltonians, probing different unitary paths. Using Rosenzweig-Porter ensembles, we show that the integrated spread complexity provides a fine-grained resolution across different ergodic regimes. This approach offers a robust method for diagnosing quantum chaos from early to late times.", "url": "https://arxiv.org/abs/2604.14224", "type": "理论+数值", "summary": "提出了一种复杂性的时间积分度量来诊断量子遍历性的程度。通过应用哈密顿量系综的数值自举实现，探索不同的酉路径，可以量化酉演化系综中最大纠缠态的扰乱动力学。使用 Rosenzweig-Porter 系综，我们证明了集成的扩展复杂性提供了跨不同遍历机制的细粒度分辨率。这种方法提供了一种稳健的方法来诊断早期到晚期的量子混沌。", "authors": [{"name": "M. Süzen"}], "featured_authors": [{"name": "M. Süzen"}], "author_count": 1}, {"id": "2604.14234", "category": "quant-ph", "title": "Consciousness, Quantum Mechanics, and the Limits of Scientific Objectivism", "abstract": "Consciousness and quantum mechanics are among the most puzzling phenomena studied in the sciences. Some scholars suggest they are related, though others think this claim commits a \"minimization of mystery\" fallacy. The aim of this programmatic paper is to draw attention to a less widely discussed parallel between consciousness and quantum mechanics: both challenge the classical objectivist worldview of science. Under certain assumptions, they are each in tension with a package of metaphysical theses -- \"non-relationalism\", \"non-fragmentation\", and \"one world\" -- that jointly make up that worldview. This points to three distinct non-objectivist responses: the \"relationalist\", \"fragmentalist\", and \"many-subjective-worlds\" ones. We will map out their pros and cons.", "url": "https://arxiv.org/abs/2604.14234", "type": "理论", "summary": "意识和量子力学是科学研究中最令人费解的现象之一。一些学者认为它们是相关的，但另一些学者则认为这种说法犯了“神秘性最小化”的谬误。这篇纲领性论文的目的是引起人们对意识和量子力学之间讨论较少的平行现象的关注：两者都挑战了经典的客观主义科学世界观。在某些假设下，他们每个人都与一揽子形而上学论题——“非关系主义”、“非分裂”和“一个世界”——共同构成了世界观。这指出了三种不同的非客观主义反应：“关系主义”、“碎片主义”和“许多主观世界”。我们将列出它们的优点和缺点。", "authors": [{"name": "John B. DeBrota"}, {"name": "Christian List"}], "featured_authors": [{"name": "John B. DeBrota"}, {"name": "Christian List"}], "author_count": 2}, {"id": "2604.14277", "category": "quant-ph", "title": "Entanglement and circuit complexity in finite-depth random linear optical networks", "abstract": "We study the growth of entanglement and circuit complexity in random passive linear optical networks as a function of the circuit depth. For entanglement dynamics, we start with an initial Gaussian state with all $n$ modes squeezed. For random brickwall circuits, we show that entanglement, as measured by the Rényi-2 entropy, grows at most diffusively as a function of the depth. In the other direction, for arbitrary circuit geometries we prove bounds on depths which ensure the average subsystem entanglement reaches within a constant factor of the maximum value in all subsystems, and bounds which ensure closeness of the random linear optical unitary to a Haar random unitary in $L^2$ Wasserstein distance. We also consider robust circuit complexity for random one-dimensional brickwall circuits, as measured by the minimum number of gates required in any circuit that approximately implements the linear optical unitary. Viewing this as a function of the number of modes and the circuit depth, we show the robust circuit complexity for random one-dimensional brickwall circuits scales at most diffusively in the depth with high probability. The corresponding Gaussian unitary $\\tilde{\\mathcal U}$ for the approximate implementation retains high output fidelity $|\\langle\\psi|\\mathcal U^\\dagger \\tilde{\\mathcal U}|\\psi\\rangle|^2$ for pure states $|\\psi\\rangle$ with constrained expected photon-number.", "url": "https://arxiv.org/abs/2604.14277", "type": "理论", "summary": "我们研究随机无源线性光网络中纠缠和电路复杂性的增长作为电路深度的函数。对于纠缠动力学，我们从初始高斯态开始，所有 $n$ 模式都被压缩。对于随机砖墙电路，我们表明，由 Rényi-2 熵测量的纠缠最多作为深度的函数而扩散增长。另一方面，对于任意电路几何形状，我们证明了深度的界限，确保平均子系统纠缠达到所有子系统中最大值的恒定因子内，以及确保随机线性光学酉与 $L^2$ Wasserstein 距离中的 Haar 随机酉的接近度的界限。我们还考虑了随机一维砖墙电路的鲁棒电路复杂性，这是通过近似实现线性光学酉的任何电路中所需的最小门数来衡量的。将其视为模式数量和电路深度的函数，我们展示了随机一维砖墙电路的鲁棒电路复杂性最多在深度上以高概率扩散。\n\n近似实现的相应高斯酉 $\\tilde{\\mathcal U}$ 保留了高输出保真度 $|\\langle\\psi|\\mathcal U^\\dagger \\tilde{\\mathcal U}|\\psi\\rangle|^2$ 对于纯态 $|\\psi\\rangle$ 以及受限的预期光子数。", "authors": [{"name": "Laura Shou"}, {"name": "Joseph T. Iosue"}, {"name": "Yu-Xin Wang"}, {"name": "Victor Galitski"}, {"name": "Alexey V. Gorshkov"}], "featured_authors": [{"name": "Laura Shou"}, {"name": "Joseph T. Iosue"}, {"name": "Yu-Xin Wang"}, {"name": "Victor Galitski"}, {"name": "Alexey V. Gorshkov"}], "author_count": 5}, {"id": "2604.14291", "category": "quant-ph", "title": "Operator Space Transport and the Emergence of Boundary Time Crystals", "abstract": "Boundary time crystals (BTCs) are prominent examples of continuous time crystals in collective spin systems governed by Lindbladian evolution. To date, their analysis has mostly relied on semiclassical and numerical approaches. Here, we develop a fully quantum-compatible framework to classify collective spin dynamics and show that BTC behavior emerges from the absence of non-trivial weak symmetries of the Liouvillian. To this end, we introduce an irreducible tensor representation of operator space, in which the Lindbladian dynamics maps onto a non-Hermitian hopping problem. Within this picture, the dynamics corresponds to the transport of operator weight across tensor sectors. This mapping allows an identification of distinct dynamical regimes, including collective precession, pure relaxation, and the BTC phase, within a single unified framework. We show that BTCs arise from non-reciprocal transport in operator space, which delocalizes Liouvillian eigenmodes across multiple tensor sectors. This non-reciprocal transport provides a microscopic mechanism for the insensitivity to initial conditions of BTC oscillations. More broadly, our results establish operator space transport as a perspective for understanding dissipative many-body dynamics and highlights connections to non-Hermitian phenomena.", "url": "https://arxiv.org/abs/2604.14291", "type": "理论+数值", "summary": "边界时间晶体（BTC）是林布拉德演化控制的集体自旋系统中连续时间晶体的突出例子。迄今为止，他们的分析主要依赖于半经典和数值方法。在这里，我们开发了一个完全量子兼容的框架来对集体自旋动力学进行分类，并表明 BTC 行为是由于不存在非平凡的刘维尔弱对称性而出现的。为此，我们引入了算子空间的不可约张量表示，其中 Lindbladian 动力学映射到非厄米跳跃问题。在这张图中，动力学对应于算子重量跨张量扇区的传输。这种映射允许在单一统一框架内识别不同的动态机制，包括集体进动、纯弛豫和 BTC 相。我们证明 BTC 是由算子空间中的非互易传输产生的，这使得刘维尔本征模在多个张量扇区中离域。这种非互易传输为 BTC 振荡对初始条件不敏感提供了微观机制。\n\n更广泛地说，我们的结果将算子空间传输确立为理解耗散多体动力学的视角，并强调了与非厄米现象的联系。", "authors": [{"name": "Dominik Nemeth"}, {"name": "Ahsan Nazir"}, {"name": "Robert-Jan Slager"}, {"name": "Alessandro Principi"}], "featured_authors": [{"name": "Dominik Nemeth"}, {"name": "Ahsan Nazir"}, {"name": "Robert-Jan Slager"}, {"name": "Alessandro Principi"}], "author_count": 4}, {"id": "2604.14381", "category": "quant-ph", "title": "Learning Cut Distributions with Quantum Optimization", "abstract": "Many combinatorial optimization problems admit a maximin fairness variant, where the aim is to find a distribution over possible solutions which maximizes an expected worst-case outcome. However, the support for an optimal distribution may be exponential, which can be intractable to represent in the worst case. To this end, we propose a quantum based approach to solving distribution optimization problems. Expanding on work analyzing the Dynamical Lie Algebras of the Quantum Approximate Optimization Algorithm (QAOA), we show that with a finite number of layers, a QAOA ansatz can be constructed to capture any distribution over bitstrings. We show that the resulting circuit is able to effectively solve the Fair Cut Cover, a fair interpretation of the classical Fractional Cut Cover Problem. In addition, we show that our algorithm is provably better than classical approximations on certain graph structures and empirically outperforms these classical algorithms on tested instances.", "url": "https://arxiv.org/abs/2604.14381", "type": "理论+数值", "summary": "许多组合优化问题都承认最大最小公平变体，其目的是找到可能的解决方案的分布，从而最大化预期的最坏情况结果。然而，对最优分布的支持可能是指数的，这在最坏的情况下很难表示。为此，我们提出了一种基于量子的方法来解决分布优化问题。扩展对量子近似优化算法 (QAOA) 的动态李代数的分析工作，我们表明，通过有限数量的层，可以构建 QAOA ansatz 来捕获比特串上的任何分布。我们证明所得到的电路能够有效地解决公平剪切覆盖问题，这是对经典分数剪切覆盖问题的公平解释。此外，我们还表明，我们的算法在某些图结构上可证明比经典近似更好，并且在测试实例上根据经验优于这些经典算法。", "authors": [{"name": "Bao Bach"}, {"name": "Cameron Ibrahim"}, {"name": "Reuben Tate"}, {"name": "Jad Salem"}, {"name": "Stephan Eidenbenz"}, {"name": "Ilya Safro"}], "featured_authors": [{"name": "Bao Bach"}, {"name": "Cameron Ibrahim"}, {"name": "Reuben Tate"}, {"name": "Jad Salem"}, {"name": "Stephan Eidenbenz"}, {"name": "Ilya Safro"}], "author_count": 6}, {"id": "2604.14382", "category": "quant-ph", "title": "Revealing the physical structure of the general quantum master equation", "abstract": "The Lindblad (GKLS) master equation, which represents the mathematical form for the general evolution of a density matrix, is a versatile and widely-used tool in open quantum systems. In contrast with the typical approach of imposing additional conditions on the system, such as weak coupling or energy conservation, we explore the structure of the equation with no assumptions. We demonstrate that general quantum dynamics can be expressed through a combination of free evolution, exchanges of some physical quantities (generalised charges), not necessarily commuting with the Hamiltonian, between the system and the bath, and pure dephasing. This result comprises a novel perspective on quantum master equations, employing physical processes as elemental parts. We use it to explore the dynamics and stationary states of a two-level system and show that strong coupling, particle exchange, and non-Abelian effects all share the same physical origin. Moreover, we demonstrate that the generalised Gibbs state for all three cases contains a non-commutation term, which has not been previously considered.", "url": "https://arxiv.org/abs/2604.14382", "type": "理论", "summary": "Lindblad (GKLS) 主方程代表密度矩阵一般演化的数学形式，是开放量子系统中通用且广泛使用的工具。与对系统施加附加条件（例如弱耦合或能量守恒）的典型方法相反，我们在没有假设的情况下探索方程的结构。我们证明，一般量子动力学可以通过自由演化、某些物理量（广义电荷）的交换（不一定与哈密顿量交换、系统与浴之间）以及纯相移的组合来表达。这一结果包含了对量子主方程的新颖视角，采用物理过程作为基本部分。我们用它来探索两能级系统的动力学和稳态，并表明强耦合、粒子交换和非阿贝尔效应都具有相同的物理起源。此外，我们证明所有三种情况的广义吉布斯状态都包含一个非对易项，这是以前没有考虑过的。", "authors": [{"name": "Eugenia Pyurbeeva"}, {"name": "Ronnie Kosloff"}], "featured_authors": [{"name": "Eugenia Pyurbeeva"}, {"name": "Ronnie Kosloff"}], "author_count": 2}, {"id": "2604.14435", "category": "quant-ph", "title": "Distributed Variational Quantum Linear Solver", "abstract": "The Variational Quantum Linear Solver (VQLS), a hybrid quantum-classical algorithm for solving linear systems, faces a practical scalability bottleneck: the Linear Combination of Unitaries (LCU) decomposition requires O(L^2) circuit evaluations per optimizer iteration, where $L$ can grow as 4^n for n-qubit systems for the worst case scenario. We address this computational bottleneck through two complementary strategies. First, we present a distributed VQLS (D-VQLS) framework, built on NVIDIA CUDA-Q, that enables asynchronous, scalable distribution of the O(L^2) cost-function evaluations. Second, a fast Walsh--Hadamard transform (FWHT)-based Pauli decomposition with 1% coefficient thresholding curbs the exponential growth of LCU terms, reducing L from O}(2^n) to O(1) for n > 6 qubits and compressing the per-iteration circuit complexity from O(n * 4^n) to O(n) for sparse, structured matrices. For a 10-qubit tridiagonal Toeplitz system, this yields a 256x reduction, from 23 million to 90,112 circuits per iteration, while preserving over $99.99\\%$ solution fidelity. Additionally, to inform feasibility on early fault-tolerant QPUs, the paper provides resource estimates -- gate counts, qubit requirements, and circuit evaluations per iteration -- for VQLS applied to arbitrary matrices. The D-VQLS framework is validated on the NERSC Perlmutter supercomputer using multi-node, multi-GPU ideal state-vector simulations, achieving over 99.99% fidelity against classical solutions on tridiagonal Toeplitz and Hele--Shaw flow benchmarks, with near-ideal strong scaling up to 24 GPUs and 95.3% weak scaling efficiency at 96 GPUs processing 360,448 circuits per iteration for a 10-qubit system. Systematic profiling identifies the optimal resource allocation for distributed quantum circuit workloads, yielding a 2.52x speedup for the configurations studied.", "url": "https://arxiv.org/abs/2604.14435", "type": "理论+数值", "summary": "变分量子线性求解器 (VQLS) 是一种用于求解线性系统的混合量子经典算法，它面临着实际的可扩展性瓶颈：酉线性组合 (LCU) 分解需要每次优化器迭代进行 O(L^2) 次电路评估，其中在最坏的情况下，对于 n 量子位系统，$L$ 可以增长为 4^n。我们通过两种互补的策略来解决这个计算瓶颈。首先，我们提出了一个基于 NVIDIA CUDA-Q 构建的分布式 VQLS (D-VQLS) 框架，该框架能够实现 O(L^2) 成本函数评估的异步、可扩展分布。其次，具有 1% 系数阈值的基于快速 Walsh-Hadamard 变换 (FWHT) 的 Pauli 分解抑制了 LCU 项的指数增长，对于 n > 6 量子位，将 L 从 O}(2^n) 减少到 O(1)，并且对于稀疏结构化矩阵，将每次迭代电路复杂度从 O(n * 4^n) 压缩到 O(n)。对于 10 量子位三对角 Toeplitz 系统，这会减少 256 倍，每次迭代从 2300 万个电路减少到 90,112 个电路，同时保持超过 99.99%$ 的解决方案保真度。\n\n此外，为了告知早期容错 QPU 的可行性，本文还提供了应用于任意矩阵的 VQLS 的资源估计（门数、量子位要求和每次迭代的电路评估）。 D-VQLS 框架在 NERSC Perlmutter 超级计算机上使用多节点、多 GPU 理想状态向量模拟进行了验证，在三对角 Toeplitz 和 Hele-Shaw 流基准上相对于经典解决方案实现了超过 99.99% 的保真度，在多达 24 个 GPU 的强扩展下具有近乎理想的强扩展能力，在每次迭代处理 360,448 个电路的 96 个 GPU 上具有 95.3% 的弱扩展效率。 10 量子比特系统。系统分析可确定分布式量子电路工作负载的最佳资源分配，使所研究的配置实现 2.52 倍的加速。", "authors": [{"name": "Chao Lu"}, {"name": "Pooja Rao"}, {"name": "Muralikrishnan Gopalakrishnan Meena"}, {"name": "Kalyana Chakaravarthi Gottiparthi"}], "featured_authors": [{"name": "Chao Lu"}, {"name": "Pooja Rao"}, {"name": "Muralikrishnan Gopalakrishnan Meena"}, {"name": "Kalyana Chakaravarthi Gottiparthi"}], "author_count": 4}, {"id": "2604.14617", "category": "quant-ph", "title": "Optimal Quantum Logarithmic Trace Inequality", "abstract": "We establish a sharp logarithmic trace inequality that strengthens recent bounds of Cheng et al.( arXiv:2507.07961 ) by replacing their prefactor $c_s/s$ with the strictly smaller constant $G_s$. The constant $G_s$ is defined via the scalar inequality $\\log(1+r)\\le G_s r^s$ and admits a closed-form expression in terms of the Lambert $W$ function. Our approach introduces an iterative integration-by-parts procedure that lifts optimal scalar bounds to the operator level without loss. We prove that $G_s$ is the optimal universal constant, in the sense that no smaller constant satisfies the inequality for all positive operators. For density matrices, this optimality persists up to $s\\le \\frac{1}{2\\log(2)}$, while beyond this threshold the commuting case exhibits a strictly smaller optimal constant and the noncommuting case remains open. In the regime $s\\to0$, our result improves the prefactor $c_s/s$ of Cheng et al. by a factor of $1/e$. These sharper inequalities enhance key primitives in quantum information theory, including decoupling, convex-splitting, and covering lemmas, leading to tighter finite-resource bounds.", "url": "https://arxiv.org/abs/2604.14617", "type": "理论", "summary": "我们建立了一个尖锐的对数迹不等式，通过用严格较小的常数 $G_s$ 替换他们的前因子 $c_s/s$ 来加强 Cheng 等人（arXiv:2507.07961）最近的界限。常数 $G_s$ 通过标量不等式 $\\log(1+r)\\le G_s r^s$ 定义，并允许以兰伯特 $W$ 函数表示的封闭形式表达式。我们的方法引入了一种迭代的分部分集成过程，可以将最佳标量边界提升到操作员级别而不会造成损失。我们证明 $G_s$ 是最优通用常数，因为没有更小的常数满足所有正算子的不等式。对于密度矩阵，这种最优性持续到 $s\\le \\frac{1}{2\\log(2)}$，而超过此阈值时，通勤情况会表现出严格较小的最优常数，而非通勤情况则保持开放。在 $s\\to0$ 体系中，我们的结果改进了 Cheng 等人的前因子 $c_s/s$。系数为 $1/e$。这些更尖锐的不等式增强了量子信息理论中的关键原语，包括解耦、凸分裂和覆盖引理，从而导致更严格的有限资源界限。", "authors": [{"name": "Gilad Gour"}], "featured_authors": [{"name": "Gilad Gour"}], "author_count": 1}, {"id": "2604.14721", "category": "quant-ph", "title": "Spectroscopic measurement of the Casimir-Polder force in the intermediate regime", "abstract": "The Casimir-Polder (CP) effect -- the force between a neutral atom and an uncharged conducting plate in empty space -- is an intriguing consequence of quantum vacuum fluctuations. The typically attractive CP potential crosses over from a scaling of $z^{-3}$ at short separations to $z^{-4}$ at long distances, where retardation effects due to the finite speed of light become important. At intermediate distances, where the atom--surface separation is of the order of the wavelength of the dominant atomic transition, experiments have so far relied on indirect methods, such as diffraction or quantum reflection, to observe the CP effect. Here, we directly reveal the CP force between strontium atoms and a dielectric surface via the induced shifts in the atomic energy levels in the intermediate regime. We spectroscopically probe the CP-induced kHz-frequency shift of ultracold atoms confined by a magic-wavelength optical lattice at 189(2)~nm from the surface -- on the scale of the dominant 461-nm transition. Our measurements agree well with QED calculations and differ from the short-range approximation, while excluding the long-distance one. This paves the way for studying the CP effect across various surface properties and geometries, as well as exploring the tensor nature of the atom-surface potential -- all important for the development of hybrid atomic optical-magnetic quantum devices.", "url": "https://arxiv.org/abs/2604.14721", "type": "实验", "summary": "卡西米尔-波尔德（CP）效应——中性原子和真空中不带电的导电板之间的力——是量子真空涨落的一个有趣的结果。通常有吸引力的 CP 势从短距离的 $z^{-3}$ 缩放到长距离的 $z^{-4}$，其中由于有限光速造成的延迟效应变得很重要。在中等距离处，原子与表面的分离程度与主要原子跃迁的波长相当，到目前为止，实验一直依赖间接方法（例如衍射或量子反射）来观察 CP 效应。在这里，我们通过中间态原子能级的诱导变化直接揭示了锶原子和介电表面之间的CP力。我们在距离表面 189(2)nm 处，以占主导地位的 461 nm 跃迁的尺度，对被魔波长光学晶格限制的超冷原子进行光谱探测 CP 引起的 kHz 频移。我们的测量结果与 QED 计算非常吻合，与短程近似值不同，但不包括长程近似值。\n\n这为研究各种表面性质和几何形状的CP效应以及探索原子表面势的张量性质铺平了道路——所有这些对于混合原子光磁量子器件的开发都很重要。", "authors": [{"name": "K. Ton"}, {"name": "G. Kestler"}, {"name": "D. A. Steck"}, {"name": "J. T. Barreiro"}], "featured_authors": [{"name": "K. Ton"}, {"name": "G. Kestler"}, {"name": "D. A. Steck"}, {"name": "J. T. Barreiro"}], "author_count": 4}, {"id": "2604.14801", "category": "quant-ph", "title": "Coherence dynamics in quantum algorithm for linear systems of equations", "abstract": "Quantum coherence is a fundamental issue in quantum mechanics and quantum information processing. We explore the coherence dynamics of the evolved states in HHL quantum algorithm for solving the linear system of equation $A\\overrightarrow{x}=\\overrightarrow{b}$. By using the Tsallis relative $\\alpha$ entropy of coherence and the $l_{1,p}$ norm of coherence, we show that the operator coherence of the phase estimation $P$ relies on the coefficients $\\beta_{i}$ obtained by decomposing $|b\\rangle$ in the eigenbasis of $A$. We prove that the operator coherence of the inverse phase estimation $\\widetilde{P}$ relies on the coefficients $\\beta_{i}$, eigenvalues of $A$ and the success probability $P_{s}$, and it decreases with the increase of the probability when $\\alpha\\in(1,2]$. Moreover, the variations of coherence deplete with the increase of the success probability and rely on the eigenvalues of $A$ as well as the success probability.", "url": "https://arxiv.org/abs/2604.14801", "type": "理论+数值", "summary": "量子相干性是量子力学和量子信息处理中的一个基本问题。我们探索了 HHL 量子算法中演化态的相干动力学，用于求解方程 $A\\overrightarrow{x}=\\overrightarrow{b}$ 的线性系统。通过使用Tsallis相对$\\alpha$相干熵和$l_{1,p}$相干范数，我们表明相位估计$P$的算子相干性依赖于在$A$的特征基中分解$|b\\rangle$获得的系数$\\beta_{i}$。我们证明了反相位估计$\\widetilde{P}$的算子相干性依赖于系数$\\beta_{i}$、$A$的特征值和成功概率$P_{s}$，并且当$\\alpha\\in(1,2]$时算子相干性随着概率的增加而减小。而且，相干性的变化随着成功概率的增加而减少，依赖于$A$的特征值以及成功概率概率。", "authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Shao-Ming Fei"}], "featured_authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Shao-Ming Fei"}], "author_count": 3}, {"id": "2604.14812", "category": "quant-ph", "title": "Time-Dependent Logarithmic Perturbation Theory for Quantum Dynamics: Formulation and Applications", "abstract": "We present a time-dependent extension of logarithmic perturbation theory for nonrelativistic quantum dynamics governed by the Schrödinger equation, in which the logarithm of the wave function is expanded in powers of a coupling constant. The resulting hierarchy of equations defining the perturbative corrections is governed by a gauge-rotated Hamiltonian of the unperturbed system and leads to closed-integral expressions for the time-dependent corrections based on Duhamel's formula. This closed-integral structure of corrections is a hallmark of time-independent logarithmic perturbation theory and is preserved in the present extension. This structure, in particular, provides a computable expression for the instantaneous energy shift. Furthermore, dynamic energy shifts arise naturally within this framework in the form of time-averaged expectation values of pseudopotentials and can be related, for example, to AC Stark shifts and electric polarizabilities. As an illustration, we apply the method to the harmonic oscillator and the hydrogen atom, both driven by a time-dependent laser field. The harmonic oscillator provides a proof of principle for which the exact solution is recovered, while the hydrogen atom illustrates the method applied to atomic systems. Supported by numerical simulations, we demonstrate the applicability to obtain relevant physical observables with high accuracy. The present approach offers a promising alternative for analytical studies of time-dependent multi-photon processes in the perturbative regime.", "url": "https://arxiv.org/abs/2604.14812", "type": "理论+数值", "summary": "我们提出了由薛定谔方程控制的非相对论量子动力学的对数微扰理论的时间相关扩展，其中波函数的对数以耦合常数的幂展开。定义扰动校正的所得方程层次由未扰动系统的规范旋转哈密顿量控制，并导致基于杜哈​​梅尔公式的时间相关校正的闭积分表达式。这种修正的闭积分结构是与时间无关的对数微扰理论的一个标志，并且在当前的扩展中得到了保留。特别是，该结构提供了瞬时能量转移的可计算表达式。此外，动态能量变化在该框架内以赝势的时间平均期望值的形式自然出现，并且可以与例如AC斯塔克位移和电极化率相关。作为说明，我们将该方法应用于谐振子和氢原子，两者均由瞬态激光场驱动。\n\n谐振子提供了恢复精确解的原理证明，而氢原子则说明了应用于原子系统的方法。在数值模拟的支持下，我们证明了获得高精度相关物理观测值的适用性。本方法为微扰状态下依赖时间的多光子过程的分析研究提供了一种有前途的替代方案。", "authors": [{"name": "Juan Carlos del Valle"}, {"name": "Paul Bergold"}, {"name": "Karolina Kropielnicka"}], "featured_authors": [{"name": "Juan Carlos del Valle"}, {"name": "Paul Bergold"}, {"name": "Karolina Kropielnicka"}], "author_count": 3}, {"id": "2604.14855", "category": "quant-ph", "title": "Quantum Thermometry of External Phonon Reservoirs in Driven Open Quantum Systems", "abstract": "We investigate the non-monotonic temperature sensitivity of a coherently driven two-level quantum system coupled to an Ohmic phonon environment. By employing a unitary polaron transformation, we account for phonon-induced renormalization effects that go beyond the standard weak-coupling approximations. Our analysis reveals that the Quantum Fisher Information (QFI) exhibits a prominent peak at an intermediate system-environment coupling strength, identifying an optimal regime for thermal sensing. This behavior emerges from a fundamental competition between environment-induced dissipation enhancement and the exponential suppression of system parameters due to phonon dressing. We demonstrate that while thermometric precision vanishes in both the ultra-weak and strong coupling limits, a properly tuned nonequilibrium steady state can significantly enhance sensitivity. These results suggest that environmental interactions, often viewed as detrimental decoherence sources, can be engineered as a resource to optimize the performance of solid-state quantum thermometers.", "url": "https://arxiv.org/abs/2604.14855", "type": "理论+数值", "summary": "我们研究了耦合到欧姆声子环境的相干驱动的两级量子系统的非单调温度敏感性。通过采用酉极化子变换，我们解释了声子引起的重正化效应，该效应超出了标准弱耦合近似。我们的分析表明，量子费希尔信息 (QFI) 在中间系统-环境耦合强度处表现出一个突出的峰值，从而确定了热传感的最佳状态。这种行为是由环境引起的耗散增强与声子修整引起的系统参数指数抑制之间的根本竞争产生的。我们证明，虽然测温精度在超弱和强耦合极限下消失，但适当调整的非平衡稳态可以显着提高灵敏度。这些结果表明，通常被视为有害的退相干源的环境相互作用可以被设计为优化固态量子温度计性能的资源。", "authors": [{"name": "Yildiz Berk Ates"}], "featured_authors": [{"name": "Yildiz Berk Ates"}], "author_count": 1}, {"id": "2604.14921", "category": "quant-ph", "title": "Split-Evolution Quantum Phase Estimation for Particle-Conserving Hamiltonians", "abstract": "We present a hardware demonstration and resource analysis of split-evolution quantum phase estimation (SE-QPE) on a Quantinuum System Model H2 quantum computer. SE-QPE is a modification to canonical QPE for particle-conserving Hamiltonians in which controlled time evolution is replaced by CSWAP-based interference between a target register and a reference register. For factorizations of time evolution with a shared eigenbasis, SE-QPE preserves the phase-register outcome distribution of canonical QPE and, unlike with compute--uncompute substitutions, it remains compatible with non-exact eigenstates. The substitution removes controlled-simulation overhead and enables parallel evolution on two registers, reducing the depth of each phase-kickback block. Resource analysis for Trotterized double-factorized chemistry Hamiltonians shows that the substitution becomes increasingly favorable at higher phase powers, as such combining QPE and SE-QPE implementations can be a useful option. Over a range of FeMoco active spaces, SE-QPE reduces time evolution resources, with asymptotic reductions of about 33% in CX count, 25% in $T$ count, and an asymptotic depth ratio of $3/N$ for CX layers. On Quantinuum H2-2, a four-qubit model ethylene demonstration with explicit inverse QFT and repeated phase-kickback steps up to 6 phase bits yields distinct energies and shows the auxiliary registers provide useful error detection filters.", "url": "https://arxiv.org/abs/2604.14921", "type": "理论+数值", "summary": "我们在 Quantinuum System Model H2 量子计算机上展示了分裂演化量子相位估计 (SE-QPE) 的硬件演示和资源分析。 SE-QPE 是对粒子守恒哈密顿量的规范 QPE 的修改，其中受控时间演化被目标寄存器和参考寄存器之间基于 CSWAP 的干扰所取代。对于具有共享特征基的时间演化因式分解，SE-QPE 保留了规范 QPE 的相位寄存器结果分布，并且与计算-非计算替换不同，它仍然与非精确本征态兼容。这种替代消除了受控仿真开销，并支持两个寄存器上的并行演进，从而减少了每个相位反冲块的深度。 Trotterized 双因子化学哈密顿量的资源分析表明，在更高的相位功率下，替代变得越来越有利，因为结合 QPE 和 SE-QPE 实现可能是一个有用的选择。在一系列 FeMoco 活动空间中，SE-QPE 减少了时间演化资源，CX 计数渐近减少约 33%，$T$ 计数渐近减少 25%，CX 层渐近深度比为 $3/N$。\n\n在 Quantinuum H2-2 上，四量子位模型乙烯演示具有显式逆 QFT 和最多 6 个相位位的重复相位反冲步骤，产生不同的能量，并显示辅助寄存器提供有用的错误检测滤波器。", "authors": [{"name": "Megan Cerys Rowe"}, {"name": "Carlo A. Gaggioli"}, {"name": "Ludmila Szulakowska"}, {"name": "David Muñoz Ramo"}, {"name": "David Zsolt Manrique"}], "featured_authors": [{"name": "Megan Cerys Rowe"}, {"name": "Carlo A. Gaggioli"}, {"name": "Ludmila Szulakowska"}, {"name": "David Muñoz Ramo"}, {"name": "David Zsolt Manrique"}], "author_count": 5}, {"id": "2604.14931", "category": "quant-ph", "title": "Learning to Concatenate Quantum Codes", "abstract": "Concatenating quantum error correction codes scales error correction capability by driving logical error rates down double-exponentially across levels. However, the noise structure shifts under concatenation, making it hard to choose an optimal code sequence. We automate this choice by estimating the effective noise channel after each level and selecting the next code accordingly. In particular, we use learning-based methods to tailor small, non-additive encoders when the noise exhibits sufficient structure, then switch to standard codes once the noise is nearly uniform. In simulations, this level-wise adaptation achieves a target logical error rate with far fewer qubits than concatenating stabilizer codes alone--reducing qubit counts by up to two orders of magnitude for strongly structured noise. Therefore, this hybrid, learning-based strategy offers a promising tool for early fault-tolerant quantum computing.", "url": "https://arxiv.org/abs/2604.14931", "type": "数值", "summary": "级联量子纠错码通过跨级别将逻辑错误率双指数降低来扩展纠错能力。然而，噪声结构在级联下发生变化，使得很难选择最佳的代码序列。我们通过估计每个级别之后的有效噪声通道并相应地选择下一个代码来自动执行此选择。特别是，当噪声表现出足够的结构时，我们使用基于学习的方法来定制小型非加性编码器，然后在噪声几乎均匀时切换到标准代码。在模拟中，这种逐级适应以比单独串联稳定器代码少得多的量子位实现了目标逻辑错误率——将强结构化噪声的量子位计数减少了两个数量级。因此，这种基于学习的混合策略为早期容错量子计算提供了一种有前途的工具。", "authors": [{"name": "Nico Meyer"}, {"name": "Christopher Mutschler"}, {"name": "Dominik Seuß"}, {"name": "Andreas Maier"}, {"name": "Daniel D. Scherer"}], "featured_authors": [{"name": "Nico Meyer"}, {"name": "Christopher Mutschler"}, {"name": "Dominik Seuß"}, {"name": "Andreas Maier"}, {"name": "Daniel D. Scherer"}], "author_count": 5}, {"id": "2604.14946", "category": "quant-ph", "title": "Floquet dynamical quantum phase transitions in periodically flux-quenched systems", "abstract": "Floquet dynamical quantum phase transitions (FDQPTs) reveal many nonequilibrium critical phenomena in periodically driven quantum systems, and their underlying mechanisms have attracted deep attention in recent years. In this paper, we consider an extended XY spin chain under a periodic flux-quench protocol, and demonstrate the effect of the flux difference within each micromotion period on the emergence of FDQPTs, by analyzing physical quantities such as the Loschmidt echo, rate function, and dynamical topological order parameter (DTOP), etc. We also generalize the concept of quench fidelity to periodically driven systems, i.e., Floquet quench fidelity, and discuss the necessary and sufficient conditions for FDQPTs. In contrast to conventional single-quench scenarios, the occurrence of FDQPTs is determined by the requirement of Floquet fidelity condition and segment duration. Our framework may be applied generally to arbitrary periodically driven parameters, providing fundamental insights into how periodic protocols control nonequilibrium phase transitions in quantum many-body systems.", "url": "https://arxiv.org/abs/2604.14946", "type": "理论", "summary": "Floquet动态量子相变（FDQPT）揭示了周期性驱动量子系统中的许多非平衡临界现象，其潜在机制近年来引起了人们的广泛关注。在本文中，我们考虑周期性通量淬灭协议下的扩展XY自旋链，通过分析洛施密特回波、速率函数和动态拓扑序参数（DTOP）等物理量，论证了每个微动周期内的通量差异对FDQPT出现的影响。我们还将淬灭保真度的概念推广到周期性驱动系统，即Floquet淬灭保真度，并讨论了FDQPT。与传统的单淬火场景相比，FDQPT 的出现是由 Floquet 保真度条件和段持续时间的要求决定的。我们的框架通常可以应用于任意周期性驱动的参数，为周期性协议如何控制量子多体系统中的非平衡相变提供基本见解。", "authors": [{"name": "Wen-Hui Nie"}, {"name": "Mei-Yu Zhang"}, {"name": "Lin-Cheng Wang"}, {"name": "Chong Li"}], "featured_authors": [{"name": "Wen-Hui Nie"}, {"name": "Mei-Yu Zhang"}, {"name": "Lin-Cheng Wang"}, {"name": "Chong Li"}], "author_count": 4}, {"id": "2604.14995", "category": "quant-ph", "title": "Recurrence Time for Finite Quantum Systems", "abstract": "We study the time it takes for all states of a finite quantum system to return simultaneously to their original configuration. In particular, we define the recurrence time for a quantum system to be the time at which all time-evolved states are close to their initial configuration, and at least one state has deviated significantly during this interval. Considering finite-dimensional quantum systems evolving unitarily, we find bounds on this notion of recurrence time, for continuous time and discrete time, by using Dirichlet's approximation theorem. We show how the problem of finding a bound on recurrence time can be related to approximating the difference of real numbers by rationals. We present a mathematical result on the latter, which we then use to obtain tighter bounds on recurrence time.", "url": "https://arxiv.org/abs/2604.14995", "type": "理论", "summary": "我们研究有限量子系统的所有状态同时返回到其原始配置所需的时间。特别地，我们将量子系统的重现时间定义为所有时间演化状态接近其初始配置的时间，并且在此间隔期间至少有一个状态显着偏离。考虑到单位演化的有限维量子系统，我们通过使用狄利克雷近似定理找到了连续时间和离散时间的递归时间概念的界限。我们展示了寻找重复时间界限的问题如何与有理数逼近实数之差相关。我们给出了后者的数学结果，然后用它来获得更严格的重复时间范围。", "authors": [{"name": "Chaitanya Gupta"}, {"name": "Anthony J. Short"}], "featured_authors": [{"name": "Chaitanya Gupta"}, {"name": "Anthony J. Short"}], "author_count": 2}, {"id": "2604.15014", "category": "quant-ph", "title": "Runtime-efficient zero-noise extrapolation from mixed physical and logical data", "abstract": "Partial quantum error correction and quantum error mitigation are expected to coexist in the pre-fault-tolerant regime, yet the resource advantage of combining them remains insufficiently quantified. We study zero-noise extrapolation constructed from mixed datasets that contain a small number of error-corrected data points together with data obtained without error correction. The low-noise logical points anchor the extrapolation, while the higher-noise physical points enlarge the noise baseline at a much smaller runtime cost. Under a simple model in which error correction suppresses the effective gate error rate from p to $\\gamma$p, we derive the variance of the zero-noise estimator and compare the physical runtime required to reach a target precision. For Richardson extrapolation, the mixed-data strategy reduces variance amplification and can lower the required physical runtime by several orders of magnitude when $\\gamma \\leq 0.1$. As a proof of principle, we apply the method to digital quantum simulation of a six-spin transverse-field Ising model and find that mixed physical/logical datasets yield lower-variance zero-noise estimates and outperform extrapolation based only on error-corrected data in the parameter regime studied here. These results identify hybrid error correction and error mitigation as a practical route to resource-efficient quantum computation before full fault tolerance.", "url": "https://arxiv.org/abs/2604.15014", "type": "理论+数值", "summary": "部分量子纠错和量子错误缓解预计将在预容错机制中共存，但将它们结合起来的资源优势仍然没有充分量化。我们研究由混合数据集构建的零噪声外推法，该混合数据集包含少量纠错数据点以及未经纠错获得的数据。低噪声逻辑点锚定外推，而高噪声物理点以更小的运行时间成本扩大噪声基线。在误差校正将有效门误差率从 p 抑制到 $\\gamma$p 的简单模型下，我们导出零噪声估计器的方差，并比较达到目标精度所需的物理运行时间。对于理查森外推法，混合数据策略减少了方差放大，并且当 $\\gamma \\leq 0.1$ 时可以将所需的物理运行时间降低几个数量级。\n\n作为原理证明，我们将该方法应用于六自旋横向场伊辛模型的数字量子模拟，发现混合的物理/逻辑数据集产生较低方差的零噪声估计，并且优于仅基于此处研究的参数范围中的纠错数据的外推法。这些结果表明，混合纠错和错误缓解是在完全容错之前实现资源高效型量子计算的实用途径。", "authors": [{"name": "D. V. Babukhin"}, {"name": "W. V. Pogosov"}], "featured_authors": [{"name": "D. V. Babukhin"}, {"name": "W. V. Pogosov"}], "author_count": 2}, {"id": "2604.15025", "category": "quant-ph", "title": "Hidden Quantum Advantage near the Decoding Threshold of Decoded Quantum Interferometry", "abstract": "Where is the true boundary of the quantum advantage region of decoded quantum interferometry (DQI)? The best existing answer is provided by Theorem 10.1 of Jordan et al., yet we show that this answer systematically underestimates the extent of quantum advantage. On the standard partial-win LDPC benchmark instance, there exist 26 consecutive parameter points (l in [642, 667]) at which Jordan's analysis declares no quantum advantage (<s>/m < 0.5), while quantum advantage is in fact present with an approximation ratio reaching 0.66. The root cause is that Jordan's bound penalizes the entire system with the worst-case Hamming-layer decoding failure rate epsilon = max_k epsilon_k, discarding the spectral structure of the DQI tridiagonal matrix. Exploiting the concentration of the Perron eigenvector, we replace the uniform penalty with the weighted average epsilon_bar = sum_k epsilon_k w_k^2 and establish a unified lower bound (Master Theorem) valid over arbitrary finite fields F_q, proving that it strictly improves upon the original bound from three independent sources.", "url": "https://arxiv.org/abs/2604.15025", "type": "理论", "summary": "解码量子干涉测量（DQI）的量子优势区域的真正边界在哪里？ Jordan 等人的定理 10.1 提供了现有的最佳答案，但我们表明该答案系统地低估了量子优势的程度。在标准部分获胜 LDPC 基准实例上，存在 26 个连续的参数点（[642, 667] 中的 l），Jordan 的分析表明没有量子优势（<s>/m < 0.5），而实际上存在量子优势，近似比达到 0.66。根本原因是乔丹的界限以最坏情况的汉明层解码失败率epsilon = max_k epsilon_k对整个系统进行惩罚，丢弃了DQI三对角矩阵的谱结构。利用 Perron 特征向量的集中性，我们用加权平均 epsilon_bar = sum_k epsilon_k w_k^2 代替统一惩罚，并建立在任意有限域 F_q 上有效的统一下界（主定理），证明它严格改进了来自三个独立来源的原始界限。", "authors": [{"name": "Maoxin Gao"}, {"name": "Yan Chang"}], "featured_authors": [{"name": "Maoxin Gao"}, {"name": "Yan Chang"}], "author_count": 2}, {"id": "2604.15091", "category": "quant-ph", "title": "Quantum instanton approach to metastable collective spins", "abstract": "Collective spin systems -- spin ensembles coupled to a common reservoir and effectively described by a single macrospin -- play an important role in both atomic and solid-state physics. Their intrinsic nonlinearity gives rise to multiple long-lived metastable states that ultimately relax to a unique most probable state. This dominant state can change with a control parameter, leading to first-order phase transitions. We develop a real-time instanton approach based on quantum quasiprobability dynamics that captures the stationary state in the large-spin limit and the asymptotic scaling of relaxation rates. We further show that these features are not accurately described by the previously applied semiclassical Wigner approach due to its neglect of non-Gaussian fluctuations.", "url": "https://arxiv.org/abs/2604.15091", "type": "理论", "summary": "集体自旋系统——耦合到公共储存库并由单个宏自旋有效描述的自旋系综——在原子和固态物理学中发挥着重要作用。它们固有的非线性产生了多个长期存在的亚稳态，最终松弛到一个独特的最可能状态。这种主导状态可以随着控制参数的变化而变化，从而导致一阶相变。我们开发了一种基于量子准概率动力学的实时瞬子方法，该方法捕获大自旋极限中的稳态和弛豫率的渐近缩放。我们进一步表明，由于先前应用的半经典维格纳方法忽略了非高斯波动，因此无法准确描述这些特征。", "authors": [{"name": "Krzysztof Ptaszynski"}, {"name": "Maciej Chudak"}, {"name": "Massimiliano Esposito"}], "featured_authors": [{"name": "Krzysztof Ptaszynski"}, {"name": "Maciej Chudak"}, {"name": "Massimiliano Esposito"}], "author_count": 3}, {"id": "2604.15099", "category": "quant-ph", "title": "O3LS: Optimizing Lattice Surgery via Automatic Layout Searching and Loose Scheduling", "abstract": "Toward the large-scale, practical realization of quantum computing, quantum error correction is essential. Among various quantum error-correcting codes, the surface code stands out as a leading candidate, and lattice surgery based on surface codes has emerged as a promising technique for fault-tolerant quantum computation (FTQC). However, implementing quantum algorithms using lattice surgery introduces both resource and time overhead. Existing approaches typically focus on large layout designs, with compiler passes aimed primarily at optimizing time overhead. This often overlooks the trade-off between rotation bottlenecks and movement distance, which leads to inefficient resource utilization and prevents further reduction of the quantum computation failure rate. To address these challenges, we introduce O3LS, a framework for optimizing lattice surgery through automatic layout search and loose scheduling. O3LS achieves an optimal balance by automatically generating squeezed data layouts to reduce space requirements and employing loose scheduling algorithms combined with circuit synthesis techniques to reduce time overhead, thereby effectively minimizing overall logical error rates. Numerical results indicate that O3LS can reduce space overhead by 28.0% over standard layouts and 46.7% over sparse layouts without increasing the number of time steps, leading to suppression of logical error rates by up to 16% relative to larger data layout designs. O3LS can also achieve time overhead reductions of 36.07% and 24.76% in compact and standard data layout designs, respectively. It suppresses logical error rates by up to an order of magnitude compared to prior compilers that focus primarily on maximizing parallelism.", "url": "https://arxiv.org/abs/2604.15099", "type": "理论+数值", "summary": "为了大规模、实用地实现量子计算，量子纠错至关重要。在各种量子纠错码中，表面码脱颖而出，成为领先的候选者，基于表面码的晶格手术已成为容错量子计算（FTQC）的一种有前景的技术。然而，使用晶格手术实现量子算法会带来资源和时间开销。现有方法通常侧重于大型布局设计，编译器通道主要旨在优化时间开销。这往往忽视了旋转瓶颈和移动距离之间的权衡，导致资源利用效率低下，阻碍了量子计算失败率的进一步降低。为了应对这些挑战，我们引入了 O3LS，这是一个通过自动布局搜索和松散调度来优化晶格手术的框架。 O3LS通过自动生成压缩数据布局来减少空间需求，并采用松散调度算法结合电路综合技术来减少时间开销，从而实现最佳平衡，从而有效地最小化整体逻辑错误率。\n\n数值结果表明，在不增加时间步数的情况下，O3LS 可以比标准布局减少 28.0% 的空间开销，比稀疏布局减少 46.7% 的空间开销，从而相对于较大数据布局设计将逻辑错误率抑制高达 16%。 O3LS 还可以在紧凑型和标准数据布局设计中分别实现 36.07% 和 24.76% 的时间开销减少。与之前主要关注最大化并行性的编译器相比，它可以将逻辑错误率抑制高达一个数量级。", "authors": [{"name": "Chenghong Zhu"}, {"name": "Xian Wu"}, {"name": "Jiahan Chen"}, {"name": "Keming He"}, {"name": "Junjie Wu"}, {"name": "Xin Wang"}, {"name": "Lingling Lao"}], "featured_authors": [{"name": "Chenghong Zhu"}, {"name": "Xian Wu"}, {"name": "Jiahan Chen"}, {"name": "Junjie Wu"}, {"name": "Xin Wang"}, {"name": "Lingling Lao"}], "author_count": 7}, {"id": "2604.15102", "category": "quant-ph", "title": "Low-rank geometry of two-qubit gates", "abstract": "We present a framework based on the determinantal geometry of two-qubit gates. Combining the Weyl chamber representation with operator Schmidt theory, we interpret gate synthesis as a distance problem to determinantal varieties. This gives an operational geometry to the Weyl chamber, quantifying nonlocal complexity. We show that the square root iSWAP gate is the closest perfect entangler to the variety of local operations, and that no perfect entangler can be approximated by a local gate with average gate fidelity above 79.8%. The three different determinantal costs form a synthesis-adapted coordinate system that encodes nonlocal complexity and generally reconstructs the Weyl chamber.", "url": "https://arxiv.org/abs/2604.15102", "type": "理论", "summary": "我们提出了一个基于两个量子位门的行列式几何的框架。将 Weyl 室表示与算子 Schmidt 理论相结合，我们将门综合解释为行列式簇的距离问题。这为韦尔室提供了操作几何结构，量化了非局部复杂性。我们证明，平方根 iSWAP 门是最接近各种局域操作的完美纠缠器，并且没有完美的纠缠器可以通过平均门保真度高于 79.8% 的局域门来近似。三种不同的行列式成本形成了一个综合适应的坐标系，该坐标系编码非局部复杂性并通常重建韦尔室。", "authors": [{"name": "Llorenç Balada Gaggioli"}], "featured_authors": [{"name": "Llorenç Balada Gaggioli"}], "author_count": 1}, {"id": "2604.15110", "category": "quant-ph", "title": "General Static Solutions of the SU(2) Yang-Mills Equations from a Spin Vector Potential", "abstract": "We present a systematic study of static solutions to the source-free SU(2) Yang-Mills equations, in which the gauge potential explicitly depends on spin operators. By employing the \\emph{vector potential extraction approach} (VPEA) -- which requires the total angular momentum operator (orbital plus spin) to satisfy the standard angular momentum algebra -- we derive the most general form of the spin vector potential. This leads to the static ansatz $\\{ \\vec{A} = [k_1(\\hat{r}\\times\\vec{\\Gamma}) + k_2\\vec{\\Gamma} + k_3(\\vec{\\Gamma}\\cdot\\hat{r})\\hat{r}]/r, \\varphi = f_1(r)\\,(\\vec{\\Gamma}\\cdot\\hat{r}) + f_2(r)\\}$, parametrized by three constants $\\{k_1, k_2, k_3\\}$ and two radial functions $\\{f_1(r), f_2(r)\\}$. Substituting this ansatz into the Yang-Mills equations and imposing the angular momentum constraints from the VPEA yields a set of consistency equations. Solving these equations provides a complete classification of static solutions, including both real and complex families. Known simple SU(2) static solutions are recovered as special cases. Our classification reveals new static configurations that could be valuable for non-perturbative studies and for models where spin degrees of freedom couple to non-Abelian gauge fields.", "url": "https://arxiv.org/abs/2604.15110", "type": "理论", "summary": "我们对无源 SU(2) Yang-Mills 方程的静态解进行了系统研究，其中规范势明确取决于自旋算子。通过采用\\emph{矢量势提取方法}（VPEA）——需要总角动量算子（轨道加自旋）来满足标准角动量代数——我们推导出自旋矢量势的最一般形式。这导致静态 ansatz $\\{ \\vec{A} = [k_1(\\hat{r}\\times\\vec{\\Gamma}) + k_2\\vec{\\Gamma} + k_3(\\vec{\\Gamma}\\cdot\\hat{r})\\hat{r}]/r, \\varphi = f_1(r)\\,(\\vec{\\Gamma}\\cdot\\hat{r}) + f_2(r)\\}$，由三个常数$\\{k_1, k_2, k_3\\}$和两个径向函数$\\{f_1(r), f_2(r)\\}$参数化。将此 ansatz 代入 Yang-Mills 方程并施加 VPEA 的角动量约束，产生一组一致性方程。求解这些方程提供了静态解的完整分类，包括实数族和复数族。已知的简单 SU(2) 静态解被恢复为特殊情况。\n\n我们的分类揭示了新的静态配置，对于非微扰研究以及自旋自由度与非阿贝尔规范场耦合的模型可能很有价值。", "authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "featured_authors": [{"name": "Yu-Xuan Zhang"}, {"name": "Jing-Ling Chen"}], "author_count": 2}, {"id": "2604.15111", "category": "quant-ph", "title": "Constraints on phantom codes from automorphism group bounds", "abstract": "Executing a logical quantum circuit fault-tolerantly incurs a large spacetime overhead. Recent work has proposed and investigated phantom codes, defined by the property that every in-block logical $\\mathrm{CNOT}$ circuit can be implemented with a physical permutation, a property that has the potential to greatly reduce the depth of compiled circuits. Here we show that phantomness comes at the cost of low encoding rate. Specifically, we prove that any binary phantom code encoding $k$ logical qubits into $n$ physical qubits with distance $d\\geq 2$ obeys the bound $k\\leq \\log_2(n+1)$ for all $k\\neq 4$. For $k=4$ we explicitly construct a nonstabiliser $(\\!(8, 2^4, 2)\\!)$ phantom code that violates the bound and has a transversal non-Clifford gate. We further show that, within the class of nontrivial CSS phantom codes with $k\\neq 4$, there is a unique family of codes saturating this bound. In addition, we prove that this logarithmic ceiling cannot be circumvented by permitting additional local unitary gates, or by making use of subsystem codes: any subspace or subsystem code admitting a $\\mathrm{SWAP}$-transversal implementation of every logical $\\mathrm{CNOT}$ circuit is constrained to satisfy the same bound. These bounds follow from a general theorem relating the length of a quantum code to the structure of its automorphism group, a result which may find applications beyond phantom codes.", "url": "https://arxiv.org/abs/2604.15111", "type": "理论", "summary": "执行逻辑量子电路的容错性会产生大量的时空开销。最近的工作提出并研究了幻像代码，其定义为每个块内逻辑 $\\mathrm{CNOT}$ 电路都可以通过物理排列来实现，这一属性有可能大大减少编译电路的深度。在这里，我们表明幻象是以低编码率为代价的。具体来说，我们证明任何将 $k$ 个逻辑量子位编码为 $n$ 个物理量子位（距离为 $d\\geq 2$）的二进制幻像代码都遵守所有 $k\\neq 4$ 的边界 $k\\leq \\log_2(n+1)$。对于 $k=4$，我们显式构造一个非稳定器 $(\\!(8, 2^4, 2)\\!)$ 幻像代码，该代码违反界限并具有横向非 Clifford 门。我们进一步表明，在 $k\\neq 4$ 的非平凡 CSS 幻像代码类别中，有一个独特的代码族饱和了这个界限。\n\n此外，我们证明这个对数上限不能通过允许额外的局部酉门或使用子系统代码来规避：任何允许每个逻辑 $\\mathrm{CNOT}$ 电路的 $\\mathrm{SWAP}$ 横向实现的子空间或子系统代码都被限制为满足相同的界限。这些界限遵循将量子代码的长度与其自同构群的结构相关联的一般定理，该结果可能会在幻影代码之外找到应用。", "authors": [{"name": "Arthur S. Morris"}, {"name": "Daniel Malz"}], "featured_authors": [{"name": "Arthur S. Morris"}, {"name": "Daniel Malz"}], "author_count": 2}, {"id": "2604.15162", "category": "quant-ph", "title": "Coherent control of optomechanical entanglement and steering via dual parametric amplification", "abstract": "We propose a coherent-control scheme for engineering quantum correlations in a cavity optomechanical (COM) system consisting of a driven optical cavity with an embedded nonlinear medium and a membrane, assisted by a coherent feedback loop. The nonlinear medium and the membrane are pumped to implement optical and mechanical parametric amplifications with controllable modulation frequencies and pump amplitudes. Through the combined modulation of the two parametric amplifications and the coherent feedback loop, we engineer the effective cavity decay rate and the distribution of quantum fluctuations, thereby strengthening quantum correlations and improving their robustness against thermal noise. Our scheme provides an efficient route to realizing highly tunable, strong, thermally robust quantum correlations in COM systems, which is promising for the protection of fragile quantum resources.", "url": "https://arxiv.org/abs/2604.15162", "type": "理论", "summary": "我们提出了一种相干控制方案，用于在腔光机械（COM）系统中设计量子相关性，该系统由带有嵌入式非线性介质和薄膜的驱动光腔组成，并辅以相干反馈环路。非线性介质和膜被泵浦以实现具有可控调制频率和泵浦幅度的光学和机械参量放大。通过两个参量放大和相干反馈环路的组合调制，我们设计了有效腔衰减率和量子涨落的分布，从而加强了量子相关性并提高了它们对热噪声的鲁棒性。我们的方案提供了一种在 COM 系统中实现高度可调、强、热鲁棒的量子相关性的有效途径，这对于保护脆弱的量子资源很有希望。", "authors": [{"name": "Jinhao Jia"}, {"name": "Yingru Li"}, {"name": "Ran Liang"}, {"name": "Mei Zhang"}], "featured_authors": [{"name": "Jinhao Jia"}, {"name": "Yingru Li"}, {"name": "Ran Liang"}, {"name": "Mei Zhang"}], "author_count": 4}, {"id": "2604.15179", "category": "quant-ph", "title": "Quantum Metropolis-Hastings via Penalised Qubitized Walks: Spectral Filtering and Circuit Implementation", "abstract": "The Metropolis-Hastings algorithm is a cornerstone of Markov Chain Monte Carlo methods, underpinning a wide range of applications in computational physics, Bayesian inference, and machine learning. Quantum variants of Metropolis-Hastings promise accelerated mixing through quantum walks, but their practical realisation remains challenging. In this work, we construct and simulate an explicit circuit level implementation of a quantum Metropolis-Hastings algorithm based on the framework introduced by Claudon \\emph{et al.} ( arXiv:2506.11576 ). We present the full quantum workflow required to prepare a stationary distribution, including a number of modifications required to make the algorithm implementable in a realistic quantum circuit model. Our results demonstrate that these modifications are essential to recover the correct stationary behaviour and highlight both the potential and current limitations of quantum Metropolis-Hastings algorithms, which are expected to become practically relevant in the fault tolerant quantum computing regime.", "url": "https://arxiv.org/abs/2604.15179", "type": "理论+数值", "summary": "Metropolis-Hastings 算法是马尔可夫链蒙特卡罗方法的基石，支撑着计算物理、贝叶斯推理和机器学习中的广泛应用。 Metropolis-Hastings 的量子变体有望通过量子行走加速混合，但其实际实现仍然具有挑战性。在这项工作中，我们基于 Claudon \\emph{et al.} ( arXiv:2506.11576 ) 引入的框架构建并模拟了量子 Metropolis-Hastings 算法的显式电路级实现。我们提出了准备平稳分布所需的完整量子工作流程，包括使算法可在现实量子电路模型中实现所需的大量修改。我们的结果表明，这些修改对于恢复正确的稳态行为至关重要，并强调了量子 Metropolis-Hastings 算法的潜在和当前局限性，预计这些算法将在容错量子计算体系中变得实际相关。", "authors": [{"name": "Miguel Carrasco-Arango"}, {"name": "Rosa M. Badia"}, {"name": "Artur Garcia-Saez"}], "featured_authors": [{"name": "Miguel Carrasco-Arango"}, {"name": "Rosa M. Badia"}, {"name": "Artur Garcia-Saez"}], "author_count": 3}, {"id": "2604.15209", "category": "quant-ph", "title": "Variational quantum state preparation within an entangle-rotate circuit framework for quantum-enhanced metrology in noisy systems", "abstract": "We investigate the generation of quantum states for precision metrology in noisy two-level systems. These states are obtained by optimizing a variational quantum circuit to maximize the quantum Fisher information (QFI) of the output state for a given decoherence rate and interaction Hamiltonian. The circuit architecture, inspired by twist-and-turn schemes, features a sequence of $n$ entangling layers, each consisting of entangling gates followed by a global rotation. We observe notable improvements in the QFI as the circuit layer depth increases, even for appreciable noise rates, demonstrating that our entangle-rotate architecture expands the accessible state space under realistic noise conditions. Our approach thus provides a general and efficient framework for generating quantum-enhanced sensing states. Our analysis extends to systems of power-law interactions spanning from all-to-all to nearest-neighbor interactions. We also analyze the capabilities of our circuit to prepare states for system sizes greater than $8$ qubits.", "url": "https://arxiv.org/abs/2604.15209", "type": "理论+数值", "summary": "我们研究了噪声两能级系统中用于精密计量的量子态的生成。这些状态是通过优化变分量子电路以最大化给定退相干率和相互作用哈密顿量的输出状态的量子费希尔信息（QFI）来获得的。该电路架构的灵感来自扭转方案，具有一系列 $n$ 纠缠层，每个纠缠层由纠缠门组成，随后进行全局旋转。我们观察到，随着电路层深度的增加，QFI 有了显着的改进，即使噪声率相当高，这表明我们的纠缠旋转架构在实际噪声条件下扩展了可访问的状态空间。因此，我们的方法为生成量子增强传感状态提供了一个通用且有效的框架。我们的分析扩展到幂律相互作用系统，涵盖从所有到所有的相互作用到最近邻相互作用。我们还分析了我们的电路为大于 8 美元量子位的系统大小准备状态的能力。", "authors": [{"name": "Juan C. Zuñiga Castro"}, {"name": "Jeffrey Larson"}, {"name": "Matt Menickelly"}, {"name": "Sri Hari Krishna Narayanan"}, {"name": "Yicheng Zhang"}, {"name": "Michael A. Perlin"}, {"name": "Robert J. Lewis-Swan"}], "featured_authors": [{"name": "Juan C. Zuñiga Castro"}, {"name": "Jeffrey Larson"}, {"name": "Matt Menickelly"}, {"name": "Yicheng Zhang"}, {"name": "Michael
