    const papers = [{"id": "2604.14278", "category": "cond-mat", "title": "Controlled Loop Expansion for the Topological Heavy Fermion Model", "abstract": "We develop a controlled theoretical framework for the topological heavy fermion model relevant to magic-angle twisted bilayer graphene, where low density conduction electrons hybridize with a lattice of strongly interacting f-sites. By tracing out the localized electrons, we derive an effective action for the conduction electrons with long-range in time effective interactions, built from correlators of the single f-site problem. We identify a small hybridization-phase-space parameter resulting in a controlled loop expansion, enabling the derivation of nonperturbative results in either the interaction or the hybridization strength. To tree-level, the results are equivalent to the Hubbard I approximation. At higher loop order, we derive two key results applicable to temperatures above the flavor ordering temperature and below the on-site charging energy: 1) the quasi-particle lifetime, 2) the flavor susceptibility of the system. Remarkably, despite being strongly interacting, we find the susceptibility to accurately obey a Curie-Weiss law parametrically close to the Curie temperature.", "url": "https://arxiv.org/abs/2604.14278", "type": "理论", "summary": "我们为与魔角扭曲双层石墨烯相关的拓扑重费米子模型开发了一个受控理论框架，其中低密度传导电子与强相互作用的 f 位晶格杂化。通过追踪局域电子，我们从单 f 点问题的相关器中得出了具有长程时间有效相互作用的传导电子的有效作用。我们确定了一个小的杂交相空间参数，导致受控的环路扩展，从而能够导出相互作用或杂交强度的非扰动结果。对于树级别，结果相当于 Hubbard I 近似。在较高的循环阶数下，我们得出了两个适用于高于风味排序温度和低于现场充电能量的温度的关键结果：1）准粒子寿命，2）系统的风味敏感性。值得注意的是，尽管相互作用强烈，但我们发现准确遵守参数接近居里温度的居里-韦斯定律的敏感性。", "authors": [{"name": "Yaar Vituri"}, {"name": "Erez Berg"}], "featured_authors": [{"name": "Yaar Vituri"}, {"name": "Erez Berg"}], "author_count": 2}, {"id": "2604.14286", "category": "cond-mat", "title": "Divergent spin conductivity on the verge of ferromagnetic quantum criticality", "abstract": "We show that the spin conductivity of a metal approaching a ferromagnetic quantum critical point exhibits divergent fluctuation corrections. This effect arises from critical spin fluctuations and constitutes a spin analog of the Aslamazov-Larkin theory of paraconductivity in superconductors. The spin current is derived in linear response within a Gaussian-level treatment of the effective action for a system with easy-plane magnetic anisotropy. We demonstrate the consistency of our spin transport theory by showing that it (i) fulfills the Ward identity and (ii) yields vanishing spin stiffness in the normal state. The critical enhancement of the spin conductivity is interpreted as incipient spin superfluidity in the quantum critical region. This is further supported by an intuitive picture based on the current-loop representation of the easy-plane ferromagnet.", "url": "https://arxiv.org/abs/2604.14286", "type": "理论", "summary": "我们表明，接近铁磁量子临界点的金属的自旋电导率表现出发散的涨落校正。这种效应源自临界自旋涨落，构成超导体中顺导性阿斯拉马佐夫-拉金理论的自旋模拟。自旋电流是在具有易平面磁各向异性的系统的有效作用的高斯级处理中以线性响应导出的。我们通过证明自旋输运理论的一致性，证明它（i）满足沃德恒等式，（ii）在正常状态下产生自旋刚度消失。自旋电导率的临界增强被解释为量子临界区中的初始自旋超流动性。基于易平面铁磁体的电流环路表示的直观图片进一步支持了这一点。", "authors": [{"name": "Sondre Duna Lundemo"}, {"name": "Asle Sudbø"}], "featured_authors": [{"name": "Sondre Duna Lundemo"}, {"name": "Asle Sudbø"}], "author_count": 2}, {"id": "2604.14289", "category": "cond-mat", "title": "Quantum Charge-4e Superconductivity and Deconfined Pseudocriticality in the Attractive SU(4) Hubbard Model", "abstract": "Unlike conventional charge-2e superconductors, a charge-4e superconductor exhibits long-range coherence of electron quartets rather than Cooper pairs. Clear zero-temperature realizations of charge-4e superconductivity remain rare. Here, we investigate the zero-temperature phase diagram of the attractive SU(4) Hubbard model with numerically exact, large-scale quantum Monte Carlo (QMC) simulations overcoming major technical hurdles. We identify both charge-2e and charge-4e superconducting phases. Upon increasing interaction, charge-2e correlations are suppressed and eventually vanish, while the charge-4e correlations remain robust and converge with system size, signaling the onset of a quartet-condensed phase. Interestingly, across the charge-2e--charge-4e transition, single electrons remain gapped, while charge-2e correlations exhibit a scaling behavior inconsistent with a conventional Landau description. These features are naturally captured by a fractionalized framework in which the physical charge-2e order parameter is a composite field coupled to an emergent non-Abelian gauge structure. We formulate an Sp(4) gauge-Higgs theory that realizes deconfined quantum pseudocriticality between the Higgs (charge-2e) phase and the confined (charge-4e) phase. The Sp(4) gauge-Higgs theory yields pseudocriticality through a fixed-point collision, and its one-loop collision-point exponents quantitatively track the QMC results. Our results establish charge-4e superconductivity as a bona fide zero-temperature phase, provide a simple model for future studies in a numerically exact framework, and reveal an unconventional route to superconducting criticality.", "url": "https://arxiv.org/abs/2604.14289", "type": "理论+数值", "summary": "与传统的 charge-2e 超导体不同，charge-4e 超导体表现出电子四重奏而不是库珀对的长程相干性。 Charge-4e 超导的清晰零温度实现仍然很少见。在这里，我们通过数值精确的大规模量子蒙特卡罗 (QMC) 模拟来研究有吸引力的 SU(4) Hubbard 模型的零温度相图，克服了主要的技术障碍。我们确定了 charge-2e 和 charge-4e 超导相。随着相互作用的增加，电荷 2e 相关性被抑制并最终消失，而电荷 4e 相关性保持稳健并随着系统尺寸的变化而收敛，标志着四重态凝聚相的开始。有趣的是，在电荷 2e-电荷 4e 跃迁过程中，单个电子保持带隙，而电荷 2e 相关性表现出与传统朗道描述不一致的缩放行为。这些特征自然地被分段框架捕获，其中物理电荷 2e 阶参数是与新兴非阿贝尔规范结构耦合的复合场。\n\n我们制定了 Sp(4) 规范希格斯理论，该理论实现了希格斯（电荷 2e）相和受限（电荷 4e）相之间的去约束量子赝临界性。 Sp(4)规范希格斯理论通过定点碰撞产生伪临界性，其单循环碰撞点指数定量跟踪 QMC 结果。我们的结果将电荷 4e 超导确立为真正的零温度相，为未来在数值精确框架中的研究提供了一个简单的模型，并揭示了实现超导临界的非常规途径。", "authors": [{"name": "Zhou-Quan Wan"}, {"name": "Huan Jiang"}, {"name": "Xuan Zou"}, {"name": "Shiwei Zhang"}, {"name": "Shao-Kai Jian"}], "featured_authors": [{"name": "Zhou-Quan Wan"}, {"name": "Huan Jiang"}, {"name": "Xuan Zou"}, {"name": "Shiwei Zhang"}, {"name": "Shao-Kai Jian"}], "author_count": 5}, {"id": "2604.14293", "category": "cond-mat", "title": "Limits of validity for Migdal-Eliashberg theory: role of polarons/bi-polarons", "abstract": "It is widely believed that in an adiabatic limit a Fermi liquid state of an electron-phonon system described by Migdal-Eliashberg theory remains stable before a dressed phonon softens. Using Holstein model as a prototypical example and variational/analytic considerations we demonstrate that in a wide range of fillings both in 3D and 2D, a polaronic/bi-polaronic state emerges before phonon softening; at small filling in 3D this happens already at weak coupling. We show that a polaronic/bi-polaronic state emerges, upon increasing coupling, via an intermediate pseudogap-type mixed state, in which some fermions regain Fermi liquid behavior, yet Luttinger theorem is broken. At even larger couplings the density of states gradually approaches its form in the atomic limit.", "url": "https://arxiv.org/abs/2604.14293", "type": "理论+数值", "summary": "人们普遍认为，在绝热极限下，Migdal-Eliashberg 理论描述的电子-声子系统的费米液态在修饰的声子软化之前保持稳定。使用荷斯坦模型作为原型示例和变分/分析考虑因素，我们证明在 3D 和 2D 的各种填充中，在声子软化之前会出现极化/双极化状态；在 3D 小填充时，这种情况在弱耦合时已经发生。我们表明，在增加耦合时，通过中间赝能隙型混合态出现了极化/双极化态，其中一些费米子恢复了费米液体行为，但卢廷格定理被打破。在更大的耦合下，态密度逐渐接近原子极限的形式。", "authors": [{"name": "Nikolay Prokof'ev"}, {"name": "Ilya Esterlis"}, {"name": "Artem Abanov"}, {"name": "Andrey Chubukov"}], "featured_authors": [{"name": "Nikolay Prokof'ev"}, {"name": "Ilya Esterlis"}, {"name": "Artem Abanov"}, {"name": "Andrey Chubukov"}], "author_count": 4}, {"id": "2604.14294", "category": "cond-mat", "title": "Breakdown of the Migdal-Eliashberg theory for electron-phonon systems. Role of polarons/bi-polarons", "abstract": "The Migdal-Eliashberg theory (MET) describes electrons interacting with phonons in the adiabatic limit when the phonon Debye frequency is much smaller than the Fermi energy. A conventional belief is that MET holds even at strong coupling, when electron self-energy is large, and breaks down only near the point where the dressed phonon spectrum softens to near zero. We analyze numerically and analytically a different option -- collapse to a polaronic/bipolaronic ground state. The last scenario has never been analyzed in precise quantitative terms for a generic electron density. Using variational considerations, we establish rigorous upper bounds on the coupling $\\lambda$, at which a FL state transforms into the bipolaron/polaron state. We show that at small and near-maximum densities, this happens well before a dressed phonon softens. This is true both in 2D and 3D systems; in the latter the upper bound on $\\lambda$ tends to zero in the limit of small or near-full density. We present analytical reasoning for this behavior based on hints extracted from exact diagrammatic treatment of the on-site Holstein model for the spin polarized case and argue that polarons are produced by fermions with energies comparable to the bandwidth; i.e., polaron formation is outside the realm of MET. Closer to half-filling, the leading instability upon increasing $\\lambda$ is towards a charge-density-wave state (CDW), and there exists a strong coupling regime of MET near this instability, while the polaron/bipolaron state develops at larger $\\lambda$ out of a CDW-ordered state and inherits a CDW order over some range of coupling.", "url": "https://arxiv.org/abs/2604.14294", "type": "理论+数值", "summary": "Migdal-Eliashberg 理论 (MET) 描述了当声子德拜频率远小于费米能量时，电子与声子在绝热极限下相互作用。传统观点认为，即使在强耦合下，当电子自能很大时，MET 也成立，并且仅在修饰声子谱软化至接近零的点附近发生分解。我们从数值上和分析上分析了一个不同的选择——塌陷到极化/双极化基态。最后一种情况从未针对通用电子密度进行过精确的定量分析。考虑到变分问题，我们在耦合 $\\lambda$ 上建立了严格的上限，在该上限下 FL 状态转变为双极子/极化子状态。我们证明，在较小的密度和接近最大的密度下，这种情况发生在修饰声子软化之前。在 2D 和 3D 系统中都是如此；在后者中，$\\lambda$ 的上限在小密度或接近满密度的极限下趋于零。\n\n我们基于从自旋极化情况的现场荷斯坦模型的精确图解处理中提取的提示，提出了这种行为的分析推理，并认为极化子是由能量与带宽相当的费米子产生的；也就是说，极化子的形成不属于 MET 的范围。接近半填充时，增加 $\\lambda$ 时的主要不稳定性是朝向电荷密度波态（CDW），并且在这种不稳定性附近存在 MET 的强耦合机制，而极化子/双极化子状态以更大的 $\\lambda$ 发展出 CDW 有序状态，并在一定耦合范围内继承 CDW 秩序。", "authors": [{"name": "Andrey Chubukov"}, {"name": "Ilya Esterlis"}, {"name": "Artem Abanov"}, {"name": "Nikolay Prokof'ev"}], "featured_authors": [{"name": "Andrey Chubukov"}, {"name": "Ilya Esterlis"}, {"name": "Artem Abanov"}, {"name": "Nikolay Prokof'ev"}], "author_count": 4}, {"id": "2604.14295", "category": "cond-mat", "title": "Topologically non-trivial gap function and topology-induced time-reversal symmetry breaking in a superconductor with singular dynamical interaction", "abstract": "In many strongly correlated electron systems, non-Fermi liquid behavior and unconventional superconductivity can be viewed as emerging from an effective 4-fermion interaction with a singular frequency dependence. A pairing instability in such a system is qualitatively different from that in a Fermi liquid and generally gives rise to multiple pairing states with topologically distinct gap functions. However, in the systems studied so far, a topologically trivial solution has the lowest energy. Here we show that a repulsive Hubbard-type interaction with a finite cutoff added to a model with a singular dynamical interaction selects, in some parameter range, the theretofore subleading, topologically nontrivial solution. We consider a minimal model that displays this behavior and show that the transformation between the topologically trivial and nontrivial gap functions necessarily occurs via an intermediate phase with topology-induced breaking of time-reversal symmetry.", "url": "https://arxiv.org/abs/2604.14295", "type": "理论", "summary": "在许多强相关电子系统中，非费米液体行为和非常规超导性可以被视为源自具有奇异频率依赖性的有效 4-费米子相互作用。这种系统中的配对不稳定性与费米液体中的配对不稳定性有本质上的不同，并且通常会产生具有拓扑不同间隙函数的多种配对状态。然而，在迄今为止研究的系统中，拓扑平凡的解决方案具有最低的能量。在这里，我们表明，将具有有限截止值的排斥哈伯德型相互作用添加到具有奇异动态相互作用的模型中，在某些参数范围内选择迄今为止次领先的拓扑非平凡解。我们考虑一个显示这种行为的最小模型，并表明拓扑平凡和非平凡间隙函数之间的转换必然通过拓扑引起的时间反转对称性破缺的中间阶段发生。", "authors": [{"name": "Yue Yu"}, {"name": "Andrey V. Chubukov"}], "featured_authors": [{"name": "Yue Yu"}, {"name": "Andrey V. Chubukov"}], "author_count": 2}, {"id": "2604.14304", "category": "cond-mat", "title": "Self-contact in a buckled elastica", "abstract": "We explore the mechanics of a terminally loaded buckled elastica under frictionless self-contact. With the aid of two integrals associated with the elastica, we propose a scale-invariant condition necessary for the onset of contact. The condition is independent of the boundary conditions, does not involve the position vectors of the material points, and delivers the value of the compressive load at which self-contact initiates. Furthermore, we show that one of the two integrals, namely the \\emph{Hamiltonian}, persists after contact. We compute post-contact configurations of modes three through ten for a pinned-pinned buckled elastica. At a given value of the compressive load, we report multiple post-contact configurations for modes eight and nine. Finally, we show that an infinite force is required to transition from a point contact to a line contact in symmetric post-contact configurations of odd modes.", "url": "https://arxiv.org/abs/2604.14304", "type": "理论", "summary": "我们探索了无摩擦自接触下终端加载的带扣弹性体的力学原理。借助与弹性体相关的两个积分，我们提出了接触开始所需的尺度不变条件。该条件独立于边界条件，不涉及材料点的位置矢量，并提供自接触开始时的压缩载荷值。此外，我们表明两个积分之一，即 \\emph{Hamiltonian}，在接触后仍然存在。我们计算了销钉扣式松紧带的模式三到十的接触后配置。在给定的压缩负载值下，我们报告了模式八和九的多个接触后配置。最后，我们表明，在奇模的对称后接触配置中，需要无限的力才能从点接触过渡到线接触。", "authors": [{"name": "Krishnan Suryanarayanan"}, {"name": "Parth Patel"}, {"name": "Anup Kumar Pathak"}, {"name": "Harmeet Singh"}], "featured_authors": [{"name": "Krishnan Suryanarayanan"}, {"name": "Parth Patel"}, {"name": "Anup Kumar Pathak"}, {"name": "Harmeet Singh"}], "author_count": 4}, {"id": "2604.14307", "category": "cond-mat", "title": "Simulating hydrodynamic interactions in colloidal suspensions using multiparticle collision dynamics with rigid-body constraints", "abstract": "We develop a method for simulating colloidal suspensions using multiparticle collision dynamics (MPCD) with a discrete particle model represented as a rigid body. The key steps for incorporating the rigid-body constraints are to thermalize the velocities of the discrete sites before they participate in the MPCD collision step, then transfer momentum from the sites to the rigid body. We demonstrate that the rigid-body model produces the expected statistics for a single spherical particle and the same transport properties for a hard-sphere colloidal suspension as an equivalent model using harmonic bonds to maintain the site geometry. Importantly, the rigid-body model has less computational overhead and permits a larger simulation timestep than the harmonic-bond model, leading to a nearly order of magnitude speedup in benchmark simulations of hard-sphere colloidal suspensions. Our method is compatible with arbitrary discretization, so it enables more efficient MPCD simulations of suspensions of colloidal particles with complex shapes.", "url": "https://arxiv.org/abs/2604.14307", "type": "理论+数值", "summary": "我们开发了一种使用多粒子碰撞动力学 (MPCD) 和表示为刚体的离散粒子模型来模拟胶体悬浮液的方法。合并刚体约束的关键步骤是在参与 MPCD 碰撞步骤之前对离散位点的速度进行热化，然后将动量从位点转移到刚体。我们证明，刚体模型可以为单个球形颗粒产生预期的统计数据，并且可以为硬球胶体悬浮液提供与使用谐波键维持位点几何形状的等效模型相同的传输特性。重要的是，与谐波键模型相比，刚体模型的计算开销更少，并且允许更大的模拟时间步长，从而使硬球胶体悬浮液的基准模拟加速了近一个数量级。我们的方法与任意离散化兼容，因此它能够对具有复杂形状的胶体颗粒悬浮液进行更有效的 MPCD 模拟。", "authors": [{"name": "Michaela Bush"}, {"name": "Jeremy C. Palmer"}, {"name": "Michael P. Howard"}], "featured_authors": [{"name": "Michaela Bush"}, {"name": "Jeremy C. Palmer"}, {"name": "Michael P. Howard"}], "author_count": 3}, {"id": "2604.14367", "category": "cond-mat", "title": "A Generalized Coherent State Framework for Many-Body Density of States", "abstract": "We develop a general framework to calculate the many-body density of states (DOS) of isolated and interacting quantum systems. Based on the generalized coherent state formalism and the Simon-Lieb bounds for a quantum partition function, our method provides a general method of calculation for the DOS in high-dimensional irreducible sectors. This framework further provides rigorous bounds for the ground state energy in each sector and enables the calculation of microcanonical observables across the entire spectrum. Using the Lipkin-Meshkov-Glick (LMG) model as a test bed, we validate our framework by successfully identifying quantum phase transitions (QPTs) and excited-state quantum phase transitions (ESQPTs) across spin sectors. Unlike existing model-specific numerical or analytical techniques, our formalism relies on general underlying symmetries, making it broadly applicable. Applying our method to the ferromagnetic transverse field Ising chain with power law interactions, we demonstrate that its highest-spin-sector DOS is qualitatively identical to that of LMG-type Hamiltonians. Our work establishes a versatile and computationally efficient bridge between algebraic structure and many-body thermodynamics.", "url": "https://arxiv.org/abs/2604.14367", "type": "理论+数值", "summary": "我们开发了一个通用框架来计算孤立和相互作用的量子系统的多体态密度（DOS）。基于广义相干态形式主义和量子配分函数的 Simon-Lieb 界，我们的方法提供了高维不可约扇区中 DOS 的通用计算方法。该框架进一步为每个扇区的基态能量提供了严格的界限，并能够计算整个光谱中的微正则可观测值。使用 Lipkin-Meshkov-Glick (LMG) 模型作为测试台，我们通过成功识别自旋扇区的量子相变 (QPT) 和激发态量子相变 (ESQPT) 来验证我们的框架。与现有的特定于模型的数值或分析技术不同，我们的形式主义依赖于一般的基础对称性，使其具有广泛的适用性。将我们的方法应用于具有幂律相互作用的铁磁横向场 Ising 链，我们证明其最高自旋扇区 DOS 在质量上与 LMG 型哈密顿量相同。\n\n我们的工作在代数结构和多体热力学之间建立了一座通用且计算高效的桥梁。", "authors": [{"name": "Deniz Coskun"}, {"name": "R. Chitra"}], "featured_authors": [{"name": "Deniz Coskun"}, {"name": "R. Chitra"}], "author_count": 2}, {"id": "2604.14377", "category": "cond-mat", "title": "Configuration-dependent electronic and optical properties of 2D Mo$_{1-x}$W$_x$S$_2$ alloys across the full composition range", "abstract": "Here we analyze multiple symmetry-inequivalent atomic configurations across the entire composition range of the isovalent and isostructural Mo$_x$W$_{1-x}$S$_2$ alloy using density-functional theory and Monte Carlo simulations. Our results show that although structural stability and energetics are largely composition-driven, the electronic and optical properties exhibit configuration dependence, with local atomic arrangements critically shaping band-edge splitting, valley structure, effective-mass anisotropy, and optical selection rules. In contrast to the pristine monolayers, even in the absence of spin-orbit coupling (SOC), splitting of the band edges at the $K$ point is observed across the entire composition range. In particular, while the valence-band maximum (VBM) remains largely robust, the conduction-band minimum (CBM) shows strong configuration-dependent splitting from few meV up to hundredths of meV. This behaviour leads to a non-trivial dependence of the valley energetics. Configurations with well-separated conduction bands support additional optically active transitions beyond the conventional A and B excitons in MoS$_2$ and WS$_2$ monolayers, whereas nearly degenerate cases exhibit a reduced number of allowed transitions, observed for specific configurations at $x = 1/3$ and $x = 2/3$. These results demonstrate that the number and character of optically active transitions are governed not only by composition, but also by the microscopic arrangement of atoms. Moreover, we found the hole effective masses at the VBM show configuration-dependent anisotropy, reflecting sensitivity to local symmetry breaking and implying direction-dependent transport.", "url": "https://arxiv.org/abs/2604.14377", "type": "理论+数值", "summary": "在这里，我们使用密度泛函理论和蒙特卡洛模拟分析了等价和同构 Mo$_x$W$_{1-x}$S$_2$ 合金整个成分范围内的多种对称不等价原子构型。我们的结果表明，虽然结构稳定性和能量很大程度上是成分驱动的，但电子和光学性质表现出构型依赖性，局部原子排列关键地塑造带边分裂、谷结构、有效质量各向异性和光学选择规则。与原始单层相比，即使在没有自旋轨道耦合（SOC）的情况下，在整个成分范围内都可以观察到 $K$ 点处的能带边缘分裂。特别是，虽然价带最大值（VBM）在很大程度上保持稳健，但导带最小值（CBM）显示出强烈的配置相关分裂，从几兆电子伏到数百兆电子伏。这种行为导致了对谷能量学的重要依赖。\n\n具有良好分离的导带的配置支持除了 MoS$_2$ 和 WS$_2$ 单层中的传统 A 和 B 激子之外的额外光学活性跃迁，而近简并的情况表现出允许的跃迁数量减少，在 $x = 1/3$ 和 $x = 2/3$ 的特定配置中观察到。这些结果表明，光学活性跃迁的数量和特征不仅取决于组成，还取决于原子的微观排列。此外，我们发现 VBM 处的空穴有效质量表现出与构型相关的各向异性，反映了对局部对称性破缺的敏感性，并暗示了与方向相关的传输。", "authors": [{"name": "M. Szyszko"}, {"name": "M. Birowska"}], "featured_authors": [{"name": "M. Szyszko"}, {"name": "M. Birowska"}], "author_count": 2}, {"id": "2604.14390", "category": "cond-mat", "title": "Long-range spin-polarized Josephson effect in ballistic S/F/S junctions with precessing magnetization", "abstract": "We present a theory of ballistic N/F/S and S/F/S junctions with a uniformly precessing magnetization, which generates long-range equal-spin superconducting correlations [Takahashi et al., Phys. Rev. Lett. 99, 057003 (2007), Houzet, Phys. Rev. Lett. 101, 057009 (2008)]. The non-equilibrium distribution of Andreev bound states leads to a strongly non-sinusoidal current-phase relationship for large precession angles. We derive detailed results for ballistic junctions involving partially and fully polarized ferromagnets. In the fully polarized half-metal limit, the magnetization precession switches the junction from an \"off\" state with vanishing subgap current to an \"on\" state with finite Andreev conductance and finite Josephson current.", "url": "https://arxiv.org/abs/2604.14390", "type": "理论", "summary": "我们提出了一种具有均匀进动磁化的弹道 N/F/S 和 S/F/S 结的理论，该结产生长程等自旋超导相关性 [Takahashi et al., Phys.莱特牧师。 99, 057003 (2007)，Houzet，物理学。莱特牧师。 101, 057009 (2008)]。安德烈夫束缚态的非平衡分布导致大进动角时出现强烈的非正弦电流相位关系。我们得出涉及部分和完全极化铁磁体的弹道结的详细结果。在完全极化的半金属极限中，磁化进动将结从亚能隙电流消失的“关”状态切换到具有有限安德烈夫电导和有限约瑟夫森电流的“开”状​​态。", "authors": [{"name": "E. S. Andriyakhina"}, {"name": "M. Mansouri"}, {"name": "M. Breitkreiz"}, {"name": "P. W. Brouwer"}], "featured_authors": [{"name": "E. S. Andriyakhina"}, {"name": "M. Mansouri"}, {"name": "M. Breitkreiz"}, {"name": "P. W. Brouwer"}], "author_count": 4}, {"id": "2604.14470", "category": "cond-mat", "title": "Environment-dependent tight-binding models from ab initio pseudo-atomic orbital Hamiltonians", "abstract": "\\textit{Ab initio} pseudo-atomic orbital (PAO) Hamiltonians express the electronic structure of a solid in a compact, localized basis that spans the same Hilbert space as a conventional Slater--Koster tight-binding model, thereby providing an exact \\textit{ab initio} representation without any loss of accuracy. Building on this correspondence, we develop an environment-dependent tight-binding (EDTB) framework in which Slater--Koster hopping integrals are augmented with bond-screening functions that capture the local coordination environment. All parameters are determined by fitting to the PAO eigenvalue spectrum across multiple atomic configurations simultaneously, which breaks the degeneracy between screening and hopping parameters and yields physically meaningful, transferable models capable of generating Hamiltonians for large systems with \\textit{ab initio} precision. We demonstrate the efficiency and accuracy of the approach on four prototypical systems: bulk platinum, silicon surfaces, Si/Ge~[001] superlattices, and twisted bilayer graphene with up to $4{,}324$ atoms. The method is implemented in the \\paoflow{} code and integrates seamlessly with its full post-processing suite, enabling the evaluation of a broad range of electronic, optical, and transport properties.", "url": "https://arxiv.org/abs/2604.14470", "type": "理论+数值", "summary": "\\textit{Ab initio} 伪原子轨道 (PAO) 哈密顿量以紧凑的局部基础表达固体的电子结构，该基础跨越与传统 Slater--Koster 紧束缚模型相同的希尔伯特空间，从而提供精确的 \\textit{ab initio} 表示，而不会损失任何精度。在此对应的基础上，我们开发了一个环境相关的紧束缚（EDTB）框架，其中 Slater-Koster 跳跃积分通过捕获局部协调环境的键筛选函数进行了增强。所有参数都是通过同时拟合多个原子构型的 PAO 特征值谱来确定的，这打破了筛选和跳跃参数之间的简并性，并产生了物理上有意义的、可转移的模型，能够以 \\textit{ab initio} 精度为大型系统生成哈密顿量。我们在四种原型系统上证明了该方法的效率和准确性：块状铂、硅表面、Si/Ge~[001]超晶格以及具有高达 $4{,}324$ 原子的扭曲双层石墨烯。\n\n该方法在 \\paoflow{} 代码中实现，并与其完整的后处理套件无缝集成，从而能够评估广泛的电子、光学和传输属性。", "authors": [{"name": "Marco Buongiorno Nardelli"}], "featured_authors": [{"name": "Marco Buongiorno Nardelli"}], "author_count": 1}, {"id": "2604.14521", "category": "cond-mat", "title": "Josephson phase shift and diode effect due to the inverse spin Hall effect", "abstract": "We theoretically study the direct and inverse spin Hall effects in a superconductor-normal metal-superconductor junction induced by a spin-orbit interaction that is invariant under spatial inversion. We show that a supercurrent induces a spin Hall effect, leading to a static spin accumulation with opposite polarizations at the two edges, analogous to that in normal conductors. For the inverse effect, we consider a spatially inhomogeneous static magnetic field and show that it induces an anomalous phase shift, which, in the presence of higher harmonics, results in a diode effect. Unlike Rashba systems, the present mechanism does not require broken structural inversion symmetry.", "url": "https://arxiv.org/abs/2604.14521", "type": "理论", "summary": "我们从理论上研究了超导体-普通金属-超导体结中由空间反转下不变的自旋轨道相互作用引起的正向和反向自旋霍尔效应。我们证明，超电流会引起自旋霍尔效应，导致两个边缘处具有相反极化的静态自旋积累，类似于普通导体中的情况。对于逆效应，我们考虑空间不均匀的静磁场，并表明它会引起异常相移，在存在高次谐波的情况下，会导致二极管效应。与 Rashba 系统不同，本机制不需要破坏结构反演对称性。", "authors": [{"name": "Gen Tatara"}, {"name": "Yositake Takane"}, {"name": "Aurelien Manchon"}], "featured_authors": [{"name": "Gen Tatara"}, {"name": "Yositake Takane"}, {"name": "Aurelien Manchon"}], "author_count": 3}, {"id": "2604.14529", "category": "cond-mat", "title": "Solitonic Solutions of the One-Dimensional Harmonically Trapped Repulsive Bose-Einstein Condensate via Neural Network Quantum States", "abstract": "We demonstrate the existence of bright solitons in a repulsively interacting, harmonically trapped quasi-one-dimensional Bose-Einstein condensate described by the Gross-Pitaevskii equation. Using a neural-network quantum state (NNQS) approach, we parametrize the initial wavefunction and optimize it to find solutions that recur after one trap period, effectively balancing repulsion with trap-induced attraction. Aside from the bright solitonic solution, we also report double bright and dark soliton states. Perturbing the initial state with multiplicative phase and amplitude noise confirms that these periodic orbits are orbitally stable. Our results indicate that NNQS provides a powerful framework for uncovering coherent structures in nonlinear wave systems.", "url": "https://arxiv.org/abs/2604.14529", "type": "理论+数值", "summary": "我们证明了在由 Gross-Pitaevskii 方程描述的排斥相互作用、谐波捕获的准一维玻色-爱因斯坦凝聚体中存在亮孤子。使用神经网络量子态（NNQS）方法，我们对初始波函数进行参数化并对其进行优化，以找到在一个陷阱周期后重复出现的解决方案，从而有效地平衡排斥力与陷阱引起的吸引力。除了亮孤子解之外，我们还报告了双亮孤子态和暗孤子态。用乘性相位和振幅噪声扰动初始状态证实了这些周期性轨道是轨道稳定的。我们的结果表明，NNQS 为揭示非线性波系统中的相干结构提供了一个强大的框架。", "authors": [{"name": "Gaoqing Meng"}, {"name": "Mingshu Zhao"}], "featured_authors": [{"name": "Gaoqing Meng"}, {"name": "Mingshu Zhao"}], "author_count": 2}, {"id": "2604.14533", "category": "cond-mat", "title": "The Two Orbital, Interacting Hatano-Nelson Model", "abstract": "The single orbital, one-dimensional, Hatano-Nelson Hamiltonian provides deep insight into the physics of non-Hermiticity, resulting from asymmetric left/right hopping, and its connections to localization. In the absence of disorder, its single particle eigenvalues $E_{\\alpha}$ lie on an ellipse in the complex plane whose extent in the imaginary direction is controlled by the degree of asymmetry. When randomness is introduced, two sets of real eigenvalues emerge at the extremes of the largest and smallest real part of $E_{\\alpha}$. These real eigenvalues are associated with localized eigenvectors. For spinless fermions, increasing near-neighbor interactions first cause a transition to a charge density wave phase, and ultimately, on finite lattices, a collapse of all eigenvalues to the real axis. In this paper, we explore the presence of real eigenvalues in the interacting, two-particle sector for the spinful case (Hubbard model) in a two-chain (two-band) geometry with a Hermitian interchain hopping. Our key results are to obtain the ``phase\" diagrams for the existence of a purely real spectrum, as a function of the interaction strength, degree of non-Hermiticity, and interchain hopping. We study the sensitivity to boundary conditions of the spectral properties of our two-chain model with winding number analysis and explore the relationship between PBC doublon states and OBC skin modes. To address the question of stability in such non-equilibrium systems, we solve the dynamics at low filling according to Lindbladian evolution and find that the non-Hermitian description is able to qualitatively describe such systems.", "url": "https://arxiv.org/abs/2604.14533", "type": "理论", "summary": "单轨道、一维波多野-尼尔森哈密顿量提供了对由不对称左/右跳跃产生的非厄米性物理及其与局域化的联系的深入了解。在没有无序的情况下，其单粒子特征值 $E_{\\alpha}$ 位于复平面中的椭圆上，其在虚方向上的范围由不对称程度控制。当引入随机性时，在 $E_{\\alpha}$ 的最大和最小实部的极值处出现两组实特征值。这些实特征值与局部特征向量相关。对于无自旋费米子，增加近邻相互作用首先导致向电荷密度波相的转变，并最终在有限晶格上导致所有特征值向实轴塌缩。在本文中，我们探讨了具有埃尔米特链间跳跃的双链（双带）几何结构中自旋情况（哈伯德模型）​​相互作用的双粒子扇区中真实特征值的存在。\n\n我们的主要结果是获得纯实谱存在性的“相”图，作为相互作用强度、非厄米性程度和链间跳跃的函数。我们通过绕数分析研究了双链模型光谱特性对边界条件的敏感性，并探索了 PBC 双布朗态和 OBC 趋肤模式之间的关系。为了解决此类非平衡系统的稳定性问题，我们根据 Lindbladian 演化求解低填充动力学，并发现非厄米描述能够定性地描述这样的系统。", "authors": [{"name": "Jonah Huang"}, {"name": "Rubem Mondaini"}, {"name": "Nancy Aggarwal"}, {"name": "Richard Scalettar"}], "featured_authors": [{"name": "Jonah Huang"}, {"name": "Rubem Mondaini"}, {"name": "Nancy Aggarwal"}, {"name": "Richard Scalettar"}], "author_count": 4}, {"id": "2604.14554", "category": "cond-mat", "title": "First-principles study of infrared, Raman, piezoelectric and elastic properties of Mg-IV-N\\textsubscript{2} (IV = Ge, Si, Sn)", "abstract": "Mg-IV-N\\textsubscript{2} compounds with IV=Si, Ge, Sn are ultra-wide band gap semiconductors with various potential electronic and optoelectronic applications. They share the \\textit{Pna}2\\textsubscript{1} space group crystal structure. Here we present Density Function Perturbation Theory (DFPT) calculations of the vibrational modes of these materials. We focus on the vibrational modes at the zone center to establish the relation between vibrational modes and their corresponding point-group symmetries, which determine the Raman and infrared spectra but also report the full Brillouin zone phonon dispersions and density of states. We also determine the piezoelectric tensor and the elastic compliance tensor.", "url": "https://arxiv.org/abs/2604.14554", "type": "理论+数值", "summary": "IV=Si、Ge、Sn 的 Mg-IV-N\\textsubscript{2} 化合物是具有各种潜在电子和光电应用的超宽带隙半导体。它们共享 \\textit{Pna}2\\textsubscript{1} 空间群晶体结构。在这里，我们提出这些材料的振动模式的密度函数微扰理论（DFPT）计算。我们关注区域中心的振动模式，以建立振动模式与其相应的点群对称性之间的关系，这确定了拉曼和红外光谱，但也报告了完整的布里渊区声子色散和态密度。我们还确定了压电张量和弹性柔量张量。", "authors": [{"name": "Sarker Md. Sadman"}, {"name": "Walter R. L. Lambrecht"}], "featured_authors": [{"name": "Sarker Md. Sadman"}, {"name": "Walter R. L. Lambrecht"}], "author_count": 2}, {"id": "2604.14559", "category": "cond-mat", "title": "Persistent Free Volume Governs (Anti-)plasticization in Chitosan-Water Mixtures", "abstract": "Chitosan is a highly versatile and sustainable polymer with a broad range of potential biological and materials engineering applications. Despite its versatility, the native brittleness of chitosan limits its broader utilization. This limitation can be addressed by blending chitosan with small-molecule additives to modulate its thermomechanical properties. We employ molecular dynamics (MD) simulations to investigate the mechanism underlying antiplasticization followed by plasticization at increasing water content. Decomposition of the elastic moduli reveals a competition between weakened polymer-polymer interactions and enhanced polymer-water interactions, with their relative strengths governing the resulting properties. We introduce a simple model incorporating dynamically accessible free volume regions as a key driver of polymer mobility, effectively capturing the (anti-)plasticization of elastic properties. We show that accessibility of free volume regions is enabled by connectivity of additive-accessible volume regions. This study provides new insights into the molecular interactions that dictate the properties of chitosan-water mixtures and may inform the rational design of chitosan-based materials and other hydrated biopolymers.", "url": "https://arxiv.org/abs/2604.14559", "type": "理论+数值", "summary": "壳聚糖是一种高度通用且可持续的聚合物，具有广泛的潜在生物和材料工程应用。尽管其用途广泛，但壳聚糖本身的脆性限制了其更广泛的用途。这一限制可以通过将壳聚糖与小分子添加剂混合来调节其热机械性能来解决。我们采用分子动力学 (MD) 模拟来研究水含量增加时抗塑化和塑化的潜在机制。弹性模量的分解揭示了减弱的聚合物-聚合物相互作用和增强的聚合物-水相互作用之间的竞争，它们的相对强度决定了最终的性能。我们引入了一个简单的模型，将动态可访问的自由体积区域作为聚合物流动性的关键驱动因素，有效地捕获弹性特性的（反）塑化。我们表明，自由体积区域的可访问性是通过附加可访问体积区域的连接性实现的。\n\n这项研究为决定壳聚糖-水混合物特性的分子相互作用提供了新的见解，并可能为基于壳聚糖的材料和其他水合生物聚合物的合理设计提供信息。", "authors": [{"name": "Baris E. Ugur"}, {"name": "Michael A. Webb"}], "featured_authors": [{"name": "Baris E. Ugur"}, {"name": "Michael A. Webb"}], "author_count": 2}, {"id": "2604.14695", "category": "cond-mat", "title": "Level statistics of the disordered Haldane-Shastry model with $1/r^α$ interaction", "abstract": "Understanding how the interaction range and various types of disorder affect the level statistics of many-body quantum systems and lead to the emergence of many-body localization (MBL) is a challenging open frontier. We study the level statistics of a variant of the spin-$1/2$ Haldane-Shastry model with $1/r^{\\alpha}$ interactions, where $\\alpha{\\geq}0$ parametrizes the range of the interactions, in the presence of position disorder and/or random magnetic fields. We find that neither position disorder nor random magnetic fields alone yields pristine Poisson statistics in this long-range interacting system; however, Poisson statistics emerge in their combined presence, suggesting the emergence of MBL when both types of disorder coexist. Interestingly, once random magnetic fields break the $SU(2)$ symmetry, the strength of the position disorder, $\\delta$, appears to play an important role, as evidenced by an approximate scaling collapse of the disorder-averaged gap ratios that is parametrized in terms of a single parameter, $\\alpha \\delta$.", "url": "https://arxiv.org/abs/2604.14695", "type": "理论", "summary": "了解相互作用范围和各种类型的无序如何影响多体量子系统的能级统计并导致多体局域化（MBL）的出现是一个具有挑战性的开放前沿。我们研究了具有 $1/r^{\\alpha}$ 相互作用的自旋 $1/2$ Haldane-Shastry 模型变体的能级统计，其中 $\\alpha{\\geq}0$ 在存在位置无序和/或随机磁场的情况下参数化相互作用的范围。我们发现，在这个远程相互作用系统中，位置无序和随机磁场都无法单独产生原始的泊松统计数据。然而，泊松统计数据同时出现，表明当两种类型的疾病共存时就会出现 MBL。有趣的是，一旦随机磁场打破了 $SU(2)$ 对称性，位置无序的强度 $\\delta$ 似乎就发挥了重要作用，这一点可以通过以单个参数 $\\alpha \\delta$ 参数化的无序平均间隙比的近似缩放崩溃来证明。", "authors": [{"name": "Vengatesan Ganapathy"}, {"name": "Pranay Patil"}, {"name": "Ajit C. Balram"}], "featured_authors": [{"name": "Vengatesan Ganapathy"}, {"name": "Pranay Patil"}, {"name": "Ajit C. Balram"}], "author_count": 3}, {"id": "2604.14750", "category": "cond-mat", "title": "Morphological Transition: From Meanders to Mound Structures", "abstract": "Mound formation on flat and miscut crystal surfaces exhibits distinct growth behaviors. While mound structures are the predominant feature on flat surfaces, miscut surfaces display a smooth transition from meandered patterns to three-dimensional mounds, depending on both internal and external conditions. We investigate this morphological evolution-from meander-like surface patterns to faceted pyramidal structures-using a vicinal Cellular Automata modeling framework. The transition is shown to be governed by the competition between the Ehrlich-Schwoebel barrier and adatom mobility on terraces. Under moderate barrier strengths and sufficiently high terrace diffusivity, the system demonstrates a reversible transition from mounded configurations to regular step meandered patterns. This reveals a complex interplay between kinetic barriers and mass transport. Our simulations cover a wide range of growth conditions, including variations in deposition flux, surface diffusion rates, temperature, and miscut angle. By applying the height-height correlation function, we calculate the correlation lengths along and across the steps and analyze their scaling behavior. These results offer insight into the continuum pathways that connect distinct classes of surface structures and provide a unified framework for describing pattern evolution across different crystal growth regimes.", "url": "https://arxiv.org/abs/2604.14750", "type": "理论+数值", "summary": "平坦和误切晶体表面上的土堆形成表现出独特的生长行为。虽然土堆结构是平面上的主要特征，但误切表面显示出从蜿蜒图案到三维土堆的平滑过渡，具体取决于内部和外部条件。我们使用邻位元胞自动机建模框架研究了这种形态演化——从曲折状表面图案到多面金字塔结构。该转变被证明是由埃利希-施沃贝尔势垒和阶梯上的吸附原子迁移率之间的竞争控制的。在中等势垒强度和足够高的阶地扩散率下，该系统表现出从堆状结构到规则阶梯蜿蜒图案的可逆过渡。这揭示了动势垒和质量传输之间复杂的相互作用。我们的模拟涵盖了广泛的生长条件，包括沉积通量、表面扩散速率、温度和误切角度的变化。通过应用高度-高度相关函数，我们计算沿台阶和跨台阶的相关长度并分析它们的缩放行为。\n\n这些结果提供了对连接不同类别表面结构的连续路径的深入了解，并为描述不同晶体生长机制的模式演化提供了统一的框架。", "authors": [{"name": "Marta A. Chabowska"}, {"name": "Hristina Popova"}, {"name": "Magdalena A. Załuska-Kotur"}], "featured_authors": [{"name": "Marta A. Chabowska"}, {"name": "Hristina Popova"}, {"name": "Magdalena A. Załuska-Kotur"}], "author_count": 3}, {"id": "2604.14767", "category": "cond-mat", "title": "Nontrivial three-sublattice magnetization in the easy-axis spin-1/2 XXZ antiferromagnet on the triangular lattice", "abstract": "We investigate the ground-state magnetic structure of the spin-$1/2$ XXZ antiferromagnet on the triangular lattice in the easy-axis regime using the density-matrix renormalization group. By applying spiral boundary conditions, we exactly map finite $L\\times L$ clusters onto one-dimensional chains while avoiding the spatial anisotropy inherent in cylindrical geometries. From symmetry-broken local magnetization profiles, we extract the three-sublattice moments and track their evolution with anisotropy. At the isotropic point, we obtain a positive sublattice moment of $0.21671$, consistent with previous numerical estimates. In the easy-axis regime, the ordered moments remain close to a zero-magnetization three-sublattice structure of the form $(2m,-m,-m)$ over a broad range of $\\Delta$. Extrapolation in $1/\\Delta$ shows that the positive sublattice moment stays well below the classical saturation value $1/2$, approaching $0.41873$ as $\\Delta\\to\\infty$, while the magnitude of the negative sublattice moment approaches $0.20832$. We further compare the energies of the Y state and the up-down-down state and find that the Y state is favored at zero field. Independent thermodynamic-limit energy calculations, performed without assuming any particular ordered pattern, yield an energy consistent with the Y-state solution. These results show that the easy-axis ground state does not simply cross over to a trivially saturated collinear Ising state, but instead remains a nontrivial three-sublattice ordered state selected from the macroscopically degenerate Ising manifold by quantum fluctuations.", "url": "https://arxiv.org/abs/2604.14767", "type": "理论+数值", "summary": "我们使用密度矩阵重正化群研究了易轴区域中三角晶格上自旋 $1/2$ XXZ 反铁磁体的基态磁结构。通过应用螺旋边界条件，我们将有限的 $L\\times L$ 簇精确地映射到一维链上，同时避免圆柱几何形状固有的空间各向异性。从对称破缺的局部磁化强度分布中，我们提取了三亚晶格矩并通过各向异性跟踪它们的演化。在各向同性点，我们获得了 0.21671$ 的正亚晶格矩，与之前的数值估计一致。在易轴状态下，有序矩在 $\\Delta$ 的广泛范围内保持接近 $(2m,-m,-m)$ 形式的零磁化三子晶格结构。 $1/\\Delta$ 的外推显示，正亚晶格矩远低于经典饱和值 $1/2$，接近 $0.41873$（$\\Delta\\to\\infty$），而负亚晶格矩的大小接近 $0.20832$。我们进一步比较了 Y 态和 up-down-down 态的能量，发现 Y 态在零场时更有利。\n\n在不假设任何特定有序模式的情况下执行独立的热力学极限能量计算，产生与 Y 状态解一致的能量。这些结果表明，易轴基态并不是简单地跨越到平凡饱和共线伊辛态，而是仍然是通过量子涨落从宏观简并伊辛流形中选择的非平凡三亚晶格有序态。", "authors": [{"name": "Masahiro Kadosawa"}, {"name": "Masaaki Nakamura"}, {"name": "Yukinori Ohta"}, {"name": "Satoshi Nishimoto"}], "featured_authors": [{"name": "Masahiro Kadosawa"}, {"name": "Masaaki Nakamura"}, {"name": "Yukinori Ohta"}, {"name": "Satoshi Nishimoto"}], "author_count": 4}, {"id": "2604.14848", "category": "cond-mat", "title": "Emergence of Open Chemical Reaction Network Thermodynamics within Closed Systems", "abstract": "We address a fundamental question: under which conditions do the dynamics and thermodynamics of open chemical reaction networks (CRNs), grounded on the notion of idealized chemostats that exchange selected species, emerge from underlying closed CRNs? While open CRNs provide the standard framework to describe out-of-equilibrium chemical systems, real systems are finite and ultimately relax to equilibrium, leaving the status of this description conceptually unresolved. Here we show that open-CRN behavior arises as an asymptotic regime of closed CRNs when two minimal and physically transparent conditions are met: a time-scale separation, whereby fast reactions effectively act as exchange mechanisms, and an abundance separation, whereby a subset of species behaves as chemostats with diverging chemical capacity. In this regime, both the stochastic dynamics and the thermodynamic structure \\ -- including local detailed balance, entropy production, and free-energy balance \\ -- emerge to leading order from the underlying closed CRN. Our results apply to arbitrary stoichiometries. They show that chemostats need not be introduced as external idealizations, but instead arise as emergent thermodynamic structures within closed systems, providing a unified and physically grounded foundation for the nonequilibrium thermodynamics of CRNs.", "url": "https://arxiv.org/abs/2604.14848", "type": "数值", "summary": "我们解决了一个基本问题：基于交换选定物种的理想化恒化器概念的开放化学反应网络（CRN）的动力学和热力学在什么条件下从底层封闭的 CRN 中出现？虽然开放 CRN 提供了描述非平衡化学系统的标准框架，但实际系统是有限的，最终会松弛到平衡，从而导致这种描述的状态在概念上尚未解决。在这里，我们表明，当满足两个最小且物理透明的条件时，开放 CRN 行为会作为封闭 CRN 的渐近状态出现：时间尺度分离，其中快速反应有效地充当交换机制，以及丰度分离，其中物种的子集表现为具有不同化学能力的恒化器。在这种情况下，随机动力学和热力学结构（包括局部详细平衡、熵产生和自由能平衡）从底层的封闭 CRN 中呈现出主导顺序。我们的结果适用于任意化学计量。\n\n他们表明，恒化器不需要作为外部理想化引入，而是作为封闭系统内的新兴热力学结构出现，为 CRN 的非平衡热力学提供统一且物理基础的基础。", "authors": [{"name": "Benedikt Remlein"}, {"name": "Massimiliano Esposito"}, {"name": "Francesco Avanzini"}], "featured_authors": [{"name": "Benedikt Remlein"}, {"name": "Massimiliano Esposito"}, {"name": "Francesco Avanzini"}], "author_count": 3}, {"id": "2604.14873", "category": "cond-mat", "title": "Highly coarse-grained polarisable water models for mesoscopic simulations", "abstract": "Modelling micro- and meso-scopic scale thermodynamic and transport properties of soft condensed matter hinges upon its representation. This is especially relevant for polar solvents such as water, since these require effective representation of their dielectric nature as driven by molecular charge distributions and molecular network structuring. The dielectric nature of a medium leads to complex phenomena such as local polarisability response and restructuring near interfaces in reaction to changes in local charge distributions. Inclusion of such phenomena when using larger-than-atomistic techniques such as coarse-grained molecular dynamics (CG-MD) and dissipative particle dynamics (DPD) is still an open question, to which we provide a novel way to consider and justify the necessary and suitable coarse-graining level, enabling us to compare new polar CG models' performance against that of an underlying atomistic model. We polarise our previous non-polar nDPD water model to prepare it for use in simulations of liquid electrolytes as well as solvated organic membranes and measure its fitness to serve as a dielectric medium by comparing its properties to those of the TIP3P water model, while simultaneously observing changes to properties already represented well by the non-polar model.", "url": "https://arxiv.org/abs/2604.14873", "type": "理论+数值", "summary": "软凝聚态物质的微观和介观尺度热力学和输运特性的建模取决于其表征。这对于水等极性溶剂尤其重要，因为这些溶剂需要有效地表示由分子电荷分布和分子网络结构驱动的介电性质。介质的介电性质会导致复杂的现象，例如局部极化响应和界面附近的重构以响应局部电荷分布的变化。使用粗粒度分子动力学 (CG-MD) 和耗散粒子动力学 (DPD) 等大于原子的技术时包含此类现象仍然是一个悬而未决的问题，对此我们提供了一种新颖的方法来考虑和证明必要且合适的粗粒度水平，使我们能够将新的极地 CG 模型的性能与基础原子模型的性能进行比较。\n\n我们将之前的非极性 nDPD 水模型极化，准备用于模拟液体电解质和溶剂化有机膜，并通过将其属性与 TIP3P 水模型的属性进行比较来测量其作为介电介质的适用性，同时观察非极性模型已经很好地代表的属性的变化。", "authors": [{"name": "Michael A. Seaton"}, {"name": "Benjamin T. Speake"}, {"name": "Ilian T. Todorov"}], "featured_authors": [{"name": "Michael A. Seaton"}, {"name": "Benjamin T. Speake"}, {"name": "Ilian T. Todorov"}], "author_count": 3}, {"id": "2604.14894", "category": "cond-mat", "title": "Reversable phase transitions in ferroic two-dimensional Nb2O2I4 through optically excited coherent phonons", "abstract": "We investigate optically induced phase transitions in the two-dimensional (2D) ferroelectric (FE) material Nb2O2I4 using real-time time-dependent density functional theory (rt-TDDFT). Our results demonstrate that tailored laser pulses can activate specific coherent phonon modes. Specifically, the anharmonic atomic distortions of the A1-1 and A1-2 modes at the {\\Gamma}-point facilitate the reversal of in-plane polarization. By fine-tuning laser parameters, additional phonon modes at both the Y and {\\Gamma} points are excited. The resulting nonequilibrium atomic dynamics enable the formation of previously unreported ferroic phases, including three antiferroelectric (AFE) phases and one ferrielectric (FiE) phase. Notably, these optically induced phases can be reverted to the initial FE state using appropriate techniques. This controllable reversibility among multiple ferroic phases positions 2D Nb2O2I4 as a highly promising candidate for next-generation electronic storage applications.", "url": "https://arxiv.org/abs/2604.14894", "type": "理论+数值", "summary": "我们使用实时时间相关密度泛函理论 (rt-TDDFT) 研究二维 (2D) 铁电 (FE) 材料 Nb2O2I4 中的光致相变。我们的结果表明，定制的激光脉冲可以激活特定的相干声子模式。具体来说，A1-1 和 A1-2 模式在 {\\Gamma} 点处的非谐波原子畸变有利于面内偏振的反转。通过微调激光参数，Y 和 {\\Gamma} 点处的附加声子模式被激发。由此产生的非平衡原子动力学使得能够形成以前未报道的铁相，包括三个反铁电（AFE）相和一个亚铁电（FiE）相。值得注意的是，这些光诱导相位可以使用适当的技术恢复到初始 FE 状态。这种多个铁相之间的可控可逆性使 2D Nb2O2I4 成为下一代电子存储应用的极具前景的候选者。", "authors": [{"name": "Chuanlin Liu"}, {"name": "Dan Liu"}, {"name": "Jie Guan"}, {"name": "Chao Lian"}], "featured_authors": [{"name": "Chuanlin Liu"}, {"name": "Dan Liu"}, {"name": "Jie Guan"}, {"name": "Chao Lian"}], "author_count": 4}, {"id": "2604.14962", "category": "cond-mat", "title": "Coarse Graining Reveals a Fluctuation-theorem-like Asymmetry in Financial Markets", "abstract": "Fluctuation theorems show how coarse graining transforms microscopic symmetry into observable irreversibility. Here we ask whether an analogous symmetrybased diagnostic can be constructed for financial markets. At the microscopic level, each transaction pairs a buyer and a seller, whereas trading decisions are typically made from coarse-grained price histories. Using symmetric takeprofit and stop-loss rules, we compare the holding-time distributions of long and short trading ensembles generated from the same price series. Across equityindices, individual stocks and cryptocurrencies, the log-ratio of the two distributions shows a robust crossover. It remains nearly constant at short durations but becomes linear in the tail, implying an exponential directional asymmetry. The tail slope defines an effective market temperature, an operational measure of fluctuation intensity on the chosen observation scale. A Bachelier first-passage benchmark captures the exponential tails but not the asymmetry, because long and short positions share the same leading decay rate. By contrast, short-time correlations between overlapping positions provide a minimal mechanism for the asymmetry by generating direction-dependent subleading relaxation spectra in a coarse-grained Markov description. Together, these results establish a fluctuation-theorem-like diagnostic of irreversibility in financial markets and, more broadly, in complex systems accessible only through coarse-grained observables.", "url": "https://arxiv.org/abs/2604.14962", "type": "理论", "summary": "涨落定理展示了粗粒度如何将微观对称性转化为可观察的不可逆性。在这里，我们询问是否可以为金融市场构建类似的基于对称性的诊断。在微观层面上，每笔交易都将买家和卖家配对，而交易决策通常是根据粗粒度的价格历史做出的。使用对称止盈和止损规则，我们比较同一价格序列生成的多头和空头交易集合的持有时间分布。在股票指数、个股和加密货币中，两种分布的对数比显示出强劲的交叉。它在短时间内几乎保持恒定，但在尾部变成线性，这意味着指数方向不对称。尾部斜率定义了有效的市场温度，这是所选观测尺度上波动强度的操作度量。 Bachelier 首次基准测试捕获了指数尾部，但没有捕获不对称性，因为多头头寸和空头头寸具有相同的领先衰减率。\n\n相比之下，重叠位置之间的短时相关性通过在粗粒度马尔可夫描述中生成方向相关的次领先弛豫谱来提供不对称性的最小机制。总之，这些结果建立了类似波动定理的金融市场不可逆性诊断，更广泛地说，在只能通过粗粒度可观测值访问的复杂系统中。", "authors": [{"name": "Jian Gao"}, {"name": "Lufeng Zhang"}, {"name": "Ping Fang"}, {"name": "Pu Ke"}, {"name": "Jin Wu"}, {"name": "Yue Liu"}, {"name": "Haijun Zhou"}], "featured_authors": [{"name": "Jian Gao"}, {"name": "Lufeng Zhang"}, {"name": "Ping Fang"}, {"name": "Jin Wu"}, {"name": "Yue Liu"}, {"name": "Haijun Zhou"}], "author_count": 7}, {"id": "2604.15000", "category": "cond-mat", "title": "Thermodynamic Geometry of Relaxation", "abstract": "While the geometry of equilibrium states and driven non-equilibrium processes is clearly understood, a geometric description for relaxation towards equilibrium is still lacking. Here, we propose a thermo-geometric measure based on the Rayleigh quotient, reformulating relaxation as a fundamental competition between entropic stiffness and frictional dissipation. Taking a van der Waals gas with two dissipation channels as an example, we explicitly demonstrate its relaxation landscape. Particularly, we find that upon approaching the critical temperature $T_c$, the slow-mode relaxation rate vanishes linearly as $\\lambda_s \\propto (T-T_c)/T_c$, indicating critical slowing down. This study completes the thermodynamic geometry framework, providing a general tool for characterizing the relaxation dynamics of complex systems.", "url": "https://arxiv.org/abs/2604.15000", "type": "理论", "summary": "虽然平衡状态和驱动的非平衡过程的几何形状已被清楚地理解，但仍然缺乏对平衡松弛的几何描述。在这里，我们提出了一种基于瑞利商的热几何测量，将松弛重新表述为熵刚度和摩擦耗散之间的基本竞争。以具有两个耗散通道的范德华气体为例，我们明确地展示了其弛豫景观。特别是，我们发现，当接近临界温度$T_c$时，慢模弛豫率随着$\\lambda_s \\propto (T-T_c)/T_c$线性消失，表明临界减速。这项研究完成了热力学几何框架，为表征复杂系统的弛豫动力学提供了通用工具。", "authors": [{"name": "Hao Wang"}, {"name": "Li Zhao"}, {"name": "Shuai Deng"}, {"name": "Yu-Han Ma"}], "featured_authors": [{"name": "Hao Wang"}, {"name": "Li Zhao"}, {"name": "Shuai Deng"}, {"name": "Yu-Han Ma"}], "author_count": 4}, {"id": "2604.15019", "category": "cond-mat", "title": "Controllable highly oriented skyrmion track array in Fe3GaTe2", "abstract": "Magnetic skyrmions are emerging as promising candidates for next-generation information technologies, while the realization of scalable skyrmion lattices with tailored configurations is essential for advancing fundamental skyrmion physics and developing future applications. Here we achieved the controllable generation and regulation of a large-area, highly oriented skyrmion track array (STA) in ferromagnetic Fe3GaTe2 using a vector magnetic field manipulation technique. The orientation and ordering of STA, along with the types and density of skyrmions, are precisely controlled by modulating parameters during the manipulation. The critical roles of in-plane magnetic fields and Dzyaloshinskii-Moriya interaction in STA generation is further confirmed by micromagnetic simulation. Our findings develop a strategy for engineering large-area and highly-oriented skyrmion configurations, offering a new pathway for the future application of next-generation spintronic and information technologies.", "url": "https://arxiv.org/abs/2604.15019", "type": "理论+数值", "summary": "磁性斯格明子正在成为下一代信息技术的有希望的候选者，而实现具有定制配置的可扩展斯格明子晶格对于推进基础斯格明子物理和开发未来应用至关重要。在这里，我们使用矢量磁场操纵技术实现了铁磁 Fe3GaTe2 中大面积、高度定向的斯格明子轨道阵列 (STA) 的可控生成和调节。 STA 的方向和顺序，以及斯格明子的类型和密度，可以通过在操作过程中调节参数来精确控制。微磁模拟进一步证实了面内磁场和 Dzyaloshinskii-Moriya 相互作用在 STA 生成中的关键作用。我们的研究结果制定了一种设计大面积和高度定向的斯格明子配置的策略，为下一代自旋电子和信息技术的未来应用提供了一条新途径。", "authors": [{"name": "Yunhao Wang"}, {"name": "Shiyu Zhu"}, {"name": "Chensong Hua"}, {"name": "Guojing Hu"}, {"name": "Linxuan Li"}, {"name": "Senhao Lv"}, {"name": "Jianfeng Guo"}, {"name": "Jiawei Hu"}, {"name": "Runnong Zhou"}, {"name": "Zizhao Gong"}, {"name": "Chengmin Shen"}, {"name": "Zhihai Cheng"}, {"name": "Jinan Shi"}, {"name": "Wu Zhou"}, {"name": "Haitao Yang"}, {"name": "Weichao Yu"}, {"name": "Jiang Xiao"}, {"name": "Hong-Jun Gao"}], "featured_authors": [{"name": "Yunhao Wang"}, {"name": "Shiyu Zhu"}, {"name": "Chensong Hua"}, {"name": "Weichao Yu"}, {"name": "Jiang Xiao"}, {"name": "Hong-Jun Gao"}], "author_count": 18}, {"id": "2604.15054", "category": "cond-mat", "title": "Type II Lifshitz invariant and optically active Higgs mode in time-reversal symmetry broken superconductors", "abstract": "Lifshitz invariant is a symmetry-allowed term in the Ginzburg-Landau free energy of an ordered phase, involving the order parameters and a single spatial derivative, which serves as a source of unusual optical responses. Here we introduce a ``type II\" Lifshitz invariant for superconductors, which changes its sign under the particle-hole transformation and can be distinguished from the ordinary particle-hole even ``type I\" Lifshitz invariant. We show that the type II Lifshitz invariant appears only in superconductors that break time-reversal symmetry and allows the Higgs mode to be visible in the optical conductivity spectrum. We provide a classification of all pairs of irreducible corepresentations of order parameters in the magnetic point groups that admit a type II Lifshitz invariant. We also numerically calculate the optical conductivity for various models of time-reversal symmetry broken multiband superconductors, finding agreement with the group-theoretical analysis. Our results establish a universal class of time-reversal symmetry broken superconductors hosting an optically active Higgs mode.", "url": "https://arxiv.org/abs/2604.15054", "type": "理论+数值", "summary": "Lifshitz 不变量是有序相的 Ginzburg-Landau 自由能中允许对称的项，涉及有序参数和单个空间导数，它是异常光学响应的​​来源。这里我们引入超导体的“II型”Lifshitz不变量，它在粒子空穴变换下改变其符号，可以与普通粒子空穴甚至“I型”Lifshitz不变量区分开来。我们证明，II 型 Lifshitz 不变量仅出现在打破时间反转对称性并允许希格斯模式在光导谱中可见的超导体中。我们提供了磁点群中所有成对的不可约核心表示的有序参数的分类，这些参数承认 II 型 Lifshitz 不变量。我们还数值计算了时间反转对称性破缺多带超导体的各种模型的光导率，发现与群论分析一致。我们的结果建立了一种通用的时间反转对称破缺超导体，具有光学活性希格斯模式。", "authors": [{"name": "Raigo Nagashima"}, {"name": "Chihiro Mamiya"}, {"name": "Naoto Tsuji"}], "featured_authors": [{"name": "Raigo Nagashima"}, {"name": "Chihiro Mamiya"}, {"name": "Naoto Tsuji"}], "author_count": 3}, {"id": "2604.15062", "category": "cond-mat", "title": "Heat flux deflection induced by hydrodynamic electron transport in a homogeneous Corbino disk under magnetic field", "abstract": "Hydrodynamic electron transport, namely, the electric behaviors in solid materials at the macroscopic level are similar to the fluid hydrodynamics when the momentum-conserving electron-electron scattering plays the leading role, has got much attention in the past ten years. However, most of previous studies mainly focus on the electric properties. In this work, the thermal behaviors of hydrodynamic electron transport in a homogeneous 2D Corbino disk geometry is studied by the electron Boltzmann transport equation (eBTE) coupled with the Poisson equation under the magnetic field perpendicular to disk plane. Results show that in the electron hydrodynamic regime, the heat flux deflection phenomenon appears under the radial electric field or temperature gradient, namely, the heat flux no longer flows only along the radial direction and there is heat flux in the tangential direction of the radius. Heat flux deflection phenomenon is suppressed by momentum-relaxing scattering process and promoted by momentum-conserving scattering process. When an electric potential gradient or temperature gradient in the same direction is applied separately, the direction of heat flux is reversed in the electron hydrodynamic regime.", "url": "https://arxiv.org/abs/2604.15062", "type": "理论", "summary": "流体动力学电子输运，即动量守恒电子-电子散射起主导作用时，宏观层面上固体材料的电学行为与流体流体动力学相似，在过去十年中受到了广泛的关注。然而，以往的研究大多主要集中在电性能上。在这项工作中，通过电子玻尔兹曼输运方程（eBTE）与垂直于盘平面的磁场下的泊松方程相结合，研究了均匀二维 Corbino 盘几何结构中流体动力电子输运的热行为。结果表明，在电子流体动力学状态下，在径向电场或温度梯度作用下，出现热流偏转现象，即热流不再仅沿径向流动，而在半径切向方向存在热流。热通量偏转现象被动量弛豫散射过程抑制，并被动量守恒散射过程促进。\n\n当单独施加同一方向的电势梯度或温度梯度时，热通量的方向在电子流体动力学状态中反转。", "authors": [{"name": "Chuang Zhang"}, {"name": "Meng Lian"}, {"name": "Hong Liang"}, {"name": "Xiaokang Li"}, {"name": "Zhaoli Guo"}, {"name": "JingTao Lü"}], "featured_authors": [{"name": "Chuang Zhang"}, {"name": "Meng Lian"}, {"name": "Hong Liang"}, {"name": "Xiaokang Li"}, {"name": "Zhaoli Guo"}, {"name": "JingTao Lü"}], "author_count": 6}, {"id": "2604.15084", "category": "cond-mat", "title": "Static heterogeneity generates apparent universality in first-passage bursty dynamics", "abstract": "Processes involving bursts of activity separated by quiescent periods occur across diverse systems and scales. In human dynamics, these phenomena have been described by power-law inter-event time distributions, $P(t)\\sim t^{-\\alpha}$, with putative universality classes $\\alpha=1$ and $\\alpha=\\frac{3}{2}$ having been proposed. Whether the observed $\\alpha = 1$ scaling reflects intrinsic scale-free dynamics or instead emerges from heterogeneous underlying rates has been debated at length. We address this question in a canonical physical system for first-passage dynamics: two-dimensional molecular diffusion detected by the tip of a scanning tunnelling microscope. The resulting inter-pulse time distributions exhibit the same apparent truncated power-law form reported for human activities such as email communication, web browsing, and library loans. Maximum-likelihood estimation and model comparison decisively favor a Kohlrausch-Williams-Watts--tempered power law, $P(t)\\propto t^{-\\alpha}\\exp\\left(-(t/t_c)^\\beta\\right)$, with $\\alpha \\sim 1$. Kinetic Monte Carlo simulations reproduce this behavior, showing that the apparent $\\alpha \\sim 1$ scaling is confined to a finite time window and arises from tip-induced spatial heterogeneity, not scale invariance.", "url": "https://arxiv.org/abs/2604.15084", "type": "理论+数值", "summary": "涉及由静止期分隔的突发活动的过程发生在不同的系统和规模中。在人类动力学中，这些现象通过幂律事件间时间分布 $P(t)\\sim t^{-\\alpha}$ 来描述，并提出了假定的普遍性类 $\\alpha=1$ 和 $\\alpha=\\frac{3}{2}$。观察到的 $\\alpha = 1$ 缩放是否反映了内在的无标度动态，还是来自异质的基础利率，这一点一直存在争议。我们在第一通道动力学的规范物理系统中解决了这个问题：通过扫描隧道显微镜尖端检测到的二维分子扩散。由此产生的脉冲间时间分布表现出与人类活动（例如电子邮件通信、网页浏览和图书馆借阅）相同的明显截断幂律形式。最大似然估计和模型比较决定性地支持 Kohlrausch-Williams-Watts 调和幂律 $P(t)\\propto t^{-\\alpha}\\exp\\left(-(t/t_c)^\\beta\\right)$，其中 $\\alpha \\sim 1$。\n\n动力学蒙特卡罗模拟再现了这种行为，表明明显的 $\\alpha \\sim 1$ 缩放仅限于有限的时间窗口，并且是由尖端引起的空间异质性引起的，而不是尺度不变性。", "authors": [{"name": "Morten Møller"}, {"name": "Philipp Rahe"}, {"name": "Sadegh Ghaderzadeh"}, {"name": "Elena Besley"}, {"name": "Philip Moriarty"}], "featured_authors": [{"name": "Morten Møller"}, {"name": "Philipp Rahe"}, {"name": "Sadegh Ghaderzadeh"}, {"name": "Elena Besley"}, {"name": "Philip Moriarty"}], "author_count": 5}, {"id": "2604.15105", "category": "cond-mat", "title": "Passivity-Driven Order--Disorder Transitions in Self-Aligning Active Matter", "abstract": "We study dense mixtures of passive and active self-aligning disks with isotropic or anisotropic mobility. We find that the passive fraction controls an order-disorder transition that is continuous in the isotropic case and discontinuous in the anisotropic one. A mean-field equation derived from the microscopic heading dynamics captures this dichotomy. Near the transition, both ordered regimes can exhibit multiple metastable oscillating or rotating states, depending on the spatial arrangement of passive particles and lattice defects, but with different transient dynamics: Systems with isotropic mobility visit multiple long-lived attractors during each simulation while systems with anisotropic mobility are trapped by a single attractor. Our results reveal the passive fraction as a physically relevant control parameter in active systems, leading to rich self-organizing dynamics.", "url": "https://arxiv.org/abs/2604.15105", "type": "理论+数值", "summary": "我们研究具有各向同性或各向异性迁移率的被动和主动自对准磁盘的致密混合物。我们发现被动分数控制有序-无序转变，该转变在各向同性情况下是连续的，而在各向异性情况下是不连续的。从微观航向动力学导出的平均场方程捕捉到了这种二分法。在过渡附近，两种有序状态都可以表现出多个亚稳态振荡或旋转状态，具体取决于被动粒子和晶格缺陷的空间排列，但具有不同的瞬态动力学：具有各向同性迁移率的系统在每次模拟过程中都会访问多个长寿命吸引子，而具有各向异性迁移率的系统则被单个吸引子捕获。我们的结果揭示了被动部分作为主动系统中物理相关的控制参数，导致丰富的自组织动力学。", "authors": [{"name": "Weizhen Tang"}, {"name": "Amir Shee"}, {"name": "Zhangang Han"}, {"name": "Pawel Romanczuk"}, {"name": "Yating Zheng"}, {"name": "Cristián Huepe"}], "featured_authors": [{"name": "Weizhen Tang"}, {"name": "Amir Shee"}, {"name": "Zhangang Han"}, {"name": "Pawel Romanczuk"}, {"name": "Yating Zheng"}, {"name": "Cristián Huepe"}], "author_count": 6}, {"id": "2604.15175", "category": "cond-mat", "title": "Optimal spin-qubit hallmarks of sulfur-vacancy defects in 4H-SiC: Design from first principles", "abstract": "By applying our methodology, we propose a defect in 4H-SiC which combines a Si vacancy and a C atom substituted with S (VSiSC) to have a spin-triplet ground state with the spin qubit functionality. Our calculations confirm that all configurations of the defect have a dynamically and thermodynamically stable triplet ground state and higher energy singlet states, essential for the spin-qubit polarization cycle. From GW calculations, we found that the electronic states associated with the defect form sharp and isolated peaks within the band gap for both triplet and singlet states. Further Bethe-Salpeter-equation calculations show that all considered configurations have intense optical excitations in the near infrared spectrum range. Analysis of the excitation energies and rates indicate that the VSiSC defect can be an excellent optically controlled spin qubit. Crucially, the host elements and the dopant have high-abundance isotopes with zero nuclear spin ensuring high spin-coherence time of the qubit.", "url": "https://arxiv.org/abs/2604.15175", "type": "理论+数值", "summary": "通过应用我们的方法，我们提出了 4H-SiC 中的缺陷，该缺陷结合了 Si 空位和被 S 取代的 C 原子 (VSiSC)，从而具有具有自旋量子位功能的自旋三重态基态。我们的计算证实，缺陷的所有配置都具有动态和热力学稳定的三重基态和更高能量的单重态，这对于自旋量子位极化循环至关重要。从引力波计算中，我们发现与缺陷相关的电子态在三重态和单重态的带隙内形成尖锐且孤立的峰。进一步的 Bethe-Salpeter 方程计算表明，所有考虑的配置在近红外光谱范围内都具有强烈的光学激发。对激发能量和速率的分析表明，VSiSC 缺陷可以成为一种优异的光控自旋量子位。至关重要的是，主体元素和掺杂剂具有高丰度同位素，核自旋为零，确保了量子位的高自旋相干时间。", "authors": [{"name": "Marisol Alcántara Ortigoza"}, {"name": "Sergey Stolbov"}], "featured_authors": [{"name": "Marisol Alcántara Ortigoza"}, {"name": "Sergey Stolbov"}], "author_count": 2}, {"id": "2604.14271", "category": "hep-th", "title": "Magic and Non-Clifford Gates in Topological Quantum Field Theory", "abstract": "Non-Clifford gates, used to generate quantum magic, are essential for universal quantum computation. We show that non-Clifford gates arise naturally from path integrals in topological quantum field theories, where their magic-generating properties are determined by the algebraic data of the theory. In Chern-Simons theory, we construct the Ising interaction gate, whose generator is prepared by path integration over simple three-boundary manifolds, and show that it produces non-local magic away from discrete Clifford points. We show that the Toffoli gate is obstructed in $SU(2)_1$ by the $\\mathbb{Z}_2$ fusion structure, while $SU(2)_3$ is the minimal theory supporting the required conditional logic, given the density of the mapping class group in the projective unitary group on the manifold boundary. Finally, we demonstrate that the T gate arises as a path integral in Dijkgraaf-Witten theory, with gauge group $\\mathbb{Z}_4$, where a single Dehn twist on the boundary torus produces the gate without approximation. These results show that topological path integrals construct gates in multiple levels of the Clifford hierarchy, and across distinct classes of field theories, with implications for topological quantum computing.", "url": "https://arxiv.org/abs/2604.14271", "type": "理论", "summary": "非克利福德门用于产生量子魔法，对于通用量子计算至关重要。我们证明，非克利福德门自然地产生于拓扑量子场论中的路径积分，其中它们的魔法生成属性由理论的代数数据决定。在陈-西蒙斯理论中，我们构造了伊辛相互作用门，其生成器是通过简单三边界流形上的路径积分来准备的，并表明它产生远离离散克利福德点的非局部魔力。我们证明，$SU(2)_1$ 中的 Toffoli 门被 $\\mathbb{Z}_2$ 融合结构阻挡，而 $SU(2)_3$ 是支持所需条件逻辑的最小理论，给定流形边界上射影酉群中映射类群的密度。最后，我们证明 T 门是 Dijkgraaf-Witten 理论中的路径积分，具有规范组 $\\mathbb{Z}_4$，其中边界环面上的单个 Dehn 扭曲产生没有近似的门。\n\n这些结果表明，拓扑路径积分在 Clifford 层次结构的多个级别以及跨不同类别的场论中构造门，这对拓扑量子计算具有影响。", "authors": [{"name": "William Munizzi"}, {"name": "Howard J. Schnitzer"}], "featured_authors": [{"name": "William Munizzi"}, {"name": "Howard J. Schnitzer"}], "author_count": 2}, {"id": "2604.14275", "category": "hep-th", "title": "Generalized Complexity Distances and Non-Invertible Symmetries", "abstract": "Non-invertible symmetries of a quantum field theory (QFT) are a natural generalization of unitary symmetries, but in which the product of operators does not satisfy a group multiplication law. We show that such symmetry operations on states define a collection of quantum gates for a parallel quantum computation scheme that includes post-selection / projection as a gate. Structures such as gate complexity and more geometric complexity measures generalize to this setting. We provide a class of distance / distinguishability measures that extend the standard notion of distance for Lie groups to both continuous and discrete non-invertible symmetries, as well as more general linear combinations of unitary quantum gates. We illustrate these considerations by computing the distance between non-invertible symmetries in some 4D and 2D QFTs. We find that the simple objects of a symmetry category can be highly complex computationally.", "url": "https://arxiv.org/abs/2604.14275", "type": "理论", "summary": "量子场论（QFT）的不可逆对称性是酉对称性的自然推广，但其中算子的乘积不满足群乘法。我们证明，这种状态对称运算定义了并行量子计算方案的量子门集合，其中包括后选择/投影作为门。诸如门复杂性和更多几何复杂性度量之类的结构可推广到此设置。我们提供了一类距离/可区分性度量，将李群的标准距离概念扩展到连续和离散不可逆对称性，以及更一般的酉量子门的线性组合。我们通过计算某些 4D 和 2D QFT 中不可逆对称性之间的距离来说明这些考虑因素。我们发现对称范畴的简单对象在计算上​​可能非常复杂。", "authors": [{"name": "Jonathan J. Heckman"}, {"name": "Rebecca J. Hicks"}, {"name": "Chitraang Murdia"}], "featured_authors": [{"name": "Jonathan J. Heckman"}, {"name": "Rebecca J. Hicks"}, {"name": "Chitraang Murdia"}], "author_count": 3}, {"id": "2604.14279", "category": "hep-th", "title": "Beyond the Dilute Instanton Gas: Resurgence with Exact Saddles in the Double Well", "abstract": "The path-integral approach to the double well has long been limited by the dilute instanton gas approximation. We show that if the finite Euclidean-time structure is taken seriously by using exact saddles, the dilute gas can be sidestepped, allowing the partition function and energy levels to be computed systematically. At each instanton order, the full resurgent structure -- which saddles contribute, what asymptotic growth is expected and how ambiguities cancel -- is encoded in a finite-dimensional Picard--Lefschetz contour integral over the quasi-zero modes with a clear geometric interpretation. Working at finite $T$ is essential: the dilute instanton gas can only access the ground-state splitting, whereas the exact finite-$T$ computation systematically produces the non-perturbative energy splittings for all excited states, including their full dependence on the level number. The key ingredients -- Weierstrass elliptic functions for the saddles, Lamé operators for the fluctuations and Picard--Fuchs equations for the periods -- form a coherent mathematical framework that both overlaps and complements that of Exact WKB.", "url": "https://arxiv.org/abs/2604.14279", "type": "理论", "summary": "双阱的路径积分方法长期以来一直受到稀瞬子气体近似的限制。我们证明，如果通过使用精确的鞍座认真对待有限欧几里德时间结构，则可以避开稀释气体，从而可以系统地计算配分函数和能级。在每个瞬子阶，完整的复活结构——哪些鞍座贡献，预期渐近增长以及如何消除模糊性——被编码在准零模式上的有限维皮卡德-莱夫谢茨轮廓积分中，并具有清晰的几何解释。在有限 $T$ 下工作至关重要：稀瞬子气体只能进行基态分裂，而精确的有限 $T$ 计算系统地产生所有激发态的非微扰能量分裂，包括它们对能级数的完全依赖。关键要素——用于鞍点的 Weierstrass 椭圆函数、用于涨落的 Lamé 算子以及用于周期的 Picard-Fuchs 方程——形成了一个连贯的数学框架，与 Exact WKB 的框架重叠和补充。", "authors": [{"name": "Aurélien Dersy"}, {"name": "Matthew D. Schwartz"}], "featured_authors": [{"name": "Aurélien Dersy"}, {"name": "Matthew D. Schwartz"}], "author_count": 2}, {"id": "2604.14283", "category": "hep-th", "title": "Quantum correction to the diffusion term in stochastic inflation from composite-operator matching in Soft de Sitter Effective Theory", "abstract": "In the framework of Soft de Sitter Effective Theory (SdSET), the Fokker-Planck equation for the late-time dynamics of the massless minimally coupled scalar field and its extension to the Kramers-Moyal equation are obtained from operator mixing of composite operators of the effective superhorizon field. We construct the formalism for composite-operator renormalisation, mixing and matching in dimensional regularisation, allowing for computations beyond the leading order. The general formalism is illustrated in free SdSET, which already features non-trivial structures including the well-known diffusion coefficient for stochastic inflation. As explicit examples in the interacting theory, we renormalise the one-loop bispectrum and the two-loop one-point function of the composite operator $\\varphi_+^2$, and match them onto their full-theory counterparts. These results allow us to determine the next-to-leading order (two-loop) correction to the diffusion term of the Fokker-Planck equation of stochastic inflation for the first time.", "url": "https://arxiv.org/abs/2604.14283", "type": "理论", "summary": "在软德西特有效理论（SdSET）框架下，通过有效超视界场复合算子的算子混合，得到了无质量最小耦合标量场后期动力学的Fokker-Planck方程及其对Kramers-Moyal方程的推广。我们构建了复合算子重整化、维度正则化中的混合和匹配的形式，允许超出主序的计算。一般形式主义在自由 SdSET 中得到了说明，它已经具有重要的结构，包括众所周知的随机膨胀扩散系数。作为相互作用理论中的明确例子，我们重新规范化复合算子 $\\varphi_+^2$ 的单环双谱和双环单点函数，并将它们与全理论对应物匹配。这些结果使我们能够首次确定随机暴胀 Fokker-Planck 方程扩散项的次要阶（双环）修正。", "authors": [{"name": "Martin Beneke"}, {"name": "Patrick Hager"}, {"name": "Andrea F. Sanfilippo"}], "featured_authors": [{"name": "Martin Beneke"}, {"name": "Patrick Hager"}, {"name": "Andrea F. Sanfilippo"}], "author_count": 3}, {"id": "2604.14288", "category": "hep-th", "title": "Exact Toda Black Holes of Rank-2 Lie Groups", "abstract": "We consider Einstein gravity coupled to two Maxwell fields and one dilatonic scalar, and construct spherically-symmetric and static black holes that are charged under both Maxwell fields in general $D$ dimensions. We find that for suitable dilaton couplings, the equations of motion can be cast into one-dimensional Toda equations of all rank-2 Lie groups. We devise a brute-force approach to obtain the most general but remarkably elegant solutions to the Toda equations. This allows us to construct exact black holes associated with all the rank-2 Lie groups. The $B_2$ and $G_2$ Toda black holes are new. We study their thermodynamics and verify explicitly an earlier claim in the literature that all these thermodynamic quantities can be derived without having to solve for these black hole solutions.", "url": "https://arxiv.org/abs/2604.14288", "type": "理论", "summary": "我们考虑将爱因斯坦引力与两个麦克斯韦场和一个膨胀标量耦合，并构造球对称和静态黑洞，这些黑洞在一般 $D$ 维度下在两个麦克斯韦场下都带电。我们发现，对于合适的膨胀耦合，运动方程可以转化为所有 2 阶李群的一维 Toda 方程。我们设计了一种蛮力方法来获得 Toda 方程最通用但非常优雅的解。这使我们能够构造与所有 2 阶李群相关的精确黑洞。 $B_2$ 和 $G_2$ Toda 黑洞是新的。我们研究了它们的热力学，并明确验证了文献中的早期主张，即可以导出所有这些热力学量，而无需求解这些黑洞解。", "authors": [{"name": "H. Lu"}, {"name": "Peng-Yu Wu"}, {"name": "Ze-Hua Wu"}, {"name": "Weicheng Zhao"}], "featured_authors": [{"name": "H. Lu"}, {"name": "Peng-Yu Wu"}, {"name": "Ze-Hua Wu"}, {"name": "Weicheng Zhao"}], "author_count": 4}, {"id": "2604.14301", "category": "hep-th", "title": "Carroll fermions, expansions and the lightcone", "abstract": "We investigate fermions on Carrollian manifolds. We complement previous intrinsic analysis by deriving Carrollian fermion actions from a relativistic Dirac theory via a systematic expansion in the speed of light ($c$). We then study relativistic fermions in light-cone coordinates and their connection to Carrollian fermions in one lower dimension. This follows from the recent observation that the Poincaré algebra, written in lightcone coordinates contains (two) co-dimension one Carroll sub-algebras. Our results establish a clear bridge between intrinsic Carrollian constructions, small $c$-expansion and light-cone dynamics. In the process, we understand why Carrollian fermions in $D$-dimensions have features that relate them to relativistic fermions in both $D$ and $(D+1)$ dimensions.", "url": "https://arxiv.org/abs/2604.14301", "type": "理论", "summary": "我们研究卡罗尔流形上的费米子。我们通过光速 ($c$) 的系统展开，从相对论狄拉克理论中导出卡罗尔费米子行为，从而补充了之前的本征分析。然后，我们研究光锥坐标中的相对论费米子及其与低维卡罗尔费米子的联系。这是根据最近的观察得出的，即以光锥坐标编写的庞加莱代数包含（两个）共维一卡罗尔子代数。我们的结果在内在的卡罗尔结构、小 $c$ 扩张和光锥动力学之间建立了一座清晰的桥梁。在此过程中，我们理解了为什么 $D$ 维度中的卡罗尔费米子具有与 $D$ 和 $(D+1)$ 维度中的相对论性费米子相关的特征。", "authors": [{"name": "Arjun Bagchi"}, {"name": "Saikat Mondal"}], "featured_authors": [{"name": "Arjun Bagchi"}, {"name": "Saikat Mondal"}], "author_count": 2}, {"id": "2604.14335", "category": "hep-th", "title": "Hofstadter's Butterfly in AdS$_3$ Black Holes", "abstract": "We derive the reduced Dirac Hamiltonian on the non-rotating BTZ background and use its redshift structure to construct a gauge-covariant single-band lattice model on the constant-time BTZ cylinder. In equal-area coordinates the AdS radius $L$ fixes the local Gaussian curvature, while the horizon radius $r_h$ fixes the throat size and the strength of the near-horizon redshift. The lattice model therefore has a direct geometric interpretation and is not presented as an unshown reduction of the two-component Dirac lattice. Its angular Fourier transform yields an exact curved Harper equation with BTZ-dependent hopping amplitudes and a consistent dimensionless angular quasi-momentum. We then supplement global parameter scans with state-resolved diagnostics: spectra color-coded by mean radius, local density of states, direct flux-response versus radius correlations, and Aharonov--Bohm spectral flow and persistent current on the BTZ cycle. These results show that weaker curvature sharpens the butterfly-like fragmentation, whereas larger horizons suppress both magnetic and Aharonov--Bohm response by creating weakly dispersing near-horizon states.", "url": "https://arxiv.org/abs/2604.14335", "type": "理论", "summary": "我们推导了非旋转BTZ背景下的简化狄拉克哈密顿量，并利用其红移结构在恒定时间BTZ圆柱上构建了规范协变单带晶格模型。在等积坐标中，AdS 半径 $L$ 固定局部高斯曲率，而地平线半径 $r_h$ 固定喉部大小和近地平线红移的强度。因此，晶格模型具有直接的几何解释，并且不是作为二元狄拉克晶格的未显示的简化来呈现。其角度傅里叶变换产生精确的弯曲哈珀方程，具有依赖于 BTZ 的跳跃幅度和一致的无量纲角准动量。然后，我们用状态解析诊断来补充全局参数扫描：按平均半径、局部状态密度、直接通量响应与半径相关性以及 BTZ 循环上的 Aharonov-Bohm 谱流和持续电流进行颜色编码的光谱。这些结果表明，较弱的曲率使蝴蝶状碎裂变得尖锐，而较大的视界通过产生弱色散的近视界态来抑制磁响应和阿哈罗诺夫-玻姆响应。", "authors": [{"name": "Kazuki Ikeda"}, {"name": "Yaron Oz"}], "featured_authors": [{"name": "Kazuki Ikeda"}, {"name": "Yaron Oz"}], "author_count": 2}, {"id": "2604.14340", "category": "hep-th", "title": "One-Loop Quantum Corrections to the Casimir Effect for Rough Plates in the Low-Temperature Regime", "abstract": "We present a theoretical analysis of the one-loop effective potential of a self-interacting real scalar field in the presence of two parallel conducting plates with geometric roughness. Using WKB methods to evaluate the spectral density of the modified Laplace-Beltrami operator, together with contour integration within a $\\zeta$-function regularization scheme, we derive analytical expressions for the quantum corrections to the effective potential induced by perturbative boundary roughness and finite temperature. Furthermore, we compute explicit contributions to the Casimir energy and to the topological mass generation associated with the geometry.", "url": "https://arxiv.org/abs/2604.14340", "type": "理论", "summary": "我们对存在两个具有几何粗糙度的平行导电板的情况下自相互作用实标量场的单环有效势进行了理论分析。使用 WKB 方法来评估修改后的 Laplace-Beltrami 算子的谱密度，以及 $\\zeta$ 函数正则化方案中的轮廓积分，我们推导了对由扰动边界粗糙度和有限温度引起的有效势的量子校正的解析表达式。此外，我们还计算了对卡西米尔能量和与几何相关的拓扑质量生成的显式贡献。", "authors": [{"name": "Claudio Bórquez"}, {"name": "Byron Droguett"}], "featured_authors": [{"name": "Claudio Bórquez"}, {"name": "Byron Droguett"}], "author_count": 2}, {"id": "2604.14387", "category": "hep-th", "title": "Emergent States and Algebras from the Double-Scaling limit of Pure States in SYK", "abstract": "Recent work has emphasized a subtlety of large- $N$ limits in AdS/CFT: a sequence of pure states in the microscopic theory need not remain pure with respect to the emergent algebra of observables. We study this phenomenon for Kourkoulou-Maldacena (KM) states in the double-scaling limit of the SYK model, and show that their ensemble-averaged algebraic description depends crucially on which observables survive the limit. For fermionic operators of size $N^{1/2}$, generic operators converge to the usual chord operators of double-scaled SYK. The resulting von Neumann algebra is the standard Type II$_1$ factor, and the KM pure states at infinite temperature converge to the tracial state, so generic probes lose access to microscopic purity. We then identify a class of operators adapted to the KM state that also survives the double-scaling limit. Since the KM state may be viewed as a projection inside the tracial state, these become dressed chord creation and annihilation operators. Once included, the limiting algebra becomes Type I$_\\infty$ and the limiting state becomes pure. This gives a concrete example in which adding a sufficiently state-adapted operator to the emergent algebra restores access to the purity of the underlying state. We further show that correlators of the dressed operators admit exact modified chord-diagram rules, derive analytic expressions for uncrossed $2n$-point and crossed four-point functions, analyze their finite-temperature semiclassical and Schwarzian limits, study a deformation of the chord Hamiltonian that produces bound states and extends the correspondence with JT gravity plus an EOW brane to general brane tension, and identify an emergent $U(1)$ symmetry together with its finite-$N$ violation. Finally, we discuss analogies with boundary algebras proposed for black hole interiors and closed universes, and suggest lessons from our construction for both.", "url": "https://arxiv.org/abs/2604.14387", "type": "理论", "summary": "最近的工作强调了 AdS/CFT 中大 $N$ 限制的微妙之处：微观理论中的一系列纯态不需要在可观测量的涌现代数方面保持纯态。我们在 SYK 模型的双标度极限下研究了 Kourkoulou-Maldacena (KM) 态的这种现象，并表明它们的集合平均代数描述关键取决于哪些可观测量能够突破极限。对于大小为 $N^{1/2}$ 的费米子算子，通用算子收敛到双尺度 SYK 的常用弦算子。由此产生的冯·诺依曼代数是标准的 II$_1$ 因子，并且无限温度下的 KM 纯态收敛到迹线态，因此通用探针无法获得微观纯度。然后，我们确定一类适合 KM 状态的运算符，这些运算符也能承受双缩放限制。由于 KM 状态可以被视为轨迹状态内的投影，因此这些成为修饰的和弦创建和消灭算子。一旦包含在内，极限代数就变成类型 I$_\\infty$ 并且极限状态变成纯的。\n\n这给出了一个具体的例子，其中向涌现代数添加一个足够状态适应的算子可以恢复对基础状态纯度的访问。我们进一步表明，修饰算子的相关器承认精确修改的弦图规则，推导未交叉$2n$点和交叉四点函数的解析表达式，分析它们的有限温度半经典和施瓦茨极限，研究产生束缚态的弦哈密顿量的变形，并将与JT引力加上EOW膜的对应关系扩展到一般膜张力，并识别新出现的$U(1)$对称性及其有限$N$违规。最后，我们讨论了与黑洞内部和封闭宇宙提出的边界代数的类比，并提出了我们对两者的构造的经验教训。", "authors": [{"name": "Harshit Rajgadia"}, {"name": "Jiuci Xu"}], "featured_authors": [{"name": "Harshit Rajgadia"}, {"name": "Jiuci Xu"}], "author_count": 2}, {"id": "2604.14436", "category": "hep-th", "title": "Half-BPS Impurity Backgrounds and Supersymmetry", "abstract": "We develop a rigid $\\mathscr{N} =(1,1)$ superspace framework for spatially inhomogeneous impurity deformations in $D=1+1$ dimensions by embedding the impurity profile into a real background superfield (spurion). This spurionic completion provides a manifestly supersymmetric description at the level of the action and offers a systematic route to identify which inhomogeneous backgrounds preserve a nontrivial subset of supercharges. Focusing on static interface-type configurations, we determine the half-BPS condition on the spurion background and the corresponding supersymmetry projector. In the resulting half-BPS sector we derive the associated first-order BPS equation for static bosonic matter configurations and establish an exact Bogomol'nyi completion of the static energy, yielding a sharp bound saturated by BPS solutions. We further comment on how explicit coordinate dependence and derivative-dependent impurity couplings can obstruct the Bogomol'nyi structure, thereby motivating spurionic extensions that retain supersymmetric control over inhomogeneous deformations.", "url": "https://arxiv.org/abs/2604.14436", "type": "理论", "summary": "我们通过将杂质轮廓嵌入到真实的背景超场（杂散）中，开发了一个严格的 $\\mathscr{N} =(1,1)$ 超空间框架，用于 $D=1+1$ 维度上的空间不均匀杂质变形。这种杂散完成在作用水平上提供了明显的超对称描述，并提供了一种系统途径来识别哪些不均匀背景保留了不平凡的增压子集。着眼于静态接口类型的配置，我们确定了杂散背景上的半BPS条件和相应的超对称投影仪。在所得的半 BPS 扇区中，我们推导了静态玻色子物质构型的相关一阶 BPS 方程，并建立了静态能量的精确 Bogomol'nyi 完成，产生了 BPS 解饱和的锐界。我们进一步评论了明确的坐标依赖性和导数依赖性杂质耦合如何阻碍 Bogomol'nyi 结构，从而激发对不均匀变形保持超对称控制的杂散扩展。", "authors": [{"name": "D. Bazeia"}, {"name": "A. C. Lehum"}], "featured_authors": [{"name": "D. Bazeia"}, {"name": "A. C. Lehum"}], "author_count": 2}, {"id": "2604.14453", "category": "hep-th", "title": "Thermality Breakdown in Null-Shifted Rindler Wedges", "abstract": "We investigate the behaviour of quantum fields in null-shifted Rindler wedges and analyse the particle spectra perceived by accelerated observers associated with these null deformations. Unlike the standard Unruh effect, our analysis compares two accelerated frames connected by a null displacement. We consider both massive scalar and Dirac
