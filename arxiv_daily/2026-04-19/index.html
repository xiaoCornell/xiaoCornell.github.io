A. Perlin"}, {"name": "Robert J. Lewis-Swan"}], "author_count": 7}, {"id": "2604.15214", "category": "quant-ph", "title": "Optimal algorithmic complexity of inference in quantum kernel methods", "abstract": "Quantum kernel methods are among the leading candidates for achieving quantum advantage in supervised learning. A key bottleneck is the cost of inference: evaluating a trained model on new data requires estimating a weighted sum $\\sum_{i=1}^N \\alpha_i k(x,x_i)$ of $N$ kernel values to additive precision $\\varepsilon$, where $\\alpha$ is the vector of trained coefficients. The standard approach estimates each term independently via sampling, yielding a query complexity of $O(N\\lVert\\alpha\\rVert_2^2/\\varepsilon^2)$. In this work, we identify two independent axes for improvement: (1) How individual kernel values are estimated (sampling versus quantum amplitude estimation), and (2) how the sum is approximated (term-by-term versus via a single observable), and systematically analyze all combinations thereof. The query-optimal combination, encoding the full inference sum as the expectation value of a single observable and applying quantum amplitude estimation, achieves a query complexity of $O(\\lVert\\alpha\\rVert_1/\\varepsilon)$, removing the dependence on $N$ from the query count and yielding a quadratic improvement in both $\\lVert\\alpha\\rVert_1$ and $\\varepsilon$. We prove a matching lower bound of $\\Omega(\\lVert\\alpha\\rVert_1/\\varepsilon)$, establishing query-optimality of our approach up to logarithmic factors. Beyond query complexity, we also analyze how these improvements translate into gate costs and show that the query-optimal strategy is not always optimal in practice from the perspective of gate complexity. Our results provide both a query-optimal algorithm and a practically optimal choice of strategy depending on hardware capabilities, along with a complete landscape of intermediate methods to guide practitioners. All algorithms require only amplitude estimation as a subroutine and are thus natural candidates for early-fault-tolerant implementations.", "url": "https://arxiv.org/abs/2604.15214", "type": "理论+数值", "summary": "量子核方法是在监督学习中实现量子优势的主要候选方法之一。一个关键瓶颈是推理成本：在新数据上评估经过训练的模型需要估计 $N$ 内核值的加权和 $\\sum_{i=1}^N \\alpha_i k(x,x_i)$ 到附加精度 $\\varepsilon$，其中 $\\alpha$ 是训练系数的向量。标准方法通过采样独立估计每个项，产生 $O(N\\lVert\\alpha\\rVert_2^2/\\varepsilon^2)$ 的查询复杂度。在这项工作中，我们确定了两个独立的改进轴：（1）如何估计各个核值（采样与量子幅度估计），以及（2）如何近似总和（逐项与通过单个可观察值），并系统地分析其所有组合。查询最优组合将完整推理和编码为单个可观测值的期望值并应用量子幅度估计，实现了 $O(\\lVert\\alpha\\rVert_1/\\varepsilon)$ 的查询复杂度，消除了查询计数中对 $N$ 的依赖，并在 $\\lVert\\alpha\\rVert_1$ 和 $\\varepsilon$ 上产生了二次改进。\n\n我们证明了 $\\Omega(\\lVert\\alpha\\rVert_1/\\varepsilon)$ 的匹配下界，建立了我们的方法达到对数因子的查询最优性。除了查询复杂性之外，我们还分析了这些改进如何转化为门成本，并表明从门复杂性的角度来看，查询最优策略在实践中并不总是最优的。我们的结果提供了查询最优算法和取决于硬件功能的实际最优策略选择，以及指导从业者的中间方法的完整景观。所有算法仅需要幅度估计作为子程序，因此是早期容错实现的自然候选者。", "authors": [{"name": "Elies Gil-fuster"}, {"name": "Seongwook Shin"}, {"name": "Sofiene Jerbi"}, {"name": "Jens Eisert"}, {"name": "Maximilian J. Kramer"}], "featured_authors": [{"name": "Elies Gil-fuster"}, {"name": "Seongwook Shin"}, {"name": "Sofiene Jerbi"}, {"name": "Jens Eisert"}, {"name": "Maximilian J. Kramer"}], "author_count": 5}, {"id": "2604.15248", "category": "quant-ph", "title": "IQP circuits for 2-Forrelation", "abstract": "The 2-Forrelation problem provides an optimal separation between classical and quantum query complexity and is also the problem used for separating $\\mathsf{BQP}$ and $\\mathsf{PH}$ relative to an oracle. A natural question is therefore to ask what are the minimal quantum resources needed to solve this problem. We show that 2-Forrelation can be solved using Instantaneous Quantum Polynomial-time ($\\mathsf{IQP}$) circuits, a restricted model of quantum computation in which all gates commute. Concretely, two $\\mathsf{IQP}$ circuits with two quantum queries and efficient classical processing suffice. For the signed variant of 2-Forrelation, even a single $\\mathsf{IQP}$ circuit and query suffices. This answers a recent open question of Girish ( arXiv:2510.06385 ) on the power of commuting quantum computations. We use this to show that $(\\mathsf{BPP}^{\\mathsf{IQP}})^O \\not\\subseteq \\mathsf{PH}^O$ relative to an oracle $O$, strengthening the result of Raz and Tal (STOC 2019). Our results show that $\\mathsf{IQP}$ circuits can be used for classically hard decision problems, thus providing a new route for showing quantum advantage with $\\mathsf{IQP}$ circuits, avoiding the verification difficulties associated with sampling tasks. We also prove Fourier growth bounds for $\\mathsf{IQP}$ circuits in terms of the size of their accepting set. The key ingredient is an algebraic identity of the quadratic function $Q(x) = \\sum_{i < j} x_ix_j$ that allows extracting inner-product phases within an $\\mathsf{IQP}$ circuit.", "url": "https://arxiv.org/abs/2604.15248", "type": "理论+数值", "summary": "2-Forrelation 问题提供了经典查询复杂性和量子查询复杂性之间的最佳分离，也是用于相对于预言机分离 $\\mathsf{BQP}$ 和 $\\mathsf{PH}$ 的问题。因此，一个自然的问题是解决这个问题所需的最小量子资源是多少。我们证明了 2-Forrelation 可以使用瞬时量子多项式时间 ($\\mathsf{IQP}$) 电路来求解，这是一种所有门都可交换的量子计算的受限模型。具体来说，两个带有两个量子查询和高效经典处理的 $\\mathsf{IQP}$ 电路就足够了。对于 2-Forrelation 的有符号变体，甚至单个 $\\mathsf{IQP}$ 电路和查询就足够了。这回答了 Girish (arXiv:2510.06385) 最近关于通勤量子计算能力的开放问题。我们用它来证明 $(\\mathsf{BPP}^{\\mathsf{IQP}})^O \\not\\subseteq \\mathsf{PH}^O$ 相对于预言机 $O$，加强了 Raz 和 Tal 的结果 (STOC 2019)。\n\n我们的结果表明，$\\mathsf{IQP}$电路可用于经典的硬决策问题，从而为利用$\\mathsf{IQP}$电路展示量子优势提供了一条新途径，避免了与采样任务相关的验证困难。我们还根据接受集的大小证明了 $\\mathsf{IQP}$ 电路的傅里叶增长界限。关键成分是二次函数 $Q(x) = \\sum_{i < j} x_ix_j$ 的代数恒等式，它允许在 $\\mathsf{IQP}$ 电路中提取内积相位。", "authors": [{"name": "Quentin Buzet"}, {"name": "André Chailloux"}], "featured_authors": [{"name": "Quentin Buzet"}, {"name": "André Chailloux"}], "author_count": 2}, {"id": "2604.15263", "category": "quant-ph", "title": "Computing the free energy of quantum Coulomb gases and molecules via quantum Gibbs sampling", "abstract": "We develop a quantum algorithm for estimating the free energy as well as the total Gibbs state of interacting quantum Coulomb gases and molecular systems in dimensions $d \\in \\{2,3\\}$ at finite temperature. These systems lie beyond the reach of existing methods due to their singular interactions and infinite-dimensional Hilbert space structure. First, we show that the free energy of the full many-body Hamiltonian can be approximated by that of the same Hamiltonian with a finite-rank low-energy truncation of the interaction, with an explicit error bound polynomial in the particle number. This reduces the problem to a controlled finite-rank perturbation problem. Second, we introduce a quantum Gibbs sampling scheme tailored to this truncated system, based on a class of quantum Markov semigroups. Our main analytical result establishes that the associated generator has a strictly positive spectral gap for every truncation, implying exponential convergence to the target Gibbs state. This provides, to our knowledge, the first rigorous mixing-time guarantee for Gibbs sampling in a Coulomb interacting continuous-variable quantum system. Finally, we give an explicit quantum circuit implementation of the dynamics and derive an end-to-end complexity bound for approximating the free energy and the Gibbs state itself. Our results provide a mathematically rigorous route to quantum algorithms for free energy estimation in interacting quantum systems, without relying on classical approximations such as the Born-Oppenheimer reduction.", "url": "https://arxiv.org/abs/2604.15263", "type": "理论+数值", "summary": "我们开发了一种量子算法，用于估计有限温度下 $d \\in \\{2,3\\}$ 维度中相互作用的量子库仑气体和分子系统的自由能以及总吉布斯态。由于它们的奇异相互作用和无限维希尔伯特空间结构，这些系统超出了现有方法的范围。首先，我们表明，完整的多体哈密顿量的自由能可以通过具有相互作用的有限秩低能量截断的相同哈密顿量的自由能来近似，并且粒子数中具有显式误差界限多项式。这将问题简化为受控有限秩扰动问题。其次，我们基于一类量子马尔可夫半群，引入了针对该截断系统量身定制的量子吉布斯采样方案。我们的主要分析结果表明，关联的生成器对于每次截断都具有严格的正谱间隙，这意味着指数收敛到目标吉布斯状态。据我们所知，这为库仑相互作用连续变量量子系统中的吉布斯采样提供了第一个严格的混合时间保证。\n\n最后，我们给出了动力学的显式量子电路实现，并推导了近似自由能和吉布斯态本身的端到端复杂性界限。我们的结果为相互作用量子系统中自由能估计的量子算法提供了一条数学上严格的途径，而不依赖于玻恩-奥本海默约简等经典近似。", "authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "featured_authors": [{"name": "Simon Becker"}, {"name": "Cambyse Rouzé"}, {"name": "Robert Salzmann"}], "author_count": 3}, {"id": "2604.15269", "category": "quant-ph", "title": "Cloning is as Hard as Learning for Stabilizer States", "abstract": "The impossibility of simultaneously cloning non-orthogonal states lies at the foundations of quantum theory. Even when allowing for approximation errors, cloning an arbitrary unknown pure state requires as many initial copies as needed to fully learn the state. Rather than arbitrary unknown states, modern quantum learning theory often considers structured classes of states and exploits such structure to develop learning algorithms that outperform general-state tomography. This raises the question: How do the sample complexities of learning and cloning relate for such structured classes? We answer this question for an important class of states. Namely, for $n$-qubit stabilizer states, we show that the optimal sample complexity of cloning is $\\Theta(n)$. Thus, also for this structured class of states, cloning is as hard as learning. To prove these results, we use representation-theoretic tools in the recently proposed Abelian State Hidden Subgroup framework and a new structured version of the recently introduced random purification channel to relate stabilizer state cloning to a variant of the sample amplification problem for probability distributions that was recently introduced in classical learning theory. This allows us to obtain our cloning lower bounds by proving new sample amplification lower bounds for classes of distributions with an underlying linear structure. Our results provide a more fine-grained perspective on No-Cloning theorems, opening up connections from foundations to quantum learning theory and quantum cryptography.", "url": "https://arxiv.org/abs/2604.15269", "type": "理论+数值", "summary": "同时克隆非正交态的不可能性是量子理论的基础。即使允许近似误差，克隆任意未知的纯状态也需要尽可能多的初始副本来完全学习该状态。现代量子学习理论通常考虑结构化的状态类别，并利用这种结构来开发优于一般状态层析成像的学习算法，而不是任意的未知状态。这就提出了一个问题：学习和克隆的样本复杂性与此类结构化课程有何关系？我们为一类重要的国家回答这个问题。也就是说，对于 $n$ 个量子位稳定器状态，我们表明克隆的最佳样本复杂度是 $\\Theta(n)$。因此，对于这种结构化的国家类别来说，克隆和学习一样困难。\n\n为了证明这些结果，我们在最近提出的阿贝尔状态隐藏子群框架中使用表示理论工具，以及最近引入的随机净化通道的新结构化版本，将稳定器状态克隆与最近在经典学习理论中引入的概率分布的样本放大问题的变体联系起来。这使我们能够通过证明具有基础线性结构的分布类别的新样本扩增下限来获得克隆下限。我们的结果为不可克隆定理提供了更细粒度的视角，开辟了从基础到量子学习理论和量子密码学的联系。", "authors": [{"name": "Nikhil Bansal"}, {"name": "Matthias C. Caro"}, {"name": "Gaurav Mahajan"}], "featured_authors": [{"name": "Nikhil Bansal"}, {"name": "Matthias C. Caro"}, {"name": "Gaurav Mahajan"}], "author_count": 3}, {"id": "2604.15298", "category": "quant-ph", "title": "Super-Constant Weight Dicke States in Constant Depth Without Fanout", "abstract": "An $n$-qubit Dicke state of weight $k$, is the uniform superposition over all $n$-bit strings of Hamming weight $k$. Dicke states are an entanglement resource with important practical applications in the NISQ era and, for instance, play a central role in Decoded Quantum Interferometry (DQI). Furthermore, any symmetric state can be expressed as a superposition of Dicke states. First, we give explicit constant-depth circuits that prepare $n$-qubit Dicke states for all $k \\leq \\text{polylog}(n)$, using only multi-qubit Toffoli gates and single-qubit unitaries. This gives the first $\\text{QAC}^0$ construction of super-constant weight Dicke states. Previous constant-depth constructions for any super-constant $k$ required the FANOUT$_n$ gate, while $\\text{QAC}^0$ is only known to implement FANOUT$_k$ for $k$ up to $\\text{polylog}(n)$. Moreover, we show that any weight-$k$ Dicke state can be constructed with access to FANOUT$_{\\min(k,n-k)}$, rather than FANOUT$_n$. Combined with recent hardness results, this yields a tight characterization: for $k \\leq n/2$, weight-$k$ Dicke states can be prepared in $\\text{QAC}^0$ if and only if FANOUT$_k \\in \\text{QAC}^0$. We further extend our techniques to show that, in fact, \\emph{any} superposition of $n$-qubit Dicke states of weight at most $k$ can be prepared in $\\text{QAC}^0$ with access to FANOUT$_k$. Taking $k = n$, we obtain the first $O(1)$-depth unitary construction for arbitrary symmetric states. In particular, any symmetric state can be prepared in constant depth on quantum hardware architectures that support FANOUT$_n$, such as trapped ions with native global entangling operations.", "url": "https://arxiv.org/abs/2604.15298", "type": "理论", "summary": "权重 $k$ 的 $n$ 位迪克状态是汉明权重 $k$ 的所有 $n$ 位字符串的均匀叠加。迪克态是一种纠缠资源，在 NISQ 时代具有重要的实际应用，例如在解码量子干涉测量 (DQI) 中发挥着核心作用。此外，任何对称态都可以表示为迪克态的叠加。首先，我们给出显式的恒定深度电路，仅使用多量子位 Toffoli 门和单量子位酉，为所有 $k \\leq \\text{polylog}(n)$ 准备 $n$-量子位 Dicke 状态。这给出了超恒权迪克状态的第一个 $\\text{QAC}^0$ 构造。以前任何超常数 $k$ 的恒定深度构造都需要 FANOUT$_n$ 门，而 $\\text{QAC}^0$ 只知道对 $k$ 到 $\\text{polylog}(n)$ 实现 FANOUT$_k$。此外，我们证明任何权重 $k$ Dicke 状态都可以通过访问 FANOUT$_{\\min(k,n-k)}$ 而不是 FANOUT$_n$ 来构造。结合最近的硬度结果，这产生了严格的表征：对于 $k \\leq n/2$，当且仅当 FANOUT$_k \\in \\text{QAC}^0$ 时，可以在 $\\text{QAC}^0$ 中准备权重 $k$ 迪克状态。\n\n我们进一步扩展我们的技术，表明事实上，权重最多为 $k$ 的 $n$-qubit Dicke 状态的 \\emph{any} 叠加可以在 $\\text{QAC}^0$ 中准备，并且可以访问 FANOUT$_k$。取 $k = n$，我们获得任意对称态的第一个 $O(1)$ 深度酉构造。特别是，可以在支持 FANOUT$_n$ 的量子硬件架构上以恒定深度准备任何对称状态，例如具有本机全局纠缠操作的捕获离子。", "authors": [{"name": "Lucas Gretta"}, {"name": "Meghal Gupta"}, {"name": "Malvika Raj Joshi"}], "featured_authors": [{"name": "Lucas Gretta"}, {"name": "Meghal Gupta"}, {"name": "Malvika Raj Joshi"}], "author_count": 3}, {"id": "2604.15300", "category": "quant-ph", "title": "Ensembles of random quantum states tunable from volume law to area law", "abstract": "A standard approach to generate random pure quantum states relies on sampling from the Haar measure. However, the entanglement properties of such states present a fundamental challenge for their general applicability. Here, we introduce the $\\sigma$-ensembles $\\unicode{x2013}$ a family of random quantum states with only a single control parameter. Crucially, these states are designed such that they can be tuned between volume-law and area-law behavior, which has been a major obstacle thus far. We construct representatives of this ensemble by imposing a probability distribution on the eigenvalues of the successive subsystems, and subsequently reconstructing a compatible global state using the matrix product state (MPS) formalism. Due to their area-law entanglement, our approach circumvents the intractability of Haar-random pure states in classical simulations of quantum systems and is more representative of typical Hamiltonian ground states.", "url": "https://arxiv.org/abs/2604.15300", "type": "理论+数值", "summary": "生成随机纯量子态的标准方法依赖于哈尔测量的采样。然而，这种状态的纠缠特性对其普遍适用性提出了根本性挑战。在这里，我们引入 $\\sigma$-ensembles $\\unicode{x2013}$ 一组仅具有单个控制参数的随机量子态。至关重要的是，这些状态的设计使得它们可以在体积定律和面积定律行为之间进行调整，这是迄今为止的一个主要障碍。我们通过对连续子系统的特征值施加概率分布来构造该系综的代表，然后使用矩阵乘积状态（MPS）形式重建兼容的全局状态。由于它们的面积律纠缠，我们的方法规避了量子系统经典模拟中哈尔随机纯态的棘手性，并且更能代表典型的哈密顿基态。", "authors": [{"name": "Héloïse Albot"}, {"name": "Sebastian Paeckel"}], "featured_authors": [{"name": "Héloïse Albot"}, {"name": "Sebastian Paeckel"}], "author_count": 2}, {"id": "2604.15307", "category": "quant-ph", "title": "Heuristic Search for Minimum-Distance Upper-Bound Witnesses in Quantum APM-LDPC Codes", "abstract": "This paper investigates certified upper bounds on the minimum distance of an explicit family of Calderbank-Shor-Steane quantum LDPC codes constructed from affine permutation matrices. All codes considered here have active Tanner graphs of girth eight. Rather than attempting to prove a general lower bound for the full code distance, we focus on constructing low-weight non-stabilizer logical representatives, which yield valid upper bounds once they are verified to lie in the opposite parity-check kernel and outside the stabilizer row space. We develop a unified framework for such witnesses arising from latent row relations, restricted-lift subspaces including block-compressed, selected-fiber, and CRT-stripe constructions, cycle- 8 elementary trapping-set structures, and decoder-failure residuals. In every case, search is used only to generate candidates; the reported bounds begin only after explicit kernel and row-space exclusion tests have been passed. For the latent part, we also identify a block-compression criterion under which the certification becomes exact. Applying these methods to representative APM-LDPC codes sharpens previously reported upper bounds and provides concrete certified values across the explored parameter range.", "url": "https://arxiv.org/abs/2604.15307", "type": "理论", "summary": "本文研究了由仿射置换矩阵构造的显式 Calderbank-Shor-Steane 量子 LDPC 码家族的最小距离的经认证上限。这里考虑的所有代码都具有周长为 8 的活动 Tanner 图。我们不是试图证明完整代码距离的一般下界，而是专注于构造低权重的非稳定器逻辑代表，一旦验证它们位于相反的奇偶校验内核中并且在稳定器行空间之外，它们就会产生有效的上限。我们为这些由潜在行关系、限制提升子空间（包括块压缩、选择光纤和 CRT 条带结构）、周期 8 基本捕获集结构和解码器故障残差产生的证据开发了一个统一的框架。在每种情况下，搜索仅用于生成候选者；报告的边界仅在通过显式内核和行空间排除测试后才开始。对于潜在部分，我们还确定了一个块压缩标准，在该标准下认证变得准确。\n\n将这些方法应用于代表性的 APM-LDPC 码可以锐化之前报告的上限，并在探索的参数范围内提供具体的认证值。", "authors": [{"name": "Kenta Kasai"}], "featured_authors": [{"name": "Kenta Kasai"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
