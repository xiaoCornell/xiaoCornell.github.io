  <script>
    const papers = [{"id": "2604.24789", "category": "cond-mat", "title": "Conductance fluctuations in random resistor networks with hyperuniform disorder", "abstract": "We study conductance fluctuations in random resistor networks with hyperuniform bond disorder, where the fluctuations of the number of bonds present in a test volume $V$ scale as $V^{-a}$ with $a > 1/2$. Since small changes in the concentration of bonds present in a local region give rise to a proportionate increase in the locally averaged conductance, one may expect that in hyperuniform disorder, conductance fluctuations will also show suppressed fluctuations. We argue that this is not the case: conductance fluctuations scale as $L^{-d/2}$ for a sampling size $L$. We show numerical results for $d=2$.", "url": "https://arxiv.org/abs/2604.24789", "type": "数值", "summary": "我们研究具有超均匀键无序的随机电阻网络中的电导波动，其中测试体积 $V$ 中存在的键数量的波动为 $V^{-a}$，其中 $a > 1/2$。由于局部区域中存在的键浓度的微小变化会引起局部平均电导的成比例增加，因此人们可以预期，在超均匀无序中，电导波动也将表现出受抑制的波动。我们认为事实并非如此：对于采样大小 $L$，电导波动按 $L^{-d/2}$ 缩放。我们显示 $d=2$ 的数值结果。", "authors": [{"name": "Bikram Pal"}], "featured_authors": [{"name": "Bikram Pal"}], "author_count": 1}, {"id": "2604.24802", "category": "cond-mat", "title": "Thermoinformational State Construction: Generative Energies, Entropies, and H-Theorem Consistency", "abstract": "We introduce a constructive framework for assigning thermodynamic structure to an arbitrary data system from its measured microstates. Starting from an empirical distribution over configurations, we first infer a data-driven energy function by fitting a Boltzmann-type model to the observed statistics, thereby defining an energy axis that is intrinsic to the system. We then push the empirical distribution onto this energy coordinate and pose an inverse maximum-entropy problem: we learn a strictly concave trace-form entropy functional whose maximizer, under a small set of constraints extracted from the data, reproduces the observed energy-space histogram. With energy and entropy defined in this coupled, system-specific manner, macroscopic variables such as internal energy, an entropy-energy relation S(U), and a thermoinformational temperature T^(-1)= dS/dU follow consistently along admissible families of states. We demonstrate the construction on canonical unimodal and multimodal examples, including a harmonic well (recovering the classical equilibrium limit up to gauge) and a bistable double-well where global-constraint MaxEnt surrogates can obscure barrier and coexistence structure. The resulting formulation provides a principled route from microstate data to thermodynamically consistent macroscopic descriptors, with an optimized entropy matched to the empirical system.", "url": "https://arxiv.org/abs/2604.24802", "type": "理论+数值", "summary": "我们引入了一个构造性框架，用于根据测量的微观状态将热力学结构分配给任意数据系统。从配置的经验分布开始，我们首先通过将玻尔兹曼型模型拟合到观察到的统计数据来推断数据驱动的能量函数，从而定义系统固有的能量轴。然后，我们将经验分布推到这个能量坐标上，并提出一个逆最大熵问题：我们学习一个严格凹迹形式的熵函数，其最大化器在从数据中提取的一小组约束下再现了观察到的能量空间直方图。通过以这种耦合的、特定于系统的方式定义能量和熵，诸如内能、熵-能量关系 S(U) 和热信息温度 T^(-1)= dS/dU 等宏观变量始终遵循可接受的状态族。\n\n我们演示了典型单峰和多峰示例的构造，包括调和阱（恢复高达规范的经典平衡极限）和双稳态双阱，其中全局约束 MaxEnt 代理可以掩盖势垒和共存结构。由此产生的公式提供了从微观状态数据到热力学一致的宏观描述符的原则性途径，并具有与经验系统相匹配的优化熵。", "authors": [{"name": "George-Rafael Domenikos"}, {"name": "Lock Yue Chew"}, {"name": "Victoria Leong"}], "featured_authors": [{"name": "George-Rafael Domenikos"}, {"name": "Lock Yue Chew"}, {"name": "Victoria Leong"}], "author_count": 3}, {"id": "2604.24816", "category": "cond-mat", "title": "Trillion-atom molecular dynamics simulations with ab initio accuracy", "abstract": "Material properties are fundamentally dictated by multiscale phenomena, which often reach mesoscale in size. The {\\mu}m mesoscale is also the size which can be observed directly under an optical microscope, bridging the atomistic microscopic description with the continuous model macroscopic world. In this work, we report an unprecedented molecular dynamics (MD) simulation comprising 1.62 trillion atoms. Utilizing the neuroevolution potential (NEP) framework, we attained ab initio accuracy on China's New-generation Intelligent Supercomputer. Our implementation achieves a time-to-solution (s/step/atom) 100 times faster than previous state-of-the-art machine learning force field simulations, and 1,000 times faster than the Gordon Bell Prize-winning application from six years ago. Furthermore, we demonstrate an 86.9% weak scaling efficiency from a single GPGPU to 45,000 GPGPUs. These results redefine atomistic simulation boundaries, enabling direct mesoscopic modeling with quantum-level precision.", "url": "https://arxiv.org/abs/2604.24816", "type": "理论+数值", "summary": "材料特性从根本上来说是由多尺度现象决定的，这些现象的尺寸通常达到介尺度。 {\\mu}m介观尺度也是可以在光学显微镜下直接观察到的尺寸，将原子微观描述与连续模型宏观世界联系起来。在这项工作中，我们报告了前所未有的包含 1.62 万亿个原子的分子动力学 (MD) 模拟。利用神经进化势（NEP）框架，我们在中国新一代智能超级计算机上获得了从头算的精度。我们的实现实现的解决时间 (s/step/atom) 比以前最先进的机器学习力场模拟快 100 倍，比六年前的戈登贝尔奖获奖应用程序快 1,000 倍。此外，我们还证明了从单个 GPGPU 到 45,000 个 GPGPU 的弱扩展效率为 86.9%。这些结果重新定义了原子模拟边界，实现了具有量子级精度的直接介观建模。", "authors": [{"name": "Pengfei Suo"}, {"name": "Wudi Cao"}, {"name": "Xingxing Wu"}, {"name": "Wenjie Zhang"}, {"name": "Zheyong Fan"}, {"name": "Shuanghan Xian"}, {"name": "Rui Wang"}, {"name": "Cheng Qian"}, {"name": "Chao Liang"}, {"name": "Qinghong Yuan"}, {"name": "Xiaoshuang Chen"}, {"name": "Pengfei Guan"}, {"name": "Jingde Bu"}, {"name": "Hongzhen Tian"}, {"name": "Yanjing Su"}, {"name": "Feng Ding"}, {"name": "Lin-Wang Wang"}], "featured_authors": [{"name": "Pengfei Suo"}, {"name": "Wudi Cao"}, {"name": "Xingxing Wu"}, {"name": "Yanjing Su"}, {"name": "Feng Ding"}, {"name": "Lin-Wang Wang"}], "author_count": 17}, {"id": "2604.24840", "category": "cond-mat", "title": "Quantum Rotors on the Fuzzy Sphere and the Cubic CFT", "abstract": "The three-dimensional cubic conformal field theory governs the critical behaviour of Heisenberg magnets with cubic anisotropy. Studying this theory non-perturbatively is challenging, because its most easily accessible observables are numerically very close to those of the more symmetric $O(3)$ model. In this work, we overcome this difficulty using the fuzzy sphere regularisation method. By adding a cubic-invariant two-body interaction to the quantum rotor Hamiltonian used for the $O(3)$ model, we break the continuous rotational symmetry by construction and unambiguously isolate the cubic critical point. Using exact diagonalisation and the density matrix renormalisation group, we calculate the scaling dimensions of several key operators, including the leading scalar singlets, and resolve the splitting of the $O(3)$ rank-two traceless symmetric tensor into the $E_g$ and $T_{2g}$ representations of the cubic group. Our results are consistent with existing Monte Carlo, conformal perturbation theory, and $\\varepsilon$ expansion benchmarks, demonstrating the power of the fuzzy sphere in resolving closely spaced universality classes.", "url": "https://arxiv.org/abs/2604.24840", "type": "理论+数值", "summary": "三维立方共形场理论控制着具有立方各向异性的海森堡磁体的临界行为。以非微扰方式研究该理论具有挑战性，因为其最容易获得的可观测量在数值上非常接近更对称的 $O(3)$ 模型。在这项工作中，我们使用模糊球正则化方法克服了这个困难。通过在 $O(3)$ 模型中使用的量子转子哈密顿量中添加立方不变二体相互作用，我们通过构造打破了连续旋转对称性，并明确地隔离了立方临界点。使用精确对角化和密度矩阵重正化群，我们计算了几个关键算子的缩放维数，包括前导标量单峰，并将$O(3)$二阶无迹对称张量分解为立方群的$E_g$和$T_{2g}$表示。我们的结果与现有的蒙特卡罗、共形微扰理论和$\\varepsilon$展开基准一致，证明了模糊球在解决紧密分布的普遍性类方面的能力。", "authors": [{"name": "Andreas Stergiou"}], "featured_authors": [{"name": "Andreas Stergiou"}], "author_count": 1}, {"id": "2604.24848", "category": "cond-mat", "title": "Magnetic phases of the anisotropic triangular Hubbard model from the ghost-Gutzwiller approximation in the rotating spin-frame", "abstract": "We investigate the magnetic phase diagram of the half-filled Hubbard model on the anisotropic triangular lattice using the Gutzwiller approximation (GA) and its ghost generalization (ghost-GA). By combining a rotating spin-frame formulation with high-resolution momentum grids, we determine magnetic ground states through direct total-energy minimization over the ordering wavevector. We benchmark standard GA and ghost-GA against dynamical mean-field theory (DMFT) and dual-fermion results. We show that GA already captures the qualitative structure of the phase diagram, but systematically overestimates the stability of magnetic order due to the absence of dynamical fluctuations. We find that introducing a small number of auxiliary ''ghost'' orbitals is sufficient to recover most dynamical effects and significantly improves quantitative agreement with DMFT. Exploring the full Brillouin zone, we obtain a phase diagram comprising paramagnetic and various magnetic phases. In contrast to ladder dual-fermion susceptibility-based predictions, we find that the one-dimensional antiferromagnetic phase is never stabilized, despite being the leading instability in certain regimes. Our results establish ghost-GA as an efficient and systematically improvable framework for studying magnetism in frustrated systems, capable of achieving near-DMFT accuracy at a fraction of the computational cost. They also highlight that standard GA performs qualitatively well for capturing the general phase diagram, enabling the investigation of incommensurate magnetic orders in more complex systems.", "url": "https://arxiv.org/abs/2604.24848", "type": "理论+数值", "summary": "我们使用 Gutzwiller 近似 (GA) 及其幽灵泛化 (ghost-GA) 研究了各向异性三角晶格上半填充 Hubbard 模型的磁相图。通过将旋转自旋框架公式与高分辨率动量网格相结合，我们通过有序波矢量的直接总能量最小化来确定磁基态。我们根据动态平均场理论 (DMFT) 和双费米子结果对标准 GA 和 Ghost-GA 进行基准测试。我们表明，遗传算法已经捕获了相图的定性结构，但由于缺乏动态波动，系统地高估了磁序的稳定性。我们发现引入少量辅助“鬼”轨道足以恢复大部分动力学效应，并显着提高与 DMFT 的定量一致性。探索整个布里渊区，我们获得了包含顺磁相和各种磁相的相图。与基于梯形双费米子磁化率的预测相反，我们发现一维反铁磁相从未稳定，尽管在某些情况下是主要的不稳定性。\n\n我们的结果将 Ghost-GA 确立为一种有效且可系统改进的框架，用于研究受挫系统中的磁性，能够以一小部分计算成本实现接近 DMFT 的精度。他们还强调，标准遗传算法在捕获一般相图方面表现良好，能够在更复杂的系统中研究不相称的磁序。", "authors": [{"name": "Azin Kazemi-Moridani"}, {"name": "Samuele Giuli"}, {"name": "Tsung-Han Lee"}, {"name": "A.-M. S. Tremblay"}, {"name": "Michel Côté"}, {"name": "Nicola Lanatà"}, {"name": "Olivier Gingras"}], "featured_authors": [{"name": "Azin Kazemi-Moridani"}, {"name": "Samuele Giuli"}, {"name": "Tsung-Han Lee"}, {"name": "Michel Côté"}, {"name": "Nicola Lanatà"}, {"name": "Olivier Gingras"}], "author_count": 7}, {"id": "2604.24859", "category": "cond-mat", "title": "Dispersion of Anyon Bloch Bands", "abstract": "Fractional Chern insulators (FCIs) are zero magnetic field analogs of fractional quantum Hall states. While the electrons forming an FCI are not subject to an external magnetic field, their anyonic excitations experience a magnetic field with finite-flux due to a many-body Berry phase, whose lattice periodicity generically induces some dispersion. From Laughlin wavefunctions at filling 1/m, we analytically construct single-anyon Bloch states in an ideal band, providing a basis to efficiently compute the dispersion. The anyon spectrum exhibits an $m$-fold degeneracy in the reduced magnetic Brillouin zone (BZ), which originates from the topological degeneracy of the FCI. From our wavefunctions, we derive the m^2-fold degeneracy seen in previous works, showing it to be a splicing of anyon momenta into the electronic BZ. Finally, we find that the anyon dispersion bandwidth is controlled by quantum geometry non-uniformity, growing linearly at weak modulation and saturating at strong modulation. Remarkably, higher harmonics of the quantum geometry alone strongly suppress the dispersion, which we attribute to emergent magnetic translation symmetries. When combined with the first harmonic, a positive (negative) second harmonic drives the system toward a second- (first-) harmonic-dominated regime, thereby reducing (enhancing) the bandwidth. Our results offer an analytically controlled method for evaluating anyon spectra in ideal band FCI, shedding light on how non-uniform quantum geometry and emergent symmetries shape the dispersion of anyons.", "url": "https://arxiv.org/abs/2604.24859", "type": "理论", "summary": "分数陈绝缘体 (FCI) 是分数量子霍尔态的零磁场类似物。虽然形成 FCI 的电子不受外部磁场的影响，但由于多体 Berry 相，它们的任意子激发会经历有限通量的磁场，其晶格周期性通常会引起一些色散。根据填充 1/m 时的 Laughlin 波函数，我们分析地构造了理想带中的单任意子 Bloch 态，为有效计算色散提供了基础。任意子谱在减磁布里渊区 (BZ) 中表现出 $m$ 倍的简并性，这源于 FCI 的拓扑简并性。从我们的波函数中，我们推导出之前工作中看到的 m^2 倍简并性，表明它是任意子动量与电子 BZ 的拼接。最后，我们发现任意子色散带宽受量子几何非均匀性控制，在弱调制时线性增长，在强调制时饱和。值得注意的是，量子几何的高次谐波本身就强烈抑制了色散，我们将其归因于新兴的磁平移对称性。\n\n当与一次谐波结合时，正（负）二次谐波将系统驱动到以二次（一次）谐波为主的状态，从而减少（增强）带宽。我们的结果提供了一种分析控制方法，用于评估理想带 FCI 中的任意子光谱，揭示非均匀量子几何和涌现对称性如何塑造任意子色散。", "authors": [{"name": "Kishore Iyer"}, {"name": "Andreas Feuerpfeil"}, {"name": "Valentin Crépel"}, {"name": "Nicolas Regnault"}, {"name": "Christophe Mora"}], "featured_authors": [{"name": "Kishore Iyer"}, {"name": "Andreas Feuerpfeil"}, {"name": "Valentin Crépel"}, {"name": "Nicolas Regnault"}, {"name": "Christophe Mora"}], "author_count": 5}, {"id": "2604.24868", "category": "cond-mat", "title": "Dynamical dimer structure factor of the triangular $S=1/2$ Heisenberg antiferromagnet", "abstract": "The dynamical dimer structure factor is an observable probing spin-singlet excitations of quantum magnets distinct from those commonly studied by the spin structure factor. We report the dimer response for the extended spin-$1/2$ antiferromagnetic Heisenberg model on the triangular lattice using large-scale GPU-accelerated matrix-product-state simulations. We investigate the ordered phases with $120^\\circ$ coplanar, collinear stripe, and tetrahedral spin order, as well as candidate quantum spin-liquid (QSL) regimes, comprising an expected gapless $U(1)$ Dirac QSL and a chiral QSL at finite spin-scalar-chirality coupling. In the ordered phases, we find low-energy modes below the onset of the two-magnon continuum illustrating avoided quasiparticle decay. Within the candidate gapless QSL, we observe absolute dispersion minima at momenta of half the Brillouin zone corners, $X\\equiv K/2$, in agreement with field-theory predictions that singlet monopole excitations of the $U(1)$ Dirac spin liquid become gapless at these points. Thus, the high-resolution dynamical dimer response provides support for a $U(1)$ Dirac QSL with singlet monopole excitations.", "url": "https://arxiv.org/abs/2604.24868", "type": "理论+数值", "summary": "动态二聚体结构因子是可观察到的量子磁体的探测自旋单线态激发，与通常通过自旋结构因子研究的那些不同。我们使用大规模 GPU 加速的矩阵乘积状态模拟报告了三角晶格上扩展自旋 $1/2$ 反铁磁海森堡模型的二聚体响应。我们研究了具有 $120^\\circ$ 共面、共线条纹和四面体自旋顺序的有序相，以及候选量子自旋液体 (QSL) 体系，包括预期的无间隙 $U(1)$ 狄拉克 QSL 和有限自旋标量手性耦合下的手性 QSL。在有序相中，我们发现低于双磁振子连续体起始点的低能模式，说明避免了准粒子衰变。在候选的无间隙 QSL 中，我们观察到布里渊区角的一半动量 $X\\equiv K/2$ 处的绝对色散最小值，这与场论预测一致，即 $U(1)$ 狄拉克自旋液体的单线单极子激发在这些点处变得无间隙。因此，高分辨率动态二聚体响应为具有单线态单极子激发的 $U(1)$ Dirac QSL 提供了支持。", "authors": [{"name": "Markus Drescher"}, {"name": "Laurens Vanderstraeten"}, {"name": "Roderich Moessner"}, {"name": "Frank Pollmann"}, {"name": "Johannes Knolle"}], "featured_authors": [{"name": "Markus Drescher"}, {"name": "Laurens Vanderstraeten"}, {"name": "Roderich Moessner"}, {"name": "Frank Pollmann"}, {"name": "Johannes Knolle"}], "author_count": 5}, {"id": "2604.24872", "category": "cond-mat", "title": "Anomaly and symmetry-charge flow in mixed states", "abstract": "The $(1+1)$-dimensional chiral anomaly is a paradigmatic exact result in quantum field theory, traditionally formulated for zero-temperature pure states where it arises from spectral flow induced by external gauge fields and captures universal ground-state properties. In mixed states, however, the participation of many states and charge exchange with the environment invalidate this mechanism. Naive extensions yield model-dependent anomaly coefficients, calling its universality into question. Here, we resolve this problem for Abelian symmetries by deriving the anomaly from an algebraic relation between the symmetry and its flux-insertion operator. We obtain symmetry-charge flow, a mixed-state generalization of spectral flow, in which an applied field redistributes statistical weight across symmetry-resolved charge sectors. Fixed solely by symmetry, the anomaly restores universality and applies to both pure and mixed states in fermionic and bosonic systems. We substantiate these results in tight-binding fermionic models with continuous symmetry and in spin models with discrete symmetries.", "url": "https://arxiv.org/abs/2604.24872", "type": "理论+数值", "summary": "$(1+1)$维手性反常是量子场论中的一个典型的精确结果，传统上是针对零温纯态制定的，它是由外部规范场引起的谱流产生的，并捕获了普遍的基态特性。然而，在混合国家中，许多国家的参与以及与环境的费用交换使这一机制失效。朴素的扩展会产生依赖于模型的异常系数，使其普遍性受到质疑。在这里，我们通过从对称性与其通量插入算子之间的代数关系导出异常来解决阿贝尔对称性的这个问题。我们获得了对称电荷流，这是谱流的混合状态概括，其中应用场在对称解析的电荷扇区之间重新分配统计权重。仅通过对称性固定，该异常恢复了普遍性，并适用于费米子和玻色子系统中的纯态和混合态。我们在具有连续对称性的紧束缚费米子模型和具有离散对称性的自旋模型中证实了这些结果。", "authors": [{"name": "Ze-Min Huang"}, {"name": "Sebastian Diehl"}], "featured_authors": [{"name": "Ze-Min Huang"}, {"name": "Sebastian Diehl"}], "author_count": 2}, {"id": "2604.24883", "category": "cond-mat", "title": "Uncovering Exotic Paired States in the 2D Spin-Imbalanced Fermi Gas with Neural Wave Functions", "abstract": "We study the zero-temperature phase diagram of the 2D spin-imbalanced Fermi gas with short-ranged attractive interactions using the recently developed neural network variational Monte Carlo method with the AGPs FermiNet Ansatz. The Fulde-Ferrell-Larkin-Ovchinnikov phase is observed in the weakly interacting BCS limit and a polarised superfluid is seen in the strongly interacting BEC limit. When the interactions are strong, the minority-spin momentum density is reduced almost to zero in the momentum-space region occupied by the unpaired majority-spin electrons. When the interactions are very strong, phase separation occurs, with regions containing bosonic pairs and unpaired regions occupied by the remaining majority-spin particles. In addition, we observe translational symmetry breaking at intermediate interaction strengths, where the system forms an exotic crystal of Cooper pairs in a Fermi fluid of unpaired majority-spin particles. We provide a possible explanation for the formation of the crystalline phase, explain the origins of the k-space momentum-density hole when the pairs are tightly bound, and discuss how our approach opens new directions for future work.", "url": "https://arxiv.org/abs/2604.24883", "type": "理论+数值", "summary": "我们使用最近开发的神经网络变分蒙特卡罗方法和 AGP FermiNet Ansatz 研究具有短程吸引相互作用的二维自旋不平衡费米气体的零温度相图。在弱相互作用 BCS 极限中观察到 Fulde-Ferrell-Larkin-Ovchinnikov 相，在强相互作用 BEC 极限中观察到极化超流体。当相互作用很强时，在不成对的多数自旋电子占据的动量空间区域中，少数自旋动量密度几乎减小到零。当相互作用非常强时，会发生相分离，包含玻色子对的区域和未配对的区域被剩余的多数自旋粒子占据。此外，我们观察到平移对称性在中等相互作用强度下破缺，其中系统在不成对的多数自旋粒子的费米流体中形成库珀对的奇异晶体。我们为晶相的形成提供了可能的解释，解释了当对紧密束缚时 k 空间动量密度空穴的起源，并讨论了我们的方法如何为未来的工作开辟新的方向。", "authors": [{"name": "Wan Tong Lou"}, {"name": "Gino Cassella"}, {"name": "Andres Perez Fadon"}, {"name": "Halvard Sutterud"}, {"name": "David Pfau"}, {"name": "James S. Spencer"}, {"name": "Johannes Knolle"}, {"name": "W.M.C. Foulkes"}], "featured_authors": [{"name": "Wan Tong Lou"}, {"name": "Gino Cassella"}, {"name": "Andres Perez Fadon"}, {"name": "James S. Spencer"}, {"name": "Johannes Knolle"}, {"name": "W.M.C. Foulkes"}], "author_count": 8}, {"id": "2604.24887", "category": "cond-mat", "title": "Symmetry-Protected Topological Phases in the Triangular Majorana-Hubbard Ladder", "abstract": "We map the phase diagram of the triangular-lattice Majorana-Hubbard model on a four-leg ladder using DMRG and variational uniform matrix product states, revealing a richer variety of phases than previously known. Analysis of entanglement-spectrum degeneracies and adiabatic connections identifies multiple symmetry-protected topological (SPT) phases. These phases could be realized in arrays of vortex-bound Majorana modes on the surface of a topological superconductor.", "url": "https://arxiv.org/abs/2604.24887", "type": "理论+数值", "summary": "我们使用 DMRG 和变分均匀矩阵乘积状态将三角晶格 Majorana-Hubbard 模型的相图映射到四腿梯上，揭示了比以前已知的更丰富的相。对纠缠谱简并和绝热连接的分析确定了多个对称保护拓扑（SPT）相。这些相可以在拓扑超导体表面上的涡旋马约拉纳模式阵列中实现。", "authors": [{"name": "Will Holdhusen"}, {"name": "Alberto Nocera"}, {"name": "Jian-Xin Zhu"}, {"name": "Armin Rahmani"}], "featured_authors": [{"name": "Will Holdhusen"}, {"name": "Alberto Nocera"}, {"name": "Jian-Xin Zhu"}, {"name": "Armin Rahmani"}], "author_count": 4}, {"id": "2604.24917", "category": "cond-mat", "title": "Theory of Anderson localization on the hyperbolic plane", "abstract": "The two-dimensional hyperbolic plane, $\\mathbb{H}^2$, is an unusual system in that dimensionality changes with scale: locally two-dimensional and planar at short distances, but effectively infinite-dimensional at large scales, it provides an interesting paradigm for the study of (quantum) phase transitions, notably the disorder-driven Anderson transition. Generalizing previous work, which treated short and large distance scales separately, we develop a unified framework interpolating between the principles of low- and high-dimensional Anderson localization. As a main result, we derive a two-parameter flow in a plane spanned by scale-dependent curvature (setting the system's effective dimensionality) and conductivity, with an extended critical line separating metallic and insulating phases.", "url": "https://arxiv.org/abs/2604.24917", "type": "理论", "summary": "二维双曲平面 $\\mathbb{H}^2$ 是一个不寻常的系统，其维度随尺度变化：在短距离处局部是二维和平面的，但在大尺度上实际上是无限维的，它为（量子）相变的研究提供了一个有趣的范例，特别是无序驱动的安德森转变。总结之前分别处理短距离和大距离尺度的工作，我们开发了一个在低维和高维安德森定位原理之间插值的统一框架。作为主要结果，我们在由尺度相关曲率（设置系统的有效维数）和电导率跨越的平面中导出了双参数流，并具有分隔金属相和绝缘相的延伸临界线。", "authors": [{"name": "Alexander Altland"}, {"name": "Tobias Micklitz"}, {"name": "Devasheesh Sharma"}, {"name": "Maksimilian Usoltcev"}, {"name": "Carolin Wille"}], "featured_authors": [{"name": "Alexander Altland"}, {"name": "Tobias Micklitz"}, {"name": "Devasheesh Sharma"}, {"name": "Maksimilian Usoltcev"}, {"name": "Carolin Wille"}], "author_count": 5}, {"id": "2604.24948", "category": "cond-mat", "title": "On the Mathematics of Information-Thermodynamics", "abstract": "We present a validation of the asdf method, an information-theoretic framework for computing thermodynamic entropy from molecular configurations. The method reformulates entropy estimation as the Shannon entropy of a residual mapping distribution defined between two decorrelated microstates. We demonstrate analytically that for the closed-form Hamiltonians with known solutions, the classical ideal gas and the one-dimensional harmonic oscillator's entropy obtained from the compressibility of the residual mapping object reproduces the exact thermodynamic entropy. In each case, the conditional entropy of the residual mapping object with respect to an uncorrelated microstate is shown to coincide with the ensemble entropy derived from the canonical partition function. These results establish consistency between the asdf formalism and classical statistical mechanics for analytically solvable systems. We further discuss how the framework generalizes to interacting Hamiltonians. The analysis supports the interpretation of thermodynamic entropy as an information measure encoded geometrically in inter-microstate mappings and motivates application of the method to complex condensed phases.", "url": "https://arxiv.org/abs/2604.24948", "type": "理论", "summary": "我们对 asdf 方法进行了验证，这是一种用于根据分子构型计算热力学熵的信息理论框架。该方法将熵估计重新表述为在两个去相关微状态之间定义的残差映射分布的香农熵。我们通过分析证明，对于具有已知解的闭式哈密顿量，经典理想气体和从残差映射对象的可压缩性获得的一维简谐振子的熵再现了精确的热力学熵。在每种情况下，残差映射对象相对于不相关微观状态的条件熵与从规范分配函数导出的系综熵一致。这些结果建立了 asdf 形式主义和解析可解系统的经典统计力学之间的一致性。我们进一步讨论该框架如何推广到相互作用的哈密顿量。该分析支持将热力学熵解释为在微观状态间映射中以几何方式编码的信息测量，并激发了该方法在复杂凝聚相中的应用。", "authors": [{"name": "Dallin Fisher"}, {"name": "Qi-Jun Hong"}], "featured_authors": [{"name": "Dallin Fisher"}, {"name": "Qi-Jun Hong"}], "author_count": 2}, {"id": "2604.25060", "category": "cond-mat", "title": "Statistical mechanics in continuous space with tensor network methods", "abstract": "Tensor network (TN) methods are well established for computing partition functions in statistical mechanics, though this use has traditionally been limited to lattice models. We extend the scope of TN methodology to interacting particle systems in continuous space. Through a real-space discretization combined with a cell-based coarse-graining scheme, we formulate an effective lattice model that explicitly preserves spatial locality. The partition function of this model is represented as a TN, and the thermodynamic quantities are computed via boundary contraction. We apply this framework to the two-dimensional hard-disk problem and demonstrate the strengths of the TN formulation compared to existing Monte Carlo simulations.", "url": "https://arxiv.org/abs/2604.25060", "type": "理论+数值", "summary": "张量网络 (TN) 方法已在统计力学中计算配分函数方面得到了很好的应用，尽管这种用途传统上仅限于晶格模型。我们将 TN 方法的范围扩展到连续空间中相互作用的粒子系统。通过实空间离散化与基于单元的粗粒度方案相结合，我们制定了一个有效的晶格模型，明确地保留了空间局部性。该模型的配分函数表示为TN，热力学量通过边界收缩来计算。我们将此框架应用于二维硬盘问题，并证明了 TN 公式与现有蒙特卡洛模拟相比的优势。", "authors": [{"name": "Gunhee Park"}, {"name": "Tomislav Begušić"}, {"name": "Si-Jing Du"}, {"name": "Johnnie Gray"}, {"name": "Garnet Kin-Lic Chan"}], "featured_authors": [{"name": "Gunhee Park"}, {"name": "Tomislav Begušić"}, {"name": "Si-Jing Du"}, {"name": "Johnnie Gray"}, {"name": "Garnet Kin-Lic Chan"}], "author_count": 5}, {"id": "2604.25075", "category": "cond-mat", "title": "Influence of Heterogeneity on the Response of Architected Metamaterials", "abstract": "Architected metamaterials like foams and lattices exhibit complex responses governed by microstructural instabilities, localization, and phase-transition-like phenomena. Their behavior is further affected by heterogeneities inherent in their microstructure often caused through manufacturing processes. In this study we extend a gradient-enhanced, nonlocal continuum formulation to incorporate stochastic material heterogeneity through Gaussian random fields imposed on selected constitutive parameters. The framework enables independent control of both the amplitude and spatial correlation of material fluctuations while preserving thermodynamic consistency and regularization of localization. It also introduces a characteristic lengthscale ratio between the nonlocal and correlation lengthscales, that enables modeling at the limit of random or spatially correlated microstructures. Finite element simulations of confined compression and indentation show that heterogeneity fundamentally alters phase nucleation, localization morphology, and macroscopic response. Overall, the proposed framework provides a unified approach for linking stochastic material variability to instability-driven mechanics in architected metamaterials, enabling improved understanding of imperfection sensitivity, stability and design. It showcases how heterogeneity alone can influence characteristic features of the response, such as stability, slope of the plateau region, and elimination of the initial elastic regime.", "url": "https://arxiv.org/abs/2604.25075", "type": "理论+数值", "summary": "泡沫和晶格等结构化超材料表现出受微观结构不稳定性、局部化和类相变现象控制的复杂响应。 Their behavior is further affected by heterogeneities inherent in their microstructure often caused through manufacturing processes.在本研究中，我们扩展了梯度增强的非局部连续介质公式，通过对选定的本构参数施加高斯随机场来纳入随机材料异质性。该框架能够独立控制材料波动的幅度和空间相关性，同时保持热力学一致性和局部化正则化。它还引入了非局部和相关长度尺度之间的特征长度尺度比率，使得能够在随机或空间相关微观结构的极限下进行建模。受限压缩和压痕的有限元模拟表明，异质性从根本上改变了相成核、局部形态和宏观响应。\n\n总体而言，所提出的框架提供了一种统一的方法，用于将随机材料变异性与架构超材料中的不稳定性驱动力学联系起来，从而提高对缺陷敏感性、稳定性和设计的理解。它展示了异质性如何单独影响响应的特征，例如稳定性、高原区域的斜率以及初始弹性状态的消除。", "authors": [{"name": "Sarvesh Joshi"}, {"name": "Jingye Tan"}, {"name": "Craig M. Hamel"}, {"name": "Stavros Gaitanaros"}, {"name": "Nikolaos Bouklas"}], "featured_authors": [{"name": "Sarvesh Joshi"}, {"name": "Jingye Tan"}, {"name": "Craig M. Hamel"}, {"name": "Stavros Gaitanaros"}, {"name": "Nikolaos Bouklas"}], "author_count": 5}, {"id": "2604.25093", "category": "cond-mat", "title": "Ultrafast Energy Absorption in Silicon Controlled by Two-Color Double Pulses", "abstract": "We theoretically show that energy absorption in crystalline silicon can be controlled by two-color femtosecond double-pulse irradiation, in which two temporally separated pulses with different wavelengths interact sequentially with the system. Using time-dependent density functional theory, we systematically examine the wavelength and intensity dependence of the absorbed energy over peak intensities of $2\\times10^{11}$-$10^{13}$ W/cm$^2$ and wavelengths of 515, 1030, and 2060 nm. We find that the mechanism governing energy absorption and the optimal wavelength combination strongly depend on the intensity regime. In the low-intensity regime, multiphoton interband absorption is dominant, and energy absorption is enhanced for pulse pairs composed of shorter wavelengths. In contrast, in the high-intensity regime, the contributions of tunneling ionization and intraband acceleration become significant, leading to enhanced absorption for longer-wavelength combinations. In the intermediate-intensity regime, a pronounced enhancement is observed when a short-wavelength pulse precedes a long-wavelength pulse. Our analysis reveals that the nonequilibrium electronic state prepared by the first pulse modifies the excitation process induced by the second pulse, thereby enhancing the absorbed energy through an increased energy gain per excited electron. In this regime, the energy absorption is governed not only by the number of excited carriers but also by the energy gain per excited electron, which can be strongly modified by the pulse sequence. These results indicate that ultrafast energy transfer in semiconductors is tunable by appropriately designing the wavelength and intensity combination of the two pulses, and provide microscopic insight into two-color strong-field excitation.", "url": "https://arxiv.org/abs/2604.25093", "type": "理论+数值", "summary": "我们从理论上证明，晶体硅中的能量吸收可以通过双色飞秒双脉冲辐照来控制，其中两个不同波长的时间分离脉冲依次与系统相互作用。使用瞬态密度泛函理论，我们系统地研究了吸收能量对 $2\\times10^{11}$-$10^{13}$ W/cm$^2$ 峰值强度和 515、1030 和 2060 nm 波长的波长和强度依赖性。我们发现控制能量吸收和最佳波长组合的机制很大程度上取决于强度状态。在低强度区域，多光子带间吸收占主导地位，并且由较短波长组成的脉冲对的能量吸收增强。相反，在高强度状态下，隧道电离和带内加速的贡献变得显着，导致较长波长组合的吸收增强。在中等强度范围内，当短波长脉冲先于长波长脉冲时，观察到明显的增强。\n\n我们的分析表明，第一个脉冲制备的非平衡电子态改变了第二个脉冲引起的激发过程，从而通过增加每个激发电子的能量增益来增强吸收的能量。在这种情况下，能量吸收不仅取决于激发载流子的数量，还取决于每个激发电子的能量增益，这可以通过脉冲序列进行强烈修改。这些结果表明，通过适当设计两个脉冲的波长和强度组合，可以调节半导体中的超快能量转移，并提供对双色强场激发的微观洞察。", "authors": [{"name": "Eiyu S. Gushiken"}, {"name": "Mizuki Tani"}, {"name": "Hiroki Katow"}, {"name": "Kenichi L. Ishikawa"}], "featured_authors": [{"name": "Eiyu S. Gushiken"}, {"name": "Mizuki Tani"}, {"name": "Hiroki Katow"}, {"name": "Kenichi L. Ishikawa"}], "author_count": 4}, {"id": "2604.25095", "category": "cond-mat", "title": "Markovian thermodynamics of non-Markovian Langevin equations", "abstract": "We develop the thermodynamics of non-Markovian generalized Langevin equations by embedding them in a high-dimensional Markovian representation involving auxiliary degrees of freedom. If the memory is linear and satisfies detailed balance with the noise, we provide an explicit construction of the embedding for non-Markovian dynamics with many degrees of freedom and hydrodynamic interactions. Moreover, while the embedding is generally not unique, we show that it results in unique values of thermodynamic quantities of the Markovian system. This allows us to define the Markovian entropy production of a non-Markovian system, which, in contrast to the definition based directly on the non-Markovian dynamics, is guaranteed to increase monotonically with time. Moreover, the Markovian representation allows us to identify the apparent decrease in the non-Markovian entropy with heat and information exchange between the system and the auxiliary degrees of freedom.", "url": "https://arxiv.org/abs/2604.25095", "type": "理论", "summary": "我们通过将非马尔可夫广义朗之万方程嵌入到涉及辅助自由度的高维马尔可夫表示中来开发非马尔可夫广义朗之万方程的热力学。如果记忆是线性的并且满足与噪声的详细平衡，我们就为具有多个自由度和流体动力学相互作用的非马尔可夫动力学提供了嵌入的显式构造。此外，虽然嵌入通常不是唯一的，但我们表明它会导致马尔可夫系统的热力学量的唯一值。这使我们能够定义非马尔可夫系统的马尔可夫熵产生，与直接基于非马尔可夫动力学的定义相比，它保证随时间单调增加。此外，马尔可夫表示使我们能够识别非马尔可夫熵随着系统和辅助自由度之间的热量和信息交换而明显减少。", "authors": [{"name": "Andreas Dechant"}, {"name": "Kiyoshi Kanazawa"}], "featured_authors": [{"name": "Andreas Dechant"}, {"name": "Kiyoshi Kanazawa"}], "author_count": 2}, {"id": "2604.25125", "category": "cond-mat", "title": "Identifying strong correlation using only the Kohn-Sham density of one-electron states", "abstract": "Strongly correlated systems have long been a central and highly non-trivial topic in condensed matter physics. At the non-interacting level, strong correlation can be associated with powerful (near) degeneracies between occupied and unoccupied states, which leads to a high density of states near the Fermi level in metallic configurations. Such regimes are commonly treated with beyond-density functional theory (DFT) approaches, such as DFT+U or DFT+DMFT while maintaining symmetric configurations. Here, we explore the hypothesis that symmetry breaking in the Kohn-Sham (KS) non-interacting system can qualitatively account for the energetic effects of strong correlation in the corresponding interacting system within standard DFT. By lifting near-degeneracies around the Fermi level, symmetry breaking diminishes the potential correlation effects, reducing the need for an explicit treatment of electron correlation, transforming an otherwise strongly correlated symmetric configuration into a normally correlated one, thus avoiding the need for interacting methods beyond DFT. This naturally connects nonmagnetic to magnetic states. We apply this idea to both strongly and normally correlated metals and observe that spin symmetry breaking leads to a pronounced reduction of the density of states at the Fermi level and a significant lowering of the total energy in strongly correlated cases. To describe the degree of correlation that the interacting system would have relative to the KS state, we introduce a correlation parameter ($\\Gamma$), defined as the ratio between the Kohn-Sham density of one-electron states at the Fermi level and that of a corresponding uniform electron gas. This parameter distinguishes strongly correlated systems, which would require explicit treatment, from normally correlated ones, which do not.", "url": "https://arxiv.org/abs/2604.25125", "type": "理论+数值", "summary": "强相关系统长期以来一直是凝聚态物理中的一个中心且非常重要的主题。在非相互作用水平上，强相关性可能与占据态和未占据态之间强大的（近）简并性相关，这导致金属构型中费米能级附近的高态密度。此类机制通常采用超密度泛函理论 (DFT) 方法进行处理，例如 DFT+U 或 DFT+DMFT，同时保持对称配置。在这里，我们探讨了这样一个假设：Kohn-Sham (KS) 非相互作用系统中的对称性破缺可以定性地解释标准 DFT 中相应相互作用系统中强相关性的能量效应。通过提升费米能级周围的近简并性，对称性破缺减少了潜在的相关效应，减少了对电子相关性的显式处理的需要，将原本强相关的对称配置转变为正常相关的配置，从而避免了对 DFT 之外的交互方法的需要。这自然地将非磁性状态与磁性状态联系起来。\n\n我们将这个想法应用于强相关金属和正常相关金属，并观察到自旋对称性破缺导致费米能级态密度显着降低，并且在强相关情况下总能量显着降低。为了描述相互作用系统相对于 KS 态的相关程度，我们引入了一个相关参数 ($\\Gamma$)，定义为费米能级单电子态的 Kohn-Sham 密度与相应均匀电子气的 Kohn-Sham 密度之间的比率。该参数将需要显式处理的强相关系统与不需要显式处理的正常相关系统区分开来。", "authors": [{"name": "Daniel D. Rivera"}, {"name": "Gustavo M. Dalpian"}, {"name": "John P. Perdew"}], "featured_authors": [{"name": "Daniel D. Rivera"}, {"name": "Gustavo M. Dalpian"}, {"name": "John P. Perdew"}], "author_count": 3}, {"id": "2604.25169", "category": "cond-mat", "title": "Nonlocal Cooper pairs in finite topological superconductors and their relation to Majorana nonlocality", "abstract": "We identify two fundamental properties of the Gor'kov Green's function of finite one-dimensional topological superconductors. In the low-frequency (low-energy) regime, the normal and anomalous Green's functions, which describe single-particle and Cooper-pair correlations, respectively, become identical up to a phase factor. Moreover, they exhibit pronounced nonlocality: correlations between the two ends of the system grow exponentially with system length, whereas local correlations at either end vanish in the zero-frequency limit. These striking features signify the emergence of unconventional nonlocal Cooper pairs associated with a nonlocal fermionic mode composed of hybridized Majorana end modes. The nonlocal Cooper pairs are directly linked to fermion parity and to the nonlocal transport properties of finite topological superconductors. By focusing on pair correlations, our analysis advances the understanding of Majorana nonlocality, a key concept in topological quantum computation.", "url": "https://arxiv.org/abs/2604.25169", "type": "理论", "summary": "我们确定了有限一维拓扑超导体戈尔科夫格林函数的两个基本性质。在低频（低能量）状态下，分别描述单粒子和库珀对相关性的正常和反常格林函数在相位因子范围内变得相同。此外，它们表现出明显的非局部性：系统两端之间的相关性随着系统长度呈指数增长，而任一端的局部相关性在零频率限制下消失。这些显着特征标志着非常规非局域库珀对的出现，该库珀对与由杂化马约拉纳端模组成的非局域费米子模式相关。非局域库珀对与费米子宇称和有限拓扑超导体的非局域传输特性直接相关。通过关注配对相关性，我们的分析增进了对马约拉纳非定域性（拓扑量子计算中的一个关键概念）的理解。", "authors": [{"name": "Hiroto Mizoguchi"}, {"name": "Yutaro Nagae"}, {"name": "Yasuhiro Asano"}, {"name": "Satoshi Ikegaya"}], "featured_authors": [{"name": "Hiroto Mizoguchi"}, {"name": "Yutaro Nagae"}, {"name": "Yasuhiro Asano"}, {"name": "Satoshi Ikegaya"}], "author_count": 4}, {"id": "2604.25245", "category": "cond-mat", "title": "Hierarchy of entropy production and thermodynamic trade-off relations in non-Markovian systems", "abstract": "Non-Markovian dynamics arise when a system is coupled to a bath with finite correlation time, giving rise to memory effects that allow the bath to temporarily store and return excitations. However, how memory modifies irreversibility and whether it can be exploited to improve thermodynamic performance is not well established. We address this question by employing a Markovian embedding of generalized Langevin dynamics, in which bath memory is encoded in auxiliary modes and irreversible dissipation in a residual Markovian bath. Here we show that the entropy production defined for the original non-Markovian system upper bounds that of the embedded system, thereby establishing a hierarchy of entropy production under Markovian embedding. Leveraging this hierarchy, we derive non-Markovian extensions of the thermodynamic uncertainty relation, speed limit, and power-efficiency trade-off. For underdamed generalized Langevin systems, sufficiently structured baths allow finite heat currents at vanishingly small entropy production, whereas Carnot efficiency at finite power remains unattainable for ordinary spectral densities. In the overdamped regime, memory effects can simultaneously reduce entropy production and current fluctuations, thereby enhancing the precision-to-dissipation ratio. We further discuss the extension of the hierarchy to generic bath models and the quantum regime. These results provide a quantitative framework for exploiting memory as a thermodynamic resource and for designing energy-efficient protocols in structured environments.", "url": "https://arxiv.org/abs/2604.25245", "type": "理论", "summary": "当系统耦合到具有有限相关时间的浴时，就会出现非马尔可夫动力学，从而产生记忆效应，使浴能够暂时存储和返回激励。然而，记忆如何改变不可逆性以及是否可以利用它来提高热力学性能尚不清楚。我们通过采用广义朗之万动力学的马尔可夫嵌入来解决这个问题，其中浴记忆以辅助模式编码，并在残余马尔可夫浴中进行不可逆耗散。在这里，我们证明了为原始非马尔可夫系统定义的熵产生上限为嵌入式系统的熵产生上限，从而建立了马尔可夫嵌入下熵产生的层次结构。利用这种层次结构，我们推导出热力学不确定性关系、速度限制和功率效率权衡的非马尔可夫扩展。对于欠缺的广义朗之万系统，足够结构化的浴允许在极小的熵产生下产生有限的热流，而对于普通光谱密度来说，有限功率下的卡诺效率仍然无法实现。\n\n在过阻尼状态下，记忆效应可以同时减少熵产生和电流波动，从而提高精度与耗散比。我们进一步讨论将层次结构扩展到通用浴模型和量子体系。这些结果为利用内存作为热力学资源以及在结构化环境中设计节能协议提供了一个定量框架。", "authors": [{"name": "Ken Funo"}, {"name": "Tan Van Vu"}, {"name": "Keiji Saito"}], "featured_authors": [{"name": "Ken Funo"}, {"name": "Tan Van Vu"}, {"name": "Keiji Saito"}], "author_count": 3}, {"id": "2604.25248", "category": "cond-mat", "title": "Anomalous Mixed-State Floquet Topology in One-Dimensional Open Quantum Systems", "abstract": "We investigate the non-equilibrium topology of a periodically driven, dissipative Su-Schrieffer-Heeger chain using the ensemble geometric phase (EGP) $\\phi_{\\mathrm{EGP}}$-a generalisation of the Zak phase to open quantum systems. In contrast to earlier work, we use Floquet-Born-Markov theory to describe the coupling to thermal reservoirs microscopically. We show that the steady state can be characterised by a Hermitian purity spectrum, providing a direct analogue of band topology for mixed states. The periodic drive induces nontrivial winding and a quasienergy spectrum with distinct $0$ and $\\pi$ band gaps, with protected edge modes in each gap. We identify a pair of topological invariants $(\\phi^{0}_{\\mathrm{EGP}}, \\Delta \\phi^{\\pi}_{\\mathrm{EGP}})$, revealing a structure consistent with a $\\mathbb{Z}\\times\\mathbb{Z}$ classification known from isolated Floquet SSH systems, and show how it extends to a dissipative, finite-temperature setting in regimes where the steady-state structure remains well defined. Our results demonstrate when and how known Floquet topology survives in a driven-dissipative Gaussian steady state and establish Floquet topology as a robust concept beyond isolated zero-temperature systems. The underlying formalism provides a general framework for quadratic fermionic systems with linear bath couplings.", "url": "https://arxiv.org/abs/2604.25248", "type": "理论", "summary": "我们使用系综几何相位 (EGP) $\\phi_{\\mathrm{EGP}}$（Zak 相位对开放量子系统的推广）来研究周期性驱动的耗散 Su-Schrieffer-Heeger 链的非平衡拓扑。与早期的工作相比，我们使用 Floquet-Born-Markov 理论来微观地描述与热储层的耦合。我们证明了稳态可以用埃尔米特纯度谱来表征，为混合态的能带拓扑提供了直接的模拟。周期性驱动会产生不平凡的缠绕和具有不同 $0$ 和 $\\pi$ 带隙的准能谱，每个带隙中都具有受保护的边缘模式。我们识别了一对拓扑不变量 $(\\phi^{0}_{\\mathrm{EGP}}, \\Delta \\phi^{\\pi}_{\\mathrm{EGP}})$，揭示了与从孤立的 Floquet SSH 系统中已知的 $\\mathbb{Z}\\times\\mathbb{Z}$ 分类一致的结构，并展示了它如何扩展到稳态结构保持的情况下的耗散、有限温度设置定义明确。\n\n我们的结果证明了已知的 Floquet 拓扑何时以及如何在驱动耗散高斯稳态中生存，并将 Floquet 拓扑确立为超越孤立零温度系统的稳健概念。底层形式为具有线性浴耦合的二次费米子系统提供了通用框架。", "authors": [{"name": "Görkem D. Dinc"}, {"name": "Alexander Schnell"}, {"name": "Andy M. Martin"}], "featured_authors": [{"name": "Görkem D. Dinc"}, {"name": "Alexander Schnell"}, {"name": "Andy M. Martin"}], "author_count": 3}, {"id": "2604.25262", "category": "cond-mat", "title": "Benchmarking Universal Machine-Learned Interatomic Potentials for High-Temperature Metal-Organic Framework Chemistry", "abstract": "Universal machine-learned interatomic potentials (uMLIPs) offer a promising approach to performing atomistic simulations at near-DFT accuracy with greatly reduced computational cost. Here, we present a new high-temperature benchmarking dataset of 40~ps ab~initio molecular dynamics (AIMD) trajectories simulated at 300, 1000, and 2000 K for nine zinc- and zirconium-based metal-organic frameworks (MOFs): ZIF-8, CALF-20, MOF-10, MOF-5, MIP-206, UiO-66, UiO-67, UiO-66-NH2, and NU-1000. These trajectories capture equilibrium dynamics, thermally induced distortions, and early-stage decomposition events, including linker degradation and metal node aggregation. Subsequently, we use this dataset to benchmark five leading uMLIPs: ORB-v3, MACE-MP-0a, MACE-MPA-0, fairchem ODAC23, and fairchem OMAT. Our results reveal that ORB-v3 and fairchem OMAT achieve the lowest energy, force, and stress errors across all temperatures. However, all models exhibit significant error under high-temperature conditions. Long-timescale molecular dynamics simulations produced with ORB-v3 demonstrate that the generative error of uMLIPs far exceeds model losses captured during static validation, highlighting the limitations of current universal models for simulating high-temperature MOF dynamics. This work provides a benchmark for assessing the robustness of uMLIPs in extreme regimes and guides future development of potentials capable of accurately modeling the chemistry of high-temperature MOF dynamics.", "url": "https://arxiv.org/abs/2604.25262", "type": "理论+数值", "summary": "通用机器学习原子间势 (uMLIP) 提供了一种很有前景的方法，可以以接近 DFT 的精度执行原子模拟，同时大大降低计算成本。在这里，我们提出了在 300、1000 和 2000 K 下模拟九种锌基和锆基金属有机框架 (MOF) 的 40~ps ab~initio 分子动力学 (AIMD) 轨迹的新高温基准数据集：ZIF-8、CALF-20、MOF-10、MOF-5、MIP-206、UiO-66、 UiO-67、UiO-66-NH2 和 NU-1000。这些轨迹捕获平衡动态、热引起的变形和早期分解事件，包括连接体降解和金属节点聚集。随后，我们使用该数据集对五个领先的 uMLIP 进行基准测试：ORB-v3、MACE-MP-0a、MACE-MPA-0、fairchem ODAC23 和 fairchem OMAT。我们的结果表明，ORB-v3 和 fairchem OMAT 在所有温度下实现了最低的能量、力和应力误差。然而，所有模型在高温条件下都表现出显着的误差。\n\n使用 ORB-v3 进行的长时间尺度分子动力学模拟表明，uMLIP 的生成误差远远超过静态验证期间捕获的模型损失，凸显了当前模拟高温 MOF 动力学的通用模型的局限性。这项工作为评估 uMLIP 在极端条件下的稳健性提供了基准，并指导未来开发能够准确模拟高温 MOF 动力学化学的潜力。", "authors": [{"name": "Connor W. Edwards"}, {"name": "Jack D. Evans"}], "featured_authors": [{"name": "Connor W. Edwards"}, {"name": "Jack D. Evans"}], "author_count": 2}, {"id": "2604.25302", "category": "cond-mat", "title": "Moving Cooling Source Induced Phase Separation in Binary Liquids: an interplay of competing velocities", "abstract": "We investigate phase separation dynamics in a binary mixture subjected to a moving cooling source from which cold temperature fronts propagate radially outward into the mixture. The motion of the source introduces two distinct velocity scales: $v_s$ associated with the translation of the source, and $v$ related to the propagation of the cooling thermal fronts. Competition between the two velocities determines how long a region of the fluid experiences a temperature change, which directly controls phase separation. A modified Cahn Hilliard Cook framework is employed, incorporating explicit coupling between the time-dependent temperature and concentration fields. Our numerical simulation results reveal that the evolving patterns and kinetics strongly depend on both the ratio and absolute magnitudes of these two competing velocities. Same value of $v_s/v$ yields distinctly different patterns for different $v$. The temperature profile delineating spatial regions with local temperatures above and below the demixing temperature controls the shape of the patterns formed. The rich parameter space enables one to engineer desired pattern structures by tuning the two velocities.", "url": "https://arxiv.org/abs/2604.25302", "type": "数值", "summary": "我们研究了二元混合物中的相分离动力学，该混合物受到移动冷却源的影响，冷锋从该冷却源径向向外传播到混合物中。源的运动引入了两个不同的速度尺度：与源的平移相关的$v_s$，以及与冷却热锋的传播相关的$v$。两种速度之间的竞争决定了流体区域经历温度变化的时间，这直接控制相分离。采用改进的 Cahn Hilliard Cook 框架，将时间相关的温度场和浓度场之间的显式耦合结合起来。我们的数值模拟结果表明，演化模式和动力学很大程度上取决于这两个竞争速度的比率和绝对大小。 $v_s/v$ 的相同值对于不同的 $v$ 会产生明显不同的模式。描绘具有高于和低于分层温度的局部温度的空间区域的温度分布控制所形成的图案的形状。丰富的参数空间使人们能够通过调整两个速度来设计所需的图案结构。", "authors": [{"name": "Lakshmipriya K"}, {"name": "Harssh Karn"}, {"name": "Sutapa Roy"}], "featured_authors": [{"name": "Lakshmipriya K"}, {"name": "Harssh Karn"}, {"name": "Sutapa Roy"}], "author_count": 3}, {"id": "2604.25328", "category": "cond-mat", "title": "Microscopic Theory of Chiral-Phonon-Induced Orbital Selectivity in Helical Crystals", "abstract": "We present a microscopic theory of chirality-induced orbital selectivity (CIOS) in helical crystals, in which truly chiral phonons selectively transfer angular momentum to electronic orbital degrees of freedom. For a threefold helical crystal with line-group symmetry $L3_1$, we show that phonon-induced local rotations generate a rotational electron--phonon interaction proportional to $\\hat{L}^{\\pm}$, which drives the orbital transfer $m_{\\ell}\\to m_{\\ell}-m_{s}$ in accordance with crystal angular momentum (CAM) conservation, where $m_{s}=\\pm 1$ denotes the eigenvalue of the phonon rotational mode. Evaluating $\\langle\\hat{L}^{z}\\rangle$ to leading order in perturbation theory, we find that the orbital response is suppressed near the $\\Gamma$ point and the BZ boundary, and enhanced at intermediate wave vectors -- a feature intimately tied to the degeneracy structure of the phonon bands.", "url": "https://arxiv.org/abs/2604.25328", "type": "理论", "summary": "我们提出了螺旋晶体中手性诱导轨道选择性（CIOS）的微观理论，其中真正的手性声子选择性地将角动量转移到电子轨道自由度。对于具有线群对称性 $L3_1$ 的三重螺旋晶体，我们证明声子引起的局部旋转会产生与 $\\hat{L}^{\\pm}$ 成比例的旋转电子-声子相互作用，根据晶体角动量 (CAM) 守恒驱动轨道转移 $m_{\\ell}\\ 到 m_{\\ell}-m_{s}$，其中 $m_{s}=\\pm 1$ 表示声子旋转模式的特征值。将 $\\langle\\hat{L}^{z}\\rangle$ 评估为微扰理论中的主阶，我们发现轨道响应在 $\\Gamma$ 点和 BZ 边界附近受到抑制，并在中间波矢量处增强——这一特征与声子带的简并结构密切相关。", "authors": [{"name": "Tomomi Tateishi"}, {"name": "Akihito Kato"}, {"name": "Alexander S. Ovchinnikov"}, {"name": "Jun-ichiro Kishine"}], "featured_authors": [{"name": "Tomomi Tateishi"}, {"name": "Akihito Kato"}, {"name": "Alexander S. Ovchinnikov"}, {"name": "Jun-ichiro Kishine"}], "author_count": 4}, {"id": "2604.25343", "category": "cond-mat", "title": "Proximity Ferroelectricity Driven by Mobile High-Miller-Index Domain Walls", "abstract": "Wurtzite ferroelectrics such as scandium-doped aluminum nitride (AlScN) are promising for next-generation memory because of their compatibility with semiconductor processes and strong spontaneous polarization. Ferroelectric switching in these materials is typically attributed to doping-induced softening of the bulk switching barrier. However, recent reports of proximity ferroelectricity, in which undoped AlN layers up to 500 nm thick fully switch in AlN/AlScN multilayers, challenge this view. Here, we reveal an alternative switching mechanism mediated by high-Miller-index domain walls, long overlooked due to their complex geometry and presumed instability. Using first-principles calculations and machine-learning molecular dynamics simulations, we show that these walls, once nucleated, migrate with exceptionally low barriers. The Sc dopants play a dual role: they stabilize high-index walls and thereby promote nucleation, while also introducing pinning that hinders wall motion. In multilayers, our simulations demonstrate that mobile domain walls nucleated in AlScN can propagate deep into adjacent AlN, where they move easily without dopant pinning, enabling low-field switching across thick undoped layers. This microscopic divide-and-conquer mechanism resolves the puzzle of proximity ferroelectricity and highlights high-index interfaces as an underexplored lever for controlling ferroelectric switching.", "url": "https://arxiv.org/abs/2604.25343", "type": "理论+数值", "summary": "诸如掺钪氮化铝（AlScN）之类的纤锌矿铁电体由于其与半导体工艺的兼容性和强自发极化而有望用于下一代存储器。这些材料中的铁电切换通常归因于掺杂引起的体切换势垒的软化。然而，最近有关邻近铁电性的报道（其中厚度达 500 nm 的未掺杂 AlN 层在 AlN/AlScN 多层中完全切换）对这一观点提出了挑战。在这里，我们揭示了一种由高米勒指数畴壁介导的替代切换机制，由于其复杂的几何形状和假定的不稳定性而长期被忽视。使用第一原理计算和机器学习分子动力学模拟，我们表明这些壁一旦成核，就会以极低的势垒迁移。 Sc 掺杂剂具有双重作用：它们稳定高折射率壁，从而促进成核，同时还引入阻碍壁运动的钉扎。\n\n在多层结构中，我们的模拟表明，在 AlScN 中成核的移动畴壁可以深入传播到相邻的 AlN 中，在那里它们可以轻松移动，无需掺杂剂钉扎，从而能够在厚的未掺杂层上进行低场切换。这种微观的分而治之机制解决了邻近铁电性的难题，并突出了高折射率界面作为控制铁电开关的未经充分探索的杠杆。", "authors": [{"name": "Changming Ke"}, {"name": "Shi Liu"}], "featured_authors": [{"name": "Changming Ke"}, {"name": "Shi Liu"}], "author_count": 2}, {"id": "2604.25350", "category": "cond-mat", "title": "Electrohydrodynamic lubrication theory", "abstract": "The free motion of charged colloids within ionic solutions and in the vicinity of charged boundaries, is a phenomenon that occurs in various natural, biological and industrial settings. Here, we develop an electrohydrodynamic lubrication theoretical framework, in order to characterize such a motion in the case of an infinite rigid cylinder near a rigid wall. Combining hydrodynamic lubrication theory, Debye-H\\''uckel electrostatics, and Nernst-Planck electrokinetics, we derive the three coupled equations of motion for the normal, longitudinal and rotational degrees of freedom of the cylinder, which are then investigated numerically and through asymptotic analysis. Our results reveal complex behaviours, beyond existing asymptotic electroviscous-lift expressions, and extend the classical Faxen-Brenner-like mobility matrix when surface charges and dissolved ions are incorporated.", "url": "https://arxiv.org/abs/2604.25350", "type": "理论+数值", "summary": "带电胶体在离子溶液内和带电边界附近的自由运动是各种自然、生物和工业环境中发生的现象。在这里，我们开发了一种电流体动力润滑理论框架，以便表征在刚性壁附近的无限刚性圆柱体的情况下的这种运动。结合流体动力润滑理论、德拜-休克尔静电学和能斯特-普朗克电动学，我们推导了圆柱体法向、纵向和旋转自由度的三个耦合运动方程，然后进行数值研究和渐近分析。我们的结果揭示了复杂的行为，超出了现有的渐近电粘性升力表达式，并在合并表面电荷和溶解离子时扩展了经典的 Faxen-Brenner 式迁移率矩阵。", "authors": [{"name": "Anirban Chatterjee"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "featured_authors": [{"name": "Anirban Chatterjee"}, {"name": "Yacine Amarouchene"}, {"name": "Thomas Salez"}], "author_count": 3}, {"id": "2604.25351", "category": "cond-mat", "title": "Spinodal-like scaling behavior after a temperature quench across the first-order phase transition in three-dimensional $q$-state Potts models", "abstract": "We study the out-of-equilibrium spinodal-like behavior of three-dimensional (3D) $q$-state Potts models (for $q\\ge 3$), observed when the temperature is quenched across the first-order transition (FOT) point $\\beta_{\\rm fo}=T_{\\rm fo}^{-1}$. We consider a standard quench protocol, in which high-temperature configurations, thermalized at $\\beta_i<\\beta_{\\rm fo}$, are driven across the FOT by a purely relaxational dynamics at $\\beta>\\beta_{\\rm fo}$. We focus on the emergence of spinodal-like behaviors in the thermodynamic limit, associated with the dynamic phase change. We argue that, if the nucleation of smooth droplets is the relevant mechanism of the post-quench phase change, for sufficiently small $\\beta_{\\rm fo}-\\beta_i>0$, the time-dependent energy density should scale in terms of $\\rho = (\\ln t)^{3/2} \\delta$, where $\\delta = \\beta/\\beta_{\\rm fo}-1$, with a discontinuity at a particular value $\\rho=\\rho_s>0$. This implies the emergence of a spinodal-like behavior, whose time scale $\\tau$ increases exponentially as $\\ln \\tau \\approx (\\rho_s/\\delta)^{2/3}$ in the limit $\\delta\\to 0^+$. We present a numerical analysis of the quench protocol in the 3D $q=6$ Potts model, which supports the above spinodal-like scenario.", "url": "https://arxiv.org/abs/2604.25351", "type": "理论+数值", "summary": "我们研究了三维 (3D) $q$ 态 Potts 模型（对于 $q\\ge 3$）的失平衡类旋节线行为，当温度在一阶转变 (FOT) 点 $\\beta_{\\rm fo}=T_{\\rm fo}^{-1}$ 上淬火时观察到。我们考虑一个标准的淬灭协议，其中在 $\\beta_i<\\beta_{\\rm fo}$ 热化的高温配置由 $\\beta>\\beta_{\\rm fo}$ 的纯粹松弛动力学驱动穿过 FOT。我们关注热力学极限中与动态相变相关的类旋节线行为的出现。我们认为，如果光滑液滴的成核是淬火后相变的相关机制，那么对于足够小的 $\\beta_{\\rm fo}-\\beta_i>0$，与时间相关的能量密度应按 $\\rho = (\\ln t)^{3/2} \\delta$ 缩放，其中 $\\delta = \\beta/\\beta_{\\rm fo}-1$，在特定值处具有不连续性$\\rho=\\rho_s>0$。这意味着出现了类似旋节线的行为，其时间尺度 $\\tau$ 在 $\\delta\\ 到 0^+$ 的极限内以 $\\ln \\tau \\approx (\\rho_s/\\delta)^{2/3}$ 呈指数增长。\n\n我们在 3D $q=6$ Potts 模型中对淬灭协议进行了数值分析，该模型支持上述类似旋节线的情况。", "authors": [{"name": "Andrea Pelissetto"}, {"name": "Davide Rossini"}, {"name": "Ettore Vicari"}], "featured_authors": [{"name": "Andrea Pelissetto"}, {"name": "Davide Rossini"}, {"name": "Ettore Vicari"}], "author_count": 3}, {"id": "2604.25401", "category": "cond-mat", "title": "Raman Characterization of Two-Dimensional Quasiperiodic Antiferromagnets on Various Lattices: Spin-Orbit Mechanism", "abstract": "We study first-order (single-magnon) inelastic light scatterings in spin-$\\frac{1}{2}$ two-dimensional quasiperiodic antiferromagnets in comparison with those emergent on periodic lattices. Unlike second-order (two-magnon) Raman scatterings based on an exchange interaction between neighboring spins, the present observations involve an indirect electric-dipole coupling which proceeds through a spin-orbit interaction. We discuss the nearest-neighbor antiferromagnetic XXZ Hamiltonian on various quasiperiodic and periodic bipartite lattices. The first-order spectra, of our present interest, consist only of rotation-invariant and mirror-symmetric magnons, while the second-order ones cannot select any particular magnon. With the exchange anisotropy moving away from the Ising limit toward the Heisenberg isotropic point, every initial delta-function peak bifurcates or divides into more in each individual manner on quasiperiodic lattices, while it remains singly peaked all the way on periodic lattices. Such splittings depend on how many types of isocoordinated sites for each coordination number and relative positions between those of the same type. A perpendicular-space representation of the first-order Raman spectrum serves as a fingerprint of each quasiperiodic tiling.", "url": "https://arxiv.org/abs/2604.25401", "type": "理论", "summary": "我们研究自旋$\\frac{1}{2}$二维准周期反铁磁体中的一阶（单磁振子）非弹性光散射，并将其与周期性晶格上出现的光散射进行比较。与基于相邻自旋之间交换相互作用的二阶（双磁振子）拉曼散射不同，目前的观测涉及通过自旋轨道相互作用进行的间接电偶极子耦合。我们讨论各种准周期和周期性二分晶格上的最近邻反铁磁 XXZ 哈密顿量。我们目前感兴趣的一阶谱仅由旋转不变和镜像对称磁振子组成，而二阶谱不能选择任何特定的磁振子。随着交换各向异性从伊辛极限向海森堡各向同性点移动，每个初始δ函数峰在准周期晶格上以各自的方式分叉或分裂成更多，而在周期晶格上它始终保持单峰。这种分裂取决于每个配位数有多少种等配位位点以及相同类型的等配位位点之间的相对位置。\n\n一阶拉曼光谱的垂直空间表示充当每个准周期平铺的指纹。", "authors": [{"name": "Takashi Inoue"}, {"name": "Shoji Yamamoto"}], "featured_authors": [{"name": "Takashi Inoue"}, {"name": "Shoji Yamamoto"}], "author_count": 2}, {"id": "2604.25493", "category": "cond-mat", "title": "Non-magnetic floating phases in frustrated Haldane chains with a single-ion anisotropy", "abstract": "We investigate the effect of a single-ion anisotropy on the bilinear-biquadratic spin-1 J1-J2 chain, focusing on the quantum phase transitions out of the trimerized phase. Using large-scale density matrix renormalization group simulations, we uncover a rich phase diagram comprising five gapped phases and, remarkably, two critical floating phases. These incommensurate Luttinger liquid phases emerge from the proliferation of non-magnetic domains - 0-states and dimers - within a trimerized background and are confined to the zero magnetization sector, while magnetic excitations remain gapped. We show that the transition between the topological Haldane phase and the floating phases are governed by a composite critical line with central charge c=2, consistent with a coexistence of magnetic and non-magnetic critical modes. Our results shed new light on the long-standing problem of the Haldane-trimerized transition.", "url": "https://arxiv.org/abs/2604.25493", "type": "理论+数值", "summary": "我们研究了单离子各向异性对双线性双二次自旋 1 J1-J2 链的影响，重点关注三聚相之外的量子相变。使用大规模密度矩阵重整化群模拟，我们发现了丰富的相图，其中包括五个带隙相，以及值得注意的两个关键浮动相。这些不相称的路廷格液相是由三聚背景中非磁域（0态和二聚体）的增殖而产生的，并且被限制在零磁化区域，而磁激发仍然有间隙。我们表明，拓扑 Haldane 相和浮动相之间的转变由中心电荷 c=2 的复合临界线控制，这与磁性和非磁性临界模式的共存一致。我们的结果为长期存在的霍尔丹三聚化转变问题提供了新的线索。", "authors": [{"name": "Bowy M. La Riviere"}, {"name": "Natalia Chepiga"}], "featured_authors": [{"name": "Bowy M. La Riviere"}, {"name": "Natalia Chepiga"}], "author_count": 2}, {"id": "2604.25553", "category": "cond-mat", "title": "Doping-Induced Brightening of Dark Excitons and Trions in a WSe$_2$ Monolayer", "abstract": "Optically dark excitonic states play a critical role in the valleytronic, electronic, and optical properties of monolayer semiconducting transition metal dichalcogenides. Here, we investigate how electrostatic doping affects the in-plane magnetic-field-induced activation of dark excitonic complexes in a gated WSe$_2$ monolayer. By continuously tuning the carrier density via gate voltage, we access $n$-type, charge-neutral, and $p$-type regimes and track the corresponding brightening dynamics. We find that the brightening rates of the dark negative trion ($T^{D-}$), dark neutral exciton ($X^{D}$), and dark positive trion ($T^{D+}$) exhibit a strong and nontrivial dependence on doping. In particular, the pronounced asymmetry in the brightening behaviour of the neutral $X^{D}$ complex and the charged $T^{D-}$ and $T^{D+}$ trions reveals distinct underlying carrier interactions, which we describe using a rate-equation model for their steady-state populations. These findings highlight the key role of dark excitonic complexes in governing the optical response and carrier dynamics of doped S-TMD monolayers.", "url": "https://arxiv.org/abs/2604.25553", "type": "理论", "summary": "光学暗激子态在单层半导体过渡金属二硫属化物的谷电子、电子和光学性质中发挥着关键作用。在这里，我们研究静电掺杂如何影响门控 WSe$_2$ 单层中暗激子复合物的面内磁场诱导激活。通过栅极电压不断调节载流子密度，我们可以访问 $n$ 型、电荷中性和 $p$ 型状态，并跟踪相应的增亮动态。我们发现暗负三重子 ($T^{D-}$)、暗中性激子 ($X^{D}$) 和暗正三重子 ($T^{D+}$) 的增亮率表现出对掺杂的强烈且非平凡的依赖性。特别是，中性$X^{D}$复合物和带电$T^{D-}$和$T^{D+}$三重子的增亮行为的明显不对称性揭示了不同的潜在载流子相互作用，我们使用稳态群体的速率方程模型来描述这种相互作用。这些发现强调了暗激子配合物在控制掺杂 S-TMD 单层的光学响应和载流子动力学方面的关键作用。", "authors": [{"name": "Grzegorz Krasucki"}, {"name": "Artur O. Slobodeniuk"}, {"name": "Kacper Walczyk"}, {"name": "Katarzyna Olkowska-Pucko"}, {"name": "Kenji Watanabe"}, {"name": "Takashi Taniguchi"}, {"name": "Adam Babiński"}, {"name": "Maciej R. Molas"}], "featured_authors": [{"name": "Grzegorz Krasucki"}, {"name": "Artur O. Slobodeniuk"}, {"name": "Kacper Walczyk"}, {"name": "Takashi Taniguchi"}, {"name": "Adam Babiński"}, {"name": "Maciej R. Molas"}], "author_count": 8}, {"id": "2604.25576", "category": "cond-mat", "title": "Tuning magnitude and direction of lattice thermal conductivity in transition metal dichalcogenide heterobilayers", "abstract": "We investigate the nanoscale mechanisms determining lattice thermal conductivity (LTC) of pristine and W-doped MX$_2$-M$^\\prime$X$^\\prime_2$ transition metal dichalcogenide heterobilayers from first principles, using the exact solution of the linearised Boltzmann transport equation in both phonon and relaxon bases. Pristine heterobilayers exhibit isotropic in-plane LTC with preserved ordering across temperature. Relaxon analysis identifies descriptors linking LTC to phonon properties such as the phonon group velocity and layer localisation. While systems with lighter atoms generally favour higher LTC, a sufficiently large mass contrast is required to induce layer localisation of the transport-relevant vibrational modes. Further, we show through the thermal viscosity that the relative distribution of vibrational states between metal/non-metal sublattices influences the balance between Normal and Umklapp scattering processes. On the other hand, doped systems exhibit reduced and anisotropic in-plane LTC, retain a well-defined layer character, but are strongly affected by enhanced phonon-phonon scattering due to mass disorder. Notably, we find that both configuration and temperature dictate the direction of maximum thermal transport, which opens the possibility to tune the direction of maximum (and minimum) conductivity via doping in novel 2D functional materials. Thanks to its general formulation, the analysis protocol can be readily extended to other van der Waals heterostructures, and the descriptors may be implemented in high-throughput engines to identify promising layered materials with tailored thermal transport characteristics.", "url": "https://arxiv.org/abs/2604.25576", "type": "理论", "summary": "我们利用声子和弛豫基中线性玻尔兹曼输运方程的精确解，从第一原理研究了决定原始和 W 掺杂 MX$_2$-M$^\\prime$X$^\\prime_2$ 过渡金属二硫族化物异质双层的晶格热导率 (LTC) 的纳米级机制。原始的异质双层表现出各向同性的面内 LTC，并且在整个温度范围内保持有序性。松弛子分析识别将 LTC 与声子属性（例如声子群速度和层定位）联系起来的描述符。虽然原子较轻的系统通常有利于较高的 LTC，但需要足够大的质量对比度来诱导与输运相关的振动模式的层局域化。此外，我们通过热粘度表明，金属/非金属子晶格之间振动状态的相对分布影响法向散射过程和 Umklapp 散射过程之间的平衡。另一方面，掺杂系统表现出降低的各向异性面内 LTC，保留了明确的层特性，但由于质量无序而受到增强的声子-声子散射的强烈影响。\n\n值得注意的是，我们发现结构和温度都决定了最大热传输的方向，这开启了通过新型二维功能材料中的掺杂来调整最大（和最小）电导率方向的可能性。由于其通用公式，该分析协议可以很容易地扩展到其他范德华异质结构，并且描述符可以在高通量引擎中实现，以识别具有定制热传输特性的有前途的层状材料。", "authors": [{"name": "Elliot Perviz"}, {"name": "Antonio Cammarata"}], "featured_authors": [{"name": "Elliot Perviz"}, {"name": "Antonio Cammarata"}], "author_count": 2}, {"id": "2604.25581", "category": "cond-mat", "title": "Self-consistent vertex corrected $GW$ with static and dynamic screening using tensor hypercontraction: assessment of molecular ionization potentials", "abstract": "In this work, we benchmark tensor hypercontraction (THC)-accelerated fully self-consistent $GW$ (sc$GW$) and vertex-corrected self-consistent $GW$ (sc$GW\\Gamma$) methods for predicting molecular first ionization potentials (IPs). The vertex function, $\\Gamma$, is inserted into the self-energy in a fully self-consistent manner, and representative sc$GW$ and sc$GW\\Gamma$ variants are assessed across the $G_0W_0\\Gamma29$ and $GW100$ data sets. We find that the THC decomposition introduces negligible errors into self-consistent $GW$ ionization potentials, indicating that the acceleration preserves the underlying fully self-consistent results. Across both benchmark sets, vertex-corrected sc$GW\\Gamma$ methods primarily produce systematic shifts in the IPs relative to sc$GW$ rather than consistent accuracy improvements. These results identify THC as a reliable route to lower-cost sc$GW$ and sc$GW\\Gamma$ calculations", "url": "https://arxiv.org/abs/2604.25581", "type": "数值", "summary": "在这项工作中，我们对张量超收缩 (THC) 加速的完全自洽 $GW$ (sc$GW$) 和顶点校正自洽 $GW$ (sc$GW\\Gamma$) 方法进行基准测试，用于预测分子第一电离势 (IP)。顶点函数 $\\Gamma$ 以完全自洽的方式插入自能量中，并在 $G_0W_0\\Gamma29$ 和 $GW100$ 数据集上评估代表性的 sc$GW$ 和 sc$GW\\Gamma$ 变体。我们发现 THC 分解在自洽 $GW$ 电离势中引入了可忽略不计的误差，表明加速保留了潜在的完全自洽结果。在这两个基准集上，顶点校正 sc$GW\\Gamma$ 方法主要产生 IP 相对于 sc$GW$ 的系统性变化，而不是一致的精度改进。这些结果表明 THC 是实现低成本 sc$GW$ 和 sc$GW\\Gamma$ 计算的可靠途径", "authors": [{"name": "Munkhorgil Wang"}, {"name": "Ming Wen"}, {"name": "Pavel Pokhilko"}, {"name": "Chia-Nan Yeh"}, {"name": "Miguel A. Morales"}, {"name": "Dominika Zgid"}], "featured_authors": [{"name": "Munkhorgil Wang"}, {"name": "Ming Wen"}, {"name": "Pavel Pokhilko"}, {"name": "Chia-Nan Yeh"}, {"name": "Miguel A. Morales"}, {"name": "Dominika Zgid"}], "author_count": 6}, {"id": "2604.25626", "category": "cond-mat", "title": "Physical properties of transition metal hydride superconductors Mg2TmH6 (Tm = Rh, Pd, Ir, Pt) by first-principles calculations", "abstract": "In this work, a comprehensive first-principles investigation of the structural, hydrogen storage potential, electronic, elastic, mechanical, thermophysical, superconducting, and optical properties of Mg2TmH6 (Tm = Rh, Pd, Ir, Pt) hydrides is presented. Obtained results demonstrate that Mg2TmH6 hydrides combine favorable hydrogen storage, mechanical robustness, superconductivity, and multifunctional optical properties, making them promising candidates for energy storage, superconducting and advanced optoelectronic applications.", "url": "https://arxiv.org/abs/2604.25626", "type": "数值", "summary": "在这项工作中，对 Mg2TmH6（Tm = Rh、Pd、Ir、Pt）氢化物的结构、储氢潜力、电子、弹性、机械、热物理、超导和光学性质进行了全面的第一性原理研究。获得的结果表明，Mg2TmH6 氢化物结合了良好的储氢、机械鲁棒性、超导性和多功能光学特性，使其成为储能、超导和先进光电应用的有希望的候选者。", "authors": [{"name": "Md Ashraful Alam"}, {"name": "Md Abdul Hadi Shah"}, {"name": "F. Parvin"}, {"name": "S. H. Naqib"}], "featured_authors": [{"name": "Md Ashraful Alam"}, {"name": "Md Abdul Hadi Shah"}, {"name": "F. Parvin"}, {"name": "S. H. Naqib"}], "author_count": 4}, {"id": "2604.25638", "category": "cond-mat", "title": "Collective and separate metal-insulator transitions in correlated vanadium dioxide", "abstract": "Deciphering the complicated interplay between collective and separate behaviors lies at the heart of first-order metal-insulator transition (MIT) in correlated electron systems, enabling the rational design of exotic electronic states and functionalities. The critical balance between collective and separate behaviors defines a fundamental collective length scale, typically shorter than 5 nm, that governs emergent quantum orders, yet active control over this dichotomy remains elusive. Here, we realize on-demand manipulation of the collective and separate MIT within the correlated VO2 system in a reversible fashion. Artificially designing the oxygen deficiency in VO2/VO2-x homojunction fosters a collective MIT with an extended collective length scale, whereas the introduction of a TiO2 interlayer drives a crossover from this collective to a two-step separate MIT via decoupling of the electronic order parameter. Incorporating mobile hydrogens into the VO2/TiO2/VO2-x trilayer enables reversible control over electronic phase modulations, transitioning a two-step MIT towards either a one-step MIT or collective electron localization. This ionic control over the electronic band structure of VO2 flexibly triggers multi-state MIT, a process governed by hydrogen-related band filling. Our findings transform the collective length scale from a passive threshold into a dynamic design parameter, establishing a viable handle for engineering collective and separate MIT for adaptive correlated electronics.", "url": "https://arxiv.org/abs/2604.25638", "type": "理论", "summary": "破译集体行为和单独行为之间复杂的相互作用是相关电子系统中一阶金属-绝缘体转变（MIT）的核心，从而能够合理设计奇异的电子状态和功能。集体行为和单独行为之间的关键平衡定义了一个基本的集体长度尺度，通常小于 5 nm，它控制着新兴的量子秩序，但对这种二分法的主动控制仍然难以捉摸。在这里，我们以可逆的方式实现了相关 VO2 系统内集体和单独 MIT 的按需操作。人为设计 VO2/VO2-x 同质结中的氧缺陷促进了具有扩展的集体长度尺度的集体 MIT，而 TiO2 夹层的引入通过电子序参数的解耦驱动从该集体到两步独立 MIT 的交叉。将移动氢纳入 VO2/TiO2/VO2-x 三层中可以实现对电子相位调制的可逆控制，将两步 MIT 转变为一步 MIT 或集体电子定位。\n\n这种对 VO2 电子能带结构的离子控制灵活地触发多态 MIT，这是一个由氢相关能带填充控制的过程。我们的研究结果将集体长度尺度从被动阈值转变为动态设计参数，为自适应相关电子学的工程集体和独立 MIT 建立了可行的处理方法。", "authors": [{"name": "Xuanchi Zhou"}, {"name": "Xiaohui Yao"}, {"name": "Wentian Lu"}, {"name": "Chunwei Yao"}, {"name": "Xiaomei Qiao"}], "featured_authors": [{"name": "Xuanchi Zhou"}, {"name": "Xiaohui Yao"}, {"name": "Wentian Lu"}, {"name": "Chunwei Yao"}, {"name": "Xiaomei Qiao"}], "author_count": 5}, {"id": "2604.25706", "category": "cond-mat", "title": "Validity of DFT+U band gaps in all its known functional forms", "abstract": "The Density Functional Theory plus Hubbard $U$ (DFT+$U$) technique is one of the most widely used tools by condensed matter physicists and solid state chemists for the simulation of transition-metal and lanthanide bearing crystals, and increasingly of much more diverse chemistries. Although often synonymous with the corrective functionals of Dudarev et al. and Liechtenstein et al., there exists a wide variety of DFT+$U$-type functionals ready to be utilized, and no doubt yet to be developed. Since the earliest days, the gap in the DFT+$U$ single-particle eigenspectrum has been associated with the fundamental band gap, and the method has typically found more success for spectra than for total-energy derived properties. There has been some doubt, however, as to the conceptual validity of this association. Here, extending findings from recent years regarding local and semi-local functionals, we prove that the DFT+$U$ eigenspectrum gap is indeed valid, in the sense that it matches its own fundamental gap calculated using total-energy differences. This is true for pristine periodic systems with converged $k$-point sampling but not, however, for defective ones or isolated systems. We show that bandgap validity for solids holds in the presence of pseudopotentials and PAW potentials, when using hybrid functionals, and in DFT+$U$(+$J$) irrespective of the level of subspace projection onto the band-edge states. We survey every DFT+$U$-type functional known to have been published to date, within a unified notation. We verify analytically under which conditions the eigenvalue gap equals its fundamental gap for each functional, and analyze its effect on total energies and gaps for the hydrogen lattice in the Mott-Hubbard limit.", "url": "https://arxiv.org/abs/2604.25706", "type": "理论+数值", "summary": "密度泛函理论加上 Hubbard $U$ (DFT+$U$) 技术是凝聚态物理学家和固态化学家最广泛使用的工具之一，用于模拟过渡金属和镧系元素晶体，以及越来越多的多样化化学。尽管通常与 Dudarev 等人的校正泛函同义。和列支敦士登等人，存在各种各样的 DFT+$U$ 型泛函可供使用，并且毫无疑问还有待开发。从最早的时候起，DFT+$U$ 单粒子本征谱中的间隙就与基本带隙相关联，并且该方法通常在光谱方面比在总能量导出特性方面更成功。然而，对于这种关联的概念有效性存在一些疑问。在这里，扩展近年来关于局部和半局部泛函的发现，我们证明 DFT+$U$ 特征谱间隙确实有效，因为它与使用总能量差计算的自身基本间隙相匹配。这对于具有收敛 $k$ 点采样的原始周期系统是正确的，但对于有缺陷的系统或孤立系统则不然。\n\n我们证明，当使用混合泛函时，在存在赝势和 PAW 势的情况下，以及在 DFT+$U$(+$J$) 中，无论子空间投影到带边状态的水平如何，固体的带隙有效性都成立。我们以统一的表示法调查了迄今为止已发布的所有 DFT+$U$ 型函数。我们分析验证了在哪些条件下特征值间隙等于其每个泛函的基本间隙，并分析了其对莫特-哈伯德极限下氢晶格的总能量和间隙的影响。", "authors": [{"name": "Andrew C. Burgess"}, {"name": "David D. O'Regan"}], "featured_authors": [{"name": "Andrew C. Burgess"}, {"name": "David D. O'Regan"}], "author_count": 2}, {"id": "2604.25712", "category": "cond-mat", "title": "Exact results for the Hubbard model on bipartite lattices in spatial dimensions $d>1$: Seven theorems from the full [SU(2)$\\times$SU(2)$\\times$U(1)]/$\\mathbb{Z}_2^2$ symmetry", "abstract": "There are few exact results for the Hubbard model on bipartite lattices of spatial dimension $d>1$. Nevertheless, the Hubbard model with transfer integral $t$ and onsite repulsion $U$ on bipartite lattices with $N_a$ sites, such as the square, honeycomb, cubic, body-centered cubic, face-centered cubic, and diamond lattices, provides the simplest toy model for describing electronic correlations in many condensed-matter systems and is therefore a quantum problem of considerable physical interest. Seven exact theorems that provide new physical insight into the model are established. Overall, the exact framework based on physical spins and physical $\\eta$-spins for the Hubbard model on bipartite lattices of spatial dimension $d>1$ introduced in this paper offers a robust foundation for future studies of the model, as well as of the condensed-matter materials, such as cuprate superconductors, graphene and graphene-derived systems, and other quantum systems, that it describes.", "url": "https://arxiv.org/abs/2604.25712", "type": "理论", "summary": "对于空间维度 $d>1$ 的二分格，哈伯德模型几乎没有确切的结果。尽管如此，哈伯德模型在具有 $N_a$ 位点的二分晶格（例如方形、蜂窝状、立方体、体心立方、面心立方和菱形晶格）上具有传递积分 $t$ 和现场斥力 $U$，为描述许多凝聚态物质系统中的电子相关性提供了最简单的玩具模型，因此是一个具有相当大的物理意义的量子问题。建立了七个精确定理，为模型提供了新的物理见解。总体而言，本文介绍的空间维度 $d>1$ 的二分晶格上的哈伯德模型基于物理自旋和物理 $\\eta$-自旋的精确框架为该模型以及它所描述的凝聚态材料（例如铜酸盐超导体、石墨烯和石墨烯衍生系统以及其他量子系统）的未来研究提供了坚实的基础。", "authors": [{"name": "J. M. P. Carmelo"}], "featured_authors": [{"name": "J. M. P. Carmelo"}], "author_count": 1}, {"id": "2604.25775", "category": "cond-mat", "title": "Pareto Frontier of Neural Quantum States: Scalable, Affordable, and Accurate Convolutional Backflow for Strongly Correlated Lattice Fermions", "abstract": "Neural Quantum States (NQS) are now among the most accurate methods for studying strongly correlated many-fermion systems, outperforming existing many-body approaches for large systems. However, NQS calculations remain extremely resource-intensive. Here, we introduce a new Pareto frontier of efficiency and accuracy for NQS in simulating strongly correlated lattice fermions, defined by two complementary backflow-related architectures: the Sparse Convolutional Ansatz for Lattice Electrons (SCALE) (state-of-the-art efficiency) and the Accurate Convolutional ansatz for lattice Electrons (ACE) (state-of-the-art accuracy), benchmarked on the iconic Hubbard and $t-J$ models for large lattices. SCALE uses a tailored convolutional design enabling efficient local updates via low-rank determinant updates, reducing computational scaling from $O(N^4)$ to $O(N^3)$ in backflow methods and yielding a >40$\\times$ practical speed-up in tests while maintaining high variational accuracy. As an application, we study the previously inaccessible 1/8-doped pure Hubbard model up to $32 \\times 32$, finding no significant energy difference between horizontal and vertical filled stripe states - contrasting with half-filled stripe states when next-nearest-neighbor hoppings are included. ACE employs a deep convolutional stack to maximize expressive power, achieving unprecedented accuracy on large systems. Extensive benchmarks on Hubbard and $t-J$ models show SCALE delivers variational energies competitive with leading methods at a fraction of the cost, while ACE sets a new accuracy benchmark, surpassing recent results with only 1/6 the runtime for $16 \\times 4$ systems. These new NQS approaches provide scalable, affordable, and accurate tools for exploring strongly correlated fermionic physics, such as the microscopic mechanism of unconventional superconductivity.", "url": "https://arxiv.org/abs/2604.25775", "type": "理论+数值", "summary": "神经量子态 (NQS) 现在是研究强相关多费米子系统的最准确方法之一，其性能优于大型系统的现有多体方法。然而，NQS 计算仍然极其消耗资源。在这里，我们介绍了 NQS 在模拟强相关晶格费米子时的效率和准确性的新帕累托前沿，由两个互补的回流相关架构定义：用于晶格电子的稀疏卷积 Ansatz (SCALE)（最先进的效率）和用于晶格电子的精确卷积 Ansatz (ACE)（最先进的精度），以标志性的 Hubbard 和 $t-J$ 为基准大晶格模型。 SCALE 使用定制的卷积设计，通过低秩行列式更新实现高效的局部更新，将回流方法中的计算规模从 $O(N^4)$ 减少到 $O(N^3)$，并在测试中产生 >40$\\times$ 的实际加速，同时保持高变分精度。\n\n作为一个应用，我们研究了以前无法访问的 1/8 掺杂纯 Hubbard 模型，最高可达 $32 × 32$，发现水平和垂直填充条纹状态之间没有显着的能量差异 - 与包含下一个最近邻居跳跃时的半填充条纹状态形成对比。 ACE 采用深度卷积堆栈来最大限度地提高表达能力，在大型系统上实现前所未有的准确性。 Hubbard 和 $t-J$ 模型上的广泛基准表明，SCALE 提供的变分能量与领先方法相比，成本仅为一小部分，而 ACE 设定了新的精度基准，超越了最近的结果，运行时间仅为 16 美元 × 4 美元系统的 1/6。这些新的 NQS 方法为探索强相关的费米子物理（例如非常规超导的微观机制）提供了可扩展、经济且准确的工具。", "authors": [{"name": "Yuntian Gu"}, {"name": "Zeyao Han"}, {"name": "Wenrui Li"}, {"name": "Zhiyu Xiao"}, {"name": "Tao Xiang"}, {"name": "Mingpu Qin"}, {"name": "Liwei Wang"}, {"name": "Dingshun Lv"}], "featured_authors": [{"name": "Yuntian Gu"}, {"name": "Zeyao Han"}, {"name": "Wenrui Li"}, {"name": "Mingpu Qin"}, {"name": "Liwei Wang"}, {"name": "Dingshun Lv"}], "author_count": 8}, {"id": "2604.25805", "category": "cond-mat", "title": "Geometric Rashba Control of Polar Pairing at LaAlO$_3$/KTaO$_3$ Interfaces", "abstract": "At LaAlO$_3$/KTaO$_3$ interfaces, the superconducting $T_c$ exhibits a striking quasi-linear dependence on crystallographic orientation, coexisting with switchable polar nanoregions (PNRs). We propose an effective minimal Eliashberg framework in which overdamped PNR fluctuations provide the pairing glue, while geometric Rashba coupling controls its angular dependence. Within a reduced isotropic helicity-band description, the dynamic Rashba vertex scales as $\\sin(\\theta)$, yielding a pairing strength $\\lambda(\\theta)=\\lambda_0+C\\sin^2(\\theta)$. Exact Matsubara-Eliashberg numerical solutions show that this non-linear mapping naturally yields the same qualitative quasi-linear $T_c(\\theta)$ dependence within the reduced model. Because the Rashba-activated polar channel is amplified by the large atomic spin-orbit coupling of Ta $5d$ orbitals, the same framework also rationalizes why KTaO$_3$ interfaces exhibit both a much stronger orientational dependence and a substantially higher $T_c$ scale than their SrTiO$_3$ counterparts.", "url": "https://arxiv.org/abs/2604.25805", "type": "理论+数值", "summary": "在 LaAlO$_3$/KTaO$_3$ 界面，超导 $T_c$ 对晶体取向表现出惊人的准线性依赖性，并与可切换极性纳米区域 (PNR) 共存。我们提出了一种有效的最小 Eliashberg 框架，其中过阻尼 PNR 波动提供配对粘合剂，而几何 Rashba 耦合控制其角度依赖性。在简化的各向同性螺旋带描述中，动态 Rashba 顶点缩放为 $\\sin(\\theta)$，产生配对强度 $\\lambda(\\theta)=\\lambda_0+C\\sin^2(\\theta)$。精确的 Matsubara-Eliashberg 数值解表明，这种非线性映射自然会在简化模型中产生相同的定性准线性 $T_c(\\theta)$ 依赖性。由于 Rashba 激活的极性通道通过 Ta $5d$ 轨道的大原子自旋轨道耦合而被放大，因此相同的框架也合理化了为什么 KTaO$_3$ 界面比 SrTiO$_3$ 界面表现出更强的取向依赖性和更高的 $T_c$ 尺度。", "authors": [{"name": "Yi Zhou"}], "featured_authors": [{"name": "Yi Zhou"}], "author_count": 1}, {"id": "2604.25837", "category": "cond-mat", "title": "Restoration of Ensemble Equivalence by Quantum Fluctuations", "abstract": "We study the thermodynamic phase diagram of a one-dimensional quantum spin chain subjected to both mean-field and nearest-neighbor interactions, and to a transverse magnetic field $h$. The purpose is to determine the effect of the quantum fluctuations, due to the transverse field, on the phase diagram, in particular with respect to the occurrence of ensemble inequivalence. We denote our model as a quantum Nagle-Kardar model. To perform the calculation of the canonical partition function, we show that, due to the presence of the mean-field term, in the thermodynamic limit one can use the Hubbard-Stratonovich transformation in spite of the non-commutativity
