 of the different operators appearing in the Hamiltonian, and we adopt a procedure of successive approximations that lead to the determination of the phase diagram thanks to a scaling property of the phase transition lines. The results show that the ensemble inequivalence, present in the classical Nagle-Kardar model, is removed above a threshold value $h_c$ for the transverse field. For $h$ larger than $h_c$ the phase diagram exhibits only second-order phase transition lines, implying therefore restoration of ensemble equivalence.", "url": "https://arxiv.org/abs/2604.25837", "type": "理论+数值", "summary": "我们研究了受到平均场和最近邻相互作用以及横向磁场 $h$ 影响的一维量子自旋链的热力学相图。目的是确定横向场引起的量子涨落对相图的影响，特别是系综不等价的发生。我们将我们的模型表示为量子 Nagle-Kardar 模型。为了执行正则配分函数的计算，我们表明，由于平均场项的存在，在热力学极限下，尽管哈伯德-斯特拉托诺维奇变换中出现的不同算子具有非交换性，但我们仍可以使用哈伯德-斯特拉托诺维奇变换，并且我们采用了一种逐次逼近的过程，由于相变线的缩放特性，可以确定相图。结果表明，经典 Nagle-Kardar 模型中存在的系综不等价性在横向场阈值 $h_c$ 之上被消除。对于大于 $h_c$ 的 $h$，相图仅显示二阶相变线，这意味着恢复了系综等效性。", "authors": [{"name": "Alessandro Campa"}, {"name": "Andrea Trombettoni"}], "featured_authors": [{"name": "Alessandro Campa"}, {"name": "Andrea Trombettoni"}], "author_count": 2}, {"id": "2604.25882", "category": "cond-mat", "title": "Excluded volume and molecular field in the Lennard-Jones fluid: a modified first-order perturbation theory", "abstract": "The equation of state and, more generally, the thermodynamics of the Lennard-Jones fluid have long served as a benchmark problem in the statistical theory of fluids. Among available theoretical approaches, first-order perturbation theory occupies a special position: only at this level does the correction to the Helmholtz free energy admit an exact statistical-mechanical expression. In this work, we present a systematic, simulation-based assessment of a non-classical first-order perturbation theory in which the reference system incorporates the entire short-range part of the interaction, while the perturbation is confined to the remaining long-range tail. We show that this range-based decomposition transforms the perturbation contribution into a small, smoothly varying, near-mean-field quantity over a broad supercritical thermodynamic domain. When its density and temperature derivatives are consistently retained, the resulting equation of state reproduces high-accuracy reference data with excellent fidelity. The results demonstrate that the success of first-order perturbation theory is governed primarily by the physical content of the reference system and by the consistent treatment of its state dependence, rather than by the formal truncation order of the expansion.", "url": "https://arxiv.org/abs/2604.25882", "type": "理论+数值", "summary": "伦纳德-琼斯流体的状态方程以及更一般的热力学长期以来一直是流体统计理论中的基准问题。在可用的理论方法中，一阶微扰理论占有特殊的地位：只有在这个水平上，对亥姆霍兹自由能的修正才允许精确的统计力学表达式。在这项工作中，我们提出了对非经典一阶扰动理论的系统的、基于模拟的评估，其中参考系统包含相互作用的整个短程部分，而扰动仅限于剩余的长程尾部。我们证明，这种基于范围的分解将扰动贡献转化为在广泛的超临界热力学域上小的、平滑变化的、近平均场的量。当其密度和温度导数始终保持不变时，所得的状态方程会以出色的保真度再现高精度参考数据。\n\n结果表明，一阶微扰理论的成功主要取决于参考系统的物理内容及其状态依赖性的一致处理，而不是扩展的形式截断阶数。", "authors": [{"name": "A. Trokhymchuk"}, {"name": "V. Hordiichuk"}, {"name": "R. Melnyk"}, {"name": "I. Nezbeda"}], "featured_authors": [{"name": "A. Trokhymchuk"}, {"name": "V. Hordiichuk"}, {"name": "R. Melnyk"}, {"name": "I. Nezbeda"}], "author_count": 4}, {"id": "2604.25908", "category": "cond-mat", "title": "Structure Prediction and Bonding Analysis of B$_{18}$Ag$_2$ Clusters Featuring Double-Ring Motifs", "abstract": "The structural stability, electronic structure, and bonding characteristics of the silver-doped boron cluster B18Ag2 were investigated using density functional theory (DFT) combined with global optimization techniques. Basin-hopping searches identify a bent double-ring structure as the global minimum, consisting of two stacked B9 rings symmetrically stabilized by Ag atoms located above and below the boron framework. The UV-Vis absorption spectrum exhibits weak transitions in the near-infrared region and intense bands in the visible and near-ultraviolet regions, reflecting delocalized electronic excitations within the boron framework. Charge analysis indicates moderate electron redistribution from Ag atoms to the boron scaffold. Real-space bonding analyses based on the electron localization function (ELF), reduced density gradient (RDG), and molecular electrostatic potential (MEP) reveal that bonding is dominated by {$\\sigma$}-delocalization over the boron skeleton, while Ag-B interactions are weak, non-directional, and primarily electrostatic. The continuous annular electron delocalization within the double-ring structure suggests an aromatic-like character. These findings establish B18Ag2 as a silver-stabilized boron double-ring cluster in which global electron delocalization governs structural stability, while Ag atoms act as axial stabilizing centers that modulate the electronic structure. This work provides new insight into the role of coinage-metal doping in stabilizing extended boron nanostructures.", "url": "https://arxiv.org/abs/2604.25908", "type": "理论+数值", "summary": "利用密度泛函理论（DFT）结合全局优化技术研究了银掺杂硼团簇B18Ag2的结构稳定性、电子结构和成键特性。盆地跳跃搜索将弯曲双环结构确定为全局最小值，该结构由两个堆叠的 B9 环组成，由位于硼骨架上方和下方的 Ag 原子对称稳定。紫外-可见吸收光谱在近红外区域表现出弱跃迁，在可见光和近紫外区域表现出强谱带，反映了硼框架内的离域电子激发。电荷分析表明电子从银原子到硼支架的适度重新分布。基于电子定位函数 (ELF)、降低密度梯度 (RDG) 和分子静电势 (MEP) 的实空间键合分析表明，键合主要是硼骨架上的 {$\\sigma$} 离域作用，而 Ag-B 相互作用弱、无方向性且主要是静电作用。双环结构内的连续环形电子离域表明具有类似芳香族的特征。\n\n这些发现将 B18Ag2 确定为银稳定的硼双环簇，其中全局电子离域控制结构稳定性，而 Ag 原子充当调节电子结构的轴向稳定中心。这项工作为货币金属掺杂在稳定扩展硼纳米结构中的作用提供了新的见解。", "authors": [{"name": "Peter Ludwig Rodríguez-Kessler"}], "featured_authors": [{"name": "Peter Ludwig Rodríguez-Kessler"}], "author_count": 1}, {"id": "2604.24830", "category": "hep-th", "title": "Emergent Features in $U(N) \\times U(\\tilde{N})$ Bi-adjoint Cubic Theory", "abstract": "This work investigates the role of the $U(N) \\times U(\\tilde{N})$ global symmetry in tree-level scattering amplitudes of the bi-adjoint $\\phi^3$ theory from three perspectives: combinatorics, correlation functions, and a massive extension of the CHY formalism. We derive a planar scattering potential whose extrema reproduce Dolan and Goddard's massive scattering equations, providing physical intuition of the construction. This potential enables the counting of kinematic invariants via maximally symmetric Ferrers shapes, and it is expressed in terms of conformally invariant cross-ratios. We find that the $U(1)$ decoupling identity provides a physical interpretation of two different Catalan recursion relations, and also reveals an interplay between Catalan and Narayana numbers in the $U(1)$ splitting. Finally, we construct correlation functions for a fixed particle ordering using the CHY formalism, offering new insights into the dynamics of such amplitude structures. We derive a closed form expression of the reduced number of solutions for this set-up, as well as an off-shell scattering potential.", "url": "https://arxiv.org/abs/2604.24830", "type": "理论", "summary": "这项工作从组合学、相关函数和 CHY 形式主义的大规模扩展三个角度研究了 $U(N) \\times U(\\tilde{N})$ 全局对称性在双伴随 $\\phi^3$ 理论的树级散射振幅中的作用。我们导出了平面散射势，其极值再现了多兰和戈达德的大规模散射方程，提供了构造的物理直觉。这种势能通过最大对称费雷尔形状来计算运动学不变量，并以共形不变量交比表示。我们发现 $U(1)$ 解耦恒等式提供了两种不同的 Catalan 递归关系的物理解释，并且还揭示了 $U(1)$ 分裂中 Catalan 数和 Narayana 数之间的相互作用。最后，我们使用 CHY 形式构造了固定粒子排序的相关函数，为此类振幅结构的动力学提供了新的见解。我们得出了该设置的减少解数的封闭形式表达式，以及离壳散射势。", "authors": [{"name": "Lauren Smyth"}], "featured_authors": [{"name": "Lauren Smyth"}], "author_count": 1}, {"id": "2604.24834", "category": "hep-th", "title": "Revisiting near-extremal and near-BPS black holes in AdS3 supergravity", "abstract": "Despite the archetypal status of the BTZ background in quantifying quantum aspects of black holes, several features at low temperatures remain imprecise and incomplete. Here, we systematically investigate the behaviour of the Euclidean path integral at low temperatures in the context of AdS3 supergravity, including an analysis of quantum fluctuations in both the near-horizon and asymptotic regions. We clarify and rectify aspects of the bosonic fluctuations, highlighting the role of boundary conditions in AdS3, and show in particular that the gravitational path integral in the near-horizon region is inequivalent to that around BTZ at low temperature. We further account in detail for the contributions of Chern-Simons fields and spin-3/2 modes, thereby refining the disparities between the near-extremal and near-BPS limits at low temperature. Altogether, our analysis sharpens the distinction between near- and far-region dynamics and demonstrates a disagreement in the gravitational path integral at the quantum level.", "url": "https://arxiv.org/abs/2604.24834", "type": "理论", "summary": "尽管 BTZ 背景在量化黑洞的量子方面具有典型地位，但低温下的一些特征仍然不精确和不完整。在这里，我们系统地研究了 AdS3 超引力背景下低温下欧几里得路径积分的行为，包括对近地平线和渐近区域的量子涨落的分析。我们澄清并纠正了玻色子涨落的各个方面，强调了 AdS3 中边界条件的作用，并特别表明近地平线区域的引力路径积分与低温下 BTZ 周围的引力路径积分不相等。我们进一步详细解释了 Chern-Simons 场和自旋 3/2 模式的贡献，从而细化了低温下近极值和近 BPS 极限之间的差异。总而言之，我们的分析加深了近区和远区动力学之间的区别，并证明了量子水平上引力路径积分的分歧。", "authors": [{"name": "Adam Bac"}, {"name": "Alejandra Castro"}, {"name": "Diksha Jain"}], "featured_authors": [{"name": "Adam Bac"}, {"name": "Alejandra Castro"}, {"name": "Diksha Jain"}], "author_count": 3}, {"id": "2604.24839", "category": "hep-th", "title": "Upgrading Extremal Flows in the Space of Derivatives", "abstract": "The method of extremal flows has presented an alluring alternative approach to numerically solving bootstrap constraints. Here I present the development and adaptation of that approach to a more general class of flows with apparent discontinuities. I focus on upgrading solutions of gap maximization for the spinning modular bootstrap from low to high numerical order, though the methodology is generic to a broader class of bootstrap constraints and flows. This methodology presents various nontrivialities and nuances which reflect a richness of the space of bootstrap solutions. The result is a prototype which successfully upgrades solutions in a simple test case at small scale.", "url": "https://arxiv.org/abs/2604.24839", "type": "理论", "summary": "极值流方法为数值求解引导约束提供了一种诱人的替代方法。在这里，我介绍了该方法的开发和适应，以适应具有明显不连续性的更一般类别的流。我专注于将旋转模块化引导程序的间隙最大化解决方案从低阶到高阶升级，尽管该方法对于更广泛的引导程序约束和流程是通用的。这种方法提出了各种重要的细节和细微差别，反映了引导解决方案空间的丰富性。结果是一个原型在小规模的简单测试用例中成功升级了解决方案。", "authors": [{"name": "Rajeev S. Erramilli"}], "featured_authors": [{"name": "Rajeev S. Erramilli"}], "author_count": 1}, {"id": "2604.24843", "category": "hep-th", "title": "Optimal paths across potentials on scalar field space", "abstract": "Motivated by the Swampland Distance Conjecture, we study distances in field space using the framework of Optimal Transport. The associated optimisation problem naturally leads to a notion of distance in terms of a (generalised) Wasserstein distance between probability distributions over field space. In the absence of dynamical gravity, we relate the transport problem to Hamilton-Jacobi and continuity equations arising from a WKB expansion of a Schrödinger equation associated with the physical configuration. We then formulate an extension in the presence of dynamical gravity. Using the ADM formalism, we establish the corresponding transport problem through the Wheeler-DeWitt equation, giving rise to different possible choices of cost functions. The resulting notions of distances are naturally defined on the full configuration space, while an interpretation in terms of a genuine scalar field distance requires additional modifications. We further discuss several applications and examples, and indicate possible implications for different themes within the Swampland program.", "url": "https://arxiv.org/abs/2604.24843", "type": "理论", "summary": "受沼泽距离猜想的启发，我们使用最优传输框架研究场空间中的距离。相关的优化问题自然会产生距离的概念，即场空间上概率分布之间的（广义）Wasserstein 距离。在没有动力引力的情况下，我们将输运问题与 Hamilton-Jacobi 和连续性方程联系起来，这些方程是由与物理配置相关的薛定谔方程的 WKB 展开产生的。然后，我们在存在动态重力的情况下制定扩展。使用ADM形式，我们通过Wheeler-DeWitt方程建立相应的传输问题，从而产生不同可能的成本函数选择。由此产生的距离概念自然地在完整的配置空间上定义，而根据真正的标量场距离进行解释则需要额外的修改。我们进一步讨论了几个应用程序和示例，并指出了沼泽地计划中不同主题的可能含义。", "authors": [{"name": "Saskia Demulder"}, {"name": "Dieter Lust"}, {"name": "Carmine Montella"}, {"name": "Thomas Raml"}], "featured_authors": [{"name": "Saskia Demulder"}, {"name": "Dieter Lust"}, {"name": "Carmine Montella"}, {"name": "Thomas Raml"}], "author_count": 4}, {"id": "2604.24844", "category": "hep-th", "title": "Three-Gluon Scattering Amplitude in de Sitter Spacetime", "abstract": "We study three-gluon scattering amplitudes in global de Sitter spacetime, in the angular momentum basis of SO(1,4) symmetry representations. At the tree level, they are determined by the intertwiner integrals of harmonic one-forms on the three-sphere. We derive a general formula valid for all helicity configurations of incoming and outgoing gluons and express the amplitudes in terms of Wigner 3j symbols.", "url": "https://arxiv.org/abs/2604.24844", "type": "理论", "summary": "我们在 SO(1,4) 对称表示的角动量基础上研究全局德西特时空中的三胶子散射振幅。在树级别，它们由三球体上调和一型的交织积分确定。我们推导出一个对传入和传出胶子的所有螺旋性配置都有效的通用公式，并用维格纳 3j 符号表示振幅。", "authors": [{"name": "Tomasz R. Taylor"}, {"name": "Bin Zhu"}], "featured_authors": [{"name": "Tomasz R. Taylor"}, {"name": "Bin Zhu"}], "author_count": 2}, {"id": "2604.24864", "category": "hep-th", "title": "On the structure of higher-dimensional integrable field theories", "abstract": "We propose a general framework for integrable field theories in arbitrary spacetime dimension $d+1$ which is based on $d$-term $L_\\infty$-algebras. Specifically, we introduce cyclic $L_\\infty$-algebras describing topological-holomorphic higher Chern-Simons theories on $M \\times \\mathbb{C}P^1$ with suitable singularity structures and boundary conditions, controlled by a meromorphic $1$-form on $\\mathbb{C}P^1$. Using homological perturbation theory and homotopy transfer, we construct weakly equivalent models describing $(d+1)$-dimensional field theories on $M$. Their integrability is witnessed by a natural map to an $L_\\infty$-algebra describing higher Lax connections, yielding conserved charges associated with higher-dimensional cycles in $M$. The resulting theories admit natural action functionals and recover the Costello-Yamazaki construction in $2$ dimensions.", "url": "https://arxiv.org/abs/2604.24864", "type": "理论", "summary": "我们提出了任意时空维度$d+1$中可积场论的通用框架，该框架基于$d$项$L_\\infty$-代数。具体来说，我们引入了循环$L_\\infty$-代数，描述了$M \\times \\mathbb{C}P^1$ 上的拓扑全纯高等陈-西蒙斯理论，具有合适的奇点结构和边界条件，由$\\mathbb{C}P^1$ 上的亚纯$1$-形式控制。利用同调微扰理论和同伦传递，我们构建了描述 $M$ 上 $(d+1)$ 维场论的弱等效模型。它们的可积性由描述更高 Lax 连接的 $L_\\infty$ 代数的自然映射证明，产生与 $M$ 中高维循环相关的守恒电荷。由此产生的理论承认自然作用泛函，并在 2 美元维度上恢复 Costello-Yamazaki 结构。", "authors": [{"name": "Marco Benini"}, {"name": "Ryan A. Cullinan"}, {"name": "Alexander Schenkel"}, {"name": "Benoit Vicedo"}], "featured_authors": [{"name": "Marco Benini"}, {"name": "Ryan A. Cullinan"}, {"name": "Alexander Schenkel"}, {"name": "Benoit Vicedo"}], "author_count": 4}, {"id": "2604.24873", "category": "hep-th", "title": "Amplitudes in self-dual (higher-spin) theories", "abstract": "Self-dual theories are powerful toy models of their completions. It was shown recently that there are infinitely many SD-theories once massless higher-spin fields are allowed. The maximal SD-theory is chiral higher-spin gravity. Following the recent [ arXiv:2602.12176 ] we show that all SD-theories, including those with massless higher-spin fields, have nontrivial tree-level amplitudes in Kleinian signature or complex Minkowski kinematics. Within celestial holography, the nontriviality of amplitudes in chiral higher-spin gravity provides the missing ingredient needed to complete the celestial analogue of the vector-model/higher-spin AdS/CFT duality.", "url": "https://arxiv.org/abs/2604.24873", "type": "理论", "summary": "自对偶理论是其完成的强大玩具模型。最近的研究表明，一旦允许无质量的高自旋场，就会有无限多个 SD 理论。最大 SD 理论是手性高自旋引力。继最近的[arXiv:2602.12176]之后，我们表明所有SD理论，包括那些具有无质量高自旋场的理论，在克莱因签名或复杂的明可夫斯基运动学中都具有不平凡的树级振幅。在天体全息术中，手性高自旋引力振幅的非平凡性提供了完成矢量模型/高自旋 AdS/CFT 对偶性的天体模拟所需的缺失成分。", "authors": [{"name": "Mattia Serrani"}, {"name": "Evgeny Skvortsov"}], "featured_authors": [{"name": "Mattia Serrani"}, {"name": "Evgeny Skvortsov"}], "author_count": 2}, {"id": "2604.25035", "category": "hep-th", "title": "The Thermodynamics of Cosmological Horizons and Their Holographic Description in de Sitter Space", "abstract": "We analyse the laws of thermodynamics governing the behaviour of cosmological horizons in de Sitter space and their map to a holographic description at future infinity, $\\mathcal{I}^+$. In this case, the boundary can receive signals from two cosmological horizons. We find a universal form for the first law of thermodynamics, valid in general circumstances, when matter-energy crosses both horizons and impinges on the boundary. This universal form leads to a well defined notion of entropy in the holographic dual. It is specified on a co-dimension one surface of the boundary, and can be expressed as a function of two boundary charges, pressure and angular momentum, both of which are derived from the Brown-York stress tensor. Additional comments on the second law, confusing factors of $i$ which arise, and comments pertaining to JT gravity, are included towards the end.", "url": "https://arxiv.org/abs/2604.25035", "type": "理论", "summary": "我们分析了控制德西特空间中宇宙视界行为的热力学定律，以及它们到未来无穷远 $\\mathcal{I}^+$ 的全息描述的映射。在这种情况下，边界可以接收来自两个宇宙视界的信号。我们找到了热力学第一定律的普遍形式，在一般情况下，当物质能量穿过两个视界并撞击边界时，它是有效的。这种普遍形式导致了全息对偶中明确定义的熵概念。它在边界的一个共维表面上指定，并且可以表示为两个边界电荷、压力和角动量的函数，这两个边界电荷都源自 Brown-York 应力张量。对第二定律的附加评论、出现的 $i$ 的混乱因素以及与 JT 引力有关的评论都包含在最后。", "authors": [{"name": "Indranil Dey"}, {"name": "Kanhu Kishore Nanda"}, {"name": "Akashdeep Roy"}, {"name": "Deepak Kumar Sharma"}, {"name": "Sandip P. Trivedi"}], "featured_authors": [{"name": "Indranil Dey"}, {"name": "Kanhu Kishore Nanda"}, {"name": "Akashdeep Roy"}, {"name": "Deepak Kumar Sharma"}, {"name": "Sandip P. Trivedi"}], "author_count": 5}, {"id": "2604.25052", "category": "hep-th", "title": "Path integral for the closed superstring and the matrix model", "abstract": "The IKKT matrix model, which is proposed as a non-perturbative formulation of superstring theory, has an issue typical of zero-dimensional theory -- ambiguity in the definition of its path integral. To tackle this issue, we revisit the path-integral formulation of perturbative string theory. In this article, we review recent progress in the string world-sheet path-integral formulation, especially in the Minkowski signature. We first derive the Minkowskian path integral of the Nambu-Goto type equivalent to Polyakov's Euclidean path integral for critical closed string theory, showing equivalences among the Nambu-Goto-, Schild- and Polyakov-type formulations both in the Minkowskian and Euclidean signatures. We also show that ``stringy causality'' is realised in the path-integral formulation at the level of string perturbation theory. We then obtain the matrix model with a property like the stringy causality, which turns out to be a Minkowskian version of the NBI-type IKKT matrix model, by matrix regularisation of the path integral for perturbative type IIB string theory.", "url": "https://arxiv.org/abs/2604.25052", "type": "理论", "summary": "IKKT 矩阵模型是作为超弦理论的非微扰表述而提出的，它具有零维理论的典型问题——路径积分定义的模糊性。为了解决这个问题，我们重新审视微扰弦理论的路径积分公式。在本文中，我们回顾了字符串世界表路径积分公式的最新进展，特别是 Minkowski 签名。我们首先推导了与临界闭弦理论的波利亚科夫欧几里得路径积分等价的 Nambu-Goto 类型的 Minkowskian 路径积分，显示了 Nambu-Goto、Schild 和 Polyakov 类型公式在 Minkowskiian 和 Euclidean 签名中的等价性。我们还表明，“弦因果关系”是在弦微扰理论层面的路径积分公式中实现的。然后，通过微扰IIB型弦理论路径积分的矩阵正则化，我们获得了具有弦因果关系性质的矩阵模型，该模型是NBI型IKKT矩阵模型的闵可夫斯基版本。", "authors": [{"name": "Yuhma Asano"}], "featured_authors": [{"name": "Yuhma Asano"}], "author_count": 1}, {"id": "2604.25100", "category": "hep-th", "title": "Thermodynamic Phase Transitions in Einstein-Maxwell-Scalar-Gauss-Bonnet Gravity", "abstract": "Although asymptotically flat black holes generically lack thermodynamic phase transitions, we show that curvature-induced scalarization of electrically charged black holes in Einstein-Maxwell- Scalar-Gauss-Bonnet theory provides a natural setting for nontrivial thermodynamic behavior, without invoking external confining mechanisms or an extended thermodynamic formalism. Working within the canonical ensemble and employing the Euclidean approach, we identify the coexistence of locally stable scalarized and small Reissner-Nordström thermal states, which promotes free-energy crossings to bona fide phase transitions between equilibrium phases. For weak coupling, a second-order phase transition coincides with the second bifurcation point, at which the scalarized branch reconnects with the Reissner-Nordström branch and scalar hair is spontaneously shed. As the coupling strength increases, this transition becomes zeroth order, the scalarized branch shrinks, and a fish-like structure develops in its Helmholtz free energy, rendering locally stable thermal states partially metastable, and yielding up to three phase transitions. In the strong-coupling limit, the scalarized branch reduces to a Schwarzschild-like solution, and the Reissner-Nordström phase ultimately emerges as the sole thermodynamically preferred configuration", "url": "https://arxiv.org/abs/2604.25100", "type": "理论", "summary": "尽管渐近平坦黑洞通常缺乏热力学相变，但我们表明，爱因斯坦-麦克斯韦-标量-高斯-博内特理论中带电黑洞的曲率引起的标量化为非平凡的热力学行为提供了自然的设置，而无需调用外部限制机制或扩展的热力学形式主义。在规范系综中工作并采用欧几里德方法，我们确定了局部稳定的标量化和小 Reissner-Nordström 热态的共存，这促进了平衡相之间自由能交叉到真正的相变。对于弱耦合，二阶相变与第二分岔点重合，在该点标量化分支与 Reissner-Nordström 分支重新连接，并且标量毛发自发脱落。随着耦合强度的增加，这种转变变成零阶，标量化分支收缩，并且在其亥姆霍兹自由能中形成鱼状结构，使局部稳定的热态部分亚稳态，并产生最多三个相变。\n\n在强耦合极限下，标量化分支简化为类 Schwarzschild 解，并且 Reissner-Nordström 相最终成为唯一的热力学首选配置", "authors": [{"name": "Cristián Erices"}, {"name": "Stella Kiorpelidi"}], "featured_authors": [{"name": "Cristián Erices"}, {"name": "Stella Kiorpelidi"}], "author_count": 2}, {"id": "2604.25103", "category": "hep-th", "title": "Rethinking Dimensional Regularization in Critical Phenomena", "abstract": "We show that it is possible to use dimensional regularization (DR) beyond the usual $\\varepsilon$-expansion in the context of renormalization group (RG) calculations in Critical Phenomena. Based on this fact, we propose a new functional RG scheme - Functional Dimensional Regularization (FDR) - and apply it to a scalar theory in three dimensions. We compute the critical exponents of the Ising universality class directly in $d=3$ under various typical approximations. The method that emerges combines the agility typical of DR with the generality proper of functional RG. Moreover, at a given order of approximation, FDR seems to provide faster convergence and better estimates than other functional RGs.", "url": "https://arxiv.org/abs/2604.25103", "type": "理论", "summary": "我们证明，在临界现象中的重正化群（RG）计算的背景下，可以使用超出通常的 $\\varepsilon$ 展开的维数正则化（DR）。基于这一事实，我们提出了一种新的函数 RG 方案 - 函数维度正则化 (FDR) - 并将其应用于三维标量理论。我们在各种典型近似下直接在 $d=3$ 中计算 Ising 普适性类的临界指数。出现的方法结合了 DR 典型的敏捷性和功能 RG 的通用性。此外，在给定的近似阶数下，FDR 似乎比其他功能 RG 提供更快的收敛和更好的估计。", "authors": [{"name": "P. Beretta"}, {"name": "A. Codello"}], "featured_authors": [{"name": "P. Beretta"}, {"name": "A. Codello"}], "author_count": 2}, {"id": "2604.25226", "category": "hep-th", "title": "A nonabelian Wilson surface on a lattice", "abstract": "We analyze the nonabelian surface holonomy on a bipartite hypercubic lattice following a proposal in arXiv:1002.4636 [hep-th]. The bipartite structure of the lattice enables us to introduce spike string configurations. These spikes play a crucial role for the time evolution of the string when the total number of color indices changes.", "url": "https://arxiv.org/abs/2604.25226", "type": "理论", "summary": "我们按照 arXiv:1002.4636 [hep-th] 中的提议分析二分超立方晶格上的非阿贝尔表面完整性。晶格的二分结构使我们能够引入尖峰串配置。当颜色索引总数发生变化时，这些尖峰对于字符串的时间演化起着至关重要的作用。", "authors": [{"name": "Andreas Gustavsson"}], "featured_authors": [{"name": "Andreas Gustavsson"}], "author_count": 1}, {"id": "2604.25240", "category": "hep-th", "title": "Simple Analytical Solutions of the Wheeler-DeWitt Equation in the Classical Hamilton-Jacobi Limit", "abstract": "We investigate the Wheeler-DeWitt equation for a flat, homogeneous, and isotropic Universe containing a canonical scalar field with a potential. We show that under the constraint $|\\Psi|=1$, where the Wheeler-DeWitt equation exactly becomes the classical Hamilton-Jacobi equation, the form of the potential is completely determined depending on the value of the operator ordering parameter. Furthermore, we demonstrate that the classified potentials admit simple forms, such as the exponential, quadratic with a negative cosmological constant, and cosine-type potential with a negative cosmological constant. Several of these have already been explored in the context of inflation or dark energy. Finally, focusing on the system with the cosine-type potential and a negative cosmological constant in the classified potentials, we derive the analytical solutions for the scale factor and the scalar field and discuss the cosmological implications.", "url": "https://arxiv.org/abs/2604.25240", "type": "理论", "summary": "我们研究包含具有势的正则标量场的平坦、均匀且各向同性宇宙的惠勒-德威特方程。我们证明，在 $|\\Psi|=1$ 约束下，惠勒-德维特方程完全变为经典的哈密尔顿-雅可比方程，势的形式完全取决于算子排序参数的值。此外，我们证明分类势允许简单的形式，例如指数势、具有负宇宙学常数的二次势和具有负宇宙学常数的余弦型势。其中一些已经在通货膨胀或暗能量的背景下进行了探索。最后，针对具有余弦型势和分类势中具有负宇宙学常数的系统，我们推导了尺度因子和标量场的解析解，并讨论了其宇宙学含义。", "authors": [{"name": "Naoto Maki"}, {"name": "Chia-Min Lin"}, {"name": "Kazunori Kohri"}], "featured_authors": [{"name": "Naoto Maki"}, {"name": "Chia-Min Lin"}, {"name": "Kazunori Kohri"}], "author_count": 3}, {"id": "2604.25270", "category": "hep-th", "title": "Integrand Analysis, Leading Singularities and Canonical Bases beyond Polylogarithms", "abstract": "In this paper, we elaborate on the connection between leading singularities and canonical bases of Feynman integrals beyond polylogarithms. We start by discussing a notion of leading singularities in dimensional regularization, which can be generalized from the Riemann sphere to more complex geometries, and use it to demonstrate how selecting Feynman integrals with unit leading singularities necessitates introducing new transcendental functions related to the periods of the underlying geometries. Integrals with unit leading singularities in this generalized sense, satisfy $\\epsilon$-factorized differential equations, and the new transcendental functions are in direct correspondence to the new differential forms appearing in their Gauss-Manin connection. We argue that this construction is mathematically equivalent to the splitting of the period matrix into semi-simple and unipotent parts plus a clean-up step, and demonstrate its use with examples of increasing complexity that require the interplay of multiple geometries.", "url": "https://arxiv.org/abs/2604.25270", "type": "理论", "summary": "在本文中，我们详细阐述了多对数之外的费曼积分的主导奇点和规范基之间的联系。我们首先讨论维度正则化中先导奇点的概念，该概念可以从黎曼球面推广到更复杂的几何形状，并用它来演示如何选择具有单位先导奇点的费曼积分需要引入与基础几何周期相关的新超越函数。在这种广义意义上，具有单位引导奇点的积分满足 $\\epsilon$ 因式分解微分方程，并且新的超越函数直接对应于高斯-马宁联系中出现的新微分形式。我们认为这种构造在数学上相当于将周期矩阵分割成半简单和单能的部分加上清理步骤，并通过需要多个几何相互作用的复杂性增加的示例来证明其用途。", "authors": [{"name": "Felix Forner"}, {"name": "Cesare Carlo Mella"}, {"name": "Christoph Nega"}, {"name": "Lorenzo Tancredi"}, {"name": "Fabian J. Wagner"}], "featured_authors": [{"name": "Felix Forner"}, {"name": "Cesare Carlo Mella"}, {"name": "Christoph Nega"}, {"name": "Lorenzo Tancredi"}, {"name": "Fabian J. Wagner"}], "author_count": 5}, {"id": "2604.25463", "category": "hep-th", "title": "Liouville Blocks from Spectral Networks", "abstract": "In this paper, we investigate the role of spectral networks in quantum Liouville theory, with particular emphasis on spectral networks of Fenchel-Nielsen-type. In the first part, we construct q-parallel transport for Fenchel-Nielsen networks through q-nonabelianisation, and compare with quantum parallel transport computed using the Moore-Seiberg formalism. This motivates a proposal for a quantum version of the NRS proposal. In the second part, we reproduce Liouville conformal blocks through the standard free-field formalism with Fenchel-Nielsen-type integration contours. However, we observe that this approach is not complete with respect to wall-crossing. We therefore develop an extension of the free-field formalism to smooth spectral coverings, with the Maulik-Okounkov R-matrix playing a central role. We conjecture that this new formalism generates the full spectrum of Liouville conformal blocks, and provides a first-principle definition for Goncharov-Shen conformal blocks.", "url": "https://arxiv.org/abs/2604.25463", "type": "理论", "summary": "在本文中，我们研究了光谱网络在量子刘维尔理论中的作用，特别强调芬切尔-尼尔森型光谱网络。在第一部分中，我们通过 q-nonabelianization 构造 Fenchel-Nielsen 网络的 q-并行传输，并与使用 Moore-Seiberg 形式计算的量子并行传输进行比较。这激发了 NRS 提案的量子版本的提案。在第二部分中，我们通过具有 Fenchel-Nielsen 型积分轮廓的标准自由场形式再现了刘维尔共形块。然而，我们观察到这种方法对于跨墙来说并不完整。因此，我们开发了自由场形式主义的扩展以平滑光谱覆盖，其中 Maulik-Okounkov R 矩阵发挥着核心作用。我们推测这种新的形式主义产生了全谱的Liouville共形块，并为Goncharov-Shen共形块提供了第一原理定义。", "authors": [{"name": "Lotte Hollands"}, {"name": "Subrabalan Murugesan"}], "featured_authors": [{"name": "Lotte Hollands"}, {"name": "Subrabalan Murugesan"}], "author_count": 2}, {"id": "2604.25495", "category": "hep-th", "title": "Phase Transitions and Chaos Bound in Horava Lifshitz Black Holes using Lyapunov Exponents", "abstract": "We probe the thermodynamic phase structure of four dimensional Horava Lifshitz black holes by Lyapunov exponent analysis. For both massless and massive test particles, the Lyapunov exponent exhibits a multivalued dependence on temperature in regimes with a first-order phase transition, with distinct branches corresponding to small, intermediate, and large black hole phases, and this behaviour disappears at the critical point. The discontinuity in the Lyapunov exponent acts as an effective order parameter with critical exponent $\\delta=1/2$, consistent with mean-field universality. We also find that the chaos bound is generically violated below a threshold horizon radius, with the violation occurring within the thermodynamically stable phase and persisting even in the absence of a phase transition. These results establish the robustness and universality of Lyapunov exponents as probes of black hole thermodynamics in alternative theories of gravity.", "url": "https://arxiv.org/abs/2604.25495", "type": "理论", "summary": "我们通过 Lyapunov 指数分析探讨了四维 Horava Lifshitz 黑洞的热力学相结构。对于无质量和大质量的测试粒子，李亚普诺夫指数在具有一级相变的区域中表现出对温度的多值依赖性，具有对应于小、中和大黑洞相的不同分支，并且这种行为在临界点消失。 Lyapunov 指数中的不连续性充当有效阶参数，其临界指数 $\\delta=1/2$，与平均场普遍性一致。我们还发现，混沌界限通常会在阈值视界半径以下被违反，这种违反发生在热力学稳定相内，并且即使在没有相变的情况下也会持续存在。这些结果确立了李亚普诺夫指数作为替代引力理论中黑洞热力学探针的稳健性和普遍性。", "authors": [{"name": "Mozib Bin Awal"}, {"name": "Prabwal Phukon"}], "featured_authors": [{"name": "Mozib Bin Awal"}, {"name": "Prabwal Phukon"}], "author_count": 2}, {"id": "2604.25518", "category": "hep-th", "title": "Criticality of ISCOs and AdS/CFT", "abstract": "We study the trajectories of massive particles in spherically symmetric black holes in arbitrary dimensions, and find certain universal features based on the topological classification of the fixed points. If the system admits a center, we find two possible outcomes: regardless of the value of the angular momentum, the center always survives, which is realized in global AdS spacetimes or, the center disappears below a critical value of angular momentum, which happens for various spherically symmetric black holes. For the latter case, we find that irrespective of the details of the black hole, there must always be a saddle point. Topological arguments show that there exists a certain critical value of energy, angular momentum and the angular velocity, where the center and the saddle coalesce. This happens at a special point in the parameter space where the trajectories are the limiting innermost stable circular orbits (ISCOs). At the critical point, conserved quantities show universal, van der Waals-like mean-field scaling typical of a second-order phase transition. The anomalous dimensions $\\gamma$ of the double-twist operators in the CFT are found, both using AdS/CFT and through the the heavy-heavy-light-light four point correlators, giving negative and positive values for the center and saddle, respectively, including the emergence of certain non-analytic behaviour at the ISCO. For the center, we also find subleading corrections in $\\frac{1}{\\Delta_H}$ to $\\gamma$ in the dual CFT, and dsicuss the implications of our results.", "url": "https://arxiv.org/abs/2604.25518", "type": "理论", "summary": "我们研究任意维度球对称黑洞中大质量粒子的轨迹，并基于不动点的拓扑分类发现某些普遍特征。如果系统承认一个中心，我们会发现两种可能的结果：无论角动量的值如何，中心总是存在，这在全球AdS时空中实现，或者中心在低于角动量的临界值时消失，这发生在各种球对称黑洞中。对于后一种情况，我们发现无论黑洞的细节如何，都必定存在一个鞍点。拓扑论证表明，中心和鞍座合并时存在一定的能量、角动量和角速度临界值。这发生在参数空间中的一个特殊点，其中轨迹是限制最内稳定圆形轨道（ISCO）。在临界点，守恒量显示出普遍的、类似范德华的平均场标度，这是二阶相变的典型特征。\n\n发现了 CFT 中双扭曲算子的异常维度 $\\gamma$，均使用 AdS/CFT 并通过重-重-轻-轻四点相关器，分别给出中心和鞍点的负值和正值，包括在 ISCO 处出现某些非解析行为。对于中心，我们还发现对偶 CFT 中 $\\frac{1}{\\Delta_H}$ 到 $\\gamma$ 的次领先修正，并讨论了我们结果的含义。", "authors": [{"name": "Chandrasekhar Bhamidipati"}, {"name": "Parashar Chatterjee"}, {"name": "Sudipta Mukherji"}, {"name": "Yogesh Kumar Srivastava"}], "featured_authors": [{"name": "Chandrasekhar Bhamidipati"}, {"name": "Parashar Chatterjee"}, {"name": "Sudipta Mukherji"}, {"name": "Yogesh Kumar Srivastava"}], "author_count": 4}, {"id": "2604.25569", "category": "hep-th", "title": "Curvature-Assisted Dynamical Compactification in a Pre-Inflationary Higher-Dimensional Universe", "abstract": "We investigate a pre-inflationary dynamical compactification scenario in which a higher-dimensional expanding universe evolves into an effectively four-dimensional one through curvature-assisted modulus trapping. To obtain a calculable semiclassical realization, we consider a simple five-dimensional $S^1$ compactification in a time-dependent open FRW background. Bulk quantum fields generate both the late-time Casimir contribution that stabilizes the radion and the early-time Kaluza-Klein thermal contributions relevant for the cosmological evolution. We show that negative curvature can sustain tracker-like radion evolution, allowing the radion to be trapped in a compactified vacuum before a subsequent four-dimensional inflationary phase dilutes the curvature remnant. While our analysis is performed in a 5D toy model, it illustrates a broader mechanism by which dynamical compactification can arise in a pre-inflationary higher-dimensional cosmology.", "url": "https://arxiv.org/abs/2604.25569", "type": "理论", "summary": "我们研究了一种暴胀前的动态致密化场景，其中高维膨胀宇宙通过曲率辅助模量捕获演变成有效的四维宇宙。为了获得可计算的半经典实现，我们考虑在时间相关的开放 FRW 背景中进行简单的五维 $S^1$ 紧化。体量子场产生了稳定放射性的晚期卡西米尔贡献和与宇宙演化相关的早期卡鲁扎-克莱因热贡献。我们证明负曲率可以维持类似跟踪器的放射子演化，使放射子在随后的四维膨胀阶段稀释曲率残余之前被捕获在致密真空中。虽然我们的分析是在 5D 玩具模型中进行的，但它说明了一种更广泛的机制，通过该机制可以在暴胀前的高维宇宙学中出现动态致密化。", "authors": [{"name": "Yusuke Yamada"}], "featured_authors": [{"name": "Yusuke Yamada"}], "author_count": 1}, {"id": "2604.25739", "category": "hep-th", "title": "Graphical Functions by Examples", "abstract": "Graphical functions have emerged as a powerful framework for evaluating multi-loop Feynman integrals in perturbative quantum field theory. Defined as massless three-point position-space integrals, they reveal rich analytic structures and have enabled major advances, including the highest-loop results currently known in several quantum field theories. Their role extends to conformal field theory, and recent algorithmic developments now allow many graphical functions to be computed automatically. This review, based on graduate-level lectures held by O.S. in 2025/26 at the University of Hamburg, introduces the central ideas behind graphical functions, covering periods, Feynman residues, and the treatment of regular and singular cases in both integer and non-integer dimensions. It also discusses connections to momentum space and self-duality, and provides guidance for further study, offering a coherent entry point into a topic not addressed in standard textbooks.", "url": "https://arxiv.org/abs/2604.25739", "type": "理论", "summary": "图函数已成为评估微扰量子场论中多环费曼积分的强大框架。它们被定义为无质量三点位置空间积分，揭示了丰富的解析结构并取得了重大进展，包括目前在几种量子场论中已知的最高循环结果。它们的作用扩展到共形场论，最近的算法发展现在允许自动计算许多图形函数。这篇评论基于 O.S. 举办的研究生水平讲座。 2025/26 年在汉堡大学举办，介绍了图形函数背后的中心思想，涵盖周期、费曼留数以及整数和非整数维度中正则和奇异情况的处理。它还讨论了动量空间和自二重性的联系，并为进一步的研究提供了指导，为标准教科书中未涉及的主题提供了一个连贯的切入点。", "authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Marco Klann"}, {"name": "Sven-Olaf Moch"}, {"name": "Pooja Mukherjee"}, {"name": "Tobias Porsche"}, {"name": "Oliver Schnetz"}, {"name": "Leonid A. Shumilov"}], "featured_authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Marco Klann"}, {"name": "Sven-Olaf Moch"}, {"name": "Tobias Porsche"}, {"name": "Oliver Schnetz"}, {"name": "Leonid A. Shumilov"}], "author_count": 7}, {"id": "2604.25803", "category": "hep-th", "title": "Kodaira-Spencer theory for flux backgrounds", "abstract": "We give an explicit description (in component fields) of a holomorphic theory associated to a general supersymmetric background of $\\mathcal N=1$ supergravity in ten dimensions. Conjecturally, this provides a sought-for holomorphic realisation of the supergravity twist in such backgrounds, generalising the minimal type I BCOV theory for Calabi-Yau manifolds. Our theory unpacks the recently introduced Courant contact model associated to a holomorphic Courant algebroid. We also show that a coisotropic reduction of this model reproduces the recent model of ref [1], which is formulated in terms of constrained fields.", "url": "https://arxiv.org/abs/2604.25803", "type": "理论", "summary": "我们给出了与十维 $\\mathcal N=1$ 超引力的一般超对称背景相关的全纯理论（在分量域中）的明确描述。据推测，这为此类背景下的超重力扭曲提供了一种寻求的全纯实现，推广了 Calabi-Yau 流形的最小 I 型 BCOV 理论。我们的理论解开了最近引入的与全纯库朗代数体相关的库朗接触模型。我们还表明，该模型的各向同性约简再现了参考文献 [1] 的最新模型，该模型是根据约束场制定的。", "authors": [{"name": "Caleb Jonker"}, {"name": "Julian Kupka"}, {"name": "Ingmar Saberi"}, {"name": "Charles Strickland-Constable"}, {"name": "Fridrich Valach"}], "featured_authors": [{"name": "Caleb Jonker"}, {"name": "Julian Kupka"}, {"name": "Ingmar Saberi"}, {"name": "Charles Strickland-Constable"}, {"name": "Fridrich Valach"}], "author_count": 5}, {"id": "2604.25820", "category": "hep-th", "title": "Candidate Gaugings of Categorical Continuous Symmetry", "abstract": "Different gaugings of the global symmetry of a quantum field theory are closely related to its various phases. In this work, we study candidate gaugeable symmetries by analyzing candidate Lagrangian algebra data in the Drinfeld center of a symmetry category $\\mathscr{C}^k(G)$ associated to a QFT with continuous global $G$-symmetry and possible 't Hooft anomaly labeled by an integer $k$. We use the combination of the $BF$ theory and the level-$k$ Chern-Simons theory with gauge group $G$ as a semiclassical kernel-theoretic model for the corresponding SymTFT. Under two explicit assumptions, namely that this $BF{+}k$CS theory provides the relevant SymTFT model and that the common $+1$ eigenspaces of the resulting modular kernels detect candidate Lagrangian algebra data in the continuous setting, we derive candidate modular $S$- and $T$-kernels from Hopf-link and framing correlators in $S^3$ semi-classically. We then use these kernels to obtain candidate modular invariants and candidate gaugings. The resulting formulas recover the established cases and suggest a possible extension of this kernel-theoretic picture to compact Lie groups.", "url": "https://arxiv.org/abs/2604.25820", "type": "理论", "summary": "量子场论全局对称性的不同测量与其不同的相密切相关。在这项工作中，我们通过分析对称类别 $\\mathscr{C}^k(G)$ 的 Drinfeld 中心的候选拉格朗日代数数据来研究候选可测对称性，该对称类别与具有连续全局 $G$ 对称性的 QFT 相关联，并且可能存在由整数 $k$ 标记的 't Hooft 异常。我们使用 $BF$ 理论和具有规范组 $G$ 的 level-$k$ Chern-Simons 理论的组合作为相应 SymTFT 的半经典核理论模型。在两个明确的假设下，即 $BF{+}k$CS 理论提供了相关的 SymTFT 模型，并且所得模核的公共 $+1$ 特征空间检测连续设置中的候选拉格朗日代数数据，我们从 Hopf-link 和 $S^3$ 半经典中的成帧相关器导出候选模 $S$- 和 $T$-核。然后，我们使用这些内核来获得候选模不变量和候选测量。由此产生的公式恢复了已建立的情况，并建议将这个核理论图扩展到紧凑李群。", "authors": [{"name": "Qiang Jia"}, {"name": "Cheng Ma"}, {"name": "Jiahua Tian"}], "featured_authors": [{"name": "Qiang Jia"}, {"name": "Cheng Ma"}, {"name": "Jiahua Tian"}], "author_count": 3}, {"id": "2604.25821", "category": "hep-th", "title": "Categorical Symmetries via Operator Algebras", "abstract": "We propose that the symmetry category associated to a 2D quantum field theory with 0-form $G$-symmetry with 't Hooft anomaly $k\\in H^4(BG,\\mathbb{Z})$ for a large class of Lie groups $G$ is the category of twisted measurable fields of Hilbert spaces over $G$ denoted by $\\mathrm{Hilb}^k(G)$, which is equivalent to the category of unitary representations of $C_0(G)$ with convolution product twisted by a multiplicative bundle gerbe labeled by $k$ denoted by $\\textbf{Rep}^k(C_0(G))$. We find that the Drinfeld center of the symmetry category $\\mathcal{Z}(\\mathrm{Hilb}^{k}(G))$ equivalent to the category of unitary representations of the groupoid $C^*$-algebra of the Fell line bundle $\\Sigma_k$ over the conjugation action groupoid $G//_{\\rm Ad} G$, denoted by $\\textbf{Rep}(C^*(G//_{\\rm Ad}G,\\Sigma_k))$, where the twist is characterized by the transgression $\\tau(k)\\in H^2(G//_{\\rm Ad}G,U(1))$. To the full generality, our framework applies to a Lie group $G$ that is a direct product of a compact connected Lie group and a number of $\\mathbb{R}$ or $GL(1,\\mathbb{C})$ factors. We compute the braiding of anyon lines in the bulk 3D SymTFT from this formalism. Finally we provide physical examples for abelian and non-abelian $G$, and discuss the physical consequences of flat gauging continuous global symmetries.", "url": "https://arxiv.org/abs/2604.25821", "type": "理论", "summary": "我们提出，对于一大类李群 $G$，具有 0 型 $G$ 对称性且具有 't Hooft 异常 $k\\in H^4(BG,\\mathbb{Z})$ 的二维量子场论相关的对称范畴是 $G$ 上希尔伯特空间的扭曲可测场范畴，用 $\\mathrm{Hilb}^k(G)$ 表示，这相当于酉范畴$C_0(G)$ 的表示，其卷积积由乘法束 gerbe 扭曲，乘法束 gerbe 标记为 $k$，用 $\\textbf{Rep}^k(C_0(G))$ 表示。我们发现对称范畴$\\mathcal{Z}(\\mathrm{Hilb}^{k}(G))$的Drinfeld中心等价于共轭作用群形$G//_{\\rm Ad} G$上Fell线丛$\\Sigma_k$的群形$C^*$-代数的酉表示范畴，表示为$\\textbf{Rep}(C^*(G//_{\\rm Ad}G,\\Sigma_k))$，其中扭曲的特征是 H^2(G//_{\\rm Ad}G,U(1))$ 中的越界 $\\tau(k)\\。总的来说，我们的框架适用于李群 $G$，它是紧连通李群和许多 $\\mathbb{R}$ 或 $GL(1,\\mathbb{C})$ 因子的直积。我们根据这种形式计算了批量 3D SymTFT 中任意子线的编织。\n\n最后，我们提供了阿贝尔和非阿贝尔 $G$ 的物理例子，并讨论了平坦测量连续全局对称性的物理后果。", "authors": [{"name": "Qiang Jia"}, {"name": "Ran Luo"}, {"name": "Jiahua Tian"}, {"name": "Yi-Nan Wang"}, {"name": "Yi Zhang"}], "featured_authors": [{"name": "Qiang Jia"}, {"name": "Ran Luo"}, {"name": "Jiahua Tian"}, {"name": "Yi-Nan Wang"}, {"name": "Yi Zhang"}], "author_count": 5}, {"id": "2604.25844", "category": "hep-th", "title": "(Super-)renormalizable hairy meronic black holes", "abstract": "We construct an analytical black hole solution in the Einstein-Maxwell-Yang-Mills theory with a conformally coupled scalar field in four dimensions, which generalizes the charged Martínez-Troncoso-Zanelli (MTZ) black hole in the presence of self-gravitating non-Abelian gauge fields. The internal gauge group is determined by the horizon curvature, becoming $SU(N)$ in the case of positive curvature and $SU(N-1,1)$ when the curvature is negative. Moreover, this solution is employed as a conformal seed to obtain new meronic spacetimes dressed with all (super-)renormalizable contributions of the scalar field, which provides the generalization of the Anabalón-Cisterna (AC) solution when self-gravitating non-Abelian gauge fields are included. Finally, we consider the non-Noetherian extension of the conformal scalar fields, which still yields a second-order conformally invariant scalar equation, even though the action is not. In that case, we show that static black hole solutions can also be charged with Yang-Mills fields.", "url": "https://arxiv.org/abs/2604.25844", "type": "理论", "summary": "我们在爱因斯坦-麦克斯韦-杨-米尔斯理论中构造了一个具有四维共形耦合标量场的解析黑洞解，该解在存在自引力非阿贝尔规范场的情况下推广了带电马丁内斯-特龙科索-扎内利（MTZ）黑洞。内部规范组由地平线曲率决定，曲率为正时为 $SU(N)$，曲率为负时为 $SU(N-1,1)$。此外，该解被用作共角种子，以获得新的梅洛时空，其具有标量场的所有（超）可重整化贡献，当包含自引力非阿贝尔规范场时，它提供了 Anabalón-Cisterna (AC) 解的推广。最后，我们考虑共形标量场的非诺特扩张，它仍然产生二阶共形不变标量方程，即使作用不是。在这种情况下，我们证明静态黑洞解也可以用杨-米尔斯场充电。", "authors": [{"name": "Luis Avilés"}, {"name": "Borja Diez"}], "featured_authors": [{"name": "Luis Avilés"}, {"name": "Borja Diez"}], "author_count": 2}, {"id": "2604.25916", "category": "hep-th", "title": "Nonlocal-in-time tail effects in gravitational scattering to fifth Post-Minkowskian and tenth self-force orders", "abstract": "Using the worldline effective field theory formalism, we derive the nonlocal-in-time conservative contributions arising from tail effects in gravitational scattering to fifth Post-Minkowskian (5PM) and tenth self-force (10SF) orders. The result features multiple polylogarithms of up to weight three. This challenging computation relies on state-of-the-art integration techniques, including a novel integration-by-parts algorithm: the Sparse Integral Reducer (SpideR). We find perfect agreement in the overlap with all existing literature through sixth post-Newtonian order. The results presented here provide a key ingredient for isolating the local-in-time component of the conservative two-body dynamics of binary inspirals at 5PM order.", "url": "https://arxiv.org/abs/2604.25916", "type": "理论", "summary": "使用世界线有效场论形式，我们推导了引力散射尾部效应对第五后闵可夫斯基 (5PM) 和第十自力 (10SF) 阶的非局域时间保守贡献。结果具有权重高达 3 的多个多对数。这种具有挑战性的计算依赖于最先进的集成技术，包括一种新颖的分部分集成算法：稀疏积分减速器 (SpideR)。我们通过后牛顿六阶与所有现有文献的重叠找到了完美的一致性。这里给出的结果为分离下午 5 点级双星螺旋的保守双体动力学的本地时间部分提供了关键要素。", "authors": [{"name": "Christoph Dlapa"}, {"name": "Gregor Kälin"}, {"name": "Zhengwen Liu"}, {"name": "Rafael A. Porto"}], "featured_authors": [{"name": "Christoph Dlapa"}, {"name": "Gregor Kälin"}, {"name": "Zhengwen Liu"}, {"name": "Rafael A. Porto"}], "author_count": 4}, {"id": "2604.25918", "category": "hep-th", "title": "de Sitter in String Theory vs. Gibbons & Hawking", "abstract": "This paper corroborates a statement that perturbative string theory does not admit a solution whose spacetime metric is de Sitter times a closed manifold, to all orders in the $\\alpha'$ and $g_s$ expansions, under the assumption that the logarithm of the sphere partition function of Euclidean quantum gravity receives a nonzero contribution proportional to $\\frac{1}{G_N}$ in a saddle-point approximation. This assumption is related to the Gibbons-Hawking proposal that the entropy of the cosmological horizon of the static patch is $\\frac{A}{4G_N}$. Evidence for the statement comes from independent approaches to the effective action of string theory, all of which agree that the tree-level action vanishes for closed Euclidean target-space solutions. One possible implication is that the state of the Universe will depart from an asymptotically de Sitter spacetime.", "url": "https://arxiv.org/abs/2604.25918", "type": "理论", "summary": "本文证实了这样一种说法，即在假设欧几里得量子引力的球体配分函数的对数在鞍点近似中收到与 $\\frac{1}{G_N}$ 成比例的非零贡献的情况下，微扰弦理论不承认时空度量为德西特乘以闭流形的解，对于 $\\alpha'$ 和 $g_s$ 展开式中的所有阶。这个假设与吉本斯-霍金提议有关，即静态补丁的宇宙视界的熵为$\\frac{A}{4G_N}$。该陈述的证据来自弦理论有效作用的独立方法，所有这些方法都同意树级作用对于封闭的欧几里得目标空间解决方案消失。一个可能的含义是，宇宙的状态将偏离渐近德西特时空。", "authors": [{"name": "Yoav Zigdon"}], "featured_authors": [{"name": "Yoav Zigdon"}], "author_count": 1}, {"id": "2604.24847", "category": "math-ph", "title": "The Classification of Pauli Stabilizer Codes: A Lattice and Continuum Treatise", "abstract": "We classify mobile Pauli stabilizer codes up to gapped interfaces and coarse-graining using the framework of algebraic $\\mathrm{L}$-theory. We compare this classification with that of framed TQFTs, theories that arise naturally in the continuum, highlighting a close structural relationship between the two. Our approach is formulated in the category of perfect chain complexes equipped with quadratic functor over the Laurent polynomial ring $R = \\mathbb{Z}/p[x_1^{\\pm 1}, \\ldots, x_n^{\\pm 1}]$, within which the collection of topological operators of Pauli stabilizer codes arise naturally as objects. In particular, we establish a bulk-boundary correspondence for lattice theories: the equivalence class of a Pauli stabilizer code up to gapped interface is described by a Clifford QCA in one dimension higher. This is done using the universal target category for stabilizer codes, which is the categorical spectrum whose existence and universal properties are introduced in this work. We conclude by highlighting subtle differences between the classification of Pauli stabilizer codes and TQFTs, leading to qualitative distinctions between lattice and continuum theories.", "url": "https://arxiv.org/abs/2604.24847", "type": "理论", "summary": "我们使用代数 $\\mathrm{L}$ 理论框架将移动泡利稳定器代码分类为有间隙接口和粗粒度。我们将这种分类与框架 TQFT 的分类进行比较，框架 TQFT 是连续体中自然出现的理论，强调了两者之间密切的结构关系。我们的方法是在洛朗多项式环 $R = \\mathbb{Z}/p[x_1^{\\pm 1}, \\ldots, x_n^{\\pm 1}]$ 上配备二次函子的完美链复合体范畴中表述的，其中泡利稳定器码的拓扑算子的集合自然地作为对象出现。特别是，我们为晶格理论建立了体边界对应关系：泡利稳定器代码到带隙界面的等价类由高一维的 Clifford QCA 描述。这是通过使用稳定器代码的通用目标类别来完成的，该类别是分类谱，其存在和通用属性在本工作中被介绍。最后，我们强调泡利稳定器码和 TQFT 分类之间的细微差异，从而导致晶格理论和连续介质理论之间的定性区别。", "authors": [{"name": "Bowen Yang"}, {"name": "Matthew Yu"}], "featured_authors": [{"name": "Bowen Yang"}, {"name": "Matthew Yu"}], "author_count": 2}, {"id": "2604.24865", "category": "math-ph", "title": "Prefactorization algebras of superselection sectors", "abstract": "This paper revisits the theory of superselection sectors in algebraic quantum field theory from the modern perspective of prefactorization algebras. Under the standard assumptions of Haag duality and a locally faithful vacuum representation, it is shown that every AQFT defined over a filtered orthogonal category of spacetime regions, satisfying some mild additional geometric hypotheses, has an associated locally constant $C^\\ast$-categorical prefactorization algebra of superselection sectors over the same orthogonal category. In the case of double cones in the $(n\\geq 2)$-dimensional Minkowski spacetime, our approach provides a conceptual explanation for the well-known $\\mathbb{E}_n$-monoidal structure on the $C^\\ast$-category of superselection sectors as the combination, through Dunn-Lurie additivity $\\mathbb{E}_n\\simeq \\mathbb{E}_1\\otimes \\mathbb{E}_{n-1}$, of the familiar $\\mathbb{E}_1$-monoidal structure from Haag duality and an $\\mathbb{E}_{n-1}$-monoidal structure from Lorentzian geometry. A refinement of our results to equivariant contexts under a discrete group $G$ is also provided.", "url": "https://arxiv.org/abs/2604.24865", "type": "理论", "summary": "本文从现代预分解代数的角度重新审视代数量子场论中的超选择扇区理论。在 Haag 对偶性和局部忠实真空表示的标准假设下，结果表明，在时空区域的过滤正交类别上定义的每个 AQFT，满足一些温和的附加几何假设，在相同的正交类别上具有相关的局部常数 $C^\\ast$ 超选择扇区的分类预分解代数。对于 $(n\\geq 2)$ 维 Minkowski 时空中的双锥体，我们的方法通过 Dunn-Lurie 可加性 $\\mathbb{E}_n\\simeq \\mathbb{E}_1\\otimes 为 $C^\\ast$-超选择扇区类别上众所周知的 $\\mathbb{E}_n$-幺半结构作为组合提供了概念解释\\mathbb{E}_{n-1}$ 是来自哈格对偶性的熟悉的 $\\mathbb{E}_1$-幺半结构和来自洛伦兹几何的 $\\mathbb{E}_{n-1}$-幺半结构。还提供了将我们的结果细化为离散组 $G$ 下的等变上下文。", "authors": [{"name": "Marco Benini"}, {"name": "Victor Carmona"}, {"name": "Alexander Schenkel"}], "featured_authors": [{"name": "Marco Benini"}, {"name": "Victor Carmona"}, {"name": "Alexander Schenkel"}], "author_count": 3}, {"id": "2604.25066", "category": "math-ph", "title": "Invariant Measures in Hamiltonian Systems: The Analytical Foundations of Statistical Physics", "abstract": "We construct a measure in the hamiltonian function level sets that is invariant under the hamiltonian flow for short times and flow preserving for arbitrarily long times. This allows a probabilistic approach to the study of hamiltonian systems, in the space of states with fixed energy. We prove that this measure generates the microcanonical partition function employed in physics and show that it can be transformed into the canonical partition function in an asymptotic limit, hence reproducing classical Statistical Physics. We also argue that this gives an alternative solution to Simon's second problem.", "url": "https://arxiv.org/abs/2604.25066", "type": "理论", "summary": "我们在哈密顿函数水平集中构造了一个测度，该测度在短时间的哈密顿流下保持不变，并且在任意长时间内保持流保持。这允许在具有固定能量的状态空间中采用概率方法来研究哈密顿系统。我们证明这种测度生成了物理学中使用的微正则配分函数，并表明它可以在渐近极限下转化为正则配分函数，从而再现经典统计物理学。我们还认为这为西蒙的第二个问题提供了替代解决方案。", "authors": [{"name": "Luis A. Cedeño-Pérez"}, {"name": "Alexis E. López-Velázquez"}], "featured_authors": [{"name": "Luis A. Cedeño-Pérez"}, {"name": "Alexis E. López-Velázquez"}], "author_count": 2}, {"id": "2604.25078", "category": "math-ph", "title": "Gegenbauer polynomials and fluctuation properties of the one-dimensional Riesz gas", "abstract": "The Riesz gas in one-dimension consists of particles interacting via a pair potential, ${\\rm sgn}(s) |x - x'|^{-s}$, $s \\ne 0$ and $-\\log | x - x'|$ for $s=0$. In the infinite density limit, with the particle support the interval $[-1,1]$, we apply a functional derivative method due to Beenakker to compute the covariance of two smooth linear statistics for the Riesz gas with exponent $s \\in (-1,1)$, $s \\ne 0$. This we give in terms of a sum over Fourier components of the linear statistics with respect to a Gegenbauer polynomial $\\{C_n^{(s/2)}(x) \\}$ basis, which generalises a known form in the case $s=0$ involving a cosine expansion. For the power sum linear statistic, our general formula can be reduced to a product of gamma function form, and compared against recent exact results in the literature for this case.", "url": "https://arxiv.org/abs/2604.25078", "type": "理论", "summary": "一维的里斯气体由通过一对势相互作用的粒子组成，${\\rm sgn}(s) |x - x'|^{-s}$、$s \\ne 0$ 和 $-\\log | x - x'|$ 对于 $s=0$。在无限密度极限下，在粒子支持区间 $[-1,1]$ 的情况下，我们应用 Benakker 的函数导数方法来计算指数为 $s \\in (-1,1)$、$s \\ne 0$ 的 Riesz 气体的两个平滑线性统计量的协方差。我们以关于 Gegenbauer 多项式 $\\{C_n^{(s/2)}(x) \\}$ 为基础的线性统计的傅里叶分量的总和给出，它概括了涉及余弦展开的 $s=0$ 情况下的已知形式。对于幂和线性统计量，我们的通用公式可以简化为伽马函数形式的乘积，并与该案例文献中最近的精确结果进行比较。", "authors": [{"name": "Peter J. Forrester"}], "featured_authors": [{"name": "Peter J. Forrester"}], "author_count": 1}, {"id": "2604.25079", "category": "math-ph", "title": "Lie symmetry classification and invariant solutions of time-fractional telegraph systems with variable coefficients", "abstract": "Time-fractional telegraph equations provide fundamental mathematical models for transport processes that exhibit memory and nonlocal effects in industrial and physical systems. These models arise naturally in heat transport in materials with thermal memory, wave propagation in viscoelastic media, and charge transport in spatially heterogeneous semiconductor devices. In this study, we investigate a class of time-fractional telegraph systems with spatially varying coefficients using Lie symmetry analysis and the Riemann--Liouville fractional derivative. We establish a complete Lie group classification for sufficiently differentiable coefficient functions and determine all functional forms that admit such symmetry extensions. The symmetry structure is shown to depend fundamentally on the relationship between the transport coefficient and the potential function, resulting in three distinct symmetry classes. For each case, optimal systems of one-dimensional Lie subalgebras are constructed, and the governing fractional partial differential equations are systematically reduced to fractional ordinary differential equations. Exact invariant solutions are obtained in closed form and expressed in terms of Mittag--Leffler functions, generalized Wright functions, and Fox $H$-functions. These analytical solutions provide valuable insights into fractional telegraph-type transport phenomena and serve as important benchmarks for validating numerical methods in industrial transport modeling and fractional evolution systems.", "url": "https://arxiv.org/abs/2604.25079", "type": "理论", "summary": "时间分数电报方程为在工业和物理系统中表现出记忆和非局域效应的传输过程提供了基本的数学模型。这些模型自然出现在具有热记忆的材料中的热传输、粘弹性介质中的波传播以及空间异质半导体器件中的电荷传输中。在本研究中，我们使用李对称分析和黎曼-刘维尔分数阶导数研究了一类具有空间变化系数的时间分数电报系统。我们为充分可微的系数函数建立了完整的李群分类，并确定了允许这种对称性扩展的所有函数形式。对称结构被证明从根本上取决于输运系数和势函数之间的关系，从而产生三个不同的对称类别。对于每种情况，构造一维李子代数的最优系统，并将控制分数偏微分方程系统地简化为分数常微分方程。\n\n精确的不变解以封闭形式获得，并用 Mittag-Leffler 函数、广义 Wright 函数和 Fox $H$ 函数表示。这些分析解决方案为分数电报型运输现象提供了宝贵的见解，并作为验证工业运输建模和分数演化系统中数值方法的重要基准。", "authors": [{"name": "Sodbaatar Adiya"}, {"name": "Khongorzul Dorjgotov"}, {"name": "Bayarmagnai Gombodorj"}, {"name": "Bayarpurev Mongol"}, {"name": "Uuganbayar Zunderiya"}], "featured_authors": [{"name": "Sodbaatar Adiya"}, {"name": "Khongorzul Dorjgotov"}, {"name": "Bayarmagnai Gombodorj"}, {"name": "Bayarpurev Mongol"}, {"name": "Uuganbayar Zunderiya"}], "author_count": 5}, {"id": "2604.25535", "category": "math-ph", "title": "The SK model with a sparse variance profile: free energy and AMP algorithm for TAP equations at high temperature", "abstract": "A generalization of the Sherrington-Kirkpatrick (SK) model for spin glasses is considered, in which the interaction matrix is endowed with a variance profile that has no particular structure an may be sparse. In the first part of this paper, an asymptotic equivalent of the free energy is derived at sufficiently high temperatures, regardless of the signature of the variance profile matrix. In the second part, the mean of the spin vector under the Gibbs measure is estimated using an Approximate Message Passing algorithm based on the Thouless-Anderson-Palmer equations. The dynamical approach of Adhikari this http URL . (J. Stat. Phys., 2021), originally developed for the classical SK model, is adapted to the present setting to obtain these results.", "url": "https://arxiv.org/abs/2604.25535", "type": "理论", "summary": "考虑了自旋玻璃的 Sherrington-Kirkpatrick (SK) 模型的推广，其中相互作用矩阵被赋予了没有特定结构并且可能是稀疏的方差分布。在本文的第一部分中，无论方差分布矩阵的签名如何，都在足够高的温度下推导了自由能的渐近等效项。在第二部分中，使用基于 Thouless-Anderson-Palmer 方程的近似消息传递算法来估计吉布斯测度下的自旋向量的平均值。 Adhikari 这个 http URL 的动态方法。 （J. Stat. Phys.，2021）最初是为经典 SK 模型开发的，经过调整以适应当前设置以获得这些结果。", "authors": [{"name": "Walid Hachem"}], "featured_authors": [{"name": "Walid Hachem"}], "author_count": 1}, {"id": "2604.25622", "category": "math-ph", "title": "Geometry of Logarithmic Topological Recursion: Dilaton Equations, Free Energies and Variational Formulas", "abstract": "One of the most important applications of topological recursion concerns spectral curves for which the functions $(x,y)$ defining the spectral curve are allowed to have logarithmic singularities. This occurs for instance for Seiberg-Witten curves and mirror curves computing Gromov--Witten invariants of toric Calabi--Yau threefolds. A recently introduced extension of topological recursion, the so-called logarithmic topological recursion, exhibits the correct behavior under certain limits of those spectral curves. In this article, we derive the dilaton equations in the setting of logarithmic topological recursion, as well as variational formulas, and provide a definition of the free energies in situations where standard topological recursion was known to fail. We present examples in which the new definition of the free energies \\textit{directly} (without any computation) reproduces the full perturbative part of the Nekrasov--Shatashvili partition function of 4d $\\mathcal{N}=2$ pure supersymmetric gauge theory, as well as the all-genus free energies of mirror curves of strip geometries, including in particular the topological vertex and the resolved conifold.", "url": "https://arxiv.org/abs/2604.25622", "type": "理论", "summary": "拓扑递归最重要的应用之一涉及谱曲线，其中定义谱曲线的函数 $(x,y)$ 允许具有对数奇点。例如，对于计算复曲面 Calabi-Yau 的 Gromov-Witten 不变量的 Seiberg-Witten 曲线和镜像曲线三重，就会出现这种情况。最近引入的拓扑递归扩展，即所谓的对数拓扑递归，在这些谱曲线的某些限制下表现出正确的行为。在本文中，我们推导了对数拓扑递归设置下的膨胀方程以及变分公式，并提供了已知标准拓扑递归失败的情况下自由能的定义。我们给出的例子中，自由能的新定义 \\textit{直接}（无需任何计算）再现了 4d $\\mathcal{N}=2$ 纯超对称规范理论的 Nekrasov-Shatashvili 配分函数的完整微扰部分，以及带状几何镜像曲线的全属自由能，特别包括拓扑顶点和解析的锥折。", "authors": [{"name": "Alexander Hock"}, {"name": "Olivier Marchal"}, {"name": "Nicolas Orantin"}], "featured_authors": [{"name": "Alexander Hock"}, {"name": "Olivier Marchal"}, {"name": "Nicolas Orantin"}], "author_count": 3}, {"id": "2604.25662", "category": "math-ph", "title": "On phase retrieval for continuous and discrete Fourier transforms", "abstract": "We continue studies on phase retrieval for continuous and discrete Fourier transforms in multidimensions. Using finite difference operators, we give a large class of unexpected examples of non-uniqueness for this problem, including examples with the sparsity condition. A prototype of this construction in the continuous case is given in the work Novikov, Xu (JFAA, 2026), using linear differential operators. The construction of the present work also yields a large class of non-trivial Pauli partners, i.e., different functions with the same intensities in both configuration and Fourier domains. Besides, our construction yields examples that solve an old open question in phase retrieval with background information arising in many areas including Fourier holography.", "url": "https://arxiv.org/abs/2604.25662", "type": "理论", "summary": "我们继续研究多维连续和离散傅立叶变换的相位检索。使用有限差分运算符，我们给出了该问题的一大类非唯一性的意想不到的示例，包括具有稀疏条件的示例。 Novikov, Xu (JFAA, 2026) 的著作中使用线性微分算子给出了连续情况下这种构造的原型。目前工作的构建还产生了一类非平凡的泡利伙伴，即在配置域和傅立叶域中具有相同强度的不同函数。此外，我们的构建产生的示例可以解决相位检索中的一个古老的开放问题，其中包括傅立叶全息术等许多领域中出现的背景信息。", "authors": [{"name": "Roman Novikov"}, {"name": "Tianli Xu"}], "featured_authors": [{"name": "Roman Novikov"}, {"name": "Tianli Xu"}], "author_count": 2}, {"id": "2604.25682", "category": "math-ph", "title": "Co-rotating Vortices on Surfaces of Variable Negative Curvature: Hamiltonian Structure and Drift Dynamics", "abstract": "Vortices in fluids and superfluids underpin phenomena ranging from Bose--Einstein condensates and superfluid films to neutron stars and hydrodynamic micro-rotors, where geometry can strongly influence their motion. Curvature can induce vortex motion with no planar analogue. We study Hamiltonian vortex motion on a catenoid, a minimal surface of variable negative curvature, and derive explicit equations of motion, conserved quantities, and reductions for co-rotating vortex pairs. For two identical vortices we find an exact antipodal solution in which the pair rotates rigidly at fixed latitude, with angular velocity $\\Omega=(\\Gamma/16\\pi)\\,K'(V)/\\sqrt{-K(V)}$, where $K(V)$ is the Gaussian curvature. Thus the motion is governed by the curvature gradient rather than the curvature itself. The symmetric state is linearly unstable, with growth rate $\\lambda=\\sqrt{3}|\\Omega|$, in agreement with numerical simulations. For generic equal-strength pairs, conservation of the Hamiltonian and rotational momentum reduces the nonlinear dynamics to a single quadrature, yielding bounded relative oscillations together with a secular azimuthal drift. Simulations of the full equations confirm the reduced theory and reveal the same curvature-induced transport mechanism in a localized many-vortex cluster, motivating a broader theory of collective vortex drift on curved surfaces.", "url": "https://arxiv.org/abs/2604.25682", "type": "理论", "summary": "流体和超流体中的涡流支撑着从玻色-爱因斯坦凝聚和超流体薄膜到中子星和流体动力学微型转子的各种现象，其中几何形状可以强烈影响它们的运动。曲率可以引起没有平面类似物的涡流运动。我们研究悬链体（可变负曲率的最小表面）上的哈密顿涡运动，并导出显式运动方程、守恒量以及同向旋转涡旋对的约简。对于两个相同的涡旋，我们找到一个精确的对映解，其中涡旋对在固定纬度刚性旋转，角速度 $\\Omega=(\\Gamma/16\\pi)\\,K'(V)/\\sqrt{-K(V)}$，其中 $K(V)$ 是高斯曲率。因此，运动是由曲率梯度而不是曲率本身控制的。对称态是线性不稳定的，增长率为$\\lambda=\\sqrt{3}|\\Omega|$，与数值模拟一致。对于一般的等强度对，哈密顿量和旋转动量守恒将非线性动力学降低到单个正交，产生有界相对振荡以及长期方位角漂移。\n\n完整方程的模拟证实了简化的理论，并揭示了局部多涡流簇中相同的曲率诱导输运机制，激发了曲面上集体涡流漂移的更广泛的理论。", "authors": [{"name": "Gaurang Mangesh Joshi"}, {"name": "Rickmoy Samanta"}], "featured_authors": [{"name": "Gaurang Mangesh Joshi"}, {"name": "Rickmoy Samanta"}], "author_count": 2}, {"id": "2604.25697", "category": "math-ph", "title": "Griffiths inequalities and Gibbs-Bogoliubov inequality for general gauge glasses with Gaussian disorder on Nishimori line", "abstract": "We consider a class of gauge glass models with Gaussian disorder on the Nishimori line, including the Ising spin glass, the $XY$ gauge glass, the $Z_q$ gauge glass, and the gauge-invariant Potts model. We prove that the first and second Griffiths inequalities hold for these models on arbitrary lattice structures. As a consequence, both the pressure and the correlation functions are monotonically increasing with respect to the inverse temperature along the Nishimori line. Furthermore, we establish an analogue of the Gibbs--Bogoliubov inequality for this class of models. This result implies that, on the Nishimori line, the approximate quenched free energy obtained via the replica method with a replica-symmetric mean-field approximation is always greater than the true quenched free energy. Our results provide a broad generalization of previous results established for the Ising spin glass with Gaussian disorder on the Nishimori line.", "url": "https://arxiv.org/abs/2604.25697", "type": "理论", "summary": "我们考虑一类在西森线上具有高斯无序性的玻璃规范模型，包括伊辛自旋玻璃、$XY$规范玻璃、$Z_q$规范玻璃和规范不变的 Potts 模型。我们证明第一和第二格里菲斯不等式对于任意晶格结构上的这些模型都成立。因此，压力和相关函数沿着西森线相对于温度的倒数单调增加。此外，我们为此类模型建立了 Gibbs-Bogoliubov 不等式的类比。这一结果意味着，在西森线上，通过具有复制对称平均场近似的复制方法获得的近似淬火自由能总是大于真实的淬火自由能。我们的结果提供了对西森线上具有高斯无序的伊辛自旋玻璃的先前结果的广泛概括。", "authors": [{"name": "Manaka Okuyama"}, {"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Manaka Okuyama"}, {"name": "Masayuki Ohzeki"}], "author_count": 2}, {"id": "2604.25703", "category": "math-ph", "title": "Long-time asymptotics of the Newell equation on the line", "abstract": "In 1978, A. C. Newell [SIAM J. Appl. Math. 35(4) (1978) 650-664] proposed an exactly solvable model called Newell equation, which simulates the investigation of significant interaction mechanism between long and short waves. Nearly fifty years have passed, yet the long-time asymptotics of the Newell equation remains an open problem to date, with no results reported. In this work, the long-time asymptotic behaviors of the solutions to this model under Schwartz class initial conditions are studied by using the Riemann-Hilbert formulation. Through direct and inverse scattering analysis, the corresponding Riemann-Hilbert problem is formulated, and its relationship with the solution to the initial-value problem of the Newell equation is established. The existence and uniqueness of the solution to the Riemann-Hilbert problem is proved by vanishing lemma. Subsequently, the asymptotic expressions of the solution to the initial-value problem in the dispersive wave region are obtained by using the Deift-Zhou nonlinear steepest descent method. This work extends Newell's original results, providing a rigorous proof for the findings presented in Section 4 of his paper, along with explicit expressions. Furthermore, the comparison between direct numerical simulations and the theoretical results obtained in this paper demonstrates the reliability of the asymptotic expressions.", "url": "https://arxiv.org/abs/2604.25703", "type": "理论", "summary": "1978 年，A. C. Newell [SIAM J. Appl.数学。 35(4) (1978) 650-664]提出了一种称为Newell方程的精确可解模型，该模型模拟了长波和短波之间显着相互作用机制的研究。近五十年过去了，但纽厄尔方程的长时间渐近仍然是一个悬而未决的问题，没有任何结果报告。在这项工作中，利用黎曼-希尔伯特公式研究了该模型的解在 Schwartz 类初始条件下的长时间渐近行为。通过正散射和逆散射分析，建立了相应的黎曼-希尔伯特问题，并建立了其与纽厄尔方程初值问题解的关系。黎曼-希尔伯特问题解的存在唯一性是通过消失引理证明的。随后，利用Deift-Zhou非线性最速下降法得到了色散波域初值问题解的渐近表达式。\n\n这项工作扩展了 Newell 的原始结果，为他的论文第 4 节中提出的发现提供了严格的证明，并提供了明确的表达。此外，直接数值模拟与本文获得的理论结果的比较证明了渐近表达式的可靠性。", "authors": [{"name": "Deng-Shan Wang"}, {"name": "Yingmin Yang"}], "featured_authors": [{"name": "Deng-Shan Wang"}, {"name": "Yingmin Yang"}], "author_count": 2}, {"id": "2604.25729", "category": "math-ph", "title": "Derivations on the triplet $W$-algebras with $\\mathfrak{sl}_2$-symmetry", "abstract": "We construct derivations on the triplet $W$-algebras $\\mathcal{W}_{p_+,p_-}$ by refining the Frobenius homomorphisms of Tsuchiya-Wood and show that the property of the Adamović-Milas derivation for $\\mathcal{W}_{2,p}$ extends to our derivations. As an application, we show that the $\\mathfrak{sl}_2$-symmetry of $\\mathcal{W}_{p_+,p_-}$ arises naturally from our construction. We further show that our method applies to the triplet $W$-superalgebra $\\mathcal{SW}(m)$ and that the full automorphism group ${\\rm Aut}(\\mathcal{SW}(m))$ is $PSL_2(\\mathbb{C})\\times \\mathbb{Z}_2$.", "url": "https://arxiv.org/abs/2604.25729", "type": "理论", "summary": "我们通过改进 Tsuchiya-Wood 的 Frobenius 同态来构造三元组 $W$-代数 $\\mathcal{W}_{p_+,p_-}$ 的导数，并表明 $\\mathcal{W}_{2,p}$ 的 Adamović-Milas 导数的性质扩展到我们的导数。作为一个应用，我们证明 $\\mathfrak{sl}_2$ 对称性 $\\mathcal{W}_{p_+,p_-}$ 是从我们的构造中自然产生的。我们进一步证明我们的方法适用于三元组$W$-超代数$\\mathcal{SW}(m)$，并且完全自同构群${\\rm Aut}(\\mathcal{SW}(m))$是$PSL_2(\\mathbb{C})\\times \\mathbb{Z}_2$。", "authors": [{"name": "Hiromu Nakano"}], "featured_authors": [{"name": "Hiromu Nakano"}], "author_count": 1}, {"id": "2604.25785", "category": "math-ph", "title": "Level Crossing in Random Matrices. III. Analogs of Girko's circular and Wigner's semicircle laws", "abstract": "We study the asymptotic distribution of level crossings for random matrix pencils A_n+\\lambda B_n in several ensembles, including complex and real i.i.d. matrices and Gaussian/Hermitian settings. We derive a representation of the normalized log-discriminant in terms of pairwise eigenvalue interactions and formulate conditions under which its limit is governed by a deterministic potential. Under assumptions combining a uniform circular law, logarithmic tail control, and small-spacing (repulsion) estimates, we prove convergence of the empirical measure of level crossings to an explicit deterministic limit. In the complex Gaussian case these assumptions are verified (modulo a uniformity step), while in the general i.i.d. setting the results are conditional and motivated by universality theory. We further analyze the real case, showing that any limiting measure does not concentrate on the real projective line under suitable hypotheses, and discuss analogous phenomena for elliptic/Hermitian ensembles. Our results highlight the role of logarithmic energy and universality in governing spectral degeneracies of random matrix pencils.", "url": "https://arxiv.org/abs/2604.25785", "type": "理论", "summary": "我们研究了多个系综中随机矩阵铅笔 A_n+\\lambda B_n 的水平交叉的渐近分布，包括复数和实数独立同分布。矩阵和高斯/厄米设置。我们根据成对特征值相互作用推导了归一化对数判别式的表示，并制定了其极限由确定性势控制的条件。在统一圆律、对数尾部控制和小间距（斥力）估计相结合的假设下，我们证明了平交点的经验测量收敛于明确的确定性极限。在复杂的高斯情况下，这些假设得到验证（对均匀性步骤取模），而在一般的独立同分布中。设置结果是有条件的，并由普遍性理论驱动。我们进一步分析实际情况，表明在适当的假设下，任何限制措施都不会集中在实投影线上，并讨论椭圆/厄米系综的类似现象。我们的结果强调了对数能量和普适性在控制随机矩阵铅笔光谱简并性中的作用。", "authors": [{"name": "B.Shapiro"}], "featured_authors": [{"name": "B.Shapiro"}], "author_count": 1}, {"id": "2604.24792", "category": "quant-ph", "title": "Quantum gravimetry with intrinsic quantum time uncertainty", "abstract": "We study quantum gravimetry when the interrogation time carries intrinsic uncertainty, motivated by a fundamental limit on temporal resolution associated with the energy--time uncertainty relation. For linearly gravity-coupled gravimeters, we obtain the effective gravity information by profiling the interrogation time from the two-parameter quantum Fisher information (QFI) matrix. In this class, the time-information block is quadratic in the gravitational parameter, and for quadratic background dynamics, the gravity--time cross term becomes affine in $g$. These properties yield a normalized expression for the fraction of standard single-parameter gravity QFI that remains once interrogation time is treated as a nuisance parameter, with an affine numerator and a Lorentzian denominator. We work out these results in three benchmark models: a freely falling Gaussian wavepacket, the Kasevich--Chu light-pulse atom interferometer, and an idealized closed-unitary optomechanical model. The Gaussian free-fall benchmark yields an exact closed-form expression for the effective gravity information and shows explicitly how nuisance-time profiling suppresses the momentum-spread-dependent part of the standard single-parameter gravity QFI. In the Kasevich--Chu interferometer, internal state population readout gives a rank-deficient measured two-parameter geometry unless independent timing information is supplied, whereas full access to the final motional and internal states restores a full-rank geometry with retention controlled by the competition between initial velocity spread and gravitationally accumulated motion. In atom-interferometric benchmarks, the framework yields explicit conditions for minimizing nuisance-time information loss, together with corresponding constraints on momentum spread, spatial localization, and long-interrogation-time operation.", "url": "https://arxiv.org/abs/2604.24792", "type": "理论", "summary": "当询问时间具有内在不确定性时，我们研究量子重力测量，这是由与能量-时间不确定性关系相关的时间分辨率的基本限制所激发的。对于线性重力耦合重力计，我们通过分析二参数量子费希尔信息（QFI）矩阵的询问时间来获得有效重力信息。在此类中，时间信息块的引力参数是二次的，对于二次背景动力学，引力-时间交叉项在 $g$ 中变为仿射。这些属性产生标准单参数重力 QFI 分数的归一化表达式，一旦询问时间被视为干扰参数，该表达式就保留下来，并具有仿射分子和洛伦兹分母。我们在三个基准模型中计算出这些结果：自由落体高斯波包、Kasevich-Chu 光脉冲原子干涉仪和理想化的封闭酉光机械模型。\n\n高斯自由落体基准为有效重力信息生成精确的封闭式表达式，并明确显示有害时间分析如何抑制标准单参数重力 QFI 的动量扩散相关部分。在 Kasevich-Chu 干涉仪中，除非提供独立的定时信息，否则内部状态总体读数会给出秩不足的测量双参数几何形状，而对最终运动和内部状态的完全访问会恢复全秩几何形状，其保持力由初始速度扩散和重力累积运动之间的竞争控制。在原子干涉测量基准中，该框架产生了最小化干扰时间信息丢失的明确条件，以及对动量扩散、空间定位和长询问时间操作的相应约束。", "authors": [{"name": "Salman Sajad Wani"}, {"name": "Sundus Abdi"}, {"name": "Rushda Naik"}, {"name": "Saif Al-Kuwari"}], "featured_authors": [{"name": "Salman Sajad Wani"}, {"name": "Sundus Abdi"}, {"name": "Rushda Naik"}, {"name": "Saif Al-Kuwari"}], "author_count": 4}, {"id": "2604.24850", "category": "quant-ph", "title": "Emergent prethermal Bethe integrability in a periodically driven Rydberg chain", "abstract": "We study a chain of periodically driven Rydberg atoms and identify a class of drive protocols for which the system exhibits emergent prethermal Bethe integrability at special drive frequencies. We provide a perturbative analytic expression of its Floquet Hamiltonian in the large drive amplitude regime. We demonstrate integrability of the leading term of this Floquet Hamiltonian at special drive frequencies, which we identify, by mapping it to the Hamiltonian of the paradigmatic spin-$1/2$ ${\\rm XXZ}$ chain. We support our analytical results by exact diagonalization studies on finite chains. Our numerical results on level statistics, half-chain entanglement entropy, and longitudinal magnetization of the driven chain brings out its emergent integrable nature at the special drive frequencies which persists up to a large prethermal timescale.", "url": "https://arxiv.org/abs/2604.24850", "type": "理论+数值", "summary": "我们研究了周期性驱动的里德伯原子链，并确定了一类驱动协议，系统在特殊的驱动频率下表现出紧急的预热贝特可积性。我们提供了大驱动幅度范围内其 Floquet 哈密顿量的微扰解析表达式。我们证明了该 Floquet 哈密顿量的首项在特殊驱动频率下的可积性，我们通过将其映射到范式自旋 $1/2$ ${\\rm XXZ}$ 链的哈密顿量来识别该频率。我们通过有限链上的精确对角化研究来支持我们的分析结果。我们在水平统计、半链纠缠熵和驱动链纵向磁化方面的数值结果揭示了其在特殊驱动频率下的新兴可积性质，该频率持续到一个大的预热时间尺度。", "authors": [{"name": "Saptadip Roy"}, {"name": "Arnab Sen"}, {"name": "Diptiman Sen"}, {"name": "K. Sengupta"}], "featured_authors": [{"name": "Saptadip Roy"}, {"name": "Arnab Sen"}, {"name": "Diptiman Sen"}, {"name": "K. Sengupta"}], "author_count": 4}, {"id": "2604.24854", "category": "quant-ph", "title": "Randomised measurements of a disorder-induced entanglement transition in a neutral atom quantum processor", "abstract": "The development and spread of entanglement in complex quantum systems is central to exploring many-body phenomena out of equilibrium. Measuring entanglement dynamics can shed light on information scrambling and thermalisation, namely on transitions from many-body quantum chaos to localisation in disordered, interacting systems. In quantum computing systems, entanglement entropy and other nonlinear functions of the density matrix have been recently measured, in particular by using the randomised measurement toolbox. However, it is difficult to implement the required arbitrary unitary rotations on specific subsystems without universal local control. Here we devise and demonstrate the measurement of entanglement entropy in a programmable analogue quantum simulator using a randomised measurement protocol that leverages local energy tuning together with a global field to bypass the need for local gate control. We implement this on a commercially available neutral-atom quantum simulator, QuEra's Aquila, and use it to show how programmable disorder in the local Hamiltonian parameters leads to a transition from chaotic to localised entanglement dynamics. Given current decoherence times, we clearly resolve disorder-specific, time-dependent entanglement spreading in small systems. Our work extends the utility of programmable analogue quantum simulators, and opens further opportunities for wider randomised measurement toolboxes in a range of other analogue systems.", "url": "https://arxiv.org/abs/2604.24854", "type": "实验", "summary": "复杂量子系统中纠缠的发展和​​传播对于探索脱离平衡的多体现象至关重要。测量纠缠动力学可以揭示信息加扰和热化，即从多体量子混沌到无序相互作用系统中的局域化的转变。在量子计算系统中，最近测量了密度矩阵的纠缠熵和其他非线性函数，特别是通过使用随机测量工具箱。然而，在没有通用本地控制的情况下，很难在特定子系统上实现所需的任意单一旋转。在这里，我们使用随机测量协议设计并演示了可编程模拟量子模拟器中纠缠熵的测量，该协议利用局部能量调谐和全局场来绕过局部门控制的需要。我们在商用中性原子量子模拟器 QuEra 的 Aquila 上实现了这一点，并用它来展示局部哈密顿参数中的可编程无序如何导致从混沌到局部纠缠动力学的转变。\n\n考虑到当前的退相干时间，我们清楚地解决了小系统中特定于无序、时间依赖性的纠缠扩散问题。我们的工作扩展了可编程模拟量子模拟器的实用性，并为一系列其他模拟系统中更广泛的随机测量工具箱提供了更多机会。", "authors": [{"name": "Apollonas S. Matsoukas-Roubeas"}, {"name": "Oscar Scholin"}, {"name": "Lucas Sá"}, {"name": "Arinjoy De"}, {"name": "Majd Hamdan"}, {"name": "Alexei Bylinskii"}, {"name": "Andrew J. Daley"}, {"name": "Dorian A. Gangloff"}], "featured_authors": [{"name": "Apollonas S. Matsoukas-Roubeas"}, {"name": "Oscar Scholin"}, {"name": "Lucas Sá"}, {"name": "Alexei Bylinskii"}, {"name": "Andrew J. Daley"}, {"name": "Dorian A. Gangloff"}], "author_count": 8}, {"id": "2604.24962", "category": "quant-ph", "title": "Use case study: benchmarking quantum breadth-first search for maximum flow problems", "abstract": "The maximum flow problem asks to find the largest possible flow from a source to a sink in a capacitated network. It arises frequently in scheduling, project selection, and as a core subroutine in broader optimisation tasks. Classically, it can be efficiently solved using Dinic's algorithm, which repeatedly performs breadth-first search (BFS) and blocking flow computations on the graph. As a potential candidate for quantum speedups, these BFS subroutines can be naturally replaced with quantum BFS (qBFS), an instantiation of Grover's search algorithm. In this paper, we evaluate the expected performance of qBFS on standard classical datasets. These instances are too large to be solved directly on current quantum hardware, so we adopt a hybrid benchmarking approach: (i) we run a classical implementation of Dinic's algorithm and isolate the runtime of its BFS subroutines; (ii) we analytically estimate the minimum number of quantum cycles required to implement qBFS, where we use the classically logged data. Our results indicate that achieving a practical quantum advantage for realistic problem sizes would translate to quantum gate operation times surpassing physical limitations.", "url": "https://arxiv.org/abs/2604.24962", "type": "数值", "summary": "最大流量问题要求找到容量网络中从源到汇的最大可能流量。它经常出现在调度、项目选择中，并作为更广泛的优化任务的核心子程序。传统上，可以使用 Dinic 算法有效地解决该问题，该算法在图上重复执行广度优先搜索（BFS）和阻塞流计算。作为量子加速的潜在候选者，这些 BFS 子例程可以自然地替换为量子 BFS (qBFS)，即 Grover 搜索算法的实例。在本文中，我们评估了 qBFS 在标准经典数据集上的预期性能。这些实例太大，无法在当前的量子硬件上直接解决，因此我们采用混合基准测试方法：（i）我们运行 Dinic 算法的经典实现并隔离其 BFS 子例程的运行时； (ii) 我们分析性地估计了实现 qBFS 所需的最小量子周期数，其中我们使用经典记录的数据。我们的结果表明，针对实际问题规模实现实际的量子优势将转化为超越物理限制的量子门操作时间。", "authors": [{"name": "Andreea-Iulia Lefterovici"}, {"name": "Lara Lelakowski"}, {"name": "Michael Perk"}], "featured_authors": [{"name": "Andreea-Iulia Lefterovici"}, {"name": "Lara Lelakowski"}, {"name": "Michael Perk"}], "author_count": 3}, {"id": "2604.24973", "category": "quant-ph", "title": "Approximate Sparse State Preparation with the Grover-Rudolph Algorithm", "abstract": "Sparse quantum state preparation is a common subroutine in quantum algorithms, where classical data with few nonzero entries must be loaded into a quantum state. In this work, we consider the Grover-Rudolph algorithm, which has recently been shown to efficiently prepare sparse states, and we propose two improvements. First, we extend an existing gate-merging procedure by allowing rotations to merge with virtual zero-angle gates on unreachable branches of the preparation tree, reducing the number of CNOTs and control qubits. Second, we introduce an approximate variant in which rotations with similar but not identical angles are merged at the cost of a small, controllable error in the prepared state. We derive a classically computable estimate of the resulting overlap with the target state, which is used to guide the merging decisions.", "url": "https://arxiv.org/abs/260
