4.24973", "type": "数值", "summary": "稀疏量子态准备是量子算法中的常见子例程，其中必须将具有很少非零条目的经典数据加载到量子态中。在这项工作中，我们考虑了 Grover-Rudolph 算法，该算法最近被证明可以有效地准备稀疏状态，并且我们提出了两项​​改进。首先，我们通过允许旋转与准备树的不可到达分支上的虚拟零角度门合并来扩展现有的门合并程序，从而减少 CNOT 和控制量子位的数量。其次，我们引入了一种近似变体，其中具有相似但不相同角度的旋转被合并，但代价是准备状态中存在小的、可控的误差。我们得出与目标状态重叠的经典可计算估计，用于指导合并决策。", "authors": [{"name": "Debora Ramacciotti"}, {"name": "Martin Steinbach"}, {"name": "Bence Temesi"}, {"name": "Andreea-Iulia Lefterovici"}, {"name": "Antonio F. Rotundo"}], "featured_authors": [{"name": "Debora Ramacciotti"}, {"name": "Martin Steinbach"}, {"name": "Bence Temesi"}, {"name": "Andreea-Iulia Lefterovici"}, {"name": "Antonio F. Rotundo"}], "author_count": 5}, {"id": "2604.25026", "category": "quant-ph", "title": "Networked Realization of Quantum LDPC Codes", "abstract": "Quantum low-density parity-check (QLDPC) codes with good parameters are promising candidates for low-overhead fault-tolerant quantum computing, but their non-local stabilizers require long-range connectivity and frequent qubit movement, introducing practical challenges. Prior work has studied the networked implementation of topological codes, where each node only holds one or a few qubits of the entire code, and demonstrated competitive performance under practical constraints such as the quality of network-provided entanglement. However, since these codes are already geometrically local, such a networked setting might not be essential. In this work, we propose and study the networked implementation of better QLDPC codes, specifically bivariate bicycle codes due to their similarity to surface codes and the controlled amount of long-range connections in their stabilizers. We begin by recreating networked surface codes in Stim, with one code qubit per node, and provide additional insights into their circuit-level noise performance. We then extend this approach to bipartitions of bivariate bicycle codes, using balanced min-cut partitioning on their combined X-Z Tanner graph to identify optimal qubit splits. For stabilizers spanning nodes, we implement teleported CNOTs and vary the Bell pair fidelity enabling these gates. Through circuit-level noise simulations with BP-OSD decoding, we provide the first insights into networked realizations of these codes and compare their performance with monolithic implementations. We conclude by outlining advantages, limitations, and future directions.", "url": "https://arxiv.org/abs/2604.25026", "type": "理论+数值", "summary": "具有良好参数的量子低密度奇偶校验（QLDPC）码是低开销容错量子计算的有希望的候选者，但它们的非局部稳定器需要长距离连接和频繁的量子比特移动，从而带来了实际挑战。先前的工作研究了拓扑代码的网络实现，其中每个节点仅持有整个代码的一个或几个量子位，并在网络提供的纠缠质量等实际约束下展示了具有竞争力的性能。然而，由于这些代码在几何上已经是局部的，因此这种网络设置可能不是必需的。在这项工作中，我们提出并研究了更好的 QLDPC 代码的网络实现，特别是双变量自行车代码，因为它们与表面代码相似，并且其稳定器中的远程连接数量受控。我们首先在 Stim 中重新创建网络表面代码，每个节点一个代码量子位，并提供对其电路级噪声性能的更多见解。\n\n然后，我们将这种方法扩展到双变量自行车代码的二分，在其组合的 X-Z Tanner 图上使用平衡最小切割分区来识别最佳量子位分割。对于跨越节点的稳定器，我们实现了传送 CNOT 并改变了启用这些门的贝尔对保真度。通过使用 BP-OSD 解码进行电路级噪声仿真，我们首次深入了解这些代码的网络实现，并将其性能与单片实现进行比较。最后，我们概述了优势、局限性和未来方向。", "authors": [{"name": "Swayangprabha Shaw"}, {"name": "Narayanan Rengaswamy"}], "featured_authors": [{"name": "Swayangprabha Shaw"}, {"name": "Narayanan Rengaswamy"}], "author_count": 2}, {"id": "2604.25048", "category": "quant-ph", "title": "Bohmian Trajectories in a Bistable Potential Well", "abstract": "We analyze the dynamics of a quantum particle in a one-dimensional bistable potential within the framework of Bohm's quantum mechanics. We give arguments that evidence the fallacy of certain claims found in the literature dealing with the impossibility of chaotic behavior of Bohmian trajectories in one-dimensional systems. We find that an appropriate choice for the initial position and wave packet causes the particle to undergo periodic, quasiperiodic, or chaotic motion. The transitions between these regimes occur in a continuos fashion.", "url": "https://arxiv.org/abs/2604.25048", "type": "理论", "summary": "我们在玻姆量子力学的框架内分析一维双稳态势中量子粒子的动力学。我们给出的论据证明了在涉及一维系统中波姆轨迹混沌行为的不可能性的文献中发现的某些主张的谬误。我们发现，初始位置和波包的适当选择会导致粒子经历周期性、准周期性或混沌运动。这些制度之间的转变以连续的方式发生。", "authors": [{"name": "O. F. de Alcantara Bonfim"}], "featured_authors": [{"name": "O. F. de Alcantara Bonfim"}], "author_count": 1}, {"id": "2604.25137", "category": "quant-ph", "title": "Quantum Dynamics via Score Matching on Bohmian Trajectories", "abstract": "We solve the time-dependent Schrödinger equation by learning the score function, the gradient of the log-probability density, on Bohmian trajectories. In Bohm's formulation of quantum mechanics, particles follow deterministic paths under the classical potential supplemented by a quantum potential depending on the score function of the evolving density. These non-crossing Bohmian trajectories form a continuous normalizing flow governed by the score. We parametrize the score with a neural network and minimize a self-consistent Fisher divergence between the network and the score of the resulting density. We prove that the zero-loss minimizer of this self-consistent objective recovers Schrödinger dynamics for nodeless wave functions, a condition naturally met in quantum vibrations of atoms. We demonstrate the approach on wavepacket splitting in a double-well potential and anharmonic vibrations of a Morse chain. By recasting real-time quantum dynamics as a self-consistent score-driven normalizing flow, this framework opens the time-dependent Schrödinger equation to the rapidly advancing toolkit of modern generative modeling.", "url": "https://arxiv.org/abs/2604.25137", "type": "理论+数值", "summary": "我们通过学习波姆轨迹上的分数函数（对数概率密度的梯度）来求解瞬态薛定谔方程。在玻姆的量子力学公式中，粒子在经典势下遵循确定性路径，并根据演化密度的得分函数补充量子势。这些不交叉的波姆轨迹形成由分数控制的连续标准化流。我们使用神经网络对分数进行参数化，并最小化网络与所得密度分数之间的自洽费舍尔散度。我们证明，这个自洽目标的零损失最小化器可以恢复无节点波函数的薛定谔动力学，这是原子量子振动中自然满足的条件。我们演示了双阱势和莫尔斯链非简谐振动中的波包分裂方法。通过将实时量子动力学重塑为自洽的分数驱动归一化流程，该框架为快速发展的现代生成建模工具包打开了时间相关的薛定谔方程。", "authors": [{"name": "Lei Wang"}], "featured_authors": [{"name": "Lei Wang"}], "author_count": 1}, {"id": "2604.25141", "category": "quant-ph", "title": "Nonreciprocal magnon blockade based on nonlinear effects", "abstract": "We present an alternative scheme to achieve nonreciprocal unconventional magnon blockade (NUMB) in a hybrid system formed by two microwave cavities and one yttrium iron garnet (YIG) sphere, where the pump and signal cavities interact nonlinearly with each other and the signal cavity is coupled to the YIG sphere. It is found that the nonlinear coupling occurs between the pump cavity and magnon modes due to the dispersive interactions among three bosonic modes. Meanwhile, the Kerr nonlinearity is present in the pump cavity. Based on these nonlinear effects, a nonreciprocal magnon blockade could be achieved with the help of weak parametric driving of the pump cavity. The present work provides an alternative method to prepare single magnon resource, which may be helpful for quantum information processing.", "url": "https://arxiv.org/abs/2604.25141", "type": "理论", "summary": "我们提出了一种替代方案，在由两个微波腔和一个钇铁石榴石（YIG）球体形成的混合系统中实现非互易非常规磁振子封锁（NUMB），其中泵浦腔和信号腔彼此非线性相互作用，信号腔耦合到 YIG 球体。研究发现，由于三种玻色子模式之间的色散相互作用，泵浦腔和磁振子模式之间发生非线性耦合。同时，泵腔中存在克尔非线性。基于这些非线性效应，借助泵腔的弱参数驱动可以实现不可逆磁振子封锁。目前的工作提供了一种制备单一磁振子资源的替代方法，这可能有助于量子信息处理。", "authors": [{"name": "Han-Qiu Zhang"}, {"name": "Shuang-Shuo Chu"}, {"name": "Jian-Song Zhang"}, {"name": "Wen-Xue Zhong"}, {"name": "Guang-Ling Cheng"}], "featured_authors": [{"name": "Han-Qiu Zhang"}, {"name": "Shuang-Shuo Chu"}, {"name": "Jian-Song Zhang"}, {"name": "Wen-Xue Zhong"}, {"name": "Guang-Ling Cheng"}], "author_count": 5}, {"id": "2604.25148", "category": "quant-ph", "title": "Extending UNIQuE: Quantum Simulation Speedup for the HHL Algorithm", "abstract": "In an extension of the Unconventional Noiseless Intermediate Quantum Emulator, this work introduces a classical emulation of the quantum Harrow-Hassidim-Lloyd algorithm for sampling from the solution space of linear systems. The emulated HHL algorithm scales exponentially with the number of qubits required to represent the linear system, which is an advantage over the state vector simulation of the HHL algorithm, which scales exponentially as a function of both the size of the linear system and the magnitude of its largest (scaled) eigenvalue. We benchmark our emulator by comparing it with the Intel Quantum Simulator and demonstrate a runtime advantage for small linear systems.", "url": "https://arxiv.org/abs/2604.25148", "type": "数值", "summary": "在非常规无噪声中间量子仿真器的扩展中，这项工作引入了量子 Harrow-Hassidim-Lloyd 算法的经典仿真，用于从线性系统的解空间进行采样。模拟的 HHL 算法随着表示线性系统所需的量子位数量呈指数扩展，这比 HHL 算法的状态向量模拟具有优势，后者作为线性系统的大小及其最大（缩放）特征值的大小的函数呈指数扩展。我们通过将模拟器与英特尔量子模拟器进行比较来对模拟器进行基准测试，并展示小型线性系统的运行时优势。", "authors": [{"name": "Reece Robertson"}, {"name": "Ameya Bhave"}], "featured_authors": [{"name": "Reece Robertson"}, {"name": "Ameya Bhave"}], "author_count": 2}, {"id": "2604.25194", "category": "quant-ph", "title": "Quantum-enhanced Network Tomography", "abstract": "Network tomography refers to the use of inference techniques for inferring internal network states from end-to-end probes. Quantum probes, implemented by sending blocks of $n$ coherent-state pulses augmented with continuous-variable (CV) squeezing ($n=1$) or weak temporal-mode entanglement ($n>1$) over a lossy channel to a receiver with homodyne detection capabilities, are known to carry information about the channel transmissivity. Assuming a subset of nodes in an optical network is capable of sending and receiving such probes through intermediate nodes with all-optical switching capabilities, we leverage these quantum probes to estimate link transmissivities. To determine how to route the probes in a network, we propose a probe construction algorithm that guarantees link identifiability, while maximizing the number of information orthogonal sets of transmissivities. A set of probes induces a Fisher information matrix (FIM). We then derive two metrics, the determinant of the FIM and the trace of its inverse, to evaluate the performance of the probes. In particular, our results can be used to characterize the quantum improvement in estimating link transmissivities in a general optical network.", "url": "https://arxiv.org/abs/2604.25194", "type": "理论+数值", "summary": "网络断层扫描是指使用推理技术从端到端探测推断内部网络状态。量子探针通过在有损通道上向具有零差检测功能的接收器发送经过连续变量 (CV) 压缩 ($n=1$) 或弱时间模式纠缠 ($n>1$) 增强的 $n$ 相干态脉冲块来实现，已知量子探针携带有关通道透射率的信息。假设光网络中的节点子集能够通过具有全光交换功能的中间节点发送和接收此类探针，我们利用这些量子探针来估计链路传输率。为了确定如何在网络中路由探针，我们提出了一种探针构建算法，该算法保证链路可识别性，同时最大化传输率信息正交集的数量。一组探针产生 Fisher 信息矩阵 (FIM)。然后，我们得出两个指标：FIM 的行列式及其倒数的迹，以评估探针的性能。\n\n特别是，我们的结果可用于表征一般光网络中估计链路传输率的量子改进。", "authors": [{"name": "Yufei Zheng"}, {"name": "Zihao Gong"}, {"name": "Saikat Guha"}, {"name": "Don Towsley"}], "featured_authors": [{"name": "Yufei Zheng"}, {"name": "Zihao Gong"}, {"name": "Saikat Guha"}, {"name": "Don Towsley"}], "author_count": 4}, {"id": "2604.25195", "category": "quant-ph", "title": "A simple method to fabricate Josephson junctions", "abstract": "A minimal method to fabricate Al/AlO$_x$/Al Josephson junctions (JJs) using photolithography and argon etching, before metallization and oxidation, is demonstrated. JJs with areas ranging from 1 to 6 $\\mu$m$^2$ can be fabricated and, with the appropriate oxidation conditions, the junction resistance can be varied by $\\sim$2 orders of magnitude. Transmission electron microscopy reveals the successful fabrication of JJs with few grain boundaries suggesting reduced energy loss from two-level-systems. Superconducting QUantum Interference Devices (SQUIDs) fabricated from this methodology exhibit reduced resistance variation of over multiple chips, compared with electron beam lithography, and the devices can sustain repeated thermal cycles to 10 mK with the excellent flux response remaining unchanged. The quantum applications of this technology are demonstrated by embedding a SQUID resonator into a 3D cavity and parametrically amplifying low photon numbers with gains of $\\sim$40 dB. This work establishes the simplest approach to fabricating JJs to date, and it could prove pivotal to the widespread utilization of superconducting circuit-based quantum technologies.", "url": "https://arxiv.org/abs/2604.25195", "type": "实验", "summary": "演示了在金属化和氧化之前使用光刻和氩气蚀刻制造 Al/AlO$_x$/Al 约瑟夫森结 (JJ) 的最小方法。可以制造面积范围从 1 到 6 $\\mu$m$^2$ 的 JJ，并且在适当的氧化条件下，结电阻可以变化 $\\sim$2 个数量级。透射电子显微镜揭示了晶界很少的 JJ 的成功制造，表明两能级系统的能量损失减少。与电子束光刻相比，用这种方法制造的超导量子干涉器件 (SQUID) 表现出减少了多个芯片之间的电阻变化，并且该器件可以承受高达 10 mK 的重复热循环，同时出色的通量响应保持不变。该技术的量子应用通过将 SQUID 谐振器嵌入 3D 腔中并以 $\\sim$40 dB 的增益参数化放大低光子数来演示。这项工作建立了迄今为止最简单的 JJ 制造方法，并且它可能对基于超导电路的量子技术的广泛利用至关重要。", "authors": [{"name": "Imran Mahboob"}, {"name": "Satoshi Sasaki"}, {"name": "Takaaki Takenaka"}], "featured_authors": [{"name": "Imran Mahboob"}, {"name": "Satoshi Sasaki"}, {"name": "Takaaki Takenaka"}], "author_count": 3}, {"id": "2604.25275", "category": "quant-ph", "title": "Graph-Conditioned Meta-Optimizer for QAOA Parameter Generation on Multiple Problem Classes", "abstract": "We study parameter transferability for the Quantum Approximate Optimization Algorithm (QAOA) across multiple combinatorial optimization problem classes from a parameter generation perspective. Specifically, a meta-optimizer is trained on one problem class and deployed on another during test time. Prior work employs a Long Short-Term Memory network to emulate QAOA optimization trajectories, but the learned dynamics usually collapse to near-identical paths, limiting cross-problem transfer efficiency. In this paper, we present a problem-aware graph-conditioned meta-optimizer for QAOA that learns to generate parameter trajectories over a fixed horizon, providing strong initializations with only a few steps. The optimizer is conditioned on compact graph embeddings and trained end-to-end using differentiable feedback from the QAOA objective, avoiding the need for ground-truth angles. We evaluate across multiple graph problem classes, including MaxCut, Maximum Independent Set, Maximum Clique, and Minimum Vertex Cover. We report both solution quality and feasibility-aware metrics where constraints apply. Results across a comprehensive empirical study consisting of 64 settings show that the learned optimizer can reduce optimization effort and improve performance over standard initialization, while exhibiting transferable behavior across graph families and problem types.", "url": "https://arxiv.org/abs/2604.25275", "type": "理论+数值", "summary": "我们从参数生成的角度研究了跨多个组合优化问题类的量子近似优化算法（QAOA）的参数可传递性。具体来说，元优化器在一个问题类上进行训练，并在测试期间部署在另一问题类上。先前的工作采用长短期记忆网络来模拟 QAOA 优化轨迹，但学习到的动态通常会崩溃到几乎相同的路径，从而限制了跨问题传输效率。在本文中，我们提出了一种用于 QAOA 的问题感知图条件元优化器，它学习在固定范围内生成参数轨迹，只需几个步骤即可提供强大的初始化。优化器以紧凑图嵌入为条件，并使用来自 QAOA 目标的可微反馈进行端到端训练，避免了对地面实况角度的需要。我们评估多个图问题类别，包括 MaxCut、最大独立集、最大团和最小顶点覆盖。我们报告解决方案质量和适用约束的可行性感知指标。\n\n包含 64 个设置的综合实证研究的结果表明，学习优化器可以减少优化工作并提高标准初始化的性能，同时表现出跨图族和问题类型的可转移行为。", "authors": [{"name": "Kien X. Nguyen"}, {"name": "Ilya Safro"}], "featured_authors": [{"name": "Kien X. Nguyen"}, {"name": "Ilya Safro"}], "author_count": 2}, {"id": "2604.25311", "category": "quant-ph", "title": "Entanglement Dynamics in a Two Transmon Qubit System under Continuous Measurement and Postselection", "abstract": "We investigate the role of continuous measurement and postselection in the dynamics and entanglement of a transmon-cavity-transmon coupled system. In the dispersive regime, characterized by a large detuning between the transmons and the cavity, the two transmons interact via virtual excitation of the cavity, giving rise to an effective transmon-transmon coupling. In addition to this coherent interaction, each transmon undergoes spontaneous emission, which is continuously monitored through independent detection channels. By incorporating realistic detector inefficiencies, we analyze both efficient and imperfect monitoring scenarios and demonstrate that postselection significantly slows down the decay of entanglement compared to the unmonitored case. We formulate the stochastic master equation for the coupled system, derive the corresponding postselected master equation, and investigate the dynamics through the Liouvillian superoperator spectrum. In the interaction frame, we identify the emergence of an exceptional point and characterize the associated broken and unbroken PT-symmetric phases. We show how these phases influence the system dynamics and the corresponding entanglement behavior. Our results provide insight into how continuous measurement and postselection affect entanglement in dissipative quantum systems, with potential applications in quantum information processing.", "url": "https://arxiv.org/abs/2604.25311", "type": "实验", "summary": "我们研究了连续测量和后选择在跨蒙-腔-跨蒙耦合系统的动力学和纠缠中的作用。在色散状态下，其特征是反式晶体和腔之间存在较大的失谐，两个反式晶体通过腔的虚拟激励相互作用，从而产生有效的反式晶体-反式晶体耦合。除了这种相干相互作用之外，每个跨子还会经历自发发射，并通过独立的检测通道连续监测。通过结合现实的探测器低效率，我们分析了有效和不完美的监测场景，并证明与未监测的情况相比，后选择显着减缓了纠缠的衰减。我们制定了耦合系统的随机主方程，推导了相应的后选主方程，并通过刘维尔超级算子谱研究了动力学。在交互框架中，我们识别了异常点的出现，并描述了相关的破碎和未破碎的 PT 对称相。\n\n我们展示了这些相如何影响系统动力学和相应的纠缠行为。我们的结果提供了关于连续测量和后选择如何影响耗散量子系统中的纠缠的见解，以及在量子信息处理中的潜在应用。", "authors": [{"name": "Roson Nongthombam"}, {"name": "Amarendra K. Sarma"}], "featured_authors": [{"name": "Roson Nongthombam"}, {"name": "Amarendra K. Sarma"}], "author_count": 2}, {"id": "2604.25333", "category": "quant-ph", "title": "Sign Embedding Quantum Algorithms for Matrix Equations and Matrix Functions", "abstract": "We develop a systematic sign-embedding framework of operator-output quantum algorithms for matrix equations and matrix functions. Differing from the contour-integral treatment, we start with the matrix-sign embedding route: an augmented matrix $M$ whose half-plane matrix sign compresses the target operator either as a block of $\\text{sign}(M)$ or, in projector form, through $(I-\\text{sign}(M))/2$; we then construct a logarithmic-sinc approximation for the half-plane sign operator and combine it with structure-aware scaled multiplexing and nodewise rebalancing of shifted inverse families. For ordinary Sylvester equations, we offer an explicit block-encoding of the target matrix solution with query complexity linear in the inverse-conditioning parameters and logarithmic in the target error tolerance, under non-normal and non-diagonalizable settings given a field-of-values (FoV) gap or strip-resolvent hypotheses. These algorithms propagate the same overlap-based normalization bookkeeping to ordinary and generalized Sylvester equations, generalized Lyapunov equations, principal square roots and inverse square roots, matrix geometric means, and continuous-time algebraic Riccati equations (CARE). These results identify matrix-sign embeddings and nodewise rebalancing as reusable design principles for structured operator-output quantum linear algebra.", "url": "https://arxiv.org/abs/2604.25333", "type": "理论+数值", "summary": "我们为矩阵方程和矩阵函数开发了算子输出量子算法的系统符号嵌入框架。与轮廓积分处理不同，我们从矩阵符号嵌入路线开始：一个增广矩阵$M$，其半平面矩阵符号将目标算子压缩为$\\text{sign}(M)$块，或者以投影仪形式通过$(I-\\text{sign}(M))/2$压缩；然后，我们为半平面符号算子构造一个对数-sinc 近似，并将其与移位逆族的结构感知缩放复用和节点再平衡相结合。对于普通西尔维斯特方程，我们提供了目标矩阵解的显式块编码，在给定值域 (FoV) 间隙或条带解析假设的非正态和不可对角化设置下，查询复杂度在反条件参数中呈线性，在目标误差容限中呈对数。\n\n这些算法将相同的基于重叠的归一化簿记传播到普通和广义西尔维斯特方程、广义李雅普诺夫方程、主​​平方根和反平方根、矩阵几何平均值和连续时间代数 Riccati 方程 (CARE)。这些结果将矩阵符号嵌入和节点再平衡确定为结构化算子输出量子线性代数的可重用设计原则。", "authors": [{"name": "Yanqiao Wang"}, {"name": "Jin-Peng Liu"}], "featured_authors": [{"name": "Yanqiao Wang"}, {"name": "Jin-Peng Liu"}], "author_count": 2}, {"id": "2604.25424", "category": "quant-ph", "title": "A graph-aware bounded distance decoder for all stabilizer codes", "abstract": "We formulate a bounded distance decoding strategy applicable to all stabilizer codes including both CSS and non-CSS code-families. The framework emerges out of the local Clifford equivalence between arbitrary stabilizer states and graph states. Using the graphical representation of the stabilizers and the syndromes, we constitute the bounded distance decoding as an adaptable generalization of maximum likelihood decoding, ensuring correction of all errors with weights upper bounded by a target weight. We show that strategic pruning associated with a feed-forward network structure of the graph can reduce the search space and subsequently the runtime of the designed decoder. We demonstrate satisfactory performance of the bounded distance decoder in the case of the optimal non-CSS codes up to distance $d=11$ subjected to the depolarizing error on all qubits, and near-optimal decoding for the color and the surface codes, both belonging to the CSS family, under the bit-flip errors on the qubits. We also develop an open-source library, QGDecoder, enabling the graph-aware bounded distance decoding of arbitrary stabilizer codes.", "url": "https://arxiv.org/abs/2604.25424", "type": "理论", "summary": "我们制定了适用于所有稳定器代码（包括 CSS 和非 CSS 代码系列）的有界距离解码策略。该框架源于任意稳定器状态和图状态之间的局部克利福德等价。使用稳定器和校正子的图形表示，我们将有界距离解码构造为最大似然解码的适应性概括，确保纠正所有错误，其权重上限以目标权重为界。我们表明，与图的前馈网络结构相关的策略修剪可以减少搜索空间，从而减少设计解码器的运行时间。我们展示了在所有量子位上的距离 $d=11$ 的最佳非 CSS 代码受到去极化误差影响的情况下，有界距离解码器具有令人满意的性能，并且在量子位上的位翻转误差下，属于 CSS 系列的颜色和表面代码的接近最佳解码。我们还开发了一个开源库 QGDecoder，可以对任意稳定器代码进行图形感知有界距离解码。", "authors": [{"name": "Harikrishnan K J"}, {"name": "Amit Kumar Pal"}], "featured_authors": [{"name": "Harikrishnan K J"}, {"name": "Amit Kumar Pal"}], "author_count": 2}, {"id": "2604.25425", "category": "quant-ph", "title": "Elucidating mechanism of optical cavities in superconducting strip single photon detectors using transmission line and impedance models", "abstract": "We clarified the physical mechanism of superconducting strip single photon detectors (SSPDs) with optical cavities by using transmission line and impedance models. By introducing the transmission line model, we derived the analytical formulae for the absorptance of SSPDs with optical cavities. We compared the absorptance obtained from the analytical formulae for SSPDs with single-side, double-side, and dielectric multi-layer optical cavities against the results of numerical simulations. The comparison showed that the results were nearly identical. By introducing the impedance model, it was clearly shown that the SSPDs with optical cavities achieved the maximum absorptance when their input impedance of the SSPDs with optical cavities matched the impedance of the input medium. The design concepts proposed in this study are applicable to other superconducting detectors, such as microwave kinetic inductance detectors and transition-edge sensors.", "url": "https://arxiv.org/abs/2604.25425", "type": "理论+数值", "summary": "我们通过使用传输线和阻抗模型阐明了带光腔超导带单光子探测器（SSPD）的物理机制。通过引入传输线模型，我们推导了光腔SSPD吸收率的解析公式。我们将单面、双面和介质多层光腔的 SSPD 的分析公式获得的吸收率与数值模拟的结果进行了比较。比较表明结果几乎相同。通过引入阻抗模型，清楚地表明，当带有光腔的SSPD的输入阻抗与输入介质的阻抗匹配时，带有光腔的SSPD实现了最大吸收率。本研究提出的设计概念适用于其他超导探测器，例如微波动感电感探测器和过渡边缘传感器。", "authors": [{"name": "Hiroki Kutsuma"}, {"name": "Taro Yamashita"}], "featured_authors": [{"name": "Hiroki Kutsuma"}, {"name": "Taro Yamashita"}], "author_count": 2}, {"id": "2604.25503", "category": "quant-ph", "title": "Quantum-Accelerated Gowers $U_2$ Norm for Bent Boolean Functions", "abstract": "Bent Boolean functions extremal objects that maximally resist affine approximation are notoriously hard to construct for large numbers of variables. We propose a hybrid quantum-classical genetic algorithm (GA) that uses a \\emph{quantum circuit} to evaluate the Gowers $U_2$ norm as the evolutionary fitness function. Our central contribution is a complexity-theoretic separation: the quantum evaluation circuit requires only $3n$ qubits and $\\bigO(n^2)$ two-qubit gates per function query, whereas the classical computation of the exact Gowers $U_2$ norm demands $\\bigO(2^{2n})$ arithmetic operations an exponential overhead that renders it infeasible for $n \\gtrsim 25$. We validate the framework on $n=6$ and $n=8$ variable systems. For $n=8$, our classical GA run extended to 1000 generations achieves best fitness $\\Utwof = 0.250000$ \\emph{exactly} the theoretical bent threshold $2^{-n/4}$ with average fitness $0.257267$, confirming that the Gowers $U_2$ norm is a superior fitness criterion over Walsh-Hadamard spectral flatness. Quantum-assisted evaluation faithfully reproduces the classical trajectory up to finite-sampling noise, and our complexity analysis demonstrates that for $n > 25$ the quantum evaluator provides a decisive computational advantage on fault-tolerant hardware.", "url": "https://arxiv.org/abs/2604.25503", "type": "理论+数值", "summary": "众所周知，对于大量变量来说，最大程度地抵抗仿射近似的弯曲布尔函数极值对象很难构造。我们提出了一种混合量子经典遗传算法（GA），它使用 \\emph{量子电路} 来评估 Gowers $U_2$ 范数作为进化适应度函数。我们的核心贡献是复杂性理论分离：量子评估电路每个函数查询仅需要 $3n$ 量子位和 $\\bigO(n^2)$ 两个量子位门，而精确 Gowers $U_2$ 范数的经典计算需要 $\\bigO(2^{2n})$ 算术运算，这是指数开销，这使得它对于 $n \\gtrsim 25$ 不可行。我们在 $n=6$ 和 $n=8$ 变量系统上验证该框架。对于 $n=8$，我们的经典 GA 运行扩展到 1000 代，实现了最佳适应度 $\\Utwof = 0.250000$ \\emph{精确} 理论弯曲阈值 $2^{-n/4}$ 和平均适应度 $0.257267$，证实 Gowers $U_2$ 范数是优于 Walsh-Hadamard 谱平坦度的适应度标准。\n\n量子辅助评估忠实地再现了有限采样噪声的经典轨迹，我们的复杂性分析表明，对于 $n > 25$，量子评估器在容错硬件上提供了决定性的计算优势。", "authors": [{"name": "Rajdeep Dwivedi"}, {"name": "C. A Jothishwaran"}, {"name": "Sugata Gangopadhyay"}, {"name": "Vishvendra Singh Poonia"}], "featured_authors": [{"name": "Rajdeep Dwivedi"}, {"name": "C. A Jothishwaran"}, {"name": "Sugata Gangopadhyay"}, {"name": "Vishvendra Singh Poonia"}], "author_count": 4}, {"id": "2604.25531", "category": "quant-ph", "title": "Quantum Optimization Methods for the Generalized Traveling Salesman Problem", "abstract": "This paper studies quantum optimization baselines for the Generalized Traveling Salesman Problem (GTSP), a clustered routing problem that naturally models variant selection and sequencing problems under discrete alternatives. We propose a novel GTSP QUBO formulation focused on maintaining feasible solutions for quantum annealing, as well as a hardware-executable gate-based pipeline utilizing the Quantum Approximate Optimization Algorithm (QAOA). We implement a constrained QAOA variant using an XY-mixer, which preserves the stepwise Hamming weight in the ideal circuit model, while feasibility with respect to the full GTSP constraints is tracked explicitly during post-processing. We compare the two quantum optimization paradigms on problem instances from GTSPLIB, an established benchmark dataset, and validate against classical state-of-the-art solvers. To mitigate current quantum hardware size limitations, we further extend a preprocessing method to reduce the node count in instance clusters, constructing new NISQ-friendly instances from reduced subsets. Across all tested instances, quantum solvers often produce competitive solution quality when tested on smaller graphs, but exhibit higher runtimes and a sharp degradation in feasibility and scalability as instance size grows. Our evaluation highlights where quantum optimizers can already succeed and which algorithmic bottlenecks, like sampling rates, runtime issues, and other practical failure modes, remain as open problems.", "url": "https://arxiv.org/abs/2604.25531", "type": "理论+数值", "summary": "本文研究了广义旅行商问题（GTSP）的量子优化基线，这是一个集群路由问题，可以自然地模拟离散替代方案下的变体选择和排序问题。我们提出了一种新颖的 GTSP QUBO 公式，专注于维护量子退火的可行解决方案，以及利用量子近似优化算法 (QAOA) 的基于硬件可执行门的管道。我们使用 XY 混合器实现了受约束的 QAOA 变体，它保留了理想电路模型中的逐步汉明权重，同时在后处理期间显式跟踪了完整 GTSP 约束的可行性。我们在 GTSPLIB（一个已建立的基准数据集）的问题实例上比较了两种量子优化范例，并针对经典的最先进的求解器进行了验证。为了缓解当前量子硬件尺寸限制，我们进一步扩展了预处理方法来减少实例集群中的节点数量，从减少的子集中构建新的 NISQ 友好实例。\n\n在所有测试的实例中，量子求解器在较小的图上进行测试时通常会产生具有竞争力的解决方案质量，但随着实例大小的增长，其运行时间会更高，并且可行性和可扩展性会急剧下降。我们的评估强调了量子优化器已经可以在哪些方面取得成功，以及哪些算法瓶颈（例如采样率、运行时问题和其他实际故障模式）仍然是悬而未决的问题。", "authors": [{"name": "Maximilian Zorn"}, {"name": "Melinda Braun"}, {"name": "Michael Ertl"}, {"name": "Tommy Kiss"}, {"name": "Sara Juarez Oropeza"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "featured_authors": [{"name": "Maximilian Zorn"}, {"name": "Melinda Braun"}, {"name": "Michael Ertl"}, {"name": "Sara Juarez Oropeza"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "author_count": 7}, {"id": "2604.25532", "category": "quant-ph", "title": "Bond-dimension scaling of a local-refinement advantage over hyperoptimized tensor-network contraction on Sycamore like topologies", "abstract": "We identify a missing local-refinement stage in the cotengra tensor-network contraction pipeline and show that its impact grows monotonically with bond dimension on the \\emph{connectivity graph} of Sycamore-like topologies. Appending a nearest-neighbor interchange (NNI) search to the \\cotengra{} output at matched 8-s wallclock yields a median \\emph{predicted} cost-model gap $\\Delta\\fT$ at $n{=}500$ that grows monotonically and approximately linearly in $\\chi$, from $\\sim\\!15$~bits at $\\chi{=}2$ to $\\sim\\!116$~bits at $\\chi{=}16$ (Fig.~\\ref{fig:chi_sweep}), with the refiner winning on $25/25$ seeds at every tested $\\chi$. Two control families -- random $3$-regular and QAOA $p{=}2$ interaction graphs -- show median $|\\Delta\\fT| \\leq 0.71$~bits across both controls at every $\\chi$, with refiner win rate falling toward chance as $\\chi$ grows; the signal is topology-specific, not a generic refinement-budget effect. An ablation establishes that refinement itself, not the four-axis Pareto acceptance rule, drives the gain ($|\\Delta\\fT| \\lesssim 0.1$ bits between scalar and Pareto arms at $\\chi{=}2$). The Sycamore-circuit envelope (App.~\\ref{em:sec:results:syccirc}) reports the corresponding refinement on actual random circuits at depths $m \\in \\{4, 6, 8, 10, 12\\}$, where the refiner wins on $5/5$ instances at every depth. The advantage is therefore largest precisely in the bond-dimension regime relevant to physical contraction.", "url": "https://arxiv.org/abs/2604.25532", "type": "理论+数值", "summary": "我们发现了 cotengra 张量网络收缩管道中缺失的局部细化阶段，并表明其影响随着 Sycamore 拓扑的 \\emph{连通图} 上的键维数单调增长。在匹配的 8 秒挂钟处将最近邻交换 (NNI) 搜索附加到 \\cotengra{} 输出会产生 $n{=}500$ 处的中位 \\emph{预测} 成本模型差距 $\\Delta\\fT$，该差距在 $\\chi$ 中单调且近似线性增长，从 $\\chi{=}2$ 处的 $\\sim\\!15$~bits 到 $\\sim\\!116$~bits $\\chi{=}16$（图~\\ref{fig:chi_sweep}），精炼者在每次测试的 $\\chi$ 中赢得 $25/25$ 种子。两个对照系列——随机 $3$-常规和 QAOA $p{=}2$ 交互图——显示中位数 $|\\Delta\\fT|每 $\\chi$ 两个控件的 \\leq 0.71$~bits，随着 $\\chi$ 的增长，精炼者获胜率逐渐下降；该信号是特定于拓扑的，而不是通用的细化预算效应。消融建立了细化本身，而不是四轴帕累托接受规则，驱动增益（$|\\Delta\\fT| \\lesssim 0.1$ 位在标量臂和帕累托臂之间，位于 $\\chi{=}2$）。\n\nSycamore 电路包络 (App.~\\ref{em:sec:results:syccirc}) 报告深度 $m \\in \\{4, 6, 8, 10, 12\\}$ 处实际随机电路的相应细化，其中细化器在每个深度的 $5/5$ 实例上获胜。因此，在与物理收缩相关的键维范围中，优势是最大的。", "authors": [{"name": "Rubén Darío Guerrero"}], "featured_authors": [{"name": "Rubén Darío Guerrero"}], "author_count": 1}, {"id": "2604.25610", "category": "quant-ph", "title": "Optimizing ground state preparation protocols with autoresearch", "abstract": "Artificial intelligent language-model based coding agents have significantly changed the way we interact with computers in our day-to-day, as it is common to use them to create, improve, and run programming scripts only using natural language. Agent code updates can be better guided when such programs can be executed and scored automatically rather than judged by human preference. In quantum computing and classical quantum simulation settings, ground-state preparation has a parallel structure: candidate protocols can be ranked by estimated energies and other proxies indicating proper quantum-state convergence. In this work, we study how autoresearch, a code optimization strategy based on coding agents, can be used to optimize hyperparameter choices of different ground-state preparation and sampling protocols, including the variational quantum eigensolver (VQE), density matrix renormalization group (DMRG), and auxiliary-field quantum Monte Carlo (AFQMC). We validate the viability and capacity of this method on simple spin models and molecular Hamiltonians. Across all three settings, the agent mutates simple baselines into complex protocols with improved energy proxies while operating under constrained space-time computational budgets. We conclude with discussions of other quantum routines that support executable scalar scoring, enabling evolutionary coding agents to automate a substantial portion of the protocol-tuning work that would otherwise be required manually.", "url": "https://arxiv.org/abs/2604.25610", "type": "理论+数值", "summary": "基于人工智能语言模型的编码代理极大地改变了我们日常与计算机交互的方式，因为通常使用它们来仅使用自然语言创建、改进和运行编程脚本。当此类程序可以自动执行和评分而不是根据人类偏好来判断时，可以更好地指导代理代码更新。在量子计算和经典量子模拟设置中，基态准备具有并行结构：可以根据估计能量和指示适当量子态收敛的其他代理对候选协议进行排序。在这项工作中，我们研究了如何使用自动研究（一种基于编码代理的代码优化策略）来优化不同基态准备和采样协议的超参数选择，包括变分量子本征解算器（VQE）、密度矩阵重正化群（DMRG）和辅助场量子蒙特卡罗（AFQMC）。我们在简单的自旋模型和分子哈密顿量上验证了该方法的可行性和能力。\n\n在所有三种设置中，代理将简单的基线转变为具有改进的能量代理的复杂协议，同时在受限的时空计算预算下运行。最后，我们讨论了支持可执行标量评分的其他量子例程，使进化编码代理能够自动完成大部分需要手动进行的协议调整工作。", "authors": [{"name": "Luis Mantilla Calderón"}, {"name": "Jérôme F. Gonthier"}, {"name": "Ignacio Gustin"}, {"name": "Varinia Bernales"}, {"name": "Alán Aspuru-Guzik"}], "featured_authors": [{"name": "Luis Mantilla Calderón"}, {"name": "Jérôme F. Gonthier"}, {"name": "Ignacio Gustin"}, {"name": "Varinia Bernales"}, {"name": "Alán Aspuru-Guzik"}], "author_count": 5}, {"id": "2604.25631", "category": "quant-ph", "title": "Local tensor-train surrogates for quantum learning models", "abstract": "A key bottleneck in quantum machine learning is the computational cost of repeated quantum circuit evaluations during the inference phase. To address this, we present a framework for constructing fast, cheap, provably accurate classical tensor-train surrogates of fully trained quantum machine learning models within local patches of their input data space. The approach combines Taylor polynomial approximation with a tensor-train (TT) representation and embeds it in a statistical learning paradigm via empirical risk minimization. In our analysis, the Taylor-TT construction serves as a deterministic error certificate proving that the TT hypothesis class contains a good approximation; empirical risk minimization then provably recovers a surrogate with controlled generalization error and explicit bounds. This translates into three independently controllable error sources: (i) Taylor truncation error controlled by the patch radius $r$ and polynomial degree $p$, (ii) TT approximation error controlled by the bond dimension $\\chi$, and (iii) statistical estimation error. While the parameter count scales polynomially in the number of data dimensions $N$, i.e., $d_{\\mathrm{eff}} = N(p+1)\\chi^2$ rather than the naive $(p+1)^N$, the worst-case constants inherit an exponential factor through the tensor-product feature norm during Taylor polynomial embedding onto TT. This cleanly separates representation complexity from feature-induced constants. Our risk bounds and sample complexity depend explicitly on the local patch radius $r$.", "url": "https://arxiv.org/abs/2604.25631", "type": "理论+数值", "summary": "量子机器学习的一个关键瓶颈是推理阶段重复量子电路评估的计算成本。为了解决这个问题，我们提出了一个框架，用于在输入数据空间的局部补丁中构建快速、廉价、可证明准确的经典张量训练代理，以充分训练量子机器学习模型。该方法将泰勒多项式近似与张量序列（TT）表示相结合，并通过经验风险最小化将其嵌入到统计学习范式中。在我们的分析中，Taylor-TT 构造充当确定性误差证明，证明 TT 假设类包含良好的近似值；然后，经验风险最小化可证明恢复具有受控泛化误差和显式界限的替代项。这转化为三个独立可控的误差源：(i) 由面片半径 $r$ 和多项式次数 $p$ 控制的泰勒截断误差，(ii) 由键维 $\\chi$ 控制的 TT 近似误差，以及 (iii) 统计估计误差。\n\n虽然参数计数在数据维度 $N$ 上按多项式缩放，即 $d_{\\mathrm{eff}} = N(p+1)\\chi^2$ 而不是朴素的 $(p+1)^N$，但最坏情况常数在泰勒多项式嵌入到 TT 期间通过张量积特征范数继承了指数因子。这清楚地将表示复杂性与特征引起的常量分开。我们的风险界限和样本复杂性明确取决于局部补丁半径 $r$。", "authors": [{"name": "Sreeraj Rajindran Nair"}, {"name": "Christopher Ferrie"}], "featured_authors": [{"name": "Sreeraj Rajindran Nair"}, {"name": "Christopher Ferrie"}], "author_count": 2}, {"id": "2604.25644", "category": "quant-ph", "title": "Efficient Complex-Valued State Preparation on Bucket Brigade QRAM", "abstract": "Efficient quantum state preparation is a critical component in quantum algorithms that process large classical data, and it is fundamental to realizing quantum advantage in domains such as machine learning, quantum linear algebra, and quantum finance. Building on the framework of~\\cite{berti2025efficient}, which integrates Bucket Brigade QRAM (BBQRAM) with a segment tree to achieve amplitude encoding in polylogarithmic query time, we present two improvements within the same architecture-aware framework. First, we remove the $U_{2\\mathrm{CR}}$ subroutine by classically precomputing the rotation angles determined by the segment tree and storing these angles directly in the BBQRAM cells. The tradeoff is that the classically loaded QRAM stores precomputed fixed-point angles rather than raw subtree weights. Second, we extend the construction to complex-valued matrices $A \\in \\mathbb{C}^{M \\times N}$ by storing a leaf phase alongside each precomputed rotation angle and using a two-step magnitude-then-phase procedure; the real signed case is naturally subsumed as a one-bit phase specialization. At unchanged $\\mathcal{O}(\\log_2^2(MN))$ BBQRAM query complexity, the QPU procedure reduces to BBQRAM retrievals and controlled-rotation cascades, with $\\mathcal{O}(MN)$ memory cells per matrix and no reversible arithmetic on the QPU.", "url": "https://arxiv.org/abs/2604.25644", "type": "理论+数值", "summary": "高效的量子态制备是处理大型经典数据的量子算法的关键组成部分，是在机器学习、量子线性代数和量子金融等领域实现量子优势的基础。基于 ~\\cite{berti2025efficient} 的框架，该框架将 Bucket Brigade QRAM (BBQRAM) 与线段树集成，以在多对数查询时间内实现幅度编码，我们在同一架构感知框架中提出了两项​​改进。首先，我们通过传统地预先计算由线段树确定的旋转角度并将这些角度直接存储在 BBQRAM 单元中来删除 $U_{2\\mathrm{CR}}$ 子例程。权衡是经典加载的 QRAM 存储预先计算的定点角度而不是原始子树权重。其次，我们通过将叶相位与每个预先计算的旋转角度一起存储并使用两步幅度然后相位过程，将构造扩展到复值矩阵 $A \\in \\mathbb{C}^{M \\times N}$ ；真实的有符号情况自然被归入一位相位特化。\n\n在 $\\mathcal{O}(\\log_2^2(MN))$ BBQRAM 查询复杂度不变的情况下，QPU 过程简化为 BBQRAM 检索和受控旋转级联，每个矩阵具有 $\\mathcal{O}(MN)$ 存储单元，并且 QPU 上没有可逆算术。", "authors": [{"name": "Alessandro Berti"}, {"name": "Francesco Ghisoni"}], "featured_authors": [{"name": "Alessandro Berti"}, {"name": "Francesco Ghisoni"}], "author_count": 2}, {"id": "2604.25660", "category": "quant-ph", "title": "Nanoscale Sensing of Solid-State Samples with High Frequency Resolution", "abstract": "To meet the growing demand for nanoscale surface analysis, nitrogen-vacancy (NV) centers offer a high-sensitivity alternative by leveraging their ability to operate in immediate proximity to the sample. In this work, we propose a quantum control protocol designed to overcome the inherent challenges of solid-state environments, specifically by mitigating anisotropy and strong dipole-dipole interactions to enable the detection of isotropic chemical shifts at the nanoscale. To achieve this, our scheme synchronizes a slowly rotating magnetic field with tailored RF decoupling and MW control of the NV sensors. We provide an analytical mapping that explicitly links the measured spectrum to the control sequence features and the underlying system parameters, enabling a straightforward characterization of the sample.", "url": "https://arxiv.org/abs/2604.25660", "type": "理论", "summary": "为了满足对纳米级表面分析不断增长的需求，氮空位 (NV) 中心利用其在样品附近进行操作的能力，提供了一种高灵敏度的替代方案。在这项工作中，我们提出了一种量子控制协议，旨在克服固态环境的固有挑战，特别是通过减轻各向异性和强偶极子-偶极子相互作用，从而能够检测纳米尺度的各向同性化学位移。为了实现这一目标，我们的方案将缓慢旋转的磁场与 NV 传感器的定制 RF 解耦和 MW 控制同步。我们提供了一种分析映射，将测量的光谱与控制序列特征和底层系统参数明确联系起来，从而能够直接表征样品。", "authors": [{"name": "P. Alsina-Bolívar"}, {"name": "D. B. Bucher"}, {"name": "J. Casanova"}], "featured_authors": [{"name": "P. Alsina-Bolívar"}, {"name": "D. B. Bucher"}, {"name": "J. Casanova"}], "author_count": 3}, {"id": "2604.25715", "category": "quant-ph", "title": "Ground-state energies of Ising models calculated using the samples from a quantum computer that simulates short-time evolution", "abstract": "We find the ground-state energy of the Ising model using the Cascaded Variational Quantum Eigensolver (CVQE) algorithm with the Guided-Sampling Ansatz (GSA) using up to 63 qubits on a quantum computer. We study a heavy-hex lattice to match the qubit architecture, allowing us to perform calculations in the quantum utility regime. We study both a homogeneous and random-coupling model. We locate the boundary of acceptable quantum errors as a function of the number of qubits and coupling strength. An entropic analysis is performed giving insights into the quantum computing performance. A subspace analysis is performed that suggests that the Ising model is especially suited for near-term quantum computing.", "url": "https://arxiv.org/abs/2604.25715", "type": "理论+数值", "summary": "我们使用级联变分量子本征解算器 (CVQE) 算法和引导采样 Ansatz (GSA) 在量子计算机上使用多达 63 个量子位来计算 Ising 模型的基态能量。我们研究了与量子位架构相匹配的重六边形晶格，使我们能够在量子效用机制中执行计算。我们研究同质和随机耦合模型。我们将可接受的量子误差的边界定位为量子位数量和耦合强度的函数。进行熵分析可以深入了解量子计算性能。进行的子空间分析表明伊辛模型特别适合近期量子计算。", "authors": [{"name": "John P. T. Stenger"}, {"name": "C. Stephen Hellberg"}, {"name": "Daniel Gunlycke"}], "featured_authors": [{"name": "John P. T. Stenger"}, {"name": "C. Stephen Hellberg"}, {"name": "Daniel Gunlycke"}], "author_count": 3}, {"id": "2604.25790", "category": "quant-ph", "title": "The mixed-dimensional quantum MacWilliams identity: bounds for codes and absolutely maximally entangled states in heterogeneous systems", "abstract": "As emerging quantum architectures evolve into heterogeneous networks combining different physical substrates, such as qubits for logic and higher-dimensional qudits for robust communication, the traditional scalar metrics of quantum error correction become insufficient. To address this, we introduce a mathematical framework based on dimension multisets to characterize quantum error-correcting codes (QECC) and absolutely maximally entangled (AME) states in mixed-dimensional Hilbert spaces. By replacing scalar weights with multisets, we accurately capture the exact physical composition of error supports across these diverse systems. Our central result is the mixed-dimensional quantum MacWilliams identity, which establishes the formal algebraic relationship between Shor-Laflamme enumerators and unitary weight enumerators. From this foundation, we deduce the mixed-dimensional shadow identity and derive rigorous, generalized constraints on code parameters, explicitly formulating the mixed-dimensional quantum Hamming, Singleton and Scott bounds, and developing a linear program to systematically evaluate code viability. For the Singleton bound, a tighter bound that has no homogeneous analogue is derived for pure mixed-dimensional codes. Finally, we deploy this enumerator machinery to thoroughly analyze AME states, utilizing shadow inequalities to constrain their existence and introducing a combinatorial grid method for the explicit construction of mixed-dimensional tripartite AME states.", "url": "https://arxiv.org/abs/2604.25790", "type": "理论+数值", "summary": "随着新兴的量子架构演变成结合不同物理基底的异构网络，例如用于逻辑的量子位和用于鲁棒通信的高维量子位，量子纠错的传统标量度量变得不够。为了解决这个问题，我们引入了一种基于维度多重集的数学框架来表征混合维希尔伯特空间中的量子纠错码（QECC）和绝对最大纠缠（AME）状态。通过用多重集替换标量权重，我们可以准确地捕获这些不同系统中误差支持的确切物理组成。我们的核心结果是混合维量子 MacWilliams 恒等式，它建立了 Shor-Laflamme 枚举器和酉权重枚举器之间的形式代数关系。在此基础上，我们推导了混合维影子恒等式，并推导了对代码参数的严格、广义约束，显式地制定了混合维量子汉明、单例和斯科特界限，并开发了一个线性程序来系统地评估代码的可行性。\n\n对于单例边界，为纯混合维码导出了没有齐次类似物的更紧密的边界。最后，我们部署这个枚举器机制来彻底分析 AME 状态，利用影子不等式来约束它们的存在，并引入组合网格方法来显式构造混合维三方 AME 状态。", "authors": [{"name": "David González-Lociga"}, {"name": "Simeon Ball"}], "featured_authors": [{"name": "David González-Lociga"}, {"name": "Simeon Ball"}], "author_count": 2}, {"id": "2604.25801", "category": "quant-ph", "title": "Pseudo-Hermiticity of the Nakajima-Zwanzig Projected Liouvillian in the Jaynes-Cummings Model", "abstract": "The Nakajima-Zwanzig projected Liouvillian QLQ, the generator of the exact memory kernel in open quantum dynamics, is manifestly non-Hermitian yet has been reported to possess a purely real spectrum in the Jaynes-Cummings model -- an anomaly unexplained since observation. We resolve this anomaly by showing that QLQ is pseudo-Hermitian in the Mostafazadeh sense: a positive-definite metric eta>0 exists such that (QLQ)^dag eta = eta (QLQ), forcing the spectrum to be real. The pseudo-Hermiticity is genuine: the Delta N = 0 and Delta N = +/-2 sectors are individually non-Hermitian (residuals 1.70 and 5.06, respectively), yet the global spectrum is protected by eta. The metric survives the bath-truncation limit (N_max = 3--20, matrix dimension up to 1764 x 1764) with intertwining residual <10^{-11}. A continuous deformation to the full Rabi model reveals a re-entrant pseudo-Hermitian phase with two exceptional-point boundaries, in which the metric condition number diverges. The result supplies a structural reason for Hardy-space analyticity of the memory kernel in the canonical quantum-optical model.", "url": "https://arxiv.org/abs/2604.25801", "type": "理论", "summary": "Nakajima-Zwanzig 投影的 Liouvillian QLQ（开放量子动力学中精确记忆内核的生成器）显然是非厄米式的，但据报道在 Jaynes-Cummings 模型中拥有纯真实的光谱——这是一种自观测以来无法解释的异常现象。我们通过证明 QLQ 在 Mostafazadeh 意义上是伪埃尔米特式来解决这个异常：存在正定度量 eta>0 使得 (QLQ)^dag eta = eta (QLQ)，迫使频谱为实数。伪厄米性是真实的：Delta N = 0 和 Delta N = +/-2 扇区各自为非厄米性（残差分别为 1.70 和 5.06），但全局频谱受 eta 保护。该指标符合 Bath-truncation 限制（N_max = 3--20，矩阵尺寸高达 1764 x 1764），且交织残差 <10^{-11}。完整拉比模型的连续变形揭示了具有两个异常点边界的重入伪埃尔米特相，其中度量条件数发散。该结果为规范量子光学模型中内存内核的哈代空间分析性提供了结构上的理由。", "authors": [{"name": "Kejun Liu"}], "featured_authors": [{"name": "Kejun Liu"}], "author_count": 1}, {"id": "2604.25825", "category": "quant-ph", "title": "A Quantum Spectral Framework for Solving PDEs", "abstract": "Partial differential equations (PDEs) are fundamental across numerous scientific fields. As these problems scale to high dimensions, classical numerical schemes introduce severe computational bottlenecks, known as the curse of dimensionality. Attempts to solve this problem typically rely on either classical sparsity and low-rank decompositions, or neural network surrogate models. On the other hand, Quantum Computing offers a promising alternative, as it allows us to operate in significantly larger spaces while demanding far fewer resources. In this work, we present a quantum subroutine to solve second-order linear PDEs by exploiting the structural properties of the filter in Fourier space using Quantum Block Encoding (QBE) with quantum reversible arithmetic. This approach serves as a specialized alternative to standard quantum matrix inversion, which typically relies solely on Quantum Singular Value Transformation (QSVT) without exploiting the inherent structural properties of the matrix. We validate the proposed methodology against its classical counterpart to prove its correctness. This framework provides a foundation for extending these methods toward quantum group Fourier transforms, wavelet-based analysis, and equivariant quantum neural networks (EQNNs), offering a promising path toward solving broader classes of problems, including nonlinear PDEs.", "url": "https://arxiv.org/abs/2604.25825", "type": "理论+数值", "summary": "偏微分方程 (PDE) 是众多科学领域的基础。随着这些问题扩展到高维，经典数值方案引入了严重的计算瓶颈，称为维数灾难。解决此问题的尝试通常依赖于经典稀疏性和低秩分解，或神经网络代理模型。另一方面，量子计算提供了一个有前途的替代方案，因为它使我们能够在更大的空间中运行，同时需要更少的资源。在这项工作中，我们提出了一个量子子例程，通过使用量子块编码（QBE）和量子可逆算法，利用傅里叶空间中滤波器的结构特性来求解二阶线性偏微分方程。这种方法是标准量子矩阵求逆的专门替代方法，标准量子矩阵求逆通常仅依赖于量子奇异值变换 (QSVT)，而不利用矩阵的固有结构特性。我们根据经典方法验证了所提出的方法，以证明其正确性。\n\n该框架为将这些方法扩展到量子群傅立叶变换、基于小波的分析和等变量子神经网络 (EQNN) 奠定了基础，为解决更广泛的问题（包括非线性偏微分方程）提供了一条有希望的途径。", "authors": [{"name": "Chih-Kang Huang"}, {"name": "Giacomo Antonioli"}, {"name": "Frédéric Barbaresco"}], "featured_authors": [{"name": "Chih-Kang Huang"}, {"name": "Giacomo Antonioli"}, {"name": "Frédéric Barbaresco"}], "author_count": 3}, {"id": "2604.25854", "category": "quant-ph", "title": "Quantum channels preserving sigma-additivity and Ulam measurable cardinals", "abstract": "This paper investigates the interplay between the properties of quantum states on the Hilbert space \\(\\ell_2(\\kappa)\\) and the set-theoretic nature of the cardinal $\\kappa$. We focus on the existence of singular $\\sigma$-additive states~ -- functionals whose induced measures are $\\sigma$-additive yet vanish on singletons. While the existence of such states is known to be equivalent to the Ulam measurability of $\\kappa$, their structural and dynamical properties remain largely unexplored. We prove that any $\\sigma$-additive state on the diagonal algebra is representable as a Pettis integral over a singular $\\sigma$-additive measure, extending the classical representation theory to the non-normal sector. Furthermore, we construct a class of quantum channels using $\\sigma$-complete ultrafilters that map normal states to singular $\\sigma$-additive states, effectively <<archiving>> information into the singular part of the state space.", "url": "https://arxiv.org/abs/2604.25854", "type": "理论", "summary": "本文研究了希尔伯特空间 \\(\\ell_2(\\kappa)\\) 上量子态的性质与基数 $\\kappa$ 的集合论性质之间的相互作用。我们关注奇异$\\sigma$-可加状态的存在~——其诱导测度是$\\sigma$-可加但在单态上消失的泛函。虽然已知这种状态的存在相当于 $\\kappa$ 的乌拉姆可测量性，但它们的结构和动力学特性在很大程度上仍未得到探索。我们证明对角代数上的任何 $\\sigma$ 加性状态都可以表示为奇异 $\\sigma$ 加性测度上的佩蒂斯积分，将经典表示理论扩展到非正态扇区。此外，我们使用 $\\sigma$-完全超滤器构造了一类量子通道，将正常状态映射到奇异 $\\sigma$-加性状态，有效地将信息“归档”到状态空间的奇异部分。", "authors": [{"name": "S. V. Dzhenzher"}], "featured_authors": [{"name": "S. V. Dzhenzher"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
