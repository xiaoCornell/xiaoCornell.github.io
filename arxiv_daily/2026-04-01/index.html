  <style>
    :root {

    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }

    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }

    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }

    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }

    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.28849", "category": "cond-mat", "title": "Symmetry-Fractionalized Skin Effects in Non-Hermitian Luttinger Liquids", "abstract": "In one dimension, strongly correlated gapless systems are highly constrained due to conformal invariance, leading to the decoupling of low energy degrees of freedom corresponding to different symmetry sectors. The most familiar example of this is spin-charge separation. Here, we extend this mechanism to the non-Hermitian realm by demonstrating that skin effects corresponding to different symmetry sectors exhibit an emergent decoupling. We establish this for $N$ flavor fermions and demonstrate it numerically for the special case of the Hubbard model, in which spin and charge skin effects separate at low energies. Finally, we construct an interaction-enabled $E_8$ skin effect with no free fermion counterpart.", "url": "https://arxiv.org/abs/2603.28849", "type": "理论+数值", "summary": "在一维中，强相关的无间隙系统由于共形不变性而受到高度约束，导致不同对称扇区对应的低能量自由度的解耦。最熟悉的例子是自旋电荷分离。在这里，我们通过证明对应于不同对称扇区的趋肤效应表现出紧急解耦，将该机制扩展到非厄米领域。我们针对 $N$ 风味费米子建立了这一点，并针对哈伯德模型的特殊情况进行了数值演示，其中自旋和电荷集肤效应在低能量下分离。最后，我们构建了一个可交互的 $E_8$ 趋肤效应，没有自由费米子对应物。", "authors": [{"name": "Christopher Ekman"}, {"name": "Emil J. Bergholtz"}, {"name": "Paolo Molignini"}], "featured_authors": [{"name": "Christopher Ekman"}, {"name": "Emil J. Bergholtz"}, {"name": "Paolo Molignini"}], "author_count": 3}, {"id": "2603.28860", "category": "cond-mat", "title": "Higgs criticality of Dirac spin liquids on depleted triangular lattices", "abstract": "We investigate Higgs criticality in candidate U(1) Dirac spin liquids across a family of depleted triangular lattices: the triangular, kagome, and maple-leaf geometries. For each, we identify the symmetry-allowed spinon-pairing channel connecting the U(1) state to a proximate $\\mathbb{Z}_2$ spin liquid, deriving the corresponding quantum electrodynamics (QED$_3$)-Higgs theory. While the triangular and kagome lattices share a low-energy description with $N_f=4$ Dirac fermions, the maple-leaf lattice yields an analogous theory with $N_f=12$ and a distinct nodal structure where the Dirac cones can move along high-symmetry lines in momentum space. Using a large-$N_{f,b}$ expansion, we compute critical exponents and the scaling dimensions of the symmetry-allowed Yukawa couplings. We find that while Higgs-field fluctuations and a large fermion flavor number both act to suppress the relevance of the Yukawa coupling -- pushing the maple-leaf lattice closer to stability than its counterparts -- the coupling remains weakly relevant in all three cases. This rendering of the Higgs critical point as asymptotically unstable is partly driven in the maple-leaf case by an additional coupling associated with the momentum-space mobility of the Dirac cones. Ultimately, our results provide a unified framework demonstrating how the interplay between fermion flavor count and nodal geometry dictates the fate of the QED$_3$-Higgs transition.", "url": "https://arxiv.org/abs/2603.28860", "type": "理论", "summary": "我们研究了候选 U(1) 狄拉克旋转液体在一系列耗尽三角晶格中的希格斯临界性：三角形、戈薇和枫叶几何形状。对于每一个，我们都确定了将 U(1) 态连接到近似 $\\mathbb{Z}_2$ 自旋液体的对称允许的自旋子配对通道，从而导出相应的量子电动力学 (QED$_3$)-希格斯理论。虽然三角形和戈薇晶格与 $N_f=4$ 狄拉克费米子共享低能量描述，但枫叶晶格产生了 $N_f=12$ 的类似理论和独特的节点结构，其中狄拉克锥可以沿着动量空间中的高对称线移动。使用大$N_{f,b}$展开，我们计算允许对称的汤川耦合的临界指数和缩放维数。我们发现，虽然希格斯场涨落和大的费米子风味数都会抑制汤川耦合的相关性——使枫叶晶格比其对应物更接近稳定——但在所有三种情况下，耦合仍然是弱相关的。\n\n在枫叶情况下，希格斯临界点呈现为渐近不稳定，部分是由与狄拉克锥的动量空间迁移率相关的附加耦合驱动的。最终，我们的结果提供了一个统一的框架，展示了费米子风味计数和节点几何形状之间的相互作用如何决定 QED$_3$-希格斯跃迁的命运。", "authors": [{"name": "Andreas Feuerpfeil"}, {"name": "Atanu Maity"}, {"name": "Ronny Thomale"}, {"name": "Yasir Iqbal"}, {"name": "Subir Sachdev"}], "featured_authors": [{"name": "Andreas Feuerpfeil"}, {"name": "Atanu Maity"}, {"name": "Ronny Thomale"}, {"name": "Yasir Iqbal"}, {"name": "Subir Sachdev"}], "author_count": 5}, {"id": "2603.28904", "category": "cond-mat", "title": "Effect of spin-orbit coupling on spin and orbital ordering in Sr$_{n+1}$Cr$_n$O$_{3n+1}$, $n=1,2$", "abstract": "We incorporate spin-orbit coupling (SOC) into effective Kugel-Khomskii models for the $n=1$ and $n=2$ members of the Ruddlesden-Popper series Sr$_{n+1}$Cr$_n$O$_{3n+1}$. These model contain interacting spins 1 and pseudospins 1/2 at each site describing spin and orbitals degrees of freedom respectively. We solve the models at zero temperature using pseudospin bond operators and spin waves. We find that for realistic parameters, SOC dominates the physics of the compound Sr$_{2}$CrO$_{4}$ with almost decoupled single CrO$_2$ planes. The spin ordering is antiferromagnetic, with nearest-neighbor Cr spins aligned antiparallel. The corresponding orbital configuration is $d_{xy \\uparrow }^{1}(d_{xz\\uparrow }^{1}-id_{yz\\uparrow }^{1})$ or $d_{xy \\downarrow }^{1}(d_{xz\\downarrow }^{1}+id_{yz\\downarrow }^{1})$ depending on the spin of the site. In contrast, for the bilayer compound Sr$_{3}$Cr$_{2}$O$_{7}$ we find that the effect of the SOC is weak and the system prefers to form pseudospin singlets in the $z$ direction perpendicular to the planes. The spin order is antiferromagnetic within each plane and ferromagnetic between planes, in agreement with previous studies.", "url": "https://arxiv.org/abs/2603.28904", "type": "理论", "summary": "我们将自旋轨道耦合 (SOC) 纳入 Ruddlesden-Popper 系列 Sr$_{n+1}$Cr$_n$O$_{3n+1}$ 的 $n=1$ 和 $n=2$ 成员的有效 Kugel-Khomskii 模型中。这些模型在每个位置包含相互作用的自旋 1 和赝自旋 1/2，分别描述自旋和轨道自由度。我们使用赝自旋键算子和自旋波在零温度下求解模型。我们发现，对于实际参数，SOC 主导着具有几乎解耦的单 CrO$_2$ 平面的化合物 Sr$_{2}$CrO$_{4}$ 的物理特性。自旋排序是反铁磁性的，最近邻 Cr 自旋排列为反平行。相应的轨道配置为 $d_{xy \\uparrow }^{1}(d_{xz\\uparrow }^{1}-id_{yz\\uparrow }^{1})$ 或 $d_{xy \\downarrow }^{1}(d_{xz\\downarrow }^{1}+id_{yz\\downarrow }^{1})$，具体取决于站点的自旋。相反，对于双层化合物Sr$_{3}$Cr$_{2}$O$_{7}$，我们发现SOC的影响较弱，并且系统更倾向于在垂直于平面的$z$方向上形成赝自旋单线态。自旋顺序在每个平面内是反铁磁性的，在平面之间是铁磁性的，与之前的研究一致。", "authors": [{"name": "Cristian Fanjul"}, {"name": "A. A. Aligia"}], "featured_authors": [{"name": "Cristian Fanjul"}, {"name": "A. A. Aligia"}], "author_count": 2}, {"id": "2603.28932", "category": "cond-mat", "title": "A Unified Multiscale Auxiliary PINN Framework for Generalized Phonon Transport", "abstract": "Nanoscale thermal transport is governed by the phonon Boltzmann transport equation (BTE). However, simulating the sub-continuum dynamics remains computationally prohibitive due to the high dimensionality of the phase space and the intrinsic nonlinearity of the scattering collision operator. Traditional numerical solvers and standard physics-informed neural networks (PINNs) inherently struggle with these integro-differential equations due to deterministic quadrature limitations, artificial thermalization introduced by the relaxation time approximation (RTA), and multiscale spectral bias. This work introduces a multiscale auxiliary physics-informed neural network (MTNet) to solve the generalized equation of phonon radiative transfer (GEPRT). By leveraging an auxiliary formulation, this mesh-free framework recasts the GEPRT into a fully differential system, enabling the analytical evaluation of scattering operators via automatic differentiation and facilitating scalable multi-GPU parallelization. To circumvent optimization stiffness, the architecture employs a decoupled, shallow neural network explicitly constrained by radiative equilibrium. MTNet is validated by simulating steady-state cross-plane transport in a silicon thin film, successfully capturing ballistic-diffusive regimes and characteristic boundary slips across extreme temperature gradients ($\\Delta T = 100$ K) beyond the standard linearization approach. Furthermore, we show that our framework successfully solves a geometric inverse problem in a slab geometry, retrieving the unknown slab thickness based only on interface temperature constraints in the mesoscopic regime. Ultimately, MTNet establishes a robust, fully differentiable foundation for predicting high-fidelity kinetic transport and extracting material properties in next-generation nanostructures.", "url": "https://arxiv.org/abs/2603.28932", "type": "理论+数值", "summary": "纳米级热传输由声子玻尔兹曼传输方程 (BTE) 控制。然而，由于相空间的高维性和散射碰撞算子的固有非线性，模拟子连续动力学在计算上仍然令人望而却步。由于确定性求积限制、弛豫时间近似 (RTA) 引入的人工热化以及多尺度谱偏差，传统数值求解器和标准物理信息神经网络 (PINN) 本质上难以处理这些积分微分方程。这项工作引入了多尺度辅助物理信息神经网络（MTNet）来求解广义声子辐射传递方程（GEPRT）。通过利用辅助公式，这种无网格框架将 GEPRT 重新构建为全差分系统，从而能够通过自动微分对散射算子进行分析评估，并促进可扩展的多 GPU 并行化。为了规避优化刚度，该架构采用了受辐射平衡明确约束的解耦浅层神经网络。\n\nMTNet 通过模拟硅薄膜中的稳态跨平面传输进行验证，成功捕获超出标准线性化方法的弹道扩散状态和跨极端温度梯度 ($\\Delta T = 100$ K) 的特征边界滑移。此外，我们表明我们的框架成功解决了板坯几何中的几何反问题，仅基于介观状态中的界面温度约束来检索未知的板坯厚度。最终，MTNet 为预测高保真动力学传输和提取下一代纳米结构中的材料特性奠定了坚实的、完全可微分的基础。", "authors": [{"name": "Roberto Riganti"}, {"name": "Luca Dal Negro"}], "featured_authors": [{"name": "Roberto Riganti"}, {"name": "Luca Dal Negro"}], "author_count": 2}, {"id": "2603.29047", "category": "cond-mat", "title": "Longest weakly increasing subsequences of discrete random walks on the integers with heavy tailed distribution of increments", "abstract": "We investigate the behavior of the length of the longest weakly increasing subsequences (weak LIS) of $n$-step random walks with nonzero integer increments $k = \\pm 1, \\pm 2, \\dots$ given by a zero-mean, symmetric heavy tailed mass distribution proportional to $|k|^{-1-\\alpha}$ for several values of the real parameter $\\alpha > 0$ together with that of the simple random walk ($k=\\pm 1$), to which the $n$-step heavy tailed random walks tends when $\\alpha > (1+o(1))\\log_{2}{n}$. By means of exploratory fits, weighted nonlinear least squares, and ANOVA model comparison, we found that the sample average length $\\langle{L_{n}}\\rangle$ scales like $\\langle{L_{n}}\\rangle \\sim \\sqrt{n}\\log{n}$ when the distribution of increments has finite variance ($\\alpha > 2$) and $\\langle{L_{n}}\\rangle \\sim n^{\\theta}$ with a varying exponent $\\theta > 0.5$ when the variance is infinite ($\\alpha \\leq 2$). Distributional diagnostics indicate that the bulk of the $L_{n}$ distribution is very well-approximated by a lognormal model, though systematic deviations are observed in the tails. Our results corroborate and expand upon previous results for the LIS of other types of heavy-tailed random walks and raise a conjecture as to whether the distribution of $L_{n}$ is given, or can be effectively described, by a lognormal distribution.", "url": "https://arxiv.org/abs/2603.29047", "type": "理论", "summary": "我们研究了具有非零整数增量 $k = \\pm 1, \\pm 2, \\dots$ 的 $n$ 步随机游走的最长弱递增子序列（弱 LIS）的长度行为，该分布由与 $|k|^{-1-\\alpha}$ 成正比的零均值、对称重尾质量分布给出，对于实数参数 $\\alpha > 0$ 的几个值以及简单随机游走的值 ($k=\\pm 1$)，当 $\\alpha > (1+o(1))\\log_{2}{n}$ 时，$n$ 步重尾随机游走趋向于该方向。通过探索性拟合、加权非线性最小二乘法和方差分析模型比较，我们发现当增量分布具有有限方差（$\\alpha > 2$）且$\\langle{L_{n}}\\rangle \\sim时，样本平均长度$\\langle{L_{n}}\\rangle$的尺度类似于$\\langle{L_{n}}\\rangle \\sim \\sqrt{n}\\log{n}$当方差无穷大时 ($\\alpha \\leq 2$)，n^{\\theta}$ 具有变化的指数 $\\theta > 0.5$。分布诊断表明，尽管在尾部观察到系统偏差，但对数正态模型可以很好地逼近 $L_{n}$ 分布的大部分。\n\n我们的结果证实并扩展了之前其他类型重尾随机游走的 LIS 的结果，并提出了关于 $L_{n}$ 的分布是否是给定的，或者可以通过对数正态分布有效描述的猜想。", "authors": [{"name": "José Ricardo G. Mendonça"}, {"name": "Marcelo V. Freire"}], "featured_authors": [{"name": "José Ricardo G. Mendonça"}, {"name": "Marcelo V. Freire"}], "author_count": 2}, {"id": "2603.29072", "category": "cond-mat", "title": "How much of persistent homology is topology? A quantitative decomposition for spin model phase transitions", "abstract": "Point-cloud persistent homology (PH) -- computing alpha or Rips complexes on spin-position point clouds -- has been widely applied to detect phase transitions in classical spin models since Donato et al. (2016), with subsequent studies attributing the detection to the topological content of the persistence diagram. We ask a simple question that has not been posed: what fraction of the PH signal is genuinely topological? We introduce f_topo, a quantitative decomposition that separates the density-driven and topological contributions to any PH statistic by comparing real spin configurations against density-matched shuffled null models. Across the 2D Ising model (system sizes L = 16-128, ten temperatures) and Potts models (q = 3, 5), we find that H_0 statistics -- total persistence, persistence entropy, feature count -- are 94-100% density-driven (f_topo < 0.07). The density-matched shuffled null detects T_c at the identical location and with comparable peak height as real configurations, showing that density alone is sufficient for phase transition detection. However, H_1 statistics are partially topological: the topological fraction grows with system size as delta(TP_{H_1}) ~ L^{0.53} and follows a finite-size scaling collapse delta(T, L) = L^{0.53} g(tL^{1/nu}) with collapse quality CV = 0.27. The longest persistence bar is strongly topological (f_topo > 1) and scales with the correlation length. A scale-resolved analysis reveals that the topological excess shifts from large-scale to small-scale features as L increases. We propose that the TDA-for-phase-transitions community adopt shuffled null models as standard practice, and that H_1 rather than H_0 statistics be used when genuine topological information is sought.", "url": "https://arxiv.org/abs/2603.29072", "type": "理论+数值", "summary": "点云持久同源性（PH）——在自旋位置点云上计算 alpha 或 Rips 复合体——自 Donato 等人以来已被广泛应用于检测经典自旋模型中的相变。 (2016)，随后的研究将检测归因于持久图的拓扑内容。我们问一个尚未提出的简单问题：PH 信号的哪一部分是真正的拓扑？我们引入了 f_topo，一种定量分解，通过将真实自旋构型与密度匹配的打乱空模型进行比较，将密度驱动和拓扑对任何 PH 统计的贡献分开。在 2D Ising 模型（系统尺寸 L = 16-128，十个温度）和 Potts 模型（q = 3, 5）中，我们发现 H_0 统计数据（总持久性、持久性熵、特征计数）94-100% 是密度驱动的 (f_topo < 0.07)。密度匹配的混洗空值在相同位置检测到 T_c，并且具有与真实配置相当的峰高，这表明仅密度就足以进行相变检测。\n\n然而，H_1 统计数据是部分拓扑的：拓扑分数随着系统大小的变化而增长，如 delta(TP_{H_1}) ~ L^{0.53}，并遵循有限大小的缩放崩溃 delta(T, L) = L^{0.53} g(tL^{1/nu})，崩溃质量 CV = 0.27。最长的持久性条具有强拓扑性（f_topo > 1），并且随相关长度变化。尺度解析分析表明，随着 L 的增加，拓扑过剩从大尺度特征转变为小尺度特征。我们建议 TDA-for-phase-transition 社区采用改组的空模型作为标准实践，并且在寻求真正的拓扑信息时使用 H_1 而不是 H_0 统计数据。", "authors": [{"name": "Matthew Loftus"}], "featured_authors": [{"name": "Matthew Loftus"}], "author_count": 1}, {"id": "2603.29074", "category": "cond-mat", "title": "The geometric origin of criticality: a universal mechanism in mean-field rotor Hamiltonians", "abstract": "We introduce a universal criterion for criticality in mean-field rotor Hamiltonians based on the geometric structure of the constant-energy shell. Rather than characterizing the onset of a phase transition through the conventional thermodynamic singularities alone, we show that the relevant information is already encoded in the way the geometry of the shell reorganizes along distinguished collective directions. For a broad class of finite-dimensional trigonometric mean-field interactions, the trace of the Weingarten operator (representing the principal curvatures) admits a universal collective expansion in terms of the order-parameter amplitudes. This expansion defines an energy-dependent quadratic form whose eigenmodes identify the geometrically unstable channels of the system. Criticality is then associated with the vanishing of the corresponding curvature coefficients, yielding a direct geometric selection principle for the modes that become unstable at the transition. In this way, the phase transition in mean-field systems (usually of first- or second-order) is reformulated as a geometric instability phenomenon intrinsic to the microcanonical energy shell. The resulting framework is geometrically universal within the class considered, independent of model-specific details except for a finite set of collective couplings. Moreover, our approach recovers the known critical channels in standard mean-field rotor models while extending naturally to multimode and spectrally coupled cases. These results support a view in which critical behavior can be understood as reorganizations of energy-shell geometry triggered by a collective restructuring of the underlying energy-shell geometry.", "url": "https://arxiv.org/abs/2603.29074", "type": "理论", "summary": "我们基于恒能壳的几何结构引入了平均场转子哈密顿量临界性的通用准则。我们并没有仅仅通过传统的热力学奇点来表征相变的开始，而是表明相关信息已经以壳的几何结构沿着不同的集体方向重组的方式进行了编码。对于一类广泛的有限维三角平均场相互作用，Weingarten 算子的迹（代表主曲率）允许在序参数振幅方面存在通用集体展开。该展开式定义了一个与能量相关的二次形式，其特征模态确定了系统的几何不稳定通道。然后，临界性与相应曲率系数的消失相关联，从而为在过渡时变得不稳定的模式产生直接的几何选择原理。通过这种方式，平均场系统（通常是一阶或二阶）中的相变被重新表述为微正则能量壳固有的几何不稳定性现象。\n\n由此产生的框架在所考虑的类别中在几何上是通用的，除了一组有限的集体耦合之外，与特定于模型的细节无关。此外，我们的方法恢复了标准平均场转子模型中已知的关键通道，同时自然地扩展到多模和频谱耦合情况。这些结果支持这样一种观点，即关键行为可以理解为由底层能量壳几何结构的集体重组引发的能量壳几何结构的重组。", "authors": [{"name": "Loris Di Cairano"}], "featured_authors": [{"name": "Loris Di Cairano"}], "author_count": 1}, {"id": "2603.29173", "category": "cond-mat", "title": "Quasiperiodicity-Engineered Re-entrant Localization-Delocalization aspects in a Diamond Lattice", "abstract": "We investigate localization in a quasiperiodically engineered diamond lattice with strand-dependent Aubry-André-Harper onsite modulations, highlighting the decisive roles of the modulation ratio $s$ and the averaged potential on the middle strand. The upper strand hosts the primary potential $\\lambda$, the lower strand carries a weaker modulation $\\lambda/s$, and the middle strand follows their average, generating a correlated quasiperiodic landscape across each plaquette. By tuning $\\lambda$ for selected values of $s$, we probe spectral and eigenstate properties via the inverse participation ratio (IPR), normalized participation ratio (NPR), and fractal dimension $D_2$. We uncover a pronounced re-entrant localization behavior, where eigenstates repeatedly switch between extended and localized regimes, which persists only within a finite range of $s$ and crucially relies on the averaged potential construction. This unconventional sequence arises from the interplay of $s$, the correlated potential, and the intrinsic diamond geometry, producing a highly nontrivial interference landscape. Our results reveal localization physics beyond the standard Aubry-André paradigm, further supported by the evolution of extended states, system-size scaling of $\\langle \\mathrm{NPR} \\rangle$ and $\\langle D_2 \\rangle$, and dynamical signatures from the time-dependent root-mean-square displacement, confirming the robustness of the re-entrant transitions.", "url": "https://arxiv.org/abs/2603.29173", "type": "理论+数值", "summary": "我们研究了具有链相关 Aubry-André-Harper 现场调制的准周期工程金刚石晶格中的定位，强调了调制比 $s$ 和中间链上平均电势的决定性作用。上链承载主要势 $\\lambda$，下链承载较弱的调制 $\\lambda/s$，中间链遵循其平均值，在每个斑块上生成相关的准周期景观。通过针对 $s$ 的选定值调整 $\\lambda$，我们通过逆参与比 (IPR)、归一化参与比 (NPR) 和分形维数 $D_2$ 来探测光谱和本征态属性。我们发现了一种明显的重入局域化行为，即本征态在扩展状态和局域状态之间反复切换，这种状态仅在 $s$ 的有限范围内持续存在，并且关键依赖于平均势构造。这种非常规序列是由 $s$、相关电势和固有钻石几何形状的相互作用产生的，产生了高度不平凡的干涉景观。\n\n我们的结果揭示了超出标准 Aubry-André 范式的局域化物理，进一步得到扩展状态的演化、$\\langle \\mathrm{NPR} \\rangle$ 和 $\\langle D_2 \\rangle$ 的系统尺寸缩放以及来自时间相关均方根位移的动态特征的支持，证实了重入跃迁的鲁棒性。", "authors": [{"name": "Ranjini Bhattacharya"}, {"name": "Souvik Roy"}], "featured_authors": [{"name": "Ranjini Bhattacharya"}, {"name": "Souvik Roy"}], "author_count": 2}, {"id": "2603.29177", "category": "cond-mat", "title": "Interplay of Antiferromagnetism and Quasiperiodicity in a Hubbard Ring: Localization Insights", "abstract": "We study localization in a quasiperiodic spinful antiferromagnetic Hubbard ring within a self-consistent Hartree-Fock framework, emphasizing the interplay of quasiperiodicity, staggered Zeeman-field-induced antiferromagnetic order, and electron correlations. Localization properties are characterized through inverse participation ratios, normalized participation ratios, and multifractality, and are consistently supported by a broad class of real-space mean-field observables, including double occupancy, density fluctuations, local entropy, spin-density-wave (SDW) order, and other related correlation measures. We uncover a pronounced nonmonotonic evolution of localization with interaction strength, featuring an intermediate regime marked by enhanced localization, strong spatial inhomogeneity, and magnetic ordering, followed by a re-entrant tendency toward delocalization at stronger interaction regime. Phase diagrams constructed from complementary localization and mean-field indicators reveal extended, localized, and critical regimes governed by the interplay of quasiperiodicity and interactions. Furthermore, real-time wave-packet dynamics of eigenstates provide direct evidence of ballistic spreading, confinement, and re-entrant transport, in agreement with the underlying spectral characteristics. These results establish a unified framework where diverse mean-field observables and dynamical probes consistently capture correlation-driven localization phenomena in quasiperiodic systems.", "url": "https://arxiv.org/abs/2603.29177", "type": "理论+数值", "summary": "我们研究了自洽 Hartree-Fock 框架内准周期自旋反铁磁哈伯德环的局域化，强调准周期性、交错塞曼场诱导的反铁磁序和电子相关性的相互作用。局域化属性通过逆参与比、归一化参与比和多重分形来表征，并得到广泛的实空间平均场可观测量的一致支持，包括双占据、密度涨落、局域熵、自旋密度波 (SDW) 阶数和其他相关测量。我们发现了局域化与相互作用强度的显着非单调演化，其特征是具有增强局域化、强空间不均匀性和磁有序性的中间状态，随后是在更强相互作用状态下的离域重入趋势。由互补的局部化和平均场指示器构建的相图揭示了由准周期性和相互作用的相互作用控制的扩展、局部和临界状态。\n\n此外，本征态的实时波包动力学提供了弹道扩散、限制和重入传输的直接证据，与潜在的光谱特征一致。这些结果建立了一个统一的框架，在该框架中，不同的平均场可观测量和动力学探针一致地捕获准周期系统中相关驱动的局域化现象。", "authors": [{"name": "Souvik Roy"}, {"name": "Ranjini Bhattacharya"}], "featured_authors": [{"name": "Souvik Roy"}, {"name": "Ranjini Bhattacharya"}], "author_count": 2}, {"id": "2603.29198", "category": "cond-mat", "title": "Long-range interaction effects on the phase transition, mechanical effect, and electric field response of BaTiO3 by machine learning potentials", "abstract": "Bulk materials are governed by both short-range and long-range interactions, both of which are naturally captured in conventional density functional theory (DFT) calculations through Ewald summation of electrostatic contributions. In contrast, machine learning potentials (MLPs) typically rely on local atomic environment descriptors, and long-range interactions are often neglected. Such approximations may introduce systematic energetic errors and lead to inaccuracies in predicted material properties. To systematically investigate the impact of long-range interactions in ferroelectric BaTiO3 within the framework of MLPs, we developed a long-range MACELES model and compared its performance with the previously reported BaTiO3 MACE model across four key properties (phonon dispersion, phase transition behavior, mechanical response, and ferroelectric properties including dielectric constants). We find that qualitative behaviors, including phase transitions, stress-induced polarization switching, and polarization-electric field hysteresis, are consistently reproduced by both models. In contrast, quantitative properties such as transition temperatures, elastic constants, and dielectric constants exhibit systematic improvements in MACELES model, highlighting the importance of incorporating long-range electrostatics for accurately describing the structural and dielectric responses of BaTiO3. These results suggest that while long-range interactions play a role in improving quantitative accuracy, their omission does not significantly alter the qualitative ferroelectric behavior of BaTiO3.", "url": "https://arxiv.org/abs/2603.29198", "type": "理论+数值", "summary": "块体材料受到短程和长程相互作用的控制，这两种相互作用都是通过静电贡献的埃瓦尔德求和在传统密度泛函理论 (DFT) 计算中自然捕获的。相比之下，机器学习潜力（MLP）通常依赖于局部原子环境描述符，而远程交互往往被忽略。这种近似可能会引入系统能量误差并导致预测的材料特性不准确。为了系统地研究 MLP 框架内铁电 BaTiO3 中长程相互作用的影响，我们开发了一种长程 MACELES 模型，并将其与之前报道的 BaTiO3 MACE 模型在四个关键特性（声子色散、相变行为、机械响应和铁电特性（包括介电常数））方面的性能进行了比较。我们发现两个模型一致地再现了定性行为，包括相变、应力引起的极化切换和极化电场磁滞。\n\n相比之下，转变温度、弹性常数和介电常数等定量特性在 MACELES 模型中表现出系统性的改进，凸显了结合长程静电对于准确描述 BaTiO3 的结构和介电响应的重要性。这些结果表明，虽然长程相互作用在提高定量精度方面发挥了作用，但它们的省略并不会显着改变 BaTiO3 的定性铁电行为。", "authors": [{"name": "Po-Yen Chen"}, {"name": "Teruyasu Mizoguchi"}], "featured_authors": [{"name": "Po-Yen Chen"}, {"name": "Teruyasu Mizoguchi"}], "author_count": 2}, {"id": "2603.29202", "category": "cond-mat", "title": "Quantum anomalous Hall effect in monolayer transition-metal trihalides", "abstract": "We present systematic first-principles results for the electronic and magnetic properties of two-dimensional transition-metal trihalide monolayers MX3 (M = V, Cr, Mn, Fe, Ni, Pd; X = F, Cl, Br, I), focusing on their potential to host the quantum anomalous Hall effect. In particular, MnF3 and PdF3 exhibit a spin-polarized Dirac cone at the K point, spin-orbit coupling opens a sizable gap with a nonzero Chern number. Nanoribbon slab calculations reveal gap-crossing chiral edge states, establishing the nontrivial topological character. Beyond these case studies, our systematic screening clarifies general trends across the MX3 family and provides insight into how electronic configuration and spin-orbit coupling cooperate to produce magnetic and topological phases in two-dimensional magnets.", "url": "https://arxiv.org/abs/2603.29202", "type": "理论+数值", "summary": "我们提出了二维过渡金属三卤化物单层 MX3（M = V、Cr、Mn、Fe、Ni、Pd；X = F、Cl、Br、I）的电子和磁性的系统第一性原理结果，重点关注其承载量子反常霍尔效应的潜力。特别是，MnF3 和 PdF3 在 K 点表现出自旋极化狄拉克锥，自旋轨道耦合打开了一个相当大的间隙，且具有非零陈数。纳米带板计算揭示了跨越间隙的手性边缘态，建立了非平凡的拓扑特征。除了这些案例研究之外，我们的系统筛选还阐明了 MX3 系列的总体趋势，并深入了解电子配置和自旋轨道耦合如何配合以在二维磁体中产生磁性和拓扑相。", "authors": [{"name": "Thi Phuong Thao Nguyen"}, {"name": "Kunihiko Yamauchi"}], "featured_authors": [{"name": "Thi Phuong Thao Nguyen"}, {"name": "Kunihiko Yamauchi"}], "author_count": 2}, {"id": "2603.29241", "category": "cond-mat", "title": "Mean first passage times of velocity jump processes in higher dimensions", "abstract": "First passage phenomena arise across physics, biology, and finance when stochastic processes first reach a threshold, triggering downstream events. Examples include the irreversible exit from a domain, a biochemical reaction, a financial selloff. While typical formulations involve diffusive motion, many stochastic processes are better described as velocity jump processes, characterized by persistent motion interrupted by stochastic velocity changes. Despite their ubiquity, first-passage properties of velocity jump processes remain underdeveloped in higher dimensions, especially under directional bias. We present a general framework to estimate the mean first passage time (MFPT) and higher moments of the survival probability for fixed-speed velocity jump processes where possible reorientations range from strong alignment to full angular anisotropy. For low Knudsen numbers, when the mean free path is small compared to the distance to the target, we derive a universal form for the MFPT in which two bias functions encode broad classes of angular distributions, including von Mises-Fisher, wrapped Cauchy, and elliptical families. In the narrow capture limit of a vanishingly small target, directional persistence induces anomalous scaling, including regimes where the MFPT remains finite whereas standard diffusion would predict divergence. Finally, we obtain a Langevin representation that accurately reproduces first-passage statistics. Analytical predictions are confirmed by numerical simulations.", "url": "https://arxiv.org/abs/2603.29241", "type": "理论+数值", "summary": "当随机过程首次达到阈值并触发下游事件时，物理学、生物学和金融领域就会出现首次通过现象。例子包括不可逆转地退出某个领域、生化反应、金融抛售。虽然典型的公式涉及扩散运动，但许多随机过程最好被描述为速度跳跃过程，其特征是持续运动被随机速度变化中断。尽管它们无处不在，但速度跳跃过程的首通道特性在更高维度上仍然不发达，特别是在方向偏差下。我们提出了一个通用框架来估计固定速度速度跳跃过程的平均首次通过时间（MFPT）和较高的生存概率矩，其中可能的重新定向范围从强对准到全角度各向异性。对于低克努森数，当平均自由程与到目标的距离相比较小时，我们推导出 MFPT 的通用形式，其中两个偏置函数编码广泛类别的角度分布，包括 von Mises-Fisher、包裹柯西和椭圆族。\n\n在几乎消失的小目标的狭窄捕获极限中，方向持久性会引起异常缩放，包括 MFPT 保持有限而标准扩散会预测发散的情况。最后，我们获得了准确再现第一代统计数据的 Langevin 表示。分析预测通过数值模拟得到证实。", "authors": [{"name": "Maria R. D'Orsogna"}, {"name": "Alan E. Lindsay"}, {"name": "Thomas Hillen"}], "featured_authors": [{"name": "Maria R. D'Orsogna"}, {"name": "Alan E. Lindsay"}, {"name": "Thomas Hillen"}], "author_count": 3}, {"id": "2603.29267", "category": "cond-mat", "title": "Thermodynamic Multipoles and Dissipative Conductivities in Metallic Systems", "abstract": "Multipoles provide a systematic framework for describing the electronic structures of quantum materials from a symmetry perspective. Thermodynamic multipole moments in crystalline solids exhibit direct microscopic connections to certain allowed physical responses beyond symmetry; however, such relations have thus far been limited to dissipationless responses in equilibrium insulating systems. Here, this framework is extended at a heuristic level by focusing on the Fermi-surface contributions to thermodynamic multipole moments. These contributions establish direct relations to dissipative transport responses characteristic of metals, including charge and spin conductivities. A key consequence is that the conductivities exhibit extrema, typically maxima, at chemical potentials where the corresponding Fermi-surface contributions to the multipoles vanish, specifically, the electric quadrupole for charge conductivity and the magnetic octupole for spin conductivity. These findings uncover a previously overlooked aspect of thermodynamic multipole moments, opening a new perspective on dissipative transport in metallic systems.", "url": "https://arxiv.org/abs/2603.29267", "type": "理论", "summary": "多极子提供了从对称角度描述量子材料的电子结构的系统框架。结晶固体中的热力学多极矩与某些超出对称性的物理响应表现出直接的微观联系；然而，迄今为止，这种关系仅限于平衡绝缘系统中的无耗散响应。在这里，通过关注费米表面对热力学多极矩的贡献，该框架在启发式水平上进行了扩展。这些贡献与金属的耗散传输响应特征（包括电荷和自旋电导率）建立了直接关系。一个关键的结果是，电导率在化学势处表现出极值，通常是最大值，其中相应的费米表面对多极的贡献消失，特别是电荷传导性的电四极杆和自旋传导性的磁八极杆。这些发现揭示了热力学多极矩以前被忽视的一个方面，为金属系统中的耗散传输开辟了新的视角。", "authors": [{"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Takumi Sato"}, {"name": "Satoru Hayami"}], "author_count": 2}, {"id": "2603.29344", "category": "cond-mat", "title": "Parafermionic Truncated Wigner Approximation", "abstract": "We introduce the parafermionic truncated Wigner approximation ($p$TWA), a semiclassical phase-space framework for simulating the nonequilibrium dynamics of lattice systems with fractional exchange statistics. The method extends truncated Wigner approaches developed for bosonic and fermionic systems to $\\mathbb{Z}_n$ Fock parafermions by expressing the Hamiltonian in terms of local Hubbard operators that form a closed Lie algebra. This representation leads to a Lie--Poisson phase-space formulation in which quantum dynamics is approximated by stochastic sampling of initial conditions followed by deterministic semiclassical evolution. We benchmark the approach in several settings, including single-site clock dynamics, the fully connected $\\mathbb{Z}_n$ clock model, long-range $\\mathbb{Z}_3$ clock chains, and disordered $\\mathbb{Z}_3$ Fock parafermion chains. The method reproduces key features of the exact dynamics, including excitation spreading, disorder-induced suppression of transport, and the emergence of long-time imbalance plateaus. Our results demonstrate that $p$TWA provides a practical tool for exploring the dynamics of parafermionic systems in regimes where exact numerical methods are limited by Hilbert-space growth.", "url": "https://arxiv.org/abs/2603.29344", "type": "理论+数值", "summary": "我们介绍了顺费米截断维格纳近似（$p$TWA），这是一种半经典相空间框架，用于通过分数交换统计来模拟晶格系统的非平衡动力学。该方法通过用形成封闭李代数的局部哈伯德算子表达哈密顿量，将为玻色子和费米子系统开发的截断维格纳方法扩展到 $\\mathbb{Z}_n$ Fock 平费米子。这种表示导致了李-泊松相空间公式，其中量子动力学通过初始条件的随机采样和随后的确定性半经典演化来近似。我们在多种设置中对该方法进行了基准测试，包括单站点时钟动力学、完全连接的 $\\mathbb{Z}_n$ 时钟模型、远程 $\\mathbb{Z}_3$ 时钟链和无序 $\\mathbb{Z}_3$ Fock parafermion 链。该方法再现了精确动力学的关键特征，包括激发传播、无序引起的运输抑制以及长期不平衡平台的出现。\n\n我们的结果表明，$p$TWA 提供了一个实用的工具，用于探索在精确数值方法受到希尔伯特空间增长限制的情况下顺费米子系统的动力学。", "authors": [{"name": "Javad Vahedi"}, {"name": "Martin Garttner"}], "featured_authors": [{"name": "Javad Vahedi"}, {"name": "Martin Garttner"}], "author_count": 2}, {"id": "2603.29358", "category": "cond-mat", "title": "Heat Conduction and Energy Relaxation in an InAs Nanowire Approaching the Clean One-Dimensional Limit", "abstract": "We investigate heat conduction and energy relaxation in an InAs semiconductor nanowire using a hybrid semiconductor-superconductor architecture. Local electronic temperatures are measured with an in-situ grown quantum dot thermometer, while controlled Joule heating is applied at different locations along the wire to probe temperature gradients at sub-kelvin temperatures. With a onedimensional heat transport model, we calculate an electron-phonon heat flow that scales as Q_{e-ph} \\propto T^2.6, which is in close agreement with the T^3 dependence predicted for a clean one-dimensional electron gas coupled to a phonon bath. We further estimate a characteristic length l_{eq} = 370 nm, beyond this length scale, phonon-mediated heat transport dominates over heat conduction in our nanowire. Our results provide a quantitative measure of energy relaxation mechanisms in a onedimensional semiconductor and provide a framework for studying heat flow in low-dimensional nanostructures.", "url": "https://arxiv.org/abs/2603.29358", "type": "理论", "summary": "我们使用混合半导体超导体架构研究 InAs 半导体纳米线的热传导和能量弛豫。使用原位生长的量子点温度计测量局部电子温度，同时在沿线的不同位置施加受控焦耳加热，以探测亚开尔文温度下的温度梯度。通过一维热传输模型，我们计算了电子-声子热流，其比例为 Q_{e-ph} \\propto T^2.6，这与预测的耦合到声子浴的清洁一维电子气的 T^3 依赖性非常一致。我们进一步估计特征长度 l_{eq} = 370 nm，超出这个长度范围，声子介导的热传输在纳米线中占主导地位。我们的结果提供了一维半导体中能量弛豫机制的定量测量，并为研究低维纳米结构中的热流提供了框架。", "authors": [{"name": "Subhomoy Haldar"}, {"name": "Diego Subero"}, {"name": "Mukesh Kumar"}, {"name": "Bayan Karimi"}, {"name": "Adam Burke"}, {"name": "Lars Samuelson"}, {"name": "Jukka Pekola"}, {"name": "Ville F. Maisi"}], "featured_authors": [{"name": "Subhomoy Haldar"}, {"name": "Diego Subero"}, {"name": "Mukesh Kumar"}, {"name": "Lars Samuelson"}, {"name": "Jukka Pekola"}, {"name": "Ville F. Maisi"}], "author_count": 8}, {"id": "2603.29370", "category": "cond-mat", "title": "Decoding Dopant-Induced Electronic Modulation in Graphene via Region-Resolved Machine Learning of XANES", "abstract": "Revealing how heteroatom doping alters the local electronic structure of graphene is crucial for understanding and controlling its functional properties. In this study, we combine density functional theory (DFT) and machine learning (ML) to interpret how boron (B) and nitrogen (N) dopants influence the local electronic environments of graphene. A dataset of 415 DFT-simulated XANES spectra from 91 distinct configurations was analyzed using a region-specific approach by decomposing each spectrum into pi*, sigma*, and post-edge regions. Random forest models trained on these spectral segments identified the pi* region as the most informative for predicting key local electronic descriptors, particularly the Bader charge and mean dopant-carbon bond length. The Bader charge quantifies dopant-induced charge redistribution and local bonding polarity, directly reflecting the degree of electronic perturbation introduced by heteroatom substitution. The enhanced predictive power of the pi* region arises from its strong coupling to the perturbed pi-electron network, which captures these charge-transfer and hybridization effects more effectively than sigma* or post-edge regions. These findings establish Bader charge as a robust and physically meaningful descriptor for quantifying dopant-induced electronic modulation and demonstrate that region-resolved ML analysis of XANES spectra provides a powerful pathway to uncover structure-property relationships in doped graphene and related materials.", "url": "https://arxiv.org/abs/2603.29370", "type": "理论+数值", "summary": "揭示杂原子掺杂如何改变石墨烯的局部电子结构对于理解和控制其功能特性至关重要。在这项研究中，我们结合密度泛函理论（DFT）和机器学习（ML）来解释硼（B）和氮（N）掺杂剂如何影响石墨烯的局部电子环境。使用区域特定方法，将每个光谱分解为 pi*、sigma* 和后边缘区域，对来自 91 个不同配置的 415 个 DFT 模拟 XANES 光谱数据集进行了分析。在这些光谱段上训练的随机森林模型将 pi* 区域确定为预测关键局部电子描述符（特别是巴德电荷和平均掺杂剂碳键长度）最有信息的区域。 Bader 电荷量化了掺杂剂引起的电荷重新分布和局部键合极性，直接反映了杂原子取代引入的电子扰动程度。 pi* 区域增强的预测能力源于其与扰动的 pi 电子网络的强耦合，该网络比 sigma* 或后边缘区域更有效地捕获这些电荷转移和杂交效应。\n\n这些发现将 Bader 电荷确立为一种稳健且具有物理意义的描述符，用于量化掺杂剂诱导的电子调制，并证明 XANES 光谱的区域分辨 ML 分析为揭示掺杂石墨烯和相关材料的结构-性能关系提供了强大的途径。", "authors": [{"name": "Yinan Wang"}, {"name": "Arpita Varadwaj"}, {"name": "Teruyasu Mizoguchi"}, {"name": "Masato Kotsugi"}], "featured_authors": [{"name": "Yinan Wang"}, {"name": "Arpita Varadwaj"}, {"name": "Teruyasu Mizoguchi"}, {"name": "Masato Kotsugi"}], "author_count": 4}, {"id": "2603.29377", "category": "cond-mat", "title": "Altermagnetic-doping interplay as a route to enhanced d-wave pairing in the Hubbard model", "abstract": "Altermagnets - collinear, zero-net-moment magnets with momentum-odd spin splitting protected by crystalline symmetries - offer a tunable route to suppress long-range antiferromagnetism while preserving strong short-range spin fluctuations. We show that this environment robustly stabilizes unconventional superconductivity and naturally produces mixed-symmetry pairing. Through a strong-coupling analysis of a spin-anisotropic Hubbard model, we derive an anisotropic t-J model where exchange interactions cooperatively enhance singlet d-wave pairing and promote triplet p-wave pairing. Our mean-field analysis reveals a pairing evolution driven by altermagnetic anisotropy: for small spin anisotropy, the d-wave channel is enhanced, closely resembling the dominant pairing symmetry in cuprate superconductors, which suggests that weak spin anisotropy may be an essential ingredient in realistic models of these materials. Constrained-path quantum Monte Carlo simulations confirm this picture, showing a regime where dominant d-wave correlations coexist with an emergent p-wave component near optimal doping. As spin anisotropy increases, strong C2 anisotropy and spin splitting activate the triplet channel, leading to a stable d+p mixed-pairing state. This synergistic state exhibits significantly enhanced overall pairing strength, suggesting the possibility of a higher superconducting transition temperature.", "url": "https://arxiv.org/abs/2603.29377", "type": "理论+数值", "summary": "交替磁体（Altermagnets）——共线、零净矩磁体，具有受晶体对称性保护的动量奇数自旋分裂——提供了一种可调节的途径来抑制长程反铁磁性，同时保持强烈的短程自旋波动。我们证明，这种环境可以稳定非常规超导性并自然地产生混合对称配对。通过对自旋各向异性 Hubbard 模型的强耦合分析，我们得出了各向异性 t-J 模型，其中交换相互作用协同增强单重态 d 波配对并促进三重态 p 波配对。我们的平均场分析揭示了由交变磁各向异性驱动的配对演化：对于小的自旋各向异性，d波通道增强，与铜酸盐超导体中的主要配对对称性非常相似，这表明弱自旋各向异性可能是这些材料的现实模型中的重要组成部分。约束路径量子蒙特卡罗模拟证实了这一点，显示了主导 d 波相关性与接近最佳掺杂的新兴 p 波分量共存的状态。\n\n随着自旋各向异性的增加，强 C2 各向异性和自旋分裂激活三线态通道，导致稳定的 d+p 混合配对状态。这种协同状态表现出显着增强的整体配对强度，表明可能存在更高的超导转变温度。", "authors": [{"name": "Ji Liu"}, {"name": "Jianyu Li"}, {"name": "Peng Zhang"}, {"name": "Xiaosen Yang"}, {"name": "Ho-Kin Tang"}], "featured_authors": [{"name": "Ji Liu"}, {"name": "Jianyu Li"}, {"name": "Peng Zhang"}, {"name": "Xiaosen Yang"}, {"name": "Ho-Kin Tang"}], "author_count": 5}, {"id": "2603.29484", "category": "cond-mat", "title": "Thermal Conductivity and Temperature-Induced Band Gap Renormalization in Crystalline and Amorphous Ga$_2$O$_3$", "abstract": "In the present work, we performed calculations of the lattice thermal conductivity (LTC) and electron-phonon interactions in crystalline and amorphous gallium oxide. The calculations were performed by coupling a machine-learned interatomic potential - the moment tensor potential (MTP) model - to first-principles calculations. Crystalline $\\beta$-Ga$_2$O$_3$ exhibits a pronounced zero-point band gap renormalization (BGR) of $\\sim 0.2\\,\\text{eV}$ and a BGR of $\\sim 0.45\\,\\text{eV}$ at $700\\,\\text{K}$. The computed temperature dependence of BGR induced by classical nuclear motion in $\\beta$-Ga$_2$O$_3$ is stronger than that in amorphous Ga$_2$O$_3$. Thermal transport calculations reveal that the LTC of amorphous Ga$_2$O$_3$ remains near $0.9\\,\\text{W}\\cdot\\text{m}^{-1}\\cdot\\text{K}^{-1}$ for temperatures between $300\\,\\text{K}$ and $700\\,\\text{K}$, which is approximately an order of magnitude lower than that of $\\beta$-Ga$_2$O$_3$. Overall, the presented MTP-based framework provides a computationally tractable and reliable route for predicting properties of semiconductors (both crystalline and amorphous) under operating conditions relevant to microelectronics and optoelectronics.", "url": "https://arxiv.org/abs/2603.29484", "type": "理论+数值", "summary": "在目前的工作中，我们计算了晶体和非晶氧化镓中的晶格热导率（LTC）和电子-声子相互作用。这些计算是通过将机器学习的原子间势（矩张量势（MTP）模型）与第一性原理计算相结合来进行的。晶体 $\\beta$-Ga$_2$O$_3$ 在 $700\\,\\text{K}$ 处表现出明显的零点带隙重正化 (BGR) $\\sim 0.2\\,\\text{eV}$ 和 $\\sim 0.45\\,\\text{eV}$。计算得出的 $\\beta$-Ga$_2$O$_3$ 中由经典核运动引起的 BGR 的温度依赖性强于非晶态 Ga$_2$O$_3$ 中的温度依赖性。热传输计算表明，在 $300\\,\\text{K}$ 和 $700\\,\\text{K}$ 之间的温度下，非晶 Ga$_2$O$_3$ 的LTC 保持在 $0.9\\,\\text{W}\\cdot\\text{m}^{-1}\\cdot\\text{K}^{-1}$ 附近，大约比 $\\beta$-Ga$_2$O$_3$ 低一个数量级。总体而言，所提出的基于 MTP 的框架提供了一种计算上易于处理且可靠的途径，用于预测与微电子和光电子相关的操作条件下半导体（晶体和非晶）的特性。", "authors": [{"name": "Rustam Arabov"}, {"name": "Jiaxuan Li"}, {"name": "Xiaotong Chen"}, {"name": "Nikita Rybin"}, {"name": "Alexander Shapeev"}], "featured_authors": [{"name": "Rustam Arabov"}, {"name": "Jiaxuan Li"}, {"name": "Xiaotong Chen"}, {"name": "Nikita Rybin"}, {"name": "Alexander Shapeev"}], "author_count": 5}, {"id": "2603.29529", "category": "cond-mat", "title": "Sampling at intermediate temperatures is optimal for training large language models in protein structure prediction", "abstract": "We investigate the parameter space of transformer models trained on protein sequence data using a statistical mechanics framework, sampling the loss landscape at varying temperatures by Langevin dynamics to characterize the low-loss manifold and understand the mechanisms underlying the superior performance of transformers in protein structure prediction. We find that, at variance with feedforward networks, the lack of a first--order--like transition in the loss of the transformer produces a range of intermediate temperatures with good learning properties. We show that the parameters of most layers are highly conserved at these temperatures if the dimension of the embedding is optimal, and we provide an operative way to find this dimension. Finally, we show that the attention matrix is more predictive of the contact maps of the protein at higher temperatures and for higher dimensions of the embedding than those optimal for learning.", "url": "https://arxiv.org/abs/2603.29529", "type": "理论", "summary": "我们使用统计力学框架研究了在蛋白质序列数据上训练的变压器模型的参数空间，通过朗之万动力学对不同温度下的损耗景观进行采样，以表征低损耗流形并了解变压器在蛋白质结构预测中卓越性能的机制。我们发现，与前馈网络不同，变压器损耗缺乏类似一阶的转变，会产生一系列具有良好学习特性的中间温度。我们表明，如果嵌入的尺寸是最佳的，则大多数层的参数在这些温度下是高度保守的，并且我们提供了一种找到该尺寸的有效方法。最后，我们表明，与最佳学习矩阵相比，注意力矩阵在更高温度和更高维度的嵌入下更能预测蛋白质的接触图。", "authors": [{"name": "L. Ghiringhelli"}, {"name": "A. Zambon"}, {"name": "G. Tiana"}], "featured_authors": [{"name": "L. Ghiringhelli"}, {"name": "A. Zambon"}, {"name": "G. Tiana"}], "author_count": 3}, {"id": "2603.29547", "category": "cond-mat", "title": "On the flash temperature in sliding contacts", "abstract": "The temperature increase in the contact regions between solids in sliding contact can easily reach several hundred Kelvin and thereby dramatically affect friction and wear. The classical theories by Jaeger, Archard, and Greenwood, commonly used to estimate flash temperature, ignore the multiscale nature of real surfaces and instead approximate the frictional heat sources with circular or square shapes. Here, we present an analytical theory for the flash temperature valid for randomly rough surfaces with roughness across arbitrarily many decades in length scale. The theory extends established methods for stress correlation functions and peak stresses to temperature. Numerical results for rubber sliding on concrete, and granite on granite, are presented as illustrations. We show that classical theories for flash temperature fail severely for surfaces with multiscale roughness.", "url": "https://arxiv.org/abs/2603.29547", "type": "理论+数值", "summary": "滑动接触的固体之间的接触区域的温度升高很容易达到数百开尔文，从而显着影响摩擦和磨损。 Jaeger、Archard 和 Greenwood 的经典理论通常用于估计闪蒸温度，忽略了真实表面的多尺度性质，而是用圆形或方形形状来近似摩擦热源。在这里，我们提出了一种闪点温度的分析理论，该理论适用于任意数十年长度范围内的随机粗糙表面。该理论将应力相关函数和峰值应力的现有方法扩展到温度。橡胶在混凝土上滑动以及花岗岩在花岗岩上滑动的数值结果以插图形式呈现。我们表明，对于具有多尺度粗糙度的表面，闪点温度的经典理论严重失效。", "authors": [{"name": "M. H. Müser"}, {"name": "B. N. J. Persson"}], "featured_authors": [{"name": "M. H. Müser"}, {"name": "B. N. J. Persson"}], "author_count": 2}, {"id": "2603.29551", "category": "cond-mat", "title": "Ground State Properties of the Doped Kitaev-Heisenberg Chain: Topological Superconducting and Mott Insulating Phases Driven by Magnetic Frustration", "abstract": "We study the hole-doped Kitaev-Heisenberg chain using the density-matrix renormalization group. In the Kitaev-only limit, the bond-directional exchange itself promotes pairing, favoring spin-singlet and spin-triplet superconducting tendencies for antiferromagnetic and ferromagnetic Kitaev couplings, respectively, together with finite-size Majorana edge correlations suggestive of topological superconductivity. In the full Kitaev-Heisenberg chain, cooperative $J$ and $K$ exchanges broadly stabilize superconductivity, while competition between $J$ and $K$ induces a strong filling dependence and enables superconductivity even when both $J$ and $K$ are weak. At quarter filling, this competition produces a Mott insulator with spontaneous hopping dimerization. These results identify magnetic frustration as a common mechanism underlying superconducting and interaction-driven insulating phases in doped Kitaev systems.", "url": "https://arxiv.org/abs/2603.29551", "type": "理论", "summary": "我们使用密度矩阵重正化群研究空穴掺杂的 Kitaev-Heisenberg 链。在仅基塔耶夫极限中，键方向交换本身促进配对，分别有利于反铁磁和铁磁基塔耶夫耦合的自旋单重态和自旋三重态超导趋势，以及暗示拓扑超导性的有限尺寸马约拉纳边缘相关性。在完整的基塔耶夫-海森堡链中，合作的$J$和$K$交换广泛地稳定了超导性，而$J$和$K$之间的竞争会引起强烈的填充依赖性，即使在$J$和$K$都很弱的情况下也能实现超导。在四分之一填充时，该竞争产生具有自发跳跃二聚化的莫特绝缘体。这些结果表明，磁挫败是掺杂基塔耶夫系统中超导和相互作用驱动绝缘相的常见机制。", "authors": [{"name": "Cliò Efthimia Agrapidis"}, {"name": "Satoshi Nishimoto"}], "featured_authors": [{"name": "Cliò Efthimia Agrapidis"}, {"name": "Satoshi Nishimoto"}], "author_count": 2}, {"id": "2603.29583", "category": "cond-mat", "title": "Double-weak-link interferometer of hard-core bosons in one dimension", "abstract": "We study the dynamics of a lattice hard-core boson gas released from a domain wall initial state in the presence of two weak links (defects). When the two defects are separated by a finite distance, the resulting density profile exhibits clear deviations from the standard Euler-scale hydrodynamic description of the gas, due to genuine quantum interference effects between the two defects. By analyzing the exact fermionic propagators, we show that repeated reflections at the defects give rise to interference fringes and coherent patterns that are beyond the reach of the (generalized) hydrodynamic description. We derive a closed analytic expression for the density profile during the expansion, explicitly highlighting the role played by these interference processes.", "url": "https://arxiv.org/abs/2603.29583", "type": "理论", "summary": "我们研究了在存在两个弱连接（缺陷）的情况下从畴壁初始状态释放的晶格硬核玻色子气体的动力学。当两个缺陷相距有限距离时，由于两个缺陷之间真正的量子干涉效应，所得到的密度分布与气体的标准欧拉尺度流体动力学描述存在明显偏差。通过分析精确的费米子传播器，我们表明缺陷处的重复反射会产生干涉条纹和相干图案，这超出了（广义）流体动力学描述的范围。我们推导出膨胀过程中密​​度分布的封闭分析表达式，明确强调了这些干扰过程所发挥的作用。", "authors": [{"name": "A. Takacs"}, {"name": "J. Dubail"}, {"name": "P. Calabrese"}], "featured_authors": [{"name": "A. Takacs"}, {"name": "J. Dubail"}, {"name": "P. Calabrese"}], "author_count": 3}, {"id": "2603.29603", "category": "cond-mat", "title": "Superfluid response of bosonic fluids in composite optical potentials: angular dependence and Leggett's bounds", "abstract": "We study the superfluid response of a dilute bosonic fluid in the presence of two-dimensional composite potentials (such as triangular, Kagomé and quasiperiodic potentials, or superlattices), which may be obtained for example by superposing multiple laser beams. We first find a sufficient condition for the external potential to yield a fully isotropic superfluid response. Then, we derive analytical expressions for Leggett's upper and lower bounds to the superfluid fraction (valid in the perturbative regime) that allow us to find the optimal direction along which each bound should be measured. Finally, we solve the problem numerically, and we confirm our analytical findings.", "url": "https://arxiv.org/abs/2603.29603", "type": "理论+数值", "summary": "我们研究了稀玻色流体在二维复合势（例如三角形、Kagomé 和准周期势或超晶格）存在下的超流体响应，例如可以通过叠加多个激光束来获得。我们首先找到外部势产生完全各向同性超流体响应的充分条件。然后，我们推导了 Leggett 的超流体分数上限和下限的解析表达式（在微扰状态下有效），这使我们能够找到测量每个边界的最佳方向。最后，我们用数值方法解决了这个问题，并证实了我们的分析结果。", "authors": [{"name": "Daniel Pérez-Cruz"}, {"name": "Grigori E. Astrakharchik"}, {"name": "Pietro Massignan"}], "featured_authors": [{"name": "Daniel Pérez-Cruz"}, {"name": "Grigori E. Astrakharchik"}, {"name": "Pietro Massignan"}], "author_count": 3}, {"id": "2603.29611", "category": "cond-mat", "title": "The different localisation properties of the eigenmodes of the Laplacian and adjacency matrix of 2D random geometric graphs", "abstract": "We compare the spectrum and the localisation properties of the eigenmodes of the Laplacian and the adjacency matrix of 2D random geometric graphs, using numerical diagonalization of these matrices for different system sizes and connectivities. For sufficiently large ensembles of systems, we evaluate the spectrum, the probability distribution of the participation ratio and the relation between participation ratios and eigenvalues. While all eigenmodes of the adjacency matrix are localised for sufficiently large system sizes, the Laplacian matrix always leads to a small proportion of system-spanning modes due to a conservation law, and therefore to power-law tails in the probability distribution of the participation ratio and its relation to the eigenvalues. By disentangling the effects of finite system size, of mean degree, of component size distribution, and of network motifs, we provide a thorough understanding of the data.", "url": "https://arxiv.org/abs/2603.29611", "type": "理论+数值", "summary": "我们比较了拉普拉斯本征模和二维随机几何图的邻接矩阵的频谱和局域特性，针对不同的系统尺寸和连接性使用这些矩阵的数值对角化。对于足够大的系统集合，我们评估谱、参与率的概率分布以及参与率和特征值之间的关系。虽然邻接矩阵的所有本征模态都针对足够大的系统规模进行了局域化，但由于守恒定律，拉普拉斯矩阵总是导致系统跨越模态的一小部分，因此导致参与比的概率分布及其与特征值的关系中的幂律尾部。通过解开有限系统大小、平均度、组件大小分布和网络图案的影响，我们提供了对数据的透彻理解。", "authors": [{"name": "Luca Schaefer"}, {"name": "Barbara Drossel"}], "featured_authors": [{"name": "Luca Schaefer"}, {"name": "Barbara Drossel"}], "author_count": 2}, {"id": "2603.29614", "category": "cond-mat", "title": "Thermalization in high-dimensional systems: the (weak) role of chaos", "abstract": "In their seminal work, Fermi, Pasta, Ulam and Tsingou explored the connection between statistical mechanics and dynamical properties, such as chaos and ergodicity. Even today, seventy years later, the topic is not fully understood: while most results of statistical mechanics require the ergodic hypothesis to be rigorously proved, there are many indications that these predictions, both in and out of equilibrium, hold even in the absence of a rigorous form of ergodicity. Motivated by the above considerations, in this work we reconsider the point of view that the relevant ingredients for the validity of statistical mechanics are the large number of degrees of freedom and the choice of extensive observables, while the details of the dynamics do not play an essential role. This is the idea behind Khinchin's famous proof of the typicality of macroscopic observables at equilibrium. We extend this perspective to the context of non equilibrium, by investigating the thermalization properties of both harmonic (integrable) and nonharmonic (chaotic) oscillator chains initially prepared in out-of-equilibrium conditions. In integrable systems, thermalization occurs, or not, depending on the observable. In the chaotic regime, instead, thermalization is reached by any observable, although the relaxation timescale might be larger than the observation time.", "url": "https://arxiv.org/abs/2603.29614", "type": "理论", "summary": "在他们的开创性工作中，费米、帕斯塔、乌拉姆和钦古探索了统计力学和动力学特性（例如混沌和遍历性）之间的联系。即使在七十年后的今天，这个主题仍未被完全理解：虽然统计力学的大多数结果都需要严格证明遍历假设，但有许多迹象表明，即使在没有严格形式的遍历性的情况下，这些预测，无论处于平衡状态还是非平衡状态，都成立。出于上述考虑，在这项工作中，我们重新考虑了这样的观点：统计力学有效性的相关因素是大量的自由度和广泛的可观测量的选择，而动力学的细节并不发挥重要作用。这就是辛钦关于平衡时宏观可观测量的典型性的著名证明背后的想法。我们通过研究最初在非平衡条件下准备的谐波（可积）和非谐波（混沌）振荡器链的热化特性，将这一观点扩展到非平衡的背景。\n\n在可积系统中，是否发生热化取决于可观察到的情况。相反，在混沌状态下，任何可观察的现象都会达到热化，尽管弛豫时间尺度可能大于观察时间。", "authors": [{"name": "Marco Baldovin"}, {"name": "Marco Cattaneo"}, {"name": "Dario Lucente"}, {"name": "Paolo Muratore-Ginanneschi"}, {"name": "Angelo Vulpiani"}], "featured_authors": [{"name": "Marco Baldovin"}, {"name": "Marco Cattaneo"}, {"name": "Dario Lucente"}, {"name": "Paolo Muratore-Ginanneschi"}, {"name": "Angelo Vulpiani"}], "author_count": 5}, {"id": "2603.29637", "category": "cond-mat", "title": "The continuum limit of the Poland-Scheraga DNA denaturation model", "abstract": "Using a field theory equivalent to a lattice version of the Poland-Scheraga (PS) model, the phase diagram for a long DNA molecule is derived in closed form. A one-loop renormalization group calculation for the generalized PS model with excluded volume interactions shows that there are two stable fixed points. At both fixed points, the excluded volume effect plays a role. At the fixed point reached when the original excluded volume effect is weak, the phase transition is continuous. At the other fixed point, the phase transition is first order.", "url": "https://arxiv.org/abs/2603.29637", "type": "理论+数值", "summary": "使用相当于波兰-谢拉加 (PS) 模型的晶格版本的场论，以闭合形式导出长 DNA 分子的相图。排除体积相互作用的广义 PS 模型的单循环重正化群计算表明存在两个稳定不动点。在两个固定点，排除的体积效应都起作用。在原始排除体积效应较弱时达到的固定点，相变是连续的。在另一个固定点，相变是一阶的。", "authors": [{"name": "Richard Dengler"}], "featured_authors": [{"name": "Richard Dengler"}], "author_count": 1}, {"id": "2603.29648", "category": "cond-mat", "title": "Enhanced synchronization with proportional coupling in Kuramoto oscillator networks", "abstract": "We introduce a novel coupling scheme for maximizing the synchronization of Kuramoto oscillator networks under a fixed coupling budget. We show that by scaling the interaction strength between oscillators according to their frequency detuning, synchronization is enhanced. The coupling scheme induces a change in criticality, driving the system from a continuous phase transition to an explosive transition by changing a single parameter. Our work offers a general route to efficient synchronization in engineered networks and provides insight into the critical behavior of the Kuramoto model.", "url": "https://arxiv.org/abs/2603.29648", "type": "理论", "summary": "我们引入了一种新颖的耦合方案，用于在固定耦合预算下最大化 Kuramoto 振荡器网络的同步。我们表明，通过根据频率失谐缩放振荡器之间的相互作用强度，可以增强同步。耦合方案引起临界性的变化，通过改变单个参数来驱动系统从连续相变到爆炸性转变。我们的工作为工程网络中的高效同步提供了一条通用途径，并提供了对 Kuramoto 模型关键行为的洞察。", "authors": [{"name": "Amit Pando"}, {"name": "Eran Bernstein"}, {"name": "Tomer Hacohen"}, {"name": "Nathan Vigne"}, {"name": "Hui Cao"}, {"name": "Oren Raz"}, {"name": "Asher Friesem"}, {"name": "Nir Davidson"}], "featured_authors": [{"name": "Amit Pando"}, {"name": "Eran Bernstein"}, {"name": "Tomer Hacohen"}, {"name": "Oren Raz"}, {"name": "Asher Friesem"}, {"name": "Nir Davidson"}], "author_count": 8}, {"id": "2603.29653", "category": "cond-mat", "title": "Nonlinear response theory for orbital photocurrent in semiconductors", "abstract": "Recent theoretical studies on the nonlinear response of spin and orbital degrees of freedom have discovered spin and orbital analogs of the photocurrent, with potential for characterizing topological materials and for applications. In this paper, we develop a general theory for calculating spin and orbital currents in semiconductors and study the properties of optical responses in the Bernevig-Hughes-Zhang and Luttinger models, where nonlinear orbital responses and a topological phase transition occur. We study the evolution of optical responses at the topological phase transition and how they manifest. In addition, we find that the relaxation time dependence of the orbital conductivity is somewhat distinct from that of the photocurrent. The theory is straightforwardly applicable to complex models of real materials, allowing quantitative predictions of the nonlinear responses of orbital and spin.", "url": "https://arxiv.org/abs/2603.29653", "type": "理论", "summary": "最近关于自旋和轨道自由度的非线性响应的理论研究发现了光电流的自旋和轨道类似物，具有表征拓扑材料和应用的潜力。在本文中，我们发展了计算半导体中自旋和轨道电流的一般理论，并研究了 Bernevig-Hughes-Zhang 和 Luttinger 模型中的光学响应特性，其中发生非线性轨道响应和拓扑相变。我们研究拓扑相变时光学响应的​​演化及其表现方式。此外，我们发现轨道电导率的弛豫时间依赖性与光电流的弛豫时间依赖性有些不同。该理论直接适用于真实材料的复杂模型，可以定量预测轨道和自旋的非线性响应。", "authors": [{"name": "Kakeru Tanaka"}, {"name": "Hiroaki Ishizuka"}], "featured_authors": [{"name": "Kakeru Tanaka"}, {"name": "Hiroaki Ishizuka"}], "author_count": 2}, {"id": "2603.29779", "category": "cond-mat", "title": "Emergence of Non-Hermitian Magic Angles and Topological Phase Transitions in Twisted Bilayer $α$-$T_3$ Lattices", "abstract": "We investigate the flat-band properties and topological phase transitions in a non-Hermitian twisted bilayer $\\alpha-T_3$ lattice. Here, non-Hermiticity is introduced via Hatano-Nelson-type asymmetric hopping, while an aligned hexagonal boron nitride substrate provides a staggered sublattice mass to the system. We find that the introduction of non-reciprocal hopping splits the conventional single magic angle into three distinct non-Hermitian magic angles (NHMAs). Unlike the exceptional magic angles driven by spectral singularities, these NHMAs host perfectly isolated flat bands where the real and imaginary parts of the bandwidth simultaneously vanish. By mapping the complex eigenspectrum across the moiré Brillouin zone, we show that the scattered energy eigenvalues coalesce into well-defined, closed loop-like structures as the non-Hermitian parameter strength increases, indicating emergence of a nontrivial point-gap topology and hence the non-Hermitian skin effect. Furthermore, we characterize the topological phases by computing the direct band gap and the biorthogonal Chern number. While the system exhibits a transition to a higher topological phase at weak non-Hermiticity, we demonstrate that stronger non-Hermiticity drives the gap-closing boundaries to merge and their topological charges to mutually annihilate. This convergence results in a trivial gap closing and a complete suppression of the intermediate topological phase, confirming that non-Hermiticity fundamentally plays a crucial role with regard to destabilizing the robust topological features of this moiré system.", "url": "https://arxiv.org/abs/2603.29779", "type": "理论", "summary": "我们研究了非厄米扭曲双层 $\\alpha-T_3$ 晶格的平带特性和拓扑相变。在这里，通过 Hatano-Nelson 型不对称跳跃引入非厄米性，同时对齐的六方氮化硼衬底为系统提供交错的亚晶格质量。我们发现非互易跳频的引入将传统的单一魔角分成了三个不同的非厄米魔角（NHMA）。与光谱奇点驱动的特殊魔角不同，这些 NHMA 拥有完全隔离的平坦频带，其中带宽的实部和虚部同时消失。通过绘制莫尔布里渊区的复杂特征谱，我们发现，随着非厄米参数强度的增加，散射能量特征值合并成明确的闭环结构，这表明出现了非平凡的点隙拓扑，从而出现了非厄米趋肤效应。此外，我们通过计算直接带隙和双正交陈数来表征拓扑相。\n\n虽然系统在弱非厄米性下表现出向更高拓扑相的过渡，但我们证明更强的非厄米性会驱动间隙闭合边界合并及其拓扑电荷相互湮灭。这种收敛导致微不足道的间隙闭合和中间拓扑相的完全抑制，证实非厄米性从根本上在破坏该莫尔系统的稳健拓扑特征方面发挥着至关重要的作用。", "authors": [{"name": "Shaina Gandhi"}, {"name": "Gourab Paul"}, {"name": "Srijata Lahiri"}, {"name": "Saurabh Basu"}], "featured_authors": [{"name": "Shaina Gandhi"}, {"name": "Gourab Paul"}, {"name": "Srijata Lahiri"}, {"name": "Saurabh Basu"}], "author_count": 4}, {"id": "2603.29821", "category": "cond-mat", "title": "Inverse Design of Strongly Localized Topological $π$ Modes in One-Dimensional Nonperiodic Systems", "abstract": "This study investigates the spatial confinement of topological $\\pi$-modes in one-dimensional chiral-symmetric systems. In conventional periodic and quasiperiodic structures, edge-mode wave functions inevitably penetrate the bulk. To suppress this, inverse design of a potential sequence is performed using a generative model under a global topological constraint. The generated sequence reveals a characteristic structure consisting of a topological boundary layer and a macroscopic S-dense domain, leading to enhanced confinement ($\\xi=0.85$) while preserving topology. Based on the physical principle extracted from this result, a minimal heterostructure composed of only two S-blocks is manually constructed, which further reduces the localization length to $\\xi=0.75$. These results provide a compact design principle for strongly localized topological states.", "url": "https://arxiv.org/abs/2603.29821", "type": "理论", "summary": "本研究研究一维手性对称系统中拓扑 $\\pi$ 模式的空间限制。在传统的周期和准周期结构中，边模波函数不可避免地穿透主体。为了抑制这种情况，在全局拓扑约束下使用生成模型对潜在序列进行逆向设计。生成的序列揭示了由拓扑边界层和宏观 S 密集域组成的特征结构，从而在保留拓扑的同时增强了限制 ($\\xi=0.85$)。基于从该结果中提取的物理原理，手动构建了仅由两个S块组成的最小异质结构，这进一步将定位长度减少到$\\xi=0.75$。这些结果为强局部拓扑状态提供了紧凑的设计原理。", "authors": [{"name": "Fumitatsu Iwase"}], "featured_authors": [{"name": "Fumitatsu Iwase"}], "author_count": 1}, {"id": "2603.29850", "category": "cond-mat", "title": "Operational Criterion for Imaginary-Time Reconstruction in Time-Resolved Electronic Circular Dichroism", "abstract": "Time-resolved electronic circular dichroism is commonly simulated by real-time propagation with a weak circular probe. Within linear response, such a probe measures the retarded mixed electric--magnetic susceptibility of the pump-prepared ensemble at delay $\\tau$, while finite probe envelopes enter through a known transfer function. Here we establish when this retarded kernel can be reconstructed from an imaginary-time correlator. We show that this replacement is justified only when the pump-prepared state is sufficiently stationary and approximately Kubo--Martin--Schwinger compliant with respect to an effective reference Hamiltonian. To assess this regime, we introduce a delay-resolved scalar mismatch between the greater and lesser mixed spectra and combine it with Kramers--Kronig and commutator sum-rule checks. Benchmarks on an exactly solvable driven model identify the delay windows in which Matsubara continuation is accurate and those in which a genuinely nonequilibrium treatment is required.", "url": "https://arxiv.org/abs/2603.29850", "type": "理论+数值", "summary": "时间分辨电子圆二色性通常通过弱圆形探针的实时传播来模拟。在线性响应内，这样的探头测量泵准备的系综在延迟$\\tau$处的延迟混合电磁磁化率，而有限探头包络通过已知的传递函数进入。在这里，我们确定何时可以从虚时间相关器重建这个延迟内核。我们证明，只有当泵准备状态足够稳定并且近似 Kubo-Martin-Schwinger 符合有效参考哈密顿量时，这种替换才是合理的。为了评估这种状态，我们在较大和较小混合光谱之间引入了延迟解决的标量失配，并将其与 Kramers-Kronig 和换向器和规则检查相结合。精确可解驱动模型的基准确定了松原连续准确的延迟窗口以及需要真正非平衡处理的延迟窗口。", "authors": [{"name": "Christian Tantardini"}], "featured_authors": [{"name": "Christian Tantardini"}], "author_count": 1}, {"id": "2603.29951", "category": "cond-mat", "title": "Negative Electronic Friction and Non-Markovianity in Nonequilibrium Systems", "abstract": "We address the connection between negative electronic friction and non-Markovian effects in the nonadiabatic vibrational dynamics of molecules interacting with metal surfaces under nonequilibrium conditions. We show that a generic nonequilibrium mechanism leading to negative Markovian electronic friction, where molecular vibrations couple directly to inelastic electronic transitions, also introduces significant non-Markovian contributions to the electronic friction. To demonstrate these ideas, we investigate nonequilibrium charge transport through a molecular nanojunction containing a vibrationally coupled donor-acceptor model, where negative electronic friction reflects driving of the vibrational mode beyond standard Joule heating. By comparison to numerically exact, fully quantum hierarchical equations of motion simulations, we verify that these non-Markovian effects have a significant impact on the nonequilibrium dynamics and even on the stability of the resulting Langevin equation.", "url": "https://arxiv.org/abs/2603.29951", "type": "理论+数值", "summary": "我们研究了非平衡条件下分子与金属表面相互作用的非绝热振动动力学中的负电子摩擦与非马尔可夫效应之间的联系。我们证明了导致负马尔可夫电子摩擦的通用非平衡机制，其中分子振动直接耦合到非弹性电子跃迁，也对电子摩擦引入了显着的非马尔可夫贡献。为了证明这些想法，我们研究了通过包含振动耦合供体-受体模型的分子纳米结的非平衡电荷传输，其中负电子摩擦反映了超出标准焦耳热的振动模式的驱动。通过与运动模拟的数值精确、完全量子分层方程进行比较，我们验证了这些非马尔可夫效应对非平衡动力学，甚至对所得朗之万方程的稳定性有显着影响。", "authors": [{"name": "Riley J. Preston"}, {"name": "Samuel L. Rudge"}, {"name": "Daniel S. Kosov"}, {"name": "Michael Thoss"}], "featured_authors": [{"name": "Riley J. Preston"}, {"name": "Samuel L. Rudge"}, {"name": "Daniel S. Kosov"}, {"name": "Michael Thoss"}], "author_count": 4}, {"id": "2603.29984", "category": "cond-mat", "title": "Pattern Expansion of Spin Glasses", "abstract": "We introduce a systematic method for expanding general spin-glass Hamiltonians in terms of Mattis interactions, providing a novel perspective for understanding the fundamental differences between short-range Edwards-Anderson (EA) and mean-field Sherrington-Kirkpatrick (SK) spin glasses. By iteratively extracting patterns from the coupling matrix, we expand the original spin-glass system into a Hopfield-like model (a series of Mattis interactions) plus a residual system. Our analysis reveals profound distinctions between EA and SK models: while EA models in two and three dimensions break into isolated subconnected sections after expansion, the SK model exhibits remarkable self-similar behavior, with the residual system preserving the mean-field structure and Gaussian statistics throughout the expansion process. This self-similarity manifests in exponential decay of residual matrix norms and expansion coefficients, reflecting the inherent mean-field nature of the SK model. Furthermore, we demonstrate that pattern expansion can identify ultra-low energy excitations in EA models, revealing excitations with energies that decrease rapidly with expansion step. Through connected component analysis, we quantify the size-energy relationship of these independent excitation clusters, opening new avenues for understanding the low-energy landscape of spin glasses and providing insights into the nature of metastable states.", "url": "https://arxiv.org/abs/2603.29984", "type": "理论", "summary": "我们引入了一种根据马蒂斯相互作用扩展一般自旋玻璃哈密顿量的系统方法，为理解短程爱德华兹-安德森（EA）和平均场谢林顿-柯克帕特里克（SK）自旋玻璃之间的根本差异提供了新的视角。通过迭代地从耦合矩阵中提取模式，我们将原始的自旋玻璃系统扩展为类似 Hopfield 的模型（一系列 Mattis 相互作用）加上残差系统。我们的分析揭示了 EA 和 SK 模型之间的深刻区别：二维和三维 EA 模型在扩展后分解为孤立的子连通部分，而 SK 模型表现出显着的自相似行为，残差系统在整个扩展过程中保留了平均场结构和高斯统计。这种自相似性表现为残差矩阵范数和展开系数的指数衰减，反映了 SK 模型固有的平均场性质。此外，我们证明模式扩展可以识别 EA 模型中的超低能量激发，揭示能量随着扩展步骤迅速降低的激发。\n\n通过连通分量分析，我们量化了这些独立激发簇的尺寸-能量关系，为理解自旋玻璃的低能景观开辟了新途径，并提供了对亚稳态本质的见解。", "authors": [{"name": "Mutian Shen"}, {"name": "Zohar Nussinov"}, {"name": "Yang-Yu Liu"}], "featured_authors": [{"name": "Mutian Shen"}, {"name": "Zohar Nussinov"}, {"name": "Yang-Yu Liu"}], "author_count": 3}, {"id": "2603.28853", "category": "hep-th", "title": "Maximally heavy dynamics in the causal diamond", "abstract": "Correlation functions of CFT operators with infinite scaling dimension are rich, multifaceted objects that describe physics ranging across classical holography, black hole dynamics, and flat-space scattering amplitudes. In this work, we provide a rigorous framework for characterizing the space of four-point functions of identical operators with infinite dimension in terms of well-defined ``maximally heavy observables,'' which are akin to intrinsic quantities describing statistical systems in the thermodynamic limit. These observables are highly constrained by crossing symmetry and unitarity, and give novel insights into the locality of bulk states through the emergence of dynamical phase transitions. In certain cases, these results connect directly to the more familiar picture of torus partition functions at large central charge. We apply our framework to a number of illustrative examples including generalized free fields, chiral product correlators, and maximal giant gravitons in planar $\\mathcal{N}=4$ SYM.", "url": "https://arxiv.org/abs/2603.28853", "type": "理论", "summary": "具有无限尺度维度的 CFT 算子的相关函数是丰富的、多方面的对象，描述了跨越经典全息术、黑洞动力学和平坦空间散射振幅的物理现象。在这项工作中，我们提供了一个严格的框架，用于根据明确定义的“最大重可观测量”来描述具有无限维的相同算子的四点函数的空间，这类似于描述热力学极限下统计系统的内在量。这些可观测量受到交叉对称性和酉性的高度约束，并通过动态相变的出现为体态的局域性提供了新的见解。在某些情况下，这些结果直接与更熟悉的大中心电荷环面配分函数图相关。我们将我们的框架应用于许多说明性示例，包括广义自由场、手征积相关器和平面 $\\mathcal{N}=4$ SYM 中的最大巨引力子。", "authors": [{"name": "David Poland"}, {"name": "Gordon Rogelberg"}], "featured_authors": [{"name": "David Poland"}, {"name": "Gordon Rogelberg"}], "author_count": 2}, {"id": "2603.28880", "category": "hep-th", "title": "Holographic two-point functions of heavy operators revisited", "abstract": "In this paper we investigate the holographic computation of the two-point functions of $\\frac{1}{2}$-BPS chiral primary operators with scaling dimensions $\\Delta \\sim N$ or $\\Delta \\sim N^2$ in $\\mathcal{N}=4$ $SU(N)$ SYM using Type IIB supergravity. First we consider giant graviton operators, resolving ambiguities in the previous literature on holographic computation of the two-point function, and make a new proposal for this calculation. We argue that the D3-brane action for the giant gravitons (as well as for their $\\frac{1}{4}$- and $\\frac{1}{8}$-BPS counterparts) should contain additional boundary terms which arise naturally from the path integral and which are required to make the variational problem well-defined. We derive the form of these terms and show that the corrected action has an on-shell value that reproduces the two-point function of the gauge theory operators. Then we consider operators with $\\Delta \\sim N^2$ and calculate the two-point function by evaluating the Gibbons-Hawking-York boundary term in the Type IIB pseudo-action in the Lin-Lunin-Maldacena bubbling geometry background.", "url": "https://arxiv.org/abs/2603.28880", "type": "理论", "summary": "在本文中，我们研究了使用IIB型超引力在$\\mathcal{N}=4$ $SU(N)$ SYM中具有缩放维度$\\Delta \\sim N$或$\\Delta \\sim N^2$的$\\frac{1}{2}$-BPS手性初级算子的两点函数的全息计算。首先，我们考虑巨引力子算子，解决了先前文献中关于两点函数全息计算的歧义，并为此计算提出了新的建议。我们认为，巨引力子（以及它们的 $\\frac{1}{4}$- 和 $\\frac{1}{8}$-BPS 对应物）的 D3 膜作用应该包含额外的边界项，这些边界项自然地从路径积分中产生，并且是明确定义变分问题所必需的。我们推导了这些项的形式，并表明修正后的作用具有一个壳上值，该值再现了规范理论算子的两点函数。然后我们考虑 $\\Delta \\sim N^2$ 算子，并通过评估 Lin-Lunin-Maldacena 冒泡几何背景中 IIB 型伪作用中的 Gibbons-Hawking-York 边界项来计算两点函数。", "authors": [{"name": "Prokopii Anempodistov"}], "featured_authors": [{"name": "Prokopii Anempodistov"}], "author_count": 1}, {"id": "2603.28908", "category": "hep-th", "title": "Kaluza-Klein trombone mass matrices and universal class $\\mathcal{R}$ operator spectra", "abstract": "We determine universal sectors of the light operator spectrum that are present in all A$_{N-1}$ superconformal field theories $T_N[\\Sigma_3]$ of class $\\mathcal{R}$, with $\\Sigma_3$ a compact hyperbolic three-manifold. We do this at large $N$ by holographically mapping the problem to a Kaluza-Klein spectral analysis over previously known dual anti-de Sitter backgrounds related to wrapped M5-brane configurations. Associated to these, $D=4$ $\\mathcal{N}=8$ supergravities have been recently constructed that allow for the application of spectral techniques based on exceptional generalised geometry/field theory. We derive the Kaluza-Klein mass matrices that arise when the seed lower-dimensional maximal supergravity involves gaugings of the trombone scaling symmetry, as pertains to the case at hand, and diagonalise them to find the universal Kaluza-Klein states. In general, these universal spectra are only defined locally, and we give a prescription to isolate globally-defined sectors therein.", "url": "https://arxiv.org/abs/2603.28908", "type": "理论", "summary": "我们确定$\\mathcal{R}$类的所有A$_{N-1}$超共形场论$T_N[\\Sigma_3]$中存在的光算子光谱的通用扇区，其中$\\Sigma_3$是紧凑双曲三流形。我们通过将问题全息映射到与包裹的 M5 膜配置相关的先前已知的双反德西特背景上的 Kaluza-Klein 光谱分析来大规模地实现这一点。与这些相关的是，最近构建了 $D=4$ $\\mathcal{N}=8$ 超重力，允许应用基于特殊广义几何/场论的光谱技术。我们推导了当种子低维最大超重力涉及测量长号尺度对称性时出现的卡鲁扎-克莱因质量矩阵（与当前的情况有关），并对它们进行对角化以找到通用的卡鲁扎-克莱因态。一般来说，这些通用谱只是局部定义的，我们给出了一个方案来隔离其中全局定义的扇区。", "authors": [{"name": "Martin Pico"}, {"name": "Oscar Varela"}], "featured_authors": [{"name": "Martin Pico"}, {"name": "Oscar Varela"}], "author_count": 2}, {"id": "2603.28966", "category": "hep-th", "title": "Anomaly-mediated Scalar Gravitational Interactions and the Coupling of Conformal Sectors", "abstract": "We investigate the anomaly-induced activation of a gauge-invariant scalar degree of freedom in General Relativity, the conformalon mode, directly at the level of \\(2\\to2\\) scattering amplitudes. The analysis couples anomalous three-point functions of conformal sectors, involving gravitons \\((TTT)\\) and Abelian gauge currents \\((TJJ)\\), through single-graviton exchange derived from the quadratic expansion of the Einstein--Hilbert action. Unlike related treatments based on the nonlocal anomaly action, these interactions are suppressed by the Planck scale. We show that the conformalon, invariant under linearized diffeomorphisms, admits an interpretation as an effective scalar correction to scattering amplitudes, both in virtual exchange channels and in effective real-emission processes. Around flat space, this behaviour arises from anomaly-induced nonlocal massless insertions on the external graviton and photon legs of the three-point functions, sewn through the scalar component of the graviton propagator in de Donder gauge. The resulting anomaly-mediated \\(4\\)-point interaction reduces to contact terms, with the Planck mass setting the suppression scale. The construction consistently matches the spin decomposition of flat-space conformal Ward identities in momentum space, which determine the vertices, with the corresponding spin decomposition of the graviton propagator. In the eikonal limit, these interactions generate contact corrections to the leading logarithmic phase in impact-parameter space. We further show that anomaly-mediated \\(2\\to2\\) graviton amplitudes associated with the virtual exchange of such modes exhibit a characteristic double-copy structure.", "url": "https://arxiv.org/abs/2603.28966", "type": "理论", "summary": "我们直接在 \\(2\\to2\\) 散射幅度水平上研究广义相对论中规范不变标量自由度（共形模式）的异常引起的激活。该分析通过爱因斯坦-希尔伯特作用的二次展开式导出的单引力子交换，耦合了共形扇区的反常三点函数，包括引力子 \\((TTT)\\) 和阿贝尔规范电流 \\((TJJ)\\)。与基于非局部异常作用的相关处理不同，这些相互作用被普朗克尺度抑制。我们证明，在线性微分同胚下不变的保形子可以解释为对虚拟交换通道和有效实际发射过程中散射幅度的有效标量校正。在平坦空间周围，这种行为是由异常引起的三点函数的外部引力子和光子腿上的非局部无质量插入引起的，通过德唐德规范中的引力子传播器的标量分量缝合。由此产生的异常介导的 \\(4\\) 点相互作用简化为接触项，并由普朗克质量设置抑制尺度。\n\n该构造始终将动量空间中确定顶点的平坦空间共形沃德恒等式的自旋分解与引力子传播器的相应自旋分解相匹配。在 eikonal 极限中，这些相互作用会对冲击参数空间中的主导对数相位产生接触修正。我们进一步表明，与这种模式的虚拟交换相关的异常介导的\\(2\\to2\\)引力子振幅表现出特征性的双拷贝结构。", "authors": [{"name": "Claudio Corianò"}, {"name": "Stefano Lionetti"}, {"name": "Dario Melle"}, {"name": "Leonardo Torcellini"}], "featured_authors": [{"name": "Claudio Corianò"}, {"name": "Stefano Lionetti"}, {"name": "Dario Melle"}, {"name": "Leonardo Torcellini"}], "author_count": 4}, {"id": "2603.29151", "category": "hep-th", "title": "What U Can Do: New Solutions and New Challenges Beyond Leading Order", "abstract": "String theories naturally exhibit dualities that lead to hidden symmetries in the low-energy effective description, which have been used to great effect to generate supergravity solutions. We review recent progress in using hidden symmetries arising from T-duality to generate higher-derivative-corrected solutions, as well as the problems that arise from non-perturbative effects when extending this paradigm to hidden symmetries arising from U-duality.", "url": "https://arxiv.org/abs/2603.29151", "type": "理论", "summary": "弦理论自然地表现出对偶性，导致低能有效描述中隐藏的对称性，这些对称性已被用来产生超重力解。我们回顾了使用 T 对偶性产生的隐藏对称性来生成高导数校正解的最新进展，以及将此范式扩展到 U 对偶性产生的隐藏对称性时非微扰效应所产生的问题。", "authors": [{"name": "Yi Pang"}, {"name": "Robert J. Saskowski"}], "featured_authors": [{"name": "Yi Pang"}, {"name": "Robert J. Saskowski"}], "author_count": 2}, {"id": "2603.29266", "category": "hep-th", "title": "Analyzing Uniform WKB for Deformed QM Or How Not to Quantize the SW Curve", "abstract": "We uncover an inconsistency in the uniform WKB quantization of deformed quantum mechanics.", "url": "https://arxiv.org/abs/2603.29266", "type": "理论", "summary": "我们发现变形量子力学的均匀 WKB 量子化的不一致。", "authors": [{"name": "Dharmesh Jain"}], "featured_authors": [{"name": "Dharmesh Jain"}], "author_count": 1}, {"id": "2603.29401", "category": "hep-th", "title": "Spontaneous BRST symmetry breaking in infrared QCD", "abstract": "We present a novel proposal for the effective Lagrangian of the low-energy Yang--Mills quantum field theory. The proposed effective Lagrangian exhibits the spontaneous BRST symmetry breaking. We built the Fujikawa model that we couple to the Yang--Mills elementary field sector, motivated by the analogy with Chiral Quark Model. We interpret the Fujikawa fields as effective fields composite of the elementary gluon and ghost fields. In order to justify the existence of two massless Nambu--Goldstone modes among the Fujikawa fields, we require not only the BRST but also the anti-BRST invariance of the effective Lagrangian, both to be spontaneously broken. The most striking consequence of that is the emergence of the effective gluon and ghost masses. We reproduce the Curci--Ferrari model as a
