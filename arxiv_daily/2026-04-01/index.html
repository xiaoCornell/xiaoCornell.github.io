 special case of our effective model upon the spontaneous BRST symmetry breaking. In order to reproduce also the non-nilpotent modified BRST symmetry, characteristic for the Curci--Ferrari model, we modify our effective Lagrangian to be invariant with respect to the extended-BRST symmetry, which mixes the elementary and Fujikawa field sectors, and which is nilpotent. The Curci--Ferrari is reproduced by the elementary field sector of the resulting Lagrangian. The remaining Fujikawa's field dependent terms guarantee the underlying nilpotent extended-BRST symmetry, which is now hidden in the sense of the spontaneous symmetry breaking.", "url": "https://arxiv.org/abs/2603.29401", "type": "理论", "summary": "我们提出了低能杨-米尔斯量子场论的有效拉格朗日量的新颖建议。所提出的有效拉格朗日函数表现出自发的 BRST 对称性破缺。受到与手性夸克模型的类比启发，我们建立了藤川模型，并将其与杨-米尔斯基本场区耦合。我们将藤川场解释为基本胶子场和鬼场的有效场组合。为了证明藤川场中存在两个无质量南部-戈德斯通模式，我们不仅需要 BRST，还需要有效拉格朗日的反 BRST 不变性，两者都被自发打破。最引人注目的结果是有效胶子和鬼质量的出现。我们重现了 Curci--Ferrari 模型，作为自发 BRST 对称性破缺的有效模型的特例。为了重现非零能修正的 BRST 对称性（Curci-Ferrari 模型的特征），我们将有效拉格朗日函数修改为相对于扩展 BRST 对称性不变，该对称性混合了初等场扇区和 Fujikawa 场扇区，并且是零能的。\n\nCurci-Ferrari 由所得拉格​​朗日的基本场扇区再现。其余的 Fujikawa 场相关项保证了潜在的幂零扩展 BRST 对称性，该对称性现在隐藏在自发对称破缺的意义上。", "authors": [{"name": "Angelo Raffaele Fazio"}, {"name": "Adam Smetana"}], "featured_authors": [{"name": "Angelo Raffaele Fazio"}, {"name": "Adam Smetana"}], "author_count": 2}, {"id": "2603.29443", "category": "hep-th", "title": "Cosmological brick walls & quantum chaotic dynamics of de Sitter horizons", "abstract": "Originally proposed by 't Hooft, the brick wall model has recently reemerged as a useful framework for probing quantum aspects of horizon physics, particularly in the context of holography. In this paper, we apply it to asymptotically de Sitter spacetimes. We compute the normal modes of a massless scalar field in pure de Sitter space and in the Schwarzschild-de Sitter black hole, and analyze the resulting single-particle spectra using the level-spacing distribution, the spectral form factor, and Krylov complexity. In pure de Sitter, the spectrum exhibits clear long-range signatures of chaos despite not obeying a conventional Wigner-Dyson level-spacing distribution. The Schwarzschild-de Sitter case is qualitatively richer: in the WKB regime, where tunneling between the two classically allowed regions is exponentially suppressed, the presence of both an event horizon and a cosmological horizon gives rise to two independent near-horizon sectors, so that the full spectrum is the superposition of two subsequences. As a result, the combined level-spacing distribution develops a nonzero value at $s=0$ even when spectral correlations remain. Nevertheless, for sufficiently small stretched-horizon fluctuations, the superposed spectrum still exhibits an approximately linear ramp in the spectral form factor and a pronounced peak in Krylov complexity. Our results show that the absence of strict level repulsion should not, by itself, be taken as evidence against chaos, and that the spectral form factor and Krylov complexity provide sharper diagnostics of the underlying chaotic dynamics.", "url": "https://arxiv.org/abs/2603.29443", "type": "理论", "summary": "砖墙模型最初由 't Hooft 提出，最近重新出现，成为探测地平线物理量子方面的有用框架，特别是在全息术的背景下。在本文中，我们将其应用于渐近德西特时空。我们计算纯德西特空间和史瓦西德西特黑洞中无质量标量场的简正模，并使用能级间距分布、光谱形状因子和克雷洛夫复杂度分析所得的单粒子光谱。在纯德西特中，尽管不遵守传统的维格纳-戴森能级间距分布，但频谱仍表现出清晰的混沌长程特征。 Schwarzschild-de Sitter 的情况在质量上更加丰富：在 WKB 体系中，两个经典允许区域之间的隧道效应被指数级抑制，事件视界和宇宙视界的存在产生了两个独立的近视界部分，因此全谱是两个子序列的叠加。因此，即使谱相关性仍然存在，组合能级间距分布也会在 $s=0$ 处产生非零值。\n\n然而，对于足够小的拉伸水平波动，叠​​加的频谱仍然在频谱形状因子中表现出近似线性的斜坡，并且在克雷洛夫复杂度中表现出明显的峰值。我们的结果表明，严格能级排斥的缺乏本身不应被视为反对混沌的证据，并且谱形状因子和克雷洛夫复杂度为潜在的混沌动力学提供了更清晰的诊断。", "authors": [{"name": "José M. Begines"}, {"name": "Suman Das"}, {"name": "Hyun-Sik Jeong"}, {"name": "Juan F. Pedraza"}], "featured_authors": [{"name": "José M. Begines"}, {"name": "Suman Das"}, {"name": "Hyun-Sik Jeong"}, {"name": "Juan F. Pedraza"}], "author_count": 4}, {"id": "2603.29505", "category": "hep-th", "title": "Lecture Notes on Symmetry Reduction via the Dressing Field Method", "abstract": "These notes - prepared for the conference school \"Foundations of General-Relativistic Gauge Field Theory\", held on March 17-19, 2026 at the Politecnico di Torino - present introductory material on symmetry reduction in general-relativistic Gauge Field Theory (gRGFT) via the Dressing Field Method (DFM). The DFM provides a systematic framework for extracting gauge- and diffeomorphism-invariant, manifestly relational, physical observables and degrees of freedom in gRGFT. A range of illustrative examples are discussed, spanning both Gauge Field Theory and general-relativistic settings. These include applications to non-Abelian Chern-Simons theory, Maxwell electromagnetism, the non-Abelian Higgs model, supersymmetric field theory, General Relativity, and scalar coordinatization.", "url": "https://arxiv.org/abs/2603.29505", "type": "理论", "summary": "这些笔记是为 2026 年 3 月 17 日至 19 日在都灵理工大学举行的“广义相对论规范场论基础”会议学校准备的，介绍了通过修整场方法 (DFM) 来广义相对论规范场论 (gRGFT) 对称性约简的介绍性材料。 DFM 提供了一个系统框架，用于提取 gRGFT 中规范不变、微分同胚、明显相关的物理可观测量和自由度。讨论了一系列说明性示例，涵盖规范场论和广义相对论设置。其中包括非阿贝尔陈-西蒙斯理论、麦克斯韦电磁学、非阿贝尔希格斯模型、超对称场论、广义相对论和标量协调的应用。", "authors": [{"name": "L. Ravera"}], "featured_authors": [{"name": "L. Ravera"}], "author_count": 1}, {"id": "2603.29538", "category": "hep-th", "title": "Density matrix of de Sitter JT gravity", "abstract": "Jackiw-Teitelboim (JT) gravity in two-dimensional de Sitter space is an intriguing toy model for a quantum mechanical description of an inflationary phase of the universe, including initial conditions. Starting from exact solutions of the Wheeler-DeWitt equation, we study a conditional density matrix of the system. We find that the ground state is a mixed state, rather than a pure Hartle-Hawking state. Our results are consistent with the semiclassical double-trumpet amplitude, and with recent work on complex geometries containing bra-ket wormholes. We also analyze semiclassical wave functions for metric, dilaton, and an additional inflaton field. The probability distribution for the size of the universe is flat.", "url": "https://arxiv.org/abs/2603.29538", "type": "理论", "summary": "二维德西特空间中的 Jackiw-Teitelboim (JT) 引力是一个有趣的玩具模型，用于量子力学描述宇宙暴胀阶段（包括初始条件）。从 Wheeler-DeWitt 方程的精确解开始，我们研究系统的条件密度矩阵。我们发现基态是混合态，而不是纯粹的哈特尔-霍金态。我们的结果与半经典双喇叭振幅以及最近对包含支架虫洞的复杂几何形状的研究一致。我们还分析了度量、膨胀场和附加暴胀场的半经典波函数。宇宙大小的概率分布是平坦的。", "authors": [{"name": "Wilfried Buchmuller"}, {"name": "Alexander Westphal"}], "featured_authors": [{"name": "Wilfried Buchmuller"}, {"name": "Alexander Westphal"}], "author_count": 2}, {"id": "2603.29610", "category": "hep-th", "title": "Critical dimensions and small cycle dominance from all-orders asymptotics of $d$-matrix theory", "abstract": "Supersymmetric sectors of $\\mathcal{N}=4$ super-Yang-Mills theory motivate the study of the partition function for the counting of gauge-invariant functions of $d=2,3$ matrices transforming under the adjoint action of $U(N)$. The partition function $ \\mathcal{Z}_d ( x) $ in the large $N$ limit has a known Hagedorn phase transition at $ x = d^{-1} $ which provides a simple model for the phase structure of the thermal partition function of SYM. We study the all-orders asymptotic expansion of $ \\mathcal{Z}_d(x)$ based on a geometric picture of concentric circles of poles in the complex plane accumulating in a natural boundary at $|x| =1$. We find that the order by order structure has a precise combinatorial interpretation organized in terms of increasing cycle size of permutations arising in the enumeration of the invariants. We refer to this organization as small-cycle dominance, and find that it extends to refined versions of the partition functions depending on several complex variables. An analysis of the coefficients in the asymptotic expansion of $ \\mathcal{Z}_d(x) $ using the modular property of the Dedekind eta function reveals that the asymptotic expansion is actually convergent for $d\\ge d_{ \\rm crit } = 13$. A fermionic version of $\\mathcal{Z}_d (x)$ has an analogous critical dimension of $ d_{ \\rm crit} = 7$. This distinction indicates that the partition functions of the matrix models can be completely reconstructed from their high-energy (UV) limit for $d\\ge d_{ \\rm crit}$ whereas additional input is required to reconstruct the exact coefficients of the low-energy (IR) expansion for $2\\le d \\le d_{ \\rm crit } -1 $.", "url": "https://arxiv.org/abs/2603.29610", "type": "理论", "summary": "$\\mathcal{N}=4$超杨-米尔斯理论的超对称扇区激发了对$U(N)$伴随作用下$d=2,3$矩阵变换的规范不变函数计数的配分函数的研究。大$N$极限下的配分函数$\\mathcal{Z}_d(x)$在$x = d^{-1}$处有一个已知的Hgedorn相变，这为SYM的热配分函数的相结构提供了一个简单的模型。我们基于复杂平面中极点同心圆的几何图研究 $ \\mathcal{Z}_d(x)$ 的全阶渐近展开式，这些同心圆在 $|x| 处的自然边界中累积。 =1$。我们发现，按顺序结构具有精确的组合解释，该组合解释是根据不变量枚举中出现的排列的增加循环大小来组织的。我们将这种组织称为小周期优势，并发现它可以扩展到取决于几个复杂变量的配分函数的细化版本。\n\n使用 Dedekind eta 函数的模性质对 $ \\mathcal{Z}_d(x) $ 渐近展开中的系数进行分析表明，渐近展开实际上对于 $d\\ge d_{ \\rm crit } = 13$ 是收敛的。 $\\mathcal{Z}_d (x)$ 的费米子版本具有类似的临界尺寸 $d_{ \\rm crit} = 7$。这种区别表明，矩阵模型的配分函数可以根据 $d\\ge d_{ \\rm crit}$ 的高能 (UV) 极限完全重建，而需要额外的输入来重建 $2\\le d \\le d_{ \\rm crit } -1 $ 的低能 (IR) 展开的精确系数。", "authors": [{"name": "Yang Lei"}, {"name": "Sanjaye Ramgoolam"}], "featured_authors": [{"name": "Yang Lei"}, {"name": "Sanjaye Ramgoolam"}], "author_count": 2}, {"id": "2603.29679", "category": "hep-th", "title": "5d Higgs branch and instanton magnetization", "abstract": "Higgs branches of 5d $Sp(k)$ theories with $N_f$ flavours, whether at weak or strong coupling, are described by a pair of instantons transforming as pure spinors of $SO(2N_f)$. The Poisson structure is constrained by symmetry arguments and implies that these Higgs branches are algebraic integrable systems; the degeneration of the symplectic form occurs when the spinor annihilators overlap. We argue that the stratification of the Higgs branch at infinite coupling corresponds to the alignment of the instantons weights, leading to a non vanishing magnetization, and their acquisition of a mass.", "url": "https://arxiv.org/abs/2603.29679", "type": "理论", "summary": "具有 $N_f$ 风格的 5d $Sp(k)$ 理论的希格斯分支，无论是弱耦合还是强耦合，都由一对转变为 $SO(2N_f)$ 纯旋量的瞬子来描述。泊松结构受到对称性论证的约束，意味着这些希格斯分支是代数可积系统；当旋量湮灭子重叠时，就会发生辛形式的简并。我们认为，无限耦合时希格斯分支的分层对应于瞬时子权重的对齐，导致磁化强度不消失，并获得质量。", "authors": [{"name": "Amihay Hanany"}, {"name": "Alessandro Tomasiello"}, {"name": "Elias Van den Driessche"}], "featured_authors": [{"name": "Amihay Hanany"}, {"name": "Alessandro Tomasiello"}, {"name": "Elias Van den Driessche"}], "author_count": 3}, {"id": "2603.29781", "category": "hep-th", "title": "Warm Warped Throats", "abstract": "We investigate brane inflation, focusing on warm inflation realizations within a warped throat geometry. While the standard scenario relies on a single mobile $D3$-brane moving radially toward an anti-$D3$-brane at the tip of the throat, we propose two distinct inflationary pictures. In our approach, the radial and angular coordinates of a $D3$-brane on a warped deformed conifold act as two independent inflaton fields. We address moduli stabilization by incorporating a supersymmetrically embedded $D7$-brane, which generates the necessary radial and angular scalar potentials. Evaluating these radial and angular brane inflation setups within the warm inflation paradigm, we demonstrate that dissipation effects allow the models to satisfy recent observational constraints more naturally than their cold inflation counterparts for a given parameter space.", "url": "https://arxiv.org/abs/2603.29781", "type": "理论", "summary": "我们研究膜膨胀，重点关注扭曲喉部几何结构内的热膨胀实现。虽然标准情景依赖于单个移动 $D3$ 膜径向移动到喉咙尖端的反 $D3$ 膜，但我们提出了两种不同的通货膨胀图片。在我们的方法中，扭曲变形锥褶上 $D3$ 膜的径向和角坐标充当两个独立的暴胀场。我们通过结合超对称嵌入的 $D7$ 膜来解决模量稳定性问题，该膜产生必要的径向和角标量势。在暖膨胀范式中评估这些径向和角膜膨胀设置，我们证明耗散效应使模型能够比给定参数空间的冷膨胀对应模型更自然地满足最近的观测约束。", "authors": [{"name": "Dibya Chakraborty"}, {"name": "Rudnei O. Ramos"}], "featured_authors": [{"name": "Dibya Chakraborty"}, {"name": "Rudnei O. Ramos"}], "author_count": 2}, {"id": "2603.29787", "category": "hep-th", "title": "Exponential Periods for Integrals in Physics", "abstract": "The study of Feynman integrals through the lens of intersection theory offers a unifying framework for their analysis, capturing both the linear and quadratic relations that arise among integrals. In doing so, it provides a powerful method for systematically reducing them to the so called master integrals, a necessary strategy for multiloop contributions, whose huge number make direct calculation unfeasible. The Twisted de Rham cohomology offers a powerful tool for describing integrals with multivalued integrands, arising in dimensional regularization. However, it fails whenever the underlying geometry shows richer structures, as singularities and intricate monodromies. In this thesis we propose a systematic approach to identify and construct the appropriate homology and cohomology that allows to interpret Feynman integrals in parameter representation as exponential periods. This reformulation, together with the analytic continuation of the dimensional regularizator, provides a perfect framework to properly analyze the wall crossing structure and to correctly take into account Stokes phenomena for a sharp counting of the number of Master integrals. This framework allows to embed within the same formalism not only perturbative integrals, coming both from quantum field theories and string theory, but also wide class of physically relevant integrals, from Fourier calculus to statistical mechanics partition functions, from quantum mechanics expectation values to conformal field theory correlators.", "url": "https://arxiv.org/abs/2603.29787", "type": "理论", "summary": "通过交叉理论的视角对费曼积分的研究为其分析提供了统一的框架，捕捉积分之间出现的线性和二次关系。这样做，它提供了一种强大的方法，可以系统地将它们简化为所谓的主积分，这是多循环贡献的必要策略，其数量巨大，使得直接计算不可行。 Twisted de Rham 上同调提供了一个强大的工具，用于描述多值被积函数的积分，这是在维数正则化中出现的。然而，每当底层几何显示出更丰富的结构（如奇点和复杂的单峰）时，它就会失败。在本文中，我们提出了一种系统方法来识别和构造适当的同调和上同调，从而可以将参数表示中的费曼积分解释为指数周期。这种重新表述与维度正则化器的分析延续一起，提供了一个完美的框架来正确分析壁交叉结构并正确考虑斯托克斯现象以精确计算主积分的数量。\n\n该框架不仅允许嵌入来自量子场论和弦理论的微扰积分，而且允许嵌入广泛的物理相关积分，从傅里叶微积分到统计力学配分函数，从量子力学期望值到共形场论相关器。", "authors": [{"name": "Anthony Massidda"}], "featured_authors": [{"name": "Anthony Massidda"}], "author_count": 1}, {"id": "2603.29816", "category": "hep-th", "title": "The stochastic approach for anomalies in supersymmetric theories", "abstract": "We discuss how the stochastic approach for supersymmetric theories leads to new ways of characterizing anomalies in how supersymmetry can be broken.", "url": "https://arxiv.org/abs/2603.29816", "type": "理论", "summary": "我们讨论超对称理论的随机方法如何产生新的方法来表征超对称性如何被打破的异常现象。", "authors": [{"name": "Stam Nicolis"}], "featured_authors": [{"name": "Stam Nicolis"}], "author_count": 1}, {"id": "2603.29829", "category": "hep-th", "title": "Macdonald Index from VOA and Graded Unitarity", "abstract": "The SCFT/VOA correspondence provides a powerful framework for studying 4d $\\mathcal N=2$ superconformal field theories (SCFTs) through the mathematical machinery of 2d vertex operator algebras (VOAs). It captures the Schur operators of the underlying SCFT, whose spectrum is encoded by the Schur index and its refinement, the Macdonald index. While the Schur index is identified with the vacuum character of the associated VOA, a general VOA-based derivation of the Macdonald index has remained elusive. In this letter, we propose a novel and intrinsic method for recovering a special non-Schur limit of the Macdonald index directly from the VOA. The construction requires no additional assumptions and applies whenever the underlying 4d theory is unitary. We test the proposal in a variety of examples, and further extend it to the case with surface defects, suggesting a notion of graded unitarity in the presence of defects. Our method also introduces a new class of series for general VOAs, analogous to but distinct from the conventional character, and potentially useful in broader contexts.", "url": "https://arxiv.org/abs/2603.29829", "type": "理论", "summary": "SCFT/VOA 对应关系为通过 2d 顶点算子代数 (VOA) 的数学机制研究 4d $\\mathcal N=2$ 超共形场论 (SCFT) 提供了强大的框架。它捕获底层 SCFT 的 Schur 算子，其频谱由 Schur 指数及其细化 Macdonald 指数编码。虽然 Schur 指数与相关 VOA 的真空特性相同，但基于 VOA 的 Macdonald 指数的一般推导仍然难以捉摸。在这封信中，我们提出了一种新颖且内在的方法，用于直接从美国之音恢复麦克唐纳指数的特殊非舒尔极限。该构造不需要额外的假设，并且只要基础 4d 理论是单一的，就适用。我们在各种示例中测试了该提议，并进一步将其扩展到具有表面缺陷的情况，提出了存在缺陷时分级统一性的概念。我们的方法还为一般的 VOA 引入了一类新的系列，类似于但不同于传统的字符，并且在更广泛的背景下可能有用。", "authors": [{"name": "Hongliang Jiang"}], "featured_authors": [{"name": "Hongliang Jiang"}], "author_count": 1}, {"id": "2603.29872", "category": "hep-th", "title": "Microscopic Origin of Page Curve", "abstract": "Applications of the Ryu-Takayanagi formula to evaporating black holes are known to reproduce the Page curve, although leaving open the microscopic origin of the necessary black hole degrees of freedom responsible for the entanglement and microstates. Here, we fill this gap by utilizing a recently proven generalized Ryu-Takayanagi formula which keeps the contact to the theory's Hamiltonian phase space. Precisely, we show that in any diffeomorphism invariant field theory containing stationary black holes with bifurcate Killing horizons the phase space states distinguishable by their Hamiltonian surface charges over the bifurcation surface must provide the degrees of freedom responsible for the black hole's Wald entropy. This result is part of a larger program where measurable quantities of a quantum theory are expressed as weighted sums over paths in the theory's phase space. Suited reorganization tools for those sums make then physical phenomena evident which might be obscured in a naive summation relying on spacetime notions such as field configuration spaces and Feynman diagrams. Besides presenting this result, we provide here a conceptual overview of the program as an entry point for unfamiliar readers explaining the central notion of the program and why it reveals the results obtained so far. These include especially the gravitational entropy bound and the here applied generalized Ryu-Takayanagi prescription shown earlier within the program. Using the information paradox as a leitmotif, our proposed program uncovers black hole hair that may be hidden within a naive spacetime interpretation.", "url": "https://arxiv.org/abs/2603.29872", "type": "理论", "summary": "众所周知，将 Ryu-Takayanagi 公式应用于蒸发黑洞可以重现佩奇曲线，尽管导致纠缠和微观状态的必要黑洞自由度的微观起源仍处于开放状态。在这里，我们利用最近证明的广义 Ryu-Takayanagi 公式来填补这一空白，该公式保持与理论的哈密顿相空间的联系。准确地说，我们证明，在任何包含具有分叉杀伤视界的静止黑洞的微分同胚不变场论中，可通过分叉表面上的哈密顿表面电荷区分的相空间状态必须提供负责黑洞 Wald 熵的自由度。这个结果是一个更大程序的一部分，其中量子理论的可测量量被表示为理论相空间中路径的加权和。适合这些总和的重组工具使物理现象变得明显，而这些物理现象可能会在依赖于时空概念（例如场配置空间和费曼图）的简单求和中被掩盖。\n\n除了展示这个结果之外，我们还在这里提供了该程序的概念性概述，作为不熟悉的读者的切入点，解释该程序的中心概念以及为什么它揭示了迄今为止所获得的结果。其中特别包括引力熵界以及程序中前面显示的此处应用的广义 Ryu-Takayanagi 处方。我们提出的程序以信息悖论为主题，揭示了可能隐藏在天真的时空解释中的黑洞毛发。", "authors": [{"name": "Artem Averin"}], "featured_authors": [{"name": "Artem Averin"}], "author_count": 1}, {"id": "2603.29926", "category": "hep-th", "title": "Recursive-algebraic solution of the closed string tachyon vacuum equation", "abstract": "We develop a recursive algebraic framework for solving the closed string tachyon vacuum equation, derived from the hyperbolic recursion relations of Fırat and Valdes-Meller. We restrict to the sector of zero-momentum Lorentz-scalar states. Lorentz symmetry ensures that this sector is closed under the equations of motion. In this sector, we introduce a seam-graded expansion and show that the equation is entirely algebraic at every order: the unknown at each grade enters only through point evaluations at the systolic length, so each grade reduces to a matrix inversion with no Fredholm equations. The expansion is formal; convergence in the multi-level system is the subject of ongoing work. This work was conducted with a publicly available version of Claude Code (Anthropic, Claude Opus 4.6). The complete research repository, including all computations, adversarial review logs, and the full human-AI collaboration history, is publicly available at this https URL .", "url": "https://arxiv.org/abs/2603.29926", "type": "理论", "summary": "我们开发了一个递归代数框架来求解闭弦快子真空方程，该方程源自 Fırat 和 Valdes-Meller 的双曲递归关系。我们限制在零动量洛伦兹标量态部分。洛伦兹对称性确保该扇区在运动方程下是封闭的。在这个领域中，我们引入了接缝分级展开，并表明该方程在每个阶上都是完全代数的：每个等级的未知数仅通过收缩长度的点评估进入，因此每个等级都简化为没有 Fredholm 方程的矩阵求逆。扩张是正式的；多层次系统的融合是当前工作的主题。这项工作是使用公开版本的 Claude Code（Anthropic，Claude Opus 4.6）进行的。完整的研究存储库，包括所有计算、对抗性审查日志和完整的人类与人工智能协作历史记录，可通过此 https URL 公开获取。", "authors": [{"name": "Manki Kim"}], "featured_authors": [{"name": "Manki Kim"}], "author_count": 1}, {"id": "2603.29952", "category": "hep-th", "title": "Holographic Weyl Anomaly and Kounterterms in AdS gravity", "abstract": "The addition of Kounterterms to Einstein gravity leads to a finite action for asymptotically anti-de Sitter (AdS) spaces with a conformally flat boundary. In that sense, it provides a partial renormalization for AdS gravity when compared to standard holographic techniques, where the mismatch is given in terms of nontrivial conformal properties of the boundary. On the other hand, this method has the clear advantage that the variation of the action has a closed form in an arbitrary dimension. In this work, it is shown how to extract holographic information on conformal anomalies from the variation in $(2n+1)$-dimensional Einstein-AdS plus Kounterterms. Remarkably enough, a considerable part of the Weyl anomaly can be worked out for any odd dimension.", "url": "https://arxiv.org/abs/2603.29952", "type": "理论", "summary": "将 Kunterterms 添加到爱因斯坦引力中会导致具有共形平坦边界的渐近反德西特 (AdS) 空间的有限作用。从这个意义上说，与标准全息技术相比，它为 AdS 重力提供了部分重正化，其中不匹配是根据边界的非平凡共形属性给出的。另一方面，该方法具有明显的优点，即动作的变化在任意维度上具有封闭形式。在这项工作中，展示了如何从 $(2n+1)$ 维 Einstein-AdS 加上 Kounterterms 的变化中提取共形异常的全息信息。值得注意的是，外尔异常的很大一部分可以针对任何奇数维进行计算。", "authors": [{"name": "Giorgos Anastasiou"}, {"name": "Jahaira Bonifacio-Chavez"}, {"name": "Olivera Miskovic"}, {"name": "Rodrigo Olea"}], "featured_authors": [{"name": "Giorgos Anastasiou"}, {"name": "Jahaira Bonifacio-Chavez"}, {"name": "Olivera Miskovic"}, {"name": "Rodrigo Olea"}], "author_count": 4}, {"id": "2603.28830", "category": "math-ph", "title": "Gibbs measure for the HC-Blume-Capel model in the case of a \"wand\" type graph on a Cayley tree", "abstract": "In this paper, we investigate translation-invariant splitting Gibbs measures (TISGMs) for the HC-Blume-Capel model on a \"wand\" graph embedded in the Cayley tree of arbitrary order $k \\geq 2$. It is known that there is the exact critical value $\\theta_{cr}$ such that for $\\theta \\geq \\theta_{cr}$, there exists a unique TISGM, whereas for $\\theta < \\theta_{cr}$, precisely three TISGMs exist in the case of a \"wand\" graph for the given model. In the present paper, we completely solve the (non-)extremality problem for one of these measures for any order $k$ of Cayley tree", "url": "https://arxiv.org/abs/2603.28830", "type": "理论", "summary": "在本文中，我们研究了嵌入在任意阶 $k \\geq 2$ 的 Cayley 树中的“棒”图上的 HC-Blume-Capel 模型的平移不变分裂吉布斯测度 (TISGM)。已知存在精确的临界值 $\\theta_{cr}$，使得对于 $\\theta \\geq \\theta_{cr}$，存在唯一的 TISGM，而对于 $\\theta < \\theta_{cr}$，在给定模型的“棒”图的情况下恰好存在三个 TISGM。在本文中，我们完全解决了凯莱树任意阶 $k$ 的这些度量之一的（非）极值问题", "authors": [{"name": "Nosirjon M.Khatamov"}, {"name": "Malika A.Kodirova"}], "featured_authors": [{"name": "Nosirjon M.Khatamov"}, {"name": "Malika A.Kodirova"}], "author_count": 2}, {"id": "2603.28893", "category": "math-ph", "title": "Central Limit Theorems for Outcome Records in Disordered Quantum Trajectories", "abstract": "We prove annealed central limit theorems for finite pattern counts in the measurement record of discrete-time quantum trajectories generated by repeated measurements in a disordered environment. Under summable mixing assumptions on the environment and an annealed trace-norm forgetting property for the associated non-selective channel cocycle, we first establish the CLT under the annealed law determined by the dynamically stationary state. This part applies to general disordered quantum instruments and, in particular, is not restricted to the perfect-measurement regime; it complements both the corresponding law of large numbers for disordered measurement records and the homogeneous central limit theorem. We then introduce a coupling-based notion of admissibility for initial states and show that the same Gaussian limit extends to every admissible initial law, with unchanged centering and asymptotic variance. In the perfect-measurement setting, we further identify a general condition ensuring admissibility for every initial state, and hence obtain a universal annealed central limit theorem. We also provide practical sufficient criteria for this condition and verify the assumptions across a broad family of examples, including disordered walk-type models generated by finite group actions", "url": "https://arxiv.org/abs/2603.28893", "type": "理论", "summary": "我们在无序环境中重复测量生成的离散时间量子轨迹的测量记录中证明了有限模式计数的退火中心极限定理。在环境的可求和混合假设和相关非选择性通道共循环的退火迹范数遗忘特性下，我们首先根据动态稳态确定的退火定律建立 CLT。本部分适用于一般无序量子仪器，特别是不限于完美测量体制；它补充了无序测量记录的相应大数定律和齐次中心极限定理。然后，我们引入基于耦合的初始状态可接受性概念，并表明相同的高斯极限扩展到每个可接受的初始定律，且中心化和渐近方差不变。在完美测量设置中，我们进一步确定了确保每个初始状态的可接受性的一般条件，从而获得了通用退火中心极限定理。\n\n我们还为这种情况提供了实用的充分标准，并验证了一系列广泛示例的假设，包括由有限群动作生成的无序步行型模型", "authors": [{"name": "Lubashan Pathirana"}], "featured_authors": [{"name": "Lubashan Pathirana"}], "author_count": 1}, {"id": "2603.28975", "category": "math-ph", "title": "Remarks on \"Further comments on \"Rebuttal of \"Refutation of \"Comment on \"Reply to \"Comments on \"A genuinely natural information measure\" \" \" \" \" \" \"", "abstract": "It's a bit tedious, but as John Doe and Jean Roe have insisted on offering further comments on our comprehensive refutation of the former's already tiringly obstinate advances, we feel compelled to review their not even wrong opinions once again, hoping to put some sense back into the discourse.", "url": "https://arxiv.org/abs/2603.28975", "type": "理论", "summary": "这有点乏味，但由于约翰·多伊和让·罗伊坚持对我们对前者已经令人厌倦的顽固进展的全面反驳提出进一步的评论，我们感到有必要再次回顾他们甚至没有错误的观点，希望为话语注入一些意义。", "authors": [{"name": "Z. Sommer"}, {"name": "A. Winter"}], "featured_authors": [{"name": "Z. Sommer"}, {"name": "A. Winter"}], "author_count": 2}, {"id": "2603.29028", "category": "math-ph", "title": "The Contextual Modal Logic of a Wigner's Friend Generalization", "abstract": "Quantum mechanics has been subject to logical scrutiny since its inception. The behavior of quantum systems, which are fundamentally dissimilar from classical systems, often appears to point to a logical inconsistency in quantum mechanics, allegedly leading to contradictions in the prediction of experimental measurements--though such contradictions have never materialized. A recent example of this type of inquiry into the logical well-posedness of quantum mechanics is the Frauchiger-Renner Gedankenexperiment, which purports to demonstrate that quantum mechanics is logically inconsistent. In this article, we show that by considering the property of contextuality in quantum systems--as predicted by the Kochen-Specker theorem--the supposed contradiction proposed by Frauchiger and Renner becomes logically inaccessible.", "url": "https://arxiv.org/abs/2603.29028", "type": "理论", "summary": "量子力学自诞生以来就一直受到逻辑审查。量子系统的行为与经典系统根本不同，通常似乎表明量子力学中存在逻辑不一致，据称导致实验测量预测中的矛盾——尽管这种矛盾从未实现。最近对量子力学逻辑适定性进行探究的一个例子是 Frauchiger-Renner Gedanken 实验，该实验旨在证明量子力学在逻辑上是不一致的。在本文中，我们表明，通过考虑量子系统中的上下文属性（正如科亨-斯佩克定理所预测的那样），弗劳奇格和雷纳提出的假设矛盾在逻辑上变得难以理解。", "authors": [{"name": "Felipe Dilho Alves"}, {"name": "João Carlos Alves Barata"}], "featured_authors": [{"name": "Felipe Dilho Alves"}, {"name": "João Carlos Alves Barata"}], "author_count": 2}, {"id": "2603.29046", "category": "math-ph", "title": "The Moyal cohomology of the spinning particle", "abstract": "Felder and Kazhdan conjecture that the local cohomology in the classical Batalin-Vilkovisky formalism vanishes in sufficiently negative degrees. This hypothesis is violated by the $N=1$ spinning particle. By Barnich-Grigoriev, this cohomology is isomorphic to the cohomology of the algebra of functions on the differential graded symplectic supermanifold of the associated Batalin-Fradkin-Vilkovisky model. This cohomology is nontrivial in all negative degrees. We show in this article that replacement in this symplectic supermanifold of the Poisson bracket by the Moyal bracket eliminates these spurious cohomology classes.", "url": "https://arxiv.org/abs/2603.29046", "type": "理论", "summary": "Felder 和 Kazhdan 猜想经典 Batalin-Vilkovisky 形式主义中的局部上同调在足够负的程度下消失。 $N=1$ 旋转粒子违反了这一假设。根据 Barnich-Grigoriev 的说法，该上同调与相关 Batalin-Fradkin-Vilkovisky 模型的微分分级辛超流形上函数代数的上同调同构。这种上同调在所有负度上都是不平凡的。我们在本文中表明，用 Moyal 括号替换泊松括号的辛超流形消除了这些虚假上同调类。", "authors": [{"name": "Ezra Getzler"}], "featured_authors": [{"name": "Ezra Getzler"}], "author_count": 1}, {"id": "2603.29510", "category": "math-ph", "title": "Derivative relations for determinants, Pfaffians and characteristic polynomials in random matrix theory", "abstract": "Explicit expressions are proven for derivatives of the ratio of a determinant or Pfaffian determinant and a Vandermonde determinant. Such ratios appear for example in general group integrals of Harish-Chandra--Itzykson--Zuber type and in expectation values of products of characteristic polynomials in random matrix theory. In the latter case we start from known results for general non-Hermitian and Hermitian ensembles for expectation values without derivatives, at finite matrix size. They are given in terms of the determinant or Pfaffian of the corresponding kernel, for unitary or orthogonal and symplectic ensembles, respectively. Several equivalent expressions are proven for general ratios of determinants, starting from first order derivatives containing the Borel transform of the corresponding matrix or kernel. Higher order derivatives are expressed as sums over partitions containing determinants of derivatives of these, with coefficients given in terms of combinatorial expressions. Our most general result is valid for mixed higher order derivatives of ratios of determinants in several variables. This generalises previous findings, e.g. for mixed moments in specific ensembles of random matrices, relevant in applications to the Riemann $\\zeta$-function. Applications of our results to several examples are presented, including the complex Ginibre ensemble and the circular unitary ensemble.", "url": "https://arxiv.org/abs/2603.29510", "type": "理论", "summary": "行列式或普法夫行列式与范德蒙行列式之比的导数的显式表达式已被证明。这样的比率例如出现在Harish-Chandra-Itzykson-Zuber类型的一般群积分中以及随机矩阵理论中特征多项式的乘积的期望值中。在后一种情况下，我们从一般非厄米特系综和厄米系综的已知结果开始，在有限矩阵大小下获得无导数的期望值。对于酉系综、正交系综和辛系综，它们分别以相应核的行列式或普法夫式给出。从包含相应矩阵或核的 Borel 变换的一阶导数开始，针对行列式的一般比率证明了几个等效表达式。高阶导数表示为包含这些导数行列式的分区上的和，系数以组合表达式给出。我们最一般的结果对于多个变量中行列式的比率的混合高阶导数是有效的。这概括了以前的发现，例如\n\n对于特定随机矩阵系综中的混合矩，与黎曼 $\\zeta$ 函数的应用相关。介绍了我们的结果在几个例子中的应用，包括复杂的 Ginibre 系综和圆形酉系综。", "authors": [{"name": "Gernot Akemann"}, {"name": "Georg Angermann"}, {"name": "Mario Kieburg"}, {"name": "Adrian Padellaro"}], "featured_authors": [{"name": "Gernot Akemann"}, {"name": "Georg Angermann"}, {"name": "Mario Kieburg"}, {"name": "Adrian Padellaro"}], "author_count": 4}, {"id": "2603.29562", "category": "math-ph", "title": "Ground state energy of the Bose--Hubbard model with large coordination number with a polaron-type quantum de Finetti theorem", "abstract": "We consider the ground state energy of the Bose--Hubbard model on a graph with large and homogeneous coordination number. In the limit of infinite coordination number, we prove convergence of the ground state energy to the minimizer of a mean-field energy functional. This functional is obtained by averaging the hopping term over the large number of connected sites, while the interaction energy is not averaged. Hence, the resulting mean-field description is in the strong coupling regime, and is expected to provide a qualitatively correct picture of the phase diagram of the Bose--Hubbard model for large enough coordination number. For our proof, we develop a new version of a de Finetti-type theorem, which we call the polaron-type quantum de Finetti theorem, and which we expect to be a more broadly useful extension of existing quantum de Finetti results. Our theorem covers the case where the Hilbert space is a tensor product of some Hilbert space with a bosonic Fock space. This theorem is applied to the convergence of the ground state energy of the Bose--Hubbard model after reducing it to a polaron-type model.", "url": "https://arxiv.org/abs/2603.29562", "type": "理论", "summary": "我们在具有大且齐次配位数的图上考虑 Bose--Hubbard 模型的基态能量。在无限配位数的限制下，我们证明了基态能量收敛于平均场能量泛函的极小值。该函数是通过对大量连接站点上的跳跃项进行平均而获得的，而相互作用能量未进行平均。因此，所得到的平均场描述处于强耦合状态，并且有望为足够大的配位数的 Bose--Hubbard 模型的相图提供定性正确的图像。为了证明，我们开发了一个新版本的 de Finetti 型定理，我们将其称为极化子型量子 de Finetti 定理，我们期望它成为现有量子 de Finetti 结果的更广泛有用的扩展。我们的定理涵盖了希尔伯特空间是某个希尔伯特空间与玻色福克空间的张量积的情况。该定理应用于将 Bose--Hubbard 模型简化为极化子型模型后基态能量的收敛。", "authors": [{"name": "Shahnaz Farhat"}, {"name": "Denis Périce"}, {"name": "Sören Petrat"}], "featured_authors": [{"name": "Shahnaz Farhat"}, {"name": "Denis Périce"}, {"name": "Sören Petrat"}], "author_count": 3}, {"id": "2603.30001", "category": "math-ph", "title": "Functional models and self-modeling property of minimal Dirac operators on the half-line", "abstract": "We prove that minimal Dirac operators on the half-line are self-modeling, which means that such an operator is determined by its arbitrary unitary copy uniquely up to a transformation (shape equivalence) which changes its potential by a constant factor of modulus one. This result is obtained using the wave functional model of the minimal matrix Schrödinger operator on the half-line.", "url": "https://arxiv.org/abs/2603.30001", "type": "理论", "summary": "我们证明半线上的最小狄拉克算子是自建模的，这意味着这样的算子是由其任意酉副本唯一确定的，直至通过模一常数因子改变其势的变换（形状等价）。该结果是利用半线上最小矩阵薛定谔算子的波函数模型获得的。", "authors": [{"name": "M. I. Belishev"}, {"name": "S. A. Simonov"}], "featured_authors": [{"name": "M. I. Belishev"}, {"name": "S. A. Simonov"}], "author_count": 2}, {"id": "2603.28836", "category": "quant-ph", "title": "Geometric structure of the relativistic quantum phase space", "abstract": "The relativistic quantum phase space (QPS) formalism extends classical phase space by incorporating both mean values and variance-covariance matrices of quantum states, thereby providing a unified setting where the uncertainty principle and relativistic covariance coexist. In this work we explore the basic geometric structure of the QPS for the signature \\((1,4)\\). We construct a scalar invariant built from the mean values and the inverse variance-covariance matrix, and prove its invariance under linear canonical transformations. For quantum states that saturate the uncertainty relations, and define the QPS itself, the invariant takes a value that encodes two fundamental length scales: a large scale characterising maximal coordinate uncertainties and a small scale characterising minimal coordinate uncertainties. From this invariance we derive a geometric equation that unifies the mean values and the quantum fluctuations. Analysing two asymptotic regimes reveals two physically significant limits: one leads to a curved spacetime geometry, consistent with current cosmological observations; the other yields a curved momenta space structure. These limits suggest a direct connection between quantum phase space geometry, cosmology, and quantum gravity, offering new perspectives on the origin of the quantum structure of spacetime. The results also resonate with the principle of Born reciprocity, which posits a fundamental duality between coordinates and momenta, and align with recent works on the relation between QPS and neutrino physics.", "url": "https://arxiv.org/abs/2603.28836", "type": "理论", "summary": "相对论量子相空间（QPS）形式通过结合量子态的平均值和方差-协方差矩阵来扩展经典相空间，从而提供不确定性原理和相对论协方差共存的统一设置。在这项工作中，我们探索签名 \\((1,4)\\) 的 QPS 的基本几何结构。我们构造了一个由平均值和逆方差-协方差矩阵构建的标量不变量，并证明了其在线性正则变换下的不变性。对于使不确定性关系饱和并定义 QPS 本身的量子态，不变量采用编码两个基本长度尺度的值：表征最大坐标不确定性的大尺度和表征最小坐标不确定性的小尺度。从这种不变性中，我们得出了一个统一平均值和量子涨落的几何方程。分析两个渐近状态揭示了两个物理上的重要限制：一个导致弯曲的时空几何，与当前的宇宙学观测一致；另一个导致弯曲的时空几何。另一个产生弯曲的动量空间结构。\n\n这些限制表明量子相空间几何、宇宙学和量子引力之间存在直接联系，为时空量子结构的起源提供了新的视角。结果也与玻恩互易原理产生共鸣，该原理假定了坐标和动量之间的基本对偶性，并与最近关于 QPS 和中微子物理之间关系的研究相一致。", "authors": [{"name": "Philippe Manjakasoa Randriantsoa"}, {"name": "Ravo Tokiniaina Ranaivoson"}, {"name": "Raoelina Andriambololona"}, {"name": "Roland Raboanary"}, {"name": "Wilfrid Chrysante Solofoarisina"}, {"name": "Anjary Feno Hasina Rasamimanana"}], "featured_authors": [{"name": "Philippe Manjakasoa Randriantsoa"}, {"name": "Ravo Tokiniaina Ranaivoson"}, {"name": "Raoelina Andriambololona"}, {"name": "Roland Raboanary"}, {"name": "Wilfrid Chrysante Solofoarisina"}, {"name": "Anjary Feno Hasina Rasamimanana"}], "author_count": 6}, {"id": "2603.28846", "category": "quant-ph", "title": "Securing Elliptic Curve Cryptocurrencies against Quantum Vulnerabilities: Resource Estimates and Mitigations", "abstract": "This whitepaper seeks to elucidate implications that the capabilities of developing quantum architectures have on blockchain vulnerabilities and mitigation strategies. First, we provide new resource estimates for breaking the 256-bit Elliptic Curve Discrete Logarithm Problem, the core of modern blockchain cryptography. We demonstrate that Shor's algorithm for this problem can execute with either <1200 logical qubits and <90 million Toffoli gates or <1450 logical qubits and <70 million Toffoli gates. In the interest of responsible disclosure, we use a zero-knowledge proof to validate these results without disclosing attack vectors. On superconducting architectures with 1e-3 physical error rates and planar connectivity, those circuits can execute in minutes using fewer than half a million physical qubits. We introduce a critical distinction between fast-clock (such as superconducting and photonic) and slow-clock (such as neutral atom and ion trap) architectures. Our analysis reveals that the first fast-clock CRQCs would enable on-spend attacks on public mempool transactions of some cryptocurrencies. We survey major cryptocurrency vulnerabilities through this lens, identifying systemic risks associated with advanced features in some blockchains such as smart contracts, Proof-of-Stake consensus, and Data Availability Sampling, as well as the enduring concern of abandoned assets. We argue that technical solutions would benefit from accompanying public policy and discuss various frameworks of digital salvage to regulate the recovery or destruction of dormant assets while preventing adversarial seizure. We also discuss implications for other digital assets and tokenization as well as challenges and successful examples of the ongoing transition to Post-Quantum Cryptography (PQC). Finally, we urge all vulnerable cryptocurrency communities to join the ongoing migration to PQC without delay.", "url": "https://arxiv.org/abs/2603.28846", "type": "理论+数值", "summary": "本白皮书旨在阐明开发量子架构的能力对区块链漏洞和缓解策略的影响。首先，我们为打破现代区块链密码学的核心 256 位椭圆曲线离散对数问题提供新的资源估计。我们证明了针对此问题的 Shor 算法可以使用 <1200 个逻辑量子位和 <9000 万个 Toffoli 门或 <1450 个逻辑量子位和 <7000 万个 Toffoli 门来执行。为了负责任的披露，我们使用零知识证明来验证这些结果而不披露攻击向量。在具有 1e-3 物理错误率和平面连接的超导架构上，这些电路可以使用不到 50 万个物理量子位在几分钟内执行。我们介绍了快时钟（例如超导和光子）和慢时钟（例如中性原子和离子陷阱）架构之间的关键区别。我们的分析表明，第一个快速时钟 CRQC 将对某些加密货币的公共内存池交易进行支出攻击。\n\n我们通过这个视角调查主要的加密货币漏洞，识别与智能合约、权益证明共识和数据可用性采样等某些区块链高级功能相关的系统性风险，以及对废弃资产的持久关注。我们认为，技术解决方案将受益于伴随的公共政策，并讨论各种数字抢救框架，以规范休眠资产的恢复或销毁，同时防止对抗性扣押。我们还讨论了对其他数字资产和代币化的影响，以及持续过渡到后量子密码学（PQC）的挑战和成功案例。最后，我们敦促所有脆弱的加密货币社区立即加入正在进行的向 PQC 的迁移。", "authors": [{"name": "Ryan Babbush"}, {"name": "Adam Zalcman"}, {"name": "Craig Gidney"}, {"name": "Michael Broughton"}, {"name": "Tanuj Khattar"}, {"name": "Hartmut Neven"}, {"name": "Thiago Bergamaschi"}, {"name": "Justin Drake"}, {"name": "Dan Boneh"}], "featured_authors": [{"name": "Ryan Babbush"}, {"name": "Adam Zalcman"}, {"name": "Craig Gidney"}, {"name": "Thiago Bergamaschi"}, {"name": "Justin Drake"}, {"name": "Dan Boneh"}], "author_count": 9}, {"id": "2603.28852", "category": "quant-ph", "title": "Color code off-the-hook: avoiding hook errors with a single auxiliary per plaquette", "abstract": "Syndrome extraction in the planar color code is complicated by high weight stabilizers and hook errors that can reduce the circuit-level distance. With a single auxiliary qubit per plaquette, any spatially uniform circuit halves the circuit-level distance. We propose a single-auxiliary syndrome extraction circuit with color-dependent gate schedules that avoids all malign hook errors in the bulk, thereby preserving the full circuit-level distance. The circuit has minimal depth: all stabilizers of the same Pauli type are measured in parallel in six time steps. Furthermore, this schedule can be readily applied to the XYZ color code circuit, yielding an improved temporal distance. We find that at the boundary, no single hook error alone reduces the distance; instead, only certain combinations of hook errors do, which we call fractional hook errors. We demonstrate through Monte Carlo simulations over a range of circuit-level noise models and physical error rates that our circuit outperforms the previous state of the art.", "url": "https://arxiv.org/abs/2603.28852", "type": "理论+数值", "summary": "平面颜色代码中的综合症提取由于高重量稳定器和钩子错误而变得复杂，这会减少电路级距离。每个小板有一个辅助量子位，任何空间均匀的电路都会使电路级距离减半。我们提出了一种具有颜色相关门调度的单辅助综合症提取电路，可以避免大量的所有恶性钩子错误，从而保留完整的电路级距离。该电路具有最小的深度：相同泡利类型的所有稳定器均以六个时间步长并行测量。此外，该时间表可以很容易地应用于 XYZ 颜色代码电路，从而产生改进的时间距离。我们发现，在边界处，单钩误差不会单独减少距离；相反，只有某些钩子错误组合才会出现这种情况，我们称之为分数钩子错误。我们通过对一系列电路级噪声模型和物理错误率的蒙特卡罗模拟证明，我们的电路优于以前的最先进技术。", "authors": [{"name": "Gilad Kishony"}, {"name": "Austin Fowler"}], "featured_authors": [{"name": "Gilad Kishony"}, {"name": "Austin Fowler"}], "author_count": 2}, {"id": "2603.28869", "category": "quant-ph", "title": "Quantum Suicide in Many-Worlds Implies P=NP", "abstract": "In this paper we propose a totally serious algorithm to solve NP problems in polynomial time provided one is willing to wager the fate of all observers in the universe on the many-world interpretation of quantum theory being correct.", "url": "https://arxiv.org/abs/2603.28869", "type": "理论+数值", "summary": "在本文中，我们提出了一种完全严肃的算法，可以在多项式时间内解决 NP 问题，只要人们愿意将宇宙中所有观察者的命运押注于量子理论的多世界解释是否正确。", "authors": [{"name": "Veronika Baumann"}, {"name": "Alberto Rolandi"}], "featured_authors": [{"name": "Veronika Baumann"}, {"name": "Alberto Rolandi"}], "author_count": 2}, {"id": "2603.28870", "category": "quant-ph", "title": "Non-stabilizerness and U(1) symmetry in chaotic many-body quantum systems", "abstract": "We present exact, closed-form results for the non-stabilizerness of random pure states subject to a U(1) symmetry constraint. Using stabilizer entropy as our non-stabilizerness monotone, we derive the average and the variance for U(1)-constrained Haar random states. We show that the presence of a conserved charge leads to a substantial suppression of non-stabilizerness (magic) compared to the unconstrained case, and identify a qualitative difference between entanglement and magic response. In the thermodynamic limit, stabilizer entropy exhibits a different leading-order scaling close to a vanishing relative charge density, implying that magic is more robust to charge density fluctuations than entanglement entropy. We test our analytical predictions against midspectrum eigenstates of two chaotic many-body systems with conserved $U(1)$ charge: the complex-fermion Sachdev-Ye-Kitaev (cSYK) model and a Heisenberg XXZ chain with next-to-nearest-neighbour couplings and conserved magnetization. We find an excellent agreement for the non-local cSYK model and systematic deviations for the local XXZ chain, highlighting the role of interaction locality.", "url": "https://arxiv.org/abs/2603.28870", "type": "理论", "summary": "我们针对受 U(1) 对称性约束的随机纯态的非稳定性提出了精确的封闭形式结果。使用稳定器熵作为我们的非稳定器单调性，我们得出 U(1) 约束 Haar 随机状态的平均值和方差。我们证明，与无约束的情况相比，保守电荷的存在会导致非稳定性（魔法）的显着抑制，并确定纠缠和魔法响应之间的质的差异。在热力学极限下，稳定剂熵表现出接近于消失的相对电荷密度的不同的前序尺度，这意味着魔法比纠缠熵对电荷密度波动更鲁棒。我们针对两个具有保守 $U(1)$ 电荷的混沌多体系统的中谱本征态测试了我们的分析预测：复杂费米子 Sachdev-Ye-Kitaev (cSYK) 模型和具有次近邻耦合和守恒磁化强度的海森堡 XXZ 链。我们发现非局部 cSYK 模型与局部 XXZ 链的系统偏差非常一致，突出了交互局部性的作用。", "authors": [{"name": "Daniele Iannotti"}, {"name": "Angelo Russotto"}, {"name": "Barbara Jasser"}, {"name": "Jovan Odavić"}, {"name": "Alioscia Hamma"}], "featured_authors": [{"name": "Daniele Iannotti"}, {"name": "Angelo Russotto"}, {"name": "Barbara Jasser"}, {"name": "Jovan Odavić"}, {"name": "Alioscia Hamma"}], "author_count": 5}, {"id": "2603.28894", "category": "quant-ph", "title": "Process-tensor approach to full counting statistics of charge transport in quantum many-body circuits", "abstract": "We introduce a numerical tensor-network method to compute the statistics of the charge transferred across an interface partitioning an interacting one-dimensional many-body lattice system with $U(1)$ symmetry. Our approach is based on a matrix-product state representation of the process tensor (also known as influence functional or influence matrix) describing the effect of the bulk system on the degrees of freedom at the interface, allowing us to evaluate a multi-time correlation function that yields the moment-generating function of charge transfer. We develop a scheme to truncate non-Markovian correlations which preserves the proper normalization of the process tensor and ensures the correct physical properties of the generating function. We benchmark our approach by simulating magnetization transport within the Heisenberg spin-$1/2$ XXZ brickwork circuit model at infinite temperature. Our results recover the correct transport exponent describing ballistic, superdiffusive, and diffusive transport in different regimes of the model. We also demonstrate anomalous transport encoded by a self-similar scaling form of the moment-generating function outside of the ballistic regime. In particular, we confirm the breakdown of Kardar-Parisi-Zhang universality in higher-order transport cumulants at the isotropic point. Our work paves the way for process-tensor descriptions of non-Markovian open quantum systems to address current fluctuations in strongly interacting systems far from equilibrium.", "url": "https://arxiv.org/abs/2603.28894", "type": "理论+数值", "summary": "我们引入了一种数值张量网络方法来计算跨界面转移的电荷统计数据，该界面划分具有 $U(1)$ 对称性的交互一维多体晶格系统。我们的方法基于过程张量的矩阵乘积状态表示（也称为影响函数或影响矩阵），描述了体系统对界面自由度的影响，使我们能够评估产生电荷转移矩生成函数的多时间相关函数。我们开发了一种截断非马尔可夫相关性的方案，该方案保留过程张量的适当归一化并确保生成函数的正确物理属性。我们通过在无限温度下模拟海森堡自旋 $1/2$ XXZ 砖砌电路模型内的磁化传输来对我们的方法进行基准测试。我们的结果恢复了正确的传输指数，描述了模型不同状态下的弹道、超扩散和扩散传输。我们还证明了由弹道范围之外的矩生成函数的自相似缩放形式编码的异常传输。\n\n特别是，我们确认了各向同性点处高阶输运累积量的 Kardar-Parisi-Zhang 普适性的崩溃。我们的工作为非马尔可夫开放量子系统的过程张量描述铺平了道路，以解决远离平衡的强相互作用系统中的当前波动。", "authors": [{"name": "Hari Kumar Yadalam"}, {"name": "Mark T. Mitchison"}], "featured_authors": [{"name": "Hari Kumar Yadalam"}, {"name": "Mark T. Mitchison"}], "author_count": 2}, {"id": "2603.28983", "category": "quant-ph", "title": "Can Quantum Field Theory be Recovered from Time-Symmetric Stochastic Mechanics? Part II: Prospects for a Trajectory Interpretation", "abstract": "In a companion paper we derived a unique time-reversal-invariant stochastic generalization of the Liouville equation and showed that it coincides with the evolution equation for the Husimi $Q$-function in a broad class of bosonic quantum field theories. Here we investigate the prospects for interpreting that evolution equation in terms of underlying stochastic trajectories. Drawing on Drummond's time-symmetric stochastic action formalism, we show that the traceless diffusion Fokker-Planck equation defines a natural measure over stochastic trajectories conditional on mixed-time boundary conditions. However, we identify a significant gap: it has not been established that every $Q$-function can be represented as a weighted average of these conditional probabilities over boundary values. The trajectory interpretation holds for ensembles with fixed boundary conditions but does not straightforwardly extend to arbitrary quantum states. Despite this limitation, we show that Drummond's trajectory dynamics are fundamentally non-Markovian -- a natural consequence of combining stochasticity with time-reversal invariance. This non-Markovianity places the dynamics outside the scope of the ontological models framework and thereby explains why the major no-go theorems for hidden-variable theories do not rule out the approach. These results clarify both the achievements and the remaining challenges in the project of understanding quantum field theory as the statistical mechanics of time-symmetric stochastic processes.", "url": "https://arxiv.org/abs/2603.28983", "type": "理论", "summary": "在一篇配套论文中，我们推导了刘维尔方程的一个独特的时间反转不变随机推广，并表明它与一大类玻色子量子场论中的 Husimi $Q$ 函数的演化方程一致。在这里，我们研究了根据潜在的随机轨迹解释进化方程的前景。利用德拉蒙德的时间对称随机作用形式，我们证明无痕扩散福克-普朗克方程定义了以混合时间边界条件为条件的随机轨迹的自然测度。然而，我们发现了一个显着的差距：尚未确定每个 $Q$ 函数都可以表示为这些条件概率在边界值上的加权平均值。轨迹解释适用于具有固定边界条件的系综，但不能直接扩展到任意量子态。尽管存在这种限制，我们表明德拉蒙德的轨迹动力学基本上是非马尔可夫的——这是随机性与时间反转不变性相结合的自然结果。\n\n这种非马尔可夫性将动力学置于本体论模型框架的范围之外，从而解释了为什么隐变量理论的主要不可行定理不排除该方法。这些结果阐明了将量子场论理解为时间对称随机过程的统计力学的项目所取得的成就和剩余的挑战。", "authors": [{"name": "Simon Friederich"}, {"name": "Mritunjay Tyagi"}], "featured_authors": [{"name": "Simon Friederich"}, {"name": "Mritunjay Tyagi"}], "author_count": 2}, {"id": "2603.29196", "category": "quant-ph", "title": "Calculating the quantum Fisher information via the truncated Wigner method", "abstract": "In this work, we propose new methods of parameter estimation using stochastic sampling quantum phase-space simulations. We show that it is possible to compute the quantum Fisher information (QFI) from semiclassical stochastic samples using the Truncated Wigner Approximation (TWA). This method extends the class of quantum systems whose fundamental sensitivity limit can be computed efficiently to any system that can be modelled using the TWA, allowing the analysis of more meteorologically useful quantum states. We illustrate this approach with examples, including a system that evolves outside the spin-squeezing regime, where the method of moments fails.", "url": "https://arxiv.org/abs/2603.29196", "type": "理论+数值", "summary": "在这项工作中，我们提出了使用随机采样量子相空间模拟进行参数估计的新方法。我们证明可以使用截断维格纳近似（TWA）从半经典随机样本计算量子费希尔信息（QFI）。该方法将可以有效计算基本灵敏度极限的量子系统类别扩展到可以使用 TWA 建模的任何系统，从而允许分析在气象上更有用的量子态。我们用例子来说明这种方法，包括一个在自旋挤压状态之外演化的系统，其中矩量法失败了。", "authors": [{"name": "Thakur G. M. Hiranandani"}, {"name": "Joseph J. Hope"}, {"name": "Simon A. Haine"}], "featured_authors": [{"name": "Thakur G. M. Hiranandani"}, {"name": "Joseph J. Hope"}, {"name": "Simon A. Haine"}], "author_count": 3}, {"id": "2603.29256", "category": "quant-ph", "title": "From Promises to Totality: A Framework for Ruling Out Quantum Speedups", "abstract": "We study when partial Boolean functions can (and cannot) exhibit superpolynomial quantum query speedups, and develop a general framework for ruling out such speedups via two complementary lenses: promise-aware complexity measures and function completions. First, we introduce promise versions of standard combinatorial measures (including block sensitivity and related variants) and prove that if the relevant promise and completion measures collapse, then deterministic and quantum query complexities are necessarily polynomially related, i.e., $D(f)=poly(Q(f))$. We then analyze structured families of promises, including symmetric partial functions and promises supported on Hamming slices, obtaining sharp (up to polynomial factors) characterizations in terms of a single gap parameter for the symmetric case and refined slice-dependent bounds for $k$-slice domains. Next, we formalize completion complexity as the minimum of a measure over total completions of a partial function, and show that completability of a measure captures the possibility of superpolynomial quantum speedups. Finally, we apply this viewpoint to derive broad non-speedup criteria for some classes of functions admitting well-behaved completions, such as functions with low maximum influence on both the standard and $p$-biased hypercubes and functions with efficiently identifiable domains, and then show some hardness results for general completion techniques.", "url": "https://arxiv.org/abs/2603.29256", "type": "理论", "summary": "我们研究部分布尔函数何时可以（或不能）表现出超多项式量子查询加速，并开发一个通用框架，通过两个互补的镜头排除此类加速：承诺感知的复杂性度量和函数完成。首先，我们引入标准组合度量的承诺版本（包括块敏感性和相关变体），并证明如果相关承诺和完成度量崩溃，则确定性和量子查询复杂性必然是多项式相关的，即$D(f)=poly(Q(f))$。然后，我们分析结构化的 Promise 系列，包括对称偏函数和汉明切片支持的 Promise，根据对称情况的单个间隙参数和 $k$-切片域的细化切片相关边界获得清晰的（最多多项式因子）特征。接下来，我们将完成复杂度形式化为部分函数总完成的度量的最小值，并表明度量的可完成性捕获了超多项式量子加速的可能性。\n\n最后，我们应用这一观点为某些允许良好完成的函数类别得出广泛的非加速标准，例如对标准和 $p$ 偏向超立方体具有较低最大影响的函数以及具有有效可识别域的函数，然后显示一般完成技术的一些硬度结果。", "authors": [{"name": "Thomas Huffstutler"}, {"name": "Upendra Kapshikar"}, {"name": "David Miloschewsky"}, {"name": "Supartha Podder"}], "featured_authors": [{"name": "Thomas Huffstutler"}, {"name": "Upendra Kapshikar"}, {"name": "David Miloschewsky"}, {"name": "Supartha Podder"}], "author_count": 4}, {"id": "2603.29290", "category": "quant-ph", "title": "Entanglement between an NV Center and Chiral Photons in a Topological SWCNT Plasmonic Microtoroid", "abstract": "We present a theoretical proposal for a hybrid solid-state quantum node based on a single nitrogen-vacancy (NV) center coupled to a topological single-walled carbon nanotube (SWCNT) plasmonic microtoroid. The SWCNT ring supports deeply sub-wavelength whispering-gallery-like plasmonic modes that are naturally described within a Tomonaga-Luttinger liquid framework. Owing to the closed-ring topology, the cavity spectrum contains a zero-mode sector that is tunable by an external magnetic flux through an Aharonov-Bohm shift. We show that the strongly confined CNT near field can exhibit chiral spin-momentum locking, enabling the two circularly polarized NV transitions to couple selectively to clockwise and counter-clockwise cavity modes, while the parasitic linearly polarized $\\pi$-transition is strongly suppressed by the pronounced anisotropy of the local Purcell enhancement. Based on a tripod stimulated Raman adiabatic passage (STIRAP) scheme, the system can in principle map the NV spin onto a spin-photon entangled state in a deterministic manner, which is then emitted into a side-coupled tapered optical fiber as a tunable flying qubit. We derive the cavity spectrum, the chiral selection rules, the effective tripod Hamiltonian, and the open-system master equation. Quantitative estimates indicate that, under cryogenic conditions and in the overcoupled regime, high-fidelity spin-photon entanglement and in situ magnetic tuning of the emitted photon frequency are in principle achievable. We also discuss a realistic fabrication route for the CNT resonator and deterministic positioning strategies for a single NV center in the CNT near field.", "url": "https://arxiv.org/abs/2603.29290", "type": "理论", "summary": "我们提出了基于单个氮空位（NV）中心与拓扑单壁碳纳米管（SWCNT）等离子体微环形体耦合的混合固态量子节点的理论建议。 SWCNT 环支持深亚波长回音壁等等离子体模式，这些模式在 Tomonaga-Luttinger 液体框架内自然描述。由于闭环拓扑，腔频谱包含一个零模扇区，可通过阿哈罗诺夫-玻姆位移通过外部磁通量进行调谐。我们表明，强约束的 CNT 近场可以表现出手性自旋动量锁定，使两个圆偏振 NV 跃迁能够选择性地耦合到顺时针和逆时针腔模式，而寄生线性偏振 $\\pi$ 跃迁受到局部 Purcell 增强的显着各向异性的强烈抑制。基于三脚架受激拉曼绝热通道（STIRAP）方案，该系统原则上可以确定性地将NV自旋映射到自旋光子纠缠态，然后将其作为可调谐飞行量子位发射到侧耦合锥形光纤中。\n\n我们推导了腔谱、手性选择规则、有效三脚架哈密顿量和开放系统主方程。定量估计表明，在低温条件下和过耦合状态下，原则上可以实现高保真自旋光子纠缠和发射光子频率的原位磁调谐。我们还讨论了 CNT 谐振器的现实制造路线以及 CNT 近场中单个 NV 中心的确定性定位策略。", "authors": [{"name": "Fang-Yu Hong"}], "featured_authors": [{"name": "Fang-Yu Hong"}], "author_count": 1}, {"id": "2603.29489", "category": "quant-ph", "title": "Open Quantum Systems from Dynamical Constraints", "abstract": "Open quantum systems are traditionally described by decomposing the total Hilbert space into a system and an external environment, linked by an explicit interaction Hamiltonian. We propose an alternative framework in which the environment is not introduced as an independent sector a priori, but instead emerges from the dynamical activation of constraints in an initially constrained quantum system. Within Dirac quantization, the physical degrees of freedom define the system, whereas the constraint sector, once promoted to carry its own dynamics, functions as an environment. In this picture, the system-environment coupling is not added through a separate interaction term, but is encoded directly in the constraint structure. As an example, we study a quantum particle coupled to a Brownian-oscillator environment and show how the resulting environmental influence can be formulated in this constraint-based setting. Our results provide a new perspective on the origin of quantum environments and point toward a general framework for open quantum systems rooted in constrained quantization.", "url": "https://arxiv.org/abs/2603.29489", "type": "理论", "summary": "传统上，开放量子系统是通过将整个希尔伯特空间分解为系统和外部环境来描述的，并通过显式相互作用哈密顿量连接起来。我们提出了一种替代框架，其中环境不是先验地作为独立部门引入的，而是从初始受约束的量子系统中的约束的动态激活中产生的。在狄拉克量子化中，物理自由度定义了系统，而约束部分一旦提升为承载其自身的动力学，就充当环境。在这张图中，系统-环境耦合不是通过单独的交互项添加的，而是直接编码在约束结构中。作为一个例子，我们研究了与布朗振荡器环境耦合的量子粒子，并展示了如何在这种基于约束的设置中制定所产生的环境影响。我们的结果为量子环境的起源提供了新的视角，并指出了基于约束量子化的开放量子系统的通用框架。", "authors": [{"name": "Yu Su"}, {"name": "Yao Wang"}], "featured_authors": [{"name": "Yu Su"}, {"name": "Yao Wang"}], "author_count": 2}, {"id": "2603.29536", "category": "quant-ph", "title": "Logical-to-Physical Compilation for Reducing Depth in Distributed Quantum Systems", "abstract": "Quantum computing is expected to become a foundational technology for solving problems that exceed the capabilities of classical systems. As quantum algorithms and hardware technologies continue to advance, the need for scalable architectures becomes increasingly clear. Distributed quantum computing offers a promising path forward by interconnecting multiple smaller processors into a larger, more powerful system. However, distributed quantum computing introduces significant circuit depth overhead, as logical operations are typically decomposed into sequential physical procedures that require entanglement generation. These sequential operations limit the reliability of quantum algorithms in the NISQ era due to noise. In this work, we present a compiler that integrates logical-to-physical decomposition with depth-aware rescheduling to reduce the execution cost of distributed quantum circuits. The compiler identifies sequences of logical CNOT gates that share a control or target qubit, reschedules them into parallel instruction groups, and applies decompositions that allow multiple gates to be executed simultaneously using distributed shared entanglement resources. An algorithm is proposed that ensures parallelism is created when possible while keeping logical equivalence and that circuit depth is never increased. Benchmark results demonstrate that the compiler consistently reduces circuit depth for circuits containing inherently sequential CNOT structures, while leaving already-parallel circuits unchanged. These results highlight the value of combining scheduling and hardware-aware decomposition, and establish the compiler as a practical tool for improving the fidelity of distributed quantum computations.", "url": "https://arxiv.org/abs/2603.29536", "type": "理论+数值", "summary": "量子计算有望成为解决超出经典系统能力的问题的基础技术。随着量子算法和硬件技术的不断进步，对可扩展架构的需求变得越来越明显。分布式量子计算通过将多个较小的处理器互连成一个更大、更强大的系统，提供了一条充满希望的前进道路。然而，分布式量子计算引入了显着的电路深度开销，因为逻辑操作通常被分解为需要纠缠生成的顺​​序物理过程。由于噪声，这些顺序操作限制了 NISQ 时代量子算法的可靠性。在这项工作中，我们提出了一种编译器，它将逻辑到物理分解与深度感知重新调度相结合，以降低分布式量子电路的执行成本。编译器识别共享控制或目标量子位的逻辑 CNOT 门序列，将它们重新安排到并行指令组中，并应用允许使用分布式共享纠缠资源同时执行多个门的分解。\n\n提出了一种算法，确保在可能的情况下创建并行性，同时保持逻辑等效性，并且电路深度永远不会增加。基准测试结果表明，编译器一致地减少了包含固有顺序 CNOT 结构的电路的电路深度，同时保持已经并行的电路不变。这些结果凸显了调度和硬件感知分解相结合的价值，并将编译器确立为提高分布式量子计算保真度的实用工具。", "authors": [{"name": "Folkert de Ronde"}, {"name": "Stephan Wong"}, {"name": "Sebastian Feld"}], "featured_authors": [{"name": "Folkert de Ronde"}, {"name": "Stephan Wong"}, {"name": "Sebastian Feld"}], "author_count": 3}, {"id": "2603.29543", "category": "quant-ph", "title": "Reducing Complexity for Quantum Approaches in Train Load Optimization", "abstract": "Efficiently planning container loads onto trains is a computationally challenging combinatorial optimization problem, central to logistics and supply chain management. A primary source of this complexity arises from the need to model and reduce rehandle operations-unproductive crane moves required to access blocked containers. Conventional mathematical formulations address this by introducing explicit binary variables and a web of logical constraints for each potential rehandle, resulting in large-scale models that are difficult to solve. This paper presents a fundamental departure from this paradigm. We introduce an innovative and compact mathematical formulation for the Train Load Optimization (TLO) problem where the rehandle cost is calculated implicitly within the objective function. This novel approach helps prevent the need for dedicated rehandle variables and their associated constraints, leading to a dramatic reduction in model size. We provide a formal comparison against a conventional model to analytically demonstrate the significant reduction in the number of variables and constraints. The efficacy of our compact formulation is assessed through a simulated annealing metaheuristic, which finds high-quality loading plans for various problem instances. The results confirm that our model is not only more parsimonious but also practically effective, offering a scalable and powerful tool for modern rail logistics.", "url": "https://arxiv.org/abs/2603.29543", "type": "理论+数值", "summary": "有效规划火车上的集装箱装载是一个计算上具有挑战性的组合优化问题，是物流和供应链管理的核心。这种复杂性的主要原因是需要建模和减少重新装卸操作——访问堵塞的集装箱所需的非生产性起重机移动。传统的数学公式通过为每个潜在的重新处理引入显式的二元变量和逻辑约束网络来解决这个问题，从而导致难以求解的大规模模型。本文提出了与这一范式的根本背离。我们为列车负载优化（TLO）问题引入了一种创新且紧凑的数学公式，其中重新处理成本是在目标函数中隐式计算的。这种新颖的方法有助于避免对专用重新处理变量及其相关约束的需要，从而显着减小模型大小。我们提供了与传统模型的正式比较，以分析证明变量和约束数量的显着减少。\n\n我们的紧凑公式的功效是通过模拟退火元启发法进行评估的，该方法可以为各种问题实例找到高质量的加载计划。结果证实，我们的模型不仅更加简约，而且实际上有效，为现代铁路物流提供了可扩展且强大的工具。", "authors": [{"name": "Zhijie Tang"}, {"name": "Albert Nieto-Morales"}, {"name": "Arit Kumar Bishwas"}], "featured_authors": [{"name": "Zhijie Tang"}, {"name": "Albert Nieto-Morales"}, {"name": "Arit Kumar Bishwas"}], "author_count": 3}, {"id": "2603.29574", "category": "quant-ph", "title": "Adiabatic Ramsey Interferometry for Measuring Weak Nonlinearities with Super-Heisenberg Precision", "abstract": "We propose an adiabatic Ramsey interferometry technique for detecting weak nonlinearities with trapped ions. The method relies on using the quantum Rabi model as a probe, which is sensitive to nonlinear symmetry-breaking perturbations. We show that the couplings which arise either from anharmonic terms of the trapping potential or due to higher order terms in the Coulomb interaction expansion can be efficiently estimated by measuring the spin state probabilities alone. We show that the spin signal is amplified by the mean-phonon excitations, which results in the estimation precision reaching the super-Heisenberg limit. Notably, achieving such high-precision estimation does not require specific entangled state preparation and can be reached even for initial thermal motion state. Furthermore, we show that the super-Heisenberg scaling can be observed even in the presence of weak spin-dephasing.", "url": "https://arxiv.org/abs/2603.29574", "type": "理论", "summary": "我们提出了一种绝热拉姆齐干涉技术，用于检测捕获离子的弱非线性。该方法依赖于使用量子拉比模型作为探针，该模型对非线性对称破缺扰动敏感。我们表明，由捕获势的非谐项或库仑相互作用展开中的高阶项引起的耦合可以通过单独测量自旋态概率来有效地估计。我们表明，自旋信号被平均声子激励放大，导致估计精度达到超海森堡极限。值得注意的是，实现如此高精度的估计不需要特定的纠缠态准备，甚至对于初始热运动状态也可以实现。此外，我们表明，即使存在弱自旋相移，也可以观察到超海森堡标度。", "authors": [{"name": "Venelin P. Pavlov"}, {"name": "Bogomila S. Nikolova"}, {"name": "Peter A. Ivanov"}], "featured_authors": [{"name": "Venelin P. Pavlov"}, {"name": "Bogomila S. Nikolova"}, {"name": "Peter A. Ivanov"}], "author_count": 3}, {"id": "2603.29601", "category": "quant-ph", "title": "Quantum connectivity of quantum networks", "abstract": "The practical utility of a quantum network depends on its ability to establish entanglement between arbitrary node pairs with quality sufficient to execute entanglement enabled tasks. This capability can be assessed globally, through aggregate performance over all node pairs, as well as locally, at the level of individual nodes. Since entanglement-based connections form a layer above the underlying physical topology, quantum connectivity is not adequately captured by classical topological connectivity metrics. To enable characterisation of the quantum connectivity at the level of the network (or its subnetworks), we introduce the quantum connectivity measure (QCM), which quantifies the average connection quality between pairs of network nodes. Further, we describe two quantities, the quantum-connected fraction (QCF) and the quantum clustering coefficient (QCC), naturally derived from the QCM, which capture important features of the functional connectivity of the quantum network at the level of the network and an individual node, respectively. These metrics of quantum connectivity depend crucially on the entanglement distribution protocol and the quantum network parameters in addition to its physical topology. We demonstrate the crucial distinction between topological and quantum connectivity, showing that even a fully connected graph can be functionally disconnected for quantum tasks if average network edge-concurrence falls below a critical threshold. These quantum connectivity metrics thus provide important tools for the design, optimization, and benchmarking of future quantum networks.", "url": "https://arxiv.org/abs/2603.29601", "type": "理论+数值", "summary": "量子网络的实际效用取决于其在任意节点对之间建立纠缠的能力，其质量足以执行纠缠启用的任务。这种能力可以通过所有节点对的聚合性能进行全局评估，也可以在单个节点的级别进行本地评估。由于基于纠缠的连接形成了底层物理拓扑之上的一层，因此经典的拓扑连接度量无法充分捕获量子连接。为了能够表征网络（或其子网络）级别的量子连接性，我们引入了量子连接性度量（QCM），它量化了网络节点对之间的平均连接质量。此外，我们描述了两个量，即量子连通分数（QCF）和量子聚类系数（QCC），它们自然源自 QCM，它们分别捕获网络和单个节点层面上量子网络功能连接的重要特征。\n\n除了物理拓扑之外，这些量子连通性指标还主要取决于纠缠分布协议和量子网络参数。我们展示了拓扑连接和量子连接之间的关键区别，表明如果平均网络边缘并发低于临界阈值，即使是完全连接的图也可以在量子任务中功能断开。因此，这些量子连接指标为未来量子网络的设计、优化和基准测试提供了重要工具。", "authors": [{"name": "Md Sohel Mondal"}, {"name": "Shashank Shekhar"}, {"name": "Siddhartha Santra"}], "featured_authors": [{"name": "Md Sohel Mondal"}, {"name": "Shashank Shekhar"}, {"name": "Siddhartha Santra"}], "author_count": 3}, {"id": "2603.29650", "category": "quant-ph", "title": "Non-Equilibrium Sock Dynamics: Spontaneous Symmetry Breaking in the Agitated Wash", "abstract": "It is a universal empirical observation that socks become unpaired in the laundry. We propose a quasiparticle theory of sock dynamics in which individual socks are modelled as bosonic excitations of the agitated laundry condensate. The sock dispersion relation is material-dependent: nondispersive materials retain their shape, while dispersive materials give rise to the well-documented phenomenon of sock shrinkage. In the convex regions of the dispersive spectrum, socks undergo Beliaev decay and spontaneously split into two lower-momentum socks, while in the concave regions the dominant process is Landau-Khalatnikov scattering, which degrades socks into lint and loose threads. In addition, the rotating drum creates sock-antisock pairs from the laundry vacuum via the dynamical Casimir effect. The coexistence of these creation and destruction channels gives rise to a fundamental ambiguity: an unpaired sock at the end of a wash cycle is equally consistent with the destruction of its partner or the spontaneous creation of an entirely new sock.", "url": "https://arxiv.org/abs/2603.29650", "type": "理论", "summary": "普遍的经验观察发现，袜子在洗衣时会变得不成对。我们提出了袜子动力学的准粒子理论，其中将每只袜子建模为搅拌的洗衣凝结水的玻色子激发。袜子色散关系取决于材料：非色散材料保持其形状，而色散材料会产生有据可查的袜子收缩现象。在色散谱的凸面区域，袜子经历别利亚耶夫衰变并自发分裂成两个较低动量的袜子，而在凹面区域，主要过程是朗道-哈拉特尼科夫散射，它将袜子降解成绒毛和松线。此外，旋转滚筒通过动态卡西米尔效应从洗衣真空吸尘器中产生袜子-反袜子对。这些创造和破坏渠道的共存导致了一个根本性的模糊性：在洗涤周期结束时，一只未配对的袜子同样与其伴侣的破坏或全新袜子的自发创造一致。", "authors": [{"name": "Ahmad Darwish"}, {"name": "Matteo Murdaca"}, {"name": "Jami J. Kinnunen"}], "featured_authors": [{"name": "Ahmad Darwish"}, {"name": "Matteo Murdaca"}, {"name": "Jami J. Kinnunen"}], "author_count": 3}, {"id": "2603.29669", "category": "quant-ph", "title": "The Manipulate-and-Observe Attack on Quantum Key Distribution", "abstract": "Quantum key distribution is often regarded as an unconditionally secure method to exchange a secret key by harnessing fundamental aspects of quantum mechanics. Despite the robustness of key exchange, classical post-processing reveals vulnerabilities that an eavesdropper could target. In particular, many reconciliation protocols correct errors by comparing the parities of subsets between both parties. These communications occur over insecure channels, leaking information that an eavesdropper could exploit. Currently there is no holistic threat model that addresses how parity-leakage during reconciliation might be actively manipulated. In this paper we introduce a new form of attack, namely the Manipulate-and-Observe attack in which the adversary (1) partially intercepts a fraction $\\rho$ of the qubits during key exchange, injecting the maximally tolerated amount of errors up to the 11 percent error threshold whilst remaining undetected and (2) probes the maximum amount of parity-leakage during reconciliation, and exploits it using a vectorised, parallel brute force filter to shrink the search space from 2n down to as few as a single candidate, for an n-bit reconciled key. We perform simulations of the attack, deploying it on the most widely used protocol, BB84, andthe benchmark reconciliation protocol, Cascade. Our simulation results demonstrate that the attack can significantly reduce the security below the theoretical bound and, in the worst case, fully recover the reconciled key material. The principles of the attack could threaten other parity-based reconciliation schemes, like Low Density Parity Check, which underscores the need for urgent consideration of the combined security of key exchange and post-processing.", "url": "https://arxiv.org/abs/2603.29669", "type": "理论+数值", "summary": "量子密钥分发通常被认为是利用量子力学的基本方面来交换密钥的无条件安全方法。尽管密钥交换具有鲁棒性，但经典的后处理揭示了窃听者可能瞄准的漏洞。特别是，许多协调协议通过比较双方之间子集的奇偶性来纠正错误。这些通信发生在不安全的通道上，泄露了窃听者可能利用的信息。目前还没有整体的威胁模型来解决如何主动操纵协调期间的奇偶校验泄漏。在本文中，我们介绍了一种新的攻击形式，即操纵观察攻击，其中对手 (1) 在密钥交换期间部分拦截量子位的一小部分 $\\rho$，注入最大可容忍的错误量，高达 11% 的错误阈值，同时保持不被发现；(2) 在协调期间探测奇偶校验泄漏的最大量，并使用矢量化并行强力过滤器来利用它来缩小对于 n 位协调密钥，搜索空间从 2n 减少到单个候选者。\n\n我们对攻击进行模拟，将其部署在最广泛使用的协议 BB84 和基准协调协议 Cascade 上。我们的模拟结果表明，该攻击可以显着地将安全性降低到理论界限以下，并且在最坏的情况下，完全恢复协调的密钥材料。该攻击的原理可能会威胁到其他基于奇偶校验的协调方案，例如低密度奇偶校验，这强调了迫切需要考虑密钥交换和后处理的组合安全性。", "authors": [{"name": "William Tighe"}, {"name": "George Brumpton"}, {"name": "Mark Carney"}, {"name": "Benjamin T. H. Varcoe"}], "featured_authors": [{"name": "William Tighe"}, {"name": "George Brumpton"}, {"name": "Mark Carney"}, {"name": "Benjamin T. H. Varcoe"}], "author_count": 4}, {"id": "2603.29695", "category": "quant-ph", "title": "Probes of chaos over the Clifford group and approach to Haar values", "abstract": "Chaotic behavior of quantum systems can be characterized by the adherence of the expectation values of given probes to moments of the Haar distribution. In this work, we analyze the behavior of several probes of chaos using a technique known as Isospectral Twirling [1]. This consists in fixing the spectrum of the Hamiltonian and picking its eigenvectors at random. Here, we study the transition from stabilizer bases to random bases according to the Haar measure by T-doped random quantum circuits. We then compute the average value of the probes over ensembles of random spectra from Random Matrix Theory, the Gaussian Diagonal Ensemble and the Gaussian Unitary Ensemble, associated with non-chaotic and chaotic behavior respectively. We also study the behavior of such probes over the Toric Code Hamiltonian.", "url": "https://arxiv.org/abs/2603.29695", "type": "理论", "summary": "量子系统的混沌行为可以通过给定探针的期望值遵守哈尔分布的矩来表征。在这项工作中，我们使用称为等谱旋转 [1] 的技术分析了几种混沌探测器的行为。这包括固定哈密顿量的谱并随机选取其特征向量。在这里，我们根据 T 掺杂随机量子电路的 Haar 测量研究从稳定碱基到随机碱基的转变。然后，我们根据随机矩阵理论、高斯对角系综和高斯酉系综计算随机光谱系综上的探针平均值，分别与非混沌和混沌行为相关。我们还研究了此类探针在环面代码哈密顿量上的行为。", "authors": [{"name": "Stefano Cusumano"}, {"name": "Gianluca Esposito"}, {"name": "Alioscia Hamma"}], "featured_authors": [{"name": "Stefano Cusumano"}, {"name": "Gianluca Esposito"}, {"name": "Alioscia Hamma"}], "author_count": 3}, {"id": "2603.29795", "category": "quant-ph", "title": "Topological sum rule for geometric phases of quantum gates", "abstract": "We establish a topological sum rule, $\\nu_U = \\frac{1}{2\\pi}\\sum_n\\gamma_n = 2m\\nu_H$, connecting the geometric phases accumulated by a two-qubit system over a complete basis of initial states to the winding number $\\nu_H$ classifying its Hamiltonian. Implementations of the same gate from different topological classes must distribute these phases differently, making their distinction measurable through the Wootters concurrence. As a corollary, nontrivial topology is a necessary condition for entanglement: only Hamiltonians with access to $\\nu_H \\neq 0$ can generate it.", "url": "https://arxiv.org/abs/2603.29795", "type": "理论", "summary": "我们建立了一个拓扑求和规则 $\\nu_U = \\frac{1}{2\\pi}\\sum_n\\gamma_n = 2m\\nu_H$，将两个量子位系统在初始状态的完整基础上累积的几何相位连接到对其哈密顿量进行分类的绕数 $\\nu_H$。来自不同拓扑类别的同一门的实现必须以不同的方式分布这些相位，从而使它们的区别可以通过伍特斯并发来测量。作为推论，非平凡拓扑是纠缠的必要条件：只有能够访问 $\\nu_H \\neq 0$ 的哈密顿量才能生成它。", "authors": [{"name": "Nadav Orion"}, {"name": "Boris Rotstein"}, {"name": "Nirron Miller"}, {"name": "Eric Akkermans"}], "featured_authors": [{"name": "Nadav Orion"}, {"name": "Boris Rotstein"}, {"name": "Nirron Miller"}, {"name": "Eric Akkermans"}], "author_count": 4}, {"id": "2603.29811", "category": "quant-ph", "title": "Floquet Codes from Derived Semi-Regular Hyperbolic Tessellations on Orientable and Non-Orientable Surfaces", "abstract": "In this paper, we construct several new quantum Floquet codes on compact, orientable, as well as non-orientable surfaces. In order to obtain such codes, we identify these surfaces with hyperbolic polygons and examine hyperbolic semi-regular tessellations on such surfaces. The method of construction presented here generalizes similar constructions concerning hyperbolic Floquet codes on connected and compact surfaces with genus $g \\geq 2$. A performance analysis and an investigation of the asymptotic behavior of these codes are also presented.", "url": "https://arxiv.org/abs/2603.29811", "type": "理论", "summary": "在本文中，我们在紧凑、可定向和不可定向表面上构建了几种新的量子 Floquet 代码。为了获得这样的代码，我们用双曲多边形识别这些表面，并检查这些表面上的双曲半规则镶嵌。这里提出的构造方法概括了关于具有 $g \\geq 2$ 的连通且紧致曲面上的双曲 Floquet 码的类似构造。还介绍了这些代码的性能分析和渐近行为的研究。", "authors": [{"name": "Douglas F. Copatti"}, {"name": "Giuliano G. La Guardia"}, {"name": "Waldir S. Soares"}, {"name": "Edson D. Carvalho"}, {"name": "Eduardo B. Silva"}], "featured_authors": [{"name": "Douglas F. Copatti"}, {"name": "Giuliano G. La Guardia"}, {"name": "Waldir S. Soares"}, {"name": "Edson D. Carvalho"}, {"name": "Eduardo B. Silva"}], "author_count": 5}, {"id": "2603.29857", "category": "quant-ph", "title": "Trotter Scars: Trotter Error Suppression in Quantum Simulation", "abstract": "Recent studies have shown that Trotter errors are highly initial-state dependent and that standard upper bounds often substantially overestimate them. However, the mechanism underlying anomalously small Trotter errors and a systematic route to identifying error-resilient states remain unclear. Using interaction-picture perturbation theory, we derive an analytical expression for the leading-order Trotter error in the eigenbasis of the Hamiltonian. Our analysis shows that initial states supported on spectrally commensurate energy ladders exhibit strongly suppressed error growth together with persistent Loschmidt revivals. We refer to such states as Trotter scars. To identify such states in practice, we further introduce a general variational framework for finding error-minimizing initial states for a given Hamiltonian. Applying this framework to several spin models, we find optimized states whose spectral support and dynamical behavior agree with the perturbative prediction. Our results reveal the spectral origin of Trotter-error resilience and provide a practical strategy for discovering error-resilient states in digital quantum simulation.", "url": "https://arxiv.org/abs/2603.29857", "type": "理论+数值", "summary": "最近的研究表明，Trotter 误差高度依赖于初始状态，并且标准上限通常会大大高估它们。然而，异常小的 Trotter 错误背后的机制以及识别错误弹性状态的系统途径仍不清楚。利用交互图像扰动理论，我们推导了哈密顿量特征基中前导 Trotter 误差的解析表达式。我们的分析表明，光谱相当的能梯支持的初始状态表现出强烈抑制的误差增长以及持续的洛施密特复兴。我们将这种状态称为 Trotter 疤痕。为了在实践中识别此类状态，我们进一步引入了一个通用变分框架，用于为给定的哈密顿量找到误差最小化初始状态。将该框架应用于多个自旋模型，我们发现了其光谱支持和动力学行为与微扰预测一致的优化状态。我们的结果揭示了 Trotter 误差恢复的光谱起源，并为在数字量子模拟中发现误差恢复状态提供了实用策略。", "authors": [{"name": "Bozhen Zhou"}, {"name": "Qi Zhao"}, {"name": "Pan Zhang"}], "featured_authors": [{"name": "Bozhen Zhou"}, {"name": "Qi Zhao"}, {"name": "Pan Zhang"}], "author_count": 3}, {"id": "2603.29894", "category": "quant-ph", "title": "LLM-Guided Evolutionary Search for Algebraic T-Count Optimization", "abstract": "Reducing the non-Clifford cost of fault-tolerant quantum circuits is a central challenge in quantum compilation, since T gates are typically far more expensive than Clifford operations in error-corrected architectures. For Clifford+T circuits, minimizing T-count remains a difficult combinatorial problem even for highly structured algebraic optimizers. We introduce VarTODD, a policy-parameterized variant of FastTODD in which the correctness-preserving algebraic transformations are left unchanged while candidate generation, pooling, and action selection are exposed as tunable heuristic components. This separates the quality of the algebraic rewrite system from the quality of the search policy. On standard arithmetic benchmarks, fixed hand-designed VarTODD policies already match or improve strong FastTODD baselines, including reductions from 147 to 139 for GF(2^9) and from 173 to 163 for GF(2^10) in the corresponding benchmark branches. As a proof of principle for automated tuning, we then optimize VarTODD policies with GigaEvo, an LLM-guided evolutionary framework, and obtain additional gains on harder instances, reaching 157 for GF(2^10) and 385 for GF(2^16). These results identify policy optimization as an independent and practical lever for improving algebraic T-count reduction, while LLM-guided evolution provides one viable way to exploit it.", "url": "https://arxiv.org/abs/2603.29894", "type": "理论+数值", "summary": "降低容错量子电路的非 Clifford 成本是量子编译中的一个核心挑战，因为 T 门通常比纠错架构中的 Clifford 操作昂贵得多。对于 Clifford+T 电路，即使对于高度结构化的代数优化器，最小化 T 计数仍然是一个困难的组合问题。我们引入了 VarTODD，它是 FastTODD 的策略参数化变体，其中保持正确性的代数变换保持不变，而候选生成、池化和动作选择作为可调整的启发式组件公开。这将代数重写系统的质量与搜索策略的质量分开。在标准算术基准上，固定的手工设计的 VarTODD 策略已经匹配或改进了强大的 FastTODD 基线，包括相应基准分支中 GF(2^9) 从 147 减少到 139，GF(2^10) 从 173 减少到 163。作为自动调优的原理证明，我们随后使用 GigaEvo（LLM 引导的进化框架）优化 VarTODD 策略，并在更困难的实例上获得额外收益，GF(2^10) 达到 157，GF(2^16) 达到 385。\n\n这些结果将策略优化视为改进代数 T 计数减少的独立且实用的杠杆，而 LLM 引导的进化提供了一种利用它的可行方法。", "authors": [{"name": "Daniil Fisher"}, {"name": "Valentin Khrulkov"}, {"name": "Mikhail Saygin"}, {"name": "Ivan Oseledets"}, {"name": "Stanislav Straupe"}], "featured_authors": [{"name": "Daniil Fisher"}, {"name": "Valentin Khrulkov"}, {"name": "Mikhail Saygin"}, {"name": "Ivan Oseledets"}, {"name": "Stanislav Straupe"}], "author_count": 5}, {"id": "2603.30015", "category": "quant-ph", "title": "Noise Inference by Recycling Test Rounds in Verification Protocols", "abstract": "Interactive verification protocols for quantum computations allow to build trust between a client and a service provider, ensuring the former that the instructed computation was carried out faithfully. They come in two variants, one without quantum communication that requires large overhead on the server side to coherently implement quantum-resistant cryptographic primitives, and one with quantum communication but with repetition as the only overhead on the service provider's side. Given the limited number of available qubits on current machines, only quantum communication-based protocols have yielded proof of concepts. In this work, we show that the repetition overhead of protocols with quantum communication can be further mitigated if one examines the task of operating a quantum machine from the service provider's point of view. Indeed, we show that the test rounds data, whose collection is necessary to provide security, can indeed be recycled to perform continuous monitoring of noise model parameters for the service provider. T
