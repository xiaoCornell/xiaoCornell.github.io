泛的原子间相互作用，从而能够在平衡和极端条件下进行可靠的模拟，包括 SiO$_2$ 的等离子蚀刻。静态和动态特性（例如锂离子扩散和液体密度）的综合基准证明了其广泛的适用性，只需最少的微调。\n\n重要的是，SevenNet-Nano 显着降低了计算成本，实现了数量级的加速，并实现了涉及数千个原子的大规模原子模拟。", "authors": [{"name": "Sangmin Oh"}, {"name": "Jinmu You"}, {"name": "Jaesun Kim"}, {"name": "Jiho Lee"}, {"name": "Hyungmin An"}, {"name": "Seungwu Han"}, {"name": "Youngho Kang"}], "featured_authors": [{"name": "Sangmin Oh"}, {"name": "Jinmu You"}, {"name": "Jaesun Kim"}, {"name": "Hyungmin An"}, {"name": "Seungwu Han"}, {"name": "Youngho Kang"}], "author_count": 7}, {"id": "2604.10890", "category": "cond-mat", "title": "Forecasting Return Time of Extreme Precipitation by Large Deviation Theory", "abstract": "Forecasting extreme precipitation is essential yet challenging due to its rarity and complexity. We develop a large deviation framework to estimate the return times of extreme precipitation events. We first find that the Landau distribution, originally introduced in plasma physics, accurately captures extreme precipitation at approximately 93% of global locations, outperforming conventional extreme value distributions with 76% matched locations under the same accuracy criterion. Enriching rare event samples by the fitted Landau distribution, we obtain more accurate estimates of large deviation rate functions and return times, enabling forecasts beyond historically observed precipitation intensities. Mapping historical return times to future projections from the Coupled Model Intercomparison Project Phase 6 (CMIP6), we show that return time curves under different emission scenarios collapse onto a unified relation, revealing a sharply increased lifetime exposure to extreme precipitation for 21st-century birth cohorts under most future emission scenarios.", "url": "https://arxiv.org/abs/2604.10890", "type": "理论", "summary": "由于极端降水的罕见性和复杂性，预测极端降水至关重要但也具有挑战性。我们开发了一个大偏差框架来估计极端降水事件的返回时间。我们首先发现，最初在等离子体物理学中引入的朗道分布准确地捕获了全球约 93% 位置的极端降水，优于传统的极值分布，在相同的精度标准下，匹配位置为 76%。通过拟合朗道分布丰富罕见事件样本，我们获得了对大偏差率函数和返回时间的更准确估计，从而能够进行超出历史观测到的降水强度的预测。将历史回归时间映射到耦合模型比对项目第 6 阶段 (CMIP6) 的未来预测，我们发现不同排放情景下的回归时间曲线崩溃为统一关系，揭示了在大多数未来排放情景下，21 世纪出生群体的终生暴露于极端降水的情况急剧增加。", "authors": [{"name": "Haotian Xie"}, {"name": "Haoxian Liu"}, {"name": "Jingfang Fan"}, {"name": "Ying Tang"}], "featured_authors": [{"name": "Haotian Xie"}, {"name": "Haoxian Liu"}, {"name": "Jingfang Fan"}, {"name": "Ying Tang"}], "author_count": 4}, {"id": "2604.10984", "category": "cond-mat", "title": "opt-DDAP: Optimisable density-derived atomic point charges via automatic differentiation", "abstract": "Interatomic potentials which accurately describe long-range electrostatics require atom-centred charges. One such method to determine these atom-centred charges from density functional theory (DFT) calculations is the density-derived atomic point (DDAP) charge method. DDAP fits atom-centred Gaussians to the ground-state DFT charge density and preserves the multipole moments that govern long-range electrostatics. While these charges accurately predict long-range behaviour, in practice, they are limited by their reliance on fixed, heuristic parameters and a constrained solver that becomes numerically unstable for complex or covalent systems. In this work, we present opt-DDAP, which solves this limitation by reformulating the algorithm as a differentiable computational graph. This reformulation allows for the optimisation of Gaussian basis parameters and the reciprocal-space cutoff using automatic differentiation. To ensure numerical robustness through this automatic differentiation process, we replace the conventional Lagrange-multiplier approach with a pseudo-inverse solution followed by charge renormalisation, maintaining stability even in the presence of ill-conditioned matrices. We validate the framework on NaCl vacancy supercells and on MoS$_2$, demonstrating faithful reconstruction of both absolute and difference charge densities. The optimised charges are intended to serve as inputs to effective electrostatic models in machine-learning and empirical interatomic potentials that incorporate long-range interactions.", "url": "https://arxiv.org/abs/2604.10984", "type": "理论+数值", "summary": "准确描述长程静电的原子间势需要以原子为中心的电荷。从密度泛函理论 (DFT) 计算中确定这些原子中心电荷的一种方法是密度衍生原子点 (DDAP) 电荷方法。 DDAP 将原子中心高斯函数拟合到基态 DFT 电荷密度，并保留控制长程静电的多极矩。虽然这些电荷准确地预测了远程行为，但实际上，它们受到对固定启发式参数和约束求解器的依赖的限制，这些约束求解器对于复杂或共价系统来说在数值上变得不稳定。在这项工作中，我们提出了 opt-DDAP，它通过将算法重新表述为可微计算图来解决这一限制。这种重新表述允许使用自动微分来优化高斯基参数和倒易空间截止。为了通过这种自动微分过程确保数值鲁棒性，我们用伪逆解取代了传统的拉格朗日乘子方法，然后进行电荷重正化，即使在病态矩阵存在的情况下也能保持稳定性。\n\n我们在 NaCl 空位超级电池和 MoS$_2$ 上验证了该框架，证明了绝对电荷密度和差异电荷密度的忠实重建。优化后的电荷旨在作为机器学习中有效静电模型和包含长程相互作用的经验原子间势的输入。", "authors": [{"name": "Mohith H."}, {"name": "Sudarshan Vijay"}], "featured_authors": [{"name": "Mohith H."}, {"name": "Sudarshan Vijay"}], "author_count": 2}, {"id": "2604.11015", "category": "cond-mat", "title": "Scar subspaces stabilized by algebraic closure: Beyond equally-spaced spectra and exact solvability", "abstract": "We construct a class of quantum many-body systems hosting an $\\mathfrak{su}(3)$-invariant scar subspace, extending the conventional paradigm of quantum many-body scars beyond equally spaced spectra and single-directional tower structures. Our construction is based on local constraints that realize an algebraic closure within the scar subspace. As a result, the spectrum in the subspace is no longer equally spaced, but instead forms a multidirectional lattice structure parametrized by multiple independent quantum numbers. This leads to qualitatively new dynamical signatures: instead of single-frequency revivals, the system exhibits multifrequency oscillations governed by integer linear combinations of distinct energy scales. Importantly, the stability of the scar subspace does not rely on exact solvability of individual eigenstates. We show that algebraic closure preserves the invariant subspace even under perturbations that render the eigenstates analytically intractable, thereby realizing quantum many-body scars on an unsolvable reference state. Our results identify algebraic closure as a unifying mechanism underlying scar subspaces beyond the conventional $\\mathfrak{su}(2)$ paradigm, and open a route toward richer nonthermal dynamics in nonintegrable quantum systems.", "url": "https://arxiv.org/abs/2604.11015", "type": "理论", "summary": "我们构建了一类具有 $\\mathfrak{su}(3)$ 不变疤痕子空间的量子多体系统，将量子多体疤痕的传统范式扩展到等距光谱和单向塔结构之外。我们的构造基于局部约束，实现疤痕子空间内的代数闭包。结果，子空间中的光谱不再是等间隔的，而是形成由多个独立量子数参数化的多向晶格结构。这导致了新的动态特征：系统表现出由不同能量尺度的整数线性组合控制的多频振荡，而不是单频复兴。重要的是，疤痕子空间的稳定性并不依赖于单个本征态的精确可解性。我们证明，即使在本征态分析上难以处理的扰动下，代数闭包也能保留不变子空间，从而在不可解的参考态上实现量子多体疤痕。\n\n我们的结果将代数闭包视为超越传统 $\\mathfrak{su}(2)$ 范式的疤痕子空间的统一机制，并为不可积量子系统中更丰富的非热动力学开辟了一条道路。", "authors": [{"name": "Chihiro Matsui"}], "featured_authors": [{"name": "Chihiro Matsui"}], "author_count": 1}, {"id": "2604.11054", "category": "cond-mat", "title": "Topological charge of fermions and Landau theory of Fermi liquid", "abstract": "In the fermionic liquids, the Fermi surface is topologically stable,\\cite{Volovik2003} which is at the origin of the applicability of the Landau theory of Fermi liquid (LFL). The LFL exists under special condition, when the Green's function has a pole with nonzero residue $Z$. Otherwise one has non-Landau Fermi liquid (NLFL), such as Luttinger liquid, which is described by the same topological invariant. It appears that in general this topological invariant is the property of the fermionic particle, i.e. the particle charge (or the electric charge of electron) is equivalent to the topological charge of the fermion. The conservation of the fermionic charge is equivalent to the conservation of the topological charge. We consider the application of this topological charge to the Landau theory of Fermi liquids. We also consider the application to non-Fermi liquids and crystalline insulators in relation to the Luttinger theorem.", "url": "https://arxiv.org/abs/2604.11054", "type": "理论", "summary": "在费米子液体中，费米表面是拓扑稳定的，\\cite{Volovik2003}，这是费米液体朗道理论（LFL）适用的起源。 LFL 在特殊条件下存在，即格林函数具有非零余数 $Z$ 的极点。否则，就有非朗道费米液体（NLFL），例如路廷格液体，它由相同的拓扑不变量描述。看来，一般来说，这种拓扑不变量是费米子粒子的属性，即粒子电荷（或电子的电荷）相当于费米子的拓扑电荷。费米子电荷守恒相当于拓扑电荷守恒。我们考虑将这种拓扑电荷应用于费米液体的朗道理论。我们还考虑了与 Luttinger 定理相关的非费米液体和晶体绝缘体的应用。", "authors": [{"name": "G.E. Volovik"}], "featured_authors": [{"name": "G.E. Volovik"}], "author_count": 1}, {"id": "2604.11074", "category": "cond-mat", "title": "Parent Hamiltonian Construction of Generalized Calogero-Sutherland Models", "abstract": "The Calogero-Sutherland model is a paradigmatic integrable system describing one-dimensional non-relativistic particles with inverse-square interactions. At interaction strength $\\lambda=2$, the CSM exhibits a deep connection to anyon physics, featuring the Laughlin-Jastrow polynomial as its exact ground state. Motivated by this structure, we develop a general reverse-engineering construction of positive semi-definite continuum parent Hamiltonians for trial states admitting a rational conformal field theory description with central charge $c<1$. By leveraging the null-vector structure of the underlying primary fields and the associated Belavin-Polyakov-Zamolodchikov equations, we derive corresponding many-body annihilation operators. We then apply this construction explicitly to the Moore-Read and $k=3$ Read-Rezayi states - relating to Ising and Fibonacci anyons, respectively - obtaining continuum Hamiltonians for which these Jack-polynomial states are exact zero modes. We emphasize, however, that our construction does not by itself establish ground-state uniqueness or determine the nature of the excitation spectrum.", "url": "https://arxiv.org/abs/2604.11074", "type": "理论", "summary": "卡洛杰罗-萨瑟兰模型是一个典型的可积系统，描述具有平方反比相互作用的一维非相对论粒子。在相互作用强度 $\\lambda=2$ 下，CSM 表现出与任意子物理的深层联系，以 Laughlin-Jastrow 多项式作为其精确基态。受此结构的启发，我们开发了一种正半定连续母哈密顿量的通用逆向工程构造，用于试验状态，承认中心电荷 $c<1$ 的有理共形场论描述。通过利用基础主场的零向量结构和相关的 Belavin-Polyakov-Zamolodchikov 方程，我们推导了相应的多体湮灭算子。然后，我们将此构造显式应用于 Moore-Read 和 $k=3$ Read-Rezayi 状态（分别与 Ising 和 Fibonacci 任意子相关），获得连续哈密顿量，其中这些 Jack 多项式状态是精确的零模式。然而，我们强调，我们的构造本身并不能建立基态的唯一性或确定激发光谱的性质。", "authors": [{"name": "Hari Borutta"}, {"name": "Andreas Feuerpfeil"}, {"name": "Yasir Iqbal"}], "featured_authors": [{"name": "Hari Borutta"}, {"name": "Andreas Feuerpfeil"}, {"name": "Yasir Iqbal"}], "author_count": 3}, {"id": "2604.11132", "category": "cond-mat", "title": "Regular and Anomalous Motion of Individual Magnetic Quincke Rollers Under Rotating Magnetic Field", "abstract": "We report the motion of individual magnetic Quincke rollers composed of silica particles doped with superparamagnetic iron oxide nanoparticles, whose activity arises from the coupling between Quincke rolling and an externally applied rotating magnetic field. We applied a clockwise (CW) rotating magnetic field of magnitude approximately 11 mT and rotational frequencies ranging from 0.2 to 2.75 Hz. At low frequencies, the dominant mode of motion is a CW helical trajectory. Circular trajectories emerge as a limiting case of this helical motion, in which lateral translation vanishes and the particle traces overlapping closed loops in the xy-plane. At higher frequencies, a second regular mode becomes prevalent, characterized by helical wavy trajectories in which the particle follows a CW helical path with a spatially varying curvature. Under specific conditions, however, we observe the unexpected emergence of anomalous counterclockwise (CCW) trajectories, in which individual particles roll in a direction opposite to that of the applied CW rotating magnetic field. A theoretical model incorporating electrostatic interactions, far-field hydrodynamic coupling, and a magnetic dipole approximation indicates that the anomalous behavior results from the interplay among the magnitude and orientation of the initial magnetic dipole moment, the frequency of the rotating magnetic field, and the magnitude of the initial translational velocity. Together, these factors determine the likelihood of a particle exhibiting regular or anomalous rotational motion.", "url": "https://arxiv.org/abs/2604.11132", "type": "理论", "summary": "我们报告了由掺杂有超顺磁性氧化铁纳米颗粒的二氧化硅颗粒组成的单个磁性昆克滚子的运动，其活动源于昆克滚动和外部施加的旋转磁场之间的耦合。我们应用了大小约为 11 mT 的顺时针 (CW) 旋转磁场，旋转频率范围为 0.2 至 2.75 Hz。在低频下，主要运动模式是 CW 螺旋轨迹。圆形轨迹是这种螺旋运动的极限情况，其中横向平移消失，并且粒子轨迹在 xy 平面上重叠闭合环。在较高频率下，第二种规则模式变得普遍，其特征是螺旋波状轨迹，其中粒子遵循具有空间变化曲率的 CW 螺旋路径。然而，在特定条件下，我们观察到意外出现的异常逆时针 (CCW) 轨迹，其中单个粒子沿与施加的 CW 旋转磁场相反的方向滚动。\n\n结合静电相互作用、远场流体动力耦合和磁偶极近似的理论模型表明，异常行为是由初始磁偶极矩的大小和方向、旋转磁场的频率以及初始平移速度的大小之间的相互作用造成的。这些因素共同决定了粒子表现出规则或异常旋转运动的可能性。", "authors": [{"name": "Zoran M. Cenev"}, {"name": "Ville S.I. Havu"}, {"name": "Jaakko V.I. Timonen"}], "featured_authors": [{"name": "Zoran M. Cenev"}, {"name": "Ville S.I. Havu"}, {"name": "Jaakko V.I. Timonen"}], "author_count": 3}, {"id": "2604.11139", "category": "cond-mat", "title": "GPU acceleration of plane-wave density functional theory calculations in Abinit", "abstract": "We report on the GPU porting of the Abinit high-performance simulation code for plane-wave DFT calculations. Large-scale electronic structure calculations require computing the electronic wave function by solving the Kohn-Sham problem discretized over a large number of plane-wave basis functions. Porting such calculations over hundreds of GPU nodes relies not only on extensive usage of vendor libraries from a development perspective, but also on algorithmic revisions of the iterative diagonalization procedure in the resolution of the Kohn-Sham problem to identify GPU-efficient mathematical operations (linear algebra, FFTs) applied to wave functions distributed in memory. The present contribution discusses the Abinit implementation on multi-GPU architectures, providing detailed performance results to compare CPU nodes versus heterogeneous CPU-GPU nodes. Particular attention is given in the comparison of two different diagonalization algorithms, that is Locally Optimal Block Preconditioned Conjugate Gradient and Chebyshev polynomial filtering, in terms of their GPU efficiency.", "url": "https://arxiv.org/abs/2604.11139", "type": "理论+数值", "summary": "我们报告了用于平面波 DFT 计算的 Abinit 高性能仿真代码的 GPU 移植。大规模电子结构计算需要通过求解在大量平面波基函数上离散化的 Kohn-Sham 问题来计算电子波函数。将此类计算移植到数百个 GPU 节点上不仅依赖于从开发角度广泛使用供应商库，而且还依赖于解决 Kohn-Sham 问题时迭代对角化过程的算法修订，以识别应用于内存中分布的波函数的 GPU 高效数学运算（线性代数、FFT）。目前的贡献讨论了多 GPU 架构上的 Abinit 实现，提供了详细的性能结果来比较 CPU 节点与异构 CPU-GPU 节点。特别关注两种不同对角化算法的比较，即局部最优块预条件共轭梯度和切比雪夫多项式滤波的 GPU 效率。", "authors": [{"name": "Ioanna-Maria Lygatsika"}, {"name": "Marc Sarraute"}, {"name": "Lucas Baguet"}, {"name": "Pierre Kestener"}, {"name": "Marc Torrent"}], "featured_authors": [{"name": "Ioanna-Maria Lygatsika"}, {"name": "Marc Sarraute"}, {"name": "Lucas Baguet"}, {"name": "Pierre Kestener"}, {"name": "Marc Torrent"}], "author_count": 5}, {"id": "2604.11155", "category": "cond-mat", "title": "Tensor-Network Population Annealing", "abstract": "We propose a hybrid sampling method, tensor-network population annealing (TNPA), which combines tensor-network (TN) initialization with population annealing (PA). We apply this method to the two-dimensional Edwards-Anderson Ising spin glass. The approach is motivated by the limitations of existing methods: TN-based samplers can become numerically unstable in frustrated spin systems at low temperatures, whereas conventional PA requires a long annealing schedule when started from the high-temperature limit. In TNPA, TN contractions are used only within a reliable temperature range to generate initial configurations that are close to the equilibrium distribution. The subsequent low-temperature equilibration is then carried out by PA. To stabilize the initialization process, we introduce a diagnostic based on the effective sample size that adaptively selects the initialization temperature. The proposed framework provides a practical and physically motivated route to low-temperature sampling by combining the complementary strengths of TN and PA.", "url": "https://arxiv.org/abs/2604.11155", "type": "数值", "summary": "我们提出了一种混合采样方法，即张量网络总体退火（TNPA），它将张量网络（TN）初始化与总体退火（PA）相结合。我们将此方法应用于二维爱德华兹-安德森伊辛自旋玻璃。该方法的动机是现有方法的局限性：基于TN的采样器在低温下的受挫自旋系统中可能会变得数值不稳定，而传统的PA在从高温极限开始时需要很长的退火计划。在 TNPA 中，TN 收缩仅在可靠的温度范围内使用，以生成接近平衡分布的初始构型。随后通过PA进行低温平衡。为了稳定初始化过程，我们引入了基于有效样本大小的诊断，自适应地选择初始化温度。所提出的框架通过结合 TN 和 PA 的互补优势，提供了一种实用且物理驱动的低温采样途径。", "authors": [{"name": "Takumi Oshima"}, {"name": "Yuma Ichikawa"}, {"name": "Koji Hukushima"}], "featured_authors": [{"name": "Takumi Oshima"}, {"name": "Yuma Ichikawa"}, {"name": "Koji Hukushima"}], "author_count": 3}, {"id": "2604.11169", "category": "cond-mat", "title": "Emergence of the unexpected charge-density-wave phase driven by artificial gauge field in three-leg Bose-Hubbard ladder", "abstract": "We investigate hard-core bosons at half filling on a three-leg ladder under the uniform artificial gauge field. By analyzing current patterns and correlation functions, we uncover a rich quantum phase diagram containing multiple superfluid and insulating phases. In bosonic ladder systems, increasing the gauge flux typically destabilizes the Meissner phase and leads to vortex phases characterized by circulating currents. In the present system, however, we find that charge-density-wave (CDW) phases emerge precisely in such a flux regime despite the presence of only an on-site interaction, where vortex states are naturally expected and are indeed realized in nearby parameter regions. While part of this behavior can be qualitatively understood from a strong-coupling perspective, we also identify an isolated CDW region that cannot be connected to such limits. Furthermore, upon increasing the artificial gauge flux, we observe a reentrant sequence of quantum phase transitions, CDW $\\to$ vortex-superfluid $\\to$ CDW, revealing a strong competition between the vortex phase and the density-wave order.", "url": "https://arxiv.org/abs/2604.11169", "type": "理论+数值", "summary": "我们在均匀人工规范场下的三腿梯子上研究半填充的硬核玻色子。通过分析电流模式和相关函数，我们发现了包含多个超流体和绝缘相的丰富量子相图。在玻色梯系统中，增加规范通量通常会破坏迈斯纳相的稳定性，并导致以循环电流为特征的涡旋相。然而，在本系统中，我们发现尽管仅存在现场相互作用，但电荷密度波（CDW）相位精确地出现在这种通量状态中，其中涡旋状态是自然预期的并且确实在附近参数区域中实现。虽然这种行为的一部分可以从强耦合的角度定性地理解，但我们还确定了一个无法连接到此类限制的孤立的 CDW 区域。此外，在增加人工规范通量时，我们观察到量子相变的重入序列，CDW $\\to$ 涡旋超流体 $\\to$ CDW，揭示了涡旋相位和密度波级之间的强烈竞争。", "authors": [{"name": "Takayuki Yokoyama"}, {"name": "Yasuhiro Tada"}], "featured_authors": [{"name": "Takayuki Yokoyama"}, {"name": "Yasuhiro Tada"}], "author_count": 2}, {"id": "2604.11173", "category": "cond-mat", "title": "Sluggish quantum mechanics of noninteracting fermions with spatially varying effective mass", "abstract": "We analyze a class of one-dimensional quantum systems characterized by a position-dependent kinetic term arising as the continuum limit of an inhomogeneous tight-binding model with spatially varying hopping amplitudes. In this limit, the Schrodinger equation takes the so-called BenDaniel-Duke form with an effective mass, scaling as $m_{eff}(x) = m_{eff}|x|^{\\alpha}$ with $\\alpha > 0$, leading to a framework we term sluggish quantum mechanics, where particle motion is progressively suppressed at larger distances. Both without any external potential and with $V_{ext}(x)=\\frac{1}{2}m_{eff}\\omega^2 |x|^{\\alpha+2}$, we obtain the eigenfunctions and the quantum propagators exactly. We then investigate the problem of $N$ noninteracting spinless fermions in the trap, determining the many-body ground-state wavefunction and the joint probability density function of the positions of the $N$ fermions. We show that the many-body quantum probability density in the ground state forms a determinantal point process whose correlation kernel can be computed for any $N$, giving access to the average density as well as higher order correlation functions for any finite $N$. Moreover, we analyze the scaling form of this kernel in the large $N$ limit in the bulk, near the edge, and close to the origin. Our results show that the scaled average density profile for large $N$ has a finite support symmetric with respect to the origin, but has a non-monotonic shape with a vanishing minimum at the origin for any $\\alpha>0$. One of the key findings of our work is that the scaled kernel near the origin $x=0$ for $\\alpha>0$ is neither the Bessel nor the Airy kernel (that are standard for trapped fermions), but is new, and is given by a sum of two Bessel kernels with different indices. Our results thus provide a framework relevant to engineered optical lattices with position-dependent tunneling.", "url": "https://arxiv.org/abs/2604.11173", "type": "理论+数值", "summary": "我们分析了一类一维量子系统，其特征是位置相关的动力学项，该动力学项作为具有空间变化的跳跃幅度的非齐次紧束缚模型的连续极限而出现。在这个极限下，薛定谔方程采用所谓的具有有效质量的 BenDaniel-Duke 形式，缩放为 $m_{eff}(x) = m_{eff}|x|^{\\alpha}$ 且 $\\alpha > 0$，从而形成一个我们称之为迟缓量子力学的框架，其中粒子运动在较大距离处逐渐受到抑制。在没有任何外部势和 $V_{ext}(x)=\\frac{1}{2}m_{eff}\\omega^2 |x|^{\\alpha+2}$ 的情况下，我们准确地获得了本征函数和量子传播器。然后，我们研究陷阱中 $N$ 非相互作用无自旋费米子的问题，确定多体基态波函数和 $N$ 费米子位置的联合概率密度函数。我们证明，基态下的多体量子概率密度形成了一个行列式点过程，其相关核可以针对任何 $N$ 进行计算，从而可以访问任何有限 $N$ 的平均密度以及高阶相关函数。\n\n此外，我们分析了该内核在大$N$限制下的整体缩放形式、边缘附近和原点附近的缩放形式。我们的结果表明，大 $N$ 的缩放平均密度剖面具有相对于原点对称的有限支撑，但对于任何 $\\alpha>0$ 具有非单调形状，在原点处具有消失最小值。我们工作的关键发现之一是，$\\alpha>0$ 的原点 $x=0$ 附近的缩放内核既不是贝塞尔内核也不是艾里内核（这是俘获费米子的标准），而是新的，并且由具有不同指数的两个贝塞尔内核之和给出。因此，我们的结果提供了与具有位置相关隧道效应的工程光学晶格相关的框架。", "authors": [{"name": "Giuseppe Del Vecchio Del Vecchio"}, {"name": "Manas Kulkarni"}, {"name": "Satya N. Majumdar"}, {"name": "Sanjib Sabhapandit"}], "featured_authors": [{"name": "Giuseppe Del Vecchio Del Vecchio"}, {"name": "Manas Kulkarni"}, {"name": "Satya N. Majumdar"}, {"name": "Sanjib Sabhapandit"}], "author_count": 4}, {"id": "2604.11186", "category": "cond-mat", "title": "High-Pressure Structural Evolution of Na2ZrSi2O7 and Na2ZrSi2O7.H2O: Topology-Driven Compression Behaviors, Phase Stability, and Electronic Transitions", "abstract": "Silicate frameworks exhibit diverse structural responses under extreme conditions, which are strongly influenced by hydration. Here, we present a comparative high-pressure synchrotron X-ray diffraction study of Na2ZrSi2O7 and its hydrated analogue Na2ZrSi2O7.H2O up to 30 GPa, combined with electronic structure calculations. At ambient conditions, both phases share the same primary building units (PBUs: [ZrO6] and [SiO4]) but differ in secondary building units (SBUs, M2T4 vs. M2T6). Under compression, Na2ZrSi2O7 undergoes a phase transition near 15 GPa, while the hydrated phase remains stable throughout the pressure range. The anhydrous compound exhibits a higher bulk modulus (B0 = 77.1 GPa) and less anisotropic compression compared with the hydrated phase (B0 = 66.3 GPa). Distinct deformation mechanisms are observed: the anhydrous framework accommodates pressure through [ZrO6] octahedral distortion, whereas the hydrated framework compresses via [Si2O7] group tilting. Electronic structure calculations indicate band gap widening with pressure in both phases; notably, Na2ZrSi2O7 shows a direct-to-indirect band gap transition, whereas the hydrated phase retains a direct gap. These results reveal how hydration-driven topological modifications at the secondary building unit scale dictate the pressure-induced structural evolution, phase stability, and electronic properties of zirconosilicate frameworks.", "url": "https://arxiv.org/abs/2604.11186", "type": "理论+数值", "summary": "硅酸盐骨架在极端条件下表现出不同的结构响应，这些响应受到水合作用的强烈影响。在这里，我们结合电子结构计算，对 Na2ZrSi2O7 及其水合类似物 Na2ZrSi2O7.H2O 进行了高压同步加速器 X 射线衍射研究，压力高达 30 GPa。在环境条件下，两个相共享相同的主要构建单元（PBU：[ZrO6] 和 [SiO4]），但次要构建单元不同（SBU、M2T4 与 M2T6）。在压缩下，Na2ZrSi2O7 在接近 15 GPa 的压力下发生相变，而水合相在整个压力范围内保持稳定。与水合相（B0 = 66.3 GPa）相比，无水化合物表现出较高的体积模量（B0 = 77.1 GPa）和较小的各向异性压缩。观察到独特的变形机制：无水骨架通过[ZrO6]八面体变形来适应压力，而水合骨架通过[Si2O7]基团倾斜来压缩。电子结构计算表明，两个相中的带隙均随压力而变宽；值得注意的是，Na2ZrSi2O7 显示出直接带隙到间接带隙的转变，而水合相保留了直接带隙。\n\n这些结果揭示了二级结构单元尺度上水合驱动的拓扑变化如何决定压力诱导的结构演化、相稳定性和硅酸锆框架的电子特性。", "authors": [{"name": "Peijie Zhang"}, {"name": "Pablo Botella"}, {"name": "Neha Bura"}, {"name": "Xiao Dong"}, {"name": "Catalin Popescu"}, {"name": "Yellampalli Raghavendra"}, {"name": "Rakesh Shukla"}, {"name": "Srungarpu Nagabhusan Achary"}, {"name": "Daniel Errandonea"}], "featured_authors": [{"name": "Peijie Zhang"}, {"name": "Pablo Botella"}, {"name": "Neha Bura"}, {"name": "Rakesh Shukla"}, {"name": "Srungarpu Nagabhusan Achary"}, {"name": "Daniel Errandonea"}], "author_count": 9}, {"id": "2604.11236", "category": "cond-mat", "title": "Surface correlation functions of dead-leave models", "abstract": "The pore-surface and surface-surface correlation functions are structural characteristics that play an important role in theoretical materials science and in small-angle scattering theory. Exact analytical expressions for the surface correlation functions are available only for very few models, and we here derive such expressions for the general class of dead-leave models. Within these models, a two-phase pore/solid structure is created by sequentially and randomly filling space with pore-like or solid-like grains that overlap any preexisting structure, in the same way as dead leaves fall on the ground. The obtained mathematical expressions are valid for any grain shape, in arbitrary dimension. The results are illustrated with monodispersed spherical grains, as well as with a dead-leave realization of a Debye random medium. In the latter case, the size distribution of the grains is designed to produce a structure having exponential two-point correlation function. Compared to Debye random media obtained by numerical reconstruction, the dead-leave structure has almost identical surface-surface correlation function, but distinctly different pore-surface correlation function. As a byproduct of our analysis, we also submit a general expression for the pore-surface and surface-surface correlation functions of the Boolean model, valid for arbitrary grains.", "url": "https://arxiv.org/abs/2604.11236", "type": "理论+数值", "summary": "孔隙-表面和表面-表面相关函数是在理论材料科学和小角散射理论中发挥重要作用的结构特征。表面相关函数的精确解析表达式仅适用于极少数模型，我们在这里为一般类型的死叶模型导出此类表达式。在这些模型中，通过用与任何预先存在的结构重叠的孔状或固体状颗粒顺序且随机地填充空间来创建两相孔/固体结构，就像枯叶落在地上一样。所获得的数学表达式对于任意尺寸的任何颗粒形状都有效。结果用单分散球形颗粒以及德拜随机介质的死叶实现来说明。在后一种情况下，晶粒的尺寸分布被设计为产生具有指数两点相关函数的结构。与数值重构得到的德拜随机介质相比，死叶结构具有几乎相同的表面-表面相关函数，但孔隙-表面相关函数明显不同。\n\n作为我们分析的副产品，我们还提交了布尔模型的孔隙-表面和表面-表面相关函数的一般表达式，对任意颗粒都有效。", "authors": [{"name": "Cedric J. Gommes"}], "featured_authors": [{"name": "Cedric J. Gommes"}], "author_count": 1}, {"id": "2604.11242", "category": "cond-mat", "title": "Magnetic Order of Dresselhaus-type Antiferromagnet EuIr$_4$In$_2$Ge$_4$ Studied by Single Crystal Neutron Diffraction", "abstract": "The magnetic order of EuIr$_4$In$_2$Ge$_4$, which crystallizes in a Dresselhaus-type noncentrosymmetric tetragonal structure, was investigated using two complementary single-crystal neutron diffraction approaches. Time-of-flight single-crystal diffraction reveals antiferromagnetic Bragg reflections with propagation vector $q = (1, 0, 0)$ below the Néel temperature $T_{\\rm N}$ = 2.5 K, indicating a breaking of body-centered translational symmetry. Polarized neutron diffraction on a triple-axis spectrometer demonstrates that the ordered Eu$^{2+}$ $4f$ moments lie within the basal plane and form a collinear antiferromagnetic structure with antiparallel alignment between corner and body-center sites. Despite the Dresselhaus-type spin splitting in the conduction bands, the magnetic order remains simple, implying weak coupling between localized moments and itinerant electrons.", "url": "https://arxiv.org/abs/2604.11242", "type": "理论", "summary": "使用两种互补的单晶中子衍射方法研究了以 Dresselhaus 型非中心对称四方结构结晶的 EuIr$_4$In$_2$Ge$_4$ 的磁序。飞行时间单晶衍射揭示了反铁磁布拉格反射，其传播矢量 $q = (1, 0, 0)$ 低于尼尔温度 $T_{\\rm N}$ = 2.5 K，表明体心平移对称性被打破。三轴谱仪上的偏振中子衍射表明，有序的 Eu$^{2+}$ $4f$ 矩位于基面内，并形成共线反铁磁结构，角点和体中心位置之间具有反平行排列。尽管导带中存在德雷塞尔豪斯型自旋分裂，但磁序仍然简单，这意味着局域矩和流动电子之间的耦合较弱。", "authors": [{"name": "Chihiro Tabata"}, {"name": "Koji Kaneko"}, {"name": "Akiko Nakao"}, {"name": "Takashi Ohhara"}, {"name": "Tatsuma D. Matsuda"}, {"name": "Yoshichika Ōnuki"}], "featured_authors": [{"name": "Chihiro Tabata"}, {"name": "Koji Kaneko"}, {"name": "Akiko Nakao"}, {"name": "Takashi Ohhara"}, {"name": "Tatsuma D. Matsuda"}, {"name": "Yoshichika Ōnuki"}], "author_count": 6}, {"id": "2604.11367", "category": "cond-mat", "title": "Strain-Induced Curvature in Monolayer Graphene: Effects on Electronic Structure, Phonon Dynamics, and Lattice Thermal Conductivity", "abstract": "We present a comprehensive set of calculations to investigate the effect of strain-induced x-y topological perturbation in the monolayer graphene sheet. We show that the induced curvature with the defined strain constraint, energetically stabilizes the systems. The electronic properties are modified when the amplitude of the curvature of the sheet increases, which induces Van Hove singularities of the electronic Density of States to approach the Fermi energy. The highly curved system exhibits coexisting flat and linear dispersions close to the Fermi level, which is a promising feature for thermoelectric applications. We also demonstrate, through the phonon dispersion curves, that respective systems are dynamically stable within the studied range of strains/curvatures. Moreover, the flexural acoustic mode transitions from quadratic to linear dispersion under strain, mimicking the 3D behavior and enhancing phonon scattering. The increase of phonon scattering will therefore decrease the value of the lattice thermal conductivity, $\\kappa_L$. Such results allows us to conclude that it is possible to tune $\\kappa_L$ by applying x-y strain to the monolayer sheet, and inducing different topological curvatures.", "url": "https://arxiv.org/abs/2604.11367", "type": "理论+数值", "summary": "我们提出了一套全面的计算来研究单层石墨烯片中应变引起的 x-y 拓扑扰动的影响。我们表明，具有定义的应变约束的诱导曲率可以在能量上稳定系统。当片材曲率幅度增加时，电子特性发生改变，从而导致电子态密度的范霍夫奇点接近费米能量。高度弯曲的系统表现出接近费米能级的共存的平坦和线性色散，这对于热电应用来说是一个有前途的特征。我们还通过声子色散曲线证明，各个系统在研究的应变/曲率范围内是动态稳定的。此外，弯曲声学模式在应变下从二次色散转变为线性色散，模仿 3D 行为并增强声子散射。因此，声子散射的增加将降低晶格热导率 $\\kappa_L$ 的值。\n\n这些结果使我们得出结论，可以通过对单层片施加 x-y 应变并诱导不同的拓扑曲率来调整 $\\kappa_L$。", "authors": [{"name": "M. C. Santos"}, {"name": "E. Lora da Silva"}, {"name": "D. S. Baptista"}, {"name": "T. Santos"}, {"name": "M. Molinari"}, {"name": "F. J. Manjón"}, {"name": "Yin Cui"}, {"name": "Xidong Lin"}, {"name": "Tao Yang"}], "featured_authors": [{"name": "M. C. Santos"}, {"name": "E. Lora da Silva"}, {"name": "D. S. Baptista"}, {"name": "Yin Cui"}, {"name": "Xidong Lin"}, {"name": "Tao Yang"}], "author_count": 9}, {"id": "2604.11392", "category": "cond-mat", "title": "Absence of thermalization after a local quench and strong violation of the eigenstate thermalization hypothesis", "abstract": "Absence of thermalization after a global quantum quench is a well-established numerical observation in integrable many-body systems, and can be empirically related to a violation of the eigenstate thermalization hypothesis (ETH) in such models. Still, in many of those examples a weaker version of the conventional ETH (wETH) has been numerically reported or even rigorously proven. In this paper we show analytically and illustrate numerically that the absence of thermalization is already possible after a local quench. A closely related finding is a strong violation of the ETH, meaning that not even the wETH is fulfilled anymore. In our analytical explorations we focus on XX-spin-chain models with open boundary conditions, where the local quench is generated by initiating the system in thermal equilibrium and then suddenly switching on (or slightly changing) a single-spin impurity either at the end or in the center of the chain. Numerically we observe qualitatively similar phenomena also for more general XXZ-models in the case of an end-impurity, but not in the case of a central impurity.", "url": "https://arxiv.org/abs/2604.11392", "type": "理论+数值", "summary": "全局量子淬灭后不存在热化是可积多体系统中公认的数值观察结果，并且在经验上可以与此类模型中违反本征态热化假说 (ETH) 相关。尽管如此，在许多这样的例子中，传统 ETH (wETH) 的较弱版本已经得到了数字报道，甚至得到了严格的证明。在本文中，我们通过分析和数值说明表明，局部淬火后已经可以不发生热化。一个密切相关的发现是对 ETH 的严重违反，这意味着甚至连 wETH 也不再履行。在我们的分析探索中，我们重点关注具有开放边界条件的 XX 自旋链模型，其中局部淬火是通过使系统处于热平衡状态，然后突然打开（或稍微改变）链末端或中心的单自旋杂质来产生​​的。在数值上，我们在最终杂质的情况下，对于更一般的 XXZ 模型也观察到了定性上相似的现象，但在中心杂质的情况下却没有。", "authors": [{"name": "Peter Reimann"}, {"name": "Christian Eidecker-Dunkel"}], "featured_authors": [{"name": "Peter Reimann"}, {"name": "Christian Eidecker-Dunkel"}], "author_count": 2}, {"id": "2604.11397", "category": "cond-mat", "title": "Revealing Dislocation Interactions Controlling Mechanical Properties of Metals", "abstract": "During plastic deformation, metals change shape while continuously becoming stronger. The microscopic origin of these processes lies in the proliferation and movement of line defects, dislocations, and the subsequent self-organisation and pinning of dislocations on lattice imperfections, including other dislocations. The nature of these multiscale processes has remained elusive because in situ observations have not been feasible. We present 3D movies of how dislocations pile up near an obstacle, deeply within a mm-sized pure Al sample and during tensile deformation. Cross-slip is found to provide a mechanism for the dislocations to escape the pile-up, leading to pronounced intermittent behaviour. Such data support a new generation of dislocation dynamics and micro-mechanics modelling.", "url": "https://arxiv.org/abs/2604.11397", "type": "理论", "summary": "在塑性变形过程中，金属会改变形状，同时不断变得更强。这些过程的微观起源在于线缺陷、位错的增殖和移动，以及随后的自组织和位错对晶格缺陷（包括其他位错）的钉扎。这些多尺度过程的本质仍然难以捉摸，因为现场观测还不可行。我们展示了 3D 电影，展示了位错如何在毫米大小的纯铝样品深处以及拉伸变形过程中在障碍物附近堆积。人们发现交叉滑移为位错逃离堆积提供了一种机制，从而导致明显的间歇行为。这些数据支持新一代位错动力学和微观力学建模。", "authors": [{"name": "Felix Frankus"}, {"name": "Sina Borgi"}, {"name": "Albert Zelenika"}, {"name": "Basit Ali"}, {"name": "Raquel Rodriguez-Lamas"}, {"name": "Henning Friis Poulsen"}, {"name": "Grethe Winther"}], "featured_authors": [{"name": "Felix Frankus"}, {"name": "Sina Borgi"}, {"name": "Albert Zelenika"}, {"name": "Raquel Rodriguez-Lamas"}, {"name": "Henning Friis Poulsen"}, {"name": "Grethe Winther"}], "author_count": 7}, {"id": "2604.11420", "category": "cond-mat", "title": "Exact Criterion for Ground-State Overlap Dominance after Quantum Quenches", "abstract": "Recently, conjectured and verified in TIFM model that for a sudden quench within the same physical phase region, the overlap of the initial ground state with the final eigenstates is maximal for the final ground state. We solve this problem exactly for a broad class of translationally invariant free-fermion systems. For Hamiltonians that factorize into independent $2\\times2$ sectors, the final ground state is uniquely maximal if and only if the initial and final sector Bloch vectors have positive dot product. This exact criterion proves the conjecture for large classes, but also shows that it is false in general: in Kitaev chains there are same-phase quenches for which the final ground state is not the maximal-overlap state. The same mechanism has a direct dynamical consequence, implying that same-phase quenches can generate DQPTs without crossing an physical phase boundary.", "url": "https://arxiv.org/abs/2604.11420", "type": "理论", "summary": "最近，在TIFM模型中推测和验证，对于同一物理相区内的突然猝灭，初始基态与最终本征态的重叠对于最终基态而言是最大的。我们针对一类广泛的平移不变自由费米子系统精确地解决了这个问题。对于分解为独立的 $2\\times2$ 扇区的哈密顿量，当且仅当初始和最终扇区 Bloch 向量具有正点积时，最终基态才是唯一最大的。这个精确的标准证明了大类的猜想，但也表明它一般是错误的：在基塔耶夫链中存在同相猝灭，其最终基态不是最大重叠态。相同的机制具有直接的动力学结果，这意味着同相淬火可以在不跨越物理相边界的情况下生成 DQPT。", "authors": [{"name": "Taisanul Haque"}], "featured_authors": [{"name": "Taisanul Haque"}], "author_count": 1}, {"id": "2604.11441", "category": "cond-mat", "title": "Optimization of cooling power of a thermoelectric refrigerator: A unified approach", "abstract": "We analyze the steady-state formalism for optimizing the cooling power of a thermoelectric refrigerator (TER), unifying the endoreversible and exoreversible approximations within one framework. Although the cooling power is non-optimizable within the endoreversible model based on Newtonian heat-transfer law, we show that the issue can be circumvented in the near-reversible regime where the external thermal conductances are large, but finite. We extend this analysis to optimize the cooling power in the presence of both internal and external irreversibilities and derive a closed-form expression for the coefficient of performance (COP) that depends on the thermoelectric figure of merit and the ratio of internal to external thermal conductances. The model reproduces the endoreversible and the exoreversible limits as special cases. We conclude that for small temperature differences, the combined irreversibilities reduce the COP to values below 1/2, which aligns with the observed performance of the single-stage TER, and can provide realistic estimates for the COP.", "url": "https://arxiv.org/abs/2604.11441", "type": "理论+数值", "summary": "我们分析了优化热电制冷机（TER）冷却能力的稳态形式，将内可逆和外可逆近似统一在一个框架内。尽管冷却功率在基于牛顿传热定律的内可逆模型中是不可优化的，但我们表明，在外部热导较大但有限的近可逆状态下可以避免该问题。我们扩展了这种分析，以在存在内部和外部不可逆性的情况下优化冷却功率，并推导出性能系数 (COP) 的封闭式表达式，该表达式取决于热电品质因数和内部与外部热导之比。该模型将内可逆和外可逆极限再现为特殊情况。我们得出的结论是，对于较小的温差，综合不可逆性将 COP 降低至 1/2 以下的值，这与单级 TER 的观察到的性能一致，并且可以为 COP 提供实际的估计。", "authors": [{"name": "Rajeshree Chakraborty"}, {"name": "Ramandeep S. Johal"}], "featured_authors": [{"name": "Rajeshree Chakraborty"}, {"name": "Ramandeep S. Johal"}], "author_count": 2}, {"id": "2604.11476", "category": "cond-mat", "title": "Nexus-CAT: A Computational Framework to Define Long-Range Structural Descriptors in Glassy Materials from Percolation Theory", "abstract": "Nexus-CAT (Cluster Analysis Toolkit) is an open-source Python package for cluster detection and percolation analysis of atomistic simulation trajectories. Standard structural tools, such as the pair distribution function or structure factor, fail to capture the long-range connectivity changes underlying amorphous-amorphous transitions in glassy materials. Nexus-CAT addresses this gap by reading extended XYZ trajectory files and identifying clusters via a Union-Find algorithm with path-compression. Four clustering strategies, i.e., distance-based, bonding, coordination-filtered, and shared-neighbor, are implemented through a Strategy Factory design pattern, enabling the treatment of diverse network topologies. The program computes key percolation properties with percolation detection based on a rigorous period vector algorithm. The package is validated against theoretical predictions and applied to glasses with different bonding environments, namely vitreous silica, vitreous ice, and amorphous silicon. One original result is the observation of a percolation transition prior to crystallization in the latter, indicating that pressure-induced crystallization is initially driven by an amorphous transformation with similar coordination number. The code is also designed to be readily extended to gels, cements, and other disordered materials. Nexus-CAT is fully available on GitHub and PyPI.", "url": "https://arxiv.org/abs/2604.11476", "type": "理论+数值", "summary": "Nexus-CAT（簇分析工具包）是一个开源 Python 包，用于原子模拟轨迹的簇检测和渗透分析。标准结构工具，例如对分布函数或结构因子，无法捕获玻璃材料中非晶-非晶转变背后的长程连接变化。 Nexus-CAT 通过读取扩展 XYZ 轨迹文件并通过带有路径压缩的并查找算法识别簇来解决这一差距。通过策略工厂设计模式实现四种集群策略，即基于距离、绑定、协调过滤和共享邻居，从而能够处理不同的网络拓扑。该程序基于严格的周期向量算法通过渗流检测来计算关键渗流属性。该封装根据理论预测进行了验证，并应用于具有不同粘合环境的玻璃，即玻璃状二氧化硅、玻璃状冰和非晶硅。\n\n一个原始结果是在后者结晶之前观察到渗滤转变，表明压力诱导结晶最初是由具有相似配位数的无定形转变驱动的。该代码还旨在轻松扩展到凝胶、水泥和其他无序材料。 Nexus-CAT 在 GitHub 和 PyPI 上完全可用。", "authors": [{"name": "Julien Perradin"}, {"name": "Simona Ispas"}, {"name": "Anwar Hasmy"}, {"name": "Bernard Hehlen"}], "featured_authors": [{"name": "Julien Perradin"}, {"name": "Simona Ispas"}, {"name": "Anwar Hasmy"}, {"name": "Bernard Hehlen"}], "author_count": 4}, {"id": "2604.11486", "category": "cond-mat", "title": "Inverse engineering of cooling protocols: from normal behavior to Mpemba effects", "abstract": "When a cup of hot coffee is suddenly put into a cold environment, it cools down as a function of time $t$ until the internal temperature $T_\\text{int}$ of the coffee equals the external ambient temperature $T_\\text{ext}$. This instantaneous shock-freezing corresponds to an imposed cooling protocol of the external temperature $T_\\text{ext}(t)$, ideally described as a step-function in time, causing the time-dependent change of the internal temperature $T_\\text{int}(t)$. While the effect of different given protocols $T_\\text{ext}(t)$ on the resulting system cooling behaviour, embodied in $T_\\text{int}(t)$, has been studied extensively, we consider here the inverse question: for a given system cooling $T_\\text{int}(t)$ how can an appropriate protocol $T_\\text{ext}(t)$ be engineered to produce the desired prescribed $T_\\text{int}(t)$. We use both the phenomenological Newtonian equation for cooling and microscopic models, such as a discrete two-level system and a Brownian harmonic oscillator with time-dependent noise, to compute analytically the protocol $T_\\text{ext}(t)$ needed to achieve a prescribed $T_\\text{int}(t)$. We then discuss the same question for phenomenological generalizations of the Newtonian law which include anomalous Mpemba effects, overcooling, asymmetries in cooling and heating as well as delay phenomena. It is shown that backward-engineered protocols do not always exist and can be non-unique. The results are important for steering the cooling behavior by time-varying external heat sources in a systematic way.", "url": "https://arxiv.org/abs/2604.11486", "type": "理论+数值", "summary": "当一杯热咖啡突然放入寒冷的环境中时，它会随着时间$t$而冷却，直到咖啡的内部温度$T_\\text{int}$等于外部环境温度$T_\\text{ext}$。这种瞬时冲击冻结对应于外部温度 $T_\\text{ext}(t)$ 的强制冷却协议，理想情况下描述为时间阶跃函数，导致内部温度 $T_\\text{int}(t)$ 随时间变化。虽然不同给定协议 $T_\\text{ext}(t)$ 对最终系统冷却行为的影响（体现在 $T_\\text{int}(t)$ 中）已被广泛研究，但我们在这里考虑相反的问题：对于给定的系统冷却 $T_\\text{int}(t)$，如何设计适当的协议 $T_\\text{ext}(t)$ 来产生所需的指定 $T_\\text{int}(t)$。我们使用冷却唯象牛顿方程和微观模型，例如离散二能级系统和具有时间依赖性噪声的布朗谐振子，来分析计算实现规定的 $T_\\text{int}(t)$ 所需的协议 $T_\\text{ext}(t)$。\n\n然后，我们讨论牛顿定律的现象学概括的同一问题，其中包括反常姆彭巴效应、过冷、冷却和加热的不对称性以及延迟现象。结果表明，向后工程协议并不总是存在并且可能不是唯一的。研究结果对于系统地控制时变外部热源的冷却行为非常重要。", "authors": [{"name": "Hartmut Löwen"}], "featured_authors": [{"name": "Hartmut Löwen"}], "author_count": 1}, {"id": "2604.11494", "category": "cond-mat", "title": "Machine Learning-Enabled Mechanical Analysis and Optimization of Bioinspired Functionally Graded Materials", "abstract": "Tendon-bone enthesis connects tendon and bone, two mechanically dissimilar materials, while effectively minimizing stress concentrations, a capability rarely achieved in engineering materials. Its hierarchical organization and graded variations in composition or mineralization are widely recognized as key contributors to its exceptional performance. Here, we investigate the mechanics of enthesis, focusing on the insertion of interface collagen fibers into bone where hierarchical collagen fibril structures and graded mineralization are present, and translate these insights into bioinspired engineering material design using a convolutional neural network-based field predictor (CNNFP). We first construct a three-dimensional finite element model (FEM) of the interface fiber-bone enthesis, in which local material properties depend on mineralization level, mean fibril orientation, and angular dispersion, informed by a multiscale continuum theory. We introduce a scalar risk factor that integrates local stress states and constituent fibril organizations to quantify local vulnerability. Simulation results demonstrate that graded and spatially heterogeneous configurations markedly reduce stress concentrations, supporting prevailing biomechanical hypotheses. We then train the CNNFP as an accurate surrogate for FEM and embed it within a kernel-based gradient optimization framework to efficiently identify optimal field configurations. The optimized designs are validated against FEM ground truth, establishing a generalizable AI-enabled pathway for the optimization of bioinspired functionally graded materials.", "url": "https://arxiv.org/abs/2604.11494", "type": "理论+数值", "summary": "肌腱-骨附着点连接肌腱和骨骼这两种机械上不同的材料，同时有效地最大限度地减少应力集中，这是工程材料中很少实现的能力。其层次结构和成分或矿化的分级变化被广泛认为是其卓越性能的关键因素。在这里，我们研究了附着的力学，重点是将界面胶原纤维插入到存在分层胶原纤维结构和分级矿化的骨骼中，并使用基于卷积神经网络的场预测器（CNNFP）将这些见解转化为仿生工程材料设计。我们首先构建了纤维-骨附着体界面的三维有限元模型（FEM），其中局部材料特性取决于矿化水平、平均原纤维取向和角色散，并通过多尺度连续介质理论提供信息。我们引入了一个标量风险因子，该因子整合了局部应力状态和成分原纤维组织来量化局部脆弱性。\n\n模拟结果表明，分级和空间异质配置显着降低了应力集中，支持了流行的生物力学假设。然后，我们将 CNNFP 训练为 FEM 的准确替代品，并将其嵌入基于内核的梯度优化框架中，以有效识别最佳场配置。优化的设计根据 FEM 基本事实进行验证，为优化仿生功能梯度材料建立了一条通用的人工智能路径。", "authors": [{"name": "Zhangke Yang"}, {"name": "Zhaoxu Meng"}], "featured_authors": [{"name": "Zhangke Yang"}, {"name": "Zhaoxu Meng"}], "author_count": 2}, {"id": "2604.11515", "category": "cond-mat", "title": "Electron localization, charge redistribution, and emergence of topological states at graphite junctions", "abstract": "Low-energy electronic behavior in graphite crystals is highly dependent on the relative stacking arrangement of the constituent layers. Topologically non-trivial electronic states can arise due to interrupted rhombohedral (ABC) stacking, localized at the edges of the stacking region, but not in the case of Bernal (AB) stacking. Here, we study the electronic properties of junctions between half-crystals of graphite of either Bernal or rhombohedral stacking, using a charge self-consistent tight-binding method and embedding potentials to account for the influence of layers far from the junction. We find junction-localized electronic states to be a ubiquitous feature, and all systems but one involving a rhombohedral half-crystal support a flat-band expected to exhibit electronic instabilities and strongly-correlated states. Nascent flat-band states associated with finite rhombohedral stacking sequences extend the physics into pure Bernal systems.", "url": "https://arxiv.org/abs/2604.11515", "type": "理论", "summary": "石墨晶体中的低能电子行为高度依赖于各组成层的相对堆叠排列。拓扑上非平凡的电子态可能由于位于堆叠区域边缘的中断菱面体 (ABC) 堆叠而出现，但在伯纳尔 (AB) 堆叠的情况下不会出现。在这里，我们研究了伯纳尔或菱面体堆叠石墨半晶之间结的电子特性，使用电荷自洽紧束缚方法和嵌入电势来解释远离结的层的影响。我们发现结局域电子态是一种普遍存在的特征，除了涉及菱面体半晶体的系统外，所有系统都支持平带，预计会表现出电子不稳定性和强相关态。与有限菱面体堆叠序列相关的新生平带态将物理扩展到纯伯纳尔系统。", "authors": [{"name": "Luke Soneji"}, {"name": "Simon Crampin"}, {"name": "Marcin Mucha-Kruczynski"}], "featured_authors": [{"name": "Luke Soneji"}, {"name": "Simon Crampin"}, {"name": "Marcin Mucha-Kruczynski"}], "author_count": 3}, {"id": "2604.11595", "category": "cond-mat", "title": "Pt-wedge squeegee cleaning of two-dimensional materials and heterostructures", "abstract": "The surface of ultra-thin materials plays a crucial role in determining the properties. This is particularly important in two-dimensional (2D) materials where the surface-bulk distinction is no longer present. While mechanical cleaning of two-dimensional materials to remove interfacial and surface contaminants is used to achieve better sample quality, low throughput and the challenging optimization of cleaning procedures hinder their widespread adoption. Here, we report on atomic force microscope (AFM)-based mechanical cleaning with modified AFM cantilevers for high-throughput and easy-to-implement cleaning of 2D materials and their heterostructures. A Pt-wedge is deposited via focused ion beam on the cantilever to improve the mechanical cleaning of samples and streamline the cleaning procedures. We demonstrate that a cleaning rate of 3 {\\mu}^2/s can be achieved with our modified cantilevers, compared to the 0.01 {\\mu}^2/s effective cleaning rate in pointy-tip cleaning. As showcases, we demonstrate that monolayer WS2 on h-BN exhibits much sharper photoluminescence (PL) emission at room temperature after AFM cleaning, and WS2 monolayers exhibit a higher quality contacts to cleaned Au electrodes as compared to uncleaned electrodes. We also showed that h-BN encapsulated heterostructures can be cleaned rapidly using the improved method. Overall, our results exhibit a feasible and facile path for the large-scale application of AFM-based cleaning of integrated 2D materials.", "url": "https://arxiv.org/abs/2604.11595", "type": "数值", "summary": "超薄材料的表面在决定性能方面起着至关重要的作用。这对于不再存在表面与体积区别的二维 (2D) 材料尤其重要。虽然通过机械清洗二维材料来去除界面和表面污染物可实现更好的样品质量，但低通量和具有挑战性的清洗程序优化阻碍了其广泛采用。在此，我们报告了基于原子力显微镜 (AFM) 的机械清洁，采用改进的 AFM 悬臂，可对 2D 材料及其异质结构进行高通量且易于实施的清洁。通过聚焦离子束将铂楔沉积在悬臂上，以改善样品的机械清洁并简化清洁程序。我们证明，与尖头清洁中 0.01 {\\mu}^2/s 的有效清洁速率相比，我们改进的悬臂可以实现 3 {\\mu}^2/s 的清洁速率。\n\n作为展示，我们证明 h-BN 上的单层 WS2 在 AFM 清洁后在室温下表现出更清晰的光致发光 (PL) 发射，并且与未清洁的电极相比，WS2 单层与清洁的金电极表现出更高质量的接触。我们还表明，使用改进的方法可以快速清洁 h-BN 封装的异质结构。总的来说，我们的结果为大规模应用基于 AFM 的集成二维材料清洁提供了一条可行且简便的途径。", "authors": [{"name": "Emine Yegin"}, {"name": "Doruk Pehlivanoğlu"}, {"name": "T. Serkan Kasırga"}], "featured_authors": [{"name": "Emine Yegin"}, {"name": "Doruk Pehlivanoğlu"}, {"name": "T. Serkan Kasırga"}], "author_count": 3}, {"id": "2604.11596", "category": "cond-mat", "title": "Loop-dependent entangling holonomies in localized topological quartets", "abstract": "A spectrally isolated quartet can preserve a local two-qubit description at each point in parameter space while still acquiring a loop holonomy that does not lie in the local subgroup $\\U(2)\\otimes\\U(2)$. We demonstrate this in three localized topological settings: a BHZ ribbon, a spinful SSH chain, and a BBH corner quartet. On a given quartet, changing only the loop moves the transport between almost local and strongly entangling regimes. The clearest contrast appears in BHZ: co-rotating and counter-rotating edge-field loops carry nearly identical eigenphase data, yet the former remains almost local whereas the latter realizes an Ising-like entangler. SSH isolates the controlled-rotation mechanism in a numerically stable setting, while BBH extends the phenomenon to a higher-order corner multiplet. Standard topological diagnostics, including Berry phases, Chern numbers, determinant phases, and eigenphase spectra, do not distinguish these cases. The primary diagnostic is the distance of the loop holonomy to the extracted local subgroup; canonical two-qubit coordinates are introduced only after reduction failure has been established, in order to identify the resulting gate class. In the sense of Ref.[ arXiv:2601.13764 ], these results provide microscopic, loop-resolved manifestations of entangling gluing.", "url": "https://arxiv.org/abs/2604.11596", "type": "理论+数值", "summary": "光谱隔离四重奏可以在参数空间中的每个点保留局部两个量子位描述，同时仍然获得不在局部子组 $\\U(2)\\otimes\\U(2)$ 中的循环完整性。我们在三个局部拓扑设置中演示了这一点：BHZ 带、旋转的 SSH 链和 BBH 角四重奏。在给定的四重奏上，仅改变环路就可以在几乎局域和强纠缠态之间移动传输。最明显的对比出现在 BHZ 中：同向旋转和反向旋转边缘场环路携带几乎相同的本征相数据，但前者几乎保持局部状态，而后者实现了类似伊辛的纠缠器。 SSH 将受控旋转机制隔离在数值稳定的设置中，而 BBH 则将该现象扩展到高阶角多重态。标准拓扑诊断，包括贝里相、陈数、行列相和本征相谱，无法区分这些情况。主要诊断是循环完整到提取的局部子群的距离；仅在确定归约失败后才引入规范的二量子位坐标，以便识别生成的门类别。\n\n从参考文献[arXiv:2601.13764]的意义上来说，这些结果提供了缠结粘合的微观的、循环解析的表现。", "authors": [{"name": "Kazuki Ikeda"}, {"name": "Yaron Oz"}], "featured_authors": [{"name": "Kazuki Ikeda"}, {"name": "Yaron Oz"}], "author_count": 2}, {"id": "2604.11606", "category": "cond-mat", "title": "The Widom line in the Ising model on a decorated bilayer lattice", "abstract": "There has been much recent interest devoted to a class of frustrated one-dimensional statistical mechanics lattice models which exhibit sharp thermodynamics. In this work, we study an extension of one of these models to two dimensions; the Ising model on a decorated bilayer lattice. We show that the pseudo-transitions of the one-dimensional models become a real first order phase transition in this two-dimensional analogue. Moreover, the pseudo-transition is found to still exist above a bi-critical point. This can be characterised as a Widom line, which allows a re-interpretation of the physics in the previously studied one-dimensional models.", "url": "https://arxiv.org/abs/2604.11606", "type": "理论", "summary": "最近人们对一类表现出尖锐热力学的受挫的一维统计力学晶格模型产生了很大的兴趣。在这项工作中，我们研究了将这些模型之一扩展到二维；装饰双层格子上的伊辛模型。我们证明一维模型的赝转变在这个二维模拟中变成了真正的一阶相变。此外，发现伪转变仍然存在于双临界点之上。这可以被描述为 Widom 线，它允许重新解释先前研究的一维模型中的物理现象。", "authors": [{"name": "Joseph Chapman"}, {"name": "Justas Gidziunas"}, {"name": "Bruno Tomasello"}, {"name": "Sam Carr"}], "featured_authors": [{"name": "Joseph Chapman"}, {"name": "Justas Gidziunas"}, {"name": "Bruno Tomasello"}, {"name": "Sam Carr"}], "author_count": 4}, {"id": "2604.11690", "category": "cond-mat", "title": "Geometry-controlled magnon-polariton excitations in a bilayer planar cavity", "abstract": "Planar cavity magnonics has been developed predominantly for a single magnetic film, leaving the role of multiple magnetic layers in a cavity-scattering framework with spatial resolution largely unexplored. In this study, we introduce a bilayer planar cavity in which two magnetic films are embedded inside the same microwave cavity and interact through the cavity field and their relative placement within the standing-wave pattern. First, we derive a full two-film scattering theory in the macrospin limit and recover the exact zero-gap half-thickness limit to benchmark it against the known one-film planar result. This formulation reveals that the bilayer does not simply strengthen the magnon-photon interaction by adding magnetic material but instead enables position-dependent control of the collective bright channel. Antinode-compatible placements enhance effective coupling, whereas node-compatible placements suppress it. We then show that weak symmetry breaking between the two films transfers the finite cavity weight to a mode that is dark in the symmetric limit, producing an additional spectroscopic branch without immediately destroying the main avoided crossing. To extend the analysis beyond the macrospin regime, we formulate a reduced multimode bilayer theory for $J\\neq 0$, where odd standing-spin-wave families reorganize into family-resolved bright and dark bilayer channels. Our results show that bilayer planar cavities are a minimal but versatile setting for controlling the collective magnon-polariton structure through geometry, symmetry, and exchange-driven mode hierarchy.", "url": "https://arxiv.org/abs/2604.11690", "type": "理论+数值", "summary": "平面腔磁振子学主要是针对单个磁性薄膜而开发的，而空腔散射框架中多个磁性层的作用在很大程度上尚未得到探索。在本研究中，我们引入了双层平面腔，其中两个磁性薄膜嵌入同一微波腔内，并通过腔场及其在驻波模式中的相对位置相互作用。首先，我们推导了宏观自旋极限中的完整两膜散射理论，并恢复了精确的零间隙半厚度极限，以将其与已知的单膜平面结果进行基准测试。该公式表明，双层并不是简单地通过添加磁性材料来增强磁子-光子相互作用，而是能够实现对集体亮通道的位置相关控制。波腹兼容的布局增强了有效耦合，而节点兼容的布局则抑制了有效耦合。然后，我们表明，两层薄膜之间的弱对称性破缺将有限的腔权重转移到对称极限下的暗模式，从而产生额外的光谱分支，而不会立即破坏主要避免的交叉。\n\n为了将分析扩展到宏观自旋体系之外，我们为 $J\\neq 0$ 制定了简化的多模双层理论，其中奇数驻自旋波族重新组织成族分辨的亮和暗双层通道。我们的结果表明，双层平面腔是一种最小但通用的设置，可通过几何、对称性和交换驱动模式层次结构来控制集体磁振子极化结构。", "authors": [{"name": "S. Solihin"}, {"name": "Ahmad R. T. Nugraha"}, {"name": "Muhammad Aziz Majidi"}], "featured_authors": [{"name": "S. Solihin"}, {"name": "Ahmad R. T. Nugraha"}, {"name": "Muhammad Aziz Majidi"}], "author_count": 3}, {"id": "2604.11706", "category": "cond-mat", "title": "Effect of Pre-Shear and Dispersity on Crystallization of a Model Polymer with Soft Pair Interactions using Molecular Dynamics Simulations", "abstract": "Polymer crystallization is a process of great interest in both fundamental theory and industrial settings, particularly in polymer processing and applications involving semi-crystalline materials. The effect of processing on the initial stages of crystallization is not fully understood. Our study investigates the influence of pre-shear on monodisperse melts and bidisperse blends of a generic, segmentally coarse-grained polymer model. Through molecular dynamics simulations, we explore how polydispersity affects crystallization, where we found that the addition of short chains to a melt of longer chains increased the final crystallinity by about 10%, and increased the initial growth rate by roughly a factor of two. In contrast, however, pre-shearing the hot melt before quenching only showed a minor increase in both growth rates and final crystallinty, except in monodisperse melts of short chains. Crystal grain shapes were most influenced by pre-shearing monodisperse melts, where both asphericity and prolateness decreased. Additionally, we determined topological connectivity of crystal grains through tie- and loop-chain analysis. Again, only monodisperse melts showed a significant increase of tie chain fractions with pre-shear, while all other systems showed only modest increases. Our findings provide insight into the changes of crystallinity and cluster morphologies that emerge when pre-sheared, offering a deeper understanding of the initial crystallization processes in polymer melts when subjected to pre-shear.", "url": "https://arxiv.org/abs/2604.11706", "type": "理论+数值", "summary": "聚合物结晶是一个在基础理论和工业环境中都引起人们极大兴趣的过程，特别是在涉及半结晶材料的聚合物加工和应用中。加工对结晶初始阶段的影响尚不完全清楚。我们的研究研究了预剪切对通用分段粗粒聚合物模型的单分散熔体和双分散共混物的影响。通过分子动力学模拟，我们探索了多分散性如何影响结晶，发现将短链添加到较长链的熔体中可使最终结晶度提高约 10%，并使初始生长速率提高约两倍。然而，相比之下，除了短链的单分散熔体之外，在淬火之前对热熔体进行预剪切仅显示生长速率和最终结晶度略有增加。晶粒形状受预剪切单分散熔体的影响最大，其中非球形度和长形度均下降。此外，我们通过系链和环链分析确定了晶粒的拓扑连通性。\n\n同样，只有单分散熔体显示预剪切后连接链分数显着增加，而所有其他系统仅显示适度的增加。我们的研究结果深入了解了预剪切时出现的结晶度和簇形态的变化，从而更深入地了解了聚合物熔体在进行预剪切时的初始结晶过程。", "authors": [{"name": "Tzortzis Koulaxizis"}, {"name": "Antonia Statt"}], "featured_authors": [{"name": "Tzortzis Koulaxizis"}, {"name": "Antonia Statt"}], "author_count": 2}, {"id": "2604.11713", "category": "cond-mat", "title": "Thermodynamic fluctuations in freely jointed chains under force", "abstract": "It is common to study polymer physics through the use of idealized single-chain models, and the most popular of these is the freely jointed chain model. In certain thermodynamic ensembles, statistical mechanical treatment of this model is analytically tractable or sometimes exactly solvable. This enables useful relations to be ascertained, like the expected chain end-to-end length as a function of an applied force. However, most of these relations return ensemble averages, which are values with inherent uncertainty, as opposed to deterministic values with no variance. This is an important distinction to understand and quantify, because the majority of studies to date involving single-chain models effectively treat these values as deterministic rather than fluctuating. To address this issue, thermodynamic fluctuations are examined in the freely jointed chain model. Specifically, the probability densities and standard deviations of the longitudinal, lateral, transverse, and radial portions of the chain extension, as well as the extension and link angles, are examined for different numbers of links and applied forces. Fluctuations in these quantities are shown to be considerable until the applied force becomes large. Increasing the number of links in the chain gradually reduces fluctuations in all quantities except for the link angles, since they are independent for freely jointed chains in the isotensional ensemble. Quantities are obtained analytically whenever possible and numerically otherwise. Overall, these results provide intuitive admonitions to consider when modeling the stretching of single polymer chains or the deformation of entire polymer networks.", "url": "https://arxiv.org/abs/2604.11713", "type": "理论+数值", "summary": "通过使用理想化的单链模型来研究聚合物物理是很常见的，其中最流行的是自由连接链模型。在某些热力学系综中，该模型的统计机械处理在分析上是易于处理的，或者有时是精确可解的。这使得能够确定有用的关系，例如作为施加力的函数的预期链条端到端长度。然而，这些关系中的大多数返回整体平均值，这些平均值是具有固有不确定性的值，而不是没有方差的确定性值。这是理解和量化的一个重要区别，因为迄今为止涉及单链模型的大多数研究有效地将这些值视为确定性的而不是波动的。为了解决这个问题，在自由连接链模型中检查热力学波动。具体来说，针对不同数量的链节和施加的力，检查链条延伸的纵向、横向、横向和径向部分的概率密度和标准偏差，以及延伸和链节角度。\n\n在所施加的力变大之前，这些量的波动被证明是相当大的。增加链中的链节数量逐渐减少除链节角度之外的所有量的波动，因为它们对于等张系综中的自由连接链是独立的。只要有可能，数量就通过分析获得，否则通过数值获得。总的来说，这些结果提供了在对单个聚合物链的拉伸或整个聚合物网络的变形进行建模时需要考虑的直观警告。", "authors": [{"name": "Michael R. Buche"}, {"name": "Alvin Chen"}], "featured_authors": [{"name": "Michael R. Buche"}, {"name": "Alvin Chen"}], "author_count": 2}, {"id": "2604.11738", "category": "cond-mat", "title": "Reduced pair breaking from extended disorder in unconventional superconductors: implications to 4Hb-TaS$_2$", "abstract": "Unconventional superconductivity is generally expected to be strongly suppressed by nonmagnetic disorder, as captured by Abrikosov--Gor'kov (AG) theory. However, several materials, including transition metal dichalcogenides, exhibit signatures of unconventional pairing despite relatively high resistivities, suggesting a breakdown of the conventional relation between momentum relaxation and pair breaking. Here, we study this problem in H-phase transition metal dichalcogenides by computing the disorder-dressed pairing susceptibility. We employ a multiband model with spin-orbit coupling and include an impurity potential that mimics a common lattice defect, namely a chalcogen vacancy or site ad-atom. This yields to an extended impurity potential, which we compare with the commonly considered on-site (point defect) potential. We evaluate the momentum-relaxation rate and the pair-breaking rate on equal footing. We find that extended impurity potentials lead to a parametrically reduced pair-breaking rate compared to the transport scattering rate, with $\\Gamma \\tau_D \\sim 1/3$ over a wide parameter range. This reduction originates from the momentum structure of the disorder potential, which partially matches the internal structure of the superconducting gap and suppresses pair-breaking processes. As a result, unconventional pairing states are significantly more robust than predicted by standard AG theory. Our results provide a natural explanation for the persistence of unconventional superconductivity in systems with strong disorder and substantially alleviate the apparent conflict between high resistivity and unconventional pairing in materials such as 4Hb-TaS$_2$.", "url": "https://arxiv.org/abs/2604.11738", "type": "理论+数值", "summary": "正如阿布里科索夫-戈尔科夫 (AG) 理论所描述的那样，非常规超导性通常预计会受到非磁性无序的强烈抑制。然而，包括过渡金属二硫属化物在内的几种材料，尽管电阻率相对较高，却表现出非常规配对的特征，这表明动量弛豫和配对断裂之间的传统关系被打破。在这里，我们通过计算无序配对敏感性来研究 H 相过渡金属二硫属化物中的这个问题。我们采用具有自旋轨道耦合的多能带模型，并包括模拟常见晶格缺陷（即硫族空位或位点ad原子）的杂质势。这产生了扩展的杂质电势，我们将其与通常考虑的现场（点缺陷）电势进行比较。我们平等地评估动量弛豫率和破对率。我们发现，与传输散射率相比，扩展的杂质势导致断对率在参数上降低，在较宽的参数范围内$\\Gamma \\tau_D \\sim 1/3$。\n\n这种减少源于无序势的动量结构，它部分匹配超导间隙的内部结构并抑制断对过程。因此，非常规配对状态比标准 AG 理论预测的更加稳健。我们的结果为强无序系统中非常规超导性的持续存在提供了自然的解释，并大大缓解了 4Hb-TaS$_2$ 等材料中高电阻率和非常规配对之间的明显冲突。", "authors": [{"name": "Yuval Tsur"}, {"name": "Mark H. Fischer"}, {"name": "Jonathan Ruhman"}], "featured_authors": [{"name": "Yuval Tsur"}, {"name": "Mark H. Fischer"}, {"name": "Jonathan Ruhman"}], "author_count": 3}, {"id": "2604.11780", "category": "cond-mat", "title": "Multiple spiking functionalities in annealing-optimized Ag/Hf$_{0.5}$Zr$_{0.5}$O$_2$-based memristive neurons", "abstract": "Rapid progress of artificial neural network applications in recent years has led to the issue of an unprecedented energy consumption. It can be solved by the implementation of energy efficient hardware based on non-von-Neumann architectures, which requires the development of electronic components emulating the behavior of synapses and neurons. While research of synaptic elements is vast, the technology for fabrication of scalable and highly reproducible neuronal elements is far less developed. In this paper, we demonstrate an artificial neuron with multiple functionalities based on filamentary switching Ag/Hf$_{0.5}$Zr$_{0.5}$O$_2$ (HZO) memristors. To improve the parameters of memristors, we propose a two-step annealing method, which allows for better control of the crystallization of the functional dielectric layer (HZO) as well as of the diffusion of active electrode (Ag) atoms. Furthermore, we demonstrate the leaky integrate-and-fire (LIF) neuronal behavior in multiple spiking modes: time-to-first-spike (TTFS), number of spikes and firing rate coding. Moreover, the neuron operation does not require the additional electronic overhead and is supported solely by a Ag/HZO memristor with a current limiting resistor connected in series. The presented results pave the way for the creation of next generation energy efficient neuromorphic hardware operating on the principles of spiking neural networks.", "url": "https://arxiv.org/abs/2604.11780", "type": "数值", "summary": "近年来人工神经网络应用的快速进步导致了前所未有的能源消耗问题。这个问题可以通过实施基于非冯诺依曼架构的节能硬件来解决，这需要开发模拟突触和神经元行为的电子元件。尽管对突触元件的研究非常广泛，但用于制造可扩展和高度可重复的神经元元件的技术还远远不够发达。在本文中，我们展示了一种基于丝状开关 Ag/Hf$_{0.5}$Zr$_{0.5}$O$_2$ (HZO) 忆阻器的具有多种功能的人工神经元。为了改善忆阻器的参数，我们提出了一种两步退火方法，可以更好地控制功能介电层（HZO）的结晶以及活性电极（Ag）原子的扩散。此外，我们还展示了多种尖峰模式下的泄漏积分和激发（LIF）神经元行为：首次尖峰时间（TTFS）、尖峰数量和激发率编码。\n\n此外，神经元操作不需要额外的电子开销，仅由带有串联限流电阻的 Ag/HZO 忆阻器支持。所提出的结果为创建基于尖峰神经网络原理的下一代节能神经形态硬件铺平了道路。", "authors": [{"name": "Nikita Zhidkov"}, {"name": "Andrei Zenkevich"}, {"name": "Anton Khanas"}], "featured_authors": [{"name": "Nikita Zhidkov"}, {"name": "Andrei Zenkevich"}, {"name": "Anton Khanas"}], "author_count": 3}, {"id": "2604.11800", "category": "cond-mat", "title": "Diffusing diffusivity model with dichotomous noise", "abstract": "We study Langevin dynamics with stochastic diffusivity arising from fluctuations of the surrounding medium. The diffusivity is modeled as Ornstein-Uhlenbeck process driven by symmetric dichotomous noise, which confines it to a finite interval. We derive analytical expressions for the short-time probability density function (PDF) of the particle displacement and analyse its asymptotic behaviour. While the PDF retains the characteristic logarithmic divergence at the origin, its tails differ from the Gaussian white-noise case: exponential tails are replaced by Gaussian ones modulated by a power-law with a switching-rate-dependent exponent. At long times, the dynamics converges to ordinary Gaussian diffusion. We determine the variance and covariance of the time-averaged stochastic diffusivity and show that it is self-averaging. The model provides a minimal analytically tractable framework for stochastic transport in environments with bounded or switching fluctuations.", "url": "https://arxiv.org/abs/2604.11800", "type": "理论", "summary": "我们利用周围介质波动产生的随机扩散率来研究朗之万动力学。扩散率被建模为由对称二分噪声驱动的 Ornstein-Uhlenbeck 过程，将其限制在有限区间内。我们推导了粒子位移的短时概率密度函数（PDF）的解析表达式并分析了其渐近行为。虽然 PDF 保留了原点处的对数散度特征，但其尾部与高斯白噪声情况不同：指数尾部被由具有开关速率相关指数的幂律调制的高斯尾部取代。在很长一段时间内，动力学收敛于普通的高斯扩散。我们确定了时间平均随机扩散率的方差和协方差，并表明它是自平均的。该模型为具有有限或切换波动的环境中的随机传输提供了一个最小的分析易处理框架。", "authors": [{"name": "Dongho Lee"}, {"name": "Jae-Hyung Jeon"}, {"name": "Pascal Viot"}, {"name": "Gleb Oshanin"}], "featured_authors": [{"name": "Dongho Lee"}, {"name": "Jae-Hyung Jeon"}, {"name": "Pascal Viot"}, {"name": "Gleb Oshanin"}], "author_count": 4}, {"id": "2604.09655", "category": "hep-th", "title": "Note About Relational Mechanics of General Forms of Particle Actions", "abstract": "In this short note we show that any action for $N$ interacting particles can be made invariant under gauged Galilean transformations. While resulting Lagrangian is generally very complicated its Hamiltonian has simple form with first class constraints which are generators of corresponding gauge transformations included.", "url": "https://arxiv.org/abs/2604.09655", "type": "理论", "summary": "在这篇简短的文章中，我们表明，在计量伽利略变换下，$N$ 相互作用粒子的任何作用都可以保持不变。虽然最终的拉格朗日量通常非常复杂，但其哈密顿量具有简单的形式，具有第一类约束，这些约束是包含相应规范变换的生成器。", "authors": [{"name": "J. Kluson"}], "featured_authors": [{"name": "J. Kluson"}], "author_count": 1}, {"id": "2604.09765", "category": "hep-th", "title": "Multi-soft theorems for cosmological correlators: Background wave method for scalars & gravitons", "abstract": "Cosmological soft theorems (or consistency relations) provide a powerful probe for the physics of inflation. These relations rely on minimal assumptions and hold very generally. Consequently, any violation of these relations would rule out a large class of inflationary models. For instance, a violation of the scalar soft theorem (or consistency relation) would rule out all attractor single-field inflation models and instead point toward either multi-field dynamics or a non-attractor phase. In this paper, we derive tree-level multi-soft theorems, at leading order in the soft expansion, for both scalar and tensor correlation functions. Our analysis employs the background-wave method, in which the effect of long-wavelength modes is captured by an appropriate spatial coordinate rescaling. In addition, we systematically incorporate soft-exchange contributions, including tensor exchanges in scalar correlators and scalar exchanges in tensor correlators.", "url": "https://arxiv.org/abs/2604.09765", "type": "理论", "summary": "宇宙学软定理（或一致性关系）为暴胀物理学提供了有力的探索。这些关系依赖于最小的假设并且非常普遍。因此，任何对这些关系的违反都会排除一大类通货膨胀模型。例如，违反标量软定理（或一致性关系）将排除所有吸引子单场膨胀模型，而是指向多场动力学或非吸引子阶段。在本文中，我们针对标量和张量相关函数，以软展开的前导顺序推导了树级多重软定理。我们的分析采用背景波方法，其中长波长模式的影响通过适当的空间坐标重新缩放来捕获。此外，我们系统地纳入了软交换贡献，包括标量相关器中的张量交换和张量相关器中的标量交换。", "authors": [{"name": "Farman Ullah"}], "featured_authors": [{"name": "Farman Ullah"}], "author_count": 1}, {"id": "2604.09771", "category": "hep-th", "title": "Towards a Carrollian Description of Yang-Mills", "abstract": "We provide a theory defined purely on null infinity that describes Yang-Mills in the Minkowski space bulk. The dynamical field of our model is the characteristic data of the bulk gauge field, and the action combines an electric branch Carrollian kinetic term with non-local interactions of MHV type that link different points on the celestial sphere. We explicitly show how this theory recovers all MHV and NMHV tree amplitudes in Yang-Mills, and outline how arbitrary tree amplitudes may be obtained from its Feynman diagram expansion. The detailed expression we find for the NMHV amplitude appears to be new.", "url": "https://arxiv.org/abs/2604.09771", "type": "理论", "summary": "我们提供了一种纯粹基于零无穷大定义的理论，该理论描述了闵可夫斯基空间体中的杨-米尔斯。我们模型的动力场是体积规范场的特征数据，其作用结合了电分支卡罗尔动力学项和连接天球上不同点的 MHV 型非局域相互作用。我们明确地展示了该理论如何恢复 Yang-Mills 中的所有 MHV 和 NMHV 树振幅，并概述如何从其费曼图展开中获得任意树振幅。我们发现的 NMHV 振幅的详细表达式似乎是新的。", "authors": [{"name": "Jeffrey Opreij"}, {"name": "David Skinner"}, {"name": "Hangzhi Wang"}], "featured_authors": [{"name": "Jeffrey Opreij"}, {"name": "David Skinner"}, {"name": "Hangzhi Wang"}], "author_count": 3}, {"id": "2604.09925", "category": "hep-th", "title": "How to deal with conformal and pure scale-invariant theories of gravity in d dimensions?", "abstract": "Conformally-invariant and pure, scale-invariant theories of gravity are particularly interesting in four or higher dimensions. Yet, in contrast to their four-dimensional counterparts, theories in higher dimensions are significantly more difficult to study. In these proceedings, following our recent work, we will formulate such theories in d dimensions, present an elegant way to handle them, and show that imposing invariance under scale or conformal transformations gives rise to entirely different properties when compared to their four-dimensional analogues.", "url": "https://arxiv.org/abs/2604.09925", "type": "理论", "summary": "共形不变和纯尺度不变的引力理论在四维或更高维度中特别有趣。然而，与四维理论相比，高维理论的研究难度要大得多。在这些论文中，继我们最近的工作之后，我们将在 d 维中制定此类理论，提出一种优雅的方式来处理它们，并证明在尺度或共形变换下施加不变性会产生与其四维类似物完全不同的属性。", "authors": [{"name": "Anamaria Hell"}, {"name": "Dieter Lust"}], "featured_authors": [{"name": "Anamaria Hell"}, {"name": "Dieter Lust"}], "author_count": 2}, {"id": "2604.09928", "category": "hep-th", "title": "Charges of supergravity", "abstract": "We study conserved charges of $\\mathcal{N}=1$ supergravity formulated as a constrained BF theory based on the $\\OSp(1|4)$ superalgebra. Using the covariant phase space formalism, we derive bulk and boundary contributions to the symplectic structure and construct charges associated with Lorentz transformations, supersymmetry, translations, and diffeomorphisms. We show that the algebra of boundary charges reproduces the expected superalgebra, while translational charges vanish on-shell due to the super-torsion constraint, leaving Lorentz and supersymmetry as the non-trivial generators.", "url": "https://arxiv.org/abs/2604.09928", "type": "理论", "summary": "我们研究 $\\mathcal{N}=1$ 超引力的守恒电荷，其公式化为基于 $\\OSp(1|4)$ 超代数的约束 BF 理论。使用协变相空间形式主义，我们推导出对辛结构的体积和边界贡献，并构造与洛伦兹变换、超对称性、平移和微分同胚相关的电荷。我们证明边界电荷的代数再现了预期的超代数，而平移电荷由于超扭转约束而在壳上消失，留下洛伦兹和超对称性作为非平凡的生成器。", "authors": [{"name": "Remigiusz Durka"}, {"name": "Jerzy Kowalski-Glikman"}, {"name": "Rene Payne"}], "featured_authors": [{"name": "Remigiusz Durka"}, {"name": "Jerzy Kowalski-Glikman"}, {"name": "Rene Payne"}], "author_count": 3}, {"id": "2604.09973", "category": "hep-th", "title": "Quantum Energy Teleportation Across Lattice and Continuum", "abstract": "Quantum energy teleportation (QET) has been studied in continuum field theory and in lattice many-body systems, but the relation between the two within a single interacting model is still not well understood. To address this question, we consider the massive Thirring model, equivalently the sine--Gordon theory. In the continuum, the trigonometric measurement is a weak binary Positive Operator-Valued Measure (POVM), and its leading signal is set by a conserved-current correlator in the bosonized theory, with both gapless behavior and gapped large-distance asymptotics. On the lattice, the conventional protocol does not access this neutral current sector. For Alice's local measurement, a lattice $U(1)$ selection rule removes the neutral current contribution from Bob's subsystem, and the separated signal lies in charged sectors. On the same lattice Hamiltonian we construct a neutral current protocol whose weak signal is exactly a coarse-grained current correlator and whose extracted energy scales quadratically with the measurement strength. This identifies the neutral sector shared by the lattice and continuum descriptions, while separating it from the charged sector that governs the conventional qubit protocol.", "url": "https://arxiv.org/abs/2604.09973", "type": "理论", "summary": "量子能量隐形传态（QET）已经在连续场论和晶格多体系统中进行了研究，但在单个相互作用模型中两者之间的关系仍然没有得到很好的理解。为了解决这个问题，我们考虑大规模 Thirring 模型，相当于正弦戈登理论。在连续统中，三角测量是一种弱二元正算子值测量（POVM），其主导信号由玻色理论中的保守电流相关器设定，具有无间隙行为和有间隙大距离渐近。在格子上，传统协议不访问这个中性电流扇区。对于 Alice 的本地测量，格子 $U(1)$ 选择规则消除了 Bob 子系统的中性电流贡献，并且分离的信号位于带电扇区中。在同一晶格哈密顿量上，我们构建了一个中性电流协议，其弱信号恰好是粗粒度电流相关器，并且其提取的能量与测量强度成二次方。\n\n这标识了晶格和连续体描述共享的中性部分，同时将其与控制传统量子位协议的带电部分分开。", "authors": [{"name": "Kazuki Ikeda"}], "featured_authors": [{"name": "Kazuki Ikeda"}], "author_count": 1}, {"id": "2604.10090", "category": "hep-th", "title": "Quantum simulation of traversable-wormhole-inspired quantum teleportation in a chaotic binary sparse SYK model", "abstract": "We report the experimental observation of holographically motivated quantum teleportation on a quantum processor, driven by the highly entangled, chaotic dynamics of a many-body system. Specifically, we implement the traversable-wormhole (TW) protocol utilizing a \\textit{chaotic} binary sparse $N = 8$ Sachdev--Ye--Kitaev (SYK) model. This optimized approach dramatically reduces circuit depth for noisy intermediate-scale quantum (NISQ) hardware while rigorously preserving the spectral chaos required for gravitational duality. Diagnosing the teleportation signal via mutual information, we find that while inherent noise in NISQ hardware precludes perfect quantitative agreement with exact numerical simulations, our experimental results clearly demonstrate the essential qualitative signature: a sign-dependent asymmetry. This work establishes a practical, scalable framework for holographic quantum simulations, offering a novel empirical testbed for exploring holographic quantum gravity.", "url": "https://arxiv.org/abs/2604.10090", "type": "理论", "summary": "我们报告了在量子处理器上由全息驱动的量子隐形传态的实验观察，该量子隐形传态是由多体系统的高度纠缠、混沌动力学驱动的。具体来说，我们利用 \\textit{chaotic} 二进制稀疏 $N = 8$ Sachdev--Ye--Kitaev (SYK) 模型实现可遍历虫洞 (TW) 协议。这种优化方法极大地减少了噪声中尺度量子（NISQ）硬件的电路深度，同时严格保留了引力对偶性所需的光谱混沌。通过互信息诊断隐形传态信号，我们发现虽然 NISQ 硬件中的固有噪声妨碍了与精确数值模拟的完美定量一致性，但我们的实验结果清楚地证明了基本的定性特征：符号相关的不对称性。这项工作为全息量子模拟建立了一个实用的、可扩展的框架，为探索全息量子引力提供了一个新颖的经验测试平台。", "authors": [{"name": "Moongul Byun"}, {"name": "Keun-Young Kim"}, {"name": "Hyeonsoo Lee"}], "featured_authors": [{"name": "Moongul Byun"}, {"name": "Keun-Young Kim"}, {"name": "Hyeonsoo Lee"}], "author_count": 3}, {"id": "2604.10163", "category": "hep-th", "title": "Hall transports from Taub-NUT AdS black holes", "abstract": "We compute Hall transport coefficients associated with Taub-NUT AdS black holes in four space-time dimensions using the probe D-brane approach. In particular, we examine the effects due to the NUT parameter ($n$), or equivalently, the novel frame-dragging on the holographic charge transport properties. In our analysis, we treat the external electric field as a constant background, while varying the magnetic field ($B$) from small to finite. Within this framework, we analyze conductivities in both low and high temperature regions, focusing on locations that are both near and far from the Misner string. Our calculations show that frame-dragging effects are significant primarily at lower temperatures and near the Misner string, while a small magnetic field is maintained. However, these effects become negligibly small at a ``finite\" magnetic field and even at lower temperatures. Our analysis reveals the existence of finite Hall transport, that has its origin in the novel frame-dragging.", "url": "https://arxiv.org/abs/2604.10163", "type": "理论", "summary": "我们使用探针 D 膜方法计算了四个时空维度中与 Taub-NUT AdS 黑洞相关的霍尔传输系数。特别是，我们检查了 NUT 参数 ($n$) 的影响，或者等效地，新颖的框架拖动对全息电荷传输特性的影响。在我们的分析中，我们将外部电场视为恒定背景，同时将磁场 ($B$) 从小到有限变化。在此框架内，我们分析了低温和高温区域的电导率，重点关注靠近和远离米斯纳弦的位置。我们的计算表明，框架拖曳效应主要在较低温度和米斯纳弦附近显着，同时保持较小的磁场。然而，这些效应在“有限”磁场甚至较低温度下变得可以忽略不计。我们的分析揭示了有限霍尔传输的存在，其起源于新颖的框架拖动。", "authors": [{"name": "Mohd Aariyan Khan"}, {"name": "Hemant Rathi"}, {"name": "Dibakar Roychowdhury"}], "featured_authors": [{"name": "Mohd Aariyan Khan"}, {"name": "Hemant Rathi"}, {"name": "Dibakar Roychowdhury"}], "author_count": 3}, {"id": "2604.10267", "category": "hep-th", "title": "The yes boundaries wavefunctions of the universe", "abstract": "A generic spacetime topology contains timelike boundaries. Making use of two such boundaries, we formulate a microscopic holographic dual that captures cosmological spacetime beyond the cosmic horizon patch, including the future wedge. We build this starting from two copies of the dressed Hamiltonian quantum theories which formulate the cosmic horizon and pole patches of de Sitter. At the top level of the spectrum we obtain the extended spacetime from a nearly maximally entangled (micro-)canonical thermofield double state. This requires addressing the maximality of the unrenormalized gravitational path integral saddle in the calculation of the entanglement entropy upon tracing out one sector. We resolve this in both ensembles via explicit computations in the constrained path integral for three bulk dimensions, incorporating UV-sensitive quantum beyond-GR effects when they contribute strongly. Lower energy levels in the spectrum generate tall extended spacetimes where the boundaries' causal wedges overlap. These arise in our theory via constraints on the doubled Hilbert space, which encode the operator redundancies arising from the reconstruction of bulk operators from either boundary within the region where their causal wedges overlap. With positive cosmological constant, the tallness implies that causal wedge reconstruction is more powerful than in the AdS/CFT setting. In contrast to the special case of a closed universe, generically quantum gravity with positive cosmological constant -- including the future wedge -- is manifestly consistent with the existence of multiple states.", "url": "https://arxiv.org/abs/2604.10267", "type": "理论", "summary": "通用时空拓扑包含类时边界。利用两个这样的边界，我们制定了一个微观全息对偶，捕捉宇宙地平线斑块之外的宇宙时空，包括未来的楔子。我们从两个经过修饰的哈密顿量子理论的副本开始构建这个理论，这些理论制定了德西特的宇宙视界和极斑。在光谱的顶层，我们从几乎最大纠缠的（微）正则热场双态获得了扩展的时空。这需要在追踪一个扇区时计算纠缠熵时解决未重整化引力路径积分鞍的最大值。我们通过对三个体积维度的约束路径积分进行显式计算，在两个系综中解决了这个问题，并在紫外线敏感的量子超越GR效应发挥很大作用时纳入其中。光谱中较低的能级会产生较高的扩展时空，其中边界的因果楔形重叠。\n\n这些在我们的理论中是通过对双希尔伯特空间的约束而产生的，该空间对从因果楔重叠区域内的任一边界重建体算子而产生的算子冗余进行编码。在宇宙学常数为正的情况下，高度意味着因果楔重建比 AdS/CFT 设置中更强大。与封闭宇宙的特殊情况相反，具有正宇宙学常数的一般量子引力（包括未来楔形）显然与多种状态的存在一致。", "authors": [{"name": "Batoul Banihashemi"}, {"name": "Gauri Batra"}, {"name": "Albert Y.T. Law"}, {"name": "Eva Silverstein"}, {"name": "Gonzalo Torroba"}], "featured_authors": [{"name": "Batoul Banihashemi"}, {"name": "Gauri Batra"}, {"name": "Albert Y.T. Law"}, {"name": "Eva Silverstein"}, {"name": "Gonzalo Torroba"}], "author_count": 5}, {"id": "2604.10284", "category": "hep-th", "title": "Some progress on the use of the variational method in quantum field theory", "abstract": "Strongly coupled quantum field theories in $(1+1)$ dimensions are notoriously hard to solve non-perturbatively. Variational methods, despite their succes
