translate into stronger hybrid quantum neural network performance within a fixed qubit budget across several tasks, including an accuracy of 0.826 and an AUC of 0.978 for Wine, as well as an accuracy of 0.840 and an AUC of 0.923 for Moons. These results demonstrate that SPATE provides a practical spike-to-phase interface for building more informative quantum feature representations under constrained resources.", "url": "https://arxiv.org/abs/2604.11022", "type": "理论+数值", "summary": "大多数量子机器学习（QML）管道仍然依赖于静态编码，例如角度和幅度图，这限制了它们处理时间信息的能力。为了解决这个限制，本文使用基于尖峰的数据表示作为一种有效的编码机制，将时间结构纳入量子特征准备中。具体来说，我们提出了尖峰相位自适应时间编码（SPATE），这是一种新颖的尖峰驱动时间编码方法，它将实值表格特征转换为泄漏积分和激发尖峰序列，并将尖峰统计数据映射到量子旋转，通过受控相位操作用一小组时间量子位进行增强。还引入了以编码为中心的评估协议来评估独立于分类器的表示质量，涵盖中心核目标对齐（CKTA）、Fisher 式可分离性、类间/类内距离比率、轮廓得分、归一化熵和成对总变异（TVpair）崩溃指标。在分层交叉验证下，SPATE 在多个数据集上产生更强的表示。\n\n例如，SPATE 在 Blob 上的 CKTA 为 0.966，Fisher 得分为 7.37，而使用角度编码时的 CKTA 为 0.632，Fisher 得分为 0.70；在卫星上，SPATE 的 CKTA 为 0.506，而使用角度或幅度编码时为 0.015。这些收益转化为在多个任务的固定量子位预算内更强的混合量子神经网络性能，包括 Wine 的准确度 0.826 和 AUC 0.978，以及 Moons 的准确度 0.840 和 AUC 0.923。这些结果表明，SPATE 提供了一个实用的脉冲到相位接口，用于在资源有限的情况下构建信息更丰富的量子特征表示。", "authors": [{"name": "Nouhaila Innan"}, {"name": "Rachmad Vidya Wicaksana Putra"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Nouhaila Innan"}, {"name": "Rachmad Vidya Wicaksana Putra"}, {"name": "Muhammad Shafique"}], "author_count": 3}, {"id": "2604.11059", "category": "quant-ph", "title": "Automorphism-Induced Entanglement Bounds in Many-Body Systems", "abstract": "We derive an upper bound on the maximum balanced bipartite entanglement entropy of ground states of many-body Hamiltonians defined on a graph, agnostic to any particular model, that possesses a nontrivial automorphism group. We show that the entropy is bounded by the logarithm of a weighted sum of multiplicities of irreducible representations of the bipartition-preserving automorphism subgroup. This bound complements the known degeneracy-based bound, with neither universally dominating the other. For the complete graph $K_n$, the new bound yields an exponential improvement from linear to logarithmic scaling in the system size, consistent with the exact value of the entropy.", "url": "https://arxiv.org/abs/2604.11059", "type": "理论", "summary": "我们推导出在图上定义的多体哈密顿量的基态最大平衡二分纠缠熵的上限，该上限与任何特定模型无关，具有非平凡的自同构群。我们证明熵的界限是二分保留自同构子群的不可约表示的多重性的加权和的对数。该界限补充了已知的基于简并的界限，两者都不普遍支配另一个。对于完整的图 $K_n$，新的界限使系统大小从线性缩放到对数缩放呈指数级改进，与熵的精确值一致。", "authors": [{"name": "Saikat Sur"}], "featured_authors": [{"name": "Saikat Sur"}], "author_count": 1}, {"id": "2604.11113", "category": "quant-ph", "title": "Schrödinger-Navier-Stokes Equation for the Quantum Simulation of Navier-Stokes Flows", "abstract": "The search for quantum-like wave formulations of the Navier-Stokes (Schrödinger-Navier-Stokes, SNS for short) equations describing classical dissipative fluids has met with increasing attention in the recent years, due to the large portfolio of potential applications in science and engineering. A SNS formulation of classical fluids was first presented in a largely un-noticed paper by Dietrich and Vautherin back in 1985(Journal de Physique). In this paper, we revisit this specific SNS approach and assess its viability for quantum implementations based on Carleman embedding/linearization techniques. Specifically, we i) Clarify in full mathematical detail why the SNS dissipator presents a steep challenge for quantum computers and propose a way out strategy based on the Hamilton-Jacobi (HJ) formulation of fluid dynamics; ii) Develop a corresponding quantum algorithm using a new technique based on a tensor-network representation of Carleman embedding of the HJ equations (CHJ) which permits substantial memory savings; iii) Emulate the CHJ quantum algorithm on a classical computer and analyse its convergence and accuracy for the specific case of Kolmogorov-like flows at moderate Reynolds numbers. To the best of our knowledge, this is the first quantum algorithm based on a quantum-like wave formulation of the genuine Navier-Stokes equations, including pressure, dissipation and vorticity.", "url": "https://arxiv.org/abs/2604.11113", "type": "理论+数值", "summary": "近年来，由于在科学和工程领域的大量潜在应用，对描述经典耗散流体的纳维-斯托克斯（薛定谔-纳维-斯托克斯，简称 SNS）方程的类量子波公式的研究受到越来越多的关注。早在 1985 年，Dietrich 和 Vautherin 在一篇基本上未被注意到的论文（Journal de Physique）中首次提出了经典流体的 SNS 公式。在本文中，我们重新审视这种特定的 SNS 方法，并评估其基于卡尔曼嵌入/线性化技术的量子实现的可行性。\n\n具体来说，我们 i) 以完整的数学细节阐明为什么 SNS 耗散器对量子计算机提出了严峻的挑战，并提出了一种基于流体动力学的 Hamilton-Jacobi (HJ) 公式的出路策略； ii) 使用基于 HJ 方程 (CHJ) 卡尔曼嵌入的张量网络表示的新技术开发相应的量子算法，该算法可以节省大量内存； iii) 在经典计算机上模拟 CHJ 量子算法，并针对中等雷诺数下的类 Kolmogorov 流的特定情况分析其收敛性和准确性。据我们所知，这是第一个基于真实纳维-斯托克斯方程（包括压力、耗散和涡度）的类量子波公式的量子算法。", "authors": [{"name": "Luca Cappelli"}, {"name": "Sauro Succi"}, {"name": "Monica Lacatus"}, {"name": "Alessandro Zecchi"}, {"name": "Alessandro Roggero"}], "featured_authors": [{"name": "Luca Cappelli"}, {"name": "Sauro Succi"}, {"name": "Monica Lacatus"}, {"name": "Alessandro Zecchi"}, {"name": "Alessandro Roggero"}], "author_count": 5}, {"id": "2604.11409", "category": "quant-ph", "title": "When T-Depth Misleads: Predicting Fault-Tolerant Quantum Execution Slowdown under Magic-State Delivery Constraints", "abstract": "The efficient execution of fault-tolerant quantum algorithms is fundamentally limited by the production rate of magic states required for non-Clifford operations. While circuit optimization typically targets T-depth, static T-depth does not reliably predict executable performance under bounded T-state delivery. We introduce a model that captures demand-supply imbalance using two key quantities: slack ratio, a structural indicator of scheduling flexibility, and Delta_max, a measure of cumulative demand surplus. We show that Delta_max is a strong schedule-level indicator of execution slowdown and yields a provable lower bound on executable makespan for a fixed schedule. Empirical evaluation on constructed directed acyclic graph (DAG) families, with arithmetic circuits and exact quantum Fourier transform (QFT) traces providing additional grounding, shows that slack ratio is a stronger structural predictor than T-depth for stall and inversion risk, while Delta_max is the strongest predictor of slowdown. Across 4,904 instances, the lower bound shows zero violations, with 88.9% of cases within one cycle. These results highlight the importance of explicitly modeling delivery constraints in fault-tolerant quantum compilation.", "url": "https://arxiv.org/abs/2604.11409", "type": "理论+数值", "summary": "容错量子算法的高效执行从根本上受到非 Clifford 操作所需的幻态生成速率的限制。虽然电路优化通常以 T 深度为目标，但静态 T 深度不能可靠地预测有界 T 状态交付下的可执行性能。我们引入了一个模型，该模型使用两个关键量来捕获供需失衡：松弛率（调度灵活性的结构指标）和 Delta_max（累积需求过剩的度量）。我们证明 Delta_max 是执行速度减慢的强大调度级别指标，并为固定调度的可执行完工时间提供了可证明的下限。对构造的有向无环图 (DAG) 系列的实证评估，以及提供额外基础的算术电路和精确的量子傅里叶变换 (QFT) 迹线，表明对于失速和反转风险，松弛比是比 T 深度更强的结构预测因子，而 Delta_max 是最强的减速预测因子。在 4,904 个实例中，下限显示零违规，其中 88.9% 的案例在一个周期内。\n\n这些结果凸显了在容错量子编译中显式建模交付约束的重要性。", "authors": [{"name": "Boshuai Ye"}, {"name": "Arif Ali Khan"}, {"name": "Peng Liang"}], "featured_authors": [{"name": "Boshuai Ye"}, {"name": "Arif Ali Khan"}, {"name": "Peng Liang"}], "author_count": 3}, {"id": "2604.11455", "category": "quant-ph", "title": "Noise-Induced Resurrection of Dynamical Skin Effects in Quasiperiodic Non-Hermitian Systems", "abstract": "The non-Hermitian skin effect (NHSE) refers to the accumulation of an extensive number of eigenstates at system boundaries under open boundary conditions (OBCs). As a dynamical consequence, wave packets in such systems drift and ultimately accumulate at a boundary, giving rise to the dynamical skin effect (DSE). While strong quasiperiodic potentials are known to suppress the DSE by inducing localization, we show that the introduction of Ornstein-Uhlenbeck (OU) noise unexpectedly restores it. Using perturbative analysis, we demonstrate that noise effectively maps the non-Hermitian Schrödinger dynamics onto a non-reciprocal master equation, whose complex spectrum develops a noise-induced point gap. This mechanism enables delocalization, reinstates directional transport, and revives the DSE even in regimes where the static NHSE is absent. Moreover, the relaxation dynamics exhibit a non-monotonic dependence on noise strength, reflecting a competition between noise-assisted delocalization and noise-induced decoherence. Our results uncover a noise-enabled mechanism for resurrecting the DSE and suggest a new route for controlling transport in quasiperiodic, open quantum systems.", "url": "https://arxiv.org/abs/2604.11455", "type": "理论", "summary": "非厄米集肤效应（NHSE）是指开放边界条件（OBC）下系统边界处大量本征态的积累。作为动力学结果，此类系统中的波包会漂移并最终在边界处累积，从而产生动态集肤效应 (DSE)。虽然已知强准周期势能通过诱导局域化来抑制 DSE，但我们发现 Ornstein-Uhlenbeck (OU) 噪声的引入意外地恢复了 DSE。使用微扰分析，我们证明噪声有效地将非厄米薛定谔动力学映射到非互易主方程上，其复杂的频谱产生了噪声引起的点间隙。即使在静态 NHSE 不存在的情况下，这种机制也能实现离域、恢复定向传输并恢复 DSE。此外，弛豫动力学表现出对噪声强度的非单调依赖性，反映了噪声辅助离域和噪声引起的退相干之间的竞争。我们的结果揭示了一种恢复 DSE 的噪声驱动机制，并提出了一种控制准周期、开放量子系统中传输的新途径。", "authors": [{"name": "Wuping Yang"}, {"name": "H. Huang"}], "featured_authors": [{"name": "Wuping Yang"}, {"name": "H. Huang"}], "author_count": 2}, {"id": "2604.11478", "category": "quant-ph", "title": "Accuracy-Cost Trade-offs for Reference VQE Calculations of H$_2$ on IBM Quantum Hardware", "abstract": "We present a hardware-validated reference dataset for variational ground-state energy calculations of the hydrogen molecule H\\(_2\\) on several IBM Quantum processors available in 2026. Using a standardized workflow, we benchmark the impact of shot count, backend choice, optimization strategy, and runtime variability on the achievable energy accuracy relative to exact diagonalization. The resulting dataset and analysis provide a transparent baseline for assessing the current capabilities and limitations of IBM Quantum hardware for quantum-chemistry applications, and are meant to ease the entry for new users by providing a comprehensive overview of choices and their effects as well as runtime efforts and costs that can be expected. Across the configurations studied here, circuit simplification through tapered mappings provides the most consistent accuracy gains, resilience level 1 improves accuracy at a substantial cost premium, and session-based execution yields no systematic accuracy advantage over single-job execution despite markedly higher billed time.", "url": "https://arxiv.org/abs/2604.11478", "type": "数值", "summary": "我们提供了一个经过硬件验证的参考数据集，用于在 2026 年推出的多个 IBM Quantum 处理器上进行氢分子 H\\(_2\\) 的变基态能量计算。使用标准化工作流程，我们对发射次数、后端选择、优化策略和运行时可变性对相对于精确对角化的可实现能量精度的影响进行了基准测试。生成的数据集和分析为评估 IBM Quantum 硬件在量子化学应用中的当前功能和限制提供了透明的基线，并旨在通过提供选择及其效果以及预期的运行时工作和成本的全面概述来简化新用户的入门。在此处研究的配置中，通过锥形映射进行的电路简化提供了最一致的精度增益，弹性级别 1 以相当大的成本溢价提高了精度，并且基于会话的执行相对于单作业执行没有产生系统精度优势，尽管计费时间明显更高。", "authors": [{"name": "Julen Larrucea"}, {"name": "Marita Oliv"}, {"name": "Jeanette Lorenz"}], "featured_authors": [{"name": "Julen Larrucea"}, {"name": "Marita Oliv"}, {"name": "Jeanette Lorenz"}], "author_count": 3}, {"id": "2604.11532", "category": "quant-ph", "title": "Tackling instabilities of quantum Krylov subspace methods: an analysis of the numerical and statistical errors", "abstract": "Krylov subspace methods are among the most extensively studied early fault-tolerant quantum algorithms for estimating ground-state energies of quantum systems. However, the rapid onset of ill-conditioning might make accurate energies difficult or even impossible to retrieve. In this communication, we analyse the numerical stability and statistical problems of these methods using numerical simulations both in the presence and absence of sampling noise. While in ideal numerical simulations the generalized eigenvalue problem indeed becomes unstable with increased Krylov subspace size, we find that, in realistic noisy settings, these methods do not primarily suffer from ill-conditioning. Instead, statistical fluctuations dominate and can prevent reliable solution extraction unless appropriate regularization or filtering techniques are employed. We consequently introduce two new metrics, the imaginary and unitary filters, that successfully assess the reliability of the obtained solutions without any knowledge of the true eigenspectrum.", "url": "https://arxiv.org/abs/2604.11532", "type": "数值", "summary": "克雷洛夫子空间方法是用于估计量子系统基态能量的研究最广泛的早期容错量子算法之一。然而，疾病的快速发作可能会使准确的能量难以甚至不可能恢复。在本次交流中，我们在存在和不存在采样噪声的情况下使用数值模拟来分析这些方法的数值稳定性和统计问题。虽然在理想的数值模拟中，随着 Krylov 子空间大小的增加，广义特征值问题确实变得不稳定，但我们发现，在现实的噪声环境中，这些方法主要不会受到病态条件的影响。相反，除非采用适当的正则化或过滤技术​​，否则统计波动占主导地位并且可能妨碍可靠的解提取。因此，我们引入了两个新的指标，即虚数滤波器和酉滤波器，它们可以在不了解真实特征谱的情况下成功评估所获得解决方案的可靠性。", "authors": [{"name": "Maria Gabriela Jordão Oliveira"}, {"name": "Karl Michael Ziems"}, {"name": "Nina Glaser"}], "featured_authors": [{"name": "Maria Gabriela Jordão Oliveira"}, {"name": "Karl Michael Ziems"}, {"name": "Nina Glaser"}], "author_count": 3}, {"id": "2604.11534", "category": "quant-ph", "title": "Quantum circuit optimization for arbitrary high-dimensional bipartite quantum computation", "abstract": "Implementation of high-dimensional (HD) quantum gates shows very promising perspectives for HD quantum computation. A bipartite quantum system with arbitrary dimensions $n$ and $m$ is termed a quNit-quMit. Here we propose a synthesis scheme to construct the quantum circuit for general quNit-quMit gates with controlled increment (CINC) gates and local gates. This shows that CINC gates combined with local gates form a universal gate set for HD quantum computation. An upper bound of $O(n^2)$ CINC gates is achieved for arbitrary quNit-quMit gate implementation in the proposed scheme, which is the best known result. Especially for the controlled quNit-quMit gates, our scheme requires only 2 CINC gates, whereas the previous scheme required $2n$.", "url": "https://arxiv.org/abs/2604.11534", "type": "理论+数值", "summary": "高维 (HD) 量子门的实现为 HD 量子计算展现了非常有前景的前景。具有任意维度 $n$ 和 $m$ 的二分量子系统称为 quNit-quMit。在这里，我们提出了一种综合方案来构建具有受控增量（CINC）门和局部门的通用 quNit-quMit 门的量子电路。这表明CINC门与局部门相结合形成了用于HD量子计算的通用门集。在所提出的方案中，任意 quNit-quMit 门实现都实现了 $O(n^2)$ CINC 门的上限，这是最著名的结果。特别是对于受控的 quNit-quMit 门，我们的方案仅需要 2 个 CINC 门，而之前的方案需要 $2n$。", "authors": [{"name": "Gui-Long Jiang"}, {"name": "Hai-Rui Wei"}], "featured_authors": [{"name": "Gui-Long Jiang"}, {"name": "Hai-Rui Wei"}], "author_count": 2}, {"id": "2604.11620", "category": "quant-ph", "title": "Quantum state transfer on a scalable network under unital and non-unital noise", "abstract": "We investigate quantum state transfer on a class of bipartite graphs, namely the butterfly graphs, within the framework of discrete-time quantum walks. These graphs facilitate the construction of scalable quantum networks that enable communication between a sender and a receiver via perfect state transfer. Our analysis demonstrates that state transfer occurs across different butterfly graphs, thereby extending the known families of networks that support high-fidelity quantum state transfer. In addition to the ideal noiseless dynamics, we further investigate the robustness of quantum state transfer in the presence of non-Markovian environmental noise, specifically, random telegraph noise, modified Ornstein-Uhlenbeck noise, which are examples of unital noise and non-Markovian amplitude damping noise, non-unital noise. These noise models capture different types of system-environment interactions and memory effects that influence the coherence of the quantum walk. These findings contribute to the theoretical understanding of how butterfly graph constructions influence quantum transport phenomena.", "url": "https://arxiv.org/abs/2604.11620", "type": "理论", "summary": "我们在离散时间量子行走的框架内研究一类二分图（即蝴蝶图）上的量子状态转移。这些图有助于构建可扩展的量子网络，使发送者和接收者之间能够通过完美的状态转移进行通信。我们的分析表明，状态转移发生在不同的蝴蝶图上，从而扩展了支持高保真量子状态转移的已知网络系列。除了理想的无噪声动力学之外，我们还进一步研究了在非马尔可夫环境噪声存在下量子态转移的鲁棒性，特别是随机电报噪声、修正的奥恩斯坦-乌伦贝克噪声，它们是单位噪声和非马尔可夫振幅阻尼噪声、非单位噪声的例子。这些噪声模型捕获了影响量子行走相干性的不同类型的系统-环境相互作用和记忆效应。这些发现有助于从理论上理解蝴蝶图结构如何影响量子传输现象。", "authors": [{"name": "Monika Rani"}, {"name": "Subhashish Banerjee"}, {"name": "Nikhil Swami"}, {"name": "Supriyo Dutta"}], "featured_authors": [{"name": "Monika Rani"}, {"name": "Subhashish Banerjee"}, {"name": "Nikhil Swami"}, {"name": "Supriyo Dutta"}], "author_count": 4}, {"id": "2604.11643", "category": "quant-ph", "title": "NV-ensemble enabled microwave/NV parametric amplifier with optimal driving", "abstract": "We present a fast, memory-efficient, unitarity-preserving numerical method beyond the rotating-wave approximation for the closed Tavis-Cummings model in which a multilevel spin system interacts with a cavity mode. This model can describe the interaction of an ensemble of spins with a cavity mode in which the spin frequency and other parameters are time-dependent. The method exploits the fact that, while the Tavis-Cummings model is not tri-diagonal, it can be brought into tri-diagonal form by a change of basis that can be implemented purely by re-indexing (permuting basis elements), which is a fast operation. By truncating the Fock basis of the cavity mode, the computational complexity of the method is linear in the total dimension of the coupled system in both time and memory. The method can be employed to simulate any closed quantum system whose Hamiltonian terms can be brought into tri-diagonal form.", "url": "https://arxiv.org/abs/2604.11643", "type": "理论+数值", "summary": "我们提出了一种快速、内存高效、保持幺正性的数值方法，超越了封闭 Tavis-Cummings 模型的旋转波近似，其中多级自旋系统与腔模式相互作用。该模型可以描述自旋系综与腔模式的相互作用，其中自旋频率和其他参数与时间相关。该方法利用了这样一个事实：虽然 Tavis-Cummings 模型不是三对角模型，但可以通过改变基础将其变成三对角形式，而基础的改变可以纯粹通过重新索引（排列基础元素）来实现，这是一种快速操作。通过截断腔模的 Fock 基，该方法的计算复杂度在时间和内存上与耦合系统的总维数呈线性关系。该方法可以用来模拟任何哈密顿项可以转化为三对角形式的封闭量子系统。", "authors": [{"name": "Roman Ovsiannikov"}, {"name": "Kurt Jacobs"}, {"name": "Andrii G. Sotnikov"}, {"name": "Matthew E. Trusheim"}, {"name": "Denys I. Bondar"}], "featured_authors": [{"name": "Roman Ovsiannikov"}, {"name": "Kurt Jacobs"}, {"name": "Andrii G. Sotnikov"}, {"name": "Matthew E. Trusheim"}, {"name": "Denys I. Bondar"}], "author_count": 5}, {"id": "2604.11667", "category": "quant-ph", "title": "A Comparative Study of Hybrid Quantum and Classical Genetic Algorithms in Portfolio Optimization", "abstract": "This work investigates the performance of a Hybrid Quantum Genetic Algorithm (HQGA) compared to a classical Genetic Algorithm (GA) for solving the portfolio optimization problem. Our results indicate that the HQGA converges faster to the optimal solution than its classical counterpart, while also maintaining a higher level of population diversity throughout the optimization process. In addition, the HQGA requires significantly fewer evaluations-to-solution than a brute-force approach to reach the global optimum.", "url": "https://arxiv.org/abs/2604.11667", "type": "数值", "summary": "这项工作研究了混合量子遗传算法 (HQGA) 与经典遗传算法 (GA) 相比在解决投资组合优化问题方面的性能。我们的结果表明，HQGA 比经典算法更快地收敛到最优解，同时在整个优化过程中保持了更高水平的种群多样性。此外，与暴力方法相比，HQGA 所需的解决方案评估要少得多，才能达到全局最优。", "authors": [{"name": "Romeu Rossi Junior"}, {"name": "José Augusto Miranda Nacif"}, {"name": "Leonardo Antônio Mendes Souza"}, {"name": "Marcus Henrique Soares Mendes"}], "featured_authors": [{"name": "Romeu Rossi Junior"}, {"name": "José Augusto Miranda Nacif"}, {"name": "Leonardo Antônio Mendes Souza"}, {"name": "Marcus Henrique Soares Mendes"}], "author_count": 4}, {"id": "2604.11688", "category": "quant-ph", "title": "Frustration-Induced Expressibility Limitations in Variational Quantum Algorithms", "abstract": "Geometric frustration, arising from competing interactions that prevent simultaneous energy minimization, presents a fundamental challenge for variational quantum algorithms applied to quantum many-body systems. We investigate the transverse-field Ising model on a square lattice with frustrated diagonal coupling and show that geometric frustration leads to strongly inhomogeneous correlations that are difficult to capture using standard Hamiltonian-inspired ansätze with global parameters. As a result, the required circuit depth increases significantly in the intermediate-field regime. We demonstrate that this limitation is not caused by optimization difficulties such as barren plateaus, but instead arises from insufficient expressibility of the ansatz. By introducing bond-resolved variational parameters, we recover accurate results at reduced circuit depth. We also study low-energy excitations and find that near-degenerate spectra in the frustrated regime further challenge variational methods. Our results provide a clear physical explanation for the limitations of variational quantum algorithms in frustrated systems and suggest improved ansatz design strategies for quantum simulation.", "url": "https://arxiv.org/abs/2604.11688", "type": "理论+数值", "summary": "由阻止同时能量最小化的竞争相互作用引起的几何挫败，对应用于量子多体系统的变分量子算法提出了根本挑战。我们研究了具有受挫对角耦合的方晶格上的横向场伊辛模型，并表明几何挫败会导致强烈的不均匀相关性，而使用具有全局参数的标准哈密顿启发式模型很难捕获这种相关性。因此，在中间场区域所需的电路深度显着增加。我们证明这种限制不是由诸如贫瘠高原之类的优化困难引起的，而是由 ansatz 的可表达性不足引起的。通过引入键解析变分参数，我们在减少的电路深度下恢复了准确的结果。我们还研究了低能激发，发现受挫状态下的近简并光谱进一步挑战了变分方法。\n\n我们的结果为受挫系统中变分量子算法的局限性提供了清晰的物理解释，并提出了改进量子模拟的设计策略。", "authors": [{"name": "Sandip Maiti"}], "featured_authors": [{"name": "Sandip Maiti"}], "author_count": 1}, {"id": "2604.11758", "category": "quant-ph", "title": "Hybrid Quantum-Classical Optimization Workflows for the Shipment Selection Problem", "abstract": "We present a quantum optimization framework for the Shipment Selection Problem (SSP) in electric freight logistics, developed jointly by IonQ and Einride. Idle gaps arising from stochastic shipment cancellations reduce fleet utilization and revenue; filling them optimally requires solving a combinatorial assignment problem with quadratic inter-gap dependencies. We formulate the SSP as a Mixed-Integer Quadratic Program, map it to an Ising cost Hamiltonian, and solve it using Iterative-QAOA, a non-variational warm-start extension of the Quantum Approximate Optimization Algorithm (QAOA) with a fixed linear-ramp parameter schedule. An end-to-end hybrid workflow integrates Einride's vehicle routing problem (VRP) solver with IonQ's quantum simulations, enabling evaluation on real, anonymized logistics data spanning up to 130 qubits. We assess solution quality through application-level performance metrics, including Shipments Delivered (SD), Schedule Compatibility Score (SCS), and Total Drive Distance (TDD). When the quantum assignment is passed to the classical solver as a warm start, the resulting hybrid workflow achieves improvements of up to 12\\% in SD and a reduction of up to 6\\% in total drive distance per shipment for specific instances, while total operational cost remains effectively unchanged. These results show that Iterative-QAOA can generate compatibility-aware assignments that become operationally valuable when embedded in a hybrid logistics optimization workflow.", "url": "https://arxiv.org/abs/2604.11758", "type": "理论+数值", "summary": "我们提出了由 IonQ 和 Einride 联合开发的电动货运物流中的货运选择问题 (SSP) 的量子优化框架。随机发货取消造成的闲置缺口降低了车队利用率和收入；最佳地填充它们需要解决具有二次间隙依赖性的组合分配问题。我们将 SSP 制定为混合整数二次规划，将其映射到伊辛成本哈密顿量，并使用迭代 QAOA 求解它，迭代 QAOA 是量子近似优化算法 (QAOA) 的非变分热启动扩展，具有固定的线性斜坡参数计划。端到端混合工作流程将 Einride 的车辆路径问题 (VRP) 求解器与 IonQ 的量子模拟集成在一起，从而能够对跨度高达 130 个量子位的真实、匿名物流数据进行评估。我们通过应用程序级性能指标评估解决方案质量，包括已交付货物 (SD)、进度兼容性分数 (SCS) 和总行驶距离 (TDD)。\n\n当量子分配作为热启动传递给经典求解器时，所产生的混合工作流程可在 SD 方面实现高达 12% 的改进，并将特定实例的每次运输总驱动距离减少高达 6%，而总运营成本实际上保持不变。这些结果表明，迭代-QAOA 可以生成兼容性感知任务，当嵌入到混合物流优化工作流程中时，这些任务变得具有操作价值。", "authors": [{"name": "Miguel Angel Lopez-Ruiz"}, {"name": "Daiwei Zhu"}, {"name": "Jonas Hatzenbuhler"}, {"name": "Shudian Zhao"}, {"name": "Claudio Girotto"}, {"name": "Willie Aboumrad"}, {"name": "Jonas Alm"}, {"name": "Julia Kompalla"}, {"name": "Mena Issler"}, {"name": "Ananth Kaushik"}, {"name": "Martin Roetteler"}], "featured_authors": [{"name": "Miguel Angel Lopez-Ruiz"}, {"name": "Daiwei Zhu"}, {"name": "Jonas Hatzenbuhler"}, {"name": "Mena Issler"}, {"name": "Ananth Kaushik"}, {"name": "Martin Roetteler"}], "author_count": 11}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
