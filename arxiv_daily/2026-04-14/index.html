s for quantum many-body physics on the lattice, have long lacked a natural ansatz adapted to the relativistic setting. This monograph explains the intuition behind relativistic continuous matrix product states (RCMPS), a variational ansatz tailored to $(1+1)$-dimensional QFT, and reports on several years of progress in developing and applying this approach. Using Riemannian optimization on the manifold of RCMPS, we obtain competitive non-perturbative approximations to ground state energies and local observables in the $\\phi^4$, Sine-Gordon, and Sinh-Gordon models, including in strongly coupled regimes where perturbation theory fails. We then describe extensions to models with several interacting fields. Beyond energy density and local observables, we show how the framework can be used to evaluate non-local observables (defects) and, through an original linear programming approach, to extract spectral data such as particle masses. We close by discussing the current limitations of the method and the most promising directions for future work.", "url": "https://arxiv.org/abs/2604.10284", "type": "理论", "summary": "众所周知，$(1+1)$ 维度的强耦合量子场论很难以非微扰方式求解。尽管变分方法在晶格上的量子多体物理方面取得了成功，但长期以来缺乏适应相对论环境的自然模拟。本专着解释了相对论连续矩阵乘积态 (RCMPS) 背后的直觉，这是一种针对 $(1+1)$ 维 QFT 定制的变分 ansatz，并报告了多年来开发和应用该方法的进展。使用 RCMPS 流形上的黎曼优化，我们获得了 $\\phi^4$、Sine-Gordon 和 Sinh-Gordon 模型中基态能量和局部可观测量的竞争性非微扰近似，包括在微扰理论失效的强耦合状态下。然后，我们描述具有多个交互字段的模型的扩展。除了能量密度和局部可观测量之外，我们还展示了如何使用该框架来评估非局部可观测量（缺陷），并通过原始的线性规划方法提取粒子质量等光谱数据。\n\n我们最后讨论了该方法当前的局限性和未来工作最有希望的方向。", "authors": [{"name": "Antoine Tilloy"}], "featured_authors": [{"name": "Antoine Tilloy"}], "author_count": 1}, {"id": "2604.10434", "category": "hep-th", "title": "Connecting Supersymmetry to Non-Supersymmetric theories: the Gross-Neveu-Yukawa example", "abstract": "We construct a generalized Lagrangian that unifies the Gross-Neveu-Yukawa, Nambu-Jona-Lasinio-Yukawa, and Wess-Zumino models, allowing for arbitrary scalar and fermion flavors in $D$-dimensional regularization. This framework clarifies how emergent supersymmetry arises at critical points and reveals structural connections between these theories. The unified formulation provides additional supersymmetry Ward identities that simplify loop calculations, even for non-supersymmetric models. As an application, we show how this technique can reduce the computational cost of determining anomalous dimensions of twist-two operators.", "url": "https://arxiv.org/abs/2604.10434", "type": "理论", "summary": "我们构建了一个广义拉格朗日，它统一了 Gross-Neveu-Yukawa、Nambu-Jona-Lasinio-Yukawa 和 Wess-Zumino 模型，允许 $D$ 维正则化中的任意标量和费米子风格。该框架阐明了超对称性如何在关键点出现，并揭示了这些理论之间的结构联系。统一公式提供了额外的超对称 Ward 恒等式，可以简化循环计算，即使对于非超对称模型也是如此。作为一个应用，我们展示了该技术如何降低确定扭曲二算子的异常维度的计算成本。", "authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Sven-Olaf Moch"}], "featured_authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Sven-Olaf Moch"}], "author_count": 2}, {"id": "2604.10583", "category": "hep-th", "title": "The Junction Law for Multipartite Entanglement in Confining Holographic Backgrounds", "abstract": "We investigate how the junction law for multipartite entanglement is realized in confining holographic backgrounds, using genuine multi-entropy (GM) as our main diagnostic. We first study an AdS$_3$ hard-wall toy model as an analytic benchmark, where multi-way cuts and junction geometries can be analyzed explicitly. In this setup, we classify the relevant saddles, determine the dominant phases, and show that the genuinely multipartite contribution diagnosed by GM is localized near the junction. We also examine how this structure depends on subsystem sizes, asymmetry, and the confinement scale, including phase transitions between competing saddles. We then move beyond the hard-wall benchmark to smooth confining geometries, focusing on the D4-soliton and D3-soliton backgrounds and formulating the corresponding framework also for the Klebanov--Strassler background. In the smooth-cap examples, we find that the junction picture persists, while the detailed phase structure differs from the hard-wall case: in particular, the hard-wall plateau does not survive, and GM instead decreases monotonically and vanishes at a finite critical scale. We also find that the short-distance behavior is background-dependent, with $\\mathrm{GM}^{(3)}\\sim L^{-4}$ in the D4-soliton background, $\\mathrm{GM}^{(3)}\\sim L^{-2}$ in the D3-soliton background, and $\\mathrm{GM}^{(3)}\\sim L^{-2}\\cdot (\\log L)^{2}$ in the Klebanov--Strassler background. These results clarify which features of the junction-law picture are robust in confining holography and which features of the phase structure and short-distance scaling are background-dependent.", "url": "https://arxiv.org/abs/2604.10583", "type": "理论", "summary": "我们使用真正的多熵（GM）作为我们的主要诊断，研究如何在限制全息背景中实现多部分纠缠的连接定律。我们首先研究 AdS$_3$ 硬墙玩具模型作为分析基准，其中可以明确分析多路切割和连接几何形状。在此设置中，我们对相关鞍座进行分类，确定主要相位，并表明 GM 诊断的真正多方贡献位于交界处附近。我们还研究了这种结构如何取决于子系统大小、不对称性和限制尺度，包括竞争鞍座之间的相变。然后，我们超越硬墙基准，平滑限制几何形状，重点关注 D4 孤子和 D3 孤子背景，并为 Klebanov-Strassler 背景制定相应的框架。在光滑帽示例中，我们发现结图仍然存在，而详细的相结构与硬壁情况不同：特别是，硬壁平台不存在，GM 相反单调递减并在有限临界尺度上消失。\n\n我们还发现短距离行为是背景相关的，$\\mathrm{GM}^{(3)}\\sim L^{-4}$ 在 D4 孤子背景中，$\\mathrm{GM}^{(3)}\\sim L^{-2}$ 在 D3 孤子背景中，$\\mathrm{GM}^{(3)}\\sim L^{-2}\\cdot (\\log L)^{2}$ 在 Klebanov--Strassler 背景中。这些结果阐明了结律图的哪些特征在限制全息术中是稳健的，以及相结构和短距离缩放的哪些特征是背景相关的。", "authors": [{"name": "Norihiro Iizuka"}, {"name": "Akihiro Miyata"}], "featured_authors": [{"name": "Norihiro Iizuka"}, {"name": "Akihiro Miyata"}], "author_count": 2}, {"id": "2604.10803", "category": "hep-th", "title": "Exact holographic thermal spectral functions: OPE, non-perturbative corrections, and black hole singularity", "abstract": "We study analytic properties of thermal spectral functions of holographic CFTs, examining both their (a) exact properties at finite momentum and (b) asymptotics at large momentum. For even-dimensional holographic CFTs on Minkowski spacetime and for scalar primaries with integer dimensions, we demonstrate that the exact spectral function at finite momentum factorizes into a perturbative/OPE piece and a non-perturbative piece. The former is controlled by stress tensor exchange and fixed by a near-boundary analysis. The latter encodes information about the bulk interior, including the black hole horizon and singularity. Utilizing the exact factorization, we obtain the full transseries expansion of the non-perturbative piece at large timelike momentum. This is achieved by employing exact WKB techniques to compute the monodromy of the bulk wave equation. Finally, we use these results to work out the singular loci of a spatially averaged thermofield double correlator in the complex time plane. These singular loci have been argued to provide imprints of the black hole curvature singularity in the dual CFT observables. Our result, which includes the case of non-vanishing momentum, gives a clear link between the non-perturbative spectral function and the black hole singularity.", "url": "https://arxiv.org/abs/2604.10803", "type": "理论", "summary": "我们研究全息 CFT 热谱函数的分析特性，检查它们的 (a) 有限动量下的精确特性和 (b) 大动量下的渐近特性。对于 Minkowski 时空中的偶维全息 CFT 和整数维度的标量原色，我们证明了有限动量下的精确谱函数可以分解为微扰/OPE 部分和非微扰部分。前者由应力张量交换控制，并通过近边界分析固定。后者编码有关整体内部的信息，包括黑洞视界和奇点。利用精确分解，我们获得了非微扰部分在大类时动量下的完全跨系列展开。这是通过采用精确的 WKB 技术来计算体波动方程的单调性来实现的。最后，我们利用这些结果计算出复杂时间平面中空间平均热场双相关器的奇异轨迹。这些奇异位点被认为在双 CFT 可观测量中提供了黑洞曲率奇点的印记。\n\n我们的结果，包括非消失动量的情况，给出了非微扰谱函数和黑洞奇点之间的明确联系。", "authors": [{"name": "Hewei Frederic Jia"}, {"name": "Mukund Rangamani"}], "featured_authors": [{"name": "Hewei Frederic Jia"}, {"name": "Mukund Rangamani"}], "author_count": 2}, {"id": "2604.10919", "category": "hep-th", "title": "Dynamical Generation of the VY Superpotential in $N=1$ SYM: A Higher-Form Perspective", "abstract": "We present a semiclassical account of the Veneziano-Yankielowicz (VY) superpotential in four-dimensional $N=1$ super Yang-Mills theory. Motivated by two-dimensional gauged linear sigma models, where superpotentials arise from vortex dynamics, we reinterpret domain walls as fundamental objects associated with higher-form gauge fields. In this formulation, the vacuum structure is encoded in a compact three-form gauge field, whose four-form flux labels topological sectors. In the presence of charged matter with total charge $N$, these sectors exhibit a natural $\\mathbb{Z}_N$ structure, leading to a decomposition into $N$ semiclassical contributions. These contributions arise from Euclidean point-like configurations in the higher-form sector, analogous to fractional instantons. We show that these configurations provide the relevant non-perturbative contributions to the effective superpotential. Integrating out the associated degrees of freedom reproduces the VY superpotential in the infrared. This gives a semiclassical origin of the VY superpotential in terms of higher-form gauge dynamics.", "url": "https://arxiv.org/abs/2604.10919", "type": "理论", "summary": "我们提出了四维 $N=1$ super Yang-Mills 理论中 Veneziano-Yankielowicz (VY) 超势的半经典解释。受二维规范线性西格玛模型（其中超势源自涡旋动力学）的启发，我们将畴壁重新解释为与更高形式规范场相关的基本物体。在这个公式中，真空结构被编码在一个紧凑的三种形式的规范场中，其四种形式的通量标记了拓扑扇区。在总电荷为 $N$ 的带电物质存在的情况下，这些扇区表现出自然的 $\\mathbb{Z}_N$ 结构，导致分解为 $N$ 半经典贡献。这些贡献来自于更高形式扇区中的欧几里得点状配置，类似于分数瞬子。我们证明这些配置为有效超电势提供了相关的非微扰贡献。对相关自由度进行积分可再现红外中的 VY 超电势。这给出了 VY 超势在更高形式的规范动力学方面的半经典起源。", "authors": [{"name": "Wei Gu"}], "featured_authors": [{"name": "Wei Gu"}], "author_count": 1}, {"id": "2604.11051", "category": "hep-th", "title": "Uni-vector deformations, D0-bound states and DLCQ", "abstract": "We investigate uni-vector deformation in the Type IIA setup and show that the D0-brane background is mapped into itself (sedimentation), and other extremal backgrounds get bound with a dissolved D0-brane charge. Explicitly we generate F1-D0 and D2-D0 bound states background from uni-vector deformations. For the former we show that deformation of the non-extremal string gives the correct thermal F1-D0 bound state. We discuss relations between critical uni-vector deformations and DLCQ of M-theory.", "url": "https://arxiv.org/abs/2604.11051", "type": "理论", "summary": "我们研究了 IIA 型设置中的单向量变形，并表明 D0 膜背景被映射到自身（沉积），而其他极值背景与溶解的 D0 膜电荷结合。我们明确地从单向量变形生成 F1-D0 和 D2-D0 束缚态背景。对于前者，我们证明非极值弦的变形给出了正确的热 F1-D0 束缚态。我们讨论了临界单向量变形与 M 理论的 DLCQ 之间的关系。", "authors": [{"name": "Sergei Barakin"}, {"name": "Kirill Gubarev"}, {"name": "Edvard T. Musaev"}], "featured_authors": [{"name": "Sergei Barakin"}, {"name": "Kirill Gubarev"}, {"name": "Edvard T. Musaev"}], "author_count": 3}, {"id": "2604.11158", "category": "hep-th", "title": "Entanglement inequalities for timelike intervals within dynamical holography", "abstract": "This paper extends our previous work ( arXiv:2504.14313 ) of a single timelike subregion to two, in the framework of AdS$_3$-Vaidya holography. We confirm the positivity of timelike mutual information and the statement of weak monotonicity when the subregions are non-overlapping. We also study entanglement inequalities such as Araki-Lieb inequality and strong subadditivity when the intervals start to overlap. In line with the recent findings in the literature, we provide explicit working examples showing that the timelike version of the strong subadditivity is generally violated in these setups, even though the statements of subadditivity and Araki-Lieb inequality hold true.", "url": "https://arxiv.org/abs/2604.11158", "type": "理论", "summary": "本文在 AdS$_3$-Vaidya 全息框架中将我们之前的工作 (arXiv:2504.14313) 的单个类时子区域扩展为两个。当子区域不重叠时，我们证实了类时互信息的正性和弱单调性的陈述。我们还研究了纠缠不等式，例如 Araki-Lieb 不等式和间隔开始重叠时的强次可加性。根据文献中最近的发现，我们提供了明确的工作示例，表明在这些设置中通常违反了强次可加性的时间版本，即使次可加性和 Araki-Lieb 不等式的陈述成立。", "authors": [{"name": "Gaurav Katoch"}, {"name": "Debajyoti Sarkar"}, {"name": "Bhim Sen"}], "featured_authors": [{"name": "Gaurav Katoch"}, {"name": "Debajyoti Sarkar"}, {"name": "Bhim Sen"}], "author_count": 3}, {"id": "2604.11277", "category": "hep-th", "title": "Updating the holomorphic modular bootstrap", "abstract": "We update the holomorphic modular bootstrap incorporating a recent result that computes the exact S-matrix within the Modular Linear Differential Equation (MLDE) setting. Further, using knowledge of the allowed exponents modulo one, we obtain admissible solutions to all MLDE's with up to six characters and Wronskian index < 6 and one accessory parameter with c_eff <= 24. We then identify which of the admissible solutions have good fusion rules -- we call such solutions tenable. When possible, we identify the CFT and in the unitary cases the MTC class they belong to.", "url": "https://arxiv.org/abs/2604.11277", "type": "理论", "summary": "我们更新了全纯模引导程序，纳入了最近的结果，该结果在模线性微分方程 (MLDE) 设置中计算精确的 S 矩阵。此外，利用允许的指数模一的知识，我们获得了所有 MLDE 的可接受解，其中最多有 6 个字符且 Wronskian 索引 < 6 和一个辅助参数 c_eff <= 24。然后，我们确定哪些可接受的解具有良好的融合规则 - 我们称此类解是可行的。如果可能，我们会识别 CFT 以及在单一情况下它们所属的 MTC 类别。", "authors": [{"name": "Suresh Govindarajan"}, {"name": "Akhila Sadanandan"}], "featured_authors": [{"name": "Suresh Govindarajan"}, {"name": "Akhila Sadanandan"}], "author_count": 2}, {"id": "2604.11404", "category": "hep-th", "title": "GlobalCY I: A JAX Framework for Globally Defined and Symmetry-Aware Neural Kähler Potentials", "abstract": "We present \\emph{GlobalCY}, a JAX-based framework for globally defined and symmetry-aware neural Kähler-potential models on projective hypersurface Calabi--Yau geometries. The central problem is that local-input neural Kähler-potential models can train successfully while still failing the geometry-sensitive diagnostics that matter in hard quartic regimes, especially near singular and near-singular members of the Cefalú family. To study this, we compare three model families -- a local-input baseline, a globally defined invariant model, and a symmetry-aware global model -- on the hard Cefalú cases $\\lambda=0.75$ and $\\lambda=1.0$ using a fixed multi-seed protocol and a geometry-aware diagnostic suite. In this benchmark, the globally defined invariant model is the strongest overall family, outperforming the local baseline on the two clearest geometric comparison metrics, negative-eigenvalue frequency and projective-invariance drift, in both cases. The gains are strongest at $\\lambda=0.75$, while $\\lambda=1.0$ remains more difficult. The current symmetry-aware model improves projective-invariance drift relative to the local baseline, but does not yet surpass the plain global invariant model. These results show that global invariant structure is a meaningful architectural constraint for learned Kähler-potential modeling in hard quartic Calabi--Yau settings.", "url": "https://arxiv.org/abs/2604.11404", "type": "理论", "summary": "我们提出了 \\emph{GlobalCY}，一个基于 JAX 的框架，用于射影超曲面 Calabi-Yau 几何上的全局定义和对称感知神经 Kähler 势模型。核心问题是局部输入神经卡勒势模型可以成功训练，但仍然无法进行几何敏感诊断，这在硬四次体系中很重要，尤其是 Cefalú 家族的近奇异和近奇异成员。为了研究这个问题，我们使用固定的多种子协议和几何感知诊断套件，在硬 Cefalú 案例 $\\lambda=0.75$ 和 $\\lambda=1.0$ 上比较了三个模型系列——本地输入基线、全局定义的不变模型和对称感知全局模型。在此基准测试中，全局定义的不变模型是最强的整体系列，在两种最清晰的几何比较指标（负特征值频率和投影不变漂移）上都优于局部基线。涨幅在 $\\lambda=0.75$ 时最为强劲，而 $\\lambda=1.0$ 仍然更加困难。\n\n当前的对称感知模型改善了相对于局部基线的投影不变性漂移，但尚未超越普通的全局不变模型。这些结果表明，全局不变结构对于硬四次 Calabi-Yau 设置中学习的 Kähler 势建模来说是一个有意义的架构约束。", "authors": [{"name": "Abdul Rahman"}], "featured_authors": [{"name": "Abdul Rahman"}], "author_count": 1}, {"id": "2604.11474", "category": "hep-th", "title": "`Seeing' the quantum ripples of spacetime", "abstract": "We propose a novel way of detecting gravitons using emission of photons from charged array of quantum harmonic oscillators placed inside of a cavity while the cavity is being pumped with low frequency photons. We observe that when the detector is in its ground state, a single graviton is absorbed by the detector while it jumps a single energy level by simultaneously emitting a photon. We also observe that while the detector de-excites from an higher energy level, it spontaneously emits a high frequency graviton, by absorbing a single photon. This analytical outcome encourages us to propose a very simple tabletop graviton detector model as the transition probabilities can be significantly enhanced by pumping photons in the initial state of the system. This mechanism gives us a physical way to `visualize' the effect of gravitons with a relativistic system.", "url": "https://arxiv.org/abs/2604.11474", "type": "理论", "summary": "我们提出了一种检测引力子的新方法，利用放置在腔内的量子谐振子带电阵列发射光子，同时用低频光子泵浦腔。我们观察到，当探测器处于基态时，单个引力子被探测器吸收，同时它通过同时发射光子来跳跃单个能级。我们还观察到，当探测器从较高能级去激发时，它会通过吸收单个光子自发地发射高频引力子。这一分析结果鼓励我们提出一个非常简单的桌面引力子探测器模型，因为通过在系统的初始状态泵浦光子可以显着提高跃迁概率。这种机制为我们提供了一种通过相对论系统“可视化”引力子效应的物理方法。", "authors": [{"name": "Soham Sen"}], "featured_authors": [{"name": "Soham Sen"}], "author_count": 1}, {"id": "2604.11602", "category": "hep-th", "title": "Celestial 1-form symmetries", "abstract": "The $S$-algebra originally arose as a chiral algebra of asymptotic symmetries of Yang-Mills theory. We show that in the self-dual sector of Yang-Mills, the $S$-algebra gets upgraded to an infinite-dimensional algebra of $1$-form symmetries in the bulk. The associated 2-form currents encode the integrability and hierarchies of self-dual Yang-Mills. As an application, we prove the equality of Carrollian corner charges with modes of the celestial chiral algebra by expressing them as integrals of the same 2-form currents over homologous 2-cycles.", "url": "https://arxiv.org/abs/2604.11602", "type": "理论", "summary": "$S$-代数最初是作为杨-米尔斯理论的渐近对称性的手征代数而出现的。我们证明，在 Yang-Mills 的自对偶扇区中，$S$ 代数整体升级为 $1$ 形式对称性的无限维代数。相关的 2 型电流编码了自对偶 Yang-Mills 的可积性和层次结构。作为一个应用，我们通过将卡罗尔角电荷表示为同源 2 周期上相同 2 形式电流的积分，证明了卡罗尔角电荷与天体手性代数模的等式。", "authors": [{"name": "Laurent Freidel"}, {"name": "Atul Sharma"}], "featured_authors": [{"name": "Laurent Freidel"}, {"name": "Atul Sharma"}], "author_count": 2}, {"id": "2604.11736", "category": "hep-th", "title": "Poisson Gauge Theories in Three Dimensions: Exact Solutions and Conservation Laws", "abstract": "We investigate Maxwell-Chern-Simons theory on a three-dimensional noncommutative spacetime endowed with a constant spacelike Poisson structure. By exploiting the residual rotational symmetry, we construct exact classical solutions corresponding to pointlike electric and magnetic charges. We demonstrate that noncommutativity acts as a natural regulator, ensuring a finite total electromagnetic energy and thereby resolving the classical self-energy divergence. Furthermore, some of these solutions exhibit a non-perturbative dependence on the noncommutativity parameter and allow for the generation of an arbitrary magnetic flux. We also present a noncommutative generalization of Gauss's law, providing a robust framework for the physical interpretation of these exact solutions.", "url": "https://arxiv.org/abs/2604.11736", "type": "理论", "summary": "我们研究了具有恒定类空间泊松结构的三维非交换时空的麦克斯韦-陈-西蒙斯理论。通过利用剩余旋转对称性，我们构造了与点状电荷和磁荷相对应的精确经典解。我们证明非交换性充当自然调节器，确保有限的总电磁能量，从而解决经典的自能发散。此外，其中一些解表现出对非交换性参数的非微扰依赖性，并允许生成任意磁通量。我们还提出了高斯定律的非交换概括，为这些精确解的物理解释提供了一个强大的框架。", "authors": [{"name": "Alexey Sharapov"}, {"name": "David Shcherbatov"}], "featured_authors": [{"name": "Alexey Sharapov"}, {"name": "David Shcherbatov"}], "author_count": 2}, {"id": "2604.09908", "category": "math-ph", "title": "Strictly correlated electrons in a quantum ring: from Kohn-Sham to Kantorovich potentials", "abstract": "Our goal in this paper is twofold. First, we characterize the class of pairwise interactions for which the Seidl conjecture on the structure of optimal plans for the symmetric multimarginal optimal transport problem with one-dimensional marginal holds. This extends previous results by Colombo, De Pascale, and Di Marino [Can. Jou. Math., 67 (2015), this https URL ], which treated the case of translation-invariant, convex and decreasing interactions. In particular, our results apply to physically relevant interactions for electrons living on a quantum ring. The second main goal of the paper is to rigorously derive the leading order asymptotics of the adiabatic connection potential for strongly interacting systems. More precisely, we show that for electrons in a quantum ring (or one-dimensional interval), not only the Lieb density functional converges to the optimal transport (or strictly correlated) functional in the semiclassical limit, but also the representing potential converges to a regular Kantorovich potential. As an intermediate step, we also extend previous results on the strongly interacting limit of the Lieb functional to periodic systems in arbitrary dimensions.", "url": "https://arxiv.org/abs/2604.09908", "type": "理论", "summary": "我们在本文中的目标是双重的。首先，我们描述一类成对相互作用，对于一维边际对称多边际最优传输问题的最优计划结构的 Seidl 猜想成立。这扩展了 Colombo、De Pascale 和 Di Marino [Can.茹。 Math., 67 (2015)，这个 https URL ]，它处理了平移不变、凸和递减相互作用的情况。特别是，我们的结果适用于量子环上电子的物理相关相互作用。本文的第二个主要目标是严格推导强相互作用系统绝热连接势的前导阶渐近。更准确地说，我们表明，对于量子环（或一维区间）中的电子，不仅利布密度泛函收敛到半经典极限中的最佳输运（或严格相关）泛函，而且表示势也收敛到常规康托罗维奇势。作为中间步骤，我们还将先前关于利布泛函强相互作用极限的结果扩展到任意维度的周期系统。", "authors": [{"name": "Thiago Carvalho Corso"}], "featured_authors": [{"name": "Thiago Carvalho Corso"}], "author_count": 1}, {"id": "2604.10162", "category": "math-ph", "title": "Dual contractions and algebraic families", "abstract": "We introduce a duality for Inönü-Wigner contractions attached to real symmetric Lie algebras. Starting from a symmetric pair $(\\mathfrak{g},\\theta)$, we define a dual real form $\\mathfrak{g}^{*}$ inside the complexification of $\\mathfrak{g}$ and consider the corresponding contraction with respect to the common fixed-point subalgebra $\\mathfrak{g}^{\\theta}$. The main result shows that the original contraction and its dual appear as real fibers of a single algebraic family of complex Lie algebras equipped with an anti-holomorphic involution. This places the two contractions in one geometric framework and connects them with the algebraic-family methods developed in recent work on contractions, real forms, and hidden symmetries.", "url": "https://arxiv.org/abs/2604.10162", "type": "理论", "summary": "我们引入了附加到实对称李代数的 Inönü-Wigner 收缩的对偶性。从对称对$(\\mathfrak{g},\\theta)$开始，我们在$\\mathfrak{g}$的复化中定义一个对偶实数形式$\\mathfrak{g}^{*}$，并考虑相对于公共定点子代数$\\mathfrak{g}^{\\theta}$的相应收缩。主要结果表明，原始收缩及其对偶表现为具有反全纯对合的复李代数的单一代数族的实纤维。这将两种收缩置于一个几何框架中，并将它们与最近在收缩、实型和隐对称性方面的工作中开发的代数族方法联系起来。", "authors": [{"name": "Eyal Subag"}], "featured_authors": [{"name": "Eyal Subag"}], "author_count": 1}, {"id": "2604.10270", "category": "math-ph", "title": "A second order upper bound to the free energy of the two dimensional Bose gas", "abstract": "We consider a two-dimensional Bose gas in the dilute regime where $\\rho a^2$ is small. For temperatures below the Berezinskii-Kosterlitz-Thouless critical temperature, we derive an explicit upper bound for the free energy density using Bogoliubov theory. Our result captures the contribution of quasiparticle modes with dispersion relation $\\sqrt{p^4 + 8\\pi \\rho\\, \\delta\\, p^2}$ and where $\\delta = 2 / (|\\log(\\rho a^2)| + \\log |\\log(\\rho a^2)|)$.", "url": "https://arxiv.org/abs/2604.10270", "type": "理论", "summary": "我们考虑稀释状态下的二维玻色气体，其中 $\\rho a^2$ 很小。对于低于 Berezinskii-Kosterlitz-Thouless 临界温度的温度，我们使用 Bogoliubov 理论推导出自由能密度的明确上限。我们的结果捕获了具有色散关系 $\\sqrt{p^4 + 8\\pi \\rho\\, \\delta\\, p^2}$ 的准粒子模式的贡献，其中 $\\delta = 2 / (|\\log(\\rho a^2)| + \\log |\\log(\\rho a^2)|)$。", "authors": [{"name": "Florian Haberberger"}, {"name": "Lukas Junge"}], "featured_authors": [{"name": "Florian Haberberger"}, {"name": "Lukas Junge"}], "author_count": 2}, {"id": "2604.10416", "category": "math-ph", "title": "Higher (gauged) Wess--Zumino--Witten terms based on Lie crossed modules", "abstract": "We derive higher Wess--Zumino--Witten (WZW) and gauged WZW (gWZW) terms within strict higher Chern--Simons (CS) gauge theory. Starting from the Cartan homotopy formula, we obtain the $(2n+2)$-dimensional higher CS forms and transgression forms for strict Lie 2-groups presented by Lie crossed modules. Given two 2-connections related by a higher gauge transformation, higher transgression forms yield canonical higher WZW and gWZW terms. We prove that, for the symmetric invariant polynomial associated with differential crossed modules, the pure-gauge higher WZW term vanishes identically, whereas the higher gWZW term is exact. Consequently, the higher CS action is higher-gauge invariant on closed manifolds, and on manifolds with boundary all gauge dependence is encoded in boundary terms.", "url": "https://arxiv.org/abs/2604.10416", "type": "理论", "summary": "我们在严格的高陈-西蒙斯 (CS) 规范理论中导出了更高的韦斯-祖米诺-维滕 (WZW) 和规范的 WZW (gWZW) 项。从嘉当同伦公式出发，我们得到了由李交叉模提出的严格李2群的$(2n+2)$维高CS形式和越界形式。给定两个通过更高规范变换关联的 2-连接，更高的海侵形式会产生规范的更高 WZW 和 gWZW 项。我们证明，对于与微分交叉模相关的对称不变多项式，纯规格较高的 WZW 项同样消失，而较高的 gWZW 项是精确的。因此，较高的 CS 作用在闭合流形上是较高规范不变的，并且在具有边界的流形上，所有规范依赖性都以边界项进行编码。", "authors": [{"name": "Danhua Song"}], "featured_authors": [{"name": "Danhua Song"}], "author_count": 1}, {"id": "2604.10559", "category": "math-ph", "title": "Periods of N-body Systems Determined Through Dimensional Analysis", "abstract": "Using augmented dimensional analysis to rule out several alternative generalizations, we provide mathematical justifications of conjectures by Sun on the period of a Newtonian orbital n-body system and by Semay and Sun on the quantum-theoretical counterpart of the period of an n-body system, both of which generalize corresponding results for two-body systems.", "url": "https://arxiv.org/abs/2604.10559", "type": "理论", "summary": "使用增维分析来排除几种替代的概括，我们提供了 Sun 对牛顿轨道 n 体系统周期的猜想以及 Semay 和 Sun 对 n 体系统周期的量子理论对应物的猜想的数学证明，两者都推广了双体系统的相应结果。", "authors": [{"name": "Dan Jonsson"}], "featured_authors": [{"name": "Dan Jonsson"}], "author_count": 1}, {"id": "2604.10838", "category": "math-ph", "title": "No-Go Theorem for Quasiparticle BEC", "abstract": "We discuss a no-go theorem for Bose-Einstein condensation (BEC) of quasiparticles (phonons) from the viewpoint of operator algebras, using the van Hove model. The $\\beta$-KMS states of the van Hove model satisfy the self-consistency condition of arXiv:1207.4621 . However, the self-consistency condition is a constraint concerning the definition of the field, and is insufficient to establish the no-go theorem for BEC. In this paper, we prove the no-go theorem for BEC via two routes. First, imposing time cluster properties on the $\\beta$-KMS states precludes BEC. Second, under nonlinear dispersion with $s > 2$, the treatment of infrared divergences automatically reduces the algebra of physical observables, and BEC is mathematically excluded on the reduced algebra. In particular, the latter property admits an interpretation in terms of the ideal theory of the resolvent algebra.", "url": "https://arxiv.org/abs/2604.10838", "type": "理论", "summary": "我们使用 van Hove 模型，从算子代数的角度讨论了准粒子（声子）的玻色-爱因斯坦凝聚（BEC）的不可行定理。 van Hove 模型的 $\\beta$-KMS 状态满足 arXiv:1207.4621 的自洽条件。然而，自洽条件是域定义的一个约束，不足以建立BEC的不可行定理。在本文中，我们通过两种途径证明了 BEC 的不可行定理。首先，在 $\\beta$-KMS 状态上施加时间簇属性会排除 BEC。其次，在 $s > 2$ 的非线性色散下，红外发散的处理会自动约简物理可观测量的代数，并且 BEC 在数学上被排除在约简代数上。特别是，后一个性质允许根据求解代数的理想理论进行解释。", "authors": [{"name": "Yoshitsugu Sekine"}], "featured_authors": [{"name": "Yoshitsugu Sekine"}], "author_count": 1}, {"id": "2604.11460", "category": "math-ph", "title": "Finite-difference zeta function regularisation and spectral weighting in effective actions", "abstract": "Standard zeta function regularisation enforces a scale-independent prescription for spectral aggregation, effectively fixing the relative weight of spectral contributions. We relax this constraint by replacing the derivative at $s=0$ with a finite-difference construction based on $\\zeta_{A}(0)$ and $\\zeta_{A}(q-1)$. In finite systems, it gives rise in the macroscopic limit to Tsallis-type quantities and a $q$-controlled information-geometric structure. In infinite dimensions, it yields an effective action whose variation $\\delta\\Gamma_{q}=\\mathrm{Tr}(A^{-q}\\delta A)$ realises scale-dependent spectral weighting. Within this framework, zeta function regularisation, effective action, nonextensive scaling, and information geometry emerge as manifestations of a common principle of finite-difference spectral aggregation.", "url": "https://arxiv.org/abs/2604.11460", "type": "理论", "summary": "标准 zeta 函数正则化强制执行与尺度无关的光谱聚合规定，有效固定光谱贡献的相对权重。我们通过将 $s=0$ 处的导数替换为基于 $\\zeta_{A}(0)$ 和 $\\zeta_{A}(q-1)$ 的有限差分结构来放松此约束。在有限系统中，它产生了 Tsallis 型量的宏观极限和 $q$ 控制的信息几何结构。在无限维度中，它产生有效的作用，其变化$\\delta\\Gamma_{q}=\\mathrm{Tr}(A^{-q}\\delta A)$实现了尺度相关的光谱加权。在这个框架内，zeta 函数正则化、有效作用、非广延缩放和信息几何作为有限差分谱聚合共同原理的表现而出现。", "authors": [{"name": "Keisuke Okamura"}], "featured_authors": [{"name": "Keisuke Okamura"}], "author_count": 1}, {"id": "2604.11464", "category": "math-ph", "title": "Passive two-plateau relaxation from Tricomi confluent hypergeometric kernels", "abstract": "Anomalous relaxation with memory spectra arises in disordered solids, soft matter, biological tissues and electrochemical interfaces. Fractional-order models capture broad power-law behaviour efficiently, but they can obscure spectral structure and are not always convenient for passive realisation or finite-dimensional simulation. We introduce a non-fractional passive framework based on the Tricomi confluent hypergeometric function, combined with a bounded Moebius normalisation that enforces prescribed low-frequency and high-frequency plateaux while preserving a broad dispersive transition. The resulting family contains the Debye and Cole-Cole responses as exact subcases, while extending them to asymmetric two-plateau dispersive laws with independently tunable low- and high-frequency exponents. For an admissible parameter range, we prove that the bounded block admits a Stieltjes representation with nonnegative spectral density, implying complete monotonicity, passivity, causality and compatibility with standard circuit and state-space descriptions. Building on this structure, we derive a passive Gauss-Stieltjes discretisation leading to Foster-type rational approximations and first-order state-space realisations with positive poles and residues. Numerical experiments show convergence of these finite-dimensional approximations across moderate-memory and long-tail regimes, enabling passive reduced-order representations of broad-memory responses. The framework is then validated on broadband dielectric data and battery electrochemical impedance spectra. In tissues, multi-block Tricomi mixtures improve complex-domain fitting accuracy relative to classical Cole-Cole baselines while preserving interpretable modal structure.", "url": "https://arxiv.org/abs/2604.11464", "type": "理论", "summary": "记忆光谱的异常弛豫出现在无序固体、软物质、生物组织和电化学界面中。分数阶模型可以有效地捕获广泛的幂律行为，但它们会掩盖谱结构，并且并不总是方便被动实现或有限维模拟。我们引入了一种基于 Tricomi 合流超几何函数的非分数被动框架，结合有界莫比乌斯归一化，强制规定的低频和高频平台，同时保留广泛的色散过渡。由此产生的族包含德拜和科尔-科尔响应作为精确的子情况，同时将它们扩展到具有独立可调的低频和高频指数的不对称两平台色散定律。对于可接受的参数范围，我们证明有界块允许具有非负谱密度的 Stieltjes 表示，这意味着完全的单调性、无源性、因果性以及与标准电路和状态空间描述的兼容性。\n\n在此结构的基础上，我们推导了被动高斯-斯蒂尔杰斯离散化，从而导致福斯特型有理逼近和具有正极点和留数的一阶状态空间实现。数值实验表明这些有限维近似在中等记忆和长尾机制中的收敛性，从而实现了宽记忆响应的被动降阶表示。然后在宽带介电数据和电池电化学阻抗谱上验证该框架。在组织中，多块 Tricomi 混合相对于经典 Cole-Cole 基线提高了复杂域拟合精度，同时保留了可解释的模态结构。", "authors": [{"name": "Marc Tudela-Pi"}, {"name": "Ivano Colombaro"}], "featured_authors": [{"name": "Marc Tudela-Pi"}, {"name": "Ivano Colombaro"}], "author_count": 2}, {"id": "2604.11612", "category": "math-ph", "title": "Feynman's linear divergence problem", "abstract": "First, we consider generalized wave and scattering operators and derive modifications of commutation relations (between scattering operators and unperturbed operators) when the corresponding deviation factors behave as $\\exp\\{i t {\\mathcal C}_{\\pm}\\}$ for $t\\to \\pm \\infty$. Then, we construct so called secondary generalized scattering operators for the related case of linear divergence in QED, which gives a positive answer (in that case) to the well-known problem of J. R. Oppenheimer regarding scattering operators in QED: \"Can the procedure be freed of the expansion in $\\varepsilon$ and carried out rigorously?\"", "url": "https://arxiv.org/abs/2604.11612", "type": "理论", "summary": "首先，我们考虑广义波和散射算子，并导出当对应的偏差因子对于 $t\\to \\pm \\infty$ 表现为 $\\exp\\{i t {\\mathcal C}_{\\pm}\\}$ 时，对换关系（散射算子和未扰动算子之间）的修改。然后，我们为 QED 中线性散度的相关情况构造了所谓的二次广义散射算子，这对 J. R. Oppenheimer 关于 QED 中散射算子的著名问题给出了肯定的答案（在这种情况下）：“该过程能否摆脱 $\\varepsilon$ 中的展开并严格执行？”", "authors": [{"name": "Alexander Sakhnovich"}, {"name": "Lev Sakhnovich"}], "featured_authors": [{"name": "Alexander Sakhnovich"}, {"name": "Lev Sakhnovich"}], "author_count": 2}, {"id": "2604.11756", "category": "math-ph", "title": "Trapped bosons in mean field QED, nonlinear resonance cascades and dynamical BEC formation", "abstract": "In this paper, we study a system of bosons trapped in a confining potential, interacting with a quantized field of coherent photons in the mean field description of non-relativistic Quantum Electrodynamics (QED) obtained by [N. Leopold and P. Pickl , 2017]. We derive the effective nonlinear cascade equations governing the emission and absorption of coherent photons by the boson subsystem in a combined weak-coupling and kinetic-scaling limit. We demonstrate that solutions to this nonlinear cascade describe a monotone decreasing energy flow in the boson subsystem. Thereby, we prove that a Bose-Einstein condensate (BEC) forms dynamically, under conservation of the total boson $L^2$ mass. We note that this process is crucially different from thermal relaxation to the ground state, and fundamentally depends on the nonlinear nature of the cascade dynamics.", "url": "https://arxiv.org/abs/2604.11756", "type": "理论", "summary": "在本文中，我们研究了一种被困在限制势中的玻色子系统，在非相对论量子电动力学（QED）的平均场描述中与相干光子的量化场相互作用。利奥波德和 P.皮克尔，2017]。我们推导了有效的非线性级联方程，该方程在弱耦合和动力学尺度限制的组合下控制玻色子子系统发射和吸收相干光子。我们证明了这种非线性级联的解决方案描述了玻色子子系统中单调递减的能量流。因此，我们证明了玻色-爱因斯坦凝聚体 (BEC) 在总玻色子 $L^2$ 质量守恒的情况下动态形成。我们注意到，这个过程与热弛豫到基态有很大不同，并且从根本上取决于级联动力学的非线性性质。", "authors": [{"name": "Thomas Chen"}, {"name": "Ali Mezher"}], "featured_authors": [{"name": "Thomas Chen"}, {"name": "Ali Mezher"}], "author_count": 2}, {"id": "2604.09735", "category": "quant-ph", "title": "Classical and Quantum Dynamics in an Information Theoretic Space", "abstract": "We study elementary classical and quantum dynamics in an information geometric space corresponding to a Bernoulli random variable, extending work by Goehle and Griffin [Chaos, Solitons & Fractals, 188, 115535, (2024)], who study the information theoretic analog of the spring-mass system. Information geometric constructions are useful in both statistical physics and in physical interpretations of Friston's free energy principle, a form of the Bayesian brain hypothesis. In this letter, we derive the spectrum for the Laplace-Beltrami operator in Bernoulli space and find Green's functions for the Helmholtz equation, which provides solutions to the wave, heat, and Poisson equations. We then show how to quantize momentum in Bernoulli space and obtain energies and wavefunctions for both a free particle and a variety of quantum (harmonic) oscillators in this space. In particular, we show that quadratic approximation of the Kullback-Leibler potential used by Goehle and Griffin results in a quantum oscillator in information space that is equivalent to a quantum pendulum in Euclidean space.", "url": "https://arxiv.org/abs/2604.09735", "type": "理论", "summary": "我们研究与伯努利随机变量相对应的信息几何空间中的基本经典和量子动力学，扩展了 Goehle 和 Griffin 的工作 [Chaos, Solitons & Fractals, 188, 115535, (2024)]，他们研究弹簧质量系统的信息理论模拟。信息几何构造在统计物理学和弗里斯顿自由能原理（贝叶斯大脑假说的一种形式）的物理解释中都很有用。在这封信中，我们推导了伯努利空间中拉普拉斯-贝尔特拉米算子的谱，并找到了亥姆霍兹方程的格林函数，该方程为波方程、热方程和泊松方程提供了解。然后，我们展示如何量化伯努利空间中的动量，并获得该空间中自由粒子和各种量子（谐波）振荡器的能量和波函数。特别是，我们证明了 Goehle 和 Griffin 使用的 Kullback-Leibler 势的二次逼近导致了信息空间中的量子振荡器，相当于欧几里德空间中的量子摆。", "authors": [{"name": "Sean Golder"}, {"name": "Christopher Griffin"}], "featured_authors": [{"name": "Sean Golder"}, {"name": "Christopher Griffin"}], "author_count": 2}, {"id": "2604.09766", "category": "quant-ph", "title": "Sector length distributions of recursively definable graph states through analytic combinatorics", "abstract": "The sector length distribution or Shor-Laflamme distribution (SLD) of quantum states is governed by the $k$-body correlations amongst the different systems, and has been used to study entanglement and error correction. A succinct description of a quantum state's SLD can be obtained by representing it through the coefficients of an appropriate weight enumerator polynomial, yielding bounds on fidelity under depolarizing noise and on multipartite entanglement. However, such expressions quickly grow out of hand and are generally difficult to achieve analytically, reflecting the computational hardness of the SLD. We sidestep this problem and, instead of a single state's SLDs, encode a family of quantum state's SLD as a generating function. We then find closed-form expressions for a large class of graph states which we call `recursively definable' and which include many common graphs such as path graphs, cycle graphs, star graphs, grid graphs, and more. As direct corollary, we obtain analytical expressions for such graph states' concentratable entanglement, bounds on their depolarizing fidelity, and a multipartite entanglement criterion. Our work opens up the use of generating functions and more generally analytic combinatorics to solve problems in quantum information theory.", "url": "https://arxiv.org/abs/2604.09766", "type": "理论", "summary": "量子态的扇区长度分布或肖尔-拉弗拉姆分布 (SLD) 由不同系统之间的 $k$ 体相关性控制，并已用于研究纠缠和纠错。量子态 SLD 的简洁描述可以通过适当权重枚举多项式的系数表示来获得，从而在去极化噪声和多部分纠缠下产生保真度的界限。然而，这样的表达式很快就会失控，并且通常很难通过分析实现，这反映了 SLD 的计算难度。我们回避了这个问题，将一系列量子态的 SLD 编码为生成函数，而不是单个态的 SLD。然后，我们找到一大类图状态的封闭式表达式，我们称之为“可递归定义”，其中包括许多常见的图，例如路径图、循环图、星形图、网格图等。作为直接推论，我们获得了此类图态可集中纠缠的解析表达式、其去极化保真度的界限以及多部分纠缠准则。\n\n我们的工作开辟了使用生成函数和更一般的解析组合来解决量子信息论中的问题。", "authors": [{"name": "Eloïc Vallée"}, {"name": "Kenneth Goodenough"}, {"name": "Paul E. Gunnells"}, {"name": "Tim Coopmans"}, {"name": "Jordi Tura"}], "featured_authors": [{"name": "Eloïc Vallée"}, {"name": "Kenneth Goodenough"}, {"name": "Paul E. Gunnells"}, {"name": "Tim Coopmans"}, {"name": "Jordi Tura"}], "author_count": 5}, {"id": "2604.09837", "category": "quant-ph", "title": "Planted-solution SAT and Ising benchmarks from integer factorization", "abstract": "We present a family of planted-solution benchmark instances for satisfiability (SAT) solvers and Ising optimization derived from integer factorization. Given two primes $p$ and $q$, the construction encodes the arithmetic constraints of $N = p \\times q$ as a conjunctive normal form (CNF) formula whose satisfying assignments correspond to valid factorizations of~$N$. The known pair $(p,q)$ serves as a built-in ground truth, enabling unambiguous verification of solver output. We show that for two $d$-bit primes the total number of carry contractions is on the order of $d^4$. Empirical benchmarks with SAT solvers show that median runtime grows exponentially in the bit-length of the factors over the range tested. The construction provides a scalable, structured, and verifiable benchmark family controlled by a single parameter, accompanied by open-source generation software.", "url": "https://arxiv.org/abs/2604.09837", "type": "数值", "summary": "我们提出了一系列用于可满足性 (SAT) 求解器和源自整数分解的伊辛优化的植入解决方案基准实例。给定两个素数 $p$ 和 $q$，该构造将 $N = p \\times q$ 的算术约束编码为合取范式 (CNF) 公式，其令人满意的赋值对应于 ~$N$ 的有效因式分解。已知对 $(p,q)$ 作为内置的基本事实，可以明确验证求解器输出。我们证明，对于两个 $d$ 位素数，进位收缩的总数约为 $d^4$。 SAT 求解器的经验基准表明，在测试范围内，中位运行时间随着因子的位长度呈指数增长。该结构提供了一个可扩展、结构化且可验证的基准系列，由单个参数控制，并配有开源生成软件。", "authors": [{"name": "Itay Hen"}], "featured_authors": [{"name": "Itay Hen"}], "author_count": 1}, {"id": "2604.09847", "category": "quant-ph", "title": "A Polylogarithmic-Depth Quantum Multiplier", "abstract": "We present a quantum algorithm for multiplying two $n$-bit integers with overall circuit depth and $T$-depth both bounded by $O(\\log^{2} n)$, while using $O(n^{2})$ gates and ancillary qubits. Our construction generates partial products via indicator-controlled copying and adds them using a binary adder tree, enabling parallel accumulation with logarithmic depth overhead per level. To the best of our knowledge, our design has the lowest $T$-depth among all multiplication algorithms using the Clifford + $T$ model. By optimizing both circuit depth and $T$-depth, our construction advances the practical feasibility of large-scale fault-tolerant quantum algorithms.", "url": "https://arxiv.org/abs/2604.09847", "type": "理论+数值", "summary": "我们提出了一种量子算法，用于将两个 $n$ 位整数与整体电路深度和 $T$ 深度相乘，两者均以 $O(\\log^{2} n)$ 为界，同时使用 $O(n^{2})$ 门和辅助量子位。我们的构造通过指标控制的复制生成部分乘积，并使用二元加法器树将它们相加，从而实现每级对数深度开销的并行累加。据我们所知，我们的设计在所有使用 Clifford + $T$ 模型的乘法算法中具有最低的 $T$ 深度。通过优化电路深度和$T$深度，我们的构建提高了大规模容错量子算法的实际可行性。", "authors": [{"name": "Fred Sun"}, {"name": "Anton Borissov"}], "featured_authors": [{"name": "Fred Sun"}, {"name": "Anton Borissov"}], "author_count": 2}, {"id": "2604.09869", "category": "quant-ph", "title": "Q-PIPE A Practical Quantum Phase Encoding Method", "abstract": "A major hurdle in Quantum Image Processing (QIMP) is efficiently transferring classical, high-dimensional image data into quantum states. Current methods face trade-offs: amplitude encoding (FRQI) is computationally expensive in gate complexity and limited arithmetic capabilities, while basis encoding (NEQR) incurs heavy initialization overhead scaling with image resolution and intensity bit-depth. Frequency-domain approaches further demand complex transformations for basic pixel-wise arithmetic and extensive post-processing to reconstruct pixel information. To address the lack of practical phase encodings, we introduce Q-PIPE (Quantum-Gray Phase Injection for Pixel Encoding). Exploiting the quantum phase kickback mechanism and optimized spatial traversal via a Gray-code sequence, Q-PIPE efficiently maps continuous intensity values into the computational basis with an elementary gate count of $O(qN)$ a $O(\\text{log}N)$ improvement over standard basis encoding. Operating directly in the phase domain enables native computation of finite differences without deep arithmetic circuits. Classical readout vulnerabilities, including phase aliasing and spectral leakage, are mitigated by mapping inputs to $[-\\pi, \\pi]$ and introducing a probability threshold equation that scales inversely with the dimension of the spatial register. A proof-of-concept performing Quantum Edge Detection (QED) via directional derivatives demonstrates strong accuracy, yielding exact reconstructions for quantized inputs and low Mean Absolute Error (MAE) for continuous data across multiple benchmark datasets. Ultimately, Q-PIPE establishes a highly parallelizable, NISQ-compatible subroutine that advances quantum computer vision while reducing input/output (I/O) data-loading overhead in broader Quantum Machine Learning (QML) workflows.", "url": "https://arxiv.org/abs/2604.09869", "type": "理论+数值", "summary": "量子图像处理（QIMP）的一个主要障碍是将经典的高维图像数据有效地转换为量子态。当前的方法面临权衡：幅度编码（FRQI）在门复杂性和有限的算术能力方面计算成本较高，而基础编码（NEQR）会因图像分辨率和强度位深度缩放而产生大量初始化开销。频域方法进一步需要复杂的变换来进行基本的像素级算术和广泛的后处理以重建像素信息。为了解决缺乏实用相位编码的问题，我们引入了 Q-PIPE（像素编码的量子灰度相位注入）。利用量子相位反冲机制并通过格雷码序列优化空间遍历，Q-PIPE 有效地将连续强度值映射到计算基础中，基本门数为 $O(qN)$，比标准基础编码提高了 $O(\\text{log}N)$。直接在相域中操作可以实现有限差分的本机计算，而无需深度算术电路。\n\n通过将输入映射到 $[-\\pi, \\pi]$ 并引入与空间寄存器的维度成反比的概率阈值方程，可以减轻经典的读出漏洞，包括相位混叠和频谱泄漏。通过方向导数执行量子边缘检测 (QED) 的概念验证表现出很高的准确性，可以为量化输入提供精确的重建，并为跨多个基准数据集的连续数据提供较低的平均绝对误差 (MAE)。最终，Q-PIPE 建立了一个高度可并行、与 NISQ 兼容的子例程，该子例程可推进量子计算机视觉，同时减少更广泛的量子机器学习 (QML) 工作流程中的输入/输出 (I/O) 数据加载开销。", "authors": [{"name": "Brian García Sarmina"}, {"name": "Emmanuel Martínez-Guerrero"}, {"name": "Janeth De Anda Gil"}, {"name": "Sun Guo-Hua"}, {"name": "Dong Shi-Hai"}], "featured_authors": [{"name": "Brian García Sarmina"}, {"name": "Emmanuel Martínez-Guerrero"}, {"name": "Janeth De Anda Gil"}, {"name": "Sun Guo-Hua"}, {"name": "Dong Shi-Hai"}], "author_count": 5}, {"id": "2604.09888", "category": "quant-ph", "title": "Detuning-Controlled Phase Transition from Passive to Active Regimes in Non-Markovian Quantum Batteries", "abstract": "We investigate a two-qubit quantum battery where coherent charger-battery coupling competes with non-Markovian environmental interactions. By tuning the coupling strengths and detuning, we identify regimes in which environmental memory enhances energy storage and charging power, while strong dissipation suppresses ergotropy by driving the battery into passive states. We show that detuning plays a dual role: reducing dissipation and inducing a phase shift in the memory kernel that controls the interference between coherent energy exchange and environment-induced backflow. As a result, although the stored energy varies smoothly, the extractable work exhibits a discontinuous onset at a critical detuning, signaling a first-order phase transition in ergotropy. The corresponding phase diagram in the coupling-detuning plane reveals a sharp boundary between thermodynamically inactive and work-producing regimes. Our results demonstrate that phase-controlled coherence and non-Markovianity provide a powerful mechanism for optimizing work extraction in open quantum batteries, offering practical strategies for noise-resilient quantum energy storage.", "url": "https://arxiv.org/abs/2604.09888", "type": "理论+数值", "summary": "我们研究了一种双量子位量子电池，其中相干充电器-电池耦合与非马尔可夫环境相互作用竞争。通过调整耦合强度和失谐，我们确定了环境记忆增强能量存储和充电功率的机制，同时强耗散通过驱动电池进入被动状态来抑制各向异性。我们证明失谐起着双重作用：减少耗散并引起内存内核的相移，从而控制相干能量交换和环境引起的回流之间的干扰。因此，尽管存储的能量变化平稳，但可提取的功在临界失谐处表现出不连续的开始，表明了各向异性的一阶相变。耦合失谐平面中相应的相图揭示了热力学不活跃状态和产生功状态之间的清晰界限。我们的结果表明，相控相干性和非马尔可夫性为优化开放量子电池中的功提取提供了强大的机制，为抗噪声量子能量存储提供了实用的策略。", "authors": [{"name": "Meysam Helmi Barati Farimani"}, {"name": "Ali Mortezapour"}], "featured_authors": [{"name": "Meysam Helmi Barati Farimani"}, {"name": "Ali Mortezapour"}], "author_count": 2}, {"id": "2604.09892", "category": "quant-ph", "title": "Enhanced dissipative criticality at an exceptional point", "abstract": "Exceptional points (EPs) represent non-Hermitian degeneracies where eigenvalues and eigenvectors coalesce, giving rise to enhanced sensitivity and critically damped dynamics. We demonstrate that when an EP coincides with a dissipative phase transition in an extended open Dicke model of two cavities coupled to a collective spin, the critical fluctuations are strongly amplified and governed by modified critical exponents. Numerical results reveal enhanced critical scaling in both the normal and superradiant phases, in agreement with an analytical theory based on EP-induced Jordan-block dynamics. Our results establish EPs as a mechanism to engineer critical scaling in open quantum systems, with potential applications to critical quantum sensing.", "url": "https://arxiv.org/abs/2604.09892", "type": "理论+数值", "summary": "异常点 (EP) 代表非厄米简并性，其中特征值和特征向量合并，从而提高灵敏度和临界阻尼动力学。我们证明，当 EP 与耦合到集体自旋的两个空腔的扩展开放迪克模型中的耗散相变同时发生时，临界涨落会被强烈放大，并由修改后的临界指数控制。数值结果揭示了正态相和超辐射相的临界尺度增强，这与基于 EP 诱导的乔丹块动力学的分析理论一致。我们的研究结果将 EP 确立为一种在开放量子系统中设计关键缩放的机制，并具有在关键量子传感中的潜在应用。", "authors": [{"name": "Jongjun M. Lee"}], "featured_authors": [{"name": "Jongjun M. Lee"}], "author_count": 1}, {"id": "2604.09900", "category": "quant-ph", "title": "Inequivalence of Landau-Lifshitz and Landau-Lifshitz-Gilbert dynamics for a single quantum spin", "abstract": "We examine the relation between the quantum Landau-Lifshitz equation ($q$-LL) [Phys. Rev. Lett. 110, 147201 (2013)] and quantum Landau-Lifshitz-Gilbert equation ($q$-LLG) [Phys. Rev. Lett. 133, 266704 (2024)]; two non-linear purity preserving master equations that extend classical atomistic spin dynamics into the quantum regime. While the classical LL and LLG counterparts for any number of spins are known to be equivalent, i.e., give identical spin trajectories up to a rescaling of the time parameter, the quantum formulations are equivalent only in certain cases, such as for pure states or for arbitrary single spin-$\\frac{1}{2}$ states. Here, we demonstrate that this equivalence breaks down even at the level of a single spin, provided $s \\geq 1$. Focusing on a spin-1 particle in an anisotropic crystal field, we show that the $q$-LL and $q$-LLG equations generate inequivalent time evolution. We introduce temporal rescaling misfits that quantify the inequivalence of the two types of dynamics. Although our results highlight fundamental differences in dissipation mechanisms encoded in these equations, the resulting trajectories remain qualitatively similar for this system.", "url": "https://arxiv.org/abs/2604.09900", "type": "理论", "summary": "我们研究了量子 Landau-Lifshitz 方程 ($q$-LL) [Phys.莱特牧师。 110, 147201 (2013)] 和量子 Landau-Lifshitz-Gilbert 方程 ($q$-LLG) [Phys.莱特牧师。 133, 266704 (2024)];两个非线性保纯度主方程将经典原子自旋动力学扩展到量子领域。虽然已知任意数量自旋的经典 LL 和 LLG 对应物是等效的，即，在时间参数的重新调整范围内给出相同的自旋轨迹，但量子公式仅在某些情况下是等效的，例如对于纯态或任意单自旋 $\\frac{1}{2}$ 态。在这里，我们证明，即使在单次自旋的水平上，只要 $s \\geq 1$ ，这种等价性也会崩溃。着眼于各向异性晶体场中的自旋 1 粒子，我们证明 $q$-LL 和 $q$-LLG 方程产生不等价的时间演化。我们引入了时间重新缩放失配来量化两种类型动态的不等价性。尽管我们的结果强调了这些方程中编码的耗散机制的根本差异，但该系统所得的轨迹在质量上仍然相似。", "authors": [{"name": "Yuefei Liu"}, {"name": "Olle Eriksson"}, {"name": "Erik Sjöqvist"}], "featured_authors": [{"name": "Yuefei Liu"}, {"name": "Olle Eriksson"}, {"name": "Erik Sjöqvist"}], "author_count": 3}, {"id": "2604.09915", "category": "quant-ph", "title": "Phase-enhanced excitations in pumped collective nuclear systems", "abstract": "The quantum dynamics of an externally driven ensemble of nuclear two-level systems embedded in a leaky broadband cavity is investigated theoretically. In the considered scenario both the nuclear ensemble and the cavity mode are coherently pumped by two externally applied x-ray electromagnetic fields. When the frequencies of the applied coherent fields are identical, cross-correlations among the existing decay channels increase the nuclear excitation probabilities depending on the phase difference of the applied fields. Our results show that the excited state of the nuclear ensemble may exhibit sub- to super-Poissonian nuclear statistics, demonstrating induced correlations during photon absorption or emission processes. The role of cross-correlations for the superradiant decay and the collective Lamb shift of the ensemble is also investigated.", "url": "https://arxiv.org/abs/2604.09915", "type": "理论", "summary": "从理论上研究了嵌入漏宽带腔中的外部驱动的核两能级系统系综的量子动力学。在所考虑的场景中，核系综和腔模均由两个外部施加的 X 射线电磁场相干泵浦。当所施加的相干场的频率相同时，现有衰变通道之间的互相关根据所施加的场的相位差增加核激发概率。我们的结果表明，核系综的激发态可能表现出亚到超泊松核统计，证明了光子吸收或发射过程中的诱导相关性。还研究了系综的超辐射衰变和集体兰姆位移的互相关作用。", "authors": [{"name": "Mihai A. Macovei"}, {"name": "Fabian Richter"}, {"name": "Adriana Pálffy"}], "featured_authors": [{"name": "Mihai A. Macovei"}, {"name": "Fabian Richter"}, {"name": "Adriana Pálffy"}], "author_count": 3}, {"id": "2604.09956", "category": "quant-ph", "title": "Logical Compilation for Multi-Qubit Iceberg Patches", "abstract": "Recent advancements in quantum computing have enabled practical use of quantum error detecting and correcting codes. However, current architectures and future proposals of quantum computer design suffer from limited qubit counts, necessitating the use of high-rate codes. Such codes, with their code parameters denoted as $[[n, k, d]]$, have more than $1$ logical qubit per code (i.e., $k > 1$). This leads to reduced error tolerance of the code, since $\\lceil (d-1)/2\\rceil$ errors on any of the $n$ physical qubits can affect the logical state of all $k$ logical qubits. Therefore, it becomes critical to optimally map the input qubits of a quantum circuit to these codes, in such a way that the circuit fidelity is maximized. \\par However, the problem of mapping program qubits to logical qubits for high-rate codes has not been studied in prior work. A brute force search to find the optimal mapping is super exponential (scaling as $O(n!)$, where $n$ is the number of input qubits), making exhaustive search infeasible past a small number of qubits. We propose a framework that addresses this problem on two fronts: (1) for any given mapping, it performs logical-to-physical compilation that translates input gates into efficiently encoded implementations utilizing Hadamard commutation and gate merging; and (2) it quickly searches the space of possible mappings through a merge-optimizing, noise-biased packing heuristic that identifies high-performing qubit assignments without exhaustive enumeration. To the best of our knowledge, our compiler is the first work to explore mapping and compilation for high-rate codes. Across 71 benchmark circuits, we reduce circuit depth by $34\\%$, gate counts by up to $31\\%$ and $17\\%$ for one-qubit and two-qubit gates, and improve total variation distance by $1.75\\times$, with logical selection rate improvements averaging $86\\%$ relative to naive compilation.", "url": "https://arxiv.org/abs/2604.09956", "type": "理论+数值", "summary": "量子计算的最新进展使得量子错误检测和纠正码得以实际应用。然而，当前的架构和未来的量子计算机设计方案都受到量子比特数量有限的影响，因此需要使用高速代码。此类代码的代码参数表示为 $[[n, k, d]]$，每个代码具有超过 $1$ 的逻辑量子位（即 $k > 1$）。这会导致代码的容错能力降低，因为任何 $n$ 个物理量子位上的 $\\lceil (d-1)/2\\rceil$ 错误都会影响所有 $k$ 个逻辑量子位的逻辑状态。因此，将量子电路的输入量子位最佳地映射到这些代码变得至关重要，从而使电路保真度最大化。然而，之前的工作尚未研究将程序量子位映射到高速代码的逻辑量子位的问题。寻找最佳映射的强力搜索是超指数的（缩放为 $O(n!)$，其中 $n$ 是输入量子位的数量），使得穷举搜索在少量量子位上不可行。\n\n我们提出了一个从两个方面解决这个问题的框架：（1）对于任何给定的映射，它执行逻辑到物理的编译，利用哈达玛交换和门合并将输入门转换为有效编码的实现； (2) 它通过合并优化、噪声偏向的打包启发式快速搜索可能的映射空间，该启发式无需详尽枚举即可识别高性能量子位分配。据我们所知，我们的编译器是第一个探索高速代码映射和编译的工作。在 71 个基准电路中，我们将电路深度减少了 $34\\%$，一量子位和两量子位门的门数减少了高达 $31\\%$ 和 $17\\%$，并将总变化距离提高了 $1.75\\times$，相对于朴素编译，逻辑选择率平均提高了 $86\\%$。", "authors": [{"name": "Cordell Mazzetti"}, {"name": "Sayam Sethi"}, {"name": "Rich Rines"}, {"name": "Pranav Gokhale"}, {"name": "Jonathan Mark Baker"}], "featured_authors": [{"name": "Cordell Mazzetti"}, {"name": "Sayam Sethi"}, {"name": "Rich Rines"}, {"name": "Pranav Gokhale"}, {"name": "Jonathan Mark Baker"}], "author_count": 5}, {"id": "2604.09980", "category": "quant-ph", "title": "A parallel and distributed fixed-point quantum search algorithm for solving SAT problems", "abstract": "Boolean satisfiability (SAT) problem is of fundamental importance in computer science and many application domains. For Grover's algorithm, solving the SAT problem requires $\\mathcal{O}(\\sqrt{2^n})$ queries--where n denotes the number of logic variables in the problem. However, Grover's algorithm suffers from the Souffle problem: specifically, when the number of solutions is unknown, terminating the algorithm too early or too late leads to a significant reduction in the probability of obtaining a solution. In this paper, we propose a parallel fixed-point (PFP) search algorithm to solve the SAT problem. By exploiting entanglement, each clause in the conjunctive normal form (CNF) formula can be processed independently, leading to a significant reduction in circuit depth. We also discuss how to perform the algorithm in distributed manner. These make the PFPS algorithm particularly suitable for the noisy intermediate-scale quantum (NISQ) era.", "url": "https://arxiv.org/abs/2604.09980", "type": "理论+数值", "summary": "布尔可满足性（SAT）问题在计算机科学和许多应用领域中具有根本重要性。对于 Grover 算法，解决 SAT 问题需要 $\\mathcal{O}(\\sqrt{2^n})$ 查询 - 其中 n 表示问题中逻辑变量的数量。然而，Grover 的算法遇到了 Souffle 问题：具体来说，当解的数量未知时，过早或过晚终止算法会导致获得解的概率显着降低。在本文中，我们提出了一种并行定点（PFP）搜索算法来解决 SAT 问题。通过利用纠缠，合取范式（CNF）公式中的每个子句都可以独立处理，从而显着减少电路深度。我们还讨论了如何以分布式方式执行算法。这些使得PFPS算法特别适合噪声中等尺度量子（NISQ）时代。", "authors": [{"name": "He Wang"}, {"name": "Jinyang Yao"}], "featured_authors": [{"name": "He Wang"}, {"name": "Jinyang Yao"}], "author_count": 2}, {"id": "2604.10122", "category": "quant-ph", "title": "Unitary Designs from Two Chaotic Hamiltonians and a Random Pauli Operation", "abstract": "The realization of unitary designs is of fundamental interest in quantum science and typically requires the ability to implement structured quantum circuits. Recent developments have explored the possibility of generating unitary designs using only a small number of quantum quenches, in which the evolution during each interval is governed by a static Hamiltonian. In particular, it has been established that at least three chaotic Hamiltonians are required when only Hamiltonian evolutions are employed. In this work, we propose the emergence of unitary designs in the temporal ensemble of qubit systems evolved under two distinct chaotic Hamiltonians for sufficiently long times, supplemented by an intermediate random Pauli operation inserted between them. This result follows from the universal Pauli spectrum of chaotic Hamiltonians, a central concept in the study of non-stabilizerness. Our theoretical predictions are verified numerically using explicit examples, including Gaussian unitary ensemble Hamiltonians and random spin models. We further investigate finite-time and finite-size corrections to the protocol. Our results provide new insights into the dynamical generation of quantum randomness and offer a new route toward realizing unitary designs in chaotic systems.", "url": "https://arxiv.org/abs/2604.10122", "type": "理论+数值", "summary": "单一设计的实现对于量子科学具有根本意义，并且通常需要实现结构化量子电路的能力。最近的发展探索了仅使用少量量子猝灭生成单一设计的可能性，其中每个间隔期间的演化由静态哈密顿量控制。特别是，已经确定，当仅采用哈密顿演化时，至少需要三个混沌哈密顿量。在这项工作中，我们提出在两个不同的混沌哈密顿量足够长的时间内演化的量子位系统的时间系综中出现单一设计，并在它们之间插入中间随机泡利运算作为补充。这一结果源自混沌哈密顿量的普适泡利谱，这是非稳定剂研究的核心概念。我们的理论预测使用明确的例子进行了数值验证，包括高斯酉系综哈密顿量和随机自旋模型。我们进一步研究了协议的有限时间和有限大小的修正。\n\n我们的结果为量子随机性的动态生成提供了新的见解，并为在混沌系统中实现单一设计提供了新途径。", "authors": [{"name": "Ning Sun"}, {"name": "Pengfei Zhang"}], "featured_authors": [{"name": "Ning Sun"}, {"name": "Pengfei Zhang"}], "author_count": 2}, {"id": "2604.10128", "category": "quant-ph", "title": "A Framework for Predicting Entanglement Spectra of Gapless Symmetry-Protected Topological States in One Dimension", "abstract": "The concept of gapped symmetry-protected topological (SPT) states has been generalized to gapless SPT (gSPT) states. Similar to gapped SPT states, gSPT states in one dimension exhibit universal degeneracies in their entanglement spectra. The entanglement spectra of gSPT states are further described by boundary conformal field theories, whose systematic prediction is a key open question. To address this problem, we focus on the class of gSPT states that are obtained by applying unitary SPT entanglers to trivial, critical states in one dimension. We find that the reduced density matrix of a non-trivial gSPT state can be obtained, either exactly or approximately, by applying a quantum channel to the reduced density matrix of the trivial gSPT state. This quantum channel acts only near the entanglement cut and modifies its corresponding conformal boundary condition, allowing us in turn to predict the boundary conformal field theory describing the entanglement spectra. We apply this framework to gSPT states protected by various symmetries and having different central charges, and further analyze the stability of boundary conditions of the entanglement cut. Our work thereby provides a framework for systematically analyzing and understanding the entanglement spectra of gSPT states.", "url": "https://arxiv.org/abs/2604.10128", "type": "理论", "summary": "有隙对称保护拓扑 (SPT) 态的概念已推广到无隙 SPT (gSPT) 态。与带隙 SPT 态类似，一维 gSPT 态在其纠缠谱中表现出普遍的简并性。 gSPT态的纠缠谱由边界共形场理论进一步描述，其系统预测是一个关键的悬而未决的问题。为了解决这个问题，我们关注一类 gSPT 态，这些态是通过将酉 SPT 纠缠器应用于一维的平凡临界态而获得的。我们发现，通过将量子通道应用于平凡 gSPT 态的约化密度矩阵，可以精确或近似地获得非平凡 gSPT 态的约化密度矩阵。该量子通道仅在纠缠切割附近起作用并修改其相应的共形边界条件，从而使我们能够预测描述纠缠光谱的边界共形场论。我们将该框架应用于受各种对称性保护且具有不同中心电荷的 gSPT 态，并进一步分析了纠缠切割边界条件的稳定性。\n\n因此，我们的工作为系统分析和理解 gSPT 态的纠缠谱提供了一个框架。", "authors": [{"name": "Wen-Tao Xu"}, {"name": "Frank Pollmann"}, {"name": "Michael Knap"}], "featured_authors": [{"name": "Wen-Tao Xu"}, {"name": "Frank Pollmann"}, {"name": "Michael Knap"}], "author_count": 3}, {"id": "2604.10155", "category": "quant-ph", "title": "Encrypted clones can leak: Classification of informative subsets in Quantum Encrypted Cloning", "abstract": "Encrypted cloning enables the redundant storage of an unknown qubit while remaining compatible with the no-cloning theorem, since only one clone can later be recovered through key-consuming decryption. Because encryption in this protocol is introduced to enable cloning-compatible redundancy rather than to guarantee confidentiality by design, its secrecy properties must be assessed explicitly. Here we classify the subsets of the encrypted-clone storage register into authorized, completely non-informative, and partially informative sets. We show that intermediate non-authorized subsets may retain only a restricted residual dependence on the input state, and we characterize exactly when this dependence occurs. The resulting leakage pattern is parity-dependent, revealing a structural confidentiality limitation of encrypted cloning.", "url": "https://arxiv.org/abs/2604.10155", "type": "理论", "summary": "加密克隆可以实现未知量子位的冗余存储，同时保持与不可克隆定理兼容，因为以后只能通过密钥消耗解密来恢复一个克隆。由于该协议中引入加密是为了实现克隆兼容的冗余，而不是通过设计保证机密性，因此必须明确评估其机密性。在这里，我们将加密克隆存储寄存器的子集分类为授权集、完全非信息集和部分信息集。我们表明，中间非授权子集可能仅保留对输入状态的有限残差依赖，并且我们准确地描述了这种依赖何时发生。由此产生的泄漏模式与奇偶校验相关，揭示了加密克隆的结构机密性限制。", "authors": [{"name": "Gabriele Gianini"}, {"name": "Omar Hasan"}, {"name": "Corrrado Mio"}, {"name": "Stelvio Cimato"}, {"name": "Ernesto Damiani"}], "featured_authors": [{"name": "Gabriele Gianini"}, {"name": "Omar Hasan"}, {"name": "Corrrado Mio"}, {"name": "Stelvio Cimato"}, {"name": "Ernesto Damiani"}], "author_count": 5}, {"id": "2604.10428", "category": "quant-ph", "title": "Worst-case Harrow-Hassidim-Lloyd algorithm with average-case correct quantum Fourier transform", "abstract": "In [\\href{ this https URL }{Quantum 6, 872, 2022}], Linden and de Wolf proposed a lightweight protocol for verifying the average-case correct behavior of the quantum Fourier transform (QFT). They proved that good average-case QFT performance suffices for good worst-case performance in several quantum tasks. Here we provide another application of this worst-case-to-average-case reduction, using a strengthened Linden-de Wolf protocol. We show that, across three distinct scenarios, the Harrow-Hassidim-Lloyd algorithm can be executed with provably good worst-case performance, assuming only that the QFT is correct on average.", "url": "https://arxiv.org/abs/2604.10428", "type": "数值", "summary": "在 [\\href{ 此 https URL {Quantum 6, 872, 2022}] 中，Linden 和 de Wolf 提出了一种轻量级协议，用于验证量子傅立叶变换 (QFT) 的平均情况正确行为。他们证明，良好的平均情况 QFT 性能足以在多个量子任务中实现良好的最坏情况性能。在这里，我们使用增强的 Linden-de Wolf 协议提供了这种从最坏情况到平均情况减少的另一种应用。我们证明，在三种不同的场景中，只要 QFT 平均而言是正确的，Harrow-Hassidim-Lloyd 算法就可以在最坏情况下以可证明良好的性能执行。", "authors": [{"name": "Changpeng Shao"}], "featured_authors": [{"name": "Changpeng Shao"}], "author_count": 1}, {"id": "2604.10562", "category": "quant-ph", "title": "The spontaneous disentanglement hypothesis and causality", "abstract": "The hypothesis that disentanglement spontaneously occurs in quantum systems is motivated by some outstanding issues in the foundations of quantum mechanics. However, for some cases, spontaneous disentanglement enables the violation of the causality principle. To mitigate the conflict with causality, a formulation for the hypothesis, which is based on the maximum entropy principle, is proposed. The method of Lagrange multipliers is implemented to ensure consistency with causality. The proposed formulation is applicable for any quantum system having a Hilbert space of finite dimensionality.", "url": "https://arxiv.org/abs/2604.10562", "type": "理论", "summary": "量子系统中自发发生解缠结的假设是由量子力学基础中的一些突出问题引发的。然而，在某些情况下，自发的解开可能会违反因果关系原则。为了减轻与因果关系的冲突，提出了基于最大熵原理的假设表述。实施拉格朗日乘数方法以确保因果关系的一致性。所提出的公式适用于具有有限维希尔伯特空间的任何量子系统。", "authors": [{"name": "Eyal Buks"}], "featured_authors": [{"name": "Eyal Buks"}], "author_count": 1}, {"id": "2604.10625", "category": "quant-ph", "title": "Symplectic Constraints in Quantum Reaction Dynamics: Squeezed-State Suppression and Candidate Width Scales", "abstract": "Classical reaction dynamics suggests transport through an index-1 saddle is organized not just by flux, but by local symplectic width scales of bounded proxy neighborhoods near the bottleneck. We investigate if a related geometric effect appears in the quantum regime for highly squeezed Gaussian wavepackets. Building on de Gosson's symplectic approach, we analyze how transverse bath-mode squeezing modifies transmission across a quantum normal-form (QNF) bottleneck. To avoid the instability of propagating states with extreme phase-space eccentricity, we use the Weyl-symbol formulation of the QNF. For the quadratic saddle-center model, we derive an exact baseline transmission formula by convolving the bath's squeezed-state number distribution with the 1D Kemble transmission factor. For anharmonic truncated QNF models, we enforce strict algebraic energy conservation and evaluate exact Gaussian expectation-value diagnostics of the Weyl symbol via Wick-Isserlis moment formulas. Results reveal a pronounced squeeze-induced suppression of transmission. As the squeezed state's bath-plane geometric scale grows relative to the classical candidate width, the expected bath action grows rapidly. Consequently, effective reactive energy is strongly depleted, driving transmission into a severely suppressed regime. We interpret this as evidence of a quantum geometric suppression mechanism consistent with the classical candidate symplectic-width picture. While not yet a rigorous quantum non-squeezing theorem, this work provides a concrete framework linking squeezed-state covariance geometry, normal-form action scales, and mode-specific quantum reactivity near an index-1 saddle.", "url": "https://arxiv.org/abs/2604.10625", "type": "理论+数值", "summary": "经典反应动力学表明，通过指数 1 鞍的传输不仅由通量组织，而且由瓶颈附近有界代理邻域的局部辛宽度尺度组织。我们研究了高度压缩高斯波包的量子状态中是否出现相关的几何效应。基于 de Gosson 的辛方法，我们分析了横向浴模压缩如何修改穿过量子范式 (QNF) 瓶颈的传输。为了避免具有极端相空间偏心率的传播态的不稳定性，我们使用 QNF 的 Weyl 符号公式。对于二次鞍中心模型，我们通过将槽的压缩状态数分布与一维 Kemble 传输因子进行卷积，得出精确的基线传输公式。对于非谐波截断 QNF 模型，我们执行严格的代数能量守恒，并通过 Wick-Isserlis 矩公式评估 Weyl 符号的精确高斯期望值诊断。结果揭示了明显的挤压引起的传播抑制。随着挤压状态的浴平面几何尺度相对于经典候选宽度的增长，预期的浴动作迅速增长。\n\n因此，有效无功能量被严重耗尽，导致传输进入严重抑制状态。我们将此解释为与经典候选辛宽度图一致的量子几何抑制机制的证据。虽然还不是严格的量子非挤压定理，但这项工作提供了一个具体的框架，将挤压态协方差几何、正规形式作用尺度和指数 1 鞍点附近的模式特定量子反应性联系起来。", "authors": [{"name": "Stephen Wiggins"}], "featured_authors": [{"name": "Stephen Wiggins"}], "author_count": 1}, {"id": "2604.10651", "category": "quant-ph", "title": "Role of Asymmetry in the Performance Optimization of a Relativistic Quantum Otto Engine", "abstract": "We present an analytical study of the relativistic quantum Otto cycle driven by a time-dependent harmonic oscillator. By imposing an asymmetry on the two adiabatic processes of this cycle, we obtain distinct scenarios of sudden compression and sudden expansion, and analyze how asymmetry affects the performance of the relativistic quantum Otto engine. By leveraging the Omega function as a unified performance metric, we analytically characterize the efficiency in both scenarios. Our findings demonstrate that the efficiency approaches unity in the sudden compression case, while it is restricted to one-half for the sudden expansion case. Furthermore, we investigate the impact of increasing oscillator velocity on the extracted work and identify parameter regimes where either sudden compression or sudden expansion dominates. Additionally, we examine the optimal operating point using parametric efficiency-work plots, whose loop-shaped structure shows that increasing oscillator velocity enhances both work output and efficiency. Finally, through a detailed phase diagram analysis of the Otto cycle, we observe that the operational region corresponding to the engine mode expands with increasing oscillator velocity, while the refrigeration regime shrinks correspondingly.", "url": "https://arxiv.org/abs/2604.10651", "type": "理论+数值", "summary": "我们提出了由时间相关谐振子驱动的相对论量子奥托循环的分析研究。通过对该循环的两个绝热过程施加不对称性，我们获得了突然压缩和突然膨胀的不同场景，并分析了不对称性如何影响相对论量子奥托引擎的性能。通过利用 Omega 函数作为统一的性能指标，我们分析地描述了这两种情况下的效率。我们的研究结果表明，在突然压缩的情况下，效率接近统一，而在突然膨胀的情况下，效率仅限于二分之一。此外，我们研究了增加振荡器速度对提取功的影响，并确定突然压缩或突然膨胀占主导地位的参数范围。此外，我们使用参数效率工作图检查最佳工作点，其环形结构表明，增加振荡器速度可以提高工作输出和效率。\n\n最后，通过对奥托循环的详细相图分析，我们观察到发动机模式对应的工作区域随着振荡器速度的增加而扩大，而制冷范围相应地缩小。", "authors": [{"name": "Monika"}, {"name": "Shishram Rebari"}], "featured_authors": [{"name": "Monika"}, {"name": "Shishram Rebari"}], "author_count": 2}, {"id": "2604.10762", "category": "quant-ph", "title": "An Information-Theoretic Bound on Thermodynamic Efficiency and the Generalized Carnot's Theorem", "abstract": "We derive a bound on the efficiency of thermal engines that can be sharper than Carnot's limit. It is a function of statistical correlations between the engine internal state and Hamiltonian, can be saturated even in finite-time cycles, and applies to both classical and quantum engines. Specifically, the bound establishes the exact maximal efficiency of engines operating with multiple baths, tightening the upper limit set by Carnot's theorem. Then, we show that an engine made of a quantum dot coupled with fermionic baths can achieve the bound, even when operating beyond the quasistatic regime. The result provides a design principle for realistic energy harvesting machines.", "url": "https://arxiv.org/abs/2604.10762", "type": "理论", "summary": "我们得出了热机效率的界限，该界限可能比卡诺极限更尖锐。它是发动机内部状态和哈密顿量之间统计相关性的函数，即使在有限时间循环中也可以饱和，并且适用于经典发动机和量子发动机。具体来说，该界限确定了使用多个浴槽运行的发动机的确切最大效率，收紧了卡诺定理设定的上限。然后，我们证明，由量子点与费米子浴相结合制成的发动机即使在超出准静态范围运行时也可以达到极限。结果为现实的能量收集机器提供了设计原理。", "authors": [{"name": "Anna Gabetti"}, {"name": "Fabrizio Dolcini"}, {"name": "Davide Girolami"}], "featured_authors": [{"name": "Anna Gabetti"}, {"name": "Fabrizio Dolcini"}, {"name": "Davide Girolami"}], "author_count": 3}, {"id": "2604.10794", "category": "quant-ph", "title": "Symplectic perspective to quantum computing for Hamiltonian systems", "abstract": "This work develops a symplectic framework for quantum computing to be applied to classical Hamiltonian systems, exploiting the intrinsic geometric compatibility between unitary quantum evolution and symplectic phase-space dynamics in a two-fold way. The first part is devoted in establishing an exact correspondence between quantum evolution and classical Hamiltonian flow on a Kahler manifold. This correspondence enables a geometric quantization scheme that identifies a family of classical Hamiltonian systems admitting exponentially compressed quantum representations-appropriate for quantum simulation. In the second part we demonstrate that Liouville-integrable Hamiltonian dynamics induce finite-dimensional unitary evolution through action-angle variables and Koopman-von Neumann encoding. This allows efficient quantum representation and parallel evolution of large phase-space ensembles, where entangled encodings provide exponential compression in ensemble size and enable quantum speed-ups in observable estimation via amplitude estimation techniques. For non-integrable systems, Lie canonical perturbation theory is incorporated to construct near-symplectic transformations that map dynamics to approximately integrable forms, preserving unitary evolution up to a controlled error. We derive the resulting quantum computational complexity of the proposed quantum-symplectic scheme, revealing both an exponential compression in memory requirements and a potential polynomial speed-up with respect to the system size. Finally, the transport evolution equation governing the quantum phase-space observables is obtained.", "url": "https://arxiv.org/abs/2604.10794", "type": "理论+数值", "summary": "这项工作开发了一个应用于经典哈密顿系统的量子计算辛框架，以双重方式利用酉量子演化和辛相空间动力学之间的内在几何兼容性。第一部分致力于在卡勒流形上建立量子演化与经典哈密顿流之间的精确对应关系。这种对应关系实现了一种几何量化方案，该方案识别出一系列经典哈密顿系统，允许指数压缩的量子表示（适用于量子模拟）。在第二部分中，我们证明了刘维尔可积哈密顿动力学通过作用角变量和库普曼-冯·诺依曼编码诱导有限维酉演化。这允许大型相空间系综的高效量子表示和并行演化，其中纠缠编码提供系综大小的指数压缩，并通过幅度估计技术实现可观测估计的量子加速。\n\n对于不可积系统，结合李正则摄动理论来构造近辛变换，将动力学映射到近似可积形式，从而在受控误差范围内保持酉演化。我们推导了所提出的量子辛方案的量子计算复杂性，揭示了内存需求的指数压缩和相对于系统大小的潜在多项式加速。最后，得到了控制量子相空间可观测量的输运演化方程。", "authors": [{"name": "Efstratios Koukoutsis"}, {"name": "Kyriakos Hizanidis"}, {"name": "Lucas I Inigo Gamiz"}, {"name": "Oscar Amaro"}, {"name": "Christos Tsironis"}, {"name": "Abhay K. Ram"}, {"name": "George Vahala"}], "featured_authors": [{"name": "Efstratios Koukoutsis"}, {"name": "Kyriakos Hizanidis"}, {"name": "Lucas I Inigo Gamiz"}, {"name": "Christos Tsironis"}, {"name": "Abhay K. Ram"}, {"name": "George Vahala"}], "author_count": 7}, {"id": "2604.10861", "category": "quant-ph", "title": "Training single-electron and single-photon stochastic physical neural networks", "abstract": "The computational demands of deep learning motivate the investigation of alternative approaches to computation. One alternative is physical neural networks~(PNNs), in which learning and inference are performed directly via physical processes. Stochastic PNNs arise when the underlying neurons are realized by the dynamics of a stochastic activation switch. Here we propose novel electronic and photonic stochastic neurons. The electronic realization is implemented by single-electron tunneling through a quantum dot. The photonic realization is implemented via a single-photon source driving one of two modes coupled via a controllable beam-splitter-like interaction. In the electronic case, the charge state of the quantum dot forms the basis for the stochastic neuron, whereas in the photonic case the occupation of the undriven mode serves as the basis for the stochastic neuron. Training of stochastic PNNs is performed with models of stochastic neurons, as well as with coherently-driven, single-photon detector stochastic neurons previously introduced. Several training strategies for MNIST handwritten digit classification have been investigated using single-hidden-layer stochastic PNNs, including varying the number of trials in each layer to control forward pass stochasticity and employing either true probability or empirical outputs in the backward pass to evaluate their influence on gradient estimation. We show that when empirical outputs are used in the backward pass, the network achieves more than 97\\% test accuracy with few trials per layer. Despite the simplicity of the model architecture, high test accuracy is maintained in the presence of a high degree of noise and model uncertainty. The results demonstrate the potential of embracing stochastic PNNs for deep learning.", "url": "https://arxiv.org/abs/2604.10861", "type": "理论+数值", "summary": "深度学习的计算需求激发了对替代计算方法的研究。一种替代方案是物理神经网络（PNN），其中学习和推理直接通过物理过程进行。当底层神经元通过随机激活开关的动态实现时，随机 PNN 就会出现。在这里，我们提出了新型电子和光子随机神经元。电子实现是通过量子点的单电子隧道实现的。光子实现是通过单光子源驱动两种模式之一来实现的，该两种模式通过可控的分束器式相互作用耦合。在电子情况下，量子点的电荷状态形成随机神经元的基础，而在光子情况下，非驱动模式的占据作为随机神经元的基础。随机 PNN 的训练是使用随机神经元模型以及之前介绍的相干驱动的单光子探测器随机神经元来进行的。\n\n使用单隐藏层随机 PNN 研究了 MNIST 手写数字分类的几种训练策略，包括改变每层中的试验次数来控制前向传递随机性，并在后向传递中采用真实概率或经验输出来评估它们对梯度估计的影响。我们表明，当在向后传递中使用经验输出时，网络在每层进行很少的试验的情况下实现了超过 97% 的测试精度。尽管模型架构很简单，但在存在高度噪声和模型不确定性的情况下仍能保持较高的测试精度。结果证明了采用随机 PNN 进行深度学习的潜力。", "authors": [{"name": "Tong Dou"}, {"name": "Shiro Kumara"}, {"name": "Josh Burns"}, {"name": "Ethan Sigler"}, {"name": "Parth Girdhar"}, {"name": "David Petty"}, {"name": "Gerard Milburn"}, {"name": "Jo Plested"}, {"name": "Matt Woolley"}], "featured_authors": [{"name": "Tong Dou"}, {"name": "Shiro Kumara"}, {"name": "Josh Burns"}, {"name": "Gerard Milburn"}, {"name": "Jo Plested"}, {"name": "Matt Woolley"}], "author_count": 9}, {"id": "2604.10880", "category": "quant-ph", "title": "Effective schemes for fusion of hyperentangled W states", "abstract": "Hyperentangled states are fascinating resources in quantum information processing as they can significantly increase the channel capacity and enhance noise resistance. We explore a hyperfusion mechanism to fuse one n photon hyper-W state and one m-photon hyper-W state into a large-scale (n+m-2)-photon hyper-W state. Another mechanism to fuse one n-photon hyper-W state, one m-photon hyper-$W$ state, and one $t$-photon hyper-W state into an (n+m+t-3)-photon hyper-W state is also proposed. These two hyperfusion mechanisms are constructed employing only polarizing beam splitters, balanced beam splitters, half-wave plates, single-photon detectors, and cross-Kerr nonlinearities. Conditional quantum gates, path couplers, and ancillary photons are not required in our constructions. Moreover, our fused $W$ states are hyperentangled in the polarization and spatial degrees of freedom of single-photon systems. The presence of only one garbage output state demonstrates that high efficiency can be achieved in our schemes.", "url": "https://arxiv.org/abs/2604.10880", "type": "理论", "summary": "超纠缠态是量子信息处理中令人着迷的资源，因为它们可以显着增加通道容量并增强抗噪声能力。我们探索了一种超融合机制，将一个 n 光子超 W 态和一个 m 光子超 W 态融合为大规模 (n+m-2) 光子超 W 态。还提出了另一种将一个n光子超W态、一个m光子超W$态和一个$t$光子超W态融合成(n+m+t-3)光子超W态的机制。这两种超融合机制仅采用偏振分束器、平衡分束器、半波片、单光子探测器和交叉克尔非线性来构建。我们的构造中不需要条件量子门、路径耦合器和辅助光子。此外，我们的融合 $W$ 态在单光子系统的偏振和空间自由度中高度纠缠。仅存在一种垃圾输出状态表明我们的方案可以实现高效率。", "authors": [{"name": "Wen-Xiu Zhang"}, {"name": "Wen-Qiang Liu"}, {"name": "Hai-Rui Wei"}], "featured_authors": [{"name": "Wen-Xiu Zhang"}, {"name": "Wen-Qiang Liu"}, {"name": "Hai-Rui Wei"}], "author_count": 3}, {"id": "2604.10886", "category": "quant-ph", "title": "The non-local Hong-Ou-Mandel effect", "abstract": "Two-photon interference effects arise because photons are indistinguishable particles. In the wellknown Hong-Ou-Mandel (HOM) effect, the transmission of two photons at a beam splitter interferes destructively with the reflection of both photons, requiring both photons to \"bunch up\" by leaving the beam splitter on the same side. Here, we show that the interference between locally propagating photons and photons exchanged by a mode swap can be implemented by post-selecting spatially separated photon outputs of a four-path interferometer. Even though the photons detected at spatially separated locations must have travelled along paths that never met up at the same beam splitter, the Hong-Ou-Mandel effect can be observed in correlations between the output ports that originate from the association of detection events with non-local output modes defined by the two single photon inputs. Local phase shifts can be used to map out non-classical correlations between the photons detected at different output locations, clarifying the role of linear optics in generating entanglement between spatially separated photons. Our work thus establishes a fundamental relation between multiphoton interference and entanglement, opening the door to new possibilities in optical quantum technologies.", "url": "https://arxiv.org/abs/2604.10886", "type": "理论", "summary": "双光子干涉效应的产生是因为光子是无法区分的粒子。在众所周知的红欧曼德尔 (HOM) 效应中，两个光子在分束器处的传输会破坏性地干扰两个光子的反射，从而需要通过将分束器留在同一侧来“聚束”两个光子。在这里，我们表明，局部传播的光子和通过模式交换交换的光子之间的干涉可以通过后选择四路径干涉仪的空间分离的光子输出来实现。尽管在空间分离位置检测到的光子必须沿着从未在同一分束器相遇的路径行进，但可以在输出端口之间的相关性中观察到红欧曼德尔效应，该效应源自检测事件与由两个单光子输入定义的非局部输出模式的关联。局部相移可用于绘制在不同输出位置检测到的光子之间的非经典相关性，从而阐明线性光学在空间分离的光子之间产生纠缠中的作用。\n\n因此，我们的工作建立了多光子干涉和纠缠之间的基本关系，为光学量子技术的新可能性打开了大门。", "authors": [{"name": "Yuki Kodama"}, {"name": "Jonte R. Hance"}, {"name": "Holger F. Hofmann"}], "featured_authors": [{"name": "Yuki Kodama"}, {"name": "Jonte R. Hance"}, {"name": "Holger F. Hofmann"}], "author_count": 3}, {"id": "2604.11022", "category": "quant-ph", "title": "SPATE: Spiking-Phase Adaptive Temporal Encoding for Quantum Machine Learning", "abstract": "Most quantum machine learning (QML) pipelines still rely on static encodings such as angle and amplitude maps, and this limits their ability to handle temporal information. To address this limitation, this paper uses spike-based data representation as an effective encoding mechanism that incorporates temporal structure into quantum feature preparation. Specifically, we propose Spiking-Phase Adaptive Temporal Encoding (SPATE), a novel spike-driven temporal encoding method that converts real-valued tabular features into leaky integrate-and-fire spike trains and maps spike statistics to quantum rotations, augmented with a small set of temporal qubits through controlled phase operations. An encoding-centric evaluation protocol is also introduced to assess representation quality independently of the classifier, covering centered kernel-target alignment (CKTA), Fisher-style separability, inter/intra-class distance ratios, silhouette score, normalized entropy, and pairwise total-variation (TVpair) collapse indicators. Under stratified cross-validation, SPATE yields stronger representations across multiple datasets. For example, SPATE reaches a CKTA of 0.966 and a Fisher score of 7.37 on Blobs, compared with a CKTA of 0.632 and a Fisher score of 0.70 using angle encoding, and achieves a CKTA of 0.506 on Moons, compared with 0.015 using angle or amplitude encoding. These gains
