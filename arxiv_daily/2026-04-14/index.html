selection and flow conditions.", "url": "https://arxiv.org/abs/2604.09684", "type": "理论+数值", "summary": "本研究对多链两亲性嵌段共聚物在不同链长、结构、组成和剪切速率下的自组装和流变行为进行了计算研究。使用布朗动力学 (BD) 模拟，我们系统地研究了珠弹簧模型多链二嵌段和三嵌段共聚物，链长为 12-48 个珠，疏水分数 (f) 范围为 0 至 1.0，剪切速率范围为 0-0.1 1/ns。在稀释状态下，结果表明，三嵌段共聚物通过疏水末端嵌段形成广泛的具有桥接结构的3D网络，实现的溶液粘度比二嵌段系统高出半个数量级，并且在弱剪切下具有优异的结构完整性。在剪切速率=0.003-0.01 1/ns 时，两种链结构都显示出每个胶束内各个链的回转半径增加以及簇计数减少，这表明簇在较高剪切速率下分解之前聚集。形状各向异性分析表明，三嵌段在高剪切速率下形成高度伸长的扁长结构（L1/L3 = 11），而二嵌段形成更离散的胶束组件（L1/L3 = 7.5）。\n\n链长分析显示回转半径系统性增加，三嵌段表现出簇数增加，表明网络渗透。在流变学上，三嵌段系统随着疏水分数的增加而保持较低的交叉频率，反映出与二嵌段相比更慢的网络松弛。由于双端疏水桥接，三嵌段共聚物体系的末端弛豫时间随着疏水分数的增加而增加，而二嵌段则保持稳定的值。这些发现为通过结构选择和流动条件合理设计聚合物药物载体提供了基本见解。", "authors": [{"name": "Ehsan Kamali Ahangar"}, {"name": "Dominic Robe"}, {"name": "Elnaz Hajizadeh"}], "featured_authors": [{"name": "Ehsan Kamali Ahangar"}, {"name": "Dominic Robe"}, {"name": "Elnaz Hajizadeh"}], "author_count": 3}, {"id": "2604.09758", "category": "cond-mat", "title": "Heterogeneous Molecular Signatures of Human Odor Perception", "abstract": "Understanding how molecular structure gives rise to odor perception remains a long-standing challenge, with ongoing debate over whether olfaction is primarily governed by molecular shape, vibrational properties, or their interplay at the level of olfactory receptors. Here, we ask whether different odors rely on common molecular determinants or instead emerge from distinct physicochemical regimes. Using interpretable machine-learning models trained on molecular descriptors derived from first-principles calculations that span electronic, vibrational, and structural properties, we analyze feature contributions for odor categories and their associated receptors. We find that no single descriptor class universally dominates odor prediction; instead, different odors exhibit strongly odor-specific patterns of feature importance, with substantial variability across physicochemical domains. This heterogeneity is consistent across different models, suggesting that a universal encoding scheme does not capture odor perception but reflects receptor- and odor-dependent structure-odor relationships. Our results provide statistical constraints on competing olfactory theories and offer a data-driven framework for organizing odor space.", "url": "https://arxiv.org/abs/2604.09758", "type": "理论+数值", "summary": "了解分子结构如何产生气味感知仍然是一个长期存在的挑战，关于嗅觉是否主要受分子形状、振动特性或其在嗅觉受体水平上的相互作用的控制一直存在争论。在这里，我们询问不同的气味是否依赖于共同的分子决定因素，或者是来自不同的物理化学机制。使用基于分子描述符训练的可解释机器学习模型，该模型源自涵盖电子、振动和结构特性的第一原理计算，我们分析了气味类别及其相关受体的特征贡献。我们发现没有一个描述符类别普遍主导气味预测；相反，不同的气味表现出强烈的气味特异性模式，具有重要的特征，在物理化学领域具有很大的可变性。这种异质性在不同模型中是一致的，这表明通用编码方案不能捕获气味感知，而是反映受体和气味依赖的结构-气味关系。\n\n我们的结果为竞争性嗅觉理论提供了统计约束，并为组织气味空间提供了数据驱动的框架。", "authors": [{"name": "P. Zanineli"}, {"name": "E. V. C. Lopes"}, {"name": "G. R. Schleder"}, {"name": "L. N. Lemos"}, {"name": "F. Crasto de Lima"}, {"name": "A. Fazzio"}], "featured_authors": [{"name": "P. Zanineli"}, {"name": "E. V. C. Lopes"}, {"name": "G. R. Schleder"}, {"name": "L. N. Lemos"}, {"name": "F. Crasto de Lima"}, {"name": "A. Fazzio"}], "author_count": 6}, {"id": "2604.09768", "category": "cond-mat", "title": "Proof of entropic order in Generalized Ising Models", "abstract": "Ordering at arbitrarily high temperature - entropic order - has been argued to take place in a class of generalized Ising models parameterised by a real interaction parameter $p$ when $p\\ge 1$. We give a rigorous proof of this conjecture. We further show that on arbitrary graphs, these models solve graph packing problems - crucially, the Maximum Independent Set optimisation problem. Due to the NP-hardness of this packing problem on generic graphs, some lattice systems will exhibit glassy phases. We call this phenomenon $entropic$ $glass$.", "url": "https://arxiv.org/abs/2604.09768", "type": "理论", "summary": "任意高温下的有序性（熵序）被认为发生在一类广义伊辛模型中，该模型由真实相互作用参数 $p$（当 $p\\ge 1$ 时）进行参数化。我们对这个猜想给出了严格的证明。我们进一步表明，在任意图上，这些模型解决了图打包问题 - 至关重要的是，最大独立集优化问题。由于一般图上的堆积问题的 NP 硬度，一些晶格系统将表现出玻璃相。我们称这种现象为$entropic$ $glass$。", "authors": [{"name": "Enrico Andriolo"}, {"name": "Mendel Nguyen"}, {"name": "Emily Richards"}, {"name": "Tin Sulejmanpasic"}], "featured_authors": [{"name": "Enrico Andriolo"}, {"name": "Mendel Nguyen"}, {"name": "Emily Richards"}, {"name": "Tin Sulejmanpasic"}], "author_count": 4}, {"id": "2604.09801", "category": "cond-mat", "title": "Symmetry Protected Bulk-Boundary Correspondence in Interacting Topological Insulators", "abstract": "We establish a quantitative bulk boundary correspondence in interacting topological insulators by relating many-body topological invariants to characteristic degeneracy structures in the entanglement spectrum. Focusing on generalized Su Schrieffer Heeger chains with higher winding number, we construct a gauge-invariant many-body winding invariant based on Pancharatnam geometric phases that remains well defined in the presence of interactions. We show that this invariant uniquely determines the low-lying entanglement-spectrum degeneracy, which exhibits a universal 4 to the power nu scaling with the winding number nu, providing a concrete formulation of bulk boundary correspondence beyond single-particle topology. Using exact diagonalization, we demonstrate the robustness of this correspondence under interactions and symmetry preserving disorder, and identify inversion symmetry as a minimal protecting symmetry that stabilizes both the quantization of the invariant and the associated entanglement degeneracies. Our results unify geometric-phase invariants and entanglement diagnostics within a many-body framework and provide a route to identifying interacting topological phases beyond band theory.", "url": "https://arxiv.org/abs/2604.09801", "type": "理论+数值", "summary": "我们通过将多体拓扑不变量与纠缠谱中的特征简并结构联系起来，在相互作用的拓扑绝缘体中建立了定量的体边界对应关系。着眼于具有更高缠绕数的广义 Su Schrieffer Heeger 链，我们构建了基于 Pancharatnam 几何相位的规范不变多体缠绕不变量，该不变量在存在相互作用的情况下仍保持良好定义。我们证明，这个不变量唯一地决定了低位纠缠谱简并性，它表现出与绕数 nu 成比例的通用 4 次方 nu 比例，提供了超越单粒子拓扑的体边界对应的具体公式。使用精确对角化，我们证明了这种对应关系在相互作用和对称性保持无序下的鲁棒性，并将反演对称性确定为最小的保护对称性，可以稳定不变量的量子化和相关的纠缠简并性。\n\n我们的结果将几何相不变量和纠缠诊断统一在多体框架内，并提供了一种识别能带理论之外的相互作用拓扑相的途径。", "authors": [{"name": "Kiran Babasaheb Estake"}, {"name": "Dibyendu Roy"}], "featured_authors": [{"name": "Kiran Babasaheb Estake"}, {"name": "Dibyendu Roy"}], "author_count": 2}, {"id": "2604.09842", "category": "cond-mat", "title": "Self-compensation by silicon $DX$ centers in ultrawide-bandgap nitrides", "abstract": "\\textit{DX} behavior limits $n$-type carrier concentrations in ultrawide-bandgap nitrides such as aluminum nitride (AlN) and cubic boron nitride ($c$-BN). Instead of acting as effective-mass donors, \\textit{DX} centers capture two electrons, stabilizing a negative charge state that leads to self compensation. Silicon is the most effective $n$-type dopant in this class of materials; in AlN, its \\textit{DX} level [(i.e., the (+/$-$) transition level] is $\\sim$270 meV from the conduction-band minimum. This implies that many silicon impurities incorporated into AlN will be negatively charged and compensate the intended $n$-type doping. By combining density functional theory calculations of temperature-dependent band gaps and Si dopant transition levels, we show here that significant compensation occurs in silicon-doped AlN, even in the absence of any other defects. This compensation strongly limits free electron concentrations which become independent of doping concentration, and donor activation is only significant for light doping scenarios. Higher free carrier concentrations can be achieved in AlGaN alloys or in $c$-BN, where the \\textit{DX} level sits closer to the conduction-band minimum.", "url": "https://arxiv.org/abs/2604.09842", "type": "理论+数值", "summary": "\\textit{DX} 行为限制了超宽带隙氮化物（例如氮化铝（AlN）和立方氮化硼（$c$-BN）中的 $n$ 型载流子浓度）。 \\textit{DX} 中心不是充当有效质量供体，而是捕获两个电子，稳定负电荷状态，从而实现自我补偿。硅是此类材料中最有效的$n$型掺杂剂；在AlN中，其\\textit{DX}能级[（即（+/$-$）跃迁能级]距导带最小值为$\\sim$270 meV。这意味着掺入AlN中的许多硅杂质将带负电并补偿预期的$n$型掺杂。通过结合温度相关带隙和Si掺杂剂跃迁能级的密度泛函理论计算，我们在此表明，即使在没有任何其他掺杂剂的情况下，硅掺杂AlN中也会发生显着的补偿这种补偿强烈限制了与掺杂浓度无关的自由电子浓度，并且施主激活仅对轻掺杂情况有意义。\n\nAlGaN 合金或 $c$-BN 中可以实现更高的自由载流子浓度，其中 \\textit{DX} 能级更接近导带最小值。", "authors": [{"name": "John L. Lyons"}, {"name": "Darshana Wickramaratne"}], "featured_authors": [{"name": "John L. Lyons"}, {"name": "Darshana Wickramaratne"}], "author_count": 2}, {"id": "2604.09979", "category": "cond-mat", "title": "A Minimal Model of Representation Collapse: Frustration, Stop-Gradient, and Dynamics", "abstract": "Self-supervised representation learning is central to modern machine learning because it extracts structured latent features from unlabeled data and enables robust transfer across tasks and domains. However, it can suffer from representation collapse, a widely observed failure mode in which embeddings lose discriminative structure and distinct inputs become indistinguishable. To understand the mechanisms that drive collapse and the ingredients that prevent it, we introduce a minimal embedding-only model whose gradient-flow dynamics and fixed points can be analyzed in closed form, using a classification-representation setting as a concrete playground where collapse is directly quantified through the contraction of label-embedding geometry. We illustrate that the model does not collapse when the data are perfectly classifiable, while a small fraction of frustrated samples that cannot be classified consistently induces collapse through an additional slow time scale that follows the early performance gain. Within the same framework, we examine collapse prevention by adding a shared projection head and applying stop-gradient at the level of the training dynamics. We analyze the resulting fixed points and develop a dynamical mean-field style self-consistency description, showing that stop-gradient enables non-collapsed solutions and stabilizes finite class separation under frustration. We further verify empirically that the same qualitative dynamics and collapse-prevention effects appear in a linear teacher-student model, indicating that the minimal theory captures features that persist beyond the pure embedding setting.", "url": "https://arxiv.org/abs/2604.09979", "type": "理论+数值", "summary": "自监督表示学习是现代机器学习的核心，因为它从未标记的数据中提取结构化的潜在特征，并实现跨任务和领域的稳健传输。然而，它可能会遭受表示崩溃的影响，这是一种广泛观察到的故障模式，其中嵌入失去了区分性结构，并且不同的输入变得无法区分。为了理解驱动崩溃的机制以及防止崩溃的成分，我们引入了一个最小的仅嵌入模型，可以使用分类表示设置作为具体的游乐场，以封闭形式分析其梯度流动力学和固定点，其中通过标签嵌入几何的收缩直接量化崩溃。我们说明，当数据完全可分类时，模型不会崩溃，而一小部分无法一致分类的受挫样本会通过早期性能增益后的额外缓慢时间尺度导致崩溃。在同一框架内，我们通过添加共享投影头并在训练动态级别应用停止梯度来检查崩溃预防。\n\n我们分析了所得的不动点并开发了动态平均场风格的自洽描述，表明停止梯度能够实现非崩溃解决方案并在挫折下稳定有限类分离。我们进一步凭经验验证，线性师生模型中出现了相同的定性动态和防崩溃效应，这表明最小理论捕获了超出纯嵌入设置之外持续存在的特征。", "authors": [{"name": "Louie Hong Yao"}, {"name": "Yuhao Li"}, {"name": "Shengchao Liu"}], "featured_authors": [{"name": "Louie Hong Yao"}, {"name": "Yuhao Li"}, {"name": "Shengchao Liu"}], "author_count": 3}, {"id": "2604.10004", "category": "cond-mat", "title": "Universality and ambiguity in extremes of anomalous diffusion", "abstract": "Many biophysical processes begin when the fastest searcher finds a target out of many random searchers, which is called an extreme or fastest first passage time (fFPT). In some models, (i) the fFPT vanishes logarithmically as the number of searchers grows, and (ii) the fFPT can be faster for subdiffusive search compared to normal diffusion. Though mathematically rigorous, the relevance of (i) and (ii) to actual physical systems is suspect since their derivations involve searchers which move with unbounded speed. Indeed, we previously proved that the fFPT for searchers with bounded speed converges exponentially to a strictly positive minimal search time as the number of searchers grows. In this paper, we study fFPTs for a broad class of anomalous and normal diffusion models with bounded or unbounded speed. These models include scaled Brownian motion, Riemann-Liouville fractional Brownian motion, and fractional Brownian motion. For all of these models, we show that the fFPT decays logarithmically in the number of searchers and that subdiffusion can be faster than normal diffusion (we further show that superdiffusion can be slower than normal diffusion). In this sense, features (i) and (ii) are rather universal. On the other hand, we show that the parameter regimes in which (i) and (ii) are valid depend on the particulars of the individual model, and thus ambiguities remain in the relevance of these features to specific physical systems.", "url": "https://arxiv.org/abs/2604.10004", "type": "理论", "summary": "当最快的搜索者从许多随机搜索者中找到目标时，许多生物物理过程就开始了，这称为极端或最快首次通过时间（fFPT）。在某些模型中，(i) 随着搜索者数量的增长，fFPT 以对数方式消失；(ii) 与正常扩散相比，次扩散搜索的 fFPT 可能更快。尽管在数学上是严格的，但（i）和（ii）与实际物理系统的相关性值得怀疑，因为它们的推导涉及以无限速度移动的搜索者。事实上，我们之前已经证明，随着搜索者数量的增长，具有有限速度的搜索者的 fFPT 会呈指数收敛到严格正的最小搜索时间。在本文中，我们研究了具有有界或无界速度的一类广泛的异常和正常扩散模型的 fFPT。这些模型包括缩放布朗运动、黎曼-刘维尔分数布朗运动和分数布朗运动。对于所有这些模型，我们表明 fFPT 随搜索者数量呈对数衰减，并且子扩散可以比正常扩散更快（我们进一步表明超扩散可以比正常扩散慢）。\n\n从这个意义上说，特征（i）和（ii）是相当普遍的。另一方面，我们表明，（i）和（ii）有效的参数范围取决于单个模型的细节，因此这些特征与特定物理系统的相关性仍然存在模糊性。", "authors": [{"name": "Sean D Lawley"}], "featured_authors": [{"name": "Sean D Lawley"}], "author_count": 1}, {"id": "2604.10019", "category": "cond-mat", "title": "Exchange Frustration and Topological Magnetism in Electrostatically Doped SrRuO3", "abstract": "Magnetism in transition-metal systems emerges from exchange interactions that depend sensitively on carrier density. Yet leveraging this sensitivity to deliberately engineer exchange frustration and associated topological spin textures remains largely unexplored. Here, combining first-principles calculations with atomistic Monte Carlo simulations, we demonstrate that ferroelectric polarization enables electrostatic control of exchange frustration in the itinerant ferromagnet SrRuO3. We show that electrostatic hole doping renormalizes competing exchange interactions, driving SrRuO3 away from its bulk ferromagnetic ground state toward frustrated regimes, whereas electron doping largely preserves ferromagnetism. At BaTiO3/SrRuO3 interfaces, polarization-induced charge depletion modulates layer dependent exchange couplings, enhancing competition among J1, J2 and J3. The resulting exchange frustration stabilizes a sequence of magnetic phases as a function of thickness and applied magnetic field, including stripe and spiral states, topological meron and bimeron textures, and diverse skyrmionic objects. A minimal spin model identifies exchange frustration as the primary control parameter governing these crossovers, with magnetic anisotropy, Dzyaloshinskii-Moriya interaction, and external field selecting the emergent topology. Our results establish electrostatic doping as a route to engineer frustrated and topological magnetism in itinerant oxide metals.", "url": "https://arxiv.org/abs/2604.10019", "type": "理论+数值", "summary": "过渡金属系统中的磁性源于交换相互作用，而交换相互作用敏感地依赖于载流子密度。然而，利用这种敏感性来故意设计交换挫败和相关的拓扑自旋纹理仍然很大程度上尚未被探索。在这里，将第一原理计算与原子蒙特卡罗模拟相结合，我们证明铁电极化能够对流动铁磁体 SrRuO3 中的交换挫败进行静电控制。我们表明，静电空穴掺杂使竞争性交换相互作用重新正常化，使 SrRuO3 从其本体铁磁基态转向受挫状态，而电子掺杂在很大程度上保留了铁磁性。在 BaTiO3/SrRuO3 界面，极化引起的电荷耗尽调节层相关的交换耦合，增强 J1、J2 和 J3 之间的竞争。由此产生的交换挫败稳定了作为厚度和施加磁场的函数的一系列磁相，包括条纹和螺旋状态、拓扑梅隆和双梅隆纹理以及各种斯格明子物体。\n\n最小自旋模型将交换挫败确定为控制这些交叉的主要控制参数，其中包括磁各向异性、Dzyaloshinskii-Moriya 相互作用以及选择新兴拓扑的外部场。我们的研究结果表明，静电掺杂是设计流动氧化物金属中受挫磁性和拓扑磁性的一种途径。", "authors": [{"name": "Naafis Ahnaf Shahed"}, {"name": "Himanshu Mavani"}, {"name": "Zhonglin He"}, {"name": "Kai Huang"}, {"name": "Mohamed Elekhtiar"}, {"name": "Evgeny Y. Tsymbal"}], "featured_authors": [{"name": "Naafis Ahnaf Shahed"}, {"name": "Himanshu Mavani"}, {"name": "Zhonglin He"}, {"name": "Kai Huang"}, {"name": "Mohamed Elekhtiar"}, {"name": "Evgeny Y. Tsymbal"}], "author_count": 6}, {"id": "2604.10026", "category": "cond-mat", "title": "Strong Electron-Phonon Coupling and Multiband Superconductivity in Hexagonal BP3 Monolayer", "abstract": "We investigate the structural, electronic, and superconducting properties of a hexagonal BP3 monolayer using first-principles calculations combined with anisotropic Migdal-Eliashberg theory. The optimized structure exhibits a stable, slightly buckled configuration, as confirmed by phonon dispersion analysis and ab initio molecular dynamics simulations. The phonon spectrum indicates high-frequency vibrational modes associated with B-P bonding. Electronic band structure calculations reveal a multiband metallic state, with states near the Fermi level predominantly derived from pz orbitals of both boron and phosphorus atoms, forming two distinct Fermi surface sheets. The electron-phonon coupling is relatively strong, with a total coupling constant of lambda = 1.59, dominated by low- and intermediate-frequency phonon modes. Solving the anisotropic Migdal-Eliashberg equations yields a superconducting transition temperature of Tc = 9.7 K. The superconducting state is characterized by a nodeless but anisotropic gap structure, exhibiting two distinct gap values of approximately 2.25 and 1.74 meV associated with different Fermi surface sheets. These results identify the BP3 monolayer as a strongly coupled, multiband two-dimensional superconductor and provide insight into the role of orbital hybridization in electron-phonon-mediated superconductivity in low-dimensional systems.", "url": "https://arxiv.org/abs/2604.10026", "type": "理论+数值", "summary": "我们利用第一性原理计算结合各向异性 Migdal-Eliashberg 理论研究了六方 BP3 单层的结构、电子和超导特性。声子色散分析和从头算分子动力学模拟证实，优化的结构表现出稳定的、轻微弯曲的构型。声子谱表明与 B-P 键合相关的高频振动模式。电子能带结构计算揭示了多能带金属态，费米能级附近的态主要源自硼和磷原子的pz轨道，形成两个不同的费米表面片。电子声子耦合相对较强，总耦合常数为 lambda = 1.59，以低频和中频声子模式为主。求解各向异性 Migdal-Eliashberg 方程可得到 Tc = 9.7 K 的超导转变温度。超导状态的特征是无节点但各向异性的能隙结构，表现出与不同费米表面片相关的两个不同的能隙值，分别约为 2.25 和 1.74 meV。\n\n这些结果将 BP3 单层确定为强耦合、多带二维超导体，并深入了解轨道杂化在低维系统中电子声子介导的超导中的作用。", "authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}], "featured_authors": [{"name": "Jakkapat Seeyangnok"}, {"name": "Udomsilp Pinsook"}], "author_count": 2}, {"id": "2604.10043", "category": "cond-mat", "title": "Quantum geometry of the non-Hermitian skin effect", "abstract": "The non-Hermitian skin effect is nonreciprocity-induced localization phenomena in which a macroscopic number of eigenstates accumulate anomalously at the boundary, accompanied by the extreme sensitivity to boundary conditions. Here, we develop a geometric characterization of the non-Hermitian skin effect. We demonstrate that the localization length scale associated with the skin effect is encoded in the quantum metric defined solely from right eigenstates, but not in the biorthogonal quantum metric. Moreover, we show that the quantum metrics exhibit the power-law divergences at gapless points that depend on the different boundary conditions. We also reveal that cusps of the generalized Brillouin zone in non-Bloch band theory are signaled by discontinuities in the quantum metrics. We illustrate these behavior using prototypical non-Hermitian models, such as the Hatano-Nelson model and the non-Hermitian, nonreciprocal Su-Schrieffer-Heeger model.", "url": "https://arxiv.org/abs/2604.10043", "type": "理论", "summary": "非厄米集肤效应是非互易引起的局域化现象，其中宏观数量的本征态在边界处异常积累，并伴随着对边界条件的极端敏感性。在这里，我们开发了非厄米集肤效应的几何特征。我们证明，与趋肤效应相关的局域长度尺度是用仅由右本征态定义的量子度量编码的，而不是用双正交量子度量编码的。此外，我们表明量子度量在无间隙点处表现出幂律发散，这取决于不同的边界条件。我们还揭示了非布洛赫能带理论中广义布里渊区的尖点是由量子度量中的不连续性来表示的。我们使用典型的非厄米特模型（例如 Hatano-Nelson 模型和非厄米特非互易 Su-Schrieffer-Heeger 模型）来说明这些行为。", "authors": [{"name": "Ken-Ichiro Imura"}, {"name": "Kohei Kawabata"}], "featured_authors": [{"name": "Ken-Ichiro Imura"}, {"name": "Kohei Kawabata"}], "author_count": 2}, {"id": "2604.10046", "category": "cond-mat", "title": "Concise overview of methods to enhance the thermoelectric efficiency of SnTe", "abstract": "SnTe is a potential thermoelectric material in the mid temperature range. Detailed techniques to enhance the figure of merit by increasing the Power Factor, and reducing thermal conductivity, of SnTe-based TE materials are discussed. The key factors governing the figure of merit of a thermoelectric material are discussed to facilitate the optimization of the efficiency. Various techniques to synthesis bulk and nanostructured SnTe are presented. Efforts are made to reveal the optimization techniques for figure of merit of SnTe based materials through band structure engineering and reduction in thermal conductivity. Nano-structuring is one of the important approaches to decouple the interrelated material properties and reduce thermal conductivity. Band structure engineering is employed to enhance the Power Factor.", "url": "https://arxiv.org/abs/2604.10046", "type": "数值", "summary": "SnTe是一种潜在的中温热电材料。讨论了通过提高 SnTe 基 TE 材料的功率因数和降低热导率来提高品质因数的详细技术。讨论了控制热电材料品质因数的关键因素，以促进效率的优化。介绍了合成块状和纳米结构 SnTe 的各种技术。通过能带结构工程和降低热导率，努力揭示 SnTe 基材料品质因数的优化技术。纳米结构是解耦相互关联的材料特性并降低导热系数的重要方法之一。采用能带结构工程来提高功率因数。", "authors": [{"name": "Diptasikha Das"}, {"name": "Kartick Malik"}], "featured_authors": [{"name": "Diptasikha Das"}, {"name": "Kartick Malik"}], "author_count": 2}, {"id": "2604.10133", "category": "cond-mat", "title": "Hidden Universal Metal in Cuprate Superconductors", "abstract": "Nuclear relaxation is a powerful probe of temperature dependent electronic excitations in superconducting metals. Their emergence from a condensed state near the critical temperature, $T_\\mathrm{c}$, is of particular interest. In cuprate superconductors, the behavior is still not understood. Here, based on planar Cu and O relaxation data available in the literature, a simple phenomenology is developed. At its core is a universal metal, characterized by $1/{^{63}T}_{1\\perp} T_\\mathrm{c} \\approx 25$/Ks, found in all materials, i.e. $T_\\mathrm{c}$ is directly related to the Cu nuclear relaxation rate. Above $T_\\mathrm{c}$, as a function of temperature, this universal metal crosses over into a strange metal regime where relaxation increasingly lags behind that of the universal metal. The latter is also tied to the metallic planar O relaxation, which only deviates from it at lower energies in underdoped materials with a doping dependent, but temperature independent pseudogap described earlier. Planar O relaxation has the expected fixed anisotropy, but for Cu it is doping dependent and varies between about 3.6 for lower and 1 for high doping levels. It is this doping-related anisotropy that sets the maximum critical temperature of the family and in that sense is tied to the universal metal. This likely requires two components of relaxation. The new phenomenology will be discussed and should give a better foundation for the understanding of the phase diagram of the cuprates.", "url": "https://arxiv.org/abs/2604.10133", "type": "理论+数值", "summary": "核弛豫是超导金属中温度依赖性电子激发的有力探针。它们从临界温度 $T_\\mathrm{c}$ 附近的凝聚态中出现特别令人感兴趣。在铜酸盐超导体中，这种行为仍不清楚。在这里，基于文献中可用的平面铜和氧弛豫数据，开发了一种简单的现象学。其核心是一种通用金属，其特征为 $1/{^{63}T}_{1\\perp} T_\\mathrm{c} \\approx 25$/Ks，存在于所有材料中，即 $T_\\mathrm{c}$ 与 Cu 核弛豫率直接相关。在 $T_\\mathrm{c}$ 之上，作为温度的函数，这种通用金属会进入一种奇怪的金属状态，其中弛豫逐渐落后于通用金属。后者也与金属平面 O 弛豫有关，只有在具有先前描述的掺杂相关但与温度无关的赝能隙的欠掺杂材料中，金属平面 O 弛豫才在较低能量下偏离它。平面 O 弛豫具有预期的固定各向异性，但对于 Cu，它取决于掺杂，并且在较低掺杂水平的约 3.6 和高掺杂水平的 1 之间变化。\n\n正是这种与掺杂相关的各向异性设定了该族的最大临界温度，从这个意义上讲，它与通用金属有关。这可能需要两个放松部分。我们将讨论新的现象学，并为理解铜酸盐的相图提供更好的基础。", "authors": [{"name": "Abigail Lee"}, {"name": "Juergen Haase"}], "featured_authors": [{"name": "Abigail Lee"}, {"name": "Juergen Haase"}], "author_count": 2}, {"id": "2604.10157", "category": "cond-mat", "title": "Accelerated Dopant Screening in Oxide Semiconductors via Multi-Fidelity Contextual Bandits and a Three-Tier DFT Validation Funnel", "abstract": "Band gap engineering of oxide semiconductors through doping is critical for photocatalysis and optoelectronics, yet the combinatorial space of dopant elements, substitution sites, and co-doping combinations far exceeds typical density functional theory (DFT) budgets. We screen doped candidates across five oxide hosts (ZnO, TiO2, SrTiO3, SnO2, MgO), culminating in a 529-candidate ZnO co-doping campaign, and identify Cu-containing co-doped ZnO systems as consistently achieving visible-light-range band gaps (1.0-1.8 eV), with Y2Cu2 co-doped ZnO as the optimal candidate (1.84 eV). A three-tier validation funnel (PBE, PBE+U, ionic relaxation) reveals that no single level of theory suffices: V-doped ZnO shifts from near-metallic to wide-gap upon Hubbard U correction, while Cu-doped SrTiO3 enters the visible-light window only after correcting for d-electron localization. To make this screening tractable, we introduce a multi-fidelity screening strategy that replaces 81% of DFT evaluations with computationally inexpensive surrogate predictions, reducing a 529-candidate closed-loop Quantum ESPRESSO campaign from an estimated 440 to 62 CPU-hours while finding the global optimum in 100% of 50 independent trials (p = 5.0e-8 versus random screening, Wilcoxon signed-rank). Cross-host analysis of the dopant-host interaction matrix reveals that dopant performance is governed by just two latent chemical dimensions, enabling prediction of rankings in unseen hosts. All 583 DFT calculations, screening code, and stability proofs are released as an open benchmark.", "url": "https://arxiv.org/abs/2604.10157", "type": "理论+数值", "summary": "通过掺杂对氧化物半导体进行带隙工程对于光催化和光电子学至关重要，但掺杂元素、取代位点和共掺杂组合的组合空间远远超出了典型的密度泛函理论（DFT）预算。我们筛选了五种氧化物主体（ZnO、TiO2、SrTiO3、SnO2、MgO）的掺杂候选物，最终形成了 529 个候选 ZnO 共掺杂活动，并确定含 Cu 共掺杂 ZnO 系统始终实现可见光范围带隙（1.0-1.8 eV），其中 Y2Cu2 共掺杂 ZnO 为最佳候选物（1.84 eV）。三层验证漏斗（PBE、PBE+U、离子弛豫）表明，单一水平的理论是不够的：V 掺杂的 ZnO 在 Hubbard U 校正后从近金属转变为宽能隙，而 Cu 掺杂的 SrTiO3 仅在校正 d 电子局域化后才进入可见光窗口。\n\n为了使这种筛选易于处理，我们引入了一种多保真筛选策略，用计算成本低廉的替代预测取代了 81% 的 DFT 评估，将 529 个候选闭环 Quantum ESPRESSO 活动从估计的 440 个 CPU 小时减少到 62 个 CPU 小时，同时在 50 个独立试验中 100% 找到全局最优值（p = 5.0e-8 与随机筛选，Wilcoxon 符号秩）。掺杂剂-主体相互作用矩阵的跨主体分析表明，掺杂剂性能仅由两个潜在化学维度控制，从而能够预测看不见的主体中的排名。所有 583 个 DFT 计算、筛选代码和稳定性证明均作为开放基准发布。", "authors": [{"name": "Abhinaba Basu"}], "featured_authors": [{"name": "Abhinaba Basu"}], "author_count": 1}, {"id": "2604.10168", "category": "cond-mat", "title": "Spectral Signatures of Active Fluctuations in Semiflexible Polymers", "abstract": "We study how an active bath is transduced into the internal fluctuation spectrum of a semiflexible polymer. Starting from the statistics of active forces exerted by an explicit bath of active Brownian particles, we derive an effective description in terms of temporally persistent and spatially correlated noise, and test it against simulations of both explicit-bath and implicit-noise models. We find that activity reorganizes polymer fluctuations spectrally rather than uniformly: increasing the active force predominantly enhances the lowest modes, while increasing persistence shifts the spectral weight toward progressively longer wavelengths. The theory captures this mode-level reorganization well and explains the strong qualitative correspondence between explicit and implicit active baths over a broad parameter range. In contrast, global size measures such as the radius of gyration are systematically underestimated, which we trace to activity-induced bond stretching and contour-length renormalization absent from the present fixed-contour theory. Our results show that a semiflexible polymer acts as a multiscale probe of active matter, resolving the temporal and spatial structure of nonequilibrium forcing through its mode spectrum.", "url": "https://arxiv.org/abs/2604.10168", "type": "理论+数值", "summary": "我们研究活性浴如何转换为半柔性聚合物的内部涨落谱。从活性布朗粒子显式浴所施加的主动力的统计数据出发，我们得出了时间持续性和空间相关噪声的有效描述，并针对显式浴和隐式噪声模型的模拟对其进行了测试。我们发现活性会重组聚合物的光谱波动，而不是均匀地重组：增加活性力主要增强最低模式，而增加持久性则使光谱权重逐渐向更长的波长移动。该理论很好地捕捉了这种模式级重组，并解释了在广泛的参数范围内显式和隐式活性浴之间的强定性对应关系。相比之下，诸如回转半径之类的全局尺寸测量被系统性地低估，我们将其追溯到当前固定轮廓理论中不存在的活动引起的键拉伸和轮廓长度重整化。\n\n我们的结果表明，半柔性聚合物充当活性物质的多尺度探针，通过其模式谱解析非平衡强迫的时间和空间结构。", "authors": [{"name": "Love Grover"}, {"name": "Anil Kumar Dasanna"}, {"name": "Abhishek Chaudhuri"}], "featured_authors": [{"name": "Love Grover"}, {"name": "Anil Kumar Dasanna"}, {"name": "Abhishek Chaudhuri"}], "author_count": 3}, {"id": "2604.10184", "category": "cond-mat", "title": "Brittle-to-ductile fracturing transition: A chemo-mechanical phase-field framework", "abstract": "In chemically reactive environments, the mechanical integrity of geomaterials is fundamentally compromised by solid matrix dissolution. In this study, we propose a fully coupled chemo-mechanical phase-field framework to capture the dynamic interplay between mineral dissolution and fracture propagation. A key feature of the proposed model is the dynamic coupling of local mass removal to the fracture length scale, while also incorporating the damage-accelerated reaction-diffusion processes. Our results capture the development of an enlarged fracture process zone driven by chemical mass removal. This chemically induced widening blunts the sharp crack tip, alleviating the near-tip stress concentrations and causing a pronounced degradation in material stiffness before failure. Furthermore, we reveal a distinct ductilization effect, characterized by a more gradual accumulation of damage and a delayed onset of macroscopic failure. We show that the transition between brittle and ductile failure modes is dictated by the competing timescales of chemical degradation and mechanical deformation. Highly acidic environments enhance matrix dissolution and promote ductile fracture, whereas rapid mechanical loading limits chemical interaction and preserves brittle failure mode.", "url": "https://arxiv.org/abs/2604.10184", "type": "理论", "summary": "在化学反应环境中，岩土材料的机械完整性从根本上受到固体基质溶解的损害。在这项研究中，我们提出了一个完全耦合的化学机械相场框架来捕获矿物溶解和裂缝扩展之间的动态相互作用。该模型的一个关键特征是局部质量去除与裂缝长度尺度的动态耦合，同时还结合了损伤加速反应扩散过程。我们的结果捕捉到了由化学质量去除驱动的扩大断裂过程区的发展。这种化学诱导的加宽使尖锐的裂纹尖端变钝，减轻了尖端附近的应力集中，并导致材料在失效前的刚度显着下降。此外，我们揭示了明显的延展效应，其特征是损伤的逐渐积累和宏观失效的延迟发生。我们表明，脆性和延性失效模式之间的转变是由化学降解和机械变形的竞争时间尺度决定的。\n\n高酸性环境增强基体溶解并促进韧性断裂，而快速机械加载限制化学相互作用并保留脆性破坏模式。", "authors": [{"name": "Fanyu Wu"}, {"name": "Chong Liu"}, {"name": "Manolis Veveakis"}, {"name": "Manman Hu"}], "featured_authors": [{"name": "Fanyu Wu"}, {"name": "Chong Liu"}, {"name": "Manolis Veveakis"}, {"name": "Manman Hu"}], "author_count": 4}, {"id": "2604.10190", "category": "cond-mat", "title": "Local topological markers for Chern insulators in ribbon geometry", "abstract": "Local topological markers are used to characterize Chern insulators in the presence of spatial inhomogeneities, such as boundaries and disorder. In this paper, we study the local Chern marker in systems with partial translational symmetry. We express the local Chern marker in the hybrid position-momentum basis for both open and periodic boundary conditions. We calculate the local Chern marker for a Haldane model ribbon. We show that the behavior at the two boundaries is qualitatively different from fully open geometries. We further compare the local Chern marker with the local Středa marker and show agreement in the bulk and small deviations at the boundaries that diminish with increasing system size. The correspondence between the two markers remains good if disorder is introduced, provided its magnitude remains below large values that cause substantial change of the Chern number due to Anderson physics. Finally, by exploiting the numerical efficiency due to partial translational symmetry, we study equilibrium critical behavior and the Kibble-Zurek mechanism in a weakly disordered Qi-Wu-Zhang Chern insulator. We extract relevant scaling exponents from the local Chern marker configuration and show that they converge to the analytically predicted values with increasing system size.", "url": "https://arxiv.org/abs/2604.10190", "type": "理论+数值", "summary": "局部拓扑标记用于在存在空间不均匀性（例如边界和无序）的情况下表征陈绝缘体。在本文中，我们研究了具有部分平移对称性的系统中的局部陈标记。我们在开放边界条件和周期性边界条件的混合位置动量基础上表达局部陈标记。我们计算 Haldane 模型带的局部 Chern 标记。我们表明，两个边界处的行为与完全开放的几何结构有本质上的不同。我们进一步将局部 Chern 标记与局部 Středa 标记进行比较，结果显示边界处的整体偏差和小偏差一致，这些偏差随着系统尺寸的增加而减小。如果引入无序，则两个标记之间的对应关系仍然良好，只要其大小保持低于由于安德森物理学而导致陈省身数发生实质性变化的大值。最后，通过利用部分平移对称性带来的数值效率，我们研究了弱无序 Qi-Wu-Zhang Chern 绝缘体中的平衡临界行为和 Kibble-Zurek 机制。\n\n我们从局部 Chern 标记配置中提取相关的缩放指数，并表明它们随着系统规模的增加而收敛到分析预测值。", "authors": [{"name": "Maks Repše"}, {"name": "Tomaž Rejec"}, {"name": "Jernej Mravlje"}], "featured_authors": [{"name": "Maks Repše"}, {"name": "Tomaž Rejec"}, {"name": "Jernej Mravlje"}], "author_count": 3}, {"id": "2604.10211", "category": "cond-mat", "title": "Concentration regimes in salt-free aqueous xanthan solutions under shear", "abstract": "Concentration regimes in polymer and polyelectrolyte solutions can be identified by scaling laws for the relation between specific zero-shear viscosity and concentration. Recently, we have shown that the same is true for the infinite-shear viscosity plateau. The shear-thinning range is usually accessed by focusing on the viscosity functions for the respective concentration regime. For salt-free aqueous xanthan solutions, we find power-law dependencies of the specific viscosity on concentration throughout the entire shear-rate range. We distinguish six different concentration regimes. Apart from those already known for the zero-shear viscosity of polyelectrolyte solutions, i.e. dilute, semidilute unentangled, semidilute entangled and neutral semidilute entangled, we identify a linear regime for low shear rates at high concentrations, where the solution gels and a regime at both, higher concentrations and higher shear rates. Within some regimes, the power-law exponents change smoothly with shear rate, particularly, when deviating from the zero-shear viscosity plateau before the power-law of the viscosity function. Some regimes merge as their power-law exponents approach each other. The fact that the regimes extend smoothly from the zero-shear regime into finite shear rates, i.e. away from thermodynamic equilibrium, shows that indicators such as critical concentrations remain valid at finite shear rates. This motivates us to interpret the data in the light of existing scaling laws and current knowledge about shear-rate dependent interaction mechanisms in polyelectrolyte solutions, particularly in xanthan solutions. It allows to follow the shift of relevant interaction mechanisms with shear rate. We think that the consideration of scaling laws under shear can be particularly helpful for identifying, for instance, thresholds for shear-induced disentanglement or disaggregation.", "url": "https://arxiv.org/abs/2604.10211", "type": "理论", "summary": "聚合物和聚电解质溶液中的浓度范围可以通过比零剪切粘度和浓度之间关系的比例定律来确定。最近，我们证明无限剪切粘度平台也是如此。剪切稀化范围通常通过关注相应浓度范围的粘度函数来获得。对于无盐黄原胶水溶液，我们发现在整个剪切速率范围内比粘度对浓度的幂律依赖性。我们区分了六种不同的浓度方案。除了那些已知的聚电解质溶液的零剪切粘度，即稀、半稀非缠结、半稀缠结和中性半稀缠结之外，我们还确定了高浓度下低剪切速率的线性状态（其中溶液胶凝）以及较高浓度和较高剪切速率下的线性状态。在某些范围内，幂律指数随剪切速率平滑变化，特别是当偏离粘度函数幂律之前的零剪切粘度平台时。一些政权随着幂律指数相互接近而合并。\n\n该状态从零剪切状态平稳延伸到有限剪切速率（即远离热力学平衡）的事实表明，临界浓度等指标在有限剪切速率下仍然有效。这促使我们根据现有的比例定律和有关聚电解质溶液（特别是黄原胶溶液）中剪切速率依赖性相互作用机制的现有知识来解释数据。它允许跟踪相关相互作用机制随剪切速率的变化。我们认为，考虑剪切下的缩放定律对于确定例如剪切引起的解缠结或解聚的阈值特别有帮助。", "authors": [{"name": "Ammar El Menayyir"}, {"name": "Markus Neuner"}, {"name": "Polina Fuks"}, {"name": "Vahid A. Z. Alashloo"}, {"name": "Halim Altuntas"}, {"name": "Zehau Luo"}, {"name": "Melike Özgül"}, {"name": "Claudia Seeberger"}, {"name": "Sharadwata Pan"}, {"name": "Andreas Wierschem"}], "featured_authors": [{"name": "Ammar El Menayyir"}, {"name": "Markus Neuner"}, {"name": "Polina Fuks"}, {"name": "Claudia Seeberger"}, {"name": "Sharadwata Pan"}, {"name": "Andreas Wierschem"}], "author_count": 10}, {"id": "2604.10216", "category": "cond-mat", "title": "Spectral Softening and the Structural Breakdown of Thermodynamic Equilibrium", "abstract": "Under sufficiently slow driving, thermodynamics predicts reversible evolution through a sequence of equilibrium states. We show that this expectation fails near spectral degeneracy in driven quadratic Hamiltonian systems. As the soft-mode frequency collapses, the intrinsic dynamical timescale diverges and quadratic confinement is lost, leading to a breakdown of timescale separation and the failure of adiabatic following even under arbitrarily slow driving. More precisely, adiabaticity is lost once the soft-mode frequency falls below a finite, drive-dependent threshold, implying that the breakdown extends over a finite regime rather than being confined to a singular limit. Crucially, this dynamical instability is accompanied by a divergence of the canonical partition function, rendering equilibrium ensembles ill-defined and eliminating the foundation of quasistatic thermodynamic processes. This breakdown does not arise from unbounded Hamiltonians or critical slowing down, but emerges structurally from spectral softening within a bounded quadratic system. Analysis of the Wigner phase-space representation, together with its classical counterpart, reveals the same singular structure, demonstrating that this limitation is not uniquely quantum but originates from the underlying Hamiltonian phase-space geometry. These results show that thermodynamic reversibility is fundamentally constrained, as a direct consequence of the breakdown of equilibrium, whenever spectral softening removes an intrinsic frequency scale.", "url": "https://arxiv.org/abs/2604.10216", "type": "理论", "summary": "在足够慢的驱动下，热力学预测通过一系列平衡状态的可逆演化。我们证明这种期望在驱动二次哈密顿系统中接近谱简并时失败。随着软模式频率崩溃，固有的动态时标发散并且二次约束消失，导致时标分离的破坏以及即使在任意慢速驱动下绝热跟随的失败。更准确地说，一旦软模式频率低于驱动相关的有限阈值，绝热性就会消失，这意味着击穿会在有限范围内延伸，而不是局限于单一极限。至关重要的是，这种动态不稳定性伴随着正则配分函数的发散，导致平衡系综的定义不明确，并消除了准静态热力学过程的基础。这种崩溃并不是由无界哈密顿量或临界减速引起的，而是在结构上由有界二次系统内的谱软化引起的。\n\n对维格纳相空间表示及其经典对应物的分析揭示了相同的奇异结构，表明这种限制不是唯一的量子限制，而是源于底层的哈密顿相空间几何。这些结果表明，只要光谱软化消除了固有频率尺度，热力学可逆性就会从根本上受到限制，这是平衡破坏的直接结果。", "authors": [{"name": "Ilki Kim"}], "featured_authors": [{"name": "Ilki Kim"}], "author_count": 1}, {"id": "2604.10230", "category": "cond-mat", "title": "A Scalable Configuration-Interaction Impurity Solver via Active Learning", "abstract": "Finite-Hamiltonian impurity solvers provide direct real-frequency spectra and a natural route to enlarged impurity Hamiltonians, but their applicability is limited by the rapid Hilbert-space growth with the number of bath or other added one-particle orbitals. We introduce an active-learning extension of adaptive-truncation configuration interaction (AL-ATCI) that identifies the determinant manifold relevant to the correlated state. The approximation is systematically controlled by the query size N_query, which also provides an internal convergence parameter when no external benchmark is available. Over the benchmark range studied here, the computational cost grows only weakly with bath size, because enlarging the bath mainly expands the combinatorial determinant space rather than the physically relevant manifold. In dynamical mean-field-theory benchmarks for the one-dimensional Hubbard model, AL-ATCI reproduces exact-diagonalization accuracy and extends cellular calculations to clusters as large as N_c = 10. For a three-orbital rotationally invariant Sr2RuO4 impurity problem, we demonstrate systematic convergence of dynamical quantities and a highly compressed configuration space as N_b is increased from 9 to 18. These results substantially alleviate the bath-discretization bottleneck of exact-diagonalization- and configuration-interaction-based impurity solvers and make large-bath and enlarged-orbital calculations more practical.", "url": "https://arxiv.org/abs/2604.10230", "type": "理论+数值", "summary": "有限哈密尔顿杂质求解器提供了直接的实频谱和扩大杂质哈密顿量的自然途径，但它们的适用性受到希尔伯特空间随浴或其他添加的单粒子轨道数量的快速增长的限制。我们引入了自适应截断配置交互（AL-ATCI）的主动学习扩展，它可以识别与相关状态相关的行列式流形。该近似值由查询大小 N_query 系统地控制，当没有外部基准可用时，它还提供内部收敛参数。在此处研究的基准范围内，计算成本仅随着浴尺寸的增长而微弱，因为扩大浴主要扩大组合行列式空间，而不是物理相关的流形。在一维 Hubbard 模型的动态平均场理论基准中，AL-ATCI 再现了精确的对角化精度，并将细胞计算扩展到 N_c = 10 大的簇。\n\n对于三轨道旋转不变的 Sr2RuO4 杂质问题，我们证明了当 N_b 从 9 增加到 18 时，动力学量的系统收敛和高度压缩的构型空间。这些结果大大缓解了基于精确对角化和构型相互作用的杂质求解器的浴离散化瓶颈，并使大浴和扩大轨道计算更加实用。", "authors": [{"name": "Jeongmoo Lee"}, {"name": "Ara Go"}], "featured_authors": [{"name": "Jeongmoo Lee"}, {"name": "Ara Go"}], "author_count": 2}, {"id": "2604.10231", "category": "cond-mat", "title": "Quantifying chirality of phonons", "abstract": "Recent years have witnessed growing interest in chiral phonons, lattice vibrations carrying angular momentum and exhibiting handedness, as revealed by helicity-dependent optical phenomena. Despite this progress, a quantitative characterization of phonon chirality as a dynamical property has remained elusive. In this work, we propose a theoretical framework to quantify the dynamical chirality of lattice vibrations. We introduce two quantitative measures: momentum-resolved dynamical chirality, which provides a mode- and wave-vector-resolved picture of phonon chirality, and the bulk dynamical chirality, which characterizes the collective behavior of thermally populated chiral phonons. Using first-principles calculations for both chiral and achiral materials, we demonstrate how these quantities capture the handedness and population imbalance of phonon modes and serve as a means to distinguish the enantiomers of chiral crystals.", "url": "https://arxiv.org/abs/2604.10231", "type": "数值", "summary": "近年来，人们对手性声子、带有角动量的晶格振动和表现出旋性的兴趣日益浓厚，正如螺旋性相关的光学现象所揭示的那样。尽管取得了这些进展，声子手性作为动力学性质的定量表征仍然难以捉摸。在这项工作中，我们提出了一个量化晶格振动的动态手性的理论框架。我们引入了两种定量测量：动量分辨的动态手性，它提供了声子手性的模式和波矢量解析图像；以及体动态手性，它表征了热填充手性声子的集体行为。使用手性和非手性材料的第一性原理计算，我们演示了这些量如何捕获声子模式的手性和布居不平衡性，并作为区分手性晶体对映体的手段。", "authors": [{"name": "Yu-Chi Huang"}, {"name": "Gakuto Kusuno"}, {"name": "Yusuke Hashimoto"}, {"name": "Dominik Maximilian Juraschek"}, {"name": "Hiroaki Kusunose"}, {"name": "Takuya Satoh"}], "featured_authors": [{"name": "Yu-Chi Huang"}, {"name": "Gakuto Kusuno"}, {"name": "Yusuke Hashimoto"}, {"name": "Dominik Maximilian Juraschek"}, {"name": "Hiroaki Kusunose"}, {"name": "Takuya Satoh"}], "author_count": 6}, {"id": "2604.10254", "category": "cond-mat", "title": "Algorithmic overlaps as thermodynamic variables: from local to cluster Monte Carlo dynamics in critical phenomena", "abstract": "We investigate the spatial overlap of successive spin configurations in Markov chain Monte Carlo simulations using the local Metropolis algorithm and the Swendsen-Wang and Wolff cluster algorithms. We examine the dynamics of these algorithms for two models in different universality classes: the Ising model and the Potts model with three components. The overlap of two successive Wolff clusters reflects critical behavior and can be used as an order parameter for the algorithm's dynamics. In the case of the Swendsen-Wang algorithm, similar behavior is demonstrated by the variation in the overlap of two consecutive lattice configurations, which behaves like order parameter. Nothing similar is observed for the Metropolis algorithm, and the dynamics in the critical region are determined by the spin flip frequency, which is equivalent to the acceptance rate. Thus, the critical behavior of Wolff cluster overlap and the variation of configuration overlap in the Swendsen-Wang algorithm are naturally related to the critical behavior of geometric objects - Fortuin-Kastelein clusters. Interestingly, in all cases, the geometric quantity - configuration overlap or its variation - reflects the thermodynamics of the phase transition.", "url": "https://arxiv.org/abs/2604.10254", "type": "理论+数值", "summary": "我们使用局部 Metropolis 算法以及 Swendsen-Wang 和 Wolff 聚类算法研究马尔可夫链蒙特卡罗模拟中连续自旋构型的空间重叠。我们研究了不同通用性类别中两个模型的这些算法的动力学：伊辛模型和具有三个组件的 Potts 模型。两个连续 Wolff 簇的重叠反映了关键行为，可以用作算法动态的阶参数。在 Swendsen-Wang 算法的情况下，两个连续晶格配置的重叠变化证明了类似的行为，其行为类似于顺序参数。 Metropolis 算法没有观察到类似的情况，临界区域的动态由自旋翻转频率决定，相当于接受率。因此，Swendsen-Wang算法中Wolff簇重叠的临界行为和构型重叠的变化自然地与几何对象——Fortuin-Kastelein簇的临界行为相关。\n\n有趣的是，在所有情况下，几何量（构型重叠或其变化）反映了相变的热力学。", "authors": [{"name": "Ian Pilé"}, {"name": "Youjin Deng"}, {"name": "Lev Shchur"}], "featured_authors": [{"name": "Ian Pilé"}, {"name": "Youjin Deng"}, {"name": "Lev Shchur"}], "author_count": 3}, {"id": "2604.10309", "category": "cond-mat", "title": "Emergent Topological Universality and Marginal Replica Symmetry Breaking in Gauge-Correlated Spin Glasses", "abstract": "Recent tensor-network samplings of modified Nishimori spin glasses have revealed robust finite-temperature critical transitions in two dimensions, defying the standard Edwards-Anderson lower critical dimension boundary ($d_{l}\\approx2.5$). We present a theoretical framework demonstrating that the discrete $Z_{2}$ gauge constraints utilized to bypass Monte Carlo kinetic traps fundamentally alter the system's universality class. By mapping the algorithmic disorder distribution to the 2D Ising Conformal Field Theory (CFT), we prove the emergent spatial variance generates a fractional momentum operator that drives the dynamic upper critical dimension to zero ($d_{u}\\rightarrow0$). This marginal topology dynamically suppresses the replica-coupling vertices, yielding an infinite-order Berezinskii-Kosterlitz-Thouless (BKT) transition and a non-integrable replicon divergence that predicts a massive instability toward 1-step Replica Symmetry Breaking (1-RSB). Leveraging a spectral Corner Transfer Matrix Renormalization Group (CTMRG) architecture up to macroscopic scales ($L=1024$), we quantitatively validate the topological scaling argument $\\mathcal{G}((T-T_{c})\\ln(L/L_{0}))$. By isolating the continuum field theory from microscopic lattice artifacts, we recover the fundamental lattice metric $L_{0}\\approx 0.94$, unequivocally confirming the existence of a distinct, topologically driven spin-glass phase.", "url": "https://arxiv.org/abs/2604.10309", "type": "理论+数值", "summary": "最近对改进的西森自旋玻璃进行的张量网络采样揭示了二维中稳健的有限温度临界转变，违反了标准的爱德华兹-安德森较低临界尺寸边界（$d_{l}\\approx2.5$）。我们提出了一个理论框架，证明用于绕过蒙特卡罗动力学陷阱的离散 $Z_{2}$ 规范约束从根本上改变了系统的通用性类别。通过将算法无序分布映射到二维伊辛共形场论 (CFT)，我们证明了新出现的空间方差会生成分数动量算子，该算子将动态上临界尺寸驱动至零 ($d_{u}\\rightarrow0$)。这种边缘拓扑动态抑制复制耦合顶点，产生无限阶 Berezinskii-Kosterlitz-Thouless (BKT) 转变和不可积复制子发散，预测 1 步复制对称破缺 (1-RSB) 的巨大不稳定性。利用光谱角转移矩阵重整化群（CTMRG）架构达到宏观尺度（$L=1024$），我们定量验证了拓扑缩放参数$\\mathcal{G}((T-T_{c})\\ln(L/L_{0}))$。\n\n通过将连续介质场理论与微观晶格伪影分离，我们恢复了基本晶格度量$L_{0}\\约0.94$，明确证实了独特的、拓扑驱动的自旋玻璃相的存在。", "authors": [{"name": "Alok Yadav"}], "featured_authors": [{"name": "Alok Yadav"}], "author_count": 1}, {"id": "2604.10468", "category": "cond-mat", "title": "Dynamical Facilitation in Active Glass Formers: Role of Morphology and Persistence", "abstract": "Understanding dynamical facilitation in nonequilibrium glass-forming systems driven by active forces remains an open challenge. In particular, it is unclear whether facilitation survives in active glasses, where persistent self-propulsion breaks detailed balance and introduces directional memory. Here, we use large-scale simulations of a two-dimensional athermal Ornstein-Uhlenbeck particle model to investigate how persistent active forcing modifies cooperative relaxation. We analyze the morphology of cooperatively rearranging regions (CRRs) and the spatial transport of mobility excitations. A spatially resolved core-shell decomposition reveals distinct responses of the core and shell to activity: the core undergoes global morphological changes while retaining internal plasticity, whereas the shell acts as a rigid scaffold that supports primarily axial deformation and facilitates transport. Dynamical observables, including modal displacement, shell occupation probability, and facilitation length, exhibit a pronounced non-monotonic dependence on persistence time. This behavior reflects the competition between persistence and effective noise, leading to either coherent or trapping-dominated dynamics at large persistence, depending on temperature. Despite significant morphological changes, the facilitation length shows an approximate scaling collapse when rescaled by the persistence length, $l_p=\\sqrt{T_{\\mathrm{eff}}\\tau_p}$. This is consistent with a diffusive-like time-length coupling, $\\xi_{\\mathrm{fac}} \\sim \\tau_{\\alpha}^{1/2}$, indicating that activity reshapes facilitation pathways without altering their large-scale transport character. Our results support a generalized facilitation framework for active glass formers.", "url": "https://arxiv.org/abs/2604.10468", "type": "理论+数值", "summary": "了解主动力驱动的非平衡玻璃形成系统中的动态促进仍然是一个开放的挑战。特别是，目前还不清楚主动眼镜中是否存在促进作用，因为持续的自我推进打破了细节平衡并引入了方向记忆。在这里，我们使用二维非热 Ornstein-Uhlenbeck 粒子模型的大规模模拟来研究持续主动强迫如何改变协同弛豫。我们分析了协作重排区域（CRR）的形态和迁移率激发的空间传输。空间分辨的核-壳分解揭示了核和壳对活动的不同反应：核经历整体形态变化，同时保留内部可塑性，而壳充当刚性支架，主要支持轴向变形并促进运输。动力学可观测量，包括模态位移、壳占据概率和促进长度，表现出对持续时间的明显非单调依赖性。\n\n这种行为反映了持久性和有效噪声之间的竞争，导致在大持久性下出现相干或捕获主导的动力学，具体取决于温度。尽管形态发生了显着的变化，但当按持久长度 $l_p=\\sqrt{T_{\\mathrm{eff}}\\tau_p}$ 重新缩放时，促进长度显示出近似的缩放崩溃。这与类似扩散的时间长度耦合 $\\xi_{\\mathrm{fac}} \\sim \\tau_{\\alpha}^{1/2}$ 一致，表明活动重塑促进路径而不改变其大规模运输特征。我们的结果支持活性玻璃形成体的通用促进框架。", "authors": [{"name": "Dipanwita Ghoshal"}], "featured_authors": [{"name": "Dipanwita Ghoshal"}], "author_count": 1}, {"id": "2604.10483", "category": "cond-mat", "title": "Topological Magnon-Phonon Hybrid Bands in Ferromagnetic Skyrmion Crystals", "abstract": "We investigate magnon-phonon (MP) excitations in a Neel-type two-dimensional ferromagnetic skyrmion crystal (SkX) stabilized on a triangular spin lattice by Dzyaloshinskii-Moriya interaction (DMI). Although the lowest two magnon bands of the bare SkX are topologically trivial, we show that coupling to lattice vibrations reconstructs the low-energy sector and generates topological MP hybrid bands. Starting from a spin-lattice Hamiltonian in which phonons couple to magnons through fluctuations of the DMI vectors, we derive the bosonic Hamiltonian for the SkX and compute the hybrid band structure by Bogoliubov diagonalization. MP coupling opens gaps at low-energy magnon-phonon crossings, lifts phonon degeneracies associated with supercell folding, and yields nontrivial Chern numbers for the lowest hybrid bands. The resulting low-energy topology and associated edge states remain robust under magnetic-field variation, while higher-energy hybrid bands can undergo field-driven topological phase transitions. These results extend topological magnon-phonon hybridization to noncoplanar SkXs.", "url": "https://arxiv.org/abs/2604.10483", "type": "理论", "summary": "我们研究了通过 Dzyaloshinskii-Moriya 相互作用 (DMI) 稳定在三角形自旋晶格上的尼尔型二维铁磁斯格明子晶体 (SkX) 中的磁子-声子 (MP) 激发。尽管裸 SkX 的最低两个磁振子带在拓扑上微不足道，但我们表明与晶格振动的耦合重建了低能扇区并生成拓扑 MP 混合带。从自旋晶格哈密顿量开始，其中声子通过 DMI 矢量的波动耦合到磁振子，我们推导了 SkX 的玻色哈密顿量，并通过 Bogoliubov 对角化计算混合能带结构。 MP 耦合在低能磁振子-声子交叉处打开间隙，提升与超胞折叠相关的声子简并性，并为最低混合带产生不平凡的陈数。由此产生的低能量拓扑和相关边缘态在磁场变化下保持鲁棒性，而高能量混合带可以经历场驱动的拓扑相变。这些结果将拓扑磁振子-声子杂化扩展到非共面 SkX。", "authors": [{"name": "Doried Ghader"}, {"name": "Bilal Jabakhanji"}], "featured_authors": [{"name": "Doried Ghader"}, {"name": "Bilal Jabakhanji"}], "author_count": 2}, {"id": "2604.10489", "category": "cond-mat", "title": "The effect of grain boundaries on magnetic exchange interactions in iron", "abstract": "This work investigates how grain boundaries (GBs) modify magnetic exchange interactions in bcc iron, with particular focus on the effect of phosphorus segregation. Using density-functional theory combined with the Liechtenstein-Katsnelson-Antropov-Gubanov Green's-function approach, we calculate Heisenberg exchange parameters for three symmetric tilt GBs, $\\Sigma5(310)$, $\\Sigma13(510)$, and $\\Sigma13(320)$, and use these parameters in Monte Carlo simulations to evaluate finite-temperature magnetic behavior. All clean GBs exhibit strong local deviations from bulk exchange interactions, including antiferromagnetic coupling across the boundary plane. These negative exchange interactions are not governed by interatomic distance alone, but arise primarily from the altered local coordination and symmetry breaking at the GB. Phosphorus segregation, modeled in both substitutional and interstitial configurations at the $\\Sigma5(310)$ GB, suppresses the antiferromagnetic couplings and significantly redistributes the local exchange landscape through chemical and electronic effects. Monte Carlo results show that, despite pronounced local perturbations, realistic GB densities cause only a small reduction in the Curie temperature because bulk-like regions dominate the global magnetic transition. A substantial decrease in Curie temperature appears only when the GB volume fraction is artificially increased. The results demonstrate that GBs strongly influence local magnetic interactions while having a limited effect on global magnetic ordering, and they establish a general framework for linking atomistic interfacial structure and chemistry to mesoscale magnetic behavior in Fe-based materials.", "url": "https://arxiv.org/abs/2604.10489", "type": "理论+数值", "summary": "这项工作研究了晶界 (GB) 如何改变 bcc 铁中的磁交换相互作用，特别关注磷偏析的影响。使用密度泛函理论结合列支敦士登-Katsnelson-Antropov-Gubanov Green函数方法，我们计算了三个对称倾斜GB $\\Sigma5(310)$、$\\Sigma13(510)$和$\\Sigma13(320)$的海森堡交换参数，并在蒙特卡罗模拟中使用这些参数来评估有限温度磁行为。所有干净的GB都表现出与整体交换相互作用的强烈局部偏差，包括跨边界平面的反铁磁耦合。这些负交换相互作用不仅仅由原子间距离决定，而主要是由于晶界局部配位的改变和对称性破缺引起的。在 $\\Sigma5(310)$ GB 中以替代构型和间隙构型建模的磷偏析抑制了反铁磁耦合，并通过化学和电子效应显着重新分配局部交换景观。\n\n蒙特卡罗结果表明，尽管存在明显的局部扰动，但实际的晶界密度仅导致居里温度小幅降低，因为块状区域主导了全局磁转变。仅当人为增加GB体积分数时，居里温度才会出现大幅降低。结果表明，GB 强烈影响局部磁相互作用，而对全局磁有序的影响有限，并且它们建立了一个将原子界面结构和化学与铁基材料中的介观磁性行为联系起来的通用框架。", "authors": [{"name": "Martin Zelený"}, {"name": "Martin Heczko"}, {"name": "Petr Šesták"}, {"name": "Denis Ledue"}, {"name": "Renaud Patte"}, {"name": "Miroslav Černý"}], "featured_authors": [{"name": "Martin Zelený"}, {"name": "Martin Heczko"}, {"name": "Petr Šesták"}, {"name": "Denis Ledue"}, {"name": "Renaud Patte"}, {"name": "Miroslav Černý"}], "author_count": 6}, {"id": "2604.10538", "category": "cond-mat", "title": "Quantum to classical relaxation dynamics of the dissipative Rydberg gas", "abstract": "We investigate the relaxation dynamics of a Rydberg gas in regimes where coherent processes and dissipation compete. In the strongly dissipative limit, the dynamics is known to be governed by an effective classical rate equation and to exhibit kinetically constrained, glassy relaxation towards a trivial stationary state. This behaviour originates from the Rydberg blockade, which prevents simultaneous excitations within a characteristic blockade radius. However, the fate of kinetic constraints in the weakly dissipative limit remains unexplored in large systems above one dimension. To access large system sizes and two-dimensional geometries, we employ the truncated Wigner approximation, a phase-space method that captures correlated many-body dynamics beyond classical rate equations. To probe the emergence of kinetic constraints on timescales where coherent and dissipative processes are comparable, we analyse the relaxation dynamics starting from two initial states: a fully polarised state and a Néel state, which belongs to a manifold of so-called quantum scars. In both cases, we observe a pronounced slowdown in the relaxation of the magnetisation towards the stationary state and identify transient signatures of quantum kinetically constrained dynamics in one and two dimensions.", "url": "https://arxiv.org/abs/2604.10538", "type": "理论", "summary": "我们研究了相干过程和耗散竞争的情况下里德堡气体的弛豫动力学。在强耗散极限下，已知动力学受有效的经典速率方程控制，并表现出动力学约束、朝向平凡稳态的玻璃弛豫。这种行为源于里德堡封锁，它防止在特征封锁半径内同时激发。然而，在一维以上的大型系统中，弱耗散极限中的动力学约束的命运仍未得到探索。为了访问大型系统尺寸和二维几何形状，我们采用截断维格纳近似，这是一种相空间方法，可以捕获经典速率方程之外的相关多体动力学。为了探究相干过程和耗散过程具有可比性的时间尺度上动力学约束的出现，我们从两个初始状态开始分析弛豫动力学：完全极化状态和尼尔状态，属于所谓的量子疤痕流形。\n\n在这两种情况下，我们都观察到磁化强度向稳态弛豫的明显减慢，并在一维和二维中识别出量子动力学约束动力学的瞬态特征。", "authors": [{"name": "Viktoria Noel"}, {"name": "Igor Lesanovsky"}], "featured_authors": [{"name": "Viktoria Noel"}, {"name": "Igor Lesanovsky"}], "author_count": 2}, {"id": "2604.10552", "category": "cond-mat", "title": "The class C quantum network model with random tunneling and its nonlinear sigma model representation", "abstract": "The spin quantum Hall effect is a relative of the integer quantum Hall effect, characterized by integer quantized spin Hall conductance. In this work, we formulate and investigate a quantum network model consisting of $\\textsf{N}$ channels per chiral link, preserving the fundamental symmetries of the spin quantum Hall effect. We demonstrate that, in the general case, the triplet sector of the theory remains coupled to the singlet sector. In the large-$\\textsf{N}$ limit, we systematically derive the effective long-distance, low-energy field theory, identified as a nonlinear sigma model. Our analysis reveals that while triplet modes are typically massive and do not influence the large-$\\textsf{N}$ nonlinear sigma model, specific conditions exist where these modes become `soft', thereby increasing the ultraviolet cutoff length of the effective theory. Furthermore, by calculating the bare longitudinal and spin Hall conductances, we show that the standard saddle-point approximation fails in regimes with significant tunneling asymmetry between even and odd links. Finally, we establish that the introduction of a Zeeman field not only breaks the SU(2) symmetry of the nonlinear sigma model action but also generates a term that explicitly violates inversion symmetry.", "url": "https://arxiv.org/abs/2604.10552", "type": "理论", "summary": "自旋量子霍尔效应是整数量子霍尔效应的相对产物，其特征是整数量子化的自旋霍尔电导。在这项工作中，我们制定并研究了一个由每个手性链接 $\\textsf{N}$ 通道组成的量子网络模型，保留了自旋量子霍尔效应的基本对称性。我们证明，在一般情况下，理论的三重态部分仍然与单重态部分耦合。在大$\\textsf{N}$限制下，我们系统地推导了有效的长距离、低能量场论，被确定为非线性西格玛模型。我们的分析表明，虽然三重态模式通常很大并且不会影响大$\\textsf{N}$非线性西格玛模型，但存在使这些模式变得“软”的特定条件，从而增加了有效理论的紫外线截止长度。此外，通过计算裸纵向和自旋霍尔电导，我们表明标准鞍点近似在偶数和奇数链接之间具有显着隧道不对称性的情况下失败。\n\n最后，我们确定塞曼场的引入不仅打破了非线性 sigma 模型作用的 SU(2) 对称性，而且还生成了一个明确违反反演对称性的项。", "authors": [{"name": "D. S. Katkov"}, {"name": "M. V. Parfenov"}, {"name": "I. S. Burmistrov"}], "featured_authors": [{"name": "D. S. Katkov"}, {"name": "M. V. Parfenov"}, {"name": "I. S. Burmistrov"}], "author_count": 3}, {"id": "2604.10576", "category": "cond-mat", "title": "Microscopic model for the ground state, 1/3 plateau and excitations of $γ$-Mn$_3$(PO$_4$)$_2$", "abstract": "We present a magnetic model for an antiferromagnetic compound $\\gamma$-Mn$_3$(PO$_4$)$_2$, which was previously shown to exhibit a 1/3 magnetization plateau due to the trimer-based structure of the lattice of magnetic Mn$^{2+}$ ions with $S=5/2$. An exchange Hamiltonian that yields observed field transitions is obtained from fitting magnetization data. It is shown that both biquadratic coupling and single-ion anisotropy are necessary to be present in the magnetic model to explain multiple phase transitions in the magnetic susceptibility data. The calculated magnetic spectrum is in agreement with the low-temperature specific heat data.", "url": "https://arxiv.org/abs/2604.10576", "type": "理论", "summary": "我们提出了反铁磁化合物 $\\gamma$-Mn$_3$(PO$_4$)$_2$ 的磁性模型，之前的研究表明，由于 $S=5/2$ 的磁性 Mn$^{2+}$ 离子晶格的三聚体结构，该化合物表现出 1/3 磁化平台。产生观察到的场转变的交换哈密顿量是通过拟合磁化数据获得的。结果表明，磁模型中必须同时存在双二次耦合和单离子各向异性才能解释磁化率数据中的多个相变。计算的磁谱与低温比热数据一致。", "authors": [{"name": "P. A. Maksimov"}, {"name": "L. V. Shvanskaya"}, {"name": "O. S. Volkova"}, {"name": "A. N. Vasiliev"}], "featured_authors": [{"name": "P. A. Maksimov"}, {"name": "L. V. Shvanskaya"}, {"name": "O. S. Volkova"}, {"name": "A. N. Vasiliev"}], "author_count": 4}, {"id": "2604.10581", "category": "cond-mat", "title": "Strain-tunable interface electrostatics in Janus MoSSe/silk vdW heterostructure for triboelectric nanogeneration", "abstract": "Understanding and engineering interfacial electrostatics in hybrid two-dimensional (2D) and biomolecular material systems is essential for advancing high-performance triboelectric nanogenerators (TENGs). In this work, we systematically investigate the strain-dependent electronic structure and triboelectric response of Janus MoSSe, silk fibroin, and their van der Waals (vdW) heterostructure using first-principles calculations. Tensile strain induces a pronounced band-gap reduction in the MoSSe/silk interface, exceeding that of the isolated constituents and indicating enhanced interlayer electronic coupling. The vdW heterostructure exhibits a significant work-function shift and a substantially larger dipole moment compared to MoSSe and silk alone, revealing strong interfacial charge redistribution driven by Fermi-level alignment and asymmetric polarization. This enhanced polarization directly amplifies the triboelectric surface charge density, producing values more than double those of pristine MoSSe and several orders of magnitude higher than silk. Consequently, the open-circuit voltage and overall triboelectric output are markedly improved across all strain levels. These results demonstrate that synergistic interfacial polarization and strain engineering can effectively elevate charge separation, storage, and transfer efficiencies, establishing the MoSSe/silk vdW heterostructure as a promising material for next-generation high-efficiency TENGs.", "url": "https://arxiv.org/abs/2604.10581", "type": "数值", "summary": "了解和设计混合二维 (2D) 和生物分子材料系统中的界面静电对于推进高性能摩擦纳米发电机 (TENG) 至关重要。在这项工作中，我们使用第一原理计算系统地研究了 Janus MoSSe、丝素蛋白及其范德华 (vdW) 异质结构的应变依赖性电子结构和摩擦电响应。拉伸应变导致 MoSSe/丝界面的带隙显着减小，超过了孤立成分的带隙，表明层间电子耦合增强。与单独的MoSSe和丝相比，vdW异质结构表现出显着的功函数变化和更大的偶极矩，揭示了由费米能级排列和不对称极化驱动的强界面电荷重新分布。这种增强的极化直接放大了摩擦电表面电荷密度，产生的值是原始 MoSSe 的两倍多，比丝绸高几个数量级。因此，在所有应变水平下，开路电压和总体摩擦电输出均得到显着改善。\n\n这些结果表明，协同界面极化和应变工程可以有效提高电荷分离、存储和传输效率，使MoSSe/丝vdW异质结构成为下一代高效TENGs的有前途的材料。", "authors": [{"name": "Deobrat Singh"}, {"name": "Raquel Lizarraga"}], "featured_authors": [{"name": "Deobrat Singh"}, {"name": "Raquel Lizarraga"}], "author_count": 2}, {"id": "2604.10630", "category": "cond-mat", "title": "Electrochemical stability and lithium insertion at the Li|Li3OCl solid electrolyte interface", "abstract": "Solid-state lithium batteries have attracted considerable attention due to their potential to provide improved safety and higher energy density compared with conventional liquid electrolyte batteries. However, the stability of the interface between Li metal anodes and solid electrolytes remains a critical issue that strongly influences battery performance. In this work, first-principles density functional theory calculations are performed to investigate the interfacial properties of a solid-state battery system composed of Li metal anode and Li3OCl solid electrolyte. The structural stability, electronic structure, and electrochemical behavior of the Li|Li3OCl interface are systematically analyzed. Several interface orientations are constructed and compared in order to identify the most energetically favorable configuration. The electronic properties and interfacial charge redistribution are further examined to understand the nature of the interaction between Li metal and the Li3OCl electrolyte. Our results indicate that the Li|Li3OCl interface exhibits stable structural and electronic characteristics, with localized charge redistribution occurring near the interface region. The electrochemical stability against the insertion of an additional Li atom is also evaluated, showing that Li incorporation is energetically unfavorable in most layers of the electrolyte. These results suggest that the Li3OCl electrolyte maintains good electrochemical stability in contact with Li metal. The present study provides atomic-scale insight into the interfacial behavior of Li|Li3OCl and highlights the potential of Li3OCl as a promising solid electrolyte for solid-state lithium batteries.", "url": "https://arxiv.org/abs/2604.10630", "type": "理论+数值", "summary": "与传统液体电解质电池相比，固态锂电池由于具有提高安全性和更高能量密度的潜力而引起了广泛关注。然而，锂金属负极和固体电解质之间界面的稳定性仍然是严重影响电池性能的关键问题。在这项工作中，采用第一性原理密度泛函理论计算来研究由锂金属负极和Li3OCl固体电解质组成的固态电池系统的界面特性。系统分析了Li|Li3OCl界面的结构稳定性、电子结构和电化学行为。构建并比较了几个界面方向，以确定最有利的配置。进一步检查电子特性和界面电荷重新分布，以了解锂金属和 Li3OCl 电解质之间相互作用的本质。我们的结果表明，Li|Li3OCl 界面表现出稳定的结构和电子特性，界面区域附近发生局部电荷重新分布。\n\n还评估了针对插入额外锂原子的电化学稳定性，表明在电解质的大多数层中锂的掺入在能量上是不利的。这些结果表明Li3OCl电解质在与Li金属接触时保持良好的电化学稳定性。本研究提供了对 Li|Li3OCl 界面行为的原子尺度洞察，并强调了 Li3OCl 作为固态锂电池有前景的固体电解质的潜力。", "authors": [{"name": "Deobrat Singh"}, {"name": "Li-Yun Tian"}, {"name": "Moyses Araujo"}, {"name": "Raquel Lizarraga"}], "featured_authors": [{"name": "Deobrat Singh"}, {"name": "Li-Yun Tian"}, {"name": "Moyses Araujo"}, {"name": "Raquel Lizarraga"}], "author_count": 4}, {"id": "2604.10653", "category": "cond-mat", "title": "On stress-assisted boundary migration during recrystallization", "abstract": "This study investigates the boundary migration mechanisms near the sample surface of recrystallizing grains in high-purity Al subjected to cryogenic rolling. Local strain and stress tensors were characterized during \\textit{in situ} annealing by combining high-resolution electron backscatter diffraction with microstructure-based digital image correlation strain analysis. The results reveal local residual strains on the order of $10^{-3}$ within the recrystallizing grain, with values several times higher in the adjacent deformed matrix. The residual stresses in recrystallizing grains are a passive response to those developed within the surrounding deformed grains; the latter being strongly influenced by the local geometry and characteristics of dislocation boundaries, as well as by constraints imposed by neighboring grains. No evidence of shear-coupled motion was observed during the recrystallization boundary migration, despite the presence of shear stress across the boundary. In contrast, detailed analysis of the principal strain components reveals a clear correlation between residual strain patterns and boundary migration directions. These findings indicate that recrystallization boundary migration is modulated by the anisotropy of the local internal stress state.", "url": "https://arxiv.org/abs/2604.10653", "type": "理论", "summary": "本研究研究了深冷轧制高纯铝再结晶晶粒样品表面附近的边界迁移机制。通过将高分辨率电子背散射衍射与基于微结构的数字图像相关应变分析相结合，对原位退火过程中的局部应变和应力张量进行了表征。结果表明，再结晶晶粒内的局部残余应变约为 10^{-3}$，而相邻变形基体中的残余应变值要高出数倍。再结晶晶粒中的残余应力是对周围变形晶粒内产生的残余应力的被动响应。后者受到位错边界​​的局部几何形状和特征以及相邻晶粒施加的约束的强烈影响。尽管边界上存在剪切应力，但在再结晶边界迁移过程中没有观察到剪切耦合运动的证据。相反，对主应变分量的详细分析揭示了残余应变模式和边界迁移方向之间的明显相关性。\n\n这些发现表明，再结晶边界迁移受到局​​部内应力状态各向异性的调节。", "authors": [{"name": "Yubin Zhang"}, {"name": "Qiwei Shi"}, {"name": "Guilin Wu"}], "featured_authors": [{"name": "Yubin Zhang"}, {"name": "Qiwei Shi"}, {"name": "Guilin Wu"}], "author_count": 3}, {"id": "2604.10663", "category": "cond-mat", "title": "Confined kinetics and heterogeneous diffusion driven by fractional Gaussian noise: A path integral approach", "abstract": "Many complex systems are described by Langevin-type equations in which the noise exhibits long-range correlations and couples to the system in a state-dependent, multiplicative manner, leading to heterogeneous non-Markovian diffusion. Here, we investigate the problem of diffusion driven by fractional Gaussian noise with a general multiplicative coefficient from a path-integral perspective. Using a stationary-phase approximation, we derive a Gaussian propagator expressed in terms of the Lamperti transform of the process. In the additive limit, our results recover the path-integral representation of fractional Brownian motion based on its Riemann-Liouville formulation and establish its equivalence with the Langevin construction. We further analyze the effect of subordinating the process to a killing rate within the Feynman-Kac framework, and develop a general procedure to derive kinetic equations in terms of effective local Hamiltonians. We show that the interplay between multiplicative diffusion and confinement induces an effective drift term, leading to probability accumulation in regions of low noise amplitude.", "url": "https://arxiv.org/abs/2604.10663", "type": "理论", "summary": "许多复杂系统由朗之万型方程描述，其中噪声表现出长程相关性，并以状态相关的乘法方式耦合到系统，从而导致异构非马尔可夫扩散。在这里，我们从路径积分的角度研究了由分数高斯噪声驱动的具有一般乘法系数的扩散问题。使用固定相近似，我们推导出以过程的 Lamperti 变换表示的高斯传播器。在加性极限下，我们的结果基于黎曼-刘维尔公式恢复了分数布朗运动的路径积分表示，并建立了其与朗之万结构的等价性。我们进一步分析了 Feynman-Kac 框架内的杀灭率对过程的影响，并开发了一个通用程序来根据有效局部哈密顿量导出动力学方程。我们表明，乘法扩散和限制之间的相互作用会产生有效的漂移项，从而导致低噪声幅度区域的概率累积。", "authors": [{"name": "David Santiago Quevedo"}, {"name": "Felipe Segundo Abril-Bermúdez"}, {"name": "Cristiane Morais Smith"}], "featured_authors": [{"name": "David Santiago Quevedo"}, {"name": "Felipe Segundo Abril-Bermúdez"}, {"name": "Cristiane Morais Smith"}], "author_count": 3}, {"id": "2604.10709", "category": "cond-mat", "title": "Geometric control of powder jet dynamics and energy dissipation", "abstract": "Applying an impulsive force to a powder layer shaped with a concave surface generates a sharp powder jet. This phenomenon has been proposed as a method for evaluating the flowability of powders from small amount of samples. In this study, we systematically varied the radius of the initial concave shape as a controllable parameter and quantitatively examined the resulting jet dynamics, focusing on ejection velocity and maximum height. Our high-speed observations revealed that increasing the concave radius led to broader jets with significantly reduced velocity and maximum height. These dynamic quantities followed a scaling relation with drop height, while the scaling coefficient decreased with the concave radius, indicating that the surface geometry directly governs the extent of energy dissipation. Furthermore, a minimal mechanical model incorporating the sliding distance and velocity squared type dissipation of the powder flow reproduces the observed linear dependence of the jet height on the concave radius. These findings establish powder jets as a sensitive probe of dissipation in dynamic powder flow and provide a quantitative framework for comparing powder specific interactions such as humidity, particle size and particle shape.", "url": "https://arxiv.org/abs/2604.10709", "type": "理论", "summary": "对凹面形状的粉末层施加脉冲力会产生尖锐的粉末射流。这种现象已被提出作为评估少量样品粉末流动性的方法。在这项研究中，我们系统地改变了初始凹形的半径作为可控参数，并定量检查了由此产生的射流动力学，重点关注喷射速度和最大高度。我们的高速观察表明，增加凹面半径会导致更宽的射流，同时显着降低速度和最大高度。这些动态量与跌落高度呈比例关系，而比例系数随凹半径减小，表明表面几何形状直接控制能量耗散的程度。此外，结合了粉末流的滑动距离和速度平方型耗散的最小机械模型再现了观察到的喷射高度对凹半径的线性依赖性。\n\n这些发现将粉末射流确立为动态粉末流中耗散的敏感探针，并为比较粉末特定相互作用（例如湿度、颗粒尺寸和颗粒形状）提供了定量框架。", "authors": [{"name": "Kazuya U. Kobayash"}, {"name": "Komei Jinbo"}, {"name": "Riku Kodama"}, {"name": "Masakazu Muto"}, {"name": "Rei Kurita"}], "featured_authors": [{"name": "Kazuya U. Kobayash"}, {"name": "Komei Jinbo"}, {"name": "Riku Kodama"}, {"name": "Masakazu Muto"}, {"name": "Rei Kurita"}], "author_count": 5}, {"id": "2604.10731", "category": "cond-mat", "title": "Anderson localization via Peierls phase modulation", "abstract": "We investigate a two leg ladder system subjected to an external magnetic field. In the absence of a magnetic field, the system is described by a clean tight binding model, with no disorder in either the onsite potential or the hopping amplitudes. The effect of magnetic field in this system is studied by introducing the Peierls phases in the hopping amplitudes along a leg (appropriate when the Landau gauge is chosen). For a uniform magnetic field, characterized by a constant Peierls phase, we find that all eigenstates remain delocalized. In contrast, random Peierls phases, representing a random magnetic field, lead to complete localization of the eigenstates. We further show that a quasiperiodic modulation of the Peierls phase can drive a transition from a fully delocalized to a fully localized phase upon tuning the quasiperiodicity. For a two parameter quasiperiodic Peierls phase, varying analogously to a generalized Aubry Andre type potential, we construct the phase diagram of the system. The phase diagram exhibits regions of delocalized and localized phases, separated by intermediate regimes of mixed phase. We also perform a semiclassical analysis that qualitatively yields a similar phase diagram, capturing the localization transition. Our results demonstrate a mechanism for controlling transport properties via the Peierls phase engineering.", "url": "https://arxiv.org/abs/2604.10731", "type": "理论+数值", "summary": "我们研究了受到外部磁场影响的两腿梯子系统。在没有磁场的情况下，该系统由干净的紧密结合模型描述，现场电位或跳跃幅度没有紊乱。通过在沿腿的跳变幅度中引入 Peierls 相位（当选择朗道规范时适用），研究了该系统中磁场的影响。对于以恒定 Peierls 相为特征的均匀磁场，我们发现所有本征态都保持离域。相反，代表随机磁场的随机 Peierls 相位导致本征态的完全局域化。我们进一步表明，Peierls 相位的准周期调制可以在调整准周期时驱动从完全离域到完全局域的转变。对于双参数准周期 Peierls 相，其变化类似于广义的 Aubry Andre 型势，我们构建了系统的相图。相图显示了离域相和局域相的区域，由混合相的中间状态分开。\n\n我们还进行了半经典分析，定性地产生了类似的相图，捕获了局部化转变。我们的结果证明了通过 Peierls 相工程控制输运特性的机制。", "authors": [{"name": "Arpita Goswami"}, {"name": "Pallabi Chatterjee"}, {"name": "Ranjan Modak"}, {"name": "Shaon Sahoo"}], "featured_authors": [{"name": "Arpita Goswami"}, {"name": "Pallabi Chatterjee"}, {"name": "Ranjan Modak"}, {"name": "Shaon Sahoo"}], "author_count": 4}, {"id": "2604.10768", "category": "cond-mat", "title": "Structural Reconstruction Induced d-wave Altermagnetism in $\\mathrm{V_{2}X_2}$ ($X = \\mathrm{S, Se}$) monolayer", "abstract": "Altermagnetism, featuring momentum-dependent spin splitting without relativistic effects, holds promise for next generation spintronic applications. In this study, we investigate the momentum-dependent spin splitting in the electronic band structure of a reconstructed $V_{2}X_{2}$ ($X=\\mathrm{S, Se}$) lattice, achieved by introducing chalcogen cluster vacancies in trigonal $VX_{2}$ ($X=\\mathrm{S, Se}$) monolayer. The reconstructed structure forms an inverse Lieb lattice of vanadium atoms, comprising two magnetic sublattices related by $C_{4}$ lattice rotational symmetry and $C_{2}$ magnetic symmetry, resulting in zero net magnetization despite the breaking of time-reversal ($\\mathcal{T}$) and combined inversion time-reversal ($\\mathcal{PT}$) symmetries. The electronic structure exhibits strongly anisotropic spin splitting on the Fermi surface, pronounced along $\\Gamma\\!-\\!X$ and $\\Gamma\\!-\\!Y$ and vanishing near $M$ point, revealing symmetry-enforced nodal features. The spin splitting follows a fourfold angular modulation consistent with $d_{x^{2}-y^{2}}$-type altermagnetism, while the real-space spin density exhibits a corresponding $d$-wave pattern localized on vanadium sites. Our findings demonstrate that vacancy-driven reconstruction provides an effective route realizing two-dimensional d-wave altermagnets, opening a new avenue for advanced spintronic technologies.", "url": "https://arxiv.org/abs/2604.10768", "type": "理论", "summary": "交变磁学具有动量相关的自旋分裂而没有相对论效应，为下一代自旋电子学应用带来了希望。在本研究中，我们研究了重建的 $V_{2}X_{2}$ ($X=\\mathrm{S, Se}$) 晶格的电子能带结构中动量相关的自旋分裂，该晶格是通过在三角 $VX_{2}$ ($X=\\mathrm{S, Se}$) 单层中引入硫族簇空位来实现的。重建的结构形成钒原子的逆利布晶格，包括两个由$C_{4}$晶格旋转对称性和$C_{2}$磁对称性相关的磁性亚晶格，尽管打破了时间反转($\\mathcal{T}$)对称性和组合反演时间反转($\\mathcal{PT}$)对称性，但净磁化强度为零。电子结构在费米面上表现出强烈的各向异性自旋分裂，沿着 $\\Gamma\\!-\\!X$ 和 $\\Gamma\\!-\\!Y$ 明显，并在 $M$ 点附近消失，揭示了对称性强制的节点特征。自旋分裂遵循与 $d_{x^{2}-y^{2}}$ 型交变磁性一致的四重角度调制，而真实空间自旋密度则表现出位于钒位点的相应 $d$ 波模式。\n\n我们的研究结果表明，空位驱动重建提供了实现二维 d 波交替磁体的有效途径，为先进自旋电子技术开辟了新途径。", "authors": [{"name": "Geethanjali S"}, {"name": "Sasmita Mohakud"}], "featured_authors": [{"name": "Geethanjali S"}, {"name": "Sasmita Mohakud"}], "author_count": 2}, {"id": "2604.10775", "category": "cond-mat", "title": "Thermalization Fronts in the Hubbard-Holstein Model", "abstract": "We investigate the nonequilibrium dynamics of the weak-coupling Hubbard-Holstein model after a sudden switch-on of the electron-phonon interaction within nonequilibrium dynamical mean-field theory (DMFT). Using the self-consistent Migdal approximation for the electron-phonon coupling together with second-order perturbation theory for the electron-electron interaction, we show that the relaxation dynamics exhibits a crossover between electron-dominated and phonon-dominated regimes, extending to finite Hubbard interaction the scenario previously identified in the Holstein model. To investigate the microscopic buildup of the thermal state, we analyze the dynamics within the Step-by-Step DMFT framework. In the plane of real time and DMFT iteration number, thermalization is marked by a sharp propagating front. This front appears in electronic observables already for weak quenches within the simulated time window, whereas the phononic sector exhibits a visible front only at sufficiently strong coupling. Thus, at weak coupling the local dispersionless phonons show a delayed onset of front formation, while near and beyond the crossover the front develops on comparable timescales in both the electronic and phononic sectors. Whenever both fronts are resolved, they propagate with the same velocity, showing that thermalization spreads coherently through the coupled electron-phonon system.", "url": "https://arxiv.org/abs/2604.10775", "type": "理论+数值", "summary": "我们研究了非平衡动态平均场理论（DMFT）中电子-声子相互作用突然开启后弱耦合哈伯德-荷尔斯泰因模型的非平衡动力学。使用电子-声子耦合的自洽米格达尔近似以及电子-电子相互作用的二阶微扰理论，我们表明弛豫动力学表现出电子主导和声子主导状态之间的交叉，扩展到先前在荷斯坦模型中识别的有限哈伯德相互作用。为了研究热状态的微观积累，我们分析了逐步 DMFT 框架内的动力学。在实时和 DMFT 迭代次数的平面中，热化的特点是尖锐的传播前沿。该前沿已经出现在模拟时间窗口内弱猝灭的电子可观测值中，而声子扇区仅在足够强的耦合下才表现出可见前沿。\n\n因此，在弱耦合时，局部无色散声子表现出锋面形成的延迟开始，而在交叉点附近和之外，锋面在电子和声子领域中以可比较的时间尺度发展。每当两个前沿都解析时，它们就会以相同的速度传播，这表明热化通过耦合的电子声子系统一致地传播。", "authors": [{"name": "Antonio Picano"}, {"name": "Marco Schiro"}], "featured_authors": [{"name": "Antonio Picano"}, {"name": "Marco Schiro"}], "author_count": 2}, {"id": "2604.10839", "category": "cond-mat", "title": "Emergent Quantum Droplets in Logarithmic Klein-Gordon Models of Bose-Einstein Condensates", "abstract": "We study a relativistic scalar field model for self-bound Bose-Einstein condensates (BECs) by analyzing a nonlinear Klein-Gordon equation with cubic and logarithmic interactions. This framework captures essential features of quantum droplets, such as self-trapping and finite energy configurations, which emerge from the interplay between attractive and repulsive terms. By performing the non-relativistic limit, we derive a generalized Gross-Pitaevskii equation with a logarithmic correction, consistent with recent models used to describe ultra-cold atomic gasses beyond mean-field theory. We construct the corresponding Lagrangian density, identify conserved quantities via Noether's theorem, and compute the energy-momentum tensor. Numerical solutions of the BEC parameters are shown, establishing the foundations for a field theoretical description of relativistic condensates with a logarithmic interaction. This model provides a unified approach to investigate relativistic effects in quantum droplets and enriches the theoretical landscape of Bose-Einstein condensates with non-standard interactions. The resulting dynamics exhibit stable oscillatory regimes consistent with self-bound condensate configurations.", "url": "https://arxiv.org/abs/2604.10839", "type": "理论+数值", "summary": "我们通过分析具有三次和对数相互作用的非线性克莱因-戈登方程来研究自束缚玻色-爱因斯坦凝聚体（BEC）的相对论标量场模型。该框架捕获了量子液滴的基本特征，例如自捕获和有限能量配置，这些特征是从吸引项和排斥项之间的相互作用中产生的。通过执行非相对论极限，我们推导了一个经过对数校正的广义 Gross-Pitaevskii 方程，与用于描述超出平均场理论的超冷原子气体的最新模型一致。我们构造相应的拉格朗日密度，通过诺特定理识别守恒量，并计算能量动量张量。显示了 BEC 参数的数值解，为具有对数相互作用的相对论凝聚体的场理论描述奠定了基础。该模型提供了一种统一的方法来研究量子液滴中的相对论效应，并丰富了具有非标准相互作用的玻色-爱因斯坦凝聚的理论景观。\n\n由此产生的动力学表现出与自束缚凝聚态构型一致的稳定振荡机制。", "authors": [{"name": "Kevin Hernández"}, {"name": "Elías Castellanos"}], "featured_authors": [{"name": "Kevin Hernández"}, {"name": "Elías Castellanos"}], "author_count": 2}, {"id": "2604.10887", "category": "cond-mat", "title": "A Lightweight Universal Machine-Learning Interatomic Potential via Knowledge Distillation for Scalable Atomistic Simulations", "abstract": "We introduce a lightweight universal machine-learning interatomic potential (uMLIP), SevenNet-Nano, based on the graph neural network architecture SevenNet and enabled by a knowledge-distillation framework. The model inherits the broad generalization capability of a large multi-task foundation model, SevenNet-Omni, trained on diverse materials datasets across chemical, configurational, and computational spaces. By learning chemical representations from high-quality inference data generated by the teacher model within a unified computational framework, SevenNet-Nano achieves high accuracy and strong transferability despite its compact architecture. The model also accurately captures a wide range of interatomic interactions, enabling reliable simulations under both equilibrium and extreme conditions, including plasma etching of SiO$_2$. Comprehensive benchmarks on static and dynamical properties--such as Li-ion diffusion and liquid densities--demonstrate its broad applicability with minimal fine-tuning. Importantly, SevenNet-Nano significantly reduces computational cost, achieving over an order-of-magnitude speedup and enabling large-scale atomistic simulations involving thousands of atoms.", "url": "https://arxiv.org/abs/2604.10887", "type": "理论+数值", "summary": "我们引入了一种轻量级通用机器学习原子间势（uMLIP）SevenNet-Nano，它基于图神经网络架构 SevenNet，并由知识蒸馏框架支持。该模型继承了大型多任务基础模型 SevenNet-Omni 的广泛泛化能力，该模型在化学、配置和计算空间的不同材料数据集上进行了训练。通过在统一的计算框架内从教师模型生成的高质量推理数据中学习化学表示，SevenNet-Nano 尽管其架构紧凑，但仍实现了高精度和强可迁移性。该模型还准确地捕获了广
