t Born Machine (QCBM), fundamentally work on a binary level. Real-world data, however, is often numeric, requiring the models to translate between binary and continuous representations. We analyze how this transition influences the performance of quantum models and show that it requires the models to learn correlations that are solely an artifact of the way the data is encoded, and not related to the data itself. At the same time, structure of the original data can be obscured in the binary representation, hindering generalization. To mitigate these effects, we propose a strategy based on Gray-codes that can be implemented with essentially no overhead, conserves structures in the data, and avoids artificial correlations in situations in which the standard approach creates them. Considering datasets drawn from various one-dimensional probability distributions, we verify that, in most cases, QCBMs using the reflected Gray code learn faster and more accurately than those with standard binary code.", "url": "https://arxiv.org/abs/2603.23407", "type": "理论+数值", "summary": "生成量子机器学习模型经过训练，可以推断给定数据集背后的概率分布，并从中生成新的合成样本。文献中提出的大多数此类模型，例如量子电路诞生机（QCBM），基本上都是在二进制级别上工作的。然而，现实世界的数据通常是数字的，需要模型在二进制和连续表示之间进行转换。我们分析了这种转变如何影响量子模型的性能，并表明它要求模型学习相关性，而这些相关性仅仅是数据编码方式的产物，与数据本身无关。同时，原始数据的结构可能会在二进制表示中变得模糊，从而阻碍泛化。为了减轻这些影响，我们提出了一种基于格雷码的策略，该策略基本上可以在没有开销的情况下实现，保留数据中的结构，并避免在标准方法创建它们的情况下出现人为关联。\n\n考虑到从各种一维概率分布中提取的数据集，我们验证了在大多数情况下，使用反射格雷码的 QCBM 比使用标准二进制码的 QCBM 学习得更快、更准确。", "authors": [{"name": "Michael Krebsbach"}, {"name": "Florentin Reiter"}, {"name": "Thomas Wellens"}, {"name": "Hagen-Henrik Kowalski"}, {"name": "Ali Abedi"}], "featured_authors": [{"name": "Michael Krebsbach"}, {"name": "Florentin Reiter"}, {"name": "Thomas Wellens"}, {"name": "Hagen-Henrik Kowalski"}, {"name": "Ali Abedi"}], "author_count": 5}, {"id": "2603.23417", "category": "quant-ph", "title": "Single-letter one-way distillable entanglement for non-degradable states", "abstract": "The one-way distillable entanglement is a central operational measure of bipartite entanglement, quantifying the optimal rate at which maximally entangled pairs can be extracted by one-way LOCC. Despite its importance, it is notoriously hard to compute, since it is defined by a regularized optimization over many copies and adaptive one-way protocols. At present, single-letter formulas are only known for (conjugate) degradable and PPT states. More generally, it has remained unclear when one-way distillable entanglement can still be additive beyond degradability and PPT settings, and how such additivity relates to additivity questions of quantum capacity of channels. In this paper, we address this gap by identifying three explicit families of non-degradable and non-PPT states whose one-way distillable entanglement is nevertheless single-letter. First, we introduce two weakened degradability-type conditions--regularized less-noisy and informationally degradable--and prove that each guarantees additivity and hence a single-letter formula. Second, we show a stability result for orthogonally flagged mixtures: when one component has orthogonal support on Alice's system and zero one-way distillable entanglement, the mixture remains single-letter, even though degradability is typically lost under such mixing. Finally, we propose a generalized spin-alignment principle for entropy minimization in tensor-product settings, which we establish in several key cases, including a complete Rényi-2 result. As an application, we obtain additivity results for generalized direct-sum channels and their corresponding Choi states.", "url": "https://arxiv.org/abs/2603.23417", "type": "理论+数值", "summary": "单向可蒸馏纠缠是二分纠缠的一种核心操作度量，量化单向 LOCC 提取最大纠缠对的最佳速率。尽管它很重要，但众所周知，它很难计算，因为它是通过对许多副本和自适应单向协议进行正则化优化来定义的。目前，单字母公式仅适用于（共轭）可降解和 PPT 状态。更一般地说，目前尚不清楚单向可蒸馏纠缠何时仍可在可降解性和 PPT 设置之外进行加和，以及这种加和性与通道量子容量的加和性问题有何关系。在本文中，我们通过识别三个明确的不可降解和非 PPT 状态族来解决这一差距，这些状态的单向可蒸馏纠缠仍然是单字母。首先，我们引入两个弱可降解性条件——正则化噪音较小和信息可降解——并证明每个条件都保证可加性，从而保证单字母公式。\n\n其次，我们展示了正交标记混合物的稳定性结果：当一种组分在爱丽丝系统上具有正交支持和零单向可蒸馏纠缠时，混合物保持单字母，即使在这种混合下通常会失去可降解性。最后，我们提出了张量积设置中熵最小化的广义自旋对齐原理，我们在几个关键案例中建立了该原理，包括完整的 Rényi-2 结果。作为一个应用，我们获得了广义直和通道及其相应 Choi 态的可加性结果。", "authors": [{"name": "Rabsan Galib Ahmed"}, {"name": "Graeme Smith"}, {"name": "Peixue Wu"}], "featured_authors": [{"name": "Rabsan Galib Ahmed"}, {"name": "Graeme Smith"}, {"name": "Peixue Wu"}], "author_count": 3}, {"id": "2603.23432", "category": "quant-ph", "title": "Tensor network influence functionals for open quantum systems with general Gaussian bosonic baths", "abstract": "Dynamics of open quantum systems with structured reservoirs can often be simulated efficiently with tensor network influence functionals. The standard variants of the time-evolving matrix product operator (TEMPO) method are applicable when the systems is coupled to Gaussian bosonic baths via hermitian coupling operators that mutually commute. In this work we introduce a generalization to cases where the system is coupled to a single reservoir through multiple non-commuting operators, representing the most general form of linear system-bath coupling. We construct a Gaussian influence functional that properly handles Trotter errors arising from a finite evolution time step, thus ensuring convergence for long evolution times. Based on this result, the uniform TEMPO scheme can be employed to obtain a matrix product operator form of the influence functional, enabling efficient simulations of the real-time dynamics of the open system. As a demonstration, we simulate the time evolution of driven two-level emitters coupled to a bosonic lattice at different lattice sites.", "url": "https://arxiv.org/abs/2603.23432", "type": "数值", "summary": "具有结构化储层的开放量子系统的动力学通常可以使用张量网络影响泛函进行有效模拟。当系统通过相互交换的埃尔米特耦合算子耦合到高斯玻色浴时，时间演化矩阵乘积算子 (TEMPO) 方法的标准变体适用。在这项工作中，我们对系统通过多个非通勤操作员耦合到单个水库的情况进行了概括，代表了线性系统浴耦合的最一般形式。我们构建了一个高斯影响函数，可以正确处理有限进化时间步长产生的 Trotter 误差，从而确保长进化时间的收敛。基于这一结果，可以采用统一的TEMPO格式来获得影响函数的矩阵乘积算子形式，从而能够有效地模拟开放系统的实时动态。作为演示，我们模拟了在不同晶格位置耦合到玻色子晶格的驱动两级发射器的时间演化。", "authors": [{"name": "Valentin Link"}], "featured_authors": [{"name": "Valentin Link"}], "author_count": 1}, {"id": "2603.23444", "category": "quant-ph", "title": "Scalable quantum circuit generation for iterative ground state approximation using Majorana Propagation", "abstract": "We introduce the Adaptive Derivative-Assembled Pseudo-Trotter ansatz Variational Majorana Propagation Eigensolver (ADAPT-VMPE), a quantum-inspired classical algorithm that exploits Majorana Propagation (MP) to produce circuits for approximating the ground state of molecular Hamiltonians. Equipped with the theoretical guarantees of MP, which provide controllable bounds on the approximation error, ADAPT-VMPE offers an efficient and scalable approach for iterative ansatz construction. A theoretical analysis of the computational complexity demonstrates that it is polynomial in both the number of qubits and the number of iterations. We present an in-depth analysis of circuit construction strategies, analyzing their impact on convergence and provide practical guidance for efficient ansatz generation. Using ADAPT-VMPE, we construct up to 100-qubit ansätze for a strongly correlated photosensitizer currently undergoing human clinical trials for cancer treatment. Our results demonstrate that constant overlap with the ground state across system sizes can be reached in polynomial time with polynomially sized circuits.", "url": "https://arxiv.org/abs/2603.23444", "type": "理论+数值", "summary": "我们介绍了自适应导数组装伪 Trotter ansatz 变分马约拉纳传播本征解算器 (ADAPT-VMPE)，这是一种受量子启发的经典算法，利用马约拉纳传播 (MP) 来生成用于逼近分子哈密顿量基态的电路。 ADAPT-VMPE 配备了 MP 的理论保证，为近似误差提供了可控范围，为迭代 ansatz 构建提供了一种高效且可扩展的方法。计算复杂度的理论分析表明，它在量子比特数和迭代次数上都是多项式。我们对电路构建策略进行了深入分析，分析了它们对收敛的影响，并为高效的 ansatz 生成提供了实用指导。使用 ADAPT-VMPE，我们为目前正在进行癌症治疗人体临床试验的强相关光敏剂构建了多达 100 量子位的 ansätze。我们的结果表明，使用多项式尺寸的电路，可以在多项式时间内达到跨系统尺寸与基态的恒定重叠。", "authors": [{"name": "Rahul Chakraborty"}, {"name": "Aaron Miller"}, {"name": "Anton Nykänen"}, {"name": "Özlem Salehi"}, {"name": "Fabio Tarocco"}, {"name": "Fabijan Pavošević"}, {"name": "Pi. A. B. Haase"}, {"name": "Martina Stella"}, {"name": "Adam Glos"}], "featured_authors": [{"name": "Rahul Chakraborty"}, {"name": "Aaron Miller"}, {"name": "Anton Nykänen"}, {"name": "Pi. A. B. Haase"}, {"name": "Martina Stella"}, {"name": "Adam Glos"}], "author_count": 9}, {"id": "2603.23469", "category": "quant-ph", "title": "Initial State Memory in Finite Random Brickwork Circuits", "abstract": "We ask under what conditions a finite brickwork circuit of random gates retains local information about the initial state. To answer this question we measure the averaged Frobenius distance between the reduced states obtained by evolving two arbitrary initial states and tracing out a portion of the system. By characterising this distance exactly at all times we find that the information is retained if the environment -- the subsystem traced out -- is smaller than half of the system and washed away otherwise. We also find that, while the dynamics of the Frobenius distance depends on the specific initial states chosen, this dependence becomes increasingly weak for large scales and eventually the Frobenius distance attains a universal form as a function of time. Finally, we show that by introducing weak enough boundary dissipation, one can observe a phase transition between a memory preserving phase and one where the information is completely lost.", "url": "https://arxiv.org/abs/2603.23469", "type": "理论", "summary": "我们询问随机门的有限砖砌电路在什么条件下保留有关初始状态的局部信息。为了回答这个问题，我们测量通过演化两个任意初始状态并追踪系统的一部分而获得的简化状态之间的平均弗罗贝尼乌斯距离。通过始终准确地描述这个距离，我们发现，如果环境（追踪到的子系统）小于系统的一半，则信息会被保留，否则会被冲走。我们还发现，虽然弗罗贝尼乌斯距离的动态取决于所选择的特定初始状态，但这种依赖性在大尺度上变得越来越弱，最终弗罗贝尼乌斯距离获得了作为时间函数的通用形式。最后，我们表明，通过引入足够弱的边界耗散，人们可以观察到记忆保留阶段和信息完全丢失阶段之间的相变。", "authors": [{"name": "Jakob Bannister"}, {"name": "Katja Klobas"}, {"name": "Colin Rylands"}, {"name": "Bruno Bertini"}], "featured_authors": [{"name": "Jakob Bannister"}, {"name": "Katja Klobas"}, {"name": "Colin Rylands"}, {"name": "Bruno Bertini"}], "author_count": 4}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
