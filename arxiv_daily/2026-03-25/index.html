  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.22402", "category": "cond-mat", "title": "A family tree for hafnia", "abstract": "Several candidate reference phases have been proposed to discuss phase transitions and ferroelectricity in hafnia in recent years. Although these proposals comply with crystallographic requirements, a physically compelling rationale connecting parent and daughter phases is often lacking. This problem is aggravated by the absence of clearly dominant polarization switching pathways, making it difficult to formulate a robust physical criterion for identifying the relevant high-symmetry states. Here we use first-principles calculations to show that pressure provides a simple and robust criterion for establishing physically meaningful family relationships among many hafnia polymorphs, including the monoclinic ground state and the technologically relevant ferroelectric phase, and their respective parent structures. Our simulations also reveal several previously unreported phases, including higher-energy structures that act as common ancestors of the widely discussed cubic and orthorhombic reference phases.", "url": "https://arxiv.org/abs/2603.22402", "type": "理论+数值", "summary": "近年来，人们提出了几种候选参考相来讨论二氧化铪中的相变和铁电性。尽管这些建议符合晶体学要求，但通常缺乏连接母体相和子体相的物理上令人信服的理由。由于缺乏明显占主导地位的偏振转换路径，这个问题变得更加严重，使得很难制定可靠的物理标准来识别相关的高对称性状态。在这里，我们使用第一原理计算来表明压力为在许多二氧化铪多晶型物之间建立物理上有意义的家族关系提供了一个简单而可靠的标准，包括单斜基态和技术相关的铁电相以及它们各自的母体结构。我们的模拟还揭示了几个以前未报道的相，包括作为广泛讨论的立方和斜方参考相的共同祖先的高能结构。", "authors": [{"name": "Nicolaie Cernov"}, {"name": "Jorge Íñiguez-González"}, {"name": "Hugo Aramberri"}], "featured_authors": [{"name": "Nicolaie Cernov"}, {"name": "Jorge Íñiguez-González"}, {"name": "Hugo Aramberri"}], "author_count": 3}, {"id": "2603.22424", "category": "cond-mat", "title": "How active field theories couple to external potentials", "abstract": "We study the simplest terms that need to be included in active field theories to couple them to external potentials. To do so, we consider active Brownian particles and implement a systematic perturbative expansion in the particle persistence time. The result is a non-trivial coupling between density and potential gradients, which accounts for the nonequilibrium features of active particles in the presence of an external potential, from boundary accumulation to far-field density modulation. We show how the method can be applied to particles interacting via pairwise forces and to spatial modulations of the propulsion speed.", "url": "https://arxiv.org/abs/2603.22424", "type": "理论", "summary": "我们研究主动场论中需要包含的最简单的术语，以将它们与外部势耦合。为此，我们考虑活跃的布朗粒子，并在粒子持续时间中实施系统的微扰扩展。结果是密度和电势梯度之间的非平凡耦合，这解释了活性粒子在存在外部电势的情况下从边界累积到远场密度调制的非平衡特征。我们展示了如何将该方法应用于通过成对力相互作用的粒子以及推进速度的空间调制。", "authors": [{"name": "Yariv Kafri"}, {"name": "Julien Tailleur"}], "featured_authors": [{"name": "Yariv Kafri"}, {"name": "Julien Tailleur"}], "author_count": 2}, {"id": "2603.22439", "category": "cond-mat", "title": "The damage spreading transition: a hierarchy of renormalization group fixed points", "abstract": "Deterministic classical cellular automata can be in two phases, depending on how irreversible the dynamical rules are. In the strongly irreversible phase, trajectories with different initial conditions coalesce quickly, while in the weakly irreversible phase, trajectories with different initial conditions can remain different for a time exponential in the system volume. The transition between these phases is referred to as the damage-spreading transition (the \"damaged\" sites are those that differ between the trajectories). We develop a theory for this transition. In the simplest and most generic setting, the transition is known to be related to directed percolation, one of the best-studied nonequilibrium phase transitions. However, we show that full theory of the damage-spreading critical point is richer than directed percolation, and contains an infinite hierarchy of sectors of local observables. Directed percolation describes the first level of the hierarchy. The higher observables include \"overlaps\" for multiple trajectories, and may be labeled by set partitions. (These higher observables arise naturally if, for example, we consider decay of entropy under the irreversible dynamics.) The full hierarchy yields a hierarchy of nonequilibrium fixed points for reaction-diffusion-type processes, all of which contain directed percolation as a subsector, but which possess additional universal critical exponents. We analyze these higher fixed points using a field theory formulation and renormalization group arguments, and using simulations in 1+1 dimensions.", "url": "https://arxiv.org/abs/2603.22439", "type": "理论+数值", "summary": "确定性经典元胞自动机可以分为两个阶段，具体取决于动态规则的不可逆程度。在强不可逆阶段，具有不同初始条件的轨迹快速合并，而在弱不可逆阶段，具有不同初始条件的轨迹可以在系统体积中的时间指数内保持不同。这些阶段之间的过渡称为损坏扩散过渡（“损坏”位置是轨迹之间不同的位置）。我们为这种转变发展了一种理论。在最简单和最通用的环境中，已知该转变与定向渗流有关，这是研究最充分的非平衡相变之一。然而，我们表明，损伤扩散临界点的完整理论比定向渗透更丰富，并且包含局部可观测量扇区的无限层次结构。定向渗透描述了层次结构的第一层。更高的可观察量包括多个轨迹的“重叠”，并且可以通过集合分区来标记。\n\n（例如，如果我们考虑不可逆动力学下的熵衰减，这些更高的可观测量就会自然出现。）完整的层次结构产生了反应扩散型过程的非平衡不动点层次结构，所有这些都包含定向渗流作为子部门，但具有额外的通用临界指数。我们使用场论公式和重正化群参数以及 1+1 维度的模拟来分析这些更高的不动点。", "authors": [{"name": "Adam Nahum"}, {"name": "Sthitadhi Roy"}], "featured_authors": [{"name": "Adam Nahum"}, {"name": "Sthitadhi Roy"}], "author_count": 2}, {"id": "2603.22487", "category": "cond-mat", "title": "Electrochemical and thermal control of continuous phase transitions in P2-NaxNi1/3Mn2/3O2", "abstract": "Sodium layered oxides often undergo phase transformations involving ordering or disordering of Na+ upon desodiation, i.e., when cycled as a battery electrode. Accurately characterizing these phases is crucial for understanding functional properties, such as chemical diffusivity. In this work, we reveal that Na+-vacancy (dis)ordering in a layered oxide is intrinsically coupled to continuous symmetry-changing transformations of the host structure. We examine the low-symmetry orthorhombic unit cell of P2-NaxNi1/3Mn2/3O2 (NNM) using both neutron and X-ray diffraction. Specifically, special sodium stoichiometries (x = 2/3 and 1/2) exhibit concomitant Na+-vacancy ordering and an orthorhombic distortion from the parent hexagonal unit cell. We then demonstrate that electrochemical desodiation drives symmetry-changing transformations in NNM that are linked to Na+-vacancy (dis)ordering, with evidence of second-order behavior observed near x = 2/3. Variable-temperature synchrotron X-ray diffraction further clarifies the coupling between Na+-vacancy disordering and orthorhombic-to-hexagonal phase transitions in NNM. The temperature-driven phase transitions at both x = 2/3 and 1/2 are also consistent with a second-order mechanism. Our analysis of the phase transitions in NNM has fundamental consequences for sodium chemical diffusivity in the vicinity of the ordered phases. The insights from this work are directly applicable to other layered oxides that exhibit alkali-metal-vacancy ordering.", "url": "https://arxiv.org/abs/2603.22487", "type": "理论", "summary": "钠层状氧化物经常发生相变，涉及脱钠时（即作为电池电极循环时）Na+的有序或无序。准确表征这些相对于理解功能特性（例如化学扩散率）至关重要。在这项工作中，我们揭示了层状氧化物中的Na+-空位（无序）本质上与主体结构的连续对称性改变转变相关。我们使用中子和 X 射线衍射检查了 P2-NaxNi1/3Mn2/3O2 (NNM) 的低对称性斜方晶胞。具体来说，特殊的钠化学计量（x = 2/3 和 1/2）表现出伴随的 Na+-空位有序性和来自母体六方晶胞的正交变形。然后，我们证明电化学脱钠可驱动 NNM 中与 Na+-空位（无）序相关的对称性改变转变，并在 x = 2/3 附近观察到二阶行为的证据。变温同步加速器 X 射线衍射进一步阐明了 NNM 中 Na+-空位无序与斜方晶系到六方晶系相变之间的耦合。\n\nx = 2/3 和 1/2 处的温度驱动相变也符合二阶机制。我们对 NNM 中相变的分析对于有序相附近的钠化学扩散率具有根本性的影响。这项工作的见解可直接适用于表现出碱金属空位有序性的其他层状氧化物。", "authors": [{"name": "Dylan A. Edelman"}, {"name": "John Cattermull"}, {"name": "Jue Liu"}, {"name": "Zhelong Jiang"}, {"name": "Hari Ramachandran"}, {"name": "Edward Mu"}, {"name": "Cheng Li"}, {"name": "Anton Van der Ven"}, {"name": "Katherine J. Harmon"}, {"name": "William C. Chueh"}], "featured_authors": [{"name": "Dylan A. Edelman"}, {"name": "John Cattermull"}, {"name": "Jue Liu"}, {"name": "Anton Van der Ven"}, {"name": "Katherine J. Harmon"}, {"name": "William C. Chueh"}], "author_count": 10}, {"id": "2603.22501", "category": "cond-mat", "title": "Chirality Cannot Be Ferroic in Enantiomorphic Space-Groups", "abstract": "With growing interest in structural chirality in periodic solids, it has been suggested that chirality might constitute a new ferroic order parameter. In this work, we demonstrate, by means of a formal group-theoretical proof and a systematic group-subgroup analysis, that achiral-to-chiral transitions that produce either member of an enantiomorphic pair cannot be driven by a Brillouin-zone-center ($\\Gamma$-point) instability from a common achiral parent. We further substantiate this result by explicitly showing that none of the achiral parent space groups that admit symmetry-chiral phonon eigenvectors host them at the zone center. Given that a primary ferroic order parameter must, among other requirements, transform according to a zone-center irreducible representation, we conclude that phase transitions leading to enantiomorphic space groups cannot be classified as primary ferroic transitions. This predicts that any critical enhancement of fluctuations must occur at finite-$q$ rather than as a divergence of a uniform macroscopic susceptibility.", "url": "https://arxiv.org/abs/2603.22501", "type": "理论", "summary": "随着人们对周期性固体结构手性的兴趣日益浓厚，有人提出手性可能构成一种新的铁序参数。在这项工作中，我们通过正式的群理论证明和系统的群子群分析证明，产生对映体对中任一成员的非手性到手性转变不能由来自共同非手性母体的布里渊区中心（$\\Gamma$点）不稳定性驱动。我们通过明确表明没有一个承认对称手性声子特征向量将它们托管在区域中心的非手性父空间群进一步证实了这一结果。鉴于除其他要求外，初级铁序参数必须根据区域中心不可约表示进行变换，我们得出结论，导致对映体空间群的相变不能归类为初级铁性转变。这预示着波动的任何关键增强都必须发生在有限$q$处，而不是作为均匀宏观敏感性的发散。", "authors": [{"name": "F. Gómez-Ortiz"}, {"name": "S. Mamoudou Taganga"}, {"name": "E. E. McCabe"}, {"name": "A. H. Romero"}, {"name": "E. Bousquet"}], "featured_authors": [{"name": "F. Gómez-Ortiz"}, {"name": "S. Mamoudou Taganga"}, {"name": "E. E. McCabe"}, {"name": "A. H. Romero"}, {"name": "E. Bousquet"}], "author_count": 5}, {"id": "2603.22559", "category": "cond-mat", "title": "Geometric Thermodynamics of Cycles: Curvature and Local Thermodynamic Response", "abstract": "Classical thermodynamics contains familiar geometric relations associated with cyclic processes, most notably the identification of mechanical work with the area enclosed by a trajectory in the $(P,V)$ plane. We show that the area laws for work and reversible heat arise as projections of a single canonical two--form defined on the equilibrium thermodynamic manifold, providing a unified description of thermodynamic cycles in both the $(P,V)$ and $(T,S)$ representations. The same structure yields a direct link between cycle geometry and thermodynamic response: the work generated by infinitesimal cycles is set locally by the mixed curvature $U_{SV}$ of the equilibrium energy surface, which can be expressed in terms of measurable susceptibilities. This identifies thermodynamic work as a local geometric field over state space rather than solely a global property of cyclic processes. More broadly, the framework connects classical cycle geometry to stochastic thermodynamic trajectories, providing a geometric interpretation of nonequilibrium work relations such as the Jarzynski equality.", "url": "https://arxiv.org/abs/2603.22559", "type": "理论", "summary": "经典热力学包含与循环过程相关的熟悉的几何关系，最值得注意的是机械功与 $(P,V)$ 平面中轨迹所包围的区域的识别。我们证明，功和可逆热的面积定律是作为平衡热力学流形上定义的单个规范双形式的投影而出现的，从而以 $(P,V)$ 和 $(T,S)$ 表示形式提供热力学循环的统一描述。相同的结构在循环几何形状和热力学响应之间产生了直接联系：无穷小循环产生的功由平衡能量表面的混合曲率 $U_{SV}$ 局部设定，可以用可测量的磁化率来表示。这将热力学功视为状态空间上的局部几何场，而不仅仅是循环过程的全局属性。更广泛地说，该框架将经典循环几何与随机热力学轨迹联系起来，提供了非平衡功关系（例如 Jarzynski 等式）的几何解释。", "authors": [{"name": "Eric R. Bittner"}], "featured_authors": [{"name": "Eric R. Bittner"}], "author_count": 1}, {"id": "2603.22643", "category": "cond-mat", "title": "Pseudospectral phenomena and the origin of the non-Hermitian skin effect", "abstract": "The non-Hermitian skin effect (NHSE), characterized by a macroscopic accumulation of eigenstates at the edge of a system with open boundaries, is often ascribed to a non-trivial point-gap topology of the Bloch Hamiltonian. We revisit this connection and show that the eigenspectrum of non-normal operators is highly sensitive to boundary conditions and generic perturbations, and therefore does not constitute a stable object encoding topological information. Instead, topological properties are reflected in the singular-value spectrum of finite systems and, in the semi-infinite limit, correspond to boundary-localized eigenmodes implied by the index of the corresponding Toeplitz operator. For a Hatano-Nelson ladder, where point-gap winding and non-normality can be varied independently, we demonstrate that the NHSE can occur without point-gap winding and, conversely, that point-gap winding can persist without the NHSE. These results establish that the NHSE originates from spectral instability and non-reciprocity rather than topology, and that the commonly assumed relation between spectral winding and boundary localization relies on translational invariance and is therefore not generic.", "url": "https://arxiv.org/abs/2603.22643", "type": "理论", "summary": "非厄米趋肤效应 (NHSE) 的特征是具有开放边界的系统边缘本征态的宏观累积，通常归因于布洛赫哈密顿量的非平凡点隙拓扑。我们重新审视这种联系，并表明非正规算子的特征谱对边界条件和一般扰动高度敏感，因此不构成编码拓扑信息的稳定对象。相反，拓扑性质反映在有限系统的奇异值谱中，并且在半无限极限中，对应于相应托普利茨算子的索引所隐含的边界局部本征模。对于 Hatano-Nelson 梯子，点间隙缠绕和非正态性可以独立变化，我们证明 NHSE 可以在没有点间隙缠绕的情况下发生，相反，点间隙缠绕可以在没有 NHSE 的情况下持续存在。这些结果表明，NHSE 源于谱不稳定性和非互易性，而不是拓扑，并且谱缠绕和边界局域化之间通常假设的关系依赖于平移不变性，因此不是通用的。", "authors": [{"name": "J. Sirker"}], "featured_authors": [{"name": "J. Sirker"}], "author_count": 1}, {"id": "2603.22645", "category": "cond-mat", "title": "Triplet superconductivity supported by an X$_9$ high-order Van Hove singularity", "abstract": "We study a four-fold symmetric dispersion relation of a quantum material, which exhibits a single high-order Van Hove singularity of X$_9$ type at the Fermi energy. First, we analyze in detail its form, type and density of states when the energy dispersion is in its canonical form. Subsequently, we study the possibility of a superconducting state when Hubbard repulsive interactions are taken into account. By solving the gap equation, it is shown that triplet state superconductivity with power-law dependence of the critical temperature T$_c$ on the interaction strength can be formed when a single singularity is present in the Brillouin zone. We discuss the effects of fluctuations and provide an upper bound of a possible superconducting critical temperature for the ruthenate Sr$_3$Ru$_2$O$_7$ which has been shown to exhibit this type of singularity.", "url": "https://arxiv.org/abs/2603.22645", "type": "理论", "summary": "我们研究了量子材料的四重对称色散关系，该关系在费米能量处表现出 X$_9$ 类型的单个高阶范霍夫奇点。首先，我们详细分析能量色散处于正则形式时的形式、类型和态密度。随后，我们研究了考虑哈伯德排斥相互作用时超导态的可能性。通过求解能隙方程，表明当布里渊区存在单奇点时，可以形成临界温度T$_c$对相互作用强度具有幂律依赖性的三重态超导性。我们讨论了波动的影响，并为钌酸盐 Sr$_3$Ru$_2$O$_7$ 提供了可能的超导临界温度的上限，钌酸盐 Sr$_3$Ru$_2$O$_7$ 已被证明表现出这种类型的奇点。", "authors": [{"name": "Chethan Sanjeevappa"}, {"name": "Anirudh Chandrasekaran"}, {"name": "Joseph J. Betouras"}], "featured_authors": [{"name": "Chethan Sanjeevappa"}, {"name": "Anirudh Chandrasekaran"}, {"name": "Joseph J. Betouras"}], "author_count": 3}, {"id": "2603.22662", "category": "cond-mat", "title": "A mechanism for nonmonotonic $T_{c,max}(n)$ in multilayer cuprates", "abstract": "We propose an explanation of the observed dependence of the maximal critical temperature $T_{c,max}$ on the number of conducting layers $n$ in layered copper-oxide superconductors within the preformed pair mechanism. Copper-oxygen planes fine-tune the lattice anisotropy and regulate the balance between the attractive and kinetic energies of carrier holes. To maximize the Bose-Einstein condensation temperature, real-space pairs must be compact and light at the same time. Generally, $T_{c,max}$ increases between $n = 1$ and $n = 3$ because pairs become lighter. For $n > 3$, the rising kinetic energy weakens the pairs, leading to inflated pair volumes and reduced $T_{c,max}$. By varying model parameters, the peak of $T_{c,max}(n)$ can be tuned to $n = 2$, $n = 3$, or $n > 3$. We also discuss strategies for using this knowledge to boost $T_{c,max}$ beyond the current record of 138 K.", "url": "https://arxiv.org/abs/2603.22662", "type": "理论", "summary": "我们提出了对预制对机制中层状氧化铜超导体中最大临界温度 $T_{c,max}$ 与导电层数量 $n$ 的依赖性的解释。铜氧平面微调晶格各向异性并调节载流子空穴的吸引力和动能之间的平衡。为了最大化玻色-爱因斯坦凝聚温度，实空间对必须同时紧凑且轻。一般来说，$T_{c,max}$ 在 $n = 1$ 和 $n = 3$ 之间增加，因为对变得更轻。对于 $n > 3$，上升的动能会削弱货币对，导致货币对交易量膨胀并减少 $T_{c,max}$。通过改变模型参数，$T_{c,max}(n)$ 的峰值可以调整为 $n = 2$、$n = 3$ 或 $n > 3$。我们还讨论了利用这些知识将 $T_{c,max}$ 提升到超过当前 138 K 记录的策略。", "authors": [{"name": "Pavel Kornilovitch"}], "featured_authors": [{"name": "Pavel Kornilovitch"}], "author_count": 1}, {"id": "2603.22684", "category": "cond-mat", "title": "Finite compressibility and strain hardening in elasto-plastic models of amorphous matter", "abstract": "We study a mesoscopic elasto-plastic model of amorphous matter with varying dimensionless compression modulus, $K/\\mu$, where $K$ and $\\mu$ are the compression and shear moduli. We study both cyclic shear with amplitude $\\Gamma$ and forward steady shear. In cyclic shear, the terminal behavior is, in order of increasing $\\Gamma$: i) trivially elastic, ii) hysteretic but with microscopically reversible limit cycles, iii) diffusive with no return to previously visited configurations. We show that the transition between i) and ii) at the onset point $\\Gamma_0$ is determined by the Eshelby back stress, $\\sigma_0$, which depends on the Poisson ratio. Systems with smaller $K/\\mu$ (more compressible) are effectively harder with a higher $\\Gamma_0$ and a correspondingly larger purely elastic regime in cyclic loading. In forward shear, $\\sigma_0$ plays a similar role where lower $K/\\mu$ results in a higher steady state flow stress, $\\sigma_y$. We show that increasing $K/\\mu$ increases the amplitude of stress redistribution after a local yielding event without changing the net stress relaxation and relate this to the assumptions in mean-field descriptions of amorphous solids. A striking feature of the model is the emergence of a complex hardening behavior in the absence of any ad-hoc hardening parameters: a transition between a kinematic and an isotropic hardening behavior precisely at $\\Gamma_0$ associated with the hysteresis transition. The enhanced plastic response for incompressible systems is also seen in amorphous alloys where it is usually attributed to excess free volume, while in the present model, it arises from the dependence of the Eshelby backstress on the Poisson ratio. Our results should have important implications for amorphous metallic alloys or other glassy systems where $K/\\mu$ can vary with composition, age, quench procedure, or mechanical processing history.", "url": "https://arxiv.org/abs/2603.22684", "type": "理论", "summary": "我们研究了具有不同无量纲压缩模量 $K/\\mu$ 的非晶态物质的介观弹塑性模型，其中 $K$ 和 $\\mu$ 是压缩模量和剪切模量。我们研究了振幅 $\\Gamma$ 的循环剪切和前向稳定剪切。在循环剪切中，终端行为按照 $\\Gamma$ 增加的顺序为：i) 平凡弹性，ii) 滞后但具有微观可逆极限环，iii) 扩散且不返回到先前访问的配置。我们表明，在起始点 $\\Gamma_0$ 处 i) 和 ii) 之间的过渡由埃谢尔比背应力 $\\sigma_0$ 决定，而该应力取决于泊松比。具有较小 $K/\\mu$ （更可压缩）的系统在具有较高 $\\Gamma_0$ 和循环加载中相应较大的纯弹性状态的情况下实际上更困难。在前向剪切中，$\\sigma_0$ 起着类似的作用，其中较低的 $K/\\mu$ 导致较高的稳态流应力 $\\sigma_y$。我们表明，增加 $K/\\mu$ 会增加局部屈服事件后应力重新分布的幅度，而不改变净应力松弛，并将其与非晶固体平均场描述中的假设联系起来。\n\n该模型的一个显着特征是在没有任何临时硬化参数的情况下出现了复杂的硬化行为：运动学和各向同性硬化行为之间的转变恰好在与滞后转变相关的 $\\Gamma_0$ 处。不可压缩系统的增强塑性响应也出现在非晶态合金中，通常归因于过多的自由体积，而在本模型中，它是由埃谢尔比背应力对泊松比的依赖性引起的。我们的结果应该对非晶态金属合金或其他玻璃态系统具有重要意义，其中 $K/\\mu$ 可能随成分、年龄、淬火程序或机械加工历史而变化。", "authors": [{"name": "A. Elgailani"}, {"name": "D. Vandembroucq"}, {"name": "C. E. Maloney"}], "featured_authors": [{"name": "A. Elgailani"}, {"name": "D. Vandembroucq"}, {"name": "C. E. Maloney"}], "author_count": 3}, {"id": "2603.22919", "category": "cond-mat", "title": "Non-Hermitian skin effect in periodic, random, and quasiperiodic systems", "abstract": "The non-Hermitian skin effect (NHSE), which drives bulk states toward system boundaries, modifies bulk-boundary correspondence and complicates the identification of topological edge modes. Although breaking translational symmetry is known to influence this behavior, a systematic comparison of different structural classes remains limited. Here we investigate periodic, random, and quasiperiodic (Fibonacci) systems using a one-dimensional non-Hermitian quantum walk model. By matching the local scattering parameters in a topologically nontrivial regime, we isolate the role of spatial structure in the presence of the NHSE. We find that periodic systems exhibit pronounced boundary accumulation of bulk states. Random systems suppress this accumulation through Anderson localization, but the topological gap becomes partially filled with localized in-gap states. In contrast, the Fibonacci quasiperiodic system suppresses large-scale boundary accumulation while maintaining a well-defined topological gap. Analysis of the wave functions suggests that the hierarchical quasiperiodic structure fragments bulk states across multiple length scales, thereby mitigating the NHSE. These results identify deterministic quasiperiodicity as a distinct structural regime for controlling non-Hermitian skin dynamics and isolating topological boundary modes.", "url": "https://arxiv.org/abs/2603.22919", "type": "理论", "summary": "非厄米趋肤效应（NHSE）将体态推向系统边界，修改了体边界对应关系并使拓扑边缘模式的识别变得复杂。尽管已知打破平移对称性会影响这种行为，但不同结构类别的系统比较仍然有限。在这里，我们使用一维非厄米量子行走模型研究周期性、随机和准周期性（斐波那契）系统。通过匹配拓扑非平凡区域中的局部散射参数，我们隔离了 NHSE 存在下空间结构的作用。我们发现周期性系统表现出明显的体态边界累积。随机系统通过安德森局域化抑制这种积累，但拓扑间隙部分被局域带隙态填充。相比之下，斐波那契准周期系统抑制大规模边界积累，同时保持明确的拓扑间隙。波函数分析表明，分层准周期结构在多个长度尺度上破碎体态，从而减轻 NHSE。\n\n这些结果将确定性准周期性确定为控制非厄米表皮动力学和隔离拓扑边界模式的独特结构机制。", "authors": [{"name": "F. Iwase"}], "featured_authors": [{"name": "F. Iwase"}], "author_count": 1}, {"id": "2603.22926", "category": "cond-mat", "title": "Cooperative effect of local active stresses on the macroscopic contractility of elastic fiber networks", "abstract": "The collective action of actively contractile units embedded in elastic biopolymer networks plays a crucial role in regulating the network's macroscopic mechanical response. Here, we investigate how the macroscopic boundary stress in model elastic fiber networks depends on the number and nature of embedded contractile units, each exerting an isotropic force dipole, as well as on the bending stiffness of fibers. We find that the macroscopic stress increases nonlinearly with the number of dipoles due to mutual stiffening of initially soft, bending-dominated networks. Using effective medium theory, we relate this enhanced contractility to an increase in the effective average network coordination number due to constraints imposed by the force dipoles. By comparing three distinct force dipole models that differ in their local structures, we demonstrate that the specific manner in which an active unit constrains the network strongly influences the onset and nature of the stiffening transition. Our results highlight that not only the quantity but also the local geometry of force-generating units critically determines the macroscopic mechanical behavior. This framework provides a physical basis for understanding how biological systems-such as molecular motors in the cytoskeleton, or adherent cells in the extracellular matrix-can modulate network-scale nonlinear elastic properties through local tuning of active force-generating units.", "url": "https://arxiv.org/abs/2603.22926", "type": "理论", "summary": "嵌入弹性生物聚合物网络中的主动收缩单元的集体作用在调节网络的宏观机械响应中起着至关重要的作用。在这里，我们研究了模型弹性纤维网络中的宏观边界应力如何取决于嵌入收缩单元的数量和性质，每个收缩单元施加各向同性力偶极子，以及纤维的弯曲刚度。我们发现，由于最初柔软的、弯曲主导的网络的相互硬化，宏观应力随着偶极子的数量非线性增加。使用有效介质理论，我们将这种增强的收缩性与由于力偶极子施加的约束而导致的有效平均网络协调数的增加联系起来。通过比较局部结构不同的三种不同的力偶极子模型，我们证明了主动单元约束网络的具体方式强烈影响硬化过渡的开始和性质。我们的结果强调，力产生单元的数量和局部几何形状都关键地决定了宏观机械行为。\n\n该框架为理解生物系统（例如细胞骨架中的分子马达或细胞外基质中的贴壁细胞）如何通过主动力产生单元的局部调节来调节网络规模的非线性弹性特性提供了物理基础。", "authors": [{"name": "Abhinav Kumar"}, {"name": "David A. Quint"}, {"name": "Kinjal Dasbiswas"}], "featured_authors": [{"name": "Abhinav Kumar"}, {"name": "David A. Quint"}, {"name": "Kinjal Dasbiswas"}], "author_count": 3}, {"id": "2603.22961", "category": "cond-mat", "title": "Charge Transport Modeling of CdSe/ZnS core/shell Quantum Nanorod Light-Emitting Diodes", "abstract": "In this study, we investigate the electronic structure, charge transport dynamics, and optical properties of a quantum dot light-emitting diode (QD-LED) featuring a double nanorod (NR) emission layer composed of CdSe-ZnS core-shell structures. Utilizing a rigorous self-consistent numerical approach, we solve the coupled Schrodinger-Poisson equations iteratively to obtain accurate wave functions, energy levels, and potential profiles under varying external bias voltages. Detailed analyses reveal voltage-dependent electron localization dynamics, demonstrating a systematic transition of electrons between distinct NR regions via quantum tunneling. Charge density and electrostatic potential distributions are modeled comprehensively, employing the asymmetric Erlang distribution to characterize interface effects. By calculating current-voltage (I-V) characteristics and photoluminescence spectra, we demonstrate that external voltage serves as a robust tuning parameter for modulating emission energies and intensities, underscoring the potential of these NR-LED systems for tunable optoelectronic and photonic applications.", "url": "https://arxiv.org/abs/2603.22961", "type": "理论+数值", "summary": "在这项研究中，我们研究了量子点发光二极管 (QD-LED) 的电子结构、电荷传输动力学和光学特性，该二极管具有由 CdSe-ZnS 核壳结构组成的双纳米棒 (NR) 发射层。利用严格的自洽数值方法，我们迭代求解耦合的薛定谔-泊松方程，以获得不同外部偏置电压下的精确波函数、能级和电势分布。详细分析揭示了电压依赖性电子局域化动力学，证明了电子通过量子隧道在不同 NR 区域之间的系统跃迁。电荷密度和静电势分布被全面建模，采用不对称 Erlang 分布来表征界面效应。通过计算电流-电压 (I-V) 特性和光致发光光谱，我们证明外部电压可以作为调节发射能量和强度的稳健调谐参数，强调这些 NR-LED 系统在可调谐光电和光子应用中的潜力。", "authors": [{"name": "A.G. Melkonyan"}, {"name": "G.A. Mantashian"}, {"name": "D.B. Hayrapetyan"}], "featured_authors": [{"name": "A.G. Melkonyan"}, {"name": "G.A. Mantashian"}, {"name": "D.B. Hayrapetyan"}], "author_count": 3}, {"id": "2603.23001", "category": "cond-mat", "title": "Exploring Spectral Singularities in Dirac Semimetals: The Role of Non-Hermitian Physics and Dichroism", "abstract": "In this study, motivated by recent advancements in non-Hermitian physics, we explore new characteristics of Dirac semimetals (DSMs) using the spectral singularities by means of scattering techniques, with the goal of uncovering additional unique properties. To achieve this, we investigate how the axion texture of a DSM affects its topological properties by analyzing its interaction with electromagnetic waves. We examine the transverse electric (TE) mode configuration, where the magneto-electric effect induces a dichroic property in these materials. This behavior is particularly interesting and commonly seen in potential DSM candidates. Consequently, we report for the first time that a dichroic DSM generates 12 unique topological laser types. We discover that surface currents are generated by topological terms on the surface of the DSM slab. Furthermore, we examine how the {\\theta} term associated with axions in topological materials contributes to these topological properties. Our study reveals distinct topological role of the {\\theta} term more clearly than ever before. Our results confirm that the topological properties of DSMs with a single Dirac cone remain stable under external influences and that a topologically robust DSM laser can be developed accordingly", "url": "https://arxiv.org/abs/2603.23001", "type": "理论", "summary": "在这项研究中，受非厄米物理学最新进展的推动，我们通过散射技术利用光谱奇点探索狄拉克半金属（DSM）的新特性，目的是发现其他独特的性质。为了实现这一目标，我们通过分析 DSM 与电磁波的相互作用来研究 DSM 的轴子纹理如何影响其拓扑特性。我们研究了横向电（TE）模式配置，其中磁电效应在这些材料中产生二向色性。这种行为特别有趣，并且在潜在的 DSM 候选人中很常见。因此，我们首次报道二向色 DSM 产生 12 种独特的拓扑激光类型。我们发现表面电流是由 DSM 板表面的拓扑项产生的。此外，我们还研究了拓扑材料中与轴子相关的 {\\theta} 项如何影响这些拓扑性质。我们的研究比以往任何时候都更清楚地揭示了 {\\theta} 项的独特拓扑作用。\n\n我们的结果证实，具有单个狄拉克锥的 DSM 的拓扑特性在外部影响下保持稳定，并且可以相应地开发拓扑鲁棒的 DSM 激光器", "authors": [{"name": "Mustafa Sarisaman"}, {"name": "Murat Taş"}, {"name": "Enes Talha Kırca"}], "featured_authors": [{"name": "Mustafa Sarisaman"}, {"name": "Murat Taş"}, {"name": "Enes Talha Kırca"}], "author_count": 3}, {"id": "2603.23021", "category": "cond-mat", "title": "Dynamics of Aligning Active Matter: Mapping to a Schrödinger Equation and Exact Diagonalization", "abstract": "There has been recent interest in the relaxational modes of small-scale fully connected systems of aligning self-propelled particles (Spera et al., Phys. Rev. Lett. {\\bf 132}: 078301 (2024)). We revisit the classical connection between Fokker-Planck and Schrödinger equations to address this by means of exact diagonalization, allowing for rigorous analytical insight into the full spectrum. This allows us to extract exact results which we compare to the existing result from linearized statistical field theory. We derive asymptotically correct analytical results that improve upon the prior approximations. We show that this methodology can fruitfully be extended to the case of non-reciprocal interactions which gives rise to a non-Hermitian Schrödinger problem akin to those in open quantum mechanics. While the non-reciprocity can be chosen such as not to alter the stationary distribution, it fundamentally changes the nature of the steady state which we quantify via the entropy production. We discuss the case of low particle numbers as well as the emergence of mean-field dynamics at large numbers.", "url": "https://arxiv.org/abs/2603.23021", "type": "理论+数值", "summary": "最近人们对排列自推进粒子的小规模全连接系统的松弛模式产生了兴趣（Spera 等人，Phys. Rev. Lett. {\\bf 132}：078301 (2024)）。我们重新审视福克-普朗克方程和薛定谔方程之间的经典联系，通过精确对角化来解决这个问题，从而对全谱进行严格的分析洞察。这使我们能够提取精确的结果，并将其与线性统计场理论的现有结果进行比较。我们得出渐近正确的分析结果，改进了先前的近似值。我们表明，这种方法可以有效地扩展到非互易相互作用的情况，这会产生类似于开放量子力学中的非厄米薛定谔问题。虽然可以选择非互易性，例如不改变平稳分布，但它从根本上改变了我们通过熵产生量化的稳态的性质。我们讨论低粒子数的情况以及大量平均场动力学的出现。", "authors": [{"name": "Tara Steinhöfel"}, {"name": "Horst-Holger Boltz"}, {"name": "Thomas Ihle"}], "featured_authors": [{"name": "Tara Steinhöfel"}, {"name": "Horst-Holger Boltz"}, {"name": "Thomas Ihle"}], "author_count": 3}, {"id": "2603.23026", "category": "cond-mat", "title": "Transformation of the Talbot effect in response to phase disorder", "abstract": "Bose-Einstein condensates initially arranged in a long chain freely expand and interfere. If the initial phases of the condensates are identical, the initial density distribution is restored periodically during the expansion, giving rise to the Talbot effect. Even a slight disorder in the initial phases leads to a transformation of the interference pattern. In response to the phase disorder, the spectrum of the spatial density distribution acquires peaks that are absent in the case of identical phases. We derive an analytical expression for the spectrum of the spatial density distribution for an arbitrary phase disorder. We show that the new peaks emerging due to the phase disorder originate from pairwise interferences of the condensates. The positions of these peaks coincide with the wave vectors of the density modulations (wavelets) generated by such pairwise interferences. The absence of these peaks, when the initial phases are identical, is explained by the mutual destruction of the overlapping wavelets during their summation.", "url": "https://arxiv.org/abs/2603.23026", "type": "理论", "summary": "玻色-爱因斯坦凝聚体最初排列成长链，自由膨胀和干涉。如果凝聚体的初始相相同，则初始密度分布在膨胀过程中会定期恢复，从而产生塔尔伯特效应。即使初始阶段出现轻微的紊乱也会导致干涉图样的转变。为了响应相位无序，空间密度分布的频谱获得在相同相位的情况下不存在的峰值。我们推导出任意相紊乱的空间密度分布谱的解析表达式。我们表明，由于相位紊乱而出现的新峰源于凝聚态的成对干扰。这些峰值的位置与由这种成对干涉生成的密度调制（小波）的波矢量一致。当初始相位相同时，这些峰值的缺失可以通过重叠小波在求和过程中的相互破坏来解释。", "authors": [{"name": "Ilia Mosaki"}, {"name": "A. V. Turlapov"}], "featured_authors": [{"name": "Ilia Mosaki"}, {"name": "A. V. Turlapov"}], "author_count": 2}, {"id": "2603.23058", "category": "cond-mat", "title": "Basis dependence of eigenstate thermalization", "abstract": "Eigenstate thermalization refers to the property that an energy eigenstate of a many-body system is indistinguishable from a thermal equilibrium ensemble at the same energy as far as expectation values of local observables are concerned. In systems with degeneracies, the choice of an energy eigenbasis is not unique and the fraction of basis states exhibiting eigenstate thermalization can vary. We present a simple example where this fraction vanishes in the thermodynamic limit for one basis choice, but remains nonzero for another choice. In other words, the weak eigenstate thermalization hypothesis is satisfied in the first, but violated in the second basis. We furthermore prove that degeneracies must abound whenever a system is simultaneously symmetric under spatial translations and reflection. Finally, we derive general bounds on how strongly eigenstate thermalization may depend on the choice of the basis, and we reveal some interesting implications regarding the temporal relaxation properties of such systems.", "url": "https://arxiv.org/abs/2603.23058", "type": "理论", "summary": "本征态热化是指就局部可观测量的期望值而言，多体系统的能量本征态与相同能量下的热平衡系综无法区分的性质。在具有简并性的系统中，能量本征基的选择不是唯一的，并且表现出本征态热化的基态的分数可以变化。我们提出一个简单的例子，其中该分数在一个基本选择的热力学极限中消失，但对于另一种选择则保持非零。换句话说，弱本征态热化假说在第一个基础中得到满足，但在第二个基础中被违反。我们进一步证明，当系统在空间平移和反射下同时对称时，简并性必定大量存在。最后，我们得出了本征态热化对基础选择的影响程度的一般界限，并且我们揭示了有关此类系统的时间弛豫特性的一些有趣的含义。", "authors": [{"name": "Lennart Dabelow"}, {"name": "Christian Eidecker-Dunkel"}, {"name": "Peter Reimann"}], "featured_authors": [{"name": "Lennart Dabelow"}, {"name": "Christian Eidecker-Dunkel"}, {"name": "Peter Reimann"}], "author_count": 3}, {"id": "2603.23137", "category": "cond-mat", "title": "Open Quantum System Theory of Muon Spin Relaxation in Materials", "abstract": "We present a non-Markovian theory of muon spin relaxation that treats the implanted muon as an open quantum spin coupled to a temporally correlated local magnetic environment. Using a Schwinger-Keldysh influence-functional formulation, we derive a spin stochastic equation of motion in which colored fluctuations and retarded memory torque appear on equal footing. In the appropriate limits, the theory reduces to standard Kubo-Toyabe descriptions. This enables quantitative, global analysis of zero-field (ZF) and weak longitudinal-field (LF) $\\mu$SR spectra beyond the strong-collision approximation. Applied to $\\mathrm{Li}_{0.73}\\mathrm{CoO}_2$ when the muon is frozen at the stopping site, the approach separates static and Li-driven components, finds a thermally activated fluctuation rate over the intermediate-temperature window, and identifies a clear non-Markovian signature in the ZF/weak-LF line shapes captured by a retarded backaction/memory kernel.", "url": "https://arxiv.org/abs/2603.23137", "type": "理论", "summary": "我们提出了一种非马尔可夫的 μ 子自旋弛豫理论，该理论将植入的 μ 子视为与时间相关的局部磁环境耦合的开放量子自旋。使用 Schwinger-Keldysh 影响函数公式，我们推导了一个自旋随机运动方程，其中颜色波动和延迟记忆扭矩出现在平等的基础上。在适当的限度内，该理论可简化为标准的 Kubo-Toyabe 描述。这使得能够对零场 (ZF) 和弱纵向场 (LF) $\\mu$SR 光谱进行超出强碰撞近似的定量、全局分析。应用于$\\mathrm{Li}_{0.73}\\mathrm{CoO}_2$，当μ介子在停止位点被冻结时，该方法分离静态和Li驱动组件，找到中间温度窗口上的热激活波动率，并在延迟反作用/记忆内核捕获的ZF/weak-LF线形状中识别出清晰的非马尔可夫特征。", "authors": [{"name": "Elvis F. Arguelles"}, {"name": "Osamu Sugino"}], "featured_authors": [{"name": "Elvis F. Arguelles"}, {"name": "Osamu Sugino"}], "author_count": 2}, {"id": "2603.23145", "category": "cond-mat", "title": "Impurity quadrupole moments as local probes of flux sectors in the Kitaev spin liquid", "abstract": "Emergent fluxes play a central role in the low-energy properties of quantum spin liquids (QSLs), where they encode the underlying gauge structure and fractionalization of spins. Here, we show that the quadrupole moment of magnetic impurities provides a direct probe of these flux configurations in QSLs. Employing the SO(6) Majorana representation for spin-3/2 impurity operators in the isotropic Kitaev spin liquid together with a self-consistent mean-field approximation for impurity-related terms, we show that the ground-state flux sector can be identified by discontinuous jumps of the impurity quadrupole moment at the flux sector transition points. We also demonstrate that the quadrupole correlations between impurities under a magnetic field exhibit exponential decay, with decay rates that depend sensitively on the flux sector. Furthermore, we discuss the stability of pi fluxes bound to impurities with respect to model parameters and internal flux configurations, and relate our findings to Lieb's conjecture on flux configurations. These results establish the quadrupole moments of magnetic impurities as a sensitive tool to study fractionalized excitations and flux physics in Kitaev magnets.", "url": "https://arxiv.org/abs/2603.23145", "type": "理论", "summary": "突现通量在量子自旋液体（QSL）的低能特性中发挥着核心作用，它们编码底层的规范结构和自旋的分数化。在这里，我们证明磁性杂质的四极矩提供了 QSL 中这些通量配置的直接探测。采用各向同性 Kitaev 自旋液体中自旋 3/2 杂质算子的 SO(6) 马约拉纳表示以及杂质相关项的自洽平均场近似，我们表明可以通过通量扇区转变点处杂质四极矩的不连续跳跃来识别基态通量扇区。我们还证明，磁场下杂质之间的四极相关性表现出指数衰减，衰减率敏感地取决于通量扇区。此外，我们讨论了与杂质结合的 pi 通量在模型参数和内部通量配置方面的稳定性，并将我们的发现与 Lieb 关于通量配置的猜想联系起来。\n\n这些结果将磁性杂质的四极矩确立为研究基塔耶夫磁体中的分级激励和磁通物理的灵敏工具。", "authors": [{"name": "Masahiro O. Takahashi"}, {"name": "Wen-Han Kao"}, {"name": "Satoshi Fujimoto"}, {"name": "Natalia B. Perkins"}], "featured_authors": [{"name": "Masahiro O. Takahashi"}, {"name": "Wen-Han Kao"}, {"name": "Satoshi Fujimoto"}, {"name": "Natalia B. Perkins"}], "author_count": 4}, {"id": "2603.23154", "category": "cond-mat", "title": "From Quantum Dimers to the $π$-flux Toric Code via Deconfined Multicriticality", "abstract": "Two-dimensional Rokhsar-Kivelson (RK) dimer models on bipartite lattices are generally limited to translation-symmetry-broken dimer crystals. We introduce a tensor-product regularisation of the dimer Hilbert space that yields a qubit Hamiltonian interpolating from the RK model to the $\\pi$-flux toric code, thereby accessing a deconfined $\\mathbb{Z}_2$ topological liquid. In this framework, the $\\mathbb{Z}_2$ liquid descends from a multicritical $U(1)$ spin liquid through condensation of a charge-2 Higgs field, thus avoiding confinement. Using iDMRG together with low-energy field theory, we determine a phase diagram containing two continuous quantum phase transitions -- a $3\\mathrm{D}$ XY$^{\\ast}$ transition between the $\\mathbb{Z}_2$ liquid and the columnar/plaquette-VBS, and a quantum Lifshitz transition between two dimer crystals -- alongside a first-order transition between the staggered crystal and the $\\mathbb{Z}_2$ liquid. Our field theory suggests a deconfined multicritical point described by an Abelian Higgs model with dynamical critical exponent, $z=2$, where the three transitions meet, highlighting the interplay of fractionalisation and emergent gauge fluctuations.", "url": "https://arxiv.org/abs/2603.23154", "type": "理论+数值", "summary": "二分晶格上的二维 Rokhsar-Kivelson (RK) 二聚体模型通常仅限于平移对称性破缺的二聚体晶体。我们引入了二聚体希尔伯特空间的张量积正则化，产生从 RK 模型到 $\\pi$-flux toric 代码插值的量子位哈密顿量，从而访问解除限制的 $\\mathbb{Z}_2$ 拓扑液体。在此框架中，$\\mathbb{Z}_2$ 液体通过电荷 2 希格斯场的凝结从多临界 $U(1)$ 自旋液体下降，从而避免了限制。使用 iDMRG 与低能场理论，我们确定了包含两个连续量子相变的相图 - $\\mathbb{Z}_2$ 液体和柱状/板状 VBS 之间的 $3\\mathrm{D}$ XY$^{\\ast}$ 相变，以及两个二聚体晶体之间的量子 Lifshitz 相变 - 以及交错晶体和 $\\mathbb{Z}_2$ 液体之间的一阶相变。我们的场论提出了一个由阿贝尔希格斯模型描述的去限制多临界点，其动态临界指数为$z=2$，其中三个转变相交，突出了分数化和紧急规范波动的相互作用。", "authors": [{"name": "Ankush Chaubey"}, {"name": "Sergej Moroz"}, {"name": "Subhro Bhattacharjee"}], "featured_authors": [{"name": "Ankush Chaubey"}, {"name": "Sergej Moroz"}, {"name": "Subhro Bhattacharjee"}], "author_count": 3}, {"id": "2603.23225", "category": "cond-mat", "title": "Dynamics of O(2) excitations in a non-reciprocal medium", "abstract": "We investigate emergent dynamics due to non-reciprocity in the $\\mathcal{O}(2)$ model. The lattice XY model, where non-reciprocity stems from vision cone like couplings, can be described by a continuum description in which non-reciprocity translates into a new term depending on the rotational of the orientation field. We argue that non-reciprocity is akin to activity and we highlight the connection between our hydrodynamic equation and the constant density Toner-Tu framework. The active force advects and reshapes patterns, a generic feature found in many non-reciprocal systems. We show how $1d$ excitations in the non-reciprocal $\\mathcal{O}(2)$ model can be described by a generalized Burgers equation, derived from our continuum model. We then extend the results to $2d$ perturbations. As such, we establish the first principles of excitation trajectory control in a non-reciprocal $\\mathcal{O}(2)$ medium. Concretely, we explain how tuning the degree of non-reciprocity and the orientation of the background medium impacts the time evolution of excitations. We also showcase how initially different excitations lead to very different dynamical behavior. Non-reciprocity also affects the stability of defect-free excitations with non-zero winding numbers and, unlike in its equilibrium $O(2)$ counterpart, enables the system, above a certain threshold, to relax to its ground state.", "url": "https://arxiv.org/abs/2603.23225", "type": "理论", "summary": "我们研究 $\\mathcal{O}(2)$ 模型中由于非互易性而产生的紧急动态。晶格 XY 模型中的非互易性源于视锥状耦合，可以通过连续统描述来描述，其中非互易性根据方向场的旋转转化为一个新术语。我们认为非互易性类似于活动，并且我们强调了我们的流体动力学方程和恒定密度 Toner-Tu 框架之间的联系。主动力平流并重塑模式，这是许多非互易系统中的通用特征。我们展示了非互易 $\\mathcal{O}(2)$ 模型中的 $1d$ 激励如何通过从我们的连续介质模型导出的广义 Burgers 方程来描述。然后我们将结果扩展到 $2d$ 扰动。因此，我们建立了非互易 $\\mathcal{O}(2)$ 介质中激励轨迹控制的首要原理。具体来说，我们解释了调整非互易性程度和背景介质的方向如何影响激励的时间演化。我们还展示了最初不同的激励如何导致非常不同的动态行为。\n\n非互易性还会影响具有非零绕组数的无缺陷激励的稳定性，并且与平衡 $O(2)$ 对应物不同，非互易性使系统在高于某个阈值时能够松弛到基态。", "authors": [{"name": "Ylann Rouzaire"}, {"name": "Daniel JG Pearce"}, {"name": "Ignacio Pagonabarraga"}, {"name": "Demian Levis"}], "featured_authors": [{"name": "Ylann Rouzaire"}, {"name": "Daniel JG Pearce"}, {"name": "Ignacio Pagonabarraga"}, {"name": "Demian Levis"}], "author_count": 4}, {"id": "2603.23254", "category": "cond-mat", "title": "A $q$-Caputo Fractional Generalization of Tsallis Entropy: Series Representation and Non-Negativity Domains", "abstract": "We introduce a fractional generalization of Tsallis entropy by acting with a $q$-Caputo operator on the generating family $\\sum_i p_i^{\\,x}$ evaluated at $x=1$. Concretely, we define $S_{q}^{\\alpha}$ through the $q$-Caputo differintegral of order $0<\\alpha<1$ and derive a closed series representation in terms of the $q$-Gamma function. The construction is anchored at the evaluation point, which ensures well-behaved limits: as $\\alpha\\!\\to\\!1$ we recover the standard Tsallis entropy $S_q$. Finally we perform a numerical calculation to show the regions where the obtained $q$-fractional entropy $S^{\\alpha}_q$ can be non-negative (or negative) through the fractional parameter $\\alpha$ and the non extensive index $q$.", "url": "https://arxiv.org/abs/2603.23254", "type": "数值", "summary": "我们通过在 $x=1$ 处评估的生成族 $\\sum_i p_i^{\\,x}$ 上使用 $q$-Caputo 算子来引入 Tsallis 熵的分数推广。具体来说，我们通过$0<\\alpha<1$阶的$q$-Caputo微分积分来定义$S_{q}^{\\alpha}$，并根据$q$-Gamma函数导出一个闭级数表示。该结构锚定在评估点，这确保了良好的限制：当 $\\alpha\\!\\to\\!1$ 时，我们恢复标准 Tsallis 熵 $S_q$。最后我们进行数值计算，通过分数参数$\\alpha$和非广延索引$q$来显示所获得的$q$-分数熵$S^{\\alpha}_q$可以为非负（或负）的区域。", "authors": [{"name": "Matias P. Gonzalez"}, {"name": "Micolta-Riascos Bayron"}], "featured_authors": [{"name": "Matias P. Gonzalez"}, {"name": "Micolta-Riascos Bayron"}], "author_count": 2}, {"id": "2603.23264", "category": "cond-mat", "title": "Tunable Goos--Hänchen shifts and group delay time in single-barrier silicene", "abstract": "We investigate the Goos--Hänchen (GH) shifts and group delay time of Dirac fermions traversing a rectangular electrostatic potential barrier in silicene. By analyzing their dependence on the incident angle, barrier height, barrier width, and incident energy, we demonstrate that the GH shifts exhibit pronounced oscillations arising from quantum interference within the barrier region. The amplitude and number of oscillation peaks increase with increasing energy, barrier width, and incidence angle, resulting in enhanced lateral beam displacement. Meanwhile, the group delay time exhibits resonant features associated with the formation of quasi-bound states, increasing with barrier width, energy, and incidence angle, while decreasing with increasing barrier height. These results clarify how barrier-induced quantum interference controls both the lateral and temporal dynamics of Dirac fermions in silicene, highlighting the potential role of electrostatic barriers in enabling tunable transport in two-dimensional Dirac materials.", "url": "https://arxiv.org/abs/2603.23264", "type": "理论", "summary": "我们研究了穿过硅烯中矩形静电势垒的狄拉克费米子的古斯-汉兴 (GH) 位移和群延迟时间。通过分析它们对入射角、势垒高度、势垒宽度和入射能量的依赖性，我们证明 GH 位移表现出由势垒区域内的量子干涉引起的明显振荡。振荡峰值的幅度和数量随着能量、势垒宽度和入射角的增加而增加，从而导致横向光束位移增强。同时，群延迟时间表现出与准束缚态形成相关的共振特征，随着势垒宽度、能量和入射角的增加而增加，而随着势垒高度的增加而减少。这些结果阐明了势垒引起的量子干涉如何控制硅烯中狄拉克费米子的横向和时间动力学，突出了静电势垒在实现二维狄拉克材料中的可调谐传输方面的潜在作用。", "authors": [{"name": "Youssef Fattasse"}, {"name": "Hocine Bahlouli"}, {"name": "Clarence Cortes"}, {"name": "David Laroze"}, {"name": "Ahmed Jellal"}], "featured_authors": [{"name": "Youssef Fattasse"}, {"name": "Hocine Bahlouli"}, {"name": "Clarence Cortes"}, {"name": "David Laroze"}, {"name": "Ahmed Jellal"}], "author_count": 5}, {"id": "2603.23307", "category": "cond-mat", "title": "Occupation-selective topological pumping from Floquet gauge fields", "abstract": "Topological pumping is conventionally governed by single-particle band topology. Here we show that promoting tunneling to a dynamical, occupation-conditioned variable fundamentally reshapes this paradigm, leading to occupation-selective topological pumping. In a periodically driven one-dimensional superlattice with density-dependent hopping, two-body bound states (doublons) acquire Chern numbers distinct from those of single particles and exhibit quantized transport even when the single-particle pump is trivial, including counter-propagating responses. We identify a dynamical-gauge-field mechanism that induces topological phase transitions in the bound-state sector absent from the single-particle spectrum. Furthermore, the gauge field concentrates Berry curvature into sharply localized resonant regions without compromising adiabatic quantization. A Floquet realization with ultracold atoms is proposed to realize such occupation-selective pumping. Our results reveal a mechanism for occupation-selective topological responses that can persist across higher-occupancy bound states.", "url": "https://arxiv.org/abs/2603.23307", "type": "理论", "summary": "拓扑泵浦通常由单粒子带拓扑控制。在这里，我们表明，促进动态的、占据条件变量的隧道效应从根本上重塑了这种范式，导致占据选择性拓扑泵浦。在具有依赖于密度的跳跃的周期性驱动的一维超晶格中，二体束缚态（双隆）获得与单粒子不同的陈数，并且即使单粒子泵很微不足道，也表现出量子传输，包括反向传播响应。我们确定了一种动态规范场机制，可以在单粒子光谱中不存在的束缚态部分中诱导拓扑相变。此外，规范场将贝里曲率集中到尖锐的局部谐振区域，而不影响绝热量子化。提出了利用超冷原子的 Floquet 实现来实现这种占据选择性泵浦。我们的结果揭示了一种占据选择性拓扑响应的机制，该机制可以在更高占据约束状态下持续存在。", "authors": [{"name": "Wenjie Liu"}, {"name": "Ching Hua Lee"}, {"name": "Zhoutao Lei"}], "featured_authors": [{"name": "Wenjie Liu"}, {"name": "Ching Hua Lee"}, {"name": "Zhoutao Lei"}], "author_count": 3}, {"id": "2603.23314", "category": "cond-mat", "title": "Correlation-driven enhancement of pairing in a nematic Hund's metal", "abstract": "Superconductivity and nematicity coexist in the phase diagram of many correlated systems, including iron-based superconductors. We investigate how Hund-driven correlations reshape boson-mediated superconductivity in a multiorbital nematic metal. We find that dynamical correlation effects beyond a quasiparticle-only description are essential to capture the robustness of superconductivity in the Hund regime. In the nematic phase, Hund correlations simultaneously enhance the orbital differentiation of the superconducting gaps and inhibit the most extreme nematic-driven orbital polarization and coherence collapse that would otherwise suppress pairing at strong coupling. A controlled cutoff analysis reveals a nontrivial, orbital-dependent buildup of the gaps, indicating that different frequency windows of the correlated spectrum contribute unevenly to pairing in the nematic Hund regime. This implies that pairing mechanisms with different characteristic boson energies can lead to distinct gap structures and trends.", "url": "https://arxiv.org/abs/2603.23314", "type": "理论+数值", "summary": "超导性和向列性共存于许多相关系统的相图中，包括铁基超导体。我们研究洪德驱动的相关性如何重塑多轨道向列金属中玻色子介导的超导性。我们发现，超越仅准粒子描述的动力学相关效应对于捕捉洪德体系中超导性的鲁棒性至关重要。在向列相中，亨德关联同时增强了超导间隙的轨道分化，并抑制了最极端的向列驱动的轨道极化和相干性崩溃，否则会抑制强耦合时的配对。受控截止分析揭示了间隙的不平凡的、依赖于轨道的累积，表明相关频谱的不同频率窗口对向列洪德体系中的配对的贡献不均匀。这意味着具有不同特征玻色子能量的配对机制可以导致不同的间隙结构和趋势。", "authors": [{"name": "Angelo Valli"}, {"name": "Laura Fanfarillo"}], "featured_authors": [{"name": "Angelo Valli"}, {"name": "Laura Fanfarillo"}], "author_count": 2}, {"id": "2603.23320", "category": "cond-mat", "title": "Internal stress drives ferromagnetic-like ordering in networks of proliferating bacteria", "abstract": "Proliferation is a defining feature of life. Through growth, division, and death, living systems consume energy and inject mass, breaking conservation laws and driving collective phenomena from biofilm formation to embryonic development. Yet, while active matter physics has advanced our understanding of self-propelled agents, quantitative frameworks for proliferating systems are still emerging, and most work focuses on simplified settings. Here, we study \\textit{ this http URL } bacteria growing inside a network of single-file microchannels as a minimal model of structured environments. Competition for free volume drives the spontaneous emergence of coherent growth patterns that persist across generations but vanish when the channel links exceed the typical cell size at birth. Despite the strongly out-of-equilibrium character of the dynamics, the observed phenomenology can be quantitatively captured by an effective equilibrium description in which the flow state at each node is represented by a spin variable with ferromagnetic interactions. Simulations of growing elastic cells show that this coupling arises from internal stress accumulated at network nodes due to dynamical constraints. Our results reveal a surprising correspondence between proliferating active matter and equilibrium statistical mechanics, highlighting open fundamental questions and offering a first step toward describing growth phenomena in real-world complex environments.", "url": "https://arxiv.org/abs/2603.23320", "type": "理论+数值", "summary": "增殖是生命的一个决定性特征。通过生长、分裂和死亡，生命系统消耗能量并注入质量，打破守恒定律并推动从生物膜形成到胚胎发育的集体现象。然而，虽然活性物质物理学增进了我们对自驱动体的理解，但增殖系统的定量框架仍在不断出现，并且大多数工作都集中在简化的设置上。在这里，我们研究 \\textit{ this http URL } 在单文件微通道网络内生长的细菌作为结构化环境的最小模型。对自由体积的竞争推动了连贯生长模式的自发出现，这种生长模式在几代人中持续存在，但当通道连接超过出生时的典型细胞大小时就会消失。尽管动力学具有强烈的不平衡特征，但观察到的现象学可以通过有效的平衡描述来定量捕获，其中每个节点的流动状态由具有铁磁相互作用的自旋变量表示。\n\n对生长弹性细胞的模拟表明，这种耦合是由于动态约束而在网络节点处积累的内应力引起的。我们的结果揭示了活性物质增殖与平衡统计力学之间令人惊讶的对应关系，突出了开放的基本问题，并为描述现实世界复杂环境中的生长现象迈出了第一步。", "authors": [{"name": "Nicola Pellicciotta"}, {"name": "Luca Angelani"}, {"name": "Roberto Di Leonardo"}], "featured_authors": [{"name": "Nicola Pellicciotta"}, {"name": "Luca Angelani"}, {"name": "Roberto Di Leonardo"}], "author_count": 3}, {"id": "2603.23347", "category": "cond-mat", "title": "The Fermi-Pasta-Ulam-Tsingou problem after 70 years: Universal laws of thermalization in lattice systems", "abstract": "Over the past decade, substantial progress has been made in clarifying a central question of the Fermi-Pasta-Ulam-Tsingou problem: whether weakly nonlinear lattice systems thermalize and, if so, through what mechanisms. The current understanding is as follows. (a) Classical lattice systems fall into two universal classes. In the first, the Hamiltonian has extended normal modes. For sufficiently large systems, the thermalization time scales as $T_{\\rm eq}\\sim g^{-\\gamma}$ with $\\gamma=2$, where $g$ denotes the effective nonlinear strength, i.e., the perturbation strength or degree of non-integrability. Thus, in the thermodynamic limit, these systems inevitably thermalize. Typical examples include common one-, two-, and three-dimensional lattice models. In the second class, all normal modes are localized. Here the relaxation time is essentially independent of system size. Although one may still formally write $T_{\\rm eq}\\sim g^{-\\gamma}$, the exponent $\\gamma$ diverges as $g\\to0$, implying that arbitrarily weak nonlinear perturbations cannot induce thermalization. For sufficiently small $g$, such systems may therefore be viewed, in a theoretical sense, as thermal insulators. (b) In systems of the first class, disorder does not obstruct thermalization. Rather, by breaking translational symmetry and relaxing wave-vector resonance constraints, it increases the number of quasi-resonant processes and can therefore accelerate thermalization. (c) In systems of the second class, when both on-site potentials and disorder are present, all normal modes become localized in sufficiently large systems, suppressing thermalization. The perturbative framework underlying these conclusions will also be presented systematically, with particular emphasis on the thermalization criterion based on resonance-network connectivity, an approach rooted in weak wave turbulence theory.", "url": "https://arxiv.org/abs/2603.23347", "type": "理论", "summary": "在过去的十年中，在阐明费米-帕斯塔-乌拉姆-钦古问题的一个核心问题方面取得了实质性进展：弱非线性晶格系统是否热化，如果是，通过什么机制实现。目前的理解如下。 (a) 经典晶格系统分为两个通用类别。首先，哈密顿量扩展了正常模式。对于足够大的系统，热化时间尺度为 $T_{\\rm eq}\\sim g^{-\\gamma}$，其中 $\\gamma=2$，其中 $g$ 表示有效非线性强度，即扰动强度或不可积程度。因此，在热力学极限下，这些系统不可避免地会热化。典型的例子包括常见的一维、二维和三维晶格模型。在第二类中，所有正常模式都是本地化的。这里弛豫时间基本上与系统尺寸无关。尽管人们仍然可以正式写成 $T_{\\rm eq}\\sim g^{-\\gamma}$，但指数 $\\gamma$ 发散为 $g\\to0$，这意味着任意弱的非线性扰动不能引起热化。因此，对于足够小的 $g$，此类系统在理论上可以被视为热绝缘体。\n\n(b) 在第一类系统中，无序不会阻碍热化。相反，通过打破平移对称性和放松波矢量共振约束，它增加了准共振过程的数量，因此可以加速热化。 (c) 在第二类系统中，当现场电势和无序同时存在时，所有简正模态都集中在足够大的系统中，从而抑制热化。这些结论背后的微扰框架也将被系统地提出，特别强调基于共振网络连通性的热化准则，这是一种植根于弱波湍流理论的方法。", "authors": [{"name": "Weicheng Fu"}, {"name": "Zhen Wang"}, {"name": "Wei Lin"}, {"name": "Dahai He"}, {"name": "Jiao Wang"}, {"name": "Yong Zhang"}, {"name": "Hong Zhao"}], "featured_authors": [{"name": "Weicheng Fu"}, {"name": "Zhen Wang"}, {"name": "Wei Lin"}, {"name": "Jiao Wang"}, {"name": "Yong Zhang"}, {"name": "Hong Zhao"}], "author_count": 7}, {"id": "2603.23349", "category": "cond-mat", "title": "Where Humpty Dumpty Breaks: Geometry-Driven Fracture in Ellipsoidal Shells", "abstract": "Fracture networks are ubiquitous in nature, spanning scales from millimeter-sized cracks in botanical peels to hundred-kilometer-long lineae on planetary satellites. The propagation of a crack is a complex, nonlinear phenomenon governed by the interplay of mechanical properties, rheological behavior, and system geometry. While fracture mechanics has long addressed structural failure, the relationship among fracture, elasticity, and nonlinear geometry has recently revived as a focal point in condensed matter and biophysics. However, a unified framework that systematically explains how surface geometry prescribes the transition between disparate fracture morphologies remains elusive. Here we show that shell curvature provides a geometric blueprint for fracture, governing the evolution of complex crack networks through induced stress anisotropy. By internally pressurizing thin, bilayer spheroidal shells, we demonstrate that a rich diversity of crack morphologies across lateral, longitudinal, and random orientations depends on the curvature ratio between the pole and the equator. We find that these patterns arise from the nonlinear mechanics of the shell, which can be leveraged to effectively control crack growth. Our results establish a direct link between structural curvature and fractures, providing a predictive framework that integrates nonlinear geometry with the classical Griffith and von Mises criteria. Beyond our model system, we find that the disparate fracture patterns observed in ripening muskmelons and in the icy crust of Europa follow the same geometric principles. We expect that this unified understanding of crack morphogenesis will inform the design principles of novel functional materials that are resilient to fracture and provide insights into the mechanical performance of curved biological and geophysical architectures.", "url": "https://arxiv.org/abs/2603.23349", "type": "理论", "summary": "裂缝网络在自然界中无处不在，其范围从植物果皮中毫米级的裂缝到行星卫星上数百公里长的线纹。裂纹的扩展是一种复杂的非线性现象，受机械性能、流变行为和系统几何形状相互作用的控制。虽然断裂力学长期以来一直致力于解决结构失效问题，但断裂、弹性和非线性几何之间的关系最近又重新成为凝聚态和生物物理学的焦点。然而，系统地解释表面几何形状如何规定不同断裂形态之间的转变的统一框架仍然难以捉摸。在这里，我们证明壳曲率提供了断裂的几何蓝图，通过诱导应力各向异性控制复杂裂纹网络的演化。通过对薄双层球壳进行内部加压，我们证明了横向、纵向和随机方向上裂纹形态的丰富多样性取决于极点和赤道之间的曲率比。\n\n我们发现这些模式源于壳体的非线性力学，可以利用它来有效控制裂纹扩展。我们的结果建立了结构曲率和断裂之间的直接联系，提供了一个将非线性几何与经典格里菲斯和冯米塞斯准则相结合的预测框架。除了我们的模型系统之外，我们发现在成熟的甜瓜和木卫二的冰壳中观察到的不同断裂模式遵循相同的几何原理。我们期望这种对裂纹形态发生的统一理解将为具有断裂弹性的新型功能材料的设计原理提供信息，并为弯曲生物和地球物理结构的机械性能提供见解。", "authors": [{"name": "Naoki Sekiya"}, {"name": "Yuri Akiba"}, {"name": "Kai Kageyama"}, {"name": "Hokuto Nagatakiya"}, {"name": "Ryuichi Tarumi"}, {"name": "Tomohiko G. Sano"}], "featured_authors": [{"name": "Naoki Sekiya"}, {"name": "Yuri Akiba"}, {"name": "Kai Kageyama"}, {"name": "Hokuto Nagatakiya"}, {"name": "Ryuichi Tarumi"}, {"name": "Tomohiko G. Sano"}], "author_count": 6}, {"id": "2603.23377", "category": "cond-mat", "title": "Glassy magnetic freezing of interacting clusters in LK-99-family materials", "abstract": "We report reproducible magnetization anomalies appearing below room temperature in copper-doped apatite materials belonging to the LK-99 family synthesized via hydrothermal methods. These anomalies are observed consistently across samples prepared under comparable conditions. Although the extracted Mydosh parameter lies within the range often associated with vortex-glass behavior in superconductors, a detailed analysis of DC magnetization, AC susceptibility, field dependence, and magnetic memory effects demonstrates that the observed phenomena are not related to superconductivity. Instead, the data are consistent with glassy magnetic freezing of interacting clusters. Compositional and structural analysis identifies covellite (CuS), an ubiquitous secondary phase in these intrinsically multiphase materials, as the primary origin of the observed behavior. Our results clarify the magnetic origin of LK-99-related anomalies and highlight the importance of phase complexity in interpreting apparent superconducting signatures in this materials family.", "url": "https://arxiv.org/abs/2603.23377", "type": "理论", "summary": "我们报告了通过水热法合成的属于 LK-99 家族的铜掺杂磷灰石材料在室温以下出现可重现的磁化异常。在可比条件下制备的样品中一致观察到这些异常现象。尽管提取的 Mydosh 参数位于通常与超导体中涡旋玻璃行为相关的范围内，但对直流磁化强度、交流磁化率、场依赖性和磁记忆效应的详细分析表明，观察到的现象与超导性无关。相反，这些数据与相互作用的簇的玻璃状磁冻结一致。成分和结构分析确定蓝铜矿 (CuS)（这些本质上多相材料中普遍存在的第二相）是所观察到的行为的主要来源。我们的结果阐明了 LK-99 相关异常的磁性起源，并强调了相复杂性在解释该材料家族中表观超导特征中的重要性。", "authors": [{"name": "Serafim Teknowijoyo"}, {"name": "Domenico Napoletani"}, {"name": "Vahan Nikoghosyan"}, {"name": "Armen Gulian"}], "featured_authors": [{"name": "Serafim Teknowijoyo"}, {"name": "Domenico Napoletani"}, {"name": "Vahan Nikoghosyan"}, {"name": "Armen Gulian"}], "author_count": 4}, {"id": "2603.23403", "category": "cond-mat", "title": "Topological Filtering and Emergent Kondo Scale", "abstract": "We study the Kondo effect induced by a topological soliton in a one-dimensional Dirac system with the sign-changing mass term. The soliton hosts a localized zero mode whose spatially extended wavefunction leads to a momentum-dependent exchange coupling with itinerant electrons. We show that this structure generates a nontrivial form factor that suppresses high-energy scattering processes, resulting in an energy-dependent effective Kondo coupling. As a consequence, the real-space structure of the soliton directly controls the emergent Kondo scale. This work establishes a mechanism by which topological defects control many-body energy scales through their wavefunction structure, suggesting a general principle for engineering many-body energy scales via topology.", "url": "https://arxiv.org/abs/2603.23403", "type": "理论", "summary": "我们研究了具有变号质量项的一维狄拉克系统中拓扑孤子引起的近藤效应。孤子具有局域零模式，其空间扩展的波函数导致与流动电子的动量相关交换耦合。我们表明，这种结构产生了一个重要的形状因子，可以抑制高能散射过程，从而产生依赖于能量的有效近藤耦合。因此，孤子的实空间结构直接控制出现的近藤尺度。这项工作建立了一种拓扑缺陷通过波函数结构控制多体能级的机制，提出了通过拓扑设计多体能级的一般原理。", "authors": [{"name": "Ryosuke Yoshii"}, {"name": "Rio Oto"}], "featured_authors": [{"name": "Ryosuke Yoshii"}, {"name": "Rio Oto"}], "author_count": 2}, {"id": "2603.23442", "category": "cond-mat", "title": "Structural Chart of Copper-Silver Nanoalloys through machine learning", "abstract": "Nanoalloys (or alloy nanoparticles) are an important class of materials that are promising for their functional properties. However, designing synthesis protocols to control their structure and chemical ordering is rather challenging. Part of this difficulty stems from the lack of information on their metastable and stable structures. Here, we develop a general computational framework to construct a structural chart of nanoalloys using 38-atom AgCu nanoalloys as a model system. Initially, the equilibrium structural distribution is sampled using parallel tempering combined with molecular dynamics (PTMD). Using a machine learning (ML) based approach, the vast number of sampled configurations are classified into various structural classes. This ML approach produces a single three-dimensional map in which all structures and compositions can be visualized and discriminated. Finally, a finite-temperature structural chart is constructed which provides information on the dominant structures across the entire range of compositions and temperatures. In addition, the structural chart reveals significant differences in thermal stability between nanoalloys and bulk alloys. The presented framework provides an effective route to compute and map the vast structural and chemical space of multicomponent nanoparticles, paving the way to the rational design of functional nanoalloys.", "url": "https://arxiv.org/abs/2603.23442", "type": "理论+数值", "summary": "纳米合金（或合金纳米粒子）是一类重要的材料，其功能特性很有前景。然而，设计合成方案来控制其结构和化学顺序是相当具有挑战性的。这一困难的部分原因在于缺乏有关其亚稳态和稳定结构的信息。在这里，我们开发了一个通用计算框架，以 38 原子 AgCu 纳米合金作为模型系统构建纳米合金的结构图。最初，使用平行回火结合分子动力学 (PTMD) 对平衡结构分布进行采样。使用基于机器学习 (ML) 的方法，大量采样配置被分为各种结构类别。这种机器学习方法会生成一个三维地图，其中所有结构和成分都可以可视化和区分。最后，构建了有限温度结构图，该图提供了整个成分和温度范围内主要结构的信息。此外，结构图揭示了纳米合金和块体合金之间热稳定性的显着差异。\n\n所提出的框架提供了计算和绘制多组分纳米粒子的巨大结构和化学空间的有效途径，为功能纳米合金的合理设计铺平了道路。", "authors": [{"name": "Manoj Settem"}, {"name": "Emanuele Telari"}, {"name": "Antonio Tinti"}, {"name": "Riccardo Ferrando"}, {"name": "Alberto Giacomello"}], "featured_authors": [{"name": "Manoj Settem"}, {"name": "Emanuele Telari"}, {"name": "Antonio Tinti"}, {"name": "Riccardo Ferrando"}, {"name": "Alberto Giacomello"}], "author_count": 5}, {"id": "2603.23477", "category": "cond-mat", "title": "Thickness effects in the electromechanical stability of charged biological membranes", "abstract": "Understanding how electric fields destabilize biological membranes is important for electroporation-based technologies and bioelectronic interfaces. However, theoretical descriptions of this phenomenon remain fragmented. Existing theories treat either electrostatics in membranes of finite thickness or electrohydrodynamic flows at idealized zero-thickness interfaces, leaving unresolved a unified description that simultaneously incorporates finite membrane thickness, surface charge, and bulk electrohydrodynamics. Here, we apply a recently-developed, dimension-reduction framework that captures the coupled electrohydrodynamic and mechanical effects governing height fluctuations of a charged lipid bilayer of thickness $\\delta$ in an electrolyte characterized by Debye screening length $\\lambda$. We derive voltage- and charge-dependent renormalizations of the effective surface tension and bending rigidity, along with a dispersion relation governing undulatory instabilities. A wide range of prior theoretical results arise as limiting cases of our more general theory when finite-thickness effects are neglected or screening is asymptotically strong. The key new contribution arises from traction moments generated across the finite membrane thickness, which are absent in zero-thickness descriptions. Under physiological screening ($\\delta/\\lambda\\sim 4$), these contributions account for more than $>70\\%$ of the total electrostatic correction to both surface tension and bending rigidity. The theory further reveals that surface charges can stabilize the membrane at physiological ionic strengths, increasing the effective tension and shifting electroporation thresholds in a manner that depends on charge asymmetry between the leaflets.", "url": "https://arxiv.org/abs/2603.23477", "type": "理论+数值", "summary": "了解电场如何破坏生物膜的稳定性对于基于电穿孔的技术和生物电子接口非常重要。然而，对这种现象的理论描述仍然支离破碎。现有理论要么处理有限厚度膜中的静电，要么处理理想化零厚度界面处的电流体动力学流动，而没有解决同时包含有限膜厚度、表面电荷和体电流体动力学的统一描述。在这里，我们应用了最近开发的降维框架，该框架捕获了耦合的电流体动力学和机械效应，控制着以德拜屏蔽长度 $\\lambda$ 为特征的电解质中厚度为 $\\delta$ 的带电脂质双层的高度波动。我们推导了有效表面张力和弯曲刚度的电压和电荷相关重整化，以及控制波动不稳定性的色散关系。当忽略有限厚度效应或筛选渐近强时，会出现各种先前的理论结果，作为我们更一般理论的限制情况。\n\n关键的新贡献来自于在有限膜厚度上产生的牵引力矩，这在零厚度描述中是不存在的。在生理筛选（$\\delta/\\lambda\\sim 4$）下，这些贡献占表面张力和弯曲刚度总静电校正的$>70\\%$以上。该理论进一步揭示，表面电荷可以将膜稳定在生理离子强度下，增加有效张力并以取决于小叶之间电荷不对称性的方式改变电穿孔阈值。", "authors": [{"name": "Sirui Ning"}, {"name": "Yannick A. D. Omar"}, {"name": "Karthik Shekhar"}, {"name": "Kranthi K. Mandadapu"}], "featured_authors": [{"name": "Sirui Ning"}, {"name": "Yannick A. D. Omar"}, {"name": "Karthik Shekhar"}, {"name": "Kranthi K. Mandadapu"}], "author_count": 4}, {"id": "2603.23493", "category": "cond-mat", "title": "Tunable Floquet selection rules in a driven Ising chain", "abstract": "We study a periodically driven spin-$1/2$ Ising chain with a nearest-neighbour coupling and longitudinal field while a weak transverse field induces single-spin flips. Through Floquet perturbation theory (FPT), we obtain signatures of Hilbert space fragmentation (HSF) and an unconventional form of dynamical localisation which we call the Floquet freezing. Our analysis suggests that these observations emerge due to a single Floquet selection rule that dictates the prethermal dynamics. For a special value of the field-to-interaction strength ratio together with commensurate drive periods, this rule permits only a constrained subset of bulk spin flips, leading to prethermal HSF in the full spin-$1/2$ Hilbert space. Under open boundary conditions, the same rule suppresses boundary spin flips up to higher order in perturbation and produces long-lived prethermal edge memory, which is neither topological in origin nor is a strong zero mode. Furthermore, under periodic boundary conditions, the largest surviving fragment is exactly the PXP sector at leading order and therefore exhibits Floquet-inherited scar phenomenology in the prethermal window. At higher commensurate ratios of field strength to interaction strength, all first-order single-spin-flip channels are suppressed and the system enters a regime of Floquet freezing. Hence, our study leverages the selection rules obtained through Floquet perturbation theory to obtain exotic prethermal phenomena at different parameter regimes.", "url": "https://arxiv.org/abs/2603.23493", "type": "理论", "summary": "我们研究了周期性驱动的自旋 $1/2$ Ising 链，具有最近邻耦合和纵向场，而弱横向场则引起单自旋翻转。通过 Floquet 微扰理论（FPT），我们获得了希尔伯特空间碎片（HSF）的特征和一种非常规的动态定位形式，我们称之为 Floquet 冻结。我们的分析表明，这些观察结果的出现是由于决定热前动力学的单一 Floquet 选择规则。对于场与相互作用强度比的特殊值以及相称的驱动周期，该规则仅允许批量自旋翻转的受约束子集，从而导致在全自旋-$1/2$希尔伯特空间中出现预热HSF。在开放边界条件下，相同的规则抑制边界自旋在扰动中翻转到更高阶，并产生长寿命的预热边缘记忆，它既不是拓扑起源也不是强零模式。此外，在周期性边界条件下，最大的幸存碎片正是主序的 PXP 扇区，因此在预热窗口中表现出 Floquet 继承的疤痕现象。\n\n在场强与相互作用强度的比例较高时，所有一阶单自旋翻转通道都被抑制，系统进入 Floquet 冻结状态。因此，我们的研究利用通过 Floquet 微扰理论获得的选择规则来获得不同参数范围下的奇异预热现象。", "authors": [{"name": "Rishi Paresh Joshi"}, {"name": "Sanchayan Banerjee"}, {"name": "Sneha Narasimha Moorthy"}, {"name": "Tapan Mishra"}], "featured_authors": [{"name": "Rishi Paresh Joshi"}, {"name": "Sanchayan Banerjee"}, {"name": "Sneha Narasimha Moorthy"}, {"name": "Tapan Mishra"}], "author_count": 4}, {"id": "2603.23494", "category": "cond-mat", "title": "Active learning-enabled multi-objective design of thermally conductive and mechanically compliant polymers", "abstract": "Polymers are attractive in applications like flexible electronics and thermal interface materials due to their mechanical compliance and processability. However, conventional polymers have low thermal conductivity (TC), limiting their heat dissipation performance. Identifying polymers that simultaneously achieve high intrinsic TC and mechanical flexibility (i.e., low modulus) remains a challenge. Here, we develop an active learning (AL) framework based on multi-objective Bayesian optimization (MOBO) to discover polymers exhibiting both high TC and low bulk modulus. Initially, a high-throughput molecular dynamics (MD) pipeline generated an initial dataset, and independent Deep Kernel Learning (DKL) surrogate models were trained for TC and bulk modulus to predict properties and uncertainties. Using the parallel noisy expected hypervolume improvement (qNEHVI) acquisition function, the framework iteratively screens a larger unlabeled polymer database, systematically recommends new polymer candidates for MD evaluation, and updates the DKL models with newly acquired data. Ultimately, six candidates were identified on the Pareto front, representing optimal trade-offs between TC and modulus. Interpretability analysis further revealed molecular features associated with these trade-offs, and synthesizability assessment supported the practical relevance of the selected candidates. By combining MD simulations with AL-enabled MOBO, our workflow mitigates data scarcity, reduces development time, and provides actionable guidance for designing multifunctional polymers tailored for different applications.", "url": "https://arxiv.org/abs/2603.23494", "type": "理论+数值", "summary": "聚合物由于其机械顺应性和可加工性，在柔性电子和热界面材料等应用中颇具吸引力。然而，传统聚合物的导热率（TC）较低，限制了其散热性能。识别同时实现高固有TC和机械柔韧性（即低模量）的聚合物仍然是一个挑战。在这里，我们开发了一个基于多目标贝叶斯优化 (MOBO) 的主动学习 (AL) 框架，以发现同时具有高 TC 和低体积模量的聚合物。最初，高通量分子动力学 (MD) 管道生成初始数据集，并针对 TC 和体积模量训练独立的深度核学习 (DKL) 替代模型，以预测属性和不确定性。使用并行噪声预期超体积改进 (qNEHVI) 采集功能，该框架迭代筛选更大的未标记聚合物数据库，系统地推荐用于 MD 评估的新聚合物候选，并使用新采集的数据更新 DKL 模型。\n\n最终，在帕累托前沿确定了六个候选者，代表了 TC 和模量之间的最佳权衡。可解释性分析进一步揭示了与这些权衡相关的分子特征，可合成性评估支持了所选候选物的实际相关性。通过将 MD 模拟与支持 AL 的 MOBO 相结合，我们的工作流程缓解了数据稀缺性、缩短了开发时间，并为设计针对不同应用量身定制的多功能聚合物提供了可行的指导。", "authors": [{"name": "Yuhan Liu"}, {"name": "Jiaxin Xu"}, {"name": "Renzheng Zhang"}, {"name": "Meng Jiang"}, {"name": "Tengfei Luo"}], "featured_authors": [{"name": "Yuhan Liu"}, {"name": "Jiaxin Xu"}, {"name": "Renzheng Zhang"}, {"name": "Meng Jiang"}, {"name": "Tengfei Luo"}], "author_count": 5}, {"id": "2603.22388", "category": "hep-th", "title": "A Conformal Bridge for the Light Transform of QCD Correlation Functions", "abstract": "Understanding the link between correlation functions (CFs) of local operators and measurable collider correlators has emerged as a new opportunity in the study of gauge theory dynamics at colliders. While in Conformal Field Theories (CFTs) this connection is established by the light transform, the non-conformal nature of QCD complicates its use beyond the lowest perturbative order. We show that a continuation of the CFs to the Wilson-Fisher fixed point can be used as a method to overcome these obstacles, serving as a conformal bridge for the evaluation of the light transform. At the fixed point, the renormalized CF of four local operators features a variable drop and only depends on two conformal cross ratios, in line with a genuine CFT quantity. This allows us to exploit CFT techniques to perform, for the first time, its light transform at higher loop orders. Remarkably, the resulting collider correlator in four dimensions can be recovered from this result simply by using lower-loop data. We demonstrate this method by computing the back-to-back limit of the charge-charge correlation (QQC) at two loops in QCD through the light transform of the CF of four vector currents in the sequential light-cone limit, reproducing a recent prediction.", "url": "https://arxiv.org/abs/2603.22388", "type": "理论", "summary": "了解本地算子的相关函数（CF）与可测量对撞机相关器之间的联系已成为研究对撞机规范理论动力学的新机会。虽然在共形场论 (CFT) 中，这种联系是通过光变换建立的，但 QCD 的非共形性质使其在最低微扰阶之外的使用变得复杂。我们证明，CF 到 Wilson-Fisher 固定点的延续可以用作克服这些障碍的方法，作为评估光变换的共形桥。在固定点，四个局部算子的重整化 CF 具有可变下降，并且仅取决于两个共角交叉比，与真正的 CFT 量一致。这使我们能够利用 CFT 技术首次以更高的循环阶数执行光变换。值得注意的是，只需使用下环数据即可从该结果中恢复所得到的四维对撞机相关器。\n\n我们通过连续光锥极限中四个矢量电流的 CF 的光变换来计算 QCD 中两个环路处的电荷-电荷相关性
