(QQC) 的背靠背极限，从而演示了该方法，再现了最近的预测。", "authors": [{"name": "Hao Chen"}, {"name": "Pier Francesco Monni"}, {"name": "Zhaoyan Pang"}, {"name": "Gherardo Vita"}, {"name": "Hua Xing Zhu"}], "featured_authors": [{"name": "Hao Chen"}, {"name": "Pier Francesco Monni"}, {"name": "Zhaoyan Pang"}, {"name": "Gherardo Vita"}, {"name": "Hua Xing Zhu"}], "author_count": 5}, {"id": "2603.22395", "category": "hep-th", "title": "Super Sum rules for Long-Range Models", "abstract": "We study sum rules that control the Regge limit of one-dimensional conformal field theory (CFT) correlators and relate them to dual bulk scattering processes at high energies in $\\mathrm{AdS}_2$. By imposing the condition that no scattering takes place in the bulk, these sum rules single out special solutions to crossing symmetry that describe long-range models, which can be understood as free fields in AdS with boundary interactions tuned to criticality. We test these sum rules perturbatively in several distinct theories, namely the 1d long-range versions of the Ising, $O(N)$ and Lee--Yang models, and find that they correctly predict the CFT data characterising these theories. Along the way we compute for the first time the leading contributions of quadruple-twist operators to the long range Ising correlator and analyse their role in the new sum rules. Finally, we explore the consequences of imposing these sum rules in a numerical bootstrap framework and find that they lead to substantial reductions in the allowed parameter space.", "url": "https://arxiv.org/abs/2603.22395", "type": "理论", "summary": "我们研究了控制一维共形场论（CFT）相关器的 Regge 极限的求和规则，并将它们与 $\\mathrm{AdS}_2$ 中高能的双体散射过程联系起来。通过施加整体不发生散射的条件，这些求和规则选出了描述长程模型的交叉对称性的特殊解决方案，可以将其理解为 AdS 中的自由场，其边界相互作用调整为临界值。我们在几个不同的理论中扰动地测试了这些总和规则，即 Ising、$O(N)$ 和 Lee-Yang 模型的一维长程版本，并发现它们正确地预测了表征这些理论的 CFT 数据。在此过程中，我们首次计算了四重扭曲算子对长程伊辛相关器的主要贡献，并分析了它们在新求和规则中的作用。最后，我们探讨了在数值引导框架中实施这些求和规则的后果，并发现它们导致允许的参数空间大幅减少。", "authors": [{"name": "Kausik Ghosh"}, {"name": "Miguel F. Paulos"}, {"name": "Noé Suchel"}, {"name": "Zechuan Zheng"}], "featured_authors": [{"name": "Kausik Ghosh"}, {"name": "Miguel F. Paulos"}, {"name": "Noé Suchel"}, {"name": "Zechuan Zheng"}], "author_count": 4}, {"id": "2603.22433", "category": "hep-th", "title": "Quiver Maps, Nilpotent Orbits and Special Pieces of Nilcones", "abstract": "This paper explores 3d $\\mathcal{N}=4$ quiver gauge theories whose moduli spaces represent nilpotent orbits, Słodowy slices or, more generally, Słodowy intersections, which span the Special Pieces of nilcones of Classical or Exceptional algebras. We introduce a map between magnetic and electric quivers containing symmetric group actions, such as wreathings (or loops), bouquets, and/or non-simply laced foldings, which can be related to symmetric subgroups of Lusztig's canonical quotient groups for Special Pieces. The map on quivers induces a map on nilpotent orbits that partially resolves the obstruction to quiver dualities presented by the non-involutive nature of the Lusztig Spaltenstein and Barbasch Vogan maps. We use Coulomb and Higgs branch quiver methods complemented by localisation formulae. Some new quivers for intersections within Exceptional nilcones are presented.", "url": "https://arxiv.org/abs/2603.22433", "type": "理论", "summary": "本文探讨了 3d $\\mathcal{N}=4$ 箭袋规范理论，其模空间表示幂零轨道、Słodowy 切片，或者更一般地说，Słodowy 交集，它们跨越了经典或例外代数的 nilcones 的特殊片段。我们引入了磁箭袋和电箭袋之间的映射，其中包含对称群作用，例如花圈（或环）、花束和/或非简单系带折叠，这些可以与 Lusztig 的特殊件规范商群的对称子群相关。箭袋上的映射推导了幂零轨道上的映射，部分解决了 Lusztig Spaltenstein 和 Barbasch Vogan 映射的非对合性质对箭袋对偶性的阻碍。我们使用库仑和希格斯分支颤动方法并辅以定位公式。提出了一些用于 Exceptional nicones 内交叉的新箭袋。", "authors": [{"name": "Sam Bennett"}, {"name": "Amihay Hanany"}, {"name": "Rudolph Kalveks"}], "featured_authors": [{"name": "Sam Bennett"}, {"name": "Amihay Hanany"}, {"name": "Rudolph Kalveks"}], "author_count": 3}, {"id": "2603.22451", "category": "hep-th", "title": "Kummitus: a light-weight toolbox for counting DOF in perturbative QFT", "abstract": "The consistent construction of quantum field theories beyond the simplest cases requires a precise characterization of the propagating degrees of freedom. These are encoded in the single-pole structure of two-point functions, a connection firmly established through foundational theoretical work of the last century. While high-level programs for spectral analysis are publicly available, we felt the need to complement the existing landscape with a tool that reaches the gauge-invariant propagator by the shortest possible algorithmic path. This is the purpose of \\texttt{Kummitus}, an open-source Wolfram Mathematica toolbox designed to do precisely that: compute the (gauge-invariant) propagator. Beyond its utility in research applications, \\texttt{Kummitus} is intended as an accessible and transparent resource for the theoretical community, with particular value for pedagogical purposes.", "url": "https://arxiv.org/abs/2603.22451", "type": "理论", "summary": "超越最简单情况的量子场论的一致构建需要传播自由度的精确表征。这些被编码在两点函数的单极点结构中，这是通过上世纪的基础理论工作牢固建立的联系。虽然用于光谱分析的高级程序是公开的，但我们认为需要使用一种工具来补充现有的景观，该工具可以通过最短的算法路径到达规范不变的传播器。这就是 \\texttt{Kummitus} 的目的，它是一个开源 Wolfram Mathematica 工具箱，旨在精确地做到这一点：计算（规范不变）传播器。除了在研究应用中的实用性之外，\\texttt{Kummitus} 还旨在为理论界提供一种可访问且透明的资源，对于教学目的具有特殊的价值。", "authors": [{"name": "Carlo Marzo"}], "featured_authors": [{"name": "Carlo Marzo"}], "author_count": 1}, {"id": "2603.22711", "category": "hep-th", "title": "Wilson Surface One-Point Functions: A Case Study", "abstract": "We compute holographic one-point functions for Wilson surfaces in the case of a toroidal surface operator. Compared to the cases of a planar or spherical surface operator, these one-point functions exhibit a more intricate dependence on the shape and position of both the surface and the local operators. Averaging over the moduli space of membranes dual to the surface operator plays a key role in the computations. We obtain both analytical and numerical results. The case of a cylindrical surface operator is also studied.", "url": "https://arxiv.org/abs/2603.22711", "type": "理论", "summary": "在环形表面算子的情况下，我们计算威尔逊表面的全息单点函数。与平面或球面算子的情况相比，这些单点函数对表面和局部算子的形状和位置表现出更复杂的依赖性。对表面算子对偶的膜模量空间进行平均在计算中起着关键作用。我们获得了分析结果和数值结果。还研究了圆柱表面算子的情况。", "authors": [{"name": "Long-Fu Zhang"}, {"name": "Jun-Bao Wu"}], "featured_authors": [{"name": "Long-Fu Zhang"}, {"name": "Jun-Bao Wu"}], "author_count": 2}, {"id": "2603.23080", "category": "hep-th", "title": "Wilson network expansion for four-point contact and exchange scalar Feynman diagrams in AdS$_2$", "abstract": "We derive new integral identities for AdS propagators and further develop the Wilson network expansion for AdS Feynman diagrams. In particular, we demonstrate that four-point contact and exchange scalar diagrams in two dimensions can be expanded into several infinite series of matrix elements of Wilson line network operators with running conformal weights. Each series is characterized by specific multi-trace operators associated with the external and intermediate edges of the corresponding graphs. The resulting expansions near the conformal boundary reproduce the well-known decompositions of the corresponding four-point Witten diagrams into conformal blocks.", "url": "https://arxiv.org/abs/2603.23080", "type": "理论", "summary": "我们为 AdS 传播者推导了新的积分恒等式，并进一步开发了 AdS 费曼图的 Wilson 网络扩展。特别是，我们证明了二维四点接触和交换标量图可以扩展到具有运行共形权重的威尔逊线网络算子的多个无限级数矩阵元素。每个系列都具有与相应图的外部和中间边缘相关联的特定多迹运算符的特征。共形边界附近产生的展开将相应的四点维滕图众所周知的分解再现为共形块。", "authors": [{"name": "K.B. Alkalaev"}, {"name": "V.S. Khiteev"}], "featured_authors": [{"name": "K.B. Alkalaev"}, {"name": "V.S. Khiteev"}], "author_count": 2}, {"id": "2603.23108", "category": "hep-th", "title": "Holography, Brick Wall and a Little Hierarchy Problem", "abstract": "We propose a heuristic for the brick wall in AdS/CFT: the location where a boundary mode's local bulk energy reaches a (Planckian) UV cut-off. This accomplishes two things: (a) the brick wall is framed as a breakdown criterion for bulk effective field theory, and (b) the definition is boundary-anchored rather than horizon-anchored, aligning it with holography. Near the horizon, spacetime effectively gets cut-off due to blueshift relative to the boundary, and leads to normal modes. By directly computing these new modes for the BTZ black hole, we show that they are qualitatively unchanged from conventional 't Hooftian brick wall normal modes in the relevant part of the spectrum -- successfully reproducing black hole thermodynamics and exterior smooth-horizon correlators, under similar approximations. However, unlike 't Hooft's (and our own previous) calculations, we also do an $exact$ numerical evaluation of the normal mode partition function. This allows us to identify a \"little hierarchy\" problem in the brick wall paradigm, irrespective of whether it is horizon-anchored or boundary-anchored: because the modes are not exactly degenerate in the $J$-direction, the coefficient of the area law is slightly subleading, unless the brick wall is slightly trans-Planckian. One way to evade the problem is to increase the number of active species. While this is certainly a possibility in string theory, we argue that a natural resolution is to take into account the degrees of freedom intrinsic to the (stretched) horizon, as suggested by the recent results in arXiv:2601.18775 . We argue that this will lead to a dominant contribution from a quantum number associated to the radial direction, while retaining the successes of the $J$-degenerate toy model. We discuss the possible significance of these observations for (a) quantum chaos in black holes, and (b) the fuzzball program.", "url": "https://arxiv.org/abs/2603.23108", "type": "理论", "summary": "我们为 AdS/CFT 中的砖墙提出了一种启发式方法：边界模式的局部体能量达到（普朗克）UV 截止的位置。这完成了两件事：(a) 砖墙被框架为体有效场理论的击穿标准，(b) 定义是边界锚定的而不是水平锚定的，使其与全息术对齐。在地平线附近，时空由于相对于边界的蓝移而有效地被切断，并导致正常模式。通过直接计算 BTZ 黑洞的这些新模式，我们表明它们在质量上与光谱相关部分中传统的 't Hooftian 砖墙正常模式没有变化 - 在类似的近似下成功地再现了黑洞热力学和外部平滑视界相关器。然而，与 't Hooft 的（以及我们之前的）计算不同，我们还对正态模式配分函数进行了 $exact$ 数值评估。\n\n这使我们能够识别砖墙范式中的“小层次结构”问题，无论它是水平锚定的还是边界锚定的：因为模态在 $J$ 方向上并不完全退化，所以面积定律的系数稍微有些次领先，除非砖墙稍微有点跨普朗克范式。避免这个问题的一种方法是增加活性物种的数量。虽然这在弦理论中当然是可能的，但我们认为自然的解决方案是考虑（拉伸的）地平线固有的自由度，正如 arXiv:2601.18775 的最新结果所表明的那样。我们认为，这将导致与径向相关的量子数的主要贡献，同时保留 $J$ 简并玩具模型的成功。我们讨论这些观测结果对于（a）黑洞中的量子混沌和（b）模糊球程序的可能意义。", "authors": [{"name": "Vishal Gayari"}, {"name": "Chethan Krishnan"}, {"name": "Pradipta S. Pathak"}], "featured_authors": [{"name": "Vishal Gayari"}, {"name": "Chethan Krishnan"}, {"name": "Pradipta S. Pathak"}], "author_count": 3}, {"id": "2603.23204", "category": "hep-th", "title": "Astrophysical aspects of string compactifications", "abstract": "A generic aspect of low-energy effective field theories (EFTs) coming from string compactifications is the appearance of moduli fields. Among these moduli, the axion and dilaton are present as (pseudo-) Goldstone bosons from the spontaneous breaking of an exact (or approximate) global symmetry. These moduli have a different microscopic coupling to matter but appear kinetically coupled in such a way that their interaction can compete with gravity at low energies and have an important effect in strong gravity environments. In this talk, we will discuss some of the astrophysical implications of a stringy-inspired multi-scalar-tensor theory. In particular, we show the numerical solution of the Tolman-Oppenheimer-Volkov (TOV) system of equations, necessary to probe the existence of a screening mechanism that reduces the Brans-Dicke dilaton coupling to macroscopic matter sources such as a neutron star.", "url": "https://arxiv.org/abs/2603.23204", "type": "理论", "summary": "来自弦紧化的低能有效场论（EFT）的一个普遍方面是模场的出现。在这些模量中，轴子和膨胀子作为（伪）戈德斯通玻色子存在，来自精确（或近似）全局对称性的自发破缺。这些模量与物质具有不同的微观耦合，但表现为动力学耦合，使得它们的相互作用可以在低能量下与重力竞争，并在强重力环境中产生重要影响。在本次演讲中，我们将讨论弦启发的多标量张量理论的一些天体物理学含义。特别是，我们展示了托尔曼-奥本海默-沃尔科夫（TOV）方程组的数值解，这对于探索减少布兰斯-迪克膨胀与中子星等宏观物质源耦合的筛选机制的存在是必要的。", "authors": [{"name": "Mario Ramos-Hamud"}], "featured_authors": [{"name": "Mario Ramos-Hamud"}], "author_count": 1}, {"id": "2603.23332", "category": "hep-th", "title": "Quantum gravity and matter fields in a general background gauge", "abstract": "We analyse the gauge-dependence of the effective action in an interacting quantum theory of gravitational and matter fields. An explicit off-shell result is obtained in a general background gauge at one-loop order, which reduces in a particular gauge to the effective action found by 't Hooft-Veltman. We confirm the validity of DeWitt-Kallosh theorem, which implies that the on-shell effective action should be independent of the gauge-fixing parameter. We employ this theorem to expose the non-renormalizability of the theory in a general background gauge.", "url": "https://arxiv.org/abs/2603.23332", "type": "理论", "summary": "我们分析了引力场和物质场相互作用的量子理论中有效作用的规范依赖性。在一般背景仪表中以单循环顺序获得显式的离壳结果，这在特定仪表中减少到由 t Hooft-Veltman 发现的有效作用。我们证实了德威特-卡洛什定理的有效性，这意味着壳上有效作用应该独立于仪表固定参数。我们利用这个定理来揭示该理论在一般背景规范中的不可重整性。", "authors": [{"name": "J. Frenkel"}, {"name": "S. Martins-Filho"}], "featured_authors": [{"name": "J. Frenkel"}, {"name": "S. Martins-Filho"}], "author_count": 2}, {"id": "2603.23457", "category": "hep-th", "title": "Note on KSW-allowability of Wine-Glass saddles", "abstract": "In this note we consider no-boundary instantons and wine-glass geometries which are of interest in the context of quantum cosmology. While the former appears as a dominant saddle in the path-integral, the later sub-dominant saddle has been argued to have a longer inflationary phase of the Universe. Kontsevich-Segal-Witten (KSW)-allowability criterion which classifies geometries on the basis of the requirement of having a meaningful QFT on it, pushes one to analyse the allowability of the saddles. In this note we do a simple study to seek answer to the allowabilty of no-boundary instantons and wine-glass geometries which are of interest in quantum cosmology. Our simple analysis which make use of a milder version of KSW allowability criterion shows that no-boundary instanton is KSW allowed while wine-glass geometries are KSW disallowed.", "url": "https://arxiv.org/abs/2603.23457", "type": "理论", "summary": "在这篇文章中，我们考虑了量子宇宙学背景下感兴趣的无边界瞬时子和酒杯几何结构。虽然前者在路径积分中表现为主导鞍点，但后来的次主导鞍点被认为具有更长的宇宙暴胀阶段。 Kontsevich-Segal-Witten (KSW) 容许度准则根据有意义的 QFT 要求对几何形状进行分类，促使人们分析鞍座的容许度。在这篇文章中，我们做了一项简单的研究，以寻求量子宇宙学中感兴趣的无边界瞬子和酒杯几何的允许性的答案。我们使用较温和版本的 KSW 容许准则进行简单分析，表明 KSW 允许无边界瞬子，而 KSW 不允许酒杯几何形状。", "authors": [{"name": "Manishankar Ailiga"}, {"name": "Gaurav Narain"}], "featured_authors": [{"name": "Manishankar Ailiga"}, {"name": "Gaurav Narain"}], "author_count": 2}, {"id": "2603.22470", "category": "math-ph", "title": "Multivariable Painleve'-II equation: connection formulas for asymptotic solutions", "abstract": "It is shown that a generalization of the Painlevé-II equation (P-II) to a system of coupled equations with symmetry breaking terms is integrable. A Lax pair for this system is used to relate the asymptotic behavior of the solutions at different infinities via an asymptotically exact WKB approach. The analysis relies on an exact solution of the quantum mechanical Demkov-Osherov model (DOM). An application to the problem of unstable vacuum decay during a second order phase transition provides precise scaling of the number of excitations, including subdominant contributions.", "url": "https://arxiv.org/abs/2603.22470", "type": "理论", "summary": "结果表明，将 Painlevé-II 方程 (P-II) 推广到具有对称破缺项的耦合方程组是可积的。该系统的 Lax 对用于通过渐近精确的 WKB 方法来关联不同无穷大处解的渐近行为。该分析依赖于量子力学 Demkov-Osherov 模型 (DOM) 的精确解。对二阶相变期间不稳定真空衰变问题的应用提供了激发数量的精确缩放，包括次主要贡献。", "authors": [{"name": "N. A. Sinitsyn"}], "featured_authors": [{"name": "N. A. Sinitsyn"}], "author_count": 1}, {"id": "2603.22515", "category": "math-ph", "title": "Spectral topology and edge modes for one-dimensional non-Hermitian photonic crystals", "abstract": "This work investigates edge modes in non-Hermitian photonic crystals with broken spectral reciprocity. In such systems, the spectra of the underlying operators generally form closed loops over the complex plane with nontrivial spectral topology, which gives rise to the so-called skin effect characterized by edge modes localized at interfaces. For discrete lattice models, the skin effect can be understood through the spectral theory of Toeplitz matrices. However, this mathematical framework no longer applies to continuous wave models, where finite-dimensional approximations break down. In this work, we employ a transfer matrix approach to describe wave propagation in one-dimensional periodic media and introduce a new spectral topological invariant based on the eigenvalues of the transfer matrix. The new topological invariant is equivalent to the winding number of the non-Hermitian spectrum and it enables the characterization of edge modes in one-dimensional non-Hermitian photonic crystals. The mathematical theory provides the theoretical foundation for the skin effect in continuous wave models.", "url": "https://arxiv.org/abs/2603.22515", "type": "理论", "summary": "这项工作研究了光谱互易性破坏的非厄米光子晶体中的边缘模式。在此类系统中，底层算子的频谱通常在具有非平凡频谱拓扑的复杂平面上形成闭环，这产生了所谓的趋肤效应，其特征在于界面处的边缘模式局域化。对于离散晶格模型，集肤效应可以通过托普利茨矩阵的谱理论来理解。然而，这种数学框架不再适用于连续波模型，因为有限维近似在连续波模型中会失效。在这项工作中，我们采用传递矩阵方法来描述一维周期性介质中的波传播，并基于传递矩阵的特征值引入一种新的谱拓扑不变量。新的拓扑不变量相当于非厄米谱的缠绕数，它能够表征一维非厄米光子晶体中的边缘模式。数学理论为连续波模型中的集肤效应提供了理论基础。", "authors": [{"name": "Junshan Lin"}, {"name": "Hai Zhang"}], "featured_authors": [{"name": "Junshan Lin"}, {"name": "Hai Zhang"}], "author_count": 2}, {"id": "2603.22974", "category": "math-ph", "title": "Edge density expansions for the classical Gaussian and Laguerre ensembles", "abstract": "Recent work of Bornemann has uncovered hitherto hidden integrable structures relating to the asymptotic expansion of quantities at the soft edge of Gaussian and Laguerre random matrix ensembles. These quantities are spacing distributions and the eigenvalue density, and the findings cover the cases of the three symmetry classes orthogonal, unitary and symplectic. In this work we give a different viewpoint on these results in the case of the soft edge scaled density, and in the Laguerre case we initiate an analogous study at the hard edge. Our tool is the scalar differential equation satisfied by the latter, known from earlier work. Unlike integral representations, these differential equations in soft edge scaling variables isolate the function of $N$ which is the expansion variable. Moreover, they give information on the correction terms which supplements the findings from the work of Bornemann. In the case of the Gaussian ensemble, we can demonstrate analogous features for Dyson index $\\beta = 6$, which suggests a broader class of models, namely the classical $\\beta$ ensembles, with asymptotic expansions exhibiting integrable features. For the Laguerre ensembles at the hard edge, we give the explicit form of the correction at second order for unitary symmetry, and at first order in the orthogonal and symplectic cases. Various differential relations are demonstrated.", "url": "https://arxiv.org/abs/2603.22974", "type": "理论", "summary": "Bornemann 最近的工作揭示了迄今为止隐藏的可积结构，这些结构与高斯和拉盖尔随机矩阵系综的软边缘处的量的渐近展开有关。这些量是间距分布和特征值密度，研究结果涵盖了正交、酉和辛三个对称类别的情况。在这项工作中，我们在软边缘缩放密度的情况下对这些结果给出了不同的观点，在拉盖尔情况下，我们在硬边缘启动了类似的研究。我们的工具是后者满足的标量微分方程，从早期的工作中得知。与积分表示不同，软边缘缩放变量中的这些微分方程隔离了 $N$ 的函数，即展开变量。此外，他们还提供了有关修正项的信息，补充了 Bornemann 工作的发现。在高斯系综的情况下，我们可以证明戴森指数 $\\beta = 6$ 的类似特征，这表明了更广泛的模型类别，即经典的 $\\beta$ 系综，其渐近展开表现出可积特征。\n\n对于硬边缘处的拉盖尔系综，我们给出了酉对称性的二阶修正的显式形式，以及正交和辛情况下的一阶修正的显式形式。证明了各种微分关系。", "authors": [{"name": "Peter J. Forrester"}, {"name": "Anas A. Rahman"}, {"name": "Bo-Jian Shen"}], "featured_authors": [{"name": "Peter J. Forrester"}, {"name": "Anas A. Rahman"}, {"name": "Bo-Jian Shen"}], "author_count": 3}, {"id": "2603.23257", "category": "math-ph", "title": "Inequalities for the Tsallis q-entropy and Information Theory", "abstract": "In this work, we derive information-theoretic properties for a modified Tsallis entropy, hereinafter referred to as q-entropy. We introduce the notions of joint q-entropy, conditional q-entropy, relative q-entropy, conditional mutual q-information, and establish several inequalities analogous to those of classical information theory. Within the context of Markov chains, these results are employed to prove a version of the second law of thermodynamics. Furthermore, we investigate the maximum entropy method in this setting. Finally, we prove a Tsallis version of the Shannon-McMillan-Breiman theorem.", "url": "https://arxiv.org/abs/2603.23257", "type": "理论", "summary": "在这项工作中，我们推导了修改后的 Tsallis 熵（以下简称 q 熵）的信息论属性。我们引入了联合 q 熵、条件 q 熵、相对 q 熵、条件互 q 信息的概念，并建立了几个类似于经典信息论的不等式。在马尔可夫链的背景下，这些结果用于证明热力学第二定律的一个版本。此外，我们研究了这种情况下的最大熵方法。最后，我们证明了 Shannon-McMillan-Breiman 定理的 Tsallis 版本。", "authors": [{"name": "Marco A. S. Trindade"}], "featured_authors": [{"name": "Marco A. S. Trindade"}], "author_count": 1}, {"id": "2603.23275", "category": "math-ph", "title": "Dirac Operators, APS Boundary Conditions, and Spectral Flow on a Finite Warped Cylinder", "abstract": "We study the Dirac operator on a finite warped cylinder coupled to a background $U(1)$ gauge field. We identify the intrinsic endpoint operators defining the Atiyah-Patodi-Singer (APS) boundary condition and derive a determinant characterization of the modewise APS spectrum. In the constant-gauge, invertible setting, the endpoint reduced $\\eta$ contributions cancel, so the APS index vanishes. For smooth gauge families, the APS projector becomes discontinuous when a boundary mode crosses zero. We therefore introduce a regularized APS-type family of self-adjoint endpoint conditions that remains continuous across such crossings. This regularized family admits a real-symplectic boundary formulation within the standard spectral-flow/Maslov framework: for nondegenerate regularization, the zero-mode set coincides with the boundary-zero set, and transverse boundary zeros give isolated regular crossings.", "url": "https://arxiv.org/abs/2603.23275", "type": "理论", "summary": "我们研究耦合到背景 $U(1)$ 规范场的有限扭曲圆柱体上的狄拉克算子。我们确定了定义 Atiyah-Patodi-Singer (APS) 边界条件的内在端点算子，并推导出模态 APS 谱的行列式表征。在恒定规格、可逆设置中，端点减少的 $\\eta$ 贡献取消，因此 APS 指数消失。对于平滑规格系列，当边界模式过零时，APS 投影仪会变得不连续。因此，我们引入了一个正则化的 APS 型自伴端点条件族，该条件族在此类交叉点上保持连续。该正则化族允许标准谱流/马斯洛夫框架内的实辛边界公式：对于非简并正则化，零模式集与边界零集一致，并且横向边界零给出孤立的正则交叉。", "authors": [{"name": "Taro Kimura"}, {"name": "Sanchita Sharma"}], "featured_authors": [{"name": "Taro Kimura"}, {"name": "Sanchita Sharma"}], "author_count": 2}, {"id": "2603.23371", "category": "math-ph", "title": "Interfacial instability as a trigger for dryout inception in two-phase CO2 flow", "abstract": "Progress in particle physic leads to increasing in detector luminosity and a consequent increasing overheating induced by Joule effect. An effective cooling strategy is the exploitation of CO\\textsubscript{2} heat latency in phase-change. An additional challenge, relevant to detectors for High Energy Particles, is the consequent geometrical constrain due to the limited space avialable for the cooling system within the detector arrangement, leading to the implementation of cooling system by means of millichannels. In this context, at relative high vapour quality the liquid phase exhibits annular flow, anticipating the dryout. Dryout is a critical condition where the heat transfer coefficient dramatically drops and dangerous temperature levels can be reached, potentially leading to catastrophic consequences. Experimental evidences reveal that its behavior in two-phase annular flows differs from conventional refrigerants and the fundamental inception-mechanism is not yet understood. This study aims at investigating the key new idea whereby dryout inception is triggered by instability of the liquid-vapour interface. A mathematical model for two-phase annular flow is presented and the stability of the interface between the two fluids is studied through the linear theory. The stability analysis reduces to solving a coupled forth-order differential eigenvalue problem that is treated numerically with an in-house code based on the Chebyshev-$\\tau$ method. Numerical investigations identify a critical value for the vapour quality, named $x_{dry}$, that leads to interface instability. The resulting predictions on $x_{dry}$ are confirmed by experimental data collected from two independent experimental campaigns, validating the hypothesis that dryout inception is governed by interfacial instabilities.", "url": "https://arxiv.org/abs/2603.23371", "type": "理论", "summary": "粒子物理学的进步导致探测器光度增加，从而导致焦耳效应引起的过热增加。一种有效的冷却策略是利用相变中的 CO\\textsubscript{2} 热延迟。与高能粒子探测器相关的另一个挑战是由于探测器布置内可用于冷却系统的空间有限而导致的几何约束，导致通过毫通道来实现冷却系统。在这种情况下，在相对高的蒸气质量下，液相表现出环形流动，预示着干燥。干燥是一种关键条件，传热系数急剧下降，可能达到危险的温度水平，可能导致灾难性后果。实验证据表明，其在两相环形流中的行为与传统制冷剂不同，并且其基本的启动机制尚不清楚。本研究旨在研究干燥开始是由液-汽界面的不稳定性引发的关键新想法。\n\n建立了两相环形流的数学模型，并通过线性理论研究了两种流体界面的稳定性。稳定性分析简化为求解耦合四阶微分特征值问题，该问题使用基于 Chebyshev-$\\tau$ 方法的内部代码进行数值处理。数值研究确定了蒸汽质量的临界值，称为 $x_{dry}$，它会导致界面不稳定。对 $x_{dry}$ 的预测得到了从两个独立实验活动中收集的实验数据的证实，验证了干燥起始受界面不稳定性控制的假设。", "authors": [{"name": "G. Cantini"}, {"name": "G. Arnone"}, {"name": "F. Capone"}, {"name": "J.A. Gianfrani"}, {"name": "M. Carnevale"}], "featured_authors": [{"name": "G. Cantini"}, {"name": "G. Arnone"}, {"name": "F. Capone"}, {"name": "J.A. Gianfrani"}, {"name": "M. Carnevale"}], "author_count": 5}, {"id": "2603.23411", "category": "math-ph", "title": "Deformation quantization for systems with second-class constraints in deformed fermionic phase space", "abstract": "In order to quantize systems involving second-class constraints, one should use Dirac bracket instead of Poisson bracket. Furthermore, one can specify a star product in which the term linear in $\\hbar$ is proportional to the Dirac bracket. In this way an oscillator system in a deformed fermionic phase space is analyzed and the corresponding energy level and Wigner functions are evaluated according to scheme of deformation quantization. We also study the entanglement entropy induced by the deformation of the fermionic phase space.", "url": "https://arxiv.org/abs/2603.23411", "type": "理论", "summary": "为了量化涉及二类约束的系统，应该使用狄拉克括号而不是泊松括号。此外，我们可以指定一个星积，其中 $\\hbar$ 中的线性项与狄拉克括号成正比。通过这种方式，分析了变形费米子相空间中的振荡器系统，并根据变形量化方案评估了相应的能级和维格纳函数。我们还研究了费米子相空间变形引起的纠缠熵。", "authors": [{"name": "Bing-Sheng Lin"}, {"name": "Tai-Hua Heng"}], "featured_authors": [{"name": "Bing-Sheng Lin"}, {"name": "Tai-Hua Heng"}], "author_count": 2}, {"id": "2603.23424", "category": "math-ph", "title": "Spectral Structure of the Mixed Hessian of the Dispersionless Toda $τ$-Function", "abstract": "We analyze the mixed Hessian of the dispersionless Toda $\\tau$-function for the $s$-fold symmetric one-harmonic polynomial conformal map. The inverse branch exhibits two distinct thresholds: an analytic threshold $\\zeta_c$, where the dominant square-root singularity reaches the circle of convergence, and a later geometric threshold $\\zeta_{\\mathrm{univ}}>\\zeta_c$, where the map ceases to be univalent. We prove that the first spectral instability occurs already at $\\zeta_c$. In each symmetry sector, the weighted subcritical realization has exactly one logarithmically diverging eigenvalue, whereas the remaining spectrum stays bounded and, after removal of the singular direction, converges to that of a compact limiting remainder. We further continue the corresponding scalar Gram functions beyond $\\zeta_c$, showing that they admit a generalized hypergeometric description, a Cauchy--Stieltjes representation, and, for $1\\le p\\le s$, a realization as Weyl functions of bounded Jacobi operators. In particular, these scalar quantities remain finite at $\\zeta_{\\mathrm{univ}}$. This identifies analytic criticality, rather than loss of univalence, as the first spectral threshold of the Toda Hessian.", "url": "https://arxiv.org/abs/2603.23424", "type": "理论", "summary": "我们分析了 $s$ 倍对称一调和多项式共形映射的无色散 Toda $\\tau$ 函数的混合 Hessian 函数。逆分支表现出两个不同的阈值：分析阈值 $\\zeta_c$，其中主要平方根奇点到达收敛圆，以及后来的几何阈值 $\\zeta_{\\mathrm{univ}}>\\zeta_c$，其中映射不再是单价的。我们证明第一个光谱不稳定性已经发生在 $\\zeta_c$ 处。在每个对称扇区中，加权亚临界实现恰好具有一个对数发散的特征值，而其余谱保持有界，并且在去除奇异方向后，收敛到紧致极限余数的谱。我们进一步在 $\\zeta_c$ 之外继续相应的标量 Gram 函数，表明它们承认广义超几何描述、Cauchy--Stieltjes 表示，以及对于 $1\\le p\\le s$，作为有界 Jacobi 算子的 Weyl 函数的实现。特别是，这些标量在 $\\zeta_{\\mathrm{univ}}$ 处仍然是有限的。\n\n这将分析临界性而不是单价性损失确定为 Toda Hessian 的第一个谱阈值。", "authors": [{"name": "Oleg Alekseev"}], "featured_authors": [{"name": "Oleg Alekseev"}], "author_count": 1}, {"id": "2603.22336", "category": "quant-ph", "title": "Geometric Classification of Biased Quantum Capacity via Harmonic Translation", "abstract": "We establish an exact noise-model-derived characterization of quantum error correction under diagonal local phase noise. Under uniform locality, the maximal logical dimension under t-local phase errors equals Aq(n,2t+1), the classical q-ary packing function. Because no affine or stabilizer structure is imposed, nonlinear spectral supports achieve this bound and strictly exceed all affine constructions whenever Aq(n,2t+1)>Bq(n,2t+1). This follows from a harmonic translation principle: diagonal phase operators act as rigid translations in the Fourier domain, reducing the Knill-Laflamme conditions exactly to an additive non-collision constraint (S-S) cap Et={0}. For structured phase noise, exact correction is equivalent to independence in an additive Cayley graph, connecting biased quantum capacity to classical zero-error theory and the Lovasz theta function. Under mixed Pauli noise, simultaneous protection in conjugate domains incurs an intrinsic rate penalty R <= 1-(gamma_X+gamma_Z)/2, exposing a discrete harmonic uncertainty principle. In contrast with stabilizer- or graph-based frameworks, this classical correspondence is derived directly from the phase-noise model itself rather than from an auxiliary algebraic construction.", "url": "https://arxiv.org/abs/2603.22336", "type": "理论", "summary": "我们建立了对角局部相位噪声下量子误差校正的精确噪声模型导出表征。在一致局部性下，t-局部相位误差下的最大逻辑维数等于Aq(n,2t+1)，即经典的q元打包函数。因为没有强加仿射或稳定结构，所以每当 Aq(n,2t+1)>Bq(n,2t+1) 时，非线性谱支持就会达到此界限并严格超过所有仿射构造。这遵循调和平移原理：对角相位算子充当傅立叶域中的刚性平移，将 Knill-Laflamme 条件精确地简化为加性非碰撞约束 (S-S) cap Et={0}。对于结构化相位噪声，精确校正相当于加性凯莱图中的独立性，将偏置量子容量与经典零误差理论和 Lovasz theta 函数联系起来。在混合泡利噪声下，共轭域中的同时保护会产生固有的速率损失 R <= 1-(gamma_X+gamma_Z)/2，从而暴露出离散谐波不确定性原理。\n\n与基于稳定器或基于图的框架相比，这种经典对应关系直接来自相位噪声模型本身，而不是来自辅助代数构造。", "authors": [{"name": "Eliseo Sarmiento Rosales"}, {"name": "Egor Maximenko"}, {"name": "Dionisio Manuel Tun Molina"}, {"name": "Juan Carlos Jimenez Cervantes"}, {"name": "Jose Alberto Guzman Vega"}, {"name": "Rodrigo Leon Morales"}], "featured_authors": [{"name": "Eliseo Sarmiento Rosales"}, {"name": "Egor Maximenko"}, {"name": "Dionisio Manuel Tun Molina"}, {"name": "Juan Carlos Jimenez Cervantes"}, {"name": "Jose Alberto Guzman Vega"}, {"name": "Rodrigo Leon Morales"}], "author_count": 6}, {"id": "2603.22337", "category": "quant-ph", "title": "Lamb-shift-induced switching of energy transfer in open quantum batteries", "abstract": "Open quantum batteries (QBs) operate under unavoidable system-environment interactions, where both dissipation and coherent renormalization influence their performance. While most previous studies focus on dissipative effects, the role of environment-induced frequency renormalization, such as the Lamb shift, remains insufficiently this http URL this work, we investigate an externally driven QB composed of two coherently coupled quantum harmonic oscillators, representing the charger and the battery. By incorporating both dissipation and Lamb-shift corrections within a Lindblad master equation, we show that the Lamb shift effectively renormalizes the system eigenfrequencies and thereby modifies the resonance condition with the external drive. We demonstrate that tuning the driving frequency relative to the renormalized eigenmodes leads to a mode-selective energy transfer process, resulting in a controllable redistribution of energy between the charger and the battery. This behavior manifests as a switching of the dominant energy storage channel and can be quantitatively understood through a supermode decomposition of the coupled system. Our results clarify the dynamical role of environment-induced frequency shifts in open quantum batteries and provide a physically transparent framework for optimizing work extraction under realistic operating conditions.", "url": "https://arxiv.org/abs/2603.22337", "type": "理论+数值", "summary": "开放量子电池（QB）在不可避免的系统环境相互作用下运行，耗散和相干重正化都会影响其性能。虽然大多数先前的研究都集中在耗散效应上，但环境引起的频率重整化（例如兰姆频移）的作用仍然不够。这项工作，我们研究了由两个相干耦合的量子谐振子组成的外部驱动 QB，代表充电器和电池。通过将耗散和兰姆位移校正合并到 Lindblad 主方程中，我们表明兰姆位移有效地重新规范了系统特征频率，从而修改了外部驱动的谐振条件。我们证明，相对于重整化本征模调整驱动频率会导致模式选择性能量转移过程，从而在充电器和电池之间实现可控的能量重新分配。这种行为表现为主要能量存储通道的切换，并且可以通过耦合系统的超模分解来定量理解。\n\n我们的结果阐明了开放量子电池中环境引起的频移的动态作用，并为在实际操作条件下优化功提取提供了物理透明的框架。", "authors": [{"name": "Liang Luo"}, {"name": "Shun-Cai Zhao"}], "featured_authors": [{"name": "Liang Luo"}, {"name": "Shun-Cai Zhao"}], "author_count": 2}, {"id": "2603.22353", "category": "quant-ph", "title": "Contextuality as a Left Adjoint: A Categorical Generation of Orthomodular Structure", "abstract": "Contextuality is widely regarded as a hallmark of quantum information, yet its structural origin is often obscured by probabilistic or operational formulations. In this work, we show that non-distributive orthomodular structure need not be postulated, but arises canonically as a left adjoint from classical Boolean contexts. We introduce a gluing functor that takes pairs of Boolean algebras and identifies only their minimal and maximal elements via a categorical pushout. The resulting lattice is orthomodular but generically non-distributive. We prove that this construction is left adjoint to a forgetful functor selecting Boolean subalgebras, thereby providing a free but constrained generation of quantum-logical structure from classical contexts. Furthermore, we demonstrate that the failure of this pushout to remain Boolean is equivalent to the absence of global sections in the sheaf-theoretic framework of Abramsky and Brandenburger. This establishes a precise correspondence between contextuality as a sheaf obstruction and non-distributivity as a colimit failure. Our results offer a categorical and lattice-theoretic reconstruction of contextuality that precedes probabilistic notions and clarifies the structural necessity of quantum logic in information-theoretic settings.", "url": "https://arxiv.org/abs/2603.22353", "type": "理论", "summary": "情境性被广泛认为是量子信息的标志，但其结构起源常常被概率或运算公式所掩盖。在这项工作中，我们表明，不需要假设非分配正交模结构，而是从经典布尔上下文中作为左伴随规范地出现。我们引入了一个粘合函子，它采用布尔代数对并通过分类推出仅识别它们的最小和最大元素。生成的格是正交模的，但通常是非分布的。我们证明，这种构造与选择布尔子代数的健忘函子相关联，从而从经典上下文中提供自由但受限的量子逻辑结构的生成。此外，我们证明，这种推出未能保持布尔值相当于阿布拉姆斯基和勃兰登堡的层理论框架中全局部分的缺失。这在作为层障碍的上下文性和作为共限失败的非分配性之间建立了精确的对应关系。\n\n我们的结果提供了先于概率概念的上下文的分类和格论重建，并阐明了信息论背景下量子逻辑的结构必要性。", "authors": [{"name": "Yukio-Pegio Gunji"}, {"name": "Yoshihiko Ohzawa"}, {"name": "Yuki Tokuyama"}, {"name": "Yu Huang"}, {"name": "Kyoko Nakamura"}], "featured_authors": [{"name": "Yukio-Pegio Gunji"}, {"name": "Yoshihiko Ohzawa"}, {"name": "Yuki Tokuyama"}, {"name": "Yu Huang"}, {"name": "Kyoko Nakamura"}], "author_count": 5}, {"id": "2603.22354", "category": "quant-ph", "title": "Geometric Quantum Mechanics in a Symplectic Framework: Metric-Affine Extensions and Deformed Quantum Dynamics", "abstract": "We present a geometric formulation of quantum mechanics based on the symplectic structure of the projective Hilbert space. Building upon the standard Kähler framework, we introduce an extension in which the symplectic structure is allowed to couple to a metric-affine background geometry, leading to a deformation of the Hamiltonian flow on the state space. We show that, under suitable conditions, the deformed structure remains symplectic and defines a well-posed Hamiltonian system. The formulation reduces to standard Schrödinger dynamics in the limit where the geometric deformation vanishes. Explicit analytical examples are constructed to illustrate the effect of the deformation. In particular, curvature-dependent deformations lead to a rescaling of Hamiltonian flows, while torsion-induced contributions produce direction-dependent corrections. In addition, geometric phases acquire corrections determined by the deformed symplectic structure. These results provide a mathematically consistent framework for exploring geometric modifications of quantum evolution induced by background curvature and affine structure.", "url": "https://arxiv.org/abs/2603.22354", "type": "理论", "summary": "我们提出了基于射影希尔伯特空间的辛结构的量子力学的几何公式​​。在标准凯勒框架的基础上，我们引入了一种扩展，其中允许辛结构耦合到度量仿射背景几何，从而导致状态空间上哈密顿流的变形。我们证明，在适当的条件下，变形结构仍然是辛的，并定义了一个适定的哈密顿系统。在几何变形消失的极限下，该公式简化为标准薛定谔动力学。构建明确的分析示例来说明变形的影响。特别是，曲率相关的变形会导致哈密顿流的重新缩放，而扭转引起的贡献会产生方向相关的校正。此外，几何相位获得由变形辛结构确定的修正。这些结果为探索由背景曲率和仿射结构引起的量子演化的几何修改提供了一个数学上一致的框架。", "authors": [{"name": "Hoshang Heydari"}], "featured_authors": [{"name": "Hoshang Heydari"}], "author_count": 1}, {"id": "2603.22399", "category": "quant-ph", "title": "Latent Style-based Quantum Wasserstein GAN for Drug Design", "abstract": "The development of new drugs is a tedious, time-consuming, and expensive process, for which the average costs are estimated to be up to around $2.5 billion. The first step in this long process is the design of the new drug, for which de novo drug design, assisted by artificial intelligence, has blossomed in recent years and revolutionized the field. In particular, generative artificial intelligence has delivered promising results in drug discovery and development, reducing costs and the time to solution. However, classical generative models, such as generative adversarial networks (GANs), are difficult to train due to barren plateaus and prone to mode collapse. Quantum computing may be an avenue to overcome these issues and provide models with fewer parameters, thereby enhancing the generalizability of GANs. We propose a new style-based quantum GAN (QGAN) architecture for drug design that implements noise encoding at every rotational gate of the circuit and a gradient penalty in the loss function to mitigate mode collapse. Our pipeline employs a variational autoencoder to represent the molecular structure in a latent space, which is then used as input to our QGAN. Our baseline model runs on up to 15 qubits to validate our architecture on quantum simulators, and a 156-qubit IBM Heron quantum computer in the five-qubit setup is used for inference to investigate the effects of using real quantum hardware on the analysis. We benchmark our results against classical models as provided by the MOSES benchmark suite.", "url": "https://arxiv.org/abs/2603.22399", "type": "理论+数值", "summary": "新药的开发是一个繁琐、耗时且昂贵的过程，平均成本估计高达 25 亿美元左右。这个漫长过程的第一步是新药的设计，近年来，人工智能辅助下的从头药物设计蓬勃发展，并彻底改变了该领域。特别是，生成人工智能在药物发现和开发方面取得了可喜的成果，降低了成本并缩短了解决时间。然而，经典的生成模型，例如生成对抗网络（GAN），由于贫瘠的平台而难以训练，并且容易出现模式崩溃。量子计算可能是克服这些问题并提供参数更少的模型的一种途径，从而增强 GAN 的通用性。我们提出了一种用于药物设计的新型基于样式的量子 GAN (QGAN) 架构，该架构在电路的每个旋转门处实现噪声编码，并在损失函数中实施梯度惩罚以减轻模式崩溃。我们的管道采用变分自动编码器来表示潜在空间中的分子结构，然后将其用作 QGAN 的输入。\n\n我们的基线模型在多达 15 个量子位上运行，以在量子模拟器上验证我们的架构，并使用五量子位设置中的 156 量子位 IBM Heron 量子计算机进行推理，以研究使用真实量子硬件对分析的影响。我们根据 MOSES 基准套件提供的经典模型对我们的结果进行基准测试。", "authors": [{"name": "Julien Baglio"}, {"name": "Yacine Haddad"}, {"name": "Richard Polifka"}], "featured_authors": [{"name": "Julien Baglio"}, {"name": "Yacine Haddad"}, {"name": "Richard Polifka"}], "author_count": 3}, {"id": "2603.22401", "category": "quant-ph", "title": "Probabilistic modeling over permutations using quantum computers", "abstract": "Quantum computers provide a super-exponential speedup for performing a Fourier transform over the symmetric group, an ability for which practical use cases have remained elusive so far. In this work, we leverage this ability to unlock spectral methods for machine learning over permutation-structured data, which appear in applications such as multi-object tracking and recommendation systems. It has been shown previously that a powerful way of building probabilistic models over permutations is to use the framework of non-Abelian harmonic analysis, as the model's group Fourier spectrum captures the interaction complexity: \"low frequencies\" correspond to low order correlations, and \"high frequencies\" to more complex ones. This can be used to construct a Markov chain model driven by alternating steps of diffusion (a group-equivariant convolution) and conditioning (a Bayesian update). However, this approach is computationally challenging and hence limited to simple approximations. Here we construct a quantum algorithm that encodes the exact probabilistic model -- a classically intractable object -- into the amplitudes of a quantum state by making use of the Quantum Fourier Transform (QFT) over the symmetric group. We discuss the scaling, limitations, and practical use of such an approach, which we envision to be a first step towards useful applications of non-Abelian QFTs.", "url": "https://arxiv.org/abs/2603.22401", "type": "理论+数值", "summary": "量子计算机为在对称群上执行傅立叶变换提供了超指数加速，但迄今为止，实际用例仍然难以实现这种能力。在这项工作中，我们利用这种能力来解锁在排列结构数据上进行机器学习的谱方法，这些数据出现在多对象跟踪和推荐系统等应用中。先前已经表明，建立排列概率模型的一种有效方法是使用非阿贝尔调和分析框架，因为模型的群傅里叶谱捕获了相互作用的复杂性：“低频”对应于低阶相关性，“高频”对应于更复杂的相关性。这可用于构建由扩散（群等变卷积）和调节（贝叶斯更新）的交替步骤驱动的马尔可夫链模型。然而，这种方法在计算上具有挑战性，因此仅限于简单的近似。\n\n在这里，我们构建了一种量子算法，通过利用对称群上的量子傅立叶变换 (QFT)，将精确的概率模型（一种经典的难以处理的对象）编码为量子态的振幅。我们讨论了这种方法的扩展、限制和实际使用，我们认为这是实现非阿贝尔 QFT 有用应用的第一步。", "authors": [{"name": "Vasilis Belis"}, {"name": "Giulio Crognaletti"}, {"name": "Matteo Argenton"}, {"name": "Michele Grossi"}, {"name": "Maria Schuld"}], "featured_authors": [{"name": "Vasilis Belis"}, {"name": "Giulio Crognaletti"}, {"name": "Matteo Argenton"}, {"name": "Michele Grossi"}, {"name": "Maria Schuld"}], "author_count": 5}, {"id": "2603.22422", "category": "quant-ph", "title": "Preparing Fermions via Classical Sampling and Linear Combinations of Unitaries", "abstract": "We present an extension of the Evolving density matrices on Qubits (E$\\rho$OQ) framework that enables efficient fault-tolerant preparation of fermionic quantum states. The original method circumvents state preparation by stochastic sampling, but faces a sign problem in fermionic systems leading to a large number of circuits necessary. We resolve this by combining classical stochastic sampling with a linear combination of unitaries method that avoids the exponential circuit scaling that plagued naïve implementations. The resulting algorithm requires $\\mathcal{O}(M^2)$ $R_Z$ rotations for circuit preparation, where $M$ is the number of retained basis states. We validate the method for ground and excited states in the Thirring model, including by computing two-point correlation functions relevant to scattering. In this model for fixed accuracy $\\varepsilon$, $M$ is found to scale empirically as $M \\propto \\frac{1}{mg}\\log(1/g)\\log(1/m)$.", "url": "https://arxiv.org/abs/2603.22422", "type": "理论+数值", "summary": "我们提出了量子比特 (E$\\rho$OQ) 框架上的演化密度矩阵的扩展，该框架能够实现费米子量子态的高效容错准备。原始方法通过随机采样规避了状态准备，但在费米子系统中面临符号问题，导致需要大量电路。我们通过将经典随机采样与酉法线性组合相结合来解决这个问题，避免了困扰简单实现的指数电路缩放。生成的算法需要 $\\mathcal{O}(M^2)$ $R_Z$ 旋转来进行电路准备，其中 $M$ 是保留的基本状态的数量。我们验证了 Thirring 模型中基态和激发态的方法，包括计算与散射相关的两点相关函数。在这个固定精度 $\\varepsilon$ 的模型中，发现 $M$ 根据经验缩放为 $M \\propto \\frac{1}{mg}\\log(1/g)\\log(1/m)$。", "authors": [{"name": "Erik J. Gustafson"}, {"name": "Henry Lamm"}], "featured_authors": [{"name": "Erik J. Gustafson"}, {"name": "Henry Lamm"}], "author_count": 2}, {"id": "2603.22452", "category": "quant-ph", "title": "Geometric Thermodynamics in Open Quantum Systems: Coherence, Curvature, and Work", "abstract": "We formulate a geometric framework for quasistatic thermodynamics in open quantum systems by parameterizing the dynamics on a control manifold. In the quasistatic limit, the system follows a manifold of stationary states, and the work performed over a cycle is given by the flux of a curvature two-form, $W \\sim \\int \\Omega$, defined by the parametric response of the stationary state, establishing an open-system analog of classical thermodynamic area laws. For thermal stationary states, the curvature is isotropic and depends only on the instantaneous energy scale, yielding a population-driven geometry in which environmental parameters reshape how work is distributed across the control manifold. Beyond this limit, nonequilibrium stationary states can retain coherence in the energy representation; using a fixed-basis Lindblad model, we show that this coherence reshapes the curvature, making it anisotropic and sign-changing, so that work depends sensitively on the placement and orientation of the cycle. Quantum coherence therefore partitions the control manifold into regions of opposite curvature, producing geometric cancellation of work and allowing the net work over a cycle to be reduced or reversed despite dissipative dynamics. Thermodynamic work thus emerges as a curvature flux whose structure is set by thermodynamic response in classical systems and by basis misalignment between the Hamiltonian eigenbasis and the environment-selected pointer basis in open quantum systems.", "url": "https://arxiv.org/abs/2603.22452", "type": "理论", "summary": "我们通过参数化控制流形上的动力学，制定了开放量子系统中准静态热力学的几何框架。在准静态极限下，系统遵循多种稳态，并且在一个周期内所做的功由曲率二元形式 $W \\sim \\int \\Omega$ 的通量给出，由稳态的参数响应定义，建立了经典热力学面积定律的开放系统模拟。对于热稳态，曲率是各向同性的，并且仅取决于瞬时能量尺度，产生群体驱动的几何形状，其中环境参数重塑功在控制流形上的分布方式。超过这个限制，非平衡静止态可以保持能量表示的相干性；使用固定基 Lindblad 模型，我们表明这种相干性重塑了曲率，使其各向异性和符号变化，因此工作敏感地取决于循环的位置和方向。\n\n因此，量子相干性将控制流形划分为相反曲率的区域，产生功的几何抵消，并允许在一个周期内的净功减少或逆转，尽管存在耗散动力学。因此，热力学功表现为曲率通量，其结构由经典系统中的热力学响应以及开放量子系统中哈密顿本征基和环境选择指针基之间的基错位设定。", "authors": [{"name": "Eric R. Bittner"}], "featured_authors": [{"name": "Eric R. Bittner"}], "author_count": 1}, {"id": "2603.22532", "category": "quant-ph", "title": "Distance-Finding Algorithms for Quantum Codes and Circuits", "abstract": "The distance of a classical or quantum code is a key figure of merit which reflects its capacity to detect errors. Quantum LDPC code families have considerable promise in reducing the overhead required for fault-tolerant quantum computation, but calculating their distance is challenging with existing methods. We generally assess the performance of a quantum code under circuit level error models, and for such scenarios the circuit distance is an important consideration. Calculating circuit distance is in general more difficult than finding the distance of the corresponding code as the detector error matrix of the circuit is usually much larger than the code's check matrix. In this work, we benchmark a wide range of distance-finding methods for various classical and quantum code families, as well as syndrome-extraction circuits. We consider both exact methods (such as Brouwer-Zimmermann, connected cluster, SAT and mixed integer programming) and heuristic methods which have lower run-time but can only give a bound on distance (examples include random information set, syndrome decoder algorithms, and Stim undetectable error methods). We further develop the QDistEvol algorithm and show that it performs well for the quantum LDPC codes in our benchmark. The algorithms and test data have been made available to the community in the codeDistance Python package.", "url": "https://arxiv.org/abs/2603.22532", "type": "理论+数值", "summary": "经典或量子代码的距离是一个关键的品质因数，反映了其检测错误的能力。量子 LDPC 码族在减少容错量子计算所需的开销方面具有相当大的前景，但使用现有方法计算它们的距离具有挑战性。我们通常在电路级错误模型下评估量子代码的性能，对于这种情况，电路距离是一个重要的考虑因素。计算电路距离通常比找到相应代码的距离更困难，因为电路的检测器误差矩阵通常比代码的校验矩阵大得多。在这项工作中，我们对各种经典和量子代码系列以及综合症提取电路的各种测距方法进行了基准测试。我们考虑精确方法（例如 Brouwer-Zimmermann、连通簇、SAT 和混合整数规划）和启发式方法，它们具有较低的运行时间，但只能给出距离的界限（示例包括随机信息集、校正子解码器算法和 Stim 不可检测错误方法）。\n\n我们进一步开发了 QDistEvol 算法，并表明它在我们的基准测试中对于量子 LDPC 码表现良好。算法和测试数据已在 codeDistance Python 包中向社区提供。", "authors": [{"name": "Mark Webster"}, {"name": "Abraham Jacob"}, {"name": "Oscar Higgott"}], "featured_authors": [{"name": "Mark Webster"}, {"name": "Abraham Jacob"}, {"name": "Oscar Higgott"}], "author_count": 3}, {"id": "2603.22656", "category": "quant-ph", "title": "Effect of the Atomic Dipole-Dipole Interaction on the Phase Diagrams of Field-Matter Interactions", "abstract": "Quantum information measures are used to study the quantum phase diagrams of the two-level Dicke model including the atomic dipole-dipole interaction, for a finite number of particles, with and without the rotating-wave approximation, which yields the conservation of the total number of excitations in the first case and its parity in the general case. We show that the quantum phase transitions can be observed in the fluctuation of the atomic populations and that of the number of photons, and also that the conditional probability distribution of the population of the excited state with zero photons carries the information of the quantum phase transitions when the matter-field interaction is weak.", "url": "https://arxiv.org/abs/2603.22656", "type": "理论+数值", "summary": "量子信息测量用于研究有限数量粒子的两级迪克模型的量子相图，包括原子偶极子-偶极子相互作用，有或没有旋转波近似，这产生了第一种情况下激发总数的守恒及其一般情况下的宇称性。我们发现，在原子布居和光子数的涨落中可以观察到量子相变，并且当物场相互作用较弱时，零光子激发态布居的条件概率分布携带了量子相变的信息。", "authors": [{"name": "S. Cordero"}, {"name": "E. Nahmad-Achar"}, {"name": "O. Castaños"}, {"name": "R. López-Peña"}], "featured_authors": [{"name": "S. Cordero"}, {"name": "E. Nahmad-Achar"}, {"name": "O. Castaños"}, {"name": "R. López-Peña"}], "author_count": 4}, {"id": "2603.22746", "category": "quant-ph", "title": "Boundary-sensitive non-Hermiticity of Floquet Hamiltonian: spectral transition and scale-free localization", "abstract": "We report a novel mechanism of boundary-sensitive PT symmetry breaking in one-dimensional Floquet systems. By designing a time-periodic driving protocol, we realize a Floquet Hamiltonian that is Hermitian under periodic boundary conditions yet acquires non-Hermitian boundary terms under open boundary conditions due to the non-commutativity of driving Hamiltonians. We establish that a PT symmetry breaking transition occurs when the quasienergy bandwidth expands to cover the entire frequency Brillouin zone. This condition highlights a crucial difference from static non-Hermitian systems, where such transitions typically require band touching. Furthermore, we demonstrate that in the PT-broken phase, the eigenstates exhibit scale-free localization, a phenomenon arising from the specific system-size scaling of non-Hermitian terms. Finally, we provide a general framework for constructing multi-band models that exhibit this boundary-induced phase transition.", "url": "https://arxiv.org/abs/2603.22746", "type": "理论", "summary": "我们报告了一维 Floquet 系统中边界敏感 PT 对称性破缺的新机制。通过设计时间周期驱动协议，我们实现了 Floquet 哈密顿量，该哈密顿量在周期性边界条件下是厄米式的，但由于驱动哈密顿量的不可交换性，在开放边界条件下获得非厄米式边界项。我们确定，当准能量带宽扩展至覆盖整个频率布里渊区时，就会发生 PT 对称破缺跃迁。这种情况凸显了与静态非厄米系统的一个关键区别，在静态非厄米系统中，这种转变通常需要带接触。此外，我们证明在 PT 破坏相中，本征态表现出无标度局域化，这是由非厄米项的特定系统尺寸缩放引起的现象。最后，我们提供了构建展示这种边界诱导相变的多带模型的通用框架。", "authors": [{"name": "Bo Li"}, {"name": "He-Ran Wang"}, {"name": "Fei Song"}], "featured_authors": [{"name": "Bo Li"}, {"name": "He-Ran Wang"}, {"name": "Fei Song"}], "author_count": 3}, {"id": "2603.22761", "category": "quant-ph", "title": "Charging efficiency bursts in a quantum battery with cyclic indefinite causal order", "abstract": "Enhancement of quantum battery performance is a popular subject in quantum thermodynamics. An interesting phenomenon is the quick charging effect [Phys. Rev. Res. 6, 023136 (2024)], which has been explored by utilizing a quantum interferometric technique known as superposition of trajectories. A similar technique used to boost quantum battery performance is indefinite causal order. Here, we propose a new charging protocol that utilizes cyclic indefinite causal order, whereby $N$ charging sequences are superposed when utilizing $N$ chargers. We observe charging efficiency bursts when implementing our cyclic indefinite charging protocol. The duration of these bursts increase with $N$. Additionally, we present a circuit model to implement our charging protocol for the two-charger scenario and perform proof-of-concept demonstrations on IonQ, Quantinuum and IBMQ quantum processors. The results validate the existence of charging efficiency bursts as shown by our theoretical analysis and numerical simulations.", "url": "https://arxiv.org/abs/2603.22761", "type": "理论+数值", "summary": "量子电池性能的增强是量子热力学中的一个热门课题。一个有趣的现象是快速充电效应[Phys。修订版研究。 6, 023136 (2024)]，这是通过利用称为轨迹叠加的量子干涉技术进行探索的。用于提高量子电池性能的类似技术是不确定因果顺序。在这里，我们提出了一种新的充电协议，该协议利用循环不定因果顺序，从而在使用 $N$ 充电器时叠加 $N$ 充电序列。在实施我们的循环无限充电协议时，我们观察到充电效率的爆发。这些突发的持续时间随着 $N$ 的增加而增加。此外，我们还提出了一个电路模型来实现两个充电器场景的充电协议，并在 IonQ、Quantinuum 和 IBMQ 量子处理器上进行概念验证演示。正如我们的理论分析和数值模拟所示，结果验证了充电效率爆发的存在。", "authors": [{"name": "Po-Rong Lai"}, {"name": "Hsien-Chao Jan"}, {"name": "Jhen-Dong Lin"}, {"name": "Yueh-Nan Chen"}], "featured_authors": [{"name": "Po-Rong Lai"}, {"name": "Hsien-Chao Jan"}, {"name": "Jhen-Dong Lin"}, {"name": "Yueh-Nan Chen"}], "author_count": 4}, {"id": "2603.22789", "category": "quant-ph", "title": "Understanding Bugs in Quantum Simulators: An Empirical Study", "abstract": "Quantum simulators are a foundational component of the quantum software ecosystem. They are widely used to develop and debug quantum programs, validate compiler transformations, and support empirical claims about correctness and performance. In the absence of large-scale quantum hardware, simulator outputs are often treated as ground truth for algorithm development and system evaluation. However, quantum simulators also introduce unique implementation challenges. They must faithfully emulate quantum behavior while executing on classical hardware, requiring complex representations of quantum state evolution, operator composition, and noise modeling. Yet, we still lack a large-scale and in-depth study of failures in quantum simulators. To bridge this gap, this work presents a comprehensive empirical study of bugs in widely used open-source quantum simulators. We analyze 394 confirmed bugs from 12 simulators and manually categorize them based on root causes, failure manifestations, affected components, and discovery mechanisms. Our study reveals several key findings. First, bug discovery is largely user-driven, with most crashes, exceptions, and resource-related failures not detected by automated testing and identified after deployment. Second, logical correctness failures are widespread and often silent, producing plausible but incorrect outputs without triggering crashes or explicit error signals. Third, many critical failures originate in classical simulator infrastructure, such as memory management, indexing, configuration, and dependency compatibility, rather than in core quantum execution logic. These findings provide new insights into the reliability challenges of quantum simulators and highlight opportunities to improve testing and validation practices in the quantum software ecosystem.", "url": "https://arxiv.org/abs/2603.22789", "type": "理论+数值", "summary": "量子模拟器是量子软件生态系统的基本组成部分。它们广泛用于开发和调试量子程序、验证编译器转换以及支持有关正确性和性能的经验主张。在缺乏大规模量子硬件的情况下，模拟器输出通常被视为算法开发和系统评估的基本事实。然而，量子模拟器也带来了独特的实施挑战。它们必须在经典硬件上执行时忠实地模拟量子行为，需要量子态演化、算子组合和噪声建模的复杂表示。然而，我们仍然缺乏对量子模拟器故障的大规模和深入的研究。为了弥补这一差距，这项工作对广泛使用的开源量子模拟器中的错误进行了全面的实证研究。我们分析了来自 12 个模拟器的 394 个已确认的错误，并根据根本原因、故障表现、受影响的组件和发现机制对它们进行手动分类。我们的研究揭示了几个关键发现。\n\n首先，错误发现主要是用户驱动的，大多数崩溃、异常和与资源相关的故障都没有通过自动化测试检测到，也没有在部署后识别出来。其次，逻辑正确性故障很普遍，而且通常是无声的，产生看似合理但不正确的输出，而不会触发崩溃或明确的错误信号。第三，许多关键故障源于经典模拟器基础设施，例如内存管理、索引、配置和依赖性兼容性，而不是核心量子执行逻辑。这些发现为量子模拟器的可靠性挑战提供了新的见解，并强调了改进量子软件生态系统中的测试和验证实践的机会。", "authors": [{"name": "Krishna Upadhyay"}, {"name": "Moshood Fakorede"}, {"name": "Umar Farooq"}], "featured_authors": [{"name": "Krishna Upadhyay"}, {"name": "Moshood Fakorede"}, {"name": "Umar Farooq"}], "author_count": 3}, {"id": "2603.22790", "category": "quant-ph", "title": "Quantum Random Forest for the Regression Problem", "abstract": "The Random Forest model is one of the popular models of Machine learning. We present a quantum algorithm for testing (forecasting) process of the Random Forest machine learning model for the Regression problem. The presented algorithm is more efficient (in terms of query complexity or running time) than the classical counterpart.", "url": "https://arxiv.org/abs/2603.22790", "type": "理论+数值", "summary": "随机森林模型是机器学习的流行模型之一。我们提出了一种量子算法，用于测试（预测）回归问题的随机森林机器学习模型的过程。所提出的算法比经典算法更有效（在查询复杂性或运行时间方面）。", "authors": [{"name": "Kamil Khadiev"}, {"name": "Liliya Safina"}], "featured_authors": [{"name": "Kamil Khadiev"}, {"name": "Liliya Safina"}], "author_count": 2}, {"id": "2603.22795", "category": "quant-ph", "title": "Exponential Separation of Quantum and Classical One-Way Numbers-on-Forehead Communication", "abstract": "Numbers-on-Forehead (NOF) communication model is a central model in communication complexity. As a restricted variant, one-way NOF model is of particular interest. Establishing strong one-way NOF lower bounds would imply circuit lower bounds, resolve well-known problems in additive combinatorics, and yield wide-ranging applications in areas such as cryptography and distributed computing. However, proving strong lower bounds in one-way NOF communication remains highly challenging; many fundamental questions in one-way NOF communication remain wide open. One of the fundamental questions, proposed by Gavinsky and Pudlák (CCC 2008), is to establish an explicit exponential separation between quantum and classical one-way NOF communication. In this paper, we resolve this open problem by establishing the first exponential separation between quantum and randomized communication complexity in one-way NOF model. Specifically, we define a lifted variant of the Hidden Matching problem of Bar-Yossef, Jayram, and Kerenidis (STOC 2004) and show that it admits an ($O(\\log n)$)-cost quantum protocol in the one-way NOF setting. By contrast, we prove that any $k$-party one-way randomized protocol for this problem requires communication $\\Omega(\\frac{n^{1/3}}{2^{k/3}})$. Notably, our separation applies even to a generalization of $k$-player one-way communication, where the first player speaks once, and all other $k-1$ players can communicate freely.", "url": "https://arxiv.org/abs/2603.22795", "type": "理论", "summary": "额头数字（NOF）通信模型是通信复杂性的核心模型。作为一种受限变体，单向 NOF 模型特别令人感兴趣。建立强大的单向 NOF 下界将意味着电路下界，解决加法组合学中的众所周知的问题，并在密码学和分布式计算等领域产生广泛的应用。然而，证明单向 NOF 通信的强大下界仍然极具挑战性；单向 NOF 通信中的许多基本问题仍然悬而未决。 Gavinsky 和 ​​Pudlák (CCC 2008) 提出的基本问题之一是在量子和经典单向 NOF 通信之间建立明确的指数分离。在本文中，我们通过在单向 NOF 模型中建立量子和随机通信复杂性之间的第一个指数分离来解决这个开放问题。具体来说，我们定义了 Bar-Yossef、Jayram 和 Kerenidis (STOC 2004) 的隐藏匹配问题的提升变体，并表明它在单向 NOF 设置中承认 ($O(\\log n)$) 成本量子协议。\n\n相比之下，我们证明解决此问题的任何 $k$ 方单向随机协议都需要通信 $\\Omega(\\frac{n^{1/3}}{2^{k/3}})$。值得注意的是，我们的分离甚至适用于 $k$ 玩家单向通信的概括，其中第一个玩家发言一次，所有其他 $k-1$ 玩家可以自由通信。", "authors": [{"name": "Guangxu Yang"}, {"name": "Jiapeng Zhang"}], "featured_authors": [{"name": "Guangxu Yang"}, {"name": "Jiapeng Zhang"}], "author_count": 2}, {"id": "2603.22833", "category": "quant-ph", "title": "RC-HEOM Hybrid Method for Non-Perturbative Open System Dynamics", "abstract": "The Hierarchical equations of motion (HEOM) method is an important non-perturbative technique, allowing numerically exact treatment of open quantum systems with strong coupling and non-Markovian memory. However, its encoding of bath memory into auxiliary density operators often limits direct access to detailed bath information. In contrast, the reaction-coordinate (RC) mapping allows direct and transparent access to the dominant collective bath mode, but its perturbative and often Markovian treatment of the residual bath restricts its reliability. In this work, we introduce RC-HEOM, a hybrid method that unifies the strengths of both approaches by combining RC mapping with a fully non-perturbative HEOM description of the residual bath. RC-HEOM simultaneously retains exact non-Markovian memory and access to the RC mode, which enables analysis of system-RC information. Applying this method to the Anderson impurity models, we directly track the emergence of the Kondo singlet from the growth of the Kondo resonance and uncover a nontrivial RC-mediated coherence revival. These results demonstrate that RC-HEOM is a promising method for characterizing open quantum systems in regimes that are difficult to access with conventional master-equation methods.", "url": "https://arxiv.org/abs/2603.22833", "type": "理论+数值", "summary": "分层运动方程 (HEOM) 方法是一种重要的非微扰技术，可以对具有强耦合和非马尔可夫记忆的开放量子系统进行数值精确处理。然而，它将浴内存编码为辅助密度运算符，通常会限制对详细浴信息的直接访问。相比之下，反应坐标（RC）映射允许直接和透明地访问占主导地位的集体浴模式，但其对残余浴的扰动且通常是马尔可夫处理限制了其可靠性。在这项工作中，我们引入了 RC-HEOM，这是一种混合方法，通过将 RC 映射与残余浴的完全非微扰 HEOM 描述相结合，统一了两种方法的优点。 RC-HEOM 同时保留精确的非马尔可夫记忆和对 RC 模式的访问，从而能够分析系统 RC 信息。将此方法应用于安德森杂质模型，我们直接从近藤共振的增长中跟踪近藤单线态的出现，并揭示了一个非平凡的 RC 介导的相干性复兴。\n\n这些结果表明，RC-HEOM 是一种很有前途的方法，可用于表征传统主方程方法难以访问的开放量子系统。", "authors": [{"name": "Po-Rong Lai"}, {"name": "Jhen-Dong Lin"}, {"name": "Yi-Te Huang"}, {"name": "Po-Chen Kuo"}, {"name": "Neill Lambert"}, {"name": "Yueh-Nan Chen"}], "featured_authors": [{"name": "Po-Rong Lai"}, {"name": "Jhen-Dong Lin"}, {"name": "Yi-Te Huang"}, {"name": "Po-Chen Kuo"}, {"name": "Neill Lambert"}, {"name": "Yueh-Nan Chen"}], "author_count": 6}, {"id": "2603.22891", "category": "quant-ph", "title": "STAR-Magic Mutation: Even More Efficient Analog Rotation Gates for Early Fault-Tolerant Quantum Computer", "abstract": "We introduce STAR-magic mutation, an efficient protocol for implementing logical rotation gates on early fault-tolerant quantum computers. This protocol judiciously combines two of the latest state preparation protocols: transversal multi-rotation protocol and magic state cultivation. It achieves a logical rotation gate with a favorable error scaling of $\\mathcal{O}(\\theta_L^{2(1-\\Theta(1/d))}p_{\\text{ph}})$, while requiring only the ancillary space of a single surface code patch. Here, $\\theta_L$ is the logical rotation angle, $p_{\\text{ph}}$ is the physical error rate, and $d$ is the code distance. This scaling marks a significant improvement over the previous state-of-the-art, $\\mathcal{O}(\\theta_L p_{\\text{ph}})$, making our protocol particularly powerful for implementing a sequence of small-angle rotation gates, like Trotter-based circuits. Notably, for $\\theta_L \\lesssim 10^{-5}$, our protocol achieves a two-order-of-magnitude reduction in both the execution time and the error rate of analog rotation gates compared to the standard $T$-gate synthesis using cultivated magic states. Building upon this protocol, we also propose a novel quantum computing architecture designed for early fault-tolerant quantum computers, dubbed ``STAR ver.~3\". It employs a refined circuit compilation strategy based on Clifford+$T$+$\\phi$ gate set, rather than the conventional Clifford+$T$ or Clifford+$\\phi$ gate sets. We establish a theoretical bound on the feasible circuit size on this architecture and illustrate its capabilities by analyzing the spacetime costs for simulating the dynamics of quantum many-body systems. Specifically, we demonstrate that our architecture can simulate biologically-relevant molecules or lattice models at scales beyond the reach of exact classical simulation, with only a few hundred thousand physical qubits, even assuming a realistic error rate of $p_{\\text{ph}}=10^{-3}$.", "url": "https://arxiv.org/abs/2603.22891", "type": "理论+数值", "summary": "我们引入了 STAR-magicmutation，这是一种在早期容错量子计算机上实现逻辑旋转门的有效协议。该协议明智地结合了两种最新的状态准备协议：横向多旋转协议和魔法状态培养。它实现了一个逻辑旋转门，其误差缩放为 $\\mathcal{O}(\\theta_L^{2(1-\\Theta(1/d))}p_{\\text{ph}})$，同时仅需要单个表面代码补丁的辅助空间。这里，$\\theta_L$是逻辑旋转角度，$p_{\\text{ph}}$是物理错误率，$d$是编码距离。这种缩放标志着对之前最先进的 $\\mathcal{O}(\\theta_L p_{\\text{ph}})$ 的显着改进，使得我们的协议对于实现一系列小角度旋转门（例如基于 Trotter 的电路）特别强大。值得注意的是，对于 $\\theta_L \\lesssim 10^{-5}$，与使用培养魔法状态的标准 $T$ 门合成相比，我们的协议在模拟旋转门的执行时间和错误率方面实现了两个数量级的减少。\n\n在此协议的基础上，我们还提出了一种专为早期容错量子计算机设计的新型量子计算架构，称为“STAR ver.~3”。它采用基于 Clifford+$T$+$\\phi$ 门集的精细电路编译策略，而不是传统的 Clifford+$T$ 或 Clifford+$\\phi$ 门集。我们对该架构上的可行电路尺寸建立了理论界限，并通过分析模拟量子多体动力学的时空成本来说明其能力具体来说，我们证明我们的架构可以模拟生物相关的分子或晶格模型，其规模超出了精确的经典模拟的范围，即使假设实际错误率为 $p_{\\text{ph}}=10^{-3}$，也只需几十万个物理量子位。", "authors": [{"name": "Riki Toshio"}, {"name": "Shota Kanasugi"}, {"name": "Jun Fujisaki"}, {"name": "Hirotaka Oshima"}, {"name": "Shintaro Sato"}, {"name": "Keisuke Fujii"}], "featured_authors": [{"name": "Riki Toshio"}, {"name": "Shota Kanasugi"}, {"name": "Jun Fujisaki"}, {"name": "Hirotaka Oshima"}, {"name": "Shintaro Sato"}, {"name": "Keisuke Fujii"}], "author_count": 6}, {"id": "2603.22994", "category": "quant-ph", "title": "Dynamical Evolution of Quantum Correlations and Decoherence in Coupled Oscillators Interacting with a Thermal Reservoir", "abstract": "We investigate the dynamical evolution of quantum discord, entanglement and purity in an open quantum system of two coupled asymmetric harmonic oscillators interacting with a thermal environment. Using the Kossakowski-Lindblad master equation we analyze the time evolution starting with a squeezed vacuum state. In contrast to our previous study on entanglement evolution in asymmetric oscillators, the present work introduces XY-type position-position coupling together with a systematic joint analysis of quantum discord and purity alongside entanglement. We examine the combined effects of the squeezing parameter, asymmetry parameter, coupling constant, dissipation rate and temperature. We find that quantum discord and entanglement exhibit, in general, a non-monotonic decrease over time. Increasing temperature consistently accelerates the degradation of both quantum correlations and purity, whereas increasing dissipation accelerates the degradation of quantum correlations but leads to higher steady-state purity. Increasing the squeezing parameter provides a protective effect by enhancing initial correlations and prolonging entanglement survival time, while increasing the coupling constant leads to higher quantum correlations. The asymmetry parameter exhibits only a weak influence on the correlation evolution. Our analysis reveals that quantum discord demonstrates stronger resilience than entanglement, which can present more complex behaviour including entanglement sudden death and possible temporary revivals and re-suppressions. These findings provide valuable insights for developing robust quantum information protocols and strategies for preserving quantum correlations in realistic open quantum systems, with potential extensions to non-Markovian regimes and multi-mode architectures.", "url": "https://arxiv.org/abs/2603.22994", "type": "理论", "summary": "我们研究了两个耦合不对称谐振子与热环境相互作用的开放量子系统中量子不和谐、纠缠和纯度的动态演化。使用 Kossakowski-Lindblad 主方程，我们分析从压缩真空状态开始的时间演化。与我们之前对非对称振荡器中纠缠演化的研究不同，本研究引入了 XY 型位置-位置耦合，并对量子不和谐和纯度以及纠缠进行系统联合分析。我们研究了挤压参数、不对称参数、耦合常数、耗散率和温度的综合影响。我们发现，量子不和谐和纠缠通常随着时间的推移呈现非单调减少。温度升高持续加速量子相关性和纯度的退化，而增加耗散则加速量子相关性的退化，但会导致更高的稳态纯度。\n\n增加压缩参数可以通过增强初始相关性和延长纠缠生存时间来提供保护作用，同时增加耦合常数会导致更高的量子相关性。不对称参数对相关性演化仅表现出微弱的影响。我们的分析表明，量子不和谐表现出比纠缠更强的弹性，它可以呈现更复杂的行为，包括纠缠猝死以及可能的暂时复活和重新抑制。这些发现为开发强大的量子信息协议和策略提供了宝贵的见解，以在现实的开放量子系统中保留量子相关性，并有可能扩展到非马尔可夫体系和多模式架构。", "authors": [{"name": "Somayeh Mehrabankar"}, {"name": "Farkhondeh Abbasnezhad"}, {"name": "Davood Afshar"}, {"name": "Aurelian Isar"}], "featured_authors": [{"name": "Somayeh Mehrabankar"}, {"name": "Farkhondeh Abbasnezhad"}, {"name": "Davood Afshar"}, {"name": "Aurelian Isar"}], "author_count": 4}, {"id": "2603.23009", "category": "quant-ph", "title": "Connection-topology--dependent energy transport and ergotropy in quantum battery networks with reciprocal and nonreciprocal couplings", "abstract": "The realization of scalable quantum battery architectures requires concern not only with how much energy can be stored, but also with how energy is transported, distributed, and converted into extractable work across connected battery nodes. While previous studies mainly focused on collective charging in multi-cell quantum batteries, the topology-dependent transport law and the corresponding work-oriented performance of quantum battery networks remain largely unexplored. In this work, we investigate quantum battery networks with engineered reciprocal and nonreciprocal couplings and compare different connection topologies, including cascaded and parallel architectures, within a unified transport framework. In the nonreciprocal regime, the optimal coupling follows distinct scaling laws for the two connection topologies, namely $J_{\\rm op}^{c}\\propto N$ for cascaded transport and $J_{\\rm op}^{p}\\propto N^{-1/2}$ for parallel charging in the large-$N$ limit. In reciprocal cascaded networks, a parity-dependent spectral response produces an odd-even transport effect that is absent in the nonreciprocal and parallel configurations. We further analyze the role of thermal and squeezed reservoirs and show that thermal noise mainly increases passive energy, whereas squeezing enhances ergotropy and thus the useful fraction of stored energy. These results shift the emphasis from charging enhancement to transport engineering and provide architecture-level design principles for quantum battery networks.", "url": "https://arxiv.org/abs/2603.23009", "type": "理论", "summary": "实现可扩展的量子电池架构不仅需要考虑可以存储多少能量，还需要考虑如何在连接的电池节点上传输、分配能量并将其转换为可提取的功。虽然之前的研究主要集中在多节量子电池的集体充电上，但量子电池网络的拓扑相关传输定律和相应的面向工作的性能仍然很大程度上未被探索。在这项工作中，我们研究了具有工程互易和非互易耦合的量子电池网络，并在统一的传输框架内比较了不同的连接拓扑，包括级联和并行架构。在不可逆机制中，最佳耦合遵循两种连接拓扑的不同缩放法则，即用于级联传输的 $J_{\\rm op}^{c}\\propto N$ 和用于大 $N$ 限制内并行充电的 $J_{\\rm op}^{p}\\propto N^{-1/2}$。在互易级联网络中，奇偶校验相关的光谱响应产生奇偶传输效应，这在非互易和并行配置中不存在。\n\n我们进一步分析了热和挤压储层的作用，并表明热噪声主要增加被动能量，而挤压增强了各向异性，从而提高了存储能量的有用部分。这些结果将重点从充电增强转移到运输工程，并为量子电池网络提供了架构级设计原则。", "authors": [{"name": "Bing-Bing Liu"}, {"name": "Rui Chen"}, {"name": "Jin-Lei Wu"}, {"name": "Gang Chen"}, {"name": "Shi-Lei Su"}], "featured_authors": [{"name": "Bing-Bing Liu"}, {"name": "Rui Chen"}, {"name": "Jin-Lei Wu"}, {"name": "Gang Chen"}, {"name": "Shi-Lei Su"}], "author_count": 5}, {"id": "2603.23097", "category": "quant-ph", "title": "Propagation of optical vector vortices of slow light in a coherently prepared tripod configuration", "abstract": "We investigate the propagation of optical vector vortices of slow light in a coherently prepared four-level tripod atomic system. The vector vortex consists of superposed pulse pairs with opposite circular polarizations and orbital angular momentum (OAM) charges $\\pm l$, weakly interacting with an atomic medium initially prepared in a coherent superposition of two ground states. A third unoccupied state is coupled to a stronger control laser without OAM, creating a phase-dependent configuration. In the linear regime, the vortex OAM is mapped onto the medium, producing symmetrical azimuthally structured absorption patterns, with losses significantly reduced by the control field. For small detunings, complementary spatially dependent amplification and absorption occur for the two circular polarization components. This OAM-structured coherence induces a dynamical anisotropy, affecting both the intensity and polarization of the slow-light vortex. Polarization states evolve periodically between left-circular, linear, and right-circular polarizations during propagation. Once the beam reaches a stationary regime, the ring-shaped intensity transforms into a petal-like structure, and the final polarization states stabilize according to the initial superposition. The rate of polarization transitions is tunable via the control field strength, demonstrating flexible control over slow-light vector vortex dynamics.", "url": "https://arxiv.org/abs/2603.23097", "type": "理论", "summary": "我们研究了相干准备的四能级三脚原子系统中慢光光矢量涡旋的传播。矢量涡旋由具有相反圆偏振和轨道角动量 (OAM) 电荷 $\\pm l$ 的叠加脉冲对组成，与最初在两个基态相干叠加中制备的原子介质发生弱相互作用。第三个未占据状态耦合到更强的控制激光器，无需 OAM，从而创建相位相关的配置。在线性状态下，涡旋 OAM 被映射到介质上，产生对称的方位角结构化吸收图案，控制场显着降低了损耗。对于小的失谐，两个圆偏振分量会发生互补的空间相关放大和吸收。这种 OAM 结构的相干性会引起动态各向异性，影响慢光涡旋的强度和偏振。在传播过程中，偏振态在左圆偏振、线偏振和右圆偏振之间周期性变化。\n\n一旦光束达到静止状态，环形强度就会转变为花瓣状结构，并且最终的偏振态根据初始叠加而稳定。偏振跃迁速率可通过控制场强进行调节，展示了对慢光矢量涡旋动力学的灵活控制。", "authors": [{"name": "Dharma P. Permana"}, {"name": "Mažena Mackoit Sinkevičienė"}, {"name": "Julius Ruseckas"}, {"name": "Hamid R. Hamedi"}], "featured_authors": [{"name": "Dharma P. Permana"}, {"name": "Mažena Mackoit Sinkevičienė"}, {"name": "Julius Ruseckas"}, {"name": "Hamid R. Hamedi"}], "author_count": 4}, {"id": "2603.23124", "category": "quant-ph", "title": "Quantum speedup from nonclassical polarization", "abstract": "We develop a framework for identifying nonclassical speedups in systems with polarization, likewise spin degrees of freedom. By confining the dynamics to the manifold of angular momentum coherent states, which act as the classical reference in this case, we compute the speed limit that bounds the rate of change of the state achievable without generating quantum coherence. A comparison with the unrestricted quantum speed limit enables the quantitative identification of speedups arising from polarization nonclassicality. We apply this framework to the cross-Kerr interaction, demonstrating a persistent speedup scaling as $\\mathcal{O}(\\sqrt{N})$ with the photon number $N$. The results establish polarization nonclassicality as a genuine dynamical resource, linking quantum coherence to quantum-enhanced evolution speeds in nonlinear photonic systems.", "url": "https://arxiv.org/abs/2603.23124", "type": "理论", "summary": "我们开发了一个框架，用于识别极化系统中的非经典加速，同样是自旋自由度。通过将动力学限制在角动量相干态流形（在这种情况下充当经典参考），我们计算了在不产生量子相干性的情况下可实现的状态变化率的速度极限。与无限制的量子速度极限的比较能够定量识别由偏振非经典性引起的加速。我们将此框架应用于跨克尔相互作用，证明了光子数 $N$ 的持续加速缩放为 $\\mathcal{O}(\\sqrt{N})$。结果将偏振非经典性确立为真正的动力学资源，将量子相干性与非线性光子系统中的量子增强演化速度联系起来。", "authors": [{"name": "Tim Aßbrock"}, {"name": "Jan Sperling"}, {"name": "Laura Ares"}], "featured_authors": [{"name": "Tim Aßbrock"}, {"name": "Jan Sperling"}, {"name": "Laura Ares"}], "author_count": 3}, {"id": "2603.23258", "category": "quant-ph", "title": "Solving Nonlinear Partial Differential Equations via a Hybrid Newton Method Using Quantum Linear System Solver", "abstract": "To approximate solutions of complex nonlinear partial differential equations remains a computational challenge, especially for sets of equations relevant in industry, such as Euler or Navier-Stokes equations. Even the most sophisticated computational fluid dynamic algorithms coupled with powerful supercomputers can not find approximate solutions for several design challenges in both adequate time and scale-resolving accuracy. One difficulty arises from solving high dimensional, strongly nonlinear partial differential equations, such as the Navier-Stokes equations, which capture the underlying physics. For nearly all classical algorithms, methods closely related to Newton's method are used to approximate a solution to the problem. Approximately solving the large-scale linear systems of equations occurring in this iterative scheme is generally a main contributor to the total computational complexity. In this paper a new quantum linear system solver supporting Newton's classical method to solve nonlinear partial differential equations is introduced. We present a new variant of the HHL algorithm, requiring less apriori information regarding the eigenvalues of the corresponding matrix. We apply this quantum linear system solver in a hybrid quantum-classical fashion to solve nonlinear partial differential equations. Moreover, a resource estimation for advanced use-cases of practical relevance is provided. Our results demonstrate how quantum computation may improve existing classical methodologies for solving nonlinear partial differential equations. This approach provides another promising application of quantum computers and presents a possible way forward for handling nonlinearities on inherently linear quantum systems.", "url": "https://arxiv.org/abs/2603.23258", "type": "理论+数值", "summary": "复杂非线性偏微分方程的近似解仍然是一个计算挑战，特别是对于工业相关的方程组，例如欧拉或纳维-斯托克斯方程。即使是最复杂的计算流体动力学算法与强大的超级计算机相结合，也无法在足够的时间和尺度解析精度上找到针对多种设计挑战的近似解决方案。解决高维、强非线性偏微分方程（例如纳维-斯托克斯方程）会产生一个困难，该方程捕捉了底层物理原理。对于几乎所有经典算法，都使用与牛顿法密切相关的方法来近似解决问题。近似求解该迭代方案中出现的大规模线性方程组通常是总计算复杂性的主要贡献者。本文介绍了一种支持牛顿经典方法求解非线性偏微分方程的新型量子线性系统求解器。我们提出了 HHL 算法的新变体，需要更少的有关相应矩阵特征值的先验信息。\n\n我们以混合量子经典方式应用这个量子线性系统求解器来求解非线性偏微分方程。此外，还提供了具有实际相关性的高级用例的资源估计。我们的结果证明了量子计算如何改进现有的求解非线性偏微分方程的经典方法。这种方法提供了量子计算机的另一种有前景的应用，并为处理固有线性量子系统的非线性提供了一种可能的方法。", "authors": [{"name": "Maximilian Mandelt Buxadé"}, {"name": "Stefan Langer"}, {"name": "Philipp Bekemeyer"}], "featured_authors": [{"name": "Maximilian Mandelt Buxadé"}, {"name": "Stefan Langer"}, {"name": "Philipp Bekemeyer"}], "author_count": 3}, {"id": "2603.23362", "category": "quant-ph", "title": "Global control via quantum actuators", "abstract": "We introduce the concept of quantum actuators as mediators for globally controlled quantum computation. Auxiliary quantum systems act as controllable elements that transiently store and release interaction energy, enabling the selective activation of multi-qubit gates within globally driven architectures. During compilation they remain passive and require no fine-grained local control, while during operation they allow for controlled activation of interactions and directional flow of quantum information. We provide a framework for embedding quantum actuators in globally controlled processors, showing how they enhance connectivity, enable long-range entangling operations, and bridge distant regions without increasing local control overhead. We discuss physical implementations and architectural strategies illustrating how these elements extend the capabilities of global-control schemes. A complementary interpretation in terms of quantum batteries naturally emerges, connecting global-control architectures with concepts from quantum thermodynamics while highlighting the distinct operational role of quantum actuators.", "url": "https://arxiv.org/abs/2603.23362", "type": "理论", "summary": "我们引入量子执行器的概念作为全局控制量子计算的中介。辅助量子系统充当可控元件，可瞬时存储和释放相互作用能量，从而能够选择性激活全局驱动架构中的多量子位门。在编译过程中，它们保持被动状态，不需要细粒度的本地控制，而在操作过程中，它们允许受控激活相互作用和量子信息的定向流动。我们提供了一个在全局控制的处理器中嵌入量子执行器的框架，展示了它们如何增强连接性、实现远程纠缠操作以及在不增加本地控制开销的情况下桥接遥远的区域。我们讨论物理实现和架构策略，说明这些元素如何扩展全局控制方案的功能。量子电池方面的补充解释自然出现，将全局控制架构与量子热力学概念联系起来，同时强调量子执行器的独特操作作用。", "authors": [{"name": "Roberto Menta"}, {"name": "Francesco Cioni"}, {"name": "Riccardo Aiudi"}, {"name": "Marco Polini"}, {"name": "Vittorio Giovannetti"}], "featured_authors": [{"name": "Roberto Menta"}, {"name": "Francesco Cioni"}, {"name": "Riccardo Aiudi"}, {"name": "Marco Polini"}, {"name": "Vittorio Giovannetti"}], "author_count": 5}, {"id": "2603.23388", "category": "quant-ph", "title": "Two-parameter Family-Vicsek scaling in a dissipative XXZ spin chain", "abstract": "Family-Vicsek (FV) scaling provides an understanding for the growth and finite-size saturation of fluctuations in classical systems. Here, we extend the FV roughness to transferred segment magnetization after quantum quenches in a dissipative XXZ spin chain with homogeneous gain and loss, starting from a nonequilibrium steady state with finite magnetization. In the non-interacting limit, we derive a closed-form expression for the roughness in the presence of dissipation. It displays two-parameter FV scaling and smoothly interpolates between the clean ballistic behavior and the dissipation dominated scalings. For interacting chains, tensor-network simulations show that the non-dissipative ballistic growth at finite magnetization is robust, whereas the full Lindblad evolution is generically controlled by the dissipative relaxation time and exhibits a dissipation-dominated collapse.", "url": "https://arxiv.org/abs/2603.23388", "type": "数值", "summary": "Family-Vicsek (FV) 标度提供了对经典系统中波动的增长和有限大小饱和的理解。在这里，我们从具有有限磁化强度的非平衡稳态开始，将 FV 粗糙度扩展到具有均匀增益和损耗的耗散 XXZ 自旋链中的量子淬灭后的转移段磁化强度。在非相互作用极限下，我们推导出存在耗散的情况下粗糙度的封闭式表达式。它显示双参数 FV 缩放，并在干净弹道行为和耗散主导缩放之间平滑插值。对于相互作用的链，张量网络模拟表明，有限磁化强度下的非耗散弹道增长是稳健的，而完整的 Lindblad 演化一般由耗散弛豫时间控制，并表现出耗散主导的崩溃。", "authors": [{"name": "Cătălin Paşcu Moca"}, {"name": "Doru Sticlet"}, {"name": "Tamás Vicsek"}, {"name": "Balázs Dóra"}], "featured_authors": [{"name": "Cătălin Paşcu Moca"}, {"name": "Doru Sticlet"}, {"name": "Tamás Vicsek"}, {"name": "Balázs Dóra"}], "author_count": 4}, {"id": "2603.23407", "category": "quant-ph", "title": "Encoding Numerical Data for Generative Quantum Machine Learning", "abstract": "Generative quantum machine learning models are trained to deduce the probability distribution underlying a given dataset, and to produce new, synthetic samples from it. The majority of such models proposed in the literature, like the Quantum Circui
