able dimer chain exhibits a sharper effect: its zero-temperature state is unentangled across the cut, whereas every fixed $T>0$ produces $E_{\\mathrm{D}}=\\frac{1}{2}\\log_2 N+C(T)+o(1)$, with crossover scale $T_*(N)\\sim\\Delta/\\ln N$. Exact diagonalization of a nonintegrable chain is consistent with the predicted scaling. Thus heating can activate system-size-diverging distillable entanglement across a macroscopic bipartition when thermalization is confined by a non-Abelian conservation law.", "url": "https://arxiv.org/abs/2607.12710", "type": "理论+数值", "summary": "热噪声通常会抑制量子纠缠。我们证明，强大的非阿贝尔守恒定律可以将局部热波动转化为无限的操作资源。对于限制在全局单重扇区的一类广泛的有限范围 $SU(2)$ 不变自旋链，显式表示空间协议在整个有限高温区间内产生 $Y_N=\\frac12\\log_2 N+O_\\beta(1)$，从而产生 $E_{\\mathrm{D}}\\geq Y_N$。局部热波动产生子系统自旋 $j\\sim\\sqrt N$，其全局锁定的不可约表示包含 $\\log_2(2j+1)\\sim\\frac12\\log_2N$ ebits。完全可解的二聚体链表现出更尖锐的效果：它的零温度状态在切割过程中没有纠缠，而每个固定的$T>0$都会产生$E_{\\mathrm{D}}=\\frac{1}{2}\\log_2 N+C(T)+o(1)$，交叉尺度为$T_*(N)\\sim\\Delta/\\ln N$。不可积链的精确对角化与预测的缩放一致。因此，当热化受到非阿贝尔守恒定律限制时，加热可以激活宏观二分系统尺寸发散的可蒸馏纠缠。", "authors": [{"name": "Shuai Zeng"}], "featured_authors": [{"name": "Shuai Zeng"}], "author_count": 1}, {"id": "2607.12780", "category": "quant-ph", "title": "When Close Enough Is Not Enough: Autoregressive Drift in Quantum Circuit Synthesis", "abstract": "Quantum circuit optimization for fault-tolerant computing requires exact functional equivalence while minimizing expensive non-Clifford resources such as T gates. We study this problem using a compact 44.8M-parameter encoder-decoder transformer with structured circuit tokenization, evaluating on parameterized circuits (2-6 qubits) and Clifford+T circuits (3-6 qubits). On parameterized circuits, a hybrid approach -- structure from the transformer, angles from classical optimization -- achieves median fidelity 1.000 on 3-6 qubit circuits. On Clifford+T circuits, where all gates are discrete and no post-processing is possible, the model learns valid syntax and accurate T-Count statistics, yet exact equivalence degrades sharply with target length -- from 88% on circuits with <=9 gates to near zero beyond 26 gates. We trace this failure to autoregressive drift: early-token divergence cascading irrecoverably through left-to-right decoding. Two levers partially mitigate the drift: inference-time strategies that generate multiple candidates and select via equivalence verification raise exact-match rates from 7% to 22.5%, while scaling training data by 2.5x pushes them to 39.5%. Yet the degradation with target length persists -- even with more data, exact equivalence drops from 94% on short circuits to under 4% beyond 26 gates. The contrast between settings is our central finding: when approximate outputs can be rescued by post-processing, the transformer succeeds; when exact discrete correctness is required, autoregressive drift limits reliability, with both inference-time search and data scaling as effective levers while training-side fine-tuning and model-level diversification are not.", "url": "https://arxiv.org/abs/2607.12780", "type": "理论+数值", "summary": "容错计算的量子电路优化需要精确的功能等效性，同时最大限度地减少 T 门等昂贵的非 Clifford 资源。我们使用具有结构化电路标记化的紧凑型 44.8M 参数编码器-解码器变压器来研究这个问题，并对参数化电路（2-6 量子位）和 Clifford+T 电路（3-6 量子位）进行评估。在参数化电路上，混合方法（来自变压器的结构、来自经典优化的角度）在 3-6 量子位电路上实现了中值保真度 1.000。在 Clifford+T 电路上，所有门都是离散的，并且无法进行后处理，模型会学习有效的语法和准确的 T 计数统计数据，但精确等价性会随着目标长度的增加而急剧下降——从 <=9 个门的电路上的 88% 到超过 26 个门的电路上的接近零。我们将这种失败归因于自回归漂移：早期令牌分歧通过从左到右的解码不可恢复地级联。有两个杠杆部分缓解了这种漂移：生成多个候选并通过等效性验证进行选择的推理时间策略将精确匹配率从 7% 提高到 22.5%，同时将训练数据扩展 2.5 倍将其推至 39.5%。\n\n然而，目标长度的退化仍然存在——即使有更多的数据，精确等效性也从短路时的 94% 下降到超过 26 个门的 4% 以下。设置之间的对比是我们的核心发现：当可以通过后处理来挽救近似输出时，变压器就会成功；当需要精确的离散正确性时，自回归漂移会限制可靠性，推理时间搜索和数据缩放都是有效的杠杆，而训练端微调和模型级多样化则不是。", "authors": [{"name": "Mehdi Saeedi"}, {"name": "Eddie Richter"}, {"name": "Paul Hartke"}], "featured_authors": [{"name": "Mehdi Saeedi"}, {"name": "Eddie Richter"}, {"name": "Paul Hartke"}], "author_count": 3}, {"id": "2607.12821", "category": "quant-ph", "title": "A Quantum Computing Approach to Track Reconstruction in Strip-Type Detectors", "abstract": "This study investigates the use of quantum annealing for particle track reconstruction in strip-type gaseous detectors. In such detectors, ghost hits and multiple hit combinations can turn pattern recognition into a combinatorial optimization problem. We formulate two reconstruction subproblems as quadratic unconstrained binary optimization problems. The first subproblem selects detector hits associated with a single photon track inside a localized candidate region. The second subproblem selects cluster triplets from different detector layers so that multiple track candidates can be handled within a single quantum processing unit(QPU) submission. The proposed formulations are tested using simulated DAMSA detector events. For the single track hit selection task, the QPU based reconstruction gives position and angular resolutions close to those obtained with a Kalman based reconstruction. In the simultaneous association task, valid cluster triplets are first extracted from the QPU samples and then connected using an association rule based on graph connectivity to construct track candidates. The DAMSA event topology studied here has low pileup and is dominated by the two photon signal from axion-like particle(ALP) decay. In this setting, the results show that the QUBO formulations can reproduce local reconstruction decisions. This provides a practical basis for further studies of reconstruction methods that combine quantum and classical computing in more complex tracking environments.", "url": "https://arxiv.org/abs/2607.12821", "type": "数值", "summary": "本研究研究了使用量子退火在带状气体探测器中进行粒子轨迹重建。在此类检测器中，幽灵命中和多次命中组合可以将模式识别转变为组合优化问题。我们将两个重建子问题表述为二次无约束二元优化问题。第一个子问题选择与局部候选区域内的单个光子轨迹相关的探测器命中。第二个子问题从不同的检测器层选择簇三元组，以便可以在单个量子处理单元（QPU）提交中处理多个候选轨道。使用模拟 DAMSA 探测器事件测试所提出的配方。对于单轨道命中选择任务，基于 QPU 的重建给出的位置和角度分辨率接近于基于卡尔曼的重建获得的位置和角度分辨率。在同时关联任务中，首先从 QPU 样本中提取有效的簇三元组，然后使用基于图连接的关联规则进行连接以构建候选轨道。\n\n这里研究的 DAMSA 事件拓扑具有低堆积性，并且由类轴子粒子 (ALP) 衰变的两个光子信号主导。在这种情况下，结果表明 QUBO 公式可以重现局部重建决策。这为进一步研究在更复杂的跟踪环境中结合量子和经典计算的重建方法提供了实践基础。", "authors": [{"name": "Seungyeob Jwa"}, {"name": "Hyunyong Kim"}, {"name": "Jangho Kim"}, {"name": "Minseok Oh"}], "featured_authors": [{"name": "Seungyeob Jwa"}, {"name": "Hyunyong Kim"}, {"name": "Jangho Kim"}, {"name": "Minseok Oh"}], "author_count": 4}, {"id": "2607.12822", "category": "quant-ph", "title": "The Resolution of the Identity as a Generator of Exact Integral Identities: A Coherent-State Approach", "abstract": "The resolution of the identity is typically utilized as a passive representation tool in standard quantum mechanics textbooks. In this paper, we reinterpret this traditional perspective by introducing the resolution of the identity associated with Glauber coherent states as a direct generator of exact complex Gaussian integral identities. By systematically projecting the continuous coherent-state completeness relation onto the discrete Fock basis, highly generalized Gaussian integral relations emerge naturally as a direct consequence of state preservation, rather than being introduced as independent mathematical postulates. We demonstrate that this overarching formal structure simultaneously dictates both discrete (Kronecker delta) and continuous (Dirac delta) localization kernels under appropriate basis projections, providing a sharp conceptual contrast between the structural features of overcomplete and strictly orthogonal representations. Crucially, we highlight an intriguing non-commuting behavior in the parameter limits of the master identity. Requiring only the elementary properties of coherent states and the Dirac formalism, this approach offers a transparent and visually intuitive illustration of how Hilbert-space completeness inherently encodes vast libraries of exact, solvable mathematical relations -- providing a unifying perspective suitable for advanced undergraduate and graduate instruction.", "url": "https://arxiv.org/abs/2607.12822", "type": "理论", "summary": "在标准量子力学教科书中，恒等式的解析通常被用作被动表示工具。在本文中，我们通过引入与格劳伯相干态相关的恒等式的分辨率作为精确复杂高斯积分恒等式的直接生成器来重新解释这一传统观点。通过系统地将连续相干态完整性关系投影到离散福克基础上，高度广义的高斯积分关系自然地作为状态保存的直接结果出现，而不是作为独立的数学假设引入。我们证明，这种总体形式结构在适当的基础投影下同时规定了离散（Kronecker delta）和连续（Dirac delta）定位内核，从而在过完备和严格正交表示的结构特征之间提供了鲜明的概念对比。至关重要的是，我们强调了主身份的参数限制中有趣的非通勤行为。\n\n这种方法只需要相干态和狄拉克形式主义的基本性质，就提供了一个透明且直观的说明，说明希尔伯特空间完整性如何内在地编码大量精确的、可解的数学关系库——提供了适合高级本科生和研究生教学的统一视角。", "authors": [{"name": "Ghasem Asadi Cordshooli"}, {"name": "Mehdi Mirzaee"}], "featured_authors": [{"name": "Ghasem Asadi Cordshooli"}, {"name": "Mehdi Mirzaee"}], "author_count": 2}, {"id": "2607.12838", "category": "quant-ph", "title": "Thermal Suppression of Dynamical Quantum Phase Transitions in Finite-Dimensional Systems A Quasi-Hermitian Framework", "abstract": "We investigate dynamical quantum phase transitions (DQPTs) in finite-dimensional systems prepared in thermal equilibrium states and subjected to a sudden quench. A mixed-state Loschmidt amplitude is constructed from first principles within a metric-stationary pseudo-Hermitian framework, providing a self-contained derivation of the finite-temperature quench dynamics. Applying this framework to an $N$-level model consisting of a two-level sector coupled to $N-2$ spectator states, we find that temperature controls the DQPTs through the redistribution of thermal weights among the eigenstates. This mechanism leads to a dimensionality-dependent threshold temperature that becomes finite when the Hilbert-space dimension reaches five, above which the Loschmidt amplitude loses all real zeros and the DQPTs are fully suppressed. The thermal suppression mechanism suggests a general principle for controlling dynamical criticality through thermal occupation, while the quasi-Hermitian framework provides the self-consistent foundation for its rigorous derivation.", "url": "https://arxiv.org/abs/2607.12838", "type": "理论", "summary": "我们研究了在热平衡状态下制备并经历突然淬火的有限维系统中的动态量子相变（DQPT）。混合态洛施密特振幅是根据度量平稳伪厄米框架内的第一原理构建的，提供了有限温度失超动力学的独立推导。将此框架应用于由与 $N-2$ 观察者状态耦合的两级扇区组成的 $N$ 级模型，我们发现温度通过本征态之间热重的重新分配来控制 DQPT。这种机制导致与维度相关的阈值温度在希尔伯特空间维度达到五时变得有限，高于该温度洛施密特振幅将失去所有实零并且 DQPT 被完全抑制。热抑制机制提出了通过热占据控制动力学临界性的一般原理，而准厄米框架为其严格推导提供了自洽的基础。", "authors": [{"name": "Jia-Chen Tang"}, {"name": "Xu-Yang Hou"}, {"name": "Ming-Zhang Wang"}, {"name": "Hao Guo"}], "featured_authors": [{"name": "Jia-Chen Tang"}, {"name": "Xu-Yang Hou"}, {"name": "Ming-Zhang Wang"}, {"name": "Hao Guo"}], "author_count": 4}, {"id": "2607.12848", "category": "quant-ph", "title": "Time-independent counterdiabatic driving for emergent two-level subspaces in many-body systems", "abstract": "We show that geodesic motion in the Riemannian manifold of quantum states provides a direct route to time-independent counterdiabatic driving. Using the relation between the counterdiabatic Hamiltonian and the quantum metric tensor, we prove that a constant-speed geodesic makes the Hilbert-Schmidt norm of the counterdiabatic Hamiltonian constant. For effective two-level systems whose counterdiabatic correction has a fixed operator direction, this further implies that the full counterdiabatic Hamiltonian itself is time independent. We illustrate this result with the Landau-Zener model, three-level Stimulated Raman adiabatic passage and a collectively driven Rydberg ensemble in the blockade regime. Limitations of this approach in realistic many-body systems are discussed, where the two-level reduction is only emergent and leakage out of the effective subspace bounds the achievable speedup. In all cases, time-independent counterdiabatic driving achieves unit-fidelity state preparation on timescales substantially shorter than conventional adiabatic protocols while replacing temporally shaped auxiliary controls by fixed-amplitude fields.", "url": "https://arxiv.org/abs/2607.12848", "type": "理论", "summary": "我们证明了量子态黎曼流形中的测地运动为与时间无关的反绝热驱动提供了直接途径。利用反非绝热哈密顿量与量子度量张量之间的关系，我们证明了恒速测地线使得反非绝热哈密顿量的希尔伯特-施密特范数成立。对于反迪亚巴修正具有固定算子方向的有效两能级系统，这进一步意味着完全反迪亚巴哈密顿量本身是与时间无关的。我们用朗道-齐纳模型、三级受激拉曼绝热通道和封锁体系中集体驱动的里德堡系综来说明这一结果。讨论了这种方法在现实多体系统中的局限性，其中两级减少只是出现的，有效子空间的泄漏限制了可实现的加速。在所有情况下，时间无关的反绝热驱动在比传统绝热协议短得多的时间尺度上实现了单位保真度状态准备，同时用固定幅度场取代了时间形状的辅助控制。", "authors": [{"name": "S. Dengis"}, {"name": "P. Schlagheck"}], "featured_authors": [{"name": "S. Dengis"}, {"name": "P. Schlagheck"}], "author_count": 2}, {"id": "2607.12907", "category": "quant-ph", "title": "Unitary Synthesis with Near-Optimal T-Count for Near-Clifford Unitaries", "abstract": "We present an approach to unitary synthesis that implements an arbitrary $n$-qubit unitary operator $U$ by a Clifford+T circuit with T-count $\\widetilde{O}(2^n d_F^{\\mathcal{C}}(U))$, where $d_F^{\\mathcal{C}}(U)$ is the Frobenius norm distance of $U$ to the Clifford group. The T-count is shown to be near-optimal when $d_F^{\\mathcal{C}}(U)$ is a constant. Our approach improves the previous best upper bound $\\widetilde{O}(2^{4n/3})$ due to Tan (2025) for a large class of unitary operators $U$ as long as $d_F^{\\mathcal{C}}(U) \\ll 2^{n/3}$.", "url": "https://arxiv.org/abs/2607.12907", "type": "理论", "summary": "我们提出了一种酉综合方法，通过具有 T 计数 $\\widetilde{O}(2^n d_F^{\\mathcal{C}}(U))$ 的 Clifford+T 电路实现任意 $n$-qubit 酉算子 $U$，其中 $d_F^{\\mathcal{C}}(U)$ 是 $U$ 到 Clifford 群的 Frobenius 范数距离。当 $d_F^{\\mathcal{C}}(U)$ 为常数时，T 计数接近最优。我们的方法改进了之前的最佳上限 $\\widetilde{O}(2^{4n/3})$ 由于 Tan (2025) 对于一大类酉运算符 $U$ 只要 $d_F^{\\mathcal{C}}(U) \\ll 2^{n/3}$。", "authors": [{"name": "Wang Fang"}, {"name": "Chris Heunen"}, {"name": "Qisheng Wang"}], "featured_authors": [{"name": "Wang Fang"}, {"name": "Chris Heunen"}, {"name": "Qisheng Wang"}], "author_count": 3}, {"id": "2607.12948", "category": "quant-ph", "title": "Logical Entangling with Phantom Codes in Hypergraph Products", "abstract": "Logical entangling gates are a major source of physical spacetime overhead in fault-tolerant quantum computation. Phantom codes reduce this cost by implementing every ordered in-block logical CNOT through physical qubit permutations and Pauli-frame updates. Whether this mechanism can coexist with the low-weight stabilizer structure of qLDPC codes is a central question for low-overhead fault-tolerant architectures. We give a deterministic answer within binary CSS hypergraph product (HGP) codes. Up to natural equivalences, the simplex-repetition family is the unique HGP family satisfying the phantom condition. We then evaluate this family under circuit-level noise in logical GHZ-state preparation and Trotterized many-body quantum simulation. The codes retain low-weight stabilizer checks and yield concrete advantages over rotated surface-code baselines in both benchmarks. Reconfigurable neutral-atom arrays offer a natural setting for this approach, supporting nonlocal qLDPC operations while enabling in-block logical CNOTs without additional physical operations. Together, these results make precise how permutation-based logical entangling constrains code design within the HGP framework, demonstrate the circuit-level benefits of the unique family, and guide the search for phantom qLDPC families with better asymptotic parameters for low-overhead fault tolerance on neutral-atom hardware.", "url": "https://arxiv.org/abs/2607.12948", "type": "数值", "summary": "逻辑纠缠门是容错量子计算中物理时空开销的主要来源。幻影代码通过物理量子位排列和泡利帧更新来实现每个有序的块内逻辑 CNOT，从而降低了成本。该机制是否可以与 qLDPC 码的低权重稳定器结构共存是低开销容错架构的核心问题。我们在二进制 CSS 超图积 (HGP) 代码中给出了确定性答案。就自然等价而言，单纯重复家族是满足幻影条件的唯一HGP家族。然后，我们在逻辑 GHZ 状态准备和 Trotterized 多体量子模拟中的电路级噪声下评估该系列。这些代码保留了低重量稳定器检查，并在两个基准测试中比旋转表面代码基线产生了具体的优势。可重新配置的中性原子阵列为这种方法提供了自然的设置，支持非局部 qLDPC 操作，同时无需额外的物理操作即可实现块内逻辑 CNOT。\n\n总之，这些结果准确说明了基于排列的逻辑纠缠如何限制 HGP 框架内的代码设计，展示了该独特系列的电路级优势，并指导寻找具有更好渐近参数的幻影 qLDPC 系列，以实现中性原子硬件上的低开销容错。", "authors": [{"name": "Keming He"}, {"name": "Ziao Tang"}, {"name": "Zetong Li"}, {"name": "Ge Bai"}, {"name": "Xin Wang"}], "featured_authors": [{"name": "Keming He"}, {"name": "Ziao Tang"}, {"name": "Zetong Li"}, {"name": "Ge Bai"}, {"name": "Xin Wang"}], "author_count": 5}, {"id": "2607.12966", "category": "quant-ph", "title": "Nonreciprocal Quantum Mpemba Effect", "abstract": "We demonstrate a nonreciprocal quantum Mpemba effect. Consider a broad class of open quantum systems, each coupled to two isomorphic reservoirs through symmetric ports. Interchanging the parameters of the two reservoirs -- a discrete operation we call the swap -- turns the quantum Mpemba effect on or off without changing the initial states. The swap modifies the Liouvillian, yet a structural symmetry pins the eigenvalues while rotating only the eigenvectors. The nonreciprocity therefore leaves no trace in the spectrum and is carried entirely by the eigenvectors. Concretely, the swap alters the far state's projection onto the slowest mode, switching whether it bypasses the slowest relaxation channel. At a Liouvillian exceptional point, the far state's relaxation switches from bypassing the slowest mode to avoiding the critical slowing, with the on--off contrast intact. There the spectrum-independent mechanism takes its purest form.", "url": "https://arxiv.org/abs/2607.12966", "type": "理论", "summary": "我们证明了非互易量子 Mpemba 效应。考虑一类广泛的开放量子系统，每个系统通过对称端口耦合到两个同构存储库。交换两个储存器的参数（我们称之为交换的离散操作）可以在不改变初始状态的情况下打开或关闭量子 Mpemba 效应。交换修改了刘维尔方程，但结构对称性固定了特征值，同时仅旋转特征向量。因此，不可逆性在频谱中不会留下任何痕迹，并且完全由特征向量承载。具体来说，交换改变了远状态到最慢模式的投影，切换它是否绕过最慢的弛豫通道。在刘维尔例外点，远态的松弛从绕过最慢模式切换到避免临界减速，并且开关对比度完好无损。在那里，与频谱无关的机制呈现出最纯粹的形式。", "authors": [{"name": "Wei-Bin Yan"}, {"name": "Ying-Jie Zhang"}, {"name": "Yun-Jie Xia"}, {"name": "Heng Fan"}, {"name": "Zhong-Xiao Man"}], "featured_authors": [{"name": "Wei-Bin Yan"}, {"name": "Ying-Jie Zhang"}, {"name": "Yun-Jie Xia"}, {"name": "Heng Fan"}, {"name": "Zhong-Xiao Man"}], "author_count": 5}, {"id": "2607.12968", "category": "quant-ph", "title": "Maximal Classicalization of Finite-Group Quantum Reference-Frame Noise", "abstract": "A finite quantum reference token with group-valued misalignment induces a random-unitary channel, but optimal degradation is generally an optimization over all quantum post-processings. For a unitary representation U of a finite group G, we prove that the following conditions are equivalent: U contains every irreducible type; one ancilla-assisted input has an orthonormal G-orbit; signed group measures embed isometrically into channels in diamond norm; and, for every pair of noise laws p,q, $\\inf_{\\Lambda\\in\\mathrm{CPTP}} \\frac{1}{2}\\|\\Phi_q^U-\\Lambda\\circ\\Phi_p^U\\|_\\diamond =\\min_{r\\in\\mathcal{P}(G)}\\frac{1}{2}\\|q-r*p\\|_1$. Thus representation completeness is the exact carrier condition for universal reduction of quantum post-processing to classical convolution. We determine the minimum ancilla dimensions for an orthogonal orbit and for an invariant calibration seed. For an incomplete carrier, with visible Plancherel dimension S(U), we derive the exact conditional-expectation distance $\\frac{1}{2}\\|\\operatorname{id}-\\Phi_u^U\\|_\\diamond=1-1/S(U)$ and an explicit quantum--classical deficiency gap. For irreducible carriers the deficiency is obtained in closed form; the faithful two-dimensional representation of $S_3$ yields an exact ten-percent reduction relative to classical convolution. We also characterize law identifiability through the conjugation representation, provide finite linear programs and decision witnesses, and establish both a finite-dimensional obstruction and stable visible-band reconstruction for infinite compact groups. Deterministic ancillary code reproduces the finite-group examples and numerical regression checks.", "url": "https://arxiv.org/abs/2607.12968", "type": "理论+数值", "summary": "具有群值错位的有限量子参考令牌会产生随机单一通道，但最佳退化通常是对所有量子后处理的优化。对于有限群 G 的酉表示 U，我们证明以下条件是等价的： U 包含所有不可约类型；一个辅助辅助输入具有正交 G 轨道；签署的团体措施以等距方式嵌入钻石规范的通道中；并且，对于每对噪声定律 p,q，$\\inf_{\\Lambda\\in\\mathrm{CPTP}} \\frac{1}{2}\\|\\Phi_q^U-\\Lambda\\circ\\Phi_p^U\\|_\\diamond =\\min_{r\\in\\mathcal{P}(G)}\\frac{1}{2}\\|q-r*p\\|_1$。因此，表示完整性是将量子后处理普遍简化为经典卷积的精确载体条件。我们确定正交轨道和不变校准种子的最小辅助尺寸。对于不完整的载体，具有可见的 Plancherel 维数 S(U)，我们得出精确的条件期望距离 $\\frac{1}{2}\\|\\operatorname{id}-\\Phi_u^U\\|_\\diamond=1-1/S(U)$ 和显式的量子经典缺陷间隙。\n\n对于不可约载流子，缺陷以封闭形式获得； $S_3$ 的忠实二维表示相对于经典卷积精确减少了百分之十。我们还通过共轭表示来表征法律可辨识性，提供有限线性程序和决策见证，并为无限紧群建立有限维障碍和稳定的可见带重建。确定性辅助代码重现有限组示例和数值回归检查。", "authors": [{"name": "Maxim V. Churilov"}], "featured_authors": [{"name": "Maxim V. Churilov"}], "author_count": 1}, {"id": "2607.12981", "category": "quant-ph", "title": "An Agentic Formalization for Certified Quantum Neural Network Design", "abstract": "A central model in quantum machine learning is the quantum neural network (QNN), whose design requires balancing expressivity and trainability. Technically, expressivity is studied through circuit-function analysis, such as quantum signal processing, while trainability is analyzed using dynamical-Lie-algebra (DLA) methods. To support certified QNN design, we formalize these major components of QNN theory in a connected lean 4 development checked by a proof kernel, where every analytic input is either proved or exposed as a named hypothesis. On the expressivity side, we prove exact if-and-only-if characterizations of single-qubit QNNs, a resource-counted quantum phase processing theorem, and an overparameterization ceiling that bounds the quantum Fisher information rank by the DLA dimension. On the trainability side, we derive the direct-sum loss-variance law through a de-circularized second-moment interface. A parameterized Casimir-uniqueness engine discharges the required inputs for fully controllable, orthogonal, and matchgate circuit families, while single-qubit and product-Clifford ensembles close the two-design assumptions directly. A capstone theorem pairs the conditional variance law with exact loss reconstruction in DLA coordinates. The development record identifies eight corrections and clarifications that were not explicit in the informal arguments. We expect this work to provide a machine-checkable foundation for QNN theory and a step toward AI-assisted or automated design of quantum machine learning algorithms.", "url": "https://arxiv.org/abs/2607.12981", "type": "理论+数值", "summary": "量子机器学习的核心模型是量子神经网络（QNN），其设计需要平衡表达性和可训练性。从技术上讲，表达能力是通过电路功能分析（例如量子信号处理）来研究的，而可训练性是使用动态李代数（DLA）方法来分析的。为了支持经过认证的 QNN 设计，我们在由证明内核检查的互联精益 4 开发中形式化了 QNN 理论的这些主要组成部分，其中每个分析输入都被证明或作为命名假设公开。在表达性方面，我们证明了单量子位 QNN 的精确当且仅当特征、资源计数量子相位处理定理以及通过 DLA 维度限制量子 Fisher 信息等级的超参数化上限。在可训练性方面，我们通过去圆二阶矩接口推导了直和损失方差定律。参数化的卡西米尔唯一性引擎为完全可控、正交和匹配门电路系列提供所需的输入，而单量子位和乘积 Clifford 系综则直接关闭了两种设计假设。\n\n顶点定理将条件方差定律与 DLA 坐标中的精确损失重建配对。开发记录指出了非正式论点中未明确的八处更正和澄清。我们期望这项工作为 QNN 理论提供机器可检查的基础，并朝着人工智能辅助或自动化设计量子机器学习算法迈出一步。", "authors": [{"name": "Mingrui Jing"}, {"name": "Lei Zhang"}, {"name": "Yusheng Zhao"}, {"name": "Hongshun Yao"}, {"name": "Xin Wang"}], "featured_authors": [{"name": "Mingrui Jing"}, {"name": "Lei Zhang"}, {"name": "Yusheng Zhao"}, {"name": "Hongshun Yao"}, {"name": "Xin Wang"}], "author_count": 5}, {"id": "2607.12994", "category": "quant-ph", "title": "Fixed-Boost Wigner Noise: Strict Trace-Distance Contraction without Quantum Degradability", "abstract": "A Lorentz boost acts on the canonical spin of a massive particle through a momentum-dependent Wigner rotation. We show that, for one fixed observer boost, reducing over an uncertain momentum can strictly contract every pairwise spin-state trace distance without producing a channel that is degradable from the less contracted one. For spin $1/2$, we first characterize the exact inversion-symmetric channel cone generated by a fixed Wigner angle and transverse momentum directions. Inside this cone lies the Pauli family $M_\\alpha=\\operatorname{diag}(1-\\alpha,1-\\alpha,1-2\\alpha)$, $0\\leq\\alpha<1/2$. For $0<\\alpha<\\beta<1/2$, all trace distances between distinct spin states are strictly smaller after $M_\\beta$ than after $M_\\alpha$, yet the unique linear post-processing factor has a negative normalized Choi eigenvalue. We solve the optimization over all physical converters exactly: $\\frac{1}{2}\\inf_{\\Lambda\\in\\mathrm{CPTP}}\\|\\Phi_\\beta-\\Lambda\\circ\\Phi_\\alpha\\|_\\diamond=\\frac{\\alpha(\\beta-\\alpha)}{2-3\\alpha}$, whereas the reverse deficiency is $\\beta-\\alpha$. Thus the identity dominates the family, while all positive-noise members are pairwise incomparable under CPTP post-processing. The ideal construction is realized as the narrow-packet limit of pure, normalizable five-component momentum states, and explicit perturbation and finite-shot tomography bounds certify an open set of examples. Separately, every nonidentity member fails embedding in a time-homogeneous Pauli-diagonal Lindblad semigroup. Hence ordering all unassisted spin distinguishabilities does not determine the quantum statistical post-processing order.", "url": "https://arxiv.org/abs/2607.12994", "type": "理论+数值", "summary": "洛伦兹增强通过动量相关的维格纳旋转作用于大质量粒子的规范自旋。我们证明，对于一个固定的观察者增强，减少不确定的动量可以严格收缩每一对自旋态轨迹距离，而不会产生一个可从收缩程度较小的通道退化的通道。对于自旋 $1/2$，我们首先表征由固定维格纳角和横向动量方向生成的精确反演对称通道锥。在这个锥体内有泡利族 $M_\\alpha=\\operatorname{diag}(1-\\alpha,1-\\alpha,1-2\\alpha)$, $0\\leq\\alpha<1/2$。对于 $0<\\alpha<\\beta<1/2$，不同自旋态之间的所有迹线距离在 $M_\\beta$ 之后都严格小于 $M_\\alpha$ 之后，但唯一的线性后处理因子具有负归一化 Choi 特征值。我们精确地解决了所有物理转换器的优化：$\\frac{1}{2}\\inf_{\\Lambda\\in\\mathrm{CPTP}}\\|\\Phi_\\beta-\\Lambda\\circ\\Phi_\\alpha\\|_\\diamond=\\frac{\\alpha(\\beta-\\alpha)}{2-3\\alpha}$，而反向缺陷是$\\beta-\\alpha$。因此，同一性在家族中占主导地位，而所有正噪声成员在 CPTP 后处理下都是成对不可比较的。\n\n理想的结构是作为纯的、可归一化的五分量动量状态的窄包极限实现的，并且显式扰动和有限射击断层扫描边界证明了一组开放的示例。另外，每个非恒等成员都无法嵌入时间齐次泡利对角 Lindblad 半群。因此，对所有无辅助自旋可区分性进行排序并不能确定量子统计后处理顺序。", "authors": [{"name": "Maxim V. Churilov"}], "featured_authors": [{"name": "Maxim V. Churilov"}], "author_count": 1}, {"id": "2607.12996", "category": "quant-ph", "title": "Expressibility and trainability of a two-dimensional pairwise quantum-circuit ansatz", "abstract": "Parameterized quantum circuits~(PQCs) constitute a central building block of variational quantum algorithms~(VQAs) and quantum machine learning~(QML) methods. Existing ansatz designs often adopt hardware-agnostic or simplified 1D chain/ring entanglement patterns. However, as quantum hardware continues to develop, native 2D connectivity patterns, such as planar superconducting-qubit architectures, are becoming increasingly important. Inspired by this hardware structure, we construct a native 2D pairwise ansatz and compare its expressibility and trainability with representative 1D ansatze at identical layer depths, despite their different circuit depths. For the fixed 16-qubit system, the 2D ansatz has the smallest KL divergence at $L=1$ and $2$, and its second-order frame potential approaches the theoretical lower bound more rapidly at shallow layer counts than the frame potentials of the three 1D ansatze. We also evaluate the gradient variance of the Pauli-$Z$-string expectation value $\\langle Z_0\\otimes\\cdots\\otimes Z_{15}\\rangle$ with respect to the first $R_y$ angle. For this Pauli-$Z$ string and fixed parameter, the gradient variance is smaller for the 2D circuit at $L=1$--$4$. The differences narrow at $L=5$, and the four ansatze yield statistically compatible variances at $L=6$.", "url": "https://arxiv.org/abs/2607.12996", "type": "理论+数值", "summary": "参数化量子电路（PQC）构成了变分量子算法（VQA）和量子机器学习（QML）方法的核心构建块。现有的 ansatz 设计通常采用与硬件无关的或简化的一维链/环纠缠模式。然而，随着量子硬件的不断发展，原生二维连接模式（例如平面超导量子位架构）变得越来越重要。受这种硬件结构的启发，我们构建了一个原生的 2D 成对 ansatz，并将其可表达性和可训练性与相同层深度的代表性 1D ansatze 进行比较，尽管它们的电路深度不同。对于固定的 16 量子位系统，2D ansatz 在 $L=1$ 和 $2$ 处具有最小的 KL 散度，并且其二阶框架势在浅层计数上比三个 1D ansatz 的框架势更快地接近理论下限。我们还评估 Pauli-$Z$-string 期望值 $\\langle Z_0\\otimes\\cdots\\otimes Z_{15}\\rangle$ 相对于第一个 $R_y$ 角度的梯度方差。对于这个 Pauli-$Z$ 字符串和固定参数，$L=1$--$4$ 处的 2D 电路的梯度方差较小。\n\n差异在 $L=5$ 时缩小，并且四个 ansatze 在 $L=6$ 时产生统计上兼容的方差。", "authors": [{"name": "Shuai Zhang"}, {"name": "Wei Liu"}, {"name": "Ji-Chong Yang"}], "featured_authors": [{"name": "Shuai Zhang"}, {"name": "Wei Liu"}, {"name": "Ji-Chong Yang"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
