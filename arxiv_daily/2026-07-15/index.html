  <style>

  <script>
    const papers = [{"id": "2607.11988", "category": "cond-mat", "title": "Density evolution at fluid-fluid interfaces: A generalized Gibbs-Duhem theory", "abstract": "The classical Gibbs-Duhem relation applies to quasi-static processes and neglects kinetic effects, leaving a fundamental gap between Gibbs thermodynamics and Newtonian mechanics. Here, we derive a generalized Gibbs-Duhem framework that incorporates kinetic contributions, thereby establishing a unified connection between classical thermodynamics and Newtonian mechanics. Based on this framework, we propose an alternative evolution equation governing density dynamics at fluid-fluid interfaces. In appropriate limiting cases, the resulting density evolution equation naturally recovers the definition of the speed of sound, Bernoulli's law, and the van der Waals equation of state (EOS).", "url": "https://arxiv.org/abs/2607.11988", "type": "理论", "summary": "经典的吉布斯-迪昂关系适用于准静态过程并忽略动力学效应，从而在吉布斯热力学和牛顿力学之间留下了根本的差距。在这里，我们推导了一个广义的吉布斯-迪昂框架，该框架结合了动力学贡献，从而在经典热力学和牛顿力学之间建立了统一的联系。基于这个框架，我们提出了一种控制流体-流体界面密度动力学的替代演化方程。在适当的限制情况下，所得的密度演化方程自然地恢复了声速、伯努利定律和范德华状态方程（EOS）的定义。", "authors": [{"name": "Fei Wang"}], "featured_authors": [{"name": "Fei Wang"}], "author_count": 1}, {"id": "2607.11996", "category": "cond-mat", "title": "Coordination-Resolved Surrogate Models for Thermodynamic Stability, Band Gaps, and Magnetic Moments of Spinel Oxides, Sulfides, and Selenides", "abstract": "We curated 320 cubic ($Fd\\bar{3}m$) spinel entries from the Materials Project-nitrides, oxides, sulfides, and selenides, including single-cation mixed-valence $A_3X_4$ compounds-and trained tree-ensemble surrogates for the formation energy, energy above the convex hull, band gap, total magnetization, and metallicity. Cations were assigned to tetrahedral-like and octahedral-like groups from CrystalNN coordination numbers rather than from element identity, and the evaluation was group-aware throughout: splits were grouped by reduced formula, every transform was fit on training folds only, and champion models were selected on cross-validated scores before the holdout was examined. Over twenty repeated grouped holdouts (single-seed refits that reuse the tuned hyperparameters, and are therefore mildly optimistic) the champions reach mean absolute errors of $0.121\\pm0.030$ eV/atom for the formation energy, $0.048\\pm0.013$ eV/atom for the hull distance, and $1.27\\pm0.19$~\\muBfu{} for the magnetization, with a metallicity accuracy of $0.85\\pm0.06$. Band-gap regression does not beat a trivial baseline on the 19-member non-metal holdout under paired bootstrap testing, we report this negative result and trace it to sample scarcity and to the semi-local DFT labels. On the identical grouped split, the tabular champion is more accurate than an untuned MEGNet trained from scratch (0.087 versus 0.209 eV/atom formation-energy MAE on the primary holdout), a comparison that bounds, rather than settles, the descriptor-versus-graph question at this data scale. SHAP attribution ties the magnetization model to octahedral $d$-occupancy and the formation-energy and band-gap models to electronegativity descriptors, and grouped conformal intervals, permutation nulls, and leave-one-chemistry-out tests bound a domain of applicability that is uneven across anions and cations.", "url": "https://arxiv.org/abs/2607.11996", "type": "理论+数值", "summary": "我们从材料项目中策划了 320 个立方 ($Fd\\bar{3}m$) 尖晶石条目（氮化物、氧化物、硫化物和硒化物，包括单阳离子混合价 $A_3X_4$ 化合物），并训练了树系综替代物，用于形成能、凸包上方的能量、带隙、总磁化强度和金属丰度。阳离子根据 CrystalNN 配位数而不是元素身份分配给类四面体和类八面体基团，并且整个评估都是群体感知的：按简化公式对分割进行分组，每个变换仅适合训练折叠，并且在检查保留之前根据交叉验证分数选择冠军模型。超过 20 个重复分组的坚持者（重复使用调整的超参数的单种子改装，因此比较乐观）冠军的形成能平均绝对误差为 $0.121\\pm0.030$ eV/atom，船体距离为 $0.048\\pm0.013$ eV/atom，磁化强度为 $1.27\\pm0.19$~\\muBfu{}，其中金属丰度精度为 $0.85\\pm0.06$。\n\n在配对引导测试下，带隙回归并没有击败 19 成员非金属抵抗的微不足道的基线，我们报告了这个负面结果，并将其追溯到样本稀缺性和半局部 DFT 标签。在相同的分组划分中，表格冠军比从头开始训练的未调整的 MEGNet 更准确（主要保留的 MAE 分别为 0.087 与 0.209 eV/原子形成能量），这种比较限制了而不是解决了该数据规模上的描述符与图问题。 SHAP 归因将磁化模型与八面体 $d$ 占据联系起来，将形成能量和带隙模型与电负性描述符联系起来，分组共形间隔、排列零点和留一化学排除测试限制了阴离子和阳离子之间不均匀的适用性领域。", "authors": [{"name": "Keltoum Khallouq"}, {"name": "Ayoub El Maazouzi"}, {"name": "Rachid Masrour"}], "featured_authors": [{"name": "Keltoum Khallouq"}, {"name": "Ayoub El Maazouzi"}, {"name": "Rachid Masrour"}], "author_count": 3}, {"id": "2607.12023", "category": "cond-mat", "title": "Symmetry-Twisted Multi-Entropies: Order Parameters for 2D SPT Phases", "abstract": "Although symmetry-protected topological phases (SPTs) can be distinguished by their entanglement properties, it has been unclear how to extract this information directly from expectation values beyond the 1D case. Here, we close this gap and propose a pair of nonlocal order parameters that can detect and distinguish all bosonic SPTs in 2D protected by internal discrete, Abelian unitary symmetries. The desired topological invariants are extracted by these quantities by effectively simulating the SPT path integral on topologically non-trivial spacetime manifolds. Our order parameters are defined in terms of expectation values of partial symmetry and permutation operations acting on fixed numbers of replicas of the system in finite spatial regions. These expectation values correspond to symmetry-twisted versions of multipartite entanglement quantities known as multi-entropies. We show explicitly that our two order parameters detect symmetry-protected four-party and six-party entanglement, respectively, and we constrain possible \"spurious\" contributions. We analytically test our proposal in fixed-point lattice models. Our results suggest multipartite entanglement to be a defining feature of SPTs; indeed, we expect our methods to generalize to fermionic and higher-dimensional systems.", "url": "https://arxiv.org/abs/2607.12023", "type": "理论", "summary": "尽管对称保护拓扑相（SPT）可以通过其纠缠特性来区分，但目前尚不清楚如何直接从一维情况之外的期望值中提取此信息。在这里，我们弥补了这一差距，并提出了一对非局部序参数，可以检测和区分受内部离散、阿贝尔酉对称保护的所有二维玻色 SPT。通过有效地模拟拓扑非平凡时空流形上的 SPT 路径积分，可以通过这些量提取所需的拓扑不变量。我们的顺序参数是根据作用于有限空间区域中固定数量的系统副本的部分对称和排列运算的期望值来定义的。这些期望值对应于称为多熵的多部分纠缠量的对称扭曲版本。我们明确地表明，我们的两个阶参数分别检测对称保护的四方和六方纠缠，并且我们限制了可能的“虚假”贡献。我们在定点晶格模型中分析测试了我们的建议。\n\n我们的结果表明，多方纠缠是 SPT 的一个决定性特征；事实上，我们期望我们的方法能够推广到费米子和高维系统。", "authors": [{"name": "Ramanjit Sohal"}, {"name": "Michael Levin"}, {"name": "Ruben Verresen"}], "featured_authors": [{"name": "Ramanjit Sohal"}, {"name": "Michael Levin"}, {"name": "Ruben Verresen"}], "author_count": 3}, {"id": "2607.12027", "category": "cond-mat", "title": "Mapping vortices to anyons in toric code phases of generalized Kitaev models", "abstract": "We present a comprehensive theory of mapping flux excitations, or vortices, to electric and magnetic particles in the toric code phases of generalizations of the Kitaev honeycomb model in two spatial dimensions. Our method, which is formulated with the Majorana fermion representation, utilizes the fusion rule of the Abelian anyons and the physical constraint on the fermion parity, and applies to generic model parameters including any perturbative limit. Not only are we able to reproduce the known mapping scheme in the dimer limit, we also derive the conditions for the invariance of anyon species of individual vortices. We prove that the mapping of anyons is left unchanged by any continuous evolution of model parameters that does not close the fermion gap in both the vortex-free and two-vortex sectors, which enables precise demarcations between multiple regimes associated with different maps within a single phase characterized by a trivial Chern number. We illustrate our theory via extensive computations for a number of selected models, in particular those defined on the square-octagon lattice and the honeycomb lattice with a Kekulé structure. We also demonstrate that distinct mappings of anyons can nevertheless exhibit the same weak symmetry breaking, and further argue that they belong to the same symmetry-enriched topological order.", "url": "https://arxiv.org/abs/2607.12027", "type": "理论", "summary": "我们提出了一种综合理论，将通量激励或涡流映射到二维空间维度的 Kitaev 蜂窝模型的环面代码相位中的电磁粒子。我们的方法采用马约拉纳费米子表示形式，利用阿贝尔任意子的融合规则和费米子宇称的物理约束，并适用于包括任何扰动极限的通用模型参数。我们不仅能够在二聚体极限下重现已知的映射方案，还推导出单个涡旋的任意子种类不变的条件。我们证明，模型参数的任何连续演化都不会改变任意子的映射，而模型参数不会关闭无涡旋和双涡旋扇区中的费米子间隙，这使得能够在以平凡陈数为特征的单相内与不同映射相关的多个状态之间进行精确划分。我们通过对许多选定模型的大量计算来说明我们的理论，特别是在方八边形晶格和具有凯库勒结构的蜂窝晶格上定义的模型。\n\n我们还证明，任意子的不同映射仍然可以表现出相同的弱对称性破缺，并进一步论证它们属于相同的富含对称性的拓扑顺序。", "authors": [{"name": "Li Ern Chern"}, {"name": "Roderich Moessner"}, {"name": "Claudio Castelnovo"}], "featured_authors": [{"name": "Li Ern Chern"}, {"name": "Roderich Moessner"}, {"name": "Claudio Castelnovo"}], "author_count": 3}, {"id": "2607.12029", "category": "cond-mat", "title": "Logarithmic corrections to bulk and surface criticality in a three-dimensional quantum Heisenberg antiferromagnet", "abstract": "At the bulk upper critical dimension, marginally irrelevant interactions generate multiplicative logarithmic corrections to mean-field scaling. While these corrections are well understood for bulk observables, their consequences for boundary criticality, particularly for finite-size scaling, remain much less explored. Here we combine large-scale quantum Monte Carlo simulations with boundary renormalization-group analysis to study a (3 + 1)D O(3) quantum critical point. After verifying the known logarithmically modified bulk finite-size scaling, including the correlation-length scaling governed by the logarithmic finite-size exponent \\hat{\\coppa}, we tune the surface coupling to identify ordinary, special, and extraordinary boundary regimes. For the ordinary and special transitions, we derive logarithmic correction exponents and \\hat{\\coppa}-dependent finite-size scaling forms for boundary correlations, including results that have not been systematically established before. These predictions are quantitatively supported by Monte Carlo data. In the extraordinary regime, we find long-range surface magnetic order and a logarithmically enhanced surface-bulk correlation.", "url": "https://arxiv.org/abs/2607.12029", "type": "理论+数值", "summary": "在体积上临界尺寸处，稍微不相关的相互作用会产生对平均场缩放的乘法对数校正。虽然这些修正对于大量可观测量来说是很好理解的，但它们对边界临界性的影响，特别是对于有限尺寸缩放，仍然很少被探索。在这里，我们将大规模量子蒙特卡罗模拟与边界重正化群分析相结合来研究 (3 + 1)D O(3) 量子临界点。在验证了已知的对数修改的整体有限尺寸缩放后，包括由对数有限尺寸指数 \\hat{\\coppa} 控制的相关长度缩放，我们调整表面耦合以识别普通、特殊和异常边界状态。对于普通和特殊的转变，我们推导出边界相关性的对数校正指数和依赖于 \\hat{\\coppa} 的有限尺寸缩放形式，包括以前尚未系统建立的结果。这些预测得到了蒙特卡罗数据的定量支持。在异常状态下，我们发现了长程表面磁序和对数增强的表面-体相关性。", "authors": [{"name": "Xuyang Liang"}, {"name": "Xiao-Chuan Wu"}, {"name": "Zenan Liu"}, {"name": "Zhe Wang"}, {"name": "Zheng Yan"}, {"name": "Dao-Xin Yao"}], "featured_authors": [{"name": "Xuyang Liang"}, {"name": "Xiao-Chuan Wu"}, {"name": "Zenan Liu"}, {"name": "Zhe Wang"}, {"name": "Zheng Yan"}, {"name": "Dao-Xin Yao"}], "author_count": 6}, {"id": "2607.12093", "category": "cond-mat", "title": "Harvesting Reshapes Dynamical Populations", "abstract": "Harvesting -- the periodic removal of individuals above or below a threshold trait value -- reshapes heterogeneous populations without altering their underlying stochastic dynamics. We study how repeated harvesting events steer the evolution of probability densities for classes of stochastic processes exhibiting both normal and anomalous dynamics, as well as a prototypical predator-prey model. Removal of the upper portion of the density drives the system to a quasi-steady state when viewed at the ``harvesting clock''. This state depends only on the harvesting threshold and frequency but not on the initial conditions. Removal of the lower portion of the density fixes its shape while generating a constant effective drift that exceeds that of the unharvested mean. Our results suggest the possibility of manipulating the dynamics of stochastic populations through external selection interventions.", "url": "https://arxiv.org/abs/2607.12093", "type": "理论", "summary": "收获——定期去除高于或低于阈值特征值的个体——重塑异质群体，而不改变其潜在的随机动态。我们研究重复的收获事件如何引导表现出正常和异常动态的随机过程类别的概率密度的演化，以及典型的捕食者-猎物模型。当从“收获时钟”观察时，密度上部的去除将系统驱动到准稳定状态。这种状态仅取决于收获阈值和频率，而不取决于初始条件。去除密度较低的部分可以固定其形状，同时产生超过未收获平均值的恒定有效漂移。我们的结果表明通过外部选择干预来操纵随机群体动态的可能性。", "authors": [{"name": "R. K. Singh"}, {"name": "Michael Assaf"}, {"name": "Jason R. Green"}, {"name": "Erez Aghion"}], "featured_authors": [{"name": "R. K. Singh"}, {"name": "Michael Assaf"}, {"name": "Jason R. Green"}, {"name": "Erez Aghion"}], "author_count": 4}, {"id": "2607.12102", "category": "cond-mat", "title": "Analytical and numerical solutions to the non-diffusive Stefan problem", "abstract": "In this work, the Maxwell--Cattaneo--Vernotte (MCV) equation is used to model the one-dimensional hyperbolic Stefan problem in the limit of a small Stefan number (Ste $\\ll$ 1). The solutions are approximated with perturbation series expansions using a reformulation in which time is expressed as a function of the solid-liquid interface position. The first proposed solution is derived in a framework that considers diffusive heat transfer at the phase change interface, for analytic tractability. Two rectification strategies are proposed to address the asymptotic divergence present in this formulation: a rescaled inner solution which is then combined with the outer solution to yield a composite solution, and size-dependent thermo-physical system parameters for better capture of hyperbolic effects at the phase change interface. The resulting interface profiles exhibit a characteristic parabolic-like shape, consistent with diffusive Stefan problem findings, with pronounced early-time hyperbolic effects at larger thermal relaxation times. Parametric studies are done over three pertinent variables in the dimensionless system: the Stefan number ($\\mathrm{Ste}$), the dimensionless thermal relaxation time ($\\widetilde \\tau$), and the thermal diffusivity ($\\alpha$). The studies suggest that model error scales with the Stefan number in accordance with the theoretical truncation error of the perturbation expansion. Additionally, larger values of $\\widetilde \\tau$ amplify early-time hyperbolic effects, thereby increasing model error, while larger $\\alpha$ extends the relative temporal domain over which these hyperbolic effects remain significant, also corresponding to an increase in model error.", "url": "https://arxiv.org/abs/2607.12102", "type": "理论+数值", "summary": "在这项工作中，使用 Maxwell--Cattaneo--Vernotte (MCV) 方程对小 Stefan 数 (Ste $\\ll$ 1) 极限下的一维双曲 Stefan 问题进行建模。使用重构形式通过扰动级数展开来近似解，其中时间被表示为固液界面位置的函数。第一个提出的解决方案是在考虑相变界面处的扩散传热的框架中得出的，以实现分析的易处理性。提出了两种校正策略来解决该公式中存在的渐近发散：重新调整的内部解，然后与外部解相结合以产生复合解，以及尺寸相关的热物理系统参数，以更好地捕获相变界面处的双曲效应。由此产生的界面轮廓呈现出特征性的类抛物线形状，与扩散斯特凡问题的发现一致，在较大的热弛豫时间下具有明显的早期双曲效应。\n\n对无量纲系统中的三个相关变量进行参数研究：Stefan 数 ($\\mathrm{Ste}$)、无量纲热弛豫时间 ($\\widetilde \\tau$) 和热扩散率 ($\\alpha$)。研究表明，根据扰动展开的理论截断误差，模型误差与斯特凡数成比例。此外，较大的 $\\widetilde \\tau$ 值会放大早期双曲效应，从而增加模型误差，而较大的 $\\alpha$ 则扩展了这些双曲效应仍然显着的相对时域，也对应于模型误差的增加。", "authors": [{"name": "Matthew Van Ham"}, {"name": "Minghan Xu"}, {"name": "Samuel Huberman"}], "featured_authors": [{"name": "Matthew Van Ham"}, {"name": "Minghan Xu"}, {"name": "Samuel Huberman"}], "author_count": 3}, {"id": "2607.12307", "category": "cond-mat", "title": "Solvent Mixing Effect on Free-Energy Barrier and Stability for Molecular Recognition Driven by the Translational Motion of Solvent Molecules", "abstract": "We calculated the potentials of mean force (PMFs) between a ring-like host and a spherical guest in a solvent mixture. We adopted hard-body interactions between particles to discuss the effects of solvent-particle translational motion. The PMFs were obtained using the three-dimensional Ornstein-Zernike equation coupled with the modified hypernetted-chain closure (3D-MHNC-OZ theory). The entropic stabilization at the recognition site is confirmed, and a free-energy barrier wall is observed surrounding it. The free-energy barrier for the solvent mixture is much lower than that for the one-component solvent. Similar barrier reduction for the association of two spherical solute molecules has also been reported, and the mixing effect also reduced the dimerization stability. By contrast, the mixing effect does not significantly reduce recognition stability in the present study. In this respect, the behavior of the host-guest association is different from that of the association of two spherical solute molecules.", "url": "https://arxiv.org/abs/2607.12307", "type": "理论", "summary": "我们计算了溶剂混合物中环状主体和球形客体之间的平均力 (PMF) 势。我们采用颗粒之间的硬体相互作用来讨论溶剂-颗粒平移运动的影响。 PMF 是使用三维 Ornstein-Zernike 方程与改进的超网链闭合（3D-MHNC-OZ 理论）相结合获得的。确认了识别位点的熵稳定性，并且在其周围观察到自由能势垒墙。溶剂混合物的自由能垒比单组分溶剂低得多。还报道了两个球形溶质分子缔合的类似势垒降低，并且混合效应也降低了二聚稳定性。相比之下，在本研究中，混合效应并没有显着降低识别稳定性。在这方面，主客体缔合的行为不同于两个球形溶质分子缔合的行为。", "authors": [{"name": "Mika Matsuo"}, {"name": "Ryo Akiyama"}], "featured_authors": [{"name": "Mika Matsuo"}, {"name": "Ryo Akiyama"}], "author_count": 2}, {"id": "2607.12320", "category": "cond-mat", "title": "Quantum anomalous Hall effect with tunable Chern numbers induced by d-wave sublattice-staggered altermagnetism", "abstract": "We construct a minimal spinful tight-binding model on a square lattice, where a $d$-wave sublattice-staggered altermagnetism drives the quantum anomalous Hall effect. Here the exchange field is staggered between the two sublattices, where it takes opposite signs on $A$ and $B$ described by the Pauli matrix $\\tau_z$. The resulting insulating phases host tunable Chern numbers $\\mathcal{C}=\\pm1$ and $\\mathcal{C}=\\pm2$, controlled by the staggered exchange strength and the sublattice-staggered potential. We determine the complete phase diagram, identify valley-resolved band inversions at the $X$ and $Y$ points in the Brillouin zone, and demonstrate chiral edge states together with quantized two-terminal conductance plateaus. Our work provides a simple route to realizing the quantum anomalous Hall effect in compensated magnets via a $d$-wave sublattice-staggered altermagnetism.", "url": "https://arxiv.org/abs/2607.12320", "type": "理论+数值", "summary": "我们在方晶格上构建了一个最小自旋紧束缚模型，其中 $d$ 波亚晶格交错交替磁性驱动量子反常霍尔效应。这里，交换场在两个子晶格之间交错，在泡利矩阵 $\\tau_z$ 描述的 $A$ 和 $B$ 上具有相反的符号。由此产生的绝缘相具有可调陈数 $\\mathcal{C}=\\pm1$ 和 $\\mathcal{C}=\\pm2$，由交错交换强度和亚晶格交错电势控制。我们确定了完整的相图，识别了布里渊区 $X$ 和 $Y$ 点处的谷分辨能带反转，并演示了手性边缘态以及量化的两端电导平台。我们的工作提供了一种简单的途径，通过 $d$ 波亚晶格交错交错磁性在补偿磁体中实现量子反常霍尔效应。", "authors": [{"name": "Lizhou Liu"}, {"name": "Qing-Feng Sun"}], "featured_authors": [{"name": "Lizhou Liu"}, {"name": "Qing-Feng Sun"}], "author_count": 2}, {"id": "2607.12323", "category": "cond-mat", "title": "Second-order topological insulator induced by compensated altermagnetism without bulk spin splitting", "abstract": "We theoretically demonstrate a second-order topological insulating phase induced by compensated altermagnetism, while keeping the bulk gap unchanged, in a two-dimensional topological insulator film. By introducing a layer-resolved out-of-plane $d$-wave altermagnetic term with opposite signs on the top and bottom layers, the system preserves $\\mathcal{PT}$ symmetry and maintains spin degeneracy in the bulk bands, while simultaneously gapping the helical edge states and generating localized corner states. The resulting higher-order phase is characterized by nonzero mirror-graded winding numbers, and an effective edge theory shows that the corner states arise from Dirac mass domain walls. We further determine the phase boundaries analytically and construct the corresponding topological phase diagram, establishing a robust route to higher-order topology without bulk spin splitting.", "url": "https://arxiv.org/abs/2607.12323", "type": "理论+数值", "summary": "我们从理论上证明了二维拓扑绝缘体薄膜中由补偿交变磁性引起的二阶拓扑绝缘相，同时保持体间隙不变。通过引入在顶层和底层具有相反符号的层解析面外$d$波交变磁项，系统保留了$\\mathcal{PT}$对称性并保持体能带中的自旋简并性，同时使螺旋边缘态产生间隙并生成局部角态。由此产生的高阶相的特征是非零镜像分级缠绕数，有效边缘理论表明角态源自狄拉克质量域壁。我们进一步通过分析确定相边界并构建相应的拓扑相图，建立了一种无需批量自旋分裂即可实现高阶拓扑的稳健路线。", "authors": [{"name": "Lizhou Liu"}, {"name": "Qing-Feng Sun"}, {"name": "Ying-Tao Zhang"}], "featured_authors": [{"name": "Lizhou Liu"}, {"name": "Qing-Feng Sun"}, {"name": "Ying-Tao Zhang"}], "author_count": 3}, {"id": "2607.12355", "category": "cond-mat", "title": "From stable periodic orbits to many-body chaos: doubly tunable prethermalization via engineering of an emergent band structure", "abstract": "We uncover a family of many-body periodic orbits in a periodically driven (Floquet) spin system away from the high-frequency limit. While linear stability analysis predicts that perturbed many-body trajectories remain close to stable periodic orbits, thermodynamic principles dictate that Floquet heating will ultimately set in. Our work aims to resolve the tension between these two expectations. In particular, we show that perturbations away from the stable periodic orbits feature a description akin to a quasiparticle band structure. A long-lived prethermal regime appears when modes around the gapless point are slowly populated. The dispersion determines the prethermal lifetime, and we show how band engineering leads to a \"doubly tunable\" parametric dependence of the prethermal lifetime $R^{-W}$, with $R$ the width in momentum space of the quasiparticle distribution and $W$ the exponent of the dispersion around the gapless point. Our results not only establish a powerful route toward stabilizing non-equilibrium phases of matter in driven many-body systems but also establish a conceptual bridge between periodic orbits in 'low-dimensional' nonlinear systems and many-body chaos.", "url": "https://arxiv.org/abs/2607.12355", "type": "理论", "summary": "我们在远离高频极限的周期性驱动（Floquet）自旋系统中发现了一系列多体周期性轨道。虽然线性稳定性分析预测受扰动的多体轨迹仍接近稳定的周期轨道，但热力学原理表明 Floquet 加热最终将出现。我们的工作旨在解决这两种期望之间的紧张关系。特别是，我们表明远离稳定周期轨道的扰动具有类似于准粒子能带结构的描述。当无间隙点周围的模式慢慢填充时，就会出现长期存在的预热态。色散决定了预热寿命，我们展示了能带工程如何导致预热寿命 $R^{-W}$ 的“双可调”参数依赖性，其中 $R$ 是准粒子分布动量空间中的宽度，$W$ 是无间隙点周围色散的指数。我们的研究结果不仅为稳定驱动多体系统中物质的非平衡相建立了一条强有力的途径，而且还在“低维”非线性系统中的周期轨道与多体混沌之间建立了概念桥梁。", "authors": [{"name": "Jianan Wang"}, {"name": "Yang Hou"}, {"name": "Andrea Pizzi"}, {"name": "Johannes Knolle"}, {"name": "Roderich Moessner"}, {"name": "Hongzheng Zhao"}], "featured_authors": [{"name": "Jianan Wang"}, {"name": "Yang Hou"}, {"name": "Andrea Pizzi"}, {"name": "Johannes Knolle"}, {"name": "Roderich Moessner"}, {"name": "Hongzheng Zhao"}], "author_count": 6}, {"id": "2607.12357", "category": "cond-mat", "title": "A Gaussian-Remainder Hierarchy for Sums of Random Variables with Big-Jump Statistics", "abstract": "We develop an exact Gaussian-remainder hierarchy for the probability density of the sum of $N$ independent, identically distributed random variables with broad, finite-variance distribution for the summands. The hierarchy separates the Gaussian fixed-point contribution from residual sectors that retain the original single-summand density. For subexponential densities, the first nontrivial truncation yields a simple finite-$N$ approximation that involves one convolution with a Gaussian background and a subtraction that removes Gaussian overcounting. This approximation captures the Gaussian center, the crossover region, and the big-jump tail within a single expression, as demonstrated numerically for stretched-exponential and finite-variance power-law examples. The same first-order approximation reproduces the known asymptotic anomalous rate function for sums of stretched-exponential random variables and also provides an accurate approximation to the corresponding finite-$N$ rate function.", "url": "https://arxiv.org/abs/2607.12357", "type": "理论+数值", "summary": "我们为 $N$ 独立、同分布的随机变量之和的概率密度开发了一个精确的高斯余数层次结构，其被加数具有广泛的有限方差分布。该层次结构将高斯定点贡献与保留原始单被数密度的剩余扇区分开。对于次指数密度，第一个非平凡截断产生一个简单的有限 $N$ 近似，其中涉及与高斯背景的一次卷积和消除高斯过度计数的减法。这种近似捕获了单个表达式中的高斯中心、交叉区域和大跳跃尾部，如拉伸指数和有限方差幂律示例的数值演示。相同的一阶近似再现了拉伸指数随机变量之和的已知渐近反常速率函数，并且还提供了相应的有限 $N$ 速率函数的精确近似。", "authors": [{"name": "Stanislav Burov"}], "featured_authors": [{"name": "Stanislav Burov"}], "author_count": 1}, {"id": "2607.12401", "category": "cond-mat", "title": "Pokrovsky--Talapov and Berezinskii--Kosterlitz--Thouless Phase Transitions in Bilayer Superconducting Films under an In-Plane Magnetic Field", "abstract": "We study finite-temperature phase transitions in a Josephson-coupled bilayer superconducting film with compact layer phases under an in-plane magnetic field. At zero temperature, where thermally excited layer vortices are absent, the relative-phase sector undergoes a Pokrovsky--Talapov (PT) commensurate--incommensurate (C--IC) transition from a commensurate Fulde--Ferrell (C/FF) state to an incommensurate Bloch superconducting (IC/Bloch SC) state. At finite temperature, compactness separates two distinct defect mechanisms. The C--IC boundary remains a PT soliton-entry line: interlayer Josephson vortex--antivortex-pair solitons enter with the square-root onset $\\rho_{\\rm sol}\\propto [k_0-k_0^c(T)]^{1/2}$. Thermal melting is instead Berezinskii--Kosterlitz--Thouless (BKT)-like, with correlation exponent $\\eta=1/4$ at the boundary, but the active vortex channel changes across the phase diagram. Josephson locking suppresses elementary layer vortices in the C/FF state and selects a same-vorticity layer-pair BKT channel, whereas elementary layer vortices control melting of the IC/Bloch SC state.", "url": "https://arxiv.org/abs/2607.12401", "type": "理论+数值", "summary": "我们研究了面内磁场下具有致密层相的约瑟夫森耦合双层超导薄膜的有限温度相变。在零温度下，不存在热激发层涡流，相对相位扇区经历波克罗夫斯基-塔拉波夫（PT）相称-不相称（C--IC）从相称富尔德-费雷尔（C/FF）状态到不相称布洛赫超导（IC/布洛赫 SC）状态的转变。在有限温度下，致密性将两种不同的缺陷机制​​分开。 C--IC边界仍然是PT孤子进入线：层间约瑟夫森涡旋-反涡旋对孤子以平方根起始$\\rho_{\\rm sol}\\propto [k_0-k_0^c(T)]^{1/2}$进入。相反，热熔化是类似 Berezinskii--Kosterlitz--Thouless (BKT) 的，在边界处相关指数 $\\eta=1/4$，但活跃的涡流通道在整个相图中发生变化。约瑟夫森锁定抑制 C/FF 态中的基本层涡旋并选择相同涡度层对 BKT 通道，而基本层涡旋控制 IC/Bloch SC 态的熔化。", "authors": [{"name": "Yicheng Zhong"}, {"name": "Yi Zhou"}], "featured_authors": [{"name": "Yicheng Zhong"}, {"name": "Yi Zhou"}], "author_count": 2}, {"id": "2607.12410", "category": "cond-mat", "title": "Fractionalized Fermi liquids with the ghost-Gutzwiller Ansatz", "abstract": "Fractionalized Fermi liquids ($\\mathrm{FL}^{\\!*}$), elusive metallic states characterized by fractionalized quasiparticles alongside conventional ones and defying Luttinger's theorem, are prime candidates for the pseudogap regime of underdoped cuprates. We show that a $\\mathrm{FL}^{\\!*}$ phase emerges in the single-band $t$-$J$ model through a simple ghost-Gutzwiller Ansatz, optimized at the cost of a mean-field calculation. The resulting temperature-doping phase diagram encompasses a low-doping $\\mathrm{FL}^{\\!*}$, a $d$-wave superconducting dome, and an overdoped conventional Fermi liquid, thereby reproducing key qualitative features of cuprate phenomenology.", "url": "https://arxiv.org/abs/2607.12410", "type": "理论+数值", "summary": "分馏费米液体 ($\\mathrm{FL}^{\\!*}$) 是一种难以捉摸的金属态，其特征是分馏准粒子与传统金属态并驾齐驱，违反了路廷格定理，是欠掺杂铜酸盐赝能隙状态的主要候选者。我们通过简单的 Ghost-Gutzwiller Ansatz 证明了单带 $t$-$J$ 模型中出现了 $\\mathrm{FL}^{\\!*}$ 相位，并以平均场计算为代价进行了优化。由此产生的温度掺杂相图包含低掺杂 $\\mathrm{FL}^{\\!*}$、$d$ 波超导圆顶和过度掺杂的传统费米液体，从而再现了铜酸盐现象学的关键定性特征。", "authors": [{"name": "Ivan Pasqua"}, {"name": "Carlos Mejuto-Zaera"}, {"name": "Michele Fabrizio"}], "featured_authors": [{"name": "Ivan Pasqua"}, {"name": "Carlos Mejuto-Zaera"}, {"name": "Michele Fabrizio"}], "author_count": 3}, {"id": "2607.12484", "category": "cond-mat", "title": "Solitary waves of attracting SU(N) fermions", "abstract": "We study the formation, dynamics, and disorder robustness of bound states in attractively interacting SU(N) fermions on a one-dimensional ring lattice. Using exact diagonalization in fixed-momentum sectors and Bethe ansatz exact results as a guide, we resolve the many-body spectrum into bands related to the possible partitions of the particles into bound composites, and characterize their internal structure also through density-density and N-body correlations. A pinning quench protocol reveals a transition from dispersive spreading to dynamical localization as the attractive interaction increases relative to the single-particle hopping. We find that the bound state dynamics for one-particle per component occurs as a many-body quantum walk similar to that of a single particle with a re-normalized effective mass. Such a property, that is the quantum version of the shape-preserving motion of classical solitons, can provide the dynamical signature of the fermionic solitary waves. We probe the robustness of the fermionic bound-state dynamics under on-site disorder.", "url": "https://arxiv.org/abs/2607.12484", "type": "理论+数值", "summary": "我们研究一维环晶格上吸引相互作用的 SU(N) 费米子中束缚态的形成、动力学和无序鲁棒性。使用固定动量扇区中的精确对角化和 Bethe ansatz 精确结果作为指导，我们将多体谱解析为与粒子可能划分为结合复合材料相关的带，并通过密度-密度和 N 体相关性来表征其内部结构。钉扎淬灭协议揭示了随着吸引力相互作用相对于单粒子跳跃的增加，从分散扩散到动态定位的转变。我们发现每个组件一个粒子的束缚态动力学发生为多体量子行走，类似于具有重新归一化有效质量的单个粒子。这种性质，即经典孤子保形运动的量子版本，可以提供费米子孤波的动力学特征。我们探讨了现场无序下费米子束缚态动力学的鲁棒性。", "authors": [{"name": "Aysha Alsubaihi"}, {"name": "Wayne J. Chetcuti"}, {"name": "Frederic Chevy"}, {"name": "Juan Polo"}, {"name": "Luigi Amico"}], "featured_authors": [{"name": "Aysha Alsubaihi"}, {"name": "Wayne J. Chetcuti"}, {"name": "Frederic Chevy"}, {"name": "Juan Polo"}, {"name": "Luigi Amico"}], "author_count": 5}, {"id": "2607.12572", "category": "cond-mat", "title": "Compatibility of Martensitic Microstructures in Polycrystals", "abstract": "The paper studies martensitic microstructures in polycrystals, focussing on their compatibility across grain boundaries. After a reduction to the case of a planar grain boundary, the case when the grain boundary separates two constant gradients of zero energy is considered. It is shown that for cubic-to tetragonal transformations such a configuration can occur when the relative grain rotation is not in the cubic group. Then the case when the grain boundary separates two simple laminates of zero energy is considered, it being shown using a computer-assisted symbolic calculation that in the cubic-to-tetragonal case compatibility is only possible for a closed set of measure zero in the manifold of grain boundary normals and relative grain rotations, and that a similar slightly weaker result holds for cubic-to-orthorhombic transformations. The results suggest why higher-order laminates are often observed for such transformations. The Taylor set of deformation gradients is defined and studied, this set having the property that any deformation whose gradient belongs to it corresponds to a zero-energy microstructure for the polycrystal independent of grain geometry and grain rotations. New upper bounds for the Taylor set are proved for cubic-to-tetragonal and cubic-to-orthorhombic transformations, generalizing those of Bhattacharya and Kohn using the geometrically linearized theory. The bounds imply in particular a result of Peigney characterizing the positive diagonal matrices in the quasiconvex hull of three tetragonal wells, and we give a simple independent proof of this result.", "url": "https://arxiv.org/abs/2607.12572", "type": "理论+数值", "summary": "该论文研究了多晶中的马氏体微观结构，重点关注它们在晶界上的相容性。在简化为平面晶界的情况后，考虑晶界分隔两个零能量恒定梯度的情况。结果表明，对于立方体到四方体的转变，当相对晶粒旋转不在立方体群中时，可能会发生这种配置。然后考虑晶界将两个零能量的简单层压板分开的情况，使用计算机辅助符号计算表明，在立方到四方的情况下，兼容性仅对于晶界法线和相对晶粒旋转的流形中的测量零的闭集是可能的，并且对于立方到正交的变换，类似的稍弱的结果成立。结果表明了为什么经常观察到高阶层压板发生这种转变。定义并研究了变形梯度的泰勒集，该集具有以下性质：梯度属于它的任何变形对应于独立于晶粒几何形状和晶粒旋转的多晶的零能量微观结构。\n\n泰勒集的新上限被证明适用于立方到四方和立方到正交变换，并使用几何线性化理论推广了 Bhattacharya 和 Kohn 的上限。这些界限特别暗示了 Peigney 表征三个四方井的拟凸壳中的正对角矩阵的结果，并且我们给出了该结果的简单独立证明。", "authors": [{"name": "John M. Ball"}, {"name": "Myrto Galanopoulou"}], "featured_authors": [{"name": "John M. Ball"}, {"name": "Myrto Galanopoulou"}], "author_count": 2}, {"id": "2607.12574", "category": "cond-mat", "title": "IceCAPA: patterning particles and microorganisms at a freezing front", "abstract": "The ability to precisely pattern micro- and nano-scale objects on surfaces is important for a range of different applications. For example, colloidal patterning has been used to create plasmonic surfaces, light-emitting diodes or authentication marks, while microbial cell patterning can be applied to screening antibiotic response and cellular interactions over larger populations at the single-cell level. However, we still lack versatile techniques that can pattern a wide range of synthetic and biological objects on a spectrum of different substrate types. Here, we present a robust patterning technique based on the directional freezing of a particle or bacterial suspension over a patterned substrate. Growing ice pushes the desired objects into traps in the substrate, while sweeping away non-trapped ones, leaving behind high-fidelity patterns. We show that this method works for a range of different materials (both synthetic particles and microbial cells), and is unaffected by substrate wettability. Furthermore, patterned bacterial cells retain excellent post-assembly viability, highlighting the gentle nature of the assembly technique. Beyond patterning applications, our results also give insights into processes involving the freezing of particulate suspensions. In particular, we demonstrate the importance of the temperature gradient as a key control which determines how particles interact with freezing fronts. Finally, we highlight a tight analogy between particles interacting with a freezing front and with air-water interfaces, suggesting that results from capillarity may shed light on freezing phenomena.", "url": "https://arxiv.org/abs/2607.12574", "type": "理论", "summary": "在表面上精确地形成微米级和纳米级物体图案的能力对于一系列不同的应用来说非常重要。例如，胶体图案已用于创建等离子体表面、发光二极管或认证标记，而微生物细胞图案可用于在单细胞水平上筛选较大群体的抗生素反应和细胞相互作用。然而，我们仍然缺乏能够在一系列不同基材类型上对各种合成和生物物体进行图案化的通用技术。在这里，我们提出了一种基于颗粒或细菌悬浮液在图案化基底上的定向冷冻的强大图案化技术。不断生长的冰将所需的物体推入基质中的陷阱中，同时清除未捕获的物体，留下高保真图案。我们证明该方法适用于一系列不同的材料（合成颗粒和微生物细胞），并且不受基材润湿性的影响。此外，图案化的细菌细胞保留了出色的组装后活力，凸显了组装技术的温和性质。\n\n除了图案应用之外，我们的结果还深入了解了涉及颗粒悬浮液冷冻的过程。特别是，我们证明了温度梯度作为决定颗粒如何与冰冻锋面相互作用的关键控制的重要性。最后，我们强调了粒子与冰冻锋面和空气-水界面相互作用之间的紧密类比，这表明毛细管现象的结果可能有助于解释冰冻现象。", "authors": [{"name": "Isabelle M. Feller"}, {"name": "Jakob Paulsen"}, {"name": "Muriel Scherer"}, {"name": "Robert W. Style"}, {"name": "Lucio Isa"}], "featured_authors": [{"name": "Isabelle M. Feller"}, {"name": "Jakob Paulsen"}, {"name": "Muriel Scherer"}, {"name": "Robert W. Style"}, {"name": "Lucio Isa"}], "author_count": 5}, {"id": "2607.12585", "category": "cond-mat", "title": "From phase space to Krylov space, one shell at a time", "abstract": "In this work, we develop and study the classical Lanczos algorithm allowing us to define Krylov complexity using the symplectic structure of phase space: Poisson brackets take on the role of the quantum commutators and phase-space integrals furnish the inner product needed to define the Lanczos recursion. We show, using general methods of quantum mechanics in phase space, that the $\\hbar \\to 0$ limit of the usual quantum mechanical Krylov framework smoothly goes over into the classical one. In theories with well-defined semiclassical limits, we show that classical Krylov complexity accurately approximates quantum complexity at early enough times, and thus is a useful characteristic of early-time chaotic dynamics. We define a Krylov-Ehrenfest time, which quantifies the eventual divergence of classical and quantum complexities, corresponding to a characteristic depth of the Krylov chain, $n\\sim n_*(\\hbar)$, which in the time domain translates to the well-known scale, $t_*\\sim\\lambda_K^{-1}\\log(1/\\hbar)$, in generic chaotic systems. We additionally define microcanonical Krylov complexities, both in the classical and quantum setting, which allows one a fine-grained study of complexity, energy shell by energy shell. We apply this framework to the Lipkin-Meshkov-Glick (LMG) and Feingold-Peres (FP) models, which are collective spin systems known to classicalize in the thermodynamic limit. In particular, while the FP model features spectral chaos for some range of coupling values, the LMG model is known to exhibit early-time saddle-dominated scrambling. Our analysis shows that the instability in LMG is resolved by the microcanonical Krylov complexity, which is controlled by the integrable structure of the Hamiltonian in spectral windows away from the instability, both at early and late times.", "url": "https://arxiv.org/abs/2607.12585", "type": "理论+数值", "summary": "在这项工作中，我们开发和研究了经典的 Lanczos 算法，使我们能够使用相空间的辛结构来定义 Krylov 复杂度：泊松括号扮演量子交换器的角色，相空间积分提供定义 Lanczos 递归所需的内积。我们使用相空间中量子力学的一般方法证明，通常量子力学 Krylov 框架的 $\\hbar \\to 0$ 限制顺利地过渡到经典框架。在具有明确定义的半经典极限的理论中，我们证明经典克雷洛夫复杂性在足够早的时候准确地近似了量子复杂性，因此是早期混沌动力学的一个有用特征。我们定义了 Krylov-Ehrenfest 时间，它量化了经典复杂度和量子复杂度的最终发散，对应于 Krylov 链的特征深度 $n\\sim n_*(\\hbar)$，它在时域中转换为通用混沌系统中众所周知的尺度 $t_*\\sim\\lambda_K^{-1}\\log(1/\\hbar)$。\n\n我们还定义了经典和量子环境中的微正则克雷洛夫复杂性，这使得人们能够对复杂性、能量层和能量层进行细粒度的研究。我们将此框架应用于 Lipkin-Meshkov-Glick (LMG) 和 Feingold-Peres (FP) 模型，这些模型是已知在热力学极限下进行经典化的集体自旋系统。特别是，虽然 FP 模型在某些耦合值范围内具有谱混沌特征，但 LMG 模型却表现出早期鞍主导的扰乱。我们的分析表明，LMG 的不稳定性是通过微正则 Krylov 复杂度来解决的，无论是在早期还是晚期，微正则 Krylov 复杂度都是由远离不稳定性的谱窗中的哈密顿量的可积结构控制的。", "authors": [{"name": "Nicolas De Ro"}, {"name": "Adrián Sánchez-Garrido"}, {"name": "Julian Sonner"}], "featured_authors": [{"name": "Nicolas De Ro"}, {"name": "Adrián Sánchez-Garrido"}, {"name": "Julian Sonner"}], "author_count": 3}, {"id": "2607.12727", "category": "cond-mat", "title": "Emergence of drifted diffusion in quantum walks with subspace restart", "abstract": "Restart of a quantum process is typically modeled as a global reinitialization that erases the system's entire history. Here we introduce subspace restart, a protocol that periodically resets only the internal degrees of freedom while preserving the spatial distribution, as a tunable knob for the quantum-to-classical crossover. Using the discrete-time quantum walk as an example, we show that this selective reset drives the walker into an engineered drifted-diffusion regime. This phenomenon can be understood by a Huygens-Fresnel mechanism, where each restart fragments the wave function into a set of independent secondary sources to screen long-range correlations and isolate a robust classical backbone, whose drift and diffusivity are set by the geometric orientation of the initial coin and the restart period. Residual quantum interference, confined to effective light cones, survives only as a short-range correction that renormalizes these coefficients and imprints periodic modulations on the cumulants. Our results establish subspace restart as a route to controlling the quantum-to-classical crossover in synthetic lattices.", "url": "https://arxiv.org/abs/2607.12727", "type": "理论", "summary": "量子过程的重新启动通常被建模为全局重新初始化，从而擦除系统的整个历史记录。在这里，我们引入子空间重启，这是一种协议，它定期重置内部自由度，同时保留空间分布，作为量子到经典交叉的可调旋钮。以离散时间量子行走为例，我们表明这种选择性重置会驱动行走器进入工程漂移扩散状态。这种现象可以通过惠更斯-菲涅耳机制来理解，其中每次重新启动都会将波函数分割成一组独立的次级源，以筛选长程相关性并隔离强大的经典主干，其漂移和扩散率由初始硬币的几何方向和重新启动周期设置。残余量子干涉仅限于有效光锥，仅作为短程校正而存在，该校正将这些系数重新归一化并在累积量上留下周期性调制。我们的结果将子空间重新启动作为控制合成晶格中量子与经典交叉的途径。", "authors": [{"name": "Liwei Qiao"}, {"name": "Ruoyu Yin"}, {"name": "Wei Zhang"}], "featured_authors": [{"name": "Liwei Qiao"}, {"name": "Ruoyu Yin"}, {"name": "Wei Zhang"}], "author_count": 3}, {"id": "2607.12737", "category": "cond-mat", "title": "Magnetic field-driven phase switching in the antiferromagnetic Mott insulator Ca$_3$(Ru$_{0.99}$Ti$_{0.01}$)$_2$O$_7$", "abstract": "A bandwidth-controlled antiferromagnetic Mott-insulating phase in Ca$_3$(Ru$_{1-x}$Ti$_x$)$_2$O$_7$ is realized through isovalent substitution at the Ru site. For a dilute substitution with only 1% Ti, the Mott insulator ground state remains nearly degenerate with the ground state of pristine Ca$_3$Ru$_2$O$_7$, where the Ru moments are ferromagnetically aligned within the metallic RuO$_2$ bilayers stacked in an antiferromagnetic fashion. The exceptionally shallow free energy landscape of this doped compound arises from intertwined electron-electron and electron-lattice interactions. This makes its magnetic and transport properties highly sensitive to external perturbations. We systematically investigated magnetic-field-induced phase switching in Ca$_3$(Ru$_{0.99}$Ti$_{0.01}$)$_2$O$_7$ to explore its magnetic $H$-$T$ phase diagram. With the field applied along the easy $b$-axis, parallel to the antiferromagnetic moments, the magnetization exhibits a first-order spin-flop transition at $\\approx $ 6 T, indicating reorientation of the Ru moments perpendicular to the field. The transition is accompanied by a decrease in the electrical resistance, but the spin-flop phase remains insulating. Above 10.5 T, all Ru moments align with the $b$-axis, resulting in a forced ferromagnetic metallic phase. In contrast, neither spin-flop nor forced-ferromagnetic phases are observed up to 14 T, when the field is applied along the $a$-axis. While the electronic kinetic energy and the electron-lattice coupling contribute to the free-energy balance of this system, the resulting $H$-$T$ phase diagram is remarkably simple and closely resembles that of a canonical anisotropic antiferromagnet, albeit with substantially renormalized critical fields.", "url": "https://arxiv.org/abs/2607.12737", "type": "理论+数值", "summary": "Ca$_3$(Ru$_{1-x}$Ti$_x$)$_2$O$_7$ 中带宽控制的反铁磁莫特绝缘相是通过 Ru 位点的等价取代实现的。对于仅含 1% Ti 的稀释替代，莫特绝缘体基态仍然接近简并，原始 Ca$_3$Ru$_2$O$_7$ 的基态，其中 Ru 矩在以反铁磁方式堆叠的金属 RuO$_2$ 双层内铁磁排列。这种掺杂化合物的异常浅的自由能景观是由交织的电子-电子和电子-晶格相互作用产生的。这使得它的磁性和传输特性对外部扰动高度敏感。我们系统地研究了 Ca$_3$(Ru$_{0.99}$Ti$_{0.01}$)$_2$O$_7$ 中磁场引起的相变，以探索其磁性 $H$-$T$ 相图。当沿易 $b$ 轴施加与反铁磁矩平行的场时，磁化强度在 $\\approx $6 T 处表现出一阶自旋随角跃迁，表明 Ru 矩垂直于场的重新定向。\n\n该转变伴随着电阻的减小，但自旋翻转阶段保持绝缘。在 10.5 T 以上，所有 Ru 力矩均与 $b$ 轴对齐，从而产生强制铁磁金属相。相比之下，当沿 $a$ 轴施加磁场时，在 14 T 以内，都观察不到自旋翻转和受迫铁磁相。虽然电子动能和电子晶格耦合有助于该系统的自由能平衡，但所得的 $H$-$T$ 相图非常简单，并且与规范各向异性反铁磁体的相图非常相似，尽管具有基本重整化的临界场。", "authors": [{"name": "Ksenia S. Rabinovich"}, {"name": "Tim Priessnitz"}, {"name": "Nils Gross"}, {"name": "George Jackeli"}, {"name": "Maximilian J. Krautloher"}, {"name": "Pascal Reiss"}, {"name": "Eberhard J. Goering"}, {"name": "Jurgen H. Smet"}, {"name": "Bernhard Keimer"}, {"name": "Alexander V. Boris"}], "featured_authors": [{"name": "Ksenia S. Rabinovich"}, {"name": "Tim Priessnitz"}, {"name": "Nils Gross"}, {"name": "Jurgen H. Smet"}, {"name": "Bernhard Keimer"}, {"name": "Alexander V. Boris"}], "author_count": 10}, {"id": "2607.12740", "category": "cond-mat", "title": "Antiphase boundary-driven large exchange bias and negative magnetoresistance in NiCo2O4", "abstract": "Nickel-based spinel oxide has recently attracted significant attention due to its remarkable magneto-transport properties, promising various spintronic applications. In this study, we observe an exchange bias effect, where the magnetic hysteresis loop shifts both horizontally and vertically when single-phase nanocrystalline NiCo2O4 is cooled in the presence of an external magnetic field. The magnitude of the exchange bias field is approximately 375 Oe at 5 K, and this effect disappears around 300 K. Furthermore, NiCo2O4 shows semiconducting behaviour in longitudinal resistivity and demonstrates a substantial negative magnetoresistance of ~31.5% at 10 K. The magnetoresistance exhibits a butterfly-shaped behaviour at low magnetic fields and becomes almost linear at high magnetic fields. A detailed analysis of the negative magnetoresistance and exchange bias reveals that both phenomena originate from the formation of antiphase boundaries in the as-synthesized NiCo2O4 sample, as confirmed by the high-resolution transmission electron micrograph.", "url": "https://arxiv.org/abs/2607.12740", "type": "理论", "summary": "镍基尖晶石氧化物最近因其卓越的磁输运特性而引起了广泛关注，有望在各种自旋电子学应用中发挥重要作用。在这项研究中，我们观察到交换偏置效应，当单相纳米晶 NiCo2O4 在外部磁场存在下冷却时，磁滞回线会水平和垂直移动。 5 K 时交换偏置场的大小约为 375 Oe，这种效应在 300 K 左右消失。此外，NiCo2O4 在纵向电阻率方面表现出半导体行为，并在 10 K 时表现出约 31.5% 的显着负磁阻。磁阻在低磁场下表现出蝴蝶形行为，在高磁场下几乎变成线性。对负磁阻和交换偏压的详细分析表明，这两种现象都源于合成的 NiCo2O4 样品中反相边界的形成，高分辨率透射电子显微照片证实了这一点。", "authors": [{"name": "Biswanath Pramanik"}, {"name": "Pushpesh Pathak"}, {"name": "Binoy K. Hazra"}], "featured_authors": [{"name": "Biswanath Pramanik"}, {"name": "Pushpesh Pathak"}, {"name": "Binoy K. Hazra"}], "author_count": 3}, {"id": "2607.12741", "category": "cond-mat", "title": "Dynamical Generation of Rectified Electric Current", "abstract": "Rectification is a fundamental nonlinear transport process that converts an alternating drive into a direct current. In this work, we propose a general theoretical framework for electric current rectification triggered by a dynamical external drive that couples to an arbitrary well-defined operator of a periodic system, and which in the static limit forbids any steady current. In the dynamical regime, the finite frequency $\\Omega$ of the time-varying drive breaks time-translation invariance and injects energy into the system, enabling a second-order {\\it nonlinear rectified} current that has no static counterpart. This rectification process has two distinct origins: (i) an impurity-scattering-modified distribution function at finite frequency, and (ii) a time-domain anomalous velocity stemming from a dynamical mixed Berry curvature. Both contributions persist when the driving frequency lies well below the optical transition gap. Applying our general theory to a buckled magnetic system subject to an out-of-plane oscillating electric field, we characterize the generated current as a {\\it nonlinear magnetoelectric gyrotropic effect} and predict that the induced rectified current is sensitive to the magnetic order, thereby offering a feasible electrical probe of Néel order in non-coplanar antiferromagnets.", "url": "https://arxiv.org/abs/2607.12741", "type": "理论", "summary": "整流是一种基本的非线性传输过程，可将交流驱动转换为直流。在这项工作中，我们提出了一个由动态外部驱动触发的电流整流的通用理论框架，该动态外部驱动耦合到周期系统的任意明确定义的算子，并且在静态极限下禁止任何稳定电流。在动态状态下，时变驱动器的有限频率$\\Omega$打破了时间平移不变性，并向系统注入能量，从而产生没有静态对应物的二阶{\\it非线性整流}电流。该整流过程有两个不同的起源：（i）有限频率下的杂质散射修正分布函数，以及（ii）源自动态混合贝里曲率的时域异常速度。当驱动频率远低于光学跃迁间隙时，这两种贡献仍然存在。\n\n将我们的一般理论应用于受平面外振荡电场影响的屈曲磁系统，我们将产生的电流表征为{\\it非线性磁电陀螺效应}，并预测感应整流电流对磁阶敏感，从而在非共面反铁磁体中提供了可行的尼尔阶电探针。", "authors": [{"name": "Jin-Xin Hu"}, {"name": "Congjun Wu"}], "featured_authors": [{"name": "Jin-Xin Hu"}, {"name": "Congjun Wu"}], "author_count": 2}, {"id": "2607.12766", "category": "cond-mat", "title": "Entropy-Driven Initiation and Cellular Uptake Mediated by Viscoelastic Cytoskeleton: A Kinetic Phase Diagram from Onsager Variational Principle", "abstract": "A fundamental question in receptor-mediated endocytosis remains unanswered: what initial driving force brings ligands and receptors into close proximity? While previous models assume pre-existing contact and overlook this initiation problem, we propose that entropic forces from nanoscale biomolecules in crowded cellular environments provide the essential driving mechanism. We develop a unified continuum model rooted in the Onsager variational principle, where engulfment depth serves as the generalized coordinate and the driving force derives from a free energy landscape of entropic, binding, membrane, and cytoskeleton contributions. The framework naturally incorporates: (i) entropy-driven adhesion as initiation; (ii) ligand-receptor binding as the sustaining force; (iii) membrane deformation via the Helfrich-Canham Hamiltonian; and (iv) cytoskeleton viscoelasticity through the elastic-viscoelastic correspondence principle. The kinetic phase diagram predicts a critical biomolecule concentration for initiation, a lower bound of ligand density for complete engulfment, a finite size window for engulfable particles, and an optimal virus radius of 30--60 nm that decreases with increasing binding energy. The Onsager solubility condition naturally yields the phase boundaries. The model exhibits asymptotic consistency with the classic Asakura-Oosawa result in the large-particle flat-surface limit. Stiffer cells lead to longer engulfment times and narrower size windows. Strikingly, the optimal size matches HIV-1 dimensions under physiologically realistic parameters. This work provides a variational foundation for cellular uptake with implications for virology, nanotechnology, and drug delivery.", "url": "https://arxiv.org/abs/2607.12766", "type": "理论+数值", "summary": "受体介导的内吞作用中的一个基本问题仍未得到解答：什么初始驱动力使配体和受体接近？虽然以前的模型假设预先存在接触并忽略了这一引发问题，但我们提出，拥挤的细胞环境中纳米级生物分子的熵力提供了必要的驱动机制。我们开发了一个植根于 Onsager 变分原理的统一连续体模型，其中吞没深度作为广义坐标，驱动力源自熵、结合、膜和细胞骨架贡献的自由能景观。该框架自然包含：（i）熵驱动的粘附作为起始； (ii) 配体-受体结合作为维持力； (iii) 通过 Helfrich-Canham Hamiltonian 进行膜变形； (iv) 通过弹性-粘弹性对应原理的细胞骨架粘弹性。\n\n动力学相图预测了启动的临界生物分子浓度、完全吞噬的配体密度下限、可吞噬颗粒的有限尺寸窗口以及随着结合能的增加而减小的30--60 nm的最佳病毒半径。 Onsager 溶解度条件自然产生相界。该模型与大颗粒平面极限下的经典 Asakura-Oosawa 结果表现出渐近一致性。较硬的细胞会导致更长的吞没时间和更窄的窗口。引人注目的是，最佳尺寸与生理学实际参数下的 HIV-1 尺寸相匹配。这项工作为细胞摄取提供了变异基础，对病毒学、纳米技术和药物输送具有影响。", "authors": [{"name": "Jinjie Liu"}, {"name": "Zhong-Can Ou-Yang"}, {"name": "Hao Wu"}], "featured_authors": [{"name": "Jinjie Liu"}, {"name": "Zhong-Can Ou-Yang"}, {"name": "Hao Wu"}], "author_count": 3}, {"id": "2607.12799", "category": "cond-mat", "title": "Strain-Tunable Shift Current and Magneto-Optical Kerr Effect in Multiferroic Altermagnet Fe2Mo3O8", "abstract": "Altermagnetism has recently emerged as a compelling frontier in spintronics, seamlessly merging the agile tunability of ferromagnets with the hallmark merits of antiferromagnets. As a prototypical polar multiferroic featuring distinctive altermagnetism, Fe2Mo3O8 hosts an ideal playground for exploring the intricate interplay among ferroelectric polarization, altermagnetic order, and spin-dependent responses. Here, employing first-principles calculations, we systematically investigate the coupling among polarization, spin splitting, shift current, and magneto-optical responses in Fe2Mo3O8. Our findings reveal that switching the ferroelectric polarization not only inverts the sign of the shift current but also comprehensively reshapes the momentum-space spin-splitting texture. Furthermore, the shift current and magneto-optical spectrum exhibits strong tunability under mechanical strain. Remarkably, the application of a-axis uniaxial strain breaks the crystalline symmetry, thereby activating a finite magneto-optical Kerr effect that is otherwise forbidden in the pristine phase.", "url": "https://arxiv.org/abs/2607.12799", "type": "理论+数值", "summary": "交变磁学最近已成为自旋电子学领域的一个引人注目的前沿领域，它将铁磁体的敏捷可调性与反铁磁体的标志优点无缝地融合在一起。作为一种具有独特交变磁性的典型极性多铁性材料，Fe2Mo3O8 为探索铁电极化、交变磁序和自旋相关响应之间复杂的相互作用提供了理想的场所。在这里，我们采用第一性原理计算，系统地研究了 Fe2Mo3O8 中偏振、自旋分裂、位移电流和磁光响应之间的耦合。我们的研究结果表明，改变铁电极化不仅反转了位移电流的符号，而且还全面重塑了动量空间自旋分裂结构。此外，位移电流和磁光光谱在机械应变下表现出很强的可调谐性。值得注意的是，a 轴单轴应变的应用打破了晶体对称性，从而激活了有限磁光克尔效应，而这种效应在原始相中是被禁止的。", "authors": [{"name": "Shengqiao Wang"}, {"name": "Bo Zhao"}, {"name": "Harish K. Singh"}, {"name": "Jiahao Xie"}, {"name": "Fu Li"}, {"name": "Hongbin Zhang"}, {"name": "Yang Su"}, {"name": "Chen Shen"}, {"name": "Lijun Zhang"}], "featured_authors": [{"name": "Shengqiao Wang"}, {"name": "Bo Zhao"}, {"name": "Harish K. Singh"}, {"name": "Yang Su"}, {"name": "Chen Shen"}, {"name": "Lijun Zhang"}], "author_count": 9}, {"id": "2607.12806", "category": "cond-mat", "title": "Single-orbital tight-binding model for chiral one-dimensional hybrid organic-inorganic lead halide perovskites", "abstract": "We present a single-orbital tight-binding model for the low-energy electronic states of the chiral one-dimensional hybrid organic-inorganic lead halide perovskite $\\mathrm{(}R/S\\mathrm{-PEA)PbI}_3$. The model is constructed from a single effective orbital on each of the four symmetry-related sites in the primitive unit cell and incorporates layer, in-plane sublattice, and spin degrees of freedom. Using separate parameter sets for the conduction and valence bands, the effective Hamiltonian reproduces the overall band dispersions obtained from density-functional-theory calculations and quantitatively captures the spin splittings near the band edges. It also captures the leading spin-polarization patterns of the Bloch states, showing that the band-edge spin splitting and spin polarization are encoded in a small number of symmetry-adapted spin-dependent hopping terms. We further analyze the accidental degeneracies of the effective Hamiltonian using screw eigenvalues and antiunitary operators. This analysis separates accidental degeneracies originating from the restricted term content of the effective Hamiltonian from degeneracies enforced by nonsymmorphic screw symmetries and time-reversal symmetry. The present model provides a symmetry-transparent starting point for understanding the band-edge electronic structure of chiral lead halide perovskites and for analyzing optical, spin, and transport responses in this class of materials.", "url": "https://arxiv.org/abs/2607.12806", "type": "理论+数值", "summary": "我们提出了手性一维杂化有机-无机卤化铅钙钛矿$\\mathrm{(}R/S\\mathrm{-PEA)PbI}_3$的低能电子态的单轨道紧束缚模型。该模型是由原始晶胞中四个对称相关位点上的单个有效轨道构建的，并包含层、面内亚晶格和自旋自由度。使用导带和价带的单独参数集，有效哈密顿量再现了从密度泛函理论计算中获得的整体能带色散，并定量捕获了能带边缘附近的自旋分裂。它还捕获了布洛赫态的主要自旋极化模式，表明带边自旋分裂和自旋极化被编码在少量对称适应的自旋相关跳跃项中。我们使用螺旋特征值和反酉算子进一步分析有效哈密顿量的意外简并。\n\n该分析将源自有效哈密顿量的限制项内容的意外简并与由非对称螺旋对称和时间反转对称强制的简并分开。本模型为理解手性卤化铅钙钛矿的带边电子结构以及分析此类材料的光学、自旋和传输响应提供了一个对称透明的起点。", "authors": [{"name": "Yuya Ominato"}, {"name": "Tetsuya Furukawa"}, {"name": "Ayumi Ishii"}, {"name": "Tetsuaki Itou"}], "featured_authors": [{"name": "Yuya Ominato"}, {"name": "Tetsuya Furukawa"}, {"name": "Ayumi Ishii"}, {"name": "Tetsuaki Itou"}], "author_count": 4}, {"id": "2607.12925", "category": "cond-mat", "title": "Microscopic Spin-1 Parent Hamiltonians for Emergent Valence-Bond Loop Manifolds", "abstract": "We construct an exact spin-$1$ parent Hamiltonian for constrained valence-bond loop manifolds on the checkerboard and pyrochlore lattices. The Hamiltonian is local, SU(2)- and time-reversal-invariant, and built from positive-semidefinite projectors acting on triangular faces. Each projector removes only the maximally polarized state of a triangle, so the model is frustration-free. Its zero-energy states are generated by an AKLT-like construction in which each spin-$1$ moment is resolved into two virtual spin-$\\tfrac12$ degrees of freedom, singlets are formed inside every crossed plaquette or tetrahedron, and the physical spin-$1$ Hilbert space is recovered by projection. The resulting ground states are fully packed singlet-loop states on the corner-sharing lattice. Thus, a loop or dimer constraint, usually introduced as part of an effective Rokhsar--Kivelson description, appears here as the exact zero-energy manifold of a microscopic spin Hamiltonian. We analyze spin correlations within this manifold and show that, for a fixed loop covering, they are determined by loop connectivity. We also project symmetry-allowed perturbations into the ground-state manifold and derive the resulting low-energy pseudospin dynamics. The checkerboard and pyrochlore cases differ sharply. On the pyrochlore lattice, tetrahedral symmetry removes simple local bias terms, and the leading nontrivial next-nearest-neighbour Heisenberg perturbation gives an emergent spin-$\\tfrac12$ XY model on the diamond lattice of tetrahedron centers. These results give an exact spin-$1$ microscopic starting point for constrained valence-bond physics in two and three dimensions, and show how loop, dimer, and gauge-theoretic descriptions can be approached from a small-spin, SU(2)-invariant frustrated magnet.", "url": "https://arxiv.org/abs/2607.12925", "type": "理论+数值", "summary": "我们为棋盘格和烧绿石晶格上的约束价键环流形构建了精确的自旋 $1$ 父哈密顿量。哈密​​顿量是局部的、SU(2) 和时间反演不变的，并且由作用于三角形面上的正半定投影仪构建。每个投影仪仅消除三角形的最大偏振状态，因此该模型不会出现挫败感。它的零能态是由类似 AKLT 的结构生成的，其中每个自旋 $1$ 矩被分解为两个虚拟自旋 $\\tfrac12$ 自由度，在每个交叉的小板或四面体内部形成单态，并且物理自旋 $1$ 希尔伯特空间通过投影恢复。所得的基态是角共享晶格上完全堆积的单重环态。因此，通常作为有效 Rokhsar-Kivelson 描述的一部分引入的环或二聚体约束，在这里显示为微观自旋哈密顿量的精确零能量流形。我们分析了该流形内的自旋相关性，并表明，对于固定环覆盖，它们是由环连通性决定的。\n\n我们还将对称允许的扰动投影到基态流形中，并推导出由此产生的低能赝自旋动力学。棋盘格和烧绿石的情况差别很大。在烧绿石晶格上，四面体对称性消除了简单的局部偏置项，并且主要的非平凡次近邻海森堡扰动在四面体中心的金刚石晶格上给出了新兴的自旋 $\\tfrac12$ XY 模型。这些结果为二维和三维约束价键物理提供了精确的自旋 $1$ 微观起点，并展示了如何从小自旋、SU(2) 不变的受挫磁体接近环、二聚体和规范理论描述。", "authors": [{"name": "Hari Borutta"}, {"name": "Yasir Iqbal"}, {"name": "Kirill Shtengel"}], "featured_authors": [{"name": "Hari Borutta"}, {"name": "Yasir Iqbal"}, {"name": "Kirill Shtengel"}], "author_count": 3}, {"id": "2607.12955", "category": "cond-mat", "title": "Optimal preparation and reachable-state constraints in the Mpemba effect", "abstract": "The Mpemba effect, whereby an initially hotter system relaxes faster than a colder one towards a common final state, is often analysed within the kinetic framework by assuming non-stationary initial conditions that are selected a priori. Here, we revisit this viewpoint by explicitly incorporating the aging protocol used to prepare those states. Focusing on uniformly heated granular fluids, we formulate the preparation stage as an optimal-control problem in which the energy injection is tuned to generate the initial conditions that maximise or minimise the subsequent relaxation rate. Within the first Sonine approximation, this optimisation reduces to extremising the excess kurtosis of the velocity distribution function, the quantity controlling the cooling rate at fixed temperature. Applying Pontryagin's maximum principle, we show that the optimal preparation protocol is always a one-bang protocol and determine the corresponding extremal values of the excess kurtosis. Most importantly, we find that the stochastic thermostat imposes non-trivial reachable-state constraints: the accessible non-Gaussianities are bounded by those of the homogeneous cooling state, thereby limiting the relaxation-rate asymmetry and the maximum attainable Mpemba effect. These results demonstrate that the strength of the kinetic Mpemba effect cannot be disentangled from the accessibility of the underlying non-equilibrium states. More generally, our work establishes a connection between anomalous relaxation, optimal control, and state accessibility in non-equilibrium systems.", "url": "https://arxiv.org/abs/2607.12955", "type": "理论", "summary": "Mpemba 效应是指最初较热的系统比较冷的系统更快地弛豫到共同的最终状态，通常通过假设先验选择的非稳态初始条件在动力学框架内进行分析。在这里，我们通过明确纳入用于准备这些状态的老化协议来重新审视这一观点。着眼于均匀加热的颗粒流体，我们将准备阶段制定为最优控制问题，其中调整能量注入以产生最大化或最小化后续弛豫率的初始条件。在第一个 Sonine 近似中，这种优化减少了速度分布函数的过度峰度，即控制固定温度下冷却速率的量。应用庞特里亚金极大值原理，我们证明最佳制备方案始终是一次性方案，并确定了相应的过量峰度极值。\n\n最重要的是，我们发现随机恒温器施加了非平凡的可达态约束：可达的非高斯性受均匀冷却态的非高斯性限制，从而限制了弛豫率不对称性和最大可达到的 Mpemba 效应。这些结果表明，动力学 Mpemba 效应的强度无法与潜在非平衡态的可及性分开。更一般地说，我们的工作在非平衡系统中的反常松弛、最优控制和状态可达性之间建立了联系。", "authors": [{"name": "C. Ríos-Monje"}, {"name": "A. Patrón-Castro"}, {"name": "C. A. Plata"}, {"name": "B. Sánchez-Rey"}, {"name": "A. Prados"}], "featured_authors": [{"name": "C. Ríos-Monje"}, {"name": "A. Patrón-Castro"}, {"name": "C. A. Plata"}, {"name": "B. Sánchez-Rey"}, {"name": "A. Prados"}], "author_count": 5}, {"id": "2607.12961", "category": "cond-mat", "title": "Active Quantum Nematics: The First Quantization", "abstract": "Nematic symmetry entails conserved quantized quantities such as number of topological defects and vorticity cells. Correspondingly, countless quantum analogies have been found in Active Nematics. We formalize Active Nematics and Liquid Crystal theory into the framework of Quantum Mechanics by introducing a complex valued Nematic Wavefunction to the Beris Edward equations, thus splitting spatiotemporally varying nematic systems into quantized states. We obtain the Planck's energy-frequency relationship for active micro-swimmers such as peristaltic worms and bacterium as a consequence of local complex phase-symmetry of the governing equations, similar to the gauge formulation of Electromagnetism. For organisms operating on diffusive chemotaxis, we obtain predator-prey dynamics that evolve to maximize/minimize pheromones field gradient overlap. Furthermore, when quantizing beating hearts, similar to the orbitals of hydrogen atoms, the state-function allows us to characterize hearts not only through the rhythm, but also the spaciotemporal distribution of contractile activity of various harmonics among healthy and unhealthy hearts.", "url": "https://arxiv.org/abs/2607.12961", "type": "理论", "summary": "向列对称性需要守恒的量化量，例如拓扑缺陷和涡度单元的数量。相应地，在主动向列学中也发现了无数的量子类比。我们通过向 Beris Edward 方程引入复值向列波函数，将主动向列学和液晶理论形式化到量子力学的框架中，从而将时空变化的向列系统分裂成量子态。我们获得了蠕动蠕虫和细菌等活跃微型游泳者的普朗克能量频率关系，这是控制方程局部复杂相位对称性的结果，类似于电磁学的规范公式。对于以扩散趋化性运作的生物体，我们获得了捕食者-猎物动力学，该动力学演化为最大化/最小化信息素场梯度重叠。此外，在量化跳动的心脏时，类似于氢原子的轨道，状态函数使我们不仅可以通过节律来表征心脏，还可以通过健康和不健康心脏之间各种谐波的收缩活动的时空分布来表征心脏。", "authors": [{"name": "Ghansham Chandel"}, {"name": "Siddhartha Das"}], "featured_authors": [{"name": "Ghansham Chandel"}, {"name": "Siddhartha Das"}], "author_count": 2}, {"id": "2607.12997", "category": "cond-mat", "title": "Surface Phase-Field-Crystal-Helfrich model for out-of-plane deformations in thin crystalline sheets with lattice mismatch", "abstract": "Thin, flexible crystalline sheets exhibit unique elastic properties due to their ability to undergo out-of-plane deformations. Understanding this behavior requires a description that couples in-plane elasticity, out-of-plane deformation, and their coupling, taking the crystalline structure and its defects into account. We develop a multiscale description for these systems by extending the surface Phase-Field-Crystal-Helfrich model. The extension permits a spatially varying equilibrium lattice spacing, enabling the representation of localized lattice eigenstrain to mimic lattice mismatch in heterostructures. We validate the extended model against analytical predictions from classical Föppl-von Kármán equations for uniaxial compression and from Eshelby's inclusion problem. Using this validated framework, we then show how locally induced compressive stresses drive out-of-plane deformation in the sheets.", "url": "https://arxiv.org/abs/2607.12997", "type": "理论", "summary": "薄而柔韧的晶体片由于能够承受面外变形而表现出独特的弹性特性。要理解这种行为，需要对面内弹性、面外变形及其耦合进行描述，同时考虑晶体结构及其缺陷。我们通过扩展表面相场晶体赫尔弗里希模型来开发这些系统的多尺度描述。该扩展允许空间变化的平衡晶格间距，使得局部晶格本征应变的表示能够模拟异质结构中的晶格失配。我们根据单轴压缩的经典 Föppl-von Kármán 方程和 Eshelby 包含问题的分析预测来验证扩展模型。然后，使用这个经过验证的框架，我们展示了局部引起的压应力如何驱动板材的面外变形。", "authors": [{"name": "Emma Radice"}, {"name": "Ingo Nitschke"}, {"name": "Marco Salvalaglio"}, {"name": "Axel Voigt"}], "featured_authors": [{"name": "Emma Radice"}, {"name": "Ingo Nitschke"}, {"name": "Marco Salvalaglio"}, {"name": "Axel Voigt"}], "author_count": 4}, {"id": "2607.13016", "category": "cond-mat", "title": "Topological characterization of multifold band degeneracies in Altland-Zirnbauer symmetry classes", "abstract": "Topological band degeneracies are conventionally characterized by invariants defined on enclosing spheres over which the energy spectrum remains gapped. This program has been completed for minimal degeneracies in all ten Altland-Zirnbauer (AZ) symmetry classes, whereas higher-order degeneracies have been studied almost exclusively under crystalline-symmetry protection. In this work, we characterize generic n-fold band degeneracies whose stability derives solely from AZ symmetries acting locally in momentum space. We find that their codimension grows quadratically with n, placing such multifold nodes in parameter spaces that combine physical momenta with tuning parameters or synthetic dimensions. However, the enclosing sphere paradigm faces a fundamental obstruction: two (n-1)-fold degeneracy loci intersecting at the n-fold band node pierce every enclosing sphere, implying that no uniform spectral gap (and thus no standard homotopy classification) exists. Here, we turn this obstruction into the diagnostic itself. On the nodal manifolds where the two loci intersect the enclosing sphere, complementary spectral gaps are restored, allowing us to characterize each with conventional band invariants. This enables us to establish a two-way correspondence: (1)~the multifold node is topologically protected whenever the nodal manifolds are robustly linked on the enclosing sphere, and (2)~band invariants on cycles of one nodal manifold encode their linking numbers with cycles of the other. We carry out this characterization for minimal models of all ten AZ classes, computing the band invariants wherever an explicit parametrization is available. Our results recast multifold band topology as the topology of linked nodal manifolds in momentum space, while our methods provide the foundation for a general characterization of multifold band degeneracies in models with arbitrarily many bands.", "url": "https://arxiv.org/abs/2607.13016", "type": "理论", "summary": "拓扑能带简并通常由在能谱保持间隙的封闭球体上定义的不变量来表征。该计划已针对所有十个 Altland-Zirnbauer (AZ) 对称类别中的最小简并性完成，而高阶简并性几乎完全在晶体对称性保护下进行了研究。在这项工作中，我们描述了一般的 n 重能带简并性，其稳定性仅源自动量空间中局部作用的 AZ 对称性。我们发现它们的余维数随 n 呈二次方增长，将此类多重节点放置在将物理动量与调整参数或合成维度相结合的参数空间中。然而，封闭球范式面临着一个根本性的障碍：在 n 重带节点相交的两个 (n-1) 重简并位点刺穿每个封闭球体，这意味着不存在统一的光谱间隙（因此不存在标准的同伦分类）。在这里，我们将这种障碍转化为诊断本身。\n\n在两个轨迹与封闭球体相交的节点流形上，互补的光谱间隙被恢复，使我们能够用传统的带不变量来表征每个轨迹。这使我们能够建立双向对应关系：（1）只要节点流形在封闭球体上牢固链接，多重节点就受到拓扑保护，并且（2）一个节点流形循环上的带不变量将其链接数与另一个节点流形的循环进行编码。我们对所有 10 个 AZ 类的最小模型进行了这种表征，在显式参数化可用的地方计算带不变量。我们的结果将多重能带拓扑重塑为动量空间中链接节点流形的拓扑，而我们的方法为任意多能带模型中多重能带简并性的一般表征提供了基础。", "authors": [{"name": "Askar Iliasov"}, {"name": "Zoltán Guba"}, {"name": "Tsuneya Yoshida"}, {"name": "Apoorv Tiwari"}, {"name": "Tomáš Bzdušek"}], "featured_authors": [{"name": "Askar Iliasov"}, {"name": "Zoltán Guba"}, {"name": "Tsuneya Yoshida"}, {"name": "Apoorv Tiwari"}, {"name": "Tomáš Bzdušek"}], "author_count": 5}, {"id": "2607.12014", "category": "hep-th", "title": "Group Theory and the CFT Distance Conjecture: $\\mathcal{N}=2$ Tensionless Strings Have No (Co)Weight", "abstract": "We perform a systematic survey of the Hagedorn behaviour at infinite-distance points in the conformal manifold of four-dimensional large-$N$ $\\mathcal{N}=2$ Superconformal Field Theories admitting a Lagrangian description. Many properties of these theories can be understood in terms of the Lie algebra encoding the shape of their quiver. We find that in the overall-free limit, the Hagedorn temperature is determined by the largest eigenvalue of an affine or finite Cartan adjacency matrix. This defines two types of universality classes of theories sharing the same high-energy exponential growth of states characteristic of string-like spectra. The first and largest is the affine case, corresponding to orbifold and orientifold projections of $\\mathcal{N}=4$ super-Yang-Mills, and all share the same temperature. The others fall into universality classes following an ADE classification with a temperature set by the dual Coxeter number, and can be obtained by deforming the affine case. Our results apply to all large-$N$ $\\mathcal{N}=2$ quivers with any classical gauge symmetry, including those with matter charged beyond bifundamental representations. We further discuss the string-theoretic construction of these theories and some of the holographic implications, as well as how our methods extend to broad families of theories with less supersymmetry. We also consider limits where only part of the theory becomes free, and find lower and upper bounds on the exponential rate predicted by the CFT Distance Conjecture. Both these bounds and the Hagedorn temperature are set by the same eigenvalue, and when the quiver has a single gauge node the lower bound is saturated, giving a natural explanation for the three universality classes recently found in the literature.", "url": "https://arxiv.org/abs/2607.12014", "type": "理论", "summary": "我们对四维大 $N$ $\\mathcal{N}=2$ 超共形场论的共形流形中无限距离点的哈格多恩行为进行了系统调查，承认拉格朗日描述。这些理论的许多性质可以用编码其箭袋形状的李代数来理解。我们发现，在整体自由极限下，哈格多恩温度由仿射或有限嘉当邻接矩阵的最大特征值决定。这定义了两种类型的理论普适性类别，它们具有相同的弦状光谱状态特征的高能指数增长。第一个也是最大的是仿射情况，对应于 $\\mathcal{N}=4$ super-Yang-Mills 的轨道投影和东方投影，并且都具有相同的温度。其他的属于通用性类别，遵循 ADE 分类，温度由对偶 Coxeter 数设定，并且可以通过仿射情况变形来获得。我们的结果适用于所有具有任何经典规范对称性的大型 $N$ $\\mathcal{N}=2$ 颤动，包括那些带电超出双基本表示的物质。\n\n我们进一步讨论这些理论的弦理论构造和一些全息含义，以及我们的方法如何扩展到具有较少超对称性的广泛理论家族。我们还考虑了只有部分理论变得自由的限制，并找到了 CFT 距离猜想预测的指数率的下限和上限。这些边界和哈格多恩温度均由相同的特征值设定，并且当箭袋具有单个规范节点时，下限饱和，这为最近在文献中发现的三个普遍性类别提供了自然的解释。", "authors": [{"name": "Florent Baume"}, {"name": "Fabio Mantegazza"}], "featured_authors": [{"name": "Florent Baume"}, {"name": "Fabio Mantegazza"}], "author_count": 2}, {"id": "2607.12019", "category": "hep-th", "title": "The Hitchhiker's Guide to Tensionless String Limits in 4d SCFTs", "abstract": "We study the appearance of universality classes in overall weak-coupling infinite-distance limits in the conformal manifold of 4d ${\\cal N}=4,2,1$ superconformal gauge theories at large $N$ and their relation to the type of weakly-coupled emergent string in the AdS bulk dual using brane models. We focus on the complete set of theories with simple gauge group, and provide explicit Hanany-Witten constructions for each of them, including those that have non-Einstein bulk duals. This establishes that the three universality classes found in arXiv:2410.07309 are determined by the number of NS5-branes becoming coincident in a suitable double-scaling limit required to obtain the SCFT. Furthermore, all theories within a given universality class descend from the same parent theory by performing orbifold/orientifold projections (with possibly a small number of extra flavors), which are subleading effects at large $N$. This explains the origin of the universality classes from a CFT perspective. Moreover, we argue that theories in the same universality class share the same closed-string background -- generated by the double-scaled NS5-brane system -- in which the backreaction of D-branes is expected to generate the AdS throat holographically dual to the SCFT. We describe the corresponding worldsheet theories, and find that the three kinds of emergent tensionless strings correspond to the 10d type IIB string, a subcritical string previously studied in a related context, and a novel kind of string which we characterize in detail. Our tools are not limited to this set of SCFTs, but can be naturally applied to more general theories, and allow us to study interpolating models yielding a network of SCFTs related by partial weak-coupling limits. We explicitly discuss the generalization of our results to large classes of theories with more than one gauge factor and even to some quasi-conformal gauge theories.", "url": "https://arxiv.org/abs/2607.12019", "type": "理论", "summary": "我们研究了大$N$处4d ${\\cal N}=4,2,1$超共形规范理论的共形流形中整体弱耦合无限距离极限中普遍性类的出现，以及它们与使用膜模型的AdS体对偶中弱耦合涌现弦类型的关系。我们专注于具有简单规范组的完整理论集，并为每个理论提供明确的 Hanany-Witten 结构，包括那些具有非爱因斯坦体对偶的理论。这表明 arXiv:2410.07309 中发现的三个普遍性类别是由 NS5 膜的数量决定的，这些 NS5 膜的数量在获得 SCFT 所需的合适的双尺度限制中变得一致。此外，给定普遍性类别中的所有理论都通过执行 Orbifold/orientifold 投影（可能有少量额外的风格）而从同一父理论派生，这在大$N$ 上是次主导效应。这从CFT的角度解释了普遍性类别的起源。\n\n此外，我们认为同一普适性类别中的理论共享相同的闭弦背景——由双尺度 NS5 膜系统生成——其中 D 膜的反反应预计会生成与 SCFT 全息对偶的 AdS 喉咙。我们描述了相应的世界表理论，发现三种紧急无张力弦对应于10d型IIB弦，一种先前在相关背景下研究的亚临界弦，以及我们详细描述的一种新型弦。我们的工具不仅限于这组 SCFT，而是可以自然地应用于更一般的理论，并使我们能够研究产生与部分弱耦合限制相关的 SCFT 网络的插值模型。我们明确讨论了将我们的结果推广到具有多个规范因子的一大类理论，甚至推广到一些准共形规范理论。", "authors": [{"name": "José Calderón-Infante"}, {"name": "Angel M. Uranga"}, {"name": "Irene Valenzuela"}], "featured_authors": [{"name": "José Calderón-Infante"}, {"name": "Angel M. Uranga"}, {"name": "Irene Valenzuela"}], "author_count": 3}, {"id": "2607.12020", "category": "hep-th", "title": "Strongly-coupled black holes (are not) at weak coupling", "abstract": "We prove sharp bounds on the moduli space excursion that is possible outside the event horizon of a spherically symmetric charged black hole. In regions where the black hole charge $Q (\\phi)$ is no less than its asymptotic value, we prove that the total moduli space excursion is less than $\\frac{\\pi}{2\\sqrt{k_N}}$ where $k_N$ is the rationalized Newton constant. We also show that the moduli space excursion in a specified direction in which $Q (\\phi)$ is non-decreasing satisfies the same bound. Applying our bound to electrically charged black holes, we rule out a potential loophole in a recent proof [ arXiv:2401.14449 ] of the Weak Gravity Conjecture in perturbative bosonic string theory.", "url": "https://arxiv.org/abs/2607.12020", "type": "理论", "summary": "我们证明了球对称带电黑洞事件视界之外可能存在的模空间偏移的尖锐界限。在黑洞电荷$Q (\\phi)$不小于其渐近值的区域中，我们证明总模空间偏移小于$\\frac{\\pi}{2\\sqrt{k_N}}$，其中$k_N$是有理化牛顿常数。我们还表明，$Q (\\phi)$ 不减的指定方向上的模空间偏移满足相同的界限。将我们的界限应用于带电黑洞，我们排除了最近微扰玻色弦理论中弱引力猜想的证明 [arXiv:2401.14449] 中的潜在漏洞。", "authors": [{"name": "Ben Heidenreich"}, {"name": "Matteo Lotito"}], "featured_authors": [{"name": "Ben Heidenreich"}, {"name": "Matteo Lotito"}], "author_count": 2}, {"id": "2607.12022", "category": "hep-th", "title": "Strong-to-Weak Spontaneous Symmetry Breaking from Wormholes in Holography", "abstract": "We study strong-to-weak spontaneous symmetry breaking (SWSSB) at finite temperature and its implications in holography. SWSSB is a novel critical phenomenon that arises only in mixed states. We demonstrate SWSSB with the BTZ black hole and show that, in the bulk, it is realized through wormhole geometries connecting the two copies in the thermofield-double construction. We point out that SWSSB can be recast as an emergence of global symmetries under ensemble averaging. We further examine the interplay between SWSSB and the swampland program, and propose a new swampland conjecture for quantum-gravity theories involving ensemble averages.", "url": "https://arxiv.org/abs/2607.12022", "type": "理论", "summary": "我们研究有限温度下的强弱自发对称破缺（SWSSB）及其在全息术中的含义。 SWSSB 是一种仅在混合状态中出现的新颖临界现象。我们用 BTZ 黑洞演示了 SWSSB，并表明，在整体上，它是通过连接热场双结构中两个副本的虫洞几何结构来实现的。 We point out that SWSSB can be recast as an emergence of global symmetries under ensemble averaging.我们进一步研究了 SWSSB 和沼泽地计划之间的相互作用，并为涉及系综平均值的量子引力理论提出了一个新的沼泽地猜想。", "authors": [{"name": "Taishi Kawamoto"}, {"name": "Kenya Tasuki"}, {"name": "Masahito Yamazaki"}], "featured_authors": [{"name": "Taishi Kawamoto"}, {"name": "Kenya Tasuki"}, {"name": "Masahito Yamazaki"}], "author_count": 3}, {"id": "2607.12031", "category": "hep-th", "title": "A New Term in Type II Effective Action", "abstract": "We show that the one loop effective action of type IIA and IIB string theories in ten dimensions have terms proportional to the dilaton times the ten dimensional Euler density, in apparent violation of the soft dilaton theorem. This can be traced to the existence of the zero modes of the world-sheet superconformal ghost fields and resolves a puzzle that arose recently in the analysis of black hole index when we compactify these theories on Calabi-Yau manifolds of non-zero Euler number.", "url": "https://arxiv.org/abs/2607.12031", "type": "理论", "summary": "我们证明，IIA 型和 IIB 型弦理论在十维中的单循环有效作用的项与膨胀子乘以十维欧拉密度成正比，这显然违反了软膨胀定理。这可以追溯到世界面超共形鬼场零模式的存在，并解决了最近在非零欧拉数卡拉比-丘流形上压缩这些理论时在黑洞指数分析中出现的难题。", "authors": [{"name": "Ashoke Sen"}], "featured_authors": [{"name": "Ashoke Sen"}], "author_count": 1}, {"id": "2607.12064", "category": "hep-th", "title": "Low-Temperature Holographic Conductivity", "abstract": "We revisit holographic electrical conductivity in the regime of very low temperatures where quantum fluctuations in the throat of the near-extremal, asymptotically AdS$_4$ dual black brane are strongly coupled. We treat the fluctuations via an effective two-dimensional action capturing the effects of the Schwarzian modes at the scale $1/C$. Our main result is a non-monotonic temperature dependence: the quantum-corrected conductivity decreases as the temperature is lowered, reaches a minimum at $(CT_{\\mathrm{min}}\\simeq 0.023)$, and grows as $(1/\\sqrt{CT})$ for $(CT\\ll 1)$. We further estimate the one-loop contribution to the conductivity directly from the four-dimensional gravitational path integral and find qualitative agreement with the effective two-dimensional description in the regime $(CT\\gg 1)$. We find that quantum corrections substantially modify the low-temperature behavior of the holographic conductivity in both approaches.", "url": "https://arxiv.org/abs/2607.12064", "type": "理论", "summary": "我们重新审视极低温度下的全息电导率，其中近极值、渐近 AdS$_4$ 双黑膜喉部的量子涨落是强耦合的。我们通过有效的二维行为来处理波动，捕捉 Schwarzian 模式在 $1/C$ 尺度上的影响。我们的主要结果是非单调温度依赖性：量子校正电导率随着温度降低而降低，在 $(CT_{\\mathrm{min}}\\simeq 0.023)$ 处达到最小值，并随着 $(CT\\ll 1)$ 的 $(1/\\sqrt{CT})$ 增长。我们进一步直接从四维引力路径积分估计单环对电导率的贡献，并发现与 $(CT\\gg 1)$ 体系中有效二维描述的定性一致性。我们发现，两种方法中的量子校正都显着改变了全息电导率的低温行为。", "authors": [{"name": "Sabyasachi Maulik"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Jingchao Zhang"}], "featured_authors": [{"name": "Sabyasachi Maulik"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Jingchao Zhang"}], "author_count": 3}, {"id": "2607.12066", "category": "hep-th", "title": "Low-temperature Quantum-corrected Holographic Transport with Momentum Relaxation", "abstract": "We determine the quantum corrections to transport arising from fluctuations of the near-AdS${}_2$ throat of near-extremal black branes in holographic models with momentum relaxation. By computing the shear viscosity and electrical conductivity at both zero and finite chemical potential, we uncover a universal low-temperature enhancement of transport generated by Schwarzian quantum fluctuations. Specifically, transport coefficients extracted from retarded Green's functions increase throughout the regime $C T \\ll 1$. For operators with Schwarzian scaling dimension $\\Delta >1$, this enhancement is preceded by a universal minimum at a characteristic temperature $T_{\\rm min} \\propto C^{-1}$, leading to a non-monotonic temperature dependence strikingly similar to that observed in many correlated materials. In contrast, for the case $\\Delta =1$, relevant for the electrical conductivity, the transport coefficient evolves monotonically toward a constant value. Our results identify universal signatures of near-horizon quantum gravity in the transport properties of holographic quantum matter.", "url": "https://arxiv.org/abs/2607.12066", "type": "理论", "summary": "我们确定了动量弛豫全息模型中近极值黑膜的近 AdS${}_2$ 喉部波动引起的输运量子校正。通过计算零化学势和有限化学势下的剪切粘度和电导率，我们发现了施瓦茨量子涨落产生的普遍低温输运增强。具体来说，从滞后格林函数中提取的传输系数在$C T \\ll 1$ 范围内增加。对于施瓦茨缩放维数 $\\Delta >1$ 的算子，这种增强之前是特征温度 $T_{\\rm min} \\propto C^{-1}$ 处的通用最小值，导致非单调温度依赖性与在许多相关材料中观察到的惊人相似。相反，对于与电导率相关的 $\\Delta =1$ 的情况，传输系数单调地趋向于恒定值。我们的结果确定了全息量子物质传输特性中近地平线量子引力的普遍特征。", "authors": [{"name": "Suman Das"}, {"name": "Sabyasachi Maulik"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Jingchao Zhang"}], "featured_authors": [{"name": "Suman Das"}, {"name": "Sabyasachi Maulik"}, {"name": "Leopoldo A. Pando Zayas"}, {"name": "Jingchao Zhang"}], "author_count": 4}, {"id": "2607.12083", "category": "hep-th", "title": "Composite worldline instantons and the nonperturbative particle decay in constant external electric and magnetic fields", "abstract": "In this paper, we discuss the validity of the composite worldline instanton approach for the nonperturbative
