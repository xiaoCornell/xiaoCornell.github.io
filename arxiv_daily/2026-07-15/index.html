 decay of charged particles in constant electric and magnetic fields. It is shown that the instanton results in the leading exponential approximation in the different limits agree with the ones obtained by the imaginary part of the self-energy in the external field and by overlap of the wave functions. We comment on the possible application of our results for the estimation of the decay rate of the proton in the external electric and magnetic field in the leading exponential approximation. The effects of entanglement of the particles in the final state are briefly mentioned.", "url": "https://arxiv.org/abs/2607.12083", "type": "理论", "summary": "在本文中，我们讨论了复合世界线瞬子方法对于恒定电场和磁场中带电粒子非微扰衰变的有效性。结果表明，不同极限下的瞬子结果与由外场自能虚部和波函数重叠得到的结果一致。我们评论了我们的结果在领先指数近似中估计外部电场和磁场中质子衰变率的可能应用。简要提及了最终状态下粒子纠缠的影响。", "authors": [{"name": "Alexander Gorsky"}, {"name": "Ivan Poluboyarinov"}], "featured_authors": [{"name": "Alexander Gorsky"}, {"name": "Ivan Poluboyarinov"}], "author_count": 2}, {"id": "2607.12103", "category": "hep-th", "title": "Liouville strings in AdS$_3$: the worldsheet story", "abstract": "The worldsheet $\\sigma$-model of strings on AdS$_3$ with NS-NS fluxes can be equivalently described in terms of a Liouville field theory coupled to a timelike field with background charge, plus a marginal deformation. The operator that produces the deformation is non-normalizable and, from the string theory perspective, is associated to the spectral flow sector $\\omega =2$. Its role is to control the winding number violation in scattering amplitudes. In the semiclassical (large $k$) limit, the central charge of the Liouville factor tends to that of the dual CFT$_2$, namely $c\\simeq 6k$. This may appear very similar to what occurs in the Liouville-type description of the dual deformed orbifold CFT$_2$, where a twist-2 deformation operator dressed with a non-normalized field also appears. Indeed, there are some similarities to that; however, there are also significant differences, which we discuss.", "url": "https://arxiv.org/abs/2607.12103", "type": "理论", "summary": "AdS$_3$ 上具有 NS-NS 通量的弦的世界表 $\\sigma$ 模型可以等效地用刘维尔场论耦合到具有背景电荷的类时场以及边际变形来描述。产生变形的算子是不可归一化的，从弦理论的角度来看，它与谱流扇区 $\\omega =2$ 相关。其作用是控制散射振幅中的绕数违规。在半经典（大$k$）极限下，Liouville因子的中心电荷趋于对偶CFT$_2$的中心电荷，即$c\\simeq 6k$。这可能看起来与双变形轨道 CFT$_2$ 的刘维尔型描述中发生的情况非常相似，其中也出现了带有非归一化场的扭曲 2 变形算子。事实上，两者有一些相似之处；然而，也存在显着差异，我们对此进行讨论。", "authors": [{"name": "Gaston Giribet"}, {"name": "Pedro Schmied"}], "featured_authors": [{"name": "Gaston Giribet"}, {"name": "Pedro Schmied"}], "author_count": 2}, {"id": "2607.12119", "category": "hep-th", "title": "Compact, long-range and vacuumless regimes controlled by scalar fields in two-dimensional flat and five-dimensional warped geometries", "abstract": "We investigate the presence of compact, long-range, and vacuumless regimes in models described by real scalar fields in 2D flat and 5D warped geometries. In the two-dimensional case, we study in detail several models that support localized solutions. When embedded into a warped $\\text{AdS}_5$ background, these fields generate distinct kinds of brane profiles.", "url": "https://arxiv.org/abs/2607.12119", "type": "理论", "summary": "我们研究了由 2D 平面和 5D 扭曲几何形状的实标量场描述的模型中是否存在紧凑、长程和无真空状态。在二维情况下，我们详细研究了几种支持局部解决方案的模型。当嵌入到扭曲的 $\\text{AdS}_5$ 背景中时，这些字段会生成不同类型的膜轮廓。", "authors": [{"name": "Elisama E.M. Lima"}, {"name": "Dionisio Bazeia"}], "featured_authors": [{"name": "Elisama E.M. Lima"}, {"name": "Dionisio Bazeia"}], "author_count": 2}, {"id": "2607.12133", "category": "hep-th", "title": "Superconductive or superfluid condensation in curved spacetime", "abstract": "We provide a proof of unitarity for quantum field theory in a general spacetime. Our argument expresses the Bogoliubov transformations in terms of a unitary squeezing operator relating the initial and final Hilbert spaces. The $S$-matrix in curved spacetime is thus the product of the squeezing operator and the $S$-matrix in the out-Hilbert space (typically Minkowski). Since both factors are unitary, their product is unitary. It follows that the Bogoliubov in-vacuum is described by a BCS-like state (Bardeen--Cooper--Schrieffer): (i) for fermions, it is exactly the BCS state, but with electrons and positrons in place of electrons with opposite spin; (ii) for bosons, it is the Bose--Einstein condensate (BEC) superfluid ground state. Thus, gravity, or an accelerating force, creates from the vacuum a many-particle system unstable towards forming a new ground state of Cooper pairs. Technically, gravity converts the vacuum into an electron-positron condensate, with respect to which quantum field theory evolves unitarily. By reverse engineering, we reconstruct the effective Hamiltonian of QFT in a black hole (or Rindler) background, together with a simple formula for the mass gap function, which grows approximately linearly with the temperature. Hence, electrons and positrons condense into a superconducting state at increasingly higher temperatures as the black hole mass decreases. Unitarity and the particle interpretation are preserved at every stage of evaporation. The Hawking state is exactly a BCS state. Finally, we compute the entanglement entropy and derive the area law.", "url": "https://arxiv.org/abs/2607.12133", "type": "理论", "summary": "我们提供了一般时空中量子场论的幺正性证明。我们的论证用与初始和最终希尔伯特空间相关的酉压缩算子来表达博戈柳波夫变换。因此，弯曲时空中的 $S$ 矩阵是压缩算子与希尔伯特外空间（通常为 Minkowski）中的 $S$ 矩阵的乘积。由于两个因素都是单一的，因此它们的乘积也是单一的。由此可见，真空中的 Bogoliubov 是用类似 BCS 的状态来描述的（Bardeen--Cooper--Schrieffer）： (i) 对于费米子，它正是 BCS 状态，但用电子和正电子代替了自旋相反的电子； (ii) 对于玻色子，它是玻色-爱因斯坦凝聚 (BEC) 超流体基态。因此，重力或加速力从真空中产生了一个不稳定的多粒子系统，无法形成新的库珀对基态。从技术上讲，引力将真空转化为电子-正电子凝聚态，量子场论相对于此统一演化。\n\n通过逆向工程，我们重建了黑洞（或 Rindler）背景下 QFT 的有效哈密顿量，以及质量间隙函数的简单公式，该函数随温度近似线性增长。因此，随着黑洞质量的减小，电子和正电子在越来越高的温度下凝结成超导状态。单一性和粒子解释在蒸发的每个阶段都得到保留。霍金状态正是BCS状态。最后，我们计算纠缠熵并推导面积定律。", "authors": [{"name": "Leonardo Modesto"}], "featured_authors": [{"name": "Leonardo Modesto"}], "author_count": 1}, {"id": "2607.12142", "category": "hep-th", "title": "Computational homological methods for integrable field theories", "abstract": "We develop explicit computational tools for the recent homological approach to the construction of $2$-dimensional integrable field theories on $\\Sigma$ from $4$-dimensional semi-holomorphic Chern-Simons theory on $\\Sigma \\times C$. In this framework, the operation of integrating out the spectral curve $C$ is realized by homotopy transfer of a cyclic $L_\\infty$-algebra associated with the $4$-dimensional theory with prescribed singularities and boundary conditions. We construct explicit strong deformation retracts for divisor-twisted Dolbeault complexes on $C=\\mathbb{C}P^1$ and use them to make the transferred $L_\\infty$-structure computationally accessible. As an application, we study the choice of meromorphic $1$-form corresponding to the principal chiral model with a Wess-Zumino term. We compute the transferred Maurer-Cartan action and the associated Lax connection, showing that the former resums to the standard principal chiral model action with a Wess-Zumino term and that the latter reproduces the usual Lax connection.", "url": "https://arxiv.org/abs/2607.12142", "type": "理论", "summary": "我们开发了显式计算工具，用于最近的同调方法，从 $\\Sigma \\times C$ 上的 $4$ 维半全纯 Chern-Simons 理论构建 $\\Sigma$ 上的 $2$ 维可积场论。在此框架中，谱曲线$C$的积分操作是通过与具有指定奇点和边界条件的$4$维理论相关的循环$L_\\infty$代数的同伦传递来实现的。我们在 $C=\\mathbb{C}P^1$ 上构造除数扭曲 Dolbeault 复形的显式强变形收缩，并使用它们使转移的 $L_\\infty$ 结构可计算访问。作为一个应用，我们研究了与 Wess-Zumino 项的主要手性模型相对应的亚纯 $1$ 形式的选择。我们计算了转移的 Maurer-Cartan 作用和相关的 Lax 连接，表明前者恢复为带有 Wess-Zumino 项的标准主手性模型作用，而后者再现了通常的 Lax 连接。", "authors": [{"name": "Marco Benini"}, {"name": "Ryan A. Cullinan"}, {"name": "Alexander Schenkel"}, {"name": "Benoit Vicedo"}], "featured_authors": [{"name": "Marco Benini"}, {"name": "Ryan A. Cullinan"}, {"name": "Alexander Schenkel"}, {"name": "Benoit Vicedo"}], "author_count": 4}, {"id": "2607.12366", "category": "hep-th", "title": "Non-Abelian $A_4$ vortices in $SO(3)$ gauge theory and non-invertible symmetries", "abstract": "We construct finite-tension non-Abelian vortex solutions in a renormalizable $(3+1)$-dimensional $SO(3)$ gauge theory Higgsed to the tetrahedral group $A_4$ by a Higgs field in the spin-3 representation. Since the vacuum manifold is $SO(3)/A_4$, the vortices are characterized by the non-Abelian fundamental group $\\pi_1(SO(3)/A_4)\\simeq \\widetilde{A}_4$, the binary tetrahedral group. We obtain explicit axisymmetric vortex solutions carrying holonomies corresponding to the order-two and order-three conjugacy classes of $A_4$, determine their tensions numerically, and show that they exhibit type-I, type-II, and Bogomol'nyi--Prasad--Sommerfield-like behavior depending on the Higgs and gauge boson mass ratios. The vortices are classified by conjugacy classes of $\\widetilde{A}_4$, while their infrared descriptions are labeled by conjugacy classes of $A_4$. We further demonstrate that the smooth finite-tension vortices reduce in the infrared to Gukov--Witten surface operators of the $A_4$ discrete gauge theory, thereby establishing a finite-energy ultraviolet completion of non-invertible defects in a renormalizable gauge-Higgs theory.", "url": "https://arxiv.org/abs/2607.12366", "type": "理论", "summary": "我们在可重正化 $(3+1)$ 维 $SO(3)$ 规范理论中构造有限张力非阿贝尔涡旋解，通过自旋 3 表示中的希格斯场希格斯到四面体群 $A_4$。由于真空流形为 $SO(3)/A_4$，涡流由非阿贝尔基本群 $\\pi_1(SO(3)/A_4)\\simeq \\widetilde{A}_4$（二元四面体群）来表征。我们获得了带有与 $A_4$ 的二阶和三阶共轭类相对应的完整函数的显式轴对称涡旋解，以数值方式确定了它们的张力，并表明它们根据希格斯和规范玻色子质量比表现出 I 型、II 型和 Bogomol'nyi-Prasad-Sommerfield 类行为。涡旋按共轭类 $\\widetilde{A}_4$ 进行分类，而它们的红外描述则按共轭类 $A_4$ 进行标记。我们进一步证明，光滑的有限张力涡旋在红外中还原为$A_4$离散规范理论的Gukov-Witten表面算子，从而在可重整规范希格斯理论中建立了不可逆缺陷的有限能量紫外完成。", "authors": [{"name": "Yoshihiko Abe"}, {"name": "Tetsutaro Higaki"}, {"name": "Kazuya Murakami"}, {"name": "Muneto Nitta"}, {"name": "Ryo Yokokura"}], "featured_authors": [{"name": "Yoshihiko Abe"}, {"name": "Tetsutaro Higaki"}, {"name": "Kazuya Murakami"}, {"name": "Muneto Nitta"}, {"name": "Ryo Yokokura"}], "author_count": 5}, {"id": "2607.12566", "category": "hep-th", "title": "Conformal line defects from matter-coupled 5D N=4 gauged supergravity", "abstract": "We study a number of holographic solutions describing conformal line defects within $N=2$ SCFTs from matter-coupled $N=4$ gauged supergravity in five dimensions. For $SO(2)_D\\times SO(3)$ gauge group, the gauged supergravity admits two supersymmetric $AdS_5$ vacua with $N=4$ and $N=2$ unbroken supersymmetries. It turns out that only solutions that are asymptotic to the $N=4$ vacuum are possible leading to line defects within the dual $N=2$ SCFT. In gauged supergravity with $SO(2)\\times ISO(3)$ gauge group, we find similar solutions with the $N=2$ SCFT appearing in the IR while the UV field theories correspond to six-dimensional $N=(0,2)$ field theories arising from M5-branes wrapped on a hyperbolic space $H^2$. The solution with $SO(2)\\times SO(3)$ symmetry is also uplifted to eleven dimensions via a consistent truncation on $H^2\\times S^4$. Finally, for gauged supergravity with $SO(2)\\times SO(3)\\times SO(3)$ gauge group that admits two $N=4$ supersymmetric $AdS_5$ vacua, we find a solution describing a line defect that interpolates between these two vacua as well as a solution with only one asymptotic $AdS_5$ geometry.", "url": "https://arxiv.org/abs/2607.12566", "type": "理论", "summary": "我们研究了许多全息解决方案，描述了来自五维物质耦合 $N=4$ 测量超重力的 $N=2$ SCFT 内的共形线缺陷。对于 $SO(2)_D\\times SO(3)$ 规范群，规范超引力承认两个超对称 $AdS_5$ 真空，其中 $N=4$ 和 $N=2$ 未破缺超对称性。事实证明，只有渐进到 $N=4$ 真空的解才有可能导致对偶 $N=2$ SCFT 内的线缺陷。在使用 $SO(2)\\times ISO(3)$ 规范组测量的超重力中，我们发现了类似的解决方案，其中 $N=2$ SCFT 出现在 IR 中，而 UV 场论对应于由包裹在双曲空间 $H^2$ 上的 M5 膜产生的六维 $N=(0,2)$ 场论。通过 $H^2\\times S^4$ 上的一致截断，具有 $SO(2)\\times SO(3)$ 对称性的解也提升到 11 维。最后，对于采用 $SO(2)\\times SO(3)\\times SO(3)$ 规范组的计量超重力，该规范组允许两个 $N=4$ 超对称 $AdS_5$ 真空，我们找到了一个描述在这两个真空之间插值的线缺陷的解决方案，以及一个仅具有一个渐近 $AdS_5$ 几何形状的解决方案。", "authors": [{"name": "Parinya Karndumri"}], "featured_authors": [{"name": "Parinya Karndumri"}], "author_count": 1}, {"id": "2607.12644", "category": "hep-th", "title": "Off-shell equivalence in quantum field theory and gravity", "abstract": "Field redefinitions connect many formulations of the same physics, but the standard equivalence theorem is an on-shell result and cannot be used to decide when two quantum descriptions are equivalent off shell. This paper develops an operational criterion for that problem in terms of the Vilkovisky--DeWitt effective action. The central idea is that equivalence should be tested on scalar observables built by pairing configuration-space tensors with admissible probes. This makes the criterion sensitive to the observable class under consideration and separates the usual on-shell notion of equivalence from the stronger off-shell notions needed in gravity, cosmology and non-equilibrium quantum field theory. Metric $f(R)$ gravity and a scalar field theory example serve as prototypes, showing how the formal criterion distinguishes local, branchwise and genuinely global equivalence. In particular, we show that metric $f(R)$ gravity and its auxiliary-field reformulation yield the same quantum theory when the auxiliary constraint is enforced in the path integral. This is distinct from quantizing the corresponding scalar--tensor action with the metric and scalar treated as independent integration variables, which defines a different quantum theory. Apparent quantum inequivalences can then be traced to comparisons between different quantum objects, rather than to a failure of actual equivalences. This leads to general and precise notions of local and global equivalence under both field redefinitions and auxiliary-variable extensions.", "url": "https://arxiv.org/abs/2607.12644", "type": "理论", "summary": "场重新定义连接了相同物理的许多公式，但标准等价定理是壳内结果，不能用于确定两个量子描述何时等价于壳外。本文根据维尔科维斯基-德威特有效行动制定了该问题的操作标准。中心思想是，应该在通过将配置空间张量与可接受的探针配对而构建的标量可观测量上测试等价性。这使得该准则对所考虑的可观测类别敏感，并将通常的壳内等价概念与引力、宇宙学和非平衡量子场论中所需的更强的壳外概念分开。度量 $f(R)$ 引力和标量场理论示例作为原型，展示了形式标准如何区分局部、分支和真正的全局等价。特别是，我们表明，当在路径积分中强制执行辅助约束时，度量 $f(R)$ 引力及其辅助场重构产生相同的量子理论。\n\n这与将度量和标量视为独立积分变量来量化相应的标量-张量作用不同，后者定义了不同的量子理论。然后，表观量子不等价可以追溯到不同量子对象之间的比较，而不是实际等价的失败。这导致了在字段重新定义和辅助变量扩展下局部和全局等价的一般和精确概念。", "authors": [{"name": "Iberê Kuntz"}, {"name": "Stefano Liberati"}], "featured_authors": [{"name": "Iberê Kuntz"}, {"name": "Stefano Liberati"}], "author_count": 2}, {"id": "2607.12772", "category": "hep-th", "title": "Quantum States Prepared by Wormholes: Long-Wavelength Deviations from Bunch-Davies", "abstract": "Wineglass wormholes mediate the nucleation of baby universes out of an asymptotically Anti-de Sitter or flat spacetime. Upon materialization, the new universe naturally undergoes an inflationary phase. Here we study the quantum state of tensor and probe scalar field fluctuations that these wormhole geometries prepare, finding that they reproduce the Bunch-Davies vacuum for short-wavelength modes but lead to deviations from Bunch-Davies on large scales. These deviations, which depend on the charge of the wormhole, cause a small shift as well as oscillations in the angular power spectrum generated by an ensuing inflationary phase, and thus provide a distinctive cosmological observable. The wormholes are supported by either axionic or magnetic charges. In the limit of vanishing charge, they undergo a topological transition after which they contain no-boundary instantons. We find that the small-charge limit suppresses deviations from the Bunch-Davies state for both scalar and tensor fluctuations, indicating that the topological transition is smooth.", "url": "https://arxiv.org/abs/2607.12772", "type": "理论", "summary": "酒杯虫洞在渐进反德西特或平坦时空中介导婴儿宇宙的成核。物质化后，新宇宙自然会经历暴胀阶段。在这里，我们研究了这些虫洞几何形状所准备的张量和探测标量场涨落的量子态，发现它们在短波长模式下再现了邦奇-戴维斯真空，但导致了大尺度上与邦奇-戴维斯真空的偏差。这些偏差取决于虫洞的电荷，会导致随后的暴胀阶段产生的角功率谱的微小变化和振荡，从而提供独特的宇宙学可观测值。虫洞由轴荷或磁荷支持。在消失电荷的极限下，它们经历拓扑转变，之后它们包含无边界瞬时子。我们发现小电荷极限抑制了标量和张量波动与 Bunch-Davies 态的偏差，表明拓扑转变是平滑的。", "authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "featured_authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "author_count": 2}, {"id": "2607.12798", "category": "hep-th", "title": "On interacting non-Abelian antisymmetric tensor field models", "abstract": "We study the gauge structure of interacting antisymmetric tensor field models obtained by the dimensional reduction on a group manifold. In such models a dimensionful parameter related to the size of the compact manifold plays the role of a coupling constant. We focus on open issues of reducibility of the gauge transformations in these theories and show that stages of reducibility of the interacting models coincide with ones of corresponding free counterparts.", "url": "https://arxiv.org/abs/2607.12798", "type": "理论", "summary": "我们研究通过群流形降维获得的相互作用反对称张量场模型的规范结构。在此类模型中，与紧凑流形尺寸相关的量纲参数起着耦合常数的作用。我们关注这些理论中规范变换的可归约性的开放性问题，并表明相互作用模型的可归约性阶段与相应的自由对应模型的阶段一致。", "authors": [{"name": "I. Buchbinder"}, {"name": "N. Kozyrev"}], "featured_authors": [{"name": "I. Buchbinder"}, {"name": "N. Kozyrev"}], "author_count": 2}, {"id": "2607.12834", "category": "hep-th", "title": "Timelike Entanglement First Law and Linearized Field Equations in Higher Curvature Gravity", "abstract": "We investigate the timelike entanglement first law in holographic conformal field theories whose bulk dual is Lovelock gravity. Using the double Wick rotation formulation of timelike entanglement entropy together with the Jacobson-Myers entropy functional, we compute the linear variation of holographic timelike entanglement entropy for hyperbolic subregions. For cubic Lovelock gravity, we explicitly show that a single, universal multiplicative renormalization factor governs how higher curvature interactions enter the variations of both the entropy and the modular Hamiltonian, leading to $\\Delta S=\\Delta\\langle H\\rangle$ for low-energy thermal excitations. We then extend the analysis to Lovelock gravity of arbitrary order around the anti-de Sitter spacetime in the Fefferman-Graham gauge. For normalizable perturbations, the variation of the Jacobson-Myers functional reduces to the Einstein gravity's result multiplied by the same coupling-dependent factor that renormalizes the effective Newtonian constant in the linearized field equations of Lovelock gravity. We further show that the boundary contribution vanishes in the conformal limit for the class of perturbations considered. Consequently, the timelike entanglement first law is equivalent to the linearized field equations of Lovelock gravity about the maximally symmetric background, within the hyperbolic and perturbative regime considered in the present paper.", "url": "https://arxiv.org/abs/2607.12834", "type": "理论", "summary": "我们研究了全息共形场论中的类时纠缠第一定律，其体对偶是洛夫洛克引力。使用类时纠缠熵的双威克旋转公式和雅各布森-迈尔斯熵函数，我们计算了双曲子区域的全息类时纠缠熵的线性变化。对于三次洛夫洛克引力，我们明确表明，单个通用乘法重正化因子控制着更高曲率相互作用如何进入熵和模哈密顿量的变化，从而导致低能热激发的$\\Delta S=\\Delta\\langle H\\rangle$。然后，我们将分析扩展到费弗曼-格雷厄姆规范中反德西特时空周围任意阶的洛夫洛克引力。对于可归一化的扰动，雅各布森-迈尔斯泛函的变化可简化为爱因斯坦引力的结果乘以相同的耦合相关因子，该因子重新归一化洛夫洛克引力线性场方程中的有效牛顿常数。我们进一步表明，边界贡献在所考虑的扰动类别的共形极限中消失。\n\n因此，类时纠缠第一定律等价于本文考虑的双曲和微扰状态下关于最大对称背景的洛夫洛克引力的线性场方程。", "authors": [{"name": "Mei-Hui Xiao"}, {"name": "Guo-Ying Li"}, {"name": "Song He"}, {"name": "Jia-Rui Sun"}], "featured_authors": [{"name": "Mei-Hui Xiao"}, {"name": "Guo-Ying Li"}, {"name": "Song He"}, {"name": "Jia-Rui Sun"}], "author_count": 4}, {"id": "2607.12906", "category": "hep-th", "title": "Thermodynamic scaling and string dynamics in rotating holographic QCD", "abstract": "We investigate the effect of finite angular velocity on the phase structure and Schwinger pair production in a holographic QCD model based on the Einstein--Maxwell--dilaton framework. Rotation is introduced through a boost construction that generates a stationary rotating geometry from the corresponding static background. We first study the thermodynamic phase diagram using the grand potential together with several response functions and show that all thermodynamic phase boundaries satisfy an exact scaling relation under rotation, implying that the rotating thermodynamic sector is completely determined by the corresponding static solution through a simple boost transformation. We then investigate confinement through the effective string tension and find that, consistent with the thermodynamic observables, rotation decreases the string confinement--deconfinement transition temperature and chemical potential. The corresponding phase boundary, however, no longer obeys the thermodynamic scaling relation. Consequently, the region in the phase diagram that is thermodynamically confined but string deconfined grows with angular velocity. We further study the Schwinger effect using the potential analysis approach. Rotation lowers both the confining and catastrophic critical electric fields and suppresses the height and width of the potential barrier, thereby enhancing pair production in both confined and deconfined phases. In the deconfined phase, rotation also generates a worldsheet horizon that limits the radial extent of connected string solutions and reduces both the maximum quark--antiquark separation and the deepest turning point of the energetically favored string. These results demonstrate that, while rotation acts trivially in the thermodynamic sector through an exact scaling law, it produces genuinely new effects in the string sector.", "url": "https://arxiv.org/abs/2607.12906", "type": "理论", "summary": "我们研究了基于爱因斯坦-麦克斯韦-膨胀框架的全息 QCD 模型中有限角速度对相结构和施温格电子对产生的影响。旋转是通过增强结构引入的，该增强结构从相应的静态背景生成静态旋转几何形状。我们首先使用大势和几个响应函数研究热力学相图，结果表明所有热力学相边界在旋转下都满足精确的比例关系，这意味着旋转热力学部分完全由相应的静态解通过简单的升压变换确定。然后，我们通过有效弦张力研究限制，发现与热力学可观测值一致，旋转降低了弦限制——解除限制转变温度和化学势。然而，相应的相界不再遵守热力学比例关系。因此，相图中受热力学限制但弦解除限制的区域随着角速度而增长。\n\n我们使用电位分析方法进一步研究施温格效应。旋转降低了限制和灾难性的临界电场，并抑制了势垒的高度和宽度，从而增强了限制和去限制阶段的电子对产生。在解除限制阶段，旋转还产生一个世界表视界，它限制了连接的弦解的径向范围，并减少了最大夸克-反夸克分离和能量上有利的弦的最深转折点。这些结果表明，虽然旋转通过精确的比例定律在热力学领域中发挥着微不足道的作用，但它在弦领域中产生了真正的新效应。", "authors": [{"name": "Leila Shahkarami"}, {"name": "Farid Charmchi"}], "featured_authors": [{"name": "Leila Shahkarami"}, {"name": "Farid Charmchi"}], "author_count": 2}, {"id": "2607.12923", "category": "hep-th", "title": "Holography from number theory: Emergent holographic AdS$_2$ space-time from exact BPS black hole microstate counting", "abstract": "In this note, starting from the exact counting formulae for 4D BPS black hole degeneracies in the cases of 1/2 BPS $\\mathcal{N}=4$ and 1/8 BPS $\\mathcal{N}=8$ solutions, expressed as Rademacher expansions for coefficients of modular and Jacobi forms respectively, we explicitly show how the number theoretic data in each Rademacher summand is encoded by a Segal-Bargmann heat kernel calculation in the de Alfaro-Fubini-Furlan (DFF) model of conformal quantum mechanics, thus demonstrating the holographic origin of the BPS Bekenstein-Hawking entropy, and all logarithmic and power law suppressed corrections to it. We then derive the 2D holographically dual bulk space-time for this CQM and show that it is an AdS$_2$ space-time with radial length scale correlated to the energy scale of the DFF model. We further show how the Bekenstein-Hawking entropy emerges from an entanglement entropy computation in this bulk space-time. Hence, for the two classes of 4D BPS black holes under consideration, we have inferred the holographic CQM relevant for microscopic state counting from the exact number-theoretic degeneracy formulae and demonstrated the emergence of the near-horizon AdS$_2$ attractor geometry that is holographically dual to it.", "url": "https://arxiv.org/abs/2607.12923", "type": "理论", "summary": "在本文中，从 1/2 BPS $\\mathcal{N}=4$ 和 1/8 BPS $\\mathcal{N}=8$ 解情况下 4D BPS 黑洞简并性的精确计数公式（分别表示为模系数和雅可比形式系数的 Rademacher 展开式）开始，我们明确地展示了每个 Rademacher 被加数中的数论数据如何通过 Segal-Bargmann 热核计算进行编码： de Alfaro-Fubini-Furlan (DFF) 共形量子力学模型，从而证明了 BPS Bekenstein-Hawking 熵的全息起源，并且所有对数和幂律都抑制了对其的修正。然后，我们推导了该 CQM 的 2D 全息双体时空，并表明它是一个 AdS$_2$ 时空，其径向长度尺度与 DFF 模型的能量尺度相关。我们进一步展示了贝肯斯坦-霍金熵是如何从这个大块时空中的纠缠熵计算中产生的。\n\n因此，对于所考虑的两类 4D BPS 黑洞，我们从精确的数论简并公式推断出与微观状态计数相关的全息 CQM，并证明了与其全息对偶的近视界 AdS$_2$ 吸引子几何结构的出现。", "authors": [{"name": "Gabriel Lopes Cardoso"}, {"name": "Suresh Nampuri"}], "featured_authors": [{"name": "Gabriel Lopes Cardoso"}, {"name": "Suresh Nampuri"}], "author_count": 2}, {"id": "2607.12973", "category": "hep-th", "title": "Recursion Relations for Classical Gravity", "abstract": "We derive a set of recursion relations for the perturbative evaluation of the scattering of two black holes in Einstein gravity. To illustrate, we solve the equations up to third post-Minkowskian order in the gravitational coupling constant G, recovering the correct result, including the back-reaction from gravitational radiation.", "url": "https://arxiv.org/abs/2607.12973", "type": "理论", "summary": "我们推导出一组递归关系，用于微扰评估爱因斯坦引力中两个黑洞的散射。为了说明这一点，我们求解了引力耦合常数 G 中后闵可夫斯基三阶的方程，恢复了正确的结果，包括引力辐射的反作用。", "authors": [{"name": "Poul H. Damgaard"}, {"name": "Kwangeon Kim"}, {"name": "Kanghoon Lee"}], "featured_authors": [{"name": "Poul H. Damgaard"}, {"name": "Kwangeon Kim"}, {"name": "Kanghoon Lee"}], "author_count": 3}, {"id": "2607.12976", "category": "hep-th", "title": "Causality and realizability of local operations in quantum field theory", "abstract": "In 1993, Sorkin noted, in the context of quantum field theory (QFT), that identifying the operations accessible to an observer acting in some spacetime region with quantum instruments whose Kraus operators are localizable therein leads to superluminal communication. This so-called Sorkin paradox can be resolved by further constraining the set of allowed local operations in QFT. In this spirit, Jubb and Oeckl identified the minimal conditions that QFT instruments must satisfy to be compatible with Einstein's causality. Independently, Fewster and Verch proposed a framework for local QFT operations that generalizes non-relativistic quantum measurement theory; remarkably, such FV-realizable instruments were shown to be causal. In this work, we study both approaches in the quantum field theory of the free scalar field. In this regard, we prove that there exist causal channels that cannot be arbitrarily well approximated through FV schemes. Moreover, deciding whether a given instrument is implementable or far away from being implementable by composing several FV operations is an uncomputable problem. On a more optimistic note, we show that a very wide class of causal instruments is FV-realizable: namely, those whose measurement channels are random displacements of the field operators. As we show, those suffice to implement any Positive Operator Valued Measure over a set of field quadratures in a non-demolition way (i.e., without perturbing any other commuting quadratures). Similarly, they allow approximating arbitrary QFT operations, causal or not, in a heralded, probabilistic way.", "url": "https://arxiv.org/abs/2607.12976", "type": "理论", "summary": "1993年，索尔金指出，在量子场论（QFT）的背景下，通过使用克劳斯算子可在其中定位的量子仪器来识别在某个时空区域中观察者可以进行的操作，从而实现超光速通信。这种所谓的索金悖论可以通过进一步限制 QFT 中允许的本地操作集来解决。本着这种精神，朱布和厄克尔确定了 QFT 仪器必须满足的最低条件才能与爱因斯坦的因果关系兼容。 Fewster 和 Verch 独立提出了一个局部 QFT 运算框架，概括了非相对论量子测量理论；值得注意的是，这种可实现 FV 的工具被证明是因果关系。在这项工作中，我们研究了自由标量场量子场论中的两种方法。在这方面，我们证明存在不能通过 FV 方案任意很好地近似的因果通道。此外，通过组合多个 FV 操作来确定给定工具是否可实现或远距离可实现是一个不可计算的问题。\n\n从更乐观的角度来看，我们表明一类非常广泛的因果仪器是 FV 可实现的：即，那些测量通道是场算子的随机位移的仪器。正如我们所展示的，这些足以以非拆除方式（即，不干扰任何其他通勤正交）在一组场正交上实现任何正算子值测量。类似地，它们允许以预示的概率方式逼近任意 QFT 运算，无论是否有因果关系。", "authors": [{"name": "Jan Mandrysch"}, {"name": "Robin Simmons"}, {"name": "Miguel Navascues"}], "featured_authors": [{"name": "Jan Mandrysch"}, {"name": "Robin Simmons"}, {"name": "Miguel Navascues"}], "author_count": 3}, {"id": "2607.12989", "category": "hep-th", "title": "Enhanced Correlations in Hawking Radiation from Near-Extremal Collapse", "abstract": "We consider the formation of a near-extremal Reissner-Nordstrom black hole by collapse, and show how to compute correlations in the outgoing Hawking radiation due to enhanced gravitational backreaction effects in the near-horizon region. This is done by reducing to the s-wave and employing the Hamiltonian formulation of Einstein-Maxwell theory coupled to a scalar field. Solving the constraints yields an action for the scalar field that incorporates gravitational backreaction effects at the quantum level, governed by an effective coupling g = G/(\\pi r_0^3 T_H) that grows at low temperature, as in recent Schwarzian-based analyses. This action produces corrections to the free field Hawking state which are imprinted on correlation functions of the Hawking radiation measured at null infinity. As part of our analysis, we show that this action evaluated in the AdS_2 region is equivalent, at the level of all tree-level boundary correlators, to the standard JT/Schwarzian description coupled to dressed bilocal operators. We also reproduce some one-loop results. In our approach, metric fluctuations are included quantum mechanically through the reduced scalar action, rather than through a semiclassical expectation value, and our computation of the radiation manifestly reduces to Hawking's original treatment when metric fluctuations are neglected.", "url": "https://arxiv.org/abs/2607.12989", "type": "理论", "summary": "我们考虑了通过塌缩形成近极值赖斯纳-诺德斯特龙黑洞，并展示了如何计算由于近地平线区域增强的引力反反应效应而导致的传出霍金辐射的相关性。这是通过简化为 s 波并采用与标量场耦合的爱因斯坦-麦克斯韦理论的哈密顿公式来完成的。解决约束条件会产生标量场的作用，该作用在量子水平上结合了引力反作用效应，由在低温下生长的有效耦合 g = G/(\\pi r_0^3 T_H) 控制，如最近基于 Schwarzian 的分析所示。这一作用会对自由场霍金态产生校正，该校正被印在零无穷远处测量的霍金辐射的相关函数上。作为我们分析的一部分，我们表明，在所有树级边界相关器的级别上，在 AdS_2 区域中评估的此操作等效于与修饰的双局部运算符耦合的标准 JT/Schwarzian 描述。我们还重现了一些单循环结果。\n\n在我们的方法中，度量涨落通过减少的标量作用以量子力学的方式包含在内，而不是通过半经典期望值，并且当忽略度量涨落时，我们对辐射的计算显然简化为霍金的原始处理。", "authors": [{"name": "Suzanne Bintanja"}, {"name": "Seolhwa Kim"}, {"name": "Per Kraus"}], "featured_authors": [{"name": "Suzanne Bintanja"}, {"name": "Seolhwa Kim"}, {"name": "Per Kraus"}], "author_count": 3}, {"id": "2607.13001", "category": "hep-th", "title": "The Infraparticle Edge", "abstract": "I derive the charged-particle spectral edge from the quantum instrument of soft QED. I use two projections of that instrument. Tracing over unresolved photons gives the reduced hard-sector channel. Pushing the outcomes to total energy gives the inclusive energy distribution. Its Laplace exponent is fixed by the diagonal soft intensity. For ${\\rm d} N_h(\\omega)=\\eta_h{\\rm d}\\omega/\\omega+{\\rm d} N_{h,\\mathrm{reg}}(\\omega)$, I obtain $\\rho_{\\mathrm{inc}}(s)\\sim C\\theta(s-m^2)(s-m^2)^{-1+\\eta_h}$. I retain the coherence kernel and derive hard-sector dephasing and the spectral edge from two contractions of one soft environment. The diagonal coefficient $\\kappa_{aa}$ fixes the endpoint exponent, while $\\frac12(\\kappa_{aa}+\\kappa_{bb}-2\\operatorname{Re}\\kappa_{ba})$ fixes the dephasing exponent between hard alternatives. I then classify infrared energy marginals, derive the finite-resolution residue $Z(\\mu)=(\\mu/\\Lambda)^{\\eta_h}$, prove stability under infrared-integrable perturbations, and separate the bath exponent from a hard threshold exponent. For the one-electron spectral measure, the hard threshold factor is regular. The resulting edge has the local power law of a gapped unparticle spectrum, while its exponent remains a response coefficient of the unresolved photon sector.", "url": "https://arxiv.org/abs/2607.13001", "type": "理论", "summary": "我从软 QED 量子仪器中推导出带电粒子光谱边缘。我使用该仪器的两个投影。追踪未解析的光子给出了减少的硬扇区通道。将结果推向总能量给出包容性能量分布。其拉普拉斯指数由对角软强度固定。对于${\\rm d} N_h(\\omega)=\\eta_h{\\rm d}\\omega/\\omega+{\\rm d} N_{h,\\mathrm{reg}}(\\omega)$，我得到$\\rho_{\\mathrm{inc}}(s)\\sim C\\theta(s-m^2)(s-m^2)^{-1+\\eta_h}$。我保留了相干核，并从一个软环境的两次收缩中导出硬​​扇区相移和频谱边缘。对角系数 $\\kappa_{aa}$ 固定端点指数，而 $\\frac12(\\kappa_{aa}+\\kappa_{bb}-2\\operatorname{Re}\\kappa_{ba})$ 固定硬替代方案之间的相移指数。然后，我对红外能量边际进行分类，导出有限分辨率残差 $Z(\\mu)=(\\mu/\\Lambda)^{\\eta_h}$，证明红外可积扰动下的稳定性，并将浴指数与硬阈值指数分开。对于单电子能谱测量，硬阈值因子是规则的。\n\n所得边缘具有带隙非粒子光谱的局部幂律，而其指数仍然是未解析光子扇区的响应系数。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2607.12003", "category": "math-ph", "title": "Expansion of the planetary Hamiltonian for small eccentricities and inclinations: a vector formalism", "abstract": "We revisit the classical expansion of the planetary Hamiltonian for small eccentricities and mutual inclinations of the orbits, presenting a derivation based entirely on vector formalism. We demonstrate that the secular part of the disturbing function, as well as any other Fourier harmonic, can be expressed in terms of scalar products of vectors lying in the system's invariant plane. Furthermore, we show how to express any such term using the angular momentum and eccentricity vectors of the orbits.", "url": "https://arxiv.org/abs/2607.12003", "type": "理论", "summary": "我们重新审视行星哈密顿量的经典展开式，以求轨道的小偏心率和相互倾斜，提出完全基于矢量形式主义的推导。我们证明，干扰函数的长期部分以及任何其他傅立叶谐波可以用系统不变平面中向量的标量积来表示。此外，我们还展示了如何使用轨道的角动量和偏心率向量来表达任何此类术语。", "authors": [{"name": "Federico Mogavero"}], "featured_authors": [{"name": "Federico Mogavero"}], "author_count": 1}, {"id": "2607.12157", "category": "math-ph", "title": "CORTET: Robust generation of simulation-ready cortical meshes", "abstract": "Every human brain folds differently, and such natural variation confounds the search for imaging biomarkers of neurodevelopmental disorders. Physics-based simulation can help determine the causal mechanisms that underpin this variability. Yet every simulation must be initiated from a solid tetrahedral mesh of the brain's interior, and it is the worst element in that mesh, not the average, that decides whether the simulation runs at all. Building that mesh from fetal MRI currently requires labour-intensive manual intervention. We therefore present CORTET (CORtical TETrahedral meshing): a fully automated pipeline that converts a triangulated cortical surface into a solver-ready tetrahedral mesh whose worst-element quality meets a strict stability target with no manual repair. By benchmarking against a general-purpose tetrahedral mesher on the same input surfaces, we isolate the pipeline's contribution from that of the input geometry, and we validate quality across a cohort of nearly 200 fetal subjects spanning the folding period. A mesh taken straight from the pipeline sustains a numerically stable morphoelastic folding simulation of a real fetal subject.", "url": "https://arxiv.org/abs/2607.12157", "type": "理论", "summary": "每个人的大脑折叠方式都不同，这种自然变化使寻找神经发育障碍的成像生物标志物变得困难。基于物理的模拟可以帮助确定支撑这种变化的因果机制。然而，每次模拟都必须从大脑内部的实体四面体网格开始，而决定模拟是否运行的是该网格中最差的元素，而不是平均值。目前，根据胎儿 MRI 构建网格需要劳动密集型的手动干预。因此，我们提出了 CORTET（皮质四面体网格划分）：一种全自动管道，可将三角皮质表面转换为可供求解器使用的四面体网格，其最差单元质量满足严格的稳定性目标，无需手动修复。通过在相同输入表面上对通用四面体网格器进行基准测试，我们将管道的贡献与输入几何体的贡献分开，并在跨越折叠期的近 200 名胎儿受试者的队列中验证质量。直接从管道中取出的网格可维持对真实胎儿受试者的数值稳定的形态弹性折叠模拟。", "authors": [{"name": "Davood Shahsavari"}, {"name": "Irina Grigorescu"}, {"name": "Jiaxin Xiao"}, {"name": "Nashira Baena"}, {"name": "Aakash Saboo"}, {"name": "Vanessa Kyriakopoulou"}, {"name": "Alena Uus"}, {"name": "Martin J. Bishop"}, {"name": "Katherine R. Long"}, {"name": "Emma C. Robinson"}], "featured_authors": [{"name": "Davood Shahsavari"}, {"name": "Irina Grigorescu"}, {"name": "Jiaxin Xiao"}, {"name": "Martin J. Bishop"}, {"name": "Katherine R. Long"}, {"name": "Emma C. Robinson"}], "author_count": 10}, {"id": "2607.12289", "category": "math-ph", "title": "Asymptotic forms of the Ursell edge waves on a gently sloping beach", "abstract": "It is shown that the asymptotics of the Ursell trapping modes on a sloping beach of small slope angle alpha coincide with the inverse Fourier transform of standard WKB exponentials, i.e., the Maslov canonical operator, as alpha tends to 0.", "url": "https://arxiv.org/abs/2607.12289", "type": "理论", "summary": "结果表明，当 α 趋于 0 时，小坡角 α 的倾斜海滩上的 Ursell 捕获模态的渐近性与标准 WKB 指数（即 Maslov 正则算子）的傅里叶逆变换一致。", "authors": [{"name": "P. Zhevandrov"}, {"name": "A. Merzon"}, {"name": "M. I. Romero Rodríguez"}], "featured_authors": [{"name": "P. Zhevandrov"}, {"name": "A. Merzon"}, {"name": "M. I. Romero Rodríguez"}], "author_count": 3}, {"id": "2607.12534", "category": "math-ph", "title": "A canonical two-scale Sonine fractional calculus induced by the Tricomi function", "abstract": "We introduce a Tricomi-type generalized fractional calculus in the Sonine kernel framework. The key result is that the Tricomi branch is a Stieltjes function in the admissible parameter range, so its reciprocal is a complete Bernstein function. This fact induces a Sonine fractional calculus together with the canonical Tricomi integral and the associated Riemann--Liouville-type and Caputo-type derivatives. We also prove that, within the Kummer class, the Tricomi branch is the unique Stieltjes representative, once the natural asymptotic normalization is fixed, and we derive the corresponding Lévy--Khintchine representation, Volterra formulation, and scalar Cauchy problem. A distinctive feature of the resulting operators is the emergence of two independent asymptotic orders.", "url": "https://arxiv.org/abs/2607.12534", "type": "理论", "summary": "我们在 Sonine 内核框架中引入了 Tricomi 型广义分数阶微积分。关键结果是 Tricomi 分支在允许的参数范围内是一个 Stieltjes 函数，因此它的倒数是一个完备的 Bernstein 函数。这一事实引发了 Sonine 分数阶微积分以及规范 Tricomi 积分和相关的黎曼-刘维尔型和卡普托型导数。我们还证明，在 Kummer 类中，Tricomi 分支是唯一的 Stieltjes 代表，一旦自然渐近归一化固定，我们就推导出相应的 Lévy--Khintchine 表示、Volterra 公式和标量柯西问题。由此产生的算子的一个显着特征是出现了两个独立的渐近阶。", "authors": [{"name": "Ivano Colombaro"}, {"name": "Marc Tudela-Pi"}], "featured_authors": [{"name": "Ivano Colombaro"}, {"name": "Marc Tudela-Pi"}], "author_count": 2}, {"id": "2607.12852", "category": "math-ph", "title": "A maximal Hohenberg-Kohn theorem for non-interacting systems via potential theory", "abstract": "In this paper, we show that for Schrödinger operators with weakly correlated ground states, the Hohenberg-Kohn theorem holds within the maximal class of form-bounded external potentials if and only if the single-particle density is positive quasi-everywhere. Furthermore, we show that these conditions are satisfied for the ground state of non-interacting Schrödinger operators with a discrete ground state energy. Consequently, we establish the Hohenberg-Kohn theorem for non-interacting systems, and therefore the uniqueness of the Kohn-Sham potential, within the maximal class of Laplace form-bounded potentials. The key ingredient to establish these results is a characterization of weakly correlated regular states, whose proof relies on classical potential theory. Moreover, our proof reveals that, in the continuum setting, the fundamental mechanism underlying the Hohenberg-Kohn theorem is the (quasi)-unique continuation of the density rather than of the many-body wavefunction.", "url": "https://arxiv.org/abs/2607.12852", "type": "理论", "summary": "在本文中，我们证明，对于具有弱相关基态的薛定谔算子，当且仅当单粒子密度准处处为正时，霍恩伯格-科恩定理在形式有界外部势的最大类内成立。此外，我们表明，具有离散基态能量的非相互作用薛定谔算子的基态满足这些条件。因此，我们建立了非相互作用系统的 Hohenberg-Kohn 定理，从而在拉普拉斯形式有界势的最大类中建立了 Kohn-Sham 势的唯一性。建立这些结果的关键因素是弱相关正则态的表征，其证明依赖于经典势理论。此外，我们的证明表明，在连续介质环境中，霍恩伯格-科恩定理的基本机制是密度的（准）唯一延拓，而不是多体波函数的延拓。", "authors": [{"name": "Thiago Carvalho Corso"}], "featured_authors": [{"name": "Thiago Carvalho Corso"}], "author_count": 1}, {"id": "2607.12860", "category": "math-ph", "title": "Spending Operators and Weak Power-Port Decompositions for Path-Dependent Entropic Lagrangians", "abstract": "History-dependent entropic formulations require a precise meaning for channelwise terminal variation and a spatial power split that remains valid for weak diffusion fields. This paper establishes both structures and places them in a single Path-Dependent Entropic Lagrangian construction. Endpoint calibration and cocycle additivity uniquely determine the oriented spending increment, while a channelwise extension of a decomposed power port yields explicit terminal differentials for scalar dissipation and potential-weighted fluxes. The diffusion split is formulated at Sobolev, finite-energy distributional, and bounded-variation/divergence-measure regularity. A natural-dual-space counterexample proves that chemical-potential-weighted residuals do not imply conservation, and an independent multiplier restores the unweighted balance. These ingredients are assembled in one augmented thermo-diffusion PDEL functional on a synchronized product space. Its admissible directional stationarity produces energetic and thermal conjugacy, species balance, flux closure, entropy production, and the two terminal power-routing channels. The same construction admits a finite-energy weak form and specializes to the Cahn--Hilliard equation.", "url": "https://arxiv.org/abs/2607.12860", "type": "理论", "summary": "历史相关的熵公式需要通道终端变化的精确含义和对弱扩散场仍然有效的空间功率分裂。本文建立了这两种结构并将它们放置在单个路径相关熵拉格朗日结构中。端点校准和共循环可加性唯一地确定了定向支出增量，而分解功率端口的通道扩展产生了标量耗散和电势加权通量的显式终端微分。扩散分裂是根据 Sobolev、有限能量分布和有界变化/散度测量规律制定的。自然对偶空间反例证明化学势加权残差并不意味着守恒，并且独立乘数恢复了未加权平衡。这些成分被组装在一个增强的热扩散 PDEL 中，在同步的产品空间上发挥作用。其允许的方向平稳性产生能量和热共轭、物种平衡、通量闭合、熵产生和两个终端功率路由通道。\n\n相同的构造允许有限能量弱形式，并且专门用于 Cahn-Hilliard 方程。", "authors": [{"name": "Huilong Ren"}], "featured_authors": [{"name": "Huilong Ren"}], "author_count": 1}, {"id": "2607.11907", "category": "quant-ph", "title": "A Non-Commutative Voronovskaya Theorem for Quantum Neural Network Operators", "abstract": "We prove a complete asymptotic expansion for quantum neural network operators when they approximate arbitrary quantum channels. This is the non-commutative analogue of the classical Voronovskaya theorem. The expansion reveals that the approximation error splits into three fundamentally different parts: integer powers of \\(1/n\\) involving ordinary Fréchet derivatives; fractional powers governed by Marchaud fractional derivatives, which capture the Hölder smoothness of the channel; and purely quantum commutator terms that have no classical counterpart. The remainder is bounded sharply by an explicit constant: \\[ \\norm{R_{m,n}(\\Phi,\\bullet)}_\\diamond \\le C_{m,\\gamma,d} \\|\\Phi\\|_{\\cC^{m,\\gamma}} \\, n^{-(m+\\gamma)} (\\log n)^{3m/2}. \\] We present a numerical test for a classical analogue that confirms the predicted convergence rate and the logarithmic correction, directly validating the asymptotic theory. Based on this expansion, we obtain three major advances: a quantum central limit theorem for the fluctuations of quantum neural network operators, a method to construct optimal interpolation geodesics between quantum channels via Kubo-Ando means, and a systematic understanding of how fractional smoothness limits the acceleration of quantum neural network approximations. The numerical test further demonstrates that the theoretical rates are sharp and that logarithmic enhancements are unavoidable. Altogether, our work builds a rigorous bridge between classical approximation theory, fractional calculus, and quantum machine learning, offering both theoretical insight and practical tools for designing and analyzing quantum neural networks in finite dimensions.", "url": "https://arxiv.org/abs/2607.11907", "type": "理论+数值", "summary": "我们证明了量子神经网络算子在逼近任意量子通道时的完全渐近展开。这是经典沃罗诺夫斯卡亚定理的非交换模拟。展开式表明，近似误差分为三个根本不同的部分：涉及普通 Fréchet 导数的 \\(1/n\\) 整数幂；由 Marchaud 分数阶导数控制的分数幂，捕捉通道的 Hölder 平滑度；以及没有经典对应项的纯量子换向器项。余数由一个显式常数严格限制：\\[ \\norm{R_{m,n}(\\Phi,\\bullet)}_\\diamond \\le C_{m,\\gamma,d} \\|\\Phi\\|_{\\cC^{m,\\gamma}} \\, n^{-(m+\\gamma)} (\\log n)^{3m/2}。 \\] 我们提出了经典模拟的数值测试，证实了预测的收敛速度和对数校正，直接验证了渐近理论。\n\n基于这一扩展，我们获得了三个主要进展：量子神经网络算子涨落的量子中心极限定理、通过久保安藤方法构建量子通道之间最优插值测地线的方法，以及对分数平滑如何限制量子神经网络近似加速的系统理解。数值测试进一步表明理论速率是急剧的并且对数增强是不可避免的。总而言之，我们的工作在经典逼近理论、分数阶微积分和量子机器学习之间架起了一座严格的桥梁，为设计和分析有限维度的量子神经网络提供了理论见解和实用工具。", "authors": [{"name": "Rômulo Damasclin Chaves dos Santos"}, {"name": "Delvonei Alves de Andrade"}], "featured_authors": [{"name": "Rômulo Damasclin Chaves dos Santos"}, {"name": "Delvonei Alves de Andrade"}], "author_count": 2}, {"id": "2607.11909", "category": "quant-ph", "title": "What It Is Like To Be A Quantum Computer: A Closed Quantum Global Workspace -- Conscious Access and Integration as Correlation Dynamics in Hilbert Space", "abstract": "Motivated by speculative artistic inquiry into quantum-only forms of experience in relation to representation and embodiment, this paper develops a translation of the Global Neuronal Workspace (GNW) theory for closed quantum systems. The work treats classical GNW as an architectural reference and asks how conscious access and memory change under unitary dynamics. We reference a quantum Hopfield-style Hamiltonian that mirrors key organisational features of GNW, such as a distributed workspace and tunable large-scale integration. Within this framework, global availability of information is realised through coherence-preserving correlation distributions and memory is a persistent internal correlation structure. Likewise, ignition becomes a transition in global entanglement as opposed to convergence towards a stable attractor. Reductions of the Hopfield-style Hamiltonian lead to a tractable toy model and GHZ-type entanglement, explicitly showing how relative phase is globally accessible through joint internal operations yet absent from all local subsystems. This closed quantum system approach clarifies which aspects of workspace theories are contingent on classical assumptions. Our model highlights a non-representational regime in which access and memory are entirely relational rather than copies or records. Beyond its scientific contribution, the paper proposes a mode of art-science collaboration where speculative artistic inquiry is pursued through theoretical models rather than illustration or data.", "url": "https://arxiv.org/abs/2607.11909", "type": "理论", "summary": "受对与表征和体现相关的纯量子体验形式的思辨性艺术探究的推动，本文开发了封闭量子系统的全局神经元工作空间（GNW）理论的翻译。该作品将经典 GNW 作为建筑参考，并询问意识访问和记忆在单一动态下如何变化。我们引用了量子 Hopfield 式哈密顿量，它反映了 GNW 的关键组织特征，例如分布式工作空间和可调的大规模集成。在这个框架内，信息的全局可用性是通过保持一致性的相关分布来实现的，而内存是一个持久的内部相关结构。同样，点火成为全局纠缠的过渡，而不是向稳定吸引子的收敛。 Hopfield 式哈密顿量的约简导致了一个易于处理的玩具模型和 GHZ 型纠缠，明确显示了如何通过联合内部操作全局访问相对相位，但所有局部子系统都不存在。这种封闭的量子系统方法阐明了工作空间理论的哪些方面取决于经典假设。\n\n我们的模型强调了一种非表征机制，其中访问和记忆完全是相关的，而不是副本或记录。除了科学贡献之外，本文还提出了一种艺术与科学合作的模式，通过理论模型而不是插图或数据来进行思辨性艺术探究。", "authors": [{"name": "Libby Heaney"}], "featured_authors": [{"name": "Libby Heaney"}], "author_count": 1}, {"id": "2607.11912", "category": "quant-ph", "title": "Comment on Statistical mechanics from quantum envariance and exchange symmetry", "abstract": "Ojha, Sardana, and Ghosh [Phys. Rev. A 113, 042221 (2026)] propose that tracing environmental records of particle permutations produces an entropy kB ln N!, thereby explaining the Gibbs factor, and use the same construction to multiply the Saha equilibrium relation by 1/(Ne!Np!). We show that these conclusions do not follow. The reduced density matrix printed in their Eq. (32) is not a partial trace, and even under the natural corrected interpretation the entropy equals kB ln N! only when the system branch states are mutually orthogonal. That condition is not generally satisfied and, when imposed on labeled permutation branches, does not by itself restrict the particle state to one bosonic or fermionic symmetry sector. A two-particle calculation makes the contradiction explicit. Their Gibbs-paradox calculation also starts from a distinguishable-particle entropy while calling it the Sackur-Tetrode entropy. In the Saha section, the state in Eq. (52), as written, factorizes and has zero system-environment entanglement. The proposed factorial does not approach unity in the claimed dilute-gas limit, does not yield a finite nonzero intensive thermodynamic limit, and counts indistinguishability twice. We give the corrected canonical and fugacity-based formulations and identify which standard results of the paper remain unaffected.", "url": "https://arxiv.org/abs/2607.11912", "type": "理论+数值", "summary": "奥贾、萨达纳和戈什 [物理学。 Rev. A 113, 042221 (2026)]提出追踪粒子排列的环境记录会产生熵 kB ln N!，从而解释吉布斯因子，并使用相同的构造将萨哈平衡关系乘以 1/(Ne!Np!)。我们证明这些结论并不成立。等式中打印的降低密度矩阵。 (32) 不是部分迹，即使在自然校正解释下，熵也等于 kB ln N！仅当系统分支状态相互正交时。该条件通常不被满足，并且当施加于标记的排列分支时，其本身并不将粒子状态限制为一个玻色子或费米子对称扇区。二粒子计算使矛盾变得明确。他们的吉布斯悖论计算也从可区分粒子熵开始，同时将其称为 Sackur-Tetrode 熵。在萨哈部分，方程中的状态。 （52），如所写的，因式分解并且具有零系统环境纠缠。\n\n所提出的阶乘在所要求的稀释气体极限中不接近统一，不产生有限的非零密集热力学极限，并且对不可区分性进行了两次计数。我们给出了修正后的规范和基于逸度的公式，并确定了论文的哪些标准结果不受影响。", "authors": [{"name": "Ridha Horchani"}], "featured_authors": [{"name": "Ridha Horchani"}], "author_count": 1}, {"id": "2607.11968", "category": "quant-ph", "title": "Double Covariance Model for Entangled Quantum States: Gaussian Reduction to Second Order Covariances", "abstract": "We propose a novel approach to the problem of interconnecting the probabilistic formalisms of classical and quantum physics, focusing on its most challenging aspect: the classical probabilistic generation of entangled states. We show that the statistics encoded in the density operators of composite quantum systems correspond to fourth-order classical statistics. Specifically, to generate a density operator, one must consider the covariance of a random covariance operator. We term this framework the Double Covariance Model (DCM). This double covariance possesses a non-trivial internal structure that arises from the interplay between two distinct time scales, combining temporal and statistical covariances. In this article, we exploit a well-known property of Gaussian processes: the second-order moment determines the moments of higher orders, specifically the fourth-order moment. This Gaussian reduction simplifies the DCM by reducing it to second-order statistics. Utilizing (circular) Gaussian processes simplifies and generalizes the DCM construction for entangled states, rendering it mathematically rigorous. Furthermore, it clarifies the classical probabilistic meaning of concurrence, a foundational quantitative measure of entanglement.", "url": "https://arxiv.org/abs/2607.11968", "type": "理论", "summary": "我们提出了一种新颖的方法来解决经典物理学和量子物理学的概率形式主义相互连接的问题，重点关注其最具挑战性的方面：纠缠态的经典概率生成。我们证明了复合量子系统密度算子中编码的统计量对应于四阶经典统计量。具体来说，为了生成密度算子，必须考虑随机协方差算子的协方差。我们将该框架称为双协方差模型（DCM）。这种双协方差具有一个不平凡的内部结构，该结构是由两个不同时间尺度之间的相互作用产生的，结合了时间和统计协方差。在本文中，我们利用高斯过程的一个众所周知的属性：二阶矩决定高阶矩，特别是四阶矩。这种高斯约简通过将 DCM 简化为二阶统计量来简化。利用（循环）高斯过程简化并概括了纠缠态的 DCM 构造，使其在数学上更加严格。\n\n此外，它阐明了并发的经典概率含义，这是纠缠的基本定量度量。", "authors": [{"name": "Andrei Khrennikov"}], "featured_authors": [{"name": "Andrei Khrennikov"}], "author_count": 1}, {"id": "2607.11985", "category": "quant-ph", "title": "VQCSim: When Does Compile-Once Statevector Simulation Beat Generic Quantum Frameworks?", "abstract": "Hybrid quantum-classical machine learning workflows repeatedly evaluate many small parametrized circuits during training and model exploration. In this regime, framework dispatch and orchestration overhead often dominate runtime. Prior simulators accelerate execution but leave open the question of when compile-once specialization is the right choice for static variational circuits. We answer this question with VQCSim, a compile-once, PyTorch-native statevector execution path with native autograd. In a systematic MQT Bench study, VQCSim compiles all tested static circuits and provides 87.7% end-to-end semantic validation. Across a five-GPU evaluation set, VQCSim delivers pooled median speedups of 4.49x for native inference and 26.78x for native training, while retaining a 3.31x advantage under matched finite-difference training. Ablation identifies native autograd as the dominant source of acceleration (27.6x), with compile-once caching and batch vectorization contributing additional gains. The speedup trades higher GPU memory (VQCSim is memory-limited at the high end) for lower runtime. We derive a hardware-aware regime map and release vqcsim-oracle, an open-source backend selector with 91.1%-97.7% top-1 agreement (including cross-GPU transfers), enabling automatic simulator selection in QML design loops.", "url": "https://arxiv.org/abs/2607.11985", "type": "理论+数值", "summary": "混合量子经典机器学习工作流程在训练和模型探索期间反复评估许多小型参数化电路。在这种情况下，框架调度和编排开销通常在运行时占主导地位。先前的模拟器可加速执行，但仍存在一个问题：一次编译专门化何时是静态变分电路的正确选择。我们用 VQCSim 回答这个问题，VQCSim 是一个一次性编译、PyTorch 原生状态向量执行路径，具有原生 autograd。在系统性 MQT Bench 研究中，VQCSim 编译了所有经过测试的静态电路，并提供了 87.7% 的端到端语义验证。在五个 GPU 评估集上，VQCSim 为本机推理提供了 4.49 倍的合并中值加速，为本机训练提供了 26.78 倍的合并中值加速，同时在匹配的有限差分训练下保留了 3.31 倍的优势。 Ablation 将本机 autograd 视为加速的主要来源 (27.6 倍)，一次性编译缓存和批量矢量化贡献了额外的收益。加速以更高的 GPU 内存（VQCSim 在高端受内存限制）换取更低的运行时间。\n\n我们导出了一个硬件感知机制图并发布了 vqcsim-oracle，这是一个具有 91.1%-97.7% top-1 一致性（包括跨 GPU 传输）的开源后端选择器，支持 QML 设计循环中的自动模拟器选择。", "authors": [{"name": "Anton Firc"}, {"name": "Martin Perešíni"}, {"name": "Vojtěch Mrázek"}, {"name": "Kamil Malinka"}, {"name": "Vojtěch Staněk"}, {"name": "Zbyněk Lička"}, {"name": "Nouhaila Innan"}, {"name": "Walid El Maouaki"}, {"name": "Alberto Marchisio"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Anton Firc"}, {"name": "Martin Perešíni"}, {"name": "Vojtěch Mrázek"}, {"name": "Walid El Maouaki"}, {"name": "Alberto Marchisio"}, {"name": "Muhammad Shafique"}], "author_count": 10}, {"id": "2607.12053", "category": "quant-ph", "title": "Entangling Power and Symmetries in the Quantum Rabi Model", "abstract": "The quantum Rabi model is a standard effective Hamiltonian in studies of light-matter interaction, capturing the simplest nontrivial setting in which a qubit couples to a single harmonic oscillator. Within the broader Rabi family, we focus on two special cases: the Jaynes-Cummings (JC) model, which carries an explicit $U(1)$ symmetry, and the asymmetric quantum Rabi model (AQRM), which possesses a parameter-dependent \"hidden'' symmetry that appears only at integer bias, $\\varepsilon/\\omega\\in\\mathbb{Z}$, and is not manifest in the Hamiltonian. We use the time-averaged entangling power as an operator-level diagnostic of these symmetry structures. Since the oscillator Hilbert space is infinite-dimensional, we compare two finite input ensembles: a Haar average after Fock-space truncation and a coherent-state average at fixed mean occupation $\\bar{n}$. Both diagnostics show peaks at the integer-bias points of the AQRM, where the hidden symmetry resides. In contrast, the manifest $U(1)$ symmetry at the JC point instead gives a weak dip. Thus, the time-averaged entangling power responds to both the hidden symmetry and the $U(1)$ symmetry in the Rabi family, with the sign of the response indicating how the symmetry reorganizes the spectral expansion. These results demonstrate that the entangling power can serve as an operator diagnostic to reveal the presence and properties of hidden and manifest symmetries in light-matter systems.", "url": "https://arxiv.org/abs/2607.12053", "type": "理论", "summary": "量子拉比模型是光与物质相互作用研究中的标准有效哈密顿量，捕获了量子位耦合到单个谐振子的最简单的非平凡设置。在更广泛的 Rabi 系列中，我们关注两个特殊情况：Jaynes-Cummings (JC) 模型，它具有显式 $U(1)$ 对称性，以及非对称量子 Rabi 模型 (AQRM)，它具有参数相关的“隐藏”对称性，仅在整数偏差 $\\varepsilon/\\omega\\in\\mathbb{Z}$ 下出现，并且在哈密顿量中不明显。我们使用时间平均纠缠功率由于振荡器希尔伯特空间是无限维的，我们比较两个有限输入系综：福克空间截断后的哈尔平均值和固定平均占用 $\\bar{n}$ 处的相干态平均值。这两个诊断都显示了 AQRM 的整数偏置点处的峰值，而隐藏对称性所在的位置则相反，JC 点处的明显 $U(1)$ 对称性反而较弱。浸。\n\n因此，时间平均纠缠力对拉比族中的隐藏对称性和 $U(1)$ 对称性都有响应，响应的符号表明对称性如何重组谱扩展。这些结果表明，纠缠力可以作为操作员诊断来揭示光物质系统中隐藏和明显对称性的存在和性质。", "authors": [{"name": "Ian Low"}, {"name": "Jens Koch"}, {"name": "Sahel Ashhab"}], "featured_authors": [{"name": "Ian Low"}, {"name": "Jens Koch"}, {"name": "Sahel Ashhab"}], "author_count": 3}, {"id": "2607.12100", "category": "quant-ph", "title": "Defeating Barren Plateaus with Task-Aligned Symmetry", "abstract": "Barren plateaus -- the exponential vanishing of gradients -- are a fundamental obstacle to training scalable quantum neural networks. Whether they arise in quantum recurrent neural networks (QRNNs), a natural architecture for sequential data, remains a pressing question. Here we show that the decisive ingredient for trainability in QRNNs is not the recurrent circuit topology per se, but enforcing time-translation symmetry through parameter sharing across time steps. We prove that, without parameter sharing, QRNNs suffer from barren plateaus, with gradient variance decaying exponentially with sequence length. Imposing parameter sharing across time steps fundamentally alters this scaling, transforming it into a polynomial dependence and thereby suppressing the barren plateau. Numerical simulations corroborate these analytical predictions. By rigorously showing how time-translation symmetry suppresses barren plateaus and enhances learning capability in QRNNs, our work establishes task-aligned symmetry as a constructive resolution to the expressivity-trainability tension in quantum neural networks.", "url": "https://arxiv.org/abs/2607.12100", "type": "理论+数值", "summary": "贫瘠的高原——梯度的指数消失——是训练可扩展的量子神经网络的根本障碍。它们是否出现在量子递归神经网络（QRNN）（一种顺序数据的自然架构）中仍然是一个紧迫的问题。在这里，我们证明了 QRNN 可训练性的决定性因素不是循环电路拓扑本身，而是通过跨时间步长的参数共享来强制时间平移对称性。我们证明，如果没有参数共享，QRNN 就会陷入贫瘠的高原，梯度方差随着序列长度呈指数衰减。跨时间步长施加参数共享从根本上改变了这种缩放比例，将其转变为多项式依赖性，从而抑制了贫瘠的高原。数值模拟证实了这些分析预测。通过严格展示时间平移对称性如何抑制 QRNN 中的贫瘠平台并增强学习能力，我们的工作建立了任务对齐对称性，作为解决量子神经网络中表达性-可训练性紧张的建设性解决方案。", "authors": [{"name": "Ruipeng Xing"}, {"name": "Yanan Li"}, {"name": "Zhen Shang"}, {"name": "Shengbin Wang"}, {"name": "Yongjian Gu"}, {"name": "Zhimin Wang"}], "featured_authors": [{"name": "Ruipeng Xing"}, {"name": "Yanan Li"}, {"name": "Zhen Shang"}, {"name": "Shengbin Wang"}, {"name": "Yongjian Gu"}, {"name": "Zhimin Wang"}], "author_count": 6}, {"id": "2607.12128", "category": "quant-ph", "title": "Categorical Tensor-Graph Semantics for Quantum Algorithms", "abstract": "This paper systematically investigates quantum computing protocols from the intuitive perspective of categorical tensor-graph semantics within the category FHilb. While conventional Hilbert-space formalisms conceal the structural nature of quantum algorithms behind high-dimensional matrix operations, the topological framework developed herein directly encodes algorithmic functionalities to their graphical skeletons. We provide a comprehensive topological reinterpretation of the Bernstein-Vazirani and the Simon algorithms, demonstrating how topological transformations distill their core mathematical essence and clarify the operational mechanism of oracles. Going beyond standard qubit models, we formalize the qutrit-adapted generalized Deutsch-Jozsa algorithm as well as the generalized single-shot Grover algorithm, explicitly laying out their graphical representations. We further implement CNOT gates via complementary Frobenius structures, trace the diagrammatic genesis of quantum entanglement including Bell and GHZ states, and present a diagrammatic simplification for W-state preparation protocol. By bridging tensor category theory with practical quantum algorithmic design, this work furnishes composable, scalable diagrammatic toolkit essential for automated circuit optimization across the evolving quantum hardware ecosystem.", "url": "https://arxiv.org/abs/2607.12128", "type": "理论+数值", "summary": "本文从 FHilb 类别内分类张量图语义的直观角度系统地研究了量子计算协议。虽然传统的希尔伯特空间形式主义隐藏了高维矩阵运算背后的量子算法的结构性质，但本文开发的拓扑框架直接将算法功能编码到其图形骨架。我们对 Bernstein-Vazirani 和 Simon 算法进行了全面的拓扑重新解释，展示了拓扑变换如何提炼其核心数学本质并阐明预言机的运行机制。超越标准量子位模型，我们形式化了 qutrit 适应的广义 Deutsch-Jozsa 算法以及广义单次 Grover 算法，明确地展示了它们的图形表示。我们进一步通过互补的 Frobenius 结构实现 CNOT 门，追踪包括 Bell 和 GHZ 态在内的量子纠缠的图解起源，并提出 W 态准备协议的图解简化。\n\n通过将张量范畴理论与实用的量子算法设计联系起来，这项工作提供了可组合、可扩展的图解工具包，这对于不断发展的量子硬件生态系统中的自动电路优化至关重要。", "authors": [{"name": "Naihong Hu"}, {"name": "Ruining Li"}, {"name": "Futao Wang"}], "featured_authors": [{"name": "Naihong Hu"}, {"name": "Ruining Li"}, {"name": "Futao Wang"}], "author_count": 3}, {"id": "2607.12163", "category": "quant-ph", "title": "Witnessing the Quantum Mpemba Effect with a Single Observable", "abstract": "The Mpemba effect, in which a system farther from equilibrium relaxes faster than one closer to it, defies the intuition of nonequilibrium statistical mechanics. Here, we introduce a general framework to unambiguously witness this phenomenon based on a single observable defined for Markovian open quantum systems. The Mpemba observable bypasses full state tomography, offering utility for state preparation and thermal task optimization. We illustrate our method using local magnetization as a Mpemba signature, applying it to a qubit under generalized amplitude damping.", "url": "https://arxiv.org/abs/2607.12163", "type": "理论+数值", "summary": "姆彭巴效应是指远离平衡的系统比接近平衡的系统松弛得更快，这违背了非平衡统计力学的直觉。在这里，我们引入一个通用框架，基于为马尔可夫开放量子系统定义的单个可观察量来明确见证这种现象。 Mpemba 可观测绕过全状态断层扫描，为状态准备和热任务优化提供实用程序。我们使用局部磁化强度作为 Mpemba 特征来说明我们的方法，并将其应用于广义振幅阻尼下的量子位。", "authors": [{"name": "J. M. Z. Choquehuanca"}, {"name": "P. A. C. Obando"}, {"name": "M. S. Sarandy"}, {"name": "F. M. de Paula"}], "featured_authors": [{"name": "J. M. Z. Choquehuanca"}, {"name": "P. A. C. Obando"}, {"name": "M. S. Sarandy"}, {"name": "F. M. de Paula"}], "author_count": 4}, {"id": "2607.12164", "category": "quant-ph", "title": "Axion like particles multi-parameter sensing", "abstract": "The search for the axion like particles (APLs)-one of the deepest puzzles in modern cosmology-may hold the key to understanding dark matter and dark energy. In this work, we introduce a setup taking advantage of the quantum metrology techniques to constrain the hypothetical mass and coupling constants of APLs by employing exotic pseudoscalar spin-spin interactions between fermions mediated by ALPs. A key advantage of our approach is the exploitation of position-dependent spin sensor results to the high sensitivity of the probe. To simultaneously investigate the axion mass and coupling constants, we invoke a multi-probe detection strategy. Through this strategy, we circumvent the singularity of the quantum Fisher information matrix as an ultimate upper bound on the sensitivity of any probe. For the axion masses in the range of $m_a {\\le} 10^{-3} \\text{eV}$, this setup can exclude values of axion coupling constants $g^e_pg^n_p$ down to $10^{-7}$.", "url": "https://arxiv.org/abs/2607.12164", "type": "理论", "summary": "寻找类轴子粒子（APL）——现代宇宙学中最深奥的谜题之一——可能是理解暗物质和暗能量的关键。在这项工作中，我们介绍了一种利用量子计量技术的设置，通过采用 ALP 介导的费米子之间的奇异伪标量自旋-自旋相互作用来约束 APL 的假设质量和耦合常数。我们的方法的一个关键优势是利用位置相关的自旋传感器结果来实现探针的高灵敏度。为了同时研究轴子质量和耦合常数，我们调用了多探针检测策略。通过这种策略，我们规避了量子费希尔信息矩阵的奇点作为任何探针灵敏度的最终上限。对于 $m_a {\\le} 10^{-3} \\text{eV}$ 范围内的轴子质量，此设置可以排除轴子耦合常数 $g^e_pg^n_p$ 的值，低至 $10^{-7}$。", "authors": [{"name": "Hassan Manshouri"}, {"name": "Moslem Zarei"}, {"name": "Mehdi Abdi"}], "featured_authors": [{"name": "Hassan Manshouri"}, {"name": "Moslem Zarei"}, {"name": "Mehdi Abdi"}], "author_count": 3}, {"id": "2607.12174", "category": "quant-ph", "title": "Anticipating Decoder Side-channel Attacks in Fault-tolerant Quantum Computers", "abstract": "As quantum computing emerges as an applied technology, there is a growing need to protect quantum computers against information security attacks. This work identifies a new class of side-channel attacks against fault-tolerant quantum computers, in which the syndrome data that is sent to the decoder system is used to infer which computation (logical circuit) is taking place on the quantum computer. Our work introduces the concept of gate fingerprints, which describes those patterns present in syndrome data that indicate which logical operation took place on the quantum computer. We show different effects by which logical operations produce gate fingerprints by focusing on Clifford+T computation in the surface code. We then explore how gate fingerprint information can be used to make inferences about the circuits or algorithms run on a quantum computer. Our findings indicate that decoder systems can be a vector for side-channel attacks and thus to prevent this, decoder systems should either be secured or built by a trusted party.", "url": "https://arxiv.org/abs/2607.12174", "type": "数值", "summary": "随着量子计算作为一项应用技术的出现，保护量子计算机免受信息安全攻击的需求日益增长。这项工作确定了针对容错量子计算机的新型旁道攻击，其中发送到解码器系统的校正子数据用于推断量子计算机上正在发生哪种计算（逻辑电路）。我们的工作引入了门指纹的概念，它描述了综合症数据中存在的模式，表明量子计算机上发生了哪些逻辑操作。我们通过关注表面代码中的 Clifford+T 计算来展示逻辑运算产生门指纹的不同效果。然后，我们探索如何使用门指纹信息来推断量子计算机上运行的电路或算法。我们的研究结果表明，解码器系统可能成为侧信道攻击的载体，因此为了防止这种情况，解码器系统应该受到保护或由可信方构建。", "authors": [{"name": "Shashvat Shukla"}, {"name": "Dan E. Browne"}, {"name": "Shin Nishio"}], "featured_authors": [{"name": "Shashvat Shukla"}, {"name": "Dan E. Browne"}, {"name": "Shin Nishio"}], "author_count": 3}, {"id": "2607.12190", "category": "quant-ph", "title": "Nearly optimal polynomial approximations for the quantum singular value transform", "abstract": "We introduce polynomial approximations of the even and odd step functions on the interval $[-1,1]$ with simple Chebyshev coefficients, making their numerical implementation straightforward. We derive rigorous error bounds and demonstrate that these polynomials are nearly optimal in the sense that their error deviates from the theoretically optimal error by a multiplicative factor that grows logarithmically with the polynomial order. From these polynomials, we derive related nearly optimal polynomial approximations that can be used to perform quantum phase estimation, linear amplitude amplification, eigenvalue thresholding, and other quantum algorithms using the quantum singular value transform.", "url": "https://arxiv.org/abs/2607.12190", "type": "理论+数值", "summary": "我们使用简单的切比雪夫系数引入了区间 $[-1,1]$ 上偶数和奇数阶跃函数的多项式逼近，使它们的数值实现变得简单。我们推导出严格的误差界限，并证明这些多项式几乎是最优的，因为它们的误差偏离理论上最优误差的乘法因子随多项式阶数呈对数增长。从这些多项式中，我们推导出相关的近乎最优多项式近似，可用于使用量子奇异值变换执行量子相位估计、线性幅度放大、特征值阈值处理和其他量子算法。", "authors": [{"name": "Evan Rule"}], "featured_authors": [{"name": "Evan Rule"}], "author_count": 1}, {"id": "2607.12225", "category": "quant-ph", "title": "Constant-Depth Multi-Product Formula for Trotter Error Mitigation in Near-Term Digital Quantum Simulation", "abstract": "Digital quantum simulation of many-body dynamics faces a tension between algorithmic Trotter error and physical noise that accumulates with circuit depth. Typical higher-order product formulas mitigate the algorithmic error at the cost of deeper circuits. Our benchmark shows that, within the limited physical error budget, the feasible advantage is confined to absolute errors well below the $10^{-2}$ scale, which vanishes under noise levels of current quantum hardware. In sharp contrast to the previous Trotter error mitigation methods, we introduce a constant-depth multi-product formula (cd-MPF) that suppresses the Trotter error by combining multiple circuits at fixed circuit depth. We identify an auxiliary parameter $\\alpha$, which reshapes the Trotter error terms while leaving the target evolution invariant. The classical linear combination of the measured expectation values cancels the leading $(\\Delta t)^{2}$ algorithmic contribution and steepens the Trotter-error scaling with the two-qubit circuit depth $d$ from $d^{-2}$ to $d^{-4}$. Combined with physical-noise mitigation, our method can serve as a key ingredient for realizing long-time quantum dynamics simulation on near-term hardware.", "url": "https://arxiv.org/abs/2607.12225", "type": "理论+数值", "summary": "多体动力学的数字量子模拟面临着算法 Trotter 误差和随着电路深度累积的物理噪声之间的紧张关系。典型的高阶乘积公式以更深的电路为代价来减轻算法错误。我们的基准测试表明，在有限的物理误差预算内，可行的优势仅限于远低于 10^{-2}$ 规模的绝对误差，在当前量子硬件的噪声水平下消失。与之前的 Trotter 误差缓解方法形成鲜明对比，我们引入了恒定深度多乘积公式（cd-MPF），通过在固定电路深度组合多个电路来抑制 Trotter 误差。我们确定了一个辅助参数 $\\alpha$，它重塑 Trotter 误差项，同时保持目标演化不变。测量期望值的经典线性组合消除了主要的 $(\\Delta t)^{2}$ 算法贡献，并随着两量子位电路深度 $d$ 从 $d^{-2}$ 到 $d^{-4}$ 使 Trotter 误差缩放变陡。\n\n与物理噪声抑制相结合，我们的方法可以作为在近期硬件上实现长期量子动力学模拟的关键要素。", "authors": [{"name": "Chan Bin Bark"}, {"name": "Sangjin Lee"}, {"name": "Kwang Jun Ahn"}, {"name": "Sangmo Cheon"}, {"name": "Moon Jip Park"}, {"name": "Youngseok Kim"}], "featured_authors": [{"name": "Chan Bin Bark"}, {"name": "Sangjin Lee"}, {"name": "Kwang Jun Ahn"}, {"name": "Sangmo Cheon"}, {"name": "Moon Jip Park"}, {"name": "Youngseok Kim"}], "author_count": 6}, {"id": "2607.12317", "category": "quant-ph", "title": "Demonstration of tripartite cat states in two distinct classes of entanglement", "abstract": "Entanglement is a cornerstone of quantum mechanics and an essential resource for quantum computation, communication, and metrology. While bipartite entanglement is extensively studied, genuine multipartite entangled states remain largely inaccessible in the macroscopic continuous-variable domain. Here, we experimentally realize macroscopic tripartite entangled cat states of the two distinct classes with fundamentally inequivalent properties, namely GHZ-cat and W-cat states, encoded across three microwave resonators coupled to an ancillary superconducting transmon. We develop one-to-all conditional controls on the three oscillators by fully utilizing three energy levels of the transmon to generate these states in a single piece of hardware and employ an efficient subspace tomography protocol for state reconstruction. We obtain GHZ-cat and W-cat states with fidelities $0.83\\pm0.02$ and $0.70\\pm0.02$, respectively, certifying genuine multipartite entanglement among the three oscillators. We further validate the distinct entanglement classes by experimentally demonstrating that pairwise entanglement is present in the W-cat state but absent in the GHZ-cat state. Our technique for the on-demand generation and characterization of inequivalent classes of tripartite continuous-variable entanglement provides a valuable testbed for future studies of macroscopic many-body entanglement and fault-tolerant quantum information processing with multipartite bosonic codes.", "url": "https://arxiv.org/abs/2607.12317", "type": "实验", "summary": "纠缠是量子力学的基石，也是量子计算、通信和计量学的重要资源。虽然二分纠缠被广泛研究，但真正的多分纠缠态在宏观连续变量域中仍然很大程度上难以接近。在这里，我们通过实验实现了具有基本不等价性质的两个不同类别的宏观三方纠缠猫态，即 GHZ-cat 和 W-cat 态，通过与辅助超导传输器耦合的三个微波谐振器进行编码。我们通过充分利用 transmon 的三个能级在单个硬件中生成这些状态，并采用高效的子空间断层扫描协议进行状态重建，对三个振荡器开发一对多的条件控制。我们获得保真度分别为 $0.83\\pm0.02$ 和 $0.70\\pm0.02$ 的 GHZ-cat 和 W-cat 状态，证明了三个振荡器之间真正的多部分纠缠。我们通过实验证明 W-cat 状态中存在成对纠缠，但 GHZ-cat 状态中不存在成对纠缠，进一步验证了不同的纠缠类别。\n\n我们用于按需生成和表征不等价类三方连续变量纠缠的技术为宏观多体纠缠和多部分玻色码的容错量子信息处理的未来研究提供了有价值的测试平台。", "authors": [{"name": "May Chee Loke"}, {"name": "Jonathan Schwinger"}, {"name": "Kehui Yu"}, {"name": "Yingshan Zhang"}, {"name": "Amon M. Kasper"}, {"name": "Tanjung Krisnanda"}, {"name": "Yvonne Y. Gao"}], "featured_authors": [{"name": "May Chee Loke"}, {"name": "Jonathan Schwinger"}, {"name": "Kehui Yu"}, {"name": "Amon M. Kasper"}, {"name": "Tanjung Krisnanda"}, {"name": "Yvonne Y. Gao"}], "author_count": 7}, {"id": "2607.12344", "category": "quant-ph", "title": "Parallel Hadamard Test", "abstract": "The Hadamard test is a fundamental building block widely used in many quantum computing algorithms. It estimates the real or imaginary part of $\\langle \\psi \\vert U \\vert \\psi \\rangle$, where $\\vert \\psi \\rangle$ is a quantum state and $U$ is a unitary operator. In many algorithms, however, many such quantities must be estimated, leading to a large number of distinct circuit types, long computational times, and high financial costs. In this work, we propose the parallel Hadamard test, which combines multiple Hadamard tests into a single circuit type. We demonstrate how the parallel Hadamard test applies to three structural classes of workloads: arbitrary sets of unitary operators, prefix-product arrays, and Gram-matrix elements. For each class, we compare the cost of the parallel Hadamard test with that of the conventional one. Our unified approach significantly reduces the number of distinct circuit types, and can lower both computational time and financial costs in regimes where fixed per-circuit overheads dominate the total cost. In Gram-matrix workloads, it can also reduce the total number of shots when typical off-diagonal overlaps are small.", "url": "https://arxiv.org/abs/2607.12344", "type": "理论+数值", "summary": "Hadamard 测试是许多量子计算算法中广泛使用的基本构建块。它估计 $\\langle \\psi \\vert U \\vert \\psi \\rangle$ 的实部或虚部，其中 $\\vert \\psi \\rangle$ 是量子态，$U$ 是酉算子。然而，在许多算法中，必须估计许多此类数量，从而导致大量不同的电路类型、较长的计算时间和较高的财务成本。在这项工作中，我们提出了并行哈达玛测试，它将多个哈达玛测试组合成单个电路类型。我们演示了并行 Hadamard 测试如何应用于三种结构类型的工作负载：任意的酉运算符集、前缀乘积数组和 Gram 矩阵元素。对于每一类，我们将并行 Hadamard 测试的成本与传统测试的成本进行比较。我们的统一方法显着减少了不同电路类型的数量，并且可以在固定的每电路开销占总成本的情况下降低计算时间和财务成本。在 Gram 矩阵工作负载中，当典型的非对角线重叠很小时，它还可以减少镜头总数。", "authors": [{"name": "Soichiro Imamura"}, {"name": "Synge Todo"}], "featured_authors": [{"name": "Soichiro Imamura"}, {"name": "Synge Todo"}], "author_count": 2}, {"id": "2607.12470", "category": "quant-ph", "title": "Sparse anisotropic positive maps for qutrit entanglement: exact indecomposability and PPT geometry", "abstract": "Positive but not completely positive maps provide one of the most direct ways to detect entanglement beyond the positive-partial-transpose (PPT) criterion. We introduce and analyze an exactly solvable two-parameter family of sparse bistochastic positive maps on qutrits, in which two coherence channels are independently tuned by parameters $w$ and $z$. The sparse structure makes the full phase diagram analytic: positivity holds exactly on the square $0\\le w,z\\le2/3$, complete positivity on the smaller square $0\\le w,z\\le1/3$, and decomposability is lost precisely outside a quarter circle in the corner $w,z\\ge1/3$. The indecomposable region is certified by explicit PPT entangled state adapted to the same witness geometry. At the endpoint $W_*=W(2/3,2/3)$ we construct a four-parameter family of PPT edge states of rank type $(5,5)$, derive their analytic detection region, and show that the corresponding rays are exposed faces of the PPT cone. Finally, although $W_*$ is not optimal, we give an explicit optimal refinement whose detection region on this family is strictly larger. The result is an analytically tractable qutrit setting in which positivity, indecomposability, PPT entanglement, optimality, and exposed convex geometry can be studied in a single framework.", "url": "https://arxiv.org/abs/2607.12470", "type": "理论+数值", "summary": "正图但不完全正图提供了超越正部分转置（PPT）标准的最直接的纠缠检测方法之一。我们引入并分析了 qutrit 上稀疏双随机正映射的精确可解双参数族，其中两个相干通道由参数 $w$ 和 $z$ 独立调整。稀疏结构使得完整的相图可解析：正性恰好在正方形 $0\\le w,z\\le2/3$ 上成立，在较小的正方形 $0\\le w,z\\le1/3$ 上完全正性，并且可分解性在角 $w,z\\ge1/3$ 的四分之一圆之外精确地丧失。不可分解区域通过适应相同见证几何结构的显式 PPT 纠缠态进行了认证。在端点 $W_*=W(2/3,2/3)$ 处，我们构建了等级类型 $(5,5)$ 的 PPT 边缘状态的四参数族，推导出它们的解析检测区域，并显示相应的光线是 PPT 锥体的暴露面。最后，虽然 $W_*$ 不是最优的，但我们给出了一个明确的最优细化，其在该族上的检测区域严格更大。\n\n结果是一个分析上易于处理的 qutrit 设置，其中可以在单个框架中研究积极性、不可分解性、PPT 纠缠、最优性和暴露的凸几何。", "authors": [{"name": "Massimiliano F. Sacchi"}], "featured_authors": [{"name": "Massimiliano F. Sacchi"}], "author_count": 1}, {"id": "2607.12559", "category": "quant-ph", "title": "The Infinitesimal Structure of Quantum Information", "abstract": "This paper establishes a rigorous, unified geometric framework for quantum state spaces by constructing smooth, regular embeddings into higher-order dual number algebras $\\mathcal{Q}_N \\equiv \\mathbb{R}[\\varepsilon]/(\\varepsilon^{N^2-1})$, wherein every quantum state is faithfully represented as a non-reduced scheme-theoretic point. We show that under this unified family of truncated rings, the non-linear matrix commutators governing the Liouville-von Neumann dynamics map globally onto flat, linear, and rigid algebraic flows, establishing nilpotent dual algebras as a pristine geometric landscape for higher-dimensional quantum kinematics.", "url": "https://arxiv.org/abs/2607.12559", "type": "理论", "summary": "本文通过构造光滑、规则的嵌入到高阶对偶数代数 $\\mathcal{Q}_N \\equiv \\mathbb{R}[\\varepsilon]/(\\varepsilon^{N^2-1})$ 中，为量子态空间建立了严格、统一的几何框架，其中每个量子态都忠实地表示为非约简方案理论点。我们证明，在这个统一的截环族下，控制刘维尔-冯·诺依曼动力学的非线性矩阵换向器全局映射到平坦、线性和刚性代数流上，建立了幂零对偶代数作为高维量子运动学的原始几何景观。", "authors": [{"name": "Luca Barbieri-Viale"}], "featured_authors": [{"name": "Luca Barbieri-Viale"}], "author_count": 1}, {"id": "2607.12560", "category": "quant-ph", "title": "The Quantum Polariton Hamiltonian that Reproduces the Same High-Harmonic Generation Spectra as the Classical Hamiltonian in Strong Laser Fields", "abstract": "This manuscript investigates the possibility of defining a quantum Hamiltonian that leads to the same high-harmonic generation (HHG) spectra as those predicted by Floquet theory in the regime where the number of infrared (IR) pump photons is much larger than the number of emitted UV photons. The key assumption underlying our derivation is that the intensity of the emitted high harmonics is many orders of magnitude smaller than that of the IR laser, and that the emission of the Nnt harmonic results from the absorption of N IR photons.", "url": "https://arxiv.org/abs/2607.12560", "type": "理论", "summary": "本手稿研究了定义量子哈密顿量的可能性，该量子哈密顿量导致与 Floquet 理论预测的相同的高次谐波产生 (HHG) 光谱，其中红外 (IR) 泵浦光子的数量远大于发射的紫外光子的数量。我们推导的关键假设是发射的高次谐波的强度比红外激光小许多数量级，并且 Nnt 谐波的发射是由于吸收 N 个红外光子而产生的。", "authors": [{"name": "Nimrod Moiseyev"}], "featured_authors": [{"name": "Nimrod Moiseyev"}], "author_count": 1}, {"id": "2607.12603", "category": "quant-ph", "title": "Constructing mode-resolved quantum optical models for emitters in photonic crystals", "abstract": "Recent advances are enabling quantum emitters to interact with photonic crystals, whose electromagnetic modes exhibit complex dispersion relations, spatial mode structure, and polarization textures. However, modeling light-matter behavior in these systems faces a persistent trade-off: electromagnetic approaches based on Maxwell-equation solvers provide realistic vectorial descriptions but are difficult to integrate with quantum many-body and non-perturbative methods, whereas simplified quantum-optical lattice models are tractable but typically rely on scalar and spatially independent light-matter couplings that miss essential features of these structured photonic environments. Here, we introduce a constructive framework to derive quantum-optical lattice descriptions that overcome this trade-off. Combining symmetry-constrained tight-binding constructions with numerically computed photonic band structures and field profiles, our method yields minimal, symmetry-enforced lattice Hamiltonians that reproduce the target photonic dispersion while retaining the mode-resolved (position- and polarization-dependent) structure of the light-matter coupling. We show that these models recover Green's-function-based emitter dynamics in the perturbative regime, while providing access to non-perturbative quantum dynamical simulations beyond emitter-only descriptions. As a proof of principle, we apply the framework to a two-dimensional photonic crystal and show that it captures polarization-dependent directional emission inaccessible to scalar models, while enabling the analysis of non-Markovian light-matter dynamics and entanglement. Our results provide a practical bridge between classical electromagnetic simulation tools and quantum-optical many-body and non-Markovian modeling in photonic crystal settings.", "url": "https://arxiv.org/abs/2607.12603", "type": "理论+数值", "summary": "最近的进展使量子发射器能够与光子晶体相互作用，光子晶体的电磁模式表现出复杂的色散关系、空间模式结构和偏振纹理。然而，在这些系统中建模光物质行为面临着持续的权衡：基于麦克斯韦方程求解器的电磁方法提供了真实的矢量描述，但很难与量子多体和非微扰方法集成，而简化的量子光学晶格模型很容易处理，但通常依赖于标量和空间独立的光物质耦合，而忽略了这些结构化光子环境的基本特征。在这里，我们引入了一个构造性框架来导出克服这种权衡的量子光学晶格描述。将对称约束的紧束缚结构与数值计算的光子能带结构和场分布相结合，我们的方法产生了最小的、对称强制的晶格哈密顿量，它再现了目标光子色散，同时保留了光-物质耦合的模式解析（位置和偏振相关）结构。\n\n我们表明，这些模型在微扰状态下恢复了基于格林函数的发射极动力学，同时提供了超越仅发射极描述的非微扰量子动力学模拟。作为原理证明，我们将该框架应用于二维光子晶体，并表明它捕获了标量模型无法访问的偏振相关定向发射，同时能够分析非马尔可夫光物质动力学和纠缠。我们的结果在经典电磁仿真工具与光子晶体设置中的量子光学多体和非马尔可夫建模之间提供了一座实用的桥梁。", "authors": [{"name": "Antonio Morales-Pérez"}, {"name": "Iñaki García-Elcano"}, {"name": "Chiara Devescovi"}, {"name": "Maia G. Vergniory"}, {"name": "Aitzol García-Etxarri"}, {"name": "Alejandro González-Tudela"}], "featured_authors": [{"name": "Antonio Morales-Pérez"}, {"name": "Iñaki García-Elcano"}, {"name": "Chiara Devescovi"}, {"name": "Maia G. Vergniory"}, {"name": "Aitzol García-Etxarri"}, {"name": "Alejandro González-Tudela"}], "author_count": 6}, {"id": "2607.12710", "category": "quant-ph", "title": "Thermally Activated Long-Range Entanglement from Non-Abelian Conservation Laws", "abstract": "Thermal noise ordinarily suppresses quantum entanglement. We show that a strong non-Abelian conservation law can convert local thermal fluctuations into an unbounded operational resource. For a broad class of finite-range $SU(2)$-invariant spin chains restricted to the global-singlet sector, an explicit representation-space protocol yields $Y_N=\\frac12\\log_2 N+O_\\beta(1)$, and hence $E_{\\mathrm{D}}\\geq Y_N$, throughout a finite high-temperature interval. Local thermal fluctuations produce subsystem spins $j\\sim\\sqrt N$, whose globally locked irreducible representations contain $\\log_2(2j+1)\\sim\\frac12\\log_2N$ ebits. An exactly solv
