parametric gate families, its application has been practically restricted to quasi-static noise. To address the spectrally complex, time-varying noise prevalent in reality, we propose filter function-enhanced QCRL (FF-QCRL), which integrates filter function formalism into the QCRL framework. The resulting FF-QCRL algorithm minimizes a generalized robustness metric that faithfully encodes the impact of stochastic processes, enabling robust pulse-family generation for parametric gates under realistic time-varying noise. Numerical validation in a representative single-qubit setting confirms the effectiveness of the proposed method.", "url": "https://arxiv.org/abs/2603.24345", "type": "数值", "summary": "嘈杂的中尺度量子（NISQ）时代量子处理器的性能受到环境噪声和其他不确定性的严重制约。虽然最近提出的量子控制鲁棒性景观（QCRL）提供了一个强大的框架，用于为参数门系列生成鲁棒控制脉冲，但其应用实际上仅限于准静态噪声。为了解决现实中普遍存在的频谱复杂、时变噪声，我们提出了滤波器函数增强型 QCRL (FF-QCRL)，它将滤波器函数形式集成到 QCRL 框架中。由此产生的 FF-QCRL 算法最大限度地减少了广义鲁棒性度量，该度量忠实地编码了随机过程的影响，从而能够在真实的时变噪声下为参数门生成鲁棒的脉冲族。代表性单量子位设置中的数值验证证实了所提出方法的有效性。", "authors": [{"name": "Yang He"}, {"name": "Zigui Zhang"}, {"name": "Zibo Miao"}], "featured_authors": [{"name": "Yang He"}, {"name": "Zigui Zhang"}, {"name": "Zibo Miao"}], "author_count": 3}, {"id": "2603.24346", "category": "quant-ph", "title": "Parametrized Version of the Generalized Aubry-André Model", "abstract": "A recently introduced recurrence-relation ansatz applied to the Bose-Hubbard model is here used in the generalized Aubry-Andre model. The resulting modified Aubry-Andre model allows for a simple parametrization of the solutions in terms of three parameters, viz., the system energy when the quasiperiodicity amplitude Delta = 0, the site mu where the particle is initially localized, and the tuning parameter -1 < alpha < 1 that determines the regions of localized or extended states. The standard Aubry-Andre form corresponds to alpha = 0.", "url": "https://arxiv.org/abs/2603.24346", "type": "理论", "summary": "最近引入的应用于 Bose-Hubbard 模型的递归关系 ansatz 在这里用于广义 Aubry-Andre 模型。由此产生的修改后的 Aubry-Andre 模型允许根据三个参数对解进行简单的参数化，即准周期振幅 Delta = 0 时的系统能量、粒子初始局域化的位置 mu 以及确定局域态或扩展态区域的调整参数 -1 < alpha < 1。标准 Aubry-Andre 形式对应于 alpha = 0。", "authors": [{"name": "Moorad Alexanian"}], "featured_authors": [{"name": "Moorad Alexanian"}], "author_count": 1}, {"id": "2603.24441", "category": "quant-ph", "title": "Benchmarking Techniques for Decoded Quantum Interferometry", "abstract": "We develop a new benchmarking scheme for the Decoded Quantum Interferometry (DQI) algorithm quantifying the number of quantum gates required to obtain an optimal solution to a problem amenable to DQI. We apply the benchmarking scheme to the Binary Paint Shop Problem (BPSP) in order to benchmark the performance of DQI against a state of the art classical solver. To do so, we provide an explicit construction of a quantum circuit implementation of a greedy decoder for low-density parity check codes arising from max-2-XORSAT problems.", "url": "https://arxiv.org/abs/2603.24441", "type": "数值", "summary": "我们为解码量子干涉测量 (DQI) 算法开发了一种新的基准测试方案，该方案量化了获得适合 DQI 的问题的最佳解决方案所需的量子门数量。我们将基准测试方案应用于二进制喷漆车间问题 (BPSP)，以便根据最先进的经典求解器对 DQI 的性能进行基准测试。为此，我们为 max-2-XORSAT 问题产生的低密度奇偶校验码提供了贪婪解码器的量子电路实现的显式构造。", "authors": [{"name": "Leon Bollmann"}, {"name": "Maximilian Hess"}], "featured_authors": [{"name": "Leon Bollmann"}, {"name": "Maximilian Hess"}], "author_count": 2}, {"id": "2603.24444", "category": "quant-ph", "title": "Quantum walk with a local spin interaction", "abstract": "We introduce a model of quantum walkers interacting with a magnetic impurity localized at the origin. First, we study a model of a single quantum walker interacting with a localized magnetic impurity. For a simple case of parameter values, we analytically obtain the eigenvalues and the eigenvectors of bound states, in which the quantum walker is bound to the magnetic impurity. Second, we study a model with two quantum walkers and one magnetic impurity, in which the two quantum walkers indirectly interact with each other via the magnetic impurity, as in the Kondo model. We numerically simulate the collision dynamics when the spin-spin interaction at the origin is of the XX type and the SU(2) Heisenberg type. In the case of the XX interaction, we calculate the entanglement negativity to quantify how much the two quantum walkers are entangled with each other, and find that the negativity increases drastically upon the collision of the two walkers. We compare the time dependence for different statistics, namely, fermionic, bosonic, and distinguishable walkers. In the case of the SU(2) interaction, we simulate the dynamics starting from the initial state in which one fermionic walker is in a bound eigenstate around the origin and the other fermionic walker is a delta function colliding with the first walker. We find that a bound eigenstate closest to the singlet state of the first walker and the magnetic impurity is least perturbed by the collision of the second walker. We speculate that this is a manifestation of Kondo physics at the lowest level of the real-space renormalization-group procedure.", "url": "https://arxiv.org/abs/2603.24444", "type": "理论+数值", "summary": "我们引入了一个量子行走者与位于原点的磁性杂质相互作用的模型。首先，我们研究单个量子步行者与局部磁性杂质相互作用的模型。对于参数值的简单情况，我们分析获得了束缚态的特征值和特征向量，其中量子行走者与磁性杂质束缚。其次，我们研究了一个具有两个量子步行者和一种磁性杂质的模型，其中两个量子步行者通过磁性杂质间接相互作用，就像近藤模型一样。我们数值模拟了原点处的自旋-自旋相互作用为XX型和SU(2)海森堡型时的碰撞动力学。在 XX 相互作用的情况下，我们计算了纠缠负性来量化两个量子步行者彼此纠缠的程度，并发现负性在两个步行者碰撞时急剧增加。我们比较不同统计量（即费米子、玻色子和可区分步行者）的时间依赖性。\n\n在 SU(2) 相互作用的情况下，我们从初始状态开始模拟动力学，其中一个费米子步行者处于原点周围的束缚本征态，另一个费米子步行者是与第一个步行者碰撞的 delta 函数。我们发现最接近第一个步行者的单重态的束缚本征态和磁性杂质受第二个步行者碰撞的干扰最小。我们推测这是近藤物理学在实空间重整化群过程最低层的表现。", "authors": [{"name": "Manami Yamagishi"}, {"name": "Naomichi Hatano"}, {"name": "Kohei Kawabata"}, {"name": "Chusei Kiumi"}, {"name": "Akinori Nishino"}, {"name": "Franco Nori"}, {"name": "Hideaki Obuse"}], "featured_authors": [{"name": "Manami Yamagishi"}, {"name": "Naomichi Hatano"}, {"name": "Kohei Kawabata"}, {"name": "Akinori Nishino"}, {"name": "Franco Nori"}, {"name": "Hideaki Obuse"}], "author_count": 7}, {"id": "2603.24467", "category": "quant-ph", "title": "Current Density Formulation of Nuclear Magnetic Shielding and Magnetizability Tensors in Paramagnetic Molecules in the Presence of Relativistic Effects", "abstract": "This work presents the computation of nuclear magnetic shielding and magnetizability tensors for paramagnetic molecules, using a magnetically induced current density framework to account for orbital and spin contributions. We demonstrate that the methodology proposed by Soncini[1] is physically equivalent to the formalisms of Pennanen and Vaara[2] and Franzke et al.[3], provided that scalar and spin-orbit relativistic effects are included within the ground-state spin density. In our model, these corrections are implemented through a Zeroth-Order Regular Approximation (ZORA) formulation of the current density. The resulting magnetizability tensor is fully consistent with the general Van Vleck formulation, recovering the temperature-dependent Curie contribution through the explicit integration of the magnetically induced spin current density. This methodology offers a straightforward computational route that bypasses the complex evaluation of g-tensors and Zero-Field Splitting (ZFS) Hamiltonians, requiring only a ground-state spin density incorporating relativistic effects. Notably, scalar relativistic effects are shown to be essential for capturing the Heavy-Atom Light-Atom (HALA) effect in 1H and 13C shieldings. To maintain efficiency, relativistic effects on the orbital contribution are neglected as they are negligible for light atoms. This approach represents an optimal compromise for paramagnetic complexes involving transition metals up to the second row, where the HALA effect is primarily driven by scalar relativistic corrections within the ground-state spin density. Neglecting spin-orbit terms in the orbital contribution significantly streamlines the calculation without loss of accuracy, providing the pNMR community with a robust tool for characterizing open-shell systems.", "url": "https://arxiv.org/abs/2603.24467", "type": "理论+数值", "summary": "这项工作提出了顺磁分子的核磁屏蔽和磁化张量的计算，使用磁感应电流密度框架来解释轨道和自旋的贡献。我们证明，Soncini [1] 提出的方法在物理上等同于 Pennanen 和 Vaara [2] 以及 Franzke 等人 [3] 的形式，只要标量和自旋轨道相对论效应包含在基态自旋密度内。在我们的模型中，这些校正是通过电流密度的零阶正则近似 (ZORA) 公式来实现的。所得的磁化率张量与一般 Van Vleck 公式完全一致，通过磁感应自旋电流密度的显式积分恢复与温度相关的居里贡献。这种方法提供了一种简单的计算路线，绕过了 g 张量和零场分裂 (ZFS) 哈密顿量的复杂评估，仅需要包含相对论效应的基态自旋密度。\n\n值得注意的是，标量相对论效应对于捕获 1H 和 13C 屏蔽中的重原子轻原子 (HALA) 效应至关重要。为了保持效率，忽略对轨道贡献的相对论效应，因为它们对于轻原子来说可以忽略不计。这种方法代表了涉及第二行过渡金属的顺磁配合物的最佳折衷方案，其中 HALA 效应主要由基态自旋密度内的标量相对论校正驱动。忽略轨道贡献中的自旋轨道项可显着简化计算，而不会损失准确性，从而为 pNMR 社区提供了用于表征开壳系统的强大工具。", "authors": [{"name": "Francesco Ferdinando Summa"}, {"name": "Sonia Coriani"}, {"name": "Andre Severo Pereira Gomes"}], "featured_authors": [{"name": "Francesco Ferdinando Summa"}, {"name": "Sonia Coriani"}, {"name": "Andre Severo Pereira Gomes"}], "author_count": 3}, {"id": "2603.24557", "category": "quant-ph", "title": "Geometric Curvature Governs Work in Open Quantum Steady States", "abstract": "Classical thermodynamics admits a geometric formulation in which work is associated with areas enclosed by cycles in state space. Whether an analogous structure persists in driven, dissipative quantum systems remains an open question. Here we show that quasistatic work in open quantum steady states is governed by an emergent geometric curvature in control-parameter space arising from steady-state coherence. For a driven dissipative two-level system, we construct a work one-form whose curvature determines the work produced in cyclic processes. The work vanishes under strong dephasing, identifying coherence as a necessary condition for nontrivial geometry. However, its magnitude is set not by the coherence itself but by the spatial structure of the curvature: cycles enclosing comparable areas produce different work depending on their location in parameter space. Reversing the cycle orientation reverses the sign of the work, confirming its geometric origin. These results establish a geometric framework for open quantum thermodynamics and identify curvature as the organizing principle of thermodynamic response, with direct implications for driven light--matter systems in cavity quantum electrodynamics.", "url": "https://arxiv.org/abs/2603.24557", "type": "理论", "summary": "经典热力学承认一种几何公式，其中功与状态空间中的循环所包围的区域相关。类似的结构是否持续存在于受驱动的耗散量子系统中仍然是一个悬而未决的问题。在这里，我们证明了开放量子稳态中的准静态工作受到稳态相干性引起的控制参数空间中出现的几何曲率的控制。对于驱动耗散两能级系统，我们构造了一种功单形式，其曲率决定了循环过程中产生的功。这项工作在强烈的相移作用下消失了，将相干性视为非平凡几何的必要条件。然而，它的大小不是由相干性本身决定的，而是由曲率的空间结构决定的：包围可比区域的循环根据它们在参数空间中的位置产生不同的功。反转循环方向会反转作品的符号，从而确认其几何原点。\n\n这些结果为开放量子热力学建立了一个几何框架，并将曲率确定为热力学响应的组织原理，对腔量子电动力学中的驱动光物质系统具有直接影响。", "authors": [{"name": "Eric R. Bittner"}], "featured_authors": [{"name": "Eric R. Bittner"}], "author_count": 1}, {"id": "2603.24573", "category": "quant-ph", "title": "Flagging the Clifford hierarchy:~Fault-tolerant logical $\\fracπ{2^l}$ rotations via measuring circuit gauge operators of non-Cliffords", "abstract": "We provide a recursively defined sequence of flag circuits which will detect logical errors induced by non-fault-tolerant $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ gates on CSS codes with a fault distance of two. As applications, we give a family of circuits with $O(l)$ gates and ancillae which implement fault-tolerant logical $R_{Z}(\\frac{\\pi}{2^l})$ or $R_{ZZ}(\\frac{\\pi}{2^l})$ gates on any $[[k + 2, k, 2]]$ iceberg code and fault-tolerant circuits of size $O(l)$ for preparing $|\\frac{\\pi}{2^l}\\rangle$ resource states in the $[[7,1,3]]$ code, which can be used to perform fault-tolerant $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ rotations via gate teleportation, allowing for implementations of these gates that bypass the high overheads of gate synthesis when $l$ is small relative to the precision required. We show how the circuits above can be generalized to $\\pi( x_0.x_{1}x_{2}\\ldots x_{l}) = \\sum_{j}^{l} \\pi \\frac{x_j}{2^j}$ rotations with identical overheads in $l$, which could be useful in quantum simulations where time is digitized in binary. Finally, we illustrate two approaches to increase the fault-distance of our construction. We show how to increase the fault distance of a Cliffordized version of the T gate circuit to $3$ in the Steane code and how to increase the fault-distance of the $\\frac{\\pi}{2}$ iceberg circuit to $4$ through concatenation in two-level iceberg codes. This yields a targeted logical $R_{\\overline{Z}}(\\frac{\\pi}{2})$ gate with fault distance $4$ on any row of logical qubits in an $[[(k_2+2)(k_1+2), k_1k_2, 4]]$ code.", "url": "https://arxiv.org/abs/2603.24573", "type": "理论+数值", "summary": "我们提供了一个递归定义的标志电路序列，它将检测故障距离为 2 的 CSS 代码上由非容错 $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ 门引起的逻辑错误。作为应用，我们给出了一系列具有 $O(l)$ 门和辅助电路，它们在任何 $[[k + 2, k, 2]]$ 冰山代码上实现容错逻辑 $R_{Z}(\\frac{\\pi}{2^l})$ 或 $R_{ZZ}(\\frac{\\pi}{2^l})$ 门，以及大小为 $O(l)$ 的容错电路，以供准备$|\\frac{\\pi}{2^l}\\rangle$ 资源状态位于 $[[7,1,3]]$ 代码中，可用于通过门隐形传态执行容错 $R_{\\overline{Z}}(\\frac{\\pi}{2^l})$ 旋转，从而允许在 $l$ 相对于所需精度较小时绕过门合成的高开销来实现这些门。我们展示了如何将上述电路推广到 $\\pi( x_0.x_{1}x_{2}\\ldots x_{l}) = \\sum_{j}^{l} \\pi \\frac{x_j}{2^j}$ 旋转，并且 $l$ 中的开销相同，这在时间以二进制数字化的量子模拟中非常有用。最后，我们说明了两种增加构造故障距离的方法。\n\n我们展示了如何在 Steane 代码中将 T 门电路的 Cliffordized 版本的故障距离增加到 $3$，以及如何通过两级冰山代码的串联将 $\\frac{\\pi}{2}$ 冰山电路的故障距离增加到 $4$。这会在 $[[(k_2+2)(k_1+2), k_1k_2, 4]]$ 代码中的任何逻辑量子位行上生成一个目标逻辑 $R_{\\overline{Z}}(\\frac{\\pi}{2})$ 门，故障距离为 $4$。", "authors": [{"name": "Shival Dasu"}, {"name": "Ben Criger"}], "featured_authors": [{"name": "Shival Dasu"}, {"name": "Ben Criger"}], "author_count": 2}, {"id": "2603.24588", "category": "quant-ph", "title": "Finite-Degree Quantum LDPC Codes Reaching the Gilbert-Varshamov Bound", "abstract": "We construct nested Calderbank-Shor-Steane code pairs with non-vanishing coding rate from Hsu-Anastasopoulos codes and MacKay-Neal codes. In the fixed-degree regime, we prove relative linear distance with high probability. Moreover, for several finite degree settings, we prove Gilbert-Varshamov distance by a rigorous computer-assisted proof.", "url": "https://arxiv.org/abs/2603.24588", "type": "理论", "summary": "我们从 Hsu-Anastasopoulos 码和 MacKay-Neal 码构建具有非零编码率的嵌套 Calderbank-Shor-Steane 码对。在固定度制度下，我们以高概率证明相对线性距离。此外，对于几个有限度设置，我们通过严格的计算机辅助证明证明了 Gilbert-Varshamov 距离。", "authors": [{"name": "Kenta Kasai"}], "featured_authors": [{"name": "Kenta Kasai"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
