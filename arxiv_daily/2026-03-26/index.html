3.24544", "category": "cond-mat", "title": "Capturing thermal effects beyond the zero-temperature approximation using the uniform electron gas", "abstract": "Density functional theory at finite temperatures often relies on the zero-temperature approximation, which uses a ground-state exchange-correlation functional with thermalized densities. This approach, however, neglects the explicit temperature dependence of the exchange-correlation free energy -- a key factor in regimes such as warm dense matter, where both electronic and thermal effects are significant. In this work, we introduce the entropy-corrected zero-temperature approach, in which the exchange-correlation entropy is extracted using the generalized thermal adiabatic connection formula to construct a thermal correction to the standard zero-temperature approximation. Using a uniform electron gas parametrization, we compare this approach to the finite-temperature adiabatic connection and demonstrate that it performs best at lower densities. This provides a useful complement to zero-temperature density functional approximations, which generally perform better at moderate-to-large densities. We further identify a density-dependent intersection between the adiabatic connection curves, revealing a dependence on the ground state correlation energy and correlation potential. Additionally, extension of the entropy corrected approach applied as a local density approximation--like temperature correction to the zero temperature approximation is discussed.", "url": "https://arxiv.org/abs/2603.24544", "type": "理论+数值", "summary": "有限温度下的密度泛函理论通常依赖于零温度近似，该近似使用具有热化密度的基态交换相关函数。然而，这种方法忽略了交换相关自由能对温度的明确依赖性——这是诸如热致密物质等状态的关键因素，其中电子效应和热效应都很重要。在这项工作中，我们引入了熵校正零温方法，其中使用广义热绝热连接公式提取交换相关熵，以构造对标准零温近似的热校正。使用均匀电子气参数化，我们将这种方法与有限温度绝热连接进行比较，并证明它在较低密度下表现最佳。这为零温度密度泛函近似提供了有用的补充，零温度密度泛函近似通常在中等到大密度下表现更好。我们进一步确定了绝热连接曲线之间的密度相关交点，揭示了对基态相关能和相关势的依赖性。\n\n此外，讨论了应用于局部密度近似的熵校正方法的扩展——类似于零温度近似的温度校正。", "authors": [{"name": "Brianna Aguilar-Solis"}, {"name": "Brittany P. Harding"}, {"name": "Aurora Pribram-Jones"}], "featured_authors": [{"name": "Brianna Aguilar-Solis"}, {"name": "Brittany P. Harding"}, {"name": "Aurora Pribram-Jones"}], "author_count": 3}, {"id": "2603.24551", "category": "cond-mat", "title": "Interlayer Coupling and Floquet-Driven Topological Phases in Bilayer Haldane Lattices", "abstract": "We investigate Floquet-driven topological phase transitions in an AB-stacked bilayer Haldane lattice with tunable intralayer hopping anisotropy. By combining interlayer hybridization, Haldane flux, and off-resonant circularly polarized light, we obtain controlled transitions among Dirac, semi-Dirac, and higher-Chern insulating phases. As the hopping anisotropy increases, the two inequivalent Dirac points move toward each other and merge at the Brillouin-zone $\\mathbf{M}$ point, where a semi-Dirac dispersion emerges with linear and quadratic momentum dependence along orthogonal directions. In this regime, competition between the intrinsic Haldane mass and the Floquet-induced mass drives a sequence of sharp topological transitions with Chern numbers $C=0,\\pm1,\\pm2$. We further show that interlayer coupling qualitatively reshapes the Floquet band topology by inducing helicity-dependent and valley-selective band inversions at the K and K$'$ points, thereby stabilizing higher-Chern phases in the valence bands. These changes are accompanied by redistribution of the Berry curvature, bulk gap closings, and the collapse or sign reversal of quantized anomalous Hall plateaus. As the system approaches the semi-Dirac limit, the topological phase space narrows and disappears at the critical merger point, beyond which the system becomes topologically trivial even when it remains gapped. Overall, the bilayer geometry broadens the scope of Floquet topological control by enabling dynamically tunable higher-Chern phases and valley-dependent Hall responses governed by interlayer coupling and light helicity.", "url": "https://arxiv.org/abs/2603.24551", "type": "理论", "summary": "我们研究了具有可调层内跳跃各向异性的 AB 堆叠双层 Haldane 晶格中 Floquet 驱动的拓扑相变。通过结合层间杂化、霍尔丹通量和非共振圆偏振光，我们获得了狄拉克、半狄拉克和高陈绝缘相之间的受控跃迁。随着跳跃各向异性的增加，两个不等的狄拉克点彼此靠近并在布里渊区 $\\mathbf{M}$ 点处合并，其中出现沿正交方向具有线性和二次动量依赖性的半狄拉克色散。在这种情况下，固有霍尔丹质量和弗洛奎特诱导质量之间的竞争驱动了一系列尖锐的拓扑转变，陈数为 $C=0,\\pm1,\\pm2$。我们进一步表明，层间耦合通过在 K 和 K$'$ 点诱导螺旋性相关和谷选择性能带反转，定性地重塑了 Floquet 能带拓扑，从而稳定了价带中的高陈相。这些变化伴随着贝里曲率的重新分布、体能隙的闭合以及量子化异常霍尔平台的塌陷或符号反转。\n\n当系统接近半狄拉克极限时，拓扑相空间在临界合并点处变窄并消失，超过该点，即使系统仍然有间隙，系统也会变得拓扑平凡。总体而言，双层几何结构通过实现动态可调的高陈相位和由层间耦合和光螺旋性控制的谷相关霍尔响应，拓宽了 Floquet 拓扑控制的范围。", "authors": [{"name": "Imtiaz Khan"}, {"name": "Muzamil Shah"}, {"name": "Reza Asgari"}, {"name": "Gao Xianlong"}], "featured_authors": [{"name": "Imtiaz Khan"}, {"name": "Muzamil Shah"}, {"name": "Reza Asgari"}, {"name": "Gao Xianlong"}], "author_count": 4}, {"id": "2603.24592", "category": "cond-mat", "title": "Landau and fractionalized theories of periodically driven intertwined orders", "abstract": "We obtain the phase diagrams of field theories of intertwined orders in the presence of periodic driving by an external field which preserves all symmetries. We consider both a conventional Landau theory of competing orders, and a fractionalized theory in which the order parameters are distinct composites of an underlying multi-component Higgs field. We work in the large $N$ limit and couple to a Markovian bath. The long time limits are characterized by non-zero average values, oscillations with the drive period and/or half the drive period, quasi-periodic oscillations, or chaotic behavior.", "url": "https://arxiv.org/abs/2603.24592", "type": "理论+数值", "summary": "在保留所有对称性的外部场的周期性驱动下，我们获得了交织阶场论的相图。我们考虑传统的竞争阶朗道理论和分段理论，其中阶次参数是基础多分量希格斯场的不同组合。我们在巨大的 $N$ 限制下工作，并结合了马尔可夫浴。长时间限制的特征在于非零平均值、驱动周期和/或一半驱动周期的振荡、准周期振荡或混沌行为。", "authors": [{"name": "Oriana K. Diessel"}, {"name": "Subir Sachdev"}, {"name": "Pietro M. Bonetti"}], "featured_authors": [{"name": "Oriana K. Diessel"}, {"name": "Subir Sachdev"}, {"name": "Pietro M. Bonetti"}], "author_count": 3}, {"id": "2603.23721", "category": "hep-th", "title": "Thermodynamics of Hairy Black Holes in Quantum Regimes: Insights from Horndeski Theory", "abstract": "We study non-perturbative quantum gravitational corrections to the thermodynamics and quantum work distribution of the $n$-dimensional Schwarzschild--Tangherlini--Anti-de Sitter black hole. Starting from the corrected entropy $S = S_0 + \\eta\\, e^{-S_0}$, where $S_0$ is the Bekenstein--Hawking entropy, we derive the modified specific heat, internal energy, Helmholtz free energy, and Gibbs free energy in closed form. The specific heat retains the classical divergence at $r_h^{*}=l\\sqrt{(n-3)/(n-1)}$ for $n\\geq 4$, but the quantum correction suppresses its magnitude by up to $78\\%$ at small horizon radii. In the extended phase space, the uncharged black hole admits no van der Waals critical point; however, the non-perturbative correction induces a Hawking--Page transition for $n\\geq 4$ that is absent in the semi-classical limit. The corrected Gibbs free energy turns negative at small $r_h$, opening a thermodynamic channel with no classical counterpart. Using the Jarzynski equality and Jensen inequality, we obtain the quantum work distribution during evaporation. The free energy difference $\\Delta F$ between two black hole states undergoes a sign reversal at small horizon radii for $n\\geq 4$ when $\\eta=1$, flipping the average quantum work from negative to positive. This sign reversal grows with the spacetime dimension, reaching $\\langle W\\rangle \\approx +4.31$ for $n=10$. These findings demonstrate that non-perturbative quantum gravitational effects qualitatively alter the phase structure and evaporation energetics of AdS black holes, and they cannot be captured by perturbative corrections alone.", "url": "https://arxiv.org/abs/2603.23721", "type": "理论", "summary": "我们研究 $n$ 维 Schwarzschild-Tangherlini-Anti-de Sitter 黑洞的热力学和量子功分布的非微扰量子引力修正。从修正熵 $S = S_0 + \\eta\\, e^{-S_0}$ 开始，其中 $S_0$ 是贝肯斯坦-霍金熵，我们导出修正的比热、内能、亥姆霍兹自由能和吉布斯自由能的封闭形式。对于 $n\\geq 4$，比热保留了 $r_h^{*}=l\\sqrt{(n-3)/(n-1)}$ 处的经典散度，但量子校正在小地平线半径处将其幅度抑制高达 $78\\%$。在扩展相空间中，不带电的黑洞不存在范德华临界点；然而，非微扰修正会引起 $n\\geq 4$ 的霍金-佩奇转变，而这在半经典极限中是不存在的。修正后的吉布斯自由能在较小的 $r_h$ 处变为负值，打开了一个没有经典对应物的热力学通道。利用 Jarzynski 等式和 Jensen 不等式，我们获得了蒸发过程中的量子功分布。\n\n当 $\\eta=1$ 时，两个黑洞态之间的自由能差 $\\Delta F$ 在 $n\\geq 4$ 的小视界半径处经历符号反转，将平均量子功从负翻转为正。这种符号反转随着时空维度的增加而增长，对于 $n=10$ 达到 $\\langle W\\rangle \\approx +4.31$。这些发现表明，非微扰量子引力效应定性地改变了 AdS 黑洞的相结构和蒸发能量，并且它们不能仅通过微扰校正来捕获。", "authors": [{"name": "Behnam Pourhassan"}, {"name": "Izzet Sakalli"}, {"name": "Houcine Aounallah"}, {"name": "Fabiano F. Santos"}], "featured_authors": [{"name": "Behnam Pourhassan"}, {"name": "Izzet Sakalli"}, {"name": "Houcine Aounallah"}, {"name": "Fabiano F. Santos"}], "author_count": 4}, {"id": "2603.23731", "category": "hep-th", "title": "M-theory and T-geometry: Higgs branch moduli and charged matter", "abstract": "M-theory geometric engineering on manifolds of special holonomy yields a rich class of novel field theories. In this paper, we construct new 3d $\\mathcal{N}=2^{\\ast}$ and $\\mathcal{N}=4^{\\ast}$ gauge theories, realized as mass-deformations of theories with 16 supercharges, within this framework. These arise from non-compact 8d geometries given by fibrations of $\\mathbb{R}^{4}/\\Gamma_{ADE}$ over Biberbach 4-manifolds. The existence of consistent $Spin(7)$-structures on the 8d spaces requires the rotational holonomy of the Biberbach spaces to act on the $Sp(1)$-structure of the fibers. Furthermore, we analyze Higgsing the 7d $\\mathcal{N}=1$ $ADE$ gauge theories induced by the action of a permutation group on the centres of the corresponding $\\mathbb{R}^{4}/\\Gamma_{ADE}$ spaces. We show that this operation admits a natural interpretation in terms of nilpotent, upper-triangular, Higgsing, although it breaks supersymmetry. Supersymmetry is restored by fibering the singular geometry over a compact internal space, whose structure group is chosen to coincide with the permutation group to implement the nilpotent Higgsing. We refer to such backgrounds as T-geometries, where ``T'' denotes the triangular nature of the nilpotent Higgsing. Within this framework, we investigate the nilpotent Higgsing of the 3d $\\mathcal{N}=2^{\\ast}$ and 4d $\\mathcal{N}=1^{\\ast}$ theories, where the rotational holonomy groups of the Bieberbach spaces realize the permutation groups. We demonstrate that the Higgs branch moduli are encoded by specific elements of the Slodowy slices associated with nilpotent elements. Moreover, we demonstrate that additional elements of the same slice give rise to non-chiral charged matter under the unbroken gauge algebra. We establish that both the Higgs branch moduli and the charged matter are massless and admit a natural interpretation as localized matter.", "url": "https://arxiv.org/abs/2603.23731", "type": "理论", "summary": "对特殊完整流形的 M 理论几何工程产生了丰富的新颖场论。在本文中，我们在此框架内构建了新的 3d $\\mathcal{N}=2^{\\ast}$ 和 $\\mathcal{N}=4^{\\ast}$ 规范理论，实现为具有 16 个增压的理论的质量变形。这些源自 Biberbach 4 流形上 $\\mathbb{R}^{4}/\\Gamma_{ADE}$ 的纤维振动给出的非紧 8d 几何形状。 8d 空间上一致的 $Spin(7)$ 结构的存在需要 Biberbach 空间的旋转完整作用于纤维的 $Sp(1)$ 结构。此外，我们分析了由置换群对相应 $\\mathbb{R}^{4}/\\Gamma_{ADE}$ 空间中心的作用引起的 7d $\\mathcal{N}=1$ $ADE$ 规范理论的 Higgsing。我们证明，这个运算承认幂零、上三角、希格斯星的自然解释，尽管它打破了超对称性。通过在紧凑的内部空间上纤维化奇异几何形状来恢复超对称性，该空间的结构群被选择为与置换群一致以实现幂零希格斯效应。\n\n我们将此类背景称为 T 几何，其中“T”表示幂零希格斯金星的三角形性质。在此框架内，我们研究了 3d $\\mathcal{N}=2^{\\ast}$ 和 4d $\\mathcal{N}=1^{\\ast}$ 理论的幂零希格斯，其中 Bieberbach 空间的旋转完整群实现了置换群。我们证明希格斯分支模量是由与幂零元素相关的 Slodowy 切片的特定元素编码的。此外，我们证明同一切片的附加元素会在不间断的规范代数下产生非手性带电物质。我们确定希格斯分支模量和带电物质都是无质量的，并且允许自然解释为局域物质。", "authors": [{"name": "Marwan Najjar"}], "featured_authors": [{"name": "Marwan Najjar"}], "author_count": 1}, {"id": "2603.24092", "category": "hep-th", "title": "On the ultraviolet behavior of the invariant charge in quantum electrodynamics", "abstract": "In this paper we study the ultraviolet behavior of the invariant charge in QED. We show that for complex momenta the invariant charge does not have Landau pole singularity. We can define new invariant charge as real part of standard invariant charge. New invariant charge is limited from above and does not have Landau pole singularity. Also we use the $1/N$ perturbation theory for the investigation of the ultraviolet behavior of the invariant charge. To this aim we consider QED with imaginary charge which is asymptotically free but nonphysical model. In QED with nonphysical imaginary charge we can reliably calculate the ultraviolet asymptotics for the $(1/N)^k$ correction to the invariant charge, namely: $\\alpha_k(\\frac{p^2}{\\mu^2}, \\alpha) \\sim (\\ln(\\frac{p^2}{\\mu^2}))^{-k-1}$ at $k > 1$ and $\\alpha_1(\\frac{p^2}{\\mu^2}, \\alpha) \\sim (\\frac{\\ln(\\ln(\\frac{p^2}{\\mu^2})}{\\ln^2(\\frac{p^2}{\\mu^2})})$ at $k =1$. The $1/N$ perturbation theory coincides for QED with imaginary charge and standard QED with real charge. It means in particular that ultraviolet behavior of the $(1/N)^k$ correction $\\alpha_k(\\frac{p^2}{\\mu^2}, \\alpha)$ in real QED coincides with the corresponding asymptotics for QED with imaginary charge. We propose also to use the modified $1/N$ expansion which is ultraviolet finite. The comparison of the standard QED and nonphysical QED with imaginary charge gives hint that in other non asymptotically free models like supersymmetric QED, scalar QED or Wess-Zumino model ultraviolet asymptotics of the invariant charge coincides with leading log approximtion.", "url": "https://arxiv.org/abs/2603.24092", "type": "理论", "summary": "在本文中，我们研究了 QED 中不变电荷的紫外行为。我们证明，对于复动量，不变电荷不具有朗道极奇点。我们可以将新的不变电荷定义为标准不变电荷的实部。新的不变电荷受到上面的限制并且不具有朗道极奇点。我们还使用 $1/N$ 微扰理论来研究不变电荷的紫外行为。为此，我们考虑带有虚电荷的 QED，它是渐近自由但非物理模型。在具有非物理虚电荷的 QED 中，我们可以可靠地计算对不变电荷进行 $(1/N)^k$ 修正的紫外渐近线，即： $\\alpha_k(\\frac{p^2}{\\mu^2}, \\alpha) \\sim (\\ln(\\frac{p^2}{\\mu^2}))^{-k-1}$ at $k > 1$ 且$\\alpha_1(\\frac{p^2}{\\mu^2}, \\alpha) \\sim (\\frac{\\ln(\\ln(\\frac{p^2}{\\mu^2})}{\\ln^2(\\frac{p^2}{\\mu^2})})$ at $k =1$。$1/N$ 微扰理论对于虚电荷 QED 和实电荷 QED 是一致的。\n\n这尤其意味着实际 QED 中 $(1/N)^k$ 校正 $\\alpha_k(\\frac{p^2}{\\mu^2}, \\alpha)$ 的紫外行为与具有虚数电荷的 QED 的相应渐近一致。我们还建议使用修改后的 $1/N$ 展开式，它是紫外线有限的。标准 QED 和带有虚电荷的非物理 QED 的比较表明，在其他非渐近自由模型（如超对称 QED、标量 QED 或 Wess-Zumino 模型）中，不变电荷的紫外渐近与领先对数近似一致。", "authors": [{"name": "N.V.Krasnikov"}], "featured_authors": [{"name": "N.V.Krasnikov"}], "author_count": 1}, {"id": "2603.24098", "category": "hep-th", "title": "On the monodromy of KZ-connections with irregular singularities", "abstract": "We study Knizhnik-Zamolodchikov (KZ) connection in the presence of irregular singularities, that is, poles of higher order. We consider both the case of a universal connection and the case when it is associated with a specific simple Lie algebra, such as $\\mathfrak{su}(2)$. We give some general results about the monodromies of such flat connections in the configuration spaces of points, and provide explicit examples of topological invariants of links (more generally, tangles) realized by the monodromy.", "url": "https://arxiv.org/abs/2603.24098", "type": "理论", "summary": "我们研究存在不规则奇点（即高阶极点）的情况下的克尼日尼克-扎莫洛奇科夫（KZ）连接。我们既考虑通用连接的情况，也考虑它与特定简单李代数相关的情况，例如$\\mathfrak{su}(2)$。我们给出了关于点的配置空间中此类平面连接的单性的一些一般结果，并提供了由单性实现的链接（更一般地，缠结）的拓扑不变量的明确示例。", "authors": [{"name": "Xia Gu"}, {"name": "Babak Haghighat"}, {"name": "Pavel Putrov"}], "featured_authors": [{"name": "Xia Gu"}, {"name": "Babak Haghighat"}, {"name": "Pavel Putrov"}], "author_count": 3}, {"id": "2603.24123", "category": "hep-th", "title": "On relation of the genus one Moore-Seiberg identity to the Baxter Q-operator in the hyperbolic Ruijsenaars model", "abstract": "In this paper we show how the Baxter Q-operator and the product formula for eigenfunctions of two-particle hyperbolic Ruijsenaars system can be derived from the genus one Moore-Seiberg duality identity in two-dimensional Liouville conformal field theory. We expect that this relation would reveal genuine role of the Moore-Seiberg identity in integrable systems.", "url": "https://arxiv.org/abs/2603.24123", "type": "理论", "summary": "在本文中，我们展示了如何从二维刘维尔共形场理论中的属一摩尔-塞伯格对偶恒等式导出双粒子双曲 Ruijsenaars 系统的 Baxter Q 算子和本征函数的乘积公式。我们期望这种关系将揭示摩尔-塞伯格恒等式在可积系统中的真正作用。", "authors": [{"name": "Elena Apresyan"}, {"name": "Gor Sarkissian"}], "featured_authors": [{"name": "Elena Apresyan"}, {"name": "Gor Sarkissian"}], "author_count": 2}, {"id": "2603.24158", "category": "hep-th", "title": "Entanglement Entropy of Massive Scalar Fields: Mass Suppression, Violation of Universal mR Scaling, and Implications for Black Hole Thermodynamics", "abstract": "We investigate the entanglement entropy of a massive scalar field using the spherical shell lattice model introduced by Das and Shankaranarayanan. A systematic numerical analysis is performed to study the dependence of the entropy on the field mass and on the size of the entangling region for both ground and excited states. For the ground state, we find that the entanglement entropy is exponentially suppressed by the field mass, reflecting the presence of a finite correlation length, while the geometric area-law scaling remains robust for all masses. For localized excited states, however, we uncover a qualitatively different behavior. The excess entropy does not exhibit universal scaling in the dimensionless variable mR. Instead, numerical results show that data points with identical mR but different (m,R) pairs do not collapse onto a single curve, demonstrating a clear violation of simple scaling. This breakdown is traced to the presence of an additional length scale associated with the finite width of the wave-packet excitation. This result identifies the coexistence of multiple infrared scales as a key feature of excited-state entanglement in massive quantum field theories. Mutual information provides an additional finite diagnostic of correlations in the chosen nested geometry. The numerical results show a strong dependence on the field mass, although the detailed behavior is sensitive to the geometric setup used in the calculation. These findings clarify how particle mass and excitation structure jointly determine entanglement properties, and suggest that the matter contribution to the generalized entropy in semiclassical gravity may depend on independent infrared parameters rather than on a single correlation scale. Implications for black hole entropy and the island formula are briefly discussed.", "url": "https://arxiv.org/abs/2603.24158", "type": "理论", "summary": "我们使用 Das 和 Shankaranarayanan 引入的球壳晶格模型研究了大规模标量场的纠缠熵。进行了系统的数值分析，以研究熵对场质量以及基态和激发态纠缠区域大小的依赖性。对于基态，我们发现纠缠熵被场质量呈指数抑制，反映了有限相关长度的存在，而几何面积定律缩放对于所有质量仍然保持稳健。然而，对于局部激发态，我们发现了一种性质不同的行为。过剩熵在无量纲变量 mR 中不表现出通用标度。相反，数值结果表明，具有相同 mR 但不同 (m,R) 对的数据点不会折叠到一条曲线上，这表明明显违反了简单缩放。这种击穿可追溯到与波包激励的有限宽度相关的附加长度尺度的存在。这一结果表明，多个红外尺度的共存是大规模量子场论中激发态纠缠的一个关键特征。\n\n互信息提供了对所选嵌套几何图形中相关性的附加有限诊断。数值结果显示出对场质量的强烈依赖性，尽管详细行为对计算中使用的几何设置敏感。这些发现阐明了粒子质量和激发结构如何共同决定纠缠性质，并表明物质对半经典引力中广义熵的贡献可能取决于独立的红外参数，而不是单一的相关尺度。简要讨论了黑洞熵和岛公式的含义。", "authors": [{"name": "S. Bellucci"}, {"name": "M. Shatnev"}, {"name": "L. Zazunov"}], "featured_authors": [{"name": "S. Bellucci"}, {"name": "M. Shatnev"}, {"name": "L. Zazunov"}], "author_count": 3}, {"id": "2603.24354", "category": "hep-th", "title": "Four-point correlation numbers in super Minimal Liouville Gravity in the Ramond sector", "abstract": "In this work, we continue the investigation of correlation numbers in $\\mathcal{N}=1$ super Minimal Liouville Gravity (SMLG), with physical fields in the Ramond sector. Building upon our previous construction of physical operators and the evaluation of three-point correlation functions involving Ramond and Neveu-Schwarz (NS) insertions, we now turn to the analytic computation of four-point correlation numbers. This development is motivated by the framework established for the bosonic Minimal Liouville Gravity and its supersymmetric NS analog, where the integration over moduli space in correlation functions can be performed explicitly using the higher equations of motion (HEM) in Liouville theory. In particular, if one of the insertions corresponds to a degenerate field, the four-point amplitude can be expressed in terms of boundary contributions obtained from the OPE structure of logarithmic counterparts of ground ring elements. We aim to adapt and generalize this approach to the Ramond this http URL result is a closed-form analytic expression for four-point correlation numbers involving Ramond fields.", "url": "https://arxiv.org/abs/2603.24354", "type": "理论", "summary": "在这项工作中，我们继续研究 $\\mathcal{N}=1$ 超最小刘维尔引力 (SMLG) 中与拉蒙德扇区物理场的相关数。基于我们之前的物理算子构造以及涉及 Ramond 和 Neveu-Schwarz (NS) 插入的三点相关函数的评估，我们现在转向四点相关数的解析计算。这一发展是由为玻色子最小刘维尔引力及其超对称 NS 类似物建立的框架推动的，其中相关函数中模空间的积分可以使用刘维尔理论中的更高运动方程 (HEM) 显式地执行。特别地，如果插入之一对应于简并场，则四点幅度可以用从接地环元件的对数对应物的OPE结构获得的边界贡献来表示。我们的目标是将这种方法推广到Ramond，这个http URL 结果是涉及Ramond 字段的四点相关数的封闭式分析表达式。", "authors": [{"name": "Vladimir Belavin"}, {"name": "Juan Ramos Cabezas"}, {"name": "Boris Runov"}], "featured_authors": [{"name": "Vladimir Belavin"}, {"name": "Juan Ramos Cabezas"}, {"name": "Boris Runov"}], "author_count": 3}, {"id": "2603.24365", "category": "hep-th", "title": "Memory effect from the scattering of Taub-NUT black holes", "abstract": "Taub-NUT black holes are somewhat exotic solutions to the vacuum Einstein equations, which have received limited attention in gravitational phenomenology. We use the soft behaviour of scattering amplitudes to compute the memory effect of the waveform resulting from the scattering of Kerr-Taub-NUT black holes. Due to the non-linear nature of gravity, NUT charges introduce intriguing features in the soft dynamics, which have no counterpart in the closely related setting of monopole charges in electromagnetism. In addition to this potentially realistic problem, we also comment on the purely academic problem in complexified gravity of the scattering of self-dual Taub-NUT black holes, which have been discussed recently in the context of celestial holography.", "url": "https://arxiv.org/abs/2603.24365", "type": "理论", "summary": "Taub-NUT 黑洞是真空爱因斯坦方程的奇异解，在引力现象学中受到的关注有限。我们使用散射幅度的软行为来计算 Kerr-Taub-NUT 黑洞散射所产生的波形的记忆效应。由于重力的非线性性质，NUT 电荷在软动力学中引入了有趣的特征，这在电磁学中密切相关的单极子电荷设置中没有对应的特征。除了这个潜在的现实问题之外，我们还评论了自对偶 Taub-NUT 黑洞散射的复杂引力中的纯学术问题，这个问题最近在天体全息术的背景下进行了讨论。", "authors": [{"name": "George Doran"}, {"name": "Ricardo Monteiro"}, {"name": "Nathan Moynihan"}], "featured_authors": [{"name": "George Doran"}, {"name": "Ricardo Monteiro"}, {"name": "Nathan Moynihan"}], "author_count": 3}, {"id": "2603.24370", "category": "hep-th", "title": "soliton_solver: A GPU-based finite-difference PDE solver for topological solitons in two-dimensional non-linear field theories", "abstract": "This paper introduces soliton_solver, an open-source GPU-accelerated software package for the simulation and real-time visualization of topological solitons in two-dimensional non-linear field theories. The software is structured around a theory-agnostic numerical core implemented using Numba CUDA kernels, while individual physical models are introduced through modular theory components. This separation enables a single computational framework to be applied across a broad class of systems, from nanoscale magnetic spin textures in condensed matter physics to cosmic strings spanning galaxies in high energy physics. The numerical backend provides finite-difference discretization, energy minimization, and GPU-resident evaluation of observables. A CUDA--PyOpenGL rendering pipeline allows direct visualization of evolving field configurations without staging full arrays through host memory. The package is distributed in Python via PyPI and supports both reproducible batch simulations and interactive exploration of metastable configurations, soliton interactions, and model-dependent initial states. We describe the software architecture, numerical workflow, and extensibility model, and we present representative example applications. We also outline how additional theories can be incorporated with minimal modification of the shared numerical infrastructure.", "url": "https://arxiv.org/abs/2603.24370", "type": "理论", "summary": "本文介绍了 soliton_solver，这是一个开源 GPU 加速软件包，用于二维非线性场论中拓扑孤子的模拟和实时可视化。该软件围绕使用 Numba CUDA 内核实现的与理论无关的数值核心构建，同时通过模块化理论组件引入各个物理模型。这种分离使得单一计算框架能够应用于广泛的系统，从凝聚态物理中的纳米级磁自旋纹理到高能物理中跨越星系的宇宙弦。数值后端提供有限差分离散化、能量最小化和可观测值的 GPU 驻留评估。 CUDA-PyOpenGL 渲染管道允许直接可视化不断变化的场配置，而无需通过主机内存暂存完整阵列。该软件包通过 PyPI 在 Python 中分发，支持可重复的批量模拟以及亚稳态配置、孤子交互和模型相关初始状态的交互式探索。\n\n我们描述了软件架构、数值工作流程和可扩展性模型，并提出了代表性的示例应用程序。我们还概述了如何在对共享数值基础设施进行最小修改的情况下纳入其他理论。", "authors": [{"name": "Paul Leask"}], "featured_authors": [{"name": "Paul Leask"}], "author_count": 1}, {"id": "2603.24429", "category": "hep-th", "title": "Wavefunction Collapse in String Theory", "abstract": "One of the most intriguing proposals for wavefunction collapse is the Diosi Penrose model, in which collapse is driven by stochastic fluctuations of the Newtonian potential. We argue that a closely related effective structure can emerge in string theory if, as recently suggested, the present cosmic acceleration is sourced by instant folded strings and their decay products. A key difference, however, is that in this stringy setting the noise is naturally colored in time rather than white. As a result, the scenario is significantly less constrained by existing experiments than the standard Diosi Penrose model.", "url": "https://arxiv.org/abs/2603.24429", "type": "理论", "summary": "波函数塌缩最有趣的提议之一是 Diosi Penrose 模型，其中塌缩是由牛顿势的随机涨落驱动的。我们认为，如果像最近提出的那样，当前的宇宙加速是由瞬时折叠的弦及其衰变产物产生的，那么弦理论中就会出现一个密切相关的有效结构。然而，一个关键的区别是，在这种弦乐设置中，噪音会随着时间自然着色，而不是白色。因此，与标准 Diosi Penrose 模型相比，该场景受现有实验的限制明显更少。", "authors": [{"name": "Nissan Itzhaki"}], "featured_authors": [{"name": "Nissan Itzhaki"}], "author_count": 1}, {"id": "2603.24514", "category": "hep-th", "title": "Basic Canonical Brackets and Nilpotency Property of Noether (anti-)BRST Charges: Non-Abeian 1-Form Gauge Theory", "abstract": "In the case of a D-dimensional non-Abelian 1-form gauge theory (without any interaction with the matter fields), we show that the application of the Noether theorem does not lead to the derivations of the Becchi-Rouet-Stora-Tyutin (BRST) and anti-BRST charges that obey (i) the (anti-)BRST invariance, and (ii) the nilpotency property (despite the fact that these charges are derived from the infinitesimal, continuous and nilpotent (anti-)BRST symmetry transformations). This happens because of the presence of the {\\it non-trivial} Curci-Ferrari (CF) condition on our non-Abelian theory (whose limiting case is the Abelian gauge theory where the CF-type restriction is trivial and the corresponding Noether (anti-)BRST charges turn out to be nilpotent as well as (anti-)BRST invariant together). We exploit the theoretical strength of the basic canonical approach to prove (i) the non-nilpotency of the conserved Noether (anti-)BRST charges, and (ii) the (anti-)BRST invariance of the consistently modified versions of the Noether conserved (anti-)BRST charges. We very briefly comment on the nilpotency property of the consistently modified versions of the conserved (anti-)BRST charges, too. Our present observations are very sacrosanct because they have been proven by (i) using the beauty of the symmetry properties, and (ii) exploiting the theoretical strength of the basic canonical (anti)commutators.", "url": "https://arxiv.org/abs/2603.24514", "type": "理论", "summary": "在 D 维非阿贝尔一式规范理论（不与物质场相互作用）的情况下，我们证明诺特定理的应用不会导致 Becchi-Rouet-Stora-Tyutin (BRST) 和反 BRST 电荷的推导，这些电荷遵循 (i) (反)BRST 不变性和 (ii) 幂零性（尽管这些电荷是从无穷小、连续且幂零（反）BRST 对称变换）。发生这种情况是因为我们的非阿贝尔理论中存在 {\\it non-trivial} Curci-Ferrari (CF) 条件（其极限情况是阿贝尔规范理论，其中 CF 型限制是微不足道的，并且相应的诺特（反）BRST 电荷被证明是幂零的以及（反）BRST 不变量）。我们利用基本规范方法的理论强度来证明（i）守恒诺特（反）BRST 电荷的非零能性，以及（ii）诺特守恒（反）BRST 电荷的一致修改版本的（反）BRST 不变性。我们也非常简短地评论了守恒（反）BRST 电荷的一致修改版本的零能性质。\n\n我们目前的观察是非常神圣的，因为它们已经通过（i）利用对称性的美丽和（ii）利用基本规范（反）换向子的理论强度来证明。", "authors": [{"name": "R. P. Malik"}], "featured_authors": [{"name": "R. P. Malik"}], "author_count": 1}, {"id": "2603.24534", "category": "hep-th", "title": "$Spin(n,n)\\times\\mathbb{R}^+$ Generalised Geometry and Consistent Truncations on Branes", "abstract": "In this note we show how the consistent truncations on half-supersymmetric branes of Leung and Stelle and Lin, Skrzypek and Stelle fit into the general exceptional generalised geometry analysis of Cassani \\emph{et al.}. Each solution defines a torsion-free $Spin(n)$ structure in the $Spin(n,n)\\times \\mathbb{R}^+$ generalised geometry introduced by Strickland--Constable, where $n$ is the dimension of the space transverse to the brane. Embedding this into the appropriate exceptional generalised geometry then defines the truncation. As a by-product we derive a new consistent truncation on the IIA NS5-brane to six-dimensional $\\mathcal{N}=(2,0)$ supergravity coupled to a tensor mutliplet, and new consistent truncations on the D6- and D7-branes to seven- and eight-dimensional pure half-maximal supergravity respectively.", "url": "https://arxiv.org/abs/2603.24534", "type": "理论", "summary": "在这篇文章中，我们展示了 Leung 和 Stelle 以及 Lin、Skrzypek 和 Stelle 的半超对称膜上的一致截断如何适合 Cassani \\emph{et al.} 的一般例外广义几何分析。每个解都在 Strickland--Constable 引入的 $Spin(n,n)\\times \\mathbb{R}^+$ 广义几何中定义了一个无扭转 $Spin(n)$ 结构，其中 $n$ 是横向于膜的空间维度。将其嵌入到适当的特殊广义几何中，然后定义截断。作为副产品，我们在 IIA NS5 膜上推导出与张量多重态耦合的六维 $\\mathcal{N}=(2,0)$ 超重力的新一致截断，以及在 D6 和 D7 膜上分别对七维和八维纯半极大超重力的新一致截断。", "authors": [{"name": "Jieming Lin"}, {"name": "Kellogg S. Stelle"}, {"name": "Daniel Waldram"}], "featured_authors": [{"name": "Jieming Lin"}, {"name": "Kellogg S. Stelle"}, {"name": "Daniel Waldram"}], "author_count": 3}, {"id": "2603.24593", "category": "hep-th", "title": "Fractal universe and quantum gravity made simple", "abstract": "Quantum field theory (QFT) on fractal spacetimes is a program aiming at quantizing the gravitational interaction consistently at all energy scales thanks to an intrinsically or dynamically induced multiscale or multifractal-like spacetime geometry that regularizes the infinities of standard QFT. We reach the goal of this program and formulate a field theory of quantum gravity which is shown to be super-renormalizable and unitary at all perturbative orders. Viable and unviable ways to test this proposal through black holes and gravitational waves are discussed.", "url": "https://arxiv.org/abs/2603.24593", "type": "理论", "summary": "分形时空的量子场论（QFT）是一个旨在在所有能量尺度上一致地量化引力相互作用的程序，这要归功于内在或动态诱导的多尺度或类多重分形时空几何，它规范了标准 QFT 的无穷大。我们达到了该计划的目标，并制定了量子引力场论，该场论被证明在所有微扰阶上都是超可重整化和幺正的。讨论了通过黑洞和引力波测试该提议的可行和不可行的方法。", "authors": [{"name": "Fabio Briscese"}, {"name": "Gianluca Calcagni"}], "featured_authors": [{"name": "Fabio Briscese"}, {"name": "Gianluca Calcagni"}], "author_count": 2}, {"id": "2603.23664", "category": "math-ph", "title": "Factorized dispersion relations for two coupled systems", "abstract": "We establish that the dispersion relations of any physical system composed of two coupled subsystems, governed by a space-time homogeneous Lagrangian, admit a factorized form G_{1}G_{2}=\\gamma G_{\\mathrm{c}}, where G_{1} and G_{2} are the subsystem dispersion functions, G_{\\mathrm{c}} is the coupling function, and \\gamma is the coupling parameter. The result follows from a determinant expansion theorem applied to the block structure of the coupled system matrix, and is illustrated through three examples: the traveling wave tube, vibrations of an airplane wing, and the Mindlin-Reissner plate theory. For the Mindlin-Reissner example we carry out a complete asymptotic analysis of the coupled dispersion branches, establishing that the factorized form provides a precise quantitative measure of mode hybridization: all four branches carry the imprint of both subsystem factors for any nonzero coupling, while asymptotically recovering the identity of pure uncoupled modes at large frequencies and wavenumbers. We further analyze the universal local geometry of the coupled dispersion branches near their intersection - the cross-point model - showing it is generically hyperbolic, and present a mechanical analog in which the wavenumber is replaced by a scalar parameter, exhibiting the same factorized structure and avoided crossin", "url": "https://arxiv.org/abs/2603.23664", "type": "理论", "summary": "我们建立由两个耦合子系统组成的任何物理系统的色散关系，由时空齐次拉格朗日量控制，承认因式分解形式 G_{1}G_{2}=\\gamma G_{\\mathrm{c}}，其中 G_{1} 和 G_{2} 是子系统色散函数，G_{\\mathrm{c}} 是耦合函数，\\gamma 是耦合参数。结果源自应用于耦合系统矩阵的块结构的行列式展开定理，并通过三个示例进行说明：行波管、飞机机翼的振动和 Mindlin-Reissner 板理论。对于 Mindlin-Reissner 示例，我们对耦合色散分支进行了完整的渐近分析，确定因式分解形式提供了模式杂交的精确定量测量：所有四个分支都带有任何非零耦合的两个子系统因子的印记，同时渐近恢复大频率和波数下纯非耦合模式的特性。\n\n我们进一步分析了耦合色散分支在其交叉点附近的通用局部几何结构（交叉点模型），表明它一般是双曲线的，并提出了一种机械模拟，其中波数被标量参数取代，表现出相同的因式分解结构并避免了交叉", "authors": [{"name": "Alexander Figotin"}], "featured_authors": [{"name": "Alexander Figotin"}], "author_count": 1}, {"id": "2603.23893", "category": "math-ph", "title": "On symbol correspondences for quark systems II: Asymptotics", "abstract": "We study the semiclassical asymptotics of twisted algebras induced by symbol correspondences for quark systems ($SU(3)$-symmetric mechanical systems) as defined in our previous paper [3]. The linear span of harmonic functions on (co)adjoint orbits is identified with the space of polynomials on $\\mathfrak{su}(3)$ restricted to these orbits, and we find two equivalent criteria for the asymptotic emergence of Poisson algebras from sequences of twisted algebras of harmonic functions on (co)adjoint orbits which are induced from sequences of symbol correspondences (the fuzzy orbits). Then, we proceed by ``gluing'' the fuzzy orbits along the unit sphere $\\mathcal S^7\\subset \\mathfrak{su}(3)$, defining Magoo spheres, and studying their asymptotic limits. We end by highlighting the possible generalizations from $SU(3)$ to other compact symmetry groups, specially compact simply connected semisimple Lie groups, commenting on some peculiarities from our treatment for $SU(3)$ deserving further investigations.", "url": "https://arxiv.org/abs/2603.23893", "type": "理论", "summary": "我们研究了由夸克系统（$SU(3)$-对称机械系统）的符号对应引起的扭曲代数的半经典渐近，如我们之前的论文 [3] 中所定义。 (共)伴随轨道上的调和函数的线性跨度被定义为限制在这些轨道上的 $\\mathfrak{su}(3)$ 上的多项式空间，并且我们找到了从符号对应序列（模糊轨道）导出的（共）伴随轨道上调和函数的扭曲代数序列中渐近出现泊松代数的两个等效准则。然后，我们沿着单位球体 $\\mathcal S^7\\subset \\mathfrak{su}(3)$ “粘合”模糊轨道，定义 Magoo 球体，并研究它们的渐近极限。最后，我们强调从 $SU(3)$ 到其他紧对称群（特别是紧单连通半单李群）的可能概括，评论我们对 $SU(3)$ 的处理中值得进一步研究的一些特殊性。", "authors": [{"name": "P. A. S. Alcântara"}, {"name": "P. de M. Rios"}], "featured_authors": [{"name": "P. A. S. Alcântara"}, {"name": "P. de M. Rios"}], "author_count": 2}, {"id": "2603.24028", "category": "math-ph", "title": "Determinant Formulas for Scattering Matrices of Schrödinger Operators with Finitely Many Concentric $δ$-Shells", "abstract": "We study stationary scattering for Schrödinger operators in $\\R^3$ with finitely many concentric $\\delta$--shell interactions of constant real strengths. Starting from the self--adjoint realization and the boundary resolvent formula for this model, we show that, after partial--wave reduction, the same finite-dimensional boundary matrices that arise in the resolvent formula also determine the channel scattering coefficients. More precisely, for each angular momentum $\\ell$, the channel coefficient $S_\\ell(k)$ satisfies $S_\\ell(k)=\\det K_\\ell(k^2-i0)/\\det K_\\ell(k^2+i0)$ for almost every $k>0$, where $K_\\ell(z)=I_N+m_\\ell(z)\\Theta$ is the $\\ell$--th reduced boundary matrix. Thus, in each channel, the positive--energy scattering problem is reduced to a finite-dimensional matrix problem, and the scattering phase is recovered from $\\det K_\\ell(k^2+i0)$. We then study the first nontrivial case of two concentric shells in the $s$--wave channel, where the interaction between the shells produces nontrivial threshold effects. We derive an explicit formula for $S_0(k)$ and analyze its behavior as $k\\downarrow0$. In the regular threshold regime, we obtain an explicit scattering length. We further identify a threshold--critical configuration characterized by the existence of a nontrivial zero--energy radial solution, regular at the origin, whose exterior constant term vanishes. In the corresponding nondegenerate exceptional case, the usual finite scattering length breaks down, and instead $S_0(k)\\to -1$ as $k\\downarrow0$.", "url": "https://arxiv.org/abs/2603.24028", "type": "理论", "summary": "我们研究 $\\R^3$ 中薛定谔算子的平稳散射，具有有限多个同心 $\\delta$ - 恒定实强度的壳相互作用。从该模型的自伴随实现和边界解析公式出发，我们表明，在部分波约简之后，解析公式中出现的相同有限维边界矩阵也决定了通道散射系数。更准确地说，对于每个角动量 $\\ell$，几乎每个 $k>0$ 的通道系数 $S_\\ell(k)$ 都满足 $S_\\ell(k)=\\det K_\\ell(k^2-i0)/\\det K_\\ell(k^2+i0)$，其中 $K_\\ell(z)=I_N+m_\\ell(z)\\Theta$ 是第 $\\ell$ 简化边界矩阵。因此，在每个通道中，正能量散射问题被简化为有限维矩阵问题，并且散射相位从$\\det K_\\ell(k^2+i0)$中恢复。然后，我们研究 $s$ 波通道中两个同心壳的第一个非平凡情况，其中壳之间的相互作用产生非平凡的阈值效应。我们推导出 $S_0(k)$ 的显式公式，并分析其行为 $k\\downarrow0$。在常规阈值机制中，我们获得了明确的散射长度。\n\n我们进一步确定了一个阈值临界构型，其特征在于存在非平凡的零能量径向解，该解在原点是规则的，其外部常数项消失。在相应的非简并例外情况下，通常的有限散射长度会崩溃，并且 $S_0(k)\\to -1$ 为 $k\\downarrow0$。", "authors": [{"name": "Masahiro Kaminaga"}], "featured_authors": [{"name": "Masahiro Kaminaga"}], "author_count": 1}, {"id": "2603.24395", "category": "math-ph", "title": "Particle-Hole Pair Localization on the Fermi Surface and its Impact on the Correlation Energy", "abstract": "In recent years it has been shown how approximate bosonization can be used to justify the random phase approximation for the correlation energy of interacting fermions in a mean-field scaling limit. At the core is the interpretation of particle-hole excitations close to the Fermi surface at bosons. The main two approaches however differ in emphasizing collective degrees of freedom (particle-hole pairs delocalized over patches on the Fermi surface) or particle-hole pairs exactly localized in momentum space. Both methods lead to equal precision for the correlation energy with regular interaction potentials. This poses the question how big the influence of delocalizing particle-hole pairs really is. In the present note we show that a description with few, completely collective bosonic degrees of freedom only yields an upper bound of about 92% of the optimal value. Nevertheless it is remarkable that such a simple approach comes that close to the optimal bound.", "url": "https://arxiv.org/abs/2603.24395", "type": "理论", "summary": "近年来，已经表明如何使用近似玻色化来证明平均场标度极限中相互作用的费米子的相关能量的随机相位近似的合理性。核心是对玻色子费米面附近的粒子空穴激发的解释。然而，主要的两种方法在强调集体自由度（在费米表面上的斑块上离域的粒子-空穴对）或在动量空间中精确局域的粒子-空穴对方面有所不同。两种方法都可以使具有规则相互作用势的相关能量具有相同的精度。这就提出了一个问题：离域粒子-空穴对的影响究竟有多大。在本说明中，我们表明，具有很少的、完全集体的玻色子自由度的描述仅产生最佳值的约 92% 的上限。然而，值得注意的是，这样一个简单的方法竟然如此接近最优界限。", "authors": [{"name": "Niels Benedikter"}], "featured_authors": [{"name": "Niels Benedikter"}], "author_count": 1}, {"id": "2603.23595", "category": "quant-ph", "title": "Aumann's theorem beyond ontology: quantum, postquantum, and indefinite causal order", "abstract": "Agreement theorems are no-go results about rational disagreement: if two agents start from a common prior and their posterior beliefs are common knowledge, they cannot assign different probabilities to the same event. Standard treatments of the result have the agents reason about an underlying state of the world, which has lead some to ask whether the result can extend to quantum or postquantum phenomena, where such a description may no longer be appropriate. We derive an operational version of Aumann's agreement theorem without assuming an objective state of the world and instead focusing only on what is observed. This allows us to establish the theorem's validity in quantum theory and even in situations with indefinite causal order or involving hypothetical postquantum phenomena. We comment on seemingly contradictory results in the literature and point to the one place where the theorem might fail: Wigner's friend-type situations.", "url": "https://arxiv.org/abs/2603.23595", "type": "理论", "summary": "一致定理是关于理性分歧的不可行结果：如果两个主体从共同的先验开始，并且他们的后验信念是共同知识，他们就不能为同一事件分配不同的概率。对结果的标准处理让智能体对世界的潜在状态进行推理，这导致一些人质疑该结果是否可以扩展到量子或后量子现象，而这种描述可能不再合适。我们推导出奥曼一致性定理的操作版本，没有假设世界的客观状态，而是只关注观察到的情况。这使我们能够确定该定理在量子理论中的有效性，甚至在因果顺序不确定或涉及假设的后量子现象的情况下也是如此。我们评论了文献中看似矛盾的结果，并指出了该定理可能失败的一个地方：维格纳的朋友型情况。", "authors": [{"name": "Carlo Cepollaro"}, {"name": "Andrea Di Biagio"}], "featured_authors": [{"name": "Carlo Cepollaro"}, {"name": "Andrea Di Biagio"}], "author_count": 2}, {"id": "2603.23598", "category": "quant-ph", "title": "Observer-Dependent Entropy and Diagonal Rényi Invariants in Quantum Reference Frames", "abstract": "Quantum reference frames provide a relational description of multipartite quantum systems in which physical states and observables are defined relative to quantum observers. Yet different observers can assign different entropies to the same system, raising the question of how such observer-dependence is constrained. We identify a family of frame-independent diagonal Rényi entropies for arbitrary subsystems, yielding a generalized multipartite coherence-entanglement tradeoff. For ideal frames, the observer-dependence of subsystem entropy admits an exact decomposition into a sum of single-frame coherences and inter-frame correlations; for non-ideal frames, it is instead bounded by the dimension of an effective relational Hilbert space determined by the representation structure of the frames. Our results place quantitative limits on how much quantum observers can disagree about subsystem entropy, with potential implications for observer-dependent entropy assignments in gravitational settings.", "url": "https://arxiv.org/abs/2603.23598", "type": "理论", "summary": "量子参考系提供了多部分量子系统的关系描述，其中物理状态和可观测量是相对于量子观察者定义的。然而，不同的观察者可以为同一系统分配不同的熵，这就提出了如何限制这种观察者依赖性的问题。我们为任意子系统确定了一系列与框架无关的对角 Rényi 熵，从而产生了广义的多部分相干纠缠权衡。对于理想框架，子系统熵的观察者依赖性允许精确分解为单帧相干性和帧间相关性之和；对于非理想框架，它受到由框架的表示结构确定的有效关系希尔伯特空间的维度的限制。我们的结果对量子观察者对子系统熵的分歧程度进行了定量限制，这对引力环境中依赖于观察者的熵分配具有潜在影响。", "authors": [{"name": "Anne-Catherine de la Hamette"}], "featured_authors": [{"name": "Anne-Catherine de la Hamette"}], "author_count": 1}, {"id": "2603.23601", "category": "quant-ph", "title": "Entanglement transference and non-inertial quantum reference frames", "abstract": "Given the recent interest in perspectival quantum reference frames (QRFs), we ask how quantum properties in the perspectival picture relate to their global, non-perspectival counterparts. It is instructive to establish this link, as most known results in quantum information theory are derived in the latter context. Specifically, we find sufficient conditions under which global entanglement decomposes into a combination of perspectival entanglement and coherence -- a phenomenon that we call entanglement transference. We apply this result to non-inertial QRFs, in particular, revisiting the problem of entanglement degradation. We find that entanglement degradation in the perspectival picture can be offset by an increase in coherence resources. The non-inertial problem may also provide clues to understanding perspectival QRFs in curved spacetime.", "url": "https://arxiv.org/abs/2603.23601", "type": "理论", "summary": "鉴于最近人们对透视量子参考系（QRF）的兴趣，我们询问透视图中的量子特性与它们的全局非透视对应物有何关系。建立这种联系是有启发性的，因为量子信息论中大多数已知的结果都是在后一种情况下得出的。具体来说，我们找到了全局纠缠分解为视角纠缠和连贯性的组合的充分条件——我们称之为纠缠转移的现象。我们将此结果应用于非惯性 QRF，特别是重新审视纠缠退化问题。我们发现，视角图像中的纠缠退化可以通过相干资源的增加来抵消。非惯性问题也可能为理解弯曲时空中的透视 QRF 提供线索。", "authors": [{"name": "Everett A. Patterson"}, {"name": "Sijia Wang"}, {"name": "Robert B. Mann"}], "featured_authors": [{"name": "Everett A. Patterson"}, {"name": "Sijia Wang"}, {"name": "Robert B. Mann"}], "author_count": 3}, {"id": "2603.23602", "category": "quant-ph", "title": "Reaching states below the threshold energy in spin glasses via quantum annealing", "abstract": "Although quantum annealing is usually considered as a method for locating the ground states of difficult spin-glass and optimization problems, its use in approximate optimization -- finding low- but not zero-energy states in a reasonably short amount of time -- is no less important. Here we investigate the behavior of quantum annealing at approximate optimization in the canonical mean-field spin-glass models, the spherical $p$-spin models, and find that it performs surprisingly well. Whereas it had long been assumed that infinite-range spin glasses have a unique ``threshold'' energy at which all quench and annealing dynamics become trapped until exponential timescales, recent work has shown that two-stage quenches can in fact reach states below the naive threshold in more generic situations. We demonstrate that quantum annealing is also capable of exploiting this effect to locate sub-threshold states in $O(1)$ time. Not only can it attain energies as far below the threshold as classical annealing algorithms, but it can do so significantly faster: for an annealing schedule taking time $\\tau$, the residual energy under quantum annealing decays as $\\tau^{-\\alpha}$ with an exponent up to twice as large as that of simulated annealing in the cases considered. Importantly, by deriving and numerically solving closed integro-differential equations that hold in the thermodynamic limit, our results are free from finite-size effects and hold for annealing times that are unambiguously independent of system size.", "url": "https://arxiv.org/abs/2603.23602", "type": "理论+数值", "summary": "尽管量子退火通常被认为是定位困难的自旋玻璃和优化问题的基态的方法，但它在近似优化中的使用（在相当短的时间内找到低能态但不是零能态）也同样重要。在这里，我们研究了规范平均场自旋玻璃模型、球形 $p$-自旋模型中近似优化时量子退火的行为，并发现它的表现出奇的好。尽管长期以来人们一直认为无限范围的自旋玻璃具有独特的“阈值”能量，在该能量下，所有淬火和退火动力学都会被困住，直到指数时间尺度，但最近的研究表明，在更一般的情况下，两阶段淬火实际上可以达到低于初始阈值的状态。我们证明量子退火也能够利用这种效应在 $O(1)$ 时间内定位亚阈值状态。\n\n它不仅可以获得远低于经典退火算法阈值的能量，而且可以显着更快：对于需要时间 $\\tau$ 的退火方案，量子退火下的残余能量衰减为 $\\tau^{-\\alpha}$，其指数高达所考虑情况下模拟退火指数的两倍。重要的是，通过推导和数值求解保持在热力学极限内的封闭积分微分方程，我们的结果不受有限尺寸效应的影响，并且保持与系统尺寸明确无关的退火时间。", "authors": [{"name": "Christopher L. Baldwin"}], "featured_authors": [{"name": "Christopher L. Baldwin"}], "author_count": 1}, {"id": "2603.23628", "category": "quant-ph", "title": "Optimal pure state cloning and transposition are complementary channels", "abstract": "State cloning and state transposition are fundamental transformations which, despite being desirable, cannot be perfectly implemented in quantum theory. In this work, we determine the optimal approximation for transforming $N$ qudits into $K$ copies of their transposition and prove the optimal fidelity for pure input states. We further show that the optimal qudit \\(N\\!\\to\\!K\\) transposition map is the complementary channel of the optimal universal symmetric \\(N\\!\\to\\!N\\!+\\!K\\) quantum cloning machine on pure states, implying that both tasks can be simultaneously realised by the same quantum operation and attain the same optimal fidelity. We then present an explicit quantum circuit that simultaneously implements optimal \\(N\\!\\to\\!K\\) transposition and \\(N\\!\\to\\!N\\!+\\!K\\) cloning and discuss its gate efficiency. Lastly, we investigate mixed-state \\(N\\!\\to\\!1\\) qudit transposition and find the optimal performance in terms of white noise visibility, yielding the optimal structural physical approximation of state transposition in the multicopy regime.", "url": "https://arxiv.org/abs/2603.23628", "type": "理论", "summary": "状态克隆和状态转置是基本的变换，尽管它们是可取的，但无法在量子理论中完美实现。在这项工作中，我们确定了将 $N$ 量子转换为其转置的 $K$ 副本的最佳近似值，并证明了纯输入状态的最佳保真度。我们进一步证明，最优量子\\(N\\!\\to\\!K\\)转置图是纯态上最优通用对称\\(N\\!\\to\\!N\\!+\\!K\\)量子克隆机的互补通道，这意味着两个任务可以通过相同的量子操作同时实现，并获得相同的最优保真度。然后，我们提出一个显式量子电路，它同时实现最优\\(N\\!\\to\\!K\\)转置和\\(N\\!\\to\\!N\\!+\\!K\\)克隆，并讨论其门效率。最后，我们研究了混合状态 \\(N\\!\\to\\!1\\) qudit 转置，并找到了白噪声可见性方面的最佳性能，从而产生了多拷贝机制中状态转置的最佳结构物理近似。", "authors": [{"name": "Vanessa Brzić"}, {"name": "Dmitry Grinko"}, {"name": "Michał Studziński"}, {"name": "Marco Túlio Quintino"}], "featured_authors": [{"name": "Vanessa Brzić"}, {"name": "Dmitry Grinko"}, {"name": "Michał Studziński"}, {"name": "Marco Túlio Quintino"}], "author_count": 4}, {"id": "2603.23636", "category": "quant-ph", "title": "Characterization and Comparison of Energy Relaxation in Fluxonium Qubits", "abstract": "Fluxonium superconducting qubits have demonstrated long coherence times and high single- and two-qubit gate fidelities, making them a favorable building block for superconducting quantum processors. We investigate the dominant limitations to fluxonium qubit energy relaxation time $T_1$ using a set of eight planar, aluminum-on-silicon qubits. We find that a circuit-based model for capacitive dielectric loss best captures the frequency dependence of $T_1$, which we analyze within both a two-level and a six-level energy relaxation model. We convert the measured $T_1$ into an effective capacitive quality factor $Q_\\mathrm{C}^{\\mathrm{eff}}$ to compare qubits on equal footing, accounting for independently estimated contributions from $1/f$ flux noise and radiative loss to the control and readout circuitry. We apply this methodology to compare qubits from two fabrication processes: a baseline process and one that applies a fluorine-based wet treatment prior to Josephson junction deposition. We resolve a small improvement of (13.8 $\\pm$ 8.4$)\\%$ in the process mean $Q_\\mathrm{C}^{\\mathrm{eff}}$, indicating that the fluorine treatment may have reduced loss from the metal-substrate interface, but did not address the primary source of loss in these fluxonium qubits.", "url": "https://arxiv.org/abs/2603.23636", "type": "理论", "summary": "Fluxium 超导量子位已表现出较长的相干时间和较高的单量子位和两个量子位门保真度，使其成为超导量子处理器的有利构建模块。我们使用一组八个平面铝硅量子位研究了 Fluxium 量子位能量弛豫时间 $T_1$ 的主要限制。我们发现基于电路的电容介电损耗模型能够最好地捕捉 $T_1$ 的频率依赖性，我们在两级和六级能量弛豫模型中对此进行了分析。我们将测量的 $T_1$ 转换为有效电容品质因数 $Q_\\mathrm{C}^{\\mathrm{eff}}$ 以平等地比较量子位，并考虑到 $1/f$ 磁通噪声和辐射损耗对控制和读出电路的独立估计贡献。我们应用这种方法来比较两种制造工艺的量子位：一种是基线工艺，另一种是在约瑟夫森结沉积之前应用氟基湿处理的工艺。\n\n我们解决了过程平均值 $Q_\\mathrm{C}^{\\mathrm{eff}}$ 中 (13.8 $\\pm$ 8.4$)\\%$ 的小改进，表明氟处理可能减少了金属-基底界面的损耗，但没有解决这些 Fluxium 量子位中损耗的主要来源。", "authors": [{"name": "Kate Azar"}, {"name": "Lamia Ateshian"}, {"name": "Mallika T. Randeria"}, {"name": "Renée DePencier Piñero"}, {"name": "Jeffrey M. Gertler"}, {"name": "Junyoung An"}, {"name": "Felipe Contipelli"}, {"name": "Leon Ding"}, {"name": "Michael Gingras"}, {"name": "Kevin Grossklaus"}, {"name": "Max Hays"}, {"name": "Thomas M. Hazard"}, {"name": "Junghyun Kim"}, {"name": "Bethany M. Niedzielski"}, {"name": "Hannah Stickler"}, {"name": "Kunal L. Tiwari"}, {"name": "Helin Zhang"}, {"name": "Jeffrey A. Grover"}, {"name": "Jonilyn L. Yoder"}, {"name": "Mollie E. Schwartz"}, {"name": "William D. Oliver"}, {"name": "Kyle Serniak"}], "featured_authors": [{"name": "Kate Azar"}, {"name": "Lamia Ateshian"}, {"name": "Mallika T. Randeria"}, {"name": "Mollie E. Schwartz"}, {"name": "William D. Oliver"}, {"name": "Kyle Serniak"}], "author_count": 22}, {"id": "2603.23656", "category": "quant-ph", "title": "Information-Geometric Quantum Process Tomography of Single Qubit Systems", "abstract": "We establish an exact information-geometric inequality that remains valid regardless of the underlying dynamics, encompassing both Markovian and non-Markovian evolutions within the mixed-state domain. This inequality can be viewed as an extension of thermodynamic speed limits, which are typically formulated as inequalities. For single qubits, we show that this inequality saturates into a strict equality because the density matrix belongs to the quantum exponential family, with the Pauli matrices serving as sufficient statistics. From a practical perspective, this identity enables a non-iterative linear regression approach to continuous-time quantum process tomography, bypassing the local minima issues common in non-linear optimization. We demonstrate the efficiency of this method by estimating the Hamiltonian and dissipation parameters of the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) master equation. Numerical simulations confirm the validity of this geometric estimator and highlight the necessity of error mitigation near the pure-state boundary where the inverse metric becomes singular.", "url": "https://arxiv.org/abs/2603.23656", "type": "理论+数值", "summary": "我们建立了一个精确的信息几何不等式，无论潜在的动态如何，它仍然有效，涵盖混合状态域内的马尔可夫和非马尔可夫演化。这种不等式可以被视为热力学速度限制的延伸，通常用不等式表示。对于单个量子位，我们证明这种不等式饱和为严格等式，因为密度矩阵属于量子指数族，泡利矩阵作为足够的统计量。从实践的角度来看，这种恒等式使得连续时间量子过程断层扫描的非迭代线性回归方法成为可能，绕过了非线性优化中常见的局部最小值问题。我们通过估计 Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) 主方程的哈密顿量和耗散参数来证明该方法的效率。数值模拟证实了该几何估计器的有效性，并强调了在逆度量变为奇异的纯状态边界附近消除误差的必要性。", "authors": [{"name": "T. Koide"}, {"name": "A. van de Venn"}], "featured_authors": [{"name": "T. Koide"}, {"name": "A. van de Venn"}], "author_count": 2}, {"id": "2603.23774", "category": "quant-ph", "title": "The quantum harmonic oscillator on a circle -- fragmentation of the algebraic method", "abstract": "A quantum particle on a circle in a quadratic potential exhibits a spectrum that is not harmonic, despite having all algebraic properties of the quantum harmonic oscillator. This raises the question where the usual algebraic argument -- implying integer gaps -- fails. The answer is illuminating and covers a surprisingly rich range of physical phenomena for such a simple model.", "url": "https://arxiv.org/abs/2603.23774", "type": "理论", "summary": "尽管具有量子谐振子的所有代数性质，处于二次势的圆上的量子粒子表现出非谐波光谱。这就提出了一个问题，即通常的代数论证（暗示整数间隙）失败了。对于这样一个简单的模型来说，答案很有启发性，并且涵盖了令人惊讶的丰富的物理现象。", "authors": [{"name": "Daniel Burgarth"}, {"name": "Paolo Facchi"}], "featured_authors": [{"name": "Daniel Burgarth"}, {"name": "Paolo Facchi"}], "author_count": 2}, {"id": "2603.23798", "category": "quant-ph", "title": "Quantum photonic neural networks in time", "abstract": "We introduce the architecture and timing algorithm to realize a time-bin-encoded quantum photonic neural network (QPNN): a reconfigurable nonlinear photonic circuit inspired by the brain and trained to process quantum information. Unlike the typical spatially-encoded QPNN, time-encoded networks require the same number of photonic elements (e.g. phase shifters or switches) regardless of their size or depth. Here, we present a model of such a network and show how to include imperfections such as losses, routing errors and most notably distinguishable photons. As an example, we train the QPNN to realize a controlled-NOT gate, based on a hypothetical ideal Kerr nonlinearity. We then extend our model to a realistic two-photon nonlinearity due to scattering from a single, semiconductor quantum dot coupled to a photonic waveguide. We show that, using this realistic nonlinearity, the QPNN can be trained to act as a Bell-state analyzer which operates with a fidelity of 0.96 and at a rate only limited by losses. We further show that time gating can raise this fidelity to over 0.99, while still maintaining an efficiency exceeding 0.9. Overall, this work lays a framework for the first QPNN encoded in time, and provides a clear path to the scaling of these networks.", "url": "https://arxiv.org/abs/2603.23798", "type": "理论+数值", "summary": "我们介绍了实现时间仓编码的量子光子神经网络（QPNN）的架构和定时算法：一种受大脑启发并经过训练来处理量子信息的可重构非线性光子电路。与典型的空间编码 QPNN 不同，时间编码网络需要相同数量的光子元件（例如移相器或开关），无论其大小或深度如何。在这里，我们提出了此类网络的模型，并展示了如何包含损耗、路由错误和最显着的可区分光子等缺陷。例如，我们基于假设的理想克尔非线性训练 QPNN 以实现受控非门。然后，由于耦合到光子波导的单个半导体量子点的散射，我们将模型扩展到现实的双光子非线性。我们证明，利用这种现实的非线性，QPNN 可以被训练为贝尔状态分析器，其保真度为 0.96，速率仅受损耗限制。我们进一步表明，时间选通可以将保真度提高到 0.99 以上，同时仍然保持超过 0.9 的效率。\n\n总的来说，这项工作为第一个及时编码的 QPNN 奠定了框架，并为这些网络的扩展提供了清晰的路径。", "authors": [{"name": "Ivanna M. Boras Vazquez"}, {"name": "Jacob Ewaniuk"}, {"name": "Nir Rotenberg"}], "featured_authors": [{"name": "Ivanna M. Boras Vazquez"}, {"name": "Jacob Ewaniuk"}, {"name": "Nir Rotenberg"}], "author_count": 3}, {"id": "2603.23804", "category": "quant-ph", "title": "Precision bounds for frequency estimation under collective dephasing and open-loop control", "abstract": "Dephasing noise is a ubiquitous source of decoherence in current atomic sensors. We address the problem of entanglement-assisted frequency estimation subject to classical dephasing noise with full spatial correlations (collective) and arbitrary temporal correlations. Our contributions are threefold. (i) We derive rigorous, state-independent bounds on the achievable estimation precision, showing how they are entirely determined by the short-time behavior of the decoherence function. For temporally uncorrelated (Markovian) dephasing, precision is limited by a probe-independent constant. For temporally correlated stationary noise, the bound approaches the noiseless limit for classical states, precluding any asymptotic quantum advantage. (ii) We show that these scaling bounds are tight, by constructing generalized Ramsey protocols that saturate them. These optimal protocols use squeezing at the input and before readout, both of which are available in state-of-the-art atomic interferometers. Implementing a perfect-echo protocol, which reaches Heisenberg scaling in the absence of noise, remains optimal in this noisy setting, irrespective of the noise temporal correlations. (iii) We prove that arbitrary collective open-loop control cannot lift the no-go for super-classical precision scaling under either Markovian or colored stationary noise, highlighting the detrimental nature of full spatial correlations. In the latter case, temporal correlations may nonetheless enable constant-factor improvements over the standard quantum limit, which may still be important in practical metrological scenarios.", "url": "https://arxiv.org/abs/2603.23804", "type": "理论", "summary": "相移噪声是当前原子传感器中普遍存在的退相干源。我们解决了受经典相移噪声影响的纠缠辅助频率估计问题，具有完全空间相关性（集体）和任意时间相关性。我们的贡献是三重的。 （i）我们对可实现的估计精度推导出严格的、与状态无关的界限，表明它们是如何完全由退相干函数的短时行为决定的。对于时间不相关（马尔可夫）移相，精度受到与探针无关的常数的限制。对于时间相关的稳态噪声，界限接近经典态的无噪声极限，排除了任何渐近量子优势。 (ii) 通过构建使这些扩展范围饱和的广义拉姆齐协议，我们证明了这些扩展范围是严格的。这些最佳协议在输入端和读出前使用压缩，这两种方法都可以在最先进的原子干涉仪中使用。实现完美回波协议，在没有噪声的情况下达到海森堡缩放，在这种噪声环境中仍然是最佳的，无论噪声时间相关性如何。\n\n（iii）我们证明，任意集体开环控制无法在马尔可夫或有色平稳噪声下解除超经典精度缩放的禁区，凸显了完全空间相关性的有害性质。在后一种情况下，时间相关性仍然可以使常数因子改进超过标准量子极限，这在实际计量场景中可能仍然很重要。", "authors": [{"name": "Francisco Riberi"}, {"name": "Gerardo Paz-Silva"}, {"name": "Lorenza Viola"}], "featured_authors": [{"name": "Francisco Riberi"}, {"name": "Gerardo Paz-Silva"}, {"name": "Lorenza Viola"}], "author_count": 3}, {"id": "2603.23936", "category": "quant-ph", "title": "Quantum Computing and Error Mitigation with Deep Learning for Frenkel Excitons", "abstract": "Quantum computers, currently in the noisy intermediate-scale quantum (NISQ) era, have started to provide scientists with a novel tool to explore quantum physics and chemistry. While several electronic systems have been extensively studied, Frenkel excitons, as prototypical optical excitations, remain among the less-explored applications. Here, we first use variational quantum deflation to calculate the eigenstates of the Frenkel Hamiltonian and evaluate the observables based on the oscillator strength for each eigenstate. Furthermore, using NISQ quantum computers requires performing error mitigation techniques alongside simulations. To deal with noisy qubits, we developed a deep-learning-based framework combined with a post-selection technique to learn the noise pattern and mitigate the error. Our mitigation methods work well and outperform the conventional post-selection and remain valid on real hardware.", "url": "https://arxiv.org/abs/2603.23936", "type": "理论+数值", "summary": "目前处于嘈杂的中尺度量子（NISQ）时代的量子计算机已经开始为科学家提供探索量子物理和化学的新工具。虽然一些电子系统已被广泛研究，但弗兰克尔激子作为典型的光学激发，仍然是探索较少的应用。在这里，我们首先使用变分量子紧缩来计算弗伦克尔哈密顿量的本征态，并根据每个本征态的振荡器强度评估可观测量。此外，使用 NISQ 量子计算机需要在模拟的同时执行错误缓解技术。为了处理噪声量子位，我们开发了一个基于深度学习的框架，结合后选择技术来学习噪声模式并减轻错误。我们的缓解方法效果很好，优于传统的后选择，并且在真实硬件上仍然有效。", "authors": [{"name": "Yi-Ting Lee"}, {"name": "Vijaya Begum-Hudde"}, {"name": "Barbara A. Jones"}, {"name": "André Schleife"}], "featured_authors": [{"name": "Yi-Ting Lee"}, {"name": "Vijaya Begum-Hudde"}, {"name": "Barbara A. Jones"}, {"name": "André Schleife"}], "author_count": 4}, {"id": "2603.23999", "category": "quant-ph", "title": "Experimental Demonstration of a Brachistochrone Nonadiabatic Holonomic Quantum-Gate Scheme in a Trapped Ion", "abstract": "Nonadiabatic holonomic quantum computation (NHQC) offers intrinsic resilience to certain control imperfections. However, conventional nonadiabatic holonomic protocols are constrained by the fixed-pulse-area condition, which limits flexibility and prolongs duration of small-angle gates. Here we experimentally demonstrate a universal brachistochrone nonadiabatic holonomic quantum gate scheme in a trapped 40Ca+ ion, and realized the construction of pX gate under the conventional NHQC, brachistochrone NHQC (BNHQC) and composite BNHQC (CBNHQC) protocols. By characterizing the performance of gate performance in the presence of dissipation, Rabi-frequency errors and detuning errors, we show that BNHQC and CBNHQC outperform conventional NHQC, and BNHQC can offer a favorable balance between operation speed and robustness. It further shows that keeping high fidelity and strong robustness need decrease the accumulated population of excited state in the evolution process. These results highlight nonadiabatic holonomic computation as a practical route toward fast and robust quantum gates in trapped-ion platforms.", "url": "https://arxiv.org/abs/2603.23999", "type": "实验", "summary": "非绝热完整量子计算 (NHQC) 为某些控制缺陷提供了内在的弹性。然而，传统的非绝热完整协议受到固定脉冲面积条件的限制，这限制了灵活性并延长了小角度门的持续时间。在这里，我们通过实验证明了一种捕获40Ca+离子的通用速速非绝热完整量子门方案，并实现了传统NHQC、速速NHQC（BNHQC）和复合BNHQC（CBNHQC）协议下pX门的构建。通过表征存在耗散、拉比频率误差和失谐误差的情况下的栅极性能，我们表明 BNHQC 和 CBNHQC 优于传统 NHQC，并且 BNHQC 可以在运行速度和鲁棒性之间提供良好的平衡。进一步表明，保持高保真度和强鲁棒性需要减少进化过程中激发态的累积数量。这些结果强调非绝热完整计算是在离子捕获平台中实现快速、鲁棒量子门的实用途径。", "authors": [{"name": "Xi Wang"}, {"name": "Hui Ren"}, {"name": "L.-N. Sun"}, {"name": "K.-F. Cui"}, {"name": "J.-T. Bu"}, {"name": "S.-L. Su"}, {"name": "L.-L. Yan"}, {"name": "G. Chen"}], "featured_authors": [{"name": "Xi Wang"}, {"name": "Hui Ren"}, {"name": "L.-N. Sun"}, {"name": "S.-L. Su"}, {"name": "L.-L. Yan"}, {"name": "G. Chen"}], "author_count": 8}, {"id": "2603.24017", "category": "quant-ph", "title": "A conjecture on a tight norm inequality in the finite-dimensional l_p", "abstract": "We suggest a tight inequality for norms in $d$-dimensional space $l_p $ which has simple formulation but appears hard to prove. We give a proof for $d=3$ and provide a detailed numerical check for $d\\leq 200$ confirming the conjecture. We conclude with a brief survey of solutions for kin problems which anyhow concern minimization of the output entropy of certain quantum channel and rely upon the symmetry properties of the problem. Key words and phrases: $l_p $-norm, Rényi entropy, tight inequality, maximization of a convex function.", "url": "https://arxiv.org/abs/2603.24017", "type": "理论+数值", "summary": "我们建议 $d$ 维空间 $l_p $ 中的范数具有严格的不等式，其公式很简单，但似乎很难证明。我们给出了 $d=3$ 的证明，并提供了 $d\\leq 200$ 的详细数值检查，证实了这个猜想。最后，我们对 kin 问题的解决方案进行了简要调查，无论如何，这些问题都涉及某些量子通道的输出熵的最小化并依赖于问题的对称性。关键词和短语：$l_p $-范数、Rényi 熵、紧不等式、凸函数的最大化。", "authors": [{"name": "A. S. Holevo"}, {"name": "A. V. Utkin"}], "featured_authors": [{"name": "A. S. Holevo"}, {"name": "A. V. Utkin"}], "author_count": 2}, {"id": "2603.24032", "category": "quant-ph", "title": "Parameter trajectory engineering for state transfer and quantum sensing in non-Hermitian two-level systems", "abstract": "Exceptional points (EPs) in non-Hermitian systems give rise to enhanced sensitivity and chiral state transfer, which are important for quantum technologies. Although parameter trajectories encircling EPs can control symmetric and chiral state transfer, their robustness against practical perturbations and their role in quantum sensing remain largely unexplored. Here, we study three time-modulated parameter loops in a non-Hermitian two-level system to show how trajectory design governs state-transfer symmetry, robustness, and sensing performance. Trajectories avoiding the EP support robust symmetric transfer, while those encircling the EP yield chiral transfer governed by the topological winding number, whose robustness depends on the distance to the EP and the encircling direction. For quantum sensing, trajectory engineering enables tuning of sensitivity amplitude, time window, and parameter selectivity in both eigenvalue-based and eigenstate-based sensors. Notably, eigenstate-based sensing achieves full parameter selectivity that is unattainable with eigenvalue-based methods. Our results establish a quantitative connection between trajectory topology and system dynamics, providing a unified framework for robust state-transfer protocols and high-performance quantum sensors.", "url": "https://arxiv.org/abs/2603.24032", "type": "理论", "summary": "非厄米系统中的例外点 (EP) 会提高灵敏度和手性状态转移，这对于量子技术非常重要。尽管围绕 EP 的参数轨迹可以控制对称和手性状态转移，但它们对实际扰动的鲁棒性及其在量子传感中的作用在很大程度上仍未得到探索。在这里，我们研究非厄米二能级系统中的三个时间调制参数循环，以展示轨迹设计如何控制状态转移对称性、鲁棒性和传感性能。避开 EP 的轨迹支持鲁棒的对称转移，而环绕 EP 的轨迹则产生由拓扑缠绕数控制的手性转移，其鲁棒性取决于到 EP 的距离和环绕方向。对于量子传感，轨迹工程可以调整基于特征值和基于特征态的传感器中的灵敏度幅度、时间窗口和参数选择性。值得注意的是，基于本征态的传感实现了基于本征值的方法无法实现的完整参数选择性。\n\n我们的结果在轨迹拓扑和系统动力学之间建立了定量联系，为稳健的状态转移协议和高性能量子传感器提供了统一的框架。", "authors": [{"name": "Qi-Cheng Wu"}, {"name": "Yan-Hui Zhou"}, {"name": "Biao-liang Ye"}, {"name": "Tong Liu"}, {"name": "Yi-Hao Kang"}, {"name": "Qi-Ping Su"}, {"name": "Chui-Ping Yang"}], "featured_authors": [{"name": "Qi-Cheng Wu"}, {"name": "Yan-Hui Zhou"}, {"name": "Biao-liang Ye"}, {"name": "Yi-Hao Kang"}, {"name": "Qi-Ping Su"}, {"name": "Chui-Ping Yang"}], "author_count": 7}, {"id": "2603.24069", "category": "quant-ph", "title": "Learning Quantum-Samplers for Stochastic Processes with Quantum Sequence Models", "abstract": "Quantum circuits that generate coherent superpositions of stochastic processes are key to many downstream quantum-accelerated tasks, such as risk analysis, importance sampling, and DNA sequencing. However, traditional methods for designing such circuits from data face immense challenges, given the exponential growth in the size of the associated probability vectors as the desired simulation time horizon increases. Here, we introduce quantum sequence models that leverage a recurrent quantum circuit structure to generate coherent superpositions with circuit complexity that grows linearly with the desired time horizon; together with a recurrent variant of the parameter-shift rule, we train these models from observational data. When benchmarked against baseline quantum Born machines, our constructions exhibit orders-of-magnitude improvements in model accuracy in data-sparse regimes.", "url": "https://arxiv.org/abs/2603.24069", "type": "理论+数值", "summary": "生成随机过程相干叠加的量子电路是许多下游量子加速任务的关键，例如风险分析、重要性采样和 DNA 测序。然而，考虑到随着所需仿真时间范围的增加，相关概率向量的大小呈指数增长，根据数据设计此类电路的传统方法面临着巨大的挑战。在这里，我们引入了量子序列模型，该模型利用循环量子电路结构来生成相干叠加，其电路复杂性随所需时间范围线性增长；与参数转移规则的循环变体一起，我们从观测数据训练这些模型。当以基线量子 Born 机器为基准时，我们的结构在数据稀疏的情况下表现出模型准确性的数量级改进。", "authors": [{"name": "Ximing Wang"}, {"name": "Chengran Yang"}, {"name": "Chidambaram Aditya Somasundaram"}, {"name": "Jayne Thompson"}, {"name": "Mile Gu"}], "featured_authors": [{"name": "Ximing Wang"}, {"name": "Chengran Yang"}, {"name": "Chidambaram Aditya Somasundaram"}, {"name": "Jayne Thompson"}, {"name": "Mile Gu"}], "author_count": 5}, {"id": "2603.24140", "category": "quant-ph", "title": "A Longitudinal Analysis of the CEC Single-Objective Competitions (2010-2024) and Implications for Variational Quantum Optimization", "abstract": "This paper provides a historical analysis of the IEEE CEC Single Objective Optimization competition results (2010-2024). We analyze how benchmark functions shaped winning algorithms, identifying the 2014 introduction of dense rotation matrices as a key performance filter. This design choice introduced parameter non-separability, reduced effectiveness of coordinate-dependent methods (PSO, GA), and established the dominance of Differential Evolution variants capable of preserving the rotational invariance of their difference vectors, specifically L-SHADE. Post-2020 analysis reveals a shift towards high complexity hybrid optimizers that combine different mechanisms (e.g., Eigenvector Crossover, Societal Sharing, Reinforcement Learning) to maximize ranking stability. We conclude by identifying structural similarities between these modern benchmarks and Variational Quantum Algorithm landscapes, suggesting that evolved CEC solvers possess the specific adaptive capabilities required for quantum control.", "url": "https://arxiv.org/abs/2603.24140", "type": "理论+数值", "summary": "本文提供了 IEEE CEC 单目标优化竞赛结果（2010-2024 年）的历史分析。我们分析了基准函数如何塑造获胜算法，并将 2014 年引入的密集旋转矩阵确定为关键性能过滤器。这种设计选择引入了参数不可分离性，降低了坐标相关方法（PSO、GA）的有效性，并确立了能够保持差异向量旋转不变性的差分进化变体的主导地位，特别是 L-SHADE。 2020 年后的分析揭示了向高复杂性混合优化器的转变，这些优化器结合了不同的机制（例如特征向量交叉、社会共享、强化学习）以最大限度地提高排名稳定性。我们通过识别这些现代基准和变分量子算法景观之间的结构相似性得出结论，表明进化的 CEC 求解器拥有量子控制所需的特定自适应能力。", "authors": [{"name": "Vojtěch Novák"}, {"name": "Tomáš Bezděk"}, {"name": "Ivan Zelinka"}, {"name": "Swagatam Das"}, {"name": "Martin Beseda"}], "featured_authors": [{"name": "Vojtěch Novák"}, {"name": "Tomáš Bezděk"}, {"name": "Ivan Zelinka"}, {"name": "Swagatam Das"}, {"name": "Martin Beseda"}], "author_count": 5}, {"id": "2603.24196", "category": "quant-ph", "title": "Quantum Neural Physics: Solving Partial Differential Equations on Quantum Simulators using Quantum Convolutional Neural Networks", "abstract": "In scientific computing, the formulation of numerical discretisations of partial differential equations (PDEs) as untrained convolutional layers within Convolutional Neural Networks (CNNs), referred to by some as Neural Physics, has demonstrated good efficiency for executing physics-based solvers on GPUs. However, classical grid-based methods still face computational bottlenecks when solving problems involving billions of degrees of freedom. To address this challenge, this paper proposes a novel framework called 'Quantum Neural Physics' and develops a Hybrid Quantum-Classical CNN Multigrid Solver (HQC-CNNMG). This approach maps analytically-determined stencils of discretised differential operators into parameter-free or untrained quantum convolutional kernels. By leveraging amplitude encoding, the Linear Combination of Unitaries technique and the Quantum Fourier Transform, the resulting quantum convolutional operators can be implemented using quantum circuits with a circuit depth that scales as O(log K), where K denotes the size of the encoded input block. These quantum operators are embedded into a classical W-Cycle multigrid using a U-Net. This design enables seamless integration of quantum operators within a hierarchical solver whilst retaining the robustness and convergence properties of classical multigrid methods. The proposed Quantum Neural Physics solver is validated on a quantum simulator for the Poisson equation, diffusion equation, convection-diffusion equation and incompressible Navier-Stokes equations. The solutions of the HQC-CNNMG are in close agreement with those from traditional solution methods. This work establishes a mapping from discretised physical equations to logarithmic-scale quantum circuits, providing a new and exploratory path to exponential memory compression and computational acceleration for PDE solvers on future fault-tolerant quantum computers.", "url": "https://arxiv.org/abs/2603.24196", "type": "理论+数值", "summary": "在科学计算中，将偏微分方程 (PDE) 的数值离散化表述为卷积神经网络 (CNN) 中未经训练的卷积层（某些人称为神经物理），已证明在 GPU 上执行基于物理的求解器具有良好的效率。然而，经典的基于网格的方法在解决涉及数十亿自由度的问题时仍然面临计算瓶颈。为了应对这一挑战，本文提出了一种名为“量子神经物理”的新颖框架，并开发了混合量子经典 CNN 多重网格求解器 (HQC-CNNMG)。这种方法将离散微分算子的分析确定模板映射到无参数或未经训练的量子卷积核。通过利用幅度编码、酉线性组合技术和量子傅立叶变换，可以使用电路深度为 O(log K) 的量子电路来实现所得的量子卷积算子，其中 K 表示编码输入块的大小。这些量子算子使用 U-Net 嵌入到经典的 W 循环多重网格中。\n\n这种设计能够将量子算子无缝集成到分层求解器中，同时保留经典多重网格方法的鲁棒性和收敛特性。所提出的量子神经物理求解器在量子模拟器上针对泊松方程、扩散方程、对流扩散方程和不可压缩纳维-斯托克斯方程进行了验证。 HQC-CNNMG 的解与传统求解方法的解非常一致。这项工作建立了从离散物理方程到对数尺度量子电路的映射，为未来容错量子计算机上的偏微分方程求解器提供了一条新的探索性路径，以实现指数内存压缩和计算加速。", "authors": [{"name": "Jucai Zhai"}, {"name": "Muhammad Abdullah"}, {"name": "Boyang Chen"}, {"name": "Fazal Chaudry"}, {"name": "Paul N. Smith"}, {"name": "Claire E. Heaney"}, {"name": "Yanghua Wang"}, {"name": "Jiansheng Xiang"}, {"name": "Christopher C. Pain"}], "featured_authors": [{"name": "Jucai Zhai"}, {"name": "Muhammad Abdullah"}, {"name": "Boyang Chen"}, {"name": "Yanghua Wang"}, {"name": "Jiansheng Xiang"}, {"name": "Christopher C. Pain"}], "author_count": 9}, {"id": "2603.24205", "category": "quant-ph", "title": "Mitigating Dynamic Crosstalk with Optimal Control", "abstract": "The prevalence of quantum crosstalk is an important barrier to scaling frequency-addressable qubit architectures, with dynamic crosstalk being particularly difficult to detect and suppress. This form of crosstalk refers to unintended interactions driven by the gate control fields themselves. Here, we minimize dynamic crosstalk using quantum optimal control based on the perfect entangler spectrum, where spectral peaks signal unwanted entanglement with spectator qubits. Focusing on parametric gates in tunable coupler systems, we derive pulse shapes that eliminate dynamic crosstalk. Remarkably, only minimal pulse modifications are required to mitigate the form of crosstalk that is otherwise most difficult to predict. The ability to suppress dynamic crosstalk via the perfect entangler spectrum establishes a generalizable control principle for eliminating unwanted interactions in quantum hardware.", "url": "https://arxiv.org/abs/2603.24205", "type": "理论", "summary": "量子串扰的普遍存在是扩展频率可寻址量子位架构的一个重要障碍，动态串扰尤其难以检测和抑制。这种形式的串扰是指由栅极控制场本身驱动的意外相互作用。在这里，我们使用基于完美纠缠器频谱的量子最优控制来最小化动态串扰，其中频谱峰值表示与观察量子位的不必要的纠缠。我们专注于可调谐耦合器系统中的参数门，得出消除动态串扰的脉冲形状。值得注意的是，只需进行最小的脉冲修改即可减轻最难以预测的串扰形式。通过完美的纠缠器光谱抑制动态串扰的能力建立了一个可推广的控制原理，用于消除量子硬件中不需要的相互作用。", "authors": [{"name": "Matthias G. Krauss"}, {"name": "Luise C. Butzke"}, {"name": "Christiane P. Koch"}], "featured_authors": [{"name": "Matthias G. Krauss"}, {"name": "Luise C. Butzke"}, {"name": "Christiane P. Koch"}], "author_count": 3}, {"id": "2603.24225", "category": "quant-ph", "title": "Large deviations and conditioned monitored quantum systems: a tensor network approach", "abstract": "Coexistence of different dynamical phases is a hallmark of glassy dynamics. This is well-studied in classical systems where the underlying theoretical framework is that of large deviation theory. The presence of a similar phase coexistence has been suggested in monitored quantum many-body systems, but the lack of suitable methods has yet prevented a systematic large deviation analysis. Here we present a tensor network framework that allows the application of large deviation theory to large quantum systems. Building on this, we locate a series of first-order dynamical phase transitions in a monitored discrete-time many-body quantum dynamics, at the level of the trajectory space. Crucially, our approach provides access not only to large-deviation statistics but also to conditioned quantum many-body states, enabling a microscopic characterization of the dynamical phases and their coexistence.", "url": "https://arxiv.org/abs/2603.24225", "type": "理论+数值", "summary": "不同动力学相的共存是玻璃动力学的标志。这在经典系统中得到了充分研究，其基本理论框架是大偏差理论。在受监控的量子多体系统中已经表明存在类似的相位共存，但由于缺乏合适的方法，尚未阻止系统性大偏差分析。在这里，我们提出了一个张量网络框架，允许将大偏差理论应用于大型量子系统。在此基础上，我们在轨迹空间层面上在受监控的离散时间多体量子动力学中定位了一系列一阶动态相变。至关重要的是，我们的方法不仅提供了大偏差统计数据，还提供了条件量子多体态，从而能够对动力学相及其共存进行微观表征。", "authors": [{"name": "María Cea"}, {"name": "Marcel Cech"}, {"name": "Federico Carollo"}, {"name": "Igor Lesanovsky"}, {"name": "Mari Carmen Bañuls"}], "featured_authors": [{"name": "María Cea"}, {"name": "Marcel Cech"}, {"name": "Federico Carollo"}, {"name": "Igor Lesanovsky"}, {"name": "Mari Carmen Bañuls"}], "author_count": 5}, {"id": "2603.24298", "category": "quant-ph", "title": "SpinGQE: A Generative Quantum Eigensolver for Spin Hamiltonians", "abstract": "The ground state search problem is central to quantum computing, with applications spanning quantum chemistry, condensed matter physics, and optimization. The Variational Quantum Eigensolver (VQE) has shown promise for small systems but faces significant limitations. These include barren plateaus, restricted ansatz expressivity, and reliance on domain-specific structure. We present SpinGQE, an extension of the Generative Quantum Eigensolver (GQE) framework to spin Hamiltonians. Our approach reframes circuit design as a generative modeling task. We employ a transformer-based decoder to learn distributions over quantum circuits that produce low-energy states. Training is guided by a weighted mean-squared error loss between model logits and circuit energies evaluated at each gate subsequence. We validate our method on the four-qubit Heisenberg model, demonstrating successfulconvergencetonear-groundstates. Throughsystematichyperparameterexploration, we identify optimal configurations: smaller model architectures (12 layers, 8 attention heads), longer sequence lengths (12 gates), and carefully chosen operator pools yield the most reliable convergence. Our results show that generative approaches can effectively navigate complex energy landscapes without relying on problem-specific symmetries or structure. This provides a scalable alternative to traditional variational methods for general quantum systems. An open-source implementation is available at this https URL .", "url": "https://arxiv.org/abs/2603.24298", "type": "理论+数值", "summary": "基态搜索问题是量子计算的核心，其应用涵盖量子化学、凝聚态物理和优化。变分量子本征解算器 (VQE) 在小型系统中展现出了良好的前景，但也面临着巨大的局限性。其中包括贫瘠的高原、受限的 ansatz 表达能力以及对特定领域结构的依赖。我们提出了 SpinGQE，它是生成量子本征求解器 (GQE) 框架的扩展，用于旋转哈密顿量。我们的方法将电路设计重新定义为生成建模任务。我们采用基于变压器的解码器来学习产生低能态的量子电路上的分布。训练由模型逻辑和每个门子序列评估的电路能量之间的加权均方误差损失来指导。我们在四量子位海森堡模型上验证了我们的方法，证明了近基态的成功收敛。通过系统的超参数探索，我们确定了最佳配置：较小的模型架构（12 层、8 个注意力头）、较长的序列长度（12 个门）以及精心选择的算子池可产生最可靠的收敛。\n\n我们的结果表明，生成方法可以有效地驾驭复杂的能源景观，而不依赖于特定问题的对称性或结构。这为一般量子系统提供了传统变分方法的可扩展替代方案。此 https URL 提供了开源实现。", "authors": [{"name": "Alexander Holden"}, {"name": "Moinul Hossain Rahat"}, {"name": "Nii Osae Osae Dade"}], "featured_authors": [{"name": "Alexander Holden"}, {"name": "Moinul Hossain Rahat"}, {"name": "Nii Osae Osae Dade"}], "author_count": 3}, {"id": "2603.24342", "category": "quant-ph", "title": "Strong-to-Weak Spontaneous Symmetry Breaking in a $(2+1)$D Transverse-Field Ising Model under Decoherence", "abstract": "Decoherence in many-body quantum systems can give rise to intrinsically mixed-state phases and phase transitions beyond the pure-state paradigm. Here we study the $(2+1)$D transverse-field Ising model subject to a strongly $\\mathbb{Z}_2$-symmetric decoherence channel, with a focus on strong-to-weak spontaneous symmetry breaking (SWSSB). This problem is challenging because the relevant transitions occur in the strong-decoherence regime, beyond the reach of perturbative expansions around the pure-state limit, while conventional quantum Monte Carlo (QMC) methods are hampered by the need to access nonlinear observables and by the sign problem. We overcome these difficulties by developing a QMC algorithm that efficiently evaluates nonlinear Rényi-2 correlators in higher dimensions, complemented by an effective field-theoretic approach. We show that the decohered state realizes a rich mixed-state phase diagram governed by an effective 2D Ashkin-Teller theory. This theory enables analytical predictions for the mixed-state phases and the universality classes of the phase boundaries, all of which are confirmed by large-scale QMC simulations.", "url": "https://arxiv.org/abs/2603.24342", "type": "理论+数值", "summary": "多体量子系统中的退相干可以产生本质上的混合态相和超出纯态范式的相变。在这里，我们研究受强 $\\mathbb{Z}_2$ 对称退相干通道影响的 $(2+1)$D 横向场 Ising 模型，重点关注强到弱自发对称破缺 (SWSSB)。这个问题具有挑战性，因为相关转变发生在强退相干状态中，超出了纯态极限附近的微扰展开的范围，而传统的量子蒙特卡罗（QMC）方法因需要访问非线性可观测量和符号问题而受到阻碍。我们通过开发一种 QMC 算法克服了这些困难，该算法可以有效地评估更高维度的非线性 Rényi-2 相关器，并辅以有效的场论方法。我们证明，退相干态实现了由有效的二维 Ashkin-Teller 理论控制的丰富的混合态相图。该理论可以对混合态相和相边界的普遍性类别进行分析预测，所有这些都已通过大规模 QMC 模拟得到证实。", "authors": [{"name": "Yi-Ming Ding"}, {"name": "Yuxuan Guo"}, {"name": "Zhen Bi"}, {"name": "Zheng Yan"}], "featured_authors": [{"name": "Yi-Ming Ding"}, {"name": "Yuxuan Guo"}, {"name": "Zhen Bi"}, {"name": "Zheng Yan"}], "author_count": 4}, {"id": "2603.24345", "category": "quant-ph", "title": "Robust Parametric Quantum Gate Against Stochastic Time-Varying Noise", "abstract": "The performance of quantum processors in the noisy intermediate-scale quantum (NISQ) era is severely constrained by environmental noise and other uncertainties. While the recently proposed quantum control robustness landscape (QCRL) offers a powerful framework for generating robust control pulses for
