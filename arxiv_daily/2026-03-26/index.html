  <style>

  <script>
    const papers = [{"id": "2603.23605", "category": "cond-mat", "title": "Dynamical magnetic breakdown and quantum oscillations from hot spot scattering", "abstract": "Quantum oscillations (QO) are a well-established probe of Fermi-surface (FS) geometry and in the presence of long-range density wave order can display new QO frequencies from reconstructed FS pockets. We show that such reconstructed frequencies can arise even in the absence of long-range density order. Considering electrons coupled to a fluctuating bosonic mode that scatters quasiparticles between sharp hot spots on the FS, we develop a semiclassical theory in which the interaction generates time-dependent tunneling processes analogous to magnetic breakdown. This dynamical magnetic breakdown produces new semiclassical orbits corresponding to reconstructed FS areas despite the absence of static order. Because tunneling probabilities depend on the thermal population of bosonic excitations, the resulting oscillation amplitudes exhibit characteristic deviations from standard Lifshitz-Kosevich behavior. Our results provide a mechanism to probe bosonic fluctuations in quantum critical metals and provide a framework for dynamical magnetic breakdown.", "url": "https://arxiv.org/abs/2603.23605", "type": "理论+数值", "summary": "量子振荡 (QO) 是一种成熟的费米面 (FS) 几何探针，在存在长程密度波序的情况下，可以从重建的 FS 口袋中显示新的 QO 频率。我们证明，即使在没有长程密度序的情况下，这种重建频率也可能出现。考虑到电子耦合到波动玻色子模式，该模式在FS上的尖锐热点之间散射准粒子，我们开发了一种半经典理论，其中相互作用产生类似于磁击穿的时间依赖性隧道过程。尽管不存在静态顺序，这种动态磁击穿仍会产生与重建的 FS 区域相对应的新半经典轨道。由于隧道概率取决于玻色子激发的热布居，因此产生的振荡幅度表现出与标准 Lifshitz-Kosevich 行为的特征偏差。我们的结果提供了一种探测量子临界金属中玻色子涨落的机制，并为动态磁击穿提供了框架。", "authors": [{"name": "Léo Mangeolle"}, {"name": "Johannes Knolle"}], "featured_authors": [{"name": "Léo Mangeolle"}, {"name": "Johannes Knolle"}], "author_count": 2}, {"id": "2603.23615", "category": "cond-mat", "title": "Behaviour of the model antibody fluid constrained by rigid spherical obstacles: effects of the obstacle-antibody binding", "abstract": "We study a simplified model of monoclonal antibodies confined in a patchy random porous medium. Antibodies are represented as Y-shaped particles composed of seven tangential hard spheres with attractive patches on the terminal beads, while the matrix consists of randomly distributed hard-sphere obstacles bearing adhesive sites. The model captures antibody behavior in crowded biological environments with strong short-range antibody-matrix attractions. The theoretical approach combines Wertheim's multidensity thermodynamic perturbation theory, the Flory-Stockmayer theory of polymerization, and scaled particle theory for fluids in porous media. We analyze thermodynamic properties, percolation thresholds, and phase behavior, and compare the selected results with new computer simulations. The interplay between antibody-antibody and antibody-matrix interactions produces a complex phase behavior, including re-entrant phase separation with a closed-loop coexistence region at higher temperatures and conventional liquid-gas separation at lower temperatures.", "url": "https://arxiv.org/abs/2603.23615", "type": "理论+数值", "summary": "我们研究了限制在斑块随机多孔介质中的单克隆抗体的简化模型。抗体表示为 Y 形颗粒，由七个切向硬球组成，末端珠子上有吸引人的斑块，而基质由随机分布的带有粘合位点的硬球障碍物组成。该模型捕捉了具有强大的短程抗体基质吸引力的拥挤生物环境中的抗体行为。该理论方法结合了 Wertheim 的多密度热力学微扰理论、Flory-Stockmayer 聚合理论以及多孔介质中流体的缩放粒子理论。我们分析热力学性质、渗流阈值和相行为，并将所选结果与新的计算机模拟进行比较。抗体-抗体和抗体-基质相互作用之间的相互作用产生复杂的相行为，包括在较高温度下具有闭环共存区域的再进入相分离和在较低温度下的传统液-气分离。", "authors": [{"name": "Yu. V. Kalyuzhnyi"}, {"name": "T. Patsahan"}], "featured_authors": [{"name": "Yu. V. Kalyuzhnyi"}, {"name": "T. Patsahan"}], "author_count": 2}, {"id": "2603.23616", "category": "cond-mat", "title": "Fading ergodicity and quantum dynamics in random matrix ensembles", "abstract": "Recent work has proposed fading ergodicity as a mechanism for many-body ergodicity breaking. Here, we show that two paradigmatic random matrix ensembles -- the Rosenzweig-Porter model and the ultrametric model -- fall within the same universality class of ergodicity breaking when embedded in a many-body Hilbert space of spins-1/2. By calibrating the parameters of both models via their Thouless times, we demonstrate that the matrix elements of local observables display similar statistical properties, allowing us to identify the fractal phase of the Rosenzweig-Porter model with the fading-ergodicity regime. This correspondence is further supported through the analyses of quantum-quench dynamics of local observables, their temporal fluctuations and power spectra, and survival probabilities. Our findings reveal that local observables thermalize within the fading-ergodicity regime on timescales shorter than the Heisenberg time, thus providing a unified framework for understanding ergodicity breaking across these distinct models.", "url": "https://arxiv.org/abs/2603.23616", "type": "理论", "summary": "最近的工作提出了衰落遍历性作为多体遍历性破坏的机制。在这里，我们证明了两个范式随机矩阵系综——Rosenzweig-Porter 模型和超度量模型——当嵌入到自旋 1/2 的多体希尔伯特空间中时，属于遍历性破坏的相同普遍性类别。通过通过 Thouless 时间校准两个模型的参数，我们证明了局部可观测量的矩阵元素显示出相似的统计特性，使我们能够识别具有衰落遍历性机制的 Rosenzweig-Porter 模型的分形相。通过对局部可观测量的量子淬灭动力学、它们的时间波动和功率谱以及生存概率的分析，进一步支持了这种对应关系。我们的研究结果表明，局部可观测量在比海森堡时间更短的时间尺度上的衰落遍历性范围内热化，从而为理解突破这些不同模型的遍历性提供了一个统一的框架。", "authors": [{"name": "Rafał Świętek"}, {"name": "Maksymilian Kliczkowski"}, {"name": "Miroslav Hopjan"}, {"name": "Lev Vidmar"}], "featured_authors": [{"name": "Rafał Świętek"}, {"name": "Maksymilian Kliczkowski"}, {"name": "Miroslav Hopjan"}, {"name": "Lev Vidmar"}], "author_count": 4}, {"id": "2603.23632", "category": "cond-mat", "title": "Electronic structure of Gd-based intermetallics GdCu$_2$Ge$_2$ and GdCuAl$_3$", "abstract": "We present a temperature-dependent reflectivity study of single crystals of the ternary intermetallic compounds GdCu$_2$Ge$_2$ and GdCuAl$_3$ over a broad spectral range (100-18000 cm$^{-1}$, equivalent to 12 meV-2.23 eV) down to 13 K. Below 2000 cm$^{-1}$, the optical spectra are dominated by the response of itinerant charge carriers exhibiting two distinct scattering rates. While the response of the slow charge carriers shows negligible temperature dependence, the more mobile carriers follow the dc resistivity and are significantly suppressed in GdCuAl$_3$, consistent with the higher resistivity of this compound. We attribute this behavior to enhanced electronic correlations arising from the proximity of the Fermi level to van Hove singularities. Supported by density-functional-theory calculations, we further show that elemental substitution can be described as a rigid shift of the Fermi level, i.e., doping, whereas changes in the crystalline symmetry have only minor effects on the electronic structure.", "url": "https://arxiv.org/abs/2603.23632", "type": "理论+数值", "summary": "我们对三元金属间化合物 GdCu$_2$Ge$_2$ 和 GdCuAl$_3$ 的单晶在宽光谱范围（100-18000 cm$^{-1}$，相当于 12 meV-2.23 eV）低至 13 K 进行了温度依赖性反射率研究。低于 2000 cm$^{-1}$，光谱主要由流动电荷的响应决定载流子表现出两种不同的散射率。虽然慢速载流子的响应显示出可忽略不计的温度依赖性，但更多的移动载流子遵循直流电阻率，并且在 GdCuAl$_3$ 中被显着抑制，这与该化合物的较高电阻率一致。我们将这种行为归因于费米能级接近范霍夫奇点而产生的增强的电子相关性。在密度泛函理论计算的支持下，我们进一步表明，元素取代可以描述为费米能级的刚性移动，即掺杂，而晶体对称性的变化对电子结构仅产生很小的影响。", "authors": [{"name": "M. Pinterić"}, {"name": "M. Dressel"}, {"name": "M. Wenzel"}, {"name": "P. Puphal"}], "featured_authors": [{"name": "M. Pinterić"}, {"name": "M. Dressel"}, {"name": "M. Wenzel"}, {"name": "P. Puphal"}], "author_count": 4}, {"id": "2603.23703", "category": "cond-mat", "title": "Ordering in Confined Two-Dimensional Nematic Systems: Mesoscopic Simulations Based on Different Mean-Field Potentials", "abstract": "We use nematic Multi-particle Collision Dynamics (N-MPCD) simulations to study confined nematic liquid crystals in square domains, with three distinct mean-field potentials: the classical Maier-Saupe and Marrucci-Greco models, and a more recent model due to Ilg, Karlin, and Öttinger. These potentials incorporate diverse physical features, including spatial gradients and nonlinear dependencies on the order parameter, to describe nematic ordering at mesoscopic scales. We derive coarse-grained equations from a Fokker-Planck description with tensorial closures, and analyse the emergence of order as a function of interaction strength, $U$, in two dimensions. The critical interaction strength depends on the choice of the mean-field potential. We also analytically estimate the nematic coherence length in three dimensions, to establish a rigorous correspondence between the N-MPCD parameters (the system size $R$ and $U$) and the continuum Landau-de Gennes theoretical parameters. We systematically study equilibrium and metastable configurations, including relaxation pathways to stable equilibria, on square domains, for all three mean-field potentials. Our results confirm universal equilibrium and metastable configurations for all three mean-field potentials. Our results also suggest that the N-MPCD predictions are consistent with the continuum Landau-de Gennes predictions, regardless of the choice of the underlying mean-field potential and approximations, for large $R$ and $U$. There are differences for small $R$ and for $U$ near the critical interaction strength, that need to be further explored and quantified for new-age multiscale and multiphysics theories.", "url": "https://arxiv.org/abs/2603.23703", "type": "理论+数值", "summary": "我们使用向列多粒子碰撞动力学 (N-MPCD) 模拟来研究方形域中的受限向列液晶，具有三种不同的平均场势：经典的 Maier-Saupe 和 Marrucci-Greco 模型，以及 Ilg、Karlin 和 Öttinger 提出的更新模型。这些势结合了不同的物理特征，包括空间梯度和有序参数的非线性依赖性，以描述介观尺度的向列有序。我们从带有张量闭包的 Fokker-Planck 描述中推导出粗粒度方程，并分析二维中作为相互作用强度 $U$ 函数的有序性的出现。临界相互作用强度取决于平均场势的选择。我们还分析估计了三个维度的向列相干长度，以在 N-MPCD 参数（系统尺寸 $R$ 和 $U$）与连续介质 Landau-de Gennes 理论参数之间建立严格的对应关系。我们系统地研究了所有三个平均场势的平衡和亚稳态构型，包括方形域上达到稳定平衡的弛豫路径。\n\n我们的结果证实了所有三种平均场势的普遍平衡和亚稳态配置。我们的结果还表明，对于较大的 $R$ 和 $U$，无论底层平均场势和近似值的选择如何，N-MPCD 预测都与连续性 Landau-de Gennes 预测一致。小$R$和接近临界相互作用强度的$U$存在差异，需要进一步探索和量化新时代多尺度和多物理理论。", "authors": [{"name": "Humberto Híjar"}, {"name": "Apala Majumdar"}], "featured_authors": [{"name": "Humberto Híjar"}, {"name": "Apala Majumdar"}], "author_count": 2}, {"id": "2603.23758", "category": "cond-mat", "title": "Quantum-classical dynamics of Rashba spin-orbit coupling", "abstract": "Mixed quantum-classical models are widely used to reduce the computational cost of fully quantum simulations. However, their general applicability across different classes of problems remains an open question. Here, we address this issue for systems featuring spin-orbit coupling. In particular, we study the interaction dynamics of quantum spin-1/2 and classical orbital momentum in one-dimensional models of Rashba nanowires. We tackle this problem by resorting to a new quantum-classical Hamiltonian model that, unlike conventional approaches, retains the Heisenberg principle and captures correlation effects beyond the common Ehrenfest approach. Based on Koopman wavefunctions in classical mechanics, the new model was recently implemented numerically via a particle scheme -- the koopmon method -- which is extended here to treat spin-orbit coupling. We apply the koopmon method to study the quantum-classical dynamics of nanowire models, with and without the presence of a harmonic potential and in both Rashba-dominated (strong coupling) and Zeeman-dominated (weak coupling) regimes. Considering realistic semiconductor parameters, the results are contrasted with both fully quantum and quantum-classical Ehrenfest dynamics. In the absence of external potential, the koopmon method qualitatively reproduces the features of the fully quantum evolution for all coupling regimes. While it exhibits a slight loss in spin accuracy compared to Ehrenfest simulations, the latter fail to capture the orbital dynamics. In the presence of a harmonic potential, the koopmon scheme reproduces the full quantum results with accuracy levels that are unachievable by the Ehrenfest model in both quantum and classical sectors. We conclude by presenting a test case that exhibits the formation of cat-like states.", "url": "https://arxiv.org/abs/2603.23758", "type": "理论+数值", "summary": "混合量子经典模型被广泛用于降低全量子模拟的计算成本。然而，它们在不同类别问题上的普遍适用性仍然是一个悬而未决的问题。在这里，我们针对具有自旋轨道耦合的系统解决这个问题。特别是，我们研究了 Rashba 纳米线一维模型中量子自旋 1/2 和经典轨道动量的相互作用动力学。我们通过采用新的量子经典哈密顿模型来解决这个问题，与传统方法不同，该模型保留了海森堡原理并捕获了超出常见埃伦菲斯特方法的相关效应。基于经典力学中的库普曼波函数，新模型最近通过粒子方案（koopmon 方法）以数值方式实现，该方法在此扩展以处理自旋轨道耦合。我们应用 koopmon 方法来研究纳米线模型的量子经典动力学，无论是否存在谐波势，以及 Rashba 主导（强耦合）和 Zeeman 主导（弱耦合）两种情况。\n\n考虑到实际的半导体参数，结果与全量子和量子经典埃伦菲斯特动力学进行了对比。在没有外部势的情况下，koopmon 方法定性地再现了所有耦合机制的完全量子演化的特征。虽然与 Ehrenfest 模拟相比，它在旋转精度方面略有损失，但后者未能捕获轨道动力学。在存在谐波势的情况下，koopmon 方案以 Ehrenfest 模型在量子和经典领域中无法达到的精度水平再现了完整的量子结果。最后，我们提出了一个测试用例，展示了类似猫的状态的形成。", "authors": [{"name": "Paul Bergold"}, {"name": "Giovanni Manfredi"}, {"name": "Cesare Tronci"}], "featured_authors": [{"name": "Paul Bergold"}, {"name": "Giovanni Manfredi"}, {"name": "Cesare Tronci"}], "author_count": 3}, {"id": "2603.23839", "category": "cond-mat", "title": "Numerical analysis of the thermal relaxation of the dense gas between two parallel plates: the free energy monotonicity for the Enskog equation", "abstract": "The thermal relaxation problem between two parallel plates with the same temperature is investigated, aiming to study the behavior of the free energy of the dense gas described by the Enskog equation. Two types of Enskog equation have been used: one is the Enskog equation with the original Enskog factor, while the other is that with a modified Enskog factor proposed recently in Takata & Takahashi, Phys. Rev. E 111, 065108 (2025). The evaluated free energy is a natural extension of the thermodynamic free energy to the non-equilibrium state. It is observed that this free energy monotonically decreases in time for the modified factor version, while it is not necessarily the case for the original version. Differences are also observed in other quantities in their time evolutions, most typically in the density profile.", "url": "https://arxiv.org/abs/2603.23839", "type": "理论+数值", "summary": "研究了两个相同温度的平行板之间的热弛豫问题，旨在研究Enskog方程描述的稠密气体的自由能行为。使用了两种类型的 Enskog 方程：一种是带有原始 Enskog 因子的 Enskog 方程，另一种是带有最近在 Takata & Takahashi, Phys. 中提出的修改 Enskog 因子的 Enskog 方程。修订版 E 111, 065108 (2025)。评估的自由能是热力学自由能向非平衡态的自然延伸。据观察，对于修改后的因子版本，该自由能随时间单调递减，而对于原始版本则不一定如此。在时间演化的其他量上也观察到差异，最常见的是密度分布。", "authors": [{"name": "Shigeru Takata"}, {"name": "Soma Sakata"}, {"name": "Aoto Takahashi"}, {"name": "Masanari Hattori"}], "featured_authors": [{"name": "Shigeru Takata"}, {"name": "Soma Sakata"}, {"name": "Aoto Takahashi"}, {"name": "Masanari Hattori"}], "author_count": 4}, {"id": "2603.23851", "category": "cond-mat", "title": "Coupling of phase transition, anharmonicity, and thermal transport in CaSnF$_6$", "abstract": "Understanding the coupling between structural phase transitions and thermal transport is essential for designing functional materials with tunable properties. Here, we investigate this interplay in CaSnF$_6$ by combining first-principles calculations with a machine-learned neuroevolution potential that enables large-scale molecular dynamics simulations across a wide temperature range. The simulations accurately capture the first-order structural phase transition and associated lattice dynamics. We show that the negative thermal expansion originates from low-energy rigid unit modes involving cooperative rotations of corner-sharing [CaF$_6$]$^{4-}$ octahedra, which induce bond-angle bending and volume contraction. At the same time, strong anharmonicity, dominated by four-phonon scattering, plays a central role in suppressing lattice thermal conductivity ($\\kappa_L$). Crucially, non-equilibrium simulations reveal a pronounced non-monotonic anomaly in $\\kappa_L$ near the phase transition, deviating from the conventional $\\sim 1/T^{\\alpha}$ behavior and providing direct transport evidence of lattice reconstruction. These results establish a unified mechanism linking lattice geometry, anharmonic vibrational dynamics, and thermal transport, and highlight the potential of machine-learned potentials for bridging atomic-scale phase transitions with macroscopic transport properties.", "url": "https://arxiv.org/abs/2603.23851", "type": "理论+数值", "summary": "了解结构相变和热传输之间的耦合对于设计具有可调特性的功能材料至关重要。在这里，我们通过将第一原理计算与机器学习的神经进化潜力相结合来研究 CaSnF$_6$ 中的这种相互作用，从而能够在很宽的温度范围内进行大规模分子动力学模拟。模拟准确地捕获了一阶结构相变和相关的晶格动力学。我们表明，负热膨胀源于低能刚性单元模式，涉及共享角的 [CaF$_6$]$^{4-}$ 八面体的协作旋转，从而引起键角弯曲和体积收缩。同时，以四声子散射为主的强非谐性在抑制晶格热导率（$\\kappa_L$）方面发挥着核心作用。至关重要的是，非平衡模拟揭示了相变附近 $\\kappa_L$ 中明显的非单调异常，偏离了传统的 $\\sim 1/T^{\\alpha}$ 行为，并提供了晶格重建的直接输运证据。\n\n这些结果建立了一个连接晶格几何、非谐振动动力学和热传输的统一机制，并突出了机器学习在原子尺度相变与宏观传输特性之间架起桥梁的潜力。", "authors": [{"name": "Daxue Hao"}, {"name": "Hao Huang"}, {"name": "Geng Li"}, {"name": "Yu Wu"}, {"name": "Shuming Zeng"}], "featured_authors": [{"name": "Daxue Hao"}, {"name": "Hao Huang"}, {"name": "Geng Li"}, {"name": "Yu Wu"}, {"name": "Shuming Zeng"}], "author_count": 5}, {"id": "2603.23856", "category": "cond-mat", "title": "A simple model for conserved intracellular dynamics exhibits multiscale pattern formation, traveling protein domains and arrested coarsening of lipids in the membrane", "abstract": "We model the spatiotemporal dynamics of cellular protein concentrations near membranes composed of different lipids using a three-variable continuum model for membrane-bound protein, cytosolic protein, and the local composition of a binary lipid membrane. The model contains two globally conserved quantities: the total protein content and the average fractions of the two lipid species. It combines a conserved reaction-diffusion model for protein dynamics with a Cahn-Hilliard equation for lipid demixing. Linear stability analysis of the homogeneous steady state and direct numerical simulations show that the lipid dynamics undergoes classical phase separation, whereas the protein dynamics exhibits oscillatory phase separation for intermediate total protein contents, associated with a long-wavelength instability and traveling domains. In parameter regions where both instabilities are present, we find multiscale patterns with larger-scale traveling and rotating protein domains coexisting with smaller-scale stationary lipid domains. In this regime, traveling protein domains coexist with arrested coarsening of stationary lipid domains above a critical coupling. We further show that the main instabilities and phase diagram are well captured by an extension of a recently proposed conserved FitzHugh-Nagumo model for non-reciprocal pattern formation. The extended model consists of two non-reciprocally coupled Cahn-Hilliard equations with different interface tensions, reflecting the distinct physical properties of lipids and proteins. This also explains the observed asymmetry between static lipid patterns and traveling protein patterns.", "url": "https://arxiv.org/abs/2603.23856", "type": "理论+数值", "summary": "我们使用膜结合蛋白、胞质蛋白和二元脂质膜的局部组成的三变量连续体模型，对由不同脂质组成的膜附近的细胞蛋白浓度的时空动态进行建模。该模型包含两个全局保守的量：总蛋白质含量和两种脂质种类的平均分数。它将蛋白质动力学的保守反应扩散模型与脂质分层的 Cahn-Hilliard 方程相结合。均质稳态的线性稳定性分析和直接数值模拟表明，脂质动力学经历经典相分离，而蛋白质动力学表现出中间总蛋白质含量的振荡相分离，与长波长不稳定性和行进域相关。在存在两种不稳定性的参数区域中，我们发现了多尺度模式，其中较大尺度的移动和旋转蛋白质结构域与较小尺度的固定脂质结构域共存。在这种情况下，移动的蛋白质结构域与临界耦合之上的固定脂质结构域的粗化停滞共存。\n\n我们进一步表明，通过最近提出的用于非互易模式形成的守恒 FitzHugh-Nagumo 模型的扩展，可以很好地捕获主要的不稳定性和相图。扩展模型由两个具有不同界面张力的非互耦 Cahn-Hilliard 方程组成，反映了脂质和蛋白质的不同物理性质。这也解释了观察到的静态脂质模式和移动蛋白质模式之间的不对称性。", "authors": [{"name": "Benjamin Winkler"}, {"name": "Sergio Alonso"}, {"name": "Markus Bär"}], "featured_authors": [{"name": "Benjamin Winkler"}, {"name": "Sergio Alonso"}, {"name": "Markus Bär"}], "author_count": 3}, {"id": "2603.23881", "category": "cond-mat", "title": "Rethinking failure in polymer networks: a probabilistic view on progressive damage", "abstract": "The mechanics of single-chain stretching and rupture are central to understanding the resilience of biological polymers and designing strong and tough soft materials such as double-network gels and multi-network elastomers. In this work, we develop a statistical mechanics based model that enables one to determine the distribution of forces along the chain segments. By combining the force distribution with a tilted bond potential that captures the stretch energy stored in these bonds, we calculate the corresponding activation energy required for bond dissociation. This allows us to determine the probability of bond (and consequently chain) failure. The proposed approach is simple, direct, and readily adaptable for constructing higher-level coarse-grained descriptions of damage and fracture in polymer networks. We demonstrated this by applying the theory to three problems of practical interest: (1) toughening via sacrificial bond rupture in polymer chains, (2) toughening of double network hydrogels, and (3) incorporation of the local chain model into a 3-dimensional constitutive relation that captures damage in elastomers. The latter was implemented through the micro-sphere framework, which accounts for different chain orientations, as well as the computationally inexpensive eight chain model. The findings from this work provide a physically-based model to quantify the stretching and failure of a single chain and pave the way to the integration of local damage models into 3-dimensional networks.", "url": "https://arxiv.org/abs/2603.23881", "type": "理论", "summary": "单链拉伸和断裂的力学对于理解生物聚合物的弹性和设计坚固而坚韧的软材料（例如双网络凝胶和多网络弹性体）至关重要。在这项工作中，我们开发了一种基于统计力学的模型，使人们能够确定沿着链段的力的分布。通过将力分布与捕获这些键中存储的拉伸能量的倾斜键势相结合，我们计算了键解离所需的相应活化能。这使我们能够确定键（以及链）失效的概率。所提出的方法简单、直接且易于适用于构建聚合物网络中损伤和断裂的更高层次的粗粒度描述。我们通过将该理论应用于三个具有实际意义的问题来证明这一点：（1）通过聚合物链中的牺牲键断裂进行增韧，（2）双网络水凝胶的增韧，以及（3）将局部链模型纳入捕捉弹性体损伤的3维本构关系中。\n\n后者是通过微球框架实现的，该框架考虑了不同的链方向，以及计算成本低廉的八链模型。这项工作的结果提供了一个基于物理的模型来量化单链的拉伸和失效，并为将局部损伤模型集成到 3 维网络中铺平了道路。", "authors": [{"name": "Noy Cohen"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "featured_authors": [{"name": "Noy Cohen"}, {"name": "Nikolaos Bouklas"}, {"name": "Chung-Yuen Hui"}], "author_count": 3}, {"id": "2603.23887", "category": "cond-mat", "title": "Predicting quantum ground-state energy by data-driven Koopman analysis of variational parameter nonlinear dynamics", "abstract": "In recent years, the application of machine learning to physics has been actively explored. In this paper, we study a method for estimating the ground-state energy of quantum Hamiltonians by applying data-driven Koopman analysis within the framework of variational wave functions. Koopman theory is a framework for analyzing the nonlinear dynamics of vectors, in which the dynamics are linearized by lifting the vectors to functions defined over the original vector space. We focus on the fact that the imaginary-time Schrödinger equation, when restricted to a variational wave function, is described by a nonlinear time evolution of the variational parameter vector. We collect sample points of this nonlinear dynamics at parameter configurations where the discrepancy between the true imaginary-time dynamics and the dynamics on the variational manifold is small, and perform data-driven continuous Koopman analysis. Within our formulation, the ground-state energy is reduced to the leading eigenvalue of a differential operator known as the Koopman generator. As a concrete example, we generate samples for the four-site transverse-field Ising model and estimate the ground-state energy using extended dynamic mode decomposition (EDMD). Furthermore, as an extension of this framework, we formulate the method for the case where the variational wave function is given by a uniform matrix product state on an infinite chain. By employing computational techniques developed within the framework of the time-dependent variational principle, all the quantities required for our analysis, including error estimation, can be computed efficiently in such systems. Since our approach provides predictions for the ground-state energy even when the true ground state lies outside the variational manifold, it is expected to complement conventional variational methods.", "url": "https://arxiv.org/abs/2603.23887", "type": "理论+数值", "summary": "近年来，机器学习在物理学中的应用得到了积极探索。在本文中，我们研究了一种通过在变分波函数框架内应用数据驱动的库普曼分析来估计量子哈密顿量的基态能量的方法。库普曼理论是用于分析向量非线性动力学的框架，其中通过将向量提升为在原始向量空间上定义的函数来线性化动力学。我们关注的事实是，当虚数时间薛定谔方程受限于变分波函数时，它是由变分参数向量的非线性时间演化来描述的。我们在参数配置下收集这种非线性动力学的样本点，其中真实虚数时间动力学与变分流形上的动力学之间的差异很小，并执行数据驱动的连续库普曼分析。在我们的公式中，基态能量被减少到称为库普曼发生器的微分算子的主要特征值。\n\n作为一个具体示例，我们为四位点横向场伊辛模型生成样本，并使用扩展动态模式分解（EDMD）估计基态能量。此外，作为该框架的扩展，我们针对变分波函数由无限链上的均匀矩阵乘积状态给出的情况制定了方法。通过采用在时间相关变分原理框架内开发的计算技术，我们分析所需的所有量（包括误差估计）都可以在此类系统中有效地计算。由于我们的方法即使在真实基态位于变分流形之外时也能提供基态能量预测，因此有望补充传统的变分方法。", "authors": [{"name": "Nobuyuki Okuma"}], "featured_authors": [{"name": "Nobuyuki Okuma"}], "author_count": 1}, {"id": "2603.23941", "category": "cond-mat", "title": "An Efficient High-Degree, High-Order Equivariant Graph Neural Network for Direct Crystal Structure Optimization", "abstract": "Crystal structure optimization is fundamental to materials modeling but remains computationally expensive when performed with density-functional theory (DFT). Machine-learning (ML) approaches offer substantial acceleration, yet existing methods face three key limitations: (i) most models operate solely on atoms and treat lattice vectors implicitly, despite their central role in structural optimization; (ii) they lack efficient mechanisms to capture high-degree angular information and higher-order geometric correlations simultaneously, which are essential for distinguishing subtle structural differences; and (iii) many pipelines are multi-stage or iterative rather than truly end-to-end, making them prone to error accumulation and limiting scalability. Here we present E$^{3}$Relax-H$^{2}$, an end-to-end high-degree, high-order equivariant graph neural network that maps an initial crystal directly to its relaxed structure. The key idea is to promote both atoms and lattice vectors to graph nodes, enabling a unified and symmetry-consistent representation of structural degrees of freedom. Building on this formulation, E$^{3}$Relax-H$^{2}$ introduces two message-passing mechanisms: (i) a high-degree, high-order message-passing module that efficiently captures high-degree angular representations and high-order many-body correlations; and (ii) a lattice-atom message-passing module that explicitly models the bidirectional coupling between lattice deformation and atomic displacement. In addition, we propose a differentiable periodicity-aware Cartesian displacement loss tailored for one-shot structure prediction under periodic boundary conditions.", "url": "https://arxiv.org/abs/2603.23941", "type": "理论+数值", "summary": "晶体结构优化是材料建模的基础，但在使用密度泛函理论 (DFT) 进行时，计算成本仍然很高。机器学习（ML）方法提供了显着的加速，但现有方法面临三个关键限制：（i）大多数模型仅在原子上运行并隐式处理晶格向量，尽管它们在结构优化中发挥着核心作用； (ii) 它们缺乏同时捕获高度角度信息和高阶几何相关性的有效机制，而这对于区分细微的结构差异至关重要； (iii)许多管道是多阶段或迭代的，而不是真正的端到端，这使得它们容易出现错误积累并限制可扩展性。在这里，我们提出 E$^{3}$Relax-H$^{2}$，一个端到端的高阶、高阶等变图神经网络，它将初始晶体直接映射到其松弛结构。关键思想是将原子和晶格向量提升为图节点，从而实现结构自由度的统一且对称一致的表示。\n\n在此公式的基础上，E$^{3}$Relax-H$^{2}$ 引入了两种消息传递机制：（i）高阶、高阶消息传递模块，可有效捕获高阶角度表示和高阶多体相关性； (ii) 晶格-原子消息传递模块，明确模拟晶格变形和原子位移之间的双向耦合。此外，我们提出了一种可微的周期性感知笛卡尔位移损失，专为周期性边界条件下的一次性结构预测而设计。", "authors": [{"name": "Ziduo Yang"}, {"name": "Wei Zhuo"}, {"name": "Huiqiang Xie"}, {"name": "Xiaoqing Liu"}, {"name": "Lei Shen"}], "featured_authors": [{"name": "Ziduo Yang"}, {"name": "Wei Zhuo"}, {"name": "Huiqiang Xie"}, {"name": "Xiaoqing Liu"}, {"name": "Lei Shen"}], "author_count": 5}, {"id": "2603.23943", "category": "cond-mat", "title": "ChargeFlow: Flow-Matching Refinement of Charge-Conditioned Electron Densities", "abstract": "Accurate charge densities are central to electronic-structure theory, but computing charge-state-dependent densities with density functional theory remains too expensive for large-scale screening and defect workflows. We present ChargeFlow, a flow-matching refinement model that transforms a charge-conditioned superposition of atomic densities into the corresponding DFT electron density on the native periodic real-space grid using a 3D U-Net velocity field. Trained on 9,502 charged Materials Project-derived calculations and evaluated on an external 1,671-structure benchmark spanning perovskites, charged defects, diamond defects, metal-organic frameworks, and organic crystals, ChargeFlow is not uniformly best on every in-distribution class but is strongest on problems dominated by nonlocal charge redistribution and charge-state extrapolation, improving deformation-density error from 3.62% to 3.21% and charge- response cosine similarity from 0.571 to 0.655 relative to a ResNet baseline. The predicted densities remain chemically useful under downstream analysis, yielding successful Bader partitioning on all 1,671 benchmark structures and high-fidelity electrostatic potentials, which positions flow matching as a practical density-refinement strategy for charged materials.", "url": "https://arxiv.org/abs/2603.23943", "type": "理论+数值", "summary": "准确的电荷密度是电子结构理论的核心，但用密度泛函理论计算电荷态相关的密度对于大规模筛选和缺陷工作流程来说仍然过于昂贵。我们提出了 ChargeFlow，一种流匹配细化模型，该模型使用 3D U-Net 速度场将原子密度的电荷条件叠加转换为原生周期性现实空间网格上相应的 DFT 电子密度。 ChargeFlow 对 9,502 个带电材料项目派生的计算进行了训练，并在涵盖钙钛矿、带电缺陷、金刚石缺陷、金属有机框架和有机晶体的外部 1,671 个结构基准上进行了评估，ChargeFlow 并非在每个分布类别上都表现最佳，但在非局域电荷重新分布和电荷态外推主导的问题上表现最强，将变形密度误差从 3.62% 改善到 3.21%，并改善了电荷响应余弦相对于 ResNet 基线，相似度从 0.571 到 0.655。\n\n预测的密度在下游分析中仍然具有化学作用，在所有 1,671 个基准结构和高保真静电势上产生成功的 Bader 分配，这将流量匹配定位为带电材料的实用密度细化策略。", "authors": [{"name": "Tri Minh Nguyen"}, {"name": "Sherif Abdulkader Tawfik"}, {"name": "Truyen Tran"}, {"name": "Svetha Venkatesh"}], "featured_authors": [{"name": "Tri Minh Nguyen"}, {"name": "Sherif Abdulkader Tawfik"}, {"name": "Truyen Tran"}, {"name": "Svetha Venkatesh"}], "author_count": 4}, {"id": "2603.24029", "category": "cond-mat", "title": "Identifying the origin of out-of-plane spin polarization in the noncollinear antiferromagnet Mn$_3$Ge", "abstract": "The noncollinear antiferromagnets Mn$_3$Sn/Ge emerge as promising spin-current sources with both in-plane and out-of-plane spin polarizations, thereby enabling field-free magnetization switching. However, the microscopic origin of the out-of-plane spin polarization remains under debate, specifically whether it arises from the magnetic spin Hall effect (MSHE) or the spin swapping (SSW). Here, we comparatively evaluate the spin torques in single-crystal Mn$_3$Ge/Py bilayers with different crystallographic orientations using the ferromagnetic resonance technique. The distinct angular dependences of the measured spin-torque signals provide clear evidence for the bulk MSHE, which depends on antiferromagnetic order. In addition, we identify the antiferromagnetic-order independent component originating from the interfacial SSW. The coexisting MSHE and SSW, with comparable magnitudes, give rise to the out-of-plane spin polarization. Our study disentangles the origins of spin-torque generation in noncollinear antiferromagnets, providing valuable insights for their spintronic applications.", "url": "https://arxiv.org/abs/2603.24029", "type": "数值", "summary": "非共线反铁磁体 Mn$_3$Sn/Ge 成为具有面内和面外自旋极化的有前途的自旋电流源，从而实现无场磁化切换。然而，面外自旋极化的微观起源仍然存在争议，特别是它是由磁自旋霍尔效应（MSHE）还是自旋交换（SSW）引起的。在这里，我们使用铁磁共振技术比较评估了具有不同晶体取向的单晶 Mn$_3$Ge/Py 双层中的自旋扭矩。测量的自旋扭矩信号的独特角度依赖性为块体 MSHE 提供了明确的证据，这取决于反铁磁顺序。此外，我们还确定了源自界面 SSW 的反铁磁序独立分量。共存的 MSHE 和 SSW 具有相当的强度，会产生面外自旋极化。我们的研究阐明了非共线反铁磁体中自旋扭矩产生的起源，为其自旋电子应用提供了宝贵的见解。", "authors": [{"name": "Mingxing Wu"}, {"name": "Kouta Kondou"}, {"name": "Taishi Chen"}, {"name": "Satoru Nakatsuji"}, {"name": "YoshiChika Otani"}], "featured_authors": [{"name": "Mingxing Wu"}, {"name": "Kouta Kondou"}, {"name": "Taishi Chen"}, {"name": "Satoru Nakatsuji"}, {"name": "YoshiChika Otani"}], "author_count": 5}, {"id": "2603.24031", "category": "cond-mat", "title": "Mixed-State Topological Phase: Quantized Topological Order Parameter and Lieb-Schultz-Mattis Theorem", "abstract": "We investigate the extension of pure-state symmetry protected topological phases to mixed-state regime with a strong U(1) and a weak $\\mathbb{Z}_2$ symmetries in one-dimensional spin systems by the concept of quantum channels. We propose a corresponding topological phase order parameter for short-range entangled mixed states by showing that it is quantized and its distinct values can be realized by concrete spin systems with disorders, sharply signaling phase transitions among them. We also give a model-independent way to generate two distinct phases by various types of translation and reflection transformations. These results on the short-range entangled mixed states further enable us to generalize the conventional Lieb-Schultz-Mattis theorem to mixed states, even without the concept of spectral gaps and lattice Hamiltonians.", "url": "https://arxiv.org/abs/2603.24031", "type": "理论", "summary": "我们通过量子通道的概念，研究一维自旋系统中纯态对称保护拓扑相扩展到具有强 U(1) 和弱 $\\mathbb{Z}_2$ 对称性的混合态体系。我们提出了一种用于短程纠缠混合态的相应拓扑相序参数，表明它是量子化的，并且其独特的值可以通过具有无序的具体自旋系统来实现，并清晰地发出它们之间的相变信号。我们还提供了一种独立于模型的方法，通过各种类型的平移和反射变换生成两个不同的阶段。这些关于短程纠缠混合态的结果进一步使我们能够将传统的利布-舒尔茨-马蒂斯定理推广到混合态，即使没有谱间隙和晶格哈密顿量的概念。", "authors": [{"name": "Linhao Li"}, {"name": "Yuan Yao"}], "featured_authors": [{"name": "Linhao Li"}, {"name": "Yuan Yao"}], "author_count": 2}, {"id": "2603.24053", "category": "cond-mat", "title": "Multi-filament coordination rescues active transport from inertia-induced spinning arrest", "abstract": "Active filaments driven by tangential forces can become trapped in a spinning state when attached to a heavy head, where activity and inertia drive persistent rotation rather than directed transport. Using three-dimensional Langevin dynamics of tangentially driven bead-spring chains anchored to a common heavy head, we demonstrate that increasing the filament number $\\Nf$ systematically \\emph{rescues} directed transport by sterically preventing the coiled conformations that underlie spinning. The rescue is established through three independent diagnostics: (i)~the mean-square displacement recovers monotonic growth (transport rescue), (ii)~the spatial tangent autocorrelation loses its negative dip signaling helical coiling (conformational rescue), and (iii)~the tangent time autocorrelation ceases crossing zero (orientational rescue). At high bending stiffness ($\\kb = 1000$), coiling is fully eliminated at a critical filament number $\\Nf^* \\approx 3$. At moderate stiffness ($\\kb = 100$), residual coiling persists ($\\min C_s \\approx -0.13$) yet transport is still rescued -- demonstrating that the destruction of spinning \\emph{coherence}, not coiling elimination, is the essential mechanism. The multi-filament architecture achieves up to five orders of magnitude transport enhancement. Two physically distinct rescue pathways emerge: at high stiffness, steric constraints force filaments into a coordinated bundle sustaining directed propulsion; at low stiffness, steric interactions destroy orientational coherence, producing enhanced active diffusion. These results demonstrate a purely mechanical, density-independent route to overcome inertia-induced motility arrest, with implications for synthetic microswimmer design, motor-driven filament assays, and multi-filament organization in biological systems.", "url": "https://arxiv.org/abs/2603.24053", "type": "理论", "summary": "当连接到沉重的头部时，由切向力驱动的活性细丝可能会陷入旋转状态，其中活性和惯性驱动持续旋转而不是定向运输。利用固定在共同重头上的切向驱动珠弹簧链的三维朗之万动力学，我们证明增加丝数 $\\Nf$ 通过空间阻止旋转下的卷曲构象来系统地 \\emph{rescues} 定向运输。救援是通过三个独立的诊断建立的：（i）~均方位移恢复单调增长（运输救援），（ii）~空间切线自相关失去其负倾角信号螺旋卷曲（构象救援），以及（iii）~切线时间自相关停止过零（定向救援）。在高弯曲刚度 ($\\kb = 1000$) 下，在临界灯丝数量 $\\Nf^* \\approx 3$ 时完全消除卷绕。\n\n在中等刚度（$\\kb = 100$）下，残余卷绕仍然存在（$\\min C_s \\approx -0.13$），但运输仍然得到挽救——这表明旋转\\emph{相干性}的破坏，而不是卷绕的消除，是基本机制。多丝架构可实现高达五个数量级的传输增强。出现了两种物理上不同的救援路径：在高刚度下，空间约束迫使细丝形成协调的束，以维持定向推进力；在低刚度下，空间相互作用会破坏方向相干性，从而产生增强的主动扩散。这些结果证明了一种纯粹机械的、与密度无关的途径来克服惯性引起的运动停滞，这对合成微型游泳器设计、电机驱动的丝分析和生物系统中的多丝组织具有影响。", "authors": [{"name": "Anuradha Rajput"}, {"name": "Arnab Bhattacharjee"}, {"name": "Annwesha Dutta"}], "featured_authors": [{"name": "Anuradha Rajput"}, {"name": "Arnab Bhattacharjee"}, {"name": "Annwesha Dutta"}], "author_count": 3}, {"id": "2603.24090", "category": "cond-mat", "title": "Predicting Grain Growth Evolution Under Complex Thermal Profiles with Deep Learning through Thermal Descriptor Modulation", "abstract": "Predicting microstructure evolution during thermomechanical treatment is essential for determining the final mechanical properties of a material, yet conventional simulations based on Partial Differential Equations (PDEs) remain computationally expensive. Our prior Deep Learning (DL) framework using Convolutional Long Short-Term Memory (ConvLSTM) has proven effective in accelerating grain growth prediction, though its applicability was limited to constant-temperature or single-rate thermal profiles. As the model was trained exclusively under constant thermal conditions, it cannot account for the thermal history dependence of grain boundary kinetics, fundamentally limiting its applicability to the time-varying thermal profiles characteristic of industrial heat treatment processes. This study extends the previous framework by incorporating Feature-wise Linear Modulation (FiLM) for thermal conditioning to predict grain growth under complex, time-varying thermal profiles. The model was trained on a large dataset of grain growth evolution under thermal profiles with heating and cooling rates ranging from 0.01 kelvin per second to 10 kelvin per second. The results demonstrate that the proposed thermal conditioning mechanism enables the model to capture the influence of variable thermal profiles on grain boundary migration kinetics. Across the three test scenarios of increasing complexity, the model achieved a Structural Similarity Index Measure (SSIM) of up to 0.93 and mean grain size error below 3.2%. Despite the architectural extensions, inference time remains on the order of seconds per prediction sequence, preserving the computational advantage over PDE-based simulations.", "url": "https://arxiv.org/abs/2603.24090", "type": "理论+数值", "summary": "预测热机械处理过程中的微观结构演变对于确定材料的最终机械性能至关重要，但基于偏微分方程 (PDE) 的传统模拟计算成本仍然很高。我们之前使用卷积长短期记忆 (ConvLSTM) 的深度学习 (DL) 框架已被证明可以有效加速晶粒生长预测，尽管其适用性仅限于恒温或单速率热剖面。由于该模型专门在恒定热条件下进行训练，因此无法解释晶界动力学的热历史依赖性，从根本上限制了其对工业热处理过程的时变热分布特征的适用性。这项研究通过结合用于热调节的特征线性调制 (FiLM) 来扩展之前的框架，以预测复杂、随时间变化的热曲线下的晶粒生长。该模型在热剖面下晶粒生长演化的大型数据集上进行训练，加热和冷却速率范围为每秒 0.01 开尔文到每秒 10 开尔文。\n\n结果表明，所提出的热调节机制使模型能够捕获可变热分布对晶界迁移动力学的影响。在复杂性不断增加的三个测试场景中，该模型的结构相似性指数测量 (SSIM) 高达 0.93，平均粒度误差低于 3.2%。尽管进行了架构扩展，但每个预测序列的推理时间仍保持在秒的数量级，从而保留了相对于基于偏微分方程的模拟的计算优势。", "authors": [{"name": "Pungponhavoan Tep"}, {"name": "Marc Bernacki"}], "featured_authors": [{"name": "Pungponhavoan Tep"}, {"name": "Marc Bernacki"}], "author_count": 2}, {"id": "2603.24148", "category": "cond-mat", "title": "Mpemba effect in a two-dimensional bistable potential", "abstract": "We present an exactly solvable model of the Mpemba effect in an overdamped Langevin system confined in a two-dimensional radially symmetric bistable potential. The potential is constructed as a piecewise quadratic-logarithmic function that is continuous and differentiable at the matching radii, enabling an exact mapping of the corresponding Fokker-Planck operator to a Schroedinger-type eigenvalue problem. The relaxation spectrum and eigenmodes are obtained analytically in each region in terms of confluent hypergeometric functions, with eigenvalues determined from matching conditions. Focusing on isotropic equilibrium initial states at inverse temperature $\\beta_{\\rm ini}$ quenched to a bath at inverse temperature $\\beta$, we derive explicit expressions for the mode amplitudes governing long-time relaxation. We demonstrate that the coefficient of the slowest mode exhibits non-monotonic dependence on $\\beta_{\\rm ini}$ and identify a sufficient crossing condition for the Kullback-Leibler divergence in terms of the two slowest modes, if the global minimum of the potential is located far away from the origin and the second minimum exists near the origin. For corresponding parameters, we demonstrate that the Mpemba effect can be realized. Our results provide a rare example of an analytically tractable two-dimensional model exhibiting anomalous relaxation without any confining walls, extending previous one-dimensional constructions with a hard wall and clarifying the role of radial geometry in nonequilibrium relaxation phenomena.", "url": "https://arxiv.org/abs/2603.24148", "type": "理论", "summary": "我们提出了一个精确可解的 Mpemba 效应模型，该模型适用于受限于二维径向对称双稳态势的过阻尼 Langevin 系统。该势被构造为分段二次对数函数，该函数在匹配半径处连续且可微，从而能够将相应的福克-普朗克算子精确映射到薛定谔型特征值问题。根据汇合超几何函数，在每个区域中分析获得弛豫谱和本征模，并根据匹配条件确定本征值。着眼于逆温度 $\\beta_{\\rm ini}$ 下的各向同性平衡初始状态，在逆温度 $\\beta$ 下淬火至浴槽，我们推导出控制长时间弛豫的模式振幅的显式表达式。我们证明了最慢模态的系数对 $\\beta_{\\rm ini}$ 表现出非单调依赖性，并且如果势的全局最小值位于远离原点且第二最小值存在于原点附近，则根据两个最慢模态确定 Kullback-Leibler 散度的充分交叉条件。\n\n对于相应的参数，我们证明了可以实现Mpemba效应。我们的结果提供了一个罕见的例子，即在没有任何限制壁的情况下表现出异常弛豫的可分析处理的二维模型，扩展了以前具有硬壁的一维结构，并阐明了径向几何在非平衡弛豫现象中的作用。", "authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "featured_authors": [{"name": "Hisao Hayakawa"}, {"name": "Satoshi Takada"}], "author_count": 2}, {"id": "2603.24151", "category": "cond-mat", "title": "Universality of order statistics for Brownian reshuffling", "abstract": "We discuss the order statistics of the particle positions of a gas of $N$ identical independent particles performing Brownian motion in one dimension in a potential that asymptotically behaves like $V(x) \\sim x^\\gamma$ for $x\\rightarrow+\\infty$, with a positive power $\\gamma>0$. We show that in the stationary state, the order statistics that describe how the leaders are reshuffled are universal and independent of $\\gamma$. What depends on $\\gamma$ is the timescale of the leaders' reshuffling, which scales as a power of the logarithm of the population size: $t \\sim (\\ln N)^\\frac{2(1-\\gamma)}{\\gamma} \\tau$, where $\\tau$ is of order one. We derive the probability that the particle which has the $k$th largest value of $x$ at some time $t_1$ will have the $j$th largest value at time $t_2=t_1+t$ in the form of an explicit expression for the generating function for the reshuffling probabilities for all $k\\ge 1$ and $j\\ge 1$. The generating function, expressed in scaled time $\\tau$, is independent of $\\gamma$. In particular, we show that the average percentage overlap coefficient of leader lists takes the universal, $\\gamma$-independent form ${\\rm erfc}(\\sqrt{\\tau})$ for long lists.", "url": "https://arxiv.org/abs/2603.24151", "type": "理论", "summary": "我们讨论由 $N$ 相同独立粒子组成的气体的粒子位置的序统计，在一维中执行布朗运动，其渐近行为类似于 $x\\rightarrow+\\infty$ 的 $V(x) \\sim x^\\gamma$，其正幂 $\\gamma>0$。我们证明，在静止状态下，描述领导者如何重新洗牌的顺序统计数据是通用的并且独立于 $\\gamma$。取决于$\\gamma$的是领导者重新洗牌的时间尺度，它以人口规模对数的幂来衡量：$t \\sim (\\ln N)^\\frac{2(1-\\gamma)}{\\gamma} \\tau$，其中$\\tau$是一阶的。我们以所有 $k\\ge 1$ 和 $j\\ge 1$ 的重新洗牌概率生成函数的显式表达式的形式导出在 $t_1$ 时刻具有 $x$ 第 $k$ 个最大值的粒子将在 $t_2=t_1+t$ 时刻具有 $j$th 最大值的概率。以缩放时间 $\\tau$ 表示的生成函数与 $\\gamma$ 无关。特别是，我们表明，对于长列表，领导者列表的平均百分比重叠系数采用通用的、与$\\gamma$无关的形式${\\rm erfc}(\\sqrt{\\tau})$。", "authors": [{"name": "Zdzislaw Burda"}, {"name": "Mario Kieburg"}, {"name": "Tomasz Maciocha"}], "featured_authors": [{"name": "Zdzislaw Burda"}, {"name": "Mario Kieburg"}, {"name": "Tomasz Maciocha"}], "author_count": 3}, {"id": "2603.24171", "category": "cond-mat", "title": "Algorithms for generating planar networks simulating hierarchical patterns of cracks formed during film drying", "abstract": "Hierarchical crack patterns that arise during the drying of thin films of colloidal dispersions or polymer solutions on a solid substrate are of interest both from a fundamental standpoint and in the context of the creation of transparent electrodes for optoelectronics. This paper analyzes the morphology of such patterns based on image processing of real-world samples. Graph theory is used to extract chains of edges and analyze the network topology. A method based on the hierarchy of connections is applied to classify cracks by generation. The limitations of existing classification approaches related to the discreteness of the time scale and the use of only a part of the entire pattern are discussed. Three approaches are used to generate artificial hierarchical networks: random uniform partitioning, recursive Voronoi partitioning, and a crack growth simulation model, each modified to reproduce the hierarchical structure. A comparison was made of the geometric characteristics (distribution of crack angles, edge lengths, cell areas, and circularity coefficient) and topological properties (distribution of the number of cell sides) of real and simulated networks. It was shown that the simulation model best reproduces the key features of real cracks, including the characteristic right angles of their connections.", "url": "https://arxiv.org/abs/2603.24171", "type": "理论+数值", "summary": "从基本角度和创建光电透明电极的角度来看，在固体基底上干燥胶体分散体或聚合物溶液的薄膜过程中出现的分层裂纹图案都令人感兴趣。本文基于真实世界样本的图像处理来分析此类图案的形态。图论用于提取边链并分析网络拓扑。应用基于连接层次的方法按生成对裂纹进行分类。讨论了现有分类方法与时间尺度的离散性和仅使用整个模式的一部分相关的局限性。使用三种方法来生成人工分层网络：随机均匀划分、递归 Voronoi 划分和裂纹扩展模拟模型，每种方法都经过修改以重现分层结构。对真实网络和模拟网络的几何特性（裂纹角度、边长、单元面积和圆度系数的分布）和拓扑特性（单元边数的分布）进行了比较。\n\n结果表明，模拟模型最好地再现了真实裂缝的关键特征，包括其连接的直角特征。", "authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei V. Eserkepov"}, {"name": "Andrei S. Burmistrov"}], "featured_authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei V. Eserkepov"}, {"name": "Andrei S. Burmistrov"}], "author_count": 3}, {"id": "2603.24183", "category": "cond-mat", "title": "Digitally Optimized Initializations for Fast Thermodynamic Computing", "abstract": "Thermodynamic computing harnesses the relaxation dynamics of physical systems to perform matrix operations. A key limitation of such approaches is the often long thermalization time required for the system to approach equilibrium with sufficient accuracy. Here, we introduce a hybrid digital-thermodynamic algorithm that substantially accelerates relaxation through optimized initializations inspired by the Mpemba effect. In the proposed scheme, a classical digital processor efficiently computes an initialization that suppresses slow relaxation modes, after which the physical system performs the remaining computation through its intrinsic relaxation dynamics. We focus on overdamped Langevin dynamics for quadratic energy landscapes, analyzing the spectral structure of the associated Fokker-Planck operator and identifying the corresponding optimal initial covariances. This yields a predictable reduction in thermalization time, determined by the spectrum of the encoded matrix. We derive analytic expressions for the resulting speedups and numerically analyze thermodynamic implementations of matrix inversion and determinant computation as concrete examples. Our results show that optimized initialization protocols provide a simple and broadly applicable route to accelerating thermodynamic computations.", "url": "https://arxiv.org/abs/2603.24183", "type": "理论+数值", "summary": "热力学计算利用物理系统的松弛动力学来执行矩阵运算。这种方法的一个关键限制是系统通常需要很长的热化时间才能以足够的精度达到平衡。在这里，我们引入了一种混合数字热力学算法，该算法通过受 Mpemba 效应启发的优化初始化来显着加速弛豫。在所提出的方案中，经典数字处理器有效地计算抑制慢弛豫模式的初始化，之后物理系统通过其固有的弛豫动力学执行剩余的计算。我们专注于二次能量景观的过阻尼 Langevin 动力学，分析相关 Fokker-Planck 算子的谱结构并识别相应的最佳初始协方差。这会产生可预测的热化时间减少，具体取决于编码矩阵的频谱。我们推导了由此产生的加速的解析表达式，并作为具体示例对矩阵求逆和行列式计算的热力学实现进行了数值分析。\n\n我们的结果表明，优化的初始化协议提供了一种简单且广泛适用的途径来加速热力学计算。", "authors": [{"name": "Mattia Moroder"}, {"name": "Felix C. Binder"}, {"name": "John Goold"}], "featured_authors": [{"name": "Mattia Moroder"}, {"name": "Felix C. Binder"}, {"name": "John Goold"}], "author_count": 3}, {"id": "2603.24185", "category": "cond-mat", "title": "Tunable intersublattice exchange coupling drives magnetic evolution in Mn$_{3+x}$Ga$_{1-x}$C ($0 \\le x \\le 0.60$)", "abstract": "We investigate the magnetic and transport evolution in Mn$_{3+x}$Ga$_{1-x}$C ($0 \\le x \\le 0.60$), where Mn substitution at corner Ga sites induces lattice contraction and suppresses the antiferromagnetic order of Mn$_3$GaC. As $x$ increases, the magnetic ground state of the system undergoes a sequential transition from an antiferromagnetic state, via a canted ferrimagnetic state, to a robust ferrimagnetic state, accompanied by a surge in the magnetic ordering temperature. Saturation magnetic moments reaches a maximum of 3.63~$\\mu_{\\mathrm{B}}$/f.u. at $x = 0.10$, whereas the topological Hall resistivity peaks at 1.47~$\\mu\\Omega\\cdot$cm for $x = 0.20$ before decreasing with further doping. First-principles calculations demonstrate a $\\sim\\!40^{\\circ}$ canting of face-centered Mn moments at $x = 0.20$, signifying spin frustration, and an eventual antiparallel alignment of face-centered and corner-site Mn moments at higher $x$. These results reveal that intersublattice antiferromagnetic coupling governs the magnetic transformation and emergent transport phenomena, thus providing a microscopic foundation for designing high-ordering-temperature antiperovskites.", "url": "https://arxiv.org/abs/2603.24185", "type": "理论+数值", "summary": "我们研究了 Mn$_{3+x}$Ga$_{1-x}$C ($0 \\le x \\le 0.60$) 中的磁性和输运演化，其中角 Ga 位点的 Mn 取代引起晶格收缩并抑制 Mn$_3$GaC 的反铁磁序。随着$x$的增加，系统的磁基态经历从反铁磁态，通过倾斜的亚铁磁态，到鲁棒亚铁磁态的连续转变，伴随着磁有序温度的激增。饱和磁矩最大可达3.63~$\\mu_{\\mathrm{B}}$/f.u。在 $x = 0.10$ 时，拓扑霍尔电阻率在 $x = 0.20$ 时达到峰值 1.47~$\\mu\\Omega\\cdot$cm，然后随着进一步掺杂而降低。第一性原理计算表明，面心 Mn 矩在 $x = 0.20$ 处发生 $\\sim\\!40^{\\circ}$ 倾斜，这意味着旋转挫败，并且面心和角点 Mn 矩在较高的 $x$ 处最终反平行对齐。这些结果揭示了子晶格间反铁磁耦合控制着磁转变和涌现输运现象，从而为设计高序温反钙钛矿提供了微观基础。", "authors": [{"name": "Dong-Hui Xu"}, {"name": "Cong-Mian Zhen"}, {"name": "Deng-Lu Hou"}, {"name": "Li Ma"}, {"name": "De-Wei Zhao"}, {"name": "Guo-ke Li"}], "featured_authors": [{"name": "Dong-Hui Xu"}, {"name": "Cong-Mian Zhen"}, {"name": "Deng-Lu Hou"}, {"name": "Li Ma"}, {"name": "De-Wei Zhao"}, {"name": "Guo-ke Li"}], "author_count": 6}, {"id": "2603.24187", "category": "cond-mat", "title": "Dipole-exchange spin waves and mode hybridization in magnetic nanoparticles", "abstract": "We investigate spin-wave modes in confined ferromagnetic resonators with spherical and cylindrical geometries across the exchange-dominated, dipole-exchange, and dipolar interaction regimes. Starting from the linearized Landau-Lifshitz-Gilbert equation, we show that the projection of the total angular momentum and mirror parity are conserved quantities in the problem of axially symmetric resonators. These symmetries provide a natural classification of spin-wave modes and explain the degeneracy of exchange modes, as well as its lifting by dipolar interactions. Numerical analysis shows that the nonlocal dipolar interaction removes the exchange degeneracy and hybridizes modes, leading to avoided crossings between modes that belong to the same symmetry sector. To describe this behavior, we develop a coupled-mode theory formulated directly in terms of dynamical magnetization, which reduces the dipole-exchange problem to a finite system of interacting modes. The resulting framework provides a unified description of spin-wave spectra in confined magnetic particles from the exchange limit to the dipolar regime.", "url": "https://arxiv.org/abs/2603.24187", "type": "理论+数值", "summary": "我们研究了交换主导、偶极交换和偶极相互作用状态下具有球形和圆柱形几何形状的受限铁磁谐振器中的自旋波模式。从线性化的Landau-Lifshitz-Gilbert方程出发，我们证明总角动量的投影和镜宇称在轴对称谐振器问题中是守恒量。这些对称性提供了自旋波模式的自然分类，并解释了交换模式的简并性及其通过偶极相互作用的提升。数值分析表明，非局域偶极相互作用消除了交换简并并使模式混合，从而避免了属于同一对称扇区的模式之间的交叉。为了描述这种行为，我们开发了一种直接根据动态磁化强度表述的耦合模式理论，该理论将偶极子交换问题简化为相互作用模式的有限系统。由此产生的框架提供了从交换极限到偶极状态的受限磁性粒子中自旋波谱的统一描述。", "authors": [{"name": "Fedor Shuklin"}, {"name": "Khristina Albitskaya"}, {"name": "Sergei Solovyov"}, {"name": "Alexander Chernov"}, {"name": "Mihail Petrov"}], "featured_authors": [{"name": "Fedor Shuklin"}, {"name": "Khristina Albitskaya"}, {"name": "Sergei Solovyov"}, {"name": "Alexander Chernov"}, {"name": "Mihail Petrov"}], "author_count": 5}, {"id": "2603.24190", "category": "cond-mat", "title": "Dynamical thermalization and turbulence in social stratification models", "abstract": "We study the nonlinear chaotic dynamics in a system of linear oscillators coupled by social network links with an additional stratification of oscillator energies, or frequencies, and supplementary nonlinear interactions. It is argued that this system can be viewed as a model of social stratification in a society with nonlinear interacting agents with energies playing a role of wealth states of society. The Hamiltonian evolution is characterized by two integrals of motion being energy and probability norm. Above a certain chaos border the chaotic dynamics leads to dynamical thermalization with the Rayleigh-Jeans (RJ) distribution over states with given energy or wealth. At low energies, this distribution has RJ condensation of norm at low energy modes. We point out a similarity of this condensation with the wealth inequality in the world countries where about a half of population owns only a couple of percent of the total wealth. In the presence of energy pumping and absorption, the system reveals features of the Kolmogorov-Zakharov turbulence of nonlinear waves.", "url": "https://arxiv.org/abs/2603.24190", "type": "理论", "summary": "我们研究线性振荡器系统中的非线性混沌动力学，该系统通过社交网络链接耦合，并具有振荡器能量或频率的附加分层以及补充非线性相互作用。有人认为，该系统可以被视为社会分层的模型，该社会具有非线性相互作用的主体，其能量在社会财富状态中发挥着作用。哈密​​顿演化的特征是运动的两个积分，即能量和概率范数。在一定的混沌边界之上，混沌动力学导致具有给定能量或财富的状态上的瑞利-詹斯（RJ）分布的动态热化。在低能量下，该分布在低能量模式下具有范数 RJ 凝聚。我们指出，这种凝结与世界各国的财富不平等有相似之处，在这些国家，大约一半的人口只拥有总财富的百分之几。在存在能量泵送和吸收的情况下，系统揭示了非线性波的柯尔莫哥洛夫-扎哈洛夫湍流的特征。", "authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "featured_authors": [{"name": "Klaus M. Frahm"}, {"name": "Dima L. Shepelyansky"}], "author_count": 2}, {"id": "2603.24223", "category": "cond-mat", "title": "Hidden Unit Interpretability in RBM Quantum States:Encoding Antiferromagnetic Order in Heisenberg Spin Rings", "abstract": "We investigate how Restricted Boltzmann Machines (RBMs) encode antiferromagnetic order when trained as variational ansätze for one-dimensional Heisenberg spin rings with periodic boundary conditions. Through systematic hidden unit analysis and ablation studies on $N=4$ and $N=8$ spin systems, we show that individual hidden units spontaneously specialize to capture staggered magnetization patterns characteristic of antiferromagnetic ground states. Hidden units naturally segregate into two classes: those essential for ground-state energy and correlation structure, and supplementary units providing smaller corrections. Removing important units induces clear energy penalties and disrupts the staggered correlation pattern in $C_{zz}(r)$, whereas removing supplementary units has modest effects. Single-unit analysis confirms that no individual hidden unit reproduces the full antiferromagnetic correlations, indicating that quantum order emerges through collective encoding across the hidden layer. Extending this analysis to $N=8$ through $20$ with hidden unit densities $\\alpha = 2$ to $5$ and ten independent seeds per configuration, we find that the fraction of important hidden units decreases with system size, consistent with sublinear growth $m' \\sim N^k$ ($k \\approx 0.4$). The energy-correlation impact relationship persists for small to moderate system sizes, though it weakens for the largest systems studied. These results provide a quantitative framework for RBM interpretability in quantum many-body systems.", "url": "https://arxiv.org/abs/2603.24223", "type": "理论+数值", "summary": "我们研究了受限玻尔兹曼机（RBM）在被训练为具有周期性边界条件的一维海森堡自旋环的变分模拟时如何编码反铁磁序。通过对 $N=4$ 和 $N=8$ 自旋系统的系统隐藏单元分析和消融研究，我们表明各个隐藏单元自发地专门捕获反铁磁基态的交错磁化模式特征。隐藏单元自然地分为两类：对于基态能量和相关结构至关重要的单元，以及提供较小校正的补充单元。删除重要单元会导致明显的能量损失，并破坏 $C_{zz}(r)$ 中的交错相关模式，而删除补充单元的影响不大。单单元分析证实，没有单独的隐藏单元能够再现完整的反铁磁相关性，这表明量子顺序是通过隐藏层的集体编码而出现的。\n\n将该分析扩展到 $N=8$ 到 $20$，隐藏单元密度为 $\\alpha = 2$ 到 $5$，每个配置有 10 个独立种子，我们发现重要隐藏单元的比例随着系统大小的增加而减少，与次线性增长 $m' \\sim N^k$ ($k \\approx 0.4$) 一致。对于中小型系统，能量相关影响关系仍然存在，但对于所研究的最大系统来说，能量相关影响关系会减弱。这些结果为量子多体系统中 RBM 的可解释性提供了定量框架。", "authors": [{"name": "Bharadwaj Chowdary Mummaneni"}, {"name": "Manas Sajjan"}], "featured_authors": [{"name": "Bharadwaj Chowdary Mummaneni"}, {"name": "Manas Sajjan"}], "author_count": 2}, {"id": "2603.24228", "category": "cond-mat", "title": "Diffusion coefficients of multi-principal element alloys from first principles", "abstract": "Vacancy-mediated diffusion in multi-principal element alloys (MPEAs) remains poorly understood. Existing computational methods face challenges in connecting electronic structure to macroscopic transport coefficients due to the large number of chemical elements. To address this, we introduce the embedded local cluster expansion (eLCE), which bridges first-principles calculations with kinetic Monte Carlo simulations to compute the matrix of multicomponent diffusion coefficients. Applying this approach to refractory MPEAs in the V-Cr-Nb-Mo-Ta-W system, we evaluate the complete mobility and diffusion tensors of a six-component alloy at finite temperatures. We find that local kinetic barriers, rather than thermodynamics or vacancy correlation factors, primarily control diffusion in these materials. Whether diffusion is sluggish or anti-sluggish depends on the mean vacancy migration barrier relative to the rule-of-mixtures estimate and on the availability of percolating pathways of fast-diffusing species. We use this insight to screen the senary composition space and identify compositions with anti-sluggish diffusion. This study presents a predictive, first-principles approach for computing non-dilute transport coefficients and designing MPEAs with targeted transport properties.", "url": "https://arxiv.org/abs/2603.24228", "type": "数值", "summary": "多主元合金（MPEA）中空位介导的扩散仍然知之甚少。由于大量的化学元素，现有的计算方法在将电子结构与宏观输运系数联系起来方面面临着挑战。为了解决这个问题，我们引入了嵌入式局部簇扩展（eLCE），它将第一原理计算与动力学蒙特卡罗模拟结合起来，以计算多组分扩散系数矩阵。将这种方法应用于 V-Cr-Nb-Mo-Ta-W 系统中的难熔 MPEA，我们评估了六组分合金在有限温度下的完整迁移率和扩散张量。我们发现局部动力学势垒，而不是热力学或空位相关因素，主要控制这些材料中的扩散。扩散是缓慢的还是反缓慢的取决于相对于混合规则估计的平均空位迁移势垒以及快速扩散物种的渗透路径的可用性。我们利用这种洞察力来筛选神经成分空间并识别具有抗缓慢扩散的成分。\n\n本研究提出了一种预测性第一原理方法，用于计算非稀释输运系数并设计具有目标输运特性的 MPEA。", "authors": [{"name": "Damien K. J. Lee"}, {"name": "Anirudh Raju Natarajan"}], "featured_authors": [{"name": "Damien K. J. Lee"}, {"name": "Anirudh Raju Natarajan"}], "author_count": 2}, {"id": "2603.24277", "category": "cond-mat", "title": "Run, Tumble and Paint", "abstract": "The visit probability, quantifying whether a particle has reached a given point for the first time by a specified time, provides access to various extreme value statistics and serves as a fundamental tool for characterising active matter models. However, previous studies have largely neglected how the visit probability depends on the internal degree of freedom driving the active particle. To address this, we calculate the \"state-dependent'' visit probability for a Run-and-Tumble particle, that is the probability that the particle first passes through $x$ before time $t$, keeping track of its internal state during first passage. This process may be thought of as the particle \"painting'' the positions it passes through for the time in the colour of its self-propulsion state. We perform this calculation in one dimension using Doi-Peliti field theory, by extending the tracer mechanism from previous works to incorporate such \"polar deposition'' and demonstrate that state-dependent visit probabilities can be elegantly captured within this field-theoretic framework. We further derive the total volume covered by a right- (or left-) moving Run-and-Tumble particle and compare our results with known expressions for Brownian motion.", "url": "https://arxiv.org/abs/2603.24277", "type": "理论+数值", "summary": "访问概率量化粒子是否在指定时间内首次到达给定点，提供对各种极值统计数据的访问，并作为表征活动物质模型的基本工具。然而，之前的研究很大程度上忽略了访问概率如何取决于驱动活性粒子的内部自由度。为了解决这个问题，我们计算了运行翻滚粒子的“状态相关”访问概率，即粒子在时间 $t$ 之前首先通过 $x$ 的概率，并在第一次通过期间跟踪其内部状态。这个过程可以被认为是粒子用其自推进状态的颜色“绘制”它在该时间通过的位置。我们使用 Doi-Peliti 场论在一维中执行此计算，通过扩展以前作品中的示踪剂机制以纳入此类“极性沉积”，并证明可以在该场论框架内优雅地捕获与状态相关的访问概率。\n\n我们进一步推导出右（或左）移动的运行翻滚粒子所覆盖的总体积，并将我们的结果与已知的布朗运动表达式进行比较。", "authors": [{"name": "Emir Sezik"}, {"name": "Callum Britton"}, {"name": "Alex Touma"}, {"name": "Gunnar Pruessner"}], "featured_authors": [{"name": "Emir Sezik"}, {"name": "Callum Britton"}, {"name": "Alex Touma"}, {"name": "Gunnar Pruessner"}], "author_count": 4}, {"id": "2603.24289", "category": "cond-mat", "title": "Classification of intrinsically mixed $1+1$D non-invertible Rep$(G) \\times G$ SPT phases", "abstract": "We classify $1+1$d bosonic SPT phases with non-invertible symmetry $\\mathrm{Rep}(G)\\times G$, equivalently the fusion-category symmetry $\\mathcal{H}=\\mathrm{Rep}(G)\\times\\mathrm{Vec}_G$. Focusing on \\emph{intrinsically mixed} phases (trivial under either factor alone), we use the correspondence between $\\mathcal{H}$-SPTs, $\\mathcal{H}$-modules over $\\mathrm{Vec}$, and fiber functors $\\mathcal{H}\\to\\mathrm{Vec}$ to obtain a complete classification: such phases are parametrized by $\\phi\\in\\operatorname{End}(G)$. For each $\\phi$ we identify the associated condensable (Lagrangian) algebra $\\mathcal{A}_\\phi$ in the bulk $\\mathcal{Z}(\\mathcal{H})\\simeq\\mathcal{D}_G^2$. We further provide an explicit lattice realization by modifying Kitaev's quantum double model with a domain wall $\\mathcal{B}_\\phi$ and smooth/rough boundaries, and then contracting to a 1D chain, yielding a (possibly twisted) group-based cluster state whose ribbon-generated symmetry operators encode the same $\\phi$.", "url": "https://arxiv.org/abs/2603.24289", "type": "理论", "summary": "我们对具有不可逆对称性 $\\mathrm{Rep}(G)\\times G$ 的 $1+1$d 玻色 SPT 相进行分类，相当于融合类别对称性 $\\mathcal{H}=\\mathrm{Rep}(G)\\times\\mathrm{Vec}_G$。着眼于 \\emph{本质上混合} 阶段（单独在任一因素下微不足道），我们使用 $\\mathcal{H}$-SPT、$\\mathrm{Vec}$ 上的 $\\mathcal{H}$-模块和纤维函子 $\\mathcal{H}\\to\\mathrm{Vec}$ 之间的对应关系来获得完整的分类：这些阶段的参数化为$\\phi\\in\\operatorname{End}(G)$.对于每个 $\\phi$，我们在块 $\\mathcal{Z}(\\mathcal{H})\\simeq\\mathcal{D}_G^2$ 中识别相关的可压缩（拉格朗日）代数 $\\mathcal{A}_\\phi$。我们进一步通过用畴壁 $\\mathcal{B}_\\phi$ 和平滑/粗糙边界修改 Kitaev 的量子双模型来提供显式晶格实现，然后收缩到一维链，产生一个（可能扭曲的）基于群的簇状态，其带状生成的对称算子编码相同的 $\\phi$。", "authors": [{"name": "Youxuan Wang"}], "featured_authors": [{"name": "Youxuan Wang"}], "author_count": 1}, {"id": "2603.24347", "category": "cond-mat", "title": "Breakdown of the periodic potential ansatz in correlated electron systems", "abstract": "Our electronic structure theory for crystalline solids is commonly built on the periodic potential assumption $V(\\mathbf r)=V(\\mathbf r+\\mathbf R)$ for every lattice translation $\\mathbf R$, enabling Bloch eigenstates, crystal momentum as a good quantum number, and the standard quasiparticle-based description of the behavior of metals. Because the zero-point motion of the ions, however, in correlated electron systems the electronic environment experienced by an itinerant electron is neither static nor self-averaging at the single-particle level, even in perfectly stoichiometric crystals, leading to a distribution of local Kondo scales that spans two orders of magnitude in temperature. We discuss, through a comparison between uniform scenarios and one that breaks with perfect lattice translational symmetry, how incorporating this distribution yields a unified description for all heavy-fermion systems at the quantum critical point.", "url": "https://arxiv.org/abs/2603.24347", "type": "理论", "summary": "我们的晶体固体电子结构理论通常建立在每个晶格平移 $\\mathbf R$ 的周期性势假设 $V(\\mathbf r)=V(\\mathbf r+\\mathbf R)$ 之上，从而实现布洛赫本征态、晶体动量作为良好的量子数，以及基于标准准粒子的金属行为描述。然而，由于离子的零点运动，在相关电子系统中，巡回电子所经历的电子环境在单粒子水平上既不是静态的也不是自平均的，即使在完美的化学计量晶体中也是如此，导致局部近藤尺度的分布在温度上跨越两个数量级。通过比较统一场景和破坏完美晶格平移对称性的场景，我们讨论了如何结合这种分布为所有重费米子系统在量子临界点产生统一的描述。", "authors": [{"name": "Wouter Montfrooij"}], "featured_authors": [{"name": "Wouter Montfrooij"}], "author_count": 1}, {"id": "2603.24412", "category": "cond-mat", "title": "Fragile topology for six-fold rotation symmetry indicated by the concentric Wilson loop spectrum", "abstract": "We investigate topological phase transitions for the Haldane and Kane-Mele model in a lattice with $p6$ symmetry, which consists of triangles and hexagons arranged in a two-dimensional geometry. For the Haldane model, which breaks time-reversal symmetry, we calculate the Chern number using a multi-band non-Abelian Wilson loop formalism. By varying the hopping parameters in the triangles and hexagons independently, a large variety of topological phases emerge. In the presence of a next-next-nearest neighbor hopping, the phase diagram becomes even richer, with regions exhibiting high Chern numbers. Then, we consider the Kane-Mele model, for which time-reversal symmetry is preserved, and calculate the number of $\\pi$-crossings in the Concentric Wilson Loop Spectrum (CWLS). This method is appropriate to determine the topological invariant for systems hosting time-reversal and rotational symmetry, but lacking all other symmetries. According to a classification based on $K$-theory, the CWLS invariant reveals topological properties even when more conventional invariants fail to detect them. The formalism was previously successfully applied to systems with 3- and 4-fold symmetry. Here, we surprisingly find that for the 6-fold-symmetry model investigated, the topology identified by this invariant is fragile, therefore questioning the claim that this should be the strong invariant missing in a complete classification of topological insulators.", "url": "https://arxiv.org/abs/2603.24412", "type": "理论+数值", "summary": "我们研究了具有 $p6$ 对称性的晶格中 Haldane 和 Kane-Mele 模型的拓扑相变，该晶格由排列成二维几何形状的三角形和六边形组成。对于打破时间反转对称性的 Haldane 模型，我们使用多带非阿贝尔威尔逊循环形式计算陈数。通过独立地改变三角形和六边形中的跳跃参数，出现各种各样的拓扑相。在存在下一个最近邻跳跃的情况下，相图变得更加丰富，其中区域表现出高陈数。然后，我们考虑保留时间反转对称性的 Kane-Mele 模型，并计算同心威尔逊环谱 (CWLS) 中 $\\pi$ 交叉的数量。该方法适用于确定具有时间反转和旋转对称性但缺乏所有其他对称性的系统的拓扑不变量。根据基于 $K$ 理论的分类，CWLS 不变量揭示了拓扑特性，即使更传统的不变量无法检测到它们。该形式主义之前已成功应用于具有 3 重和 4 重对称性的系统。\n\n在这里，我们令人惊讶地发现，对于所研究的六重对称模型，由该不变量识别的拓扑是脆弱的，因此质疑这应该是拓扑绝缘体的完整分类中缺失的强不变量的说法。", "authors": [{"name": "Xinyang Li"}, {"name": "Lumen Eek"}, {"name": "Jasper van Wezel"}, {"name": "Cristiane Morais Smith"}], "featured_authors": [{"name": "Xinyang Li"}, {"name": "Lumen Eek"}, {"name": "Jasper van Wezel"}, {"name": "Cristiane Morais Smith"}], "author_count": 4}, {"id": "2603.24438", "category": "cond-mat", "title": "Models of 3D confluent tissue as under-constrained glasses", "abstract": "The dynamics of glassy materials slows down upon cooling, typically showing either Arrhenius or super-Arrhenius behavior. However, it was recently shown that 2D cell-based models for biological tissues can be continuously tuned between Arrhenius and sub-Arrhenius dynamics. In previous work, using the 2D Voronoi model, we proposed that such atypical dynamical behavior could be a generic feature of the broad class of mechanically under-constrained materials. Our earlier study had left two important points open: (1) many 2D systems are affected by long-wavelength fluctuations and the 2D melting scenario, and (2) the 2D Voronoi model sits exactly at the isostatic point, making it a marginal case rather than a strictly under-constrained one. Both points complicate the interpretation of our 2D Voronoi model results and their generalization to other systems; to remedy this, here we use large-scale simulations to study the glassy behavior of the 3D extension of the Voronoi model. We first show that the structural relaxation time $\\tau_\\alpha$ of the 3D Voronoi model can be tuned between sub-Arrhenius and Arrhenius behavior, like the 2D Voronoi model. We then establish that the four-point susceptibility, the structure factor, and the model's mechanical properties all display trends consistent with the 2D Voronoi model. These results provide strong evidence that sub-Arrhenius glassy dynamics are a generic feature of under-constrained materials across dimensions. Our work thus broadens the class of disordered materials known to have highly unusual glassy phenomenology.", "url": "https://arxiv.org/abs/2603.24438", "type": "理论+数值", "summary": "玻璃态材料的动力学在冷却时减慢，通常表现出阿伦尼乌斯行为或超阿伦尼乌斯行为。然而，最近的研究表明，基于细胞的二维生物组织模型可以在阿伦尼乌斯动力学和亚阿伦尼乌斯动力学之间连续调整。在之前的工作中，我们使用 2D Voronoi 模型提出，这种非典型的动力学行为可能是一大类机械欠约束材料的通用特征。我们早期的研究留下了两个重要的问题：（1）许多二维系统受到长波长涨落和二维熔化场景的影响，（2）二维 Voronoi 模型恰好位于均衡点，使其成为一种边缘情况，而不是严格欠约束的情况。这两点都使我们的 2D Voronoi 模型结果的解释及其对其他系统的推广变得复杂；为了解决这个问题，我们在这里使用大规模模拟来研究 Voronoi 模型 3D 扩展的玻璃行为。我们首先表明，3D Voronoi 模型的结构弛豫时间 $\\tau_\\alpha$ 可以在亚阿伦尼乌斯行为和阿伦尼乌斯行为之间调整，就像 2D Voronoi 模型一样。\n\n然后我们确定四点磁化率、结构因子和模型的力学性能都显示出与 2D Voronoi 模型一致的趋势。这些结果提供了强有力的证据，表明亚阿累尼乌斯玻璃态动力学是跨维度欠约束材料的一般特征。因此，我们的工作拓宽了已知具有极不寻常的玻璃现象学的无序材料的类别。", "authors": [{"name": "Chengling Li"}, {"name": "Matthias Merkel"}, {"name": "Daniel M. Sussman"}], "featured_authors": [{"name": "Chengling Li"}, {"name": "Matthias Merkel"}, {"name": "Daniel M. Sussman"}], "author_count": 3}, {"id": "2603.24445", "category": "cond-mat", "title": "Electrical Transport and Quantum Oscillations in the Metallic Spin Supersolid EuCo2Al9", "abstract": "The discovery of spin supersolid and its giant magnetocaloric effect has opened a new arena in frustrated quantum magnets and cutting-edge cryogenics. The intermetallic EuCo2Al9 (ECA), for the first time, extends this intriguing phase from Mott insulators to a highly conductive metal [1]. In this work, we systematically study the electrical transport properties of ECA, where itinerant electrons serve as a sensitive probe for the spin supersolid states. We observe anomalies both in the temperature-dependent resistivity and field-dependent magnetoresistance and Hall signals, which are attributed to response of electrons to the Eu2+ spins and their fluctuations. Moreover, Shubnikov-de Haas quantum oscillations at high magnetic field reveal pronounced band splitting in the spin polarized state. Our results reveal an intimate correspondence between electrical transport and magnetic transitions in ECA, deepening the understanding of this metallic spin supersolid.", "url": "https://arxiv.org/abs/2603.24445", "type": "理论", "summary": "自旋超固体及其巨磁热效应的发现为受挫量子磁体和尖端低温学开辟了新的领域。金属间化合物 EuCo2Al9 (ECA) 首次将这一有趣的相从莫特绝缘体扩展到高导电金属 [1]。在这项工作中，我们系统地研究了 ECA 的电传输特性，其中流动电子充当自旋超固态的敏感探针。我们观察到与温度相关的电阻率和与场相关的磁阻以及霍尔信号的异常，这些异常归因于电子对 Eu2+ 自旋及其波动的响应。此外，高磁场下的舒布尼科夫-德哈斯量子振荡揭示了自旋极化态下明显的能带分裂。我们的结果揭示了 ECA 中电传输和磁转变之间的密切对应关系，加深了对这种金属自旋超固体的理解。", "authors": [{"name": "Xitong Xu"}, {"name": "Yonglai Liu"}, {"name": "Ning Xi"}, {"name": "Mingfang Shu"}, {"name": "Haitian Zhao"}, {"name": "Jiajun Xie"}, {"name": "Guoliang Wu"}, {"name": "Hao Chen"}, {"name": "Miao He"}, {"name": "Pengzhi Chen"}, {"name": "Ze Wang"}, {"name": "Zhentao Wang"}, {"name": "Chuanying Xi"}, {"name": "Mingliang Tian"}, {"name": "Haifeng Du"}, {"name": "Jie Ma"}, {"name": "Xi Chen"}, {"name": "Wei Li"}, {"name": "Zhe Qu"}], "featured_authors": [{"name": "Xitong Xu"}, {"name": "Yonglai Liu"}, {"name": "Ning Xi"}, {"name": "Xi Chen"}, {"name": "Wei Li"}, {"name": "Zhe Qu"}], "author_count": 19}, {"id": "2603.24453", "category": "cond-mat", "title": "Intertwined spin and charge dynamics in one-dimensional supersymmetric t-J model", "abstract": "Following the Bethe ansatz we determine the dynamical spectra of the one-dimensional supersymmetric t-J model. A series of fractionalized excitations are identified through two sets of Bethe numbers. Typical patterns in each set are found to yield wavefunctions containing elementary spin and charge carriers, manifested as distinct boundaries of the collective excitations in the spectra of single electron Green functions. In spin channels, gapless excitations fractionalized into two spin and a pair of postive and negative charge carriers, extending to finite energy as multiple continua. These patterns connect to the half-filling limit where only fractionalized spinons survive. In particle density channel, apart from spin-charge fractionalization, excitations involving only charge fluctuations are observed. Furthermore, nontrivial Bethe strings encoding bound state structure appear in channels of reducing or conserving magnetization, where spin and charge constituents can also be identified. These string states contribute significantly even to the low-energy sector in the limit of vanishing magnetization.", "url": "https://arxiv.org/abs/2603.24453", "type": "理论", "summary": "遵循 Bethe ansatz，我们确定了一维超对称 t-J 模型的动力学谱。通过两组贝特数来识别一系列分段激励。发现每组中的典型模式产生包含基本自旋和电荷载流子的波函数，表现为单电子格林函数光谱中集体激发的不同边界。在自旋通道中，无间隙激发分为两个自旋和一对正负电荷载流子，以多重连续体的形式延伸到有限能量。这些模式连接到半填充极限，其中只有分数化的自旋子才能生存。在粒子密度通道中，除了自旋电荷分裂之外，还观察到仅涉及电荷波动的激发。此外，编码束缚态结构的非平凡贝特弦出现在磁化强度减少或守恒的通道中，其中自旋和电荷成分也可以被识别。在磁化强度消失的极限下，这些弦态甚至对低能扇区也有显着贡献。", "authors": [{"name": "Yunjing Gao"}, {"name": "Jianda Wu"}], "featured_authors": [{"name": "Yunjing Gao"}, {"name": "Jianda Wu"}], "author_count": 2}, {"id": "2603.24471", "category": "cond-mat", "title": "Tunable linear polarization of interface excitons at lateral heterojunctions", "abstract": "We develop a theory of polarized photoluminescence of interface excitons localized at lateral heterojunctions between transition metal dichalcogenide monolayers. We show that the circular selection rules governing interband optical transitions exactly at the band extrema are modified at finite wave vectors. The corresponding wave-vector-dependent corrections to the optical matrix elements result in a net linear polarization of excitonic photoluminescence. We identify two microscopic mechanisms responsible for linear polarization$-$trigonal warping of the electron and hole dispersions and the energy dependence of the effective masses. Their interplay controls both the magnitude and the angle of the emitted light polarization, with distinct dependences on the crystallographic orientation of the interface. Using a microscopic variational approach, we demonstrate that the degree of linear polarization can reach values exceeding 10% in realistic heterostructures. Furthermore, due to the large built-in dipole moment of interface excitons, their optical response can be tuned by an external in-plane electric field, enabling control over the strength and direction of the polarization.", "url": "https://arxiv.org/abs/2603.24471", "type": "理论+数值", "summary": "我们发展了一种位于过渡金属二硫族化物单层之间横向异质结处的界面激子的偏振光致发光理论。我们证明了在带极值处精确控制带间光学跃迁的圆形选择规则在有限波矢量处进行了修改。对光学矩阵元素的相应波矢量相关校正导致激子光致发光的净线性偏振。我们确定了导致电子和空穴色散的线性偏振$-$三角扭曲以及有效质量的能量依赖性的两种微观机制。它们的相互作用控制发射光偏振的大小和角度，并且明显依赖于界面的晶体取向。使用微观变分方法，我们证明了在实际异质结构中线性偏振度可以达到超过 10% 的值。此外，由于界面激子具有较大的内置偶极矩，它们的光学响应可以通过外部面内电场来调节，从而能够控制偏振的强度和方向。", "authors": [{"name": "M. V. Durnev"}, {"name": "D. S. Smirnov"}], "featured_authors": [{"name": "M. V. Durnev"}, {"name": "D. S. Smirnov"}], "author_count": 2}, {"id": "2603.24482", "category": "cond-mat", "title": "Fine-tuning universal machine learning potentials for transition state search in surface catalysis", "abstract": "Determining transition states (TSs) of surface reactions is central to understanding and designing heterogeneous catalysts but remains computationally prohibitive with density functional theory (DFT). While machine learning potentials (MLPs) offer significant speedups, task-specific models have limited transferability across catalytic systems, and universal MLPs (uMLPs) lack the accuracy needed for reactive configurations. Here, we present a workflow based on active learning to iteratively fine-tune uMLPs for DFT-quality TS search. Using 250 TSs from the CO2 hydrogenation reaction network on metal and single-atom alloy surfaces, we first benchmark TS search algorithms, identifying the Sella algorithm as most robust, and propose a modification (Bond-Aware Sella) that substantially improves its success rate. We then explore sequential and batch active-learning strategies for fine-tuning and show that DFT-quality TS structures can be found using only 8 DFT single-point calculations on average per structure. This demonstrates the viability of fine-tuned uMLPs for high-throughput catalyst screening.", "url": "https://arxiv.org/abs/2603.24482", "type": "理论+数值", "summary": "确定表面反应的过渡态 (TS) 是理解和设计多相催化剂的核心，但密度泛函理论 (DFT) 在计算上仍然令人望而却步。虽然机器学习潜力 (MLP) 提供了显着的加速，但特定任务模型在催化系统中的可转移性有限，并且通用 MLP (uMLP) 缺乏反应配置所需的准确性。在这里，我们提出了一个基于主动学习的工作流程，用于迭代微调 uMLP 以实现 DFT 质量的 TS 搜索。使用来自金属和单原子合金表面上的 CO2 加氢反应网络的 250 个 TS，我们首先对 TS 搜索算法进行基准测试，确定 Sella 算法最稳健，并提出一种修改方案（Bond-Aware Sella），可显着提高其成功率。然后，我们探索了用于微调的顺序和批量主动学习策略，并表明平均每个结构仅使用 8 次 DFT 单点计算即可找到 DFT 质量的 TS 结构。这证明了微调 uMLP 用于高通量催化剂筛选的可行性。", "authors": [{"name": "Raffaele Cheula"}, {"name": "Mie Andersen"}, {"name": "John R. Kitchin"}], "featured_authors": [{"name": "Raffaele Cheula"}, {"name": "Mie Andersen"}, {"name": "John R. Kitchin"}], "author_count": 3}, {"id": "2603.24537", "category": "cond-mat", "title": "Radial Distribution Function in a Two Dimensional Core-Shoulder Particle System", "abstract": "An important quantity in liquid state theory is the radial distribution function $g(r)$. It can be calculated within the framework of classical density functional theory in two very distinct ways. In the test-particle route, one fixes a single fluid particle, turning it into an external potential in which the inhomogeneous structure of the fluid is calculated by minimising the functional. The second route to $g(r)$ in density functional theory employs the Ornstein-Zernike equation and the pair direct correlation function, that can be obtained from the second functional derivatives of the excess free energy functional. Since typically an approximate excess free energy functional is employed, one generally expects that the test-particle route, which requires only one functional derivative, to be more accurate than the Ornstein-Zernike route. Here we study a two dimensional core-shoulder particle system and present results that challenge this expectation. Our results show that in this system test-particle results for $g(r)$ are not always better than results obtained via the Ornstein-Zernike route.", "url": "https://arxiv.org/abs/2603.24537", "type": "理论+数值", "summary": "液态理论中的一个重要量是径向分布函数$g(r)$。它可以在经典密度泛函理论的框架内以两种截然不同的方式进行计算。在测试粒子路线中，固定单个流体粒子，将其转化为外部势，其中通过最小化泛函来计算流体的非均匀结构。密度泛函理论中 $g(r)$ 的第二条途径采用 Ornstein-Zernike 方程和成对直接相关函数，该函数可以从超额自由能泛函的二阶泛函导数获得。由于通常采用近似过量自由能泛函，因此人们通常期望仅需要一种泛函导数的测试粒子路线比 Ornstein-Zernike 路线更准确。在这里，我们研究了二维核肩粒子系统，并提出了挑战这一期望的结果。我们的结果表明，在该系统中，$g(r)$ 的测试粒子结果并不总是比通过 Ornstein-Zernike 路线获得的结果更好。", "authors": [{"name": "Michael Wassermair"}, {"name": "Gerhard Kahl"}, {"name": "Andrew J Archer"}, {"name": "Roland Roth"}], "featured_authors": [{"name": "Michael Wassermair"}, {"name": "Gerhard Kahl"}, {"name": "Andrew J Archer"}, {"name": "Roland Roth"}], "author_count": 4}, {"id": "260
