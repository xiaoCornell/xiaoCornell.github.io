": "Miguel García Fernández"}], "featured_authors": [{"name": "Riccardo Borsato"}, {"name": "Miguel García Fernández"}], "author_count": 2}, {"id": "2604.07293", "category": "hep-th", "title": "Exotic theta terms in 2+1d fractonic field theory", "abstract": "In this work, we study exotic theta terms in the 2+1d $\\phi$-theory, which provides a continuum description of the XY-plaquette model. The $\\phi$-theory can be viewed as a fractonic analogue of the 1+1d compact boson and exhibits momentum and winding subsystem symmetries. In this theory, discontinuous field configurations play a crucial role. Although such configurations spoil the naive topology of the field, they induce nontrivial backreactions that give rise to new topological terms. We study two types of theta terms, which we call the bulk theta term and the foliated theta term. The foliated theta term is constructed by coupling winding currents on neighboring leaves of a foliation. Remarkably, the corresponding theta angle can vary spatially without affecting the classical equations of motion. Both theta terms lead to generalized Witten effects, in which vortex operators carrying winding subsystem charge acquire momentum subsystem charge. In the case of the foliated theta angle, the Witten effect exhibits a more intricate structure: vortex operators acquire a quadrupolar momentum charge. We demonstrate these features using lattice realizations based on the modified Villain formulation.", "url": "https://arxiv.org/abs/2604.07293", "type": "理论", "summary": "在这项工作中，我们研究了 2+1d $\\phi$ 理论中的奇异 theta 项，该理论提供了 XY-plaquette 模型的连续统描述。 $\\phi$ 理论可以被视为 1+1d 紧致玻色子的分形模拟，并表现出动量和缠绕子系统对称性。在这个理论中，不连续场配置起着至关重要的作用。尽管这种配置破坏了场的朴素拓扑，但它们引起了不平凡的反反应，从而产生了新的拓扑项。我们研究两种类型的 θ 项，我们称之为大块 θ 项和叶状 θ 项。叶状 theta 项是通过耦合叶状相邻叶子上的绕组电流来构造的。值得注意的是，相应的 theta 角可以在空间上变化，而不影响经典的运动方程。两个 θ 项都会导致广义维滕效应，其中携带缠绕子系统电荷的涡算子获得动量子系统电荷。在叶状 theta 角的情况下，威滕效应表现出更复杂的结构：涡旋算子获得四极动量电荷。\n\n我们使用基于修改后的 Villain 公式的晶格实现来演示这些功能。", "authors": [{"name": "Yuki Furukawa"}], "featured_authors": [{"name": "Yuki Furukawa"}], "author_count": 1}, {"id": "2604.07332", "category": "hep-th", "title": "Theoretical and Observational Bounds on Dynamical Chern-Simons Gravity as an Effective Field Theory", "abstract": "Gravitational effective theories are essential for characterizing the space of deviations from General Relativity (GR). Testing these theories against fundamental principles, such as causality and unitarity, can yield constraints on the corresponding parameters. In this paper, we perform such an analysis on the very interesting dynamical Chern-Simons (dCS) gravity. This is a parity violating correction to GR wherein a new scalar field couples to the Pontryagin density $^*R\\,R$. It has generated significant interest, including possible new gravitational wave shapes for LIGO/Virgo and new phenomena from cosmic inflation. In this work, we begin by deriving the dispersion relation and wave packet speed on top of a gravitational wave background in dCS gravity. This alters the corresponding Shapiro time delay (which we compute to second order), potentially giving superluminality. Causality then demands a bound on the dCS coupling constant, which we find to be moderately sharper, but compatible with, standard estimates. We then examine a UV completion in the form of a set of $N$ fermions with a (pseudo) Yukawa coupling. By imposing perturbativity and a gravitational species bound, we find that the dCS coupling constant is constrained significantly more, depending on the choice of scale of the species bound. We also identify higher order operators generated from the UV completion. Overall, we find that any dCS corrections to gravitational dynamics should likely be very small on macroscopic systems of observational interest, such as in late-time merging black holes.", "url": "https://arxiv.org/abs/2604.07332", "type": "理论", "summary": "引力有效理论对于表征广义相对论 (GR) 的偏差空间至关重要。根据因果关系和幺正性等基本原理测试这些理论可以产生对相应参数的约束。在本文中，我们对非常有趣的动力学 Chern-Simons (dCS) 引力进行了这样的分析。这是对 GR 的宇称违规校正，其中新的标量场耦合到庞特里亚金密度 $^*R\\,R$。它引起了人们的极大兴趣，包括 LIGO/Virgo 可能出现的新引力波形状以及宇宙膨胀的新现象。在这项工作中，我们首先推导 dCS 引力中引力波背景上的色散关系和波包速度。这改变了相应的夏皮罗时间延迟（我们将其计算为二阶），可能会产生超光度。然后，因果关系要求 dCS 耦合常数有一个界限，我们发现该界限稍微尖锐一些，但与标准估计兼容。然后，我们以一组 $N$ 费米子和（伪）汤川耦合的形式检查 UV 完成。\n\n通过施加微扰和引力物质束缚，我们发现 dCS 耦合常数受到更大的限制，具体取决于物质束缚尺度的选择。我们还识别了 UV 补全生成的高阶算子。总体而言，我们发现，在具有观测兴趣的宏观系统中，例如在晚期合并黑洞中，对引力动力学的任何 dCS 修正都可能非常小。", "authors": [{"name": "Alexander Cassem"}, {"name": "Mark P. Hertzberg"}], "featured_authors": [{"name": "Alexander Cassem"}, {"name": "Mark P. Hertzberg"}], "author_count": 2}, {"id": "2604.07334", "category": "hep-th", "title": "The BEF Symplectic Form: A Lagrangian Perspective", "abstract": "In 2025, Bernardes, Erler and Firat proposed a novel, elegant expression for the symplectic form on phase space applicable to non-local theories. We show that this BEF symplectic structure can be derived directly from an $L_\\infty$-Lagrangian by following the covariant phase space approach. Moreover, we establish a precise relation between the BEF symplectic structure and the Barnich--Brandt symplectic form for general finite-derivative theories. In particular, we prove that for theories with second-order equations of motion, the BEF symplectic structure coincides with the Barnich--Brandt construction, thereby explaining the emergence of the canonical corner term in general relativity within the BEF approach. We further argue that the BEF symplectic structure naturally encodes information about generic corner terms and some information about boundary conditions. In addition, we develop a general expression for the Hamiltonian in theories in $L_\\infty$-form and present several explicit examples illustrating the construction.", "url": "https://arxiv.org/abs/2604.07334", "type": "理论", "summary": "2025 年，Bernardes、Erler 和 Firat 提出了适用于非局部理论的相空间辛形式的一种新颖、优雅的表达方式。我们证明，这种 BEF 辛结构可以通过遵循协变相空间方法直接从 $L_\\infty$-拉格朗日导出。此外，我们还为一般有限导数理论建立了 BEF 辛结构和 Barnich-Brandt 辛形式之间的精确关系。特别是，我们证明了对于二阶运动方程的理论，BEF 辛结构与 Barnich-Brandt 结构一致，从而解释了 BEF 方法中广义相对论中正则角项的出现。我们进一步认为，BEF 辛结构自然地编码了有关通用角项的信息和一些有关边界条件的信息。此外，我们以 $L_\\infty$ 形式开发了理论中哈密顿量的一般表达式，并提出了几个说明其构造的明确示例。", "authors": [{"name": "Mohd Ali"}, {"name": "Georg Stettinger"}], "featured_authors": [{"name": "Mohd Ali"}, {"name": "Georg Stettinger"}], "author_count": 2}, {"id": "2604.06488", "category": "math-ph", "title": "Noether-Type Theorems and the Generalized Herglotz Principle in $q$-Contact Geometry", "abstract": "We develop a unified geometric framework for dissipative mechanical systems based on uniform $q$-contact manifolds, which provide an extended phase space equipped with multiple contact $1$-forms. Within this setting, we construct both Hamiltonian and Lagrangian formalisms and establish a generalized Noether-type theorem describing the relationship between symmetries and dissipated quantities. We further show that $q$-contact Lagrangian systems admit a genuine variational origin through a generalized Herglotz principle involving multiple action variables. The resulting $q$-contact Euler--Lagrange equations naturally depend on the scalar combination $\\sum_{i=1}^q \\partial L/\\partial z_i$, reflecting the intrinsic structure of uniform $q$-contact geometry. We prove that this variational formulation is fully equivalent to the geometric $q$-contact Hamiltonian dynamics generated by the energy function. Several explicit examples involving multi-parameter dependent dynamics illustrate the effectiveness of the theory and demonstrate its potential to provide geometric insight into complex dissipative systems, thereby extending the scope of classical Lagrangian mechanics beyond symplectic and single-contact structures.", "url": "https://arxiv.org/abs/2604.06488", "type": "理论", "summary": "我们为基于均匀 $q$ 接触流形的耗散机械系统开发了一个统一的几何框架，该框架提供了配备多个接触 $1$ 形式的扩展相空间。在此背景下，我们构建了哈密顿形式主义和拉格朗日形式主义，并建立了描述对称性和耗散量之间关系的广义诺特型定理。我们进一步表明，$q$-接触拉格朗日系统通过涉及多个作用变量的广义赫格洛茨原理承认真正的变分起源。由此产生的$q$-接触欧拉-拉格朗日方程自然取决于标量组合$\\sum_{i=1}^q \\partial L/\\partial z_i$，反映了均匀$q$-接触几何的内在结构。我们证明这个变分公式完全等价于能量函数生成的几何$q$接触哈密顿动力学。\n\n涉及多参数相关动力学的几个明确的例子说明了该理论的有效性，并证明了其为复杂耗散系统提供几何洞察的潜力，从而将经典拉格朗日力学的范围扩展到辛和单接触结构之外。", "authors": [{"name": "Melvin Leok"}, {"name": "Cristina Sardón"}, {"name": "Xuefeng Zhao"}], "featured_authors": [{"name": "Melvin Leok"}, {"name": "Cristina Sardón"}, {"name": "Xuefeng Zhao"}], "author_count": 3}, {"id": "2604.06577", "category": "math-ph", "title": "The clothoid helices obtained via the Lie-Darboux method", "abstract": "The clothoid helices that have both curvature and torsion directly proportional to the arclength are obtained via the Lie-Darboux method and studied in some detail. Shifted counterparts are also introduced and presented in the same approach.", "url": "https://arxiv.org/abs/2604.06577", "type": "理论", "summary": "通过 Lie-Darboux 方法获得了曲率和挠率均与弧长成正比的回旋曲线，并对其进行了详细研究。还以相同的方法引入和呈现转移的对应物。", "authors": [{"name": "H.C. Rosu"}, {"name": "J. de la Cruz"}, {"name": "P. Lemus-Basilio"}], "featured_authors": [{"name": "H.C. Rosu"}, {"name": "J. de la Cruz"}, {"name": "P. Lemus-Basilio"}], "author_count": 3}, {"id": "2604.06919", "category": "math-ph", "title": "Variational derivation of the homogeneous Boltzmann equation", "abstract": "We introduce a variational formulation of the homogeneous Boltzmann equation, with hard-sphere cross section, which selects the unique energy conserving solution. We prove that this solution arises from the microscopic dynamics, namely Kac's walk, and we establish the propagation in time of entropic chaoticity, under the minimal assumption that the initial distribution is entropically chaotic.", "url": "https://arxiv.org/abs/2604.06919", "type": "理论", "summary": "我们引入了具有硬球横截面的齐次玻尔兹曼方程的变分公式，它选择了唯一的能量守恒解。我们证明该解源自微观动力学，即 Kac 游走，并且在初始分布是熵混沌的最小假设下建立了熵混沌性随时间的传播。", "authors": [{"name": "Giada Basile"}, {"name": "Dario Benedetto"}, {"name": "Carlo Orrieri"}], "featured_authors": [{"name": "Giada Basile"}, {"name": "Dario Benedetto"}, {"name": "Carlo Orrieri"}], "author_count": 3}, {"id": "2604.07130", "category": "math-ph", "title": "Existence of a Phase Transition in the One-Dimensional Ising Spin Glass Model with Long-Range Interactions on the Nishimori Line", "abstract": "Dyson [Commun. Math. Phys. 12, 91 (1969)] rigorously proved the existence of a phase transition in the one-dimensional Ising model with long-range interactions of the form $r^{-\\alpha}$ for $1 < \\alpha < 2$. In the present study, we extend this result to the Ising spin glass model with Gaussian disorder on the Nishimori line. Following Dyson's method, we first prove the existence of long-range order at finite low temperatures in the Dyson hierarchical Ising spin glass model on the Nishimori line, with power-law-like interactions $J(r) \\sim r^{-\\alpha}$ for $1 < \\alpha < 3/2$. The key ingredients of the proof are the interpolation method developed in the rigorous analysis of mean-field spin glass models, the Gibbs--Bogoliubov inequality on the Nishimori line, and the Tsirelson--Ibragimov--Sudakov inequality (Gaussian concentration inequality). We then use the Griffiths inequality on the Nishimori line to rigorously establish the existence of a phase transition in the one-dimensional Ising spin glass model with long-range interactions on the Nishimori line for $1 < \\alpha < 3/2$. For $\\alpha \\ge 3/2$, the existence of a phase transition remains an open problem.", "url": "https://arxiv.org/abs/2604.07130", "type": "理论", "summary": "戴森[通讯。数学。物理。 12, 91 (1969)]严格证明了一维 Ising 模型中存在相变，其形式为 $r^{-\\alpha}$ 的长程相互作用，其中 $1 < \\alpha < 2$。在本研究中，我们将此结果扩展到西森线上具有高斯无序的伊辛自旋玻璃模型。遵循戴森的方法，我们首先证明了西森线戴森分层伊辛自旋玻璃模型中有限低温下长程有序的存在，具有类似幂律的相互作用 $J(r) \\sim r^{-\\alpha}$ for $1 < \\alpha < 3/2$。证明的关键要素是在平均场自旋玻璃模型的严格分析中开发的插值方法、西森线上的吉布斯-博戈柳博夫不等式以及齐雷尔森-伊布拉吉莫夫-苏达科夫不等式（高斯浓度不等式）。然后，我们使用西森线上的格里菲斯不等式严格建立一维伊辛自旋玻璃模型中相变的存在性，并在西森线上具有长程相互作用，$1 < \\alpha < 3/2$。对于$\\alpha \\ge 3/2$，相变的存在仍然是一个悬而未决的问题。", "authors": [{"name": "Manaka Okuyama"}, {"name": "Masayuki Ohzeki"}], "featured_authors": [{"name": "Manaka Okuyama"}, {"name": "Masayuki Ohzeki"}], "author_count": 2}, {"id": "2604.06270", "category": "quant-ph", "title": "Accelerating Quantum State Encoding with SIMD: Design, Implementation, and Benchmarking", "abstract": "Efficient data encoding is the main factor affecting how fast hybrid quantum-classical algorithms run, but traditional simulators spend most of their time changing classical features into quantum rotations. This work introduces Hybriqu Encoder, a Rust-based, SIMD-aware kernel that focuses exclusively on angle encoding and integrates transparently with Python via CFFI. The kernel processes four double-precision rotations at once using AVX-class vector lanes, combines data in a way that fits well with the cache and uses pre-calculated trigonometric factors, while keeping all unsafe operations within a safe Rust interface. Benchmarks on Apple Silicon show that using pure angle encoding is 5.4% faster at 64 qubits, and the speedup increases as the amount of data exceeds the L1 cache size, while kernels that quickly apply rotations to the entire state vector are limited by memory and do not benefit from SIMD. These results indicate that using vectorization leads to consistent improvements when calculations are the main focus, but limits on data transfer speed prevent additional speed increases, highlighting the need for future efforts on better state updates and choosing between different processing methods. By combining smart optimization that considers the architecture with Rust's safety features, the Hybriqu Encoder offers a flexible base for bigger, mixed systems designed to reduce data encoding delays in future hybrid quantum-classical processes.", "url": "https://arxiv.org/abs/2604.06270", "type": "理论+数值", "summary": "高效的数据编码是影响混合量子经典算法运行速度的主要因素，但传统模拟器花费大部分时间将经典特征转换为量子旋转。这项工作介绍了 Hybriqu Encoder，这是一个基于 Rust 的 SIMD 感知内核，专门专注于角度编码，并通过 CFFI 与 Python 透明集成。内核使用 AVX 级矢量通道同时处理四个双精度旋转，以适合缓存的方式组合数据并使用预先计算的三角因子，同时将所有不安全操作保留在安全的 Rust 接口内。 Apple Silicon 上的基准测试表明，使用纯角度编码在 64 个量子位上速度提高了 5.4%，并且随着数据量超过 L1 缓存大小，加速会增加，而快速将旋转应用于整个状态向量的内核受到内存限制，无法从 SIMD 中受益。\n\n这些结果表明，当计算是主要关注点时，使用矢量化可以带来持续的改进，但数据传输速度的限制阻止了额外的速度提高，突出表明未来需要努力改进状态更新并在不同的处理方法之间进行选择。通过将考虑架构的智能优化与 Rust 的安全功能相结合，Hybriqu 编码器为更大的混合系统提供了灵活的基础，旨在减少未来混合量子经典过程中的数据编码延迟。", "authors": [{"name": "Riza Alaudin Syah"}, {"name": "Irwan Alnarus Kautsar"}, {"name": "Gunawan Witjaksono"}, {"name": "Haza Nuzly Bin Abdull Hamed"}], "featured_authors": [{"name": "Riza Alaudin Syah"}, {"name": "Irwan Alnarus Kautsar"}, {"name": "Gunawan Witjaksono"}, {"name": "Haza Nuzly Bin Abdull Hamed"}], "author_count": 4}, {"id": "2604.06322", "category": "quant-ph", "title": "Probing the Planck scale with quantum computation", "abstract": "General relativity and quantum mechanics are incompatible at the Planck scale. This contention can be examined if a quantum computer is set to operate at a rate that exceeds the classical limit of one operation per Planck volume-time, or equivalently $2^{491}$ m$^{-3}$ s$^{-1}$. Here we quantify the relation between the logical qubit count and the extent to which classicality is challenged. We argue that 500 logical qubits are sufficient to reject theories confined to a laboratory. We account for the operational cost of computation and communication at all scales up to and including the observable universe, ultimately constrained by a 1600-logical-qubit computer. Remarkably, current plans for commercial quantum computers are projected to surpass this limit, thereby putting the quantum-gravity standoff to the test.", "url": "https://arxiv.org/abs/2604.06322", "type": "理论", "summary": "广义相对论和量子力学在普朗克尺度上是不相容的。如果量子计算机的运行速度超过每普朗克体积时间一次操作的经典极限，或者等效于 $2^{491}$ m$^{-3}$ s$^{-1}$，则可以检验这一论点。在这里，我们量化了逻辑量子比特计数与经典性受到挑战的程度之间的关系。我们认为 500 个逻辑量子位足以否定仅限于实验室的理论。我们考虑了所有尺度（包括可观测宇宙）的计算和通信的运营成本，最终受到 1600 个逻辑量子位计算机的限制。值得注意的是，目前的商用量子计算机计划预计将超越这一限制，从而使量子引力对峙面临考验。", "authors": [{"name": "Boaz Katz"}, {"name": "Shlomi Kotler"}], "featured_authors": [{"name": "Boaz Katz"}, {"name": "Shlomi Kotler"}], "author_count": 2}, {"id": "2604.06325", "category": "quant-ph", "title": "Probabilistic and approximate universal quantum purification machines", "abstract": "We study the task of lifting arbitrary quantum states and channels to purifications and Stinespring dilations, respectively, in both the probabilistic exact and deterministic approximate settings. We formalize this task through a general framework of quantum purification machines that, given a finite number of copies or uses of a black-box input, aim to output a corresponding purification or Stinespring dilation. In the probabilistic exact setting, we show that universality is not necessary to rule out such transformations: the simple requirement that a machine purifies two inputs of different rank with non-zero probability already implies that it cannot be described by a linear positive map. This simple argument captures a fundamental obstruction of quantum theory and recovers the impossibility of universal probabilistic purification from finitely many copies. In the approximate setting, we allow for general machines that are not required, in general, to produce a pure output. Using the minimum average error as our figure of merit, we derive analytical expressions for the performance of several physically motivated strategies as well as a general upper bound on the achievable error, which is tight in a specific regime. Our analysis reveals a trade-off: strategies that produce a pure output - among which we prove the optimal to be a strategy that produces as a fixed output a maximally entangled purification of the fully depolarizing channel - perform optimally between those considered for large environment dimension, while append-environment strategies that generally produce non-pure outputs perform better at small environment dimension.", "url": "https://arxiv.org/abs/2604.06325", "type": "理论", "summary": "我们研究了在概率精确和确定性近似设置下分别将任意量子态和通道提升到纯化和 Stinespring 膨胀的任务。我们通过量子净化机的通用框架来形式化这项任务，在给定有限数量的副本或使用黑盒输入的情况下，目标是输出相应的净化或 Stinespring 膨胀。在概率精确设置中，我们表明普遍性并不是排除此类转换所必需的：机器以非零概率净化不同秩的两个输入的简单要求已经意味着它不能用线性正映射来描述。这个简单的论证抓住了量子理论的一个基本障碍，并恢复了从有限多个副本中进行普遍概率纯化的不可能性。在近似设置中，我们允许一般不需要的通用机器产生纯输出。\n\n使用最小平均误差作为我们的品质因数，我们得出了几种物理激励策略的性能分析表达式以及可实现误差的一般上限，该上限在特定情况下是严格的。我们的分析揭示了一种权衡：产生纯输出的策略（其中我们证明最佳策略是产生固定输出、完全去极化通道的最大纠缠净化的策略）在考虑大环境维度的策略之间表现最佳，而通常产生非纯输出的附加环境策略在小环境维度表现更好。", "authors": [{"name": "Zoe G. del Toro"}, {"name": "Jessica Bavaresco"}], "featured_authors": [{"name": "Zoe G. del Toro"}, {"name": "Jessica Bavaresco"}], "author_count": 2}, {"id": "2604.06450", "category": "quant-ph", "title": "Agent Choice via Quantum Flux in Living Systems", "abstract": "A basic model is provided that places active, intentional choices by biological organisms on a solid physical footing. The model is provisionally called \"Agent Choice via Quantum Flux.\" It brings to bear specific physics on living systems in a way that allows for intentional choices not pre-determined by physical laws, but remaining consistent with those laws. It does so by exploring a possible many-to-one relation of quantum states to agent choices, with a parallel to the relation of thermodynamic microstates to macrostates.", "url": "https://arxiv.org/abs/2604.06450", "type": "理论", "summary": "提供了一个基本模型，将生物有机体主动、有意的选择置于坚实的物理基础上。该模型暂时称为“通过量子通量进行代理选择”。它以一种允许有意选择的方式对生命系统产生特定的物理作用，这种选择不是由物理定律预先确定的，而是与这些定律保持一致。它通过探索量子态与代理选择之间可能的多对一关系来实现这一点，这与热力学微观状态与宏观状态的关系类似。", "authors": [{"name": "R. E. Kastner"}], "featured_authors": [{"name": "R. E. Kastner"}], "author_count": 1}, {"id": "2604.06466", "category": "quant-ph", "title": "One-to-one correspondence between Hierarchical Equations of Motion and Pseudomodes for Open Quantum System Dynamics", "abstract": "We unite two of the most widely used approaches for strongly damped, non-Markovian open quantum dynamics, the Hierarchical Equations of Motion (HEOM) and the pseudomode method by proving two statements: First, every physical bath correlation function (BCF) that can be written as a sum of $N$ exponential terms can be obtained from a physical model with $N$ interacting pseudomodes which are damped in Lindblad form. Second, for every such BCF there exists a non-unitary, linear transformation which mirrors the evolution of the system-pseudomode state onto the HEOM hierarchy, and vice versa. Our proofs are constructive and we give explicit expressions for the mirror transformation as well as for the pseudomode Lindbladian corresponding to a given exponential BCF. This approach also gives insight and provides elegant derivations of the corresponding Hierarchy of stochastic Pure States (HOPS) method and its nearly-unitary version, nuHOPS. Our result opens several avenues for further optimization of non-Markovian open quantum system dynamics methods.", "url": "https://arxiv.org/abs/2604.06466", "type": "理论+数值", "summary": "我们通过证明两个陈述，将两种最广泛使用的强阻尼、非马尔可夫开放量子动力学方法，即分层运动方程（HEOM）和伪模方法结合起来：首先，每个可以写成 $N$ 指数项之和的物理浴相关函数（BCF）都可以从具有 $N$ 交互伪模的物理模型获得，这些伪模以 Lindblad 形式阻尼。其次，对于每个这样的 BCF 都存在一个非单一的线性变换，它将系统伪模式状态的演化反映到 HEOM 层次结构上，反之亦然。我们的证明是建设性的，并且我们给出了镜像变换以及对应于给定指数 BCF 的伪模 Lindbladian 的显式表达式。这种方法还提供了相应的随机纯状态层次结构 (HOPS) 方法及其近乎单一版本 nuHOPS 的见解并提供了优雅的推导。我们的结果为进一步优化非马尔可夫开放量子系统动力学方法开辟了多种途径。", "authors": [{"name": "Kai Müller"}, {"name": "Walter T. Strunz"}], "featured_authors": [{"name": "Kai Müller"}, {"name": "Walter T. Strunz"}], "author_count": 2}, {"id": "2604.06604", "category": "quant-ph", "title": "Quantifying magic via quantum $(α,β)$ Jensen-Shannon divergence", "abstract": "Magic states play an important role in fault-tolerant quantum computation, and so the quantification of magic for quantum states is of great significance. In this work, we propose two new magic quantifiers by introducing two versions of quantum $(\\alpha,\\beta)$ Jensen-Shannon divergence based on the quantum $(\\alpha,\\beta)$ entropy and the quantum $(\\alpha,\\beta)$-relative entropy, respectively. We derive many desirable properties for our magic quantifiers, and find that they are efficiently computable in low-dimensional Hilbert spaces. We also show that the initial nonstabilizerness in the input state can boost the magic generating power for our magic quantifiers with appropriate parameter ranges for a certain class of quantum gates. Our magic quantifiers may provide new tools for addressing some specific problems in magic resource theory.", "url": "https://arxiv.org/abs/2604.06604", "type": "理论", "summary": "魔幻态在容错量子计算中发挥着重要作用，因此量子态魔幻的量化具有重要意义。在这项工作中，我们提出了两个新的神奇量词，分别基于量子 $(\\alpha,\\beta)$ 熵和量子 $(\\alpha,\\beta)$ 相对熵引入两个版本的量子 $(\\alpha,\\beta)$ Jensen-Shannon 散度。我们为我们的神奇量词导出了许多理想的属性，并发现它们可以在低维希尔伯特空间中有效地计算。我们还表明，输入状态的初始非稳定性可以通过针对某一类量子门的适当参数范围来提高我们的魔法量词的魔法生成能力。我们的魔法量词可能会为解决魔法资源理论中的一些具体问题提供新的工具。", "authors": [{"name": "Linmao Wang"}, {"name": "Zhaoqi Wu"}], "featured_authors": [{"name": "Linmao Wang"}, {"name": "Zhaoqi Wu"}], "author_count": 2}, {"id": "2604.06606", "category": "quant-ph", "title": "Enhanced Precision in Entangled Quantum Clocks with Phase Estimation Algorithm", "abstract": "We present an enhanced entangled quantum clock protocol that incorporates a quantum phase estimation algorithm to directly estimate proper-time differences as an unknown phase. By employing highly entangled multi-clock states, the achievable uncertainty scales inversely with the total number of quantum clocks, surpassing the standard projection-noise limit. This approach extends the original EQC framework and provides a systematic method for high-precision relativistic time comparison.", "url": "https://arxiv.org/abs/2604.06606", "type": "数值", "summary": "我们提出了一种增强的纠缠量子时钟协议，该协议结合了量子相位估计算法，可以直接估计本征时间差作为未知相位。通过采用高度纠缠的多时钟状态，可实现的不确定性与量子时钟的总数成反比，超过了标准投影噪声限制。该方法扩展了原有的EQC框架，为高精度相对论时间比较提供了系统的方法。", "authors": [{"name": "Won-Young Hwang"}], "featured_authors": [{"name": "Won-Young Hwang"}], "author_count": 1}, {"id": "2604.06639", "category": "quant-ph", "title": "Coherence and entanglement dynamics in Shor's algorithm", "abstract": "Shor's algorithm outperforms its classical counterpart in efficient prime factorization. We explore the coherence and entanglement dynamics of the evolved states within Shor's algorithm, showing that the coherence in each step relies on the dimension of register or the order, and discuss the relations between geometric coherence and geometric entanglement. We investigate how unitary operators induce variations in coherence and entanglement, and analyze the variations of coherence and entanglement within the entire algorithm, demonstrating that the overall effect of Shor's algorithm tends to deplete coherence and produce entanglement. Our research not only deepens the understanding of this algorithm but also provides methodological references for studying resource dynamics in other quantum algorithms.", "url": "https://arxiv.org/abs/2604.06639", "type": "理论+数值", "summary": "Shor 算法在高效素因数分解方面优于其经典算法。我们探索了 Shor 算法中演化态的相干性和纠缠动力学，表明每一步的相干性依赖于寄存器的维数或顺序，并讨论了几何相干性和几何纠缠之间的关系。我们研究酉算子如何引起相干性和纠缠的变化，并分析整个算法内相干性和纠缠的变化，证明肖尔算法的整体效果倾向于消耗相干性并产生纠缠。我们的研究不仅加深了对该算法的理解，而且为研究其他量子算法中的资源动态提供了方法参考。", "authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Shao-Ming Fei"}], "featured_authors": [{"name": "Linlin Ye"}, {"name": "Zhaoqi Wu"}, {"name": "Shao-Ming Fei"}], "author_count": 3}, {"id": "2604.06806", "category": "quant-ph", "title": "Perturbative hydrogenic Lamb shifts and radiative decay rates -- an so(4,2)-based algebraic approach", "abstract": "It is shown that algebraic techniques based on the Lie algebra so(4,2) provide efficient tools for evaluating Lamb shifts and radiative decay rates for hydrogenic energy eigenstates as they systematically exploit the intrinsic symmetry of the hydrogenic Hamiltonian. As a main result in lowest order perturbation theory with respect to the fine-structure constant integral representations are derived for the complex-valued energy shifts of hydrogen-like ions from which Lamb shifts and radiative decay rates can be evaluated in a unified way, thus generalizing a recently discussed algebraic approach of Maclay. In order to exemplify the usefulness of this algebraic approach numerical results are presented for Lamb shifts and radiative decay rates which transcend the dipole approximation and contain the dipole approximation as a limiting case.", "url": "https://arxiv.org/abs/2604.06806", "type": "理论+数值", "summary": "结果表明，基于李代数 so(4,2) 的代数技术为评估氢能本征态的兰姆位移和辐射衰变率提供了有效的工具，因为它们系统地利用了氢哈密顿量的固有对称性。作为关于精细结构常数积分表示的最低阶微扰理论的主要结果，导出了类氢离子的复值能量位移，从中可以以统一的方式评估兰姆位移和辐射衰变率，从而概括了最近讨论的 Maclay 代数方法。为了举例说明这种代数方法的有用性，给出了兰姆位移和辐射衰减率的数值结果，这些结果超越了偶极近似并包含偶极近似作为极限情况。", "authors": [{"name": "Gernot Alber"}], "featured_authors": [{"name": "Gernot Alber"}], "author_count": 1}, {"id": "2604.06866", "category": "quant-ph", "title": "A hardware efficient quantum residual neural network without post-selection", "abstract": "We propose a hardware efficient quantum residual neural network which implements residual connections through a deterministic linear combination of identity and variational unitaries, enabling fully differentiable training. In contrast to the previous implementation of residual connections, our architecture avoids post-selection while preserving residual learning. Furthermore, we establish trainability of our model, mitigating barren plateaus which are considered as a major limitation of variational quantum learning models. In order to show the working of our model, we report its application to image classification tasks by training it for MNIST, CIFAR, and SARFish datasets, achieving accuracies of 99% and 80% for binary and multi-class classifications, respectively. These accuracies are comparable to previously achieved from the standard variational models, however our model requires 10x fewer gates making it better suited for resource constraint near-term quantum processors. In addition to high accuracies, the proposed architecture also demonstrates adversarial robustness which is another desirable parameter for quantum machine learning models. Overall our architecture offers a new pathway for developing accurate, robust, trainable and hardware efficient quantum machine learning models.", "url": "https://arxiv.org/abs/2604.06866", "type": "理论+数值", "summary": "我们提出了一种硬件高效的量子残差神经网络，它通过恒等和变分酉的确定性线性组合来实现残差连接，从而实现完全可微分的训练。与之前残差连接的实现相比，我们的架构在保留残差学习的同时避免了后选择。此外，我们建立了模型的可训练性，减轻了被认为是变分量子学习模型的主要限制的贫瘠高原。为了展示我们的模型的工作原理，我们通过针对 MNIST、CIFAR 和 SARFish 数据集进行训练来报告其在图像分类任务中的应用，二元分类和多类分类的准确率分别达到 99% 和 80%。这些精度与之前通过标准变分模型获得的精度相当，但是我们的模型需要的门数减少了 10 倍，使其更适合资源受限的近期量子处理器。除了高精度之外，所提出的架构还展示了对抗鲁棒性，这是量子机器学习模型的另一个理想参数。\n\n总体而言，我们的架构为开发准确、稳健、可训练且硬件高效的量子机器学习模型提供了一条新途径。", "authors": [{"name": "Amena Khatun"}, {"name": "Akib Karim"}, {"name": "Muhammad Usman"}], "featured_authors": [{"name": "Amena Khatun"}, {"name": "Akib Karim"}, {"name": "Muhammad Usman"}], "author_count": 3}, {"id": "2604.06908", "category": "quant-ph", "title": "Quantum Relative-alpha-Entropies: A Structural and Geometric Perspective", "abstract": "Most quantum divergences derive their structure from classical f-divergences or Renyi-type constructions, a dependence that obscures several quantum geometric effects. We introduce a quantum relative-alpha-entropy that extends Umegaki's relative entropy while falling outside the f-divergence class. The proposed divergence exhibits a nonlinear convexity property, which yields a generalized convexity result for the Petz-Renyi divergence for alpha greater than one, complementing the known convexity for alpha less than one. It is additive under tensor products, invariant under unitary transformations, and depends only on the relative geometry of quantum states rather than their absolute magnitudes. Using Nussbaum-Szkola-type distributions, we also establish an exact correspondence of this divergence with classical relative-alpha-entropy. This reveals relative-alpha-entropy as a fundamentally geometric notion of quantum distinguishability not captured by existing divergence frameworks.", "url": "https://arxiv.org/abs/2604.06908", "type": "理论", "summary": "大多数量子散度的结构源自经典的 f 散度或 Renyi 型结构，这种依赖性掩盖了几种量子几何效应。我们引入了量子相对 α 熵，它扩展了 Umegaki 的相对熵，同时落在 f 散度类别之外。所提出的散度表现出非线性凸性特性，这对于 α 大于 1 的情况产生 Petz-Renyi 散度的广义凸性结果，补充了 α 小于 1 时的已知凸性。它在张量积下是可加的，在酉变换下是不变的，并且仅取决于量子态的相对几何形状而不是它们的绝对大小。使用 Nussbaum-Szkola 型分布，我们还建立了这种散度与经典相对 α 熵的精确对应关系。这揭示了相对α熵是现有散度框架未捕获的量​​子可区分性的基本几何概念。", "authors": [{"name": "Sayantan Roy"}, {"name": "Atin Gayen"}, {"name": "Aditi Kar Gangopadhyay"}, {"name": "Sugata Gangopadhyay"}], "featured_authors": [{"name": "Sayantan Roy"}, {"name": "Atin Gayen"}, {"name": "Aditi Kar Gangopadhyay"}, {"name": "Sugata Gangopadhyay"}], "author_count": 4}, {"id": "2604.06931", "category": "quant-ph", "title": "Quantum MIMO Channel Modeling in Turbulent Free-Space Optical Links", "abstract": "Free-space optical (FSO) links supporting spatial multiplexing provide a natural physical realization of Quantum MIMO channels. We develop a first-principles model for Quantum MIMO channels derived directly from wave-optical propagation through three-dimensional atmospheric turbulence. The framework explicitly accounts for intermodal crosstalk, finite detection apertures, and the system-bath separation induced by spatial-mode projection. We distinguish between distinguishable and indistinguishable photon regimes, showing that indistinguishability leads to intrinsically many-body interference effects described by matrix permanents. To obtain a completely positive and trace-preserving logical description, we introduce an erasure-extended encoding in which turbulence-induced leakage and photon loss are mapped to flagged erasure states. The resulting Quantum MIMO channel naturally reduces to a correlated n-qubit erasure channel, with correlations arising from the shared turbulent medium. Limiting regimes in which correlated Pauli channels emerge as effective approximations are also identified.", "url": "https://arxiv.org/abs/2604.06931", "type": "理论", "summary": "支持空间复用的自由空间光 (FSO) 链路提供了量子 MIMO 通道的自然物理实现。我们开发了量子 MIMO 通道的第一原理模型，该模型直接从波光传播通过三维大气湍流导出。该框架明确考虑了模间串扰、有限检测孔径以及空间模式投影引起的系统浴分离。我们区分了可区分和不可区分的光子状态，表明不可区分性导致本质上由矩阵永久物描述的多体干涉效应。为了获得完全肯定且保留痕迹的逻辑描述，我们引入了一种擦除扩展编码，其中湍流引起的泄漏和光子损失被映射到标记的擦除状态。由此产生的量子 MIMO 信道自然地简化为相关的 n 量子位擦除信道，其中相关性源自共享的湍流介质。还确定了相关泡利通道作为有效近似出现的限制机制。", "authors": [{"name": "Heyang Peng"}, {"name": "Seid Koudia"}, {"name": "Semih Oktay"}, {"name": "Mert Bayraktar"}, {"name": "Symeon Chatzinotas"}], "featured_authors": [{"name": "Heyang Peng"}, {"name": "Seid Koudia"}, {"name": "Semih Oktay"}, {"name": "Mert Bayraktar"}, {"name": "Symeon Chatzinotas"}], "author_count": 5}, {"id": "2604.07013", "category": "quant-ph", "title": "QNAS: A Neural Architecture Search Framework for Accurate and Efficient Quantum Neural Networks", "abstract": "Designing quantum neural networks (QNNs) that are both accurate and deployable on NISQ hardware is challenging. Handcrafted ansatze must balance expressivity, trainability, and resource use, while limited qubits often necessitate circuit cutting. Existing quantum architecture search methods primarily optimize accuracy while only heuristically controlling quantum and mostly ignore the exponential overhead of circuit cutting. We introduce QNAS, a neural architecture search framework that unifies hardware aware evaluation, multi objective optimization, and cutting overhead awareness for hybrid quantum classical neural networks (HQNNs). QNAS trains a shared parameter SuperCircuit and uses NSGA-II to optimize three objectives jointly: (i) validation error, (ii) a runtime cost proxy measuring wall clock evaluation time, and (iii) the estimated number of subcircuits under a target qubit budget. QNAS evaluates candidate HQNNs under a few epochs of training and discovers clear Pareto fronts that reveal tradeoffs between accuracy, efficiency, and cutting overhead. Across MNIST, Fashion-MNIST, and Iris benchmarks, we observe that embedding type and CNOT mode selection significantly impact both accuracy and efficiency, with angle-y embedding and sparse entangling patterns outperforming other configurations on image datasets, and amplitude embedding excelling on tabular data (Iris). On MNIST, the best architecture achieves 97.16% test accuracy with a compact 8 qubit, 2 layer circuit; on the more challenging Fashion-MNIST, 87.38% with a 5 qubit, 2 layer circuit; and on Iris, 100% validation accuracy with a 4 qubit, 2 layer circuit. QNAS surfaces these design insights automatically during search, guiding practitioners toward architectures that balance accuracy, resource efficiency, and practical deployability on current hardware.", "url": "https://arxiv.org/abs/2604.07013", "type": "数值", "summary": "设计既准确又可部署在 NISQ 硬件上的量子神经网络 (QNN) 具有挑战性。手工制作的模拟必须平衡表达性、可训练性和资源使用，而有限的量子位通常需要电路切割。现有的量子架构搜索方法主要优化精度，同时仅启发式控制量子，并且大多忽略电路切割的指数开销。我们推出了 QNAS，一种神经架构搜索框架，它统一了混合量子经典神经网络 (HQNN) 的硬件感知评估、多目标优化和削减开销感知。 QNAS 训练共享参数 SuperCircuit 并使用 NSGA-II 联合优化三个目标：(i) 验证误差，(ii) 测量挂钟评估时间的运行时成本代理，以及 (iii) 目标量子位预算下的估计子电路数量。 QNAS 在几个训练周期下评估候选 HQNN，并发现清晰的帕累托前沿，揭示准确性、效率和削减开销之间的权衡。\n\n在 MNIST、Fashion-MNIST 和 Iris 基准测试中，我们观察到嵌入类型和 CNOT 模式选择显着影响准确性和效率，其中角度 y 嵌入和稀疏纠缠模式在图像数据集上优于其他配置，而幅度嵌入在表格数据 (Iris) 上表现出色。在 MNIST 上，最佳架构通过紧凑的 8 量子位、2 层电路实现了 97.16% 的测试精度；在更具挑战性的 Fashion-MNIST 上，87.38% 采用 5 量子位、2 层电路；在 Iris 上，通过 4 量子位、2 层电路实现 100% 验证准确度。 QNAS 在搜索过程中自动呈现这些设计见解，指导从业者采用在当前硬件上平衡准确性、资源效率和实际可部署性的架构。", "authors": [{"name": "Kooshan Maleki"}, {"name": "Alberto Marchisio"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Kooshan Maleki"}, {"name": "Alberto Marchisio"}, {"name": "Muhammad Shafique"}], "author_count": 3}, {"id": "2604.07163", "category": "quant-ph", "title": "Robust and High-Fidelity Controlled Two-Qubit Gates via Asymmetric Parallel Resonant Excitation", "abstract": "Implementing high-fidelity controlled two-qubit gates in dipole-dipole interacting systems, such as rare-earth-ion crystals, in hindered by spectral inhomogeneity and weak coupling. Existing method often rely on detuned pulses, making them susceptible to frequency errors and AC Stark shifts. We propose a robust resonant scheme for arbitrary controlled two-qubit gates that utilizes asymmetric excitation and pulse engineering to achieve decoupled, parallel qubit control. Simulations on rare-earth-ion ensemble qubits demonstrate gate fidelities exceeding 99% within a 170 kHz detuning range with off-resonant excitation below 0.2%. This approach offers a robust, scalable route for quantum computing in spectrally crowded systems.", "url": "https://arxiv.org/abs/2604.07163", "type": "数值", "summary": "在偶极-偶极相互作用系统（例如稀土离子晶体）中实现高保真控制的双量子位门，受到光谱不均匀性和弱耦合的阻碍。现有方法通常依赖于失谐脉冲，这使得它们容易受到频率误差和 AC Stark 频移的影响。我们提出了一种用于任意控制的两个量子位门的鲁棒谐振方案，该方案利用不对称激励和脉冲工程来实现解耦、并行量子位控制。对稀土离子系综量子位的模拟表明，在 170 kHz 失谐范围内门保真度超过 99%，非共振激励低于 0.2%。这种方法为光谱拥挤系统中的量子计算提供了一条强大的、可扩展的途径。", "authors": [{"name": "Licheng Lin"}, {"name": "Jize Han"}, {"name": "Peng Zhu"}, {"name": "Ziyu Wang"}, {"name": "Ying Yan"}, {"name": "Jie Lu"}, {"name": "Zhiguo Huang"}], "featured_authors": [{"name": "Licheng Lin"}, {"name": "Jize Han"}, {"name": "Peng Zhu"}, {"name": "Ying Yan"}, {"name": "Jie Lu"}, {"name": "Zhiguo Huang"}], "author_count": 7}, {"id": "2604.07178", "category": "quant-ph", "title": "On the Computational Complexity of Geometrically Local QAC0 circuits", "abstract": "The computational complexity of $\\mathsf{QAC}^0$, which are constant-depth, polynomial-size quantum circuit families consisting of arbitrary single-qubit unitaries and $n$-qubit generalized Toffoli gates, has gained tremendous focus recently. In this work, we initiate the study of the computational complexity of geometrically local $\\mathsf{QAC}^0$ circuits, where all the generalized Toffoli gates act on nearest neighbor qubits. We show that any $\\mathsf{QAC}^0$ circuit can be exactly simulated by a two-dimensional geometrically local $\\mathsf{QAC}^0$ circuit, i.e., a $\\mathsf{2D\\text{-}QAC}^{0}$ circuit, with a quadratic size blow-up. This implies that $\\mathsf{QAC}^0 = \\mathsf{2D\\text{-}QAC}^{0}$. We further show that if there existed a $\\mathsf{QAC}^0$ circuit that computes Parity with a bounded constant error, then for any $\\varepsilon > 0$, there would exist a $\\mathsf{2D\\text{-}QAC}^{0}$ circuit that exactly computes Parity, with a very \"thin\" width $n^\\varepsilon$. We further study the computational power of $\\mathsf{1D\\text{-}QAC}^{0} $ circuits, i.e., one-dimensional $\\mathsf{QAC}^0$ circuits, which are the \"thinnest\" $\\mathsf{2D\\text{-}QAC}^{0}$ circuits. We prove a nearly logarithmic depth lower bound on $\\mathsf{1D\\text{-}QAC}^{0} $ circuits to compute the Parity function, even if allowing an unlimited number of ancilla. Furthermore, if the inputs are encoded in contiguous qubits, we prove that it requires a nearly linear depth $\\mathsf{1D\\text{-}QAC}^{0} $ circuit to compute the Parity function. This lower bound is almost tight. The results are proved via the combination of the restriction argument and the light-cone argument. These results may provide a new angle for studying the computational power of $\\mathsf{QAC}^0$ circuits and for resolving the long-standing open problem of whether Parity is in $\\mathsf{QAC}^0$.", "url": "https://arxiv.org/abs/2604.07178", "type": "理论", "summary": "$\\mathsf{QAC}^0$ 是由任意单量子位酉和 $n$ 量子位广义 Toffoli 门组成的恒定深度、多项式大小的量子电路系列，其计算复杂性最近引起了极大的关注。在这项工作中，我们开始研究几何局部 $\\mathsf{QAC}^0$ 电路的计算复杂性，其中所有广义 Toffoli 门都作用于最近邻量子位。我们证明任何 $\\mathsf{QAC}^0$ 电路都可以通过二维几何局部 $\\mathsf{QAC}^0$ 电路精确模拟，即 $\\mathsf{2D\\text{-}QAC}^{0}$ 电路，具有二次尺寸放大。这意味着 $\\mathsf{QAC}^0 = \\mathsf{2D\\text{-}QAC}^{0}$。我们进一步表明，如果存在一个 $\\mathsf{QAC}^0$ 电路计算具有有界常数误差的奇偶校验，那么对于任何 $\\varepsilon > 0$，将存在一个 $\\mathsf{2D\\text{-}QAC}^{0}$ 电路精确计算奇偶校验，其宽度非常“薄”$n^\\varepsilon$。我们进一步研究$\\mathsf{1D\\text{-}QAC}^{0} $电路的计算能力，即一维$\\mathsf{QAC}^0$电路，它们是“最薄”的$\\mathsf{2D\\text{-}QAC}^{0}$电路。\n\n我们证明了 $\\mathsf{1D\\text{-}QAC}^{0} $ 电路上的近对数深度下界来计算奇偶校验函数，即使允许无限数量的辅助。此外，如果输入以连续的量子位编码，我们证明需要近线性深度 $\\mathsf{1D\\text{-}QAC}^{0} $ 电路来计算奇偶校验函数。这个下限几乎是紧的。通过限制论证和光锥论证的结合证明了结果。这些结果可能为研究$\\mathsf{QAC}^0$电路的计算能力以及解决$\\mathsf{QAC}^0$中是否存在Parity这一长期悬而未决的问题提供新的角度。", "authors": [{"name": "Yangjing Dong"}, {"name": "Fengning Ou"}, {"name": "Penghui Yao"}], "featured_authors": [{"name": "Yangjing Dong"}, {"name": "Fengning Ou"}, {"name": "Penghui Yao"}], "author_count": 3}, {"id": "2604.07214", "category": "quant-ph", "title": "Quantum Gibbs sampling through the detectability lemma", "abstract": "Gibbs state preparation is an important subroutine in quantum computing. In this work we use the detectability lemma to improve Gibbs state preparation. Specifically, we design new Gibbs state preparation methods that do not rely on simulating Lindbladian evolution, thus avoiding the overhead from it. For local Lindbladians consisting of $M$ terms, this approach reduces the cost by a factor of $O(M)$. We also combine the detectability lemma operator and quantum singular value transformation to implement ground state projection operators of frustration-free Hamiltonians, resulting in a quadratic speedup in the spectral gap dependence. Applying this method to Lindbladians for the Gibbs state of local commuting Hamiltonians, we achieve quadratically better dependence on the Lindbladian spectral gap.", "url": "https://arxiv.org/abs/2604.07214", "type": "理论", "summary": "吉布斯态准备是量子计算中的一个重要子程序。在这项工作中，我们使用可检测性引理来改进吉布斯状态准备。具体来说，我们设计了新的吉布斯状态准备方法，该方法不依赖于模拟 Lindbladian 进化，从而避免了由此产生的开销。对于由 $M$ 项组成的本地 Lindbladians，此方法将成本降低了 $O(M)$ 倍。我们还结合了可检测性引理算子和量子奇异值变换来实现无挫败哈密顿量的基态投影算子，从而导致光谱间隙依赖性的二次加速。将此方法应用于本地通勤哈密顿量的吉布斯状态的 Lindbladians，我们实现了对 Lindbladian 谱间隙的二次更好的依赖性。", "authors": [{"name": "Di Fang"}, {"name": "Jianfeng Lu"}, {"name": "Yu Tong"}, {"name": "Chu Zhao"}], "featured_authors": [{"name": "Di Fang"}, {"name": "Jianfeng Lu"}, {"name": "Yu Tong"}, {"name": "Chu Zhao"}], "author_count": 4}, {"id": "2604.07235", "category": "quant-ph", "title": "Fock State Generation and SWAP using a Rabi-Driven Qubit", "abstract": "The deterministic generation and SWAP of Fock states in isolated high-Q modes form a core foundation for architectures in bosonic quantum computing. Conventionally, these operations necessitate strong coupling to a qubit, which inherently compromises the required cavity isolation. To address this trade-off, we introduce a tunable mechanism wherein a weakly coupled qubit, which preserves mode isolation, is driven to induce a strong interaction on demand. By leveraging a Rabi-driven, qubit-mediated sideband interaction, we realize on-demand Jaynes-Cummings coupling between a transmon and a long-lived cavity mode. Using a superconducting flute cavity with two high-Q modes, we deterministically demonstrate Fock state preparation up to n=5 at operation times of less than 2 microseconds per photon. We also demonstrate and characterize single-photon SWAP in approximately 2 microseconds. Finally, we adapt our SWAP method to generate a dual-rail Bell state. While current performance is constrained by baseline coherence rather than fundamental methodological limits, the protocol scales inherently to accommodate higher photon numbers and faster operational regimes. By enabling complex operations on modes that remain strictly weakly coupled to qubits, this approach establishes a robust pathway for advancing scalable bosonic quantum computing.", "url": "https://arxiv.org/abs/2604.07235", "type": "理论", "summary": "隔离高 Q 模式下 Fock 态的确定性生成和交换构成了玻色子量子计算架构的核心基础。传统上，这些操作需要与量子位的强耦合，这本质上会损害所需的腔隔离。为了解决这种权衡问题，我们引入了一种可调机制，其中驱动保持模式隔离的弱耦合量子位以按需引发强相互作用。通过利用拉比驱动、量子位介导的边带相互作用，我们实现了传输模式和长寿命腔模式之间的按需 Jaynes-Cummings 耦合。使用具有两种高 Q 模式的超导凹槽腔，我们确定性地演示了在每个光子小于 2 微秒的操作时间下高达 n=5 的 Fock 态准备。我们还在大约 2 微秒内演示并表征了单光子交换。最后，我们采用 SWAP 方法来生成双轨贝尔状态。虽然当前的性能受到基线相干性而不是基本方法限制的限制，但该协议本质上可以扩展以适应更高的光子数量和更快的操作机制。\n\n通过在与量子位严格弱耦合的模式上启用复杂的操作，这种方法为推进可扩展的玻色子量子计算建立了一条强大的途径。", "authors": [{"name": "Natan Karaev"}, {"name": "Eliya Blumenthal"}, {"name": "Shay Hacohen-Gourgy"}], "featured_authors": [{"name": "Natan Karaev"}, {"name": "Eliya Blumenthal"}, {"name": "Shay Hacohen-Gourgy"}], "author_count": 3}, {"id": "2604.07257", "category": "quant-ph", "title": "Quantifying and detecting quantum-state texture", "abstract": "Quantum-state texture is a recently proposed quantum resource that characterizes the inhomogeneity of a quantum state's matrix element distribution in the computational basis, enriching our understanding of quantum state structure. To expand its quantification toolkit and establish detection methods, in this article, we investigate the resource theory of texture from both quantitative and detection perspectives. First, we construct a texture measure $\\mathcal{T}^{\\text{GR}}_{\\alpha,z}(\\rho)$ based on the $\\alpha$-$z$ Rényi relative entropy and present some of its inherent properties. Second, we analyze the mathematical relationships between several existing texture measures, revealing connections among different quantifiers. Finally, drawing on the witness concept from other resource theories, we systematically introduce texture witnesses into the texture theory and provide examples of texture witnesses with special properties.", "url": "https://arxiv.org/abs/2604.07257", "type": "理论", "summary": "量子态纹理是最近提出的一种量子资源，它在计算基础上表征了量子态矩阵元素分布的不均匀性，丰富了我们对量子态结构的理解。为了扩展其量化工具包并建立检测方法，在本文中，我们从定量和检测的角度研究了纹理的资源理论。首先，我们基于 $\\alpha$-$z$ Rényi 相对熵构建纹理度量 $\\mathcal{T}^{\\text{GR}}_{\\alpha,z}(\\rho)$ 并呈现其一些固有属性。其次，我们分析了几种现有纹理度量之间的数学关系，揭示了不同量词之间的联系。最后，借鉴其他资源理论中的见证概念，我们将纹理见证系统地引入到纹理理论中，并提供了具有特殊属性的纹理见证的例子。", "authors": [{"name": "Xiangyu Chen"}, {"name": "Qiang Lei"}], "featured_authors": [{"name": "Xiangyu Chen"}, {"name": "Qiang Lei"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
