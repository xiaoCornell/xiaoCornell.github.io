d to different curvature invariants in the complexity functional. These results show a geometric connection among finite cut-off holography, generalized complexity, and the emergence of non-local computational structures in holographic quantum field theories.", "url": "https://arxiv.org/abs/2607.09343", "type": "理论", "summary": "这项工作的动机是有限截止全息术和广义 $T\\bar T$ 变形之间提出的关系，并在“复杂性 = 任何东西”提案的框架内检查全息复杂性。在有限截止面附近采用 Fefferman-Graham 展开，导出了对广义复杂性的变形引起的校正，并表明允许在广义 Willmore 型泛函方面进行系统展开。由此产生的公式拓宽了复杂性体积提案的早期发现，以涵盖任意几何复杂性度量。此外，校正的结构允许自然地解释为多风味洛伦兹线程，其中不同的线程扇区对应于复杂度函数中的不同曲率不变量。这些结果显示了有限截止全息术、广义复杂性以及全息量子场论中非局域计算结构之间的几何联系。", "authors": [{"name": "Mojtaba Shahbazi"}, {"name": "Mehdi Sadeghi"}], "featured_authors": [{"name": "Mojtaba Shahbazi"}, {"name": "Mehdi Sadeghi"}], "author_count": 2}, {"id": "2607.09406", "category": "hep-th", "title": "Scalar fields, impurities and supersymmetry", "abstract": "We develop a rigid $\\mathcal{N}=(1,1)$ superspace formulation for multifield scalar models coupled to localized impurities through spurion superfields in two-dimensional spacetime. The spurionic completion gives a manifestly supersymmetric action and provides a systematic framework for describing interacting scalar fields in the presence of impurity backgrounds. In this setting, supersymmetry acts as an organizing principle for a controlled bosonic half-BPS sector, with the preserved projector selecting the impurity-compatible first-order equations. We derive the corresponding coupled BPS equations, energy density, boundary conditions, and Bogomol'nyi bound, showing that localized impurities deform the BPS profiles and redistribute the local energy density while leaving the total BPS energy fixed by the topological boundary term. We illustrate the formalism through representative one-, two-, and three-field models, analyzing the resulting BPS configurations and their local energy density profiles.", "url": "https://arxiv.org/abs/2607.09406", "type": "理论", "summary": "我们为多场标量模型开发了一个严格的 $\\mathcal{N}=(1,1)$ 超空间公式，通过二维时空中的杂散超场与局域杂质耦合。杂散完成给出了明显的超对称作用，并提供了描述存在杂质背景时相互作用的标量场的系统框架。在这种情况下，超对称性充当受控玻色半 BPS 扇区的组织原则，保留的投影仪选择杂质兼容的一阶方程。我们推导了相应的耦合 BPS 方程、能量密度、边界条件和 Bogomol'nyi 束缚，表明局部杂质使 BPS 轮廓变形并重新分布局部能量密度，同时使总 BPS 能量由拓扑边界项固定。我们通过代表性的一场、二场和三场模型来说明这种形式，并分析所得的 BPS 配置及其局部能量密度分布。", "authors": [{"name": "D. Bazeia"}, {"name": "A.C. Lehum"}, {"name": "G.S. Santiago"}], "featured_authors": [{"name": "D. Bazeia"}, {"name": "A.C. Lehum"}, {"name": "G.S. Santiago"}], "author_count": 3}, {"id": "2607.09408", "category": "hep-th", "title": "Circuit and Krylov complexity of primordial perturbations of modified gravity in inflation", "abstract": "In this work, we investigate quantum complexity diagnostics of primordial curvature perturbations within the inflationary paradigm. We compare canonical scalar-field inflation with the modified gravity model $f(\\phi,R)$, focusing on the evolution of the two-mode squeezed state generated by the coupling between the $\\vec{k}$ and $-\\vec{k}$ momentum sectors. Starting from the quadratic action for curvature perturbations, we derive the evolution equations for the squeezed strength $r_k$ and squeezed angle $\\phi_k$, utilizing them to evaluate both circuit complexity and Krylov-space diagnostics. Specifically, we compute the Krylov complexity, Krylov entropy, Lanczos coefficients $b_n$, and an effective dissipative contribution $c_n$ within an open-system extension. Our numerical results demonstrate that the $f(\\phi,R)$ coupling enhances the squeezed strength relative to the canonical scalar field inflation. Since the Krylov complexity of the two-mode squeezed state is directly controlled by the mean pair number ($K=\\sinh^2 r_k$), this enhancement leads to a smaller growth in Krylov complexity and related Krylov-space quantities. Furthermore, circuit complexity displays a more pronounced evolution in the $f(\\phi,R)$ framework, particularly after the horizon exit regime. Ultimately, our work sheds new light on the quantum complexity of modified gravity $f(\\phi,R)$.", "url": "https://arxiv.org/abs/2607.09408", "type": "理论", "summary": "在这项工作中，我们研究了暴胀范式内原初曲率扰动的量子复杂性诊断。我们将正则标量场膨胀与修正的引力模型 $f(\\phi,R)$ 进行比较，重点关注 $\\vec{k}$ 和 $-\\vec{k}$ 动量扇区之间的耦合产生的双模压缩态的演化。从曲率扰动的二次作用开始，我们推导了压缩强度 $r_k$ 和压缩角度 $\\phi_k$ 的演化方程，利用它们来评估电路复杂性和 Krylov 空间诊断。具体来说，我们计算开放系统扩展中的 Krylov 复杂度、Krylov 熵、Lanczos 系数 $b_n$ 以及有效耗散贡献 $c_n$。我们的数值结果表明，$f(\\phi,R)$ 耦合相对于正则标量场膨胀增强了压缩强度。由于二模压缩态的 Krylov 复杂度直接由平均对数 ($K=\\sinh^2 r_k$) 控制，因此这种增强导致 Krylov 复杂度和相关 Krylov 空间量的增长较小。\n\n此外，电路复杂性在 $f(\\phi,R)$ 框架中显示出更明显的演变，特别是在水平退出状态之后。最终，我们的工作为修正引力 $f(\\phi,R)$ 的量子复杂性提供了新的线索。", "authors": [{"name": "Tao Li"}, {"name": "Hai-Bing Fu"}], "featured_authors": [{"name": "Tao Li"}, {"name": "Hai-Bing Fu"}], "author_count": 2}, {"id": "2607.09485", "category": "hep-th", "title": "Unified description of color-electric and color-magnetic strings in hybrid vacua of $\\mathcal{N}=2$ supersymmetric QCD", "abstract": "We study non-Abelian strings supported in $r$-vacua of 4D $\\mathcal{N}=2$ supersymmetric QCD (SQCD) with gauge group $U(N)$ and $N_f$ quark hypermultiplets ($N_f\\ge N$), where $r<N$ (scalar) quarks develop vacuum expectation values. At the quantum level, $N-r-1$ monopoles in the orthogonal sector of the gauge group also form a condensate. This leads to the formation of flux tubes (strings) that carry both color-electric and color-magnetic fluxes and confine quarks and monopoles, respectively. We present a unified description of the 2D effective theory living on the world sheet of this non-Abelian string. In particular, we derive the exact twisted superpotential of the world sheet theory, which is deformed by the presence of non-perturbative gaugino condensate in 4D hybrid vacua, using the Gaiotto-Gukov-Seiberg method of resolvents. Next, we extrapolate the 2D-4D correspondence of BPS spectra of the world sheet theory and 4D SQCD (known for quark vacua) to hybrid vacua. Namely, our key result is the precise matching between the masses of the two-dimensional kinks and the four-dimensional confined monopoles or quarks. In addition, we provide a physical picture of the quark/monopole confinement in hybrid vacua.", "url": "https://arxiv.org/abs/2607.09485", "type": "理论", "summary": "我们研究 4D $\\mathcal{N}=2$ 超对称 QCD (SQCD) 的 $r$-vacua 中支持的非阿贝尔弦，规范群 $U(N)$ 和 $N_f$ 夸克超多重子 ($N_f\\ge N$)，其中 $r<N$ （标量）夸克产生真空期望值。在量子水平上，规范组正交扇区中的$N-r-1$单极子也形成凝聚态。这导致形成通量管（串），其携带色电通量和色磁通量并分别限制夸克和单极子。我们对存在于这个非阿贝尔弦的世界表上的二维有效理论提出了统一的描述。特别是，我们使用 Gaiotto-Gukov-Seiberg 解析方法推导了世界片理论的精确扭曲超势，该理论因 4D 混合真空中非微扰高吉诺凝聚体的存在而变形。接下来，我们将世界片理论和 4D SQCD（以夸克真空而闻名）的 BPS 谱的 2D-4D 对应关系外推到混合真空。也就是说，我们的关键结果是二维扭结和四维受限单极子或夸克的质量之间的精确匹配。\n\n此外，我们还提供了混合真空中夸克/单极子限制的物理图片。", "authors": [{"name": "E. Ievlev"}, {"name": "D. Vasilev"}, {"name": "A. Yung"}], "featured_authors": [{"name": "E. Ievlev"}, {"name": "D. Vasilev"}, {"name": "A. Yung"}], "author_count": 3}, {"id": "2607.09486", "category": "hep-th", "title": "Factorization Algebras and Quantum Groups from Generalized Poisson Sigma Models", "abstract": "In this work we introduce and study a family of holomorphic--topological field theories, which we call generalized Poisson sigma models. These theories are higher-dimensional analogues of the two-dimensional Poisson sigma model, with target data encoded by shifted chiral Poisson structures. We investigate their relationship with deformation quantizations of holomorphic--topological factorization algebras. Along the way, we give a systematic construction of extended objects, including interfaces, enriched boundaries and defects based on relevant notions in derived algebraic geometry. We employ Koszul-duality methods to study boundary algebras, yielding various versions of quantum groups. We illustrate the general framework through a range of examples, including twists of supersymmetric gauge theories as well as examples beyond the supersymmetric origin.", "url": "https://arxiv.org/abs/2607.09486", "type": "理论", "summary": "在这项工作中，我们介绍并研究了一系列全纯拓扑场论，我们将其称为广义泊松西格玛模型。这些理论是二维泊松西格玛模型的高维模拟，目标数据由移位手性泊松结构编码。我们研究了它们与全纯拓扑因式分解代数的变形量化的关系。在此过程中，我们基于派生代数几何中的相关概念给出了扩展对象的系统构造，包括界面、丰富边界和缺陷。我们采用科祖尔对偶方法来研究边界代数，产生各种版本的量子群。我们通过一系列例子来说明总体框架，包括超对称规范理论的扭曲以及超对称起源之外的例子。", "authors": [{"name": "Keyou Zeng"}], "featured_authors": [{"name": "Keyou Zeng"}], "author_count": 1}, {"id": "2607.09500", "category": "hep-th", "title": "Monodromy and geometry of heavy-light Virasoro blocks", "abstract": "The AdS/CFT correspondence relates gravity in anti-de Sitter space to a boundary conformal field theory, and in its AdS$_3$/CFT$_2$ instance the Virasoro symmetry of the boundary theory organizes correlation functions into conformal blocks. In the semiclassical limit these blocks are computed by lengths of geodesic networks in the bulk, most sharply in the heavy-light regime, where heavy operators source a background probed by light ones. We relate the classical monodromy method to this bulk geometry in holographic coordinates, showing that the eigenvectors of the monodromy matrix encode the endpoints of bulk geodesics. This yields the light action and the equations determining the internal geodesic network; crucially, the internal network equations are independent of the heavy background. For two heavy operators we rederive the same equations from elementary Euclidean geometry, which provides an independent geometric check. As an application we compute the full non-vacuum 5-point HHLLL block, so far known only in the superlight approximation. More broadly, our construction gives a general framework for computing heavy-light blocks from the bulk, while at the same time fixing its threshold of computability.", "url": "https://arxiv.org/abs/2607.09500", "type": "理论", "summary": "AdS/CFT 对应关系将反德西特空间中的重力与边界共形场论联系起来，并且在其 AdS$_3$/CFT$_2$ 实例中，边界理论的 Virasoro 对称性将相关函数组织为共形块。在半经典极限中，这些块是通过大量测地线网络的长度来计算的，在重光区域中最清晰，其中重算子获取由轻算子探测的背景。我们将经典的单向法与全息坐标中的体几何联系起来，表明单向矩阵的特征向量编码体测地线的端点。这产生了光作用和确定内部测地线网络的方程；至关重要的是，内部网络方程与重背景无关。对于两个重算子，我们从初等欧几里得几何中重新推导出相同的方程，这提供了独立的几何检查。作为一个应用程序，我们计算完整的非真空 5 点 HHLLL 块，迄今为止仅在超轻近似中已知。\n\n更广泛地说，我们的构造提供了一个用于从大量计算重轻块的通用框架，同时固定其可计算性阈值。", "authors": [{"name": "Mikhail Belakovskiy"}, {"name": "Vladimir Belavin"}], "featured_authors": [{"name": "Mikhail Belakovskiy"}, {"name": "Vladimir Belavin"}], "author_count": 2}, {"id": "2607.09531", "category": "hep-th", "title": "Perusing confining pseudoreal theories: a story of emerging massless spin-1 bosons", "abstract": "Solving quantum field theory, which is at the basis of the standard model of particle interactions, is one of the main tasks of contemporary theoretical physics. Minimal asymptotically free pseudoreal theories, containing one or two species of massless Weyl fermions in pseudoreal representations of the gauge group, flow towards a poorly understood infrared dynamics. We provide a comprehensive study of all pseudoreal theories, identifying the ones that likely flow towards a conformal dynamics, while we show that the remaining ones confine with a non-trivial condensate dynamics. Among the latter, all but one one-species theories feature a massless spin-1 state. Instead, the only confining two-species theory likely features two massless spin-1 states and one Nambu-Goldstone boson. These predictions could be further tested, for instance by use of Lattice simulations, the functional renormalization group, and supersymmetric analogs.", "url": "https://arxiv.org/abs/2607.09531", "type": "理论", "summary": "解决作为粒子相互作用标准模型基础的量子场论是当代理论物理学的主要任务之一。最小渐近自由伪实数理论，在规范群的伪实数表示中包含一种或两种无质量外尔费米子，流向了人们知之甚少的红外动力学。我们对所有伪真实理论进行了全面的研究，确定了那些可能流向共形动力学的理论，同时我们表明其余的理论仅限于非平凡的凝聚态动力学。在后者中，除了一种单一物种理论外，所有理论都具有无质量自旋 1 态。相反，唯一的限制性双物种理论可能以两个无质量自旋 1 态和一个南部-戈德斯通玻色子为特征。这些预测可以进一步测试，例如通过使用格模拟、函数重正化群和超对称类似物。", "authors": [{"name": "Giacomo Cacciapaglia"}, {"name": "Konstantinos Kollias"}], "featured_authors": [{"name": "Giacomo Cacciapaglia"}, {"name": "Konstantinos Kollias"}], "author_count": 2}, {"id": "2607.09550", "category": "hep-th", "title": "Spinning the Large-Charge Bootstrap: Parity-Even Operators", "abstract": "We study the large-charge bootstrap in three-dimensional CFTs with a global U(1) symmetry using scalar, current, and stress-tensor probes, restricting to parity-even exchanged operators. Under minimal assumptions, the bootstrap requires at least one Regge trajectory with the dispersion relation of the standard Goldstone mode of the conformal superfluid. With additional assumptions, this trajectory is unique, while all non-Goldstone trajectories contribute only to the scalar-scalar channel at this order.", "url": "https://arxiv.org/abs/2607.09550", "type": "理论", "summary": "我们使用标量、电流和应力张量探针研究具有全局 U(1) 对称性的三维 CFT 中的大电荷自举，仅限于偶校验交换算子。在最小假设下，引导程序需要至少一条具有共形超流体标准戈德斯通模式色散关系的 Regge 轨迹。通过附加假设，该轨迹是唯一的，而所有非戈德斯通轨迹仅对该阶的标量-标量通道做出贡献。", "authors": [{"name": "Kasra Kiaee"}, {"name": "Alexander Monin"}], "featured_authors": [{"name": "Kasra Kiaee"}, {"name": "Alexander Monin"}], "author_count": 2}, {"id": "2607.09594", "category": "hep-th", "title": "Massless fermionic current of Schwinger pairs in 3D de Sitter spacetime", "abstract": "Pair creation from the vacuum in the presence of a U(1) gauge field in de Sitter $(\\mathrm{dS})$ spacetime provides an important setting for exploring quantum field theory in curved backgrounds. In this work, we investigate massless fermion production and the associated induced current generated by a constant electric field in (1+2)-dimensional $\\mathrm{dS}$ spacetime. Assuming the Bunch--Davies vacuum and employing adiabatic regularization, we derive, for the first time, a finite expression for the induced current of massless fermions in $\\mathrm{dS}_{3}$. The produced fermions generate a net current opposite to the external electric field. In the strong-field regime, the induced current exhibits the expected semiclassical scaling and reproduces the standard Schwinger behavior in the flat-spacetime limit. In the weak-field regime, the current is linear in the electric-field strength. This behavior is characteristic of the fermionic nature of the particles, since the corresponding bosonic case exhibits infrared hyperconductivity, which is absent in our study. We further show that the induced current remains monotonic throughout the parameter space and, unlike in $\\mathrm{dS}_4$, does not exhibit any sign change. Our results thus highlight the role of dimensionality and clarify the interplay between spin and infrared physics in $\\mathrm{dS}$. This work provides a consistent basis for future investigations including backreaction effects, topologically massive fermions, and time-dependent electromagnetic backgrounds.", "url": "https://arxiv.org/abs/2607.09594", "type": "理论", "summary": "在德西特 $(\\mathrm{dS})$ 时空中存在 U(1) 规范场的情况下，从真空中产生电子对为探索弯曲背景中的量子场论提供了重要的背景。在这项工作中，我们研究了无质量费米子的产生以及由 (1+2) 维 $\\mathrm{dS}$ 时空中的恒定电场产生的相关感应电流。假设 Bunch--Davies 真空并采用绝热正则化，我们首次推导出 $\\mathrm{dS}_{3}$ 中无质量费米子感应电流的有限表达式。产生的费米子产生与外部电场相反的净电流。在强场状态下，感应电流表现出预期的半经典标度，并在平坦时空极限下再现标准施温格行为。在弱场状态下，电流与电场强度呈线性关系。这种行为是粒子费米子性质的特征，因为相应的玻色子情况表现出红外超导性，而这在我们的研究中是不存在的。\n\n我们进一步表明，感应电流在整个参数空间中保持单调，并且与 $\\mathrm{dS}_4$ 不同，没有表现出任何符号变化。因此，我们的结果强调了维度的作用，并阐明了 $\\mathrm{dS}$ 中自旋和红外物理之间的相互作用。这项工作为未来的研究提供了一致的基础，包括反反应效应、拓扑质量费米子和随时间变化的电磁背景。", "authors": [{"name": "Manizheh Botshekananfarda"}, {"name": "Clément Stahl"}], "featured_authors": [{"name": "Manizheh Botshekananfarda"}, {"name": "Clément Stahl"}], "author_count": 2}, {"id": "2607.09050", "category": "math-ph", "title": "Asymptotic stability of solutions to the good Boussinesq equation in dispersive wave region", "abstract": "This work studies the asymptotic stability of solutions to the good Boussinesq equation in dispersive wave region when the reflection coefficients associated with the initial data belong to weighted Sobolev space. The Dbar-steepest descent method is applied to the Riemann-Hilbert problem and the long-time asymptotic expansion of the solution are obtained up to an optimal error of order $\\mathcal{O}(t^{-3/4})$. Compared with previous results, we extend the initial data from the rapidly decaying Schwartz space to a weighted Sobolev space, and prove the asymptotic stability of the solution in dispersive wave region.", "url": "https://arxiv.org/abs/2607.09050", "type": "理论", "summary": "本文研究当与初始数据相关的反射系数属于加权Sobolev 空间时，色散波区域中良好Boussinesq 方程解的渐近稳定性。将 Dbar 最速下降法应用于 Riemann-Hilbert 问题，并获得解的长时间渐近展开，直至达到 $\\mathcal{O}(t^{-3/4})$ 阶的最优误差。与之前的结果相比，我们将初始数据从快速衰减的Schwartz空间扩展到加权Sobolev空间，并证明了解在色散波区域的渐近稳定性。", "authors": [{"name": "Yingmin Yang"}], "featured_authors": [{"name": "Yingmin Yang"}], "author_count": 1}, {"id": "2607.09088", "category": "math-ph", "title": "TokaGrad: End-to-end differentiable tokamak simulator for L-to-H full scenario optimization", "abstract": "As fusion energy moves from theoretical feasibility toward commercialization, design of new reactor concepts, autonomous tokamak control, and high-performance scenario optimization are becoming increasingly important. Traditionally, such optimization tasks have relied on costly trial-and-error or brute-force parameter searches, based on black-box experiments or simulations. Recently, advances in differentiable programming are changing the paradigm of numerical simulation. Unlike conventional simulations, which are typically executed as locally connected step-by-step procedures, differentiable simulation represents the entire simulation pipeline as a connected computational graph. In such a framework, machine parameters, actuator waveforms, and plasma responses are linked through differentiable operations, allowing Jacobians to propagate across the full simulation. This enables direct gradient-based control and optimization using the internal sensitivities of the simulator, rather than treating the simulator as a black box. Here, we present TokaGrad, an end-to-end differentiable tokamak transport simulator for full-scenario modeling, including ramp-up, L-mode operation, and H-mode access. TokaGrad self-consistently integrates differentiable models for plasma equilibrium, transport, heating, L-H transition, and pedestal formation. To our knowledge, this is the first differentiable tokamak simulator capable of self-consistently modeling dynamic full-discharge scenarios where actuators and plasma evolve together with equilibrium, pedestal, and confinement-regime transitions. We demonstrate that, when coupled to gradient-based optimizers, TokaGrad enables reactor-design optimization, actuator control, and full-scenario waveform optimization. This framework provides a pathway toward automated, differentiable optimization of burning-plasma scenarios and reactor concepts.", "url": "https://arxiv.org/abs/2607.09088", "type": "理论", "summary": "随着聚变能从理论可行性走向商业化，新反应堆概念的设计、自主托卡马克控制和高性能场景优化变得越来越重要。传统上，此类优化任务依赖于基于黑盒实验或模拟的昂贵的试错或强力参数搜索。最近，可微分编程的进步正在改变数值模拟的范式。与通常作为本地连接的逐步过程执行的传统模拟不同，可微分模拟将整个模拟管道表示为连接的计算图。在这样的框架中，机器参数、执行器波形和等离子体响应通过可微分运算联系起来，允许雅可比行列式在整个模拟中传播。这使得能够使用模拟器的内部灵敏度进行基于梯度的直接控制和优化，而不是将模拟器视为黑匣子。\n\n在这里，我们介绍 TokaGrad，一种端到端可微分托卡马克传输模拟器，用于全场景建模，包括启动、L 模式操作和 H 模式访问。 TokaGrad 自洽地集成了等离子体平衡、传输、加热、L-H 转变和基座形成的可微分模型。据我们所知，这是第一个可微分的托卡马克模拟器，能够自洽地模拟动态全放电场景，其中执行器和等离子体随着平衡、基座和约束状态转变一起演化。我们证明，当与基于梯度的优化器结合使用时，TokaGrad 可以实现反应器设计优化、执行器控制和全场景波形优化。该框架提供了一条实现燃烧等离子体场景和反应堆概念的自动化、可微分优化的途径。", "authors": [{"name": "Jaemin Seo"}], "featured_authors": [{"name": "Jaemin Seo"}], "author_count": 1}, {"id": "2607.09467", "category": "math-ph", "title": "Entanglement entropy of ground states of the Landau Hamiltonian on the half-plane", "abstract": "We study the entanglement entropy (EE) of ground states of a Hamiltonian defined on a domain with a boundary. Surprisingly, boundary conditions can change the spectrum and the nature of the spectrum drastically but not the leading behaviour of the EE. As is well-known, the Landau Hamiltonian on the full plane has pure point spectrum (the infinitely degenerate Landau levels) and ground states display a so-called strict area law. On the other hand, the Landau Hamiltonian on the half-plane has purely absolutely continuous spectrum and yet we prove a strict area law for its ground states. We raise the question of what extra or finer conditions on the absolutely continuous spectrum are necessary to guarantee a logarithmically enhanced area-law as we have for the Laplace operator.", "url": "https://arxiv.org/abs/2607.09467", "type": "理论", "summary": "我们研究在具有边界的域上定义的哈密顿量的基态的纠缠熵（EE）。令人惊讶的是，边界条件可以极大地改变频谱和频谱的性质，但不会改变 EE 的主导行为。众所周知，全平面上的朗道哈密顿量具有纯点谱（无限简并的朗道能级）并且基态表现出所谓严格的面积定律。另一方面，半平面上的朗道哈密顿量具有纯粹绝对连续的谱，但我们证明了其基态的严格面积定律。我们提出的问题是，绝对连续谱上需要哪些额外或更精细的条件才能保证像拉普拉斯算子那样的对数增强面积定律。", "authors": [{"name": "Paul Pfeiffer"}, {"name": "Wolfgang Spitzer"}], "featured_authors": [{"name": "Paul Pfeiffer"}, {"name": "Wolfgang Spitzer"}], "author_count": 2}, {"id": "2607.09482", "category": "math-ph", "title": "Extended group analysis and conservation laws of a class of variable coefficient generalized Kawahara equations", "abstract": "We review and extend the results on the group analysis of a class of generalized Kawahara equations with time-dependent coefficients. First, we provide an overview of the existing literature on Lie symmetries and Lie-invariant solutions of such equations. We then present a complete description of the transformation properties of these equations, including admissible, equivalence, and Lie symmetry transformations. For practical applications, the results are further extended by presenting a complete Lie symmetry classification without simplifying the coefficients by equivalence transformations. The Lie reductions are then thoroughly performed and some Lie exact solutions are constructed. The local conservation laws of low order are classified: every equation from the class admits the mass and the $L^2$-norm conservation laws, whereas energy-type conservation laws exist only for distinguished coefficient branches that agree with the cases singled out by the symmetry classification. The classification results are enhanced by a study of contractions, which link cases of Lie symmetry extensions together with the associated reductions and conservation laws.", "url": "https://arxiv.org/abs/2607.09482", "type": "理论", "summary": "我们回顾并扩展了一类具有时间相关系数的广义 Kawahara 方程的群分析结果。首先，我们概述了有关李对称性和此类方程的李不变解的现有文献。然后，我们对这些方程的变换属性进行完整的描述，包括容许变换、等价变换和李对称变换。对于实际应用，通过提出完整的李对称分类而无需通过等价变换简化系数来进一步扩展结果。然后彻底执行李约简并构造一些李精确解。低阶局部守恒定律被分类：该类中的每个方程都承认质量和 $L^2$-范数守恒定律，而能量型守恒定律仅存在于与对称分类选出的情况一致的区分系数分支。通过对收缩的研究增强了分类结果，该研究将李对称性扩展的情况与相关的约简和守恒定律联系起来。", "authors": [{"name": "Olena Vaneeva"}, {"name": "Alexander Zhalij"}, {"name": "Olena Magda"}, {"name": "Oksana Brahinets"}], "featured_authors": [{"name": "Olena Vaneeva"}, {"name": "Alexander Zhalij"}, {"name": "Olena Magda"}, {"name": "Oksana Brahinets"}], "author_count": 4}, {"id": "2607.08811", "category": "quant-ph", "title": "Comment on \"Beyond-classical computation in quantum simulation\"", "abstract": "A recent article [Science 388, 199-204 (2025)] investigates the applicability of numerical methods and a quantum processor unit in simulating a quantum annealing protocol. One of the findings indicates that Neural Quantum States - a versatile variational ansatz for the many-body wave function based on artificial neural networks - fail to reach the same accuracy as the quantum processor. In this comment we revisit these concerns, demonstrating that NQS can provide competitive results in some of the cases when accounting for the Monte-Carlo noise and large autocorrelation times between samples obtained from the final state.", "url": "https://arxiv.org/abs/2607.08811", "type": "数值", "summary": "最近的一篇文章 [Science 388, 199-204 (2025)] 研究了数值方法和量子处理器单元在模拟量子退火协议中的适用性。其中一项研究结果表明，神经量子态——一种基于人工神经网络的多体波函数的多功能变分模拟——无法达到与量子处理器相同的精度。在这篇评论中，我们重新审视这些问题，证明在考虑蒙特卡罗噪声和从最终状态获得的样本之间的大自相关时间时，NQS 在某些情况下可以提供有竞争力的结果。", "authors": [{"name": "Wladislaw Krinitsin"}, {"name": "Nikita Alert"}, {"name": "Matteo Rizzi"}, {"name": "Markus Schmitt"}], "featured_authors": [{"name": "Wladislaw Krinitsin"}, {"name": "Nikita Alert"}, {"name": "Matteo Rizzi"}, {"name": "Markus Schmitt"}], "author_count": 4}, {"id": "2607.08882", "category": "quant-ph", "title": "Two-photon blockade without cascade channel in strong light-matter coupling", "abstract": "We report a distinct two-photon blockade (termed as weak TPB) discovered in the strong-coupling regime of a parity-broken generalized quantum Rabi model, in addition to the other two-photon blockade (termed as strong TPB) in the ultrastrong coupling (USC) regime. In contrast to the strong TPB conventionally with opened cascade decay channel, the weak TPB phase emerges unconventionally with closed cascade decay channel. The closure of cascade channel originally allowed to open by parity breaking is unexpected and its opening in the strong-TPB regime is actually delayed. We extract a cubic law for the cascade transition rate that accounts for the suppression of cascade channel and the delayed opening in the two TPB regimes. Furthermore, we find that the population on the cascade state, which is crucial in the strong TPB, contrarily plays a minor role in the weak TPB. Instead, it is the upper state above the cascade that is relevant for the weak TPB. We demonstrate that the interplay of weak anharmonicity and resonant driving is the primary mechanism responsible for the upper-state population and the formation of weak TPB. Our analyses not only provide deeper insights into the nature of different TPBs, but also imply mechanism and manipulation diversities for the multi-photon blockade, which may open more avenues for developing quantum technologies on the manipulation level of individual quanta.", "url": "https://arxiv.org/abs/2607.08882", "type": "理论", "summary": "我们报告了在宇称破缺的广义量子拉比模型的强耦合区域中发现的独特的双光子封锁（称为弱TPB），以及超强耦合（USC）区域中的其他双光子封锁（称为强TPB）。与传统上具有开放级联衰减通道的强TPB相比，弱TPB相非常规地出现具有封闭级联衰减通道的情况。最初允许通过奇偶校验破缺打开的级联通道的关闭是出乎意料的，并且它在强TPB机制中的打开实际上被延迟了。我们提取了级联转换率的三次定律，该定律解释了两个 TPB 状态中级联通道的抑制和延迟打开。此外，我们发现级联状态的种群在强 TPB 中至关重要，相反在弱 TPB 中起着次要作用。相反，级联之上的上层状态与弱 TPB 相关。我们证明，弱非谐性和共振驱动的相互作用是导致上态布居和弱 TPB 形成的主要机制。\n\n我们的分析不仅为不同TPB的性质提供了更深入的见解，而且还暗示了多光子封锁的机制和操纵多样性，这可能为在单个量子操纵水平上开发量子技术开辟更多途径。", "authors": [{"name": "Hang-Hang Han"}, {"name": "Zu-Jian Ying"}], "featured_authors": [{"name": "Hang-Hang Han"}, {"name": "Zu-Jian Ying"}], "author_count": 2}, {"id": "2607.08977", "category": "quant-ph", "title": "Distillation-Enhanced Continuous-Variable Quantum Teleportation for Satellite Communication Networks", "abstract": "Quantum teleportation (QT) over satellite-based free-space optical (FSO) channels is a promising approach for long-distance quantum communication. However, its performance is significantly degraded by atmospheric loss and turbulence. In this paper, we investigate continuous-variable (CV) QT in a dual-downlink scenario, where a satellite distributes entangled states to two ground stations. To mitigate channel-induced degradation, we employ a non-Gaussian entanglement distillation protocol based on the sequential application of photon addition and photon subtraction (PA-PS) on the weaker channel. The results show that the proposed scheme improves teleportation fidelity by up to 7.7% and enhances entanglement negativity by approximately 105% in the low-to-moderate (below 600 km) loss regime. In addition, we identify an optimal squeezing parameter that balances entanglement strength and noise sensitivity. Taken together, these results demonstrate the effectiveness of PA-PS distillation for improving CV quantum communication in realistic satellite networks. We further characterize the trade-off between fidelity gain and the heralded success probability of the protocol.", "url": "https://arxiv.org/abs/2607.08977", "type": "理论", "summary": "基于卫星的自由空间光（FSO）通道的量子隐形传态（QT）是长距离量子通信的一种有前途的方法。然而，其性能会因大气损失和湍流而显着降低。在本文中，我们研究了双下行链路场景中的连续变量（CV）QT，其中卫星将纠缠态分布到两个地面站。为了减轻通道引起的退化，我们采用基于在较弱通道上顺序应用光子加法和光子减法（PA-PS）的非高斯纠缠蒸馏协议。结果表明，所提出的方案在低至中度（低于 600 公里）损耗范围内将隐形传输保真度提高了 7.7%，并将纠缠负性增强了约 105%。此外，我们还确定了平衡纠缠强度和噪声敏感性的最佳挤压参数。总而言之，这些结果证明了 PA-PS 蒸馏对于改善现实卫星网络中的 CV 量子通信的有效性。我们进一步描述了协议的保真度增益和成功概率之间的权衡。", "authors": [{"name": "Lia Suci Waliani"}, {"name": "Georges Kaddoum"}, {"name": "Mahdi Chehimi"}, {"name": "Shahan Hawatian"}], "featured_authors": [{"name": "Lia Suci Waliani"}, {"name": "Georges Kaddoum"}, {"name": "Mahdi Chehimi"}, {"name": "Shahan Hawatian"}], "author_count": 4}, {"id": "2607.09032", "category": "quant-ph", "title": "Quantum Logic as the Logic of Contexts", "abstract": "Quantum logic is usually presented as a non-classical departure from ordinary reasoning forced on us by quantum mechanics, with classical logic kept as the secure starting point. We argue for the opposite order of explanation in a finite and fully computable setting. The free orthomodular lattice on two generators has ninety-six elements, the direct product of a six-element non-distributive factor and a sixteen-element Boolean factor. Reading the first factor as a register of contexts and the second as Boolean content, we obtain a calculus whose elements are context--bit-vector pairs and whose operations act component by component. With this calculus we establish three results. First, we classify the six layers by commutativity, identifying the central kernel of context-neutral propositions together with a dual central layer in which all complementary contexts are present. Second, we show that orthocomplementation rearranges the layers exactly as the complementation of the small factor rearranges its elements, which makes the duality among the layers rigid rather than accidental. Third, we prove that the operation forgetting the context is a surjective homomorphism of orthocomplemented lattices whose quotient is the classical Boolean algebra, so that classical logic is a six-to-one, information-losing image of the contextual calculus.", "url": "https://arxiv.org/abs/2607.09032", "type": "理论", "summary": "量子逻辑通常被描述为量子力学强加给我们的与普通推理的非经典背离，而经典逻辑则保留为安全的起点。我们主张在有限且完全可计算的环境中进行相反的解释顺序。两个生成器上的自由正交模格有九十六个元素，是六元素非分配因子和十六元素布尔因子的直积。将第一个因子读取为上下文寄存器，将第二个因子读取为布尔内容，我们获得一个微积分，其元素是上下文-位向量对，其操作逐个组件进行。通过这个演算，我们得出三个结果。首先，我们通过交换性对六个层进行分类，识别上下文中立命题的中心核心以及所有互补上下文都存在的双中心层。其次，我们表明，正位互补重新排列层与小因子的互补重新排列其元素完全相同，这使得层之间的二元性是刚性的而不是偶然的。\n\n第三，我们证明忘记上下文的运算是正交补格的满射同态，其商是经典布尔代数，因此经典逻辑是上下文微积分的六比一、信息丢失的图像。", "authors": [{"name": "Haruki Emori"}, {"name": "Atsushi Iriki"}, {"name": "Andrei Khrennikov"}, {"name": "Kazunori Kondo"}], "featured_authors": [{"name": "Haruki Emori"}, {"name": "Atsushi Iriki"}, {"name": "Andrei Khrennikov"}, {"name": "Kazunori Kondo"}], "author_count": 4}, {"id": "2607.09047", "category": "quant-ph", "title": "Classically Realizable Incompatibility", "abstract": "Incompatibility constitutes a fundamental aspect of quantum mechanics. However, not every quantum observable non-classical property arises from incompatibility, nor can all quantum scenarios be fully captured by incompatibility alone. Within the framework of partial Boolean algebra (pBA), we research the structural properties of incompatibility scenarios. We introduce a unified method to realize any incompatibility scenario via a classical game, and the construction is extendable to any scenario embeddable into a Boolean algebra. The exclusivity graph offers a precise characterization of incompatibility scenarios. We prove that every exclusivity graph is the atom graph of an exclusive pBA, which is embedded into a Boolean algebra. These results provide a necessary condition for exclusivity graphs and a sufficient condition for atom graphs.", "url": "https://arxiv.org/abs/2607.09047", "type": "理论", "summary": "不相容性构成了量子力学的一个基本方面。然而，并非所有量子可观测的非经典性质都源于不相容性，也不能仅通过不相容性来完全捕获所有量子场景。在部分布尔代数（pBA）的框架内，我们研究不兼容场景的结构特性。我们引入了一种统一的方法来通过经典游戏来实现任何不兼容的场景，并且该构造可以扩展到任何可嵌入布尔代数的场景。排他性图提供了不兼容场景的精确表征。我们证明每个排他性图都是排他性 pBA 的原子图，它嵌入到布尔代数中。这些结果为排他性图提供了必要条件，为原子图提供了充分条件。", "authors": [{"name": "Songyi Liu"}, {"name": "Yongjun Wang"}, {"name": "Baoshan Wang"}, {"name": "Yunyi Jia"}, {"name": "Chang He"}], "featured_authors": [{"name": "Songyi Liu"}, {"name": "Yongjun Wang"}, {"name": "Baoshan Wang"}, {"name": "Yunyi Jia"}, {"name": "Chang He"}], "author_count": 5}, {"id": "2607.09066", "category": "quant-ph", "title": "Entanglement entropy in two-particle Grover walks on graphs", "abstract": "We define a two-particle quantum walk of identical particles on a graph $G$ via the one-particle Grover walk on the Kronecker product $G \\otimes G$, and call it the two-particle Grover walk. In systems of identical particles, quantum mechanics requires that quantum states have a certain invariance with respect to the exchange of particles. Focusing on the symmetry of the Kronecker product $G \\otimes G$ as a graph, we show that the time evolution operator of this walk commutes with the swap operator, which ensures that this requirement is satisfied. Furthermore, we study the entanglement entropy of quantum states evolved by this walk. For the complete bipartite graph $K_{n,n}$, we completely determine the values of $n$ for which the quantum states evolved from specific initial states attain the upper bound of the entropy at some time, and prove that they are exactly $1$ and $2$.", "url": "https://arxiv.org/abs/2607.09066", "type": "理论", "summary": "我们通过克罗内克乘积 $G \\otimes G$ 上的单粒子 Grover 行走定义图 $G$ 上相同粒子的双粒子量子行走，并将其称为双粒子 Grover 行走。在相同粒子的系统中，量子力学要求量子态对于粒子交换具有一定的不变性。着眼于克罗内克乘积$G \\otimes G$作为图的对称性，我们表明该游走的时间演化算子与交换算子可交换，这确保了满足这一要求。此外，我们研究了由此演化出的量子态的纠缠熵。对于完整的二部图$K_{n,n}$，我们完全确定了从特定初始态演化而来的量子态在某个时刻达到熵上限的$n$的值，并证明它们正是$1$和$2$。", "authors": [{"name": "Sho Kubota"}, {"name": "Haruhiko Matsubara"}, {"name": "Etsuo Segawa"}], "featured_authors": [{"name": "Sho Kubota"}, {"name": "Haruhiko Matsubara"}, {"name": "Etsuo Segawa"}], "author_count": 3}, {"id": "2607.09145", "category": "quant-ph", "title": "Constraint-Preserving QAOA for Personnel Rostering: Coverage-Preserving and Guarded-XY Mixer Constructions", "abstract": "The Quantum Approximate Optimization Algorithm (QAOA) is a promising framework for combinatorial optimization, but constrained problems are commonly handled using energetic penalty terms that require calibration and allow infeasible configurations to remain dynamically accessible. We develop a constraint-preserving QAOA framework for personnel rostering in which hard scheduling constraints are embedded directly into the mixer Hamiltonian. Using a binary rostering model with daily coverage and no-consecutive-duty constraints, we formulate the dynamics from a transition-graph perspective and introduce a guarded-XY mixer that confines the evolution to the fully feasible scheduling manifold. We further distinguish feasibility preservation from feasible-transition design and propose a tight-pattern extension that introduces collective feasible exchanges in saturated workload segments where local guarded exchanges alone are insufficient. Exact statevector simulations demonstrate that, compared with Penalty-X and Coverage-XY formulations under both expectation-value and Conditional Value-at-Risk optimization, the proposed approach eliminates hard-constraint penalty calibration, guarantees feasible evolution by construction, and consistently yields higher-quality output distributions with stronger concentration on optimal feasible schedules. To the best of our knowledge, this is the first constraint-preserving QAOA formulation for personnel rostering, and the transition-graph framework is readily applicable to a broad class of constrained quantum optimization problems.", "url": "https://arxiv.org/abs/2607.09145", "type": "理论+数值", "summary": "量子近似优化算法 (QAOA) 是一种很有前途的组合优化框架，但通常使用能量惩罚项来处理约束问题，这些惩罚项需要校准并允许不可行的配置保持动态可访问性。我们开发了一个用于人员排班的保留约束的 QAOA 框架，其中硬调度约束直接嵌入到混合器哈密顿量中。使用具有每日覆盖和非连续职责约束的二进制排班模型，我们从转换图的角度制定动态，并引入一个受保护的 XY 混合器，将演化限制在完全可行的调度流形内。我们进一步区分可行性保留和可行过渡设计，并提出一种紧密模式扩展，在饱和工作负载段中引入集体可行交换，而仅本地保护交换是不够的。\n\n精确的状态向量模拟表明，与期望值和条件风险值优化下的 Penalty-X 和 Coverage-XY 公式相比，所提出的方法消除了硬约束罚分校准，保证了通过构造进行的可行演化，并一致地产生更高质量的输出分布，更加专注于最佳可行计划。据我们所知，这是第一个用于人员排班的保留约束的 QAOA 公式，并且转换图框架很容易适用于广泛的约束量子优化问题。", "authors": [{"name": "Aruna Gupta"}, {"name": "S R Hassan"}], "featured_authors": [{"name": "Aruna Gupta"}, {"name": "S R Hassan"}], "author_count": 2}, {"id": "2607.09162", "category": "quant-ph", "title": "Quaternary-Squeeze Quantum Identity Authentication: Direction-Scaling Security via Single-Mode Squeezed Light", "abstract": "Quantum identity authentication (QIA) has emerged as a crucial technology for secure communication systems, particularly in the burgeoning era of quantum communications. This paper proposes a novel QIA protocol based on non-classical characteristics of squeezed light fields. By exploiting quantum noise reduction properties of quadrature squeezed coherent states, the protocol fundamentally thwarts eavesdropping attempts by Heisenberg-limited uncertainty constraints. The fidelity parameter for decoy states is utilized to detect spoofing attacks, and the dynamic key update mechanism fundamentally eliminates vulnerabilities caused by key reuse. Security information ratio analysis shows that the protocol is able to resist Gaussian-cloner attacks and detect eavesdropping. Moreover, the security threshold can be further enhanced with higher squeezing, allowing tunable protection levels adaptable to different threat scenarios. Compared with binary-squeezed protocols, our proposed four-direction (quaternary-dimensional) squeezing halves the eavesdropper's guessing probability and enlarges the fidelity gap by 29% tightening the discrimination threshold without relying on extra hardware, thus facilitating practical implementation.", "url": "https://arxiv.org/abs/2607.09162", "type": "理论", "summary": "量子身份认证（QIA）已成为安全通信系统的关键技术，特别是在量子通信的新兴时代。本文提出了一种基于压缩光场非经典特性的新型 QIA 协议。通过利用正交压缩相干态的量子降噪特性，该协议从根本上阻止了海森堡有限不确定性约束的窃听尝试。利用诱饵状态的保真度参数来检测欺骗攻击，动态密钥更新机制从根本上消除了密钥重用造成的漏洞。安全信息比分析表明该协议能够抵抗高斯克隆攻击并检测窃听。此外，可以通过更高的挤压进一步增强安全阈值，从而允许可调的保护级别以适应不同的威胁场景。\n\n与二进制压缩协议相比，我们提出的四向（四维）压缩将窃听者的猜测概率减半，并将保真度差距扩大了29%，在不依赖额外硬件的情况下收紧了辨别阈值，从而便于实际实现。", "authors": [{"name": "Zhipeng Chen"}, {"name": "Haolun Tang"}, {"name": "Xiao-Qi Xiao"}, {"name": "Li-Hua Gong"}], "featured_authors": [{"name": "Zhipeng Chen"}, {"name": "Haolun Tang"}, {"name": "Xiao-Qi Xiao"}, {"name": "Li-Hua Gong"}], "author_count": 4}, {"id": "2607.09339", "category": "quant-ph", "title": "PCPOP.jl: A Julia package for partially commutative polynomial optimization", "abstract": "Here we present PCPOP, a Julia package for polynomial optimization that supports non-commutative optimization, tracial polynomial optimization, trace polynomial optimization and state polynomial optimization. PCPOP fully supports exact arithmetic computations and incorporates convenient functionalities such as algebraic reductions based on Gröbner basis methods, automatized symmetrization via Wedderburn decompositions, and Jordan algebra reductions. As a distinguished feature, PCPOP implements a specialized framework for polynomial computations in partially commutative variables that provides significant computational advantages for problems appearing in quantum information.", "url": "https://arxiv.org/abs/2607.09339", "type": "数值", "summary": "在这里，我们介绍 PCPOP，一个用于多项式优化的 Julia 包，支持非交换优化、跟踪多项式优化、跟踪多项式优化和状态多项式优化。 PCPOP 完全支持精确算术计算，并结合了方便的功能，例如基于 Gröbner 基方法的代数约简、通过 Wedderburn 分解的自动对称化以及 Jordan 代数约简。作为一个显着特征，PCPOP 实现了一个专门的框架，用于部分交换变量中的多项式计算，为量子信息中出现的问题提供了显着的计算优势。", "authors": [{"name": "Moisés Bermejo Morán"}, {"name": "Abhishek Mishra"}], "featured_authors": [{"name": "Moisés Bermejo Morán"}, {"name": "Abhishek Mishra"}], "author_count": 2}, {"id": "2607.09378", "category": "quant-ph", "title": "When Routes Run Out: Adversarial Co-Learning and Explainable Robustness in Quantum Repeater Networks", "abstract": "We study an adversarial bandit problem for entanglement-based quantum-network routing over a modest graph corpus. Alice selects an end-to-end repeater route for an Ekert-91 protocol (E91) representing her move, while Eve selects an attack surface, either edge intercept--resend or repeater memory degradation. Payoffs are drawn from cached SeQUeNCe-simulated E91 transcripts, and Alice accepts a turn when the finite-sample statistic violates the Clauser-Horne-Shimony-Holt (CHSH) bound. Performing adversarial co-learning across 50 structured topologies, we find that learned retention tracks a full-matrix minimax reference closely (Pearson $r=0.99$): under a one-surface Eve action model, bottleneck families have zero retention, while non-bottleneck families follow a $1-1/N$ coverage principle. We then fit decision-tree explanation models to graph-, attack-, and route-level topology-corpus targets and report their faithfulness. Finally, we construct prompt records for local language models to summarize the tree evidence, resulting in an open-source explanation workflow for quantum-repeater network games.", "url": "https://arxiv.org/abs/2607.09378", "type": "理论", "summary": "我们研究了在适度的图语料库上基于纠缠的量子网络路由的对抗性强盗问题。 Alice 为代表她的移动的 Ekert-91 协议 (E91) 选择端到端中继器路由，而 Eve 选择攻击面，要么是边缘拦截 - 重新发送，要么是中继器内存退化。收益是从缓存的 SeQUeNCe 模拟 E91 转录本中提取的，当有限样本统计量违反 Clauser-Horne-Shimony-Holt (CHSH) 界限时，Alice 接受回合。在 50 个结构化拓扑中进行对抗性协同学习，我们发现学习保留紧密跟踪全矩阵极小极大参考（Pearson $r=0.99$）：在单面 Eve 动作模型下，瓶颈族的保留为零，而非瓶颈族遵循 $1-1/N$ 覆盖原则。然后，我们将决策树解释模型与图、攻击和路由级拓扑语料库目标相匹配，并报告其可信度。最后，我们为本地语言模型构建提示记录来总结树证据，从而形成量子中继器网络游戏的开源解释工作流程。", "authors": [{"name": "Brennan Bell"}, {"name": "Inti Gabriel Mendoza Estrada"}, {"name": "Andreas Trügler"}, {"name": "Paul Erker"}], "featured_authors": [{"name": "Brennan Bell"}, {"name": "Inti Gabriel Mendoza Estrada"}, {"name": "Andreas Trügler"}, {"name": "Paul Erker"}], "author_count": 4}, {"id": "2607.09381", "category": "quant-ph", "title": "COSMA: Communication-aware Optimization of Fermionic Simulation Kernels for Modular Quantum Architectures", "abstract": "Quantum simulation is a leading application of quantum computing, but scaling to chemically relevant problems requires modular architectures composed of interconnected quantum processing units. In such systems, inter-core quantum communication becomes a major performance bottleneck. In this work, we present COSMA, a communication-aware compilation framework for fermionic simulation kernels targeting modular quantum architectures. Our approach jointly optimizes fermion-to-qubit mapping, Pauli scheduling, and qubit allocation to minimize inter-core state transfers. Evaluated on molecular benchmarks, COSMA achieves up to $2.5\\times$ reduction in communication cost compared to state-of-the-art baselines, with a median improvement of $1.7\\times$. These results demonstrate that cross-layer co-design is essential for efficient and scalable quantum simulation on multi-core quantum hardware.", "url": "https://arxiv.org/abs/2607.09381", "type": "数值", "summary": "量子模拟是量子计算的主要应用，但扩展到化学相关问题需要由互连的量子处理单元组成的模块化架构。在此类系统中，核间量子通信成为主要的性能瓶颈。在这项工作中，我们提出了 COSMA，一种针对模块化量子架构的费米子模拟内核的通信感知编译框架。我们的方法联合优化费米子到量子位的映射、泡利调度和量子位分配，以最大限度地减少核间状态转移。根据分子基准评估，与最先进的基准相比，COSMA 的通信成本降低了高达 2.5 美元\\倍$，中位数提高了 1.7 美元\\倍$。这些结果表明，跨层协同设计对于多核量子硬件上高效且可扩展的量子模拟至关重要。", "authors": [{"name": "Enrico Russo"}, {"name": "Francesco G. Blanco"}, {"name": "Elio Vinciguerra"}, {"name": "Davide Patti"}, {"name": "Giuseppe Ascia"}, {"name": "Maurizio Palesi"}], "featured_authors": [{"name": "Enrico Russo"}, {"name": "Francesco G. Blanco"}, {"name": "Elio Vinciguerra"}, {"name": "Davide Patti"}, {"name": "Giuseppe Ascia"}, {"name": "Maurizio Palesi"}], "author_count": 6}, {"id": "2607.09445", "category": "quant-ph", "title": "Diagnosing quantum reservoirs at scale based on expressivity and coverage", "abstract": "Quantum reservoirs offer a hardware-friendly route to quantum machine learning, replacing trainable circuits with fixed random dynamics and a classical readout. Because the reservoir is not optimized, performance depends entirely on the choice of reservoir family, yet existing diagnostics demand resources that grow exponentially with system size. We introduce a scalable, hardware-agnostic framework built on two complementary quantities. The first is a task-independent order-statistics (ORS) expressivity score, which compares only the largest output probabilities of a reservoir ensemble against an analytical Haar baseline. It never reconstructs the full output distribution, is cost-independent of Hilbert-space dimension, and admits a closed-form depolarizing noise correction, making it directly usable on hardware. The second is the task-dependent effective rank $R_{\\mathrm{eff}}$ of the feature matrix, which measures how much input-dependent information reaches the readout. We validate the ORS score against established complexity diagnostics and confirm it remains informative under simulated noise and on IBM quantum hardware. Across synthetic and real quantum extreme learning machine and quantum reservoir computing benchmarks, ORS captures the intrinsic expressivity hierarchy of reservoir families while $R_{\\mathrm{eff}}$ determines when that expressivity becomes usable predictive information.", "url": "https://arxiv.org/abs/2607.09445", "type": "数值", "summary": "量子存储库为量子机器学习提供了一种硬件友好的途径，用固定的随机动力学和经典的读数取代可训练的电路。由于储层未经过优化，因此性能完全取决于储层系列的选择，而现有诊断所需的资源随着系统规模呈指数级增长。我们引入了一个基于两个互补量构建的可扩展的、与硬件无关的框架。第一个是与任务无关的阶次统计 (ORS) 表达度评分，它仅将储层集合的最大输出概率与分析 Haar 基线进行比较。它从不重建完整的输出分布，成本独立于希尔伯特空间维度，并允许封闭形式的去极化噪声校正，使其可直接在硬件上使用。第二个是特征矩阵的任务相关有效等级 $R_{\\mathrm{eff}}$，它衡量有多少输入相关信息到达读数。我们根据已建立的复杂性诊断来验证 ORS 分数，并确认它在模拟噪声下和 IBM 量子硬件上仍然提供信息。\n\n在合成和真实的量子极限学习机和量子储层计算基准中，ORS 捕获储层家族的内在表达性层次结构，而 $R_{\\mathrm{eff}}$ 确定该表达性何时成为可用的预测信息。", "authors": [{"name": "Laia Domingo"}, {"name": "Oriol Balló-Gimbernat"}, {"name": "Fernando Vilariño"}], "featured_authors": [{"name": "Laia Domingo"}, {"name": "Oriol Balló-Gimbernat"}, {"name": "Fernando Vilariño"}], "author_count": 3}, {"id": "2607.09477", "category": "quant-ph", "title": "Playing Bayesian games better with separable quantum states than with any classical correlation", "abstract": "Bayesian games, also known as games of incomplete information, are a fruitful arena for exploring the impact of correlations on a set of independent agents (players) via the game equilibria to which they give rise. It was realised some time ago that quantum states shared between the players can lead to new and beneficial equilibria, compared to classical correlation. While until now examples of this effect required an entangled state, here we show that even separable states can create new, genuinely quantum equilibria in games, that are advantageous with respect to all classically correlated equilibria. This shows that non-classical correlations beyond entanglement are indeed a resource, even in otherwise entirely classical situations. Our result brings quantum advantage in games significantly closer to possible realisation.", "url": "https://arxiv.org/abs/2607.09477", "type": "理论", "summary": "贝叶斯博弈，也称为不完全信息博弈，是一个富有成效的领域，通过它们产生的博弈均衡来探索相关性对一组独立代理（玩家）的影响。不久前人们意识到，与经典相关性相比，参与者之间共享的量子态可以带来新的有益的平衡。虽然到目前为止这种效应的例子需要纠缠态，但在这里我们表明，即使是可分离的状态也可以在博弈中创建新的、真正的量子平衡，这相对于所有经典相关平衡都是有利的。这表明，即使在完全经典的情况下，纠缠之外的非经典相关性确实是一种资源。我们的结果使游戏中的量子优势更加接近可能的实现。", "authors": [{"name": "Yaqing Xy Wang"}, {"name": "Giannicola Scarpa"}, {"name": "Andreas Winter"}], "featured_authors": [{"name": "Yaqing Xy Wang"}, {"name": "Giannicola Scarpa"}, {"name": "Andreas Winter"}], "author_count": 3}, {"id": "2607.09599", "category": "quant-ph", "title": "Generalized Nonlinear Imaginary-Time Evolution", "abstract": "Imaginary-time evolution (ITE) is a powerful method for ground-state preparation of a given Hamiltonian. The normalized ITE can be viewed as a gradient flow of the energy expectation value with respect to the Fubini--Study metric. In this work, we propose a generalized nonlinear imaginary-time evolution (NITE) for more general quantum state-preparation tasks. We further present a hardware-efficient variational implementation of NITE and reveal its connection to quantum natural gradient descent. NITE is applied to several subroutine tasks, including variance minimization in variational eigensolvers, probe-state preparation in variational quantum sensing, and excited-state preparation using penalty terms. We prove that NITE achieves a local exponential convergence rate under reasonable assumptions. Our results show that NITE outperforms standard gradient descent and can serve as an efficient optimization method for variational tasks beyond ground-state preparation.", "url": "https://arxiv.org/abs/2607.09599", "type": "理论+数值", "summary": "虚时演化 (ITE) 是一种用于给定哈密顿量基态准备的强大方法。归一化的 ITE 可以被视为能量期望值相对于 Fubini--Study 度量的梯度流。在这项工作中，我们提出了一种广义非线性虚时演化（NITE），用于更一般的量子态准备任务。我们进一步提出了 NITE 的硬件高效变分实现，并揭示了它与量子自然梯度下降的联系。 NITE 适用于多个子例程任务，包括变分本征解算器中的方差最小化、变分量子传感中的探针态准备以及使用惩罚项的激发态准备。我们证明 NITE 在合理的假设下实现了局部指数收敛率。我们的结果表明，NITE 的性能优于标准梯度下降，并且可以作为基态准备之外的变分任务的有效优化方法。", "authors": [{"name": "Chenyu Shi"}, {"name": "Hao Wang"}, {"name": "Jin-Fu Chen"}], "featured_authors": [{"name": "Chenyu Shi"}, {"name": "Hao Wang"}, {"name": "Jin-Fu Chen"}], "author_count": 3}, {"id": "2607.09627", "category": "quant-ph", "title": "A complete ultrametric on von Neumann's incomplete tensor products", "abstract": "We revisit von Neumann's theory of infinite tensor products of Hilbert spaces. On the set $\\Gamma$ of equivalence classes of $C_0$-sequences, which labels the incomplete tensor products inside the complete tensor product, we introduce a natural pseudo-ultrametric $d$: the distance between two classes is the convergence exponent of the series $\\sum_j|\\langle\\varphi_j,\\psi_j\\rangle-1|$ formed from any pair of representatives. We show that $d$ is well defined on equivalence classes, satisfies the strong triangle inequality, and is complete. Distinct classes may lie at distance zero, so $d$ separates points only after passing to the quotient $\\widetilde\\Gamma$ of $\\Gamma$ by the relation $d=0$; the pair $(\\widetilde\\Gamma,d)$ is then a complete ultrametric space. As an application, we show that a product unitary $\\bigotimes_j U$ whose factor $U$ satisfies $\\inf_{\\|x\\|=1}|\\langle x,Ux\\rangle-1|>0$ (in particular, a unitary on a finite dimensional space with $1\\notin\\sigma(U)$) displaces every class to the maximal distance $1$. Guided by the intended application -- a caricature of Everettian branching, in which the sectors of the infinite tensor product play the role of worlds -- we also develop a gauge-invariant variant $\\tilde d$ of the metric, based on von Neumann's weak equivalence and matched to the quasi-equivalence of product states on the quasi-local algebra. The displacement of a class under a product unitary, measured by $\\tilde d$, is class dependent and realizes every value in $[0,1]$. We interpret $\\tilde d$ as a decoherence exponent: it measures the polynomial rate at which two branches of the universal state vector become operationally distinct as ever larger portions of the environment are monitored.", "url": "https://arxiv.org/abs/2607.09627", "type": "理论", "summary": "我们重新审视冯·诺依曼的希尔伯特空间无限张量积理论。在$C_0$序列的等价类集合$\\Gamma$上，它标记了完全张量积内的不完全张量积，我们引入了一个自然的伪超度量$d$：两个类之间的距离是由任意一对代表组成的级数$\\sum_j|\\langle\\varphi_j,\\psi_j\\rangle-1|$的收敛指数。我们证明 $d$ 在等价类上被明确定义，满足强三角不等式，并且是完备的。不同的类可能位于距离零处，因此 $d$ 仅在通过关系 $d=0$ 传递到 $\\Gamma$ 的商 $\\widetilde\\Gamma$ 后才分隔点；那么$(\\widetilde\\Gamma,d)$对就是一个完全的超度量空间。作为一个应用，我们证明了乘积酉$\\bigotimes_j U$，其因子$U$满足$\\inf_{\\|x\\|=1}|\\langle x,Ux\\rangle-1|>0$（特别是有限维空间上的酉$1\\notin\\sigma(U)$）将每个类置换到最大距离$1$。\n\n在预期应用的指导下——埃弗里特分支的漫画，其中无限张量积的扇区扮演世界的角色——我们还开发了度量的规范不变变体 $\\tilde d$，基于冯·诺依曼的弱等价性，并与准局部代数上的乘积状态的准等价性相匹配。乘积酉下的类的位移（由 $\\tilde d$ 测量）与类相关，并实现 $[0,1]$ 中的每个值。我们将 $\\tilde d$ 解释为退相干指数：它测量随着环境的更大部分受到监控，通用状态向量的两个分支在操作上变得不同的多项式速率。", "authors": [{"name": "Andrew Lesniewski"}], "featured_authors": [{"name": "Andrew Lesniewski"}], "author_count": 1}, {"id": "2607.09632", "category": "quant-ph", "title": "Lean-QIT: Towards a Formal Infrastructure for Quantum Information Theory", "abstract": "Quantum information theory (QIT) characterizes the capabilities and fundamental limits of quantum information processing, underpinning quantum communication, computation, and error correction. Formalizing its coding theorems requires connecting finite-block protocols, analytic inequalities, and asymptotic limits within a unified machine-checked framework. Existing developments, however, lack a reusable operational layer that defines codes, error criteria, achievable rates, and capacities independently of their information-theoretic characterizations. In this work, we present LeanQIT, a Lean 4 library for finite-dimensional QIT. It provides composable, kernel-checked interfaces for quantum states and channels, source and channel codes, finite-block performance criteria, hypothesis testing, one-shot quantities, and asymptotic rate constructions. Using this infrastructure, we formalize Schumacher's quantum source-coding theorem, the Holevo--Schumacher--Westmoreland classical-capacity theorem, and the entanglement-assisted classical-capacity theorem together with its strong converse. By separating operational definitions from analytic characterizations and exposing reusable achievability, converse, and asymptotic components, Lean-QIT provides a machine-readable foundation for formal QIT and a compositional knowledge substrate for emerging AI-assisted formalization, automated proof search, and agentic reasoning in quantum information and computation.", "url": "https://arxiv.org/abs/2607.09632", "type": "理论", "summary": "量子信息理论 (QIT) 描述了量子信息处理的能力和基本限制，支撑着量子通信、计算和纠错。形式化其编码定理需要在统一的机器检查框架内连接有限块协议、解析不等式和渐近极限。然而，现有的开发缺乏可重用的操作层来定义代码、错误标准、可实现的速率和独立于其信息论特征的容量。在这项工作中，我们提出了 LeanQIT，一个用于有限维 QIT 的 Lean 4 库。它为量子态和通道、源代码和通道代码、有限块性能标准、假设检验、一次性量和渐近率构造提供可组合的、经过内核检查的接口。使用这个基础设施，我们形式化了舒马赫的量子源编码定理、Holevo-舒马赫-威斯特摩兰经典容量定理、纠缠辅助经典容量定理及其强逆。\n\n通过将操作定义与分析表征分离，并公开可重用的可实现性、逆向和渐近组件，Lean-QIT 为形式化 QIT 提供了机器可读的基础，并为新兴的人工智能辅助形式化、自动证明搜索以及量子信息和计算中的代理推理提供了组合知识基础。", "authors": [{"name": "Chengkai Zhu"}, {"name": "Ziao Tang"}, {"name": "Guocheng Zhen"}, {"name": "Yimeng Cao"}, {"name": "Yusheng Zhao"}, {"name": "Ranyiliu Chen"}, {"name": "Xuanqiang Zhao"}, {"name": "Lei Zhang"}, {"name": "Xin Wang"}], "featured_authors": [{"name": "Chengkai Zhu"}, {"name": "Ziao Tang"}, {"name": "Guocheng Zhen"}, {"name": "Xuanqiang Zhao"}, {"name": "Lei Zhang"}, {"name": "Xin Wang"}], "author_count": 9}, {"id": "2607.09643", "category": "quant-ph", "title": "Optimality of the free quantum evolution: the general case with nodes", "abstract": "Extending and refining a preceding work, the free evolution of a quantum wave function, with fixed initial and final modulus, is considered in the general case where nodes are allowed. The method is based on considering a suitable simple functional related to the quadratic optimal transport cost in discrete time. Under reasonable assumptions it is shown that, if nodes are present, the free evolution of the wave function with fixed initial and final modulus is a sort of local minimum. If no nodes are present the minimum is global, suggesting intrinsic instability of the nodes in a free quantum evolution.", "url": "https://arxiv.org/abs/2607.09643", "type": "理论", "summary": "扩展和完善了前面的工作，在允许节点的一般情况下考虑了具有固定初始模和最终模的量子波函数的自由演化。该方法基于考虑与离散时间的二次最优运输成本相关的合适的简单函数。在合理的假设下，表明如果存在节点，具有固定初始模量和最终模量的波函数的自由演化是一种局部最小值。如果不存在节点，则最小值是全局的，这表明自由量子演化中节点的内在不稳定性。", "authors": [{"name": "Laura M. Morato"}], "featured_authors": [{"name": "Laura M. Morato"}], "author_count": 1}, {"id": "2607.09651", "category": "quant-ph", "title": "Local Determinacy of Quantum Master Equations and a Mechanical Interpretation of the Multi-Mode Jaynes-Cummings and Central Spin Models", "abstract": "We propose a novel formulation of master equations for open systems wherein the evolution of a state is determined solely by its local behaviour at any point of time. Specifically, our formulation allows for a local interpretation of the workings of beyond-Markovian dynamics as opposed to the more common conception that non-Markovian state evolution is affected by its cumulative past history. Quite interestingly, local determinacy is found prevalent in quantum dynamics. We illustrate the advantages of our coordinate-free formulation with exact analyses on two physically relevant models.", "url": "https://arxiv.org/abs/2607.09651", "type": "理论", "summary": "我们提出了一种开放系统主方程的新颖表述，其中状态的演化仅由其在任何时间点的局部行为决定。具体来说，我们的公式允许对超马尔可夫动力学的运作进行局部解释，而不是更常见的概念，即非马尔可夫状态演化受到其累积的过去历史的影响。非常有趣的是，局部确定性在量子动力学中普遍存在。我们通过对两个物理相关模型的精确分析来说明无坐标公式的优点。", "authors": [{"name": "Jaeha Lee"}, {"name": "Miku Ishizaki"}], "featured_authors": [{"name": "Jaeha Lee"}, {"name": "Miku Ishizaki"}], "author_count": 2}, {"id": "2607.09660", "category": "quant-ph", "title": "Nonlinear particle detectors across the Rindler firewall", "abstract": "We investigate Unruh-DeWitt detectors coupled to composite observables of a quantum scalar field, including quadratic coupling to the field momentum and coupling to the local energy density. We develop a distributional framework for evaluating the corresponding detector response functions and apply it to detectors crossing the Rindler firewall. While we recover the finite response of the derivative-coupling model, we show that quadratic momentum coupling leads to ill-defined products of distributions and unavoidable formal $\\delta(0)$-type divergences. Since the local energy-density response is closely tied to the quadratic momentum response, our results provide strong evidence that the standard sharp firewall model is incompatible with nonlinear detector couplings to local observables. Our analysis further suggests that these pathologies originate from the discontinuous severing of correlations across the Rindler horizon, rather than from the detector model itself.", "url": "https://arxiv.org/abs/2607.09660", "type": "理论", "summary": "我们研究与量子标量场的复合可观测量耦合的 Unruh-DeWitt 探测器，包括与场动量的二次耦合和与局部能量密度的耦合。我们开发了一个分布式框架来评估相应的探测器响应函数，并将其应用于穿越 Rindler 防火墙的探测器。当我们恢复导数耦合模型的有限响应时，我们表明二次动量耦合会导致分布乘积不明确以及不可避免的形式 $\\delta(0)$ 型散度。由于局部能量密度响应与二次动量响应密切相关，因此我们的结果提供了强有力的证据，证明标准尖锐防火墙模型与局部可观测量的非线性探测器耦合不兼容。我们的分析进一步表明，这些病症源于 Rindler 视界内相关性的不连续切断，而不是探测器模型本身。", "authors": [{"name": "Matheus H. Zambianco"}, {"name": "Eduardo Martín-Martínez"}], "featured_authors": [{"name": "Matheus H. Zambianco"}, {"name": "Eduardo Martín-Martínez"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
