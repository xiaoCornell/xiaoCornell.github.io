  <style>

    .author-item { display: grid; gap: 4px; }

    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2607.08787", "category": "cond-mat", "title": "Brownian Bridge for Coherent State Path Integral Monte Carlo", "abstract": "We propose a new Brownian bridge construction for our newly devised Coherent States Path Integral Monte Carlo algorithm. We apply it to the numerically exact calculation of the thermodynamic properties of the Helium fluid on a plane at low non zero temperature. We find very good agreement with the conventional plane waves path integral Monte Carlo results.", "url": "https://arxiv.org/abs/2607.08787", "type": "数值", "summary": "我们为新设计的相干态路径积分蒙特卡罗算法提出了一种新的布朗桥结构。我们将其应用于低非零温度平面上氦流体热力学性质的数值精确计算。我们发现与传统平面波路径积分蒙特卡罗结果非常一致。", "authors": [{"name": "Riccardo Fantoni"}], "featured_authors": [{"name": "Riccardo Fantoni"}], "author_count": 1}, {"id": "2607.08825", "category": "cond-mat", "title": "Quantum Oscillation Signatures of $\\mathbb{Z}_2$ Monopole Charge in Nodal-Ring Semimetals", "abstract": "Topological semimetals host band nodes characterized by quantized invariants that can appear in bulk responses, yet some invariants remain hidden from standard probes. In particular, band nodes can carry secondary topological charges whose transport signatures are still largely unexplored. Here we study three-dimensional nodal-line semimetals in which nodal rings carry both the Berry phase $w_1\\pi$ and a $\\mathbb{Z}_2$ monopole charge $w_2$. We show that magnetic quantum oscillations, usually treated as a probe of $w_1$, can directly diagnose $w_2$, with the relevant signal selected by the magnetic-field direction. For a field along the ring axis, the inner and outer extremal orbits of the toroidal Fermi surface both encircle the $w_2$-enforced thread and exhibit a topological phase shift $\\nu w_2\\pi$ in the $\\nu$th harmonic, which is accessible through standard phase-resolved quantum-oscillation analysis. By contrast, for a field applied perpendicular to the ring axis, the relevant extremal orbit exhibits the usual $\\pi$ phase shift associated with the Berry phase $w_1\\pi$, independent of $w_2$. For weak doping, three-dimensional ABC-stacked graphdiyne is predicted to exhibit the proposed oscillations in a field range accessible with present-day high-field facilities.", "url": "https://arxiv.org/abs/2607.08825", "type": "理论+数值", "summary": "拓扑半金属主带节点的特征是量化不变量，可以出现在批量响应中，但一些不变量仍然对标准探针隐藏。特别是，带节点可以携带二次拓扑电荷，其传输特征在很大程度上仍未被探索。在这里，我们研究三维节点线半金属，其中节点环携带贝里相 $w_1\\pi$ 和 $\\mathbb{Z}_2$ 单极电荷 $w_2$。我们证明，磁量子振荡通常被视为 $w_1$ 的探针，可以直接诊断 $w_2$，并通过磁场方向选择相关信号。对于沿环轴的场，环形费米面的内极值轨道和外极值轨道均环绕 $w_2$ 强制螺纹，并在 $\\nu$th 谐波中表现出拓扑相移 $\\nu w_2\\pi$，这可以通过标准相位分辨量子振荡分析获得。相比之下，对于垂直于环轴施加的场，相关极值轨道表现出与贝里相 $w_1\\pi$ 相关的通常 $\\pi$ 相移，与 $w_2$ 无关。\n\n对于弱掺杂，预计三维 ABC 堆叠石墨炔将在当今高场设施可达到的场范围内表现出所提出的振荡。", "authors": [{"name": "Aravind Karthigeyan"}, {"name": "Yoonseok Hwang"}, {"name": "Bohm-Jung Yang"}, {"name": "Junyeong Ahn"}], "featured_authors": [{"name": "Aravind Karthigeyan"}, {"name": "Yoonseok Hwang"}, {"name": "Bohm-Jung Yang"}, {"name": "Junyeong Ahn"}], "author_count": 4}, {"id": "2607.08826", "category": "cond-mat", "title": "The monopole plasma resonance: a smoking gun of 3D $U(1)$ quantum spin liquids", "abstract": "Certain 3D $U(1)$ spin liquids, such as those arising in dipolar quantum spin ice, have an emergent monopole which is the source of an emergent magnetic field that transforms under symmetries like an electric polarization. As a consequence, these monopoles carry a physical electric charge in their cores and form a plasma at low temperatures. Due to the monopole coupling to emergent gauge fields, the full system behaves as an electrical insulator for DC transport, but can display a sharp plasma resonance analogous to a metal at very low frequencies. This can serve as a clear fingerprint to detect these states in materials. We discuss the optimal conditions to observe this phenomenon in the 3D $U(1)$ spin-liquid candidate Ce$_2$Zr$_2$O$_7$.", "url": "https://arxiv.org/abs/2607.08826", "type": "理论", "summary": "某些 3D $U(1)$ 自旋液体，例如偶极量子自旋冰中产生的液体，具有涌现单极子，它是涌现磁场的来源，该磁场在对称性下像电极化一样转变。因此，这些单极子的核心带有物理电荷，并在低温下形成等离子体。由于与新兴规范场的单极耦合，整个系统表现为直流传输的电绝缘体，但可以在非常低的频率下显示出类似于金属的尖锐等离子体共振。这可以作为检测材料中这些状态的清晰指纹。我们讨论了在 3D $U(1)$ 自旋液体候选 Ce$_2$Zr$_2$O$_7$ 中观察这种现象的最佳条件。", "authors": [{"name": "Anish Koley"}, {"name": "Saranyo Moitra"}, {"name": "Inti Sodemann Villadiego"}], "featured_authors": [{"name": "Anish Koley"}, {"name": "Saranyo Moitra"}, {"name": "Inti Sodemann Villadiego"}], "author_count": 3}, {"id": "2607.08840", "category": "cond-mat", "title": "Fermion-mediated Casimir effect on mesoscopic rings implementing non-Clifford SWAP$^α$ gates", "abstract": "The Casimir effect is typically governed by intrinsic material properties and lacks in situ tunability. We show that, in mesoscopic rings, both the magnitude and sign of the fermion-mediated Casimir interaction can be controlled via the Aharonov-Bohm effect. The resulting interplay between the Aharonov-Bohm phase and the Casimir interaction provides a route to engineer long-range interactions. In particular, this mechanism enables the implementation of non-Clifford SWAP$^{\\alpha}$ gates between spatially separated spin qubits, thereby reducing the overhead for universal quantum computation and quantum error correction in spin-qubit architectures.", "url": "https://arxiv.org/abs/2607.08840", "type": "理论", "summary": "卡西米尔效应通常由固有材料特性决定，缺乏原位可调性。我们表明，在介观环中，费米子介导的卡西米尔相互作用的大小和符号都可以通过阿哈罗诺夫-玻姆效应来控制。阿哈罗诺夫-玻姆相和卡西米尔相互作用之间产生的相互作用为设计长程相互作用提供了一条途径。特别是，这种机制使得能够在空间分离的自旋量子位之间实现非 Clifford SWAP$^{\\alpha}$ 门，从而减少自旋量子位架构中通用量子计算和量子纠错的开销。", "authors": [{"name": "Liang Du"}, {"name": "Qing-Dong Jiang"}, {"name": "Yijia Wu"}], "featured_authors": [{"name": "Liang Du"}, {"name": "Qing-Dong Jiang"}, {"name": "Yijia Wu"}], "author_count": 3}, {"id": "2607.08845", "category": "cond-mat", "title": "Probing Cooper pair momentum by quasiparticle steering with planar Josephson junctions", "abstract": "The Cooper pair momentum in a superconductor is associated with a phase gradient of the superconducting order parameter. In general, this momentum is small compared to the Fermi momentum, which makes it challenging to measure. Josephson junctions, however, enable the creation of large phase gradients and transfer of the Cooper pair momentum to quasiparticles via Andreev reflection. In this work we demonstrate that Andreev bound states propagating along ballistic planar Josephson junctions eject into an adjacent normal region at a phase-controlled angle that scales as $\\Theta \\sim \\sqrt{\\Delta/ \\mu}$, where $\\Delta$ is the superconducting gap and $\\mu$ is the chemical potential. This angle parametrically exceeds the conventional Cooper pair momentum scale $\\Delta/ \\mu$, and thus this phenomenon is sizeable even within the Andreev approximation regime $\\Delta / \\mu \\ll 1$. Our results establish phase-controlled quasiparticle ejection as a kinematic probe of condensate momentum transfer: unlike existing probes that detect the Doppler energy shift, the signal appears as a momentum-space deflection of emitted quasiparticles.", "url": "https://arxiv.org/abs/2607.08845", "type": "理论", "summary": "超导体中的库珀对动量与超导序参数的相位梯度相关。一般来说，与费米动量相比，这种动量很小，这使得测量具有挑战性。然而，约瑟夫森结能够产生大的相位梯度，并通过安德烈夫反射将库珀对动量转移到准粒子。在这项工作中，我们证明了沿着弹道平面约瑟夫森结传播的安德烈夫束缚态以相控角度喷射到相邻的法向区域，该角度的比例为 $\\Theta \\sim \\sqrt{\\Delta/ \\mu}$，其中 $\\Delta$ 是超导能隙，$\\mu$ 是化学势。这个角度在参数上超过了传统的库珀对动量尺度 $\\Delta/ \\mu$，因此即使在 Andreev 近似体系 $\\Delta / \\mu \\ll 1$ 内，这种现象也是相当大的。我们的结果将相控准粒子喷射作为凝聚态动量传递的运动学探针：与检测多普勒能量偏移的现有探针不同，信号显示为发射的准粒子的动量空间偏转。", "authors": [{"name": "Isidora Araya Day"}, {"name": "Anton R. Akhmerov"}, {"name": "Antonio R. L. Manesco"}], "featured_authors": [{"name": "Isidora Araya Day"}, {"name": "Anton R. Akhmerov"}, {"name": "Antonio R. L. Manesco"}], "author_count": 3}, {"id": "2607.08851", "category": "cond-mat", "title": "A strong-coupling theory for polarizable symmetrically charged walls with counterions only", "abstract": "A pair of parallel polarizable planar walls at distance d is considered. The walls are symmetrically charged with a uniform surface charge density, neutralized by mobile point counterions moving between them. The case of repulsive particle images is studied in the strong-coupling (SC) regime. Of interest is the dependence of the effective inter-wall interaction (pressure), mediated by the mobile counterions, as a function of the distance d. It is shown that previous virial SC single-particle theories work well at small d when the dielectric jump is small; for intermediate and large dielectric jumps they are inadequate even in the SC region. Here, we propose a Wigner-type SC theory based on harmonic deviations of particles from their ground-state monolayer or bilayer Wigner structures formed inside the space between the dielectric walls. Our Monte-Carlo simulations are in very good agreement with the Wigner SC predictions, even down to moderate coupling constants ($\\Xi > 10$).", "url": "https://arxiv.org/abs/2607.08851", "type": "理论+数值", "summary": "考虑距离为 d 的一对平行的可极化平面壁。壁对称地带有均匀的表面电荷密度，被在壁之间移动的移动点抗衡离子所中和。在强耦合 (SC) 体系中研究排斥粒子图像的情况。令人感兴趣的是由移动抗衡离子介导的有效壁间相互作用（压力）与距离 d 的函数关系。结果表明，先前的维里 SC 单粒子理论在小 d、介电跳变较小时效果良好；对于中等和大的介电跃变，即使在 SC 区域，它们也是不够的。在这里，我们提出了一种维格纳型 SC 理论，该理论基于粒子与介电壁之间的空间内形成的基态单层或双层维格纳结构的谐波偏差。我们的蒙特卡罗模拟与维格纳 SC 预测非常一致，甚至在中等耦合常数 ($\\Xi > 10$) 下也是如此。", "authors": [{"name": "Ladislav Šamaj"}, {"name": "Alexandre P. dos Santos"}, {"name": "Emmanuel Trizac"}], "featured_authors": [{"name": "Ladislav Šamaj"}, {"name": "Alexandre P. dos Santos"}, {"name": "Emmanuel Trizac"}], "author_count": 3}, {"id": "2607.08862", "category": "cond-mat", "title": "Loop-current orderings in SU($N$) two-leg fermionic ladder through duality symmetries", "abstract": "We investigate the formation of loop-current ordered phases in half-filled SU($N$) two-leg fermionic ladders. Using a low-energy approach, we uncover the existence of non-perturbative duality symmetries relating four competing orders. Two of these orders correspond to loop-current ordered phases that spontaneously break the time-reversal symmetry and describe charge currents circulating in a staggered pattern either around the plaquettes or along the diagonals of the ladder. These unconventional phases are shown to be dual to conventional (charge and bond) density-wave phases through an exact density-current duality symmetry existing on the lattice. From a perturbative renormalization group approach, we find that these phases for $N>2$ are stabilized in a half-filled SU($N$) two-leg Hubbard ladder with an additional SU($N$) Hund's interaction. The effect of a small doping on these phases is also discussed.", "url": "https://arxiv.org/abs/2607.08862", "type": "理论", "summary": "我们研究了半填充 SU($N$) 两腿费米子梯中环路电流有序相的形成。使用低能量方法，我们揭示了与四个竞争阶相关的非微扰对偶对称性的存在。其中两个阶对应于环路电流有序相，它们自发地打破时间反转对称性并描述以交错模式围绕小板或沿着梯子的对角线循环的充电电流。通过晶格上存在的精确密度-电流对偶对称性，这些非常规相与常规（电荷和键合）密度波相是对偶的。通过扰动重正化群方法，我们发现 $N>2$ 的这些相位在半填充 SU($N$) 两腿 Hubbard 梯子中稳定，并具有额外的 SU($N$) H​​und 相互作用。还讨论了少量掺杂对这些相的影响。", "authors": [{"name": "M. Habchy"}, {"name": "F. Rose"}, {"name": "P. Lecheminant"}], "featured_authors": [{"name": "M. Habchy"}, {"name": "F. Rose"}, {"name": "P. Lecheminant"}], "author_count": 3}, {"id": "2607.08868", "category": "cond-mat", "title": "Grain-boundary-mediated kinetic arrest in graphite-to-diamond transformation", "abstract": "The graphite-to-diamond transition exhibits striking variability under high-pressure, high-temperature (HPHT) conditions, producing diamond, graphitic phases, or metastable, mixed diamond-graphite nanocomposites despite similar synthesis conditions. Existing atomistic models, largely based on idealised single-crystal graphite, do not explain the persistence of partially transformed intermediate states under HPHT conditions. Here, using large-scale molecular dynamics simulations, we show that precursor grain structure governs graphite-to-diamond transformation pathways by decoupling diamond nucleation from cooperative transformation propagation. Grain boundaries first facilitate local sp$^3$ nucleation, after which diamond growth propagates within individual grains but becomes arrested at crystallographically mismatched grain boundaries. As a result, structurally heterogeneous graphite stabilizes kinetically arrested mixed sp$^2$-sp$^3$ states, whereas large or single-crystalline domains favour cooperative bulk transformation into diamond. Our findings identify structural heterogeneity as a missing control parameter alongside pressure and temperature, reframing metastable transformation products as kinetically trapped states arising from precursor microstructure rather than thermodynamic intermediates. Precursor crystallinity therefore emerges as a practical control parameter governing graphite-to-diamond transformation pathways.", "url": "https://arxiv.org/abs/2607.08868", "type": "理论+数值", "summary": "石墨到金刚石的转变在高压高温 (HPHT) 条件下表现出惊人的可变性，尽管合成条件相似，但仍会产生金刚石、石墨相或亚稳态混合金刚石-石墨纳米复合材料。现有的原子模型主要基于理想化的单晶石墨，无法解释高温高压条件下部分转变的中间态的持续存在。在这里，利用大规模分子动力学模拟，我们表明前体晶粒结构通过将金刚石成核与协同转变传播分离来控制石墨到金刚石的转变路径。晶界首先促进局部 sp$^3$ 成核，之后金刚石生长在单个晶粒内传播，但在晶体学不匹配的晶界处停止。因此，结构异质石墨稳定了动力学抑制的混合 sp$^2$-sp$^3$ 态，而大的或单晶域有利于协同整体转变为金刚石。\n\n我们的研究结果将结构异质性确定为与压力和温度一起缺失的控制参数，将亚稳态转变产物重新定义为由前体微观结构而不是热力学中间体产生的动力学俘获态。因此，前体结晶度成为控制石墨到金刚石转变途径的实用控制参数。", "authors": [{"name": "Zuzanna Malinowska-Trzmielak"}, {"name": "Vilmos Neuman"}, {"name": "Mark Wilson"}], "featured_authors": [{"name": "Zuzanna Malinowska-Trzmielak"}, {"name": "Vilmos Neuman"}, {"name": "Mark Wilson"}], "author_count": 3}, {"id": "2607.08992", "category": "cond-mat", "title": "Vacancy Effect on the Ground-State Energy of a Bose Gas Trapped by 1D Imperfect Artificial Crystal", "abstract": "For a weakly interacting Bose gas trapped by an imperfect one-dimensional artificial crystal, we study the effect of its punctual defects, i.e. vacancies, on the ground state properties of the system. In the framework of the mean field approximation, we numerically solve the corresponding Gross-Pitaevskii equation using the ``Gradient Flow with Discrete Normalization'' method, also known as the imaginary time method. The crystal is artificially produced by applying an external Dirac comb potential to the Bose gas where vacancies are created by randomly removing a predetermined number of deltas. We observe that as the number of randomly removed deltas increases, the ground state energy decreases exponentially from its value for the perfect crystal case until it reaches its value when the Bose gas is free. The ground state energy is reported for different magnitudes of the interaction between bosons and several system sizes which we extrapolate to infinity for the crystal with only one vacancy. Also, we observe the presence of an energy gap between the ground state energies of the perfect system and that with a vacancy, which is more noticeable for values of the particle interaction magnitude $ g \\leq 0.1$, when the delta strength $P_0 = 10$. In addition, we report the boson distributions within the crystal, %inside a box with periodic boundary conditions, i.e. the probability density functions which show localization features around vacancies which disappear as $g$ increases. From the ground state energy, the chemical potential is obtained immediately.", "url": "https://arxiv.org/abs/2607.08992", "type": "理论+数值", "summary": "对于被不完美的一维人造晶体捕获的弱相互作用玻色气体，我们研究了其点状缺陷（即空位）对系统基态特性的影响。在平均场近似的框架中，我们使用“离散归一化梯度流”方法（也称为虚时间方法）对相应的 Gross-Pitaevskii 方程进行数值求解。该晶体是通过向玻色气体施加外部狄拉克梳状电势而人工产生的，其中通过随机去除预定数量的增量而产生空位。我们观察到，随着随机去除的增量数量的增加，基态能量从完美晶体情况下的值呈指数下降，直到达到玻色气体自由时的值。报告了玻色子之间不同大小的相互作用和几种系统尺寸的基态能量，对于只有一个空位的晶体，我们将其外推到无穷大。\n\n此外，我们观察到完美系统的基态能量与空位系统的基态能量之间存在能隙，当增量强度 $P_0 = 10$ 时，对于粒子相互作用幅度 $ g \\leq 0.1$ 的值来说，该能隙更加明显。此外，我们报告了晶体内的玻色子分布，%在具有周期性边界条件的盒子内，即概率密度函数，显示出空位周围的局部特征，这些特征随着 $g$ 的增加而消失。从基态能量，可以立即获得化学势。", "authors": [{"name": "E.I. Guerrero-Cruz"}, {"name": "O.A. Rodríguez-López"}, {"name": "M.A. Solís"}], "featured_authors": [{"name": "E.I. Guerrero-Cruz"}, {"name": "O.A. Rodríguez-López"}, {"name": "M.A. Solís"}], "author_count": 3}, {"id": "2607.09003", "category": "cond-mat", "title": "Magnetic devil's staircase in UAgBi$_{2}$", "abstract": "Materials characterized by competing interactions often exhibit a large number of nearly degenerate periodic states. Here we show that layered UAgBi$_2$ hosts a cascade of field- and temperature-induced magnetic transitions. Based on specific heat, thermal expansion, and neutron diffraction, we construct a phase diagram that reveals at least seven nearly degenerate magnetic states in UAgBi$_2$. The observed multi-step magnetization process can be understood by square-wave structures with distinct propagation vectors $\\mathbf{k}$=(0, 0, \\textit{k}) in the presence of strong easy-axis anisotropy that confines the moments along the \\textit{c} axis. Our findings are consistent with a magnetic devil's staircase described by the axial next-nearest neighbor Ising (ANNNI) model and place UAgBi$_2$ as a rare realization of the devil's staircase in a 5\\textit{f}-electron system.", "url": "https://arxiv.org/abs/2607.09003", "type": "理论+数值", "summary": "以竞争相互作用为特征的材料通常表现出大量近简并周期态。在这里，我们展示了分层的 UAgBi$_2$ 具有一系列场和温度引起的磁转变。基于比热、热膨胀和中子衍射，我们构建了一个相图，揭示了 UAgBi$_2$ 中至少七个近简并磁态。观察到的多步磁化过程可以通过具有不同传播矢量 $\\mathbf{k}$=(0, 0, \\textit{k}) 的方波结构来理解，并且存在强易轴各向异性，限制沿 \\textit{c} 轴的力矩。我们的发现与轴向次近邻 Ising (ANNNI) 模型描述的磁魔鬼楼梯一致，并将 UAgBi$_2$ 视为 5\\textit{f}-电子系统中魔鬼楼梯的罕见实现。", "authors": [{"name": "G. S. Freitas"}, {"name": "K. Kirchner"}, {"name": "C. Girod"}, {"name": "D. R. Yahne"}, {"name": "W. Simeth"}, {"name": "C. S. T. Kengle"}, {"name": "F. B. Carneiro"}, {"name": "P. G. Pagliuso"}, {"name": "J.D. Thompson"}, {"name": "M. Janoschek"}, {"name": "O. Zaharko"}, {"name": "S.M. Thomas"}, {"name": "P. F. S. Rosa"}], "featured_authors": [{"name": "G. S. Freitas"}, {"name": "K. Kirchner"}, {"name": "C. Girod"}, {"name": "O. Zaharko"}, {"name": "S.M. Thomas"}, {"name": "P. F. S. Rosa"}], "author_count": 13}, {"id": "2607.09019", "category": "cond-mat", "title": "A new perspective on the anomalous Hall effect", "abstract": "We revisit the anomalous Hall effect in magnetic conductors, and its generalization to finite frequencies, using a formalism based on microscopic notions of polarization, magnetization, and free charges and currents. The electronic degrees of freedom are treated within second-quantized field theory, where the Hamiltonian features a static and cell-periodic magnetic field that encodes the magnetic order in the crystal and breaks time-reversal symmetry. We study the dynamics of bound and free charge carriers at the microscopic level as they respond to a spatially uniform electric field at finite frequency. The conductivity tensor describing the long-wavelength response is a sum of three terms, including a Kubo term associated with the polarization response, along with the metallic Drude term and the anomalous Hall conductivity that are associated with the longitudinal and transverse parts of the free current response, respectively. We also present numerical calculations of these contributions for the ferromagnetic body-centered cubic phase of iron.", "url": "https://arxiv.org/abs/2607.09019", "type": "理论+数值", "summary": "我们使用基于极化、磁化以及自由电荷和电流的微观概念的形式主义，重新审视磁导体中的反常霍尔效应及其对有限频率的推广。电子自由度在第二量子化场论中进行处理，其中哈密顿量具有静态和细胞周期磁场，该磁场编码晶体中的磁序并打破时间反转对称性。我们在微观层面研究束缚和自由电荷载流子的动力学，因为它们对有限频率的空间均匀电场做出响应。描述长波长响应的电导率张量是三项之和，包括与极化响应相关的 Kubo 项，以及分别与自由电流响应的纵向和横向部分相关的金属德鲁德项和反常霍尔电导率。我们还对铁的铁磁体心立方相的这些贡献进行了数值计算。", "authors": [{"name": "Jason G. Kattan"}, {"name": "Matthew Albert"}, {"name": "J. E. Sipe"}], "featured_authors": [{"name": "Jason G. Kattan"}, {"name": "Matthew Albert"}, {"name": "J. E. Sipe"}], "author_count": 3}, {"id": "2607.09064", "category": "cond-mat", "title": "Superheavy dark-bright soliton as a signature of spatial symmetry breaking transition in harmonically trapped Bose mixtures", "abstract": "We investigate the dynamics of a dark-bright soliton in harmonically trapped two-component Bose-Einstein condensates and reveal an interesting spontaneous spatial symmetry breaking driven by nonlinear interactions. When the interaction parameter crosses a threshold value, we find that the dark-bright soliton's motion demonstrates a transition from symmetric periodic oscillation about the origin to asymmetric oscillations offset from the origin. In particular, at the transition point, the effective soliton mass, determined by the ratio of inertial mass to physical mass, diverges. The underlying mechanism is uncovered by constructing trial wave functions and employing the Lagrangian variational method to obtain an effective potential in the quasiparticle picture, which changes from a single well to a double well. The anomalous ``superheavy soliton'' phenomenon is a direct consequence of the dark-bright soliton's physical mass vanishing at the transition point. We obtain the phase diagram of this spatial symmetry-breaking transition. Possible implications of our finding for quantum metrology are discussed.", "url": "https://arxiv.org/abs/2607.09064", "type": "理论+数值", "summary": "我们研究了谐波捕获的双组分玻色-爱因斯坦凝聚态中暗-亮孤子的动力学，并揭示了由非线性相互作用驱动的有趣的自发空间对称性破缺。当相互作用参数超过阈值时，我们发现暗-亮孤子的运动表现出从关于原点的对称周期性振荡到偏离原点的非对称振荡的转变。特别是，在转变点，由惯性质量与物理质量之比确定的有效孤​​子质量发散。通过构造试验波函数并采用拉格朗日变分法获得准粒子图像中的有效势，从单井变为双井，揭示了潜在的机制。反常的“超重孤子”现象是暗-亮孤子的物理质量在转变点消失的直接结果。我们获得了这种空间对称性破缺转变的相图。讨论了我们的发现对量子计量学的可能影响。", "authors": [{"name": "Zheng Gao"}, {"name": "Ling-Zheng Meng"}, {"name": "Jie Liu"}, {"name": "Li-Chen Zhao"}], "featured_authors": [{"name": "Zheng Gao"}, {"name": "Ling-Zheng Meng"}, {"name": "Jie Liu"}, {"name": "Li-Chen Zhao"}], "author_count": 4}, {"id": "2607.09079", "category": "cond-mat", "title": "Predictive Renormalization-Group Theory of Universality Classes in Nonlinear Systems", "abstract": "Universal scaling behavior appears across a wide range of nonlinear systems despite substantial differences in their governing equations and physical mechanisms. We develop a renormalization-group (RG) framework that identifies two complementary RG mechanisms underlying such universality. First, scale invariance generates RG fixed points corresponding to asymptotic self-similar solutions. Second, repeated RG transformations eliminate non-scale-invariant irrelevant structures, causing broad classes of equations to flow toward the same fixed points and thereby form universality classes. The framework applies to finite-time singularities, long-time intermediate asymptotics, stochastic Edwards--Wilkinson growth, nonlinear diffusion, density-dependent biological diffusion, and fluid-interface dynamics. In each case, it reproduces known scaling behavior and identifies the associated universality class through explicit irrelevance criteria. A central feature of the framework is its predictive character. Once a scale-invariant fixed point is identified, the theory predicts entire families of nonlinear equations sharing the same asymptotic self-similar solution. While the diffusion class is partially supported by existing mathematical RG results, most universality classes identified here have not previously been established and therefore constitute falsifiable predictions. These results provide a unified RG perspective on universality in nonlinear systems and show that universality emerges from the same fundamental RG principles that underlie critical phenomena. In contrast to critical phenomena, where observable behavior is typically governed by unstable fixed points requiring fine tuning, self-similar dynamics are generally selected through dynamically stable RG fixed points.", "url": "https://arxiv.org/abs/2607.09079", "type": "理论", "summary": "尽管控制方程和物理机制存在显着差异，但各种非线性系统都存在普遍的标度行为。我们开发了一个重正化群（RG）框架，该框架识别了这种普遍性背后的两种互补的 RG 机制。首先，尺度不变性生成对应于渐近自相似解的 RG 不动点。其次，重复的 RG 变换消除了非尺度不变的不相关结构，导致大量方程流向相同的不动点，从而形成普遍性类。该框架适用于有限时间奇点、长时间中间渐进、随机 Edwards-Wilkinson 增长、非线性扩散、密度相关生物扩散和流体界面动力学。在每种情况下，它都会重现已知的缩放行为，并通过明确的不相关标准来识别相关的普遍性类别。该框架的一个核心特征是它的预测特性。一旦确定了尺度不变不动点，该理论就会预测整个非线性方程族共享相同的渐近自相似解。\n\n虽然扩散类别得到了现有数学 RG 结果的部分支持，但此处确定的大多数普遍性类别之前尚未建立，因此构成了可证伪的预测。这些结果为非线性系统中的普遍性提供了统一的 RG 视角，并表明普遍性源于关键现象背后相同的基本 RG 原理。与临界现象相比，可观察行为通常由需要微调的不稳定固定点控制，自相似动态通常通过动态稳定的 RG 固定点来选择。", "authors": [{"name": "Ko Okumura"}], "featured_authors": [{"name": "Ko Okumura"}], "author_count": 1}, {"id": "2607.09140", "category": "cond-mat", "title": "Quantum Hopfion rings in the cluster mean-field approximation", "abstract": "We study the quantum properties of two- and three-dimensional spin textures -- $k\\pi$-skyrmions and hopfion rings -- within the cluster mean-field approximation (CMFA). By combining the CMFA with a symmetrization procedure, we achieve two key advances: the accurate computation of quantum fluctuations in large spin textures and reliable access to metastable states. These challenges are generally insurmountable using standard methods, which are severely limited by the curse of dimensionality and typically restricted to ground-state properties. Exploiting the cylindrical symmetry of the studied magnetic configurations, we construct one-dimensional chain-like clusters that can be efficiently simulated using the density matrix renormalization group method, while inter-cluster interactions are treated at the mean-field level. The resulting spatial profiles of quantum features such as the local variation of the magnetization length in hopfion rings reveal limitations of the classical micromagnetic model and indicate the necessity of its extension. We demonstrate that the recently proposed regularized micromagnetic equation provides a suitable framework for this purpose.", "url": "https://arxiv.org/abs/2607.09140", "type": "理论", "summary": "我们研究簇平均场近似 (CMFA) 内二维和三维自旋纹理（$k\\pi$-skyrmion 和 hopfion 环）的量子特性。通过将 CMFA 与对称化过程相结合，我们取得了两个关键进展：大自旋纹理中量子涨落的精确计算以及对亚稳态的可靠访问。使用标准方法通常无法克服这些挑战，这些方法受到维数灾难的严重限制，并且通常仅限于基态属性。利用所研究的磁构型的柱对称性，我们构造了一维链状簇，可以使用密度矩阵重整化群方法进行有效模拟，同时簇间相互作用在平均场水平上进行处理。由此产生的量子特征的空间分布，例如hopfion环中磁化长度的局部变化，揭示了经典微磁模型的局限性，并表明了其扩展的必要性。我们证明最近提出的正则化微磁方程为此目的提供了合适的框架。", "authors": [{"name": "Vladyslav M. Kuchkin"}, {"name": "Thomas L. Schmidt"}], "featured_authors": [{"name": "Vladyslav M. Kuchkin"}, {"name": "Thomas L. Schmidt"}], "author_count": 2}, {"id": "2607.09160", "category": "cond-mat", "title": "Shear Unfreezing Explains Yielding, Plasticity and Neck Initiation of Glassy Polymers", "abstract": "Yielding, plasticity, and necking are central to the mechanical performance of materials, yet a concise unified physical picture of how these nonlinear responses arise remains lacking. We develop a minimal theory for glassy polymers based on a classical volume-dependent relaxation time following the Doolittle equation, and derive the constitutive relation using the Onsager variational principle. Surprisingly, this simple theory explains yielding, plasticity, and neck initiation under constant strain rate loading via a shear unfreezing mechanism: as the sample is stretched, volume-increasing activated molecular mobility drives shear deformation from an initially frozen state to an unfrozen state. The theory yields an analytical expression for the yielding stress as a function of strain rate and temperature. It also predicts a phase diagram for necking initiation in the same parameter space, providing a mechanism beyond the classical Considère criterion. Our results establish a unified framework for nonlinear tensile behavior in glassy materials.", "url": "https://arxiv.org/abs/2607.09160", "type": "理论+数值", "summary": "屈服、塑性和颈缩是材料机械性能的核心，但仍然缺乏关于这些非线性响应如何产生的简明统一的物理图。我们基于遵循杜立特方程的经典体积相关弛豫时间，开发了玻璃态聚合物的极小理论，并使用 Onsager 变分原理推导了本构关系。令人惊讶的是，这个简单的理论通过剪切解冻机制解释了恒定应变率加载下的屈服、塑性和颈部起始：当样品被拉伸时，体积增加的激活分子迁移率驱动剪切变形从最初的冻结状态到未冻结状态。该理论给出了屈服应力作为应变率和温度函数的解析表达式。它还预测了同一参数空间中颈缩起始的相图，提供了超越经典 Considère 准则的机制。我们的结果为玻璃材料的非线性拉伸行为建立了统一的框架。", "authors": [{"name": "Peihan Lyu"}, {"name": "Zhaoyu Ding"}, {"name": "Masao Doi"}, {"name": "Xingkun Man"}], "featured_authors": [{"name": "Peihan Lyu"}, {"name": "Zhaoyu Ding"}, {"name": "Masao Doi"}, {"name": "Xingkun Man"}], "author_count": 4}, {"id": "2607.09182", "category": "cond-mat", "title": "Topological phase transition driven by Hatsugai-Kohmoto interaction on the Kagome lattice", "abstract": "The interplay between band topology and strong correlations is central to modern condensed matter physics, but exact solutions are rare. Here, we present an exactly solvable model on the Kagome lattice by combining a Kane-Mele-type spin-orbit coupling with the Hatsugai-Kohmoto interaction. At 1/3 filling, we uncover a continuous topological quantum phase transition driven by electron interaction. A weakly correlated $\\mathbb{Z}_2$ topological insulator gives way to a strongly correlated insulator that, while $\\mathbb{Z}_2$-trivial, hosts a nontrivial spin Chern number $C_s=2$. The transition exhibits critical scaling consistent with the universality class of two-dimensional Dirac fermions. At half-filling, the same model yields a non-Fermi-liquid to Mott-insulator transition, demonstrating that correlation-driven topological and Mott transitions can be unified within a single solvable framework. Our results establish the Kagome Hatsugai-Kohmoto model as a valuable benchmark for interacting topological systems.", "url": "https://arxiv.org/abs/2607.09182", "type": "理论", "summary": "能带拓扑和强相关性之间的相互作用是现代凝聚态物理的核心，但精确的解决方案很少。在这里，我们通过将 Kane-Mele 型自旋轨道耦合与 Hatsugai-Kohmoto 相互作用相结合，在 Kagome 晶格上提出了一个精确可解的模型。在 1/3 填充时，我们发现了由电子相互作用驱动的连续拓扑量子相变。弱相关的 $\\mathbb{Z}_2$ 拓扑绝缘体让位于强相关的绝缘体，虽然 $\\mathbb{Z}_2$ 是平凡的，但拥有一个非平凡的自旋陈数 $C_s=2$。该转变表现出与二维狄拉克费米子的普遍性类别一致的临界标度。在半填充时，同一模型产生非费米液体到莫特绝缘体的转变，证明相关驱动的拓扑和莫特转变可以在单个可解框架内统一。我们的结果将 Kagome Hatsugai-Kohmoto 模型确立为交互拓扑系统的有价值的基准。", "authors": [{"name": "Zhuo-Xuan Yang"}, {"name": "Jiangfan Wang"}], "featured_authors": [{"name": "Zhuo-Xuan Yang"}, {"name": "Jiangfan Wang"}], "author_count": 2}, {"id": "2607.09256", "category": "cond-mat", "title": "Terahertz field-driven nonlinear Hall effect and other second order transport phenomena in two-dimensional tellurene", "abstract": "We study terahertz field-driven second-order nonlinear electron transport phenomena, including the nonlinear Hall effect (NLHE), in two-dimensional tellurene flakes. The dc current excited by linearly polarized terahertz (THz) radiation in Hall bar samples is investigated in directions both along and perpendicular to the $c$-axis of tellurene. As expected for second-order transport phenomena, the current scales as the square of the in-plane electric field of the radiation $\\bf E$, and depends on its orientation. The current results from a combination of three contributions, including the NLHE, the Nonlinear Longitudinal (NLL) and Nonlinear Diagonal (NLD) currents. We established the equivalence between NLH, NLL, and NLD transport currents and Linear photogalvanic effect (LPGE) contributions induced by the absorption of linearly polarized and unpolarized THz radiation. All contributions can be controlled by a gate voltage and have opposite signs for electron and hole conductivity. The magnitude of the current increases drastically when the samples are cooled from room temperature to 4.2 K. It also increases with decreasing radiation frequency. These results are well described by the developed phenomenological and microscopic theories. We show that the THz radiation-induced electric current originates from microscopic mechanisms such as skew scattering, side jump, and the Berry curvature dipole.", "url": "https://arxiv.org/abs/2607.09256", "type": "理论", "summary": "我们研究二维碲烯薄片中太赫兹场驱动的二阶非线性电子输运现象，包括非线性霍尔效应（NLHE）。在沿着和垂直于碲烯 $c$ 轴的方向上研究了霍尔棒样品中线性偏振太赫兹 (THz) 辐射激发的直流电流。正如对二阶输运现象所预期的那样，电流按辐射 $\\bf E$ 平面内电场的平方缩放，并取决于其方向。电流由三种贡献组合而成，包括 NLHE、非线性纵向 (NLL) 和非线性对角 (NLD) 电流。我们建立了 NLH、NLL 和 NLD 传输电流与吸收线性偏振和非偏振太赫兹辐射引起的线性光电效应 (LPGE) 贡献之间的等价关系。所有贡献都可以通过栅极电压控制，并且电子和空穴传导性具有相反的符号。当样品从室温冷却到 4.2 K 时，电流的大小急剧增加。它还随着辐射频率的降低而增加。\n\n发达的现象学和微观理论很好地描述了这些结果。我们表明，太赫兹辐射感应电流源自偏斜散射、侧跳和贝里曲率偶极子等微观机制。", "authors": [{"name": "M. D. Moldavskaya"}, {"name": "L. E. Golub"}, {"name": "E. Mönch"}, {"name": "Chang Niu"}, {"name": "Peide D. Ye"}, {"name": "J. Wunderlich"}, {"name": "S. D. Ganichev"}], "featured_authors": [{"name": "M. D. Moldavskaya"}, {"name": "L. E. Golub"}, {"name": "E. Mönch"}, {"name": "Peide D. Ye"}, {"name": "J. Wunderlich"}, {"name": "S. D. Ganichev"}], "author_count": 7}, {"id": "2607.09274", "category": "cond-mat", "title": "The scales of disorder in perfect quasicrystals", "abstract": "The classical dichotomy between crystalline order and amorphous disorder is increasingly challenged by novel states that lack conventional crystalline symmetries while retaining crystal-like properties. Quasicrystals occupy a distinctive position within this expanding framework by possessing long-range order without translational periodicity, thereby permitting arbitrary $N$-fold rotational symmetry. Paradoxically, far from their unique symmetry center, high-symmetry quasicrystals closely resemble disordered patterns, raising the question of how deterministic order can be detected. Here we show that increasing rotational symmetry progressively suppresses local statistical signatures of quasiperiodicity, while preserving its underlying exact long-range order. This order is thus concealed below an emergent crossover length that grows linearly with $N$. Therefore, as $N \\rightarrow \\infty$, the disorder-like regime expands without bound, defining a symmetry-controlled geometric critical point at which deterministic order and randomness become statistically indistinguishable over any finite observation window. For finite $N$, however, quasiperiodic order becomes detectable beyond this crossover, revealing a second emergent length scale that we identify as the size of a \\textit{statistical unit cell} -- finite patches over which statistical properties recur despite the absence of conventional translational periodicity. In one dimension, the statistical-unit-cell size coincides with the crossover length, whereas in two dimensions it grows as $N^2$, remaining smaller than the size of typical approximants and establishing a hierarchy of emergent length scales. Together, the disorder-to-order crossover and statistical unit cells provide a quantitative framework connecting crystals, quasicrystals, and amorphous matter, showing how apparent disorder can emerge from purely deterministic geometry.", "url": "https://arxiv.org/abs/2607.09274", "type": "理论", "summary": "晶体有序和无定形无序之间的经典二分法越来越受到缺乏传统晶体对称性但保留晶体性质的新状态的挑战。准晶体在这个不断扩展的框架中占据着独特的地位，因为它拥有长程有序而没有平移周期性，从而允许任意的$N$重旋转对称性。矛盾的是，远离其独特的对称中心，高对称性准晶体与无序图案非常相似，这就提出了如何检测确定性秩序的问题。在这里，我们表明，增加旋转对称性会逐渐抑制准周期性的局部统计特征，同时保留其潜在的精确长程顺序。因此，该顺序隐藏在随 $N$ 线性增长的紧急交叉长度之下。因此，当 $N \\rightarrow \\infty$ 时，类无序状态无限制地扩展，定义了一个对称控制的几何临界点，在该临界点上，确定性顺序和随机性在任何有限观察窗口上都变得在统计上无法区分。\n\n然而，对于有限的$N$，准周期顺序在这种交叉之外变得可检测到，揭示了我们将其识别为 \\textit{统计单位单元} 的大小的第二个出现的长度尺度——尽管不存在传统的平移周期性，但统计属性在其上重复出现的有限斑块。在一维中，统计单位单元的大小与交叉长度一致，而在二维中，它以 $N^2$ 的形式增长，保持小于典型近似值的大小，并建立了紧急长度尺度的层次结构。无序到有序的交叉和统计晶胞共同提供了一个连接晶体、准晶体和无定形物质的定量框架，展示了纯粹确定性几何中如何出现明显的无序。", "authors": [{"name": "Alan Rodrigo Mendoza Sosa"}, {"name": "Atahualpa S. Kraemer"}, {"name": "Michael Schmiedeberg"}, {"name": "Erdal C. Oğuz"}], "featured_authors": [{"name": "Alan Rodrigo Mendoza Sosa"}, {"name": "Atahualpa S. Kraemer"}, {"name": "Michael Schmiedeberg"}, {"name": "Erdal C. Oğuz"}], "author_count": 4}, {"id": "2607.09279", "category": "cond-mat", "title": "Transient Reserves, Sink Dampers, and the Failure of Eigenvalue Reasoning in the Attention Propagator", "abstract": "The attention matrix of a causal transformer is row-stochastic, iterated over depth, and non-normal by construction. For non-normal operators, eigenvalues control only asymptotic behavior; finite-depth behavior is controlled by resolvent quantities such as pseudospectra and Kreiss constants. We test, under pre-registered criteria, whether this resolvent view predicts anything about trained transformers that eigenvalues miss. Two structural facts organize the analysis: the mask pins the Kreiss constant of every causal stochastic matrix at $\\sqrt{n}$, and deflating the mask-forced Perron projector factorizes the depth deviation dynamics exactly into a product of deflated operators. Across GPT-2, Pythia-410m, and Llama-3-8B, learned non-normality proves to be signed. A routing minority carries excess transient reserve that tracks previous-token function and doubles when induction heads engage, while the sink majority is suppressed below matched shuffle nulls, so that attention sinks act as transient dampers. On depth products, eigenvalue predictions of surviving deviations err by seven to eleven orders of magnitude, an error absent in matched nulls. Checkpoint censuses date this organization to a consolidation phase after circuit formation, and a clamping intervention on Llama-3-8B establishes a causal chain from three massive activation dimensions through sink attention to transient damping; LayerNorm models implement the same functions elsewhere. A cross-validated contest concludes that resolvent features are required for depth-transient persistence and routing-head identity, and that no single-operator summary of any kind predicts per-head causal criticality.", "url": "https://arxiv.org/abs/2607.09279", "type": "理论", "summary": "因果变换器的注意力矩阵是行随机的，在深度上迭代，并且构造上是非正态的。对于非正规算子，特征值仅控制渐近行为；有限深度行为由诸如赝谱和克雷斯常数等解析量控制。我们根据预先注册的标准测试这个解析视图是否预测了特征值遗漏的有关经过训练的变压器的任何内容。两个结构事实组织了分析：掩模将每个因果随机矩阵的 Kreiss 常数固定在 $\\sqrt{n}$ 处，并且缩小掩模强制 Perron 投影仪将深度偏差动态精确地分解为缩小算子的乘积。在 GPT-2、Pythia-410m 和 Llama-3-8B 中，学习非正态性被证明是有符号的。少数路由携带额外的瞬态储备，跟踪先前的令牌功能，并在感应头接合时加倍，而大多数接收器被抑制到匹配的洗牌空值以下，因此注意力接收器充当瞬态阻尼器。在深度产品上，幸存偏差的特征值预测会出现七到十一个数量级的误差，匹配空值中不存在误差。\n\n检查点普查将该组织确定为电路形成后的巩固阶段，并且对 Llama-3-8B 的钳制干预建立了从三个大规模激活维度到瞬态阻尼的注意力集中的因果链； LayerNorm 模型在其他地方实现相同的功能。交叉验证的竞赛得出的结论是，深度瞬态持久性和路由头身份需要解析特征，并且没有任何类型的单算子摘要可以预测每个头的因果关键性。", "authors": [{"name": "Li Hengyu"}], "featured_authors": [{"name": "Li Hengyu"}], "author_count": 1}, {"id": "2607.09292", "category": "cond-mat", "title": "Kinetic Cellular Model of Corrosion", "abstract": "Aqueous corrosion of metals involves multiple interconnected processes. Thus, computer simulation of corrosion as a whole needs to be able to describe the individual processes and how they influence each other. Atomistic simulations are designed to obtain detailed information for small regions of space over short times. Thus there are limits to the understanding that can be obtained by atomistic simulations alone. Here is presented a method that uses generalised rate equations to extend the length and time scales that can be accessed. It is shown to reduce to either the phase field or cellular automata methods in certain limits. The generalised kinetic equations can reproduce the behaviour described by both the Nernst-Planck and Butler-Volmer equations, which are frequently used to describe corrosion. In addition, the method can describe local rearrangements of atoms such as chemical reactions. Example results are shown for illustrative 1D and 2D problems, with good agreement being found with other methods.", "url": "https://arxiv.org/abs/2607.09292", "type": "理论+数值", "summary": "金属的水腐蚀涉及多个相互关联的过程。因此，整个腐蚀的计算机模拟需要能够描述各个过程以及它们如何相互影响。原子模拟旨在在短时间内获取小空间区域的详细信息。因此，仅通过原子模拟所能获得的理解是有限的。这里提出了一种使用广义速率方程来扩展可以访问的长度和时间尺度的方法。它被证明可以在一定限度内简化为相场或元胞自动机方法。广义动力学方程可以重现 Nernst-Planck 和 Butler-Volmer 方程所描述的行为，这些方程经常用于描述腐蚀。此外，该方法还可以描述原子的局部重排，例如化学反应。显示了说明性一维和二维问题的示例结果，与其他方法有很好的一致性。", "authors": [{"name": "Orkan Sezer"}, {"name": "Andrew Horsfield"}], "featured_authors": [{"name": "Orkan Sezer"}, {"name": "Andrew Horsfield"}], "author_count": 2}, {"id": "2607.09304", "category": "cond-mat", "title": "Learning to Converge: Warm-Starting DFTB Self-Consistent Charges with Machine Learning", "abstract": "Semiempirical electronic structure methods such as Density-Functional Tight-Binding (DFTB) offer a computationally efficient approach to molecular and materials simulations, bridging the gap between first-principles accuracy and classical force field speed while retaining full access to electronic properties. However, DFTB calculations based on self-consistent charge (SCC) schemes can still suffer from slow convergence, particularly for complex molecular and materials systems, making the iterative procedure a significant bottleneck in large-scale simulations and high-throughput workflows. We present a machine learning approach that accelerates DFTB simulations by predicting optimal initial atomic charges. Using element-specific models based on the Smooth Overlap of Atomic Positions descriptor and kernel ridge regression, we train charge models on reference calculations and demonstrate that ML-predicted initial charges consistently and significantly improve SCC convergence across diverse chemical systems including organic molecules, biomolecules, water clusters, transition metal oxides and solid electrolytes.", "url": "https://arxiv.org/abs/2607.09304", "type": "理论+数值", "summary": "密度功能紧结合 (DFTB) 等半经验电子结构方法为分子和材料模拟提供了一种计算高效的方法，弥合了第一原理精度和经典力场速度之间的差距，同时保留了对电子特性的完全访问。然而，基于自洽电荷（SCC）方案的 DFTB 计算仍然会受到收敛缓慢的影响，特别是对于复杂的分子和材料系统，这使得迭代过程成为大规模模拟和高通量工作流程中的重大瓶颈。我们提出了一种机器学习方法，通过预测最佳初始原子电荷来加速 DFTB 模拟。我们使用基于原子位置平滑重叠描述符和核脊回归的元素特定模型，在参考计算上训练电荷模型，并证明机器学习预测的初始电荷一致，并显着改善不同化学系统（包括有机分子、生物分子、水簇、过渡金属氧化物和固体电解质）的 SCC 收敛。", "authors": [{"name": "Maximilian L. Ach"}, {"name": "Karsten Reuter"}, {"name": "Chiara Panosetti"}], "featured_authors": [{"name": "Maximilian L. Ach"}, {"name": "Karsten Reuter"}, {"name": "Chiara Panosetti"}], "author_count": 3}, {"id": "2607.09395", "category": "cond-mat", "title": "Sixteenfold Classification of Many-Body Multipoles from Rotation-Compatible Canonical Symmetries", "abstract": "The conventional multipole framework provides a standard symmetry-based language for one-body electronic degrees of freedom, but fails to distinguish physically distinct sectors in many-body operator space. We show that canonical symmetries compatible with rotations provide this structure through two additional 2 labels associated with the particle-number gauge transformation G{\\pi}/2 and the particle-hole transformation CA. These labels separate operators with different body numbers and particle-number changes, leading to a sixteenfold classification that organizes selection rules for nonzero expectation values, induced multipoles, and symmetry-allowed couplings in many-body multipole space.", "url": "https://arxiv.org/abs/2607.09395", "type": "理论", "summary": "传统的多极框架为单体电子自由度提供了一种基于标准对称的语言，但无法区分多体操作员空间中物理上不同的扇区。我们证明，与旋转兼容的规范对称性通过与粒子数规范变换 G{\\pi}/2 和粒子空穴变换 CA 相关的两个附加 2 标签提供了这种结构。这些标签将具有不同主体数和粒子数变化的算子分开，从而产生十六重分类，该分类组织了多体多极子空间中非零期望值、诱导多极子和对称允许耦合的选择规则。", "authors": [{"name": "Shingo Kuniyoshi"}, {"name": "Rikuto Oiwa"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Shingo Kuniyoshi"}, {"name": "Rikuto Oiwa"}, {"name": "Satoru Hayami"}], "author_count": 3}, {"id": "2607.09411", "category": "cond-mat", "title": "Finite-time cooling and accessibility of the stripe phase in the Ising antiferromagnet", "abstract": "The finite-rate cooling dynamics of the triangular-lattice $J_1-J_2$ Ising antiferromagnet is studied under local Metropolis updates. Although an antiferromagnetic next-nearest-neighbor coupling selects a stripe phase in equilibrium, the simulations show that this phase is not automatically reached on finite time scales. A kinetic stripe-formation time $n^*(L,J_2/J_1)$ is defined from the probability of obtaining a globally stripe-ordered final state. This time shifts to much slower cooling as the system size increases and to faster cooling as $J_2/J_1$ increases. The size dependence is compatible with a coarsening-controlled process, with an effective growth at least quadratic in L over the simulated range. Real-space morphology and fixed-temperature diagnostics show that failed trajectories are not simply disordered states: they often contain locally stripe-ordered domains separated by residual walls or competing orientations. In the weak-$J_2/J_1$ regime, the system can restore the local nearest-neighbor frustrated constraint while still failing to select a global stripe sector. These results separate three processes that are usually conflated: energetic degeneracy lifting by $J_2/J_1$, local constraint restoration, and global stripe-orientation selection under local dynamics.", "url": "https://arxiv.org/abs/2607.09411", "type": "理论+数值", "summary": "在本地 Metropolis 更新下研究了三角晶格 $J_1-J_2$ Ising 反铁磁体的有限速率冷却动力学。尽管反铁磁次近邻耦合选择了处于平衡状态的条带相，但模拟表明，在有限时间尺度上不会自动达到该相。动态条纹形成时间 $n^*(L,J_2/J_1)$ 是根据获得全局条纹排序最终状态的概率定义的。随着系统尺寸的增加，冷却时间会变慢，而随着 $J_2/J_1$ 的增加，冷却时间会变快。尺寸依赖性与粗化控制过程兼容，在模拟范围内 L 的有效增长至少是二次方。真实空间形态和固定温度诊断表明，失败的轨迹不仅仅是无序状态：它们通常包含由残余壁或竞争方向分隔的局部条带有序域。在弱$J_2/J_1$机制中，系统可以恢复局部最近邻受挫约束，同时仍然无法选择全局条带扇区。\n\n这些结果将三个通常混为一谈的过程分开：$J_2/J_1$ 的能量简并提升、局部约束恢复以及局部动态下的全局条带方向选择。", "authors": [{"name": "Tom Poisblaud"}], "featured_authors": [{"name": "Tom Poisblaud"}], "author_count": 1}, {"id": "2607.09416", "category": "cond-mat", "title": "The Statistical physics of unsaturated soil water: kinetic theory and non commutative pore water dynamics", "abstract": "We develop a statistical-mechanical theory of water in unsaturated soil whose outcome is a continuum field equation for the pore-occupancy g(r,x,t), the fraction of pores of radius r that are water-filled at position x and time t. The theory is built across three scales: microscopic inter-pore transfers set by Hagen-Poiseuille rates and a driving potential (the difference of pore-class chemical potentials, taken in capillary-gravitational form but open to adsorptive, osmotic, or thermal refinement); a mesoscale master equation relaxing the occupancy toward the equilibrium step g_eq=H(r*-r); and, on contracting the averaging volume to a point, the continuum balance d_t g + div F = C[g] - E - T, of which everything else is a limit, a moment, or a boundary resolution. The kinetic equation is an Onsager gradient flow descending the Gibbs free energy, with an H-theorem for the isothermal unforced system and mass conservation as its zeroth moment. A single dimensionless group, the pore-resolved Damkohler number Da(r,x), organizes the behavior and unifies phenomenologies long modelled separately. A Chapman-Enskog reduction identifies Richards' equation as the quasi-static (Da->0) limit, with matric potential and hydraulic conductivity K emerging only there and K vanishing below the percolation threshold; capillary-bundle and critical-path models are its diagonal and spectral limits. Hysteresis is the holonomy of a forcing bundle, a geometric phase rather than per-pore bistability, with a falsifiable loop-area law H ~ I^2. Preferential flow is what the same equation does where Da>1, so the Richards/preferential-flow dichotomy becomes a continuous Da-controlled crossover. Out of the quasi-static limit g(r) is the irreducible state variable. All inputs are geometric properties of the pore network, measurable from micro-CT and calibrated against no macroscopic data.", "url": "https://arxiv.org/abs/2607.09416", "type": "理论+数值", "summary": "我们开发了非饱和土壤中水的统计力学理论，其结果是孔隙占有率 g(r,x,t) 的连续介质场方程，即在位置 x 和时间 t 处充满水的半径为 r 的孔隙的分数。该理论建立在三个尺度上：由哈根-泊肃叶速率和驱动势（孔隙类化学势的差异，以毛细重力形式呈现，但对吸附、渗透或热精化开放）设定的微观孔隙间传输；中尺度主方程将占用率放宽到平衡步骤 g_eq=H(r*-r)；并且，将平均体积收缩到一点时，连续体平衡 d_t g + div F = C[g] - E - T，其中其他一切都是极限、时刻或边界分辨率。动力学方程是沿吉布斯自由能下降的 Onsager 梯度流，以等温非受力系统的 H 定理和质量守恒作为其零阶矩。单个无量纲群，即孔隙解析的 Damkohler 数 Da(r,x)，组织了行为并统一了长期单独建模的现象学。\n\nChapman-Enskog 约简将 Richards 方程确定为准静态 (Da->0) 极限，其中基质势和水力传导率 K 仅在此处出现，而 K 在渗透阈值以下消失；毛细管束和关键路径模型是其对角线和光谱极限。滞后是力束的完整，是几何相位而不是每孔双稳态，具有可证伪的环面积定律 H ~ I^2。当 Da>1 时，优先流是相同方程的作用，因此理查兹/优先流二分法变成了连续 Da 控制的交叉。在准静态极限之外，g(r) 是不可约状态变量。所有输入都是孔隙网络的几何特性，可通过显微 CT 进行测量，并且无需根据宏观数据进行校准。", "authors": [{"name": "Riccardo Rigon"}], "featured_authors": [{"name": "Riccardo Rigon"}], "author_count": 1}, {"id": "2607.09427", "category": "cond-mat", "title": "Effective theories for many-body systems with nonuniform symmetries", "abstract": "The low-energy dynamics of many-body systems is governed by gapless modes whose properties are dictated by symmetry. Their existence follows from Goldstone's theorem, while their effective description at zero temperature is determined by the pattern of symmetry breaking. At finite temperature, an analogous role is played by hydrodynamics, which describes the universal behavior of many-body systems over long times and large distances. These principles are well understood for uniform symmetries, which act homogeneously in spacetime and lead to a correspondence between massless Goldstone modes and broken generators, as well as gapless hydrodynamic modes and conserved charges. However, this simple picture changes in the presence of nonuniform symmetries, whose generators do not commute with spacetime translations. The low-energy implications of these symmetries remain less understood, as they do not introduce additional gapless modes but instead constrain the dynamics of the existing degrees of freedom. In this thesis, we develop a unified framework for many-body systems with nonuniform symmetries and show that their effects can be understood in terms of additional fields that are not independent at low energies and can be eliminated, leading to kinematic constraints that reshape the infrared dynamics. In systems with spontaneous symmetry breaking, this mechanism modifies the effective theory and often softens the dispersion relations of the remaining modes. At finite temperature, it manifests in hydrodynamics as constraints on macroscopic currents. As a result, nonuniform symmetries give rise to qualitatively new physical phenomena, including modified spectra of collective excitations, exemplified by transverse Tkachenko oscillations in quantum vortex crystals, and unconventional transport phenomena, such as anomalously slow diffusion and softened sound modes in dipole-conserving systems.", "url": "https://arxiv.org/abs/2607.09427", "type": "理论", "summary": "多体系统的低能动力学受无间隙模式控制，其特性由对称性决定。它们的存在遵循戈德斯通定理，而它们在零温度下的有效描述则由对称破缺的模式决定。在有限温度下，流体动力学也发挥着类似的作用，它描述了多体系统在长时间和长距离内的普遍行为。这些原理对于均匀对称性来说是很好理解的，均匀对称性在时空中均匀作用，并导致无质量戈德斯通模式和损坏的发电机之间的对应关系，以及无间隙流体动力学模式和守恒电荷之间的对应关系。然而，这个简单的图景在非均匀对称性的存在下发生了变化，其生成器不与时空平移交换。这些对称性的低能含义仍然不太了解，因为它们没有引入额外的无间隙模式，而是限制了现有自由度的动态。\n\n在本论文中，我们为具有非均匀对称性的多体系统开发了一个统一的框架，并表明它们的影响可以通过附加场来理解，这些附加场在低能量下不独立并且可以被消除，从而导致重塑红外动力学的运动学约束。在具有自发对称性破缺的系统中，这种机制修改了有效理论，并且通常软化了剩余模式的色散关系。在有限温度下，它在流体动力学中表现为对宏观电流的约束。因此，非均匀对称性产生了新的物理现象，包括集体激发的修改光谱（以量子涡旋晶体中的横向特卡琴科振荡为例），以及非常规输运现象，例如偶极子守恒系统中的异常缓慢扩散和软化声音模式。", "authors": [{"name": "Aleksander Głódkowski"}], "featured_authors": [{"name": "Aleksander Głódkowski"}], "author_count": 1}, {"id": "2607.09436", "category": "cond-mat", "title": "Universal scaling of conformations of tangentially driven ring polymers", "abstract": "The interplay of tangential activity and excluded-volume interactions in ring polymers adsorbed to a surface, consistently results in the overall swelling of the ring configurations. This is in strong contrast to the case for three dimensional linear and ring polymers, where activity induces frequently collapsed structures. By means of Brownian Dynamic simulations, we investigate how the scaling properties of such active rings can be universally characterized by an activity-dependent Flory exponent, as a generalization of the equilibrium behavior. At high activity, an effective persistence length characterizes the conformations of active flexible rings.", "url": "https://arxiv.org/abs/2607.09436", "type": "理论+数值", "summary": "吸附到表面的环聚合物中切向活性和排除体积相互作用的相互作用始终导致环构型的整体溶胀。这与三维线性和环状聚合物的情况形成鲜明对比，在三维线性和环状聚合物中，活性经常导致结构塌陷。通过布朗动力学模拟，我们研究了如何通过活动相关的弗洛里指数来普遍表征这种活动环的标度特性，作为平衡行为的推广。在高活性下，有效持久长度表征了活性柔性环的构象。", "authors": [{"name": "Antonio Lamura"}, {"name": "Marisol Ripoll"}], "featured_authors": [{"name": "Antonio Lamura"}, {"name": "Marisol Ripoll"}], "author_count": 2}, {"id": "2607.09437", "category": "cond-mat", "title": "Anisotropic Superconductivity with Enhanced Critical Field in Strained RuO2", "abstract": "The superconductivity in RuO2 emerges under strain. RuO2 is also an altermagnet candidate. The nature of superconductivity and its relation with neighboring orders, however, are not understood. To address this problem, we grew epitaxial RuO2 films on TiO2(100) and TiO2(110) single crystal substrates and studied the electronic transport and emergent superconductivity along various crystallographic directions. We show that the superconducting transition strongly depends on the growth orientation and the crystallographic direction of the transport in the RuO2 films. We also observe a strong violation of Pauli paramagnetic limit with in-plane applied magnetic field which we attribute to strong spin-orbit scattering. These results offer opportunities for epitaxially engineered superconductors.", "url": "https://arxiv.org/abs/2607.09437", "type": "理论", "summary": "RuO2 中的超导性在应变下出现。 RuO2 也是一种交流磁体候选材料。然而，超导性的本质及其与邻近秩序的关系尚不清楚。为了解决这个问题，我们在 TiO2(100) 和 TiO2(110) 单晶衬底上生长外延 RuO2 薄膜，并研究了沿不同晶体方向的电子输运和涌现超导性。我们表明，超导转变很大程度上取决于 RuO2 薄膜中的生长方向和传输的晶体方向。我们还观察到面内施加磁场强烈违反泡利顺磁极限，我们将其归因于强自旋轨道散射。这些结果为外延工程超导体提供了机会。", "authors": [{"name": "Younes Ghorbani"}, {"name": "Samuel Poage"}, {"name": "Xuehsi Gao"}, {"name": "Luka Mitrovic"}, {"name": "Neha Wadehra"}, {"name": "Benjamin Gregory"}, {"name": "Suchismita Sarker"}, {"name": "Betul Pamuk"}, {"name": "Andrej Singer"}, {"name": "Darrell G. Schlom"}, {"name": "Chun Ning Lau"}, {"name": "Kaveh Ahadi"}], "featured_authors": [{"name": "Younes Ghorbani"}, {"name": "Samuel Poage"}, {"name": "Xuehsi Gao"}, {"name": "Darrell G. Schlom"}, {"name": "Chun Ning Lau"}, {"name": "Kaveh Ahadi"}], "author_count": 12}, {"id": "2607.09465", "category": "cond-mat", "title": "Strongly correlated quantum matter: t--J model, real-space pairing, spin-dependent masses, and atomicity in chemical bond and nanosystems", "abstract": "I critically overview my research on strongly correlated fermion systems for almost five decades. It concentrated on: (i) the first derivation of what is now called the t--J model, comprising both the limit of Anderson kinetic exchange of spin--spin interaction in the Mott--Hubbard insulator and taking into account real-space pairing, subsequently applied to high-temperature superconductivity; (ii) the concept of spin-dependent heavy mass of quasiparticles in heavy-fermion systems, and (iii) the first nontrivial model of statistical thermodynamics of the Mott--Hubbard transition. Those three features, together with the specific quantum critical phenomena provide, in my view, fundamental components of the theory of strongly correlated fermions established in the 1960s. Some related questions such as introduction of atomicity in the chemical bonding (iv), and specific properties of correlated nanosystems within the rigorous EDABI (v) approach are also briefly elaborated at the end.", "url": "https://arxiv.org/abs/2607.09465", "type": "理论", "summary": "我批判性地回顾了近五年来我对强相关费米子系统的研究。它集中于：（i）现在所谓的 t--J 模型的首次推导，包括莫特-哈伯德绝缘体中自旋-自旋相互作用的安德森动力学交换极限，并考虑到实空间配对，随后应用于高温超导； (ii) 重费米子系统中准粒子自旋相关重质量的概念，以及 (iii) 莫特-哈伯德转变统计热力学的第一个非平凡模型。在我看来，这三个特征与特定的量子临界现象一起构成了 20 世纪 60 年代建立的强相关费米子理论的基本组成部分。最后还简要阐述了一些相关问题，例如化学键中原子性的引入 (iv)，以及严格 EDABI (v) 方法中相关纳米系统的具体性质。", "authors": [{"name": "Józef Spałek"}], "featured_authors": [{"name": "Józef Spałek"}], "author_count": 1}, {"id": "2607.09470", "category": "cond-mat", "title": "Symmetry-Protected Pinch Curves in Classical Spin Liquids", "abstract": "Classical spin liquids are correlated paramagnets in which local constraints generate extensive degeneracy and emergent gauge structures, often observable as pinch-point singularities in spin structure factors. Here we introduce pinch-curve spin liquids, in which the pinch singularities form one-dimensional algebraic curves in momentum space. Inversion symmetry protects these curves by reducing the singularity condition to two real algebraic constraints in three dimensions, and the geometry of the pinch locus is algebraically programmable. We identify elementary mechanisms for generating straight and curved pinch loci, construct lattice spin models that realize them, and test the predicted structure factors using Monte Carlo simulations. We further show that pinch curves can host an infrared Gauss-law transition: the leading local constraint and the associated anisotropic scaling of the structure factor change, even though the singular locus remains one-dimensional.", "url": "https://arxiv.org/abs/2607.09470", "type": "理论+数值", "summary": "经典自旋液体是相关顺磁体，其中局部约束产生广泛的简并性和涌现的规范结构，通常可观察为自旋结构因子中的夹点奇点。在这里，我们引入了箍缩曲线自旋液体，其中箍缩奇点在动量空间中形成一维代数曲线。反演对称性通过将奇点条件减少到三个维度上的两个实代数约束来保护这些曲线，并且箍缩轨迹的几何形状是代数可编程的。我们确定了生成直线和弯曲箍缩轨迹的基本机制，构建了实现它们的晶格自旋模型，并使用蒙特卡罗模拟测试了预测的结构因子。我们进一步表明，夹点曲线可以承载红外高斯定律转变：尽管奇异轨迹仍然是一维的，但结构因子变化的主要局部约束和相关的各向异性缩放。", "authors": [{"name": "Takumi Fukushima"}, {"name": "Han Yan"}], "featured_authors": [{"name": "Takumi Fukushima"}, {"name": "Han Yan"}], "author_count": 2}, {"id": "2607.09516", "category": "cond-mat", "title": "A multi-ensemble mean-field reduction method for networks of globally coupled phase oscillators with arbitrary parameter distributions", "abstract": "Understanding the dynamical properties of coupled phase oscillator systems with heterogeneous oscillator frequencies has been a long-standing challenge of complex systems theory. While the seminal work of Ott and Antonsen dramatically improved our theoretical understanding of coupled phase oscillators for a small family of oscillator frequency distributions, we here present a mean-field reduction method for arbitrary frequency distributions. Our method leverages the drastic dimensionality reduction obtained for Lorentzian frequency distributions, and combines it with a data-driven multi-ensemble approach. As such, the method renders the Ott-Antonsen equations directly applicable to empirical distributions of phase oscillator frequencies, often achieving a drastic dimensionality reduction and allowing to study real-world physical and biological systems by means of stability, sensitivity, and bifurcation analyses.", "url": "https://arxiv.org/abs/2607.09516", "type": "理论", "summary": "了解具有异构振荡器频率的耦合相位振荡器系统的动态特性一直是复杂系统理论的长期挑战。虽然 Ott 和 Antonsen 的开创性工作极大地提高了我们对一小部分振荡器频率分布的耦合相位振荡器的理论理解，但我们在这里提出了一种针对任意频率分布的平均场降低方法。我们的方法利用洛伦兹频率分布获得的大幅降维，并将其与数据驱动的多集成方法相结合。因此，该方法使奥特-安东森方程直接适用于相位振荡器频率的经验分布，通常实现大幅降维，并允许通过稳定性、灵敏度和分岔分析来研究现实世界的物理和生物系统。", "authors": [{"name": "Richard Gast"}, {"name": "Shotaro Takasu"}, {"name": "Helmut Schmidt"}, {"name": "Ann Kennedy"}], "featured_authors": [{"name": "Richard Gast"}, {"name": "Shotaro Takasu"}, {"name": "Helmut Schmidt"}, {"name": "Ann Kennedy"}], "author_count": 4}, {"id": "2607.09570", "category": "cond-mat", "title": "Confinement drives valley splitting above 4K in buried silicon quantum wells", "abstract": "Controlling the energy scales of a quantum system is essential for defining robust qubits. In silicon spin qubits, the nearly degenerate conduction-band valleys create a leakage channel from the single-spin computational basis, posing a challenge to scaling and to shuttling-based architectures. Here, we measure the relevant energy scales of single-electron spin qubits in buried silicon quantum wells co-designed for low disorder and high valley splitting. Across a linear array of four quantum dots with an average orbital energy of 2.4(2) meV, we report an average single-electron valley splitting of 0.40(6) meV and an average two-electron singlet-triplet splitting of 0.24(7) meV. In three dots, we observe a strong correlation between valley splitting and orbital energy, with an average linear coefficient of $\\approx 0.22$ (meV/meV), demonstrating that electrostatic confinement can increase the valley splitting by several hundred microelectronvolts. In contrast, the remaining dot exhibits the highest valley splitting of 0.76(2) meV and low correlation, suggesting excellent characteristics for spin-qubit operation. Our findings demonstrate that strong confinement can be exploited in buried quantum wells to effectively enhance the valley splitting, thereby establishing a viable path toward the realization of shuttling and sparse-occupation-based architectures in low-disorder heterostructures.", "url": "https://arxiv.org/abs/2607.09570", "type": "理论", "summary": "控制量子系统的能量尺度对于定义鲁棒量子位至关重要。在硅自旋量子位中，近简并的导带谷在单自旋计算基础上创建了泄漏通道，这对扩展和基于穿梭的架构提出了挑战。在这里，我们测量了为低无序和高谷分裂而设计的埋硅量子阱中单电子自旋量子位的相关能量尺度。在平均轨道能量为 2.4(2) meV 的四个量子点的线性阵列中，我们报告了平均单电子谷分裂为 0.40(6) meV 和平均二电子单重态-三重态分裂为 0.24(7) meV。在三个点中，我们观察到谷分裂和轨道能量之间存在很强的相关性，平均线性系数为$\\大约0.22$（meV/meV），表明静电约束可以使谷分裂增加数百微电子伏。相比之下，剩余的点表现出 0.76(2) meV 的最高谷分裂和低相关性，表明自旋量子位操作具有优异的特性。\n\n我们的研究结果表明，可以在埋入量子阱中利用强约束来有效增强谷分裂，从而建立一条在低无序异质结构中实现穿梭和基于稀疏占用的架构的可行路径。", "authors": [{"name": "Davide Degli Esposti"}, {"name": "Emma Catherine Brann"}, {"name": "Asser Elsayed"}, {"name": "Davide Costa"}, {"name": "Mark Friesen"}, {"name": "Giordano Scappucci"}], "featured_authors": [{"name": "Davide Degli Esposti"}, {"name": "Emma Catherine Brann"}, {"name": "Asser Elsayed"}, {"name": "Davide Costa"}, {"name": "Mark Friesen"}, {"name": "Giordano Scappucci"}], "author_count": 6}, {"id": "2607.09572", "category": "cond-mat", "title": "A Cloud-Accessible Open-Source Framework for the Electromagnetic Modelling of Applied Superconductors", "abstract": "We present the H-cloud formalism, a cloud-accessible and open-source finite-element framework for electromagnetic modelling of applied superconductors. The proposed method expresses the nonlinear electromagnetic response of type-II superconductors in a curl-conforming discretisation based on Nédélec finite elements, where the tangential applied-field boundary condition, nonlinear E-J power law, and fully implicit time-discrete residual are stated explicitly at the variational level, all within a scripted Python finite-element workflow. The weak form is used as the basis for forward simulation and for extension to adjoint differentiation and PDE-constrained optimisation, while keeping the governing assumptions, boundary conditions, and solver structure fully visible to the user. The implementation is realised in Firedrake with UFL and PETSc-backed nonlinear solvers, allowing the identical script to run on local machines and in browser-accessible environments such as Google Colab without reformulating the problem. The method is verified on the canonical magnetisation benchmark of a cylindrical superconductor under Bean-like penetration conditions and then benchmarked against an independently constructed COMSOL model for a practical high temperature superconducting Bi2212 wire. Across matched mesh studies, the open-source workflow reproduces the commercial-reference magnetisation loops to within approximately \\(1\\%\\) , with relative peak errors below 1.5%, while cloud execution preserves the same numerical solution at rather modest additional runtime considering the use of (freely available) reduced hardware resources. The proposed framework provides a rigorous, reproducible, and portable route for superconducting simulation, benchmarking, and future optimisation-led modelling of applied and functional superconductors, shareable and executable into open cloud environments.", "url": "https://arxiv.org/abs/2607.09572", "type": "理论+数值", "summary": "我们提出了 H-cloud 形式主义，这是一种可通过云访问的开源有限元框架，用于应用超导体的电磁建模。所提出的方法以基于 Nédélec 有限元的旋度一致离散化形式表达 II 型超导体的非线性电磁响应，其中切向应用场边界条件、非线性 E-J 幂律和完全隐式时间离散残差在变分级别上明确表示，所有这些都在脚本化的 Python 有限元工作流程中进行。弱形式用作正向模拟以及扩展伴随微分和偏微分方程约束优化的基础，同时保持控制假设、边界条件和求解器结构对用户完全可见。该实现是在 Firedrake 中通过 UFL 和 PETSc 支持的非线性求解器实现的，允许相同的脚本在本地计算机和可通过浏览器访问的环境（例如 Google Colab）中运行，而无需重新表述问题。\n\n该方法在类豆穿透条件下的圆柱形超导体的规范磁化基准上进行了验证，然后针对实际高温超导 Bi2212 线材独立构建的 COMSOL 模型进行了基准测试。在匹配的网格研究中，开源工作流程将商业参考磁化环复制到大约 \\(1\\%\\) 内，相对峰值误差低于 1.5%，而考虑到使用（免费提供的）减少的硬件资源，云执行以相当适度的额外运行时间保留相同的数值解。所提出的框架为超导仿真、基准测试以及应用和功能超导体的未来优化主导建模提供了严格的、可重复的和可移植的路线，可在开放云环境中共享和执行。", "authors": [{"name": "Yusen Guo"}, {"name": "Alberto Paganini"}, {"name": "Harold S. Ruiz"}], "featured_authors": [{"name": "Yusen Guo"}, {"name": "Alberto Paganini"}, {"name": "Harold S. Ruiz"}], "author_count": 3}, {"id": "2607.09580", "category": "cond-mat", "title": "Thermalization in a Height-Conserving Quantum Dimer Model", "abstract": "Strongly constrained quantum systems, in which local rules forbid most configurations, play a central role in condensed matter and lattice gauge theory. Their thermalization is often thought to be delicate: extensive conservation laws and dynamically frozen states can shatter the Hilbert space into many disconnected sectors. A natural question is whether, once the frozen states are removed, the dynamics within a single sector still thermalizes. We address this in the height-conserving quantum dimer model on the square lattice, whose local plaquette flips conserve an emergent height field. Resolving the winding numbers, the four sublattice heights, and lattice momentum , we isolate the dominant connected Krylov component of each fragmented sector and analyze its spectral spectral statistics, entanglement, and connectivity. The two standard chaos diagnostics then show different behavior:across momentum sectors the level-spacing statistics range from near-Poisoon to Wigner-Dyson, yet in every sector the eigenstate entanglement entropy collapses onto a narrow, dome-shaped curve characteristic of eigenstate thermalization. Only a handful of low-entanglement outliers interrupt this thermal pattern, in selected sectors. Thus, strong kinematic constraints can lead to a situation where spectral correlations and eigenstate thermalization need not follow the same universal signatures -- a manifestation of constrained quantum chaos.", "url": "https://arxiv.org/abs/2607.09580", "type": "理论", "summary": "强约束量子系统（其中局域规则禁止大多数配置）在凝聚态物质和晶格规范理论中发挥着核心作用。它们的热化通常被认为是微妙的：广泛的守恒定律和动态冻结状态可以将希尔伯特空间粉碎成许多互不相连的扇区。一个自然的问题是，一旦冻结状态被消除，单个扇区内的动态是否仍然热化。我们在方形晶格上的高度守恒量子二聚体模型中解决了这个问题，其局部小板翻转守恒了出现的高度场。通过解析缠绕数、四个亚晶格高度和晶格动量，我们分离出每个碎片扇区的主要连通 Krylov 分量，并分析其光谱统计、纠缠和连通性。然后，两种标准混沌诊断显示出不同的行为：在动量扇区中，能级间距统计范围从近毒到维格纳-戴森，但在每个扇区中，本征态纠缠熵崩溃到本征态热化的狭窄圆顶形曲线特征上。\n\n在选定的区域中，只有少数低纠缠异常值会中断这种热模式。因此，强运动学约束可能会导致光谱相关性和本征态热化不需要遵循相同的通用特征——这是受限量子混沌的表现。", "authors": [{"name": "Junsheng Feng"}, {"name": "Jie Ren"}, {"name": "Zheng Yan"}], "featured_authors": [{"name": "Junsheng Feng"}, {"name": "Jie Ren"}, {"name": "Zheng Yan"}], "author_count": 3}, {"id": "2607.09615", "category": "cond-mat", "title": "Fluctuation theorems for thermally isolated driven quantum systems: nonadiabaticity, excess work and strong inequalities", "abstract": "We expand on the ideas developed by C. Jarzynski in Physica A 552, 122077 (2020), where an integral fluctuation theorem was derived with the aim of obtaining thermodynamic inequalities stronger than those implied by the Jarzynski equality. Restricting ourselves to the quantum setting, we derive the corresponding detailed fluctuation theorem and additional detailed and integral fluctuation theorems; we also provide a clear physical interpretation of the stochastic quantities defined in the previous reference. Furthermore, we show that their averages are given by the nonadiabaticity parameter (i.e., the relative entropy between the final state after a finite-time driving protocol and the corresponding adiabatically evolved state) and the excess work (also known as inner friction). We elaborate on the inequalities derived from the fluctuation theorems and discuss their connection to irreversibility and formulations of the Second Law.", "url": "https://arxiv.org/abs/2607.09615", "type": "理论", "summary": "我们扩展了 C. Jarzynski 在 Physica A 552, 122077 (2020) 中提出的想法，其中推导了积分涨落定理，目的是获得比 Jarzynski 等式所暗示的热力学不等式更强的热力学不等式。将我们限制在量子背景下，我们推导出相应的详细涨落定理以及附加的详细涨落定理和积分涨落定理；我们还对先前参考文献中定义的随机量提供了清晰的物理解释。此外，我们表明它们的平均值由非绝热参数（即有限时间驱动协议后的最终状态与相应的绝热演化状态之间的相对熵）和过剩功（也称为内摩擦）给出。我们详细阐述了由波动定理导出的不等式，并讨论了它们与不可逆性和第二定律的表述的联系。", "authors": [{"name": "J. V. M. Steimetz"}, {"name": "M. Campisi"}, {"name": "M. V. S. Bonança"}], "featured_authors": [{"name": "J. V. M. Steimetz"}, {"name": "M. Campisi"}, {"name": "M. V. S. Bonança"}], "author_count": 3}, {"id": "2607.08813", "category": "hep-th", "title": "Higgsless Lagrangian SCFTs and Strongly Finite VOAs", "abstract": "Vertex operator algebras (VOAs) are well studied in both mathematics and physics. The best understood class is that of strongly rational VOAs, whose representation category is maximally well behaved: indeed, it is a modular tensor category. At the next level of complexity are strongly finite but non-rational VOAs. Their representation category is not semisimple (it is ``logarithmic''), but maintains nice structural properties. Only a few families of examples in this class are known, a fact that may have hindered the development of a comprehensive mathematical theory. The SCFT/VOA correspondence provides a natural way to generate more examples: strongly finite but non-rational VOAs are expected to arise from four-dimensional ${\\cal N}=2$ Lagrangian superconformal field theories (SCFTs) that do not admit a Higgs branch moduli space of vacua. We tackle the combinatorial task of classifying all such ``Higgsless'' Lagrangian SCFTs. To our surprise, this set turns out to be rather sparse. Free vector multiplets and their discrete gaugings are immediate examples. The interacting Higgsless theories comprise one infinite sequence of SO/USp quivers and three sporadic examples. We construct and study the novel VOAs associated to two of the sporadic examples, and confirm that they are indeed strongly finite and logarithmic.", "url": "https://arxiv.org/abs/2607.08813", "type": "理论", "summary": "顶点算子代数 (VOA) 在数学和物理学领域都有深入研究。最容易理解的类别是强理性 VOA 类别，其表示类别表现最佳：实际上，它是一个模张量类别。下一个复杂程度是非常有限但非理性的 VOA。它们的表示类别不是半简单的（它是“对数”），但保持了良好的结构特性。这类例子中只有少数几个是已知的，这一事实可能阻碍了综合数学理论的发展。 SCFT/VOA 对应关系提供了一种生成更多示例的自然方法：强有限但非有理的 VOA 预计会从四维 ${\\cal N}=2$ 拉格朗日超共形场论 (SCFT) 中产生，该理论不允许真空的希格斯分支模空间。我们解决了对所有此类“无希格斯”拉格朗日 SCFT 进行分类的组合任务。令我们惊讶的是，这个集合相当稀疏。自由矢量多重态及其离散测量就是直接的例子。相互作用的希格斯无理论包括一个无限序列的 SO/USp 颤动和三个零星的例子。\n\n我们构建并研究了与两个零星示例相关的新颖 VOA，并确认它们确实是强有限和对数的。", "authors": [{"name": "Siqi Chen"}, {"name": "Anirudh Deb"}, {"name": "Leonardo Rastelli"}], "featured_authors": [{"name": "Siqi Chen"}, {"name": "Anirudh Deb"}, {"name": "Leonardo Rastelli"}], "author_count": 3}, {"id": "2607.08903", "category": "hep-th", "title": "Anomaly mediation in Seiberg-Witten theories", "abstract": "We study the coupling of anomaly mediated supersymmetry breaking (AMSB) to $\\mathcal{N}=2$ supersymmetric theories with $SU(2)$ gauge group. Perturbatively, $\\mathcal{N}=1$ supersymmetry (SUSY) is preserved in the UV description with the AMSB terms being equivalent to a supersymmetric mass term for the adjoint chiral multiplet, as considered in the original Seiberg-Witten papers. We show, however, that nonperturbative instanton contributions break supersymmetry completely. In the IR description, the theory with AMSB is qualitatively similar to its $\\mathcal{N}=1$ analog, exhibiting monopole condensation and confinement. However, the effective Lagrangian breaks supersymmetry completely, and the values of the condensates are different from their $\\mathcal{N}=1$ analogs. Under physically reasonable assumptions, it can be shown that the vacua must change to those of the perturbatively identical $\\mathcal{N}=1$-preserving deformation as the SUSY-breaking scale crosses the strong coupling scale. This change must be caused by effects that cannot in principle be described within the effective weakly coupled IR theory. It is not a phase transition, and the vacua appear to lie in the same universality class at any finite SUSY-breaking scale. Nonetheless, this work highlights the subtle manner in which AMSB coupling to nonperturbative effects can change the vacuum field configuration and the global symmetries of a theory.", "url": "https://arxiv.org/abs/2607.08903", "type": "理论", "summary": "我们研究异常介导的超对称破缺（AMSB）与 $\\mathcal{N}=2$ 超对称理论与 $SU(2)$ 规范群的耦合。令人不安的是，$\\mathcal{N}=1$ 超对称性 (SUSY) 保留在 UV 描述中，其中 AMSB 项相当于伴随手性多重态的超对称质量项，如原始 Seiberg-Witten 论文中所考虑的那样。然而，我们证明非微扰瞬子贡献完全打破了超对称性。在红外描述中，AMSB 理论在质量上与其 $\\mathcal{N}=1$ 类似，表现出单极子凝聚和限制。然而，有效拉格朗日完全打破了超对称性，并且凝聚态的值与其 $\\mathcal{N}=1$ 类似物不同。在物理上合理的假设下，可以证明，当 SUSY 破坏尺度与强耦合尺度相交时，真空必须改变为扰动相同的 $\\mathcal{N}=1$ 保持变形的真空。这种变化必定是由原则上无法在有效弱耦合红外理论中描述的效应引起的。\n\n它不是相变，并且真空似乎在任何有限的 SUSY 破坏尺度上都处于相同的普遍性类别中。尽管如此，这项工作强调了 AMSB 与非微扰效应的耦合可以改变真空场配置和理论的全局对称性的微妙方式。", "authors": [{"name": "Cyrus Tearlach Robertson Orkish"}, {"name": "Daniel Stolarski"}], "featured_authors": [{"name": "Cyrus Tearlach Robertson Orkish"}, {"name": "Daniel Stolarski"}], "author_count": 2}, {"id": "2607.09177", "category": "hep-th", "title": "A note on Zamolodchikov's recursion relation for the torus conformal block and its light limit", "abstract": "In this paper, we review the Zamolodchikov-like recursion relations for torus one-point conformal blocks in both Liouville and $A_2$ Toda theories. Starting from these relations, we derive the corresponding recursion relations in the light asymptotic limit. In Liouville theory, the light-limit recursion reproduces the known expression for the one-point light conformal block in terms of the Gauss hypergeometric function. For $A_2$ Toda theory, our recursion relation provides a new, efficient method for explicit calculations, and we have verified that it is in full agreement with previously known results in the literature.", "url": "https://arxiv.org/abs/2607.09177", "type": "理论", "summary": "在本文中，我们回顾了 Liouville 和 $A_2$ Toda 理论中环面单点共角块的类 Zamolodchikov 递归关系。从这些关系出发，我们推导出光渐进极限下相应的递推关系。在刘维尔理论中，光极限递归根据高斯超几何函数再现了单点光共形块的已知表达式。对于$A_2$ Toda理论，我们的递归关系为显式计算提供了一种新的、有效的方法，并且我们已经验证它与文献中先前已知的结果完全一致。", "authors": [{"name": "Armen Poghosyan"}, {"name": "Hasmik Poghosyan"}], "featured_authors": [{"name": "Armen Poghosyan"}, {"name": "Hasmik Poghosyan"}], "author_count": 2}, {"id": "2607.09203", "category": "hep-th", "title": "Cherednik integrable system: eigenfunctions at generic eigenvalues", "abstract": "Symmetric Macdonald polynomials of $n$ variables provide eigenfunctions of the $N$-body trigonometric Ruijsenaars-Schneider integrable system at particular eigenvalues. In order to construct eigenfunctions with arbitrary eigenvalues, M. Noumi and J. Shiraishi used a recursion in $N$ (branching rule) for the symmetric Macdonald polynomials and analytically continued them. This generated a power series, which is a part of triad (universal solution). In the present paper, we demonstrate that a similar procedure is available for another integrable system, $N$-body Cherednik system inspired by the DAHA of type $A$, which has non-symmetric Macdonald polynomials as its polynomial eigenfunctions. However, in this system, the generic eigenfunction is more complicated: it is not just a simple power series as in the Noumi-Shiraishi case, but has an involved structure with $N!$ branches, each of them being a power series of the Noumi-Shiraishi type. As an illustration, we also provide explicit formulas for particular cases.", "url": "https://arxiv.org/abs/2607.09203", "type": "理论", "summary": "$n$ 变量的对称 Macdonald 多项式提供了 $N$ 体三角 Ruijsenaars-Schneider 可积系统在特定特征值处的特征函数。为了构造具有任意特征值的特征函数，M. Noumi 和 J. Shiraishi 对对称 Macdonald 多项式使用 $N$（分支规则）中的递归，并对它们进行解析连续。这产生了一个幂级数，它是三元组（通用解）的一部分。在本文中，我们证明了类似的过程可用于另一个可积系统，即受 $A$ 型 DAHA 启发的 $N$ 体 Cherednik 系统，该系统具有非对称麦克唐纳多项式作为其多项式特征函数。然而，在这个系统中，通用特征函数更加复杂：它不仅仅是Noumi-Shiraishi案例中的简单幂级数，而是具有$N!$分支的复杂结构，每个分支都是Noumi-Shiraishi类型的幂级数。作为说明，我们还为特定情况提供了明确的公式。", "authors": [{"name": "A. Mironov"}, {"name": "A. Morozov"}, {"name": "A. Popolitov"}], "featured_authors": [{"name": "A. Mironov"}, {"name": "A. Morozov"}, {"name": "A. Popolitov"}], "author_count": 3}, {"id": "2607.09233", "category": "hep-th", "title": "Quantum field nucleating and Wigner functions", "abstract": "We present a novel real-time framework for the decay of metastable states in quantum field theories using Wigner functions. The framework introduces a nonperturbative nucleation rate formula that captures both quantum tunneling and over-the-barrier nucleation, alongside steps to evaluate it perturbatively. We apply it to a simple thermal example with direct relevance to current analog experiments. Our derived one-loop nucleation rate fundamentally differs from the widely cited high-temperature result by Linde: The prefactor contains quantum effects and also asymptotes to a differing form at high temperatures, where the quantum effects become negligible. Rather, the result is a generalization of Affleck's rate formula to quantum field theories, asymptoting to the effective field theory approach, and Langer's rate, at high temperatures. The example also reveals that the high-temperature side of the ``quantum-to-classical'' transition of thermal vacuum decay is still inherently quantum mechanical, even though the bounce background possesses the classical, $\\mathrm{O}(d)\\times S^1$, symmetry.", "url": "https://arxiv.org/abs/2607.09233", "type": "理论", "summary": "我们使用维格纳函数提出了一种新颖的实时框架，用于量子场论中亚稳态的衰变。该框架引入了一个非微扰成核速率公式，该公式捕获了量子隧道效应和越障成核，以及对其进行微扰评估的步骤。我们将其应用于与当前模拟实验直接相关的简单热示例。我们得出的单环成核率与林德广泛引用的高温结果根本不同：前因子包含量子效应，并且在高温下也渐近到不同的形式，其中量子效应可以忽略不计。相反，结果是将阿弗莱克速率公式推广到量子场论，渐近到有效场论方法，以及高温下的兰格速率。这个例子还揭示了热真空衰变的“量子到经典”转变的高温侧本质上仍然是量子力学的，尽管反弹背景具有经典的$\\mathrm{O}(d)\\times S^1$对称性。", "authors": [{"name": "Joonas Hirvonen"}], "featured_authors": [{"name": "Joonas Hirvonen"}], "author_count": 1}, {"id": "2607.09343", "category": "hep-th", "title": "$T\\bar{T}$ deformation and multiple-flavor Lorentzian threads", "abstract": "This work is motivated by the proposed relationship among finite cut-off holography and generalized $T\\bar T$ deformations, and examines holographic complexity within the framework of the \"complexity = anything\" proposal. Employing a Fefferman-Graham expansion near the finite cut-off surface, the deformation-induced correction to generalized complexity is derived and shown to allow a systematic expansion in terms of generalized Willmore-type functionals. The resulting formulation broadens earlier findings for the complexity-volume proposal to encompass arbitrary geometric complexity measures. Furthermore, the structure of the correction allows a natural interpretation as multiple-flavor Lorentzian threads, where distinct thread sectors correspon
