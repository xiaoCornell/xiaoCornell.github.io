Hamiltonian evolves from an initial general state to a problem-specific state. This study introduces multi-tasking quantum annealing (MTQA), a method that enables the parallel processing of multiple optimization problems by embedding them into spatially distinct regions on quantum hardware. MTQA is evaluated using two NP-hard problems: the minimum vertex cover problem (MVCP) and the graph partitioning problem (GPP). This parallel approach optimizes quantum resource utilization by concurrently utilizing idle qubits. The findings demonstrate that MTQA achieves a solution quality comparable to single-problem quantum annealing and classical simulated annealing (SA), while notably reducing the time-to-solution (TTS) metrics. Eigenspectrum analysis further theoretically supports the hypothesis that parallel embedding preserves quantum coherence and does not increase computational complexity by efficiently utilizing available quantum hardware (e.g., qubits and couplers). MTQA enables efficient multitasking in quantum annealing, optimizing hardware utilization and improving throughput for concurrent tasks and demonstrating performance for problems up to 100 nodes in real-world applications.", "url": "https://arxiv.org/abs/2603.09468", "type": "理论+数值", "summary": "量子退火利用绝热量子系统的原理近似解决组合优化问题。在这种方法中，系统的哈密顿量从初始的一般状态演变为特定于问题的状态。这项研究引入了多任务量子退火（MTQA），这种方法通过将多个优化问题嵌入到量子硬件上空间上不同的区域来实现多个优化问题的并行处理。 MTQA 使用两个 NP 难问题进行评估：最小顶点覆盖问题 (MVCP) 和图划分问题 (GPP)。这种并行方法通过同时利用空闲量子位来优化量子资源利用率。研究结果表明，MTQA 实现了与单问题量子退火和经典模拟退火 (SA) 相当的解决方案质量，同时显着缩短了解决时间 (TTS) 指标。特征谱分析进一步从理论上支持了这样的假设：并行嵌入通过有效利用可用的量子硬件（例如量子位和耦合器）来保持量子相干性并且不会增加计算复杂性。\n\nMTQA 可在量子退火中实现高效的多任务处理，优化硬件利用率并提高并发任务的吞吐量，并展示实际应用中多达 100 个节点的问题的性能。", "authors": [{"name": "Jargalsaikhan Artag"}, {"name": "Koki Awaya"}, {"name": "Takumi Kanezashi"}, {"name": "Daisuke Tsukayama"}, {"name": "Moe Shimada"}, {"name": "Jun-ichi Shirakashi"}], "featured_authors": [{"name": "Jargalsaikhan Artag"}, {"name": "Koki Awaya"}, {"name": "Takumi Kanezashi"}, {"name": "Daisuke Tsukayama"}, {"name": "Moe Shimada"}, {"name": "Jun-ichi Shirakashi"}], "author_count": 6}, {"id": "2603.09523", "category": "quant-ph", "title": "Quantum optical impurity models in interacting waveguide QED", "abstract": "We consider a generic model for interacting waveguide QED systems, where photons in a coupled-cavity array localize around atomic impurities while simultaneously interacting through local Kerr nonlinearities. This scenario appears naturally in nanophotonic crystals, circuit QED lattices, and ultracold atomic systems and is governed by the competition between attractive Jaynes-Cummings-mediated binding and intrinsic photon-photon repulsion. We analyze how this interplay affects the formation of localized few-photon bound states and determine the resulting many-body ground states for large periodic arrays of impurities and different filling factors. With the help of large-scale numerical simulations and approximate analytical models, we identify a rich phase diagram featuring Mott-like insulating states as well as superfluid phases with long-range correlations, which are mediated by an unbound, but strongly interacting photonic fluid.", "url": "https://arxiv.org/abs/2603.09523", "type": "理论+数值", "summary": "我们考虑一个相互作用波导 QED 系统的通用模型，其中耦合腔阵列中的光子定位在原子杂质周围，同时通过局部克尔非线性相互作用。这种情况自然出现在纳米光子晶体、电路 QED 晶格和超冷原子系统中，并受到吸引性 Jaynes-Cummings 介导的结合和本征光子-光子排斥之间的竞争的控制。我们分析了这种相互作用如何影响局部少光子束缚态的形成，并确定大周期性杂质阵列和不同填充因子所产生的多体基态。借助大规模数值模拟和近似分析模型，我们确定了丰富的相图，其特征是类莫特绝缘态以及具有长程相关性的超流体相，这些相由未束缚但强相互作用的光子流体介导。", "authors": [{"name": "Adrian Paul Misselwitz"}, {"name": "Jacquelin Luneau"}, {"name": "Peter Rabl"}], "featured_authors": [{"name": "Adrian Paul Misselwitz"}, {"name": "Jacquelin Luneau"}, {"name": "Peter Rabl"}], "author_count": 3}, {"id": "2603.09560", "category": "quant-ph", "title": "An elementary proof of symmetrization postulate in quantum mechanics for a system of particles", "abstract": "According to symmetrization postulate for a system of identical particles, wave function has to be completely symmetric or completely anti-symmetric. In this paper we want to mathematically justify this postulate ignoring the spin part of wave function in three dimension. For a system of N identical particles, if the solution to the governing Schrodinger equation meets these criteria: a) the probability density remains invariant when any two particle positions are exchanged over time, b) the wave function is continuous and has a continuous gradient, and the system exhibits the following characteristics: c) the configuration space, which is 3N dimensional, is connected, and d) the potential term in the Hamiltonian is invariant under the exchange of any two particle positions, then the wave function must be either totally symmetric or totally antisymmetric over time.", "url": "https://arxiv.org/abs/2603.09560", "type": "理论", "summary": "根据相同粒子系统的对称性假设，波函数必须是完全对称或完全反对称。在本文中，我们希望在数学上证明这个假设的合理性，忽略三维波函数的自旋部分。对于 N 个相同粒子的系统，如果控制薛定谔方程的解满足以下条件：a) 当任意两个粒子位置随时间交换时，概率密度保持不变；b) 波函数是连续的且具有连续梯度，并且系统表现出以下特征：c) 3N 维的构型空间是连通的；d) 哈密顿量中的势项在任意两个粒子位置交换下保持不变，则波函数必须是完全对称的或随着时间的推移完全反对称。", "authors": [{"name": "Diganta Parai"}, {"name": "Nikhilesh Maity"}], "featured_authors": [{"name": "Diganta Parai"}, {"name": "Nikhilesh Maity"}], "author_count": 2}, {"id": "2603.09631", "category": "quant-ph", "title": "System-bath model for quantum chemistry", "abstract": "We propose an approximate mapping of a molecular Hamiltonian to a Hamiltonian of qubits, which allows for high accuracy quantum chemistry calculations of vertical excitation energies of some molecules. The mapping is based on separating of a very small active space of only two orbitals and on modeling the electronic excitations in the remaining orbitals by a set of qubits or, equivalently, by a set of oscillators. This approach is inspired by the Random Phase Approximation (RPA), in which the excitations of electron gas are described by bosonic degrees of freedom. As a result, the Hamiltonian of the molecule is reduced to that of a system-bath model. The \"system\" part of the Hamiltonian describes the two molecular orbitals -- the highest occupied molecular orbital (HOMO) and the lowest unoccupied molecular orbital (LUMO) -- which are populated by two electrons. Two qubits are sufficient to encode the Hamiltonian of such a system. The \"bath\" consists of oscillators or, equivalently, of two level systems with each of them corresponding to an electron excitation from a doubly occupied orbital below the Fermi level to an empty orbital above the Fermi level. We hope that this mapping can inspire new approaches and algorithms aimed at calculating excitation energies of molecules on near term quantum computers.", "url": "https://arxiv.org/abs/2603.09631", "type": "理论+数值", "summary": "我们提出了分子哈密顿量到量子位哈密顿量的近似映射，这允许对某些分子的垂直激发能进行高精度量子化学计算。该映射基于仅两个轨道的非常小的活动空间的分离，以及通过一组量子位或等效地通过一组振荡器对剩余轨道中的电子激发进行建模。这种方法受到随机相位近似（RPA）的启发，其中电子气的激发由玻色子自由度来描述。结果，分子的哈密顿量被简化为系统浴模型的哈密顿量。哈密​​顿量的“系统”部分描述了两个分子轨道——最高占据分子轨道（HOMO）和最低未占据分子轨道（LUMO）——它们由两个电子占据。两个量子位足以对这样一个系统的哈密顿量进行编码。 “浴”由振荡器组成，或者等效地由两个能级系统组成，每个能级系统对应于从费米能级以下的双占据轨道到费米能级以上的空轨道的电子激发。\n\n我们希望这种映射能够激发新的方法和算法，旨在计算近期量子计算机上分子的激发能。", "authors": [{"name": "Dmitry S. Golubev"}, {"name": "Reza G. Shirazi"}, {"name": "Vladimir V. Rybkin"}, {"name": "Benedikt M. Schoenauer"}, {"name": "Peter Schmitteckert"}, {"name": "Michael Marthaler"}], "featured_authors": [{"name": "Dmitry S. Golubev"}, {"name": "Reza G. Shirazi"}, {"name": "Vladimir V. Rybkin"}, {"name": "Benedikt M. Schoenauer"}, {"name": "Peter Schmitteckert"}, {"name": "Michael Marthaler"}], "author_count": 6}, {"id": "2603.09748", "category": "quant-ph", "title": "Operational bounds and diagnostics for coherence in energy transfer", "abstract": "Excitation energy transfer in light-harvesting aggregates is highly efficient, yet whether quantum coherence plays an operational role in transport remains debated. A central challenge is that coherence is usually inferred from spectroscopic signatures, whereas transport performance is assessed through specific observables and depends on both the open system dynamics and the initial state preparation. Here we develop a resource theoretic approach that quantifies the maximum change that initial site-basis coherence can induce in a chosen readout under fixed reduced dynamics. The central quantity is the resource impact functional, which yields state independent, readout specific bounds on coherence-induced changes in signals and transport figures of merit. We apply the framework to two models. For a donor-acceptor dimer, we analyse coherence sensitivity across coupling and bath-timescale regimes and bound trapping efficiency and average transfer time in terms of the impact functional. For a multi-site chain with terminal trapping, we derive rigorous criteria that distinguish population placement from sensitivity to initial state site-basis coherence. These include upper bounds on the largest advantage over incoherent preparations, necessary delocalization requirements for achieving a prescribed improvement, and a simple pairwise sufficient condition that can be checked from local information. For quasi-local reduced dynamics, we further obtain a Lieb-Robinson-type bound that constrains when coherence prepared in a distant region can influence a localized readout at finite times. Together, these results provide operational diagnostics and rigorous bounds for benchmarking coherence effects and for identifying regimes in which they are necessarily negligible or potentially relevant in excitonic transport models.", "url": "https://arxiv.org/abs/2603.09748", "type": "理论", "summary": "光捕获聚集体中的激发能量转移非常高效，但量子相干性是否在传输中发挥作用仍存在争议。一个核心挑战是，相干性通常是从光谱特征中推断出来的，而传输性能是通过特定的可观测值来评估的，并且取决于开放系统动力学和初始状态准备。在这里，我们开发了一种资源理论方法，该方法可以量化初始位点基础相干性在固定降低的动态下在选定的读数中可以引起的最大变化。核心量是资源影响函数，它产生与状态无关的、读出信号和传输品质因数的相干性变化的特定界限。我们将该框架应用于两个模型。对于供体-受体二聚体，我们分析了耦合和浴时间尺度范围内的相干敏感性，并根据影响泛函分析了束缚捕获效率和平均转移时间。对于具有终端捕获的多位点链，我们得出了严格的标准，将群体布局与初始状态位点基础一致性的敏感性区分开来。\n\n这些包括相对于不相干准备的最大优势的上限、实现规定改进所需的离域要求，以及可以从局部信息检查的简单成对充分条件。对于准局部简化动力学，我们进一步获得了 Lieb-Robinson 型界限，该界限限制了在远处区域准备的相干性何时可以影响有限时间的局部读数。总之，这些结果为基准相干效应提供了操作诊断和严格的界限，并确定了相干效应在激子输运模型中必然可以忽略不计或可能相关的机制。", "authors": [{"name": "Julia Liebert"}, {"name": "Gregory D. Scholes"}], "featured_authors": [{"name": "Julia Liebert"}, {"name": "Gregory D. Scholes"}], "author_count": 2}, {"id": "2603.09862", "category": "quant-ph", "title": "Velocity Verlet-based optimization for variational quantum eigensolvers", "abstract": "The Variational Quantum Eigensolver (VQE) is a key algorithm for near-term quantum computers, yet its performance is often limited by the classical optimization of circuit parameters. We propose using the velocity Verlet algorithm, inspired by classical molecular dynamics, to address this challenge. By introducing an inertial \"velocity\" term, our method efficiently explores complex energy landscapes. We compare its performance against standard optimizers on H$_2$ and LiH molecules. For H$_2$, our method achieves chemical accuracy with fewer quantum circuit evaluations than L-BFGS-B. For LiH, it attains the lowest final energy, demonstrating its potential for high-accuracy VQE simulations.", "url": "https://arxiv.org/abs/2603.09862", "type": "数值", "summary": "变分量子本征求解器（VQE）是近期量子计算机的关键算法，但其性能往往受到电路参数经典优化的限制。我们建议使用受经典分子动力学启发的速度 Verlet 算法来应对这一挑战。通过引入惯性“速度”项，我们的方法有效地探索了复杂的能源景观。我们将其性能与 H$_2$ 和 LiH 分子上的标准优化器进行比较。对于 H$_2$，我们的方法用比 L-BFGS-B 更少的量子电路评估实现了化学精度。对于 LiH，它获得了最低的最终能量，展示了其高精度 VQE 模拟的潜力。", "authors": [{"name": "Rinka Miura"}], "featured_authors": [{"name": "Rinka Miura"}], "author_count": 1}, {"id": "2603.09885", "category": "quant-ph", "title": "Optimal Universal Bounds for Quantum Divergences", "abstract": "We identify a universal structural principle underlying the smoothing of classical divergences: the optimizer of the smoothing problem is a clipped probability vector, independently of the specific divergence. This yields a divergence-independent characterization of all smoothed classical divergences and reveals a common geometric structure behind seemingly different quantities. Building on this structural insight, we derive optimal universal bounds for smoothed quantum divergences, including quantum R'enyi divergences of arbitrary order and the hypothesis testing divergence. Our inequalities relate divergences of different orders through bounds of the form $D_\\beta^{\\varepsilon} \\le D_\\alpha + \\mathrm{correction}$ and $D_\\beta^{\\varepsilon} \\ge D_\\alpha + \\mathrm{correction}$, and we prove that the correction terms are optimal among all universal, state-independent inequalities of this type. Consequently, our results strictly improve previously known bounds whenever those were suboptimal, and in cases where earlier bounds coincide with ours, our analysis establishes their optimality. In particular, we obtain optimal universal bounds for the hypothesis testing divergence.", "url": "https://arxiv.org/abs/2603.09885", "type": "理论+数值", "summary": "我们确定了经典散度平滑的通用结构原理：平滑问题的优化器是一个剪裁的概率向量，与特定散度无关。这产生了所有平滑经典散度的散度无关特征，并揭示了看似不同的量背后的共同几何结构。基于这种结构见解，我们推导出平滑量子散度的最佳通用界限，包括任意阶的量子 R'enyi 散度和假设检验散度。我们的不等式通过 $D_\\beta^{\\varepsilon} \\le D_\\alpha + \\mathrm{ Correction}$ 和 $D_\\beta^{\\varepsilon} \\ge D_\\alpha + \\mathrm{ Correction}$ 形式的边界关联不同阶的散度，并且我们证明校正项在此类类型的所有普遍的、与状态无关的不等式中是最优的。因此，只要先前已知的边界不是最优的，我们的结果就会严格改进，并且在早期边界与我们的边界一致的情况下，我们的分析确定了它们的最优性。特别是，我们获得了假设检验散度的最佳通用界限。", "authors": [{"name": "Gilad Gour"}], "featured_authors": [{"name": "Gilad Gour"}], "author_count": 1}, {"id": "2603.09907", "category": "quant-ph", "title": "Hysteretic squashed entanglement in many-body quantum systems", "abstract": "Entanglement in many-body quantum systems is distributed across spatial regions, where its structure often dictates the information-processing capabilities of the state. Yet, characterizing the entanglement structure, especially for mixed states, remains a challenge. In this work, we propose hysteretic squashed entanglement $T_{sq}$, a conditional entanglement monotone that measures the genuine quantum correlations between two subregions, conditioned on a third region, in a many-body quantum state. $T_{sq}$ is upper bounded by the convex-roof extension of quantum conditional mutual information and exhibits several desirable properties like monogamy, convexity, asymptotic continuity, faithfulness, and additivity for tensor-product states. We study the conditional entanglement generation in a one-dimensional transverse-field Ising model under quench, where we show that $T_{sq}$ effectively squashes classical contributions and can detect genuine quantum correlations across both adjacent and long-range subsystems. We elucidate the utility of this measure as a robust quantifier of topological entanglement entropy for mixed states. This opens new operational resource-theoretic avenues for probing topological order and criticality.", "url": "https://arxiv.org/abs/2603.09907", "type": "理论", "summary": "多体量子系统中的纠缠分布在空间区域，其结构通常决定了状态的信息处理能力。然而，表征纠缠结构，尤其是混合态的纠缠结构，仍然是一个挑战。在这项工作中，我们提出了滞后压缩纠缠 $T_{sq}$，这是一种条件纠缠单调，用于测量多体量子态中以第三个区域为条件的两个子区域之间的真正量子相关性。 $T_{sq}$ 的上限是量子条件互信息的凸顶扩展，并表现出一些理想的性质，如一夫一妻制、凸性、渐近连续性、忠实性和张量积态的可加性。我们研究了淬火下一维横向场 Ising 模型中的条件纠缠生成，结果表明 $T_{sq}$ 有效地抑制了经典贡献，并且可以检测相邻子系统和远程子系统之间的真正量子相关性。我们阐明了该度量作为混合态拓扑纠缠熵的鲁棒量化器的实用性。\n\n这为探索拓扑秩序和关键性开辟了新的操作资源理论途径。", "authors": [{"name": "Siddhartha Das"}, {"name": "Alexander Yosifov"}, {"name": "Jinzhao Sun"}], "featured_authors": [{"name": "Siddhartha Das"}, {"name": "Alexander Yosifov"}, {"name": "Jinzhao Sun"}], "author_count": 3}, {"id": "2603.09913", "category": "quant-ph", "title": "Quantum control of the environment in open quantum systems enables rapid qubit reset", "abstract": "Qubit reset is crucial in quantum technology and is typically achieved by coupling the qubit to a dissipative environment. However, the achievable speed and fidelity are limited by qubit-environment entanglement. We use exact tensor-network simulations and a time-dependent variational approach to investigate these effects for transmon qubits with a time-dependent system-environment coupling. We show that they are due to the formation of a polaron state and how this can be reversed using a time-dependent coupling. Coupling protocols are identified which achieve reset with an excited-state population of $10^{-6}$ in $10$ ns. A related paper [C. Ortega-Taberner, E. O'Neill and P. R. Eastham, arXiv: this http URL ] addresses the complementary case of control via a time-dependent Hamiltonian. Our work shows how the dynamics of the environment of an open quantum system can be controlled to design effective quantum processes in non-Markovian systems.", "url": "https://arxiv.org/abs/2603.09913", "type": "理论+数值", "summary": "量子位重置在量子技术中至关重要，通常通过将量子位耦合到耗散环境来实现。然而，可实现的速度和保真度受到量子位环境纠缠的限制。我们使用精确的张量网络模拟和时间相关的变分方法来研究具有时间相关的系统环境耦合的 transmon 量子位的这些影响。我们证明它们是由于极化子态的形成以及如何使用时间相关耦合来反转极化子态的。耦合协议被确定为在 $10$ ns 内以 $10^{-6}$ 的激发态群体实现重置。相关论文[C. Ortega-Taberner、E. O'Neill 和 P. R. Eastham，arXiv：此 http URL ] 通过依赖时间的哈密顿量解决了控制的补充情况。我们的工作展示了如何控制开放量子系统环境的动态，以在非马尔可夫系统中设计有效的量子过程。", "authors": [{"name": "Carlos Ortega-Taberner"}, {"name": "Eoin O'Neill"}, {"name": "Paul Eastham"}], "featured_authors": [{"name": "Carlos Ortega-Taberner"}, {"name": "Eoin O'Neill"}, {"name": "Paul Eastham"}], "author_count": 3}, {"id": "2603.09914", "category": "quant-ph", "title": "Qubit reset beyond the Born-Markov approximation: optimal driving to overcome polaron formation", "abstract": "Qubits are typically reset into a known state by coupling them to a low-temperature environment. When treated in the Born-Markov approximation such couplings produce exponential relaxation to equilibrium, giving high reset fidelities limited only by temperature. We investigate qubit reset beyond this approximation, using numerically exact tensor network methods and the time-dependent variational principle, focussing on a spin-boson model describing a transmon qubit coupled to a resistor. Beyond the Born-Markov approximation the reset fidelity becomes limited by the buildup of system-environment correlations which corresponds to the formation of a polaron. We implement numerical optimal control to find time-dependent qubit Hamiltonians which overcome this limitation by steering the dynamics of the correlated system-environment state. The optimal controls becomes more effective when the environment is filtered to span a smaller spectral range, and remain effective when the multilevel nature of the transmon is considered. A related paper [C. Ortega-Taberner, E. O'Neill and P. R. Eastham, arXiv: this http URL ] addresses the complementary case of control via a time-dependent system-environment coupling. Our results show how limitations on reset speed and fidelity can be overcome, and how time-dependent driving can steer system-environment correlations and reverse polaron formation.", "url": "https://arxiv.org/abs/2603.09914", "type": "理论+数值", "summary": "通常通过将量子位耦合到低温环境来将其重置为已知状态。当用玻恩-马尔可夫近似处理时，这种耦合会产生指数松弛达到平衡，从而提供仅受温度限制的高重置保真度。我们使用数值精确的张量网络方法和时间相关变分原理来研究超出此近似值的量子位重置，重点关注描述与电阻器耦合的传输量子位的自旋玻色子模型。除了玻恩-马尔可夫近似之外，复位保真度受到系统环境相关性的建立的限制，这对应于极化子的形成。我们实施数值最优控制来寻找时间相关的量子位哈密顿量，通过控制相关系统环境状态的动态来克服这一限制。当环境被过滤以跨越较小的光谱范围时，最佳控制变得更加有效，并且当考虑传输的多级性质时，最佳控制仍然有效。相关论文[C.奥尔特加-塔伯纳 (Ortega-Taberner)、E. 奥尼尔 (E. O'Neill) 和 P. R.\n\nEastham，arXiv：此 http URL ] 通过时间相关的系统环境耦合解决了控制的补充情况。我们的结果表明如何克服重置速度和保真度的限制，以及时间相关驱动如何引导系统环境相关性和反向极化子形成。", "authors": [{"name": "Carlos Ortega-Taberner"}, {"name": "Eoin O'Neill"}, {"name": "Paul Eastham"}], "featured_authors": [{"name": "Carlos Ortega-Taberner"}, {"name": "Eoin O'Neill"}, {"name": "Paul Eastham"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
