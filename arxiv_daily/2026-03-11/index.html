  <style>
    :root {

    }

    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }

    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }

    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }

    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }

    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }

    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2603.08791", "category": "cond-mat", "title": "Interplay of local and global quantum geometry in the stability of flat-band superfluids", "abstract": "Quantum geometry strongly impacts physical properties in flat-band systems. We consider its role in bosonic condensation and superfluidity on flat bands, and show that the superfluid weight has an important contribution proportional to the condensate quantum metric. Based on this result, we uncover conditions under which flat-band superfluidity is unlikely. For instance, we find that stable flat-band superfluidity in a two-dimensional system requires at least three bands within Bogoliubov theory. Because the quantum geometry at the condensation momentum plays a disproportionately large role, a large integrated quantum metric is not sufficient for flat-band superfluidity, but how the quantum metric is distributed in the Brillouin zone is crucial.", "url": "https://arxiv.org/abs/2603.08791", "type": "理论", "summary": "量子几何强烈影响平带系统的物理特性。我们考虑了它在平带上的玻色子凝聚和超流性中的作用，并表明超流体重量具有与凝聚量子度量成比例的重要贡献。基于这一结果，我们发现了不可能出现平带超流的条件。例如，我们发现二维系统中稳定的平带超流性需要博戈留波夫理论中的至少三个能带。由于凝聚动量处的量子几何起着不成比例的重要作用，因此大的积分量子度量不足以实现平带超流，但量子度量如何在布里渊区分布至关重要。", "authors": [{"name": "Kukka-Emilia Huhtinen"}, {"name": "Matteo Dürrnagel"}, {"name": "Valerio Peri"}, {"name": "Sebastian D. Huber"}], "featured_authors": [{"name": "Kukka-Emilia Huhtinen"}, {"name": "Matteo Dürrnagel"}, {"name": "Valerio Peri"}, {"name": "Sebastian D. Huber"}], "author_count": 4}, {"id": "2603.08840", "category": "cond-mat", "title": "Quantum Simulation of Massive Relativistic Fields in 2 + 1 Dimensions", "abstract": "Quantum field theories provide fundamental models of complex interacting systems, from high-energy physics and cosmology to condensed matter. However, solving these models in non-perturbative and dynamical regimes is often extremely challenging, particularly in more than one spatial dimension. Analog simulation using tunable synthetic quantum systems can both verify existing theoretical predictions and lead to new physical insights. Here, we realize quantum simulation of massive relativistic fields in $2+1$ dimensions (two spatial dimensions and time), using two coherently coupled spin components in a uniform two-dimensional Bose-Einstein condensate. Specifically, we encode the paradigmatic sine-Gordon model in the field describing the relative phase, $\\phi$, of the two components. We show that, in the perturbative regime, collective field excitations exhibit a relativistic dispersion with a tuneable mass gap. We also observe explicitly non-perturbative phenomena, including the existence of topological domain walls across which $\\phi$ rapidly winds by $2\\pi$. Our work opens possibilities for studies of cosmologically relevant phenomena including preheating, dynamics of topological defects, and relativistic false-vacuum decay.", "url": "https://arxiv.org/abs/2603.08840", "type": "理论+数值", "summary": "量子场论提供了复杂相互作用系统的基本模型，从高能物理和宇宙学到凝聚态物质。然而，在非微扰和动态状态下求解这些模型通常极具挑战性，特别是在多个空间维度上。使用可调谐合成量子系统的模拟模拟既可以验证现有的理论预测，又可以带来新的物理见解。在这里，我们使用均匀二维玻色-爱因斯坦凝聚态中的两个相干耦合自旋分量，实现了 2+1$ 维度（两个空间维度和时间）的大规模相对论场的量子模拟。具体来说，我们在描述两个分量的相对相位 $\\phi$ 的领域中对范式正弦戈登模型进行编码。我们表明，在微扰状态下，集体场激发表现出具有可调质量间隙的相对论色散。我们还观察到明确的非微扰现象，包括拓扑畴壁的存在，$\\phi$ 快速缠绕 $2\\pi$ 穿过拓扑畴壁。\n\n我们的工作为研究宇宙学相关现象提供了可能性，包括预热、拓扑缺陷动力学和相对论假真空衰变。", "authors": [{"name": "Yansheng Zhang"}, {"name": "Feiyang Wang"}, {"name": "Paul H. C. Wong"}, {"name": "Alexander C. Jenkins"}, {"name": "Konstantinos Konstantinou"}, {"name": "Nishant Dogra"}, {"name": "Joseph H. Thywissen"}, {"name": "Christoph Eigen"}, {"name": "Zoran Hadzibabic"}], "featured_authors": [{"name": "Yansheng Zhang"}, {"name": "Feiyang Wang"}, {"name": "Paul H. C. Wong"}, {"name": "Joseph H. Thywissen"}, {"name": "Christoph Eigen"}, {"name": "Zoran Hadzibabic"}], "author_count": 9}, {"id": "2603.08851", "category": "cond-mat", "title": "Weyl-Transition-Driven Giant Reversible Orbital Hall Conductivity", "abstract": "Orbital Hall conductivity (OHC) is a central ingredient of orbitronics, yet how to control it microscopically remains largely unexplored. Here we identify a general mechanism in which tilted Weyl crossings formed by orbitally distinct bands generate a strongly asymmetric orbital Berry curvature (OBC) distribution, whose imbalance survives Brillouin-zone integration and yields a sizable OHC already at zeroth order. Using first-principles calculations, we show that monolayer PtBi2 realizes this mechanism and hosts a giant OHC dominated by a type-II Weyl point. A small biaxial tensile strain drives a type-II $\\rightarrow$ type-I $\\rightarrow$ type-II Weyl transition, leading to a reversible sign change of the OHC through the evolution of the OBC imbalance. This process is governed by the chiral orbital texture of the crossing bands and is further assisted by a strain-induced first-order structural phase transition through bonding reconstruction and polarization change. Our results establish Weyl engineering of orbital quantum geometry as a powerful route to generating and reversibly controlling OHC in polar multi-orbital materials.", "url": "https://arxiv.org/abs/2603.08851", "type": "理论+数值", "summary": "轨道霍尔电导率（OHC）是轨道电子学的核心组成部分，但如何从微观上控制它仍然很大程度上尚未被探索。在这里，我们确定了一种一般机制，其中由轨道不同带形成的倾斜外尔交叉产生了强烈不对称的轨道贝里曲率（OBC）分布，其不平衡在布里渊区积分中幸存下来，并在零阶产生了相当大的 OHC。通过第一性原理计算，我们证明单层 PtBi2 实现了这种机制，并拥有一个由 II 型韦尔点主导的巨大 OHC。一个小的双轴拉伸应变驱动 II 型 $\\rightarrow$ I 型 $\\rightarrow$ II 型 Weyl 转变，通过 OBC 不平衡的演变导致 OHC 的可逆符号变化。该过程由交叉带的手性轨道结构控制，并通过键合重建和极化变化进一步受到应变诱导的一级结构相变的帮助。我们的研究结果表明，轨道量子几何的 Weyl 工程是在极性多轨道材料中生成和可逆控制 OHC 的有力途径。", "authors": [{"name": "Bo Zhao"}, {"name": "Hao Wang"}, {"name": "Wei Ren"}, {"name": "Hongbin Zhang"}], "featured_authors": [{"name": "Bo Zhao"}, {"name": "Hao Wang"}, {"name": "Wei Ren"}, {"name": "Hongbin Zhang"}], "author_count": 4}, {"id": "2603.08855", "category": "cond-mat", "title": "Ground-State Structure Search of Defective High-Entropy Alloys Using Machine-Learning Potentials and Monte Carlo Sampling", "abstract": "Resolving the atomic-scale structure of defective high-entropy alloys (HEAs) containing interstitial species remains a major computational challenge due to the vast configurational space and the limitations of existing methods. Here we introduce PAIPAI (Package for Alloy Interstitial Predictions using Artificial Intelligence), a Monte Carlo framework coupled with machine-learning interatomic potentials (MLIPs) that searches for ground-state atomic configurations in HEAs with defects and interstitials. PAIPAI employs a dual-worker architecture-fast workers for rapid configurational screening and slow workers for high-accuracy refinement-coordinated through a shared waiting pool, enabling efficient parallel sampling. We demonstrate PAIPAI through three case studies: (i) surface segregation in a Ti-V-Cr-Re slab; (ii) interstitial oxygen and boron aggregation in bulk BCC Nb-Ti-Ta-Hf; and (iii) coupled metallic and interstitial segregation at grain boundaries in Nb-Ti-Ta-Hf. In all cases, Monte Carlo-optimized structures are significantly lower in energy than any configuration obtained by random sampling, and MLIP energy rankings are validated against density functional theory calculations. PAIPAI provides a general and efficient framework for predicting atomic ordering, segregation, and interstitial behavior in complex, defective HEA systems.", "url": "https://arxiv.org/abs/2603.08855", "type": "理论+数值", "summary": "由于巨大的构型空间和现有方法的局限性，解析含有间隙物种的有缺陷的高熵合金（HEA）的原子尺度结构仍然是一个主要的计算挑战。在这里，我们介绍 PAIPAI（使用人工智能的合金间隙预测包），这是一种蒙特卡罗框架，与机器学习原子间势 (MLIP) 相结合，可搜索具有缺陷和间隙的 HEA 中的基态原子构型。 PAIPAI采用双worker架构——快速worker进行快速配置筛选，慢速worker进行高精度细化——通过共享等待池协调，实现高效并行采样。我们通过三个案例研究展示了 PAIPAI：(i) Ti-V-Cr-Re 板坯中的表面偏析； (ii) 块体 BCC Nb-Ti-Ta-Hf 中的间隙氧和硼聚集； (iii) Nb-Ti-Ta-Hf 晶界处的耦合金属偏析和间隙偏析。\n\n在所有情况下，蒙特卡罗优化结构的能量明显低于通过随机采样获得的任何配置，并且 MLIP 能量排名根据密度泛函理论计算进行了验证。 PAIPAI 提供了一个通用且有效的框架，用于预测复杂、有缺陷的 HEA 系统中的原子排序、分离和间隙行为。", "authors": [{"name": "Siya Zhu"}, {"name": "Raymundo Arroyave"}], "featured_authors": [{"name": "Siya Zhu"}, {"name": "Raymundo Arroyave"}], "author_count": 2}, {"id": "2603.08872", "category": "cond-mat", "title": "Aligning van der Waals heterostructures using electron backscatter diffraction", "abstract": "Precise and accurate determination of crystallographic orientation is crucial for engineering van der Waals heterostructures, where the twist angle between layers controls emergent electronic and optical properties. While Electron Backscatter Diffraction (EBSD) has been extensively used for bulk materials, its application to van der Waals materials remains largely unexplored. In this work, we demonstrate EBSD as a robust and versatile tool for determining crystallographic orientations of van der Waals materials with high precision. We show quantitative agreement between EBSD-determined orientations and facet orientations in orthorhombic {\\alpha}-MoO3 flakes on silicon substrates. We use Grain Reference Orientation Distribution (GROD) and Kernel Average Misorientation (KAM) across the flakes to demonstrate precision better than 0.2°. We extend this technique to other low-symmetry materials, specifically, monoclinic {\\alpha}-As2Te3, monoclinic GaTe and triclinic ReSe2, demonstrating broad applicability across van der Waals materials with different crystal structures. Finally, as a proof-of-concept application, we leverage EBSD-determined orientations to engineer twisted {\\alpha}-MoO3 heterostructure with precisely controlled twist angle, enabling observation of recently reported canalized phonon polaritons. Our results establish EBSD as a powerful characterization method for van der Waals materials, enabling precise orientation control essential for twistronics and twist-optics.", "url": "https://arxiv.org/abs/2603.08872", "type": "理论", "summary": "精确确定晶体取向对于设计范德华异质结构至关重要，其中层之间的扭转角控制着出现的电子和光学特性。虽然电子背散射衍射 (EBSD) 已广泛用于散装材料，但其在范德华材料中的应用在很大程度上仍未得到探索。在这项工作中，我们展示了 EBSD 作为一种强大且多功能的工具，可以高精度确定范德华材料的晶体取向。我们证明了 EBSD 确定的取向和硅基底上的斜方晶系 {\\alpha}-MoO3 薄片中的面取向之间的定量一致性。我们使用薄片上的颗粒参考取向分布 (GROD) 和核平均取向偏差 (KAM) 来证明精度优于 0.2°。我们将该技术扩展到其他低对称性材料，特别是单斜晶系 {\\alpha}-As2Te3、单斜晶系 GaTe 和三斜晶系 ReSe2，证明了其在具有不同晶体结构的范德华材料中的广泛适用性。\n\n最后，作为概念验证应用，我们利用 EBSD 确定的方向来设计具有精确控制扭转角的扭转 {\\alpha}-MoO3 异质结构，从而能够观察最近报道的管道化声子极化激元。我们的研究结果表明 EBSD 是一种强大的范德华材料表征方法，可实现扭转电子学和扭转光学所必需的精确方向控制。", "authors": [{"name": "R. Bangari"}, {"name": "M. Mosayebi"}, {"name": "J. Buchner"}, {"name": "J.D. Caldwell"}, {"name": "N. Bassim"}, {"name": "T. G. Folland"}], "featured_authors": [{"name": "R. Bangari"}, {"name": "M. Mosayebi"}, {"name": "J. Buchner"}, {"name": "J.D. Caldwell"}, {"name": "N. Bassim"}, {"name": "T. G. Folland"}], "author_count": 6}, {"id": "2603.08873", "category": "cond-mat", "title": "Machine-learning assistant DFT study of half-metallic full-Heusler alloy N2CaNa: structural, electronic, mechanical, and thermodynamics properties", "abstract": "We studied the structural, electronic, mechanical, and thermodynamic properties of N2CaNa full Heusler alloys using density functional theory (DFT). Results for the structural analysis establishes structural stability with a minimum formation energy of 29.90eV. The compounds is brittle and mechanically stable, having checked out with the Pugh criteria. B/G ratio for N2CaNa is 4.766 as computed in Tab.2, hence the material is ductile. N2CaNa alloy is ductile in nature. Debye model correctly predicts the low temperature dependence of heat capacity, which is proportional to the debye T3 law. Just like the Einstein model, it also recovers the Dulong-Petit law at high temperatures, suggests thermodynamic stability of the compounds at moderate temperatures. The results demonstrate potential for applications in spintronics, structural engineering, and other fields requiring materials with tailored properties.", "url": "https://arxiv.org/abs/2603.08873", "type": "理论+数值", "summary": "我们使用密度泛函理论 (DFT) 研究了 N2CaNa 全 Heusler 合金的结构、电子、机械和热力学性能。结构分析结果表明结构稳定性，最小形成能为 29.90eV。根据 Pugh 标准检查，该化合物脆且机械稳定。如表 2 所示，N2CaNa 的 B/G 比为 4.766，因此该材料具有延展性。 N2CaNa 合金具有延展性。德拜模型正确预测了热容的低温依赖性，与德拜 T3 定律成正比。就像爱因斯坦模型一样，它也恢复了高温下的杜隆-珀蒂定律，表明了化合物在中等温度下的热力学稳定性。结果证明了其在自旋电子学、结构工程和其他需要具有定制特性的材料的领域的应用潜力。", "authors": [{"name": "E. B. Ettah"}, {"name": "M.E. Ishaje"}, {"name": "K. A. Minakova"}, {"name": "V.A. Sirenko"}, {"name": "I. S. Bondar"}], "featured_authors": [{"name": "E. B. Ettah"}, {"name": "M.E. Ishaje"}, {"name": "K. A. Minakova"}, {"name": "V.A. Sirenko"}, {"name": "I. S. Bondar"}], "author_count": 5}, {"id": "2603.08881", "category": "cond-mat", "title": "From Word2Vec to Transformers: Text-Derived Composition Embeddings for Filtering Combinatorial Electrocatalysts", "abstract": "Compositionally complex solid solution electrocatalysts span vast composition spaces, and even one materials system can contain more candidate compositions than can be measured exhaustively. Here we evaluate a label-free screening strategy that represents each composition using embeddings derived from scientific texts and prioritizes candidates based on similarity to two property concepts. We compare a corpus-trained Word2Vec baseline with transformer-based embeddings, where compositions are encoded either by linear element-wise mixing or by short composition prompts. Similarities to `concept directions', the terms conductivity and dielectric, define a 2-dimensional descriptor space, and a symmetric Pareto-front selection is used to filter candidate subsets without using electrochemical labels. Performance is assessed on 15 materials libraries including noble metal alloys and multicomponent oxides. In this setting, the lightweight Word2Vec baseline, which uses a simple linear combination of element embeddings, often achieves the highest number of reductions of possible candidate compositions while staying close to the best measured performance.", "url": "https://arxiv.org/abs/2603.08881", "type": "数值", "summary": "成分复杂的固溶体电催化剂跨越巨大的成分空间，甚至一种材料系统可能包含比可以详尽测量的更多的候选成分。在这里，我们评估了一种无标签筛选策略，该策略使用源自科学文本的嵌入来表示每种组合物，并根据与两个属性概念的相似性对候选进行优先级排序。我们将语料库训练的 Word2Vec 基线与基于转换器的嵌入进行比较，其中组合通过线性元素混合或短组合提示进行编码。与“概念方向”相似，术语电导率和介电常数定义了二维描述符空间，并且使用对称帕累托前沿选择来过滤候选子集，而不使用电化学标签。对 15 种材料库（包括贵金属合金和多组分氧化物）进行性能评估。在此设置中，轻量级 Word2Vec 基线使用元素嵌入的简单线性组合，通常可以实现尽可能多的候选组合减少，同时保持接近最佳测量性能。", "authors": [{"name": "Lei Zhang"}, {"name": "Markus Stricker"}], "featured_authors": [{"name": "Lei Zhang"}, {"name": "Markus Stricker"}], "author_count": 2}, {"id": "2603.08918", "category": "cond-mat", "title": "When velocity autocorrelations mirror force autocorrelations: Exact noise-cancellation in interacting Brownian systems", "abstract": "Resolving the mean-squared displacement (MSD) and velocity autocorrelation function (VACF) of interacting Brownian particles remains a central challenge in simulations of soft-matter systems, especially at low densities where particle-particle interactions are sparse and signals are dominated by thermal noise. A recently proposed noise-cancellation (NC) algorithm [Mandal et al. Phys. Rev. Lett. 123, 168001 (2019)] addresses this by decomposing particle trajectories into two components: free Brownian motion and interaction-induced displacements. The NC approximation enhances signal clarity by neglecting cross-correlations between the total particle displacements and the extracted interaction-induced contributions of the trajectories - an assumption that has so far lacked rigorous theoretical justification. In this work, we establish an exact theoretical relation between the VACF, the force autocorrelation function (FACF) characterizing the interaction-induced contributions, and these cross-correlations, which is valid for Brownian systems. We show that in thermal equilibrium, the cross-correlations vanish for Brownian systems because the VACF is strictly proportional to the negative FACF, which establishes the NC algorithm as an exact method. In contrast, for Brownian nonequilibrium systems, the cross-correlations remain finite, providing a direct fingerprint of nonequilibrium physics in such systems and a criterion to distinguish equilibrium from nonequilibrium states. Here, suitable corrections must be applied for the NC method to remain accurate. Our results expand the scope of the NC algorithm to a broad range of soft-matter systems in and out of equilibrium, where it has the potential to strongly enhance the resolution of VACF data obtained through simulations in future studies.", "url": "https://arxiv.org/abs/2603.08918", "type": "理论+数值", "summary": "解决布朗粒子相互作用的均方位移（MSD）和速度自相关函数（VACF）仍然是软物质系统模拟中的一个核心挑战，特别是在粒子与粒子相互作用稀疏且信号以热噪声为主的低密度情况下。最近提出的噪声消除 (NC) 算法 [Mandal 等人。物理。莱特牧师。 123, 168001 (2019)]通过将粒子轨迹分解为两个部分来解决这个问题：自由布朗运动和相互作用引起的位移。 NC 近似通过忽略总粒子位移与提取的相互作用引起的轨迹贡献之间的互相关性来增强信号清晰度 - 这一假设迄今为止缺乏严格的理论依据。在这项工作中，我们在 VACF、表征相互作用引起的贡献的力自相关函数 (FACF) 和这些互相关之间建立了精确的理论关系，这对于布朗系统有效。\n\n我们证明，在热平衡中，布朗系统的互相关性消失，因为 VACF 与负 FACF 严格成比例，这将 NC 算法确立为一种精确方法。相比之下，对于布朗非平衡系统，互相关性仍然是有限的，从而提供了此类系统中非平衡物理的直接指纹以及区分平衡与非平衡状态的标准。在此，必须进行适当的修正才能使 NC 方法保持准确。我们的结果将 NC 算法的范围扩展到广泛的处于平衡状态和非平衡状态的软物质系统，在未来的研究中，它有可能大大提高通过模拟获得的 VACF 数据的分辨率。", "authors": [{"name": "Anton Lüders"}, {"name": "Suvendu Mandal"}, {"name": "Thomas Franosch"}], "featured_authors": [{"name": "Anton Lüders"}, {"name": "Suvendu Mandal"}, {"name": "Thomas Franosch"}], "author_count": 3}, {"id": "2603.08950", "category": "cond-mat", "title": "Competing Hydrogenation Pathways to Metastable CaH$_6$ Revealed by Machine-Learning-Potential Molecular Dynamics", "abstract": "The synthesis of the high-$T_c$ superhydride CaH$_6$ has stimulated significant interest in understanding synthesis pathways for metastable hydrides. However, the microscopic mechanisms governing such hydrogenation reactions remain poorly understood. Here, we show that machine-learning potential molecular dynamics (MLP-MD) simulations can reproduce and distinguish competing reaction pathways leading to metastable and stable hydrides. By simulating hydrogenation reactions at CaH$_2$/H$_2$ and CaH$_4$/H$_2$ interfaces, we identify two distinct pathways that produce clathrate-type CaH$_6$ and A15-type CaH$_{5.75}$, respectively. CaH$_{5.75}$ lies on the convex hull but requires extensive Ca sublattice rearrangement and therefore forms only at elevated temperatures. In contrast, CaH$_6$ becomes kinetically accessible when CaH$_2$ is used as the precursor. The crystallographic compatibility between the Ca sublattice of CaH$_2$ and the bcc framework of CaH$_6$ enables a martensitic-like topotactic transformation that bypasses the reconstructive pathway leading to CaH$_{5.75}$. These results reveal how precursor structure and thermodynamic stability compete to determine superhydride formation pathways and demonstrate that machine-learning molecular dynamics can directly capture the kinetic selection of metastable phases in reactive materials systems.", "url": "https://arxiv.org/abs/2603.08950", "type": "数值", "summary": "高$T_c$超氢化物CaH$_6$的合成激发了人们对了解亚稳态氢化物合成途径的浓厚兴趣。然而，控制此类氢化反应的微观机制仍然知之甚少。在这里，我们证明机器学习势分子动力学（MLP-MD）模拟可以重现和区分导致亚稳态和稳定氢化物的竞争反应途径。通过模拟 CaH$_2$/H$_2$ 和 CaH$_4$/H$_2$ 界面的氢化反应，我们确定了分别产生笼形型 CaH$_6$ 和 A15 型 CaH$_{5.75}$ 的两种不同途径。 CaH$_{5.75}$ 位于凸包上，但需要大量的 Ca 亚晶格重排，因此仅在高温下形成。相反，当 CaH$_2$ 用作前体时，CaH$_6$ 在动力学上变得可接近。 CaH$_2$ 的 Ca 亚晶格和 CaH$_6$ 的 bcc 框架之间的晶体相容性能够实现类马氏体拓扑转变，绕过导致 CaH$_{5.75}$ 的重构途径。\n\n这些结果揭示了前驱体结构和热力学稳定性如何竞争确定超氢化物形成途径，并证明机器学习分子动力学可以直接捕获反应材料系统中亚稳态相的动力学选择。", "authors": [{"name": "Ryuhei Sato"}, {"name": "Peter I. C. Cooke"}, {"name": "Maélie Caussé"}, {"name": "Hung Ba Tran"}, {"name": "Seong Hoon Jang"}, {"name": "Di Zhang"}, {"name": "Hao Li"}, {"name": "Shin-ichi Orimo"}, {"name": "Yasushi Shibuta"}, {"name": "Chris J. Pickard"}], "featured_authors": [{"name": "Ryuhei Sato"}, {"name": "Peter I. C. Cooke"}, {"name": "Maélie Caussé"}, {"name": "Shin-ichi Orimo"}, {"name": "Yasushi Shibuta"}, {"name": "Chris J. Pickard"}], "author_count": 10}, {"id": "2603.08991", "category": "cond-mat", "title": "Rényi exponent landscape of multipartite entanglement in free-fermion systems", "abstract": "We show that the Rényi tripartite information $I_3^{(\\alpha)}$ of free fermions exhibits a qualitatively $\\alpha$-dependent scaling at small Fermi momentum, in sharp contrast to bipartite entropy where only the prefactor changes. In the rank-1 regime ($z = k_F w \\ll 1$), $I_3^{(\\alpha)}$ receives contributions from two competing channels -- a fractional-moment channel $\\sim z^\\alpha$ (active for non-integer $\\alpha$) and a polynomial channel $\\sim z^m$ from the first nonvanishing inclusion-exclusion moment $\\sigma_m$ -- yielding the scaling exponent $\\beta_m(\\alpha) = \\min(\\alpha, m)$ for $m$-partite information of $m$ adjacent strips. Integer Rényi indices $\\alpha = 2, 3, \\ldots$ are anomalous: the fractional channel closes and the exponent jumps to $m$ or higher. A direct consequence is a replica obstruction: $I_m^{(n)}/I_m^{(1)} \\sim z^{m-1} \\to 0$ for all integer $n \\geq 2$, so the leading von Neumann signal cannot be reconstructed from integer Rényi data at the level of leading scaling -- a situation with no bipartite analog. Conversely, negativity-based measures ($\\alpha = 1/2$) give a $20\\times$ enhanced signal compared to von Neumann. We derive the underlying product formula for the coefficient $c(w_A, w_B, w_D)$, prove an $m$-partite generating function for the inclusion-exclusion moments, and verify all results numerically to high precision.", "url": "https://arxiv.org/abs/2603.08991", "type": "理论+数值", "summary": "我们表明，自由费米子的 Rényi 三方信息 $I_3^{(\\alpha)}$ 在小费米动量下表现出定性 $\\alpha$ 相关的缩放，与仅前因子变化的二分熵形成鲜明对比。在rank-1状态（$z = k_F w \\ll 1$）中，$I_3^{(\\alpha)}$接收来自两个竞争通道的贡献——一个分数矩通道$\\sim z^\\alpha$（对非整数$\\alpha$有效）和一个来自第一个非零包含-排除矩$\\sigma_m$的多项式通道$\\sim z^m$——产生缩放指数$\\beta_m(\\alpha) = \\min(\\alpha, m)$ 用于 $m$ 相邻条带的 $m$ 部分信息。整数 Rényi 指数 $\\alpha = 2, 3, \\ldots$ 是异常的：小数通道关闭且指数跳至 $m$ 或更高。直接后果是副本阻塞：对于所有整数 $n \\geq 2$，$I_m^{(n)}/I_m^{(1)} \\sim z^{m-1} \\to 0$，因此无法在领先缩放级别从整数 Rényi 数据重建领先的冯诺依曼信号 - 这是一种没有二分模拟的情况。相反，与冯·诺依曼相比，基于负性的测量 ($\\alpha = 1/2$) 给出了 $20\\times$ 增强信号。\n\n我们推导出系数 $c(w_A, w_B, w_D)$ 的基础乘积公式，证明包含-排除矩的 $m$ 分生成函数，并以高精度数值验证所有结果。", "authors": [{"name": "Aleksandrs Sokolovs"}], "featured_authors": [{"name": "Aleksandrs Sokolovs"}], "author_count": 1}, {"id": "2603.09027", "category": "cond-mat", "title": "Dynamics of viscous liquids and the Random Barrier Model", "abstract": "This paper combines the particle-swap Monte Carlo algorithm with long GPU molecular dynamics simulations to analyze the dynamics of a ternary Lennard-Jones glass-forming liquid in the extremely viscous regime. The focus is on the inherent dynamics, obtained by quenching configurations along the configuration-space trajectory into their inherent state. We compare how two functional forms, the von Schweidler law and the random barrier model (RBM) prediction in the extreme disorder limit, fit data for the inherent mean-squared displacement as a function of time. We find that the RBM, which has no dimensionless free parameters, generally fits the data better than the von Schweidler law, despite the latters one dimensionless free parameter. In particular, this implies that the RBM predicts the value of the diffusion coefficient from short-time simulation data more accurately than does the von Schweidler expression. It remains an open question why the RBM reproduces well the inherent data despite this models (unrealistic) assumption of identical energy minima.", "url": "https://arxiv.org/abs/2603.09027", "type": "理论+数值", "summary": "本文将粒子交换蒙特卡罗算法与长 GPU 分子动力学模拟相结合，分析了三元 Lennard-Jones 玻璃形成液体在极端粘稠状态下的动力学。重点是内在动力学，通过将沿着构型空间轨迹的构型淬灭到其固有状态来获得。我们比较了两种函数形式，即冯·施韦德勒定律和极端无序极限下的随机势垒模型 (RBM) 预测，如何拟合作为时间函数的固有均方位移的数据。我们发现，没有无量纲自由参数的 RBM 通常比 von Schweidler 定律更好地拟合数据，尽管后者有一个无量纲自由参数。特别是，这意味着 RBM 从短时模拟数据预测扩散系数的值比 von Schweidler 表达式更准确。尽管这种模型（不切实际的）假设相同的能量最小值，但为什么 RBM 能够很好地再现固有数据仍然是一个悬而未决的问题。", "authors": [{"name": "Thomas B. Schrøder"}, {"name": "Jeppe C. Dyre"}, {"name": "Camille Scalliet"}], "featured_authors": [{"name": "Thomas B. Schrøder"}, {"name": "Jeppe C. Dyre"}, {"name": "Camille Scalliet"}], "author_count": 3}, {"id": "2603.09060", "category": "cond-mat", "title": "Universal Family-Vicsek scaling in quantum gases far from equilibrium", "abstract": "Fluctuations in the growing surfaces of classical systems can exhibit universal scaling behavior, known as Family-Vicsek (FV) scaling. Although this phenomenon was originally discovered in classical stochastic models, recent theoretical studies have demonstrated the presence of FV scaling in quantum many-body systems as well. Here, we observe the universal FV scaling in a one-dimensional Bose gas in an optical lattice. By monitoring the fluctuations of particle number in half of the system, which corresponds to the surface roughness, we extract all scaling exponents and demonstrate that the entire relaxation-from the growth of quantum fluctuations to their saturation-is captured by a single universal scaling function. Our results demonstrate that universal scaling laws of classical surface growth extend to quantum many-body systems, establishing a unified framework for nonequilibrium universality across classical and quantum systems.", "url": "https://arxiv.org/abs/2603.09060", "type": "理论", "summary": "经典系统生长表面的波动可以表现出普遍的标度行为，称为 Family-Vicsek (FV) 标度。尽管这种现象最初是在经典随机模型中发现的，但最近的理论研究证明了量子多体系统中也存在 FV 标度。在这里，我们观察到光学晶格中一维玻色气体的通用 FV 标度。通过监测与表面粗糙度相对应的系统一半的粒子数涨落，我们提取了所有标度指数，并证明整个弛豫（从量子涨落的增长到其饱和）是由单个通用标度函数捕获的。我们的结果表明，经典表面生长的普遍标度定律扩展到量子多体系统，为跨经典和量子系统的非平衡普遍性建立了统一的框架。", "authors": [{"name": "Kiryang Kwon"}, {"name": "Kazuya Fujimoto"}, {"name": "Junhyeok Hur"}, {"name": "Byungjin Lee"}, {"name": "Samgyu Hwang"}, {"name": "Sumin Kim"}, {"name": "Ryusuke Hamazaki"}, {"name": "Yuki Kawaguchi"}, {"name": "Jae-yoon Choi"}], "featured_authors": [{"name": "Kiryang Kwon"}, {"name": "Kazuya Fujimoto"}, {"name": "Junhyeok Hur"}, {"name": "Ryusuke Hamazaki"}, {"name": "Yuki Kawaguchi"}, {"name": "Jae-yoon Choi"}], "author_count": 9}, {"id": "2603.09092", "category": "cond-mat", "title": "Impact of spin--orbit coupling on orbital diamagnetism in a narrow-gap semiconductor $\\mathrm{Pb}_{1-x}\\mathrm{Sn}_x\\mathrm{Te}$", "abstract": "We study the influence of spin--orbit coupling (SOC) on orbital magnetism in $\\mathrm{Pb}_{1-x}\\mathrm{Sn}_x\\mathrm{Te}$, a narrow-gap semiconductor. Using the $\\pi$-matrix method, we calculate material-specific Landau levels and evaluate the magnetization, fully including interband effects. The system exhibits diamagnetism for both $x = 0$ and $x = 0.35$, with the latter showing a stronger response due to its smaller gap. The magnitude of diamagnetism increases monotonically with SOC strength, particularly in strong magnetic fields. To clarify the underlying mechanism, we introduce the free--Zeeman--Dirac (fZD) model and fit its parameters to the calculated Landau levels. The analysis reveals that SOC enhances the Dirac-type interband contribution relative to the Zeeman term, leading to increased diamagnetism. These results demonstrate that SOC can play a key role in orbital magnetism through interband effects.", "url": "https://arxiv.org/abs/2603.09092", "type": "理论+数值", "summary": "我们研究了自旋轨道耦合（SOC）对窄能隙半导体 $\\mathrm{Pb}_{1-x}\\mathrm{Sn}_x\\mathrm{Te}$ 轨道磁性的影响。使用 $\\pi$ 矩阵方法，我们计算特定材料的朗道能级并评估磁化强度，完全包括带间效应。该系统对 $x = 0$ 和 $x = 0.35$ 都表现出抗磁性，后者由于其间隙较小而表现出更强的响应。抗磁性的大小随着 SOC 强度单调增加，特别是在强磁场中。为了阐明根本机制，我们引入了自由-塞曼-狄拉克（fZD）模型并将其参数拟合到计算的朗道水平。分析表明，相对于塞曼项，SOC 增强了狄拉克型带间贡献，导致抗磁性增加。这些结果表明 SOC 可以通过带间效应在轨道磁性中发挥关键作用。", "authors": [{"name": "Yuki Mitani"}, {"name": "Yuki Fuseya"}], "featured_authors": [{"name": "Yuki Mitani"}, {"name": "Yuki Fuseya"}], "author_count": 2}, {"id": "2603.09124", "category": "cond-mat", "title": "Canonical Criterion for Third-Order Transitions", "abstract": "Microcanonical inflection-point analysis (MIPA) identifies third-order transitions from derivatives of the microcanonical entropy, but whether such transitions admit a direct canonical formulation has remained unclear. Here we establish a fluctuation-based canonical framework for third-order transitions through a cumulant-ratio criterion whose signed extrema define their canonical counterparts and, in the single-saddle regime, are asymptotically linked to microcanonical classification. Because the criterion depends only on energy cumulants, it avoids explicit density-of-states reconstruction and remains operational in nonequilibrium steady states. Physically, it reveals dependent and independent third-order transitions as fluctuation reorganizations around low-order transitions, namely disordered-side precursors and ordered-side restructuring. Benchmarks on Onsager's two-dimensional Ising solution, finite size Potts models, and a driven nonreciprocal Ising model show that the framework is theoretically grounded and broadly applicable.", "url": "https://arxiv.org/abs/2603.09124", "type": "理论", "summary": "微规范拐点分析（MIPA）从微规范熵的导数中识别出三阶转变，但这种转变是否承认直接的规范公式仍不清楚。在这里，我们通过累积比准则建立了一个基于波动的三阶转换规范框架，其符号极值定义了它们的规范对应项，并且在单鞍状态下，渐近地与微规范分类相关。由于该标准仅取决于能量累积量，因此它避免了显式的状态密度重建，并且在非平衡稳态下仍然有效。从物理上讲，它揭示了依赖和独立的三阶跃迁作为围绕低阶跃迁的波动重组，即无序侧前体和有序侧重组。 Onsager 的二维 Ising 解、有限尺寸 Potts 模型和驱动非互易 Ising 模型的基准表明，该框架具有理论基础并具有广泛的适用性。", "authors": [{"name": "Fangfang Wang"}, {"name": "Wei Liu"}, {"name": "Kai Qi"}, {"name": "Zidong Cui"}, {"name": "Ying Tang"}, {"name": "Zengru Di"}], "featured_authors": [{"name": "Fangfang Wang"}, {"name": "Wei Liu"}, {"name": "Kai Qi"}, {"name": "Zidong Cui"}, {"name": "Ying Tang"}, {"name": "Zengru Di"}], "author_count": 6}, {"id": "2603.09202", "category": "cond-mat", "title": "Material-Property-Field-based Deep Neural Network in Hopfield Framework", "abstract": "The current Deep Neural Networks (DNNs) lack the necessary physical priors and a clear formulation specifically designed for material systems. making them non-analytical and non-interpretable 'black boxes'. In this work, we integrate Material Property Fields (MPF) with the Hopfield network architecture and propose an analytical DNN framework named mPFDNN. MPF provides a unified framework that represents physical properties of materials as an analytical field built upon pairwise interactions, rigorously respecting fundamental symmetries, while also enabling a physically legitimate decomposition of property distributions at the atomic level. Although the Hopfield model was initially developed for Ising-like systems, we prove that its dynamical evolution strategy for DNN design is equally well suited to MPF. By mathematically reformatting interatomic nonlinear interactions as 'hidden neurons', the MPF can be naturally evolved into a deep yet analytically tractable DNN architecture that approximates a fully connected interaction landscape. This framework also unifies nonlinear DNNs and linear approaches within a single cohesive model. Extensive validation across diverse systems (inorganic crystals, organic molecules, and aqueous solutions) and multiple properties (diffusion coefficients, adsorption energy, etc.) confirm that mPFDNN not only achieves accurate predictions but also provides a principled and universal framework for structure-property mapping for physical, chemical and materials science.", "url": "https://arxiv.org/abs/2603.09202", "type": "理论", "summary": "当前的深度神经网络（DNN）缺乏必要的物理先验和专门为材料系统设计的清晰公式。使它们成为不可分析和不可解释的“黑匣子”。在这项工作中，我们将材料属性场（MPF）与 Hopfield 网络架构相结合，并提出了一种名为 mPFDNN 的分析 DNN 框架。 MPF 提供了一个统一的框架，将材料的物理属性表示为基于成对相互作用的分析场，严格尊重基本对称性，同时还能够在原子级别对属性分布进行物理上合法的分解。尽管 Hopfield 模型最初是为类 Ising 系统开发的，但我们证明其 DNN 设计的动态演化策略同样适合 MPF。通过在数学上将原子间非线性相互作用重新格式化为“隐藏神经元”，MPF 可以自然地演变成一个深度且易于分析处理的 DNN 架构，该架构近似完全连接的交互景观。该框架还将非线性 DNN 和线性方法统一到单个内聚模型中。\n\n跨不同系统（无机晶体、有机分子和水溶液）和多种性质（扩散系数、吸附能等）的广泛验证证实，mPFDNN 不仅实现了准确的预测，而且为物理、化学和材料科学的结构-性质映射提供了原则性和通用的框架。", "authors": [{"name": "Yanxiao Hu"}, {"name": "Ye Sheng"}, {"name": "Caichao Ye"}, {"name": "Wenxing Qian"}, {"name": "Xiaoxin Xu"}, {"name": "Yabei Wu"}, {"name": "Jiong Yang"}, {"name": "William A. Goddard III"}, {"name": "Wenqing Zhang"}], "featured_authors": [{"name": "Yanxiao Hu"}, {"name": "Ye Sheng"}, {"name": "Caichao Ye"}, {"name": "Jiong Yang"}, {"name": "William A. Goddard III"}, {"name": "Wenqing Zhang"}], "author_count": 9}, {"id": "2603.09225", "category": "cond-mat", "title": "Optically driven thermodynamic transition from free- to locked-epitaxy", "abstract": "Controlling crystallographic orientation in quasi-van der Waals (vdW) epitaxy remains a fundamental challenge, especially for material systems located near the boundary between weakly and strongly coupled growth regimes. In such marginal systems, epitaxial selection is governed by a delicate thermodynamic competition between surface-energy penalties and interfacial interaction gains, giving rise to two archetypal limits: vdW-dominated free-epitaxy and strong interfacial coupling dominated locked-epitaxy. However, dynamically driving transitions between these regimes has remained elusive. Here, we demonstrate that external light irradiation can deterministically induce such a transition. Using the thermodynamically frustrated Fe4N/mica interface as a model system, we show that photo-excited carriers act as a chemical potentiator, significantly enhancing the interfacial chemical affinity. Within a quantitative thermodynamic description, this optical modulation increases the locking criterion (I_lock)-defined as the ratio of interfacial energy gain to surface-energy cost-beyond its critical threshold. As a result, the system switches from vdW-dominated free-epitaxy with (001) orientation to chemically locked-epitaxy with (111) orientation. Our findings establish light as a non-invasive and switchable control knob to dynamically reconfigure the interfacial energy landscape in quasi-vdW epitaxy, enabling programmable access to distinct epitaxial states beyond intrinsic material limitations.", "url": "https://arxiv.org/abs/2603.09225", "type": "理论", "summary": "控制准范德华（vdW）外延中的晶体取向仍然是一个基本挑战，特别是对于位于弱耦合和强耦合生长状态之间边界附近的材料系统。在这样的边缘系统中，外延选择受到表面能惩罚和界面相互作用增益之间微妙的热力学竞争的控制，从而产生两个典型的限制：vdW主导的自由外延和强界面耦合主导的锁定外延。然而，动态推动这些制度之间的转变仍然难以捉摸。在这里，我们证明外部光照射可以确定地引起这种转变。使用热力学受挫的 Fe4N/云母界面作为模型系统，我们表明光激发载流子充当化学增效剂，显着增强界面化学亲和力。在定量热力学描述中，这种光学调制增加了锁定标准（I_lock）——定义为界面能量增益与表面能量成本的比率——超过其临界阈值。\n\n结果，系统从（001）取向的 vdW 主导的自由外延切换到（111）取向的化学锁定外延。我们的研究结果将光确立为一种非侵入式、可切换的控制旋钮，可以动态地重新配置准 vdW 外延中的界面能量景观，从而能够通过可编程访问超出固有材料限制的不同外延状态。", "authors": [{"name": "Renhong Liang"}, {"name": "Mao Ye"}, {"name": "Yiran Ying"}, {"name": "Longlong Shu"}, {"name": "Renkui Zheng"}, {"name": "Haitao Huang"}, {"name": "Jianhua Hao"}, {"name": "Shuk-Yin Tong"}, {"name": "Shanming Ke"}], "featured_authors": [{"name": "Renhong Liang"}, {"name": "Mao Ye"}, {"name": "Yiran Ying"}, {"name": "Jianhua Hao"}, {"name": "Shuk-Yin Tong"}, {"name": "Shanming Ke"}], "author_count": 9}, {"id": "2603.09317", "category": "cond-mat", "title": "Hopfield model for patterns with internal structure", "abstract": "The spherical version of the Hopfield model for pattern recognition is considered in the static limit. Structures inside the patterns are modeled by Gaussian random variables that reward correlation between pairs of spins in a given pattern. The free energy is derived analytically with the replica method. The overlap distribution obeys a self-consistent equation. Coming from high temperatures, a spin glass phase is entered, in which patterns and correlations appear at lower temperatures. For small enough loading capacity, also a glass phase with patterns and correlations appears.", "url": "https://arxiv.org/abs/2603.09317", "type": "理论", "summary": "用于模式识别的 Hopfield 模型的球形版本在静态极限下被考虑。模式内部的结构由高斯随机变量建模，该变量奖励给定模式中自旋对之间的相关性。自由能是通过复制法分析得出的。重叠分布服从自洽方程。从高温开始，进入旋转玻璃相，其中图案和相关性在较低温度下出现。对于足够小的负载能力，也会出现具有图案和相关性的玻璃相。", "authors": [{"name": "Theodorus Maria Nieuwenhuizen"}], "featured_authors": [{"name": "Theodorus Maria Nieuwenhuizen"}], "author_count": 1}, {"id": "2603.09325", "category": "cond-mat", "title": "Orbital-Zeeman cross correlation in $p$- and $d$-wave altermagnets", "abstract": "Altermagnets are a novel class of magnets that exhibit a large spin splitting but the total magnetic moment is vanishing. This unconventional spin splitting gives rise to various characteristic phenomena, such as spin current generation. In this paper, we study the orbital-Zeeman (OZ) cross term in altermagnets. Specifically, we consider the Rashba metal and the surface Dirac cones of three-dimensional topological insulators (TIs) in the presence of the altermagnetic order parameters. For the Rashba metals, the $p$-wave order parameter exerts only a limited influence on the OZ term, whereas the $d$-wave one causes the sign change of it when the order parameter becomes sufficiently large. For the TI surface, the $p$-wave order parameter retains the step-function-type dependence of the OZ term as a function of the chemical potential ($\\mu$) associated with the jump at $\\mu=0$, observed in the TI surface without magnetism, but its magnitude is reduced. For the $d$-wave case, the magnitude of jump at $\\mu =0$ is preserved but the OZ term decreases as increasing $|\\mu|$.", "url": "https://arxiv.org/abs/2603.09325", "type": "理论", "summary": "交替磁体是一类新型磁体，具有较大的自旋分裂，但总磁矩正在消失。这种非常规的自旋分裂引起了各种特征现象，例如自旋电流的产生。在本文中，我们研究了交流磁体中的轨道-塞曼（OZ）交叉项。具体来说，我们在存在交变磁序参数的情况下考虑三维拓扑绝缘体 (TI) 的 Rashba 金属和表面狄拉克锥。对于 Rashba 金属，$p$ 波阶次参数对 OZ 项仅产生有限的影响，而 $d$ 波阶次参数在阶次参数变得足够大时会导致其符号变化。对于 TI 表面，$p$ 波阶参数保留了 OZ 项的阶跃函数类型依赖性，作为与 $\\mu=0$ 处的跳跃相关的化学势 ($\\mu$) 的函数，在没有磁性的 TI 表面中观察到，但其幅度减小了。对于 $d$ 波情况，$\\mu =0$ 处的跳跃幅度被保留，但 OZ 项随着 $|\\mu|$ 的增加而减小。", "authors": [{"name": "Tomonari Mizoguchi"}, {"name": "Soshun Ozaki"}], "featured_authors": [{"name": "Tomonari Mizoguchi"}, {"name": "Soshun Ozaki"}], "author_count": 2}, {"id": "2603.09362", "category": "cond-mat", "title": "Interplay of Rashba spin-orbit coupling and Coulomb interaction in topological spin-triplet excitonic condensates", "abstract": "The cooperative effect of Rashba spin-orbit coupling (SOC) and Coulomb attraction in stabilizing topological spin-triplet excitonic condensates (ECs) in two-dimensional electron-hole systems in external magnetic field is investigated by using an unrestricted Hartree-Fock approach combined with the random-phase approximation. At weak electron-hole Coulomb interaction, the intraband Rashba SOC induces spin-momentum locking and topological semimetal behavior, while stronger interaction stabilizes spin-triplet ECs. Increasing the valence-band SOC drives a transition from a topologically trivial EC with coexisting spin-up and spin-down components to a topological spin-up EC only with quantized Chern number $C=2$. The dynamical excitonic susceptibility reveals a soft spin-up triplet mode acting as the precursor of the condensate. These results establish a microscopic mechanism for Rashba SOC-induced topological ECs and suggest realistic situations for their realization in noncentrosymmetric Janus transition-metal dichalcogenides and twisted van der Waals heterostructures.", "url": "https://arxiv.org/abs/2603.09362", "type": "理论+数值", "summary": "采用无限制的 Hartree-Fock 方法结合随机相位近似，研究了 Rashba 自旋轨道耦合（SOC）和库仑引力在外磁场中稳定二维电子空穴系统中拓扑自旋三重态激子凝聚体（EC）的协同效应。在弱电子-空穴库仑相互作用下，带内 Rashba SOC 引起自旋动量锁定和拓扑半金属行为，而更强的相互作用则稳定自旋三重态 EC。增加价带 SOC 可以驱动从具有共存自旋向上和自旋向下分量的拓扑平凡 EC 过渡到仅具有量子化陈数 $C=2$ 的拓扑自旋向上 EC。动态激子磁化率揭示了作为凝聚态前体的软自旋三重态模式。这些结果建立了 Rashba SOC 诱导的拓扑 EC 的微观机制，并提出了在非中心对称 Janus 过渡金属二硫属化物和扭曲范德华异质结构中实现它们的现实情况。", "authors": [{"name": "Quoc-Huy Ninh"}, {"name": "Huu-Nha Nguyen"}, {"name": "Van-Nham Phan"}], "featured_authors": [{"name": "Quoc-Huy Ninh"}, {"name": "Huu-Nha Nguyen"}, {"name": "Van-Nham Phan"}], "author_count": 3}, {"id": "2603.09384", "category": "cond-mat", "title": "Dreaming improves memorization in a Hopfield model with bounded synaptic strength", "abstract": "The Hopfield model provides a paradigmatic framework for associative memory. Its classical implementation, based on the Hebbian learning rule, suffers from catastrophic forgetting: when one attempts storing too many patterns, the network fails to retrieve any of them. Yet, the Hebbian rule does not take into account that synaptic strength is bounded. Introducing this biologically plausible modification, known as \"clipping\", eliminates catastrophic forgetting; the model is now able to retrieve the most recently seen memories, eliminating older ones. Yet, its memorization capacity is much reduced with respect to the unclipped case. Here, we investigate the effects of adding a \"dreaming\" phase on the capacity of a clipped Hopfield model. Following a proposal by Hopfield, Feinstein and Palmer, we assume that during the dreaming phase, the model generates random patterns that are then \"unlearned\". We show that while clipping still removes catastrophic forgetting, alternating learning and dreaming phases improves the memorization capacity and makes the search for optimal performance more realistic from an evolutionary perspective.", "url": "https://arxiv.org/abs/2603.09384", "type": "理论", "summary": "霍普菲尔德模型为联想记忆提供了一个范例框架。它基于赫布学习规则的经典实现会遭受灾难性遗忘：当一个人尝试存储太多模式时，网络无法检索其中任何一个。然而，赫布规则没有考虑到突触强度是有限的。引入这种生物学上合理的修改，称为“剪辑”，可以消除灾难性遗忘；该模型现在能够检索最近看到的记忆，消除较旧的记忆。然而，与未剪辑的情况相比，其记忆能力大大降低。在这里，我们研究了添加“做梦”阶段对裁剪霍普菲尔德模型容量的影响。根据霍普菲尔德、范斯坦和帕尔默的提议，我们假设在做梦阶段，模型会生成随机模式，然后“忘记”这些模式。我们表明，虽然剪辑仍然可以消除灾难性遗忘，但学习和做梦阶段的交替提高了记忆能力，并使从进化的角度来看对最佳表现的搜索更加现实。", "authors": [{"name": "Enzo Marinari"}, {"name": "Saverio Rossi"}, {"name": "Francesco Zamponi"}], "featured_authors": [{"name": "Enzo Marinari"}, {"name": "Saverio Rossi"}, {"name": "Francesco Zamponi"}], "author_count": 3}, {"id": "2603.09422", "category": "cond-mat", "title": "Temporal Berry Phase and the Emergence of Bose-Glass-Analog Phase in a Clean U(1) Superfluid", "abstract": "A U(1) nonlinear sigma model (NLSM) with a one-dimensional temporal Berry phase term describes the critical theory of phase-fluctuation-driven superfluid (SF) transitions. We clarify that the temporal Berry phase leads to space-time anisotropic interference in vortex proliferation, resulting in a quasi-disordered phase characterized by short-range spatial order but persistent temporal phase coherence. This phase shares the essential SF phase correlation properties of the Bose Glass phase known from disordered boson systems, suggesting a unified topological origin for the emergence of the glassy phase in phase-fluctuation-driven superfluid transitions.", "url": "https://arxiv.org/abs/2603.09422", "type": "理论", "summary": "具有一维时间 Berry 相项的 U(1) 非线性西格玛模型 (NLSM) 描述了相涨落驱动的超流体 (SF) 转变的临界理论。我们阐明，时间贝里相位会导致涡扩散中的时空各向异性干扰，从而产生以短程空间有序但持续时间相位相干为特征的准无序相位。该相与无序玻色子系统中已知的玻色玻璃相具有基本的 SF 相相关特性，这表明在相涨落驱动的超流体转变中玻璃相的出现具有统一的拓扑起源。", "authors": [{"name": "Ryuichi Shindou"}, {"name": "Pengwei Zhao"}, {"name": "Xiaonuo Fang"}], "featured_authors": [{"name": "Ryuichi Shindou"}, {"name": "Pengwei Zhao"}, {"name": "Xiaonuo Fang"}], "author_count": 3}, {"id": "2603.09469", "category": "cond-mat", "title": "Phase diagram and Ashkin-Teller universality in the classical square-lattice Heisenberg-compass model", "abstract": "We determine the finite-temperature phase diagram and critical behavior of the classical square-lattice Heisenberg-compass model using large-scale Monte Carlo simulations and finite-size scaling. Six symmetry distinct ordered phases are identified. The four phases that simultaneously break the spin-lattice $C_4$ and in-plane spin-inversion symmetries undergo continuous transitions in the Ashkin-Teller universality class, with the associated critical lines terminating at four-state Potts points, beyond which the transitions become first order. In contrast, the two $z$-polarized phases display conventional two-dimensional Ising criticality. Our results reveal how the interplay between Heisenberg exchange and compass anisotropy organizes these distinct critical regimes, thereby completing the characterization of the model's thermal phase transitions.", "url": "https://arxiv.org/abs/2603.09469", "type": "理论+数值", "summary": "我们使用大规模蒙特卡罗模拟和有限尺寸缩放来确定经典方格海森堡罗盘模型的有限温度相图和临界行为。确定了六个对称的不同有序相。同时打破自旋晶格 $C_4$ 和面内自旋反转对称性的四个相在 Ashkin-Teller 普适性类中经历连续跃迁，相关的临界线终止于四态 Potts 点，超过该跃迁变为一阶。相比之下，两个 z$ 偏振相位显示出传统的二维伊辛临界性。我们的结果揭示了海森堡交换和罗盘各向异性之间的相互作用如何组织这些不同的临界状态，从而完成模型热相变的表征。", "authors": [{"name": "Yuchen Fan"}], "featured_authors": [{"name": "Yuchen Fan"}], "author_count": 1}, {"id": "2603.09498", "category": "cond-mat", "title": "Impact of magnetic fields on polaron dynamics in low-dimensional systems", "abstract": "We study the impact of an external magnetic field on the long-range electron transport in quasi-one-dimensional materials, such as polypeptides, (semi-) conducting polymers and macromolecules, taking into account the electron-lattice interaction. At relatively strong electron-lattice interaction extra electrons get self-trapped in the deformation potential well and form stable bound states, called large polarons which in the continuum approximation are known as solitons. Here we do not use the continuum approximation but solve the system of discrete nonlinear equations numerically. We show that the impact of a magnetic field on polaron dynamics depends not only on the field strength, but also on the parameter values of the system which define the properties of solitons such as their energy, amplitude and width of localisation. We also study the impact of a magnetic field on a polaron created by a donor complex on a chain.", "url": "https://arxiv.org/abs/2603.09498", "type": "理论+数值", "summary": "我们研究外部磁场对准一维材料（例如多肽、（半）导电聚合物和大分子）中长程电子传输的影响，并考虑电子-晶格相互作用。在相对较强的电子-晶格相互作用下，额外的电子在变形势阱中自陷并形成稳定的束缚态，称为大极化子，在连续谱近似中称为孤子。这里我们不使用连续统近似，而是对离散非线性方程组进行数值求解。我们表明，磁场对极化子动力学的影响不仅取决于场强，还取决于系统的参数值，这些参数值定义了孤子的特性，例如孤子的能量、振幅和局域宽度。我们还研究了磁场对链上供体复合物产生的极化子的影响。", "authors": [{"name": "Larissa Brizhik"}, {"name": "B.M.A.G. Piette"}], "featured_authors": [{"name": "Larissa Brizhik"}, {"name": "B.M.A.G. Piette"}], "author_count": 2}, {"id": "2603.09500", "category": "cond-mat", "title": "Critical point of the transition between $s_\\pm$ and $s_{++}$ states of a two-band superconductor with nonmagnetic impurities", "abstract": "Behavior of the Grand thermodynamic potential along with its derivatives, entropy and specific heat, is considered within a two-band model of an unconventional $s_\\pm$ superconductor with nonmagnetic impurities. The transition $s_\\pm \\to s_{++}$ is shown to be a smooth crossover at high temperatures, while it becomes the first order phase transition at low temperatures. Thus, on a phase diagram `temperature'-`impurity scattering rate' there appears to be a critical end point. Temperature at which the behavior of the transition is changed is maximal in the Born limit and tends to zero away from the limit, which points out to the possible realization of a quantum phase transition.", "url": "https://arxiv.org/abs/2603.09500", "type": "理论+数值", "summary": "大热力学势及其导数、熵和比热的行为被考虑在具有非磁性杂质的非常规 $s_\\pm$ 超导体的双带模型中。 $s_\\pm \\到 s_{++}$ 的转变在高温下表现为平滑交叉，而在低温下则成为一阶相变。因此，在相图“温度”-“杂质散射率”上似乎存在一个临界终点。转变行为发生改变的温度在玻恩极限内达到最大，并且在远离极限时趋向于零，这表明量子相变的实现是可能的。", "authors": [{"name": "V. A. Shestakov"}, {"name": "M. M. Korshunov"}], "featured_authors": [{"name": "V. A. Shestakov"}, {"name": "M. M. Korshunov"}], "author_count": 2}, {"id": "2603.09570", "category": "cond-mat", "title": "Nonthermal Dynamics and Scar-Like Spectral Structures in a High-Spin Fermi Gas", "abstract": "We investigate nonequilibrium dynamics and weak ergodicity breaking in a harmonically trapped spin-$3/2$ Fermi gas by using the time-dependent Hartree-Fock equation. The Shannon entropy remains bounded and oscillatory throughout the evolution, indicating restricted and nonuniform exploration of Hilbert space rather than immediate thermalization. The fidelity exhibits pronounced, nearly periodic revivals whose period is largely insensitive to particle number and interaction strength, while the revival amplitude gradually decreases with increasing system size and interaction strength. The Fourier spectrum of the fidelity reveals a set of sharp and approximately equally spaced peaks. By projecting the time-evolved state onto the instantaneous eigenbasis of the self-consistent mean-field Hamiltonian, we identify a sparse and spectrally stable manifold that forms a quasi-regular energy ladder, with spacing comparable to the dominant quasienergy interval extracted from the fidelity spectrum. These results indicate that the long-lived coherent oscillations originate from collective phase interference associated with a quasi-regular spectral structure embedded in the many-body continuum, rather than from a conventional eigenstate-dominated scar mechanism.", "url": "https://arxiv.org/abs/2603.09570", "type": "理论+数值", "summary": "我们通过使用与时间相关的 Hartree-Fock 方程来研究调和捕获自旋 $3/2$ 费米气体中的非平衡动力学和弱遍历性破缺。香农熵在整个演化过程中保持有界和振荡，表明希尔伯特空间的探索受到限制和不均匀，而不是立即热化。保真度表现出明显的、近乎周期性的复兴，其周期对粒子数量和相互作用强度基本上不敏感，而复兴幅度随着系统尺寸和相互作用强度的增加而逐渐减小。保真度的傅里叶谱揭示了一组尖锐且近似等距的峰值。通过将时间演化状态投影到自洽平均场哈密顿量的瞬时本征基上，我们确定了一个稀疏且光谱稳定的流形，它形成了准规则能量梯，其间距与从保真度谱中提取的主要准能量区间相当。\n\n这些结果表明，长寿命的相干振荡源自与嵌入多体连续体中的准规则光谱结构相关的集体相位干涉，而不是源自传统的本征态主导的疤痕机制。", "authors": [{"name": "Shuyi Li"}, {"name": "Qiang Gu"}], "featured_authors": [{"name": "Shuyi Li"}, {"name": "Qiang Gu"}], "author_count": 2}, {"id": "2603.09609", "category": "cond-mat", "title": "Analytic treatment of a polaron in a nonparabolic conduction band", "abstract": "We develop and compare several analytical approximations for the polaron problem in finite-width, non-parabolic conduction bands. The main focus of the work is an extension of the Feynman variational method to a tight-binding lattice, where the effective-mass approximation is no longer applicable. The resulting variational formulation is not restricted to a specific phonon dispersion or electron-phonon interaction and provides a uniform description across weak-, intermediate-, and strong-coupling regimes. We revisit and generalize other analytical approaches traditionally formulated for continuum polarons, including canonical transformations and self-consistent Wigner-Brillouin-type approximations. For lattice polarons, these methods exhibit qualitative features absent in the continuum case, such as a nontrivial connection between weak- and strong-coupling limits. We show that an improved Wigner-Brillouin scheme yields a momentum-dependent polaron self-energy free of resonances and in good agreement with numerically exact results over the whole range of momenta within the Brillouin zone. All methods are applied to the Holstein model and are benchmarked against numerically exact calculations, including Diagrammatic Monte Carlo (both our calculations and preceding works), exact diagonalization, and density-matrix renormalization-group results. The analytical approaches are extended to polarons with Rashba-type spin-orbit coupling, providing a stringent test of their applicability in systems with nontrivial band structure. Our results demonstrate that the modified Feynman variational method yields ground-state energies and dispersions with accuracy comparable to, and in many cases exceeding, that of other established analytical approaches. The developed framework offers a versatile and reliable analytical description of lattice polarons beyond the continuum approximation.", "url": "https://arxiv.org/abs/2603.09609", "type": "理论+数值", "summary": "我们开发并比较了有限宽度、非抛物线导带中极化子问题的几种解析近似。这项工作的主要重点是将费曼变分法扩展到紧束缚晶格，其中有效质量近似不再适用。由此产生的变分公式不限于特定的声子色散或电子-声子相互作用，并且提供了弱耦合、中耦合和强耦合机制的统一描述。我们重新审视并概括了传统上为连续极化子制定的其他分析方法，包括规范变换和自洽维格纳-布里渊型近似。对于晶格极化子，这些方法表现出连续介质情况下不存在的定性特征，例如弱耦合极限和强耦合极限之间的重要联系。我们表明，改进的维格纳-布里渊方案产生了无共振的动量相关极化子自能，并且与布里渊区内整个动量范围内的数值精确结果非常一致。\n\n所有方法都应用于荷斯坦模型，并以数值精确计算为基准，包括图解蒙特卡罗（我们的计算和之前的工作）、精确对角化和密度矩阵重整化群结果。分析方法扩展到具有 Rashba 型自旋轨道耦合的极化子，为其在具有非平凡能带结构的系统中的适用性提供了严格的测试。我们的结果表明，改进的费曼变分方法产生的基态能量和色散的精度与其他已建立的分析方法相当，并且在许多情况下超过了其精度。所开发的框架提供了超越连续近似的晶格极化子的通用且可靠的分析描述。", "authors": [{"name": "S. N. Klimin"}, {"name": "J. Tempere"}, {"name": "M. Houtput"}, {"name": "I. Zappacosta"}, {"name": "S. Ragni"}, {"name": "T. Hahn"}, {"name": "L. Celiberti"}, {"name": "C. Franchini"}, {"name": "A. S. Mishchenko"}], "featured_authors": [{"name": "S. N. Klimin"}, {"name": "J. Tempere"}, {"name": "M. Houtput"}, {"name": "L. Celiberti"}, {"name": "C. Franchini"}, {"name": "A. S. Mishchenko"}], "author_count": 9}, {"id": "2603.09620", "category": "cond-mat", "title": "Tunable shear thickening in active non-Brownian suspensions", "abstract": "We study tunable shear thickening in active suspensions of non-Brownian, repulsive, frictional grains using particle-based simulation, finding that activity augments the rheology beyond the friction-mediated shear thickening paradigm. Specifically, increasing particle self-propulsion drives a viscosity-reducing `dethickening' of the system at large stress, where the material would otherwise be in a thickened, highly viscous state. Self-propulsion introduces additional isotropic dynamics to the particles, which compete with the flow-driven formation of frictional contacts. The degree of dethickening can thus be tuned by varying a suitably-defined dimensionless active stress that quantifies this competition. Recognising the parallels between self-propulsion and other contemporary routes to dethickening, we demonstrate that our data obey a recently proposed scaling framework, supporting a universal description of the tunable rheology of dense suspensions.", "url": "https://arxiv.org/abs/2603.09620", "type": "数值", "summary": "我们使用基于粒子的模拟研究了非布朗、排斥、摩擦颗粒的活性悬浮液中的可调剪切增稠，发现活性增强了超出摩擦介导的剪切增稠范式的流变性。具体来说，增加颗粒自推进力会在大应力下驱动系统的粘度降低“去稠化”，否则材料将处于稠化、高粘度状态。自推进给颗粒引入了额外的各向同性动力学，这与流动驱动的摩擦接触形成竞争。因此，可以通过改变适当定义的量化这种竞争的无量纲主动应力来调整减厚程度。认识到自推进和其他当代减稠途径之间的相似之处，我们证明我们的数据遵循最近提出的缩放框架，支持对稠密悬浮液的可调流变学的通用描述。", "authors": [{"name": "Bhanu Prasad Bhowmik"}, {"name": "Christopher Ness"}], "featured_authors": [{"name": "Bhanu Prasad Bhowmik"}, {"name": "Christopher Ness"}], "author_count": 2}, {"id": "2603.09694", "category": "cond-mat", "title": "Asymmetric simple exclusion process with tree-like network branches", "abstract": "The asymmetric simple exclusion process (ASEP) is a fundamental stochastic model describing asymmetric many-particle diffusion with hard-core interactions on a one-dimensional lattice, and has been widely applied in the study of nonequilibrium transport phenomena. Motivated by the modeling of proton transport along oxygen networks in proton-conducting solid oxides, we extend the ASEP to a model defined on a one-dimensional backbone lattice with tree-like network branches. We derive the exact stationary distribution of this network ASEP and investigate its transport properties. By considering two representative network geometries for which physical quantities can be expressed in terms of certain hypergeometric series, we elucidate how the network geometry influences transport properties.", "url": "https://arxiv.org/abs/2603.09694", "type": "理论", "summary": "非对称简单排除过程（ASEP）是描述一维晶格上具有核心相互作用的非对称多粒子扩散的基本随机模型，已广泛应用于非平衡输运现象的研究。受质子传导固体氧化物中沿氧网络的质子传输建模的启发，我们将 ASEP 扩展到在具有树状网络分支的一维主干晶格上定义的模型。我们推导出该网络 ASEP 的精确平稳分布并研究其传输特性。通过考虑两个具有代表性的网络几何形状（其物理量可以用某些超几何级数表示），我们阐明了网络几何形状如何影响传输特性。", "authors": [{"name": "Yuki Ishiguro"}, {"name": "Yasunobu Ando"}], "featured_authors": [{"name": "Yuki Ishiguro"}, {"name": "Yasunobu Ando"}], "author_count": 2}, {"id": "2603.09736", "category": "cond-mat", "title": "Microscopic origin of $p$-wave magnetism", "abstract": "$P$-, $f$-, or $h$-wave antialtermagnets yield large non-relativistic spin splitting with out-of-plane spin polarization in momentum space perpendicular to the coplanar non-collinear local magnetic moments. We provide a microscopic explanation of this unconventional spin polarization by linking it to a previously overlooked site-compensated spin density that orders antiparallel when projected onto opposite momenta. We verify this result both by model derivation of the out-of-plane momentum-space spin polarization being proportional to the direct-space cross product of the coplanar non-collinear spin order, as well as by ab initio calculations in the material candidate CeNiAsO. By providing a general classification and analytic expression for the spin polarization of all spinful two-site tight-binding Hamiltonians, we reveal the momentum-resolved spin polarization as a probe of the Bloch-state geometry arising from spin-site coupling. Furthermore, our approach allows for geometric distinction between ferro-, alter-, and antialtermagnets. Our results provide a quantitative guidance for quantized out-of-plane momentum-space spin polarization and large spin splitting, and construction principles for antialtermagnets.", "url": "https://arxiv.org/abs/2603.09736", "type": "理论+数值", "summary": "$P$-、$f$-或$h$-波反交变磁体在垂直于共面非共线局部磁矩的动量空间中产生大的非相对论性自旋分裂和面外自旋极化。我们通过将这种非常规自旋极化与以前被忽视的位点补偿自旋密度联系起来，提供了对这种非常规自旋极化的微观解释，当投影到相反的动量上时，该自旋密度会排列反平行。我们通过与共面非共线自旋序的直接空间叉积成比例的面外动量空间自旋极化的模型推导以及通过候选材料 CeNiAsO 中的从头计算来验证这一结果。通过为所有自旋二位紧束缚哈密顿量的自旋极化提供一般分类和分析表达式，我们揭示了动量分辨自旋极化作为自旋位点耦合产生的布洛赫态几何的探针。此外，我们的方法允许在铁磁体、交变磁体和反交变磁体之间进行几何区分。\n\n我们的结果为量子化面外动量空间自旋极化和大自旋分裂以及反交变磁体的构造原理提供了定量指导。", "authors": [{"name": "Johannes Mitscherling"}, {"name": "Jan Priessnitz"}, {"name": "Clara K. Geschner"}, {"name": "Libor Šmejkal"}], "featured_authors": [{"name": "Johannes Mitscherling"}, {"name": "Jan Priessnitz"}, {"name": "Clara K. Geschner"}, {"name": "Libor Šmejkal"}], "author_count": 4}, {"id": "2603.09804", "category": "cond-mat", "title": "Efficient method for calculation of low-temperature phase boundaries", "abstract": "Understanding phase stability and phase transformations is central to predicting material behavior under varying thermodynamic conditions. One of the earliest and most influential applications of density functional theory in materials science has been the prediction of pressure-induced phase transitions at 0 K. Extending these calculations to finite temperatures, however, requires accounting for thermal, quantum, and anharmonic contributions to the free energy, often at significant computational cost. In this work, we present a general and efficient framework for calculating low-temperature phase boundaries by combining the Clausius-Clapeyron equation with the quasi-harmonic approximation. This methodology requires a minimal number of calculations, while naturally incorporating internal degrees of freedom and allowing for the inclusion of quantum and low-order anharmonic effects. We illustrate the accuracy and efficiency of the approach by constructing the phase diagram of silica in the pressure range from -2 to 12 GPa and temperatures up to 1750 K. To this end, we employ both density functional theory and a machine-learned interatomic potential, enabling well-converged free energy estimates and a rigorous comparison between first-principles and data-driven models.", "url": "https://arxiv.org/abs/2603.09804", "type": "理论+数值", "summary": "了解相稳定性和相变对于预测不同热力学条件下的材料行为至关重要。密度泛函理论在材料科学中最早和最有影响力的应用之一是预测 0 K 下压力引起的相变。然而，将这些计算扩展到有限温度，需要考虑热、量子和非谐波对自由能的贡献，通常需要大量的计算成本。在这项工作中，我们通过将克劳修斯-克拉佩龙方程与准谐波近似相结合，提出了一个通用且有效的计算低温相边界的框架。这种方法需要最少的计算量，同时自然地结合内部自由度并允许包含量子和低阶非谐效应。我们通过构建压力范围为 -2 至 12 GPa 和温度高达 1750 K 的二氧化硅相图来说明该方法的准确性和效率。\n\n为此，我们采用密度泛函理论和机器学习的原子间势，从而实现良好收敛的自由能估计以及第一原理和数据驱动模型之间的严格比较。", "authors": [{"name": "Lucas Svensson"}, {"name": "Babak Sadigh"}, {"name": "Christine Wu"}, {"name": "Paul Erhart"}], "featured_authors": [{"name": "Lucas Svensson"}, {"name": "Babak Sadigh"}, {"name": "Christine Wu"}, {"name": "Paul Erhart"}], "author_count": 4}, {"id": "2603.09837", "category": "cond-mat", "title": "Disorder-Assisted Adiabaticity in Correlated Many-Particle Systems", "abstract": "We investigate how disorder affects adiabaticity in an interacting quantum system by assessing its effect on the state of the system after an interaction modulation, or interaction ``pulse\" ,whereby the interaction is changed from zero to a maximum value and then back to zero following a given time profile. We find that, independently of the disorder strength and pulse shapes (rectangular, triangular, and Gaussian), the pulse duration is negatively correlated with the change in total energy in the system. That is, the longer duration reduces the change in total energy for each protocol. Most importantly, across different considered pulse shapes, we find a robust negative correlation between the disorder strength and the change in total energy across the interaction pulse. Namely, increasing the disorder strength systematically suppresses the residual energy added to the system after the interaction pulse, indicating a more adiabatic response. These two effects, disorder-induced and duration-induced adiabaticity, are consistently observed across all three pulse shapes. Among the protocols, the triangular pulse yields the smallest change in total energy in the system over comparable conditions, demonstrating the most adiabatic response. In addition to the energy analysis, we also examine how disorder modifies the effective temperature change across the interaction pulse, to further establish a quantitative relation between disorder and the thermal response. Altogether, our results identify disorder as a key factor in both the energy and the temperature variation over the time-modulation of the interaction.", "url": "https://arxiv.org/abs/2603.09837", "type": "理论", "summary": "我们通过评估相互作用调制或相互作用“脉冲”后对系统状态的影响来研究无序如何影响相互作用的量子系统中的绝热性，从而相互作用从零变为最大值，然后在给定的时间曲线后返回到零。我们发现，与无序强度和脉冲形状（矩形、三角形和高斯）无关，脉冲持续时间与系统中总能量的变化呈负相关。也就是说，较长的持续时间会减少最重要的是，在不同的脉冲形状中，我们发现无序强度与相互作用脉冲的总能量变化之间存在强大的负相关性，即，增加无序强度会系统地抑制相互作用脉冲后添加到系统的残余能量，这表明在所有三种脉冲形状中都观察到了更加绝热的响应。\n\n在这些协议中，在可比较的条件下，三角脉冲产生的系统总能量变化最小，表现出最强的绝热响应。除了能量分析之外，我们还研究无序如何改变相互作用脉冲中的有效温度变化，以进一步建立无序与热响应之间的定量关系。总而言之，我们的结果表明，无序是相互作用时间调制过程中能量和温度变化的关键因素。", "authors": [{"name": "Shang-Jie Liou"}, {"name": "Herbert F. Fotso"}], "featured_authors": [{"name": "Shang-Jie Liou"}, {"name": "Herbert F. Fotso"}], "author_count": 2}, {"id": "2603.09841", "category": "cond-mat", "title": "Diffusive flux into a stochastically gated tube", "abstract": "Diffusion-influenced reactions in the presence of gates which randomly open and close have been studied for decades in a variety of biophysical and biochemical scenarios. The diffusive flux from a large bulk reservoir to the end of a narrow tube with a stochastically gated entrance has been previously estimated. In this paper, we extend this gated flux estimate to be valid if (i) the tube is not necessarily narrow and/or (ii) the diffusivity differs in the tube versus the bulk. Extension (i) is challenging because it entails a nontrivial three-dimensional geometry. Extension (ii) is challenging because it introduces multiplicative noise. We derive an explicit flux estimate formula and prove that it is exact in certain parameter regimes. We further use stochastic simulations to show that the estimate remains accurate across a very broad range of parameters. Our results differ from prior work on extensions (i) and (ii).", "url": "https://arxiv.org/abs/2603.09841", "type": "理论+数值", "summary": "数十年来，人们在各种生物物理和生化场景中研究了随机打开和关闭的门存在下的扩散影响的反应。之前已经估计了从大型储层到具有随机门控入口的窄管末端的扩散通量。在本文中，如果（i）管不一定很窄和/或（ii）管与主体的扩散率不同，我们将这种门控通量估计扩展为有效。扩展 (i) 具有挑战性，因为它需要非平凡的三维几何。扩展 (ii) 具有挑战性，因为它引入了乘性噪声。我们推导出一个明确的通量估计公式并证明它在某些参数范围内是准确的。我们进一步使用随机模拟来表明估计在非常广泛的参数范围内仍然准确。我们的结果与之前关于扩展（i）和（ii）的工作不同。", "authors": [{"name": "Sean D Lawley"}], "featured_authors": [{"name": "Sean D Lawley"}], "author_count": 1}, {"id": "2603.09850", "category": "cond-mat", "title": "Non-equilibrium generalized Langevin equation for multi-dimensional observables", "abstract": "The Mori-Zwanzig formalism is a powerful theoretical framework for deriving equations of motion for coarse-grained observables in the form of generalized Langevin equations (GLEs) involving evolution and projection operators. Using a time-dependent many-body Hamiltonian and a multi-dimensional Mori projection operator, we derive a non-equilibrium Mori GLE for a multi-dimensional observable of interest $\\vec{A}$ that consists of a Markovian force, a running integral over time of a non-Markovian friction force, and an orthogonal force that is often interpreted as a random force. We study the structure of the derived GLE in three limiting cases: when the components of $\\vec{A}$ are uncorrelated, when the Hamiltonian is time-independent and thus the system is at equilibrium, and when both conditions are simultaneously satisfied. We highlight the presence of a contribution to the Markovian force that takes the form of an instantaneous friction force which only vanishes when the components of $\\vec{A}$ are uncorrelated. Our non-Markovian framework is an important step towards the systematic modeling of the coupled kinetics of coarse-grained reaction coordinates in biological complex systems, exemplified for the coupled intra- and inter-protein folding during fibril formation of the human islet amyloid polypeptide (IAPP).", "url": "https://arxiv.org/abs/2603.09850", "type": "理论+数值", "summary": "Mori-Zwanzig 形式主义是一个强大的理论框架，用于以涉及演化和投影算子的广义朗之万方程 (GLE) 的形式导出粗粒度可观测量的运动方程。使用依赖于时间的多体哈密顿量和多维 Mori 投影算子，我们为感兴趣的多维可观测量 $\\vec{A}$ 推导了非平衡 Mori GLE，它由马尔可夫力、非马尔可夫摩擦力随时间的运行积分以及通常被解释为随机力的正交力组成。我们在三种极限情况下研究导出的 GLE 的结构：当 $\\vec{A}$ 的分量不相关时、当哈密顿量与时间无关且因此系统处于平衡状态时、以及当两个条件同时满足时。我们强调对马尔可夫力的贡献，其形式为瞬时摩擦力，只有当 $\\vec{A}$ 的分量不相关时才会消失。\n\n我们的非马尔可夫框架是对生物复杂系统中粗粒反应坐标的耦合动力学进行系统建模的重要一步，例如人胰岛淀粉样多肽（IAPP）原纤维形成过程中的耦合蛋白内和蛋白间折叠。", "authors": [{"name": "Benjamin J. A. Héry"}, {"name": "Lucas Tepper"}, {"name": "Andrea Guljas"}, {"name": "Artem Pavlov"}, {"name": "Beate Koksch"}, {"name": "Cecilia Clementi"}, {"name": "Roland R. Netz"}], "featured_authors": [{"name": "Benjamin J. A. Héry"}, {"name": "Lucas Tepper"}, {"name": "Andrea Guljas"}, {"name": "Beate Koksch"}, {"name": "Cecilia Clementi"}, {"name": "Roland R. Netz"}], "author_count": 7}, {"id": "2603.09895", "category": "cond-mat", "title": "Critical behavior of the thermal phase transition of U(1) lattice gauge systems", "abstract": "We model the phase transition of a superconductor as a U(1) lattice gauge system, and determine its critical behavior. For this, we perform Monte Carlo simulations, treating the order parameter field and the gauge field on equal footing, without additional approximations. As the defining correlation function, we determine the order parameter correlation function including a gauge string, thus achieving a gauge-invariant characterization of the long-range behavior explicitly. We obtain a critical exponent $\\beta$ that is consistent with the exponent of the U(1) transition of neutral bosons, i.e. of Bose-Einstein condensation. We determine the critical behavior of the heat capacity, which displays a temperature depends consistent with an XY transition. These results clarify the universality class of the phase transition of this system.", "url": "https://arxiv.org/abs/2603.09895", "type": "理论+数值", "summary": "我们将超导体的相变建模为 U(1) 晶格规范系统，并确定其临界行为。为此，我们执行蒙特卡罗模拟，将阶次参数场和规范场平等对待，无需额外的近似。作为定义相关函数，我们确定包含规范字符串的阶参数相关函数，从而明确地实现了远程行为的规范不变表征。我们得到了一个临界指数 $\\beta$，它与中性玻色子 U(1) 跃迁的指数一致，即玻色-爱因斯坦凝聚的指数。我们确定热容的临界行为，其显示温度取决于 XY 转变。这些结果阐明了该系统相变的普遍性类别。", "authors": [{"name": "Greta Sophie Reese"}, {"name": "Ludwig Mathey"}], "featured_authors": [{"name": "Greta Sophie Reese"}, {"name": "Ludwig Mathey"}], "author_count": 2}, {"id": "2603.09954", "category": "cond-mat", "title": "Stability of flat-band Bose-Einstein condensation from the geometry of compact localized states", "abstract": "We consider Bose-Einstein condensation in flat-band models from a real-space perspective. Using a basis of compact localized states, we reformulate the minimization of the mean-field energy as a Euclidian geometry problem. Within Bogoliubov theory, we show that flat-band models where the solutions to this problem are frameworks consisting of triangles with nonzero area are promising for condensation, whereas for instance square frameworks indicate condensation in a single mode is impossible. When restricting the analysis to Bloch states, this approach can be related to a necessary condition for a non-vanishing quantum distance. This work provides a new perspective on how condensation in flat bands is destabilized, and offers principles for the construction of models where flat-band Bose-Einstein condensation is possible.", "url": "https://arxiv.org/abs/2603.09954", "type": "理论", "summary": "我们从真实空间的角度考虑平带模型中的玻色-爱因斯坦凝聚。使用紧凑局域态的基础，我们将平均场能量的最小化重新表述为欧几里得几何问题。在 Bogoliubov 理论中，我们表明平带模型（该问题的解决方案是由具有非零面积的三角形组成的框架）有希望进行凝聚，而例如方形框架表明单一模式的凝聚是不可能的。当将分析限制在布洛赫态时，这种方法可以与非消失量子距离的必要条件相关。这项工作为平带中的凝聚如何不稳定提供了新的视角，并为构建平带玻色-爱因斯坦凝聚成为可能的模型提供了原理。", "authors": [{"name": "Kukka-Emilia Huhtinen"}], "featured_authors": [{"name": "Kukka-Emilia Huhtinen"}], "author_count": 1}, {"id": "2603.08774", "category": "hep-th", "title": "Quotient Quiver Subtraction -- Classical Groups", "abstract": "Quotient quiver subtraction is a simple combinatorial prescription for gauging Coulomb branch isometry subgroups of 3d $\\mathcal{N}=4$ quiver gauge theories. This paper uses Type IIB brane constructions with $\\mathrm{O5}$ planes to extend the prescription to gauge $\\mathrm{Sp}(n),\\;\\mathrm{SO}(n)$, and $\\mathrm{Sp}(n)$ coupled to a half-hypermultiplet Coulomb branch isometry subgroups of quivers with unitary gauge groups. The gauging procedure is no longer solely a subtraction -- additional steps change the graph type. The method is applied to provide alternative constructions of the Higgs branch of certain SCFTs in higher dimensions.", "url": "https://arxiv.org/abs/2603.08774", "type": "理论", "summary": "商颤动减法是用于测量 3d $\\mathcal{N}=4$ 颤动规范理论的库仑分支等距子群的简单组合处方。本文使用具有 $\\mathrm{O5}$ 平面的 IIB 型膜结构来扩展规范 $\\mathrm{Sp}(n)、\\;\\mathrm{SO}(n)$ 和 $\\mathrm{Sp}(n)$ 耦合到具有酉规范群的箭袋的半超多重态库仑支等距子群。测量过程不再仅仅是减法——额外的步骤会改变图形类型。该方法用于提供某些 SCFT 的希格斯分支在更高维度上的替代结构。", "authors": [{"name": "Sam Bennett"}, {"name": "Amihay Hanany"}, {"name": "Guhesh Kumaran"}], "featured_authors": [{"name": "Sam Bennett"}, {"name": "Amihay Hanany"}, {"name": "Guhesh Kumaran"}], "author_count": 3}, {"id": "2603.08779", "category": "hep-th", "title": "A domain wall bound on anti-de Sitter vacua", "abstract": "We consider anti-de Sitter flux vacua interpolated by flux-changing domain walls. Demanding that the tension of such a domain wall be above the ultraviolet cutoff of the effective description, we derive an upper bound on the anti-de Sitter radius, which we term domain wall bound. It translates into a lower bound on the gravitino mass, thus realizing the gravitino conjecture and the anti-de Sitter distance conjecture of the swampland program. We test the domain wall bound on several examples with a candidate hierarchy of scales: classical flux vacua, racetrack models, LVS and KKLT-like anti-de Sitter vacua. The classical flux vacua and LVS are found to be compatible with the bound. For racetrack and KKLT-like anti-de Sitter vacua, the bound poses a non-trivial constraint on achieving large hierarchies of scales.", "url": "https://arxiv.org/abs/2603.08779", "type": "理论", "summary": "我们考虑通过通量变化磁畴壁插值的反德西特通量真空。要求这种畴壁的张力高于有效描述的紫外线截止，我们推导出反德西特半径的上限，我们将其称为畴壁界限。它转化为引力子质量的下界，从而实现了引力子猜想和沼泽地纲领的反德西特距离猜想。我们使用候选尺度层次结构在几个示例上测试了畴壁边界：经典通量真空、赛道模型、LVS 和类似 KKLT 的反德西特真空。经典的磁通真空和 LVS 被发现与界限兼容。对于赛道和类似 KKLT 的反德西特真空，界限对实现大尺度层次结构构成了重要的约束。", "authors": [{"name": "Niccolò Cribiori"}, {"name": "Antonia Paraskevopoulou"}, {"name": "Thomas Van Riet"}], "featured_authors": [{"name": "Niccolò Cribiori"}, {"name": "Antonia Paraskevopoulou"}, {"name": "Thomas Van Riet"}], "author_count": 3}, {"id": "2603.08783", "category": "hep-th", "title": "Interface Minimal Model Holography and Topological String Theory", "abstract": "We study the dynamics of 2d fermions coupled to 3d Chern-Simons gauge fields. For $SU(N)$ gauge group and fermions in the fundamental representation, the resulting interfaces are closely related to $W_N$ minimal models. We give an holographic description of the interfaces within the A-model Topological String Theory. The model has exotic integrability properties, which allow us to propose an exact holographic match of all sphere correlation functions of meson operators. This construction embeds Minimal Model Holography in String Theory.", "url": "https://arxiv.org/abs/2603.08783", "type": "理论", "summary": "我们研究与 3d Chern-Simons 规范场耦合的 2d 费米子动力学。对于基本表示中的 $SU(N)$ 规范组和费米子，生成的接口与 $W_N$ 最小模型密切相关。我们给出了 A 模型拓扑弦理论中接口的全息描述。该模型具有奇异的可积特性，这使我们能够提出介子算子的所有球体相关函数的精确全息匹配。这种结构将最小模型全息术嵌入到弦理论中。", "authors": [{"name": "Davide Gaiotto"}, {"name": "Keyou Zeng"}], "featured_authors": [{"name": "Davide Gaiotto"}, {"name": "Keyou Zeng"}], "author_count": 2}, {"id": "2603.08784", "category": "hep-th", "title": "A Covariant Formulation of Logarithmic Supertranslations at Spatial Infinity", "abstract": "We investigate the asymptotic symmetries of asymptotically flat spacetimes at spatial infinity. We propose a new symplectic structure and conservative boundary conditions in a polyhomogeneous Beig-Schmidt expansion. The asymptotic symmetries extend the BMS algebra by abelian sectors, notably incorporating regular log-translations and log-supertranslations. The associated charges are finite and conserved, and we show that their algebra admits a central extension between supertranslations and log-supertranslations, and between the singular translations and regular log-translations. Our analysis is compatible with, and extends, both the work of arXiv:1106.4045 and arXiv:2211.10941 : it extends the former by incorporating log-supertranslations, and the latter by allowing both parities of the log-supertranslations in the same phase space. These newly identified symmetries at spatial infinity encode novel physical information that has not been revealed in other regions of asymptotically flat spacetimes, thereby opening the door to new observables to consider at null and timelike infinity.", "url": "https://arxiv.org/abs/2603.08784", "type": "理论", "summary": "我们研究空间无限处渐近平坦时空的渐近对称性。我们在多齐次 Beig-Schmidt 展开中提出了一种新的辛结构和保守边界条件。渐近对称性通过阿贝尔扇区扩展了 BMS 代数，特别是结合了常规对数平移和对数超平移。相关的电荷是有限且守恒的，我们证明它们的代数承认超平移和对数超平移之间以及奇异平移和常规对数平移之间的中心扩展。我们的分析与 arXiv:1106.4045 和 arXiv:2211.10941 的工作兼容并扩展：它通过合并对数超平移来扩展前者，并通过允许同一相空间中对数超平移的奇偶性来扩展后者。这些新发现的空间无限对称性编码了新的物理信息，这些信息在渐近平坦时空的其他区域中尚未揭示，从而为在零和类时无限处考虑新的可观测值打开了大门。", "authors": [{"name": "Florian Girelli"}, {"name": "Simon Langenscheidt"}, {"name": "Giulio Neri"}, {"name": "Christopher Pollack"}, {"name": "Celine Zwikel"}], "featured_authors": [{"name": "Florian Girelli"}, {"name": "Simon Langenscheidt"}, {"name": "Giulio Neri"}, {"name": "Christopher Pollack"}, {"name": "Celine Zwikel"}], "author_count": 5}, {"id": "2603.08794", "category": "hep-th", "title": "All-Loop Renormalization and the Phase of the de Sitter Wavefunction", "abstract": "Cosmological observables of the primordial universe are encoded in the late-time field-theoretic wavefunction. For shift-symmetric scalars in de Sitter, a good approximation for many inflationary models, the wavefunction must be purely real at tree-level. This property is violated by a quantum anomaly in the process of renormalization. As a result, we show that the imaginary part of the wavefunction is fixed by its dependence on the renormalization scale to all loop orders in perturbation theory. This follows from unitarity, locality, dilation isometry and a Bunch-Davies state. The compact relation we uncover for the wavefunction implies an infinite set of relations among correlators of massless fields and their conjugate momenta, which we exemplify at one-loop order.", "url": "https://arxiv.org/abs/2603.08794", "type": "理论", "summary": "原始宇宙的宇宙学可观测值被编码在晚期场论波函数中。对于德西特中的平移对称标量（许多暴胀模型的良好近似），波函数在树级必须是纯实数。重整化过程中的量子异常违反了这一性质。结果，我们表明，波函数的虚部通过其对微扰理论中所有循环阶次的重正化尺度的依赖而被固定。这是由幺正性、局部性、膨胀等距性和 Bunch-Davies 状态得出的。我们为波函数发现的紧凑关系意味着无质量场的相关器及其共轭动量之间的无限关系集，我们以单环阶为例。", "authors": [{"name": "Alexander Farren"}, {"name": "Ciaran McCulloch"}, {"name": "Enrico Pajer"}, {"name": "Xi Tong"}], "featured_authors": [{"name": "Alexander Farren"}, {"name": "Ciaran McCulloch"}, {"name": "Enrico Pajer"}, {"name": "Xi Tong"}], "author_count": 4}, {"id": "2603.08798", "category": "hep-th", "title": "Introduction to Generalized Symmetries", "abstract": "These notes were prepared for a series of intensive lectures delivered at Hokkaido University, Nag
