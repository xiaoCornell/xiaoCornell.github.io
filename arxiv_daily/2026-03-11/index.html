oya University, Kyoto University, and Kyushu University. We begin with a brief review of higher-form symmetries, anomalies, and discrete gauge theories, before introducing non-invertible symmetries in $(1+1)$-dimensional systems. The basic structure of fusion categories is then discussed, including a discussion of categorical analogs of discrete gauging and representation theory. We subsequently turn to $(3+1)$-dimensional theories, where several physical applications of non-invertible symmetries are discussed. These notes are intended to be largely self-contained, and require no prior familiarity with subjects such as conformal field theory or lattice models.", "url": "https://arxiv.org/abs/2603.08798", "type": "理论", "summary": "这些笔记是为北海道大学、名古屋大学、京都大学和九州大学举办的一系列密集讲座准备的。在介绍 $(1+1)$ 维系统中的不可逆对称性之前，我们首先简要回顾更高形式的对称性、反常和离散规范理论。然后讨论融合类别的基本结构，包括离散测量和表示理论的类别类似物的讨论。随后我们转向 $(3+1)$ 维理论，其中讨论了不可逆对称性的几个物理应用。这些注释基本上是独立的，不需要事先熟悉共形场论或晶格模型等主题。", "authors": [{"name": "Justin Kaidi"}], "featured_authors": [{"name": "Justin Kaidi"}], "author_count": 1}, {"id": "2603.08815", "category": "hep-th", "title": "Crystal Melting, Triality and Partition Functions for Toric Calabi-Yau Fourfolds", "abstract": "We extend the study of the recently introduced crystal melting models associated to toric Calabi-Yau 4-folds in several directions. In particular, we investigate in greater detail the structure of these models for general toric CY 4-folds and flavor configurations, using the explicit example of $Q^{1,1,1}$ to illustrate our ideas. To this end, we develop an efficient algorithm for constructing crystals based on periodic quivers. A central goal of this work is to understand the behavior of crystals and their partition functions under triality. We analyze the evolution of crystals along periodic triality cascades and generate detailed data for these systems, including Hasse diagrams, partition functions, and the multiplicities of melting configurations. We introduce the notion of stable variables and show that they lead to the stabilization of the partition functions along cascades. Finally, we define the profile of the crystal partition function and observe that, when expressed in terms of stable variables, it displays interesting behavior. A further motivation for this work is to generate empirical data that may guide the search for a physically motivated generalization of cluster algebras associated with $2d$ (0,2) quiver theories and their triality transformations.", "url": "https://arxiv.org/abs/2603.08815", "type": "理论", "summary": "我们在几个方向上扩展了最近引入的与复曲面 Calabi-Yau 4 倍相关的晶体熔化模型的研究。特别是，我们更详细地研究了一般环面 CY 4 倍和风味配置的这些模型的结构，使用 $Q^{1,1,1}$ 的明确示例来说明我们的想法。为此，我们开发了一种基于周期性颤动构建晶体的有效算法。这项工作的中心目标是了解晶体的行为及其在试验下的配分函数。我们分析晶体沿着周期性试验级联的演化，并生成这些系统的详细数据，包括哈斯图、配分函数和熔化构型的多重性。我们引入了稳定变量的概念，并表明它们导致级联配分函数的稳定性。最后，我们定义了晶体配分函数的轮廓，并观察到，当用稳定变量表示时，它表现出有趣的行为。\n\n这项工作的另一个动机是生成经验数据，这些数据可以指导搜索与 $2d$ (0,2) 颤动理论及其三重性变换相关的簇代数的物理驱动泛化。", "authors": [{"name": "Mario Carcamo"}, {"name": "Sebastián Franco"}], "featured_authors": [{"name": "Mario Carcamo"}, {"name": "Sebastián Franco"}], "author_count": 2}, {"id": "2603.08842", "category": "hep-th", "title": "Universal Planar Abelian Duals for 3d $\\mathcal{N}=2$ Unitary CS-SQCD", "abstract": "We provide an explicit planar Abelian dual for three-dimensional $\\mathcal{N}=2$ $U(N)_k$ SQCD with $F$ fundamental chiral multiplets. This construction covers the entire $(N, F, k)$ parameter space (provided supersymmetry is unbroken), offering a unified framework for the infrared physics of these theories. Our results generalize a recently discovered class of chiral-planar dualities, which were previously limited to the locus $F = 2|k| + 2N$, which is a mass deformation of $\\mathcal{N}=4$ mirror symmetry plus a restricted set of additional mass deformations. By developing a systematic algorithm to track the flow of the dual theory under generic mass deformations, we establish the planar Abelian quiver not merely as a specific dual description, but as a universal tool for analyzing 3d gauge dynamics.", "url": "https://arxiv.org/abs/2603.08842", "type": "理论", "summary": "我们为三维 $\\mathcal{N}=2$ $U(N)_k$ SQCD 提供了一个显式平面阿贝尔对偶，具有 $F$ 基本手征多重态。这种结构覆盖了整个 $(N, F, k)$ 参数空间（假设超对称性未被破坏），为这些理论的红外物理提供了统一的框架。我们的结果概括了最近发现的一类手性平面二元性，这些二元性以前仅限于轨迹 $F = 2|k| + 2N$，这是$\\mathcal{N}=4$镜像对称的质量变形加上一组受限的附加质量变形。通过开发一种系统算法来跟踪一般质量变形下对偶理论的流动，我们将平面阿贝尔箭袋不仅作为特定的对偶描述，而且作为分析 3d 规范动力学的通用工具。", "authors": [{"name": "Sergio Benvenuti"}, {"name": "Riccardo Comi"}, {"name": "Gabriel Pedde Ungureanu"}, {"name": "Simone Rota"}, {"name": "Anant Shri"}], "featured_authors": [{"name": "Sergio Benvenuti"}, {"name": "Riccardo Comi"}, {"name": "Gabriel Pedde Ungureanu"}, {"name": "Simone Rota"}, {"name": "Anant Shri"}], "author_count": 5}, {"id": "2603.08971", "category": "hep-th", "title": "New Construction of Black Hole Solution in Non-Commutative Geometry and their Thermodynamic Properties", "abstract": "We present a new method to construct black hole solutions in non-commutative (NC) gauge theory. First we obtain the NC correction to the Newton potential via the Seiberg-Witten (SW) map, and then solve the Einstein equations in the presence of the resulting NC matter density at first order in the NC parameter. The same procedure is applied to construct a charged solution with NC \\(U(1)\\) symmetry. This method yields an exact black hole solution in NC gauge theory at the stated order and is considerably less cumbersome than other NC gauge theory approaches to gravity. As an application, we analyze the thermodynamic properties of the new solutions: we compute the ADM mass, Hawking temperature, entropy, heat capacity and free energy, both in the absence and in the presence of pressure. Our results show that non-commutativity removes the temperature divergence at the final stage of evaporation and induces a second-order phase transition; in the presence of pressure we recover a Hawking-Page-like phase transition. We then investigate the susceptibility and linear response of the black hole to changes in the NC parameter. Our results show high sensitivity to small changes in the NC parameter for small black holes, while the sensitivity becomes weaker for larger ones. Finally, we study quantum tunneling in this geometry for both thermal and non-thermal radiation, and we investigate the particle-number density and statistical correlations of successive emissions. We find that the NC deformation suppresses the particle-number density and weakens correlations between successive emissions, effectively acting as a barrier to particle escape.", "url": "https://arxiv.org/abs/2603.08971", "type": "理论", "summary": "我们提出了一种在非交换（NC）规范理论中构造黑洞解的新方法。首先，我们通过 Seiberg-Witten (SW) 图获得牛顿势的 NC 修正，然后在 NC 参数中存在一阶 NC 物质密度的情况下求解爱因斯坦方程。应用相同的过程来构建具有 NC \\(U(1)\\) 对称性的带电解。该方法在 NC 规范理论中按规定的顺序产生精确的黑洞解，并且比其他 NC 规范理论的重力方法要简单得多。作为一个应用，我们分析了新解决方案的热力学性质：我们计算了在不存在压力和存在压力的情况下的 ADM 质量、霍金温度、熵、热容和自由能。我们的结果表明，非交换性消除了蒸发最后阶段的温度发散并引起二阶相变；在压力存在的情况下，我们恢复了类似霍金佩奇的相变。然后我们研究黑洞对 NC 参数变化的敏感性和线性响应。\n\n我们的结果表明，小黑洞对 NC 参数的微小变化具有很高的敏感性，而对于较大的黑洞，敏感性会变弱。最后，我们研究了这种几何结构中热辐射和非热辐射的量子隧道效应，并研究了连续发射的粒子数密度和统计相关性。我们发现NC变形抑制了粒子数密度并削弱了连续发射之间的相关性，有效地充当了粒子逃逸的障碍。", "authors": [{"name": "Abdellah Touati"}], "featured_authors": [{"name": "Abdellah Touati"}], "author_count": 1}, {"id": "2603.09013", "category": "hep-th", "title": "Hydrodynamics as cospans of field theories into the BF theory", "abstract": "Hydrodynamics is based on conservation laws of currents: one starts from the conserved currents of the theory describing the microscopic dynamics, and provides an alternative parameterisation of these currents in terms of hydrodynamic variables (density, pressure, velocity, etc.). This paradigm has recently been extended to incorporate higher-form symmetries. The conservation law of the $p$-form conserved currents can be regarded as the equations of motion of a $BF$ theory that treats the currents as fundamental fields. We argue that the hydrodynamic approximation to a microscopic theory can be regarded as a cospan of differential graded manifolds $X_\\mathrm{micro}\\to X_{BF}\\leftarrow X_\\mathrm{hydro}$, where $X_\\mathrm{micro}$ and $X_\\mathrm{hydro}$ describe the microscopic and hydrodynamic theories, respectively, and $X_{BF}$ describes the $BF$ theory of conserved currents.", "url": "https://arxiv.org/abs/2603.09013", "type": "理论", "summary": "流体动力学基于流守恒定律：从描述微观动力学的理论的守恒流开始，并根据流体动力学变量（密度、压力、速度等）提供这些流的替代参数化。这种范式最近已扩展到包含更高形式的对称性。 $p$形式守恒电流的守恒定律可以被视为将电流视为基本场的$BF$理论的运动方程。我们认为，微观理论的流体动力学近似可以被视为微分分级流形 $X_\\mathrm{micro}\\ 到 X_{BF}\\leftarrow X_\\mathrm{Hydro}$ 的余跨，其中 $X_\\mathrm{micro}$ 和 $X_\\mathrm{Hydro}$ 分别描述微观理论和流体动力学理论，$X_{BF}$ 描述守恒电流的 $BF$ 理论。", "authors": [{"name": "Simon Jonsson"}, {"name": "Hyungrok Kim"}], "featured_authors": [{"name": "Simon Jonsson"}, {"name": "Hyungrok Kim"}], "author_count": 2}, {"id": "2603.09169", "category": "hep-th", "title": "Photon spheres and bulk probes in $\\text{AdS}_3$/$\\text{CFT}_2$: the quantum BTZ black hole", "abstract": "The entanglement entropy in $d+1$ dimensional conformal field theories can be calculated using the area of $d$ dimensional minimal surfaces in $AdS_{d+2}$. Therefore, the existence of surfaces anchored in the boundary of an asymptotically anti-de Sitter (AdS) spacetime is crucial for the calculation of entanglement entropy. In particular, in $d=3$ the extremal surfaces are geodesics with two ends in the boundary. In the Schwarzschild-AdS black hole the space-like geodesics can connect timelike-separated points by winding around the horizon multiple times. This result can be extended to other asymptotically AdS spacetimes. Moreover, for geodesics joining time-like separated points, if there is a photon ring then the timelike entanglement entropy in the $AdS_3/CFT_2$ will not have an imaginary part. We present an exhaustive analysis about the existence of geodesics anchored in the boundary of the three dimensional quantum BTZ (quBTZ) black hole and its charged counterpart. We found conditions for the existence of geodesics with two ends in the boundary in all branches of the quBTZ and determine the type of distance between the points in the boundary. We use a criteria for the existence of light rings to shed some light over the conjecture for spacetimes that are spherically symmetric and have a photon sphere: there are always points with time-like separation that can be connected by space-like or null geodesics.", "url": "https://arxiv.org/abs/2603.09169", "type": "理论", "summary": "$d+1$ 维共形场论中的纠缠熵可以使用 $AdS_{d+2}$ 中 $d$ 维最小曲面的面积来计算。因此，锚定在渐近反德西特（AdS）时空边界上的表面的存在对于纠缠熵的计算至关重要。特别是，在 $d=3$ 中，极值表面是两端位于边界的测地线。在史瓦西-AdS黑洞中，类空间测地线可以通过多次绕地平线缠绕来连接类时分离的点。这个结果可以推广到其他渐近 AdS 时空。此外，对于连接类时分离点的测地线，如果存在光子环，则 $AdS_3/CFT_2$ 中的类时纠缠熵将不会有虚部。我们对三维量子 BTZ (quBTZ) 黑洞及其带电对应物边界中锚定的测地线的存在进行了详尽的分析。我们在quBTZ的所有分支中找到了边界上有两端的测地线存在的条件，并确定了边界上点之间的距离类型。\n\n我们使用光环存在的标准来阐明球对称且具有光子球体的时空猜想：总是存在具有类时间分离的点，可以通过类空间或零测地线将其连接起来。", "authors": [{"name": "Oscar Lasso Andino"}, {"name": "Axel León-Arteaga"}, {"name": "Guillermo Ramírez-Ulloa"}], "featured_authors": [{"name": "Oscar Lasso Andino"}, {"name": "Axel León-Arteaga"}, {"name": "Guillermo Ramírez-Ulloa"}], "author_count": 3}, {"id": "2603.09322", "category": "hep-th", "title": "Scheme dependence and instability of double-trace deformations for gauge fields in AdS$_5$", "abstract": "In holography, double-trace deformations provide a general framework for deforming boundary field theories. In particular, they can be utilized to introduce dynamical gauge fields in the boundary theory through double-trace deformations of bulk gauge fields. In this work, we study this construction in the case where the bulk geometry is asymptotically AdS$_5$, and find that such a system involves tachyon and ghost modes. This instability originates from the logarithmic behavior of the gauge fields in the vicinity of the AdS boundary, which leads to a scheme-dependent ambiguity in the double-trace deformation. We investigate this instability by using both analytical and numerical methods in several holographic setups, including bottom-up models and the top-down D3-D7 construction.", "url": "https://arxiv.org/abs/2603.09322", "type": "理论", "summary": "在全息术中，双迹变形为变形边界场理论提供了通用框架。特别是，它们可用于通过体积规范场的双迹变形在边界理论中引入动态规范场。在这项工作中，我们在体几何渐近 AdS$_5$ 的情况下研究了这种结构，并发现这样的系统涉及快子和幽灵模式。这种不稳定性源于 AdS 边界附近规范场的对数行为，这导致双迹变形中依赖于方案的模糊性。我们通过在几种全息设置中使用分析和数值方法来研究这种不稳定性，包括自下而上的模型和自上而下的 D3-D7 结构。", "authors": [{"name": "Shuta Ishigaki"}, {"name": "Masataka Matsumoto"}], "featured_authors": [{"name": "Shuta Ishigaki"}, {"name": "Masataka Matsumoto"}], "author_count": 2}, {"id": "2603.09438", "category": "hep-th", "title": "Renormalisation and matching of massless scalar correlation functions in Soft de Sitter Effective Theory", "abstract": "For light and massless scalar fields, cosmological correlation functions suffer from infrared divergences and secular logarithms. Soft de Sitter Effective Theory (SdSET) has been proposed by Cohen and Green as the effective description of the non-trivial dynamics of long-wavelength modes $k_{\\rm phys} < H$ in de Sitter space, which is responsible for the infrared and late-time logarithms, and as a systematic extension of the stochastic approach. In this article, we construct SdSET in dimensional regularisation, including an initial-condition functional. We demonstrate by examples that renormalisation and matching works as for flat-space effective field theories. Adopting massless $\\kappa \\phi^4$ theory as the UV theory, we match the tree-level trispectrum and six-point function, and the one-loop power spectrum to SdSET, verifying explicitly that SdSET is the appropriate effective field theory for the quantum dynamics of superhorizon modes.", "url": "https://arxiv.org/abs/2603.09438", "type": "理论", "summary": "对于光和无质量标量场，宇宙学相关函数会受到红外发散和长期对数的影响。软德西特有效理论（SdSET）由 Cohen 和 Green 提出，作为德西特空间中长波长模式 $k_{\\rm phys} < H$ 的非平凡动力学的有效描述，该空间负责红外和后期对数，并且作为随机方法的系统扩展。在本文中，我们在维度正则化中构造 SdSET，包括初始条件泛函。我们通过例子证明重整化和匹配适用于平坦空间有效场论。采用无质量$\\kappa \\phi^4$理论作为UV理论，将树级三谱和六点函数以及单环功率谱与SdSET相匹配，明确验证了SdSET是适用于超视界模量子动力学的有效场理论。", "authors": [{"name": "Martin Beneke"}, {"name": "Patrick Hager"}, {"name": "Andrea F. Sanfilippo"}], "featured_authors": [{"name": "Martin Beneke"}, {"name": "Patrick Hager"}, {"name": "Andrea F. Sanfilippo"}], "author_count": 3}, {"id": "2603.09520", "category": "hep-th", "title": "Operator Renormalization using Emergent Supersymmetries", "abstract": "We develop a mechanism that enables supersymmetric Ward identities to be applied in non-supersymmetric theories. These identities are then used to streamline calculations in our target theories, potentially including phenomenological models. In these proceedings, we illustrate the method through operator renormalization in the Gross-Neveu-Yukawa model, where it leads to a significant optimization and a substantial reduction in computational effort. This serves as a toy example of the procedure that we ultimately aim to apply to Quantum Chromodynamics.", "url": "https://arxiv.org/abs/2603.09520", "type": "理论", "summary": "我们开发了一种机制，使超对称沃德恒等式能够应用于非超对称理论。然后，这些恒等式被用来简化我们目标理论中的计算，可能包括现象学模型。在这些过程中，我们通过 Gross-Neveu-Yukawa 模型中的算子重整化来说明该方法，该方法可实现显着的优化并大幅减少计算量。这是我们最终旨在应用于量子色动力学的过程的玩具示例。", "authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Sven-Olaf Moch"}], "featured_authors": [{"name": "Mrigankamauli Chakraborty"}, {"name": "Sven-Olaf Moch"}], "author_count": 2}, {"id": "2603.09586", "category": "hep-th", "title": "Duality and Dilaton", "abstract": "We review and elaborate on the issue of the dilaton transformation under the usual $r \\rightarrow \\alpha'/r$ target space duality and its non-static generalization (or $\\sigma$-model duality). It is found that the transformation law $r \\rightarrow \\alpha'/r$, $\\phi \\rightarrow \\phi - \\ln(r/\\sqrt{\\alpha'})$ which guarantees duality at the one-loop $\\sigma$-model level should be modified at two (and higher) loop order. The non-static duality is illustrated on the example of cosmological solutions in $D \\ge 2$ with time-dependent radii of space torus.", "url": "https://arxiv.org/abs/2603.09586", "type": "理论", "summary": "我们回顾并详细阐述了通常的 $r \\rightarrow \\alpha'/r$ 目标空间对偶及其非静态泛化（或 $\\sigma$-模型对偶）下的膨胀变换问题。发现保证单循环 $\\sigma$ 模型级别对偶性的变换定律 $r \\rightarrow \\alpha'/r$, $\\phi \\rightarrow \\phi - \\ln(r/\\sqrt{\\alpha'})$ 应该在两个（和更高）循环阶数下进行修改。非静态对偶性以 $D \\ge 2$ 中具有随时间变化的空间环半径的宇宙学解为例进行说明。", "authors": [{"name": "A.A. Tseytlin"}], "featured_authors": [{"name": "A.A. Tseytlin"}], "author_count": 1}, {"id": "2603.09591", "category": "hep-th", "title": "Non-invertible symmetries and selection rules for RG flows of coset models", "abstract": "We analyze superselection sectors, non-invertible symmetries and selection rules for RG flows triggered via perturbations of a UV two-dimensional conformal field theory (CFT$_2$). To this end we describe a method whose input is the local data, and whose output is the set of submodels of the modular invariant completions. We explain how this output set provides a classification of superselection sectors (DHR categories and Q-systems) and of topological defect lines, leading to a unified and potentially complete approach to selection rules for RG flows. This method is applied to scenarios in which the UV is a coset or a parafermion model. For these CFT$_2$ we explicitly find all submodels of the diagonal modular invariants. Our results gives selection rules that unify several known facts about such RG flows, while also allowing us to find new aspects.", "url": "https://arxiv.org/abs/2603.09591", "type": "理论", "summary": "我们分析了通过 UV 二维共形场理论 (CFT$_2$) 的扰动触发的 RG 流的超选择扇区、不可逆对称性和选择规则。为此，我们描述了一种方法，其输入是本地数据，其输出是模不变补全的子模型集。我们解释该输出集如何提供超选择扇区（DHR 类别和 Q 系统）和拓扑缺陷线的分类，从而为 RG 流的选择规则提供统一且可能完整的方法。该方法适用于UV为陪集或parafermion模型的场景。对于这些 CFT$_2$，我们明确找到对角模不变量的所有子模型。我们的结果给出了选择规则，统一了有关此类 RG 流的几个已知事实，同时也使我们能够发现新的方面。", "authors": [{"name": "Valentin Benedetti"}, {"name": "Paul Fendley"}, {"name": "Javier M. Magan"}], "featured_authors": [{"name": "Valentin Benedetti"}, {"name": "Paul Fendley"}, {"name": "Javier M. Magan"}], "author_count": 3}, {"id": "2603.09656", "category": "hep-th", "title": "Kaluza-Klein mode mixing in braneworlds: constraints on scalar absorption and physical degrees of freedom", "abstract": "We investigate the mixing between Kaluza-Klein (KK) modes for a bulk U(1) gauge field within braneworld models. By demanding orthonormality and completeness for the KK basis functions, we demonstrate that the decoupling of mixed sectors, specifically of the vector-scalar and scalar-scalar types, imposes stringent constraints on the warp factors of codimension-d (d>1) backgrounds. We show that the gauge invariance of the four-dimensional effective action is preserved despite such mixing, manifesting as an intrinsic property of the massive vector KK sector. However, the generic presence of vector-scalar mixing fundamentally alters the absorption mechanism of the scalar modes, dynamically shifting the physical masses of the vector KK modes away from their unperturbed eigenvalues. In (4+2)-dimensional models, the existence of two distinct scalar sectors significantly enriches the mixing dynamics. As the massive vectors absorb only specific linear combinations of these scalars, a residual set of massive scalar KK modes persists as physical degrees of freedom.", "url": "https://arxiv.org/abs/2603.09656", "type": "理论", "summary": "我们研究了膜世界模型中体 U(1) 规范场的 Kaluza-Klein (KK) 模式之间的混合。通过要求 KK 基函数的正交性和完整性，我们证明了混合扇区的解耦，特别是矢量标量和标量标量类型的解耦，对余维 d (d>1) 背景的扭曲因子施加了严格的约束。我们证明，尽管存在这种混合，四维有效作用的规范不变性仍然保留，表现为大矢量 KK 扇区的固有属性。然而，矢量-标量混合的普遍存在从根本上改变了标量模式的吸收机制，动态地将矢量 KK 模式的物理质量偏离其未受扰动的特征值。在 (4+2) 维模型中，两个不同标量扇区的存在显着丰富了混合动力学。由于大量矢量仅吸收这些标量的特定线性组合，因此大量标量 KK 模式的剩余集合将作为物理自由度持续存在。", "authors": [{"name": "Wen-Xuan Ma"}, {"name": "Chun-E Fu"}], "featured_authors": [{"name": "Wen-Xuan Ma"}, {"name": "Chun-E Fu"}], "author_count": 2}, {"id": "2603.09763", "category": "hep-th", "title": "Capacity of Entanglement and Replica Backreaction in RST Gravity", "abstract": "We compute the capacity of entanglement in two dimensional dilaton gravity in a setting where Hawking radiation, backreaction, and islands can be treated analytically. Our focus is the eternal black hole of the Russo Susskind Thorlacius model coupled to N conformal matter fields. Unlike previous gravitational computations, which were mostly carried out in JT gravity, the RST model forces one to deal with a genuinely dynamical conformal factor and with the global constraints of the replica construction. The main technical step is therefore to solve the replica deformation on the orbifold globally at first order near n=1, including the homogeneous sector fixed by single valuedness and by the requirement of a fixed microcanonical state. For a single interval we obtain a time independent generalized capacity, parallel to the generalized entropy. For two intervals, even in the late time factorization regime, the global solution generates an interaction term between replica fixed points; after Lorentzian continuation this produces a time dependent capacity on the two QES saddle, despite the corresponding entropy plateau. We discuss the regime of validity of the resulting expressions and explain how the large size of the two QES capacity implies a highly non uniform saddle competition near n=1, providing a concrete mechanism for sharp features of the capacity at the Page transition.", "url": "https://arxiv.org/abs/2603.09763", "type": "理论", "summary": "我们在可以分析处理霍金辐射、反反应和岛屿的环境中计算二维膨胀引力中的纠缠能力。我们的重点是 Russo Susskind Thorlacius 模型的永恒黑洞与 N 个共形物质场的耦合。与以前的引力计算（主要在 JT 引力中进行）不同，RST 模型迫使人们处理真正的动态共形因子和复制品构造的全局约束。因此，主要的技术步骤是解决n=1附近的一阶全局轨道折叠上的副本变形，包括由单值和固定微规范状态的要求固定的同质扇区。对于单个区间，我们获得与时间无关的广义容量，与广义熵平行。对于两个间隔，即使在后期时间分解机制中，全局解也会生成副本不动点之间的交互项；在洛伦兹延拓之后，尽管存在相应的熵平台，但这会在两个 QES 鞍上产生时间依赖性容量。\n\n我们讨论了所得表达式的有效性机制，并解释了两个 QES 容量的大尺寸如何意味着 n=1 附近高度不均匀的鞍点竞争，为页面转换时容量的尖锐特征提供了具体机制。", "authors": [{"name": "Raúl Arias"}, {"name": "Daniel Fondevila"}], "featured_authors": [{"name": "Raúl Arias"}, {"name": "Daniel Fondevila"}], "author_count": 2}, {"id": "2603.09799", "category": "hep-th", "title": "The scheme independent 3-sphere free energy is not a monotone F-function", "abstract": "We study the natural scheme-independent quantity obtained from the three-sphere partition function of a $(2+1)$-dimensional quantum field theory by removing all local counterterm ambiguities. At conformal fixed points this quantity equals the standard $F$-theorem invariant. Conformal perturbation theory shows that it locally decreases at $O(g^2)$ under any relevant scalar deformation of a three-dimensional CFT. However, an exact analysis of the free massive scalar on $S^3$ shows that this sphere-free-energy interpolant is not monotone along the full renormalization-group flow: it dips below its infrared value and then returns to it. Thus the natural counterterm-subtracted quantity built from sphere thermodynamics is not, by itself, a monotone $F$-function. We trace the obstruction to the second-order differential operator required to eliminate the local ambiguities.", "url": "https://arxiv.org/abs/2603.09799", "type": "理论", "summary": "我们通过消除所有局部反项歧义来研究从 $(2+1)$ 维量子场论的三球配分函数获得的自然格式无关量。在共形不动点，该量等于标准 $F$ 定理不变量。共形微扰理论表明，在三维 CFT 的任何相关标量变形下，它都会以 $O(g^2)$ 局部减小。然而，对 $S^3$ 上自由质量标量的精确分析表明，这个球体自由能插值沿着完整的重正化群流并不是单调的：它下降到其红外值以下，然后返回到该红外值。因此，从球体热力学构建的自然反项减去量本身并不是单调 $F$ 函数。我们将障碍追溯到消除局部模糊性所需的二阶微分算子。", "authors": [{"name": "Giacomo Santoni"}, {"name": "Francesco Scardino"}], "featured_authors": [{"name": "Giacomo Santoni"}, {"name": "Francesco Scardino"}], "author_count": 2}, {"id": "2603.09816", "category": "hep-th", "title": "A Swampland-modified Hod bound for charged black holes with exotic matter", "abstract": "In this paper, we study the quasinormal modes (QNMs) of a charged black hole in the presence of both quintessence and a cloud of strings using the Pade-averaged higher-order WKB approximation method. We investigate the effect of the quintessence parameter $\\alpha$ and the cloud of strings parameter $\\lambda$ on the stability as well as the oscillation frequency of perturbations. The validity of Hod's conjecture, which relates quasinormal frequencies to the black hole temperature, is tested throughout the physically allowed parameter space. Our results show that both the effective potential and the decay rate of perturbations depend on the values of $\\alpha$ and $\\lambda$, leading to either enhancement or suppression of the conditions required to satisfy Hod's bound. Furthermore, we discuss how these parameters modify the black hole shadow and the corresponding energy emission rate, revealing correlations with observable signatures. Finally, we establish a connection with the Swampland Distance Conjecture by expressing the Hawking temperature in terms of the scalar field excursion. Our analysis leads to a modified Hod bound and identifies a region of parameter space in which both the modified Hod bound and the Swampland constraints are simultaneously satisfied, ensuring consistency between black hole thermodynamics, observational properties, and quantum gravity constraints.", "url": "https://arxiv.org/abs/2603.09816", "type": "理论", "summary": "在本文中，我们使用帕德平均高阶 WKB 近似方法研究了在本质和弦云存在的情况下带电黑洞的准正规模式 (QNM)。我们研究了精华参数 $\\alpha$ 和弦云参数 $\\lambda$ 对稳定性以及扰动振荡频率的影响。霍德猜想的有效性，将准正常频率与黑洞温度联系起来，在整个物理允许的参数空间中进行了测试。我们的结果表明，扰动的有效势和衰减率都取决于 $\\alpha$ 和 $\\lambda$ 的值，从而导致满足 Hod 界限所需的条件的增强或抑制。此外，我们讨论了这些参数如何修改黑洞阴影和相应的能量发射率，揭示与可观测特征的相关性。最后，我们通过用标量场偏移表示霍金温度，与沼泽距离猜想建立了联系。\n\n我们的分析得出了修改后的霍德界限，并确定了参数空间的一个区域，其中修改后的霍德界限和沼泽约束都同时满足，确保了黑洞热力学、观测特性和量子引力约束之间的一致性。", "authors": [{"name": "S. Saoud"}, {"name": "M.A Rbah"}, {"name": "R. Sammani"}, {"name": "E. H. Saidi"}, {"name": "R. Ahl Laamara"}], "featured_authors": [{"name": "S. Saoud"}, {"name": "M.A Rbah"}, {"name": "R. Sammani"}, {"name": "E. H. Saidi"}, {"name": "R. Ahl Laamara"}], "author_count": 5}, {"id": "2603.09817", "category": "hep-th", "title": "How Heavy Can Moduli Be?", "abstract": "In Kaluza-Klein (KK) compactification of gravitational theories, moduli fields, which are scalar fields associated to the deformations of the compact manifold, are typically lighter than the KK gravitons. However, a universal limit on their mass does not seem to exist. We provide numerical evidence that a light scalar particle, with mass ratio to the first KK graviton $(m_{\\rm sc}/m_{1KK})^2 \\leq {4/3}$, is necessary for the consistency of the $4d$ effective theory of KK gravitons. This can be interpreted as a limit on how rigidly the compact manifold can be stabilized.", "url": "https://arxiv.org/abs/2603.09817", "type": "理论", "summary": "在卡鲁扎-克莱因 (KK) 引力理论的紧化中，模场（与紧流形变形相关的标量场）通常比 KK 引力子轻。然而，它们的质量似乎并不存在普遍的限制。我们提供了数值证据，表明轻标量粒子与第一个 KK 引力子的质量比为 $(m_{\\rm sc}/m_{1KK})^2 \\leq {4/3}$，对于 KK 引力子 $4d$ 有效理论的一致性是必要的。这可以解释为对紧凑型歧管的稳定程度的限制。", "authors": [{"name": "Mehrdad Mirbabayi"}, {"name": "Giovanni Villadoro"}], "featured_authors": [{"name": "Mehrdad Mirbabayi"}, {"name": "Giovanni Villadoro"}], "author_count": 2}, {"id": "2603.09856", "category": "hep-th", "title": "Equilibrium Partition Function of Non-Relativistic CFTs in Harmonic Trap", "abstract": "We investigate the equilibrium partition function of non-relativistic conformal field theories in harmonic quantization. We first analyze the hydrodynamic regime and show that, at leading order, the partition function exhibits a universal structure determined by the equation of state: the logarithm of the partition function develops simple poles in $\\omega^2-\\Omega_a^2$, where $\\omega$ is the harmonic trapping frequency and $\\Omega_a$ are angular velocities acting as chemical potentials for angular momentum. The corresponding residue is determined by a single-variable function of $\\mu/T$, with $\\mu$ the particle-number chemical potential and $T$ the temperature. We then study the large-angular-momentum limit $\\Omega_a\\to\\omega$. In this regime centrifugal effects nearly cancel the trapping potential, and the logarithm of the partition function again exhibits simple poles in $\\omega^2-\\Omega_a^2$, but with a less universal residue depending separately on $\\mu/T$ and $\\omega/T$. As explicit examples we analyze superfluid systems realizable in cold-atom experiments, in particular fermions at unitarity confined in a harmonic trap.", "url": "https://arxiv.org/abs/2603.09856", "type": "理论", "summary": "我们研究了谐波量化中非相对论共形场论的平衡配分函数。我们首先分析了流体动力学状态，并表明，在前导阶上，配分函数表现出由状态方程确定的通用结构：配分函数的对数在 $\\omega^2-\\Omega_a^2$ 中形成简单极点，其中 $\\omega$ 是谐波捕获频率，$\\Omega_a$ 是充当角动量化学势的角速度。相应的残基由单变量函数 $\\mu/T$ 确定，其中 $\\mu$ 为粒子数化学势，$T$ 为温度。然后我们研究大角动量极限$\\Omega_a\\to\\omega$。在这种情况下，离心效应几乎消除了捕获势，配分函数的对数再次在 $\\omega^2-\\Omega_a^2$ 中呈现简单极点，但具有不太通用的残差，分别取决于 $\\mu/T$ 和 $\\omega/T$。作为明确的例子，我们分析了冷原子实验中可实现的超流体系统，特别是在谐波陷阱中限制的幺正性费米子。", "authors": [{"name": "Eunwoo Lee"}], "featured_authors": [{"name": "Eunwoo Lee"}], "author_count": 1}, {"id": "2603.09887", "category": "hep-th", "title": "Dynamics and interaction of solitons in the BPS limit and their internal modes", "abstract": "The main objective of this thesis has been to analyse soliton dynamics in detail, with special attention paid to the role of the internal modes associated with these configurations. Specifically, the thesis has focused on the study of one- and two-dimensional models, with the aim of developing a solid basis that can then be extended to the study in three-dimensional theories. This thesis concentrates on the study of kinks, oscillons, vortices, and sphalerons. Nevertheless, field theories constitute systems with an infinite number of degrees of freedom, which poses challenges both for obtaining analytical results and for predictive modeling. To address these challenges, this thesis employs the construction of effective models that retain the essential degrees of freedom required to capture the phenomenology observed in numerical simulations of the full theory, using the well-known collective coordinate method. In addition, other complementary mathematical tools, such as perturbative techniques, have also been employed. Among the main achievements of this doctoral thesis, it is worth highlighting the introduction, for the first time, of genuine radiation modes within the collective coordinate framework. Furthermore, a generalisation of Samols' moduli space metric for local vortices in the Abelian-Higgs model has been developed through the incorporation of vibrational degrees of freedom. Additionally, a new class of sphalerons that we have coined semi-BPS sphalerons has been identified and analysed. Finally, the role of oscillatory internal modes in the decay process of sphalerons has been studied in detail, leading to the proposal of a dynamic stabilisation mechanism. This mechanism has been further explained and extended to more general models, demonstrating the robustness and potential applicability of this phenomenon to physically relevant theories.", "url": "https://arxiv.org/abs/2603.09887", "type": "理论", "summary": "本论文的主要目标是详细分析孤子动力学，特别关注与这些配置相关的内部模式的作用。具体来说，本文重点研究一维和二维模型，旨在为三维理论的研究奠定坚实的基础。本论文集中研究扭结、振荡、涡流和螺角。然而，场论构成了具有无限自由度的系统，这对获得分析结果和预测建模都提出了挑战。为了应对这些挑战，本文采用了有效的模型构建，这些模型保留了捕获在完整理论的数值模拟中观察到的现象学所需的基本自由度，并使用了众所周知的集体坐标方法。此外，还采用了其他补充数学工具，例如微扰技术。\n\n在这篇博士论文的主要成果中，值得强调的是，首次在集体坐标框架内引入了真正的辐射模式。此外，通过结合振动自由度，对阿贝尔-希格斯模型中局部涡流的萨莫尔斯模空间度量进行了推广。此外，我们还对一类新的 sphaleron 进行了识别和分析，我们将其称为半 BPS sphaleron。最后，详细研究了振荡内部模式在球体衰变过程中的作用，从而提出了动态稳定机制。这种机制已得到进一步解释并扩展到更通用的模型，证明了这种现象对物理相关理论的稳健性和潜在适用性。", "authors": [{"name": "S. Navarro-Obregón"}], "featured_authors": [{"name": "S. Navarro-Obregón"}], "author_count": 1}, {"id": "2603.09935", "category": "hep-th", "title": "One-loop mass corrections of interacting string states", "abstract": "The free string spectrum is highly degenerate, with a degeneracy that grows exponentially with the mass. Turning on a non-vanishing string coupling $g_s$ introduces interactions, rendering massive string states unstable and allowing them to decay into lower-mass states, with mixing constrained by Lorentz invariance. This behavior is expected already at one-loop level. The imaginary part of the one-loop mass correction is related to the width of the decay into two lower-mass states at tree level, whereas the real part is generally IR-divergent and needs regularization and renormalization. The analysis simplifies for states in the first Regge trajectory. In particular, we consider the one-loop mass corrections for these states in the NS-NS sector of Type-II string theories. We explicitly construct the related vertex operators and exploit the properties of elliptic functions in order to obtain a closed form expression for the integral over the insertion point. We further regularize the divergences of the integral over the modular parameter of the torus by means of the $i\\varepsilon$-prescription in string theory. Finally we extract numerical results for the mass correction up to level $N=4$.", "url": "https://arxiv.org/abs/2603.09935", "type": "理论", "summary": "自由弦谱是高度简并的，简并度随着质量呈指数增长。打开非消失弦耦合 $g_s$ 会引入相互作用，使大量弦状态不稳定并允许它们衰减到较低质量状态，同时混合受洛伦兹不变性约束。这种行为在单循环级别就已是预期的。单环质量校正的虚部与树级别衰减到两个较低质量状态的宽度有关，而实部通常是 IR 发散的，需要正则化和重正化。该分析简化了第一 Regge 轨迹中的状态。特别是，我们考虑了 II 型弦理论 NS-NS 扇区中这些状态的单环质量修正。我们显式地构造相关的顶点算子并利用椭圆函数的性质，以获得插入点上积分的封闭形式表达式。我们通过弦理论中的 $i\\varepsilon$ 规定进一步规范了环面模参数上积分的散度。\n\n最后，我们提取质量校正的数值结果，最高可达 $N=4$ 水平。", "authors": [{"name": "Lorenzo Grimaldi"}, {"name": "Massimo Bianchi"}, {"name": "Maurizio Firrotta"}], "featured_authors": [{"name": "Lorenzo Grimaldi"}, {"name": "Massimo Bianchi"}, {"name": "Maurizio Firrotta"}], "author_count": 3}, {"id": "2603.09965", "category": "hep-th", "title": "Generalised Cluster Adjacency for Cosmology", "abstract": "In this paper we study the cluster algebraic properties of wavefunction coefficients for massless scalar theories in de Sitter cosmology. We show that the symbol of the wavefunction coefficient of the $n$-site path graph $P_n$ obeys a generalisation of cluster adjacency, where all letters in a given word belong to the same cluster of an $A_{2n-3}$ algebra, with certain additional constraints on the order of the letters. We call this property the ordered single cluster condition, and provide its physical interpretation. This condition is stronger than the usual cluster adjacency obeyed by neighbouring letters, and imposes stronger constraints for the symbol bootstrap. We also show how any tree graph satisfies a cluster-like structure in terms of tubes and tubings on the underlying graph, which allows for a similar bootstrap approach.", "url": "https://arxiv.org/abs/2603.09965", "type": "理论", "summary": "在本文中，我们研究了德西特宇宙学中无质量标量理论的波函数系数的簇代数性质。我们证明，$n$位点路径图$P_n$的波函数系数的符号服从簇邻接的概括，其中给定单词中的所有字母都属于$A_{2n-3}$代数的同一簇，并且对字母的顺序有一定的附加约束。我们将此属性称为有序单簇条件，并提供其物理解释。该条件比相邻字母遵循的通常簇邻接性更强，并且对符号引导施加更强的约束。我们还展示了任何树图如何在底层图上的管道和管道方面满足类簇结构，这允许类似的引导方法。", "authors": [{"name": "Mattia Capuano"}, {"name": "Livia Ferro"}, {"name": "Tomasz Lukowski"}, {"name": "Alessandro Palazio"}, {"name": "Yao-Qi Zhang"}], "featured_authors": [{"name": "Mattia Capuano"}, {"name": "Livia Ferro"}, {"name": "Tomasz Lukowski"}, {"name": "Alessandro Palazio"}, {"name": "Yao-Qi Zhang"}], "author_count": 5}, {"id": "2603.09977", "category": "hep-th", "title": "Does hot QCD have a conformal manifold in the chiral limit?", "abstract": "Recent lattice evidence suggests the chiral phase transition in QCD is second-order for $N_f \\ge 2$ massless flavors. We constrain CFT descriptions of a critical line in temperature $T$ and imaginary baryon chemical potential $\\theta_B = i\\mu_B/T$. An 't Hooft anomaly at general $\\theta_B$ constrains the transition even at $\\theta_B = 0$, leaving only three minimal scenarios. The best-motivated scenario for $N_f\\ge3$, and perhaps also $N_f = 2$, is beyond Ginzburg-Landau, featuring a conformal manifold of $\\theta_B$-dependent universality classes with an exactly marginal operator related to baryon density.", "url": "https://arxiv.org/abs/2603.09977", "type": "理论", "summary": "最近的晶格证据表明，QCD 中的手性相变对于 $N_f \\ge 2$ 无质量风味来说是二阶的。我们限制温度 $T$ 和虚重子化学势 $\\theta_B = i\\mu_B/T$ 的临界线的 CFT 描述。一般 $\\theta_B$ 处的 't Hooft 异常即使在 $\\theta_B = 0$ 时也限制了转换，只留下三种最小情况。 $N_f\\ge3$ 的最佳动机场景，也许还有 $N_f = 2$，超出了 Ginzburg-Landau 的范围，其特征是 $\\theta_B$ 依赖的普适性类的共形流形，具有与重子密度相关的精确边际算子。", "authors": [{"name": "Shi Chen"}, {"name": "Aleksey Cherman"}, {"name": "Robert D. Pisarski"}], "featured_authors": [{"name": "Shi Chen"}, {"name": "Aleksey Cherman"}, {"name": "Robert D. Pisarski"}], "author_count": 3}, {"id": "2603.08834", "category": "math-ph", "title": "Spectral transitions in some Rabi models", "abstract": "We consider the transition from discrete to continuous spectrum which occurs in some quantum Rabi models. The subordinacy theory is used to detect and locate the essential spectrum of the intensity-dependent Rabi model, the anisotropic two-photon Rabi model, and the two-photon Rabi-Stark model for the whole range of parameters. The absence of a singular spectrum and the absence of eigenvalues in the interior of the essential spectrum are proved for all models considered.", "url": "https://arxiv.org/abs/2603.08834", "type": "理论", "summary": "我们考虑在某些量子拉比模型中发生的从离散光谱到连续光谱的转变。隶属理论用于检测和定位强度相关拉比模型、各向异性双光子拉比模型和双光子拉比-斯塔克模型的整个参数范围的基本光谱。对于所有考虑的模型都证明了奇异谱的不存在以及基本谱内部不存在特征值。", "authors": [{"name": "Grzegorz Świderski"}, {"name": "Lech Zieliński"}], "featured_authors": [{"name": "Grzegorz Świderski"}, {"name": "Lech Zieliński"}], "author_count": 2}, {"id": "2603.09230", "category": "math-ph", "title": "State integral models and the tetrahedron equation", "abstract": "It is shown that for a class of state integral models on shaped pseudo 3-manifolds, including the edge formulation of Teichmüller TQFT, the Boltzmann weight assigned to a tetrahedron solves the tetrahedron equation. The dihedral angles of the tetrahedron play the role of spectral parameters.", "url": "https://arxiv.org/abs/2603.09230", "type": "理论", "summary": "结果表明，对于成形伪 3-流形上的一类状态积分模型，包括 Teichmüller TQFT 的边缘公式，分配给四面体的玻尔兹曼权重可求解四面体方程。四面体的二面角起着光谱参数的作用。", "authors": [{"name": "Junya Yagi"}], "featured_authors": [{"name": "Junya Yagi"}], "author_count": 1}, {"id": "2603.09372", "category": "math-ph", "title": "On Fermi's model for the scattering of a slow neutron from a bound proton", "abstract": "We consider a model Hamiltonian, introduced by Fermi in 1936, describing a two-particle system made of a neutron and a harmonically bound proton, where the neutron-proton interaction has the form of a $\\delta$-potential. For such Hamiltonian we prove the Limiting Absorption Principle and describe the stationary scattering theory. Finally, we derive Fermi's formula for the scattering cross-section valid in the Born approximation.", "url": "https://arxiv.org/abs/2603.09372", "type": "理论", "summary": "我们考虑费米于 1936 年提出的哈密顿量模型，该模型描述了由中子和调和束缚质子组成的双粒子系统，其中中子-质子相互作用具有 $\\delta$ 势的形式。对于这样的哈密顿量，我们证明了极限吸收原理并描述了稳态散射理论。最后，我们推导出适用于玻恩近似的费米散射截面公式。", "authors": [{"name": "Domenico Finco"}, {"name": "Raffaele Scandone"}, {"name": "Alessandro Teta"}], "featured_authors": [{"name": "Domenico Finco"}, {"name": "Raffaele Scandone"}, {"name": "Alessandro Teta"}], "author_count": 3}, {"id": "2603.09522", "category": "math-ph", "title": "Weak-Coupling Limit of the Lattice Nonlinear Schrödinger Integral Equation", "abstract": "We study the ground-state integral equation of the quantum lattice nonlinear Schrödinger model -- equivalently the isotropic Heisenberg XXX spin chain with spin $s = -1$ -- in the weak-coupling limit. Unlike the continuous Lieb--Liniger equation, whose driving term is a constant, the lattice equation is doubly singular: both the driving term and the integral kernel degenerate into $\\delta$-functions as $\\kappa \\to 0$. We develop a matched asymptotic expansion with three regions -- inner, outer, and edge. The Fourier transform of the rescaled inner solution is exactly the Bose--Einstein distribution, and the peak density diverges logarithmically with a constant $C$, which we determine analytically via two independent routes and confirm numerically. An exact duality with the Love integral equation for the circular disc capacitor yields the total density expansion. We prove an identity for the inner energy, allowing us to obtain the ground-state energy per site. From the Wiener--Hopf factorisation of the edge boundary layer, we identify the instanton action and predict a resurgent transseries structure.", "url": "https://arxiv.org/abs/2603.09522", "type": "理论", "summary": "我们研究弱耦合极限下量子晶格非线性薛定谔模型的基态积分方程——相当于自旋 $s = -1$ 的各向同性海森堡 XXX 自旋链。与驱动项为常数的连续 Lieb--Liniger 方程不同，格子方程是双奇异的：驱动项和积分核都退化为 $\\delta$ 函数，即 $\\kappa \\to 0$。我们开发了一个具有三个区域的匹配渐近展开：内部、外部和边缘。重新调整后的内解的傅立叶变换恰好是玻色-爱因斯坦分布，峰值密度与常数$C$呈对数发散，我们通过两条独立的路径分析确定并在数值上确认。圆盘电容器的洛夫积分方程的精确对偶性产生总密度展开。我们证明了内部能量的身份，使我们能够获得每个位点的基态能量。从边缘边界层的 Wiener-Hopf 分解，我们识别出瞬子作用并预测复兴的跨系列结构。", "authors": [{"name": "Felipe Taha Sant'Ana"}], "featured_authors": [{"name": "Felipe Taha Sant'Ana"}], "author_count": 1}, {"id": "2603.09535", "category": "math-ph", "title": "Pseudo-Riemmanian Lie algebras with coisotropic ideals and integrating the Laplace-Beltrami equation on Lie groups", "abstract": "We identify a class of left-invariant pseudo-Riemannian metrics on Lie groups for which the Laplace-Beltrami equation reduces to a first-order PDE and admits exact solutions. The defining condition is the existence of a commutative ideal $\\mathfrak{h}$ in the Lie algebra $\\mathfrak{g}$ whose orthogonal complement satisfies $\\mathfrak{h}^\\perp\\subseteq\\mathfrak{h}$. Using the noncommutative integration method based on the orbit method and generalized Fourier transforms, we reduce the Laplace--Beltrami equation to a first-order linear PDE, which can then be integrated explicitly. The symmetry of the reduced equation gives rise, via the inverse transform, to nonlocal symmetry operators for the original equation. These operators are generically integro-differential, contrasting with the polynomial symmetries appearing in previously studied classes. The method is illustrated by two examples: the Heisenberg group $\\mathrm{H}_3(\\mathbb{R})$ with a Lorentzian metric and a four-dimensional non-unimodular group with a metric of signature $(2,2)$. In the latter, classical separation of variables is not directly applicable, yet the noncommutative approach yields explicit solutions and reveals the predicted nonlocal symmetry.", "url": "https://arxiv.org/abs/2603.09535", "type": "理论", "summary": "我们确定了李群上的一类左不变伪黎曼度量，其中 Laplace-Beltrami 方程可简化为一阶偏微分方程并允许精确解。定义条件是李代数$\\mathfrak{g}$中存在交换理想$\\mathfrak{h}$，其正交补满足$\\mathfrak{h}^\\perp\\subseteq\\mathfrak{h}$。利用基于轨道法和广义傅里叶变换的非交换积分方法，我们将Laplace--Beltrami方程简化为一阶线性偏微分方程，然后可以对其进行显式积分。简化方程的对称性通过逆变换产生原始方程的非局部对称算子。这些算子通常是积分微分的，与之前研究的类中出现的多项式对称性形成对比。该方法通过两个例子进行说明：具有洛伦兹度量的海森堡群 $\\mathrm{H}_3(\\mathbb{R})$ 和具有签名度量 $(2,2)$ 的四维非幺模群。\n\n在后者中，经典的变量分离并不直接适用，但非交换方法产生显式解并揭示了预测的非局部对称性。", "authors": [{"name": "A. A. Magazev"}, {"name": "I. V. Shirokov"}], "featured_authors": [{"name": "A. A. Magazev"}, {"name": "I. V. Shirokov"}], "author_count": 2}, {"id": "2603.09928", "category": "math-ph", "title": "Intertwining Markov Processes via Matrix Product Operators", "abstract": "Duality transformations reveal unexpected equivalences between seemingly distinct models. We introduce an out-of-equilibrium generalisation of matrix product operators to implement duality transformations in one-dimensional boundary-driven Markov processes on lattices. In contrast to local dualities associated with generalised symmetries, here the duality operator intertwines two Markov processes via generalised exchange relations and realises the out-of-equilibrium duality globally. We construct these operators exactly for the symmetric simple exclusion process with distinct out-of-equilibrium boundaries. In this case, out-of-equilibrium boundaries are dual to equilibrium boundaries satisfying Liggett's condition, implying that the Gibbs-Boltzmann measure captures out-of-equilibrium physics when leveraging the duality operator. We illustrate this principle through physical applications.", "url": "https://arxiv.org/abs/2603.09928", "type": "理论", "summary": "对偶变换揭示了看似不同的模型之间意想不到的等价性。我们引入了矩阵乘积算子的非平衡推广，以在格上的一维边界驱动马尔可夫过程中实现对偶变换。与广义对称性相关的局部对偶性相反，这里的对偶算子通过广义交换关系将两个马尔可夫过程交织在一起，并在全局范围内实现非平衡对偶性。我们完全针对具有明显非平衡边界的对称简单排除过程构造这些算子。在这种情况下，非平衡边界与满足利格特条件的平衡边界是对偶的，这意味着吉布斯-玻尔兹曼测度在利用对偶算子时捕获了非平衡物理场。我们通过物理应用来说明这一原理。", "authors": [{"name": "Rouven Frassek"}, {"name": "Jan de Gier"}, {"name": "Jimin Li"}, {"name": "Frank Verstraete"}], "featured_authors": [{"name": "Rouven Frassek"}, {"name": "Jan de Gier"}, {"name": "Jimin Li"}, {"name": "Frank Verstraete"}], "author_count": 4}, {"id": "2603.09959", "category": "math-ph", "title": "A complete classification of 2d symmetry protected states with symmetric entanglers", "abstract": "We consider symmetry protected topological states of 2d quantum spin systems, with a finite symmetry group $G$. It has been conjectured that such states are classified by the cohomology group $H^3(G,U(1))$, but the completeness of this classfication is an open problem. We restrict ourselves to symmetry protected topological states that can be prepared from a product state by a symmetric entangler. For this class of states, we prove that the classification by $H^3(G,U(1))$ is complete.", "url": "https://arxiv.org/abs/2603.09959", "type": "理论", "summary": "我们考虑二维量子自旋系统的对称保护拓扑态，具有有限对称群 $G$。据推测，此类状态可以通过上同调群$H^3(G,U(1))$进行分类，但这种分类的完整性是一个悬而未决的问题。我们将自己限制在对称保护的拓扑态上，这些拓扑态可以通过对称纠缠器从乘积态中制备出来。对于此类状态，我们证明 $H^3(G,U(1))$ 的分类是完整的。", "authors": [{"name": "Alex Bols"}, {"name": "Wojciech De Roeck"}, {"name": "Michiel De Wilde"}, {"name": "Bruno de O. Carvalho"}], "featured_authors": [{"name": "Alex Bols"}, {"name": "Wojciech De Roeck"}, {"name": "Michiel De Wilde"}, {"name": "Bruno de O. Carvalho"}], "author_count": 4}, {"id": "2603.08793", "category": "quant-ph", "title": "Efficient training of photonic quantum generative models", "abstract": "The topic of generative learning has gained traction within the field of quantum machine learning, in particular with the advent of train-on-classical, deploy-on-quantum methods. This approach exploits the properties of intermediate-complexity circuits whose training can be simulated classically efficiently, but that generally require quantum hardware for the corresponding sampling problem. Quantum linear optics possess similar properties, which allows us to propose an efficient training procedure for photon-native quantum generative models based on the maximum mean discrepancy, where the deployment of the model corresponds to the task of boson sampling. We provide numerical results, propose datasets, and we also explore how initialization strategies and ansatz choice affect the training.", "url": "https://arxiv.org/abs/2603.08793", "type": "理论+数值", "summary": "生成学习的主题在量子机器学习领域获得了关注，特别是随着经典训练、量子部署方法的出现。这种方法利用了中等复杂性电路的特性，其训练可以有效地进行经典模拟，但通常需要量子硬件来解决相应的采样问题。量子线性光学具有类似的特性，这使我们能够提出一种基于最大平均差异的光子原生量子生成模型的有效训练程序，其中模型的部署对应于玻色子采样的任务。我们提供数值结果，提出数据集，并且我们还探索初始化策略和 ansatz 选择如何影响训练。", "authors": [{"name": "Felix Gottlieb"}, {"name": "Rawad Mezher"}, {"name": "Brian Ventura"}, {"name": "Shane Mansfield"}, {"name": "Alexia Salavrakos"}], "featured_authors": [{"name": "Felix Gottlieb"}, {"name": "Rawad Mezher"}, {"name": "Brian Ventura"}, {"name": "Shane Mansfield"}, {"name": "Alexia Salavrakos"}], "author_count": 5}, {"id": "2603.08801", "category": "quant-ph", "title": "Large Language Model-Assisted Superconducting Qubit Experiments", "abstract": "Superconducting circuits have demonstrated significant potential in quantum information processing and quantum sensing. Implementing novel control and measurement sequences for superconducting qubits is often a complex and time-consuming process, requiring extensive expertise in both the underlying physics and the specific hardware and software. In this work, we introduce a framework that leverages a large language model (LLM) to automate qubit control and measurement. Specifically, our framework conducts experiments by generating and invoking schema-less tools on demand via a knowledge base on instrumental usage and experimental procedures. We showcase this framework with two experiments: an autonomous resonator characterization and a direct reproduction of a quantum non-demolition (QND) characterization of a superconducting qubit from literature. This framework enables rapid deployment of standard control-and-measurement protocols and facilitates implementation of novel experimental procedures, offering a more flexible and user-friendly paradigm for controlling complex quantum hardware.", "url": "https://arxiv.org/abs/2603.08801", "type": "实验", "summary": "超导电路在量子信息处理和量子传感方面表现出了巨大的潜力。为超导量子位实施新颖的控制和测量序列通常是一个复杂且耗时的过程，需要在基础物理和特定硬件和软件方面拥有广泛的专业知识。在这项工作中，我们介绍了一个利用大型语言模型（LLM）来自动化量子位控制和测量的框架。具体来说，我们的框架通过仪器使用和实验程序的知识库按需生成和调用无模式工具来进行实验。我们通过两个实验展示了这个框架：自主谐振器表征和文献中超导量子位的量子不可拆除（QND）表征的直接再现。该框架能够快速部署标准控制和测量协议，并有助于实施新颖的实验程序，为控制复杂的量子硬件提供更灵活和用户友好的范例。", "authors": [{"name": "Shiheng Li"}, {"name": "Jacob M. Miller"}, {"name": "Phoebe J. Lee"}, {"name": "Gustav Andersson"}, {"name": "Christopher R. Conner"}, {"name": "Yash J. Joshi"}, {"name": "Bayan Karimi"}, {"name": "Amber M. King"}, {"name": "Howard L. Malc"}, {"name": "Harsh Mishra"}, {"name": "Hong Qiao"}, {"name": "Minseok Ryu"}, {"name": "Xuntao Wu"}, {"name": "Siyuan Xing"}, {"name": "Haoxiong Yan"}, {"name": "Jian Shi"}, {"name": "Andrew N. Cleland"}], "featured_authors": [{"name": "Shiheng Li"}, {"name": "Jacob M. Miller"}, {"name": "Phoebe J. Lee"}, {"name": "Haoxiong Yan"}, {"name": "Jian Shi"}, {"name": "Andrew N. Cleland"}], "author_count": 17}, {"id": "2603.08841", "category": "quant-ph", "title": "Universal Non-stabilizerness Dynamics Across Quantum Phase Transitions", "abstract": "Quantum magic and non-stabilizerness are important quantum resources that characterize computational power beyond classically simulable Clifford operations and are therefore essential for achieving quantum advantage. While non-stabilizerness has so far been investigated only at equilibrium, here we extend its dynamics to time-dependent drivings across quantum phase transitions. In particular, we show that the stabilizer Rényi entropies and the cumulants of the Pauli spectrum exhibit universal power-law scaling with the driving rate in slow processes. Moreover, we show that the logarithmic Pauli spectrum is asymptotically Gaussian, implying a lognormal distribution for the Pauli spectrum values. Our results are explicitly demonstrated by exact results in the transverse-field Ising model and by analytical approximations in long-range Kitaev models.", "url": "https://arxiv.org/abs/2603.08841", "type": "理论+数值", "summary": "量子魔力和非稳定剂是重要的量子资源，它们表征了超出经典可模拟 Clifford 运算的计算能力，因此对于实现量子优势至关重要。虽然迄今为止仅在平衡状态下研究了非稳定剂，但在这里我们将其动力学扩展到跨越量子相变的时间相关驱动。特别是，我们证明了稳定器 Rényi 熵和泡利谱的累积量在慢速过程中随着驱动速率表现出普遍的幂律缩放。此外，我们证明对数泡利谱是渐近高斯分布的，这意味着泡利谱值服从对数正态分布。我们的结果通过横向场伊辛模型的精确结果和远程基塔耶夫模型的分析近似得到了明确的证明。", "authors": [{"name": "András Grabarits"}, {"name": "Adolfo del Campo"}], "featured_authors": [{"name": "András Grabarits"}, {"name": "Adolfo del Campo"}], "author_count": 2}, {"id": "2603.08845", "category": "quant-ph", "title": "Time delocalization and causality across temporal quantum reference frames", "abstract": "In relational quantum dynamics, evolution emerges via the correlations between some system of interest and a clock system, which plays the role of a temporal reference frame. Their combined state satisfies a Wheeler-de Witt-like constraint equation, and therefore does not evolve, leading to a ``block universe'' picture. Here we investigate the interplay of two aspects, namely temporal localization and causal relations, when comparing emergent dynamics with respect to different choices of clock. We first explore the extent to which two clocks can agree on the temporal localization of events. Then, focussing on the operational notion of causality, we require a clearly defined notion of interventions, i.e. quantum operations, and consider two different approaches to modeling these operations within relational dynamics. The first considers their application via the choice of solutions to the constraint equation, i.e.~the choice of which ``history'' is considered. The second approach incorporates the operations into the constraint equation itself and thereby into its solutions, giving a dynamical picture of the interventions. From the perspective of a single clock, both approaches allow for a notion of operational causality in relational dynamics. However, for multiple clocks, only the second approach gives a consistent picture regarding causal relations, while necessarily manifesting some degree of temporal delocalization between frames. Moreover, this second approach, when considering certain cases of temporal delocalization, naturally describes scenarios with indefinite causal order, a well-known quantum feature of operational causality.", "url": "https://arxiv.org/abs/2603.08845", "type": "理论", "summary": "在关系量子动力学中，进化是通过某些感兴趣的系统与时钟系统之间的相关性而出现的，时钟系统起着时间参考系的作用。它们的组合状态满足类似惠勒-德威特的约束方程，因此不会演化，从而形成“块宇宙”图景。在这里，我们在比较不同时钟选择的紧急动态时，研究了两个方面的相互作用，即时间定位和因果关系。我们首先探讨两个时钟在事件时间定位上的一致程度。然后，关注因果关系的操作概念，我们需要一个明确定义的干预概念，即量子操作，并考虑两种不同的方法在关系动力学中对这些操作进行建模。第一个通过选择约束方程的解来考虑它们的应用，即选择考虑哪个“历史”。第二种方法将操作纳入约束方程本身，从而纳入其解决方案，给出干预措施的动态图景。\n\n从单个时钟的角度来看，两种方法都允许关系动态中的操作因果关系的概念。然而，对于多个时钟，只有第二种方法给出了关于因果关系的一致图像，同时必然表现出帧之间某种程度的时间离域。此外，当考虑某些时间离域情况时，第二种方法自然地描述了具有不确定因果顺序的场景，这是操作因果关系的众所周知的量子特征。", "authors": [{"name": "Veronika Baumann"}, {"name": "Maximilian P. E. Lock"}], "featured_authors": [{"name": "Veronika Baumann"}, {"name": "Maximilian P. E. Lock"}], "author_count": 2}, {"id": "2603.08916", "category": "quant-ph", "title": "The uncloneable bit exists", "abstract": "We establish quantum uncloneable encryption with unconditional security, preventing two non-communicating adversaries from simultaneously decrypting a single ciphertext $-$ even when both are given the key. Our construction achieves security that approaches the ideal limit at a rate that is exponentially small in the security parameter, without employing any assumptions. Our proof invokes quantum information principles in the fully quantum realm, in a novel setting of cryptography. A decoupling step certifies the statistical independence needed for randomness extraction, and monogamy of entanglement, formalised via strong subadditivity, rules out the sender being highly correlated with two non-communicating adversaries at once. Consequently, no coordinated strategy beats random guessing of the encrypted bit, establishing unconditional uncloneability. This reveals the existence of an uncloneable bit in Nature and delineates a fundamental, physically enforced cryptographic primitive unavailable in classical settings.", "url": "https://arxiv.org/abs/2603.08916", "type": "理论", "summary": "我们建立了具有无条件安全性的量子不可克隆加密，防止两个非通信对手同时解密单个密文$-$，即使双方都获得了密钥。我们的构造在不采用任何假设的情况下以安全参数指数级小的速度实现了接近理想极限的安全性。我们的证明在全新的密码学环境中调用了完全量子领域的量子信息原理。解耦步骤证明了随机性提取所需的统计独立性，以及通过强次可加性形式化的一夫一妻制纠缠，排除了发送者同时与两个非通信对手高度相关的情况。因此，没有任何协调策略可以击败对加密位的随机猜测，从而建立无条件的不可克隆性。这揭示了自然界中不可克隆位的存在，并描绘了经典环境中不可用的基本的、物理强制的加密原语。", "authors": [{"name": "Archishna Bhattacharyya"}, {"name": "Anne Broadbent"}, {"name": "Eric Culf"}], "featured_authors": [{"name": "Archishna Bhattacharyya"}, {"name": "Anne Broadbent"}, {"name": "Eric Culf"}], "author_count": 3}, {"id": "2603.08948", "category": "quant-ph", "title": "Random layers for quantum optimal control with exponential expressivity", "abstract": "A long-standing challenge in quantum optimal control is finding an optimal pulse structure that leads to an efficient exploration of the unitary space with a minimal number of optimization parameters. We solve this challenge by constructing parametrized pulse sequences from random constant-amplitude pulses grouped in layers with one optimization parameter per layer. We show that, when increasing the number of pulses, the resulting random unitaries converge exponentially fast to the uniform Haar-random ensemble. Grouping the pulses into layers allows to lower the total number of optimization parameters. We focus on two random-layer (RALLY) methods: In RALLY$_\\text{T}$, time durations of the layers are optimized while the pulse amplitudes are randomly chosen beforehand, possibly even from a few discrete values. RALLY$_\\text{A}$ optimizes a joint scaling factor of the random pulse amplitudes in each layer. We numerically validate the two methods by applying them to problems of unitary synthesis, ground-state preparation and state transfer in different quantum systems. For all problems considered, both methods approach an information-theoretic lower bound on the number of optimization parameters and outperform other commonly used algorithms. In gradient-free optimization, the RALLY methods are orders of magnitude more accurate with fewer figure-of-merit evaluations. The RALLY methods are also applicable for enhanced quantum machine learning and variational quantum algorithms.", "url": "https://arxiv.org/abs/2603.08948", "type": "理论+数值", "summary": "量子最优控制中长期存在的挑战是找到最佳的脉冲结构，从而以最少数量的优化参数有效地探索酉空间。我们通过从分层分组的随机恒幅脉冲构造参数化脉冲序列来解决这一挑战，每层一个优化参数。我们表明，当增加脉冲数量时，所得的随机酉指数快速收敛到均匀哈尔随机系综。将脉冲分组可以减少优化参数的总数。我们关注两种随机层（RALLY）方法：在 RALLY$_\\text{T}$ 中，层的持续时间被优化，同时脉冲幅度是预先随机选择的，甚至可能是从一些离散值中选择的。 RALLY$_\\text{A}$ 优化每层随机脉冲幅度的联合缩放因子。我们通过将这两种方法应用于不同量子系统中的幺正综合、基态制备和状态转移问题，对这两种方法进行了数值验证。\n\n对于所考虑的所有问题，两种方法都接近优化参数数量的信息论下限，并且优于其他常用算法。在无梯度优化中，RALLY 方法的准确度提高了几个数量级，且品质因数评估更少。 RALLY 方法还适用于增强量子机器学习和变分量子算法。", "authors": [{"name": "Marco Dall'Ara"}, {"name": "Martin Koppenhöfer"}, {"name": "Florentin Reiter"}, {"name": "Thomas Wellens"}, {"name": "Simone Montangero"}, {"name": "Walter Hahn"}], "featured_authors": [{"name": "Marco Dall'Ara"}, {"name": "Martin Koppenhöfer"}, {"name": "Florentin Reiter"}, {"name": "Thomas Wellens"}, {"name": "Simone Montangero"}, {"name": "Walter Hahn"}], "author_count": 6}, {"id": "2603.09040", "category": "quant-ph", "title": "Genuinely entangled subspaces and strongly nonlocal unextendible biseparable bases in four-partite systems", "abstract": "A set of orthogonal pure states is an unextendible biseparable basis (UBB), which means that its complementary subspace contains only genuinely entangled states. UBBs thus serve as an effective tool for constructing genuinely entangled subspaces. If every state within such a subspace exhibits distillable entanglement across all bipartitions, it becomes particularly advantageous for applications in quantum information. In this paper, we mainly conduct research on the 4-qudit quantum systems, where the local dimension $d$ is not less than 3. We present an approach for constructing UBB and prove that the UBB established in this way is strongly nonlocal. We build several genuinely entangled subspaces and demonstrate the distillability of the genuinely entangled subspaces across all bipartitions. In addition, we also describe the specific orthonormal basis for some genuinely entangled subspaces. These results will not only contribute to the development of quantum nonlocality theory, but also provide a crucial theoretical foundation for practical quantum information processing tasks.", "url": "https://arxiv.org/abs/2603.09040", "type": "理论", "summary": "一组正交纯态是不可扩展的双可分基（UBB），这意味着其互补子空间仅包含真正的纠缠态。因此，UBB 可以作为构建真正纠缠子空间的有效工具。如果这样的子空间内的每个状态都表现出跨所有二分的可蒸馏纠缠，那么它对于量子信息中的应用变得特别有利。在本文中，我们主要对局部维数$d$不小于3的4-qudit量子系统进行研究。我们提出了一种构造UBB的方法，并证明了这种方式建立的UBB是强非局域的。我们构建了几个真正纠缠的子空间，并证明了跨所有二分的真正纠缠子空间的可蒸馏性。此外，我们还描述了一些真正纠缠子空间的特定正交基。这些成果不仅有助于量子非局域性理论的发展，而且为实际的量子信息处理任务提供了重要的理论基础。", "authors": [{"name": "Huaqi Zhou"}, {"name": "Ting Gao"}, {"name": "Fengli Yan"}], "featured_authors": [{"name": "Huaqi Zhou"}, {"name": "Ting Gao"}, {"name": "Fengli Yan"}], "author_count": 3}, {"id": "2603.09071", "category": "quant-ph", "title": "Toda-like Hamiltonian as a probe for quantized prey-predator dynamics", "abstract": "Phase-space features of a reduced version of the Toda-like Hamiltonian, $\\mathcal{H}(x,\\,k)$, written in a form constrained by the condition $\\partial^2 \\mathcal{H} / \\partial x \\partial k = 0$, with $x$ and $k$ as canonically conjugate variables, are analyzed in terms of Wigner currents. For Wigner currents convoluted with either thermodynamic or Gaussian ensembles, the underlying Hamiltonian dynamics admits analytic corrections due to quantum distortions over the classical phase-space pattern, computed and interpreted through quantifiers of quantumness and stationarity. Notably, while emulating the Lotka-Volterra (LV) dynamics that describe ecological competition systems, the Toda-like classical dynamics allows for analytical solutions with computable periods corresponding to closed phase-space orbits of isotropic prey-predator population distributions. The essential conditions for understanding how classical and quantum evolution can coexist are provided at different scales of quantumness, driven by the associated convoluting ensemble parameter. In the case of Gaussian statistical ensembles, the exact profile of the quantum distortions over classical prey-predator phase-space trajectories is obtained non-perturbatively. Our results indicate that, besides the classical stability admitted by LV models, the Toda-like patterns also exhibit quantum stability. Therefore, this can be regarded as the first step as a predictive theoretical framework towards more robust descriptions of quantum patterns in competitive microscopic biosystems.", "url": "https://arxiv.org/abs/2603.09071", "type": "理论+数值", "summary": "Toda 类哈密顿量的简化版本 $\\mathcal{H}(x,\\,k)$ 的相空间特征，以受条件 $\\partial^2 \\mathcal{H} / \\partial x \\partial k = 0$ 约束的形式编写，其中 $x$ 和 $k$ 作为规范共轭变量，根据维格纳电流进行分析。对于与热力学或高斯系综卷积的维格纳电流，潜在的哈密顿动力学允许由于经典相空间模​​式上的量子畸变而进行解析修正，通过量子性和平稳性的量词来计算和解释。值得注意的是，在模拟描述生态竞争系统的 Lotka-Volterra (LV) 动力学时，类似 Toda 的经典动力学允许使用与各向同性猎物-捕食者种群分布的闭合相空间轨道相对应的可计算周期的解析解。在相关的卷积系综参数的驱动下，在不同的量子尺度上提供了理解经典演化和量子演化如何共存的基本条件。\n\n在高斯统计系综的情况下，经典捕食者-捕食者相空间轨迹上的量子畸变的精确轮廓是非微扰地获得的。我们的结果表明，除了 LV 模型所承认的经典稳定性之外，类 Toda 模式还表现出量子稳定性。因此，这可以被视为作为预测理论框架的第一步，以更稳健地描述竞争性微观生物系统中的量子模式。", "authors": [{"name": "Alex E. Bernardini"}, {"name": "Orfeu Bertolami"}], "featured_authors": [{"name": "Alex E. Bernardini"}, {"name": "Orfeu Bertolami"}], "author_count": 2}, {"id": "2603.09093", "category": "quant-ph", "title": "The helical quantum two-body problem and its wave packet dynamics", "abstract": "We explore the helical quantum two-body problem i.e. two repulsively Coulomb interacting particles confined to move along a helix. The effective potential possesses a tunable number of potential wells superimposed on the repulsive Coulomb interaction that can be varied by changing the ratio of the pitch and radius of the helix. The anharmonicity of these wells depends crucially on this ratio and on the order of the well which can be seen also by analyzing the individual wells energy eigenvalue spacing. Our main focus is the investigation of the quantum dynamics of differently prepared wave packets that scatter from the multi-well potential landscape. We show that there exists a rich pattern forming transient evolution which depends also on the number of bound states of the individual wells. We demonstrate how the multiple wells leave their fingerprints in the dynamics leading, among others, to oscillatory structures on different spatial scales, the formation of beats and pulsed emission from single well localized wave packets due to their intrawell dynamics.", "url": "https://arxiv.org/abs/2603.09093", "type": "理论", "summary": "我们探索螺旋量子二体问题，即两个相互排斥的库仑相互作用的粒子被限制沿着螺旋移动。有效势具有叠加在排斥库仑相互作用上的可调势阱数量，可以通过改变螺距和半径的比率来改变势阱的数量。这些井的非谐性主要取决于该比率和井的阶数，这也可以通过分析各个井的能量特征值间距来看出。我们的主要重点是研究从多井势景观散射的不同准备的波包的量子动力学。我们表明，存在形成瞬态演化的丰富模式，这也取决于各个井的束缚态数量。我们演示了多个井如何在动力学中留下指纹，导致不同空间尺度上的振荡结构、由于其井内动力学而导致单井局部波包的节拍和脉冲发射的形成。", "authors": [{"name": "Peter Schmelcher"}], "featured_authors": [{"name": "Peter Schmelcher"}], "author_count": 1}, {"id": "2603.09096", "category": "quant-ph", "title": "Reconfigurable Superconducting Quantum Circuits Enabled by Micro-Scale Liquid-Metal Interconnects", "abstract": "Modular architectures are a promising route toward scalable superconducting quantum processors, but finite fabrication yield and the lack of high quality temporary interconnects impose fundamental limitations on system size. Here, we demonstrate chip-scale liquid-metal interconnects that show promise for plug-and-play superconducting quantum circuits by enabling non-destructive module replacement while maintaining high microwave performance. Using gallium-based liquid metals, we realize high-quality inter-module signal and ground interconnects, comparable in performance to conventional coplanar waveguide resonators. We illustrate consistent device characteristics across three thermal cycles between room temperature and 15 mK, as well as the ability to reform superconducting connections following module replacement. A width-dependent resonance frequency shift reveals a significant kinetic inductance fraction, which we attribute to the presence of $\\beta$-phase tantalum as confirmed by X-ray characterization. Finally, we investigate power-dependent loss mechanisms and observe high-power dissipative nonlinearities qualitatively consistent with a readout-power heating model. These results establish liquid metals as viable chip-scale interconnects for reconfigurable, modular superconducting quantum systems.", "url": "https://arxiv.org/abs/2603.09096", "type": "实验", "summary": "模块化架构是实现可扩展超导量子处理器的一条有前途的途径，但有限的制造产量和缺乏高质量临时互连对系统尺寸造成了根本限制。在这里，我们展示了芯片级液态金属互连，通过实现无损模块更换，同时保持高微波性能，有望实现即插即用的超导量子电路。使用镓基液态金属，我们实现了高质量的模块间信号和接地互连，其性能可与传统共面波导谐振器相媲美。我们展示了在室温和 15 mK 之间的三个热循环中一致的器件特性，以及在更换模块后重组超导连接的能力。宽度相关的共振频移揭示了显着的动态电感分数，我们将其归因于 X 射线表征所证实的 $\\beta$ 相钽的存在。最后，我们研究了与功率相关的损耗机制，并观察到与读出功率加热模型定性一致的高功率耗散非线性。\n\n这些结果将液态金属确立为可重构、模块化超导量子系统的可行芯片级互连。", "authors": [{"name": "Zhancheng Yao"}, {"name": "Nicholas E. Fuhr"}, {"name": "Nicholas Russo"}, {"name": "David W. Abraham"}, {"name": "Kevin E. Smith"}, {"name": "David J. Bishop"}], "featured_authors": [{"name": "Zhancheng Yao"}, {"name": "Nicholas E. Fuhr"}, {"name": "Nicholas Russo"}, {"name": "David W. Abraham"}, {"name": "Kevin E. Smith"}, {"name": "David J. Bishop"}], "author_count": 6}, {"id": "2603.09128", "category": "quant-ph", "title": "On the Existence of Algebraic Equiangular Lines", "abstract": "We consider real and complex equiangular lines, generated by unit vectors. We show that, for an arbitrary dimension $d$, if there exists a set of $d^2$ equiangular unit vectors in $\\mathbb{C}^d$, then there must exist a set of $d^2$ equiangular unit vectors with all of their coefficients in a number field. This result is motivated by the question of constructing SIC-POVMs in quantum physics and conjectures around them. We discuss applications of our techniques to the case of real equiangular lines and consequences of the above results.", "url": "https://arxiv.org/abs/2603.09128", "type": "理论", "summary": "我们考虑由单位向量生成的实数和复数等角线。我们证明，对于任意维度 $d$，如果 $\\mathbb{C}^d$ 中存在一组 $d^2$ 等角单位向量，则必须存在一组 $d^2$ 等角单位向量，其所有系数都在数域中。这一结果是由量子物理学中构建 SIC-POVM 的问题以及围绕它们的猜想所激发的。我们讨论我们的技术在真实等角线的情况下的应用以及上述结果的后果。", "authors": [{"name": "Igor Van Loo"}, {"name": "Frédérique Oggier"}], "featured_authors": [{"name": "Igor Van Loo"}, {"name": "Frédérique Oggier"}], "author_count": 2}, {"id": "2603.09155", "category": "quant-ph", "title": "Analytic formulae for non-local magic in bipartite systems of qutrits and ququints", "abstract": "We conjecture analytic expressions for the non-local magic of bipartite pure qudit states of prime local dimension. Our construction relies on the Schmidt-aligned state attaining the minimum over local unitaries, a hypothesis that we support with numerical evidence for pairs of qutrits and ququints. For composite local dimensions, we find that the analogous expressions do not in general reproduce the global minimum, but can still provide computationally cheap approximations to the non-local magic. We also find that relations between non-local magic and entanglement diagnostics that hold for two qubits generally do not extend to qutrit and higher-dimensional systems.", "url": "https://arxiv.org/abs/2603.09155", "type": "理论+数值", "summary": "我们猜想素局部维度的二分纯qudit状态的非局部魔力的解析表达式。我们的构造依赖于施密特对齐状态达到局部酉的最小值，我们用 qutrit 和 ququint 对的数值证据支持这一假设。对于复合局部维度，我们发现类似的表达式通常不会再现全局最小值，但仍然可以为非局部魔力提供计算成本低廉的近似值。我们还发现，适用于两个量子位的非局域魔法和纠缠诊断之间的关系通常不会扩展到 qutrit 和更高维系统。", "authors": [{"name": "Giorgio Busoni"}, {"name": "John Gargalionis"}, {"name": "Ewan N. V. Wallace"}, {"name": "Martin J. White"}], "featured_authors": [{"name": "Giorgio Busoni"}, {"name": "John Gargalionis"}, {"name": "Ewan N. V. Wallace"}, {"name": "Martin J. White"}], "author_count": 4}, {"id": "2603.09233", "category": "quant-ph", "title": "Efficient Qubit Simulation of Hybrid Oscillator-Qubit Quantum Computation", "abstract": "We introduce a framework for simulating hybrid oscillator-qubit quantum processors on qubit-only systems through position encoding. By encoding continuous-variable position and momentum wave functions into qubit amplitudes, our method efficiently simulates all Gaussian and conditional Gaussian operations -- encompassing the phase-space instruction set (beam splitter, single-qubit rotation, conditional displacement) and extending to squeezing, conditional squeezing, conditional rotation, and conditional beam splitter -- using $O\\!\\left(\\log^2\\!\\left(\\Gamma + \\log(1/\\epsilon)\\right)\\right)$ qubit gates per hybrid gate, where $\\Gamma$ is the Fock-level bound and $\\epsilon$ is the target precision. This polylogarithmic per-gate complexity represents an exponential improvement over Fock basis encoding approaches, which require exponential quantum or classical resources in the number of qubits per mode. We provide rigorous numerical characterization of quantum Fourier transform errors for Fock-bounded states, enabling precise resource estimation for practical implementations. This work establishes that hybrid oscillator-qubit algorithms can be implemented on qubit processors with polynomial overhead, providing new insights into the computational power trade-offs between discrete-variable and hybrid continuous-discrete-variable quantum computing.", "url": "https://arxiv.org/abs/2603.09233", "type": "理论+数值", "summary": "我们引入了一个框架，用于通过位置编码在纯量子位系统上模拟混合振荡器-量子位量子处理器。通过将连续可变位置和动量波函数编码为量子位振幅，我们的方法有效地模拟所有高斯和条件高斯操作 - 涵盖相空间指令集（分束器、单量子位旋转、条件位移）并扩展到挤压、条件挤压、条件旋转和条件分束器 - 使用 $O\\!\\left(\\log^2\\!\\left(\\Gamma +每个混合门 \\log(1/\\epsilon)\\right)\\right)$ 个量子位门，其中 $\\Gamma$ 是 Fock 级边界，$\\epsilon$ 是目标精度。这种多对数每门复杂性代表了 Fock 基础编码方法的指数级改进，Fock 基础编码方法需要每个模式的量子比特数呈指数级的量子或经典资源。我们为福克有界态的量子傅里叶变换误差提供严格的数值表征，从而为实际实现实现精确的资源估计。\n\n这项工作确立了混合振荡器量子位算法可以在具有多项式开销的量子位处理器上实现，为离散变量和混合连续离散变量量子计算之间的计算能力权衡提供了新的见解。", "authors": [{"name": "Xi Lu"}, {"name": "Bojko N. Bakalov"}, {"name": "Yuan Liu"}], "featured_authors": [{"name": "Xi Lu"}, {"name": "Bojko N. Bakalov"}, {"name": "Yuan Liu"}], "author_count": 3}, {"id": "2603.09240", "category": "quant-ph", "title": "Incoherent Operations Enable State Transformations Impossible under Dephasing-covariant Incoherent Operations", "abstract": "We show that incoherent operations (IOs) can achieve the state transformations that are forbidden under dephasing-covariant incoherent operations (DIOs), thereby resolving the open problem posed by Chitambar and Gour [Phys. Rev. Lett. 117, 030401 (2016)]. We further demonstrate that no set of IO monotones suffices to characterize state convertibility under strictly incoherent operations (SIOs), and that monotones common to IOs and DIOs are insufficient to characterize convertibility under DIOs.", "url": "https://arxiv.org/abs/2603.09240", "type": "理论", "summary": "我们证明，非相干操作 (IO) 可以实现去相协变非相干操作 (DIO) 下禁止的状态转换，从而解决 Chitambar 和 Gour [Phys.莱特牧师。 117, 030401(2016)]。我们进一步证明，没有一组 IO 单调足以表征严格不相干操作 (SIO) 下的状态可转换性，并且 IO 和 DIO 共有的单调不足以表征 DIO 下的可转换性。", "authors": [{"name": "C. L. Liu"}], "featured_authors": [{"name": "C. L. Liu"}], "author_count": 1}, {"id": "2603.09352", "category": "quant-ph", "title": "Elementary asymptotic approach to the Landau-Zener problem", "abstract": "We present an asymptotic approach towards the standard Landau-Zener problem based on two linearly independent elementary waves of constant amplitude but time-dependent phase. The two contributions to this phase are quadratic and logarithmic in time and result from the linear chirp of the energies and the lowest order correction in the coupling between the two levels in the long-time limit. Indeed, our solutions subjected to initial conditions at a large but finite time in the past, are valid for large negative and large positive times. Due to their asymptotic nature they are not valid in the neighborhood of the moment when the levels cross. However, as the starting point of the dynamics moves further into the past, the time interval of the break-down of our asymptotic solutions shrinks and vanishes in the limit of the infinite past which corresponds to the standard Landau-Zener situation. Our approach explains not only every feature of the exact solution but yields deeper insights into the origin of the effects. In particular, it (i) brings to light the subtleties involved in the asymptotic limit leading to the standard expressions for the Landau-Zener transition amplitudes, (ii) identifies the logarithmic phase as the origin of the exponential transition probability amplitude, and (iii) reveals the structure of the lowest order corrections to the Landau-Zener result when the starting point is not in the infinite past.", "url": "https://arxiv.org/abs/2603.09352", "type": "数值", "summary": "我们提出了一种基于两个恒定振幅但与时间相关的相位的线性独立基波的标准朗道-齐纳问题的渐近方法。该阶段的两个贡献在时间上是二次和对数的，并且是由能量的线性啁啾和长时间限制内两个能级之间的耦合的最低阶校正产生的。事实上，我们的解决方案在过去一段较长但有限的时间内受到初始条件的影响，对于较大的负时间和较大的正时间是有效的。由于其渐近性质，它们在能级交叉时刻附近无效。然而，随着动力学的起点进一步移至过去，渐近解的分解时间间隔会缩小并消失在无限过去的极限中，这对应于标准的朗道-齐纳情况。我们的方法不仅解释了精确解决方案的每个特征，而且还可以更深入地了解影响的根源。\n\n特别是，它（i）揭示了导致朗道-齐纳跃迁幅度标准表达式的渐近极限所涉及的微妙之处，（ii）将对数相位识别为指数跃迁概率幅度的起源，以及（iii）揭示了当起点不在无限过去时对朗道-齐纳结果的最低阶校正的结构。", "authors": [{"name": "Eric P. Glasbrenner"}, {"name": "Wolfgang P. Schleich"}], "featured_authors": [{"name": "Eric P. Glasbrenner"}, {"name": "Wolfgang P. Schleich"}], "author_count": 2}, {"id": "2603.09361", "category": "quant-ph", "title": "Polaron effects on the information backflow in Jaynes-Cummings model", "abstract": "We investigate the influence of phonon degrees of freedom on the qubit dynamics in Jaynes-Cummings (JC) model. A strong qubit-phonon coupling is considered giving rise to Jaynes-Cummings-Holstein (JCH) model. Under anti-adiabatic conditions, we perform a unitary transformation to make the underlying problem tractable through Redfield-type non-Markovian master equation. Analytical expression for the time-dependent coherence is obtained, incorporating both cavity-induced dissipation and phonon-induced dressing effects. The dynamics of JC model is highly non-Markovian for a narrow spectral width and finite detuning. However, a non-zero phonon coupling suppresses these non-Markovian features by effectively reducing the qubit-cavity interaction strength. {It is observed that polaronic dressing effectively supresses the detuning effects. Furthermore, the coherence-based non-Markovianity measure shows an order-of-magnitude suppression in the JCH model, indicating a new dynamical regime, while memory effects extend over a wider range of spectral densities than in the JC model.", "url": "https://arxiv.org/abs/2603.09361", "type": "理论+数值", "summary": "我们研究了 Jaynes-Cummings (JC) 模型中声子自由度对量子位动力学的影响。强量子位-声子耦合被认为会产生 Jaynes-Cummings-Holstein (JCH) 模型。在反绝热条件下，我们执行酉变换，通过 Redfield 型非马尔可夫主方程使潜在问题易于处理。获得了时间相关相干性的分析表达式，其中结合了空腔引起的耗散和声子引起的修整效应。 JC 模型的动力学对于窄谱宽和有限失谐来说是高度非马尔可夫的。然而，非零声子耦合通过有效降低量子位-腔相互作用强度来抑制这些非马尔可夫特征。 {据观察，极化敷料有效地抑制了失谐效应。此外，基于相干性的非马尔可夫性测量在 JCH 模型中显示出数量级的抑制，表明新的动态机制，而记忆效应比 JC 模型中的谱密度范围更广。", "authors": [{"name": "Saima Bashir"}, {"name": "Mehboob Rashid"}, {"name": "Rayees A Malla"}, {"name": "Muzaffar Qadir Lone"}], "featured_authors": [{"name": "Saima Bashir"}, {"name": "Mehboob Rashid"}, {"name": "Rayees A Malla"}, {"name": "Muzaffar Qadir Lone"}], "author_count": 4}, {"id": "2603.09364", "category": "quant-ph", "title": "Thermodynamic Properties of the Dunkl-Pauli Oscillator in an Aharonov-Bohm Flux", "abstract": "We investigate the thermodynamic properties of a spin-$\\frac{1}{2}$ particle described by the Dunkl-deformed Pauli equation in two dimensions in the presence of an Aharonov--Bohm (AB) flux. By replacing the standard momentum operators with Dunkl operators, the Hamiltonian incorporates reflection symmetry together with topological gauge effects. The magnetic flux imposes symmetry constraints on the Dunkl parameters, $\\nu_1 + \\varepsilon \\nu_2 = 0$, linking the reflection sectors ($\\varepsilon = \\pm 1$) to the structure of the energy spectrum. Using the exact spectrum, we construct the canonical partition function and derive the thermodynamic quantities including the internal energy, entropy, and heat capacity. The results show that the interplay between Dunkl reflection symmetry and the AB phase leads to distinctive thermal behavior. In particular, the heat capacity exhibits a Schottky-type anomaly controlled by the magnetic flux, while at high temperatures the system approaches the classical oscillator limit.", "url": "https://arxiv.org/abs/2603.09364", "type": "理论", "summary": "我们研究了在存在 Aharonov--Bohm (AB) 通量的情况下二维 Dunkl 变形泡利方程描述的自旋 $\\frac{1}{2}$ 粒子的热力学性质。通过用 Dunkl 算子替换标准动量算子，哈密顿量将反射对称性与拓扑规范效应结合在一起。磁通量对 Dunkl 参数施加对称约束，$\\nu_1 + \\varepsilon \\nu_2 = 0$，将反射扇区 ($\\varepsilon = \\pm 1$) 与能谱结构联系起来。使用精确的谱，我们构建了正则配分函数并推导了热力学量，包括内能、熵和热容。结果表明，Dunkl 反射对称性和 AB 相之间的相互作用导致了独特的热行为。特别是，热容量表现出由磁通量控制的肖特基型异常，而在高温下系统接近经典振荡器极限。", "authors": [{"name": "Ahmed Tedjani"}, {"name": "Boubakeur Khantoul"}], "featured_authors": [{"name": "Ahmed Tedjani"}, {"name": "Boubakeur Khantoul"}], "author_count": 2}, {"id": "2603.09368", "category": "quant-ph", "title": "Verified delegated quantum computation requires techniques beyond cut-and-choose", "abstract": "Delegated quantum computation enables a client with limited quantum capabilities to outsource computations to a more powerful quantum server while preserving correctness and privacy. Verification is crucial in this setting to ensure that the untrusted quantum server performs the computation honestly and returns correct results. A common verification method is the quantum cut-and-choose technique. Inspired by classical verification methods for two-party computation, the client uses the majority of the delegated rounds to test the server's honesty, while keeping the remaining ones for the actual computation. Combining this technique with other methods, such as quantum error correction, could help achieve negligible cheating probabilities for the server; however, such methods can impose significant overheads making implementations unfeasible for the near-term future. In this work, we investigate whether cut-and-choose can yield efficient and secure verifiable quantum computation without additional costly techniques. We find that verifiable delegated quantum computation protocols relying solely on cut-and-choose techniques cannot be secure and efficient at the same time.", "url": "https://arxiv.org/abs/2603.09368", "type": "理论", "summary": "委托量子计算使量子能力有限的客户端能够将计算外包给更强大的量子服务器，同时保留正确性和隐私。在此设置中，验证至关重要，以确保不受信任的量子服务器诚实地执行计算并返回正确的结果。一种常见的验证方法是量子剪切和选择技术。受两方计算的经典验证方法的启发，客户端使用大部分委托轮次来测试服务器的诚实性，同时保留剩余轮次用于实际计算。将该技术与其他方法（例如量子纠错）相结合，可以帮助服务器实现可忽略不计的作弊概率；然而，此类方法可能会带来巨大的开销，使得在短期内无法实施。在这项工作中，我们研究了剪切和选择是否可以在无需额外昂贵技术的情况下产生高效且安全的可验证量子计算。我们发现，仅依赖于剪切和选择技术的可验证委托量子计算协议无法同时安全和高效。", "authors": [{"name": "Fabian Wiesner"}, {"name": "Anna Pappa"}], "featured_authors": [{"name": "Fabian Wiesner"}, {"name": "Anna Pappa"}], "author_count": 2}, {"id": "2603.09468", "category": "quant-ph", "title": "Multi-tasking through quantum annealing", "abstract": "Quantum annealing approximately solves combinatorial optimization problems by leveraging the principles of adiabatic quantum systems. In this approach, the system's
