technique for trapped-ion quantum computing. Conventionally a second ion species is used, requiring additional lasers and complicating optical setups. We propose a scheme for sympathetic cooling using the same species and test it for $^{43}$Ca$^+$ ions. Pulsed sideband cooling and ion addressing are implemented via integrated microwave control, further simplifying optical requirements. We cool a two-ion gate mode close to its ground state ($\\bar{n}\\approx 0.16$) and benchmark an induced error on the data qubit of $1.7(4)\\times 10^{-4}$ per cooling cycle.", "url": "https://arxiv.org/abs/2607.20292", "type": "理论", "summary": "通过冷却剂离子对数据量子位进行交感冷却是俘获离子量子计算的一项重要技术。通常使用第二种离子物质，需要额外的激光器和复杂的光学装置。我们提出了一种使用相同物种的交感冷却方案，并针对 $^{43}$Ca$^+$ 离子进行测试。脉冲边带冷却和离子寻址通过集成微波控制实现，进一步简化了光学要求。我们将双离子门模式冷却到接近其基态 ($\\bar{n}\\approx 0.16$)，并在每个冷却周期的数据量子位上对诱发误差进行基准测试，结果为 $1.7(4)\\times 10^{-4}$。", "authors": [{"name": "M. C. Smith"}, {"name": "E. Vandrey"}, {"name": "A. D. Leu"}, {"name": "N. Drotleff"}, {"name": "A. Agrawal"}, {"name": "K. Miyanishi"}, {"name": "D. M. Lucas"}, {"name": "M. F. Gely"}], "featured_authors": [{"name": "M. C. Smith"}, {"name": "E. Vandrey"}, {"name": "A. D. Leu"}, {"name": "K. Miyanishi"}, {"name": "D. M. Lucas"}, {"name": "M. F. Gely"}], "author_count": 8}, {"id": "2607.20311", "category": "quant-ph", "title": "Quantum-state block texture and its quantification", "abstract": "Quantum-state texture (QST) is an emerging quantum resource that has garnered increasing attention amid advances in quantum theory. In this work, we generalize the QST to quantum-state block texture (QSBT). This generalization provides profound operational interpretations for quantifying the advantages of quantum states in quantum information processing. We pioneer an alternative framework for characterizing and quantifying quantum-state block texture, and propose three types of block texture measures. By comparing these QSBT measures, we investigate their distinctions and interrelationships. We demonstrate that the geometric measure serves as an upper bound for the trace distance-based measure. For a specific family of quantum states, we evaluate the values of two trace distance-based measures. Then we sample four sets of data from this family of states, with each set comprising $5\\times 10^4, 10^5, 5\\times 10^5$ and $10^6 $ samples, respectively, and present the corresponding distributions. Our results reveal that the QSBT measures constructed via different approaches show distinct characteristics, indicating their potential roles in quantifying the block texture of quantum states.", "url": "https://arxiv.org/abs/2607.20311", "type": "理论+数值", "summary": "量子态纹理（QST）是一种新兴的量子资源，随着量子理论的进步而受到越来越多的关注。在这项工作中，我们将 QST 推广到量子态块纹理（QSBT）。这种概括为量化量子信息处理中量子态的优势提供了深刻的操作解释。我们开创了一种用于表征和量化量子态块纹理的替代框架，并提出了三种类型的块纹理测量。通过比较这些 QSBT 措施，我们研究了它们的区别和相互关系。我们证明几何测量可以作为基于轨迹距离的测量的上限。对于特定的量子态族，我们评估两个基于迹线距离的测量值。然后，我们从该状态族中抽取四组数据，每组数据分别包含 $5\\times 10^4、10^5、5\\times 10^5$ 和 $10^6$ 样本，并呈现相应的分布。\n\n我们的结果表明，通过不同方法构建的 QSBT 度量表现出不同的特征，表明它们在量化量子态块纹理中的潜在作用。", "authors": [{"name": "Yanjun Chu"}, {"name": "Yuhang Xie"}, {"name": "Chenyang Cui"}, {"name": "Shao-Ming Fei"}], "featured_authors": [{"name": "Yanjun Chu"}, {"name": "Yuhang Xie"}, {"name": "Chenyang Cui"}, {"name": "Shao-Ming Fei"}], "author_count": 4}, {"id": "2607.20377", "category": "quant-ph", "title": "Statevector-Referenced Geometry Survival of a Four-Qubit ZZ Quantum Kernel on IBM Quantum Hardware: A Fixed-Subset Diagnostic Across Three Execution Configurations", "abstract": "Quantum-kernel methods encode a dataset's geometry in a Gram matrix, so learning claims on hardware kernels assume the intended geometry survives execution. We measure that survival for one frozen four-qubit ZZ feature-map kernel on $N=24$ real indoor air-quality windows, reconstructed on ibm_fez (1024 shots per circuit) under baseline, dynamical decoupling alone, and gate twirling alone, each a single non-interleaved job. Every configuration returned a complete, finite, positive-semidefinite Gram matrix and preserved the centered statevector geometry to a substantial but incomplete descriptive degree (full-matrix centered kernel alignment, CKA, 0.933-0.989). Gate twirling was most faithful on every reported geometry axis, with the only jackknife-resolved improvement over baseline (persisted Spearman, mean absolute error, and full-matrix CKA diagnostics); dynamical decoupling alone was not separated from baseline at the frozen-window scale. Residual hardware distortion, not finite sampling, dominates the discrepancy. Yet fidelity and label alignment were reversed: the most faithful configuration had the lowest centered kernel-target alignment, which sits at or below label-permutation references for statevector and hardware alike. We read the small hardware uplift as a normalization property of the non-affine distortion, not captured signal. These are descriptive results for single jobs on one backend, not causal mitigation-efficacy estimates; no quantum-advantage, hardware-classifier-superiority, or forecasting claim is made. Implementation fidelity and task relevance are distinct axes; hardware quantum machine-learning studies should report both.", "url": "https://arxiv.org/abs/2607.20377", "type": "理论+数值", "summary": "量子内核方法将数据集的几何图形编码为 Gram 矩阵，因此硬件内核的学习声明假设预期的几何图形在执行后仍然存在。我们测量了一个冻结的四量子位 ZZ 特征图内核在 $N=24$ 真实室内空气质量窗口上的生存率，在基线、单独动态解耦和单独门旋转（每个单独的非交错作业）下在 ibm_fez（每个电路 1024 个镜头）上重建。每个配置都返回一个完整的、有限的、正半定的 Gram 矩阵，并将中心状态向量几何结构保留到实质性但不完整的描述程度（全矩阵中心核对齐，CKA，0.933-0.989）。门旋转在每个报告的几何轴上都是最忠实的，唯一通过折刀解决的改进超过基线（坚持 Spearman、平均绝对误差和全矩阵 CKA 诊断）；单独的动态解耦并没有在冻结窗口尺度上与基线分离。残留的硬件失真（而不是有限采样）主导了这种差异。\n\n然而，保真度和标签对齐是相反的：最忠实的配置具有最低中心的内核目标对齐，它位于或低于状态向量和硬件的标签排列参考。我们将硬件的小提升解读为非仿射失真的归一化属性，而不是捕获的信号。这些是一个后端上单个作业的描述性结果，而不是因果缓解效果估计；没有提出量子优势、硬件分类器优势或预测声明。实施保真度和任务相关性是不同的轴；硬件量子机器学习研究应该报告两者。", "authors": [{"name": "Rostyslav Sipakov"}], "featured_authors": [{"name": "Rostyslav Sipakov"}], "author_count": 1}, {"id": "2607.20388", "category": "quant-ph", "title": "Arnold--Nielsen Geometry for Complexity-Deformed Noncommutative Transport", "abstract": "We deform the Carlen--Maas--Wirth framework for noncommutative dynamical optimal transport by an Arnold--Nielsen type complexity operator. A positive state-independent operator $G$ compatible with the Hilbert bimodule structure of a noncommutative differential calculus $\\partial\\colon\\M\\to\\Hcal$ can be absorbed into the calculus itself, \\[ \\partial_G:=G^{1/2}\\partial. \\] The corresponding complexity-weighted transport problem is exactly the unweighted transport problem generated by $\\partial_G$, whenever the deformed quadratic form remains Dirichlet. In finite dimensions we prove existence of minimizers for density-dependent Petz-class metrics and for fixed physical complexity weights, the latter without commutation between $G$ and the state-dependent mobility. On unitary orbits we identify the induced distance with a quotient metric coming from a right-invariant complexity geometry. This yields an exact Bell-state preparation result via Clairaut's relation and an exactly computed restricted-path upper bound for GHZ preparation; the Lindblad detailed-balance case is included only as entropy-gradient-flow background.", "url": "https://arxiv.org/abs/2607.20388", "type": "理论+数值", "summary": "我们通过 Arnold--Nielsen 型复杂性算子对非交换动态最优传输的 Carlen--Maas--Wirth 框架进行变形。与非交换微分微积分 $\\partial\\colon\\M\\to\\Hcal$ 的希尔伯特双模结构兼容的正状态无关算子 $G$ 可以被吸收到微积分本身中，\\[ \\partial_G:=G^{1/2}\\partial。 \\] 每当变形二次形式保持狄利克雷时，相应的复杂度加权传输问题正是由 $\\partial_G$ 生成的未加权传输问题。在有限维度中，我们证明了密度相关 Petz 类度量和固定物理复杂性权重的最小化器的存在，后者无需在 $G$ 和状态相关移动性之间进行交换。在酉轨道上，我们用来自右不变复杂度几何的商度量来识别诱导距离。通过 Clairaut 关系和精确计算的 GHZ 准备的限制路径上限，这会产生精确的贝尔态准备结果； Lindblad 详细平衡案例仅作为熵梯度流背景包含在内。", "authors": [{"name": "Alberto Acevedo"}, {"name": "Antonio Falcó"}], "featured_authors": [{"name": "Alberto Acevedo"}, {"name": "Antonio Falcó"}], "author_count": 2}, {"id": "2607.20391", "category": "quant-ph", "title": "Qoreo: Choreographic Programming for Quantum Distributed Systems", "abstract": "Programming distributed quantum systems requires multiple actors to coordinate precise sequences of quantum operations, classical communication, and entanglement generation. Writing such protocols directly as distributed processes is tedious and error-prone, and subtle mismatches can cause deadlock or silently incorrect quantum states. We present Qoreo, a choreographic programming language for quantum distributed systems in which an entire protocol is expressed as single, global program (a choreography) rather than as a collection of independent actor processes. Qoreo includes a local quantum language with linear types that enforce the no-cloning principle; a choreographic language that combines local quantum computation with inter-actor classical and quantum communication; and a process language for individual network nodes. We prove type safety for choreographies, guaranteeing that well-typed programs implement well-defined quantum operations, and we define endpoint projection~(EPP), which automatically derives a network of independent processes from any choreography. We prove EPP sound and complete with respect to the choreographic semantics; as a corollary, every well-typed choreography projects to a deadlock-free process network. The metatheory of Qoreo is fully mechanized in Rocq, and we provide an extraction pipeline to NetQASM for simulation and deployment on quantum network hardware.", "url": "https://arxiv.org/abs/2607.20391", "type": "理论+数值", "summary": "对分布式量子系统进行编程需要多个参与者来协调量子操作、经典通信和纠缠生成的精确序列。直接将此类协议编写为分布式进程是乏味且容易出错的，并且细微的不匹配可能会导致死锁或默默地错误的量子状态。我们提出了 Qoreo，一种用于量子分布式系统的编排编程语言，其中整个协议被表示为单个全局程序（编排），而不是独立参与者进程的集合。 Qoreo 包含一种具有线性类型的本地量子语言，强制执行不可克隆原则；一种将本地量子计算与参与者间经典和量子通信相结合的编排语言；以及各个网络节点的过程语言。我们证明编排的类型安全，保证类型良好的程序实现明确定义的量子操作，并且我们定义端点投影（EPP），它自动从任何编排中派生出独立进程的网络。\n\n我们证明 EPP 在编排语义方面是健全且完整的；作为推论，每一个类型良好的编排都会投射到一个无死锁的流程网络。 Qoreo 的元理论在 Rocq 中完全机械化，我们为 NetQASM 提供了提取管道，以便在量子网络硬件上进行模拟和部署。", "authors": [{"name": "Jennifer Paykin"}, {"name": "Steven Baldasty"}, {"name": "Joseph P. Near"}, {"name": "Christian Skalka"}], "featured_authors": [{"name": "Jennifer Paykin"}, {"name": "Steven Baldasty"}, {"name": "Joseph P. Near"}, {"name": "Christian Skalka"}], "author_count": 4}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
