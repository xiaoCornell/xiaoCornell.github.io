4 at $1.9685k_F$ and passes through $\\pi^2/6$ at exactly $2k_F$ with a slope diverging as $\\ln^3|q-2k_F|$. Against this benchmark, the 1980 BDL tabulation is accurate to about one percent below $1.5k_F$, while the 2024 McLachlan-variational kernel of Nazarov and Silkin is two-percent accurate only below $0.5k_F$, is a factor of 1.74 low at $2k_F$, and its large-q limit is inconsistent with the contact constraint. A spin-resolved decomposition of QMC local field factors about the exact baseline shows that, within the resolution and smoothness assumptions of the QMC-based representations, both features follow from a strong exchange-correlation cancellation: at the QMC point closest to $2k_F$ ($q = 2.01k_F$, $r_s = 2$), correlation cancels 0.43(7) of the exact exchange value 1.33. Computed consistently at each wavevector, the static exchange-kernel thresholds derived from the closed form reproduce, to 0.2%, the finite-wavevector charge threshold $r_s \\approx 10.6$ near $q = 1.94k_F$ obtained numerically in 1980, and recovered again in 2014.", "url": "https://arxiv.org/abs/2607.20403", "type": "数值", "summary": "均匀电子气的静态局域场因子可以通过量子蒙特卡罗（QMC）计算准确得知，但它们最显着的两个特征缺乏机制：$G_+$几乎完全按照$q^2$增长到近$2k_F$，而费米表面的剧烈$2k_F$物理现象只在其中留下了微弱的痕迹。将教科书的一阶局部场关系与精确的静态交换极化率相结合，给出了一个紧凑的精确基准：通用仅交换局部场因子 $G_x(q,0) = -I(Q)Q^2/L(Q)^2$，$Q = q/2k_F$，精确值 $(1/4)(q/k_F)^2$ 在小 $q$ 处，$\\pi^2/6$ 在 $2k_F$ 处 - 显然以前从未说过作为局部场值 - 以及大$q$处的$1/3$，给出非极化气体的仅交换自旋平均接触值$g(0) = 1/2$（BDL 1977）。 $G_x$ 在 $1.9685k_F$ 处上升到有限最大值 1.9924，并在 $2k_F$ 处穿过 $\\pi^2/6$，斜率发散为 $\\ln^3|q-2k_F|$。\n\n与此基准相比，1980 年的 BDL 表格准确度约为 $1.5k_F$ 之下的百分之一，而 Nazarov 和 Silkin 的 2024 年 McLachlan 变分内核的准确度仅低于 $0.5k_F$ 百分之二，是 $2k_F$ 的 1.74 倍，并且其大 q 极限与接触约束不一致。关于精确基线的 QMC 局部场因子的自旋解析分解表明，在基于 QMC 表示的分辨率和平滑度假设内，这两个特征都源于强交换相关性抵消：在最接近 $2k_F$（$q = 2.01k_F$，$r_s = 2$）的 QMC 点，相关性抵消了精确交换值 1.33 的 0.43(7)。在每个波矢量上一致计算，从封闭形式导出的静态交换内核阈值再现了 1980 年数值计算得到的有限波矢量电荷阈值 $r_s \\approx 10.6$ 到 0.2%，并在 2014 年再次恢复。", "authors": [{"name": "Carl A. Kukkonen"}], "featured_authors": [{"name": "Carl A. Kukkonen"}], "author_count": 1}, {"id": "2607.20420", "category": "cond-mat", "title": "Optimal Finite-Time Control of Nonreciprocal Brownian Dimers: Thermodynamic Anomaly and Multiple Transitions", "abstract": "We solve exactly a finite-time thermodynamic optimal control problem for two nonreciprocally interacting Brownian particles translated by two harmonic traps. The controller manipulates both the center and separation of the pair. Nonreciprocal interactions generate an internal active force that couples these two channels. The optimal protocol is oscillatory, deliberately opens the dimer even when the target separation is unchanged, and can extract work during transport. A central finding is a finite critical time beyond which the external-work infimum is $-\\infty$: at any prescribed duration beyond this threshold, both extractable work and output power are unbounded. Physical regularizations such as finite trap range and force saturation restore a finite optimum and convert the anomaly into optimal-protocol transitions: in the zero-target case, a hard finite range produces a first-order-like jump from the zero protocol to a maximum-range protocol, whereas smooth force saturation gives a continuous, second-order-like onset. Under finite-range constraints, the optimal protocol can further undergo multiple finite-time transitions, producing multiple work-duration kinks with no qualitative analog in prior studies.", "url": "https://arxiv.org/abs/2607.20420", "type": "理论", "summary": "我们精确地解决了由两个谐波陷阱转换的两个非相互作用布朗粒子的有限时间热力学最优控制问题。控制器控制该对的中心和间隔。不可逆的相互作用产生耦合这两个通道的内部主动力。最佳方案是振荡的，即使目标分离不变，也会故意打开二聚体，并且可以在运输过程中提取功。一个中心发现是一个有限的关键时间，超过该时间，外部功下确界为 $-\\infty$：在超出此阈值的任何规定持续时间内，可提取功和输出功率都是无界的。有限陷阱范围和力饱和等物理正则化可恢复有限最佳值，并将异常转换为最佳协议转换：在零目标情况下，硬有限范围产生从零协议到最大范围协议的一阶跳跃，而平滑力饱和则提供连续的二阶起始。\n\n在有限范围约束下，最优协议可以进一步经历多个有限时间转换，产生多个工作持续时间的扭结，而在先前的研究中没有定性的模拟。", "authors": [{"name": "Ruicheng Bao"}], "featured_authors": [{"name": "Ruicheng Bao"}], "author_count": 1}, {"id": "2607.20421", "category": "cond-mat", "title": "Stable valleys in the glassy landscape of a low-density parity-check (LDPC) code", "abstract": "Classical low-density parity-check (cLDPC) codes defined on expander graphs are a fundamental ingredient in the construction of good quantum LDPC codes, a recent milestone in quantum error correction. They also define interesting statistical mechanics models in their own right, as they include examples of spin glass order without quenched randomness or frustration. We investigate this via a case study of a cLDPC code on a locally tree-like expander graph. Recursive techniques on trees, made possible by the locally tree-like property, probe a menagerie of stable, incongruent valleys induced by imposing different boundary conditions at low temperature. A complementary numerical study of the valleys on closed finite graphs reveals the inequivalence of the microcanonical and canonical ensemble for certain valleys.", "url": "https://arxiv.org/abs/2607.20421", "type": "理论+数值", "summary": "在扩展图上定义的经典低密度奇偶校验 (cLDPC) 码是构建良好量子 LDPC 码的基本要素，这是量子纠错领域的最新里程碑。他们还自行定义了有趣的统计力学模型，因为它们包含了没有淬灭随机性或挫败性的旋转玻璃有序的示例。我们通过本地树状扩展图上的 cLDPC 代码的案例研究对此进行了研究。树木的递归技术，由于局部树状特性而成为可能，探索了在低温下施加不同边界条件而引起的一系列稳定、不一致的山谷。对封闭有限图上的山谷进行的补充数值研究揭示了某些山谷的微正则系综和正则系综的不等价性。", "authors": [{"name": "Grace M. Sommers"}, {"name": "David A. Huse"}], "featured_authors": [{"name": "Grace M. Sommers"}, {"name": "David A. Huse"}], "author_count": 2}, {"id": "2607.20424", "category": "cond-mat", "title": "Quantum Fisher Information in semiclassical magnon systems", "abstract": "Quantum Fisher Information (QFI) is a powerful spectroscopic tool to witness many-body quantum entanglement in solid state materials, but it is not always obvious how to relate it to other characteristics of condensed matter systems. In this study we elaborate on the meaning and interpretation of QFI in condensed matter by examining simple theoretical spin systems. We use finite sized spin systems to illustrate that QFI quantifies the momentum- dependent degree of quantum entanglement (that is the entanglement depth at a given wave vector) within a wave function. We subsequently use semiclassical frustrated spin models to show that, in the context of linear spin wave theory (LSWT), QFI quantifies the momentum-dependent degree of magnon squeezing in the ground state. In antiferromagnets with a zero-energy Goldstone mode, LSWT breaks down and QFI (and entanglement depth) diverges at the magnetic ordering wave vector. We also show examples of emergent quantum phases in frustrated spin systems that do not appear in classical phase diagrams. When these emergent phases are approached, QFI diverges across multiple wave vectors in momentum space. Taken together, QFI is not only helpful as a lower bound for entanglement depth, but serves as a momentum-resolved probe of entanglement that offers a novel perspective on quantum critical phenomena.", "url": "https://arxiv.org/abs/2607.20424", "type": "理论+数值", "summary": "量子费希尔信息（QFI）是一种强大的光谱工具，可以见证固态材料中的多体量子纠缠，但如何将其与凝聚态物质系统的其他特征联系起来并不总是显而易见的。在这项研究中，我们通过研究简单的理论自旋系统来详细阐述凝聚态物质中 QFI 的含义和解释。我们使用有限大小的自旋系统来说明 QFI 量化了波函数内量子纠缠的动量相关程度（即给定波矢量处的纠缠深度）。随后，我们使用半经典受挫自旋模型来表明，在线性自旋波理论（LSWT）的背景下，QFI 量化了基态磁振子压缩的动量相关程度。在具有零能量戈德斯通模式的反铁磁体中，LSWT 发生故障，并且 QFI（和纠缠深度）在磁有序波矢量处发散。我们还展示了受挫自旋系统中出现的量子相的例子，这些量子相没有出现在经典相图中。当接近这些新兴阶段时，QFI 在动量空间中的多个波矢量上发散。\n\n总而言之，QFI 不仅有助于确定纠缠深度的下限，而且可以作为动量分辨的纠缠探针，为量子临界现象提供新的视角。", "authors": [{"name": "Wolfgang Simeth"}, {"name": "Pontus Laurell"}, {"name": "Allen Scheie"}], "featured_authors": [{"name": "Wolfgang Simeth"}, {"name": "Pontus Laurell"}, {"name": "Allen Scheie"}], "author_count": 3}, {"id": "2607.19443", "category": "hep-th", "title": "A T-Fold Black Hole in Doubled Type IIB", "abstract": "We construct an asymptotically flat T-fold representative of a four-dimensional dyonic black-hole charge orbit in doubled type-IIB theory. Starting from the F1-P-NS5-KKM toroidal seed, an integral parabolic T-duality monodromy is imposed on an active doubled three-torus. The non-geometric data enter only through this global patching: the Reissner-Nordström-type term is sourced by conserved four-dimensional electric and magnetic field strengths in the doubled Kaluza-Klein/winding local system, not by an internal algebraic \\(Q\\)-flux alone. Exact duality preserves the local equations, the BPS index, and the \\(O(6,6)\\)-invariant of the NS-NS/\\(N=4\\) charge sublattice governing the entropy. The minimal Einstein-Maxwell-dilaton slice contains a running-scalar branch and an equal-charge Reissner-Nordström limit; the extremal near-horizon region is locally \\(\\mathrm{AdS}_2\\times S^2\\), with the compact factor globally T-duality patched.", "url": "https://arxiv.org/abs/2607.19443", "type": "理论", "summary": "我们构造了一个渐进平坦的 T 折叠，代表双 IIB 型理论中的四维双子黑洞电荷轨道。从 F1-P-NS5-KKM 环形种子开始，积分抛物线 T-对偶单峰被强加于主动双三环上。非几何数据仅通过这种全局修补输入：Reissner-Nordström 型项源自加倍 Kaluza-Klein/绕组局部系统中守恒的四维电场和磁场强度，而不是仅源自内部代数 \\(Q\\)-通量。精确的对偶性保留了局部方程、BPS 指数和控制熵的 NS-NS/\\(N=4\\) 电荷子晶格的 \\(O(6,6)\\) 不变量。最小爱因斯坦-麦克斯韦膨胀切片包含一个运行标量分支和一个等电荷 Reissner-Nordström 极限；极值近地平线区域是局部的 \\(\\mathrm{AdS}_2\\times S^2\\)，紧致因子全局 T-对偶性修补。", "authors": [{"name": "Mir Faizal"}, {"name": "Arshid Shabir"}], "featured_authors": [{"name": "Mir Faizal"}, {"name": "Arshid Shabir"}], "author_count": 2}, {"id": "2607.19460", "category": "hep-th", "title": "On the Origin of Toric Diagrams", "abstract": "Five-dimensional superconformal field theories ($5d$ SCFTs) can be encoded by Generalized Toric Polygons (GTPs), where external legs of the dual $(p,q)$ five-brane web correspond to $T$-cones. Hanany-Witten transitions act on these geometries by flipping $T$-cones about their apex, thereby naturally endowing the choice of origin in the polygon with physical significance. It was recently conjectured that a suitably graded Hilbert series equals the Ehrhart series of the dual polytope, which, in turn, is an invariant under such mutations. In this paper, we introduce a prescription for assigning scaling dimensions to fields in the toric gauge theory associated with the underlying toric diagram and show that the resulting Hilbert series of the coherent component of the moduli space matches the geometric Hilbert series given by the Ehrhart series of the dual polytope once an origin is specified. We validate our construction through several non-trivial examples, including cases with multiple admissible choices of origin leading to distinct GTPs and brane-web realizations. Our results provide evidence that ordinary brane tilings retain non-trivial information about generalized toric polygons and suggest the existence of a deeper combinatorial structure underlying GTPs.", "url": "https://arxiv.org/abs/2607.19460", "type": "理论", "summary": "五维超共形场论 ($5d$ SCFT) 可以通过广义环面多边形 (GTP) 进行编码，其中双 $(p,q)$ 五膜网的外腿对应于 $T$ 锥体。 Hanany-Witten 过渡通过围绕其顶点翻转 $T$ 锥体来作用于这些几何形状，从而自然地赋予多边形中原点的选择具有物理意义。最近有人推测，适当分级的希尔伯特级数等于双多胞体的埃尔哈特级数，而后者又是此类突变下的不变量。在本文中，我们介绍了一种为复曲面规范理论中与底层复曲面图相关的场分配缩放维数的方法，并表明一旦指定了原点，模空间相干分量的希尔伯特级数与对偶多面体的埃尔哈特级数给出的几何希尔伯特级数相匹配。我们通过几个重要的例子验证了我们的构建，包括具有多种可接受的来源选择的案例，导致不同的 GTP 和膜网实现。\n\n我们的结果提供了证据，证明普通膜平铺保留了关于广义环面多边形的重要信息，并表明 GTP 背后存在更深层次的组合结构。", "authors": [{"name": "Sebastián Franco"}, {"name": "Diego Rodríguez-Gómez"}], "featured_authors": [{"name": "Sebastián Franco"}, {"name": "Diego Rodríguez-Gómez"}], "author_count": 2}, {"id": "2607.19462", "category": "hep-th", "title": "The Runkel-Watts string", "abstract": "We introduce and solve a new family of two-dimensional string theories obtained by coupling Liouville CFT to the generalized Runkel-Watts CFT. By taking an appropriate limit of the complex Liouville string, we derive an all-genus formula for its string amplitudes, and formulate a duality with a matrix integral. We explain that it can be interpreted as 2d SU(2) Yang-Mills theory coupled to gravity. We show that it also directly relates to other minimal string constructions such as the A-series minimal string.", "url": "https://arxiv.org/abs/2607.19462", "type": "理论", "summary": "我们引入并求解了通过将 Liouville CFT 与广义 Runkel-Watts CFT 耦合而获得的一系列新的二维弦理论。通过对复数刘维尔弦进行适当的限制，我们推导了其弦振幅的全属公式，并用矩阵积分表达了对偶性。我们解释说，它可以解释为与重力耦合的 2d SU(2) Yang-Mills 理论。我们证明它也与其他最小弦结构（例如 A 系列最小弦）直接相关。", "authors": [{"name": "Mattia Biancotto"}, {"name": "Lorenz Eberhardt"}, {"name": "Victor A. Rodriguez"}, {"name": "Zi-Yue Wang"}], "featured_authors": [{"name": "Mattia Biancotto"}, {"name": "Lorenz Eberhardt"}, {"name": "Victor A. Rodriguez"}, {"name": "Zi-Yue Wang"}], "author_count": 4}, {"id": "2607.19464", "category": "hep-th", "title": "Conformal QED in AdS as a BCFT", "abstract": "We study conformal Quantum Electrodynamics (QED) coupled to either $N_f$ massless fermions or $N_s$ conformally coupled scalars in Euclidean Anti-de Sitter (AdS$_d$) space for $d < 4$. Using the $\\epsilon$-expansion around $d=4$, we investigate the associated Boundary Conformal Field Theories (BCFTs) defined by imposing either Dirichlet or Neumann boundary conditions on the gauge field. We compute the regularized AdS free energy at the interacting fixed point up to next-to-leading order and extract some of the boundary conformal data at one loop, including the anomalous dimensions of the lightest singlet scalar operators. For Dirichlet boundary conditions, extrapolation of our $\\epsilon$-expansion results indicate that one of these scalar operators, which is irrelevant near $d=4$, reaches marginality within the range $3 < d < 4$. This suggests that the Dirichlet boundary condition may not define a stable BCFT in $d=3$.", "url": "https://arxiv.org/abs/2607.19464", "type": "理论", "summary": "我们研究在欧几里得反德西特 (AdS$_d$) 空间中与 $N_f$ 无质量费米子或 $N_s$ 共形耦合标量耦合的共形量子电动力学 (QED)，$d < 4$。使用 $d=4$ 附近的 $\\epsilon$ 展开，我们研究了通过在规范场上施加狄利克雷或诺伊曼边界条件定义的相关边界共形场论 (BCFT)。我们计算相互作用固定点处的正则化 AdS 自由能直至次前导阶，并在一个循环中提取一些边界共形数据，包括最轻单重态标量算子的异常维数。对于狄利克雷边界条件，我们的 $\\epsilon$ 展开结果的外推表明，这些标量运算符之一在 $d=4$ 附近不相关，在 $3 < d < 4$ 范围内达到边缘性。这表明狄利克雷边界条件可能无法定义 $d=3$ 中的稳定 BCFT。", "authors": [{"name": "Fabiana De Cesare"}, {"name": "Simone Giombi"}], "featured_authors": [{"name": "Fabiana De Cesare"}, {"name": "Simone Giombi"}], "author_count": 2}, {"id": "2607.19468", "category": "hep-th", "title": "Confinement Versus Screening in the Schwinger Model on AdS$_2$ from Bosonization and Tensor Networks", "abstract": "We analyze confinement and screening in single-flavor quantum electrodynamics (QED$_2$) on two-dimensional anti-de Sitter space (AdS$_2$), with and without a Schwarzschild black hole, both in the continuum and on the lattice. The theory is formulated in two frames adapted to distinct choices of a preferred time coordinate: the Schwarzschild frame, associated with the Boulware vacuum, and the global AdS$_2$ frame, associated with the $\\mathrm{SL}(2,\\mathbb{R})$-invariant vacuum. In the massless limit, the static potential between an external charge-anticharge pair is obtained in closed form by bosonization, at both zero and finite temperature. After subtraction of the position-dependent probe self-energies, which, unlike in flat space, are not constant, the potential remains finite as the geodesic separation is taken to infinity, establishing that the theory is screened. This is consistent with the explicit breaking of the $\\mathrm{U}(1)$ electric one-form symmetry by the dynamical fermions, and resolves a confining/screening ambiguity in earlier treatments that identify the static potential with the unsubtracted ground-state energy. To validate the continuum analysis, we propose a covariant discretization scheme for placing fermions in curved spacetime on the lattice while ensuring that the continuum properties of the spin and gauge connections are restored in the continuum limit. This construction resolves ambiguities in the existing literature on lattice fermions in curved backgrounds and provides the foundation for our tensor-network simulations. Using a matrix product state ansatz, we confirm our analytical predictions for the phase diagram in AdS$_2$. We perform extensive numerical simulations of the static potential and the electric flux-tube profile for varying fermion masses, which we match to the continuum prediction.", "url": "https://arxiv.org/abs/2607.19468", "type": "理论", "summary": "我们分析了二维反德西特空间 (AdS$_2$) 上单味量子电动力学 (QED$_2$) 的限制和屏蔽，无论有没有史瓦西黑洞，无论是在连续体还是在晶格上。该理论在两个适应不同首选时间坐标选择的框架中表述：与 Boulware 真空相关的 Schwarzschild 框架，以及与 $\\mathrm{SL}(2,\\mathbb{R})$ 不变真空相关的全局 AdS$_2$ 框架。在无质量极限下，外部电荷-反电荷对之间的静电势是在零温度和有限温度下通过玻色化以闭合形式获得的。与平坦空间不同，与位置相关的探针自能不是恒定的，在减去位置相关的探针自能后，当测地线分离达到无穷大时，电势保持有限，从而确定该理论已被筛选。这与动态费米子对 $\\mathrm{U}(1)$ 电一式对称性的明确破坏是一致的，并解决了早期处理中用未减去的基态能量识别静态势的限制/屏蔽模糊性。\n\n为了验证连续统分析，我们提出了一种协变离散方案，将费米子放置在晶格上的弯曲时空中，同时确保自旋和规范连接的连续特性在连续极限内恢复。这种结构解决了现有文献中关于弯曲背景中晶格费米子的模糊性，并为我们的张量网络模拟提供了基础。使用矩阵乘积状态 ansatz，我们确认了对 AdS$_2$ 中相图的分析预测。我们对不同费米子质量的静电势和电通量管轮廓进行了广泛的数值模拟，并将其与连续介质预测相匹配。", "authors": [{"name": "Sriram Bharadwaj"}, {"name": "Jack Isen"}, {"name": "Zhong-Bo Kang"}], "featured_authors": [{"name": "Sriram Bharadwaj"}, {"name": "Jack Isen"}, {"name": "Zhong-Bo Kang"}], "author_count": 3}, {"id": "2607.19709", "category": "hep-th", "title": "Point-Like Charges and Dirichlet Boundary Conditions in a Nonlocal Scalar Field Theory", "abstract": "In this paper, we investigate novel classical non-local effects in scalar field theory arising from the presence of external sources and a material boundary. Specifically, we consider a model in which the standard Klein-Gordon field theory is modified by a non-local term. First, we analyze the interaction between stationary field sources modeled as point-like scalar charges. In specific configurations, the resulting interparticle potential reduces to the Cornell form. Then, we examine the model in the presence of a Dirichlet plane, computing both the scalar field propagator and the interaction force between the Dirichlet plane and a point-like scalar charge. Additionally, we demonstrate the failure of the image method in this non-local context and compare our results with those obtained in non-local electrodynamics and in the standard Klein-Gordon field theory.", "url": "https://arxiv.org/abs/2607.19709", "type": "理论", "summary": "在本文中，我们研究了标量场理论中由于外部源和材料边界的存在而产生的新颖的经典非局域效应。具体来说，我们考虑一个模型，其中标准克莱因-戈登场论被非局部项修改。首先，我们分析模拟为点状标量电荷的固定场源之间的相互作用。在特定的配置中，产生的颗粒间电势降低为康奈尔形式。然后，我们在存在狄利克雷平面的情况下检查模型，计算标量场传播器以及狄利克雷平面与点状标量电荷之间的相互作用力。此外，我们证明了图像方法在这种非局部环境中的失败，并将我们的结果与非局部电动力学和标准克莱因-戈登场论中获得的结果进行比较。", "authors": [{"name": "L.H.C. Borges"}, {"name": "C. Filgueiras"}, {"name": "F.A. Barone"}, {"name": "A.A. Nogueira"}], "featured_authors": [{"name": "L.H.C. Borges"}, {"name": "C. Filgueiras"}, {"name": "F.A. Barone"}, {"name": "A.A. Nogueira"}], "author_count": 4}, {"id": "2607.19748", "category": "hep-th", "title": "Resolved Maxwell-Boundary Normal Forms and Exact Reentrant Scaling in Accelerating AdS Black Holes", "abstract": "Reentrant phase transitions of accelerating anti-de Sitter black holes are known numerically, but their apparent loss at small string tension has lacked an analytic explanation. In the single-string ensemble at fixed pressure, charge, and tension, we solve the unrestricted two-phase Maxwell-turning problem for the charged slowly accelerating C-metric. Elimination forces the two horizon coordinates to coincide and yields a closed one-parameter locus. An exhaustive enumeration of the remaining equilibria establishes global phase selection throughout the physical black-hole sector. The locus exists for $0<\\mu<0.202602$, with no positive lower threshold. As $\\mu\\to0$, the pressure and temperature widths of the reentrant window contract as the fourth and third powers of the tension, while the entropy gap and latent heat diverge. A two-chart blow-up gives a parameter-free limiting profile and identifies thermodynamic-volume inversion as the turning mechanism between two distinct noncritical phases. At a Maxwell boundary with fixed sheet incidence, projective Newton data of the thermodynamic jumps determine the leading coexistence profile. Their positive simple roots fix the turn count, order, and curvature signs; the C-metric realizes the primitive binomial class.", "url": "https://arxiv.org/abs/2607.19748", "type": "理论", "summary": "加速反德西特黑洞的重入相变在数值上是已知的，但它们在小弦张力下的明显损失缺乏分析解释。在固定压力、电荷和张力的单弦系综中，我们解决了带电缓慢加速 C 度量的无限制两相麦克斯韦转动问题。消除迫使两个水平坐标重合并产生闭合的单参数轨迹。对剩余平衡的详尽枚举建立了整个物理黑洞扇区的全局相位选择。该轨迹存在于 $0<\\mu<0.202602$，没有正的下限阈值。当 $\\mu\\to0$ 时，折返窗口的压力和温度宽度随着张力的四次方和三次方收缩，而熵差和潜热则发散。两个图的放大给出了无参数的限制曲线，并将热力学体积反演确定为两个不同的非关键相之间的转动机制。在具有固定片入射角的麦克斯韦边界处，热力学跳跃的投影牛顿数据确定了主要的共存曲线。\n\n它们的正单根确定了匝数、顺序和曲率符号； C-度量实现了原始二项式类。", "authors": [{"name": "Ruiliang Li"}], "featured_authors": [{"name": "Ruiliang Li"}], "author_count": 1}, {"id": "2607.20304", "category": "hep-th", "title": "Real Quantum Field Theory, J-Quantization, and Standard Model", "abstract": "We present a formulation of quantum field theory based entirely on real numbers, which we call real quantum field theory (RQFT). The construction is obtained from the standard complex-number formulation by replacing the imaginary unit i with a matrix J throughout all formulas. Here J is the real 2x2 matrix satisfying the condition J^2=-1. This extends the recently developed formulation of real quantum mechanics based on the real Kähler space to systems with infinitely many degrees of freedom. As the basic example, we construct the RQFT for a scalar field. We define a field operator acting on the real Kähler analogue of the bosonic Fock space. This operator satisfies the Klein-Gordon equation and the J-form of canonical commutation relation. To construct the RQFT we develop the corresponding J-calculus. In particular, we introduce the direct and inverse J-Fourier transforms and the associated J-valued distributions. In RQFT, the usual unitarity condition for the complex S-matrix is replaced by the statement that the real scattering operator is both orthogonal and symplectic. The physical observables in RQFT coincide with those of ordinary QFT. Thus RQFT does not change the physical predictions of scalar QFT, but provides an equivalent formulation. We explore the possibility of purely real formulations of the Standard Model of elementary particles. We show that it does admit this formulation and the resulting theory has ortho-symplectic symmetry. The choice of the Standard Model as the testbed for exploring the possibility of purely real formulations is related with the fact it provides a realistic description of all known fundamental particles. The real formulation of the Standard Model naturally suggests a possible exit beyond the Standard Model. In particular, we consider the implications of breaking the J-symmetry as a marker for new physics.", "url": "https://arxiv.org/abs/2607.20304", "type": "理论", "summary": "我们提出了一种完全基于实数的量子场论表述，我们称之为实量子场论（RQFT）。通过在所有公式中用矩阵 J 替换虚数单位 i，从标准复数公式获得该结构。这里 J 是满足条件 J^2=-1 的实数 2x2 矩阵。这将最近开发的基于真实凯勒空间的真实量子力学公式扩展到具有无限多个自由度的系统。作为基本示例，我们构建标量场的 RQFT。我们定义了一个作用于玻色福克空间的真实凯勒类似物的场算子。该算子满足Klein-Gordon方程和正则交换关系的J形式。为了构建 RQFT，我们开发了相应的 J 演算。特别是，我们介绍了直接和逆 J 傅里叶变换以及相关的 J 值分布。在 RQFT 中，复数 S 矩阵的通常幺正性条件被实散射算子既正交又辛的陈述所取代。 RQFT 中的物理可观测量与普通 QFT 的物理可观测量一致。\n\n因此，RQFT 不会改变标量 QFT 的物理预测，而是提供等效的公式。我们探索基本粒子标准模型的纯真实公式的可能性。我们证明它确实承认这个公式，并且由此产生的理论具有正交辛对称性。选择标准模型作为探索纯真实公式可能性的测试平台与它提供了所有已知基本粒子的真实描述这一事实有关。标准模型的真实表述自然表明了标准模型之外的可能退出。特别是，我们考虑打破 J 对称性作为新物理学标志的含义。", "authors": [{"name": "I. Aref'eva"}, {"name": "I. Volovich"}], "featured_authors": [{"name": "I. Aref'eva"}, {"name": "I. Volovich"}], "author_count": 2}, {"id": "2607.20308", "category": "hep-th", "title": "Three-dimensional TQFTs from Argyres--Douglas theories via the 3d/3d correspondence", "abstract": "We study the twisted dimensional reduction of 4d $\\mathcal{N}=2$ Argyres--Douglas theories via the 3d/3d correspondence, focussing on $(A_1, A_{2n})$ theories realised as the class-$\\mathcal{S}$ theory $T[\\mathcal{C}]$ for a curve $\\mathcal{C}$ with one irregular puncture. We argue the resulting 3d $\\mathcal{N}=4$ rank-0 superconformal field theory (SCFT) arises as the IR fixed point of a Dimofte--Gaiotto--Gukov (DGG) abelian Chern--Simons-matter (ACSM) theory $T[M_3^{(k)}]$ for the lens space $M_3^{(k)}=L(2n+3,2k)$, obtained by fibering $\\mathcal{C}$ over the circle with twist $k \\in \\mathbb{Z}_{2n+3}^\\times$. The triangulation of $M_3^{(k)}$, derived from the 4d BPS spectrum, determines the ACSM theory including its superpotential. $T[M_3^{(k)}]$ flows to the expected SCFT when the monopole superpotential is near-maximal in a precise sense, while the maximal superpotential gives $T_A[M_3^{(k)}]$, which flows directly to a non-unitary TQFT, the topological $A$-twist of the SCFT. Geometrically, the SCFT and TQFT points are related by shifting conical singularities between edges of the triangulation, and we propose a correspondence between singular edges and SCFT points predicting when the SCFT is a unitary TQFT. The TQFTs from $M_3^{(k)}$ can support 2d vertex operator algebras (VOAs) on their holomorphic boundary, including the Schur-sector VOA of the 4d SCFT for $k=1$. For $n=k=1$, our construction reproduces the minimal 3d $\\mathcal{N}=4$ SCFT of Gang and Yamazaki from $L(5,2)$, where $T_A[M_3^{(k)}]$ is the Yang--Lee TQFT supporting $M(2,5)$ on its boundary. We check our proposals in detail, reconstructing the modular structure of the IR TQFTs from partition functions on Seifert manifolds, and matching phases to determine VOA central charges $c_{\\text{2d}} \\bmod 8$ from the ACSM data, including the gravitational Chern--Simons level.", "url": "https://arxiv.org/abs/2607.20308", "type": "理论", "summary": "我们通过 3d/3d 对应研究 4d $\\mathcal{N}=2$ Argyres--Douglas 理论的扭曲维数约简，重点关注 $(A_1, A_{2n})$ 理论，该理论实现为 $\\mathcal{S}$ 类理论 $T[\\mathcal{C}]$，适用于具有一个不规则穿刺的曲线 $\\mathcal{C}$。我们认为由此产生的 3d $\\mathcal{N}=4$ 等级 0 超共形场论 (SCFT) 是作为透镜空间 $M_3^{(k)}=L(2n+3,2k)$ 的 Dimofte--Gaiotto--Gukov (DGG) 阿贝尔 Chern--Simons-matter (ACSM) 理论 $T[M_3^{(k)}]$ 的 IR 不动点而出现的，通过将 $\\mathcal{C}$ 绕在圆上并扭曲 $k \\in \\mathbb{Z}_{2n+3}^\\times$ 获得。从 4d BPS 谱导出的 $M_3^{(k)}$ 三角剖分确定了 ACSM 理论，包括其超势。当单极子超电势在精确意义上接近最大时，$T[M_3^{(k)}]$ 流向预期的 SCFT，而最大超电势给出 $T_A[M_3^{(k)}]$，它直接流向非酉 TQFT，即 SCFT 的拓扑 $A$ 扭曲。\n\n在几何上，SCFT 和 TQFT 点通过在三角测量的边缘之间移动圆锥奇点而相关，并且我们提出奇异边缘和 SCFT 点之间的对应关系，预测 SCFT 何时是酉 TQFT。 $M_3^{(k)}$ 中的 TQFT 可以在其全纯边界上支持 2d 顶点算子代数 (VOA)，包括 $k=1$ 的 4d SCFT 的 Schur 扇区 VOA。对于 $n=k=1$，我们的构造从 $L(5,2)$ 再现 Gang 和 Yamazaki 的最小 3d $\\mathcal{N}=4$ SCFT，其中 $T_A[M_3^{(k)}]$ 是在其边界上支持 $M(2,5)$ 的 Yang--Lee TQFT。我们详细检查我们的建议，根据 Seifert 流形上的配分函数重建 IR TQFT 的模块化结构，并匹配相位以根据 ACSM 数据确定 VOA 中心电荷 $c_{\\text{2d}} \\bmod 8$，包括引力 Chern-Simons 水平。", "authors": [{"name": "Cyril Closset"}, {"name": "Adam Keyes"}, {"name": "Sungjoon Kim"}], "featured_authors": [{"name": "Cyril Closset"}, {"name": "Adam Keyes"}, {"name": "Sungjoon Kim"}], "author_count": 3}, {"id": "2607.20312", "category": "hep-th", "title": "Higher Superspace Supergravity and its IR-Completions", "abstract": "It is an old idea that higher-dimensional super-gravity (SuGra) is put on-shell just by imposing Bianchi identities on super-field strengths over super-spacetimes subject to super-torsion constraints. We give a modernized, rigorous account and review recent developments, pointing out how this perspective lends itself to the construction of infrared completions of SuGra by electromagnetic flux quantization in differential nonabelian cohomology theories $\\mathcal{A}_{\\mathrm{dff}}$ lifting the coefficient $L_\\infty$-algebra $\\mathfrak{l}\\mathcal{A}$ of the super-Bianchi identities. After surveying necessary background, we highlight: (1.) our recent proof that solutions of 11D SuGra are equivalent to the $\\mathfrak{l}S^4$-Bianchi identities on super $C$-field flux over super-torsion-free 11D super-spacetimes, (2.) how from this the nonlinearly self-dual gauge sector on 6D M5-brane worldvolumes is equivalent to the $\\mathfrak{l}_{S^4}S^7$-Bianchi identity on super $B$-field flux, (3.) and the recent complete discussion of superspace dimensional reduction of this situation to 10D IIA SuGra via $\\mathfrak{l}\\mathrm{Cyc}(S^4)$-Bianchi identities on super NS/RR-flux, together with its extension to further reduction to 9 SuGra via $\\mathfrak{l}\\mathrm{Tor}(S^4)$-Bianchis on the corresponding super-fluxes. We close by indicating how this implies consistent infrared completions of 11D SuGra by $C$-field flux quantization in 4-Cohomotopy, of 10D IIA SuGra by NS/RR-field flux-quantization in a form of twisted unstable K-theory, and of M5-brane worldvolumes by $B$-field flux-quantization in twisted (twistorial) relative Cohomotopy. The latter admits geometric engineering of experimentally relevant topological quantum orders.", "url": "https://arxiv.org/abs/2607.20312", "type": "理论", "summary": "一个古老的想法是，仅通过将比安奇恒等式强加于超时空中的超场强度（受超扭转约束）即可将高维超引力（SuGra）置于壳上。我们给出了现代化的、严格的描述并回顾了最近的进展，指出这种观点如何适用于通过微分非阿贝尔上同调理论 $\\mathcal{A}_{\\mathrm{dff}}$ 中的电磁通量量子化构建 SuGra 的红外完成，提升了超比安奇恒等式的系数 $L_\\infty$-代数 $\\mathfrak{l}\\mathcal{A}$。\n\n在调查了必要的背景之后，我们强调：（1.）我们最近证明 11D SuGra 的解等效于超 $C$ 场通量上超扭转 11D 超时空的 $\\mathfrak{l}S^4$-Bianchi 恒等式，（2.）由此可知 6D M5 膜世界卷上的非线性自对偶规范扇区如何等效于$\\mathfrak{l}_{S^4}S^7$-Bianchi 恒等式在超级 $B$-场通量上，(3.) 以及最近通过 $\\mathfrak{l}\\mathrm{Cyc}(S^4)$-Bianchi 恒等式在超级 NS/RR-通量上将这种情况降维到 10D IIA SuGra 的完整讨论，以及通过扩展进一步降维到 9 SuGra $\\mathfrak{l}\\mathrm{Tor}(S^4)$-Bianchis 对应的超通量。最后，我们指出这如何意味着通过 4-同伦中的 $C$ 场通量量化来实现 11D SuGra 的一致红外完成，通过扭曲不稳定 K 理论形式的 NS/RR 场通量量化来实现 10D IIA SuGra 的一致红外完成，以及通过扭曲（扭转）相对同伦中的 $B$ 场通量量化来实现 M5-膜世界体积的一致红外完成。后者承认实验相关的拓扑量子序的几何工程。", "authors": [{"name": "Grigorios Giotopoulos"}, {"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "featured_authors": [{"name": "Grigorios Giotopoulos"}, {"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "author_count": 3}, {"id": "2607.20313", "category": "hep-th", "title": "Resolution of Gauss' law in the maximal Abelian gauge", "abstract": "We resolve Gauss' law in the maximal Abelian gauge supplemented by the Coulomb gauge for the Abelian gauge field and derive the gauge-fixed Hamiltonian of QCD.", "url": "https://arxiv.org/abs/2607.20313", "type": "理论", "summary": "我们在最大阿贝尔规范中求解高斯定律，并辅以阿贝尔规范场的库仑规范，并推导了 QCD 的规范固定哈密顿量。", "authors": [{"name": "D. R. Junior"}, {"name": "H. Reinhardt"}], "featured_authors": [{"name": "D. R. Junior"}, {"name": "H. Reinhardt"}], "author_count": 2}, {"id": "2607.19641", "category": "math-ph", "title": "$C_0$-Semigroups on d.m.o. linear relations", "abstract": "This article develops a theory of one-parameter semigroups for linear relations, introducing the notion of domain-multivalued orthogonal (d.m.o.) relations. We establish complete characterizations for generators of uniformly and strongly continuous semigroups, showing them to be maximal and densely d.m.o. relations, respectively. Furthermore, the Hille-Yosida and Lumer-Phillips theorems are extended to this general setting, providing necessary and sufficient conditions for generating $C_0$-semigroups of contractions (identified as maximal anti-accumulative relations) and unitary operators (anti-selfadjoint relations). This rigorous framework sheds new light on the peculiarities of one-parameter semigroups for linear relations.", "url": "https://arxiv.org/abs/2607.19641", "type": "理论", "summary": "本文发展了一种线性关系的单参数半群理论，引入了域多值正交 (d.m.o.) 关系的概念。我们为均匀且强连续的半群生成元建立了完整的表征，表明它们是最大且稠密的 d.m.o。关系，分别。此外，Hille-Yosida 和 Lumer-Phillips 定理被扩展到这个一般设置，为生成 $C_0$-收缩半群（被识别为最大反累加关系）和酉算子（反自共轭关系）提供了必要和充分的条件。这一严格的框架为线性关系的单参数半群的特性提供了新的视角。", "authors": [{"name": "Luis D. Regalado-Hernández"}, {"name": "Josué I. Rios-Cangas"}], "featured_authors": [{"name": "Luis D. Regalado-Hernández"}, {"name": "Josué I. Rios-Cangas"}], "author_count": 2}, {"id": "2607.19797", "category": "math-ph", "title": "Recurrence Coefficients of the Orthogonal Polynomials for Oscillatory Jacobi-type Weight Functions", "abstract": "We study two classes of oscillatory Jacobi-type weight functions $x^c(1-x^2)^{\\lambda-1/2}\\exp(i\\zeta x)$, $x\\in[-1,1], \\lambda>-1/2, c\\in\\{0,1\\}$. Other restrictions are imposed on $\\lambda$ and $\\zeta$ to guarantee the existence of the associated orthogonal polynomials. By using the ladder operators established in the recent literature for monic orthogonal polynomials associated with Jacobi-type weight functions and three compatibility conditions, we derive two coupled difference equations satisfied by the three-term recurrence coefficients. Compared with the existing results, these equations are structurally simpler and of lower order. Once the initial values are determined, the recurrence coefficients can be computed at any stage through the difference equations. The obtained expressions enable us to conjecture the symbolic forms for the recurrence coefficients.", "url": "https://arxiv.org/abs/2607.19797", "type": "理论", "summary": "我们研究两类振荡雅可比型权重函数 $x^c(1-x^2)^{\\lambda-1/2}\\exp(i\\zeta x)$、$x\\in[-1,1]、\\lambda>-1/2、c\\in\\{0,1\\}$。对 $\\lambda$ 和 $\\zeta$ 施加其他限制以保证相关正交多项式的存在。利用最近文献中建立的与雅可比型权函数和三个相容条件相关的一元正交多项式的梯子算子，我们推导了三项递推系数满足的两个耦合差分方程。与现有结果相比，这些方程结构更简单，阶数更低。一旦确定了初始值，就可以通过差分方程计算任意阶段的递推系数。所获得的表达式使我们能够推测递推系数的符号形式。", "authors": [{"name": "Shulin Lyu"}, {"name": "Xun Zhou"}], "featured_authors": [{"name": "Shulin Lyu"}, {"name": "Xun Zhou"}], "author_count": 2}, {"id": "2607.20106", "category": "math-ph", "title": "Explicit Hamiltonian structure of the Flaschka-Newell Painlevé II hierarchy via symmetry reduction of the Painlevé IV hierarchy", "abstract": "We study the Hamiltonian structure of the Flaschka-Newell Painlevé II hierarchy via symmetry reduction of the associated space of meromorphic connections. Building on the realization of this hierarchy as a reduction of the Painlevé IV hierarchy via a $\\mathbb{Z}_2$-symmetry, we construct a set of Darboux coordinates adapted to the involution. After a suitable change of trivialization, the symmetry acts diagonally in these coordinates, allowing the fixed-point locus to be explicitly described as a symplectic submanifold. This enables us to derive the reduced Hamiltonians after symmetry, thereby obtaining explicit expressions for the Hamiltonians and the Lax matrices of the Flaschka-Newell Painlevé II hierarchy. This strategy also illustrates how symmetry-adapted canonical Darboux coordinates enable explicit reductions of isomonodromic systems at the level of their underlying symplectic geometry.", "url": "https://arxiv.org/abs/2607.20106", "type": "理论", "summary": "我们通过亚纯连接相关空间的对称性约简来研究 Flaschka-Newell Painlevé II 层次结构的哈密顿结构。基于通过 $\\mathbb{Z}_2$ 对称性对 Painlevé IV 层次结构进行约简来实现该层次结构，我们构造了一组适应对合的达布坐标。在对平凡化进行适当的改变之后，对称性在这些坐标中对角作用，从而允许将定点轨迹明确地描述为辛子流形。这使我们能够在对称后导出简化的哈密顿量，从而获得哈密顿量和 Flaschka-Newell Painlevé II 层次结构的 Lax 矩阵的显式表达式。该策略还说明了对称适应的规范达布坐标如何能够在其基础辛几何水平上显式减少等单系统。", "authors": [{"name": "Olivier Marchal"}, {"name": "Mohamad Alameddine"}, {"name": "Sergej Laub"}], "featured_authors": [{"name": "Olivier Marchal"}, {"name": "Mohamad Alameddine"}, {"name": "Sergej Laub"}], "author_count": 3}, {"id": "2607.20400", "category": "math-ph", "title": "A perturbative microscopic derivation of the focusing $Φ^6_1$ measure with rough cut-off", "abstract": "We give a derivation of the Gibbs measure for the focusing nonlinear Schrödinger equation (NLS) on the circle with rough cut-off. This extends earlier work by Sohinger and the second author, which proved analogous results for smooth cut-offs. Our proof is based on the perturbative expansion developed by Fröhlich, Knowles, Schlein, and Sohinger (2017), and provides an alternative proof of the recent derivation given in Lü, Nam, and Zhu (2026). To prove convergence of the explicit terms, we employ a Wigner measure approach and an inductive argument to overcome the lack of smoothness for the cut-off. In particular, we give a derivation of the Gibbs measure for the focusing quintic NLS with the optimal cut-off from Oh, Sosoe, and Tolomeo (2022).", "url": "https://arxiv.org/abs/2607.20400", "type": "理论", "summary": "我们给出了在粗截止圆上聚焦非线性薛定谔方程（NLS）的吉布斯测度的推导。这扩展了 Sohinger 和第二作者的早期工作，证明了平滑截止的类似结果。我们的证明基于 Fröhlich、Knowles、Schlein 和 Sohinger (2017) 提出的微扰展开式，并为 Lü、Nam 和 Zhu (2026) 给出的最新推导提供了替代证明。为了证明显式项的收敛性，我们采用维格纳测度方法和归纳论证来克服截止平滑度的缺乏。特别是，我们根据 Oh、Sosoe 和 Tolomeo (2022) 给出了具有最佳截止值的聚焦五次 NLS 的吉布斯测度的推导。", "authors": [{"name": "Shahnaz Farhat"}, {"name": "Andrew Rout"}], "featured_authors": [{"name": "Shahnaz Farhat"}, {"name": "Andrew Rout"}], "author_count": 2}, {"id": "2607.19446", "category": "quant-ph", "title": "Decoder Comparability Across Quantum Software Stacks: Repeated-Round Surface and Digitized-GKP Syndrome Replay", "abstract": "We present a contract-preserving, family-aware comparison of decoder behavior across four syndrome-generation stacks (PennyLane, Qiskit, Cirq, and a LiDMaS+ reference) under a fixed replay interface. Request streams from repeated-round surface-code and digitized-GKP circuits are replayed through BP, MWPM, and UF with matched controls. The unified matrix spans 24 cells and achieves line-level integrity: $24\\,000$ request lines, $24\\,000$ response lines, response ratio $=1.0$ in every cell, zero parse failures, and zero decoder-name mismatches. Fifteen warning-no-syndrome events occur only in GKP-Cirq rows. Within-family ordering is stable in both families ($\\mathrm{BP}<\\mathrm{MWPM}<\\mathrm{UF}$); source-averaged flip counts are 2.435, 4.768, and 5.870 for surface and 1.595, 2.908, and 3.681 for GKP. Relative to MWPM, BP reduces mean intervention volume by $48.9\\%$ in surface and $45.1\\%$ in GKP. Source-vs-reference effects are family dependent, with larger coherent shifts in GKP. Source-bootstrap ranks remain unchanged, and hidden-truth sidecars add an outer-code logical-parity error-rate check in which UF has the largest source-mean rate in both families. The comparison is stack-aware, contract-verified, and avoids raw cross-family threshold-equivalence claims.", "url": "https://arxiv.org/abs/2607.19446", "type": "理论", "summary": "我们在固定重播接口下对四个综合症生成堆栈（PennyLane、Qiskit、Cirq 和 LiDMaS+ 参考）的解码器行为进行了契约保留、家族感知的比较。来自重复轮表面编码和数字化 GKP 电路的请求流通过具有匹配控制的 BP、MWPM 和 UF 进行重放。统一矩阵跨越 24 个单元，并实现行级完整性：$24\\,000$ 请求行、$24\\,000$ 响应行、每个单元中的响应比率 $=1.0$、零解析失败和零解码器名称不匹配。十五个警告无症状事件仅发生在 GKP-Cirq 行中。两个家族的族内排序都是稳定的 ($\\mathrm{BP}<\\mathrm{MWPM}<\\mathrm{UF}$)；表面的源平均翻转计数为 2.435、4.768 和 5.870，GKP 的源平均翻转计数为 1.595、2.908 和 3.681。相对于 MWPM，BP 将地表平均干预量减少 $48.9\\%$，将 GKP 减少 $45.1\\%$。源与参考效应取决于族，GKP 具有较大的相干变化。源引导排名保持不变，隐藏真相 sidecar 添加了外部代码逻辑奇偶校验错误率检查，其中 UF 在两个系列中具有最大的源平均率。\n\n该比较是堆栈感知的、合同验证的，并且避免了原始的跨系列阈值等效性声明。", "authors": [{"name": "Dennis Delali Kwesi Wayo"}, {"name": "Chinonso Onah"}, {"name": "Rodrigo Alves Dias"}, {"name": "Leonardo Goliatt"}, {"name": "Zaher Mundher Yaseen Sven Groppe"}], "featured_authors": [{"name": "Dennis Delali Kwesi Wayo"}, {"name": "Chinonso Onah"}, {"name": "Rodrigo Alves Dias"}, {"name": "Leonardo Goliatt"}, {"name": "Zaher Mundher Yaseen Sven Groppe"}], "author_count": 5}, {"id": "2607.19499", "category": "quant-ph", "title": "A unified framework for anomalous boson bunching", "abstract": "Anomalous bunching is a paradoxical quantum interferometric phenomenon in which partially distinguishable photons exhibit a higher probability of bunching into two or more modes than fully indistinguishable photons [Nat. Photonics 17, 702 (2023)]. While this effect is directly linked to violations of certain conjectures on matrix permanents, the mechanism underlying the anomaly is not yet fully understood. Here, we show that boson bunching is governed not by internal indistinguishability alone, but by the total indistinguishability of the postselected output state. Total indistinguishability combines the internal degrees of freedom, such as polarization or arrival time, with the spatial degrees of freedom of their wave functions restricted to the measured output modes of the interferometer. This reformulation preserves the expected connection between boson bunching and total indistinguishability, while clarifying how anomalous bunching can arise. It also reveals several additional facets of the same phenomenon, which are captured within a unified framework. In particular, we exhibit situations in which adding an independent source of distinguishability, either internal or spatial, can enhance multimode or even single-mode bunching probabilities, offering new insights into the subtle role of distinguishability in multiphoton interference.", "url": "https://arxiv.org/abs/2607.19499", "type": "理论", "summary": "反常聚束是一种矛盾的量子干涉现象，其中部分可区分的光子比完全不可区分的光子表现出更高的聚束成两种或多种模式的可能性[Nat.光子学 17, 702 (2023)]。虽然这种效应与违反矩阵永久物的某些猜想直接相关，但该异常背后的机制尚未完全了解。在这里，我们证明玻色子聚束不仅受内部不可区分性的影响，而且受后选择输出状态的完全不可区分性的影响。完全不可区分性将内部自由度（例如偏振或到达时间）与其波函数的空间自由度（仅限于干涉仪测量的输出模式）结合起来。这种重新表述保留了玻色子聚束和完全不可区分性之间的预期联系，同时阐明了异常聚束是如何产生的。它还揭示了同一现象的几个其他方面，这些方面都被捕获在一个统一的框架内。\n\n特别是，我们展示了添加独立的可区分性来源（内部或空间）可以增强多模甚至单模聚束概率的情况，为多光子干涉中可区分性的微妙作用提供了新的见解。", "authors": [{"name": "Léo Pioge"}, {"name": "Leonardo Novo"}, {"name": "Nicolas J. Cerf"}], "featured_authors": [{"name": "Léo Pioge"}, {"name": "Leonardo Novo"}, {"name": "Nicolas J. Cerf"}], "author_count": 3}, {"id": "2607.19533", "category": "quant-ph", "title": "High-purity entanglement mediated by magnons despite weak coupling", "abstract": "Entangling distant spins via a shared magnonic bus typically faces a tradeoff: stronger spin-magnon coupling increases the entanglement fidelity, but also the spin decay rate. We propose a protocol that breaks this tradeoff. The magnons couple only to a transition outside the computational basis, in which the Bell state is created. Our protocol is probabilistic, and weak coupling reduces the success probability but not the fidelity. We analyze a setup where the spins are two nitrogen-vacancy (NV) centers near a magnetic wire. In the absence of NV dephasing, the protocol reaches unit fidelity with a maximally entangled state, for arbitrarily weak coupling. In our simulations via the Monte-Carlo wavefunction approach, the NV-magnon coupling is taken to be one-third of the magnon linewidth. Considering finite NV dephasing, we predict a fidelity of >0.99 for a state-of-the-art rate, and an optimal fidelity of 0.91 for a moderate rate, both at 0.6% success probability.", "url": "https://arxiv.org/abs/2607.19533", "type": "理论+数值", "summary": "通过共享磁振子总线纠缠遥远的自旋通常面临一个权衡：更强的自旋磁振子耦合会增加纠缠保真度，但也会增加自旋衰减率。我们提出了一个打破这种权衡的协议。磁振子仅耦合到计算基础之外的跃迁，在该跃迁中创建贝尔态。我们的协议是概率性的，弱耦合会降低成功概率，但不会降低保真度。我们分析了一个设置，其中自旋是磁线附近的两个氮空位（NV）中心。在没有 NV 移相的情况下，该协议可达到具有最大纠缠态的单位保真度，以实现任意弱耦合。在我们通过蒙特卡罗波函数方法进行的模拟中，NV-磁振子耦合被视为磁振子线宽的三分之一。考虑到有限的 NV 相移，我们预测最先进速率的保真度 >0.99，中等速率的最佳保真度为 0.91，两者的成功概率均为 0.6%。", "authors": [{"name": "Sanchar Sharma"}], "featured_authors": [{"name": "Sanchar Sharma"}], "author_count": 1}, {"id": "2607.19574", "category": "quant-ph", "title": "Quantum codes from classical annealing", "abstract": "We introduce an adaptive simulated annealing algorithm to search for moderately-sized quantum error-correcting codes with high encoding rates and large distances. Our search targets two classes of stabilizer codes: (1) CSS codes, and (2) a subclass of CSS codes that we call ``self-dual with equivalent logicals'' (SWEL) codes, the latter of which which admit transversal implementations of logical Hadamard and phase gates that can be leveraged to construct fault-tolerant gate sets. The search is guided by an energy function that acts as a surrogate for the logical error rate in a code-capacity noise model, combining code distance with a count of minimum-weight logical operators to resolve the discrete plateaux that impede naïve distance optimization. For block lengths of up to $50$ physical qubits, our search finds state-of-the-art CSS and SWEL codes whose distances frequently meet or exceed the variants of the quantum Gilbert-Varshamov bound. In addition to providing favorable seed codes for fault-tolerant architectures based on code concatenation, the codes found in this work are promising candidates for high-rate code demonstrations on near-term quantum computing hardware.", "url": "https://arxiv.org/abs/2607.19574", "type": "理论+数值", "summary": "我们引入了一种自适应模拟退火算法来搜索具有高编码率和大距离的中等大小的量子纠错码。我们的搜索目标是两类稳定器代码：(1) CSS 代码，以及 (2) CSS 代码的子类，我们称之为“具有等效逻辑的自对偶”(SWEL) 代码，后者允许逻辑 Hadamard 和相位门的横向实现，可用于构造容错门集。该搜索由能量函数引导，该能量函数充当代码容量噪声模型中逻辑错误率的代理，将代码距离与最小权重逻辑运算符的计数相结合，以解决阻碍朴素距离优化的离散平台。对于高达 50 美元物理量子位的块长度，我们的搜索找到了最先进的 CSS 和 SWEL 代码，其距离经常满足或超过量子 Gilbert-Varshamov 边界的变体。除了为基于代码串联的容错架构提供有利的种子代码之外，这项工作中发现的代码很有希望在近期量子计算硬件上进行高速代码演示。", "authors": [{"name": "Michael A. Perlin"}, {"name": "Matthew Steinberg"}, {"name": "Ben Criger"}], "featured_authors": [{"name": "Michael A. Perlin"}, {"name": "Matthew Steinberg"}, {"name": "Ben Criger"}], "author_count": 3}, {"id": "2607.19601", "category": "quant-ph", "title": "Bound states of the hydrogen-like atomic systems in plasma environments", "abstract": "We conduct a non-relativistic study of plasma screening effects on hydrogen-like atomic systems using the Screened Coulomb Potential (SCP i.e. Yukawa potential). The radial Schrödinger equation is first reduced to a bi-confluent Heun (BCH) equation for the Killingbeck potential which is the truncated version of the SCP, and we write the exact BCH eigenfunctions and eigenenergies. We then study the limitations of these BCH solutions and obtain an analytic description valid for weak to moderate screening using the BCH functional form. The corrected eigenfunctions are constructed order by order up to O(k^3); they are expressed in terms of the Laguerre polynomials and reduces exactly to Coulomb eigenfunctions when k=0. Using these Functions, the energy spectrum is computed via two analytic methods: (i) direct evaluation of the full Yukawa Hamiltonian expectation value, and (ii) the Hellmann-Feynman theorem, yielding integral representation. All methods presented here provide explicit analytical formulas for both wavefunctions and eigenenergies valid for different ranges of the screening. These methods establish a powerful analytic framework for studying confined quantum systems. The thermodynamic properties are also derived using the BCH formulation.", "url": "https://arxiv.org/abs/2607.19601", "type": "理论+数值", "summary": "我们使用屏蔽库仑势（SCP，即汤川势）对类氢原子系统的等离子体屏蔽效应进行了非相对论研究。首先将径向薛定谔方程简化为 Killingbeck 势的双汇合 Heun (BCH) 方程，这是 SCP 的截断版本，然后我们写出精确的 BCH 本征函数和本征能。然后，我们研究这些 BCH 解决方案的局限性，并使用 BCH 函数形式获得对弱到中度筛选有效的分析描述。校正后的特征函数按顺序构造，最多可达 O(k^3)；它们以拉盖尔多项式表示，并在 k=0 时精确地简化为库仑本征函数。使用这些函数，通过两种分析方法计算能谱：(i) 直接评估完整的汤川哈密顿期望值，以及 (ii) 赫尔曼-费曼定理，产生积分表示。这里提出的所有方法都提供了适用于不同筛选范围的波函数和本征能的明确分析公式。这些方法为研究受限量子系统建立了强大的分析框架。\n\n热力学性质也是使用 BCH 公式得出的。", "authors": [{"name": "Fatma Zohra Khaled"}, {"name": "Mustafa Moumni"}, {"name": "Mokhtar Falek"}], "featured_authors": [{"name": "Fatma Zohra Khaled"}, {"name": "Mustafa Moumni"}, {"name": "Mokhtar Falek"}], "author_count": 3}, {"id": "2607.19602", "category": "quant-ph", "title": "Quantum Gravity Simulation: Quantum simulation with a minimum length based on the generalised uncertainty principle", "abstract": "We present a recipe for simulating one-dimensional quantum systems for low and high energies with $L$ qubits within the framework of first quantisation. Assuming a minimum grid spacing $\\Delta L$ in the finite-difference method, the generalised uncertainty principle (GUP) is derived analytically and shows distinct properties for low- and high-energy quantum systems. In the low-energy regime, the GUP approaches to the standard Heisenberg uncertainty principle (HUP) for $ \\Delta L \\ll \\hbar$. However, for finite $\\Delta L \\neq 0$, the GUP mathematically provides three different regions dependent on the average momentum and suggests that a wavefunction can exhibit a single-point localisation at the finite momentum uncertainty due to lack of grid resolution. We then derive a new expression for the high-energy momentum and focus on two specific cases relevant to relativistic aspects. First, if the HUP is relaxed and the high-energy momentum is matched to the special-relativistic one, the resulting GUP predicts the existence of a minimum length with non-zero mass for high energy despite the continuous limit $\\Delta L = 0$. Second, enforcing consistency with the HUP allows the recovery of a canonical high-energy representation with no minimum length. But this requirement brings incompatibility with the special-relativistic momentum and suggests a modified energy-momentum equation. Therefore, we believe that the proposed momentum formulation provides a novel pathway to investigate quantum gravity phenomena for high energy using quantum simulation tools.", "url": "https://arxiv.org/abs/2607.19602", "type": "理论+数值", "summary": "我们提出了一种在第一量子化框架内用 $L$ 量子位模拟低能和高能一维量子系统的方法。假设有限差分法中的最小网格间距 $\\Delta L$，通过分析推导广义不确定性原理 (GUP)，并显示低能和高能量子系统的不同属性。在低能量状态下，GUP 接近 $ \\Delta L \\ll \\hbar$ 的标准海森堡不确定性原理 (HUP)。然而，对于有限 $\\Delta L \\neq 0$，GUP 在数学上提供了依赖于平均动量的三个不同区域，并表明波函数可以由于缺乏网格分辨率而在有限动量不确定性下表现出单点定位。然后，我们推导出高能动量的新表达式，并重点关注与相对论方面相关的两个具体案例。首先，如果 HUP 松弛并且高能动量与狭义相对论动量匹配，则所得 GUP 预测存在高能非零质量的最小长度，尽管连续极限 $\\Delta L = 0$。\n\n其次，加强与 HUP 的一致性可以恢复没有最小长度的规范高能表示。但这一要求与狭义相对论动量不相容，并建议修改能量动量方程。因此，我们相信所提出的动量公式为使用量子模拟工具研究高能量子引力现象提供了一条新途径。", "authors": [{"name": "Jack Keable-Elliott"}, {"name": "David J. Bacon"}, {"name": "Andrew Burbanks"}, {"name": "Jaewoo Joo"}], "featured_authors": [{"name": "Jack Keable-Elliott"}, {"name": "David J. Bacon"}, {"name": "Andrew Burbanks"}, {"name": "Jaewoo Joo"}], "author_count": 4}, {"id": "2607.19611", "category": "quant-ph", "title": "On Solutions of the Killingbeck Potential and Clarifying Comments on a Related Analytical Approach", "abstract": "The work presents analytical solutions to the Schrodinger equation for the Killingbeck potential, a Hybrid model combining harmonic, linear and Coulomb terms, and which is also an approximate model of Yukawa-type potentials. The radial Schrodinger equation is solved by means of the series expansion method, thus yielding the exact expressions of both bound-states solutions and eigen-functions for the systems; these systems include quarkonium and confined hydrogen-like atoms in plasma environments. Furthermore, we offer a constructive commentary on the work of Obu et al. (East Eur. J. Phys. 3, 146-157, 2023), with the aim of clarifying a mathematical misstatement used in their analytical treatment of analogous systems.", "url": "https://arxiv.org/abs/2607.19611", "type": "理论+数值", "summary": "这项工作提出了基林贝克势的薛定谔方程的解析解，基林贝克势是一个结合了谐波项、线性项和库仑项的混合模型，也是汤川型势的近似模型。通过级数展开法求解径向薛定谔方程，从而得到系统的束缚态解和本征函数的精确表达式；这些系统包括等离子体环境中的夸克元素和受限的类氢原子。此外，我们对 Obu 等人的工作提出了建设性的评论。 （East Eur. J. Phys. 3, 146-157, 2023），目的是澄清在类似系统的分析处理中使用的数学错误陈述。", "authors": [{"name": "Fatma Zohra Khaled"}, {"name": "Mustafa Moumni"}, {"name": "Mokhtar Falek"}], "featured_authors": [{"name": "Fatma Zohra Khaled"}, {"name": "Mustafa Moumni"}, {"name": "Mokhtar Falek"}], "author_count": 3}, {"id": "2607.19715", "category": "quant-ph", "title": "Structured-light-mediated hybrid entanglement between photon polarization and electronic orbital angular momentum", "abstract": "We propose a minimal quantum-optical scheme for generating hybrid entanglement between photon polarization and electronic orbital angular momentum in a semiconductor quantum disk. A spin--orbit structured two-photon state excites two channels in the same disk: a radiatively recombining zero-orbital-angular-momentum channel and a finite-orbital-angular-momentum channel that stores the electronic orbital qubit. An effective coherent mapping prepares a selected two-excitation state, followed by emission of a photon whose polarization is entangled with the residual electronic orbital state. A master-equation analysis shows that the heralded state conditioned on single-photon occupation of the selected output mode approaches the target entangled state in the ideal coherent limit. We also discuss orbital relaxation and perturbative validity conditions for branch-dependent Coulomb shifts, orbital-angular-momentum mixing, and finite-orbital-angular-momentum radiative leakage. This proof-of-principle effective model suggests a route toward structured-light-mediated photon--electron hybrid entanglement in semiconductor nanostructures.", "url": "https://arxiv.org/abs/2607.19715", "type": "理论", "summary": "我们提出了一种最小的量子光学方案，用于在半导体量子盘中产生光子偏振和电子轨道角动量之间的混合纠缠。自旋轨道结构的双光子态激发同一圆盘中的两个通道：一个辐射重组的零轨道角动量通道和一个存储电子轨道量子位的有限轨道角动量通道。有效的相干映射准备选定的双激发态，然后发射其偏振与剩余电子轨道态纠缠的光子。主方程分析表明，以所选输出模式的单光子占据为条件的预示态接近理想相干极限下的目标纠缠态。我们还讨论了分支相关库仑位移、轨道角动量混合和有限轨道角动量辐射泄漏的轨道弛豫和微扰有效性条件。这种原理验证的有效模型提出了一种在半导体纳米结构中实现结构光介导的光子-电子混合纠缠的途径。", "authors": [{"name": "Hiroaki Saito"}, {"name": "Nobuhiko Yokoshi"}], "featured_authors": [{"name": "Hiroaki Saito"}, {"name": "Nobuhiko Yokoshi"}], "author_count": 2}, {"id": "2607.19737", "category": "quant-ph", "title": "The Quantum Adiabatic Theorem for Non-Hermitian Dynamics", "abstract": "We establish a quantitative adiabatic estimate for a class of finite-dimensional non-Hermitian Schrödinger dynamics. The original non-Hermitian Hamiltonian is assumed to be diagonalizable with real spectrum and non-crossing eigenvalues. We then construct a dynamically compatible time-dependent metric operator, and its positive square root defines a Dyson map. The associated Dyson-transformed Hamiltonian is Hermitian. When this Dyson-transformed Hamiltonian satisfies the Hermitian adiabatic assumption, the standard resolvent-projection method gives an explicit adiabatic estimate in the Hermitian representation. Pulling this estimate back through the Dyson map gives an approximation in the original non-Hermitian representation. The resulting Dyson-pulled-back projections are then compared with the spectral projections of the original non-Hermitian Hamiltonian by using a contour-resolvent estimate. The final bound contains two contributions: the pulled-back Hermitian adiabatic error and the projection-comparison error. A two-level non-Hermitian model is presented to illustrate the hypotheses of the theorem and the two contributions appearing in the final estimate.", "url": "https://arxiv.org/abs/2607.19737", "type": "理论+数值", "summary": "我们为一类有限维非厄米薛定谔动力学建立了定量绝热估计。假设原始非厄米哈密顿量可与实谱和非交叉特征值对角化。然后，我们构造一个动态兼容的时间相关度量算子，其正平方根定义了戴森图。相关的戴森变换哈密顿量是埃尔米特量。当戴森变换的哈密顿量满足埃尔米特绝热假设时，标准解析投影方法会在埃尔米特表示中给出显式绝热估计。通过戴森图拉回这个估计给出了原始非厄米特表示的近似值。然后通过使用轮廓解析估计将所得的戴森拉回投影与原始非厄米哈密顿量的光谱投影进行比较。最终界限包含两个贡献：拉回的厄米绝热误差和投影比较误差。提出了一个两级非厄米特模型来说明该定理的假设以及最终估计中出现的两个贡献。", "authors": [{"name": "G. M. V. S. Aponso"}, {"name": "B. P. W. Fernando"}, {"name": "K. K. W. A. S. Kumara"}, {"name": "R. P. K. De Silva"}], "featured_authors": [{"name": "G. M. V. S. Aponso"}, {"name": "B. P. W. Fernando"}, {"name": "K. K. W. A. S. Kumara"}, {"name": "R. P. K. De Silva"}], "author_count": 4}, {"id": "2607.19770", "category": "quant-ph", "title": "Latency-Constrained Encoded Quantum Teleportation with Punctured Codes", "abstract": "Quantum teleportation is a key protocol for transmitting quantum information using entanglement and classical communication. Its reliability is constrained by both the availability and fidelity of shared entangled pairs, which are affected by stochastic generation and memory decoherence. In this work, we focus on encoded teleportation, in which quantum information is encoded using a quantum error-correcting code and transmitted as a codeword. We evaluate reliability in terms of logical error probability, considering latency-constrained settings where entanglement is accumulated over time and degrades while in memory. We develop a unified framework that captures the interaction between entanglement availability, decoherence, and coding decisions. Our results show that the benefits of longer codes depend on the availability and fidelity of entangled pairs, as acquiring additional resources introduces delays that can reduce their quality. To address this latency-reliability tradeoff, we leverage code puncturing to enable flexible encoded teleportation, allowing the effective code length to adapt across different latency regimes while preserving a common stabilizer structure. Numerical results show that encoded teleportation can provide substantial reliability gains over uncoded transmission under a common entanglement-acquisition latency constraint, and that selecting appropriate punctured codes improves performance across varying latency budgets. Overall, our results highlight the importance of resource-aware adaptation for reliable quantum networking.", "url": "https://arxiv.org/abs/2607.19770", "type": "理论+数值", "summary": "量子隐形传态是利用纠缠和经典通信传输量子信息的关键协议。它的可靠性受到共享纠缠对的可用性和保真度的限制，而共享纠缠对又受到随机生成和记忆退相干的影响。在这项工作中，我们专注于编码隐形传态，其中量子信息使用量子纠错码进行编码并作为码字进行传输。我们根据逻辑错误概率来评估可靠性，考虑延迟受限的设置，其中纠缠随着时间的推移而累积并在内存中退化。我们开发了一个统一的框架来捕获纠缠可用性、退相干和编码决策之间的交互。我们的结果表明，较长代码的好处取决于纠缠对的可用性和保真度，因为获取额外的资源会带来延迟，从而降低其质量。为了解决这种延迟与可靠性的权衡，我们利用代码穿孔来实现灵活的编码隐形传输，允许有效代码长度适应不同的延迟机制，同时保留通用的稳定器结构。\n\n数值结果表明，在常见的纠缠获取延迟约束下，编码隐形传态可以比未编码传输提供显着的可靠性增益，并且选择适当的穿孔码可以提高不同延迟预算下的性能。总的来说，我们的结果强调了资源感知适应对于可靠量子网络的重要性。", "authors": [{"name": "Mahmoud Saad Abouamer"}, {"name": "Jakob Kaltoft Søndergaard"}, {"name": "Petar Popovski"}], "featured_authors": [{"name": "Mahmoud Saad Abouamer"}, {"name": "Jakob Kaltoft Søndergaard"}, {"name": "Petar Popovski"}], "author_count": 3}, {"id": "2607.19852", "category": "quant-ph", "title": "Optimal Lower Bounds for Hamiltonian Simulation", "abstract": "For Hamiltonian $H = \\sum_j h_j$, we prove asymptotically tight lower bounds on the gate and query complexities of simulating time evolution on a quantum computer. Our bounds hold for arbitrary term norms $\\|h_j\\|$, time $t$, and trace-distance error $\\epsilon$. The matching upper bound (known as composite qDRIFT) consists of high-order Trotterization of the large terms and a randomized first-order Trotterization of the small terms. Unlike prior work that chooses worst-case $\\|h_j\\|$ to encode the computation of parity or other Boolean functions in time evolution, our proof is elementary and based on a local, bounded-degree classical Hamiltonian. Our work suggests that for many physical systems (e.g., power-law interactions), gate count must scale polynomially in $1/\\epsilon$, contrary to the complexity suggested by counting coherent oracle queries such as those in the block-encoding model.", "url": "https://arxiv.org/abs/2607.19852", "type": "理论+数值", "summary": "对于哈密顿量 $H = \\sum_j h_j$，我们证明了在量子计算机上模拟时间演化的门和查询复杂性的渐近严格下界。我们的界限适用于任意项范数 $\\|h_j\\|$、时间 $t$ 和跟踪距离误差 $\\epsilon$。匹配上限（称为复合 qDRIFT）由大项的高阶 Trotterization 和小项的随机一阶 Trotterization 组成。与之前选择最坏情况 $\\|h_j\\|$ 来编码时间演化中奇偶校验或其他布尔函数计算的工作不同，我们的证明是基本的，并且基于局部有界度经典哈密顿量。我们的工作表明，对于许多物理系统（例如，幂律相互作用），门计数必须以 $1/\\epsilon$ 为多项式缩放，这与计算相干预言机查询（例如块编码模型中的查询）所建议的复杂性相反。", "authors": [{"name": "Alexander Zlokapa"}, {"name": "Richard R. Allen"}, {"name": "Aram W. Harrow"}], "featured_authors": [{"name": "Alexander Zlokapa"}, {"name": "Richard R. Allen"}, {"name": "Aram W. Harrow"}], "author_count": 3}, {"id": "2607.19870", "category": "quant-ph", "title": "Emergent boundary-memory from unitarity constraints in a minimal two interacting quantum particles", "abstract": "We construct a simple model of two particles mutually attracting/repulsing in a one-dimensional lattice and investigate the corresponding dynamics. We show that enforcing reversible unitary evolution on a minimal direct-motion interaction rule necessarily gives rise to emergent boundary-memory and non-trivial dynamics. Remarkably, the resulting boundary-memory leads to event-horizon-like behaviour, entanglement between subsystem, and Page-curve-like entanglement dynamics.", "url": "https://arxiv.org/abs/2607.19870", "type": "理论", "summary": "我们构建了一个在一维晶格中相互吸引/排斥的两个粒子的简单模型，并研究了相应的动力学。我们证明，在最小直接运动相互作用规则上强制执行可逆酉进化必然会产生新的边界记忆和非平凡的动力学。值得注意的是，由此产生的边界记忆导致了类似事件视界的行为、子系统之间的纠缠以及类似页面曲线的纠缠动力学。", "authors": [{"name": "Ibrahim Yahaya Muhammad"}, {"name": "Tanapat Deesuwan"}, {"name": "Monsit Tanasittikosol"}], "featured_authors": [{"name": "Ibrahim Yahaya Muhammad"}, {"name": "Tanapat Deesuwan"}, {"name": "Monsit Tanasittikosol"}], "author_count": 3}, {"id": "2607.19871", "category": "quant-ph", "title": "A reduction scheme for general-order Ising-like Hamiltonians in quantum heuristic solvers", "abstract": "The Ising model is ubiquitous in various optimization problems but notoriously difficult to solve due to combinatorial explosion. In view of this, Hamiltonian reduction is a useful preprocessing technique for reducing the effective problem size before applying heuristic solvers. However, existing reduction techniques mainly target second-order Ising models, whereas many pseudo-Boolean formulations naturally contain higher-order interactions. In this work, we generalize the concept of non-separable groups to arbitrary-order Ising-like models and develop a Hamiltonian reduction framework that iteratively detects and merges constrained spin groups into single variables. We benchmark the reduction on synthetic hypergraphs and higher-order network datasets, and evaluate its integration with downstream order-reduction and solver workflows. Our results establish a foundation for Hamiltonian reduction in higher-order Ising-like optimization problems.", "url": "https://arxiv.org/abs/2607.19871", "type": "理论+数值", "summary": "伊辛模型在各种优化问题中普遍存在，但由于组合爆炸而难以解决。鉴于此，哈密顿量约简是一种有用的预处理技术，可在应用启发式求解器之前减小有效问题的大小。然而，现有的约简技术主要针对二阶伊辛模型，而许多伪布尔公式自然包含高阶相互作用。在这项工作中，我们将不可分离群的概念推广到任意阶伊辛式模型，并开发了一个哈密顿约简框架，该框架迭代地检测受约束的自旋群并将其合并为单个变量。我们对合成超图和高阶网络数据集的缩减进行了基准测试，并评估其与下游降阶和求解器工作流程的集成。我们的结果为高阶伊辛式优化问题的哈密顿量简化奠定了基础。", "authors": [{"name": "Chengsi Mao"}, {"name": "Pavel Mosharev"}, {"name": "Yao Wang"}, {"name": "Man-Hong Yung"}], "featured_authors": [{"name": "Chengsi Mao"}, {"name": "Pavel Mosharev"}, {"name": "Yao Wang"}, {"name": "Man-Hong Yung"}], "author_count": 4}, {"id": "2607.19884", "category": "quant-ph", "title": "Propagation dynamics of high-gain vortex beams in symmetry-broken media via forward and backward three-wave mixing", "abstract": "In recent years, vortex light, a distinctive form of structured light, has attracted considerable attention owing to its unique properties and the rich physical phenomena arising from its interaction with matter. In this paper, we investigate the propagation dynamics of vortex beams in a symmetry-broken three-level system based on forward and backward three-wave mixing (TWM) processes. We find that both processes enable the transfer of high-gain vortex light, with the associated topological charges obeying identical algebraic relations. The forward process exhibits periodic oscillatory transmission and modulates the transverse spatial profile of the generated signal vortex field, whereas the backward process features stable transmission and produces a signal field with higher gain and improved fidelity. Under the Autler-Townes splitting (ATS) regime, the probe field detuning in both schemes has a negligible influence on the gain. Optical depth influences only the rate at which the gain approaches its maximum, while the peak value remains unchanged. These results constitute a meaningful extension of the work reported in reference [40] and may provide a feasible approach for quantum communication, quantum computation, and the generation of high-gain, high-fidelity vortex light.", "url": "https://arxiv.org/abs/2607.19884", "type": "理论", "summary": "近年来，涡旋光作为结构光的一种独特形式，由于其独特的性质以及与物质相互作用产生的丰富物理现象而引起了广泛的关注。在本文中，我们基于前向和后向三波混频（TWM）过程研究了对称破缺三能级系统中涡旋光束的传播动力学。我们发现这两个过程都能够实现高增益涡旋光的传输，相关的拓扑电荷遵循相同的代数关系。前向过程表现出周期性振荡传输，并调制所生成的信号涡旋场的横向空间轮廓，而后向过程则具有稳定传输的特点，并产生具有更高增益和更高保真度的信号场。在奥特勒-汤斯分裂 (ATS) 体制下，两种方案中的探测场失谐对增益的影响可以忽略不计。光学深度仅影响增益接近最大值的速率，而峰值保持不变。\n\n这些结果构成了参考文献[40]中报告的工作的有意义的扩展，并且可能为量子通信、量子计算和高增益、高保真涡旋光的生成提供可行的方法。", "authors": [{"name": "Fan Meng"}, {"name": "Hao Zhu"}, {"name": "Xin-Yao Huang"}, {"name": "Guo-Feng Zhang"}], "featured_authors": [{"name": "Fan Meng"}, {"name": "Hao Zhu"}, {"name": "Xin-Yao Huang"}, {"name": "Guo-Feng Zhang"}], "author_count": 4}, {"id": "2607.19891", "category": "quant-ph", "title": "Construction of a Class of Communication-Efficient Quantum Secret Sharing Schemes", "abstract": "Quantum secret sharing is a fundamental technique in quantum cryptography. However, in practical quantum networks, it still faces several bottlenecks, such as high quantum communication cost and low transmission efficiency. To reduce the communication cost, ramp quantum secret sharing schemes have been proposed in existing studies. Nevertheless, intermediate sets in such schemes may leak partial information about the secret. To address this problem, this paper presents a method for detecting intermediate sets. Based on this method, we further propose a communication-efficient perfect quantum secret sharing scheme with eavesdropping detection this http URL analyze the communication cost under different numbers of participating parties and determine the range of participants that minimizes the reconstruction communication cost. The results verify the communication efficiency and security of the proposed scheme.", "url": "https://arxiv.org/abs/2607.19891", "type": "理论", "summary": "量子秘密共享是量子密码学的一项基本技术。但在实际量子网络中，仍面临量子通信成本高、传输效率低等瓶颈。为了降低通信成本，现有研究提出了斜坡量子秘密共享方案。然而，此类方案中的中间集可能会泄露有关秘密的部分信息。为了解决这个问题，本文提出了一种检测中间集的方法。基于该方法，我们进一步提出了一种具有窃听检测功能的通信高效完美量子秘密共享方案，该http URL分析了不同参与方数量下的通信成本，并确定了使重建通信成本最小化的参与者范围。结果验证了所提方案的通信效率和安全性。", "authors": [{"name": "Chenhao Li"}, {"name": "Zhihui Li"}, {"name": "Jiansheng Guo"}, {"name": "Yixin Chen"}, {"name": "Yewei Wang"}], "featured_authors": [{"name": "Chenhao Li"}, {"name": "Zhihui Li"}, {"name": "Jiansheng Guo"}, {"name": "Yixin Chen"}, {"name": "Yewei Wang"}], "author_count": 5}, {"id": "2607.20045", "category": "quant-ph", "title": "PN-QNN: Harnessing Physical Noise as a Native Regularizer in Photonic Hybrid Quantum Neural Networks", "abstract": "Physical noise in near-term quantum hardware is usually treated as a nuisance to suppress. We ask whether it can instead act as a hardware-native regularizer for photonic hybrid quantum-classical neural networks (PHQCNNs), analogous to noise-injection regularization in classical deep learning. Using Quandela's Perceval simulator and the MerLin framework, we build PHQCNNs for Iris, Digits, and MNIST and inject Perceval's seven-parameter physical noise model directly into training. A genetic algorithm searches the six continuous noise dimensions and 1 boolean parameter to find, per dataset, the configuration maximizing validation accuracy, compared against a noiseless baseline across five seeds. GA-tuned noise yields modest accuracy gains on Iris (+0.82pp) and Digits (+1.45pp), but a clear degradation on MNIST (-1.21pp). Per-parameter sweeps show that no individual noise parameter is consistently beneficial, motivating the joint search, while a second-order loss expansion shows that physical noise induces a Tikhonov-like regularization term whose effect is dataset-dependent. Physical photonic noise can thus act as a free regularizer, but not universally.", "url": "https://arxiv.org/abs/2607.20045", "type": "理论+数值", "summary": "近期量子硬件中的物理噪声通常被视为需要抑制的干扰。我们询问它是否可以充当光子混合量子经典神经网络（PHQCNN）的硬件本机正则化器，类似于经典深度学习中的噪声注入正则化。使用 Quandela 的 Perceval 模拟器和 MerLin 框架，我们为 Iris、Digits 和 MNIST 构建 PHQCNN，并将 Perceval 的七参数物理噪声模型直接注入训练中。遗传算法搜索六个连续噪声维度和 1 个布尔参数，以针对每个数据集查找最大化验证准确性的配置，并与五个种子的无噪声基线进行比较。 GA 调整的噪声在 Iris (+0.82pp) 和 Digits (+1.45pp) 上产生了适度的精度增益，但在 MNIST (-1.21pp) 上产生了明显的退化。每参数扫描表明，没有哪个单独的噪声参数始终是有益的，从而激发了联合搜索，而二阶损失扩展表明，物理噪声会引发类似吉洪诺夫的正则化项，其效果取决于数据集。因此，物理光子噪声可以充当自由调节器，但并不普遍。", "authors": [{"name": "Farah Elnakhal"}, {"name": "Alberto Marchisio"}, {"name": "Nouhaila Innan"}, {"name": "Gabriel Falcao"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Farah Elnakhal"}, {"name": "Alberto Marchisio"}, {"name": "Nouhaila Innan"}, {"name": "Gabriel Falcao"}, {"name": "Muhammad Shafique"}], "author_count": 5}, {"id": "2607.20060", "category": "quant-ph", "title": "Physics-Informed Graph Neural Networks for Surface Code Decoding via Discrete Exterior Calculus", "abstract": "We introduce a physics-informed graph neural network decoder for the surface code. A discrete Poisson equation on the syndrome graph acts as a hard inductive bias on which a graph encoder learns syndrome-adaptive edge weights. A differentiable solver returns the node potentials and the associated edge current. Our central observation is that the logical-error signal is not carried by any part of that current, but by how the syndrome sits relative to the two code boundaries. We place a sink on each of the two boundaries linked by the logical operator and read the difference of the currents they drain. We prove that this single number is a topological pairing: it weighs each excited detector by a smooth coordinate that runs from +1 on one boundary to -1 on the other, and sums the votes. The coordinate is fixed by both the code topology and the learned metric, generating an exact and free-parameter readout. On the rotated surface code under circuit-level depolarising noise, this one topological scalar matches the best full-field readout. That parity is itself the result: for one logical qubit the logical signal is one-dimensional, so projecting onto it discards nothing. At larger code distance the picture strengthens indicating that isolating the pairing helps more as the field grows larger and sparser.", "url": "https://arxiv.org/abs/2607.20060", "type": "理论+数值", "summary": "我们为表面代码引入了一种基于物理的图神经网络解码器。征状图上的离散泊松方程充当硬归纳偏差，图编码器在该硬归纳偏置上学习征状自适应边缘权重。可微分求解器返回节点电势和相关的边缘电流。我们的中心观察是，逻辑错误信号不是由该电流的任何部分携带的，而是由综合症相对于两个代码边界的位置携带的。我们在逻辑运算符连接的两个边界上分别放置一个接收器，并读取它们消耗的电流的差异。我们证明这个单个数字是一个拓扑配对：它通过一个平滑坐标对每个受激探测器进行加权，该坐标从一个边界上的 +1 到另一个边界上的 -1，并对投票进行求和。坐标由代码拓扑和学习的度量固定，生成精确且自由参数的读数。在电路级去极化噪声下的旋转表面代码上，这一拓扑标量与最佳全场读出相匹配。这种奇偶性本身就是结果：对于一个逻辑量子位，逻辑信号是一维的，因此投影到它上面不会丢弃任何东西。\n\n在代码距离较大时，图像会增强，表明随着字段变得更大和更稀疏，隔离配对更有帮助。", "authors": [{"name": "P. E. Trevisanutto"}, {"name": "S. Dhanpal"}, {"name": "S. Basak"}, {"name": "L. Petit"}, {"name": "J.Thiyagalingam"}], "featured_authors": [{"name": "P. E. Trevisanutto"}, {"name": "S. Dhanpal"}, {"name": "S. Basak"}, {"name": "L. Petit"}, {"name": "J.Thiyagalingam"}], "author_count": 5}, {"id": "2607.20104", "category": "quant-ph", "title": "Schrödinger's real-valued equation revisited", "abstract": "The Schrödinger equation can be rewritten as a second-order equation for a single real-valued scalar field. Taken at face value, however, this one-field reduction obscures several local structures of quantum mechanics: the Born density and current, the role of momentum as a generator, and the usual derivation of the uncertainty relation. We argue that these difficulties do not show that real variables fail. They show that the reduced equation is not, by itself, a complete local representation of the theory. Its coherent real form is obtained by restoring the underlying Hamiltonian phase-space structure, where the missing component reappears as a canonical partner. In this real phase-space formulation, the standard structures reappear locally, and minimal magnetic coupling reveals an internal \\(SO(2)\\) gauge structure. Thus, the symbol \\(i\\) can be removed, but the symplectic and complex structure it encodes cannot.", "url": "https://arxiv.org/abs/2607.20104", "type": "理论", "summary": "薛定谔方程可以重写为单个实值标量场的二阶方程。然而，从表面上看，这种单场简化掩盖了量子力学的几个局部结构：玻恩密度和电流、动量作为发生器的作用以及不确定性关系的通常推导。我们认为，这些困难并不表明实际变量会失败。他们表明，简化方程本身并不是理论的完整局部表示。它的相干实数形式是通过恢复底层的哈密顿相空间结构获得的，其中缺失的分量作为规范伙伴重新出现。在这个真实的相空间公式中，标准结构在局部重新出现，最小的磁耦合揭示了内部\\(SO(2)\\)规范结构。因此，符号\\(i\\)可以被删除，但它编码的辛复杂结构却不能。", "authors": [{"name": "Oliver Passon"}, {"name": "Bernd Rosenow"}], "featured_authors": [{"name": "Oliver Passon"}, {"name": "Bernd Rosenow"}], "author_count": 2}, {"id": "2607.20195", "category": "quant-ph", "title": "Mesoscopic mechanical superpositions by gluing individual quantum systems", "abstract": "We propose a protocol for preparing mechanical Schrödinger kittens -- mesoscopic quantum superpositions of coherent motional states of an optically levitated nanoparticle -- by adhering single electron time-bin states to its surface. Over short protocol timescales, coherence of the mesoscopic superposition survives the dominant decoherence mechanisms afflicting levitated systems, and can be observed by varying the phase of the time-bin electrons. Interference fringes can be detected with real-time, near-Heisenberg limited interferometry of photons scattered from the particle. This approach eliminates the need for coherent state expansion, dark potentials, and particle release-and-recapture mechanisms, providing a new route to test quantum mechanics in unprecedented scales.", "url": "https://arxiv.org/abs/2607.20195", "type": "理论", "summary": "我们提出了一种通过将单电子时间仓态粘附到其表面来制备机械薛定谔小猫的协议——光学悬浮纳米粒子的相干运动状态的介观量子叠加。在短的协议时间尺度上，介观叠加的相干性在影响悬浮系统的主要退相干机制中幸存下来，并且可以通过改变时间仓电子的相位来观察。可以通过对粒子散射的光子进行实时、近海森堡有限干涉测量来检测干涉条纹。这种方法消除了对相干态扩展、暗势以及粒子释放和重新捕获机制的需要，提供了一种以前所未有的规模测试量子力学的新途径。", "authors": [{"name": "Thiago Guerreiro"}], "featured_authors": [{"name": "Thiago Guerreiro"}], "author_count": 1}, {"id": "2607.20225", "category": "quant-ph", "title": "DQAOA-GPT: AI-Accelerated Distributed Quantum Optimization for Combinatorial Problems", "abstract": "While combinatorial optimization problems are central to many scientific and engineering applications, their solution remains challenging due to exponentially large search spaces. Variational quantum algorithms offer a promising route for tackling such problems, yet their practical performance is limited by repeated quantum circuit evaluations and classical parameter updates. In this work, we introduce DQAOA-GPT, a hybrid framework that integrates the distributed quantum approximate optimization algorithm (DQAOA), which decomposes a large optimization problem into smaller sub-problems, with GPT-based quantum circuit generation for solving those sub-problems. Rather than relying on iterative variational optimization, the proposed approach uses a trained generative model to directly generate high-quality quantum circuits for the decomposed sub-problems. As a benchmark, we evaluate DQAOA-GPT against conventional DQAOA on dense HUBO optimization problems with up to 100 decision variables. The results demonstrate that DQAOA-GPT significantly reduces computational cost while maintaining competitive solution quality, with larger acceleration observed for larger sub-problem sizes. Although this work focuses on benchmark-scale validation, the framework provides a promising foundation for larger-scale combinatorial optimization in hybrid HPC-QC environments through increased GPU resources and parallel computing capability.", "url": "https://arxiv.org/abs/2607.20225", "type": "理论+数值", "summary": "虽然组合优化问题是许多科学和工程应用的核心，但由于搜索空间呈指数级增长，其解决方案仍然具有挑战性。变分量子算法为解决此类问题提供了一条有前途的途径，但其实际性能受到重复量子电路评估和经典参数更新的限制。在这项工作中，我们引入了 DQAOA-GPT，这是一种混合框架，集成了分布式量子近似优化算法（DQAOA），该算法将大型优化问题分解为较小的子问题，并使用基于 GPT 的量子电路生成来解决这些子问题。该方法不依赖迭代变分优化，而是使用经过训练的生成模型直接为分解的子问题生成高质量的量子电路。作为基准，我们在具有多达 100 个决策变量的密集 HUBO 优化问题上相对于传统 DQAOA 来评估 DQAOA-GPT。结果表明，DQAOA-GPT 显着降低了计算成本，同时保持了有竞争力的解决方案质量，对于较大的子问题规模，观察到了更大的加速。\n\n尽管这项工作侧重于基准规模验证，但该框架通过增加 GPU 资源和并行计算能力，为混合 HPC-QC 环境中的大规模组合优化提供了有前景的基础。", "authors": [{"name": "Seongmin Kim"}, {"name": "Abhinav Rijal"}, {"name": "Yuri Alexeev"}, {"name": "Nora Bauer"}, {"name": "Martin Roetteler"}, {"name": "Mina Yoon"}, {"name": "George Siopsis"}, {"name": "In-Saeng Suh"}], "featured_authors": [{"name": "Seongmin Kim"}, {"name": "Abhinav Rijal"}, {"name": "Yuri Alexeev"}, {"name": "Mina Yoon"}, {"name": "George Siopsis"}, {"name": "In-Saeng Suh"}], "author_count": 8}, {"id": "2607.20264", "category": "quant-ph", "title": "Dynamical redistribution of quantum resources in tree-level Bhabha scattering", "abstract": "The fundamental interactions governed by quantum electrodynamics (QED) are intrinsically rich in quantum resources, yet how these resources dynamically redistribute during relativistic scattering is still not fully understood. In this work, we systematically investigate the tree-level Bhabha scattering process (e^- e^+ \\rightarrow e^- e^+) within the framework of quantum resource theory, revealing how QED kinematics and Feynman amplitudes strictly dictate resource redistribution. Specifically, we demonstrate a strict anti-correlation between entropic uncertainty and dynamically generated entanglement across diverse initial states. We find that mass-induced single-helicity-flip transitions cause a pronounced geometric symmetry breaking in the non-relativistic regime, whereas the restoration of chiral symmetry in the ultra-relativistic limit ensures strict symmetry about the backward scattering angle. Furthermore, we analytically establish a rigorous equivalence between local wave-particle duality and global bipartite quantum coherence. Finally, evaluating the trade-off between local duality and Bell nonlocality, we show that in the ultra-relativistic limit, transverse scattering of basic factorized states equalizes the s- and t-channel amplitudes to optimize non-local correlations. However, pre-existing local coherence inevitably disrupts this delicate kinematic balance, significantly suppressing the Bell parameter and preventing the maximal violation of local realism. Therefore, we believe the present results provide deeper understanding of the fundamental quantum nature of QED processes.", "url": "https://arxiv.org/abs/2607.20264", "type": "理论+数值", "summary": "量子电动力学 (QED) 控制的基本相互作用本质上富含量子资源，但这些资源在相对论散射过程中如何动态重新分配仍不完全清楚。在这项工作中，我们在量子资源理论框架内系统地研究了树级巴巴散射过程（e^- e^+ \\rightarrow e^- e^+），揭示了QED运动学和费曼振幅如何严格决定资源重新分配。具体来说，我们证明了熵不确定性与跨不同初始状态动态生成的纠缠之间存在严格的反相关性。我们发现质量引起的单螺旋翻转跃迁会导致非相对论区域中明显的几何对称性破缺，而超相对论极限中手性对称性的恢复则确保了后向散射角的严格对称性。此外，我们分析地建立了局部波粒二象性和全局二分量子相干性之间的严格等价性。\n\n最后，评估局域对偶性和贝尔非局域性之间的权衡，我们表明在超相对论极限下，基本因式分解状态的横向散射使 s 和 t 通道振幅相等，以优化非局域相关性。然而，预先存在的局部相干性不可避免地会破坏这种微妙的运动平衡，显着抑制贝尔参数并防止最大程度地违反局部现实主义。因此，我们相信目前的结果可以让我们更深入地了解 QED 过程的基本量子性质。", "authors": [{"name": "Zan Cao"}, {"name": "Meng-Long Song"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "featured_authors": [{"name": "Zan Cao"}, {"name": "Meng-Long Song"}, {"name": "Xue-Ke Song"}, {"name": "Liu Ye"}, {"name": "Dong Wang"}], "author_count": 5}, {"id": "2607.20266", "category": "quant-ph", "title": "Identifying local unitary equivalence based on reduction of quantum states", "abstract": "Local unitary equivalence is central to entanglement quantification and classification. Identifying the local unitary equivalence remains a formidable challenge. We address this problem for a class of quantum states with one highly degenerate eigenvalue and the rest non-degenerate simple eigenvalues that are pivotal to structured resources in quantum resource theory. We introduce a ``reduction\" procedure that maps each state to a ``reduced state\" by nullifying the highest-multiplicity eigenvalue and prove that the local unitary equivalence of the original states is equivalent to that of their reduced counterparts. For the resulting pure or non-degenerate reduced states, we employ the existing invariants or fixed-point subgroup criteria to establish a complete discrimination framework, although the existing criteria can not directly identify the local unitary equivalence of the original states. We also verify the local unitary equivalence of two families of single-parameterized multipartite mixed states constructed by perturbing absolutely maximally entangled states from distinct combinatorial origins, demonstrating the efficacy and generality of our approach.", "url": "https://arxiv.org/abs/2607.20266", "type": "理论", "summary": "局部酉等价是纠缠量化和分类的核心。确定局部酉等价仍然是一个艰巨的挑战。我们针对一类具有一个高度简并特征值和其余非简并简单特征值的量子态解决这个问题，这些特征值对于量子资源理论中的结构化资源至关重要。我们引入了一种“约简”过程，通过消除最高重数特征值将每个状态映射到“约简状态”，并证明原始状态的局部酉等价于其约简对应状态的局部酉等价。对于所得的纯或非简并约化态，我们采用现有的不变量或定点子群准则来建立完整的判别框架，尽管现有的准则不能直接识别原始态的局部酉等价性。我们还验证了通过扰动来自不同组合起源的绝对最大纠缠态构建的两个单参数化多部分混合态族的局部酉等价性，证明了我们方法的有效性和通用性。", "authors": [{"name": "Yanjun Chu"}, {"name": "Chenyang Cui"}, {"name": "Yuhang Xie"}, {"name": "Mengli Liu"}, {"name": "Shao-Ming Fei"}], "featured_authors": [{"name": "Yanjun Chu"}, {"name": "Chenyang Cui"}, {"name": "Yuhang Xie"}, {"name": "Mengli Liu"}, {"name": "Shao-Ming Fei"}], "author_count": 5}, {"id": "2607.20292", "category": "quant-ph", "title": "Microwave-driven same-species sympathetic cooling for trapped ions", "abstract": "Sympathetic cooling of data qubits by coolant ions is an essential
