  <script>
    const papers = [{"id": "2607.19452", "category": "cond-mat", "title": "Markov state models revisited: Principles and algorithms for unbiased observables", "abstract": "Markov state models (MSMs) have become ubiquitous tools for analyzing molecular dynamics (MD) simulations because of their simple, powerful premise: although complete MD sampling may be impossible, the MSM can \"stitch together\" transition probabilities derived from local sampling to provide a global picture of kinetics and mechanisms. In the standard MSM framework, the available MD data is organized into a single transition matrix, which is then used to estimate all observables at a lag time chosen so the coarse-grained dynamics are approximately Markovian. This approach leads to avoidable model bias and motivates long lag times that obscure short-timescale processes of interest. In contrast, this paper shows how to obtain unbiased coarse-grained observables at any fixed lag time and for any fixed coarse-graining in the limit of infinite, properly weighted data. The central idea is to replace the single-matrix framework with two transition matrices -- one representing equilibrium dynamics and another representing source-sink recycling dynamics -- and use the correct matrix or matrices to estimate the matched dynamical observables.", "url": "https://arxiv.org/abs/2607.19452", "type": "理论+数值", "summary": "马尔可夫状态模型 (MSM) 已成为分析分子动力学 (MD) 模拟的普遍工具，因为其简单、强大的前提：虽然完整的 MD 采样可能是不可能的，但 MSM 可以将来自局部采样的转移概率“缝合在一起”，以提供动力学和机制的全局图景。在标准 MSM 框架中，可用的 MD 数据被组织成单个转换矩阵，然后用于估计所选滞后时间的所有可观测值，因此粗粒度动态近似于马尔可夫。这种方法会导致可避免的模型偏差，并导致较长的滞后时间，从而掩盖了感兴趣的短时间尺度过程。相比之下，本文展示了如何在任何固定滞后时间以及无限、适当加权数据的限制下获得任何固定粗粒度的无偏粗粒度可观测量。中心思想是用两个转移矩阵代替单矩阵框架——一个代表平衡动态，另一个代表源-汇回收动态——并使用正确的一个或多个矩阵来估计匹配的动态可观测量。", "authors": [{"name": "David Aristof"}, {"name": "Robert J. Webber"}, {"name": "Daniel M. Zuckerman"}], "featured_authors": [{"name": "David Aristof"}, {"name": "Robert J. Webber"}, {"name": "Daniel M. Zuckerman"}], "author_count": 3}, {"id": "2607.19458", "category": "cond-mat", "title": "Quantum geometry and critical temperature enhancement in MgB$_2$ superconductivity", "abstract": "MgB$_2$, a phonon-mediated superconductor with record-high critical temperature $T_c\\simeq 39$ K, is revisited to obtain a comprehensive theory of electrons, phonons, and their coupling with minimal ab initio input. We construct compact analytic models for the electronic structure, phonons, and electron-phonon coupling (EPC) of MgB$_2$. We show that strong in-plane B $sp^2$ bonding realizes an obstructed band structure whose natural description is a bond-centered kagome lattice, yielding small quasi-2D $\\sigma$-band Fermi-surface cylinders and pronounced quantum-geometric effects. The phonon spectrum is found to closely track that of a graphene-like boron layer, but the heavy intercalated Mg atoms dominate the three acoustic branches and rigidly lift the boron modes into the optical sector, while the in-plane B-B bond-stretching mode exhibits a pronounced softening along $\\Gamma$-A. By symmetry, this $\\Gamma$-point bond-stretching mode is the only $\\Gamma$ phonon that can couple to the $\\sigma$ Fermi surface, explaining its dominant contribution to the EPC. Upon electron doping toward the doubly degenerate band edge of the $\\sigma$ sheets, we find that a reduced density of states competes with enhanced EPC matrix elements. At light electron doping, ab initio calculations show that the EPC enhancement dominates, leading to an increase in $T_c$ (within the clean doping limit without disorder effects). Using the Gaussian approximation for the EPC tensor, we further show that this enhancement is overwhelmingly quantum geometric in origin, arising from a geometric EPC contribution of the small $\\sigma$ Fermi surface peaked at $\\Gamma$. Overall, our results provide a transparent, symmetry-based account of superconductivity in MgB$_2$ and suggest that quantum-geometric effects can be essential for shaping doping trends in phonon-mediated superconductors.", "url": "https://arxiv.org/abs/2607.19458", "type": "理论+数值", "summary": "MgB$_2$ 是一种声子介导的超导体，具有创纪录的高临界温度 $T_c\\simeq 39$ K，经过重新审视，以获得电子、声子及其在最小从头输入的耦合的综合理论。我们为 MgB$_2$ 的电子结构、声子和电子声子耦合 (EPC) 构建了紧凑的分析模型。我们证明，强平面内 B $sp^2$ 键合实现了一种阻碍能带结构，其自然描述是键中心 kagome 晶格，产生小的准二维 $\\sigma$-能带费米面圆柱体和明显的量子几何效应。声子谱被发现密切跟踪类石墨烯硼层的声子谱，但重插层镁原子主导了三个声学分支，并将硼模式严格提升到光学区域，而面内 B-B 键拉伸模式沿 $\\Gamma$-A 表现出明显的软化。根据对称性，这种 $\\Gamma$ 点键拉伸模式是唯一可以耦合到 $\\sigma$ 费米面的 $\\Gamma$ 声子，这解释了它对 EPC 的主要贡献。\n\n当电子掺杂到 $\\sigma$ 片的双简并能带边缘时，我们发现降低的态密度与增强的 EPC 矩阵元素竞争。在轻电子掺杂中，从头计算表明 EPC 增强占主导地位，导致 $T_c$ 增加（在干净掺杂限制内，没有无序效应）。使用 EPC 张量的高斯近似，我们进一步表明这种增强本质上是量子几何的，源于小 $\\sigma$ 费米表面的几何 EPC 贡献，峰值为 $\\Gamma$。总的来说，我们的结果提供了 MgB$_2$ 超导性的透明、基于对称性的解释，并表明量子几何效应对于塑造声子介导超导体的掺杂趋势至关重要。", "authors": [{"name": "Yi Jiang"}, {"name": "Haoyu Hu"}, {"name": "Dumitru Călugăru"}, {"name": "Kaja H. Hiorth"}, {"name": "Junze Deng"}, {"name": "Hanqi Pi"}, {"name": "Handong Chen"}, {"name": "Maia G. Vergniory"}, {"name": "Ion Errea"}, {"name": "Emilia Morosan"}, {"name": "Leslie M. Schoop"}, {"name": "Claudia Felser"}, {"name": "Miguel A.L. Marques"}, {"name": "Päivi Törmä"}, {"name": "Daniel Agterberg"}, {"name": "B. Andrei Bernevig"}], "featured_authors": [{"name": "Yi Jiang"}, {"name": "Haoyu Hu"}, {"name": "Dumitru Călugăru"}, {"name": "Päivi Törmä"}, {"name": "Daniel Agterberg"}, {"name": "B. Andrei Bernevig"}], "author_count": 16}, {"id": "2607.19465", "category": "cond-mat", "title": "Quantum Mott semimetal in a one-dimensional Hubbard mode", "abstract": "Mott physics in topological bands has recently attracted considerable attention, particularly in the context of twisted bilayer graphene (TBG). However, the essential ingredients for stabilizing this physics remain unclear. Here, we demonstrate a quantum Mott semimetal phase as the ground state within a one-dimensional spinful Hubbard model featuring only one orbital per unit cell, protected by inversion and particle-hole symmetries. We start from a two-orbital model where a localized $f$ orbital on the A sublattice hybridizes with a delocalized $c$ orbital on the B sublattice. Projecting the $f$-orbital Hubbard $U$ onto the active flat band yields a lattice model with Wannier orbitals centered on the B sublattice. Similar to TBG, a momentum-space scale $k_*$ emerges, setting the interaction range in the projected model to $1/k_*$. While the ground state is ferromagnetic with only the Hubbard $U$, introducing an inter-site antiferromagnetic spin coupling $J$ stabilizes a Mott semimetal$^*$ phase with a central charge $c=3$. Using exact diagonalization (ED) and density matrix renormalization group (DMRG) methods, we show that this phase hosts a spinful Dirac fermion coexisting with a neutral spin mode -- analogous to the fractionalized Fermi liquid (FL$^*$) phase in higher dimensions. Furthermore, breaking particle-hole (PH) symmetry via dispersion transforms the Mott semimetal into a Mott insulator, which is separated from a distinct Mott insulating phase by a continuous transition with a polarization jump of $1/2$. Our work provides the first unbiased evidence of a Mott semimetal ground state and demonstrates that this 1D model captures some essential aspects of TBG physics, despite lacking a Wannier obstruction.", "url": "https://arxiv.org/abs/2607.19465", "type": "理论+数值", "summary": "拓扑带中的莫特物理学最近引起了相当大的关注，特别是在扭曲双层石墨烯（TBG）的背景下。然而，稳定这种物理现象的基本成分仍不清楚。在这里，我们展示了量子莫特半金属相作为一维自旋哈伯德模型中的基态，该模型每个晶胞只有一个轨道，并受到反演和粒子空穴对称性的保护。我们从双轨道模型开始，其中 A 子晶格上的局域 $f$ 轨道与 B 子晶格上的离域 $c$ 轨道杂交。将 $f$ 轨道哈伯德 $U$ 投影到活动平带上会产生一个晶格模型，其中 Wannier 轨道以 B 子晶格为中心。与 TBG 类似，出现动量空间尺度 $k_*$，将投影模型中的相互作用范围设置为 $1/k_*$。虽然基态是铁磁的，只有哈伯德 $U$，但引入位点间反铁磁自旋耦合 $J$ 可以稳定中心电荷 $c=3$ 的莫特半金属 $^*$ 相。\n\n使用精确对角化（ED）和密度矩阵重正化群（DMRG）方法，我们表明该相具有与中性自旋模式共存的旋转狄拉克费米子 - 类似于更高维度中的分数化费米液体（FL$^*$）相。此外，通过色散打破粒子空穴 (PH) 对称性将莫特半金属转变为莫特绝缘体，该绝缘体通过极化跳跃为 1/2$ 的连续跃迁与不同的莫特绝缘相分离。我们的工作提供了莫特半金属基态的第一个无偏见证据，并证明了这个一维模型捕捉了 TBG 物理的一些基本方面，尽管缺乏 Wannier 障碍。", "authors": [{"name": "Boran Zhou"}, {"name": "Taige Wang"}, {"name": "Ya-Hui Zhang"}], "featured_authors": [{"name": "Boran Zhou"}, {"name": "Taige Wang"}, {"name": "Ya-Hui Zhang"}], "author_count": 3}, {"id": "2607.19466", "category": "cond-mat", "title": "Anyon Crystals and Hall Crystals in a Periodic Potential", "abstract": "We obtain integer and fractional quantum Hall crystals as ground states of a two-dimensional electron system subject to a strong perpendicular magnetic field and a periodic potential. For certain fractional states, we show that the Hall crystal can constitute an anyon crystal, with a periodic ordering of well-defined anyons. We find that the latter states can be stabilized at odd denominator Landau level filling fractions when Landau level mixing is sufficiently weak, and near half-filling of the underlying lattice. These phases are obtained from a mean-field analysis of an effective lattice model of bosons attached to an odd number of flux quanta, which transmutes their statistics to that of electrons. In boson coordinates, the Hall crystal is a supersolid: a superfluid with charge order. Under strong interactions, vortex-anti-vortex pairs spontaneously nucleate in the supersolid, realizing a crystalline state of anyons.", "url": "https://arxiv.org/abs/2607.19466", "type": "理论", "summary": "我们获得整数和分数量子霍尔晶体作为二维电子系统的基态，受到强垂直磁场和周期性电势的影响。对于某些分数态，我们证明霍尔晶体可以构成任意子晶体，具有明确定义的任意子的周期排序。我们发现，当朗道能级混合足够弱并且接近底层晶格的半填充时，后一状态可以稳定在奇数分母朗道能级填充分数。这些相位是通过对附加到奇数个通量量子的玻色子的有效晶格模型的平均场分析获得的，这将它们的统计数据转换为电子的统计数据。在玻色子坐标中，霍尔晶体是超固体：具有电荷顺序的超流体。在强相互作用下，涡旋-反涡旋对在超固体中自发成核，实现任意子的晶态。", "authors": [{"name": "Sayak Bhattacharjee"}, {"name": "Julian May-Mann"}, {"name": "Srinivas Raghu"}], "featured_authors": [{"name": "Sayak Bhattacharjee"}, {"name": "Julian May-Mann"}, {"name": "Srinivas Raghu"}], "author_count": 3}, {"id": "2607.19470", "category": "cond-mat", "title": "Coloring in anyon superconductivity", "abstract": "The recently observed signatures of superconductivity proximate to a fractional quantum anomalous Hall (FQAH) state in a twisted MoTe$_2$ bilayer has revitalized interest in quantum phases of matter induced by anyon dynamics. Here we show how a panoply of anyon-driven phases associated with doping the lattice ${\\nu=2/3}$ FQAH state can be realized as competing instabilities of a Fermi surface of charge-$e/3$ \"quarks\" coupled to a $\\mathrm{SU}(3)_{-1}$ Chern-Simons gauge field, which is dual to the more conventional $\\mathrm{U}(1)_3$ Chern-Simons-Ginzburg-Landau theory of quasiholes. For example, a range of electronic superconductors emerge from color superconductivity, under which the Fermi surface experiences a pairing instability mediated by gauge fluctuations. These include SC$\\star$ phases -- where superconductivity coexists with topological order -- as well as topological superconductors displaying half-integer chiral central charges when the quarks are weakly paired. One example is a topological superconductor arising from a $p+ip$ \"color-valley-locked\" pairing mechanism with chiral central charge $c_-=-1/2$. On the other hand, both superconducting and non-Fermi liquid phases can emerge when the quarks form an itinerant ferromagnet, polarizing the Fermi surface to a particular combination of colors. Finally, our framework naturally accommodates the possibility of anyonic bound state formation, allowing access to phases induced by doping anyons of charge $2e/3$ as opposed to $e/3$ within the same model. Our work unifies many earlier proposed anyonic phases as instabilities of a single parent quark metal phase, distilling their emergence into a competition between superconductivity and itinerant color ferromagnetism.", "url": "https://arxiv.org/abs/2607.19470", "type": "理论", "summary": "最近在扭曲的 MoTe$_2$ 双层中观察到的接近分数量子反常霍尔 (FQAH) 态的超导特征重新激发了人们对任意子动力学引起的物质量子相的兴趣。在这里，我们展示了如何将与掺杂晶格${\\nu=2/3}$ FQAH状态相关的任意子驱动相实现为与$\\mathrm{SU}(3)_{-1}$ Chern-Simons规范场耦合的费米电荷面$e/3$“夸克”的竞争不稳定性，该规范场与更传统的$\\mathrm{U}(1)_3$对偶Chern-Simons-Ginzburg-Landau 准空穴理论。例如，一系列电子超导体从颜色超导中出现，在这种情况下，费米表面经历了由规范涨落介导的配对不稳定性。其中包括 SC$\\star$ 相（其中超导性与拓扑序共存），以及当夸克弱配对时显示出半整数手性中心电荷的拓扑超导体。一个例子是由具有手性中心电荷 $c_-=-1/2$ 的 $p+ip$“色谷锁定”配对机制产生的拓扑超导体。\n\n另一方面，当夸克形成流动铁磁体时，超导和非费米液相都会出现，从而将费米表面极化为特定的颜色组合。最后，我们的框架自然地适应了任意子束缚态形成的可能性，允许访问通过掺杂电荷 $2e/3$ 的任意子引起的相，而不是同一模型中的 $e/3$。我们的工作将许多早期提出的任意子相统一为单母夸克金属相的不稳定性，将它们的出现提炼为超导性和流动彩色铁磁性之间的竞争。", "authors": [{"name": "Umang Mehta"}, {"name": "Yuto Nakajima"}, {"name": "Hart Goldman"}], "featured_authors": [{"name": "Umang Mehta"}, {"name": "Yuto Nakajima"}, {"name": "Hart Goldman"}], "author_count": 3}, {"id": "2607.19486", "category": "cond-mat", "title": "Localization transitions of diffusion dynamics in physical networks", "abstract": "Network diffusion underlies many transport phenomena, with Laplacian modes setting how information spreads and relaxes. In physical networks, however, connectivity alone is not enough: node volumes introduce local dwell times that regulate how flow is stored before being propagated. Here we show that physical heterogeneity reshapes topology-driven localization, with the degree-volume ratio emerging as the relevant disorder parameter. We solve an analytical model in which ratio detuning qualitatively reorganizes the Laplacian spectrum, and demonstrate in empirical networks how degree-volume correlations shift extremal eigenmodes away from the nodes selected by topology alone. Our results reveal a general feature-rich-driven mechanism for localization control, showing that physicality non-trivially reshapes the disorder landscape governing network dynamics.", "url": "https://arxiv.org/abs/2607.19486", "type": "理论", "summary": "网络扩散是许多传输现象的基础，拉普拉斯模式决定了信息如何传播和放松。然而，在物理网络中，仅连接性是不够的：节点卷引入了本地停留时间，以调节流在传播之前的存储方式。在这里，我们表明物理异质性重塑了拓扑驱动的局域化，度数-体积比作为相关的无序参数出现。我们求解了一个分析模型，其中比率失谐定性地重新组织了拉普拉斯谱，并在经验网络中证明了度-体积相关性如何将极值本征模从仅由拓扑选择的节点移开。我们的结果揭示了一种用于定位控制的通用特征丰富驱动机制，表明物理性重塑了控制网络动态的无序景观。", "authors": [{"name": "Jun Yamamoto"}, {"name": "Ivan Bonamassa"}, {"name": "Márton Pósfai"}], "featured_authors": [{"name": "Jun Yamamoto"}, {"name": "Ivan Bonamassa"}, {"name": "Márton Pósfai"}], "author_count": 3}, {"id": "2607.19589", "category": "cond-mat", "title": "Chiral Magnetic Conductivity in the Tight-Binding Model of Dirac Semimetals", "abstract": "We consider the typical tight - binding model of Dirac semimetal in the presence of both magnetic and electric fields. The electric conductivity reveals dependence on magnetic field. We calculate this dependence in the limit of strong magnetic field, when the given model is described effectively by the one - dimensional SSH model because the dynamics in the plane orthogonal to magnetic field is reduced to that of the lowest Landau level (LLL). Considering the small temperature limit we take into account dissipation due to scattering on impurities. The corresponding dissipation rate is calculated explicitly. The obtained results confirm that the source of the magnetoconductivity in this system is chiral magnetic effect.", "url": "https://arxiv.org/abs/2607.19589", "type": "理论", "summary": "我们考虑在磁场和电场同时存在的情况下狄拉克半金属的典型紧束缚模型。电导率揭示了对磁场的依赖性。当给定的模型由一维 SSH 模型有效描述时，我们在强磁场的限制下计算这种依赖性，因为与磁场正交的平面中的动力学被降低到最低朗道能级（LLL）的动力学。考虑到较小的温度限制，我们考虑了由于杂质散射而导致的耗散。明确计算相应的耗散率。所得结果证实该体系的磁导性来源是手性磁效应。", "authors": [{"name": "Mustafa Bohra"}, {"name": "Yuexiang Zhang"}, {"name": "M.A. Zubkov"}], "featured_authors": [{"name": "Mustafa Bohra"}, {"name": "Yuexiang Zhang"}, {"name": "M.A. Zubkov"}], "author_count": 3}, {"id": "2607.19612", "category": "cond-mat", "title": "Macroscopic Polarization and Magnetization from Cavity Vacuum Fluctuations", "abstract": "Cavity light-matter interaction has recently emerged as a new avenue for manipulating material properties without driving fields. Here, we demonstrate that cavity vacuum fluctuations can induce macroscopic polarization (magnetization), even in materials that lack spontaneous polarization (net magnetization) in free space. Starting from the effective photon-free quantum-electrodynamics Hamiltonian, we identify all crystallographic (magnetic) point groups that allow such cavity-induced responses. We derive the form of the corresponding response tensors based on symmetry analysis, whose elements can be obtained by quantum electrodynamical density functional theory (QEDFT) calculations. As representative examples, we show that the cavity-induced polarization in $\\alpha$-quartz can be continuously controlled by rotating the cavity. For antiferromagnetic Mn$_3$Sn, we demonstrate that cavity-induced symmetry breaking generates an out-of-plane magnetization, accompanied by an anomalous Hall conductivity component that is forbidden outside the cavity. Our work establishes symmetry as a guiding principle for cavity materials engineering and provides a route for controlling polarization and magnetization through quantum vacuum fluctuations, i.e., cavity materials engineering.", "url": "https://arxiv.org/abs/2607.19612", "type": "理论+数值", "summary": "空腔光与物质相互作用最近成为一种无需驱动场即可操纵材料特性的新途径。在这里，我们证明腔真空涨落可以引起宏观极化（磁化），即使是在自由空间中缺乏自发极化（净磁化）的材料中也是如此。从有效的无光子量子电动力学哈密顿量开始，我们识别了允许这种空腔诱导响应的所有晶体（磁性）点群。我们基于对称性分析推导了相应的响应张量的形式，其元素可以通过量子电动力学密度泛函理论（QEDFT）计算获得。作为代表性的例子，我们证明$\\alpha$-石英中的空腔诱发极化可以通过旋转空腔来连续控制。对于反铁磁 Mn$_3$Sn，我们证明空腔引起的对称性破缺会产生面外磁化，并伴随着空腔外部禁止的异常霍尔电导率分量。\n\n我们的工作将对称性确立为腔材料工程的指导原则，并提供了通过量子真空涨落控制极化和磁化强度的途径，即腔材料工程。", "authors": [{"name": "Jingkai Quan"}, {"name": "Chongxiao Fan"}, {"name": "Benshu Fan"}, {"name": "I-Te Lu"}, {"name": "Dante M. Kennes"}, {"name": "Angel Rubio"}], "featured_authors": [{"name": "Jingkai Quan"}, {"name": "Chongxiao Fan"}, {"name": "Benshu Fan"}, {"name": "I-Te Lu"}, {"name": "Dante M. Kennes"}, {"name": "Angel Rubio"}], "author_count": 6}, {"id": "2607.19694", "category": "cond-mat", "title": "Twisting-operator approach to identifying gaplessness in SU($N$) fermionic systems", "abstract": "We propose a general necessary condition for a spinful fermion chain with SU(2) spin-rotation symmetry to be gapped. Specifically, we prove that the expectation value of a properly defined fermionic twisting operator asymptotically approaches unity in any gapped phase with finite ground-state degeneracy, with finite-size corrections bounded by $\\mathscr{O}(1/L)$. Consequently, a non-unity value in the thermodynamic limit provides a sufficient criterion for identifying gapless fermion chains. We confirm this criterion using the $s$-wave Bardeen-Cooper-Schrieffer (BCS) Hamiltonian and determinant quantum Monte Carlo (DQMC) simulations of interacting Hubbard models. We further extend the twisting-operator approach to SU($N$)-symmetric fermionic systems, where the gapped ground-state sector must be SU($N$)-singlet and $\\langle \\hat{\\mathcal{U}}^M\\rangle=1+\\mathscr{O}(1/L)$ by a fermionic twisting operator $\\hat{\\mathcal{U}}$ with a suitably chosen integer $M$.", "url": "https://arxiv.org/abs/2607.19694", "type": "理论+数值", "summary": "我们提出了具有 SU(2) 自旋旋转对称性的自旋费米子链有间隙的一般必要条件。具体来说，我们证明了正确定义的费米子扭转算子的期望值在具有有限基态简并性的任何带隙相中渐近地接近统一，并且有限大小的修正以 $\\mathscr{O}(1/L)$ 为界。因此，热力学极限中的非统一值为识别无间隙费米子链提供了充分的标准。我们使用相互作用哈伯德模型的 $s$ 波 Bardeen-Cooper-Schrieffer (BCS) 哈密顿量和行列式量子蒙特卡罗 (DQMC) 模拟来确认这一标准。我们进一步将扭转算子方法扩展到 SU($N$)-对称费米子系统，其中带隙基态扇区必须是 SU($N$)-单线态，并且 $\\langle \\hat{\\mathcal{U}}^M\\rangle=1+\\mathscr{O}(1/L)$ 通过费米子扭转算子 $\\hat{\\mathcal{U}}$ 和适当选择的整数 $M$ 实现。", "authors": [{"name": "Hao Cheng"}, {"name": "Hang Su"}, {"name": "Yuan Yao"}], "featured_authors": [{"name": "Hao Cheng"}, {"name": "Hang Su"}, {"name": "Yuan Yao"}], "author_count": 3}, {"id": "2607.19707", "category": "cond-mat", "title": "Majorana bound states in anisotropic and tilted Dirac and Weyl systems", "abstract": "Topological superconductors host Majorana boundary modes whose robustness is protected by the nontrivial topology of the bulk Bogoliubov quasiparticle spectrum. While Majorana bound states associated with Dirac and Weyl quasiparticles have been extensively investigated, much less is known about how anisotropic quasiparticle velocities and tilted band structures modify their microscopic properties. Here, we develop an analytical framework for Majorana bound states in effective two-dimensional (2D) Bogoliubov--de Gennes Dirac theories describing the surface quasiparticles of topological superconductors and extend the analysis to three-dimensional (3D) tilted Weyl systems by establishing a microscopic connection to the same low-energy description through superconducting pairing. For anisotropic 2D Dirac systems, we derive closed analytical expressions for the continuum topological invariant, Majorana wave function, localization length, propagation velocity, and finite-size minigap for arbitrary interface orientations. We show that the chirality of the Majorana channel is determined by the sign of the velocity-matrix determinant, while its localization and dispersion are governed jointly by the velocity tensor and the interface geometry. For tilted 2D Dirac cones, we demonstrate that the tilt leaves the spinor eigenstates, Berry phase, and projected pairing symmetry unchanged, but strongly suppresses the Majorana propagation velocity and finite-size minigap as the Lifshitz transition between type-I and type-II regimes is approached. Finally, we consider superconducting tilted 3D Weyl systems and show that the projection of a conventional spin-singlet $s$-wave pairing interaction onto the low-energy Weyl bands naturally generates an effective chiral $p_x\\pm ip_y$ pairing symmetry, providing a microscopic Bogoliubov--de Gennes description that supports localized Majorana surface states.", "url": "https://arxiv.org/abs/2607.19707", "type": "理论", "summary": "拓扑超导体具有马约拉纳边界模式，其鲁棒性受到大块 Bogoliubov 准粒子谱的非平凡拓扑的保护。虽然与狄拉克和外尔准粒子相关的马约拉纳束缚态已被广泛研究，但人们对各向异性准粒子速度和倾斜能带结构如何改变其微观性质知之甚少。在这里，我们为描述拓扑超导体表面准粒子的有效二维（2D）Bogoliubov-de Gennes Dirac 理论中的马约拉纳束缚态开发了一个分析框架，并通过超导配对建立与相同低能描述的微观连接，将分析扩展到三维（3D）倾斜Weyl系统。对于各向异性二维狄拉克系统，我们推导了连续介质拓扑不变量、马约拉纳波函数、局域长度、传播速度和任意界面方向的有限尺寸小间隙的闭合解析表达式。\n\n我们证明，马约拉纳通道的手性由速度矩阵行列式的符号决定，而其定位和色散则由速度张量和界面几何形状共同控制。对于倾斜的二维狄拉克锥，我们证明倾斜使旋量本征态、贝里相和投影配对对称性保持不变，但随着接近 I 型和 II 型态之间的 Lifshitz 转变，强烈抑制马约拉纳传播速度和有限尺寸的小能隙。最后，我们考虑超导倾斜 3D Weyl 系统，并表明传统的自旋单重 $s$ 波配对相互作用在低能 Weyl 带上的投影自然会产生有效的手性 $p_x\\pm ip_y$ 配对对称性，提供支持局域马约拉纳表面态的微观 Bogoliubov-de Gennes 描述。", "authors": [{"name": "Abraham Kaleb Plascencia Pérez Páez"}, {"name": "Alireza Qaiumzadeh"}], "featured_authors": [{"name": "Abraham Kaleb Plascencia Pérez Páez"}, {"name": "Alireza Qaiumzadeh"}], "author_count": 2}, {"id": "2607.19732", "category": "cond-mat", "title": "A Thermodynamic Pinning Criterion for Two-Dimensional Structural Superlubricity", "abstract": "Incommensurability and elastic reconstruction do not by themselves define a structurally superlubric phase. We define fully sliding and pinned zero-temperature phases by $\\limsup_{A\\to\\infty}\\tau_{\\rm dep}^{\\max}(A)=0$ and $\\liminf_{A\\to\\infty}\\tau_{\\rm dep}^{\\min}(A)>0$, respectively; $\\Lambda_n=|V_n|G_{n,i}[D_{\\rm rel}^{-1}(\\mathbf q_n)]_{ij}G_{n,j}$ measures only reconstruction susceptibility. Translational covariance then proves that a clean, smooth, infinite moiré continuum can reconstruct without acquiring a bulk sliding barrier. We restore atomic sampling in a two-dimensional discrete model of graphene/hBN and test both a diffusion quantum Monte Carlo first-star potential and a 15-harmonic Leven potential across three rational approximants and five directions. No physical-coupling equilibrium or metastable barrier is resolved. The Leven spectrum raises the largest tested $\\Lambda$ from $0.142$ to $0.212$, while artificial scaling through $\\Lambda=1$ reaches uncontrolled strain before a size-independent threshold appears. The tested zero-temperature in-plane models are therefore consistent with an elastically relaxed sliding regime; $\\Lambda=1$ is a reconstruction scale, not a static phase criterion.", "url": "https://arxiv.org/abs/2607.19732", "type": "理论+数值", "summary": "不可通约性和弹性重构本身并不定义结构超润滑相。我们分别通过 $\\limsup_{A\\to\\infty}\\tau_{\\rm dep}^{\\max}(A)=0$ 和 $\\liminf_{A\\to\\infty}\\tau_{\\rm dep}^{\\min}(A)>0$ 定义完全滑动和固定的零温度相； $\\Lambda_n=|V_n|G_{n,i}[D_{\\rm rel}^{-1}(\\mathbf q_n)]_{ij}G_{n,j}$ 仅测量重建敏感性。然后，平移协方差证明干净、平滑、无限的莫尔连续谱可以在不获取体滑动势垒的情况下重建。我们在石墨烯/六方氮化硼的二维离散模型中恢复原子采样，并在三个有理近似和五个方向上测试扩散量子蒙特卡罗一星势和 15 谐波 Leven 势。没有解决物理耦合平衡或亚稳态障碍。 Leven 谱将最大测试 $\\Lambda$ 从 $0.142$ 提高到 $0.212$，而通过 $\\Lambda=1$ 进行人工缩放，在与尺寸无关的阈值出现之前达到不受控制的应变。\n\n因此，测试的零温面内模型与弹性松弛滑动状态一致； $\\Lambda=1$ 是重建尺度，而不是静态相位准则。", "authors": [{"name": "Li Wang"}, {"name": "Yunjie Ye"}], "featured_authors": [{"name": "Li Wang"}, {"name": "Yunjie Ye"}], "author_count": 2}, {"id": "2607.19807", "category": "cond-mat", "title": "Multi-Criticality and RG Topology in the Charge-Kondo-Breakdown Scenario in the Cuprates", "abstract": "In this paper, we examine the dynamical charge-Kondo-breakdown scenario proposed for cuprate superconductors within the perspective of renormalization group (RG) topology. By analyzing the coupled RG flow equations governing the effective low-energy theory, we determine the fixed-point structure, stability properties, and global organization of the flow. We find that the putative finite-coupling interacting fixed point is unstable against perturbations transverse to an invariant critical manifold. As a result, generic RG trajectories exhibit runaway behavior. To elucidate the global structure of the theory, we combine analytical solutions of the flow equations with numerical phase portraits and Poincaré compactification. This analysis reveals that the interacting fixed point exhibits a marginally relevant instability, generating an exponentially large but finite crossover scale. The resulting flow topology closely resembles anisotropy-driven runaway flows encountered in fluctuation-induced weakly first-order transitions. Within this framework, the apparent quantum-critical regime can be understood as an extended crossover controlled by a near-critical fixed point, rather than by asymptotic scale invariance. The results obtained indicate that the existence of extended scaling behavior does not, by itself, imply the presence of a stable interacting quantum critical state. More generally, our analysis demonstrates how RG topology can provide a powerful diagnostic for distinguishing genuine criticality from pseudo-critical behavior in theories of strongly correlated quantum matter.", "url": "https://arxiv.org/abs/2607.19807", "type": "理论+数值", "summary": "在本文中，我们从重正化群（RG）拓扑的角度研究了为铜酸盐超导体提出的动态电荷近藤击穿场景。通过分析控制有效低能理论的耦合 RG 流动方程，我们确定了流动的定点结构、稳定性属性和全局组织。我们发现假定的有限耦合相互作用不动点对于横向于不变临界流形的扰动是不稳定的。因此，通用 RG 轨迹表现出失控行为。为了阐明该理论的整体结构，我们将流动方程的解析解与数值相图和庞加莱紧化相结合。该分析表明，相互作用的不动点表现出边际相关的不稳定性，产生指数级大但有限的交叉尺度。由此产生的流动拓扑结构与波动引起的弱一阶跃迁中遇到的各向异性驱动的失控流动非常相似。\n\n在这个框架内，表观量子临界状态可以理解为由近临界固定点控制的扩展交叉，而不是由渐近尺度不变性控制。获得的结果表明，扩展标度行为的存在本身并不意味着存在稳定相互作用的量子临界态。更一般地说，我们的分析证明了 RG 拓扑如何提供强大的诊断，以区分强相关量子物质理论中的真正临界性和伪临界行为。", "authors": [{"name": "Stefan Kirchner"}, {"name": "Petr Jizba"}], "featured_authors": [{"name": "Stefan Kirchner"}, {"name": "Petr Jizba"}], "author_count": 2}, {"id": "2607.19818", "category": "cond-mat", "title": "Weakly Nonlinear Dynamics of Unstable Modes in Jammed Amorphous Solids", "abstract": "We investigate the structural evolution in jammed amorphous solids by analyzing the eigenmodes of a generalized Hessian matrix that incorporates spatial modulation via wave numbers. Unlike the conventional Hessian, this generalized formulation captures linearly unstable modes through a Fourier-based extension of the Hessian matrix, enabling us to study responses beyond the mechanically stable regime. We demonstrate that the excitation of unstable eigenmodes leads to structural rearrangements independent of the initial perturbation by the simulation. Furthermore, we derive a weakly nonlinear amplitude equation to describe the growth and saturation of these unstable modes, analogous to the Landau equation. Our framework provides a pathway to understand instability-driven configuration changes in disordered solids.", "url": "https://arxiv.org/abs/2607.19818", "type": "理论+数值", "summary": "我们通过分析广义 Hessian 矩阵的本征模来研究堵塞的非晶固体的结构演化，该矩阵通过波数结合了空间调制。与传统的 Hessian 矩阵不同，这种广义公式通过 Hessian 矩阵的基于傅里叶的扩展捕获线性不稳定模式，使我们能够研究超出机械稳定状态的响应。我们通过模拟证明，不稳定本征模的激发会导致结构重排，而与初始扰动无关。此外，我们推导了一个弱非线性振幅方程来描述这些不稳定模式的增长和饱和，类似于朗道方程。我们的框架提供了一种了解无序固体中不稳定驱动的构型变化的途径。", "authors": [{"name": "Kota Noto"}, {"name": "Harukuni Ikeda"}, {"name": "Kuniyasu Saitoh"}, {"name": "Hisao Hayakawa"}], "featured_authors": [{"name": "Kota Noto"}, {"name": "Harukuni Ikeda"}, {"name": "Kuniyasu Saitoh"}, {"name": "Hisao Hayakawa"}], "author_count": 4}, {"id": "2607.19821", "category": "cond-mat", "title": "Spatially Dispersive Second-Harmonic Generation in Ferroaxial Systems", "abstract": "Spatially dispersive second-harmonic generation (SHG) provides a powerful probe of centrosymmetric multipolar states beyond the electric-dipole approximation. We develop a gauge-consistent microscopic theory of spatially dispersive SHG that treats electric-quadrupole (EQ) and magnetic-dipole (MD) processes on equal footing. Applying the formulation to a minimal triangular cluster model with ferroaxial order, which is closely related to an electric toroidal dipole, we show that the nonlinear optical response directly reflects the ferroaxial order parameter. The agreement between length- and velocity-gauge calculations confirms the gauge consistency of the formulation. We further demonstrate that the EQ and MD contributions exhibit different spectral weights despite sharing the same resonance energies. In particular, the MD channel can dominate over the EQ channel at selected resonances, indicating that it is not merely a perturbative correction. Our results establish that both EQ and MD processes are essential for a quantitative description of spatially dispersive SHG in ferroaxial materials and provide a microscopic basis for interpreting nonlinear optical signatures of centrosymmetric multipolar order.", "url": "https://arxiv.org/abs/2607.19821", "type": "理论+数值", "summary": "空间色散二次谐波产生（SHG）提供了超越电偶极近似的中心对称多极态的强大探测。我们开发了一种规范一致的空间色散二次谐波的微观理论，该理论平等地对待电四极（EQ）和磁偶极（MD）过程。将公式应用于与电环形偶极子密切相关的铁轴级最小三角簇模型，我们表明非线性光学响应直接反映了铁轴级参数。长度计和速度计计算之间的一致性证实了配方的计重一致性。我们进一步证明，尽管共享相同的共振能量，EQ 和 MD 的贡献表现出不同的频谱权重。特别是，MD 通道在选定的谐振处可以主导 EQ 通道，这表明它不仅仅是一个扰动校正。\n\n我们的结果表明，EQ 和 MD 过程对于铁轴材料中空间色散倍频的定量描述至关重要，并为解释中心对称多极级的非线性光学特征提供了微观基础。", "authors": [{"name": "Takumi Shiro"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Takumi Shiro"}, {"name": "Satoru Hayami"}], "author_count": 2}, {"id": "2607.19828", "category": "cond-mat", "title": "Real-time probing of quadrupolar contributions to the absorption cross section of non-periodic systems", "abstract": "The non-perturbative evaluation of multipolar cross sections is essential for probing atomic and molecular responses to spatially inhomogeneous electric fields characteristic of nanoscale environments where the conventional dipole approximation breaks down. Taking the hydrogen atom as an analytical and numerical benchmark, we map in real time quadrupole interactions driven by instantaneous electric field gradients. Our study explores two distinct interaction regimes. Under a uniform field, quadrupolar responses are activated by multi-step dipole transitions, responsible for sub-1~eV excited-state absorption. Conversely, under pure spatial gradients, the weak-field response is dominated by the single-photon $1s \\to 3d$ quadrupole resonance at 12.1~eV, while strong gradients induce low-energy stimulated emission via transiently driven coherent populations. This dynamical analysis is complemented by a rigorous evaluation of the symmetry aspects of the quadrupole response and the applied electric field. This methodology establishes the theoretical and computational foundation for future non-perturbative multipole simulations of molecules and nanostructures in the near-field regime.", "url": "https://arxiv.org/abs/2607.19828", "type": "理论+数值", "summary": "多极横截面的非微扰评估对于探测原子和分子对纳米级环境中空间不均匀电场特征的响应至关重要，在纳米级环境中，传统偶极子近似失效。以氢原子作为分析和数值基准，我们绘制了由瞬时电场梯度驱动的实时四极相互作用。我们的研究探索了两种不同的相互作用机制。在均匀场下，四极响应由多步偶极跃迁激活，负责亚1~eV激发态吸收。相反，在纯空间梯度下，弱场响应以12.1~eV处的单光子$1s \\to 3d$四极共振为主，而强梯度则通过瞬态驱动的相干布居诱导低能量受激发射。这种动力学分析是通过对四极响应和所施加电场的对称性方面的严格评估来补充的。该方法为未来近场区域中分子和纳米结构的非微扰多极模拟奠定了理论和计算基础。", "authors": [{"name": "Anvar Khujakulov"}, {"name": "Michele Guerrini"}, {"name": "Carlo Andrea Rozzi"}, {"name": "Caterina Cocchi"}], "featured_authors": [{"name": "Anvar Khujakulov"}, {"name": "Michele Guerrini"}, {"name": "Carlo Andrea Rozzi"}, {"name": "Caterina Cocchi"}], "author_count": 4}, {"id": "2607.19840", "category": "cond-mat", "title": "Emergence of giant vortices under nonlinear rotation with attractive interactions in a toroidal condensate", "abstract": "We numerically investigate the effects of a density-dependent gauge potential which induces nonlinear rotation on a Bose-Einstein condensate confined in a toroidal trapping geometry. By focusing on the resulting vortex lattice configurations, we demonstrate that increasing the strength of the nonlinear rotation leads to a structural transition from a ring-shaped vortex lattice to a giant vortex state. The quantum circulation associated with the giant vortex is found to be highly sensitive to the strength of the nonlinear rotation and the giant vortex appears in the regime of negative chemical potential. Additionally, we identify the parameter regime in which the Thomas-Fermi density profile remains valid by mapping the solution space based on the strength of the nonlinear rotation and the radius of the confining potential. Based on the Bogoliubov de Gennes analysis, we investigate the impact of nonlinear rotation on the collective excitation spectrum. Our results reveal a violation of the Kohn theorem, accompanied by changes in the breathing mode frequency that indicate radial deformation of the condensate. Our findings are further substantiated through a comprehensive hydrodynamic analysis. Finally, we analyze the stability of multiply quantized vortices under nonlinear rotation. Our findings indicate that while nonlinear rotation can enhance the global stability of these states, it does not necessarily ensure their local stability.", "url": "https://arxiv.org/abs/2607.19840", "type": "理论+数值", "summary": "我们以数值方式研究了密度相关的规范势对限制在环形捕获几何结构中的玻色-爱因斯坦凝聚态引起非线性旋转的影响。通过关注由此产生的涡旋晶格配置，我们证明了增加非线性旋转的强度会导致从环形涡旋晶格到巨型涡旋状态的结构转变。发现与巨涡旋相关的量子循环对非线性旋转的强度高度敏感，并且巨涡旋出现在负化学势区域。此外，我们通过基于非线性旋转的强度和限制势的半径映射解空间来确定托马斯-费米密度分布保持有效的参数范围。基于 Bogoliubov de Gennes 分析，我们研究了非线性旋转对集体激励谱的影响。我们的结果揭示了科恩定理的违反，伴随着呼吸模式频率的变化，表明冷凝物的径向变形。\n\n我们的研究结果通过全面的流体动力学分析得到进一步证实。最后，我们分析了非线性旋转下多重量子化涡的稳定性。我们的研究结果表明，虽然非线性旋转可以增强这些状态的全局稳定性，但不一定确保它们的局部稳定性。", "authors": [{"name": "Rony Boral"}, {"name": "Swarup K. Sarkar"}, {"name": "Matthew Edmonds"}, {"name": "Paulsamy Muruganandam"}, {"name": "Pankaj Kumar Mishra"}], "featured_authors": [{"name": "Rony Boral"}, {"name": "Swarup K. Sarkar"}, {"name": "Matthew Edmonds"}, {"name": "Paulsamy Muruganandam"}, {"name": "Pankaj Kumar Mishra"}], "author_count": 5}, {"id": "2607.19885", "category": "cond-mat", "title": "The origin of ferroelectricity, polarization and high resistivity in Aurivillius CaBi2B2O9 (B = Ta, Nb)", "abstract": "Aurivillius layered oxides are important candidates for high-temperature ferroelectric and piezoelectric application. In this work, we combine group theoretic analysis with first-principles calculations to systematically investigate the origin of ferroelectric phase transition, polarization, piezoelectric response, and intrinsic electrical insulation of the two-layer Aurivillius ferroelectrics CaBi$_{2}$B$_{2}$O$_{9}$ (B = Ta, Nb). The results show that the \\textit{A2$_1$am} ferroelectric phase arises from the cooperative condensation of a polar mode and nonpolar oxygen octahedral rotation/tilting modes, whose the $\\Gamma_5^-$X$_2^+$X$_3^-$ trilinear coupling substantially lowers the total energy and deepens the ferroelectric potential well. The spontaneous polarization and anisotropic piezoelectric response are governed primarily by the cooperative displacements of the Bi$_{2}$O$_{2}$ layers and Ta/NbO$_{6}$ octahedra, with Bi ions providing an indispensable contribution to both responses. More importantly, the polar distortion can be traced to the relative in-plane displacement between adjacent the Bi$_{2}$O$_{2}$ layer and the perovskite-like block. Because this displacement is intrinsic to the alternating Bi$_{2}$O$_{2}$/perovskite-block stacking topology and is independent of the number of perovskite layers, we identify interlayer sliding as a general, layer-number-independent structural mechanism for ferroelectricity in Aurivillius oxides. Our findings establish a unified microscopic picture linking structural distortions, ferroelectric polarization, piezoelectric response, and electronic insulation in CaBi$_{2}$B$_{2}$O$_{9}$ (B = Ta, Nb), and provide theoretical guidance for designing layered ferroelectric oxides with high Curie temperatures and robust insulating behavior.", "url": "https://arxiv.org/abs/2607.19885", "type": "理论+数值", "summary": "Aurivilius 层状氧化物是高温铁电和压电应用的重要候选者。在这项工作中，我们将群论分析与第一性原理计算相结合，系统地研究了两层Aurivilius铁电体CaBi$_{2}$B$_{2}$O$_{9}$ (B = Ta, Nb)的铁电相变、极化、压电响应和本征电绝缘的起源。结果表明，\\textit{A2$_1$am}铁电相是由极性模式和非极性氧八面体旋转/倾斜模式的协同凝聚产生的，其$\\Gamma_5^-$X$_2^+$X$_3^-$三线性耦合大大降低了总能量并加深了铁电势阱。自发极化和各向异性压电响应主要由 Bi$_{2}$O$_{2}$ 层和 Ta/NbO$_{6}$ 八面体的协同位移控制，其中 Bi 离子对这两种响应提供了不可或缺的贡献。更重要的是，极性畸变可以追溯到相邻 Bi$_{2}$O$_{2}$ 层和类钙钛矿块之间的相对面内位移。\n\n由于这种位移是交替 Bi$_{2}$O$_{2}$/钙钛矿块堆叠拓扑所固有的，并且与钙钛矿层数无关，因此我们将层间滑动确定为 Aurivillius 氧化物中铁电性的一种通用的、与层数无关的结构机制。我们的研究结果建立了一个统一的微观图景，将 CaBi$_{2}$B$_{2}$O$_{9}$ (B = Ta, Nb) 中的结构畸变、铁电极化、压电响应和电子绝缘联系起来，并为设计具有高居里温度和鲁棒绝缘行为的层状铁电氧化物提供了理论指导。", "authors": [{"name": "Fengzhang Tang"}, {"name": "Shi Wei"}, {"name": "Qi Hu"}, {"name": "Jie Xing"}, {"name": "Jianguo Zhu"}, {"name": "Zhi Tan"}, {"name": "Qiang Chen"}], "featured_authors": [{"name": "Fengzhang Tang"}, {"name": "Shi Wei"}, {"name": "Qi Hu"}, {"name": "Jianguo Zhu"}, {"name": "Zhi Tan"}, {"name": "Qiang Chen"}], "author_count": 7}, {"id": "2607.19897", "category": "cond-mat", "title": "THz-Driven Floquet Spin Valve-Modulator", "abstract": "Within the scattering matrix ($S$-matrix) framework adapted to the high-frequency Floquet--Magnus formalism based on the length gauge, we investigate spin-dependent quantum transport in a 1D quantum ring with an asymmetric ($\\pi/2$) configuration of quantum point contacts. We demonstrate the realization of a contactless electromagnetic analog of the Datta--Das spin field-effect transistor with ferromagnetic leads operating at zero static magnetic field. It is shown that an off-resonance terahertz (THz) field enables high-precision switching between spin channels without altering the static parameters of the nanostructure. Driven by an electronic Vernier effect, the quantum interference in the asymmetric geometry yields a selective spin phase rotator alongside an ultra-high-contrast current-suppression regime (``optical shutter''). The proposed architecture is fundamentally robust against multiphoton leakage sidebands, offering a thermally immune, high-speed alternative to conventional semiconductor static spin transistors.", "url": "https://arxiv.org/abs/2607.19897", "type": "理论", "summary": "在适合基于长度规范的高频 Floquet-Magnus 形式主义的散射矩阵 ($S$-matrix) 框架内，我们研究了具有不对称 ($\\pi/2$) 量子点接触配置的一维量子环中的自旋相关量子输运。我们演示了 Datta-Das 自旋场效应晶体管的非接触式电磁模拟的实现，其铁磁引线在零静态磁场下工作。结果表明，非共振太赫兹（THz）场可以在不改变纳米结构静态参数的情况下实现自旋通道之间的高精度切换。在电子游标效应的驱动下，不对称几何结构中的量子干涉产生了选择性自旋相位旋转器以及超高对比度电流抑制机制（“光学快门”）。所提出的架构对于多光子泄漏边带具有根本的鲁棒性，为传统半导体静态自旋晶体管提供了热免疫、高速替代方案。", "authors": [{"name": "R.G. Nazmitdinov"}], "featured_authors": [{"name": "R.G. Nazmitdinov"}], "author_count": 1}, {"id": "2607.19920", "category": "cond-mat", "title": "Effective Complexity Reduction of the Landau-de Gennes Elastic Energy: A Quantitative Framework and Numerical Validation", "abstract": "We revisit the elastic energy formulation of the Landau-de Gennes model for nematic liquid crystals, focusing on quantitative reductions of the multi-constant elastic energy. Building on the generalized optimal scaling procedure (GOS) introduced by Rusconi et al. in 2025, we identify explicit parameter regimes in which the three-constant model $(L_1,L_2,L_3)$ can be reduced to $(L_1,L_2,0)$ and how the two-constant model $(L_1,L_2,0)$ can be reduced to the commonly used one-constant configuration $(L_1,0,0)$. The analytical scaling predictions are tested numerically using the openQmin simulation framework, confirming that below a critical threshold for $L_3$ or $L_2$, given by GOS, the deviation from the reduced model remains of the same order of magnitude as predicted by the scaling theory. These results provide a quantitative criterion for the validity of reduced elastic models and establish a direct connection between optimal scaling arguments and numerical observations within the Landau-de Gennes framework.", "url": "https://arxiv.org/abs/2607.19920", "type": "理论+数值", "summary": "我们重新审视向列液晶的 Landau-de Gennes 模型的弹性能公式，重点关注多常数弹性能的定量降低。以 Rusconi 等人引入的广义最优缩放程序 (GOS) 为基础。到 2025 年，我们将确定显式参数机制，其中三常数模型 $(L_1,L_2,L_3)$ 可以简化为 $(L_1,L_2,0)$ 以及如何将二常数模型 $(L_1,L_2,0)$ 简化为常用的一常数配置 $(L_1,0,0)$。使用 openQmin 模拟框架对分析缩放预测进行了数值测试，确认低于 GOS 给出的 $L_3$ 或 $L_2$ 的临界阈值，与简化模型的偏差与缩放理论预测的数量级保持相同。这些结果为简化弹性模型的有效性提供了定量标准，并在朗道-德热讷框架内的最优标度参数和数值观测之间建立了直接联系。", "authors": [{"name": "Razvan-Dumitru Ceuca"}, {"name": "Simone Rusconi"}, {"name": "Arghir-Dani Zarnescu"}], "featured_authors": [{"name": "Razvan-Dumitru Ceuca"}, {"name": "Simone Rusconi"}, {"name": "Arghir-Dani Zarnescu"}], "author_count": 3}, {"id": "2607.19937", "category": "cond-mat", "title": "Symmetry-Based Design Rules for Second-Harmonic Generation in Stacked and Twisted MoS2 Bilayers", "abstract": "Understanding how stacking controls the nonlinear optical response of two-dimensional materials is key to designing van der Waals heterostructures with tailored functionalities. Here, we establish a comprehensive symmetry-based framework mapping the structural configuration of MoS2 bilayers across four point groups (D3h, D3d, C3v, C3) to their second-order susceptibility tensor chi^(2). Using group-theory arguments benchmarked against first-principles calculations, we demonstrate how symmetry breaking controls the activation and suppression of individual tensor elements in these systems. We show that the emergence of the in-plane component chi_xxx in twisted configurations (C3 group) induces a rigid azimuthal rotation of the second-harmonic generation polar lobes, which remains frequency-independent across the entire optical spectrum, locking to half of the structural twist angle. Our findings establish a direct, wavelength-independent optical route for twist-angle determination and provide a clear roadmap for engineering nonlinear optical responses in two-dimensional materials.", "url": "https://arxiv.org/abs/2607.19937", "type": "理论+数值", "summary": "了解堆叠如何控制二维材料的非线性光学响应是设计具有定制功能的范德华异质结构的关键。在这里，我们建立了一个全面的基于对称性的框架，将四个点组（D3h、D3d、C3v、C3）的 MoS2 双层的结构配置映射到其二阶磁化率张量 chi^(2)。使用以第一性原理计算为基准的群论论证，我们演示了对称性破缺如何控制这些系统中单个张量元素的激活和抑制。我们表明，扭曲配置（C3组）中面内分量chi_xxx的出现引起了二次谐波生成极瓣的刚性方位角旋转，其在整个光谱上保持频率无关，锁定到结构扭曲角的一半。我们的研究结果建立了一种直接的、与波长无关的扭转角测定光学路径，并为二维材料中的非线性光学响应工程提供了清晰的路线图。", "authors": [{"name": "Sumanti Patra"}, {"name": "Caterina Cocchi"}], "featured_authors": [{"name": "Sumanti Patra"}, {"name": "Caterina Cocchi"}], "author_count": 2}, {"id": "2607.19963", "category": "cond-mat", "title": "Emergence of Hexanematic Order in a Growing Confluent Cell Monolayer", "abstract": "Collective migration of epithelial layers underlies processes ranging from wound healing to cancer invasion. A defining yet challenging feature is the emergence of distinct cell morphologies within a single migrating confluent sheet, with larger, elongated cells at the active boundary and smaller, hexatically ordered cells in the bulk. Here, we develop a stochastic particle-Voronoi framework that captures this hexanematic organization without prescribing target geometries and distinct cell types. We show that boundary-driven collective motion generates an outward velocity gradient. This gradient, coupled to a density and velocity-dependent division rule, produces peripheral cells that are larger, more elongated, and more defect-prone, while bulk cells remain smaller, isotropic, and hexagonally packed. These results show how minimal, non-equilibrium mechanical interactions give rise to emergent, self-organized tissue-scale patterning during collective migration.", "url": "https://arxiv.org/abs/2607.19963", "type": "理论", "summary": "上皮层的集体迁移是从伤口愈合到癌症侵袭等过程的基础。一个决定性但具有挑战性的特征是在单个迁​​移汇合片内出现不同的细胞形态，在活性边界处具有较大的、细长的细胞，而在本体中具有较小的、六方有序的细胞。在这里，我们开发了一个随机粒子-Voronoi 框架，可以捕获这种己烷组织，而无需指定目标几何形状和不同的细胞类型。我们证明边界驱动的集体运动会产生向外的速度梯度。这种梯度与密度和速度相关的分裂规则相结合，产生更大、更细长、更容易出现缺陷的外围细胞，而块状细胞则保持更小、各向同性和六角形堆积。这些结果表明，在集体迁移过程中，最小的非平衡机械相互作用如何产生新兴的自组织组织尺度模式。", "authors": [{"name": "Hon Lin Too"}, {"name": "Farisan Dary"}, {"name": "Isaac Si Yuan Ling"}, {"name": "Dustin Erhard Theofilusa"}, {"name": "Duo Zhang"}, {"name": "Haiyi Liang"}, {"name": "Ee Hou Yong"}], "featured_authors": [{"name": "Hon Lin Too"}, {"name": "Farisan Dary"}, {"name": "Isaac Si Yuan Ling"}, {"name": "Duo Zhang"}, {"name": "Haiyi Liang"}, {"name": "Ee Hou Yong"}], "author_count": 7}, {"id": "2607.19984", "category": "cond-mat", "title": "A framework for separating dephasing from decoherence in matter-wave Bell interferometers", "abstract": "Matter-wave Bell interferometers provide a sensitive probe of mass-dependent decoherence in entangled quantum systems. The degree of entanglement is obtained from the Bell-correlation amplitude of this interferometer. For observing potential mass-dependent decoherence, a reliable interpretation of any observed reduction in the Bell correlation amplitude is required, which depends on three factors: geometric dephasing, environmental decoherence, and technical dilution from source and detection statistics. In this work, we present a framework based on the Schwinger SU(2) mapping to separate these contributions into local unitaries or dissipative channels. We show that by evaluating the Bell correlation at zero interferometer path difference, it is possible to extract a source-distribution-independent Bell correlation amplitude reduction. When this framework is extended to involve atoms of different mass, we show that the known differential decoherence channels are negligible at current sensitivity. This yields a concrete bound at which a dual-species Bell interferometer would begin to signal differential decoherence beyond the known systematics, opening the way for such systems to probe new physics, such as mass-dependent decoherence mechanisms.", "url": "https://arxiv.org/abs/2607.19984", "type": "理论", "summary": "物质波贝尔干涉仪为纠缠量子系统中质量相关的退相干提供了灵敏的探针。纠缠度是从该干涉仪的贝尔相关幅度获得的。为了观察潜在的质量相关退相干，需要对观察到的贝尔相关幅度的任何减少进行可靠的解释，这取决于三个因素：几何相移、环境退相干以及来自源和检测统计数据的技术稀释。在这项工作中，我们提出了一个基于 Schwinger SU(2) 映射的框架，将这些贡献分成局部酉或耗散通道。我们表明，通过评估零干涉仪路径差下的贝尔相关性，可以提取与源分布无关的贝尔相关性幅度减小。当这个框架扩展到涉及不同质量的原子时，我们表明已知的微分退相干通道在当前灵敏度下可以忽略不计。\n\n这产生了一个具体的界限，在这个界限上，双物种贝尔干涉仪将开始发出超出已知系统学的差分退相干信号，为此类系统探索新物理（例如质量相关的退相干机制）开辟了道路。", "authors": [{"name": "S. Kannan"}, {"name": "Y. S. Athreya"}, {"name": "X. T. Yan"}, {"name": "S. S. Hodgman"}, {"name": "A. G. Truscott"}], "featured_authors": [{"name": "S. Kannan"}, {"name": "Y. S. Athreya"}, {"name": "X. T. Yan"}, {"name": "S. S. Hodgman"}, {"name": "A. G. Truscott"}], "author_count": 5}, {"id": "2607.20034", "category": "cond-mat", "title": "Motility destabilizes an absorbing-state flock", "abstract": "Activity, when it takes the form of motility, is generally seen to promote order in many-body systems. Here we present a one-dimensional lattice model that, in the non-motile limit, exhibits absorbing ferromagnetic states. When activity is introduced through biased motility, these absorbing state are destabilised and the system instead undergoes a transition from an ordered flock to a disordered state as the alignment strength is decreased. A finite-size scaling analysis of physical quantities reveals a continuous transition with critical exponents satisfying the hyperscaling relation in one dimension, providing quantitative evidence for the activity-induced disorder.", "url": "https://arxiv.org/abs/2607.20034", "type": "理论+数值", "summary": "当活动以运动的形式出现时，通常被认为可以促进多体系统的秩序。在这里，我们提出了一个一维晶格模型，该模型在非运动极限下表现出吸收铁磁态。当通过偏向运动引入活性时，这些吸收状态会不稳定，并且随着排列强度的降低，系统会经历从有序群体到无序状态的转变。物理量的有限尺寸标度分析揭示了临界指数满足一维超标度关系的连续转变，为活动引起的紊乱提供了定量证据。", "authors": [{"name": "Narayan Dutt Sharma"}, {"name": "Subroto Mukerjee"}, {"name": "Chandan Dasgupta"}, {"name": "Sriram Ramaswamy"}], "featured_authors": [{"name": "Narayan Dutt Sharma"}, {"name": "Subroto Mukerjee"}, {"name": "Chandan Dasgupta"}, {"name": "Sriram Ramaswamy"}], "author_count": 4}, {"id": "2607.20036", "category": "cond-mat", "title": "Vanishing spin stiffness in weakly disordered two-dimensional Heisenberg ferromagnets", "abstract": "We show that a small fraction of antiferromagnetic bonds qualitatively alters the long-wavelength dynamics of two-dimensional Heisenberg ferromagnets. Although the classical ground state remains magnetized, weak bond frustration generates logarithmically correlated spatial fluctuations of the local spin stiffness, despite the microscopic disorder being short ranged. A replica field theory calculation shows that the effective disorder strength grows under coarse graining, while the spin stiffness decreases, yielding anomalously soft magnons with a scale-dependent dynamical exponent $z > 2$. Numerical diagonalization of the semiclassical spin-wave Hamiltonian confirms the anomalous low-energy scaling. The flow is toward an infinite-disorder, zero stiffness regime.", "url": "https://arxiv.org/abs/2607.20036", "type": "理论+数值", "summary": "我们表明，一小部分反铁磁键定性地改变了二维海森堡铁磁体的长波长动力学。尽管经典基态保持磁化，但弱键挫败会产生局部自旋刚度的对数相关空间波动，尽管微观无序是短程的。复制场理论计算表明，粗粒化下有效无序强度增加，而自旋刚度降低，产生具有与尺度相关的动力学指数 $z > 2$ 的异常软磁振子。半经典自旋波哈密顿量的数值对角化证实了反常的低能标度。流动趋于无限无序、零刚度状态。", "authors": [{"name": "Jacopo Niedda"}, {"name": "Aldo Coraggio"}, {"name": "Giacomo Bracci-Testasecca"}, {"name": "Antonello Scardicchio"}], "featured_authors": [{"name": "Jacopo Niedda"}, {"name": "Aldo Coraggio"}, {"name": "Giacomo Bracci-Testasecca"}, {"name": "Antonello Scardicchio"}], "author_count": 4}, {"id": "2607.20070", "category": "cond-mat", "title": "Core and valence photoemission spectra of atoms and molecules from a multichannel Dyson equation", "abstract": "We recently presented multichannel Dyson equations for the \\textit{ab initio} simulation of various spectroscopies. In particular, we introduced a multichannel Dyson equation for the description of photoemission spectra. In this work, we apply our approach to the simulation of photoemission spectra of atoms and molecules. We introduce a numerically efficient approach to calculate their spectral functions. We compare the spectra obtained within the multichannel Dyson equation to those obtained with full configuration interaction and the $GW$ method. We are thus able to show that the satellite features due to shake-up processes are significantly better described by the multichannel Dyson equation than by $GW$. Finally, we also discuss the slow convergence of the satellite energies with the size of the basis set and we propose a simple extrapolation method to reach the complete basis-set limit.", "url": "https://arxiv.org/abs/2607.20070", "type": "理论+数值", "summary": "我们最近提出了用于各种光谱的 \\textit{ab initio} 模拟的多通道戴森方程。特别是，我们引入了多通道戴森方程来描述光电子光谱。在这项工作中，我们将我们的方法应用于原子和分子的光电子发射光谱的模拟。我们引入了一种数值有效的方法来计算它们的谱函数。我们将多通道戴森方程中获得的光谱与通过完全配置相互作用和 $GW$ 方法获得的光谱进行比较。因此，我们能够证明，多通道戴森方程比 $GW$ 更好地描述了由于震动过程而产生的卫星特征。最后，我们还讨论了卫星能量随基组大小的缓慢收敛，并提出了一种简单的外推方法来达到完全基组极限。", "authors": [{"name": "Stefano Paggi"}, {"name": "J. Arjan Berger"}, {"name": "Pina Romaniello"}], "featured_authors": [{"name": "Stefano Paggi"}, {"name": "J. Arjan Berger"}, {"name": "Pina Romaniello"}], "author_count": 3}, {"id": "2607.20075", "category": "cond-mat", "title": "Two- and three-body bound states in one-dimensional Fermi bipolaron with three-body interaction", "abstract": "We discuss the ground-state properties of two bosonic (or spin-1/2 fermionic in a singlet spin state) impurities immersed in a one-dimensional ideal Fermi gas with only the three-body contact interaction accounted for. Despite its simplicity, the considered model is found to demonstrate a variety of medium-induced few-body bound states. Particularly, using variational calculations with trial wave functions that correctly take into account one particle-hole excitation, we predict the emergence of a dimer state and several trimer states over a wide range of the three-body coupling parameter.", "url": "https://arxiv.org/abs/2607.20075", "type": "理论+数值", "summary": "我们讨论了浸入一维理想费米气体中的两种玻色子（或单线态自旋态的自旋 1/2 费米子）杂质的基态性质，仅考虑三体接触相互作用。尽管其简单，所考虑的模型被发现展示了各种介质诱导的少体束缚态。特别是，使用正确考虑一个粒子空穴激发的试验波函数的变分计算，我们预测在大范围的三体耦合参数上会出现二聚体状态和几个三聚体状态。", "authors": [{"name": "O. Hryhorchak"}, {"name": "V. Pastukhov"}], "featured_authors": [{"name": "O. Hryhorchak"}, {"name": "V. Pastukhov"}], "author_count": 2}, {"id": "2607.20077", "category": "cond-mat", "title": "From MLIPs to Microstructure: A High-Throughput Computational Framework to Design Spinodal Alloys in High-Dimensional Composition Spaces via Analytic Derivatives of CALPHAD Model Predictions", "abstract": "Identifying regions of design space subject to spinodal decomposition is a critical component of alloy design in high-dimensional composition spaces. In cases where designers are seeking to exploit spinodal microstructures to tailor alloy properties, prediction of microstructure evolution and morphology is also needed. In this work, we present a Machine Learning Interatomic Potential (MLIP)-trained, CALPHAD-based, open-source workflow for high-throughput microstructure stability analysis and visualization. In this workflow, coherent strain contributions are captured via high-throughput MLIP elastic constant calculations. To predict microstructure morphology for compositions of interest, MLIP-generated thermodynamic models are fed into an elasto-chemical phase field simulation. Both stability analyses and phase-field simulations utilize analytically-derived Gibbs energy Hessians to improve computational efficiency and accuracy over finite difference approximations. We demonstrate this workflow by investigating microstructure stability in the Hf-Nb-Ti-V quaternary system.", "url": "https://arxiv.org/abs/2607.20077", "type": "理论+数值", "summary": "识别受旋节线分解影响的设计空间区域是高维成分空间中合金设计的关键组成部分。如果设计人员寻求利用旋节线微观结构来定制合金性能，则还需要预测微观结构演变和形态。在这项工作中，我们提出了一种经过机器学习原子间势 (MLIP) 训练、基于 CALPHAD 的开源工作流程，用于高通量微观结构稳定性分析和可视化。在此工作流程中，通过高通量 MLIP 弹性常数计算捕获相干应变贡献。为了预测感兴趣成分的微观结构形态，将 MLIP 生成的热力学模型输入到弹性化学相场模拟中。稳定性分析和相场模拟都利用分析得出的吉布斯能量 Hessians 来提高有限差分近似的计算效率和精度。我们通过研究 Hf-Nb-Ti-V 四元系统中的微观结构稳定性来演示此工作流程。", "authors": [{"name": "Courtney Kunselman"}, {"name": "Doguhan Sariturk"}, {"name": "Siya Zhu"}, {"name": "Vahid Attari"}, {"name": "Raymundo Arroyave"}], "featured_authors": [{"name": "Courtney Kunselman"}, {"name": "Doguhan Sariturk"}, {"name": "Siya Zhu"}, {"name": "Vahid Attari"}, {"name": "Raymundo Arroyave"}], "author_count": 5}, {"id": "2607.20100", "category": "cond-mat", "title": "Inferring activity from fluid flow in continuum models of active matter", "abstract": "Active matter systems are driven out of thermodynamic equilibrium by localized, microscale energy dissipation. While hydrodynamic continuum frameworks are highly successful at simulating these non-equilibrium phenomena (the forward problem), characterizing real-world active materials is fundamentally bottlenecked by the difficulty of measuring active stresses directly. This paper addresses the inverse problem using deep learning: model inference and model selection from observable flow field data of active fluids. We formulate a generalized hydrodynamic inversion framework applied to two cornerstone paradigms of active continuum physics: Active Model H (representing scalar active matter) and Active Nematics (representing active systems with orientational order). We demonstrate that the kinetic energy spectrum obtained from the fluid flow fields preserve a high-fidelity signature of activity to infer parameters of active model H and active nematics. Our deep learning method presents a principled way to bear upon questions of model inference and selection given the flow field data in continuum models of active matter.", "url": "https://arxiv.org/abs/2607.20100", "type": "理论", "summary": "活性物质系统因局部的微尺度能量耗散而脱离热力学平衡。虽然流体动力学连续体框架在模拟这些非平衡现象（正向问题）方面非常成功，但表征现实世界的活性材料从根本上受到直接测量活性应力的困难的瓶颈。本文利用深度学习解决了逆问题：根据活动流体的可观测流场数据进行模型推理和模型选择。我们制定了一个广义的流体动力学反演框架，应用于主动连续介质物理的两个基石范式：主动模型H（代表标量活性物质）和主动向列学（代表具有取向顺序的主动系统）。我们证明，从流体流场获得的动能谱保留了高保真活性特征，以推断活性模型 H 和活性向列相的参数。我们的深度学习方法提出了一种原则性方法，可以根据活性物质连续介质模型中的流场数据来处理模型推理和选择问题。", "authors": [{"name": "Aditya Mohapatra"}, {"name": "Sagarika Adhikary"}, {"name": "Rajesh Singh"}], "featured_authors": [{"name": "Aditya Mohapatra"}, {"name": "Sagarika Adhikary"}, {"name": "Rajesh Singh"}], "author_count": 3}, {"id": "2607.20117", "category": "cond-mat", "title": "Frequency-dependent electron-phonon coupling and vibrational responses in tight-binding and continuous Dirac models with nuclear velocity correction", "abstract": "The nuclear motion induces in the electronic atomic orbitals a nuclear-velocity-dependent phase (also known as electron-translation factor), which modifies the effective Hamiltonians constructed from localised atomic orbitals. In this work, using an Ehrenfest Lagrangian approach for the localised atomic orbitals (LCAO) and tight-binding methods, we determine, at any order in the nuclear velocity, the equations of motion and the vibrational responses within a linear response formalism, focusing on the tight-binding assessment of the Born effective charges and the force-constant matrix. The appearance of nuclear-velocity-dependent Peierls-like phases in the non-local part of the interactions restores the all-electron sum rules for frequency-dependent vibrational responses. In tight-binding models these corrections crucially modify the vibrational response from a qualitative point of view, also yielding contributions required to capture phenomena such as vibrational circular dichroism. We test these corrections in the tight-binding model for metallic gapped graphene - finding excellent agreement with \\textit{ab initio} calculations - and for the topological time-reversal symmetry breaking Haldane model.", "url": "https://arxiv.org/abs/2607.20117", "type": "理论+数值", "summary": "核运动在电子原子轨道中引起核速度相关的相位（也称为电子平移因子），它修改了从局域原子轨道构造的有效哈密顿量。在这项工作中，我们使用局域原子轨道（LCAO）的埃伦费斯特拉格朗日方法和紧束缚方法，确定了任意阶核速度的线性响应形式中的运动方程和振动响应，重点关注玻恩有效电荷和力常数矩阵的紧束缚评估。相互作用的非局部部分中依赖于核速度的 Peierls 类相的出现恢复了依赖于频率的振动响应的全电子和规则。在紧束缚模型中，这些修正从定性的角度至关重要地改变了振动响应，也产生了捕捉振动圆二色性等现象所需的贡献。\n\n我们在金属带隙石墨烯的紧束缚模型中测试了这些修正 - 发现与 \\textit{ab initio} 计算非常一致 - 以及拓扑时间反转对称性破坏 Haldane 模型的修正。", "authors": [{"name": "Paolo Fachin"}, {"name": "Francesco Macheda"}, {"name": "Paolo Barone"}, {"name": "Francesco Mauri"}], "featured_authors": [{"name": "Paolo Fachin"}, {"name": "Francesco Macheda"}, {"name": "Paolo Barone"}, {"name": "Francesco Mauri"}], "author_count": 4}, {"id": "2607.20122", "category": "cond-mat", "title": "Let's Stalk About Membranes: Committor-Based Enhanced Sampling of Stalk Formation", "abstract": "Membrane fusion is essential for cellular communication and function, and understanding how two lipid bilayers merge is key to informing therapeutic strategies. Functionalized nanoparticles have recently emerged as synthetic fusogens, but the molecular mechanisms driving this process remain unclear, partly because fusion involves transitions over high free-energy barriers, difficult to capture in molecular simulations. While enhanced sampling methods can address this problem, they also rely on the definition of collective variables, which are especially hard to define for fusion, as it arises from the collective rearrangement of many molecules and cannot be easily reduced to a simple intuitive coordinate. Here, we study stalk formation, the first step of fusion, mediated by an amphiphilic gold nanoparticle, by employing an enhanced sampling strategy based on the committor function, machine-learned through a self-consistent procedure. This method requires minimal prior knowledge of the system and leverages the learned committor function as an effective collective variable, enabling uniform sampling of the entire pathway. From the resulting reactive trajectories and extensive transition region sampling, we obtain converged free-energy estimates and mechanistic insight into stalk formation.", "url": "https://arxiv.org/abs/2607.20122", "type": "数值", "summary": "膜融合对于细胞通讯和功能至关重要，了解两个脂质双层如何合并是制定治疗策略的关键。功能化纳米粒子最近作为合成融合剂出现，但驱动这一过程的分子机制仍不清楚，部分原因是融合涉及高自由能势垒的转变，这在分子模拟中很难捕获。虽然增强采样方法可以解决这个问题，但它们也依赖于集体变量的定义，而集体变量的定义对于融合来说尤其困难，因为它是由许多分子的集体重排产生的，并且不能轻易地简化为简单的直观坐标。在这里，我们研究了茎的形成，这是融合的第一步，由两亲性金纳米颗粒介导，采用基于提交函数的增强采样策略，通过自洽程序进行机器学习。该方法需要最少的系统先验知识，并利用学习到的提交者功能作为有效的集体变量，从而实现整个路径的统一采样。\n\n从由此产生的反应轨迹和广泛的过渡区域采样，我们获得了收敛的自由能估计和对茎形成的机制洞察。", "authors": [{"name": "Giorgia Rossi"}, {"name": "Enrico Trizio"}, {"name": "Davide Bochicchio"}, {"name": "Giulia Rossi"}, {"name": "Michele Parrinello"}], "featured_authors": [{"name": "Giorgia Rossi"}, {"name": "Enrico Trizio"}, {"name": "Davide Bochicchio"}, {"name": "Giulia Rossi"}, {"name": "Michele Parrinello"}], "author_count": 5}, {"id": "2607.20134", "category": "cond-mat", "title": "Derivation of the Boltzmann equation with no \"molecular chaos\"-type approximation", "abstract": "The paper resolves the problem of the derivation of a completely closed evolution equation for $s$-particle distribution function $F_s(t)$ ($s \\le N$) from the Liouville equation for $N \\gg 1$-particle distribution function $F_N(t)$ with arbitrary initial condition $F_N(0)$ and without any use of the \"molecular chaos\" type approximation. The initial correlations are accounted for in this equation in the kernel governing the evolution of $F_s(t)$ via the special projection operator which exactly transforms the inhomogeneous Nakajima-Zwanzig Generalized Master Equation (GME) with an irrelevant initial condition term into the homogenous one. This equation is further simplified by presenting its kernel in the linear in the particles' density $n$ approximation. In this approximation the equations for one-particle $F_1(t)$ and two-particle $F_2(t)$ distribution functions are derived. It is shown that the terms describing the influence of initial correlations in the equation for $F_1(t)$ disappear at the large timescale $t \\sim t_{\\text{rel}} \\gg t_{\\text{cor}}$ ($t_{\\text{cor}}$ is a short correlation time as compared to a relaxation time $t_{\\text{rel}}$ of $F_1(t)$) resulting in the linear Boltzmann equation. This equation can be presented as the nonlinear Boltzmann equation in the time interval $t_{\\text{cor}} \\ll t \\ll t_{\\text{rel}}$. At $t_{\\text{rel}} \\to \\infty$ (mean free path $l \\to \\infty$) the Boltzmann equation holds for all finite times $t \\gg t_{\\text{cor}}$.", "url": "https://arxiv.org/abs/2607.20134", "type": "理论", "summary": "本文解决了从$N \\gg 1$-粒子分布函数$F_N(t)$的Liouville方程推导$s$-粒子分布函数$F_s(t)$ ($s \\le N$)的完全封闭演化方程的问题，其中任意初始条件$F_N(0)$并且不使用任何“分子混沌”型近似。该方程中的初始相关性通过特殊的投影算子来控制 $F_s(t)$ 的演化，该算子将具有不相关初始条件项的非齐次 Nakajima-Zwanzig 广义主方程 (GME) 精确地转换为齐次方程。通过以粒子密度 $n$ 近似的线性形式呈现其内核，进一步简化了该方程。在此近似中，导出了单粒子 $F_1(t)$ 和双粒子 $F_2(t)$ 分布函数的方程。\n\n结果表明，$F_1(t)$ 方程中描述初始相关性影响的项在大时间尺度 $t \\sim t_{\\text{rel}} \\gg t_{\\text{cor}}$ 下消失（与 $F_1(t)$ 的弛豫时间 $t_{\\text{rel}}$ 相比，$t_{\\text{cor}}$ 是较短的相关时间），从而产生线性玻尔兹曼方程。该方程可以表示为时间间隔 $t_{\\text{cor}} \\ll t \\ll t_{\\text{rel}}$ 内的非线性玻尔兹曼方程。在 $t_{\\text{rel}} \\to \\infty$（平均自由程 $l \\to \\infty$）处，玻尔兹曼方程对于所有有限时间 $t \\gg t_{\\text{cor}}$ 成立。", "authors": [{"name": "Victor F. Los"}], "featured_authors": [{"name": "Victor F. Los"}], "author_count": 1}, {"id": "2607.20217", "category": "cond-mat", "title": "A Theoretical Framework for the Coupling of Macroscale-Nanoscale Mechanochemical Phenomena in Condensed Matter", "abstract": "The field of covalent mechanochemistry has transitioned from fundamental science to engineering applications, yet it lacks a robust theoretical framework for predicting reaction kinetics in condensed matter. Existing analytical models fail under realistic conditions where macroscopic strains drive molecular-scale deformations that are highly non-linear. We develop a non-perturbative theoretical framework that captures activation barrier changes in highly strained molecules undergoing complex, non-linear deformations, describing the macroscale-nanoscale coupling of phenomena. The framework yields general expressions, parameterizable from atomistic simulations, enabling multiscale prediction of mechanochemical behavior. By presenting the expressions in terms of general observables, this work enables predictions of mechanochemical effects from simple structure optimization calculations, enabling the use of high level quantum chemical methods. We demonstrate this approach on the mechanochromic polymer spiropyran, showing how non-linear strain fields govern mechanophore activation.", "url": "https://arxiv.org/abs/2607.20217", "type": "理论+数值", "summary": "共价机械化学领域已经从基础科学过渡到工程应用，但缺乏可靠的理论框架来预测凝聚态反应动力学。现有的分析模型在宏观应变驱动高度非线性的分子尺度变形的现实条件下会失败。我们开发了一种非微扰理论框架，可以捕获经历复杂非线性变形的高应变分子中的激活势垒变化，描述现象的宏观尺度-纳米尺度耦合。该框架产生一般表达式，可通过原子模拟进行参数化，从而实现机械化学行为的多尺度预测。通过提出一般可观测量的表达式，这项工作可以通过简单的结构优化计算来预测机械化学效应，从而可以使用高级量子化学方法。我们在力致变色聚合物螺吡喃上演示了这种方法，展示了非线性应变场如何控制力力团激活。", "authors": [{"name": "Brenden W Hamilton"}], "featured_authors": [{"name": "Brenden W Hamilton"}], "author_count": 1}, {"id": "2607.20240", "category": "cond-mat", "title": "Role of Resonant $\\mathbf{k}$-Points in the Transient Optical Response of Pumped Germanium", "abstract": "Pump-induced transient optical properties combine contributions from electronic states throughout the Brillouin zone, but the relative relevance of off-resonant and l-photon resonant crystal momenta has remained unexplored. We address this issue in pumped germanium by resolving the transient absorptive response into momentum-space classes defined by the presence or absence of 1-, 2-, and 3-photon resonances with respect to the pump. Using the Dynamical Projective Operatorial Approach together with the related generalized linear response theory, we compute the differential imaginary part of the dielectric function and evaluate the contributions of each resonance class. Resonant regions account for nearly the entire optical response, whereas points outside the identified resonance sets contribute only negligibly. Nevertheless, the 2-photon-resonant set, although containing more than 98% of the residual (post-pump) excitation population, does not reproduce the full transient spectrum. Conversely, resonance classes with very small residual populations generate non-negligible contributions to the transient optical properties. This mismatch shows that the transient optical weight is not determined solely by the real-charge dynamics (which results in post-pulse residual excitation population) and is consistent with substantial virtual pump-induced contributions, whose dominant optical weight nevertheless arises from the resonant regions of momentum space. The class-resolved phase of the dominant 2$\\omega_{\\mathrm{pu}}$ oscillations further shows that, whenever a class contributes appreciably, the phase of its oscillatory component follows that of the corresponding full signal. The resulting decomposition provides a momentum-resolved connection among multi-photon resonances and transient optical observables in a realistic material.", "url": "https://arxiv.org/abs/2607.20240", "type": "理论+数值", "summary": "泵浦引起的瞬态光学特性结合了整个布里渊区电子态的贡献，但非共振和 l 光子共振晶体动量的相对相关性仍未得到探索。我们通过将瞬态吸收响应解析为由相对于泵浦是否存在 1、2 和 3 光子共振定义的动量空间类别来解决泵浦锗中的这个问题。使用动态投影算子方法和相关的广义线性响应理论，我们计算介电函数的微分虚部并评估每个共振类别的贡献。共振区域几乎占整个光学响应，而识别的共振组之外的点的贡献可以忽略不计。然而，2 光子共振组虽然包含超过 98% 的剩余（泵浦后）激发群体，但无法再现完整的瞬态光谱。相反，具有非常小的残余群体的共振类别对瞬态光学特性产生不可忽略的贡献。\n\n这种不匹配表明瞬态光学权重不仅仅由真实电荷动力学（这导致脉冲后残余激发布居）决定，并且与大量虚拟泵浦引起的贡献一致，其主要光学权重仍然来自动量空间的共振区域。主要 2$\\omega_{\\mathrm{pu}}$ 振荡的类别解析相位进一步表明，只要类别有明显贡献，其振荡分量的相位就会跟随相应的完整信号的相位。由此产生的分解提供了现实材料中多光子共振和瞬态光学可观测量之间的动量分辨连接。", "authors": [{"name": "Amir Eskandari-asl"}, {"name": "Giacomo Inzani"}, {"name": "Matteo Lucchini"}, {"name": "Adolfo Avella"}], "featured_authors": [{"name": "Amir Eskandari-asl"}, {"name": "Giacomo Inzani"}, {"name": "Matteo Lucchini"}, {"name": "Adolfo Avella"}], "author_count": 4}, {"id": "2607.20243", "category": "cond-mat", "title": "Dynamical Criticality of a Machine-learning-assisted Monte Carlo algorithm for a Mean-Field Spin Glass model", "abstract": "We critically assess the performance of an autoregressive generative neural network model by applying it to an antiferromagnetic Ising model on a random regular graph. We train the network on equilibrium configurations in the low-temperature spin-glass phase of the model and perform Monte Carlo simulations using spin configurations generated by the network. The relaxation time of the Monte Carlo simulations drastically decreases with increasing the size of the training dataset and converges to an optimal value. The dynamical exponent characterizing the growth of the optimal relaxation time as a function of the system size is slightly reduced compared to the local Monte Carlo dynamics. However, we find that the size of the training dataset to achieve the optimal performance grows much faster with the system size than the relaxation time, implying that the total training cost eventually hinders a practical use of the method at large system sizes.", "url": "https://arxiv.org/abs/2607.20243", "type": "理论+数值", "summary": "我们通过将自回归生成神经网络模型应用于随机正则图上的反铁磁伊辛模型来严格评估其性能。我们在模型的低温自旋玻璃相的平衡配置上训练网络，并使用网络生成的自旋配置执行蒙特卡洛模拟。蒙特卡洛模拟的松弛时间随着训练数据集大小的增加而急剧减少，并收敛到最佳值。与局部蒙特卡罗动力学相比，表征最佳弛豫时间增长作为系统尺寸函数的动态指数略有减小。然而，我们发现，为了实现最佳性能，训练数据集的大小随着系统规模的增大而增长得比松弛时间快得多，这意味着总训练成本最终会阻碍该方法在大型系统规模上的实际使用。", "authors": [{"name": "Seiya Miyamoto"}, {"name": "Masayuki Ohzeki"}, {"name": "Yoshihiko Nishikawa"}], "featured_authors": [{"name": "Seiya Miyamoto"}, {"name": "Masayuki Ohzeki"}, {"name": "Yoshihiko Nishikawa"}], "author_count": 3}, {"id": "2607.20261", "category": "cond-mat", "title": "Coherence-driven origin of metamagnetism in anisotropic heavy-fermion systems", "abstract": "A number of heavy-fermion materials exhibit magnetic field-induced metamagnetism: on applying a field along the magnetic hard axis, the magnetization first rises gradually, then jumps abruptly once a critical field is reached. Despite decades of phenomenological modeling, the microscopic origin of the pronounced magnetic anisotropy underlying this behavior has remained unresolved. The same is true of a related, long-standing puzzle: an anomalous maximum in the hard-axis susceptibility versus temperature. Both are complicated in $5f$ compounds by the dual localized-itinerant character of the relevant electrons. Here we develop an analytic $c$--$f$ theory of magnetic anisotropy in heavy-fermion metamagnets, identifying the mixed susceptibility $\\chi_{\\rm cf}(T,h,p)$ as a single thermodynamic observable that unifies the anisotropic response across temperature, field, and pressure. We test this theory against primary and literature data for the heavy-fermion superconductor UTe$_2$, finding excellent quantitative agreement in the temperature, field, and pressure evolution of its magnetic anisotropy -- including a Kondo-coherence origin for the anomalous hard-axis susceptibility maximum, which we show is directly connected to the metamagnetic transition itself. Our results establish a general, microscopic, coherence-driven framework for anisotropic metamagnetism, applicable across the broad class of heavy-fermion compounds that display this phenomenology.", "url": "https://arxiv.org/abs/2607.20261", "type": "理论+数值", "summary": "许多重费米子材料表现出磁场诱发的亚磁性：沿磁难轴施加磁场时，磁化强度首先逐渐上升，然后在达到临界场时突然跳跃。尽管进行了数十年的现象学建模，但这种行为背后明显的磁各向异性的微观起源仍未得到解决。一个相关的、长期存在的难题也是如此：硬轴磁化率与温度的异常最大值。由于相关电子的双重定域流动特性，两者在 $5f$ 化合物中都很复杂。在这里，我们开发了重费米子超磁体中磁各向异性的解析 $c$--$f$ 理论，将混合磁化率 $\\chi_{\\rm cf}(T,h,p)$ 识别为单个热力学可观测量，统一了温度、场和压力的各向异性响应。\n\n我们根据重费米子超导体 UTe$_2$ 的原始数据和文献数据测试了这一理论，发现其磁各向异性的温度、场和压力演化具有极好的定量一致性——包括异常硬轴磁化率最大值的近藤相干起源，我们证明它与变磁转变本身直接相关。我们的结果为各向异性元磁性建立了一个通用的、微观的、相干驱动的框架，适用于表现出这种现象的一类重费米子化合物。", "authors": [{"name": "Ewan Scott"}, {"name": "Zheyu Wu"}, {"name": "Theodore I. Weinberger"}, {"name": "Alexander G. Eaton"}, {"name": "Michal P. Kwasigroch"}], "featured_authors": [{"name": "Ewan Scott"}, {"name": "Zheyu Wu"}, {"name": "Theodore I. Weinberger"}, {"name": "Alexander G. Eaton"}, {"name": "Michal P. Kwasigroch"}], "author_count": 5}, {"id": "2607.20279", "category": "cond-mat", "title": "Random walks in Dirichlet random environment in dimension $d+1$", "abstract": "The atypical behaviour of random walks in time-dependent random environment was recently related to Kardar-Parisi-Zhang (KPZ) growth. While this is now well-understood in spatial dimension $d=1$, further efforts are necessary to better understand these connections in dimensions $d>1$. In this paper, we study this problem numerically for $d=1, 2$ and $3$, focusing on a discrete model with Dirichlet distributed transition probabilities. This model is a generalization of an integrable model in $d=1$, and it has the advantage of admitting an explicit, product-form, stationary measure. We verify that the growth of the variance of the logarithm of point-to-point probabilities, namely from the origin to position $x$ in time $t$, is compatible with KPZ growth in dimension $d=1$ and $d=2$. In spatial dimension $d=3$, we confirm the existence of a phase transition as the angle $\\vert x\\vert /t$ increases and we obtain a lower bound based on an exact second moment calculation. We find that in the weak disorder phase the point-to-point probability acquires a heavy tailed distribution, and that in the strong disorder phase the cumulants of its logarithm grow with time. Further, we show that for this model, we can compute exactly the sample to sample variance of the thermal average $\\overline{ \\langle x \\rangle^2}$ and that it is related to the extreme diffusion coefficient introduced recently.", "url": "https://arxiv.org/abs/2607.20279", "type": "理论+数值", "summary": "时间相关随机环境中随机游走的非典型行为最近与 Kardar-Parisi-Zhang (KPZ) 增长有关。虽然现在在空间维度 $d=1$ 中已经很好地理解了这一点，但还需要进一步努力才能更好地理解维度 $d>1$ 中的这些联系。在本文中，我们在 $d=1、2$ 和 $3$ 的情况下对这个问题进行数值研究，重点关注具有狄利克雷分布转移概率的离散模型。该模型是 $d=1$ 中可积模型的推广，它的优点是接受显式的、乘积形式的、平稳的测度。我们验证了点对点概率对数方差的增长，即在时间 $t$ 内从原点到位置 $x$，与维度 $d=1$ 和 $d=2$ 上的 KPZ 增长兼容。在空间维度 $d=3$ 中，随着角度 $\\vert x\\vert /t$ 的增加，我们确认了相变的存在，并根据精确的二阶矩计算获得了下界。我们发现，在弱无序阶段，点对点概率呈现重尾分布，而在强无序阶段，其对数累积量随时间增长。\n\n此外，我们表明，对于该模型，我们可以精确计算热平均值 $\\overline{ \\langle x \\rangle^2}$ 的样本间方差，并且它与最近引入的极端扩散系数有关。", "authors": [{"name": "Guillaume Barraquand"}, {"name": "Alexander K. Hartmann"}, {"name": "Pierre Le Doussal"}], "featured_authors": [{"name": "Guillaume Barraquand"}, {"name": "Alexander K. Hartmann"}, {"name": "Pierre Le Doussal"}], "author_count": 3}, {"id": "2607.20283", "category": "cond-mat", "title": "Angular Momentum Quantization of a Charge-flux Composite: Quantum Electrodynamic Approach", "abstract": "The fractional angular momentum of a two-dimensional charge-flux composite is a well-established phenomenon usually derived from a semiclassical Hamiltonian. However, when the composite is treated as an isolated system in free two-dimensional space, the fundamental rotational and reflection symmetries of the $O(2)$ group demand that its total angular momentum is strictly quantized. We address this conceptual discrepancy by applying a full quantum electrodynamic (QED) approach combined with Noether's theorem. We demonstrate that the interaction between the charge and flux, mediated by the vacuum electromagnetic field, generates an intrinsic interaction angular momentum composed of both field momentum and hidden relativistic momentum. This gauge-invariant interaction angular momentum exactly compensates for the fractional part of the kinetic angular momentum. Consequently, the net angular momentum of the composite strictly follows the integer or half-integer quantization rule. Our formalism clarifies that the conventional fractional spin corresponds to the expectation value of the kinetic angular momentum within the perturbed QED ground state. It also elucidates why the standard classical field angular momentum definition fails to capture this in two dimensions, due to non-vanishing boundary terms.", "url": "https://arxiv.org/abs/2607.20283", "type": "理论", "summary": "二维电荷通量复合材料的分数角动量是一种公认​​的现象，通常源自半经典哈密顿量。然而，当复合材料被视为自由二维空间中的孤立系统时，$O(2)$群的基本旋转和反射对称性要求其总角动量被严格量化。我们通过应用完整的量子电动力学（QED）方法与诺特定理相结合来解决这个概念上的差异。我们证明，由真空电磁场介导的电荷和通量之间的相互作用产生由场动量和隐藏的相对论动量组成的内在相互作用角动量。这种规范不变的相互作用角动量恰好补偿了动角动量的小数部分。因此，复合材料的净角动量严格遵循整数或半整数量化规则。我们的形式表明，传统的分数自旋对应于扰动 QED 基态内动角动量的期望值。\n\n它还阐明了为什么由于边界项不为零，标准经典场角动量定义无法在二维中捕获这一点。", "authors": [{"name": "Kicheon Kang"}], "featured_authors": [{"name": "Kicheon Kang"}], "author_count": 1}, {"id": "2607.20403", "category": "cond-mat", "title": "Exact static exchange benchmark for the uniform electron gas: Dynamic-kernel tests and exchange-correlation cancellation near 2kF", "abstract": "The static local field factors of the uniform electron gas are known accurately from quantum Monte Carlo (QMC) calculations, but two of their most striking features have lacked a mechanism: $G_+$ grows almost exactly as $q^2$ up to nearly $2k_F$, and the violent $2k_F$ physics of the Fermi surface leaves only a faint trace in it. Combining the textbook first-order local-field relation with the exact static exchange polarizability gives a compact exact benchmark: the universal exchange-only local field factor $G_x(q,0) = -I(Q)Q^2/L(Q)^2$, $Q = q/2k_F$, with exact values $(1/4)(q/k_F)^2$ at small $q$, $\\pi^2/6$ at $2k_F$ -- apparently never before stated as a local-field value -- and $1/3$ at large $q$, giving the exchange-only spin-averaged contact value $g(0) = 1/2$ of the unpolarized gas (BDL 1977). $G_x$ rises to a finite maximum of 1.992
