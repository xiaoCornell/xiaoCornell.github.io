Guo"}, {"name": "Brian Swingle"}], "author_count": 2}, {"id": "2604.19929", "category": "cond-mat", "title": "Topological Edge States Emerging from Twisted Moiré Bands", "abstract": "We study twisted bilayer WSe$_2$ within a continuum moiré model and introduce a method for treating finite geometries directly in the continuum framework, overcoming limitations associated with momentum-space formulations and Wannier obstructions. By projecting a confinement potential onto bulk moiré eigenstates, we obtain a real-space description of edge physics without lattice models. Applying this approach to nanoribbons, we demonstrate chiral edge modes consistent with bulk Chern numbers and reveal their moiré-scale character. In the magic-angle regime, these states are strongly localized, exhibit layer-polarized counter-propagating modes, and are electrically tunable via a displacement field, enabling control of localization, hybridization, and topological transitions. Our results establish a general framework for boundary physics in topological moiré materials.", "url": "https://arxiv.org/abs/2604.19929", "type": "理论", "summary": "我们研究了连续谱莫尔模型中的扭曲双层 WSe$_2$，并引入了一种直接在连续谱框架中处理有限几何形状的方法，克服了与动量空间公式和 Wannier 障碍相关的限制。通过将限制势投影到块状莫尔本征态上，我们无需晶格模型即可获得边缘物理的实空间描述。将这种方法应用于纳米带，我们证明了与大量陈数一致的手性边缘模式，并揭示了它们的莫尔尺度特征。在魔角状态下，这些状态是强烈局域化的，表现出层偏振反向传播模式，并且可以通过位移场进行电调谐，从而能够控制局域化、杂化和拓扑转变。我们的结果为拓扑莫尔材料中的边界物理建立了通用框架。", "authors": [{"name": "Yasser Saleem"}, {"name": "Paweł Potasz"}, {"name": "Anna Dyrdał"}, {"name": "Björn Trauzettel"}, {"name": "Ewelina M. Hankiewicz"}], "featured_authors": [{"name": "Yasser Saleem"}, {"name": "Paweł Potasz"}, {"name": "Anna Dyrdał"}, {"name": "Björn Trauzettel"}, {"name": "Ewelina M. Hankiewicz"}], "author_count": 5}, {"id": "2604.19964", "category": "cond-mat", "title": "Nudged Elastic Membranes for Constructing Reduced Two-Dimensional Potential Energy Surfaces", "abstract": "Path optimization methods have been widely used and highly successful for the analysis of chemical reactions. Yet, they can fail to capture intrinsically multidimensional features of potential energy surfaces (PES). We introduce the nudged elastic membrane method, a framework for constructing two-dimensional reduced potential-energy surfaces in chemically relevant regions of a PES using only energies and forces without requiring more costly Hessian information. The method is demonstrated for a three-dimensional prototype model and for the triplet formaldehyde molecular system. In both cases, the resulting membrane captures one-dimensional reaction-path features as well as genuinely two-dimensional structures such as a yet unreported reported second-order saddle point in the PES of triplet formaldehyde. The method further provides direct access to structures that can serve as starting points for subsequent refinement. Our results show that the method offers a practical route to exploring multidimensional PES topography beyond the single-path picture.", "url": "https://arxiv.org/abs/2604.19964", "type": "理论+数值", "summary": "路径优化方法在化学反应分析中已被广泛使用且非常成功。然而，它们可能无法捕获势能表面（PES）本质上的多维特征。我们引入了微推弹性膜方法，这是一种仅使用能量和力在 PES 的化学相关区域构建二维降低势能表面的框架，而不需要更昂贵的 Hessian 信息。该方法针对三维原型模型和三重态甲醛分子系统进行了演示。在这两种情况下，所得的膜都捕获了一维反应路径特征以及真正的二维结构，例如三重态甲醛的 PES 中尚未报道的二阶鞍点。该方法还提供对结构的直接访问，这些结构可以作为后续细化的起点。我们的结果表明，该方法为探索单路径图像之外的多维 PES 地形提供了一条实用途径。", "authors": [{"name": "Uday Sankar Manoj"}, {"name": "Nicole Drew"}, {"name": "Ismaila Dabo"}, {"name": "Lukas Muechler"}], "featured_authors": [{"name": "Uday Sankar Manoj"}, {"name": "Nicole Drew"}, {"name": "Ismaila Dabo"}, {"name": "Lukas Muechler"}], "author_count": 4}, {"id": "2604.20002", "category": "cond-mat", "title": "multisphere: a Python implementation of the Multi Sphere Shape generator (MSS) for DEM simulations", "abstract": "multisphere is an open-source Python package for generating multi-sphere representations of complex particles for use in DEM simulations. It reconstructs triangulated surface meshes and voxelized volumes as sets of intersecting spheres and provides tools for evaluation, visualization, and export.", "url": "https://arxiv.org/abs/2604.20002", "type": "数值", "summary": "multisphere 是一个开源 Python 包，用于生成复杂粒子的多球体表示，以用于 DEM 模拟。它将三角表面网格和体素化体积重建为相交球体集，并提供用于评估、可视化和导出的工具。", "authors": [{"name": "Felix Buchele"}, {"name": "Patric Müller"}, {"name": "Thorsten Pöschel"}], "featured_authors": [{"name": "Felix Buchele"}, {"name": "Patric Müller"}, {"name": "Thorsten Pöschel"}], "author_count": 3}, {"id": "2604.20064", "category": "cond-mat", "title": "Symmetry-dictated switching of antiferromagnetic magnon transport in 2D multiferroics", "abstract": "While antiferromagnetic magnons in two-dimensional (2D) materials hold immense promise for high-frequency spintronics, achieving their efficient active control remains a critical challenge. Here, we propose a universal mechanism for the nonvolatile ferroelectric (FE) switching of antiferromagnetic magnon transport in 2D multiferroic lattices. Our mechanism relies on coupling the magnon geometric phase to the FE-induced sublattice asymmetry in exchange and Dzyaloshinskii-Moriya interactions. This explicitly breaks the exact compensation of opposite-chirality magnons inherent to collinear antiferromagnets, lifting their spin degeneracy and inducing a highly tunable net Berry curvature. Crucially, reversing the FE polarization deterministically swaps these magnetic asymmetries, which completely inverts the net magnon Berry curvature and the resulting anomalous thermal Hall conductivity. Using first-principles and linear spin-wave theory, we rigorously validate this geometric-phase-driven mechanism in single-layer CuCr2Se4. Our findings establish a robust paradigm for coupling multiferroicity with the magnon geometric phase, paving the way for nonvolatile and electrically switchable antiferromagnetic magnonics.", "url": "https://arxiv.org/abs/2604.20064", "type": "理论", "summary": "虽然二维 (2D) 材料中的反铁磁磁振子在高频自旋电子学方面具有巨大的前景，但实现其有效的主动控制仍然是一个关键挑战。在这里，我们提出了一种通用机制，用于二维多铁晶格中反铁磁磁振子输运的非易失性铁电（FE）切换。我们的机制依赖于将磁振子几何相位与有限元引起的交换和 Dzyaloshinskii-Moriya 相互作用中的亚晶格不对称性耦合。这明显打破了共线反铁磁体固有的相反手性磁振子的精确补偿，提高了它们的自旋简并性并诱导了高度可调的净贝里曲率。至关重要的是，反转有限元极化可以确定性地交换这些磁不对称性，从而完全反转净磁振子贝里曲率以及由此产生的异常热霍尔电导率。利用第一性原理和线性自旋波理论，我们严格验证了单层 CuCr2Se4 中的这种几何相驱动机制。\n\n我们的研究结果建立了一个将多铁性与磁振子几何相位耦合的强大范例，为非易失性和电可切换的反铁磁磁振子铺平了道路。", "authors": [{"name": "Yibo Liu"}, {"name": "Jiale Wang"}, {"name": "Jiexiang Wang"}, {"name": "Ying Dai"}, {"name": "Baibiao Huang"}, {"name": "Xinru Li"}, {"name": "Yandong Ma"}], "featured_authors": [{"name": "Yibo Liu"}, {"name": "Jiale Wang"}, {"name": "Jiexiang Wang"}, {"name": "Baibiao Huang"}, {"name": "Xinru Li"}, {"name": "Yandong Ma"}], "author_count": 7}, {"id": "2604.20089", "category": "cond-mat", "title": "Critical Activation Voltage for Phonon-Mediated Field-Driven Phenomena", "abstract": "Field-driven phenomena, from flash sintering to electromigration, exhibit threshold fields spanning six orders of magnitude. We show their product with the onset activation coherence length is a universal critical activation voltage, Vc =0.1-2.7 V. Vc represents the threshold electrical work required to resonantly couple to the universal phonon damping peak where lattice softening is maximized. This invariant unifies macroscopic thermal instabilities with the nanoscale Blech limit, establishing a universal phenomenological law for field-lattice coupling across 17 crystal families", "url": "https://arxiv.org/abs/2604.20089", "type": "理论", "summary": "从闪速烧结到电迁移的场驱动现象表现出跨越六个数量级的阈值场。我们展示了他们的乘积与起始激活相干长度是通用临界激活电压，Vc = 0.1-2.7 V。Vc 表示谐振耦合到晶格软化最大化的通用声子阻尼峰所需的阈值电功。这一不变量将宏观热不稳定性与纳米级 Blech 极限统一起来，为 17 个晶体家族的场-晶格耦合建立了通用唯象定律", "authors": [{"name": "Ric Fulop"}, {"name": "Neil Gershenfeld"}], "featured_authors": [{"name": "Ric Fulop"}, {"name": "Neil Gershenfeld"}], "author_count": 2}, {"id": "2604.20102", "category": "cond-mat", "title": "Unjamming in a 3D Granular System: The Micromechanical Role of Friction in Force Distributions and Rheological Properties", "abstract": "In this work, we investigate the unjamming transition in a three-dimensional granular system composed of frictional spheres, in which the packing fraction is systematically reduced by random particle extractions. Using Discrete Element Method (DEM) simulations, we analyze the evolution of key micro-mechanical quantities, such as the interparticle forces, the coordination number and the overall packing density as a function of the interparticle friction coefficient. Our results reveal friction-dependent relationships on structural as well as mechanical observables, and exhibit trends that are qualitatively consistent with observations reported in dense granular systems. These trends persist despite the very different driving mechanism considered here. This paper is part of the thematic issue \\emph{``Sand, silos and asteroids: clustering challenges in granular materials research''}.", "url": "https://arxiv.org/abs/2604.20102", "type": "数值", "summary": "在这项工作中，我们研究了由摩擦球组成的三维颗粒系统中的无干扰过渡，其中通过随机颗粒提取系统地减少了堆积分数。使用离散元法 (DEM) 模拟，我们分析了关键微观机械量的演变，例如颗粒间力、配位数和总体堆积密度作为颗粒间摩擦系数的函数。我们的结果揭示了结构和机械可观测值的摩擦相关关系，并表现出与致密颗粒系统中报告的观测结果定性一致的趋势。尽管这里考虑了非常不同的驱动机制，但这些趋势仍然存在。本文是专题 \\emph{``沙子、筒仓和小行星：粒状材料研究中的聚类挑战''} 的一部分。", "authors": [{"name": "Vicente Salinas"}, {"name": "Héctor Alarcón"}, {"name": "Eduardo Rojas"}, {"name": "Pablo Gutiérrez"}, {"name": "Gustavo Castillo"}], "featured_authors": [{"name": "Vicente Salinas"}, {"name": "Héctor Alarcón"}, {"name": "Eduardo Rojas"}, {"name": "Pablo Gutiérrez"}, {"name": "Gustavo Castillo"}], "author_count": 5}, {"id": "2604.20164", "category": "cond-mat", "title": "Light-Induced Topological Phase Transitions and Anomalous Thermal Transport in d-Wave Altermagnets", "abstract": "We study intrinsic thermal transport and Floquet-engineered topology in a two-dimensional d wave altermagnetic topological insulator powered by linearly polarized light. We analyze the anomalous Hall, Nernst, and thermal Hall conductivities, as well as their spin-resolved equivalents, and develop closed-form formulas for the Berry curvature using an analytically calculated high-frequency effective Hamiltonian. We demonstrate that linearly polarized light, in contrast to conventional antiferromagnets, breaks the symmetry connecting spin sectors in altermagnets, allowing a series of spin-selective topological phase transitions from a quantum spin Hall state to a spin-polarized Chern insulator and finally to a trivial phase. The Nernst response shows substantial thermal activation and significant sensitivity to the gap size in the Chern domain, but both the electrical and thermal Hall responses become quantized and meet the anomalous Wiedemann Franz law. Every anomalous transport coefficient exhibits a distinctive d wave dependence on the polarization angle, reversing sign under orthogonal rotation and vanishing at symmetry-restoring directions. Our findings show a path to all-optical regulation of topological and caloritronic responses beyond traditional magnetic systems and establish thermal transport as a sensitive probe of altermagnetic order.", "url": "https://arxiv.org/abs/2604.20164", "type": "理论+数值", "summary": "我们研究了线性偏振光驱动的二维 d 波交磁拓扑绝缘体中的固有热传输和 Floquet 设计的拓扑。我们分析了反常霍尔电导率、能斯特电导率和热霍尔电导率，以及它们的自旋分辨等价物，并使用分析计算的高频有效哈密顿量开发了贝里曲率的封闭式公式。我们证明，与传统的反铁磁体相比，线偏振光打破了交替磁体中连接自旋扇区的对称性，允许一系列自旋选择性拓扑相变，从量子自旋霍尔态到自旋极化陈绝缘体，最后到平凡相。能斯特响应显示出大量的热激活和对陈域中间隙尺寸的显着敏感性，但电和热霍尔响应都被量子化并满足反常维德曼弗朗茨定律。每个反常输运系数都表现出对偏振角的独特 d 波依赖性，在正交旋转下反转符号并在对称恢复方向上消失。\n\n我们的研究结果展示了超越传统磁系统的拓扑和热电子响应的全光调节途径，并将热传输建立为交变磁序的敏感探针。", "authors": [{"name": "Ayesha Maryam"}, {"name": "Muzamil Shah"}, {"name": "Kashif Sabeeh"}, {"name": "Reza Asgari"}], "featured_authors": [{"name": "Ayesha Maryam"}, {"name": "Muzamil Shah"}, {"name": "Kashif Sabeeh"}, {"name": "Reza Asgari"}], "author_count": 4}, {"id": "2604.20201", "category": "cond-mat", "title": "Symmetry breaking phases and transitions in an Ising fusion category lattice model", "abstract": "An anyon-chain-like lattice model with symmetry described by the Ising fusion category is studied. Combining numerical and analytical studies, we uncover a rich phase diagram that contains three phases: a symmetric critical phase and two categorical symmetry breaking phases. The symmetric phase lies in the same universality class as the usual critical Ising model. The first symmetry-breaking phase, dubbed the \\emph{categorical ferromagnetic} phase, has the Ising fusion category fully broken and exhibits a threefold ground-state degeneracy, as expected from the generalized Landau paradigm. The other symmetry-breaking phase is analogous to a conventional antiferromagnet: it breaks lattice translation and part of the Ising fusion category, and therefore is termed the \\emph{categorical antiferromagnetic} phase. Unlike ordinary antiferromagnetic states associated with finite invertible symmetry breaking, this phase itself is critical, being described by a fourfold degenerate Ising conformal field theory. We argue more generally that antiferromagnetic states associated with broken non-invertible symmetries have a large low-energy manifold that grows exponentially in system size, due to the greater-than-one quantum dimension of domain walls. We also numerically study the transitions between the three phases. The transition between the symmetric and categorical ferromagnetic phase is described by the $c=7/10$ tricritical Ising CFT, while the transition between the symmetric and categorical antiferromagnetic phases is less understood. Our numerical data suggest that the latter transition is continuous and described by a conformal field theory with central charge $c=3/2$.", "url": "https://arxiv.org/abs/2604.20201", "type": "理论+数值", "summary": "研究了伊辛融合范畴描述的具有对称性的任意链状晶格模型。结合数值和分析研究，我们发现了一个丰富的相图，其中包含三个相：一个对称临界相和两个绝对对称破缺相。对称相与通常的临界伊辛模型属于相同的普适性类别。第一个对称破缺相被称为\\emph{分类铁磁}相，伊辛聚变范畴完全破缺，并表现出三重基态简并，正如广义朗道范式所预期的那样。另一个对称破缺相类似于传统的反铁磁体：它破坏了晶格平移和伊辛聚变范畴的一部分，因此被称为\\emph{绝对反铁磁}相。与与有限可逆对称破缺相关的普通反铁磁态不同，该相本身很关键，由四重简并伊辛共形场理论描述。\n\n我们更普遍地认为，与破缺的不可逆对称性相关的反铁磁态具有一个大的低能流形，由于畴壁的量子尺寸大于一，该流形在系统尺寸上呈指数增长。我们还对三个阶段之间的转变进行了数值研究。对称和分类铁磁相之间的转变由 $c=7/10$ 三临界 Ising CFT 描述，而对称和分类反铁磁相之间的转变则了解较少。我们的数值数据表明，后者的转变是连续的，并由中心电荷 $c=3/2$ 的共形场论描述。", "authors": [{"name": "Soumil Roychowdhury"}, {"name": "Chenjie Wang"}], "featured_authors": [{"name": "Soumil Roychowdhury"}, {"name": "Chenjie Wang"}], "author_count": 2}, {"id": "2604.20249", "category": "cond-mat", "title": "Intrinsic Magnetoelectric Hall Effect from Layer-Orbital Quantum Geometry", "abstract": "Intrinsic Hall effects, such as the anomalous Hall effect, originate from the orbital quantum geometry of Bloch states. However, in layered materials, the combined action of out-of-plane electric and magnetic fields couples to layer polarization and orbital moment, generating a mixed layer-orbital quantum geometry in field-dressed Bloch states. We show that this geometry produces an intrinsic magnetoelectric Hall effect that is bilinear in the electric and magnetic fields. The response is scattering-time independent and can arise in nonmagnetic systems without spin-orbit coupling. Its origin lies in interband coherence involving layer polarization and orbital moment, leading to a finite, non-quantized Hall response that persists in the band gap. The Hall coefficient is odd under gate reversal and tracks layer polarization. A symmetry analysis identifies the classes of layered materials that host this effect. As a representative realization, we demonstrate the effect in rhombohedral pentalayer graphene, where the conductivity reaches values of order $0.05\\,e^2/h$. These results establish mixed layer-orbital quantum geometry as a mechanism for intrinsic magnetoelectric Hall transport and a direct probe of layer-resolved quantum geometry in Bloch bands.", "url": "https://arxiv.org/abs/2604.20249", "type": "理论+数值", "summary": "本征霍尔效应，例如反常霍尔效应，源于布洛赫态的轨道量子几何。然而，在层状材料中，面外电场和磁场的联合作用与层极化和轨道矩耦合，在场修饰的布洛赫态中产生混合层轨道量子几何结构。我们证明这种几何形状会产生一种内在的磁电霍尔效应，该效应在电场和磁场中是双线性的。该响应与散射时间无关，并且可以在没有自旋轨道耦合的非磁性系统中出现。其起源在于涉及层偏振和轨道矩的带间相干性，导致带隙中持续存在的有限的、非量化的霍尔响应。栅极反转下的霍尔系数为奇数，并跟踪层偏振。对称性分析可识别具有这种效应的层状材料的类别。作为代表性的实现，我们展示了菱面体五层石墨烯的效应，其中电导率达到 $0.05\\,e^2/h$ 量级的值。\n\n这些结果建立了混合层轨道量子几何结构作为本征磁电霍尔传输的机制以及布洛赫带中层分辨量子几何结构的直接探测。", "authors": [{"name": "Sunit Das"}, {"name": "Amit Agarwal"}], "featured_authors": [{"name": "Sunit Das"}, {"name": "Amit Agarwal"}], "author_count": 2}, {"id": "2604.20251", "category": "cond-mat", "title": "Mesoscopic theory of flocking with alignment and anti-alignment copying", "abstract": "We study a stochastic model of collective motion in which individuals update their orientation through pairwise aligning or anti-aligning copying interactions. We analyze both annealed dynamics, where interaction types are chosen probabilistically at each update, and quenched dynamics, where individuals are permanently assigned to aligning or anti-aligning subpopulations. Starting from the microscopic master equation on the circle, we derive an exact mesoscopic description via a Fourier-mode expansion and a systematic large $N$ expansion, obtaining closed Fokker-Planck equations and effective stochastic differential equations for the polarization. We show that competing alignment and anti-alignment suppress long-range polar order in the thermodynamic limit in both cases, while finite systems display nontrivial fluctuation-induced structure controlled by the interaction composition. Our results, validated by Gillespie simulations, establish an analytically tractable framework for collective dynamics characterized by competing copying rules and intrinsic noise.", "url": "https://arxiv.org/abs/2604.20251", "type": "理论+数值", "summary": "我们研究了集体运动的随机模型，其中个体通过成对对齐或反对齐复制交互来更新其方向。我们分析了退火动态（在每次更新时以概率方式选择交互类型）和猝灭动态（其中个体被永久分配到对齐或反对齐子群）。从圆上的微观主方程出发，我们通过傅里叶模展开和系统大$N$展开得到精确的介观描述，获得封闭的福克-普朗克方程和有效的偏振随机微分方程。我们表明，在这两种情况下，竞争排列和反排列都会抑制热力学极限中的长程极性有序，而有限系统则显示出由相互作用组成控制的非平凡涨落引起的结构。我们的结果经吉莱斯皮模拟验证，为以竞争复制规则和内在噪声为特征的集体动力学建立了一个分析上易于处理的框架。", "authors": [{"name": "Chunming Zheng"}], "featured_authors": [{"name": "Chunming Zheng"}], "author_count": 1}, {"id": "2604.20277", "category": "cond-mat", "title": "Domain-Wall-Mediated Ultralow-Barrier Sliding and Pinning in Ferroelectric Moiré Superlattices Revealed by Machine Learning", "abstract": "Sliding ferroelectrics built from stacked nonpolar monolayers enable out-of-plane polarization and unconventional switching via interlayer sliding, yet the microscopic sliding dynamics remain unclear. Using machine-learning molecular dynamics, we reveal spontaneous thermally driven interlayer sliding in ferroelectric MoS2 moiré superlattices, with relative velocities on the order of 1 m/s at 300 K. Instead of rigid translation of the entire bilayer, the motion appears as a global drift of the moiré pattern. Such thermally driven sliding is inconsistent with the meV/atom-scale rigid-sliding barrier. In contrast, when constrained relaxation is allowed, the sliding proceeds along an almost barrierless pathway that directly reproduces the global drift of the moiré pattern. Furthermore, sulfur vacancies trigger a sliding-to-pinning transition, with about 0.1% S vacancies already sufficient to convert the long-range sliding into localized oscillations. Notably, these phenomena are not restricted to small twist angles, but arise generically in twisting-induced multidomain structures. These results reveal that the sliding process is governed by a domain-wall-mediated collective reconstruction pathway with an ultralow barrier, rather than rigid layer translation, deepening the understanding of microscopic dynamics in moiré superlattices and sliding ferroelectrics.", "url": "https://arxiv.org/abs/2604.20277", "type": "数值", "summary": "由堆叠非极性单层构建的滑动铁电体可以通过层间滑动实现面外极化和非常规切换，但微观滑动动力学仍不清楚。利用机器学习分子动力学，我们揭示了铁电 MoS2 莫尔超晶格中自发热驱动的层间滑动，在 300 K 时相对速度约为 1 m/s。该运动不是整个双层的刚性平移，而是表现为莫尔图案的全局漂移。这种热驱动滑动与兆伏/原子级刚性滑动势垒不一致。相反，当允许约束松弛时，滑动沿着几乎无障碍的路径进行，直接再现莫尔图案的全局漂移。此外，硫空位会引发滑动到钉扎的转变，大约0.1%的硫空位已经足以将长程滑动转化为局部振荡。值得注意的是，这些现象并不限于小扭转角，而是普遍出现在扭转引起的多畴结构中。\n\n这些结果表明，滑动过程是由具有超低势垒的磁畴壁介导的集体重建路径控制的，而不是刚性层平移，加深了对莫尔超晶格和滑动铁电体微观动力学的理解。", "authors": [{"name": "Jia-Wen Li"}, {"name": "Sheng Meng"}, {"name": "Xinghua Shi"}, {"name": "Jin Zhang"}, {"name": "Wei-Hai Fang"}], "featured_authors": [{"name": "Jia-Wen Li"}, {"name": "Sheng Meng"}, {"name": "Xinghua Shi"}, {"name": "Jin Zhang"}, {"name": "Wei-Hai Fang"}], "author_count": 5}, {"id": "2604.20299", "category": "cond-mat", "title": "Polymeric Solvents Control Swelling-Induced Surface Creasing", "abstract": "Surface creasing in swelling polymer gels is commonly attributed to compressive strain or interlayer mismatch, yet its general control remains unclear. Here we show that solvent polymerization degree $N_{\\rm s}$ provides an independent control parameter for crease onset in surface-bound polydimethylsiloxane gels swollen by silicone oils. Despite nearly identical swelling kinetics and through-thickness solvent concentration profiles, we observe a transition from creased to stable surfaces with increasing $N_{\\rm s}$. A theory coupling swelling thermodynamics and mechanical stability reveals that polymeric solvents reduce the mixing entropy and thereby modify the osmotic pressure, allowing $N_{\\rm s}$ to tune separately the equilibrium swelling and the crease threshold. This framework captures the stability boundary across solvent polymerization degree and network elasticity. These results identify polymeric solvents as active thermodynamic-mechanical regulators of swelling-induced surface.", "url": "https://arxiv.org/abs/2604.20299", "type": "理论", "summary": "溶胀聚合物凝胶中的表面褶皱通常归因于压缩应变或层间不匹配，但其总体控制仍不清楚。在这里，我们表明溶剂聚合度 $N_{\\rm s}$ 为硅油溶胀的表面结合聚二甲基硅氧烷凝胶中的折皱起始提供了独立的控制参数。尽管溶胀动力学和全厚度溶剂浓度分布几乎相同，但我们观察到随着 $N_{\\rm s}$ 的增加，从褶皱表面到稳定表面的转变。膨胀热力学和机械稳定性耦合的理论表明，聚合物溶剂降低了混合熵，从而改变了渗透压，允许 $N_{\\rm s}$ 分别调节平衡膨胀和折痕阈值。该框架捕获了溶剂聚合度和网络弹性的稳定性边界。这些结果表明聚合物溶剂是膨胀诱导表面的活性热力学机械调节剂。", "authors": [{"name": "Zechao Jiang"}, {"name": "Zhaoyu Ding"}, {"name": "Shaohua Yang"}, {"name": "Ye Xu"}, {"name": "Dongshi Guan"}, {"name": "Abdelhamid Maali"}, {"name": "Joshua D Mcgraw"}, {"name": "Thomas Salez"}, {"name": "Zaicheng Zhang"}, {"name": "Xingkun Man"}], "featured_authors": [{"name": "Zechao Jiang"}, {"name": "Zhaoyu Ding"}, {"name": "Shaohua Yang"}, {"name": "Thomas Salez"}, {"name": "Zaicheng Zhang"}, {"name": "Xingkun Man"}], "author_count": 10}, {"id": "2604.20355", "category": "cond-mat", "title": "Fluctuation-driven multi-step charge density wave transition in monolayer TiSe$_2$", "abstract": "The exact microscopic origin, symmetry, and thermal melting mechanism of the charge density wave (CDW) phase in TiSe$_{2}$ remain a subject of intense debate, particularly regarding the presence of chiral structural order and a multi-step phase transition. Here, we resolve the finite-temperature structural dynamics of the monolayer TiSe$_{2}$ using large-scale molecular dynamics simulations driven by an accurate, first-principles-trained machine-learning interatomic potential. We demonstrate that the CDW melting deviates from a conventional second-order phase transition, while it undergoes a two-step melting process characterised by an extended fluctuation regime between $T^{\\ast}\\approx200$ K and $T_{\\mathrm{CDW}}\\approx250$ K, with proliferation of topological defects and domain walls, and accompanied by a completely overdamped soft optical phonon. Furthermore, we reveal that anisotropic long-wavelength thermal fluctuations spontaneously stabilise an asymmetric $3Q$ chiral CDW order with $C2$ symmetry. These findings provide a unified microscopic framework for understanding complex fluctuation-driven phase transitions in 2D quantum materials, demonstrating that the intricate CDW physics of TiSe$_{2}$ can be largely captured without invoking excitonic correlations.", "url": "https://arxiv.org/abs/2604.20355", "type": "理论+数值", "summary": "TiSe$_{2}$ 中电荷密度波 (CDW) 相的确切微观起源、对称性和热熔化机制仍然是激烈争论的主题，特别是关于手性结构有序和多步相变的存在。在这里，我们使用由精确的第一性原理训练的机器学习原子间势驱动的大规模分子动力学模拟来解决单层 TiSe$_{2}$ 的有限温度结构动力学问题。我们证明CDW熔化偏离了传统的二阶相变，而经历了一个两步熔化过程，其特征是$T^{\\ast}\\approx200$K和$T_{\\mathrm{CDW}}\\approx250$K之间的扩展波动范围，伴随着拓扑缺陷和畴壁的扩散，并伴随着完全过阻尼的软光学声子。此外，我们揭示了各向异性长波长热波动自发地稳定了具有 $C2$ 对称性的不对称 $3Q$ 手性 CDW 秩序。\n\n这些发现为理解二维量子材料中复杂的涨落驱动相变提供了一个统一的微观框架，表明可以在很大程度上捕获 TiSe$_{2}$ 复杂的 CDW 物理性质，而无需调用激子相关性。", "authors": [{"name": "Luka Benić"}, {"name": "Dino Novko"}, {"name": "Ivor Lončarić"}], "featured_authors": [{"name": "Luka Benić"}, {"name": "Dino Novko"}, {"name": "Ivor Lončarić"}], "author_count": 3}, {"id": "2604.20407", "category": "cond-mat", "title": "Vortex dipoles in expanding shell-shaped Bose-Einstein condensates", "abstract": "Releasing shell-shaped Bose-Einstein condensates from their confinement produces a spherically symmetric density distribution characterized by concentric ripples surrounding a central peak. Here we investigate how a vortex-antivortex dipole affects this dynamics, finding that increasing dipole separation progressively breaks the spherical symmetry and, correspondingly, the interplay of vortex physics and curvature produces a non-monotonic behavior of the cloud aspect ratio. These features can be used for preparing and detecting vortex dipoles in shell-shaped superfluids, as well as for analyzing their signatures in other thin superfluids with more general curved geometries.", "url": "https://arxiv.org/abs/2604.20407", "type": "理论", "summary": "将壳形玻色-爱因斯坦凝聚体从其限制中释放出来会产生球对称的密度分布，其特征是围绕中心峰的同心波纹。在这里，我们研究了涡旋-反涡旋偶极子如何影响这种动力学，发现增加偶极子分离逐渐打破球对称性，相应地，涡旋物理和曲率的相互作用产生云纵横比的非单调行为。这些特征可用于制备和检测壳形超流体中的涡旋偶极子，以及分析其在具有更一般弯曲几何形状的其他薄超流体中的特征。", "authors": [{"name": "A. Tononi"}], "featured_authors": [{"name": "A. Tononi"}], "author_count": 1}, {"id": "2604.20419", "category": "cond-mat", "title": "Quantum many-body scars leading to time-translation symmetry breaking in kicked interacting spin models", "abstract": "We study an Ising model with long-range interactions undergoing a time-periodic kicking. For different initial states we observe persistent period doubling. When there is period doubling we find that the initial state has relevant overlap with Floquet states showing time-translation symmetry breaking, organized in doublets displaying $\\pi$-spectral pairing (as highlighted by the $\\pi$-spectral gap) and long-range order (as shown by the eigenvalues of the magnetization in the doublet). We observe period doubling for initial states with domain walls and tilted spins, and for the latter ones a finite-size scaling of the relevant $\\pi$-shifted gap and magnetization eigenvalues suggests period-doubling oscillations persisting for larger system sizes and lasting a time exponential in the system size. We find that just a minority of Floquet states displays time-translation symmetry breaking while the rest is thermal, a weak-ergodicity breaking situation typical of systems with quantum scars. Although the time-translation symmetry breaking eigenstates are the minority, their number is exponential in the system size and this motivates the period doubling observed for many different initial states.", "url": "https://arxiv.org/abs/2604.20419", "type": "理论+数值", "summary": "我们研究了具有经历时间周期踢动的长距离相互作用的伊辛模型。对于不同的初始状态，我们观察到持续的周期倍增。当存在周期倍增时，我们发现初始态与 Floquet 态有相关重叠，显示时间平移对称性破缺，组织成双峰，显示 $\\pi$-谱配对（如 $\\pi$-谱间隙突出显示）和长程有序（如双峰中磁化强度的特征值所示）。我们观察到具有畴壁和倾斜自旋的初始状态的周期倍增，对于后者，相关 $\\pi$ 位移间隙和磁化特征值的有限尺寸缩放表明倍周期振荡持续存在于较大的系统尺寸中，并且在系统尺寸中持续时间指数。我们发现，只有少数 Floquet 态表现出时间平移对称性破缺，而其余的则是热态，这是具有量子疤痕系统的典型弱遍历性破缺情况。\n\n尽管时间平移对称性破缺本征态是少数，但它们的数量在系统大小中呈指数级增长，这激发了在许多不同初始状态下观察到的周期加倍。", "authors": [{"name": "Ángel L. Corps"}, {"name": "Armando Relaño"}, {"name": "Angelo Russomanno"}], "featured_authors": [{"name": "Ángel L. Corps"}, {"name": "Armando Relaño"}, {"name": "Angelo Russomanno"}], "author_count": 3}, {"id": "2604.20424", "category": "cond-mat", "title": "Phonon driven non-equilibrium triggers for thermal runaway in battery electrodes", "abstract": "Thermal runaway in lithium-ion batteries is governed by the poorly-understood initiation phase, where localised heating introduces instability. Here we identify the three key components that trigger thermal runaway, decreases in local conductivity, heat capacity changes, and intercalation heating, which significantly increase temperature gradients that accelerate battery degradation. Using a multiscale framework that links atomistic phonon calculations with grain-resolved thermal modelling, we identify large thermal gradients across grain boundaries arising from external heating events and intercalation-dependent thermal properties of Li$_x$ZrS$_2$. The observed changes in thermal conductivity are due to charge redistribution and bond-strength modulation of the host, in contrast to the existing theory of lithium rattler mechanics. Internal heating events driven by intercalation gives rise to local thermal gradients, finite-speed thermal wave interference, and internal thermal fluctuations that generate mechanical strain and sub-grain thermal breakdown. These results show that the trigger for thermal runaway is controlled by internal grain architecture and composition, as well as the external environment. Our findings establish materials and electrode design rules for suppressing hotspot formation and improving battery safety during fast charging.", "url": "https://arxiv.org/abs/2604.20424", "type": "理论+数值", "summary": "锂离子电池的热失控是由我们知之甚少的起始阶段控制的，其中局部加热会带来不稳定。在这里，我们确定了触发热失控、局部电导率降低、热容量变化和嵌入加热的三个关键组件，这些组件显着增加了温度梯度，加速了电池的退化。使用将原子声子计算与晶粒分辨热建模联系起来的多尺度框架，我们识别了由外部加热事件和 Li$_x$ZrS$_2$ 的插层相关热特性引起的跨晶界的大热梯度。与现有的锂响铃力学理论相反，观察到的热导率变化是由于主体的电荷重新分布和键合强度调节造成的。由插层驱动的内部加热事件会产生局部热梯度、有限速度热波干扰以及内部热波动，从而产生机械应变和亚晶粒热击穿。\n\n这些结果表明，热失控的触发因素是由内部晶粒结构和成分以及外部环境控制的。我们的研究结果建立了材料和电极设计规则，用于抑制热点形成并提高快速充电过程中的电池安全性。", "authors": [{"name": "Harry Mclean"}, {"name": "Francis Huw Davies"}, {"name": "Ned Thaddeus Taylor"}, {"name": "David W. Horsell"}, {"name": "Steven P. Hepplestone"}], "featured_authors": [{"name": "Harry Mclean"}, {"name": "Francis Huw Davies"}, {"name": "Ned Thaddeus Taylor"}, {"name": "David W. Horsell"}, {"name": "Steven P. Hepplestone"}], "author_count": 5}, {"id": "2604.20437", "category": "cond-mat", "title": "Programming strain-stiffening in soft composites via structural memory near jamming", "abstract": "Soft composite solids, comprising discrete inclusions embedded within a compliant matrix, are emerging candidates for engineering synthetic tissues and soft robotic materials. Current strategies for controlling their nonlinear mechanics, such as strain-stiffening, have primarily relied on the nonlinear elasticity of polymer matrices. Although direct contacts between inclusions may enhance stiffening responses at high densities, the role of the non-equilibrium and history-dependent nature of disordered contact networks in composite mechanics remains unexplored. In this work, by applying a mechanical training protocol near a shear-jamming phase boundary, we demonstrate that the structural memory encoded in contact networks drives a crossover from granular-like to biopolymer-like strain stiffening. Simulations of a coarse-grained composite model reveal that this biopolymer-like mechanical response emerges from enhanced non-affine reconfigurations of nearly-jammed contact networks. Without relying on matrix nonlinearity, we establish a design strategy that leverages non-equilibrium memory effects intrinsic to granular systems to achieve highly programmable strain-stiffening in soft composites.", "url": "https://arxiv.org/abs/2604.20437", "type": "理论+数值", "summary": "软复合固体由嵌入柔顺基体中的离散夹杂物组成，是工程合成组织和软机器人材料的新兴候选材料。目前控制其非线性力学（例如应变硬化）的策略主要依赖于聚合物基体的非线性弹性。尽管夹杂物之间的直接接触可能会增强高密度下的硬化响应，但复合力学中无序接触网络的非平衡和历史依赖性的作用仍未得到探索。在这项工作中，通过在剪切干扰相边界附近应用机械训练协议，我们证明了接触网络中编码的结构记忆驱动了从颗粒状应变硬化到生物聚合物状应变硬化的交叉。粗粒复合模型的模拟表明，这种类似生物聚合物的机械响应是由近乎堵塞的接触网络的增强非仿射重构产生的。\n\n在不依赖矩阵非线性的情况下，我们建立了一种设计策略，利用颗粒系统固有的非平衡记忆效应来实现软复合材料中高度可编程的应变强化。", "authors": [{"name": "Yiqiu Zhao"}, {"name": "Deng Pan"}, {"name": "Yiming Pang"}, {"name": "Jonathan Barés"}, {"name": "Chang Xu"}, {"name": "Che Liu"}, {"name": "Haitao Hu"}, {"name": "Yuliang Jin"}, {"name": "Qin Xu"}], "featured_authors": [{"name": "Yiqiu Zhao"}, {"name": "Deng Pan"}, {"name": "Yiming Pang"}, {"name": "Haitao Hu"}, {"name": "Yuliang Jin"}, {"name": "Qin Xu"}], "author_count": 9}, {"id": "2604.20450", "category": "cond-mat", "title": "Including nanoparticle shape into macrospin models", "abstract": "We investigate the feasibility of the macrospin approximation to account for the actual shape of soft magnetic nanoparticles (MNPs) with realistic geometries. Specifically focusing on magnetite, we use the superellipsoidal parametrisation to account for a variety of shapes, with a continuous interpolation from spherical to cubic morphologies, as well as different elongations. Our procedure consists of the direct comparison between angular-dependent hysteresis loops obtained by full micromagnetic simulations, with those produced by an extended Stoner-Wohlfarth (SW) model that incorporates both the intrinsic cubic magnetocrystalline anisotropy, and an effective uniaxial contribution arising from the particle elongation. The limits of validity of the macrospin description are approximately 10-60 nm for axial ratios r>1.5, and 20-60 nm for 1.0<r<1.5. These results establish a direct connection between nanoparticle morphology and effective macrospin parameters, demonstrating the suitability of the generalized SW model for describing the magnetic response of realistically shaped MNPs.", "url": "https://arxiv.org/abs/2604.20450", "type": "理论+数值", "summary": "我们研究了宏自旋近似的可行性，以解释具有真实几何形状的软磁纳米颗粒（MNP）的实际形状。特别关注磁铁矿，我们使用超椭球参数化来解释各种形状，从球形到立方形态以及不同的伸长率进行连续插值。我们的程序包括直接比较通过完整微磁模拟获得的角度相关磁滞回线与由扩展的 Stoner-Wohlfarth (SW) 模型产生的磁滞回线，该模型结合了固有的立方磁晶各向异性和粒子伸长产生的有效单轴贡献。对于轴比 r>1.5，宏自旋描述的有效性限制约为 10-60 nm；对于 1.0<r<1.5，宏自旋描述的有效性限制约为 20-60 nm。这些结果在纳米粒子形态和有效宏观自旋参数之间建立了直接联系，证明了广义 SW 模型对于描述真实形状的 MNP 的磁响应的适用性。", "authors": [{"name": "Iago López-Vázquez"}, {"name": "Òscar Iglesias"}, {"name": "David Serantes"}], "featured_authors": [{"name": "Iago López-Vázquez"}, {"name": "Òscar Iglesias"}, {"name": "David Serantes"}], "author_count": 3}, {"id": "2604.20515", "category": "cond-mat", "title": "Accurate and Efficient Interatomic Potentials for Dislocations in InP", "abstract": "We present Atomic Cluster Expansion (ACE) and MACE models trained on a new dataset of Density Functional Theory (DFT) calculations, constructed for the task of studying the mobility of dislocations in Indium Phosphide (InP). The models are validated in a suite of tests against RSCAN DFT, and compared with previously published potentials from literature. Our new models act as much better surrogates for DFT than the literature models: errors on partial dislocation formation energies are at most 4% for both ACE and MACE, compared with 18% for the MACE-MPA foundation model and 42-50% for earlier bespoke potentials. The bespoke MACE model achieves this accuracy while being around five times faster to evaluate than the MP0 and MPA foundation models.", "url": "https://arxiv.org/abs/2604.20515", "type": "理论+数值", "summary": "我们提出了在密度泛函理论 (DFT) 计算的新数据集上训练的原子团簇扩展 (ACE) 和 MACE 模型，该模型是为研究磷化铟 (InP) 中位错迁移率的任务而构建的。这些模型在一系列针对 RSCAN DFT 的测试中进行了验证，并与之前发表的文献中的潜力进行了比较。我们的新模型比文献模型更好地替代 DFT：ACE 和 MACE 的部分位错形成能误差最多为 4%，而 MACE-MPA 基础模型为 18%，早期定制势为 42-50%。定制的 MACE 模型实现了这种准确性，同时评估速度比 MP0 和 MPA 基础模型快约五倍。", "authors": [{"name": "Thomas Rocke"}, {"name": "Thomas Hudson"}, {"name": "Richard Beanland"}, {"name": "James Kermode"}], "featured_authors": [{"name": "Thomas Rocke"}, {"name": "Thomas Hudson"}, {"name": "Richard Beanland"}, {"name": "James Kermode"}], "author_count": 4}, {"id": "2604.20561", "category": "cond-mat", "title": "Exact analytical edge states in the extended Su-Schrieffer-Heeger model", "abstract": "We investigate the topology of the different phases of the extended Su-Schrieffer-Heeger (eSSH) model, which includes hopping processes between translationally inequivalent atoms beyond nearest neighbors. Exact analytical expressions for the edge states of a semi-infinite eSSH chain are derived, with wave functions that decay exponentially from the boundary with a unit-cell decay factor z. From the winding number of the bulk Hamiltonian under periodic boundary conditions, we determine the topological phase diagram and establish the bulk-boundary correspondence: changes in the winding number coincide with bulk gap closings and with the condition |z|=1 for the edge-state solutions. For finite chains, we further obtain analytical, approximate expressions for the low-energy edge states, which are shown to be highly accurate.", "url": "https://arxiv.org/abs/2604.20561", "type": "理论+数值", "summary": "我们研究了扩展 Su-Schrieffer-Heeger (eSSH) 模型不同相的拓扑，其中包括平移不等价原子之间超越最近邻居的跳跃过程。推导了半无限 eSSH 链边缘态的精确解析表达式，其中波函数从边界以单位单元衰减因子 z 呈指数衰减。根据周期性边界条件下的体哈密顿量的绕数，我们确定了拓扑相图并建立了体边界对应关系：绕数的变化与体间隙闭合以及边缘状态解的条件 |z|=1 一致。对于有限链，我们进一步获得了低能量边缘态的解析近似表达式，该表达式被证明是高度准确的。", "authors": [{"name": "P. A. Grizzi"}, {"name": "A. A. Aligia"}, {"name": "P. Roura-Bas"}], "featured_authors": [{"name": "P. A. Grizzi"}, {"name": "A. A. Aligia"}, {"name": "P. Roura-Bas"}], "author_count": 3}, {"id": "2604.20624", "category": "cond-mat", "title": "Topological Word for Non-Abelian Topological Insulators", "abstract": "We propose a unified framework, dubbed topological word, for the complete non-Abelian bulk-boundary correspondence in multigap non-Abelian topological insulators. Composed by an ordered sequence of letters, each a non-Abelian charge depicting the gap-resolved topology, the topological word captures both the global non-Abelian topology corresponding to the homotopy classification, and the band-adjacency information. The latter, though crucial for the edge-state pattern across multiple gaps, is often overlooked in previous studies. We confirm our framework using both static models and periodically driven Floquet systems, and discuss its connection and distinction with existing descriptions, such as the phase-band singularities and braiding representations. Intriguingly, topological word continues to provide insight regarding topology and edge states, even as the global non-Abelian topology becomes ill-defined under broken parity-time symmetry.", "url": "https://arxiv.org/abs/2604.20624", "type": "理论+数值", "summary": "我们提出了一个统一的框架，称为拓扑词，用于多间隙非阿贝尔拓扑绝缘体中的完整非阿贝尔体边界对应。拓扑词由有序的字母序列组成，每个字母都是描述间隙解析拓扑的非阿贝尔电荷，拓扑词捕获与同伦分类相对应的全局非阿贝尔拓扑和能带邻接信息。后者虽然对于跨多个间隙的边缘状态模式至关重要，但在之前的研究中经常被忽视。我们使用静态模型和周期性驱动的 Floquet 系统确认我们的框架，并讨论其与现有描述的联系和区别，例如相带奇点和编织表示。有趣的是，拓扑词继续提供有关拓扑和边缘状态的见解，即使全局非阿贝尔拓扑在破缺奇偶时间对称性下变得不明确。", "authors": [{"name": "Zhenming Zhang"}, {"name": "Tianyu Li"}, {"name": "Wei Yi"}], "featured_authors": [{"name": "Zhenming Zhang"}, {"name": "Tianyu Li"}, {"name": "Wei Yi"}], "author_count": 3}, {"id": "2604.20697", "category": "cond-mat", "title": "Interaction-induced asymmetry in infinite-temperature dynamical correlations of hard-core anyons", "abstract": "We study dynamical correlations of interacting hard-core anyons on a one-dimensional lattice at infinite temperature. This is a setting in which the many-body spectrum is independent of the statistical phase $\\theta$, while dynamical correlators remain sensitive to $\\theta$ through nonlocal Jordan-Wigner strings. We compute single-particle Green's functions, spectral functions, and density-density correlators, thereby separating the effects of fractional statistics on one-body coherence from those on density transport in a maximally mixed ensemble. In the noninteracting case $V=0$, high-temperature averaging leads to inversion-symmetric Green's functions for all $\\theta$ despite the presence of anyonic strings. Finite nearest-neighbor interactions $V$ generate, however, a pronounced left-right asymmetry in the Green's functions for $0<\\theta<\\pi$, with the strongest chirality appearing at intermediate couplings $V\\sim J$ where interactions and hopping compete most effectively. In this regime, the Green's function decays exponentially in time with a statistical-angle-dependent decay rate. At strong coupling, the dynamics crosses over to an atomic-limit regime in which the dependence on $\\theta$ is reduced. Here the Green's function decays universally as $t^{-1}$ and the corresponding spectral function displays a three-band structure. In contrast, density-density correlations are insensitive to statistics and recover the known infinite-temperature transport regimes of the XXZ chain, including ballistic, superdiffusive and diffusive behaviours. These results identify dynamical correlation functions as direct probes of fractional statistics in high-entropy quantum systems.", "url": "https://arxiv.org/abs/2604.20697", "type": "理论", "summary": "我们研究无限温度下一维晶格上相互作用的硬核任意子的动力学相关性。在这种设置中，多体谱独立于统计相位 $\\theta$，而动态相关器通过非局部 Jordan-Wigner 弦保持对 $\\theta$ 敏感。我们计算单粒子格林函数、谱函数和密度-密度相关器，从而将分数统计对单体相干性的影响与最大混合系综中密度输运的影响分开。在非相互作用的情况下 $V=0$，尽管存在任意弦，但高温平均会导致所有 $\\theta$ 的反演对称格林函数。然而，有限最近邻相互作用 $V$ 在 $0<\\theta<\\pi$ 的格林函数中产生明显的左右不对称，最强的手性出现在中间耦合 $V\\sim J$ 处，其中相互作用和跳跃最有效地竞争。在这种情况下，格林函数随时间呈指数衰减，衰减率与统计角度相关。\n\n在强耦合下，动力学跨越原子极限状态，其中对 $\\theta$ 的依赖减少。这里格林函数普遍衰减为 $t^{-1}$ 并且相应的谱函数显示出三能带结构。相比之下，密度-密度相关性对统计数据不敏感，并且可以恢复 XXZ 链的已知无限温度传输机制，包括弹道、超扩散和扩散行为。这些结果将动态相关函数确定为高熵量子系统中分数统计的直接探针。", "authors": [{"name": "Doru Sticlet"}, {"name": "Ovidiu I. Pâţu"}, {"name": "Balázs Dóra"}, {"name": "Cătălin Paşcu Moca"}], "featured_authors": [{"name": "Doru Sticlet"}, {"name": "Ovidiu I. Pâţu"}, {"name": "Balázs Dóra"}, {"name": "Cătălin Paşcu Moca"}], "author_count": 4}, {"id": "2604.20709", "category": "cond-mat", "title": "Anisotropic multiband magnetotransport in LaAg$_2$Ge$_2$ thin films", "abstract": "ThCr$_2$Si$_2$-type intermetallics are layered conductors in which crystallographic anisotropy and multiband electronic states often give rise to characteristic magnetotransport phenomena. Here, we report the molecular-beam epitaxy growth of LaAg$_2$Ge$_2$ thin films on MgO(001) and their magnetotransport properties. The Hall effect and magnetoresistance are captured by an effective two-carrier description with a high-mobility electron band, yielding a positive magnetoresistance of 22.5% at 9 T. Angle-dependent magnetoresistance exhibits a dominant twofold anisotropy and additional reproducible dip/peak features at characteristic tilt angles that are nearly independent of field and temperature. These results extend our understanding of the anisotropic electronic transport in thin-film germanides within the ThCr$_2$Si$_2$ family.", "url": "https://arxiv.org/abs/2604.20709", "type": "理论", "summary": "ThCr$_2$Si$_2$型金属间化合物是层状导体，其中晶体各向异性和多带电子态经常引起特征磁输运现象。在这里，我们报告了 MgO(001) 上 LaAg$_2$Ge$_2$ 薄膜的分子束外延生长及其磁输运特性。霍尔效应和磁阻通过具有高迁移率电子带的有效双载流子描述来捕获，在 9 T 时产生 22.5% 的正磁阻。角度相关磁阻在几乎与场和温度无关的特征倾斜角处表现出主要的双重各向异性和额外的可再现的倾角/峰值特征。这些结果扩展了我们对 ThCr$_2$Si$_2$ 家族薄膜锗化物中各向异性电子传输的理解。", "authors": [{"name": "Mizuki Ohno"}, {"name": "Reiley Dorrian"}, {"name": "Veronica Show"}, {"name": "Joseph Falson"}], "featured_authors": [{"name": "Mizuki Ohno"}, {"name": "Reiley Dorrian"}, {"name": "Veronica Show"}, {"name": "Joseph Falson"}], "author_count": 4}, {"id": "2604.20716", "category": "cond-mat", "title": "Stabilization of a non-superconducting, orthorhombic phase by over-hydrogenating LaFeSiH", "abstract": "Chemical composition provides a powerful route to tune the electronic ground state of iron-based superconductors and other quantum materials, yet access to highly doped phases remains limited. Here we demonstrate that high-pressure thermal decomposition of hydrogen-rich precursors enables over-hydrogenation of LaFeSi. Using anthracene, we synthesize tetragonal superconducting LaFeSiH, including a single hydrogen site, while ammonia borane yields a structurally distorted over-hydrogenated phase, LaFeSiH1+x, with an orthorhombic structure. Chemical analysis reveal excess hydrogen (x ~ 0.6), implying a second H site in LaFeSiH1.6 whose localization and occupancy are determined by neutron diffraction. In contrast to metallic LaFeSi and superconducting LaFeSiH, orthorhombic LaFeSiH1.6 exhibits semiconductor-like behavior. Upon hydrogen release near 100 °C, it transforms into tetragonal superconducting LaFeSiH1+{\\delta} ({\\delta} << 0.6). These results establish the chemical flexibility of the layered LaFeSiX (X = H, O, F) family and provide access to a high hydrogen-doping regime, creating new opportunities to investigate superconductivity in Fe-based silicides.", "url": "https://arxiv.org/abs/2604.20716", "type": "理论", "summary": "化学成分为调节铁基超导体和其他量子材料的电子基态提供了强大的途径，但获得高掺杂相的途径仍然有限。在这里，我们证明了富氢前驱体的高压热分解能够使 LaFeSi 过度氢化。使用蒽，我们合成了四方超导LaFeSiH，包括单个氢位点，而氨硼烷则产生结构扭曲的过度氢化相LaFeSiH1+x，具有斜方结构。化学分析揭示了过量的氢 (x ~ 0.6)，这意味着 LaFeSiH1.6 中存在第二个 H 位点，其定位和占据情况由中子衍射确定。与金属 LaFeSi 和超导 LaFeSiH 相比，正交晶系 LaFeSiH1.6 表现出类似半导体的行为。当氢在接近100°C释放时，它转变为四方超导LaFeSiH1+{\\delta} ({\\delta} << 0.6)。这些结果确立了层状 LaFeSiX (X = H、O、F) 系列的化学灵活性，并提供了高氢掺杂方案，为研究铁基硅化物的超导性创造了新的机会。", "authors": [{"name": "M. F. Hansen"}, {"name": "C. Lepoittevin"}, {"name": "J.-B. Vaney"}, {"name": "P. Boullay"}, {"name": "V. Nassif"}, {"name": "A. Sulpice"}, {"name": "H. Mayaffre"}, {"name": "M.-H. Julien"}, {"name": "S. Tencé"}, {"name": "P. Toulemonde"}], "featured_authors": [{"name": "M. F. Hansen"}, {"name": "C. Lepoittevin"}, {"name": "J.-B. Vaney"}, {"name": "M.-H. Julien"}, {"name": "S. Tencé"}, {"name": "P. Toulemonde"}], "author_count": 10}, {"id": "2604.20770", "category": "cond-mat", "title": "Encounter times of random walkers with simultaneous resetting on networks", "abstract": "In this work, we study the dynamics of multiple random walkers on networks subject to a simultaneous resetting protocol, whereby all walkers are synchronously returned to their respective initial nodes. For this collective Markovian process, we derive exact analytical expressions for the mean first-encounter time, defined as the average time required for all walkers to meet for the first time at a given node. These results are formulated in terms of the eigenvalues and eigenvectors of the transition matrices governing the dynamics without resetting, providing a clear spectral interpretation of the impact of resetting on encounter processes. We further establish a general criterion for finite networks that determines when the introduction of a nonzero resetting probability reduces the mean first-encounter time and leads to an optimal resetting strategy. The theoretical predictions are illustrated through numerical results on regular and heterogeneous networks, for encounters involving two or more walkers, and for combinations of local and nonlocal dynamics. Our findings demonstrate that simultaneous resetting can significantly reduce encounter times for specific target nodes and initial conditions, while becoming ineffective for highly exploratory dynamics or distant targets. A comparison with independent resetting shows that simultaneous resetting is more efficient in homogeneous networks, whereas independent resetting can outperform it in heterogeneous structures, thereby revealing a trade-off between synchronization and exploration. The framework provides a unified approach to collective search and encounter problems on networks with resetting.", "url": "https://arxiv.org/abs/2604.20770", "type": "理论+数值", "summary": "在这项工作中，我们研究了受同时重置协议约束的网络上多个随机游走者的动态，其中所有游走者都同步返回到各自的初始节点。对于这个集体马尔可夫过程，我们推导出平均首次相遇时间的精确解析表达式，定义为所有步行者在给定节点第一次相遇所需的平均时间。这些结果是根据控制动态而无需重置的过渡矩阵的特征值和特征向量来表述的，为重置对遭遇过程的影响提供了清晰的谱解释。我们进一步为有限网络建立了一个通用标准，该标准确定何时引入非零重置概率会减少平均首次遇到时间并导致最佳重置策略。理论预测通过常规网络和异构网络、涉及两个或多个步行者的遭遇以及局部和非局部动力学的组合的数值结果来说明。\n\n我们的研究结果表明，同时重置可以显着减少特定目标节点和初始条件的遭遇时间，而对于高度探索性动态或遥远目标则变得无效。与独立重置的比较表明，同时重置在同构网络中更有效，而独立重置在异构结构中可以优于它，从而揭示同步和探索之间的权衡。该框架提供了一种统一的方法来集体搜索并遇到网络问题并进行重置。", "authors": [{"name": "Cristian D. Suarez-Jimenez"}, {"name": "Alejandro P. Riascos"}, {"name": "Denis Boyer"}], "featured_authors": [{"name": "Cristian D. Suarez-Jimenez"}, {"name": "Alejandro P. Riascos"}, {"name": "Denis Boyer"}], "author_count": 3}, {"id": "2604.20797", "category": "cond-mat", "title": "Gauge-Equivariant Graph Neural Networks for Lattice Gauge Theories", "abstract": "Local gauge symmetry underlies fundamental interactions and strongly correlated quantum matter, yet existing machine-learning approaches lack a general, principled framework for learning under site-dependent symmetries, particularly for intrinsically nonlocal observables. Here we introduce a gauge-equivariant graph neural network that embeds non-Abelian symmetry directly into message passing via matrix-valued, gauge-covariant features and symmetry-compatible updates, extending equivariant learning from global to fully local symmetries. In this formulation, message passing implements gauge-covariant transport across the lattice, allowing nonlocal correlations and loop-like structures to emerge naturally from local operations. We validate the approach across pure gauge, gauge-matter, and dynamical regimes, establishing gauge-equivariant message passing as a general paradigm for learning in systems governed by local symmetry.", "url": "https://arxiv.org/abs/2604.20797", "type": "理论+数值", "summary": "局域规范对称性是基本相互作用和强相关量子物质的基础，但现有的机器学习方法缺乏在依赖于位点的对称性下进行学习的通用的、原则性的框架，特别是对于本质上非局域的可观测量。在这里，我们引入了一种规范等变图神经网络，该网络通过矩阵值、规范协变特征和对称性兼容更新将非阿贝尔对称性直接嵌入到消息传递中，将等变学习从全局对称扩展到完全局部对称。在这个公式中，消息传递实现了跨晶格的规范协变传输，允许非局部相关性和循环结构从局部操作中自然出现。我们在纯规范、规范物质和动态机制中验证了该方法，将规范等变消息传递建立为局部对称性系统中学习的通用范例。", "authors": [{"name": "Ali Rayat"}, {"name": "Yaohang Li"}, {"name": "Gia-Wei Chern"}], "featured_authors": [{"name": "Ali Rayat"}, {"name": "Yaohang Li"}, {"name": "Gia-Wei Chern"}], "author_count": 3}, {"id": "2604.20831", "category": "cond-mat", "title": "Unconventional Quantum Criticality in Long-Range Spin-1 Chains: Insights from Entanglement Entropy and Bipartite Fluctuations", "abstract": "We study the ground-state phase diagram of a spin-1 Heisenberg chain with staggered long-range (LR) interactions decaying as $\\propto r^{-\\alpha}$ using a quantum Monte Carlo approach based on the split-spin representation. This formulation enables efficient large-scale simulations by mapping the spin-1 model onto spin-$1/2$ degrees of freedom with local projection constraints. We resolve the continuous quantum phase transition between the gapped Haldane phase at large $\\alpha$ (short-range regime) and a gapless antiferromagnetically ordered Néel phase at small $\\alpha$ (LR regime), where the continuous SU(2) symmetry is broken. From finite-size scaling and crossing point analyses, we determine the critical point to be at $\\alpha_c = 2.48(2)$ and extract the associated critical exponents, which indicate unconventional criticality. In particular, the transition is found to be nonconformal, characterized by a dynamic exponent $z \\neq 1$. We further analyze the scaling of entanglement entropy and bipartite fluctuations across the transition, and determine the corresponding universal scalings in both phases and at criticality.", "url": "https://arxiv.org/abs/2604.20831", "type": "理论+数值", "summary": "我们使用基于分裂自旋表示的量子蒙特卡罗方法研究了自旋 1 海森堡链的基态相图，该链具有交错的长程 (LR) 相互作用，衰减为 $\\propto r^{-\\alpha}$。该公式通过将 spin-1 模型映射到具有局部投影约束的 spin-$1/2$ 自由度，实现高效的大规模模拟。我们解决了大$\\alpha$（短程区域）的带隙Haldane相和小$\\alpha$（LR区域）的无带隙反铁磁有序Néel相之间的连续量子相变，其中连续SU(2)对称性被破坏。通过有限尺寸缩放和交叉点分析，我们确定临界点位于 $\\alpha_c = 2.48(2)$ 并提取相关的临界指数，这表明非常规临界性。特别是，我们发现该转变是非共形的，其特征是动态指数 $z \\neq 1$。我们进一步分析了整个转变过程中纠缠熵和二分涨落的标度，并确定了两个阶段和临界点相应的通用标度。", "authors": [{"name": "Justin Tim-Lok Chau"}, {"name": "Jiarui Zhao"}, {"name": "Nicolas Laflorencie"}, {"name": "Zi Yang Meng"}], "featured_authors": [{"name": "Justin Tim-Lok Chau"}, {"name": "Jiarui Zhao"}, {"name": "Nicolas Laflorencie"}, {"name": "Zi Yang Meng"}], "author_count": 4}, {"id": "2604.19817", "category": "hep-th", "title": "Supersymmetry, Supergravity and Non--Perturbative Dynamics of Gauge Theories", "abstract": "We present a review of supersymmetry, supergravity, and the non-perturbative dynamics of gauge theories, tracing a path from the supersymmetry algebra to moduli stabilisation and de~Sitter vacua in string theory. Representations of the supersymmetry algebra, the superspace formalism, and basic models including the Wess--Zumino model and $\\mathcal{N}=1$ supersymmetric Yang--Mills theory are discussed. The non-perturbative dynamics of $\\mathcal{N}=2$ gauge theories is analysed through the Seiberg--Witten solution: the curve, prepotential, Picard--Fuchs system, BPS spectrum, and confinement via monopole condensation. The transition to $\\mathcal{N}=1$ supergravity is carried out in three steps, showing how the Kähler potential $K$ and superpotential $W$ determine all five Lagrangian sectors and how the scalar potential acquires its exponential prefactor and gravitationally induced negative contribution. String theory applications include D-brane gauge theories, the AdS/CFT correspondence, geometric engineering of the Seiberg--Witten solution, and reduction of $\\mathcal{N}=4$ to $\\mathcal{N}=1$ supersymmetry. The KKLT moduli stabilisation mechanism is analysed in detail, including $\\alpha'^3$ corrections to the Kähler potential. Three regimes of the scalar potential are identified -- classical KKLT, corrected KKLT with a shifted AdS minimum, and a runaway regime -- and the critical parameter $\\hat{\\xi}_c$ separating controlled de~Sitter vacua from decompactification is determined. The tension with the de~Sitter swampland conjecture is discussed.", "url": "https://arxiv.org/abs/2604.19817", "type": "理论", "summary": "我们对超对称、超引力和规范理论的非微扰动力学进行了回顾，追踪了从超对称代数到弦理论中的模稳定和德西特真空的路径。讨论了超对称代数的表示、超空间形式主义以及包括Wess--Zumino模型和$\\mathcal{N}=1$超对称Yang--Mills理论在内的基本模型。通过 Seiberg--Witten 解分析 $\\mathcal{N}=2$ 规范理论的非微扰动力学：曲线、预电势、Picard--Fuchs 系统、BPS 谱和通过单极子凝聚的限制。向 $\\mathcal{N}=1$ 超重力的过渡分三个步骤进行，展示了凯勒势 $K$ 和超势 $W$ 如何确定所有五个拉格朗日扇区，以及标量势如何获得其指数前因子和引力引起的负贡献。弦理论应用包括 D 膜规范理论、AdS/CFT 对应、Seiberg--Witten 解的几何工程以及将 $\\mathcal{N}=4$ 简化为 $\\mathcal{N}=1$ 超对称性。\n\n详细分析了 KKLT 模量稳定机制，包括对 Kähler 势的 $\\alpha'^3$ 修正。确定了标量势的三种状态——经典 KKLT、具有偏移 AdS 最小值的校正 KKLT 和失控状态——并且确定了将受控去西特真空与去紧化分开的关键参数 $\\hat{\\xi}_c$。讨论了与德西特沼泽地猜想的张力。", "authors": [{"name": "Tetiana Obikhod"}], "featured_authors": [{"name": "Tetiana Obikhod"}], "author_count": 1}, {"id": "2604.19836", "category": "hep-th", "title": "The emergence of (3+1)-dimensional expanding spacetime from complex Langevin simulations of the Lorentzian type IIB matrix model with deformations", "abstract": "The Lorentzian type IIB matrix model is a promising candidate for a nonperturbative formulation of superstring theory. In this model, the eigenvalue distribution of the $N\\times N$ bosonic matrices $A_\\mu$ $(\\mu = 0 , \\ldots , 9)$ represents an emergent spacetime, which is determined by the dynamics of the model in the large-$N$ limit. Here we perform numerical simulations of the model overcoming the sign problem by the complex Langevin method with the matrix size $N$ up to $128$. In order to avoid the singular drift problem due to the Pfaffian, which appears after integrating out the fermionic matrices, we deform the model in a manner inspired by the supersymmetric deformation, which is used to define the ``polarized type IIB matrix model'' in the Euclidean case. We find that the deformed model exhibits a phase in which (3+1)-dimensional expanding spacetime emerges with both space and time being smooth and real.", "url": "https://arxiv.org/abs/2604.19836", "type": "理论", "summary": "洛伦兹 IIB 型矩阵模型是超弦理论非微扰表述的一个有前途的候选模型。在该模型中，$N\\times N$ 个玻色子矩阵 $A_\\mu$ $(\\mu = 0 , \\ldots , 9)$ 的特征值分布表示一个涌现时空，该时空由模型在大 $N$ 极限下的动力学决定。在这里，我们通过复杂的 Langevin 方法对模型进行数值模拟，该模型克服了符号问题，矩阵大小为 $N$ 高达 $128$。为了避免积分费米子矩阵后出现的普法夫奇异漂移问题，我们以超对称变形的方式对模型进行变形，超对称变形用于定义欧几里德情况下的“极化型IIB矩阵模型”。我们发现变形模型呈现出一个（3+1）维扩展时空的阶段，空间和时间都是平滑和真实的。", "authors": [{"name": "Konstantinos N. Anagnostopoulos"}, {"name": "Takehiro Azuma"}, {"name": "Mitsuaki Hirasawa"}, {"name": "Jun Nishimura"}, {"name": "Stratos Papadoudis"}, {"name": "Asato Tsuchiya"}], "featured_authors": [{"name": "Konstantinos N. Anagnostopoulos"}, {"name": "Takehiro Azuma"}, {"name": "Mitsuaki Hirasawa"}, {"name": "Jun Nishimura"}, {"name": "Stratos Papadoudis"}, {"name": "Asato Tsuchiya"}], "author_count": 6}, {"id": "2604.19860", "category": "hep-th", "title": "Mutual Information from Modular Flow in General CFTs", "abstract": "The vacuum mutual information (MI) of subregion algebras provides a universal window into the data of general conformal field theories (CFTs). Exploiting the geometric nature of the modular flow associated to ball-shaped regions and the operator product expansion of twist operators implementing the replica symmetry in an $n$-fold version of a CFT, it is possible to construct a hierarchy of increasingly refined approximations to the full MI. In this letter, we use the two-point functions of primaries of arbitrary spin in the replicated theory to constrain the twist operators, and find their contribution to the MI of arbitrarily boosted balls in any $d$-dimensional CFT. When the two-point functions involve the primary with the lowest scaling dimension, our result provides the most precise approximation for the long-distance behavior of the MI, superseding all previous expansions. Building upon this result and certain universal properties of the short- and long-distance regimes, we put forward a new high-precision analytic approximation to the MI for arbitrary separations. The accuracy of our approach is validated against exact $d=2$ and lattice $d=3$ results. We further apply it to characterize the MI of a $d=4$ Maxwell field, a case for which no prior results are available.", "url": "https://arxiv.org/abs/2604.19860", "type": "理论", "summary": "次区域代数的真空互信息（MI）为了解一般共形场论（CFT）的数据提供了一个通用窗口。利用与球形区域相关的模块化流的几何性质以及扭曲算子的算子乘积扩展在 $n$ 倍版本的 CFT 中实现副本对称性，可以构建一个对完整 MI 越来越精细的近似的层次结构。在这封信中，我们使用复制理论中任意自旋原色的两点函数来约束扭曲算子，并找到它们对任意 $d$ 维 CFT 中任意增强球的 MI 的贡献。当两点函数涉及具有最低缩放维度的主函数时，我们的结果为 MI 的长距离行为提供了最精确的近似，取代了所有以前的扩展。基于这一结果以及短距离和长距离体系的某些普遍性质，我们提出了一种新的任意分离的 MI 的高精度解析近似。我们的方法的准确性根据精确的 $d=2$ 和点阵 $d=3$ 结果进行了验证。\n\n我们进一步应用它来表征 $d=4$ 麦克斯韦场的 MI，这种情况之前没有可用的结果。", "authors": [{"name": "César A. Agón"}, {"name": "Pablo Bueno"}, {"name": "Adem Deniz Piskin"}, {"name": "Guido van der Velde"}], "featured_authors": [{"name": "César A. Agón"}, {"name": "Pablo Bueno"}, {"name": "Adem Deniz Piskin"}, {"name": "Guido van der Velde"}], "author_count": 4}, {"id": "2604.19861", "category": "hep-th", "title": "Excitability in quantum field theory", "abstract": "In quantum field theory, it is not always possible to excite one state out of another using only local operators. This paper establishes abstract algebraic criteria for (local) excitability in general quantum theories, and computes these criteria explicitly for zero-mean Gaussian states in (generalized) free field theories. We find that in this context, due to the special nature of Gaussian states, one-way excitability always implies two-way excitability, and our results generalize the \"quasiequivalence theorems\" of Powers, Stormer, van Daele, Araki, and Yamagami. A key role in our proof is played by the information-theoretic tool of canonical purification. In appendices, we provide a pedagogical introduction to the algebraic formulation of (generalized) free field theory.", "url": "https://arxiv.org/abs/2604.19861", "type": "理论", "summary": "在量子场论中，仅使用局部算子并不总是可以从另一种状态中激发出一种状态。本文建立了一般量子理论中（局域）兴奋性的抽象代数准则，并为（广义）自由场理论中的零均值高斯态明确计算了这些准则。我们发现，在这种情况下，由于高斯态的特殊性，单向兴奋性总是意味着双向兴奋性，我们的结果推广了 Powers、Stormer、van Daele、Araki 和 Yamagami 的“准等价定理”。规范纯化的信息论工具在我们的证明中发挥着关键作用。在附录中，我们提供了（广义）自由场理论的代数公式的教学介绍。", "authors": [{"name": "Jacqueline Caminiti"}, {"name": "Federico Capeccia"}, {"name": "Jonathan Sorce"}], "featured_authors": [{"name": "Jacqueline Caminiti"}, {"name": "Federico Capeccia"}, {"name": "Jonathan Sorce"}], "author_count": 3}, {"id": "2604.19866", "category": "hep-th", "title": "Asymptotic charges as detectors and the memory effect in massive QED and perturbative quantum gravity", "abstract": "It has been shown that there are an infinite set of asymptotic symmetries in quantum gravity and QED, and this has been extended to dressed states in some cases. Here we rederive these statements in terms of detectors in order to clarify, confirm, and generalize these results to include external hard gravitons. Using detectors and including the full t dependence in Faddeev-Kulish dressings allows us to correct discrepancies in the literature and make new statements. We show that Faddeev-Kulish dressings correctly encode the memory effect in the 'in' and 'out' scattering Fock spaces. We find a physical contribution to the memory eigenvalues arising from the dressings in both cases.", "url": "https://arxiv.org/abs/2604.19866", "type": "理论", "summary": "研究表明，量子引力和 QED 中存在无限组渐近对称性，并且在某些情况下这已扩展到修饰态。在这里，我们根据探测器重新推导这些陈述，以便澄清、确认和概括这些结果以包括外部硬引力子。使用探测器并在 Faddeev-Kulish 敷料中包含完整的 t 依赖性，使我们能够纠正文献中的差异并做出新的陈述。我们证明 Faddeev-Kulish 敷料正确地编码了“内”和“外”散射福克空间中的记忆效应。我们发现这两种情况下的敷料对记忆特征值都有物理贡献。", "authors": [{"name": "Brett Oertel"}, {"name": "Ian Moult"}, {"name": "Sabrina Pasterski"}], "featured_authors": [{"name": "Brett Oertel"}, {"name": "Ian Moult"}, {"name": "Sabrina Pasterski"}], "author_count": 3}, {"id": "2604.19868", "category": "hep-th", "title": "Crosscap Defects", "abstract": "We introduce a novel class of defects, termed {\\it crosscap defects}, in conformal field theory (CFT) in general dimensions. These arise from quotienting the spacetime by a $\\mathbb{Z}_2$ automorphism, and provide higher-codimension generalisations of CFT on real projective space ($\\mathbb{RP}^{d}$). Crosscap defects extend along a $p$-dimensional fixed locus of the $\\mathbb{Z}_2$ action and preserve an $SO(p+1,1)\\times PO(d-p)$ subgroup of the conformal group. The two-point functions of operators in this setup exhibit three operator product expansion channels: bulk, image, and defect. These lead to several {\\it crosscap crossing equations}, which we present. We analyse conformal block decompositions and show that the blocks are identical to defect CFT blocks up to a redefinition of cross ratios. As concrete examples, we study crosscap defects in the $O(N)$ model at the Gaussian and Wilson--Fisher fixed points in the $\\varepsilon$-expansion. We compute explicitly the associated CFT data as a function of $p$ and find that, unlike standard defects, displacement and tilt operators are absent for generic $p$. They provide examples of defect conformal manifolds without exactly marginal operators.", "url": "https://arxiv.org/abs/2604.19868", "type": "理论", "summary": "我们在一般维度的共形场论（CFT）中引入了一类新颖的缺陷，称为{\\it crosscap缺陷}。这些是通过 $\\mathbb{Z}_2$ 自同构对时空进行求商而产生的，并提供了 CFT 在实射影空间 ($\\mathbb{RP}^{d}$) 上的高维泛化。 Crosscap 缺陷沿着 $\\mathbb{Z}_2$ 作用的 $p$ 维固定轨迹延伸，并保留共形群的 $SO(p+1,1)\\times PO(d-p)$ 子群。此设置中算子的两点函数展示了三个算子产品扩展通道：批量、图像和缺陷。这些导致了我们提出的几个{\\it crosscap 交叉方程}。我们分析了共形块分解，并表明这些块与有缺陷的 CFT 块在重新定义交叉比率方面是相同的。作为具体示例，我们研究 $O(N)$ 模型中 $\\varepsilon$ 展开中高斯和 Wilson-Fisher 不动点处的横盖缺陷。我们将相关的 CFT 数据显式计算为 $p$ 的函数，并发现与标准缺陷不同，通用 $p$ 不存在位移和倾斜算子。\n\n它们提供了没有精确边际算子的缺陷共形流形的示例。", "authors": [{"name": "Nadav Drukker"}, {"name": "Shota Komatsu"}, {"name": "Anders Wallberg"}], "featured_authors": [{"name": "Nadav Drukker"}, {"name": "Shota Komatsu"}, {"name": "Anders Wallberg"}], "author_count": 3}, {"id": "2604.19881", "category": "hep-th", "title": "Weyl Anomaly Coefficients of Holographic Defect CFTs at Weak and Strong Coupling", "abstract": "We determine the type-A Weyl anomaly coefficient $b$, associated with the intrinsic scalar curvature of the defect, for the class of holographically realised co-dimension two defect CFTs (dCFTs) introduced in arXiv: 2506.14505 and arXiv: 2512.14853 . At strong coupling, we employ the dual D5-brane solutions in Euclidean signature, where the defect is supported on an $S^2$ submanifold of the Euclidean $AdS_3\\times S^1$ boundary. At weak coupling, we use the classical solutions of the ${\\cal N}=4$ SYM equations of motion, previously conjectured to describe the defects dual to the D5-brane configurations. Notably, the coefficient $b$ is found to be negative in a finite region of parameter space. To our knowledge, this constitutes the first explicit example of an {\\it interacting} unitary dCFT with $b<0$. We also compute the type-B Weyl anomaly coefficients associated with the extrinsic curvature of the defects, first at strong coupling and subsequently at weak coupling. In a certain limit, we find agreement between the weak- and strong-coupling results for both the type-A and type-B anomaly coefficients.", "url": "https://arxiv.org/abs/2604.19881", "type": "理论", "summary": "我们确定了 arXiv: 2506.14505 和 arXiv: 2512.14853 中引入的全息实现的共维二缺陷 CFT (dCFT) 类的 A 型 Weyl 异常系数 $b$，与缺陷的固有标量曲率相关。在强耦合下，我们采用欧几里德签名中的双 D5 膜解决方案，其中缺陷由欧几里德 $AdS_3\\times S^1$ 边界的 $S^2$ 子流形支持。在弱耦合时，我们使用 ${\\cal N}=4$ SYM 运动方程的经典解，先前推测该解用于描述 D5 膜构型的双重缺陷。值得注意的是，在参数空间的有限区域中，系数 $b$ 为负。据我们所知，这是第一个与 $b<0$ 相互作用的酉 dCFT 的明确例子。我们还计算了与缺陷的外在曲率相关的 B 型 Weyl 异常系数，首先在强耦合下，然后在弱耦合下。在一定限度内，我们发现 A 型和 B 型异常系数的弱耦合结果和强耦合结果之间是一致的。", "authors": [{"name": "George Georgiou"}], "featured_authors": [{"name": "George Georgiou"}], "author_count": 1}, {"id": "2604.19885", "category": "hep-th", "title": "On non-relativistic integrable models and 4d SCFTs", "abstract": "We elaborate on the relation between the generalized Schur index of $N=2$ SCFTs in four dimensions and the non-relativistic limit of the elliptic Ruijsenaars-Schneider model. In particular we discuss explicitly how to express generalized Schur indices of theories of class $S$ in terms of elliptic Jack functions. For example, in the $A_1$ case the indices are given naturally in terms of eigenfunctions of the Lamé equation. We use the expression in terms of eigenfunctions to further check the recent observation that the generalized Schur indices of different theories in the Deligne-Cvitanović series can be mapped onto each other. This mapping implies non trivial identities on unrefined sums of eigenfunctions of non-relativistic elliptic Calogero-Moser models associated to different root systems. We claim then that the non-relativistic limits of various integrable models give rise naturally to generalized Schur-like limits of classes of $N=1$ SCFTs. As an example we discuss the relation of the Inozemtsev model, the non relativistic limit of the van Diejen model, and compactifications of the rank $Q$ E-string theory. We argue that in general the ``Schur index'' of $N=1$ $4d$ SCFTs can be understood as being related to the free fermionic limit of a non-relativistic integrable model.", "url": "https://arxiv.org/abs/2604.19885", "type": "理论", "summary": "我们详细阐述了四维 $N=2$ SCFT 的广义 Schur 指数与椭圆 Ruijsenaars-Schneider 模型的非相对论极限之间的关系。特别是，我们明确讨论了如何用椭圆 Jack 函数来表达 $S$ 类理论的广义 Schur 指数。例如，在 $A_1​​$ 情况下，索引自然地根据拉梅方程的本征函数给出。我们使用特征函数的表达式来进一步检查最近的观察结果，即 Deligne-Cvitanović 级数中不同理论的广义 Schur 指数可以相互映射。这种映射意味着与不同根系统相关的非相对论椭圆 Calogero-Moser 模型的本征函数的未细化和的非平凡恒等式。然后我们声称各种可积模型的非相对论极限自然地产生$N=1$ SCFT 类的广义 Schur 式极限。作为一个例子，我们讨论 Inozemtsev 模型的关系、van Diejen 模型的非相对论极限以及秩 $Q$ E 弦理论的紧化。\n\n我们认为，一般来说，$N=1$ $4d$ SCFT 的“舒尔指数”可以理解为与非相对论可积模型的自由费米子极限相关。", "authors": [{"name": "Rotem Ben Zeev"}, {"name": "Anirudh Deb"}, {"name": "Hee-Cheol Kim"}, {"name": "Shlomo S. Razamat"}], "featured_authors": [{"name": "Rotem Ben Zeev"}, {"name": "Anirudh Deb"}, {"name": "Hee-Cheol Kim"}, {"name": "Shlomo S. Razamat"}], "author_count": 4}, {"id": "2604.19920", "category": "hep-th", "title": "Black Hole Interiors as a Laboratory for Time-Dependent Classical Double Copy", "abstract": "The classical double copy provides a powerful bridge between gravity and gauge theory, but its most explicit realizations remain concentrated in stationary or highly symmetric settings. We show that trapped regions of black-hole geometries furnish an exact setting for time-dependent classical double copy. In the static, spherically symmetric case, each trapped interval admits a local single-copy description on the associated Kantowski--Sachs patch that is intrinsically time dependent, although it can be derived from static Kerr--Schild data and does not require knowledge of any exterior black-hole completion. We prove that this class is characterized intrinsically by a distinguished relation between the Kantowski--Sachs scale factors, equivalently by the longitudinal relation \\(p_{\\parallel}=-\\rho\\), and that the Kerr--Schild scalar and single-copy field are uniquely reconstructible from interior cosmological data. Schwarzschild provides the singular benchmark, for which the single-copy electric field diverges along the interior evolution, while the regular Bardeen solution yields a finite single-copy field throughout the trapped region and a smooth extension into a regular static core. The Bardeen core violates the strong energy condition in a compact region, whereas the corresponding single-copy Maxwell field remains regular and satisfies the standard classical energy conditions. We further show that the Bardeen horizon phase structure is encoded in the single-copy scalar. These results identify trapped Kerr--Schild interiors as an exact local laboratory for time-dependent classical double copy.", "url": "https://arxiv.org/abs/2604.19920", "type": "理论", "summary": "经典的双副本在引力和规范理论之间提供了一座强大的桥梁，但其最明确的实现仍然集中在静止或高度对称的设置中。我们表明，黑洞几何形状的捕获区域为依赖时间的经典双拷贝提供了精确的设置。在静态、球对称的情况下，每个捕获区间都承认相关的康托夫斯基-萨克斯补丁上的局部单副本描述，该描述本质上是时间相关的，尽管它可以从静态克尔-希尔德数据中导出，并且不需要任何外部黑洞完成的知识。我们证明这一类的本质特征是康托夫斯基-萨克斯尺度因子之间的显着关系，等效于纵向关系 \\(p_{\\parallel}=-\\rho\\)，并且克尔-希尔德标量场和单拷贝场可以从内部宇宙学数据中唯一地重建。\n\n史瓦西提供了奇异的基准，单拷贝电场沿着内部演化发散，而常规巴丁解在整个捕获区域产生有限的单拷贝场，并平滑延伸到常规静态核心。巴丁核违反了致密区域的强能量条件，而相应的单拷贝麦克斯韦场保持规则并满足标准经典能量条件。我们进一步证明巴丁视界相位结构是用单拷贝标量编码的。这些结果将被困的 Kerr-Schild 内部确定为依赖时间的经典双副本的精确本地实验室。", "authors": [{"name": "Damien A. Easson"}, {"name": "Tucker Manton"}], "featured_authors": [{"name": "Damien A. Easson"}, {"name": "Tucker Manton"}], "author_count": 2}, {"id": "2604.20099", "category": "hep-th", "title": "Geometric Amplitudes: A Covariant Functional Approach for Massless Scalar Theories", "abstract": "Functional geometry is a framework using concepts from geometry to understand the invariance of amplitudes in quantum field theory under a large class of field redefinitions, including those involving derivatives. It is inspired by recursion relations among correlation functions, where higher-point functions depend iteratively upon smaller correlators. Previous work has shown that, with suitable modifications, these correlation functions become covariant under field redefinitions, provided they are evaluated at the physical ``on-shell\" point. In this paper, we show how to further modify correlation functions in massless scalar field theories to achieve ``off-shell\" covariance. We investigate the conditions required for the framework to work and discuss the geometric interpretation of this construction -- which prioritizes the covariant transformation of observables under field redefinitions over the role of a metric tensor and its derivatives. While analogous modifications may exist for massive theories, we show that framework developed here does not extend straightforwardly to that case.", "url": "https://arxiv.org/abs/2604.20099", "type": "理论", "summary": "泛函几何是一个框架，使用几何概念来理解量子场论中在一大类场重新定义（包括涉及导数的场重新定义）下的振幅不变性。它受到相关函数之间的递归关系的启发，其中较高点的函数迭代地依赖于较小的相关器。先前的工作表明，通过适当的修改，这些相关函数在场重新定义下变得协变，只要它们在物理“壳内”点进行评估。在本文中，我们展示了如何进一步修改无质量标量场理论中的相关函数以实现“离壳”协变。我们研究了该框架工作所需的条件，并讨论了这种构造的几何解释——它优先考虑场重新定义下可观测量的协变变换，而不是度量张量及其导数的作用。虽然大规模理论可能存在类似的修改，但我们表明这里开发的框架并不能直接扩展到这种情况。", "authors": [{"name": "Antonio Delgado"}, {"name": "Adam Martin"}, {"name": "Runqing Wang"}], "featured_authors": [{"name": "Antonio Delgado"}, {"name": "Adam Martin"}, {"name": "Runqing Wang"}], "author_count": 3}, {"id": "2604.20165", "category": "hep-th", "title": "Entropy bound and the non-universality of entanglement islands", "abstract": "Entanglement islands resolve the AMPS firewall paradox in a region-dependent manner by modifying the entanglement wedge of Hawking radiation. We investigate whether this resolution can be made universal, in the sense that a single compact island serves as a common interior support for all AMPS-relevant radiation regions. We show that such a construction is obstructed under reasonable assumptions. Universality forces an accumulation of interior partner entropy within a fixed compact region, which at late times exceeds the Bekenstein--Hawking bound set by its boundary area. However, a valid island realization for at least one radiation region requires compatibility with semiclassical entropy bounds. This leads to a contradiction, yielding a conditional no-go result for universal compact islands. Our result implies that interior reconstruction in the island framework must remain intrinsically region-dependent.", "url": "https://arxiv.org/abs/2604.20165", "type": "理论", "summary": "纠缠岛通过修改霍金辐射的纠缠楔形，以区域相关的方式解决了 AMPS 防火墙悖论。我们研究这一解决方案是否可以通用，即单个紧凑岛可以作为所有 AMPS 相关辐射区域的共同内部支撑。我们表明，在合理的假设下，这种构造会受到阻碍。普遍性迫使内部伙伴熵在固定的紧凑区域内累积，这在后期超过了由其边界区域设定的贝肯斯坦-霍金界。然而，至少一个辐射区域的有效岛实现需要与半经典熵界兼容。这导致了矛盾，产生了普遍紧凑型岛屿有条件不能通过的结果。我们的结果意味着岛屿框架的内部重建必​​须保持本质上的区域依赖性。", "authors": [{"name": "Naman Kumar"}], "featured_authors": [{"name": "Naman Kumar"}], "author_count": 1}, {"id": "2604.20170", "category": "hep-th", "title": "Computational Cosmic Censorship", "abstract": "We propose a computational formulation of weak cosmic censorship in AdS/CFT. Using the complexity=action proposal, we evaluate the Wheeler-DeWitt action for overcharged Reissner- Nordström-AdS spacetimes containing naked timelike singularities. We show that the bulk, null, and joint contributions remain finite, while the Gibbons-Hawking-York term at the singularity diverges. More generally, for any static and spherically symmetric geometry with near-origin scaling $f(r)\\sim a r^{-p}$, the singularity term diverges whenever $p>D-3$. This implies divergent holographic complexity and, even relative to the logarithmically divergent extremal charged sector, leaves an infinite complexity gap. This suggests an operational form of censorship: naked singularities are excluded not by geometry alone, but by an infinite computational cost arising from their local near-singularity structure.", "url": "https://arxiv.org/abs/2604.20170", "type": "理论", "summary": "我们提出了 AdS/CFT 中弱宇宙审查的计算公式。使用复杂性=动作建议，我们评估了包含裸类时奇点的过度加载的 Reissner-Nordström-AdS 时空的 Wheeler-DeWitt 动作。我们证明，整体贡献、零贡献和联合贡献仍然是有限的，而奇点处的吉本斯-霍金-约克项则发散。更一般地，对于具有近原点缩放 $f(r)\\sim a r^{-p}$ 的任何静态和球对称几何体，每当 $p>D-3$ 时奇点项就会发散。这意味着发散的全息复杂性，甚至相对于对数发散的极值带电扇区，也会留下无限的复杂性差距。这表明了一种审查制度的操作形式：裸奇点不仅被几何形状所排除，而且还被其局部近奇点结构产生的无限计算成本所排除。", "authors": [{"name": "Fuat Berkin Altunkaynak"}], "featured_authors": [{"name": "Fuat Berkin Altunkaynak"}], "author_count": 1}, {"id": "2604.20377", "category": "hep-th", "title": "Off-shell recursion for all-loop planar integrands in Yang-Mills theory", "abstract": "In this letter, we focus on the application of the off-shell recursion method proposed in \\cite{Tao:2025fch} in the Yang-Mills planar loop integrands, which starts with solving the classical equation of motion via the perturbiner method. Following the recursion steps, we point out that the pure gluon sector of the planar loop integrands can be written in matrix formalism. This matrix formalism not only makes the off-shell structure of the Yang-Mills planar integrands clearer, but also has potential use in finding amplitude relations at higher-loop levels. Furthermore, we add the ghost contribution and write down the whole recursion step of the Yang-Mills planar loop integrands with ghost contributions. Finally, we consider the 2-loop planar integrand recursion as a special case and conclude a recursion strategy in this case.", "url": "https://arxiv.org/abs/2604.20377", "type": "理论", "summary": "在这封信中，我们重点关注 \\cite{Tao:2025fch} 中提出的离壳递归方法在 Yang-Mills 平面循环被积函数中的应用，该方法首先通过扰动器方法求解经典运动方程。经过递归步骤，我们指出平面循环被积函数的纯胶子扇区可以用矩阵形式写出。这种矩阵形式不仅使杨-米尔斯平面被积函数的壳外结构更加清晰，而且在寻找更高环路级别的振幅关系方面具有潜在用途。此外，我们添加了幽灵贡献并写下了带有幽灵贡献的Yang-Mills平面循环被积函数的整个递归步骤。最后，我们将二循环平面被积函数递归视为一种特殊情况，并得出这种情况下的递归策略。", "authors": [{"name": "Yi-Xiao Tao"}], "featured_authors": [{"name": "Yi-Xiao Tao"}], "author_count": 1}, {"id": "2604.20418", "category": "hep-th", "title": "The phase diagram of confining holographic theories on constant curvature manifolds in the presence of a $θ$-angle", "abstract": "Large families of confining holographic QFTs, described by Einstein-Dilaton gravity, are considered on constant-curvature manifolds in the presence of a $\\theta$-angle. The space of ground states of such theories is explored as a function of the UV parameters, namely the dimensionless curvature and the $\\theta$ angle. The free energy is computed, and the phase structure is determined. For constant negative curvature manifolds, we find solutions dual to single QFTs as well as solutions describing interfaces. The single QFTs exhibit an infinite family of saddle points, with the leading one dominating the gravitational path integral and no phase transitions present. For constant positive curvature manifolds, like de Sitter, the ($\\theta$-angle, curvature) phase diagram exhibits both first and second order phase transitions, as a function of the class of theories considered. We also show that when $\\theta=0$, a holographic Vafa-Witten-like theorem can be proven.", "url": "https://arxiv.org/abs/2604.20418", "type": "理论", "summary": "由爱因斯坦-膨胀引力描述的约束全息 QFT 大族被认为是在存在 $\\theta$ 角的常曲率流形上。这种理论的基态空间被探索为 UV 参数的函数，即无量纲曲率和 $\\theta$ 角。计算自由能，并确定相结构。对于恒定负曲率流形，我们找到了单 QFT 的对偶解以及描述界面的解。单个 QFT 表现出无限的鞍点族，其中领先的鞍点支配着引力路径积分，并且不存在相变。对于恒定正曲率流形，如德西特，（$\\theta$-角度，曲率）相图表现出一阶和二阶相变，作为所考虑的理论类别的函数。我们还表明，当 $\\theta=0$ 时，可以证明全息 Vafa-Witten 类定理。", "authors": [{"name": "Ahmad Ghodsi"}, {"name": "Elias Kiritsis"}, {"name": "Francesco Nitti"}], "featured_authors": [{"name": "Ahmad Ghodsi"}, {"name": "Elias Kiritsis"}, {"name": "Francesco Nitti"}], "author_count": 3}, {"id": "2604.20442", "category": "hep-th", "title": "Complex scaling approach to quasinormal modes of Schwarzschild and Reissner--Nordström black holes", "abstract": "We study black-hole quasinormal modes by applying the complex scaling method (CSM) to the perturbation equations of Schwarzschild and Reissner--Nordström black holes. The method converts the outgoing-wave boundary condition into a non-Hermitian eigenvalue problem, allowing quasinormal-mode frequencies to be computed within a common spectral framework. We first benchmark the method for the Schwarzschild Regge--Wheeler equation and then extend it to the Reissner--Nordström family, including the extremal limit. Our results show that CSM provides a unified and flexible approach to the computation of black-hole quasinormal frequencies.", "url": "https://arxiv.org/abs/2604.20442", "type": "理论", "summary": "我们通过将复标度法 (CSM) 应用于 Schwarzschild 和 Reissner-Nordström 黑洞的微扰方程来研究黑洞准正态模式。该方法将出射波边界条件转换为非厄米特征值问题，从而允许在公共频谱框架内计算准正规模频率。我们首先对 Schwarzschild Regge-Wheeler 方程的方法进行基准测试，然后将其扩展到 Reissner-Nordström 方程组，包括极值极限。我们的结果表明，CSM 为计算黑洞准正常频率提供了一种统一且灵活的方法。", "authors": [{"name": "Shoya Ogawa"}, {"name": "Takuya Hirose"}, {"name": "Okuto Morikawa"}], "featured_authors": [{"name": "Shoya Ogawa"}, {"name": "Takuya Hirose"}, {"name": "Okuto Morikawa"}], "author_count": 3}, {"id": "2604.20498", "category": "hep-th", "title": "Anisotropic drag force in finite-density QGP from charged rotating 5D black holes", "abstract": "We study the drag force acting on a heavy quark in a holographic plasma with rotational anisotropy and finite density. The bulk dual is the CCLP black hole of five-dimensional minimal gauged supergravity, characterised by two independent rotation parameters and electric charge. In the neutral Kerr--AdS limit, we use the principal Killing string to obtain an exact drag force for arbitrary rotation parameters. The resulting force is purely tangential but generically anisotropic, reducing to the viscous form only in the equal-spin sector. We then analyse stationary strings in the charged CCLP background perturbatively in the slow-rotation regime. A regularity analysis of the Lorentzian worldsheet fixes the angular integration constants that would otherwise remain ambiguous, yielding a finite renormalised transverse drag force with a smooth Kerr--AdS limit. We al
