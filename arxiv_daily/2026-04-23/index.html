so show that, in the equal-spin sector, worldsheet regularity selects a unique co-rotating equilibrium quark and compute its renormalised free-energy shift.", "url": "https://arxiv.org/abs/2604.20498", "type": "理论", "summary": "我们研究了具有旋转各向异性和有限密度的全息等离子体中作用于重夸克的阻力。大块对偶是五维最小规范超引力的CCLP黑洞，其特征是两个独立的旋转参数和电荷。在中性 Kerr--AdS 极限中，我们使用主要的 Killing string 来获得任意旋转参数的精确阻力。产生的力是纯切向的，但一般是各向异性的，仅在等自旋扇区中减少到粘性形式。然后，我们在慢速旋转状态下对带电 CCLP 背景中的静止弦进行扰动分析。洛伦兹世界表的正则性分析修复了角积分常数，否则这些角积分常数将保持模糊，从而产生具有平滑 Kerr-AdS 极限的有限重正化横向阻力。我们还表明，在等自旋区域中，世界面正则性选择一个独特的同向旋转平衡夸克并计算其重正化自由能位移。", "authors": [{"name": "Sergei G. Ovchinnikov"}], "featured_authors": [{"name": "Sergei G. Ovchinnikov"}], "author_count": 1}, {"id": "2604.20584", "category": "hep-th", "title": "Generalized BPS magnetic monopoles in inhomogeneous Yang-Mills-Higgs models", "abstract": "We present a non-Abelian model for magnetic monopoles in inhomogeneous media, based on a generalization of the standard 't~Hooft-Polyakov model. The medium is described by spatially dependent couplings in the gauge and scalar sectors, constrained by $P(|\\Phi|,r)M(|\\Phi|,r)=1$ so that the Bogomol'nyi-Prasad-Sommerfield (BPS) bound is preserved. For static spherically symmetric configurations, we study the first-order monopole equations for the class of generalized permeabilities $M(H,r)=f(r)/H^\\alpha$. For the power-law profile $f(r)=r^\\beta$, we determine the domain in the $(\\alpha,\\beta)$ plane where regular BPS solutions exist. On the line $\\alpha=1$, the system becomes exactly integrable, with closed-form monopole solutions in an inhomogeneous background. Away from this analytical sector, the solutions are constructed numerically. The model supports a rich spectrum of configurations, including effectively point-like monopoles, compact-core monopoles, hollow monopoles, shell-like structures, and multi-shell monopoles characterized by multiple concentric peaks in the energy density.", "url": "https://arxiv.org/abs/2604.20584", "type": "理论", "summary": "我们基于标准 't~Hooft-Polyakov 模型的推广，提出了非均匀介质中磁单极子的非阿贝尔模型。介质通过规范扇区和标量扇区中的空间相关耦合来描述，并受 $P(|\\Phi|,r)M(|\\Phi|,r)=1$ 约束，以便保留 Bogomol'nyi-Prasad-Sommerfield (BPS) 界限。对于静态球对称配置，我们研究广义磁导率 $M(H,r)=f(r)/H^\\alpha$ 类的一阶单极方程。对于幂律分布 $f(r)=r^\\beta$，我们确定 $(\\alpha,\\beta)$ 平面中存在常规 BPS 解的域。在 $\\alpha=1$ 线上，系统变得完全可积，在非均匀背景下具有封闭形式的单极子解。远离这个分析部分，解决方案是通过数值构建的。该模型支持丰富的配置，包括有效的点状单极子、紧凑核心单极子、空心单极子、壳状结构和以能量密度的多个同心峰为特征的多壳单极子。", "authors": [{"name": "Filipe Rodrigues da Silva"}, {"name": "Azadeh Mohammadi"}], "featured_authors": [{"name": "Filipe Rodrigues da Silva"}, {"name": "Azadeh Mohammadi"}], "author_count": 2}, {"id": "2604.20619", "category": "hep-th", "title": "Stochastic Krylov Dynamics: Revisiting Operator Growth in Open Quantum Systems", "abstract": "In closed quantum systems, Krylov complexity admits a geometric description; operator growth is equivalent to Hamiltonian flow in an emergent phase space whose structure is fixed by the Lanczos coefficients. We show that this picture survives, albeit in a fundamentally altered form, once the system is coupled to an this http URL a Schwinger-Keldysh formulation of the full counting statistics of the Krylov position, we derive an effective action for operator growth under Lindblad dynamics. Even for the minimal case of dephasing, the phase-space dynamics ceases to be Hamiltonian; environmental coupling generates diffusion in the variable conjugate to Krylov depth, converting deterministic trajectories in to stochastic ones. The hyperbolic mechanism underlying exponential complexity growth is therefore broadened and, beyond a parametrically controlled scale, this http URL identifies dissipation as a relevant perturbation of the chaotic Krylov fixed point and reveals operator growth in open systems as a problem of stochastic dynamics in an emergent phase space.", "url": "https://arxiv.org/abs/2604.20619", "type": "理论", "summary": "在封闭量子系统中，克雷洛夫复杂性允许几何描述；算子增长相当于涌现相空间中的哈密顿流，其结构由 Lanczos 系数固定。我们证明这张图片仍然存在，尽管形式发生了根本性的改变，一旦系统耦合到这个 http URL（Krylov 位置的完整计数统计的 Schwinger-Keldysh 公式），我们就可以在 Lindblad 动力学下得出算子增长的有效动作。即使对于相移的最小情况，相空间动力学也不再是哈密顿量；环境耦合在与克雷洛夫深度的变量共轭中产生扩散，将确定性轨迹转换为随机轨迹。因此，指数复杂性增长背后的双曲机制得到了扩展，并且超出了参数控制的范围，该 http URL 将耗散识别为混沌 Krylov 不动点的相关扰动，并将开放系统中的算子增长揭示为涌现相空间中的随机动力学问题。", "authors": [{"name": "Arpan Bhattacharyya"}, {"name": "S. Shajidul Haque"}, {"name": "Jeff Murugan"}, {"name": "Mpho Tladi"}, {"name": "Hendrik J.R. Van Zyl"}], "featured_authors": [{"name": "Arpan Bhattacharyya"}, {"name": "S. Shajidul Haque"}, {"name": "Jeff Murugan"}, {"name": "Mpho Tladi"}, {"name": "Hendrik J.R. Van Zyl"}], "author_count": 5}, {"id": "2604.20663", "category": "hep-th", "title": "Towering Gravitons in AdS$_3$/CFT$_2$", "abstract": "BPS states in holographic CFTs are usually classified into supergravitons, namely BPS fluctuations around empty AdS, and black-hole microstates, which appear above an energy threshold. In AdS$_3$/CFT$_2$, however, this picture is incomplete because of additional degrees of freedom, called singletons, associated with boundary diffeomorphisms. We present a general procedure for extending the BPS spectrum of supergravitons by dressing them with singletons, thereby defining a generalized, gravity-sector Hilbert space that admits decomposition into affine multiplets of the full superconformal algebra. This extends the procedure previously proposed in arXiv:2505.14888 which was applicable only at low levels, by removing that limitation. We apply the new procedure to the D1-D5 CFT ${\\rm Sym}^N(T^4)$ and explicitly construct affine multiplets in the gravity sector for the $N=2$ theory up to level $h=2$. We find that, at the free orbifold point, the gravity-sector spectrum agrees with the CFT up to $h=\\frac12$. Upon turning on a deformation, however, states at $h=1$ lift and the agreement improves to $h=\\frac32$. Interestingly, the lifting occurs between states in the gravity sector, involving mixtures of supergravitons and singletons, and stringy states. We conjecture that, upon deformation, the gravity-sector Hilbert space becomes the monotone Hilbert space while its complement becomes the fortuitous Hilbert space.", "url": "https://arxiv.org/abs/2604.20663", "type": "理论", "summary": "全息 CFT 中的 BPS 状态通常分为超引力子（即空 AdS 周围的 BPS 波动）和黑洞微状态（出现在能量阈值以上）。然而，在 AdS$_3$/CFT$_2$ 中，由于存在与边界微分同胚相关的额外自由度（称为单例），该图并不完整。我们提出了一种通过用单例来扩展超引力子的 BPS 谱的一般过程，从而定义一个广义的重力扇形希尔伯特空间，该空间允许分解为完整超共形代数的仿射多重态。通过消除该限制，这扩展了先前在 arXiv:2505.14888 中提出的程序，该程序仅适用于低级别。我们将新过程应用于 D1-D5 CFT ${\\rm Sym}^N(T^4)$，并在 $N=2$ 理论的重力扇区中明确构造仿射多重态，直至 $h=2$ 水平。我们发现，在自由轨道点，重力扇形谱与 CFT 一致，直到 $h=\\frac12$。然而，在打开变形后，$h=1$ 升力状态，协议改进为 $h=\\frac32$。\n\n有趣的是，提升发生在重力区域的状态之间，涉及超引力子和单子的混合以及弦状态。我们推测，在变形后，重力扇形希尔伯特空间变成单调希尔伯特空间，而它的补集变成偶然希尔伯特空间。", "authors": [{"name": "Marcel R. R. Hughes"}, {"name": "Kohei Jin"}, {"name": "Daiki Matsumoto"}, {"name": "Leon Miyahara"}, {"name": "Masaki Shigemori"}], "featured_authors": [{"name": "Marcel R. R. Hughes"}, {"name": "Kohei Jin"}, {"name": "Daiki Matsumoto"}, {"name": "Leon Miyahara"}, {"name": "Masaki Shigemori"}], "author_count": 5}, {"id": "2604.20674", "category": "hep-th", "title": "Wall-crossing of Instantons on the Blow-up", "abstract": "We study the instanton counting in four dimensional $\\mathcal{N}=2$ supersymmetric gauge theories on the blow-up of $\\mathbb{C}^2$: we start by formulating the instanton moduli space as a quiver variety, which we regularise by introducing two stability parameters, thus endowing it with a structure of infinitely many chambers separated by walls. Within a given chamber, we formulate the instanton partition function as a contour integral, which can be evaluated using the Jeffrey-Kirwan residue prescription. We characterise the physically relevant contributions in terms of bipartite oriented graphs and show that they can more efficiently be classified in terms of combinatorial objects called super-partitions. Within a given chamber, only certain types of super-partitions contribute and we show that the corresponding selection criteria are equivalent to stability conditions that have previously been proposed in the literature. We use this formalism to compare how the instanton counting changes when moving across walls between neighbouring chambers and provide explicit expressions for the corresponding partition functions. In a limiting chamber and using our approach, we show how to reproduce the Nakajima-Yoshioka blow-up formula.", "url": "https://arxiv.org/abs/2604.20674", "type": "理论", "summary": "我们研究了$\\mathbb{C}^2$爆炸时四维$\\mathcal{N}=2$超对称规范理论中的瞬子计数：我们首先将瞬子模空间表示为颤动变体，通过引入两个稳定性参数对其进行正则化，从而赋予其无限多个由墙壁隔开的室的结构。在给定的室内，我们将瞬子配分函数公式化为轮廓积分，可以使用 Jeffrey-Kirwan 剩余处方进行评估。我们用二分图来描述物理相关的贡献，并表明它们可以更有效地根据称为超级分区的组合对象进行分类。在给定的室内，只有某些类型的超级分区起作用，我们表明相应的选择标准相当于文献中先前提出的稳定性条件。我们使用这种形式来比较瞬子计数在相邻室之间穿过墙壁时的变化，并为相应的配分函数提供显式表达式。\n\n在限制室中并使用我们的方法，我们展示了如何重现 Nakajima-Yoshioka 爆炸公式。", "authors": [{"name": "Baptiste Filoche"}, {"name": "Stefan Hohenegger"}, {"name": "Taro Kimura"}], "featured_authors": [{"name": "Baptiste Filoche"}, {"name": "Stefan Hohenegger"}, {"name": "Taro Kimura"}], "author_count": 3}, {"id": "2604.20767", "category": "hep-th", "title": "Gravity mediated entanglement of phonons in Bose-Einstein condensates", "abstract": "The eigenstates of two test-masses (where each test-mass is placed inside of a harmonic trap) separated by a distance, can get entangled where gravity acts as the mediator of entanglement and it has been argued in \\href{ this https URL }{ arXiv:2511.07348 [quant-ph]} that this entanglement of masses cannot be generated without the underlying quantum nature of gravity. In this work, we consider two non-relativistic Bose-Einstein condensates (formed inside of harmonic trap potentials with identical trapping frequencies) separated by a distance. We take a linearized quantum gravity model and investigate the generation of entanglement while gravitons serve as the mediator of entanglement. The entanglement is generated between the phonon modes of the two condensates, and we observe that for very low separation distance, the entanglement generated is significantly higher than that observed for the quantum gravity induced entanglement of masses or QGEM protocol; however, the fall of entanglement is faster than the two-particle case for two separated Bose-Einstein condensates. We observe that when the number of particles in the condensate is increased, the degree of entanglement for a smaller separation distance becomes substantially higher compared to the case discussed in \\href{ this https URL }{Phys. Rev. D 105 (2022) 106028}, which allows for a more robust experimental proposal using this quantum gravity induced entanglement of phonons or QGEP protocol.", "url": "https://arxiv.org/abs/2604.20767", "type": "理论", "summary": "相距一定距离的两个测试质量（其中每个测试质量放置在谐波陷阱内）的本征态可能会在重力充当纠缠调解者的情况下发生纠缠，并且在 \\href{ this https URL }{ arXiv:2511.07348 [quant-ph]} 中已经提出，如果没有重力的潜在量子性质，就无法生成这种质量纠缠。在这项工作中，我们考虑两个相隔一定距离的非相对论性玻色-爱因斯坦凝聚体（在具有相同捕获频率的谐波陷阱电势内部形成）。我们采用线性化量子引力模型，研究了引力子作为纠缠中介时纠缠的产生。两种凝聚体的声子模式之间产生纠缠，我们观察到，对于非常低的分离距离，产生的纠缠明显高于量子引力引起的质量纠缠或 QGEM 协议所观察到的纠缠；然而，对于两个分离的玻色-爱因斯坦凝聚体，纠缠的下降速度比双粒子情况要快。\n\n我们观察到，当凝结水中的粒子数量增加时，与 \\href{ 此 https URL }{Phys. Rev. D 105 (2022) 106028}，它允许使用量子引力引起的声子纠缠或 QGEP 协议提出更稳健的实验建议。", "authors": [{"name": "Soham Sen"}, {"name": "Sunandan Gangopadhyay"}, {"name": "Vlatko Vedral"}], "featured_authors": [{"name": "Soham Sen"}, {"name": "Sunandan Gangopadhyay"}, {"name": "Vlatko Vedral"}], "author_count": 3}, {"id": "2604.20839", "category": "hep-th", "title": "Beyond Hagedorn: A Harmonic Approach to $T\\bar{T}$-deformation", "abstract": "We apply harmonic analysis to study the $T\\bar{T}$-deformed torus partition function. We first express the CFT partition functions in terms of Maass waveforms, including the Eisenstein series and cusp forms. These basis functions turn out to deform in a very simple way under the $T\\bar{T}$-deformation. The spectral decomposition provides a numerically stable and efficient method to compute the partition function at finite values of the deformation parameter $\\lambda$, allowing us to clearly resolve the analytic structure of the partition function as a function of $\\lambda$. The resulting deformed partition function exhibits a Hagedorn singularity. Building on harmonic analysis approach, we propose a natural analytic continuation beyond the Hagedorn singularity, which enables us to compute the full partition function for any value of $\\lambda$.", "url": "https://arxiv.org/abs/2604.20839", "type": "理论", "summary": "我们应用调和分析来研究 $T\\bar{T}$ 变形环面配分函数。我们首先用 Maass 波形来表达 CFT 配分函数，包括爱森斯坦级数和尖点形式。这些基函数在 $T\\bar{T}$ 变形下以非常简单的方式变形。谱分解提供了一种数值稳定且有效的方法来计算变形参数 $\\lambda$ 有限值处的配分函数，使我们能够清楚地将配分函数的解析结构解析为 $\\lambda$ 的函数。由此产生的变形配分函数表现出哈格多恩奇点。基于调和分析方法，我们提出了超越哈格多恩奇点的自然解析延拓，这使我们能够计算任意 $\\lambda$ 值的完整配分函数。", "authors": [{"name": "Jie Gu"}, {"name": "Jue Hou"}, {"name": "Yunfeng Jiang"}], "featured_authors": [{"name": "Jie Gu"}, {"name": "Jue Hou"}, {"name": "Yunfeng Jiang"}], "author_count": 3}, {"id": "2604.20061", "category": "math-ph", "title": "Predictivity and Utility of Neural Surrogates of Multiscale PDEs", "abstract": "Scientific machine learning is increasingly being spoken of as universal emulators for classical numerical solvers for multi-scale partial differential equations, but most apparent successes can be explained by facts that also define their limits. Many successful benchmarks live on low-dimensional solution manifolds where any competent reduced model will interpolate well. More fundamentally, neural surrogates systematically under-resolve high-frequency content due to spectral bias, and coarse-graining compounds this problem through irreversible information loss. In many multi-scale problems, no architecture or training procedure can fully recover what the coarse representation discards. Two simple examples are used to characterize spectral bias, coarse-graining and error accumulation. We discuss why medium-range weather prediction on reanalysis data sits in a favorable sweet spot and why this will not generalize to genuinely chaotic multi-scale scenarios. We identify domains where neural surrogates offer genuine value, propose further research on neural-classical hybrids, and call for better reporting standards.", "url": "https://arxiv.org/abs/2604.20061", "type": "理论", "summary": "科学机器学习越来越多地被视为多尺度偏微分方程经典数值求解器的通用模拟器，但最明显的成功可以用也定义其局限性的事实来解释。许多成功的基准测试都基于低维解流形，任何有效的简化模型都可以很好地进行插值。更根本的是，由于频谱偏差，神经代理系统地解析高频内容，而粗粒度通过不可逆的信息丢失加剧了这个问题。在许多多尺度问题中，没有任何体系结构或训练过程可以完全恢复粗略表示丢弃的内容。使用两个简单的例子来描述频谱偏差、粗粒度和误差累积的特征。我们讨论了为什么再分析数据的中期天气预报处于有利的最佳位置，以及为什么这不能推广到真正混乱的多尺度场景。我们确定神经替代品提供真正价值的领域，提出对神经经典混合体的进一步研究，并呼吁更好的报告标准。", "authors": [{"name": "Karthik Duraisamy"}], "featured_authors": [{"name": "Karthik Duraisamy"}], "author_count": 1}, {"id": "2604.20187", "category": "math-ph", "title": "Quantitative Direct Sampling for Initial Acoustic Sources", "abstract": "This paper addresses the challenge of quantitatively reconstructing initial acoustic sources from time-dependent wave measurements. We introduce novel indicator functions defined through spacetime integrals of acoustic data and carefully designed auxiliary functions. These indicators are foundational for both proving the uniqueness of source reconstruction and developing a quantitative direct sampling scheme. Our comprehensive numerical experiments demonstrate the robustness, accuracy, and computational efficiency of these methods, highlighting their potential for practical acoustic imaging applications.", "url": "https://arxiv.org/abs/2604.20187", "type": "理论", "summary": "本文解决了从瞬态波测量中定量重建初始声源的挑战。我们引入了通过声学数据的时空积分定义的新颖指示函数和精心设计的辅助函数。这些指标是证明源重建的独特性和开发定量直接采样方案的基础。我们全面的数值实验证明了这些方法的稳健性、准确性和计算效率，突出了它们在实际声学成像应用中的潜力。", "authors": [{"name": "Xiaodong Liu"}, {"name": "Xianchao Wang"}], "featured_authors": [{"name": "Xiaodong Liu"}, {"name": "Xianchao Wang"}], "author_count": 2}, {"id": "2604.20359", "category": "math-ph", "title": "Direct construction of scalar quantum fields by L{é}vy fields -- nontrivial exact Wightman fields in a wider field with a relaxed Gårding-Wightman Axioms-", "abstract": "This paper introduces partial results, in the current situation, of ongoing considerations corresponding to the above title. A construction on exact relativistic quantum field model with the space time dimension $d \\in {\\mathbb N}$, including the case where $d \\geq 4$, is going to be discussed. Firstly, Hermitian scalar quantum fields $<{\\cal H}, U, \\psi, D>$, within a relaxed framework of the Gårding-Wightman Axioms, is constructed by making use of the stochastic calculus arguments with respect to the {\\it{stationary additive random fields }} on ${\\mathbb R}^d$, i.e., the {\\it{L{é}vy random fields}} on ${\\mathbb R}^d$. The first constructed $<{\\cal H}, U, \\psi, D>$, here, satisfy all the requirements of the the Gårding-Wightman Axioms, except that the field operators $\\psi (f)$ with $f \\in {\\cal S}({\\mathbb R}^d \\to {\\mathbb R})$ are symmetric operators on the physical Hilbert space ${\\cal H}$, which situation is denoted here as {\\it{a relaxed framework}} of the Gårding-Wightman Axioms. Secondly, by taking the adequate subspaces of ${\\cal H}$, non trivial exact Wightman quantum fields, which satisfy all the requirements of the Gårding-Wightman Axioms, are constructed actually. keywords: Axiomatic quantum field theory, Gårding-Wightman axioms, Bochner-Minlos theorem, L{é}vy fields on ${\\mathbb R}^d$.", "url": "https://arxiv.org/abs/2604.20359", "type": "理论", "summary": "本文介绍了当前情况下与上述标题相对应的持续考虑的部分结果。将讨论时空维度 $d \\in {\\mathbb N}$ 的精确相对论量子场模型的构造，包括 $d \\geq 4$ 的情况。首先，在 Gårding-Wightman 公理的宽松框架内，厄米标量量子场 $<{\\cal H}, U, \\psi, D>$ 是通过利用关于 ${\\mathbb R}^d$ 上的 {\\it{stationary 加性随机场 }} 的随机微积分参数来构造的，即 ${\\mathbb 上的 {\\it{L{é}vy 随机场}} R}^d$。第一个构造的 $<{\\cal H}, U, \\psi, D>$ 满足 Gårding-Wightman 公理的所有要求，除了域运算符 $\\psi (f)$ 和 $f \\in {\\cal S}({\\mathbb R}^d \\to {\\mathbb R})$ 是物理希尔伯特空间 ${\\cal H}$ 上的对称运算符，这种情况在这里表示为 {\\it{a Gårding-Wightman 公理的宽松框架}}。其次，通过取${\\cal H}$的充分子空间，实际构造了满足Gårding-Wightman公理所有要求的非平凡精确怀特曼量子场。\n\n关键词：公理量子场论、Gårding-Wightman 公理、Bochner-Minlos 定理、${\\mathbb R}^d$ 上的 L{é}vy 场。", "authors": [{"name": "Sergio Albeverio"}, {"name": "Suji Kawasaki"}, {"name": "Yumi Yahagi"}, {"name": "Minoru W. Yoshida"}], "featured_authors": [{"name": "Sergio Albeverio"}, {"name": "Suji Kawasaki"}, {"name": "Yumi Yahagi"}, {"name": "Minoru W. Yoshida"}], "author_count": 4}, {"id": "2604.20453", "category": "math-ph", "title": "Generalised Langevin Dynamics: Significance and Limitations of the Projection Operator Formalism", "abstract": "We discuss some mathematical aspects of the Mori-Zwanzig projection operator formalism. The core of the Mori-Zwanzig formalism is the generalised Langevin equation, which is typically derived from the Dyson-Duhamel identity. We derive the projection operator formalism for Mori's projection by means of semigroup theory, and we illustrate where rigorous methods fail for the case of Zwanzig's projection. For bounded perturbations of the time-evolution operator (e.g. for Mori's projection), the Dyson-Duhamel identity coincides with the variation of constants formula. For unbounded perturbations (e.g. for Zwanzigs's projection), the Dyson-Duhamel identity should be considered an equation for the orthogonal dynamics, for which the existence of unique solutions has yet to be established. Then we recall that all properties of Mori's generalised Langevin equation follow directly from the well-posedness of Volterra equations, irrespective of the projection operator formalism. Further, we discuss the use of Mori's generalised Langevin equation as a coarse-grained model. Finally, we illustrate that the memory term is a coupling term that is not necessarily related to memory. To this end, we introduce projections onto subspaces of 'fast' and 'slow' variables that are associated with the spectral decomposition of skew-adjoint operators. For these projections, the memory term vanishes.", "url": "https://arxiv.org/abs/2604.20453", "type": "理论", "summary": "我们讨论 Mori-Zwanzig 投影算子形式主义的一些数学方面。 Mori-Zwanzig 形式主义的核心是广义 Langevin 方程，该方程通常源自 Dyson-Duhamel 恒等式。我们通过半群理论推导了 Mori 投影的投影算子形式，并说明了严格方法在 Zwanzig 投影情况下失败的地方。对于时间演化算子的​​有界扰动（例如 Mori 投影），Dyson-Duhamel 恒等式与常数变分公式一致。对于无界扰动（例如 Zwanzigs 投影），Dyson-Duhamel 恒等式应被视为正交动力学方程，其唯一解的存在性尚未确定。然后我们回想一下，Mori 广义 Langevin 方程的所有性质都直接源自 Volterra 方程的适定性，而与投影算子形式无关。此外，我们还讨论了使用 Mori 的广义 Langevin 方程作为粗粒度模型。最后，我们说明记忆项是一个耦合项，与记忆没有必然的关系。\n\n为此，我们引入了与斜伴随算子的谱分解相关的“快”和“慢”变量子空间的投影。对于这些预测，记忆项消失了。", "authors": [{"name": "Christoph Widder"}, {"name": "Tanja Schilling"}], "featured_authors": [{"name": "Christoph Widder"}, {"name": "Tanja Schilling"}], "author_count": 2}, {"id": "2604.20465", "category": "math-ph", "title": "Superintegrable 2D systems in magnetic fields with a parabolic type integral", "abstract": "We consider the problem on the existence of two dimensional superintegrable systems in the presence of a magnetic field in the two dimensional Euclidean space. We assume the existence of two integrals of motion, besides the Hamiltonian, that are quadratic polynomials in the momenta. This problem was already studied in the cases where one integral is of Cartesian or polar type [J. Bérubé, and P. Winternitz, J. Math. Phys., 45(5): 1959-1973, 2004]. We continue the investigation by assuming that one of the integrals is of parabolic type and the second integral is of elliptic or (''non-standard'') parabolic type, confirming so far that, on the Euclidean plane, the only two dimensional superintegrable system with quadratic integrals is the one with constant magnetic field and constant electrostatic potential.", "url": "https://arxiv.org/abs/2604.20465", "type": "理论", "summary": "我们考虑二维欧几里德空间中存在磁场时二维超可积系统的存在性问题。我们假设除了哈密顿量之外还存在两个运动积分，它们是动量的二次多项式。这个问题已经在一个积分是笛卡尔或极坐标类型的情况下进行了研究[J. Bérubé，P. Winternitz，J. Math。物理学，45(5)：1959-1973，2004]。我们继续研究，假设其中一个积分是抛物线型，第二个积分是椭圆形或（“非标准”）抛物线型，到目前为止确认，在欧几里得平面上，唯一具有二次积分的二维超可积系统是具有恒定磁场和恒定静电势的系统。", "authors": [{"name": "Tatiana Ekelchik"}, {"name": "Antonella Marchesiello"}], "featured_authors": [{"name": "Tatiana Ekelchik"}, {"name": "Antonella Marchesiello"}], "author_count": 2}, {"id": "2604.20525", "category": "math-ph", "title": "A semiclassical approach to spectral estimates for random Landau Schrodinger operators", "abstract": "We prove spectral properties for random Landau Schrödinger operators on $L^2(\\mathbb{R}^2)$ with bounded, random potentials supported in a square $\\Lambda_L \\subset \\mathbb{R}^2$ of side length $L>0$, using semiclassical pseudodifferential calculus. The semiclassical parameter $h$ is the inverse of the magnetic field strength $B > 0$. By means of the Grushin method, we are led to the analysis of an effective Hamiltonian on $L^2 (\\mathbb{R})$, the principal term of which is a sum of certain compact, self-adjoint pseudodifferential operators. By analyzing these operators, we prove semiclassical Wegner and Minami estimates for the random Landau Schrodinger operator in energy intervals in the spectral bands around each Landau level.", "url": "https://arxiv.org/abs/2604.20525", "type": "理论", "summary": "我们使用半经典伪微分微积分证明了 $L^2(\\mathbb{R}^2)$ 上随机朗道薛定谔算子的谱属性，其具有边长 $L>0$ 的方形 $\\Lambda_L \\subset \\mathbb{R}^2$ 中支持的有界随机势。半经典参数 $h$ 是磁场强度 $B > 0$ 的倒数。借助 Grushin 方法，我们分析了 $L^2 (\\mathbb{R})$ 上的有效哈密顿量，其主要项是某些紧凑的自伴伪微分算子的和。通过分析这些算子，我们证明了随机朗道薛定谔算子在每个朗道能级周围谱带的能量区间内的半经典韦格纳和米纳米估计。", "authors": [{"name": "D.Borthwick"}, {"name": "S.Eswarathasan"}, {"name": "P. D. Hislop"}], "featured_authors": [{"name": "D.Borthwick"}, {"name": "S.Eswarathasan"}, {"name": "P. D. Hislop"}], "author_count": 3}, {"id": "2604.20541", "category": "math-ph", "title": "The Tentacles Landscape", "abstract": "Zhang and Strogatz [Phys. Rev. Lett. 127, 194101 (2021)] used high-dimensional simulations to argue that basins of attraction in the Kuramoto ring are octopus-like: their volume scales as $e^{-kq^2}$ in the winding number $q$, nearly all of it concentrated in filamentary tentacles rather than near the attractor. They conjecture this geometry to be common in high dimensions but note that high-dimensional simulations are unreliable. We prove every feature of the octopus picture rigorously for identical oscillators on a ring coupled by any smooth odd function strictly increasing on $(-\\pi,\\pi)$.", "url": "https://arxiv.org/abs/2604.20541", "type": "理论", "summary": "张和斯特罗加茨[物理学。莱特牧师。 127, 194101 (2021)]使用高维模拟来论证仓本环中的吸引盆是章鱼状的：它们的体积在缠绕数$q$中按$e^{-kq^2}$缩放，几乎全部集中在丝状触手中而不是吸引子附近。他们推测这种几何形状在高维中很常见，但指出高维模拟是不可靠的。我们严格证明了章鱼图的每个特征，对于环上的相同振荡器，与任何在 $(-\\pi,\\pi)$ 上严格递增的平滑奇函数耦合。", "authors": [{"name": "Pablo Groisman"}], "featured_authors": [{"name": "Pablo Groisman"}], "author_count": 1}, {"id": "2604.20635", "category": "math-ph", "title": "Variational Principles for Shock Dynamics in Compressible Euler Flows", "abstract": "Hamilton's principle plays a central role in fluid mechanics as a fundamental tool for deriving governing equations, analyzing conservation laws, and designing structure-preserving numerical schemes. However, its classical formulation is restricted to smooth solutions and does not directly accommodate shock discontinuities. Addressing this limitation within a variational framework has long been a challenging issue. In this paper, we develop a variational framework that extends Hamilton's principle to shock solutions in compressible fluid dynamics. For the barotropic Euler equations, we introduce a modified action principle that incorporates additional contributions localized at discontinuities. This allows the Rankine--Hugoniot conditions for mass and momentum to emerge directly from unrestricted variations, without imposing continuity across shocks. The additional term admits a natural interpretation as a dissipation potential, linking the variational structure to energy loss at shocks. We then extend the approach to the full compressible Euler equations. Using a variational formulation of nonequilibrium thermodynamics together with suitable variational and phenomenological constraints, we recover the Rankine--Hugoniot relations for mass, momentum, and energy. This yields a unified variational description of shock dynamics in compressible fluids and highlights a fundamental distinction between barotropic and full compressible models in the treatment of energy and entropy at discontinuities.", "url": "https://arxiv.org/abs/2604.20635", "type": "理论", "summary": "汉密尔顿原理在流体力学中发挥着核心作用，是推导控制方程、分析守恒定律和设计结构保持数值方案的基本工具。然而，其经典公式仅限于平滑解决方案，并且不能直接适应冲击不连续性。在变分框架内解决这一限制长期以来一直是一个具有挑战性的问题。在本文中，我们开发了一个变分框架，将汉密尔顿原理扩展到可压缩流体动力学中的冲击解。对于正压欧拉方程，我们引入了一种改进的作用原理，该原理结合了位于不连续处的额外贡献。这使得质量和动量的兰金-于贡尼奥条件可以直接从不受限制的变化中出现，而不需要在冲击之间强加连续性。附加项允许自然解释为耗散势，将变分结构与冲击时的能量损失联系起来。然后我们将该方法扩展到完全可压缩欧拉方程。\n\n使用非平衡热力学的变分公式以及适当的变分和唯象约束，我们恢复了质量、动量和能量的朗肯-雨贡尼关系。这产生了可压缩流体中冲击动力学的统一变分描述，并强调了正压模型和完全可压缩模型在处理不连续处的能量和熵方面的根本区别。", "authors": [{"name": "François Gay-Balmaz"}, {"name": "Cheng Yang"}], "featured_authors": [{"name": "François Gay-Balmaz"}, {"name": "Cheng Yang"}], "author_count": 2}, {"id": "2604.20654", "category": "math-ph", "title": "Absence of Ballistic Transport in Quantum Walks with Asymptotically Reflecting Sites", "abstract": "We prove general sufficient conditions for zero velocity in position dependent one-dimensional quantum walks, and hence for the absence of ballistic transport. Our starting point is a general a priori upper bound on the velocity, formulated in terms of sparse bi-infinite sequences of sites, their gap structure, and the corresponding local coin parameters. This estimate yields several deterministic criteria for zero velocity that depend only on the behavior of suitable coin entries along selected subsequences and are independent of the values of the coins elsewhere. We also discuss the random case as an application of the general approach. All of our results remain valid in the CMV setting.", "url": "https://arxiv.org/abs/2604.20654", "type": "理论", "summary": "我们证明了位置相关的一维量子行走中零速度的一般充分条件，因此不存在弹道输运。我们的出发点是速度的一般先验上限，根据稀疏双无限序列、它们的间隙结构和相应的局部硬币参数来制定。该估计产生了零速度的几个确定性标准，这些标准仅取决于沿着选定子序列的合适硬币条目的行为，并且独立于其他地方的硬币的值。我们还讨论随机情况作为一般方法的应用。我们所有的结果在 CMV 设置中仍然有效。", "authors": [{"name": "Houssam Abdul-Rahman"}, {"name": "Thomas A. Jackson"}, {"name": "Yousef Salah"}], "featured_authors": [{"name": "Houssam Abdul-Rahman"}, {"name": "Thomas A. Jackson"}, {"name": "Yousef Salah"}], "author_count": 3}, {"id": "2604.19814", "category": "quant-ph", "title": "Quantum Integrated High-Performance Computing: Foundations, Architectural Elements and Future Directions", "abstract": "High-performance computing (HPC) has evolved over decades through multiple architectural transitions, from vector supercomputers to massively parallel CPU clusters and GPU-accelerated systems, continuously expanding the frontier of scientific discovery. With the emergence of quantum processing units (QPUs) as practical computational accelerators, a new opportunity arises to further extend this trajectory by integrating quantum and classical computing paradigms. This paper presents Quantum Integrated High-Performance Computing (QHPC), a visionary architectural framework that unifies CPUs, GPUs, FPGAs, and QPUs as first-class heterogeneous resources. We propose a layered system design comprising unified resource management, quantum-aware scheduling, hybrid workflow orchestration, middleware and programming abstraction, interconnect technologies, and a tiered execution model enabling seamless workload partitioning across classical and quantum backends. A central aspect of our vision is a strong user requests abstraction layer that exposes heterogeneous resources through a unified job submission interface, similar in spirit to existing schedulers such as Slurm, allowing users to describe workloads in a consistent template independent of underlying compute type or location. Drawing insights from prior accelerator integration eras, we outline how QHPC can support emerging workloads in quantum chemistry, materials discovery, combinatorial optimization, and climate modeling. We conclude by highlighting open challenges in building scalable, reliable, and programmable quantum-classical infrastructures that seamlessly connect global users to heterogeneous compute resources for future quantum-classical HPC ecosystems.", "url": "https://arxiv.org/abs/2604.19814", "type": "理论+数值", "summary": "高性能计算 (HPC) 经历了数十年的多次架构转变，从矢量超级计算机到大规模并行 CPU 集群和 GPU 加速系统，不断扩展科学发现的前沿。随着量子处理单元（QPU）作为实用计算加速器的出现，出现了通过集成量子和经典计算范例来进一步扩展这一轨迹的新机会。本文提出了量子集成高性能计算 (QHPC)，这是一种将 CPU、GPU、FPGA 和 QPU 统一为一流异构资源的富有远见的架构框架。我们提出了一种分层系统设计，包括统一资源管理、量子感知调度、混合工作流程编排、中间件和编程抽象、互连技术以及分层执行模型，支持跨经典后端和量子后端的无缝工作负载分区。\n\n我们愿景的一个核心方面是强大的用户请求抽象层，它通过统一的作业提交接口公开异构资源，其精神类似于 Slurm 等现有调度程序，允许用户在独立于底层计算类型或位置的一致模板中描述工作负载。借鉴之前加速器集成时代的见解，我们概述了 QHPC 如何支持量子化学、材料发现、组合优化和气候建模领域的新兴工作负载。最后，我们强调了构建可扩展、可靠和可编程的量子经典基础设施的开放挑战，这些基础设施将全球用户无缝连接到未来量子经典 HPC 生态系统的异构计算资源。", "authors": [{"name": "Suman Raj"}, {"name": "Siva Sai"}, {"name": "Yogesh Simmhan"}, {"name": "Kyle Chard"}, {"name": "Rajkumar Buyya"}], "featured_authors": [{"name": "Suman Raj"}, {"name": "Siva Sai"}, {"name": "Yogesh Simmhan"}, {"name": "Kyle Chard"}, {"name": "Rajkumar Buyya"}], "author_count": 5}, {"id": "2604.19853", "category": "quant-ph", "title": "Quantum $f$-divergences via Nussbaum-Szkoła Distributions in Semifinite von Neumann Algebras", "abstract": "In this article, we prove that the quantum $f$-divergence between two normal states on a semifinite von~Neumann algebra is equal to the classical $f$-divergence between two corresponding classical states, which are called Nussbaum-Szkoła distributions. This result has been proved by the second named author and T.C.~John for normal states on the von~Neumann algebra $\\mathbb{B}(\\mathscr{H})$ of all bounded operators on a Hilbert space $\\mathscr{H}$. We extend their result for normal states on any semifinite von~Neumann algebra, not only $\\mathbb{B}(\\mathscr{H})$.", "url": "https://arxiv.org/abs/2604.19853", "type": "理论", "summary": "在本文中，我们证明半有限冯诺依曼代数上两个正常态之间的量子 $f$ 散度等于两个相应经典态之间的经典 $f$ 散度，称为 Nussbaum-Szkoła 分布。这个结果已被第二作者和 T.C.~John 证明，适用于希尔伯特空间 $\\mathscr{H}$ 上所有有界算子的 von~Neumann 代数 $\\mathbb{B}(\\mathscr{H})$ 的正规态。我们将其结果扩展到任何半有限冯诺依曼代数上的正常状态，而不仅仅是 $\\mathbb{B}(\\mathscr{H})$。", "authors": [{"name": "Theodoros Anastasiadis"}, {"name": "George Androulakis"}], "featured_authors": [{"name": "Theodoros Anastasiadis"}, {"name": "George Androulakis"}], "author_count": 2}, {"id": "2604.19862", "category": "quant-ph", "title": "Bootstrapping Open Quantum Many-body Systems with Absorbing Phase Transitions", "abstract": "We demonstrate that combining the positivity of density matrices with steady-state conditions yields a systematic bootstrap method for studying open quantum many-body systems governed by Lindblad master equations on infinite lattices, which exhibit absorbing phase transitions. As a concrete example, we apply this method to the quantum contact process with an absorbing state. We obtain bootstrap bounds on steady-state expectation values, the critical coupling, certain ratios of expectation values in the nontrivial steady state in the supercritical phase, and the Liouvillian spectral gap in the subcritical phase.", "url": "https://arxiv.org/abs/2604.19862", "type": "理论", "summary": "我们证明，将密度矩阵的正性与稳态条件相结合，产生了一种系统的引导方法，用于研究由无限晶格上的 Lindblad 主方程控制的开放量子多体系统，该系统表现出吸收相变。作为一个具体的例子，我们将该方法应用于具有吸收态的量子接触过程。我们获得了稳态期望值的自举界、临界耦合、超临界相中非平凡稳态中期望值的某些比率以及亚临界相中的刘维尔谱间隙。", "authors": [{"name": "Minjae Cho"}, {"name": "Colin Oscar Nancarrow"}, {"name": "Petar Tadić"}, {"name": "Yuan Xin"}], "featured_authors": [{"name": "Minjae Cho"}, {"name": "Colin Oscar Nancarrow"}, {"name": "Petar Tadić"}, {"name": "Yuan Xin"}], "author_count": 4}, {"id": "2604.19871", "category": "quant-ph", "title": "Co-Designing Error Mitigation and Error Detection for Logical Qubits", "abstract": "Near-term quantum workloads demand error management, yet the two lightest-weight techniques, Quantum Error Detection (QED) and Probabilistic Error Cancellation (PEC), have complementary cost profiles whose joint architectural design space remains unexplored. QED encodes logical qubits and discards error-flagged runs, filtering noise with low qubit overhead but leaving residual errors; PEC can correct these in software, but at exponential cost in noise strength. If QED efficiently reduces per-gate noise, PEC's cost savings can outweigh QED's discard overhead; realizing this, however, requires solving two system-level design challenges. First, the \\textit{QED interval} -- how often detection cycles are inserted -- is a tunable architectural parameter governing the cost-accuracy tradeoff. We derive an efficiency condition and show that the canonical one-cycle-per-gate frequency does not achieve break-even in any code we evaluate, while optimized intervals on high-rate Iceberg codes do. Second, we discover that naive PEC+QED integration \\textit{degrades} accuracy below the QED-only baseline. The root cause is a transient error profile in the first detection cycle that corrupts PEC's noise model. We develop \\textit{steady-state extraction}, a co-designed characterization protocol that isolates steady-state error behavior, reducing estimation bias by up to $10.2\\times$. On a $[[6,4,2]]$ Iceberg code running QAOA ($p{=}4$--$8$) with a fixed shot budget, PEC+QED achieves $2$--$11\\times$ lower absolute error and up to $31\\times$ lower MSE versus PEC on physical qubits, with per-interval savings compounding over interval depth.", "url": "https://arxiv.org/abs/2604.19871", "type": "理论+数值", "summary": "近期量子工作负载需要错误管理，然而量子错误检测（QED）和概率错误消除（PEC）这两种最轻量级的技术具有互补的成本概况，其联合架构设计空间仍未得到探索。 QED 对逻辑量子位进行编码并丢弃带有错误标记的运行，以较低的量子位开销过滤噪声，但会留下残余错误； PEC 可以在软件中纠正这些问题，但噪声强度呈指数级下降。如果 QED 有效降低每门噪声，PEC 节省的成本可以超过 QED 的丢弃开销；然而，实现这一点需要解决两个系统级设计挑战。首先，\\textit{QED 间隔}（插入检测周期的频率）是一个可调节的架构参数，用于控制成本与准确性的权衡。我们得出了一个效率条件，并表明，在我们评估的任何代码中，规范的每门一个周期频率都无法实现收支平衡，而高速率 Iceberg 代码上的优化间隔则可以实现收支平衡。其次，我们发现朴素的 PEC+QED 集成 \\textit{降低} 精度低于仅 QED 基线。\n\n根本原因是第一个检测周期中的瞬态错误配置文件破坏了 PEC 的噪声模型。我们开发了 \\textit{稳态提取}，这是一种共同设计的表征协议，可以隔离稳态误差行为，将估计偏差减少高达 10.2\\times$。在使用固定射击预算运行 QAOA ($p{=}4$--$8$) 的 $[[6,4,2]]$ Iceberg 代码上，与物理量子位上的 PEC 相比，PEC+QED 实现了 $2$--$11\\times 的绝对误差降低和高达 $31\\times$ 的 MSE 降低，并且每个间隔的节省随着间隔深度的增加而增加。", "authors": [{"name": "Rohan S. Kumar"}, {"name": "Takahiro Tsunoda"}, {"name": "Sophia H. Xue"}, {"name": "Dantong Li"}, {"name": "Robert J. Schoelkopf"}, {"name": "Yongshan Ding"}], "featured_authors": [{"name": "Rohan S. Kumar"}, {"name": "Takahiro Tsunoda"}, {"name": "Sophia H. Xue"}, {"name": "Dantong Li"}, {"name": "Robert J. Schoelkopf"}, {"name": "Yongshan Ding"}], "author_count": 6}, {"id": "2604.19889", "category": "quant-ph", "title": "Quantum-to-Classical Computability Transition via Negative Markov Chains", "abstract": "We develop a recently introduced representation of quantum dynamics based on sampling negative Markov chain processes. By introducing particles and antiparticles, this formalism maps generic quantum dynamics onto a Markov process defined over an exponentially large configuration space. Within this framework, quantum complexity arises from the proliferation of stochastic particles, which ultimately renders classical simulation and sampling intractable beyond a certain timescale. In the presence of noise, we demonstrate that for any unitary evolution generated by a linear combination of local or pairwise interactions, there exists at least one noise channel that effectively classicalizes the system by suppressing particle growth and making Monte Carlo sampling efficient. As a corollary, we show that for this class of unitaries, the dynamics of an open quantum spin chain subject to depolarizing noise undergoes an exact transition to classical simulability once the noise strength exceeds a critical threshold which can be efficiently determined for any model.", "url": "https://arxiv.org/abs/2604.19889", "type": "理论+数值", "summary": "我们开发了一种最近引入的基于采样负马尔可夫链过程的量子动力学表示。通过引入粒子和反粒子，这种形式将通用量子动力学映射到在指数级大配置空间上定义的马尔可夫过程。在这个框架内，量子复杂性源于随机粒子的扩散，这最终使得经典模拟和采样在超过一定时间尺度后变得难以处理。在存在噪声的情况下，我们证明，对于由局部或成对相互作用的线性组合生成的任何单一演化，至少存在一个噪声通道，该噪声通道可以通过抑制粒子生长并使蒙特卡罗采样高效来有效地对系统进行经典化。作为推论，我们表明，对于此类幺正，一旦噪声强度超过可以为任何模型有效确定的临界阈值，受去极化噪声影响的开放量子自旋链的动力学就会精确过渡到经典可模拟性。", "authors": [{"name": "Hugo Lóio"}, {"name": "Jacopo De Nardis"}, {"name": "Tony Jin"}], "featured_authors": [{"name": "Hugo Lóio"}, {"name": "Jacopo De Nardis"}, {"name": "Tony Jin"}], "author_count": 3}, {"id": "2604.19944", "category": "quant-ph", "title": "The influence of evanescent waves on the nature of optical cooperative effects in atomic ensembles in a waveguide", "abstract": "Based on a consistent quantum microscopic approach, we investigate the peculiarities of collective polyatomic effects in atomic ensembles placed in a waveguide, caused by the presence of evanescent modes of electromagnetic field. We analyze the influence of these modes on the process of cooperative spontaneous decay, as well as on the nature of radiation transfer in the ensembles under consideration. We show that under certain conditions, their influence can be dominant compared to the role of radiation modes, and the mechanism for this influence is the modification of dipole-dipole interatomic interaction.", "url": "https://arxiv.org/abs/2604.19944", "type": "理论", "summary": "基于一致的量子显微镜方法，我们研究了放置在波导中的原子系综中由于电磁场倏逝模式的存在而引起的集体多原子效应的特性。我们分析了这些模式对协同自发衰变过程的影响，以及对所考虑的系综中辐射传输性质的影响。我们表明，在某些条件下，与辐射模式的作用相比，它们的影响可能占主导地位，这种影响的机制是偶极子-偶极子原子间相互作用的改变。", "authors": [{"name": "A. S. Kuraptsev"}, {"name": "I. M. Sokolov"}], "featured_authors": [{"name": "A. S. Kuraptsev"}, {"name": "I. M. Sokolov"}], "author_count": 2}, {"id": "2604.19973", "category": "quant-ph", "title": "Dissipative microcanonical ensemble preparation from KMS-detailed balance", "abstract": "Stationary states of quantum many-body Hamiltonians are invariant under the Hamiltonian evolution. Besides ground and thermal states, this class includes microcanonical ensembles that are of fundamental importance in statistical physics. We consider the preparation of general stationary states by leveraging recent advances in the field of open-system dynamics. In particular, constructions based on exact KMS-detailed balance with respect to Gibbs states of noncommuting Hamiltonians have only recently been proposed as a tool for their efficient preparation and, by extension to small temperatures, for ground state preparation. We extend these constructions to the problem of stationary state preparation, providing general criteria that characterize when such states have efficient implementations, along with specific results on the approximation of microcanonical ensembles. An interesting application of our work are tests of conjectured ensemble equivalences for local observables between microcanonical and Gibbs ensembles.", "url": "https://arxiv.org/abs/2604.19973", "type": "理论", "summary": "量子多体哈密顿量的稳态在哈密顿演化下是不变的。除了基态和热态之外，此类还包括在统计物理学中至关重要的微正则系综。我们考虑利用开放系统动力学领域的最新进展来准备一般稳态。特别是，基于关于非交换哈密顿量吉布斯态的精确 KMS 详细平衡的构造最近才被提出作为其有效制备的工具，并且通过扩展到小温度，用于基态制备。我们将这些构造扩展到稳态准备问题，提供表征此类状态何时具有有效实现的一般标准，以及微正则系综近似的具体结果。我们工作的一个有趣的应用是微正则系综和吉布斯系综之间局部可观测量的猜想系综等价性的检验。", "authors": [{"name": "Anirban N. Chowdhury"}, {"name": "Samuel O. Scalet"}, {"name": "Kunal Sharma"}], "featured_authors": [{"name": "Anirban N. Chowdhury"}, {"name": "Samuel O. Scalet"}, {"name": "Kunal Sharma"}], "author_count": 3}, {"id": "2604.20001", "category": "quant-ph", "title": "Fractional-Time Jaynes-Cummings Model: Unitary Description of its Quantum Dynamics, Inverse Problem and Photon Statistics", "abstract": "We analyze the quantum dynamics of the fractional-time Jaynes-Cummings model using a recent unitary framework for the fractional-time Schrödinger equation. We examine how the fractional derivative order $\\alpha$ influences non-classical features under different initial conditions. For an initial Fock state, fractional evolution introduces transient dynamics and heightened sensitivity to coupling strength. Through an inverse problem approach, we interpret these effects as arising from an effective time-dependent coupling with a strong initial pulse. For an initial coherent state, the fractional order tunes the system between dynamical regimes, with a transition at $\\alpha = 0.50 $ where standard collapse-and-revival is replaced by stable, periodic evolution. This regime enhances non-classical field properties, including stronger sub-Poissonian statistics, periodic quadrature squeezing, and the formation of Schrödinger cat states.", "url": "https://arxiv.org/abs/2604.20001", "type": "理论+数值", "summary": "我们使用分数时间薛定谔方程的最新酉框架来分析分数时间 Jaynes-Cummings 模型的量子动力学。我们研究了分数阶导数阶 $\\alpha$ 在不同初始条件下如何影响非经典特征。对于初始福克状态，分数演化引入了瞬态动力学和对耦合强度的更高敏感性。通过反问题方法，我们将这些效应解释为由与强初始脉冲的有效时间相关耦合引起的。对于初始相干态，分数阶在动态状态之间调整系统，在 $\\alpha = 0.50 $ 处进行过渡，其中标准的崩溃和复兴被稳定的周期性演化所取代。这种机制增强了非经典场特性，包括更强的亚泊松统计、周期性正交压缩以及薛定谔猫态的形成。", "authors": [{"name": "Thiago T. Tsutsui"}, {"name": "Danilo Cius"}, {"name": "Antonio S. M. de Castro"}, {"name": "Fabiano M. Andrade"}], "featured_authors": [{"name": "Thiago T. Tsutsui"}, {"name": "Danilo Cius"}, {"name": "Antonio S. M. de Castro"}, {"name": "Fabiano M. Andrade"}], "author_count": 4}, {"id": "2604.20013", "category": "quant-ph", "title": "Assessing System Capabilities and Bottlenecks of an Early Fault-Tolerant Bicycle Architecture", "abstract": "Early modular fault tolerant quantum computers remain constrained by costly inter-module communication and limited magic state factory service. Understanding such bottlenecks and investigating compiler optimizations most close the gap between algorithm requirements and hardware capabilities is a concrete and practically urgent systems problem. We study the modular architectures based on Bivariate Bicycle codes and identify the dominant bottleneck: inter-module communication induced by non-Clifford operations. We build a compilation pipeline to fill the missing parts of prior works and propose compiler optimizations: synthesizing arbitrary-angle rotations at the factory (syn@fac), transvection based Clifford deferral, and Clifford insertion for critical path duration reduction. We extend the evaluation scope of the prior work to 40+ benchmark categories drawn from PennyLane and MQTBench, including quantum algorithms and Hamiltonian simulations with varying sizes. Under the present instruction cost, syn@fac reduces estimated circuit failure probability by a factor of 9.0 on average across non-Clifford benchmarks. The robustness persists across sweeps of instruction cost ratios, LPU count, and factory count. Besides, transvection reduces Clifford deferral compile time by 77.04\\%, while Clifford insertion reduces end-to-end circuit duration by 11.54\\% on average on MQTBench, with smaller gains on Hamiltonian simulations. We hope this work inspires the studies on compiler optimizations for early modular FTQC systems.", "url": "https://arxiv.org/abs/2604.20013", "type": "理论+数值", "summary": "早期的模块化容错量子计算机仍然受到昂贵的模块间通信和有限的魔法状态工厂服务的限制。了解此类瓶颈并研究编译器优化以最接近算法要求和硬件功能之间的差距是一个具体且实际紧迫的系统问题。我们研究了基于双变量 Bicycle 代码的模块化架构，并确定了主要瓶颈：由非 Clifford 操作引起的模块间通信。我们构建了一个编译管道来填补先前工作的缺失部分，并提出编译器优化：在工厂合成任意角度旋转（syn@fac）、基于横流的 Clifford 延迟以及用于减少关键路径持续时间的 Clifford 插入。我们将之前工作的评估范围扩展到来自 PennyLane 和 MQTBench 的 40 多个基准类别，包括不同规模的量子算法和哈密顿模拟。在目前的指令成本下，syn@fac 在非 Clifford 基准测试中平均将估计电路故障概率降低了 9.0 倍。\n\n在指令成本比率、LPU 数量和工厂数量方面都保持稳健性。此外，横流将 Clifford 延迟编译时间减少了 77.04%，而 Clifford 插入在 MQTBench 上平均将端到端电路持续时间减少了 11.54%，而哈密顿模拟的增益较小。我们希望这项工作能够激发早期模块化 FTQC 系统编译器优化的研究。", "authors": [{"name": "Kun Liu"}, {"name": "Ben Foxman"}, {"name": "Gian-Luca R. Anselmetti"}, {"name": "Yongshan Ding"}], "featured_authors": [{"name": "Kun Liu"}, {"name": "Ben Foxman"}, {"name": "Gian-Luca R. Anselmetti"}, {"name": "Yongshan Ding"}], "author_count": 4}, {"id": "2604.20033", "category": "quant-ph", "title": "Direct U(2) approximation via repeat-until-success circuits", "abstract": "We show how to directly and efficiently approximate arbitrary one-qubit unitaries, bypassing the Euler decomposition and the magnitude approximation problem, at the cost of one ancillary qubit. Our technique also applies to approximating unitaries with multi-qubit gate sets such as Clifford and CS, or Clifford and CCZ, as well as to approximating orthogonal matrices using multi-qubit gate sets such as Real Clifford and CCZ. The key tools are repeat-until-success circuits, lattice-based exact synthesis algorithms, integer point enumeration in convex sets, and relative norm equations.", "url": "https://arxiv.org/abs/2604.20033", "type": "理论+数值", "summary": "我们展示了如何直接有效地近似任意一量子位酉，绕过欧拉分解和幅度近似问题，而代价是一个辅助量子位。我们的技术还适用于使用多量子位门集（例如 Clifford 和 CS，或 Clifford 和 CCZ）来近似酉矩阵，以及使用多量子位门集（例如 Real Clifford 和 CCZ）来近似正交矩阵。关键工具是重复直到成功电路、基于格的精确合成算法、凸集中的整数点枚举以及相对范数方程。", "authors": [{"name": "Vadym Kliuchnikov"}, {"name": "Jendrik Brachter"}, {"name": "Marcus P. da Silva"}], "featured_authors": [{"name": "Vadym Kliuchnikov"}, {"name": "Jendrik Brachter"}, {"name": "Marcus P. da Silva"}], "author_count": 3}, {"id": "2604.20088", "category": "quant-ph", "title": "CVaR-Assisted Custom Penalty Function for Constrained Optimization", "abstract": "Constrained combinatorial optimization problems are frequently reformulated as quadratic unconstrained binary optimization (QUBO) models in order to leverage emerging quantum optimization algorithms such as the Variational Quantum Eigensolver (VQE) and the Quantum Approximate Optimization Algorithm (QAOA). However, standard QUBO formulations enforce inequality constraints through slack variables and quadratic penalties, which can significantly increase the problem size and distort the optimization landscape. In this work, we propose a slack-free penalty formulation for constrained binary optimization that eliminates auxiliary slack variables and preserves the feasibility structure of the original problem. The proposed approach introduces a nonlinear custom penalty function to enforce inequality constraints directly in the objective function. To address the computational challenges associated with evaluating nonlinear penalties in variational quantum algorithms, we employ the finite-sampling method that avoids the exponential complexity required by exact expectation computation. Furthermore, we integrate the Conditional Value-at-Risk (CVaR) objective to improve optimization robustness and guide the search toward high-quality solutions. The proposed framework is evaluated on instances of the multi-dimensional knapsack problem, a classical benchmark in combinatorial optimization. We showcase that the proposed custom-penalty formulation combined with CVaR sampling achieves improved optimality gaps and more consistent performance compared with conventional slack-based QUBO formulations. The results suggest that careful penalty design can play a critical role in enabling quantum and hybrid quantum-classical algorithms for constrained optimization problems that arise in operations research.", "url": "https://arxiv.org/abs/2604.20088", "type": "理论+数值", "summary": "约束组合优化问题经常被重新表述为二次无约束二元优化 (QUBO) 模型，以便利用新兴的量子优化算法，例如变分量子本征求解器 (VQE) 和量子近似优化算法 (QAOA)。然而，标准 QUBO 公式通过松弛变量和二次惩罚来强制不等式约束，这会显着增加问题规模并扭曲优化景观。在这项工作中，我们提出了一种用于约束二元优化的无松弛惩罚公式，消除了辅助松弛变量并保留了原始问题的可行性结构。所提出的方法引入了非线性自定义惩罚函数，以直接在目标函数中强制执行不等式约束。为了解决与评估变分量子算法中的非线性惩罚相关的计算挑战，我们采用有限采样方法，避免了精确期望计算所需的指数复杂性。\n\n此外，我们集成了条件风险价值 (CVaR) 目标，以提高优化鲁棒性并指导搜索高质量的解决方案。所提出的框架在多维背包问题的实例上进行评估，多维背包问题是组合优化的经典基准。我们展示了与传统的基于 slack 的 QUBO 公式相比，所提出的自定义惩罚公式与 CVaR 采样相结合，实现了改进的最优性差距和更一致的性能。结果表明，仔细的惩罚设计可以在使用量子和混合量子经典算法解决运筹学中出现的约束优化问题方面发挥关键作用。", "authors": [{"name": "Xin Wei Lee"}, {"name": "Hoong Chuin Lau"}], "featured_authors": [{"name": "Xin Wei Lee"}, {"name": "Hoong Chuin Lau"}], "author_count": 2}, {"id": "2604.20108", "category": "quant-ph", "title": "Efficient Quantum Algorithms for Higher-Order Coupled Oscillators", "abstract": "Higher-order networks with multiway interactions can exhibit collective dynamical phenomena that are absent in traditional pairwise network models. However, analyzing such dynamics becomes computationally prohibitive as their state space grows combinatorially in the multiway interaction order. Here we develop quantum algorithms for two central tasks -- synchronization estimation and certification of the no-phase-locking regime -- in the simplicial Kuramoto model. This model is a higher-order generalization of the celebrated Kuramoto model for coupled oscillators on graph-based networks. Under explicit assumptions on data access and types, and simplicial structure, we derive end-to-end quantum gate complexities and identify regimes with polynomial quantum advantage for synchronization estimation and super-polynomial quantum advantage for no-phase-locking certification over classical methods. More broadly, these results extend quantum algorithms for higher-order networks from structural analysis to nonlinear dynamical diagnostics, easing a major computational bottleneck and opening a route to quantum methods for probing higher-order phenomena beyond the reach of direct classical approaches.", "url": "https://arxiv.org/abs/2604.20108", "type": "理论+数值", "summary": "具有多路交互的高阶网络可以表现出传统成对网络模型中不存在的集体动态现象。然而，分析此类动力学在计算上变得令人望而却步，因为它们的状态空间以多路交互顺序组合增长。在这里，我们在简单的 Kuramoto 模型中开发了两个中心任务的量子算法——同步估计和无锁相机制的认证。该模型是著名的 Kuramoto 模型的高阶推广，用于基于图的网络上的耦合振荡器。在对数据访问和类型以及简单结构的明确假设下，我们推导了端到端量子门复杂性，并识别了与经典方法相比具有用于同步估计的多项式量子优势和用于无锁相认证的超多项式量子优势的机制。\n\n更广泛地说，这些结果将高阶网络的量子算法从结构分析扩展到非线性动力学诊断，缓解了主要的计算瓶颈，并为探测超出直接经典方法范围的高阶现象的量子方法开辟了道路。", "authors": [{"name": "Caesnan M. G. Leditto"}, {"name": "Angus Southwell"}, {"name": "Muhammad Usman"}, {"name": "Kavan Modi"}], "featured_authors": [{"name": "Caesnan M. G. Leditto"}, {"name": "Angus Southwell"}, {"name": "Muhammad Usman"}, {"name": "Kavan Modi"}], "author_count": 4}, {"id": "2604.20118", "category": "quant-ph", "title": "Complexity of quantum states in the stabilizer formalism", "abstract": "We initiate an investigation into a notion of state complexity for discrete-variable quantum systems. Specifically, we propose an information-theoretic quantifier for the complexity of quantum states within the stabilizer formalism of quantum computation. This is achieved by leveraging the symmetric Jordan product (associated with classicality) and the skew-symmetric Lie product (linked to quantumness) between the square root of the quantum state and the Heisenberg-Weyl displacement operators. We establish the fundamental properties of this quantifier and demonstrate that state complexity is closely related to the nonstabilizerness of quantum states via the $L^4$-norm of their characteristic functions.", "url": "https://arxiv.org/abs/2604.20118", "type": "理论", "summary": "我们开始研究离散变量量子系统的状态复杂性概念。具体来说，我们提出了一种信息论量词，用于量子计算稳定形式中量子态的复杂性。这是通过利用量子态平方根与海森堡-韦尔位移算子之间的对称乔丹积（与经典性相关）和斜对称李积（与量子性相关）来实现的。我们建立了这个量词的基本属性，并通过其特征函数的 $L^4$-范数证明状态复杂性与量子态的非稳定性密切相关。", "authors": [{"name": "Shuangshuang Fu"}, {"name": "Shunlong Luo"}, {"name": "Yue Zhang"}], "featured_authors": [{"name": "Shuangshuang Fu"}, {"name": "Shunlong Luo"}, {"name": "Yue Zhang"}], "author_count": 3}, {"id": "2604.20180", "category": "quant-ph", "title": "Tensor network surrogate models for variational quantum computation", "abstract": "We adopt a two-dimensional tensor-network (TN) ansatz to simulate variational quantum algorithms on two-dimensional qubit architectures, demonstrating its capability to accurately simulate deep circuits through the Quantum Approximate Optimization Algorithm (QAOA) applied to Ising spin-glass problems on heavy-hexagonal and square lattices. For heavy-hexagonal problems with up to three-body interactions, parameters trained on small instances and transferred to systems an order of magnitude larger improve the sampled energy distribution only up to intermediate depths, indicating a fundamental limit of parameter concentration as a transfer strategy. By extending the training itself with TN simulations on larger system sizes, we avoid local minima and obtain lower-energy samples. Analyses of entanglement growth and importance sampling show that the simulation remains classically feasible with moderate bond dimension. We find that parameter concentration also persists on square lattices, albeit at substantially higher computational cost to perform reliable sampling. Overall, our TN framework not only provides an efficient and controlled framework for benchmarking variational quantum algorithms on two-dimensional lattices, but also serves as an effective surrogate model for training variational algorithms.", "url": "https://arxiv.org/abs/2604.20180", "type": "理论+数值", "summary": "我们采用二维张量网络（TN）模拟在二维量子比特架构上模拟变分量子算法，展示了其通过应用于重六方和方形晶格上的伊辛自旋玻璃问题的量子近似优化算法（QAOA）精确模拟深层电路的能力。对于最多三体相互作用的重六边形问题，在小实例上训练的参数并转移到大一个数量级的系统，只能将采样的能量分布改善到中间深度，这表明参数集中作为转移策略的基本限制。通过在更大的系统规模上使用 TN 模拟来扩展训练本身，我们可以避免局部极小值并获得较低能量的样本。对纠缠增长和重要性采样的分析表明，在适度的键维数下，模拟仍然是经典可行的。我们发现参数集中在方形晶格上也持续存在，尽管执行可靠采样的计算成本要高得多。\n\n总的来说，我们的 TN 框架不仅为二维格上的变分量子算法基准测试提供了一个高效且受控的框架，而且还可以作为训练变分算法的有效替代模型。", "authors": [{"name": "Ryo Watanabe"}, {"name": "Dries Sels"}, {"name": "Joseph Tindall"}], "featured_authors": [{"name": "Ryo Watanabe"}, {"name": "Dries Sels"}, {"name": "Joseph Tindall"}], "author_count": 3}, {"id": "2604.20335", "category": "quant-ph", "title": "Interpolating between positive, Schwarz, and completely positive evolution for d-level systems", "abstract": "We study a class of quantum dynamical maps for d-level systems that interpolate between positive, Schwarz, and completely positive evolutions. Our approach is based on a geometric analysis of the parameter space, which reveals the structure of regions corresponding to different positivity classes and their boundaries. We show that dynamical trajectories naturally move across these regions, providing a clear geometric interpretation of transitions between Markovian and non-Markovian regimes. It is shown that within presented class the evolution becomes eventually entanglement breaking. This analysis highlights the role of divisibility and eternally non-Markovian evolution.", "url": "https://arxiv.org/abs/2604.20335", "type": "理论", "summary": "我们研究了一类 d 级系统的量子动力学图，该图在正演化、施瓦茨演化和完全正演化之间进行插值。我们的方法基于参数空间的几何分析，它揭示了与不同积极类别及其边界相对应的区域的结构。我们表明，动态轨迹自然地穿过这些区域，为马尔可夫和非马尔可夫政权之间的转变提供了清晰的几何解释。结果表明，在所呈现的类中，演化最终变成了纠缠断裂。这一分析强调了可分性和永远非马尔可夫进化的作用。", "authors": [{"name": "Dariusz Chruściński"}, {"name": "Farrukh Mukhamedov"}], "featured_authors": [{"name": "Dariusz Chruściński"}, {"name": "Farrukh Mukhamedov"}], "author_count": 2}, {"id": "2604.20338", "category": "quant-ph", "title": "Column Generation for the Optimization of Switching in Repeaterless Quantum Networks", "abstract": "Efficient resource allocation and optical switching promise high key rates, network adaptability, and cost reduction in repeaterless quantum communication networks. However, identifying optimal switching configurations remains a significant challenge due to the combinatorial complexity. We introduce a novel graph formulation to model the physical and logical structure of repeaterless quantum networks, enabling the systematic optimization of switching strategies. The problem is posed as a linear program and solved using a column generation approach. This method enables scalable computation despite the exponential number of possible network configurations. Our results not only provide a formal foundation but also a practical algorithm for the optimization of switching. Empirical tests confirm the solver's scalability with network size, demonstrating the framework's effectiveness and laying the groundwork for future optimization of quantum network control.", "url": "https://arxiv.org/abs/2604.20338", "type": "理论+数值", "summary": "高效的资源分配和光交换保证了无中继量子通信网络的高密钥速率、网络适应性和成本降低。然而，由于组合的复杂性，确定最佳开关配置仍然是一个重大挑战。我们引入了一种新颖的图公式来对无中继量子网络的物理和逻辑结构进行建模，从而实现切换策略的系统优化。该问题被提出为线性​​程序并使用列生成方法来解决。尽管可能的网络配置数量呈指数级增长，但该方法仍可实现可扩展计算。我们的结果不仅为优化切换提供了形式基础，而且提供了实用的算法。实证测试证实了求解器随网络规模的可扩展性，证明了该框架的有效性，并为未来量子网络控制的优化奠定了基础。", "authors": [{"name": "Álvaro Troyano Olivas"}, {"name": "Andrés Agustí Casado"}, {"name": "Hans H. Brunner"}, {"name": "Chi-Hang Fred Fung"}, {"name": "Momtchil Peev"}, {"name": "Laura Ortiz"}, {"name": "Vicente Martin"}], "featured_authors": [{"name": "Álvaro Troyano Olivas"}, {"name": "Andrés Agustí Casado"}, {"name": "Hans H. Brunner"}, {"name": "Momtchil Peev"}, {"name": "Laura Ortiz"}, {"name": "Vicente Martin"}], "author_count": 7}, {"id": "2604.20363", "category": "quant-ph", "title": "Jaynes-Cummings dynamics in strong coupling for many-interacting-qubit quantum Rabi models", "abstract": "The present work focuses on the strong/weak interaction of many-body spin-systems with a cavity mode. It introduces the necessity of redefining the physical conditions determining the strong/weak coupling regime in those systems. In more complex systems, the effective coupling emerging from the collective dynamics may differ indeed from the actual coupling of each individual subsystem with the bosonic field. This is shown by highlighting some counter-intuitive dynamical effects properly related to the coupling regime: a Jaynes-Cummings dynamics emerging although a strong interaction is present. The universality of this result is demonstrated through the analysis of three distinct systems: a two-qubit, a two-qutrit, and an $N$-qubit chain quantum Rabi models.", "url": "https://arxiv.org/abs/2604.20363", "type": "理论", "summary": "目前的工作重点是多体自旋系统与空腔模式的强/弱相互作用。它介绍了重新定义确定这些系统中强/弱耦合状态的物理条件的必要性。在更复杂的系统中，集体动力学产生的有效耦合实际上可能不同于每个单独子系统与玻色子场的实际耦合。这是通过强调一些与耦合机制正确相关的反直觉动力学效应来证明的：尽管存在强相互作用，但仍出现杰恩斯-卡明斯动力学。这一结果的普遍性通过对三个不同系统的分析得到了证明：两个量子位、两个量子位和 $N$ 量子位链量子 Rabi 模型。", "authors": [{"name": "Roberto Grimaudo"}, {"name": "Sagnik Chakraborty"}, {"name": "Rosario Lo Franco"}, {"name": "Giuseppe Falci"}], "featured_authors": [{"name": "Roberto Grimaudo"}, {"name": "Sagnik Chakraborty"}, {"name": "Rosario Lo Franco"}, {"name": "Giuseppe Falci"}], "author_count": 4}, {"id": "2604.20371", "category": "quant-ph", "title": "Level crossings and superradiant quantum phase transition for a two-qutrit quantum Rabi model", "abstract": "A two-qutrit extension of the quantum Rabi model is studied. Despite its increased complexity, the model results to be integrable under specific, physically relevant conditions. This feature allows for the emergence of analytically tractable subdynamics. In this framework, the ground-state phase diagram can be derived, and the analysis reveals critical phenomena linked to both level crossings and quantum phase transitions.", "url": "https://arxiv.org/abs/2604.20371", "type": "理论+数值", "summary": "研究了量子拉比模型的二量子体扩展。尽管其复杂性增加，但该模型在特定的、物理相关的条件下是可积分的。此功能允许出现可分析处理的子动力学。在这个框架中，可以导出基态相图，并且分析揭示了与能级交叉和量子相变相关的关键现象。", "authors": [{"name": "R. Grimaudo"}, {"name": "A. S. M. De Castro"}, {"name": "G. Falci"}, {"name": "A. Messina"}, {"name": "E. Paladino"}, {"name": "A. Messina"}, {"name": "N. V. Vitanov"}], "featured_authors": [{"name": "R. Grimaudo"}, {"name": "A. S. M. De Castro"}, {"name": "G. Falci"}, {"name": "E. Paladino"}, {"name": "A. Messina"}, {"name": "N. V. Vitanov"}], "author_count": 7}, {"id": "2604.20384", "category": "quant-ph", "title": "Hessian-vector products for tensor networks via recursive tangent-state propagation", "abstract": "Optimizing tensor networks with standard first-order methods often leads to slow convergence and entrapment in local minima. Although second-order optimization offers enhanced robustness, explicitly constructing the full Hessian matrix is computationally prohibitive for large-scale systems. In this work, we bypass this bottleneck by introducing an analytical Hessian-vector product kernel designed for arbitrary compositions of linear maps. This two-pass algorithm leverages recursive tangent-state propagation with a bounded virtual bond dimension to guarantee scalability. We demonstrate the practical utility of this kernel by integrating it into a Riemannian trust-region framework for quantum circuit compression. Evaluated on time-evolution circuits for various spin chains, our second-order approach achieves up to a four-order-of-magnitude improvement in fidelity over naive Trotterization, while delivering significantly smoother, faster convergence than conventional first-order methods such as Riemannian ADAM.", "url": "https://arxiv.org/abs/2604.20384", "type": "理论+数值", "summary": "使用标准一阶方法优化张量网络通常会导致收敛缓慢并陷入局部极小值。尽管二阶优化提供了增强的鲁棒性，但显式构建完整的 Hessian 矩阵对于大规模系统来说在计算上是令人望而却步的。在这项工作中，我们通过引入专为线性映射的任意组合而设计的分析 Hessian 向量乘积内核来绕过这个瓶颈。这种两遍算法利用具有有界虚拟键维度的递归切态传播来保证可扩展性。我们通过将其集成到量子电路压缩的黎曼信赖域框架中来展示该内核的实用性。通过对各种自旋链的时间演化电路进行评估，我们的二阶方法在保真度方面比 Naive Trotterization 提高了四个数量级，同时比传统的一阶方法（例如黎曼 ADAM）提供了更平滑、更快的收敛。", "authors": [{"name": "Isabel Nha Minh Le"}, {"name": "Roeland Wiersema"}, {"name": "Christian B. Mendl"}], "featured_authors": [{"name": "Isabel Nha Minh Le"}, {"name": "Roeland Wiersema"}, {"name": "Christian B. Mendl"}], "author_count": 3}, {"id": "2604.20391", "category": "quant-ph", "title": "Nonuniversal beyond-LHY corrections to thermodynamic properties of a weakly interacting Bose gas", "abstract": "We investigate the effects of finite-range interatomic interactions on the equation of state (EoS) of a weakly interacting Bose gas. Within the Cornwall-Jackiw-Tomboulis effective action approach, we show that finite-range effects influence not only the EoS but also the thermodynamic properties of the system at zero temperature, leading to nonuniversal behavior.", "url": "https://arxiv.org/abs/2604.20391", "type": "理论", "summary": "我们研究了有限范围原子间相互作用对弱相互作用玻色气体的状态方程 (EoS) 的影响。在 Cornwall-Jackiw-Tomboulis 有效作用方法中，我们表明有限范围效应不仅影响 EoS，还影响系统在零温度下的热力学性质，从而导致非普适行为。", "authors": [{"name": "Pham Duy Thanh"}, {"name": "Nguyen Van Thu"}], "featured_authors": [{"name": "Pham Duy Thanh"}, {"name": "Nguyen Van Thu"}], "author_count": 2}, {"id": "2604.20432", "category": "quant-ph", "title": "Unitary Realizations of Synchronizing Automata in Quantum Systems", "abstract": "We introduce a quantum analogue of a classical synchronizing automaton. In classical case the state of a system evolves according to a set of rules forming an alphabet, and sequences of these rules, called words, govern its evolution. Certain special words, known as synchronizing words, drive the automaton into a predetermined state regardless of its initial configuration. Although such an apparently irreversible process seems incompatible with the unitarity of quantum mechanics, we present a resetting protocol based on quantum synchronizing words by incorporating auxiliary qubits whose states encode the rules of the automaton's alphabet. These qubits interact with the quantum automaton, whose state is encoded in a qudit, via a global unitary operation. When the qubit register is initially prepared in a state corresponding to a synchronizing word, the automaton evolves into a predetermined pure state independent of its initial state, while the qubit register is transformed into a complex, often entangled, state that encodes information about the automaton's original configuration. The resulting entanglement depends on both the rule set and the automaton's initial state, and we show how specific entangled states can be generated within this framework.", "url": "https://arxiv.org/abs/2604.20432", "type": "理论", "summary": "我们引入经典同步自动机的量子模拟。在经典情况下，系统的状态根据一组形成字母表的规则演化，这些规则的序列（称为单词）控制着系统的演化。某些特殊字（称为同步字）可以将自动机驱动到预定状态，而不管其初始配置如何。尽管这种明显不可逆的过程似乎与量子力学的统一性不相容，但我们通过结合辅助量子位（其状态编码自动机字母表的规则），提出了一种基于量子同步字的重置协议。这些量子位通过全局酉运算与量子自动机交互，量子自动机的状态被编码在 qudit 中。当量子位寄存器最初准备在与同步字相对应的状态时，自动机演变成独立于其初始状态的预定纯状态，而量子位寄存器则转变为复杂的、通常是纠缠的状态，该状态对有关自动机的原始配置的信息进行编码。\n\n由此产生的纠缠取决于规则集和自动机的初始状态，我们展示了如何在该框架内生成特定的纠缠状态。", "authors": [{"name": "Jȩdrzej Stempin"}, {"name": "Jan Wójcik"}, {"name": "Gabriela Banaszak"}, {"name": "Andrzej Grudka"}, {"name": "Marcin Karczewski"}, {"name": "Paweł Kurzyński"}, {"name": "Antoni Wójcik"}], "featured_authors": [{"name": "Jȩdrzej Stempin"}, {"name": "Jan Wójcik"}, {"name": "Gabriela Banaszak"}, {"name": "Marcin Karczewski"}, {"name": "Paweł Kurzyński"}, {"name": "Antoni Wójcik"}], "author_count": 7}, {"id": "2604.20482", "category": "quant-ph", "title": "Valley-Aware Optimal Control of Spin Shuttling Using Cryogenic Integrated Electronics", "abstract": "Electron shuttling is emerging as a key mechanism for enabling long-range coupling in scalable spin-qubit architectures. Bringing shuttling waveform generation into the cryostat can improve scalability, but imposes strict area and power constraints on the control electronics. Concurrently, shuttling in Si/SiGe is further limited by a spatially varying valley splitting that induces spin--valley mixing and degrades coherence. Here, we make three contributions that address these limitations jointly: (i) an end-to-end co-simulation framework that combines disorder-informed valley maps with transistor-level cryogenic circuit simulations including electronic noise; (ii) a fully integrated cryogenic shuttling-signal generator tailored to velocity modulation, enabling period-wise waveform shaping through discrete circuit settings stored in on-chip memory; and (iii) a noise-aware optimization procedure that tunes only these implementable circuit controls, using one of four discrete resistor settings per period, to generate high-fidelity shuttling sequences. Across simulated valley and noise realizations in our co-simulation framework, the optimized velocity-modulation waveforms improve transport performance, achieving an average shuttling fidelity of $99.99 \\pm 0.007\\%$ at $v_{\\mathrm{avg}} = 20~\\mathrm{m\\,s^{-1}}$ over a distance of $10~\\mu\\mathrm{m}$, while maintaining active analog power consumption in the tens of $\\mu\\mathrm{W}$ during shuttling. This validates on-chip storage and replay of optimized control settings as a practical strategy to mitigate valley disorder in scalable shuttling architectures.", "url": "https://arxiv.org/abs/2604.20482", "type": "理论+数值", "summary": "电子穿梭正在成为在可扩展的自旋量子位架构中实现远程耦合的关键机制。将穿梭波形生成引入低温恒温器可以提高可扩展性，但对控制电子设备施加了严格的面积和功率限制。同时，Si/SiGe 中的穿梭进一步受到空间变化的谷分裂的限制，这种分裂会引起自旋谷混合并降低相干性。在这里，我们做出了三个共同解决这些限制的贡献：（i）端到端联合仿真框架，将无序信息谷图与包括电子噪声在内的晶体管级低温电路仿真相结合； (ii) 专为速度调制而定制的完全集成的低温穿梭信号发生器，通过存储在片上存储器中的分立电路设置实现周期波形整形； (iii) 噪声感知优化程序，仅调整这些可实现的电路控制，每个周期使用四个离散电阻器设置之一，以生成高保真穿梭序列。\n\n在我们的联合仿真框架中的模拟谷值和噪声实现中，优化的速度调制波形提高了传输性能，在 $v_{\\mathrm{avg}} = 20~\\mathrm{m\\,s^{-1}}$ 的距离上实现 $99.99 \\pm 0.007\\%$ 的平均穿梭保真度 $10~\\mu\\mathrm{m}$，同时保持有源模拟功耗在数十穿梭期间的$\\mu\\mathrm{W}$。这验证了优化控制设置的片上存储和重放是减轻可扩展穿梭架构中谷值紊乱的实用策略。", "authors": [{"name": "Pau Dietz Romero"}, {"name": "Nermine Chaabani"}, {"name": "Lammert Duipmans"}, {"name": "Alessandro David"}, {"name": "Felix Motzoi"}, {"name": "Stefan van Waasen"}, {"name": "Lotte Geck"}], "featured_authors": [{"name": "Pau Dietz Romero"}, {"name": "Nermine Chaabani"}, {"name": "Lammert Duipmans"}, {"name": "Felix Motzoi"}, {"name": "Stefan van Waasen"}, {"name": "Lotte Geck"}], "author_count": 7}, {"id": "2604.20599", "category": "quant-ph", "title": "Distributed Quantum Optimization for Large-Scale Higher-Order Problems with Dense Interactions", "abstract": "Many real-world problems are naturally formulated as higher-order optimization (HUBO) tasks involving dense, multi-variable interactions, which are challenging to solve with classical methods. Quantum optimization offers a promising route, but hardware constraints and limitations to quadratic formulations have hampered their practicality. Here, we develop a distributed quantum optimization framework (DQOF) for dense, large-scale HUBO problems. DQOF assigns quantum circuits a central role in directly capturing higher-order interactions, while high-performance computing orchestrates large-scale parallelism and coordination. A clustering strategy enables wide quantum circuits without increasing depth, allowing efficient execution on near-term quantum hardware. We demonstrate high-quality solutions for HUBOs up to 500 variables within 170 seconds, significantly outperforming conventional approaches in solution quality and scalability. Applied to optical metamaterial design, DQOF efficiently discovers high-performance structures and shows that higher-order interactions are important for practical optimization problems. These results establish DQOF as a practical and scalable computational paradigm for large-scale scientific optimization.", "url": "https://arxiv.org/abs/2604.20599", "type": "数值", "summary": "许多现实世界的问题自然地被表述为涉及密集、多变量交互的高阶优化（HUBO）任务，这些任务很难用经典方法解决。量子优化提供了一条有前途的途径，但硬件限制和二次公式的限制阻碍了它们的实用性。在这里，我们针对密集、大规模的 HUBO 问题开发了分布式量子优化框架（DQOF）。 DQOF 赋予量子电路直接捕获高阶相互作用的核心作用，而高性能计算则协调大规模并行性和协调性。集群策略可以在不增加深度的情况下实现宽量子电路，从而允许在近期量子硬件上高效执行。我们在 170 秒内展示了多达 500 个变量的 HUBO 高质量解决方案，在解决方案质量和可扩展性方面显着优于传统方法。 DQOF 应用于光学超材料设计，可以有效地发现高性能结构，并表明高阶相互作用对于实际优化问题非常重要。\n\n这些结果将 DQOF 确立为大规模科学优化的实用且可扩展的计算范例。", "authors": [{"name": "Seongmin Kim"}, {"name": "Vincent R. Pascuzzi"}, {"name": "Travis S. Humble"}, {"name": "Thomas Beck"}, {"name": "Sanghyo Hwang"}, {"name": "Tengfei Luo"}, {"name": "Eungkyu Lee"}, {"name": "In-Saeng Suh"}], "featured_authors": [{"name": "Seongmin Kim"}, {"name": "Vincent R. Pascuzzi"}, {"name": "Travis S. Humble"}, {"name": "Tengfei Luo"}, {"name": "Eungkyu Lee"}, {"name": "In-Saeng Suh"}], "author_count": 8}, {"id": "2604.20602", "category": "quant-ph", "title": "Bound, antibound and resonance two-photon states in chiral waveguide QED", "abstract": "We present a theoretical study of the two-particle spectrum $\\omega(K)$ for the chiral waveguide QED setup of an array of two-level atoms directionally interacting with photons propagating along the waveguide. We demonstrate that for each pair center-of-mass momentum $K$ there exist distinct solutions with $\\Im\\omega\\le 0$ in the two-particle spectrum, corresponding to bound, antibound and resonance states, in addition to the continuum of scattering states. Contrary to previous studies, which showed the bound and resonance-state spectra only over a limited range of $K$, the calculated spectrum is consistent across all $K$ values. An interesting finding is that the real part of the spectrum $\\Re \\omega(K)$ in the chiral model is gapless.", "url": "https://arxiv.org/abs/2604.20602", "type": "理论", "summary": "我们对两级原子阵列与沿波导传播的光子定向相互作用的手性波导 QED 设置的双粒子光谱 $\\omega(K)$ 进行了理论研究。我们证明，对于每对质心动量 $K$，除了散射态的连续体之外，在双粒子谱中还存在 $\\Im\\omega\\le 0$ 的不同解，对应于束缚态、反束缚态和共振态。之前的研究显示束缚态和共振态光谱仅在 $K$ 的有限范围内，与此相反，计算出的光谱在所有 $K$ 值上都是一致的。一个有趣的发现是，手性模型中光谱 $\\Re \\omega(K)$ 的实部是无间隙的。", "authors": [{"name": "Alexander Poddubny"}], "featured_authors": [{"name": "Alexander Poddubny"}], "author_count": 1}, {"id": "2604.20639", "category": "quant-ph", "title": "Distributed Quantum-Enhanced Optimization: A Topographical Preconditioning Approach for High-Dimensional Search", "abstract": "Optimization problems become fundamentally challenging as the number of variables increases. Because the volume of the search space grows exponentially, classical algorithms frequently fail to locate the global minimum of non-convex functions. While quantum optimization offers a potential alternative, mapping continuous problems onto near-term quantum hardware introduces severe scaling limits and barren plateaus. To bridge this gap, we propose the Distributed Quantum-Enhanced Optimization (D-QEO) framework. Instead of forcing the quantum processor to find the exact minimum, we use it simply as a topographical preconditioner. The QPU maps the landscape to locate the most promising basin of attraction, generating high-quality seed points for a classical GPU-accelerated solver to refine. To make this approach viable for utility-scale problems, we exploit the mathematical structure of separable functions. This allows us to cut a 50-qubit (i.e., $2^{50}$) global search space into independent and manageable sub-spaces using 5-qubit subcircuits. By executing these fragments concurrently with CUDA-Q, we completely bypass the overhead of cross-register entanglement and classical tensor knitting for separable functions. Benchmarks on the 10-dimensional Rastrigin and Ackley functions show that D-QEO prevents the exponential failure rates observed in purely classical algorithms. Furthermore, this quantum warm-start significantly reduces the number of classical BFGS iterations required to converge, providing a highly practical blueprint for utilizing near-term quantum resources in complex global search.", "url": "https://arxiv.org/abs/2604.20639", "type": "理论+数值", "summary": "随着变量数量的增加，优化问题变得极具挑战性。由于搜索空间的体积呈指数增长，经典算法经常无法找到非凸函数的全局最小值。虽然量子优化提供了一种潜在的替代方案，但将连续问题映射到近期量子硬件上会带来严重的扩展限制和贫瘠的平台。为了弥补这一差距，我们提出了分布式量子增强优化（D-QEO）框架。我们没有强迫量子处理器找到精确的最小值，而是简单地将其用作拓扑预处理器。 QPU 绘制地形图，以定位最有希望的吸引力盆地，生成高质量的种子点，供经典 GPU 加速解算器进行细化。为了使这种方法适用于公用事业规模的问题，我们利用了可分离函数的数学结构。这使我们能够使用 5 量子位子电路将 50 量子位（即 $2^{50}$）全局搜索空间切割成独立且可管理的子空间。\n\n通过与 CUDA-Q 同时执行这些片段，我们完全绕过了可分离函数的跨寄存器纠缠和经典张量编织的开销。 10 维 Rastrigin 和 Ackley 函数的基准测试表明，D-QEO 可以防止在纯经典算法中观察到的指数故障率。此外，这种量子热启动显着减少了收敛所需的经典 BFGS 迭代次数，为在复杂的全局搜索中利用近期量子资源提供了高度实用的蓝图。", "authors": [{"name": "Dominik Soós"}, {"name": "Marc Paterno"}, {"name": "John Stenger"}, {"name": "Nikos Chrisochoides"}], "featured_authors": [{"name": "Dominik Soós"}, {"name": "Marc Paterno"}, {"name": "John Stenger"}, {"name": "Nikos Chrisochoides"}], "author_count": 4}, {"id": "2604.20647", "category": "quant-ph", "title": "Quantum Advantage for Coordinated Frequency Selection Against Distributed Jammers", "abstract": "Consider two parties who want to agree on a common frequency band for communication in the presence of independent jammers. Such jammers block a different subset of bands at each site, where each party can observe only its own set of unjammed bands. Yet, they must agree on a common band without communicating. We first establish the optimal classical strategy, maximizing the probability they output a common frequency band in a single shot. We proceed to show that sharing an entangled pair of local dimension d allows the parties to coordinate strictly better, provided both the number of safe bands d and the spectrum size n are sufficiently large. We study explicit quantum strategies offering a pathway to near-term demonstrations, including an explicit strategy for d = 2 that outperforms the classical optimum for all spectrum sizes, achieving a 5.4% advantage asymptotically (in n) with just one shared Bell pair. Our approach is based on a general framework for constructing quantum strategies from classical spreading sequences via symmetric orthonormalization that may be of independent interest, and opens the door to concrete applications of quantum networks for cognitive radio and spread-spectrum communication.", "url": "https://arxiv.org/abs/2604.20647", "type": "理论", "summary": "考虑两方希望就存在独立干扰器的情况下的通信共用频段达成一致。此类干扰器会在每个站点阻塞不同的频段子集，其中各方只能观察自己的一组未受干扰的频段。然而，他们必须在不进行沟通的情况下就共同频段达成一致。我们首先建立最佳经典策略，最大化它们在单次射击中输出公共频带的概率。我们继续证明，只要安全带的数量 d 和频谱大小 n 足够大，共享一对纠缠的局部维度 d 可以让各方更好地严格协调。我们研究显式量子策略，为近期演示提供了一条途径，包括 d = 2 的显式策略，该策略在所有频谱大小上都优于经典最优，仅使用一对共享贝尔对即可渐近（以 n 为单位）实现 5.4% 的优势。\n\n我们的方法基于一个通用框架，通过对称正交归一化从经典扩频序列构建量子策略，这可能是独立的兴趣，并为认知无线电和扩频通信的量子网络的具体应用打开了大门。", "authors": [{"name": "Stephanie Wehner"}], "featured_authors": [{"name": "Stephanie Wehner"}], "author_count": 1}, {"id": "2604.20680", "category": "quant-ph", "title": "Controllable non-Hermitian topology in a dynamically protected cat qubit", "abstract": "Dissipatively stabilized cat qubits are promising for fault-tolerant quantum information processing, yet their non-Hermitian (NH) spectral topology remains largely unexplored. We uncover rich Liouvillian exceptional structures in a cat-qubit mode stabilized by two-photon drive (TPD) and engineered two-photon loss, in the presence of single-photon drive (SPD) and single-photon loss. In the parameter space spanned by SPD strength and detuning, we identify both second- and third-order Liouvillian exceptional points (LEP2s and LEP3s). Remarkably, we show that the phase $\\theta$ of TPD provides coherent control over these exceptional points: the LEP3 diverges and vanishes at $\\theta=\\pi/2$, while remaining stable and tunable elsewhere. We introduce a topological invariant based on the winding number of a resultant vector, which robustly identifies LEP3s with unit topological charge. Full master-equation simulations confirm that the system dynamics remains confined to the logical subspace with near-unity fidelity. Our results bridge dissipative stabilization, phase-coherent control, and NH topology, demonstrating controllable higher-order LEPs in open quantum systems.", "url": "https://arxiv.org/abs/2604.20680", "type": "理论+数值", "summary": "耗散稳定猫量子位有望用于容错量子信息处理，但其非厄米 (NH) 谱拓扑在很大程度上仍未被探索。我们在单光子驱动（SPD）和单光子损失存在的情况下，通过双光子驱动（TPD）和设计的双光子损失，在猫量子位模式下发现了丰富的刘维尔特殊结构。在 SPD 强度和失谐跨越的参数空间中，我们识别了二阶和三阶刘维尔异常点（LEP2 和 LEP3）。值得注意的是，我们表明 TPD 的相位 $\\theta$ 提供了对这些异常点的一致控制：LEP3 在 $\\theta=\\pi/2$ 处发散并消失，同时在其他地方保持稳定和可调。我们引入了基于合成向量的缠绕数的拓扑不变量，它可以稳健地识别具有单位拓扑电荷的 LEP3。完整的主方程模拟证实系统动力学仍然局限于具有接近统一保真度的逻辑子空间。我们的结果桥接了耗散稳定、相位相干控制和 NH 拓扑，展示了开放量子系统中的可控高阶 LEP。", "authors": [{"name": "Tian-Le Yang"}, {"name": "Pei-Rong Han"}, {"name": "Zhen-Biao Yang"}, {"name": "Shi-Biao Zheng"}], "featured_authors": [{"name": "Tian-Le Yang"}, {"name": "Pei-Rong Han"}, {"name": "Zhen-Biao Yang"}, {"name": "Shi-Biao Zheng"}], "author_count": 4}, {"id": "2604.20756", "category": "quant-ph", "title": "Comment on 'The axiom of choice and the no-signalling principle'", "abstract": "The main claim of arXiv:2206.08467 is that \"functional (deterministic) no-signalling resources can be stronger than probabilistic ones\" a certain nonlocal game on a Bell scenario with countably many parties. We disagree and argue that (i) under standard definitions, deterministic no-signalling resources are always probabilistic no-signalling resources; (ii) the deterministic strategy considered in arXiv:2206.08467 can be promoted to a genuinely probabilistic strategy with similar properties and (iii) a key step in the derivation in arXiv:2206.08467 , claimed to hold for all no-signalling strategies, implicitly assumes measurability, leaving a gap in the argument. We propose measurability assumptions which we conjecture would make this derivation rigorous. Taken together, the phenomenon highlighted in arXiv:22
