torus linearly, whereas in a nonsymmorphic crystal the action is affine and records the extension class of the crystallographic group. Relative to the fixed point-group bundle, the discreteness of the structure group gives a canonical flat Ehresmann connection on the associated torus bundle. The corresponding covariant differential of the translational field is a globally defined object which locally coincides with the ordinary displacement gradient. This covariant differential is then used to formulate the phonon sector as a first-order Lagrangian field theory. When the flat torus holonomy fixes an equilibrium point, linearization about the corresponding covariantly constant section gives the usual local displacement field. For derivative-only quadratic elastic Lagrangians satisfying the standard objectivity condition, the theory reduces locally to linear elasticity and to the standard acoustic phonon spectrum. If such a global equilibrium section does not exist, the same linear theory is understood locally on defect-free simply connected patches.", "url": "https://arxiv.org/abs/2605.09323", "type": "理论", "summary": "声子通常通过选择局部位移场来引入。本文保留了局部描述，但标识了它所代表的全局几何对象。目的不是改变局部声学方程，而是描述固定晶体背景上平移序参数的全局配置空间，并给出位移梯度的全局定义的替代。通过将正交框架丛简化为离散点群来固定晶序的取向部分后，平移序参数被描述为相关环面丛的一部分。在同形晶体中，点群线性地作用于平移环面，而在非同形晶体中，该作用是仿射的，并记录晶体群的可拓类。相对于固定点群丛，结构群的离散性在相关环面丛上给出了规范的平坦埃雷斯曼连接。平移场的相应协变微分是全局定义的对象，其局部与普通位移梯度一致。\n\n然后使用该协变微分将声子扇区公式化为一阶拉格朗日场论。当平坦环面完整性固定平衡点时，有关相应协变常数截面的线性化给出了通常的局部位移场。对于满足标准客观性条件的纯导数二次弹性拉格朗日量，该理论局部简化为线性弹性和标准声子谱。如果这样的全局平衡部分不存在，则在无缺陷简单连接的补片上局部理解相同的线性理论。", "authors": [{"name": "Aleksey Prots"}], "featured_authors": [{"name": "Aleksey Prots"}], "author_count": 1}, {"id": "2605.09605", "category": "math-ph", "title": "Cocycle Actions on Hidden Quantum Markov Models: Symmetry Protection and Topological Order", "abstract": "We develop a symmetry action framework for hidden quantum Markov models (HQMMs) tailored to one-dimensional quantum spin systems and symmetry-protected topological (SPT) phases. In our setting, a symmetry group $G$ acts projectively on the hidden (virtual) degrees of freedom and linearly on the physical observation space, yielding a global HQMM state that is invariant under the combined action of $G$ for both conventional and causal (input--output) structures. We show that such symmetry actions are naturally classified by a group-cohomology $2$-cocycle $[\\omega] \\in H^{2}(G,\\mathrm{U}(1))$, in direct analogy with the standard cohomological classification of one-dimensional bosonic SPT phases via projective edge representations. As an explicit example, we apply this construction to the Affleck--Kennedy--Lieb--Tasaki (AKLT) chain, where the hidden layer carries a nontrivial class $[\\omega] \\in H^{2}(\\mathrm{SO}(3),\\mathrm{U}(1))$ encoding its SPT order. In this case the HQMM formalism reproduces the known SPT properties of the AKLT state while providing a stochastic, Markovian description of the underlying virtual dynamics. Our results establish HQMMs as a natural bridge between quantum stochastic processes, tensor-network descriptions of many-body systems, and symmetry-protected topological order.", "url": "https://arxiv.org/abs/2605.09605", "type": "理论", "summary": "我们开发了一个针对一维量子自旋系统和对称保护拓扑（SPT）相的隐藏量子马尔可夫模型（HQMM）的对称作用框架。在我们的设置中，对称群 $G$ 投影地作用于隐藏的（虚拟）自由度，并线性地作用于物理观察空间，产生一个全局 HQMM 状态，该状态在 $G$ 的组合作用下对于传统结构和因果（输入-输出）结构都是不变的。我们证明，这种对称作用可以自然地通过群上同调 $2$-cocycle $[\\omega] \\in H^{2}(G,\\mathrm{U}(1))$ 进行分类，与通过投影边缘表示的一维玻色子 SPT 相的标准上同调分类直接类比。作为一个明确的例子，我们将此构造应用于 Affleck--Kennedy--Lieb--Tasaki (AKLT) 链，其中隐藏层携带一个非平凡类 $[\\omega] \\in H^{2}(\\mathrm{SO}(3),\\mathrm{U}(1))$ 编码其 SPT 顺序。在这种情况下，HQMM 形式再现了 AKLT 状态的已知 SPT 属性，同时提供了底层虚拟动力学的随机马尔可夫描述。\n\n我们的结果将 HQMM 确立为量子随机过程、多体系统张量网络描述和对称保护拓扑顺序之间的天然桥梁。", "authors": [{"name": "Abdessatar Souissi"}, {"name": "Abdessatar Barhoumi"}], "featured_authors": [{"name": "Abdessatar Souissi"}, {"name": "Abdessatar Barhoumi"}], "author_count": 2}, {"id": "2605.09812", "category": "math-ph", "title": "Two-parameter classes of exactly solvable quantum systems", "abstract": "We introduce two-parameter classes of exactly-solvable novel systems whose Hamiltonian operators could be represented by tridiagonal symmetric matrices in some orthonormal basis set. The associated wavefunction is written as point-wise convergent series in the basis elements. The expansion coefficients of the series are orthogonal polynomials in the energy that satisfy the resulting three-term recursion relation starting with two-parameter initial values. These polynomials contain all physical information about the system and they depend on the values of the two parameters. However, we could not write down the associated two-parameter potential function analytically but could realize them numerically for a given set of physical parameters. We give several illustrative examples of these systems with continuous and/or discrete energy spectra. Moreover, a curious phenomenon is observed where bound states and/or resonances are induced in a system with pure continuous spectrum (e.g., a free particle) if the two parameters in the initial values exceed certain critical limits.", "url": "https://arxiv.org/abs/2605.09812", "type": "理论", "summary": "我们引入了精确可解的新系统的双参数类，其哈密顿算子可以由某些正交基组中的三对角对称矩阵表示。相关波函数在基本元素中被写为逐点收敛级数。该级数的展开系数是能量的正交多项式，满足从两参数初始值开始所得到的三项递归关系。这些多项式包含有关系统的所有物理信息，并且它们取决于两个参数的值。然而，我们无法通过分析方式写出相关的双参数势函数，但可以针对给定的一组物理参数以数值方式实现它们。我们给出了这些具有连续和/或离散能谱的系统的几个说明性示例。此外，如果初始值中的两个参数超过某些临界极限，就会观察到一个奇怪的现象，即在具有纯连续光谱的系统（例如自由粒子）中会引发束缚态和/或共振。", "authors": [{"name": "A. D. Alhaidari"}], "featured_authors": [{"name": "A. D. Alhaidari"}], "author_count": 1}, {"id": "2605.10048", "category": "math-ph", "title": "Generalized i-boson model and boxed BUC plane partitions", "abstract": "This paper is devoted to investigating the relation between the generalized i-boson model and boxed BUC plane partitions. The representation of the generalized i-boson algebra and the actions of the monodromy matrix operators on basis vectors have been studied. We also consider the actions of neutral fermion vertex operators on state vectors in terms of the neutral fermionic Fock space. With the help of the scalar product of the generalized i-boson model, the generating function for boxed BUC plane partitions is derived which can be represented as the products of Schur Q-functions. Moreover, the generating function for BUC plane partitions with the double scaling limit is presented.", "url": "https://arxiv.org/abs/2605.10048", "type": "理论", "summary": "本文致力于研究广义 i-boson 模型与盒装 BUC 平面分区之间的关系。研究了广义i-玻色子代数的表示和单性矩阵算子对基向量的作用。我们还根据中性费米子福克空间考虑中性费米子顶点算子对状态向量的作用。借助广义i-玻色子模型的标量积，导出了盒装BUC平面分区的生成函数，该生成函数可以表示为Schur Q函数的乘积。此外，还给出了具有双尺度限制的BUC平面分区的生成函数。", "authors": [{"name": "Shengyu Zhang"}, {"name": "Denghui Li"}, {"name": "Zhaowen Yan"}], "featured_authors": [{"name": "Shengyu Zhang"}, {"name": "Denghui Li"}, {"name": "Zhaowen Yan"}], "author_count": 3}, {"id": "2605.10250", "category": "math-ph", "title": "From Noncommutative Kinematics to \\(U(1)_{\\star}\\) Gauge Theory: A Family of Spectral Triples with Localized Gauge-induced Perturbations", "abstract": "We construct a spectral-triple framework for a noncommutative planar system associated with a fixed nondegenerate irreducible unitary sector of the kinematical symmetry group $G_{\\mathrm{NC}}$, labelled by central parameters $(\\hbar_0,\\vartheta_0, B_0)$ with $\\hbar_0,\\vartheta_0, B_0\\neq 0$ and $\\hbar_0 - \\vartheta_0 B_0\\neq 0$. For the corresponding two-parameter family $(r,s)$ of unitarily equivalent concrete realizations, we construct even spectral triples whose Dirac operators are isospectral and have compact resolvent despite the non-unital and noncompact setting. Passing to the Moyal-side description, a linear Darboux normalization and the Stone-von Neumann theorem identify the represented smooth operator algebra with the effective Moyal-side Frechet *-algebra at $\\vartheta_{\\mathrm{eff}} =\\vartheta_0/(1 -\\vartheta_0 B_0/\\hbar_0)$. For each $\\varrho$, this yields locally compact non-unital base spectral triples over the involutive Moyal algebra $\\mathcal{A}_{\\vartheta_{\\mathrm{eff}},\\varrho}$, with $(r,s)$ as kinematical presentation parameters and $\\varrho$ as an independent star-gauge parameter. To incorporate an external $U(1)_\\star$ gauge field, we replace the linear gauge potentials by smooth cutoff localizations; the resulting bounded self-adjoint perturbations define, for every $R > 0$, locally compact non-unital spectral triples. Finally, as $R\\rightarrow\\infty$, we prove strong resolvent convergence to a self-adjoint limiting operator, the closure of the formal minimally coupled operator. Thus the finite-cutoff spectral triples approximate, at the level of spectral triples, the limiting minimally coupled Dirac operator over a fixed nondegenerate $G_{\\mathrm{NC}}$-background.", "url": "https://arxiv.org/abs/2605.10250", "type": "理论", "summary": "我们为与运动对称群 $G_{\\mathrm{NC}}$ 的固定非简并不可约酉扇区相关的非交换平面系统构造了一个谱三重框架，由中心参数 $(\\hbar_0,\\vartheta_0, B_0)$ 标记，其中 $\\hbar_0,\\vartheta_0, B_0\\neq 0$ 和 $\\hbar_0 - \\vartheta_0 B_0\\neq 0$。对于酉等价具体实现的相应二参数族 $(r,s)$，我们构造偶谱三元组，其狄拉克算子是同谱的，并且尽管是非酉和非紧设置，但仍具有紧解析。传递到 Moyal 侧描述，线性 Darboux 归一化和 Stone-von Neumann 定理将所表示的平滑算子代数与有效 Moyal 侧 Frechet *-代数在 $\\vartheta_{\\mathrm{eff}} =\\vartheta_0/(1 -\\vartheta_0 B_0/\\hbar_0)$ 处识别。对于每个 $\\varrho$，这会在内卷 Moyal 代数 $\\mathcal{A}_{\\vartheta_{\\mathrm{eff}},\\varrho}$ 上产生局部紧凑的非单位基本谱三元组，其中 $(r,s)$ 作为运动学表示参数，$\\varrho$ 作为独立的星规参数。\n\n为了合并外部 $U(1)_\\star$ 规范场，我们用平滑截止定位替换线性规范势；对于每个 $R > 0$，所得的有界自伴扰动定义局部紧凑的非单位谱三元组。最后，作为$R\\rightarrow\\infty$，我们证明了对自伴限制算子的强解析收敛性，即形式最小耦合算子的闭包。因此，有限截止谱三元组在谱三元组级别上近似于固定非简并$G_{\\mathrm{NC}}$-背景上的极限最小耦合狄拉克算子。", "authors": [{"name": "Md. Rafsanjany Jim"}, {"name": "Tanmoy Kumar Sarkar"}, {"name": "S. Hasibul Hassan Chowdhury"}], "featured_authors": [{"name": "Md. Rafsanjany Jim"}, {"name": "Tanmoy Kumar Sarkar"}, {"name": "S. Hasibul Hassan Chowdhury"}], "author_count": 3}, {"id": "2605.10693", "category": "math-ph", "title": "Local topological order, Haag duality, and reflection positivity", "abstract": "In our previous article [ arXiv:2307.12552 ], we introduced local topological order (LTO) axioms for abstract quantum spin systems which allow one to access topological order via a boundary algebra construction. Using the LTO axioms, we produced a canonical pure state on the quasi-local algebra, which gives a net of von Neumann algebras associated to a poset of cones in $\\mathbb{R}^n$. In this article, motivated by [ arXiv:2509.23734 ], we introduce an axiom for LTOs which ensures Haag duality for cone-like regions using Tomita-Takesaki theory. We prove this axiom is satisfied for all known topologically ordered commuting projector models. We thus get an independent proof of Haag duality for the Levin-Wen string net models originally proved in [ arXiv:2509.23734 ]. We also give a reflection positivity axiom for LTOs, connecting to the recent article [ arXiv:2510.20662 ]. We again prove this axiom is satisfied for all known topologically ordered commuting projector models about some $\\mathbb{Z}/2$-reflection symmetry.", "url": "https://arxiv.org/abs/2605.10693", "type": "理论", "summary": "在我们之前的文章 [ arXiv:2307.12552 ] 中，我们介绍了抽象量子自旋系统的局部拓扑序 (LTO) 公理，它允许人们通过边界代数构造来访问拓扑序。使用 LTO 公理，我们在准局域代数上产生了一个规范的纯态，它给出了与 $\\mathbb{R}^n$ 中的锥偏序集相关联的冯诺依曼代数网络。在本文中，受 [ arXiv:2509.23734 ] 的启发，我们引入了 LTO 的公理，该公理使用 Tomita-Takesaki 理论确保锥状区域的 Haag 对偶性。我们证明这个公理对于所有已知的拓扑有序通勤投影仪模型都是满足的。因此，我们得到了最初在 [ arXiv:2509.23734 ] 中证明的 Levin-Wen 弦网模型的 Haag 对偶性的独立证明。我们还给出了 LTO 的反射正性公理，连接到最近的文章 [arXiv:2510.20662]。我们再次证明该公理对于所有已知的关于某些 $\\mathbb{Z}/2$ 反射对称性的拓扑有序通勤投影仪模型都是满足的。", "authors": [{"name": "Pieter Naaijkens"}, {"name": "David Penneys"}, {"name": "Daniel Wallick"}], "featured_authors": [{"name": "Pieter Naaijkens"}, {"name": "David Penneys"}, {"name": "Daniel Wallick"}], "author_count": 3}, {"id": "2605.10695", "category": "math-ph", "title": "A Simplicial Approach to Higher Geometric Quantization", "abstract": "This paper develops a unified framework for observables in n-plectic geometry, extending the L_infty-algebra of Hamiltonian (n-1)-forms to Hamiltonian forms of all degrees via a degree-shifting Grassmann variable u that encodes submanifold codimension. Interpreting k-form observables as k-dimensional topological defects yields a recursive gluing construction that assembles into a semi-simplicial set sOb_bullet(M), which we prove satisfies the Kan filling property, thereby providing an n-groupoid model for observables. From this semi-simplicial perspective we extract cohomological invariants and construct a recursive inner product leading to a categorified pre-n-Hilbert space. The hierarchical structure of polarizations yields a natural quantization scheme matching the 1-polarization classification of multisymplectic geometry. The resulting framework bridges higher algebraic structures with higher categorical geometry and establishes a systematic foundation for the geometric quantization of extended objects.", "url": "https://arxiv.org/abs/2605.10695", "type": "理论", "summary": "本文为 n 次几何中的可观测量开发了一个统一的框架，通过编码子流形余维数的度移格拉斯曼变量 u 将哈密顿 (n-1) 形式的 L_infty 代数扩展到所有度的哈密顿形式。将 k 型可观测量解释为 k 维拓扑缺陷会产生递归粘合结构，该结构组装成半单纯集 sOb_bullet(M)，我们证明它满足 Kan 填充性质，从而为可观测量提供 n 群群模型。从这个半单纯的角度来看，我们提取上同调不变量并构造一个递归内积，从而得到一个分类的 pre-n-Hilbert 空间。偏振的层次结构产生了与多辛几何的 1 偏振分类相匹配的自然量化方案。由此产生的框架将更高的代数结构与更高的分类几何联系起来，并为扩展对象的几何量化奠定了系统基础。", "authors": [{"name": "Qian Zhang"}], "featured_authors": [{"name": "Qian Zhang"}], "author_count": 1}, {"id": "2605.10725", "category": "math-ph", "title": "Vacuum and thermal fluctuations of a scalar field with point interactions", "abstract": "We investigate the vacuum and thermal fluctuations of a neutral massless scalar field living in Minkowski spacetime and interacting with a finite number of point-like obstacles, modelled by zero-range potentials. The system is described rigorously in terms of self-adjoint realizations of the Laplacian, under assumptions ensuring the absence of instabilities. Using the relative zeta-function technique, we determine the renormalized connected partition function and derive explicit expressions for the thermodynamic observables, characterizing both their low- and high-temperature behaviours. Furthermore, we derive of a convergent Born series expansion for the Casimir energy, which identifies multiple-scattering processes as the mechanism underlying vacuum forces. The latter decompose into pairwise contributions directed along the lines joining the obstacles, with intensities depending non-locally on the full configuration. We also present some numerical results for identical obstacles, indicating that the Casimir forces are always attractive in this context.", "url": "https://arxiv.org/abs/2605.10725", "type": "理论", "summary": "我们研究了明可夫斯基时空中的中性无质量标量场的真空和热涨落，该标量场与有限数量的点状障碍物相互作用，通过零程势进行建模。在确保不存在不稳定性的假设下，该系统按照拉普拉斯算子的自伴实现进行了严格的描述。使用相对 zeta 函数技术，我们确定了重正化连通配分函数，并导出了热力学可观测量的显式表达式，表征了它们的低温和高温行为。此外，我们推导了卡西米尔能量的收敛玻恩级数展开式，它将多重散射过程确定为真空力的机制。后者分解为沿着连接障碍物的线的成对贡献，其强度非局部地取决于完整配置。我们还提供了相同障碍物的一些数值结果，表明卡西米尔力在这种情况下始终具有吸引力。", "authors": [{"name": "Davide Fermi"}, {"name": "Marco Gurgoglione"}], "featured_authors": [{"name": "Davide Fermi"}, {"name": "Marco Gurgoglione"}], "author_count": 2}, {"id": "2605.08259", "category": "quant-ph", "title": "Multiplayer parallel repetition without dependency-breaking and anchoring variables: monotonic, concave amplification", "abstract": "We obtain quantitative estimates on the decay of the multiplayer optimal value under parallel repetition. In comparison to a previous work of the author in 2025 (arXiv: 2508.09380 ) which sought to generalize dependency-breaking and anchoring variables from two-player Quantum games, being able to establish quantitative estimates on the decay of the optimal value of a multiplayer game under parallel repetition is of interest to establish under different assumptions. Specifically, independently of the dependency-breaking and anchoring variables that have previously been employed to remove correlations from entangled information shared between Alice and Bob (hence removing dependencies), monotonic concave functions can be used in place of such variables to obtain rates of decay on the optimal value. The game-theoretic setting with two players was first analyzed with monotonic concave functions by Lanzenberger and Maurer. For $q_i , x_i > 0$ $\\forall 1 \\leq i \\leq N$ where $N > 0 $ is the total number of players we adddress an open question raised in their work regarding potential generalizations of two-player monotonic concave functions, through amplification functions of the form $\\Psi_{\\textit{Mult}} \\equiv \\Psi = N - \\underset{1 \\leq i \\leq N}{\\prod} \\mathrm{exp} \\big[ - q_i x_i \\big]$, which in the multiplayer game-theoretic setting have more intricate combinatorial structures.", "url": "https://arxiv.org/abs/2605.08259", "type": "理论", "summary": "我们获得了并行重复下多人最优值衰减的定量估计。与作者在 2025 年的先前工作（arXiv：2508.09380）相比，该工作试图概括两人量子游戏中的依赖性破坏和锚定变量，能够对并行重复下多人游戏的最优值的衰减建立定量估计是在不同假设下建立的。具体来说，独立于先前用于消除 Alice 和 Bob 之间共享的纠缠信息的相关性（从而消除依赖性）的依赖性破坏和锚定变量，可以使用单调凹函数代替此类变量来获得最优值的衰减率。 Lanzenberger 和 Maurer 首先用单调凹函数分析了两名玩家的博弈论设置。\n\n对于 $q_i , x_i > 0$ $\\forall 1 \\leq i \\leq N$ ，其中 $N > 0 $ 是玩家总数，我们通过 $\\Psi_{\\textit{Mult}} \\equiv \\Psi = N - \\underset{1 \\leq i \\leq N}{\\prod} 形式的放大函数解决了在他们的工作中提出的关于两人单调凹函数的潜在概括的开放性问题\\mathrm{exp} \\big[ - q_i x_i \\big]$，在多人游戏理论设置中具有更复杂的组合结构。", "authors": [{"name": "Pete Rigas"}], "featured_authors": [{"name": "Pete Rigas"}], "author_count": 1}, {"id": "2605.08523", "category": "quant-ph", "title": "Machine-learned, finite temperature Fermi-operator expansions suitable for GPUs and AI-hardware", "abstract": "We present several finite-temperature recursive Fermi-operator expansion schemes based on the second-order spectral projection (SP2) method. Our approach builds on a previous observation that the electronic structure problem, as formulated through a recursive SP2 expansion, can be mapped onto the architecture of a deep neural network. Using this perspective, we generalize SP2 to finite electronic temperatures and construct machine learning models to determine optimized expansion coefficients. These coefficients are trained for a specified chemical potential and electronic temperature and are not available in closed analytical form. However, by employing an appropriate affine rescaling strategy to the Hamiltonian matrix, we eliminate the need to retrain the model during a simulation if the temperature and chemical potential change. Our approach avoids explicit diagonalization and relies solely on highly optimized matrix-matrix multiplication kernels. Compared to state-of-the-art diagonalization, we achieve an order-of-magnitude speedup in the single-particle finite-temperature density matrix calculation for small and moderately sized matrices on modern GPUs and dense matrix multiply units.", "url": "https://arxiv.org/abs/2605.08523", "type": "理论+数值", "summary": "我们提出了几种基于二阶谱投影（SP2）方法的有限温度递归费米算子展开方案。我们的方法建立在之前的观察基础上，即通过递归 SP2 展开表述的电子结构问题可以映射到深度神经网络的架构上。从这个角度来看，我们将 SP2 推广到有限的电子温度，并构建机器学习模型来确定优化的膨胀系数。这些系数针对指定的化学势和电子温度进行训练，并且不能以封闭分析形式提供。然而，通过对哈密顿矩阵采用适当的仿射重新缩放策略，如果温度和化学势发生变化，我们就无需在模拟过程中重新训练模型。我们的方法避免了显式对角化，并且仅依赖于高度优化的矩阵-矩阵乘法内核。\n\n与最先进的对角化相比，我们在现代 GPU 和密集矩阵乘法单元上对小型和中等大小的矩阵进行单粒子有限温度密度矩阵计算时实现了数量级的加速。", "authors": [{"name": "Stanislaw Kowalski"}, {"name": "Christian F. A. Negre"}, {"name": "Anders M. N. Niklasson"}, {"name": "Kipton Barros"}, {"name": "Joshua Finkelstein"}], "featured_authors": [{"name": "Stanislaw Kowalski"}, {"name": "Christian F. A. Negre"}, {"name": "Anders M. N. Niklasson"}, {"name": "Kipton Barros"}, {"name": "Joshua Finkelstein"}], "author_count": 5}, {"id": "2605.08535", "category": "quant-ph", "title": "Microwave Power-to-Frequency Transduction via Injection Pulling of a Self-Sustained Oscillator for Rydberg Superheterodyne Sensing", "abstract": "A Rydberg superheterodyne sensing architecture is demonstrated in which a self-sustained oscillator (SSO) serves as a dynamically perturbed local oscillator (LO) for microwave detection. The SSO is realized by a phase-controlled radio-frequency (RF) feedback loop coupled to a transverse electromagnetic (TEM) cavity containing a Rydberg vapor cell. The system operates near 5.49 GHz using a cesium ladder scheme with an 852 nm probe and 510 nm coupling laser addressing the 6S to 6P to 49D transition, with microwave coupling to the 50P state. Injection of a microwave signal pulls the SSO frequency via nonlinear dynamics, converting input power into a measurable frequency shift read out optically as a Rydberg probe intermediate-frequency (IF) signal. The response follows Adler-type injection-pulling behavior, with continuous IF tuning with input power. A peak responsivity of 35 kHz/dB is observed, with enhanced sensitivity near synchronization. These results demonstrate power-to-frequency transduction using a dynamically perturbed LO combined with Rydberg atomic readout.", "url": "https://arxiv.org/abs/2605.08535", "type": "理论", "summary": "演示了里德堡超外差传感架构，其中自持振荡器 (SSO) 用作微波检测的动态扰动本地振荡器 (LO)。 SSO 通过耦合到包含里德伯蒸气室的横向电磁 (TEM) 腔的相控射频 (RF) 反馈环路来实现。该系统使用铯梯方案在 5.49 GHz 附近运行，配有 852 nm 探头和 510 nm 耦合激光器，可解决 6S 到 6P 到 49D 的转变，并通过微波耦合到 50P 状态。微波信号的注入通过非线性动力学拉动 SSO 频率，将输入功率转换为可测量的频移，以光学方式读出作为里德伯探头中频 (IF) 信号。响应遵循阿德勒型注入牵引行为，并通过输入功率进行连续中频调谐。观察到 35 kHz/dB 的峰值响应度，并且接近同步时的灵敏度增强。这些结果证明了使用动态扰动 LO 与里德伯原子读数相结合的功率到频率转换。", "authors": [{"name": "Darmindra Arumugam"}], "featured_authors": [{"name": "Darmindra Arumugam"}], "author_count": 1}, {"id": "2605.08675", "category": "quant-ph", "title": "Quantum resource reduction for quantum-centric supercomputing via correlated mean-field downfolding framework", "abstract": "We present OBDF-SQD, a hybrid quantum-classical method that combines one-body downfolding~(OBDF) based on one-body Møller--Plesset second-order perturbation theory (OBMP2) with sample-based quantum diagonalization~(SQD) for use in quantum-centric supercomputing~(QCS). In this approach, OBMP2 is executed classically to fold dynamical correlation from external orbitals into a renormalized one-body operator, yielding an effective active-space Hamiltonian that retains the same operator structure as the bare Hamiltonian and therefore requires no additional quantum circuit resources. SQD is then applied to this effective Hamiltonian, where, in this work, the quantum sampling is performed via the Qiskit Aer simulator rather than actual quantum hardware. We benchmark OBDF-SQD on dissociation curves of \\ce{H6} chain, ring, and lattice systems and the \\ce{N2} molecule in the cc-pVDZ basis, comparing against standard methods and active-space SQD (CAS-SQD). We observed that OBDF-SQD consistently improves upon CAS-SQD with the same active space. The simplicity of the one-body downfolding correction also makes the approach straightforwardly extensible to periodic solids within existing quantum embedding frameworks", "url": "https://arxiv.org/abs/2605.08675", "type": "理论+数值", "summary": "我们提出了 OBDF-SQD，一种混合​​量子经典方法，它将基于单体 Møller-Plesset 二阶微扰理论 (OBMP2) 的单体向下折叠 (OBDF) 与基于样本的量子对角化 (SQD) 相结合，用于以量子为中心的超级计算 (QCS)。在这种方法中，OBMP2 被经典地执行，将外部轨道的动态相关性折叠到重正化的单体算子中，产生有效的活动空间哈密顿量，它保留与裸哈密顿量相同的算子结构，因此不需要额外的量子电路资源。然后将 SQD 应用于这个有效的哈密顿量，在这项工作中，量子采样是通过 Qiskit Aer 模拟器而不是实际的量子硬件执行的。我们在 cc-pVDZ 基础上的 \\ce{H6} 链、环和晶格系统以及 \\ce{N2} 分子的解离曲线上对 OBDF-SQD 进行基准测试，与标准方法和活性空间 SQD (CAS-SQD) 进行比较。我们观察到，在相同的活动空间下，OBDF-SQD 始终优于 CAS-SQD。\n\n单体向下折叠校正的简单性也使得该方法可以直接扩展到现有量子嵌入框架内的周期固体", "authors": [{"name": "Thien Ngoc Tran"}, {"name": "Lan Nguyen Tran"}], "featured_authors": [{"name": "Thien Ngoc Tran"}, {"name": "Lan Nguyen Tran"}], "author_count": 2}, {"id": "2605.08771", "category": "quant-ph", "title": "To Purify or Not to Purify: Entanglement Purification under Input Fidelity Asymmetry in Quantum Networks", "abstract": "Entanglement purification with two entangled resource pairs is widely employed in the literature on quantum repeater networks to counteract fidelity degradation introduced by noisy quantum memories and entanglement swapping across multiple hops. Standard purification protocols assume both resource pairs carry identical fidelity. In practice, entanglement generation is stochastic, the two resource pairs are heralded at different times, and so the first pair decoheres in memory while the second is being generated. Thus a fidelity asymmetry is a structural feature of any network operating under realistic memory conditions, leading to the question: when is it beneficial to perform purification? We derive a closed-form fidelity asymmetry tolerance delta(F) that governs whether a purification attempt is beneficial. We determine a universal upper bound delta_max of approximately 0.076 beyond which purification is always counterproductive. Our simulations show that with exponential memory decoherence, purification yields benefits in only approximately 14% of purification attempts on two resource pairs in a two-hop repeater chain. We define three network objectives: fidelity only, time only, and a combination of time and fidelity, to deliver end-to-end entanglement. We show that when the application fidelity requirement is achievable through swapping alone, no-purification is the superior policy, with its advantage increasing with the number of hops. When the fidelity requirement cannot be met with swapping alone and purification is necessary, to be effective, it must be conditioned on delta(F) between resource pairs. We introduce DeltaPurify, a policy that conditions purification decisions on local fidelity information, and show it reduces time-to-serve relative to both naive purification and no-purification across several fidelity thresholds and hops of a repeater chain.", "url": "https://arxiv.org/abs/2605.08771", "type": "理论+数值", "summary": "在量子中继器网络的文献中广泛采用了两个纠缠资源对的纠缠净化，以抵消由噪声量子存储器和跨多跳的纠缠交换引起的保真度下降。标准纯化协议假设两个资源对具有相同的保真度。实际上，纠缠的生成是随机的，两个资源对在不同的时间预示，因此第一对在内存中解相干，而第二对正在生成。因此，保真度不对称是任何在现实内存条件下运行的网络的结构特征，这就引出了一个问题：什么时候进行净化有利？我们推导出一个封闭形式的保真度不对称容差 delta(F)，它控制净化尝试是否有益。我们确定 delta_max 的通用上限约为 0.076，超过该值纯化总是会适得其反。我们的模拟表明，利用指数内存退相干，在两跳中继器链中的两个资源对上进行的净化尝试中，只有大约 14% 的净化能够带来好处。\n\n我们定义了三个网络目标：仅保真度、仅时间以及时间和保真度的组合，以提供端到端纠缠。我们表明，当仅通过交换即可实现应用程序保真度要求时，不净化是更好的策略，其优势随着跳数的增加而增加。当单独的交换无法满足保真度要求并且需要净化时，为了有效，它必须以资源对之间的 delta(F) 为条件。我们引入了 DeltaPurify，这是一种根据本地保真度信息调节纯化决策的策略，并表明它在多个保真度阈值和中继器链的跳数上相对于简单纯化和无纯化减少了服务时间。", "authors": [{"name": "Anoosha Fayyaz"}, {"name": "Prashant Krishnamurthy"}, {"name": "Kaushik Seshadreesan"}, {"name": "Amy Babay"}, {"name": "David Tipper"}], "featured_authors": [{"name": "Anoosha Fayyaz"}, {"name": "Prashant Krishnamurthy"}, {"name": "Kaushik Seshadreesan"}, {"name": "Amy Babay"}, {"name": "David Tipper"}], "author_count": 5}, {"id": "2605.08829", "category": "quant-ph", "title": "Recoverable states on von-Neumann algebras", "abstract": "Let $(\\mathcal{M},\\tau)$ and $(\\mathcal{N},\\tau^{\\prime})$ be tracial von-Neumann algebras and let $\\phi:\\mathcal{M}\\to\\mathcal{N}$ be a strictly completely positive, trace preserving map. Given a positive, invertible $B\\in\\mathcal{M}$ with $\\tau(B)=1$, a state on $\\mathcal{M}$ given by a positive $A\\in L^1(\\mathcal{M}, \\tau)$ is said to be recoverable if $\\mathcal{R}(\\phi(A))=A$ where $\\mathcal{R}$ is the Petz recovery map corresponding to $B$ and $\\phi$. In this paper, we study recoverable states and show how an arbitrary state can be made close to a recoverable state via iterates of $\\mathcal{R}\\circ\\phi$. We show that there exists a completely positive, trace preserving map $\\psi:\\mathcal{M}\\to\\mathcal{M}$ such that $\\psi(A)$ is recoverable for all $A$ and $(\\mathcal{R}\\circ\\phi)^n\\to\\psi$ in norm as operators on $L^p(\\mathcal{M},\\tau)$ for all $1\\,\\textless p\\,\\textless\\infty$, and discuss potential applications to quantum information theory. We also show that this convergence holds strongly in $L^1$. Finally, we prove an interesting decomposition theorem for normal states on $\\mathcal{M}$.", "url": "https://arxiv.org/abs/2605.08829", "type": "理论", "summary": "令 $(\\mathcal{M},\\tau)$ 和 $(\\mathcal{N},\\tau^{\\prime})$ 为迹冯诺依曼代数，并令 $\\phi:\\mathcal{M}\\to\\mathcal{N}$ 为严格完全正的迹保留映射。给定一个正的、可逆的 $B\\in\\mathcal{M}$ 且 $\\tau(B)=1$，由正 $A\\in L^1(\\mathcal{M}, \\tau)$ 给出的 $\\mathcal{M}$ 上的状态被认为是可恢复的，如果 $\\mathcal{R}(\\phi(A))=A$ 其中 $\\mathcal{R}$ 是对应于 $B$ 的 Petz 恢复图， $\\phi$。在本文中，我们研究可恢复状态，并展示如何通过迭代 $\\mathcal{R}\\circ\\phi$ 使任意状态接近可恢复状态。我们证明，存在一个完全正的、迹保留映射 $\\psi:\\mathcal{M}\\to\\mathcal{M}$，使得 $\\psi(A)$ 对于所有 $A$ 和 $(\\mathcal{R}\\circ\\phi)^n\\to\\psi$ 都可恢复，作为所有 $1\\、\\textless p\\、\\textless\\infty$ 的 $L^p(\\mathcal{M},\\tau)$ 上的运算符，以及讨论量子信息理论的潜在应用。我们还表明，这种收敛在 $L^1$ 中强烈成立。最后，我们证明了 $\\mathcal{M}$ 上正常状态的一个有趣的分解定理。", "authors": [{"name": "Saptak Bhattacharya"}], "featured_authors": [{"name": "Saptak Bhattacharya"}], "author_count": 1}, {"id": "2605.08923", "category": "quant-ph", "title": "Entanglement increase from local interactions which lead to non-positive local reduced dynamics", "abstract": "Consider a bipartite quantum system S=AB such that each part interacts only with its local environment. Under such circumstances, one expects that the entanglement between parts A and B does not exceed its initial value during the time evolution. In fact, this is the case if the reduced dynamics of the system is given by $\\mathcal{E}_{A}\\otimes \\mathcal{E}_{B}$, where $\\mathcal{E}_{A}$ and $\\mathcal{E}_{B}$ are quantum channels, i.e., completely positive trace-preserving maps. But, the reduced dynamics of the system may be given by a map as $\\Psi_{A}\\otimes \\Psi_{B}$, where $\\Psi_{A}$ and $\\Psi_{B}$ are local non-positive maps. Then, the entanglement between A and B can exceed its initial value, as was shown in the case studied by Jordan et al. [Phys. Rev. A 76, 022102 (2007)]. In this paper, we first explore the general circumstances under which one can find such cases as they found. Next, we introduce another general procedure which leads to local non-positive maps that cause entanglement exceeding.", "url": "https://arxiv.org/abs/2605.08923", "type": "理论", "summary": "考虑一个二分量子系统 S=AB，其中每个部分仅与其局部环境相互作用。在这种情况下，人们期望A部分和B部分之间的纠缠在时间演化过程中不会超过其初始值。事实上，如果系统的简化动态由 $\\mathcal{E}_{A}\\otimes \\mathcal{E}_{B}$ 给出，则情况就是这样，其中 $\\mathcal{E}_{A}$ 和 $\\mathcal{E}_{B}$ 是量子通道，即完全正迹保留映射。但是，系统的简化动态可以由映射给出 $\\Psi_{A}\\otimes \\Psi_{B}$，其中 $\\Psi_{A}$ 和 $\\Psi_{B}$ 是局部非正映射。然后，A 和 B 之间的纠缠可以超过其初始值，如 Jordan 等人研究的案例所示。 [物理。 Rev. A 76, 022102 (2007)]。在本文中，我们首先探讨了人们可以找到他们所发现的此类案例的一般情况。接下来，我们介绍另一个导致局部非正映射导致纠缠超出的一般过程。", "authors": [{"name": "Iman Sargolzahi"}], "featured_authors": [{"name": "Iman Sargolzahi"}], "author_count": 1}, {"id": "2605.08986", "category": "quant-ph", "title": "Impact of the non-canonical approach to the exact solution of the ideal one-dimensional electron gas confined with an anisotropic quantum wire of oscillator-shaped profile", "abstract": "We study an exactly solvable model that can be interpreted as an ideal one-dimensional electron gas confined with an anisotropic quantum wire potential of oscillator-shaped profile. The homogeneous nature of the quantum wire is broken by the introduction of the effective electron mass, which changes with radial distance. We solve the problem described both within the canonical and the non-canonical approach. Analytical expressions of the wavefunctions of the stationary states for both cases in terms of the Laguerre polynomials are obtained, as well as the discrete energy spectrum related to these wavefunctions. Additionally, an exact solution to the angular position part of the position-dependent mass Schrödinger equation within the non-canonical approach leads to the angular-part wavefunctions of the even and odd states expressed through the Gegenbauer polynomials. Possible limit relations and special cases are studied too.", "url": "https://arxiv.org/abs/2605.08986", "type": "理论", "summary": "我们研究了一个完全可解的模型，该模型可以解释为被振荡器形状轮廓的各向异性量子线势所限制的理想一维电子气。有效电子质量的引入打破了量子线的均匀性，有效电子质量随径向距离而变化。我们解决了规范和非规范方法中描述的问题。获得了两种情况下的稳态波函数用拉盖尔多项式的解析表达式，以及与这些波函数相关的离散能谱。此外，非正则方法中位置相关质量薛定谔方程的角位置部分的精确解导致通过 Gegenbauer 多项式表示偶数和奇数状态的角部分波函数。还研究了可能的极限关系和特殊情况。", "authors": [{"name": "E.I. Jafarov"}, {"name": "S.M. Nagiyev"}, {"name": "J. Van der Jeugt"}], "featured_authors": [{"name": "E.I. Jafarov"}, {"name": "S.M. Nagiyev"}, {"name": "J. Van der Jeugt"}], "author_count": 3}, {"id": "2605.09017", "category": "quant-ph", "title": "Quantum algorithms for path and cycle containment problems", "abstract": "The quantum query complexity of subgraph-containment problems, which ask whether a given subgraph $H$ is present in an input graph $G$, has been the subject of considerable study. However, even for relatively simple subgraphs, such as paths and cycles, a complete understanding of their query complexities remains elusive. In this work, we consider several variants of path- and cycle-containment problems in the adjacency matrix model, where we search for paths or cycles of constant length $k$. We compare the settings where the graphs are directed or undirected, where the goal is to detect or find the existence of a path/cycle, and where the path/cycle we are looking for has length exactly $k$, or at most $k$. We also consider several promise versions of these problems, where we suppose that the input graph has a certain structure. We characterize the relative difficulty of these variants of the path/cycle-containment problems, by relating them to one another using randomized reductions, and grouping them into equivalence classes. When we restrict our attention to path-containment problems, we get a dichotomy result. Some of the path-containment problems can be solved using a linear number of queries, and all the others are equivalent to one another (and additionally to several cycle-containment problems) under randomized reductions, up to constant overhead. For the latter equivalence class, we prove a novel quantum-walk-based algorithm that achieves query complexity $\\widetilde{O}(n^{3/2-\\alpha_k})$, where $\\alpha_k \\in \\Theta(c^{-k})$ and $c = \\sqrt{3+\\sqrt{17}}/2 \\approx 1.33$, beating the previous best upper bound $O(n^{3/2})$ on its query complexity. We also provide a conditional lower bound based on the graph-collision problem, which implies that this equivalence class does not admit linear-query quantum algorithms unless graph collision admits an $O(\\sqrt{n})$ query algorithm.", "url": "https://arxiv.org/abs/2605.09017", "type": "理论+数值", "summary": "子图包含问题的量子查询复杂性，即询问给定子图 $H$ 是否存在于输入图 $G$ 中，一直是大量研究的主题。然而，即使对于相对简单的子图（例如路径和循环），对其查询复杂性的完整理解仍然难以实现。在这项工作中，我们考虑邻接矩阵模型中路径和循环包含问题的几种变体，其中我们搜索恒定长度 $k$ 的路径或循环。我们比较图有向或无向的设置，目标是检测或查找路径/循环的存在，以及我们正在寻找的路径/循环的长度恰好为 $k$，或至多 $k$。我们还考虑了这些问题的几个承诺版本，其中我们假设输入图具有一定的结构。我们通过使用随机归约将它们相互关联，并将它们分组为等价类，来描述路径/循环包含问题的这些变体的相对难度。当我们将注意力限制在路径包含问题上时，我们会得到二分结果。\n\n一些路径包含问题可以使用线性数量的查询来解决，而所有其他问题在随机减少下彼此等效（以及几个循环包含问题），直到恒定的开销。对于后一个等价类，我们证明了一种新颖的基于量子行走的算法，该算法实现了查询复杂度 $\\widetilde{O}(n^{3/2-\\alpha_k})$，其中 $\\alpha_k \\in \\Theta(c^{-k})$ 和 $c = \\sqrt{3+\\sqrt{17}}/2 \\approx 1.33$，击败了之前的最佳上限$O(n^{3/2})$ 的查询复杂度。我们还提供了基于图碰撞问题的条件下界，这意味着该等价类不接受线性查询量子算法，除非图碰撞接受 $O(\\sqrt{n})$ 查询算法。", "authors": [{"name": "Arjan Cornelissen"}, {"name": "Amin Shiraz Gilani"}, {"name": "Subhasree Patro"}], "featured_authors": [{"name": "Arjan Cornelissen"}, {"name": "Amin Shiraz Gilani"}, {"name": "Subhasree Patro"}], "author_count": 3}, {"id": "2605.09056", "category": "quant-ph", "title": "Selective Remote Dissipation of an Off-resonant State via Indirect Driving", "abstract": "We show how local periodic driving can be used to control dissipation in a structured environment in a highly selective manner. As a minimal setting, we consider two discrete levels coupled to a one-dimensional tight-binding continuum with a finite bandwidth, where only one level is driven while the other remains undriven. Without driving, both bare energies are placed outside the static continuum band so that neither level decays. We demonstrate that the drive can nevertheless activate a selective remote dissipation channel: the undriven level acquires a finite decay rate, whereas the driven level can remain long-lived. The mechanism is clarified within Floquet theory. Periodic driving generates photon-assisted channels shifted by integer multiples of the drive frequency, effectively creating a ladder of drive-shifted continuum sidebands (Floquet channels). A decay channel for the undriven level opens once its bare energy overlaps an open sideband accessed via drive-enabled pathways; in the tight-binding example, the decay is strongly enhanced near the sideband edge due to the increased density of states. The dominant remote pathway is controlled by Bessel-weighted couplings and can be switched and strongly suppressed by tuning the drive amplitude. We verify these predictions by direct numerical integration of the time-dependent Schrödinger equation. We also formulate a complex-eigenvalue problem for the Floquet Hamiltonian by eliminating the continuum via a Brillouin--Wigner--Feshbach projection, and show that the pole-implied decay rate quantitatively reproduces the time-domain decay envelope.", "url": "https://arxiv.org/abs/2605.09056", "type": "理论+数值", "summary": "我们展示了如何使用局部周期性驱动以高度选择性的方式控制结构化环境中的耗散。作为最小设置，我们考虑两个离散级别耦合到具有有限带宽的一维紧束缚连续体，其中只有一个级别被驱动，而另一个级别保持未驱动。如果没有驱动，两种裸露能量都被置于静态连续带之外，因此两个能级都不会衰减。我们证明，驱动器仍然可以激活选择性远程耗散通道：未驱动电平获得有限的衰减率，而驱动电平可以保持较长的寿命。 Floquet 理论阐明了该机制。周期性驱动生成光子辅助通道，其偏移量为驱动频率的整数倍，有效地创建了驱动偏移连续边带的阶梯（Floquet 通道）。一旦其裸露能量与通过驱动启用路径访问的开放边带重叠，非驱动能级的衰减通道就会打开；在紧束缚示例中，由于态密度增加，边带边缘附近的衰减强烈增强。\n\n主要远程路径由贝塞尔加权耦合控制，并且可以通过调整驱动幅度来切换和强烈抑制。我们通过瞬态薛定谔方程的直接数值积分来验证这些预测。我们还通过布里渊-维格纳-费什巴赫投影消除连续统，为 Floquet 哈密顿量制定了复特征值问题，并表明极点隐含衰减率定量地再现了时域衰减包络。", "authors": [{"name": "Hidemasa Yamane"}], "featured_authors": [{"name": "Hidemasa Yamane"}], "author_count": 1}, {"id": "2605.09118", "category": "quant-ph", "title": "Quantum Transfer Learning Shows Improved Robustness in Low-Data Regimes", "abstract": "Transfer learning under limited data is a challenging setting, where models must adapt to new tasks with minimal supervision. Prior work has primarily focused on improving absolute accuracy in transfer learning. However, empirical evidence comparing quantum and classical models in realistic transfer learning settings remains limited, especially in low-data regimes. In this work, we systematically study the robustness of quantum models under reduced training data. We evaluate multiple quantum and classical architectures across diverse transfer tasks and retraining configurations, and quantify robustness using accuracy degradation and relative performance retention (RPR). Our results show that, although classical models often achieve higher peak performance, they exhibit significantly larger degradation when training data is limited. In contrast, quantum models maintain more stable performance across data regimes, indicating improved robustness and data efficiency. These findings provide empirical evidence that quantum models can offer improved robustness in low-resource transfer learning scenarios.", "url": "https://arxiv.org/abs/2605.09118", "type": "理论+数值", "summary": "有限数据下的迁移学习是一个具有挑战性的环境，模型必须在最少的监督下适应新任务。之前的工作主要集中在提高迁移学习的绝对准确性。然而，在现实迁移学习环境中比较量子模型和经典模型的经验证据仍然有限，特别是在低数据情况下。在这项工作中，我们系统地研究了减少训练数据下量子模型的鲁棒性。我们评估跨不同传输任务和再训练配置的多个量子和经典架构，并使用精度下降和相对性能保持（RPR）来量化鲁棒性。我们的结果表明，尽管经典模型通常会实现更高的峰值性能，但当训练数据有限时，它们会表现出明显更大的退化。相比之下，量子模型在整个数据体系中保持更稳定的性能，这表明鲁棒性和数据效率得到了提高。这些发现提供了经验证据，证明量子模型可以在低资源迁移学习场景中提供更高的鲁棒性。", "authors": [{"name": "Li-An Lo"}, {"name": "Li-Yi Hsu"}, {"name": "Hsien-Yi Hsieh"}], "featured_authors": [{"name": "Li-An Lo"}, {"name": "Li-Yi Hsu"}, {"name": "Hsien-Yi Hsieh"}], "author_count": 3}, {"id": "2605.09138", "category": "quant-ph", "title": "Enhanced quantum capacity thresholds from symmetry", "abstract": "The quantum capacity captures the value of a quantum channel for transmitting quantum information, establishing the fundamental limits on quantum communication. In spite of its central role in quantum information theory, the quantum capacity of most channels is unknown, with wide gaps between the best upper and lower bounds. Even deciding whether a channel has nonzero capacity -- finding its capacity threshold -- is difficult. In this paper we report significant increases in the capacity thresholds of two prototypical noise models: the depolarizing channel and Pauli channels. In the case of the depolarizing channel, this is the first improvement in 18 years, giving a bigger increase beyond the hashing bound than all previous improvements combined. Our starting point is the representation theoretic framework recently proposed by Bhalerao and Leditzky (2025) to compute coherent information for special permutation invariant states. We generalize their framework to the full symmetric subspace, which allow us to optimize coherent information over rank two states in that space. A representation theoretic calculation shows that exponentially many Kraus operators of the channel annihilate the symmetric space, corresponding to a massive decrease in environment entropy for states on the symmetric space compared to the maximally mixed state. This explains the enhanced coherent information as a manifestation of degeneracy for the resulting codes.", "url": "https://arxiv.org/abs/2605.09138", "type": "理论+数值", "summary": "量子容量捕获了传输量子信息的量子通道的价值，建立了量子通信的基本限制。尽管它在量子信息理论中发挥着核心作用，但大多数通道的量子容量是未知的，最佳上限和下限之间存在很大差距。即使决定一个通道是否具有非零容量（找到其容量阈值）也很困难。在本文中，我们报告了两种典型噪声模型的容量阈值的显着增加：去极化通道和泡利通道。就去极化通道而言，这是 18 年来的首次改进，超出哈希范围的增幅比之前所有改进的总和还要大。我们的出发点是 Bhalerao 和 Leditzky (2025) 最近提出的表示理论框架，用于计算特殊排列不变态的相干信息。我们将他们的框架推广到完整的对称子空间，这使我们能够优化该空间中二级状态的相干信息。\n\n表示理论计算表明，通道的指数级许多克劳斯算子会消灭对称空间，对应于对称空间上的状态与最大混合状态相比，环境熵的大幅下降。这解释了增强的相干信息是所得代码简并性的表现。", "authors": [{"name": "Avantika Agarwal"}, {"name": "Amolak Ratan Kalra"}, {"name": "Sungjai Lee"}, {"name": "Debbie Leung"}, {"name": "Luke Schaeffer"}, {"name": "Pulkit Sinha"}, {"name": "Graeme Smith"}], "featured_authors": [{"name": "Avantika Agarwal"}, {"name": "Amolak Ratan Kalra"}, {"name": "Sungjai Lee"}, {"name": "Luke Schaeffer"}, {"name": "Pulkit Sinha"}, {"name": "Graeme Smith"}], "author_count": 7}, {"id": "2605.09142", "category": "quant-ph", "title": "DART-Q : A Deadline-Driven Framework for Real-Time QLDPC Decoding", "abstract": "Real-time quantum error correction places the classical decoder inside the fault-tolerant control loop under strict timing and memory constraints. For quantum low-density parity-check (QLDPC) codes, practical deployment therefore depends not only on correction performance, but also on timely decoding under deadlines, finite on-chip memory, and time-varying load. However, existing decoder studies primarily emphasize correction performance without exposing operational viability under these constraints. We present DART-Q, a real-time QLDPC decoding framework that treats windowed workloads as discrete arrival, queueing, service, and completion events. DART-Q models each decode request as a deadline-driven online service job with queueing and non-preemptive Earliest Deadline First scheduling. It supports configurable admission control, service times, and bounded rescue policies. Through controlled studies of the SRAM-fit transition, tail latency, overload, and a capacity-scaling extension, DART-Q isolates the effects of memory pressure, rescue selectivity, admission control, and pooled service capacity on timely decoding. Our results show that real-time decoder viability is governed by state organization, overload policy, and service capacity. A cached-summary state organization lowers the SRAM-fit boundary by 4x relative to an edge-centric baseline. Under overload, relaxing the backlog cap increases queued work by approximately 20.1x and worsens p99 latency by approximately 17.6x, with little gain in useful throughput. In contrast, doubling decoder capacity reduces the MissRate from 97.64% to 0.98% and improves p99 latency from 3.861ms to 10$\\mu$s. These results position DART-Q as a framework for exposing the regime changes that determine real-time QLDPC decoder viability under deadlines, finite memory, and time-varying load.", "url": "https://arxiv.org/abs/2605.09142", "type": "理论", "summary": "实时量子纠错将经典解码器置于严格的时序和内存限制下的容错控制环内。因此，对于量子低密度奇偶校验（QLDPC）码，实际部署不仅取决于校正性能，还取决于在截止日期、有限片上存储器和时变负载下的及时解码。然而，现有的解码器研究主要强调校正性能，而没有暴露这些限制下的操作可行性。我们提出了 DART-Q，这是一种实时 QLDPC 解码框架，它将窗口工作负载视为离散到达、排队、服务和完成事件。 DART-Q 将每个解码请求建模为具有排队和非抢占式最早截止时间优先调度的截止时间驱动的在线服务作业。它支持可配置的准入控制、服务时间和有界救援策略。通过对 SRAM-fit 转换、尾部延迟、过载和容量扩展扩展的受控研究，DART-Q 隔离了内存压力、救援选择性、准入控制和池服务容量对及时解码的影响。\n\n我们的结果表明，实时解码器的可行性受到国家组织、过载政策和服务能力的控制。相对于以边缘为中心的基线，缓存摘要状态组织将 SRAM 适合边界降低了 4 倍。在过载情况下，放宽积压上限会使排队工作增加约 20.1 倍，并使 p99 延迟恶化约 17.6 倍，而有用吞吐量几乎没有增加。相比之下，解码器容量加倍可将 MissRate 从 97.64% 降低至 0.98%，并将 p99 延迟从 3.861ms 改善至 10$\\mu$s。这些结果将 DART-Q 定位为暴露机制变化的框架，这些机制变化决定了实时 QLDPC 解码器在截止日期、有限内存和时变负载下的可行性。", "authors": [{"name": "Ameya S. Bhave"}, {"name": "Navnil Choudhury"}, {"name": "Kanad Basu"}], "featured_authors": [{"name": "Ameya S. Bhave"}, {"name": "Navnil Choudhury"}, {"name": "Kanad Basu"}], "author_count": 3}, {"id": "2605.09226", "category": "quant-ph", "title": "Quantum Injection Pathways for Implicit Graph Neural Networks", "abstract": "Deep Equilibrium Models (DEQs) replace a stack of explicit layers with a single operator whose fixed point defines the output, giving the expressive power of an arbitrarily deep network at the memory cost of a single layer. Quantum Deep Equilibrium Models (QDEQs) bring this idea to quantum machine learning, offering an alternative to Parameterized Quantum Circuits (PQCs), whose depth is limited by hardware coherence and trainability. Here, we introduce, formulate, and compare three ways of coupling a quantum signal to graph DEQs, differing in where the signal enters the fixed-point operator. \\textit{Independent} injection computes the quantum signal once per graph and forward fixed-point solve, and holds it fixed throughout the solve. \\textit{State-dependent} injection instead recomputes the signal at every solver step and applies it to the current iterate. \\textit{Backbone-dependent} injection likewise recomputes at every iteration but applies the signal to the classical backbone's output evaluated at the current iterate. We establish contraction guarantees for each variant under explicit assumptions on the Lipschitz constants of the classical backbone and the quantum signal. On the TU Dortmund graph-classification benchmarks NCI1, PROTEINS, and MUTAG, independent injection achieves the best test accuracy while using fewer forward-solver iterations than both the classical equilibrium baseline and the two dependent variants.", "url": "https://arxiv.org/abs/2605.09226", "type": "理论+数值", "summary": "深度均衡模型 (DEQ) 用单个运算符替换一堆显式层，该运算符的固定点定义输出，以单层的内存成本提供任意深度网络的表达能力。量子深度平衡模型 (QDEQ) 将这一想法引入量子机器学习，为参数化量子电路 (PQC) 提供了替代方案，后者的深度受到硬件一致性和可训练性的限制。在这里，我们介绍、制定并比较了将量子信号耦合到图 DEQ 的三种方法，不同之处在于信号进入定点算子的位置。 \\textit{独立}注入对每个图计算一次量子信号并进行前向定点求解，并在整个求解过程中保持其固定。 \\textit{状态相关}注入会在每个求解器步骤重新计算信号并将其应用于当前迭代。 \\textit{Backbone-dependent}注入同样在每次迭代时重新计算，但将信号应用于当前迭代评估的经典主干的输出。我们在对经典主干和量子信号的 Lipschitz 常数的明确假设下为每个变体建立了收缩保证。\n\n在 TU Dortmund 图分类基准 NCI1、PROTEINS 和 MUTAG 上，独立注入实现了最佳测试精度，同时使用比经典平衡基线和两个相关变体更少的前向求解器迭代。", "authors": [{"name": "Pengyuan Xu"}, {"name": "Tristan Zaborniak"}, {"name": "Luis F. Rivera"}, {"name": "Hausi A. Müller"}], "featured_authors": [{"name": "Pengyuan Xu"}, {"name": "Tristan Zaborniak"}, {"name": "Luis F. Rivera"}, {"name": "Hausi A. Müller"}], "author_count": 4}, {"id": "2605.09385", "category": "quant-ph", "title": "Truncating loopy tensor networks by zero-mode gauge fixing: the $Z_2$ lattice gauge theory at finite temperature", "abstract": "Loopy tensor networks exhibit internal correlations that often render their compression inefficient. We show that even local bond optimization can more effectively exploit locally available information about relevant loop correlations. By cutting a bond, we define a set of states whose linear dependence can be identified through a zero mode of the states' metric tensor and used to truncate the bond dimension. In the absence of an exact zero mode, a linear combination of a small number of the lowest modes can instead be optimized to provide the optimal approximation to a zero mode. The truncation does not require prior gauge fixing. The method is applied to the two-dimensional finite-temperature $Z_2$ lattice gauge theory, whose thermal-state purification is represented by an infinite projected entangled-pair state (iPEPS).", "url": "https://arxiv.org/abs/2605.09385", "type": "理论+数值", "summary": "循环张量网络表现出的内部相关性通常导致其压缩效率低下。我们表明，即使是局部键优化也可以更有效地利用有关相关环路相关性的局部可用信息。通过切割键，我们定义了一组状态，其线性相关性可以通过状态度量张量的零模式来识别，并用于截断键维数。在没有精确的零模式的情况下，可以对少量最低模式的线性组合进行优化，以提供零模式的最佳近似。截断不需要预先固定量规。该方法应用于二维有限温度$Z_2$晶格规范理论，其热态净化由无限投影纠缠对态（iPEPS）表示。", "authors": [{"name": "Jacek Dziarmaga"}], "featured_authors": [{"name": "Jacek Dziarmaga"}], "author_count": 1}, {"id": "2605.09558", "category": "quant-ph", "title": "Classical Limit: Dissipation of Spekkens' Generalised Contextuality under Decoherence", "abstract": "Contextuality is considered as one of the most distinctive features of nonclassical systems. Here we show that a Spekkens contextual system (nonclassical) under decoherence becomes noncontextual (classical) after a certain threshold. We show also that some quasiprobability representations are more effective than others in showing nonclassical features. This will help us understand the relationship between decoherence, Spekkens' generalised contextuality, and quantum advantage from universality for quantum computation.", "url": "https://arxiv.org/abs/2605.09558", "type": "理论", "summary": "语境性被认为是非经典系统最显着的特征之一。在这里，我们展示了退相干下的 Spekkens 语境系统（非经典）在达到一定阈值后变得非语境（经典）。我们还表明，一些准概率表示在显示非经典特征方面比其他表示更有效。这将帮助我们理解退相干、斯佩肯斯广义上下文性和量子计算普适性的量子优势之间的关系。", "authors": [{"name": "Enrico Bozzetto"}, {"name": "Jonte R. Hance"}], "featured_authors": [{"name": "Enrico Bozzetto"}, {"name": "Jonte R. Hance"}], "author_count": 2}, {"id": "2605.09580", "category": "quant-ph", "title": "Estimating The Energy Consumption of Quantum Computing from A Full System Aspect", "abstract": "Quantum computing promises disruptive capabilities, yet its energy footprint has received far less attention than its asymptotic speedups. We present a first-order, full-system energy model for quantum computing in an high performance computing (HPC) context. The model separates costs common to NISQ and FTQC, such as system maintenance and classical processing, from regime-specific ones such as error mitigation for NISQ and error correction for FTQC. We instantiate the model on 96- and 100-qubit Heisenberg time-evolution simulations on IBM Eagle r3 and a representative VQE workload, and sketch the FTQC energy pipeline. We find that NISQ energy is dominated by the QEM sampling multiplier, while FTQC cost shifts to physical-qubit overhead set by the code distance and magic states. Our model provides actionable insights into the energy consumption of both NISQ and FTQC workloads, and paves the way toward energy-efficient quantum advantage.", "url": "https://arxiv.org/abs/2605.09580", "type": "理论+数值", "summary": "量子计算有望带来颠覆性的能力，但其能源足迹所受到的关注远不如其渐近加速受到的关注。我们提出了高性能计算 (HPC) 背景下量子计算的一阶全系统能量模型。该模型将 NISQ 和 FTQC 的常见成本（例如系统维护和经典处理）与制度特定的成本（例如 NISQ 的错误缓解和 FTQC 的错误纠正）分开。我们在 IBM Eagle r3 和代表性 VQE 工作负载上的 96 量子位和 100 量子位海森堡时间演化模拟上实例化该模型，并绘制了 FTQC 能量管道。我们发现 NISQ 能量主要由 QEM 采样乘数决定，而 FTQC 成本则转移到由代码距离和魔法状态设置的物理量子位开销。我们的模型提供了有关 NISQ 和 FTQC 工作负载能耗的可行见解，并为实现节能量子优势铺平了道路。", "authors": [{"name": "Siyuan Niu"}, {"name": "Di Wu"}, {"name": "Ozgur Ozan Kilic"}, {"name": "Kwanming Yu"}], "featured_authors": [{"name": "Siyuan Niu"}, {"name": "Di Wu"}, {"name": "Ozgur Ozan Kilic"}, {"name": "Kwanming Yu"}], "author_count": 4}, {"id": "2605.09671", "category": "quant-ph", "title": "Optimal Approximation of Single Qubit Rotations within a Quantum Circuit", "abstract": "Fault-tolerant quantum computing typically requires the transpilation of arbitrary quantum circuits into a finite, universal gate set, such as Clifford+T. As a baseline, Diagonal approximation can be used for synthesizing single-qubit Pauli rotations, yielding an approximating sequence with $T$-count that equals $3 \\log_2(1/\\epsilon)$ for a target precision $\\epsilon$. Magnitude Approximation can reduce the $T$-count to only $1 \\log_2(1/\\epsilon)$ by allowing large residual errors, which are rotations about orthogonal axes. Within a complete quantum circuit, these residual errors can then be absorbed into neighboring gates before they are approximated themselves. Determining the optimal allocation of approximation strategies within a large, multi-qubit circuit presents a significant combinatorial challenge. In this work, we present a linear-time algorithm that guarantees an optimal solution to this problem. We demonstrate that the issue of delegating Magnitude versus Diagonal approximation across a circuit maps formally to a classical 1D Ising model with a spatially varying field. By minimizing the energy of this Hamiltonian, we identify the optimal approximation configuration for each rotation without exponential overhead. Benchmarking our method against standard diagonal approximation on random quantum circuits, we observe an average reduction of 26\\% in the total approximating circuit gate count, offering a significant efficiency gain for the implementation of quantum algorithms on near-term and fault-tolerant architectures.", "url": "https://arxiv.org/abs/2605.09671", "type": "理论+数值", "summary": "容错量子计算通常需要将任意量子电路转换为有限的通用门集，例如 Clifford+T。作为基线，对角近似可用于合成单量子位泡利旋转，产生 $T$ 计数等于 $3 \\log_2(1/\\epsilon)$ 的近似序列，目标精度为 $\\epsilon$。幅度近似可以通过允许较大的残余误差（即绕正交轴的旋转）将 $T$ 计数减少到仅 $1 \\log_2(1/\\epsilon)$。在完整的量子电路中，这些残余误差可以在它们被近似之前被吸收到相邻的门中。在大型多量子位电路中确定近似策略的最佳分配提出了重大的组合挑战。在这项工作中，我们提出了一种线性时间算法，可以保证该问题的最佳解决方案。我们证明了在电路上委托幅度与对角线近似的问题正式映射到具有空间变化场的经典一维伊辛模型。\n\n通过最小化该哈密顿量的能量，我们确定了每次旋转的最佳近似配置，而无需指数开销。将我们的方法与随机量子电路上的标准对角线近似进行基准测试，我们观察到总近似电路门数平均减少了 26%，为在近期和容错架构上实现量子算法提供了显着的效率增益。", "authors": [{"name": "Gilad Kishony"}, {"name": "Avi Elazari"}, {"name": "Ron Cohen"}, {"name": "Lior Gazit"}], "featured_authors": [{"name": "Gilad Kishony"}, {"name": "Avi Elazari"}, {"name": "Ron Cohen"}, {"name": "Lior Gazit"}], "author_count": 4}, {"id": "2605.09710", "category": "quant-ph", "title": "Local state antimarking : Nonlocality without entanglement", "abstract": "A set of quantum states is said to be antidistinguishable if, upon being given a randomly chosen state, it is possible to identify a state that the system was definitively not prepared in. In this work, we begin with a study of quantum nonlocality within the framework of local state antidistinguishability (LSAD), and find that any ensemble of mutually orthogonal multipartite pure states is locally antidistinguishable. We then extend this paradigm by introducing the task of local state antimarking (LSAM), where a non-repetitive sequence from a known set of multipartite states is randomly selected and distributed to spatially separated parties who must identify at least one sequence that was not supplied using LOCC only. We present an ensemble of product states that is not globally antidistinguishable, but choosing states from it, without replacement, produces such sequences of states which are globally antidistinguishable but not locally-revealing a form of nonlocality without entanglement. Finally, we compare LSAD and LSAM with conclusive local state discrimination and conclusive local state marking. We demonstrate that no strict hierarchy exists between these paradigms: there exist product-state ensembles that permit one task while strictly forbidding the other, and vice versa.", "url": "https://arxiv.org/abs/2605.09710", "type": "理论", "summary": "如果在给定随机选择的状态时，可以识别出系统绝对未准备好的状态，则称一组量子态是不可区分的。在这项工作中，我们首先在局域状态不可区分性（LSAD）框架内研究量子非定域性，并发现任何相互正交的多部分纯态的集合都是局部不可区分的。然后，我们通过引入局部状态反标记（LSAM）任务来扩展这一范式，其中从一组已知的多部分状态中随机选择一个非重复序列并将其分发给空间上分离的各方，这些各方必须识别至少一个仅使用 LOCC 未提供的序列。我们提出了一个不可全局不可区分的乘积状态集合，但是从中选择状态而不进行替换，会产生这样的状态序列，这些状态是全局不可区分的，但不能局部揭示一种没有纠缠的非局部性形式。最后，我们将 LSAD 和 LSAM 与结论性局部状态区分和结论性局部状态标记进行比较。\n\n我们证明这些范式之间不存在严格的层次结构：存在允许一项任务而严格禁止另一项任务的产品状态集合，反之亦然。", "authors": [{"name": "Biswadeep Chatterjee"}, {"name": "Tathagata Gupta"}, {"name": "Pratik Ghosal"}, {"name": "Samrat Sen"}], "featured_authors": [{"name": "Biswadeep Chatterjee"}, {"name": "Tathagata Gupta"}, {"name": "Pratik Ghosal"}, {"name": "Samrat Sen"}], "author_count": 4}, {"id": "2605.09819", "category": "quant-ph", "title": "Perfect state transfer in quantum photonic networks based on Fourier modes", "abstract": "We propose a quantum network consisting of optical waveguides in the linear regime for quantum state transfer. The circular topology of our network introduces novel functionalities that enable us to analytically identify the conditions under which perfect state transfer (PST) is achievable. We utilize the properties of the Fourier modes, in particular the zero Fourier modes, which provide a protected subspace for the efficient propagation of quantum states, resulting in PST to the diametrically opposite site in a network with any number of sites $N = 4n$. The coupling profiles in the photonic network modulate the number of zero-energy eigenmodes, with uniform couplings yielding more than evanescent ones, confirming that the expedition of observed PST originates from the collapse of the eigenvalue spectrum into three distinct eigenvalue blocks, including $N/2$ manifolds of zero Fourier modes. We investigate PST in both discrete- and continuous-variable input regimes, using single photon state, Schrödinger cat states, and two-mode squeezed vacuum state. Our findings apply to the engineering of quantum networks and photonic lattices, paving the way for applications in controlled routing in integrated quantum circuits.", "url": "https://arxiv.org/abs/2605.09819", "type": "理论", "summary": "我们提出了一种由线性状态的光波导组成的量子网络，用于量子态转移。我们网络的圆形拓扑引入了新颖的功能，使我们能够分析确定可实现完美状态转移（PST）的条件。我们利用傅里叶模式的特性，特别是零傅里叶模式，它为量子态的有效传播提供了受保护的子空间，从而导致 PST 到达具有任意数量的站点 $N = 4n$ 的网络中完全相反的站点。光子网络中的耦合分布调制零能量本征模的数量，均匀耦合产生的本征模多于渐逝耦合，证实观测到的 PST 的探索源于本征值谱塌缩成三个不同的本征值块，包括零傅立叶模的 $N/2$ 流形。我们使用单光子态、薛定谔猫态和双模压缩真空态研究离散和连续变量输入状态下的 PST。\n\n我们的研究结果适用于量子网络和光子晶格的工程，为集成量子电路中受控路由的应用铺平了道路。", "authors": [{"name": "Sunita Meena"}, {"name": "Sugar Singh Meena"}, {"name": "Paulo A Brandão"}, {"name": "Amit Rai"}], "featured_authors": [{"name": "Sunita Meena"}, {"name": "Sugar Singh Meena"}, {"name": "Paulo A Brandão"}, {"name": "Amit Rai"}], "author_count": 4}, {"id": "2605.09872", "category": "quant-ph", "title": "Multi-Prover Interactive Proof Systems with Leakage", "abstract": "It is known that there exist multi-prover interactive protocols ($\\mathsf{MIP}$ protocols) for the complexity class $\\mathsf{NEXP}$, succinct $\\mathsf{MIP}$ protocols for $\\mathsf{NP}$ and multi-prover interactive protocols with shared entanglement ($\\mathsf{MIP}^\\ast$ protocols) for $\\mathsf{RE}$. This extraordinary power of multi-prover interactive proof systems comes from the assumption that provers do not communicate with each other during the protocols. If they are allowed to communicate freely, the setting is the same as in the single-prover case, and the computational power of the system becomes significantly weaker. In this paper, we investigate for the first time the setting where communication (i.e., leakage of information) between provers is allowed but bounded. We introduce two techniques to approach this question and show that multi-prover interactive proof systems are robust against some amount of leakage. Our first technique is based on parallel repetition theorems. We apply it to show that for any polynomial $p$, we can construct two-prover one-round $\\mathsf{MIP}$ and $\\mathsf{MIP}^\\ast$ protocols for $\\mathsf{NEXP}$ and $\\mathsf{RE}$, respectively, that are robust against $p(n)$ bits of leakage. We further derive our second technique to convert any low-soundness PCP construction to a two-prover one-round $\\mathsf{MIP}$ protocol for $\\mathsf{NP}$ robust against leakage. We also discuss the relation between robustness against leakage in multi-prover interactive proof systems and the Sliding Scale Conjecture in the PCP literature.", "url": "https://arxiv.org/abs/2605.09872", "type": "理论", "summary": "已知复杂度等级 $\\mathsf{NEXP}$ 存在多证明者交互协议（$\\mathsf{MIP}$ 协议），$\\mathsf{NP}$ 存在简洁 $\\mathsf{MIP}$ 协议，$\\mathsf{RE}$ 存在共享纠缠的多证明者交互协议（$\\mathsf{MIP}^\\ast$ 协议）。多证明者交互式证明系统的这种非凡能力来自于证明者在协议期间不相互通信的假设。如果允许它们自由通信，设置与单证明者情况相同，系统的计算能力会明显变弱。在本文中，我们首次研究了允许但有限制的证明者之间的通信（即信息泄漏）的设置。我们引入了两种技术来解决这个问题，并表明多证明者交互式证明系统对于一定程度的泄漏具有鲁棒性。我们的第一个技术是基于并行重复定理。\n\n我们应用它来证明，对于任何多项式 $p$，我们可以分别为 $\\mathsf{NEXP}$ 和 $\\mathsf{RE}$ 构造两个证明者一轮 $\\mathsf{MIP}$ 和 $\\mathsf{MIP}^\\ast$ 协议，这些协议对于 $p(n)$ 位泄漏具有鲁棒性。我们进一步推导了第二种技术，将任何低稳健性 PCP 结构转换为双证明者一轮 $\\mathsf{MIP}$ 协议，以实现 $\\mathsf{NP}$ 稳健的抗泄漏能力。我们还讨论了多证明者交互式证明系统中的抗泄漏鲁棒性与 PCP 文献中的滑动尺度猜想之间的关系。", "authors": [{"name": "Vahid R. Asadi"}, {"name": "Atsuya Hasegawa"}, {"name": "François Le Gall"}], "featured_authors": [{"name": "Vahid R. Asadi"}, {"name": "Atsuya Hasegawa"}, {"name": "François Le Gall"}], "author_count": 3}, {"id": "2605.09878", "category": "quant-ph", "title": "Clifford Ergotropy", "abstract": "We discuss the interplay between thermodynamics and magic resources in closed quantum dynamics by introducing Clifford ergotropy, the amount of extractable energy under the restriction to Clifford operations. We provide universal upper bounds on Clifford ergotropy, which decrease with increasing magic as quantified by the infinite-order filtered stabilizer Rényi entropy. We demonstrate the utility of this bound for one- and two-qubit systems, with the latter exhibiting a notable transition in the control landscape of Clifford ergotropy. Finally, we show that our analysis has nontrivial consequences even for many-body systems, including a form of the second law of thermodynamics under Clifford operations for typical quantum states.", "url": "https://arxiv.org/abs/2605.09878", "type": "理论", "summary": "我们通过引入克利福德各向异性（Clifford ergotropy）（在克利福德运算限制下可提取的能量）来讨论封闭量子动力学中热力学和魔法资源之间的相互作用。我们提供了 Clifford 各向异性的通用上限，该上限随着魔力的增加而减小，由无限阶过滤稳定器 Rényi 熵进行量化。我们证明了这一界限对于一量子位和二量子位系统的实用性，后者在 Clifford ergotropy 的控制领域表现出显着的转变。最后，我们表明，即使对于多体系统，我们的分析也具有重要的后果，包括典型量子态的 Clifford 运算下的热力学第二定律的形式。", "authors": [{"name": "Somnath Maity"}, {"name": "Ryusuke Hamazaki"}], "featured_authors": [{"name": "Somnath Maity"}, {"name": "Ryusuke Hamazaki"}], "author_count": 2}, {"id": "2605.09909", "category": "quant-ph", "title": "Symmetry-Protected Basin Localization in Variational Quantum Eigensolvers", "abstract": "Variational quantum eigensolvers fail before optimization begins when strong correlation splits the molecular energy landscape into competing basins and the initial state selects a non-ground-state basin. We introduce a geometry-conditioned preconditioner $\\mathcal{P}_{\\mathrm{eq}}:\\mathbf{R}\\mapsto\\boldsymbol{\\theta}_0$ constrained by the $SE(3)$ covariance of the molecular Hamiltonian, so that nuclear geometry is mapped directly into circuit parameters in the correlated ground-state basin. This basin localization changes the relevant gradient statistics from concentration controlled to curvature controlled. In statevector benchmarks on six stretched molecules, $\\mathcal{P}_{\\mathrm{eq}}$ reduces Hartree--Fock initialization errors by factors of $38\\times$--$6250\\times$, reaches sub-mHa initialization in CO, LiH, and H$_8$, and places N$_2$, H$_2$O, and BeH$_2$ in the mHa-scale correlated basin. In disordered H$_{10}$ chains, equivariant basin targeting and stochastic escape reach unit success probability at fixed optimization budget. The procedure performs basin selection before the shot-limited quantum loop; the quantum circuit then refines correlation inside the selected basin.", "url": "https://arxiv.org/abs/2605.09909", "type": "理论+数值", "summary": "当强相关性将分子能量景观分成竞争盆地并且初始状态选择非基态盆地时，变分量子本征求解器在优化开始之前失败。我们引入了几何条件预处理器 $\\mathcal{P}_{\\mathrm{eq}}:\\mathbf{R}\\mapsto\\boldsymbol{\\theta}_0$ ，受分子哈密顿量的 $SE(3)$ 协方差约束，以便核几何结构直接映射到相关基态盆地中的电路参数。该盆地定位将相关梯度统计从浓度控制更改为曲率控制。在六个拉伸分子的状态向量基准中，$\\mathcal{P}_{\\mathrm{eq}}$ 将 Hartree--Fock 初始化误差减少了 $38\\times$--$6250\\times$，在 CO、LiH 和 H$_8$ 中达到亚 mHa 初始化，并将 N$_2$、H$_2$O 和 BeH$_2$ 置于 mHa 尺度相关盆地中。在无序的 H$_{10}$ 链中，等变盆地目标和随机逃逸在固定优化预算下达到单位成功概率。该程序在有限射程量子循环之前执行盆地选择；然后，量子电路会细化所选盆地内的相关性。", "authors": [{"name": "Yangshuai Wang"}], "featured_authors": [{"name": "Yangshuai Wang"}], "author_count": 1}, {"id": "2605.09957", "category": "quant-ph", "title": "On Scalable Pseudorandom Unitaries and the Unitary Synthesis Problem", "abstract": "We consider the task of constructing pseudorandom unitaries (PRUs) with scalable security, i.e. families in which the security parameter may vary independently of the dimension (or input bit-length). It is not known whether scalable PRUs can be constructed. In this work we show that if scalable PRUs can be constructed via the prevailing paradigm for analyzing PRUs, then there would be a positive solution to the Aaronson-Kuperberg unitary synthesis problem, a longstanding question in quantum complexity theory about whether implementing arbitrary unitaries can be efficiently reduced to computing a Boolean function. Specifically, we formalize the notion of ROM-PRUs, which are statistically secure PRUs in the random oracle model (ROM). All prior known constructions of cryptographically secure PRUs are based on a ROM-PRU construction. We prove novel connections between ROM-PRUs, approximate unitary designs, epsilon-nets over the unitary group, and the unitary synthesis problem. In particular, we prove that any unitary synthesis algorithm (and thus any ROM-PRU) must use a classical oracle with input length (2 - o(1)) log d bits, where d is the dimension of the unitary to be implemented. This bound rules out all existing candidates for scalable PRUs in the literature. Together, these connections indicate that ROM-PRUs provide a fruitful idealized model for studying pseudorandom unitaries.", "url": "https://arxiv.org/abs/2605.09957", "type": "理论+数值", "summary": "我们考虑构建具有可扩展安全性的伪随机酉（PRU）的任务，即安全参数可以独立于维度（或输入位长度）而变化的族。目前尚不清楚是否可以构建可扩展的 PRU。在这项工作中，我们表明，如果可以通过分析 PRU 的流行范式构建可扩展的 PRU，那么 Aaronson-Kuperberg 酉综合问题就会有一个正解，这是量子复杂性理论中一个长期存在的问题，即实现任意酉是否可以有效地简化为计算布尔函数。具体来说，我们形式化了 ROM-PRU 的概念，它是随机预言模型 (ROM) 中统计上安全的 PRU。所有先前已知的密码安全PRU的构造都是基于ROM-PRU构造。我们证明了 ROM-PRU、近似酉设计、酉群上的 epsilon 网以及酉综合问题之间的新颖联系。特别是，我们证明任何酉综合算法（以及任何 ROM-PRU）都必须使用输入长度为 (2 - o(1)) log d 位的经典预言机，其中 d 是要实现的酉的维度。\n\n这一界限排除了文献中所有现有可扩展 PRU 的候选者。总之，这些联系表明 ROM-PRU 为研究伪随机幺正提供了一个富有成效的理想化模型。", "authors": [{"name": "Zvika Brakerski"}, {"name": "Henry Yuen"}], "featured_authors": [{"name": "Zvika Brakerski"}, {"name": "Henry Yuen"}], "author_count": 2}, {"id": "2605.10003", "category": "quant-ph", "title": "A low order Bargmann invariant hierarchy for set coherence", "abstract": "Set coherence is a basis-independent relational form of quantum coherence: a finite family of quantum states is set incoherent exactly when all its members are diagonal in one common basis. We determine how much low-order Bargmann data are needed to decide this property. For two states, second-order data are complete for qubits but fail for qutrits, while complete third-order data are sufficient for qutrits but fail already in dimension four. We then show that fourth-order, ordering-sensitive Bargmann invariants give the first universal pairwise criterion for set coherence. Applied to all unordered pairs, this criterion yields a complete test for arbitrary finite families. The result provides a low-order hierarchy connecting cyclic trace invariants with the noncommutativity that prevents a common incoherent basis.", "url": "https://arxiv.org/abs/2605.10003", "type": "理论", "summary": "集合相干性是量子相干性的一种与基无关的关系形式：当一个有限的量子态族的所有成员在一个公共基上都是对角线时，该量子态族就被设置为不相干的。我们确定需要多少低阶巴格曼数据来决定这个属性。对于两种状态，二阶数据对于量子位来说是完整的，但对于 qutrit 来说是失败的，而完整的三阶数据对于 qutrit 来说是足够的，但在第四维中已经失败了。然后我们证明四阶、排序敏感的巴格曼不变量给出了集合相干性的第一个通用成对准则。应用于所有无序对，该标准产生对任意有限族的完整测试。结果提供了一个低阶层次结构，将循环迹不变量与防止公共不相干基础的非交换性连接起来。", "authors": [{"name": "Yan-Ling Wang"}], "featured_authors": [{"name": "Yan-Ling Wang"}], "author_count": 1}, {"id": "2605.10255", "category": "quant-ph", "title": "Comparing Qubit and Qudit Encodings for EV Charging and Trip Assignment Problems", "abstract": "Variational quantum algorithms have attracted attention for their potential to solve combinatorial optimization problems. We study how the choice of encoding affects the resource requirements and optimization behavior of a variational quantum optimization algorithm. In order to quantify these effects, realistically inspired constrained electric vehicle (EV) fleet management problems were considered. These problems couple determining the optimal EV battery charging schedule with assigning EVs to trips requested by customers. We compare a conventional binary (qubit) trip encoding with an integer (qudit) encoding that represents assignments more directly. Both encodings guarantee the same feasible solution set, while the qudit encoding exponentially reduces the required Hilbert-space dimension. We solve many random instances of highly constrained uni- and bi-directional charging problems using qudit-based quantum approximate optimization algorithm (QAOA) and thoroughly evaluate the performance results. We find that the qudit encoding of customer trips achieves similar or better optimization performance at much reduced resource requirements and shorter simulation runtime. These results highlight qudit-native encodings as a practical route for integer and multi-valued scheduling problems in variational quantum optimization.", "url": "https://arxiv.org/abs/2605.10255", "type": "数值", "summary": "变分量子算法因其解决组合优化问题的潜力而引起人们的关注。我们研究编码的选择如何影响变分量子优化算法的资源需求和优化行为。为了量化这些影响，考虑了现实的受限电动汽车 (EV) 车队管理问题。这些问题与确定最佳电动汽车电池充电时间表以及将电动汽车分配给客户要求的行程相结合。我们将传统的二进制（qubit）行程编码与更直接地表示分配的整数（qudit）编码进行比较。两种编码都保证相同的可行解集，而 qudit 编码则以指数方式减少所需的希尔伯特空间维度。我们使用基于 qdit 的量子近似优化算法 (QAOA) 解决了高度约束的单向和双向充电问题的许多随机实例，并彻底评估了性能结果。我们发现，客户行程的 qdit 编码在大大减少的资源需求和更短的模拟运行时间的情况下实现了类似或更好的优化性能。\n\n这些结果凸显了 qdit 原生编码作为变分量子优化中整数和多值调度问题的实用途径。", "authors": [{"name": "Linus Ekstrøm"}, {"name": "Hao Wang"}, {"name": "Sebastian Schmitt"}], "featured_authors": [{"name": "Linus Ekstrøm"}, {"name": "Hao Wang"}, {"name": "Sebastian Schmitt"}], "author_count": 3}, {"id": "2605.10258", "category": "quant-ph", "title": "Parity Supervision as a Driver of Generalization in Quantum Generative Modeling", "abstract": "Generalizing from finite samples to unseen valid states is central to discrete generative modeling. In a controlled, exactly enumerable setting, we test whether parity losses, commonly used for tractable Instantaneous Quantum Polynomial-time (IQP) training, also provide an inductive bias for generalization. We compare an IQP circuit Born machine trained by parity supervision with the same circuit trained by coordinate-wise mean-squared-error (MSE), and with a classical maximum-entropy control given the same parity moments. Parity supervision improves exact forward Kullback-Leibler (KL) fit and unseen high-value-state recovery over IQP-MSE, while the maximum-entropy control does not reproduce the full effect. A parameter-free spectral reconstruction shows that parity moments already transfer evidence from observed samples to structurally compatible unseen states, which the IQP circuit further refines. This identifies parity supervision not only as a tractable training signal, but also as a generalization mechanism for IQP Born machines when the distribution to be learned, the parity objective, and the circuit architecture are structurally aligned.", "url": "https://arxiv.org/abs/2605.10258", "type": "理论", "summary": "从有限样本推广到未见过的有效状态是离散生成建模的核心。在受控的、精确可枚举的设置中，我们测试奇偶校验损失（通常用于易处理的瞬时量子多项式时间（IQP）训练）是否也为泛化提供归纳偏差。我们将通过奇偶校验监督训练的 IQP 电路 Born 机器与通过坐标均方误差 (MSE) 训练的相同电路以及给定相同奇偶矩的经典最大熵控制进行比较。奇偶校验监督改进了精确的前向 Kullback-Leibler (KL) 拟合和 IQP-MSE 上看不见的高值状态恢复，而最大熵控制不能再现全部效果。无参数光谱重建表明，奇偶矩已经将证据从观察到的样本转移到结构上兼容的未见状态，IQP 电路进一步完善了这一点。当要学习的分布、奇偶校验目标和电路架构在结构上一致时，这将奇偶校验监督不仅识别为易于处理的训练信号，而且还作为 IQP Born 机器的泛化机制。", "authors": [{"name": "Markus Baumann"}, {"name": "Daniel Hein"}, {"name": "Steffen Udluft"}, {"name": "Tobias Rohe"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "featured_authors": [{"name": "Markus Baumann"}, {"name": "Daniel Hein"}, {"name": "Steffen Udluft"}, {"name": "Tobias Rohe"}, {"name": "Claudia Linnhoff-Popien"}, {"name": "Jonas Stein"}], "author_count": 6}, {"id": "2605.10265", "category": "quant-ph", "title": "Expander attention as exchange-correlation", "abstract": "Kohn-Sham density functional theory (DFT) is the workhorse of quantum chemistry, offering an attractive balance between accuracy and computational cost. Although exact in principle, DFT in practice relies on an approximation to the unknown exchange-correlation (XC) functional, which encodes the many-body quantum effects beyond the mean-field treatment. Many such approximations exist, and machine-learned XC functionals have proliferated in recent years. A persistent challenge in this area is the trade-off between accuracy and computational cost: while high-accuracy ML functionals have shown success on strongly correlated systems that are notoriously difficult for conventional approximations, their unfavorable scaling has limited broader adoption. Here, we propose a linearly scaling non-local XC approximation based on an expander graph transformer ansatz, improving the scaling of $O(N^2)$ or worse for previous ML functionals capable of reliably capturing strongly correlated systems. We show that it recovers the correct $\\mathrm{H_2}$ dissociation curve in the strongly correlated regime, with promising results on planar $\\mathrm{H_4}$, a system where even high-level coupled cluster methods break down. Our approach thus charts a path toward ML functionals that are both accurate on strongly correlated systems and cheap enough to deploy at scale.", "url": "https://arxiv.org/abs/2605.10265", "type": "理论+数值", "summary": "Kohn-Sham 密度泛函理论 (DFT) 是量子化学的主力，在准确性和计算成本之间提供了有吸引力的平衡。尽管原则上是精确的，但 DFT 在实践中依赖于未知交换相关 (XC) 泛函的近似，该泛函编码超出平均场处理的多体量子效应。存在许多这样的近似，并且机器学习的 XC 泛函近年来激增。该领域持续存在的挑战是准确性和计算成本之间的权衡：虽然高精度机器学习泛函在传统近似很难实现的强相关系统上取得了成功，但其不利的扩展限制了更广泛的采用。在这里，我们提出了一种基于扩展图转换器 ansatz 的线性缩放非局部 XC 近似，改进了 $O(N^2)$ 的缩放比例，或者对于之前能够可靠捕获强相关系统的 ML 函数来说更糟。\n\n我们证明它在强相关状态下恢复了正确的 $\\mathrm{H_2}$ 解离曲线，并在平面 $\\mathrm{H_4}$ 上取得了有希望的结果，在这个系统中，即使是高级耦合聚类方法也会崩溃。因此，我们的方法绘制了一条通往 ML 函数的道路，该函数在强相关系统上既准确又足够便宜，可以大规模部署。", "authors": [{"name": "Karim K. Alaa El-Din"}, {"name": "Antonius v. Strachwitz"}, {"name": "Sam M. Vinko"}], "featured_authors": [{"name": "Karim K. Alaa El-Din"}, {"name": "Antonius v. Strachwitz"}, {"name": "Sam M. Vinko"}], "author_count": 3}, {"id": "2605.10314", "category": "quant-ph", "title": "Multipartite entanglement of random states of qubits", "abstract": "We investigate multipartite entanglement via the statistical properties of pure quantum states of n-qubits. By analyzing the distribution of purity among balanced bipartitions, we compare Haar-typical states, uniformly distributed on the unit sphere of states, with Hadamard states, being characterized by equal weights in the computational basis. We analyze different ensembles of Hadamard states characterized by their phase distributions. Through analytical and numerical calculations, we show that Hadamard states exhibit, on average, a higher degree of entanglement than Haar-typical states. In addition, we show that a particular class of Hadamard states, characterized by real coefficients with alternating signs, known as hypergraph states, appears especially relevant in the search for maximally multipartite entangled states, both for their structural simplicity and the increased likelihood of sampling highly entangled states. These results identify Hadamard states as a tractable yet promising class for exploring multipartite entanglement structures and advancing the characterization of maximally multipartite entangled quantum states.", "url": "https://arxiv.org/abs/2605.10314", "type": "理论+数值", "summary": "我们通过 n 量子位的纯量子态的统计特性来研究多部分纠缠。通过分析平衡二分之间的纯度分布，我们将均匀分布在单位态球上的哈尔典型态与在计算基础上具有相同权重特征的哈达玛态进行了比较。我们分析了以其相位分布为特征的哈达玛态的不同系综。通过分析和数值计算，我们表明哈达玛态平均表现出比哈尔典型态更高的纠缠度。此外，我们还表明，一类特定的哈达马态，其特征是具有交替符号的实系数，称为超图态，在搜索最大多部分纠缠态时显得特别相关，因为它们的结构简单，并且增加了对高度纠缠态进行采样的可能性。这些结果表明，哈达马态是一类易于处理且有前途的类别，可用于探索多部分纠缠结构并推进最大多部分纠缠量子态的表征。", "authors": [{"name": "Giorgia Trotta"}, {"name": "Paolo Scarafile"}, {"name": "Paolo Facchi"}, {"name": "Giuseppe Magnifico"}, {"name": "Angelo Mariano"}, {"name": "Giorgio Parisi"}, {"name": "Saverio Pascazio"}, {"name": "Karol Życzkowski"}], "featured_authors": [{"name": "Giorgia Trotta"}, {"name": "Paolo Scarafile"}, {"name": "Paolo Facchi"}, {"name": "Giorgio Parisi"}, {"name": "Saverio Pascazio"}, {"name": "Karol Życzkowski"}], "author_count": 8}, {"id": "2605.10492", "category": "quant-ph", "title": "Perspective on tailoring quantum coherence with electron beams", "abstract": "Examining and controlling the interaction between semiconductor quantum qubits and their environment can boost semiconductor quantum technologies, which have many applications in table-top quantum computing hardware. Electron beams in electron microscopes have opened up a new avenue for the quantum-coherent probing of semiconductor excitations and strong-coupling effects. Here, I provide a brief overview of recent advancements in electron-beam probes for investigating quantum coherence in semiconductors and two-dimensional materials, complemented by my perspective on using electron beams to manipulate the entanglement and correlations between quantum systems.", "url": "https://arxiv.org/abs/2605.10492", "type": "理论", "summary": "检查和控制半导体量子位及其环境之间的相互作用可以促进半导体量子技术的发展，该技术在桌面量子计算硬件中有许多应用。电子显微镜中的电子束为半导体激发和强耦合效应的量子相干探测开辟了一条新途径。在这里，我简要概述了用于研究半导体和二维材料中的量子相干性的电子束探针的最新进展，并补充了我对使用电子束操纵量子系统之间的纠缠和相关​​性的观点。", "authors": [{"name": "Nahid Talebi"}], "featured_authors": [{"name": "Nahid Talebi"}], "author_count": 1}, {"id": "2605.10497", "category": "quant-ph", "title": "Study of the Superradiance Phenomenon in the $α$--attractor Potential using the Log Derivative Method", "abstract": "In this article, we solved the time--independent one--dimensional Klein--Gordon equation in the presence of $\\alpha$--attractor potential using the Log derivative method. We calculated the reflection coefficient $\\mathcal{R}$ and the transmission coefficient $\\mathcal{T}$, showing that the superradiance phenomenon is present. In order to demonstrate the accuracy of our method, we performed a comparison with the analytical solution for the hyperbolic tangent potential.", "url": "https://arxiv.org/abs/2605.10497", "type": "理论+数值", "summary": "在本文中，我们使用对数导数方法求解了存在$\\alpha$-吸引子势的情况下与时间无关的一维克莱因-戈登方程。我们计算了反射系数$\\mathcal{R}$和透射系数$\\mathcal{T}$，表明超辐射现象是存在的。为了证明我们方法的准确性，我们与双曲正切势的解析解进行了比较。", "authors": [{"name": "Ángel Salazar"}, {"name": "Quray Potosí"}, {"name": "David Laroze"}, {"name": "Laura M. Pérez"}, {"name": "Benjamín de Zayas"}, {"name": "Clara Rojas"}], "featured_authors": [{"name": "Ángel Salazar"}, {"name": "Quray Potosí"}, {"name": "David Laroze"}, {"name": "Laura M. Pérez"}, {"name": "Benjamín de Zayas"}, {"name": "Clara Rojas"}], "author_count": 6}, {"id": "2605.10637", "category": "quant-ph", "title": "Dynamical Criticality Behind Energy-Storage Singularities in Quantum Batteries", "abstract": "Energy-storage singularities in quantum batteries are often associated with equilibrium quantum criticality. Here we show that, in quench-driven many-body batteries, such singularities can originate from dynamical criticality in momentum space. Using the transverse-field Ising chain as a representative free-fermion quantum battery, we develop a momentum-resolved description of the charging process. The long-time stored energy forms a dephasing plateau whose dependence on the quench strength becomes nonanalytic when a real dynamical critical momentum emerges. More generally, for free-fermion two-band quantum batteries, each momentum sector
