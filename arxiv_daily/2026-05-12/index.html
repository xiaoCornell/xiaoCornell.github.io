  <style>

  <script>
    const papers = [{"id": "2605.08107", "category": "cond-mat", "title": "Criticality in optical properties of the Drude and Drude-Sommerfeld metals around the plasma frequencies for high carrier concentrations", "abstract": "We have analytically determined the attenuation constant of the Drude metal for the entire range of frequency ($0<\\omega<\\infty$) of an electromagnetic (plane) wave incident on it within a single framework of classical electrodynamics. Here, by the Drude metal, we mean an electrical conductor that obeys the Drude model for the conduction electrons. We further consider the conductor to have linear dielectric and magnetic properties (i.e. permittivity $\\epsilon>\\epsilon_0$ and permeability $\\mu>\\mu_0$) due to the bound charges and bound currents in the background. Interestingly, for such a conductor with a high carrier concentration ($\\omega_p\\tau\\gg1$), we have obtained a simple form of the attenuation constant $k_-\\simeq+\\sqrt{\\frac{\\mu\\epsilon}{2}}\\sqrt{\\omega_p^2-\\omega^2+|\\omega_p^2-\\omega^2|}$ for a wide range of high frequencies below and above plasma frequency $\\omega_p$. Such a result gives rise to criticality in the conductor's optical properties, such as -- the attenuation constant, group velocity, and complex dielectric constant near around $\\omega=\\omega_p$. We have obtained the critical exponents for these quantities. We also have obtained a quantum correction to the optical properties within the Drude-Sommerfeld model with the Thomas-Fermi screening.", "url": "https://arxiv.org/abs/2605.08107", "type": "理论", "summary": "我们在经典电动力学的单一框架内分析确定了德鲁德金属在入射电磁（平面）波的整个频率范围（$0<\\omega<\\infty$）内的衰减常数。在这里，德鲁德金属是指遵循传导电子德鲁德模型的电导体。由于背景中的束缚电荷和束缚电流，我们进一步认为导体具有线性介电和磁性（即介电常数 $\\epsilon>\\epsilon_0$ 和磁导率 $\\mu>\\mu_0$）。有趣的是，对于这种具有高载流子浓度的导体（$\\omega_p\\tau\\gg1$），我们获得了衰减常数$k_-\\simeq+\\sqrt{\\frac{\\mu\\epsilon}{2}}\\sqrt{\\omega_p^2-\\omega^2+|\\omega_p^2-\\omega^2|}$的简单形式，适用于低于和高于等离子体频率$\\omega_p$的广泛高频。这样的结果引起了导体光学特性的关键性，例如$\\omega=\\omega_p$附近的衰减常数、群速度和复介电常数。我们已经获得了这些量的临界指数。\n\n我们还通过托马斯-费米筛选对德鲁德-索末菲模型中的光学特性进行了量子校正。", "authors": [{"name": "Bikram Keshari Behera"}, {"name": "Rhitabrata Bhattacharyya"}, {"name": "Shyamal Biswas"}], "featured_authors": [{"name": "Bikram Keshari Behera"}, {"name": "Rhitabrata Bhattacharyya"}, {"name": "Shyamal Biswas"}], "author_count": 3}, {"id": "2605.08120", "category": "cond-mat", "title": "Heat Transfer in Phase Change Materials with Multiple Fin Insertion", "abstract": "We leverage 3D numerical simulations to study phase change materials (PCMs) cells under the effect of buoyancy forces. The solid PCM is heated from a source boundary, triggering melting. The source features multiple solid fins that protrude into the PCM cell; the impact of the fins and their number is investigated by designing and testing equivalent (in terms of heating power) finless and single fin simulations. For each configuration, the performance is quantified via the total molten substance in time. The designs were also tested for different values of the non-dimensional numbers encoding relevant properties. We confirm that fins increase the melting performance and find that single fin configurations are sub-optimal since a layout with multiple fins takes advantage of interstitial spaces, melting the substance more efficiently. The results also indicate that fins should be properly spaced, as closeness can result in overlapping, thus interfering, molten areas.", "url": "https://arxiv.org/abs/2605.08120", "type": "理论+数值", "summary": "我们利用 3D 数值模拟来研究浮力作用下的相变材料 (PCM) 电池。固体 PCM 从源边界受热，引发熔化。该源具有多个伸入 PCM 单元的实心翅片； the impact of the fins and their number is investigated by designing and testing equivalent (in terms of heating power) finless and single fin simulations.对于每种配置，性能通过及时的熔融物质总量来量化。还针对编码相关属性的无量纲数的不同值对设计进行了测试。我们确认翅片可以提高熔化性能，并发现单翅片配置不是最佳选择，因为多个翅片的布局利用了间隙空间，可以更有效地熔化物质。结果还表明，翅片应适当间隔，因为距离太近可能会导致熔化区域重叠，从而产生干扰。", "authors": [{"name": "Paolo Proia"}, {"name": "Mauro Sbragaglia"}, {"name": "Giacomo Falcucci"}], "featured_authors": [{"name": "Paolo Proia"}, {"name": "Mauro Sbragaglia"}, {"name": "Giacomo Falcucci"}], "author_count": 3}, {"id": "2605.08262", "category": "cond-mat", "title": "SLayerGen: a Crystal Generative Model for all Space and Layer Groups", "abstract": "Crystal generative models have shown rapid progress for accelerating the discovery of bulk, periodic materials. However, many material systems such as 2D superconductors, thin film semiconductors, and catalytic surfaces are diperiodic, i.e., aperiodic along one of the lattice directions. These systems are invariant under the layer groups, which are known to influence materials properties yet not considered by existing models. In this paper, we propose SLayerGen, a generative model that produces crystals constrained to be invariant to any space or layer group. SLayerGen consists of coarse-to-fine discrete autoregressive lattice generation; transformer-based autoregressive sampling of Wyckoff positions, elements, and numbers of symmetrically unique atoms; and space or layer group equivariant diffusion of atomic coordinates. For the diffusion component, we corrected an inconsistency in the loss from prior work arising from hexagonal groups being non-orthogonal in fractional coordinates. To facilitate progress in generative modeling of diperiodic materials, we assembled and filtered datasets of monolayers and bilayers, propose relevant evaluation metrics, and developed novel representations for layer group symmetries. For de novo generation of diperiodic materials, SLayerGen achieves consistent performance gains over bulk crystal generative models and is competitive when training jointly on bulk and diperiodic materials.", "url": "https://arxiv.org/abs/2605.08262", "type": "理论", "summary": "Crystal generative models have shown rapid progress for accelerating the discovery of bulk, periodic materials.然而，许多材料系统，如二维超导体、薄膜半导体和催化表面是双周期的，即沿晶格方向之一是非周期的。 These systems are invariant under the layer groups, which are known to influence materials properties yet not considered by existing models. In this paper, we propose SLayerGen, a generative model that produces crystals constrained to be invariant to any space or layer group. SLayerGen consists of coarse-to-fine discrete autoregressive lattice generation; transformer-based autoregressive sampling of Wyckoff positions, elements, and numbers of symmetrically unique atoms; and space or layer group equivariant diffusion of atomic coordinates.对于扩散分量，我们纠正了先前工作中由于六边形群在分数坐标中不正交而导致的损失不一致。\n\n为了促进双周期材料生成建模的进展，我们组装和过滤了单层和双层的数据集，提出了相关的评估指标，并开发了层组对称性的新颖表示。对于双周期材料的从头生成，SLayerGen 比块体晶体生成模型实现了一致的性能增益，并且在块体和双周期材料联合训练时具有竞争力。", "authors": [{"name": "Rees Chang"}, {"name": "Andrew Novick"}, {"name": "Ryan P Adams"}, {"name": "Elif Ertekin"}], "featured_authors": [{"name": "Rees Chang"}, {"name": "Andrew Novick"}, {"name": "Ryan P Adams"}, {"name": "Elif Ertekin"}], "author_count": 4}, {"id": "2605.08414", "category": "cond-mat", "title": "Mirror transitions in diffusion with stochastic resetting confined on a ring", "abstract": "Diffusion with an incorporated resetting mechanism provides a reference framework for modeling a wide range of natural phenomena. Within this framework, the optimal resetting rate is a key quantity that arises from the optimization of the mean first-passage time. While substantial work has focused on the study of the optimal resetting rate in unbounded one dimensional domains, little is still known about the optimization of the mean first-passage time in bounded systems, in particular when multiple resetting sites are available. In this work, we consider a particle diffusing along a circular circumference and under resetting, with an absorbing target site at a fixed location. Using the appropriate free propagator for this system, we compute the Laplace transform of the survival probability when resetting occurs to multiple sites drawn from an arbitrary probability density function. We also calculate the mean first-passage time at the target site, and study the dependence of the optimal resetting rate in terms of the relevant parameters of the system in a two-resetting site configuration. Depending on the arc length between one of the resetting sites and the absorbing target site, and the weight of the remaining resetting site, the optimal resetting rate can exhibit abrupt (\"first order'') and continuous (\"second order'') transitions. Moreover, the behavior of the mean first-passage time is rich enough to allow both critical and tri-critical points to exist in the parameter space. All the transitions have \"mirror symmetry'' around the selected target site and its corresponding diametrically opposite site.", "url": "https://arxiv.org/abs/2605.08414", "type": "理论+数值", "summary": "Diffusion with an incorporated resetting mechanism provides a reference framework for modeling a wide range of natural phenomena. Within this framework, the optimal resetting rate is a key quantity that arises from the optimization of the mean first-passage time.虽然大量工作集中在无界一维域中的最佳重置速率的研究，但对于有界系统中平均首次通过时间的优化仍然知之甚少，特别是当有多个重置位点可用时。在这项工作中，我们考虑沿圆周扩散并处于重置状态的粒子，吸收目标位置位于固定位置。使用该系统适当的自由传播器，我们计算当从任意概率密度函数抽取的多个站点发生重置时生存概率的拉普拉斯变换。我们还计算了目标位点的平均首次通过时间，并研究了两次重置位点配置中系统相关参数对最佳重置率的依赖性。\n\n根据一个复位位点和吸收目标位点之间的弧长以及剩余复位位点的重量，最佳复位速率可以表现出突然（“一阶”）和连续（“二阶”）转变。此外，平均首次通过时间的行为足够丰富，允许参数空间中同时存在临界点和三临界点。所有转变都围绕选定的目标位点及其相应的完全相反的位点具有“镜像对称性”。", "authors": [{"name": "Pedro Julián-Salgado"}, {"name": "Pavel Castro-Villarreal"}, {"name": "Leonardo Dagdug"}, {"name": "Denis Boyer"}], "featured_authors": [{"name": "Pedro Julián-Salgado"}, {"name": "Pavel Castro-Villarreal"}, {"name": "Leonardo Dagdug"}, {"name": "Denis Boyer"}], "author_count": 4}, {"id": "2605.08466", "category": "cond-mat", "title": "Multiscale modeling of materials and neural operators", "abstract": "Multiscale modeling is essential for understanding the complex behavior of materials. However, accurately transferring all relevant information from one scale to another has remained an outstanding challenge. Neural operators, discretization-independent generalizations of neural networks, is proving to be a powerful tool in addressing this challenge. This article provides an introduction to neural operators, and illustrates their use in multiscale modeling of materials through three selected examples.", "url": "https://arxiv.org/abs/2605.08466", "type": "理论", "summary": "Multiscale modeling is essential for understanding the complex behavior of materials. However, accurately transferring all relevant information from one scale to another has remained an outstanding challenge.神经算子，即独立于离散化的神经网络泛化，被证明是应对这一挑战的强大工具。本文介绍了神经算子，并通过三个选定的示例说明了它们在材料多尺度建模中的使用。", "authors": [{"name": "Kaushik Bhattacharya"}], "featured_authors": [{"name": "Kaushik Bhattacharya"}], "author_count": 1}, {"id": "2605.08490", "category": "cond-mat", "title": "Antiferro-Chiral Phonons in $\\mathcal{P}\\mathcal{T}$-Symmetric Antiferromagnets", "abstract": "Chiral phonons provide a route to couple lattice motion to magnetic order, but conventional chiral phonons carry a net angular momentum and thus couple naturally to net magnetization rather than to compensated Néel order. Here we show that $\\mathcal{P}\\mathcal{T}$-symmetric antiferromagnets can host \\emph{antiferro-chiral phonons} (AFCPs): phonon modes with vanishing total angular momentum but finite sublattice-staggered angular momentum. Symmetry enforces this distinction because $\\mathcal{P}\\mathcal{T}$ forbids a net phonon angular momentum while allowing counter-rotating local motion on inversion-related sublattices. AFCPs arise from a Néel-vector-locked coupling between Raman and infrared-active phonons. The coupling is odd under both $\\mathcal{P}$ and $\\mathcal{T}$ while preserving their product. Through this hybridization, the normal modes acquire both Raman and infrared character and carry a sublattice-staggered phonon angular momentum that acts as a conjugate field to the Néel vector. This coupling is microscopically generated by the molecular Berry curvature, which is demonstrated in a prototype lattice model. Reversing the Néel vector reverses the staggered phonon chirality. These results indicate AFCPs as probes of antiferromagnetic order and suggest coherent phonon excitation as a route to its dynamical control.", "url": "https://arxiv.org/abs/2605.08490", "type": "理论", "summary": "手性声子提供了将晶格运动与磁序耦合的途径，但传统的手性声子带有净角动量，因此自然地与净磁化耦合而不是与补偿的尼尔级耦合。在这里，我们证明$\\mathcal{P}\\mathcal{T}$对称反铁磁体可以承载\\emph{反铁手性声子}（AFCP）：总角动量消失但亚晶格交错角动量有限的声子模式。对称性强化了这种区别，因为 $\\mathcal{P}\\mathcal{T}$ 禁止净声子角动量，同时允许反转相关子晶格上的反向旋转局部运动。 AFCPs arise from a Néel-vector-locked coupling between Raman and infrared-active phonons. The coupling is odd under both $\\mathcal{P}$ and $\\mathcal{T}$ while preserving their product.通过这种杂化，简正模式获得拉曼和红外特征，并携带亚晶格交错声子角动量，充当尼尔矢量的共轭场。 This coupling is microscopically generated by the molecular Berry curvature, which is demonstrated in a prototype lattice model.\n\n反转尼尔矢量会反转交错声子手性。这些结果表明 AFCP 作为反铁磁序的探针，并表明相干声子激发作为其动态控制的途径。", "authors": [{"name": "Sanjib Kumar Das"}, {"name": "Randy Yeh"}, {"name": "Yafei Ren"}], "featured_authors": [{"name": "Sanjib Kumar Das"}, {"name": "Randy Yeh"}, {"name": "Yafei Ren"}], "author_count": 3}, {"id": "2605.08531", "category": "cond-mat", "title": "Fokker--Planck framework for stochastic octupole moment dynamics in chiral antiferromagnet Mn3Sn", "abstract": "We develop a reduced stochastic framework for thermally assisted octupole moment dynamics in Mn3Sn by combining the reduced Landau--Lifshitz--Gilbert (LLG) equation with the Fokker--Planck formalism. The reduced model is benchmarked against the complete three-sublattice octupole dynamics and is shown to capture the essential switching behavior with good accuracy. We then derive the corresponding Fokker--Planck equation, which is implemented and solved via a CUDA-accelerated solver. The analysis shows that the octupole dynamics are highly sensitive to the out-of-plane grid resolution because ultrafast rotation of the octupole is controlled by its very small deviations from the basal plane. The solver is validated against Monte Carlo simulations through equilibrium distributions, relaxation trajectories, and switching times. Finally, we apply the method to thermally assisted field-driven switching and demonstrate efficient access to ultra-low error probabilities beyond the practical reach of direct Monte Carlo simulations.", "url": "https://arxiv.org/abs/2605.08531", "type": "理论+数值", "summary": "我们通过将简化的 Landau--Lifshitz--Gilbert (LLG) 方程与 Fokker--Planck 形式相结合，开发了 Mn3Sn 热辅助八极矩动力学的简化随机框架。简化模型以完整的三子晶格八极动力学为基准，并被证明能够以良好的精度捕获基本的开关行为。然后我们导出相应的 Fokker-Planck 方程，该方程通过 CUDA 加速求解器实现和求解。分析表明，八极动力学对​​面外网格分辨率高度敏感，因为八极的超快旋转是由其与基面的非常小的偏差控制的。通过平衡分布、松弛轨迹和切换时间，针对蒙特卡罗模拟对求解器进行了验证。最后，我们将该方法应用于热辅助场驱动开关，并展示了超低误差概率的有效访问，超出了直接蒙特卡罗模拟的实际范围。", "authors": [{"name": "Siyuan Qian"}, {"name": "Shaloo Rakheja"}], "featured_authors": [{"name": "Siyuan Qian"}, {"name": "Shaloo Rakheja"}], "author_count": 2}, {"id": "2605.08620", "category": "cond-mat", "title": "The superite phase and phase transition inducing multiscale solidification microstructures and segregations in steels", "abstract": "Based on classical concept, solidification of alloys is a direct transition from liquid phase to solid phase, by which dendrites and dendritic segregation are produced. Through in-situ and real time morphology observation and XRD test during solidification of three steels, a new superite phase featured as statistically oriented tiny structures was identified, and a general liquid-superite-solid phase transformation process is revealed. In the early solidification stage, the liquid alloys transit to dendrites composed of superite phase. Initiated from the boundaries of dendritic arms or dendrite grains, the superite phase transits to austenite grains within an initial dendritic arm, and expels solute elements to the residual superite phase. Mixed multi-phase microstructures are subsequently produced from the residual enriched superite phase. Here, although three steels exhibit different phase proportion and phase constitution in the superite-solid transition, they all follow above general transition mode. Multiscale microstructures and segregations are produced in the transition from superite to solid. These new findings change the basic understanding about the solidification of alloys, rediscover the formation mechanism on segregations and multiscale solidification microstructures, including dendrite pattern, solid dendritic arm, dendritic segregation, the mixed multi-phase microstructures, eutectic, inclusions and precipitate. These new findings are also crucial to the control of solidification microstructures and segregation in metals.", "url": "https://arxiv.org/abs/2605.08620", "type": "理论", "summary": "根据经典概念，合金的凝固是从液相到固相的直接转变，由此产生枝晶和枝晶偏析。通过对三种钢凝固过程中的原位实时形貌观察和X射线衍射测试，发现了一种以统计取向的微小结构为特征的新超晶石相，并揭示了一般的液-超晶石-固相变过程。在凝固早期，液态合金转变为由超级晶相组成的枝晶。从枝晶臂或枝晶晶粒的边界开始，超晶体相转变为初始枝晶臂内的奥氏体晶粒，并将溶质元素排出至残余超晶体相。随后由残留的富集超晶石相产生混合多相微观结构。这里，虽然三种钢在超晶体-固相转变中表现出不同的相比例和相组成，但它们都遵循上述一般转变模式。从超晶石到固体的转变过程中产生多尺度微观结构和偏析。\n\n这些新发现改变了人们对合金凝固的基本认识，重新发现了偏析和多尺度凝固微观结构的形成机制，包括枝晶形态、实心枝晶臂、枝晶偏析、混合多相组织、共晶、夹杂物和析出物。这些新发现对于控制金属的凝固微观结构和偏析也至关重要。", "authors": [{"name": "Xiaoping Ma"}, {"name": "Dianzhong Li"}, {"name": "Zhuo Zhao"}, {"name": "Saichao Cao"}, {"name": "Donghao Pei"}, {"name": "Pei Wang"}, {"name": "Yuxi Tao"}, {"name": "Paixian Fu"}, {"name": "Hongwei Liu"}, {"name": "Xiuhong Kang"}], "featured_authors": [{"name": "Xiaoping Ma"}, {"name": "Dianzhong Li"}, {"name": "Zhuo Zhao"}, {"name": "Paixian Fu"}, {"name": "Hongwei Liu"}, {"name": "Xiuhong Kang"}], "author_count": 10}, {"id": "2605.08780", "category": "cond-mat", "title": "Concentration-Dependent Membrane Destabilization in DPPC Bilayers: Distinct Insertion Mechanisms and Stress Redistribution by Chloroform and Alkanols", "abstract": "How do solute concentration and molecular chemistry govern the transition from membrane saturation to destabilization? We address this using microsecond-scale molecular dynamics simulations of dipalmitoylphosphatidylcholine (DPPC) bilayers with chloroform (CHCl$_3$) and a homologous series of alkanols (methanol, ethanol, octanol) over $0-50\\%$ concentrations. Although complete membrane melting is not observed within $1000\\, ns$, all systems exhibit clear precursors of destabilization, including enhanced thickness fluctuations, reduced lipid order, and mechanical softening. Chloroform induces pronounced thinning and large fluctuations, consistent with deep, transient insertion. Methanol perturbs primarily the headgroup region, while ethanol shows intermediate behavior with partial insertion. Octanol preserves bilayer thickness at high concentrations due to lipid-like insertion but significantly increases fluctuations and interdigitation. Across all systems, increasing concentration decreases the area compressibility modulus and deuterium order parameter, accompanied by smoothing of lateral pressure profiles, indicating stress redistribution. Free energy analysis reveals increased membrane partitioning and reduced translocation barriers with concentration, strongest for octanol and weakest for methanol. These results demonstrate that membrane destabilization is governed by the interplay of insertion depth, interfacial crowding, and lipid packing disruption.", "url": "https://arxiv.org/abs/2605.08780", "type": "数值", "summary": "溶质浓度和分子化学如何控制从膜饱和到不稳定的转变？我们使用二棕榈酰磷脂酰胆碱 (DPPC) 双层与氯仿 (CHCl$_3$) 和一系列同系烷醇（甲醇、乙醇、辛醇）在 0-50\\%$ 浓度范围内的微秒级分子动力学模拟来解决这个问题。尽管在 $1000\\, ns$ 内未观察到完全的膜熔化，但所有系统都表现出明显的不稳定前兆，包括厚度波动增强、脂质有序度降低和机械软化。氯仿会引起明显的变薄和大的波动，这与深度、短暂的插入一致。甲醇主要扰乱头基区域，而乙醇则表现出部分插入的中间行为。由于类脂插入，辛醇在高浓度下保留了双层厚度，但显着增加了波动和交错。在所有系统中，增加浓度会降低面积压缩模量和氘序参数，并伴随侧压力分布的平滑，表明应力重新分布。\n\n自由能分析表明，随着浓度的增加，膜分配增加，易位势垒减少，辛醇最强，甲醇最弱。这些结果表明，膜的不稳定是由插入深度、界面拥挤和脂质堆积破坏的相互作用控制的。", "authors": [{"name": "Anirban Polley"}], "featured_authors": [{"name": "Anirban Polley"}], "author_count": 1}, {"id": "2605.08860", "category": "cond-mat", "title": "A Closer Look on the Influence of Constraints Upon the Optimization of the Nonadditive Entropic Functional $S_{q}$", "abstract": "The thermal-equilibrium canonical distribution is currently obtained by maximizing the Boltzmann-Gibbs-von Neumann-Shannon entropy $S_{BG}(p)=k\\sum^{W}_{i=1}p_{i}\\ln 1/p_{i}$ constrained to $\\sum^{W}_{i=1}p_{i}=1$ and $\\sum^{W}_{i=1}p_{i}\\,e_{i}=U$, $e_{1}\\leq\\ldots\\leq e_{W}$ being the energies of the $W$ possible states and $U\\in[e_{1},e_{W}]$ their mean value. We revisit a generalized version of this optimization problem grounded in the nonadditive entropy $S_{q}(p)=k\\,(\\sum^{W}_{i=1}p_{i}^{q}-1)/(1-q)$ (frequently, though not necessarily, $q\\in(0,1)$; $S_1=S_{BG}$), and the constraint $\\sum^{W}_{i=1} p_{i}^{q^{\\prime}}e_{i} / \\sum^{W}_{i=1}p_{i}^{q^{\\prime}}=U$, $q^{\\prime}>0$. Sufficient conditions for existence, strict positivity, and uniqueness of solutions are derived, along with a theorem that enables their closed-form calculation. We apply these results to deepen the understanding of the two standard cases in the literature ($q^{\\prime}=1$ and $q^{\\prime}=q$), as well as of a new one ($q^{\\prime}=2-q$). We prove that these standard cases are the only ones yielding optimizing probability distributions of $q$-exponential form. Furthermore, we define an effective temperature $T_{q,q^{\\prime}}$ through a Clausius-like relation $1/T_{q,q^{\\prime}}=\\partial S_{q} / \\partial U$ and derive a Helmholtz-like energy $F_{q,q^{\\prime}}=U-T_{q,q^{\\prime}}S_{q}$, with the former grounding the validity of the $0^{th}$ Principle of Thermodynamics within this generalized statistical mechanics. Finally, we show that the case with a linear constraint (i.e., $q^{\\prime}=1$) with $q\\in(0,1)$ (i) preserves the Third Law of Thermodynamics; (ii) can be used to model classical many-body Hamiltonian systems with arbitrarily-ranged interactions; and (iii) resembles features of low-dimensional nonlinear dynamical systems at the edge of chaos.", "url": "https://arxiv.org/abs/2605.08860", "type": "理论+数值", "summary": "目前，热平衡正则分布是通过最大化 Boltzmann-Gibbs-von Neumann-Shannon 熵 $S_{BG}(p)=k\\sum^{W}_{i=1}p_{i}\\ln 1/p_{i}$ 约束为 $\\sum^{W}_{i=1}p_{i}=1$ 来获得的，并且$\\sum^{W}_{i=1}p_{i}\\,e_{i}=U$，$e_{1}\\leq\\ldots\\leq e_{W}$ 是 $W$ 可能状态的能量，$U\\in[e_{1},e_{W}]$ 是它们的平均值。我们重新审视这个基于非加性熵 $S_{q}(p)=k\\,(\\sum^{W}_{i=1}p_{i}^{q}-1)/(1-q)$ 的优化问题的广义版本（经常但不一定是 $q\\in(0,1)$; $S_1=S_{BG}$）和约束 $\\sum^{W}_{i=1} p_{i}^{q^{\\prime}}e_{i} / \\sum^{W}_{i=1}p_{i}^{q^{\\prime}}=U$，$q^{\\prime}>0$。导出了存在的充分条件、严格的正性和解的唯一性，以及实现其封闭式计算的定理。我们应用这些结果来加深对文献中两种标准情况（$q^{\\prime}=1$ 和 $q^{\\prime}=q$）以及新标准情况（$q^{\\prime}=2-q$）的理解。我们证明这些标准情况是唯一产生 $q$ 指数形式的优化概率分布的情况。\n\n此外，我们通过类克劳修斯关系 $1/T_{q,q^{\\prime}}=\\partial S_{q} / \\partial U$ 定义有效温度 $T_{q,q^{\\prime}}$ 并导出类亥姆霍兹能量 $F_{q,q^{\\prime}}=U-T_{q,q^{\\prime}}S_{q}$，前者为$0^{th}$ 广义统计力学中的热力学原理。最后，我们证明了具有线性约束（即 $q^{\\prime}=1$）且 $q\\in(0,1)$ (i) 的情况保留了热力学第三定律； (ii) 可用于模拟具有任意范围相互作用的经典多体哈密顿系统； (iii) 类似于处于混沌边缘的低维非线性动力系统的特征。", "authors": [{"name": "Leandro Lyra Braga Dognini"}, {"name": "Constantino Tsallis"}], "featured_authors": [{"name": "Leandro Lyra Braga Dognini"}, {"name": "Constantino Tsallis"}], "author_count": 2}, {"id": "2605.08948", "category": "cond-mat", "title": "Bond strengths in solids computed from a Wannier-type construction of local vibrational modes", "abstract": "We introduce a Wannier-type formulation of periodic local vibrational mode theory that yields real-space-localized vibrational modes associated with individual internal coordinates in crystalline solids. These modes are constructed as locally coherent superpositions of wavevector-resolved local modes, yielding a smooth and gauge-consistent real-space representation without the need for additional phase-fixing procedures. The resulting Wannier-type local modes provide well-defined force constants and frequencies that enable robust, chemically interpretable measures of bond and interaction strengths in periodic systems. Moreover, our framework demonstrates that phonon dispersion behavior makes important contributions to the bond and interaction strengths calculated via local vibrational mode theory. We demonstrate the method for representative ionic and covalent systems, including MgO, tetrahedrally-coordinated C, Si, SiC, and two polymorphs of CaCO3. Our framework establishes a direct analog of molecular local modes for fully periodic systems and opens new avenues for quantitative bonding analysis in crystalline materials.", "url": "https://arxiv.org/abs/2605.08948", "type": "理论+数值", "summary": "我们引入了周期性局域振动模式理论的 Wannier 型公式，该公式产生与晶体固体中各个内坐标相关的实空间局域振动模式。这些模式被构造为波矢量解析的局部模式的局部相干叠加，产生平滑且规范一致的实空间表示，而不需要额外的相位固定程序。由此产生的万尼尔型局部模式提供了明确定义的力常数和频率，从而能够对周期性系统中的键和相互作用强度进行稳健的、化学可解释的测量。此外，我们的框架表明声子色散行为对通过局部振动模式理论计算的键和相互作用强度做出了重要贡献。我们演示了代表性离子和共价体系的方法，包括 MgO、四面体配位 C、Si、SiC 和 CaCO3 的两种多晶型物。我们的框架建立了全周期系统分子局域模式的直接模拟，并为晶体材料的定量键合分析开辟了新途径。", "authors": [{"name": "Mateusz Mojsak"}, {"name": "Elfi Kraka"}, {"name": "Adam A. L. Michalchuk"}], "featured_authors": [{"name": "Mateusz Mojsak"}, {"name": "Elfi Kraka"}, {"name": "Adam A. L. Michalchuk"}], "author_count": 3}, {"id": "2605.08960", "category": "cond-mat", "title": "CrystalREPA: Transferring Physical Priors from Universal MLIPs to Crystal Generative Models", "abstract": "Crystal generative models mainly learn what stable crystals look like, with little explicit supervision for what makes them stable. We reveal a substantial representation gap between state-of-the-art crystal generative models and pretrained universal machine learning interatomic potentials (MLIPs) via energy probing, and show this gap can be closed by a simple training-time alignment. We propose Crystal REPresentation Alignment (CrystalREPA), a plug-and-play framework that aligns the atom-wise hidden states of generative encoders with frozen MLIP representations through an element-aware contrastive objective, transferring stability-aware atomistic priors with marginal training overhead and no additional inference cost. Across three generative frameworks, ten MLIP teachers, and two benchmark datasets, CrystalREPA consistently improves the thermodynamic stability, structural validity, and structural fidelity of generated crystals. Equally important, we find that an MLIP's transfer effectiveness is poorly predicted by its accuracy on standard leaderboards (e.g., Matbench Discovery) but strongly predicted by the distinguishability of its atom-wise representation space, yielding a practical, accuracy-independent criterion for selecting MLIP teachers for generative transfer.", "url": "https://arxiv.org/abs/2605.08960", "type": "理论+数值", "summary": "晶体生成模型主要学习稳定晶体的外观，很少明确监督它们稳定的原因。我们通过能量探测揭示了最先进的晶体生成模型与预训练的通用机器学习原子间势（MLIP）之间存在巨大的表征差距，并表明这种差距可以通过简单的训练时间对齐来弥补。我们提出了 Crystal REPresentation Alignment (CrystalREPA)，这是一种即插即用框架，通过元素感知对比目标将生成编码器的原子隐藏状态与冻结的 MLIP 表示对齐，以边际训练开销传输稳定性感知原子先验，且无需额外的推理成本。通过三个生成框架、十名 MLIP 教师和两个基准数据集，CrystalREPA 不断提高生成晶体的热力学稳定性、结构有效性和结构保真度。\n\n同样重要的是，我们发现 MLIP 的迁移有效性很难通过其在标准排行榜（例如 Matbench Discovery）上的准确性来预测，但可以通过其原子表示空间的可区分性来强烈预测，从而产生了一个实用的、与准确性无关的标准来选择 MLIP 教师进行生成迁移。", "authors": [{"name": "Chengqian Zhang"}, {"name": "Yucheng Jin"}, {"name": "Duo Zhang"}, {"name": "Tiejun Li"}, {"name": "Han Wang"}], "featured_authors": [{"name": "Chengqian Zhang"}, {"name": "Yucheng Jin"}, {"name": "Duo Zhang"}, {"name": "Tiejun Li"}, {"name": "Han Wang"}], "author_count": 5}, {"id": "2605.08967", "category": "cond-mat", "title": "Condensation Transition in Entropy-Constrained Probability Spaces", "abstract": "The organization of high-dimensional probability spaces is a fundamental problem at the intersection of statistical physics and information theory. Here, we analyze the distributions populating level surfaces of the probability simplex $\\Delta_{K-1}$ defined by a fixed Shannon entropy. We introduce a discretization strategy that assigns equal statistical weight to distinct microstate distributions and enables a combinatorial analysis of the simplex. A condensation phase transition is shown to take place below a critical entropy that scales as $H_c \\simeq \\log K - 1 + \\gamma$ in the thermodynamic limit. For entropy values $H_0 < H_c$, the overwhelming majority of distributions are found in a condensed state, in which a single component captures a macroscopic fraction of the total probability mass while the remaining components form a homogeneous fluid background. These results provide a framework for understanding phenomena such as overconfident predictions in machine learning and the emergence of dominant species in ecology, and suggest that sparsity can arise naturally from entropic constraints in high-dimensional manifolds.", "url": "https://arxiv.org/abs/2605.08967", "type": "理论+数值", "summary": "高维概率空间的组织是统计物理学和信息论交叉领域的一个基本问题。在这里，我们分析由固定香农熵定义的概率单纯形 $\\Delta_{K-1}$ 的水平面分布。我们引入了一种离散化策略，该策略为不同的微观状态分布分配相同的统计权重，并能够对单纯形进行组合分析。显示凝结相变发生在临界熵以下，该临界熵在热力学极限内按 $H_c \\simeq \\log K - 1 + \\gamma$ 缩放。对于熵值 $H_0 < H_c$，绝大多数分布处于凝聚状态，其中单个分量捕获总概率质量的宏观部分，而其余分量形成均匀的流体背景。这些结果为理解机器学习中过度自信的预测和生态学中优势物种的出现等现象提供了一个框架，并表明稀疏性可以从高维流形中的熵约束中自然产生。", "authors": [{"name": "Bautista Arenaza"}, {"name": "Sebastián Risau-Gusman"}, {"name": "Inés Samengo"}, {"name": "Damián G. Hernández"}], "featured_authors": [{"name": "Bautista Arenaza"}, {"name": "Sebastián Risau-Gusman"}, {"name": "Inés Samengo"}, {"name": "Damián G. Hernández"}], "author_count": 4}, {"id": "2605.09088", "category": "cond-mat", "title": "Effect of spin-dependent tunneling and intervalley scattering in magnetic-semiconductor van der Waals heterostructures on exciton and trion polarization", "abstract": "We present a theoretical analysis of valley pseudospin control in the transition metal dichalcogenide (TMD) monolayer by utilizing the magnetic proximity effect of 2D magnetic layer and, propose self-consistent analysis of photoluminescence (PL) polarization peculiarities in TMD/magnetic material van der Waals heterostructures. We attribute observed peculiarities to the interplay between spin-dependent interlayer charge transfer and intervalley scattering of excitons and trions. The ratio between the electron tunneling timescale and the exciton and trion intervalley scattering lifetimes and radiative lifetimes determine the PL dynamics. A possibility to switch PL polarization sign due to the quasi-particles dynamics under circularly polarized laser excitations is revealed. We also discuss generalization of the proposed model due to the careful analysis of both intervalley and intravalley scattering processes between bright and dark excitons. Obtained results allow a long-distance manipulation of exciton and trion behaviors and open the possibilities for the effective control under spin and valley pseudospin in multilayer magnetic-semiconductor van der Waals heterostructures.", "url": "https://arxiv.org/abs/2605.09088", "type": "理论", "summary": "我们利用二维磁性层的磁邻近效应，提出了过渡金属二硫族化物（TMD）单层中谷赝自旋控制的理论分析，并提出了TMD/磁性材料范德华异质结构中光致发光（PL）偏振特性的自洽分析。我们将观察到的特性归因于自旋相关的层间电荷转移与激子和三重子的层间散射之间的相互作用。电子隧道时间尺度与激子和三重子间散射寿命和辐射寿命之间的比率决定了 PL 动力学。揭示了由于圆偏振激光激发下的准粒子动力学而切换 PL 偏振符号的可能性。由于对亮激子和暗激子之间谷间和谷内散射过程的仔细分析，我们还讨论了所提出模型的推广。所获得的结果允许对激子和三重子行为进行长距离操纵，并为多层磁半导体范德华异质结构中自旋和谷赝自旋的有效控制提供了可能性。", "authors": [{"name": "V.N. Mantsevich"}], "featured_authors": [{"name": "V.N. Mantsevich"}], "author_count": 1}, {"id": "2605.09105", "category": "cond-mat", "title": "Nonequilibrium Theory for Molecular Machine Design", "abstract": "Modeling the dynamical flows on networks of biomolecular machines often entails computing node populations and edge fluxes with Master Equations and correlating machine performance with entropy production. But this alone is not sufficient for design, optimization and evolution because it doesn't treat cost-benefit tradeoffs, or small-system misflows (backsteps, futile cycles, ineffective actions), or differential properties for flow design. Here we develop CFT Design, based on the recently developed Caliber Force Theory (CFT). We apply it to: designing faster molecular motors through ``traffic control''; optimizing speed, energy, and accuracy in kinetic proofreaders; and designing better enzyme inhibitors. CFT Design provides a general framework for optimizing nonequilibrium flow networks.", "url": "https://arxiv.org/abs/2605.09105", "type": "理论+数值", "summary": "对生物分子机器网络上的动态流进行建模通常需要使用主方程计算节点群和边缘通量，并将机器性能与熵产生相关联。但仅此一点对于设计、优化和演化来说还不够，因为它没有处理成本效益权衡，或小系统错误流（后退、无效循环、无效操作）或流程设计的差异属性。在这里，我们基于最近开发的口径力理论 (CFT) 开发了 CFT 设计。我们将其应用于：通过“流量控制”设计更快的分子马达；优化动态校对器的速度、能量和准确性；并设计更好的酶抑制剂。 CFT 设计提供了优化非平衡流动网络的通用框架。", "authors": [{"name": "Ying-Jen Yang"}, {"name": "Ken A. Dill"}], "featured_authors": [{"name": "Ying-Jen Yang"}, {"name": "Ken A. Dill"}], "author_count": 2}, {"id": "2605.09148", "category": "cond-mat", "title": "Sensitivity Analysis in the Face of Rare Events", "abstract": "Molecular motors and other complex nonequilibrium systems are controlled by large sets of design parameters, and optimizing those parameters requires computing sensitivities -- derivatives of dynamical observables with respect to the parameters. When the system's dynamics involves rare events, both the observable and its sensitivity are difficult to estimate from direct simulation. We present a practical computational pipeline that addresses both challenges by combining importance sampling with a Markov state model (MSM). The MSM separately captures the slow, rare-event dynamics and the fast, local dynamics, and the chain rule connects those two pieces to yield an efficient sensitivity estimator. An iterative reweighting procedure based on the RiteWeight algorithm substantially reduces approximation errors from the MSM coarse-graining. We validate the approach on diffusion in the Müller-Brown potential, where the sensitivity of a transition rate to landscape parameters can be computed exactly. We then use sensitivies to optimize the directional bias of a particle-based model of a catalysis-driven molecular motor.", "url": "https://arxiv.org/abs/2605.09148", "type": "理论+数值", "summary": "分子马达和其他复杂的非平衡系统由大量设计参数控制，优化这些参数需要计算灵敏度——动态可观测量相对于参数的导数。当系统的动力学涉及罕见事件时，可观测值及其灵敏度都很难通过直接模拟来估计。我们提出了一种实用的计算管道，通过将重要性采样与马尔可夫状态模型（MSM）相结合来解决这两个挑战。 MSM 分别捕获缓慢的罕见事件动态和快速的局部动态，链式法则将这两部分连接起来以产生有效的灵敏度估计器。基于 RiteWeight 算法的迭代重新加权过程大大减少了 MSM 粗粒度的近似误差。我们验证了 Müller-Brown 势中的扩散方法，其中可以准确计算过渡率对景观参数的敏感性。然后，我们使用灵敏度来优化催化驱动分子马达的基于粒子的模型的方向偏差。", "authors": [{"name": "John Strahan"}, {"name": "Todd R. Gingrich"}], "featured_authors": [{"name": "John Strahan"}, {"name": "Todd R. Gingrich"}], "author_count": 2}, {"id": "2605.09172", "category": "cond-mat", "title": "Lubrication-Induced Newtonianization Enables Passive Transport of Non-Newtonian materials", "abstract": "Non Newtonian flows are typically governed by intrinsic bulk rheology, which imposes strong constraints on transport through confined geometries. Here, we show that stable boundary lubrication can fundamentally alter this behavior by localizing shear within a thin, low-viscosity interfacial layer. As a result, the nonlinear rheological response of a broad class of complex materials, including yield-stress, shear-dependent, and thixotropic materials, is strongly suppressed during flow. Using analytical solutions of Stokes flow and numerical simulations, we demonstrate that lubrication-induced shear localization leads to an apparent Newtonianization of transport, in which the macroscopic flow response becomes primarily controlled by the lubricating layer and geometric confinement rather than the intrinsic material properties. In this regime, materials that would otherwise require large pressure gradients can be transported at substantially lower driving forces. Notably, this boundary-dominated transport enables gravity-driven passive flow with orders-of-magnitude enhancement in throughput compared to rigid-wall conduits. These results establish lubrication as a powerful mechanism for tuning and simplifying complex fluid transport, with implications for biological systems, soft and jammed materials, and energy-efficient fluids.", "url": "https://arxiv.org/abs/2605.09172", "type": "理论+数值", "summary": "非牛顿流动通常受固有的体积流变学控制，这对通过有限几何形状的传​​输施加了强烈的限制。在这里，我们表明，稳定的边界润滑可以通过将剪切力局部化在薄的低粘度界面层内，从根本上改变这种行为。因此，多种复杂材料（包括屈服应力材料、剪切相关材料和触变材料）的非线性流变响应在流动过程中受到强烈抑制。使用斯托克斯流的解析解和数值模拟，我们证明了润滑引起的剪切局部化导致了明显的输运牛顿化，其中宏观流动响应主要由润滑层和几何限制而不是固有的材料特性控制。在这种情况下，原本需要大压力梯度的材料可以以低得多的驱动力进行运输。值得注意的是，与刚性壁管道相比，这种边界主导的运输能够实现重力驱动的被动流动，吞吐量提高了几个数量级。\n\n这些结果确立了润滑作为调节和简化复杂流体传输的强大机制，对生物系统、软材料和堵塞材料以及节能流体具有影响。", "authors": [{"name": "Arvind Arun Dev"}, {"name": "Paszkal Papp"}, {"name": "Thomas M. Hermans"}, {"name": "Bernard Doudin"}], "featured_authors": [{"name": "Arvind Arun Dev"}, {"name": "Paszkal Papp"}, {"name": "Thomas M. Hermans"}, {"name": "Bernard Doudin"}], "author_count": 4}, {"id": "2605.09194", "category": "cond-mat", "title": "Embedded Direct Ink Writing of Thermoset and Elastomeric Polymers via Frontal Polymerization", "abstract": "Direct ink writing (DIW) using frontal ring-opening metathesis polymerization (FROMP) offers a compelling route to the rapid and energy-efficient fabrication of thermoset and elastomeric polymer architectures, leveraging a self-propagating exothermic curing reaction. While FP-DIW excels at freestanding path printing due to the rapid solidification, it is constrained by stringent rheological requirements, a lower bound on achievable feature size due to quenching, and the need for the reaction front to closely follow the nozzle during printing. Here, we overcome these constraints by leveraging embedded 3D printing to implement FP-DIW with delayed solidification, thereby decoupling shape retention and solidification from ink chemistry and rheology. The use of a yield-stress support medium enables extrusion of low-viscosity inks by suppressing gravitational and capillary instabilities, mitigating front quenching at small diameters, and allowing time-delayed solidification to fuse complex, overlapping, and mechanically interlinked features after deposition. Two complementary thermal initiation strategies are introduced:\\ volumetric dielectric heating via microwaves and surface heating at the boundary of the support bath. Formulations based on dicyclopentadiene (DCPD), cyclooctadiene (COD), and mixtures thereof, result in tunable final mechanical properties with glass transition temperatures spanning $-50$ to $160 $$^\\text{o}$C. The versatility of this approach is demonstrated through the fabrication of lattices, springs, mechanically interlocked, and multimaterial architectures. Compared to printing in air, this embedded approach introduces a substantially broader range of possible formulations, material properties, feature sizes, and architectures.", "url": "https://arxiv.org/abs/2605.09194", "type": "理论", "summary": "使用正面开环复分解聚合 (FROMP) 的直接墨水书写 (DIW) 为快速、节能地制造热固性和弹性聚合物结构提供了一条引人注目的途径，利用自蔓延放热固化反应。虽然 FP-DIW 由于快速凝固而在独立式路径打印方面表现出色，但它受到严格的流变要求、由于淬火而可实现的特征尺寸下限以及打印过程中反应前沿需要紧密跟随喷嘴的限制。在这里，我们通过利用嵌入式 3D 打印来实现具有延迟固化的 FP-DIW，从而克服了这些限制，从而将形状保持和固化与油墨化学和流变学脱钩。使用屈服应力支撑介质可以通过抑制重力和毛细管不稳定性、减轻小直径的前淬火以及允许延时凝固来融合沉积后复杂、重叠和机械互连的特征，从而挤出低粘度油墨。\n\n引入了两种互补的热引发策略：通过微波的体积介电加热和支撑浴边界的表面加热。基于二环戊二烯 (DCPD)、环辛二烯 (COD) 及其混合物的配方可实现可调的最终机械性能，玻璃化转变温度范围为 $-50$ 至 $160 $$^\\text{o}$C。这种方法的多功能性通过晶格、弹簧、机械联锁和多材料架构的制造得到了证明。与空气中的打印相比，这种嵌入式方法引入了更广泛的可能配方、材料特性、特征尺寸和架构。", "authors": [{"name": "Mohammad Tanver Hossain"}, {"name": "Yun Seong Kim"}, {"name": "Pallab Layek"}, {"name": "Pranav Krishnan"}, {"name": "Youngbum Lee"}, {"name": "Minjiang Zhu"}, {"name": "Shubh Singh"}, {"name": "Philippe H. Geubelle"}, {"name": "Paul V. Braun"}, {"name": "Jeffery W. Baur"}, {"name": "Nancy R. Sottos"}, {"name": "Sameh H. Tawfick"}, {"name": "Randy H. Ewoldt"}], "featured_authors": [{"name": "Mohammad Tanver Hossain"}, {"name": "Yun Seong Kim"}, {"name": "Pallab Layek"}, {"name": "Nancy R. Sottos"}, {"name": "Sameh H. Tawfick"}, {"name": "Randy H. Ewoldt"}], "author_count": 13}, {"id": "2605.09240", "category": "cond-mat", "title": "Spin Elasticity:A New Paradigm for Spintronics", "abstract": "Elasticity shapes our world. For centuries, it has been regarded as a property exclusive to ordinary matter. Here we uncover its hidden existence in the spin degree of freedom. We introduce spin elasticity-a framework linking spin torque to spin morpgology. This reveals a topological Hooke's law, uncovers spontaneous oscillations and resonance, and predicts a new class of collective excitations:spin stress waves. By establishing a unfied tau-D theory bridging classical elasticity and topological spin physics, this work completes the elastic picture and opens a new frontier for spintronics-spinelastronics.", "url": "https://arxiv.org/abs/2605.09240", "type": "理论", "summary": "弹性塑造了我们的世界。几个世纪以来，它一直被视为普通物质独有的财产。这里我们揭示了它隐藏在自旋自由度中的存在。我们引入了自旋弹性——一个将自旋扭矩与自旋形态学联系起来的框架。这揭示了拓扑胡克定律，揭示了自发振荡和共振，并预测了一类新的集体激发：自旋应力波。通过建立连接经典弹性和拓扑自旋物理的独立tau-D理论，这项工作完善了弹性图景，并开辟了自旋电子学的新前沿——脊柱弹性电子学。", "authors": [{"name": "Zhong-Chen Gao"}, {"name": "Tianyi Zhang"}, {"name": "Feifei Wang"}, {"name": "Jingguo Hu"}, {"name": "Peng Yand"}, {"name": "Xiufeng Han"}], "featured_authors": [{"name": "Zhong-Chen Gao"}, {"name": "Tianyi Zhang"}, {"name": "Feifei Wang"}, {"name": "Jingguo Hu"}, {"name": "Peng Yand"}, {"name": "Xiufeng Han"}], "author_count": 6}, {"id": "2605.09247", "category": "cond-mat", "title": "Benchmarking a restricted Boltzmann machine on the $\\mathbb{Z}_2$ Bose-Hubbard chain in the adiabatic hard-core regime", "abstract": "We study the ground state of the $\\mathbb{Z}_2$ Bose-Hubbard chain in the adiabatic hard-core limit at half filling using variational Monte Carlo with a shallow restricted Boltzmann machine as the variational ansatz. In this context, the neural quantum state is compared with the established adiabatic description of the model. The variational results reproduce the overall structure of the phase diagram obtained from magnetization observables, distinguish the polarized and Néel-ordered regions, and capture representative spin patterns and site occupations for the staggered insulating configurations selected by a weak symmetry-breaking field. Taken together, these results show that a shallow restricted Boltzmann machine reproduces the main adiabatic phase structure of the one-dimensional $\\mathbb{Z}_2$ Bose-Hubbard chain and captures the selected symmetry-broken insulating configurations at half filling.", "url": "https://arxiv.org/abs/2605.09247", "type": "理论+数值", "summary": "我们使用变分蒙特卡罗和浅受限玻尔兹曼机作为变分拟似机，研究了半填充绝热硬核极限下 $\\mathbb{Z}_2$ Bose-Hubbard 链的基态。在这种情况下，将神经量子态与已建立的模型绝热描述进行比较。变分结果再现了从磁化可观测值获得的相图的整体结构，区分了极化区域和尼尔有序区域，并捕获了由弱对称破缺场选择的交错绝缘配置的代表性自旋模式和位置​​占据。总而言之，这些结果表明，浅层受限玻尔兹曼机再现了一维 $\\mathbb{Z}_2$ Bose-Hubbard 链的主要绝热相结构，并捕获了半填充时选定的对称破缺绝缘构型。", "authors": [{"name": "Gustavo Alejandro Avalos Valentín"}, {"name": "Roman Josué Armenta Rico"}, {"name": "Isaac Pérez Castillo"}], "featured_authors": [{"name": "Gustavo Alejandro Avalos Valentín"}, {"name": "Roman Josué Armenta Rico"}, {"name": "Isaac Pérez Castillo"}], "author_count": 3}, {"id": "2605.09249", "category": "cond-mat", "title": "Bound-State Spectra of a Lifshitz-Type Dirac Equation in (2+1) Dimensions", "abstract": "We investigate a Dirac-type equation in (2+1) dimensions modified by Lifshitz spatial derivatives with dynamical exponent $z=2$, focusing on the spectral properties of bound states under radial confinement. Analytical solutions are obtained for constant backgrounds, hard-wall confinement, and harmonic potentials, while logarithmic confinement is treated numerically via the Numerov method and complemented by a semiclassical WKB analysis. The resulting spectra exhibit characteristic scaling laws governed by the Lifshitz parameter $b$, including $E - M \\propto b/R_0^2$ for hard-wall confinement, $E - M \\propto \\sqrt{2b}\\,\\omega$ for harmonic trapping, and $E - M \\sim \\alpha \\ln\\sqrt{b}$ in the semiclassical regime of logarithmic confinement. These results provide a consistent characterization of how higher-order spatial derivatives modify bound-state spectra in two-dimensional Dirac systems and may be relevant for effective descriptions of materials with quadratic low-energy dispersion, such as bilayer graphene and related anisotropic 2D systems.", "url": "https://arxiv.org/abs/2605.09249", "type": "理论+数值", "summary": "我们研究了由动态指数 $z=2$ 的 Lifshitz 空间导数修改的 (2+1) 维狄拉克型方程，重点研究径向约束下束缚态的光谱特性。获得恒定背景、硬壁约束和谐波势的解析解，同时通过 Numerov 方法对对数约束进行数值处理，并通过半经典 WKB 分析进行补充。所得谱表现出受 Lifshitz 参数 $b$ 控制的特征标度律，包括用于硬壁限制的 $E - M \\propto b/R_0^2$、用于谐波捕获的 $E - M \\propto \\sqrt{2b}\\、\\omega$ 以及对数限制半经典机制中的 $E - M \\sim \\alpha \\ln\\sqrt{b}$。这些结果提供了高阶空间导数如何修改二维狄拉克系统中的束缚态光谱的一致表征，并且可能与具有二次低能量色散的材料（例如双层石墨烯和相关各向异性二维系统）的有效描述相关。", "authors": [{"name": "Lucas K. R. Queiroz"}, {"name": "Van Sérgio Alves"}, {"name": "Nilberto Bezerra"}, {"name": "Luis Fernández"}, {"name": "Francisco Peña"}], "featured_authors": [{"name": "Lucas K. R. Queiroz"}, {"name": "Van Sérgio Alves"}, {"name": "Nilberto Bezerra"}, {"name": "Luis Fernández"}, {"name": "Francisco Peña"}], "author_count": 5}, {"id": "2605.09274", "category": "cond-mat", "title": "Microscopic resonant-shell mechanism for slow Liouvillian sectors in an open correlated lattice", "abstract": "We develop a microscopic theory for how slow Liouvillian sectors are selected in an open correlated lattice. The starting point is not a postulated non-Hermitian band, but a local interacting resonance between an on-site doublon and a branch-resolved nearest-neighbor bond. This resonance defines a composite shell orbital whose doublon weight controls reservoir visibility and whose mixed doublon-bond character controls shell mobility. Projecting the microscopic hopping onto the selected shell yields a branch-selective dimerized channel. In the dilute regime, a boundary doublon-loss channel yields an exponentially slow edge-memory pole through a Zeno-type return. At the shell-critical point, the edge pole is replaced by a near-zero standing-wave doublet with an algebraic coherent spacing. At finite shell filling, the same local shell becomes density dressed. A number-conserving phase-locking jump removes a bright mismatch sector, leaving defects as the asymptotic slow variables and producing a diffusive finite-size gap. We derive the local shell, the projected branch topology, the edge-memory law, the shell-critical doublet, the density-dressed shell Hamiltonian, and the defect generator within one Schur-projection framework. The resulting mechanism identifies the reservoir-engineered fast block as the selector of the observable slow sector, while the microscopic parent shell remains fixed.", "url": "https://arxiv.org/abs/2605.09274", "type": "理论+数值", "summary": "我们开发了一种微观理论，用于解释在开放相关晶格中如何选择慢速刘维尔扇区。起点不是假设的非厄米能带，而是现场双键和分支解析的最近邻键之间的局部相互作用共振。这种共振定义了一个复合壳轨道，其双键重量控制储层可见性，其混合双键特性控制壳的流动性。将微观跳跃投射到选定的壳上产生分支选择性二聚化通道。在稀释状态下，边界双倍损失通道通过芝诺型返回产生指数慢的边缘记忆极点。在壳临界点，边缘极点被具有代数相干间距的近零驻波双合峰所取代。在有限的壳填充下，相同的局部壳变得密度修饰。数字守恒锁相跳跃消除了明亮的失配扇区，留下缺陷作为渐近慢变量并产生扩散的有限尺寸间隙。\n\n我们推导了局部壳、投影分支拓扑、边记忆定律、壳临界双峰、密度修饰壳哈密顿量以及 Schur 投影框架内的缺陷生成器。由此产生的机制将油藏设计的快区块识别为可观察的慢扇区的选择者，而微观母壳保持固定。", "authors": [{"name": "X. Z. Zhang"}], "featured_authors": [{"name": "X. Z. Zhang"}], "author_count": 1}, {"id": "2605.09436", "category": "cond-mat", "title": "Microscopic origin of Boson peak in amorphous solids", "abstract": "We proposed a non-analytic model to explain the microscopic origin of the anomalous vibrational density of states (DOS), the Boson peak (BP), in amorphous solids based on the scalar dynamical matrix of a network with springs and nodes. We argue that disorder can be classified into two factors: fluctuation of spring strength and fluctuation of coordination numbers (the number of springs connected to a node). The results suggest that BP originates solely from fluctuation of coordination numbers, while the fluctuation of spring strength only contributes to the effect of damping and has very limited effect on low frequency DOS. This work converts complexity into simplicity and provides a direct answer to the puzzle of the microscopic origin of BP in amorphous solids.", "url": "https://arxiv.org/abs/2605.09436", "type": "理论", "summary": "我们提出了一种非解析模型来解释非晶态固体中异常振动态密度（DOS）、玻色子峰值（BP）的微观起源，该模型基于具有弹簧和节点的网络的标量动力矩阵。我们认为无序可以分为两个因素：弹簧强度的波动和协调数（连接到节点的弹簧的数量）的波动。结果表明，BP仅源于配位数的波动，而弹簧强度的波动仅有助于阻尼效果，对低频DOS的影响非常有限。这项工作化繁为简，为无定形固体中 BP 的微观起源之谜提供了直接答案。", "authors": [{"name": "Cunyuan Jiang"}], "featured_authors": [{"name": "Cunyuan Jiang"}], "author_count": 1}, {"id": "2605.09453", "category": "cond-mat", "title": "Emergent critical phases of the Ashkin-Teller model on the Union-Jack Lattice", "abstract": "The Ashkin-Teller (AT) model is a classic spin model in statistical mechanics. For traditional homogeneous lattices like triangular and kagome lattices, even when frustration exists, the model only has one ferromagnetic-paramagnetic critical line in the $J>0$ and $K<0$ region. However, in this paper, for the Union Jack lattice, where the lattice coordination numbers are 4, 8, and 8 and which also contains a large number of small triangular units, using Metropolis Monte Carlo method, we find that, the critical line of the AT model splits into two Berezinskii-Kosterlitz-Thouless(BKT) boundaries, and a critical phase emerges in the intermediate region. This phenomenon is the combined result of frustration, lattice inhomogeneity and the two coupled spin degrees of freedom inherent to the AT model. In detail, the novel critical phase characterized by a power-law decay of magnetization with system size, where the correlation length ratio $\\xi/L$ remains finite even in the thermodynamic limit. We also introduce the susceptibility $\\widetilde{\\chi} = \\text{d}\\langle m \\rangle /\\text{d}J$ as a key probe, and through this probe, pseudo-critical points $J_c(L)$ are observed to scale proportionally to $(\\ln L)^{-2}$, a behavior consistent with BKT criticality. Since superfluids, superconductors, and supersolids all possess quasi-long-range order and fall into the category of critical phases, our results could also inspire the exploration of such quantum phases.", "url": "https://arxiv.org/abs/2605.09453", "type": "理论+数值", "summary": "Ashkin-Teller (AT) 模型是统计力学中的经典自旋模型。对于传统的同质晶格（如三角形和戈薇晶格），即使存在挫败，该模型也仅在 $J>0$ 和 $K<0$ 区域中具有一条铁磁-顺磁临界线。然而，在本文中，对于晶格配位数为4、8和8且还包含大量小三角形单元的英国国旗晶格，利用Metropolis Monte Carlo方法，我们发现AT模型的临界线分裂成两个Berezinskii-Kosterlitz-Thouless（BKT）边界，并且在中间区域出现临界相。这种现象是 AT 模型固有的挫折、晶格不均匀性和两个耦合自旋自由度综合作用的结果。详细地说，新的临界相的特征是磁化强度随系统尺寸的幂律衰减，其中相关长度比 $\\xi/L$ 即使在热力学极限下也保持有限。\n\n我们还引入了磁化率 $\\widetilde{\\chi} = \\text{d}\\langle m \\rangle /\\text{d}J$ 作为关键探针，通过该探针，观察到伪临界点 $J_c(L)$ 与 $(\\ln L)^{-2}$ 成比例缩放，这种行为与 BKT 临界性一致。由于超流体、超导体和超固体都具有准长程有序性并属于临界相的范畴，我们的结果也可以激发对此类量子相的探索。", "authors": [{"name": "Changzhi Zhao"}, {"name": "Wanzhou Zhang"}, {"name": "Yuan Huang"}, {"name": "Chengxiang Ding"}, {"name": "Youjin Deng"}], "featured_authors": [{"name": "Changzhi Zhao"}, {"name": "Wanzhou Zhang"}, {"name": "Yuan Huang"}, {"name": "Chengxiang Ding"}, {"name": "Youjin Deng"}], "author_count": 5}, {"id": "2605.09499", "category": "cond-mat", "title": "Spin Quadrupolar orders in $d$-wave Unconventional Magnetism", "abstract": "Unconventional magnetism represents a class of metallic states whose Fermi surfaces exhibit spin-dependent splittings under the non-trivial representations of the rotation group. The $d$-wave $\\alpha$-phase unconventional magnetic state, commonly known as altermagnet, recently, has attracted significant attention. While these systems exhibit distinct anisotropic $d$-wave characteristics in momentum space, how this microscopic topology translates into the spin distributions in real space remains a question. In this work, we bridge the intrinsic spin quadrupolar ordering in momentum space to the real-space staggered magnetic distribution. By introducing a weak, non-magnetic periodic crystal potential into a $d$-wave unconventional magnetic state, the spin-charge cross susceptibility is calculated by using the linear response theory. We reveal that the interplay between the crystal potential and the intrinsic $d$-wave spin-splitting naturally induces a spatial spin quadrupole distribution without enlarging the unit cell. Our study thus provides a physical connection between momentum-space multipoles in the even partial wave channel and real-space spin multipole orders.", "url": "https://arxiv.org/abs/2605.09499", "type": "理论", "summary": "非常规磁性代表一类金属态，其费米表面在旋转群的非平凡表示下表现出自旋相关的分裂。 $d$波$\\alpha$相非常规磁态，通常称为交变磁体，最近引起了人们的广泛关注。虽然这些系统在动量空间中表现出明显的各向异性 $d$ 波特征，但这种微观拓扑如何转化为真实空间中的自旋分布仍然是一个问题。在这项工作中，我们将动量空间中的本征自旋四极排序与真实空间交错磁分布联系起来。通过在$d$波非常规磁态中引入弱的非磁性周期性晶体势，利用线性响应理论计算自旋电荷交叉磁化率。我们揭示了晶体势和本征 $d$ 波自旋分裂之间的相互作用自然地诱导了空间自旋四极分布，而无需扩大晶胞。因此，我们的研究提供了偶部分波通道中的动量空间多极子与实空间自旋多极子级之间的物理联系。", "authors": [{"name": "Jian-Keng Yuan"}, {"name": "Zhiming Pan"}, {"name": "Congjun Wu"}], "featured_authors": [{"name": "Jian-Keng Yuan"}, {"name": "Zhiming Pan"}, {"name": "Congjun Wu"}], "author_count": 3}, {"id": "2605.09501", "category": "cond-mat", "title": "Orienting-Field Effects on Instability and Mode Selection in Active Nematics", "abstract": "We examine the instabilities of a confined active nematic subjected to an orienting field using a low Reynolds number Ericksen-Leslie framework with active stresses and field-induced torques. Linear analysis reveals two distinct modes, with odd and even director symmetry, the instabilities of which depend on the interplay between activity and field strength. We derive exact and approximate analytic forms of the stability boundaries and show that an orienting field that aligns the director perpendicular to the substrate anchoring direction cooperatively lowers activity thresholds and enables a field-driven even symmetry mode instability, while an orienting field that aligns the director parallel to the substrate anchoring tends to stabilise the system. Numerical solutions of the full nonlinear equations show that the linear stability analysis correctly identifies the symmetries of long-time states. These results demonstrate how orienting fields can promote an instability below the classical critical activity and can be used to both tune the instability onset and control the mode selection in confined active nematics.", "url": "https://arxiv.org/abs/2605.09501", "type": "理论+数值", "summary": "我们使用具有主动应力和场感应扭矩的低雷诺数 Ericksen-Leslie 框架，研究了受定向场影响的受限主动向列相的不稳定性。线性分析揭示了两种不同的模式，具有奇数和偶数方向对称性，其不稳定性取决于活动和场强之间的相互作用。我们推导了稳定边界的精确和近似分析形式，并表明，将指向矢垂直于基底锚定方向对齐的定向场协同降低了活动阈值，并实现了场驱动的均匀对称模式不稳定性，而将指向矢平行于基底锚定方向对齐的定向场往往会稳定系统。完整非线性方程的数值解表明，线性稳定性分析正确地识别了长时间状态的对称性。这些结果证明了定向场如何促进低于经典临界活性的不稳定性，并且可用于调节不稳定性的开始和控制受限活性向列中的模式选择。", "authors": [{"name": "I.K. Joseph"}, {"name": "A.J.H. Houston"}, {"name": "K.N. Kowal"}, {"name": "N.J. Mottram"}], "featured_authors": [{"name": "I.K. Joseph"}, {"name": "A.J.H. Houston"}, {"name": "K.N. Kowal"}, {"name": "N.J. Mottram"}], "author_count": 4}, {"id": "2605.09510", "category": "cond-mat", "title": "Boundary-dependent topological degeneracy in an Ising chain", "abstract": "The topological degeneracy is a characteristic of quantum phase diagram in an Ising chain with transverse field. We revisit the phase diagram at nonzero temperature of an Ising chain with two types of open boundary conditions. In this work, we focus on an alternative boundary condition that not only removes the coupling between the two end sites but also eliminates the transverse field on them. We show that such a system can be exactly mapped onto two independent Kitaev chains, where spinless fermions correspond to domain-wall excitations. This results in a switch in the existence of the topological Kramers-like degeneracy in the phase diagram. The underlying mechanism is analyzed within the Majorana representation, which indicates that such a switch arises from the gauge dependence of the winding number in an SSH chain. The manifestation of bulk-boundary correspondence at nonzero temperature is demonstrated by numerical simulations on finite-size systems. This finding provides insight into the quantum spin chain.", "url": "https://arxiv.org/abs/2605.09510", "type": "理论+数值", "summary": "拓扑简并性是横向场伊辛链量子相图的一个特征。我们重新审视具有两种开放边界条件的伊辛链在非零温度下的相图。在这项工作中，我们专注于另一种边界条件，它不仅消除了两个末端站点之间的耦合，还消除了它们上的横向场。我们证明这样的系统可以精确地映射到两个独立的基塔耶夫链上，其中无自旋费米子对应于畴壁激发。这导致相图中拓扑克莱默式简并性的存在发生转变。在马约拉纳表示中分析了底层机制，这表明这种切换是由 SSH 链中绕数的规格依赖性引起的。通过对有限尺寸系统的数值模拟证明了非零温度下体边界对应的表现。这一发现提供了对量子自旋链的深入了解。", "authors": [{"name": "E. S. Ma"}, {"name": "Z. Song"}], "featured_authors": [{"name": "E. S. Ma"}, {"name": "Z. Song"}], "author_count": 2}, {"id": "2605.09555", "category": "cond-mat", "title": "On the thermal properties of knotted block copolymer rings", "abstract": "We investigate the thermal and structural properties of knotted diblock copolymer rings using a coarse-grained lattice model in an implicit solvent. The system is studied by means of the Wang--Landau Monte Carlo algorithm, allowing us to analyze thermodynamic and conformational responses over a wide temperature range. Different knot topologies, including the unknot, trefoil, figure-eight, and pentafoil knots, are considered for both symmetric and asymmetric monomer compositions. In the AB model employed here, A-type monomers are self-repulsive, B-type monomers are self-attractive, and A-B interactions are neutral, such that the solvent is effectively good for A-type monomers and poor for B-type monomers at low temperatures. We analyze several key observables, including the heat capacity, the radius of gyration, and its temperature derivative for both the entire copolymer ring and the individual blocks, and the probability that a monomer belongs to the knotted region. Our results show that the interplay between knot topology, monomer composition, and temperature strongly influences polymer conformations. Small variations in the B-block length induce nonmonotonic, reentrant-like conformational behavior as a function of temperature, including transitions between knot localization and delocalization at low temperatures. These effects arise from the competition between energetic and entropic contributions imposed by topological constraints.", "url": "https://arxiv.org/abs/2605.09555", "type": "理论+数值", "summary": "我们在隐式溶剂中使用粗粒晶格模型研究了打结二嵌段共聚物环的热性能和结构性能。该系统通过 Wang--Landau 蒙特卡罗算法进行研究，使我们能够分析宽温度范围内的热力学和构象响应。对称和不对称单体组合物均考虑不同的结拓扑，包括无结、三叶形、八字形和五叶形结。在此采用的 AB 模型中，A 型单体是自排斥的，B 型单体是自吸引的，A-B 相互作用是中性的，因此在低温下溶剂对 A 型单体有效，而对 B 型单体不利。我们分析了几个关键的可观察量，包括整个共聚物环和各个嵌段的热容、回转半径及其温度导数，以及单体属于打结区域的概率。我们的结果表明，结拓扑、单体组成和温度之间的相互作用强烈影响聚合物构象。\n\nB-嵌段长度的微小变化会引起作为温度函数的非单调、类重入构象行为，包括低温下结定位和离域之间的转变。这些效应源于拓扑约束所施加的能量和熵贡献之间的竞争。", "authors": [{"name": "Neda Abbasi Taklimi"}, {"name": "Franco Ferrari"}, {"name": "Marcin R. Piątek"}, {"name": "Luca Tubiana"}], "featured_authors": [{"name": "Neda Abbasi Taklimi"}, {"name": "Franco Ferrari"}, {"name": "Marcin R. Piątek"}, {"name": "Luca Tubiana"}], "author_count": 4}, {"id": "2605.09631", "category": "cond-mat", "title": "Effective sextic field theory for tricritical-critical crossover", "abstract": "Effective field theories provide a suitable framework for both particle physics and statistical physics. We delve deeper into the study of the effective three-dimensional scalar field theory for its application to statistical physics, especially considering the role of the sextic coupling in the tricritical-to-critical crossover. The three-loop renormalization of the mass and the two coupling constants that we perform allows us to obtain, for the first time, the complete renormalization group flow of the couplings in that order. We analyze what universality means in this problem and how we can recover non-universal terms from the renormalization group beta functions. The crossover is realized by the convergence of the renormalization group flow towards the line connecting the tricritical and critical fixed points.", "url": "https://arxiv.org/abs/2605.09631", "type": "理论", "summary": "有效场论为粒子物理学和统计物理学提供了合适的框架。我们深入研究了有效三维标量场理论在统计物理中的应用，特别是考虑了六次耦合在三临界到临界交叉中的作用。我们执行的质量和两个耦合常数的三环重正化使我们第一次能够按该顺序获得耦合的完整重正化群流。我们分析了普适性在这个问题中的含义，以及如何从重整化群 beta 函数中恢复非普适项。交叉是通过重正化群流向连接三临界和临界不动点的线收敛来实现的。", "authors": [{"name": "Jose Gaite"}], "featured_authors": [{"name": "Jose Gaite"}], "author_count": 1}, {"id": "2605.09690", "category": "cond-mat", "title": "Hole-Doping Suppresses Competing Magnetism in High-DOS C136 Carbon Schwarzite: A Computational Route Toward Superconductivity in Negative-Curvature Carbon Networks", "abstract": "Carbon schwarzites are negative-curvature carbon networks with electronic structures distinct from graphene, fullerenes, and conventional carbon allotropes. Here we report a spin-polarized first-principles screening study of D-type C136 carbon schwarzite focused on the competition between magnetism, doping, and high-DOS metallic behavior. Neutral C136 has a robust competing magnetic branch, with total magnetization of about 11.01-11.03 Bohr magnetons per 136-atom cell. Charged-cell calculations reveal a clear electron-hole asymmetry: adding two electrons per cell increases the total magnetization to 12.11 Bohr magnetons per cell, while removing two electrons reduces it to 9.61. Further hole doping suppresses the magnetic branch monotonically, giving 8.02, 6.34, and 4.76 Bohr magnetons per cell for removal of 4, 6, and 8 electrons, respectively. The most strongly hole-doped point, h8, was examined with spin-polarized NSCF and density-of-states calculations on a 4x4x4 k-point mesh. The NSCF Fermi energy, -0.7414 eV, agrees with the SCF value, -0.7413 eV. The DOS remains high near the Fermi level: at E = -0.740 eV, the total DOS is about 44.69 states/eV/cell, with DOS_up = 33.11 and DOS_down = 11.58 states/eV/cell. Thus h8 combines substantial suppression of the competing magnetic branch with preservation of a high-DOS metallic state. We do not claim superconductivity in C136. Instead, these calculations identify hole doping as a route for suppressing a competing magnetic instability while preserving electronic conditions relevant for further superconductivity screening. Lattice stability, electron-phonon coupling, and transition-temperature estimates remain open problems.", "url": "https://arxiv.org/abs/2605.09690", "type": "理论+数值", "summary": "碳黑矿是负曲率碳网络，其电子结构不同于石墨烯、富勒烯和传统的碳同素异形体。在这里，我们报告了 D 型 C136 碳黑矿的自旋极化第一原理筛选研究，重点关注磁性、掺杂和高 DOS 金属行为之间的竞争。中性 C136 具有强大的竞争磁分支，每个 136 原子细胞的总磁化强度约为 11.01-11.03 个玻尔磁子。带电电池计算揭示了明显的电子空穴不对称性：每个电池添加两个电子会将每个电池的总磁化强度增加到 12.11 个玻尔磁子，而移除两个电子会将其降低到 9.61。进一步的空穴掺杂单调抑制磁分支，每个单元分别产生 8.02、6.34 和 4.76 个玻尔磁子，分别去除 4、6 和 8 个电子。通过自旋极化 NSCF 和 4x4x4 k 点网格上的态密度计算检查了最强的空穴掺杂点 h8。 NSCF 费米能量 -0.7414 eV，与 SCF 值 -0.7413 eV 一致。\n\nDOS 在费米能级附近保持较高水平：在 E = -0.740 eV 时，总 DOS 约为 44.69 态/eV/单元，其中 DOS_up = 33.11 和 DOS_down = 11.58 态/eV/单元。因此，h8 将竞争性磁分支的显着抑制与高 DOS 金属态的保留结合起来。我们不主张 C136 具有超导性。相反，这些计算将空穴掺杂确定为抑制竞争性磁不稳定性的途径，同时保留与进一步超导筛选相关的电子条件。晶格稳定性、电子声子耦合和转变温度估计仍然是悬而未决的问题。", "authors": [{"name": "Eugene Yashin"}], "featured_authors": [{"name": "Eugene Yashin"}], "author_count": 1}, {"id": "2605.09705", "category": "cond-mat", "title": "Spin-charge separation in two-leg t-J ladders", "abstract": "Spin-charge separation is a hallmark of one-dimensional fermionic systems, yet its realization in higher dimensions remains an open question. To address this issue, we investigate a two-leg t-J ladder using the density matrix renormalization group (DMRG) method and its time-dependent extension. By analyzing ground-state correlations and single-particle removal spectra, we systematically examine the effects of plaquette diagonal hopping, spin exchange, and hole doping. Within appropriate parameter regimes, these factors drive the system from the well-known Luther Emery phase, with gapped spin and gapless charge modes, into a Luttinger liquid phase characterized by gapless spin and charge excitations, where signatures of spin-charge separation emerge. In combination with previous studies using exact diagonalization, our results provide evidence that spin-charge separation may persist in wider ladder systems.", "url": "https://arxiv.org/abs/2605.09705", "type": "理论+数值", "summary": "自旋电荷分离是一维费米子系统的标志，但其在更高维度的实现仍然是一个悬而未决的问题。为了解决这个问题，我们使用密度矩阵重整化群 (DMRG) 方法及其时间相关扩展研究了两腿 t-J 梯。通过分析基态相关性和单粒子去除光谱，我们系统地研究了斑块对角跳跃、自旋交换和空穴掺杂的影响。在适当的参数范围内，这些因素驱动系统从众所周知的具有带隙自旋和无带隙电荷模式的路德金刚砂相进入以无带隙自旋和电荷激发为特征的路廷格液相，其中出现自旋电荷分离的特征。结合之前使用精确对角化的研究，我们的结果提供了自旋电荷分离可能在更广泛的梯子系统中持续存在的证据。", "authors": [{"name": "Luhang Yang"}, {"name": "Elbio Dagotto"}], "featured_authors": [{"name": "Luhang Yang"}, {"name": "Elbio Dagotto"}], "author_count": 2}, {"id": "2605.09743", "category": "cond-mat", "title": "Equilibrium and non-equilibrium properties of active matter systems", "abstract": "Active matter systems encompass both natural and artificially created systems consisting of numerous active particles. These particles actively consume energy to propel themselves or exert mechanical forces, leading to intricate behaviors and a diverse range of collective motions from flocking transition to motility-induced phase separation. The flocking transition refers to the spontaneous alignment and coordination of individuals in a group, resembling the cohesive motion observed in flocks of birds or schools of fish. On the other hand, motility-induced phase separation refers to the segregation of active particles into distinct regions based on their differing motility levels. In this presentation, I will talk about active matter systems, specifically focusing on the collective behavior and dynamics, including the influence of volume exclusion features, the impact of disorder in the media, and the behavior of self-propelled particles in off-lattice domains by introducing spin anisotropy. The objective is to understand how the collective behavior of self-propelled particles is affected by various system parameters, including thermal noise, self-propulsion velocity, external field strength, etc. I will furthermore show the phenomena such as jamming, kinetic arrest, motility-induced phase separation, coexisting phases, microphase separation, and phase transitions within the context of active matter models.", "url": "https://arxiv.org/abs/2605.09743", "type": "理论", "summary": "活性物质系统包括由大量活性粒子组成的自然和人工创建的系统。这些粒子主动消耗能量来推动自身或施加机械力，从而导致复杂的行为和各种集体运动，从聚集转变到运动引起的相分离。群体转变是指群体中个体的自发排列和协调，类似于在鸟群或鱼群中观察到的凝聚力运动。另一方面，运动引起的相分离是指活性颗粒根据其不同的运动水平分离到不同的区域。在本次演讲中，我将讨论活性物质系统，特别关注集体行为和动力学，包括体积排斥特征的影响、介质无序的影响，以及通过引入自旋各向异性在晶格外自驱动粒子的行为。\n\n目的是了解自驱动粒子的集体行为如何受到各种系统参数的影响，包括热噪声、自驱动速度、外场强度等。我还将在活性物质模型的背景下展示干扰、动力学停止、运动引起的相分离、共存相、微相分离和相变等现象。", "authors": [{"name": "Mintu Karmakar"}], "featured_authors": [{"name": "Mintu Karmakar"}], "author_count": 1}, {"id": "2605.09962", "category": "cond-mat", "title": "Attenuation of long-wavelength sound in quenched disordered media", "abstract": "We derive analytically, and validate numerically, the dispersion renormalization and attenuation of acoustic waves propagating through quenched disordered media in the long-wavelength limit. We consider weak spatial fluctuations in elastic moduli and/or mass density and compute the disorder-induced self-energies within the leading (Born) approximation. For sufficiently weak disorder, the results depend only on the variances of the fluctuations and are therefore insensitive to the detailed form of the underlying random distribution. For spatially uncorrelated elasticity disorder we obtain Rayleigh-type attenuation, $\\Gamma(q)\\propto q^{d+1}$ , together with a reduction of the sound speed. In contrast, density disorder produces Rayleigh-type attenuation but does not renormalize the acoustic dispersion to leading order. Molecular dynamics simulations and normal-mode analyses of disordered one- and two-dimensional lattices quantitatively confirm the theoretical predictions.", "url": "https://arxiv.org/abs/2605.09962", "type": "理论+数值", "summary": "我们通过分析推导并数值验证声波在长波长极限内通过淬火无序介质传播的色散重正化和衰减。我们考虑弹性模量和/或质量密度的弱空间波动，并计算领先（玻恩）近似内无序引起的自能。对于足够弱的无序，结果仅取决于波动的方差，因此对潜在随机分布的详细形式不敏感。对于空间不相关的弹性紊乱，我们获得瑞利型衰减 $\\Gamma(q)\\propto q^{d+1}$ ，同时声速降低。相反，密度无序会产生瑞利型衰减，但不会将声色散重新归一化为前导阶。无序一维和二维晶格的分子动力学模拟和简正模分析定量地证实了理论预测。", "authors": [{"name": "Bingyu Cui"}, {"name": "Yuqi Wang"}], "featured_authors": [{"name": "Bingyu Cui"}, {"name": "Yuqi Wang"}], "author_count": 2}, {"id": "2605.09974", "category": "cond-mat", "title": "Localization phase diagram of the Hexagonal Lattice with irrational magnetic flux", "abstract": "We study the Hofstadter model on a hexagonal lattice with irrational magnetic flux in this work. The Hofstadter model of the square lattice with irrational flux has been solved mathematically by Avila in his Fields medal work. However, this theory is usually not applicable to lattices with internal degrees of freedom, such as spin or sub-lattices. In this work, we show that for the hexagonal lattice with only nearest neighbor hopping, the system can still be characterized by a 2*2 transfer matrix and solved exactly by Avila$'$s global theory of Avila although this lattice has two sub-lattices. We obtained the exact localization phase diagram of the hexagonal lattice with irrational flux by this theory, which reveals three pure phases, that is, the extended, localized and critical states but no mobility edge due to the chiral symmetry. We used the renormalization group (RG) theory to verify these results, which can determine part of the phase diagram. We then computed the fractal dimension of the remaining part numerically. The results from both the RG theory and numerical analysis confirmed the phase diagram we get from Avila$'$s global theory.", "url": "https://arxiv.org/abs/2605.09974", "type": "理论+数值", "summary": "在这项工作中，我们研究了具有无理磁通量的六方晶格上的 Hofstadter 模型。阿维拉在他的菲尔兹奖作品中用数学方法解决了具有无理通量的方晶格的霍夫施塔特模型。然而，该理论通常不适用于具有内部自由度的晶格，例如自旋或子晶格。在这项工作中，我们表明，对于仅具有最近邻跳跃的六角晶格，尽管该晶格有两个子晶格，但该系统仍然可以用 2*2 传输矩阵来表征，并且可以通过 Avila$'$s Avila 全局理论精确求解。通过该理论，我们得到了具有无理通量的六方晶格的精确局域相图，该图揭示了三个纯相，即扩展态、局域态和临界态，但由于手性对称性而没有迁移率边缘。我们使用重正化群（RG）理论来验证这些结果，可以确定部分相图。然后我们用数值方法计算了剩余部分的分形维数。 RG 理论和数值分析的结果证实了我们从阿维拉全局理论得到的相图。", "authors": [{"name": "Qi Gao"}, {"name": "Shuo Zhang"}, {"name": "Wei Chen"}], "featured_authors": [{"name": "Qi Gao"}, {"name": "Shuo Zhang"}, {"name": "Wei Chen"}], "author_count": 3}, {"id": "2605.10089", "category": "cond-mat", "title": "A molecular perspective on coordination, screening, and emergent length scales in lithium electrolytes", "abstract": "Lithium electrolytes are commonly described using separate conceptual frameworks for local coordination chemistry, electrostatic screening, and ionic transport. This separation is effective in dilute conditions but breaks down at higher concentration, where coordination, ion pairing, clustering, and collective dynamics become intrinsically coupled. In this Perspective, we develop a unified multiscale framework that links local coordination motifs, mesoscopic ionic organization, and macroscopic transport within a single physical picture. Through representative examples spanning carbonate liquids, polymer electrolytes, concentrated systems, and confinement, we show that increasing concentration drives a systematic evolution from solvent-dominated Li$^+$ coordination to ion pairing, clustering, and correlated domains. In this regime, screening and transport are not independent phenomena but arise from the same underlying correlated structures. This perspective implies that rational electrolyte design must simultaneously control short-range coordination, mesoscale organization, and collective electrostatic response.", "url": "https://arxiv.org/abs/2605.10089", "type": "理论", "summary": "锂电解质通常使用局部配位化学、静电屏蔽和离子传输的单独概念框架来描述。这种分离在稀释条件下有效，但在较高浓度下会分解，其中配位、离子配对、聚集和集体动力学变得本质上耦合。在这个视角中，我们开发了一个统一的多尺度框架，将局部协调图案、介观离子组织和单个物理图片中的宏观传输联系起来。通过碳酸盐液体、聚合物电解质、浓缩系统和限制的代表性例子，我们表明，浓度的增加推动了从溶剂主导的 Li$^+$ 配位到离子配对、聚类和相关域的系统演化。在这种情况下，筛选和运输不是独立的现象，而是源于相同的底层相关结构。这种观点意味着合理的电解质设计必须同时控制短程配位、介观组织和集体静电响应。", "authors": [{"name": "A. Coste"}, {"name": "E. Zunzunegui-Bru"}, {"name": "A. van Roekeghem"}, {"name": "I. Skarmoutsos"}, {"name": "S. Mossa"}], "featured_authors": [{"name": "A. Coste"}, {"name": "E. Zunzunegui-Bru"}, {"name": "A. van Roekeghem"}, {"name": "I. Skarmoutsos"}, {"name": "S. Mossa"}], "author_count": 5}, {"id": "2605.10104", "category": "cond-mat", "title": "B-H hysteresis in itinerant Feromagnetism from Chern-Simons Gauge theory", "abstract": "The log H term is derived in the free energy of many-electron system from Chern-Simons gauge theory. Owing to the singularity at $H=0$, this leads the first order transition and B-H hysteresis to many-electron systems of symmetric and single domain. This has the origin in quantum mechanics and is irrelevant to non-invertible motions of domains. This transition appears in single and symmetric domain.", "url": "https://arxiv.org/abs/2605.10104", "type": "理论", "summary": "log H 项是根据 Chern-Simons 规范理论在多电子系统的自由能中导出的。由于$H=0$处的奇点，这导致对称单域多电子系统的一阶跃迁和B-H磁滞。这起源于量子力学，与域的不可逆运动无关。这种转变出现在单一对称域中。", "authors": [{"name": "Kenzo Ishikawa"}], "featured_authors": [{"name": "Kenzo Ishikawa"}], "author_count": 1}, {"id": "2605.10191", "category": "cond-mat", "title": "Computing eigenpairs of quantum many-body systems with Polfed.jl", "abstract": "We present this http URL , an open-source Julia package implementing the Polynomially Filtered Exact Diagonalization (POLFED) algorithm for computing mid-spectrum eigenvalues and eigenvectors (shortly, eigenpairs) of quantum many-body Hamiltonians. Access to such eigenpairs is essential for studying non-equilibrium many-body physics, but is hindered by the exponential growth of Hilbert-space dimension. POLFED addresses this challenge through a polynomial spectral transformation evaluated on the fly within a Lanczos iteration, preserving Hamiltonian sparsity and substantially reducing memory costs compared to other diagonalization methods. The package supports flexible energy targeting, automatic optimization of the spectral mapping for structured Hamiltonians, and GPU acceleration, which is particularly effective since the dominant computational cost reduces to repeated sparse matrix-vector multiplications. Benchmarks on disordered spin-chain and fermionic models demonstrate access to larger system sizes than alternative approaches, and CPU--GPU comparisons confirm significant speedups. In particular, we also provide code for constructing the quantum sun model Hamiltonian, a toy model of a many-body ergodicity-breaking transition. While our focus is on many-body Hamiltonians, this http URL may be applied to any large sparse matrix.", "url": "https://arxiv.org/abs/2605.10191", "type": "理论+数值", "summary": "我们提出这个 http URL ，这是一个开源 Julia 包，它实现了多项式滤波精确对角化 (POLFED) 算法，用于计算量子多体哈密顿量的中谱特征值和特征向量（简称特征对）。获取此类特征对对于研究非平衡多体物理至关重要，但受到希尔伯特空间维度的指数增长的阻碍。 POLFED 通过在 Lanczos 迭代中动态评估的多项式谱变换解决了这一挑战，与其他对角化方法相比，保留了哈密顿稀疏性并大大降低了内存成本。该软件包支持灵活的能量目标、结构化哈密顿量的光谱映射自动优化以及 GPU 加速，这特别有效，因为主要的计算成本减少为重复的稀疏矩阵向量乘法。无序自旋链和费米子模型的基准测试表明，与其他方法相比，可以访问更大的系统尺寸，并且 CPU-GPU 比较证实了显着的加速。\n\n特别是，我们还提供了构建量子太阳模型哈密顿量的代码，这是一个多体遍历性破坏转变的玩具模型。虽然我们的重点是多体哈密顿量，但此 http URL 可以应用于任何大型稀疏矩阵。", "authors": [{"name": "Rok Pintar"}, {"name": "Konrad Pawlik"}, {"name": "Rafał Świętek"}, {"name": "Miroslav Hopjan"}, {"name": "Jan Šuntajs"}, {"name": "Jakub Zakrzewski"}, {"name": "Piotr Sierant"}, {"name": "Lev Vidmar"}], "featured_authors": [{"name": "Rok Pintar"}, {"name": "Konrad Pawlik"}, {"name": "Rafał Świętek"}, {"name": "Jakub Zakrzewski"}, {"name": "Piotr Sierant"}, {"name": "Lev Vidmar"}], "author_count": 8}, {"id": "2605.10252", "category": "cond-mat", "title": "Saddle-node bifurcation in interfacial morphology selects battery degradation phase", "abstract": "We propose a minimal nonlinear closure ODE for the dynamic active-area factor of a battery interface and show that it exhibits a saddle-node bifurcation when the smoothing rate saturates with surface roughness. The closure is the simplest physically motivated extension of a recently introduced single-fixed-point closure [C. Bae, in preparation (2026)]: u = K - u/(1 + alphau^2), where u = xi - 1 is the dimensionless excess active area, K the dimensionless drive, and alpha a single saturation parameter. The bifurcation occurs at K_c = 1/(2sqrt(alpha)), separating a smooth passivating phase from a morphologically unstable phase. Mapping four canonical anode configurations -- graphite, silicon composite, lithium metal, and anode-free Li/Cu -- onto the closure via end-of-cycling steady-state xi extracted from publicly available long-cycle data populates the stable branch with monotonically increasing K/K_c ratios: graphite (~0.01), silicon composite (~0.24), lithium metal (~0.73), and anode-free (~0.95). The anode-free configuration sits within 5% of the saddle-node threshold, predicting a vanishingly small operational stability window in current density, temperature, and electrolyte composition. We test three falsifiable predictions of the framework -- a critical current density, a critical temperature shift, and a mean-field critical-slowing-down exponent -- and find them broadly consistent with publicly available data. We argue that this near-critical position is universal to nucleation-controlled deposition on non-passivating substrates.", "url": "https://arxiv.org/abs/2605.10252", "type": "理论", "summary": "我们针对电池界面的动态活性面积因子提出了最小非线性闭包常微分方程，并表明当平滑率随着表面粗糙度而饱和时，它会表现出鞍节点分叉。该闭包是最近引入的单定点闭包的最简单的物理驱动扩展[C. Bae，准备中（2026）]：u = K - u/(1 + alphau^2)，其中 u = xi - 1 是无量纲多余活动区域，K 是无量纲驱动，alpha 是单个饱和参数。分叉发生在 K_c = 1/(2sqrt(alpha)) 处，将平滑的钝化相与形态不稳定的相分开。通过从公开的长周期数据中提取的循环结束稳态 xi 将四种典型阳极配置（石墨、硅复合材料、锂金属和无阳极 Li/Cu）映射到闭合上，以单调递增的 K/K_c 比率填充稳定分支：石墨（约 0.01）、硅复合材料（约 0.24）、锂金属（约 0.73）和无阳极（约 0.95）。\n\n无阳极配置位于鞍形节点阈值的 5% 以内，预测电流密度、温度和电解质成分的运行稳定性窗口非常小。我们测试了该框架的三个可证伪的预测——临界电流密度、临界温度变化和平均场临界减速指数——并发现它们与公开数据大致一致。我们认为这种近临界位置对于非钝化基底上的成核控制沉积是普遍存在的。", "authors": [{"name": "Changdeuck Bae"}], "featured_authors": [{"name": "Changdeuck Bae"}], "author_count": 1}, {"id": "2605.10254", "category": "cond-mat", "title": "Floquet-tuned superfluid-checkerboard competition in dipolar bosons", "abstract": "We study hard-core dipolar bosons on a square lattice subject to a unidirectional periodic dr
