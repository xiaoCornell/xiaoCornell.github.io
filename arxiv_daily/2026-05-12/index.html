ive that Floquet-engineers anisotropic hopping. Driving along one lattice direction provides a controlled way to suppress transverse tunneling, yielding a kinetically quasi-one-dimensional regime with strongly anisotropic transport within the leading-order high-frequency Floquet effective description. In this limit, the system does not reduce to decoupled chains, due to the long-range in-plane dipolar interaction remains isotropic and couples different chains. Focusing on dipoles polarized perpendicular to the plane, for which the interaction is purely repulsive and isotropic, we use sign-problem-free worm-algorithm quantum Monte Carlo simulations to map the half-filling phase diagram versus kinetic anisotropy and dipolar coupling. We find that increasing kinetic anisotropy systematically lowers the interaction strength required to stabilize checkerboard order, demonstrating that Floquet-induced suppression of transverse motion enhances density ordering. Near the superfluid--checkerboard boundary, finite-size results reveal a narrow transition region where the stiffness drops rapidly while checkerboard correlations rise sharply; Its pronounced sharpening with system size is consistent with a weakly first-order transition rounded by finite-size effects. Away from half filling, on the doped sides of the checkerboard plateau, we identify a narrow checkerboard-supersolid regime with simultaneously finite checkerboard correlations and superfluid stiffness, where the superfluid stiffness is anisotropic but the density pattern is isotropic.", "url": "https://arxiv.org/abs/2605.10254", "type": "理论+数值", "summary": "我们研究了方形晶格上的硬核偶极玻色子，该玻色子受到 Floquet 设计的各向异性跳跃的单向周期驱动。沿着一个晶格方向驱动提供了一种抑制横向隧道效应的受控方法，从而在前导高频 Floquet 有效描述内产生具有强各向异性输运的动力学准一维状态。在此限制下，系统不会简化为解耦链，因为长程面内偶极相互作用保持各向同性并耦合不同的链。着眼于垂直于平面极化的偶极子，其相互作用是纯粹排斥性和各向同性的，我们使用无符号问题蠕虫算法量子蒙特卡罗模拟来绘制半填充相图与动力学各向异性和偶极耦合。我们发现，增加动力学各向异性会系统地降低稳定棋盘顺序所需的相互作用强度，这表明 Floquet 引起的横向运动抑制增强了密度排序。\n\n在超流体-棋盘边界附近，有限尺寸结果揭示了一个狭窄的过渡区域，其中刚度迅速下降，而棋盘相关性急剧上升；其随系统尺寸的显着锐化与由有限尺寸效应舍入的弱一阶过渡一致。远离半填充，在棋盘平台的掺杂侧，我们确定了一个狭窄的棋盘超固体体系，同时具有有限的棋盘相关性和超流体刚度，其中超流体刚度是各向异性的，但密度模式是各向同性的。", "authors": [{"name": "Jin Yang"}, {"name": "Yaghmorassene Hebib"}, {"name": "Chao Zhang"}], "featured_authors": [{"name": "Jin Yang"}, {"name": "Yaghmorassene Hebib"}, {"name": "Chao Zhang"}], "author_count": 3}, {"id": "2605.10304", "category": "cond-mat", "title": "Partial annealing and pattern decorrelation in associative neural networks", "abstract": "Using the Hopfield model as a benchmark case, the present work focuses on the investigation of partially annealed associative neural networks, wherein neural dynamics is coupled to slowly evolving patterns within the two-temperature-two-timescale framework. This setting inherently introduces a real parameter n, reminiscent of the number of replicas in the celebrated replica trick, that tunes the separation of timescales and the effective interaction between fast (i.e. the neurons) and slow (i.e. the synapses) degrees of freedom. By adapting Guerra's interpolation to the case, we derive the free energy without relying on analytical continuation. The obtained results demonstrate that negative values of n induce a progressive decorrelation of the stored patterns, thereby effectively reducing interference, promoting orthogonal configurations and ultimately conferring to the network the maximal storage alphac=1. Numerical simulations based on a mean field Monte Carlo dynamics have been employed to confirm this scenario and prove that partial annealing restores retrieval in challenging regimes, such as in the presence of biased patterns, outperforming standard decorrelation methods. These findings underscore the notion of partial annealing as an adaptive mechanism for enhancing memory organisation and retrieval in complex systems.", "url": "https://arxiv.org/abs/2605.10304", "type": "理论+数值", "summary": "使用 Hopfield 模型作为基准案例，目前的工作重点是研究部分退火的关联神经网络，其中神经动力学与两个温度两个时间尺度框架内缓慢演化的模式耦合。这种设置本质上引入了一个实数参数 n，让人想起著名的复制技巧中的复制数量，它调整时间尺度的分离以及快（即神经元）和慢（即突触）自由度之间的有效相互作用。通过对这种情况进行 Guerra 插值，我们无需依赖解析延拓即可推导出自由能。获得的结果表明，n 的负值会导致存储模式的渐进去相关，从而有效地减少干扰，促进正交配置，并最终赋予网络最大存储 alphac=1。基于平均场蒙特卡罗动力学的数值模拟已被用来证实这种情况，并证明部分退火可以在具有挑战性的情况下恢复恢复，例如在存在偏差模式的情况下，其性能优于标准去相关方法。\n\n这些发现强调了部分退火作为增强复杂系统中的记忆组织和检索的自适应机制的概念。", "authors": [{"name": "Linda Albanese"}, {"name": "Andrea Alessandrelli"}, {"name": "Adriano Barra"}, {"name": "Silvio Franz"}, {"name": "Federico Ricci-Tersenghi"}], "featured_authors": [{"name": "Linda Albanese"}, {"name": "Andrea Alessandrelli"}, {"name": "Adriano Barra"}, {"name": "Silvio Franz"}, {"name": "Federico Ricci-Tersenghi"}], "author_count": 5}, {"id": "2605.10320", "category": "cond-mat", "title": "Beyond Topological Invariants: Order Parameters from Dominant Fock-state Patterns", "abstract": "We introduce a general scheme for constructing order parameters (OPs) by extracting generic patterns from the dominant Fock states of many-body ground states. While topological phases are traditionally characterized by non-local invariants, we demonstrate that our real-space OPs provide a more refined classification. In the extended Su-Schrieffer-Heeger model, we show that the standard winding number is insufficient to fully distinguish all phases; our OPs reveal a hidden sub-structure where each topological sector splits into two distinct phases. Beyond identifying the phase boundaries, these OPs quantify the depth of a phase, and remain robust in characterizing transitions in disordered systems. Furthermore, our approach provides a practical finite-size diagnostic for the Berezinskii-Kosterlitz-Thouless transition in the interacting spin-1/2 XXZ model. The presented framework offers a broadly applicable tool for uncovering the phase diagrams of diverse interacting and non-interacting quantum many-body systems.", "url": "https://arxiv.org/abs/2605.10320", "type": "理论+数值", "summary": "我们引入了一种通过从多体基态的主导福克态中提取通用模式来构造序参数（OP）的通用方案。虽然拓扑相传统上以非局部不变量为特征，但我们证明了我们的真实空间 OP 提供了更精细的分类。在扩展的 Su-Schrieffer-Heeger 模型中，我们表明标准绕组数不足以完全区分所有相；我们的OP揭示了一个隐藏的子结构，其中每个拓扑部分分为两个不同的阶段。除了识别相边界之外，这些OP还可以量化相的深度，并在表征无序系统中的转变方面保持稳健。此外，我们的方法为相互作用的自旋 1/2 XXZ 模型中的 Berezinskii-Kosterlitz-Thouless 转变提供了实用的有限尺寸诊断。所提出的框架提供了一种广泛适用的工具，用于揭示不同相互作用和非相互作用量子多体系统的相图。", "authors": [{"name": "Tsz Hin Hui"}, {"name": "Xiaodan Xia"}, {"name": "Pedro D. Sacramento"}, {"name": "Wing Chi Yu"}], "featured_authors": [{"name": "Tsz Hin Hui"}, {"name": "Xiaodan Xia"}, {"name": "Pedro D. Sacramento"}, {"name": "Wing Chi Yu"}], "author_count": 4}, {"id": "2605.10326", "category": "cond-mat", "title": "Statistical mechanics of the $N$-queens problem", "abstract": "We investigate the $N$-queens problem as a lattice gas -- a model in which $N$ queens are placed on an $N \\times N$ chessboard with pairwise repulsive interactions along shared rows, columns, and diagonals -- from the perspective of statistical mechanics. The ground states are exactly the $Q(N)$ solutions of the classical $N$-queens problem, with entropy per queen $s_0 \\approx \\ln N - \\gamma$ ($\\gamma \\approx 1.944$). This entropy reflects a characteristic constraint hierarchy: each successive geometric constraint -- columns, then diagonals -- reduces the entropy from the free-placement value $\\ln N$ by a definite constant. We derive the exact high-temperature energy $E/N \\to 5/3$ as $N \\to \\infty$. Extensive Monte Carlo simulations with $10^8$ sweeps per temperature point for $N = 8$--$1024$ reveal that the specific heat per queen $C_v/N$ converges to a universal function of $T$ as $N \\to \\infty$. The converged curve features a non-divergent peak $C_v^{\\max}/N \\approx 1.63$ at $T^* \\approx 0.235\\,J$, establishing the absence of a thermodynamic phase transition. Combined with the trivially exact high-temperature entropy $S(\\infty)/N = (1/N) \\ln \\binom{N^2}{N}$, the convergence of $C_v/N$ enables a thermodynamic integration of $C_v/T$ from $T = \\infty$ to $T = 0$ that recovers the ground-state entropy -- and hence the Simkin constant $\\gamma$ -- purely from Monte Carlo data. This provides an independent thermodynamic route to a fundamental combinatorial constant. Thermodynamic integration yields $\\gamma_{\\rm MC} = 1.946 \\pm 0.003$ at $N = 1024$, within $0.1\\%$ of the precise combinatorial value $\\gamma = 1.94400(1)$. We further present a transfer-matrix-based tensor network formulation that encodes the non-attacking constraints into a rank-9 site tensor with 17 nonzero elements, providing a complementary exact-enumeration route.", "url": "https://arxiv.org/abs/2605.10326", "type": "理论+数值", "summary": "我们从统计力学的角度研究了作为晶格气体的 $N$ 皇后问题 - 一个模型，其中 $N$ 皇后被放置在 $N \\times N$ 棋盘上，沿着共享的行、列和对角线具有成对排斥相互作用。基态正是经典 $N$ 皇后问题的 $Q(N)$ 解，每个皇后的熵为 $s_0 \\approx \\ln N - \\gamma$ ($\\gamma \\approx 1.944$)。该熵反映了特征约束层次结构：每个连续的几何约束（列，然后是对角线）都会将自由放置值 $\\ln N$ 的熵减少一个确定的常数。我们将精确的高温能量 $E/N \\to 5/3$ 推导出为 $N \\to \\infty$。每个温度点 $10^8$ 扫描 $N = 8$--$1024$ 的广泛蒙特卡罗模拟表明，每个皇后的比热 $C_v/N$ 收敛到 $T$ 的通用函数，即 $N \\to \\infty$。收敛曲线在 $T^* \\approx 0.235\\,J$ 处具有非发散峰 $C_v^{\\max}/N \\approx 1.63$，表明不存在热力学相变。\n\n结合普通精确的高温熵 $S(\\infty)/N = (1/N) \\ln \\binom{N^2}{N}$，$C_v/N$ 的收敛使得 $C_v/T$ 从 $T = \\infty$ 到 $T = 0$ 进行热力学积分，从而恢复基态熵 - 以及 Simkin 常数 $\\gamma$ - 纯粹从蒙特卡罗数据恢复。这为基本组合常数提供了一条独立的热力学途径。热力学积分在 $N = 1024$ 处产生 $\\gamma_{\\rm MC} = 1.946 \\pm 0.003$，在精确组合值 $\\gamma = 1.94400(1)$ 的 $0.1\\%$ 范围内。我们进一步提出了一种基于传输矩阵的张量网络公式，它将非攻击约束编码为具有 17 个非零元素的 9 阶站点张量，提供了互补的精确枚举路线。", "authors": [{"name": "Zong-Yue Liu"}, {"name": "Hai-Jun Liao"}, {"name": "Lei Wang"}], "featured_authors": [{"name": "Zong-Yue Liu"}, {"name": "Hai-Jun Liao"}, {"name": "Lei Wang"}], "author_count": 3}, {"id": "2605.10387", "category": "cond-mat", "title": "Layer-antisymmetric pair-phase resonance at the bonding-antibonding splitting in the AA-stacked bilayer attractive Hubbard model", "abstract": "The relative phase between the two pair condensates of a bilayer s-wave superconductor is a collective degree of freedom distinct from the usual in-phase Anderson-Bogoliubov mode. Working at the Gaussian fluctuation level for the AA-stacked attractive-Hubbard honeycomb bilayer, we show analytically that the layer-antisymmetric pair-phase channel hosts an in-gap collective pole at twice the single-particle interlayer hopping, $2t_h$, precisely the bonding-antibonding band splitting. The mechanism is algebraic: at this frequency, the antisymmetric phase bubble reduces pointwise in momentum space to the static symmetric phase bubble that enforces the in-phase Goldstone pole. The resulting resonance scale is therefore fixed by the single-particle hybridization, rather than by the interaction-driven Josephson coupling that controls the canonical Leggett mode. The identity is verified numerically by direct Bogoliubov-de Gennes calculations. The diagonal antisymmetric phase-channel kernel zero is exact within Gaussian theory at any chemical potential; the full coupled amplitude-phase pole coincides with it at half filling and tracks it closely away from half filling. The excitation is Raman-forbidden by inversion, which motivates layer-odd probes. We find that a layer-imbalance drive has finite Gaussian-level overlap with the pair-phase sector, suggesting a possible cold-atom layer-bias response feature near the sub-kilohertz scale for typical optical-lattice parameters.", "url": "https://arxiv.org/abs/2605.10387", "type": "理论+数值", "summary": "双层 s 波超导体的两对凝聚体之间的相对相位是与通常的同相安德森-博戈柳波夫模式不同的集体自由度。在 AA 堆叠吸引哈伯德蜂窝双层的高斯涨落水平下，我们分析表明，层反对称对相通道在单粒子层间跳跃 $2t_h$ 的两倍处拥有一个间隙内集体极点，即键合-反键合能带分裂。该机制是代数的：在此频率下，反对称相位气泡在动量空间中逐点减少为静态对称相位气泡，从而增强了同相戈德斯通极点。因此，产生的共振尺度由单粒子杂交固定，而不是由控制规范莱格特模式的相互作用驱动的约瑟夫森耦合固定。该身份通过直接 Bogoliubov-de Gennes 计算进行数字验证。对角反对称相位通道核零在高斯理论中在任何化学势下都是精确的；全耦合幅度-相位极点在半填充时与其重合，并在远离半填充时紧密跟踪它。\n\n激发是拉曼反演所禁止的，这激发了奇数层探针。我们发现层不平衡驱动器与对相扇区具有有限的高斯级重叠，这表明对于典型的光学晶格参数，可能存在接近亚千赫兹尺度的冷原子层偏置响应特征。", "authors": [{"name": "Yogeshwar Prasad"}], "featured_authors": [{"name": "Yogeshwar Prasad"}], "author_count": 1}, {"id": "2605.10418", "category": "cond-mat", "title": "Bose-Fermi Mapping in Hubbard Models at Imaginary Chemical Potential and Phase-Induced Fermionization", "abstract": "We find a mapping between the attractive Fermi-Hubbard model and the repulsive Bose-Hubbard model at finite temperature and at imaginary chemical potential $\\mu =i\\theta$. We show, by using a large $N$-expansion, that the partition functions of the two models are related by a simple shift $\\theta \\to \\theta + \\pi$. This condition maps the BCS--BEC crossover of attractive fermions to a Bose--Fermi crossover (fermion-like occupation) of repulsive bosons. Central feature of this correspondence plays the thermal kernel $g(\\beta E,\\phi),$ whose analytic continuation $g_B(\\beta E,\\phi) = g_F(\\beta E,\\phi+\\pi)$ governs the bosonic and fermionic sectors. Interestingly, we are able to find that the special angles $\\phi = 2\\pi/3,4\\pi/3$ for fermions correspond to $\\phi = \\pi/3,5\\pi/3$ for bosons, marking the boundaries of a universal thermal window. We further argue that the present mechanism shows that fermionization can occur at finite interaction strength through a thermodynamic effect induced by the imaginary chemical potential. This suggests that it is a new way of fermionization (not a change in statistics but a fermion-like behaviour) unlike the Tonks--Girardeau limit, where fermionization arises from an infinite repulsive interaction and anyonic or Floquet-engineered systems where transmutation emerges from modified statistics or dynamics. Essentially, the phase $\\phi$ is a statistical parameter; by twisting the thermal phase, it generates fermion-like behaviour without hard-core constraints or infinite repulsion but only by using thermodynamics. We derive the gap equation and number equation for the bosonic model, highlighting the role of the imaginary chemical potential as a statistical regulator. Our results provide a unified framework for understanding crossovers in interacting lattice systems.", "url": "https://arxiv.org/abs/2605.10418", "type": "理论", "summary": "我们发现在有限温度和虚化学势 $\\mu =i\\​​theta$ 下，吸引性费米-哈伯德模型和排斥性玻色-哈伯德模型之间的映射。我们通过使用大的 $N$ 展开，证明两个模型的配分函数通过简单的移位 $\\theta \\ 到 \\theta + \\pi$ 来相关。该条件将吸引性费米子的 BCS-BEC 交叉映射到排斥性玻色子的 Bose-费米交叉（类费米子占据）。该对应关系的核心特征是热核 $g(\\beta E,\\phi),$，其解析延拓 $g_B(\\beta E,\\phi) = g_F(\\beta E,\\phi+\\pi)$ 控制玻色子和费米子扇区。有趣的是，我们可以发现费米子的特殊角 $\\phi = 2\\pi/3,4\\pi/3$ 对应于玻色子的 $\\phi = \\pi/3,5\\pi/3$，标志着通用热窗口的边界。我们进一步认为，目前的机制表明，费米化可以通过虚化学势引起的热力学效应在有限的相互作用强度下发生。\n\n这表明它是一种新的费米子化方式（不是统计数据的变化，而是类似费米子的行为），与唐克斯-吉拉多极限不同，在唐克斯-吉拉多极限中，费米子化是由无限排斥相互作用和任意子或弗洛奎特设计的系统产生的，其中嬗变是从修改的统计数据或动力学中出现的。本质上，相位 $\\phi$ 是一个统计参数；通过扭转热相，它可以产生类似费米子的行为，没有硬核约束或无限排斥力，但只能使用热力学。我们推导了玻色子模型的间隙方程和数字方程，强调了虚化学势作为统计调节剂的作用。我们的结果为理解交互晶格系统中的交叉提供了一个统一的框架。", "authors": [{"name": "Evangelos G. Filothodoros"}], "featured_authors": [{"name": "Evangelos G. Filothodoros"}], "author_count": 1}, {"id": "2605.10472", "category": "cond-mat", "title": "Influence of pump size on pattern formation in exciton-polaritonic Bose-Einstein condensates in the non-Markovian regime", "abstract": "Dynamics of exciton-polaritonic condensate under incoherent pumping is studied using the non-Markovian stochastic Gross-Pitaevskii equation with the pseudo-differential dispersion term. This term corresponds to the lower energy branch of polaritons. It is shown that an increasing of the pumping spot area leads to the appearance of various spatial structures whose properties depend on the duration of the dynamical memory. In the regime of short memory time, condensate can form an extended state that spans outside the pumping area. We conclude that onset of such extended states is related to the specific form of the dispersion term causing the ``traffic jam'' effect. The case of long memory time corresponds to enhanced condensate formation, when increasing of the pumping area leads to appearance of angular condensate structures which partially suppress emission of matter waves from the pumping area.", "url": "https://arxiv.org/abs/2605.10472", "type": "理论", "summary": "使用带有赝微分色散项的非马尔可夫随机 Gross-Pitaevskii 方程研究了非相干泵浦下激子极化凝聚体的动力学。该术语对应于极化子的较低能量分支。研究表明，泵浦光斑面积的增加会导致各种空间结构的出现，其特性取决于动态记忆的持续时间。在短存储时间的情况下，冷凝物可以形成跨越泵浦区域之外的扩展状态。我们得出的结论是，这种扩展状态的出现与引起“交通拥堵”效应的色散项的特定形式有关。当泵浦面积的增加导致出现角凝聚结构时，长存储时间的情况对应于增强的凝聚形成，该角凝聚结构部分地抑制了来自泵浦区域的物质波的发射。", "authors": [{"name": "N. V. Kuznetsova"}, {"name": "A. D. Alliluev"}, {"name": "D. V. Makarov"}, {"name": "A. A. Anisich"}], "featured_authors": [{"name": "N. V. Kuznetsova"}, {"name": "A. D. Alliluev"}, {"name": "D. V. Makarov"}, {"name": "A. A. Anisich"}], "author_count": 4}, {"id": "2605.10528", "category": "cond-mat", "title": "Collective Alignment in LLM Multi-Agent Systems: Disentangling Bias from Cooperation via Statistical Physics", "abstract": "We investigate the emergent collective dynamics of LLM-based multi-agent systems on a 2D square lattice and present a model-agnostic statistical-physics method to disentangle social conformity from intrinsic bias, compute critical exponents, and probe the collective behavior and possible phase transitions of multi-agent systems. In our framework, each node of an $L\\!\\times\\!L$ lattice hosts an identical LLM agent holding a binary state ($+1$/$-1$, mapped to yes/no) and updating it by querying the model conditioned on the four nearest-neighbor states. The sampler temperature $T$ serves as the sole control parameter. Across three open-weight models (llama3.1:8b, phi4-mini:3.8b, mistral:7b), we measure magnetization and susceptibility under a global-flip protocol designed to probe $\\mathbb{Z}_2$ symmetry. All models display temperature-driven order-disorder crossovers and susceptibility peaks; finite-size scaling on even-$L$ lattices yields effective exponents $\\gamma/\\nu$ whose values are model-dependent, close to but incompatible with the 2D Ising universality class ($\\gamma/\\nu=7/4$). Our method enables the extraction of effective $\\beta$-weighted couplings $\\tilde{J}(T)$ and fields $\\tilde{h}(T)$, which serve as a measure of social conformity and intrinsic bias. In the models we analyzed, we found that collective alignment is dominated by an intrinsic bias ($\\tilde{h}\\gg\\tilde{J}$) rather than by cooperative neighbor coupling, producing field-driven crossovers instead of genuine phase transitions. These effective parameters vary qualitatively across models, providing compact collective-behavior fingerprints for LLM agents and a quantitative diagnostic for the reliability of multi-agent consensus and collective alignment.", "url": "https://arxiv.org/abs/2605.10528", "type": "理论+数值", "summary": "我们研究了二维方格上基于 LLM 的多智能体系统的新兴集体动力学，并提出了一种与模型无关的统计物理方法，以将社会一致性与内在偏见分开，计算关键指数，并探讨多智能体系统的集体行为和可能的相变。在我们的框架中，$L\\!\\times\\!L$ 网格的每个节点都托管一个相同的 LLM 代理，该代理持有二进制状态（$+1$/$-1$，映射到是/否），并通过查询以四个最近邻状态为条件的模型来更新它。采样器温度 $T$ 作为唯一的控制参数。在三个开放权重模型（llama3.1:8b、phi4-mini:3.8b、mistral:7b）中，我们在旨在探测 $\\mathbb{Z}_2$ 对称性的全局翻转协议下测量磁化强度和磁化率。所有模型均显示温度驱动的有序-无序交叉和磁化率峰值；偶数 $L$ 晶格上的有限尺寸缩放会产生有效指数 $\\gamma/\\nu$ ，其值与模型相关，接近但不兼容 2D Ising 普适性类 ($\\gamma/\\nu=7/4$)。\n\n我们的方法能够提取有效的$\\beta$加权耦合$\\tilde{J}(T)$和字段$\\tilde{h}(T)$，作为社会一致性和内在偏见的衡量标准。在我们分析的模型中，我们发现集体对齐由内在偏差 ($\\tilde{h}\\gg\\tilde{J}$) 主导，而不是由合作邻居耦合主导，从而产生场驱动的交叉而不是真正的相变。这些有效参数在不同模型中存在质的差异，为 LLM 智能体提供紧凑的集体行为指纹，并为多智能体共识和集体一致性的可靠性提供定量诊断。", "authors": [{"name": "Cristiano De Nobili"}], "featured_authors": [{"name": "Cristiano De Nobili"}], "author_count": 1}, {"id": "2605.10561", "category": "cond-mat", "title": "The diffusion equation for non-Markovian Gaussian stochastic processes", "abstract": "We derive the exact evolution equation for the probability density function of particle displacements generated by arbitrary Gaussian velocity processes, when neither Markovianity and nor stationarity are assumed. Starting from the characteristic function of the density of the position, we construct a systematic hierarchy of equations based on Wick's theorem, in which the dynamics is governed by sums of geometrically connected Wick contractions. This approach yields a closed non-Markovian diffusion equation that generalizes the Fokker-Planck description and preserves Gaussianity only in the infinite-order limit.", "url": "https://arxiv.org/abs/2605.10561", "type": "理论", "summary": "当既不假设马尔可夫性也不假设平稳性时，我们推导了任意高斯速度过程生成的粒子位移的概率密度函数的精确演化方程。从位置密度的特征函数开始，我们基于威克定理构建了一个系统的方程层次，其中动力学由几何关联的威克收缩之和控制。这种方法产生一个封闭的非马尔可夫扩散方程，该方程概括了福克-普朗克描述并仅在无限阶极限中保留高斯性。", "authors": [{"name": "Alessandro Taloni"}, {"name": "Gianni Pagnini"}, {"name": "Aleksei Chechkin"}], "featured_authors": [{"name": "Alessandro Taloni"}, {"name": "Gianni Pagnini"}, {"name": "Aleksei Chechkin"}], "author_count": 3}, {"id": "2605.10602", "category": "cond-mat", "title": "Inherent Altermagnetism on regular hyperbolic lattices", "abstract": "Altermagnets are a novel class of magnetic systems characterized by their momentum-dependent spin splitting without net magnetization. In this work, we extend established Euclidean tight-binding models of altermagnets to regular hyperbolic lattices in two spatial dimensions defined on a discretized Poincaré disk. Using hyperbolic crystallography and hyperbolic band theory, we show that the inclusion of next-nearest neighbor hopping is sufficient to induce spin splitting in bipartite hyperbolic lattices. While certain families and special cases of hyperbolic lattices remain antiferromagnetic, we identify an entire family and a special case that show spin splitting in this framework. Hence, altermagnetism is inherent to certain hyperbolic lattices. Since hyperbolic band theory yields a momentum space that is at least four-dimensional, we classify the leading spin-splitting harmonics using four-dimensional atomic orbitals.", "url": "https://arxiv.org/abs/2605.10602", "type": "理论", "summary": "交变磁体是一类新型磁系统，其特征在于其动量相关的自旋分裂而没有净磁化。在这项工作中，我们将已建立的交流磁体欧几里得紧束缚模型扩展到离散庞加莱盘上定义的两个空间维度中的规则双曲晶格。使用双曲晶体学和双曲能带理论，我们表明包含次近邻跳跃足以引起二部双曲晶格中的自旋分裂。虽然双曲晶格的某些族和特殊情况仍然具有反铁磁性，但我们确定了在该框架中显示自旋分裂的整个族和特殊情况。因此，交变磁性是某些双曲晶格所固有的。由于双曲能带理论产生至少是四维的动量空间，因此我们使用四维原子轨道对主要的自旋分裂谐波进行分类。", "authors": [{"name": "Eric Petermann"}, {"name": "Kristian Mæland"}, {"name": "Haye Hinrichsen"}, {"name": "Björn Trauzettel"}], "featured_authors": [{"name": "Eric Petermann"}, {"name": "Kristian Mæland"}, {"name": "Haye Hinrichsen"}, {"name": "Björn Trauzettel"}], "author_count": 4}, {"id": "2605.10613", "category": "cond-mat", "title": "Exact Fixed-Point Constraints in Neural-ODEs with Provable Universality", "abstract": "We introduce a technique that enables Neural-ODEs to approximate arbitrary velocity fields with a priori planted fixed-points. Specifically, a recipe is given to explicitly accommodate for a finite collection of points in the reference multi-dimensional space of the Neural-ODE where the velocity field is exactly equal to zero. In this way, the gradient-based training is rigorously constrained inside the prescribed hypothesis class while leaving the expressive power of the Neural-ODE unaltered. We rigorously prove the universality of the Neural-ODE under any local constraints in the velocity field and give a computationally convenient way of imposing the fixed points. Our method is then tested on two paradigmatic physical models.", "url": "https://arxiv.org/abs/2605.10613", "type": "理论", "summary": "我们引入了一种技术，使神经常微分方程能够利用先验固定点来近似任意速度场。具体来说，给出了一个方法来明确适应神经常微分方程的参考多维空间中的有限点集合，其中速度场恰好等于零。通过这种方式，基于梯度的训练被严格限制在规定的假设类内，同时保持神经常微分方程的表达能力不变。我们严格证明了神经常微分方程在速度场中任何局部约束下的普适性，并给出了一种计算上方便的施加不动点的方法。然后我们的方法在两个典型的物理模型上进行测试。", "authors": [{"name": "Feliciano Giuseppe Pacifico"}, {"name": "Duccio Fanelli"}, {"name": "Lorenzo Buffoni"}, {"name": "Lorenzo Chicchi"}, {"name": "Diego Febbe"}, {"name": "Raffaele Marino"}], "featured_authors": [{"name": "Feliciano Giuseppe Pacifico"}, {"name": "Duccio Fanelli"}, {"name": "Lorenzo Buffoni"}, {"name": "Lorenzo Chicchi"}, {"name": "Diego Febbe"}, {"name": "Raffaele Marino"}], "author_count": 6}, {"id": "2605.10630", "category": "cond-mat", "title": "Thermodynamics and dynamics of non-compact prismatic dislocation loops simulated using a machine-learning model", "abstract": "We explore how the thermodynamic properties and dynamics of a self-interstitial prismatic dislocation loop are affected by microscopic-scale variations in its geometric configuration, an aspect that rarely received attention in literature. First, we develop a machine-learning (ML) model to predict the formation energy of an arbitrary geometrically complex configuration of a self-interstitial atom dislocation loop. Trained on atomistic simulation data, the ML model achieves high predictive accuracy across a broad range of configurations, with a typical error in the 1% range. Second, from the ML model, we evaluate the density of configurational microstates as a function of loop's formation energy and derive analytical expressions valid in tractable limiting cases. Using statistical mechanics, we derive the configurational free energy, the average energy, and the thermodynamic entropy of a dislocation loop as a function of temperature. Third, we simulate the dynamics of self-climb of dislocation loops with various geometries and evaluate their diffusion coefficients and effective activation energies. Our analysis shows that there is a single universal parameter describing the morphological irregularity of loop configurations in its ground state. This parameter determines the thermodynamic properties of a loop as well as its dynamics, and simulations illustrate how the properties and mobility of a configurationally complex loop vary as functions of the irregularity parameter.", "url": "https://arxiv.org/abs/2605.10630", "type": "理论+数值", "summary": "我们探索了自填隙棱柱位错环的热力学性质和动力学如何受到其几何构型的微观尺度变化的影响，这一方面在文献中很少受到关注。首先，我们开发了一个机器学习（ML）模型来预测自填隙原子位错环的任意几何复杂配置的形成能。经过原子模拟数据的训练，ML 模型在各种配置中实现了较高的预测精度，典型误差在 1% 范围内。其次，根据 ML 模型，我们评估了构型微观状态的密度作为环形成能的函数，并推导出在易处理的极限情况下有效的解析表达式。利用统计力学，我们推导出位错环的构型自由能、平均能量和热力学熵作为温度的函数。第三，我们模拟了具有各种几何形状的位错环的自爬动力学，并评估了它们的扩散系数和有效激活能。\n\n我们的分析表明，有一个通用参数描述了基态环结构的形态不规则性。该参数决定了环路的热力学性质及其动力学，模拟说明了结构复杂的环路的性质和迁移率如何随着不规则性参数的函数而变化。", "authors": [{"name": "Sho Hayakawa"}, {"name": "Sergei L. Dudarev"}, {"name": "Max Boleininger"}], "featured_authors": [{"name": "Sho Hayakawa"}, {"name": "Sergei L. Dudarev"}, {"name": "Max Boleininger"}], "author_count": 3}, {"id": "2605.10644", "category": "cond-mat", "title": "Susceptible-Infected-Susceptible Model with Mitigation on Scale-Free Networks", "abstract": "We investigate infectious disease spreading on scale-free networks using a heterogeneous mean-field approach applied to the susceptible-infected-susceptible model, incorporating a mitigation factor. Individual heterogeneity is incorporated through a power-law distribution, while a mitigation factor accounts for behavioral responses and external effects that effectively reduce transmission from infected individuals. This mechanism, inspired by Malthus-Verhulst-type constraints, introduces a nonlinear saturation effect that encodes self-limiting dynamics in a tractable way. Analytical results are supported by stochastic simulations. We find that the mitigation factor induces a nontrivial behavior in the probability that a link points to an infected node, which develops a maximum at finite infection rates. In contrast, the overall prevalence remains a monotonically increasing function of the transmission rate. Additionally, the mitigation mechanism leads to an inversion in the dependence of epidemic observables on the degree exponent at sufficiently high transmission rates. While in the standard model smaller exponents yield higher endemic prevalence, in the modified model this trend reverses, with larger exponents producing higher prevalence and increased infection probability along network links.", "url": "https://arxiv.org/abs/2605.10644", "type": "理论+数值", "summary": "我们使用应用于易感者-感染者-易感者模型的异质平均场方法来研究传染病在无标度网络上的传播，并结合了缓解因素。个体异质性是通过幂律分布纳入的，而缓解因素则考虑了行为反应和外部影响，可有效减少受感染个体的传播。这种机制受 Malthus-Verhulst 型约束的启发，引入了非线性饱和效应，以易于处理的方式编码自限制动态。分析结果得到随机模拟的支持。我们发现，缓解因素会导致链接指向受感染节点的概率发生异常行为，该行为在有限的感染率下达到最大值。相反，总体患病率仍然是传播率的单调递增函数。此外，缓解机制导致流行病观测值对足够高的传播率下的程度指数的依赖性发生反转。\n\n虽然在标准模型中，较小的指数产生较高的地方流行率，但在修改后的模型中，这种趋势发生了逆转，较大的指数产生较高的流行率，并增加了沿网络链接的感染概率。", "authors": [{"name": "João Gabriel Simões Delboni"}, {"name": "M. O. Hase"}], "featured_authors": [{"name": "João Gabriel Simões Delboni"}, {"name": "M. O. Hase"}], "author_count": 2}, {"id": "2605.10703", "category": "cond-mat", "title": "Freestanding GdBa2Cu3O7 Thin Films via Optimized Buffer Layer Design: Preserving Superconducting Properties", "abstract": "Freestanding GdBa2Cu3O7 (GdBCO) superconducting thin films were fabricated using a water-soluble Sr3Al2O6 (SAO) sacrificial layer in combination with thermal release tape. An amorphous Al2O3 capping layer was introduced to suppress crack formation during the lift-off process. The influence of buffer-layer design inserted between the GdBCO and SAO layers was systematically investigated with respect to structural integrity and superconducting properties after lift-off. A LaAlO3/SrTiO3 bilayer buffer was found to be essential for maintaining epitaxial growth and a superconducting transition temperature (Tc) of approximately 92 K after lift-off, comparable to that of the as-grown films. In contrast, a reversed SrTiO3/LaAlO3 bilayer and single-layer buffer structures led to a suppression of Tc, highlighting the critical role of stacking sequence. These results demonstrate that optimization of the buffer-layer design is a key factor for realizing high-quality freestanding GdBCO films while maintaining their superconducting characteristics.", "url": "https://arxiv.org/abs/2605.10703", "type": "理论+数值", "summary": "使用水溶性 Sr3Al2O6 (SAO) 牺牲层与热剥离胶带结合制造独立式 GdBa2Cu3O7 (GdBCO) 超导薄膜。引入非晶 Al2O3 覆盖层以抑制剥离过程中裂纹的形成。系统地研究了插入 GdBCO 和 SAO 层之间的缓冲层设计对结构完整性和升空后超导性能的影响。人们发现 LaAlO3/SrTiO3 双层缓冲对于维持外延生长和剥离后约 92 K 的超导转变温度 (Tc) 至关重要，与生长的薄膜相当。相比之下，反向的 SrTiO3/LaAlO3 双层和单层缓冲结构导致 Tc 的抑制，凸显了堆叠顺序的关键作用。这些结果表明，缓冲层设计的优化是实现高质量独立式 GdBCO 薄膜同时保持其超导特性的关键因素。", "authors": [{"name": "Kazumasa Iida"}, {"name": "Kai Walter"}, {"name": "Takafumi Hatano"}, {"name": "Kose Morinaga"}, {"name": "Manuela Erbe"}, {"name": "Hongye Gao"}, {"name": "Satoshi Hata"}, {"name": "Jens Hänisch"}], "featured_authors": [{"name": "Kazumasa Iida"}, {"name": "Kai Walter"}, {"name": "Takafumi Hatano"}, {"name": "Hongye Gao"}, {"name": "Satoshi Hata"}, {"name": "Jens Hänisch"}], "author_count": 8}, {"id": "2605.10709", "category": "cond-mat", "title": "Optical selection rules in hexagonal Ge polytypes and their lifting by symmetry perturbation", "abstract": "Hexagonal germanium polytypes have emerged as promising direct-gap semiconductors for silicon-integrated optoelectronics, yet their optical properties remain largely unexplored beyond the well-studied 2H phase. We present a comprehensive theoretical study of optical properties of hexagonal 2H-, 4H-, and 6H-Ge polytypes through ab initio calculations of quasiparticle band structures, dipole transition matrix elements, and solution of the Bethe-Salpeter equation. While all three polytypes exhibit direct band gaps of increasing size from 2H to 6H, we reveal that the fundamental optical transition in 4H-Ge is parity-forbidden due to matching band parities at the valence and conduction band edges. This selection rule results in a radiative lifetime seven orders of magnitude longer than in 2H- and 6H-Ge, severely limiting light emission capabilities. To demonstrate that the selection rule can be lifted, we introduce controlled symmetry perturbations by substituting single Ge atoms with Si in each unit cell, breaking the crystal symmetry. This perturbation increases the optical matrix elements by up to two orders of magnitude and reduces radiative lifetimes for all perturbed polytypes. We also compute absorption coefficients and frequency-dependent dielectric tensors for both light polarizations, including excitonic effects up to 5 eV, providing complete optical characterization of ideal and symmetry-perturbed hexagonal Ge systems relevant for optoelectronic applications.", "url": "https://arxiv.org/abs/2605.10709", "type": "理论+数值", "summary": "六方锗多型体已成为用于硅集成光电子学的有前景的直接带隙半导体，但除了经过充分研究的 2H 相之外，其光学特性在很大程度上仍未得到探索。我们通过准粒子能带结构、偶极跃迁矩阵元素和 Bethe-Salpeter 方程的从头计算计算，对六方 2H-、4H- 和 6H-Ge 多型体的光学性质进行了全面的理论研究。虽然所有三种多型体都表现出从 2H 到 6H 尺寸不断增加的直接带隙，但我们揭示了 4H-Ge 中的基本光学跃迁由于价带和导带边缘处的带宇称匹配而受到奇偶校验禁止。这种选择规则导致辐射寿命比 2H-和 6H-Ge 长七个数量级，严重限制了光发射能力。为了证明可以解除选择规则，我们通过在每个晶胞中用 Si 取代单个 Ge 原子来引入受控对称性扰动，从而打破晶体对称性。这种扰动使光学矩阵元素增加了两个数量级，并减少了所有扰动多型体的辐射寿命。\n\n我们还计算两种光偏振的吸收系数和频率相关介电张量，包括高达 5 eV 的激子效应，提供与光电应用相关的理想和对称扰动六方 Ge 系统的完整光学表征。", "authors": [{"name": "Martin Keller"}, {"name": "Haichen Wang"}, {"name": "Friedhelm Bechstedt"}, {"name": "Jürgen Furthmüller"}, {"name": "Silvana Botti"}], "featured_authors": [{"name": "Martin Keller"}, {"name": "Haichen Wang"}, {"name": "Friedhelm Bechstedt"}, {"name": "Jürgen Furthmüller"}, {"name": "Silvana Botti"}], "author_count": 5}, {"id": "2605.10740", "category": "cond-mat", "title": "Anomalous and diode Josephson effect in junctions with inhomogeneous ferromagnetic barrier and interfacial Rashba spin-orbit coupling", "abstract": "We theoretically investigate the anomalous and diode Josephson effects in planar two-dimensional Josephson junctions with arbitrarily oriented exchange fields in two ferromagnets within the barrier, and spin-orbit coupling at the superconductor/ferromagnet interfaces, where the superconducting electrodes can have $s$-wave or arbitrarily oriented $d$-wave order parameter lobes. We perform a systematic symmetry analysis of the junction Hamiltonian and identify the minimal conditions for breaking time-reversal and space-inversion symmetries, which are required for the emergence of anomalous and diode Josephson effects. We classify the junctions into three classes, with particular attention to those between $d_{x^2-y^2}$ and $d_{xy}$ oriented superconductors. Our symmetry analysis is supported by numerical calculations of the current-phase relation (CPR) obtained using a generalized Furusaki-Tsukada (F-T) approach. By tuning the directions of exchange fields in the ferromagnets, Rashba SOC at the interfaces and superconducting order parameter orientations, nonreciprocity can be enhanced by more than 40\\%. We further analyze the phase-dependent Andreev bound states (ABS) spectrum and their contribution to charge transport, as well as their signatures in the nonreciprocal transport characteristics. By comparing the current carried by ABS with that obtained using the F-T technique, we find that the contribution from continuum states above the gap becomes pronounced in presence of zero energy crossings in the ABS spectrum, and in junctions with $d$-wave superconducting electrodes due to the narrower superconducting gap, which may become closed. In the nonreciprocal regime, the ABS spectra show an asymmetric profile with respect to phase inversion, indicating the presence of a finite current at zero phase difference and unequal critical currents in opposite directions.", "url": "https://arxiv.org/abs/2605.10740", "type": "理论+数值", "summary": "我们从理论上研究了势垒内两个铁磁体中具有任意定向交换场的平面二维约瑟夫森结中的反常和二极管约瑟夫森效应，以及超导体/铁磁体界面处的自旋轨道耦合，其中超导电极可以具有 $s$ 波或任意方向的 $d$ 波阶次参数波瓣。我们对结哈密顿量进行了系统的对称性分析，并确定了打破时间反转和空间反转对称性的最小条件，这是出现反常效应和二极​​管约瑟夫森效应所必需的。我们将结分为三类，特别注意 $d_{x^2-y^2}$ 和 $d_{xy}$ 取向超导体之间的结。我们的对称性分析得到了使用广义 Furusaki-Tsukada (F-T) 方法获得的电流相位关系 (CPR) 数值计算的支持。通过调整铁磁体中交换场的方向、界面处的 Rashba SOC 和超导有序参数方向，非互易性可以增强 40% 以上。\n\n我们进一步分析了相依赖的安德烈夫束缚态（ABS）谱及其对电荷传输的贡献，以及它们在非互易传输特性中的特征。通过将 ABS 承载的电流与使用 F-T 技术获得的电流进行比较，我们发现，在 ABS 谱中存在零能量交叉的情况下，间隙上方连续态的贡献变得明显，并且由于超导间隙较窄，因此在与 $d$ 波超导电极的结点中，超导间隙可能会闭合。在非互易状态下，ABS 谱显示出相对于相位反转的不对称轮廓，表明在零相位差处存在有限电流，并且在相反方向上存在不相等的临界电流。", "authors": [{"name": "Stevan Djurdjević"}, {"name": "Zorica Popović"}], "featured_authors": [{"name": "Stevan Djurdjević"}, {"name": "Zorica Popović"}], "author_count": 2}, {"id": "2605.10746", "category": "cond-mat", "title": "Lyapunov Exponents as Duality-Invariant Signatures of Critical States", "abstract": "Critical eigenstates are usually identified through wave-function geometry in a chosen basis, such as participation ratios, multifractal spectra, or finite-size scaling. Here we formulate criticality instead as a dual-space Lyapunov property. We prove a Fourier exclusion principle: exponential localization in one representation is incompatible with exponential localization in its Fourier-dual representation. This turns the Liu--Xia condition, \\(\\gamma_x(E)=\\gamma_m(E)=0\\), from a phenomenological criterion into a rigorous length-scale statement: a critical state is characterized by the simultaneous absence of exponential confinement in real and momentum space. The criterion is invariant under bounded local gauge transformations of the transfer matrix and remains compatible with conventional single-space multifractal diagnostics. More importantly, it is exactly predictive. In analytically tractable quasiperiodic models, the same condition yields closed-form critical lines, an exact finite critical region with an additional critical branch, and a complex critical surface in a non-Hermitian non-self-dual spectrum. Thus the Liu--Xia condition provides not only a diagnostic of critical states, but an exact solvability principle for locating critical sets across distinct microscopic structures.", "url": "https://arxiv.org/abs/2605.10746", "type": "理论+数值", "summary": "临界本征态通常通过选定基础上的波函数几何来识别，例如参与比、多重分形谱或有限尺寸缩放。在这里，我们将临界性表述为双空间李雅普诺夫性质。我们证明了傅里叶不相容原理：一种表示中的指数定位与其傅里叶对偶表示中的指数定位不兼容。这将刘夏条件\\(\\gamma_x(E)=\\gamma_m(E)=0\\)从现象学标准转变为严格的长度尺度陈述：临界状态的特征是实空间和动量空间中同时不存在指数限制。该准则在传递矩阵的有界局部规范变换下保持不变，并且与传统的单空间多重分形诊断保持兼容。更重要的是，它具有准确的预测性。在分析上易于处理的准周期模型中，相同的条件产生封闭形式的临界线、具有附加临界分支的精确有限临界区域以及非厄米非自对偶谱中的复杂临界表面。\n\n因此，刘夏条件不仅提供了临界状态的诊断，而且提供了在不同微观结构中定位临界集的精确可解性原理。", "authors": [{"name": "Tong Liu"}, {"name": "Gao Xianlong"}], "featured_authors": [{"name": "Tong Liu"}, {"name": "Gao Xianlong"}], "author_count": 2}, {"id": "2605.10747", "category": "cond-mat", "title": "Theory of Spin-splitter Magnetoresistance in Altermagnets", "abstract": "We develop a theory of angle-dependent magnetoresistance (ADMR) in metallic altermagnets coupled to ferromagnetic insulators and establish criteria that distinguish them from conventional compensated magnets with spin-orbit coupling. We show that the spin-splitter magnetoresistance (SSMR) reported by H. Chen et al. [Adv. Mater. 37, 2507764 (2025)] constitutes a smoking-gun signature of collinear altermagnetism in metallic systems. In contrast to spin-Hall magnetoresistance (SMR), SSMR exhibits three key distinctions: it depends solely on the relative orientation between the ferromagnetic magnetization and the altermagnetic Néel vector, yields a longitudinal ADMR response of opposite sign, and features a direct proportionality between longitudinal and transverse ADMR signals, absent in SMR. These results provide a clear route to unambiguously identify altermagnets in transport.", "url": "https://arxiv.org/abs/2605.10747", "type": "理论", "summary": "我们开发了与铁磁绝缘体耦合的金属交替磁体中的角度相关磁阻（ADMR）理论，并建立了将其与具有自旋轨道耦合的传统补偿磁体区分开来的标准。我们展示了 H. Chen 等人报道的自旋分裂磁阻 (SSMR)。 [高级。马特。 37, 2507764 (2025)]构成了金属系统中共线交变磁性的确凿证据。与自旋霍尔磁阻 (SMR) 相比，SSMR 表现出三个关键区别：它仅取决于铁磁磁化强度和交磁 Néel 矢量之间的相对方向，产生相反符号的纵向 ADMR 响应，并具有纵向和横向 ADMR 信号之间的直接比例关系，这是 SMR 中不存在的。这些结果为明确识别运输中的交变磁体提供了一条清晰的途径。", "authors": [{"name": "Tim Kokkeler"}, {"name": "Vitaly N. Golovach"}, {"name": "F. Sebastian Bergeret"}], "featured_authors": [{"name": "Tim Kokkeler"}, {"name": "Vitaly N. Golovach"}, {"name": "F. Sebastian Bergeret"}], "author_count": 3}, {"id": "2605.08294", "category": "hep-th", "title": "Completely asymptotically free chiral theories with scalars", "abstract": "We provide the conditions for complete asymptotic freedom for chiral gauge theories including scalars, as motivated by grand unified models. These are generalised Georgi-Glashow and Bars-Yankielowicz theories that feature a scalar field transforming either in the fundamental or in the adjoint of the gauge group. In both scenarios, we consider the addition of multiple chiral fermion families. We systematically analyse the interplay between gauge, Yukawa, and quartic couplings required for all interactions to remain asymptotically free at short distances. We find that for both scalar representations, complete asymptotic free models can be obtained for a specific number of colours and multiplicity of vector-like and chiral families.", "url": "https://arxiv.org/abs/2605.08294", "type": "理论", "summary": "在大统一模型的推动下，我们为包括标量在内的手性规范理论提供了完全渐近自由的条件。这些是广义的 Georgi-Glashow 和 Bars-Yankielowicz 理论，其特点是标量场在规范组的基频或伴随中进行变换。在这两种情况下，我们都考虑添加多个手性费米子家族。我们系统地分析了规范耦合、汤川耦合和四次耦合之间的相互作用，这些耦合是所有相互作用在短距离内保持渐近自由所需的。我们发现，对于两种标量表示，对于特定数量的颜色以及类向量和手性族的多重性，可以获得完整的渐近自由模型。", "authors": [{"name": "Giacomo Cacciapaglia"}, {"name": "Francesco Sannino"}, {"name": "Sophie Wagner"}], "featured_authors": [{"name": "Giacomo Cacciapaglia"}, {"name": "Francesco Sannino"}, {"name": "Sophie Wagner"}], "author_count": 3}, {"id": "2605.08335", "category": "hep-th", "title": "Inner Horizon Saddles and a Spectral KSW Criterion", "abstract": "The Bekenstein-Hawking entropy formula $\\rho = e^{A/4G}$ receives significant corrections for charged black holes near extremality. Using standard results in JT gravity, the correction term can semiclassically be expressed as minus the exponential of the inner horizon area, $e^{A_{\\text{inner}}/4G}$, and the cancellation between these two exponentials enforces a vanishing density of states towards extremality, when the two horizons collide. Building on arXiv:2402.10162 , we argue that the correction term corresponds to a complex saddle geometry of the bulk gravitational path integral. The proposed geometry has a negative boundary length and caps off at the inner horizon; we refer to it as the inner horizon saddle. We discuss how the saddle, and its accompanying minus sign, contribute to the density of states through a Picard-Lefschetz analysis of the inverse Laplace contour, together with a stability analysis of the saddle. We also address the inner horizon saddle's violation of the Kontsevich-Segal-Witten (KSW) allowability criterion for the inclusion of complex metrics. Despite this violation, which is believed to cause unphysical divergences in path integral computations, one can describe one-loop effects on the inner horizon saddle by carefully treating wrong-sign modes. Motivated by this observation, we propose a weaker version of the KSW criterion, which we call the spectral KSW criterion. Its purpose is to characterize when one-loop corrections around complex gravitational saddles are well defined.", "url": "https://arxiv.org/abs/2605.08335", "type": "理论", "summary": "贝肯斯坦-霍金熵公式 $\\rho = e^{A/4G}$ 对极值附近的带电黑洞进行了重大修正。使用 JT 引力中的标准结果，校正项可以半经典地表示为减去内部视界面积的指数 $e^{A_{\\text{inner}}/4G}$，并且当两个视界碰撞时，这两个指数之间的抵消会强制状态密度趋于极值消失。在 arXiv:2402.10162 的基础上，我们认为修正项对应于整体引力路径积分的复杂鞍形几何形状。所提出的几何形状具有负边界长度并在内地平线处封闭；我们将其称为内地平线鞍座。我们通过逆拉普拉斯轮廓的 Picard-Lefschetz 分析以及鞍座的稳定性分析来讨论鞍座及其伴随的负号如何对态密度做出贡献。我们还解决了内部地平线鞍违反 Kontsevich-Segal-Witten (KSW) 包含复杂指标的允许标准的问题。\n\n尽管这种违反被认为会导致路径积分计算中的非物理发散，但我们可以通过仔细处理错误符号模式来描述内部地平线鞍上的单环效应。受此观察的启发，我们提出了 KSW 准则的较弱版本，我们将其称为谱 KSW 准则。其目的是描述复杂引力鞍周围的单环修正何时被明确定义。", "authors": [{"name": "Jacqueline Caminiti"}, {"name": "Aidan Herderschee"}], "featured_authors": [{"name": "Jacqueline Caminiti"}, {"name": "Aidan Herderschee"}], "author_count": 2}, {"id": "2605.08339", "category": "hep-th", "title": "Charge Transport in Magnetized Holographic $\\mathcal{M}$-QGP", "abstract": "We investigate DC transport in a top-down construction of thermal QGP-like theories using a holographic M-theoretic background, incorporating quartic curvature corrections. The DC and Hall conductivities are computed from the Dirac-Born-Infeld (DBI) action of the corresponding type-IIA probe D6 flavor branes via the reality condition method proposed in arXiv:0708.1994 and arXiv:0705.3870 . We further analyze pair-production contributions in the presence and absence of an external magnetic field and work out regimes where pair production dominates over charge carrier transport. These findings extend earlier AdS/CFT results to non-conformal, higher-derivative settings relevant to thermal QGP-like theories.", "url": "https://arxiv.org/abs/2605.08339", "type": "理论", "summary": "我们使用全息 M 理论背景，结合四次曲率校正，研究自上而下构建的热 QGP 类理论中的直流输运。 DC 和霍尔电导率是通过 arXiv:0708.1994 和 arXiv:0705.3870 中提出的现实条件方法根据相应的 IIA 型探针 D6 风味膜的 Dirac-Born-Infeld (DBI) 作用计算得出的。我们进一步分析了在存在和不存在外部磁场的情况下对产生的贡献，并找出了对产生主导电荷载流子传输的机制。这些发现将早期的 AdS/CFT 结果扩展到与热 QGP 类理论相关的非保形、高导数设置。", "authors": [{"name": "Shivam Singh Kushwah"}], "featured_authors": [{"name": "Shivam Singh Kushwah"}], "author_count": 1}, {"id": "2605.08347", "category": "hep-th", "title": "Entanglement islands, fuzzballs and stretched horizons", "abstract": "We study the implementation of the island prescription in fuzzball-inspired models of black holes. As a simplified setup, we model a fuzzball by replacing the event horizon with a reflecting boundary (stretched horizon). In the framework of two-dimensional model with such boundary, we analyze the dynamics of entanglement entropy. We find that the presence of the boundary modifies the behavior of the island saddle, and for a range of parameter values we observe the effect of blinking island found in arXiv:2311.16244 which inevitably leads to the analogue of information paradox. We then extend the analysis to higher dimensions, incorporating both bulk and boundary contributions to the generalized entropy. The existence of island solutions is found to depend sensitively on the boundary conditions and the position of the stretched horizon, naturally leading to the absence of entanglement islands for a wide range of parameters. Finally, we consider more \"realistic\" stringy fuzzball geometries, including superstrata and bubbling solutions, and estimate whether island solutions can arise in these backgrounds. The results indicate that the existence of islands depends on the behavior of the geometric area near the cap, and is not guaranteed in general.", "url": "https://arxiv.org/abs/2605.08347", "type": "理论", "summary": "我们研究了岛处方在模糊球启发的黑洞模型中的实施。作为简化的设置，我们通过用反射边界（拉伸视界）替换事件视界来建模模糊球。在具有这种边界的二维模型的框架下，我们分析了纠缠熵的动力学。我们发现边界的存在改变了岛鞍的行为，并且对于一系列参数值，我们观察到 arXiv:2311.16244 中发现的闪烁岛的影响，这不可避免地导致信息悖论的模拟。然后，我们将分析扩展到更高的维度，结合体和边界对广义熵的贡献。研究发现岛解的存在敏感地依赖于边界条件和拉伸视界的位置，自然导致大范围参数不存在纠缠岛。最后，我们考虑更“现实”的线状毛球几何形状，包括上层和冒泡解决方案，并估计在这些背景下是否会出现岛屿解决方案。\n\n结果表明，岛屿的存在取决于盖附近几何区域的行为，并且通常不能保证。", "authors": [{"name": "Dmitry S. Ageev"}, {"name": "Anastasia N. Zueva"}], "featured_authors": [{"name": "Dmitry S. Ageev"}, {"name": "Anastasia N. Zueva"}], "author_count": 2}, {"id": "2605.08822", "category": "hep-th", "title": "Bogomol'nyi Equations in Mixed Product Chern-Simons Theories Governing Charged Vortices and Antivortices", "abstract": "We extend product Chern-Simons theory to develop several mixed $U(1)\\times U(1)$ models where one gauge field is governed by a Chern-Simons term and the other by a Maxwell or Born-Infeld term. We show that, by choosing suitable potentials, the energy functional admits a topological lower bound saturated by first-order self-dual equations. The resulting dyonic systems can be divided into vortex-vortex and vortex-antivortex configurations, and the coexistence of vortices and antivortices in the latter extends the vortex-only result known in product Chern-Simons model. On a doubly periodic domain, we establish Bradlow-type bounds with distinct physical implications: for vortex-only systems, the vortex numbers stay below this bound and cannot be arbitrarily large; for vortex-antivortex systems, the bound is imposed on the difference between the vortex and antivortex numbers, while the individual numbers are arbitrary. This distinction results in a bounded energy spectrum for the former and an unbounded energy spectrum for the latter.", "url": "https://arxiv.org/abs/2605.08822", "type": "理论", "summary": "我们扩展了乘积 Chern-Simons 理论，开发了几种混合 $U(1)\\times U(1)$ 模型，其中一个规范场由 Chern-Simons 项控制，另一个由 Maxwell 或 Born-Infeld 项控制。我们证明，通过选择合适的势，能量泛函允许一阶自对偶方程饱和的拓扑下界。由此产生的动力系统可以分为涡旋-涡旋和涡旋-反涡旋配置，后者中涡旋和反涡旋的共存扩展了积陈-西蒙斯模型中已知的仅涡旋结果。在双周期域上，我们建立了具有不同物理含义的 Bradlow 型界限：对于仅涡旋系统，涡旋数保持在该界限以下并且不能任意大；对于涡旋-反涡旋系统，涡旋数和反涡旋数之间的差异受到限制，而各个数字是任意的。这种区别导致前者为有界能谱，而后者为无界能谱。", "authors": [{"name": "Aonan Xu"}], "featured_authors": [{"name": "Aonan Xu"}], "author_count": 1}, {"id": "2605.09612", "category": "hep-th", "title": "Non-Abelian monopoles in modified gravity", "abstract": "Within modified gravity, we study static spherically and axially symmetric self-gravitating non-Abelian monopoles in $SU(2)$ Yang-Mills-Higgs theory. By comparing these monopoles with those obtained in Einstein-Yang-Mills-Higgs theory, we identify the differences introduced by the modification of gravity and show that they can be quite significant for systems with strong Higgs self-coupling.", "url": "https://arxiv.org/abs/2605.09612", "type": "理论", "summary": "在修正引力中，我们研究 $SU(2)$ Yang-Mills-Higgs 理论中的静态球对称和轴对称自引力非阿贝尔单极子。通过将这些单极子与爱因斯坦-杨-米尔斯-希格斯理论中获得的单极子进行比较，我们确定了由引力修正引起的差异，并表明它们对于具有强希格斯自耦合的系统来说可能非常重要。", "authors": [{"name": "Vladimir Dzhunushaliev"}, {"name": "Vladimir Folomeev"}], "featured_authors": [{"name": "Vladimir Dzhunushaliev"}, {"name": "Vladimir Folomeev"}], "author_count": 2}, {"id": "2605.09736", "category": "hep-th", "title": "Taming the infrared in de Sitter space: autonomous equations, stochastic approach, and Borel resummation", "abstract": "We investigate the divergent perturbative series of correlation functions for a massless, self-interacting scalar field in de Sitter space. First, we use our previously proposed method of autonomous equations to obtain finite time-dependent functions, and show that these functions approximate the time evolution of the correlation functions of the stochastic theory reasonably well. Second, we apply the technique of autonomous equations to the Borel-Le Roy transforms of correlation functions, and use solutions of these equations to perform Borel resummation. The results match the time evolution obtained in the stochastic picture substantially better. In addition, we propose an alternative method for extracting perturbative coefficients and provide a new derivation of our autonomous equation by truncating a system of Schwinger-Dyson-type differential equations.", "url": "https://arxiv.org/abs/2605.09736", "type": "理论", "summary": "我们研究了德西特空间中无质量、自相互作用标量场的相关函数的发散微扰级数。首先，我们使用之前提出的自治方程方法来获得有限的时间相关函数，并表明这些函数相当好地近似随机理论相关函数的时间演化。其次，我们将自治方程技术应用于相关函数的 Borel-Le Roy 变换，并使用这些方程的解来执行 Borel 恢复。结果与随机图像中获得的时间演化吻合得更好。此外，我们提出了一种提取扰动系数的替代方法，并通过截断施温格-戴森型微分方程组来提供我们的自治方程的新推导。", "authors": [{"name": "Alexander Kamenshchik"}, {"name": "Polina Petriakova"}, {"name": "Tereza Vardanyan"}], "featured_authors": [{"name": "Alexander Kamenshchik"}, {"name": "Polina Petriakova"}, {"name": "Tereza Vardanyan"}], "author_count": 3}, {"id": "2605.09804", "category": "hep-th", "title": "Joint distributions of eigenvectors of symmetric random tensors", "abstract": "We compute the joint distributions of arbitrary numbers of eigenvectors of real and complex symmetric random tensors by the quantum field theoretical methods which were previously used to compute the mean distributions. We obtain the random matrix representations and the large-dimension asymptotics of the joint distributions. The latter can be expressed by a common function of tensor geometries, extending the universality found for the mean distributions to the joint distributions. Several crosschecks of our results are carried out by Monte Carlo computations.", "url": "https://arxiv.org/abs/2605.09804", "type": "理论", "summary": "我们通过先前用于计算平均分布的量子场论方法来计算实数和复数对称随机张量的任意数量的特征向量的联合分布。我们获得了随机矩阵表示和联合分布的大维渐近。后者可以用张量几何的公共函数来表示，将平均分布的普遍性扩展到联合分布。通过蒙特卡罗计算对我们的结果进行了多次交叉检查。", "authors": [{"name": "Naoki Sasakura"}], "featured_authors": [{"name": "Naoki Sasakura"}], "author_count": 1}, {"id": "2605.09868", "category": "hep-th", "title": "Double fibration in G-theory and the cobordism conjecture", "abstract": "We investigate Type IIB compactifications with spatially varying fluxes and dilaton profiles in the setting of dynamical cobordism. In particular, we analyze a G-theory motivated compactification in which the fluxes and the dilaton depend on coordinates of a complex two-dimensional plane. From the equations of motion, we deduce the existence of End of the World branes. In a cohomological interpretation, these branes appear precisely in order to trivialize the relevant cohomology class. Furthermore, we compute the associated bordism group and show that additional non-perturbative objects are needed to cancel the class, while retaining the cohomological contribution as a subgroup. This suggests a mathematical structure that connects energy scales with the emergence of perturbative and non-perturbative physics.", "url": "https://arxiv.org/abs/2605.09868", "type": "理论", "summary": "我们研究了动态共棱设置中具有空间变化通量和膨胀剖面的 IIB 型致密化。特别是，我们分析了 G 理论驱动的紧化，其中通量和膨胀取决于复杂二维平面的坐标。从运动方程，我们推断出世界末日膜的存在。在上同调解释中，这些膜的出现正是为了淡化相关的上同调类。此外，我们计算了相关的边函数群，并表明需要额外的非微扰对象来取消该类，同时保留上同调贡献作为子群。这提出了一种将能量尺度与微扰和非微扰物理学的出现联系起来的数学结构。", "authors": [{"name": "Cesar Damian"}, {"name": "Oscar Loaiza-Brito"}, {"name": "Víctor M. López-Ramos"}], "featured_authors": [{"name": "Cesar Damian"}, {"name": "Oscar Loaiza-Brito"}, {"name": "Víctor M. López-Ramos"}], "author_count": 3}, {"id": "2605.09947", "category": "hep-th", "title": "The Free Particle--Oscillator--Inverted Oscillator Triangle: Conformal Bridges, Metaplectic Rotations and $\\mathfrak{osp}(1|2)$ Structure", "abstract": "We study the free particle (FP), the harmonic oscillator (HO) and the inverted harmonic oscillator (IHO) as parabolic, elliptic and hyperbolic realizations of one conformal/metaplectic structure, naturally extended to the superconformal algebra $\\mathfrak{osp}(1|2)$. Since the corresponding self-adjoint Hamiltonians have different spectra, the relations between them are not ordinary unitary equivalences. They are instead bridge transformations between different realizations of the same conformal module. We show that the zero-energy Jordan states of the FP are mapped to HO bound states and to the two IHO Gamow families, while FP plane waves are mapped to HO coherent states and, after light-cone Mellin decomposition, to the IHO scattering data. The direct FP--IHO bridge is a real metaplectic quarter-rotation, in contrast with the stationary FP--HO conformal bridge, which is nonunitary in the Schrödinger representation but becomes unitary as a change of polarization to the Fock--Bargmann representation. The IHO transmission and reflection amplitudes are obtained as Fourier--Mellin connection coefficients, equivalently as Weber/Stokes connection data. We also describe the hyperbolic Cayley--Niederer map for the time-dependent Schrödinger equation, the Wigner/separatrix picture, and the coherent-state and Bogoliubov-transformation aspects of the construction. Some physical applications of the hyperbolic sector are briefly discussed, including quantum Hall saddle scattering, Schwinger-type production, Rindler/Unruh and near-horizon Hawking settings, and Berry--Keating/inverse-square structures.", "url": "https://arxiv.org/abs/2605.09947", "type": "理论", "summary": "我们研究自由粒子（FP）、谐振子（HO）和倒谐振子（IHO）作为一种共形/超触结构的抛物线、椭圆和双曲实现，自然地扩展到超共形代数 $\\mathfrak{osp}(1|2)$。由于相应的自伴哈密顿量具有不同的谱，因此它们之间的关系不是普通的酉等价关系。相反，它们是同一共形模块的不同实现之间的桥梁转换。我们证明了 FP 的零能量乔丹态被映射到 HO 束缚态和两个 IHO 伽莫夫族，而 FP 平面波被映射到 HO 相干态，并在光锥 Mellin 分解后映射到 IHO 散射数据。直接 FP--IHO 电桥是真正的超折叠四分之一旋转，与固定 FP--HO 共形电桥相反，固定 FP--HO 保形电桥在薛定谔表示中是非酉的，但随着极化变化到 Fock-Bargmann 表示而变得酉。 IHO 透射和反射幅度以傅立叶-梅林连接系数的形式获得，相当于韦伯/斯托克斯连接数据。\n\n我们还描述了瞬态薛定谔方程的双曲凯莱-尼德勒图、维格纳/分面图以及构造的相干态和博戈柳波夫变换方面。简要讨论了双曲扇区的一些物理应用，包括量子霍尔鞍散射、施温格型产生式、Rindler/Unruh 和近地平线霍金设置以及 Berry-Keating/反平方结构。", "authors": [{"name": "Andrey Alcala"}, {"name": "Mikhail S. Plyushchay"}], "featured_authors": [{"name": "Andrey Alcala"}, {"name": "Mikhail S. Plyushchay"}], "author_count": 2}, {"id": "2605.10232", "category": "hep-th", "title": "Bulk-Edge Correspondence via Higher Gauge Theory", "abstract": "More profound than bulk topological order of quantum materials is only its unwinding via gapless excitations along boundaries of the sample. We recast this bulk-edge correspondence -- for the experimentally relevant case of fractional quantum Hall (FQH) systems -- in terms of effective relative higher gauge theory, controlled by choices of classifying fibrations. For FQH systems, we identify the complex Hopf fibration as classifying the bulk/boundary topological effects, and find that it yields a non-Lagrangian reconstruction of Floreanini-Jackiw/Wess-Zumino-Witten chiral edge currents. Remarkably, the resulting effective FQH higher gauge theory turns out to be \"geometrically engineered\" on M2/M5-branes probing A-type orbi-singularities in 11D supergravity, globally completed by flux-quantization in twisted equivariant differential (TED) Cohomotopy: Here the M-string ends of M2-branes on M5-branes engineer the FQH liquid's boundary. This geometric engineering on M-branes might naturally elucidate the curious combination of $W_\\infty$-symmetry and of super-symmetry that is known to govern the collective excitations of FQH liquids at long wavelengths.", "url": "https://arxiv.org/abs/2605.10232", "type": "理论", "summary": "比量子材料的体拓扑序更深刻的是它通过沿样品边界的无间隙激发而展开。我们根据有效的相对较高规范理论，通过分类纤维的选择来控制，针对分数量子霍尔（FQH）系统的实验相关情况，重新构建了这种体边缘对应关系。对于 FQH 系统，我们将复杂的 Hopf 纤维识别为对体/边界拓扑效应进行分类，并发现它产生 Floreanini-Jackiw/Wess-Zumino-Witten 手性边缘电流的非拉格朗日重建。值得注意的是，由此产生的有效 FQH 高规范理论被证明是在 M2/M5 膜上“几何设计”的，探测 11 维超重力中的 A 型轨道奇点，通过扭曲等变微分 (TED) 同伦性中的通量量子化全局完成：这里，M5 膜上 M2 膜的 M 弦末端设计了 FQH 液体的边界。 M 膜上的这种几何工程可能自然地阐明 $W_\\infty$ 对称性和超对称性的奇怪组合，这种组合已知控制 FQH 液体在长波长下的集体激发。", "authors": [{"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "featured_authors": [{"name": "Hisham Sati"}, {"name": "Urs Schreiber"}], "author_count": 2}, {"id": "2605.10416", "category": "hep-th", "title": "Infrared spectra of some strongly--coupled chiral gauge theories", "abstract": "Several simple asymptotically-free chiral gauge theories are studied. The only ``free parameters'' of our models are the choice of the gauge group and the matter Weyl fermion representations, and the relative magnitudes of the renormalization-group-invariant scales $\\Lambda_i$ associated with each gauge group. None of our models has nontrivial nonabelian global symmetries (``family''--like fermion representations). We rely on some recent theoretical developments on the dynamics of strongly--coupled chiral gauge theories, based on the generalized symmetries and associated new types of anomaly-matching consideration, but also on the solid knowledge on vectorlike gauge theories such as QCD and supersymmetric Yang-Mills theories. The structures of the infrared effective theories, the RG flows, and the light spectra found in these models are surprisingly rich and intriguing.", "url": "https://arxiv.org/abs/2605.10416", "type": "理论", "summary": "研究了几种简单的渐近自由手性规范理论。我们模型中唯一的“自由参数”是规范组和物质 Weyl 费米子表示的选择，以及与每个规范组相关的重正化组不变尺度 $\\Lambda_i$ 的相对大小。我们的模型都不具有非平凡的非阿贝尔全局对称性（“家族”——如费米子表示）。我们依赖于强耦合手性规范理论动力学的一些最新理论发展，基于广义对称性和相关的新型异常匹配考虑，而且还依赖于矢量规范理论（例如 QCD 和超对称杨-米尔斯理论）的扎实知识。这些模型中发现的红外有效理论、RG 流和光谱的结构非常丰富且有趣。", "authors": [{"name": "Stefano Bolognesi"}, {"name": "Kenichi Konishi"}, {"name": "Matteo Orso"}], "featured_authors": [{"name": "Stefano Bolognesi"}, {"name": "Kenichi Konishi"}, {"name": "Matteo Orso"}], "author_count": 3}, {"id": "2605.10548", "category": "hep-th", "title": "Birth of Inflationary Universes via Wineglass Wormholes and their No-Boundary Relatives", "abstract": "We study Euclidean wineglass wormholes, which mediate the nucleation of inflationary spacetimes from an existing spacetime with asymptotically flat or Anti-de Sitter regions. These wormholes are distinguished by the presence of a local maximum of the scale factor, which allows the analytically continued Lorentzian spacetime to expand after materialization. We present explicit numerical wormhole solutions supported either by an axionic field or a magnetic gauge field, in both cases in conjunction with a self-interacting scalar field. More exotic solutions, with multiple extrema of the scale factor, are also described. As we discovered recently, in the limit of small axionic or magnetic charge, wineglass wormhole solutions split into two separate geometries, one being the background spacetime and the other a disconnected no-boundary instanton. We study the associated topology changing transition in detail and provide an extensive discussion of both the properties and puzzles exhibited by this common family of wineglass/no-boundary instantons.", "url": "https://arxiv.org/abs/2605.10548", "type": "理论", "summary": "我们研究欧几里得酒杯虫洞，它介导从具有渐近平坦或反德西特区域的现有时空中暴胀时空的成核。这些虫洞的特点是存在比例因子的局部最大值，这使得分析上连续的洛伦兹时空在物化后能够扩展。我们提出了由轴子场或磁规范场支持的显式数值虫洞解，在这两种情况下都与自相互作用标量场相结合。还描述了具有比例因子的多个极值的更奇特的解决方案。正如我们最近发现的，在小轴子或磁荷的限制下，酒杯虫洞解分裂成两个独立的几何形状，一个是背景时空，另一个是断开的无边界瞬时子。我们详细研究了相关的拓扑变化转变，并对这种常见的酒杯/无边界瞬时子家族所表现出的属性和难题进行了广泛的讨论。", "authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "featured_authors": [{"name": "George Lavrelashvili"}, {"name": "Jean-Luc Lehners"}], "author_count": 2}, {"id": "2605.10662", "category": "hep-th", "title": "On the Casimir effect with mixed dynamical edge mode and perfect electromagnetic conducting boundary conditions", "abstract": "We study the Casimir effect for a parallel plate setup with one plate with dynamical edge mode (DEM) boundary conditions, and one plate with perfect electromagnetic conductor (PEMC) boundary conditions. In order to restore BRST invariance, new edge fields are introduced on the DEM plate. We then lift the boundary conditions into the action using Lagrange multiplier fields, and integrate out the bulk fields to obtain a non-local effective boundary theory from which we compute the Casimir energy. The resulting Casimir force is identical to a PMC-PEMC setup, implying that, from the point of view of the Casimir effect, a DEM plate is equivalent to a PMC plate. We also include a detailed derivation of the general functional method used to compute the Casimir energy from the partition function.", "url": "https://arxiv.org/abs/2605.10662", "type": "理论", "summary": "我们研究平行板设置的卡西米尔效应，其中一块板具有动态边缘模式 (DEM) 边界条件，另一块板具有完美电磁导体 (PEMC) 边界条件。为了恢复 BRST 不变性，在 DEM 板上引入了新的边缘场。然后，我们使用拉格朗日乘子场将边界条件提升到作用中，并对体场进行积分以获得非局部有效边界理论，从中计算卡西米尔能量。产生的卡西米尔力与 PMC-PEMC 设置相同，这意味着从卡西米尔效应的角度来看，DEM 板相当于 PMC 板。我们还包括用于从配分函数计算卡西米尔能量的通用函数方法的详细推导。", "authors": [{"name": "Jarne Devroe"}, {"name": "David Dudal"}, {"name": "Sebbe Stouten"}], "featured_authors": [{"name": "Jarne Devroe"}, {"name": "David Dudal"}, {"name": "Sebbe Stouten"}], "author_count": 3}, {"id": "2605.10720", "category": "hep-th", "title": "Regularized Master-Field Approximation for Large-$N$ Reduced Matrix Models", "abstract": "We propose a numerical method based on the master field for large-$N$ reduced matrix models. While the master field is originally an infinite-dimensional matrix, in this method it is regularized to a finite dimension, with the requirement that it satisfies the loop equations as much as possible. This formulation can be directly implemented for numerical computation, and since there is no sign problem at the fundamental level, the method can be applied regardless of whether the model is of Euclidean or Minkowski type. In numerical calculations for one- and two-matrix models, the exact solution is well reproduced in the Euclidean case, while perturbative results are well reproduced in the Minkowski case. This demonstrates the effectiveness of the method and supports the idea that the matrix models studied in this paper admit a regularized master-field description.", "url": "https://arxiv.org/abs/2605.10720", "type": "理论", "summary": "我们提出了一种基于大$N$简化矩阵模型主域的数值方法。虽然主域原本是一个无限维矩阵，但在该方法中，它被正则化为有限维，并要求它尽可能满足循环方程。该公式可以直接用于数值计算，并且由于在基本层面上不存在符号问题，因此无论模型是欧几里德型还是明可夫斯基型，都可以应用该方法。在一矩阵和二矩阵模型的数值计算中，在欧几里得情况下可以很好地再现精确解，而在闵可夫斯基情况下可以很好地再现微扰结果。这证明了该方法的有效性，并支持了本文研究的矩阵模型接受正则化主域描述的观点。", "authors": [{"name": "Reishi Maeta"}], "featured_authors": [{"name": "Reishi Maeta"}], "author_count": 1}, {"id": "2605.10735", "category": "hep-th", "title": "Axion-Scalar Dynamics: from the Distance Conjecture to Cosmic Acceleration", "abstract": "We discuss the cosmology of axion-scalar systems in asymptotic limits of type IIB/F-theory flux compactifications. These results allow us to test a putative extension of the Distance Conjecture in a dynamical setting, which posits that towers of states should become exponentially light in the distance measured along the trajectory (as well as in the geodesic one). In the case of infinite distance limits, we review a known classification of late-time asymptotic solutions, which always verify the extension of the conjecture whenever all relevant effects are taken into account. We also extend the analysis to the case of finite distance limits, where the analogous statement would require trajectories approaching the singularity to have a finite length. Surprisingly, we find this is not the case for the class of models under consideration. Moreover, the new solutions we find exhibit asymptotic accelerated expansion when approaching the boundary of moduli space.", "url": "https://arxiv.org/abs/2605.10735", "type": "理论", "summary": "我们讨论了 IIB/F 型理论通量紧致化渐近极限下的轴子标量系统的宇宙学。这些结果使我们能够在动态环境中测试距离猜想的推定扩展，该假设假设状态塔在沿着轨迹（以及测地线）测量的距离中应该呈指数级变轻。在无限距离限制的情况下，我们回顾了晚期渐近解的已知分类，只要考虑到所有相关影响，它总是验证猜想的扩展。我们还将分析扩展到有限距离限制的情况，其中类似的陈述需要接近奇点的轨迹具有有限的长度。令人惊讶的是，我们发现所考虑的模型类别并非如此。此外，我们发现的新解在接近模空间边界时表现出渐近加速膨胀。", "authors": [{"name": "Filippo Revello"}], "featured_authors": [{"name": "Filippo Revello"}], "author_count": 1}, {"id": "2605.10786", "category": "hep-th", "title": "Krylov state complexity for BMN matrix model", "abstract": "We explore Krylov complexity in the BMN matrix model following a systematic reduction of it, known as the pulsating fuzzy sphere model. We present an analytical setup that allows us to calculate Lanczos coefficients in both large and small deformation limits of the matrix model.", "url": "https://arxiv.org/abs/2605.10786", "type": "理论", "summary": "我们在系统化简化 BMN 矩阵模型（称为脉动模糊球模型）后探索了 BMN 矩阵模型中的 Krylov 复杂性。我们提出了一种分析设置，使我们能够在矩阵模型的大变形限制和小变形限制下计算 Lanczos 系数。", "authors": [{"name": "Dibakar Roychowdhury"}], "featured_authors": [{"name": "Dibakar Roychowdhury"}], "author_count": 1}, {"id": "2605.10902", "category": "hep-th", "title": "Parafermionizing the Monster", "abstract": "We study the parafermionization of the Monster CFT with respect to its $\\mathbb{Z}_{pA}$ subgroups, with $p$ an odd prime. Under certain assumptions, we show that the parafermionization is equal to a non-invertible gauging of $\\mathcal{P}(p) \\times \\mathcal{P}(p)^\\vee$, where $\\mathcal{P}(p)$ is the theory of $\\mathbb{Z}_p$-parafermions and $\\mathcal{P}(p)^\\vee$ is an appropriate dual theory, with global symmetry characterized by the centralizer of $\\mathbb{Z}_{pA}$. By tracking the symmetries of $\\mathcal{P}(p) \\times \\mathcal{P}(p)^\\vee$ through the non-invertible gauging, we argue that the diagonal Monster CFT has $\\mathrm{Rep}(\\mathfrak{so}(3)_p) \\boxtimes \\mathrm{Rep}(\\mathfrak{so}(3)_p)^\\mathrm{op}$ symmetry, and hence that the holomorphic Monster theory has symmetry $\\mathrm{Rep}(\\mathfrak{so}(3)_p)$. We then compute the defect McKay-Thompson series associated to these symmetries, and prove that their invariance subgroups are $\\Gamma_1(p+2)$.", "url": "https://arxiv.org/abs/2605.10902", "type": "理论", "summary": "我们研究了 Monster CFT 相对于 $\\mathbb{Z}_{pA}$ 子群的准费米化，其中 $p$ 是奇素数。在某些假设下，我们表明，顺费米子化等于 $\\mathcal{P}(p) \\times \\mathcal{P}(p)^\\vee$ 的不可逆计量，其中 $\\mathcal{P}(p)$ 是 $\\mathbb{Z}_p$-顺费米子理论，$\\mathcal{P}(p)^\\vee$ 是适当的对偶理论，全局以 $\\mathbb{Z}_{pA}$ 的中心化器为特征的对称性。通过不可逆测量跟踪 $\\mathcal{P}(p) \\times \\mathcal{P}(p)^\\vee$ 的对称性，我们认为对角 Monster CFT 有 $\\mathrm{Rep}(\\mathfrak{so}(3)_p) \\boxtimes \\mathrm{Rep}(\\mathfrak{so}(3)_p)^\\mathrm{op}$对称性，因此全纯 Monster 理论具有对称性 $\\mathrm{Rep}(\\mathfrak{so}(3)_p)$。然后，我们计算与这些对称性相关的缺陷 McKay-Thompson 级数，并证明它们的不变性子群为 $\\Gamma_1(p+2)$。", "authors": [{"name": "Yamato Honda"}, {"name": "Justin Kaidi"}, {"name": "Ippo Orii"}], "featured_authors": [{"name": "Yamato Honda"}, {"name": "Justin Kaidi"}, {"name": "Ippo Orii"}], "author_count": 3}, {"id": "2605.08372", "category": "math-ph", "title": "Dispersive decay bounds for the SSH model on the half-line", "abstract": "We study the Schrödinger flow for the SSH model, a class of self-adjoint discrete dimer lattice Hamiltonians on the half-line. Using oscillatory integral techniques, we prove dispersive time-decay estimates, which quantify the spreading of energy throughout the lattice for a localized initial condition. Furthermore, we determine precise dependence of the constants in the decay rates on the parameters of the Hamiltonian. The analysis is complicated by the fact that as a consequence of the boundary condition, the expression for the propagator contains oscillatory integrals with nonintegrable singularities.", "url": "https://arxiv.org/abs/2605.08372", "type": "理论", "summary": "我们研究 SSH 模型的薛定谔流，这是半线上的一类自伴离散二聚体晶格哈密顿量。使用振荡积分技术，我们证明了色散时间衰减估计，它量化了局部初始条件下整个晶格的能量扩散。此外，我们确定了衰减率常数对哈密顿量参数的精确依赖性。由于边界条件的原因，传播器的表达式包含具有不可积奇点的振荡积分，因此分析变得复杂。", "authors": [{"name": "Remy Kassem"}, {"name": "Amir Sagiv"}, {"name": "Michael I. Weinstein"}], "featured_authors": [{"name": "Remy Kassem"}, {"name": "Amir Sagiv"}, {"name": "Michael I. Weinstein"}], "author_count": 3}, {"id": "2605.08481", "category": "math-ph", "title": "A mathematical study of periodic band inversion", "abstract": "We give a mathematical analysis of the periodic band inversion phenomenon observed by Tan--Devakul for an electron in a two-dimensional periodic potential coupled to a circularly polarized photon cavity mode. In the strong-coupling limit, we derive an effective Bloch Hamiltonian and prove convergence of the low-lying bands. For a cosine potential, we explain the periodic closing and reopening of the first spectral gap, prove the existence and generic persistence of Dirac cones at the gap-closing points, and compute the Chern numbers associated to isolated band clusters. We also show that higher isolated band clusters cannot persist in the small-coupling regime. Finally, we resolve an apparent sign discrepancy between Berry curvature computations and Chern numbers by tracking the descent from the covering space to the Brillouin torus.", "url": "https://arxiv.org/abs/2605.08481", "type": "理论", "summary": "我们对 Tan-Devakul 观察到的电子在二维周期势与圆偏振光子腔模式耦合时的周期性能带反转现象进行了数学分析。在强耦合极限下，我们推导了有效的布洛赫哈密顿量并证明了低能带的收敛性。对于余弦势，我们解释了第一个光谱间隙的周期性关闭和重新打开，证明狄拉克锥在间隙关闭点的存在和一般持久性，并计算与孤立带簇相关的陈数。我们还表明，较高的孤立带簇不能在小耦合状态下持续存在。最后，我们通过跟踪从覆盖空间到布里渊环面的下降来解决贝里曲率计算和陈数之间的明显符号差异。", "authors": [{"name": "Tyler Guo"}, {"name": "Maciej Zworski"}], "featured_authors": [{"name": "Tyler Guo"}, {"name": "Maciej Zworski"}], "author_count": 2}, {"id": "2605.08652", "category": "math-ph", "title": "Quantum Relative Entropy and the Mean-Field Limit", "abstract": "We develop a quantum relative entropy method for the mean-field limit of quantum many-body systems. For closed systems governed by the von Neumann equation, we prove a quantitative stability estimate between the $N$-body density matrix and the tensorized solution of the Hartree equation. The argument is based on an entropy production identity, a cancellation mechanism for the centered two-body fluctuation, and a combinatorial estimate controlling the remaining mixed moments. As a consequence, we obtain propagation of chaos in trace norm for fixed marginals. We further combine the entropy estimate with known semiclassical Wasserstein bounds to derive a convergence estimate that is uniform in the Planck constant in an appropriate joint mean-field and semiclassical regime. Finally, we extend the method to finite-dimensional open quantum systems governed by Lindblad dynamics. In this setting, we establish an analogous relative entropy estimate for general bounded two-body interactions, where the mean-field potential is defined through partial trace. This shows that the entropy method does not rely on any special tensor-product decomposition of the interaction.", "url": "https://arxiv.org/abs/2605.08652", "type": "理论", "summary": "我们开发了一种用于量子多体系统平均场极限的量子相对熵方法。对于由冯诺依曼方程控制的封闭系统，我们证明了 $N$ 体密度矩阵和 Hartree 方程张量解之间的定量稳定性估计。该论证基于熵产生恒等式、中心二体涨落的抵消机制以及控制剩余混合矩的组合估计。因此，我们获得了固定边际的迹范数中的混沌传播。我们进一步将熵估计与已知的半经典 Wasserstein 边界相结合，以得出在适当的联合平均场和半经典体系中普朗克常数一致的收敛估计。最后，我们将该方法扩展到由 Lindblad 动力学控制的有限维开放量子系统。在这种情况下，我们为一般有界二体相互作用建立了类似的相对熵估计，其中平均场势通过部分迹来定义。这表明熵方法不依赖于任何特殊的相互作用的张量积分解。", "authors": [{"name": "Gaoyue Guo"}, {"name": "Hao Liang"}, {"name": "Zhenfu Wang"}], "featured_authors": [{"name": "Gaoyue Guo"}, {"name": "Hao Liang"}, {"name": "Zhenfu Wang"}], "author_count": 3}, {"id": "2605.08867", "category": "math-ph", "title": "Picard-Lefschetz theory and alien calculus: a case study", "abstract": "We compare Picard--Lefschetz theory and resurgence in three basic one-dimensional exponential integrals: the Airy model, the Bessel model, and the Gamma model. On the Picard--Lefschetz side, we describe the Lefschetz thimbles and compute the connecting trajectories between critical points appearing at Stokes phases. On the resurgent side, we analyze the Borel singularities of the saddle expansions and use alien operators to recover the same Stokes coefficients. These examples serve as explicit finite-dimensional test cases for the dictionary between thimble wall-crossing and alien calculus.", "url": "https://arxiv.org/abs/2605.08867", "type": "理论", "summary": "我们比较了 Picard--Lefschetz 理论和三个基本一维指数积分的复兴：Airy 模型、Bessel 模型和 Gamma 模型。在皮卡德-莱夫谢茨方面，我们描述了莱夫谢茨顶针并计算了斯托克斯阶段出现的临界点之间的连接轨迹。在复兴方面，我们分析了鞍展开式的 Borel 奇点，并使用外来算子来恢复相同的斯托克斯系数。这些例子作为顶针穿墙和外星演算之间字典的显式有限维测试用例。", "authors": [{"name": "Si Li"}, {"name": "Yong Li"}, {"name": "Xinxing Tang"}], "featured_authors": [{"name": "Si Li"}, {"name": "Yong Li"}, {"name": "Xinxing Tang"}], "author_count": 3}, {"id": "2605.09062", "category": "math-ph", "title": "Scaling Symmetries and Conformal Relative Equilibria on Poisson Manifolds, with Applications to Lie--Poisson Systems", "abstract": "We investigate conformal relative equilibria for Hamiltonian systems on exact Poisson manifolds equipped with scaling symmetries. By introducing conformally Poisson actions and conformal momentum maps, we characterize these equilibria through an augmented Hamiltonian formulation; in the nondegenerate case, this recovers the conditions recently developed for the exact symplectic case. Specializing to Lie--Poisson manifolds, where the natural scaling action canonically provides an exact Poisson structure on the dual of any finite-dimensional Lie algebra, we establish a purely algebraic criterion: a homogeneous Hamiltonian system admits a nontrivial conformal relative equilibrium if and only if the underlying Lie algebra contains a hyperbolic element. This yields a complete classification in dimension three via the Bianchi classification. As a prominent application, we show that nontrivial conformal relative equilibria emerge in the dynamics on $\\mathfrak{so}(2,1)^*$, but are strictly obstructed for the classical free rigid body on $\\mathfrak{so}(3)^*$.", "url": "https://arxiv.org/abs/2605.09062", "type": "理论", "summary": "我们研究了具有标度对称性的精确泊松流形上哈密顿系统的共形相对平衡。通过引入共形泊松作用和共形动量图，我们通过增强的哈密顿公式来表征这些平衡；在非简并情况下，这恢复了最近为精确辛情况开发的条件。专门针对李-泊松流形，其中自然标度作用规范地在任何有限维李代数的对偶上提供精确的泊松结构，我们建立了一个纯代数准则：齐次哈密顿系统承认非平凡共形相对平衡当且仅当基础李代数包含双曲元素时。这通过比安奇分类产生了第三维度的完整分类。作为一个突出的应用，我们证明了非平凡的共形相对平衡出现在 $\\mathfrak{so}(2,1)^*$ 的动力学中，但对于 $\\mathfrak{so}(3)^*$ 上的经典自由刚体来说受到严格阻碍。", "authors": [{"name": "Manuele Santoprete"}], "featured_authors": [{"name": "Manuele Santoprete"}], "author_count": 1}, {"id": "2605.09122", "category": "math-ph", "title": "An exact spacetime polymer gas for finite-temperature $\\mathbb Z_N$ homological quantum code", "abstract": "We study finite-temperature $P$-form $\\mathbb Z_N$ homological codes via an exact finite-Trotter quantum-to-classical map to a $(d+1)$-dimensional spacetime model with electric and magnetic topological background charges. The resulting background-resolved partition functions admit an exact reformulation in terms of closed magnetic and electric defect polymers, with opposite-species interactions governed by linking phases. By bounding this complex polymer gas by positive same-species hard-core majorant gases, we obtain an explicit low-activity criterion under which all background-dependent partition functions are uniformly controlled and homologically nontrivial polymers are exponentially suppressed on the scale of the spacetime systole. We also derive an exact higher-form Kramers-Wannier duality exchanging electric and magnetic backgrounds, Wilson and 't Hooft operators, and $P$-form and $(d-P)$-form theories. Finally, for prime $N$, we identify an exact source-free gauge-theory specialization coupled to the plaquette random-cluster model, which imports sharp phase-transition results on special geometries into the spacetime framework.", "url": "https://arxiv.org/abs/2605.09122", "type": "理论", "summary": "我们通过精确的有限Trotter量子到经典映射到具有电和磁拓扑背景电荷的$(d+1)$维时空模型来研究有限温度$P$-形式$\\mathbb Z_N$同调码。由此产生的背景解析配分函数允许在闭合磁和电缺陷聚合物方面进行精确的重构，并具有由连接相控制的相反物种相互作用。通过将这种复杂的聚合物气体与正同种硬核主要气体结合，我们获得了一个明确的低活性标准，在该标准下，所有背景相关的配分函数都得到统一控制，并且同源非平凡聚合物在时空收缩尺度上受到指数抑制。我们还导出了精确的更高形式的 Kramers-Wannier 对偶性，交换电磁背景、Wilson 和 't Hooft 算子，以及 $P$ 形式和 $(d-P)$ 形式理论。最后，对于质数 $N$，我们确定了与 Plalette 随机簇模型耦合的精确无源规范理论专业化，该模型将特殊几何形状上的尖锐相变结果导入时空框架中。", "authors": [{"name": "Nafiz Ishtiaque"}, {"name": "Shanto Chakroborty"}], "featured_authors": [{"name": "Nafiz Ishtiaque"}, {"name": "Shanto Chakroborty"}], "author_count": 2}, {"id": "2605.09133", "category": "math-ph", "title": "On Conservative Statistical Riemann Surfaces", "abstract": "We establish a correspondence between information geometry and gauge theory. First, we define an important class of statistical manifolds, that is normalized and satisfies a conservation field equation. Second, we prove that for a conservative statistical structure on an orientable surface, the Chebyshev 1-form is constrained to be harmonic, and the traceless part of the Amari--Chentsov tensor descends to a holomorphic cubic differential. Then, we demonstrate that normalized conservative statistical structures are geometrically generated by solutions to the scalar Tzitzéica equation on Higgs bundles with general linear holonomy, generalizing the Labourie-Loftin correspondence. Finally, we prove that the moduli space of normalized conservative statistical structures on a closed orientable surface of genus at least 2 is completely parameterized by a holomorphic vector bundle over the Teichmüller space, consisting of Abelian differentials and cubic differentials.", "url": "https://arxiv.org/abs/2605.09133", "type": "理论", "summary": "我们建立了信息几何和规范理论之间的对应关系。首先，我们定义一类重要的统计流形，它是标准化的并且满足守恒场方程。其次，我们证明对于可定向表面上的保守统计结构，切比雪夫1-形式被约束为调和，并且Amari-Chentsov张量的无迹部分下降到全纯三次微分。然后，我们证明归一化保守统计结构是通过具有一般线性完整性的希格斯丛上标量 Tzitzéica 方程的解在几何上生成的，从而推广了 Labourie-Loftin 对应关系。最后，我们证明了至少 2 的闭可定向曲面上归一化保守统计结构的模空间完全由 Teichmüller 空间上的全纯向量丛参数化，该全纯向量丛由阿贝尔微分和三次微分组成。", "authors": [{"name": "Hanwen Liu"}], "featured_authors": [{"name": "Hanwen Liu"}], "author_count": 1}, {"id": "2605.09323", "category": "math-ph", "title": "A Bundle-Theoretic Formulation of Phonons in Crystalline Phases", "abstract": "Phonons are usually introduced by choosing a local displacement field. This paper keeps that local description, but identifies the global geometric object represented by it. The aim is not to change the local acoustic equations, but to describe the global configuration space of the translational order parameter on a fixed crystallographic background and to give a globally defined replacement for the displacement gradient. After the orientational part of the crystalline order has been fixed by a reduction of the orthonormal frame bundle to a discrete point group, the translational order parameter is described as a section of an associated torus bundle. In a symmorphic crystal the point group acts on the translation
