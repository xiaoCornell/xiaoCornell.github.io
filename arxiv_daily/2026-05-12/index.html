acts as an independent coherent charging channel, and the condition for a dynamical quantum phase transition (DQPT) is equivalent to perfect normalized charging of the critical mode. At the critical times, this mode has a vanishing Loschmidt amplitude, maximal normalized stored energy, and zero instantaneous power at the turning point between energy absorption and backflow. We further show that the single-mode charging signal-to-noise ratio (SNR) develops sharp signatures at the same critical times, providing a direct charging-based probe of DQPT. Thus, nonequilibrium criticality does not simply enhance the total stored energy or power, which remain shaped by noncritical modes, but reorganizes energy storage by selecting optimal microscopic charging channels. Our results establish a mode-resolved connection between DQPT and quantum-battery charging, suggesting a route toward controlling many-body energy storage through dynamical criticality.", "url": "https://arxiv.org/abs/2605.10637", "type": "理论+数值", "summary": "量子电池中的能量存储奇点通常与平衡量子临界性相关。在这里，我们表明，在失超驱动的多体电池中，这种奇点可能源于动量空间中的动态临界性。使用横向场伊辛链作为代表性的自由费米子量子电池，我们开发了充电过程的动量解析描述。当真正的动态临界动量出现时，长期储存的能量形成一个相移平台，其对淬火强度的依赖性变得不可解析。更一般地，对于自由费米子双带量子电池，每个动量扇区充当独立的相干充电通道，动态量子相变（DQPT）的条件相当于临界模式的完美归一化充电。在关键时刻，该模式具有消失的洛施密特振幅、最大归一化存储能量以及在能量吸收和回流之间的转折点处的瞬时功率为零。我们进一步表明，单模充电信噪比 (SNR) 在相同的关键时刻产生尖锐的特征，从而提供了基于直接充电的 DQPT 探针。\n\n因此，非平衡临界性并不简单地增强总存储能量或功率（其仍然由非临界模式决定），而是通过选择最佳微观充电通道来重新组织能量存储。我们的结果在 DQPT 和量子电池充电之间建立了模式解析的联系，提出了一条通过动态临界性控制多体能量存储的途径。", "authors": [{"name": "Zheng Liu"}, {"name": "Wen-Hui Nie"}, {"name": "Yi-jia Yang"}, {"name": "Lin-Cheng Wang"}, {"name": "Chang-shui Yu"}], "featured_authors": [{"name": "Zheng Liu"}, {"name": "Wen-Hui Nie"}, {"name": "Yi-jia Yang"}, {"name": "Lin-Cheng Wang"}, {"name": "Chang-shui Yu"}], "author_count": 5}, {"id": "2605.10657", "category": "quant-ph", "title": "Physical relevance of time-independent scattering predictions in periodic $\\mathcal{PT}$-symmetric chains", "abstract": "Time-independent scattering methods are widely used to analyze transport in periodic $\\mathcal{PT}$-symmetric systems. However, their predictions become unphysical when the system supports time-growing bound states (TGBSs), which manifest as $S$-matrix poles in the first quadrant of the complex wave-number plane. Here, we analytically delineate the region of physical relevance for a $\\mathcal{PT}$-symmetric chain of $N$ unit cells with gain/loss strength $\\gamma$. We derive the TGBS onset threshold $\\gamma_c = 2\\sin[\\pi/(4N)]$, which scales as $\\pi/(2N)$ for large $N$ and vanishes in the thermodynamic limit. Enlarging the structure thus enriches stationary scattering phenomenology but inevitably triggers TGBSs at weaker gain/loss. Time-dependent wave-packet simulations confirm this analytical boundary quantitatively. Applying this criterion, we show that many previously reported predictions of gain-loss-induced localization, reflectionless transport, and coherent perfect absorbers and lasers in large periodic structures fall outside the physically relevant regime. $S$-matrix pole analysis is therefore an indispensable prerequisite for interpreting time-independent scattering predictions in periodic non-Hermitian systems.", "url": "https://arxiv.org/abs/2605.10657", "type": "理论+数值", "summary": "与时间无关的散射方法广泛用于分析周期性 $\\mathcal{PT}$ 对称系统中的输运。然而，当系统支持时间增长束缚态（TGBS）时，他们的预测就变得不切实际了，它表现为复波数平面第一象限中的 $S$ 矩阵极点。在这里，我们分析性地描绘了具有增益/损失强度 $\\gamma$ 的 $N$ 单位单元的 $\\mathcal{PT}$ 对称链的物理相关性区域。我们推导出 TGBS 起始阈值 $\\gamma_c = 2\\sin[\\pi/(4N)]$，对于较大的 $N$，其缩放比例为 $\\pi/(2N)$，并在热力学极限中消失。扩大结构从而丰富了稳态散射现象，但不可避免地会在较弱的增益/损耗下触发 TGBS。瞬态波包模拟定量地证实了这一分析边界。应用这一标准，我们表明，许多先前报道的关于大型周期结构中增益损失引起的局域化、无反射传输以及相干完美吸收器和激光器的预测都超出了物理相关范围。\n\n因此，$S$-矩阵极点分析是解释周期性非厄米系统中与时间无关的散射预测不可或缺的先决条件。", "authors": [{"name": "Chao Zheng"}], "featured_authors": [{"name": "Chao Zheng"}], "author_count": 1}, {"id": "2605.10666", "category": "quant-ph", "title": "Decoded Quantum Interferometry for Weighted Optimization Problems", "abstract": "Decoded Quantum Interferometry (DQI) is a recently introduced quantum algorithm that reduces discrete optimization to decoding with potential advantages over the best known polynomial-time classical algorithms for certain Max-LINSAT problems. In its original formulation, however, DQI treats all constraints uniformly and cannot exploit the weight structure present in most optimization problems of interest. In this work, we develop a theory of DQI for weighted optimization problems, focusing on the weighted Max-LINSAT problem over a prime field. Grouping constraints into $N$ blocks by distinct weights, we introduce \\emph{multivariate DQI states} built from $N$-variable polynomials of bounded total degree, and derive a closed-form asymptotic expression for both their optimal expectation value and their concentration behavior. We give an explicit preparation circuit using a single decoder call, and extend the analysis to imperfect decoding. We also show that, for certain weighted OPI problems, multivariate DQI outperforms a natural weighted analogue of Prange's algorithm, which serves as the weighted counterpart of the classical benchmark used in the unweighted setting. Finally, we extend the ideas to Hamiltonian DQI, obtaining approximate Gibbs states for commuting Pauli Hamiltonians with block structure.", "url": "https://arxiv.org/abs/2605.10666", "type": "理论+数值", "summary": "解码量子干涉测量 (DQI) 是最近推出的一种量子算法，可将离散优化简化为解码，对于某些 Max-LINSAT 问题，它比最著名的多项式时间经典算法具有潜在优势。然而，在其原始公式中，DQI 统一处理所有约束，并且无法利用大多数感兴趣的优化问题中存在的权重结构。在这项工作中，我们开发了一种用于加权优化问题的 DQI 理论，重点关注素数域上的加权 Max-LINSAT 问题。通过不同的权重将约束分组为 $N$ 块，我们引入了由总次数有界 $N$ 变量多项式构建的 \\emph{多元 DQI 状态}，并推导出其最佳期望值和集中行为的封闭式渐近表达式。我们使用单个解码器调用给出显式准备电路，并将分析扩展到不完美解码。我们还表明，对于某些加权 OPI 问题，多元 DQI 优于 Prange 算法的自然加权类似物，后者是未加权设置中使用的经典基准的加权对应物。\n\n最后，我们将思想扩展到哈密顿量 DQI，获得用于具有块结构的泡利哈密顿量交换的近似吉布斯状态。", "authors": [{"name": "Kaifeng Bu"}, {"name": "Weichen Gu"}, {"name": "Xiang Li"}], "featured_authors": [{"name": "Kaifeng Bu"}, {"name": "Weichen Gu"}, {"name": "Xiang Li"}], "author_count": 3}, {"id": "2605.10682", "category": "quant-ph", "title": "On the Simulation Cost of Quantum Finite Automata", "abstract": "This paper identifies exact probabilistic simulation cost as the natural quantitative measure of quantum advantage for finite automata under strict cutpoints. It gives sharp simulation laws for two representative models. A one-way finite automaton with $c$ classical states and a $q$-dimensional quantum register has exact probabilistic simulation cost $\\Theta(cq^2)$, while an $n$-dimensional measure-once one-way quantum finite automaton has worst-case cost $\\Theta(n^2)$. The proofs develop a prepare--test framework, in which prefixes generate the relevant real operator degrees of freedom and suffixes convert them into strict-cutpoint tests. The same obstruction is recast through finite sign-rank matrices, clarifying the role of Forster's spectral method. Placed beside the surrounding two-way separations, these results give a clean hierarchy of finite-automata quantum advantage.", "url": "https://arxiv.org/abs/2605.10682", "type": "理论+数值", "summary": "本文将精确的概率模拟成本确定为严格切点下有限自动机量子优势的自然定量度量。它为两个代表性模型提供了清晰的模拟定律。具有 $c$ 经典状态和 $q$ 维量子寄存器的单向有限自动机具有精确的概率模拟成本 $\\Theta(cq^2)$，而 $n$ 维一次性测量单向量子有限自动机具有最坏情况成本 $\\Theta(n^2)$。证明开发了一个准备-测试框架，其中前缀生成相关的实际操作员自由度，后缀将它们转换为严格的切点测试。通过有限符号秩矩阵重新构建相同的障碍物，阐明了福斯特谱方法的作用。放置在周围的双向分离旁边，这些结果给出了有限自动机量子优势的清晰层次结构。", "authors": [{"name": "Zeyu Chen"}, {"name": "Junde Wu"}], "featured_authors": [{"name": "Zeyu Chen"}, {"name": "Junde Wu"}], "author_count": 2}, {"id": "2605.10710", "category": "quant-ph", "title": "Communication-Efficient Distributed Inverse Quantum Fourier Transform", "abstract": "The scalability of quantum computing is currently limited by physical, technological, and architectural constraints that hinder the integration of a large number of qubits within a single quantum processor. Distributed quantum computing (DQC) has therefore emerged as a viable alternative, aiming to interconnect multiple smaller quantum processing units (QPUs) to jointly operate on a global quantum state. While this paradigm enables scalable architectures, it introduces significant communication overhead due to the cost of non-local quantum operations across distant nodes. In this work we propose a distributed formulation of the iQFT over a quantum network composed of $P$ nodes, each hosting $Q$ qubits, enabling the execution on a logical register of size $n = P \\cdot Q$. Furthermore, we introduce a communication-efficient variant based on a threshold-driven pruning strategy, referred to as a \\emph{communication horizon}, which exploits the exponentially decreasing significance of controlled-phase rotations to safely omit remote gates with negligible impact. By reducing the number of inter-node quantum interactions, the proposed approach significantly lowers the quantum communication requirements of the distributed iQFT while preserving its functional correctness. Crucially, we show that this approach fundamentally alters the scaling of the algorithm: the entanglement resource consumption per node saturates to a constant value, reducing the global communication complexity from quadratic $\\mathcal{O}(P^2)$ to linear $\\mathcal{O}(P)$. As the iQFT constitutes a critical building block in many quantum algorithms, the techniques presented in this paper directly contribute to improving the practicality and scalability of distributed quantum computation.", "url": "https://arxiv.org/abs/2605.10710", "type": "理论+数值", "summary": "量子计算的可扩展性目前受到物理、技术和架构的限制，这些限制阻碍了在单个量子处理器中集成大量量子位。因此，分布式量子计算（DQC）成为一种可行的替代方案，旨在互连多个较小的量子处理单元（QPU）以在全局量子态上联合运行。虽然这种范例支持可扩展的架构，但由于跨远程节点的非本地量子操作的成本，它引入了巨大的通信开销。在这项工作中，我们提出了在由 $P$ 节点组成的量子网络上的 iQFT 分布式公式，每个节点托管 $Q$ 量子位，从而能够在大小为 $n = P \\cdot Q$ 的逻辑寄存器上执行。此外，我们引入了一种基于阈值驱动修剪策略的通信高效变体，称为\\emph{通信视野}，它利用受控相位旋转的指数递减重要性来安全地忽略远程门，而影响可以忽略不计。\n\n通过减少节点间量子交互的数量，所提出的方法显着降低了分布式 iQFT 的量子通信要求，同时保持其功能正确性。至关重要的是，我们表明这种方法从根本上改变了算法的扩展：每个节点的纠缠资源消耗饱和到一个恒定值，将全局通信复杂度从二次 $\\mathcal{O}(P^2)$ 降低到线性 $\\mathcal{O}(P)$。由于 iQFT 构成了许多量子算法的关键构建块，因此本文提出的技术直接有助于提高分布式量子计算的实用性和可扩展性。", "authors": [{"name": "F. Javier Cardama"}, {"name": "Jorge Vázquez-Pérez"}, {"name": "Tomás F. Pena"}, {"name": "Andrés Gómez"}], "featured_authors": [{"name": "F. Javier Cardama"}, {"name": "Jorge Vázquez-Pérez"}, {"name": "Tomás F. Pena"}, {"name": "Andrés Gómez"}], "author_count": 4}, {"id": "2605.10724", "category": "quant-ph", "title": "Selective Placement of Hollow-Core Fibers for QKD and Classical Communication Coexistence", "abstract": "We investigate the benefits of partially upgrading optical networks with hollow-core fibers for QKD-classical communication coexistence. Results show that upgrading 40% of links in a metro topology can reduce the number of quantum modules by up to 49%.", "url": "https://arxiv.org/abs/2605.10724", "type": "理论", "summary": "我们研究了使用空心光纤部分升级光网络以实现 QKD 与经典通信共存的好处。结果表明，升级城域拓扑中 40% 的链路可减少高达 49% 的量子模块数量。", "authors": [{"name": "Giovanni Simone Sticca"}, {"name": "Alessandro Gagliano"}, {"name": "Memedhe Ibrahimi"}, {"name": "Alberto Gatto"}, {"name": "Francesco Musumeci"}, {"name": "Massimo Tornatore"}], "featured_authors": [{"name": "Giovanni Simone Sticca"}, {"name": "Alessandro Gagliano"}, {"name": "Memedhe Ibrahimi"}, {"name": "Alberto Gatto"}, {"name": "Francesco Musumeci"}, {"name": "Massimo Tornatore"}], "author_count": 6}, {"id": "2605.10731", "category": "quant-ph", "title": "Squeezing Enhancement Through Resonant Interference in Multi-ring Resonators", "abstract": "We develop a non-perturbative description of squeezed light generation in an arbitrary lossy structure consisting of multiple coupled microring resonators. This is applied to two ring photonic molecules where the interference of the fields in the coupled rings leads to a modification in the resonance spectrum near a shared resonance. Considering a dual-pump degenerate squeezing scheme under a five resonance approximation, we investigate two methods to suppress parasitic four-wave mixing contributions and compensate for group velocity dispersion within a primary resonator through hybridization effects with a second auxiliary resonator. In the former case, this comes from an effective splitting of the unwanted resonances supporting parasitic four-wave mixing interactions that add thermal noise to the desired degenerate squeezed state. For sufficiently strong coupling between the resonators, we demonstrate near complete suppression of such parasitic processes, resulting in near unit fidelities with the corresponding output state that would arise were the parasitic interactions neglected. In the latter case, the hybridization effectively shifts a pump resonance, realigning the desired dual-pump four-wave mixing process and leading to a significant enhancement of the signal generation and output squeezing.", "url": "https://arxiv.org/abs/2605.10731", "type": "理论", "summary": "我们开发了由多个耦合微环谐振器组成的任意有损结构中压缩光生成的非微扰描述。这适用于两个环光子分子，其中耦合环中的场的干扰导致共享共振附近的共振谱发生变化。考虑五谐振近似下的双泵简并挤压方案，我们研究了两种方法来抑制寄生四波混频贡献，并通过与第二辅助谐振器的杂化效应补偿主谐振器内的群速度色散。在前一种情况下，这来自于对支持寄生四波混频相互作用的不需要的谐振的有效分裂，这种相互作用将热噪声添加到所需的简并压缩态中。对于谐振器之间足够强的耦合，我们证明了对此类寄生过程的近乎完全抑制，从而在忽略寄生相互作用的情况下产生相应输出状态的接近单位保真度。\n\n在后一种情况下，杂交有效地改变了泵浦共振，重新调整了所需的双泵四波混合过程，并导致信号生成和输出压缩的显着增强。", "authors": [{"name": "M. Sloan"}, {"name": "J. E. Sipe"}], "featured_authors": [{"name": "M. Sloan"}, {"name": "J. E. Sipe"}], "author_count": 2}, {"id": "2605.10768", "category": "quant-ph", "title": "Unitaria: Quantum Linear Algebra via Block Encodings", "abstract": "We introduce Unitaria, a Python library that brings the simplicity of classical linear algebra toolkits such as NumPy and SciPy to the implementation of quantum algorithms based on block encodings, a general-purpose abstraction in which a matrix is embedded as a sub-block of a larger unitary operator. Their implementation has so far required deep knowledge of low-level circuit construction, which Unitaria aims to eliminate. The library provides a composable, array-like interface through which users can define block encodings of matrices and vectors, combine them through standard operations such as addition, multiplication, tensor products, and the Quantum Singular Value Transformation, and extract the resulting quantum circuits automatically. A key feature is a matrix-arithmetic evaluation path in which every operation can be computed directly on encoded vectors and matrices without dependence on ancilla qubits or circuit simulation. This enables correctness verification and classical simulation that scale well beyond what state vector simulation permits and also allows resource estimation, including gate counts, qubit counts, and normalization constants, without executing any circuit. Together, these capabilities allow researchers to develop, verify, and analyze quantum linear algebra algorithms today, ahead of the availability of error-corrected hardware. Unitaria is open source and available at this https URL .", "url": "https://arxiv.org/abs/2605.10768", "type": "数值", "summary": "我们介绍了 Unitaria，一个 Python 库，它将 NumPy 和 SciPy 等经典线性代数工具包的简单性引入到基于块编码的量子算法的实现中，块编码是一种通用抽象，其中矩阵作为较大酉算子的子块嵌入其中。到目前为止，它们的实现需要对低级电路构造的深入了解，而 Unitaria 的目标是消除这种知识。该库提供了一个可组合的、类似数组的接口，用户可以通过该接口定义矩阵和向量的块编码，通过加法、乘法、张量积和量子奇异值变换等标准运算将它们组合起来，并自动提取生成的量子电路。一个关键功能是矩阵算术评估路径，其中每个运算都可以直接在编码向量和矩阵上计算，而不依赖于辅助量子位或电路模拟。\n\n这使得正确性验证和经典模拟的规模远远超出了状态向量模拟允许的范围，并且还允许资源估计，包括门计数、量子位计数和归一化常数，而无需执行任何电路。这些功能共同使研究人员能够在纠错硬件问世之前开发、验证和分析量子线性代数算法。 Unitaria 是开源的，可通过 https URL 获取。", "authors": [{"name": "Matthias Deiml"}, {"name": "Oliver Hüttenhofer"}, {"name": "Ram Mosco"}, {"name": "Jakob S. Kottmann"}, {"name": "Daniel Peterseim"}], "featured_authors": [{"name": "Matthias Deiml"}, {"name": "Oliver Hüttenhofer"}, {"name": "Ram Mosco"}, {"name": "Jakob S. Kottmann"}, {"name": "Daniel Peterseim"}], "author_count": 5}, {"id": "2605.10783", "category": "quant-ph", "title": "On the KAK Decomposition and Equivalence Classes", "abstract": "The KAK decomposition is a fundamental tool in Lie theory and quantum computing. Despite its widespread use, the mathematical foundations remain incomplete, particularly regarding the precise conditions for the decomposition and the characterization of equivalence classes under multiplication by elements of $K$. Here, we present a mathematical theory of the KAK decomposition for connected compact semisimple Lie groups and derive the decomposition for $\\mathrm{SU}(4)$. In particular, we clarify the relationship between various definitions of a Cartan decomposition in the literature and give a complete proof of a general KAK decomposition theorem. We then distinguish two distinct notions of KAK equivalence classes, double coset equivalence and projective equivalence, thereby addressing mathematical inconsistencies regarding KAK classification in the literature. Specifically, for $\\mathrm{SU}(4)$, we show that local equivalence classes under multiplication by $\\mathrm{SU}(2)\\otimes \\mathrm{SU}(2)$ are geometrically represented not by the usual \"Weyl chamber\" as claimed in the existing literature. Instead, the \"Weyl chamber\" is only recovered by the projective-local equivalence which disregards global phases. We develop a systematic theory for determining equivalence and uniqueness for both notions of equivalence. Our work establishes a rigorous Lie-theoretic foundation for the theory of quantum gates and circuits.", "url": "https://arxiv.org/abs/2605.10783", "type": "理论", "summary": "KAK 分解是李理论和量子计算中的基本工具。尽管它被广泛使用，但数学基础仍然不完整，特别是在与 $K$ 元素相乘下等价类的分解和表征的精确条件方面。在这里，我们提出了连通紧半单李群的 KAK 分解的数学理论，并推导了 $\\mathrm{SU}(4)$ 的分解。特别是，我们阐明了文献中嘉当分解的各种定义之间的关系，并给出了一般 KAK 分解定理的完整证明。然后，我们区分 KAK 等价类的两个不同概念，即双陪集等价和投影等价，从而解决文献中有关 KAK 分类的数学不一致问题。具体来说，对于 $\\mathrm{SU}(4)$，我们表明乘以 $\\mathrm{SU}(2)\\otimes \\mathrm{SU}(2)$ 的局部等价类在几何上不是由现有文献中声称的通常的“Weyl 室”来表示。\n\n相反，“韦尔室”只能通过忽略全局相位的投影局部等价来恢复。我们开发了一种系统理论来确定两种等价概念的等价性和唯一性。我们的工作为量子门和电路理论建立了严格的李理论基础。", "authors": [{"name": "Dawei Ding"}, {"name": "Yu Liu"}, {"name": "Zi-Wen Liu"}], "featured_authors": [{"name": "Dawei Ding"}, {"name": "Yu Liu"}, {"name": "Zi-Wen Liu"}], "author_count": 3}, {"id": "2605.10800", "category": "quant-ph", "title": "Holonomy and Complementarity in Open Quantum Systems", "abstract": "Complementarity relations constrain the distribution of coherence, predictability, and openness in quantum systems. Here we show that, in open quantum systems, these local constraints acquire a geometric interpretation through quasistatic transport. For a driven dissipative qubit, the complementarity variables define cylindrical coordinates on the Bloch sphere, while openness appears geometrically as a radial deficit associated with reduction from a larger Hilbert space. Quasistatic driving induces a work connection on the resulting steady-state manifold whose curvature determines the cyclic response. Hamiltonian-aligned dissipation produces an exact work connection and vanishing cyclic work, whereas fixed pointer-basis dissipation generates non-integrable transport, finite curvature, and holonomic response. The resulting curvature admits a phase-resolved representation on the triality manifold and develops perturbatively with pointer--Hamiltonian mismatch. In the weak-mismatch limit, the curvature is governed by a competition between coherence-preserving and pure-dephasing channels, producing symmetry-related positive- and negative-curvature sectors. These results establish a direct connection between complementarity, dissipation, and geometric thermodynamic response, and show that cyclic quasistatic work provides an operational probe of nonequilibrium quantum geometry.", "url": "https://arxiv.org/abs/2605.10800", "type": "理论+数值", "summary": "互补关系限制了量子系统中相干性、可预测性和开放性的分布。在这里，我们表明，在开放量子系统中，这些局部约束通过准静态传输获得几何解释。对于驱动耗散量子位，互补变量定义布洛赫球上的柱坐标，而开放性在几何上表现为与较大希尔伯特空间的减少相关的径向赤字。准静态驱动在所得稳态流形上产生工作连接，其曲率决定循环响应。哈密​​顿对齐耗散产生精确的功连接和消失的循环功，而固定指针基耗散产生不可积的输运、有限曲率和完整响应。由此产生的曲率允许三重流形上的相位分辨表示，并随着指针-哈密尔顿失配而微扰地发展。在弱失配极限下，曲率受相干性保持通道和纯相移通道之间的竞争控制，产生与对称性相关的正曲率扇区和负曲率扇区。\n\n这些结果在互补性、耗散和几何热力学响应之间建立了直接联系，并表明循环准静态工作提供了非平衡量子几何的操作探针。", "authors": [{"name": "Eric R Bittner"}], "featured_authors": [{"name": "Eric R Bittner"}], "author_count": 1}, {"id": "2605.10846", "category": "quant-ph", "title": "Exact steady states of interacting driven dissipative fermionic systems with hidden time-reversal symmetry", "abstract": "We present exact solutions for the non-equilibrium steady states of a class of dissipative spinless fermionic systems with arbitrary Hamiltonian pairing terms, global charging energy interactions, and uniform single particle loss on every site. Our exact solution is found by generalizing the coherent quantum absorber technique to fermionic systems, and our result establishes the existence of hidden time-reversal symmetry in driven-dissipative fermionic models. The steady state exhibits a first order phase transition in the particle density, with the resulting jump discontinuity in density persisting even for finite dissipation rates. A mean-field description of the model exhibits a bistable regime that encompasses the first-order transition line yet which fails to accurately predict its precise location via a Maxwell construction. We also show that the model's hidden time-reversal symmetry results in an Onsager symmetry of certain two-time correlation functions.", "url": "https://arxiv.org/abs/2605.10846", "type": "理论", "summary": "我们提出了一类耗散无旋费米子系统的非平衡稳态的精确解，该系统具有任意哈密顿配对项、全局充电能量相互作用以及每个位置上的均匀单粒子损失。我们的精确解决方案是通过将相干量子吸收器技术推广到费米子系统而找到的，并且我们的结果证实了驱动耗散费米子模型中隐藏的时间反转对称性的存在。稳态在粒子密度中表现出一级相变，即使对于有限的耗散率，密度中的跳跃不连续性仍然持续存在。该模型的平均场描述呈现出包含一阶过渡线的双稳态状态，但无法通过麦克斯韦结构准确预测其精确位置。我们还表明，模型隐藏的时间反转对称性导致某些两次相关函数的 Onsager 对称性。", "authors": [{"name": "Andrew Lingenfelter"}, {"name": "Aashish A. Clerk"}], "featured_authors": [{"name": "Andrew Lingenfelter"}, {"name": "Aashish A. Clerk"}], "author_count": 2}, {"id": "2605.10932", "category": "quant-ph", "title": "Crystallographic Symmetry Generates Phononic Holonomic Gates with Biased-Erasure Channels", "abstract": "Solid-state processors require control layers whose errors are legible to quantum-error-correction decoders. We show that crystallographic symmetry can provide such a layer in strain-active Lambda manifolds. When the projected strain tensor and Lambda-transition operators share a multiplicity-one two-dimensional irreducible representation, symmetry fixes the linear strain interaction to a scalar dot product. Two phase-locked mechanical modes synthesize a circular strain field, enabling complex phononic Lambda-leg control without local microwave near fields. On this manifold we construct a superadiabatic echo-lune holonomic gate using Lambda-leg control and a resonant double-quantum counterdiabatic tone. Rotating-frame simulations of a nitrogen-vacancy center give 99.88% conditional average fidelity in 1.833 microseconds, or 99.40% when leakage is counted as error. A resonant gigahertz high-overtone bulk acoustic resonator analysis translates the Hamiltonian into Rabi-rate, linewidth, and envelope-tracking requirements. The bright-state structure organizes noise: A2-sector perturbations are parity-filtered into an optically distinguishable auxiliary state, whereas transverse E-sector faults are echo suppressed and retained as a decoder stress axis. The extracted channel has 0.47% erasure probability and 0.168% residual Z error. In XZZX code-capacity simulations, this biased-erasure model yields a nominal 64% fit-extrapolated data-qubit reduction relative to an unstructured Rabi baseline. Repeated-round detector-model diagnostics preserve the nominal distance-9 proxy and identify missed erasures, transverse floors, leakage/flag timing, and strong crosstalk as validation limits. Extensions to orbital Lambda systems and bright-projector phonon-bus diagnostics identify crystallographic symmetry as a principle for co-designing phononic actuation, leakage, noise bias, and quantum decoding.", "url": "https://arxiv.org/abs/2605.10932", "type": "理论+数值", "summary": "固态处理器需要控制层，其错误可以被量子纠错解码器识别。我们证明晶体学对称性可以在应变活性 Lambda 流形中提供这样的层。当投影应变张量和 Lambda 转移算子共享多重一二维不可约表示时，对称性将线性应变相互作用固定为标量点积。两种锁相机械模式合成圆形应变场，无需局部微波近场即可实现复杂的声子 Lambda 腿控制。在此流形上，我们使用 Lambda 腿控制和谐振双量子反绝热音调构建了超绝热回波月形完整门。氮空位中心的旋转框架模拟在 1.833 微秒内给出了 99.88% 的条件平均保真度，或者当泄漏计为误差时为 99.40%。谐振千兆赫高泛音体声谐振器分析将哈密顿量转化为拉比速率、线宽和包络跟踪要求。\n\n亮态结构组织噪声：A2 扇区扰动被奇偶校验过滤成光学可区分的辅助状态，而横向 E 扇区故障被回声抑制并保留为解码器应力轴。提取的通道具有 0.47% 的擦除概率和 0.168% 的残余 Z 误差。在 XZZX 代码容量模拟中，这种偏置擦除模型相对于非结构化 Rabi 基线，名义上拟合外推数据量子位减少了 64%。重复循环检测器模型诊断保留标称距离 9 代理，并识别遗漏擦除、横向楼层、泄漏/标记定时和强串扰作为验证限制。轨道 Lambda 系统和明亮投影仪声子总线诊断的扩展将晶体学对称性确定为共同设计声子驱动、泄漏、噪声偏差和量子解码的原则。", "authors": [{"name": "El Mustapha Mansouri"}, {"name": "Keigo Arai"}], "featured_authors": [{"name": "El Mustapha Mansouri"}, {"name": "Keigo Arai"}], "author_count": 2}, {"id": "2605.10943", "category": "quant-ph", "title": "A passive self-correcting quantum memory in three dimensions", "abstract": "We construct a 3D Pauli stabilizer Hamiltonian whose ground state space can encode a qubit for exponential time when coupled to a bath at non-zero temperature. Our construction recursively applies a sequence of transformations to a seed Hamiltonian that increases the memory lifetime of the encoded qubit while maintaining geometric locality in $\\mathbb{R}^3$.", "url": "https://arxiv.org/abs/2605.10943", "type": "理论", "summary": "我们构造了一个 3D 泡利稳定器哈密顿量，当耦合到非零温度的浴时，其基态空间可以对指数时间的量子位进行编码。我们的构造递归地将一系列变换应用于种子哈密顿量，从而增加编码量子位的内存寿命，同时保持 $\\mathbb{R}^3$ 中的几何局部性。", "authors": [{"name": "Shankar Balasubramanian"}, {"name": "Margarita Davydova"}, {"name": "Ting-Chun Lin"}], "featured_authors": [{"name": "Shankar Balasubramanian"}, {"name": "Margarita Davydova"}, {"name": "Ting-Chun Lin"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
