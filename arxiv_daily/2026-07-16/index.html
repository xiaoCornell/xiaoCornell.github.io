"Jacques R. Eone"}], "author_count": 1}, {"id": "2607.13138", "category": "cond-mat", "title": "Half dualization and non-invertible particle-vortex duality defect on lattice", "abstract": "We introduce half dualization as a general principle to construct non-invertible duality defects. The construction performs a duality transformation only in a subregion of spacetime, leaving an interface between the original theory and its dual. A non-invertible duality defect can be hosted on this interface. Half dualization is applicable whenever a local duality transformation is available, and does not depend on the spacetime dimension. We demonstrate the construction procedure in the (2+1)-dimensional Villainized charge-$n$ XY model on a cubic lattice. Half dualization yields a non-invertible particle-vortex duality defect whose fusion with its orientation reverse produces a (1+1)-dimensional $\\mathbb{Z}_n$ gauge theory on the fusion surface. We then apply half dualization to the $\\mathbb{Z}_n$-gauged XY model relevant to the 3D XY$^\\ast$ transition. In the gauged model, the half dualization interface hosts a gauge covariant duality wall, rather than a genuine gauge invariant duality defect. It flows to an invertible duality defect in infrared when the $\\mathbb{Z}_n$ gauge theory is confined or Higgsed.", "url": "https://arxiv.org/abs/2607.13138", "type": "理论", "summary": "我们引入半对偶化作为构造不可逆对偶缺陷的一般原理。该构造仅在时空的子区域中进行对偶变换，在原始理论与其对偶之间留下界面。不可逆对偶缺陷可以托管在该接口上。只要局部对偶变换可用，半对偶化就适用，并且不依赖于时空维度。我们演示了立方晶格上 (2+1) 维 Villainized charge-$n$ XY 模型的构造过程。半对偶化产生不可逆的粒子涡对偶性缺陷，其与方向相反的融合在融合表面上产生 (1+1) 维 $\\mathbb{Z}_n$ 规范理论。然后，我们将半对偶化应用于与 3D XY$^\\ast$ 过渡相关的 $\\mathbb{Z}_n$ 测量 XY 模型。在规范模型中，半对偶化接口具有规范协变对偶壁，而不是真正的规范不变对偶缺陷。当 $\\mathbb{Z}_n$ 规范理论受到限制或 Higgsed 时，它会导致红外中的可逆对偶性缺陷。", "authors": [{"name": "Zhi-Qiang Gao"}], "featured_authors": [{"name": "Zhi-Qiang Gao"}], "author_count": 1}, {"id": "2607.13194", "category": "cond-mat", "title": "Zero-energy bound state trapped in line-shaped vortex in topological superconductor", "abstract": "Fermion bound states in the core of a line-shaped vortex of a two-dimensional topological superconductor are investigated. The superconducting pairing potential, described in terms of elliptical coordinates, vanishes along a line defect with the two foci at the endpoints. The superconductivity is induced into a topological insulator via proximity effect with a type II s-wave superconductor. The spin and the momentum are perpendicularly locked by the strong spin-orbit coupling via Rashba interaction. A zero-energy Majorana state arises from the Berry phase together with a sequence of equally spaced fermion exitations. By solving the Bogoliubov-de Gennes equations using the method employed by Caroli, de Gennes and Matricon we calculate the energies, the wave-functions and spin-polarization of the bound states. An analytic expression for the local density of states within the vortex is obtained.", "url": "https://arxiv.org/abs/2607.13194", "type": "理论", "summary": "研究了二维拓扑超导体线形涡旋核心的费米子束缚态。用椭圆坐标描述的超导配对电势沿线缺陷消失，两个焦点位于端点。通过 II 型 s 波超导体的邻近效应将超导性引入拓扑绝缘体中。自旋和动量通过 Rashba 相互作用被强自旋轨道耦合垂直锁定。零能量马约拉纳态由贝里相以及一系列等间隔的费米子激发产生。通过使用 Caroli、de Gennes 和 Matricon 采用的方法求解 Bogoliubov-de Gennes 方程，我们计算了束缚态的能量、波函数和自旋极化。获得了涡旋内局部态密度的解析表达式。", "authors": [{"name": "P. Schlottmann"}], "featured_authors": [{"name": "P. Schlottmann"}], "author_count": 1}, {"id": "2607.13213", "category": "cond-mat", "title": "Exact collective first-passage statistics of N trail-interacting walkers", "abstract": "Memory encoded in the environment mediates interactions between active agents, from trail-following organisms to synthetic active matter depositing persistent tracks. Although such memory is known to strongly affect transport, its consequences for collective first-passage phenomena remain largely unexplored. Here we study $N$ one-dimensional random walkers interacting through a shared trail field. We characterize the $k^{\\rm th}$ (among $N$) arrival time at a fixed target, and the probability that exactly $k$ walkers in $[0,1]$ reach one boundary before the other. For the broad class of self-interacting walkers with a saturating response to the trail, we derive exact expressions for the corresponding persistence exponents and splitting probabilities. Strikingly, despite the strong history-dependent correlations generated by the common environment, splitting probabilities are exactly identical whether walkers explore simultaneously or one after another. This invariance breaks down for nonsaturating trail interactions. Our results follow from an exact representation of the collective trail field and establish a framework for first-passage phenomena in systems coupled through persistent environmental memory.", "url": "https://arxiv.org/abs/2607.13213", "type": "理论", "summary": "环境中编码的记忆介导活性剂之间的相互作用，从跟踪生物体到沉积持久轨迹的合成活性物质。尽管众所周知，这种记忆会对运输产生强烈影响，但它对集体首次通过现象的影响在很大程度上仍未得到探索。在这里，我们研究 $N$ 一维随机游走者通过共享轨迹场进行交互。我们描述 $k^{\\rm th}$ （在 $N$ 中）到达固定目标的时间，以及 $[0,1]$ 中的 $k$ 步行者先于另一个边界到达另一个边界的概率。对于对路径有饱和响应的广泛的自交互步行者，我们推导出相应持久指数和分裂概率的精确表达式。引人注目的是，尽管共同环境产生了强烈的历史相关性，但无论步行者同时探索还是相继探索，分裂概率都是完全相同的。对于非饱和轨迹相互作用，这种不变性会被破坏。\n\n我们的结果来自于集体轨迹场的精确表示，并为通过持久环境记忆耦合的系统中的首次通过现象建立了框架。", "authors": [{"name": "Paul Pineau"}, {"name": "Julien Brémont"}, {"name": "Olivier Bénichou"}, {"name": "Raphaël Voituriez"}], "featured_authors": [{"name": "Paul Pineau"}, {"name": "Julien Brémont"}, {"name": "Olivier Bénichou"}, {"name": "Raphaël Voituriez"}], "author_count": 4}, {"id": "2607.13294", "category": "cond-mat", "title": "Electronic properties and topological aspects of graphene nanohelicoids", "abstract": "We introduce graphene nanohelicoids, geometric analogues of graphene nanoribbons, in which the honeycomb lattice is embedded on a helicoidal surface. Starting from the three-dimensional helical structure, we construct effective one-dimensional lattice models with band structures characterized by a momentum-shifted particle-hole relation $E_v(k)=-E_c(k+\\pi)$ that reflects an anti-chiral symmetry arising from the nonsymmorphic symmetry. A systematic investigation of graphene nanohelicoids using the tight-binding approximation reveals a number of trends upon varying width and edge orientation, for instance, alternating transitions between semiconducting and metallic regimes. As the structure width varies, the band gap periodically closes and reopens, accompanied by an alternating Zak phase that switches between trivial and nontrivial. We derive an analytic tight-binding model and introduce a continuous deformation of the graphene nanohelicoids that explains the origin of width-dependent band inversion and alternating Zak phase.", "url": "https://arxiv.org/abs/2607.13294", "type": "理论", "summary": "我们引入了石墨烯纳米螺旋，石墨烯纳米带的几何类似物，其中蜂窝晶格嵌入螺旋表面。从三维螺旋结构开始，我们构建了有效的一维晶格模型，其能带结构以动量位移粒子空穴关系 $E_v(k)=-E_c(k+\\pi)$ 为特征，反映了非对称对称性产生的反手性对称性。使用紧束缚近似对石墨烯纳米螺旋进行的系统研究揭示了不同宽度和边缘方向的许多趋势，例如半导体和金属状态之间的交替转变。随着结构宽度的变化，带隙周期性地关闭和重新打开，并伴随着在平凡和非平凡之间切换的交替 Zak 相。我们推导了一个解析紧束缚模型，并引入了石墨烯纳米螺旋的连续变形，这解释了宽度相关的能带反转和交替 Zak 相的起源。", "authors": [{"name": "Xiaoqian Liu"}, {"name": "Arsen Herasymchuk"}, {"name": "Yaroslav Zhumagulov"}, {"name": "Oleg V. Yazyev"}], "featured_authors": [{"name": "Xiaoqian Liu"}, {"name": "Arsen Herasymchuk"}, {"name": "Yaroslav Zhumagulov"}, {"name": "Oleg V. Yazyev"}], "author_count": 4}, {"id": "2607.13391", "category": "cond-mat", "title": "The nonequilibrium statistical mechanics of Markov interacting particles", "abstract": "We consider coupled stochastic systems decomposed into exterior, boundary, and interior variables, with the boundary variables sometimes carrying the directed structure of a sensor and actuator. The central question is when the conditional law of histories factorises, and how this path space statement is detected by log likelihoods, by Girsanov changes of measure, and by information theoretic quantities used in nonequilibrium statistical physics. The basic object is a regular conditional probability on a path space. Under domination by clamped reference laws, the boundary property becomes multiplicative separation of a Radon--Nikodym derivative, or equivalently additive separation of a path log likelihood. For Itō diffusions this log likelihood is computed by Girsanov's theorem; its expectation is the quadratic control energy appearing in the Föllmer entropy identity and in the stochastic control formulation of Schrödinger bridge problems. When exact factorisation fails, the remaining coupling is measured by conditional mutual information, namely the relative entropy between the true boundary-conditioned path law and the product of its conditional marginals. This gives a common language for boundary screening, path likelihood inference, controlled changes of path law, and the thermodynamic value of mutual information.", "url": "https://arxiv.org/abs/2607.13391", "type": "理论+数值", "summary": "我们考虑分解为外部变量、边界变量和内部变量的耦合随机系统，其中边界变量有时带有传感器和执行器的有向结构。核心问题是历史条件定律何时因式分解，以及如何通过对数似然、吉尔萨诺夫测度变化以及非平衡统计物理学中使用的信息论量来检测该路径空间陈述。基本对象是路径空间上的正则条件概率。在钳位参考定律的支配下，边界属性变成 Radon-Nikodym 导数的乘法分离，或者等效地路径对数似然的加法分离。对于 Itō 扩散，此对数似然由吉尔萨诺夫定理计算；它的期望是 Föllmer 熵恒等式和薛定谔桥问题的随机控制公式中出现的二次控制能量。当精确分解失败时，剩余的耦合通过条件互信息来测量，即真实边界条件路径定律与其条件边际乘积之间的相对熵。\n\n这为边界筛选、路径似然推断、路径定律的受控变化以及互信息的热力学值提供了通用语言。", "authors": [{"name": "Dalton A R Sakthivadivel"}], "featured_authors": [{"name": "Dalton A R Sakthivadivel"}], "author_count": 1}, {"id": "2607.13434", "category": "cond-mat", "title": "Hubbard-assisted stability of Hatsugai-Kohmoto correlations in a one-dimensional open chain", "abstract": "The Hatsugai-Kohmoto (HK) model has recently been identified as a fixed-point description of Mottness that is stable against perturbing local interactions. This raises a natural question beyond the weak-perturbation regime: how does a finite local repulsion modify HK physics in real-space observables and local spectra? We address this question in a half-filled one-dimensional spinful fermion chain, where the HK interaction is supplemented by an onsite Hubbard repulsion. Using exact diagonalization in an open chain, we compute ground-state correlation functions and site-resolved local spectra. We find that the Hubbard term does not drive the system away from the HK-dominated regime. Instead, at moderate $U_{\\rm HK}$, a finite $U_{\\rm Hub}$ promotes the emergence of behavior characteristic of the pure HK chain at larger $U_{\\rm HK}$. This Hubbard-assisted strong-HK response is reflected consistently in the development of positive spin correlations, the suppression of single-particle coherence, the impurity-induced redistribution of local spectral weight, and the evolution of pairing correlations. As a control perturbation, we replace the onsite Hubbard interaction by a nearest-neighbor (NN) density interaction. In contrast to the Hubbard case, the HK and NN interactions display competing tendencies and do not reproduce the same strong-HK behavior. These results provide a nonperturbative real-space complement to the fixed-point stability of HK physics and show that the effect of an additional repulsive interaction depends sensitively on its spatial structure.", "url": "https://arxiv.org/abs/2607.13434", "type": "理论+数值", "summary": "Hatsugai-Kohmoto (HK) 模型最近被认为是 Mottness 的定点描述，对于扰动局部相互作用是稳定的。这就提出了一个超越弱扰动机制的自然问题：有限的局部斥力如何改变实空间可观测值和局部光谱中的 HK 物理？我们在半填充的一维旋转费米子链中解决这个问题，其中 HK 相互作用由现场哈伯德排斥补充。使用开链中的精确对角化，我们计算基态相关函数和位点解析局部光谱。我们发现哈伯德术语并没有使该体系脱离香港主导的政权。相反，在适度的 $U_{\\rm HK}$ 下，有限的 $U_{\\rm Hub}$ 会促进纯 HK 链在较大的 $U_{\\rm HK}$ 下出现行为特征。这种哈伯德辅助的强 HK 响应始终反映在正自旋相关性的发展、单粒子相干性的抑制、杂质引起的局部光谱权重的重新分布以及配对相关性的演化中。\n\n作为控制扰动，我们用最近邻（NN）密度相互作用代替现场哈伯德相互作用。与哈伯德案例相反，HK 和 NN 的相互作用表现出竞争趋势，并且没有重现相同的强 HK 行为。这些结果为 HK 物理的定点稳定性提供了非微扰实空间补充，并表明附加排斥相互作用的效果敏感地取决于其空间结构。", "authors": [{"name": "Yan-Xiao Wang"}, {"name": "Yin Zhong"}], "featured_authors": [{"name": "Yan-Xiao Wang"}, {"name": "Yin Zhong"}], "author_count": 2}, {"id": "2607.13529", "category": "cond-mat", "title": "Hybridization-controlled re-entrant electronic phase switching and moire-confined states in twisted bilayer PtTe2", "abstract": "Twisting a van der Waals bilayer changes not only the moiré periodicity but also the local stacking and interlayer hybridization. Here, we show, using fully relaxed first-principles calculations including spin--orbit coupling, band unfolding, and Brillouin-zone-integrated densities of states, that bilayer PtTe$_2$ exhibits a non-monotonic evolution between gapless and gapped electronic regimes. The $7.34^\\circ$ structure remains gapless, whereas finite direct gaps appear at the sampled intermediate angles. The gap closes at the sampled $60^\\circ$ configuration and reopens at higher angles. The direct gap shows an overall increase with the minimum local interlayer Pt--Pt separation, although the complete distribution of local stacking environments is required to account for deviations from this trend. At $7.34^\\circ$, the low-energy states are concentrated predominantly in the AA-like regions of the otherwise gapless moiré cell. Controlled interlayer-separation scans show that increasing the layer spacing removes the near-$E_F$ crossings and opens a gap, consistent with weakened interlayer Te-$p_z$ hybridization. These results identify the redistribution of interlayer hybridization as the microscopic origin of the re-entrant gap evolution in twisted bilayer PtTe$_2$.", "url": "https://arxiv.org/abs/2607.13529", "type": "数值", "summary": "扭转范德华双层不仅会改变莫尔条纹的周期性，还会改变局部堆叠和层间杂化。在这里，我们使用完全松弛的第一原理计算（包括自旋轨道耦合、能带展开和布里渊区积分态密度）证明，双层 PtTe$_2$ 在无带隙和带隙电子状态之间表现出非单调演化。 $7.34^\\circ$ 结构保持无间隙，而在采样的中间角度处出现有限的直接间隙。间隙在采样的 $60^\\circ$ 配置处闭合，并在更高的角度处重新打开。直接间隙显示随着局部层间 Pt-Pt 分离最小而整体增加，尽管需要局部堆叠环境的完整分布来考虑与这种趋势的偏差。在 $7.34^\\circ$ 处，低能态主要集中在无间隙莫尔晶胞的类 AA 区域。受控的层间分离扫描表明，增加层间距会消除近 $E_F$ 交叉并打开间隙，这与减弱的层间 Te-$p_z$ 杂化一致。\n\n这些结果将层间杂化的重新分布确定为扭曲双层 PtTe$_2$ 中可重入间隙演化的微观起源。", "authors": [{"name": "Seoung-Hun Kang"}, {"name": "Jeonghwan Ahn"}, {"name": "Young-Kyun Kwon"}], "featured_authors": [{"name": "Seoung-Hun Kang"}, {"name": "Jeonghwan Ahn"}, {"name": "Young-Kyun Kwon"}], "author_count": 3}, {"id": "2607.13559", "category": "cond-mat", "title": "Emergent induction in magnetic Weyl semimetals", "abstract": "We theoretically study emergent electromagnetic responses in Weyl semimetals. Focusing on magnetic Weyl semimetals, we develop a general theory of emergent induction driven by magnetic dynamics. We show that magnetoelectric (ME) responses in Weyl semimetals give rise to emergent induction mediated by magnetization dynamics. Using effective two-band models for magnetic Weyl semimetals, we derive a formula for the ME response that includes both intraband and interband contributions. The resulting formula shows that the intraband contribution is proportional to the relaxation time $\\tau$, whereas the interband contribution is associated with the separation of the Weyl nodes. Applying the general formula to a model of polar Weyl ferromagnets, we demonstrate that the dynamics of the toroidal moment is closely related to the emergent inductive response in polar Weyl ferromagnets, as recently discovered by Suzuki et al. [Y. Suzuki et al. arXiv:2607.12322 ]. The chemical-potential dependence of the inductance indicates that the emergent electromagnetic response is enhanced in the energy range of the Weyl dispersion, reflecting the topological nature of Weyl semimetals.", "url": "https://arxiv.org/abs/2607.13559", "type": "理论", "summary": "我们从理论上研究了外尔半金属中出现的电磁响应。我们专注于磁性外尔半金属，发展了由磁动力学驱动的涌现感应的一般理论。我们表明，外尔半金属中的磁电（ME）响应会产生由磁化动力学介导的涌现感应。使用磁性 Weyl 半金属的有效双能带模型，我们推导了 ME 响应的公式，其中包括带内和带间贡献。结果公式表明，带内贡献与弛豫时间 $\\tau$ 成正比，而带间贡献与 Weyl 节点的分离相关。将通式应用于极性韦尔铁磁体模型，我们证明了环形矩的动力学与极性韦尔铁磁体中的新兴感应响应密切相关，正如铃木等人最近发现的那样。 [Y。铃木等人。 arXiv：2607.12322]。电感的化学势依赖性表明，在外尔色散的能量范围内，出现的电磁响应增强，反映了外尔半金属的拓扑性质。", "authors": [{"name": "Takahiro Anan"}, {"name": "Takahiro Morimoto"}], "featured_authors": [{"name": "Takahiro Anan"}, {"name": "Takahiro Morimoto"}], "author_count": 2}, {"id": "2607.13572", "category": "cond-mat", "title": "Quantum-classical crossover in finite spin-1/2 rings with Dzyaloshinsky-Moriya interaction", "abstract": "We study finite spin-$\\tfrac12$ rings with nearest-neighbor Heisenberg exchange, Dzyaloshinsky--Moriya interaction, and an external magnetic field. We introduce an interpolation parameter between the fully quantum Hamiltonian and a state-dependent mean-field description. Using dissipative Gisin--Schrödinger dynamics, we analyze the resulting quantum--classical crossover through local magnetization, connected spin correlations, single-site entropy, and the saturation field of the fully polarized state.", "url": "https://arxiv.org/abs/2607.13572", "type": "理论", "summary": "我们研究具有最近邻海森堡交换、Dzyaloshinsky-Moriya 相互作用和外部磁场的有限自旋-$\\tfrac12$ 环。我们在全量子哈密顿量和状态相关平均场描述之间引入插值参数。使用耗散吉辛-薛定谔动力学，我们通过局部磁化、连接自旋相关性、单点熵和全极化态的饱和场来分析由此产生的量子-经典交叉。", "authors": [{"name": "Raúl Sánchez Galán"}, {"name": "Robert Wieser"}], "featured_authors": [{"name": "Raúl Sánchez Galán"}, {"name": "Robert Wieser"}], "author_count": 2}, {"id": "2607.13575", "category": "cond-mat", "title": "Rotation topological states: theory and material realization", "abstract": "The conventional characterization of topological materials relies on topological invariants calculated from the entire set of occupied bands. However, when a system possesses rotational symmetry, the occupied Hilbert space can be decomposed into multiple subspaces labeled by distinct rotation eigenvalues. We show that this decomposition reveals hidden topological states characterized by a novel $\\mathbb{Z}_2^n$ topological invariant, where $n$ is the number of subspaces, while the conventional $\\mathbb{Z}_2$ invariant may fail to detect the topology hidden in the rotation subspaces. Remarkably, time-reversal symmetry pairs conjugate rotation eigenvalues and guarantees that the two subspaces have the same $\\mathbb{Z}_2$ invariants, making the topology always hidden from the conventional global invariant. We formulate the theory of rotation-subspace topology and demonstrate its material realization in bulk CsCl. Using first-principles calculations and symmetry analysis, we show that bulk CsCl, which is diagnosed as topologically trivial by the conventional approach, features a nontrivial $\\mathbb{Z}_2^3$ invariant along the $\\Gamma$-R path and a nontrivial $\\mathbb{Z}_2^4$ invariant along the $\\Gamma$-Z and M-R paths, leading to double Weyl points on the (111) and (001) surfaces, respectively. The subspace $\\mathbb{Z}_2^n$ invariant proposed here serves as a necessary refinement for symmetry-protected topological phases and will facilitate the identification of a large class of topological states overlooked by existing diagnostics.", "url": "https://arxiv.org/abs/2607.13575", "type": "理论+数值", "summary": "拓扑材料的传统表征依赖于根据整组占用能带计算出的拓扑不变量。然而，当系统具有旋转对称性时，所占用的希尔伯特空间可以分解为由不同旋转特征值标记的多个子空间。我们表明，这种分解揭示了隐藏的拓扑状态，其特征是新颖的 $\\mathbb{Z}_2^n$ 拓扑不变量，其中 $n$ 是子空间的数量，而传统的 $\\mathbb{Z}_2$ 不变量可能无法检测隐藏在旋转子空间中的拓扑。值得注意的是，时间反转对称对共轭旋转特征值，并保证两个子空间具有相同的 $\\mathbb{Z}_2$ 不变量，使得拓扑始终隐藏于传统的全局不变量中。我们制定了旋转子空间拓扑理论，并在块状 CsCl 中证明了其材料实现。\n\n使用第一性原理计算和对称性分析，我们表明，通过传统方法诊断为拓扑平凡的大块 CsCl，具有沿 $\\Gamma$-R 路径的非平凡 $\\mathbb{Z}_2^3$ 不变量和沿 $\\Gamma$-Z 和 M-R 路径的非平凡 $\\mathbb{Z}_2^4$ 不变量，导致在分别为（111）和（001）表面。这里提出的子空间 $\\mathbb{Z}_2^n$ 不变量可以作为对称保护拓扑相的必要改进，并将有助于识别现有诊断所忽视的一大类拓扑状态。", "authors": [{"name": "Chun-Xue Liu"}, {"name": "Yilin Han"}, {"name": "Runze Li"}, {"name": "Yulong Liu"}, {"name": "Zhi-Ming Yu"}], "featured_authors": [{"name": "Chun-Xue Liu"}, {"name": "Yilin Han"}, {"name": "Runze Li"}, {"name": "Yulong Liu"}, {"name": "Zhi-Ming Yu"}], "author_count": 5}, {"id": "2607.13616", "category": "cond-mat", "title": "Opinion Formation in a Spatially Constrained Coevolving Nonlinear Voter Model", "abstract": "We investigate a spatially constrained coevolving nonlinear voter model. Using a random geometric graph, we constrain the interaction range of voter dynamics. If local rewiring is not possible, the discordant link is deleted. Our results reveal absorbing states that differ not only in magnetization and activity, but also in mean degree and spatial state organization. By exploring dynamical and structural observables, we found that distinct regimes from the existing coevolving nonlinear voter model are characterized by a reduced consensus region, spatially segregated fragmentation, and isolated node formation. Additionally, we develop a phenomenological description of the evolution of the mean degree and terminal non-conserved quantities that is consistent with the numerical results. Our model highlights how local geometric accessibility reshapes the structure of the absorbing states.", "url": "https://arxiv.org/abs/2607.13616", "type": "理论+数值", "summary": "我们研究了空间约束的共同演化非线性选民模型。使用随机几何图，我们限制选民动态的交互范围。如果无法进行本地重新布线，则删除不一致的链接。我们的结果揭示了吸收态不仅在磁化强度和活性方面不同，而且在平均程度和空间状态组织方面也不同。通过探索动态和结构可观测值，我们发现与现有共同演化非线性选民模型不同的机制具有共识区域减少、空间隔离碎片和孤立节点形成的特征。此外，我们还对平均度和终端非守恒量的演化进行了现象学描述，与数值结果一致。我们的模型强调了局部几何可达性如何重塑吸收态的结构。", "authors": [{"name": "Phil Gwon Kim"}, {"name": "Jaeyong Bae"}, {"name": "Jaeseok Hur"}, {"name": "Hawoong Jeong"}], "featured_authors": [{"name": "Phil Gwon Kim"}, {"name": "Jaeyong Bae"}, {"name": "Jaeseok Hur"}, {"name": "Hawoong Jeong"}], "author_count": 4}, {"id": "2607.13623", "category": "cond-mat", "title": "Phase diagram of one-dimensional bosons with Rydberg-dressed soft-core interactions", "abstract": "Rydberg and Rydberg-dressed atomic gases have recently emerged as a promising quantum simulator for a variety of models in condensed matter physics. Here we investigate one-dimensional bosons with soft-core Rydberg-dressed interactions using exact path-integral quantum Monte Carlo simulations. The finite-range and the negative Fourier component of the interaction potential generate a roton mode at finite momentum, while particle-hole backscattering processes enhance the susceptibility of one-dimensional systems at twice the Fermi momentum. The competition between the corresponding length scales yields a rich phase diagram, featuring a conventional Tomonaga-Luttinger liquid (TLL) regime, a beyond-TLL regime, and commensurate cluster phases. In the TLL regime, the system transitions from Lieb-Liniger-like bnehavior with Luttinger parameter $K>1$ to hard-rod-like behavior with $K<1$, with a quasi-supersolid phase emerging for $K < 1/2$. For strong interactions and high densities, deviations from TLL theory appear as precursors for the onset of cluster phases, where particles aggregate into stable clusters of several particles. The properties of each phase is discussed in detail.", "url": "https://arxiv.org/abs/2607.13623", "type": "理论+数值", "summary": "里德伯和里德伯修饰的原子气体最近已成为凝聚态物理中各种模型的有前景的量子模拟器。在这里，我们使用精确的路径积分量子蒙特卡罗模拟研究具有软核里德堡修饰相互作用的一维玻色子。相互作用势的有限范围和负傅里叶分量在有限动量下产生旋转模式，而粒子空穴反向散射过程增强了一维系统在两倍费米动量下的敏感性。相应长度尺度之间的竞争产生了丰富的相图，具有传统的 Tomonaga-Luttinger 液体 (TLL) 体系、超 TLL 体系和相应的簇相。在 TLL 体系中，系统从 Luttinger 参数 $K>1$ 的类 Lieb-Liniger 行为转变为 $K<1$ 的类硬棒行为，并且当 $K < 1/2$ 时出现准超固体相。对于强相互作用和高密度，与 TLL 理论的偏差似乎是团簇阶段开始的前兆，在团簇阶段中，粒子聚集成由多个粒子组成的稳定团簇。详细讨论了每个相的性质。", "authors": [{"name": "Shengjie Yu"}, {"name": "Laurent Sanchez-Palencia"}], "featured_authors": [{"name": "Shengjie Yu"}, {"name": "Laurent Sanchez-Palencia"}], "author_count": 2}, {"id": "2607.13635", "category": "cond-mat", "title": "Transverse order and longitudinal fluctuations in a near-Ising spin supersolid", "abstract": "We investigate the polarization of the ordered moments and low-energy spin fluctuations in the spin supersolid state of the S = 1/2 triangular-lattice easy-axis antiferromagnet K2Co(SeO3)2 using neutron scattering. The supersolid order develops through successive BKT transitions: the longitudinal order appears at higher temperature, while the transverse component associated with the Bose-Einstein condensate emerges only below a lower-temperature transition accompanied by a change in the interlayer correlations. At the lowest measured temperature, the transverse ordered moment reaches only 11% of the longitudinal component. Moreover, the low-energy spin fluctuations are found to be predominantly longitudinal in character. These results provide direct evidence that the supersolid ground state survives even in the near-Ising regime and exhibits longitudinal low-energy dynamics, imposing stringent constraints on microscopic theories of triangular-lattice XXZ antiferromagnets.", "url": "https://arxiv.org/abs/2607.13635", "type": "理论", "summary": "我们使用中子散射研究了 S = 1/2 三角晶格易轴反铁磁体 K2Co(SeO3)2 的自旋超固态中有序矩的极化和低能自旋涨落。超固体有序通过连续的 BKT 转变而发展：纵向有序出现在较高温度下，而与玻色-爱因斯坦凝聚体相关的横向分量仅在伴随层间相关性变化的较低温度转变下出现。在最低测量温度下，横向有序力矩仅达到纵向分量的11%。此外，发现低能自旋涨落主要是纵向的。这些结果提供了直接证据，证明超固体基态即使在近伊辛状态下也能存在，并表现出纵向低能动力学，对三角晶格 XXZ 反铁磁体的微观理论施加了严格的约束。", "authors": [{"name": "Mengze Zhu"}, {"name": "V. Romerio"}, {"name": "S. Raymond"}, {"name": "N. Murai"}, {"name": "S. Ohira-Kawamura"}, {"name": "K. Yu. Povarov"}, {"name": "S. A. Zvyagin"}, {"name": "R. Sibille"}, {"name": "Arianna Minelli"}, {"name": "Z. Yan"}, {"name": "S. Gvasaliya"}, {"name": "A. Zheludev"}], "featured_authors": [{"name": "Mengze Zhu"}, {"name": "V. Romerio"}, {"name": "S. Raymond"}, {"name": "Z. Yan"}, {"name": "S. Gvasaliya"}, {"name": "A. Zheludev"}], "author_count": 12}, {"id": "2607.13664", "category": "cond-mat", "title": "Direct observation of photon-induced vortices in superconducting films", "abstract": "Nucleation of vortex-antivortex pairs (VAPs) is believed to play a central role in the photon detection mechanism of superconducting detectors; however, their direct dynamic observation has remained challenging. Here, we report the direct observation of photon-induced VAP dynamics in a current-carrying superconductor as quantized voltage signals following photon absorption. The observed signals are interpreted as discrete phase-slip events, where each vortex traversal induces a 2-pi phase change of the superconducting order parameter, resulting in a quantized voltage pulse whose time integral is given by the magnetic flux quantum. We analyze the resulting quantized signals as a function of bias current, base temperature, and input photon-number states, and find that the number of VAPs generated per absorbed photon becomes effectively stabilized under specific conditions. Under these conditions, we demonstrate photon-number-resolving capability by directly counting phase-slip-induced voltage quanta. Our results reveal a detection mechanism governed by phase dynamics rather than conventional resistive transitions. We further show that photon-number resolution emerges when the fluctuation of photon-induced vortex-antivortex pair generation becomes statistically suppressed. These findings establish a new route toward photon-number-resolving detection based on phase-slip counting and open opportunities for high-speed superconducting detectors for quantum optics and photonic quantum technologies.", "url": "https://arxiv.org/abs/2607.13664", "type": "理论", "summary": "涡旋-反涡旋对（VAP）的成核被认为在超导探测器的光子探测机制中发挥着核心作用；然而，他们的直接动态观察仍然具有挑战性。在这里，我们报告了载流超导体中光子诱导的 VAP 动力学的直接观察，作为光子吸收后的量化电压信号。观测到的信号被解释为离散相滑事件，其中每个涡旋遍历都会引起超导序参数的 2-pi 相变，从而产生量化的电压脉冲，其时间积分由磁通量量子给出。我们分析了所得到的量化信号作为偏置电流、基础温度和输入光子数状态的函数，发现每个吸收光子生成的 VAP 数量在特定条件下变得有效稳定。在这些条件下，我们通过直接计算相滑引起的电压量子来展示光子数分辨能力。我们的结果揭示了一种由相位动力学而不是传统电阻转变控制的检测机制。\n\n我们进一步表明，当光子引起的涡旋-反涡旋对产生的波动在统计上受到抑制时，就会出现光子数分辨率。这些发现为基于相滑计数的光子数分辨检测开辟了一条新途径，并为量子光学和光子量子技术的高速超导探测器提供了机会。", "authors": [{"name": "Takeshi Jodoi"}, {"name": "Fuminori Hirayama"}, {"name": "Tetsuya Tsuruta"}, {"name": "Takahiro Kikuchi"}, {"name": "Daiji Fukuda"}], "featured_authors": [{"name": "Takeshi Jodoi"}, {"name": "Fuminori Hirayama"}, {"name": "Tetsuya Tsuruta"}, {"name": "Takahiro Kikuchi"}, {"name": "Daiji Fukuda"}], "author_count": 5}, {"id": "2607.13675", "category": "cond-mat", "title": "Stoner transitions beyond mean-field in two-dimensional electronic systems: a diagrammatic Monte Carlo study", "abstract": "Stoner instabilities for fermions with repulsive interaction have been well studied within the mean-field (ladder) approximation. In this study, we consider two-dimensional electronic systems with one or two valleys and discuss a Stoner transition beyond the ladder approximation. At weak coupling, the corrections to the ladder approximation come predominantly from the renormalization of the particle-hole vertex in the particle-particle channel, and the lowest-order corrections are logarithmically singular in the low-density limit. To investigate the problem beyond the lowest order, we apply the diagrammatic Monte Carlo algorithm and treat ladder and non-ladder renormalizations on equal footing. We find that in a one-valley system, a Stoner transition to a ferromagnetism occurs at low density only if there is a cutoff on the momentum transfer carried by the interaction. In a two-valley system, the restriction is less severe. Here we find either a direct Stoner transition into a spin- and valley-polarized state, or a set of two Stoner transitions via an intermediate valley-polarized state. The pathway is controlled by the anisotropy of the fermionic dispersion.", "url": "https://arxiv.org/abs/2607.13675", "type": "理论+数值", "summary": "具有排斥相互作用的费米子的斯托纳不稳定性已经在平均场（阶梯）近似中得到了很好的研究。在这项研究中，我们考虑具有一个或两个谷的二维电子系统，并讨论超越梯形近似的斯通纳跃迁。在弱耦合时，对阶梯近似的校正主要来自粒子-粒子通道中粒子-孔顶点的重整化，并且最低阶校正在低密度极限下是对数奇异的。为了研究最低阶以外的问题，我们应用图解蒙特卡罗算法，并平等地对待梯形和非梯形重整化。我们发现，在单谷系统中，只有当相互作用所携带的动量传递被切断时，才会在低密度下发生向铁磁性的斯通纳转变。在双谷系统中，限制不太严格。在这里，我们发现要么直接进入自旋和谷偏振态的斯通纳跃迁，要么通过中间谷偏振态进行一组两个斯通纳跃迁。该路径由费米子色散的各向异性控制。", "authors": [{"name": "Yueh-Chen Lee"}, {"name": "Nikolay P. Prokof'ev"}, {"name": "Andrey V. Chubukov"}], "featured_authors": [{"name": "Yueh-Chen Lee"}, {"name": "Nikolay P. Prokof'ev"}, {"name": "Andrey V. Chubukov"}], "author_count": 3}, {"id": "2607.13680", "category": "cond-mat", "title": "Magnetic quadrupole current generation and accumulation in noncentrosymmetric systems", "abstract": "Magnetization control via magnetic octupole injection has recently been proposed for a new class of centrosymmetric antiferromagnets, namely $d$-wave altermagnets, where the magnetic octupole is the lowest-rank magnetic multipole allowed by symmetry and serves as an alternative carrier to spin injection. In contrast, in noncentrosymmetric antiferromagnets, the magnetic quadrupole (MQ) constitutes the lowest-rank symmetry-allowed magnetic multipole, suggesting that MQ currents can provide an efficient route toward magnetization control through MQ injection. Here, we establish the symmetry conditions for MQ-current generation by constructing the multipole representation of the MQ conductivity tensor and show that MQ currents are generically allowed in noncentrosymmetric crystallographic point groups. As a representative example, we demonstrate MQ-current generation in the linear-response regime associated with symmetry lowering from the centrosymmetric point group ($mmm$) to its noncentrosymmetric subgroup ($mm2$). Furthermore, we reveal MQ accumulation near sample edges, analogous to spin accumulation induced by the spin Hall effect. This edge accumulation provides direct evidence of MQ-current generation and constitutes a key prerequisite for realizing MQ injection and MQ-based magnetization control in noncentrosymmetric antiferromagnets.", "url": "https://arxiv.org/abs/2607.13680", "type": "理论", "summary": "最近提出了通过磁性八极注入进行磁化控制，用于一类新型中心对称反铁磁体，即$d$波交替磁体，其中磁性八极是对称性允许的最低阶磁性多极，并用作自旋注入的替代载体。相比之下，在非中心对称反铁磁体中，磁性四极子（MQ）构成最低阶对称性允许的磁性多极子，这表明MQ电流可以通过MQ注入提供有效的磁化控制途径。在这里，我们通过构造 MQ 电导率张量的多极表示来建立 MQ 电流生成的对称条件，并表明在非中心对称晶体点群中通常允许 MQ 电流。作为一个代表性的例子，我们证明了线性响应机制中 MQ 电流的产生与从中心对称点群 ($mmm$) 到非中心对称子群 ($mm2$) 的对称性降低相关。此外，我们揭示了样本边缘附近的 MQ 积累，类似于自旋霍尔效应引起的自旋积累。\n\n这种边缘积累提供了 MQ 电流产生的直接证据，并构成了在非中心对称反铁磁体中实现 MQ 注入和基于 MQ 的磁化控制的关键先决条件。", "authors": [{"name": "Yuuga Takasu"}, {"name": "Satoru Hayami"}], "featured_authors": [{"name": "Yuuga Takasu"}, {"name": "Satoru Hayami"}], "author_count": 2}, {"id": "2607.13779", "category": "cond-mat", "title": "Mapping recrystallization trajectories in GaAs using latent space diffraction analysis", "abstract": "Recrystallization in disordered solids proceeds through a sequence of local structural rearrangements that are difficult to resolve using conventional diffraction analysis. In amorphous and partially ordered materials, subtle variations in diffuse scattering, short-range order, and defect-mediated symmetry emergence encode the pathways through which ordering initiates and propagates. Here, we introduce a latent space framework for mapping these pathways directly from \\textit{in situ} 4D-STEM diffraction data. A convolutional autoencoder provides a compact representation of structural motifs, and unsupervised clustering identifies recurring microstructural states, including amorphous, paracrystalline, crystalline, twinned, and hybrid intermediates. By tracking these states across temperature, we construct phase trajectory models that reveal the topology of the recrystallization landscape, including metastable basins, branching pathways, hybrid states, and temperature-dependent reorganizations of accessible states. Applied to ion irradiated GaAs, this approach uncovers two distinct recrystallization regimes separated by a transition near 250\\textdegree{}C. At low temperature, recrystallization is growth-dominated and dominated by the persistence of amorphous and crystalline states. At high temperature, the transformation landscape reorganizes: hybrid and faulted states become metastable precursors to twinning, polycrystalline regions stabilize, and twinned structures emerge as dominant end states. The latent space representation also identifies amorphous patterns with weak symmetry signatures that precede recrystallization. This reveals structural precursors to ordering that are not captured by conventional descriptors give new insights into how recrystallization is initiated.", "url": "https://arxiv.org/abs/2607.13779", "type": "理论", "summary": "无序固体中的重结晶通过一系列局部结构重排进行，而使用传统的衍射分析很难解决这些重排问题。在无定形和部分有序材料中，漫散射、短程有序和缺陷介导的对称性出现的细微变化编码了有序启动和传播的途径。在这里，我们引入了一个潜在空间框架，用于直接从 \\textit{in situ} 4D-STEM 衍射数据映射这些路径。卷积自动编码器提供结构图案的紧凑表示，无监督聚类可识别重复出现的微观结构状态，包括非晶态、准晶态、晶态、孪晶和混合中间体。通过跟踪这些不同温度的状态，我们构建了相轨迹模型，揭示了再结晶景观的拓扑结构，包括亚稳盆地、分支路径、混合态和与温度相关的可接近态的重组。应用于离子辐照的 GaAs 时，该方法揭示了两种不同的再结晶状态，这两种状态由 250\\text°{}C 附近的转变分开。\n\n在低温下，再结晶是生长主导的，并且由非晶态和晶态的持久性主导。在高温下，转变景观会重新组织：混合态和断层态成为孪晶的亚稳态前体，多晶区域稳定下来，孪晶结构成为主要的最终态。潜在空间表示还识别出再结晶之前具有弱对称特征的非晶图案。这揭示了传统描述符无法捕获的有序结构前体，为如何引发重结晶提供了新的见解。", "authors": [{"name": "Ellis Rae Kennedy"}, {"name": "Kwanghwi Je"}, {"name": "Erik Thiede"}], "featured_authors": [{"name": "Ellis Rae Kennedy"}, {"name": "Kwanghwi Je"}, {"name": "Erik Thiede"}], "author_count": 3}, {"id": "2607.13807", "category": "cond-mat", "title": "Fractional Chern insulators in alternating twisted multilayer MoTe$_{2}$", "abstract": "We study strongly correlated many-body states in alternating twisted trilayer and tetralayer MoTe$_{2}$. By sliding the top layer with respect to others and applying a perpendicular electric field, a variety of band structures can be realized. In many cases, the topmost hole band has unity Chern number and its quantum geometric properties can be tuned to some extent. Exact diagonalizations suggest that fractional Chern insulators are stabilized in certain parameter regimes but not in some regimes even when the band is topological. This contrast is attributed primarily to different quantum geometries as quantified by the trace condition. Our results demonstrate that sliding can serve as a useful knob for probing many-body states in moiré systems.", "url": "https://arxiv.org/abs/2607.13807", "type": "理论+数值", "summary": "我们研究了交替扭曲三层和四层 MoTe$_{2}$ 中强相关的多体态。通过相对于其他层滑动顶层并施加垂直电场，可以实现各种能带结构。在许多情况下，最上面的空穴带具有单位陈数，并且其量子几何性质可以在一定程度上进行调整。精确的对角化表明，分数陈绝缘体在某些参数范围内是稳定的，但在某些范围内则不然，即使能带是拓扑的。这种对比主要归因于通过痕量条件量化的不同量子几何结构。我们的结果表明，滑动可以作为探测莫尔系统中多体状态的有用旋钮。", "authors": [{"name": "Xi-Hang Feng"}, {"name": "Shi-Ping Ding"}, {"name": "Xiang-Jian Hou"}, {"name": "Ying-Hai Wu"}, {"name": "Jin-Hua Gao"}], "featured_authors": [{"name": "Xi-Hang Feng"}, {"name": "Shi-Ping Ding"}, {"name": "Xiang-Jian Hou"}, {"name": "Ying-Hai Wu"}, {"name": "Jin-Hua Gao"}], "author_count": 5}, {"id": "2607.13833", "category": "cond-mat", "title": "Cooling rate and glassy behavior in the Fermi--Pasta--Ulam system", "abstract": "In this work, we numerically studied the cooling process of a Fermi--Pasta--Ulam system, which occurs when the FPU system is placed in contact with a gas whose temperature $T$ is reduced with a certain cooling rate $\\xi$. It was found that the existence of a weak stochastic threshold has a significant impact on the cooling process, because below such a stochastic threshold the specific FPU energy is larger than its temperature, i.e., the FPU system falls out of equilibrium. The difference remains finite in the limit $T \\to 0$, so that the FPU system maintains a residual amount of energy $E_0$ at vanishing temperature. Our numerical simulations reveal that this energy exhibits a power--law dependence on both the system size and the cooling rate, scaling approximately as $E_{0} \\sim (\\xi N)^{2/3}$.", "url": "https://arxiv.org/abs/2607.13833", "type": "理论+数值", "summary": "在这项工作中，我们数值研究了 Fermi--Pasta--Ulam 系统的冷却过程，当 FPU 系统与温度 $T$ 以一定的冷却速率 $\\xi$ 降低的气体接触时，就会发生这种情况。研究发现，弱随机阈值的存在对冷却过程有显着影响，因为低于该随机阈值，FPU 的比能量大于其温度，即 FPU 系统失去平衡。差异在 $T \\to 0$ 的限制内保持有限，因此 FPU 系统在消失温度下保持剩余能量 $E_0$。我们的数值模拟表明，这种能量表现出对系统尺寸和冷却速率的幂律依赖性，大约缩放为 $E_{0} \\sim (\\xi N)^{2/3}$。", "authors": [{"name": "Matteo Razza"}, {"name": "Andrea Carati"}, {"name": "Luigi Galgani"}], "featured_authors": [{"name": "Matteo Razza"}, {"name": "Andrea Carati"}, {"name": "Luigi Galgani"}], "author_count": 3}, {"id": "2607.13863", "category": "cond-mat", "title": "Ultrafast altermagnetophononics", "abstract": "Altermagnets feature symmetry-dictated nontrivial spin splitting in electronic structure promising for next-generation spintronics, yet their ultrafast dynamical manipulation remains largely unexplored. Here, we establish altermagnetophononics as an efficient route for magnetic control via selective symmetry breaking induced by coherent phonons. Using the prototypical altermagnet $\\alpha$-MnTe as an example, we demonstrate that the targeted excitation of B$_{1g}$ mode selectively lifts the symmetry constraints protecting altermagnetism (AM), driving ultrafast transition into a transient compensated ferrimagnetic (cFiM) phase characterized by a global spin splitting without net magnetization. Further, we show that the proposed mechanism is broadly applicable by demonstrating a multi-mode symmetry breaking pathway, and by realizing a ferrimagnetic order with reversible magnetic moment in metallic CrSb. These findings elucidate the potential to obtain desirable nonequilibrium properties in altermagnets via coherent phononic control over their spin splittings.", "url": "https://arxiv.org/abs/2607.13863", "type": "理论", "summary": "交变磁体在电子结构中具有对称性决定的非平凡自旋分裂，有望用于下一代自旋电子学，但其超快动态操纵在很大程度上仍未得到探索。在这里，我们将交替磁声学建立为通过相干声子引起的选择性对称破缺进行磁控制的有效途径。以原型交流磁体 $\\alpha$-MnTe 为例，我们证明了 B$_{1g}$ 模式的定向激励选择性地解除了保护交流磁体 (AM) 的对称性约束，驱动超快过渡到瞬态补偿亚铁磁 (cFiM) 相，其特征是全局自旋分裂，没有净磁化。此外，我们通过展示多模式对称性破缺路径以及在金属 CrSb 中实现具有可逆磁矩的亚铁磁序，表明所提出的机制具有广泛的适用性。这些发现阐明了通过对自旋分裂进行相干声子控制而在交变磁体中获得理想的非平衡特性的潜力。", "authors": [{"name": "Chenyu Wang"}, {"name": "Yaxian Wang"}, {"name": "Sheng Meng"}], "featured_authors": [{"name": "Chenyu Wang"}, {"name": "Yaxian Wang"}, {"name": "Sheng Meng"}], "author_count": 3}, {"id": "2607.13878", "category": "cond-mat", "title": "Realization and manipulation of spiral charge density waves in a two-dimensional metal", "abstract": "Nearly degenerate charge-density-wave (CDW) states play a central role in the competition among collective phenomena. In real materials, however, these states are often intertwined by disorder, hindering their disentanglement and control. Here we show that strain can lift this near-degeneracy and spatially separate distinct CDW states in NbSe2. Using van der Waals (vdW) interactions, we stabilize a micron-scale strain network that produces spatially inhomogeneous strain fields. Within this landscape, the intrinsic 3 * 3 CDW superlattice of pristine NbSe2 transforms into an isolated unidirectional 4 * 1 order under 1D-confined compression, and into a 2 * 2 order under biaxial tension. The 4 * 1 CDW has a multiband origin and exhibits markedly enhanced thermal stability, persisting up to 70 K. At strain-network nodes, it further develops into chiral spiral textures, which can be melted by voltage pulses. These results establish strain as a powerful approach to disentangle, stabilize and manipulate competing electronic orders.", "url": "https://arxiv.org/abs/2607.13878", "type": "理论", "summary": "近简并电荷密度波（CDW）态在集体现象之间的竞争中发挥着核心作用。然而，在真实材料中，这些状态常常无序地交织在一起，阻碍了它们的解开和控制。在这里，我们证明应变可以提升 NbSe2 中这种近简并性并在空间上分离不同的 CDW 态。利用范德华 (vdW) 相互作用，我们稳定了产生空间不均匀应变场的微米级应变网络。在这种景观中，原始 NbSe2 的固有 3 * 3 CDW 超晶格在一维约束压缩下转变为孤立的单向 4 * 1 秩序，并在双轴拉伸下转变为 2 * 2 秩序。 4 * 1 CDW 具有多带起源，并表现出显着增强的热稳定性，持续高达 70 K。在应变网络节点，它进一步发展成手性螺旋结构，可以通过电压脉冲熔化。这些结果表明，应变是解开、稳定和操纵竞争性电子订单的有力方法。", "authors": [{"name": "Lili Zhou"}, {"name": "Ruizi Zhang"}, {"name": "Chen Si"}, {"name": "Zhaoteng Dong"}, {"name": "Mengya Ren"}, {"name": "Keru Guo"}, {"name": "Can Zhang"}, {"name": "Jizheng Wu"}, {"name": "Fudi Zhou"}, {"name": "Huixia Yang"}, {"name": "Yaxin Zhao"}, {"name": "Guoyuan Yang"}, {"name": "Xiaolong Xu"}, {"name": "Yuanxiao Ma"}, {"name": "Xiao Kong"}, {"name": "Yu Zhang"}, {"name": "Yeliang Wang"}], "featured_authors": [{"name": "Lili Zhou"}, {"name": "Ruizi Zhang"}, {"name": "Chen Si"}, {"name": "Xiao Kong"}, {"name": "Yu Zhang"}, {"name": "Yeliang Wang"}], "author_count": 17}, {"id": "2607.13922", "category": "cond-mat", "title": "Modified Family-Vicsek Scaling and Probability Distributions for Brownian Castle Interfaces", "abstract": "The Brownian Castle is a new interface growth model that is a variation on the well-known ballistic deposition model that results in an entirely new universality class. We present numerical verification that the interface width for BC interfaces displays modified Family-Vicsek scaling properties up to finite size corrections. Specifically, we find a growth exponent of $\\beta=0.470 \\pm 0.012$ and a roughness exponent of $\\alpha=1.01 \\pm 0.018$. The scaling is modified at short times with a size scaling exponent that described the early time dependence of interface width on length. The probability distribution of heights for the BC interface shows significant deviations from simple Gaussian behavior and the probability distribution of height changes shows a Cauchy-Lorentz form consistent with expectations for a process involving relatively large jumps.", "url": "https://arxiv.org/abs/2607.13922", "type": "理论+数值", "summary": "布朗城堡是一种新的界面生长模型，它是著名的弹道沉积模型的变体，可产生全新的通用性类别。我们提出了数值验证，证明 BC 界面的界面宽度显示了修改后的 Family-Vicsek 缩放属性，直至有限尺寸修正。具体来说，我们发现增长指数为$\\beta=0.470 \\pm 0.012$，粗糙度指数为$\\alpha=1.01 \\pm 0.018$。使用尺寸缩放指数在短时间内修改缩放比例，该尺寸缩放指数描述了界面宽度对长度的早期时间依赖性。 BC 界面的高度概率分布显示出与简单高斯行为的显着偏差，并且高度变化的概率分布显示出柯西-洛伦兹形式，与涉及相对较大跳跃的过程的预期一致。", "authors": [{"name": "Noah Sublett"}, {"name": "Charles Sutton"}, {"name": "Benjamin Long"}, {"name": "Daniel B. Dougherty"}], "featured_authors": [{"name": "Noah Sublett"}, {"name": "Charles Sutton"}, {"name": "Benjamin Long"}, {"name": "Daniel B. Dougherty"}], "author_count": 4}, {"id": "2607.13993", "category": "cond-mat", "title": "$\\texttt{iNORG}$: An open-source quantum impurity solver package based on the natural orbitals renormalization group", "abstract": "In the context of dynamical mean-field theory (DMFT) calculations for strongly correlated electron systems, quantum impurity solvers play a central computational role in treating correlated lattice models and realistic materials. Consequently, developing efficient and robust quantum impurity solvers remains a key challenge. In this paper, we present an open-source quantum impurity solver package based on the natural orbitals renormalization group (NORG) method, dubbed $\\texttt{iNORG}$. This software delivers high accuracy with reduced computational cost by optimizing the bath representation using natural orbitals and incorporating advanced features such as efficient Hilbert space selection and efficient algorithms for computing Green's functions. We first introduce the basic principle of the NORG method and then discuss the implementation details. The software framework, major features, and installation procedure for $\\texttt{iNORG}$ are explained as well. Finally, several simple examples are presented to demonstrate the usage of $\\texttt{iNORG}$.", "url": "https://arxiv.org/abs/2607.13993", "type": "理论+数值", "summary": "在强相关电子系统的动态平均场理论 (DMFT) 计算中，量子杂质求解器在处理相关晶格模型和现实材料方面发挥着核心计算作用。因此，开发高效且强大的量子杂质求解器仍然是一个关键挑战。在本文中，我们提出了一个基于自然轨道重整化群（NORG）方法的开源量子杂质求解器包，称为$\\texttt{iNORG}$。该软件通过使用自然轨道优化浴表示并结合高效的希尔伯特空间选择和计算格林函数的高效算法等高级功能，提供高精度并降低计算成本。我们首先介绍NORG方法的基本原理，然后讨论实现细节。还解释了$\\texttt{iNORG}$的软件框架、主要功能和安装过程。最后，给出了几个简单的例子来演示$\\texttt{iNORG}$的用法。", "authors": [{"name": "Jia-Ming Wang"}, {"name": "Yi-Heng Tian"}, {"name": "Yin Chen"}, {"name": "Ru Zheng"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "featured_authors": [{"name": "Jia-Ming Wang"}, {"name": "Yi-Heng Tian"}, {"name": "Yin Chen"}, {"name": "Ru Zheng"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "author_count": 6}, {"id": "2607.13997", "category": "cond-mat", "title": "Driven Odd Elasticity in Passive Mechanical Metamaterials", "abstract": "We present a mechanical mechanism leveraging passive mechanical components, i.e. chiral gears and a square lattice metamaterial, to demonstrate driven odd elasticity in a mechanical metamaterial. The mechanism couples tension and shear in a non-reciprocal way, resulting in an odd shear modulus. The emergence of this odd shear modulus enables non-conservative work in a standard quasistatic strain cycle, and further enables the non-Hermitian skin effect in dynamics. Our results demonstrate that odd elasticity can be achieved in mechanical structures using passive elements without electronic components coupled with feedback or robotic control systems.", "url": "https://arxiv.org/abs/2607.13997", "type": "理论", "summary": "我们提出了一种利用被动机械部件（即手性齿轮和方形晶格超材料）的机械机构，以演示机械超材料中的驱动奇弹性。该机制以非互易的方式耦合张力和剪切，从而产生奇数剪切模量。这种奇怪的剪切模量的出现使得标准准静态应变循环中的非保守工作成为可能，并进一步使得动力学中的非厄米集肤效应成为可能。我们的结果表明，使用无源元件可以在机械结构中实现奇数弹性，而无需电子元件以及反馈或机器人控制系统。", "authors": [{"name": "Mohamad Rahimi"}, {"name": "Harold S Park"}], "featured_authors": [{"name": "Mohamad Rahimi"}, {"name": "Harold S Park"}], "author_count": 2}, {"id": "2607.14011", "category": "cond-mat", "title": "Thermodynamic and electrical transport properties of the half-Heusler plumbide TbAuPb", "abstract": "Structural, thermodynamic and electrical transport properties of TbAuPb were investigated on single crystals. The compound was found to crystallize with the cubic MgAgAs-type structure characteristic of half-Heusler materials. It orders antiferromagnetically at TN = 5 K and undergoes a transition into a different antiferromagnetic phase emerging in high magnetic fields. Electrical transport in TbAuPb exhibits a multiband character, with a predominance of hole-like carriers. Angular magnetoresistance evolves systematically with applied magnetic field and changes its symmetry near the spin-reorientation transition, highlighting strong coupling between the charge transport and the magnetic order. The results of first-principles calculations indicate that TbAuPb is a band inverted semimetal in the non-magnetic state, which becomes topologically trivial in the field-induced ferromagnetic state.", "url": "https://arxiv.org/abs/2607.14011", "type": "理论+数值", "summary": "在单晶上研究了 TbAuPb 的结构、热力学和电传输特性。发现该化合物结晶时具有半赫斯勒材料的立方 MgAgAs 型结构特征。它在 TN = 5 K 时反铁磁有序，并在高磁场中转变为不同的反铁磁相。 TbAuPb 中的电传输表现出多带特征，其中以类空穴载流子为主。角磁阻随着施加的磁场而系统地演化，并在自旋重定向转变附近改变其对称性，突出了电​​荷传输和磁序之间的强耦合。第一性原理计算结果表明，TbAuPb在非磁态下是能带倒置的半金属，在场致铁磁态下拓扑变得微不足道。", "authors": [{"name": "Abhinav Agarwal"}, {"name": "Snehashish Chatterjee"}, {"name": "Maciej J. Winiarski"}, {"name": "Orest Pavlosiuk"}, {"name": "Dorota A. Kowalska"}, {"name": "Piotr Wisniewski"}, {"name": "Dariusz Kaczorowski"}], "featured_authors": [{"name": "Abhinav Agarwal"}, {"name": "Snehashish Chatterjee"}, {"name": "Maciej J. Winiarski"}, {"name": "Dorota A. Kowalska"}, {"name": "Piotr Wisniewski"}, {"name": "Dariusz Kaczorowski"}], "author_count": 7}, {"id": "2607.14029", "category": "cond-mat", "title": "Unified Terahertz Framework for Magnetic and Lattice Responses Reveals an Elusive Ordering Transition in Gd$_2$Ru$_2$O$_7$", "abstract": "Magnetic order in materials combining localized rare-earth moments with itinerant transition-metal sublattices generates internal fields whose lattice imprint is rarely accessed directly. In Gd pyrochlore ruthenate, we find that a single terahertz spectrum resolves an exchange-split Gd$^{3+}$ mode and an optical phonon. Their coupled evolution quantifies the internal field, oriented as predicted for cluster-multipolar order, and reveals a Gd-ordering transition elusive to bulk thermodynamic probes, establishing a unified framework for accessing magnetic and lattice responses in correlated quantum materials.", "url": "https://arxiv.org/abs/2607.14029", "type": "理论", "summary": "材料中的磁序将局域稀土矩与流动过渡金属亚晶格相结合，产生内部场，其晶格印记很少被直接访问。在烧绿石钌酸钆中，我们发现单个太赫兹光谱可以解析交换分裂 Gd$^{3+}$ 模式和光学声子。它们的耦合演化量化了内部场，其方向与簇多极序的预测一致，并揭示了体热力学探针难以捉摸的 Gd 有序跃迁，建立了一个统一的框架来获取相关量子材料中的磁和晶格响应。", "authors": [{"name": "Nicolas M. Kawahala"}, {"name": "Rafael L. Sabainsk"}, {"name": "Esteban Marulanda"}, {"name": "Rafael S. Freitas"}, {"name": "Felix G. G. Hernandez"}], "featured_authors": [{"name": "Nicolas M. Kawahala"}, {"name": "Rafael L. Sabainsk"}, {"name": "Esteban Marulanda"}, {"name": "Rafael S. Freitas"}, {"name": "Felix G. G. Hernandez"}], "author_count": 5}, {"id": "2607.14061", "category": "cond-mat", "title": "Gelation of functional peptides by trivalent cations at the air-water interface", "abstract": "We report a mechanism for gelation at fluid interfaces driven by multivalent-cation-mediated bridging. At the air-water interface, peptides with bound lanthanide cations undergo a coordination-geometry transition that converts the metal from a single-peptide bound state to a multi-peptide bridging state, driving charge inversion and gel formation. Surface adsorption and non-ideal interfacial electrostatics are implicated in this transition. The gel is stabilized by reversible metal-ligand coordination bonds that resist bulk salt screening, fundamentally distinct from electrostatic charge-inversion gelation in proteins. This reveals the breakdown of the peptide's coordinating sphere as a distinct pathway for interfacial gelation, independent of the diffuse electrostatic mechanisms governing bulk protein aggregation.", "url": "https://arxiv.org/abs/2607.14061", "type": "理论", "summary": "我们报告了一种由多价阳离子介导的桥接驱动的流体界面凝胶化机制。在空气-水界面，结合有镧系元素阳离子的肽经历配位几何转变，将金属从单肽结合态转化为多肽桥接态，驱动电荷反转和凝胶形成。这一转变涉及表面吸附和非理想界面静电。该凝胶通过可逆的金属-配体配位键来稳定，该配位键可以抵抗大量盐的筛选，这与蛋白质中的静电荷反转凝胶有根本的区别。这揭示了肽协调球的分解作为界面凝胶化的独特途径，独立于控制大量蛋白质聚集的扩散静电机制。", "authors": [{"name": "Stephen A. Crane"}, {"name": "Felipe Jimenez Angeles"}, {"name": "Monica Olvera de la Cruz"}, {"name": "Ivan J. Dmochowski"}, {"name": "Kathleen J. Stebe"}], "featured_authors": [{"name": "Stephen A. Crane"}, {"name": "Felipe Jimenez Angeles"}, {"name": "Monica Olvera de la Cruz"}, {"name": "Ivan J. Dmochowski"}, {"name": "Kathleen J. Stebe"}], "author_count": 5}, {"id": "2607.14073", "category": "cond-mat", "title": "An exactly solvable macroscopic fluctuation theory of single-file diffusion", "abstract": "Single-file diffusion is a ubiquitous phenomenon in low-dimensional systems, arising in transport inside narrow channels. Its natural continuum model is a one-dimensional gas of extended Brownian hard rods (BHR). Perhaps owing to the perceived intractability of this problem, much of the literature has traditionally focused on lattice exclusion models, where integrability methods have yielded remarkable, albeit limited, exact results. A major recent advance comes from a formal solution of macroscopic fluctuation theory (MFT) for the exclusion process. Yet, despite the formal solution, only a handful of properties have been made explicit. We show that the corresponding MFT of the extended BHR gas is in fact exactly solvable through a canonical transformation. We demonstrate this by explicit computation of the large-deviation statistics of the tracer-position and integrated-current in both annealed and quenched ensembles. We further show that an analogous canonical transformation applies to the MFT of lattice gases with finite-volume exclusion, yielding corresponding tracer and current statistics. We validate our results using rare-event simulations for both the continuum and the lattice models.", "url": "https://arxiv.org/abs/2607.14073", "type": "理论+数值", "summary": "单列扩散是低维系统中普遍存在的现象，出现在狭窄通道内的传输中。其自然连续介质模型是扩展布朗硬棒（BHR）的一维气体。也许由于人们认为这个问题很棘手，许多文献传统上都集中在晶格排除模型上，其中可积性方法已经产生了显着的、尽管有限的精确结果。最近的一项重大进展来自于排除过程的宏观涨落理论（MFT）的形式化解决方案。然而，尽管有正式的解决方案，但只有少数属性得到明确。我们证明，扩展 BHR 气体的相应 MFT 实际上可以通过正则变换精确求解。我们通过对退火和淬火系综中示踪剂位置和积分电流的大偏差统计数据的显式计算来证明这一点。我们进一步表明，类似的正则变换适用于具有有限体积排斥的晶格气体的 MFT，产生相应的示踪剂和当前统计数据。\n\n我们使用连续体模型和晶格模型的罕见事件模拟来验证我们的结果。", "authors": [{"name": "Sandeep Jangid"}, {"name": "Soumyabrata Saha"}, {"name": "Kapil Sharma"}, {"name": "Jitendra Kethepalli"}, {"name": "Benjamin Guiselin"}, {"name": "Jacopo De Nardis"}, {"name": "Tridib Sadhu"}], "featured_authors": [{"name": "Sandeep Jangid"}, {"name": "Soumyabrata Saha"}, {"name": "Kapil Sharma"}, {"name": "Benjamin Guiselin"}, {"name": "Jacopo De Nardis"}, {"name": "Tridib Sadhu"}], "author_count": 7}, {"id": "2607.13134", "category": "hep-th", "title": "Magic without a phase: phase-independent stabilizer Rényi entropy in gluon scattering", "abstract": "Magic, also known as non-stabilizerness, measures the usefulness of a quantum state for quantum computation. While magic is defined relative to a choice of computational basis, in some physical settings the available data determine this basis only up to local phase conventions. In this paper, we generalize the notion of magic and formulate it in a phase-independent manner, and hence define a generalized stabilizer Rényi entropy. As a case study, we consider higher-multiplicity tree-level gluon scattering, interpreting the outgoing helicities as qubits. In this setting, the helicity data naturally determine a local basis for each qubit but leave a phase ambiguity. For $3\\to 2$ scattering, we find that the final-state phase-independent magic is generically larger than the maximum attainable in $2\\to 2$ scattering. For $2 \\to 3$ scattering, we find a nonzero minimal value approached in the soft limit. Moreover, when the three outgoing momenta become symmetric, the magic approaches a local minimum only a few percent above the soft-limit value. In all cases considered, the color dependence cancels from the phase-independent stabilizer Rényi entropy.", "url": "https://arxiv.org/abs/2607.13134", "type": "理论", "summary": "魔法，也称为非稳定器，衡量量子态对于量子计算的有用性。虽然魔法是相对于计算基础的选择来定义的，但在某些物理设置中，可用数据仅根据局部相位约定来确定该基础。在本文中，我们概括了魔法的概念，并以与相位无关的方式表述它，从而定义了广义稳定器 Rényi 熵。作为一个案例研究，我们考虑更高多重性的树级胶子散射，将传出的螺旋解释为量子位。在这种设置中，螺旋度数据自然地确定每个量子位的局部基础，但留下相位模糊性。对于 $3\\to 2$ 散射，我们发现最终状态的相位无关魔力通常大于 $2\\to 2$ 散射中可达到的最大值。对于 $2 \\to 3$ 散射，我们发现在软限制中接近非零最小值。此外，当三个传出动量变得对称时，魔力接近局部最小值，仅比软极限值高几个百分点。在考虑的所有情况下，颜色相关性抵消了与相位无关的稳定剂 Rényi 熵。", "authors": [{"name": "Jinwei Chu"}, {"name": "Savan Kharel"}], "featured_authors": [{"name": "Jinwei Chu"}, {"name": "Savan Kharel"}], "author_count": 2}, {"id": "2607.13137", "category": "hep-th", "title": "Out-of-time-ordered Correlators in de Sitter Revisited", "abstract": "We study the 4-point out-of-time-ordered correlator (OTOC) of scalar fields using the eikonal approximation to gravity around a de Sitter background. It can be defined in a gauge-invariant way by dressing the operators to an observer. We consider de Sitter space in any dimension and any bulk masses of the scalar fields. At tree level we find the maximal Lyapunov exponent of $2 \\pi/\\beta_{\\rm dS}$. However, we describe an IR problem in this calculation at the loop level associated with the vector part of the graviton propagator. Regularizing this divergence leads to the vanishing of all odd powers in Newton's constant in the asymptotic expansion, so that the leading answer comes with twice the maximal Lyapunov exponent in simple operator configurations. We find that the perturbative OTOC in de Sitter can initially grow, which is not allowed by the quantum bound on chaos. Interestingly, we find that this growth is mediated by large diffeomorphisms in the graviton propagator.", "url": "https://arxiv.org/abs/2607.13137", "type": "理论", "summary": "我们使用德西特背景周围重力的映似近似来研究标量场的 4 点乱序相关器 (OTOC)。它可以通过将操作员打扮成观察者来以规范不变的方式定义。我们考虑任意维度和任意块质量的标量场的德西特空间。在树级别，我们找到 $2 \\pi/\\beta_{\\rm dS}$ 的最大李雅普诺夫指数。然而，我们在此计算中描述了与引力子传播器的矢量部分相关的循环级别的 IR 问题。正则化这种散度会导致渐近展开中牛顿常数的所有奇次幂消失，因此在简单算子配置中，主要答案的最大李雅普诺夫指数是两倍。我们发现德西特中的微扰 OTOC 最初可以增长，这是混沌量子界限所不允许的。有趣的是，我们发现这种增长是由引力子传播器中的大微分同胚介导的。", "authors": [{"name": "Alexey Milekhin"}, {"name": "Vladimir Narovlansky"}, {"name": "Jiuci Xu"}], "featured_authors": [{"name": "Alexey Milekhin"}, {"name": "Vladimir Narovlansky"}, {"name": "Jiuci Xu"}], "author_count": 3}, {"id": "2607.13140", "category": "hep-th", "title": "From Fredholm Determinants to AdS/CFT Observables: A Universal Strong-Coupling Framework", "abstract": "We investigate the trans-series structure of the cusp anomalous dimension of $\\mathcal{N}=4$ supersymmetric Yang-Mills theory and the dynamically generated mass gap of the $\\mathrm{O}(6)$ sigma model at strong 't Hooft coupling. We consider the one-parameter deformation of the cusp anomalous dimension, known as the tilted cusp, and review its strong-coupling expansion obtained through its representation in terms of Fredholm determinants with a matrix Bessel kernel. The advantage of this deformation is that the non-perturbative scales separate naturally, revealing structures that remain hidden in the physical limit. Motivated by this observation, we introduce the tilted mass gap, which reduces to the physical $\\mathrm{O}(6)$ mass gap at a special value of the deformation parameter and exhibits a deep connection with the tilted cusp. This formulation allows us to determine the complete strong-coupling trans-series and resurgence structure of the $\\mathrm{O}(6)$ mass gap, while extending and proving conjectured relations between successive non-perturbative corrections. Building on the underlying Fredholm determinant representation, we construct an Alien calculus that generates all non-perturbative sectors of these AdS/CFT observables directly from their perturbative expansions. Finally, we derive an exact all-orders relation between the strong-coupling trans-series of the $\\mathrm{O}(6)$ mass gap and the cusp anomalous dimension of planar $\\mathcal{N}=4$ supersymmetric Yang-Mills theory.", "url": "https://arxiv.org/abs/2607.13140", "type": "理论", "summary": "我们研究了 $\\mathcal{N}=4$ 超对称 Yang-Mills 理论的尖点反常维度的反序列结构以及 $\\mathrm{O}(6)$ sigma 模型在强 't Hooft 耦合下动态生成的质量间隙。我们考虑尖点异常维度的单参数变形（称为倾斜尖点），并回顾其通过用矩阵贝塞尔核的 Fredholm 行列式表示获得的强耦合展开。这种变形的优点是非微扰尺度自然分离，揭示了隐藏在物理极限中的结构。受这一观察的启发，我们引入了倾斜质量间隙，它在变形参数的特殊值下减少到物理 $\\mathrm{O}(6)$ 质量间隙，并表现出与倾斜尖点的深层联系。这个公式使我们能够确定 $\\mathrm{O}(6)$ 质量间隙的完整强耦合反序列和复兴结构，同时扩展和证明连续非微扰校正之间的猜想关系。\n\n基于底层的 Fredholm 行列式表示，我们构建了一个外星演算，直接从这些 AdS/CFT 可观测量的微扰展开中生成所有非微扰扇区。最后，我们推导了 $\\mathrm{O}(6)$ 质量隙的强耦合跨级数与平面 $\\mathcal{N}=4$ 超对称杨-米尔斯理论的尖点反常维度之间的精确全阶关系。", "authors": [{"name": "Bercel Boldis"}, {"name": "Dennis le Plat"}], "featured_authors": [{"name": "Bercel Boldis"}, {"name": "Dennis le Plat"}], "author_count": 2}, {"id": "2607.13228", "category": "hep-th", "title": "Some Remarks on the Spectral Geometry of the Gribov Horizon", "abstract": "We develop a local spectral framework for the Landau-gauge Gribov horizon that distinguishes gauge-orbit projection from degeneracy of the gauge-fixing Hessian. On a flat torus, spatially constant ghosts form a residual global-color kernel; after removal of this kernel, the reduced Faddeev--Popov operator is the normal Morse--Bott Hessian of the orbit-norm functional, whereas the covariant Laplacian defines the orthogonal connection. For the associated affine focal pencil, we prove a quadratic-form index theorem with a Morse--Bott endpoint. At a regular isolated crossing, the critical projector $P$ and invertible compressed derivative $\\Gamma=P\\dot{\\mathcal{M}}P$ determine the spectral-flow jump and leading Laurent coefficient of the sourced ghost resolvent; for a simple zero, they also give the wall conormal. Crossings reached along affine rays from the positive region have negative-definite $\\Gamma$, including symmetry-protected multiplets, while a second Schur reduction determines pole orders along tangential paths. A projected single-harmonic model checks the projected Feynman--Hellmann relation. For an $SU(2)$ hedgehog on $\\mathbb R^3$, we construct a normalizable threshold state in every coupled spin--orbit channel and minimize over the full tower to obtain the exact stability interval $-2<g<1$. Dirichlet-box spectra approach these thresholds and serve as finite-volume comparisons; no numerical fit enters the continuum result.", "url": "https://arxiv.org/abs/2607.13228", "type": "理论", "summary": "我们为朗道规范 Gribov 视界开发了一个局部光谱框架，该框架将规范轨道投影与规范固定 Hessian 的简并性区分开来。在平坦的环面上，空间恒定的重影形成剩余的全局颜色内核；去除该核后，简化的 Faddeev--Popov 算子是轨道范数函数的正常 Morse--Bott Hessian 算子，而协变拉普拉斯算子定义了正交连接。对于相关的仿射焦点铅笔，我们证明了具有 Morse--Bott 端点的二次型指数定理。在规则的孤立交叉处，临界投影仪 $P$ 和可逆压缩导数 $\\Gamma=P\\dot{\\mathcal{M}}P$ 确定源鬼解析的谱流跳跃和领先洛朗系数；对于简单的零，他们还给出了墙的共法线。沿仿射射线从正区域到达的交叉点具有负定 $\\Gamma$，包括对称保护的多重态，而第二个 Schur 约简则确定沿切向路径的极阶。投影单谐波模型检查投影费曼-赫尔曼关系。\n\n对于 $\\mathbb R^3$ 上的 $SU(2)$ 刺猬，我们在每个耦合的自旋轨道通道中构造一个可归一化的阈值状态，并在整个塔上最小化以获得精确的稳定区间 $-2<g<1$。狄利克雷盒光谱接近这些阈值并用作有限体积比较；没有数值拟合进入连续体结果。", "authors": [{"name": "Daniel G. Tedesco"}], "featured_authors": [{"name": "Daniel G. Tedesco"}], "author_count": 1}, {"id": "2607.13321", "category": "hep-th", "title": "Worldline representation of multiloop amplitudes in quantum electrodynamics", "abstract": "The worldline approach to quantum electrodynamics allows one to construct integral representations combining large numbers of Feynman diagrams. Here I review the state-of-the-art of a long-term effort to make this fact useful for actual multiloop calculations, such as of the scalar and spinor QED vacuum polarization functions and the electron anomalous magnetic moment. After a short historical introduction, and a discussion of the non-standard mathematical challenges involved, I focus on a recent calculation of the two-loop vacuum polarisation in scalar QED and some master integral formulas obtained in this context.", "url": "https://arxiv.org/abs/2607.13321", "type": "理论", "summary": "量子电动力学的世界范围方法允许人们构建结合大量费曼图的积分表示。在这里，我回顾了长期努力的最新成果，以使这一事实可用于实际的多环计算，例如标量和旋量 QED 真空极化函数以及电子反常磁矩。在简短的历史介绍以及对所涉及的非标准数学挑战的讨论之后，我重点介绍了标量 QED 中双环真空极化的最新计算以及在此背景下获得的一些主要积分公式。", "authors": [{"name": "Victor M. Banda Guzmán"}, {"name": "Uwe Müller"}, {"name": "Cristofer Nava Jacuinde"}, {"name": "Christian Schubert"}, {"name": "Carlos J. Servin Tomas"}], "featured_authors": [{"name": "Victor M. Banda Guzmán"}, {"name": "Uwe Müller"}, {"name": "Cristofer Nava Jacuinde"}, {"name": "Christian Schubert"}, {"name": "Carlos J. Servin Tomas"}], "author_count": 5}, {"id": "2607.13412", "category": "hep-th", "title": "An adaptive inverse-problem framework for one-loop five-gluon BCJ numerators", "abstract": "An inverse problem comprises a matrix equation together with its unknown space, physical data, equivalence relation, and validation tests. We formulate Bern--Carrasco--Johansson (BCJ) numerator construction as an exact adaptive inverse problem. A fixed scientific specification determines the theory, graph conventions, coefficient field, locality and power counting, cut data, observable equivalence, and independent checks. Each finite working specification compiles to $\\mathcal{P}_\\sigma=(A,b;\\mathcal{S};\\mathcal{T})$, where $Ax=b$ reconstructs numerator coefficients, $\\mathcal{S}$ classifies the solution fiber, and $\\mathcal{T}$ tests it on held-out information. Left-null obstructions identify candidate numerator-basis directions needed for consistency, while the action of candidate measurements on the right kernel identifies informative new cut equations. We illustrate these steps by hand at four points and apply them to one-loop five-gluon pure Yang--Mills theory. After kinematic and graph-symmetry reduction, the candidate numerator basis contains 1127 independent coordinates. The combined maximal, box, triple, and double cuts have rank 920, giving a 207-dimensional affine solution fiber. Exact reconstruction determines a particular solution and the complete ordered kernel. The specified $R_{12345}$ color-ring readout $\\mathcal{S}$ annihilates every kernel direction, so the full fiber represents one observable class. A published forward-limit numerator lies in this fiber, and fresh cuts, independent integral reductions, and helicity-amplitude benchmarks validate the result. Explicit search rules and agent interfaces can propose revisions. Deterministic compilation and exact evaluation assess each proposal.", "url": "https://arxiv.org/abs/2607.13412", "type": "理论", "summary": "反问题包括矩阵方程及其未知空间、物理数据、等价关系和验证测试。我们将 Bern-Carrasco-Johansson (BCJ) 分子构造公式化为精确自适应逆问题。固定的科学规范决定了理论、图形约定、系数域、局部性和幂计数、切割数据、可观察的等价性和独立检查。每个有限工作规范都会编译为 $\\mathcal{P}_\\sigma=(A,b;\\mathcal{S};\\mathcal{T})$，其中 $Ax=b$ 重建分子系数，$\\mathcal{S}$ 对解纤维进行分类，$\\mathcal{T}$ 在保留的信息上对其进行测试。左零障碍物识别一致性所需的候选分子基方向，而右核上的候选测量的作用识别信息丰富的新切割方程。我们在四个点上手工说明这些步骤，并将它们应用于单环五胶子纯阳-米尔斯理论。经过运动学和图形对称性约简后，候选分子基包含 1127 个独立坐标。\n\n组合的最大切割、盒切割、三重切割和双切割的等级为 920，给出 207 维仿射解纤维。精确重构决定了特定的解和完整的有序核。指定的 $R_{12345}$ 色环读数 $\\mathcal{S}$ 消除了每个内核方向，因此完整的光纤代表一个可观察的类别。已发布的前向极限分子位于该光纤中，新切割、独立积分约简和螺旋幅度基准验证了结果。显式搜索规则和代理界面可以提出修订建议。确定性编译和精确评估评估每个提案。", "authors": [{"name": "Lin Mai"}, {"name": "Yaobo Zhang"}], "featured_authors": [{"name": "Lin Mai"}, {"name": "Yaobo Zhang"}], "author_count": 2}, {"id": "2607.13620", "category": "hep-th", "title": "Kink collisions in a two-dimensional gravity model", "abstract": "We numerically study kink-antikink collisions in the self-gravitating $\\phi^4$ model coupled to the two-dimensional dilaton gravity theory proposed by Mann et al. The static kink solutions interpolate between an anti-de Sitter (AdS$_2$) region and a Minkowski region, and can be regarded as two-dimensional analogues of certain thick branes. By scanning the initial velocity for several gravitational couplings, we find that gravity modifies the scattering structure: the resonance windows shift toward higher initial velocities and become progressively narrower as the coupling $\\kappa$ increases, while the critical escape velocity increases mildly. A linear perturbation analysis further indicates possible long-lived resonant excitations in the weak-gravity regime, which may be associated with the persistence of bounce windows. The collisions further produce a clear geometrical response: the conformal factor decreases after the collision, corresponding to a contraction of the local proper spatial scale in the conformal gauge, and this effect becomes stronger for larger $\\kappa$. Meanwhile, the Ricci scalar develops transient peaks during kink encounters but remains finite in all simulations considered. Thus, in contrast to higher-dimensional thick-brane collisions, we find no evidence for spacetime singularity formation in this two-dimensional model.", "url": "https://arxiv.org/abs/2607.13620", "type": "理论", "summary": "我们数值研究了自引力 $\\phi^4$ 模型中的扭结-反扭结碰撞，该模型与 Mann 等人提出的二维膨胀引力理论相结合。静态扭结解插值在反德西特 (AdS$_2$) 区域和 Minkowski 区域之间，并且可以被视为某些厚膜的二维类似物。通过扫描几个引力耦合的初始速度，我们发现引力改变了散射结构：随着耦合 $\\kappa$ 的增加，共振窗口向更高的初始速度移动并逐渐变窄，而临界逃逸速度则略有增加。线性扰动分析进一步表明弱重力状态下可能存在长寿命的共振激发，这可能与弹跳窗口的持续存在有关。碰撞进一步产生清晰的几何响应：碰撞后共形因子减小，对应于共形规范中局部固有空间尺度的收缩，并且对于较大的$\\kappa$，这种效应变得更强。\n\n同时，里奇标量在扭结遭遇期间产生瞬态峰值，但在所有考虑的模拟中仍然有限。因此，与高维厚膜碰撞相比，我们在这个二维模型中没有发现时空奇点形成的证据。", "authors": [{"name": "Zhen-Tao He"}, {"name": "Yuan Zhong"}], "featured_authors": [{"name": "Zhen-Tao He"}, {"name": "Yuan Zhong"}], "author_count": 2}, {"id": "2607.13665", "category": "hep-th", "title": "A de Sitter Anti-Scrambling Algebra", "abstract": "We study the algebra of observables of a semiclassical observer in de Sitter space. When operators are time-evolved by a scrambling time, out-of-time-ordered correlation functions (OTOCs) receive corrections due to shockwave scattering near the cosmological horizon. When the observer's clock is treated classically, we show that the time advance effect implies the breakdown of the KMS condition for vacuum correlators of matter operators. When the observer's clock is quantized, this implies that the Hartle-Hawking state is not a trace on the resulting crossed-product algebra. We conjecture that the observer's algebra has a trivial commutant. When the time separation between operators exceeds the scrambling time, the OTOC decays to zero and a free product algebra emerges. We illustrate this using classical solutions of de Sitter JT gravity with shocks. We comment on how our results pose a challenge for observer-centric static patch holography.", "url": "https://arxiv.org/abs/2607.13665", "type": "理论", "summary": "我们研究德西特空间中半经典观察者的可观测量代数。当算子通过扰乱时间随时间演化时，乱序相关函数 (OTOC) 会因宇宙视界附近的冲击波散射而受到修正。当观察者的时钟被经典地对待时，我们表明时间提前效应意味着物质算符的真空相关器的 KMS 条件的崩溃。当观察者的时钟被量化时，这意味着哈特尔-霍金状态不是所得叉积代数上的痕迹。我们推测观察者的代数有一个平凡交换子。当操作员之间的时间间隔超过加扰时间时，OTOC 衰减到零，并且出现自由乘积代数。我们使用 de Sitter JT 重力与冲击的经典解决方案来说明这一点。我们评论了我们的结果如何对以观察者为中心的静态贴片全息术提出了挑战。", "authors": [{"name": "Wentao Cui"}, {"name": "David K. Kolchmeyer"}], "featured_authors": [{"name": "Wentao Cui"}, {"name": "David K. Kolchmeyer"}], "author_count": 2}, {"id": "2607.13673", "category": "hep-th", "title": "Deriving the $\\text{AdS}_3\\times\\text{S}^3\\times \\text{T}^4$ Quantum Spectral Curve I: Y-system and discontinuity relations", "abstract": "The mirror Thermodynamic Bethe Ansatz (TBA) describes the spectrum of $\\text{AdS}_3\\times\\text{S}^3\\times \\text{T}^4$ superstrings supported by a mixture of Ramond-Ramond (RR) and Neveu-Schwarz-Neveu-Schwarz (NSNS) flux. In recent years, a conjecture was put forward regarding the Quantum Spectral Curve (QSC) formulation in the Ramond-Ramond case. In this paper, we initiate the derivation of the Ramond-Ramond QSC from the mirror TBA equations. We describe the Y-system underlying the TBA and its discontinuity relations for pure-RR backgrounds. This provides the foundation for the derivation of the T-system and the Quantum Spectral Curve, which will be presented in a follow-up paper.", "url": "https://arxiv.org/abs/2607.13673", "type": "理论", "summary": "热力学 Bethe Ansatz (TBA) 镜像描述了由 Ramond-Ramond (RR) 和 Neveu-Schwarz-Neveu-Schwarz (NSNS) 通量混合支持的 $\\text{AdS}_3\\times\\text{S}^3\\times \\text{T}^4$ 超弦的频谱。近年来，人们对Ramond-Ramond案例中的量子谱曲线（QSC）公式提出了猜想。在本文中，我们从镜像 TBA 方程开始推导 Ramond-Ramond QSC。我们描述了 TBA 背后的 Y 系统及其纯 RR 背景的不连续关系。这为T系统和量子谱曲线的推导提供了基础，这将在后续论文中介绍。", "authors": [{"name": "Andrea Cavaglià"}, {"name": "Nicolò Primi"}, {"name": "Davide Polvara"}, {"name": "Alessandro Sfondrini"}, {"name": "Roberto Tateo"}], "featured_authors": [{"name": "Andrea Cavaglià"}, {"name": "Nicolò Primi"}, {"name": "Davide Polvara"}, {"name": "Alessandro Sfondrini"}, {"name": "Roberto Tateo"}], "author_count": 5}, {"id": "2607.13725", "category": "hep-th", "title": "An exact algorithm for U(N) matrix models in the gauge-invariant singlet sector", "abstract": "Matrix models appear as fundamental descriptions of M-theory and D-brane dynamics, and via the gauge/gravity duality their gauge-invariant, or singlet, sector describes the purely gravitational degrees of freedom in the holographic dual. We present a new exact algorithm for computing observables of bosonic U(N) matrix models in the gauge-invariant singlet sector. This sector is spanned by an orthogonal basis of Schur polynomials (for a single matrix) and restricted Schur polynomials (for multiple matrices), which diagonalizes the free Hamiltonian and provides a natural truncation of the Hilbert space by excitation number. Matrix elements of the interaction Hamiltonian, or any gauge-invariant observable, are evaluated through a group-theoretic reduction to cosets and double cosets of suitable subgroups of the symmetric group, together with character sums on the symmetric group. The resulting entries are closed-form polynomials in the gauge-group rank N, assembled from group-theoretic data that are precomputed once and can be reused for any N and any coupling constants. We validate the one-matrix implementation against the exact mapping to N non-interacting fermions, demonstrating rapid convergence of the low-lying spectrum with the cutoff. The multi-matrix extension is outlined; its main bottleneck is the computation of restricted characters of the symmetric group, for which no algorithm comparable to the Murnaghan--Nakayama rule is currently known. The framework gives direct access to finite-N, finite-coupling dynamics of gauge-invariant states and opens a new computational window on the non-planar regime of holographic matrix models.", "url": "https://arxiv.org/abs/2607.13725", "type": "理论", "summary": "矩阵模型表现为 M 理论和 D 膜动力学的基本描述，并且通过规范/重力对偶性，它们的规范不变或单重态扇区描述了全息对偶中的纯重力自由度。我们提出了一种新的精确算法，用于计算规范不变单重态扇区中玻色子 U(N) 矩阵模型的可观测量。该扇区由 Schur 多项式（对于单个矩阵）和受限 Schur 多项式（对于多个矩阵）的正交基跨越，其对角化自由哈密顿量并通过激励数提供希尔伯特空间的自然截断。相互作用哈密顿量或任何规范不变可观测量的矩阵元素通过群论约简到对称群的合适子群的陪集和双陪集以及对称群上的特征和来评估。生成的条目是规范组秩 N 中的封闭式多项式，由预先计算一次的群论数据组装而成，并且可以针对任何 N 和任何耦合常数重复使用。\n\n我们根据 N 个非相互作用费米子的精确映射验证了单矩阵实现，证明了低位频谱与截止值的快速收敛。概述了多矩阵扩展；其主要瓶颈是对称群受限字符的计算，目前还没有与 Murnaghan-Nakayama 规则相媲美的算法。该框架可以直接访问规范不变态的有限 N、有限耦合动力学，并为全息矩阵模型的非平面体系打开了一个新的计算窗口。", "authors": [{"name": "Enrico M. Brehm"}, {"name": "Jean Cazalis"}], "featured_authors": [{"name": "Enrico M. Brehm"}, {"name": "Jean Cazalis"}], "author_count": 2}, {"id": "2607.13824", "category": "hep-th", "title": "Horizon Microstructure Thermodynamics in AdS Black Holes: Smarr-Consistent Excitation Enthalpy", "abstract": "In this work we formulate a horizon-microstructure description of four-dimensional AdS black holes in which a horizon of area $A$ is resolved into $\\mathcal{N}=A/a_p$ microscopic sites and $N$ occupied horizon sites. The central result is that the combinatorics of this partially occupied horizon sector yields the entropy directly: in the finite-filling regime the leading term is proportional to the area, and the maximal-entropy filling reproduces the Bekenstein--Hawking law with $a_p=4\\ln 2\\ \\ell_{p}^{2}$. Subleading corrections include a subtractive logarithmic term and an inverse-area expansion. We then show that this partially occupied regime admits a thermodynamic justification from an extended first law with chemical potential $\\mu$, a Smarr-consistent excitation enthalpy $\\delta M(A,P,N)$, and an AdS control parameter $u=PS$. In this interpretation, the combinatorics provides the dominant horizon entropy, while the thermodynamic sector supplies a dressing that selects the equilibrium filling and assigns a finite excitation cost to departures from a reference partially occupied configuration.", "url": "https://arxiv.org/abs/2607.13824", "type": "理论", "summary": "在这项工作中，我们制定了四维 AdS 黑洞的视界微观结构描述，其中 $A$ 区域的视界被解析为 $\\mathcal{N}=A/a_p$ 微观位点和 $N$ 占据视界位点。核心结果是，这个部分占据的视界扇区的组合直接产生熵：在有限填充状态下，首项与面积成正比，最大熵填充用 $a_p=4\\ln 2\\ \\ell_{p}^{2}$ 重现贝肯斯坦-霍金定律。次领先修正包括减法对数项和反面积展开。然后我们证明，这种部分占据的状态允许从具有化学势 $\\mu$ 的扩展第一定律、Smarr 一致的激发焓 $\\delta M(A,P,N)$ 和 AdS 控制参数 $u=PS$ 中进行热力学论证。在这种解释中，组合学提供了主要的水平熵，而热力学部分提供了选择平衡填充的选料，并为偏离参考部分占据配置分配了有限的激励成本。", "authors": [{"name": "Juan Diego Haro"}, {"name": "Ernesto Medina"}, {"name": "Bertrand Berche"}, {"name": "Pedro Bargueño"}, {"name": "Ernesto Contreras"}], "featured_authors": [{"name": "Juan Diego Haro"}, {"name": "Ernesto Medina"}, {"name": "Bertrand Berche"}, {"name": "Pedro Bargueño"}, {"name": "Ernesto Contreras"}], "author_count": 5}, {"id": "2607.13858", "category": "hep-th", "title": "Induced CFJ Term in nonlocal Lorentz-Violating QED: Natural Regularization from Entire Dirac Operators", "abstract": "We investigate the radiative generation of the Carroll--Field--Jackiw (CFJ) term in nonlocal Lorentz- and CPT-violating extensions of quantum electrodynamics. Nonlocality is introduced through entire nonlocal form factors being functions of the Dirac operator in the fermionic sector. Using the derivative expansion of the one-loop fermionic determinant, we derive the induced CFJ contribution and analyze its ultraviolet (UV) behavior after Wick rotation. For one class of nonlocal form factors, loop integrals become naturally convergent, yielding a finite CFJ coefficient without the need for an external UV regulator. For a second class, the coefficient is rendered finite through an Abel regularization prescription. In both cases, the CFJ structure is preserved while its coefficient is continuously deformed by the ratio between the fermion mass and the nonlocality scale. Our results demonstrate that nonlocality provides a natural framework for controlling UV contributions to radiatively induced topological terms.", "url": "https://arxiv.org/abs/2607.13858", "type": "理论", "summary": "我们研究了量子电动力学的非局域洛伦兹和 CPT 破坏扩展中卡罗尔场杰克 (CFJ) 项的辐射生成。非定域性是通过作为费米子扇区中狄拉克算子的函数的整个非定域形状因子引入的。利用单环费米子行列式的导数展开，我们推导了诱导 CFJ 贡献并分析了其在 Wick 旋转后的紫外 (UV) 行为。对于一类非局部形状因子，环路积分自然收敛，无需外部 UV 调节器即可产生有限的 CFJ 系数。对于第二类，通过阿贝尔正则化规定使系数变得有限。在这两种情况下，CFJ 结构都被保留，而其系数则根据费米子质量与非定域尺度之间的比率不断变形。我们的结果表明，非局域性提供了一个自然框架来控制紫外线对辐射诱导拓扑项的贡献。", "authors": [{"name": "J. R. Nascimento"}, {"name": "A. Yu. Petrov"}, {"name": "P. J. Porfirio"}, {"name": "Ramires N. da Silva"}], "featured_authors": [{"name": "J. R. Nascimento"}, {"name": "A. Yu. Petrov"}, {"name": "P. J. Porfirio"}, {"name": "Ramires N. da Silva"}], "author_count": 4}, {"id": "2607.13946", "category": "hep-th", "title": "Hodge numbers for orbifolds of Calabi-Yau threefolds Ferma type and the Roan pairs", "abstract": "First, for orbifolds of Calabi-Yau threefolds of Ferma type, we define Roan's Hodge numbers. We prove, Theorem 5.2, that for all orbifols of Calabi-Yau threefolds Ferma type, Roan's Hodge numbers correctly count the stringy Euler numbers due to Vafa formula. Second, for Calabi-Yau threefolds Ferma type, we apply Roan's Hodge numbers to get a relation between the Borcea-Voisin construction [Borcea, Voisin] and Betglund-Hübsch-Krawits mirror duality.", "url": "https://arxiv.org/abs/2607.13946", "type": "理论", "summary": "首先，对于 Ferma 类型的 Calabi-Yau 三重轨道折叠，我们定义 Roan 的 Hodge 数。我们证明，定理 5.2，对于 Calabi-Yau 三重 Ferma 类型的所有 Orbifols，Roan 的 Hodge 数由于 Vafa 公式正确地计算了弦欧拉数。其次，对于 Calabi-Yau 三重 Ferma 类型，我们应用 Roan 的 Hodge 数来获得 Borcea-Voisin 结构 [Borcea，Voisin] 和 Betglund-Hübsch-Krawits 镜像对偶性之间的关系。", "authors": [{"name": "S. Aleshin"}, {"name": "A. Belavin"}, {"name": "G. Koshevoy"}], "featured_authors": [{"name": "S. Aleshin"}, {"name": "A. Belavin"}, {"name": "G. Koshevoy"}], "author_count": 3}, {"id": "2607.14012", "category": "hep-th", "title": "Temporal Entanglement from Twist Correlators in 2d Conformal Field Theory and Holography", "abstract": "We formulate timelike entanglement entropy and its Rényi extension in two-dimensional conformal field theory through the analytic continuation of replica twist correlators to time-ordered, timelike-separated insertions. This field-theoretic construction grounds and generalizes recent developments, and applies to temporal subregions of arbitrary extent. Within three-dimensional holography, the semiclassical boundary correlator identifies boundary-anchored complex geodesics as the relevant bulk saddles and selects the one with the smallest real part of the length. This provides a direct boundary derivation of the proposed complex extremal surface prescription and extends to Rényi index $n>1$, for which we explicitly construct the corresponding complex cosmic brane geometry in the vacuum. We develop these ideas in several representative settings, including locally and globally excited states
