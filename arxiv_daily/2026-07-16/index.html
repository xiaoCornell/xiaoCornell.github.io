 and quantum operator quenches, making manifest the precise agreement between boundary twist correlator and bulk complex geodesic calculations. For AdS-Vaidya, our approach predicts a different result from earlier piecewise geodesic constructions, while reproducing the field theory answer. Across these examples, the operator ordering uniquely determines the imaginary part of the complex-valued entropy, which is quantized in units of $c\\pi/6$ and sensitive to the effective causal structure but not to the underlying dynamics.", "url": "https://arxiv.org/abs/2607.14012", "type": "理论", "summary": "我们通过复制扭曲相关器对时间有序、类时分离插入的解析延拓，在二维共形场论中制定了类时纠缠熵及其 Rényi 扩展。这种场论构造奠定了基础并概括了最近的发展，并适用于任意范围的时间子区域。在三维全息术中，半经典边界相关器将边界锚定的复杂测地线识别为相关的体鞍，并选择长度实部最小的鞍。这提供了所提出的复杂极值表面规定的直接边界推导，并扩展到 Rényi 指数 $n>1$，为此我们在真空中明确构造了相应的复杂宇宙膜几何形状。我们在几个代表性的设置中发展了这些想法，包括局部和全局激发态和量子算子淬灭，使边界扭曲相关器和体复杂测地线计算之间的精确一致性得以体现。对于 AdS-Vaidya，我们的方法预测了与早期分段测地线构造不同的结果，同时再现了场论答案。\n\n在这些示例中，运算符排序唯一地确定了复值熵的虚部，该熵以 $c\\pi/6$ 为单位进行量化，并且对有效因果结构敏感，但对底层动态不敏感。", "authors": [{"name": "Alice Bernamonti"}, {"name": "Federico Galli"}, {"name": "Michal P. Heller"}, {"name": "Fabio Ori"}, {"name": "Alexandre Serantes"}], "featured_authors": [{"name": "Alice Bernamonti"}, {"name": "Federico Galli"}, {"name": "Michal P. Heller"}, {"name": "Fabio Ori"}, {"name": "Alexandre Serantes"}], "author_count": 5}, {"id": "2607.14020", "category": "hep-th", "title": "Resurgent Lambert series from Feynman and beyond", "abstract": "Lambert series of the form $\\sum_{n>0}a(n)q^n/(1-q^n)$ are ubiquitous in mathematical physics. In particular, 2-loop sunrise and 3-loop banana Feynman diagrams yield Lambert series with $a(n)$ of the form $\\chi(n)/n^s$ where $\\chi(n)$ is a Dirichlet character. Resurgence concerns the singular limit as $|q|$ approaches 1. In the Feynman cases we can control this limit, obtaining rapidly convergent expressions, since the Lambert series are iterated integrals of holomorphic Eisenstein series twisted by a character. We generalize this result, to include modular resurgent structures found in topological-string observables.", "url": "https://arxiv.org/abs/2607.14020", "type": "理论", "summary": "$\\sum_{n>0}a(n)q^n/(1-q^n)$ 形式的朗伯级数在数学物理中无处不在。特别是，2 环日出图和 3 环香蕉费曼图产生兰伯特级数，其中 $a(n)$ 的形式为 $\\chi(n)/n^s$，其中 $\\chi(n)$ 是狄利克雷字符。复兴涉及到 $|q|$ 接近 1 时的奇异极限。在费曼情况下，我们可以控制这个极限，获得快速收敛的表达式，因为兰伯特级数是由一个字符扭曲的全纯爱森斯坦级数的迭代积分。我们概括了这个结果，以包括在拓扑弦可观测量中发现的模块化复兴结构。", "authors": [{"name": "David Broadhurst"}, {"name": "Daniele Dorigoni"}], "featured_authors": [{"name": "David Broadhurst"}, {"name": "Daniele Dorigoni"}], "author_count": 2}, {"id": "2607.14042", "category": "hep-th", "title": "Negative shocks versus static patch holography", "abstract": "We study a version of de Sitter static patch holography in which the Euclidean gravitational path integral, with an observer worldline included, is conjectured to compute a trace. Motivated by recent evidence for this conjecture from the sphere path integral, we test it further by inserting operators along the observer worldline and computing two-point functions and out-of-time-ordered four-point correlators (OTOCs). We extend an earlier OTOC calculation by Kolchmeyer and Liu using the shockwave formalism, incorporating both observer recoil and gravitational backreaction. We find that the OTOC conflicts with two basic properties of a trace in a Hilbert space: cyclicity and positivity. The signaling feature of the shockwave geometry gives rise to two distinct resummations of the perturbative eikonal expansion, which are interchanged by cyclicity. Positivity is violated by the fact that the leading perturbative contribution causes the (regularized) OTOC to increase.", "url": "https://arxiv.org/abs/2607.14042", "type": "理论", "summary": "我们研究了德西特静态斑片全息术的一个版本，其中推测欧几里得引力路径积分（包括观察者世界线）来计算轨迹。受来自球体路径积分的这一猜想的最新证据的启发，我们通过沿着观察者世界线插入算子并计算两点函数和乱序四点相关器（OTOC）来进一步测试它。我们使用冲击波形式扩展了 Kolchmeyer 和 Liu 早期的 OTOC 计算，结合了观察者反冲和重力反作用。我们发现 OTOC 与希尔伯特空间中迹的两个基本属性相冲突：循环性和正性。冲击波几何结构的信号特征产生了微扰征像膨胀的两个不同的恢复，它们通过循环互换。主导扰动贡献会导致（正则化）OTOC 增加，这一事实违反了正性。", "authors": [{"name": "Yiming Chen"}, {"name": "Douglas Stanford"}, {"name": "Haifeng Tang"}, {"name": "Zhenbin Yang"}], "featured_authors": [{"name": "Yiming Chen"}, {"name": "Douglas Stanford"}, {"name": "Haifeng Tang"}, {"name": "Zhenbin Yang"}], "author_count": 4}, {"id": "2607.13229", "category": "math-ph", "title": "Boundary Thermalization in Superdiffusive Energy Transport", "abstract": "We study energy transport in a finite one-dimensional unpinned harmonic chain with stochastic nearest-neighbor momentum exchanges and Langevin heat baths at its endpoints. Such systems are known to exhibit superdiffusive transport driven by long-wavelength acoustic modes, leading to fractional macroscopic behavior. While fractional heat equations have been rigorously derived for infinite chains, the corresponding boundary conditions for finite systems in contact with heat baths remain unclear due to the nonlocality of the fractional Laplacian. Under the superdiffusive time scaling $t\\sim n^{3/2}$, where $n$ is the system size, we prove that the averaged microscopic energy profile converges, as $n\\to+\\infty$, to a temperature field solving a fractional heat equation on $[0,1]$, with the generator given by a Neumann fractional Laplacian and additional nonlocal boundary terms induced by the heat baths. Our results provide a rigorous derivation of macroscopic boundary conditions for superdiffusive heat transport in open chains and introduce new boundary conditions for fractional Laplacians, that are motivated by a physical model.", "url": "https://arxiv.org/abs/2607.13229", "type": "理论", "summary": "我们研究有限一维无固定谐波链中的能量传输，其端点具有随机最近邻动量交换和朗之万热浴。已知此类系统表现出由长波长声学模式驱动的超扩散传输，从而导致分数宏观行为。虽然已经严格推导了无限链的分数热方程，但由于分数拉普拉斯算子的非定域性，与热浴接触的有限系统的相应边界条件仍然不清楚。在超扩散时间尺度 $t\\sim n^{3/2}$ 下，其中 $n$ 是系统尺寸，我们证明平均微观能量分布收敛为 $n\\to+\\infty$，在 $[0,1]$ 上求解分数热方程的温度场，生成器由诺伊曼分数拉普拉斯算子和由热浴引起的附加非局部边界项给出。我们的结果为开链中超扩散热传输的宏观边界条件提供了严格的推导，并为分数拉普拉斯引入了新的边界条件，这是由物理模型驱动的。", "authors": [{"name": "Tomasz Komorowski"}, {"name": "Stefano Olla"}], "featured_authors": [{"name": "Tomasz Komorowski"}, {"name": "Stefano Olla"}], "author_count": 2}, {"id": "2607.13349", "category": "math-ph", "title": "Spectral Analysis and Liouville-Green Asymptotics for a Radial Sturm-Liouville Operator with Variable Coefficients", "abstract": "We investigate a radially symmetric initial-boundary value problem whose separation of variables leads to a regular self-adjoint Sturm-Liouville problem with explicitly determined coefficients and a positive weight function. The resulting Sturm-Liouville operator is defined by a special geometry-induced coefficient pair that gives rise to a nonstandard weighted spectral structure. The associated radial operator possesses a discrete real spectrum and a complete orthonormal system of eigenfunctions in the corresponding weighted Hilbert space, yielding an exact spectral representation of the evolution problem. An exact transcendental spectral equation governing the eigenvalues is derived. To analyze the high-frequency regime, the Liouville-Green transformation is applied directly to the radial Sturm-Liouville equation. This yields explicit asymptotic formulas for the eigenvalues and eigenfunctions together with corresponding Liouville-Green quasimodes. Their weighted orthogonality properties and asymptotic completeness are established within the spectral framework of the exact operator. The resulting asymptotic spectral data are used to construct approximate solutions of the original boundary-value problem and to obtain error estimates for the spectral reconstruction. Numerical computations of the exact Sturm-Liouville spectrum show excellent agreement with the Liouville-Green predictions, thereby validating the asymptotic quantization formula and confirming the accuracy of the proposed spectral approximation.", "url": "https://arxiv.org/abs/2607.13349", "type": "理论", "summary": "我们研究了一个径向对称的初始边界值问题，该问题的变量分离导致了一个具有明确确定的系数和正权重函数的常规自伴 Sturm-Liouville 问题。由此产生的 Sturm-Liouville 算子由特殊的几何诱导系数对定义，该系数对产生非标准加权谱结构。相关的径向算子在相应的加权希尔伯特空间中拥有离散实数谱和完整的正交本征函数系统，从而产生演化问题的精确谱表示。导出了控制特征值的精确超越谱方程。为了分析高频状态，将刘维尔-格林变换直接应用于径向 Sturm-Liouville 方程。这产生了特征值和特征函数以及相应的刘维尔-格林准模态的显式渐近公式。它们的加权正交性和渐近完整性是在精确算子的谱框架内建立的。\n\n由此产生的渐近谱数据用于构造原始边值问题的近似解并获得谱重建的误差估计。准确的 Sturm-Liouville 谱的数值计算显示与 Liouville-Green 预测非常一致，从而验证了渐近量化公式并确认了所提出的谱近似的准确性。", "authors": [{"name": "Victor S. Gerasimchuk"}, {"name": "Bohdan O. Yevdokymenko"}, {"name": "Igor V. Gerasimchuk"}], "featured_authors": [{"name": "Victor S. Gerasimchuk"}, {"name": "Bohdan O. Yevdokymenko"}, {"name": "Igor V. Gerasimchuk"}], "author_count": 3}, {"id": "2607.13765", "category": "math-ph", "title": "Perturbative algebraic quantum field theory with smoothened boundary", "abstract": "We formulate quantisation of gauge field theories on globally hyperbolic Lorentzian manifolds with marked hypersurfaces within the framework of perturbative algebraic quantum field theory (pAQFT) enriched by the Batalin, Fradkin, Vilkovisky formalism (BV/BFV). This allows one to incorporate some crucial aspects of the local functorial approach to gauge field theory on manifolds with boundary within the algebraic setting. In particular, we provide a pAQFT-formulation of the modified classical and quantum master equations (after Cattaneo, Mnev and Reshetikhin CMR), as well as a constructive way to build a renormalised quantum BFV operator correcting the failure of the Quantum Master Equation by means of boundary terms (in the appropriate sense). We find that the renormalised quantum homotopy dg Lie algebra arising from the Anomalous Master Ward Identity becomes curved when boundaries are considered. The failure of the quantum master equation is thus encoded by a nontrivial curvature term in an $L_\\infty$ algebra. As a byproduct, we recover previous results of Hollands' on the relation between the (boundary) BRST charge and the BV operator, and we recover CMR's ansatz for the quantum BFV operator at leading perturbative order on causal cylinders in Abelian Yang--Mills theory.", "url": "https://arxiv.org/abs/2607.13765", "type": "理论", "summary": "我们在由 Batalin、Fradkin、Vilkovisky 形式主义 (BV/BFV) 丰富的微扰代数量子场论 (pAQFT) 框架内，在具有标记超曲面的全局双曲洛伦兹流形上制定了规范场论的量化。这使得人们能够将局部函子方法的一些关键方面结合到代数设置内具有边界的流形上的规范场论中。特别是，我们提供了修改后的经典和量子主方程的 pAQFT 公式（在 Cattaneo、Mnev 和 Reshetikhin CMR 之后），以及构建重正化量子 BFV 算子的建设性方法，通过边界项（在适当的意义上）纠正量子主方程的失败。我们发现，当考虑边界时，由异常 Master Ward 恒等式产生的重正化量子同伦 dg 李代数变得弯曲。因此，量子主方程的失败由 $L_\\infty$ 代数中的非平凡曲率项进行编码。\n\n作为副产品，我们恢复了 Hollands 之前关于（边界）BRST 电荷与 BV 算子之间关系的结果，并且我们恢复了阿贝尔杨-米尔斯理论中因果圆柱上领先微扰阶的量子 BFV 算子的 CMR 拟似。", "authors": [{"name": "Kasia Rejzner"}, {"name": "Michele Schiavina"}], "featured_authors": [{"name": "Kasia Rejzner"}, {"name": "Michele Schiavina"}], "author_count": 2}, {"id": "2607.13871", "category": "math-ph", "title": "A Geometric Derivation of the Einstein Equations from the Causal Action Principle", "abstract": "The causal action principle for causal fermion systems is analyzed for a minimizing measure whose support is assumed to have the structure of a smooth manifold $\\tilde{M}$. The concept of osculating vacua is introduced. It is shown that the Lagrangian induces on $\\tilde{M}$ a Lorentzian metric. Moreover, the Euler-Lagrange equations of the causal action imply that the Ricci tensor must satisfy the Einstein equations of general relativity for an energy momentum tensor given in terms of a power expansion in the regularization length. The gravitational coupling constant is found to be the square of the regularization length. Our methods provide a systematic procedure for deriving corrections to the Einstein equations. The paper includes a self-contained introduction to causal variational principles and the causal action principle. Most geometric structures (connection, Riemannian metric and curvature) are introduced and analyzed in the general setting of causal variational principles for an arbitrary dimension of $\\tilde{M}$. The Lorentzian setting works only for causal fermion systems and is worked out only in four spacetime dimensions.", "url": "https://arxiv.org/abs/2607.13871", "type": "理论", "summary": "分析了因果费米子系统的因果作用原理的最小化测度，假设其支持具有光滑流形 $\\tilde{M}$ 的结构。引入了密切真空的概念。结果表明，拉格朗日在 $\\tilde{M}$ 上导出洛伦兹度量。此外，因果作用的欧拉-拉格朗日方程意味着对于以正则化长度的幂展开形式给出的能量动量张量，里奇张量必须满足广义相对论的爱因斯坦方程。发现引力耦合常数是正则化长度的平方。我们的方法提供了一个系统的程序来导出爱因斯坦方程的修正。本文包括对因果变分原理和因果作用原理的独立介绍。大多数几何结构（连接、黎曼度量和曲率）都是在$\\tilde{M}$任意维度的因果变分原理的一般设置中引入和分析的。洛伦兹设置仅适用于因果费米子系统，并且仅在四个时空维度上进行计算。", "authors": [{"name": "Felix Finster"}, {"name": "Christoph Krpoun"}], "featured_authors": [{"name": "Felix Finster"}, {"name": "Christoph Krpoun"}], "author_count": 2}, {"id": "2607.13953", "category": "math-ph", "title": "Log-Sobolev inequalities for boundary-driven anharmonic chains", "abstract": "We study the non-equilibrium steady state of a weakly anharmonic chain of $N$ oscillators driven at its boundary by Langevin thermostats at unequal temperatures. Under a perturbative weak-anharmonicity condition, we prove a full-gradient logarithmic Sobolev inequality whose constant is independent of the chain length $N$. For homogeneous pinned chains, an additional quantitative regularity assumption yields a boundary space-time logarithmic Sobolev inequality and relative-entropy decay on the same $O(N^3)$ relaxation time scale as the harmonic chain. The proof extracts a finite-dimensional Gaussian component from the boundary noise and compares conditional terminal-state laws by a change of variables. The estimates are uniform over bounded positive temperatures and require no near-equilibrium assumption on their difference.", "url": "https://arxiv.org/abs/2607.13953", "type": "理论", "summary": "我们研究了由朗之万恒温器在不等温度下在其边界驱动的 $N$ 振荡器的弱非谐波链的非平衡稳态。在微扰弱非调和条件下，我们证明了一个全梯度对数 Sobolev 不等式，其常数与链长 $N$ 无关。对于同质固定链，额外的定量规律性假设会在与谐波链相同的 $O(N^3)$ 弛豫时间尺度上产生边界时空对数 Sobolev 不等式和相对熵衰减。该证明从边界噪声中提取有限维高斯分量，并通过变量的变化来比较条件终端状态定律。这些估计值在有界正温度范围内是一致的，并且不需要对其差异进行近平衡假设。", "authors": [{"name": "Jianfeng Lu"}], "featured_authors": [{"name": "Jianfeng Lu"}], "author_count": 1}, {"id": "2607.13996", "category": "math-ph", "title": "Real Fluid Quasi-Conservative Method: Mechanical Equilibrium Mechanism and Liquid-Upwind Anomaly", "abstract": "From the perspective of continuum thermodynamics, we revisit the pressure oscillation problem in finite-volume methods for real fluids and clarify the physical counterpart of the Real Fluid Quasi-Conservative (RFQC) method. The RFQC method recovers the mechanical-equilibrium pressure by evolving the affine parameters xi and E0 of the isentropic internal energy-pressure relation along pathlines, while the thermodynamic re-projection converts the deviation from the isentropic trajectory into an internal-energy error, thereby ensuring the thermodynamic consistency and numerical stability of the method. We then investigate the applicability limit of the RFQC method and identify a Liquid-upwind Anomaly (LUA) in extreme phase-change cases. For a Riemann problem involving liquid-vapor phase change, a numerical anomaly may occur if a liquid-upwind translational velocity is initially superimposed and exceeds a certain threshold. Theoretical analysis reveals that this anomaly is initiated by the orders-of-magnitude jump in the affine slope xi during phase change, which subsequently delays the pressure rise in the downstream low-pressure cell. Concurrently, the re-projection equivalently removes the positive pressure increment. As a result, a large re-projection internal-energy error is repeatedly generated in this anomalous cell, and the cell is trapped in a cycle of delayed low-pressure recovery. The analysis indicates that the LUA is a start-up anomaly, which can be resolved by introducing a regularization strategy at the initial discontinuity. With the proposed regularization strategy, the RFQC method is equipped with enhanced accuracy and robustness for extreme thermodynamic flows, such as sonic phase-change jets.", "url": "https://arxiv.org/abs/2607.13996", "type": "理论", "summary": "从连续介质热力学的角度，我们重新审视了真实流体有限体积方法中的压力振荡问题，并阐明了真实流体准保守（RFQC）方法的物理对应物。 RFQC方法通过沿路径演化等熵内能-压力关系的仿射参数xi和E0来恢复机械平衡压力，而热力学重投影则将等熵轨迹的偏差转化为内能误差，从而保证了该方法的热力学一致性和数值稳定性。然后，我们研究 RFQC 方法的适用性限制，并在极端相变情况下识别液体逆风异常 (LUA)。对于涉及液-汽相变的黎曼问题，如果液体-逆风平移速度最初叠加并超过某个阈值，则可能会出现数值异常。理论分析表明，这种异常现象是由相变期间仿射斜率xi 的数量级跳跃引起的，从而延迟了下游低压单元的压力上升。\n\n同时，重新投影等效地消除了正压力增量。结果，在该异常电池中反复产生较大的重投影内能误差，并使该电池陷入延迟低压恢复的循环中。分析表明，LUA属于启动异常，可以通过在初始不连续处引入正则化策略来解决。通过所提出的正则化策略，RFQC 方法对于极端热力学流动（例如声速相变射流）具有更高的准确性和鲁棒性。", "authors": [{"name": "Bai Haotong"}, {"name": "Yang Yixin"}, {"name": "Xie Wenjia"}, {"name": "Yi Ping"}, {"name": "Sun Mingbo"}], "featured_authors": [{"name": "Bai Haotong"}, {"name": "Yang Yixin"}, {"name": "Xie Wenjia"}, {"name": "Yi Ping"}, {"name": "Sun Mingbo"}], "author_count": 5}, {"id": "2607.13053", "category": "quant-ph", "title": "On multipoles, their decomposition by time-reversal symmetry, and the electric toroidal monopole", "abstract": "The multipole decomposition of the single-site density matrix provides a symmetry-adapted representation of local electronic degrees of freedom. Conventional, so-called fixed-shell, formulations do not span the full local single-particle operator space, as only operators mapping within the same orbital $l$ are resolved. Here we construct a complete orthogonal basis of real Hermitian multipole operators for the local density matrix by extending the existing formulation to inter-shell operators. We revisit the multipole decomposition as a decomposition of the operator space by $\\mathrm{SO}(3)$ by first decomposing the orbital and spin operator spaces. Then by coupling them we arrive at the spin-$\\frac{1}{2}$ local single-particle operator space, staying consistent with the existing fixed-shell formulations. We then classify the multipoles by parity and time-reversal symmetry, which allows for unique identification of multipole moments of the density matrix that contribute to expectation values of fully symmetry-resolved observables. As an application, we analyze the two enantiomers of chiral trigonal tellurium by computing the electric toroidal monopole moment selected by symmetry.", "url": "https://arxiv.org/abs/2607.13053", "type": "理论+数值", "summary": "单点密度矩阵的多极分解提供了局部电子自由度的对称适应表示。传统的所谓固定壳公式不跨越完整的局部单粒子算子空间，因为仅解析映射在同一轨道 $l$ 内的算子。在这里，我们通过将现有公式扩展到壳间算子来构造局部密度矩阵的实厄米多极算子的完整正交基。我们通过首先分解轨道和自旋算子空间，将多极分解重新视为算子空间的分解 $\\mathrm{SO}(3)$ 。然后通过耦合它们，我们到达 spin-$\\frac{1}{2}$ 局部单粒子算子空间，与现有的固定壳公式保持一致。然后，我们通过奇偶性和时间反演对称性对多极子进行分类，这允许唯一地识别密度矩阵的多极矩，这些矩有助于完全对称分辨的可观测量的期望值。作为一个应用，我们通过计算对称性选择的电环形单极矩来分析手性三角碲的两种对映体。", "authors": [{"name": "Vinzenz A. Müller"}, {"name": "Nora Taufertshöfer"}, {"name": "Nicola A. Spaldin"}], "featured_authors": [{"name": "Vinzenz A. Müller"}, {"name": "Nora Taufertshöfer"}, {"name": "Nicola A. Spaldin"}], "author_count": 3}, {"id": "2607.13062", "category": "quant-ph", "title": "The verifier side of speculative window decoding: a predictability bracket, a machine-checked blast-radius bound, and a decoder-agnostic recover loop", "abstract": "Speculative window decoders hide quantum error-correction decoder latency by guessing the cross-boundary decisions that link adjacent decoding windows, running downstream work on the guess, and verifying lazily. SWIPER and ARTERY each build one predictor, about 90% accurate; neither built the verifier side. We build it on a reconstructed SWIPER harness (Stim rotated surface code, minimum-weight matching). A predictor-only bracket shows the cross-boundary decision is local, the achievable accuracy reaching about 0.999 within three rounds, with small, diffuse headroom over SWIPER. We establish a worst-case temporal blast-radius bound, its probability core machine-checked in Lean4 and conditional on a modeling reduction we then test: a misprediction's effect decays exponentially in the commit width, so the radius is one and speculation adds no error floor. We falsify that reduction shot by shot and find the real mechanism, clearest at near-threshold noise, is a global minimum-weight re-pairing. A compiler pass derives SWIPER's restart policy from these numbers; a runtime executor confirms on the harness that the loop recovers exactly and removes the serial commit-chain stall up to a small penalty. A second decoder (union-find) settles which results are decoder-agnostic: the predict-verify-recover wrapper and the structural phenomenology, while the absolute magnitudes and the min-weight mechanism are matching-specific.", "url": "https://arxiv.org/abs/2607.13062", "type": "理论", "summary": "推测窗口解码器通过猜测链接相邻解码窗口的跨界决策、根据猜测运行下游工作并延迟验证来隐藏量子纠错解码器延迟。 SWIPER 和 ARTERY 各构建一个预测器，准确率约为 90%；都没有建立验证方。我们将其构建在重建的 SWIPER 线束（Stim 旋转表面代码、最小重量匹配）上。仅预测器支架显示跨界决策是局部的，在三轮内可实现的精度达到约 0.999，与 SWIPER 相比具有较小的分散空间。我们建立了最坏情况的时间爆炸半径界限，其概率核心在 Lean4 中进行了机器检查，并以我们随后测试的建模缩减为条件：错误预测的影响在提交宽度中呈指数衰减，因此半径为 1 并且推测不会增加错误底限。我们伪造了逐个镜头的减少，并发现在接近阈值噪声时最清晰的真正机制是全局最小权重重新配对。\n\n编译器通过这些数字得出 SWIPER 的重启策略；运行时执行器在工具上确认循环完全恢复，并删除串行提交链停顿，直至一个小的惩罚。第二个解码器（联合查找）确定哪些结果与解码器无关：预测-验证-恢复包装器和结构现象学，而绝对幅度和最小权重机制是特定于匹配的。", "authors": [{"name": "Rylan Malarchick"}], "featured_authors": [{"name": "Rylan Malarchick"}], "author_count": 1}, {"id": "2607.13096", "category": "quant-ph", "title": "Events as Spacetime Anchors: Local Irreversibility at the Interface of Quantum Field Theory and Relativity", "abstract": "General relativity (GR) is naturally organized around spacetime events and their causal order, whereas quantum field theory (QFT) is formulated in terms of states, operators, and unitary evolution, without an intrinsic criterion for when a quantum process becomes a definite spacetime fact. We propose an event-centered framework in which events are locally irreversible records generated by quantum-environment interactions and serve as an interface between quantum dynamics and relativistic spacetime structure. Event anchoring is characterized operationally by three jointly sufficient conditions: local classicalization, redundant environmental recording, and irreversibility against recovery. Their joint satisfaction defines local generative freezing. We realize these criteria in an explicit repeated-collision open-system model. The model is illustrative rather than a derivation from relativistic QFT, but it remains globally unitary and yields the freezing time in closed form. For all admissible tolerances, local classicalization is certified no later than channel-level irrecoverability, and generically earlier. Full anchoring occurs only when both irrecoverability and the required record redundancy have been reached, producing irrecoverability-limited and redundancy-limited regimes. At the level of anchored records, physical history is therefore represented as a partially ordered causal skeleton of frozen events on which effective field-theoretic descriptions operate. The framework addresses event anchoring--when a candidate outcome becomes a stable spacetime fact--while remaining compatible with standard QFT and relativistic causality. It does not derive the Born rule or solve single-outcome selection, which belong to the separate problem of event generation.", "url": "https://arxiv.org/abs/2607.13096", "type": "理论", "summary": "广义相对论（GR）自然地围绕时空事件及其因果顺序进行组织，而量子场论（QFT）是根据状态、算子和幺正演化来表述的，没有关于量子过程何时成为确定的时空事实的内在标准。我们提出了一个以事件为中心的框架，其中事件是由量子环境相互作用生成的局部不可逆记录，并充当量子动力学和相对论时空结构之间的接口。事件锚定在操作上具有三个共同充分条件的特征：局部经典化、冗余环境记录和恢复的不可逆性。他们的共同满足定义了局部生成冻结。我们在明确的重复碰撞开放系统模型中实现了这些标准。该模型是说明性的，而不是相对论 QFT 的推导，但它保持全局酉并产生封闭形式的冻结时间。对于所有允许的容差，局部经典化的认证不晚于通道级不可恢复性，并且通常更早。\n\n仅当达到不可恢复性和所需的记录冗余时才会发生完全锚定，从而产生不可恢复性限制和冗余限制制度。因此，在锚定记录的层面上，物理历史被表示为冻结事件的部分有序因果骨架，有效的场论描述在其上运行。该框架解决了事件锚定问题——当候选结果成为稳定的时空事实时——同时保持与标准 QFT 和相对论因果关系兼容。它不导出玻恩规则或解决单结果选择，属于事件生成的单独问题。", "authors": [{"name": "Shuo Zhang"}], "featured_authors": [{"name": "Shuo Zhang"}], "author_count": 1}, {"id": "2607.13105", "category": "quant-ph", "title": "Clifford-Only Quantum Reed-Solomon Codes and a Tornado Concatenation for Biased-Noise Cat Qubits", "abstract": "Dissipative cat qubits exponentially suppress one Pauli error channel with the mean photon number, leaving the conjugate bit-flip error as the dominant failure mode. This strong noise bias makes the full machinery of general quantum error correction unnecessary: a code need only protect against a single error type, and any classical linear code can be promoted to a Clifford stabilizer code that does exactly this. We use this observation to build a Clifford-only quantum Reed-Solomon (RS) code. Starting from the [7,3,5] RS code over $GF(2^{3})$ which is maximum distance separable, we expand each field symbol into three bits to obtain the [21,9,6] linear code over $GF(2)$, realized as a [[21,9, $d_{X}=6$, $d_{Z}=1$]] bit-flip code whose stabilizers are products of Z operators. Because no phase-flip correction is attempted, the construction avoids the non-Clifford quantum Fourier transform required by the Grassl-Beth quantum RS codes and is fully simulable in Stim. Errors are decoded by a lookup table of minimum-weight corrections. We then introduce a Tornado architecture: a two-layer concatenation that wraps every position of the outer RS code in an inner distance-three repetition code, yielding a [[63, 9, 18]] code decoded in two stages, a majority vote within each repetition block followed by the outer lookup table. Monte Carlo simulations show that at a physical bit-flip rate $p=0.1$ the Tornado code reaches a logical error rate $p_{L}\\approx5.3\\times10^{-3}$, below both parent codes, and that its logical error rate scales as $p_{L}\\propto p^{6}$ at low p, in contrast to $p^{2}$ for the repetition code and $p^{3}$ for the standalone RS code. We give the exact construction, the error and circuit model, an asymptotic scaling analysis, and an account of the overhead cost and of the assumptions behind the noise model.", "url": "https://arxiv.org/abs/2607.13105", "type": "理论+数值", "summary": "耗散猫量子位以平均光子数指数地抑制一个泡利误差通道，使共轭位翻转误差成为主要故障模式。这种强烈的噪声偏差使得通用量子纠错的完整机制变得不必要：代码只需要防止单一错误类型，并且任何经典线性代码都可以升级为 Clifford 稳定器代码，从而实现这一点。我们利用这一观察结果构建了仅克利福德量子里德所罗门（RS）代码。从最大距离可分的 $GF(2^{3})$ 上的 [7,3,5] RS 码开始，我们将每个字段符号扩展为三位，以获得 $GF(2)$ 上的 [21,9,6] 线性码，实现为 [[21,9, $d_{X}=6$, $d_{Z}=1$]] 位翻转码，其稳定器是 Z 运算符的乘积。由于没有尝试进行相位翻转校正，因此该构造避免了 Grassl-Beth 量子 RS 代码所需的非 Clifford 量子傅立叶变换，并且可以在 Stim 中完全模拟。错误通过最小权重校正的查找表进行解码。\n\n然后，我们引入 Tornado 架构：一个两层串联，将外部 RS 代码的每个位置包装在内部距离三重复代码中，产生分两个阶段解码的 [[63, 9, 18]] 代码，每个重复块内的多数投票，然后是外部查找表。蒙特卡洛模拟表明，在物理位翻转率 $p=0.1$ 下，Tornado 代码达到低于两个父代码的逻辑错误率 $p_{L}\\approx5.3\\times10^{-3}$，并且其逻辑错误率在低 p 时缩放为 $p_{L}\\propto p^{6}$，而重复代码的 $p^{2}$ 和独立 RS 的 $p^{3}$ 则相反代码。我们给出了精确的结构、误差和电路模型、渐近标度分析，以及开销成本和噪声模型背后的假设的说明。", "authors": [{"name": "Cheng-You Ho"}, {"name": "Justin Luo"}, {"name": "Henry Ng"}, {"name": "Simba Shi"}, {"name": "Daniel Wang"}], "featured_authors": [{"name": "Cheng-You Ho"}, {"name": "Justin Luo"}, {"name": "Henry Ng"}, {"name": "Simba Shi"}, {"name": "Daniel Wang"}], "author_count": 5}, {"id": "2607.13131", "category": "quant-ph", "title": "Ultraviolet structure of entanglement harvesting from energy density and other quadratic couplings", "abstract": "We study entanglement harvesting with particle detectors coupled to the renormalized energy density of a massless scalar field. Our analysis identifies the distributional mechanism underlying the persistent ultraviolet divergences previously observed for quadratic detector couplings and discusses that the energy density coupling exhibits the same underlying structure. We show that these divergences are entirely controlled by the switching correlation at coincident interaction times. Consequently, pointlike detectors are UV finite whenever the switchings do not overlap. For Gaussian-smeared detectors, the harvesting correlations are automatically finite in 1+1 and 2+1 dimensions, while in higher dimensions the remaining divergences are removed by non-overlapping switchings. Finally, we derive general expressions for arbitrary zero-mean Gaussian states and illustrate the formalism with a thermal field state.", "url": "https://arxiv.org/abs/2607.13131", "type": "理论", "summary": "我们研究了与无质量标量场的重整化能量密度耦合的粒子探测器的纠缠收获。我们的分析确定了先前在二次探测器耦合中观察到的持续紫外线发散背后的分布机制，并讨论了能量密度耦合表现出相同的基础结构。我们表明，这些分歧完全是由一致交互时间的切换相关性控制的。因此，只要切换不重叠，点状探测器就是 UV 有限的。对于高斯弥散检测器，收获相关性在 1+1 和 2+1 维度中自动有限，而在更高维度中，剩余的发散通过非重叠切换消除。最后，我们推导了任意零均值高斯态的一般表达式，并用热场态说明了形式。", "authors": [{"name": "Matheus H. Zambianco"}, {"name": "Boris Ragula"}, {"name": "Eduardo Martín-Martínez"}], "featured_authors": [{"name": "Matheus H. Zambianco"}, {"name": "Boris Ragula"}, {"name": "Eduardo Martín-Martínez"}], "author_count": 3}, {"id": "2607.13166", "category": "quant-ph", "title": "Robust Nonperturbative Trapped-Ion Quantum Logic", "abstract": "Entangling gates of trapped ions are typically mediated by collective motional degrees of freedom. Weak coupling between qubit and motional degrees of freedom and the resulting harmonic dynamics give access to a broad range of gate schemes, but also impose strict limitations on achievable gate times. In this paper, we devise optimally designed driving schemes for the realization of fast, high-fidelity entangling gates mediated by anharmonic dynamics. The driving can also be optimized to achieve resilience to multiple system imperfections, and the anharmonicity in the motional dynamics can be used to enhance such resilience.", "url": "https://arxiv.org/abs/2607.13166", "type": "数值", "summary": "被捕获离子的纠缠门通常由集体运动自由度介导。量子位和运动自由度之间的弱耦合以及由此产生的谐波动力学提供了广泛的门方案，但也对可实现的门时间施加了严格的限制。在本文中，我们设计了优化设计的驱动方案，以实现由非谐动力学介导的快速、高保真纠缠门。还可以优化驱动以实现对多个系统缺陷的弹性，并且运动动力学中的不和谐性可用于增强这种弹性。", "authors": [{"name": "Luca Stefanescu"}, {"name": "Florian Mintert"}], "featured_authors": [{"name": "Luca Stefanescu"}, {"name": "Florian Mintert"}], "author_count": 2}, {"id": "2607.13191", "category": "quant-ph", "title": "Two-Tower Quantum Matrix Chain Multiplication: Trading Qubits for Depth", "abstract": "Matrix chain multiplication -- computing $\\mathcal{W} = M^{(0)}\\cdots M^{(K-1)}$ where $M^{(k)} \\in \\mathbb{R}^{P_k \\times P_{k+1}}$ -- arises in scientific computing, machine learning, and graph analysis. Despite the importance of this problem, for chains of distinct matrices, the classical number of operations grows linearly with the chain length $K$ and polynomially in the matrix dimensions. We present \\emph{Two-Tower Matrix Multiplication}, a quantum subroutine that encodes the product $\\mathcal{W}$ of the $K$ matrices into a quantum state in circuit depth $\\mathcal{O}(\\max_{k} \\mathrm{polylog} (P_k P_{k+1}))$, which is independent of~$K$ within the QRAM-based state-preparation model, whereas the qubit count is $\\mathcal{O}\\bigl(\\sum_{k} \\log P_k \\bigr)$; the total gate count remains linear in $K$, so the gain is in the circuit depth. The construction interleaves state-preparation operators across two layers; within each layer, all operators act on disjoint registers and execute in parallel. This subroutine can be specialized for the chain-vector case, which computes the product of $K-1$ matrices applied to a vector. We prove the correctness of the subroutine for all $K$ and provide two implementations using the Qiskit and QCLAB frameworks. The subroutine is applicable to any downstream quantum algorithm that operates on a matrix encoded in the statevector, including norm estimation, graph-matrix powers, linear system solving, and quantum machine learning kernels.", "url": "https://arxiv.org/abs/2607.13191", "type": "理论+数值", "summary": "矩阵链乘法——计算$\\mathcal{W} = M^{(0)}\\cdots M^{(K-1)}$，其中$M^{(k)} \\in \\mathbb{R}^{P_k \\times P_{k+1}}$——出现在科学计算、机器学习和图形分析中。尽管这个问题很重要，但对于不同矩阵的链，经典的运算数量随链长度 $K$ 线性增长，并在矩阵维度中呈多项式增长。我们提出了 \\emph{双塔矩阵乘法}，一个量子子程序，它将 $K$ 矩阵的乘积 $\\mathcal{W}$ 编码为电路深度 $\\mathcal{O}(\\max_{k} \\mathrm{polylog} (P_k P_{k+1}))$ 的量子态，它独立于基于 QRAM 的状态准备模型中的~$K$，而量子位计数为$\\mathcal{O}\\bigl(\\sum_{k} \\log P_k \\bigr)$;总门数在 $K$ 中保持线性，因此增益取决于电路深度。该构造将状态准备运算符跨两层交错；在每一层中，所有运算符都作用于不相交的寄存器并并行执行。该子例程可以专门用于链向量情况，它计算应用于向量的 $K-1$ 矩阵的乘积。\n\n我们证明了所有 $K$ 子程序的正确性，并提供了使用 Qiskit 和 QCLAB 框架的两种实现。该子例程适用于对状态向量中编码的矩阵进行操作的任何下游量子算法，包括范数估计、图矩阵幂、线性系统求解和量子机器学习内核。", "authors": [{"name": "Giacomo Antonioli"}, {"name": "Anna Bernasconi"}, {"name": "Alessandro Berti"}, {"name": "Gianna M. Del Corso"}, {"name": "Alessandro Poggiali"}], "featured_authors": [{"name": "Giacomo Antonioli"}, {"name": "Anna Bernasconi"}, {"name": "Alessandro Berti"}, {"name": "Gianna M. Del Corso"}, {"name": "Alessandro Poggiali"}], "author_count": 5}, {"id": "2607.13198", "category": "quant-ph", "title": "An Information-Theoretic Characterization of Optimal Value-Readout in Response-Register Quantum Oracles", "abstract": "Response-register quantum oracles admit two complementary operational interpretations: value readout and phase kickback. Although their computational equivalence is well understood, the quantitative relation between these two operational interpretations has lacked an exact characterization. We prove that, for finite Abelian response groups, the optimal single-query value-readout probability is exactly the normalized Rényi-1/2 effective Fourier support of the response state. This identity provides an exact information-theoretic characterization of optimal value-readout capability, gives the Rényi-1/2 effective Fourier support a direct operational interpretation in the oracle setting, and yields a tight phase--value complementarity theorem together with an explicit family of saturating response states.", "url": "https://arxiv.org/abs/2607.13198", "type": "理论", "summary": "响应寄存器量子预言允许两种互补的操作解释：值读出和相位回扣。尽管它们的计算等价性很好理解，但这两种操作解释之间的定量关系缺乏精确的表征。我们证明，对于有限阿贝尔响应群，最优的单查询值读出概率正是响应状态的归一化 Rényi-1/2 有效傅立叶支持。该恒等式提供了最佳值读出能力的精确信息论表征，为 Rényi-1/2 有效傅里叶支持提供了预言设置中的直接操作解释，并产生了紧密的相位-值互补定理以及明确的饱和响应状态族。", "authors": [{"name": "Milad Ghadimi"}, {"name": "Hesam Soltanpanahi"}, {"name": "Vahid Salari"}], "featured_authors": [{"name": "Milad Ghadimi"}, {"name": "Hesam Soltanpanahi"}, {"name": "Vahid Salari"}], "author_count": 3}, {"id": "2607.13223", "category": "quant-ph", "title": "Comparing the three W-like states with the W state", "abstract": "In [Phy. Rev. Lett., 98, 260501 (2007)] and previous papers, the W-like states were used in many quantum communication schemes, distillation, teleportation and superdense coding. So far, no one has compared the W-like states with the W state. We investigate the properties of three W-like states named as $|\\vartheta ^{\\prime }\\rangle $, $|\\eta ^{\\prime }\\rangle $ and $|\\xi ^{\\prime }\\rangle $. We point out that $|\\vartheta ^{\\prime }\\rangle $ (resp. $|\\eta ^{\\prime }\\rangle $ and $|\\xi ^{\\prime }\\rangle $) has the maximal von Neumann entanglement entropy (vNEE) $S(\\rho _{A})=\\ln 2$ (resp. $S(\\rho _{B})=\\ln 2$ and $S(\\rho _{C})=\\ln 2$) and the maximal tangle $\\tau _{A(BC)}=1$ (resp. $\\tau _{B(AC)}=1$ and $\\tau _{C(AB)}=1$) while the W state does not. We also indicate that if some one of three qubits is traced out, then the remaining two qubits of $|\\vartheta ^{\\prime }\\rangle $ (resp. $|\\eta ^{\\prime }\\rangle $ and $|\\xi ^{\\prime }\\rangle $) are more entangled than the two qubits of the W state by several entanglement measures. It means that the three W-like states have higher robustness against some particle loss than the W state. We show that $|\\vartheta ^{\\prime }\\rangle $, $|\\eta ^{\\prime }\\rangle $ and $|\\xi ^{\\prime }\\rangle $ can be suitable for perfect teleportation and superdense coding but the W state cannot.", "url": "https://arxiv.org/abs/2607.13223", "type": "理论", "summary": "在[物理。 Rev. Lett., 98, 260501 (2007)] 和之前的论文中，类 W 态被用于许多量子通信方案、蒸馏、隐形传态和超密集编码中。到目前为止，还没有人将类W状态与W状态进行比较。我们研究了名为 $|\\vartheta ^{\\prime }\\rangle $、$|\\eta ^{\\prime }\\rangle $ 和 $|\\xi ^{\\prime }\\rangle $ 的三个类 W 态的性质。我们指出 $|\\vartheta ^{\\prime }\\rangle $ （分别为 $|\\eta ^{\\prime }\\rangle $ 和 $|\\xi ^{\\prime }\\rangle $）具有最大冯诺依曼纠缠熵 (vNEE) $S(\\rho _{A})=\\ln 2$ （分别为 $S(\\rho) _{B})=\\ln 2$ 和 $S(\\rho _{C})=\\ln 2$) 和最大缠结 $\\tau _{A(BC)}=1$（分别为 $\\tau _{B(AC)}=1$ 和 $\\tau _{C(AB)}=1$），而 W 状态则不然。我们还指出，如果追踪出三个量子位中的某个，则 $|\\vartheta ^{\\prime }\\rangle $ 的剩余两个量子位（分别为 $|\\eta ^{\\prime }\\rangle $ 和 $|\\xi ^{\\prime }\\rangle $）通过多种纠缠措施比 W 状态的两个量子位更加纠缠。这意味着三种类 W 态对于某些粒子损失比 W 态具有更高的鲁棒性。\n\n我们证明 $|\\vartheta ^{\\prime }\\rangle $、$|\\eta ^{\\prime }\\rangle $ 和 $|\\xi ^{\\prime }\\rangle $ 可以适合完美的隐形传态和超密集编码，但 W 状态不能。", "authors": [{"name": "Dafa Li"}], "featured_authors": [{"name": "Dafa Li"}], "author_count": 1}, {"id": "2607.13366", "category": "quant-ph", "title": "Quantum annealing in SU(3) multiplet space with nonlocal drivers", "abstract": "A theoretical framework for quantum annealing based on $\\mathfrak{su}(3)$ algebra is proposed, and applied to the problem of overcoming first-order transitions in rugged energy landscapes. Conservation of the Casimir invariant means that one can work with irreducible representations of $\\mathfrak{su}(3)$, avoiding the exponentially large Hilbert spaces of spin glass systems. In this framework, quantum drivers exhibit nonlocal properties in the sense that during annealing the wave function can be transported far away from a local minimum, thereby avoiding being trapped by it. We consider Hamiltonians with two quantum drivers and studied them numerically. It is shown that energy gap closures can be circumvented via a suitable path in the parameter space of the two drivers. Comparison with more traditional annealing driven by transverse field and antiferromagnetic operators suggests that $\\mathfrak{su}(3)$ drivers are more effective in attaining the global minimum of rugged energy landscapes.", "url": "https://arxiv.org/abs/2607.13366", "type": "理论+数值", "summary": "提出了基于 $\\mathfrak{su}(3)$ 代数的量子退火理论框架，并将其应用于克服崎岖能源景观中的一阶跃迁问题。卡西米尔不变量守恒意味着我们可以使用 $\\mathfrak{su}(3)$ 的不可约表示，避免自旋玻璃系统的指数大希尔伯特空间。在这个框架中，量子驱动器表现出非局域特性，即在退火过程中，波函数可以远离局部最小值，从而避免被其捕获。我们考虑具有两个量子驱动器的哈密顿量，并对它们进行数值研究。结果表明，可以通过两个驱动器参数空间中的合适路径来规避能隙闭合。与由横向场和反铁磁算子驱动的更传统的退火相比，$\\mathfrak{su}(3)$ 驱动器在实现崎岖能源景观的全局最小值方面更有效。", "authors": [{"name": "Yang Wei Koh"}], "featured_authors": [{"name": "Yang Wei Koh"}], "author_count": 1}, {"id": "2607.13374", "category": "quant-ph", "title": "A Physics-Grounded QUBO Encoding of Irrigation Scheduling for QAOA", "abstract": "Rotational irrigation scheduling in water-scarce Central Asia is a densely coupled combinatorial problem: soil-moisture memory links each irrigation decision to all later days within a zone, field adjacency couples zones on overlapping window days, and rigid canal rotations quantize water delivery in time. We formulate it as a Quadratic Unconstrained Binary Optimization (QUBO) by linearizing the root-zone water balance, so the quadratic crop-stress objective generates the physical couplings as 2-local Ising interactions with no higher-order terms; only the water-budget constraint requires an artificial all-to-all penalty, which we certify with an instance-adaptive weight bound an order of magnitude tighter than generic prescriptions. Every instance is built from observed data for a cotton district in Khorezm, Uzbekistan: NASA POWER meteorology, FAO-56 Penman--Monteith evapotranspiration, SoilGrids~2.0 hydraulics, measured capillary fluxes, and documented canal-rotation windows that enter as qubit-count reductions. We benchmark four tiers -- exact solvers, matched-budget heuristics, ideal-statevector quantum approximate optimization algorithm (QAOA), and noise-model plus IBM Heron execution -- and add a scaling study on soil instances up to 584 variables. Exact branch-and-bound proves optimality in seconds through 150 variables, and heuristic degradation at fixed evaluation budget is repaired by scaling the budget, so no classical scalability wall appears at deployment-relevant sizes, and none is claimed. On hardware, the informative signal is optimum-sampling enrichment over uniform sampling. We claim no quantum advantage; we deliver a physically grounded, data-complete, reproducible encoding of a societally critical scheduling problem for the quantum-utility era.", "url": "https://arxiv.org/abs/2607.13374", "type": "理论+数值", "summary": "缺水的中亚地区的轮灌调度是一个密集耦合的组合问题：土壤湿度记忆将每个灌溉决策与一个区域内的所有后续日子联系起来，相邻田地在重叠的窗口日上耦合区域，而严格的运河轮换则及时量化了输水量。我们通过线性化根区水平衡将其表述为二次无约束二元优化 (QUBO)，因此二次作物应力目标生成物理耦合作为 2-局部伊辛相互作用，没有高阶项；只有水预算约束需要人为的全部惩罚，我们用比通用处方更严格的实例自适应权重来证明这一点。每个实例都是根据乌兹别克斯坦花拉子模棉花区的观测数据构建的：NASA POWER 气象学、FAO-56 Penman-Monteith 蒸散量、SoilGrids~2.0 水力学、测量的毛细管通量以及记录的作为量子位计数减少输入的运河旋转窗口。\n\n我们对四层进行了基准测试——精确求解器、匹配预算启发式、理想状态向量量子近似优化算法 (QAOA) 和噪声模型加上 IBM Heron 执行——并添加了针对最多 584 个变量的土壤实例的扩展研究。精确的分支定界在几秒钟内通过 150 个变量证明了最优性，并且通过扩展预算来修复固定评估预算的启发式退化，因此在与部署相关的规模上不会出现经典的可扩展性墙，也没有人声称。在硬件上，信息信号是均匀采样的最佳采样富集。我们声称没有量子优势；我们为量子公用事业时代的社会关键调度问题提供了物理基础、数据完整、可重复的编码。", "authors": [{"name": "Alisher Ortikov"}, {"name": "Alisher Ilhamov"}], "featured_authors": [{"name": "Alisher Ortikov"}, {"name": "Alisher Ilhamov"}], "author_count": 2}, {"id": "2607.13422", "category": "quant-ph", "title": "Suppressing Detuning-Induced Bias in Ramsey Magnetometry with Composite Pulses", "abstract": "Quantum sensing estimates a physical parameter encoded in the state of a probe; with independent spin probes the precision follows the standard quantum limit. Studies of sensing precision often assume that the parameters entering the model, such as the noise, are known. In practice these parameters are not always known, and a mismatch between the assumed and actual values induces a systematic error. Here we study single-qubit Ramsey magnetometry of a DC magnetic field under an unknown detuning between the actual and nominal spin frequencies: A first pulse puts the qubit into a superposition of its two states, the field to be sensed then adds a relative phase during an exposure stage, and a second pulse enables the readout. In our setting, the field acts only during the exposure stage, whereas the detuning acts throughout the whole protocol. We analyze how the detuning biases the estimate, preventing the total estimation error from following the standard quantum limit. We then construct a composite-pulse preparation and readout that exploits the difference in the intervals over which the field and the detuning act to cancel the detuning to first order. We evaluate the performance of this composite-pulse protocol and show that it suppresses the detuning-induced bias.", "url": "https://arxiv.org/abs/2607.13422", "type": "理论+数值", "summary": "量子传感估计探针状态中编码的物理参数；使用独立的自旋探针，精度遵循标准量子极限。对传感精度的研究通常假设进入模型的参数（例如噪声）是已知的。实际上，这些参数并不总是已知的，假设值和实际值之间的不匹配会导致系统误差。在这里，我们研究了在实际和标称自旋频率之间未知失谐下直流磁场的单量子位拉姆齐磁力测量：第一个脉冲将量子位置于其两种状态的叠加中，要感测的场然后在曝光阶段添加相对相位，第二个脉冲实现读出。在我们的设置中，场仅在曝光阶段起作用，而失谐在整个协议中起作用。我们分析失谐如何使估计产生偏差，从而防止总估计误差遵循标准量子极限。然后，我们构建了一个复合脉冲准备和读出，利用场和失谐作用的间隔差异来取消一阶失谐。\n\n我们评估了这种复合脉冲协议的性能，并表明它抑制了失谐引起的偏差。", "authors": [{"name": "Shingo Kukita"}, {"name": "Kento Nawata"}, {"name": "Yuichiro Matsuzaki"}], "featured_authors": [{"name": "Shingo Kukita"}, {"name": "Kento Nawata"}, {"name": "Yuichiro Matsuzaki"}], "author_count": 3}, {"id": "2607.13464", "category": "quant-ph", "title": "Security evaluation of quantum distance-bounding protocols via semidefinite programming", "abstract": "Quantum distance-bounding (QDB) protocols let a verifier check that a prover is both genuine and physically nearby. During a timed fast phase of quantum communication, the verifier measures round-trip times to obtain an upper bound on the prover's distance. For a uniform comparison, we isolate the fast phase and study one-round distance-fraud (DF) and mafia-fraud (MF) games. For discrete-variable QDB, we show that these games reduce to convex optimization problems and can therefore be solved exactly with semidefinite programming; each MF value comes with an explicit attack achieving it and a matching certificate that no attack does better. This contrasts with quantum position verification, where an attack is split between two separated parties, so its optimization is nonconvex and analyses rely on relaxations. In our MF game, the cooperating pair collapses to a single sequential strategy, which keeps the game convex and its exact value computable. Across the discrete-variable protocols we examine, the best one-round DF attack succeeds with the same probability ($1/2$) for every protocol, whereas MF clearly separates the protocols. For continuous-variable QDB, we report estimated attack success probabilities from a calibrated Gaussian attack model. The benchmark covers protocols whose fast phase itself authenticates the prover; designs that follow Brands and Chaum and instead bind the fast phase with a final authenticated message, like the earliest QDB proposal, fall outside it and are treated separately. Of the four protocols studied, two had no previously known one-round attack values, and we report the first ones; for the other two, we find MF attacks with higher success probability than previously reported. Overall, one-round MF resistance depends on whether an attacker can use information revealed early by the prover to answer a fresh challenge from the verifier.", "url": "https://arxiv.org/abs/2607.13464", "type": "理论+数值", "summary": "量子距离限制 (QDB) 协议可让验证者检查证明者是否真实且物理位置附近。在量子通信的定时快速阶段，验证者测量往返时间以获得证明者距离的上限。为了进行统一比较，我们隔离快速阶段并研究一轮距离欺诈（DF）和黑手党欺诈（MF）游戏。对于离散变量 QDB，我们证明这些博弈可简化为凸优化问题，因此可以用半定规划精确求解；每个 MF 值都带有实现该值的显式攻击以及没有任何攻击能做得更好的匹配证书。这与量子位置验证形成鲜明对比，在量子位置验证中，攻击分为两个独立的方，因此其优化是非凸的，并且分析依赖于松弛。在我们的 MF 游戏中，合作对崩溃为单个顺序策略，这使游戏保持凸性且其精确值可计算。在我们检查的离散变量协议中，最好的一轮 DF 攻击对于每个协议都以相同的概率 ($1/2$) 成功，而 MF 明显区分了协议。\n\n对于连续变量 QDB，我们报告了来自校准高斯攻击模型的估计攻击成功概率。该基准涵盖其快速阶段本身对证明者进行身份验证的协议；遵循 Brands 和 Chaum 并将快速阶段与最终经过验证的消息绑定在一起的设计（如最早的 QDB 提案）不属于其范围并单独处理。在所研究的四种协议中，有两种没有先前已知的单轮攻击值，我们报告了第一个；对于另外两种，我们发现 MF 攻击的成功概率比之前报道的要高。总的来说，一轮 MF 抵抗取决于攻击者是否可以使用证明者早期透露的信息来回答来自验证者的新挑战。", "authors": [{"name": "Kevin Bogner"}, {"name": "Aysajan Abidin"}, {"name": "Dave Singelee"}, {"name": "Bart Preneel"}], "featured_authors": [{"name": "Kevin Bogner"}, {"name": "Aysajan Abidin"}, {"name": "Dave Singelee"}, {"name": "Bart Preneel"}], "author_count": 4}, {"id": "2607.13570", "category": "quant-ph", "title": "Tensor Network decoding under inter-qubit correlated errors", "abstract": "The maximum likelihood decoder based on tensor networks has proven highly successful for the 2D surface code, achieving the optimal decoding success rate. However, existing tensor network decoders are typically designed for independent single-qubit error models, and their performance under inter-qubit correlated error models remains unexplored. This is due to two major challenges. The first challenge lies in constructing the tensor network for correlated errors, since the same final Pauli error can arise from many different combinations of independent and correlated errors, preventing a direct factorization of the error probability. The second challenge is that even after a tensor network is constructed, it generally contains huge-dimensional tensors and is therefore not efficiently contractible. In this work, to address the first difficulty, we introduce additional binary indices and two transformations to construct a multi-index tensor network for maximum-likelihood decoding with correlated errors. To address the second difficulty, we use reparametrization, elimination, and index classification to decompose the huge-dimensional tensors into lower-dimensional tensors. This yields an efficiently contractible tensor network for error models satisfying the tractability conditions derived in this work. We perform numerical simulations for a representative correlated error model and show that the maximum-likelihood decoder implemented with our multi-index tensor network construction achieves a higher finite-size threshold than the widely used MWPM decoder.", "url": "https://arxiv.org/abs/2607.13570", "type": "理论+数值", "summary": "基于张量网络的最大似然解码器已被证明对于二维表面码非常成功，实现了最佳解码成功率。然而，现有的张量网络解码器通常是针对独立的单量子位错误模型而设计的，并且它们在量子位间相关错误模型下的性能仍未得到探索。这是由于两个主要挑战。第一个挑战在于构建相关误差的张量网络，因为相同的最终泡利误差可能是由独立误差和相关误差的许多不同组合产生的，从而阻止了误差概率的直接因式分解。第二个挑战是，即使在张量网络构建之后，它通常包含巨大维度的张量，因此不能有效地收缩。在这项工作中，为了解决第一个困难，我们引入了额外的二进制索引和两个变换来构造一个多索引张量网络，用于具有相关错误的最大似然解码。为了解决第二个困难，我们使用重参数化、消除和索引分类将大维张量分解为低维张量。\n\n这产生了一个有效的可收缩张量网络，用于满足本工作中导出的可处理条件的误差模型。我们对代表性相关误差模型进行数值模拟，结果表明，使用我们的多索引张量网络结构实现的最大似然解码器比广泛使用的 MWPM 解码器实现了更高的有限尺寸阈值。", "authors": [{"name": "Yue Yan"}, {"name": "SiYing Wang"}, {"name": "ZhiXin Xia"}, {"name": "HanNuo Yuan"}, {"name": "CanWei Shi"}, {"name": "Xiang-Bin Wang"}], "featured_authors": [{"name": "Yue Yan"}, {"name": "SiYing Wang"}, {"name": "ZhiXin Xia"}, {"name": "HanNuo Yuan"}, {"name": "CanWei Shi"}, {"name": "Xiang-Bin Wang"}], "author_count": 6}, {"id": "2607.13630", "category": "quant-ph", "title": "Separating Geometry From Interference in Constrained Quantum Optimization", "abstract": "We study the separation of geometric effects from quantum interference in quantum optimization algorithms. Constrained optimization problems such as routing, assignment, and scheduling are often encoded as product spaces of local variables, together with global feasibility penalties. The central algorithmic question we address is how a constraint-preserving mixing operator transports quantum amplitude across an exponential search space in the presence of local and global constraints. We develop a framework that separates three effects that are usually intermixed: amplitude transport, coherent interference among transported amplitudes, and problem-dependent classical postprocessing. We show that the mixing operator alone does not have a target-seeking ability. Concretely, the normalized distribution induced by its amplitude transport moves toward the distance profile of a uniformly random configuration. Thus, quantum sampling advantage may only arise when the phases of the many computational paths reaching a target configuration are sufficiently aligned for their amplitudes to reinforce. We show that, when the cost phases are engineered so that these paths add coherently, a number of circuit alternations growing only logarithmically with problem size suffices to convert the sum of their absolute contributions into a lower bound on the target amplitude, yielding a certified success probability independent of the ambient Hilbert-space dimension, the search-space size, or the feasible-set cardinality. We develop applications to problem-specific transpilation diagnostics, scalable hardware probes, constraint-induced classical maps of quantum-generated samples, the attribution of solution quality between the quantum distribution and classical post-processing in hybrid quantum-classical workflows and connections to distance-partitioned product spaces from classical coding theory.", "url": "https://arxiv.org/abs/2607.13630", "type": "理论+数值", "summary": "我们研究量子优化算法中几何效应与量子干涉的分离。路由、分配和调度等约束优化问题通常被编码为局部变量的乘积空间，以及全局可行性惩罚。我们解决的核心算法问题是，在存在局部和全局约束的情况下，保留约束的混合算子如何在指数搜索空间中传输量子振幅。我们开发了一个框架，将通常混合的三种效应分开：振幅传输、传输振幅之间的相干干扰以及问题相关的经典后处理。我们表明，单独的混合算子不具有目标搜索能力。具体而言，由其振幅传输引起的归一化分布向均匀随机配置的距离分布移动。因此，只有当到达目标配置的许多计算路径的相位充分对齐以使其幅度得以增强时，量子采样优势才可能出现。\n\n我们表明，当设计成本阶段以使这些路径连贯地相加时，许多仅随问题大小呈对数增长的电路交替足以将其绝对贡献之和转换为目标幅度的下限，从而产生独立于环境希尔伯特空间维度、搜索空间大小或可行集基数的经认证的成功概率。我们开发针对特定问题的转译诊断、可扩展硬件探针、量子生成样本的约束诱导经典图、混合量子-经典工作流程中量子分布和经典后处理之间解决方案质量的归因以及与经典编码理论的距离划分产品空间的连接的应用程序。", "authors": [{"name": "Chinonso Onah"}, {"name": "Stuart Hadfield"}, {"name": "Kristel Michielsen"}], "featured_authors": [{"name": "Chinonso Onah"}, {"name": "Stuart Hadfield"}, {"name": "Kristel Michielsen"}], "author_count": 3}, {"id": "2607.13722", "category": "quant-ph", "title": "Towards quantum machine learning for assessing the resilience of post-quantum cryptography", "abstract": "The potential capabilities of quantum computers motivated the development of cryptographic protocols suitable for securing communication against adversaries with access to large fault-tolerant quantum computers. However, even though current quantum computers are limited in terms of size and precision, they can still be useful for finding loopholes and weaknesses in the post-quantum cryptographic protocols. In this work, we present an attempt to utilize the capabilities of Quantum Generative Adversarial Networks (QGANs), one of the promising architectures used in quantum machine learning, for this purpose. We describe an example application of QGAN architecture for the purpose of loading the probability distribution of the hash-based digital signatures into the memory of a quantum computer. Our results confirm that near-term hybrid quantum-classical methods possess capabilities required for this purpose. The presented approach can be used as a first step in the workflow, enabling the utilization of quantum computing for attacking post-quantum cryptographic primitives.", "url": "https://arxiv.org/abs/2607.13722", "type": "数值", "summary": "量子计算机的潜在能力推动了加密协议的开发，该协议适用于保护可访问大型容错量子计算机的对手的通信安全。然而，尽管当前的量子计算机在尺寸和精度方面受到限制，但它们仍然可以用于发现后量子密码协议中的漏洞和弱点。在这项工作中，我们尝试利用量子生成对抗网络（QGAN）的功能来实现这一目的，量子生成对抗网络是量子机器学习中使用的有前景的架构之一。我们描述了 QGAN 架构的示例应用，旨在将基于哈希的数字签名的概率分布加载到量子计算机的内存中。我们的结果证实，近期混合量子经典方法具备实现此目的所需的能力。所提出的方法可以用作工作流程中的第一步，从而能够利用量子计算来攻击后量子密码原语。", "authors": [{"name": "Jarosław A. Miszczak"}], "featured_authors": [{"name": "Jarosław A. Miszczak"}], "author_count": 1}, {"id": "2607.13762", "category": "quant-ph", "title": "No finite level of the NPA hierarchy is exact for the doubly-tilted CHSH functional near the critical tilt", "abstract": "Gigena, Panwar, Scala, Araujo, Farkas and Chaturvedi [npj Quantum Inf. 11, 82 (2025)] determined the quantum maximum of the doubly-tilted CHSH functionals, observed that the Navascues-Pironio-Acin level needed for exactness grows without evident bound toward the critical tilt, and asked whether any finite level suffices. We answer this in the negative. For the symmetric critical family $B_s=(1-s/2)(\\langle A_0\\rangle+\\langle B_0\\rangle)+\\mathrm{CHSH}$ we prove: for every NPA level $k\\ge 2$ there are an explicit rational $g_k>0$ and an $s^*_k>0$ with $c_k(s)\\ge 4-s+g_k s^2$ on $(0,s^*_k]$; since the quantum value leaves the local bound only cubically, every finite level strictly overshoots on an interval: no finite level is exact on any neighbourhood of the critical point. Unconditionally $a_2>1/39$, $a_3>1/188$, $a_4>1/641$. The proof is a primal construction: an exactly feasible moment curve at each level, built from level-uniform structural laws and one level-independent signed witness -- a closed-form class function $y^*$ with $N_k^T\\Gamma(y^*)N_k=u_k u_k^T$ at every level. The mechanism forces the sign: for $k\\ge 3$ no quantum state and no smooth curve of quantum models can realize the gain direction, so the overshoot lives strictly in the non-quantum part of the NPA tangent cone. The proof is computer-assisted in the strict sense: finite exact-integer verifications with proven degree bounds are constituent parts of the argument; the chain has been re-verified against independent implementations, including a symbolic per-regime proof of the witness identity and a clean-room implementation written from the paper text alone. The one external input is the published quantum value of Gigena et al., cross-checked to twelve digits.", "url": "https://arxiv.org/abs/2607.13762", "type": "理论", "summary": "Gigena、Panwar、Scala、Araujo、Farkas 和 Chaturvedi [npj Quantum Inf. [11, 82 (2025)] 确定了双倾斜 CHSH 泛函的量子最大值，观察到精确性所需的 Navascues-Pironio-Acin 能级在没有明显限制于临界倾斜的情况下增长，并询问任何有限的能级是否足够。我们对此的回答是否定的。对于对称临界族 $B_s=(1-s/2)(\\langle A_0\\rangle+\\langle B_0\\rangle)+\\mathrm{CHSH}$ 我们证明：对于每个 NPA 级别 $k\\ge 2$ ，都存在一个显式有理数 $g_k>0$ 和一个 $s^*_k>0$，其中 $c_k(s)\\ge 4-s+g_k s^2$ 位于$(0,s^*_k]$；由于量子值仅三次离开局部界限，因此每个有限级别严格超出某个区间：在临界点的任何邻域上没有精确的有限级别。无条件$a_2>1/39$，$a_3>1/188$，$a_4>1/641$。证明是一个原始构造：每个级别上的完全可行的矩曲线，由级别一致的结构定律和一个级别无关的建立签名见证人——一个封闭形式的类函数 $y^*$，每个级别都有 $N_k^T\\Gamma(y^*)N_k=u_k u_k^T$。\n\n该机制迫使符号：对于$k\\ge 3$，没有量子态，也没有量子模型的平滑曲线可以实现增益方向，因此超调严格存在于NPA切锥的非量子部分。严格意义上的证明是计算机辅助的：具有已证明程度界限的有限精确整数验证是论证的组成部分；该链已针对独立实施进行了重新验证，包括证人身份的每个政权的象征性证明以及仅根据纸质文本编写的洁净室实施。一个外部输入是 Gigena 等人公布的量子值，经过交叉检查为 12 位数字。", "authors": [{"name": "Anton Pakhunov"}], "featured_authors": [{"name": "Anton Pakhunov"}], "author_count": 1}, {"id": "2607.13774", "category": "quant-ph", "title": "A phase transition in the exactness of the NPA hierarchy at the critical doubly-tilted CHSH functional", "abstract": "Gigena et al. [npj Quantum Inf. 11, 82 (2025)] proved the exact quantum maximum of the doubly-tilted CHSH functional $B_{\\alpha\\beta}=\\alpha\\langle A_0\\rangle+\\beta\\langle B_0\\rangle+\\mathrm{CHSH}$ and observed that the NPA level required to reach it grows without evident bound toward the critical line $\\alpha+\\beta=2$. We quantify the mechanism on the symmetric slice $s=2-\\alpha-\\beta$: (i) the quantum value leaves the local bound cubically, $c_Q=4-s+s^3/6-s^4/36+O(s^5)$; (ii) each NPA level overshoots quadratically, $c_k(s)=4-s+a_k s^2+O(s^3)$, with the almost-quantum coefficient computed exactly, $a_{1+AB}=3/64$; (iii) the divergence of the required exact level is equivalent to positivity of the single sequence $(a_k)$ - proven for every $k$ in the companion paper. We prove the supercritical side completely: for all $\\alpha,\\beta\\ge 1$ and every level the hierarchy is exact, via three explicit rational certificates realizing an affine identity. The hierarchy's exactness thus undergoes a phase transition at the critical line. On the subcritical side we certify the first four levels in exact arithmetic (rational pseudo-moments beating $c_Q$, confirmed by Sturm's theorem). We identify the exact mechanism: rescaled to the critical corner, the limiting obstruction is the Motzkin polynomial, the classical nonnegative-but-not-sum-of-squares form, so the finite-level failure sits in the restricted-certificate regime. The phase boundary has a precise geometric reading via Nie's finite-convergence theorem and Marshall's boundary Hessian condition: a self-tested optimum is finitely NPA-certifiable whenever its boundary Hessian is nondegenerate (contact order two), which holds for the single tilt and fails exactly at the doubly-tilted cubic touch. Three verified errata in the published polynomial system of Gigena et al. are documented.", "url": "https://arxiv.org/abs/2607.13774", "type": "理论+数值", "summary": "吉格纳等人。 [npj 量子信息。 11, 82 (2025)] 证明了双倾斜 CHSH 函数 $B_{\\alpha\\beta}=\\alpha\\langle A_0\\rangle+\\beta\\langle B_0\\rangle+\\mathrm{CHSH}$ 的精确量子最大值，并观察到达到它所需的 NPA 水平在没有明显限制于临界线 $\\alpha+\\beta=2$ 的情况下增长。我们量化对称切片 $s=2-\\alpha-\\beta$ 上的机制： (i) 量子值三次离开局部界限，$c_Q=4-s+s^3/6-s^4/36+O(s^5)$； (ii) 每个 NPA 水平二次超调，$c_k(s)=4-s+a_k s^2+O(s^3)$，精确计算出准量子系数，$a_{1+AB}=3/64$； (iii) 所需精确水平的分歧相当于单个序列 $(a_k)$ 的正性 - 已在配套论文中针对每个 $k$ 进行了证明。我们完全证明了超临界方面：对于所有 $\\alpha,\\beta\\ge 1$ 和每个级别，层次结构都是精确的，通过三个显式理性证书实现仿射恒等式。因此，层次结构的精确性在临界线处经历了相变。在次临界方面，我们用精确算术证明了前四个级别（有理伪矩击败 $c_Q$，由 Sturm 定理证实）。\n\n我们确定了确切的机制：重新调整到临界角，限制障碍是 Motzkin 多项式，即经典的非负非平方和形式，因此有限级别的故障位于受限证书机制中。通过 Nie 有限收敛定理和马歇尔边界 Hessian 条件，相边界具有精确的几何读数：只要其边界 Hessian 是非简并的（接触阶二），自测最优值就可以有限 NPA 证明，这适用于单倾斜，但在双倾斜立方接触时完全失败。 Gigena 等人发表的多项式系统中的三个经过验证的勘误表。被记录下来。", "authors": [{"name": "Anton Pakhunov"}], "featured_authors": [{"name": "Anton Pakhunov"}], "author_count": 1}, {"id": "2607.13790", "category": "quant-ph", "title": "Bridging Frustration and Non-Hermiticity via COMPASS: An Adaptive Biorthogonal Neural Quantum State Framework", "abstract": "In this work, we introduce a complementary optimization method for progressive and adaptive state search (COMPASS) based on biorthogonal adaptive recurrent neural quantum states. Our approach combines an adaptive autoregressive architecture with a biorthogonal variational Monte Carlo scheme as well as a complementary optimization scheme that alternates between energy and variance minimization. This enables the stable convergence to ground-state eigenpairs, while avoiding Markov chain sampling through exact autoregressive generation. We demonstrate that for parity-time(PT)-symmetric Hamiltonians, unconstrained complex ansatze can spontaneously break PT symmetry during optimization, even in the unbroken phase, leading to spurious imaginary energies. Real-valued ansatze, on the other hand, naturally constrain the optimization to the correct physical manifold. Conversely, for generic non-Hermitian (NH) Hamiltonians without symmetry protection and complex spectra, complex ansatze are essential for capturing complex ground-state properties. Our results establish that physically-informed ansatz selection is crucial for reliable NH simulations. By combining adaptive architectures, biorthogonal optimization, and symmetry-aware modeling, this framework enables a direct study of 1D and 2D NH many-body systems without Hermitian embeddings or adiabatic continuation. Applying this framework to systems with frustrated magnetism, we show that gap frustration provides a quantitative shield against NH spectral instability, with the frustration gap setting a critical threshold for PT-symmetry breaking. Also, complexifying the frustration coupling itself generates a new topologically nontrivial network of diabolic level crossings, controlled by the phase of the complex coupling, that has no Hermitian analog. We term this novel spectral topology in NH frustrated systems the diabolic ring.", "url": "https://arxiv.org/abs/2607.13790", "type": "理论+数值", "summary": "在这项工作中，我们引入了一种基于双正交自适应循环神经量子态的渐进自适应状态搜索（COMPASS）的互补优化方法。我们的方法将自适应自回归架构与双正交变分蒙特卡罗方案以及在能量和方差最小化之间交替的补充优化方案相结合。这使得能够稳定收敛到基态特征对，同时通过精确的自回归生成避免马尔可夫链采样。我们证明，对于奇偶时间（PT）对称哈密顿算子，无约束的复数 Ansatze 可以在优化过程中自发地破坏 PT 对称性，甚至在未破缺阶段也是如此，从而导致虚假的虚能。另一方面，实值 ansatze 自然地将优化限制在正确的物理流形上。相反，对于没有对称性保护和复杂光谱的通用非厄米 (NH) 哈密顿量，复杂的 ansatze 对于捕获复杂的基态属性至关重要。我们的结果表明，基于物理信息的 ansatz 选择对于可靠的 NH 模拟至关重要。\n\n通过结合自适应架构、双正交优化和对称感知建模，该框架能够直接研究一维和二维 NH 多体系统，而无需埃尔米特嵌入或绝热连续。将此框架应用于磁力受挫的系统，我们发现能隙挫败提供了针对 NH 谱不稳定的定量防护，而挫败能隙设置了 PT 对称性破缺的关键阈值。此外，复杂化挫败耦合本身会生成一个新的拓扑上非平凡的恶魔级交叉网络，该网络由复杂耦合的相位控制，没有埃尔米特模拟。我们将 NH 受阻系统中的这种新颖的光谱拓扑称为恶魔环。", "authors": [{"name": "Lavoisier Wah"}, {"name": "Flore K. Kunst"}, {"name": "Mohamed Hibat-Allah"}], "featured_authors": [{"name": "Lavoisier Wah"}, {"name": "Flore K. Kunst"}, {"name": "Mohamed Hibat-Allah"}], "author_count": 3}, {"id": "2607.13809", "category": "quant-ph", "title": "Markovian evolution from a novel scheme", "abstract": "The Markovian dynamics of open quantum many-body systems are typically governed by the Lindblad master equation, yet obtaining the reduced density matrix for bosonic and fermionic systems remains a formidable numerical challenge due to the exponential growth of the Hilbert space. Here, we introduce a computationally efficient framework for constructing the reduced density matrix by modeling the environment as a copy of the primary system with a monotonically decaying coupling that enforces unidirectional energy flow. Our method directly yields exact solutions that rigorously satisfy the Lindblad master equation for both bosonic and fermionic cases, bypassing the need for costly Liouvillian diagonalization. We validate our approach through applications to paradigmatic models, demonstrating accurate reproduction of dissipative dynamics across a broad parameter regime. This work provides a straightforward and powerful tool for simulating Markovian open-system evolution, with immediate applicability to quantum transport and control problems in many-body physics.", "url": "https://arxiv.org/abs/2607.13809", "type": "理论+数值", "summary": "开放量子多体系统的马尔可夫动力学通常由 Lindblad 主方程控制，但由于希尔伯特空间的指数增长，获得玻色子和费米子系统的约简密度矩阵仍然是一个艰巨的数值挑战。在这里，我们引入了一个计算高效的框架，通过将环境建模为具有单向衰减耦合的主系统的副本来构建降低密度矩阵，该单调衰减耦合强制单向能量流。我们的方法直接产生精确的解，严格满足玻色子和费米子情况下的林德布拉德主方程，绕过了昂贵的刘维尔对角化的需要。我们通过对范式模型的应用来验证我们的方法，证明在广泛的参数范围内准确再现耗散动力学。这项工作为模拟马尔可夫开放系统演化提供了一个简单而强大的工具，可立即应用于多体物理中的量子传输和控制问题。", "authors": [{"name": "Fardin Kheirandish"}, {"name": "Zahra Iranshahi"}, {"name": "Fatemeh Bakhtiari"}, {"name": "Adam Moradian"}], "featured_authors": [{"name": "Fardin Kheirandish"}, {"name": "Zahra Iranshahi"}, {"name": "Fatemeh Bakhtiari"}, {"name": "Adam Moradian"}], "author_count": 4}, {"id": "2607.13842", "category": "quant-ph", "title": "Post-Critical Meson Dynamics of Kibble-Zurek Excitations in a 5,564-Qubit Quantum Annealer", "abstract": "Quantum phase transitions provide a controlled route for generating many-body excitations, but the dynamics after the critical point can be as important as the initial defect creation. Recent progress in quantum annealing has made it possible to access coherent nonequilibrium dynamics in programmable Ising systems with thousands of superconducting qubits. Here we use this capability to study a longitudinally biased quantum Ising chain, where Kibble--Zurek defect creation is followed by nonintegrable post-critical dynamics. The longitudinal bias confines kink--antikink excitations into mesonic bound states, so that the final spin configurations encode both the production of defects near the critical point and the subsequent evolution of the confined excitations. Using energy-scale rescaling and zero-noise extrapolation, we find that the defect density follows the expected biased Kibble--Zurek/Landau--Zener crossover and agrees with matrix-product-state simulations with uniform bias. In contrast, magnetization, spatial profiles, and minority-domain statistics reveal that mesonic evolution is interrupted by localization of the post-critical domain pattern. Matrix-product-state simulations with disorder reproduce this separation between robust defect creation and localized post-critical dynamics. Our results show that large-scale quantum annealers can probe the fate of critical excitations beyond defect counting.", "url": "https://arxiv.org/abs/2607.13842", "type": "理论+数值", "summary": "量子相变为产生多体激发提供了一条受控路径，但临界点之后的动力学可能与初始缺陷的产生一样重要。量子退火的最新进展使得在具有数千个超导量子位的可编程伊辛系统中获得相干非平衡动力学成为可能。在这里，我们利用这种能力来研究纵向偏置的量子伊辛链，其中基布尔-祖雷克缺陷的产生之后是不可积的后临界动力学。纵向偏置将扭结-反扭结激发限制在介子束缚态中，因此最终的自旋构型既编码了临界点附近缺陷的产生，也编码了受限激发的后续演化。使用能量尺度重新缩放和零噪声外推，我们发现缺陷密度遵循预期的有偏差的 Kibble-Zurek/Landau-Zener 交叉，并且与具有均匀偏差的矩阵乘积状态模拟一致。相比之下，磁化强度、空间分布和少数域统计数据表明，介子演化被后临界域模式的局域化所中断。\n\n无序矩阵产品状态模拟再现了鲁棒缺陷产生与局部后临界动力学之间的分离。我们的结果表明，大规模量子退火器可以探测缺陷计数之外的临界激发的命运。", "authors": [{"name": "Francis A. Bayocboc Jr."}, {"name": "Jacek Dziarmaga"}, {"name": "Marek M. Rams"}, {"name": "Jaka Vodeb"}], "featured_authors": [{"name": "Francis A. Bayocboc Jr."}, {"name": "Jacek Dziarmaga"}, {"name": "Marek M. Rams"}, {"name": "Jaka Vodeb"}], "author_count": 4}, {"id": "2607.13847", "category": "quant-ph", "title": "Quantum Topological Data Encoding", "abstract": "Many datasets encountered across a wide range of domains possess rich geometric and topological structure that is difficult to capture using conventional vector-based representations. Quantum machine learning offers the possibility of processing high-dimensional data in Hilbert spaces, but its practical success depends critically on how classical data is encoded into quantum states. We introduce \\emph{quantum topological data encoding} (QTDE), a general framework for encoding topological information into quantum states via topology-driven quantum evolution. Our method generalises an existing topology-driven quantum encoding framework to higher-dimensional data. We test the proposed method on clique-complexes classification tasks, and provide preliminary evidence that topology-driven quantum representations can capture discriminative information beyond that available through direct comparisons of classical topological descriptors. The proposed quantum representations consistently outperform a baseline based on direct comparisons of the combinatorial Laplacians describing the underlying topological structure. We indicate several areas of application where the framework can be used to provide a more efficient and reliable data representation.", "url": "https://arxiv.org/abs/2607.13847", "type": "理论+数值", "summary": "跨广泛领域遇到的许多数据集都具有丰富的几何和拓扑结构，很难使用传统的基于矢量的表示来捕获。量子机器学习提供了在希尔伯特空间中处理高维数据的可能性，但其实际成功关键取决于如何将经典数据编码为量子态。我们引入\\emph{量子拓扑数据编码}（QTDE），这是一种通过拓扑驱动的量子演化将拓扑信息编码为量子态的通用框架。我们的方法将现有的拓扑驱动的量子编码框架推广到更高维的数据。我们在派系复合体分类任务上测试了所提出的方法，并提供了初步证据，表明拓扑驱动的量子表示可以通过直接比较经典拓扑描述符来捕获超出可用的判别信息。基于描述底层拓扑结构的组合拉普拉斯算子的直接比较，所提出的量子表示始终优于基线。\n\n我们指出了该框架可用于提供更高效、更可靠的数据表示的几个应用领域。", "authors": [{"name": "Adam Wesołowski"}, {"name": "Dimitrios Thanos"}, {"name": "Daniel Leykam"}, {"name": "Lirandë Pira"}], "featured_authors": [{"name": "Adam Wesołowski"}, {"name": "Dimitrios Thanos"}, {"name": "Daniel Leykam"}, {"name": "Lirandë Pira"}], "author_count": 4}, {"id": "2607.13872", "category": "quant-ph", "title": "Continuous limit of the square well problem in quantum mechanics", "abstract": "The free-particle and square-well potentials are two of the most emblematic problems in quantum mechanics, illustrating essential concepts such as matter waves, energy quantization, and bound states. It is therefore natural to consider how the free-particle solutions emerge from the square well as the width approaches infinity. In this work, we present a systematic procedure to demonstrate this transition by applying a Fourier transform to the wave equation.", "url": "https://arxiv.org/abs/2607.13872", "type": "理论", "summary": "自由粒子和方阱势是量子力学中最具代表性的两个问题，说明了物质波、能量量子化和束缚态等基本概念。因此，很自然地要考虑当宽度接近无穷大时，自由粒子解如何从方形井中出现。在这项工作中，我们提出了一个系统程序，通过对波动方程应用傅立叶变换来证明这种转变。", "authors": [{"name": "Matheus D. Moro"}, {"name": "Thiago T. Tsutsui"}, {"name": "Antonio S. M. de Castro"}, {"name": "Fabiano M. Andrade"}], "featured_authors": [{"name": "Matheus D. Moro"}, {"name": "Thiago T. Tsutsui"}, {"name": "Antonio S. M. de Castro"}, {"name": "Fabiano M. Andrade"}], "author_count": 4}, {"id": "2607.13989", "category": "quant-ph", "title": "Nonreciprocal Relaxation Acceleration", "abstract": "Driven by recent discoveries regarding the quantum Mpemba effect, the anomalous relaxation dynamics of open quantum systems have garnered significant attention. While expediting thermalization to equilibrium has been extensively studied, dynamically accelerating the convergence toward nonequilibrium steady states remains a formidable challenge. In this article, we find a transient engineered nonreciprocal dissipative channel can provide a shortcut that accelerates convergence to the target reciprocal nonequilibrium steady state for the considered two-mode model and initial states. Using interacting bosonic modes, we demonstrate that the temporal activation of a nonreciprocal channel efficiently suppresses prolonged inter-mode energy oscillations, enforcing a rapid, unidirectional thermal dump into the environment. Counterintuitively, we find that this relaxation speedup is robust and independent of the direction of the nonreciprocity. Our results provide a powerful thermodynamic technique for rapid state preparation and cooling in continuous-variable quantum systems, particularly critical for low-temperature quantum information processing.", "url": "https://arxiv.org/abs/2607.13989", "type": "理论", "summary": "在最近关于量子姆潘巴效应的发现的推动下，开放量子系统的反常弛豫动力学引起了人们的广泛关注。虽然加速热化达到平衡已被广泛研究，但动态加速向非平衡稳态的收敛仍然是一个艰巨的挑战。在本文中，我们发现瞬态工程非互易耗散通道可以提供一条捷径，加速所考虑的双模模型和初始状态收敛到目标互易非平衡稳态。使用相互作用的玻色子模式，我们证明了非互易通道的时间激活有效地抑制了长时间的模式间能量振荡，从而强制将快速、单向的热转储到环境中。与直觉相反，我们发现这种松弛加速是稳健的并且与非互易性的方向无关。我们的研究结果为连续可变量子系统中的快速状态准备和冷却提供了强大的热力学技术，这对于低温量子信息处理尤其关键。", "authors": [{"name": "Xingyu Zhang"}, {"name": "Yihan Ma"}, {"name": "Yue Liu"}, {"name": "Niaz Ali Khan"}, {"name": "Chenlong Huang"}, {"name": "Yuguo Su"}, {"name": "Junyan Luo"}, {"name": "Dahai He"}], "featured_authors": [{"name": "Xingyu Zhang"}, {"name": "Yihan Ma"}, {"name": "Yue Liu"}, {"name": "Yuguo Su"}, {"name": "Junyan Luo"}, {"name": "Dahai He"}], "author_count": 8}, {"id": "2607.14063", "category": "quant-ph", "title": "Reshaping quantum annealing landscapes with diagonal catalysts", "abstract": "Quantum annealing is often limited by population trapped in local minima many spin flips from the solution. We introduce a mathematical framework to understand the connection between energy and Hamming distance in optimization problems. Using this, we build ZZ-catalysts from ground-state patterns of small frustration-free subproblems that make configurations far from the solution less energetically competitive. On sparse problems they multiply the near-solution probability at short sweeps, with gains persisting on fully-connected models and tunable via subproblem choice.", "url": "https://arxiv.org/abs/2607.14063", "type": "理论+数值", "summary": "量子退火通常受到陷入局部极小值的粒子数的限制，许多自旋翻转都来自溶液。我们引入一个数学框架来理解优化问题中能量和汉明距离之间的联系。利用这一点，我们从无挫折的小子问题的基态模式构建了 ZZ 催化剂，这些子问题使得远离解决方案的配置在能量上的竞争力降低。在稀疏问题上，它们在短扫描中乘以近解概率，增益在全连接模型上持续存在，并可通过子问题选择进行调整。", "authors": [{"name": "Andrés N. Cáliz"}, {"name": "Carlos Ramon-Escandell"}, {"name": "Finnley Paolella"}, {"name": "Josep Bosch"}, {"name": "Jan Nogué"}, {"name": "Arnau Riera"}, {"name": "Jordi Riu"}], "featured_authors": [{"name": "Andrés N. Cáliz"}, {"name": "Carlos Ramon-Escandell"}, {"name": "Finnley Paolella"}, {"name": "Jan Nogué"}, {"name": "Arnau Riera"}, {"name": "Jordi Riu"}], "author_count": 7}, {"id": "2607.14083", "category": "quant-ph", "title": "Cluster-configurational study of G-center in Silicon", "abstract": "Understanding the properties of defects is imperative for proper use for variety of applications including quantum computing. In this paper, we use the multiconfigurational self consistent field (MCSCF) combined with DFT optimized geometry in order to investigate the spin and optical properties of G centers in Silicon. By utilizing quantum chemistry based methods, we show excellent agreement with the Zero Phonon Line and Zero Field Splitting Tensor components of the G center. We also calculate the theoretical spin decoherence time of the G centers using Cluster Correlation Expansion (CCE) methods.", "url": "https://arxiv.org/abs/2607.14083", "type": "理论+数值", "summary": "了解缺陷的属性对于正确使用包括量子计算在内的各种应用至关重要。在本文中，我们使用多构型自洽场（MCSCF）与DFT优化几何结构相结合来研究硅中G中心的自旋和光学特性。通过利用基于量子化学的方法，我们与 G 中心的零声子线和零场分裂张量分量表现出极好的一致性。我们还使用簇相关扩展（CCE）方法计算了 G 中心的理论自旋退相干时间。", "authors": [{"name": "Narayan Pokhrel"}, {"name": "Kyungwha Park"}, {"name": "Vsevolod Ivanov"}], "featured_authors": [{"name": "Narayan Pokhrel"}, {"name": "Kyungwha Park"}, {"name": "Vsevolod Ivanov"}], "author_count": 3}, {"id": "2607.14091", "category": "quant-ph", "title": "Pair-Partition Constructions for CPM-Based Quantum LDPC Codes", "abstract": "We construct binary Calderbank--Shor--Steane (CSS) quantum low-density parity-check (LDPC) codes from circulant permutation matrices (CPMs). The construction is parameterized by column weight J, row weight L, and prime lift size P. A J x J array of pair partitions imposes linear paired-difference equations on the CPM exponents. These equations give CSS orthogonality. The main finite examples reported here are the (J,L)=(4,12)-regular girth-six code [[372,130,16]] with rate 0.349, and the (J,L)=(4,14)-regular girth-six code [[518,228,16]] with rate 0.440. We also record (J,L)=(3,8)-regular girth-six instances [[472,122,14]] and [[488,126,14]], with lift sizes P=59 and P=61, respectively. The stated distances are established for the fixed matrices by exhaustive low-weight exclusion together with explicit non-stabilizer witnesses.", "url": "https://arxiv.org/abs/2607.14091", "type": "理论", "summary": "我们从循环置换矩阵 (CPM) 构造二进制 Calderbank--Shor--Steane (CSS) 量子低密度奇偶校验 (LDPC) 码。该结构通过列权重 J、行权重 L 和素数升力大小 P 进行参数化。J x J 的对分区数组对 CPM 指数施加线性配对差分方程。这些方程给出了 CSS 正交性。这里报告的主要有限示例是速率为 0.349 的 (J,L)=(4,12)-正则周长六码 [[372,130,16]] 和速率为 0.440 的 (J,L)=(4,14)-正则周长六码 [[518,228,16]]。我们还记录 (J,L)=(3,8)-规则周长-六个实例 [[472,122,14]] 和 [[488,126,14]]，升力大小分别为 P=59 和 P=61。所规定的距离是通过详尽的低权重排除以及明确的非稳定器见证来为固定矩阵建立的。", "authors": [{"name": "Koki Okada"}, {"name": "Kenta Kasai"}], "featured_authors": [{"name": "Koki Okada"}, {"name": "Kenta Kasai"}], "author_count": 2}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
