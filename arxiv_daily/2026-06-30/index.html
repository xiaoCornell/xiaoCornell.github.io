 continuum divergence as $L_{\\rm op}=\\Theta(\\max\\{\\varepsilon,\\Delta_g\\}^{1-d})$. Controlled singular response-proxy metrics diagnose critical prefactors and directional integrability, but are not physical friction tensors unless derived from microscopic dynamics. Morton/Z-order preserves the exponent while increasing locality-dependent amplitudes.", "url": "https://arxiv.org/abs/2606.29751", "type": "理论+数值", "summary": "连续空间填充图可以满射到高维区域，但热力学协议是可校正的有限分辨率路径。我们研究了通过曲线 $H_\\varepsilon$ 对紧凑 $d$ 维热力学状态空间窗口 $(\\mathcal{M},g)$ 的详尽遍历，其图像在内在距离上是 $\\varepsilon$ 密集的。标准覆盖/管估计为每个常规 $d>1$ 窗口提供 $L_g[H_\\varepsilon]\\ge C_g\\varepsilon^{1-d}-O(\\varepsilon)$。几何学是经典的；贡献在于将其转化为热力学覆盖的可操作资源定律。当物理摩擦张量 $\\zeta$ 与覆盖度量 $g$ 一致或一致占主导地位时，二次慢速驾驶动作的 Cauchy--Schwarz 给出 $W_{\\rm ex}^{(2)}\\ge L_\\zeta^2/\\tau=\\Omega(\\varepsilon^{2(1-d)}/\\tau)$。同样，在固定的二次超额工作预算下，维持缓慢驾驶需要 $\\tau=\\Omega(\\varepsilon^{2(1-d)})$。\n\n我们推导了详细平衡三态马尔可夫跳跃过程的微观摩擦度量，$\\zeta_{ij}=(\\beta/\\gamma)(\\pi_i\\delta_{ij}-\\pi_i\\pi_j)$，以及过阻尼谐波陷阱的微观摩擦度量，$\\mathrm d\\ell_\\zeta^2=\\mu^{-1}\\mathrm da^2+(4\\beta\\mu k^3)^{-1}\\mathrm dk^2$。在陷阱中，光栅扫描给出 $L_\\zeta\\sim\\Delta_g^{-1}$ 和固定时间 $W_{\\rm ex}^{(2)}\\sim\\Delta_g^{-2}$，而固定停留时间将成本转移到采集时间。实验室或模拟平台将连续体散度截断为 $L_{\\rm op}=\\Theta(\\max\\{\\varepsilon,\\Delta_g\\}^{1-d})$。受控奇异响应代理指标诊断关键先决因素和方向可积性，但不是物理摩擦张量，除非源自微观动力学。 Morton/Z 顺序保留指数，同时增加与位置相关的幅度。", "authors": [{"name": "Satori Tsuzuki"}], "featured_authors": [{"name": "Satori Tsuzuki"}], "author_count": 1}, {"id": "2606.29765", "category": "cond-mat", "title": "Ferron Hall effect: Transverse accumulation of polarization driven by thermal gradients in ferroelectrics", "abstract": "The phonon Hall effect describes the generation of a transverse heat current in response to a longitudinal thermal gradient in a magnetic field. Here, we theoretically demonstrate that, when the lattice excitations deflected by the Hall effect carry electric dipole moments, their transverse motion produces an accumulation of electric polarization in ferroelectric materials. This accumulation is driven by lattice excitations that carry polarization, known as ferrons, and we therefore call the mechanism the ferron Hall effect. Using atomistic lattice dynamics with parameters obtained from density functional theory, we illustrate the effect in the prototypical ferroelectric BaTiO3. Our results identify ferrons as the electric-polarization analogues of magnons in transverse transport and provide a route toward thermal and magnetic manipulation of ferroic order.", "url": "https://arxiv.org/abs/2606.29765", "type": "理论+数值", "summary": "声子霍尔效应描述了响应磁场中的纵向热梯度而产生横向热流。在这里，我们从理论上证明，当霍尔效应偏转的晶格激发携带电偶极矩时，它们的横向运动会在铁电材料中产生电极化的积累。这种积累是由带有极化的晶格激发（称为铁子）驱动的，因此我们将该机制称为铁子霍尔效应。使用原子晶格动力学和从密度泛函理论获得的参数，我们说明了原型铁电 BaTiO3 中的效应。我们的结果将铁离子确定为横向传输中磁振子的电极化类似物，并为铁有序的热和磁操纵提供了一条途径。", "authors": [{"name": "Daniel A. Bustamante Lopez"}, {"name": "Verena Brehm"}, {"name": "Dominik M. Juraschek"}], "featured_authors": [{"name": "Daniel A. Bustamante Lopez"}, {"name": "Verena Brehm"}, {"name": "Dominik M. Juraschek"}], "author_count": 3}, {"id": "2606.29827", "category": "cond-mat", "title": "Spin-1 Dirac dispersion and Chern insulating phases in 2D honeycomb Sierpiński fractal", "abstract": "Graphene-based Sierpiński fractals host a zero-energy chiral mode and spin-1 Dirac dispersions within the nearest-neighbor tight-binding model. However, the presence of complex next-nearest neighbor hopping arising from the local flux and the staggered Semenoff mass terms, modeled within the Haldane Hamiltonian, breaks the time-reversal and spatial inversion symmetries, respectively, and makes these flat bands dispersive. Moreover, they introduce rich topological phases in this class of systems that can be characterized by Chern numbers up to $\\pm 3$, i.e., beyond the conventional honeycomb lattice. These observations pave the way for the exploration of 2D periodic fractals beyond graphene, where topological phase transitions can be realized through externally applied fields.", "url": "https://arxiv.org/abs/2606.29827", "type": "理论", "summary": "基于石墨烯的谢尔宾斯基分形在最近邻紧束缚模型中具有零能量手性模式和自旋 1 狄拉克色散。然而，由局部通量和交错的 Semenoff 质量项（在霍尔丹哈密顿量内建模）引起的复杂的次近邻跳跃的存在，分别打破了时间反转和空间反转对称性，并使这些平带色散。此外，他们在此类系统中引入了丰富的拓扑相，这些拓扑相可以用高达 $\\pm 3$ 的陈数来表征，即超出了传统的蜂窝晶格。这些观察结果为探索石墨烯以外的二维周期性分形铺平了道路，其中拓扑相变可以通过外部施加的场来实现。", "authors": [{"name": "Shneha Biswas"}, {"name": "Shouya Yoshida"}, {"name": "Katsunori Wakabayashi"}, {"name": "Sudipta Dutta"}], "featured_authors": [{"name": "Shneha Biswas"}, {"name": "Shouya Yoshida"}, {"name": "Katsunori Wakabayashi"}, {"name": "Sudipta Dutta"}], "author_count": 4}, {"id": "2606.29838", "category": "cond-mat", "title": "Poisson-shot-noise hybrid machines: efficiency and quasistatic divergence", "abstract": "We study stochastic models of a microscopic active heat engine, comprised of an overdamped Brownian particle trapped in a harmonic potential, and in simultaneous contact with thermal (passive) and athermal (active) baths. The interaction with the active bath is modeled as a stochastic force described by Poisson shot-noise (PSN) having a specified amplitude distribution. With analytical calculations and numerical simulations, we study the thermodynamic performance of the machine to quasistatic cyclic protocols analogous to those running two-stroke and Stirling-like engines. For specific parameter ranges, the thermodynamic behavior is that of a $\\textit{hybrid machine}$, simultaneously operating as a heat engine with respect to the passive/active baths and as a refrigerator with respect to the passive/active baths. Focusing on the parameter region where the overall performance is such of an engine, we show that the average total extracted work per cycle divided by average total heat intake from the cold baths per cycle may surpass the Carnot efficiency associated with the temperature of the passive baths. Applying the second law for active heat engines, we focus on a bona fide efficiency (bounded by Carnot's efficiency) that incorporates an information-theoretic metric $\\mathcal{I}-$ which we call $\\textit{quasistatic divergence}-$ quantifying how distinguishable are the engine's statistics in the quasistatic limit with respect to a continually changing equilibrium distribution. We analyze, with theory and numerical simulations, how the PSN shot rate and the degree of non-Gaussianity in the particle position distribution influence the efficiency of the engine, and explore the correlation between non-Gaussianity and efficiency. Our findings reveal optimal PSN shot rates maximizing the engine's efficiency and an intriguing non-bijective relation between efficiency and kurtosis", "url": "https://arxiv.org/abs/2606.29838", "type": "理论+数值", "summary": "我们研究微观主动热机的随机模型，该模型由陷于谐波势中的过阻尼布朗粒子组成，并同时与热（被动）和非热（主动）浴接触。与活性浴的相互作用被建模为由具有指定幅度分布的泊松散粒噪声 (PSN) 描述的随机力。通过分析计算和数值模拟，我们研究了机器的热力学性能，类似于运行二冲程和类斯特林发动机的准静态循环协议。对于特定的参数范围，热力学行为是 $\\textit{混合机器}$ 的热力学行为，同时作为相对于被动/主动浴的热机和相对于被动/主动浴的制冷机运行。着眼于发动机整体性能的参数区域，我们发现每个周期的平均总提取功除以每个周期从冷浴的平均总热量摄入可能会超过与被动浴温度相关的卡诺效率。\n\n应用主动热机的第二定律，我们关注真正的效率（受卡诺效率限制），它结合了信息论度量$\\mathcal{I}-$，我们称之为$\\textit{准静态散度}-$，量化了准静态极限下发动机的统计数据相对于不断变化的平衡分布的可区分性。我们通过理论和数值模拟分析了PSN发射率和粒子位置分布的非高斯性程度如何影响发动机的效率，并探讨了非高斯性与效率之间的相关性。我们的研究结果揭示了最佳 PSN 喷射率可以最大化发动机的效率，以及效率和峰度之间有趣的非双射关系", "authors": [{"name": "Rita Majumdar"}, {"name": "Costantino Di Bello"}, {"name": "Ralf Metzler"}, {"name": "Rahul Marathe"}, {"name": "Édgar Roldán"}], "featured_authors": [{"name": "Rita Majumdar"}, {"name": "Costantino Di Bello"}, {"name": "Ralf Metzler"}, {"name": "Rahul Marathe"}, {"name": "Édgar Roldán"}], "author_count": 5}, {"id": "2606.30041", "category": "cond-mat", "title": "A phase-field model for viscoelastic compressible tumor growth", "abstract": "It is well known that growing tumors generate and respond to stress in their local microenvironment. Tissue re-arrangements can relax these mechanical stresses and make the tissue more fluid-like. Further, intricate coupling between mechanotransduction and biochemical signaling leads to complex patterns of growth. To predict the outcomes of these nonlinear interactions, we develop a phase-field model to simulate tumors growing into a surrounding medium taking into account their elastic and viscous properties as well as their compressibilities. We couple continuum modeling of the viscoelastic mechanics to the concentration of a diffusible growth-promoting nutrient in a mass conservative way. The phase-field method is a stable and flexible way to describe the dynamics of arbitrarily shaped tumors. We demonstrate convergence of the phase-field model to a sharp interface model in radially symmetric geometries and can observe progression to stationary tumors. However, our results show that these stationary symmetric tumors are subject to symmetry-breaking instabilities in 2D and 3D driven by two primary mechanisms: (i) elastic buckling instabiliies due to differential growth induced by the nutrient gradient and (ii) instabilities generated by apoptosis-related volumetric loss. Further, tissue fluidity and compressibility can lead to changes in tumor topologies. Our modeling framework provides a robust methodology for investigating how tissue mechanics and growth factor signaling influence the progression and invasive potential of solid tumors.", "url": "https://arxiv.org/abs/2606.30041", "type": "理论", "summary": "众所周知，生长中的肿瘤会在其局部微环境中产生压力并对其做出反应。组织重新排列可以缓解这些机械应力，并使组织变得更像流体。此外，机械转导和生化信号之间复杂的耦合导致了复杂的生长模式。为了预测这些非线性相互作用的结果，我们开发了一个相场模型来模拟肿瘤生长到周围介质中，同时考虑到它们的弹性和粘性特性以及可压缩性。我们以质量保守的方式将粘弹性力学的连续模型与可扩散生长促进营养物的浓度结合起来。相场方法是描述任意形状肿瘤动力学的稳定且灵活的方法。我们证明了相场模型与径向对称几何形状的尖锐界面模型的收敛性，并且可以观察到静止肿瘤的进展。\n\n然而，我们的结果表明，这些静止对称肿瘤在 2D 和 3D 中容易受到两种主要机制驱动的对称性破坏不稳定性的影响：（i）由于营养梯度诱导的差异生长而导致的弹性屈曲不稳定性和（ii）由细胞凋亡相关的体积损失产生的不稳定性。此外，组织的流动性和可压缩性可能导致肿瘤拓扑的变化。我们的建模框架提供了一种强大的方法来研究组织力学和生长因子信号传导如何影响实体瘤的进展和侵袭潜力。", "authors": [{"name": "Luise Zieger"}, {"name": "Min Wu"}, {"name": "Chaozhen Wei"}, {"name": "John Lowengrub"}, {"name": "Sebastian Aland"}], "featured_authors": [{"name": "Luise Zieger"}, {"name": "Min Wu"}, {"name": "Chaozhen Wei"}, {"name": "John Lowengrub"}, {"name": "Sebastian Aland"}], "author_count": 5}, {"id": "2606.30176", "category": "cond-mat", "title": "Trimers in the Extended Hubbard Model", "abstract": "The Lieb theorem is a cornerstone of quantum magnetism theory in condensed matter. In this work, we investigate the instability of the Lieb insulating ferrimagnetic phase in the extended Hubbard model on a trimer chain at half-filling, with one electron per site, under increasing the nearest-neighbor Coulomb coupling $V$. Our results show that despite a noticeable increase in doublon density with $V$, the ferrimagnetic insulating phase remains robust up to the phase separation (PS) line, which is observed at $V \\gtrsim U/4$, where $U$ is the local Coulomb repulsion. Above the PS line, one of the coexisting phases is primarily populated by doublons on one of the two sublattices of the chain. This phase coexists with a metallic, unsaturated ferromagnetic phase for $U \\gtrsim t$, and with a singlet phase for $U \\lesssim t$, where $t$ is the intra-trimer hopping amplitude. We estimate the PS and the crossover lines with the help of density matrix renormalization group calculations.", "url": "https://arxiv.org/abs/2606.30176", "type": "理论+数值", "summary": "利布定理是凝聚态量子磁学理论的基石。在这项工作中，我们研究了半填充三聚体链上的扩展哈伯德模型中的 Lieb 绝缘亚铁磁相的不稳定性，每个位点一个电子，在增加最近邻库仑耦合 $V$ 的情况下。我们的结果表明，尽管双倍体密度随着$V$的增加而显着增加，但亚铁磁绝缘相在相分离（PS）线之前仍然保持稳健，这可以在$V\\gtrsim U/4$处观察到，其中$U$是局部库仑斥力。在 PS 线上方，共存相之一主要由链的两个亚晶格之一上的双键填充。该相与 $U \\gtrsim t$ 的金属不饱和铁磁相共存，并与 $U \\lesssim t$ 的单重态相共存，其中 $t$ 是三聚体内跳跃幅度。我们借助密度矩阵重整化群计算来估计 PS 和交叉线。", "authors": [{"name": "R. R. Montenegro-Filho"}, {"name": "D. R. B. Silva"}, {"name": "D. Cogollo"}, {"name": "M. D. Coutinho-Filho"}], "featured_authors": [{"name": "R. R. Montenegro-Filho"}, {"name": "D. R. B. Silva"}, {"name": "D. Cogollo"}, {"name": "M. D. Coutinho-Filho"}], "author_count": 4}, {"id": "2606.30187", "category": "cond-mat", "title": "Spin-orbit coupling induced geometric squeezing in rotating Bose-Einstein condensates", "abstract": "Squeezed states play a key role in diverse frontiers of quantum physics. Geometrically squeezed states, a squeezed state in the orbital phase space of rotating Bose-Einstein condensates (BEC), have been conventionally generated by anisotropic trapping potentials. In this work, we propose a different route to generate geometric squeezing via spin-orbit coupling (SOC) in a pseudospin-1/2 BEC. We show that the SOC enables effective two-phonon transitions within the lowest Landau level via virtual spin-flip processes, leading to exponential squeezing dynamics in both spin components. Furthermore, by applying a $\\pi/2$ spin rotation, the two spin channels can be coherently coupled to produce two-mode geometric squeezing. We also investigate the influence of interatomic interactions on squeezing performance and identify parameters where robust squeezing can be achieved. Our work provides a viable pathway to realize and manipulate geometric squeezing in spinor quantum gases.", "url": "https://arxiv.org/abs/2606.30187", "type": "理论", "summary": "压缩态在量子物理学的各个前沿领域发挥着关键作用。几何压缩态是旋转玻色-爱因斯坦凝聚体（BEC）轨道相空间中的压缩态，通常是由各向异性捕获势产生的。在这项工作中，我们提出了一种不同的途径，通过伪自旋 1/2 BEC 中的自旋轨道耦合 (SOC) 产生几何挤压。我们表明，SOC 通过虚拟自旋翻转过程在最低朗道能级内实现有效的双声子跃迁，从而在两个自旋分量中产生指数挤压动力学。此外，通过应用 $\\pi/2$ 自旋旋转，两个自旋通道可以相干耦合以产生双模式几何挤压。我们还研究了原子间相互作用对挤压性能的影响，并确定了可以实现稳健挤压的参数。我们的工作为实现和操纵旋量量子气体中的几何挤压提供了一条可行的途径。", "authors": [{"name": "Fei Zhu"}, {"name": "Chunxia Guo"}, {"name": "Rui Zhang"}, {"name": "Lianghui Huang"}, {"name": "Ren Zhang"}, {"name": "Li Chen"}], "featured_authors": [{"name": "Fei Zhu"}, {"name": "Chunxia Guo"}, {"name": "Rui Zhang"}, {"name": "Lianghui Huang"}, {"name": "Ren Zhang"}, {"name": "Li Chen"}], "author_count": 6}, {"id": "2606.30235", "category": "cond-mat", "title": "Surviving the Attack of the Clones", "abstract": "We consider a population dynamics model in which each diffusing particle that hits a catalytic surface can split into two independent copies (clones). The particles of such a growing-in-size population search in parallel for a hidden partially reactive target to trigger a reaction event (e.g., a viral attack). We investigate the statistics of the fastest first-reaction time (FRT) among all the particles. We establish a nonlinear integral equation for the survival probability and then analyze the associated probability density of the FRT and its moments. Lower and upper bounds on the mean FRT are then deduced in terms of the system parameters (target reactivity, catalytic rate, diffusivity, etc.). Because autocatalytic replication can rapidly increase the number of searchers, it can substantially accelerate the diffusive search. We solve the nonlinear equations numerically in a basic geometric setting and reveal advantages and limitations on the autocatalytic search.", "url": "https://arxiv.org/abs/2606.30235", "type": "理论+数值", "summary": "我们考虑一个群体动力学模型，其中撞击催化表面的每个扩散粒子可以分裂成两个独立的副本（克隆）。这种规模不断增长的粒子群并行搜索隐藏的部分反应目标以触发反应事件（例如病毒攻击）。 We investigate the statistics of the fastest first-reaction time (FRT) among all the particles.我们建立了生存概率的非线性积分方程，然后分析了 FRT 及其矩的相关概率密度。然后根据系统参数（目标反应性、催化速率、扩散率等）推导出平均 FRT 的下限和上限。 Because autocatalytic replication can rapidly increase the number of searchers, it can substantially accelerate the diffusive search. We solve the nonlinear equations numerically in a basic geometric setting and reveal advantages and limitations on the autocatalytic search.", "authors": [{"name": "Denis S. Grebenkov"}], "featured_authors": [{"name": "Denis S. Grebenkov"}], "author_count": 1}, {"id": "2606.30245", "category": "cond-mat", "title": "Topological control of third-harmonic generation in a mesoscopic quantum ring with spiral dislocation", "abstract": "We investigate the nonlinear optical response of a two-dimensional mesoscopic quantum ring subjected to a spiral dislocation, with emphasis on third-harmonic generation (THG). The topological defect is modeled through a torsion-induced deformation of space, which modifies the effective metric without introducing curvature. By combining the minimal-coupling prescription in curved space with a radial ring confinement and a perpendicular magnetic field, we derive the effective radial Schrödinger problem, obtain the bound states, and evaluate the nonlinear susceptibilities within the electric-dipole approximation. We show that the axial symmetry of the topologically deformed ring preserves the dipole selection rule $\\Delta m=\\pm 1$ and therefore suppresses second-harmonic generation, while THG remains allowed through multistep transition chains. The study is further expanded through three complementary analyses that can be implemented without changing the Hamiltonian: a dephasing-controlled study of spectral resolution, three-dimensional waterfall spectra showing the dependence on $\\beta$ and $B$, and a channel-resolved decomposition of the THG amplitude. Together, these results establish the spiral dislocation as a robust geometric knob for tuning nonlinear optical activity in mesoscopic ring-shaped nanostructures.", "url": "https://arxiv.org/abs/2606.30245", "type": "理论+数值", "summary": "我们研究了受到螺旋位错影响的二维介观量子环的非线性光学响应，重点是三次谐波产生（THG）。拓扑缺陷通过扭转引起的空间变形进行建模，从而在不引入曲率的情况下修改有效度量。通过将弯曲空间中的最小耦合规定与径向环约束和垂直磁场相结合，我们推导了有效径向薛定谔问题，获得了束缚态，并评估了电偶极近似内的非线性磁化率。我们表明，拓扑变形环的轴对称性保留了偶极子选择规则 $\\Delta m=\\pm 1$，因此抑制了二次谐波的产生，而 THG 仍然允许通过多步过渡链。该研究通过可在不改变哈密顿量的情况下实施的三个补充分析进一步扩展：光谱分辨率的相移控制研究、显示对 $\\beta$ 和 $B$ 依赖性的三维瀑布光谱，以及 THG 幅度的通道解析分解。\n\n总之，这些结果将螺旋位错确立为稳健的几何旋钮，用于调节介观环形纳米结构中的非线性光学活动。", "authors": [{"name": "Carlos Magno O. Pereira"}, {"name": "Denise Assafrão"}, {"name": "Edilberto O. Silva"}], "featured_authors": [{"name": "Carlos Magno O. Pereira"}, {"name": "Denise Assafrão"}, {"name": "Edilberto O. Silva"}], "author_count": 3}, {"id": "2606.30261", "category": "cond-mat", "title": "Robust secret storage in networks", "abstract": "The problem of storing secure information on a network is studied. A formal framework for distributed secret storage is introduced, and possible applications in technological and social systems are discussed. The problem is formulated as the optimization of a robustness functional in which two competing requirements are balanced: survivability under network-degrading processes and resistance to adversarial compromise. An exact representation of survivability is derived in terms of minimal information-carrying subgraphs (MICS), which provide a reduced description of the reconstruction events relevant to the stored information. This representation is then used to construct semi-local optimization methods whose dynamics do not require global knowledge of the network structure. Finally, it is shown that, in a limiting case, the robustness functional can be mapped naturally to an effective spin Hamiltonian.", "url": "https://arxiv.org/abs/2606.30261", "type": "理论+数值", "summary": "研究了在网络上存储安全信息的问题。介绍了分布式秘密存储的正式框架，并讨论了在技术和社会系统中的可能应用。该问题被表述为鲁棒性函数的优化，其中平衡了两个相互竞争的要求：网络退化过程下的生存性和对抗性妥协的抵抗力。生存性的精确表示是根据最小信息携带子图（MICS）得出的，它提供了与存储信息相关的重建事件的简化描述。然后使用该表示来构建半局部优化方法，其动力学不需要网络结构的全局知识。最后，结果表明，在极限情况下，鲁棒性函数可以自然地映射到有效的自旋哈密顿量。", "authors": [{"name": "Vinko Zlatić"}], "featured_authors": [{"name": "Vinko Zlatić"}], "author_count": 1}, {"id": "2606.30401", "category": "cond-mat", "title": "Stress tensor field and mesoscopic stresses in the vertex model for tissues", "abstract": "Mechanical stresses are fundamental regulators in biological tissues, where the vertex model (VM) is pivotal for theoretical and force-inference studies. Yet, no uniform expression for the stress tensor exists for the VM. Here we provide a microscopic derivation of it, linking mesoscopic stresses to the VM forces. The stress field presents a freedom on how tensions are distributed across cells, which allows previous expressions to emerge as particular realizations of the field and suggests a link between mesoscopic stresses and cytoskeletal force-transmission architectures in real cells.", "url": "https://arxiv.org/abs/2606.30401", "type": "理论", "summary": "机械应力是生物组织中的基本调节因子，其中顶点模型 (VM) 对于理论和力推断研究至关重要。然而，VM 不存在应力张量的统一表达式。在这里，我们提供了它的微观推导，将细观应力与 VM 力联系起来。应力场呈现出细胞间张力如何分布的自由，这使得先前的表达能够作为该场的特定实现而出现，并表明介观应力与真实细胞中的细胞骨架力传递结构之间的联系。", "authors": [{"name": "Paulo C. Godolphim"}, {"name": "Leonardo G. Brunnet"}, {"name": "Rodrigo Soto"}], "featured_authors": [{"name": "Paulo C. Godolphim"}, {"name": "Leonardo G. Brunnet"}, {"name": "Rodrigo Soto"}], "author_count": 3}, {"id": "2606.30451", "category": "cond-mat", "title": "Estimating Free Energy Differences with Virtually Escorted Trajectories", "abstract": "For a process in which a system is driven irreversibly from equilibrium state $A$ toward equilibrium state $B$, the free energy difference $\\Delta F = F_B-F_A$ can be estimated using the work fluctuation theorem $\\langle e^{-W/T}\\rangle = e^{-\\Delta F/T}$, where $W$ and $T$ denote work and temperature. The estimate often suffers from poor convergence with the number of trajectories used to calculate the average. Borrowing ideas from escorted free energy estimation, and from diffusion models of machine learning, we show how to construct infinitely many work-like quantities, $W_\\theta$, that satisfy $\\langle e^{-W_\\theta/T}\\rangle = e^{-\\Delta F/T}$, for the same underlying dynamics. Our method involves a virtual control field ${\\boldsymbol u}_\\theta$ that does not modify these dynamics. We show how to choose parameter values $\\theta$ to optimize convergence of the free energy estimate, for a fixed set of trajectories. We identify conditions under which our method provides a zero-variance estimator of $\\Delta F$. We use numerical simulations of model systems to illustrate the gains in convergence that our method can achieve.", "url": "https://arxiv.org/abs/2606.30451", "type": "理论+数值", "summary": "对于系统从平衡状态 $A$ 不可逆地驱动到平衡状态 $B$ 的过程，可以使用功涨落定理 $\\langle e^{-W/T}\\rangle = e^{-\\Delta F/T}$ 来估计自由能差 $\\Delta F = F_B-F_A$，其中 $W$ 和 $T$ 表示功和温度。该估计通常与用于计算平均值的轨迹数量收敛性较差。借用伴随自由能估计和机器学习扩散模型的思想，我们展示了如何构造无限多个类似工作的量 $W_\\theta$，对于相同的基础动力学，满足 $\\langle e^{-W_\\theta/T}\\rangle = e^{-\\Delta F/T}$。我们的方法涉及一个虚拟控制场 ${\\boldsymbol u}_\\theta$ ，它不会修改这些动态。我们展示了如何选择参数值 $\\theta$ 来优化一组固定轨迹的自由能估计的收敛性。我们确定了我们的方法提供 $\\Delta F$ 零方差估计量的条件。我们使用模型系统的数值模拟来说明我们的方法可以实现的收敛增益。", "authors": [{"name": "Sangyun Lee"}, {"name": "Christopher Jarzynski"}], "featured_authors": [{"name": "Sangyun Lee"}, {"name": "Christopher Jarzynski"}], "author_count": 2}, {"id": "2606.30464", "category": "cond-mat", "title": "NQS-Agent: Health-Aware Agentic Hyperparameter Optimization for Neural-Network Quantum States", "abstract": "Neural-network quantum states (NQS) provide expressive variational representations for strongly correlated quantum many-body systems, but their practical accuracy depends sensitively on architecture-level hyperparameters and optimization schedules. Here we develop NQS-Agent, an implemented open-source software framework for health-aware hyperparameter optimization (HPO) in NQS calculations. Its workflow monitors energy trajectories, detects destructive optimization events, stops unstable calculations, modifies the learning-rate schedule, resumes optimization from safe checkpoints, and ranks candidates with an anomaly-aware score. We demonstrate the approach on a residual convolutional NQS for the square-lattice Heisenberg $J_1$-$J_2$ model, using architectures with parameter counts comparable to aCNN, a convolutional NQS architecture used here as a reference. The results show that NQS-Agent improves over the reported human-tuned aCNN baseline for the aCNN reference architecture and identifies a structurally distinct wide-and-shallow competitive candidate within the parameter-count-matched residual-CNN search space. These results show that the stability and recovery history of an optimization trajectory should be considered when assessing an NQS result. Health-aware HPO therefore provides a reproducible tuning protocol that goes beyond selecting a single lowest-energy calculation.", "url": "https://arxiv.org/abs/2606.30464", "type": "理论+数值", "summary": "神经网络量子态 (NQS) 为强相关量子多体系统提供了富有表现力的变分表示，但其实际精度敏感地取决于架构级超参数和优化计划。在这里，我们开发了 NQS-Agent，这是一个实现的开源软件框架，用于 NQS 计算中的健康感知超参数优化 (HPO)。其工作流程监控能量轨迹，检测破坏性优化事件，停止不稳定的计算，修改学习率计划，从安全检查点恢复优化，并通过异常感知分数对候选者进行排名。我们使用参数计数与 aCNN（此处用作参考的卷积 NQS 架构）相当的架构，演示了方格海森堡 $J_1$-$J_2$ 模型的残差卷积 NQS 的方法。结果表明，NQS-Agent 改进了 aCNN 参考架构报告的人工调整 aCNN 基线，并在参数计数匹配的残差 CNN 搜索空间中识别出结构独特的宽浅竞争候选者。\n\n这些结果表明，在评估 NQS 结果时应考虑优化轨迹的稳定性和恢复历史。因此，健康感知 HPO 提供了一种可重复的调整协议，而不仅仅是选择单个最低能量计算。", "authors": [{"name": "Jia-Qi Wang"}, {"name": "Xiao-Qi Han"}, {"name": "Ze-Feng Gao"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "featured_authors": [{"name": "Jia-Qi Wang"}, {"name": "Xiao-Qi Han"}, {"name": "Ze-Feng Gao"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "author_count": 5}, {"id": "2606.30465", "category": "cond-mat", "title": "Heat rectification through a quantum two-level system", "abstract": "We study heat rectification through a quantum two-level system asymmetrically coupled to two thermal baths, as described by the Ohmic spin-boson model. We evaluate the steady-state heat current using a tensor-network approach, which enables us to access the strongly correlated regime, and benchmark the results against analytical formulas in several limiting regimes, including the weak-coupling and incoherent-tunneling regimes. We identify a scaling regime where the studied system flows from an ultraviolet regime, at temperatures larger than the Kondo temperature, to an infrared regime, at temperatures lower than the Kondo temperature. By applying perturbation theory near the infrared fixed point, we find that the rectification ratio follows a universal power law. Our numerical results agree well with this analytical prediction. Our results provide a fundamental understanding of how dissipation-induced many-body physics affects heat transport.", "url": "https://arxiv.org/abs/2606.30465", "type": "理论+数值", "summary": "我们通过不对称耦合到两个热浴的量子两级系统研究热整流，如欧姆自旋玻色子模型所描述的。我们使用张量网络方法评估稳态热流，这使我们能够访问强相关区域，并根据几个限制区域（包括弱耦合和非相干隧道区域）中的分析公式对结果进行基准测试。我们确定了一个缩放范围，其中所研究的系统从温度高于近藤温度的紫外线范围流向温度低于近藤温度的红外线范围。通过应用红外固定点附近的摄动理论，我们发现整流比遵循通用幂律。我们的数值结果与这一分析预测非常吻合。我们的结果提供了对耗散引起的多体物理如何影响热传输的基本理解。", "authors": [{"name": "Tsuyoshi Yamamoto"}, {"name": "Manuel Houzet"}], "featured_authors": [{"name": "Tsuyoshi Yamamoto"}, {"name": "Manuel Houzet"}], "author_count": 2}, {"id": "2606.30501", "category": "cond-mat", "title": "Scale-coupling from kirigami cuts controls emergent mechanics in liquid crystal elastomers", "abstract": "Conventional materials derive their properties from microscopic composition and arrangement, whereas mechanical metamaterials are defined by mesoscopic structure rather than constituent material. Bridging these paradigms, using macroscopic geometric alterations to orchestrate microscopic degrees of freedom and program mechanics, remains a central challenge. Here, we demonstrate that cuts in anisotropic, responsive solids provide such a connection. Using liquid crystal elastomer (LCE) sheets with kirigami patterns, we reveal that engineering strain through cuts harnesses molecular anisotropy to control emergent mechanics. Similarly, the interplay between cut patterns and the molecular phase transition of LCEs enables soft robotics functionalities such as supersoft grippers with remote actuation and architectures that reversibly morph under temperature variations, behaviors inaccessible to conventional kirigami or LCE sheets alone. LCE kirigami thus establish a new class of multiscale metamaterials in which geometry governs access to microscopic degrees of freedom, to program macroscopic function.", "url": "https://arxiv.org/abs/2606.30501", "type": "理论", "summary": "传统材料的特性源自微观组成和排列，而机械超材料是由介观结构而不是构成材料定义的。连接这些范式，使用宏观几何改变来协调微观自由度和程序机制，仍然是一个核心挑战。在这里，我们证明了各向异性、响应性固体的切割提供了这样的连接。使用具有剪纸图案的液晶弹性体（LCE）片，我们揭示了通过切割的工程应变利用分子各向异性来控制紧急力学。同样，切割图案和 LCE 分子相变之间的相互作用使得软机器人功能成为可能，例如具有远程驱动的超软夹具和在温度变化下可逆变形的结构，这是传统剪纸或 LCE 片材无法实现的行为。因此，LCE kirigami 建立了一种新型多尺度超材料，其中几何形状控制着微观自由度的访问，以编程宏观功能。", "authors": [{"name": "M. Strugaru"}, {"name": "M. Ly"}, {"name": "Q. Martinet"}, {"name": "B. Bickel"}, {"name": "J. Palacci"}], "featured_authors": [{"name": "M. Strugaru"}, {"name": "M. Ly"}, {"name": "Q. Martinet"}, {"name": "B. Bickel"}, {"name": "J. Palacci"}], "author_count": 5}, {"id": "2606.30503", "category": "cond-mat", "title": "A Field-Theoretic Framework for Work Statistics and Universal Scaling in Non-equilibrium Phase Transitions", "abstract": "We develop a field-theoretic framework for work statistics in $O(N)$ models driven through criticality. By analyzing the dynamic renormalization group flow of composite power operators, we find the Kibble-Zurek scaling laws as a natural consequence of the flow, and we derive the scaling of work cumulants relevant to Kibble-Zurek scaling of topological defects from first principles, bypassing heuristic freeze-out argument. This yields the universal scaling $c_n \\sim \\tau_Q^{-\\alpha_n}$ for the $n$-th work cumulant density: isolated quantum systems exhibit a scaling of $\\alpha_n = p(d+nz)\\nu/(1+pz\\nu)$, whereas open quantum and classical systems undergo a dimensional collapse to $\\alpha_n = pd\\nu/(1+pz\\nu)$. Validated by exact Gaussian solutions and numerical simulations, our theory establishes a foundation for general work statistics far from equilibrium, thereby bridging stochastic thermodynamics and the renormalization group theory.", "url": "https://arxiv.org/abs/2606.30503", "type": "理论+数值", "summary": "我们开发了一个场论框架，用于通过关键性驱动的 $O(N)$ 模型中的工作统计。通过分析复合幂算子的动态重整化群流，我们发现 Kibble-Zurek 标度律是流的自然结果，并且我们从第一原理推导出与拓扑缺陷的 Kibble-Zurek 标度相关的功累积量标度，绕过启发式冻结论证。这产生了第 $n$ 个工作累积密度的通用标度 $c_n \\sim \\tau_Q^{-\\alpha_n}$ ：孤立的量子系统表现出 $\\alpha_n = p(d+nz)\\nu/(1+pz\\nu)$ 的标度，而开放量子和经典系统则经历维度崩溃到 $\\alpha_n = pd\\nu/(1+pz\\nu)$。通过精确的高斯解和数值模拟的验证，我们的理论为远离平衡的一般工作统计奠定了基础，从而弥合了随机热力学和重正化群论。", "authors": [{"name": "Yanbo Qiao"}, {"name": "Ruohan Xu"}, {"name": "H. T. Quan"}], "featured_authors": [{"name": "Yanbo Qiao"}, {"name": "Ruohan Xu"}, {"name": "H. T. Quan"}], "author_count": 3}, {"id": "2606.30539", "category": "cond-mat", "title": "Finite-size effects in Schulz-Shastry-Luttinger models for determining anyonic signatures in 1d spin chains", "abstract": "We study finite-size properties of Schulz-Shastry-Luttinger liquids to reveal anyonic signatures, realized as low-energy excitations on top of the helical ground state in saturated spin-1/2 zigzag chains. The model features asymmetric and marginal couplings of density and phase gradients and belongs to the Schulz-Shastry class. We investigate periodic and Dirichlet boundary conditions and discuss its diagonalization as well as its stability. Although Dirichlet boundary conditions require a fine-tuning of coupling constants and universal parameters, only their magnitude is restricted for cyclic systems. We derive boundary characteristic quantities like Friedel oscillations and persistent currents. Finally, we discuss the bulk and boundary behavior of the longitudinal spin correlations including subleading corrections.", "url": "https://arxiv.org/abs/2606.30539", "type": "理论", "summary": "我们研究 Schulz-Shastry-Luttinger 液体的有限尺寸特性，以揭示任意子特征，这些特征是通过饱和自旋 1/2 锯齿链中螺旋基态顶部的低能激发来实现的。该模型具有密度和相位梯度的不对称和边际耦合，属于 Schulz-Shastry 类。我们研究周期性和狄利克雷边界条件并讨论其对角化及其稳定性。尽管狄利克雷边界条件需要耦合常数和通用参数的微调，但循环系统仅限制它们的大小。我们推导出边界特征量，如弗里德尔振荡和持续电流。最后，我们讨论纵向自旋相关性的体和边界行为，包括次主导修正。", "authors": [{"name": "B. Perković"}, {"name": "M. Bonkhoff"}, {"name": "T. Posske"}], "featured_authors": [{"name": "B. Perković"}, {"name": "M. Bonkhoff"}, {"name": "T. Posske"}], "author_count": 3}, {"id": "2606.30607", "category": "cond-mat", "title": "Ferromagnetic ordering in Hubbard models", "abstract": "One of the long-standing and only partially solved problems of theoretical condensed matter physics and mathematical physics is to demonstrate that ground states of some of the versions of the Hubbard model can exhibit a ferromagnetic ordering. It has long been speculated that the opportunity crucial for the occurrence of ferromagnetism is the structure of the lattice on which the Hubbard model is formulated \\cite{TasakiMB}. As a consequence, while on simple cubic lattices no ferromagnetic ordering seems to be possible, it can naturally arise, even for low densities of magnetic moment carriers, on so-called frustrated lattices. We investigate the problem of ground state ferromagnetic ordering with the use of the formula for ground-state energy of interacting fermions as the first term of `density expansion', proven rigorously by Lieb, Seiringer and Solovej \\cite{fermi exact} in continuum and by Giuliani \\cite{hub exact} for the simple cubic lattice. Assuming that analogous expansion holds also for certain another lattices we apply this formula to five frustrated lattices -- among them to the face-centered cubic one. The hypothesis is confirmed: most of examined models formulated on frustrated lattices do indeed have ferromagnetic ground states already for densities being moderate or even low. Although the approach adopted cannot be treated as a rigorous proof that the ground state is ferromagnetic, the results obtained here strongly indicate that it can be the case. Moreover, as in some cases FM occurs at low densities, one can hope that it would be possible to prove convergence of the density expansion and prove rigorously the occurrence of `wealthy ferromagnetism' in these cases.", "url": "https://arxiv.org/abs/2606.30607", "type": "理论+数值", "summary": "理论凝聚态物理学和数学物理学长期存在且仅部分解决的问题之一是证明哈伯德模型的某些版本的基态可以表现出铁磁有序性。长期以来，人们一直推测，铁磁性发生的关键机会是制定哈伯德模型的晶格结构\\cite{TasakiMB}。因此，虽然在简单的立方晶格上似乎不可能有铁磁排序，但即使对于低密度的磁矩载流子，它也可以在所谓的受挫晶格上自然出现。我们使用相互作用费米子的基态能量公式作为“密度展开”的第一项来研究基态铁磁有序问题，该公式由 Lieb、Seiringer 和 Solovej \\cite{fermi exact} 在连续体中以及由 Giuliani \\cite{hub exact} 在简单立方晶格中严格证明。假设类似的展开式也适用于某些其他晶格，我们将此公式应用于五个受挫晶格 - 其中包括面心立方晶格。\n\n该假设得到证实：大多数在受挫晶格上制定的检查模型确实已经具有中等甚至低密度的铁磁基态。尽管所采用的方法不能被视为基态是铁磁的严格证明，但这里获得的结果强烈表明情况可能如此。此外，由于在某些情况下，FM 发生在低密度下，人们可以希望能够证明密度展开的收敛性，并严格证明在这些情况下“富铁磁性”的发生。", "authors": [{"name": "Wojciech Niedziółka"}, {"name": "Jacek Wojtkiewicz"}], "featured_authors": [{"name": "Wojciech Niedziółka"}, {"name": "Jacek Wojtkiewicz"}], "author_count": 2}, {"id": "2606.30619", "category": "cond-mat", "title": "Why can genetic algorithms work in high-dimensional search spaces?", "abstract": "We show that the effective dynamics of the elitist $(1+M)$ genetic algorithm is, in the limit of small mutations, clipped gradient descent on the loss in the presence of anisotropic Gaussian white noise. In expectation, therefore, a simple mutation-selection genetic algorithm follows the gradient of the loss, without explicit calculation of gradients and without averaging over loss evaluations. The genetic algorithm is slower than gradient descent because of the noise that acts in directions transverse to the gradient. However, this slowdown is controlled not by the number of parameters of the search space but by the effective rank of the Hessian of the loss function. For the concentrated Hessian spectra observed in neural-network loss functions the effective rank can be far smaller than the number of parameters, which may explain why genetic algorithms can scale to large search spaces.", "url": "https://arxiv.org/abs/2606.30619", "type": "数值", "summary": "我们证明了精英 $(1+M)$ 遗传算法的有效动态是，在小突变的限制下，在存在各向异性高斯白噪声的情况下，对损失进行梯度下降。因此，在预期中，简单的突变选择遗传算法遵循损失的梯度，无需显式计算梯度，也无需对损失评估进行平均。由于噪声作用于梯度的横向方向，遗传算法比梯度下降慢。然而，这种减慢不是由搜索空间的参数数量控制，而是由损失函数的 Hessian 有效秩控制。对于在神经网络损失函数中观察到的集中 Hessian 谱，有效秩可能远小于参数的数量，这可以解释为什么遗传算法可以扩展到大搜索空间。", "authors": [{"name": "Stephen Whitelam"}], "featured_authors": [{"name": "Stephen Whitelam"}], "author_count": 1}, {"id": "2606.28408", "category": "hep-th", "title": "Quantum Black Hole Chemistry from Double Holography", "abstract": "Extended black hole thermodynamics exposes a sharp tension in the usual holographic dictionary: at fixed boundary conformal frame, changing the AdS radius changes both the central charge and the spatial volume of the CFT, apparently locking the color and volume sectors of the first law. We show that this degeneracy is naturally removed for quantum black holes in Karch--Randall double holography. The mechanism is intrinsically semiclassical. Replacing the holographic regulator surface by a physical brane induces gravity coupled to a cutoff CFT, so classical bulk black holes become lower-dimensional quantum black holes whose geometry includes the cutoff-matter stress tensor to all orders in backreaction. This backreacting matter sector supplies a color variable distinct from the defect volume. We demonstrate the mechanism explicitly for the quantum BTZ black hole. Thus quantum backreaction resolves the same color-volume degeneracy addressed by the recent Weyl-factor proposal, but without introducing a non-standard boundary modulus. Instead, the missing thermodynamic direction is supplied by the physical cutoff-matter sector of the doubly holographic quantum black hole.", "url": "https://arxiv.org/abs/2606.28408", "type": "理论", "summary": "扩展的黑洞热力学暴露了通常的全息字典中的尖锐张力：在固定边界共角框架下，改变AdS半径会改变CFT的中心电荷和空间体积，显然锁定了第一定律的颜色和体积部分。我们证明，在卡奇-兰德尔双全息术中，量子黑洞的简并性自然被消除。该机制本质上是半经典的。用物理膜取代全息调节器表面会引起与截止 CFT 耦合的重力，因此经典体黑洞变成低维量子黑洞，其几何结构包括反反应中所有阶的截止物质应力张量。该反反应物质部分提供了与缺陷体积不同的颜色变量。我们明确地证明了量子 BTZ 黑洞的机制。因此，量子反反应解决了最近韦尔因子提议所解决的相同颜色体积简并性，但没有引入非标准边界模量。相反，缺失的热力学方向是由双全息量子黑洞的物理截止物质扇区提供的。", "authors": [{"name": "Naman Kumar"}], "featured_authors": [{"name": "Naman Kumar"}], "author_count": 1}, {"id": "2606.28424", "category": "hep-th", "title": "Meson states in `t Hooft model: Hamiltonian approach", "abstract": "We point out that the masses of the highly excited bound quark-antiquark states in QCD$_2$ in the infinite $N$ limit may be determined in the framework of a simple quantum-mechanical model with the potential $V(x) = \\sigma |x|$. In the ultrarelativistic case, the masses follow the pattern $$ \\mu_n^2 \\ =\\ \\frac {g^2 N}{2\\pi} n, $$ which coincides with the law derived by `t Hooft by solving the Bethe--Salpeter equation. In constrast to what follows from the exact analysis, the levels of the relativistic Hamiltonian have finite widths, but these widths are exponentially suppressed, $\\Gamma_n \\propto \\exp\\{-2\\pi m^2/\\sigma\\}$ for large quark masses. In the nonrelativistic case, the levels follow the asymptotics $\\epsilon_n = \\mu_n - 2m = Cn^{2/3}$, where the constant $C$ can be determined by solving the `t Hooft equation or alternatively the nonrelativistic Schrödinger equation.", "url": "https://arxiv.org/abs/2606.28424", "type": "理论", "summary": "我们指出，无限 $N$ 极限中 QCD$_2$ 中的高激发束缚夸克-反夸克态的质量可以在一个简单的量子力学模型框架中确定，其势为 $V(x) = \\sigma |x|$。在超相对论情况下，质量遵循 $$ \\mu_n^2 \\ =\\ \\frac {g^2 N}{2\\pi} n, $$ 模式，这与 `t Hooft 通过求解 Bethe-Salpeter 方程导出的定律一致。与精确分析得出的结果相反，相对论哈密顿量的能级具有有限的宽度，但这些宽度被指数抑制，对于大夸克质量，$\\Gamma_n \\propto \\exp\\{-2\\pi m^2/\\sigma\\}$。在非相对论情况下，各能级遵循渐近方程 $\\epsilon_n = \\mu_n - 2m = Cn^{2/3}$，其中常数 $C$ 可以通过求解 `t Hooft 方程或非相对论薛定谔方程来确定。", "authors": [{"name": "A.V. Smilga"}], "featured_authors": [{"name": "A.V. Smilga"}], "author_count": 1}, {"id": "2606.28484", "category": "hep-th", "title": "Subregion observer rules from generalized entanglement wedges", "abstract": "We consider rules for modifying holographic tensor networks proposed in two independent contexts: by the Colorado (CO) group in 2503.09681 to incorporate observers in holographic maps, and by Kaya-Rath-Ritchie (KRR) in 2506.10064 to derive the Bousso-Penington generalized entanglement wedge proposal. Interestingly, these two sets of tensor network rules are exactly equivalent. This suggests a more general connection between these Abdalla-Antonini-Iliesiu-Levine (AAIL) inspired observer rules and generalized entanglement wedges. To pursue this connection, we first use KRR's analogous rules for the gravitational path integral (based on fixed geometry states) to generalize AAIL's path integral rules to include observers occupying a bulk subregion. Additionally, we leverage the connection in the opposite direction by using the AAIL rules to derive the Bousso-Penington proposal for pointlike bulk regions in JT gravity.", "url": "https://arxiv.org/abs/2606.28484", "type": "理论", "summary": "我们考虑在两个独立背景下提出的修改全息张量网络的规则：由科罗拉多 (CO) 小组在 2503.09681 将观察者纳入全息地图，以及由 Kaya-Rath-Ritchie (KRR) 在 2506.10064 提出的 Bousso-Penington 广义纠缠楔提案。有趣的是，这两套张量网络规则是完全等价的。这表明这些受 Abdalla-Antonini-Iliesiu-Levine (AAIL) 启发的观察者规则和广义纠缠楔之间存在更普遍的联系。为了寻求这种联系，我们首先使用 KRR 的类似引力路径积分规则（基于固定几何状态）来概括 AAIL 的路径积分规则，以包括占据大块子区域的观察者。此外，我们通过使用 AAIL 规则来利用相反方向的连接，导出 JT 重力中点状体区域的 Bousso-Penington 提议。", "authors": [{"name": "Lana Bozanic"}, {"name": "Kenneth Higginbotham"}, {"name": "Chris Waddell"}], "featured_authors": [{"name": "Lana Bozanic"}, {"name": "Kenneth Higginbotham"}, {"name": "Chris Waddell"}], "author_count": 3}, {"id": "2606.28485", "category": "hep-th", "title": "Geometric pairing of Nambu--Goldstone modes in spacetime symmetry breaking", "abstract": "We identify a geometric pairing mechanism in systems with spontaneously broken spacetime symmetries, whereby pairs of Goldstone fields become canonically conjugate and hybridize into a single type-B Nambu--Goldstone mode (NGM). The mechanism originates from deformations of the local spacetime volume element induced by Goldstone fluctuations, which endow the Goldstone manifold with a Berry curvature. Integrating this pairing with existing reductions, we propose a general counting formula for the number of gapless NGMs in many-body systems. We demonstrate the mechanism in a microscopic model of a two-component Bose--Einstein condensate, where the dilaton and the $U(1)$ Goldstone field combine into a single NGM with quadratic dispersion.", "url": "https://arxiv.org/abs/2606.28485", "type": "理论", "summary": "我们在时空对称性自发破缺的系统中发现了一种几何配对机制，通过该机制，成对的戈德斯通场变得正则共轭，并杂化成单个 B 型南部——戈德斯通模式（NGM）。该机制源于戈德斯通涨落引起的局部时空体积元的变形，赋予戈德斯通流形贝里曲率。将这种配对与现有的减少相结合，我们提出了多体系统中无间隙 NGM 数量的通用计数公式。我们在双组分玻色-爱因斯坦凝聚体的微观模型中演示了该机制，其中膨胀子和 $U(1)$ 戈德斯通场结合成具有二次色散的单个 NGM。", "authors": [{"name": "Aleksander Głódkowski"}], "featured_authors": [{"name": "Aleksander Głódkowski"}], "author_count": 1}, {"id": "2606.28487", "category": "hep-th", "title": "Calabi-Yau Metrics with Full Moduli Dependence", "abstract": "Recent advances in numerical and machine-learning methods have enabled highly accurate constructions of Ricci-flat metrics on compact Calabi-Yau three-folds. For phenomenological applications it is crucial to understand how these metrics vary across moduli space. In this work, we construct approximate analytic expressions for Ricci-flat Calabi-Yau metrics with explicit complex-structure and Kähler moduli dependence by combining machine-learned numerical data with symbolic regression. Our approach is based on an explicit Ansatz for the Kähler potential with moduli-dependent coefficients. Fitting this Ansatz to numerical data and applying symbolic regression allows us to reconstruct analytic formulae for these coefficients, thereby obtaining approximate Ricci-flat metrics with explicit moduli dependence. We apply the construction to a one-parameter family of bi-cubic three-folds in $\\mathbb{P}^2 \\times \\mathbb{P}^2$, achieving percent-level agreement with the underlying numerical data.", "url": "https://arxiv.org/abs/2606.28487", "type": "理论", "summary": "数值和机器学习方法的最新进展使得在紧凑的 Calabi-Yau 三重上高度精确地构建 Ricci-flat 度量成为可能。对于现象学应用来说，理解这些指标如何在模空间中变化是至关重要的。在这项工作中，我们通过将机器学习的数值数据与符号回归相结合，构建了具有显式复结构和 Kähler 模依赖性的 Ricci-flat Calabi-Yau 度量的近似解析表达式。我们的方法基于具有模相关系数的 Kähler 势的显式 Ansatz。将此 Ansatz 拟合到数值数据并应用符号回归使我们能够重建这些系数的分析公式，从而获得具有显式模依赖性的近似 Ricci 平坦度量。我们将该构造应用于 $\\mathbb{P}^2 \\times \\mathbb{P}^2$ 中的双三次三重单参数族，实现了与基础数值数据的百分比级一致性。", "authors": [{"name": "Andrei Constantin"}, {"name": "Seung-Joo Lee"}, {"name": "Andre Lukas"}, {"name": "Luca A. Nutricati"}], "featured_authors": [{"name": "Andrei Constantin"}, {"name": "Seung-Joo Lee"}, {"name": "Andre Lukas"}, {"name": "Luca A. Nutricati"}], "author_count": 4}, {"id": "2606.28511", "category": "hep-th", "title": "Orientifolds of Gepner models without Kähler moduli", "abstract": "One of the main challenges in string theory Calabi-Yau compactifications to four dimensions is the stabilization of the massless complex structure and Kähler moduli. In type IIB string theory, complex structure moduli can be stabilized perturbatively by turning on fluxes on the internal space, while there is no perturbative mechanism for Kähler moduli stabilization. Since every Calabi-Yau manifold has at least one Kähler modulus (the overall volume), there is no hope to stabilize all moduli perturbatively. A way out is given by Landau-Ginzburg/Gepner models string vacua which can have no Kähler moduli. To identify the most promising candidates for fully stabilized perturbative string vacua, we provide an exhaustive list of Landau-Ginzburg orientifold models with no Kähler moduli, and compute for each model the number of complex structure moduli together with the tadpole charge. From this, we can identify which of these models are genuine candidates for phenomenologically relevant string vacua.", "url": "https://arxiv.org/abs/2606.28511", "type": "理论", "summary": "弦理论卡拉比-丘压缩到四个维度的主要挑战之一是无质量复杂结构和凯勒模量的稳定性。在IIB型弦理论中，复杂结构模量可以通过打开内部空间的通量来扰动稳定，而凯勒模量的稳定没有扰动机制。由于每个 Calabi-Yau 流形都至少有一个凯勒模量（总体积），因此不可能扰动地稳定所有模量。 Landau-Ginzburg/Gepner 模型的弦真空给出了一条出路，它可以没有凯勒​​模量。为了确定完全稳定的扰动弦真空的最有希望的候选者，我们提供了没有凯勒模的 Landau-Ginzburg 东方模型的详尽列表，并计算每个模型的复杂结构模数以及蝌蚪电荷。由此，我们可以确定哪些模型是现象​​学相关弦真空的真正候选者。", "authors": [{"name": "Miguel Morros"}, {"name": "Johannes Walcher"}, {"name": "Qi You"}], "featured_authors": [{"name": "Miguel Morros"}, {"name": "Johannes Walcher"}, {"name": "Qi You"}], "author_count": 3}, {"id": "2606.28550", "category": "hep-th", "title": "Dynamically Generated Fermi Surface Mismatch and Relativistic Superfluidity in a Two-Component Massless Fermionic Theory", "abstract": "When fermions pair across mismatched Fermi surfaces, the mismatch reflects a built-in inequivalence between the species. We show it can instead arise dynamically by spontaneous symmetry breaking. In a massless two component Dirac theory with exact SU(2) flavor symmetry, a self-interacting vector boson condenses, splitting the Fermi surfaces while preserving time reversal. Pairing then yields a stable relativistic superfluid, promoting the Chandrasekhar-Clogston line to a surface in coupling space, the mismatch fixed self-consistently by the symmetry-breaking coupling.", "url": "https://arxiv.org/abs/2606.28550", "type": "理论", "summary": "当费米子在不匹配的费米表面上配对时，这种不匹配反映了物种之间内在的不平等。我们证明它可以通过自发对称性破缺动态地产生。在具有精确 SU(2) 风味对称性的无质量二元狄拉克理论中，自相互作用矢量玻色子凝结，分裂费米面，同时保持时间反转。然后配对产生稳定的相对论性超流体，将钱德拉塞卡-克洛斯顿线提升到耦合空间中的表面，失配通过对称破缺耦合自洽地固定。", "authors": [{"name": "Susobhan Mandal"}, {"name": "Sambuddha Sanyal"}], "featured_authors": [{"name": "Susobhan Mandal"}, {"name": "Sambuddha Sanyal"}], "author_count": 2}, {"id": "2606.28783", "category": "hep-th", "title": "UV completion of 2D Ising CFT:a golden E_8 massless $S$-matrix", "abstract": "We present a full classification of UV complete QFTs that RG flow to the 2D Ising CFT by solving the bootstrap equations for massless right--left S-matrices. For the Ising model with E_8 spectrum, we find exactly four completions, arising from higher-T\\bar T-type deformations, including a previously unknown ``golden flow'' whose UV fixed point is a diagonal su(2) coset CFT (c=25/14) along \\Delta_{\\rm rel}=2/7. A universal Fibonacci/E_8 structure governs the R--L adjacency matrices and the Y-system periods, so that the E_8 symmetry persists across all RG scales.", "url": "https://arxiv.org/abs/2606.28783", "type": "理论", "summary": "我们通过求解无质量右-左 S 矩阵的自举方程，提出了 UV 完整 QFT 的完整分类，RG 流向 2D Ising CFT。对于具有 E_8 谱的 Ising 模型，我们准确地发现了四个由较高 T\\bar T 型变形引起的补全，包括先前未知的“黄金流”，其 UV 固定点是沿 \\Delta_{\\rm rel}=2/7 的对角线 su(2) 陪集 CFT (c=25/14)。通用 Fibonacci/E_8 结构控制 R--L 邻接矩阵和 Y 系统周期，以便 E_8 对称性在所有 RG 尺度上持续存在。", "authors": [{"name": "Changrim Ahn"}, {"name": "Minkyoo Kim"}], "featured_authors": [{"name": "Changrim Ahn"}, {"name": "Minkyoo Kim"}], "author_count": 2}, {"id": "2606.28814", "category": "hep-th", "title": "CFT Dual for Timelike Geodesic in Lorentzian dS", "abstract": "We construct the Euclidean CFT$_{d}$ dual of a generic massive scalar in Lorentzian dS$_{d+1}$ via analytic continuation. The resulting $PT$ defect defines a $PT$-invariant state that reproduces the Bunch-Davies Wightman function. However, the entanglement entropy captures only the real part of the central charge. This motivates a single-geodesic dual based on the timelike geodesic-integrated Wightman function, which yields the correlators between a bulk operator and a linear combination of an OPE block and its Casimir partner. We also derive the associated conformal defect and anomaly from an integral identity of the dS/CFT symmetry group.", "url": "https://arxiv.org/abs/2606.28814", "type": "理论", "summary": "我们通过解析延拓构造了洛伦兹 dS$_{d+1}$ 中通用大规模标量的欧几里得 CFT$_{d}$ 对偶。由此产生的 $PT$ 缺陷定义了一个 $PT$ 不变状态，可重现 Bunch-Davies Wightman 函数。然而，纠缠熵仅捕获中心电荷的实部。这激发了基于类时测地线积分 Wightman 函数的单测地线对偶，该函数产生体算子与 OPE 块及其卡西米尔伙伴的线性组合之间的相关器。我们还从 dS/CFT 对称群的积分恒等式中推导出相关的共形缺陷和异常。", "authors": [{"name": "Xing Huang"}, {"name": "Chen-Te Ma"}], "featured_authors": [{"name": "Xing Huang"}, {"name": "Chen-Te Ma"}], "author_count": 2}, {"id": "2606.28858", "category": "hep-th", "title": "Axions on de Sitter space", "abstract": "We study a massless minimally coupled compact scalar, or axion, on global $D$-dimensional de Sitter space (dS$_D$). We quantise the theory canonically, determine the quantum dS charges, and find that the axion zero mode supplies a quantum-mechanical factor beyond the oscillator Fock space, $\\mathcal{F}$. The full Hilbert space is $\\mathcal{H}=L^2(S^1)\\otimes\\mathcal{F}$, with the integer quantum-mechanical momentum on $L^2(S^1)$ identified with the conserved $\\mathrm{U}(1)$ shift charge. The 1-particle unitary irreducible representation (UIR) of the dS group, $\\mathrm{SO}(D,1)$, captures the oscillator sector, but misses the zero mode. We find that the neutral 0-particle state is dS-invariant and normalisable. Charged 0-particle states are normalisable, but only $\\mathrm{SO}(D)$ invariant. This implies that geodesic observers related by dS boosts do not agree on the particle number in a charged sector, an effect absent in QFTs equipped only with the standard Bunch-Davies vacuum. We compute field-strength Wightman 2-point functions in charged sectors and find that they are Hadamard. For non-zero charge they are not dS-invariant at finite global times, but they are asymptotically so at early and late times. We complement this analysis with a Euclidean perspective. The ordinary $D$-sphere path integral, $Z_{S^D}$, written in terms of Harish-Chandra characters, has access only to the neutral sector. Charged sectors require vertex-operator insertions, and summing over them gives a decorated sphere path integral, $\\widehat{Z}_{S^D}=Z_\\text{QM}\\,Z_{S^D}$, that captures the entire Hilbert space, with $Z_\\text{QM}$ denoting the partition function of a quantum rotor at a dimension-dependent effective temperature. Finally, in dS$_3$, we use the duality between an axion and a photon to translate our results to electromagnetism, where the axion zero mode gives rise to magnetic monopoles.", "url": "https://arxiv.org/abs/2606.28858", "type": "理论", "summary": "我们研究全局 $D$ 维德西特空间 (dS$_D$) 上的无质量最小耦合紧致标量或轴子。我们规范地量化了该理论，确定了量子 dS 电荷，并发现轴子零模式提供了超出振荡器福克空间 $\\mathcal{F}$ 的量子力学因子。完整的希尔伯特空间为 $\\mathcal{H}=L^2(S^1)\\otimes\\mathcal{F}$，$L^2(S^1)$ 上的整数量子力学动量由守恒的 $\\mathrm{U}(1)$ 移位电荷确定。 dS 群的 1 粒子酉不可约表示 (UIR) $\\mathrm{SO}(D,1)$ 捕获了振荡扇区，但错过了零模式。我们发现中性 0 粒子态是 dS 不变且可归一化的。带电 0 粒子态是可归一化的，但只有 $\\mathrm{SO}(D)$ 不变。这意味着与 dS 增强相关的测地观察者对带电扇区中的粒子数不一致，这种效应在仅配备标准 Bunch-Davies 真空的 QFT 中不存在。我们计算带电扇区中的场强怀特曼 2 点函数，发现它们是 Hadamard。\n\n对于非零电荷，它们在有限的全局时间内不是 dS 不变的，但它们在早期和晚期是渐近的。我们用欧几里得的视角来补充这一分析。普通的$D$球体路径积分$Z_{S^D}$，用Harish-Chandra字符书写，只能访问中立区域。带电扇区需要顶点算子插入，并对它们求和给出修饰球体路径积分 $\\widehat{Z}_{S^D}=Z_\\text{QM}\\,Z_{S^D}$，它捕获整个希尔伯特空间，其中 $Z_\\text{QM}$ 表示量子转子在尺寸相关的有效温度下的配分函数。最后，在 dS$_3$ 中，我们利用轴子和光子之间的对偶性将我们的结果转化为电磁学，其中轴子零模式产生磁单极子。", "authors": [{"name": "Vasileios A. Letsios"}, {"name": "Stathis Vitouladitis"}], "featured_authors": [{"name": "Vasileios A. Letsios"}, {"name": "Stathis Vitouladitis"}], "author_count": 2}, {"id": "2606.29318", "category": "hep-th", "title": "On Padmanabhan's duality invariance and the quantum of length", "abstract": "We provide a field-theoretic construction of Padmanabhan's duality-invariant Feynman propagator for a massive point particle in Euclidean space $\\mathbb{R}^D$. Padmanabhan's propagator includes quantum-gravity effects due to the existence of a quantum of length $\\ell$. Including $O(\\ell^2)$ corrections, the corresponding field-theory model turns out to be a free, massive scalar defined in $\\mathbb{R}^{D+2}$. The two additional dimensions with respect to the original $\\mathbb{R}^D$ provide the necessary room, so to speak, for quantum-gravity fluctuations.", "url": "https://arxiv.org/abs/2606.29318", "type": "理论", "summary": "我们为欧几里德空间 $\\mathbb{R}^D$ 中的大质量点粒子提供了 Padmanabhan 对偶不变费曼传播子的场论构造。由于存在长度 $\\ell$ 的量子，Padmanabhan 的传播器包含量子引力效应。包括 $O(\\ell^2)$ 修正，相应的场论模型结果是一个在 $\\mathbb{R}^{D+2}$ 中定义的自由的、大规模的标量。可以说，相对于原始 $\\mathbb{R}^D$ 的两个附加维度为量子引力涨落提供了必要的空间。", "authors": [{"name": "P. Fernandez de Cordoba"}, {"name": "J.M. Isidro"}, {"name": "A. Pereira Garcia"}], "featured_authors": [{"name": "P. Fernandez de Cordoba"}, {"name": "J.M. Isidro"}, {"name": "A. Pereira Garcia"}], "author_count": 3}, {"id": "2606.29323", "category": "hep-th", "title": "$BMS_3$-like algebras via the $Z_N$-graded $u(1)^2$ Kac-Moody algebra", "abstract": "The Sugawara construction provides a natural way to construct the Virasoro algebra from a current algebra. It was shown in Ref.~\\cite{Ghazi:2025oin} that for the $u(1)^2$ Kac-Moody current algebra, there exist additional constructions that exhibit a $\\mathbb{Z}_N$-graded structure. Indeed, the space of such constructions defines a non-compact algebraic variety whose dimension depends on $N$. In this paper, we consider the compactification of these algebraic varieties by adding points at infinity to the non-compact part, and show that these points correspond precisely to generalizations of $BMS_3$-like algebras. More explicitly, for a $\\mathbb{Z}_2$ grading, the corresponding algebra coincides with the $BMS_3$ algebra, which takes the form $\\mathrm{Vir} \\rtimes F$, where $F$ is an infinite abelian ideal of the full algebra. For $N > 2$, we show that there exist generalizations of the standard $BMS_3$ algebra of the form $\\mathrm{Vir} \\rtimes F$, where $F$ is a nonabelian ideal that forms a nilpotent algebra of depth $r < N$. We further demonstrate that the depth of the algebra is related to the order of the singularity of the algebraic variety at that point. We also show that the polynomials defining the algebraic varieties exhibit a factorization property into linear factors, which, if true, classifies all $BMS_3$-like algebras. Finally, we study the central extensions of these algebras, which are consistent with the general structure of algebras corresponding to primary fields of conformal weight $h = 2$.", "url": "https://arxiv.org/abs/2606.29323", "type": "理论", "summary": "Sukawara 构造提供了一种从当前代数构造 Virasoro 代数的自然方法。 Ref.~\\cite{Ghazi:2025oin} 表明，对于 $u(1)^2$ Kac-Moody 当前代数，存在表现出 $\\mathbb{Z}_N$ 分级结构的附加构造。事实上，这种构造的空间定义了一个非紧代数簇，其维数取决于 $N$。在本文中，我们通过在非紧部分添加无穷远点来考虑这些代数簇的紧化，并表明这些点精确对应于$BMS_3$类代数的推广。更明确地说，对于 $\\mathbb{Z}_2$ 分级，相应的代数与 $BMS_3$ 代数一致，其形式为 $\\mathrm{Vir} \\rtimes F$，其中 $F$ 是完整代数的无限阿贝尔理想。对于 $N > 2$，我们证明存在 $\\mathrm{Vir} \\rtimes F$ 形式的标准 $BMS_3$ 代数的推广，其中 $F$ 是非阿贝尔理想，形成深度 $r < N$ 的幂零代数。我们进一步证明代数的深度与该点代数簇的奇异性阶有关。\n\n我们还表明，定义代数簇的多项式表现出分解为线性因子的特性，如果为真，则可以对所有类似 $BMS_3$ 的代数进行分类。最后，我们研究这些代数的中心扩展，它们与共形权 $h = 2$ 的主域对应的代数的一般结构一致。", "authors": [{"name": "Armin Ghazi"}, {"name": "Ahmad Moradpouri"}], "featured_authors": [{"name": "Armin Ghazi"}, {"name": "Ahmad Moradpouri"}], "author_count": 2}, {"id": "2606.29342", "category": "hep-th", "title": "Bounded Chaos in a Ghost-Coupled Hamiltonian System", "abstract": "We study the dynamics of a Hamiltonian system with a ghost degree of freedom, characterized by a negative kinetic-energy contribution and the possibility of runaway behavior due to an indefinite energy functional. We present numerical evidence that a nonlinear interaction term, together with a saturating exponential potential $V_c$, can suppress phase-space escape over the parameter ranges explored in this work. Using direct numerical integration of the Hamiltonian equations of motion, Poincaré surfaces of section, and trajectory projections, we find that the ghost sector and nonlinear couplings generate a mixed phase-space structure with both regular islands and chaotic regions. The maximal Lyapunov exponent supports bounded chaotic motion: nearby trajectories separate exponentially while remaining confined to a finite region of phase space for the investigated initial conditions and parameters $(\\varepsilon,\\alpha)$. These results suggest that nonlinear confinement can significantly alter the stability properties of negative-energy sectors at the classical level. They provide numerical evidence for a bounded-chaos regime in which ghost-induced divergences are avoided within the explored domain.", "url": "https://arxiv.org/abs/2606.29342", "type": "理论", "summary": "我们研究具有幽灵自由度的哈密顿系统的动力学，其特征是负动能贡献以及由于不定能量泛函而导致失控行为的可能性。我们提出了数值证据，表明非线性相互作用项与饱和指数势 $V_c$ 一起可以抑制本工作探索的参数范围内的相空间逃逸。使用哈密顿运动方程、庞加莱截面和轨迹投影的直接数值积分，我们发现鬼扇区和非线性耦合生成了具有规则岛和混沌区域的混合相空间结构。最大李亚普诺夫指数支持有界混沌运动：附近的轨迹呈指数分离，同时对于所研究的初始条件和参数 $(\\varepsilon,\\alpha)$ 保持限制在相空间的有限区域内。这些结果表明非线性约束可以显着改变经典水平上负能量扇区的稳定性特性。\n\n它们为有界混沌状态提供了数值证据，在该状态下，在探索的域内避免了幽灵引起的发散。", "authors": [{"name": "Zahra Molaee"}, {"name": "Soleyman Fatholahzadeh"}], "featured_authors": [{"name": "Zahra Molaee"}, {"name": "Soleyman Fatholahzadeh"}], "author_count": 2}, {"id": "2606.29409", "category": "hep-th", "title": "New Beta Integral from Supersymmetric Gauge Theory on Projective Space", "abstract": "We derive a new beta-type basic hypergeometric integral identity from the equality of supersymmetric partition functions on $\\mathbb{RP}^{2}\\times\\mathbb{S}^{1}$. Unlike previously known identities obtained from lens-space partition functions, this integral does not appear to arise as a degeneration of the lens elliptic beta integral. Our result enriches the collection of basic hypergeometric beta integrals arising from supersymmetric dualities and has applications to supersymmetric gauge theories, integrable models, and the theory of special functions.", "url": "https://arxiv.org/abs/2606.29409", "type": "理论", "summary": "我们从 $\\mathbb{RP}^{2}\\times\\mathbb{S}^{1}$ 上的超对称配分函数的等式导出一个新的 beta 型基本超几何积分恒等式。与先前已知的从透镜空间分配函数获得的恒等式不同，该积分似乎不是作为透镜椭圆 β 积分的退化而出现的。我们的结果丰富了由超对称对偶性产生的基本超几何 beta 积分的集合，并应用于超对称规范理论、可积模型和特殊函数理论。", "authors": [{"name": "Ilmar Gahramanov"}, {"name": "Tuğba Hırlı"}, {"name": "R. Semih Kanber"}, {"name": "Hjalmar Rosengren"}], "featured_authors": [{"name": "Ilmar Gahramanov"}, {"name": "Tuğba Hırlı"}, {"name": "R. Semih Kanber"}, {"name": "Hjalmar Rosengren"}], "author_count": 4}, {"id": "2606.29455", "category": "hep-th", "title": "Gluon mass and small-x dynamics in hadrons", "abstract": "Precise derivation of the logarithmically scale-dependent Hamiltonian eigenstate picture for hadrons in the space of virtual quark and gluon states of the canonical front form of QCD requires addressing first the problem of divergences stronger than logarithmic, and especially the small-x divergences in the dynamics of gluons. We propose to facilitate the regularization and cancellation of these divergences using a gluon mass parameter and an auxiliary color-octet scalar field corresponding to the longitudinally polarized gluons. The auxiliary field decouples from the hadronic constituent dynamics when the mass parameter tends to zero, as required in the gauge theory. The same method applies in the cancellation of the quadratic ultraviolet transverse divergences in the self-interactions. After explaining how the method works in computations of the scattering amplitudes, we describe its application to the bound-state eigenvalue problems. We focus on the results it leads to already in the second-order weak-coupling expansion for effective Hamiltonians of heavy quarks. They include the concept of confinement in an effective theory with the gluon mass parameter sent to zero and a heuristic scenario concerning extension of the Hamiltonian approach to the dynamics of light quarks.", "url": "https://arxiv.org/abs/2606.29455", "type": "理论", "summary": "精确推导 QCD 正则前沿形式的虚拟夸克和胶子态空间中的强子的对数尺度相关的哈密顿本征态图需要首先解决比对数更强的散度问题，特别是胶子动力学中的小 x 散度问题。我们建议使用胶子质量参数和与纵向偏振胶子相对应的辅助颜色八位组标量场来促进这些散度的正则化和消除。当质量参数趋于零时，辅助场与强子成分动力学解耦，正如规范理论所要求的那样。相同的方法适用于消除自相互作用中的二次紫外横向发散。在解释了该方法如何计算散射振幅之后，我们描述了其在束缚态特征值问题中的应用。我们重点关注它在重夸克有效哈密顿量的二阶弱耦合展开中所导致的结果。\n\n它们包括将胶子质量参数设置为零的有效理论中的限制概念，以及关于将哈密顿方法扩展到轻夸克动力学的启发式场景。", "authors": [{"name": "Stanisław D. Głazek"}], "featured_authors": [{"name": "Stanisław D. Głazek"}], "author_count": 1}, {"id": "2606.29539", "category": "hep-th", "title": "Observables in Schrödinger CFTs: How Aliens Built the Pyramids", "abstract": "We discuss the algebraic structure of observables in Schrödinger CFTs. These operators have zero mass (or particle number) and generically transform in staggered ''pyramid representations'' built from ''alien operators,'' as we explain with the doubled state-operator correspondence. We comment on implications for the space of non-relativistic CFTs, thermal physics, and generalize the exceptional symmetry conservation laws of Bekaert, Meunier, and Moroz, and Golkar and Son. We show that alien operators are analogous to double-twist operators in Lorentzian CFT, with systematic cross-channel corrections from massless particles when they exist.", "url": "https://arxiv.org/abs/2606.29539", "type": "理论", "summary": "我们讨论薛定谔 CFT 中可观测量的代数结构。这些算子的质量（或粒子数）为零，并且通常以由“外来算子”构建的交错“金字塔表示”进行变换，正如我们用双重状态算子对应关系所解释的那样。我们评论了非相对论 CFT 空间、热物理学的含义，并概括了 Bekaert、Meunier、Moroz、Golkar 和 Son 的特殊对称守恒定律。我们证明，外来算子类似于洛伦兹 CFT 中的双扭曲算子，当无质量粒子存在时，会对其进行系统的跨通道校正。", "authors": [{"name": "Mathieu Boisvert"}, {"name": "Shehab Hossam Fadda"}, {"name": "Justin Kulp"}, {"name": "Ramtin M. Yazdi"}], "featured_authors": [{"name": "Mathieu Boisvert"}, {"name": "Shehab Hossam Fadda"}, {"name": "Justin Kulp"}, {"name": "Ramtin M. Yazdi"}], "author_count": 4}, {"id": "2606.29549", "category": "hep-th", "title": "Velocity dependence of holographic entanglement entropy in a charged plasma", "abstract": "We have studied holographic entanglement entropy in a moving thermal gauge theory with a non-zero chemical potential. A sufficiently high velocity enhances the holographic entanglement entropy, particularly for larger values of the chemical potential. However, at high temperature and velocity, the chemical potential dependence is almost entirely washed out, indicating that thermal fluctuations dominate over charge-density effects. In the ultrarelativistic regime, the holographic entanglement entropy grows very rapidly with velocity, which emerges as the dominant parameter, largely suppressing both thermal and chemical contributions.", "url": "https://arxiv.org/abs/2606.29549", "type": "理论", "summary": "我们研究了具有非零化学势的移动热规范理论中的全息纠缠熵。足够高的速度会增强全息纠缠熵，特别是对于较大的化学势值。然而，在高温和高速度下，化学势依赖性几乎完全消失，表明热波动主导电荷密度效应。在超相对论状态下，全息纠缠熵随着速度增长得非常快，速度成为主要参数，很大程度上抑制了热和化学贡献。", "authors": [{"name": "V. Esrafilian"}, {"name": "M. Ali-Akbari"}], "featured_authors": [{"name": "V. Esrafilian"}, {"name": "M. Ali-Akbari"}], "author_count": 2}, {"id": "2606.29587", "category": "hep-th", "title": "Asymptotic boundary structure of Lagrangian gauge theories", "abstract": "Given a local gauge theory on spacetime with boundary, it naturally defines another gauge theory which can be regarded as a theory of the boundary values. For Lagrangian theories, it comes equipped with the presymplectic structure which can be used to define one or another version of Hamiltonian-like formulation of the initial model. This relation is especially manifest for AKSZ sigma models and more-generally gauge PDEs with compatible presymplectic structure in which case the boundary system is again a gauge PDE with presymplectic structure. In the context of (flat space) holography one is interested in boundaries at infinity, also known as asymptotic boundaries. The gauge PDE framework naturally extends to this setup, resulting in the notion of gauge PDE with asymptotic boundaries. Although this works perfectly well at the level of equations of motion, the extension to Lagrangian systems appears quite subtle because the presymplectic structure capturing the Lagrangian is divergent at the boundary. We show that any $Q$-cocycle in the bulk (and presymplectic structure in particular) determines a pair of compatible $Q$-cocycles of the boundary gauge PDE: the renormalized one of the same ghost-degree, and the anomaly cocycle of degree one lower. For the latter, the construction is somewhat analogous to the residue map known in the context of b-geometry. The general formalism is exemplified by scalar and Maxwell fields on AdS and Minkowski spaces. It turns out that in the AdS case the natural action determined by the anomaly presymplectic structure is precisely the one known as the holographic Weyl anomaly in the AdS/CFT context while its null-infinity counterpart was known in a few very particular cases only.", "url": "https://arxiv.org/abs/2606.29587", "type": "理论", "summary": "给定一个关于有边界时空的局域规范理论，它自然地定义了另一种可以被视为边界值理论的规范理论。对于拉格朗日理论，它配备了预辛结构，可用于定义初始模型的类哈密顿公式的一个或另一个版本。这种关系对于 AKSZ sigma 模型和具有兼容的辛前结构的更普遍的规范偏微分方程尤其明显，在这种情况下，边界系统再次是具有辛前结构的规范偏微分方程。在（平坦空间）全息术的背景下，人们对无穷远边界感兴趣，也称为渐近边界。规范偏微分方程框架自然地扩展到这种设置，从而产生了具有渐近边界的规范偏微分方程的概念。尽管这在运动方程层面上工作得很好，但对拉格朗日系统的推广显得相当微妙，因为捕捉拉格朗日量的前辛结构在边界处是发散的。\n\n我们表明，整体中的任何 $Q$ 余循环（特别是前辛结构）都确定了边界规范偏微分方程的一对兼容的 $Q$ 余循环：相同鬼度的重正化余循环和较低度的异常余循环。对于后者，其构造有点类似于 b 几何背景下已知的残基图。一般形式主义以 AdS 和 Minkowski 空间上的标量场和麦克斯韦场为例。事实证明，在 AdS 情况下，由异常前辛结构决定的自然作用正是 AdS/CFT 背景下称为全息 Weyl 异常的作用，而其零无穷对应物仅在少数非常特殊的情况下已知。", "authors": [{"name": "Ivan Dneprov"}, {"name": "Maxim Grigoriev"}, {"name": "Mikhail Markov"}], "featured_authors": [{"name": "Ivan Dneprov"}, {"name": "Maxim Grigoriev"}, {"name": "Mikhail Markov"}], "author_count": 3}, {"id": "2606.29612", "category": "hep-th", "title": "Landau's Leviathans", "abstract": "We present a new method together with a proof-of-concept implementation for determining the Landau singularities of Feynman integrals, read off directly from where the Euler characteristic of the associated integral drops. Working over finite fields makes the requisite elimination tractable for multi-scale integrals at the multi-loop frontier. The algorithm returns the genuine and complete set of singularities, subject to a set of conditions which are practically testable. We apply these methods to classes of Feynman integrals beyond the reach of current methods, including non-planar six-point diagrams at two loops, as well as a fully massive three-loop envelope graph. Several of the newly found singularities, both in $d$- and 4-dimensional external kinematics, are of unexpected complexity when compared to previously known singularities for these examples.", "url": "https://arxiv.org/abs/2606.29612", "type": "理论", "summary": "我们提出了一种新方法以及概念验证实现，用于确定费曼积分的朗道奇点，直接从相关积分的欧拉特征下降的位置读取。在有限域上工作使得多循环边界处的多尺度积分的必要消除变得容易处理。该算法返回真实且完整的奇点集，但受到一组实际上可测试的条件的影响。我们将这些方法应用于超出当前方法范围的费曼积分类，包括两个环路处的非平面六点图，以及完全大规模的三环包络图。与这些示例中先前已知的奇点相比，在 $d$ 和 4 维外部运动学方面新发现的几个奇点具有意想不到的复杂性。", "authors": [{"name": "Vsevolod Chestnov"}, {"name": "Giulio Crisanti"}, {"name": "Mathieu Giroux"}], "featured_authors": [{"name": "Vsevolod Chestnov"}, {"name": "Giulio Crisanti"}, {"name": "Mathieu Giroux"}], "author_count": 3}, {"id": "2606.29625", "category": "hep-th", "title": "Metric-like Cubic Vertices for Massless Bosonic Higher-Spin Fields in AdS$_3$", "abstract": "We derive parity-even transverse-traceless metric-like cubic vertices for massless bosonic higher-spin fields in AdS$_3$. Starting from the known two- and three-derivative vertices in three-dimensional flat space, we construct their AdS$_3$ extensions by imposing gauge invariance and accounting for dimension-dependent identities. The result is shown to be consistent with minimal coupling to gravity.", "url": "https://arxiv.org/abs/2606.29625", "type": "理论", "summary": "我们为 AdS$_3$ 中的无质量玻色高自旋场推导了宇称偶横向无痕度量类立方顶点。从三维平面空间中已知的二阶和三阶导数顶点开始，我们通过施加规范不变性并考虑维度相关的恒等式来构造它们的 AdS$_3$ 扩展。结果表明与重力耦合最小是一致的。", "authors": [{"name": "Freddie King"}, {"name": "Taylor Pomfret"}, {"name": "Karapet Mkrtchyan"}], "featured_authors": [{"name": "Freddie King"}, {"name": "Taylor Pomfret"}, {"name": "Karapet Mkrtchyan"}], "author_count": 3}, {"id": "2606.29668", "category": "hep-th", "title": "Understanding Color Confinement through Quantum Reference Frames and Relational Observables", "abstract": "We present a formulation for understanding color confinement on the basis of quantum reference frames (QRFs) and relational observables. In the QRF approach to color confinement, colored quantities are not defined as isolated local fields, but rather as relational observables with respect to a color frame or a dressing field. By the Gauss law, local color charge is excluded from the physical bulk algebra, whereas semi-local data such as boundary fluxes and Wilson lines may remain. Color confinement is characterized by the absence of a globally well-defined long-distance color QRF capable of supporting isolated non-singlet relational observables. This formulation preserves the insight of the Kugo-Ojima type picture, while avoiding dependence on a particular covariant gauge, an unbroken global BRST symmetry, and a specific infrared confinement criterion. As concrete examples, we consider (1+1)-dim. Yang-Mills theory, (1+1)-dim. U(1) gauge-Higgs model, and the two-dim. U(1) gauge-Higgs model on $\\mathbb{H}^2$ ($AdS_2$) and three-dim. SU(2) gauge-Higgs model on $\\mathbb{H}^3$ ($AdS_3$) obtained by dimensional reduction of four-dim. SU(2) Yang-Mills theory restricted to symmetric-instanton sectors. Through explicit calculations in these examples and in controlled sectors, we provide nontrivial consistency checks for the validity of the present formulation. We also discuss prospects for four-dim. Yang-Mills theory and gauge-Higgs theories. QRF-based color confinement provides a relational formulation of why isolated colored asymptotic sectors are absent. At the same time, it clarifies the role played by topological defects and shows that other confinement criteria -- the Wilson-loop area law, the preservation of generalized symmetry, namely center one-form symmetry, and the restoration of residual gauge symmetry -- can be organized as manifestations of a common QRF structure.", "url": "https://arxiv.org/abs/2606.29668", "type": "理论", "summary": "我们提出了一种基于量子参考系（QRF）和关系可观测量来理解颜色限制的公式。在 QRF 颜色限制方法中，颜色量并不被定义为孤立的局部场，而是被定义为相对于颜色框架或着装场的相关可观察量。根据高斯定律，局部色荷被排除在物理体代数之外，而诸如边界通量和威尔逊线之类的半局部数据可能会保留。颜色限制的特点是缺乏能够支持孤立的非单态关系可观察量的全局明确定义的长距离颜色 QRF。该公式保留了 Kugo-Ojima 型图像的洞察力，同时避免依赖于特定的协变规范、完整的全局 BRST 对称性和特定的红外限制标准。作为具体示例，我们考虑 (1+1)-dim。杨-米尔斯理论，(1+1)-暗淡。 U(1) 规范希格斯模型和二维模型。 $\\mathbb{H}^2$ ($AdS_2$) 和三维的 U(1) 规范希格斯模型。通过四维降维获得的 $\\mathbb{H}^3$ ($AdS_3$) 上的 SU(2) 规范希格斯模型。\n\nSU(2) Yang-Mills 理论仅限于对称瞬时扇区。通过在这些例子和受控部门中的显式计算，我们为当前公式的有效性提供了重要的一致性检查。我们还讨论了四点的前景。杨-米尔斯理论和规范-希格斯理论。基于 QRF 的颜色限制提供了为什么不存在孤立的彩色渐近扇区的关系表述。同时，它阐明了拓扑缺陷所起的作用，并表明其他限制准则——威尔逊环面积定律、广义对称性的保留（即中心单一形式对称性）以及残余规范对称性的恢复——可以组织为常见 QRF 结构的表现形式。", "authors": [{"name": "Kei-Ichi Kondo"}], "featured_authors": [{"name": "Kei-Ichi Kondo"}], "author_count": 1}, {"id": "2606.29896", "category": "hep-th", "title": "CFT Constraints on the Weak Gravity Conjecture", "abstract": "The Weak Gravity Conjecture (WGC) is a swampland criterion of long standing: any consistent theory of quantum gravity must contain a charged particle whose charge-to-mass ratio exceeds that of an extremal black hole, so that gravity remains the weakest force. The AdS/CFT correspondence offers a calculable boundary handle on bulk gravity, and the imaginary parts of bulk quasinormal modes are read off the boundary as poles of a retarded Green's function. We show that the WGC follows from this boundary calculation in two settings that fall outside the Reissner--Nordström idealisation: static spherically symmetric black holes in dRGT massive gravity, and dyonic black holes in Einstein--ModMax non-linear electrodynamics. The chain runs from the metric and gauge field, through the charged Klein--Gordon equation, into a near-horizon scaling limit whose radial equation reduces to Whittaker form; the conformal weight $\\nu_0$ then enters a damping-time inequality. For the dRGT black hole every massive-gravity parameter ($\\alpha,\\beta,m_g,h$) cancels out, leaving the universal saturation $q/(m r_+) \\geq 1/\\sqrt{2} \\approx 0.707$. For the Einstein--ModMax black hole the duality-symmetric non-linearity parameter $\\gamma$ survives, and yields $q/(m r_+) \\geq e^{-\\gamma/2}$, which reduces to the Reissner--Nordström bound $q/(m r_+) \\geq 1$ in the Maxwell limit $\\gamma \\to 0$. Either result is of order unity, and the second weakens monotonically as the non-linearity grows. We then relax three of the simplifying assumptions of the dRGT derivation, namely exact extremality, minimal coupling, and the absence of higher-curvature terms. The cancellation breaks. Each correction reintroduces $m_g,\\alpha,\\beta$ into the bound through a controlled functional dependence, and we tabulate and plot the relaxed forms across parameter space.", "url": "https://arxiv.org/abs/2606.29896", "type": "理论", "summary": "弱引力猜想（WGC）是一个长期存在的沼泽标准：任何一致的量子引力理论都必须包含一个荷质比超过极值黑洞的带电粒子，因此引力仍然是最弱的力。 AdS/CFT 对应关系提供了关于体积重力的可计算边界处理，并且体积准正规模式的虚部从边界读取为延迟格林函数的极点。我们表明，WGC 在两种不属于 Reissner-Nordström 理想化的设置中遵循此边界计算：dRGT 质量引力中的静态球对称黑洞，以及爱因斯坦-ModMax 非线性电动力学中的动力黑洞。该链从公制和规范场出发，通过带电的克莱因-戈登方程，进入近地平线缩放极限，其径向方程简化为惠特克形式；然后保形权重 $\\nu_0$ 输入阻尼时间不等式。对于 dRGT 黑洞，每个质量引力参数 ($\\alpha,\\beta,m_g,h$) 都被抵消，留下通用饱和度 $q/(m r_+) \\geq 1/\\sqrt{2} \\approx 0.707$。\n\n对于 Einstein--ModMax 黑洞，对偶对称非线性参数 $\\gamma$ 保留下来，并产生 $q/(m r_+) \\geq e^{-\\gamma/2}$，它在麦克斯韦极限 $\\gamma \\ 到 0$ 中减少到 Reissner--Nordström 边界 $q/(m r_+) \\geq 1$。任一结果都是有序统一的，而第二个结果随着非线性的增长而单调减弱。然后，我们放宽 dRGT 推导的三个简化假设，即精确极值、最小耦合和不存在更高曲率项。取消中断。每次修正都会通过受控的函数依赖性将 $m_g,\\alpha,\\beta$ 重新引入边界，并且我们将跨参数空间的松弛形式制成表格并绘制出来。", "authors": [{"name": "Saeed Noori Gashti"}, {"name": "Behnam Pourhassan"}, {"name": "İzzet Sakallı"}], "featured_authors": [{"name": "Saeed Noori Gashti"}, {"name": "Behnam Pourhassan"}, {"name": "İzzet Sakallı"}], "author_count": 3}, {"id": "2606.29899", "category": "hep-th", "title": "Quantum (non)equivalence of dual massive $p$-form gauge theories", "abstract": "Gauge theories of massive $p$-forms are connected by various dualities, which hold classically but may be broken at the quantum level. One example is the $BF$ theory of topologically coupled $p$- and $(d-p-1)$-forms in $d$ dimensions, where the coupling between forms results in a manifestly gauge invariant mass term for either form when the other is integrated out classically. We perform the path integral quantisation of this theory; by integrating out one of the forms, the resulting determinants are sensitive to the topology of spacetime, and counterterms must be introduced to renormalise their divergences. We compute these determinants in terms of the topological numbers of spacetime, showing explicitly how the quantum duality of the massive theories is broken on topologically non-trivial backgrounds. This is directly related to the quantum breaking of the massless duality between the form that was integrated out and the longitudinal modes of its partner. In particular, the difference of counterterms is proportional to the Euler characteristic of spacetime. The existence of gravitational instantons suggests that these dualities may be broken even in Minkowski space in the presence of topological fluctuations.", "url": "https://arxiv.org/abs/2606.29899", "type": "理论", "summary": "大量$p$形式的规范理论通过各种对偶性联系在一起，这些对偶性在经典上成立，但在量子水平上可能被打破。一个例子是 $d$ 维度中拓扑耦合 $p$- 和 $(d-p-1)$-形式的 $BF$ 理论，其中形式之间的耦合导致当另一种形式被经典积分时，两种形式之间的耦合产生明显的规范不变质量项。我们对该理论进行路径积分量化；通过整合其中一种形式，所得的行列式对时空的拓扑结构很敏感，并且必须引入反项来重新规范它们的分歧。我们根据时空的拓扑数计算这些行列式，明确地展示了大规模理论的量子对偶性如何在拓扑非平凡的背景下被打破。这与积分出来的形式与其伙伴的纵向模式之间的无质量二元性的量子打破直接相关。特别是，反项之差与时空欧拉特性成正比。\n\n引力瞬子的存在表明，即使在拓扑涨落存在的闵可夫斯基空间中，这些对偶性也可能被打破。", "authors": [{"name": "Christian Canete"}, {"name": "Elden Loomes"}], "featured_authors": [{"name": "Christian Canete"}, {"name": "Elden Loomes"}], "author_count": 2}, {"id": "2606.30043", "category": "hep-th", "title": "Nonlinear nature of near-equilibrium viscous fluids", "abstract": "We study the late-time relaxation of a neutral relativistic viscous fluid in $d+1$ dimensions. In the long-wavelength regime, linearized hydrodynamics predicts that the sound mode at momentum $nk$ decays as $e^{-n^2\\omega_I t}$. However, nonlinear analysis gives a decay of $e^{-n\\omega_I t}$. We derive a closed asymptotic attractor solution in which the frequency of the $n$-th harmonic locks to $n$ times the complex frequency of the fundamental mode. The amplitude envelopes for energy current $J$ obey a simple cascading relation, $J_n=\\alpha_J^{\\,n-1}J_1^n$, with $\\alpha_J$ fixed by the equation of state, the longitudinal viscosity, and the fundamental wavenumber. For conformal fluids, $\\alpha_J=1/(8\\eta k)$, in agreement with the holographic result of arXiv:2512.07242 . The existence of the attractor shows that, even near equilibrium, field powers are not equivalent to amplitude order.", "url": "https://arxiv.org/abs/2606.30043", "type": "理论", "summary": "我们研究 $d+1$ 维度中性相对论粘性流体的后期弛豫。在长波长范围内，线性流体动力学预测动量 $nk$ 下的声模衰减为 $e^{-n^2\\omega_I t}$。然而，非线性分析给出了 $e^{-n\\omega_I t}$ 的衰减。我们推导出一个闭合渐近吸引子解，其中 $n$ 次谐波的频率锁定为基模复数频率的 $n$ 倍。能量流 $J$ 的振幅包络遵循简单的级联关系 $J_n=\\alpha_J^{\\,n-1}J_1^n$，其中 $\\alpha_J$ 由状态方程、纵向粘度和基本波数固定。对于保形流体，$\\alpha_J=1/(8\\eta k)$，与 arXiv:2512.07242 的全息结果一致。吸引子的存在表明，即使接近平衡，场功率也不等于幅度阶。", "authors": [{"name": "Yan Liu"}, {"name": "Hao-Tian Sun"}], "featured_authors": [{"name": "Yan Liu"}, {"name": "Hao-Tian Sun"}], "author_count": 2}, {"id": "2606.30117", "category": "hep-th", "title": "Gravitational Duals from Equations of State II: Large Hierarchies and False Vacua", "abstract": "We investigate the reconstruction of holographic duals for strongly coupled quantum field theories in regimes characterized by large hierarchies and the presence of false vacua. Within the gauge/gravity duality, these features translate into non-trivial thermodynamic behaviour and exotic renormalization group flows, including skipping flows between non-adjacent fixed points. Building on previous work based on Physics-Informed Neural Networks (PINNs), we extend the holographic inverse problem of reconstructing the bulk scalar potential from boundary thermodynamic data into this new regime. This setting presents a variety of conceptual and numerical challenges, such as near-degenerate states, large hierarchies of energy scales, and regions of the potential that are not directly probed by the input data. We develop a set of methodological advances that overcome these obstacles, thereby improving the established PINNs-based methodology and extending it to new physical regimes of interest that were previously out of reach. Applying the developed framework, we demonstrate accurate reconstruction of scalar potentials deep into the false vacuum regime, achieving robust agreement with the physical features of the underlying thermodynamics despite significant numerical stiffness. Our results extend the bridge between holography and machine learning, and suggest that data-driven approaches can provide new insights into the structure of strongly coupled systems.", "url": "https://arxiv.org/abs/2606.30117", "type": "理论", "summary": "我们研究了在以大层次结构和存在假真空为特征的体系中强耦合量子场论的全息对偶重建。在规范/重力二元性中，
