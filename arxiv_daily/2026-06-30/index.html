  <title>arXiv 2026-06-30 理论 / 数值 / 实验论文清单</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #2d241d;
      --muted: #6d5d50;
      --line: rgba(69, 49, 32, 0.14);
      --accent: #8f3d2e;
      --accent-2: #1d5f6b;
      --theory: #7c3a2a;
      --numeric: #255b6a;
      --both: #5d4a99;
      --experimental: #2f6b39;
      --shadow: 0 18px 40px rgba(54, 32, 16, 0.12);
      --radius: 22px;
      --ui-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --title-font: "Palatino Linotype", "Noto Serif SC", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 32%), radial-gradient(circle at 88% 12%, rgba(29,95,107,0.14), transparent 20%), linear-gradient(180deg, #fbf7f0 0%, var(--bg) 42%, #f2e8dc 100%);
      min-height: 100vh;
    }
    .shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
    .hero {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.82); border: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 10px; font-family: var(--title-font); font-size: clamp(32px, 5vw, 54px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero p { max-width: 880px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 26px; }
    .stat { padding: 16px 18px; background: rgba(255,255,255,0.76); border: 1px solid var(--line); border-radius: 18px; }
    .stat .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .controls { position: sticky; top: 12px; z-index: 3; margin-top: 22px; padding: 18px; border: 1px solid var(--line); border-radius: 24px; background: rgba(250,244,236,0.9); backdrop-filter: blur(16px); box-shadow: 0 10px 24px rgba(54,32,16,0.08); }
    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .search { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,0.92); font: inherit; color: var(--text); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { border: 1px solid var(--line); background: rgba(255,255,255,0.82); color: var(--text); padding: 10px 14px; border-radius: 999px; font: inherit; cursor: pointer; }
    .chip.active { border-color: rgba(143,61,46,0.35); background: rgba(143,61,46,0.12); color: #5b2419; }
    .chip[data-type="数值"].active { border-color: rgba(37,91,106,0.35); background: rgba(37,91,106,0.12); color: #173f49; }
    .chip[data-type="理论+数值"].active { border-color: rgba(93,74,153,0.35); background: rgba(93,74,153,0.12); color: #46337d; }
    .chip[data-type="实验"].active { border-color: rgba(47,107,57,0.35); background: rgba(47,107,57,0.12); color: #214c29; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 14px; color: var(--muted); font-size: 14px; }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 22px; }
    .paper { display: flex; flex-direction: column; gap: 14px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 10px 24px rgba(54,32,16,0.06); }
    .paper-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .tag.category { background: rgba(45,36,29,0.08); color: var(--text); }
    .tag.type-theory { background: rgba(124,58,42,0.1); color: var(--theory); border-color: rgba(124,58,42,0.16); }
    .tag.type-numeric { background: rgba(37,91,106,0.1); color: var(--numeric); border-color: rgba(37,91,106,0.16); }
    .tag.type-both { background: rgba(93,74,153,0.1); color: var(--both); border-color: rgba(93,74,153,0.16); }
    .tag.type-experimental { background: rgba(47,107,57,0.1); color: var(--experimental); border-color: rgba(47,107,57,0.16); }
    .paper h2 { margin: 0; font-family: var(--title-font); font-size: 22px; line-height: 1.25; letter-spacing: -0.02em; }
    .paper h2 a { color: inherit; text-decoration: none; }
    .paper h2 a:hover { color: var(--accent); }
    .paper .id { color: var(--muted); font-size: 13px; }
    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .author-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }
    details summary { cursor: pointer; color: var(--accent-2); font-weight: 700; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details p { margin: 10px 0 0; color: var(--muted); line-height: 1.72; font-size: 14px; white-space: pre-line; }
    .paper footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-top: 6px; color: var(--muted); font-size: 13px; }
    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }
  </style>

  <script>
    const papers = [{"id": "2606.28426", "category": "cond-mat", "title": "Comparison of different exact generalized Langevin equations with a non-linear potential of mean force and an observable-dependent mass and friction", "abstract": "The Mori-Zwanzig projection formalism constitutes a powerful and robust framework for deriving equations of motion in terms of generalized Langevin equations (GLEs) for an arbitrary observable using evolution and projection operators. Based on this framework, we analyze the properties of four distinct GLEs for a scalar observable including a Markovian force derived from a generally non-linear potential, a non-Markovian friction force, and an orthogonal force, commonly interpreted as a random force. While all four GLEs are exact, they differ in the memory friction kernel, which may either be dependent or independent of the observable, and by the potential, which may either include or exclude the effective kinetic energy of the observable. Inclusion of the kinetic energy in the potential is advantageous for observables whose velocity satisfies Wick's theorem, since this reproduces the correct distribution of the observable and its velocity even without contributions from the friction force and the orthogonal force.", "url": "https://arxiv.org/abs/2606.28426", "type": "理论", "summary": "Mori-Zwanzig 投影形式构成了一个强大而稳健的框架，用于使用演化和投影算子根据任意可观测量的广义朗之万方程 (GLE) 推导运动方程。基于这个框架，我们分析了标量可观测量的四个不同 GLE 的属性，包括从一般非线性势导出的马尔可夫力、非马尔可夫摩擦力和正交力（通常解释为随机力）。虽然所有四个 GLE 都是精确的，但它们的不同之处在于记忆摩擦内核（可能依赖于或独立于可观测值）以及势（可能包括或排除可观测值的有效动能）。将动能包含在势中对于速度满足威克定理的可观测量是有利的，因为即使没有摩擦力和正交力的影响，这也会再现可观测量及其速度的正确分布。", "authors": [{"name": "Benjamin J. A. Héry"}, {"name": "Lucas Tepper"}, {"name": "Roland R. Netz"}], "featured_authors": [{"name": "Benjamin J. A. Héry"}, {"name": "Lucas Tepper"}, {"name": "Roland R. Netz"}], "author_count": 3}, {"id": "2606.28458", "category": "cond-mat", "title": "mCGCNN: A Dual-Stream Crystal Graph Convolutional Neural Network for the Efficient Prediction of Magnetic Properties of Crystalline Materials", "abstract": "Magnetic order in crystals is governed by moment-carrying sublattices and ligand-mediated exchange pathways, yet standard crystal graph neural networks treat all atoms homogeneously and encode bonds primarily through pair distances. We propose mCGCNN, a magnetism-aware crystal graph network that augments the full structural graph with a dedicated magnetic subgraph. The magnetic stream performs angle-aware message passing over magnetic centers using metal-ligand-metal exchange-path descriptors motivated by Goodenough-Kanamori-Anderson physics, while layer-wise cross-coupling transfers structural and ligand-field information from the full crystal graph. A separate magnetic-sublattice pooling operation prevents the magnetic interaction from being diluted by nonmagnetic atoms. Benchmarked on a curated Materials Project spin-polarized DFT data, mCGCNN improves total magnetic moment prediction from a CGCNN test MAE of 2.54~$\\mu_B$ to 2.02~$\\mu_B$, outperforming a strengthened CGCNN readout baseline and raising the test $R^2$ from 0.644 to 0.776. When pretrained on moment regression, the same magnetic representation improves ferromagnetic/antiferromagnetic classification. The results demonstrate that incorporating exchange geometry directly into graph architectures provides a physically grounded route to predictive models of magnetic materials.", "url": "https://arxiv.org/abs/2606.28458", "type": "理论+数值", "summary": "晶体中的磁序由矩承载子晶格和配体介导的交换路径控制，而标准晶体图神经网络均匀地处理所有原子并主要通过对距离编码键。我们提出了 mCGCNN，一种磁性感知晶体图网络，它通过专用的磁性子图来增强完整的结构图。磁流使用受 Goodenough-Kanamori-Anderson 物理启发的金属-配体-金属交换路径描述符在磁中心上执行角度感知消息传递，而分层交叉耦合则传输来自完整晶体图的结构和配体场信息。单独的磁亚晶格池操作可防止磁相互作用被非磁性原子稀释。 mCGCNN 以精选的 Materials Project 自旋极化 DFT 数据为基准，将总磁矩预测从 CGCNN 测试 MAE 2.54~$\\mu_B$ 提高到 2.02~$\\mu_B$，优于增强的 CGCNN 读出基线，并将测试 $R^2$ 从 0.644 提高到 0.776。当对矩回归进行预训练时，相同的磁性表示可以改善铁磁/反铁磁分类。\n\n结果表明，将交换几何直接合并到图架构中为磁性材料的预测模型提供了一条物理基础的途径。", "authors": [{"name": "Sourav Mal"}, {"name": "Satadeep Bhattacharjee"}], "featured_authors": [{"name": "Sourav Mal"}, {"name": "Satadeep Bhattacharjee"}], "author_count": 2}, {"id": "2606.28486", "category": "cond-mat", "title": "Spectral phase transitions and trainability in neural network learning dynamics", "abstract": "The emergence of low-dimensional structures in the spectra of neural network weight matrices is a common empirical feature of trained models, but the dynamical origin of this phenomenon during learning remains an open problem. We formulate neural network training as the stochastic evolution of an initially random matrix ensemble, driven by stochastic gradient descent (SGD) updates that reshape the spectral bulk while amplifying signal strength. This induces a Baik-Ben Arous-Péché (BBP) transition during training, where isolated eigenvalues detach from the random bulk distribution, providing a dynamical framework for representation formation in high-dimensional learning dynamics. We demonstrate this in a solvable linear teacher-student model, where spectral evolution is analytically tractable and a phase diagram of trainability governed by the step size (or learning rate) and initial weight variance is obtained, and subsequently extend our formalism beyond the linear regime to nonlinear and stochastic settings. Numerical simulations in realistic settings support this picture, showing robust emergence of spectral alignment during training. Our results suggest that spectral analysis may provide a unified perspective of stochastic learning dynamics, linking trainability, optimisation hyperparameters, spectral phase transitions, and representation learning in neural networks.", "url": "https://arxiv.org/abs/2606.28486", "type": "理论+数值", "summary": "神经网络权重矩阵谱中低维结构的出现是训练模型的常见经验特征，但学习过程中这种现象的动态起源仍然是一个悬而未决的问题。我们将神经网络训练公式化为初始随机矩阵集合的随机演化，由随机梯度下降（SGD）更新驱动，重塑频谱块，同时放大信号强度。这会在训练过程中引发 Baik-Ben Arous-Péché (BBP) 转变，其中孤立的特征值与随机整体分布分离，为高维学习动态中的表示形成提供动态框架。我们在可解的线性师生模型中证明了这一点，其中谱演化在分析上是易于处理的，并且获得了由步长（或学习率）和初始权重方差控制的可训练性相图，随后将我们的形式主义扩展到线性范围之外，扩展到非线性和随机设置。现实环境中的数值模拟支持了这一观点，显示了训练期间光谱对齐的强劲出现。\n\n我们的结果表明，谱分析可以为神经网络中的随机学习动态、链接可训练性、优化超参数、谱相变和表示学习提供统一的视角。", "authors": [{"name": "Chanju Park"}, {"name": "Dario Bocchi"}, {"name": "Francesco D'Amico"}, {"name": "Biagio Lucini"}, {"name": "Gert Aarts"}], "featured_authors": [{"name": "Chanju Park"}, {"name": "Dario Bocchi"}, {"name": "Francesco D'Amico"}, {"name": "Biagio Lucini"}, {"name": "Gert Aarts"}], "author_count": 5}, {"id": "2606.28495", "category": "cond-mat", "title": "Monotonic Impurity Entropy beyond Unitarity: the $\\mathscr{PT}-$Symmetric Quantum Impurity Model", "abstract": "Quantum impurity models provide a paradigmatic setting for studying Kondo screening, boundary criticality, and impurity entropies. While these phenomena are well understood in unitary systems, their fate in non-Hermitian many-body settings remains largely unexplored. We study a $\\mathscr{PT}$-symmetric quantum impurity model consisting of a unitary $SU(2)_1$ Wess--Zumino--Witten bulk coupled to two impurity spins through complex-conjugate boundary Kondo interactions. Using an integrable lattice realization with $\\mathscr{PT}$-symmetric boundary impurities, solved by the Bethe Ansatz and benchmarked against finite-temperature matrix-product-state calculations, we determine the impurity contribution to the free energy and entropy. In the Kondo-screened regime, where the spectrum remains entirely real and the impurities are screened by many-body Kondo clouds, we find that the impurity entropy decreases monotonically from $\\ln 4$ in the ultraviolet to $0$ in the infrared. This monotonic flow persists despite the nonunitary nature of the boundary interaction, which places the system beyond the standard assumptions of the $g$-theorem.", "url": "https://arxiv.org/abs/2606.28495", "type": "理论+数值", "summary": "量子杂质模型为研究近藤筛选、边界临界性和杂质熵提供了范例环境。虽然这些现象在酉系统中得到了很好的理解，但它们在非厄米多体环境中的命运仍然很大程度上未被探索。我们研究了 $\\mathscr{PT}$ 对称量子杂质模型，该模型由酉 $SU(2)_1$ Wess--Zumino--Witten 块体组成，通过复共轭边界近藤相互作用耦合到两个杂质自旋。使用具有 $\\mathscr{PT}$ 对称边界杂质的可积晶格实现，由 Bethe Ansatz 求解并以有限温度矩阵乘积状态计算为基准，我们确定了杂质对自由能和熵的贡献。在近藤屏蔽制度中，光谱保持完全真实，并且杂质被多体近藤云屏蔽，我们发现杂质熵从紫外线中的$\\ln 4$单调减少到红外线中的$0$。尽管边界相互作用具有非单一性质，但这种单调流仍然存在，这使系统超出了 $g$ 定理的标准假设。", "authors": [{"name": "Pradip Kattel"}, {"name": "Abay Zhakenov"}, {"name": "Natan Andrei"}], "featured_authors": [{"name": "Pradip Kattel"}, {"name": "Abay Zhakenov"}, {"name": "Natan Andrei"}], "author_count": 3}, {"id": "2606.28521", "category": "cond-mat", "title": "Mixed-spin Heisenberg ladders in a magnetic field", "abstract": "In this work, we study alternating mixed-spin $(s,S)$ Heisenberg ladders in the magnetic field $h$ using density matrix renormalization group and linear spin-wave calculations. The $h$ \\textit{versus} interchain coupling $J_\\perp$ phase diagram for the $(1/2,1)$ case is investigated in detail. { In particular, we demonstrate the compatibility between the critical line estimates and magnetic ordering by analyzing chains with variable values of $J_\\perp$ and of $h$ along the chain, $J_\\perp$ and $h$ scans, and considering the usual case of chains with uniform couplings}. The magnetization plateau at 1/3 of saturation magnetization, 1/3 - plateau, is observed for $J_\\perp>0$ and in a limited range for $J_\\perp<0$. The critical Kosterlitz-Thouless transition point, where the 1/3 - plateau closes, is identified through a finite-size analysis of the transverse spin correlation functions.", "url": "https://arxiv.org/abs/2606.28521", "type": "理论+数值", "summary": "在这项工作中，我们使用密度矩阵重正化群和线性自旋波计算来研究磁场 $h$ 中的交替混合自旋 $(s,S)$ 海森堡阶梯。详细研究了 $(1/2,1)$ 情况的 $h$ \\textit{versus} 链间耦合 $J_\\perp$ 相图。 {特别是，我们通过分析沿链、$J_\\perp$和$h$扫描具有$J_\\perp$和$h$变量值的链，并考虑具有均匀耦合的链的通常情况，证明了临界线估计和磁排序之间的兼容性}。对于 $J_\\perp>0$ 观察到磁化平台位于饱和磁化强度的 1/3（1/3 - 平台），对于 $J_\\perp<0$ 则观察到在有限范围内。通过横向自旋相关函数的有限尺寸分析，确定了 1/3 平台闭合的临界 Kosterlitz-Thouless 转变点。", "authors": [{"name": "D. S. Almeida"}, {"name": "A. S. Bibiano"}, {"name": "W. M. da Silva"}, {"name": "R. R. Montenegro-Filho"}], "featured_authors": [{"name": "D. S. Almeida"}, {"name": "A. S. Bibiano"}, {"name": "W. M. da Silva"}, {"name": "R. R. Montenegro-Filho"}], "author_count": 4}, {"id": "2606.28549", "category": "cond-mat", "title": "The Position Space Chern Number: A Topological Index for Chiral Magnetic Systems", "abstract": "This paper introduces an index that categorizes the topology of insulating chiral magnetic systems. The position space Chern number, $C_R$ is distinct from its momentum space counterpart, $C_K$. A nonzero index guarantees the existence of topologically protected in-gap states that localize on the edge of local potential barriers in momentum space. The Chern-Simons effective field theory describing position space Chern insulators reveals a topologically quantized correlation between transverse force operators that describe the flow of quanta in momentum space. We demonstrate the existence of nonzero $C_R$ in systems hosting skyrmion magnetic phases and show how the index generalizes the classical concept of a skyrmion winding number. Lastly we investigate the competition between momentum space and position space topologies, and highlight an apparent obstruction to having systems with both $C_R \\neq 0$ and $C_K \\neq 0$.", "url": "https://arxiv.org/abs/2606.28549", "type": "理论", "summary": "本文介绍了一个对绝缘手性磁系统拓扑进行分类的索引。位置空间陈数 $C_R$ 与其对应的动量空间 $C_K$ 不同。非零指数保证了受拓扑保护的带隙态的存在，这些带隙态位于动量空间中局部势垒的边缘。描述位置空间陈绝缘体的陈-西蒙斯有效场理论揭示了描述动量空间中量子流的横向力算子之间的拓扑量化相关性。我们证明了斯格明子磁相系统中非零 $C_R$ 的存在，并展示了该指数如何推广斯格明子绕数的经典概念。最后，我们研究了动量空间和位置空间拓扑之间的竞争，并强调了同时具有 $C_R \\neq 0$ 和 $C_K \\neq 0$ 的系统的明显障碍。", "authors": [{"name": "Zachariah Addison"}], "featured_authors": [{"name": "Zachariah Addison"}], "author_count": 1}, {"id": "2606.28578", "category": "cond-mat", "title": "Surrogate-Gated Generation and Foundation-Model Embeddings for Bayesian Materials Design", "abstract": "Closed-loop materials discovery iterates between proposing candidate structures and evaluating their properties, and property evaluation dominates the cost. In the generative variant, a learned prior proposes candidate crystals and a property oracle scores them; we ask whether a cheap probabilistic surrogate can triage the generator's output, and what such a surrogate must do well. Across three architecturally distinct pretrained diffusion priors (MatterGen, CrystalFlow, ADiT) and two targets (room-temperature heat capacity and bulk modulus), we insert a Gaussian process acquisition gate between structure generation and the oracle in an RL-steered generative workflow. The gate matches or exceeds ungated fine-tuning of the generative model while capping oracle calls at a fixed per-cycle budget. Budget-matched ablations isolate the mechanism. At an identical four-call budget, ranking-based selection outperforms arbitrary selection, confirming that the gain comes from the surrogate's choice; the gate comes within $\\sim$9\\% of exhaustive oracle spending at roughly one-fifth of the calls. A density-functional-theory check of the bulk-modulus discoveries confirms the learned oracle to within 2.5\\% on average and the surrogate's ranking of the generated structures at Spearman $\\rho = 0.94$. A cross-factorial benchmark of surrogate performance spanning mechanical, electronic, and vibrational properties identifies pretrained ORB embeddings with a Gaussian process as the most reliable combination, which we adopt as the building blocks of the proposed workflow. The complete pipeline is released as open-source software.", "url": "https://arxiv.org/abs/2606.28578", "type": "理论", "summary": "闭环材料发现在提出候选结构和评估其性能之间进行迭代，而性能评估在成本中占主导地位。在生成变体中，先验知识提出候选晶体，并且属性预言机对它们进行评分；我们问一个廉价的概率代理是否可以对生成器的输出进行分类，以及这样的代理必须做得好。跨越三个架构上不同的预训练扩散先验（MatterGen、CrystalFlow、ADiT）和两个目标（室温热容和体积模量），我们在 RL 引导的生成工作流程中的结构生成和预言机之间插入高斯过程采集门。门匹配或超过生成模型的非门控微调，同时将预言机调用限制在固定的每周期预算。预算匹配的消融隔离了该机制。在相同的四次调用预算下，基于排名的选择优于任意选择，证实收益来自代理的选择；该门的费用在大约五分之一的调用中的详尽预言机支出的 $\\sim$9\\% 之内。\n\n对体积模量发现的密度泛函理论检查确认了学习的预言平均在 2.5% 以内，并且生成结构的替代排名在 Spearman $\\rho = 0.94$ 处。涵盖机械、电子和振动属性的替代性能的跨因素基准将预训练的 ORB 嵌入与高斯过程识别为最可靠的组合，我们将其用作所提出的工作流程的构建块。完整的管道作为开源软件发布。", "authors": [{"name": "Sk Md Ahnaf Akif Alvi"}, {"name": "Jan Janssen"}, {"name": "Danny Perez"}, {"name": "Douglas Allaire"}, {"name": "Raymundo Arroyave"}], "featured_authors": [{"name": "Sk Md Ahnaf Akif Alvi"}, {"name": "Jan Janssen"}, {"name": "Danny Perez"}, {"name": "Douglas Allaire"}, {"name": "Raymundo Arroyave"}], "author_count": 5}, {"id": "2606.28653", "category": "cond-mat", "title": "Phase Time Crystals and Pairing in Binary Active Chiral Systems", "abstract": "We introduce a class of dynamic systems we call phase time crystals consisting of a binary assembly of particles with intermediate or long-range repulsive interactions that are subjected to a circular drive of uniform chirality in which each particle species is out of phase from the other by 180 degrees. As a function of the particle density and orbit radius, this system can organize into a rich variety of dynamical crystalline states, including one in which the out of phase particles form bound pairs that assemble into a triangular lattice. We also find stripe phases, overlapping packed crystals, disordered or phase glass states with no diffusion, mixed fluids, and different types of phase-separated states. We show that these states are robust against the addition of thermal fluctuations, and that the paired crystal can melt into a paired fluid. If the drive on each particle species is of opposite chirality, the system forms stripes and packed lattices, but no paired crystal is present. We demonstrate that by modifying the nature of the chiral driving, it is possible to realize numerous kinds of active molecular lattices, including dynamic square spin ice geometries and higher-order complex structures.", "url": "https://arxiv.org/abs/2606.28653", "type": "理论", "summary": "我们引入一类称为相时间晶体的动态系统，由具有中程或长程排斥相互作用的粒子二元集合组成，这些粒子受到均匀手性的循环驱动，其中每个粒子种类与其他粒子种类相差 180 度。作为粒子密度和轨道半径的函数，该系统可以组织成丰富多样的动态晶态，包括异相粒子形成结合对并组装成三角形晶格的晶态。我们还发现了条纹相、重叠堆积晶体、无扩散的无序或相玻璃态、混合流体以及不同类型的相分离态。我们证明这些状态对于增加热波动具有鲁棒性，并且配对晶体可以熔化成配对流体。如果每个粒子种类的驱动力具有相反的手性，则系统会形成条纹和堆积晶格，但不存在配对晶体。\n\n我们证明，通过改变手性驱动的性质，可以实现多种活性分子晶格，包括动态方形自旋冰几何形状和高阶复杂结构。", "authors": [{"name": "C. Reichhardt"}, {"name": "C.J.O. Reichhardt"}], "featured_authors": [{"name": "C. Reichhardt"}, {"name": "C.J.O. Reichhardt"}], "author_count": 2}, {"id": "2606.28658", "category": "cond-mat", "title": "Structural relaxation and stagnation of grain boundary during migration", "abstract": "Instability is a major bottleneck in nanomaterials due to grain boundary (GB) activities under thermal or mechanical stimuli. The relaxation of GB will stabilize the properties of materials by structure modification of GBs to lower energy states. However, lack of understanding of mechanisms limits the application of GB relaxation. In this study, we certify that GB can realize relaxation through defect emission including vacancy, twinning and dislocations, etc, which lower the average atomic energy of GB. In particular, we found stagnation and shear-coupling migration accompany the relaxation process, where a lower average atomic energy and lower average atomic volume of grain boundaries can be the reasons for stagnation. In this study, we found when simulated by ramped energy-conserving orientated driving force, under a specific driving force, the grain boundary suddenly stops migrating during the migration process, and as the driving force increases to a certain value, the grain boundary continues to migrate. Even at fixed driving forces, the grain boundary migration process can stall. This phenomenon has been found in many grain boundaries, and it has been found that the reason for the stagnation is the change of the average atomic energy of grain boundaries and the average atomic volume of grain boundaries. The discovery of this stagnation phenomenon is helpful to better understand the migration characteristics of grain boundaries and lays a foundation for improving the strength of materials by designing grain boundary microstructures.", "url": "https://arxiv.org/abs/2606.28658", "type": "理论", "summary": "由于热或机械刺激下的晶界（GB）活动，不稳定性是纳米材料的主要瓶颈。 GB的弛豫将通过GB的结构改性至较低的能态来稳定材料的性能。然而，缺乏对机制的理解限制了GB松弛的应用。在本研究中，我们证明GB可以通过空位、孪晶和位错等缺陷发射来实现弛豫，从而降低GB的平均原子能。特别是，我们发现停滞和剪切耦合迁移伴随着弛豫过程，其中较低的平均原子能和较低的晶界平均原子体积可能是停滞的原因。本研究发现，采用斜坡节能导向驱动力模拟时，在特定的驱动力作用下，晶界在迁移过程中突然停止迁移，而当驱动力增大到一定值时，晶界继续迁移。即使驱动力固定，晶界迁移过程也会停止。\n\n这种现象在许多晶界中都被发现，并且发现停滞的原因是晶界平均原子能和晶界平均原子体积的变化。这种停滞现象的发现有助于更好地理解晶界的迁移特性，为通过设计晶界微观结构来提高材料的强度奠定基础。", "authors": [{"name": "Tingting Yu"}], "featured_authors": [{"name": "Tingting Yu"}], "author_count": 1}, {"id": "2606.28682", "category": "cond-mat", "title": "Sixteen-Fold Way for Fermionic Topological Orders", "abstract": "Fermionic topological orders can host 't Hooft anomalies with no bosonic counterpart. We identify a new sixteen-fold family of (2+1)D fermionic topological orders, forming a fermionic analogue of Kitaev's sixteen-fold way. This family is distinguished by the mod 16 't Hooft anomaly of a $\\mathbb{Z}_2$ one-form symmetry, generated in each theory by a single nontrivial $\\mathbb{Z}_2$ anyon. This intrinsically fermionic anomaly permits anyon spins that are forbidden in bosonic phases; the simplest new example is an Abelian fermionic topological order containing a single $\\mathbb{Z}_2$ Abelian anyon of spin 1/8. Each theory can be realized as the gapped boundary of a (3+1)D fermionic symmetry-protected topological (SPT) phase protected by the $\\mathbb{Z}_2$ one-form symmetry, which acquires a $\\mathbb{Z}_{16}$ classification once the spacetime spin structure is twisted by the one-form symmetry. We realize these phases microscopically via lattice models built from Walker-Wang models coupled to local fermions.", "url": "https://arxiv.org/abs/2606.28682", "type": "理论", "summary": "费米子拓扑序可以容纳没有玻色子对应物的霍夫特异常。我们确定了一个新的 (2+1)D 费米子拓扑序的十六重族，形成基塔耶夫十六重方式的费米子类似物。该族的特点是 $\\mathbb{Z}_2$ 一型对称性的 mod 16 't Hooft 异常，在每个理论中由单个非平凡的 $\\mathbb{Z}_2$ 任意子生成。这种本质上的费米子异常允许任意子自旋，而这在玻色子相中是被禁止的。最简单的新例子是阿贝尔费米子拓扑序，包含单个 $\\mathbb{Z}_2$ 自旋 1/8 的阿贝尔任意子。每个理论都可以实现为受 $\\mathbb{Z}_2$ 一式对称性保护的 (3+1)D 费米子对称保护拓扑 (SPT) 相的有隙边界，一旦时空自旋结构被一式对称性扭曲，它就获得 $\\mathbb{Z}_{16}$ 分类。我们通过由与局部费米子耦合的 Walker-Wang 模型构建的晶格模型在微观上实现这些阶段。", "authors": [{"name": "Ryohei Kobayashi"}, {"name": "Abhinav Prem"}, {"name": "Matthew Yu"}], "featured_authors": [{"name": "Ryohei Kobayashi"}, {"name": "Abhinav Prem"}, {"name": "Matthew Yu"}], "author_count": 3}, {"id": "2606.28709", "category": "cond-mat", "title": "Forward-backward correspondence between stationary structure and splitting probabilities in active matter", "abstract": "Active particles confined by hard walls accumulate at boundaries and may become dynamically adsorbed due to directional persistence. In this work, we show that the same persistence mechanism also gives rise to a finite wall splitting probability, meaning that a particle initialized at a wall can reach the opposite boundary before returning to its starting point. By comparing forward and backward evolution equations directly in position--velocity phase space, we derive exact relations linking stationary distributions and splitting probabilities for run-and-tumble, active Brownian, and active Ornstein--Uhlenbeck particles. In particular, we show that the stationary density is generated by the spatial derivative of the splitting probability, while the distribution of dynamically adsorbed particles at the walls is encoded in wall splitting probabilities. The correspondence is valid in arbitrary spatial dimension and establishes an exact bridge between stationary and first-passage descriptions of confined active matter, revealing them as complementary representations of the same persistence-driven dynamics.", "url": "https://arxiv.org/abs/2606.28709", "type": "理论", "summary": "受硬壁限制的活性颗粒在边界处积聚，并可能由于方向持久性而被动态吸附。在这项工作中，我们表明相同的持久性机制也会产生有限的壁分裂概率，这意味着在壁处初始化的粒子可以在返回其起点之前到达相反的边界。通过直接在位置-速度相空间中比较前向和后向演化方程，我们得出了连接运行翻滚粒子、活性布朗粒子和活性奥恩斯坦-乌伦贝克粒子的平稳分布和分裂概率的精确关系。特别是，我们表明，稳态密度是由分裂概率的空间导数生成的，而壁上动态吸附粒子的分布则编码为壁分裂概率。这种对应关系在任意空间维度上都是有效的，并在受限活动物质的静止描述和第一阶段描述之间建立了精确的桥梁，将它们揭示为相同持久性驱动动力学的互补表示。", "authors": [{"name": "Derek Frydel"}], "featured_authors": [{"name": "Derek Frydel"}], "author_count": 1}, {"id": "2606.28726", "category": "cond-mat", "title": "Distinct Roles of Hydrogen in Superconducting and Ferromagnetic Phases of CoZr$_{2}$H$_{x}$", "abstract": "Hydrogenation offers a versatile route to tuning the physical properties of intermetallic compounds. In this study, we synthesized CoZr$_{2}$H$_{x}$ with different hydrogen contents and found that hydrogen is incorporated in two distinct concentration regimes separated by a wide composition gap: a low-concentration hydrogenated superconducting phase ($x$ = 0-0.054) and a high-concentration hydrogenated ferromagnetic phase ($x$ = 2.786). Hydrogen plays fundamentally different roles in the two concentration regimes. In the high hydrogen concentration phase, the Zr-H interactions substantially modify the metallic bands crossing the Fermi level, leading to the emergence of ferromagnetism. In contrast, in the low hydrogen concentration phase, hydrogen behaves as a nonmagnetic impurity without altering the electronic band structure. Despite the nearly identical Debye temperatures across the low-concentration series, the superconducting transition temperature ($T_{\\mathrm{c}}$) is progressively suppressed with increasing hydrogen this http URL observed $T_{\\mathrm{c}}$ suppression is quantitatively described by the Abrikosov-Gor'kov pair-breaking theory, indicating that the superconducting gap of CoZr$_{2}$ is anisotropic or multigap rather than a fully isotropic $s$-wave symmetry.", "url": "https://arxiv.org/abs/2606.28726", "type": "理论", "summary": "加氢提供了一种调节金属间化合物物理性能的通用途径。在这项研究中，我们合成了具有不同氢含量的CoZr$_{2}$H$_{x}$，发现氢存在于两种不同的浓度范围内，这两种浓度范围之间存在很大的成分差距：低浓度氢化超导相（$x$ = 0-0.054）和高浓度氢化铁磁相（$x$ = 2.786）。氢气在两种浓度范围内发挥着根本不同的作用。在高氢浓度阶段，Zr-H相互作用显着改变了穿过费米能级的金属带，导致铁磁性的出现。相反，在低氢浓度相中，氢表现为非磁性杂质，而不改变电子能带结构。\n\n尽管低浓度系列的德拜温度几乎相同，但随着氢的增加，超导转变温度 ($T_{\\mathrm{c}}$) 逐渐受到抑制，该 http URL 观察到的 $T_{\\mathrm{c}}$ 抑制是通过 Abrikosov-Gor'kov 破偶理论定量描述的，表明 CoZr$_{2}$ 的超导能隙是各向异性或多能隙，而不是完全各向同性$s$-波对称性。", "authors": [{"name": "Yuto Watanabe"}, {"name": "Takayoshi Katase"}, {"name": "Daisuke Takegami"}, {"name": "Yoshikazu Mizuguchi"}], "featured_authors": [{"name": "Yuto Watanabe"}, {"name": "Takayoshi Katase"}, {"name": "Daisuke Takegami"}, {"name": "Yoshikazu Mizuguchi"}], "author_count": 4}, {"id": "2606.28735", "category": "cond-mat", "title": "Anomalous Behavior of the Ni$^{1+}$ moment and interstitial band in bi-infinite-layered La$_3$Ni$_2$O$_5$F", "abstract": "The discovery of superconductivity in hole-doped Ni$^{1+}$ systems with \"infinite layer\" NiO$_2$ square-lattices analogous to the Cu$^{2+}$ CaCuO$_2$ cuprate has renewed conflicting pictures of the Cu$^{2+}$$-$Ni$^{1+}$ similarity or distinction. Recent synthesis of formal Ni$^{1+}$ La$_3$Ni$_{2}$O$_{5}$F with two infinite NiO$_{2}$ layers per cell provides a novel member of this class. First principles density functional theory studies reveal an interstitial density derived single band $E^*$ in three layers unrelated to any atom, which provides self-doping to a Ni$^{1.09+}$ this http URL blocking La(O/F)La provides isolation of the NiO$_2$ bilayer and an interstitial $E^*$ density to strictly two-dimensional electronic and magnetic systems. Calculations of magnetic tendencies reveals behavior unlike previous nickelates, including vanishing susceptibility up to a large magnetic field. Two dimensional fluctuations and self-doping away from half-filling can account for the lack of observation of a magnetic transition.", "url": "https://arxiv.org/abs/2606.28735", "type": "理论+数值", "summary": "具有类似于 Cu$^{2+}$ CaCuO$_2$ 铜酸盐的“无限层”NiO$_2$ 方晶格的空穴掺杂 Ni$^{1+}$ 系统中超导性的发现，重新刷新了 Cu$^{2+}$$-$Ni$^{1+}$ 相似性或区别的相互矛盾的图像。最近合成的正式 Ni$^{1+}$ La$_3$Ni$_{2}$O$_{5}$F 每个单元具有两个无限 NiO$_{2}$ 层，提供了此类的新成员。第一原理密度泛函理论研究揭示了与任何原子无关的三层中衍生出的单能带 $E^*$ 间隙密度，它为 Ni$^{1.09+}$ 提供自掺杂，此 http URL 阻塞 La(O/F)La 为 NiO$_2$ 双层提供隔离，并为严格的二维电子和磁性系统提供间隙 $E^*$ 密度。磁倾向的计算揭示了与以前的镍酸盐不同的行为，包括在大磁场下磁化率消失。二维波动和远离半填充的自掺杂可以解释缺乏磁转变的观察。", "authors": [{"name": "Young-Joon Song"}, {"name": "W. E. Pickett"}, {"name": "K.-W. Lee"}], "featured_authors": [{"name": "Young-Joon Song"}, {"name": "W. E. Pickett"}, {"name": "K.-W. Lee"}], "author_count": 3}, {"id": "2606.28809", "category": "cond-mat", "title": "Inter-band coherence effects in disordered crystals: beyond the non-crossing approximation", "abstract": "We develop a quantum kinetic theory for Bloch electrons driven by a uniform dc electric field, extending the nonequilibrium density-matrix formalism beyond the non-crossing approximation. This extension is required to capture steady-state terms that are nominally zeroth order in disorder strength and compete with intrinsic band-geometric responses, as in anomalous Hall and related spin, orbital, and valley transport. Working in the length gauge with Gaussian white-noise disorder, we include impurity scattering to fourth order in the disorder potential. An iterative solution for the impurity-induced density-matrix fluctuations yields a connected $V^4$ collision integral after subtracting disconnected impurity pairings, thereby avoiding double counting. The resulting terms separate into self-energy corrections, ladder-type vertex renormalization, and crossed quantum-interference contributions. We clarify the correspondence between this density-matrix kinetic equation and the Keldysh formalism, and decompose the response into Fermi-surface and Fermi-sea components. As an application, we study the two-dimensional massive Dirac fermion model. We obtain analytical expressions for the single-particle lifetime, transport relaxation time, and longitudinal conductivity at the Born level, and then evaluate the anomalous Hall conductivity including crossed impurity processes. These processes generate an extrinsic contribution of order $\\tau^0$ that coexists with the intrinsic Berry-curvature term; for Gaussian white-noise disorder in this model, the $\\Psi$-type contribution cancels while the $X$-type term remains finite. The formalism provides a consistent route for incorporating band geometry and crossed-disorder corrections into multiband transport, with applications to spin, pseudospin, orbital, and valley phenomena.", "url": "https://arxiv.org/abs/2606.28809", "type": "理论+数值", "summary": "我们开发了由均匀直流电场驱动的布洛赫电子的量子动力学理论，将非平衡密度矩阵形式扩展到非交叉近似之外。这种扩展需要捕获名义上无序强度为零阶的稳态项，并与固有的带几何响应竞争，如反常霍尔和相关的自旋、轨道和谷传输。在具有高斯白噪声无序的长度计中，我们将杂质散射纳入无序势中的四阶。杂质引起的密度矩阵波动的迭代解决方案在减去断开的杂质对后产生连接的 $V^4$ 碰撞积分，从而避免重复计算。由此产生的项分为自能校正、梯型顶点重整化和交叉量子干涉贡献。我们阐明了密度矩阵动力学方程与凯尔迪什形式主义之间的对应关系，并将响应分解为费米面和费米海分量。作为一个应用，我们研究了二维大规模狄拉克费米子模型。\n\n我们获得了玻恩能级的单粒子寿命、输运弛豫时间和纵向电导率的解析表达式，然后评估了包括交叉杂质过程的反常霍尔电导率。这些过程产生 $\\tau^0$ 阶的外在贡献，与内在贝里曲率项共存；对于该模型中的高斯白噪声紊乱，$\\Psi$ 型贡献被抵消，而 $X$ 型项仍然有限。该形式提供了将能带几何结构和交叉无序校正纳入多能带传输的一致途径，并应用于自旋、赝自旋、轨道和谷现象。", "authors": [{"name": "Zhanning Wang"}, {"name": "James H. Cullen"}, {"name": "Roberto Raimondi"}, {"name": "Dimitrie Culcer"}], "featured_authors": [{"name": "Zhanning Wang"}, {"name": "James H. Cullen"}, {"name": "Roberto Raimondi"}, {"name": "Dimitrie Culcer"}], "author_count": 4}, {"id": "2606.28836", "category": "cond-mat", "title": "Survival of the metallic state in a single-hole multiband $p$-orbital molecular system", "abstract": "Strong correlations and ferromagnetic Hund's coupling lead to diverse electronic phenomena in transition-metal oxides that sensitively depend on the $d$-orbital electron filling. Fullerides, their $p$-electron counterparts, exhibit effective antiferromagnetic Hund's coupling in a different energy range. At half-filling ($n=3$, three electrons in triply degenerate orbitals), both $d-$ and $p$-electron systems are Mott insulators due to strong correlations and Hund's coupling. Away from half-filling, in single-electron/hole ($n=1,5$) $d$-orbital systems, Hund's coupling opposes the correlations, reducing the Mott gap and allowing survival of metallicity. Here we report a single-hole multiorbital correlated $p$-electron system, orthorhombic-structured Yb$_2$CsC$_{60}$ comprising pentavalent C$_{60}^{5-}$ anions, which also exhibits a robust metallic state with no Mott transition, just like in the metastable single-electron cubic-structured CsC$_{60}$. We assert that particle-hole symmetry holds well in ($n=1,5$) fullerides and that their $p$-electron-derived states are analogous to those in $d$-orbital solids, providing impetus for further study of these correlated systems.", "url": "https://arxiv.org/abs/2606.28836", "type": "理论", "summary": "强相关性和铁磁洪德耦合导致过渡金属氧化物中的多种电子现象，这些现象敏感地依赖于 $d$ 轨道电子填充。富勒烯，它们的$p$电子对应物，在不同的能量范围内表现出有效的反铁磁洪德耦合。在半填充时（$n=3$，三重简并轨道中的三个电子），由于强相关性和洪德耦合，$d-$ 和 $p$-电子系统都是莫特绝缘体。远离半填充，在单电子/空穴 ($n=1,5$) $d$ 轨道系统中，洪德耦合反对相关性，减少莫特间隙并允许金属丰度的存在。在这里，我们报道了一种单孔多轨道相关$p$电子系统，正交结构Yb$_2$CsC$_{60}$包含五价C$_{60}^{5-}$阴离子，它也表现出鲁棒的金属态，没有莫特转变，就像亚稳态单电子立方结构CsC$_{60}$一样。我们断言，粒子空穴对称性在 ($n=1,5$) 富勒烯中保持良好，并且它们的 $p$ 电子衍生态与 $d$ 轨道固体中的状态类似，为进一步研究这些相关系统提供了动力。", "authors": [{"name": "Keisuke Matsui"}, {"name": "Ryan A. Klein"}, {"name": "Naoya Yoshikane"}, {"name": "John Arvanitidis"}, {"name": "Matjaž Gomilšek"}, {"name": "Urh Klopčič"}, {"name": "Shogo Kawaguchi"}, {"name": "Hitoshi Yamaoka"}, {"name": "Nozomu Hiraoka"}, {"name": "Hirofumi Ishii"}, {"name": "Qiang Zhang"}, {"name": "Shigeo Mori"}, {"name": "Hiroki Ishibashi"}, {"name": "Yoshiki Kubota"}, {"name": "Craig M. Brown"}, {"name": "Denis Arčon"}, {"name": "Kosmas Prassides"}], "featured_authors": [{"name": "Keisuke Matsui"}, {"name": "Ryan A. Klein"}, {"name": "Naoya Yoshikane"}, {"name": "Craig M. Brown"}, {"name": "Denis Arčon"}, {"name": "Kosmas Prassides"}], "author_count": 17}, {"id": "2606.28855", "category": "cond-mat", "title": "Nonequilibrium electron-phonon dynamics with high momentum resolution: Thermalization bottlenecks and the effects of phonon dispersion", "abstract": "The nonequilibrium electron-phonon interplay is central to thermalization of solids, yet the microscopic picture of transient states and relaxation pathways remains incomplete. Previous nonequilibrium Green's function (NEGF) studies were restricted to local phonons and local self-energy approximations, leaving momentum-dependent dynamics largely unexplored. In this work, we demonstrate the power of the recently developed quantics-tensor-train (QTT) NEGF framework through large-scale lattice simulations with arbitrary phonon dispersions. QTTs provide a memory-efficient representation of two-time Green's functions, enabling momentum-resolved simulations with full electron-phonon feedback on lattices up to 256x256 sites. Comparing optical and acoustic phonon models, we reveal a hierarchy of relaxation bottlenecks that extends the well-known phonon-window bottleneck effect. For optical phonons, we confirm the main phonon-energy window and uncover a reduced window separating momentum-space regions of excess and deficit electronic population. We also identify a separate bottleneck in phonon thermalization, rooted in the momentum-dependent coupling to the particle-hole continuum. For acoustic phonons, the phonon-energy window acquires pronounced momentum dependence dictated by simultaneous energy-momentum conservation. The reduced window becomes asymmetric; directional scattering between Brillouin-zone regions creates a persistent bottleneck for low-momentum phonon modes. The high momentum and frequency resolution of our spectra further reveals a direct correspondence between phonon relaxation and charge response. Our results establish QTT-NEGF simulations as a scalable and controlled framework for quantitative nonequilibrium electron-phonon dynamics, overcoming previous lattice-size and propagation-time limitations and providing accurate reference data for time-resolved spectroscopies.", "url": "https://arxiv.org/abs/2606.28855", "type": "理论+数值", "summary": "非平衡电子-声子相互作用是固体热化的核心，但瞬态和弛豫路径的微观图像仍然不完整。以前的非平衡格林函数（NEGF）研究仅限于局部声子和局部自能近似，而动量依赖性动力学在很大程度上尚未得到探索。在这项工作中，我们通过具有任意声子色散的大规模晶格模拟展示了最近开发的量子张量序列（QTT）NEGF 框架的强大功能。 QTT 提供了两倍格林函数的内存高效表示，从而能够在高达 256x256 位点的晶格上进行动量解析模拟和完整的电子声子反馈。比较光学和声学声子模型，我们揭示了松弛瓶颈的层次结构，扩展了众所周知的声子窗口瓶颈效应。对于光学声子，我们确认了主要的声子能量窗口，并发现了分隔过剩和赤字电子布居的动量空间区域的缩小窗口。我们还确定了声子热化的一个单独瓶颈，其根源在于与粒子空穴连续体的动量相关耦合。\n\n对于声声子，声子能量窗口具有由同时能量动量守恒决定的明显动量依赖性。缩小的窗口变得不对称；布里渊区之间的定向散射为低动量声子模式造成了持续的瓶颈。我们的光谱的高动量和频率分辨率进一步揭示了声子弛豫和电荷响应之间的直接对应关系。我们的结果将 QTT-NEGF 模拟建立为定量非平衡电子声子动力学的可扩展和受控框架，克服了先前的晶格尺寸和传播时间限制，并为时间分辨光谱提供了准确的参考数据。", "authors": [{"name": "Maksymilian Środa"}, {"name": "Philipp Werner"}], "featured_authors": [{"name": "Maksymilian Środa"}, {"name": "Philipp Werner"}], "author_count": 2}, {"id": "2606.28892", "category": "cond-mat", "title": "Reply to Comment on \"Scaling and universality at noisy quench dynamical quantum phase transitions\"", "abstract": "The Comment by J. Sirker [ arXiv:2511.16509 ] raises an important issue concerning dynamical quantum phase transitions (DQPTs) in noisy and mixed-state dynamics, namely that the extension of the Loschmidt echo from pure to mixed states is not unique and different extensions preserve different physical properties. The Comment examines a noise-averaged mixed-state fidelity and shows that DQPTs cannot occur for any nonzero noise when the return rate is defined through the Uhlmann-Bures fidelity of the noise-averaged density matrix. This conclusion is valid for the mixed-state fidelity observable discussed in the Comment and is consistent with prior studies [ this https URL , arXiv:2504.03005 ]. Our article [ this https URL ] investigated a different operationally defined quantity: the logarithm of the Loschmidt echo obtained by first determining the noise-averaged excitation probabilities generated during the noisy ramp and then performing a coherent post-ramp evolution of a pure state constructed from these noise-averaged transition probabilities. As emphasized explicitly in our original publication, this observable is defined through an operational assumption and is not the same quantity as the mixed-state fidelity. The nonanalyticities reported in Ref. [ this https URL ] therefore concern this two-stage operational protocol and should not be identified with zeros of the Uhlmann-Bures fidelity. There is therefore no direct contradiction between the theorem established for the Uhlmann-Bures return rate and the conclusions obtained for the different operational protocol studied in Ref. [ this https URL ].", "url": "https://arxiv.org/abs/2606.28892", "type": "理论", "summary": "J. Sirker 的评论 [ arXiv:2511.16509 ] 提出了一个关于噪声和混合态动力学中的动态量子相变 (DQPT) 的重要问题，即洛施密特回波从纯态到混合态的扩展不是唯一的，不同的扩展保留了不同的物理属性。该评论检查了噪声平均混合状态保真度，并表明当通过噪声平均密度矩阵的 Uhlmann-Bures 保真度定义返回率时，任何非零噪声都不会发生 DQPT。这个结论对于评论中讨论的混合状态保真度可观察值是有效的，并且与之前的研究一致[此 https URL，arXiv:2504.03005]。我们的文章 [此 https URL] 研究了不同的操作定义量：通过首先确定噪声斜坡期间生成的噪声平均激励概率，然后执行由这些噪声平均转变概率构造的纯状态的相干后斜坡演化而获得的洛施密特回波的对数。\n\n正如我们在原始出版物中明确强调的那样，该可观察量是通过操作假设定义的，与混合状态保真度的数量不同。参考文献中报告的非分析性。因此，[此 https URL ]涉及此两阶段操作协议，并且不应该用 Uhlmann-Bures 保真度的零来标识。因此，为 Uhlmann-Bures 返回率建立的定理与参考文献 1 中研究的不同操作协议所获得的结论之间不存在直接矛盾。 [此 https 网址]。", "authors": [{"name": "S. Ansari"}, {"name": "R. Jafari"}, {"name": "A. Akbari"}, {"name": "M. Abdi"}], "featured_authors": [{"name": "S. Ansari"}, {"name": "R. Jafari"}, {"name": "A. Akbari"}, {"name": "M. Abdi"}], "author_count": 4}, {"id": "2606.28977", "category": "cond-mat", "title": "Synchronic scattering and geometric dephasing in microwave-induced resistance oscillations", "abstract": "We present a novel quantum transport model for microwave-induced resistance oscillations (MIRO) where we prove that the instantaneous scattering rate is directly modulated by the velocity of the driven coherent state. This interaction peaks exactly at $\\omega t = 2n\\pi$, where the wave packets sweep through the impurity landscape at maximum speed, breaking time-reversal symmetry to generate a net direct current. Additionally, we introduce a dephasing architecture to explain amplitude saturation: a non-linear geometric dephasing ($\\exp(-A/R_c)$) triggered when the displacement amplitude $A$ of the oscillating coherent state, approaches the cyclotron radius $R_{c}$. This perfectly captures the linear-to-sublinear power crossover at high intensities, offering a fully coherent description of non-equilibrium transport.", "url": "https://arxiv.org/abs/2606.28977", "type": "理论", "summary": "我们提出了一种新颖的微波诱导电阻振荡（MIRO）量子传输模型，其中证明瞬时散射率直接由驱动相干态的速度调制。这种相互作用恰好在 $\\omega t = 2n\\pi$ 处达到峰值，此时波包以最大速度扫过杂质区域，打破时间反转对称性以产生净直流电。此外，我们引入了一种移相架构来解释幅度饱和：当振荡相干态的位移幅度$A$接近回旋半径$R_{c}$时，会触发非线性几何移相（$\\exp(-A/R_c)$）。这完美地捕捉了高强度下的线性到亚线性功率交叉，提供了对非平衡输运的完全连贯的描述。", "authors": [{"name": "Jesus Iñarrea"}], "featured_authors": [{"name": "Jesus Iñarrea"}], "author_count": 1}, {"id": "2606.28982", "category": "cond-mat", "title": "Electromagnetic response of two interacting topological insulator spheres in external fields", "abstract": "We study the static electromagnetic response of two spherical topological insulators embedded in a dielectric medium and subjected to a uniform external electric field. The gapped surface states are described by a piecewise constant axion field, which induces a topological magnetoelectric coupling localized at the spherical interfaces. {More generally, the same formalism applies to isotropic magnetoelectric media characterized by an effective scalar magnetoelectric response.} The electrostatic problem is solved at zeroth order using bispherical coordinates, allowing for an exact treatment of both parallel and perpendicular orientations of the external field relative to the center-to-center axis. The resulting mode expansions are determined by three-term recurrence relations, which are solved perturbatively for nonoverlapping spheres. The { magnetoelectric}-induced response is then computed to leading order in the fine-structure constant {(or, more generally, in the effective coupling strength)}. The induced sources are purely interfacial and generate distinct magnetostatic field configurations in the parallel and perpendicular geometries. Closed-form series representations for the induced vector potential and magnetic field are obtained in terms of the zeroth-order electrostatic coefficients. These results provide an analytically controlled description of {interaction-induced magnetostatics in coupled spherical magnetoelectric systems}.", "url": "https://arxiv.org/abs/2606.28982", "type": "理论+数值", "summary": "我们研究了嵌入介电介质中并受到均匀外部电场的两个球形拓扑绝缘体的静态电磁响应。带隙表面态由分段恒定轴子场描述，该轴子场引起位于球形界面处的拓扑磁电耦合。 {更一般地，相同的形式适用于以有效标量磁电响应为特征的各向同性磁电介质。}使用双球坐标在零阶上解决静电问题，从而可以精确处理外场相对于中心到中心轴的平行和垂直方向。得到的模式展开由三项递推关系确定，该关系针对非重叠球体进行微扰求解。然后，将{磁电}感应响应计算为精细结构常数{（或更一般地，有效耦合强度）}中的前导顺序。感应源是纯界面的，并在平行和垂直的几何形状中产生不同的静磁场配置。\n\n感应矢量势和磁场的闭合形式级数表示是根据零阶静电系数获得的。这些结果提供了对{耦合球形磁电系统中相互作用引起的静磁学}的分析控制描述。", "authors": [{"name": "J. Cornejo Gómez"}, {"name": "M. Ibarra-Meneses"}, {"name": "L. Medel Onofre"}, {"name": "A. Martín-Ruiz"}], "featured_authors": [{"name": "J. Cornejo Gómez"}, {"name": "M. Ibarra-Meneses"}, {"name": "L. Medel Onofre"}, {"name": "A. Martín-Ruiz"}], "author_count": 4}, {"id": "2606.29051", "category": "cond-mat", "title": "Geometry-mediated shear softening in dense ordered granular packings", "abstract": "Shearing a packing of solid granular grains can be difficult, especially when the solid fraction is high and the boundary confinement is strong. It was recently shown that embedding voids in grains can make a packing easier to shear when such voids make the grains auxetic. Here, we use finite element simulation to show that auxeticity is not a necessary condition even in a seemingly very constrained setting: shearing dense and ordered granular packings under a constant solid fraction. More specifically, by controlling the geometry of a void embedded in a grain, we induce an apparent elastic anisotropy and softening of the grain under shear, which collectively leads to a significant reduction -- up to 90\\% -- of the apparent shear modulus of a packing of these grains. Complementary analysis shows that this reduction correlates well with a decrease in contact-force anisotropy, and is insensitive to system size and contact friction variation. Our results highlight how grain-scale geometry, mediated by multi-body contact mechanics, modulates macroscopic system-scale elasticity, providing a minimal design mechanism towards targeted collective mechanical properties of soft granular metamaterials.", "url": "https://arxiv.org/abs/2606.29051", "type": "理论+数值", "summary": "剪切固体粒状颗粒的堆积可能很困难，特别是当固体分数高且边界限制强时。最近的研究表明，当颗粒中嵌入空隙使颗粒拉胀时，这种空隙可以使填料更容易剪切。在这里，我们使用有限元模拟来表明，即使在看似非常受限的环境中，拉胀性也不是必要条件：在恒定的固体分数下剪切致密且有序的颗粒填料。更具体地说，通过控制嵌入颗粒中的空隙的几何形状，我们诱导了颗粒在剪切下的表观弹性各向异性和软化，这共同导致这些颗粒堆积的表观剪切模量显着降低（高达 90%）。补充分析表明，这种减少与接触力各向异性的减少密切相关，并且对系统尺寸和接触摩擦变化不敏感。\n\n我们的结果强调了由多体接触力学介导的晶粒尺度几何结构如何调节宏观系统尺度弹性，从而为软粒状超材料的目标集体机械性能提供最小的设计机制。", "authors": [{"name": "Liuchi Li"}, {"name": "Konstantinos Karapiperis"}], "featured_authors": [{"name": "Liuchi Li"}, {"name": "Konstantinos Karapiperis"}], "author_count": 2}, {"id": "2606.29055", "category": "cond-mat", "title": "A Ginzburg-Landau theory of intrinsic dislocation-loop formation in diamond with machine-learned atomistic simulations", "abstract": "Defects limit the performance of diamond in electronics and quantum technologies, yet how they nucleate from migrating point defects is rarely described as a phase transition. Here we show that dislocation-loop formation in diamond is a \\emph{first-order phase transition}. We build a Ginzburg-Landau theory of it whose order parameter -- the loop area -- and coefficients are fixed directly from quantum-mechanically accurate machine-learned atomistic simulations. From simulations at nanometre and nanosecond scales, we find that carbon self-interstitials aggregate, by diffusion-recombination and lattice exchange, into line-defect motifs that seed a prismatic $\\tfrac{1}{2}\\langle110\\rangle$ dislocation loop and two platelet-like planar defects. We also characterize the dynamics of the transition with Kramers' rate theory. The transition is strongly first-order, driven overwhelmingly ($\\approx98\\%$) by bond-energy reorganisation rather than elastic relief. Because these defects form \\emph{intrinsically} -- from carbon interstitials alone, without nitrogen -- our results offer a nitrogen-free pathway complementary to the nitrogen-mediated routes long debated for type-Ia diamond, and a transferable framework for irradiation-induced loops.", "url": "https://arxiv.org/abs/2606.29055", "type": "理论+数值", "summary": "缺陷限制了金刚石在电子和量子技术中的性能，但它们如何从迁移点缺陷成核却很少被描述为相变。在这里，我们证明金刚石中位错环的形成是\\emph{一阶相变}。我们建立了一个金兹堡-朗道理论，其阶数参数——环路面积——和系数是直接从量子力学精确的机器学习原子模拟中确定的。通过纳米和纳秒尺度的模拟，我们发现碳自填隙通过扩散重组和晶格交换聚集成线缺陷图案，从而产生棱柱形 $\\tfrac{1}{2}\\langle110\\rangle$ 位错环和两个片状平面缺陷。我们还用克莱默斯的速率理论来描述转变的动态。这种转变是强烈的一阶转变，主要由键能重组而不是弹性释放驱动（$\\approx98\\%$）。\n\n因为这些缺陷本质上是由碳间隙原子形成的，没有氮，所以我们的结果提供了一种无氮途径，与长期争论的 Ia 型钻石的氮介导途径互补，以及辐射诱导环的可转移框架。", "authors": [{"name": "Xiaoya Chang"}, {"name": "Arsalan Hashemi"}, {"name": "Nima Ghafari Cherati"}, {"name": "Mikko Karttunen"}, {"name": "Adam Gali"}, {"name": "Tapio Ala-Nissila"}], "featured_authors": [{"name": "Xiaoya Chang"}, {"name": "Arsalan Hashemi"}, {"name": "Nima Ghafari Cherati"}, {"name": "Mikko Karttunen"}, {"name": "Adam Gali"}, {"name": "Tapio Ala-Nissila"}], "author_count": 6}, {"id": "2606.29061", "category": "cond-mat", "title": "Oblate Spheroid Excitation Theory: A Unified, Lattice-Free Foundation for Plastic Deformation from Which Dislocations Emerge as Collective Excitations", "abstract": "Dislocation theory has underpinned crystal plasticity for a century, yet its lattice-dependent definition cannot describe plastic flow in grain boundaries, glasses, ceramics, or nanocrystals near the glass transition, where no periodic lattice exists. We propose the Oblate Spheroid Excitation Theory (OSET): the elementary carrier of plastic deformation, in any solid, is a shear-eigenstrained oblate spheroid, the oblate-spheroidal transformation zone (OSTZ), treated within Eshelby's inclusion theory. The OSTZ requires no lattice and has a finite, non-singular, intrinsically thermally activated energy and stress fields. Three results are proved: a single OSTZ produces a non-singular elastic dipole, not a dislocation's singular field; a co-planar chain of N OSTZs is mathematically identical to a Peierls-Nabarro dislocation, core width and Burgers vector fixed by OSTZ geometry; and a genuine dislocation nucleates only once the chain reaches a host-lattice-set critical length. Dislocations emerge as a collective, large-$N$ limit of OSET rather than an assumed entity, and the theoretical shear strength, Peierls stress, core energy, Frank-Read critical stress, and stacking-fault energy follow as derived, parameter-free quantities. OSET is validated against grain-boundary-sliding data, independent literature spanning metals, ceramics, and bulk metallic glasses, and a recent 41-system compilation, reproducing the fitted dilatational and shear eigenstrains to within 2% and 15%, respectively. Because classical dislocation theory emerges from OSET but OSET does not require dislocations, it provides, in our view, a more fundamental, broadly applicable foundation for plastic deformation across material classes.", "url": "https://arxiv.org/abs/2606.29061", "type": "理论", "summary": "一个世纪以来，位错理论一直是晶体塑性的基础，但其与晶格相关的定义无法描述晶界、玻璃、陶瓷或玻璃化转变附近的纳米晶体中的塑性流动，因为这些地方不存在周期性晶格。我们提出扁球体激发理论 (OSET)：在任何固体中，塑性变形的基本载体是剪切特征应变扁球体，即扁球体转变区 (OSTZ)，在埃谢尔比包含理论中进行处理。 OSTZ 不需要晶格，并且具有有限的、非奇异的、本质上热激活的能量和应力场。证明了三个结果：单个OSTZ产生非奇异弹性偶极子，而不是位错的奇异场； N 个 OSTZ 的共面链在数学上与由 OSTZ 几何形状固定的 Peierls-Nabarro 位错、核心宽度和 Burgers 矢量相同；只有当链达到主晶格设定的临界长度时，真正的位错才会成核。\n\n位错作为 OSET 的集体、大 $N$ 极限出现，而不是假定的实体，并且理论剪切强度、Peierls 应力、核心能量、Frank-Read 临界应力和堆垛层错能量遵循导出的无参数量。 OSET 根据晶界滑动数据、涵盖金属、陶瓷和块状金属玻璃的独立文献以及最近的 41 个系统编译进行了验证，将拟合的膨胀和剪切本征应变分别复制到 2% 和 15% 以内。由于经典位错理论源自 OSET，但 OSET 不需要位错，因此我们认为，它为跨材料类别的塑性变形提供了更基础、更广泛适用的基础。", "authors": [{"name": "Albert Linda"}, {"name": "K.A. Padmanabhan"}], "featured_authors": [{"name": "Albert Linda"}, {"name": "K.A. Padmanabhan"}], "author_count": 2}, {"id": "2606.29242", "category": "cond-mat", "title": "Winding-Sector Transitions and Thermodynamic Incommensurability in Helical Valence Bond Phase under Tilted Boundary Conditions", "abstract": "We investigate the ground states of the $S = 1/2$ staircase $J$-$Q_3$ model in the maximally anisotropic limit by employing projector quantum Monte Carlo simulations. To overcome boundary-induced finite-size ambiguities inherent in the study of spatially modulated structures, we implement a $45^{\\circ}$ tilted periodic boundary condition that eliminates intermediate phases and provides direct access to winding-sector transitions of the system. By defining a domain wall density to quantify the spatial modulation of the helical valence bond phase, we perform thermodynamic extrapolations and demonstrate that both the domain wall density and the characteristic wavevector evolve continuously with the coupling ratio, exhibiting no commensurate lock-in behavior. Our results establish that the helical valence bond phase is a genuine two-dimensional incommensurate phase with long-range bond-bond order in the thermodynamic limit, clarifying that winding-sector transitions are finite-size effects enforced by boundary commensurability. Furthermore, we determine the phase transition point between columnar valence bond solid phase and helical valence bond phase to be $g_c = 0.046(2)$.", "url": "https://arxiv.org/abs/2606.29242", "type": "理论+数值", "summary": "我们通过采用投影量子蒙特卡罗模拟来研究最大各向异性极限下 $S = 1/2$ 楼梯 $J$-$Q_3$ 模型的基态。为了克服空间调制结构研究中固有的边界引起的有限尺寸模糊性，我们实现了 $45^{\\circ}$ 倾斜周期性边界条件，消除了中间阶段并提供对系统的绕组扇区转换的直接访问。通过定义畴壁密度来量化螺旋价键相的空间调制，我们进行热力学外推，并证明畴壁密度和特征波矢量都随着耦合比连续演化，没有表现出相应的锁定行为。我们的结果表明，螺旋价键相是一种真正的二维不可通约相，在热力学极限下具有长程键键顺序，这阐明了缠绕扇区转变是由边界可通约性强制执行的有限尺寸效应。此外，我们确定柱状价键固相与螺旋价键固相之间的相变点为$g_c = 0.046(2)$。", "authors": [{"name": "Yan Liu"}, {"name": "Jie Lou"}, {"name": "Yan Chen"}], "featured_authors": [{"name": "Yan Liu"}, {"name": "Jie Lou"}, {"name": "Yan Chen"}], "author_count": 3}, {"id": "2606.29258", "category": "cond-mat", "title": "Strain-Driven Domain Walls in Antiferromagnets", "abstract": "We derive an equation describing domain wall motion in antiferromagnets under the influence of normal strain. From this equation, we find that the domain wall moves towards positions where $\\varepsilon_{xx}$ is high and $\\varepsilon_{zz}$ is low. Furthermore, each strain component leads to a different terminal velocity for the same strain profile. This difference arises because both strains affect the domain wall width in opposite ways: $\\varepsilon_{xx}$ reduces the width, whereas $\\varepsilon_{zz}$ increases it. The model is then compared with mumax$^+$ simulations for various strain profiles, including a strain gradient, an oscillating strain, and a Rayleigh wave. The comparison shows good agreement between the analytical and numerical results. Finally, we demonstrate the potential of standing surface acoustic waves as an error correction method in racetrack memory.", "url": "https://arxiv.org/abs/2606.29258", "type": "理论+数值", "summary": "我们推导出一个描述反铁磁体在法向应变影响下磁畴壁运动的方程。从这个方程，我们发现畴壁向 $\\varepsilon_{xx}$ 高且 $\\varepsilon_{zz}$ 低的位置移动。此外，对于相同的应变分布，每个应变分量都会导致不同的终端速度。出现这种差异是因为两种应变以相反的方式影响畴壁宽度：$\\varepsilon_{xx}$ 减小宽度，而$\\varepsilon_{zz}$ 增加宽度。然后将该模型与各种应变分布（包括应变梯度、振荡应变和瑞利波）的 mumax$^+$ 模拟进行比较。比较表明分析结果和数值结果之间具有良好的一致性。最后，我们展示了驻表面声波作为赛道存储器中的纠错方法的潜力。", "authors": [{"name": "Diego De Gusem"}, {"name": "Arnaud Nizet"}, {"name": "Bartel Van Waeyenberge"}], "featured_authors": [{"name": "Diego De Gusem"}, {"name": "Arnaud Nizet"}, {"name": "Bartel Van Waeyenberge"}], "author_count": 3}, {"id": "2606.29266", "category": "cond-mat", "title": "Time-local nonequilibrium Green's function method for real-time dynamics in quantum systems coupled to superconducting leads", "abstract": "We develop a time-local nonequilibrium Green's function formulation for real-time dynamics in quantum systems coupled to superconducting leads. The superconducting lead self-energy is a strongly frequency-dependent matrix in Nambu space, giving rise to nonlocal memory kernels in the time domain. This makes direct propagation of the Kadanoff-Baym (KB) equations computationally demanding. To overcome this difficulty, we extend the auxiliary-mode expansion, originally developed for normal-metal leads, to Nambu-space self-energies. This allows us to decompose the superconducting lead self-energy into a finite number of exponential modes and to transform the KB equations with memory integrals into a closed set of ordinary differential equations. The resulting time-local equations enable efficient real-time simulations under general time-dependent bias voltages, superconducting phases, and one-body Hamiltonians of the central system, while retaining the memory effects induced by superconducting leads. As an application, we analyze voltage-quench dynamics in a superconductor-quantum-dot-superconductor junction and show that, after a dc bias is suddenly applied, the system evolves through a transient regime and relaxes to an ac Josephson periodic steady state. The resulting periodic steady-state current agrees with the Floquet Green's function solution, validating the present real-time formulation.", "url": "https://arxiv.org/abs/2606.29266", "type": "理论+数值", "summary": "我们开发了一种时间局域非平衡格林函数公式，用于与超导引线耦合的量子系统中的实时动力学。超导铅自能是南部空间中强烈频率相关的矩阵，在时域中产生非局域记忆核。这使得 Kadanoff-Baym (KB) 方程的直接传播计算量要求很高。为了克服这个困难，我们将最初为普通金属引线开发的辅助模式展开扩展到南部空间自能。这使得我们能够将超导铅自能分解为有限数量的指数模式，并将具有记忆积分的KB方程转换为一组封闭的常微分方程。由此产生的时间局部方程能够在一般与时间相关的偏置电压、超导相位和中央系统的单体哈密顿量下进行有效的实时模拟，同时保留超导引线引起的记忆效应。\n\n作为一个应用，我们分析了超导体-量子点-超导体结中的电压猝灭动力学，并表明，突然施加直流偏置后，系统会经历瞬态状态并松弛到交流约瑟夫森周期性稳态。由此产生的周期性稳态电流与 Floquet Green 函数解一致，验证了当前的实时公式。", "authors": [{"name": "Taira Kawamura"}], "featured_authors": [{"name": "Taira Kawamura"}], "author_count": 1}, {"id": "2606.29306", "category": "cond-mat", "title": "Superconductivity in Jellium Model Revisited", "abstract": "We reanalyze superconductivity in jellium model within the dielectric formalism developed by Kirzhnits, Maksimov, and Khomskii (KMK), which is probably the most reliable approach to this model. The linearized KMK integral equation for superconducting transition temperature is analyzed analytically and solved numerically by direct diagonalization to obtain $T_c$ dependence on Wigner - Seitz radius $r_s$. As a first systematic extension beyond random - phase approximation (RPA), static Hubbard local - field corrections are incorporated into the dielectric function. Our results in general narrow the interval of possible $T_c$ values in comparison with widely scattered results of some of the previous works. For the case of metallic hydrogen our calculations show $T_c(r_s)$ dependence with characteristic dome with maximum of $T_c$ at $r_s\\sim$ 9.0 of the order of some fractions of Kelvin only, despite the naive expectations based on the high values of pairing Boson frequency. This is due to the weak - coupling regime of superconductivity in jellium model at all densities.", "url": "https://arxiv.org/abs/2606.29306", "type": "理论+数值", "summary": "We reanalyze superconductivity in jellium model within the dielectric formalism developed by Kirzhnits, Maksimov, and Khomskii (KMK), which is probably the most reliable approach to this model. The linearized KMK integral equation for superconducting transition temperature is analyzed analytically and solved numerically by direct diagonalization to obtain $T_c$ dependence on Wigner - Seitz radius $r_s$. As a first systematic extension beyond random - phase approximation (RPA), static Hubbard local - field corrections are incorporated into the dielectric function.与之前一些工作的广泛分散的结果相比，我们的结果总体上缩小了可能的 $T_c$ 值的区间。 For the case of metallic hydrogen our calculations show $T_c(r_s)$ dependence with characteristic dome with maximum of $T_c$ at $r_s\\sim$ 9.0 of the order of some fractions of Kelvin only, despite the naive expectations based on the high values of pairing Boson frequency.这是由于在所有密度的果冻模型中超导性的弱耦合机制。", "authors": [{"name": "Michael V. Sadovskii"}], "featured_authors": [{"name": "Michael V. Sadovskii"}], "author_count": 1}, {"id": "2606.29311", "category": "cond-mat", "title": "Pseudo entropy and topological phases of matter", "abstract": "Entanglement entropy has proven to be a powerful probe of phenomena such as quantum chaos and phase transitions. Pseudo entropy is a recently proposed time-like generalization of an entanglement measure, motivated by de Sitter holography. In this work, we find that pseudo entropy can also serve as a novel probe for distinguishing topological phases of matter. For this, we consider the Su--Schrieffer--Heeger model as a representative example and investigate the averaged excess entropy $\\Delta S_{12}$, defined as the difference between pseudo entropy and the average entanglement entropy, across the topological-to-trivial and trivial-to-topological phase transitions. When the two states are in the same phase, we find that $ \\Delta S_{12}$ is non-positive under periodic boundary conditions, while for open boundary conditions, it is non-positive only when the system is sufficiently large. Moreover, we analyze ground-state quench protocols for topology-crossing quenches and find that the imaginary pseudo entropy tracks the critical times predicted by the Fisher zeros.", "url": "https://arxiv.org/abs/2606.29311", "type": "理论", "summary": "纠缠熵已被证明是对量子混沌和相变等现象的有力探测。伪熵是最近提出的纠缠度量的类时间概括，受到德西特全息术的推动。在这项工作中，我们发现赝熵也可以作为区分物质拓扑相的新探针。为此，我们以 Su--Schrieffer--Heeger 模型为代表，研究拓扑到平凡和平凡到拓扑相变的平均过剩熵 $\\Delta S_{12}$，定义为伪熵与平均纠缠熵之间的差。当两个状态同相时，我们发现$ \\Delta S_{12}$在周期性边界条件下为非正值，而对于开放边界条件，只有当系统足够大时才为非正值。此外，我们分析了拓扑交叉猝灭的基态猝灭协议，发现虚伪熵跟踪费希尔零点预测的临界时间。", "authors": [{"name": "Pramod Kamal Kharel"}, {"name": "Manghang Limbu"}, {"name": "Nabaraj Khatri"}, {"name": "Ashish Khanal"}, {"name": "Kiran Adhikari"}], "featured_authors": [{"name": "Pramod Kamal Kharel"}, {"name": "Manghang Limbu"}, {"name": "Nabaraj Khatri"}, {"name": "Ashish Khanal"}, {"name": "Kiran Adhikari"}], "author_count": 5}, {"id": "2606.29320", "category": "cond-mat", "title": "Geometric Approach to Zero-Memory Quantum Dot Reservoir Computing", "abstract": "Physical reservoir computing offers an energy-efficient alternative to conventional neural networks, where the intrinsic memory capacity in the physical system plays a central role. We demonstrate that memory capacity can be engineered extrinsically in memoryless systems by exploiting the computational space-time tradeoff, substituting temporal memory with spatial degrees of freedom. Our approach utilizes multidimensional input nodes to function as a spatial memory axis, thereby removing the dependency on intrinsic history-dependent dynamics in the reservoir. We validate this framework through numerical simulations of a generalized quantum dot, whose discrete energy levels provide strong nonlinearity crucial for reservoir computing as well. By coupling this inherent nonlinearity with our extrinsic memory, we show that memoryless quantum reservoir can achieve high performance on both chaotic Mackey-Glass future prediction and nonlinear transformation tasks. Furthermore, by analyzing the geometry of the quantum state trajectories, we identify the physical mechanism underlying this memory emergence: extrinsic memory constructs a hysteresis loop within the quantum Hilbert space, and this loop becomes topologically stable when the evolution of the system state synchronizes with the input signal's frequency. Our work decouples reservoir computing from material-specific memory properties, significantly expanding the range of candidate systems for quantum neuromorphic computing.", "url": "https://arxiv.org/abs/2606.29320", "type": "理论+数值", "summary": "物理储层计算为传统神经网络提供了一种节能的替代方案，其中物理系统的固有内存容量起着核心作用。我们证明，通过利用计算时空权衡，用空间自由度代替时间记忆，可以在无记忆系统中外在地设计记忆容量。我们的方法利用多维输入节点充当空间记忆轴，从而消除了对储层中固有的历史相关动力学的依赖。我们通过广义量子点的数值模拟验证了这个框架，其离散能级提供了对储层计算至关重要的强非线性。通过将这种固有的非线性与我们的外在记忆相结合，我们证明无记忆量子库可以在混沌麦基-格拉斯未来预测和非线性变换任务上实现高性能。\n\n此外，通过分析量子态轨迹的几何形状，我们确定了这种记忆出现背后的物理机制：外在记忆在量子希尔伯特空间内构造了一个磁滞环，当系统状态的演化与输入信号频率同步时，该磁滞环变得拓扑稳定。我们的工作将储层计算与特定材料的存储属性解耦，显着扩大了量子神经形态计算候选系统的范围。", "authors": [{"name": "Bongsu Kim"}, {"name": "Oscar Lee"}, {"name": "Sangjun Jeon"}, {"name": "Kun Woo Kim"}], "featured_authors": [{"name": "Bongsu Kim"}, {"name": "Oscar Lee"}, {"name": "Sangjun Jeon"}, {"name": "Kun Woo Kim"}], "author_count": 4}, {"id": "2606.29330", "category": "cond-mat", "title": "Quantum Theory of Current-Generating Local Orbital Magnetization", "abstract": "Local orbital magnetization is the field whose rotation generates the equilibrium current density. Unlike spin magnetization, a quantum-mechanical local formula consistent with both this current relation and the modern theory of bulk orbital magnetization has been missing. In this work, we derive a quantum-mechanical formula for the local orbital magnetization for non-interacting electrons by considering local-flux response of the grand potential. The local-flux response fixes the formula uniquely in two dimensions, whereas in three dimensions it selects a natural representative within a longitudinal ambiguity. Furthermore, coarse graining yields a natural local marker that generates the current to third-derivative order, and its site-position moment equals the orbital magnetic quadrupole moment of finite-size systems. We illustrate the obtained results with the Haldane model.", "url": "https://arxiv.org/abs/2606.29330", "type": "理论", "summary": "局域轨道磁化强度是其旋转产生平衡电流密度的场。与自旋磁化不同，与当前关系和现代体轨道磁化理论一致的量子力学局域公式一直缺失。在这项工作中，我们通过考虑大势的局部通量响应，推导出非相互作用电子的局部轨道磁化强度的量子力学公式。局部通量响应在二维中唯一地固定公式，而在三维中，它在纵向模糊性内选择自然代表。此外，粗粒化产生了一个自然的局部标记，可以产生三阶导数的电流，其位点矩等于有限尺寸系统的轨道磁四极矩。我们用 Haldane 模型说明了获得的结果。", "authors": [{"name": "Akito Daido"}], "featured_authors": [{"name": "Akito Daido"}], "author_count": 1}, {"id": "2606.29456", "category": "cond-mat", "title": "Bilinear Flexo-Antiferrodistortive Coupling in Ferroelastics: Polar Twins, Antiphase Boundaries and Fingerprints of Alterelectricity", "abstract": "Using the Landau-Ginsburg-Devonshire approach we show that the linear gradient-type coupling between the electric polarization vector and antiferrodistortive long-range order parameter pseudovector, that has the form of Lifshitz invariant and named \"bilinear flexo-antiferrodistortive coupling\", can emerge in all antiferrodistortive ferroelastics, since it is symmetry-allowed. Using the four sublattices model we reveal that the bilinear flexo-antiferrodistortive coupling can induce the sublattice-sensitive polarization at the twin walls and antiphase boundaries in antiferrodistortive ferroelastics without any ferroelectric or antiferroelectric ordering. Since the induced polarization is perpendicular to the antiferrodistortive long-range order parameter and counter-directed in neighboring sublattices with checkerboard-type direction of antiferrodistortive long-range order parameter, such structure of polarization may correspond to the alterelectric-type quadrupolar electric order. However, physical manifestations of the bilinear flexo-antiferrodistortive coupling are invisible in most nanostructured antiferrodistortive ferroelectrics and antiferroelectrics due to the domination of piezoelectric and/or linear flexoelectric couplings. Since a common flexoelectric coupling cannot induce the alterelectric-type polarization at domain boundaries in antiferrodistortive ferroelastics, we believe that the bilinear flexo-antiferrodistortive coupling can be a fingerprint of recently discovered alterelectric long-range order in antiferrodistortive ferroelastics.", "url": "https://arxiv.org/abs/2606.29456", "type": "理论", "summary": "使用Landau-Ginsburg-Devonshire方法，我们证明了电极化矢量和反铁畸变长程有序参数赝矢量之间的线性梯度耦合，其具有Lifshitz不变量的形式并被称为“双线性柔曲反铁畸变耦合”，可以出现在所有反铁畸变铁弹性体中，因为它是允许对称的。使用四个亚晶格模型，我们揭示了双线性柔曲反铁畸变耦合可以在反铁畸变铁弹性体中的双壁和反相边界处诱导亚晶格敏感极化，而无需任何铁电或反铁电排序。由于激生极化垂直于反铁畸变长程有序参数，并且在相邻子晶格中以反铁畸变长程有序参数的棋盘型方向反向定向，因此这种极化结构可以对应于交电型四极电有序。\n\n然而，由于压电和/或线性挠曲电耦合占主导地位，双线性挠曲反铁畸变耦合的物理表现在大多数纳米结构反铁畸变铁电体和反铁电体中是不可见的。由于常见的挠曲电耦合不能在反铁畸变铁弹性体中的域边界引起交变电型极化，因此我们相信双线性挠曲-反铁畸变耦合可能是最近发现的反铁畸变铁弹性体中交变电长程有序的指纹。", "authors": [{"name": "Eugene A. Eliseev"}, {"name": "Anna N. Morozovska"}, {"name": "Venkatraman Gopalan"}], "featured_authors": [{"name": "Eugene A. Eliseev"}, {"name": "Anna N. Morozovska"}, {"name": "Venkatraman Gopalan"}], "author_count": 3}, {"id": "2606.29663", "category": "cond-mat", "title": "Length--Velocity Gauge Equivalence of Quantum Geometric Nonlinear Conductivity", "abstract": "Nonlinear transport has emerged as a sensitive probe of quantum geometry beyond the Berry-curvature physics of linear response. However, the intrinsic second-order dc response remains conceptually subtle: different quantum and semiclassical formulations can appear to give different static limits, with different assignments of Fermi sea and Fermi surface contributions. Here we resolve this ambiguity by developing a gauge-consistent density-matrix theory of intrinsic nonlinear conductivity in both the length gauge, where the electric field couples through the position operator, and the velocity gauge, where it enters through the vector potential. We show that the two gauges give the same adiabatic dc response when the same retarded continuation is used for all external frequencies and when the velocity gauge current includes all field-dependent vertices. The apparent Fermi sea terms cancel in the full expression, leaving a Fermi surface quantum geometric contribution determined by the band-normalized quantum metric. This result implies that a fully gapped insulator has no residual dc nonlinear Hall current in the adiabatic clean limit. The reactive part of the Fermi surface term agrees with the original semiclassical Berry-connection-polarizability response, while the dissipative Ohmic sector requires a more careful treatment of relaxation and impurity scattering. Our work establishes the length-velocity gauge equivalence for quantum geometric nonlinear response and provides a foundation for using nonlinear transport to probe magnetic quantum geometry, especially in PT-symmetric antiferromagnets.", "url": "https://arxiv.org/abs/2606.29663", "type": "理论", "summary": "非线性输运已成为超越线性响应的贝里曲率物理的量子几何的敏感探针。然而，内在的二阶直流响应在概念上仍然很微妙：不同的量子和半经典公式似乎可以给出不同的静态极限，以及费米海和费米表面贡献的不同分配。在这里，我们通过在长度计（电场通过位置算子耦合）和速度计（电场通过矢量势进入）中发展内在非线性电导率的规范一致密度矩阵理论来解决这个歧义。我们表明，当对所有外部频率使用相同的延迟连续并且当速度计电流包括所有与场相关的顶点时，这两个仪表给出相同的绝热直流响应。表观费米海项在完整表达式中被抵消，留下由带归一化量子度量确定的费米表面量子几何贡献。该结果意味着完全有间隙的绝缘体在绝热清洁极限内没有残余直流非线性霍尔电流。\n\n费米表面项的反应部分与原始的半经典贝里连接极化响应一致，而耗散欧姆扇区需要更仔细地处理弛豫和杂质散射。我们的工作建立了量子几何非线性响应的长度-速度规范等价，并为使用非线性输运探测磁量子几何，特别是在 PT 对称反铁磁体中提供了基础。", "authors": [{"name": "Shakeel Ahmad"}, {"name": "Fei Xue"}], "featured_authors": [{"name": "Shakeel Ahmad"}, {"name": "Fei Xue"}], "author_count": 2}, {"id": "2606.29729", "category": "cond-mat", "title": "Atomically Thin Amorphous Carbon with an Ultralow Dielectric Constant", "abstract": "Two-dimensional (2D) materials exhibit excellent properties at monolayer thickness and are viable replacements for various microelectronic components as scaling gradually approaches the atomic limit. Despite significant advancements in the ongoing 2D revolution of integrated circuits, one crucial building block, namely a 2D ultralow-k (ULK) dielectric, remains unreported. The challenge lies in achieving a dielectric constant less than 3, as traditional low-k dielectrics are inherently unstable at the 2D limit due to their amorphous or porous nature. The realisation of ultrathin dielectrics with low-k is also needed to address current bottlenecks in integrated circuits scaling. Specifically, low-k materials are necessary to minimise parasitic capacitances as the distance between conductive elements shrinks below 10 nm. Moreover, advanced architectures like gate-all-around field effect transistors (GAA FET) require even lower dielectric constants (k<2) at sub-3nm thickness. Here, we show that layer-by-layer grown multilayer amorphous carbon (ML-AC), as thin as 0.8 nm, is a mechanically robust 2D ULK dielectric with k of 1.35 and dielectric strength of 28-31 MV cm-1. The lack of any long-range order, its intrinsic 2D nature, sp2 carbon character and low density are all essential for minimising dielectric permittivity. Moreover, ML-AC overcomes the vulnerability of existing dielectrics to ion diffusion degradation with a record metal ion diffusion time to failure (TTF) of 10^10 s for even a single layer. Therefore, otherwise necessary additional layers occupying up to 3 nm can be eliminated, which is especially significant as metal line widths approach 10 nm. Combined with its low-temperature, direct and conformal growth even on a dielectric, these critical features enable substantial improvements in silicon-based semiconductor electronics and ensure compatibility with future 2D electronics.", "url": "https://arxiv.org/abs/2606.29729", "type": "理论", "summary": "二维（2D）材料在单层厚度下表现出优异的性能，并且随着尺寸逐渐接近原子极限，成为各种微电子元件的可行替代品。尽管正在进行的集成电路二维革命取得了重大进展，但一个关键的构建模块，即二维超低 k (ULK) 电介质，仍未得到报道。挑战在于实现小于 3 的介电常数，因为传统的低 k 电介质由于其非晶或多孔性质，在 2D 极限下本质上不稳定。还需要实现低 k 超薄电介质来解决当前集成电路尺寸缩小的瓶颈。具体来说，当导电元件之间的距离缩小到 10 nm 以下时，需要使用低 k 材料来最大限度地减少寄生电容。此外，诸如环栅场效应晶体管 (GAA FET) 等先进架构在厚度低于 3nm 时需要更低的介电常数 (k<2)。在这里，我们证明了薄至 0.8 nm 的逐层生长的多层非晶碳 (ML-AC) 是一种机械坚固的 2D ULK 电介质，k 为 1.35，介电强度为 28-31 MV cm-1。\n\n缺乏任何长程有序、其固有的二维性质、sp2碳特征和低密度对于最小化介电常数都是至关重要的。此外，ML-AC 克服了现有电介质对离子扩散退化的脆弱性，即使单层金属离子扩散失效时间 (TTF) 也达到创纪录的 10^10 秒。因此，可以消除占用高达 3 nm 的必要附加层，这在金属线宽度接近 10 nm 时尤其重要。结合其即使在电介质上也能进行​​的低温、直接和保形生长，这些关键特性使得硅基半导体电子器件能够得到显着改进，并确保与未来二维电子器件的兼容性。", "authors": [{"name": "Chee-Tat Toh"}, {"name": "Artem K. Grebenko"}, {"name": "Ugur Karadeniz"}, {"name": "Usha Bhat"}, {"name": "Ya He"}, {"name": "Hongji Zhang"}, {"name": "Denis V. Vyalikh"}, {"name": "Anna Makarova"}, {"name": "Alexander Fedorov"}, {"name": "Alena A. Alekseeva"}, {"name": "Kostya Iakoubovskii"}, {"name": "Lu Shi"}, {"name": "Andrei Starkov"}, {"name": "Chuan Chu Tee"}, {"name": "Lucas M. Sassi"}, {"name": "Michel Bosman"}, {"name": "Naoto Kamiuchi"}, {"name": "Yuta Sato"}, {"name": "Kazutomo Suenaga"}, {"name": "Barbaros Oezyilmaz"}], "featured_authors": [{"name": "Chee-Tat Toh"}, {"name": "Artem K. Grebenko"}, {"name": "Ugur Karadeniz"}, {"name": "Yuta Sato"}, {"name": "Kazutomo Suenaga"}, {"name": "Barbaros Oezyilmaz"}], "author_count": 20}, {"id": "2606.29751", "category": "cond-mat", "title": "Finite-resolution exhaustive traversal of thermodynamic state spaces has divergent thermodynamic length", "abstract": "Continuous space-filling maps can be surjective onto higher-dimensional regions, but thermodynamic protocols are rectifiable finite-resolution paths. We study exhaustive traversal of a compact $d$-dimensional thermodynamic state-space window $(\\mathcal{M},g)$ by curves $H_\\varepsilon$ whose images are $\\varepsilon$-dense in intrinsic distance. A standard covering/tube estimate gives $L_g[H_\\varepsilon]\\ge C_g\\varepsilon^{1-d}-O(\\varepsilon)$ for every regular $d>1$ window. The geometry is classical; the contribution is to turn it into an operational resource law for thermodynamic coverage. When the physical friction tensor $\\zeta$ coincides with, or uniformly dominates, the coverage metric $g$, Cauchy--Schwarz for the quadratic slow-driving action gives $W_{\\rm ex}^{(2)}\\ge L_\\zeta^2/\\tau=\\Omega(\\varepsilon^{2(1-d)}/\\tau)$. Equivalently, at fixed quadratic excess-work budget, maintaining slow driving requires $\\tau=\\Omega(\\varepsilon^{2(1-d)})$. We derive microscopic friction metrics for a detailed-balance three-state Markov jump process, $\\zeta_{ij}=(\\beta/\\gamma)(\\pi_i\\delta_{ij}-\\pi_i\\pi_j)$, and for an overdamped harmonic trap, $\\mathrm d\\ell_\\zeta^2=\\mu^{-1}\\mathrm da^2+(4\\beta\\mu k^3)^{-1}\\mathrm dk^2$. In the trap, a raster scan gives $L_\\zeta\\sim\\Delta_g^{-1}$ and fixed-time $W_{\\rm ex}^{(2)}\\sim\\Delta_g^{-2}$, while fixed dwell time shifts the cost to acquisition time. A laboratory or simulation floor cuts off the
