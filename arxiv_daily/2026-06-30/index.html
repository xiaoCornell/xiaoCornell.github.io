"Si-Lu Zhao"}, {"name": "Yan-Jun Liu"}, {"name": "Xiao-Hui Song"}, {"name": "Kai Xu"}, {"name": "Zhong-Cheng Xiang"}, {"name": "Dong-Ning Zheng"}, {"name": "Heng Fan"}], "featured_authors": [{"name": "Xiang Li"}, {"name": "Zheng-Yang Mei"}, {"name": "Yang He"}, {"name": "Zhong-Cheng Xiang"}, {"name": "Dong-Ning Zheng"}, {"name": "Heng Fan"}], "author_count": 10}, {"id": "2606.29487", "category": "quant-ph", "title": "Concentration of Measure Phenomena for Quantum States on a Higher Dimensional Equator", "abstract": "We revisit Lévy's lemma, a widely used analytical tool in quantum information theory. Concentration inequalities quantify the phenomenon in which Lipschitz observables concentrate around a median or mean, and serve as fundamental analytical tools across information theory, statistical physics, and learning theory. In particular, Lévy's lemma provides a crucial framework for describing functionals on pure quantum states, with applications in quantum entanglement and quantum statistical query learning. In this work, we isolate the hyper-equatorial part of the standard spherical concentration argument. The resulting estimate is a Lévy-type bound for Lipschitz functions on a fixed hyperequator, with the natural dimension parameter $d-1$. We also formulate the accompanying geometric localization in terms of neighborhoods of the boundary, hyperequator, and a codimension-two antipodal great subsphere. This viewpoint clarifies the structure of the usual proof and points to the measure-theoretic formulation needed for sharper constant-level statements.", "url": "https://arxiv.org/abs/2606.29487", "type": "理论", "summary": "我们重新审视莱维引理，这是量子信息论中广泛使用的分析工具。集中不等式量化了利普希茨可观测值集中在中位数或均值附近的现象，并作为信息论、统计物理学和学习理论的基本分析工具。特别是，莱维引理为描述纯量子态泛函提供了一个重要的框架，并在量子纠缠和量子统计查询学习中得到应用。在这项工作中，我们分离出了标准球面浓度论证的超赤道部分。得到的估计是固定超赤道上 Lipschitz 函数的 Lévy 型界限，自然维度参数为 $d-1$。我们还根据边界、超赤道和余维二对映大亚球面的邻域制定了伴随的几何定位。这种观点澄清了通常证明的结构，并指出了更清晰的恒定水平陈述所需的测度论公式。", "authors": [{"name": "Kabgyun Jeong"}], "featured_authors": [{"name": "Kabgyun Jeong"}], "author_count": 1}, {"id": "2606.29562", "category": "quant-ph", "title": "The QAOA on the ring of disagrees", "abstract": "We study the performance of symmetric local algorithms finding large cuts on the cycle graph. Such algorithms that cannot see the whole graph at depth p cut at most a (2p+1)/(2p+2) fraction of edges in expectation. We prove that the QAOA achieves this value, a long-standing conjecture of Farhi, Goldstone, and Gutmann. Curiously we do this without finding the optimal parameters. Instead we show it is equivalent to find an optimal pair of Laurent polynomials of degree at most 2p-1. This is made possible by recasting the QAOA on one qubit in the language of quantum signal processing.", "url": "https://arxiv.org/abs/2606.29562", "type": "数值", "summary": "我们研究了在循环图上寻找大切口的对称局部算法的性能。这种无法看到深度 p 处的整个图的算法最多可以切割期望的 (2p+1)/(2p+2) 部分边。我们证明 QAOA 实现了这一价值，这是 Farhi、Goldstone 和 Gutmann 长期以来的猜想。奇怪的是，我们这样做时并没有找到最佳参数。相反，我们证明它相当于找到一对次数最多为 2p-1 的最佳洛朗多项式。这是通过用量子信号处理语言在一个量子位上重新构建 QAOA 来实现的。", "authors": [{"name": "Kunal Marwaha"}], "featured_authors": [{"name": "Kunal Marwaha"}], "author_count": 1}, {"id": "2606.29610", "category": "quant-ph", "title": "Physics-Informed Neural Quantum Control for Extended Rovibrational Photoassociation in a Morse Molecular System", "abstract": "We present a Physics-Informed Neural Quantum Control (PINQC) framework for rovibrational photoassociation in a Morse molecular system. The proposed method combines neural-network-based laser-field generation with differentiable quantum propagation, allowing optimized laser pulses to be obtained directly from the underlying quantum dynamics without requiring external training data. The optimized control fields efficiently transfer an initially continuum-like Gaussian wave packet into the vibrational ground-state level, promoting continuum-to-bound population transfer through coherent rovibrational dynamics. The resulting photoassociation process involves both vibrational stabilization and rotational redistribution arising naturally from dipole-induced couplings between neighboring rotational channels. A central result of the present work is the successful application of the PINQC framework to extended rovibrational models containing larger rotational levels than those previously accessible in our conventional photoassociation calculations. The optimization remains numerically stable despite the increased complexity of the molecular system, demonstrating that differentiable optimization provides an effective strategy for treating rovibrational models of increased dimensionality. These results establish the PINQC framework as a promising computational tool for molecular photoassociation and motivate future investigations of increasingly complex rovibrational quantum-control problems.", "url": "https://arxiv.org/abs/2606.29610", "type": "理论+数值", "summary": "我们提出了一种用于莫尔斯分子系统中振动光缔合的物理信息神经量子控制（PINQC）框架。所提出的方法将基于神经网络的激光场生成与可微分的量子传播相结合，允许直接从底层量子动力学获得优化的激光脉冲，而无需外部训练数据。优化的控制场有效地将最初的连续体高斯波包转移到振动基态水平，通过相干振动动力学促进连续体到束缚粒子的转移。由此产生的光缔合过程涉及振动稳定和旋转重新分布，这些振动稳定和旋转重新分布是由相邻旋转通道之间的偶极子诱导耦合自然产生的。目前工作的一个核心成果是 PINQC 框架成功应用于扩展旋转模型，该模型包含比以前在传统光缔合计算中可访问的旋转水平更大的旋转水平。\n\n尽管分子系统的复杂性增加，但优化在数值上保持稳定，这表明可微优化为处理维数增加的振动模型提供了有效的策略。这些结果使 PINQC 框架成为一种有前景的分子光缔合计算工具，并激发了未来对日益复杂的振动量子控制问题的研究。", "authors": [{"name": "Murilo D. Forlevesi"}, {"name": "Emanuel Fernandes de Lima"}, {"name": "Edson Denis Leonel"}], "featured_authors": [{"name": "Murilo D. Forlevesi"}, {"name": "Emanuel Fernandes de Lima"}, {"name": "Edson Denis Leonel"}], "author_count": 3}, {"id": "2606.29616", "category": "quant-ph", "title": "Gaussian Quantum Metrology with Realistic Linear Sensors", "abstract": "Quantum sensing promises enhanced precision, but the usual quantum Cramer Rao bound can be too optimistic for realistic linear sensors, where squeezing, filtering, and loss reshape quantum noise. We derive the tight Holevo Cramer Rao bound and show that realistic degradation yields a hierarchy with the usual bound and homodyne readout. This hierarchy already exists in gravitational-wave detectors. We propose a hardware-efficient readout that reaches the Holevo bound without extra signal loss, increasing compact-binary detection rates by up to 25% over the present LIGO homodyne readout.", "url": "https://arxiv.org/abs/2606.29616", "type": "理论", "summary": "量子传感有望提高精度，但通常的量子 Cramer Rao 界限对于现实的线性传感器来说可能过于乐观，在线性传感器中，压缩、过滤和损耗重塑了量子噪声。我们推导了紧密的 Holevo Cramer Rao 界限，并表明实际退化会产生具有通常界限和零差读数的层次结构。这种层次结构已经存在于引力波探测器中。我们提出了一种硬件高效的读数，可以在没有额外信号损失的情况下达到 Holevo 界限，与现有的 LIGO 零差读数相比，紧凑二进制检测率提高了 25%。", "authors": [{"name": "Jacques Ding"}, {"name": "James W. Gardner"}, {"name": "Tuvia Gefen"}, {"name": "Yanbei Chen"}], "featured_authors": [{"name": "Jacques Ding"}, {"name": "James W. Gardner"}, {"name": "Tuvia Gefen"}, {"name": "Yanbei Chen"}], "author_count": 4}, {"id": "2606.29617", "category": "quant-ph", "title": "Dynamics of quantum entanglement in two time-dependent coupled harmonic oscillators", "abstract": "We investigate the quantum entanglement dynamics of two coupled harmonic oscillators with a time-dependent interaction. Using the Lewis-Riesenfeld invariant method, we derive the exact analytical wave functions without any perturbative or adiabatic approximations and combine this with a phase-space analysis using the Wigner function to provide a complete description of the system's quantum state evolution. We obtain general expression form for the purity and the linear entropy $S_L=1-\\mathcal{P}$ for arbitrary excitation numbers $(n,m)$, allows a systematic study of entanglement for a large class of quantum states. We show that the entanglement dynamics is very sensitive to the interplay between the detuning parameters $\\theta$ and $\\vartheta_2$, the frequency parameter $\\beta_0$ and the coupling strength $\\epsilon$: the increase of detuning takes the system from slow irregular oscillations to fast and regular periodic behavior, and the stronger coupling systematically enhances both the amplitude and the average value of the linear entropy. Most importantly, for the resonance case $\\omega_1=\\omega_2=1$ and strong couplings $\\epsilon \\approx 0.99$, the system shows robust undamped synchronized periodic oscillations of the linear entropy for all quantum states considered, indicating preserved quantum coherence without saturation. Our findings demonstrate that linear entropy is a sensitive and practical entanglement witness, and we establish explicit analytical relations between the coupling parameters of the system and its entanglement properties, which are directly relevant to quantum information processing and the control of quantum correlations in continuous-variable systems.", "url": "https://arxiv.org/abs/2606.29617", "type": "理论+数值", "summary": "我们研究了两个具有时间依赖性相互作用的耦合谐振子的量子纠缠动力学。使用刘易斯-里森菲尔德不变法，我们在没有任何微扰或绝热近似的情况下推导了精确的解析波函数，并将其与使用维格纳函数的相空间分析相结合，以提供系统量子态演化的完整描述。我们获得了任意激发数 $(n,m)$ 的纯度和线性熵 $S_L=1-\\mathcal{P}$ 的通用表达式形式，允许对一大类量子态的纠缠进行系统研究。我们表明，纠缠动力学对失谐参数 $\\theta$ 和 $\\vartheta_2$、频率参数 $\\beta_0$ 和耦合强度 $\\epsilon$ 之间的相互作用非常敏感：失谐的增加使系统从缓慢的不规则振荡转变为快速且规则的周期性行为，更强的耦合系统地增强了线性熵的幅度和平均值。\n\n最重要的是，对于共振情况 $\\omega_1=\\omega_2=1$ 和强耦合 $\\epsilon \\approx 0.99$，系统显示出所有考虑的量子态的线性熵的鲁棒无阻尼同步周期性振荡，这表明在不饱和的情况下保留了量子相干性。我们的研究结果表明，线性熵是一种敏感且实用的纠缠见证，我们在系统的耦合参数与其纠缠性质之间建立了明确的分析关系，这与连续变量系统中的量子信息处理和量子相关性的控制直接相关。", "authors": [{"name": "Ayoub Ghaba"}, {"name": "Radouan Hab-arrih"}, {"name": "Elhoussine Atmani"}, {"name": "Abdallah Slaoui"}], "featured_authors": [{"name": "Ayoub Ghaba"}, {"name": "Radouan Hab-arrih"}, {"name": "Elhoussine Atmani"}, {"name": "Abdallah Slaoui"}], "author_count": 4}, {"id": "2606.29624", "category": "quant-ph", "title": "Bright-mode parity synthesis for bosonic state transfer through a single ancilla", "abstract": "Bosonic modes provide hardware-efficient quantum memories and logical registers, including highly non-Gaussian encoded states, but transferring finite-dimensional bosonic states through a restricted ancilla interface requires identifying which collective mode is actually controlled. We study a restricted setting in which two oscillators couple with opposite signs to a single two-level ancilla. In the normal-mode basis, the symmetric mode is dark, while transfer between the physical modes is equivalent to synthesizing parity on the antisymmetric bright mode. This reduction gives exact finite-sum transfer formulas for Fock states, Fock-state qubits, and finite Fock superpositions, and explains why resonant single-ancilla transfer is recurrence-limited beyond the single-photon sector. We then show that detuned Jaynes--Cummings evolution provides a native two-parameter route to high-fidelity finite-cutoff parity synthesis, with residual ancilla excitation, calibration sensitivity, and a minimal Markovian noise estimate quantified separately. Bosonic-code examples illustrate how transfer sensitivity is governed by photon-number support and residual bright-mode phase errors. The result provides a practical benchmark and organizing principle for constrained ancilla-mediated bosonic transfer when direct exchange is unavailable or undesirable.", "url": "https://arxiv.org/abs/2606.29624", "type": "理论", "summary": "玻色子模式提供了硬件高效的量子存储器和逻辑寄存器，包括高度非高斯编码状态，但通过受限的辅助接口传输有限维玻色子状态需要确定实际控制的是哪种集体模式。我们研究了一种受限设置，其中两个具有相反符号的振荡器与单个两级辅助耦合。在普通模式的基础上，对称模式是暗模式，而物理模式之间的传递相当于在反对称亮模式上合成奇偶校验。这种简化给出了福克状态、福克状态量子位和有限福克叠加的精确有限和传递公式，并解释了为什么共振单辅助传递在单光子扇区之外是重复限制的。然后，我们证明失谐的 Jaynes-Cummings 演化提供了一种高保真有限截止奇偶校验合成的原生双参数途径，其中残余辅助激励、校准灵敏度和最小马尔可夫噪声估计分别量化。玻色子代码示例说明了传递灵敏度如何由光子数支持和残余亮模式相位误差控制。\n\n当直接交换不可用或不可取时，该结果为受限辅助介导的玻色子转移提供了实用的基准和组织原则。", "authors": [{"name": "Pradip Laha"}, {"name": "Peter van Loock"}], "featured_authors": [{"name": "Pradip Laha"}, {"name": "Peter van Loock"}], "author_count": 2}, {"id": "2606.29636", "category": "quant-ph", "title": "Lie Group Diffusion Models for Hardware-Aware Quantum Circuit Synthesis", "abstract": "An important task in quantum computing is unitary circuit synthesis compatible with physical hardware constraints. This problem has a natural hybrid structure as local single-qubit gates are continuous variables on the Lie group $SU(2)$ while the entangling circuit structure is discrete and hardware-dependent. In this work, we use generative models to perform quantum circuit synthesis incorporating both the natural $SU(2)$ manifold geometry of quantum gates and hardware constraints that determine the overall circuit structure. Our model comprises two components: a circuit skeleton selector that chooses an entangling circuit and a diffusion model that generates quantum gates on the given circuit template by performing diffusion on the curved manifold $\\mathrm{SU(2)} \\simeq S^3$ itself. We demonstrate this approach with unitary compilation of physically motivated three-qubit Hamiltonian simulation targets such as the Transverse Field Ising Model and the Heisenberg-XXZ Model and show that Lie group diffusion outperforms comparable baselines. The synthesised circuits can also be customised subject to constraints, which we demonstrate by producing circuits with large and small gate rotation angles for the same target unitary evolution. We also investigate the fidelity-complexity frontier of the synthesised gates to demonstrate that the circuit selector learns to select circuits that balance fidelity with complexity rather than collapsing onto the most expansive entangling template. These results demonstrate that Lie group diffusion provides a natural generative framework for hardware-aware quantum circuit synthesis.", "url": "https://arxiv.org/abs/2606.29636", "type": "理论+数值", "summary": "量子计算的一项重要任务是与物理硬件限制兼容的酉电路综合。该问题具有自然的混合结构，因为局部单量子位门是李群 $SU(2)$ 上的连续变量，而纠缠电路结构是离散的且依赖于硬件。在这项工作中，我们使用生成模型来执行量子电路合成，结合了量子门的自然 $SU(2)$ 流形几何结构和确定整体电路结构的硬件约束。我们的模型包含两个组件：一个选择纠缠电路的电路骨架选择器和一个扩散模型，该扩散模型通过在弯曲流形 $\\mathrm{SU(2)} \\simeq S^3$ 本身上执行扩散来在给定的电路模板上生成量子门。我们通过物理驱动的三量子位哈密顿模拟目标（例如横向场 Ising 模型和 Heisenberg-XXZ 模型）的统一编译来演示这种方法，并表明李群扩散优于可比较的基线。\n\n合成电路还可以在约束条件下进行定制，我们通过为同一目标酉进化生成具有大和小门旋转角度的电路来证明这一点。我们还研究了合成门的保真度-复杂度边界，以证明电路选择器学会选择平衡保真度与复杂性的电路，而不是崩溃到最广泛的纠缠模板上。这些结果表明，李群扩散为硬件感知的量子电路合成提供了一个自然的生成框架。", "authors": [{"name": "Jyotirmai Singh"}], "featured_authors": [{"name": "Jyotirmai Singh"}], "author_count": 1}, {"id": "2606.29647", "category": "quant-ph", "title": "Hybrid Quantum Neighborhood Selection: NISQ-Compatible Combinatorial Optimization via Stochastic Frontier Decomposition", "abstract": "Large-scale combinatorial optimization is a challenge for near-term quantum computing because dense Quadratic Unconstrained Binary Optimization (QUBO) formulations yield interaction graphs that exceed the limits of NISQ processors. This work introduces Hybrid Quantum Neighborhood Selection (HQNS), a hybrid framework mitigating this via stochastic frontier decomposition. Instead of encoding all N variables into a monolithic circuit, HQNS selects a compact frontier of F << N active variables per stage, freezing the rest into reduced QUBO coefficients. A multi-stage crawling procedure rotates these frontiers, letting local quantum subproblems refine a global solution. We evaluate HQNS on the Maximum Diversity Subset Selection Problem (MDSSP) across six scales, N up to 1000. Circuit burden is reduced from the dense QAOA requirement of O(N^2) two-qubit terms per layer to O(F^2) per stage, with total complexity governed by the number of stages and classical overhead. Benchmarks show that HQNS achieves competitive solution quality relative to parallel simulated annealing (SA) while maintaining bounded circuit width and stable QPU time. In the N=1000 benchmark over ten executions, HQNS preserves 99.9908% of the mean diversity score of an 11-restart parallel SA baseline, while reducing wall-clock time by 65.03%, peak CPU usage by 55.97%, and peak memory by 35.21%. Ablation shows performance depends on frontier size, warm-starts, CVaR filtering, and stochastic rotation. These results demonstrate that structured frontier decomposition makes variational optimization executable for dense QUBO instances unsuitable for direct QAOA on present hardware.", "url": "https://arxiv.org/abs/2606.29647", "type": "理论+数值", "summary": "大规模组合优化对近期量子计算来说是一个挑战，因为密集的二次无约束二元优化 (QUBO) 公式产生的交互图超出了 NISQ 处理器的限制。这项工作引入了混合量子邻域选择（HQNS），这是一种通过随机前沿分解来缓解这一问题的混合框架。 HQNS 不是将所有 N 个变量编码到单片电路中，而是在每级选择 F << N 个活动变量的紧凑前沿，将其余变量冻结为简化的 QUBO 系数。多阶段爬行程序旋转这些边界，让局部量子子问题完善全局解决方案。我们在六个尺度（N 至 1000）的最大多样性子集选择问题 (MDSSP) 上评估 HQNS。电路负担从每层 O(N^2) 个两个量子位项的密集 QAOA 要求减少到每级 O(F^2)，总复杂度由级数和经典开销决定。基准测试表明，HQNS 相对于并行模拟退火 (SA) 实现了具有竞争力的解决方案质量，同时保持有界电路宽度和稳定的 QPU 时间。\n\n在超过 10 次执行的 N=1000 基准测试中，HQNS 保留了 11 次重启并行 SA 基线的平均多样性得分的 99.9908%，同时将挂钟时间减少了 65.03%，峰值 CPU 使用率减少了 55.97%，峰值内存减少了 35.21%。 Ablation 显示性能取决于边界大小、热启动、CVaR 过滤和随机旋转。这些结果表明，结构化前沿分解使得变分优化可以针对密集的 QUBO 实例执行，不适合在当前硬件上直接进行 QAOA。", "authors": [{"name": "Nicolas Mendes de Araujo"}, {"name": "Lester de Abreu Faria"}], "featured_authors": [{"name": "Nicolas Mendes de Araujo"}, {"name": "Lester de Abreu Faria"}], "author_count": 2}, {"id": "2606.29687", "category": "quant-ph", "title": "A Machine-Verified Proof of a Quantum-Optimization Conjecture", "abstract": "We report a machine-verified resolution of a problem open for over a decade in quantum optimization: the Farhi, Goldstone and Gutmann (FGG) conjecture that depth-$p$ Quantum Approximate Optimization Algorithm (QAOA) on the ring of disagrees attains approximation ratio $(2p+1)/(2p+2)$ exactly. We found the proof using a large language model, Claude Fable 5, and verified its correctness end-to-end by the Lean 4 proof assistant. Our methodology includes several ingredients: building on a substantial Lean library of quantum information, we formalized the QAOA components and the known parts of the problem, and reduced the conjecture to a single open mathematical statement. The model was then handed the library and our agentic toolkit, and tasked with closing that gap by constructing a proof in Lean. The resulting process is a feedback loop between the model's natural-language reasoning and Lean's mechanical verification, which converged to a machine-verified proof. Human verification is required only for the structural scaffolding - that the formal statement faithfully encodes the intended claim - while the proof itself is supplied by the model and certified mechanically by Lean. The proof is nevertheless striking - the model uncovered a hidden dynamical symmetry of the problem and exploited it, borrowing tools and machinery from an adjacent field to turn a hard existence problem into an explicit construction. This work paves the way for resolving open conjectures in quantum information science and beyond.", "url": "https://arxiv.org/abs/2606.29687", "type": "理论+数值", "summary": "我们报告了量子优化中十多年来悬而未决的问题的机器验证解决方案：Farhi、Goldstone 和 Gutmann (FGG) 猜想，不同意环上的深度 $p$ 量子近似优化算法 (QAOA) 准确地达到了近似比率 $(2p+1)/(2p+2)$。我们使用大型语言模型 Claude Fable 5 找到了证明，并通过 Lean 4 证明助手端到端验证了其正确性。我们的方法包括几个要素：在大量精益量子信息库的基础上，我们将 QAOA 组件和问题的已知部分形式化，并将猜想简化为单个开放的数学陈述。然后将该模型交给库和我们的代理工具包，并负责通过在精益中构建证明来缩小这一差距。由此产生的过程是模型的自然语言推理和精益机械验证之间的反馈循环，最终收敛为机器验证的证明。仅结构脚手架需要人工验证 - 正式声明忠实地编码预期的声明 - 而证据本身由模型提供并由精益机械认证。\n\n尽管如此，证据还是引人注目的——该模型发现了问题的隐藏动态对称性并加以利用，借用了相邻领域的工具和机械，将困难的存在问题转化为显式的构造。这项工作为解决量子信息科学及其他领域的开放猜想铺平了道路。", "authors": [{"name": "Uri Kol"}, {"name": "Maor Ben-Shahar"}, {"name": "Kfir Sulimany"}, {"name": "Dirk Englund"}], "featured_authors": [{"name": "Uri Kol"}, {"name": "Maor Ben-Shahar"}, {"name": "Kfir Sulimany"}, {"name": "Dirk Englund"}], "author_count": 4}, {"id": "2606.29739", "category": "quant-ph", "title": "Quantum complexity resource in Gaussian boson sampling: Core structure of the semidefinite program", "abstract": "We present a rigorous analysis of the algebraic and geometric structure of the quantum complexity resource of a system of bosonic modes in Gaussian boson sampling. This resource underlies the quantum advantage of the system: its photon-counting statistics require the evaluation of a hafnian of the resource covariance matrix, and that computation is #P-hard. The resource covariance matrix is the solution of a semidefinite program that extracts the minimum-trace physical quantum part of the total covariance matrix; the complementary part is positive semidefinite and can therefore be simulated classically. Earlier work characterized this resource only through the trace of the quantum part, equal to its photon number. We characterize the optimizer itself, as a quantum state and as a geometric object, beyond the scalar given by its trace. We prove that it is a unique pure Gaussian state and construct an explicit oracle map, obeying an algebraic Riccati identity, that reconstructs the resource. We prove that the full problem compresses exactly onto the active symplectic sector that the dual program support generates. The passive-diagonalizable states are solved in closed form, the first explicit solvable class, and the whole program is shown to be equivalent to a minimization over the symplectic group, that is, over the Siegel upper half-space. Together these results establish that the program determines a canonical localized pure Gaussian component of the resource, and they provide the structural foundation for its detailed analysis.", "url": "https://arxiv.org/abs/2606.29739", "type": "理论+数值", "summary": "我们对高斯玻色子采样中玻色子模式系统的量子复杂性资源的代数和几何结构进行了严格分析。该资源是系统量子优势的基础：其光子计数统计数据需要评估资源协方差矩阵的哈夫尼矩阵，并且该计算是#P-hard的。资源协方差矩阵是半定程序的解，该半定程序提取总协方差矩阵的最小迹物理量子部分；互补部分是半正定的，因此可以进行经典模拟。早期的工作仅通过量子部分的踪迹（等于其光子数）来表征这种资源。我们将优化器本身描述为量子态和几何对象，超出其轨迹给出的标量。我们证明它是一个独特的纯高斯状态，并构造一个显式的预言图，遵循代数 Riccati 恒等式，重建资源。我们证明整个问题精确地压缩到双程序支持生成的活动辛扇区上。\n\n被动可对角态以封闭形式求解，这是第一个显式可解类，并且整个程序被证明等效于辛群上的最小化，即西格尔上半空间上的最小化。这些结果共同表明该程序确定了资源的规范局部纯高斯分量，并且它们为其详细分析提供了结构基础。", "authors": [{"name": "Kunwar Kalra"}, {"name": "Vitaly Kocharovsky"}], "featured_authors": [{"name": "Kunwar Kalra"}, {"name": "Vitaly Kocharovsky"}], "author_count": 2}, {"id": "2606.29764", "category": "quant-ph", "title": "Coherent manipulation of the biphoton generation in cavity-QED system", "abstract": "We theoretically investigate the coherent manipulation of biphoton generation via spontaneous four-wave mixing in a cavity-QED system with a single atom. The atom is driven by pumping, coupling, and driving fields, and the generation of the Stokes and anti-Stokes photons are enhanced by two cavities. By solving the master equation in the steady state, we analyze the spectral brightness, as well as the degree of the auto-correlation and cross-correlation. Our results show that when the pumping and driving fields are in two-photon resonance, the dark state established between the ground and Rydberg states. efficiently enhances the controllability of the driving field over the biphoton generation and the quantum statistics. In contrast, under large two-photon detuning, the control capability of the driving field is significantly reduced. The coupling field, which directly relates to the electromagnetically induced transparency, modifies the linewidth of the biphoton, while the atom-cavity coupling strength only changes the brightness without affecting the linewidth.", "url": "https://arxiv.org/abs/2606.29764", "type": "理论", "summary": "我们从理论上研究了通过单原子腔 QED 系统中的自发四波混频对双光子产生的相干操纵。原子由泵浦、耦合和驱动场驱动，并且两个空腔增强了斯托克斯和反斯托克斯光子的产生。通过求解稳态主方程，分析了光谱亮度以及自相关和互相关的程度。我们的结果表明，当泵浦场和驱动场处于双光子共振时，在基态和里德伯态之间建立暗态。有效增强了双光子产生和量子统计的驱动场的可控性。相反，在大的双光子失谐下，驱动场的控制能力显着降低。耦合场与电磁感应透明度直接相关，会改变双光子的线宽，而原子腔耦合强度仅改变亮度而不影响线宽。", "authors": [{"name": "Jia-Ni Yang"}, {"name": "Xin-Yi Ling"}, {"name": "Yuan Feng"}, {"name": "Xiao-Jun Zhang"}, {"name": "Jin-Hui Wu"}], "featured_authors": [{"name": "Jia-Ni Yang"}, {"name": "Xin-Yi Ling"}, {"name": "Yuan Feng"}, {"name": "Xiao-Jun Zhang"}, {"name": "Jin-Hui Wu"}], "author_count": 5}, {"id": "2606.29770", "category": "quant-ph", "title": "Krylov Complexity in Non-Inertial Quantum Systems", "abstract": "In this work, we formulate the Krylov complexity in non-In an inertial quantum system, the direct emergence of the $SU(1,1)$ sector from the Klein-Gordon symplectic form dictates that the Rindler pair-number sector naturally forms the Krylov basis for uniformly accelerating observers. Under this construction, we generalize the Bogoliubov coefficients by exploiting the $SU(1,1)$ group-structured Hamiltonian. Within this framework, we explicitly derive that the Krylov complexity is exactly equal to the mean number of correlated Rindler pairs generated via Bogoliubov mixing. Furthermore, the competition between the detuning parameter and the pair-production parameter in the Hamiltonian separates the dynamics into three distinct regimes: hyperbolic Krylov spreading, critical growth, and bounded Krylov-space motion. Notably, in the detuning-dominated regime, the pair-number distribution remains exponentially confined to low Krylov levels, implying that the wave packet becomes trapped at low levels, which manifests as the localization of Krylov complexity. Ultimately, our work sheds new light on the structural construction of Krylov complexity in non-inertial quantum systems.", "url": "https://arxiv.org/abs/2606.29770", "type": "理论", "summary": "在这项工作中，我们制定了非惯性量子系统中的克雷洛夫复杂度，从克莱因-戈登辛形式直接出现 $SU(1,1)$ 扇区表明林德勒对数扇区自然地形成了均匀加速观察者的克雷洛夫基础。在此构造下，我们通过利用 $SU(1,1)$ 群结构哈密顿量来推广 Bogoliubov 系数。在此框架内，我们明确推导出 Krylov 复杂度恰好等于通过 Bogoliubov 混合生成的相关 Rindler 对的平均数量。此外，哈密顿量中失谐参数和配对产生参数之间的竞争将动力学分为三种不同的状态：双曲克雷洛夫扩散、临界增长和有界克雷洛夫空间运动。值得注意的是，在失谐主导的情况下，对数分布仍然以指数方式限制在低克雷洛夫能级，这意味着波包被困在低能级，这表现为克雷洛夫复杂度的局部化。最终，我们的工作为非惯性量子系统中克雷洛夫复杂性的结构构建提供了新的线索。", "authors": [{"name": "Ming-Qi Ma"}, {"name": "Shi-Cheng Liu"}, {"name": "Lei-Hua Liu"}, {"name": "Hai-Qing Zhang"}], "featured_authors": [{"name": "Ming-Qi Ma"}, {"name": "Shi-Cheng Liu"}, {"name": "Lei-Hua Liu"}, {"name": "Hai-Qing Zhang"}], "author_count": 4}, {"id": "2606.29804", "category": "quant-ph", "title": "Infrared Safety from ZX-Diagrams: A Categorical Proof of Soft-QED as Open Quantum System", "abstract": "The discard ZX-calculus, a diagrammatic language for mixed-state quantum mechanics, is used to give a nonperturbative, categorical proof of the Bloch-Nordsieck cancellation of infrared divergences in QED. Soft photons are treated as an open quantum system: the resolved charged particles and hard photons form the system, while photons below a detector resolution form the environment. The reduced hard channel is a completely positive trace-preserving (CPTP) map, and the soft-photon theorem replaces the full S-matrix by a controlled displacement operator whose Feynman-Vernon influence functional satisfies the equal-history normalization ${\\cal F}[J,J]=1 $. In the ZX-calculus, this normalization is a single diagrammatic identity: the doubled displacement diagram collapses to the bare wire under the unitarity, cyclicity, and discard rules. The proof therefore serves as a categorical consistency check on the open-system treatment of soft QED given in a companion paper; it confirms that the physical derivation is logically complete and free of hidden assumptions about the infrared limit. For off-diagonal hard-state elements, the same diagram yields the coherent-state overlap, giving a first-principles account of soft-cloud decoherence. The soft-shell coarse graining is then constructed as a CPTP Schur channel whose infinitesimal limit produces the exact Lindblad generator with jump operators determined by the eikonal emission amplitudes. Finally, a local CPTP-certification pipeline is developed for non-Markovian process tensors, enabling constant-time verification of trace preservation in open quantum simulations. The framework bridges categorical quantum semantics, non-equilibrium field theory, and practical open-system compilation.", "url": "https://arxiv.org/abs/2606.29804", "type": "理论+数值", "summary": "废弃的 ZX 微积分是混合态量子力学的一种图解语言，用于给出 QED 中红外发散的 Bloch-Nordsieck 抵消的非微扰、绝对证明。软光子被视为开放量子系统：解析的带电粒子和硬光子形成系统，而低于探测器分辨率的光子形成环境。简化的硬通道是完全正的保迹（CPTP）图，软光子定理用受控位移算子代替完整的S矩阵，其Feynman-Vernon影响函数满足等历史归一化${\\cal F}[J,J]=1 $。在 ZX 微积分中，这种归一化是单个图解恒等式：在幺正性、循环性和丢弃规则下，双位移图折叠成裸线。因此，该证明可以作为对另一篇论文中给出的软 QED 开放系统处理的分类一致性检查；它证实了物理推导在逻辑上是完整的，并且没有关于红外极限的隐藏假设。\n\n对于非对角硬态元素，同一个图产生了相干态重叠，给出了软云退相干的第一原理解释。然后将软壳粗粒化构造为 CPTP Schur 通道，其无穷小极限产生精确的 Lindblad 发生器，其跳跃算子由 eikonal 发射幅度确定。最后，针对非马尔可夫过程张量开发了本地 CPTP 认证管道，从而能够在开放量子模拟中对迹线保存进行恒定时间验证。该框架连接了分类量子语义、非平衡场论和实用的开放系统编译。", "authors": [{"name": "Soo-Jong Rey"}], "featured_authors": [{"name": "Soo-Jong Rey"}], "author_count": 1}, {"id": "2606.29848", "category": "quant-ph", "title": "Quantum Eigenvalue Transformation via Linear Combination of Hamiltonian Simulation: A Weyl Calculus Approach", "abstract": "Linear combination of Hamiltonian simulation (LCHS) provides an efficient method for implementing matrix exponentials $e^{-tA}$ on quantum computers. In this paper, we develop LCHS formulas for computing general matrix functions $f(A)$ when $f$ is analytic on the numerical range of $A$, with $A$ possibly non-normal. The essential technical tool is Weyl calculus, which reduces the construction of LCHS formulas for noncommuting operators to scalar Fourier approximation problems. Our construction yields a quantum eigenvalue transformation algorithm with optimal $\\mathcal{O}(\\log\\frac{1}{\\epsilon})$ query complexity scaling. Furthermore, our Weyl-calculus-based theory gives rise to an ansatz-free convex optimization framework that directly produces discrete LCHS formulas. This circumvents the inefficiencies of traditional quadrature rules and yields formulas highly optimized for coherent implementation on quantum computers. In addition, both our theory and optimization framework apply to the simulation of time-dependent dissipative ODE $\\frac{\\mathrm{d}}{\\mathrm{d} t} \\psi(t) = -A(t)\\psi(t)$, for which we achieve a $2.1\\times$ cost reduction over prior art.", "url": "https://arxiv.org/abs/2606.29848", "type": "理论+数值", "summary": "哈密​​顿模拟的线性组合（LCHS）提供了一种在量子计算机上实现矩阵指数 $e^{-tA}$ 的有效方法。在本文中，我们开发了 LCHS 公式，用于计算通用矩阵函数 $f(A)$，当 $f$ 在 $A$ 的数值范围上解析时，$A$ 可能是非正规的。重要的技术工具是 Weyl 演算，它将非通勤算子的 LCHS 公式的构造简化为标量傅立叶逼近问题。我们的构造产生了一种量子特征值变换算法，具有最佳的 $\\mathcal{O}(\\log\\frac{1}{\\epsilon})$ 查询复杂度缩放。此外，我们基于 Weyl 演算的理论提出了一个无 ansatz 凸优化框架，可以直接生成离散 LCHS 公式。这规避了传统正交规则的低效率，并产生了针对量子计算机上的相干实现高度优化的公式。此外，我们的理论和优化框架都适用于时间相关耗散 ODE $\\frac{\\mathrm{d}}{\\mathrm{d} t} \\psi(t) = -A(t)\\psi(t)$ 的模拟，与现有技术相比，我们实现了 $2.1\\times$ 的成本降低。", "authors": [{"name": "Hongkang Ni"}, {"name": "Lexing Ying"}], "featured_authors": [{"name": "Hongkang Ni"}, {"name": "Lexing Ying"}], "author_count": 2}, {"id": "2606.29890", "category": "quant-ph", "title": "Preparation-Space Diagnostics and Logical Information Loss in a Driven Kerr-Cat Qubit", "abstract": "A Kerr-cat qubit encodes a logical bit in the two wells of a parametrically driven nonlinear oscillator, and a logic gate is a transient change of the drive. In the phase plane the gate deforms the double well and can split its separatrix into a turnstile that carries trajectories across the dividing surface between the wells; the same pulse, acting on the quantum oscillator, can corrupt the encoded bit. We study this process over a disk of coherent-state preparations, comparing classical phase-space transport diagnostics with the open-system quantum outcome on a common domain so that the two can be compared point by point. The central finding is that the corruption depends on the full temporal protocol, not on pulse strength alone: a sudden quench erases the bit, whereas a smooth ramp of the same peak amplitude largely preserves it. A finite-time sensitivity field locates the classical transport boundary, and a Loschmidt echo evaluated near the end of the gate predicts the much later quantum outcome. Sweeps of pulse amplitude and width, of cat size, and of engineered two-photon dissipation map where the classical transport picture predicts the quantum loss of the bit and where it does not.", "url": "https://arxiv.org/abs/2606.29890", "type": "理论+数值", "summary": "Kerr-cat 量子位在参数驱动的非线性振荡器的两个阱中编码逻辑位，逻辑门是驱动的瞬态变化。在相平面中，门使双阱变形，并且可以将其分界线分割成十字转门，该十字转门携带轨迹穿过阱之间的分割表面；作用在量子振荡器上的相同脉冲可能会破坏编码位。我们在相干态制剂盘上研究这个过程，将经典相空间传输诊断与公共域上的开放系统量子结果进行比较，以便可以对两者进行逐点比较。核心发现是，损坏取决于完整的时间协议，而不仅仅是脉冲强度：突然的猝灭会擦除该位，而相同峰值幅度的平滑斜坡很大程度上会保留它。有限时间敏感场定位经典输运边界，在门末端附近评估的洛施密特回波预测更晚的量子结果。\n\n扫描脉冲幅度和宽度、猫的大小以及工程双光子耗散图，其中经典传输图可以预测比特的量子损失，而不能预测。", "authors": [{"name": "Stephen Wiggins"}], "featured_authors": [{"name": "Stephen Wiggins"}], "author_count": 1}, {"id": "2606.29974", "category": "quant-ph", "title": "Temporal modes of quantum states of light scattered by a two-level system", "abstract": "Non-Gaussian quantum states of light are of paramount importance to quantum computing. Nevertheless, their deterministic generation is challenging problem due to the difficulty to control nonlinearities in physical systems. In this work, we characterize the light stemming from one of the most fundamental quantum optics configurations: the unidirectional scattering of multimode and multiphoton light by a two-level system. We provide an analytic and explicit description of the output light solely in terms of the corresponding input temporal modes which allows a straightforward physical interpretation and is computationally more effective compared to numerical methods. Then, we focus on the specific case of the scattering of two photons in a single mode. By numerically decomposing the output state in terms of its principal modes, we find that it is possible to map single-mode two-photon inputs to be into two-mode entangled output states, i.e., two-photon NOON states, to very good approximation. The latter states, in turn, are known to have more Wigner negativity compared to the associated input, which ultimately suggests a potential application of our considered setup in the deterministic generation of non-Gaussian states.", "url": "https://arxiv.org/abs/2606.29974", "type": "数值", "summary": "光的非高斯量子态对于量子计算至关重要。然而，由于难以控制物理系统中的非线性，它们的确定性生成是一个具有挑战性的问题。在这项工作中，我们描述了源自最基本的量子光学配置之一的光：两级系统的多模和多光子光的单向散射。我们仅根据相应的输入时间模式对输出光进行分析和明确的描述，这允许直接的物理解释，并且与数值方法相比在计算上更有效。然后，我们重点关注两个光子在单模式下散射的具体情况。通过根据主模对输出态进行数值分解，我们发现可以将单模双光子输入映射到双模纠缠输出态，即双光子 NOON 态，以非常好的近似。\n\n反过来，与相关输入相比，后一种状态具有更多的维格纳负性，这最终表明我们考虑的设置在非高斯状态的确定性生成中的潜在应用。", "authors": [{"name": "Yann Bouchereau"}, {"name": "Lucas Weitzel"}, {"name": "Valerian Thiel"}, {"name": "Valentina Parigi"}, {"name": "Mattia Walschaers"}, {"name": "Nicolas Treps"}], "featured_authors": [{"name": "Yann Bouchereau"}, {"name": "Lucas Weitzel"}, {"name": "Valerian Thiel"}, {"name": "Valentina Parigi"}, {"name": "Mattia Walschaers"}, {"name": "Nicolas Treps"}], "author_count": 6}, {"id": "2606.29992", "category": "quant-ph", "title": "Equality Conditions for an Additive Three-Observable Uncertainty Relation", "abstract": "Uncertainty relations play a fundamental role in quantum mechanics by quantifying the intrinsic limitations on the simultaneous sharpness of incompatible observables. Beyond the standard two-observable product form, additive uncertainty relations for triples of observables provide a natural framework for describing collective constraints among three noncommuting components. In this work, we study an additive uncertainty relation for three Hermitian observables from the viewpoint of rotational symmetry and covariance geometry. We give a short rotational derivation by rotating the observable triple and applying the Robertson uncertainty relation to the two transverse observables. This derivation makes the saturation mechanism transparent and leads to a necessary and sufficient condition for equality for general density operators. In the nontrivial equality case, the covariance ellipsoid of the observable triple degenerates into a disk perpendicular to the expectation value of the commutator vector. We also discuss an inverse construction based on finite-dimensional representations of the Lie algebra \\(\\mathfrak{su}(2)\\), which provides a systematic way to construct observable triples with prescribed saturating states. These results clarify the geometric and representation-theoretic structure underlying the tightness of additive three-observable uncertainty relations.", "url": "https://arxiv.org/abs/2606.29992", "type": "理论", "summary": "不确定性关系通过量化不相容可观测量同时锐度的内在限制，在量子力学中发挥着基础作用。除了标准的两个可观测乘积形式之外，可观测三元组的加性不确定性关系为描述三个非交换组件之间的集体约束提供了一个自然的框架。在这项工作中，我们从旋转对称和协方差几何的角度研究了三个埃尔米特可观测量的加性不确定性关系。我们通过旋转可观测量三元组并将罗伯逊不确定性关系应用于两个横向可观测量来给出简短的旋转推导。这一推导使饱和机制变得透明，并为一般密度算子的相等性提供了充分必要条件。在非平凡等式情况下，可观察三元组的协方差椭球体退化为垂直于换向器向量期望值的圆盘。\n\n我们还讨论了基于李代数有限维表示的逆构造 \\(\\mathfrak{su}(2)\\)，它提供了一种系统的方法来构造具有规定饱和状态的可观察三元组。这些结果阐明了加性三可观测不确定性关系的紧密性背后的几何和表示理论结构。", "authors": [{"name": "Yao-Yi Zeng"}, {"name": "Zhi-Jie Liu"}, {"name": "Jie Zhou"}, {"name": "Jing-Ling Chen"}], "featured_authors": [{"name": "Yao-Yi Zeng"}, {"name": "Zhi-Jie Liu"}, {"name": "Jie Zhou"}, {"name": "Jing-Ling Chen"}], "author_count": 4}, {"id": "2606.30075", "category": "quant-ph", "title": "Programmable generation of flying cat-qubits", "abstract": "We propose a framework for the direct generation of flying cat-qubit states from vacuum using time-dependent two-photon drives in nonlinear bosonic systems. We study both Kerr-based and two-photon-dissipation-based generation. By engineering Kerr nonlinearity, two-photon driving, and dissipation, we demonstrate logical control of a cat qubit during its generation and emission, while its quantum information is simultaneously shared between the nonlinear system and the propagating output field. We further analyze the effects of photon loss and pure dephasing, showing that both the state generation and logical control remain robust under realistic noise conditions. These results provide a route toward programmable bosonic quantum networks and future propagating error-correctable encodings.", "url": "https://arxiv.org/abs/2606.30075", "type": "数值", "summary": "我们提出了一个框架，用于在非线性玻色子系统中使用时间相关的双光子驱动从真空直接生成飞猫量子位态。我们研究基于克尔的生成和基于双光子耗散的生成。通过设计克尔非线性、双光子驱动和耗散，我们演示了猫量子位在其生成和发射过程中的逻辑控制，而其量子信息在非线性系统和传播输出场之间同时共享。我们进一步分析了光子损失和纯相移的影响，表明状态生成和逻辑控制在现实噪声条件下仍然保持稳健。这些结果为可编程玻色子量子网络和未来传播可纠错编码提供了一条途径。", "authors": [{"name": "Cecilia Erneman"}, {"name": "Zeidan Zeidan"}, {"name": "Göran Johansson"}, {"name": "Maryam Khanahmadi"}], "featured_authors": [{"name": "Cecilia Erneman"}, {"name": "Zeidan Zeidan"}, {"name": "Göran Johansson"}, {"name": "Maryam Khanahmadi"}], "author_count": 4}, {"id": "2606.30281", "category": "quant-ph", "title": "Quantum Lazy Sampling and Path Recording for Any Group", "abstract": "A central challenge in quantum algorithms and cryptography is reasoning about algorithms with oracle access to a random group element (e.g. a random function, permutation, or unitary). Can we efficiently simulate such algorithms? Can we determine what they know after t queries? A classical tool for this is lazy sampling: the oracle does not commit to the full group element upfront, but rather samples partial information about it on the fly. We study a quantum analog of lazy sampling: compressed oracles (or recording oracles). These are quantum data structures that allow on-the-fly simulation for quantum queries, originally introduced by Zhandry (CRYPTO '19) for random functions, and generalized to unitaries by Ma-Huang (STOC '25) and permutations by Carolan (STOC '26), and used to great effect in security proofs and lower bounds due to their interpretability. We define and analyze a general-purpose and interpretable path-recording oracle, derived from first principles, that perfectly simulates random elements of any closed subgroup of $U(N)$. Our oracle stores, in superposition, t input-output pairs, with updates described in terms of the commutant of the group's tensor power representation. This transparently records the information the algorithm has learned. Our oracle builds on recent work of Grinko-Yoshida (QIP '26), who gave a different general-purpose compressed oracle without clear interpretability. One interesting application of our path-recording is allowing direct comparisons between compressed oracles of different groups, giving a new technique for proving pseudorandomness results. For example, comparing $S_N$ and $U(N)$ yields what is arguably the simplest construction to date of pseudorandom unitaries: the product PC of a pseudorandom permutation and a random Clifford, improving on the prior PFC construction (Metger-Poremba-Sinha-Yuen, FOCS '24; Ma-Huang, STOC '25).", "url": "https://arxiv.org/abs/2606.30281", "type": "理论+数值", "summary": "量子算法和密码学的一个核心挑战是对具有随机群元素（例如随机函数、排列或酉）访问权限的算法进行推理。我们可以有效地模拟这样的算法吗？我们能否在 t 次查询后确定他们知道什么？一个经典的工具是惰性采样：预言机不会预先提交完整的组元素，而是动态采样有关它的部分信息。我们研究惰性采样的量子模拟：压缩预言（或记录预言）。这些是允许对量子查询进行动态模拟的量子数据结构，最初由 Zhandry (CRYPTO '19) 针对随机函数引入，并由 Ma-Huang (STOC '25) 推广到幺正，由 Carolan (STOC '26) 推广到排列，并且由于其可解释性，在安全证明和下界方面发挥了巨大作用。我们定义并分析了一个通用且可解释的路径记录预言机，它源自第一原理，完美地模拟 $U(N)$ 的任何闭合子群的随机元素。\n\n我们的预言机以叠加方式存储 t 个输入输出对，并根据组张量幂表示的交换项描述更新。这透明地记录了算法学到的信息。我们的预言机建立在 Grinko-Yo​​shida (QIP '26) 最近的工作之上，他给出了一个不同的通用压缩预言机，但没有明确的可解释性。我们的路径记录的一个有趣的应用是允许直接比较不同组的压缩预言，从而提供一种证明伪随机性结果的新技术。例如，比较 $S_N$ 和 $U(N)$ 可以得到迄今为止最简单的伪随机酉结构：伪随机排列和随机 Clifford 的乘积 PC，改进了先前的 PFC 结构（Metger-Poremba-Sinha-Yuen，FOCS '24；Ma-Huang，STOC '25）。", "authors": [{"name": "Ben Foxman"}, {"name": "Alex Lombardi"}, {"name": "Fermi Ma"}, {"name": "Barak Nehoran"}, {"name": "John Wright"}], "featured_authors": [{"name": "Ben Foxman"}, {"name": "Alex Lombardi"}, {"name": "Fermi Ma"}, {"name": "Barak Nehoran"}, {"name": "John Wright"}], "author_count": 5}, {"id": "2606.30315", "category": "quant-ph", "title": "All-optical switching of continuous-variable entanglement in an absorption-suppressed plasmonic nanodimer", "abstract": "A subwavelength quantum-photonic circuit element should simultaneously generate nonclassical light, suppress plasmonic loss, and remain dynamically tunable. We show that an orthogonal plasmonic nanorod dimer can satisfy all three requirements. A phase-locked control polarization induces plasmonic refractive-index enhancement, driving the probe response toward a near-zero-extinction regime while simultaneously tuning the local second-harmonic parametric interaction. The resulting nonlinear plasmonic source operates in an absorption-suppressed regime and enables all-optical control of quantum correlations. We demonstrate switchable logarithmic negativity and single-mode nonclassicality, establishing a route toward actively tunable quantum-plasmonic circuit elements operating well below the diffraction limit.", "url": "https://arxiv.org/abs/2606.30315", "type": "理论", "summary": "亚波长量子光子电路元件应同时产生非经典光、抑制等离子体损失并保持动态可调。我们证明正交等离子体纳米棒二聚体可以满足所有三个要求。锁相控制偏振引起等离子体折射率增强，驱动探针响应接近零消光状态，同时调整局部二次谐波参数相互作用。由此产生的非线性等离子体源在吸收抑制状态下工作，并能够实现量子相关性的全光控制。我们展示了可切换的对数负性和单模非经典性，为远低于衍射极限的主动可调谐量子等离子体电路元件建立了一条路线。", "authors": [{"name": "Elif Ozturk"}, {"name": "Mehmet Gunay"}, {"name": "Ramazan Sahin"}, {"name": "Mehmet Emre Tasgin"}], "featured_authors": [{"name": "Elif Ozturk"}, {"name": "Mehmet Gunay"}, {"name": "Ramazan Sahin"}, {"name": "Mehmet Emre Tasgin"}], "author_count": 4}, {"id": "2606.30327", "category": "quant-ph", "title": "Phase-Altered Interleaved Randomized Benchmarking for Compiled Quantum Gates", "abstract": "Interleaved randomized benchmarking (IRB) provides a scalable estimate of a gate's error rate, but its standard guarantees require the interleaved gate to be Clifford~\\cite{Magesan2012Interleaved,magesan2012characterizing}. In superconducting processors, many non-Clifford phase gates in compiled circuits are implemented virtually as software-defined frame updates rather than as additional control pulses~\\cite{mckay2017efficient}. This raises the question of whether inserting or removing such virtual phases measurably changes IRB error estimates. We introduce \\emph{phase-altered interleaved randomized benchmarking} (PA-IRB), a paired-IRB diagnostic protocol comparing phase-stripped and phase-dressed Clifford interleaving gates derived from the same compiled implementation. PA-IRB reports $\\Delta r=r_d-r_s$ with combined uncertainty to test whether virtual phase gates affect the extracted IRB decay beyond statistical error. As a case study, we apply PA-IRB to a compiled Toffoli gate executed on IBM superconducting processors, where the constituent $T/T^\\dagger$ gates are implemented as virtual $Z$ rotations. Across tested calibration runs, $\\Delta r$ is consistent with zero within uncertainty, indicating that virtual phase addition or removal does not measurably alter the IRB-derived error estimate under the employed compilation and execution stack. More generally, PA-IRB provides a lightweight, abstraction-aware diagnostic for benchmarking workflows involving software-defined phase operations. The same paired comparison can also be used to place operational bounds on the contribution of non-Clifford components to the compiled gate error, even when those components are physically executed rather than implemented virtually.", "url": "https://arxiv.org/abs/2606.30327", "type": "理论", "summary": "交错随机基准测试 (IRB) 提供了门错误率的可扩展估计，但其标准保证要求交错门为 Clifford~\\cite{Magesan2012Interleaved,magesan2012characterizing}。在超导处理器中，编译电路中的许多非 Clifford 相位门实际上是作为软件定义的帧更新来实现的，而不是作为额外的控制脉冲~\\cite{mckay2017efficient}。这就提出了一个问题：插入或删除此类虚拟相位是否会显着改变 IRB 误差估计。我们引入\\emph{相变交错随机基准测试}（PA-IRB），这是一种配对 IRB 诊断协议，比较源自相同编译实现的相剥离和相处理 Clifford 交错门。 PA-IRB 报告 $\\Delta r=r_d-r_s$ 以及组合不确定性，以测试虚拟相位门是否影响提取的 IRB 衰减超出统计误差。作为案例研究，我们将 PA-IRB 应用于在 IBM 超导处理器上执行的已编译 Toffoli 门，其中组成的 $T/T^\\dagger$ 门被实现为虚拟 $Z$ 旋转。\n\n在测试的校准运行中，$\\Delta r$ 在不确定性范围内与零一致，这表明虚拟阶段的添加或删除不会显着改变所使用的编译和执行堆栈下的 IRB 导出的误差估计。更一般地说，PA-IRB 为涉及软件定义阶段操作的基准工作流程提供了轻量级、抽象感知的诊断。相同的配对比较还可以用于对非 Clifford 组件对编译门错误的贡献设置操作界限，即使这些组件是物理执行的而不是虚拟实现的。", "authors": [{"name": "Simona K. Grigorova"}, {"name": "Nikolay V. Vitanov"}, {"name": "Boyan T. Torosov"}], "featured_authors": [{"name": "Simona K. Grigorova"}, {"name": "Nikolay V. Vitanov"}, {"name": "Boyan T. Torosov"}], "author_count": 3}, {"id": "2606.30396", "category": "quant-ph", "title": "Provable Quantum Advantage for Dynamical Phase Transition", "abstract": "The universal scaling of critical behavior in phase transitions is a cornerstone of physics. Dynamical quantum phase transitions (DQPTs) are their nonequilibrium analogues: abrupt nonanalyticities that emerge as a quantum system evolves in time. Yet the hardness and cost of detecting this phenomenon remain largely unexplored. We prove that estimating DQPT to a certain precision is intractable even for quantum computers, whereas deciding a subsystem variant of DQPT is as hard as simulating generic quantum circuits, implying a provable exponential quantum advantage. Furthermore, to search for critical times of local DQPTs, we show a quadratically faster quantum algorithm that estimates observables of Hamiltonian dynamics at multiple time points with Heisenberg-limited precision and sublinear scaling in the number of time points. Moreover, through encoding classical evolution into quantum dynamics, our framework enables broader quantum speedups for detecting anomalous phenomena in classical systems.", "url": "https://arxiv.org/abs/2606.30396", "type": "理论+数值", "summary": "相变中关键行为的普遍标度是物理学的基石。动态量子相变（DQPT）是它们的非平衡类似物：随着量子系统随时间演化而出现的突然的非解析性。然而检测这种现象的难度和成本在很大程度上仍未得到探索。我们证明，即使对于量子计算机来说，将 DQPT 估计到一定的精度也是很困难的，而决定 DQPT 的子系统变体与模拟通用量子电路一样困难，这意味着可证明的指数量子优势。此外，为了搜索局部 DQPT 的临界时间，我们展示了一种更快的二次量子算法，该算法以海森堡有限精度和时间点数量的次线性缩放来估计多个时间点的哈密顿动力学可观测量。此外，通过将经典演化编码为量子动力学，我们的框架可以实现更广泛的量子加速，以检测经典系统中的异常现象。", "authors": [{"name": "Jue Xu"}, {"name": "Xiao Yuan"}, {"name": "Qi Zhao"}], "featured_authors": [{"name": "Jue Xu"}, {"name": "Xiao Yuan"}, {"name": "Qi Zhao"}], "author_count": 3}, {"id": "2606.30402", "category": "quant-ph", "title": "Quantum Computations on Fusion Blanket Molten Salts", "abstract": "Molten salts such as FLiBe (2LiF--BeF$_2$) are leading blanket materials for breeding and recovering tritium in fusion reactors. Predicting tritium speciation requires accurate electronic ground-state energies for representative molten-salt clusters, a demanding task for correlated electronic-structure methods. Here we report the first application of heterogeneous quantum--classical computing to tritium binding in FLiBe. Clusters drawn from ab initio molecular dynamics are partitioned by an embedded-wavefunction (EWF) method into atom-centered fragments, and the largest fragments are solved on IBM quantum hardware using extended sample-based quantum diagonalization (ext-SQD). Across nine clusters, the heterogeneous quantum--classical workflow reproduces fragment ground-state energies with agreement to full configuration interaction within 0.7~kcal/mol and a mean absolute deviation of 0.3~kcal/mol. In contrast, fragmented and unfragmented conformational energy differences and tritium binding energies differ by 12~kcal/mol and 110~kcal/mol on average, respectively, identifying fragment construction rather than fragment solution as the dominant source of algorithmic bias. To the best of our knowledge, this is the first such demonstration for a charged ionic system and in particular an inorganic molten salt, where electrostatic and polarization effects make the accurate treatment of electronic correlation particularly challenging. These results also identify areas of future research towards an accurate and scalable quantum--classical workflow to compute free-energy estimates of tritium speciation in fusion blankets.", "url": "https://arxiv.org/abs/2606.30402", "type": "数值", "summary": "FLiBe (2LiF--BeF$_2$) 等熔盐是聚变反应堆中孕育和回收氚的主要覆盖材料。预测氚形态需要具有代表性熔盐团簇的准确电子基态能量，这对于相关电子结构方法来说是一项艰巨的任务。在这里，我们报告了异构量子经典计算在 FLiBe 中氚结合的首次应用。从头开始分子动力学得出的簇通过嵌入式波函数 (EWF) 方法划分为以原子为中心的片段，并使用基于扩展样本的量子对角化 (ext-SQD) 在 IBM 量子硬件上求解最大片段。在九个簇中，异构量子经典工作流程再现了碎片基态能量，其完全构型相互作用在 0.7~kcal/mol 范围内，平均绝对偏差为 0.3~kcal/mol。相比之下，片段化和未片段化的构象能差异和氚结合能平均分别相差12~kcal/mol和110~kcal/mol，这表明片段构建而不是片段解决是算法偏差的主要来源。\n\n据我们所知，这是首次针对带电离子系统，特别是无机熔盐进行此类演示，其中静电和极化效应使得电子关联的精确处理特别具有挑战性。这些结果还确定了未来研究的领域，以实现准确且可扩展的量子经典工作流程，以计算聚变包层中氚形态的自由能估计。", "authors": [{"name": "Susanta Das"}, {"name": "Thiago J. Pinheiro Dos Santos"}, {"name": "Subhamoy Bhowmik"}, {"name": "Milana Bazayeva"}, {"name": "Zhen Li"}, {"name": "Akhil Shajan"}, {"name": "Danil Kaliakin"}, {"name": "Fangchun Liang"}, {"name": "Vyacheslav S. Bryantsev"}, {"name": "Al Geist"}, {"name": "Abigail McClain Gomez"}, {"name": "Thaddeus Pellegrini"}, {"name": "Robert Walkup"}, {"name": "Seetharami R. Seelam"}, {"name": "Mario Motta"}, {"name": "Kenneth M. Merz Jr."}, {"name": "Thomas Beck"}], "featured_authors": [{"name": "Susanta Das"}, {"name": "Thiago J. Pinheiro Dos Santos"}, {"name": "Subhamoy Bhowmik"}, {"name": "Mario Motta"}, {"name": "Kenneth M. Merz Jr."}, {"name": "Thomas Beck"}], "author_count": 17}, {"id": "2606.30520", "category": "quant-ph", "title": "Staged Hybridisation for Visual Quantum Reinforcement Learning via Knowledge Distillation", "abstract": "Visual environments are a demanding setting for quantum reinforcement learning (QRL): high-dimensional observations, unstable RL optimisation, and constrained variational quantum circuits (VQCs) are difficult to train jointly. This paper studies knowledge distillation (KD) as a staged hybridisation strategy for visual QRL. Instead of training a hybrid visual agent end-to-end from pixels, we first train a classical visual teacher, freeze its encoder as a feature interface, and distil the teacher's policy behaviour into compact downstream heads. These heads can be classical or VQC-based, enabling small quantum-compatible students to be evaluated under the same frozen representation as compact classical controls. We evaluate the pipeline on CartPole Pixels and Acrobot Pixels. The results show that staged KD enables shallow VQC heads to acquire non-trivial visual-control behaviour in settings where direct pixel-based training would be substantially more difficult. Angle-encoded VQC heads retain near-teacher performance, while amplitude-encoded heads push compactness to an extreme regime, at the cost of greater fragility, stronger budget sensitivity, and higher simulation time. Overall, staged KD reframes visual QRL as a compact-head learning problem, opening a practical route for training small quantum-compatible policies outside the standard end-to-end RL loop.", "url": "https://arxiv.org/abs/2606.30520", "type": "理论+数值", "summary": "视觉环境对于量子强化学习 (QRL) 来说是一个要求很高的环境：高维观察、不稳定的 RL 优化和受限变分量子电路 (VQC) 很难联合训练。本文研究知识蒸馏（KD）作为视觉 QRL 的分阶段杂交策略。我们不是从像素端到端地训练混合视觉代理，而是首先训练一个经典的视觉教师，将其编码器冻结为特征接口，并将教师的策略行为提炼为紧凑的下游头。这些头可以是经典的或基于 VQC 的，使小型量子兼容学生能够在与紧凑的经典控制相同的冻结表示下进行评估。我们在 CartPole Pixels 和 Acrobot Pixels 上评估管道。结果表明，分阶段 KD 使浅 VQC 头能够在直接基于像素的训练变得更加困难的环境中获得重要的视觉控制行为。角度编码的 VQC 头保持接近教师的性能，而幅度编码的头将紧凑性推向极端，但代价是更大的脆弱性、更强的预算敏感性和更长的仿真时间。\n\n总体而言，分阶段 KD 将视觉 QRL 重新构建为紧凑头学习问题，为在标准端到端 RL 循环之外训练小型量子兼容策略开辟了一条实用途径。", "authors": [{"name": "Javier Lazaro"}, {"name": "Juan-Ignacio Vazquez"}, {"name": "Pablo Garcia-Bringas"}], "featured_authors": [{"name": "Javier Lazaro"}, {"name": "Juan-Ignacio Vazquez"}, {"name": "Pablo Garcia-Bringas"}], "author_count": 3}, {"id": "2606.30551", "category": "quant-ph", "title": "Bridging the NISQ and Fault-Tolerant Regimes: Generative-ML-Assisted Quantum Selected CI for Molecular Simulations", "abstract": "Calculation of binding energies for protein-ligand molecular systems requires accurate treatment of the electronic structure, a quantum chemistry problem that scales exponentially on classical hardware, while current quantum hardware remains too noisy for the required circuit depths. This report presents a hybrid quantum-classical workflow performed on the Fujitsu FX700 ideal state-vector simulator using QARP that addresses two structural inefficiencies in quantum-sampling-based diagonalization workflows. First, we integrate the Linear Scaling CNOT UCCSD (LCNot-UCCSD) ansatz into the QSCI framework, replacing the $\\mathcal{O}(N^6)$ CCSD parameter initialization of the competing LUCJ ansatz approach with $\\mathcal{O}(N^4)$ MP2-amplitude initialization. Second, we introduce QSCI-RBM, a variant that replaces the configuration recovery of the SQD framework with a Restricted Boltzmann Machine (RBM) acting as a compact generative subspace expansion model. Both are evaluated on eight different molecules in STO-3G across 14 controlled artificial error levels with 100 independent runs each, validated on potential energy surface scans of the N$_2$ molecule in cc-pVDZ, and embedded within DMET to treat the FDA-approved antiviral Amantadine (C$_{10}$H$_{17}$N, 11 DMET fragments) and the active region of the SARS-CoV-2 main protease complexed with its covalent inhibitor Carmofur (PDB: 7BUY, C$_{15}$H$_{28}$N$_4$O$_5$S, 10 fragments). To our knowledge, this is the first deployment of LCNot-UCCSD within QSCI on a quantum computing simulator, and the first DMET-QSCI(LCNot-UCCSD)-RBM application to an industry-relevant protein-ligand system. By utilizing a fraction of the classical computing resources required by the current state-of-the-art work by Cleveland Clinic, RIKEN, and IBM Quantum, this approach enables more efficient and economical drug discovery simulations for the industry.", "url": "https://arxiv.org/abs/2606.30551", "type": "理论+数值", "summary": "计算蛋白质-配体分子系统的结合能需要精确处理电子结构，这是一个在经典硬件上呈指数级扩展的量子化学问题，而当前的量子硬件对于所需的电路深度来说仍然过于嘈杂。本报告介绍了使用 QARP 在 Fujitsu FX700 理想状态矢量模拟器上执行的混合量子经典工作流程，解决了基于量子采样的对角化工作流程中的两个结构性低效率问题。首先，我们将线性缩放 CNOT UCCSD (LCNot-UCCSD) ansatz 集成到 QSCI 框架中，用 $\\mathcal{O}(N^4)$ MP2 幅度初始化替换竞争 LUCJ ansatz 方法的 $\\mathcal{O}(N^6)$ CCSD 参数初始化。其次，我们介绍 QSCI-RBM，它是一种变体，它用受限玻尔兹曼机 (RBM) 代替 SQD 框架的配置恢复，充当紧凑的生成子空间扩展模型。\n\n两者均在 STO-3G 中的 8 个不同分子上进行评估，涵盖 14 个受控人工误差水平，每个水平进行 100 次独立运行，通过 cc-pVDZ 中 N$_2$ 分子的势能表面扫描进行验证，并嵌入 DMET 中以治疗 FDA 批准的抗病毒金刚烷胺（C$_{10}$H$_{17}$N，11 个 DMET 片段）和 SARS-CoV-2 主要蛋白酶的活性区域与其共价抑制剂卡莫氟复合（PDB：7BUY，C$_{15}$H$_{28}$N$_4$O$_5$S，10 个片段）。据我们所知，这是 QSCI 中首次在量子计算模拟器上部署 LCNot-UCCSD，也是首次将 DMET-QSCI(LCNot-UCCSD)-RBM 应用到行业相关的蛋白质配体系统。通过利用克利夫兰诊所、RIKEN 和 IBM Quantum 目前最先进的工作所需的经典计算资源的一小部分，这种方法可以为行业提供更高效、更经济的药物发现模拟。", "authors": [{"name": "Anurag K. S. V."}, {"name": "Ashish Kumar Patra"}, {"name": "Manas Mukherjee"}, {"name": "Ruchika Bhat"}, {"name": "Sai Shankar P."}, {"name": "Rahul Maitra"}, {"name": "Jaiganesh G"}], "featured_authors": [{"name": "Anurag K. S. V."}, {"name": "Ashish Kumar Patra"}, {"name": "Manas Mukherjee"}, {"name": "Sai Shankar P."}, {"name": "Rahul Maitra"}, {"name": "Jaiganesh G"}], "author_count": 7}, {"id": "2606.30569", "category": "quant-ph", "title": "Revisiting crossed-correlated baths in open quantum systems simulated by HEOM or T-TEDOPA", "abstract": "Excited-state dynamics of open quantum systems is analyzed by the hierarchical equations of motion (HEOM) or the thermalized time-evolving density operator with orthogonal polynomials algorithm (T-TEDOPA) method when a discrete $ab$ $initio$ linear vibronic model is parametrized by continuous temperature-dependent spectral densities leading to crossed correlation functions, i.e. correlated fluctuations of the energy gap collective modes. We focus on a conical intersection involving two collective modes tuning the energy of each excited state and we revisit the transformation of the initial correlated tuning baths to de-correlated shared baths in order to reduce the computational resources. While a completely frequency-dependent transformation poses problems for HEOM, we find that in some particular cases, an optimal approximate frequency-independent transformation may be derived. On the contrary, T-TEDOPA is very efficient and allows to use this frequency-dependent transformation at the price of managing long-range couplings in the tensor chain. An illustrative application is shown by using the linear vibronic coupling model of a planar symmetrical (phenylethynyl)benzene dimer.", "url": "https://arxiv.org/abs/2606.30569", "type": "理论+数值", "summary": "当离散 $ab$ $initio$ 线性振动模型通过连续的温度相关谱密度进行参数化时，可以通过层次运动方程 (HEOM) 或正交多项式算法的热化时间演化密度算子 (T-TEDOPA) 方法来分析开放量子系统的激发态动力学，从而产生交叉相关函数，即能隙集体模式的相关涨落。我们专注于涉及两种集体模式调整每个激发态能量的圆锥形交叉点，并且我们重新审视初始相关调整浴到去相关共享浴的转换，以减少计算资源。虽然完全频率相关的变换给 HEOM 带来了问题，但我们发现在某些特定情况下，可以导出最佳的近似频率无关变换。相反，T-TEDOPA 非常高效，并且允许使用这种频率相关的变换，但代价是管理张量链中的远程耦合。通过使用平面对称（苯乙炔基）苯二聚体的线性振动耦合模型展示了一个说明性应用。", "authors": [{"name": "Brieuc Le Dé"}, {"name": "Etienne Mangaud"}, {"name": "Alex W. Chin"}, {"name": "Michèle Desouter-Lecomte"}], "featured_authors": [{"name": "Brieuc Le Dé"}, {"name": "Etienne Mangaud"}, {"name": "Alex W. Chin"}, {"name": "Michèle Desouter-Lecomte"}], "author_count": 4}, {"id": "2606.30592", "category": "quant-ph", "title": "Untangling QLDPC Codes with Biased Noise Ancilla", "abstract": "Remarkable technical progress has made high-rate, high-distance, quantum low-density parity-check codes (QLDPC) promising candidates for scalable quantum computing. However, it is hard to design low-depth syndrome extraction circuits that do not spread errors from ancilla qubits to multiple data qubits, also known as hook errors, for general QLDPC codes. Additionally, widely used decoders for these codes based on belief propagation are impaired due to short loops in the Tanner graph. Here, we investigate a hardware-aware approach to avoid these hooks and loops using biased noise ancillas. Using examples of bicycle bivariate codes and a cyclic hypergraph product code, which have been widely considered for practical application, we show that the effective fault-distance of the conventional syndrome extraction circuit can be significantly higher and the number of short loops can be significantly lower when the ancillas are subject to phase-flip errors only, compared to when they are also subject to bit-flip errors. This can result in almost an order of magnitude improvement in the logical error rate at circuit noise of $2\\times 10^{-3}$ and when bit-flip errors in the ancilla are 50 times less likely than phase-flip errors. Our work demonstrates a significant and practical quantum error correction advantage with biased noise qubits in which full-bias cannot be maintained.", "url": "https://arxiv.org/abs/2606.30592", "type": "理论", "summary": "显着的技术进步使得高速率、高距离、量子低密度奇偶校验码（QLDPC）成为可扩展量子计算的有希望的候选者。然而，对于一般的 QLDPC 代码，很难设计出不将错误从辅助量子位传播到多个数据量子位（也称为钩子错误）的低深度校正子提取电路。此外，由于坦纳图中的短循环，广泛使用的基于置信传播的这些代码的解码器受到损害。在这里，我们研究了一种硬件感知方法，使用偏置噪声辅助来避免这些钩子和循环。通过使用在实际应用中被广泛考虑的自行车双变量代码和循环超图乘积代码的示例，我们表明，与同时受到位翻转错误影响的辅助设备相比，当辅助设备仅遭受相位翻转错误时，传统校正子提取电路的有效故障距离可以显着更高，并且短环路的数量可以显着降低。\n\n当电路噪声为 $2\\times 10^{-3}$ 且辅助中的位翻转错误比相位翻转错误的可能性低 50 倍时，这可以使逻辑错误率提高几乎一个数量级。我们的工作展示了带有偏置噪声量子位的显着且实用的量子纠错优势，其中无法维持全偏置。", "authors": [{"name": "Runjiang Bi"}, {"name": "Kathleen Chang"}, {"name": "Shruti Puri"}], "featured_authors": [{"name": "Runjiang Bi"}, {"name": "Kathleen Chang"}, {"name": "Shruti Puri"}], "author_count": 3}, {"id": "2606.30635", "category": "quant-ph", "title": "Provable random-matrix spectral ramp in a static, geometrically local Hamiltonian", "abstract": "Quantum chaos is commonly associated with the emergence of random-matrix statistics in the spectra of quantum systems. A useful diagnostic is provided by the spectral form factor (SFF), which for random matrix ensembles displays a universal linear-growth regime (`ramp'). In the last decade, a landmark result by Bertini, Kos and Prosen (BKP) identified for the first time a class of geometrically local quantum dynamics of finite-dimensional particles where the SFF provably exhibits a random-matrix ramp: periodically driven (Floquet) qudit chains whose evolution is described by `dual-unitary' circuits. Here, building on the BKP result and on a recently proposed variant of the Feynman-Kitaev clock construction, we obtain a spectral ramp in a class of static, geometrically local Hamiltonians. Our strategy is to embed the Floquet quasienergy spectrum of a dual-unitary circuit into the energy spectrum of a static local Hamiltonian, and to prove that the latter's connected SFF inherits the BKP ramp within a symmetry sector. This is to our knowledge the first proof of a spectral ramp in a time-independent, geometrically local many-body system with finite local Hilbert space dimension.", "url": "https://arxiv.org/abs/2606.30635", "type": "理论", "summary": "量子混沌通常与量子系统光谱中随机矩阵统计的出现有关。谱形状因子（SFF）提供了有用的诊断，它对于随机矩阵系综显示出通用的线性增长机制（“斜坡”）。在过去的十年中，Bertini、Kos 和 Prosen (BKP) 的一项里程碑式的成果首次确定了一类有限维粒子的几何局域量子动力学，其中 SFF 可证明表现出随机矩阵斜坡：周期性驱动 (Floquet) qdit 链，其演化由“双酉”电路描述。在这里，基于 BKP 结果和最近提出的 Feynman-Kitaev 时钟结构的变体，我们获得了一类静态、几何局部哈密顿量的谱斜坡。我们的策略是将双酉电路的 Floquet 准能谱嵌入到静态局部哈密顿量的能谱中，并证明后者的连接 SFF 继承了对称扇区内的 BKP 斜坡。据我们所知，这是在具有有限局部希尔伯特空间维度的与时间无关的几何局部多体系统中频谱斜坡的第一个证明。", "authors": [{"name": "Matteo Ippoliti"}], "featured_authors": [{"name": "Matteo Ippoliti"}], "author_count": 1}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
