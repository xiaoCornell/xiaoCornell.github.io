这些特征转化为重要的热力学行为和奇异的重正化群流，包括非相邻固定点之间的跳跃流。在基于物理信息神经网络（PINN）的先前工作的基础上，我们将从边界热力学数据重建体标量势的全息反问题扩展到这个新的体系中。这种设置提出了各种概念和数值挑战，例如近简并态、能量尺度的大层次结构以及输入数据未直接探测的势能区域。我们开发了一套克服这些障碍的方法论进展，从而改进了已建立的基于 PINN 的方法，并将其扩展到以前无法实现的新的感兴趣的物理体系。\n\n应用开发的框架，我们展示了对假真空状态深处的标量势的精确重建，尽管数值刚度很大，但与基础热力学的物理特征实现了稳健的一致。我们的结果扩展了全息术和机器学习之间的桥梁，并表明数据驱动的方法可以为强耦合系统的结构提供新的见解。", "authors": [{"name": "Raul Jimenez"}, {"name": "David Mateos"}, {"name": "Pavlos Protopapas"}, {"name": "Pau Solé-Vilaró"}, {"name": "Pedro Tarancón-Álvarez"}, {"name": "Pablo Tejerina-Pérez"}], "featured_authors": [{"name": "Raul Jimenez"}, {"name": "David Mateos"}, {"name": "Pavlos Protopapas"}, {"name": "Pau Solé-Vilaró"}, {"name": "Pedro Tarancón-Álvarez"}, {"name": "Pablo Tejerina-Pérez"}], "author_count": 6}, {"id": "2606.30177", "category": "hep-th", "title": "Quadratic Gauge Transformation", "abstract": "Symmetries plays a significant role in understanding the conservation laws in Quantum field theories. Here, we attempted a quadratic type dimensionless gauge transformation to achieve the invariance in QFTs. We have shown the extensive study of invariance of complex scalar, Abelian and Non- Abelian theories and established the conservation laws. We included an explicit graphical analysis to invoke the invariance. This is studied in a physical context, where different field configurations correspond to the same physical state. The necessity of the covariant derivative is studied in detail, highlighting how it ensures consistent transformation under local symmetry operations. The meaning of covariance is clarified as the preservation of the form of physical laws under transformations.", "url": "https://arxiv.org/abs/2606.30177", "type": "理论", "summary": "对称性在理解量子场论中的守恒定律方面发挥着重要作用。在这里，我们尝试使用二次型无量纲规范变换来实现 QFT 的不变性。我们对复标量、阿贝尔和非阿贝尔理论的不变性进行了广泛的研究，并建立了守恒定律。我们包含了显式图形分析来调用不变性。这是在物理背景下研究的，其中不同的场配置对应于相同的物理状态。详细研究了协变导数的必要性，强调了它如何确保局部对称操作下的一致变换。协变的含义被明确为物理定律在变换下的形式的保留。", "authors": [{"name": "Sunita Singh"}, {"name": "Akshit Sharma"}], "featured_authors": [{"name": "Sunita Singh"}, {"name": "Akshit Sharma"}], "author_count": 2}, {"id": "2606.30231", "category": "hep-th", "title": "Exact calculation of entanglement negativity for a 1+1D massless scalar field using phase space methods", "abstract": "Quantum fields exhibit a rich entanglement structure which is still not fully understood. In this work, we study the entanglement structure of the vacuum state of a massless scalar field in (1+1)-dimensions -- a paradigmatic case for both high energy and condensed matter physics. We fully characterize the entanglement negativity between two arbitrary compact spacelike-separated regions of the field by calculating the logarithmic negativity along with the modes carrying it, called negativity cores. We achieve this using a framework based on the Kähler structure of Gaussian states, wherein we calculate the diagonalization of the operator associated with the partially-transposed restricted linear complex structure. In doing so, we extend the methods of this framework by proposing a basis-independent definition of the transpose operation. The explicit diagonalization we perform is enabled by a reformulation of the eigenvalue problem as a boundary value problem in the complex plane. Our results also suggest extensions to higher dimensions and fermionic fields.", "url": "https://arxiv.org/abs/2606.30231", "type": "理论", "summary": "量子场表现出丰富的纠缠结构，但尚未完全理解。在这项工作中，我们研究了 (1+1) 维无质量标量场的真空态纠缠结构——这是高能物理和凝聚态物理的典型案例。我们通过计算对数负性以及承载它的模式（称为负核）来充分表征场中两个任意紧凑的空间分离区域之间的纠缠负性。我们使用基于高斯态凯勒结构的框架来实现这一点，其中我们计算与部分转置受限线性复数结构相关的算子的对角化。在此过程中，我们通过提出转置操作的独立于基础的定义来扩展该框架的方法。我们执行的显式对角化是通过将特征值问题重新表述为复平面中的边值问题来实现的。我们的结果还表明可以扩展到更高维度和费米子场。", "authors": [{"name": "Jason Pye"}, {"name": "Atharva Hingane"}, {"name": "Robert H. Jonsson"}], "featured_authors": [{"name": "Jason Pye"}, {"name": "Atharva Hingane"}, {"name": "Robert H. Jonsson"}], "author_count": 3}, {"id": "2606.30233", "category": "hep-th", "title": "Complex Phase Structure and Widom line for Euler Heisenberg black holes", "abstract": "We investigate the supercritical thermodynamics of Euler-Heisenberg AdS black holes within the framework of Lee-Yang phase transition theory. We show that the system admits two distinct critical points associated with a four-phase thermodynamic structure and identify a degenerate higher-order critical point where the two criticalities merge. Extending the thermodynamic description into the complex domain, we determine the distribution of Lee-Yang singularities and construct the corresponding complex phase diagrams. At the degenerate critical point, we find that a well-defined Widom line emerges despite the absence of a conventional coexistence curve, acting as an effective stability boundary in the supercritical regime. In the two-critical-point regime, the complex phase diagram exhibits two distinct Widom lines, one associated with a coexistence curve and the other arising solely from the complex singularity structure. We further show that the Lee-Yang formalism consistently reproduces the expected phase structure for systems with a single critical point and in the absence of criticality. Our results reveal a rich supercritical phase structure and provide new insights into the origin and physical interpretation of Widom lines.", "url": "https://arxiv.org/abs/2606.30233", "type": "理论", "summary": "我们在李-杨相变理论的框架内研究了欧拉-海森堡 AdS 黑洞的超临界热力学。我们表明，系统承认与四相热力学结构相关的两个不同的临界点，并识别出两个临界点合并的简并高阶临界点。将热力学描述扩展到复杂领域，我们确定了Lee-Yang奇点的分布并构建了相应的复杂相图。在简并临界点，我们发现尽管不存在传统的共存曲线，但仍出现了一条明确的 Widom 线，充当超临界状态中的有效稳定边界。在双临界点状态下，复杂相图呈现出两条不同的 Widom 线，一条与共存曲线相关，另一条仅由复杂奇点结构产生。我们进一步表明，李-杨形式主义始终如一地再现了具有单个临界点和缺乏临界点的系统的预期相结构。\n\n我们的结果揭示了丰富的超临界相结构，并为 Widom 线的起源和物理解释提供了新的见解。", "authors": [{"name": "Mozib Bin Awal"}, {"name": "Prabwal Phukon"}], "featured_authors": [{"name": "Mozib Bin Awal"}, {"name": "Prabwal Phukon"}], "author_count": 2}, {"id": "2606.30341", "category": "hep-th", "title": "A note on the holographic consistency of DGKT-type vacua with $h^{2,1}=0$", "abstract": "Recent works have pointed out the existence of a holographic constraint on (extremal) three-point functions of scalar moduli in scale-separated AdS vacua. Moreover, it has been shown that this constraint is satisfied in the DGKT scenario in massive type IIA for the original $\\mathbb{T}^6/(\\mathbb{Z}_3 \\times \\mathbb{Z}_3)$ orbifold, as a result of a series of unexpected cancellations. We extend the analysis to more elaborate scenarios, involving geometries with less symmetry and more complicated triple-intersection numbers. Surprisingly, the cancellations persist in all examples with $h^{2,1}=0$, leading us to speculate this conclusion might hold more generally.", "url": "https://arxiv.org/abs/2606.30341", "type": "理论", "summary": "最近的工作指出，在尺度分离的 AdS 真空中，标量模的（极值）三点函数存在全息约束。此外，已经表明，由于一系列意外取消，在原始 $\\mathbb{T}^6/(\\mathbb{Z}_3 \\times \\mathbb{Z}_3)$ orbifold 的大规模 IIA 中的 DGKT 场景中，该约束得到满足。我们将分析扩展到更复杂的场景，包括对称性较低的几何图形和更复杂的三重交点数。令人惊讶的是，取消在 $h^{2,1}=0$ 的所有示例中都持续存在，这使我们推测这个结论可能更普遍。", "authors": [{"name": "Filippo Revello"}, {"name": "Farah Verbeure"}], "featured_authors": [{"name": "Filippo Revello"}, {"name": "Farah Verbeure"}], "author_count": 2}, {"id": "2606.30368", "category": "hep-th", "title": "Positivity properties of observables in planar maximally supersymmetric Yang-Mills theory", "abstract": "We study positivity properties of exact observables in planar N=4 super Yang-Mills as functions of the 't Hooft coupling. Motivated by analogous results in quantum mechanics, we ask whether such observables admit a once-subtracted dispersion representation in the coupling over a positive spectral measure. Our main result is that this property, also known as the Stieltjes property, holds for a broad class of exact observables. We prove it analytically, through integral representations, for the octagon anomalous dimension, the logarithm of the circular Wilson loop, the Bremsstrahlung function, and anomalous dimensions in the BMN limit, and we provide numerical evidence for the cusp and tilted cusp anomalous dimensions. We also identify quantities for which the Stieltjes property does not hold, and study the weaker positivity property of complete monotonicity. The Stieltjes property yields two powerful consequences: it lets us turn perturbative input into rigorous non-perturbative bounds, and bootstrap perturbative coefficients. We also show how the strong-coupling expansion and its non-perturbative corrections can be recovered from the once-subtracted dispersion representation via a Mellin-Barnes representation and outline a method to estimate the strong-coupling expansion from weak-coupling data.", "url": "https://arxiv.org/abs/2606.30368", "type": "理论", "summary": "我们研究了平面 N=4 超级杨米尔斯中精确可观测量的正性质，作为 't Hooft 耦合的函数。受量子力学中类似结果的启发，我们询问这些可观测量是否承认在正光谱测量的耦合中存在一次减去的色散表示。我们的主要结果是，该性质（也称为 Stieltjes 性质）适用于一类广泛的精确可观测量。我们通过积分表示对八角形异常尺寸、圆形威尔逊环的对数、轫致辐射函数和 BMN 极限中的异常尺寸进行了解析证明，并为尖点和倾斜尖点异常尺寸提供了数值证据。我们还确定了 Stieltjes 性质不成立的量，并研究了完全单调性的较弱正性性质。 Stieltjes 属性产生两个强大的结果：它让我们将微扰输入转化为严格的非微扰边界，以及引导微扰系数。\n\n我们还展示了如何通过 Mellin-Barnes 表示从一次减去色散表示中恢复强耦合展开及其非微扰校正，并概述了一种从弱耦合数据估计强耦合展开的方法。", "authors": [{"name": "Maximilian Haensch"}], "featured_authors": [{"name": "Maximilian Haensch"}], "author_count": 1}, {"id": "2606.30431", "category": "hep-th", "title": "Loop-level dipole currents and the renormalized hard celestial current algebra in QED", "abstract": "We determine the finite-energy action of the normalized one-loop logarithmic soft-photon operator in an infrared-subtracted abelian gauge theory. Its commutator with Mellin-difference hard currents has a scheme-independent hard-hard residue that survives every one-particle redefinition. With the meromorphic continuation stated explicitly below, a two-particle Plancherel transform identifies this residue with an analytic two-particle primary module, and the coefficient map is a hard-current one-cocycle. The cocycle defines a minimal filtered abelian extension. It has a canonical two-particle primitive and integrates to an affine action. For scalar hard legs, the fixed-leg operator agrees coefficient by coefficient with the symmetry-governed long-range logarithmic tower of Choi, Kadhe, and Puhm. Applied to a tree-level scalar-QED photon-exchange block, the construction determines the logarithmic two-particle coefficient functional from the ordinary hard amplitude and the universal soft kernel. This gives a finite-energy relation between the dipole-current Ward identity and the exponentiated long-range celestial OPE.", "url": "https://arxiv.org/abs/2606.30431", "type": "理论", "summary": "我们确定了红外减法阿贝尔规范理论中归一化单环对数软光子算子的有限能量作用。其具有梅林差分硬电流的换向器具有独立于方案的硬-硬残基，可以在每次单粒子重新定义中幸存下来。通过下面明确说明的亚纯延拓，二粒子 Plancherel 变换用解析二粒子主模块识别该残差，并且系数图是硬电流单循环。余循环定义了最小过滤阿贝尔扩展。它具有规范的二粒子基元并集成到仿射动作。对于标量硬腿，固定腿算子与 Choi、Kadhe 和 Puhm 的对称性控制的远程对数塔逐个系数一致。应用于树级标量 QED 光子交换块，该结构根据普通硬振幅和通用软核确定对数二粒子系数泛函。这给出了偶极电流 Ward 恒等式和指数远程天体 OPE 之间的有限能量关系。", "authors": [{"name": "Ruiliang Li"}], "featured_authors": [{"name": "Ruiliang Li"}], "author_count": 1}, {"id": "2606.30466", "category": "hep-th", "title": "Holography and Kinematic Space for Gravitational Sub-regions in AdS", "abstract": "It is well-known in integral geometry that a maximally symmetric Riemannian manifold, such as a static slice of vacuum AdS spacetime, can be perfectly covered by the geodesics in the Kinematic space, which we call the partial-entanglement-entropy (PEE) threads. In this context, the area of a codimension-one surface in the manifold can be computed by counting its intersections with the PEE threads, which is the celebrated Crofton formula. In this paper, we analyze the Kinematic space for a generic subregion in vacuum AdS space, and propose that the PEE threads emanate from a co-dimension one surface can perfectly cover a subregion in the manifold. Furthermore, we build holographic tensor network models on the network of the PEE threads confined in a subregion, thereby providing a concrete framework that realizes the surface-state correspondence and the generalized entanglement wedges for gravitational subregions.", "url": "https://arxiv.org/abs/2606.30466", "type": "理论", "summary": "在积分几何中众所周知，最大对称黎曼流形，例如真空 AdS 时空的静态切片，可以被运动空间中的测地线完美覆盖，我们将其称为部分纠缠熵（PEE）线。在这种情况下，流形中余维一表面的面积可以通过计算其与 PEE 线的交点来计算，这就是著名的克罗夫顿公式。在本文中，我们分析了真空 AdS 空间中通用子区域的运动学空间，并提出从同维一个表面发出的 PEE 线可以完美地覆盖流形中的子区域。此外，我们在限制在子区域内的PEE线程网络上建立了全息张量网络模型，从而提供了一个实现表面态对应和引力子区域的广义纠缠楔的具体框架。", "authors": [{"name": "Debarshi Basu"}, {"name": "Qiang Wen"}], "featured_authors": [{"name": "Debarshi Basu"}, {"name": "Qiang Wen"}], "author_count": 2}, {"id": "2606.30596", "category": "hep-th", "title": "A thermal representation for conformal ladder integrals", "abstract": "I discuss the recently discovered representation of conformal four-point ladder integrals in terms of the thermal free energy of free massive scalar fields. These integrals satisfy a novel second-order differential equation in even dimensions $D$ at arbitrary loop order $L$. I also present a simple derivation of the all-loop resummation of conformal ladder integrals for arbitrary $D$. Possible connections to the thermal bootstrap, multiloop calculations, integrability, AdS/CFT and string theory are briefly discussed. This is a proceedings contribution to the Athens Workshop in Theoretical Physics: 10th Anniversary, held at the National and Kapodistrian University of Athens on December 17--19 2025.", "url": "https://arxiv.org/abs/2606.30596", "type": "理论", "summary": "我讨论了最近发现的共形四点梯积分在自由大标量场的热自由能方面的表示。这些积分满足任意循环阶数 $L$ 的偶维 $D$ 中的新颖二阶微分方程。我还提出了任意 $D$ 的共形梯积分全循环恢复的简单推导。简要讨论了与热自举、多循环计算、可积性、AdS/CFT 和弦理论的可能联系。这是雅典理论物理研讨会：10 周年纪念日的会议论文集，该研讨会于 2025 年 12 月 17 日至 19 日在雅典国立卡波季斯特里亚大学举行。", "authors": [{"name": "Anastasios C. Petkou"}], "featured_authors": [{"name": "Anastasios C. Petkou"}], "author_count": 1}, {"id": "2606.30630", "category": "hep-th", "title": "Poisson bracket and $L_\\infty$ algebras", "abstract": "We describe the Poisson bracket of a Lagrangian field theory expressed in the framework of $L_\\infty$ algebras. We show that the recently proposed symplectic structure implies that the associated Poisson bracket can be computed through the Peierls formula. We consider Poisson brackets in $p$-adic string theory, where interesting complications arise. In addition we give an elegant interpretation of the inverse relation between the Poisson bracket and symplectic structure in the language of homological algebra, extending some ideas in the mathematical physics literature.", "url": "https://arxiv.org/abs/2606.30630", "type": "理论", "summary": "我们描述了在 $L_\\infty$ 代数框架中表达的拉格朗日场论的泊松括号。我们表明，最近提出的辛结构意味着相关的泊松括号可以通过 Peierls 公式计算。我们考虑 $p$-adic 弦理论中的泊松括号，其中出现了有趣的复杂情况。此外，我们用同调代数的语言对泊松括号和辛结构之间的逆关系进行了优雅的解释，扩展了数学物理文献中的一些想法。", "authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}, {"name": "Igor Khavkine"}], "featured_authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}, {"name": "Igor Khavkine"}], "author_count": 4}, {"id": "2606.30631", "category": "hep-th", "title": "D-brane tension as central charge", "abstract": "Using recently developed Hamiltonian methods, we derive the mass of a D0-brane in open bosonic string field theory as the central charge of the spontaneously broken Poincaré algebra in 26 dimensions.", "url": "https://arxiv.org/abs/2606.30631", "type": "理论", "summary": "使用最近开发的哈密顿方法，我们推导了开放玻色弦场理论中 D0 膜的质量，作为 26 维自发破缺庞加莱代数的中心电荷。", "authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}], "featured_authors": [{"name": "Vinícius Bernardes"}, {"name": "Theodore Erler"}, {"name": "Atakan Hilmi Fırat"}], "author_count": 3}, {"id": "2606.28821", "category": "math-ph", "title": "The BEG model at the FAD triple point on the square lattice", "abstract": "In this note, we prove that the two-dimensional Blume-Emery-Griffiths model at the triple point Ferromagnetic-Antiquadrupolar-Disordered (FAD) has a unique Gibbs measure at any temperature, thereby establishing the absence of phase transitions. The FAD point lies at the intersection of lines separating three regions of the phase diagram, and it is a singular point where the model exhibits infinitely many ground states. Our proof is based on a random-cluster type representation with configuration-dependent cluster weights and a coupling with Bernoulli site percolation with parameter $1/2$.", "url": "https://arxiv.org/abs/2606.28821", "type": "理论", "summary": "在本文中，我们证明二维 Blume-Emery-Griffiths 模型在铁磁反四极无序（FAD）三点处在任何温度下都具有独特的吉布斯测度，从而证明不存在相变。 FAD 点位于分隔相图三个区域的线的交点处，它是模型表现出无限多个基态的奇点。我们的证明基于随机簇类型表示，具有依赖于配置的簇权重，并与参数 $1/2$ 的伯努利位点渗滤耦合。", "authors": [{"name": "Estevão F. Borel"}, {"name": "Aldo Procacci"}, {"name": "Rémy Sanchis"}, {"name": "Benedetto Scoppola"}], "featured_authors": [{"name": "Estevão F. Borel"}, {"name": "Aldo Procacci"}, {"name": "Rémy Sanchis"}, {"name": "Benedetto Scoppola"}], "author_count": 4}, {"id": "2606.28868", "category": "math-ph", "title": "Metric Congruence in Finite-Dimensional Non-Hermitian Quantum Mechanics", "abstract": "We study metric representations in finite-dimensional non-Hermitian quantum mechanics. The main purpose of this work is to emphasize that the physical description of a non-Hermitian system may be formulated in different, but isomorphic, Hilbert spaces. In particular, within the Krein-space formalism, we show that the vector space endowed with an indefinite Krein metric can be explicitly related to the standard Hilbert space through a suitable isomorphism. This observation is essential for a consistent description of non-Hermitian Hamiltonians. Physical states, metrics, and operators must be transported through the corresponding Hilbert-space isomorphism. In this way, equivalent representations of the same system can be used without changing the physical content of the theory. We illustrate these theoretical aspects by studying a two-level non-Hermitian spin model. We use the Robertson uncertainty relation as a consistency test. Apparent violations can arise when operators and states are kept fixed while the metric is changed, and therefore reflect a mismatch of representations rather than a failure of the uncertainty principle.", "url": "https://arxiv.org/abs/2606.28868", "type": "理论", "summary": "我们研究有限维非厄米量子力学中的度量表示。这项工作的主要目的是强调非厄米系统的物理描述可以在不同但同构的希尔伯特空间中表述。特别是，在 Krein 空间形式主义中，我们证明赋予不定 Kerin 度量的向量空间可以通过适当的同构与标准希尔伯特空间显式相关。这一观察结果对于非厄米哈密顿量的一致描述至关重要。物理状态、度量和运算符必须通过相应的希尔伯特空间同构进行传输。这样，可以使用同一系统的等效表示，而不改变理论的物理内容。我们通过研究两级非厄米自旋模型来说明这些理论方面。我们使用罗伯逊不确定性关系作为一致性检验。当算子和状态保持固定而度量发生变化时，可能会出现明显的违规，因此反映了表示的不匹配，而不是不确定性原理的失败。", "authors": [{"name": "Ramirez Romina"}, {"name": "Reboiro Marta"}], "featured_authors": [{"name": "Ramirez Romina"}, {"name": "Reboiro Marta"}], "author_count": 2}, {"id": "2606.28888", "category": "math-ph", "title": "How to Untwist Twisted Gauge Fields", "abstract": "This paper provides an isomorphism between the space of twisted gauge fields on a principal bundle $\\mathcal{P}$ and the space of standard gauge fields on a different principal bundle $\\mathcal{Q}$ associated to $\\mathcal{P}$. This isomorphism extends to local fields on the base manifold, which enables the use of local twisted fields in standard gauge theories (e.g. Yang-Mills-like theories). This allows one to deal with two symmetry groups, coming from $\\mathcal{P}$ and $\\mathcal{Q}$, respectively. The construction makes use of a larger principal bundle $\\mathcal{S}$ which has $\\mathcal{P}$ and $\\mathcal{Q}$ as quotient bundles. The gauge structure on $\\mathcal{S}$ encodes both standard and twisted gauge structures on $\\mathcal{P}$. In addition, the isomorphism classes of bundles $\\mathcal{S}$ are in 1:1 correspondence with the equivalence classes of cocycles (up to a coboundary). This paper also provides a new interpretation of (full) dressing fields as dynamic (or active) sections of a principal bundle.", "url": "https://arxiv.org/abs/2606.28888", "type": "理论", "summary": "本文提供了主丛$\\mathcal{P}$上的扭曲规范场空间和与$\\mathcal{P}$相关的不同主丛$\\mathcal{Q}$上的标准规范场空间之间的同构。这种同构扩展到基流形上的局部场，这使得能够在标准规范理论（例如杨-米尔斯式理论）中使用局部扭曲场。这允许我们处理两个对称群，分别来自 $\\mathcal{P}$ 和 $\\mathcal{Q}$。该构造利用了更大的主丛 $\\mathcal{S}$，其中 $\\mathcal{P}$ 和 $\\mathcal{Q}$ 作为商丛。 $\\mathcal{S}$ 上的规范结构对 $\\mathcal{P}$ 上的标准规范结构和扭曲规范结构进行编码。此外，束 $\\mathcal{S}$ 的同构类与余循环的等价类（直到共界）是 1:1 对应的。本文还对（完整）修整场作为主束的动态（或活动）部分提供了新的解释。", "authors": [{"name": "Serge Lazzarini"}, {"name": "Thierry Masson"}, {"name": "Louis Usala"}], "featured_authors": [{"name": "Serge Lazzarini"}, {"name": "Thierry Masson"}, {"name": "Louis Usala"}], "author_count": 3}, {"id": "2606.28945", "category": "math-ph", "title": "The heat-kernel master field on $\\mathbb{Z}^d$ at strong coupling", "abstract": "We solve large-$N$ Yang--Mills theory on $\\mathbb{Z}^d$, for every $d\\geq2$, at strong coupling, for structure group $\\mathrm{U}(N)$ and for the heat-kernel action. More precisely, we prove that normalized Wilson loop expectations have infinite-volume large-$N$ limits, factorize at leading order, and admit an all-order $1/N$-expansion with exponentially local coefficients, whose leading order characterizes the master field. We also prove an area-law upper bound for the heat-kernel master field, with a stronger coefficientwise version. The proof is based on a rooted heat-kernel master loop equation. Unlike the Wilson-action equation or the two-dimensional Makeenko--Migdal equation, this equation does not close on Wilson loop observables alone; it closes on an extended space of loop observables coupled to compactly supported plaquette decorations. We prove a strong-coupling, order-truncated rooted trajectory expansion and then identify its leading term with the master field. The main inputs are the universal finite-$N$ duality formulas developed in the companion paper \\cite{Lem26a} and large-$N$ heat-kernel estimates from \\cite{LemMai25,LM2}.", "url": "https://arxiv.org/abs/2606.28945", "type": "理论", "summary": "我们求解 $\\mathbb{Z}^d$ 上的大 $N$ Yang--Mills 理论，对于每个 $d\\geq2$，在强耦合下，对于结构群 $\\mathrm{U}(N)$ 和热核作用。更准确地说，我们证明归一化威尔逊循环期望具有无限体积的大$N$限制，按前导阶进行因式分解，并允许具有指数局部系数的全阶$1/N$展开，其前导阶表征了主域。我们还证明了热核主场的面积定律上限，具有更强的系数版本。该证明基于有根热核主循环方程。与 Wilson 作用方程或二维 Makeenko-Migdal 方程不同，该方程仅靠 Wilson 环可观测量并不闭合；它封闭了一个扩展的循环可观察空间，与紧凑支撑的饰板装饰相结合。我们证明了一个强耦合、阶次截断的有根轨迹展开式，然后用主域识别它的主导项。主要输入是在配套论文\\cite{Lem26a}中开发的通用有限$N$对偶公式和\\cite{LemMai25,LM2}中的大型$N$热核估计。", "authors": [{"name": "Thibaut Lemoine"}], "featured_authors": [{"name": "Thibaut Lemoine"}], "author_count": 1}, {"id": "2606.28975", "category": "math-ph", "title": "Cohomological beta function", "abstract": "We propose a cohomological approach to computing the conformal anomaly. Using the example of current-current deformations of two-dimensional conformal field theories, we reproduce the well-known Cardy formula for the leading contribution to the perturbative beta function as the coefficient of the cocycle that realizes the obstruction to deforming the Virasoro module structure on the state space. In addition to offering a novel conceptual perspective on the conformal anomaly, the proposed approach is anticipated to provide an efficient tool for computing higher-order coefficients of perturbative beta functions.", "url": "https://arxiv.org/abs/2606.28975", "type": "理论", "summary": "我们提出了一种上同调方法来计算共形异常。以二维共形场论的电流-电流变形为例，我们重现了著名的 Cardy 公式，该公式对微扰 beta 函数的主要贡献为余循环系数，实现了状态空间上 Virasoro 模块结构变形的阻碍。除了提供关于共形异常的新颖概念视角之外，所提出的方法预计还将提供一种计算扰动 beta 函数高阶系数的有效工具。", "authors": [{"name": "Oleksandr Gamayun"}, {"name": "Maxim Gritskov"}, {"name": "Andrey Losev"}], "featured_authors": [{"name": "Oleksandr Gamayun"}, {"name": "Maxim Gritskov"}, {"name": "Andrey Losev"}], "author_count": 3}, {"id": "2606.29190", "category": "math-ph", "title": "A Unified Geometric Framework for BPS Flows: Split Attractor, Hessian, and Spectral Networks", "abstract": "We provide a systematic and rigorous geometric framework that relates three structures naturally associated to BPS central charges in $\\mathcal{N}=2$ supersymmetric gauge theories: the split attractor flow (SAF) of $|Z|$, the Hessian flow (HF) of $\\operatorname{Im}(e^{-i\\vartheta}Z)$, and the spectral network (SN) on the base curve of the Hitchin fibration. Our main contributions are: (i) a concise proof of orthogonality between SAF and gradient Hessian flow using only the Kahler structure; (ii) a precise lift-projection duality showing that the spectral network projects to the *characteristic Hessian flow* (the Hamiltonian flow of $\\operatorname{Im}(e^{-i\\vartheta}Z)$) on the Hitchin base, clarifying a crucial distinction; (iii) a complete proof of the Kontsevich-Soibelman (KS) equivariance by induction on the SAF tree depth, with the geometric ordering provided by the characteristic Hessian flow. We illustrate the framework with detailed and nontrivial examples: $SU(2)$ pure and $N_f=4$ (including new BPS indices for higher flavour charges), $SU(3)$ pure (full BPS spectrum reconstruction), $SU(4)$, the Kronecker $3$-quiver, and we apply the induction to derive a closed-form BPS spectrum for the Argyres-Douglas $H_1$ theory, $\\Omega(n\\alpha_1+m\\alpha_2)=\\binom{n+m}{n}$, which is a new result. In the tropical limit we obtain an explicit generating function for disk counts in $SU(N)$ gauge theories, $Z_{\\mathrm{disk}}^{SU(N)} = \\prod_{\\alpha\\in\\Phi_+}\\prod_{k\\ge1}(1-e^{-k\\langle\\alpha,y\\rangle})^{-\\binom{k+\\mathrm{ht}(\\alpha)-1}{\\mathrm{ht}(\\alpha)-1}}$, which follows directly from our recursion. These results demonstrate the computational power of the unified framework and provide new, verifiable predictions.", "url": "https://arxiv.org/abs/2606.29190", "type": "理论", "summary": "我们提供了一个系统且严格的几何框架，将$\\mathcal{N}=2$超对称规范理论中与BPS中心电荷自然相关的三种结构联系起来：$|Z|$的分裂吸引子流（SAF）、$\\operatorname{Im}(e^{-i\\vartheta}Z)$的Hessian流（HF）以及希钦纤维基曲线上的谱网络（SN）。我们的主要贡献是：（i）仅使用 Kahler 结构对 SAF 和梯度 Hessian 流之间的正交性进行简明证明； (ii) 精确的升力投影对偶性表明谱网络投影到希钦基底上的*特征 Hessian 流*（$\\operatorname{Im}(e^{-i\\vartheta}Z)$ 的哈密顿流），澄清了一个关键区别； (iii) 通过对 SAF 树深度进行归纳来完整证明 Kontsevich-Soibelman (KS) 等变性，并由特征 Hessian 流提供几何排序。\n\n我们用详细且重要的示例来说明该框架：$SU(2)$ pure 和 $N_f=4$（包括用于更高风味费用的新 BPS 指数）、$SU(3)$ pure（完整 BPS 谱重建）、$SU(4)$、Kronecker $3$-quiver，并且我们应用归纳法为 Argyres-Douglas $H_1$ 理论推导出封闭式 BPS 谱， $\\Omega(n\\alpha_1+m\\alpha_2)=\\binom{n+m}{n}$，这是一个新的结果。在热带极限中，我们在 $SU(N)$ 规范理论中获得了磁盘计数的显式生成函数，$Z_{\\mathrm{disk}}^{SU(N)} = \\prod_{\\alpha\\in\\Phi_+}\\prod_{k\\ge1}(1-e^{-k\\langle\\alpha,y\\rangle})^{-\\binom{k+\\mathrm{ht}(\\alpha)-1}{\\mathrm{ht}(\\alpha)-1}}$，直接从我们的递归得出。这些结果证明了统一框架的计算能力，并提供了新的、可验证的预测。", "authors": [{"name": "Qiang Wang"}], "featured_authors": [{"name": "Qiang Wang"}], "author_count": 1}, {"id": "2606.29234", "category": "math-ph", "title": "Probability density functions as solutions of heterogeneous Cattaneo-Vernotte diffusion equation", "abstract": "In this paper, we considered a heterogeneous Cattaneo-Vernotte equation with an exponential type of diffusion coefficient under the fundamental initial and boundary conditions stating that the solution vanishes at $+/-$ infinity. Owing to the Laplace transform method we obtain two forms of exact analytical solutions which are presented in terms of the ratio of modified Bessel functions. Using the theory of complete monotone functions, we show that the obtained solutions are probability density functions.", "url": "https://arxiv.org/abs/2606.29234", "type": "理论", "summary": "在本文中，我们考虑了在基本初始条件和边界条件下具有指数型扩散系数的异质 Cattaneo-Vernotte 方程，表明解在 $+/-$ 无穷大时消失。由于拉普拉斯变换方法，我们获得了两种形式的精确解析解，它们以修正贝塞尔函数的比率表示。利用完全单调函数理论，我们证明所得到的解是概率密度函数。", "authors": [{"name": "K. Górska"}, {"name": "Ž. Tomovski"}, {"name": "A. Horzela"}, {"name": "M. Magdziarz"}], "featured_authors": [{"name": "K. Górska"}, {"name": "Ž. Tomovski"}, {"name": "A. Horzela"}, {"name": "M. Magdziarz"}], "author_count": 4}, {"id": "2606.29349", "category": "math-ph", "title": "PDE-constrained optimization for virtual sensing in structural dynamics: Full-field displacement and force recovery from sparse sensors", "abstract": "Virtual sensing -- recovering full-field structural response from sparse sensor measurements -- is a fundamental challenge in structural health monitoring. This study formulates virtual sensing as a PDE-constrained optimization (PDE-CO) problem, where the governing elastodynamic equation serves as an equality constraint, the applied force distribution is the optimization variable, and the full-field displacement and force are jointly recovered. Gradients of the Tikhonov-regularized objective are computed via reverse-mode automatic differentiation through the forward PDE solver, and L-BFGS iteratively finds the optimal state. The framework couples an offline FEniCSx stage for finite element assembly with an online GPU-accelerated JAX stage, and is verified on three examples of increasing complexity: a cantilever plate, a $90^\\circ$ elbow pipe, and a reactor pressure vessel (RPV) representative of a 300~MW pressurized nuclear reactor. PDE-CO consistently outperforms modal expansion across all three cases, reducing displacement errors by factors of $2$ to $17\\times$ with sub-percent accuracy on every example. Unlike modal expansion, where force is derived by back-calculation from truncated modal coordinates and is not jointly optimized, PDE-CO recovers displacement and force simultaneously through the PDE constraint; the increased computational cost is offset by GPU acceleration delivering up to $64.8\\times$ speedup over CPU.", "url": "https://arxiv.org/abs/2606.29349", "type": "理论", "summary": "虚拟传感——从稀疏传感器测量中恢复全场结构响应——是结构健康监测的一个基本挑战。本研究将虚拟传感表述为偏微分方程约束优化（PDE-CO）问题，其中控制弹动力方程作为等式约束，施加的力分布是优化变量，并且联合恢复全场位移和力。 Tikhonov 正则化目标的梯度是通过前向 PDE 求解器通过反向模式自动微分计算的，L-BFGS 迭代地找到最佳状态。该框架将用于有限元装配的离线 FEniCSx 阶段与在线 GPU 加速的 JAX 阶段相结合，并在三个复杂性不断增加的示例上进行了验证：悬臂板、$90^\\circ$ 弯管和代表 300~MW 加压核反应堆的反应堆压力容器 (RPV)。 PDE-CO 在所有三种情况下始终优于模态展开，将位移误差减少了 $2$ 到 $17\\times$，每个示例的精度都低于百分之一。\n\n与模态展开不同，模态展开中的力是通过截断模态坐标反算得到的，并且不进行联合优化，PDE-CO 通过 PDE 约束同时恢复位移和力； GPU 加速抵消了增加的计算成本，与 CPU 相比，速度提升高达 64.8 美元\\倍$。", "authors": [{"name": "Minjae Kim"}, {"name": "Jaehwan Jeong"}, {"name": "Jaemin Kim"}], "featured_authors": [{"name": "Minjae Kim"}, {"name": "Jaehwan Jeong"}, {"name": "Jaemin Kim"}], "author_count": 3}, {"id": "2606.29404", "category": "math-ph", "title": "A Multi-Body Dobrushin-Sokal Criterion -- Part II", "abstract": "We prove a sufficient condition for the absolute convergence of Mayer cluster expansions of log-partition and correlation functions applicable to lattice gases with possibly complex-valued multi-body interactions. Not only are several classical results subsumed but a partition scheme for spanning hypergraphs also makes our methods well-suited for treating stronger multi-body interactions, including higher-order hard-core repulsion in the context of hypergraph independence polynomials. Furthermore, our approach is easily combined with the Gruber--Kunz condition to produce extended convergence results for the polymer expansion of lattice gases, rivalling those obtained not too long ago by Nguyen and Fernández (2024).", "url": "https://arxiv.org/abs/2606.29404", "type": "理论", "summary": "我们证明了适用于可能具有复值多体相互作用的晶格气体的对数分区和相关函数的 Mayer 簇展开绝对收敛的充分条件。不仅包含了几个经典结果，而且跨越超图的分区方案也使我们的方法非常适合处理更强的多体相互作用，包括超图独立多项式背景下的高阶硬核排斥。此外，我们的方法很容易与 Gruber-Kunz 条件结合，产生晶格气体聚合物膨胀的扩展收敛结果，可与 Nguyen 和 Fernández (2024) 不久前获得的结果相媲美。", "authors": [{"name": "Jan Philipp Neumann"}], "featured_authors": [{"name": "Jan Philipp Neumann"}], "author_count": 1}, {"id": "2606.30277", "category": "math-ph", "title": "Existence and absence of Bose-Einstein condensation in the interacting random Kac-Luttinger model", "abstract": "In this paper, we study interacting bosons at zero temperature in a random and higher-dimensional continuum model introduced by Kac and Luttinger. For weak interactions we prove that there is condensation in the lowest eigenstate of the one-particle Hamiltonian (type-I BEC). For strong interactions, however, we show that condensation in a localized state cannot occur. We also prove generalized condensation, where a family of eigenstates of the one-particle Hamiltonian is macroscopically occupied as a whole. Combining these results yields a scenario where there is generalized condensation into a family of eigenstates of the one-particle Hamiltonian, but none of them is macroscopically occupied itself (type-III BEC). This proves a transition in the type of condensation. To the best of our knowledge, this is the first rigorous result in this direction for a random continuum model in higher dimensions.", "url": "https://arxiv.org/abs/2606.30277", "type": "理论", "summary": "在本文中，我们研究了 Kac 和 Luttinger 引入的随机高维连续介质模型中零温度下相互作用的玻色子。对于弱相互作用，我们证明单粒子哈密顿量（I 型 BEC）的最低本征态存在凝聚。然而，对于强相互作用，我们表明不可能发生局部状态的凝结。我们还证明了广义凝聚，其中单粒子哈密顿量的本征态族在宏观上被视为一个整体。结合这些结果产生了一种情况，其中存在广义凝聚成单粒子哈密顿量的本征态族，但它们中没有一个在宏观上被占据（III型BEC）。这证明了凝结类型的转变。据我们所知，这是高维随机连续介质模型在这个方向上的第一个严格结果。", "authors": [{"name": "C. Boccato"}, {"name": "J. Kerner"}, {"name": "M. Pechmann"}, {"name": "W. Spitzer"}], "featured_authors": [{"name": "C. Boccato"}, {"name": "J. Kerner"}, {"name": "M. Pechmann"}, {"name": "W. Spitzer"}], "author_count": 4}, {"id": "2606.30357", "category": "math-ph", "title": "Generalized Hermite Polynomials and Spectral Degeneracies of a Singular Sextic Oscillator", "abstract": "We study a quasi-exactly solvable singular sextic oscillator and its algebraic spectrum. For a distinguished range of parameters, we prove that the discriminant of the characteristic polynomial of the matrix determining the algebraic spectrum admits a natural factorization into three factors. One of these factors is the square of a generalized Hermite polynomial $H_{mn}$, whose zeros are poles of a rational solution of the fourth Painlevé equation. Hence, the spectral degeneracies (level crossing points) corresponding to a component of the discriminant locus are in exact correspondence with the zeros of generalized Hermite polynomials, providing an exact Painlevé IV analogue of the Shapiro--Tater asymptotic correspondence originally conjectured for the quartic oscillator and Painlevé II. We also characterize the values of the parameters for which the sextic oscillator admits simultaneously two quasi-polynomial eigenfunctions with opposite exponential behaviour at infinity, and show that this phenomenon is also governed by generalized Hermite polynomials. Our result also yields a new determinantal representation of $H_{mn}$ as the resultant of the characteristic polynomials of two complementary blocks of the matrix determining the algebraic spectrum.", "url": "https://arxiv.org/abs/2606.30357", "type": "理论", "summary": "我们研究了准精确可解的奇异六次振子及其代数谱。对于不同的参数范围，我们证明确定代数谱的矩阵的特征多项式的判别式允许自然分解为三个因子。这些因子之一是广义 Hermite 多项式 $H_{mn}$ 的平方，其零点是第四个 Painlevé 方程有理解的极点。因此，对应于判别轨迹的一个分量的谱简并（水平交叉点）与广义 Hermite 多项式的零点精确对应，提供了最初为四次振子和 Painlevé II 猜想的 Shapiro-Tater 渐近对应关系的精确 Painlevé IV 类似物。我们还描述了六次振子同时允许两个在无穷远处具有相反指数行为的拟多项式本征函数的参数值，并表明这种现象也受广义埃尔米特多项式的支配。\n\n我们的结果还产生了 $H_{mn}$ 的新行列式表示，作为确定代数谱的矩阵的两个互补块的特征多项式的结果。", "authors": [{"name": "Davide Guzzetti"}, {"name": "Dmitrii Rachenkov"}], "featured_authors": [{"name": "Davide Guzzetti"}, {"name": "Dmitrii Rachenkov"}], "author_count": 2}, {"id": "2606.30529", "category": "math-ph", "title": "A Kac system interacting with two heat reservoirs: the shearing case", "abstract": "We study a system formed by $M$ particles moving in 3 dimensions and interacting with two heat reservoirs, each with $N\\gg M$ particles. The system and the reservoirs interact via random collisions and thus evolve via a Kac-type master equation. The initial state of the reservoirs is given by two non-centered Maxwellian distributions; they have temperature $T_+$ and $T_-$ and have average velocity $\\vec p_+$ and $\\vec p_-$, respectively. We prove that, for times shorter than $\\sqrt{N}/M$, the interaction with the two reservoirs is well-approximated by the interaction with two shearing {\\it dynamic} Maxwellian thermostats (i.e. heat reservoirs with $N=\\infty$). As a byproduct of our analysis, we obtain a uniform in time approximation when $T_+=T_-$ and $\\vec p_+=\\vec p_-$.", "url": "https://arxiv.org/abs/2606.30529", "type": "理论", "summary": "我们研究了一个由 $M$ 粒子在 3 维中移动并与两个热库相互作用形成的系统，每个热库都有 $N\\gg M$ 粒子。系统和储层通过随机碰撞相互作用，从而通过 Kac 型主方程演化。储层的初始状态由两个非中心麦克斯韦分布给出；它们的温度分别为 $T_+$ 和 $T_-$，平均速度分别为 $\\vec p_+$ 和 $\\vec p_-$。我们证明，对于短于$\\sqrt{N}/M$的时间，与两个储层的相互作用可以通过与两个剪切{\\it动态}麦克斯韦恒温器（即$N=\\infty$的热储层）的相互作用来很好地近似。作为我们分析的副产品，当 $T_+=T_-$ 和 $\\vec p_+=\\vec p_-$ 时，我们获得了统一的时间近似。", "authors": [{"name": "Federico Bonetto"}, {"name": "Matthew Powell"}], "featured_authors": [{"name": "Federico Bonetto"}, {"name": "Matthew Powell"}], "author_count": 2}, {"id": "2606.28452", "category": "quant-ph", "title": "Beyond Worst-Case Branching: Quantum Tree Search via Amplitude Amplification", "abstract": "In this work, we investigate quantum tree search via amplitude amplification. Amplitude amplification generalizes Grover's algorithm by replacing the Hadamard initialization with an arbitrary unitary $A$, with Grover's algorithm recovered as the special case of uniform initialization. We demonstrate the construction of a dynamic search tree of depth $m$ with query complexity $\\sqrt{\\left(b_{avg}\\right)^m}$ where $b_{avg}$ denotes the average branching factor, improving upon the commonly assumed $\\sqrt{\\left(b_{max}\\right)^m}$, where $b_{max}$ is the maximum branching factor. We further challenge the widespread assumption that amplitude amplification is inferior to quantum backtracking. In fact, quantum backtracking is unsuitable for problems that do not naturally admit a backtracking structure; in such cases, amplitude amplification yields improved query complexity. We observe that amplitude amplification constructs the search tree dynamically, rendering its internal structure inaccessible, a constraint that applies equally to quantum backtracking. To address this, we propose sampling-based methods to estimate the tree structure, under the assumption that it approximates a normal distribution with increasing depth. Finally, we introduce a quantum greedy search based on a lookahead heuristic inspired by the classical cognitive architecture Soar, which models human-like problem-solving strategies.", "url": "https://arxiv.org/abs/2606.28452", "type": "理论+数值", "summary": "在这项工作中，我们通过振幅放大研究量子树搜索。幅度放大通过用任意酉 $A$ 替换 Hadamard 初始化来推广 Grover 算法，并将 Grover 算法恢复为统一初始化的特殊情况。我们演示了深度为 $m$ 且查询复杂度为 $\\sqrt{\\left(b_{avg}\\right)^m}$ 的动态搜索树的构造，其中 $b_{avg}$ 表示平均分支因子，改进了通常假设的 $\\sqrt{\\left(b_{max}\\right)^m}$，其中 $b_{max}$ 是最大分支因子。我们进一步挑战了振幅放大不如量子回溯的普遍假设。事实上，量子回溯并不适合那些自然不承认回溯结构的问题。在这种情况下，幅度放大会提高查询复杂性。我们观察到振幅放大动态地构建搜索树，使其内部结构不可访问，这一约束同样适用于量子回溯。\n\n为了解决这个问题，我们提出了基于采样的方法来估计树结构，假设它随着深度的增加而近似正态分布。最后，我们引入了一种基于前瞻启发式的量子贪婪搜索，其灵感来自于经典认知架构 Soar，它模拟了类人的问题解决策略。", "authors": [{"name": "Andreas Wichert"}], "featured_authors": [{"name": "Andreas Wichert"}], "author_count": 1}, {"id": "2606.28490", "category": "quant-ph", "title": "The subthreshold issue of fusion-based quantum computing", "abstract": "Fusion-based quantum architectures are the leading approach to photonic quantum computing. However, the sub-threshold regime, where logical error rates must reach the levels required by useful applications, has received little attention. We show that in this regime, fusion failure imposes a noise floor on the logical error rate that prevents all-linear-optics architectures from reaching the required rates at low overhead. For fusion-based architectures using quantum emitter spins, we show that the noise floor is reduced by orders of magnitude at a lower overhead.", "url": "https://arxiv.org/abs/2606.28490", "type": "理论", "summary": "基于融合的量子架构是光子量子计算的主要方法。然而，逻辑错误率必须达到有用应用所需水平的亚阈值机制却很少受到关注。我们表明，在这种情况下，融合失败会对逻辑错误率施加噪声本底，从而阻止全线性光学架构以低开销达到所需的速率。对于使用量子发射器自旋的基于融合的架构，我们发现本底噪声以较低的开销降低了几个数量级。", "authors": [{"name": "Matthias C. Löbl"}, {"name": "Love A. M. Pettersson"}, {"name": "Jan Dragašević"}, {"name": "Susan X. Chen"}, {"name": "Oliver A. D. Sandberg"}], "featured_authors": [{"name": "Matthias C. Löbl"}, {"name": "Love A. M. Pettersson"}, {"name": "Jan Dragašević"}, {"name": "Susan X. Chen"}, {"name": "Oliver A. D. Sandberg"}], "author_count": 5}, {"id": "2606.28518", "category": "quant-ph", "title": "Borrowed Identities: Malleable Distillation Factories and a Unified Numerical Search", "abstract": "Magic-state distillation is one of the leading overheads in fault-tolerant quantum computation. Existing methods for finding distillation factories require a transversal gate to act correctly on the entire codespace, a constraint that limits both generality and search efficiency. We introduce a strictly weaker borrowed-identity condition, requiring only that the distillation circuit act as the identity on a single input state. It applies uniformly across all levels of the Clifford hierarchy and unifies, within a single level, factories that distill different magic states -- for example, the $|T\\rangle$, $|CS\\rangle$, and $|CCZ\\rangle$ factories. A brute-force search over borrowed-identity circuits with two-group symmetry recovers, within the search range, all distance-2 factories known from code-construction approaches, including entangled-output and multi-output factories previously outside the scope of any single numerical search. This unification yields parent circuits that encode multiple factories, so the output magic-state type can be chosen at compile time rather than fixed by a hard-coded design. The framework also extends beyond CSS codes, unifying constructions, including synthillation and non-CSS catalytic factories, previously obtained by disparate approaches.", "url": "https://arxiv.org/abs/2606.28518", "type": "理论+数值", "summary": "魔态蒸馏是容错量子计算中的主要开销之一。现有的查找蒸馏工厂的方法需要横向门才能在整个代码空间上正确运行，这是限制通用性和搜索效率的约束。我们引入了严格较弱的借用恒等式条件，仅要求蒸馏电路充当单个输入状态上的恒等式。它统一适用于 Clifford 层次结构的所有级别，并在单个级别内统一提取不同魔法状态的工厂 - 例如 $|T\\rangle$、$|CS\\rangle$ 和 $|CCZ\\rangle$ 工厂。对具有两组对称性的借用身份电路进行强力搜索，在搜索范围内恢复从代码构造方法已知的所有距离 2 工厂，包括以前超出任何单个数值搜索范围的纠缠输出和多输出工厂。这种统一产生了对多个工厂进行编码的父电路，因此可以在编译时选择输出魔术状态类型，而不是通过硬编码设计来固定。\n\n该框架还超越了 CSS 代码，统一了结构，包括以前通过不同方法获得的合成和非 CSS 催化工厂。", "authors": [{"name": "Shraddha Singh"}, {"name": "Craig Gidney"}, {"name": "Cody Jones"}], "featured_authors": [{"name": "Shraddha Singh"}, {"name": "Craig Gidney"}, {"name": "Cody Jones"}], "author_count": 3}, {"id": "2606.28535", "category": "quant-ph", "title": "Dynamical decoupling of a quantum dot spin in a micropillar cavity for spin-multiphoton entanglement", "abstract": "Graph states of mutually entangled photons are key resources for quantum computation and communication and can be generated by leveraging the entanglement between a single resident spin and emitted photons from a charged semiconductor quantum dot (QD). This approach is intrinsically limited by the decoherence of the spin. We study how to mitigate this decoherence with dynamical decoupling of an electron spin in the weak transverse magnetic field regime using spin echo and Carr-Purcell-Meiboom-Gill (CPMG) techniques. Application of these techniques allows us to extend the coherence time of a spin by more than two orders of magnitude, extracting a $T_2^{CPMG}$ of $298\\pm53$ ns. We further demonstrate that this technique is compatible with the generation of a spin-photon-photon entangled state at a high rate enabled by a micropillar cavity, with a 20% improvement in simulated state fidelity when using dynamical decoupling. These results pave the way for generating larger and more complex entangled states with QDs.", "url": "https://arxiv.org/abs/2606.28535", "type": "理论", "summary": "相互纠缠光子的图态是量子计算和通信的关键资源，可以通过利用单个驻留自旋与带电半导体量子点 (QD) 发射的光子之间的纠缠来生成。这种方法本质上受到自旋退相干的限制。我们研究了如何使用自旋回波和 Carr-Purcell-Meiboom-Gill (CPMG) 技术在弱横向磁场范围内通过电子自旋的动态解耦来减轻​​这种退相干。这些技术的应用使我们能够将自旋的相干时间延长两个数量级以上，提取 $T_2^{CPMG}$ 为 $298\\pm53$ ns。我们进一步证明，该技术与微柱腔实现的自旋-光子-光子纠缠态的高速生成兼容，使用动态解耦时，模拟状态保真度提高了 20%。这些结果为利用量子点生成更大、更复杂的纠缠态铺平了道路。", "authors": [{"name": "H. Huet"}, {"name": "P. R. Ramesh"}, {"name": "R. Frantzeskakis"}, {"name": "L. Couronné"}, {"name": "P. Steindl"}, {"name": "V. Guichard"}, {"name": "M. Morassi"}, {"name": "A. Lemaître"}, {"name": "I. Sagnes"}, {"name": "M.F. Doty"}, {"name": "L. Lanco"}, {"name": "D. A. Fioretto"}, {"name": "S. C. Wein"}, {"name": "P. Senellart"}, {"name": "O. Krebs"}], "featured_authors": [{"name": "H. Huet"}, {"name": "P. R. Ramesh"}, {"name": "R. Frantzeskakis"}, {"name": "S. C. Wein"}, {"name": "P. Senellart"}, {"name": "O. Krebs"}], "author_count": 15}, {"id": "2606.28552", "category": "quant-ph", "title": "Enhancing Initial-State Sensitivity through Time-Dependent Hamiltonian Readout in Ising Spin Chains", "abstract": "Local observables can lose sensitivity to an initial state during strongly interacting many-body evolution even though the global dynamics remain unitary. We show that this sensitivity can be enhanced through a time-dependent Hamiltonian readout. Two orthogonal product states are first evolved under a slanted-field Ising Hamiltonian, where their distinction becomes strongly suppressed as observed through several local observables, including subsystem magnetizations and correlation functions, and are then quenched to the transverse-field Ising model at a tunable time. Exact simulations of chains up to $N=12$ show that the optimized time-averaged separation after the switch exceeds the residual slanted-field baseline for every observable and system size tested. In the strongest channels, the standardized readout separation remains robust over the accessible size range, with no clear systematic suppression at larger $N$. The enhancement recurs in widely separated late-time windows and persists qualitatively for open boundaries. These results establish Hamiltonian switching as an observable-selective mechanism for enhancing initial-state sensitivity without time reversal or implying recovery of the full reduced state.", "url": "https://arxiv.org/abs/2606.28552", "type": "理论+数值", "summary": "尽管全局动力学保持单一，但在强相互作用的多体演化过程中，局部可观测量可能会失去对初始状态的敏感性。我们证明，这种灵敏度可以通过时间相关的哈密顿量读数来增强。两个正交积态首先在倾斜场伊辛哈密顿量下演化，通过几个局部可观测量（包括子系统磁化强度和相关函数）观察到，它们的区别被强烈抑制，然后在可调时间淬灭为横向场伊辛模型。对高达 $N=12$ 的链的精确模拟表明，切换后的优化时间平均分离超过了每个可观察到的测试和系统尺寸的剩余倾斜场基线。在最强的通道中，标准化读数分离在可访问的尺寸范围内保持稳健，在较大的 $N$ 下没有明显的系统抑制。这种增强在相隔较远的后期窗口中重复出现，并且对于开放边界定性地持续存在。\n\n这些结果将哈密顿切换确立为一种可观察的选择性机制，用于增强初始状态敏感性，而无需时间反转或意味着完全还原状态的恢复。", "authors": [{"name": "Hoang Van Do"}], "featured_authors": [{"name": "Hoang Van Do"}], "author_count": 1}, {"id": "2606.28640", "category": "quant-ph", "title": "The Schrödinger equation in the complex plane and quantum entanglement", "abstract": "We formulate a continuity equation for the Schrödinger equation in the complex space. We define a complex momentum by normalizing the complex current by the particle density. This momentum is a quantum analog of the classical, kinematic momentum analytically continued into the complex plane. The kinematic momentum and the gradient of the wavefunction's phase each represent a fluid-like flow in the complex plane; the phase-gradient flow is incompressible. The zeros of the wavefunction give rise to simple poles in the momentum. The poles manifest as irrotational vortexes in the phase-gradient flow, while critical points of the wavefunction present as rigid body-like rotational flows of the kinematic momentum. A discrete nature of elementary excitations comes about inherently because the quantity of the poles is automatically integer. An exact quantization condition is subsequently formulated, which reduces to the Bohr-Sommerfeld condition in the semiclassical limit. We establish a priori that the Bohr-Sommerfeld condition must be exact for the Harmonic Oscillator. We show that the kinetic energy is a sum of contributions of the average value and fluctuations, respectively, of the kinematic momentum. The zero-point vibrations within bound states are solely due to the fluctuations of the momentum and manifest as rigid-body flows at infinity. The momentum poles -- and hence the wavefunction's zeros -- can be viewed as emergent, consistent with the remarkable property of quantum entanglement exhibited by standing wave solutions of the Schrödinger equation.", "url": "https://arxiv.org/abs/2606.28640", "type": "理论", "summary": "我们为复空间中的薛定谔方程制定了连续性方程。我们通过粒子密度对复数电流进行归一化来定义复数动量。这种动量是经典运动动量的量子模拟，分析上延续到复平面上。运动动量和波函数相位梯度分别代表复平面中的类流体流动；相梯度流是不可压缩的。波函数的零点产生动量的简单极点。极点表现为相位梯度流中的无旋涡流，而波函数的临界点表现为运动动量的类刚体旋转流。基本激励的离散性质本质上是因为极点的数量自动是整数。随后制定了精确的量化条件，该条件在半经典极限下简化为玻尔-索末菲条件。我们先验地认为，谐波振荡器的玻尔-索末菲条件必须是精确的。\n\n我们证明动能是运动动量的平均值和波动分别贡献的总和。束缚态内的零点振动完全是由于动量波动造成的，并表现为无穷远处的刚体流动。动量极点——以及波函数的零点——可以被看作是涌现的，与薛定谔方程的驻波解所表现出的量子纠缠的显着特性一致。", "authors": [{"name": "Vassiliy Lubchenko"}], "featured_authors": [{"name": "Vassiliy Lubchenko"}], "author_count": 1}, {"id": "2606.28660", "category": "quant-ph", "title": "Emergence of Thermodynamics from Equilibration in Isolated Quantum Systems", "abstract": "Understanding how macroscopic thermodynamic behavior emerges from microscopic quantum dynamics remains an open problem. While equilibration of quantum observables is well established, thermodynamics also relies on variables not directly associated with linear operators, but which are defined instead as functions of expectation values. Whether and how such derived quantities inherit equilibration properties is an open question. Here, we establish that any continuously differentiable function of equilibrating expectation values also equilibrates. We apply this result to a bipartite isolated system, showing that the entropy and conjugate variables of each subsystem -- defined through Jaynes' maximum entropy principle -- equilibrate. Moreover, with the assumption that their equilibrium properties depend solely on local conserved quantities, we show the dynamical maximization of the total entropy, enforcing equality of conjugate variables across subsystems. These results provide a direct dynamical justification for entropy maximization and the emergence of thermodynamic equilibrium conditions, showing that fundamental principles of thermodynamics follow from the unitary evolution of quantum systems.", "url": "https://arxiv.org/abs/2606.28660", "type": "理论", "summary": "了解宏观热力学行为如何从微观量子动力学中产生仍然是一个悬而未决的问题。虽然量子可观测量的平衡已得到很好的确立，但热力学还依赖于与线性算子不直接相关的变量，而是将其定义为期望值的函数。这些导出量是否以及如何继承平衡特性是一个悬而未决的问题。在这里，我们确定任何平衡期望值的连续可微函数也会平衡。我们将此结果应用于二分孤立系统，表明每个子系统的熵和共轭变量（通过杰恩斯最大熵原理定义）是平衡的。此外，假设它们的平衡性质仅取决于局部守恒量，我们展示了总熵的动态最大化，强制子系统之间的共轭变量相等。\n\n这些结果为熵最大化和热力学平衡条件的出现提供了直接的动力学证明，表明热力学的基本原理遵循量子系统的幺正演化。", "authors": [{"name": "Adalberto D. Varizi"}, {"name": "Daniel Jonathan"}, {"name": "Thiago R. de Oliveira"}], "featured_authors": [{"name": "Adalberto D. Varizi"}, {"name": "Daniel Jonathan"}, {"name": "Thiago R. de Oliveira"}], "author_count": 3}, {"id": "2606.28766", "category": "quant-ph", "title": "Linear and nonlinear optical torque in multi-level atomic systems driven by counter-rotating orbital angular momentum fields", "abstract": "We investigate the generation of optical torque in coherently prepared multi-level atomic media driven by a vector vortex beam composed of two counter-rotating components carrying opposite orbital angular momenta, $+l\\hbar$ and $-l\\hbar$. We consider a three-level $\\Lambda$ configuration and a four-level tripod configuration. Using a perturbative steady-state solution of the optical Bloch equations, we obtain analytical expressions for both linear and nonlinear contributions to the optical torque. The results show that the torque is strongly controlled by atomic coherence, including the initial population imbalance and the relative phase between the vortex components. Nonvanishing torque can arise even when the two components have equal amplitudes, due to coherence-induced asymmetry in the atomic response. In the tripod configuration, the presence of a strong control field leads to electromagnetically induced transparency, which suppresses the torque near resonance and shifts the dominant response to finite detunings. These results establish a route for controlling light-induced rotational dynamics in atomic media using vector vortex fields, with potential applications in coherent optical manipulation and angular-momentum-based control in quantum systems.", "url": "https://arxiv.org/abs/2606.28766", "type": "理论", "summary": "我们研究了由矢量涡旋光束驱动的相干制备的多级原子介质中光学扭矩的产生，该矢量涡旋光束由两个携带相反轨道角动量的反向旋转组件 $+l\\hbar$ 和 $-l\\hbar$ 组成。我们考虑三级 $\\Lambda$ 配置和四级三脚架配置。使用光学布洛赫方程的扰动稳态解，我们获得了光学扭矩的线性和非线性贡献的解析表达式。结果表明，扭矩受到原子相干性的强烈控制，包括初始布居不平衡性和涡旋分量之间的相对相位。由于原子响应中相干性引起的不对称性，即使两个分量具有相等的幅度，也会出现不为零的扭矩。在三脚架配置中，强控制场的存在导致电磁感应透明度，从而抑制共振附近的扭矩并将主要响应转移到有限失谐。\n\n这些结果建立了一条利用矢量涡流场控制原子介质中光致旋转动力学的途径，在量子系统中的相干光学操纵和基于角动量的控制中具有潜在的应用。", "authors": [{"name": "Dharma P. Permana"}, {"name": "Mažena Mackoit Sinkevičienė"}, {"name": "Viačeslav Kudriašov"}, {"name": "Julius Ruseckas"}, {"name": "Gediminas Juzeliünas"}, {"name": "Hamid R. Hamedi"}], "featured_authors": [{"name": "Dharma P. Permana"}, {"name": "Mažena Mackoit Sinkevičienė"}, {"name": "Viačeslav Kudriašov"}, {"name": "Julius Ruseckas"}, {"name": "Gediminas Juzeliünas"}, {"name": "Hamid R. Hamedi"}], "author_count": 6}, {"id": "2606.28866", "category": "quant-ph", "title": "Quantum Variational Approaches to the Maximum Independent Set Problem at Utility Scale", "abstract": "We study variational quantum algorithms for the Maximum Independent Set (MIS) problem on benchmark graphs of 64, 99, and 180 vertices. The Variational Quantum Eigensolver (VQE) and Quantum Approximate Optimization Algorithm (QAOA) are compared across SPSA and COBYLA optimizers at multiple circuit depths. A preprocessing pipeline comprising spectral graph reordering (via the Fiedler vector) and distance-based sparsification reduces circuit depth while preserving energy fidelity. Classical post-processing via history-guided bitstring correction and stepwise maximality extension recovers the exact MIS across all instances. With CVaR optimization, VQE with SPSArecovers up to 6 distinct MIS per run for the 64-node instance and up to 10 distinct MIS per run for the 99-node instance, sampling broadly from the optimal solution population. Repeated runs with different SPSA trajectories collectively enumerate a larger fraction of all MIS for each instance. For the 180-node instance, where standard approaches stall at size 14 (MIS is 15), we introduce ancilla-assisted superposition initialization: ancilla qubits prepare a uniform superposition over classically-found near-optimal solutions, and an excitation-preserving ansatz evolves this state while conserving Hamming weight. This novel construction enables quantum-parallel variational search over multiple seeds simultaneously, discovering the exact MIS where single-seed methods fail. The 180-qubit simulation represents, to our knowledge, the largest scale at which gate-based variational algorithms have solved MIS to optimality. Hardware validation on IBM Quantum hardware ibm_marrakesh confirms that converged simulator parameters transfer effectively to noisy quantum execution.", "url": "https://arxiv.org/abs/2606.28866", "type": "理论+数值", "summary": "我们在 64、99 和 180 个顶点的基准图上研究最大独立集 (MIS) 问题的变分量子算法。在多个电路深度的 SPSA 和 COBYLA 优化器中对变分量子本征求解器 (VQE) 和量子近似优化算法 (QAOA) 进行了比较。预处理管道包括谱图重新排序（通过费德勒矢量）和基于距离的稀疏化，减少电路深度，同时保持能量保真度。通过历史引导的位串校正和逐步最大扩展的经典后处理可在所有实例中恢复精确的 MIS。通过 CVaR 优化，带有 SPSA 的 VQE 在 64 节点实例每次运行时恢复最多 6 个不同的 MIS，在 99 节点实例每次运行恢复最多 10 个不同的 MIS，从最佳解决方案群体中广泛采样。使用不同 SPSA 轨迹的重复运行共同枚举了每个实例的所有 MIS 的较大部分。\n\n对于 180 节点实例，标准方法在大小 14 处停止（MIS 为 15），我们引入了辅助辅助叠加初始化：辅助量子位在经典发现的接近最优解上准备均匀叠加，并且激发保持 ansatz 在保留汉明权重的同时演化此状态。这种新颖的结构能够同时对多个种子进行量子并行变分搜索，从而发现单种子方法失败的确切 MIS。据我们所知，180 量子位模拟代表了基于门的变分算法已解决 MIS 最优问题的最大规模。 IBM Quantum 硬件 ibm_marrakesh 上的硬件验证确认了聚合模拟器参数有效地传输到噪声量子执行。", "authors": [{"name": "Kalyan Dasgupta"}, {"name": "Sumanta Mukherjee"}, {"name": "Dhriti Verma"}, {"name": "Surya Shravan Kumar Sajja"}, {"name": "Abhishek Singh"}, {"name": "Dzung Phan"}, {"name": "Jayant Kalagnanam"}], "featured_authors": [{"name": "Kalyan Dasgupta"}, {"name": "Sumanta Mukherjee"}, {"name": "Dhriti Verma"}, {"name": "Abhishek Singh"}, {"name": "Dzung Phan"}, {"name": "Jayant Kalagnanam"}], "author_count": 7}, {"id": "2606.28952", "category": "quant-ph", "title": "A High-Performance Pauli-Algebra Framework for Large-Scale Quantum Simulations", "abstract": "Efficient manipulation of Pauli-algebraic objects is a key bottleneck in the classical emulation and benchmarking of quantum algorithms for chemistry and many-body physics. This bottleneck appears in Hamiltonian construction, variational ansatz preparation, expectation-value and gradient evaluation, and real-time propagation, all of which require repeated Pauli-algebra operations. Here, we present a high-performance Pauli-algebra framework tailored to quantum many-body and quantum-chemical simulations. The framework combines compact binary symplectic encoding, canonical coefficient reduction, and grouped sparse operator representations that exploit shared bit-flip patterns among Pauli strings. The resulting Julia/C\\texttt{++} implementation accelerates Pauli multiplication, Hamiltonian construction, and operator--state multiplication in sparse and symmetry-adapted many-electron spaces. Benchmarks demonstrate efficient Hamiltonian construction, large-active-space VQE and ADAPT-VQE calculations, and real-time variational dynamics on modern multicore CPU and GPU architectures. These results show that structure-aware Pauli-algebra engines provide a scalable classical backend for developing and benchmarking quantum algorithms in quantum chemistry and many-body simulation.", "url": "https://arxiv.org/abs/2606.28952", "type": "理论+数值", "summary": "泡利代数对象的有效操作是化学和多体物理量子算法的经典仿真和基准测试的关键瓶颈。这个瓶颈出现在哈密顿构造、变分拟似准备、期望值和梯度评估以及实时传播中，所有这些都需要重复的泡利代数运算。在这里，我们提出了一个专为量子多体和量子化学模拟而定制的高性能泡利代数框架。该框架结合了紧凑的二进制辛编码、规范系数缩减和利用泡利字符串之间共享位翻转模式的分组稀疏运算符表示。由此产生的 Julia/C\\texttt{++} 实现加速了稀疏和对称适应多电子空间中的泡利乘法、哈密顿构造和运算符状态乘法。基准测试展示了现代多核 CPU 和 GPU 架构上的高效哈密顿构造、大活动空间 VQE 和 ADAPT-VQE 计算以及实时变分动力学。\n\n这些结果表明，结构感知泡利代数引擎为量子化学和多体模拟中的量子算法的开发和基准测试提供了可扩展的经典后端。", "authors": [{"name": "Xiaopeng Li"}, {"name": "Zhijie Sun"}, {"name": "Yi Fan"}, {"name": "Jie Liu"}, {"name": "Zhenyu Li"}, {"name": "Jinlong Yang"}], "featured_authors": [{"name": "Xiaopeng Li"}, {"name": "Zhijie Sun"}, {"name": "Yi Fan"}, {"name": "Jie Liu"}, {"name": "Zhenyu Li"}, {"name": "Jinlong Yang"}], "author_count": 6}, {"id": "2606.28997", "category": "quant-ph", "title": "Quantum Primitive for Output-Hiding Function Sharing: QKD and Joint Computation Applications", "abstract": "Applications of the proposed primitive: Quantum Primitive for Output-Hiding Function Sharing, are discussed for secure quantum communications and computation protocols. In particular, QKD applications provide notable enhanced security and efficiency properties relative to status-quo protocols. Additionally, we provide examples when parties may wish to encode joint functions, or decisions, which remain information-theoretically hidden from external parties and those internal to the quantum system, without additional private keys, hidden randomness, or classical communication. In particular these applications may be useful in domains such as; financial transactions, joint signaling or coordination decisions, and navigation systems, among others.", "url": "https://arxiv.org/abs/2606.28997", "type": "理论", "summary": "讨论了所提出的原语：用于输出隐藏功能共享的量子原语在安全量子通信和计算协议中的应用。特别是，相对于现状协议，QKD 应用程序提供了显着增强的安全性和效率特性。此外，我们还提供了各方可能希望对联合功能或决策进行编码的示例，这些功能或决策在理论上对外部各方和量子系统内部的各方保持信息隐藏，无需额外的私钥、隐藏随机性或经典通信。特别是，这些应用程序可能在以下领域有用：金融交易、联合信号或协调决策以及导航系统等。", "authors": [{"name": "Olivia R. Hartzell"}], "featured_authors": [{"name": "Olivia R. Hartzell"}], "author_count": 1}, {"id": "2606.29035", "category": "quant-ph", "title": "Quantifying Quantum Correlations in Annihilation Photon Pairs under Compton Scattering", "abstract": "We present a theoretical study of the evolution of polarization entanglement and quantum coherence in 511 keV photon pairs produced by para-positronium decay during successive Compton scattering events. We start with a maximally entangled Bell state and employ the generalized Stokes-Mueller formalism to derive the two-photon density matrix following single-, double-, and triple-Compton scattering, explicitly considering both polar and azimuthal scattering geometries. Using this framework, we quantify the degradation of quantum correlations through concurrence (as a measure of entanglement) and the $l_1$-norm (as a measure of coherence). Our results demonstrate that entanglement is highly sensitive to the scattering geometry and disappears near right-angle scattering, while quantum coherence remains finite even in regimes where entanglement vanishes completely. These findings provide a unified description of polarization-dependent decoherence in annihilation photon pairs and clarify the distinct roles of entanglement and coherence in realistic two-photon interactions. These results are relevant for quantum-enhanced positron emission tomography and highlight the persistence of quantum resources in scattering-dominated media.", "url": "https://arxiv.org/abs/2606.29035", "type": "理论", "summary": "我们提出了对连续康普顿散射事件期间对正电子衰变产生的 511 keV 光子对中偏振纠缠和量子相干性演化的理论研究。我们从最大纠缠贝尔态开始，并采用广义斯托克斯-穆勒形式主义来推导单、双和三康普顿散射后的双光子密度矩阵，明确考虑极性和方位角散射几何形状。使用这个框架，我们通过并发性（作为纠缠的度量）和 $l_1$-范数（作为相干性的度量）来量化量子相关性的退化。我们的结果表明，纠缠对散射几何形状高度敏感，并且在直角散射附近消失，而即使在纠缠完全消失的情况下，量子相干性仍然是有限的。这些发现提供了湮没光子对中偏振相关退相干的统一描述，并阐明了现实双光子相互作用中纠缠和相干的不同作用。\n\n这些结果与量子增强正电子发射断层扫描相关，并强调了量子资源在散射主导介质中的持久性。", "authors": [{"name": "Z. AskariPour Ravari"}, {"name": "Z. Riazi"}], "featured_authors": [{"name": "Z. AskariPour Ravari"}, {"name": "Z. Riazi"}], "author_count": 2}, {"id": "2606.29133", "category": "quant-ph", "title": "Shadow tomography for classical tensor network simulations", "abstract": "Shadow tomography has appeared as a powerful tool for estimating observables on quantum computers from a small number of samples. We show that shadow-tomography-inspired ideas can offer similarly improved sample scaling for estimating observables on tensor network states on classical computers after proper adaptation. We develop strategies for both spin (bosonic) and fermionic systems, tailored to the contraction requirements of tensor networks, and generate scaling improvements of factors of $O(N)$ to $O(N^{3})$ (where $N$ is system size), depending on the specific task and system type. For the important and difficult task of evaluating the expectation value of long-range interacting Hamiltonians, we achieve the optimal $O(1)$ overall scaling (up to logarithmic factors) for an arbitrarily fixed relative Monte Carlo error in both spin and fermionic systems. Additionally, we show that shadow estimators offer more stable gradients of observables in variational optimization tasks than standard Monte Carlo estimators. We demonstrate practical advantage by simulating systems with long-range interactions, including the 2D long-range Heisenberg model and an ab-initio quantum chemistry Hamiltonian.", "url": "https://arxiv.org/abs/2606.29133", "type": "理论+数值", "summary": "阴影断层扫描已成为一种强大的工具，可用于从少量样本中估计量子计算机上的可观测值。我们表明，在适当的调整后，受阴影断层扫描启发的想法可以提供类似改进的样本缩放，用于估计经典计算机上张量网络状态的可观测值。我们为自旋（玻色子）和费米子系统制定策略，根据张量网络的收缩要求进行定制，并根据具体任务和系统类型生成 $O(N)$ 到 $O(N^{3})$ 因子的缩放改进（其中 $N$ 是系统大小）。对于评估远程相互作用哈密顿量的期望值这一重要而困难的任务，我们在自旋和费米子系统中实现了任意固定的相对蒙特卡罗误差的最佳 $O(1)$ 整体缩放（最多对数因子）。此外，我们还表明，与标准蒙特卡洛估计器相比，影子估计器在变分优化任务中提供了更稳定的可观测梯度。\n\n我们通过模拟具有长程相互作用的系统（包括二维长程海森堡模型和从头算量子化学哈密顿量）来展示实际优势。", "authors": [{"name": "Jiace Sun"}, {"name": "Garnet Kin-Lic Chan"}], "featured_authors": [{"name": "Jiace Sun"}, {"name": "Garnet Kin-Lic Chan"}], "author_count": 2}, {"id": "2606.29137", "category": "quant-ph", "title": "Quantum scrambling of algebras of observables: the $\\mathbb{Z}_2$-symmetric case", "abstract": "We consider unitary quantum scrambling for an entire class of observable algebras $\\mathcal A$ whose commutant ${\\mathcal A}'=\\mathbb{C}\\mathbb{Z}_2$ is generated by a Hermitian involution $S$, i.e., a parity operator. We adopt two different, although related, scrambling measures: (a) the algebraic out-of-time-order correlator (A-OTOC) introduced in [Andreadakis, Anand, and Zanardi, Phys. Rev. A 107, 042217 (2023)], and (b) a Slater-determinant-type quantity, dubbed the Plücker fidelity, obtained by embedding operator algebras into a higher-dimensional projective operator space. Both measures admit a simple geometric interpretation in terms of distances between algebras and their dynamical images. Moreover, they can be expressed in terms of the norm of the $\\mathbb{Z}_2$-symmetry-breaking component of the unitary, which is in turn controlled by the time autocorrelation function of the $\\mathbb{Z}_2$ generator $S$. We derive exact expressions for the A-OTOC and the Plücker fidelity in the general case, as well as their values for a random unitary. For Hamiltonian-generated channels, we compute their long-time averages, as well as the typical values of these long-time averages for random generators $S$. Finally, we numerically explore the results of our formalism for interacting spin chains in different phases and for different physical parity operators.", "url": "https://arxiv.org/abs/2606.29137", "type": "理论+数值", "summary": "我们考虑一整类可观测代数 $\\mathcal A$ 的酉量子置乱，其交换子 ${\\mathcal A}'=\\mathbb{C}\\mathbb{Z}_2$ 由埃尔米特对合 $S$（即奇偶校验算子）生成。我们采用两种不同但相关的置乱措施：（a）代数乱序相关器（A-OTOC）在[Andreadakis，Anand和Zanardi，Phys. Rev. A 107, 042217 (2023)]，以及 (b) 一个 Slater 行列式量，称为 Plücker 保真度，通过将算子代数嵌入到高维射影算子空间中获得。这两种度量都允许对代数与其动态图像之间的距离进行简单的几何解释。此外，它们可以用酉元的 $\\mathbb{Z}_2$ 对称破缺分量的范数来表示，而该范数又由 $\\mathbb{Z}_2$ 生成器 $S$ 的时间自相关函数控制。我们推导出一般情况下 A-OTOC 和 Plücker 保真度的精确表达式，以及它们的随机酉值。\n\n对于哈密顿量生成的通道，我们计算它们的长期平均值，以及随机生成器 $S$ 的这些长期平均值的典型值。最后，我们以数值方式探索了不同阶段和不同物理奇偶校验运算符相互作用的自旋链的形式主义结果。", "authors": [{"name": "Paolo Zanardi"}, {"name": "J. Karson Lewis"}], "featured_authors": [{"name": "Paolo Zanardi"}, {"name": "J. Karson Lewis"}], "author_count": 2}, {"id": "2606.29144", "category": "quant-ph", "title": "Gaussian quantum steering of coupled three-mode squeezed vacuum in an expanding universe", "abstract": "The coupled three-mode squeezed vacuum is a representative multimode squeezed Gaussian state featuring unique steerability. This work investigates Gaussian quantum steering distributions of the coupled three-mode squeezed vacuum under an expanding universe. Due to causal separation between the interior and exterior spacetime regions, quantum information behind the event horizon is inaccessible to Alice, Bob and Charlie. We separately analyze steering behaviors for physically accessible and inaccessible modes. Our analysis shows that greater total mean photon number and momentum, combined with reduced expansion volume and expansion rate, enhance quantum steering strength. Notably, Gaussian quantum steering for physically inaccessible modes undergoes the \"sudden death\" phenomenon when a critical threshold parameter $\\phi$ is exceeded. These results deliver novel insights into quantum correlations in curved spacetime.", "url": "https://arxiv.org/abs/2606.29144", "type": "理论", "summary": "耦合三模压缩真空是典型的多模压缩高斯态，具有独特的可操纵性。这项工作研究了膨胀宇宙下耦合三模压缩真空的高斯量子转向分布。由于内部和外部时空区域之间的因果分离，爱丽丝、鲍勃和查理无法访问事件视界后面的量子信息。我们分别分析物理可访问和不可访问模式的转向行为。我们的分析表明，更大的总平均光子数和动量，加上减小的膨胀体积和膨胀率，增强了量子转向强度。值得注意的是，当超过临界阈值参数 $\\phi$ 时，物理上无法访问模式的高斯量子转向会经历“突然死亡”现象。这些结果为弯曲时空中的量子相关性提供了新颖的见解。", "authors": [{"name": "Guang-Wei Mi"}, {"name": "Xiaofen Huang"}, {"name": "Tinggui Zhang"}], "featured_authors": [{"name": "Guang-Wei Mi"}, {"name": "Xiaofen Huang"}, {"name": "Tinggui Zhang"}], "author_count": 3}, {"id": "2606.29235", "category": "quant-ph", "title": "Imaginary pseudo entropy encodes temporal orientation", "abstract": "Pseudo entropy between quantum states at different times is generally complex, yet its imaginary part has lacked a bounded operational meaning. We show that a calibrated replica interferometer converts the pseudo-Rényi phase into a directly measurable record of transition orientation. Together with replica visibility, it exactly determines the trace distance between forward and backward ancilla outputs and hence the Helstrom-optimal single-shot success probability. At short times, the symmetrized covariance of the modular and physical Hamiltonians sets the initial distinguishability response. Under any common quantum channel, the corresponding orientation information can only decrease, with equality characterized by Petz recovery. Imaginary pseudo entropy therefore records a reversible distinction between temporal orientations, while coarse graining can make the loss of that record irreversible.", "url": "https://arxiv.org/abs/2606.29235", "type": "理论", "summary": "不同时刻量子态之间的伪熵通常很复杂，但其虚部缺乏有界的运算意义。我们展示了校准的复制干涉仪将伪 Rényi 相位转换为可直接测量的过渡方向记录。与副本可见性一起，它准确地确定了前向和后向辅助输出之间的跟踪距离，从而确定了 Helstrom 最佳单次成功概率。在短时间内，模哈密顿量和物理哈密顿量的对称协方差设置了初始可区分性响应。在任何公共量子通道下，相应的方向信息只能减少，具有以Petz恢复为特征的等式。因此，虚构的伪熵记录了时间方向之间的可逆区别，而粗粒度可以使该记录的丢失不可逆转。", "authors": [{"name": "Tatsuhiro Misumi"}], "featured_authors": [{"name": "Tatsuhiro Misumi"}], "author_count": 1}, {"id": "2606.29276", "category": "quant-ph", "title": "Quantum algorithm for the nonlinear Schrödinger equation via the Lax-pair scattering", "abstract": "The nonlinear Schrödinger equation (NLSE) governs a broad class of wave phenomena, including deep-water waves, quantum turbulence, and solitons. The multiscale spatiotemporal coupling inherent in these systems imposes severe computational bottlenecks on classical high-fidelity numerical simulations. While quantum computing offers the potential for exponential speedup, its unitary dynamics pose a fundamental challenge to solve the NLSE. We propose a quantum framework based on the Lax-pair scattering for solving the 1D NLSE. Specifically, the physical field is first mapped into the spectral space via a quantum direct scattering circuit. Following a decoupled linear time evolution, the physical solution is reconstructed through an inverse scattering transform utilizing the quantum singular value transformation. Since the temporal evolution is performed analytically in the scattering domain, the framework bypasses iterative time stepping, rendering it highly advantageous for long-time simulations. To demonstrate the accuracy and noise resilience of this approach, we simulate a Gaussian wave packet under quantum noise, two-soliton collisions, breather dynamics, and modulational instability on a quantum emulator.", "url": "https://arxiv.org/abs/2606.29276", "type": "理论+数值", "summary": "非线性薛定谔方程 (NLSE) 控制着广泛的波动现象，包括深水波、量子湍流和孤子。这些系统固有的多尺度时空耦合给经典的高保真数值模拟带来了严重的计算瓶颈。虽然量子计算提供了指数加速的潜力，但其单一动力学对解决 NLSE 提出了根本性挑战。我们提出了一种基于 Lax 对散射的量子框架来求解一维 NLSE。具体来说，物理场首先通过量子直接散射电路映射到光谱空间。在解耦的线性时间演化之后，利用量子奇异值变换通过逆散射变换来重建物理解。由于时间演化是在散射域中分析执行的，因此该框架绕过了迭代时间步进，使其对于长时间模拟非常有利。\n\n为了证明这种方法的准确性和噪声恢复能力，我们在量子模拟器上模拟了量子噪声、两个孤子碰撞、呼吸动力学和调制不稳定性下的高斯波包。", "authors": [{"name": "Chenjia Zhu"}, {"name": "Zhaoyuan Meng"}, {"name": "Yousheng Zhang"}, {"name": "Yue Yang"}], "featured_authors": [{"name": "Chenjia Zhu"}, {"name": "Zhaoyuan Meng"}, {"name": "Yousheng Zhang"}, {"name": "Yue Yang"}], "author_count": 4}, {"id": "2606.29293", "category": "quant-ph", "title": "Private training in quantum machine learning", "abstract": "With the emergence of machine learning (ML) models trained on large datasets containing potentially sensitive data, a major question in AI safety is how to make learning private with respect to the training data. Similar to classical machine learning, quantum machine learning (QML) models are not devoid of privacy vulnerabilities. Differential privacy (DP) is a standard tool for training ML models on sensitive data, but its impact in QML remains poorly understood. In this work we study private training in hybrid variational QML models using a classical private DP-SGD optimizer applied to pipelines with classical inputs and outputs. We analyze the interplay between gradient clipping and calibrated noise addition in DP-SGD, and its impact on optimization and accuracy for noisy and noiseless quantum models. We first explain why quantum noise does not provide a satisfactory replacement for the calibrated noise in DP-SGD for ensuring privacy. We then show how the deterministic bounds on gradient norms for a wide class of quantum models translate into explicit control of the detrimental clipping bias introduced by DP-SGD. Finally, we formulate a numerical comparison protocol under fixed clipping threshold and privacy budget and evaluate it on synthetic and image-classification tasks for equivalent quantum and classical models. Our results suggest that quantum models can retain higher accuracy in private-training regimes where the formal privacy guarantee is ensured by a classical DP-SGD mechanism.", "url": "https://arxiv.org/abs/2606.29293", "type": "理论+数值", "summary": "随着在包含潜在敏感数据的大型数据集上训练的机器学习 (ML) 模型的出现，人工智能安全的一个主要问题是如何使训练数据的学习变得私密。与经典机器学习类似，量子机器学习（QML）模型也不排除隐私漏洞。差分隐私 (DP) 是针对敏感数据训练 ML 模型的标准工具，但其对 QML 的影响仍知之甚少。在这项工作中，我们使用应用于具有经典输入和输出的管道的经典私有 DP-SGD 优化器来研究混合变分 QML 模型中的私有训练。我们分析了 DP-SGD 中梯度限幅和校准噪声添加之间的相互作用，及其对有噪声和无噪声量子模型的优化和准确性的影响。我们首先解释为什么量子噪声不能令人满意地替代 DP-SGD 中的校准噪声以确保隐私。然后，我们展示了各种量子模型的梯度范数的确定性界限如何转化为对 DP-SGD 引入的有害削波偏差的显式控制。\n\n最后，我们在固定裁剪阈值和隐私预算下制定了数值比较协议，并在等效量子和经典模型的合成和图像分类任务上对其进行了评估。我们的结果表明，量子模型可以在私人训练制度中保持更高的准确性，其中通过经典的 DP-SGD 机制确保正式的隐私保证。", "authors": [{"name": "Tigran Sedrakyan"}, {"name": "Frédéric Grosshans"}, {"name": "Elham Kashefi"}], "featured_authors": [{"name": "Tigran Sedrakyan"}, {"name": "Frédéric Grosshans"}, {"name": "Elham Kashefi"}], "author_count": 3}, {"id": "2606.29304", "category": "quant-ph", "title": "Volume Law and Universality of Entanglement Entropy in Random Graph Fermi Systems", "abstract": "We study the ground-state entanglement entropy of free fermions on the Erdős--Rényi random graph, where each of the possible edges is present independently with some probability. Using random matrix theory and asymptotic freeness, we prove that the ground-state entanglement entropy obeys an exact volume law in the thermodynamic limit. The entanglement density, with a universal coefficient that is independent of the edge probability and the microscopic details of the graph. This coefficient is confirmed numerically to take the value approximately $0.386$ nats, strictly below the Page value. The volume law therefore reflects the absence of geometric locality in the random graph.", "url": "https://arxiv.org/abs/2606.29304", "type": "理论+数值", "summary": "我们研究了 Erdős-Rényi 随机图上自由费米子的基态纠缠熵，其中每个可能的边都以一定的概率独立存在。利用随机矩阵理论和渐近自由度，我们证明了基态纠缠熵在热力学极限内遵循精确的体积定律。纠缠密度，具有独立于边缘概率和图的微观细节的通用系数。该系数在数值上被确认为大约 $0.386$ nat，严格低于 Page 值。因此，体积定律反映了随机图中不存在几何局部性。", "authors": [{"name": "Saikat Sur"}], "featured_authors": [{"name": "Saikat Sur"}], "author_count": 1}, {"id": "2606.29312", "category": "quant-ph", "title": "Intrinsic Indistinguishability of Identical Particles and How Particle Labels Affect It", "abstract": "We investigate indistinguishability of identical bosons and fermions undergoing arbitrary particle-number-preserving evolutions of their visible degrees of freedom. For the projective indistinguishability measure, defined by the projection of the visible state onto the symmetric/anti-symmetric subspace, we derive an equivalent expression in terms of the dynamically invariant internal state. We further generalize the textbook symmetrization/anti-symmetrization framework for bosons and fermions to arbitrary partial distinguishability by deriving an explicit reconstruction formula for the multiparticle visible state in terms of the indistinguishability function encoding the dynamical invariants. We give complete characterization of the class-functions of indistinguishability by projective measures on generalized symmetries. Finally, we reveal a strikingly counterintuitive effect: introducing additional particle label states can increase the multiparticle indistinguishability of identical particles. The effect originates from the cancellation of collective multiparticle phases.", "url": "https://arxiv.org/abs/2606.29312", "type": "理论", "summary": "我们研究了相同玻色子和费米子在其可见自由度上经历任意粒子数保持演化的不可区分性。对于由可见状态到对称/反对称子空间的投影定义的投影不可区分性度量，我们根据动态不变内部状态推导了等效表达式。我们通过根据编码动力学不变量的不可区分性函数推导多粒子可见状态的显式重构公式，进一步将玻色子和费米子的教科书对称化/反对称化框架推广到任意部分可区分性。我们通过广义对称性的投影测度给出了不可区分性类函数的完整表征。最后，我们揭示了一个惊人的违反直觉的效应：引入额外的粒子标签状态可以增加相同粒子的多粒子不可区分性。该效应源自集体多粒子相的抵消。", "authors": [{"name": "Valery Shchesnovich"}], "featured_authors": [{"name": "Valery Shchesnovich"}], "author_count": 1}, {"id": "2606.29325", "category": "quant-ph", "title": "Generic Number-of-Copies Amplification for Pseudorandom States", "abstract": "We show that any quantum pseudorandom state that is secure against single-copy distinguishers, i.e. a $1$-PRS, can be amplified to $t$-copy security, i.e. to a $t$-PRS, without additional assumptions, for any polynomial $t$ in the security parameter. Prior work (Ananth and Goldin, arXiv 2025) was only able to show this for a restricted class of $1$-PRS constructions, namely ones whose generators only use a small number of ancilla qubits. Technically, we show that by carefully accounting for the randomness that is used in the construction, and using quantum extractors, it is possible to eliminate an ancilla register of any length and obtain a meaningful $t$-PRS outcome.", "url": "https://arxiv.org/abs/2606.29325", "type": "理论", "summary": "我们证明，对于安全参数中的任何多项式 $t$，任何对单副本区分器安全的量子伪随机状态（即 $1$-PRS）都可以放大到 $t$-copy 安全性，即 $t$-PRS，而无需额外的假设。之前的工作（Ananth 和 Goldin，arXiv 2025）只能针对有限类别的 1$-PRS 结构展示这一点，即生成器仅使用少量辅助量子位的结构。从技术上讲，我们表明，通过仔细考虑构造中使用的随机性并使用量子提取器，可以消除任何长度的辅助寄存器并获得有意义的 $t$-PRS 结果。", "authors": [{"name": "Zvika Brakerski"}, {"name": "Miri Zenilman"}], "featured_authors": [{"name": "Zvika Brakerski"}, {"name": "Miri Zenilman"}], "author_count": 2}, {"id": "2606.29475", "category": "quant-ph", "title": "A superconducting qutrit link beyond the qubit limit", "abstract": "Superconducting microwave links have enabled deterministic state transfer and remote entanglement between qubits, but deterministic links have so far operated with an effectively two-dimensional transmitted Hilbert space. Here we demonstrate a superconducting qutrit link between two independently packaged nodes connected by a microwave channel. Each node combines a transmon qutrit, a transmission resonator, and a tunable Purcell-filter interface, allowing the two remote microwave-photon interfaces to be matched in both frequency and bandwidth. We implement two transition-selective photon-mediated operations that transfer the $|e\\rangle$ and $|f\\rangle$ qutrit components in distinct temporal modes of the same channel. We tomographically characterize arbitrary qutrit-state transfer, obtaining a mean transferred-state fidelity of 83.68% and a qutrit process fidelity of 77.12%, exceeding both the classical qutrit-transfer benchmark and the best possible average fidelity of an effective qubit channel used to transmit an arbitrary qutrit. Using partial-transfer operations, we reconstruct a remote two-qutrit state with negativity 0.730, a tomography-inferred dense-coding capacity of 2.273 bits, and a tomography-inferred Collins-Gisin-Linden-Massar-Popescu (CGLMP) parameter $I_3=2.332$, all beyond the corresponding qubit or local bounds. These results demonstrate a superconducting microwave link that uses the native three-level structure of transmons as a genuine high-dimensional communication resource.", "url": "https://arxiv.org/abs/2606.29475", "type": "理论", "summary": "超导微波链路已经实现了量子位之间的确定性状态转移和远程纠缠，但到目前为止，确定性链路一直在有效的二维传输希尔伯特空间下运行。在这里，我们演示了通过微波通道连接的两个独立封装节点之间的超导 Qutrit 链路。每个节点都结合了一个传输谐振器、一个传输谐振器和一个可调谐珀塞尔滤波器接口，允许两个远程微波光子接口在频率和带宽上匹配。我们实现了两种跃迁选择性光子介导的操作，它们以同一通道的不同时间模式传输 $|e\\rangle$ 和 $|f\\rangle$ qutrit 分量。我们通过断层扫描表征了任意 qutrit 状态转移，获得了 83.68% 的平均转移状态保真度和 77.12% 的 qutrit 过程保真度，超过了经典的 qutrit 转移基准和用于传输任意 qutrit 的有效量子位通道的最佳平均保真度。\n\n使用部分传输操作，我们重建了一个负数为 0.730 的远程二量子态，断层扫描推断的密集编码容量为 2.273 位，以及断层扫描推断的 Collins-Gisin-Linden-Massar-Popescu (CGLMP) 参数 $I_3=2.332$，所有这些都超出了相应的量子位或局部边界。这些结果证明了一种超导微波链路，它使用 Transmons 的原生三层结构作为真正的高维通信资源。", "authors": [{"name": "Xiang Li"}, {"name": "Zheng-Yang Mei"}, {"name": "Yang He"}, {"name":
