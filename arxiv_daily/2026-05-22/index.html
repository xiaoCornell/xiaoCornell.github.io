he case of $\\mathfrak{su}_2$ CG chords could be associated to Reeb chords in a knot contact homology (KCH) framework. KCH suggests its own analogue of A-polynomials known as augmentation polynomials allowed to have extra spurious roots in principle. Yet the CG chord formalism could be easily extended to arbitrary $\\mathfrak{su}_N$ allowing us to generalize the construction of A(ugmentation)-polynomials to arbitrary $\\mathfrak{su}_N$ and arbitrary representation as well. Primarily we aim at classical A-polynomials by considering a double scaling limit when $q=e^{\\hbar}$, $\\hbar\\to 0$ and the representations are huge, in particular, highest weight vector components $w_i\\to \\infty$ so that $\\hbar w_i\\sim m_i$ remain finite. Still we expect the presented techniques would be helpful in deriving quantum A-polynomials for arbitrary Lie (super)algebras $\\mathfrak{g}$. Also we discuss explicit examples of A-polynomials for knots $3_1$, $4_1$ and $5_1$ for $\\mathfrak{g}=\\mathfrak{su}_3$.", "url": "https://arxiv.org/abs/2605.22560", "type": "理论", "summary": "经典 A 多项式 $A(\\ell,m)$ 定义对 $SL(2,\\mathbb{C})$ 中坐标 $\\ell$ 和 $m$ 的约束（$SU(2)$ 的复杂化）与结补码 $S^3\\setminus K$ 相关的字符变体。量子 A 多项式 $\\hat A(\\hat \\ell,\\hat m)$ 是差分算子，它消灭琼斯多项式，被认为表示 3d Chern-Simons 理论的波函数，规范组 $SU(2)$ 在围绕结 $K$ 股的环形管上 - 结的边界补充 $S^3\\setminus K$。我们建议构造与李群 $SU(N)$ 相关的经典阴影 A 多项式 $A_a(\\ell_b,m_c)$。我们利用 Clebsh-Gordan (CG) 和弦的形式，其中索引 $a$、$b$、$c$ 超过 $1,\\ldots,N-1$。 CG 弦在 WZW 类型的 2d CFT 方面有一个自然的解释，或者，在量子群 $U_q(\\mathfrak{su}_N)$ 方面有一个自然的解释。在 $\\mathfrak{su}_2$ 的情况下，CG 和弦可以与结接触同源 (KCH) 框架中的 Reeb 和弦相关联。 KCH 建议其自己的 A 多项式类似物（称为增广多项式）原则上允许具有额外的杂散根。\n\n然而，CG 和弦形式可以很容易地扩展到任意 $\\mathfrak{su}_N$ ，允许我们将 A(ugmentation)-多项式的构造推广到任意 $\\mathfrak{su}_N$ 和任意表示。我们主要针对经典 A 多项式，在 $q=e^{\\hbar}$、$\\hbar\\to 0$ 时考虑双重缩放限制，并且表示形式很大，特别是最高权重向量分量 $w_i\\to \\infty$，以便 $\\hbar w_i\\sim m_i$ 保持有限。尽管如此，我们仍然期望所提出的技术将有助于推导任意李（超）代数 $\\mathfrak{g}$ 的量子 A 多项式。我们还讨论了 $\\mathfrak{g}=\\mathfrak{su}_3$ 的结 $3_1$、$4_1$ 和 $5_1$ 的 A 多项式的显式示例。", "authors": [{"name": "Dmitry Galakhov"}, {"name": "Alexei Morozov"}], "featured_authors": [{"name": "Dmitry Galakhov"}, {"name": "Alexei Morozov"}], "author_count": 2}, {"id": "2605.22628", "category": "hep-th", "title": "Ising surface defects can get dirty", "abstract": "Real critical systems, such as uniaxial ferromagnets in the 3d Ising universality class, are constrained by boundaries and subject to random couplings. We consider the Wilson-Fisher fixed point in $4-\\epsilon$ dimensions subject to a random magnetic field localized on a two-dimensional surface, which becomes co-dimension 1 in the physical $\\epsilon\\to1$ limit. Using the replica method for the disordered field, we find that the ordinary boundary condition is stable under disorder but also discover a non-trivial ``dirty\" boundary condition which can be reached by tuning the disorder strength or the local temperature. We also investigate the logarithmic structure of the defect spectrum and how it emerges via the replica formalism.", "url": "https://arxiv.org/abs/2605.22628", "type": "理论", "summary": "真正的关键系统，例如 3d 伊辛通用类中的单轴铁磁体，受到边界约束并受到随机耦合的影响。我们考虑 $4-\\epsilon$ 维度中的 Wilson-Fisher 不动点，该点受到位于二维表面上的随机磁场的影响，该磁场在物理 $\\epsilon\\to1$ 极限中成为共维 1。使用无序场的复制方法，我们发现普通边界条件在无序情况下是稳定的，但也发现了一个非平凡的“脏”边界条件，可以通过调整无序强度或局部温度来达到。我们还研究了缺陷谱的对数结构以及它是如何通过复制形式出现的。", "authors": [{"name": "António Antunes"}, {"name": "Apratim Kaviraj"}, {"name": "Baishali Roy"}], "featured_authors": [{"name": "António Antunes"}, {"name": "Apratim Kaviraj"}, {"name": "Baishali Roy"}], "author_count": 3}, {"id": "2605.22822", "category": "hep-th", "title": "Bottom-up open EFT for non-Abelian gauge theory with dynamical color environment", "abstract": "We develop a bottom-up open effective field theory (EFT) for non-Abelian gauge theories within the Schwinger--Keldysh formalism. Instead of integrating out the environment completely and starting from a nonlocal influence functional, we retain the slow environmental response variables explicitly and construct a local system-environment EFT. The environmental sector is described by a dynamical color-frame variable, Stückelberg-like field, and an associated color-current sector, which gives the nontrivial interactions and dissipation between the system and the environment. The resulting construction provides a gauge-covariant Markov embedding of nonlocal and non-Markovian color response. After integrating out the retained environmental variables with retarded boundary conditions, the reduced system theory acquires nonlocal dissipative kernels and stochastic sources. We show that the hard thermal loop response arises naturally as a particular realization of the retained environmental response. Our framework provides a local open-EFT description of color transport, memory effects, and fluctuation-dissipation structure in non-Abelian plasmas, and offers a systematic starting point for dissipative Yang--Mills EFTs with dynamical environments.", "url": "https://arxiv.org/abs/2605.22822", "type": "理论", "summary": "我们为施温格-凯尔迪什形式主义中的非阿贝尔规范理论开发了自下而上的开放有效场论（EFT）。我们没有完全整合环境并从非局部影响函数开始，而是明确保留缓慢的环境响应变量并构建局部系统环境 EFT。环境部分由动态颜色框架变量、类 Stückelberg 场和相关的颜色电流部分来描述，它给出了系统与环境之间的重要相互作用和耗散。由此产生的结构提供了非局部和非马尔可夫颜色响应的规范协变马尔可夫嵌入。将保留的环境变量与延迟边界条件积分后，简化系统理论获得非局域耗散核和随机源。我们表明，硬热环路响应是作为保留环境响应的特定实现而自然产生的。\n\n我们的框架提供了非阿贝尔等离子体中颜色传输、记忆效应和涨落耗散结构的局部开放 EFT 描述，并为动态环境下的耗散 Yang--Mills EFT 提供了系统的起点。", "authors": [{"name": "Yoshihiko Abe"}, {"name": "Kanji Nishii"}], "featured_authors": [{"name": "Yoshihiko Abe"}, {"name": "Kanji Nishii"}], "author_count": 2}, {"id": "2605.21508", "category": "math-ph", "title": "A Metric-Deformed $q$-Gauge Dirac Equation", "abstract": "We construct a family of metric-deformed gauge theories based on a recently introduced $q$-Dirac operator $D_q = \\gamma^\\mu \\sqrt{|g^{\\mu\\mu}|}\\partial_\\mu$, which arises from a deformed D'Alembertian $\\Box_q = |g^{00}|\\partial_t^2 - \\sum_i |g^{ii}|\\partial_i^2$. The deformation parameter $q$ is related to the metric components via $q_\\mu = \\sqrt{|g^{\\mu\\mu}|}$. By promoting $g^{\\mu\\mu}(x)$ to spacetime-dependent background fields, we define a deformed covariant derivative $D_\\mu^{(q)} = \\partial_\\mu + ieA_\\mu(x)/\\sqrt{|g^{\\mu\\mu}(x)|}$ (no sum over $\\mu$). The corresponding field strength $F_{\\mu\\nu}^{(q)} = [D_\\mu^{(q)}, D_\\nu^{(q)}]$ acquires new terms proportional to $\\partial_\\mu(1/\\sqrt{|g^{\\nu\\nu}|})$, which vanish for constant metrics. We write down gauge-invariant actions for deformed Yang-Mills theory and for fermions minimally coupled to $D_\\mu^{(q)}$. This work provides a mathematical foundation for $q$-deformed gauge theories from a metric perspective.", "url": "https://arxiv.org/abs/2605.21508", "type": "理论", "summary": "我们基于最近引入的 $q$-狄拉克算子 $D_q = \\gamma^\\mu \\sqrt{|g^{\\mu\\mu}|}\\partial_\\mu$ 构建了一系列度量变形规范理论，该算子源自变形的达朗伯 $\\Box_q = |g^{00}|\\partial_t^2 - \\sum_i |g^{ii}|\\partial_i^2$。变形参数 $q$ 通过 $q_\\mu = \\sqrt{|g^{\\mu\\mu}|}$ 与度量分量相关。通过将 $g^{\\mu\\mu}(x)$ 推广到时空相关的背景场，我们定义了变形协变导数 $D_\\mu^{(q)} = \\partial_\\mu + ieA_\\mu(x)/\\sqrt{|g^{\\mu\\mu}(x)|}$ （没有超过 $\\mu$ 的总和）。相应的场强 $F_{\\mu\\nu}^{(q)} = [D_\\mu^{(q)}, D_\\nu^{(q)}]$ 获得与 $\\partial_\\mu(1/\\sqrt{|g^{\\nu\\nu}|})$ 成正比的新项，对于常数度量，这些项消失。我们写下变形杨米尔斯理论和与 $D_\\mu^{(q)}$ 最小耦合的费米子的规范不变作用。这项工作从度量角度为 $q$ 变形规范理论提供了数学基础。", "authors": [{"name": "Julio César Jaramillo Quiceno"}], "featured_authors": [{"name": "Julio César Jaramillo Quiceno"}], "author_count": 1}, {"id": "2605.21749", "category": "math-ph", "title": "Landau-Ginzburg models of generalised Dubrovin-Zhang form and pole collision: Dynkin-type A", "abstract": "In arXiv:1711.05958 , arXiv:2103.12673 , the authors derive one-dimensional Landau-Ginzburg mirrors of Dubrovin-Zhang Frobenius manifolds constructed on regular orbit spaces of an extension of affine Weyl groups. We generalise the method employed, and classify the resulting Frobenius manifold structures in Dynkin type A. We interpret our results in terms of a stratification on the Hurwitz space boundary, and develop a pole-collision framework to compare the Frobenius structures within different strata. With this, we can prove a structural result at the level of the prepotential, for arbitrary rank and dimension, as a suitable renormalised limit of the formulae in arXiv:2412.05165 . As a corollary, a conjecture of Ma and Zuo regarding the form of prepotentials related to doubly-extended affine Weyl groups is proven.", "url": "https://arxiv.org/abs/2605.21749", "type": "理论", "summary": "在 arXiv:1711.05958 和 arXiv:2103.12673 中，作者推导了在仿射 Weyl 群延伸的正则轨道空间上构建的 Dubrovin-Zhang Frobenius 流形的一维 Landau-Ginzburg 镜。我们概括了所采用的方法，并将所得的 Frobenius 流形结构分类为 Dynkin A 型。我们根据 Hurwitz 空间边界上的分层来解释我们的结果，并开发了一个极点碰撞框架来比较不同层内的 Frobenius 结构。由此，我们可以证明任意阶和维数的预势水平的结构结果，作为 arXiv:2412.05165 中公式的合适重整化极限。作为推论，Ma 和 Zuo 关于双扩展仿射 Weyl 群相关的预势形式的猜想得到了证明。", "authors": [{"name": "Alessandro Proserpio"}, {"name": "Karoline van Gemst"}], "featured_authors": [{"name": "Alessandro Proserpio"}, {"name": "Karoline van Gemst"}], "author_count": 2}, {"id": "2605.21890", "category": "math-ph", "title": "Lie symmetries of a generalized Fisher equation in cylindrical coordinates", "abstract": "In this work we studied a generalized Fisher equation in cylindrical coordinate using Lie symmetry method. We have determined for what type of source function the generalized Fisher equation has Lie Symmetries other than time translation symmetry when the diffusion function is given by an exponential function. Also the reduced ordinary differential equations are obtained corresponding to Lie symmetries of the generalized Fisher equation.", "url": "https://arxiv.org/abs/2605.21890", "type": "理论", "summary": "在这项工作中，我们使用李对称方法研究了柱坐标系中的广义 Fisher 方程。当扩散函数由指数函数给出时，我们已经确定对于什么类型的源函数，广义费希尔方程具有除时间平移对称性之外的李对称性。还得到了对应于广义Fisher方程的李对称性的简化常微分方程。", "authors": [{"name": "Bayarjargal Batsukh"}, {"name": "Uuganbayar Zunderiya"}], "featured_authors": [{"name": "Bayarjargal Batsukh"}, {"name": "Uuganbayar Zunderiya"}], "author_count": 2}, {"id": "2605.22023", "category": "math-ph", "title": "Asymptotics of the IDS for Schrödinger operators with singular potentials and Gibbs point processes", "abstract": "The asymptotic behavior of the integrated density of states (IDS), \\(N(E)\\), is investigated for random Schrödinger operators with a single-site potential \\(V\\) satisfying \\(\\mathrm{essinf}\\, V = -\\infty\\). Under the assumption that the underlying point process is a Gibbs point process with repulsive pairwise interactions, the leading term of \\(\\log N(E)\\) as \\(E \\to -\\infty\\) is determined using a periodic approximation method. It is shown that repulsive pairwise interactions lead to a significantly faster decay of \\(N(E)\\) compared to the Poisson case. Furthermore, configurations with multiple clusters can provide the dominant contribution to the IDS in the Gibbs setting, contrasting with the single-cluster dominance typically observed in Poisson models. Finally, refined estimates of the leading constants are provided for specific classes of potentials, including those with multiple singularities.", "url": "https://arxiv.org/abs/2605.22023", "type": "理论", "summary": "研究了具有满足 \\(\\mathrm{essinf}\\, V = -\\infty\\) 的单点势 \\(V\\) 的随机薛定谔算子的积分态密度 (IDS) \\(N(E)\\) 的渐近行为。假设基础点过程是具有排斥配对相互作用的吉布斯点过程，使用周期逼近方法确定 \\(\\log N(E)\\) 的首项为 \\(E \\to -\\infty\\)。结果表明，与泊松情况相比，排斥的成对相互作用导致 \\(N(E)\\) 的衰减速度明显更快。此外，与泊松模型中通常观察到的单簇优势相比，具有多个簇的配置可以为吉布斯设置中的 IDS 提供主要贡献。最后，为特定类别的势（包括具有多个奇点的势）提供了对主要常数的精确估计。", "authors": [{"name": "Yuta Nakagawa"}], "featured_authors": [{"name": "Yuta Nakagawa"}], "author_count": 1}, {"id": "2605.22212", "category": "math-ph", "title": "Global exponential stability for the three-dimensional Navier-Stokes equations on hyperbolic space", "abstract": "We prove that the three-dimensional incompressible Navier-Stokes equations with the deformation Laplacian on hyperbolic 3-space $\\HH^3$ admit a unique global mild solution for sufficiently small initial data in $L^3(\\HH^3)$, and that this solution decays exponentially to zero. The exponential decay rate is $\\mu\\lambda_\\Def^{(3)}$, where $\\mu$ is the dynamic viscosity and $\\lambda_\\Def^{(3)} = 26/9$ is the effective spectral gap of the deformation Laplacian in $L^3$. On flat $\\R^3$, the corresponding Kato-type result gives only algebraic decay. The exponential stability is a macroscopic consequence of the spectral gap provided by negative curvature. We also show that the $L^2$ norm is supercritical on $\\HH^3$ (as on $\\R^3$), with the obstruction arising from the local ultraviolet scaling of the heat kernel, which is insensitive to global geometry. The boundary between what curvature can and cannot improve is located exactly: the Fujita-Kato integral has a scaling exponent $1/2 - 3/(2p)$ that depends only on the integrability of the initial data, not on the geometry of the manifold. For $p \\geq 3$ (the Kato critical space), the integral is bounded and the spectral gap contributes exponential time decay. For $p < 3$, the integral diverges at $t = 0$ (and strictly diverges for all $t>0$ when $p \\le 2$) regardless of the curvature.", "url": "https://arxiv.org/abs/2605.22212", "type": "理论", "summary": "我们证明，双曲 3 空间 $\\HH^3$ 上具有变形拉普拉斯的三维不可压缩纳维斯托克斯方程对于 $L^3(\\HH^3)$ 中足够小的初始数据存在唯一的全局温和解，并且该解以指数方式衰减到零。指数衰减率为$\\mu\\lambda_\\Def^{(3)}$，其中$\\mu$是动态粘度，$\\lambda_\\Def^{(3)} = 26/9$是$L^3$中变形拉普拉斯的有效谱间隙。在平坦的 $\\R^3$ 上，相应的加藤型结果仅给出代数衰减。指数稳定性是负曲率提供的光谱间隙的宏观结果。我们还表明，$L^2$ 范数在 $\\HH^3$ 上是超临界的（与 $\\R^3$ 一样），其阻碍来自于热核的局部紫外线缩放，而热核对全局几何不敏感。曲率可以改善和不能改善之间的界限精确定位：Fujita-Kato 积分的缩放指数为 $1/2 - 3/(2p)$，仅取决于初始数据的可积性，而不取决于流形的几何形状。\n\n对于 $p \\geq 3$ （加藤临界空间），积分是有界的，谱间隙会导致指数时间衰减。对于 $p < 3$，无论曲率如何，积分在 $t = 0$ 处发散（并且当 $p \\le 2$ 时，所有 $t>0$ 严格发散）。", "authors": [{"name": "Zhi-Wei Wang"}, {"name": "Samuel L. Braunstein"}], "featured_authors": [{"name": "Zhi-Wei Wang"}, {"name": "Samuel L. Braunstein"}], "author_count": 2}, {"id": "2605.22436", "category": "math-ph", "title": "A perturbative approach to the Wetterich equation for Bosonic and Fermionic interacting fields", "abstract": "We study the Lorentzian Wetterich Renormalization Group (RG) flow equation for interacting quantum fields on curved backgrounds within the framework of perturbative Algebraic Quantum Field Theory (pAQFT). Specifically, we consider two classes of models: two mutually interacting scalar fields on globally hyperbolic spacetimes without boundary and, under the further assumption that the underlying background is spin, self-interacting Dirac fields. In both cases, we derive the corresponding RG flow equations within a Local Potential Approximation and compute the beta functions for the relevant couplings. For the scalar model, we also discuss an asymmetric interaction potential which is formally reminiscent of the Martin-Siggia-Rose description of a stochastic dynamics, thereby indicating a possible connection between Lorentzian algebraic RG methods [DDP+24] and stochastic field-theoretic models, [Duc25]. In addition, we address the local well-posedness of the resulting flow equations. Adapting the strategy detailed in [DP23] and based on the the Nash-Moser theorem, we prove local existence and uniqueness of solutions for both the scalar and the Dirac models.", "url": "https://arxiv.org/abs/2605.22436", "type": "理论", "summary": "我们研究了微扰代数量子场理论 (pAQFT) 框架内弯曲背景上相互作用量子场的洛伦兹韦特里奇重整群 (RG) 流方程。具体来说，我们考虑两类模型：在无边界的全局双曲时空上两个相互作用的标量场，以及在进一步假设基础背景是自旋的情况下，自相互作用的狄拉克场。在这两种情况下，我们都在局部势近似中推导出相应的 RG 流动方程，并计算相关耦合的 beta 函数。对于标量模型，我们还讨论了不对称相互作用势，它在形式上让人想起随机动力学的 Martin-Siggia-Rose 描述，从而表明洛伦兹代数 RG 方法 [DDP+24] 和随机场论模型 [Duc25] 之间可能存在联系。此外，我们还解决了所得流动方程的局部适定性。采用[DP23]中详细介绍的策略并基于纳什-莫泽定理，我们证明了标量模型和狄拉克模型解的局部存在性和唯一性。", "authors": [{"name": "Beatrice Costeri"}], "featured_authors": [{"name": "Beatrice Costeri"}], "author_count": 1}, {"id": "2605.21562", "category": "quant-ph", "title": "Optimal Quantum Feshbach Engines", "abstract": "We develop an optimization framework for high-efficiency quantum cycles implemented with a trapped Bose-Einstein condensate, whose control parameters are the trap stiffness and the interaction strength tuned via a Feshbach resonance. Optimal driving protocols for each stroke of the cycle are obtained from a variational description of the condensate dynamics combined with Nelson's stochastic quantization, which maps the quantum evolution onto an effective Ornstein-Uhlenbeck process. The optimal protocol is obtained by minimizing a user-defined cost functional that selects the best trade-off between protocol duration and arbitrary physical constraints (such as the expended work or the proximity to an adiabatic evolution), and exhibits remarkable stability over repeated cycles. The method also provides a systematic route to optimal control for generic nonlinear Schrödinger equations, paving the way to optimal control strategies in fields as diverse as nonlinear optics, quantum fluids, and quantum plasmas.", "url": "https://arxiv.org/abs/2605.21562", "type": "理论+数值", "summary": "我们开发了一个使用捕获的玻色-爱因斯坦凝聚体实现的高效量子循环的优化框架，其控制参数是通过费什巴赫共振调节的陷阱刚度和相互作用强度。循环每个冲程的最佳驱动协议是通过凝聚态动力学的变分描述与尼尔森随机量子化相结合而获得的，该随机量子化将量子演化映射到有效的奥恩斯坦-乌伦贝克过程上。最佳协议是通过最小化用户定义的成本函数来获得的，该函数在协议持续时间和任意物理约束（例如消耗的工作或接近绝热演化）之间选择最佳权衡，并在重复循环中表现出显着的稳定性。该方法还为通用非线性薛定谔方程的最优控制提供了系统途径，为非线性光学、量子流体和量子等离子体等不同领域的最优控制策略铺平了道路。", "authors": [{"name": "Aaron Wandhammer"}, {"name": "Vincent Hardel"}, {"name": "Paul-Antoine Hervieux"}, {"name": "Giovanni Manfredi"}], "featured_authors": [{"name": "Aaron Wandhammer"}, {"name": "Vincent Hardel"}, {"name": "Paul-Antoine Hervieux"}, {"name": "Giovanni Manfredi"}], "author_count": 4}, {"id": "2605.21570", "category": "quant-ph", "title": "Quantum Purity Amplification for Arbitrary Eigenstates and Multiple Outputs", "abstract": "Quantum purity amplification (QPA) is the task of coherently transforming $n$ copies of a mixed state into high-fidelity copies of a chosen eigenstate. We solve QPA in the general setting of $n$ input copies, $m$ output copies, arbitrary target eigenstates, arbitrary local dimension $d$, and generic input spectra. We characterize the optimal channel and derive its all-site and one-site performance laws across output regimes. For the asymptotic analysis, we use a path-graph parametrization to show that, when the target eigenvalue has a constant spectral gap $D_{k,\\mathrm{min}}$, achieving all-site error $\\varepsilon$ requires a number of input copies independent of $d$ and scaling as $O(m/(\\varepsilon D_{k,\\mathrm{min}}^2))$. When $m/n$ approaches a constant, the performance exhibits phase-like regimes, which we characterize explicitly. For the nonasymptotic analysis, we develop a theory of generalized Young diagrams that yields tight sample complexity bounds and provides the first dimension-uniform guarantee for optimal QPA. We also provide asymptotically efficient implementations of the optimal protocol. Together, these results establish QPA as a rigorous example of coherent quantum information processing with dimension-uniform sample complexity, supplying the technical foundation for the coherent-incoherent separation developed in the companion work.", "url": "https://arxiv.org/abs/2605.21570", "type": "理论", "summary": "量子纯度放大 (QPA) 的任务是将混合态的 $n$ 副本连贯地转换为所选本征态的高保真副本。我们在 $n$ 输入副本、$m$ 输出副本、任意目标本征态、任意局部维度 $d$ 和通用输入谱的一般设置中求解 QPA。我们描述了最佳通道的特征，并推导出其跨输出机制的全站点和单站点性能定律。对于渐近分析，我们使用路径图参数化来表明，当目标特征值具有恒定的谱间隙 $D_{k,\\mathrm{min}}$ 时，实现全站点误差 $\\varepsilon$ 需要大量独立于 $d$ 的输入副本，并且缩放为 $O(m/(\\varepsilon D_{k,\\mathrm{min}}^2))$。当 $m/n$ 接近常数时，性能表现出类似阶段的状态，我们明确地描述了这一点。对于非渐近分析，我们开发了一种广义杨图理论，该理论产生严格的样本复杂性界限，并为最佳 QPA 提供第一维均匀保证。我们还提供最优协议的渐近有效实现。\n\n总之，这些结果将 QPA 确立为具有维度均匀样本复杂性的相干量子信息处理的严格示例，为配套工作中开发的相干-非相干分离提供了技术基础。", "authors": [{"name": "Zhaoyi Li"}, {"name": "Elias Theil"}, {"name": "Aram W. Harrow"}, {"name": "Isaac Chuang"}], "featured_authors": [{"name": "Zhaoyi Li"}, {"name": "Elias Theil"}, {"name": "Aram W. Harrow"}, {"name": "Isaac Chuang"}], "author_count": 4}, {"id": "2605.21597", "category": "quant-ph", "title": "Matrix Product Operator Encodings of the Magnus Expansion and Dyson Series", "abstract": "We introduce a matrix product operator (MPO) encoding of the Magnus expansion and the Dyson series for one-dimensional quantum lattice models with time-dependent Hamiltonians. The MPO construction can be made accurate up to arbitrary order in the time step, it can be applied to both finite and infinite systems, and it can handle long-range interactions. The resulting MPO can be combined with state-of-the-art time evolution algorithms based on matrix product states, allowing for drastic improvements in simulating evolution under time-dependent Hamiltonians. Our MPO construction can also be used for the optimization of quantum circuits in the context of quantum simulation of time-dependent Hamiltonians.", "url": "https://arxiv.org/abs/2605.21597", "type": "理论+数值", "summary": "我们引入了马格努斯展开式和戴森级数的矩阵乘积算子（MPO）编码，用于具有时间相关哈密顿量的一维量子晶格模型。 MPO 构造可以在时间步长内精确到任意阶，它可以应用于有限和无限系统，并且可以处理长程交互。由此产生的 MPO 可以与基于矩阵乘积状态的最先进的时间演化算法相结合，从而在与时间相关的哈密顿量下模拟演化方面得到显着改进。我们的 MPO 结构还可用于在时间相关哈密顿量的量子模拟背景下优化量子电路。", "authors": [{"name": "Victor Vanthilt"}, {"name": "Maarten Van Damme"}, {"name": "Jutho Haegeman"}, {"name": "Ian P. McCulloch"}, {"name": "Laurens Vanderstraeten"}], "featured_authors": [{"name": "Victor Vanthilt"}, {"name": "Maarten Van Damme"}, {"name": "Jutho Haegeman"}, {"name": "Ian P. McCulloch"}, {"name": "Laurens Vanderstraeten"}], "author_count": 5}, {"id": "2605.21643", "category": "quant-ph", "title": "Balancing Quasi-Bragg Regime and Velocity Selectivity in Quantum-Enhanced Atom Interferometry", "abstract": "Spin squeezing in atomic ensembles enables atom interferometry with sensitivities below the shot-noise limit, but the associated entanglement is highly susceptible to loss, making imperfections in atom optics a central limitation. Bragg diffraction is an established technique for driving transitions between atomic momentum states and enables large-momentum transfer through higher-order diffraction while preserving the internal state. However, it is intrinsically limited by two competing mechanisms: short light pulses induce parasitic diffraction into off-resonant orders beyond an effective two-level description, while long pulses face velocity selectivity. We derive analytical expressions in a second-quantized framework for the atom optics and phase uncertainty of a Mach-Zehnder interferometer including these effects. We demonstrate that sub-shot-noise scaling is achieved only in a regime of intermediate pulse duration. Furthermore, we show that deleterious effects of higher-order diffraction are partially mitigated by optimizing the input quantum state.", "url": "https://arxiv.org/abs/2605.21643", "type": "理论+数值", "summary": "原子系综中的自旋挤压使得原子干涉测量的灵敏度低于散粒噪声极限，但相关的纠缠很容易丢失，这使得原子光学的缺陷成为主要限制。布拉格衍射是一种用于驱动原子动量状态之间跃迁的成熟技术，并且能够通过高阶衍射实现大动量转移，同时保留内部状态。然而，它本质上受到两种竞争机制的限制：短光脉冲将寄生衍射引入超出有效两级描述的非共振级，而长脉冲则面临速度选择性。我们在第二量子化框架中推导了马赫-曾德尔干涉仪的原子光学和相位不确定性的解析表达式，包括这些效应。我们证明，只有在中间脉冲持续时间的情况下才能实现亚散粒噪声缩放。此外，我们表明，通过优化输入量子态可以部分减轻高阶衍射的有害影响。", "authors": [{"name": "Christian Miguel Karres"}, {"name": "Daniel Derr"}, {"name": "Enno Giese"}], "featured_authors": [{"name": "Christian Miguel Karres"}, {"name": "Daniel Derr"}, {"name": "Enno Giese"}], "author_count": 3}, {"id": "2605.21662", "category": "quant-ph", "title": "Fidelity-Aware Frequency Allocation and Transpilation Co-Design for Tunable Coupler Quantum Systems", "abstract": "Frequency crowding is a fundamental limitation in superconducting quantum architectures, particularly in tunable-coupler systems. We present a framework that explicitly models both coherent spectator-induced errors and incoherent lifetime effects through an error budgeting approach. Using this model, we analyze how frequency crowding impacts gate fidelity as module size and connectivity scale, and formulate a constrained optimization problem to assign qubit and coupler frequencies under realistic separation and hardware constraints. We demonstrate scalable frequency allocation strategies that minimize spectator-induced errors. We further show that increasing qubit count and coupling density within a module leads to a fidelity-connectivity tradeoff. To explore the benefits at the system scale, we have developed a noise-aware transpilation approach called FINESSE, which minimizes error by selecting high-fidelity paths that satisfy connectivity via SWAP insertion while jointly optimizing downstream gate execution. We demonstrate this physics-informed architecture-transpilation co-design approach for a SNAIL-based third-order coupler that natively realizes the $\\sqrt{iSWAP}$ basis with frequency aware gate fidelities. On SNAIL architectures, FINESSE achieves an average 8.9% reduction in log-infidelity cost and 6.8% reduction in circuit depth vs. SABRE. We also compare results on IBM Brisbane's architecture.", "url": "https://arxiv.org/abs/2605.21662", "type": "理论+数值", "summary": "频率拥挤是超导量子架构的基本限制，特别是在可调谐耦合器系统中。我们提出了一个框架，通过错误预算方法明确模拟连贯的观众引起的错误和不连贯的生命周期影响。使用该模型，我们分析频率拥挤如何影响模块尺寸和连接规模的门保真度，并制定约束优化问题以在实际分离和硬件约束下分配量子位和耦合器频率。我们展示了可扩展的频率分配策略，可以最大限度地减少观众引起的错误。我们进一步表明，增加模块内的量子位数量和耦合密度会导致保真度与连接性之间的权衡。为了探索系统规模的优势，我们开发了一种名为 FINESSE 的噪声感知转译方法，该方法通过选择通过 SWAP 插入满足连接性的高保真路径来最大限度地减少错误，同时联合优化下游门执行。\n\n我们为基于 SNAIL 的三阶耦合器演示了这种基于物理的架构转换协同设计方法，该方法本身实现了具有频率感知门保真度的 $\\sqrt{iSWAP}$ 基础。在 SNAIL 架构上，与 SABRE 相比，FINESSE 的对数不保真成本平均降低了 8.9%，电路深度平均降低了 6.8%。我们还比较了 IBM Brisbane 架构的结果。", "authors": [{"name": "Dylan VanAllen"}, {"name": "Evan McKinney"}, {"name": "Israa G. Yusuf"}, {"name": "Girgis Falstin"}, {"name": "Gaurav Agarwal"}, {"name": "Jason Pollack"}, {"name": "Michael Hatridge"}, {"name": "Alex K. Jones"}], "featured_authors": [{"name": "Dylan VanAllen"}, {"name": "Evan McKinney"}, {"name": "Israa G. Yusuf"}, {"name": "Jason Pollack"}, {"name": "Michael Hatridge"}, {"name": "Alex K. Jones"}], "author_count": 8}, {"id": "2605.21664", "category": "quant-ph", "title": "A journey through Flatland: What does the antiflatness of a spectrum teach us?", "abstract": "We explore the concept of antiflatness to characterize the structural fluctuations within the entanglement spectrum of a quantum state (i.e., the spectrum of its reduced density operator). As a measure of the interplay between entanglement and magic, two fundamental quantum resources, antiflatness provides second-order information about quantum correlations that standard average measures fail to capture. Recognizing that standard majorization theory fundamentally orders states by purity and is structurally blind to spectral fluctuations, we introduce a novel partial ordering known as antiflat majorization, based on the Rényi entropy spread. We define Flatness-Preserving Operations (FPOs), establishing new necessary conditions for state convertibility. Furthermore, we unify different measures of antiflatness-such as Capacity of Entanglement, Linear Rényi spread, and Logarithmic antiflatness-using the frameworks of escort distributions and Bregman divergences. We prove that the Capacity of Entanglement can be expressed as a second derivative of the Kullback-Leibler divergence along the escort trajectory, connecting it with the Quantum Fisher Information. Finally, we demonstrate that absolute maximal antiflatness is not achieved by a single universal state, but rather by a continuous Pareto frontier of extremal states with jump spectra, and we analyze the typicality of these spectral fluctuations using Haar, Bures-Hall and t-doped Clifford random state ensembles.", "url": "https://arxiv.org/abs/2605.21664", "type": "理论", "summary": "我们探索反平坦性的概念来表征量子态纠缠谱（即其约化密度算子的谱）内的结构涨落。作为纠缠和魔力这两种基本量子资源之间相互作用的度量，反平坦性提供了标准平均度量无法捕获的有关量子相关性的二阶信息。认识到标准主要化理论从根本上按纯度对状态进行排序，并且在结构上对频谱波动视而不见，因此我们引入了一种基于 Rényi 熵展的新颖的偏序，称为反平坦主要化。我们定义了平坦度保持操作（FPO），为状态可转换性建立了新的必要条件。此外，我们使用护航分布和布雷格曼散度的框架统一了不同的反平坦性度量，例如纠缠能力、线性 Rényi 扩展和对数反平坦性。我们证明纠缠能力可以表示为沿护航轨迹的 Kullback-Leibler 散度的二阶导数，并将其与量子费希尔信息联系起来。\n\n最后，我们证明绝对最大反平坦性不是通过单一普遍状态实现的，而是通过具有跳跃光谱的极值状态的连续帕累托前沿实现的，并且我们使用 Haar、Bures-Hall 和 t 掺杂的 Clifford 随机状态系综分析了这些光谱涨落的典型性。", "authors": [{"name": "Barbara Jasser"}, {"name": "Daniele Iannotti"}, {"name": "Alioscia Hamma"}], "featured_authors": [{"name": "Barbara Jasser"}, {"name": "Daniele Iannotti"}, {"name": "Alioscia Hamma"}], "author_count": 3}, {"id": "2605.21756", "category": "quant-ph", "title": "Towards a quantum decision tree in a laser pumped four-level system", "abstract": "In this study, we examine an innovative framework towards implementing quantum decision trees utilizing a laser-driven four-level system. We discuss a diamond-shaped atomic configuration, in which we apply Lie-algebraic formalisms to analyze the dynamics of the system. The system is perturbed by a Stokes pulse, represented as $\\beta_j(t)$ (for $j=1,2$), which interacts with the atomic states $|0\\rangle, |3\\rangle$ and $|1\\rangle, |2\\rangle$. In addition, a pump laser, denoted as $\\alpha_j(t)$, couples the states $|0\\rangle, |1\\rangle$ and $|2\\rangle, |3\\rangle$. By employing pulse profiles that possess identical temporal behavior but differ in amplitude, one can effectively redistribute the population from the initial ground state to the other energy levels. This technique facilitates the mimicry of a quantum decision tree. We highlight that the proposed methodology is scalable to N-level systems, enhancing its adaptability and potential utility in quantum computing and various decision-making applications. We introduce a novel framework for implementing quantum decision trees using a four-level laser-driven atomic system. Employing a diamond-shaped energy configuration, we analyze system dynamics through Lie-algebraic methods. Using pulse profiles with identical temporal structures but varying amplitudes, we achieve controlled population redistribution among energy levels, effectively simulating a quantum decision tree. This methodology is scalable to systems of \\(N\\) levels, offering potential applications in quantum computing and decision-making processes.", "url": "https://arxiv.org/abs/2605.21756", "type": "理论", "summary": "在这项研究中，我们研究了利用激光驱动的四级系统实施量子决策树的创新框架。我们讨论了菱形原子构型，其中我们应用李代数形式来分析系统的动力学。该系统受到斯托克斯脉冲的扰动，表示为 $\\beta_j(t)$（对于 $j=1,2$），它与原子态 $|0\\rangle、|3\\rangle$ 和 $|1\\rangle、|2\\rangle$ 相互作用。此外，泵浦激光器，表示为$\\alpha_j(t)$，耦合状态$|0\\rangle、|1\\rangle$和$|2\\rangle、|3\\rangle$。通过采用具有相同时间行为但幅度不同的脉冲分布，可以有效地将粒子群从初始基态重新分配到其他能级。该技术有助于模拟量子决策树。我们强调，所提出的方法可扩展到 N 级系统，增强其在量子计算和各种决策应用中的适应性和潜在效用。我们介绍了一种使用四级激光驱动原子系统来实现量子决策树的新颖框架。\n\n采用菱形能量配置，我们通过李代数方法分析系统动力学。使用具有相同时间结构但不同幅度的脉冲轮廓，我们实现了能级之间受控的群体重新分布，有效地模拟了量子决策树。该方法可扩展到\\(N\\)级系统，在量子计算和决策过程中提供潜在的应用。", "authors": [{"name": "Dawit Hailuf Hailu"}], "featured_authors": [{"name": "Dawit Hailuf Hailu"}], "author_count": 1}, {"id": "2605.21791", "category": "quant-ph", "title": "Completeness of the Klein-Gordon oscillator eigenfunctions via Hermite and Laguerre polynomials", "abstract": "Completeness of the Klein--Gordon oscillator eigenfunctions is proved in one and three spatial dimensions. The proofs establish the closure relations satisfied by the eigenfunctions and are based on standard properties of the Hermite and the generalized Laguerre polynomials, supplemented in three dimensions by the completeness of the spherical harmonics. The scalar nature of the Klein--Gordon field renders the argument strictly simpler than the analogous proof for the Dirac oscillator: no off-diagonal cancellation is required.", "url": "https://arxiv.org/abs/2605.21791", "type": "理论", "summary": "克莱因-戈登振子本征函数的完整性在一维和三维空间得到了证明。证明建立了本征函数满足的闭包关系，并基于 Hermite 和广义拉盖尔多项式的标准属性，并在三个维度上通过球谐函数的完整性进行补充。克莱因-戈登场的标量性质使得该论证比狄拉克振荡器的类似证明更加简单：不需要非对角线抵消。", "authors": [{"name": "Kevin Hernández"}], "featured_authors": [{"name": "Kevin Hernández"}], "author_count": 1}, {"id": "2605.21867", "category": "quant-ph", "title": "Zero-level $CCZ$ Distillation", "abstract": "Magic state distillation is a key component of fault-tolerant quantum computation, as it enables the implementation of non-Clifford gates such as the $T$ gate and the $CCZ$ gate via gate teleportation. However, conventional distillation protocols require a large number of logical qubits and introduce substantial spatial and temporal overhead, posing a significant bottleneck for scalable fault-tolerant quantum computation. In this work, we propose a zero-level distillation protocol that efficiently generates a high-fidelity logical $CCZ$ magic state using only physical qubits on a two-dimensional square lattice with nearest-neighbor interactions. Our method leverages the transversal $T/T^\\dagger$ operation of the $[[ 8,3,2 ]]$ code to fault-tolerantly encode the state $\\overline{CCZ}|+++\\rangle$, which is subsequently teleported to three surface-code logical qubits via lattice surgery. To enable teleportation between codes with different distances, we introduce adaptively initialized teleportation (AIT), a tailored initialization procedure for the surface code. Numerical simulations demonstrate that the logical error rate scales as $p_L \\simeq 300 \\times p^2$ with respect to the physical error rate $p$. For example, the proposed method improves the logical error rate by approximately one and two orders of magnitude at $p = 10^{-3}$ and $p = 10^{-4}$, respectively, compared to conventional seven-$T$-gate approaches. The distillation circuit requires only 22 physical qubits, 3 logical qubits, and a circuit depth of 24, reducing the space-time overhead by a factor of approximately 5-10 compared to previous methods. This result highlights the practicality of $CCZ$-state distillation in early fault-tolerant quantum computation and offers a new direction toward resource-efficient physical-level magic state distillation beyond conventional $T$-state generation.", "url": "https://arxiv.org/abs/2605.21867", "type": "理论+数值", "summary": "魔态蒸馏是容错量子计算的关键组成部分，因为它可以通过门隐形传态实现非 Clifford 门，例如 $T$ 门和 $CCZ$ 门。然而，传统的蒸馏协议需要大量的逻辑量子位，并引入大量的空间和时间开销，为可扩展的容错量子计算带来了重大瓶颈。在这项工作中，我们提出了一种零级蒸馏协议，该协议仅使用具有最近邻相互作用的二维方晶格上的物理量子位，有效地生成高保真逻辑 $CCZ$ 魔法状态。我们的方法利用 $[[ 8,3,2 ]]$ 代码的横向 $T/T^\\dagger$ 操作对状态 $\\overline{CCZ}|+++\\rangle$ 进行容错编码，随后通过晶格手术将其传送到三个表面代码逻辑量子位。为了实现不同距离的代码之间的隐形传态，我们引入了自适应初始化隐形传态（AIT），这是一种针对表面代码定制的初始化过程。\n\n数值模拟表明，相对于物理错误率 $p$，逻辑错误率按 $p_L \\simeq 300 \\times p^2$ 缩放。例如，与传统的七$T$门方法相比，所提出的方法在$p = 10^{-3}$和$p = 10^{-4}$时分别将逻辑错误率提高了大约一个和两个数量级。该蒸馏电路仅需要22个物理量子位、3个逻辑量子位和24个电路深度，与之前的方法相比，将时空开销减少了大约5-10倍。这一结果凸显了 $CCZ$ 状态蒸馏在早期容错量子计算中的实用性，并为超越传统 $T$ 状态生成的资源高效型物理级魔法状态蒸馏提供了新方向。", "authors": [{"name": "Tomohiro Itogawa"}, {"name": "Yutaka Hirano"}, {"name": "Yutaro Akahoshi"}, {"name": "Keisuke Fujii"}], "featured_authors": [{"name": "Tomohiro Itogawa"}, {"name": "Yutaka Hirano"}, {"name": "Yutaro Akahoshi"}, {"name": "Keisuke Fujii"}], "author_count": 4}, {"id": "2605.21960", "category": "quant-ph", "title": "dSABRE: A SABRE-Style Router for Multi-Core Distributed Quantum Computers", "abstract": "Minimising EPR consumption is the dominant objective when routing a quantum circuit on a distributed quantum computer (DQC). We present dSABRE, a SABRE-style router for multi-core processors that, on each iteration of a lookahead-driven loop, first resolves any intra-core front-layer gates by SWAP scoring and only falls back to scoring inter-core teleportation candidates when the intra-core front is empty. Three mechanisms drive the improvement over the state of the art: a five-term gate-centric teleportation score that generalises the local SWAP heuristic to the inter-core setting, whose explicit capacity-penalty term keeps the scorer from teleporting into saturated cores; a proactive congestion-relief pass that redistributes idle qubits out of high-demand cores before deadlock; and a BFS-layer construction of the inter-core extended set that respects DAG dependencies layer by layer rather than mixing wires in topological order. Across 18 MQT-Bench circuits at 25, 36, and 64 logical qubits, dSABRE reduces geometric-mean EPR consumption by 41-44% over TeleSABRE and by 16-68% over the gate-teleportation-based pytket-dqc, using standard Qiskit SabreLayout for the initial layout. A large-circuit QFT sweep at 100-360 qubits confirms scalability. Code and online appendices are available at this https URL .", "url": "https://arxiv.org/abs/2605.21960", "type": "理论", "summary": "在分布式量子计算机 (DQC) 上路由量子电路时，最大程度地减少 EPR 消耗是主要目标。我们提出了 dSABRE，一种用于多核处理器的 SABRE 式路由器，在前瞻驱动循环的每次迭代中，首先通过 SWAP 评分来解析任何内核内前层门，并且仅当内核内前端为空时才回退到对内核间隐形传输候选者进行评分。三种机制推动了对现有技术的改进：以五项门为中心的隐形传态得分，将本地交换启发式推广到核心间设置，其明确的容量惩罚项可防止得分者隐形传态到饱和核心；主动缓解拥塞通道，在死锁之前将空闲量子位从高需求核心中重新分配；核心间扩展集的 BFS 层构造逐层尊重 DAG 依赖关系，而不是按拓扑顺序混合线路。在 25、36 和 64 个逻辑量子位的 18 个 MQT-Bench 电路中，dSABRE 使用标准 Qiskit SabreLayout 进行初始布局，与 TeleSABRE 相比，几何平均 EPR 消耗减少了 41-44%，与基于门传送的 pytket-dqc 相比，减少了 16-68%。\n\n100-360 量子位的大电路 QFT 扫描证实了可扩展性。代码和在线附录可在此 https URL 获取。", "authors": [{"name": "Sanjiang Li"}], "featured_authors": [{"name": "Sanjiang Li"}], "author_count": 1}, {"id": "2605.22150", "category": "quant-ph", "title": "Unified entropy entanglement", "abstract": "The unified entropy as a promotion of the von Neumann entropy exhibits distinct diversity which contains the Tsallis entropy, the Rényi entropy, the von Neumann entropy as special cases. The unified-($r,t$) entropy entanglement with $0<r<1$ and $0< t\\leq 1$ was shown to be an entanglement monotone in literature. In this paper, we explore unified-($q,s$) entropy entanglement with $q>1$ and $qs\\geq1$ and show that it is also an entanglement monotone and that both of them are monogamous. Going further, we present two kinds of global multipartite entanglement measures (GlMEMs) based on the unified entropy and each kind has two subclasses which are classified by the parameters $(q,s)$ and $(r,t)$. Consequently, from the view of the complete multipartite entanglement measure theory, we show that one of them is a complete multipartite entanglement monotone and is not only completely monogamous but also tightly completely monogamous, but the other three are even not complete. We also explore the genuine entanglement measures induced by the unified entropy and the relations with the bipartite entanglement and the global entanglement are discussed, respectively.", "url": "https://arxiv.org/abs/2605.22150", "type": "理论", "summary": "统一熵作为冯诺依曼熵的推广表现出明显的多样性，其中包括Tsallis熵、Rényi熵、冯诺依曼熵作为特例。文献中表明，$0<r<1$ 和 $0< t\\leq 1$ 的统一-($r,t$) 熵纠缠是纠缠单调。在本文中，我们探索了 $q>1$ 和 $qs\\geq1$ 的统一-($q,s$) 熵纠缠，并表明它也是一个纠缠单调，并且两者都是一夫一妻制的。进一步，我们提出了两种基于统一熵的全局多部分纠缠度量（GlMEM），每种都有两个子类，根据参数 $(q,s)$ 和 $(r,t)$ 进行分类。因此，从完备的多体纠缠测度理论的角度，我们证明其中一个是完备的多体纠缠单调，不仅是完全一夫一妻制的，而且是严格完全一夫一妻制的，而其他三个甚至是不完备的。我们还探讨了由统一熵引起的真正的纠缠度量，并分别讨论了与二分纠缠和全局纠缠的关系。", "authors": [{"name": "Wenxue Ren"}, {"name": "Binghao Li"}, {"name": "Ruiqun Niu"}, {"name": "Yu Guo"}, {"name": "Shuanping Du"}], "featured_authors": [{"name": "Wenxue Ren"}, {"name": "Binghao Li"}, {"name": "Ruiqun Niu"}, {"name": "Yu Guo"}, {"name": "Shuanping Du"}], "author_count": 5}, {"id": "2605.22218", "category": "quant-ph", "title": "Three sins against physics by an exaggerated quantum information perspective", "abstract": "I point out three ways in which the perspective of quantum information may lead to distorted claims about physics: forgetting that light does not need to be quantised to show coherence; ignoring the generators of unitary evolutions; and approaching the discovery of nature as a fight against an adversary.", "url": "https://arxiv.org/abs/2605.22218", "type": "理论", "summary": "我指出了量子信息的视角可能导致物理学观点扭曲的三种方式：忘记光不需要被量子化来显示相干性；忘记光不需要被量子化来显示相干性；忽略单一演化的生成元；并将发现自然视为对抗对手的斗争。", "authors": [{"name": "Valerio Scarani"}], "featured_authors": [{"name": "Valerio Scarani"}], "author_count": 1}, {"id": "2605.22226", "category": "quant-ph", "title": "Geometric Construction of Optimal Teleportation Witnesses", "abstract": "Not all entangled states are useful for quantum teleportation. We present a geometric method to construct optimal teleportation witnesses, which provide operational necessary and sufficient criteria for identifying the teleportation usefulness of arbitrary two-qudit entangled states. Specifically, by developing a two-layer iterative cutting-plane algorithm to solve the shortest distance problem from the target state $\\rho$ to the convex set $S$ of useless states, we obtain the projection point $\\sigma^* \\in S$ and then construct the optimal teleportation witness from the projection geometry. Moreover, the shortest distance $D(\\rho)$ obtained during this construction also serves as a necessary and sufficient criterion for usefulness. We apply our method to identify the teleportation usefulness of three classes of entangled states.", "url": "https://arxiv.org/abs/2605.22226", "type": "理论+数值", "summary": "并非所有纠缠态都可用于量子隐形传态。我们提出了一种几何方法来构造最佳隐形传态见证，它为识别任意二量子纠缠态的隐形传态有效性提供了操作上必要且充分的标准。具体来说，通过开发两层迭代割平面算法来解决从目标状态$\\rho$到无用状态凸集$S$的最短距离问题，我们获得投影点$\\sigma^* \\in S$，然后从投影几何构造最优隐形传态见证。此外，在此构造过程中获得的最短距离$D(\\rho)$也可以作为有用性的充分必要标准。我们应用我们的方法来识别三类纠缠态的隐形传态有用性。", "authors": [{"name": "Yanning Jia"}, {"name": "Fenzhuo Guo"}, {"name": "Mengxuan Bai"}, {"name": "Mengyan Li"}, {"name": "Haifeng Dong"}, {"name": "Fei Gao"}], "featured_authors": [{"name": "Yanning Jia"}, {"name": "Fenzhuo Guo"}, {"name": "Mengxuan Bai"}, {"name": "Mengyan Li"}, {"name": "Haifeng Dong"}, {"name": "Fei Gao"}], "author_count": 6}, {"id": "2605.22267", "category": "quant-ph", "title": "Emulation of Optically Interconnected Quantum Data Centers Topologies for Cost-Fidelity Benchmarking", "abstract": "We emulate optically interconnected quantum processors in ring, star, and line topologies using a quantum computer. GHZ benchmarks show that the star provides the best trade-off between cost and fidelity under transduction and fiber noise.", "url": "https://arxiv.org/abs/2605.22267", "type": "理论", "summary": "我们使用量子计算机模拟环形、星形和线形拓扑中的光互连量子处理器。 GHZ 基准测试表明，星形在传输和光纤噪声下提供了成本和保真度之间的最佳权衡。", "authors": [{"name": "Seyed Navid Elyasi"}, {"name": "Seyed Morteza Ahmadian"}, {"name": "Rui Lin"}, {"name": "Paolo Monti"}], "featured_authors": [{"name": "Seyed Navid Elyasi"}, {"name": "Seyed Morteza Ahmadian"}, {"name": "Rui Lin"}, {"name": "Paolo Monti"}], "author_count": 4}, {"id": "2605.22276", "category": "quant-ph", "title": "Asymmetric quantum Rabi model, trap-dipole resonance, and quantum gates with optically trapped ultracold polar molecules", "abstract": "Optically trapped ultracold polar molecules can have multiple long-lived states for coding quantum information, and can exhibit electric dipole-dipole interactions~(DDI) which enables entanglement generation. The general understanding on the quantized motion~(QM) of molecules in the traps is that it causes fluctuation of DDI. Here, we find that the molecular QM can realize an asymmetric quantum Rabi model, which is of specific importance in the study of fundamental physics. The molecular QM can also lead to an exotic trap-dipole resonance, resulting in excess population loss to uncoupled motional states, and, hence, should be avoided in a general quantum control over polar molecules. To examine the impact of QM on quantum computing based on polar molecules, we introduce two gate protocols, a fast iSWAP gate which can be realized by a global microwave pulse of pulse area smaller than $2\\pi$, and a controlled-phase gate with an arbitrary controlled phase, and find that both gates can attain a high fidelity.", "url": "https://arxiv.org/abs/2605.22276", "type": "理论", "summary": "光捕获的超冷极性分子可以具有多种用于编码量子信息的长寿命状态，并且可以表现出电偶极子-偶极子相互作用（DDI），从而能够产生纠缠。对陷阱中分子的量子化运动（QM）的一般理解是它引起了DDI的波动。在这里，我们发现分子量子论可以实现不对称量子拉比模型，这在基础物理研究中具有特殊的重要性。分子量子力学还可能导致奇异的陷阱偶极子共振，导致过多的布居损失到非耦合运动状态，因此，在对极性分子的一般量子控制中应该避免这种现象。为了检验QM对基于极性分子的量子计算的影响，我们引入了两种门协议，一种是可以通过脉冲面积小于$2\\pi$的全局微波脉冲实现的快速iSWAP门，以及一种具有任意受控相位的受控相位门，并发现两种门都可以获得高保真度。", "authors": [{"name": "Yan Lu"}, {"name": "Xiao-Feng Shi"}], "featured_authors": [{"name": "Yan Lu"}, {"name": "Xiao-Feng Shi"}], "author_count": 2}, {"id": "2605.22424", "category": "quant-ph", "title": "Long-range nonstabilizerness of topologically encoded states from mutual information", "abstract": "We study long-range nonstabilizerness (LRN), namely the obstruction to remove nonstabilizerness with shallow-depth local quantum circuits. In one-dimensional settings, the mutual information between disconnected spatial regions has proven to be a powerful tool to diagnose LRN. In this work, we focus on encoded states of two-dimensional topologically-ordered systems, and explore the ability of the mutual information to serve as a diagnostic of LRN. Focusing on the concrete setting of lattice models defined on a torus, we show that information about LRN can be gained from the analysis of the mutual information between non-overlapping regions containing non-contractible loops, and of the change of such mutual information under modular real-space transformations. We exemplify this idea in the toric code and the non-abelian string-net model with doubled Fibonacci topological order. In the former case, we show that the mutual information provides a full classification, certifying LRN for all encoded non-stabilizer states. In the latter case, instead, our approach does not lead to a full classification, as it detects LRN for all states except from a finite subset with special transformation properties under the modular group. Finally, we discuss how our results on LRN constrain the logical gates that can be implemented fault-tolerantly on the torus.", "url": "https://arxiv.org/abs/2605.22424", "type": "理论", "summary": "我们研究长程不稳定性（LRN），即用浅深度局部量子电路消除不稳定性的障碍。在一维环境中，不连续的空间区域之间的互信息已被证明是诊断 LRN 的有力工具。在这项工作中，我们关注二维拓扑有序系统的编码状态，并探索互信息作为 LRN 诊断的能力。着眼于环面上定义的晶格模型的具体设置，我们表明，可以通过分析包含不可收缩环的非重叠区域之间的互信息以及模实空间变换下此类互信息的变化来获得有关LRN的信息。我们在环面代码和具有双斐波那契拓扑顺序的非阿贝尔弦网模型中举例说明了这个想法。在前一种情况下，我们表明互信息提供了完整的分类，为所有编码的非稳定器状态证明了 LRN。\n\n相反，在后一种情况下，我们的方法不会导致完整的分类，因为它检测除模块化组下具有特殊变换属性的有限子集之外的所有状态的 LRN。最后，我们讨论 LRN 的结果如何限制可以在环面上实现容错的逻辑门。", "authors": [{"name": "David Aram Korbany"}, {"name": "Tyler D. Ellison"}, {"name": "David T. Stephen"}, {"name": "Lorenzo Piroli"}], "featured_authors": [{"name": "David Aram Korbany"}, {"name": "Tyler D. Ellison"}, {"name": "David T. Stephen"}, {"name": "Lorenzo Piroli"}], "author_count": 4}, {"id": "2605.22439", "category": "quant-ph", "title": "Minimal Permutation-Invariant Qudit Codes from Edge-Colorings of Complete Graphs", "abstract": "We study permutation-invariant quantum codes in the symmetric subspace $\\mathrm{Sym}^n(\\mathbb{C}^q) $ of $n$ qudits of local dimension $q$. For every integer $q\\geq 2$, we construct a permutation-invariant code with parameters $((4,q,2))_q$. Thus four physical qudits suffice to encode one logical qudit with distance two in the symmetric sector for every local dimension. We also show, using linear-programming constraints for permutation-invariant quantum codes, that no permutation-invariant code of dimension $q$ and distance at least $2$ exists in $\\mathrm{Sym}^n(\\mathbb{C}^q)$ for $n\\leq 3$. Hence four qudits are necessary and sufficient. The construction has a simple representation-theoretic and combinatorial description. In the irreducible $\\mathrm{SU}(q)$-module $\\mathrm{Sym}^4(\\mathbb{C}^q)$, the distance-two Knill-Laflamme conditions split into root and Cartan parts. By restricting supports to the even-entry occupation layer, all root-error conditions vanish automatically. The remaining Cartan conditions reduce to linear balancing constraints on packets of occupation vectors. These packets admit a natural graph-theoretic interpretation in terms of the vertices and edges of the complete graph $K_q$: for odd $q$, they are organized by the midpoint rule, while for even $q$, they are organized by a decomposition of $K_q$ into perfect matchings. In this way, the existence of minimal $((4,q,2))_q$ permutation-invariant codes is reduced to a parity-dependent edge-coloring problem on $K_q$.", "url": "https://arxiv.org/abs/2605.22439", "type": "理论", "summary": "我们研究局部维度 $q$ 的 $n$ 个量子点的对称子空间 $\\mathrm{Sym}^n(\\mathbb{C}^q) $ 中的排列不变量子码。对于每个整数 $q\\geq 2$，我们构造一个带有参数 $((4,q,2))_q$ 的排列不变代码。因此，四个物理 qudit 足以对每个局部维度的对称扇区中距离为 2 的一个逻辑 qudit 进行编码。我们还表明，使用排列不变量子码的线性规划约束，对于 $n\\leq 3$，$\\mathrm{Sym}^n(\\mathbb{C}^q)$ 中不存在维度为 $q$ 且距离至少为 $2$ 的排列不变码。因此，四个 qudits 是必要且充分的。该结构具有简单的表示理论和组合描述。在不可约 $\\mathrm{SU}(q)$ 模块 $\\mathrm{Sym}^4(\\mathbb{C}^q)$ 中，距离两个 Knill-Laflamme 条件分为根部分和嘉当部分。通过限制对偶数条目占用层的支持，所有根错误条件都会自动消失。其余的嘉当条件简化为占用向量包的线性平衡约束。\n\n这些数据包根据完整图 $K_q$ 的顶点和边接受自然图论解释：对于奇数 $q$，它们按中点规则组织，而对于偶数 $q$，它们通过将 $K_q$ 分解为完美匹配来组织。这样，最小 $((4,q,2))_q$ 排列不变码的存在被简化为 $K_q$ 上依赖于奇偶校验的边缘着色问题。", "authors": [{"name": "Eric Kubischta"}, {"name": "Ian Teixeira"}], "featured_authors": [{"name": "Eric Kubischta"}, {"name": "Ian Teixeira"}], "author_count": 2}, {"id": "2605.22459", "category": "quant-ph", "title": "Reduced Dynamical Maps in Finite Temperature Vibronic Coupling Models via Choi Matrices: Numerical Methods and Applications", "abstract": "We present a streamlined implementation of a computational framework for constructing and analyzing reduced dynamical maps for complex system--bath models at finite temperature. The methodology is based on three established ingredients of quantum dynamics: the Choi--Jamiołkowski isomorphism for the representation of quantum channels, thermofield (TFD) purification of thermal environments, and tensor-train (TT) propagation of the resulting enlarged pure state. The reduced map is obtained from a single unitary propagation in a thermofield-doubled Hilbert space and represented in matrix form through the Choi--Jamiołkowski isomorphism. The TFD evolution is implemented in the TT representation, enabling efficient propagation of high-dimensional purified thermal states. We illustrate the methodology for exciton transfer in the Fenna--Matthews--Olson complex with site-dependent structured spectral densities represented by discretized bosonic environments. The resulting maps are used to analyze decoherence, relaxation, and finite-memory effects, and to assess the crossover to an effectively time-local description. The proposed approach provides a route to compute reduced propagators and to post-process them into memory kernels, transfer tensors, and effective kinetic rate descriptions for complex molecular systems.", "url": "https://arxiv.org/abs/2605.22459", "type": "理论+数值", "summary": "我们提出了计算框架的简化实现，用于构建和分析复杂系统（有限温度下的浴模型）的简化动态图。该方法基于量子动力学的三个既定要素：用于表示量子通道的 Choi-Jamiołkowski 同构、热环境的热场 (TFD) 净化以及所得放大纯态的张量序列 (TT) 传播。简化映射是从热场双希尔伯特空间中的单一酉传播获得的，并通过 Choi-Jamiołkowski 同构以矩阵形式表示。 TFD 演化以 TT 表示形式实现，从而实现高维纯化热态的高效传播。我们说明了 Fenna-Matthews-Olson 复合体中激子转移的方法，具有由离散玻色环境表示的位置相关的结构化光谱密度。生成的图用于分析退相干、松弛和有限记忆效应，并评估与有效时间局部描述的交叉。\n\n所提出的方法提供了一种计算简化传播子并将其后处理为内存内核、传输张量和复杂分子系统的有效动力学速率描述的途径。", "authors": [{"name": "Raffaele Borrelli"}, {"name": "Hideaki Takahashi"}], "featured_authors": [{"name": "Raffaele Borrelli"}, {"name": "Hideaki Takahashi"}], "author_count": 2}, {"id": "2605.22463", "category": "quant-ph", "title": "Reinforcement learning for ion shuttling on trapped-ion quantum computers", "abstract": "Scalable trapped-ion quantum computing is commonly realized with modular chips that feature distinct zones with specific functionalities, such as storage, state preparation, and gate execution. To execute a quantum circuit, the ions must be transported between these zones. This process is called ion shuttling. To achieve reliable computation results, the shuttling process must be optimized. However, as the number of ions increases, this becomes a high-dimensional optimization problem where optimal solutions cannot be computed efficiently. We demonstrate, to the best of our knowledge, the first use of reinforcement learning (RL) for the optimization of ion shuttling. RL is well-suited for such scenarios, as it enables learning a strategy through direct interaction with the problem. We show that our RL approach outperforms current state-of-the-art heuristic techniques, yielding a reduction in shuttling operations of up to 36.3 %. Furthermore, we show that our method is easily applicable to various chip architectures. Our approach offers a versatile method to study shuttling efficiency during chip design and, therefore, a highly relevant tool for future, more complex architectures.", "url": "https://arxiv.org/abs/2605.22463", "type": "数值", "summary": "可扩展的俘获离子量子计算通常通过模块化芯片来实现，这些芯片具有具有特定功能的不同区域，例如存储、状态准备和门执行。为了执行量子电路，离子必须在这些区域之间传输。这个过程称为离子穿梭。为了获得可靠的计算结果，必须优化穿梭过程。然而，随着离子数量的增加，这成为一个高维优化问题，无法有效地计算最优解。据我们所知，我们首次使用强化学习（RL）来优化离子穿梭。强化学习非常适合此类场景，因为它可以通过与问题的直接交互来学习策略。我们证明，我们的 RL 方法优于当前最先进的启发式技术，可将穿梭操作减少高达 36.3%。此外，我们表明我们的方法可以轻松适用于各种芯片架构。我们的方法提供了一种通用的方法来研究芯片设计期间的穿梭效率，因此，对于未来更复杂的架构来说，这是一种高度相关的工具。", "authors": [{"name": "Maximilian Schier"}, {"name": "Lea Richtmann"}, {"name": "Christian Staufenbiel"}, {"name": "Tobias Schmale"}, {"name": "Daniel Borcherding"}, {"name": "Michèle Heurs"}, {"name": "Bodo Rosenhahn"}], "featured_authors": [{"name": "Maximilian Schier"}, {"name": "Lea Richtmann"}, {"name": "Christian Staufenbiel"}, {"name": "Daniel Borcherding"}, {"name": "Michèle Heurs"}, {"name": "Bodo Rosenhahn"}], "author_count": 7}, {"id": "2605.22580", "category": "quant-ph", "title": "Practical Countermeasure Against Attacks Exploiting Detection Efficiency Mismatch in Quantum Key Distribution", "abstract": "We demonstrate a practical countermeasure against a well-known class of attacks on quantum key distribution (QKD) systems that exploit detection efficiency mismatch, where the receiver's detectors do not exhibit identical responses to incoming photons across all degrees of freedom. This class of quantum hacking strategies is broad and significantly includes the time-shift attack, which targets an arrival-time-dependent side channel at the receiver. The four-state countermeasure, previously only proven to be secure in theory, is implemented here on a GHz-clocked prototype QKD system and evaluated for its security and performance. We show that its presence enables almost complete recovery of the system's ideal secret key rate. Our results provide strong justification for adopting this countermeasure as a standard component in future scalable and practical QKD systems.", "url": "https://arxiv.org/abs/2605.22580", "type": "理论+数值", "summary": "我们展示了针对量子密钥分发 (QKD) 系统的一类众所周知的攻击的实用对策，这些系统利用检测效率不匹配，其中接收器的检测器不会在所有自由度上对传入光子表现出相同的响应。这类量子黑客策略很广泛，主要包括时移攻击，其目标是接收器处依赖于到达时间的侧信道。这种四态对抗措施以前仅在理论上被证明是安全的，现在在 GHz 时钟原型 QKD 系统上实现，并对其安全性和性能进行了评估。我们表明，它的存在几乎可以完全恢复系统的理想密钥率。我们的结果为采用这种对策作为未来可扩展和实用的 QKD 系统的标准组件提供了强有力的理由。", "authors": [{"name": "Ben J. Taylor"}, {"name": "Peter R. Smith"}, {"name": "James F. Dynes"}, {"name": "Robert I. Woodward"}, {"name": "Marco Lucamarini"}, {"name": "R. Mark Stevenson"}, {"name": "Andrew J. Shields"}], "featured_authors": [{"name": "Ben J. Taylor"}, {"name": "Peter R. Smith"}, {"name": "James F. Dynes"}, {"name": "Marco Lucamarini"}, {"name": "R. Mark Stevenson"}, {"name": "Andrew J. Shields"}], "author_count": 7}, {"id": "2605.22603", "category": "quant-ph", "title": "Sudden death of entanglement, rebirth of magic", "abstract": "Local Markovian noise cannot bring entanglement back, but it can bring magic back. Unlike separability, stabilizer membership is not preserved by local channels, allowing dissipation to push states out of the stabilizer polytope as well as in. Under local amplitude damping, the $n$-qubit GHZ family $\\alpha|0^n\\rangle+\\beta|1^n\\rangle$ ($0<\\alpha<\\beta$) loses its magic at a lower damping strength $\\gamma_-$ and regains it at a higher one $\\gamma_+$, while entanglement is irreversibly lost at $\\gamma_e$. This magic-entanglement complementarity, $\\gamma_e+\\gamma_+=1$ for every $n$, reflects a system-environment duality of amplitude damping and persists for a broader class of dissipative channels. For small $\\alpha$, the reborn magic resides in a fully separable state with all proper marginals stabilizer, yet parity-syndrome extraction concentrates it onto a single qubit for magic-state distillation. Local dissipation further divides pure stabilizer states into magic-generators and magic-insulators: at two qubits, the Bell state $|\\Phi^+\\rangle$ generates magic immediately, while its Bell-state partner $|\\Psi^+\\rangle$ remains stabilizer. Together, magic and entanglement reveal a symmetry invisible to either alone.", "url": "https://arxiv.org/abs/2605.22603", "type": "理论", "summary": "局部马尔可夫噪声无法恢复纠缠，但可以恢复魔法。与可分离性不同，稳定器成员资格不会被局部通道保留，从而允许耗散将状态推入稳定器多面体。在局部振幅阻尼下，$n$-qubit GHZ 系列 $\\alpha|0^n\\rangle+\\beta|1^n\\rangle$ ($0<\\alpha<\\beta$) 在较低阻尼强度 $\\gamma_-$ 下失去其魔力，并在较高阻尼强度 $\\gamma_+$ 下恢复它，而纠缠在$\\gamma_e$处不可逆地丢失。这种神奇的纠缠互补性，$\\gamma_e+\\gamma_+=1$ 对于每个 $n$，反映了振幅阻尼的系统环境二元性，并且对于更广泛的耗散通道来说仍然存在。对于小 $\\alpha$，重生的魔法处于完全可分离的状态，具有所有适当的边际稳定器，但奇偶校验综合症提取将其集中到单个量子位上以进行魔法状态蒸馏。局部耗散进一步将纯稳定器状态分为魔法发生器和魔法绝缘体：在两个量子位处，贝尔状态 $|\\Phi^+\\rangle$ 立即产生魔法，而其贝尔状态伙伴 $|\\Psi^+\\rangle$ 保持稳定状态。\n\n魔法和纠缠一起揭示了一种单独看不到的对称性。", "authors": [{"name": "Chenfeng Cao"}], "featured_authors": [{"name": "Chenfeng Cao"}], "author_count": 1}, {"id": "2605.22758", "category": "quant-ph", "title": "A sharp interaction-degree threshold for simulating QAOA", "abstract": "We identify a sharp interaction-degree threshold for the classical simulation of QAOA with $2$-local cost functions. At degree $3$, classical sampling from depth-$1$ QAOA with small multiplicative error would collapse the polynomial hierarchy to its third level. At degree $2$, exact classical sampling from depth-$p$ QAOA on $n$ qubits runs in time $n^{O(1)}$ whenever $p = O(\\log n)$. The hard degree-$3$ instances have trivially optimizable cost functions, so sampling hardness does not by itself imply a quantum optimization advantage.", "url": "https://arxiv.org/abs/2605.22758", "type": "数值", "summary": "我们为具有 2 美元局部成本函数的 QAOA 经典模拟确定了一个尖锐的交互度阈值。在 $3$ 级，从深度 $1$ QAOA 进行经典采样，乘法误差很小，会将多项式层次结构折叠到第三级。在 $2$ 级，只要 $p = O(\\log n)$，$n$ 量子位上的深度 $p$ QAOA 的精确经典采样就会在 $n^{O(1)}$ 时间内运行。难度为 3 美元的实例具有可简单优化的成本函数，因此采样硬度本身并不意味着量子优化优势。", "authors": [{"name": "Ralfs Āboliņš"}, {"name": "Andris Ambainis"}], "featured_authors": [{"name": "Ralfs Āboliņš"}, {"name": "Andris Ambainis"}], "author_count": 2}, {"id": "2605.22770", "category": "quant-ph", "title": "Adiabatic Quantum Phase Estimation", "abstract": "Quantum phase estimation (QPE) is a central algorithmic primitive that estimates eigenvalues of a Hamiltonian up to precision $\\epsilon$ in Heisenberg-limited time $T=\\Theta(1/\\epsilon)$. Standard gate-based implementations of QPE require deep controlled time-evolution circuits and are not native to analog hardware. Here, we present a simple adiabatic protocol for QPE that achieves (up to logarithmic factors) the optimal Heisenberg-limited scaling $T = O\\left( \\frac{1}{\\epsilon} \\log\\left(\\delta^{-1}\\right)\\right)$ in both the precision $\\epsilon$ and failure probability $\\delta$. By encoding eigenvalues in populations of computational basis states rather than complex phases, our approach is naturally robust against certain dephasing errors. The adiabatic protocol only requires the ability to couple a single ancilla qubit to the system Hamiltonian as well as pairwise couplings within the ancilla register.", "url": "https://arxiv.org/abs/2605.22770", "type": "理论+数值", "summary": "量子相位估计 (QPE) 是一种核心算法原语，可在海森堡有限时间 $T=\\Theta(1/\\epsilon)$ 内估计哈密顿量的特征值，精度可达 $\\epsilon$。标准的基于门的 QPE 实现需要深度控制的时间演化电路，并且不是模拟硬件本身的。在这里，我们提出了一个简单的 QPE 绝热协议，它在精度 $\\epsilon$ 和故障概率 $\\delta$ 上实现了（最多对数因子）最佳海森堡限制缩放 $T = O\\left( \\frac{1}{\\epsilon} \\log\\left(\\delta^{-1}\\right)\\right)$。通过对计算基础状态群体而不是复杂相位中的特征值进行编码，我们的方法自然对某些相移误差具有鲁棒性。绝热协议仅需要能够将单个辅助量子位耦合到系统哈密顿量以及辅助寄存器内的成对耦合。", "authors": [{"name": "Alexander Schmidhuber"}, {"name": "Seth Lloyd"}], "featured_authors": [{"name": "Alexander Schmidhuber"}, {"name": "Seth Lloyd"}], "author_count": 2}, {"id": "2605.22796", "category": "quant-ph", "title": "Geometric Origin of the Non-Adiabaticity Parameter and Self-Limiting Instability in Driven Nonlinear Systems", "abstract": "We establish that the non-adiabaticity parameter has a direct geometric interpretation as the instantaneous evolution speed of a driven quantum state in projective Hilbert space under the Fubini Study metric. In contrast to conventional asymptotic approaches, the proposed framework provides a strictly local geometric criterion that allows non-adiabatic instability and its nonlinear suppression to be evaluated continuously at each stage of the driven evolution. We further show that an occupation-dependent nonlinear regulator Usuppresses the effective geometric evolution speed, leading to bounded low-occupancy dynamics. The resulting crossover parameter provides a compact criterion for self-limited non-adiabatic instability in driven nonlinear bosonic systems.", "url": "https://arxiv.org/abs/2605.22796", "type": "理论+数值", "summary": "我们确定非绝热性参数具有直接的几何解释，即 Fubini 研究度量下射影希尔伯特空间中驱动量子态的瞬时演化速度。与传统的渐近方法相比，所提出的框架提供了严格的局部几何准则，允许在驱动演化的每个阶段连续评估非绝热不稳定性及其非线性抑制。我们进一步表明，依赖于占用的非线性调节器 U 抑制了有效的几何演化速度，导致有界的低占用动态。由此产生的交叉参数为驱动非线性玻色子系统中的自限非绝热不稳定性提供了一个紧凑的准则。", "authors": [{"name": "A. M. Tishin"}], "featured_authors": [{"name": "A. M. Tishin"}], "author_count": 1}, {"id": "2605.22797", "category": "quant-ph", "title": "One-photon communication in atomic media", "abstract": "We consider the problem of single-photon transmission through an atomic medium, using quantum channel fidelity to describe the resulting information loss. We find that the normalized fidelity decreases monotonically with coupling strength, establishing a performance bound for quantum communication through such media. Our results hold for several channel types and for deterministic and random media.", "url": "https://arxiv.org/abs/2605.22797", "type": "理论", "summary": "我们考虑通过原子介质的单光子传输问题，使用量子通道保真度来描述由此产生的信息损失。我们发现归一化保真度随着耦合强度单调下降，从而建立了通过这种介质的量子通信的性能界限。我们的结果适用于多种通道类型以及确定性和随机媒体。", "authors": [{"name": "Zixiang Hong"}, {"name": "John C. Schotland"}], "featured_authors": [{"name": "Zixiang Hong"}, {"name": "John C. Schotland"}], "author_count": 2}, {"id": "2605.22807", "category": "quant-ph", "title": "How many systems can be dephased before the quantum switch becomes causally definite?", "abstract": "Quantum processes with indefinite causal order -- so-called causally nonseparable processes -- can exhibit various advantages over quantum circuits with a fixed or a well-defined causal structure. A natural question is how much nonclassicality is required for a process to display causal nonseparability. Here we address this by investigating how many systems can be dephased (or decohered) before this property vanishes. First, for bipartite processes with open past and future we show that if all systems are dephased, or if only the future system is kept undephased, then the process becomes causally separable. However, if any single system other than the future system remains undephased, then there exist processes that retain causal nonseparability. Next, we demonstrate a similar behaviour in the multipartite case, when restricted to the physically motivated class of quantum circuits with quantum control (QC-QCs). Namely, dephasing all systems or keeping only the future system undephased renders any QC-QC causally separable; while causal nonseparability can persist if any non-future system is left undephased.", "url": "https://arxiv.org/abs/2605.22807", "type": "理论", "summary": "与具有固定或明确因果结构的量子电路相比，具有不确定因果顺序的量子过程（即所谓的因果不可分离过程）可以表现出各种优势。一个自然的问题是，一个过程需要多少非经典性才能显示因果不可分离性。在这里，我们通过研究在该特性消失之前有多少系统可以相移（或去相干）来解决这个问题。首先，对于具有开放过去和未来的二分过程，我们表明，如果所有系统都失相，或者只有未来系统保持不失相，那么该过程就变得因果可分。然而，如果除未来系统之外的任何单个系统保持未定相，则存在保留因果不可分离性的过程。接下来，当仅限于具有量子控制的物理激励类量子电路（QC-QC）时，我们在多部分情况下展示了类似的行为。也就是说，使所有系统失相或仅使未来系统保持不失相使得任何 QC-QC 因果上可分离；而如果任何非未来系统保持不变，因果不可分离性就会持续存在。", "authors": [{"name": "Yassine Benhaj"}, {"name": "Kuntal Sengupta"}, {"name": "Cyril Branciard"}], "featured_authors": [{"name": "Yassine Benhaj"}, {"name": "Kuntal Sengupta"}, {"name": "Cyril Branciard"}], "author_count": 3}];
    const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;
      }).join("");
    }
    function rerenderFilters() {
      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
</html>
