  <style>

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }

  <script>
    const papers = [{"id": "2605.21585", "category": "cond-mat", "title": "Robust fluctuating intertwined charge stripes in the Emery model", "abstract": "The single-band Hubbard model is one of the most extensively studied models in condensed matter physics, giving rise to intertwined spin and charge stripes that coexist with, or lie in the vicinity of, superconductivity in the phase diagram. However, whether the low energy physics of the single-band Hubbard model is fully equivalent to the multi-band (multi-orbital) Emery model remains an unsettled question. While the intertwined stripes and nematicity have been studied in the single-band Hubbard model, a comprehensive picture in the Emery model is lacking. In this paper, we focus on the less investigated intertwined charge stripes using complementary density matrix renormalization group (DMRG) and determinant quantum Monte Carlo (DQMC) techniques. Our ground state DMRG confirms the presence of the oxygen-centered charge stripes at a reduced amplitude in the Emery model parameter regime widely used in the study of intertwined stripes. Close analysis of the oxygen orbital structure of the static charge correlation function from DQMC reveals the charge stripe pattern in real-space, showcasing stronger charge density modulation on $p$-orbitals pointing along ``the rivers of charge'', consistent with DMRG. For the parameter set with the largest fermion signs, we managed to reach a temperature where the system first demonstrated tendencies to form purely unidirectional spin and charge stripes, and the $B_{1g}$ component becomes dominant in the bond-charge nematic susceptibility. This observation correlates with the doping dependence of the kinetic energy anisotropy, suggesting a close relation between the nematicity and charge stripes in the Emery model.", "url": "https://arxiv.org/abs/2605.21585", "type": "理论+数值", "summary": "单带哈伯德模型是凝聚态物理中研究最广泛的模型之一，它产生了相图中与超导性共存或位于超导性附近的交织的自旋和电荷条纹。然而，单能带哈伯德模型的低能物理是否完全等效于多能带（多轨道）埃默里模型仍然是一个悬而未决的问题。虽然在单带 Hubbard 模型中研究了交织的条纹和向列性，但 Emery 模型中缺乏全面的描述。在本文中，我们使用互补密度矩阵重正化群 (DMRG) 和行列式量子蒙特卡罗 (DQMC) 技术重点研究较少研究的交织电荷带。我们的基态 DMRG 证实了在广泛用于缠绕带研究的金刚砂模型参数体系中，以降低的幅度存在以氧为中心的电荷带。\n\n对 DQMC 静电荷相关函数的氧轨道结构的仔细分析揭示了真实空间中的电荷条纹图案，展示了沿着“电荷河流”指向的 $p$ 轨道上更强的电荷密度调制，与 DMRG 一致。对于具有最大费米子符号的参数集，我们设法达到系统首先表现出形成纯单向自旋和电荷条纹的倾向的温度，并且 $B_{1g}$ 成分在键电荷向列磁化率中占主导地位。这一观察结果与动能各向异性的掺杂依赖性相关，表明金刚砂模型中的向列性和电荷条纹之间存在密切关系。", "authors": [{"name": "Rong Zhang"}, {"name": "Sijia Zhao"}, {"name": "Hong-Chen Jiang"}, {"name": "Brian Moritz"}, {"name": "Edwin W. Huang"}, {"name": "Thomas P. Devereaux"}], "featured_authors": [{"name": "Rong Zhang"}, {"name": "Sijia Zhao"}, {"name": "Hong-Chen Jiang"}, {"name": "Brian Moritz"}, {"name": "Edwin W. Huang"}, {"name": "Thomas P. Devereaux"}], "author_count": 6}, {"id": "2605.21616", "category": "cond-mat", "title": "Observation of Altermagnetic Order Switching in Bulk MnTe by Polarized Neutron Diffraction", "abstract": "Altermagnetic order, characterized by the Néel vector, breaks time-reversal symmetry (TRS) even in the nonrelativistic limit. Although spin-polarized and anomalous transport phenomena emerge with this order, they are mutually compensated by TRS-connected antiphase domains with opposite Néel vectors. Here we employ polarized neutron diffraction to directly probe the altermagnetic order in MnTe. Pronounced nuclear-magnetic interference terms were observed, providing direct evidence of a net Néel vector in the bulk crystal. Moreover, a weak ferromagnetic moment (WFM), originating from relativistic spin-orbit coupling, was found to be coupled with the altermagnetic order. Both the altermagnetic order and the WFM can be switched by milli-Tesla-scale magnetic field cooling.", "url": "https://arxiv.org/abs/2605.21616", "type": "理论", "summary": "以尼尔矢量为特征的交变磁序即使在非相对论极限下也会打破时间反转对称性 (TRS)。尽管自旋极化和反常输运现象以此顺序出现，但它们通过具有相反尼尔矢量的 TRS 连接反相域相互补偿。在这里，我们采用偏振中子衍射来直接探测 MnTe 中的交变磁序。观察到明显的核磁干扰项，为块状晶体中存在净尼尔矢量提供了直接证据。此外，还发现源自相对论自旋轨道耦合的弱铁磁矩（WFM）与交变磁序耦合。交变磁阶和 WFM 都可以通过毫特斯拉级磁场冷却来切换。", "authors": [{"name": "Zheyuan Liu"}, {"name": "Shinichiro Asai"}, {"name": "Shingo Takahashi"}, {"name": "Hiraku Saito"}, {"name": "Taro Nakajima"}, {"name": "Takatsugu Masuda"}], "featured_authors": [{"name": "Zheyuan Liu"}, {"name": "Shinichiro Asai"}, {"name": "Shingo Takahashi"}, {"name": "Hiraku Saito"}, {"name": "Taro Nakajima"}, {"name": "Takatsugu Masuda"}], "author_count": 6}, {"id": "2605.21632", "category": "cond-mat", "title": "Diagrammatic Monte Carlo for Fermionic Rényi Entanglement Entropy", "abstract": "We develop a direct diagrammatic Monte Carlo framework for the Renyi entanglement entropy of interacting lattice fermions. The method starts from the fermionic graded-swap representation of Z_n[A]=Tr_A\\rho_A^n, which converts the entropy problem into a replicated path integral with mixed temporal boundary conditions on the entangling region. In this representation the replica momenta are half-shifted, q_m=(2m+1)\\pi/n, and the interaction expansion has a determinant form suitable for connected-determinant summation. We combine this expansion with a many-configuration Markov-chain Monte Carlo sampler to obtain order-by-order corrections for very large systems to very high orders. As a benchmark, we compare the order-by-order coefficients of a 3*3 Hubbard cluster with exact diagonalization. We then report a production calculation for a large periodic lattice with a square subregions. The dominant system-size limitation is therefore memory rather than a conventional auxiliary-field sign problem. The results provide a step toward diagrammatic calculations of fermionic entanglement observables in regimes where direct quantum Monte Carlo sampling is costly or sign-problem limited.", "url": "https://arxiv.org/abs/2605.21632", "type": "理论+数值", "summary": "我们为相互作用的晶格费米子的 Renyi 纠缠熵开发了一个直接图解蒙特卡罗框架。该方法从 Z_n[A]=Tr_A\\rho_A^n 的费米子梯度交换表示开始，将熵问题转换为纠缠区域上具有混合时间边界条件的复制路径积分。在此表示中，副本动量半移，q_m=(2m+1)\\pi/n，并且交互展开具有适合连通行列式求和的行列式形式。我们将此扩展与多配置马尔可夫链蒙特卡罗采样器相结合，以获得非常大的系统到非常高阶的逐阶校正。作为基准，我们将 3*3 Hubbard 簇的逐阶系数与精确对角化进行比较。然后，我们报告具有方形子区域的大型周期晶格的产生式计算。因此，主要的系统大小限制是内存而不是传统的辅助字段符号问题。这些结果为在直接量子蒙特卡罗采样成本昂贵或符号问题受限的情况下费米子纠缠可观测量的图解计算迈出了一步。", "authors": [{"name": "Boyuan Shi"}], "featured_authors": [{"name": "Boyuan Shi"}], "author_count": 1}, {"id": "2605.21722", "category": "cond-mat", "title": "MetaDNS: Enhancing Exploration in Discrete Neural Samplers via Well-Tempered Metadynamics", "abstract": "Sampling from discrete distributions with multiple modes and energy barriers is fundamental to machine learning and computational physics. Recent discrete neural samplers like MDNS suffer from mode collapse and fail to sample high-energy barrier regions between modes, which is critical for free energy estimation and understanding phase transitions. We propose Metadynamics Discrete Neural Sampler (MetaDNS), a general framework integrating well-tempered metadynamics into discrete diffusion or autoregressive samplers. By maintaining an adaptive, history-dependent bias potential along selected low-dimensional coordinates, MetaDNS forces exploration of previously inaccessible regions, enabling free energy reconstruction infeasible with standard neural samplers due to a lack of high-energy samples. On challenging low-temperature benchmarks including Ising, Potts, and the copper-gold binary alloy, MetaDNS reproduces the thermodynamic distribution. Compared to MCMC-based metadynamics, MetaDNS also achieves comparable exploration requiring fewer bias deposition steps.", "url": "https://arxiv.org/abs/2605.21722", "type": "理论+数值", "summary": "从具有多种模式和能量势垒的离散分布中进行采样是机器学习和计算物理的基础。最近的离散神经采样器（例如 MDNS）遭受模式崩溃的困扰，并且无法对模式之间的高能势垒区域进行采样，这对于自由能估计和理解相变至关重要。我们提出了元动力学离散神经采样器（MetaDNS），这是一个将良好的元动力学集成到离散扩散或自回归采样器中的通用框架。通过沿选定的低维坐标保持自适应的、依赖于历史的偏置势，MetaDNS 强制探索以前无法访问的区域，从而使由于缺乏高能样本而无法使用标准神经采样器进行自由能重建。在具有挑战性的低温基准（包括 Ising、Potts 和铜金二元合金）上，MetaDNS 再现了热力学分布。与基于 MCMC 的元动力学相比，MetaDNS 还实现了类似的探索，需要更少的偏差沉积步骤。", "authors": [{"name": "Xiaochen Du"}, {"name": "Juno Nam"}, {"name": "Jaemoo Choi"}, {"name": "Wei Guo"}, {"name": "Sathya Edamadaka"}, {"name": "Junyi Sha"}, {"name": "Elton Pan"}, {"name": "Yongxin Chen"}, {"name": "Molei Tao"}, {"name": "Rafael Gómez-Bombarelli"}], "featured_authors": [{"name": "Xiaochen Du"}, {"name": "Juno Nam"}, {"name": "Jaemoo Choi"}, {"name": "Yongxin Chen"}, {"name": "Molei Tao"}, {"name": "Rafael Gómez-Bombarelli"}], "author_count": 10}, {"id": "2605.21741", "category": "cond-mat", "title": "Rheology and Programmable Gelation of DNA Origami Polymer Tadpoles", "abstract": "DNA origami is a powerful method to achieve nanoscale folded structures. Despite rapid improvements in folding and purification methods, DNA origami objects are still often produced in small quantities and studied at single molecule scale. Here, we design simple DNA origami-inspired polymers with complex topologies, and study their rheology and viscoelastic properties in dense conditions. First, we designed and purified topologically distinct DNA nanostructures, linear, circular, and \"tadpole\" polymers, to evaluate how polymer architecture influences entanglement and rheology. Despite their distinct topologies, we observe that all constructs obeyed universal rheological scalings, likely due to their short length. However, upon thermal annealing in the bulk, the DNA origami-like polymers displayed significantly different behaviours. Our results suggest that DNA origami-like polymers could be used to engineer thermoresponsive behaviours in complex fluids by introducing reversible and topology-dependent crosslinking.", "url": "https://arxiv.org/abs/2605.21741", "type": "理论+数值", "summary": "DNA折纸是实现纳米级折叠结构的有效方法。尽管折叠和纯化方法迅速改进，DNA折纸物体仍然经常小批量生产并在单分子规模上进行研究。在这里，我们设计了具有复杂拓扑的简单 DNA 折纸聚合物，并研究了它们在致密条件下的流变性和粘弹性能。首先，我们设计并纯化了拓扑不同的 DNA 纳米结构、线性、圆形和“蝌蚪”聚合物，以评估聚合物结构如何影响缠结和流变学。尽管它们的拓扑结构不同，但我们观察到所有结构都遵循通用的流变尺度，这可能是由于它们的长度较短。然而，在整体热退火后，类似 DNA 折纸的聚合物表现出显着不同的行为。我们的结果表明，DNA 折纸状聚合物可通过引入可逆和拓扑依赖的交联来设计复杂流体中的热响应行为。", "authors": [{"name": "Jennifer Harnett"}, {"name": "Saminathan Ramakrishnan"}, {"name": "Alice L. B. Pyne"}, {"name": "Elizabeth P. Holmes"}, {"name": "Davide Michieletto"}], "featured_authors": [{"name": "Jennifer Harnett"}, {"name": "Saminathan Ramakrishnan"}, {"name": "Alice L. B. Pyne"}, {"name": "Elizabeth P. Holmes"}, {"name": "Davide Michieletto"}], "author_count": 5}, {"id": "2605.21767", "category": "cond-mat", "title": "Uncovering Antipolar Ordering and Pressure-Tunable Phases in Hexagonal LaN", "abstract": "We predict an antipolar instability in hexagonal LaN using first-principles density functional theory. Starting from a nonpolar hexagonal phase, we identify competing polar and antipolar zone-center phonon instabilities. Condensation of the polar and antipolar modes stabilizes, respectively, dynamically stable wurtzite (WZ) phase and an hexagonal antipolar (AP) phase which is characterized by alternating local polarization and zero net macroscopic polarization within the unit cell. At ambient conditions, the AP phase is metastable with respect to the WZ phase, and a finite energy barrier exists between these phases, suggesting a possible polarization-switching pathway via the AP intermediate state. The energy barrier between the WZ and AP phases decreases with increasing pressure, indicating enhanced tunability between polar and antipolar states. The sublattice polarization increases with pressure in the AP phase, while it decreases in the WZ phase. We further find that, with increasing pressure, the rock-salt and tetragonal phases of LaN become more stable than the hexagonal phases (AP and WZ). Consequently, the realization of the AP phase is more favorable in the low-pressure regime, where hexagonal phases remain energetically competitive. These results demonstrate pressure-driven competition between polar and antipolar phases in LaN and point toward antiferroelectric-like behavior in this binary nitride system.", "url": "https://arxiv.org/abs/2605.21767", "type": "理论+数值", "summary": "我们使用第一性原理密度泛函理论预测了六方 LaN 中的反极不稳定性。从非极性六方相开始，我们识别了竞争的极性和反极性区域中心声子不稳定性。极性和反极性模式的凝聚分别稳定动态稳定的纤锌矿（WZ）相和六方反极性（AP）相，其特征在于晶胞内交替的局部偏振和零净宏观偏振。在环境条件下，AP 相相对于 WZ 相是亚稳态的，并且这些相之间存在有限的能垒，这表明可能存在通过 AP 中间态的偏振切换路径。 WZ 相和 AP 相之间的能垒随着压力的增加而减小，表明极性态和反极性态之间的可调性增强。在 AP 相中，亚晶格极化随着压力的增加而增加，而在 WZ 相中则随着压力的增加而减少。我们进一步发现，随着压力的增加，LaN 的岩盐相和四方相变得比六方相（AP 和 WZ）更稳定。\n\n因此，AP 相的实现在低压状态下更为有利，此时六方相仍具有很强的竞争力。这些结果证明了 LaN 中极性相和反极性相之间的压力驱动竞争，并指出了这种二元氮化物系统中的类似反铁电的行为。", "authors": [{"name": "Atanu Paul"}, {"name": "Laurent Bellaiche"}, {"name": "Charles Paillard"}], "featured_authors": [{"name": "Atanu Paul"}, {"name": "Laurent Bellaiche"}, {"name": "Charles Paillard"}], "author_count": 3}, {"id": "2605.21774", "category": "cond-mat", "title": "Conductivity of a Non-Galilean--Invariant Fermi Liquid: Exact Solution of the Kinetic Equation", "abstract": "We obtain an exact expression for the conductivity of a disordered, non-Galilean-invariant Fermi liquid by solving the kinetic equation with both screened Coulomb and $z=3$ Pomeranchuk critical interactions. While consistent with previous asymptotic results, our solution shows that electron-electron interactions enter the conductivity solely via the quasiparticle scattering time, $\\tau_\\mathrm{ee}$. Accordingly, the crossovers between the collisionless and hydrodynamic regimes occur when $1/\\tau_\\mathrm{ee}$ becomes comparable to the larger of the impurity scattering rate and the probe frequency, $\\Omega$. In addition, the exact solution yields the optical response in the hydrodynamic regime, $\\Omega\\ll 1/\\tau_\\mathrm{ee}$, which is inaccessible within perturbation theory. Near a $z=3$ Pomeranchuk quantum critical point, consistency between the kinetic-equation and Kubo approaches requires proper inclusion of mass renormalization within the Eliashberg approximation, which also ensures that the crossover between the collisionless and hydrodynamic regimes in the optical conductivity occurs at the Planckian scale $\\Omega\\sim T$.", "url": "https://arxiv.org/abs/2605.21774", "type": "理论", "summary": "通过求解具有筛选库仑和 $z=3$ Pomeranchuk 临界相互作用的动力学方程，我们获得了无序、非伽利略不变费米液体电导率的精确表达式。虽然与之前的渐近结果一致，但我们的解决方案表明，电子-电子相互作用仅通过准粒子散射时间 $\\tau_\\mathrm{ee}$ 进入电导率。因此，当 $1/\\tau_\\mathrm{ee}$ 与杂质散射率和探测频率 $\\Omega$ 中较大者相当时，无碰撞和流体动力学状态之间就会发生交叉。此外，精确解产生了流体动力学状态下的光学响应 $\\Omega\\ll 1/\\tau_\\mathrm{ee}$，这在微扰理论中是无法获得的。在 $z=3$ Pomeranchuk 量子临界点附近，动力学方程和 Kubo 方法之间的一致性需要在 Eliashberg 近似中适当包含质量重正化，这也确保了光学电导率中无碰撞和流体动力学状态之间的交叉发生在普朗克尺度 $\\Omega\\sim T$ 上。", "authors": [{"name": "Tatia Kiliptari"}, {"name": "Vladimir I. Yudson"}, {"name": "Dmitrii L. Maslov"}], "featured_authors": [{"name": "Tatia Kiliptari"}, {"name": "Vladimir I. Yudson"}, {"name": "Dmitrii L. Maslov"}], "author_count": 3}, {"id": "2605.21826", "category": "cond-mat", "title": "A diffuse-interface theory of active nematic interfaces: transport mechanisms and modal structure", "abstract": "We develop a long-wavelength theory for the linear stability of a flat interface between an active nematic and an isotropic fluid. Starting from a diffuse-interface Cahn--Hilliard--Landau--de Gennes description coupled to Brinkman-screened Stokes hydrodynamics, we project the linearized dynamics onto a small set of interfacial degrees of freedom: the conserved translation, or height, mode; a scalar profile distortion or amplitude mode; and a transverse orientational mode associated with director rotations. Eliminating the gapped scalar profile mode gives a reduced interfacial operator coupling the conserved height mode to the transverse orientational mode. The main result is that activity generates, in the screened diffuse-interface regime, a direct local contribution proportional to $q^2$ in the height sector. This term competes with the passive local diffusive capillary relaxation, which enters at order $q^4$, and defines a local active interfacial channel controlled by the internal structure of the diffuse interface. This mechanism is distinct from the non-analytic $|q|$ and $|q|q^2$ terms characteristic of weakly screened Hele--Shaw/Saffman--Taylor-type transport, which are controlled by long-ranged momentum transport in the surrounding fluid. This framework identifies a diffuse-interface route to active interfacial instability that can operate while the homogeneous active nematic remains linearly stable because of hydrodynamic screening. It also provides a basis for distinguishing local diffuse-interface instabilities, bulk-flow-driven hydrodynamic instabilities, and mixed regimes in active nematic--isotropic interfaces.", "url": "https://arxiv.org/abs/2605.21826", "type": "理论", "summary": "我们开发了一种长波长理论，用于研究活性向列相和各向同性流体之间平坦界面的线性稳定性。从扩散界面 Cahn-Hilliard-Landau-de Gennes 描述与 Brinkman 筛选的 Stokes 流体动力学相结合开始，我们将线性化动力学投影到一小组界面自由度上：守恒平移或高度模式；标量轮廓失真或幅度模式；以及与导向器旋转相关的横向定向模式。消除有间隙的标量轮廓模式给出了将守恒高度模式与横向取向模式耦合的简化界面算子。主要结果是，在屏蔽扩散界面区域中，活动产生了与高度区域中的 $q^2$ 成比例的直接局部贡献。该术语与被动局部扩散毛细管松弛相竞争，被动局部扩散毛细管松弛按 $q^4$ 顺序进入，并定义了由扩散界面内部结构控制的局部主动界面通道。\n\n这种机制不同于弱屏蔽 Hele-Shaw/Saffman-Taylor 型输运的非解析 $|q|$ 和 $|q|q^2$ 项特征，后者受周围流体中的长程动量输运控制。该框架确定了一种实现活性界面不稳定性的扩散界面途径，该途径可以在均质活性向列由于流体动力学筛选而保持线性稳定的同时运行。它还为区分局部扩散界面不稳定性、整体流驱动的流体动力学不稳定性以及活性向列-各向同性界面中的混合状态提供了基础。", "authors": [{"name": "Rodrigo C. V. Coelho"}, {"name": "Mykola Tasinkevych"}, {"name": "Margarida M. Telo da Gama"}], "featured_authors": [{"name": "Rodrigo C. V. Coelho"}, {"name": "Mykola Tasinkevych"}, {"name": "Margarida M. Telo da Gama"}], "author_count": 3}, {"id": "2605.21855", "category": "cond-mat", "title": "Defect Kinematics in 2D Nematics: Contributions from Surface Topology, Intrinsic and Extrinsic Geometry, Solitons, Defect Orientations, and Elastic Anisotropy", "abstract": "We characterise the particlelike kinematics of charge-carrying topological defects in nematic media via a geometric field theory. This differs from the theory of electromagnetism, with which it is often compared, due to the absence of gauge-invariance. In both approaches, basic defect interactions are governed by a propagator, which depends upon the global topology and/or intrinsic geometry of the surface. For nematic materials, however, the minimisation of the free energy is sensitive to constraints that a gauge invariant theory would otherwise be indifferent to. Hodge theory is used to capture these as `harmonic' excitations, unifying two factors known to additionally affect the kinematics of defects in nematics: relative defect orientations and topological solitons. Perturbations to the form of the energy are also permitted in nematic materials due to gauge \\emph{non}invariance. Those that introduce non-linearities in the corresponding Euler--Lagrange equations are shown to result in defect interactions that go beyond pairwise despite the otherwise abelian nature of the underlying U(1) symmetry. We show how this type of induced many-body effect manifests in the cases of non-zero extrinsic curvature and/or elastic anisotropy.", "url": "https://arxiv.org/abs/2605.21855", "type": "理论", "summary": "我们通过几何场论描述了向列介质中带电拓扑缺陷的粒子运动学。由于不存在规范不变性，这与经常被比较的电磁学理论不同。在这两种方法中，基本缺陷相互作用均由传播器控制，传播器取决于表面的全局拓扑和/或固有几何形状。然而，对于向列材料，自由能的最小化对约束很敏感，否则规范不变理论将对此漠不关心。霍奇理论用于将这些作为“谐波”激发来捕获，统一了已知的两个额外影响向列相缺陷运动学的因素：相对缺陷方向和拓扑孤子。由于规范\\emph{非}不变性，向列材料中也允许对能量形式的扰动。在相应的欧拉-拉格朗日方程中引入非线性的那些被证明会导致超出成对范围的缺陷相互作用，尽管潜在的 U(1) 对称性具有其他阿贝尔性质。\n\n我们展示了这种类型的诱导多体效应在非零外在曲率和/或弹性各向异性的情况下如何表现。", "authors": [{"name": "Joseph Pollard"}, {"name": "Richard G. Morris"}], "featured_authors": [{"name": "Joseph Pollard"}, {"name": "Richard G. Morris"}], "author_count": 2}, {"id": "2605.21900", "category": "cond-mat", "title": "Dissipation-Selected Resonant Fronts in a Driven-Dissipative Bose-Hubbard Lattice", "abstract": "Spatially structured dissipation organizes driven quantum matter beyond Hamiltonian control. We show that a dissipation gradient combined with a Stark-induced detuning ramp selects a nonlinear resonance slice in a two-dimensional driven-dissipative Bose-Hubbard lattice, producing a pinned density front in generalized Gross-Pitaevskii simulations. The underlying resonance condition fixes the front position, while its Airy-like profile obeys a width scaling set by tunneling stiffness and the effective detuning slope. Treating the front as an emergent interface explains how tuning the selected resonance toward the minimum-loss side yields Peierls-Nabarro depinning steps, discrete transverse pattern locking, spatiotemporal chaos, and minimum-loss localization. Center-of-mass and generalized-imbalance diagnostics map these outcomes into a dynamical phase diagram as detuning-ramp slope and dissipation-gradient strength vary. The results suggest structured dissipation as a mechanism for reconfigurable transport barriers and nonequilibrium interfaces in programmable bosonic lattices.", "url": "https://arxiv.org/abs/2605.21900", "type": "理论+数值", "summary": "空间结构的耗散组织了超出哈密顿控制的驱动量子物质。我们证明，耗散梯度与斯塔克引起的失谐斜坡相结合，选择了二维驱动耗散玻色-哈伯德晶格中的非线性共振切片，从而在广义 Gross-Pitaevskii 模拟中产生固定密度前沿。潜在的共振条件固定了前部位置，而其类艾里轮廓遵循由隧道刚度和有效失谐斜率设置的宽度缩放。将前沿视为紧急界面解释了如何将选定的共振调整到最小损耗侧，从而产生 Peierls-Nabarro 脱钉步骤、离散横向图案锁定、时空混沌和最小损耗定位。随着失谐斜坡斜率和耗散梯度强度的变化，质心和广义不平衡诊断将这些结果映射到动态相图中。结果表明，结构化耗散是可编程玻色子晶格中可重构传输势垒和非平衡界面的机制。", "authors": [{"name": "Wei-Guo Ma"}, {"name": "Heng Fan"}], "featured_authors": [{"name": "Wei-Guo Ma"}, {"name": "Heng Fan"}], "author_count": 2}, {"id": "2605.21918", "category": "cond-mat", "title": "First-Principles Study of Fe Adsorption and Its Effects on the Mechanical and Electrical Properties of Monolayer and Bilayer Biphenylene Networks", "abstract": "Biphenylene network (BPN) is a 2D carbon allotrope that exhibits promising potential for applications. In this work, we systematically investigated the adsorption characteristics of Fe atoms on monolayer and bilayer BPN. Structural optimization and adsorption energy analysis reveal that, for monolayer BPN, the average adsorption gradually enhances with increasing Fe coverage, indicating a strengthening of Fe-substrate interactions. The most stable configuration is identified at an Fe/C ratio of 50 %. For bilayer BPN, the energetically preferred adsorption site for Fe atom is located at the center of the interlayer four-membered ring, with an average adsorption energy of -4.3 eV. Mechanical properties are further evaluated for pristine and Fe-decorated BPN. The results demonstrate that monolayer and bilayer BPN possess relatively high in-plane Young's and shear moduli, indicative of excellent in-plane mechanical stability. Fe adsorption is found to have only a minor effect on the in-plane mechanical properties of both monolayer and bilayer BPN, suggesting that the in-plane stiffness is predominantly governed by the intrinsic carbon framework. In contrast, the out-of-plane mechanical response of bilayer BPN is significantly affected by Fe incorporation. The effective out-of-plane elastic constant C33 of pristine bilayer BPN is calculated to be 24.59 GPa, indicating relatively weak interlayer interactions and facile deformation along the out-of-plane direction. Notably, this property can be substantially enhanced by interlayer Fe adsorption, with C33 increasing dramatically to 515.63 GPa upon an Fe/C ratio of 25 %. The calculations on pristine and Fe-decorated BPN reveal pronounced anisotropy in the conductivity, with the value along one direction being significantly higher than that along the other. At 300 K, the overall conductivity is on the order of 10^5 S/m.", "url": "https://arxiv.org/abs/2605.21918", "type": "理论+数值", "summary": "联苯网络（BPN）是一种二维碳同素异形体，具有广阔的应用前景。在这项工作中，我们系统地研究了Fe原子在单层和双层BPN上的吸附特性。结构优化和吸附能分析表明，对于单层 BPN，平均吸附随着 Fe 覆盖率的增加而逐渐增强，表明 Fe-基底相互作用的增强。最稳定的构型被确定为 Fe/C 比率为 50%。对于双层BPN，Fe原子的能量优先吸附位点位于层间四元环的中心，平均吸附能为-4.3 eV。进一步评估原始 BPN 和铁修饰 BPN 的机械性能。结果表明，单层和双层 BPN 具有相对较高的面内杨氏模量和剪切模量，表明具有优异的面内机械稳定性。研究发现 Fe 吸附对单层和双层 BPN 的面内机械性能仅产生很小的影响，这表明面内刚度主要由内在碳骨架决定。\n\n相比之下，双层 BPN 的面外机械响应受到 Fe 掺入的显着影响。原始双层BPN的有效面外弹性常数C33经计算为24.59 GPa，表明层间相互作用相对较弱，并且沿面外方向容易变形。值得注意的是，这种特性可以通过层间 Fe 吸附得到显着增强，当 Fe/C 比率为 25% 时，C33 急剧增加至 515.63 GPa。对原始 BPN 和 Fe 修饰 BPN 的计算揭示了电导率的显着各向异性，沿一个方向的值明显高于沿另一方向的值。在 300 K 时，总电导率约为 10^5 S/m。", "authors": [{"name": "Xiao-Ke Zhang"}, {"name": "Zheng-Zhe Lin"}], "featured_authors": [{"name": "Xiao-Ke Zhang"}, {"name": "Zheng-Zhe Lin"}], "author_count": 2}, {"id": "2605.21933", "category": "cond-mat", "title": "Thermodynamic Irreversibility of Training Algorithms", "abstract": "The training algorithms for AI systems all introduce far-from-equilibrium dynamical processes, and understanding the irreversibility of these algorithms is a fundamental step towards understanding the learning dynamics of modern AI systems. In this work, we establish a general framework for defining and analyzing the irreversibility of training algorithms. We show that four different ways to characterize the irreversibility of dynamical processes are equivalent to leading order in the step size $\\eta$: numerical backward error $\\phi_{\\rm DE}$, time-renormalized correction $\\phi_{\\rm TR}$, microscopic time reversal asymmetry $\\phi_{\\rm TA}$, and the (regularized) stochastic-thermodynamic entropy production $\\phi_{\\rm ST}$. The irreversibility gives rise to a time-reversal-symmetry-breaking emergent force that generically breaks non-isometric continuous reparametrization symmetries, preserves orthogonal symmetries, and leads to a universal preference for those learning trajectories that minimize the entropy production rate.", "url": "https://arxiv.org/abs/2605.21933", "type": "理论+数值", "summary": "人工智能系统的训练算法都引入了远离平衡的动态过程，理解这些算法的不可逆性是理解现代人工智能系统学习动态的基本一步。在这项工作中，我们建立了一个用于定义和分析训练算法的不可逆性的通用框架。我们证明了表征动态过程不可逆性的四种不同方法相当于步长 $\\eta$ 中的前序：数值后向误差 $\\phi_{\\rm DE}$、时间重正化校正 $\\phi_{\\rm TR}$、微观时间反演不对称性 $\\phi_{\\rm TA}$ 和（正则化）随机热力学熵产生 $\\phi_{\\rm ST}$。这种不可逆性产生了一种打破时间反转对称性的新兴力量，它通常打破非等距连续重参数化对称性，保留正交对称性，并导致对那些最小化熵产生率的学习轨迹的普遍偏好。", "authors": [{"name": "Liu Ziyin"}, {"name": "Yuanjie Ren"}, {"name": "Adam Levine"}, {"name": "Isaac Chuang"}], "featured_authors": [{"name": "Liu Ziyin"}, {"name": "Yuanjie Ren"}, {"name": "Adam Levine"}, {"name": "Isaac Chuang"}], "author_count": 4}, {"id": "2605.22103", "category": "cond-mat", "title": "Berezinskii-Kosterlitz-Thouless-type Transition in Site Percolation on the Diamond Hierarchical Lattice", "abstract": "We study site percolation on the diamond hierarchical lattice, a finite-dimensional fractal network, using an exact generating-function analysis. In contrast to bond percolation, site percolation on this lattice does not undergo a transition from a nonpercolating phase to a percolating phase. Instead, the system exhibits a nonpercolating phase for $p<p_{\\rm c}$ and a critical phase for $p>p_{\\rm c}$. In the critical phase, the size of the largest cluster remains subextensive, scaling as $N^{\\psi(p)}$, where the fractal exponent $\\psi(p)$ varies continuously with $p$. By analyzing the renormalization-group recursion relation in the vicinity of $p_{\\rm c}$, we show that the correlation length exhibits a Berezinskii-Kosterlitz-Thouless-type essential singularity, $\\xi(p)\\sim \\exp \\left({\\rm const}/\\sqrt{p_{\\rm c}-p}\\right)$ for $p \\to p_{\\rm c}^-$, which is further confirmed by finite-size scaling analyses showing excellent data collapse. These results demonstrate that critical phases in percolation can emerge even on finite-dimensional networks and that exponential volume growth is not necessary for such phases to appear. We argue that the critical phase on the diamond hierarchical lattice stems from site dilution remaining relevant under renormalization.", "url": "https://arxiv.org/abs/2605.22103", "type": "理论+数值", "summary": "我们使用精确的生成函数分析来研究金刚石分层晶格（有限维分形网络）上的位点渗透。与键渗滤相反，该晶格上的位点渗滤不会经历从非渗滤相到渗滤相的转变。相反，系统表现出 $p<p_{\\rm c}$ 的非渗透相和 $p>p_{\\rm c}$ 的临界相。在关键阶段，最大簇的大小仍然是次广泛的，缩放为 $N^{\\psi(p)}$，其中分形指数 $\\psi(p)$ 随 $p$ 连续变化。通过分析$p_{\\rm c}$附近的重整化群递归关系，我们发现相关长度表现出Berezinskii-Kosterlitz-Thouless型本质奇点，$\\xi(p)\\sim \\exp \\left({\\rm const}/\\sqrt{p_{\\rm c}-p}\\right)$对于$p \\to p_{\\rm c}^-$，进一步证实有限尺寸缩放分析显示出色的数据崩溃。这些结果表明，渗流中的关键相即使在有限维网络上也可能出现，并且指数体积增长对于此类相的出现并不是必需的。\n\n我们认为金刚石分级晶格的关键相源于在重整化下仍然相关的位点稀释。", "authors": [{"name": "Takehisa Hasegawa"}, {"name": "Kazuki Wataya"}, {"name": "Tomoaki Nogawa"}], "featured_authors": [{"name": "Takehisa Hasegawa"}, {"name": "Kazuki Wataya"}, {"name": "Tomoaki Nogawa"}], "author_count": 3}, {"id": "2605.22125", "category": "cond-mat", "title": "CNN-Based Classifier for Automated Identification of Magnetic States in Spin Dynamics Simulations", "abstract": "The identification and classification of different magnetic states are essential for understanding the complex behavior of magnetic systems. Traditional approaches that rely on handcrafted features or manual inspection often fall short, particularly when dealing with subtle or topologically complex spin textures. In this study, we present an automated deep learning model that employs an EfficientNetV1B0 Convolutional Neural Network to classify nine distinct magnetic states, including both ferromagnetic (FM) and antiferromagnetic (AFM) spin textures such as AFM skyrmions and AFM stripe domains. The spin configurations are generated through atomistic spin dynamics simulations using the Spirit code, then visualized with VFRendering to produce RGB images, which serve as inputs to the classification model.", "url": "https://arxiv.org/abs/2605.22125", "type": "理论+数值", "summary": "不同磁态的识别和分类对于理解磁系统的复杂行为至关重要。依赖手工特征或手动检查的传统方法常常达不到要求，特别是在处理微妙或拓扑复杂的自旋纹理时。在这项研究中，我们提出了一种自动化深度学习模型，该模型采用 EfficientNetV1B0 卷积神经网络对九种不同的磁态进行分类，包括铁磁 (FM) 和反铁磁 (AFM) 自旋纹理，例如 AFM 斯格明子和 AFM 条纹域。自旋配置是使用 Spirit 代码通过原子自旋动力学模拟生成的，然后使用 VFRendering 进行可视化以生成 RGB 图像，作为分类模型的输入。", "authors": [{"name": "Amal Aldarawsheh"}, {"name": "Ahmed Alia"}, {"name": "Stefan Blügel"}], "featured_authors": [{"name": "Amal Aldarawsheh"}, {"name": "Ahmed Alia"}, {"name": "Stefan Blügel"}], "author_count": 3}, {"id": "2605.22128", "category": "cond-mat", "title": "Superconductivity in doped spin multimer systems", "abstract": "Binding energy, which quantifies pair formation, is a key factor in the emergence of superconductivity. Here, we show that even when multiple spins are complexly coupled, hole-doped systems, which can be mapped onto the universal hardcore boson model in the strong-binding-energy limit, exhibit promising signatures of superconductivity. We analytically and numerically demonstrate this concept in the double Kondo lattice model. Using the density-matrix renormalization group method, we show that a pairing state is maintained via a crossover even for parameters away from the strong-coupling regime. Additionally, we find that once binding energies are sufficiently generated, pair correlations develop similarly regardless of the details of local spin correlations. Our findings suggest useful guidelines for research on superconductivity.", "url": "https://arxiv.org/abs/2605.22128", "type": "理论+数值", "summary": "结合能可以量化电子对的形成，是超导性出现的关键因素。在这里，我们表明，即使多个自旋复杂耦合，空穴掺杂系统也可以在强结合能极限下映射到通用硬核玻色子模型上，表现出有希望的超导特征。我们在双近藤晶格模型中通过分析和数值论证了这个概念。使用密度矩阵重整化群方法，我们表明即使参数远离强耦合状态，也可以通过交叉维持配对状态。此外，我们发现，一旦充分产生结合能，无论局部自旋相关性的细节如何，对相关性都会类似地发展。我们的研究结果为超导研究提供了有用的指导。", "authors": [{"name": "Ritsuki Hirabayashi"}, {"name": "Masataka Kakoi"}, {"name": "Ryota Ueda"}, {"name": "Kazuhiko Kuroki"}, {"name": "Tatsuya Kaneko"}], "featured_authors": [{"name": "Ritsuki Hirabayashi"}, {"name": "Masataka Kakoi"}, {"name": "Ryota Ueda"}, {"name": "Kazuhiko Kuroki"}, {"name": "Tatsuya Kaneko"}], "author_count": 5}, {"id": "2605.22135", "category": "cond-mat", "title": "Gyromagnetic Quantum Friction in Rayleigh Vorticity Baths", "abstract": "We identify an intrinsic zero-temperature relaxation channel for near-surface spins gyromagnetically coupled to Rayleigh-wave vorticity. This surface-mode contribution requires no thermal phonons, unlike Raman relaxation, and is fixed by Rayleigh vorticity rather than material-specific $g$-factor modulation. The Rayleigh-vorticity bath is super-Ohmic and evanescent with depth, producing field and depth scalings of spin relaxation. These scalings establish shallow spin sensors and hybrid surface-acoustic-wave spin interfaces as detectors of Rayleigh-wave acoustic quantum friction in solids.", "url": "https://arxiv.org/abs/2605.22135", "type": "理论", "summary": "我们确定了与瑞利波涡旋旋磁耦合的近表面自旋的固有零温度弛豫通道。与拉曼弛豫不同，这种表面模式贡献不需要热声子，并且由瑞利涡度而不是特定于材料的 $g$ 因子调制来固定。瑞利涡旋浴是超欧姆的并且随着深度而消失，产生自旋弛豫的场和深度缩放。这些尺度建立了浅自旋传感器和混合表面声波自旋界面作为固体中瑞利波声量子摩擦的探测器。", "authors": [{"name": "Mamoru Matsuo"}, {"name": "Ryotaro Sano"}, {"name": "Ai Yamakage"}, {"name": "Hiroshi Funaki"}, {"name": "Tatsuhiko N. Ikeda"}], "featured_authors": [{"name": "Mamoru Matsuo"}, {"name": "Ryotaro Sano"}, {"name": "Ai Yamakage"}, {"name": "Hiroshi Funaki"}, {"name": "Tatsuhiko N. Ikeda"}], "author_count": 5}, {"id": "2605.22234", "category": "cond-mat", "title": "Virp: neural network-accelerated prediction of physical properties in site-disordered materials", "abstract": "Among metallic alloys, ceramics, and even common compounds such as water ice, it is usual to find materials in which crystalline order is expressed as a probability. In such cases, one or more sites within a crystal can be occupied by multiple elements or vacancies, according to a set of probabilities. These crystal structures remain inaccessible to common first-principles materials simulation methodologies, which assumes perfect crystal order. Workaround strategies to this limitation include quasirandom structures and cluster expansion. These methods are system-specific and computationally expensive as they rely on large scale Monte Carlo simulations of enlarged unit cells. To address these limitations, we propose a pipeline combining a permutation-based virtual cell generation algorithm, sampling regime, and thermodynamic post-processing which greatly improves the feasibility of computation analyses for site-disordered materials. We demonstrate that the massive configurational space can be adequately sampled with 400 virtual cells, as long as the supercell definition is sufficiently large.", "url": "https://arxiv.org/abs/2605.22234", "type": "数值", "summary": "在金属合金、陶瓷，甚至水冰等常见化合物中，通常会发现晶序以概率表示的材料。在这种情况下，根据一组概率，晶体内的一个或多个位点可以被多个元素或空位占据。这些晶体结构仍然无法通过常见的第一原理材料模拟方法获得，该方法假设完美的晶体顺序。此限制的解决策略包括准随机结构和集群扩展。这些方法是特定于系统的，并且计算量大，因为它们依赖于放大晶胞的大规模蒙特卡罗模拟。为了解决这些限制，我们提出了一种结合基于排列的虚拟单元生成算法、采样机制和热力学后处理的流程，大大提高了位点无序材料计算分析的可行性。我们证明，只要超单元定义足够大，就可以使用 400 个虚拟单元对巨大的配置空间进行充分采样。", "authors": [{"name": "Andy Paul Chen"}, {"name": "Martin Hoffmann Petersen"}, {"name": "Kedar Hippalgaonkar"}], "featured_authors": [{"name": "Andy Paul Chen"}, {"name": "Martin Hoffmann Petersen"}, {"name": "Kedar Hippalgaonkar"}], "author_count": 3}, {"id": "2605.22254", "category": "cond-mat", "title": "DMFT analysis of Hopfield network with plasticity", "abstract": "We study a fully connected Hopfield-type associative memory network with online activity-dependent synaptic plasticity, where neural states and synaptic couplings coevolve during retrieval. Using the generating-functional formalism, we derive a dynamical mean-field theory (DMFT) in the large-system limit with extensively many stored random patterns, and show that the many-body dynamics reduces to an effective single-site stochastic process with colored Gaussian crosstalk noise and delayed feedback terms. Numerical solutions of the DMFT equations agree well with direct simulations. We find that moderate plasticity enlarges the basin of attraction and increases the maximum retrievable memory load by generating a positive delayed feedback that stabilizes retrieval against crosstalk noise. However, excessively strong plasticity causes the network to imprint the imperfect initial cue itself, leading to spurious attractors and degraded retrieval performance. Consequently, an optimal plasticity strength emerges from the trade-off between memory stabilization and premature cue imprinting. These results extend the DMFT description of associative memory to networks with coevolving neural and synaptic dynamics.", "url": "https://arxiv.org/abs/2605.22254", "type": "理论+数值", "summary": "我们研究了一种完全连接的霍普菲尔德型联想记忆网络，具有在线活动依赖的突触可塑性，其中神经状态和突触耦合在检索过程中共同进化。使用生成函数形式主义，我们在具有大量存储随机模式的大系统极限下推导了动态平均场理论（DMFT），并表明多体动力学简化为具有彩色高斯串扰噪声和延迟反馈项的有效单点随机过程。 DMFT 方程的数值解与直接模拟非常吻合。我们发现，适度的可塑性扩大了吸引力盆地，并通过产生稳定的正延迟反馈来增加最大可检索的记忆负载，从而稳定检索免受串扰噪声的影响。然而，过强的可塑性会导致网络本身留下不完美的初始提示，从而导致虚假吸引子和检索性能下降。因此，最佳的可塑性强度是通过记忆稳定性和过早提示印记之间的权衡而产生的。\n\n这些结果将联想记忆的 DMFT 描述扩展到具有协同进化神经和突触动力学的网络。", "authors": [{"name": "Yoshinori Hara"}, {"name": "Yoshiyuki Kabashima"}], "featured_authors": [{"name": "Yoshinori Hara"}, {"name": "Yoshiyuki Kabashima"}], "author_count": 2}, {"id": "2605.22369", "category": "cond-mat", "title": "Improvement of piezocatalytic performance of Na0.5Bi0.5TiO3 perovskite using K doping for efficient Rhodamine B degradation", "abstract": "Piezocatalysis, based on the piezoelectric properties of catalysts, breaks down the barrier between mechanical energy and chemical energy. It describes the use of charges induced by piezoelectricity to assist typical chemical processes while harvesting various forms of mechanical green energy. The performance of piezocatalysis is predominantly governed by the piezoelectric properties of materials. The main aim of this work is to evaluate and analyze the potential of potassium doped sodium bismuth titanate Na0.5-xKxBi0.5TiO3 abbreviated as NKxBT (0, 0.15, 0.20, and 0.25), as a piezocatalyst in the degradation of the organic dye Rhodamine B RhB under ultrasonic vibration. The synthesis of NKxBT nanopowders was conducted using the sol-gel autocombustion method. Coupled structural analysis reveals the presence of an intermediate Morphotropic Phase Boundary (MPB, where two phases coexist) in the optimal NK15BT composition. The piezocatalytic degradation results showed a total piezo-degradation in only 90 min and a rate constant 8 times higher than the undoped NK0BT. The enhanced piezocatalytic activity results from a synergistic effect of MPB presence, reduced particle size, optimal bandgap and high lattice strain. The NK15BT sample also demonstrated good reusability and good mineralization.", "url": "https://arxiv.org/abs/2605.22369", "type": "理论+数值", "summary": "压电催化基于催化剂的压电特性，打破了机械能和化学能之间的障碍。它描述了利用压电感应的电荷来协助典型的化学过程，同时收获各种形式的机械绿色能源。压电催化的性能主要取决于材料的压电特性。这项工作的主要目的是评估和分析钾掺杂钛酸铋钠Na0.5-xKxBi0.5TiO3（缩写为NKxBT（0、0.15、0.20和0.25））作为压电催化剂在超声振动下降解有机染料罗丹明B RhB的潜力。采用溶胶-凝胶自燃烧法合成NKxBT纳米粉体。耦合结构分析揭示了最佳 NK15BT 组合物中存在中间同形相边界（MPB，两相共存）。压电催化降解结果显示，整个压电降解仅需 90 分钟，速率常数比未掺杂的 NK0BT 高 8 倍。\n\n压电催化活性的增强是 MPB 存在、减小的粒径、最佳带隙和高晶格应变的协同效应的结果。 NK15BT 样品还表现出良好的可重复使用性和良好的矿化性。", "authors": [{"name": "Salma Ayadh"}, {"name": "Salma Touili"}, {"name": "Mbarek Amjoud"}, {"name": "Daoud Mezzane"}, {"name": "Mohamed Goune"}, {"name": "Jaafar Ghanbaja"}, {"name": "Manal Benyoussef"}, {"name": "Hana Ursic"}, {"name": "Nejc Suban"}, {"name": "Mustapha Raihane"}, {"name": "Zdravko Kutnjak"}, {"name": "Mimoun El Marssi"}], "featured_authors": [{"name": "Salma Ayadh"}, {"name": "Salma Touili"}, {"name": "Mbarek Amjoud"}, {"name": "Mustapha Raihane"}, {"name": "Zdravko Kutnjak"}, {"name": "Mimoun El Marssi"}], "author_count": 12}, {"id": "2605.22375", "category": "cond-mat", "title": "Multipolar exchange in a many-body homonuclear mixture of atoms in different internal states", "abstract": "We develop a general method for constructing the many-body Hamiltonian of pairwise interactions describing homonuclear mixtures of atoms occupying states with different total angular momenta or other quantum numbers. The advantage of the irreducible spherical tensor operator formalism is demonstrated: these operators give the Hamiltonian an explicit physical structure, account for all scattering channels, and include multipolar exchange interactions. The latter correspond to the exchange of both angular-momentum projections and the total angular momentum. Particular realizations of the general Hamiltonian, widely used in the physics of ultracold gases, are also analyzed. The resulting Hamiltonian provides a universal framework for investigating a broad range of quantum many-body phenomena in bosonic and fermionic atomic gases.", "url": "https://arxiv.org/abs/2605.22375", "type": "理论", "summary": "我们开发了一种通用方法来构造成对相互作用的多体哈密顿量，描述具有不同总角动量或其他量子数的原子占据状态的同核混合物。证明了不可约球面张量算子形式主义的优点：这些算子为哈密顿量提供了明确的物理结构，解释了所有散射通道，并包括多极交换相互作用。后者对应于角动量投影和总角动量的交换。还分析了广泛应用于超冷气体物理学的一般哈密顿量的具体实现。由此产生的哈密顿量为研究玻色子和费米子原子气体中的各种量子多体现象提供了一个通用框架。", "authors": [{"name": "M. Bulakhov"}, {"name": "A.S. Peletminskii"}, {"name": "Yu.V. Slyusarenko"}], "featured_authors": [{"name": "M. Bulakhov"}, {"name": "A.S. Peletminskii"}, {"name": "Yu.V. Slyusarenko"}], "author_count": 3}, {"id": "2605.22383", "category": "cond-mat", "title": "Aggregation-Fragmentation Processes with Broken Detailed Balance", "abstract": "We study aggregation-fragmentation processes in which pairs of clusters can aggregate, and each cluster can break into two fragments. If the rates of aggregation and fragmentation do not depend on the masses, detailed balance does not hold, but nonequilibrium steady states can still be deduced from an exact solution for the Laplace transform. For models in which aggregation rates remain constant but fragmentation rates scale as $(\\text{mass})^\\beta$, detailed balance holds only when $\\beta=1$. Away from this solvable case, we employ asymptotic techniques and show that when $\\beta\\geq 0$, the steady states share similarities with those from the mass-independent ($\\beta=0$) model. An instantaneous shattering transition with continuous mass loss occurs when $\\beta<0$.", "url": "https://arxiv.org/abs/2605.22383", "type": "理论", "summary": "我们研究聚合-碎片过程，其中成对的簇可以聚合，并且每个簇可以分裂成两个碎片。如果聚集和分裂的速率不依赖于质量，则详细的平衡不成立，但仍然可以从拉普拉斯变换的精确解中推导出非平衡稳态。对于聚合率保持恒定但碎片率按 $(\\text{mass})^\\beta$ 缩放的模型，只有当 $\\beta=1$ 时，详细平衡才成立。除了这种可解的情况之外，我们采用渐近技术并证明当 $\\beta\\geq 0$ 时，稳态与质量无关 ($\\beta=0$) 模型的稳态具有相似之处。当 $\\beta<0$ 时，会发生瞬时破碎转变并伴有连续的质量损失。", "authors": [{"name": "P. L. Krapivsky"}], "featured_authors": [{"name": "P. L. Krapivsky"}], "author_count": 1}, {"id": "2605.22517", "category": "cond-mat", "title": "Revisiting the high-field phase diagram of the topological cubic helimagnet SrFeO$_{3}$", "abstract": "The cubic perovskite SrFeO$_{3}$ is a prototypical centrosymmetric itinerant magnet that hosts a quadruple-${\\mathbf Q}$ hedgehog-antihedgehog lattice and exhibits a complex magnetic-field-temperature phase diagram. Yet, the microscopic mechanism underlying the emergence of its versatile multiple-${\\mathbf Q}$ phases remains unresolved. Here, we elucidate the field-orientation dependence of the magnetic phase diagram and establish an effective spin Hamiltonian for SrFeO$_{3}$ that incorporates a cubic single-ion anisotropy together with bilinear and biquadratic interactions in momentum space. In addition, we observe magnetoelastic signatures of a first-order valence transition upon entering the forced FM phase at 40 T, which would be attributed to the suppression of negative charge transfer. These findings emphasize the pivotal importance of electronic itinerancy arising from the formation of a ligand-hole band in stabilizing multiple-${\\mathbf Q}$ phases.", "url": "https://arxiv.org/abs/2605.22517", "type": "理论+数值", "summary": "立方钙钛矿SrFeO$_{3}$是一种典型的中心对称流动磁体，具有四重${\\mathbf Q}$刺猬-反刺猬晶格，并表现出复杂的磁场-温度相图。然而，其多功能多 ${\\mathbf Q}$ 相出现的微观机制仍未解决。在这里，我们阐明了磁相图的场方向依赖性，并建立了 SrFeO$_{3}$ 的有效自旋哈密顿量，它将立方单离子各向异性与动量空间中的双线性和双二次相互作用结合在一起。此外，我们在 40 T 进入强制 FM 阶段时观察到一阶价态跃迁的磁致弹性特征，这归因于负电荷转移的抑制。这些发现强调了配体空穴带的形成所产生的电子巡回在稳定多个${\\mathbf Q}$相中的关键重要性。", "authors": [{"name": "Masaki Gen"}, {"name": "Shun Okumura"}, {"name": "Shusaku Imajo"}, {"name": "Taro Nakajima"}, {"name": "Karel Prokes"}, {"name": "Shunsuke Kitou"}, {"name": "Yusuke Tokunaga"}, {"name": "Yoichi Nii"}, {"name": "Koichi Kindo"}, {"name": "Yoshimitsu Kohama"}, {"name": "Shintaro Ishiwata"}, {"name": "Taka-hisa Arima"}], "featured_authors": [{"name": "Masaki Gen"}, {"name": "Shun Okumura"}, {"name": "Shusaku Imajo"}, {"name": "Yoshimitsu Kohama"}, {"name": "Shintaro Ishiwata"}, {"name": "Taka-hisa Arima"}], "author_count": 12}, {"id": "2605.22518", "category": "cond-mat", "title": "Observation of magnetically switchable quantum geometric photocurrents", "abstract": "In non-centrosymmetric materials, light can be rectified into two types of DC photocurrents, known as injection and shift currents, through the bulk photovoltaic effect. Recent theory has uncovered their deep relation with the two-state quantum geometry of resonant transitions: In non-magnetic crystals, where these currents have been routinely observed, the injection current responds to circular light and probes the Berry curvature, while the shift current responds to linear light and probes the geometric connection. Magnetic crystals have been predicted to show a new set of hitherto unobserved magnetically switchable photocurrents, with the roles of linear and circular light interchanged: A linear injection current, which probes the quantum metric, and a circular shift current, which probes the geometric torsion. In this work, we demonstrate the existence of such currents for the first time, demonstrating the switching of the current by flipping the Néel vector in a van der Waals antiferromagnet. Furthermore, their specific frequency and temperature dependence confirm the assignment of circular shift and linear injection currents. Our work demonstrates a new way to control photocurrents in magnets that are directly tied to geometry and have promising applications in antiferromagnetic spintronics and light harvesting.", "url": "https://arxiv.org/abs/2605.22518", "type": "理论", "summary": "在非中心对称材料中，光可以通过体光伏效应被整流成两种​​类型的直流光电流，称为注入电流和移位电流。最近的理论揭示了它们与共振跃迁的二态量子几何的深层关系：在非磁性晶体中，通常观察到这些电流，注入电流响应圆形光并探测贝里曲率，而移位电流响应线性光并探测几何连接。据预测，磁性晶体将显示出一组迄今为止未观察到的新的磁性可切换光电流，其中线性光和圆形光的作用互换：探测量子度量的线性注入电流和探测几何扭转的圆形移位电流。在这项工作中，我们首次证明了此类电流的存在，通过翻转范德华反铁磁体中的尼尔矢量来演示电流的切换。此外，它们的特定频率和温度依赖性证实了循环移位和线性注入电流的分配。\n\n我们的工作展示了一种控制磁体中光电流的新方法，该方法与几何结构直接相关，并且在反铁磁自旋电子学和光捕获方面具有广阔的应用前景。", "authors": [{"name": "Qi Tian"}, {"name": "Zhuoliang Ni"}, {"name": "Matthew Cothrine"}, {"name": "David G. Mandrus"}, {"name": "Eugene J. Mele"}, {"name": "Andrew M. Rappe"}, {"name": "Charles L. Kane"}, {"name": "Fernando de Juan"}, {"name": "Liang Wu"}], "featured_authors": [{"name": "Qi Tian"}, {"name": "Zhuoliang Ni"}, {"name": "Matthew Cothrine"}, {"name": "Charles L. Kane"}, {"name": "Fernando de Juan"}, {"name": "Liang Wu"}], "author_count": 9}, {"id": "2605.22520", "category": "cond-mat", "title": "The cell fluid model with Curie-Weiss interactions: special cases and analytical results", "abstract": "Inspired by previous extensive numerical studies of a cell fluid model with Curie-Weiss interactions, we concentrate on some analytically tractable special cases in its description. The key ingredient of the model is a competition between global attraction and local repulsion interactions between particles with coupling constants $J_1$ and $J_2$, respectively. We provide analytical results in several limiting cases, including the ideal-gas limit $J_1=J_2=0$ and the strong-repulsion limit $J_2\\gg J_1$. For $J_2\\gg J_1$, a detailed analytical study is presented. We derive explicit expressions for the critical point parameters, the equation of state, and the binodal and spinodal curves in closed form. The equation of state is found to be in full agreement with that of the van der Waals lattice gas, and the order parameter satisfies the standard Curie-Weiss equation. In a neighborhood of the critical point, a Landau expansion is shown to have the same form and symmetry as that of the classical lattice gas within the mean-field approximation. Moreover, based on the explicit knowledge of a few leading terms in the asymptotic expansion of the deformed exponential function governing the physics of the cell model, we extend its validity range to include the marginal case of thermodynamic stability, $J_1=J_2$. In particular, this extension makes a consideration of the ideal-gas limit $J_1=J_2=0$ formally legitimate. For the generic marginal case $J_1=J_2\\ne0$ systematically avoided in previous works, we present numerical data and phase diagrams that augment their findings for $J_2>J_1$.", "url": "https://arxiv.org/abs/2605.22520", "type": "理论+数值", "summary": "受到先前对具有居里-魏斯相互作用的细胞流体模型的广泛数值研究的启发，我们在其描述中集中于一些分析上易于处理的特殊情况。该模型的关键要素是耦合常数分别为 $J_1$ 和 $J_2$ 的粒子之间的全局吸引力和局部排斥相互作用之间的竞争。我们提供了几种极限情况下的分析结果，包括理想气体极限 $J_1=J_2=0$ 和强斥力极限 $J_2\\gg J_1$。对于$J_2\\gg J_1$，提出了详细的分析研究。我们导出了临界点参数、状态方程以及闭合形式的双节线和旋节线曲线的显式表达式。发现其状态方程与范德华晶格气体的状态方程完全一致，且序参数满足标准居里-韦斯方程。在临界点附近，朗道展开与平均场近似内的经典晶格气体具有相同的形式和对称性。\n\n此外，基于对控制细胞模型物理的变形指数函数渐近展开中的几个主要项的明确知识，我们将其有效性范围扩展到包括热力学稳定性的边缘情况$J_1=J_2$。特别是，此扩展使得理想气体限制 $J_1=J_2=0$ 的考虑正式合法。对于在以前的工作中系统地避免的通用边缘情况 $J_1=J_2\\ne0$，我们提供了数值数据和相图，以增强他们对 $J_2>J_1$ 的发现。", "authors": [{"name": "O. A. Dobush"}, {"name": "M. P. Kozlovskii"}, {"name": "I. V. Pylyuk"}, {"name": "R. V. Romanik"}, {"name": "M. A. Shpot"}], "featured_authors": [{"name": "O. A. Dobush"}, {"name": "M. P. Kozlovskii"}, {"name": "I. V. Pylyuk"}, {"name": "R. V. Romanik"}, {"name": "M. A. Shpot"}], "author_count": 5}, {"id": "2605.22582", "category": "cond-mat", "title": "Quantum Batteries in two-dimensional material-based Josephson Junctions", "abstract": "We investigate the solid-state implementation of a Dicke-like quantum battery consisting of a two-dimensional material-based Josephson junction inductively coupled to a resonator, using graphene as a representative example. In this configuration, Andreev bound states naturally act as non-interacting, energetically non-degenerate two-level systems, and the setup allows for both single-photon and two-photon resonant processes. The coupling between the LC-circuit flux and the supercurrent through the junction gives rise to peculiar longitudinal interaction terms that have no counterpart in the conventional Dicke model. These additional couplings can enhance energy storage for a proper range of parameters. The proposed architecture also enables an alternative, but equivalent, charging protocol that relies on tuning the superconducting phase difference across the junction.", "url": "https://arxiv.org/abs/2605.22582", "type": "理论", "summary": "我们以石墨烯为代表，研究了类迪克量子电池的固态实现，该电池由基于二维材料的约瑟夫森结感应耦合到谐振器组成。在这种配置中，安德烈夫束缚态自然地充当非相互作用、能量非简并的两能级系统，并且该设置允许单光子和双光子共振过程。 LC 电路磁通和通过结点的超电流之间的耦合产生了特殊的纵向相互作用项，这些项在传统迪克模型中没有对应项。这些额外的耦合可以增强适当范围参数的能量存储。所提出的架构还支持替代但等效的充电协议，该协议依赖于调整结上的超导相位差。", "authors": [{"name": "V. Varrica"}, {"name": "G. Gemme"}, {"name": "F.M.D. Pellegrino"}, {"name": "E. Paladino"}, {"name": "M. Sassetti"}, {"name": "D. Ferraro"}], "featured_authors": [{"name": "V. Varrica"}, {"name": "G. Gemme"}, {"name": "F.M.D. Pellegrino"}, {"name": "E. Paladino"}, {"name": "M. Sassetti"}, {"name": "D. Ferraro"}], "author_count": 6}, {"id": "2605.22601", "category": "cond-mat", "title": "Upscaling DFT-trained machine-learning interatomic potential toward Quantum Monte Carlo accuracy: Sulfur-vacancy migration in monolayer MoS$_2$ as a testbed", "abstract": "We designed a procedure to train a machine learning interatomic potential (MLIP) at benchmark-quality quantum Monte Carlo (QMC) accuracy. To avoid the complexities of high-quality atomic force determination with the stochastic QMC methods, we use a multi-fidelity approach wherein high-level QMC energies are used alongside suitably processed low-level DFT atomic forces to train a QMC fine-tuned MLIP which significantly improves both the energetics and atomic forces over the baseline DFT-based MLIP. Fine-tuning is only applied to the readout layers of an equivariant message-passing MACE MLIP. We used sulfur mono- and multiple vacancies in monolayer MoS$_2$ as a testbed and demonstrate a near QMC accuracy of the model in a number of in- and out-of-domain tests. We show that a fairly limited dataset of QMC energies suffice to significantly improve the baseline DFT MLIP. The accuracy of our approach is demonstrated on energy and free energy migration barriers of mono- and multiple S-vacancy defects. The results open the window to large-scale near QMC quality simulations with large numbers of atoms and/or molecular dynamics configurations which would not be possible by a direct brute-force application of QMC methods.", "url": "https://arxiv.org/abs/2605.22601", "type": "理论+数值", "summary": "我们设计了一个程序，以基准质量量子蒙特卡罗 (QMC) 精度训练机器学习原子间势 (MLIP)。为了避免使用随机 QMC 方法确定高质量原子力的复杂性，我们使用多保真度方法，其中将高水平 QMC 能量与经过适当处理的低水平 DFT 原子力一起使用来训练 QMC 微调 MLIP，与基于 DFT 的基线 MLIP 相比，该方法显着提高了能量和原子力。微调仅适用于等变消息传递 MACE MLIP 的读出层。我们使用单层 MoS$_2$ 中的硫单空位和多空位作为测试平台，并在许多域内和域外测试中证明了该模型接近 QMC 的准确性。我们表明，相当有限的 QMC 能量数据集足以显着改善基线 DFT MLIP。我们的方法的准确性在单和多个 S 空位缺陷的能量和自由能迁移势垒上得到了证明。\n\n结果为使用大量原子和/或分子动力学配置进行大规模近 QMC 质量模拟打开了窗口，而直接强力应用 QMC 方法是不可能实现的。", "authors": [{"name": "Adam Hložný"}, {"name": "Ján Brndiar"}, {"name": "Ye Luo"}, {"name": "Ivan Štich"}], "featured_authors": [{"name": "Adam Hložný"}, {"name": "Ján Brndiar"}, {"name": "Ye Luo"}, {"name": "Ivan Štich"}], "author_count": 4}, {"id": "2605.22646", "category": "cond-mat", "title": "Directed extended-range percolation", "abstract": "While for standard percolation directionality is known to increase the combinatorial complexity of percolation, here we show that when connectivity is ensured by paths of length $R\\geq 2$, network directionality, impeding backtracking, can significantly reduce the complexity of percolation. To illustrate this finding, we introduce Directed Extended-Range Percolation (DERP), defined directed networks with non-reciprocal edges, motivated by applications in quantum communication. In this framework, message transmission is enabled between trusted nodes separated by a directed path of length at most $R$. Using a message-passing approach, we show that directionality enables an exact determination of the percolation threshold and the anomalous critical indices on locally tree-like structures. On random directed networks we find that the critical behavior of DERP depends sensitively on degree correlations. These analytical predictions are corroborated by extensive Monte Carlo simulations, highlighting the profound impact of directionality and correlations on long-range connectivity in complex networks.", "url": "https://arxiv.org/abs/2605.22646", "type": "理论+数值", "summary": "虽然对于标准渗滤方向性已知会增加渗滤的组合复杂性，但这里我们表明，当长度 $R\\geq 2$ 的路径确保连接性时，网络方向性（阻碍回溯）可以显着降低渗滤的复杂性。为了说明这一发现，我们引入了定向扩展范围渗流（DERP），它是由量子通信中的应用推动的具有非互易边缘的定义定向网络。在此框架中，消息传输在由长度至多$R$的有向路径分隔的可信节点之间实现。使用消息传递方法，我们表明方向性可以精确确定局部树状结构的渗流阈值和异常临界指数。在随机定向网络上，我们发现 DERP 的关键行为敏感地依赖于度相关性。这些分析预测得到了广泛的蒙特卡罗模拟的证实，凸显了方向性和相关性对复杂网络中远程连接的深远影响。", "authors": [{"name": "Wenbo Liu"}, {"name": "Yiwen Zeng"}, {"name": "Xueming Liu"}, {"name": "Ginestra Bianconi"}], "featured_authors": [{"name": "Wenbo Liu"}, {"name": "Yiwen Zeng"}, {"name": "Xueming Liu"}, {"name": "Ginestra Bianconi"}], "author_count": 4}, {"id": "2605.22761", "category": "cond-mat", "title": "Topological cell-openness index for porous materials", "abstract": "We propose a method of estimating the proportion of open and closed cells in a porous material based on measuring Betti numbers on the structures. Based on this method, we define a cell-openness index {\\tau} which can be used instead of or complementary to the proportion of open-celled volume reported by gas pycnometry, which is the current gold standard for pore type characterization. We discuss in what types of structures mismatches between the two measures can occur and how such mismatches convey additional information about the structure. We also demonstrate initial examples of significant correlations between {\\tau} and measurable physical quantities in numerically generated structures. We also discuss how Betti curves can be used to estimate characteristic feature sizes in porous structures.", "url": "https://arxiv.org/abs/2605.22761", "type": "理论+数值", "summary": "我们提出了一种基于测量结构上的贝蒂数来估计多孔材料中开孔和闭孔比例的方法。基于这种方法，我们定义了一个单元开孔指数 {\\tau}，它可以用来代替或补充气体比重法报告的开孔体积比例，这是当前孔隙类型表征的黄金标准。我们讨论两种度量之间可能发生哪些类型的结构不匹配，以及这种不匹配如何传达有关结构的附加信息。我们还展示了 {\\tau} 与数值生成结构中可测量物理量之间显着相关性的初步示例。我们还讨论了如何使用贝蒂曲线来估计多孔结构中的特征特征尺寸。", "authors": [{"name": "Michał Bogdan"}, {"name": "Paweł Dłotko"}], "featured_authors": [{"name": "Michał Bogdan"}, {"name": "Paweł Dłotko"}], "author_count": 2}, {"id": "2605.22764", "category": "cond-mat", "title": "Spin Glass Mapping of the Parallel Minority Game", "abstract": "The parallel minority game (PMG) extends the classical minority game to many choices, with each agent restricted to two predetermined alternatives. In this condition, minimizing the population variance across all choices is a complex combinatorial optimization problem. We show that this minimization is exactly equivalent to finding the ground state of an Ising spin glass in the mean-field limit, i.e., the Sherrington-Kirkpatrick model. By encoding the agent choices as spin variables, the variance becomes a quadratic Hamiltonian with quenched random couplings $J_{ij}$ and random fields $h_i$. This mapping reveals inherent frustration and connects the PMG to the well developed theory of spin glasses, providing a new perspective on the frozen, sub-optimal configurations observed in stochastic strategies.", "url": "https://arxiv.org/abs/2605.22764", "type": "理论+数值", "summary": "并行少数博弈（PMG）将经典少数博弈扩展到多种选择，每个代理仅限于两个预先确定的替代方案。在这种情况下，最小化所有选择的总体方差是一个复杂的组合优化问题。我们证明，这种最小化完全相当于在平均场极限中找到伊辛自旋玻璃的基态，即谢林顿-柯克帕特里克模型。通过将代理选择编码为自旋变量，方差变成具有淬灭随机耦合 $J_{ij}$ 和随机场 $h_i$ 的二次哈密顿量。这种映射揭示了固有的挫败感，并将 PMG 与完善的自旋玻璃理论联系起来，为随机策略中观察到的冻结、次优配置提供了新的视角。", "authors": [{"name": "Aryan Tyagi"}, {"name": "Soumyaditya Das"}, {"name": "Soumyajyoti Biswas"}, {"name": "Anirban Chakraborti"}], "featured_authors": [{"name": "Aryan Tyagi"}, {"name": "Soumyaditya Das"}, {"name": "Soumyajyoti Biswas"}, {"name": "Anirban Chakraborti"}], "author_count": 4}, {"id": "2605.22810", "category": "cond-mat", "title": "Signatures of the Quantum Geometric Dipole of Interlayer Excitons in Counterflow Conductivity", "abstract": "Collective excitations of many-body electron systems can carry internal structure, supporting novel quantum geometric and topological properties. Among these are a quantum geometric dipole (QGD), which for excitons have direct significance as an internal polarization. For interlayer excitons of a bilayer system, this represents an in-plane dipole moment, which can be used to drive them with in-plane electric fields. In this work, we consider counterflow electric currents associated with driven excitons in such a bilayer system as a probe of their QGD structure. As a simple but non-trivial example, we analyze a structure with a one-dimensional periodic potential in a strong perpendicular magnetic field. The resulting magnetoexciton bands host QGD structure that distinguishes it from the exciton QGD of a uniform system. To model exciton transport we adopt a Boltzmann approach that includes inter-band tunneling, allowing us to consider non-equilibrium momentum distributions that result from strong layer-antisymmetric driving fields. We show how linear response to a layer-symmetric component of the driving fields provide information about the QGD, and that the broad QGD structure of the exciton bands can be probed by the varying the layer-antisymmetric field. Our results demonstrate that counterflow conductivity serves as a tunable probe of the internal quantum geometric structure carried by the interlayer excitons, connecting transport to the quantum geometry of many-body excitations.", "url": "https://arxiv.org/abs/2605.22810", "type": "理论", "summary": "多体电子系统的集体激发可以携带内部结构，支持新颖的量子几何和拓扑特性。其中包括量子几何偶极子（QGD），它对于激子来说作为内部极化具有直接意义。对于双层系统的层间激子，这代表面内偶极矩，可用于通过面内电场驱动它们。在这项工作中，我们考虑在双层系统中与驱动激子相关的逆流电流作为其 QGD 结构的探针。作为一个简单但重要的例子，我们分析了强垂直磁场中具有一维周期性势的结构。由此产生的磁激子带具有 QGD 结构，使其与均匀系统的激子 QGD 区分开来。为了模拟激子输运，我们采用了包括带间隧道效应的玻尔兹曼方法，使我们能够考虑由强层反对称驱动场引起的非平衡动量分布。\n\n我们展示了对驱动场的层对称分量的线性响应如何提供有关 QGD 的信息，并且可以通过改变层反对称场来探测激子带的宽 QGD 结构。我们的结果表明，逆流电导率可以作为层间激子携带的内部量子几何结构的可调探针，将输运与多体激发的量子几何结构连接起来。", "authors": [{"name": "Fanuel I. Mendez"}, {"name": "Luis Brey"}, {"name": "H.A. Fertig"}], "featured_authors": [{"name": "Fanuel I. Mendez"}, {"name": "Luis Brey"}, {"name": "H.A. Fertig"}], "author_count": 3}, {"id": "2605.21577", "category": "hep-th", "title": "Chiral Electromagnetic Surface Waves on Chern-Simons Interfaces", "abstract": "We show that Maxwell theory with a codimension-$1$ Chern-Simons interface supports chiral electromagnetic surface waves on the interface, even when the bulk theory on both sides is conventional vacuum electrodynamics in infinite space. Solving the exact boundary value problem we find that the Chern-Simons interaction acts with opposite sign on the two helicities oriented along the interface, giving rise to one normalizable mode localized on the interface. This mode is a gapless chiral surface photon with linear dispersion and a frequency-independent index of refraction set by the Chern-Simons coefficient. This mode exists despite the absence of ambient material response or geometric confinement.", "url": "https://arxiv.org/abs/2605.21577", "type": "理论", "summary": "我们证明，具有余维 1 美元陈-西蒙斯界面的麦克斯韦理论支持界面上的手性电磁表面波，即使两侧的体理论都是无限空间中的传统真空电动力学。解决精确边值问题，我们发现陈-西蒙斯相互作用在沿界面定向的两个螺旋上以相反的符号起作用，从而产生界面上局域的一种可归一化模式。该模式是一种无间隙手性表面光子，具有线性色散和由 Chern-Simons 系数设置的与频率无关的折射率。尽管没有环境材料响应或几何限制，但这种模式仍然存在。", "authors": [{"name": "Nemanja Kaloper"}], "featured_authors": [{"name": "Nemanja Kaloper"}], "author_count": 1}, {"id": "2605.21581", "category": "hep-th", "title": "Cosmological Collider in the Grassmannian", "abstract": "We revisit the computation of four-point wavefunction coefficients for external conformally coupled scalars exchanging a particle of general mass and spin. Much of the phenomenology of cosmological collider physics in the near-de Sitter limit follows from this function. Computing it in detail is a central challenge in the cosmological bootstrap. Using the cosmological Grassmannian, we write this correlator in closed form using hypergeometric functions and Legendre polynomials. We achieve this by writing the standard bootstrap differential equation using the Plücker coordinates of the Grassmannian, and using the basis of Mandelstam invariants. The correlator in the s-channel can be written in terms of a hypergeometric function of the S Mandelstam, while the spin information appears as an overall Legendre polynomial factor that also depends on the other Mandelstams. We fix the boundary conditions by first demanding the absence of unphysical singularities, and by further matching to kinematic limits of the momentum-space wavefunction. Our formulae in Grassmannian space are much simpler than their counterparts in momentum space, demonstrating another useful application of the Grassmannian as a kinematic space for cosmology.", "url": "https://arxiv.org/abs/2605.21581", "type": "理论", "summary": "我们重新审视交换一般质量和自旋粒子的外部共形耦合标量的四点波函数系数的计算。接近德西特极限的宇宙对撞机物理现象学的大部分都是从这个函数得出的。详细计算它是宇宙学引导中的一个核心挑战。使用宇宙学格拉斯曼函数，我们使用超几何函数和勒让德多项式以封闭形式编写这个相关器。我们通过使用格拉斯曼的普吕克坐标并使用曼德尔斯塔姆不变量的基础编写标准自举微分方程来实现这一点。 s 通道中的相关器可以用 S 曼德尔施塔姆的超几何函数来编写，而自旋信息则显示为也取决于其他曼德尔施塔姆的总体勒让德多项式因子。我们首先要求不存在非物理奇点，然后进一步匹配动量空间波函数的运动学极限，从而确定边界条件。\n\n我们在格拉斯曼空间中的公式比动量空间​​中的公式简单得多，这展示了格拉斯曼空间作为宇宙学运动学空间的另一个有用应用。", "authors": [{"name": "Mattia Arundine"}, {"name": "Guilherme L. Pimentel"}], "featured_authors": [{"name": "Mattia Arundine"}, {"name": "Guilherme L. Pimentel"}], "author_count": 2}, {"id": "2605.21582", "category": "hep-th", "title": "Multipositivity Constrains the Chiral Lagrangian", "abstract": "The chiral Lagrangian is a cornerstone of modern particle physics, offering a systematic and quantitative description of low-energy pions. Using tools from the modern scattering amplitudes program, we show that consistent multiparticle dynamics impose novel constraints on the coupling constants of this theory. In the planar limit, these constraints imply that certain Wilson coefficients of the chiral Lagrangian are bounded from below by the chiral anomaly. Our results reveal a subtle connection between the anomalous and nonanomalous sectors of the underlying strong interactions, while introducing a novel formulation of multipositivity bounds that holds for any planar tree-level theory.", "url": "https://arxiv.org/abs/2605.21582", "type": "理论", "summary": "手性拉格朗日量是现代粒子物理学的基石，提供了低能π介子的系统和定量描述。使用现代散射振幅程序中的工具，我们表明一致的多粒子动力学对该理论的耦合常数施加了新的约束。在平面极限中，这些约束意味着手性拉格朗日的某些威尔逊系数从下方受到手性反常的限制。我们的结果揭示了潜在强相互作用的异常和非异常部分之间的微妙联系，同时引入了适用于任何平面树级理论的多重正性界限的新颖表述。", "authors": [{"name": "Clifford Cheung"}, {"name": "Jaehoon Jeong"}, {"name": "Pyungwon Ko"}, {"name": "Alex Pomarol"}, {"name": "Grant N. Remmen"}, {"name": "Francesco Sciotti"}], "featured_authors": [{"name": "Clifford Cheung"}, {"name": "Jaehoon Jeong"}, {"name": "Pyungwon Ko"}, {"name": "Alex Pomarol"}, {"name": "Grant N. Remmen"}, {"name": "Francesco Sciotti"}], "author_count": 6}, {"id": "2605.21591", "category": "hep-th", "title": "Algebraic locality and non-invertible Gauss laws", "abstract": "We study algebraic locality principles on a 2+1D closed lattice in the presence of a Gauss law for a non-invertible symmetry. Prior work in arXiv:2509.03589 showed that when enforcing the Gauss law of an invertible symmetry, the principle of \"Haag duality\" is preserved exactly, and \"disjoint additivity\" is preserved after appropriate treatment of discreteness artifacts. Here we show that for a large class of non-invertible on-site symmetries, Haag duality is preserved exactly only for sufficiently nice, \"cuspless\" regions. For cusped regions, we instead have a weak form of Haag duality that requires adding a collar. Our results apply to double models with a purely magnetic constraint, and to the more general framework of constraints induced by the on-site action of a Hopf algebra. In particular, we treat a class of extended string-net models explicitly. We also demonstrate disjoint additivity for double models based on a group, and a weakened form of disjoint additivity in the setting of a general Hopf algebra.", "url": "https://arxiv.org/abs/2605.21591", "type": "理论", "summary": "我们在存在不可逆对称性的高斯定律的情况下研究 2+1D 封闭晶格的代数局部性原理。 arXiv:2509.03589 中的先前工作表明，在执行可逆对称性的高斯定律时，准确地保留了“哈格对偶性”原理，并且在对离散伪影进行适当处理后保留了“不相交可加性”。在这里，我们表明，对于一大类不可逆的现场对称性，哈格对偶性仅在足够好的“无尖点”区域中才得以保留。对于尖点区域，我们有一种弱形式的 Haag 对偶性，需要添加一个项圈。我们的结果适用于具有纯磁约束的双模型，以及由 Hopf 代数的现场作用引起的更一般的约束框架。特别是，我们明确地对待一类扩展的弦网模型。我们还证明了基于群的双模型的不相交可加性，以及一般 Hopf 代数设置中的不相交可加性的弱化形式。", "authors": [{"name": "Nicholas Holfester"}, {"name": "Jonathan Sorce"}], "featured_authors": [{"name": "Nicholas Holfester"}, {"name": "Jonathan Sorce"}], "author_count": 2}, {"id": "2605.21689", "category": "hep-th", "title": "Dissipative stabilization of Ostrogradsky modes in non-equilibrium field theory", "abstract": "In this work, we investigate higher-derivative quantum field theories and the problem of Ostrogradsky instability within an open-system Keldysh-Lindblad framework. Coupling the ghost sector to dissipative baths generates non-perturbative effective masses and dissipative widths through self-consistent gap equations. Above a critical coupling, the nonequilibrium dynamics develops bifurcated dissipative branches, signaling the emergence of a dissipative phase transition and a nontrivial critical structure in parameter space. We find that the resulting dissipative dynamics can suppress ghost excitations through two distinct mechanisms: in one branch, a large dynamically generated effective mass preserves a quasiparticle-like excitation, while in the second branch, strong dissipative broadening destroys the quasiparticle character through overdamped dynamics. Our results suggest that dissipative effects may provide a nonequilibrium mechanism for the spectral suppression of Ostrogradsky ghosts. The comparison with the healthy sector indicates that the stabilization mechanism is intrinsically tied to the ghost-like spectral structure.", "url": "https://arxiv.org/abs/2605.21689", "type": "理论", "summary": "在这项工作中，我们研究了开放系统 Keldysh-Lindblad 框架内的高导数量子场论和奥斯特罗格拉茨基不稳定性问题。将鬼扇区与耗散浴耦合，通过自洽间隙方程生成非微扰有效质量和耗散宽度。在临界耦合之上，非平衡动力学发展出分叉的耗散分支，标志着耗散相变和参数空间中非平凡临界结构的出现。我们发现，由此产生的耗散动力学可以通过两种不同的机制抑制幽灵激发：在一个分支中，动态生成的大有效质量保留了类准粒子激发，而在第二个分支中，强耗散展宽通过过阻尼动力学破坏了准粒子特征。我们的结果表明，耗散效应可能为奥斯特格拉茨基幽灵的光谱抑制提供非平衡机制。与健康部门的比较表明，稳定机制本质上与幽灵般的光谱结构有关。", "authors": [{"name": "Y.M.P.Gomes"}], "featured_authors": [{"name": "Y.M.P.Gomes"}], "author_count": 1}, {"id": "2605.21755", "category": "hep-th", "title": "Universalities of Defects in Quantum Field Theories", "abstract": "Defects are both physically rich objects and powerful tools in modern quantum field theory. They are extended operators, such as boundaries, impurities, and probe particles, embedded in many-body systems. In this dissertation, we study the universal aspects of defect dynamics from the perspective of symmetry principles. We bring together several themes, including defect renormalization group flows, effective string theory, and impurities in atomic quantum gases.", "url": "https://arxiv.org/abs/2605.21755", "type": "理论", "summary": "缺陷既是物理上丰富的物体，也是现代量子场论中的强大工具。它们是嵌入多体系统中的扩展算子，例如边界、杂质和探测粒子。在本论文中，我们从对称性原理的角度研究了缺陷动力学的普遍性。我们汇集了几个主题，包括缺陷重正化群流、有效弦理论和原子量子气体中的杂质。", "authors": [{"name": "Siwei Zhong"}], "featured_authors": [{"name": "Siwei Zhong"}], "author_count": 1}, {"id": "2605.21809", "category": "hep-th", "title": "Generalised Cartan Geometry", "abstract": "This talk introduces a Cartan-geometric framework for generalised geometries governed by a differential graded Lie algebra. In contrast to ordinary Cartan geometry, the tangent bundle is extended and qu both a global duality group and a local gauge group. This framework provides a systematic construction of generalised connections and their torsion and curvature tensors for generic generalised geometries. We also review the realisation of these algebraic structures on the phase space of branes in M-theory.", "url": "https://arxiv.org/abs/2605.21809", "type": "理论", "summary": "本演讲介绍了由微分分级李代数控制的广义几何的嘉当几何框架。与普通的嘉当几何相比，切丛被扩展并且既是全局对偶群又是局部规范群。该框架为通用广义几何提供了广义连接及其扭转和曲率张量的系统构造。我们还回顾了这些代数结构在 M 理论中膜相空间上的实现。", "authors": [{"name": "David Osten"}], "featured_authors": [{"name": "David Osten"}], "author_count": 1}, {"id": "2605.21838", "category": "hep-th", "title": "New mechanism for fermion localization in $f(T,T_G)$-brane", "abstract": "We investigate the localization of fermionic fields in a five-dimensional braneworld scenario within the framework of modified teleparallel gravity described by a general $f(T,T_G)$ function. Considering a non-minimal coupling between a Dirac spinor and the torsional invariants, we derive the effective Schrödinger-like equations governing the Kaluza-Klein modes. We showed that the contribution of the teleparallel Gauss-Bonnet term significantly modifies the effective potentials and, consequently, the localization properties. The zero-mode analysis reveals that only one chiral component can be localized on the brane, with the degree of confinement depending on the chosen model. In the massive sector, the spectrum is continuous, but resonant states arise due to the internal structure of the potentials. Additionally, we employ information-theoretic measures, such as Shannon entropy and relative probability, to quantify the localization mechanism. Our results show that the torsional modifications induce a nontrivial redistribution of information, exhibiting stronger localization. These findings highlight the role of higher-order torsional terms in shaping fermionic localization and resonance structures in braneworld scenarios.", "url": "https://arxiv.org/abs/2605.21838", "type": "理论", "summary": "我们在由通用 $f(T,T_G)$ 函数描述的修正远程平行引力框架内研究了五维膜世界场景中费米子场的定位。考虑狄拉克旋量和扭转不变量之间的非最小耦合，我们推导了控制 Kaluza-Klein 模式的有效类薛定谔方程。我们表明，远程并行高斯-博内特项的贡献显着改变了有效势，从而改变了局部化特性。零模式分析表明，膜上只能定位一种手性成分，限制程度取决于所选模型。在大质量扇区中，频谱是连续的，但由于势的内部结构而出现共振态。此外，我们采用信息论度量，例如香农熵和相对概率，来量化定位机制。我们的结果表明，扭转修改引起了信息的不平凡的重新分配，表现出更强的定位。\n\n这些发现强调了高阶扭转项在膜世界场景中塑造费米子局域化和共振结构中的作用。", "authors": [{"name": "Allan R. P. Moreira"}, {"name": "Fernando M. Belchior"}, {"name": "Guo-Hua Sun"}, {"name": "Shi-Hai Dong"}], "featured_authors": [{"name": "Allan R. P. Moreira"}, {"name": "Fernando M. Belchior"}, {"name": "Guo-Hua Sun"}, {"name": "Shi-Hai Dong"}], "author_count": 4}, {"id": "2605.21929", "category": "hep-th", "title": "Stochastic inflation as an open quantum system II: open effective field theory and stochastic matching", "abstract": "We further develop the proposal in Phys.\\ Rev.\\ Lett.\\ \\textbf{136} 071501 that interprets stochastic inflation as an open quantum system, by constructing the open effective field theory for the reduced density matrix of long wavelength modes. We clarify that this open effective field theory enjoys two renormalization group flows: the conventional Wilsonian channel, and a stochastic channel arising from the openness that has no counterpart in ordinary Wilsonian effective field theory. Focusing on the stochastic channel in the hard cutoff scheme, we identify both Gaussian and non-Gaussian diffusion as effective operators in the influence functional, and show that they are required by matching onto correlators and form factors of the perturbative full theory through a method-of-region in time. Beyond Gaussian order, the matching data are no longer local Wilson coefficients but nonlocal and non-Markovian Wilson kernels. We then obtain the bare Hamiltonian density of this open effective field theory and derive its nonlocal functional master equations, including the Fokker-Planck equation for the diagonal density matrix and the Klein-Kramers equation for the Wigner functional, with their zero-modess simplifications discussed. Finally, we take a first step toward a continuum version of this open effective field theory, replacing the hard cutoff by an analytic regulator in the stochastic channel, and demonstrate stochastic renormalization using a massive scalar as an example.", "url": "https://arxiv.org/abs/2605.21929", "type": "理论", "summary": "我们进一步发展了 Phys.\\ Rev.\\ Lett.\\ \\textbf{136} 071501 中的提议，通过构建长波长模式的约化密度矩阵的开放有效场理论，将随机膨胀解释为开放量子系统。我们澄清，这种开放的有效场理论具有两个重正化群流：传统的威尔逊通道，以及由开放性产生的随机通道，该随机通道在普通威尔逊有效场理论中没有对应物。着眼于硬截止方案中的随机通道，我们将高斯扩散和非高斯扩散识别为影响函数中的有效算子，并通过时间区域方法匹配微扰全理论的相关器和形状因子来证明它们是必需的。除了高斯阶之外，匹配数据不再是局部威尔逊系数，而是非局部和非马尔可夫威尔逊核。\n\n然后，我们获得了该开放有效场理论的裸哈密顿密度，并推导了其非局部泛函主方程，包括对角密度矩阵的 Fokker-Planck 方程和 Wigner 泛函的 Klein-Kramers 方程，并讨论了它们的零模简化。最后，我们向这种开放有效场理论的连续体版本迈出了第一步，用随机通道中的解析调节器代替硬截止，并使用大标量作为示例演示随机重正化。", "authors": [{"name": "Yue-Zhou Li"}], "featured_authors": [{"name": "Yue-Zhou Li"}], "author_count": 1}, {"id": "2605.22285", "category": "hep-th", "title": "Krakow Lectures on Scalar Quantum Solitons", "abstract": "We give a pedagogical introduction to Linearized Soliton Perturbation Theory (LSPT), a new and efficient tool for calculations involving quantum solitons. It is a Hamiltonian approach with a focus on explicitly constructing the soliton states. These states are squeezed, coherent states plus perturbative corrections. We will describe multi-loop corrections to states and their masses. An inner product suitable for non-normalizable momentum eigenstates will be introduced and applied to kink-meson scattering. We will also discuss domain wall solitons.", "url": "https://arxiv.org/abs/2605.22285", "type": "理论", "summary": "我们对线性孤子微扰理论（LSPT）进行教学介绍，这是一种涉及量子孤子的计算的新型高效工具。这是一种哈密顿方法，重点是显式构造孤子态。这些状态是压缩的相干状态加上微扰校正。我们将描述对状态及其质量的多循环校正。将引入适用于不可归一化动量本征态的内积并将其应用于扭结介子散射。我们还将讨论畴壁孤子。", "authors": [{"name": "Jarah Evslin"}], "featured_authors": [{"name": "Jarah Evslin"}], "author_count": 1}, {"id": "2605.22409", "category": "hep-th", "title": "Entanglement viscosity to entropy density ratio for spin-3/2 theory", "abstract": "It is known that the Minkowski vacuum appears as a thermal medium to an accelerated observer due to the renowned Unruh effect. More recently, it has been shown that at least for lower-spin fields this medium also exhibits a non-zero \"entanglement\" shear viscosity, which saturates the fundamental Kovtun-Son-Starinets (KSS) bound. We test the universality of this result for higher spins by computing the entanglement viscosity for spin-3/2 fields within the Rarita-Schwinger-Adler (RSA) theory. Strikingly, we obtain a negative viscosity. However, computing the entropy density using the modular Hamiltonian expansion method, we find it is also negative, and the viscosity to entropy ratio saturates the KSS bound. To clarify the origin of the negativity, we use another approach of Zubarev density operator, which gives positive entropy. We also show that RSA theory has many features of a conformal field theory.", "url": "https://arxiv.org/abs/2605.22409", "type": "理论", "summary": "众所周知，由于著名的安鲁效应，闵可夫斯基真空对于加速观察者来说表现为热介质。最近，研究表明，至少对于低自旋场，该介质还表现出非零“纠缠”剪切粘度，该粘度使基本的 Kovtun-Son-Starinets (KSS) 束缚饱和。我们通过计算 Rarita-Schwinger-Adler (RSA) 理论中自旋 3/2 场的纠缠粘度来测试该结果对于更高自旋的普遍性。引人注目的是，我们获得了负粘度。然而，使用模哈密顿展开法计算熵密度，我们发现它也是负的，并且粘度与熵之比使 KSS 界限饱和。为了澄清负性的起源，我们使用 Zubarev 密度算子的另一种方法，它给出正熵。我们还表明 RSA 理论具有共形场论的许多特征。", "authors": [{"name": "R. V. Khakimov"}, {"name": "G. Yu. Prokhorov"}, {"name": "O. V. Teryaev"}], "featured_authors": [{"name": "R. V. Khakimov"}, {"name": "G. Yu. Prokhorov"}, {"name": "O. V. Teryaev"}], "author_count": 3}, {"id": "2605.22560", "category": "hep-th", "title": "Shading A-polynomials via huge representations of $U_q(\\mathfrak{su}_N)$", "abstract": "Classical A-polynomials $A(\\ell,m)$ define constraints on coordinates $\\ell$ and $m$ in $SL(2,\\mathbb{C})$ (a complexification of $SU(2)$) character varieties associated to knot complements $S^3\\setminus K$. Quantum A-polynomials $\\hat A(\\hat \\ell,\\hat m)$ are difference operators annihilating Jones polynomials believed to represent wave functions of 3d Chern-Simons theory with gauge group $SU(2)$ on a toroidal pipe surrounding the knot $K$ strand -- a boundary of the knot complements $S^3\\setminus K$. We suggest a construction of classical shaded A-polynomials $A_a(\\ell_b,m_c)$ associated to Lie groups $SU(N)$. We exploit a formalism of Clebsh-Gordan (CG) chords, where indices $a$, $b$, $c$ run over $1,\\ldots,N-1$. CG chords have a natural interpretation in terms of 2d CFTs of WZW type, or, alternatively, in terms of quantum group $U_q(\\mathfrak{su}_N)$. In t
