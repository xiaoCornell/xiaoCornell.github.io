t transition belonging to the Gross-Neveu O(3) universality class. We couple this system to a single linearly polarised cavity photon mode. The light-matter coupling is such that the photon number remains an intensive quantity as is the case for an empty cavity. For this interacting light-matter model, we formulate a negative-sign-free fermion quantum Monte Carlo algorithm that allows for bias-free results on finite system sizes. Our numerical results show that the coupling to the cavity is irrelevant at criticality, even at strong electron-photon coupling. On the other hand, we observe, and show analytically, that the photon spectral function couples to the optical conductivity of the electronic system. The cavity photons thereby undergo a Mott transition, and the photon spectral function acts as a contact-free non-invasive probe for Mott criticality.", "url": "https://arxiv.org/abs/2606.03733", "type": "理论+数值", "summary": "蜂窝晶格上的哈伯德模型是属于 Gross-Neveu O(3) 普适类的半金属到绝缘体莫特转变的原始实现。我们将该系统耦合到单线偏振腔光子模式。光与物质的耦合使得光子数保持密集的数量，就像空腔的情况一样。对于这种相互作用的光物质模型，我们制定了一种无负号费米子量子蒙特卡罗算法，该算法允许在有限的系统尺寸上获得无偏差的结果。我们的数值结果表明，即使在强电子-光子耦合下，与腔的耦合在临界点也是不相关的。另一方面，我们观察并分析表明，光子光谱函数与电子系统的光导率耦合。因此，腔光子经历莫特跃迁，并且光子光谱函数充当莫特临界点的非接触式非侵入式探针。", "authors": [{"name": "João C. Inácio"}, {"name": "Natanael C. Costa"}, {"name": "Fakher F. Assaad"}], "featured_authors": [{"name": "João C. Inácio"}, {"name": "Natanael C. Costa"}, {"name": "Fakher F. Assaad"}], "author_count": 3}, {"id": "2606.03752", "category": "cond-mat", "title": "Continuous limit of a discrete stochastic model of cell migration", "abstract": "We analytically derive the continuous limit of the Cellular Potts Model (CPM) for a one-dimensional cell subjected to constant and run-and-tumble driving forces. By coarse-graining the discrete lattice dynamics, we obtain the Fokker-Planck equations governing the cell's size and center-of-mass position. We show that in the low-force regime, the cell dynamics are accurately described by an overdamped Langevin equation. Beyond this regime, we expose intrinsic algorithmic artifacts, including a force-dependent diffusion coefficient, a non-linear force-velocity relationship, and the breakdown of the Einstein relation. We demonstrate that replacing the conventional Metropolis update rule with Glauber dynamics significantly mitigates these artifacts, broadening the physically valid parameter space. Our exact results bridge the gap between lattice-based simulations and continuous active matter models.", "url": "https://arxiv.org/abs/2606.03752", "type": "理论+数值", "summary": "我们分析推导了受到恒定驱动力和运行翻滚驱动力作用的一维细胞的细胞波茨模型 (CPM) 的连续极限。通过粗粒度离散晶格动力学，我们获得了控制晶胞尺寸和质心位置的福克-普朗克方程。我们表明，在低力状态下，细胞动力学可以通过过阻尼朗之万方程准确描述。除了这个机制之外，我们还暴露了内在的算法伪影，包括力相关的扩散系数、非线性力-速度关系以及爱因斯坦关系的崩溃。我们证明，用 Glauber 动力学替换传统的 Metropolis 更新规则可以显着减轻这些伪影，从而扩大物理上有效的参数空间。我们的精确结果弥补了基于晶格的模拟和连续活性物质模型之间的差距。", "authors": [{"name": "Despeignes Nino"}, {"name": "Durand Marc"}], "featured_authors": [{"name": "Despeignes Nino"}, {"name": "Durand Marc"}], "author_count": 2}, {"id": "2606.03894", "category": "cond-mat", "title": "Axial dispersion in dilute solutions of linear and branched polymers in parallel-plate and expansion-contraction microchannels", "abstract": "The axial dispersion of polymers in microchannels depends on an interplay between microchannel geometry, polymer architecture, and hydrodynamics. Here, we investigate the axial dispersion of linear, comb, and star polymers in parallel-plate and sinusoidal expansion-contraction microchannels at dilute concentrations using multiparticle collision dynamics simulations. The polymers all contain the same number of monomers but differ in their architecture, and their concentration is fixed at either one value that is dilute for all polymers or the same value relative to the overlap concentration for each polymer. The dispersion coefficients measured at a nominal solvent volumetric flow rate are found to depend on both architecture and concentration. We show that the dispersion coefficients collapse as a function of the Péclet number after accounting for confinement effects on the polymer diffusion coefficient and polymer contributions to the flow field, and the dispersion coefficients in the parallel-plate microchannel can be reasonably predicted using a theory that accounts for inhomogeneous distribution of the polymers in the microchannel.", "url": "https://arxiv.org/abs/2606.03894", "type": "理论+数值", "summary": "微通道中聚合物的轴向分散取决于微通道几何形状、聚合物结构和流体动力学之间的相互作用。在这里，我们使用多粒子碰撞动力学模拟研究了稀浓度下平行板和正弦膨胀-收缩微通道中线性、梳状和星形聚合物的轴向色散。这些聚合物都含有相同数量的单体，但结构不同，并且它们的浓度固定为对所有聚合物都稀释的一个值或相对于每种聚合物的重叠浓度的相同值。发现在标称溶剂体积流量下测量的分散系数取决于结构和浓度。我们表明，在考虑了聚合物扩散系数的限制效应和聚合物对流场的贡献后，分散系数作为佩克莱特数的函数而崩溃，并且可以使用考虑微通道中聚合物不均匀分布的理论合理地预测平行板微通道中的分散系数。", "authors": [{"name": "C. Levi Petix"}, {"name": "Tzortzis Koulaxizis"}, {"name": "Griffin D. Overton"}, {"name": "Antonia Statt"}, {"name": "Michael P. Howard"}], "featured_authors": [{"name": "C. Levi Petix"}, {"name": "Tzortzis Koulaxizis"}, {"name": "Griffin D. Overton"}, {"name": "Antonia Statt"}, {"name": "Michael P. Howard"}], "author_count": 5}, {"id": "2606.03900", "category": "cond-mat", "title": "Bernoulli principle in ferroelectrics", "abstract": "Ferroelectric materials, characterized by spontaneous electric polarization, exhibit remarkable parallels with fluid dynamics, where polarization flux behaves similarly to fluid flow. Understanding polarization distribution in confined geometries at the nanoscale is crucial for both fundamental physics and technological applications. Here, we show that the classical Bernoulli principle, which describes the conservation of the energy flux along velocity streamlines in a moving fluid, can be extended to the conservation of polarization flux in ferroelectric nanorods with varying cross-sectional areas. Geometric constrictions lead to an increase in polarization, resembling fluid acceleration in a narrowing pipe, while expansions cause a decrease. Beyond a critical expansion, phase separation occurs, giving rise to topological polarization structures such as polarization bubbles, curls and Hopfions. This effect extends to soft ferroelectrics, including ferroelectric nematic liquid crystals, where polarization flux conservation governs the formation of complex mesoscale states.", "url": "https://arxiv.org/abs/2606.03900", "type": "理论", "summary": "铁电材料以自发电极化为特征，与流体动力学表现出显着的相似之处，其中极化通量的行为与流体流动相似。了解纳米尺度受限几何形状的偏振分布对于基础物理和技术应用都至关重要。在这里，我们证明经典伯努利原理描述了运动流体中沿速度流线的能量通量守恒，可以扩展到具有不同横截面积的铁电纳米棒中极化通量的守恒。几何收缩导致极化增加，类似于狭窄管道中的流体加速，而膨胀则导致极化减少。超过临界膨胀后，会发生相分离，从而产生拓扑偏振结构，例如偏振气泡、卷曲和霍普芬子。这种效应延伸到软铁电体，包括铁电向列液晶，其中极化通量守恒控制着复杂介观态的形成。", "authors": [{"name": "Anna Razumnaya"}, {"name": "Yuri Tikhonov"}, {"name": "Dmitrii Naidenko"}, {"name": "Ekaterina Linnik"}, {"name": "Igor Lukyanchuk"}], "featured_authors": [{"name": "Anna Razumnaya"}, {"name": "Yuri Tikhonov"}, {"name": "Dmitrii Naidenko"}, {"name": "Ekaterina Linnik"}, {"name": "Igor Lukyanchuk"}], "author_count": 5}, {"id": "2606.03952", "category": "cond-mat", "title": "Emergent cohesion via self-caging in maximally entangled rod packings", "abstract": "Random packings of disordered rigid rods exhibit emergent cohesion, as exemplified in a nest of twigs that is self-equilibrated, free-standing structures. We analyze the geometric motif underlying this cohesion using a rod packing that maximizes the average crossing number subject to non-penetration constraints. We show that this protocol leads to self-caging: collective geometric constraints that prevent rod escape even in finite systems with free boundaries, leading to packings that remain mechanically cohesive due to a combination of purely repulsive and frictional interactions. We show that self-caging is controlled by the available free-volume in translational and rotational configuration spaces, which is minimal when $N/(Z\\alpha)=1/3$ where $N$ is the number of rods, $\\alpha$ is the aspect ratio, and $Z$ is the average coordination number. Our results establish a minimal geometric motif for entanglement-induced cohesion in athermal rod packings, with implications for cohesive granular matter without attractive forces.", "url": "https://arxiv.org/abs/2606.03952", "type": "理论", "summary": "无序刚性棒的随机堆积表现出突现的内聚力，例如自平衡、独立结构的一窝树枝。我们使用棒填料分析了这种内聚力背后的几何图案，该棒填料在非穿透约束下最大化平均交叉数。我们表明，该协议导致自笼：即使在具有自由边界的有限系统中，集体几何约束也能防止杆逃逸，从而导致由于纯粹排斥和摩擦相互作用的组合而保持机械内聚力的填料。我们表明，自锁定是由平移和旋转配置空间中的可用自由体积控制的，当 $N/(Z\\alpha)=1/3$ 时，该自由体积最小，其中 $N$ 是杆数，$\\alpha$ 是长宽比，$Z$ 是平均配位数。我们的结果建立了非热棒填料中纠缠引起的内聚力的最小几何图案，这对没有吸引力的内聚颗粒物质具有影响。", "authors": [{"name": "Yeonsu Jung"}, {"name": "L. Mahadevan"}], "featured_authors": [{"name": "Yeonsu Jung"}, {"name": "L. Mahadevan"}], "author_count": 2}, {"id": "2606.02686", "category": "hep-th", "title": "On-Shell Bootstrap of Loop Inflation Correlators with Spectral Dispersion", "abstract": "We develop a new bootstrap strategy for cosmological correlators at loop level, which we call spectral dispersion. It is based on two conceptual observations that a correlator can be recovered from its on-shell data, also known as nonlocal signals, by analyticity up to local counterterms, and that the on-shell data for a loop process take the form of a discrete sum over quasinormal modes. Technically, our method combines the dS spectral decomposition with dispersion relations. Using this technique, we bootstrap new results in a simple and intuitive form for 3-point and 4-point correlators with 1-loop massive exchanges of scalar and vector bosons, either directly or derivatively coupled. Applications of this bootstrap technique to higher spins and higher-loop banana graphs with dS covariant dispersions but noncovariant couplings are also straightforward.", "url": "https://arxiv.org/abs/2606.02686", "type": "理论", "summary": "我们为环路级别的宇宙学相关器开发了一种新的引导策略，我们称之为光谱色散。它基于两个概念观察，即相关器可以通过局部反项的分析性从其壳上数据（也称为非局部信号）恢复，并且循环过程的壳上数据采用拟正规模式的离散和的形式。从技术上讲，我们的方法将 dS 谱分解与色散关系相结合。使用这种技术，我们以简单直观的形式引导 3 点和 4 点相关器的新结果，并通过直接或导数耦合的标量和矢量玻色子的 1 环大规模交换。这种自举技术在具有 dS 协变色散但非协变耦合的更高自旋和更高循环香蕉图中的应用也很简单。", "authors": [{"name": "Haoyuan Liu"}, {"name": "Zhehan Qin"}, {"name": "Jiayi Wu"}, {"name": "Zhong-Zhi Xianyu"}, {"name": "Hongyu Zhang"}], "featured_authors": [{"name": "Haoyuan Liu"}, {"name": "Zhehan Qin"}, {"name": "Jiayi Wu"}, {"name": "Zhong-Zhi Xianyu"}, {"name": "Hongyu Zhang"}], "author_count": 5}, {"id": "2606.02701", "category": "hep-th", "title": "Quintessential $α$-attractors fit DESI", "abstract": "We study quintessence in $\\alpha$-attractor models in light of recent DESI indications for dynamical dark energy. We show that the \\emph{knee} of the attractor potential provides an excellent approximation to the axion-like quintessence model used as a DESI benchmark. This leads to a simple relation between the axion decay constant $f_a$ and the attractor parameter $\\alpha$, allowing the experimental constraints to be translated into a preference for $\\alpha=\\mathcal{O}(1)$, in agreement with string-motivated expectations. We solve the background dynamics numerically and find good agreement with the DESI-preferred evolution of $w(z)$ up to $z\\sim\\mathcal{O}(1)$. More generally, we point out that the agreement between axion-like and attractor potentials reflects a common requirement imposed by the data: today's potential energy and slope are both of order the Hubble scale in Planck units. We finally comment on the origin of the required initial conditions, which can naturally arise in multifield attractor scenarios.", "url": "https://arxiv.org/abs/2606.02701", "type": "理论", "summary": "我们根据最近的动态暗能量 DESI 指示来研究 $\\alpha$-吸引子模型的精髓。我们表明，吸引子势的 emph{knee} 提供了对用作 DESI 基准的类轴子精髓模型的极好近似。这导致轴子衰变常数$f_a$和吸引子参数$\\alpha$之间存在简单的关系，允许实验约束转化为对$\\alpha=\\mathcal{O}(1)$的偏好，与弦驱动的期望一致。我们对背景动力学进行数值求解，并发现与 $w(z)$ 到 $z\\sim\\mathcal{O}(1)$ 的 DESI 首选演化非常一致。更一般地说，我们指出，类轴子势和吸引子势之间的一致性反映了数据所施加的共同要求：今天的势能和斜率都是普朗克单位的哈勃尺度的量级。最后，我们评论所需初始条件的起源，这可以自然地出现在多场吸引子场景中。", "authors": [{"name": "Alessandro Borys"}, {"name": "Joaquin Masias"}, {"name": "Marco Scalisi"}], "featured_authors": [{"name": "Alessandro Borys"}, {"name": "Joaquin Masias"}, {"name": "Marco Scalisi"}], "author_count": 3}, {"id": "2606.02702", "category": "hep-th", "title": "Perturbative construction of amplitudes from on-shell trees with vacuum pairs: the all-plus four-gluon amplitude through order $\\boldsymbol{g}^{\\boldsymbol{6}}$", "abstract": "We formulate a fixed-order perturbative on-shell construction of amplitudes. The basic input is the particle spectrum together with the allowed on-shell three-point amplitudes. The construction is formulated in terms of tree amplitudes generated by BCFW recursion, supplemented by additional unobservable state-conjugate on-shell pairs, called vacuum pairs, and integrated over the Lorentz-invariant phase space of these pairs. The relative signs are assigned as inclusion-exclusion signs for repeated phase-space ranges in the on-shell construction. As a test case, we study the color-ordered four-gluon all-plus amplitude through orders $g^4$ and $g^6$, and compare the resulting signed phase-space sums with the standard one- and two-loop contributions. The fixed-order bookkeeping of the tree amplitudes is organized in terms of polygons. At order $g^4$ the construction reproduces the finite rational one-loop result. At order $g^6$ the non-vanishing polygon sectors are the octagon, hexagon-quadrilateral, two-pentagon, and three-quadrilateral sectors. Taken together, they reproduce the known planar, non-planar, and bow-tie expressions.", "url": "https://arxiv.org/abs/2606.02702", "type": "理论", "summary": "我们制定了振幅的固定阶扰动壳内结构。基本输入是粒子谱以及允许的壳内三点振幅。该结构是根据 BCFW 递归生成的树振幅来制定的，并辅以额外的不可观测的状态共轭壳对（称为真空对），并在这些对的洛伦兹不变相空间上积分。相对符号被指定为壳上结构中重复相空间范围的包含-排除符号。作为测试用例，我们通过 $g^4$ 和 $g^6$ 阶研究按颜色排序的四胶子全加振幅，并将所得的带符号相空间和与标准一环和二环贡献进行比较。树振幅的固定顺序簿记是按照多边形来组织的。在 $g^4$ 阶上，构造再现了有限有理单循环结果。在 $g^6$ 阶上，非消失多边形扇区是八边形、六边形四边形、二五边形和三四边形扇形。总而言之，它们再现了已知的平面、非平面和领结表达式。", "authors": [{"name": "M. Maniatis"}], "featured_authors": [{"name": "M. Maniatis"}], "author_count": 1}, {"id": "2606.02707", "category": "hep-th", "title": "Gravitational index, black hole saddle degeneracy, and one-form symmetry", "abstract": "It is known that the saddle describing the contribution of supersymmetric black holes to the index of four-dimensional superconformal field theories is degenerate. This degeneracy is a consequence of the one-form symmetry of the theory, and can also be seen as a specific logarithmic correction to the saddle-point action. We discuss the gravitational realization of the one-form symmetry and of the index saddle degeneracy in different holographic setups. In order to illustrate the spontaneous breaking of the one-form symmetry at infinite volume, we employ a gravitational realization of the Cardy-like limit of small chemical potentials where the black hole decompactifies into a black brane.", "url": "https://arxiv.org/abs/2606.02707", "type": "理论", "summary": "已知描述超对称黑洞对四维超共形场论指标贡献的鞍点是简并的。这种简并性是理论单一形式对称性的结果，也可以看作是对鞍点作用的特定对数修正。我们讨论了不同全息装置中单一形式对称性和折射率鞍简并性的引力实现。为了说明无限体积下单一形式对称性的自发破缺，我们采用了小化学势的类卡迪极限的引力实现，其中黑洞解压缩为黑膜。", "authors": [{"name": "Davide Cassani"}, {"name": "Gianmarco Esposto"}], "featured_authors": [{"name": "Davide Cassani"}, {"name": "Gianmarco Esposto"}], "author_count": 2}, {"id": "2606.02708", "category": "hep-th", "title": "Supersymmetry, Large Extra Dimensions and the Gravitino Conjecture", "abstract": "We investigate whether the absence of experimental signals for supersymmetry and extra dimensions can be understood as a correlated phenomenon. Assuming the Gravitino Conjecture, we study the relation between the gravitino mass and the Kaluza-Klein scale in four-dimensional $\\mathcal{N}=1$ supergravity from Type II compactifications with large extra dimensions. We parametrize the scaling of the full internal volume with respect to that of a large $p$-cycle through an anisotropy exponent $\\alpha$, and derive the corresponding volume contributions to the Kähler potential. This leads to constraints on the scaling exponent $n$, linking the gravitino mass to the KK scale, and on the effective number $\\alpha p$ of large dimensions. We find that the linear relation $n=1$ is compatible only with one or two large extra dimensions, precisely the cases that can still be probed at micron distances. In such scenarios, micron-sized extra dimensions imply a light gravitino and gauge-mediated supersymmetry breaking, whereas gravity mediation corresponds to compactification scales beyond current experimental reach.", "url": "https://arxiv.org/abs/2606.02708", "type": "理论", "summary": "我们研究超对称性和额外维度实验信号的缺失是否可以被理解为一种相关现象。假设引力维蒂诺猜想，我们研究了具有大额外维度的 II 型致密化的四维 $\\mathcal{N}=1$ 超引力中的引力质量与 Kaluza-Klein 尺度之间的关系。我们通过各向异性指数 $\\alpha$ 相对于大 $p$ 循环的整个内部体积的缩放比例进行参数化，并得出相应的体积对凯勒势的贡献。这导致对将引力质量与 KK 尺度联系起来的标度指数 $n$ 以及大维度的有效数 $\\alpha p$ 进行限制。我们发现线性关系 $n=1$ 只与一两个大的额外维度兼容，正是这种情况仍然可以在微米距离探测。在这种情况下，微米级的额外维度意味着轻引力和规范介导的超对称性破缺，而引力介导则对应于超出当前实验范围的致密化尺度。", "authors": [{"name": "Leonardo Bersigotti"}, {"name": "Dieter Lust"}, {"name": "Marco Scalisi"}], "featured_authors": [{"name": "Leonardo Bersigotti"}, {"name": "Dieter Lust"}, {"name": "Marco Scalisi"}], "author_count": 3}, {"id": "2606.02729", "category": "hep-th", "title": "Probabilistic Microcausality in a Thermal Bath of Gravitons", "abstract": "We compute the (operator-valued) commutator of a massless scalar field $\\phi$ coupled to gravity. We work in perturbations around Minkowski space, in transverse-traceless gauge at the lowest order in $G_N$. The commutator is composed of different operators, including terms with Dirac delta derivatives supported on the lightcone. These are responsible for ``bending\" the Minkowski lightcone when evaluated on a classical/coherent state of gravitons, which allows to recover standard microcausality in the fixed-background limit. On more general gravitational states, metric fluctuations induce an uncertainty in the causal structure. We compute this effect on a thermal state of gravitons at temperature $T$ by evaluating the probability that $[\\phi(t, \\vec x), \\phi(0)] \\neq 0$. We find that the probability is Gaussian in $\\vec x^{\\, 2}$, centered on the lightcone and with time-growing variance $$ {\\rm Var}( \\vec x^{\\, 2}) = \\frac{16 \\, G_N T t^3}{3}\\, .$$ This result is obtained by subtracting a universal vacuum contribution, which is log-divergent in the UV and subleading in the large-time limit. As a source of finite size can effectively serve as a regulator in this case, the lightcone spread in the vacuum appears to be source-dependent.", "url": "https://arxiv.org/abs/2606.02729", "type": "理论", "summary": "我们计算与重力耦合的无质量标量场 $\\phi$ 的（算子值）交换子。我们在 $G_N$ 最低阶的横向无迹规范中研究 Minkowski 空间周围的扰动。换向器由不同的算子组成，包括光锥上支持的狄拉克δ导数项。当在引力子的经典/相干状态上进行评估时，这些负责“弯曲”明可夫斯基光锥，从而允许在固定背景限制下恢复标准的微观因果关系。在更一般的引力状态上，度量波动会导致因果结构的不确定性。我们通过评估 $[\\phi(t, \\vec x), \\phi(0)] 的概率来计算温度 $T$ 下对引力子热状态的影响。 \\neq 0$。我们发现 $\\vec x^{\\, 2}$ 中的概率为高斯分布，以光锥为中心且方差随时间增长 $$ {\\rm Var}( \\vec x^{\\, 2}) = \\frac{16 \\, G_N T t^3}{3}\\, .$$ 该结果是通过减去通用真空贡献而获得的，该贡献在 UV 中呈对数发散，在大时间限制。\n\n在这种情况下，由于有限尺寸的光源可以有效地充当调节器，因此真空中的光锥扩散似乎与光源有关。", "authors": [{"name": "Giordano Cintia"}, {"name": "Federico Piazza"}, {"name": "Samuel Ramos"}], "featured_authors": [{"name": "Giordano Cintia"}, {"name": "Federico Piazza"}, {"name": "Samuel Ramos"}], "author_count": 3}, {"id": "2606.02810", "category": "hep-th", "title": "Universal global analytic expansion for the 't Hooft-Polyakov monopole profiles", "abstract": "In this work we discuss in detail a global analytic expansion scheme for the solutions of the `t~Hooft-Polyakov monopole profile equations for arbitrary $\\lambda/e^2>0$ based on the findings presented in a recent resurgence-oriented letter arXiv:2602.14620 [hep-th], which the present study significantly expands upon. A uniformly convergent functional perturbation series developed around universal, surprisingly simple, analytic non-perturbative background profiles corresponding to a partial resummation of the Borel-plane expansions suggested there, is constructed; a perfect match to what is known about the full solutions' local behaviour at zero and infinite radii is achieved, along with simple analytic prescriptions for the locally inaccessible numerical parameters therein.", "url": "https://arxiv.org/abs/2606.02810", "type": "理论", "summary": "在这项工作中，我们基于最近的面向复兴的信件 arXiv:2602.14620 [hep-th] 中提出的发现，详细讨论了任意 $\\lambda/e^2>0$ 的 `t~Hooft-Polyakov 单极剖面方程解的全局解析扩展方案，本研究对此进行了重大扩展。围绕通用的、令人惊讶的简单的、分析的非微扰背景轮廓开发出一致收敛的函数扰动级数，该背景轮廓对应于此处建议的 Borel 平面展开的部分恢复；实现了与已知的完整解在零和无限半径处的局部行为的完美匹配，以及其中局部不可访问的数值参数的简单分析规定。", "authors": [{"name": "Michal Malinský"}], "featured_authors": [{"name": "Michal Malinský"}], "author_count": 1}, {"id": "2606.03004", "category": "hep-th", "title": "Kinematical correlations via $κ$-Poincaré coproducts", "abstract": "We study a kinematical consequence of the Hopf-algebraic momentum composition law in $\\kappa$-Minkowski spacetime. The same curved momentum space can be described in different coordinates. In the bicrossproduct basis the ordered-plane-wave labels are the translation-generator eigenvalues, so the relevant map is one-to-one. In the classical basis, instead, the translation eigenvalues $P_\\mu$ are nonlinearly related to the ordered-plane-wave labels $p_\\mu$. This relation can fail to be globally one-to-one in a high-momentum region. When a given classical-basis four-momentum admits more than one real auxiliary preimage, the branch-sensitive quantity $P_+\\equiv P_0+P_4=\\kappa e^{p_0/\\kappa}$ enters the coproduct and resolves the branches in two-particle states. Imposing the vanishing total-momentum constraint therefore gives branch-dependent $\\kappa$-deformed back-to-back momentum correlations. In a single-branch regime this is just a deformed correlated product, while in a multibranch regime a state specified only by $P_\\mu$ can be expanded into distinct auxiliary branches. If $P_\\mu$ are taken as the directly meaningful momenta, the physical content is the resulting deformed correlation pattern. If the auxiliary variables $p_\\mu$ are assigned operational meaning, the same constrained state can be interpreted as a superposition over different auxiliary branches. We also compare this structure with standard regular self-adjoint nonrelativistic minimal-length models and find no analogous smooth local two-real-branch inversion on their physical domains.", "url": "https://arxiv.org/abs/2606.03004", "type": "理论", "summary": "我们研究 $\\kappa$-Minkowski 时空中 Hopf 代数动量合成定律的运动学结果。相同的弯曲动量空间可以用不同的坐标来描述。在二叉积基础中，有序平面波标签是平移生成器特征值，因此相关映射是一对一的。相反，在经典基础中，平移特征值 $P_\\mu$ 与有序平面波标签 $p_\\mu$ 非线性相关。在高势头区域，这种关系可能无法在全球范围内实现一对一。当给定的经典基四动量承认多个实辅助原像时，分支敏感量 $P_+\\equiv P_0+P_4=\\kappa e^{p_0/\\kappa}$ 进入余积并解析二粒子态的分支。因此，施加消失的总动量约束给出了分支依赖的 $\\kappa$ 变形的背靠背动量相关性。在单分支机制中，这只是变形的相关乘积，而在多分支机制中，仅由 $P_\\mu$ 指定的状态可以扩展为不同的辅助分支。\n\n如果将 $P_\\mu$ 视为直接有意义的动量，则物理内容就是由此产生的变形相关模式。如果辅助变量$p_\\mu$被赋予操作意义，则相同的约束状态可以解释为不同辅助分支的叠加。我们还将这种结构与标准正则自伴非相对论最小长度模型进行比较，发现在它们的物理域上没有类似的平滑局部二实分支反演。", "authors": [{"name": "Mohammad Ali Gorji"}, {"name": "Babak Vakili"}], "featured_authors": [{"name": "Mohammad Ali Gorji"}, {"name": "Babak Vakili"}], "author_count": 2}, {"id": "2606.03049", "category": "hep-th", "title": "Holographic complexity of de-Sitter black holes", "abstract": "We investigate holographic complexity within the Schwarzschild-de Sitter (SdS) black hole spacetime. Two distinct de Sitter holography prescriptions are examined: the static patch scheme restricted to the stretched horizon and the de Sitter/Conformal Field Theory (dS/CFT) correspondence scheme defined at asymptotic future and past infinities. We evaluate the Complexity equals Volume (CV) conjecture and extend the analysis to codimension-zero proposals, specifically Complexity equals Spacetime Volume (CV2.0) and Complexity equals Action (CA), through the Wheeler-DeWitt (WDW) patch we construct. The behaviors of the complexity in the static patch holography at late time and in the dS/CFT at infinite spacelike boundary coordinate are studied, respectively. We find that under both the CV and CV2.0 conjectures, the static patch holographic complexity and the dS/CFT holographic complexity consistently exhibit linear growth. Conversely, regarding the CA conjecture, the holographic complexity growth rates for both the static patch and the dS/CFT correspondence vanish. This behavior is attributed to the finiteness of the (regularized) action within the restricted WDW region. Furthermore, it is demonstrated that the complexity growth rate of the static patch scheme is identical to that in the dS/CFT scheme. This equivalence implies the existence of a unified description for bulk dynamics within de Sitter holography.", "url": "https://arxiv.org/abs/2606.03049", "type": "理论", "summary": "我们研究史瓦西德西特 (SdS) 黑洞时空中的全息复杂性。研究了两种不同的德西特全息方案：限制于拉伸视界的静态补丁方案和在渐近未来和过去无穷大定义的德西特/共形场论（dS/CFT）对应方案。我们评估复杂性等于体积（CV）猜想，并将分析扩展到余维零建议，特别是复杂性等于时空体积（CV2.0）和复杂性等于动作（CA），通过我们构建的惠勒-德威特（WDW）补丁。分别研究了后期静态斑片全息和无限类空间边界坐标下dS/CFT的复杂度行为。我们发现，在 CV 和 CV2.0 猜想下，静态贴片全息复杂度和 dS/CFT 全息复杂度始终呈现线性增长。相反，对于 CA 猜想，静态补丁和 dS/CFT 对应的全息复杂度增长率都消失了。此行为归因于受限 WDW 区域内（正则化）操作的有限性。\n\n此外，还证明了静态补丁方案的复杂度增长率与 dS/CFT 方案中的复杂度增长率相同。这种等价意味着德西特全息术中存在对体动力学的统一描述。", "authors": [{"name": "Chaoxi Fang"}, {"name": "Jiayue Yang"}, {"name": "Shao-Wen Wei"}, {"name": "Ming Zhang"}, {"name": "Robert B. Mann"}], "featured_authors": [{"name": "Chaoxi Fang"}, {"name": "Jiayue Yang"}, {"name": "Shao-Wen Wei"}, {"name": "Ming Zhang"}, {"name": "Robert B. Mann"}], "author_count": 5}, {"id": "2606.03082", "category": "hep-th", "title": "Magnetic Symmetries and the Structure of Correlation Functions in Quantum Field Theory", "abstract": "Quantum field theories in the presence of a static and uniform external magnetic field possess two characteristic spatial symmetries: magnetic translations and magnetic rotation. We investigate general consequences of these symmetries on correlation functions from a model-independent perspective, without relying on specific models or perturbative expansions. The projective structure of magnetic translation symmetry constrains correlation functions of charged operators to acquire the Schwinger phase and leads to a factorized form into a gauge-covariant phase factor and a reduced correlator depending only on relative coordinates. We further derive the spectral representation of two-point functions in terms of representations of the magnetic translation algebra, in which the Landau- and symmetric-gauge descriptions arise as different choices of basis. Our results provide a unified symmetry-based framework for quantum field theories in external magnetic fields.", "url": "https://arxiv.org/abs/2606.03082", "type": "理论", "summary": "在存在静态且均匀的外部磁场的情况下，量子场论具有两种特征空间对称性：磁平移和磁旋转。我们从独立于模型的角度研究这些对称性对相关函数的一般后果，而不依赖于特定模型或微扰展开。磁平移对称的射影结构约束带电算子的相关函数以获得施温格相位，并导致因式分解形式为规范协变相位因子和仅依赖于相对坐标的简化相关器。我们进一步根据磁平移代数的表示形式推导了两点函数的谱表示，其中朗道规范描述和对称规范描述是作为基础的不同选择而出现的。我们的结果为外部磁场中的量子场论提供了一个基于对称性的统一框架。", "authors": [{"name": "Masaru Hongo"}, {"name": "Kentaro Nishimura"}], "featured_authors": [{"name": "Masaru Hongo"}, {"name": "Kentaro Nishimura"}], "author_count": 2}, {"id": "2606.03106", "category": "hep-th", "title": "Holographic reconstruction for defect CFTs from $\\mathrm{AdS}_p \\times S^q$ spacetimes", "abstract": "We study defects in superconformal field theories using holography, focusing on the precise derivation of the defect observables from supergravity. We consider $\\mathrm{AdS}_p \\times S^q$ spacetimes fibered over an interval and coupled to higher-form gauge fields as well as scalar fields. We determine the coordinate system in which the defect geometry admits an asymptotically flat boundary and, in this setup, we systematically apply holographic renormalization to compute the fundamental observables of the defect theory. In particular, we derive the one-point correlators of the bulk fields, the holographic stress tensor, and its Ward identities. We implement explicitly this procedure for line and surface defects in five- and six-dimensional Romans supergravity. The relevant geometries are $\\mathrm{AdS}_2\\times S^2$, $\\mathrm{AdS}_2\\times S^3$ and $\\mathrm{AdS}_3\\times S^2$ backgrounds warped over an interval, preserving four supercharges and asymptotically $\\mathrm{AdS}_5$ and $\\mathrm{AdS}_6$. In each case, we discuss the implications of our results and compare them with the standard literature on defects in conformal field theory.", "url": "https://arxiv.org/abs/2606.03106", "type": "理论", "summary": "我们使用全息术研究超共形场论中的缺陷，重点是从超重力中精确推导缺陷可观测量。我们考虑 $\\mathrm{AdS}_p \\times S^q$ 时空在一个区间上纤维化，并耦合到更高形式的规范场和标量场。我们确定缺陷几何形状允许渐近平坦边界的坐标系，并且在该设置中，我们系统地应用全息重正化来计算缺陷理论的基本可观测量。特别是，我们推导了体场的单点相关器、全息应力张量及其沃德恒等式。我们明确地针对五维和六维罗马超重力中的线和表面缺陷实施了这个程序。相关几何图形是 $\\mathrm{AdS}_2\\times S^2$、$\\mathrm{AdS}_2\\times S^3$ 和 $\\mathrm{AdS}_3\\times S^2$ 背景在一段时间内扭曲，保留四个增压并渐近 $\\mathrm{AdS}_5$ 和 $\\mathrm{AdS}_6$。在每种情况下，我们都会讨论我们的结果的含义，并将其与共形场论缺陷的标准文献进行比较。", "authors": [{"name": "Federico Faedo"}, {"name": "Nicolò Petri"}, {"name": "Alessia Segati"}], "featured_authors": [{"name": "Federico Faedo"}, {"name": "Nicolò Petri"}, {"name": "Alessia Segati"}], "author_count": 3}, {"id": "2606.03302", "category": "hep-th", "title": "Non-Gaussianity and Strong-Coupling Problem in a Two-Field DHOST Bouncing Model", "abstract": "We recently constructed a two-field Degenerate Higher-Order Scalar-Tensor (DHOST) bouncing model which is fully viable at the linear level [1]. This model is completely free of Belinski-Khalatnikov-Lifshitz (BKL) instability, ghost instability, gradient instability and superluminality. It also predicts the scalar spectral index and tensor-toscalar ratio consistent with observations. The aim of this paper is to extend the viability of the model to the non-linear level. To this end, we first refine the original model such that its prediction on the (local) non-Gaussianity parameter fNL agrees with observations, leaving the viability of the model at the linear level intact. We furthermore demonstrate that the strong-coupling scale is well above the characteristic background energy scale all the time. Our model indeed exemplifies the fully viable two-field DHOST bouncing model, in the sense that it is weakly-coupled, stable and non-superluminal as well as consistent with observations.", "url": "https://arxiv.org/abs/2606.03302", "type": "理论", "summary": "我们最近构建了一个两场简并高阶标量张量 (DHOST) 弹跳模型，该模型在线性水平上完全可行 [1]。该模型完全没有 Belinski-Khalatnikov-Lifshitz (BKL) 不稳定性、幽灵不稳定性、梯度不稳定性和超光速。它还预测了与观测结果一致的标量谱指数和张量与标量比。本文的目的是将模型的可行性扩展到非线性水平。为此，我们首先细化原始模型，使其对（局部）非高斯参数 fNL 的预测与观察结果一致，从而使模型在线性水平上的可行性完好无损。我们进一步证明，强耦合尺度始终远高于特征背景能量尺度。我们的模型确实例证了完全可行的两场 DHOST 弹跳模型，从某种意义上说，它是弱耦合、稳定和非超光速的，并且与观测结果一致。", "authors": [{"name": "Ok Song An"}, {"name": "Kon Hong"}, {"name": "Jin U Kang"}, {"name": "Ui Ri Mun"}], "featured_authors": [{"name": "Ok Song An"}, {"name": "Kon Hong"}, {"name": "Jin U Kang"}, {"name": "Ui Ri Mun"}], "author_count": 4}, {"id": "2606.03339", "category": "hep-th", "title": "A class of half-BPS boundary conditions for $A_{K-1}$ circular quivers", "abstract": "We study a string-motivated class of $\\tfrac12$-BPS boundary conditions for 4d $\\mathcal N=2$ $A_{K-1}$ circular quiver gauge theories, engineered by D4-branes suspended between NS5-branes on a circle. For D4-branes ending on boundary D6-branes, a single-pole ansatz reduces the BPS equations to a rigid algebraic problem. We characterize the structure of its solutions, which exhibit a winding phenomenon with no analogue for linear quivers, and solve two cases explicitly in closed form. Supported by a brane-duality argument, we propose the maximal-winding solution as a candidate S-dual of the pure Neumann boundary condition.", "url": "https://arxiv.org/abs/2606.03339", "type": "理论", "summary": "我们研究了 4d $\\mathcal N=2$ $A_{K-1}$ 圆形颤动规范理论的弦驱动类 $\\tfrac12$-BPS 边界条件，由悬挂在圆上的 NS5 膜之间的 D4 膜设计。对于在边界 D6 膜上结束的 D4 膜，单极 ansatz 将 BPS 方程简化为刚性代数问题。我们描述了其解决方案的结构，该解决方案表现出与线性箭袋没有类似的缠绕现象，并以封闭形式明确地解决了两种情况。在膜对偶性论证的支持下，我们提出最大缠绕解作为纯诺依曼边界条件的候选 S-对偶。", "authors": [{"name": "Davide Bason"}, {"name": "Roberto Valandro"}], "featured_authors": [{"name": "Davide Bason"}, {"name": "Roberto Valandro"}], "author_count": 2}, {"id": "2606.03439", "category": "hep-th", "title": "Amplituhedra and origami, II: loop level", "abstract": "Building on the recently discovered origami-amplituhedron correspondence, we prove that the BCFW (Britto-Cachazo-Feng-Witten) cells triangulate the $m=4$ amplituhedron in full generality at all loop orders, both in momentum and momentum-twistor space. Along the way, we develop two natural \"$L$-punctured\" extensions of the positive Grassmannian and relate them via T-duality.", "url": "https://arxiv.org/abs/2606.03439", "type": "理论", "summary": "基于最近发现的折纸-放大面体对应关系，我们证明了 BCFW（Britto-Cachazo-Feng-Witten）单元在动量和动量扭量空间中在所有环阶上以完全通用的方式对 $m=4$ 放大面体进行三角剖分。在此过程中，我们开发了正格拉斯曼函数的两个自然的“$L$-punctured”扩展，并通过 T-对偶性将它们联系起来。", "authors": [{"name": "Pavel Galashin"}], "featured_authors": [{"name": "Pavel Galashin"}], "author_count": 1}, {"id": "2606.03494", "category": "hep-th", "title": "Renormalization aspects of the Yang-Mills theory with a cutoff", "abstract": "The paper discusses renormalization aspects of the quantum four-dimensional Yang-Mills theory with a cutoff regularization in the coordinate representation. The background field method is used to formulate a generating functional, and the regularization is introduced through quasi-local probabilistic averaging. Two main types of regularization are proposed: strong deformation, which consists in averaging fluctuation fields, and weak deformation, which is a covariant generalization of the first case with respect to gauge transformations of the background field. We study singular contributions for the first two quantum corrections in this paper and compare them in detail with the case of dimensional regularization. The consistency of the action and the equation of motion after introducing the regularization and making a renormalization procedure is analyzed. New counter-vertices are studied, in particular their locality properties and dependence on the regularization parameter.", "url": "https://arxiv.org/abs/2606.03494", "type": "理论", "summary": "本文讨论了量子四维杨-米尔斯理论的重正化方面以及坐标表示中的截止正则化。使用背景场​​方法来制定生成函数，并通过准局部概率平均引入正则化。提出了两种主要的正则化类型：强变形（包括平均波动场）和弱变形（这是第一种情况相对于背景场规范变换的协变推广）。我们研究了本文中前两个量子校正的奇异贡献，并将它们与维度正则化的情况进行了详细比较。分析了引入正则化并进行重正化过程后动作与运动方程的一致性。研究了新的反顶点，特别是它们的局部性属性和对正则化参数的依赖性。", "authors": [{"name": "A. V. Ivanov"}, {"name": "N. V. Kharuk"}], "featured_authors": [{"name": "A. V. Ivanov"}, {"name": "N. V. Kharuk"}], "author_count": 2}, {"id": "2606.03496", "category": "hep-th", "title": "Off-Shell Supersymmetry Algebra in the Lorentzian IIB Matrix Model: Algebraic Constraints and a $κ$-Minkowski-Like Sector", "abstract": "The Lorentzian IIB matrix model provides a non-perturbative framework for studying emergent spacetime from microscopic matrix degrees of freedom. In this paper we ask whether such emergent structures can be constrained by algebraic consistency, rather than by specifying a classical or dynamical solution. We analyze a CPT-even low-order effective-action ansatz in Minkowski signature and impose restricted off-shell supersymmetry closure on anisotropic background fields, without imposing their equations of motion. The zeroth-order Ward identity forces the scalar ansatz to be constant. Within the order-two truncation, closure constrains the effective transformation coefficients and selects a block-diagonal separation between macroscopic and internal directions. Clifford-algebra identities then require the internal non-Abelian flux to vanish, giving an algebraic decoupling of the internal sector. In the four-dimensional sector, the closure obstruction can be absorbed into a Lorentz-type rotation when the macroscopic matrices form a non-degenerate coordinate sector. Within a linear absorption ansatz, the coefficient structure is fixed, up to an overall function, by the four-dimensional epsilon tensor. Imposing macroscopic spatial isotropy selects a $\\kappa$-Minkowski-like algebra and identifies the macroscopic time direction. Finite-dimensional Hermitian representations make this spatial sector trivial, so a nontrivial realization requires an $N\\to\\infty$ or unbounded-operator limit. In the corresponding formal continuum picture, the spatial sector expands while the internal sector remains static, providing a kinematic mechanism for relative effective compactification.", "url": "https://arxiv.org/abs/2606.03496", "type": "理论", "summary": "洛伦兹 IIB 矩阵模型为研究微观矩阵自由度的涌现时空提供了一个非微扰框架。在本文中，我们询问这种涌现结构是否可以通过代数一致性来约束，而不是通过指定经典或动态解来约束。我们分析了 Minkowski 签名中的 CPT 偶数低阶有效作用 ansatz，并对各向异性背景场施加受限的离壳超对称闭包，而不施加它们的运动方程。零阶 Ward 恒等式迫使标量 ansatz 保持不变。在二阶截断内，闭包约束有效变换系数并选择宏观方向和内部方向之间的块对角线分离。然后，克利福德代数恒等式要求内部非阿贝尔通量消失，从而实现内部扇区的代数解耦。在四维扇区中，当宏观矩阵形成非简并坐标扇区时，闭包障碍可以被吸收为洛伦兹型旋转。\n\n在线性吸收模拟中，系数结构由四维 epsilon 张量固定，直到总体函数。施加宏观空间各向同性选择$\\kappa$-Minkowski 类代数并识别宏观时间方向。有限维埃尔米特表示使得这个空间扇区变得微不足道，因此非平凡的实现需要 $N\\to\\infty$ 或无界算子限制。在相应的形式连续体图中，空间部分扩张，而内部部分保持静态，为相对有效的压缩提供了运动机制。", "authors": [{"name": "Tetsuyuki Muramatsu"}], "featured_authors": [{"name": "Tetsuyuki Muramatsu"}], "author_count": 1}, {"id": "2606.03955", "category": "hep-th", "title": "Flat from AdS: in any dimension and for any spin", "abstract": "The space of solutions to the free equations of motion for massless fields of arbitrary integer spin in Minkowski spacetime is recovered as a smooth limit of the anti-de Sitter solution space for any even spacetime dimension. The infinite set of boundary data near null infinity that characterise solutions in Minkowski spacetime is obtained from an expansion of the anti-de Sitter source and vev in powers of the cosmological constant. In particular, the source gives rise to the analogue of the gravitational shear tensor, while the vev yields the analogues of the mass and angular-momentum aspects, as well as the subleading infinite tower of boundary data. These identifications are further supported by the branching of the source and vev into representations of the Lorentz algebra identified with the conformal algebra of the celestial sphere.", "url": "https://arxiv.org/abs/2606.03955", "type": "理论", "summary": "闵可夫斯基时空中任意整数自旋的无质量场的自由运动方程的解空间被恢复为任何偶数时空维度的反德西特解空间的平滑极限。表征闵可夫斯基时空中解的接近零无穷大的无限边界数据集是通过反德西特源和宇宙常数 vev 的幂展开而获得的。特别是，源产生了引力剪切张量的类似物，而 vev 产生了质量和角动量方面的类似物，以及边界数据的副引导无限塔。这些识别得到了将源和 vev 分支为洛伦兹代数表示的进一步支持，该洛伦兹代数与天球共形代数一致。", "authors": [{"name": "Xavier Bekaert"}, {"name": "Andrea Campoleoni"}, {"name": "Simon Pekar"}, {"name": "S.I. Aadharsh Raj"}], "featured_authors": [{"name": "Xavier Bekaert"}, {"name": "Andrea Campoleoni"}, {"name": "Simon Pekar"}, {"name": "S.I. Aadharsh Raj"}], "author_count": 4}, {"id": "2606.03958", "category": "hep-th", "title": "Multihair thermodynamics of Kerr-Newman-NUT-AdS$_4$ spacetimes", "abstract": "We formulate multihair thermodynamics for Kerr-Newman-NUT-AdS$_4$ spacetimes with symmetric Misner strings and conical deficits. The NUT charge parameter enters the homogeneous thermodynamic state space through two secondary hairs: a rotation-like hair $J_n=mn/K^2$ and a charge-like hair $N=n/\\sqrt K$. They are not additional metric parameters, but thermodynamic response variables in the enlarged state space. Together with the electric charge, pressure, angular momentum, and string tensions, these variables yield a compact Christodoulou-Ruffini-type squared-mass formula. Differentiating this equation of state gives the horizon temperature, angular velocities, electric potential, NUT potential, thermodynamic volume, and thermodynamic lengths, and the resulting first law and Smarr relation are verified algebraically. We also discuss alternative consistent NUT parametrizations, including one based on the dual mass, and clarify how the choice of thermodynamic volume is tied to the chosen NUT sector. The construction gives a controlled example of how an AdS black hole state space can be selected when first law consistency alone is not unique.", "url": "https://arxiv.org/abs/2606.03958", "type": "理论", "summary": "我们为具有对称 Misner 弦和圆锥赤字的 Kerr-Newman-NUT-AdS$_4$ 时空制定了多毛热力学。 NUT 电荷参数通过两个次级毛发进入均匀热力学状态空间：类旋转毛发 $J_n=mn/K^2$ 和类电荷毛发 $N=n/\\sqrt K$。它们不是附加的度量参数，而是放大状态空间中的热力学响应变量。这些变量与电荷、压力、角动量和弦张力一起产生一个紧凑的 Christodoulou-Ruffini 型平方质量公式。对这个状态方程进行微分可以得到地平线温度、角速度、电势、NUT电势、热力学体积和热力学长度，并通过代数验证所得到的第一定律和 Smarr 关系。我们还讨论了替代的一致 NUT 参数化，包括基于对偶质量的参数化，并阐明了热力学体积的选择如何与所选 NUT 扇区相关联。该构造给出了一个受控示例，说明当第一定律一致性不唯一时如何选择 AdS 黑洞状态空间。", "authors": [{"name": "Di Wu"}, {"name": "Shuang-Qing Wu"}], "featured_authors": [{"name": "Di Wu"}, {"name": "Shuang-Qing Wu"}], "author_count": 2}, {"id": "2606.03974", "category": "hep-th", "title": "Flowing with Displacements and Tilts: Surface Operators in $O(N)$ Models", "abstract": "Defect conformal field theories have special operators of protected dimension known as displacements and tilts. They arise due to the breaking of global symmetries by the defect and the normalisations of their two-point functions are characteristics of the defect. In the case of surface defects, these normalisations are related to some of the anomaly coefficients in the surface effective action. To study these operators and their flows between different defect renormalization group fixed points we present an elegant approach using conformal perturbation theory that easily reproduces the known examples from the critical Wilson-Fisher $O(N)$ model in $4-\\varepsilon$ dimensions and allows us to construct new ones in other multiscalar theories. In all the systems that we study the flows are short and under full control, as is the change of the displacement and tilt normalizations. We point out some novel features like the existence of vortices when the defect conformal manifold is not simply connected. In addition to regular human labour, this work relied heavily on generative AI; see full disclosure in methodology section.", "url": "https://arxiv.org/abs/2606.03974", "type": "理论", "summary": "缺陷共形场论具有受保护维度的特殊算子，称为位移和倾斜。它们的出现是由于缺陷破坏了全局对称性，并且它们的两点函数的归一化是缺陷的特征。在表面缺陷的情况下，这些归一化与表面有效​​作用中的一些异常系数有关。为了研究这些算子及其在不同缺陷重整化群固定点之间的流动，我们提出了一种使用共形微扰理论的优雅方法，该方法可以轻松地在 $4-\\varepsilon$ 维度上重现关键 Wilson-Fisher $O(N)$ 模型中的已知示例，并允许我们在其他多标量理论中构造新的示例。在我们研究的所有系统中，流动都很短并且受到完全控制，位移和倾斜归一化的变化也是如此。我们指出了一些新颖的特征，例如当缺陷共形流形不是简单连接时涡旋的存在。除了常规的人类劳动之外，这项工作还严重依赖生成式人工智能。请参阅方法部分中的完整披露。", "authors": [{"name": "Jake Belton"}, {"name": "Nadav Drukker"}, {"name": "Biswajit Sahoo"}], "featured_authors": [{"name": "Jake Belton"}, {"name": "Nadav Drukker"}, {"name": "Biswajit Sahoo"}], "author_count": 3}, {"id": "2606.03977", "category": "hep-th", "title": "Pure states for subregions in gravity and their entanglement entropy", "abstract": "It is proposed that spatial subregions in quantum gravity can be assigned pure states, rather than mixed reduced density matrices. The state is prepared by a partially frozen gravitational path integral, in which a spacetime subregion containing the spatial subregion is fixed while the field configurations and ambient geometry are summed over. In the semiclassical regime, we further propose a holographic prescription for the entanglement entropy of bipartitions of this state, with a frozen-region analogue of the homology constraint. The prescription satisfies nontrivial self-consistency conditions, including strong subadditivity, complementarity, and entanglement wedge nesting, and reproduces several known entropy formulas in holography and gravity as special cases. The construction suggests an observer-dependent entanglement wedge labeled by the frozen subregion.", "url": "https://arxiv.org/abs/2606.03977", "type": "理论", "summary": "提出量子引力中的空间子区域可以被指定为纯态，而不是混合的约简密度矩阵。该状态是通过部分冻结的引力路径积分来准备的，其中包含空间子区域的时空子区域是固定的，同时对场配置和环境几何形状进行求和。在半经典体系中，我们进一步提出了该状态二分纠缠熵的全息处方，以及同源约束的冻结区域类似物。该方案满足非平凡的自洽条件，包括强次可加性、互补性和纠缠楔嵌套，并作为特例重现了全息和引力中的几个已知熵公式。该结构表明由冻结子区域标记的依赖于观察者的纠缠楔。", "authors": [{"name": "Zixia Wei"}], "featured_authors": [{"name": "Zixia Wei"}], "author_count": 1}, {"id": "2606.02590", "category": "math-ph", "title": "A family of variational principles of minima for the plasticity, the friction contact and the fracture mechanics", "abstract": "The paper is a synthesis of several works on the variational principles for application to the mechanics and the physics, inspired from original ideas of Brezis, Ekeland and Nayroles. On this basis, we developed an unified framework for dynamic dissipative systems that leads to a space-time variational principle of minimum constructed with tools of convex analysis and symplectic geometry. We stress the essential ideas and concepts. They are illustrated with various theoretical and numerical examples.", "url": "https://arxiv.org/abs/2606.02590", "type": "理论", "summary": "这篇论文综合了几篇关于应用于力学和物理学的变分原理的著作，其灵感来自 Brezis、Ekeland 和 Nayroles 的原始想法。在此基础上，我们开发了一个统一的动态耗散系统框架，导出了用凸分析和辛几何工具构建的时空变分极小原理。我们强调基本的想法和概念。它们通过各种理论和数值示例进行说明。", "authors": [{"name": "Géry de Saxcé"}], "featured_authors": [{"name": "Géry de Saxcé"}], "author_count": 1}, {"id": "2606.02759", "category": "math-ph", "title": "Bounds on the Bogoliubov--Hartree--Fock Energy of the Pauli--Fierz Hamiltonian", "abstract": "A variational analysis of the Bogoliubov--Hartree--Fock (BHF) energy of the translation-invariant, spinless Pauli--Fierz Hamiltonian with massless dispersion relation built up on work of the first author, Breteaux, and Tzaneteas (2013) and of the first author and Hach (2022) is presented. The main results are lower and upper bounds on the BHF energy for fixed total momentum expressed through simpler variational problems defined on the space of positive Hilbert--Schmidt operators and a new variational formulation of the upper bound for zero total momentum. Specifically, we introduce a change of variables which considerably simplifies the energy functional and the derivation of its stationarity condition.", "url": "https://arxiv.org/abs/2606.02759", "type": "理论", "summary": "基于第一作者 Breteaux 和 Tzaneteas (2013) 以及第一作者和 Hach (2022) 的工作，提出了具有无质量色散关系的平移不变、无自旋泡利-菲尔兹哈密顿量的 Bogoliubov--Hartree--Fock (BHF) 能量的变分分析。主要结果是固定总动量的 BHF 能量的下界和上限，通过在正 Hilbert-Schmidt 算子空间上定义的更简单的变分问题来表达，以及零总动量上限的新变分公式。具体来说，我们引入了变量的变化，这大大简化了能量泛函及其平稳条件的推导。", "authors": [{"name": "Volker Bach"}, {"name": "Matthias Herdzik"}], "featured_authors": [{"name": "Volker Bach"}, {"name": "Matthias Herdzik"}], "author_count": 2}, {"id": "2606.02893", "category": "math-ph", "title": "Floquet Theory of the LC Circuit with Modulated Capacitance", "abstract": "Parametric resonance -- periodic variation of a system parameter driving exponential growth of oscillations -- is among the most fundamental instabilities in physics and engineering. The nondissipative LC circuit with harmonically varying capacitance is one of its simplest realizations: the modulation renders the circuit equation a Hill equation with either bounded or exponentially growing solutions. Identifying the governing equation as a special case of Ince's four-parameter Hill equation yields two main results. First, a sharp structural theorem: instability occurs only at the odd sub-harmonics of the natural frequency, while every even resonance is exactly stable at all modulation amplitudes. This selectivity, invisible to the Mathieu approximation, follows from Krein's collision theory: at odd resonances the colliding Floquet multipliers carry opposite Krein signatures, opening a tongue; at even resonances the signatures agree and the tongue collapses. Second, closed-form formulas for the widths and boundary curves of all surviving tongues, derived by a continued-fraction and Magnus--Winkler method, confirmed against Cambi's 1950 numerics and recovered via the Yakubovich--Starzhinskii series. The continued fraction also gives the Floquet exponent as an exact power series in the modulation amplitude with rational coefficients, and finite-product formulas for all Fourier coefficients of the periodic Floquet factor. The tongue boundaries consist entirely of exceptional points of degeneracy (EPD) of the monodromy matrix, enabling hypersensitive capacitance sensing: at an EPD a small perturbation splits the coincident frequencies by the square root of its size, diverging relative to linear sensing as it shrinks. A closed-form splitting formula is derived, and a work-point strategy shifting slightly into the stable zone keeps the scheme robust while preserving square-root sensitivity.", "url": "https://arxiv.org/abs/2606.02893", "type": "理论", "summary": "参数共振——驱动振荡呈指数增长的系统参数的周期性变化——是物理学和工程学中最基本的不稳定性之一。具有谐波变化电容的非耗散 LC 电路是其最简单的实现之一：调制使电路方程成为具有有界或指数增长解的 Hill 方程。将控制方程确定为因斯四参数希尔方程的特例，得到两个主要结果。首先，一个尖锐的结构定理：不稳定性仅发生在固有频率的奇数次谐波处，而每个偶数谐振在所有调制幅度下都完全稳定。这种选择性对于Mathieu近似来说是不可见的，它遵循Krein的碰撞理论：在奇数共振下，碰撞的Floquet乘法器携带相反的Kerin特征，打开舌头；在均匀的共振下，签名一致并且舌头塌陷。\n\n其次，所有幸存舌头的宽度和边界曲线的封闭式公式，通过连分数和马格努斯-温克勒方法导出，根据坎比 1950 年的数值得到证实，并通过雅库博维奇-斯塔任斯基系列恢复。连分数还给出了 Floquet 指数，作为具有有理系数的调制幅度的精确幂级数，以及周期 Floquet 因子的所有傅立叶系数的有限乘积公式。舌边界完全由单性矩阵的简并异常点 (EPD) 组成，从而实现超灵敏电容传感：在 EPD 处，小扰动将重合频率按其大小的平方根分开，随着其收缩，相对于线性传感发散。导出了封闭形式的分裂公式，并且稍微移入稳定区的工作点策略保持了方案的鲁棒性，同时保留了平方根灵敏度。", "authors": [{"name": "Alexander Figotin"}], "featured_authors": [{"name": "Alexander Figotin"}], "author_count": 1}, {"id": "2606.03006", "category": "math-ph", "title": "Logarithmic regularity of spectral measures on infinite graphs", "abstract": "We study the regularity of spectral measures of self-adjoint operators on infinite weighted graphs in the unimodular setting. This framework encompasses operators in the group algebra of a finitely generated group, random operators whose distribution is quasi-invariant under a group action, and Benjamini--Schramm limits of operators on finite graphs. Under a natural geometric condition on the underlying graph, we prove that the expected spectral measure satisfies a logarithmic Hölder regularity estimate. The proof relies on a strengthened version of the monotone labelling method previously introduced with Sen and Virág to control the pure point part of the spectal measure. Applications include operators in group algebras of indicable groups, Anderson-type models with arbitrary compactly supported potentials on Cayley graphs, anisotropic percolation operators, and operators on quasi-transitive graphs. In particular, our results extend the classical Craig--Simon theorem beyond the Euclidean lattice.", "url": "https://arxiv.org/abs/2606.03006", "type": "理论", "summary": "我们研究了单模设置下无限加权图上自伴算子谱测度的规律性。该框架包含有限生成群的群代数中的算子、在群作用下分布准不变的随机算子以及有限图上算子的 Benjamini-Schramm 极限。在基础图的自然几何条件下，我们证明预期的谱测量满足对数霍尔德正则性估计。该证明依赖于 Sen 和 Virág 先前引入的单调标记方法的增强版本，以控制光谱测量的纯点部分。应用包括可指示群的群代数中的算子、凯莱图上具有任意紧支持势的安德森型模型、各向异性渗流算子以及准传递图上的算子。特别是，我们的结果将经典克雷格-西蒙定理扩展到欧几里得格之外。", "authors": [{"name": "Charles Bordenave"}], "featured_authors": [{"name": "Charles Bordenave"}], "author_count": 1}, {"id": "2606.03098", "category": "math-ph", "title": "A Variational Shape Optimisation Approach to Multi-region Relaxed Magnetohydrodynamic Equilibria", "abstract": "Let $\\Lambda \\subset\\mathbb{R}^3$ be a region admitting a partition into $n$ compact, connected subregions $\\Lambda_1,\\dots,\\Lambda_n$, each with smooth boundary. Consider a vector field $B$ on $\\Lambda$ where $B|_{\\Lambda_i}$ is smooth, divergence free, and tangent to $\\partial \\Lambda_i$ for all $i$. We show that the multi-region relaxed magnetohydrodynamics (MRxMHD) equilibrium equations are necessary and sufficient conditions for $ B $ and a metric to yield a stationary point of the magnetic energy under appropriate constraints. We constrain the pressure, relative helicity, and magnetic flux of $B$ through all smooth surfaces in $\\Lambda_i$ whose boundary lies on $\\partial \\Lambda_i$. We identify a previously overlooked gauge condition. A definition for relative helicity is introduced, its gauge invariance is proved, and the existence of a gauge where relative helicity reduces to conventional helicity is demonstrated. In the case of a single region an additional condition is introduced that is sufficient to ensure a critical point of the magnetic energy is also a minimiser.", "url": "https://arxiv.org/abs/2606.03098", "type": "理论", "summary": "令 $\\Lambda \\subset\\mathbb{R}^3$ 为一个区域，允许划分为 $n$ 个紧凑的、相连的子区域 $\\Lambda_1,\\dots,\\Lambda_n$，每个子区域都有平滑的边界。考虑 $\\Lambda$ 上的向量场 $B$，其中 $B|_{\\Lambda_i}$ 是平滑的、无散度的，并且对于所有 $i$ 与 $\\partial \\Lambda_i$ 相切。我们证明，多区域松弛磁流体动力学 (MRxMHD) 平衡方程是 $ B $ 的充分必要条件，也是在适当约束下产生磁能驻点的度量。我们通过 $\\Lambda_i$ 中所有光滑表面（其边界位于 $\\partial \\Lambda_i$ 上）来约束 $B$ 的压力、相对螺旋度和磁通量。我们发现了一个以前被忽视的仪表状况。引入了相对螺旋度的定义，证明了其规范不变性，并证明了相对螺旋度约化为常规螺旋度的规范的存在性。在单个区域的情况下，引入足以确保磁能的临界点也是最小的附加条件。", "authors": [{"name": "K. de Lacy"}, {"name": "L. Noakes"}, {"name": "D. Pfefferlé"}], "featured_authors": [{"name": "K. de Lacy"}, {"name": "L. Noakes"}, {"name": "D. Pfefferlé"}], "author_count": 3}, {"id": "2606.03182", "category": "math-ph", "title": "Logarithmic Sobolev inequality and hypercontractivity for the Navier-Stokes Fokker-Planck operator", "abstract": "The stochastic incompressible Navier-Stokes equations on $\\TT^3$, completed by the fluctuation-dissipation noise, have a Fokker-Planck generator that decomposes into a self-adjoint Ornstein-Uhlenbeck (dissipative) part and an antisymmetric (convective) part. We prove two results about this generator. First, the logarithmic Sobolev inequality holds with the same optimal constant as the pure Ornstein-Uhlenbeck operator, $c_\\mathrm{LSI} = \\nu\\lambda_1$ (where $\\nu$ is the viscosity and $\\lambda_1$ is the smallest nonzero eigenvalue of the Laplacian on $\\TT^3$), independent of the number of retained Fourier modes. Second, the full semigroup is hypercontractive with the same rate as the Ornstein-Uhlenbeck semigroup. Both results follow from a single structural property: the convective generator is antisymmetric in $L^2(P_\\mathrm{eq})$ (where $P_\\mathrm{eq}$ is the Gibbs measure), and therefore contributes nothing to the Dirichlet form or the $L^q$ norm evolution. The antisymmetry is a consequence of two properties of the incompressible Navier-Stokes nonlinearity: energy conservation and phase-space volume preservation (the Liouville property). These are the same properties that underpin the fluctuation-dissipation theorem for the nonlinear Navier-Stokes equations.", "url": "https://arxiv.org/abs/2606.03182", "type": "理论", "summary": "$\\TT^3$ 上的随机不可压缩纳维-斯托克斯方程由涨落耗散噪声完成，具有福克-普朗克发生器，可分解为自伴 Ornstein-Uhlenbeck（耗散）部分和反对称（对流）部分。我们证明了关于该生成器的两个结果。首先，对数 Sobolev 不等式与纯 Ornstein-Uhlenbeck 算子具有相同的最佳常数，$c_\\mathrm{LSI} = \\nu\\lambda_1$ （其中 $\\nu$ 是粘度，$\\lambda_1$ 是 $\\TT^3$ 上拉普拉斯算子的最小非零特征值），与保留的傅里叶模式的数量无关。其次，完整半群的超收缩率与 Ornstein-Uhlenbeck 半群相同。这两个结果都遵循单一结构属性：对流发生器在 $L^2(P_\\mathrm{eq})$ 中是反对称的（其中 $P_\\mathrm{eq}$ 是吉布斯测度），因此对狄利克雷形式或 $L^q$ 范数演化没有任何贡献。反对称性是不可压缩纳维-斯托克斯非线性的两个性质的结果：能量守恒和相空间体积守恒（刘维尔性质）。\n\n这些属性与支撑非线性纳维-斯托克斯方程的涨落耗散定理相同。", "authors": [{"name": "Zhi-Wei Wang"}, {"name": "Samuel L. Braunstein"}], "featured_authors": [{"name": "Zhi-Wei Wang"}, {"name": "Samuel L. Braunstein"}], "author_count": 2}, {"id": "2606.03356", "category": "math-ph", "title": "The Huang--Yang formula for a two-dimensional Fermi gas: upper bound", "abstract": "We compute an upper bound on the ground state energy of a dilute two-dimensional Fermi gas with repulsive short-range interactions. Our bound can be viewed as the two-dimensional analogue of a formula derived by Huang and Yang in the three-dimensional case. It captures the first three terms in an asymptotic expansion for small $\\varrho a^2$, where $\\varrho$ denotes the density and $a$ the scattering length of the interaction potential.", "url": "https://arxiv.org/abs/2606.03356", "type": "理论", "summary": "我们计算具有排斥性短程相互作用的稀二维费米气体的基态能量上限。我们的界限可以被视为黄和杨在三维情况下推导出的公式的二维模拟。它捕获了小 $\\varrho a^2$ 的渐近展开式中的前三项，其中 $\\varrho$ 表示相互作用势的密度，$a$ 表示相互作用势的散射长度。", "authors": [{"name": "Christian Hainzl"}, {"name": "Fabian Saxler"}, {"name": "Robert Seiringer"}], "featured_authors": [{"name": "Christian Hainzl"}, {"name": "Fabian Saxler"}, {"name": "Robert Seiringer"}], "author_count": 3}, {"id": "2606.03368", "category": "math-ph", "title": "Classical Symmetry TFTs for Continuous Symmetries via Higher Symplectic Geometry", "abstract": "We propose a shifted-symplectic formulation of a classical continuous analogue of the symmetry TFT paradigm. Let $G$ be an algebraic or Lie group acting by topological defects on an $n$-dimensional classical topological sigma model with target an $(n-1)$-shifted symplectic derived stack $(X,\\omega)$ via the AKSZ construction. We argue that the corresponding $(n+1)$-dimensional bulk theory should be the AKSZ theory with target the shifted cotangent stack $T^*[n] (\\mathrm B G)$, equivalently the $(n+1)$-dimensional BF theory for $G$. We characterize the Dirichlet and Neumann boundary conditions, and more general topological boundaries, in terms of shifted Lagrangians in $T^*[n] (\\mathrm B G)$. We realize the gauging of the $G$-symmetry in the original theory as inserting a topological domain wall between the corresponding topological boundaries in the BF bulk, and introduce the notion of Hamiltonian reduction, syplectic reduction, and Lagrangian reduction in the shifted symplectic setting. We also discuss prequantum refinements of continuous SymTFTs. In this refinement, higher gerbes on $\\mathrm B G$ encode classical analogues of 't Hooft anomaly data by decorating the shifted cotangent bulk and its Lagrangian boundary conditions. Finally, in dimension three we compare the infinitesimal BF model $\\mathrm B(\\mathfrak g\\ltimes\\mathfrak g^\\vee)$ with the factorizable double $\\mathrm B(\\mathfrak g\\oplus \\mathfrak g)$. The resulting topological boundaries are described by Lagrangian Lie subalgebras, and the factorizable case relates the SymTFT dictionary to $r$-matrices and Belavin--Drinfeld data.", "url": "https://arxiv.org/abs/2606.03368", "type": "理论", "summary": "我们提出了对称 TFT 范式的经典连续模拟的移辛公式。令 $G$ 为代数群或李群，通过 $n$ 维经典拓扑 sigma 模型上的拓扑缺陷发挥作用，目标是通过 AKSZ 构造 $(n-1)$ 移动的辛派生堆栈 $(X,\\omega)$。我们认为相应的$(n+1)$维体理论应该是AKSZ理论，其目标是平移余切堆栈$T^*[n] (\\mathrm B G)$，相当于$G$的$(n+1)$维BF理论。我们根据 $T^*[n] (\\mathrm B G)$ 中的平移拉格朗日量来描述狄利克雷和诺依曼边界条件以及更一般的拓扑边界。我们实现了原始理论中 $G$ 对称性的计量，即在 BF 体中相应的拓扑边界之间插入拓扑畴壁，并在位移辛设置中引入了哈密顿约简、辛约简和拉格朗日约简的概念。我们还讨论了连续 SymTFT 的量子前改进。\n\n在这种改进中，$\\mathrm B G$ 上的更高的非洲菊通过装饰移位余切体及其拉格朗日边界条件来编码 't Hooft 异常数据的经典类似物。最后，在第三维中，我们将无穷小 BF 模型 $\\mathrm B(\\mathfrak g\\ltimes\\mathfrak g^\\vee)$ 与可因式分解的双精度 $\\mathrm B(\\mathfrak g\\oplus \\mathfrak g)$ 进行比较。由此产生的拓扑边界由拉格朗日李子代数描述，可因式分解的情况将 SymTFT 字典与 $r$ 矩阵和 Belavin-Drinfeld 数据相关联。", "authors": [{"name": "Hao Xu"}], "featured_authors": [{"name": "Hao Xu"}], "author_count": 1}, {"id": "2606.03447", "category": "math-ph", "title": "Interpolating non-Hermitian universality classes A and AI$^\\dagger$: eigenvalue density and transition regime", "abstract": "We employ the recently developed Kac-Rice formalism for non-Hermitian random matrices to derive the joint distribution of an eigenvalue and its associated normalised right eigenvector in a Gaussian ensemble that interpolates between complex Ginibre (Class A) and complex symmetric matrices (Class AI$^\\dagger$). This distribution is valid at finite matrix size, $N$, for any value of the interpolation parameter $\\sigma \\in [0,1]$, with $0$ and $1$ corresponding to classes A and AI$^\\dagger$ respectively. The marginal distribution for the density of the eigenvalues is derived at finite $N$ and then considered asymptotically as $N \\to \\infty$. When considering bulk eigenvalues, we recover the standard circular law for all $\\sigma$. Furthermore, for edge eigenvalues we find that for fixed $\\sigma$, the eigenvalues follow the edge density associated with matrices in Class A. However, a transitional regime is discovered for the interpolation parameter being scaled as $\\sigma = 1 - \\kappa N^{-1/2}$, where new edge behaviour is observed for the density of eigenvalues - smoothly interpolating two previously known results. This transitional regime and the associated density of eigenvalues is conjectured to be universal for non-Gaussian matrices and we provide numerical evidence in support of this.", "url": "https://arxiv.org/abs/2606.03447", "type": "理论", "summary": "我们采用最近开发的非埃尔米特随机矩阵的 Kac-Rice 形式来导出高斯系综中特征值及其相关归一化右特征向量的联合分布，该系综在复 Ginibre（A 类）和复对称矩阵（AI$^\\dagger$ 类）之间进行插值。对于插值参数 $\\sigma \\in [0,1]$ 的任何值，此分布在有限矩阵大小 $N$ 下有效，其中 $0$ 和 $1$ 分别对应于 A 类和 AI$^\\dagger$ 类。特征值密度的边际分布在有限 $N$ 处导出，然后渐进地视为 $N \\to \\infty$。当考虑批量特征值时，我们恢复所有 $\\sigma$ 的标准循环定律。此外，对于边缘特征值，我们发现对于固定的 $\\sigma$，特征值遵循与 A 类矩阵相关的边缘密度。然而，发现了插值参数缩放为 $\\sigma = 1 - \\kappa N^{-1/2}$ 的过渡机制，其中观察到特征值密度的新边缘行为 - 平滑地插值两个先前已知的结果。\n\n据推测，这种过渡状态和相关的特征值密度对于非高斯矩阵是通用的，并且我们提供了数值证据来支持这一点。", "authors": [{"name": "Mark J. Crumpton"}, {"name": "Francesco Mezzadri"}], "featured_authors": [{"name": "Mark J. Crumpton"}, {"name": "Francesco Mezzadri"}], "author_count": 2}, {"id": "2606.03653", "category": "math-ph", "title": "Asymptotics of complex $b$-$6j$ symbols", "abstract": "We study the $b$-$6j$ symbols -- an analytic extension of the $6j$-symbols for the principal series of the modular double of $\\mathrm U_q\\mathfrak{sl}(2;\\mathbb R)$ -- with complex index $b,$ refereed to as the \\emph{complex $b$-$6j$ symbols}. Then we relate their asymptotics, when the six parameters scale according to the dihedral angles of a hyperideal hyperbolic tetrahedron, to the volume and the determinant of the Gram matrix of the tetrahedron. In the case $\\arg b=\\pm \\frac{\\pi}{4},$ we believe that this work is closely related to the complex Liouville string\\,\\cite{CEMR}.", "url": "https://arxiv.org/abs/2606.03653", "type": "理论", "summary": "我们研究$b$-$6j$符号——$6j$符号的解析扩展，用于$\\mathrm U_q\\mathfrak{sl}(2;\\mathbb R)$的模双主级数——复数索引$b,​​$被称为\\emph{复数$b$-$6j$符号}。然后，当六个参数根据超理想双曲四面体的二面角缩放时，我们将它们的渐近线与四面体的体积和格拉姆矩阵的行列式联系起来。在$\\arg b=\\pm \\frac{\\pi}{4},$的情况下，我们相信这项工作与复杂的Liouville弦\\,\\cite{CEMR}密切相关。", "authors": [{"name": "Yunpeng Meng"}, {"name": "Tian Yang"}], "featured_authors": [{"name": "Yunpeng Meng"}, {"name": "Tian Yang"}], "author_count": 2}, {"id": "2606.03856", "category": "math-ph", "title": "Variational Loop Vertex Expansion for Cumulants", "abstract": "Extending recent advances on constructive quantum field theory, we study cumulants of one of the simplest matrix models in the regime of bounded rank. We analyze both ordinary cumulants and scalar cumulants, which arise from the Weingarten calculus and are essential to the topological expansion in quantum field theory. Our results are valid for arbitrarily large positive coupling and provide new instances where techniques such as the variational approach are applied to cu- mulants.", "url": "https://arxiv.org/abs/2606.03856", "type": "理论", "summary": "扩展构造量子场论的最新进展，我们研究有界秩制度中最简单的矩阵模型之一的累积量。我们分析了普通累积量和标量累积量，它们源自温加滕微积分，对于量子场论中的拓扑展开至关重要。我们的结果对于任意大的正耦合都是有效的，并提供了将变分方法等技术应用于累积量的新实例。", "authors": [{"name": "Vincent Rivasseau"}], "featured_authors": [{"name": "Vincent Rivasseau"}], "author_count": 1}, {"id": "2606.02637", "category": "quant-ph", "title": "The Inverted Dirac-Moshinsky Oscillator in $(1+1)$ Dimensions", "abstract": "We derive and analyze the exact solutions of the inverted Dirac-Moshinsky oscillator (IDMO) in $(1+1)$ dimensions, obtained from the standard model via the substitution $p \\to p + im\\omega\\beta x$. The upper spinor component satisfies a Weber equation with complex spectral parameter $\\lambda = (E^2-m^2)/(2m\\omega)+i/2$, whose solutions are parabolic cylinder functions $D_\\nu(\\xi)$ with complex order $\\nu = \\lambda - 1/2$. The physical spectrum is purely continuous ($|E|>m$), with no discrete bound states. Three normalization schemes are developed, and the discrete Gamow resonances at $E_n^\\pm = \\pm\\sqrt{m^2+(2n+1)m\\omega-im\\omega}$ are identified as poles of the resolvent. The negative-energy sector describes antiparticle anti-resonances whose positive imaginary part signals vacuum instability and spontaneous pair production, analogous to the Schwinger effect. The algebraic structure is governed by the principal series of $SU(1,1)$, and the Hamiltonian is $\\mathcal{PT}$-symmetric with unbroken symmetry for $|E|>m$.", "url": "https://arxiv.org/abs/2606.02637", "type": "理论", "summary": "我们推导并分析了 $(1+1)$ 维度上的逆狄拉克-莫辛斯基振子 (IDMO) 的精确解，这些解是通过替换 $p \\to p + im\\omega\\beta x$ 从标准模型获得的。上旋量分量满足具有复谱参数 $\\lambda = (E^2-m^2)/(2m\\omega)+i/2$ 的韦伯方程，其解是具有复阶 $\\nu = \\lambda - 1/2$ 的抛物柱面函数 $D_\\nu(\\xi)$。物理光谱是纯粹连续的 ($|E|>m$)，没有离散的束缚态。开发了三种归一化方案，并将 $E_n^\\pm = \\pm\\sqrt{m^2+(2n+1)m\\omega-im\\omega}$ 处的离散伽莫夫共振确定为解析的极点。负能量部分描述了反粒子反共振，其正虚部表示真空不稳定和自发对产生，类似于施温格效应。代数结构由 $SU(1,1)$ 主级数控制，哈密顿量是 $\\mathcal{PT}$ 对称的，并且 $|E|>m$ 具有完整的对称性。", "authors": [{"name": "Kevin Hernández"}, {"name": "Marcos Orellana-Iraheta"}, {"name": "William Larín-Escobar"}], "featured_authors": [{"name": "Kevin Hernández"}, {"name": "Marcos Orellana-Iraheta"}, {"name": "William Larín-Escobar"}], "author_count": 3}, {"id": "2606.02656", "category": "quant-ph", "title": "Probing information theoretic measures of nonlinear ultracold quantum gases using phase-space distributions", "abstract": "We use phase space distributions, specifically the Wigner and Husimi quasi probability distributions, to study harmonically trapped Bose--Einstein condensate described by the Gross Pitaevskii equation. From the mean field ground state wavefunction we construct both distributions and their position and momentum space marginals and we use these to compute a comprehensive set of information theoretic measures: Shannon, Wehrl, and Rényi entropies; Fisher information; cumulative and cross cumulative residual entropies; mutual information; and Kullback--Leibler, Jeffreys, Cauchy Schwarz, and Rényi divergences. Studying these quantities as a function of the $s$-wave scattering length for a representative Rb-85 condensate, we find that stronger repulsive interactions drive increased phase space delocalization, seen by a monotonic growth of Shannon and Wehrl entropies, while the Fisher information shows the complementary trend -- increasing in position space and decreasing in momentum space in a manner consistent with the global Fisher uncertainty bound. Rényi entropies and divergence measures further reveal a systematic suppression of non classical interference and a shift toward more classical phase space structure in moving from the Wigner to the Husimi representation, with Wigner and Husimi based mutual informations converging at larger interaction strength. We note that, because the Gross Pitaevskii framework treats the many body state as a mean field product, the mutual information computed here quantifies statistical dependence between the conjugate phase space variables of the effective one body distribution rather than genuine particle particle entanglement.", "url": "https://arxiv.org/abs/2606.02656", "type": "理论+数值", "summary": "我们使用相空间分布，特别是维格纳和胡西米准概率分布，来研究由 Gross Pitaevskii 方程描述的调和俘获玻色-爱因斯坦凝聚态。根据平均场基态波函数，我们构建了分布及其位置和动量空间边际，并使用它们来计算一套全面的信息理论度量：Shannon、Wehrl 和 Rényi 熵；费舍尔信息；累积和交叉累积残余熵；相互信息；和库尔贝克——莱布勒、杰弗里斯、柯西施瓦茨和雷尼分歧。研究这些量作为代表性 Rb-85 凝聚体 $s$ 波散射长度的函数，我们发现更强的排斥相互作用会导致相空间离域增加，这可以从香农和韦尔熵的单调增长看出，而费舍尔信息显示了互补的趋势——位置空间增加，动量空间减少，其方式与全局费舍尔不确定性界限一致。\n\nRényi 熵和散度度量进一步揭示了对非经典干扰的系统抑制，以及从维格纳表示到胡西米表示向更经典的相空间结构的转变，其中基于维格纳和胡西米的互信息在更大的相互作用强度下收敛。我们注意到，由于 Gross Pitaevskii 框架将多体状态视为平均场积，因此此处计算的互信息量化了有效单体分布的共轭相空间变量之间的统计依赖性，而不是真正的粒子粒子纠缠。", "authors": [{"name": "Mariyah Ughradar"}, {"name": "Ramkumar Radhakrishnan"}, {"name": "Siddharth Kumar Tiwari"}, {"name": "Vikash Kumar Ojha"}], "featured_authors": [{"name": "Mariyah Ughradar"}, {"name": "Ramkumar Radhakrishnan"}, {"name": "Siddharth Kumar Tiwari"}, {"name": "Vikash Kumar Ojha"}], "author_count": 4}, {"id": "2606.02697", "category": "quant-ph", "title": "Machine Learning-based Quantum Error Mitigation for Variational Algorithms", "abstract": "Machine Learning-based quantum error mitigation (ML-QEM) has emerged as a promising approach for improving the performance of noisy quantum algorithms. However, existing ML-QEM methods often have restricted applicability to variational circuits and rely on inaccessible noiseless training data. In this work, we propose a practical ML-QEM protocol tailored to variational quantum algorithms, which generates training data by simulating (near-)Clifford circuits. This data is used for model selection and training, producing a mitigation model that can correct variational circuits with arbitrary parameters and transfer across different target Hamiltonians of similar structure. We benchmark the proposed method on the Variational Quantum Eigensolver (VQE) task for the Sherrington-Kirkpatrick Hamiltonian of up to $n=12$ qubits under various noise models, analyzing its effect on trainability and comparing its performance against standard Zero-Noise Extrapolation (ZNE). The results demonstrate consistent several-fold error suppression across all tested settings and superior performance over ZNE in the high-noise regime, providing evidence for the applicability of the proposed protocol to present-day NISQ processors.", "url": "https://arxiv.org/abs/2606.02697", "type": "理论+数值", "summary": "基于机器学习的量子错误缓解（ML-QEM）已成为提高噪声量子算法性能的一种有前途的方法。然而，现有的 ML-QEM 方法通常对变分电路的适用性受到限制，并且依赖于无法访问的无噪声训练数据。在这项工作中，我们提出了一种针对变分量子算法量身定制的实用 ML-QEM 协议，该协议通过模拟（近）Clifford 电路来生成训练数据。该数据用于模型选择和训练，生成一个缓解模型，该模型可以纠正具有任意参数的变分电路，并在具有相似结构的不同目标哈密顿量之间进行传输。我们在各种噪声模型下针对高达 $n=12$ 量子位的谢林顿-柯克帕特里克哈密顿量的变分量子本征求解器 (VQE) 任务对所提出的方法进行了基准测试，分析其对可训练性的影响，并将其性能与标准零噪声外推 (ZNE) 进行比较。\n\n结果表明，在所有测试设置中均具有一致的数倍错误抑制，并且在高噪声情况下比 ZNE 具有优越的性能，为所提出的协议对当今 NISQ 处理器的适用性提供了证据。", "authors": [{"name": "Nikita Korolev"}, {"name": "Kirill Lakhmanskiy"}, {"name": "Daniil Rabinovich"}], "featured_authors": [{"name": "Nikita Korolev"}, {"name": "Kirill Lakhmanskiy"}, {"name": "Daniil Rabinovich"}], "author_count": 3}, {"id": "2606.02718", "category": "quant-ph", "title": "Resonant delay in a stationary quantum clock: Lifting the threshold mask", "abstract": "Quantum transit times have a long history of inequivalent definitions, including phase times, dwell times, and quantum-clock constructions. In this context we revisit the Salecker--Wigner--Peres stationary quantum clock as a phase-sensitive scattering observable, with clock time defined by the energy derivative of the transmission phase shift across the interaction region. For real compactly supported one-dimensional potentials, we show that the raw stationary Peres clock generically contains a universal \\(1/\\sqrt{E}\\) continuum-edge term whose coefficient is fixed by low-energy scattering data. For the attractive square well, this threshold singularity is inherited from the vanishing exterior momentum and the associated scattering matching, rather than from resonant delay itself. We derive the exact stationary clock time for the square well and introduce a new threshold-subtracted clock observable. Away from exceptional zero-energy tuning, the subtraction removes the universal low-energy term and isolates the resonant contribution. Comparison with the dwell time and the transmission Wigner phase delay shows that the threshold-subtracted clock acquires the expected local Lorentzian form near isolated transmission resonances. Near the continuum edge, if \\(\\varepsilon\\) denotes the detuning from threshold, the resonant peak grows only as \\(\\varepsilon^{-1/2}\\), whereas the unsubtracted threshold background grows as \\(\\varepsilon^{-3/2}\\). A symmetric barrier--well--barrier cavity and a numerical asymmetric two-step attractive well provide complementary controls. The result is a new threshold-subtracted stationary-clock candidate that separates universal threshold kinematics from pole-sensitive resonant delay.", "url": "https://arxiv.org/abs/2606.02718", "type": "数值", "summary": "量子渡越时间有着不等价定义的悠久历史，包括相位时间、停留时间和量子时钟结构。在这种情况下，我们重新审视萨莱克-维格纳-佩雷斯固定量子时钟作为相敏散射可观测量，时钟时间由相互作用区域传输相移的能量导数定义。对于实数紧支持的一维势，我们证明原始静止佩雷斯时钟通常包含通用的 \\(1/\\sqrt{E}\\) 连续体边缘项，其系数由低能量散射数据固定。对于有吸引力的方阱，该阈值奇点是从消失的外部动量和相关的散射匹配继承的，而不是从谐振延迟本身继承的。我们推导了方井的精确稳态时钟时间，并引入了一个新的阈值减去时钟可观测值。远离特殊的零能量调谐，减法消除了通用的低能量项并隔离了谐振贡献。\n\n与驻留时间和传输维格纳相位延迟的比较表明，阈值扣除时钟在隔离传输谐振附近获得了预期的局部洛伦兹形式。在连续体边缘附近，如果 \\(\\varepsilon\\) 表示从阈值失谐，则谐振峰仅以 \\(\\varepsilon^{-1/2}\\) 的形式增长，而未减去的阈值背景则以 \\(\\varepsilon^{-3/2}\\) 的形式增长。对称势垒-势垒-势垒腔和数值不对称两步吸引势阱提供互补控制。结果是一种新的阈值扣除固定时钟候选方案，它将通用阈值运动学与极敏感谐振延迟分开。", "authors": [{"name": "Paul C. W. Davies"}, {"name": "Damien A. Easson"}], "featured_authors": [{"name": "Paul C. W. Davies"}, {"name": "Damien A. Easson"}], "author_count": 2}, {"id": "2606.02743", "category": "quant-ph", "title": "Geometric Decoherence Time in Lindbladian Dynamics", "abstract": "The onset of decoherence in open many-body systems lacks a dynamical timescale grounded in the loss of bipartite entanglement. Here, we introduce the $geometric$ $decoherence$ $time$, defined as the earliest moment the monotone relation between logarithmic negativity and Rényi-$\\tfrac{1}{2}$ entropy -- exactly equal across any bipartition for pure states -- breaks down under open-system evolution, signaling entropy growth without accompanying entanglement growth. We establish this criterion in both single-particle Gaussian dynamics and many-body Lindbladian evolution. We show that quantum mutual information provides a complementary long-time diagnostic: its asymptotic vanishing is equivalent to factorization of the steady state across the bipartition, a condition strictly stronger than separability, and whenever a product steady state is approached exponentially in trace norm, negativity and mutual information share the same decay rate. In the presence of a strong symmetry, this tracking can fail -- residual classical correlations can survive after entanglement has vanished. In the Kitaev chain with balanced gain and loss, we derive a closed-form solution and show that the topological phase sustains longer coherence times than the trivial phase at identical dissipation, with a local minimum at the chiral-symmetric point. In the interacting XXZ chain, exact many-body evolution shows that local $Z$-dephasing preserves residual classical correlations, whereas gain and loss restore the mutual-information tracking of negativity. Our results establish the geometric decoherence time as a dynamical scale tracking the onset of decoherence.", "url": "https://arxiv.org/abs/2606.02743", "type": "理论", "summary": "开放多体系统中退相干的开始缺乏基于二分纠缠丧失的动态时间尺度。在这里，我们引入 $geometric$ $decoherence$ $time$，定义为对数负性和 Rényi-$\\tfrac{1}{2}$ 熵之间的单调关系（在纯态的任何二分上完全相等）在开放系统演化下崩溃的最早时刻，表明熵增长而不伴随纠缠增长。我们在单粒子高斯动力学和多体 Lindbladian 演化中建立了这个标准。我们证明量子互信息提供了一种补充性的长期诊断：它的渐近消失相当于对二分稳态的因式分解，这是一个严格强于可分离性的条件，并且每当产品稳态在迹范数中以指数方式接近时，负性和互信息共享相同的衰减率。在存在强对称性的情况下，这种跟踪可能会失败——在纠缠消失后，残留的经典相关性可以继续存在。\n\n在具有平衡增益和损耗的基塔耶夫链中，我们得出了一个封闭式解，并表明拓扑相位在相同耗散情况下比平凡相位维持更长的相干时间，并且在手性对称点处具有局部最小值。在相互作用的 XXZ 链中，精确的多体进化表明，局部 $Z$ 相移保留了残余的经典相关性，而增益和损失则恢复了负性的互信息跟踪。我们的结果将几何退相干时间确立为跟踪退相干开始的动态尺度。", "authors": [{"name": "Rishabh Jha"}, {"name": "Stephan Haas"}, {"name": "Abhinav Prem"}], "featured_authors": [{"name": "Rishabh Jha"}, {"name": "Stephan Haas"}, {"name": "Abhinav Prem"}], "author_count": 3}, {"id": "2606.02817", "category": "quant-ph", "title": "Nielsen complexity with multiple cost factors", "abstract": "We investigate Nielsen's geometric approach to quantum complexity in the presence of multiple cost factors, extending the standard framework where a single penalty distinguishes easy from hard directions of the group manifold. By introducing a hierarchy of penalties associated with different degrees of non-locality, we develop a generalized right-invariant complexity geometry and analyze its implications for geodesic evolution. We derive the modified Euler-Arnold and Jacobi equations and study how multiple cost factors reshape the structure and scaling of conjugate points, where geodesic optimality breaks down. The formalism is illustrated in two settings: a single-qubit system with two cost factors, where we derive approximate analytic solutions for the complexity growth and its dependence on penalty hierarchies, and SYK-type models, where we analyze both free and chaotic regimes. In these many-body systems, we show that distinct non-local sectors generate multiple families of conjugate points whose occurrence depends on both the cost hierarchy and the system size. Our results highlight how refining the penalty structure provides a richer and more realistic description of quantum complexity and its dynamical behavior.", "url": "https://arxiv.org/abs/2606.02817", "type": "理论", "summary": "我们研究了尼尔森在存在多个成本因素的情况下计算量子复杂性的几何方法，扩展了标准框架，其中单个惩罚区分了群流形的简单方向和困难方向。通过引入与不同程度的非局部性相关的惩罚层次，我们开发了一种广义的右不变复杂性几何，并分析了其对测地线演化的影响。我们推导了修改后的欧拉-阿诺德和雅可比方程，并研究了多个成本因素如何重塑测地线最优性失效的共轭点的结构和尺度。形式主义通过两种设置进行说明：具有两个成本因素的单量子位系统，我们在其中推导出复杂性增长及其对惩罚层次的依赖性的近似解析解；以及 SYK 型模型，在其中我们分析自由和混沌状态。在这些多体系统中，我们表明不同的非局部部门会生成多个共轭点族，其出现取决于成本层次结构和系统规模。\n\n我们的结果强调了改进惩罚结构如何为量子复杂性及其动态行为提供更丰富、更现实的描述。", "authors": [{"name": "Marcos Rios Ribeiro"}, {"name": "Diego Trancanelli"}], "featured_authors": [{"name": "Marcos Rios Ribeiro"}, {"name": "Diego Trancanelli"}], "author_count": 2}, {"id": "2606.02990", "category": "quant-ph", "title": "Forward-Assisted Purification: A Spatiotemporal Framework Beyond Conventional Limits", "abstract": "Noise remains the primary obstacle to realizing quantum advantage, continuously degrading the resources that enable quantum technologies. Purification aims to reverse this degradation by extracting high-fidelity resources from noisy ensembles, yet its conventional formulation is intrinsically static, acting only after noise has taken effect. Here we instead recast purification as a dynamical task, introducing a spatiotemporal framework that distributes interventions across the noise process. This formulation reveals operational capabilities inaccessible to existing approaches and gives rise to forward-assisted purifications that extend achievable performance. In certain regimes, a single-copy protocol already exceeds what can be achieved with up to 50 copies under conventional purification, demonstrating a significant overhead in required resources. Beyond these gains, our framework circumvents no-purification theorems within conventional protocols, including for Bell-state ensembles, thereby enabling purification previously considered impossible and pointing toward an efficient route to mitigating noise in quantum systems.", "url": "https://arxiv.org/abs/2606.02990", "type": "理论", "summary": "噪声仍然是实现量子优势的主要障碍，不断降低支持量子技术的资源。纯化的目的是通过从噪声集合中提取高保真资源来扭转这种退化，但其传统的公式本质上是静态的，仅在噪声生效后才起作用。在这里，我们将净化重新定义为一项动态任务，引入一个时空框架，在整个噪声过程中分配干预措施。这种配方揭示了现有方法无法达到的操作能力，并产生了可扩展可实现性能的前向辅助纯化。在某些方案中，单拷贝方案已经超过了传统纯化下最多 50 个拷贝所能达到的效果，这表明所需资源的开销很大。除了这些收益之外，我们的框架还规避了传统协议中的无净化定理，包括贝尔态系综，从而实现了以前认为不可能的净化，并指出了减轻量子系统中噪声的有效途径。", "authors": [{"name": "Fei Meng"}, {"name": "Jinge Bao"}, {"name": "Yunlong Xiao"}], "featured_authors": [{"name": "Fei Meng"}, {"name": "Jinge Bao"}, {"name": "Yunlong Xiao"}], "author_count": 3}, {"id": "2606.03109", "category": "quant-ph", "title": "Game, Set, Quantum: Parameterized Quantum Circuit for Correlated Equilibrium in Bayesian Games", "abstract": "Strategic decision-making among many agents under incomplete information is central to economics, security, and multi-agent artificial intelligence (AI). Computing equilibria in such settings is challenging because the joint type-action space grows exponentially with the number of players. In binary-type, binary-action Bayesian games, an explicit representation over type-action profiles requires O(22n) entries, making direct linear-programming (LP) formulations memory intensive at moderate player counts. We propose a hybrid quantum-classical framework for approximating Bayes correlated equilibrium using a parameterized quantum circuit (PQC). The PQC represents the conditional strategy distribution with O(nL) trainable parameters, where n is the number of players and L is the circuit depth; for the largest setting studied here, n = 10 and L = 2, this corresponds to 60 trainable angles. The circuit is trained by gradient-based regret minimization with a negative entropy regularizer and a curriculum schedule over player counts. On a poker-style Bayesian game with two to ten players, the proposed solver achieves low
