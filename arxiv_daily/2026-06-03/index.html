er mean clipped regret than MCCFR across all tested player counts and lower regret than DCFR up to eight players, while DCFR performs best at ten players. These results show that compact PQC parameterizations can provide a viable variational representation for approximate equilibrium computation, while highlighting the roles of ansatz expressivity, optimization strategy, and classical simulation cost.", "url": "https://arxiv.org/abs/2606.03109", "type": "数值", "summary": "不完全信息下许多主体之间的战略决策是经济、安全和多主体人工智能 (AI) 的核心。在这种设置中计算平衡具有挑战性，因为联合类型动作空间随着玩家数量呈指数增长。在二元类型、二元动作贝叶斯游戏中，对类型动作配置文件的显式表示需要 O(22n) 个条目，这使得直接线性编程 (LP) 公式在中等玩家数量下需要大量内存。我们提出了一种混合量子经典框架，用于使用参数化量子电路（PQC）来近似贝叶斯相关平衡。 PQC 表示具有 O(nL) 可训练参数的条件策略分布，其中 n 是玩家数量，L 是电路深度；对于此处研究的最大设置，n = 10 且 L = 2，这对应于 60 个可训练角度。该电路通过基于梯度的遗憾最小化、负熵正则化器和针对玩家数量的课程表进行训练。\n\n在有 2 到 10 名玩家的扑克式贝叶斯游戏中，所提出的求解器在所有测试的玩家数量上实现了比 MCCFR 更低的平均修剪遗憾，并且在最多 8 名玩家的情况下比 DCFR 实现了更低的遗憾，而 DCFR 在 10 名玩家中表现最佳。这些结果表明，紧凑的 PQC 参数化可以为近似平衡计算提供可行的变分表示，同时强调 ansatz 表达性、优化策略和经典模拟成本的作用。", "authors": [{"name": "Param Pathak"}, {"name": "Vidhi Oad"}, {"name": "Nouhaila Innan"}, {"name": "Adarsh Ganesan"}, {"name": "Muhammad Shafique"}], "featured_authors": [{"name": "Param Pathak"}, {"name": "Vidhi Oad"}, {"name": "Nouhaila Innan"}, {"name": "Adarsh Ganesan"}, {"name": "Muhammad Shafique"}], "author_count": 5}, {"id": "2606.03181", "category": "quant-ph", "title": "Generalised simultaneous transmission of arbitrary quantum states and classical information", "abstract": "We present a protocol which allows for arbitrary optical quantum states to simultaneously carry and transmit classical data, without sacrificing the integrity of either the quantum or classical information. Our scheme encodes classical information via displacements in the phase space prior to transmission and retrieves each classical symbol via a Gaussian continuous-variable teleportation. The original quantum state is then restored by guessing the the original displacement and performing the appropriate inverse operation. In the limit of sufficiently high classical signal and high squeezing, we show that our scheme is capable of perfectly reconstructing both the input classical signal and the input quantum state without loss of coherence. An example is given in terms of the transmission of a dual-rail Bell state.", "url": "https://arxiv.org/abs/2606.03181", "type": "理论", "summary": "我们提出了一种协议，允许任意光量子态同时携带和传输经典数据，而不牺牲量子或经典信息的完整性。我们的方案在传输之前通过相空间中的位移对经典信息进行编码，并通过高斯连续变量隐形传态检索每个经典符号。然后通过猜测原始位移并执行适当的逆运算来恢复原始量子态。在足够高的经典信号和高压缩的限制下，我们证明我们的方案能够完美地重建输入经典信号和输入量子态而不损失相干性。给出了双轨贝尔状态传输的例子。", "authors": [{"name": "Timothy C. Ralph"}, {"name": "Nicholas Zaunders"}], "featured_authors": [{"name": "Timothy C. Ralph"}, {"name": "Nicholas Zaunders"}], "author_count": 2}, {"id": "2606.03196", "category": "quant-ph", "title": "Towards a Hybrid Quantum Enhanced Solution for Densest k-Subgraph Problem", "abstract": "We study the application of Gaussian Boson Sampling (GBS) to the densest k-subgraph problem (DkSP). GBS with hard post-selection suffers from poor sampling efficiency due to strict cardinality constraints. To address this limitation, we introduce effective classical post-processing strategies that transform, otherwise discarded, near-k samples into feasible solutions. A comprehensive set of simulations is carried out, demonstrating that these approaches achieve near-optimal solution quality while improving sampling efficiency by approximately 4X compared to post-selection on community-structured graphs, and also post-selection often fails to reach the optimal solution on sparse random graphs even with large number of samples. Furthermore, the proposed methods perform on par with, and in some cases outperform, established classical approaches for graphs up to moderate size. Overall, the results indicate that while GBS with post-selection alone is insufficient, its combination with lightweight classical refinement can be highly effective. This underscores the potential of hybrid quantum-classical frameworks and positions GBS as a promising sampling primitive for combinatorial graph optimization.", "url": "https://arxiv.org/abs/2606.03196", "type": "数值", "summary": "我们研究高斯玻色子采样 (GBS) 在最稠密 k 子图问题 (DkSP) 中的应用。由于严格的基数限制，采用硬后选择的 GBS 采样效率较差。为了解决这个限制，我们引入了有效的经典后处理策略，将原本被丢弃的近 k 个样本转换为可行的解决方案。进行了一系列全面的模拟，证明这些方法实现了接近最优的解质量，同时与社区结构图上的后选择相比，采样效率提高了约 4 倍，而且即使有大量样本，后选择也常常无法在稀疏随机图上达到最优解。此外，所提出的方法的性能与针对中等大小的图的已建立的经典方法相当，并且在某些情况下优于。总的来说，结果表明，虽然单独使用后选择的 GBS 还不够，但它与轻量级经典细化的结合可以非常有效。\n\n这强调了混合量子经典框架的潜力，并将 GBS 定位为组合图优化的有前途的采样原语。", "authors": [{"name": "Ravi Sangwan"}, {"name": "Prabhat Anand"}, {"name": "M Girish Chandra"}], "featured_authors": [{"name": "Ravi Sangwan"}, {"name": "Prabhat Anand"}, {"name": "M Girish Chandra"}], "author_count": 3}, {"id": "2606.03293", "category": "quant-ph", "title": "Deterministic generation of cat states with more than $100$ photons under dissipation", "abstract": "Large-size cat states are especially meaningful and fundamental for exploring the quantum-to-classical transition, as well as promising resources for quantum metrology and fault-tolerant quantum computation. However, amplifying the magnitude of cat states remains challenging because of the growing fragility under decoherence. We propose to generate large cat states by using the dynamical invariant of hybrid qubit-bosonic systems under Hermitian or non-Hermitian time-dependent Hamiltonian. It is a study with the universal quantum control (UQC) theory, in which the system dynamics is analyzed in the ancillary picture via a unitary transformation conditional on the qubit state. The controllable dynamics that can be encoded in the evolution of the dynamical invariant is presented by the Heisenberg equation, which imposes constrains on the Hamiltonian. When the qubit is prepared in a balanced superposed state, the bosonic mode can evolve deterministically from the vacuum state to the cat state of a mean photon number over $120$. In the Hermitian case, the generation is perfect; and in the non-Hermitian case, the fidelity is over $0.962$. Our protocol can also be applied to the generation of the intrinsic cat states and the four-component cat states of large size. Through the preparation of macroscopic quantum states, our work essentially advances UQC to hybrid discrete-continuous variable systems.", "url": "https://arxiv.org/abs/2606.03293", "type": "理论+数值", "summary": "大尺寸猫态对于探索量子到经典的转变特别有意义和基础，也是量子计量和容错量子计算的有前途的资源。然而，由于退相干条件下猫态的脆弱性不断增强，放大猫态的强度仍然具有挑战性。我们建议通过使用厄米或非厄米时间相关哈密顿量下混合量子位玻色子系统的动力学不变量来生成大型猫态。这是一项基于通用量子控制（UQC）理论的研究，其中通过以量子位状态为条件的酉变换在辅助图中分析系统动力学。可以在动力学不变量的演化中编码的可控动力学由海森堡方程表示，该方程对哈密顿量施加了约束。当量子位在平衡叠加态下制备时，玻色子模式可以确定性地从真空态演化到平均光子数超过 120 美元的猫态。在埃尔米特的情况下，生成是完美的；在非厄米特情况下，保真度超过 0.962 美元。\n\n我们的协议还可以应用于生成内在猫状态和大尺寸的四分量猫状态。通过宏观量子态的制备，我们的工作本质上将 UQC 推进到混合离散连续变量系统。", "authors": [{"name": "Zhu-yao Jin"}, {"name": "Jun Jing"}], "featured_authors": [{"name": "Zhu-yao Jin"}, {"name": "Jun Jing"}], "author_count": 2}, {"id": "2606.03380", "category": "quant-ph", "title": "Energy-selective quantum search with Ising Hamiltonian phase oracles", "abstract": "Ising Hamiltonians are basic models of disordered magnets and a standard language for quantum and classical optimization. We study an energy-selective quantum search primitive in which the physical evolution \\(\\exp(-\\mathrm{i} T H)\\) is used directly as a Hamiltonian phase oracle. Unlike a Boolean oracle, this oracle marks configurations continuously by their phases and selects a finite resonance band rather than a preassigned marked set. We show that alternating it with the Grover diffusion operator nevertheless produces a Grover-type amplification peak. An exact spectral recurrence and a generating-function representation determine the peak position, width, and height. For an annealed Gaussian density of states, target energies in a high-density tail require \\(\\Theta(\\sqrt{2^n/M})\\) oracle calls when the resonance contains \\(M\\) configurations. For random Ising spectra, overlap-induced correlations shift and distort the peak; spectral symmetrization and iterative calibration remove this detuning for prescribed-energy targeting.", "url": "https://arxiv.org/abs/2606.03380", "type": "理论+数值", "summary": "伊辛哈密顿量是无序磁体的基本模型，也是量子和经典优化的标准语言。我们研究了一种能量选择性量子搜索原语，其中物理演化 \\(\\exp(-\\mathrm{i} T H)\\) 直接用作哈密顿相位预言。与布尔预言不同，该预言通过相位连续标记配置，并选择有限的共振带而不是预先分配的标记集。我们证明，将其与 Grover 扩散算子交替仍然会产生 Grover 型放大峰。精确的光谱重现和生成函数表示确定峰位置、宽度和高度。对于退火高斯态密度，当共振包含 \\(M\\) 个配置时，高密度尾部中的目标能量需要 \\(\\Theta(\\sqrt{2^n/M})\\) 预言调用。对于随机伊辛光谱，重叠引起的相关性会使峰值发生偏移和扭曲；光谱对称化和迭代校准消除了规定能量瞄准的失谐。", "authors": [{"name": "A. S. Plyashechnik"}, {"name": "A. A. Zhukov"}, {"name": "A. V. Lebedev"}, {"name": "W. V. Pogosov"}], "featured_authors": [{"name": "A. S. Plyashechnik"}, {"name": "A. A. Zhukov"}, {"name": "A. V. Lebedev"}, {"name": "W. V. Pogosov"}], "author_count": 4}, {"id": "2606.03517", "category": "quant-ph", "title": "Scalable On-Hardware Training of Quantum Neural Networks and Application to Clinical Data Imputation", "abstract": "Training quantum neural networks (QNNs) on quantum hardware is currently bottlenecked by the cost of gradient estimation: standard parameter-shift methods require a number of circuit evaluations that grows quadratically with the number of trainable parameters, making hardware-based optimisation impractical beyond small system sizes. In this work, we introduce a training framework that reduces this cost to logarithmic in the number of qubits, making gradient-based QNN optimisation feasible on near-term hardware at increasing scales. Our framework combines three co-designed ingredients: (i) a structured, subspace-preserving Butterfly circuit architecture with $O(n \\log n)$ parameters and logarithmic depth; (ii) a layer-wise training strategy that confines on-hardware optimisation to one small, well-structured layer at a time; and (iii) a parallelised parameter-shift rule that exploits the commuting structure within each Butterfly layer to extract all gradients in a constant number of circuit executions. Together these reduce the number of distinct circuit evaluations per optimisation step from $O(n^2)$ to $O(\\log n)$. We validate the framework on clinical data imputation using the MIMIC-III electronic health record dataset, a demanding benchmark sensitive to optimisation instability and model variance. Hybrid classical-quantum models are trained directly on IonQ Forte Enterprise trapped-ion hardware at 16 qubits without performance degradation relative to ideal or noisy simulation and via tensor-network simulation at 32 qubits, with 32-qubit inference executed on hardware. The resulting models match or exceed strong classical neural baselines in downstream patient survival prediction while exhibiting reduced variance across runs, demonstrating that the proposed framework enables practical, scalable QNN training under realistic hardware constraints.", "url": "https://arxiv.org/abs/2606.03517", "type": "理论+数值", "summary": "在量子硬件上训练量子神经网络（QNN）目前受到梯度估计成本的瓶颈：标准参​​数转移方法需要大量的电路评估，这些评估随着可训练参数的数量呈二次方增长，使得基于硬件的优化在小系统规模之外变得不切实际。在这项工作中，我们引入了一种训练框架，可以将量子比特数量的成本降低到对数，从而使基于梯度的 QNN 优化在规模不断增加的近期硬件上变得可行。我们的框架结合了三个共同设计的成分：(i) 结构化的、保留子空间的蝴蝶电路架构，具有 $O(n \\log n)$ 参数和对数深度； (ii) 一种分层​​训练策略，将硬件优化一次限制在一个小的、结构良好的层； (iii) 并行参数转移规则，利用每个蝴蝶层内的交换结构来提取恒定数量的电路执行中的所有梯度。这些共同将每个优化步骤的不同电路评估数量从 $O(n^2)$ 减少到 $O(\\log n)$。\n\n我们使用 MIMIC-III 电子健康记录数据集验证了临床数据插补框架，这是一个对优化不稳定性和模型方差敏感的苛刻基准。混合经典量子模型直接在 IonQ Forte Enterprise 俘获离子硬件上以 16 量子位进行训练，相对于理想或噪声模拟，性能不会下降；并通过 32 量子位张量网络模拟进行训练，并在硬件上执行 32 量子位推理。由此产生的模型在下游患者生存预测中匹配或超过了强大的经典神经基线，同时在运行中表现出较小的方差，这表明所提出的框架能够在实际硬件限制下实现实用、可扩展的 QNN 训练。", "authors": [{"name": "Natansh Mathur"}, {"name": "Panagiotis Kl. Barkoutsos"}, {"name": "Masako Yamada"}, {"name": "Martin Roetteler"}, {"name": "Iordanis Kerenidis"}], "featured_authors": [{"name": "Natansh Mathur"}, {"name": "Panagiotis Kl. Barkoutsos"}, {"name": "Masako Yamada"}, {"name": "Martin Roetteler"}, {"name": "Iordanis Kerenidis"}], "author_count": 5}, {"id": "2606.03561", "category": "quant-ph", "title": "On the saturated cases of the distillability conjecture", "abstract": "The distillability conjecture for two-copy four-by-four Werner states has been an open problem in quantum information for years. We investigate the conditions under which the conjectured inequality becomes an equality. For all known cases where the conjecture has been verified, we characterize the saturation conditions and show that equality forces the matrices $A$ and $B$ to be two-by-two block-diagonal. In particular, several previously obtained partial results, including the cases of one normal matrix, unitary similarity between $B$ and $-A$ or $-A^T$, and anti-diagonal block structures, are reduced to this common block-diagonal structure. We also employ a manifold optimization method, which provides numerical evidence that the two-by-two block-diagonal structure is essential for saturating the inequality. Furthermore, we prove that the identified saturation points are critical points of the objective function on the constraint manifold.", "url": "https://arxiv.org/abs/2606.03561", "type": "理论+数值", "summary": "多年来，二拷贝四乘四维尔纳态的可蒸馏性猜想一直是量子信息领域的一个悬而未决的问题。我们研究了假设的不平等变成平等的条件。对于所有已知的猜想已被验证的情况，我们描述了饱和条件，并表明等式迫使矩阵 $A$ 和 $B$ 成为二乘二的块对角线。特别是，之前获得的几个部分结果，包括一个正态矩阵的情况、$B$和$-A$或$-A^T$之间的酉相似性以及反对对角块结构，都被简化为这种常见的块对角结构。我们还采用了流形优化方法，该方法提供了数值证据，表明二乘二块对角线结构对于饱和不等式至关重要。此外，我们证明了识别的饱和点是约束流形上目标函数的临界点。", "authors": [{"name": "Saiqi Liu"}, {"name": "Lin Chen"}], "featured_authors": [{"name": "Saiqi Liu"}, {"name": "Lin Chen"}], "author_count": 2}, {"id": "2606.03582", "category": "quant-ph", "title": "Fracton Topological Holography", "abstract": "Topological holography (TH), or SymTFT, realizes symmetries and dualities of a quantum system as boundary data of a topological bulk in one higher dimension. We formulate fracton topological holography (FTH), extending this mechanism from liquid topological orders to fracton stabilizer codes. The construction is organized as a general four-stage framework: prepare the bulk model and compute its excitations, determine boundary data and admissible gapped top boundaries, identify the low-energy preserving operator algebra together with its symmetry, relation, and twist data, and then switch among top boundaries to compare the induced boundary descriptions. As a type-I example, we develop FTH for the X-cube model with smooth and rough top boundaries; for a minimal effective Hamiltonian, both yield transverse-field plaquette Ising models, with exchanged subsystem symmetry and twist data, and the boundary switch is implemented by a linear-depth local unitary sequential quantum circuit (SQC). As a type-II example, we formulate FTH for Haah's cubic code in the Laurent-polynomial stabilizer formalism and analyze the natural $(Z)$ and $(X)$ top boundaries, which induce two two-dimensional qubit systems related locally by exchanging generalized plaquette Ising and transverse-field terms and nonlocally by a symmetry--relation duality. These results show that FTH is a genuine extension of TH to both type-I and type-II fracton orders. FTH therefore provides a concrete framework for organizing and understanding duality, with the prospect of offering a systematic route to new dualities.", "url": "https://arxiv.org/abs/2606.03582", "type": "理论", "summary": "拓扑全息术 (TH) 或 SymTFT 将量子系统的对称性和对偶性实现为一个更高维度中拓扑体的边界数据。我们制定了分形拓扑全息术（FTH），将该机制从液体拓扑序扩展到分形稳定器代码。该构造被组织为一般的四阶段框架：准备体模型并计算其激励，确定边界数据和允许的有间隙顶部边界，识别低能量守恒算子代数及其对称性、关系和扭曲数据，然后在顶部边界之间切换以比较诱导的边界描述。作为 I 类示例，我们为具有光滑和粗糙顶部边界的 X 立方体模型开发了 FTH；对于最小有效哈密顿量，两者都产生横向场板伊辛模型，具有交换的子系统对称性和扭曲数据，并且边界开关由线性深度局域酉顺序量子电路（SQC）实现。\n\n作为 II 类示例，我们在洛朗多项式稳定器形式中为 Haah 立方码制定了 FTH，并分析了自然的 $(Z)$ 和 $(X)$ 顶部边界，这两个二维量子位系统通过交换广义斑块伊辛和横向场项而产生局部相关，并通过对称关系对偶性产生非局部相关。这些结果表明，FTH 是 TH 对 I 型和 II 型分形阶的真正扩展。因此，FTH 为组织和理解二元性提供了一个具体的框架，并有望为新的二元性提供系统化的途径。", "authors": [{"name": "Yu-Tao Hu"}, {"name": "Jie-Yu Zhang"}, {"name": "Peng Ye"}], "featured_authors": [{"name": "Yu-Tao Hu"}, {"name": "Jie-Yu Zhang"}, {"name": "Peng Ye"}], "author_count": 3}, {"id": "2606.03612", "category": "quant-ph", "title": "An efficient quantum Hadamard product algorithm for functions", "abstract": "We propose an efficient quantum algorithm for preparing the Hadamard product state of two quantum states whose amplitudes are generated by functions on a uniform grid with grid number $N$. As the Hadamard product operation is non-unitary, the conventional approach generally suffer from a success probability that scales as $O(1/N)$, leading to an $O(\\sqrt{N})$ query complexity even with quantum amplitude amplification. Our method exploits the Fourier-space representation of the input functions, where the Hadamard product can be treated through a convolution structure and approximated using localized Fourier coefficients. The resulting quantum circuit has complexity governed by the Fourier regularity of the underlying functions rather than directly by the grid number. In particular, when either of the input functions has finitely many non-zero Fourier coefficients, the algorithm prepares the exact quantum Hadamard product state under $N$-independent query complexity. Moreover, we also propose a novel quantum circuit for the partial inner product as one of its applications.", "url": "https://arxiv.org/abs/2606.03612", "type": "数值", "summary": "我们提出了一种有效的量子算法，用于准备两个量子态的哈达玛积态，这两个量子态的振幅由网格数 $N$ 的均匀网格上的函数生成。由于 Hadamard 乘积运算是非酉的，传统方法通常会遇到 $O(1/N)$ 的成功概率，即使在量子幅度放大的情况下，也会导致 $O(\\sqrt{N})$ 查询复杂度。我们的方法利用输入函数的傅里叶空间表示，其中哈达玛积可以通过卷积结构进行处理并使用局部傅里叶系数进行近似。由此产生的量子电路的复杂性由基础函数的傅里叶正则性决定，而不是直接由网格数决定。特别是，当任一输入函数具有有限多个非零傅立叶系数时，该算法会在与 $N$ 无关的查询复杂度下准备精确的量子 Hadamard 乘积状态。此外，我们还提出了一种新颖的部分内积量子电路作为其应用之一。", "authors": [{"name": "Xinchi Huang"}, {"name": "Hirofumi Nishi"}, {"name": "Tomofumi Zushi"}, {"name": "Yu-ichiro Matsushita"}], "featured_authors": [{"name": "Xinchi Huang"}, {"name": "Hirofumi Nishi"}, {"name": "Tomofumi Zushi"}, {"name": "Yu-ichiro Matsushita"}], "author_count": 4}, {"id": "2606.03722", "category": "quant-ph", "title": "Characterizing quantum channels from local-unitary invariants", "abstract": "We develop systematic frameworks for characterizing the entanglement properties of two-qubit channels beyond unitary settings. We introduce averaged local-unitary invariants, referred to as moments, obtained from Haar integrals over input states or unitaries. These moments provide computable descriptions of how a quantum channel can create, preserve, or destroy bipartite entanglement. We first show that second-order moments yield criteria for non-entangling and entanglement-breaking channels, which allow us to detect entanglement-creating and entanglement-preserving channels. We then demonstrate that higher-order moments can capture additional information and distinguish channels beyond second-order moments alone. Finally, we show that combinations of moments associated with different channel families improve the discrimination of locally inequivalent two-qubit unitaries.", "url": "https://arxiv.org/abs/2606.03722", "type": "理论", "summary": "我们开发了系统框架来表征单一设置之外的两个量子位通道的纠缠特性。我们引入平均局部酉不变量，称为矩，是从输入状态或酉的 Haar 积分获得的。这些时刻提供了关于量子通道如何创建、保留或破坏二分纠缠的可计算描述。我们首先证明二阶矩产生非纠缠和纠缠破坏通道的标准，这使我们能够检测纠缠创建和纠缠保持通道。然后，我们证明高阶矩可以捕获额外的信息并区分仅二阶矩之外的通道。最后，我们表明与不同通道族相关的矩的组合提高了局部不等价的两个量子位酉的辨别力。", "authors": [{"name": "Salwa Shaglel"}, {"name": "Satoya Imai"}], "featured_authors": [{"name": "Salwa Shaglel"}, {"name": "Satoya Imai"}], "author_count": 2}, {"id": "2606.03725", "category": "quant-ph", "title": "Torsion-induced gauge structure in curved quantum waveguides", "abstract": "We investigate the quantum dynamics of a particle confined to a space curve within the thin-layer quantization framework. For a nondegenerate scalar transverse mode, torsion does not enter the local effective Hamiltonian, which contains only the curvature-induced scalar geometric potential. In contrast, when a degenerate transverse subspace is retained, the rotation of the Frenet normal frame becomes dynamically relevant and generates a matrix-valued Abelian gauge potential. Using a projection-based derivation in a co-rotating Frenet-frame basis, we show that this effective gauge potential is directly determined by the local torsion of the curve. The resulting effective Hamiltonian takes a gauge-covariant form and produces two transverse-mode branches whose parabolic dispersions are shifted in opposite directions in momentum space. For closed curves, the associated holonomy is controlled by the integrated torsion and leads to geometric interference. These results provide a direct realization of a Wilczek--Zee-type connection induced purely by spatial geometry in curved quantum waveguides. We further construct a classical-wave analogue using the degenerate bending modes of an isotropic elastic rod, demonstrating that the same torsion-induced gauge structure appears in continuum wave physics.", "url": "https://arxiv.org/abs/2606.03725", "type": "理论", "summary": "我们研究了薄层量子化框架内受限于空间曲线的粒子的量子动力学。对于非简并标量横模，扭转不会进入局部有效哈密顿量，其仅包含曲率引起的标量几何势。相反，当保留退化横向子空间时，Frenet 法线框架的旋转变得动态相关并生成矩阵值阿贝尔规范势。在共同旋转 Frenet 框架基础上使用基于投影的推导，我们表明该有效规范势直接由曲线的局部扭转决定。由此产生的有效哈密顿量采用规范协变形式，并产生两个横模分支，其抛物线色散在动量空间中向相反方向移动。对于闭合曲线，相关的完整性由积分扭转控制并导致几何干涉。这些结果提供了纯粹由弯曲量子波导中的空间几何引起的 Wilczek-Zee 型连接的直接实现。\n\n我们进一步使用各向同性弹性杆的简并弯曲模式构建了经典波模拟，证明了在连续波物理学中出现了相同的扭转引起的规范结构。", "authors": [{"name": "Xu-Yang Hou"}, {"name": "Xianlong Gao"}, {"name": "Hao Guo"}], "featured_authors": [{"name": "Xu-Yang Hou"}, {"name": "Xianlong Gao"}, {"name": "Hao Guo"}], "author_count": 3}, {"id": "2606.03789", "category": "quant-ph", "title": "Triple exceptional point with unitary paths of unfolding in a three-site fermionic Swanson-like model", "abstract": "A fermionic three-site generalization of the popular bosonic Swanson model is studied as providing an exactly solvable five-parametric example of the quantum-mechanical unitary-evolution process leading to an ultimate loss of the observability and fall in an exceptional-point singularity (EP3). The instant of degeneracy is found to have an explicit one-parametric form. Its unitarity-compatible vicinity (i.e., the corridor of access to EP3) is also specified in closed form. The exact, numerical-error-independent solvability is found essential due to another, avoided, false energy-level crossing which is found to occur not too far from the true EP3 singularity.", "url": "https://arxiv.org/abs/2606.03789", "type": "理论+数值", "summary": "研究了流行的玻色斯旺森模型的费米子三位点推广，为量子力学酉演化过程提供了精确可解的五参数示例，导致最终失去可观测性并陷入异常点奇点（EP3）。发现简并时刻具有明确的单参数形式。其统一性兼容邻域（即进入 EP3 的走廊）也以封闭形式指定。精确的、与数值误差无关的可解性被发现是至关重要的，因为另一个被避免的、错误的能级交叉被发现发生在离真正的 EP3 奇点不远的地方。", "authors": [{"name": "Bijan Bagchi"}, {"name": "Aritra Ghosh"}, {"name": "Miloslav Znojil"}], "featured_authors": [{"name": "Bijan Bagchi"}, {"name": "Aritra Ghosh"}, {"name": "Miloslav Znojil"}], "author_count": 3}, {"id": "2606.03836", "category": "quant-ph", "title": "The bulk spectral gap is semi-decidable: a convergent family of certified upper bounds", "abstract": "Determining spectral gaps in the thermodynamic limit is a central challenge in quantum many-body physics. Existing rigorous methods are largely limited to special settings, while variational numerical approaches typically provide estimates rather than certified bounds. Here we introduce a complete family of certified upper bounds on the bulk spectral gap of quantum many-body systems. These upper bounds are obtained by solving a series of semidefinite programs and they become arbitrarily tight at the cost of more computational resources. This shows that the bulk spectral gap is semi-decidable, in contrast to undecidability results for alternative notions of spectral gap based on sequences of finite systems with prescribed boundary conditions. As a proof of principle, we apply our algorithm to the spin-$\\frac{1}{2}$ kagome lattice Heisenberg antiferromagnet and obtain, to our knowledge, the first nontrivial certified upper bounds on its bulk spectral gap.", "url": "https://arxiv.org/abs/2606.03836", "type": "理论+数值", "summary": "确定热力学极限中的光谱间隙是量子多体物理学的一个核心挑战。现有的严格方法很大程度上局限于特殊设置，而变分数值方法通常提供估计值而不是经过认证的界限。在这里，我们介绍了量子多体系统体光谱间隙的完整系列经过认证的上限。这些上限是通过求解一系列半定程序获得的，并且它们以更多计算资源为代价变得任意紧。这表明，总体谱间隙是半可判定的，与基于具有规定边界条件的有限系统序列的谱间隙替代概念的不可判定性结果相反。作为原理证明，我们将我们的算法应用于自旋 $\\frac{1}{2}$ kagome 晶格海森堡反铁磁体，并据我们所知，获得了其体光谱间隙的第一个非平凡的认证上限。", "authors": [{"name": "Xiangling Xu"}, {"name": "Matthias Schötz"}, {"name": "Jie Wang"}, {"name": "Victor Magron"}, {"name": "Igor Klep"}, {"name": "Omar Fawzi"}, {"name": "Marc-Olivier Renou"}], "featured_authors": [{"name": "Xiangling Xu"}, {"name": "Matthias Schötz"}, {"name": "Jie Wang"}, {"name": "Igor Klep"}, {"name": "Omar Fawzi"}, {"name": "Marc-Olivier Renou"}], "author_count": 7}, {"id": "2606.03859", "category": "quant-ph", "title": "Subspace-selective unitary manipulation based on the Hilbert-space symmetric structures in the multiple-quantum operator algebra spaces in the quantum-computing speedup theory", "abstract": "The quantum-computing speedup theory considers the symmetric structures and properties of quantum systems as the fundamental Quantum-Computing-Speedup (QCS) resources which are responsible for exponentially speeding up quantum computing and simulating. At present a large and important problem is how to make use of the fundamental QCS resources to speed up essentially quantum computing and simulating. Here the author makes a great effort toward solving this important problem. The theoretical research work in this paper is mainly divided into the two Parts I and II. The Part I investigates mainly the multiple-quantum operator algebra spaces. And the relationships are analyzed among the multiple-quantum operator algebra spaces, quantum simulating for the unitary time-evolutional processes, and the fundamental QCS resources which exist in the different kinds of basic quantum spaces: the multiple-quantum operator algebra space, the density operator space, and the Hilbert space. It concludes that the multiple-quantum operator algebra space must be positioned as the central place where the QCS resources are exploited to speed up quantum computing and simulating. The Part II investigates mainly the subspace-selective unitary manipulation based on the Hilbert-space symmetric structures. Recognize that the multiple-quantum operator algebra space is the central place. Then those QCS resources original from the Hilbert space (a quantum-state space) must be explicitly taken into account in the multiple-quantum operator algebra space (a linear operator space). This is an important problem. The subspace-selective unitary manipulation is able to solve this problem. It aims to harness the fundamental QCS resources original from the Hilbert space to speed up quantum computing and simulating in the multiple-quantum operator algebra space.", "url": "https://arxiv.org/abs/2606.03859", "type": "理论", "summary": "量子计算加速理论将量子系统的对称结构和属性视为基本的量子计算加速（QCS）资源，负责以指数方式加速量子计算和模拟。目前一个重大而重要的问题是如何利用基础的QCS资源来加速量子计算和模拟的本质。在这里，作者为解决这个重要问题做出了很大的努力。本文的理论研究工作主要分为第一部分和第二部分。第一部分主要研究多量子算子代数空间。分析了多量子算子代数空间、酉时间演化过程的量子模拟以及不同类型基本量子空间（多量子算子代数空间、密度算子空间和希尔伯特空间）中存在的基本QCS资源之间的关系。结论是，多量子算子代数空间必须定位为利用 QCS 资源来加速量子计算和模拟的中心位置。\n\n第二部分主要研究基于希尔伯特空间对称结构的子空间选择性酉操纵。认识到多量子算子代数空间是中心位置。然后，必须在多量子算子代数空间（线性算子空间）中明确考虑来自希尔伯特空间（量子态空间）的那些原始 QCS 资源。这是一个重要的问题。子空间选择性酉操作能够解决这个问题。它旨在利用源自希尔伯特空间的基本QCS资源来加速多量子算子代数空间中的量子计算和模拟。", "authors": [{"name": "Xijia Miao"}], "featured_authors": [{"name": "Xijia Miao"}], "author_count": 1}, {"id": "2606.03891", "category": "quant-ph", "title": "Efficient Quantum Error Mitigation for Unitary k-Designs", "abstract": "Quantum circuit ensembles that have the properties of unitary k-designs represent applications where there is no obvious bias toward any particular Pauli support, as is the case in simulating systems exhibiting ''quantum chaos,'' which range from quantum dynamics near black holes to gapless spin fluid analysis. However, noisy hardware makes quantum circuits prone to a myriad of error sources, of which depolarizing and coherent error can be particularly destructive. To combat depolarizing error, popular techniques typically involve circuit or gate folding, which can be time-intensive procedures due to increased circuit depth and shot overhead. Other tensor-network-based mitigation techniques suffer from intractability in high-entanglement regimes. In this work, we leverage the structure of unitary k-design Pauli support distributions by introducing a technique we name ''circuit balancing,'' along with gate benchmarking data, in order to estimate circuit-wide depolarization. We describe how to invert the diagnosed circuit depolarization even in the presence of coherent error, via Pauli twirling. We provide asymptotics to estimate the number of twirls needed to maintain a desired output fidelity. We test our method numerically in a variety of simulation settings and find that it can significantly reduce average random circuit infidelity. Further, we employ our methods to find significant infidelity reductions when running a random circuit ensemble on a contemporary superconducting quantum computer, IBM Fez. Overall, we show that the method effectively reduces gate-based error for unitary k-designs without incurring any two-qubit gate overhead.", "url": "https://arxiv.org/abs/2606.03891", "type": "理论+数值", "summary": "具有酉 k 设计特性的量子电路系综代表了对任何特定泡利支持没有明显偏差的应用，就像模拟表现出“量子混沌”的系统的情况一样，其范围从黑洞附近的量子动力学到无间隙自旋流体分析。然而，嘈杂的硬件使量子电路容易出现无数的误差源，其中去极化和相干误差尤其具有破坏性。为了对抗去极化误差，流行的技术通常涉及电路或栅极折叠，由于电路深度和镜头开销的增加，这可能是耗时的过程。其他基于张量网络的缓解技术在高纠缠状态下难以处理。在这项工作中，我们通过引入一种称为“电路平衡”的技术以及门基准测试数据来利用单一 k 设计泡利支持分布的结构，以估计电路范围的去极化。我们描述了如何通过泡利旋转来反转诊断的电路去极化，即使存在相干误差。\n\n我们提供渐近函数来估计维持所需输出保真度所需的旋转次数。我们在各种模拟设置中对我们的方法进行了数值测试，发现它可以显着降低平均随机电路不保真度。此外，当在当代超导量子计算机 IBM Fez 上运行随机电路系综时，我们使用我们的方法发现不忠实性显着减少。总的来说，我们表明该方法有效地减少了酉 k 设计的基于门的误差，而不会产生任何两个量子位门的开销。", "authors": [{"name": "Ayush Pancholy"}, {"name": "K. Birgitta Whaley"}], "featured_authors": [{"name": "Ayush Pancholy"}, {"name": "K. Birgitta Whaley"}], "author_count": 2}, {"id": "2606.03897", "category": "quant-ph", "title": "Parametrically induced strong coupling between a superconducting quantum circuit and a solid-state spin ensemble", "abstract": "Efficient quantum state transfer between superconducting circuits and solid-state spins would unlock high-coherence quantum memories for superconducting quantum processors. We demonstrate dynamically controlled strong coupling between a Josephson circuit and a rare-earth spin ensemble. Using a parametric pump, we realize on-demand coupling of several MHz, which will enable faithful state transfer between quantum circuits and spins. Our architecture enables quantum control of spin ensembles, and paves the way for hybrid memories with coherence far beyond those of superconducting circuits alone.", "url": "https://arxiv.org/abs/2606.03897", "type": "理论", "summary": "超导电路和固态自旋之间的高效量子态转移将为超导量子处理器解锁高相干量子存储器。我们演示了约瑟夫森电路和稀土自旋系综之间的动态控制强耦合。使用参数泵，我们实现了几 MHz 的按需耦合，这将实现量子电路和自旋之间忠实的状态转移。我们的架构能够实现自旋系综的量子控制，并为混合存储器铺平道路，其相干性远远超出超导电路本身。", "authors": [{"name": "Alejandro E. Baptista"}, {"name": "Jinwoong Kim"}, {"name": "Sonia Rani"}, {"name": "Xi Cao"}, {"name": "Wolfgang Pfaff"}], "featured_authors": [{"name": "Alejandro E. Baptista"}, {"name": "Jinwoong Kim"}, {"name": "Sonia Rani"}, {"name": "Xi Cao"}, {"name": "Wolfgang Pfaff"}], "author_count": 5}, {"id": "2606.03956", "category": "quant-ph", "title": "Operator spreading in random circuits with orthogonal or symplectic symmetry", "abstract": "We investigate operator spreading in random quantum circuits with gates drawn from orthogonal-invariant or symplectic-invariant ensembles, revealing several key distinctions from the well-studied unitary-invariant case. We find that the ensemble-averaged Pauli-string weights relax to a ternary-valued structure, instead of the binary structure of unitary-invariant circuits. For orthogonal- or symplectic-invariant circuits, the domain wall separating trivial and scrambled regions has a finite width even for Haar-random gates, whereas domain walls are sharp for Haar-distributed random     const categoryOrder = ["cond-mat", "hep-th", "math-ph", "quant-ph"];
    const typeOrder = ["理论", "数值", "理论+数值", "实验"];
    const state = { search: "", categories: new Set(categoryOrder), types: new Set(typeOrder) };
    const statsEl = document.getElementById("stats");
    const gridEl = document.getElementById("paper-grid");
    const resultCountEl = document.getElementById("result-count");
    const emptyStateEl = document.getElementById("empty-state");
    const searchEl = document.getElementById("search");
    function typeClass(type) { if (type === "理论") return "type-theory"; if (type === "数值") return "type-numeric"; if (type === "实验") return "type-experimental"; return "type-both"; }
    function escapeHtml(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function renderAuthors(paper) {
      const authors = paper.featured_authors || [];
      if (!authors.length) {
        return `<section class="author-block"><div class="author-label">作者</div><div class="author-note">未提取到作者信息。</div></section>`;
      }
      const items = authors.map((author) => `<li class="author-item"><strong>${escapeHtml(author.name)}</strong></li>`).join("");
      const note = paper.author_count > authors.length ? `显示前 3 位与后 3 位作者，共 ${paper.author_count} 位` : `共 ${paper.author_count} 位作者`;
      return `<section class="author-block"><div class="author-label">作者</div><ul class="author-list">${items}</ul><div class="author-note">${note}</div></section>`;
    }
    function statCard(label, value) { return `<article class="stat"><div class="label">${label}</div><div class="value">${value}</div></article>`; }
    function renderStats() {
      const categoryCounts = Object.fromEntries(categoryOrder.map((cat) => [cat, 0]));
      const typeCounts = Object.fromEntries(typeOrder.map((type) => [type, 0]));
      papers.forEach((paper) => { categoryCounts[paper.category] += 1; typeCounts[paper.type] += 1; });
      statsEl.innerHTML = [statCard("筛出论文", papers.length), ...categoryOrder.map((cat) => statCard(cat, categoryCounts[cat])), ...typeOrder.map((type) => statCard(type, typeCounts[type]))].join("");
    }
    function renderChips(containerId, values, selectedSet, onToggle, attrName) {
      const container = document.getElementById(containerId);
      container.innerHTML = values.map((value) => {
        const extra = attrName ? `${attrName}="${value}"` : "";
        const active = selectedSet.has(value) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-value="${value}" ${extra}>${value}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach((button) => button.addEventListener("click", () => onToggle(button.dataset.value)));
    }
    function toggleFromSet(set, value) { if (set.has(value)) { if (set.size > 1) set.delete(value); } else { set.add(value); } }
    function matches(paper) {
      const authorText = (paper.authors || []).map((author) => author.name).join(" ");
      const haystack = [paper.id, paper.category, paper.type, paper.title, paper.abstract, paper.summary, authorText].join(" ").toLowerCase();
      return state.categories.has(paper.category) && state.types.has(paper.type) && haystack.includes(state.search);
    }
    function renderPapers() {
      const filtered = papers.filter(matches);
      resultCountEl.textContent = `当前显示 ${filtered.length} / ${papers.length} 篇`;
      emptyStateEl.style.display = filtered.length ? "none" : "block";
      gridEl.innerHTML = filtered.map((paper) => {
        const safeUrl = escapeHtml(paper.url);
        return `
        <article class="paper">
          <div class="paper-top"><span class="tag category">${escapeHtml(paper.category)}</span><span class="tag ${typeClass(paper.type)}">${escapeHtml(paper.type)}</span></div>
          <div class="id">arXiv:${escapeHtml(paper.id)}</div>
          <h2><a href="${safeUrl}" target="_blank" rel="noreferrer">${escapeHtml(paper.title)}</a></h2>
          ${renderAuthors(paper)}
          <p class="summary">${escapeHtml(paper.summary)}</p>
          <details><summary>查看英文原文摘要</summary><p>${escapeHtml(paper.abstract)}</p></details>
          <footer><span>自动翻译</span><a href="${safeUrl}" target="_blank" rel="noreferrer">打开 arXiv</a></footer>
        </article>`;

      renderChips("category-filters", categoryOrder, state.categories, (value) => { toggleFromSet(state.categories, value); rerenderFilters(); renderPapers(); });
      renderChips("type-filters", typeOrder, state.types, (value) => { toggleFromSet(state.types, value); rerenderFilters(); renderPapers(); }, "data-type");
    }
    searchEl.addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); renderPapers(); });
    renderStats();
    rerenderFilters();
    renderPapers();
  </script>
</body>
