  <style>

    }

      padding: 30px;

      background: linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,248,238,0.72)), linear-gradient(135deg, rgba(143,61,46,0.08), rgba(29,95,107,0.08));

    .control-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }

    .author-block { display: grid; gap: 10px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.64); border: 1px solid var(--line); }
    .author-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

    .author-item { display: grid; gap: 4px; }
    .author-item strong { font-size: 14px; }
    .author-item span { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .author-note { color: var(--muted); font-size: 12px; }
    .paper .summary { margin: 0; font-size: 15px; line-height: 1.75; white-space: pre-line; }
    details { border-top: 1px solid var(--line); padding-top: 12px; }

    .paper footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .empty { display: none; margin-top: 24px; padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 22px; background: rgba(255,255,255,0.7); }
    @media (max-width: 980px) { .control-grid { grid-template-columns: 1fr; } .controls { position: static; } }

  <script>
    const papers = [{"id": "2606.02600", "category": "cond-mat", "title": "High-Dimensional Latents Should Be Diagnosed Through Phase Structure", "abstract": "We study autoencoder and variational-autoencoder latent spaces through the lens of spin-glass theory. The paper has two components. First, we formalize a latent-space spin-glass dictionary: for a fixed decoder, the reconstruction term together with a hyperspherical coordinates prior induces a Hamiltonian on the latent sphere, where latent coordinates play the role of continuous spins and the prior acts as an external magnetic field. This allows us to import operational spin-glass diagnostics -- overlap distributions, susceptibility, and block-spin coarse-graining -- to detect ordered, disordered, and edge-of-stability phases in trained latent representations. Second, we show that deliberately driving the latent system toward the edge-of-stability of the topological trivialization regime has concrete downstream consequences. In generation, hyperspherical compression improves the reconstruction-generation trade-off on CIFAR-10 and CelebA64, yielding lower self-FID while preserving or improving reconstruction. In anomaly detection, the same semi-ordered latent geometry improves both fully unsupervised and conditional OOD detection, including real-world Mars Rover and Galaxy Zoo datasets, as well as CIFAR-10/100 and Imagenette-based OOD benchmarks. We therefore advocate a phase-aware evaluation paradigm for AEs/VAEs, in which spin-glass observables complement standard ML metrics and expose the latent regimes that underlie downstream success or failure in many cases.", "url": "https://arxiv.org/abs/2606.02600", "type": "理论+数值", "summary": "我们通过自旋玻璃理论的视角研究自动编码器和变分自动编码器的潜在空间。该论文有两个组成部分。首先，我们形式化一个潜在空间自旋玻璃字典：对于固定解码器，重建项与超球面坐标先验一起在潜在球体上引入哈密顿量，其中潜在坐标扮演连续自旋的角色，先验充当外部磁场。这使我们能够导入可操作的自旋玻璃诊断——重叠分布、磁化率和块自旋粗粒度——以检测经过训练的潜在表示中的有序、无序和稳定边缘阶段。其次，我们表明，故意将潜在系统推向拓扑平凡化机制的稳定边缘会产生具体的下游后果。在生成过程中，超球面压缩改善了 CIFAR-10 和 CelebA64 上的重建与生成权衡，在保留或改善重建的同时产生较低的自 FID。\n\n在异常检测中，相同的半有序潜在几何结构改进了完全无监督和条件 OOD 检测，包括现实世界的火星漫游者和 Galaxy Zoo 数据集，以及 CIFAR-10/100 和基于 Imagenette 的 OOD 基准。因此，我们提倡对 AE/VAE 进行阶段感知评估范式，其中旋转玻璃可观测值补充了标准 ML 指标，并揭示了在许多情况下下游成功或失败的潜在机制。", "authors": [{"name": "Alejandro Ascarate"}, {"name": "Leo Lebrat"}, {"name": "Rodrigo Santa Cruz"}, {"name": "Clinton Fookes"}, {"name": "Olivier Salvado"}], "featured_authors": [{"name": "Alejandro Ascarate"}, {"name": "Leo Lebrat"}, {"name": "Rodrigo Santa Cruz"}, {"name": "Clinton Fookes"}, {"name": "Olivier Salvado"}], "author_count": 5}, {"id": "2606.02622", "category": "cond-mat", "title": "On the Detection of Curl-Free Gauge Fields", "abstract": "In quantum theory, electromagnetic gauge fields enter directly into the phase evolution of the wavefunction and can even influence quantum systems in regions where the associated electric and magnetic fields vanish. The Aharonov-Bohm effect demonstrates that such gauge fields produce observable consequences when a coherent quantum system encloses magnetic flux along a doubly connected path. This has led to the widespread view that curl-free gauge fields are undetectable in simply connected systems, giving rise to a form of topological blindness. Here we show that this conclusion is not fundamental. During nonequilibrium processes, collective quantum systems can develop transient responses to curl-free gauge fields without enclosing magnetic flux in a static geometry. Using superconducting condensates as a concrete example, we demonstrate that the evolving phase of the macroscopic wavefunction generates supercurrents and voltage pulses whose time integral is proportional to the open-path line integral of the vector potential. In contrast to the conventional Aharonov-Bohm effect, the resulting response is not restricted modulo the flux quantum and may greatly exceed the scale associated with static doubly connected geometries. The mechanism can be interpreted as a dynamical closure of the gauge contour in spacetime and is supported by gauge-invariant arguments, time-dependent Ginzburg-Landau theory modeling, and numerical simulations. These results establish a general principle for detecting curl-free gauge fields and suggest new approaches for probing hidden gauge structures in quantum matter and beyond.", "url": "https://arxiv.org/abs/2606.02622", "type": "理论+数值", "summary": "在量子理论中，电磁规范场直接参与波函数的相位演化，甚至可以影响相关电场和磁场消失的区域中的量子系统。阿哈罗诺夫-玻姆效应表明，当相干量子系统沿着双连接路径封闭磁通量时，这种规范场会产生可观察到的结果。这导致人们普遍认为，在简单连接的系统中，无旋度规范场是无法检测到的，从而产生了一种拓扑盲性。在这里我们表明这个结论不是根本性的。在非平衡过程中，集体量子系统可以对无旋度规范场产生瞬态响应，而无需将磁通量封闭在静态几何结构中。以超导凝聚体为例，我们证明了宏观波函数的演化阶段会产生超电流和电压脉冲，其时间积分与矢量势的开路线积分成正比。\n\n与传统的阿哈罗诺夫-玻姆效应相反，产生的响应不受通量量子模的限制，并且可能大大超过与静态双连接几何相关的规模。该机制可以解释为规范轮廓在时空中的动态闭合，并得到规范不变参数、时间相关的金兹堡-朗道理论建模和数值模拟的支持。这些结果建立了检测无旋度规范场的一般原理，并提出了探测量子物质及其他领域中隐藏规范结构的新方法。", "authors": [{"name": "Armen Gulian"}, {"name": "Will Benston"}, {"name": "Vahan Nikoghosyan"}], "featured_authors": [{"name": "Armen Gulian"}, {"name": "Will Benston"}, {"name": "Vahan Nikoghosyan"}], "author_count": 3}, {"id": "2606.02678", "category": "cond-mat", "title": "Commensurability and Gap Enhancement in Superconducting Films Induced by Nonsuperconducting Layers", "abstract": "We find that commensurate resonances in superconducting films endowed with a $SISIS$ structure, where $S$ and $I$ stand for superconducting and insulating layers, respectively, enhance the gap to a value three to four times the bulk gap. Such resonances rely on spatially localized quantum states that arise due to the commensurability between the total film thickness and the distance between the two insulating barriers. Our results are obtained in the context of the Bogoliubov-de Gennes equations within the Anderson approximation, applied here to Bi films, where quantum size effects are possible due to the abnormally large mean free path.", "url": "https://arxiv.org/abs/2606.02678", "type": "理论", "summary": "我们发现，具有 $SISIS$ 结构的超导薄膜中的相应共振，其中 $S$ 和 $I$ 分别代表超导层和绝缘层，将间隙增强到体间隙的三到四倍。这种共振依赖于由于总膜厚度与两个绝缘势垒之间的距离之间的可比性而产生的空间局域量子态。我们的结果是在安德森近似内的 Bogoliubov-de Gennes 方程的背景下获得的，此处应用于 Bi 薄膜，其中由于异常大的平均自由程，可能出现量子尺寸效应。", "authors": [{"name": "D. André Orna T."}, {"name": "Mauro M. Doria"}, {"name": "Daniel Reyes"}, {"name": "Arkady Shanenko"}, {"name": "Alexei Vagov"}, {"name": "Y. T. Xing"}], "featured_authors": [{"name": "D. André Orna T."}, {"name": "Mauro M. Doria"}, {"name": "Daniel Reyes"}, {"name": "Arkady Shanenko"}, {"name": "Alexei Vagov"}, {"name": "Y. T. Xing"}], "author_count": 6}, {"id": "2606.02682", "category": "cond-mat", "title": "Neural Networks and Schramm-Loewner Evolutions", "abstract": "In this manuscript, we explore the application of neural networks to predict the natural parameter $\\kappa \\geq 0$ of Schramm-Loewner Evolution (SLE$_\\kappa$) theory. SLE$_\\kappa$ is a family of random fractal curves that has significant implications in Statistical Mechanics and Conformal Field Theory. This parameter $\\kappa \\geq 0$ plays an important role in the theory as there are models of Planar Statistical Physics that are proven to have SLE as scaling limits as well as others that are conjectured to have this limit for various choices of the parameter $\\kappa \\geq 0$. In addition, there are three different statistical behaviors of the SLE curves as the parameter $\\kappa$ changes in $[0, \\infty).$ Leveraging the powerful pattern recognition capabilities of neural networks, this study aims to develop a predictive model that can estimate the $\\kappa$ parameter with good accuracy.", "url": "https://arxiv.org/abs/2606.02682", "type": "理论", "summary": "在这篇手稿中，我们探索了神经网络的应用来预测 Schramm-Loewner 进化（SLE$_\\kappa$）理论的自然参数 $\\kappa \\geq 0$。 SLE$_\\kappa$ 是一系列随机分形曲线，在统计力学和共形场论中具有重要意义。这个参数 $\\kappa \\geq 0$ 在理论中起着重要作用，因为平面统计物理模型被证明具有 SLE 作为标度限制，以及其他被推测对参数 $\\kappa \\geq 0$ 的各种选择具有此限制的模型。此外，随着参数 $\\kappa$ 在 $[0, \\infty)$ 变化，SLE 曲线出现三种不同的统计行为。利用神经网络强大的模式识别能力，本研究旨在开发一种能够高精度估计 $\\kappa$ 参数的预测模型。", "authors": [{"name": "Neilesh Shrotri"}, {"name": "Vlad Margarint"}], "featured_authors": [{"name": "Neilesh Shrotri"}, {"name": "Vlad Margarint"}], "author_count": 2}, {"id": "2606.02695", "category": "cond-mat", "title": "Irregular Metamaterial Networks", "abstract": "Metamaterials can achieve exceptional functionality through careful engineering of their mesoscale structure. Although appropriately introduced irregularities can be advantageous, current approaches largely conform to regular structures to preserve tractability. Here, we contend that network theory, enriched with geometry and physics, provides a natural framework for designing metamaterials with controlled irregularities at relevant scales, thereby enabling the discovery of new property-enhancing structures. We examine how this augmented network theory can facilitate the creation of irregular metamaterials with enhanced or novel properties and how metamaterial research, in turn, is opening new directions in network science. Supported by machine learning and advanced self-assembly, the emerging field of irregular metamaterial networks is poised to transform inverse design and scalable manufacturing of novel materials.", "url": "https://arxiv.org/abs/2606.02695", "type": "理论+数值", "summary": "超材料可以通过对其介观结构的精心设计来实现卓越的功能。尽管适当引入不规则性可能是有利的，但当前的方法很大程度上符合规则结构以保持易处理性。在这里，我们认为，富含几何学和物理学的网络理论为设计在相关尺度上具有受控不规则性的超材料提供了一个自然框架，从而能够发现新的性能增强结构。我们研究这种增强网络理论如何促进具有增强或新颖特性的不规则超材料的创建，以及超材料研究反过来如何开辟网络科学的新方向。在机器学习和先进自组装的支持下，不规则超材料网络这一新兴领域有望改变新型材料的逆向设计和可扩展制造。", "authors": [{"name": "Thomas P. Wytock"}, {"name": "Chiara Daraio"}, {"name": "Heinrich M. Jaeger"}, {"name": "Christopher A. Schuh"}, {"name": "Lorenzo Valdevit"}, {"name": "Vincenzo Vitellid"}, {"name": "Adilson E. Motter"}], "featured_authors": [{"name": "Thomas P. Wytock"}, {"name": "Chiara Daraio"}, {"name": "Heinrich M. Jaeger"}, {"name": "Lorenzo Valdevit"}, {"name": "Vincenzo Vitellid"}, {"name": "Adilson E. Motter"}], "author_count": 7}, {"id": "2606.02716", "category": "cond-mat", "title": "Two-orbital $e_g$ model with bond-dependent spin-orbit coupling: A playground for emergent band topology, Kitaev magnetism, and magnetoelectricity", "abstract": "Inspired by the electronic structure of compounds like nickel dihalides Ni$X_2$ ($X$=Cl, Br, I), we propose a low-energy two-orbital $e_g$ model featuring bond-dependent spin-orbit terms, driven by atomic spin-orbit coupling on the ligand $X$. We demonstrate that this model hosts a rich array of phenomena. In the non-interacting band limit, spin-orbit-derived spin-dependent and spin-flip hopping terms produce topological bands with spin-Chern numbers $C_s=\\pm 2, \\pm 4$, and higher order topological states with fractional corner charges, respectively. In the half-filled Mott insulator limit, we recover a spin-$1$ Hamiltonian with bond-dependent Kitaev exchange interactions. We explore the magnetoelectric effect in this two-orbital model using symmetry-based perspective and microscopic calculations, going beyond the generalized Katsura-Nagaosa-Balatsky theory for the single-orbital case. Our work may be relevant to study of doping, strain, or pressure on Ni$X_2$ and related materials.", "url": "https://arxiv.org/abs/2606.02716", "type": "理论+数值", "summary": "受二卤化镍 Ni$X_2$ ($X$=Cl, Br, I) 等化合物电子结构的启发，我们提出了一种低能双轨道 $e_g$ 模型，该模型具有键依赖性自旋轨道项，由配体 $X$ 上的原子自旋轨道耦合驱动。我们证明这个模型包含了一系列丰富的现象。在非相互作用能带限制中，自旋轨道导出的自旋相关和自旋翻转跳跃项分别产生具有自旋陈数 $C_s=\\pm 2, \\pm 4$ 的拓扑带，以及具有分数角电荷的高阶拓扑态。在半满的莫特绝缘体极限中，我们恢复了具有依赖于键的 Kitaev 交换相互作用的自旋 $1$ 哈密顿量。我们使用基于对称的透视和微观计算来探索这个双轨道模型中的磁电效应，超越了单轨道情况的广义 Katsura-Nagaosa-Balatsky 理论。我们的工作可能与 Ni$X_2$ 及相关材料的掺杂、应变或压力研究相关。", "authors": [{"name": "YuZheng Xie"}, {"name": "Manoj Gupta"}, {"name": "Arun Paramekanti"}, {"name": "Tanusri Saha-Dasgupta"}], "featured_authors": [{"name": "YuZheng Xie"}, {"name": "Manoj Gupta"}, {"name": "Arun Paramekanti"}, {"name": "Tanusri Saha-Dasgupta"}], "author_count": 4}, {"id": "2606.02730", "category": "cond-mat", "title": "Anharmonic lattice dynamics and superconductivity in strained bulk and surface niobium", "abstract": "Using first-principles calculations, we investigate how homogeneous strain and crystallographic surface orientation modify the vibrational and superconducting properties of niobium. For bulk Nb, tensile strain strongly softens the phonon spectrum and enhances the electron--phonon coupling, increasing the superconducting transition temperature from 9.5 K at equilibrium to 14.5 K at $\\sim\\!6\\%$ lattice expansion. For the low-index Nb(001), Nb(110), and Nb(111) surfaces, harmonic phonon calculations exhibit imaginary modes, showing that anharmonic lattice effects are essential. To treat these effects efficiently, we train Nb-specific machine-learning interatomic potentials on bulk and slab first-principles configurations and use them to accelerate stochastic self-consistent harmonic approximation calculations, thereby obtaining anharmonically renormalized phonon modes that are combined with density-functional perturbation theory electron--phonon matrix elements to construct the Eliashberg spectral function. Among the clean free-standing slabs considered here, Nb(001) exhibits the strongest electron--phonon coupling and the highest calculated transition temperature of 10.0 K, while Nb(110) and Nb(111) show progressively reduced pairing strength. Finally, by analyzing the Eliashberg spectral function and the functional derivative $\\delta T_\\text{c}/\\delta\\alpha^2F(\\omega)$, we identify the phonon energy ranges most effective for superconducting pairing. Our results show that strain, surface termination, and anharmonic phonon renormalization provide complementary and interrelated microscopic routes for tuning superconductivity in Nb.", "url": "https://arxiv.org/abs/2606.02730", "type": "理论+数值", "summary": "利用第一性原理计算，我们研究均匀应变和晶体表面取向如何改变铌的振动和超导特性。对于块体 Nb，拉伸应变强烈软化声子谱并增强电子-声子耦合，将超导转变温度从平衡时的 9.5 K 提高到 $\\sim\\!6\\%$ 晶格膨胀时的 14.5 K。对于低指数 Nb(001)、Nb(110) 和 Nb(111) 表面，谐波声子计算呈现虚模，表明非谐波晶格效应至关重要。为了有效地处理这些效应，我们在体和板第一原理配置上训练铌特定的机器学习原子间势，并用它们来加速随机自洽谐波近似计算，从而获得非谐重正化声子模式，与密度泛函微扰理论电子声子矩阵元素相结合来构造Eliashberg谱函数。\n\n在此考虑的干净独立板中，Nb(001) 表现出最强的电子-声子耦合和计算出的最高转变温度 10.0 K，而 Nb(110) 和 Nb(111) 表现出逐渐降低的配对强度。最后，通过分析 Eliashberg 谱函数和函数导数 $\\delta T_\\text{c}/\\delta\\alpha^2F(\\omega)$，我们确定了对超导配对最有效的声子能量范围。我们的结果表明，应变、表面终止和非谐波声子重正化为调节铌超导性提供了互补且相互关联的微观途径。", "authors": [{"name": "Mihir Ranjan Sahoo"}, {"name": "Roman Lucrezi"}, {"name": "Pedro Nunes Ferreira"}, {"name": "Chia-Nien Tsai"}, {"name": "Matthew Julian"}, {"name": "Rohit P. Prasankumar"}, {"name": "Mahmoud I. Hussein"}, {"name": "Christoph Heil"}], "featured_authors": [{"name": "Mihir Ranjan Sahoo"}, {"name": "Roman Lucrezi"}, {"name": "Pedro Nunes Ferreira"}, {"name": "Rohit P. Prasankumar"}, {"name": "Mahmoud I. Hussein"}, {"name": "Christoph Heil"}], "author_count": 8}, {"id": "2606.02760", "category": "cond-mat", "title": "Optoelectronics and Magnetic properties calculation of RE2MnNiO6 (RE=La-Lu,Y) using Density Functional Theory", "abstract": "RE2NiMnO6 (RE = La-Lu) family of ordered double-perovskite oxides hosts a corner-sharing network of alternating NiO6 and MnO6 octahedra whose electronic and magnetic ground states are systematically governed by the A-site ionic radius through the lanthanide contraction. The strong localisation of RE 4f electrons poses a fundamental challenge to density-functional treatments, yet the hybridisation between 4f and neighbouring 5d (RE) or 3d (Ni, Mn) states is central to the origin of exchange interactions and optoelectronic response across the series. We present a comprehensive first-principles study of the electronic structure, lattice dynamics, and optical properties of representative RE2NiMnO6 compounds within the DFT+U framework. To disentangle the role of Kondo-type 4f - d hybridisation, calculations are performed with the RE 4f electrons treated both as frozen core states and explicitly in the valence manifold, enabling a direct assessment of their contribution to the band structure, dielectric function, and phonon dispersion. Spin-polarised calculations reveal significant spin-channel asymmetry, with magnetic moments reaching up to 30 {\\mu}B per formula unit for select members of the series. The results establish a unified picture of how 4f occupancy and octahedral distortion collectively determine the magnetic and optoelectronic potential of this double-perovskite family.", "url": "https://arxiv.org/abs/2606.02760", "type": "理论+数值", "summary": "RE2NiMnO6 (RE = La-Lu) 系列有序双钙钛矿氧化物具有交替的 NiO6 和 MnO6 八面体的角共享网络，其电子和磁性基态通过镧系元素收缩由 A 位离子半径系统地控制。 RE 4f 电子的强烈局域化对密度泛函处理提出了根本性的挑战，但 4f 和邻近的 5d (RE) 或 3d (Ni, Mn) 态之间的杂化是整个系列中交换相互作用和光电响应的起源的核心。我们在 DFT+U 框架内对代表性 RE2NiMnO6 化合物的电子结构、晶格动力学和光学性质进行了全面的第一性原理研究。为了阐明近藤型 4f - d 杂化的作用，使用既被视为冻结核心态又被明确地处理为价流形的 RE 4f 电子进行计算，从而能够直接评估它们对能带结构、介电函数和声子色散的贡献。\n\n自旋极化计算揭示了显着的自旋通道不对称性，对于该系列的选定成员，每个公式单元的磁矩高达 30 {\\mu}B。结果建立了一个统一的图景，说明 4f 占有率和八面体畸变如何共同决定这个双钙钛矿家族的磁和光电势。", "authors": [{"name": "Debidutta Pradhan"}], "featured_authors": [{"name": "Debidutta Pradhan"}], "author_count": 1}, {"id": "2606.02766", "category": "cond-mat", "title": "Spin-$s$ model with competing interactions on diamond-decorated lattices", "abstract": "We investigate the ground state properties, magnetization, and low-temperature thermodynamics of the ferromagnetic-antiferromagnetic spin-$s$ model on diamond-decorated lattices with ideal diamond units, incorporating bilinear Heisenberg and higher-order exchange interactions between diagonal spins-$\\sigma$. Local conservation of the composite spin on each diamond diagonal enables exact analysis. For the pure Heisenberg case, the system undergoes a series of $2\\sigma$ transitions between monomer-dimer (MD), ferrimagnetic (Ferri) and ferromagnetic (F) phases with different optimal composite spin values as the coupling ratio varies. In the presence of higher-order interactions, a multicritical point exists where the states with all possible values of composite spin are degenerate, leading to maximal ground state degeneracy. The case $s=\\sigma=1$ with bilinear and biquadratic interactions is studied in detail. Its phase diagram comprises three phases - F, Ferri and MD, which meet at a triple point. On the phase boundaries, the ground state becomes macroscopically degenerate. For the diamond chain, we calculate the ground state degeneracy exactly; for higher dimensions, the problem maps onto a bond percolation framework, solved numerically. The residual entropy per spin reaches up to $60\\%$ of the maximal value, peaking at the triple point. Low-temperature magnetization curves in external magnetic fields exhibit plateaus and jumps. The excitation spectrum is gapped in the MD phase, gapless in the F phase, and resembles that of the Lieb-Mattis ferrimagnet in the Ferri phase. The high residual entropy suggests potential applications in ultra-low-temperature cooling and quantum thermal machines.", "url": "https://arxiv.org/abs/2606.02766", "type": "理论+数值", "summary": "我们研究了具有理想金刚石单元的金刚石装饰晶格上的铁磁-反铁磁自旋-$s$模型的基态特性、磁化强度和低温热力学，结合了双线性海森堡和对角自旋-$\\sigma$之间的高阶交换相互作用。每个菱形对角线上复合自旋的局部守恒可以实现精确分析。对于纯海森堡情况，随着耦合比的变化，系统在单体二聚体 (MD)、亚铁磁 (Ferri) 和铁磁 (F) 相之间经历一系列 $2\\sigma$ 转变，具有不同的最佳复合自旋值。在存在高阶相互作用的情况下，存在一个多临界点，其中具有所有可能的复合自旋值的状态都简并，导致最大基态简并。详细研究了具有双线性和双二次相互作用的 $s=\\sigma=1$ 情况。其相图包含三相 - F、Ferri 和 MD，它们在三相点处相交。在相边界上，基态在宏观上变得简并。\n\n对于钻石链，我们精确计算了基态简并度；对于更高维度，问题映射到键渗流框架上，并通过数值求解。每次旋转的残余熵达到最大值的 $60\\%$，在三相点处达到峰值。外部磁场中的低温磁化曲线表现出平台和跳跃。激发光谱在 MD 相中是有间隙的，在 F 相中是无间隙的，并且类似于费里相中的利布-马蒂斯亚铁磁体。高残余熵表明其在超低温冷却和量子热机中的潜在应用。", "authors": [{"name": "D. V. Dmitriev"}, {"name": "V. Ya. Krivnov"}, {"name": "O. A. Vasilyev"}], "featured_authors": [{"name": "D. V. Dmitriev"}, {"name": "V. Ya. Krivnov"}, {"name": "O. A. Vasilyev"}], "author_count": 3}, {"id": "2606.02793", "category": "cond-mat", "title": "Skyrmion and meron phases induced by spin-phonon coupling", "abstract": "In chiral magnets, magnetic skyrmions are typically stabilized by the competition between exchange and Dzyaloshinskii-Moriya interactions under an external magnetic field, while the role of lattice degrees of freedom has received comparatively less attention. Here we study how spin-phonon (SP) coupling modifies magnetic interactions and the resulting spin textures in a two-dimensional skyrmion model in the square lattice. Using Monte Carlo simulations, we compare two simplified models describing the SP coupling: the Einstein site-phonon (ESP) and bond-phonon (BP) models. We find that ESP coupling stabilizes skyrmion crystals in field regimes that are topologically trivial in the uncoupled model and also induces additional textures, including meron-antimeron (M-aM) crystals and mixed skyrmion-bimeron (SkX-Bm) phases. Furthermore, for sufficiently strong phonon coupling, the conventional triple-$\\textbf{q}$ hexagonal skyrmion lattice is distorted into a double-$\\textbf{q}$ square skyrmion lattice. Overall, our results show that lattice effects provide a simple mechanism to tune topological magnetic phases.", "url": "https://arxiv.org/abs/2606.02793", "type": "理论+数值", "summary": "在手性磁体中，磁性斯格明子通常通过外部磁场下交换和 Dzyaloshinskii-Moriya 相互作用之间的竞争来稳定，而晶格自由度的作用相对较少受到关注。在这里，我们研究自旋声子 (SP) 耦合如何改变方晶格中二维斯格明子模型中的磁相互作用以及由此产生的自旋纹理。使用蒙特卡罗模拟，我们比较了描述 SP 耦合的两个简化模型：爱因斯坦位点声子 (ESP) 和键声子 (BP) 模型。我们发现 ESP 耦合可以稳定场状态中的斯格明子晶体，这些场状态在非耦合模型中拓扑微不足道，并且还会产生额外的纹理，包括 meron-antitimeron (M-aM) 晶体和混合斯格明子-bimeron (SkX-Bm) 相。此外，为了获得足够强的声子耦合，传统的三$\\textbf{q}$六方斯格明子晶格被扭曲为双$\\textbf{q}$方形斯格明子晶格。总的来说，我们的结果表明晶格效应提供了一种调整拓扑磁相的简单机制。", "authors": [{"name": "E. Iroulart"}, {"name": "F. A. Gómez Albarracín"}, {"name": "H. Diego Rosales"}], "featured_authors": [{"name": "E. Iroulart"}, {"name": "F. A. Gómez Albarracín"}, {"name": "H. Diego Rosales"}], "author_count": 3}, {"id": "2606.02794", "category": "cond-mat", "title": "Scaling Laws for Neural-Network Quantum States", "abstract": "Scaling laws, the power-law relations between loss, architecture size, and compute observed in modern neural networks, offer a quantitative way to characterize the complexity of a learning problem, with the exponent governing the decay of the loss reflecting how rapidly additional resources translate into improved accuracy, and thus how hard the target is to learn. Whether an analogous framework can characterize the complexity of physical problems remains open. We address this question for Neural-Network Quantum States, a leading variational approach for strongly correlated quantum many-body systems. Using transformer wave functions to approximate ground states of the $J_1$-$J_2$ Heisenberg model on triangular and square lattices with up to $20\\times 20$ sites, we find that the $V$-score, a measure of accuracy of a variational state, decays as a power law in training compute. Under an appropriate rescaling of compute, results for different system sizes collapse onto a single curve, analogous to scaling collapse in critical phenomena. The resulting power law is, to a good approximation, independent of the number of sites, showing that the transformer Ansatz is size-consistent for the systems considered. The exponent decreases systematically with frustration, identifying it as a quantitative measure of representational difficulty of the ground state and establishing scaling laws as a general framework for benchmarking variational ansätze.", "url": "https://arxiv.org/abs/2606.02794", "type": "理论+数值", "summary": "缩放定律，即现代神经网络中观察到的损失、架构大小和计算之间的幂律关系，提供了一种定量方法来表征学习问题的复杂性，控制损失衰减的指数反映了额外资源转化为提高的准确性的速度，以及目标学习的难度。类似的框架是否可以描述物理问题的复杂性仍然悬而未决。我们通过神经网络量子态解决这个问题，这是一种用于强相关量子多体系统的领先变分方法。使用变换器波函数来近似三角形和方形晶格上 $J_1$-$J_2$ 海森堡模型的基态，最多具有 $20\\times 20$ 位点，我们发现 $V$ 分数（变分状态准确性的度量）在训练计算中按照幂律衰减。在适当的计算调整下，不同系统大小的结果会崩溃到一条曲线上，类似于关键现象中的缩放崩溃。\n\n由此产生的幂律在很大程度上近似，与站点数量无关，表明变压器 Ansatz 对于所考虑的系统在尺寸上是一致的。指数因挫折而系统地下降，将其确定为基态表征难度的定量度量，并建立标度定律作为变分分析基准的一般框架。", "authors": [{"name": "Riccardo Rende"}, {"name": "Alessandro Sinibaldi"}, {"name": "Luciano Loris Viteritti"}, {"name": "Roeland Wiersema"}, {"name": "Antoine Georges"}, {"name": "Giuseppe Carleo"}], "featured_authors": [{"name": "Riccardo Rende"}, {"name": "Alessandro Sinibaldi"}, {"name": "Luciano Loris Viteritti"}, {"name": "Roeland Wiersema"}, {"name": "Antoine Georges"}, {"name": "Giuseppe Carleo"}], "author_count": 6}, {"id": "2606.02808", "category": "cond-mat", "title": "Structural glasses model using disorder fields: the boson peak from local ground states", "abstract": "We show the emergence of a contribution characteristic of the boson peak in the spectral density of structural glasses. To model the vitreous state, we consider static density-fluctuation fields coupled to a multiplicative quenched disorder. Performing an ensemble average over all disorder realizations, a functional series representation of the average free energy is obtained. In this series representation of the average free energy for the glassy state of matter, we identify in the function space effective actions. These effective actions present a large number of metastable states and ground states. Random first-order transition, widely discussed in the literature as a description of the transition from the supercooled liquid to the glassy state of matter, emerges naturally in our formalism. We establish the connection between the use of hyperbolic differential equations with random coefficients and the presence of many ground states in the average free energy. This connection allows us to study emergent excitations in such amorphous materials.", "url": "https://arxiv.org/abs/2606.02808", "type": "理论", "summary": "我们展示了玻色子峰在结构玻璃光谱密度中的贡献特征的出现。为了模拟玻璃体状态，我们考虑与乘性猝灭紊乱耦合的静态密度涨落场。对所有无序实现进行系综平均，获得平均自由能的函数级数表示。在物质玻璃态平均自由能的这一系列表示中，我们确定了函数空间中的有效作用。这些有效的作用呈现出大量的亚稳态和基态。随机一阶转变在文献中广泛讨论，作为对物质从过冷液体到玻璃态转变的描述，自然地出现在我们的形式主义中。我们建立了具有随机系数的双曲微分方程的使用与平均自由能中许多基态的存在之间的联系。这种联系使我们能够研究此类非晶材料中的紧急激发。", "authors": [{"name": "M. M. Balbino"}, {"name": "I. P. de Freitas"}, {"name": "A. M. S. Macedo"}, {"name": "G. Krein"}, {"name": "N. F. Svaiter"}], "featured_authors": [{"name": "M. M. Balbino"}, {"name": "I. P. de Freitas"}, {"name": "A. M. S. Macedo"}, {"name": "G. Krein"}, {"name": "N. F. Svaiter"}], "author_count": 5}, {"id": "2606.02845", "category": "cond-mat", "title": "Phase transitions through excited-state level crossings and topological indicators: the case of the XXZ chain with staggered Ising interaction", "abstract": "We combine two ways of determining the phase diagram of the spin-$1/2$ XXZ chain with a staggered Ising interaction and uniform transverse exchange, based on exact diagonalization. The model realizes a competition between Néel order and bond-dimerized phases generated by the alternating Ising interaction. The simplest approach to determine the phase boundaries is to use topological indicators based on generalized position operators. We show that in general, the bosonized and numerical results for the topological indicators agree. The second is based on crossings of excited energy levels and justified by conformal-field theory. In spite of the partial loss of translational symmetry caused by the alternating Ising interaction, we find that the latter method provides an accurate determination of the boundary between Néel and dimerized phases. Instead, while the jumps of a topological indicator provide a qualitatively correct phase diagram, its accuracy is affected when the gap is very small (or the correlation length very large) at one side of the transition, as we show using field-theoretical arguments. The combination of both methods provides a more efficient way of calculating phase diagrams for correlated one-dimensional models than other widely used conventional approaches.", "url": "https://arxiv.org/abs/2606.02845", "type": "理论+数值", "summary": "我们结合了两种方法来确定自旋 $1/2$ XXZ 链的相图，并基于精确对角化，具有交错伊辛相互作用和均匀横向交换。该模型实现了由交替伊辛相互作用产生的尼尔有序相和键二聚相之间的竞争。确定相边界的最简单方法是使用基于广义位置算子的拓扑指示符。我们表明，总的来说，拓扑指标的玻色化结果和数值结果是一致的。第二个基于激发能级的交叉并由共形场理论证明。尽管交替伊辛相互作用导致平移对称性部分丧失，但我们发现后一种方法可以准确确定尼尔相和二聚相之间的边界。相反，虽然拓扑指示符的跳跃提供了定性上正确的相图，但当过渡一侧的间隙非常小（或相关长度非常大）时，其准确性会受到影响，正如我们使用场论论证所示的那样。\n\n与其他广泛使用的传统方法相比，两种方法的结合提供了一种更有效的计算相关一维模型相图的方法。", "authors": [{"name": "B. F. Márquez"}, {"name": "K. Hallberg"}, {"name": "A. A. Aligia"}], "featured_authors": [{"name": "B. F. Márquez"}, {"name": "K. Hallberg"}, {"name": "A. A. Aligia"}], "author_count": 3}, {"id": "2606.02851", "category": "cond-mat", "title": "Shift current conductivity in monolayer SnS: a tight-binding analysis", "abstract": "We investigate the bulk photovoltaic effect in monolayer SnS using an effective tight-binding model derived from first-principles calculations. By comparing short-range and long-range hopping models, we show that the essential features of the shift current conductivity are captured by a minimal model. The shift current is decomposed into transition intensity and shift vector, enabling identification of dominant interband transitions. The comparison reveals that long-range hopping processes quantitatively modify the peak positions and magnitudes, while the short-range model retains the characteristic low-energy structure of the nonlinear response. Our findings provide a transparent framework for understanding and designing bulk photovoltaic effects in two-dimensional materials.", "url": "https://arxiv.org/abs/2606.02851", "type": "理论+数值", "summary": "我们使用源自第一原理计算的有效紧束缚模型研究了单层 SnS 中的体光伏效应。通过比较短程和长程跳跃模型，我们表明最小模型捕获了位移电流电导率的基本特征。移位电流被分解为跃迁强度和移位矢量，从而能够识别主要的带间跃迁。比较表明，长程跳跃过程定量地修改了峰值位置和幅度，而短程模型保留了非线性响应的特征低能量结构。我们的研究结果为理解和设计二维材料中的体光伏效应提供了一个透明的框架。", "authors": [{"name": "Yuki Kusunoki"}, {"name": "Tomoaki Kameda"}, {"name": "Katsunori Wakabayashi"}], "featured_authors": [{"name": "Yuki Kusunoki"}, {"name": "Tomoaki Kameda"}, {"name": "Katsunori Wakabayashi"}], "author_count": 3}, {"id": "2606.02853", "category": "cond-mat", "title": "Undulatory forcing of an intruder through granular media: effects of frequency and packing fraction", "abstract": "We investigate the motion amid grains of an intruder undergoing an imposed force that oscillates with a given frequency. For that, we made use of discrete numerical simulations where the intruder was a larger disk on which a force oscillating in direction was applied, and the grains consisted of smaller disks. All disks were placed on a surface with basal friction over which they could slide, the system was confined in the sliding directions, and we varied the system packing fraction, oscillation frequency, and magnitude of the forcing. The results show intermittent and very complex motions of the intruder depending on both the packing fraction and frequency of oscillation: it can move sideways while slowly progressing forward, it can be blocked during a long period after and/or before start moving, or it can simply be blocked after a given time. Interestingly, we find that the displacement velocity is much higher when the system packing fraction is above a given threshold, contrary to intuition. The results show that there is an optimal frequency that minimizes the transit time for some ranges of packing fraction, and we propose a model based on the system elasticity that explains this behavior and agrees with the numerical simulations. Our findings shed new light on how to better explore oscillating motion to move objects within granular media.", "url": "https://arxiv.org/abs/2606.02853", "type": "理论+数值", "summary": "我们研究了入侵者颗粒之间的运动，该入侵者受到以给定频率振荡的外加力。为此，我们利用离散数值模拟，其中入侵者是一个较大的圆盘，在其上施加了方向振荡的力，而颗粒则由较小的圆盘组成。所有圆盘都放置在具有基础摩擦力的表面上，它们可以在其上滑动，系统在滑动方向上受到限制，并且我们改变了系统填充分数、振荡频率和力的大小。结果显示，入侵者的间歇性且非常复杂的运动取决于堆积分数和振荡频率：它可以在缓慢向前行进的同时向侧面移动，它可以在开始移动之后和/或之前的很长一段时间内被阻挡，或者它可以在给定时间之后简单地被阻挡。有趣的是，我们发现当系统填充分数高于给定阈值时，位移速度要高得多，这与直觉相反。\n\n结果表明，存在一个最佳频率，可以最小化某些填充分数范围的传输时间，并且我们提出了一个基于系统弹性的模型，该模型解释了这种行为并与数值模拟一致。我们的发现为如何更好地探索振荡运动以在颗粒介质中移动物体提供了新的思路。", "authors": [{"name": "Douglas Daniel de Carvalho"}, {"name": "Erick de Moraes Franklin"}], "featured_authors": [{"name": "Douglas Daniel de Carvalho"}, {"name": "Erick de Moraes Franklin"}], "author_count": 2}, {"id": "2606.02930", "category": "cond-mat", "title": "Fast Tensor Network Imaginary Time Evolution by Implicit Stepping on Logarithmic Grids", "abstract": "We present a new method for the efficient imaginary time evolution of quantum many-body wavefunctions represented by matrix product states (MPS). We first show that logarithmic time grids are sufficient to resolve long imaginary time dynamics, yielding an exponential reduction in the number of time steps compared with standard approaches. We then show that A-stable implicit time-stepping methods for ordinary differential equations allow stable propagation for any time step size. The resulting scheme requires only matrix-vector products and linear solves, standard operations in the MPS toolbox. We validate our approach with two examples: a Heisenberg spin chain, which we use to demonstrate a speedup of several orders of magnitude over the standard time-dependent variational principle method with uniform time steps, and a single-site Anderson impurity model with a metallic bath, for which propagation to large imaginary times allows one to observe the exponential dependence of the Kondo temperature on the interaction strength.", "url": "https://arxiv.org/abs/2606.02930", "type": "理论+数值", "summary": "我们提出了一种新方法，用于以矩阵积态（MPS）表示的量子多体波函数的有效虚时间演化。我们首先证明，对数时间网格足以解决长虚时间动态，与标准方法相比，时间步数呈指数减少。然后我们证明常微分方程的 A 稳定隐式时间步长方法允许任何时间步长的稳定传播。生成的方案仅需要矩阵向量乘积和线性求解以及 MPS 工具箱中的标准操作。我们用两个例子验证了我们的方法：海森堡自旋链，我们用它来证明比具有统一时间步长的标准瞬态变分原理方法有几个数量级的加速；以及带有金属浴的单点安德森杂质模型，其中传播到大虚数时间允许人们观察近藤温度对相互作用强度的指数依赖性。", "authors": [{"name": "John P. Zima"}, {"name": "E. Miles Stoudenmire"}, {"name": "Steven R. White"}, {"name": "Olivier Parcollet"}, {"name": "Jason Kaye"}], "featured_authors": [{"name": "John P. Zima"}, {"name": "E. Miles Stoudenmire"}, {"name": "Steven R. White"}, {"name": "Olivier Parcollet"}, {"name": "Jason Kaye"}], "author_count": 5}, {"id": "2606.02988", "category": "cond-mat", "title": "Effective scatterings and universal clusters of heteronuclear ultracold mixtures in quasi-low dimensions", "abstract": "We study the effective s-wave scattering of two heteronuclear atoms harmonically confined in quasi-low dimensions, where the atoms have unequal masses and are subject to different confinement frequencies. The resulting effective scattering parameters in low dimensions, including scattering length and effective range, are derived as functions of three-dimensional scattering parameters and confinement strengths. Using realistic Li-K and Li-Cr mixtures as examples, we further compute the binding energies of universal $(1+N)$ clusters in quasi-low dimensions using the effective scattering parameters. Our findings suggest a promising pathway for practically observing universal clusters and their associated many-body phases in low-dimensional ultracold heteronuclear systems.", "url": "https://arxiv.org/abs/2606.02988", "type": "理论", "summary": "我们研究了和谐限制在准低维度中的两个异核原子的有效横波散射，其中原子具有不等的质量并且受到不同的限制频率。由此产生的低维有效散射参数（包括散射长度和有效范围）是作为三维散射参数和限制强度的函数导出的。以现实的 Li-K 和 Li-Cr 混合物为例，我们使用有效散射参数进一步计算准低维中通用 $(1+N)$ 团簇的结合能。我们的研究结果提出了一条在低维超冷异核系统中实际观察通用星团及其相关多体相的有前途的途径。", "authors": [{"name": "Tingting Shi"}, {"name": "Xiaoling Cui"}], "featured_authors": [{"name": "Tingting Shi"}, {"name": "Xiaoling Cui"}], "author_count": 2}, {"id": "2606.02999", "category": "cond-mat", "title": "Relaxation of the Random Site Coulomb glass Model in Two Dimensions", "abstract": "This study investigates the influence of material density, disorder in onsite energies, and localization length on relaxation dynamics within a two-dimensional random site Coulomb glass model at half-filling. To explore relaxation laws, we calculate the eigenvalue distribution of the linear dynamical matrix using mean-field approximations. Our findings indicate that the system initially undergoes rapid relaxation through energy-lowering transitions. The depletion of the single-particle density of states (DOS) near the Fermi level leads to slow relaxation, with fluctuations diminishing according to a power law. Subsequently, the system adheres to an exponential decay law after a specific period, defined as the relaxation time, which is inversely related to the minimum eigenvalue of the dynamical matrix. As the density of the system decreases, the relaxation rate slows down, resulting in an increase in the relaxation time. For a constant density and localization length, an increase in the disorder of onsite energies results in a longer relaxation time. A significant portion of the eigenvalue spectrum remains unaffected, suggesting that a reduction in localization length concurrent with increased disorder may play an equally vital role in the slow dynamics observed.", "url": "https://arxiv.org/abs/2606.02999", "type": "理论", "summary": "本研究研究了半填充时二维随机位点库仑玻璃模型中材料密度、现场能量无序和局域长度对弛豫动力学的影响。为了探索松弛定律，我们使用平均场近似计算线性动力矩阵的特征值分布。我们的研究结果表明，系统最初通过能量降低转变经历快速弛豫。费米能级附近单粒子态密度（DOS）的耗尽导致缓慢弛豫，波动根据幂律减小。随后，系统在特定时期（定义为弛豫时间）后遵循指数衰减定律，该时期与动态矩阵的最小特征值成反比。随着系统密度的降低，弛豫速率减慢，导致弛豫时间增加。对于恒定的密度和局域长度，现场能量无序性的增加会导致弛豫时间更长。\n\n特征值谱的很大一部分保持不变，这表明局部长度的减少与无序性的增加同时发生，可能在观察到的缓慢动态中发挥着同样重要的作用。", "authors": [{"name": "Preeti Bhandari"}, {"name": "Vikas Malik"}], "featured_authors": [{"name": "Preeti Bhandari"}, {"name": "Vikas Malik"}], "author_count": 2}, {"id": "2606.03016", "category": "cond-mat", "title": "Attractive Hopfions and Bimerons in Thin Films of Chiral Magnets: Cluster Formation and Lattice Instability in the Conical Phase", "abstract": "We investigate the energetics, interactions, and ordering tendencies of bimerons (cholesteric fingers of the second type, CF--2) and hopfions in thin films of chiral magnets and chiral liquid crystals hosting a conical background state. Although isolated bimerons possess positive eigen-energy with respect to the conical phase, they develop an attractive interaction mediated by the restructuring and partial overlap of their positive-energy shells, i.e., intermediate regions formed relative to the conical state. This attraction promotes the formation of bound pairs and extended bimeron chains, even in parameter regimes where a periodic bimeron lattice is no longer thermodynamically stable. Extending the analysis to three dimensions, we show that circularization of bimerons into hopfions renders their energy finite and gives rise to a well-defined metastability window closely linked to the stability range of cholesteric fingers. Isolated hopfions likewise exhibit an attractive interaction within the conical phase, leading to the formation of hexagonally ordered clusters. The attraction originates from the competition between favorable and unfavorable twist regions and from the energetic cost of the shell structures imposed by the conical background. Despite the presence of attractive pair potentials and cluster formation, we demonstrate that hexagonal hopfion lattices do not exhibit an equilibrium lattice period. Instead, the system evolves toward states in which the conical spiral or the CF--1 phase (cholesteric fingers of the first type) progressively invade the inter-soliton regions, thereby preventing crystallization. Our results reveal a regime of attraction without stable long-range order and clarify the interplay between topology, confinement, and conical-phase frustration in chiral magnet and liquid-crystal thin films.", "url": "https://arxiv.org/abs/2606.03016", "type": "理论", "summary": "我们研究了具有圆锥形背景态的手性磁体和手性液晶薄膜中双聚体（第二类胆甾指，CF--2）和hopfion的能量学、相互作用和有序趋势。尽管孤立的双聚体具有相对于圆锥相的正本征能量，但它们通过其正能量壳层的重组和部分重叠（即相对于圆锥态形成的中间区域）而产生吸引相互作用。这种吸引力促进了束缚对和延伸双聚物链的形成，即使在周期性双聚物晶格不再热力学稳定的参数状态下也是如此。将分析扩展到三个维度，我们表明，双聚体环化为 hopfion 使其能量有限，并产生与胆甾指的稳定性范围密切相关的明确的亚稳态窗口。孤立的hopfion同样在锥形相内表现出有吸引力的相互作用，导致形成六边形有序簇。\n\n这种吸引力源于有利和不利扭曲区域之间的竞争以及圆锥形背景所施加的壳结构的能量成本。尽管存在吸引对势和簇形成，我们证明六方霍普芬晶格不表现出平衡晶格周期。相反，系统演化为圆锥螺旋或CF--1相（第一类胆甾指）逐渐侵入孤子间区域，从而阻止结晶的状态。我们的结果揭示了一种没有稳定长程有序的吸引机制，并阐明了手性磁体和液晶薄膜中的拓扑、限制和锥形相挫败之间的相互作用。", "authors": [{"name": "Andrey O. Leonov"}, {"name": "Takayuki Shigenaga"}], "featured_authors": [{"name": "Andrey O. Leonov"}, {"name": "Takayuki Shigenaga"}], "author_count": 2}, {"id": "2606.03041", "category": "cond-mat", "title": "Geometric aspects of spin transport in magnetic multilayers", "abstract": "We discuss spin-dependent transfer-matrix formalism applied to magnetic multilayers in geometric terms. Starting from the stationary Schrödinger equation rewritten as a first-order spatial evolution problem, we interpret the transfer matrix as a path-ordered exponential and relate its matching-matrix construction to a noncompact group constraint. We thenconnect the induced Möbius action on reflection matrices to an Iwasawa decomposition, identify Weyl-chamber variables as the minimal noncompact transport invariants, and show how torque-related spin structures arise from compact-sector and commutator contributions. A sequence of multilayer examples illustrates the transition from pure spin filtering to controlled spin-orbit mixing and the resulting deformation of Weyl-chamber trajectories. We finally comment on the extension to higher-dimensional internal spaces relevant to orbital transport and realistic calculations.", "url": "https://arxiv.org/abs/2606.03041", "type": "理论+数值", "summary": "我们以几何术语讨论应用于磁性多层的自旋相关转移矩阵形式。从重写为一阶空间演化问题的平稳薛定谔方程开始，我们将传递矩阵解释为路径有序指数，并将其匹配矩阵构造与非紧群约束相关联。然后，我们将反射矩阵上的诱导莫比乌斯作用与岩泽分解联系起来，将韦尔室变量识别为最小非紧输运不变量，并展示与扭矩相关的自旋结构如何由紧扇区和换向器贡献产生。一系列多层示例说明了从纯自旋过滤到受控自旋轨道混合的转变以及由此产生的韦尔室轨迹的变形。最后，我们评论了与轨道传输和实际计算相关的高维内部空间的扩展。", "authors": [{"name": "Valentin Fadeev"}], "featured_authors": [{"name": "Valentin Fadeev"}], "author_count": 1}, {"id": "2606.03053", "category": "cond-mat", "title": "Multiferroicity in the two-dimensional limit in hexagonal LuFeO3 films", "abstract": "Multiferroic oxides, which combine coupled ferroelectric and magnetic orders, are central to understanding correlated quantum phenomena. Yet, as thickness approaches the two-dimensional (2D) limit, both ferroelectricity and magnetism are conventionally expected to vanish due to depolarization fields and finite-size effects, respectively. Here, we demonstrate that hexagonal LuFeO3 (h-LuFeO3) retains coupled ferroelectricity and magnetism at the 2D limit, with a thickness of just one and a half unit cells. Remarkably, the ferroelectric polarization remains comparable to bulk values at room temperature, while long-range magnetism and magnetoelectric coupling persist at low temperatures. We further show that the K3 phonon mode, which mediates the polarization-magnetism coupling, is stable down to the 2D limit. Our results establish h-LuFeO3 as the first oxide system to exhibit genuine 2D-limit multiferroicity, providing a fundamental breakthrough in the long-standing quest to understand and control coupled ferroic orders at the atomic scale.", "url": "https://arxiv.org/abs/2606.03053", "type": "理论", "summary": "多铁氧化物结合了耦合的铁电和磁序，是理解相关量子现象的核心。然而，当厚度接近二维 (2D) 极限时，通常预计铁电性和磁性会因去极化场和有限尺寸效应而分别消失。在这里，我们证明六方 LuFeO3 (h-LuFeO3) 在二维极限下保留了耦合的铁电性和磁性，且厚度仅为一个半晶胞。值得注意的是，铁电极化在室温下仍然与体积值相当，而长程磁性和磁电耦合在低温下仍然存在。我们进一步表明，介导偏振磁耦合的 K3 声子模式在低至 2D 极限的情况下是稳定的。我们的研究结果表明，h-LuFeO3 是第一个表现出真正的二维极限多铁性的氧化物系统，为理解和控制原子尺度耦合铁序的长期探索提供了根本性突破。", "authors": [{"name": "Huilin Lai"}, {"name": "Junyu Tan"}, {"name": "Jinfeng Zhai"}, {"name": "Yang Shi"}, {"name": "Lili Feng"}, {"name": "Huanyu Zhang"}, {"name": "Chuanrui Huo"}, {"name": "Chuhang Liu"}, {"name": "Lijun Wu"}, {"name": "Lifeng Yin"}, {"name": "Hangwen Guo"}, {"name": "Jun Chen"}, {"name": "Xiaoshan Xu"}, {"name": "Jun Zhao"}, {"name": "Yimei Zhu"}, {"name": "Shiqing Deng"}, {"name": "Wenbin Wang"}, {"name": "Jian Shen"}], "featured_authors": [{"name": "Huilin Lai"}, {"name": "Junyu Tan"}, {"name": "Jinfeng Zhai"}, {"name": "Shiqing Deng"}, {"name": "Wenbin Wang"}, {"name": "Jian Shen"}], "author_count": 18}, {"id": "2606.03124", "category": "cond-mat", "title": "Many-Body Non-Hermitian Physics in the Generalized Brillouin Zone", "abstract": "The breakdown of conventional bulk-boundary correspondence (BBC) in non-Hermitian system can be resolved by the generalized Brillouin zone (GBZ) theory. However, extending the GBZ theory to interacting many-body systems remains an open problem. Here, we consider an interacting non-Hermitian model characterized by a circular GBZ. We show that, based on a GBZ transformation, a quasi-reciprocal many-body Hamiltonian can be constructed which, under periodic boundary conditions (PBC), captures the physics of the original non-Hermitian model under open boundary conditions (OBC). Using exact diagonalization (ED), we determine the phase diagram for the quasi-reciprocal many-body Hamiltonian by computing the Zak phase and the structure factor of the charge-density-wave (CDW) phase. We further investigate the entanglement properties and find that the degeneracy of the low-lying entanglement spectrum characterizes each phase in the phase diagram. These findings demonstrate that the topological properties in interacting non-Hermitian system is encoded in the entanglement spectrum of the quasi-reciprocal model. Our work establishes a route to studying many-body non-Hermitian physics within the GBZ formalism.", "url": "https://arxiv.org/abs/2606.03124", "type": "理论+数值", "summary": "非厄米系统中传统体边界对应（BBC）的失效可以通过广义布里渊区（GBZ）理论来解决。然而，将 GBZ 理论扩展到相互作用的多体系统仍然是一个悬而未决的问题。在这里，我们考虑一个以圆形 GBZ 为特征的交互非埃尔米特模型。我们证明，基于 GBZ 变换，可以构造准互易多体哈密顿量，它在周期性边界条件（PBC）下捕获开放边界条件（OBC）下原始非厄米模型的物理特性。使用精确对角化 (ED)，我们通过计算 Zak 相位和电荷密度波 (CDW) 相位的结构因子来确定准互易多体哈密顿量的相图。我们进一步研究了纠缠性质，发现低位纠缠谱的简并性表征了相图中的每个相。这些发现表明，相互作用的非厄米系统的拓扑性质被编码在准互易模型的纠缠谱中。\n\n我们的工作建立了一条在 GBZ 形式主义内研究多体非厄米物理学的途径。", "authors": [{"name": "Chaoze Lu"}, {"name": "Chuanshu Xu"}, {"name": "Zhenghao Yang"}, {"name": "Xiancong Lu"}], "featured_authors": [{"name": "Chaoze Lu"}, {"name": "Chuanshu Xu"}, {"name": "Zhenghao Yang"}, {"name": "Xiancong Lu"}], "author_count": 4}, {"id": "2606.03193", "category": "cond-mat", "title": "Generation and time evolution of anomalous Floquet Majorana flat edge modes in two-dimensional noncolinear magnet-superconductor heterostructures", "abstract": "We theoretically investigate the realization of gapless Floquet topological superconducting phases in a two-dimensional magnet-superconductor heterostructure (2D Shiba lattice) in the presence of a harmonic drive implemented in the chemical potential. Employing a real-space tight-binding model, we obtain both the regular $0$- and anomalous $\\pi$-Floquet Majorana flat edge modes (FMFEMs) in the quasi-energy spectrum. We also study the real-time evolution of the FMFEMs and analyze their local density of states in the presence of such a periodic drive. The topological characterization is performed using the winding number, exploiting the chiral symmetry of the equivalent bulk effective momentum-space Hamiltonian. This is also supported by the corresponding edge state spectra. Furthermore, we employ the Brillouin-Wigner (BW) and Floquet perturbation theory (FPT) to gain analytical insight into the problem. We compare our exact (numerical), BW, and FPT results in terms of the quasi-energy spectra obtained across different frequency regimes. We find good agreement between the exact numerical, BW, and FPT results in the higher-frequency and high-amplitude domain, particularly close to the $0$-quasi-energy modes.", "url": "https://arxiv.org/abs/2606.03193", "type": "理论+数值", "summary": "我们从理论上研究了在化学势中实现谐波驱动的情况下，二维磁超导异质结构（2D Shiba 晶格）中无间隙 Floquet 拓扑超导相的实现。采用实空间紧束缚模型，我们在准能谱中获得了规则的 $0$- 和异常的 $\\pi$-Floquet Majorana 平边模式 (FMFEM)。我们还研究了 FMFEM 的实时演化，并分析了在存在这种周期性驱动的情况下它们的局部状态密度。利用绕数进行拓扑表征，利用等效体有效动量空间哈密顿量的手性对称性。相应的边缘态谱也支持了这一点。此外，我们采用布里渊-维格纳 (BW) 和 Floquet 微扰理论 (FPT) 来深入分析该问题。我们根据在不同频率范围内获得的准能谱来比较我们的精确（数字）、BW 和 FPT 结果。\n\n我们发现在较高频率和高振幅域中，精确的数值、BW 和 FPT 结果之间具有良好的一致性，特别是接近 0$ 准能量模式。", "authors": [{"name": "Kamalesh Bera"}, {"name": "Priyanka Mohan"}, {"name": "Arijit Saha"}], "featured_authors": [{"name": "Kamalesh Bera"}, {"name": "Priyanka Mohan"}, {"name": "Arijit Saha"}], "author_count": 3}, {"id": "2606.03235", "category": "cond-mat", "title": "Monte-Carlo study of Compositional Heterogeneity in Multicomponent Cluster Crystals", "abstract": "Soft (sub)micron-sized particles with bounded interactions can form cluster crystals, periodic structures in which multiple particles occupy the same lattice site. While the thermodynamics of monodisperse cluster crystals is well understood, less is known about how compositional disorder affects their stability. Using Monte Carlo simulations and density functional theory we show that binary cluster crystals undergo a density driven transition from a homogeneous mixed state to a heterogeneous ``alloy\" like solid in which lattice sites spontaneously differentiate into populations with distinct compositions and occupancies while preserving the underlying crystal symmetry. The transition is accompanied by a sharp increase in the equilibrium lattice site density and by increased compositional fluctuations, but we see no evidence for macroscopic phase separation. We demonstrate that this transition is governed by competition between clustering and demixing instabilities and derive a simple scaling law for the demixing density as a function of temperature, composition, and particle size mismatch, in quantitative agreement with simulation.", "url": "https://arxiv.org/abs/2606.03235", "type": "理论+数值", "summary": "具有有限相互作用的软（亚）微米尺寸颗粒可以形成簇晶体，这是多个颗粒占据相同晶格位置的周期性结构。虽然单分散簇晶体的热力学已广为人知，但对于成分无序如何影响其稳定性却知之甚少。使用蒙特卡罗模拟和密度泛函理论，我们表明二元簇晶体经历了从均匀混合态到异质“合金”状固体的密度驱动转变，其中晶格位点自发分化为具有不同组成和占据的群体，同时保留了基本的晶体对称性。这种转变伴随着平衡晶格位点密度的急剧增加和成分波动的增加，但我们没有看到宏观相分离的证据。我们证明这种转变是由团簇和分层不稳定性之间的竞争控制的并推导出分层密度随温度、成分和粒度失配变化的简单标度定律，与模拟结果定量一致。", "authors": [{"name": "Roshan Maharana"}, {"name": "Daan Frenkel"}, {"name": "Jure Dobnikar"}], "featured_authors": [{"name": "Roshan Maharana"}, {"name": "Daan Frenkel"}, {"name": "Jure Dobnikar"}], "author_count": 3}, {"id": "2606.03300", "category": "cond-mat", "title": "A proof of an identity for the critical exponents of jamming", "abstract": "Within the full replica-symmetry-breaking (fullRSB) solution of dense hard spheres in infinite dimension, Charbonneau, Kurchan, Parisi, Urbani, and Zamponi (CKPUZ; J.Stat.Mech.P10009, 2014) introduced three critical exponents $a$, $b$, $c$ governing the matching region of the fullRSB profile near the jamming transition. These exponents satisfy two scaling relations. The first, $b=(1+c)/2$, was established analytically by the diffusion-drift balance in the scaling ansatz. The second, $a+b=1$, was observed numerically to arbitrary precision but could not be proven. The exponents $a,b,c$ of the scaling fullRSB ansatz are related to the physical exponents $\\alpha, \\theta, \\kappa$ that control the gap, force, and overlap distributions by the relations $\\alpha=a/b$, $\\theta=(c-a)/(b-c)$, $\\kappa=c+1$. Crucially, the relation $a+b=1$ yields the scaling relations $\\alpha=1/(2+\\theta)$ and $\\kappa=2-2/(3+\\theta)$ predicted on independent grounds by the mechanical-marginal-stability arguments of Wyart and collaborators. Here, we give an analytic proof of the identity $a+b=1$ from the scaling fullRSB equations. The proof was obtained through interaction with Claude (Sonnet 4.6 and Opus 4.7) and verified by us.", "url": "https://arxiv.org/abs/2606.03300", "type": "理论+数值", "summary": "在无限维致密硬球的完全复制对称破缺 (fullRSB) 解决方案中，Charbonneau、Kurchan、Parisi、Urbani 和 Zamponi (CKPUZ; J.Stat.Mech.P10009, 2014) 引入了三个关键指数 $a$、$b$、$c$ 来控制干扰过渡附近 fullRSB 轮廓的匹配区域。这些指数满足两个比例关系。第一个$b=(1+c)/2$，是通过缩放模拟中的扩散-漂移平衡分析建立的。第二个 $a+b=1$ 可以以任意精度进行数值观察，但无法得到证明。缩放 fullRSB ansatz 的指数 $a,b,c$ 与通过关系 $\\alpha=a/b$、$\\theta=(c-a)/(b-c)$、$\\kappa=c+1$ 控制间隙、力和重叠分布的物理指数 $\\alpha、\\theta、\\kappa$ 相关。至关重要的是，关系 $a+b=1$ 产生了缩放关系 $\\alpha=1/(2+\\theta)$ 和 $\\kappa=2-2/(3+\\theta)$，这是 Wyart 及其合作者的机械边缘稳定性论证在独立基础上预测的。在这里，我们通过缩放 fullRSB 方程给出了恒等式 $a+b=1$ 的解析证明。\n\n该证明是通过与Claude（Sonnet 4.6和Opus 4.7）互动获得的，并由我们验证。", "authors": [{"name": "Giorgio Parisi"}, {"name": "Francesco Zamponi"}], "featured_authors": [{"name": "Giorgio Parisi"}, {"name": "Francesco Zamponi"}], "author_count": 2}, {"id": "2606.03325", "category": "cond-mat", "title": "Role of Characteristic Length Scale in Interface Graphitization-Induced Wear Resistance of Diamond and Amorphous Carbon", "abstract": "The evolution of interfacial atomic structures critically influences the friction and wear behavior of carbon-based materials. However, how the characteristic length scale of friction-induced sp\\textsuperscript{2} reconstruction governs macroscopic wear remains poorly understood, particularly for diamond and amorphous carbon where the interfacial graphitization modes differ fundamentally. In this work, we develop a machine learning potential for these carbon systems and investigate the structural evolution at interfaces in both diamond/diamond and amorphous/amorphous carbon systems using molecular dynamics simulations. Our results reveal distinct atomic-scale characteristics of graphitization at the two interfaces. Diamond interfaces develop a laterally continuous sp\\textsuperscript{2} reconstruction layer with a characteristic length of 30--45~Å, while amorphous carbon interfaces form only fully isolated sp\\textsuperscript{2} patches of 8--12~Å. This disparity in characteristic length scale determines the density of weakly bonded interfacial atoms left outside the reconstruction layer, thereby directly dictating the macroscopic wear rate. Based on these insights, we propose a strategy to regulate friction-induced graphitization in diamond coatings by protecting specific crystallographic orientations, such as the (111) close-packed planes. This work bridges the gap between atomic-scale interfacial structure and macroscopic tribological performance, offering mechanistic guidelines for the rational design of wear-resistant carbon-based coatings.", "url": "https://arxiv.org/abs/2606.03325", "type": "理论+数值", "summary": "界面原子结构的演变严重影响碳基材料的摩擦和磨损行为。然而，摩擦引起的 sp\\textsuperscript{2} 重建的特征长度尺度如何控制宏观磨损仍然知之甚少，特别是对于界面石墨化模式根本不同的金刚石和无定形碳。在这项工作中，我们开发了这些碳系统的机器学习潜力，并使用分子动力学模拟研究了金刚石/金刚石和非晶/非晶碳系统界面的结构演化。我们的结果揭示了两个界面石墨化的不同原子尺度特征。金刚石界面形成横向连续的sp\\textsuperscript{2}重构层，其特征长度为30--45~Å，而无定形碳界面仅形成8--12~Å的完全孤立的sp\\textsuperscript{2}斑块。这种特征长度尺度的差异决定了重构层外部的弱键合界面原子的密度，从而直接决定了宏观磨损率。\n\n基于这些见解，我们提出了一种通过保护特定晶体取向（例如（111）密排平面）来调节金刚石涂层中摩擦引起的石墨化的策略。这项工作弥合了原子尺度界面结构和宏观摩擦学性能之间的差距，为耐磨碳基涂层的合理设计提供了机械指南。", "authors": [{"name": "WenLiang Shi"}, {"name": "YanYu Zhang"}, {"name": "WenZheng Liao"}, {"name": "Kai Xu"}, {"name": "HongYu Wu"}, {"name": "ZhiCheng Zhong"}, {"name": "KeKe Chang"}], "featured_authors": [{"name": "WenLiang Shi"}, {"name": "YanYu Zhang"}, {"name": "WenZheng Liao"}, {"name": "HongYu Wu"}, {"name": "ZhiCheng Zhong"}, {"name": "KeKe Chang"}], "author_count": 7}, {"id": "2606.03403", "category": "cond-mat", "title": "Drag-induced skin effect in a Bose-Fermi mixture", "abstract": "The non-Hermitian skin effect (NHSE) represents one of the most distinctive phenomena in non-Hermitian physics. Here, we uncover a new drag-induced NHSE mechanism in interacting Bose--Fermi mixtures where only bosons and not fermions experience asymmetric hoppings. %While bosons exhibit intrinsic skin localization due to asymmetric hopping, fermions remain Hermitian in isolation and do not independently support NHSE. We show that strong Bose--Fermi interactions enable fermions to inherit boundary accumulation through correlated bound states. %In the few-body regime, The interplay of interactions, quantum statistics, and non-Hermitian dynamics gives rise to an interaction-induced blockade mechanism, leading to highly asymmetric fermionic transport. We demonstrate that the drag-induced NHSE is dynamically stable and propose a feasible realization in ultracold Bose--Fermi mixtures with Floquet-engineered asymmetric tunneling. Our results establish a general interaction-mediated mechanism for emergent non-Hermitian localization in hybrid quantum matter.", "url": "https://arxiv.org/abs/2606.03403", "type": "理论", "summary": "非厄米趋肤效应（NHSE）代表了非厄米物理学中最独特的现象之一。在这里，我们发现了相互作用的玻色-费米混合物中一种新的阻力诱导的 NHSE 机制，其中只有玻色子而不是费米子经历不对称跳跃。虽然玻色子由于不对称跳跃而表现出内在的皮肤定位，但费米子仍然处于孤立状态，并且不独立支持 NHSE。我们表明，强的玻色-费米相互作用使费米子能够通过相关的束缚态继承边界积累。在少体体系中，相互作用、量子统计和非厄米动力学的相互作用产生了相互作用引起的封锁机制，从而导致高度不对称的费米子输运。我们证明了阻力引起的 NHSE 是动态稳定的，并提出了在超冷 Bose-Fermi 混合物中与 Floquet 设计的不对称隧道效应的可行实现。我们的结果为混合量子物质中的新兴非厄米局域化建立了一种通用的相互作用介导机制。", "authors": [{"name": "Wenjie Liu"}, {"name": "Ching Hua Lee"}, {"name": "Yi Qin"}], "featured_authors": [{"name": "Wenjie Liu"}, {"name": "Ching Hua Lee"}, {"name": "Yi Qin"}], "author_count": 3}, {"id": "2606.03405", "category": "cond-mat", "title": "Quantum annealing for materials", "abstract": "Finding the global minimum of a potential energy surface is a fundamental challenge in materials science, with applications ranging from protein folding to cluster physics and, more broadly, to systems in which the number of (meta)stable configurations grows prohibitively large. In recent decades, quantum annealing (QA) has emerged as a promising global optimization strategy, exploiting quantum fluctuations in contrast to the thermal fluctuations that drive its classical counterpart. Here, we introduce a novel implementation of QA based on path-integral molecular dynamics, an efficient and well-established framework for sampling the quantum nuclear density without the need to manipulate many-body wavefunctions explicitly. While retaining the flexibility and simplicity of molecular dynamics simulations, this quantum-annealing protocol delivers strong performance across a wide range of atomic systems, simulated by either empirical force fields or machine-learning interatomic potentials. The method can be used either as a global optimizer of the potential-energy surface, or as a quantum-informed structure-search strategy in which nuclear quantum effects are included directly in the optimization workflow -- a feature particularly relevant for materials such as high-pressure hydrides.", "url": "https://arxiv.org/abs/2606.03405", "type": "数值", "summary": "寻找势能面的全局最小值是材料科学中的一项基本挑战，其应用范围从蛋白质折叠到簇物理学，更广泛地说，到（亚）稳定构型数量增长得惊人的系统。近几十年来，量子退火（QA）已成为一种有前途的全局优化策略，它利用量子涨落，而不是驱动其经典对应物的热涨落。在这里，我们介绍了一种基于路径积分分子动力学的 QA 新颖实现，这是一种有效且完善的框架，用于对量子核密度进行采样，而无需显式操作多体波函数。在保留分子动力学模拟的灵活性和简单性的同时，这种量子退火协议在通过经验力场或机器学习原子间势进行模拟的各种原子系统中提供了强大的性能。\n\n该方法既可以用作势能表面的全局优化器，也可以用作量子信息结构搜索策略，其中核量子效应直接包含在优化工作流程中——这一功能与高压氢化物等材料特别相关。", "authors": [{"name": "Alfredo Fiorentino"}, {"name": "Nicola Marzari"}], "featured_authors": [{"name": "Alfredo Fiorentino"}, {"name": "Nicola Marzari"}], "author_count": 2}, {"id": "2606.03426", "category": "cond-mat", "title": "Criticality and Quench Dynamics at the Anderson Transition of a Chern Insulator", "abstract": "We study the critical properties of the topological Anderson phase transition in a strongly disordered Chern insulator, separating the topological phase from a trivial Anderson insulator. We show that the transition is characterized by a non-zero electrical conductance and by the emergence of a critical length scale in the real-space profile of the local Chern marker. From this, we extract the correlation-length and the dynamical critical exponents, which are consistent with those of non-interacting models of the integer quantum Hall effect. We then ramp the disorder strength across the transition and study the ensuing dynamics. In contrast to clean topological systems, we find that the excitation density does not follow the Kibble-Zurek scaling. The non-equilibrium length scale associated with the local Chern marker is decoupled from the generation of excitations. For studied system sizes, we find it to be close to the Kibble-Zurek prediction for the topological-to-trivial quench, while it deviates from it for the reverse direction.", "url": "https://arxiv.org/abs/2606.03426", "type": "理论", "summary": "我们研究了强无序陈绝缘体中拓扑安德森相变的关键特性，将拓扑相与平凡的安德森绝缘体分开。我们表明，这种转变的特点是非零电导以及局部陈标记的真实空间轮廓中出现临界长度尺度。由此，我们提取了相关长度和动态临界指数，这与整数量子霍尔效应的非相互作用模型一致。然后，我们在整个转变过程中增加无序强度并研究随后的动态。与干净的拓扑系统相比，我们发现激发密度不遵循 Kibble-Zurek 缩放比例。与局部陈标记相关的非平衡长度尺度与激励的产生分离。对于研究的系统尺寸，我们发现它接近拓扑到平凡淬灭的 Kibble-Zurek 预测，而在相反方向则偏离它。", "authors": [{"name": "Lara Ulčakar"}, {"name": "Jernej Mravlje"}, {"name": "Gal Lemut"}, {"name": "Tomaž Rejec"}], "featured_authors": [{"name": "Lara Ulčakar"}, {"name": "Jernej Mravlje"}, {"name": "Gal Lemut"}, {"name": "Tomaž Rejec"}], "author_count": 4}, {"id": "2606.03438", "category": "cond-mat", "title": "Populating topologically protected edge states of a Chern insulator with the cold-atom elevator scheme and measurements", "abstract": "Two-dimensional Chern insulators support topologically protected, chiral edge currents, and these can be detected in experiments with ultracold atoms in optical lattices. It has previously been shown that one can populate a selected group of edge states of a Chern insulator by transferring particles from a reservoir. Here, we numerically investigate the effect of performing an instantaneous, projective measurement on the reservoir before the reservoir is discarded. In this way, the final state of the system is pure and described by a wavefunction. We also show that quite likely measurement outcomes can help to increase the final number or percentage of particles in the chiral edge states through postselection. Without the measurement step, the physics can be described in terms of single-particle physics. The measurement significantly complicates the description. By appropriately rewriting the analytical expressions, we show that measurement probabilities, expectation values, averages of expectation values, and purity can nevertheless be computed from the state before the measurement in a way that scales only linearly with the number of lattice sites for a fixed number of particles. This enables us to investigate a setup with, for instance, 14 particles and 198 lattice sites numerically. The approach applies generally to noninteracting, fermionic models that conserve the number of particles.", "url": "https://arxiv.org/abs/2606.03438", "type": "实验", "summary": "二维陈绝缘体支持拓扑保护的手性边缘电流，这些电流可以在光学晶格中的超冷原子实验中检测到。先前已经表明，可以通过从储存库转移粒子来填充陈绝缘体的一组选定的边缘态。在这里，我们通过数值研究在废弃储层之前对储层进行瞬时投影测量的效果。这样，系统的最终状态是纯的并由波函数描述。我们还表明，很可能的测量结果有助于通过后选择增加手性边缘态粒子的最终数量或百分比。如果没有测量步骤，物理学可以用单粒子物理学来描述。测量使描述变得非常复杂。通过适当地重写解析表达式，我们表明测量概率、期望值、期望值平均值和纯度仍然可以从测量之前的状态计算出来，其方式仅与固定数量粒子的晶格位置数量成线性比例。\n\n这使我们能够对具有 14 个粒子和 198 个晶格位点的装置进行数值研究。该方法通常适用于保留粒子数量的非相互作用费米子模型。", "authors": [{"name": "Toke Marstrand Pontoppidan Lindhard"}, {"name": "Anne E. B. Nielsen"}], "featured_authors": [{"name": "Toke Marstrand Pontoppidan Lindhard"}, {"name": "Anne E. B. Nielsen"}], "author_count": 2}, {"id": "2606.03445", "category": "cond-mat", "title": "Predicting the conditions for observing the Mpemba effect", "abstract": "The Mpemba effect, a counterintuitive phenomenon where a hotter system relaxes faster than a colder one, has been widely observed in various nonequilibrium systems. Despite this progress, the fundamental structural features of the energy landscape required for its emergence remain a subject of debate. In this study, we investigate the conditions for the Mpemba effect within one-dimensional overdamped Langevin dynamics. We classify the potential landscapes based on the presence of single or double wells, their symmetry properties, and the existence of walls. We establish that the existence of the effect is primarily driven by the presence of boundaries, either hard or soft, rather than the specific internal structure of the potential landscape, such as metastability or the number of minima. By employing a spectral decomposition of the Fokker-Planck operator, we analyze the behavior of the first nontrivial eigenmode and demonstrate that its derivative acts as a Dirac delta peak in the low-temperature regime. This helps us elucidate the mechanism underlying the Mpemba effect: it appears as the interplay between this behavior and the initial population dynamics in a non-trivial way induced by the presence of the wall. Our analysis provides a unified classification across single- and double-well potentials, highlighting the crucial role of boundary conditions and asymmetry. Furthermore, we demonstrate that this framework allows for the engineering of potential landscapes capable of producing multistage Mpemba transitions.", "url": "https://arxiv.org/abs/2606.03445", "type": "理论", "summary": "姆彭巴效应是一种违反直觉的现象，即较热的系统比较冷的系统弛豫得更快，已在各种非平衡系统中广泛观察到。尽管取得了这些进展，但其出现所需的能源格局的基本结构特征仍然是一个争论的话题。在本研究中，我们研究了一维过阻尼朗之万动力学中 Mpemba 效应的条件。我们根据单井或双井的存在、它们的对称性以及墙壁的存在对潜在景观进行分类。我们确定，该效应的存在主要是由硬边界或软边界的存在驱动的，而不是潜在景观的特定内部结构，例如亚稳态或最小值的数量。通过采用 Fokker-Planck 算子的谱分解，我们分析了第一非平凡本征模的行为，并证明其导数在低温状态下充当狄拉克 δ 峰。\n\n这有助于我们阐明 Mpemba 效应背后的机制：它表现为这种行为与初始种群动态之间的相互作用，以一种不平凡的方式由墙的存在引起。我们的分析提供了单井和双井势的统一分类，强调了边界条件和不对称性的关键作用。此外，我们证明该框架允许对能够产生多阶段 Mpemba 转变的潜在景观进行工程。", "authors": [{"name": "Yue Liu"}, {"name": "Tan Van Vu"}, {"name": "Raphaël Chétrite"}, {"name": "Frédéric van Wijland"}, {"name": "Hisao Hayakawa"}], "featured_authors": [{"name": "Yue Liu"}, {"name": "Tan Van Vu"}, {"name": "Raphaël Chétrite"}, {"name": "Frédéric van Wijland"}, {"name": "Hisao Hayakawa"}], "author_count": 5}, {"id": "2606.03451", "category": "cond-mat", "title": "Magnetic field effects on spin-split band and magnon transport in altermagnets and emergent compensated ferrimagnets", "abstract": "In altermagnets and fully compensated ferrimagnets, not only the electron band but also the magnon band exhibits spin splitting without net magnetization, which enables thermal activation of the magnon spin current. Here, we theoretically investigate magnetic field effects on the magnon properties of these antiferromagnets in the presence of a weak easy-axis anisotropy which makes the collinear states robust against the magnetic field. For the altermagnet and compensated ferrimagnet, we analyze a 2 sublattice order in the $J_1$-$J_2$-$J_2^\\prime$ model on the square lattice and a triple-${\\bf Q}$ 12-sublattice order in the $J_1$-$J_3$ model on the kagome lattice, respectively, each accompanied by $d$-wave and $s$-wave spin splitting at zero field. It is shown that for positive (negative) magnetic field $H$ whose energy scale is smaller than the anisotropy gap, the up- and down-spin magnon bands are shifted to lower (higher) and higher (lower) energies, respectively, similarly to the Zeeman coupling in electron systems. In the altermagnet, with increasing field, the $d$-wave splitting tends to be deformed into the $s$-wave one, which is reflected as the change in the direction of the spin current generated by thermal gradient. In the compensated ferrimagnet, the $s$-wave nature, i.e., the population imbalance between the up- and down-spin magnons at $H=0$, results in an asymmetric field dependence of the longitudinal spin and thermal conductivities.", "url": "https://arxiv.org/abs/2606.03451", "type": "理论", "summary": "在交流磁体和完全补偿的亚铁磁体中，不仅电子带而且磁振子带都表现出自旋分裂，而没有净磁化，这使得磁振子自旋电流能够热激活。在这里，我们从理论上研究了在存在弱易轴各向异性的情况下磁场对这些反铁磁体磁振子特性的影响，这使得共线态对磁场具有鲁棒性。对于交替磁体和补偿亚铁磁体，我们分别分析了方晶格上$J_1$-$J_2$-$J_2^\\prime$模型中的2个子晶格顺序和kagome晶格上$J_1$-$J_3$模型中的三${\\bf Q}$ 12个子晶格顺序，每个子晶格都伴随着零场处的$d$波和$s$波自旋分裂。结果表明，对于能量尺度小于各向异性间隙的正（负）磁场 $H$，上自旋和下自旋磁振子带分别向较低（较高）和较高（较低）能量移动，类似于电子系统中的塞曼耦合。\n\n在交变磁体中，随着磁场的增加，$d$波分裂倾向于变形为$s$波分裂，这反映为热梯度产生的自旋电流方向的变化。在补偿亚铁磁体中，$s$波性质，即$H=0$时上自旋磁振子和下自旋磁振子之间的布居不平衡，导致纵向自旋和热导率的不对称场依赖性。", "authors": [{"name": "Kazushi Aoyama"}, {"name": "Hikaru Kawamura"}], "featured_authors": [{"name": "Kazushi Aoyama"}, {"name": "Hikaru Kawamura"}], "author_count": 2}, {"id": "2606.03452", "category": "cond-mat", "title": "Microscopic derivation of the microstretch theory for carbon nanotubes", "abstract": "Twisted carbon nanotubes support phonons involving not only torsion, naturally associated with microrotation, but also radial breathing, which requires a scalar stretch degree of freedom. We derive an effective microstretch theory for these modes starting from nonlinear elasticity on a cylindrical surface. By linearizing the equation of motion around a uniformly twisted equilibrium configuration, we obtain the dynamical matrix for the twisting, longitudinal, and radial-breathing modes. This matrix coincides with that of a one-dimensional microstretch theory, and the corresponding elastic constants are expressed in terms of the Lamé constants, the nanotube radius, and the twist rate. The twist generates chiral couplings in the effective theory, which hybridize the three modes and open an anticrossing in the phonon dispersion. These results provide a microscopic basis for the microstretch description of phonons in twisted carbon nanotubes and clarify how structural chirality enters the effective couplings.", "url": "https://arxiv.org/abs/2606.03452", "type": "理论", "summary": "扭曲的碳纳米管支持的声子不仅涉及与微旋转自然相关的扭转，而且还涉及径向呼吸，这需要标量拉伸自由度。我们从圆柱表面上的非线性弹性出发，推导出这些模式的有效微拉伸理论。通过对均匀扭曲平衡配置周围的运动方程进行线性化，我们获得了扭曲、纵向和径向呼吸模式的动力学矩阵。该矩阵与一维微拉伸理论的矩阵一致，相应的弹性常数用拉梅常数、纳米管半径和扭曲率表示。在有效理论中，扭曲产生手性耦合，其混合三种模式并在声子色散中打开反交叉。这些结果为扭曲碳纳米管中声子的微拉伸描述提供了微观基础，并阐明了结构手性如何进入有效耦合。", "authors": [{"name": "Naoki Nishimura"}, {"name": "Mamoru Matsuo"}, {"name": "Takeo Kato"}], "featured_authors": [{"name": "Naoki Nishimura"}, {"name": "Mamoru Matsuo"}, {"name": "Takeo Kato"}], "author_count": 3}, {"id": "2606.03473", "category": "cond-mat", "title": "Hierarchical crack patterns: Identification of crack generations", "abstract": "Hierarchical crack patterns of various origins are ubiquitous in the world around us. We reduce the problem of classifying crack generations in an image of a part of the entire hierarchical crack pattern to the well-known topological sorting of a directed acyclic graph. The classification demonstrates robustness to reasonable shifts in the pattern image boundaries.", "url": "https://arxiv.org/abs/2606.03473", "type": "理论", "summary": "各种来源的分层裂纹模式在我们周围的世界中无处不在。我们将整个分层裂纹模式的一部分的图像中的裂纹生成分类问题简化为众所周知的有向无环图的拓扑排序。该分类表现出对图案图像边界合理变化的鲁棒性。", "authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei S. Burmistrov"}, {"name": "Andrei V. Eserkepov"}], "featured_authors": [{"name": "Yuri Yu. Tarasevich"}, {"name": "Andrei S. Burmistrov"}, {"name": "Andrei V. Eserkepov"}], "author_count": 3}, {"id": "2606.03474", "category": "cond-mat", "title": "Multiscale Phase Separation in Chemophoretic Active Matter", "abstract": "Nonreciprocal interactions in active matter provide interesting structure and dynamics. Here we investigate chemophoretic systems in which nonreciprocity arises from the asymmetric coupling between agents: first species produces certain chemicals and the other phoretically responds to it. This leads to phase separation at varying scales. Our study uncovers a re-entrant steady-state phase diagram as the nature of the coupling changes from chemoattractive to chemorepulsive character. Chemoattraction provides sustained domain growth, leading to macrophase separation via cluster coalescence. Aggregation in the chemorepulsive case, on the other hand, leads to a steady-state situation that displays phase separation only at a microscale, owing to strong caging effect and frequent fragmentation. The overall far-from-steady-state dynamics is quantified via calculations of growth exponents, cluster transition matrices, and mean-squared displacements.", "url": "https://arxiv.org/abs/2606.03474", "type": "理论+数值", "summary": "活性物质中的不可逆相互作用提供了有趣的结构和动力学。在这里，我们研究了化学泳动系统，其中非互易性是由试剂之间的不对称耦合引起的：第一个物种产生某些化学物质，而另一个物种则对其做出反应。这导致不同规模的相分离。我们的研究揭示了当耦合的性质从化学吸引特征变为化学脉冲特征时，可重入稳态相图。化学吸引提供持续的域生长，通过簇聚结导致宏观相分离。另一方面，化学脉冲情况下的聚集会导致稳态情况，由于强烈的囚禁效应和频繁的碎片，仅在微尺度上显示相分离。通过计算增长指数、簇转移矩阵和均方位移来量化总体远非稳态动力学。", "authors": [{"name": "Manisha Jhajhria"}, {"name": "Subir K. Das"}, {"name": "Snigdha Thakur"}], "featured_authors": [{"name": "Manisha Jhajhria"}, {"name": "Subir K. Das"}, {"name": "Snigdha Thakur"}], "author_count": 3}, {"id": "2606.03554", "category": "cond-mat", "title": "Constraint-Enhanced Physical Search through Correlation Matching", "abstract": "Physical systems do not merely add noise to search processes; they impose constraints that generate structured correlations. We propose a principle of constraint-enhanced physical search in which temporal correlations in exploration are matched to constraint-induced spatial correlations in the update dynamics. Using a minimal tug-of-war bandit model (TOW), we show that a conservation law converts local observations into differential evidence across alternatives, while a temporally correlated drive controls the order of exploration. Search efficiency is improved not by stronger randomness or by maximal anti-correlation, but by matching the temporal correlation to the physical update scale that converts feedback into evidence. A scaling estimate identifies the update-noise-to-contrast ratio as the leading parameter that limits how strongly temporal anti-correlation can be used. The results suggest a general organizing principle for physical search: constraints and fluctuations can generate structured spatiotemporal correlations, and efficient exploration emerges when these correlations are matched to the update dynamics.", "url": "https://arxiv.org/abs/2606.03554", "type": "理论", "summary": "物理系统不仅会给搜索过程增加噪音，还会给搜索过程带来干扰。它们强加了产生结构化相关性的约束。我们提出了约束增强物理搜索的原理，其中探索中的时间相关性与更新动态中约束引起的空间相关性相匹配。使用最小拔河强盗模型（TOW），我们证明了守恒定律将局部观察结果转换为跨替代方案的差异证据，而时间相关的驱动器控制着探索的顺序。搜索效率的提高不是通过更强的随机性或最大反相关性，而是通过将时间相关性与将反馈转化为证据的物理更新尺度相匹配。缩放估计将更新噪声与对比度识别为限制时间反相关的使用强度的主要参数。结果提出了物理搜索的一般组织原则：约束和波动可以生成结构化的时空相关性，当这些相关性与更新动态相匹配时，就会出现有效的探索。", "authors": [{"name": "Song-Ju Kim"}], "featured_authors": [{"name": "Song-Ju Kim"}], "author_count": 1}, {"id": "2606.03630", "category": "cond-mat", "title": "Two-mode collapse and revival of quantum coherent state in a tilted optical lattice", "abstract": "Collective dynamics is an important out-of-equilibrium feature of quantum coherent states and usually reflects the intrinsic properties of the state. Collapse and revival (CR) dynamics of phase coherence is a well-known example for bosonic coherent states, which is usually induced by applying a quench. Previous studies have shown that the CR frequency is governed solely by interactions, even in the presence of a tilt quench. However, whether such interaction-dominated oscillation is a universal feature remains unknown. In this work, we show that an ensemble of one-dimensional bosons can undergo two-mode CR, with frequencies set by both the interaction and the tilt, particularly when the tilt is weaker than the interaction. The newly discovered tilt mode is enabled by tunneling between lattice sites. When the two modes coexist, the amplitudes of both modes exhibit universal linear scaling for various tilts. These findings clarify the general features of CR dynamics in tilted lattice models and the underlying mechanism, and provide deeper insight into collective dynamics in correlated systems.", "url": "https://arxiv.org/abs/2606.03630", "type": "理论", "summary": "集体动力学是量子相干态的一个重要的非平衡特征，通常反映了状态的内在性质。相位相干性的塌缩与复兴（CR）动力学是玻色相干态的一个众所周知的例子，它通常是通过应用淬灭引起的。先前的研究表明，即使存在倾斜淬灭，CR 频率也仅受相互作用控制。然而，这种相互作用主导的振荡是否是一种普遍特征仍然未知。在这项工作中，我们证明一维玻色子的集合可以经历双模 CR，其频率由相互作用和倾斜设定，特别是当倾斜弱于相互作用时。新发现的倾斜模式是通过晶格位点之间的隧道效应实现的。当两种模式共存时，两种模式的振幅对于各种倾斜都表现出通用的线性缩放。这些发现阐明了倾斜晶格模型中 CR 动力学的一般特征和潜在机制，并为相关系统中的集体动力学提供了更深入的见解。", "authors": [{"name": "Chi-Kin Lai"}, {"name": "Shengjie Jin"}, {"name": "Yuanzhe Hu"}, {"name": "Zhongshu Hu"}, {"name": "Fansu Wei"}, {"name": "Congwen Li"}, {"name": "Tianwei Zhou"}, {"name": "Hepeng Yao"}, {"name": "Xiaoji Zhou"}], "featured_authors": [{"name": "Chi-Kin Lai"}, {"name": "Shengjie Jin"}, {"name": "Yuanzhe Hu"}, {"name": "Tianwei Zhou"}, {"name": "Hepeng Yao"}, {"name": "Xiaoji Zhou"}], "author_count": 9}, {"id": "2606.03710", "category": "cond-mat", "title": "Mechanochemical Nano-Writing of an Atomically Thin Metal", "abstract": "Mechanical energy accelerates many physicochemical processes, including materials syntheses that are hard to produce with thermal energy alone. However, physical understanding connecting applied mechanical forces with internal stresses and ensuing reaction mechanisms is lacking. Here we demonstrate mechanical force-enabled synthesis and nanoscale patterning to metallize a two-dimensional (2D) material, producing an atomically-thin superconducting material. Localized force applied by atomic force microscope tips to van der Waals (vdW) encapsulated stacks of 2D bilayer MoTe2 and adjacent source Pd guides 2D Pd7MoTe2 growth with 50 nm lateral resolution. Force accelerates reaction kinetics exponentially per Eyring's stress-assisted thermal activation model, reducing synthesis temperatures from ~200 °C to near-room temperature. Finite element simulations, density functional theory, and ab-initio grand canonical Monte Carlo calculations show that tip-induced compression facilitates Pd chemisorption to tensile-strained MoTe2 that converts to uniform Pd7MoTe2. This demonstrates a new, generalizable paradigm for nanoscale synthesis of quantum materials, and high-precision engineering of superconductivity.", "url": "https://arxiv.org/abs/2606.03710", "type": "理论+数值", "summary": "机械能加速了许多物理化学过程，包括仅用热能难以生产的材料合成。然而，缺乏将施加的机械力与内应力以及随后的反应机制联系起来的物理理解。在这里，我们演示了机械力合成和纳米级图案化，以金属化二维 (2D) 材料，产生原子级薄的超导材料。原子力显微镜尖端向范德华 (vdW) 封装的 2D 双层 MoTe2 和相邻源 Pd 堆叠施加局部力，以 50 nm 横向分辨率引导 2D Pd7MoTe2 生长。根据 Eyring 的应力辅助热激活模型，力以指数方式加速反应动力学，将合成温度从约 200 °C 降低到接近室温。有限元模拟、密度泛函理论和从头开始的大正则蒙特卡罗计算表明，尖端诱导的压缩促进 Pd 化学吸附到拉伸应变的 MoTe2，从而转化为均匀的 Pd7MoTe2。\n\n这为量子材料的纳米级合成和超导的高精度工程展示了一种新的、可推广的范例。", "authors": [{"name": "Shuai Zhang"}, {"name": "Yanyu Jia"}, {"name": "Atanu Samanta"}, {"name": "Yutian Bao"}, {"name": "Haosen Guan"}, {"name": "Zhaoyi Joy Zheng"}, {"name": "Guangming Cheng"}, {"name": "Ting Liu"}, {"name": "Cangyu Qu"}, {"name": "Kenji Watanabe"}, {"name": "Takashi Taniguchi"}, {"name": "Nan Yao"}, {"name": "Ashlie Martini"}, {"name": "Leslie Schoop"}, {"name": "Andrew M. Rappe"}, {"name": "Sanfeng Wu"}, {"name": "Robert W. Carpick"}], "featured_authors": [{"name": "Shuai Zhang"}, {"name": "Yanyu Jia"}, {"name": "Atanu Samanta"}, {"name": "Andrew M. Rappe"}, {"name": "Sanfeng Wu"}, {"name": "Robert W. Carpick"}], "author_count": 17}, {"id": "2606.03733", "category": "cond-mat", "title": "Mott transition of photons: quantum Monte Carlo study of Gross-Neveu criticality in a cavity", "abstract": "The Hubbard model on the honeycomb lattice is a pristine realisation of a semimetal-to-insulator Mot
