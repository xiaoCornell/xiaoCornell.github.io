B_\\lambda(p,q,t)$ and normalization constants $\\mathcal{N}_\\lambda(p,q,t)$. By solving the elliptic Ruijsenaars-Schneider model perturbatively in the elliptic parameter $p$, a systematic expansion of the index in powers of $p$ is obtained. We check that in various limits, namely a deformed 1/2 BPS limit and the large $N$ limit, our formalism reduces to previously known results.", "url": "https://arxiv.org/abs/2604.00924", "type": "理论", "summary": "我们在 $\\mathcal{N}=4$ $U(N)$ SYM 的超共形索引和椭圆 Ruijsenaars-Schneider 可积系统之间建立了联系。该索引接受椭圆麦克唐纳多项式的表达式，这导致对涉及结构常数 $B_\\lambda(p,q,t)$ 和归一化常数 $\\mathcal{N}_\\lambda(p,q,t)$ 的广义分区进行紧凑求和。通过在椭圆参数 $p$ 中扰动求解椭圆 Ruijsenaars-Schneider 模型，获得了指数 $p$ 幂的系统展开。我们检查在各种限制下，即变形的 1/2 BPS 限制和大的 $N$ 限制，我们的形式主义减少到先前已知的结果。", "authors": [{"name": "Gao-fu Ren"}, {"name": "Min-xin Huang"}], "featured_authors": [{"name": "Gao-fu Ren"}, {"name": "Min-xin Huang"}], "author_count": 2}, {"id": "2604.01005", "category": "hep-th", "title": "Excited solutions in a Skyrme--Chern-Simons model in $2+1$ dimensions", "abstract": "We study excited solutions in a Skyrme--Chern-Simons theory in $2+1$ dimensions. In particular, we emphasize the necessity of using a Lagrange multiplier method to obtain excited solutions, due to the appearance of a discontinuity when using a constraint compliant parametrization. These solutions are characterized by an integer number $p$, excited solutions corresponding to $p\\neq 0$. The dependence of the global charges on the parameters is analyzed, showing non-standard behaviors. We also find that the presence of the Skyrme--Chern-Simons term does not alter significantly the pattern of energy levels, so $p=0$ solutions (fundamental solutions) have always the minimal energy.", "url": "https://arxiv.org/abs/2604.01005", "type": "理论", "summary": "我们研究了 Skyrme--Chern-Simons 理论中 $2+1$ 维度的激发解。特别是，我们强调使用拉格朗日乘子法来获得激发解的必要性，因为在使用符合约束的参数化时会出现不连续性。这些解的特征是整数 $p$，激发解对应于 $p\\neq 0$。分析了全局电荷对参数的依赖性，显示出非标准行为。我们还发现 Skyrme-Chern-Simons 项的存在不会显着改变能级模式，因此 $p=0$ 解（基本解）始终具有最小能量。", "authors": [{"name": "Francisco Navarro-Lérida"}, {"name": "D. H. Tchrakian"}], "featured_authors": [{"name": "Francisco Navarro-Lérida"}, {"name": "D. H. Tchrakian"}], "author_count": 2}, {"id": "2604.01071", "category": "hep-th", "title": "Energy Correlators from Star Integrals via Mellin Space", "abstract": "We explore the Mellin space representation for the collinear limit of $N$-point energy correlators in ${\\cal N}=4$ super-Yang-Mills theory. We show that these correlators can be written as integro-differential operators acting on star integrals: one-loop $n$-gons in $n$ dimensions. For the three-point energy correlator, we obtain the Mellin representation, use it to relate the correlator to the massive box integral, and show how to solve this relation to match with the expected result. For the four-point energy correlator, we obtain the Mellin representation and use it to write the correlator to a sum of various box and hexagon integrals in special kinematics. Our results provide a systematic method to relate higher-point energy correlators in the collinear limit to star integrals, which are known exactly.", "url": "https://arxiv.org/abs/2604.01071", "type": "理论", "summary": "我们探索 ${\\cal N}=4$ super-Yang-Mills 理论中 $N$ 点能量相关器的共线极限的梅林空间表示。我们证明这些相关器可以写成作用于星形积分的积分微分算子：$n$ 维度中的单循环 $n$-gons。对于三点能量相关器，我们获得了 Mellin 表示，用它将相关器与大规模盒积分联系起来，并展示了如何求解该关系以与预期结果匹配。对于四点能量相关器，我们获得梅林表示，并用它将相关器写成特殊运动学中各种盒子和六边形积分的和。我们的结果提供了一种系统方法，将共线极限中的较高点能量相关器与已知的星积分相关联。", "authors": [{"name": "Anastasia Volovich"}, {"name": "Di Wu"}, {"name": "Kai Yan"}], "featured_authors": [{"name": "Anastasia Volovich"}, {"name": "Di Wu"}, {"name": "Kai Yan"}], "author_count": 3}, {"id": "2604.01133", "category": "hep-th", "title": "Cosmological Wavefunctions as Amplitudes: Dual Shuffle Factorization and Uniqueness from New Hidden Zeros", "abstract": "We show that cosmological wavefunctions in $\\phi^n$ theories naturally generalize flat-space $\\mathrm{Tr}(\\phi^3)$ scattering amplitudes: via a simple map from tube variables to Mandelstam invariants, each wavefunction coefficient $\\psi_{\\mathcal{G}}$ becomes an on-shell amplitude-like object $\\mathcal{A}_G$ associated with a generating graph $G$. At tree level these objects coincide with the Cachazo-He-Yuan construction based on Cayley functions that generalizes Parke-Taylor factors. We uncover new graph-based hidden zeros that extend and unify all known cosmological zeros. Based on this zero structure, we uncover a factorization principle dual to unitarity. Instead of factorization across poles, $A\\to A_L\\times A_R$, a zero at $p_{a\\in G_L}\\!\\cdot\\! p_{b\\in G_R}=0$ factorizes the generating graph, $G\\to G_L\\times G_R$, and is equivalent to the shuffle decomposition $\\mathcal{A}_G=\\mathcal{A}_{G_L}\\unicode{x29E2}\\mathcal{A}_{G_R}$. Near-zero factorization is a simple consequence of this new structure. Using dual factorization, we show that locality together with the full set of hidden zeros uniquely fixes tree-level cosmological wavefunctions without assuming unitarity. We show that these zeros are equivalent to special enhanced large-$z$ behavior under Britto-Cachazo-Feng-Witten (BCFW) shifts, extending the zeros--BCFW correspondence beyond flat-space amplitudes. We also find evidence for further extensions of the zero structure and loop-level uniqueness. Our results show that cosmology provides a natural arena for on-shell methods and even reveals new structure in flat-space amplitudes.", "url": "https://arxiv.org/abs/2604.01133", "type": "理论", "summary": "我们证明，$\\phi^n$ 理论中的宇宙波函数自然地概括了平坦空间 $\\mathrm{Tr}(\\phi^3)$ 散射振幅：通过从管变量到曼德尔斯塔姆不变量的简单映射，每个波函数系数 $\\psi_{\\mathcal{G}}$ 成为与生成图 $G$ 相关的壳上振幅类对象 $\\mathcal{A}_G$。在树级别，这些对象与基于概括 Parke-Taylor 因子的 Cayley 函数的 Cachazo-He-Yuan 构造一致。我们发现了新的基于图的隐藏零点，扩展并统一了所有已知的宇宙学零点。基于这个零结构，我们揭示了对偶性因式分解原理。不是跨极点分解，而是 $A\\to A_L\\times A_R$，在 $p_{a\\in G_L}\\!\\cdot\\! 处为零p_{b\\in G_R}=0$ 将生成图 $G\\to G_L\\times G_R$ 因式分解，相当于洗牌分解 $\\mathcal{A}_G=\\mathcal{A}_{G_L}\\unicode{x29E2}\\mathcal{A}_{G_R}$。近零分解是这种新结构的简单结果。使用对偶分解，我们证明了局域性与完整的隐藏零点集一起唯一地修复了树级宇宙波函数，而无需假设幺正性。\n\n我们证明这些零点相当于 Britto-Cachazo-Feng-Witten (BCFW) 位移下特殊增强的大 $z$ 行为，将零点 -BCFW 对应扩展到平坦空间振幅之外。我们还找到了进一步扩展零结构和循环级唯一性的证据。我们的结果表明，宇宙学为壳上方法提供了一个天然的舞台，甚至揭示了平坦空间振幅的新结构。", "authors": [{"name": "Yang Li"}, {"name": "Laurentiu Rodina"}], "featured_authors": [{"name": "Yang Li"}, {"name": "Laurentiu Rodina"}], "author_count": 2}, {"id": "2604.01184", "category": "hep-th", "title": "Infinite Heat Order in 3+1 Dimensions", "abstract": "We investigate whether spontaneous symmetry breaking can persist up to arbitrarily high temperature in ultraviolet-complete quantum field theories in four spacetime dimensions. We focus on completely asymptotically free models with gauge group $\\mathrm{SU}(N_{c1})\\times \\mathrm{SU}(N_{c2})$ and two complex scalar fields, each transforming in the fundamental representation of one gauge factor and singlet under the other. The scalar potential contains quartic self-interactions together with a negative portal coupling between the two sectors. In the Veneziano limit, this class of theories was previously shown to admit fixed-flow trajectories for which one scalar acquires a negative thermal mass at asymptotically large temperature, leading to symmetry non-restoration. Here we extend that analysis to finite numbers of colours and flavours. We derive the finite-$N$ fixed-flow equations, compute the leading $1/N$ corrections to the large-$N$ solutions, and solve the full finite-$N$ system numerically. We find explicit finite-$N$ benchmark theories for which the scalar potential remains bounded from below, the gauge sector is asymptotically free, and one scalar thermal mass stays negative at arbitrarily high temperature. This provides an explicit perturbative example of infinite heat order in a four-dimensional ultraviolet-complete quantum field theory with a finite field content.", "url": "https://arxiv.org/abs/2604.01184", "type": "理论", "summary": "我们研究了在四个时空维度的紫外完全量子场论中自发对称破缺是否可以持续到任意高温。我们专注于具有规范群 $\\mathrm{SU}(N_{c1})\\times \\mathrm{SU}(N_{c2})$ 和两个复标量场的完全渐近自由模型，每个模型都在一个规范因子和另一个规范因子下的单线态的基本表示中进行转换。标量势包含四次自相互作用以及两个扇区之间的负门户耦合。在 Veneziano 极限中，此类理论先前被证明允许固定流动轨迹，其中一个标量在渐近大温度下获得负热质量，导致对称性不可恢复。在这里，我们将该分析扩展到有限数量的颜色和口味。我们推导有限 $N$ 固定流方程，计算大 $N$ 解的前导 $1/N$ 修正，并以数值方式求解完整的有限 $N$ 系统。\n\n我们发现了明确的有限 $N$ 基准理论，其中标量势从下方保持有界，规范扇区渐近自由，并且一个标量热质量在任意高温下保持负值。这提供了具有有限场内容的四维紫外完全量子场论中无限热序的显式微扰示例。", "authors": [{"name": "Borut Bajc"}, {"name": "Giulia Muco"}, {"name": "Francesco Sannino"}, {"name": "Sophie Wagner"}], "featured_authors": [{"name": "Borut Bajc"}, {"name": "Giulia Muco"}, {"name": "Francesco Sannino"}, {"name": "Sophie Wagner"}], "author_count": 4}, {"id": "2604.01225", "category": "hep-th", "title": "On Generalised Discrete Torsion", "abstract": "For a 2d gauged sigma model with target space $M$ and discrete gauge group $G$, we consider a generalisation of Vafa's discrete torsion $H^2(BG; U(1))$ that assigns different local discrete torsion phases to different singular loci of the orbifold $M/G$. Our generalised discrete torsion lives in $H^2_G(M; U(1))$, and gives a consistent implementation of Gaberdiel and Kaste's prescription for inserting such local discrete torsion phases by hand at higher genus. We revisit the original application to $T^6/\\mathbb{Z}_2^2$ and $T^7/\\mathbb{Z}_2^3$ orbifold CFTs, and determine what smooth Calabi-Yau and $G_2$ geometries result from different choices of the generalised discrete torsion. We find that the local discrete torsion phases can be different from each other, but are not completely independent either; in the $T^7/\\mathbb{Z}_2^3$ case for example, the orbifold CFTs only realise 3 out of the 9 possible Betti numbers of $G_2$ resolutions constructed by Joyce.", "url": "https://arxiv.org/abs/2604.01225", "type": "理论", "summary": "对于具有目标空间 $M$ 和离散规范组 $G$ 的二维规范 sigma 模型，我们考虑 Vafa 离散扭转 $H^2(BG; U(1))$ 的推广，它将不同的局部离散扭转相位分配给轨道 $M/G$ 的不同奇异轨迹。我们的广义离散扭转位于 $H^2_G(M; U(1))$ 中，并给出了 Gaberdiel 和 Kaste 的处方的一致实现，用于在更高的亏格处手动插入此类局部离散扭转相位。我们重新审视 $T^6/\\mathbb{Z}_2^2$ 和 $T^7/\\mathbb{Z}_2^3$ orbifold CFT 的原始应用，并确定广义离散扭转的不同选择会产生什么样的平滑 Calabi-Yau 和 $G_2$ 几何形状。我们发现局部离散扭转相位可以彼此不同，但也不完全独立；例如，在 $T^7/\\mathbb{Z}_2^3$ 情况下，orbifold CFT 仅实现了 Joyce 构建的 $G_2$ 分辨率的 9 个可能 Betti 数中的 3 个。", "authors": [{"name": "Philip Boyle Smith"}, {"name": "Yuji Tachikawa"}], "featured_authors": [{"name": "Philip Boyle Smith"}, {"name": "Yuji Tachikawa"}], "author_count": 2}, {"id": "2604.00068", "category": "math-ph", "title": "Exact Solution of Chandrasekhar's H Function For the Isotropic Case", "abstract": "This study provides an exact solution to Chandrasekhar's H function for isotropic scattering. The H function, which is governed by a nonlinear integral equation, plays a central role in radiative transfer theory. To facilitate the solution, the differential form of the integral equation is derived using classical integral techniques. The resulting differential equation is then solved to yield an exact expression for the H function. Numerical results obtained from the exact solution are compared with those reported by Chandrasekhar, and the differences are presented in tabular format.", "url": "https://arxiv.org/abs/2604.00068", "type": "理论", "summary": "这项研究为各向同性散射的钱德拉塞卡 H 函数提供了精确的解。由非线性积分方程控制的 H 函数在辐射传输理论中起着核心作用。为了便于求解，使用经典积分技术导出积分方程的微分形式。然后求解所得的微分方程，得到 H 函数的精确表达式。将精确解获得的数值结果与 Chandrasekhar 报告的结果进行比较，并以表格形式呈现差异。", "authors": [{"name": "Fikret Anli"}], "featured_authors": [{"name": "Fikret Anli"}], "author_count": 1}, {"id": "2604.00165", "category": "math-ph", "title": "Symmetric Nonlinear Cellular Automata as Algebraic References for Rule~30", "abstract": "A comparative algebraic framework for elementary cellular automata is developed, centered on the role of spatial symmetry. The primary object of study is Rule~22, the elementary cellular automaton with algebraic normal form $g(a,b,c)=a\\oplus b\\oplus c\\oplus abc$ over $\\mathcal{F}_2$, the simplest rule combining full $S_3$ symmetry with genuine nonlinearity. Three closed-form results are established: a formula for the support-set cardinality, $|S_m|=2^{\\mathrm{popcount}(\\lfloor m/2 \\rfloor)}\\cdot 3^{m\\bmod 2}$; a two-step recursive construction of the support sets; and the continuous limit as a parabolic reaction--diffusion equation, $\\partial_m u=u_{xx}+2u+u^3$. Rule~22 is then used as a symmetric reference for Rule~30. The symmetry-breaking deviation $\\epsilon(m)=|S_m^{(30)}|-|S_m^{(22)}|$ is empirically consistent with a power-law scaling of the form $m^b$ ($b\\approx 1.11$), quantifying the cumulative effect of replacing the symmetric cubic $abc$ with the asymmetric quadratic $bc$. A mechanism for the apparent randomness of Rule~30's center column is identified through the left-permutive structure and asymmetric Boolean sensitivity profile.", "url": "https://arxiv.org/abs/2604.00165", "type": "理论", "summary": "开发了基本元胞自动机的比较代数框架，以空间对称性的作用为中心。主要研究对象是 Rule~22，即具有代数范式 $g(a,b,c)=a\\oplus b\\oplus c\\oplus abc$ 的基本元胞自动机 $\\mathcal{F}_2$，这是将完整 $S_3$ 对称性与真正非线性相结合的最简单规则。建立了三个封闭形式的结果：支持集基数的公式 $|S_m|=2^{\\mathrm{popcount}(\\lfloor m/2 \\rfloor)}\\cdot 3^{m\\bmod 2}$；支持集的两步递归构造；连续极限为抛物线反应-扩散方程，$\\partial_m u=u_{xx}+2u+u^3$。然后，规则~22 用作规则~30 的对称参考。对称破缺偏差 $\\epsilon(m)=|S_m^{(30)}|-|S_m^{(22)}|$ 在经验上与 $m^b$ 形式的幂律缩放（$b\\approx 1.11$）一致，量化了用不对称二次 $bc$ 替换对称三次 $abc$ 的累积效应。 Rule~30 中心列的明显随机性机制是通过左置换结构和不对称布尔灵敏度分布来识别的。", "authors": [{"name": "E. Chan-López"}, {"name": "A. Martín-Ruiz"}], "featured_authors": [{"name": "E. Chan-López"}, {"name": "A. Martín-Ruiz"}], "author_count": 2}, {"id": "2604.00240", "category": "math-ph", "title": "Local Rank-One Logarithmic Instability for the Mixed Hessian of the Dispersionless Toda $τ$-Function", "abstract": "We study the mixed Hessian of the dispersionless Toda $\\tau$-function for polynomial conformal maps, in scale-free parameters. An explicit logarithmic-kernel identity yields a symmetry-block decomposition of the Hessian, while the analytic input is the inverse-map generating function $U(x;\\zeta)$ and its first dominant singularities. Along a transversal subcritical path approaching a simple critical point, assume that the Taylor branch of $U$ has a unique dominant $s$-orbit of simple square-root branch points and satisfies a uniform continuation hypothesis. Then, for a fixed weighted renormalization of each symmetry block, we prove a local rank-one logarithmic instability: exactly one variational eigenvalue diverges logarithmically, while all higher variational eigenvalues remain bounded. After subtraction of the singular rank-one term, the remainder converges in operator norm to a compact limit. Along Laplacian growth, if the critical crossing occurs before loss of univalence, the same spectral transition precedes geometric breakdown. The result is local rather than global: it isolates the mechanism responsible for the first instability and records an abstract criterion for extension beyond polynomial leaves.", "url": "https://arxiv.org/abs/2604.00240", "type": "理论", "summary": "我们研究了无标度参数中多项式共角映射的无色散 Toda $\\tau$ 函数的混合 Hessian 函数。显式对数核恒等式产生 Hessian 矩阵的对称块分解，而解析输入是逆映射生成函数 $U(x;\\zeta)$ 及其第一个主奇点。沿着接近简单临界点的横向亚临界路径，假设 $U$ 的泰勒分支具有简单平方根分支点的唯一主导 $s$ 轨道，并满足一致连续假设。然后，对于每个对称块的固定加权重整化，我们证明了局部一阶对数不稳定性：恰好有一个变分特征值对数发散，而所有更高的变分特征值仍然有界。减去奇异秩一项后，余数在算子范数中收敛到紧凑极限。沿着拉普拉斯增长，如果临界交叉发生在失去单价之前，则相同的光谱转变先于几何崩溃。\n\n结果是局部的而不是全局的：它隔离了导致第一个不稳定性的机制，并记录了超出多项式叶子的扩展的抽象标准。", "authors": [{"name": "Oleg Alekseev"}], "featured_authors": [{"name": "Oleg Alekseev"}], "author_count": 1}, {"id": "2604.00306", "category": "math-ph", "title": "Localised Davies generators for unbounded operators", "abstract": "A classical Davies generator provides a Lindbladian for which the Gibbs state is stationary. Its construction involves precise knowledge of the Bohr spectrum or equivalently state evolution for all times. Recently Chen, Kastoryano and Gilyen proposed a construction involving localisation in time and carried out it out in the case of finite dimensional Hilbert spaces. The resulting generators are called quantum Gibbs samplers as the corresponding Lindblad is expected to settle to the Gibbs state. In this note, we show that the construction also works for classes of unbounded operators, including pseudodifferential operators used in the study of classical/quantum correspondence in Lindblad evolution.", "url": "https://arxiv.org/abs/2604.00306", "type": "理论", "summary": "经典的戴维斯发生器提供了吉布斯状态静止的 Lindbladian。它的构建涉及到玻尔谱的精确知识或等效的所有时代的状态演化。最近，Chen、Kastoryano 和 Gilyen 提出了一种涉及时间局部化的构造，并在有限维希尔伯特空间的情况下进行了实现。由此产生的发生器被称为量子吉布斯采样器，因为相应的 Lindblad 预计会稳定在吉布斯状态。在这篇文章中，我们表明该构造也适用于无界算子类别，包括林德布拉德进化中经典/量子对应研究中使用的伪微分算子。", "authors": [{"name": "Jeffrey Galkowski"}, {"name": "Maciej Zworski"}], "featured_authors": [{"name": "Jeffrey Galkowski"}, {"name": "Maciej Zworski"}], "author_count": 2}, {"id": "2604.00322", "category": "math-ph", "title": "Disordered Schur Measures", "abstract": "In this paper, we introduce and study random Schur measures whose parameters are sampled from the Circular Unitary Ensemble. We show that Schur measures with CUE disorder exhibit behavior reminiscent of spin glasses.", "url": "https://arxiv.org/abs/2604.00322", "type": "理论", "summary": "在本文中，我们介绍并研究了随机 Schur 测度，其参数是从圆形酉系综中采样的。我们表明，具有 CUE 障碍的 Schur 测量表现出让人想起旋转玻璃的行为。", "authors": [{"name": "Jonathan Novak"}], "featured_authors": [{"name": "Jonathan Novak"}], "author_count": 1}, {"id": "2604.00845", "category": "math-ph", "title": "Spectral sum rules on a $d$--sphere", "abstract": "We derive spectral sum rules for inverse powers of the eigenvalues of the Helmholtz equation on a $d$-sphere in the presence of an arbitrary density. By adopting a rigorous renormalization scheme, we remove the divergent contributions of the zero mode and obtain exact expressions for the sum rules without requiring an explicit determination of the eigenvalues, which is generally impossible. As an application, we derive explicit sum rules for the density $\\Sigma(\\Omega) = 1 + \\kappa Y_{1,\\vec{0}}(\\Omega)$ in $d=3,4,5$ dimensions and compare them with numerical estimates obtained by approximating the low-lying part of the spectrum with the Rayleigh--Ritz method and the high-energy part with Weyl's formula.", "url": "https://arxiv.org/abs/2604.00845", "type": "理论", "summary": "我们推导出任意密度存在的 $d$ 球面上亥姆霍兹方程特征值的反幂的谱和规则。通过采用严格的重整化方案，我们消除了零模式的发散贡献，并获得求和规则的精确表达式，而不需要显式确定特征值，这通常是不可能的。作为一个应用，我们推导了 $d=3,4,5$ 维度中密度 $\\Sigma(\\Omega) = 1 + \\kappa Y_{1,\\vec{0}}(\\Omega)$ 的显式求和规则，并将它们与通过使用 Rayleigh--Ritz 方法近似光谱的低洼部分和使用 Weyl 公式近似高能部分获得的数值估计进行比较。", "authors": [{"name": "Paolo Amore"}], "featured_authors": [{"name": "Paolo Amore"}], "author_count": 1}, {"id": "2604.00847", "category": "math-ph", "title": "Dynkin diagrams, generalized Nahm sums and 2d CFTs", "abstract": "A folklore conjecture states that the Nahm sum associated with a pair of Dynkin diagrams of type $ADET$ is a modular function. In this paper, we extend this conjecture to Dynkin diagrams of type $ABCDEFGT$ in the context of generalized Nahm sums. The modular Nahm sums are closely related to the characters of 2d rational conformal field theories. In this work, we identify many specific generalized Nahm sums with characters of some well-studied 2d CFTs. For example, we find that the generalized Nahm sums associated with $(T_1, C_r)$ and $(T_1,D_r)$ correspond to the supersymmetric Virasoro minimal models $\\mathrm{SM}(4r+6, 4)$ and $\\mathrm{SM}(8r+4, 2)$, respectively.", "url": "https://arxiv.org/abs/2604.00847", "type": "理论", "summary": "民间传说猜想指出，与一对 $ADET$ 类型的 Dynkin 图相关的 Nahm 和是一个模函数。在本文中，我们在广义 Nahm 和的背景下将此猜想扩展到 $ABCDEFGT$ 类型的 Dynkin 图。模Nahm 和与二维有理共形场论的特性密切相关。在这项工作中，我们确定了许多特定的广义 Nahm 和以及一些经过充分研究的 2d CFT 的特征。例如，我们发现与$(T_1, C_r)$和$(T_1,D_r)$相关的广义Nahm和分别对应于超对称Virasoro最小模型$\\mathrm{SM}(4r+6, 4)$和$\\mathrm{SM}(8r+4, 2)$。", "authors": [{"name": "Kaiwen Sun"}, {"name": "Haowu Wang"}], "featured_authors": [{"name": "Kaiwen Sun"}, {"name": "Haowu Wang"}], "author_count": 2}, {"id": "2604.01004", "category": "math-ph", "title": "Regularizations of point charges, the Liénard-Wiechert potential, and the electron self-energy", "abstract": "We apply Colombeau-type regularization to the electromagnetic field of a point-charge and show how the Liénard-Wiechert potential can be derived from a generalized function based on the geometry of Minkowski space. Furthermore, for a charged particle in its rest frame, we discuss the electric monopole, magnetic dipole, electron singularity, and self-energy.", "url": "https://arxiv.org/abs/2604.01004", "type": "理论", "summary": "我们将 Colombeau 型正则化应用于点电荷的电磁场，并展示了如何从基于 Minkowski 空间几何的广义函数导出 Liénard-Wiechert 势。此外，对于静止框架中的带电粒子，我们讨论电单极子、磁偶极子、电子奇点和自能。", "authors": [{"name": "Guenther Hoermann"}, {"name": "Nathalie Tassotti"}], "featured_authors": [{"name": "Guenther Hoermann"}, {"name": "Nathalie Tassotti"}], "author_count": 2}, {"id": "2604.01016", "category": "math-ph", "title": "Toral Chern-Simons TQFT via Geometric Quantization in Real Polarization", "abstract": "We construct toral Chern-Simons theory with gauge group $\\mathbb T=\\mathfrak t/\\Lambda\\cong U(1)^n$ from an even, integral, nondegenerate symmetric bilinear form $K:\\Lambda\\times\\Lambda\\to\\mathbb Z$ by geometric quantization via real polarization. We obtain a unitary extended $(2+1)$-dimensional TQFT by constructing the boundary state spaces and canonical operators and proving that they satisfy the cylinder and gluing axioms. The finite discriminant group $G_K=\\Lambda^*/K\\Lambda$ arises naturally in the theory and controls the genus-$g$ state spaces. At genus one, the theory recovers the finite quadratic data underlying bosonic Abelian topological order.", "url": "https://arxiv.org/abs/2604.01016", "type": "理论", "summary": "我们通过实极化的几何量化，从偶数、积分、非简并对称双线性形式 $K:\\Lambda\\times\\Lambda\\to\\mathbb Z$ 构建了规范群 $\\mathbb T=\\mathfrak t/\\Lambda\\cong U(1)^n$ 的托尔陈-西蒙斯理论。通过构造边界状态空间和规范算子并证明它们满足圆柱公理和粘合公理，我们获得了酉扩展$(2+1)$维TQFT。有限判别群 $G_K=\\Lambda^*/K\\Lambda$ 在理论中自然出现，并控制属-$g$ 状态空间。在属一处，该理论恢复了玻色阿贝尔拓扑序下的有限二次数据。", "authors": [{"name": "Daniel Galviz"}], "featured_authors": [{"name": "Daniel Galviz"}], "author_count": 1}, {"id": "2604.01047", "category": "math-ph", "title": "The Semiclassical Einstein-Klein-Gordon System: Asymptotic Analysis of Minkowski Spacetime", "abstract": "We establish the linear instability of the semiclassical Einstein-Klein-Gordon system linearised about the Minkowski vacuum spacetime. The proof relies on formulating a forcing problem for both metric and state perturbations within the space of past-compact sections. This geometric framework admits a unique tensor decomposition which, in conjunction with the quantum Møller operator, enables the decoupling of the linearised system into two distinct Cauchy problems. Consequently, the metric perturbations are shown to be governed by a higher-order, nonlocal hyperbolic partial differential equation. By relegating the nonlocal contributions to subleading order, we establish the well-posedness of this forcing problem. Furthermore, we provide a rigorous asymptotic analysis for physically admissible choices of the renormalisation constants. We prove that the system exhibits a late-time linear instability: the metric perturbations grow exponentially, bounded strictly by a universal scale H, thereby indicating a quantum backreaction-driven transition toward a de Sitter cosmological spacetime. Provided the parameters governing the system are restricted to a physically relevant regime, this universal scale is compatible with the measured expansion of our universe.", "url": "https://arxiv.org/abs/2604.01047", "type": "理论", "summary": "我们建立了关于闵可夫斯基真空时空的半经典爱因斯坦-克莱因-戈登系统的线性不稳定性。该证明依赖于为过去紧部分的空间内的度量和状态扰动制定一个强制问题。这种几何框架允许独特的张量分解，与量子 Møller 算子相结合，能够将线性化系统解耦为两个不同的柯西问题。因此，度量扰动被证明是由高阶非局部双曲偏微分方程控制的。通过将非局部贡献降级为次主导顺序，我们建立了这个强迫问题的适定性。此外，我们为重正化常数的物理上可接受的选择提供了严格的渐近分析。我们证明该系统表现出后期线性不稳定性：度量扰动呈指数增长，严格受通用尺度 H 限制，从而表明量子反反应驱动的向德西特宇宙学时空的转变。\n\n如果控制系统的参数被限制在物理相关的范围内，那么这个通用尺度与我们测量到的宇宙膨胀是兼容的。", "authors": [{"name": "Stefano Galanda"}, {"name": "Paolo Meda"}, {"name": "Simone Murro"}, {"name": "Nicola Pinamonti"}, {"name": "Gabriel Schmid"}], "featured_authors": [{"name": "Stefano Galanda"}, {"name": "Paolo Meda"}, {"name": "Simone Murro"}, {"name": "Nicola Pinamonti"}, {"name": "Gabriel Schmid"}], "author_count": 5}, {"id": "2604.00033", "category": "quant-ph", "title": "Lindblad-Deformed Spectral Geometry: Heat-Kernel Asymptotics and Effective Spectral Dimension", "abstract": "We introduce a Lindblad-deformed spectral geometric framework in which bounded dissipative data deform a standard spectral triple through the Dirac operator D_gamma = D - igammaSigma, where Sigma = (1/2) sum_k L_k^dagger L_k is constructed from Lindblad jump operators {L_k}. The associated positive operator Q_gamma = D_gamma^* D_gamma = D^2 + gamma^2 Sigma^2 - i*gamma [D, Sigma] is identified as the correct spectral-geometric observable. For smooth endomorphism-valued Lindblad data, Q_gamma is of Laplace type and admits a standard heat-kernel asymptotic expansion with dissipation-modified even Seeley-DeWitt coefficients. For the scalar deformation L = sqrt(gamma) f with f in C^infty(M) real-valued, we prove that the first-order Duhamel correction to the heat trace K_gamma(sigma) = Tr(exp(-sigma Q_gamma)) vanishes identically, so that the first nontrivial dissipative effect appears at order gamma^4. We identify the exact Duhamel-level decomposition of the O(gamma^4) correction into a direct W_2 insertion and a quadratic W_1 x W_1 term. In the round S^2 model we determine the explicit deformed operator and extract the leading local asymptotic contribution of the W_2 sector. We define the effective scale-dependent spectral dimension d_{s,eff}(sigma,gamma) = -2 d/d(log sigma) log K_gamma(sigma) and identify its leading perturbative deformation.", "url": "https://arxiv.org/abs/2604.00033", "type": "理论", "summary": "我们引入了 Lindblad 变形谱几何框架，其中有界耗散数据通过 Dirac 算子 D_gamma = D - igammaSigma 使标准谱三元组变形，其中 Sigma = (1/2) sum_k L_k^dagger L_k 由 Lindblad 跳跃算子 {L_k} 构造而成。关联的正算子 Q_gamma = D_gamma^* D_gamma = D^2 + gamma^2 Sigma^2 - i*gamma [D, Sigma] 被识别为正确的谱几何可观测量。对于平滑自同态值 Lindblad 数据，Q_gamma 是拉普拉斯类型，并且允许标准热核渐近展开，甚至具有耗散修改的 Seeley-DeWitt 系数。对于标量变形 L = sqrt(gamma) f 且 f 为 C^infty(M) 实值，我们证明热迹 K_gamma(sigma) = Tr(exp(-sigma Q_gamma)) 的一阶杜哈梅尔校正同样消失，因此第一个非平凡耗散效应出现在 gamma^4 阶。我们将 O(gamma^4) 校正的精确 Duhamel 级分解为直接 W_2 插入和二次 W_1 x W_1 项。在回合 S^2 模型中，我们确定显式变形算子并提取 W_2 扇区的主导局部渐近贡献。\n\n我们定义有效的尺度相关光谱维度 d_{s,eff}(sigma,gamma) = -2 d/d(log sigma) log K_gamma(sigma) 并确定其主要扰动变形。", "authors": [{"name": "Soumadeep Maiti"}], "featured_authors": [{"name": "Soumadeep Maiti"}], "author_count": 1}, {"id": "2604.00035", "category": "quant-ph", "title": "QR-SPPS: Quantum-Native Retail Supply Chain Risk Simulation via VQE, ADAPT-VQE Counterfactual Policy Ranking, and DOS-QPE Boltzmann Tail Risk Quantification", "abstract": "Classical supply chain risk models treat node failures as statistically independent events, systematically underestimating cascade probabilities when supplier dependencies are strongly correlated. At n=40 nodes, the full correlated failure distribution requires O(2^n) classical samples, a regime where exact simulation demands 17.6 TB of memory and over 369,000 hours of computation on a standard workstation. We present QR-SPPS (Quantum-Native Retail Shock Propagation and Policy Stress Simulator), a three-algorithm quantum pipeline implemented using the Qiskit framework with the Aer statevector_simulator backend. First, a 40-node, 4-tier retail supply network is encoded as a 40-qubit Ising Hamiltonian using OpenFermion QubitOperator, where ZZ coupling terms encode correlated cascade probabilities structurally absent from classical Monte Carlo. Second, a hardware-efficient VQE circuit finds the ground-state stress distribution with zero error, detecting entangled cascade failures in 14/40 nodes with max|{\\Delta}P|=0.637 versus classical Monte Carlo. Third, we introduce the first application of ADAPT-VQE gradient screening to counterfactual macroeconomic policy evaluation: six crisis interventions are ranked in O(1) Qiskit operator evaluations per policy, a 287x speedup over sequential VQE re-optimisation. Fourth, Density-of-States QPE (DOS-QPE) reconstructs the full eigenspectrum via 32-step Trotter evolution and introduces a novel mapping of the Boltzmann catastrophe probability P_cat(T) to VIX-equivalent market volatility temperature, enabling direct integration into regulatory Value-at-Risk frameworks. Qiskit Aer scaling benchmarks confirm exponential classical intractability at 40 qubits.", "url": "https://arxiv.org/abs/2604.00035", "type": "理论+数值", "summary": "经典的供应链风险模型将节点故障视为统计上独立的事件，当供应商依赖性强相关时，会系统地低估级联概率。在 n=40 个节点时，完全相关的故障分布需要 O(2^n) 个经典样本，在这种情况下，精确模拟需要 17.6 TB 内存以及在标准工作站上进行超过 369,000 小时的计算。我们提出了 QR-SPPS（量子原生零售冲击传播和政策压力模拟器），这是一种使用 Qiskit 框架和 Aer statevector_simulator 后端实现的三算法量子管道。首先，使用 OpenFermion QubitOperator 将 40 节点、4 层零售供应网络编码为 40 量子位伊辛哈密顿量，其中 ZZ 耦合项编码结构上经典蒙特卡罗中不存在的相关级联概率。其次，硬件高效的 VQE 电路找到零误差的基态应力分布，检测 14/40 节点中的纠缠级联故障，与经典蒙特卡罗相比，max|{\\Delta}P|=0.637。\n\n第三，我们引入了 ADAPT-VQE 梯度筛选在反事实宏观经济政策评估中的首次应用：在每个政策的 O(1) Qiskit 操作员评估中对六种危机干预措施进行排名，比顺序 VQE 重新优化加速了 287 倍。第四，状态密度 QPE (DOS-QPE) 通过 32 步 Trotter 演化重建完整的特征谱，并引入玻尔兹曼灾难概率 P_cat(T) 到 VIX 等效市场波动温度的新颖映射，从而能够直接集成到监管风险价值框架中。 Qiskit Aer 扩展基准证实了 40 个量子位的指数经典难处理性。", "authors": [{"name": "Sumit Tapas Chongder"}], "featured_authors": [{"name": "Sumit Tapas Chongder"}], "author_count": 1}, {"id": "2604.00051", "category": "quant-ph", "title": "Zeno-Constrained Formation of Relativistic Mass Shells", "abstract": "We study an extension of the quantum linear Boltzmann equation describing irreversible momentum-space dynamics of an open quantum system under strong continuous monitoring. The monitored observable is taken to be a quadratic form in an extended, purely Euclidean four-dimensional momentum space, without assuming any fixed signature at the microscopic level. In the resulting quantum Zeno regime, rapid suppression of off-constraint excursions allows for an adiabatic elimination of fast degrees of freedom. Using a Schur-complement construction, the induced second-order corrections give rise to an effective flow of the monitored quadratic form under temporal coarse graining. Under mild isotropy assumptions on the underlying momentum-mixing dynamics and an appropriate calibration condition, this flow approaches an infrared fixed point characterized by a quadratic form of Lorentzian signature. The corresponding null set defines a mass-shell-like constraint surface that governs the long-time Zeno-projected dynamics and whose isometry group matches the kinematic structure of Lorentz transformations at the effective level. Familiar relativistic features, including Maxwell-Juettner-type stationary distributions, arise at the level of the effective infrared description as consequences of this fixed point within the extended quantum Boltzmann framework.", "url": "https://arxiv.org/abs/2604.00051", "type": "理论", "summary": "我们研究了量子线性玻尔兹曼方程的扩展，描述了强连续监测下开放量子系统的不可逆动量空间动力学。所监测的可观测量被视为扩展的纯欧几里得四维动量空间中的二次形式，而不假设微观水平上的任何固定特征。在由此产生的量子芝诺体系中，快速抑制脱离约束偏移可以绝热消除快速自由度。使用 Schur 补结构，诱导的二阶校正产生了时间粗粒度下监测的二次形式的有效流。在对潜在动量混合动力学的温和各向同性假设和适当的校准条件下，该流动接近以洛伦兹签名的二次形式为特征的红外固定点。相应的零集定义了一个质量壳状约束面，它控制着长期的芝诺投影动力学，其等距组与有效水平上洛伦兹变换的运动学结构相匹配。\n\n熟悉的相对论特征，包括麦克斯韦-朱特纳型平稳分布，出现在有效红外描述的水平上，作为扩展量子玻尔兹曼框架内这个固定点的结果。", "authors": [{"name": "Ansgar Pernice"}], "featured_authors": [{"name": "Ansgar Pernice"}], "author_count": 1}, {"id": "2604.00089", "category": "quant-ph", "title": "Conclusive Identification Via Noisy Classical Channel: Superactivation and Quantum Advantage", "abstract": "We introduce conclusive identification task for classical channels: a receiver identifies transmitted inputs without error when possible, and responds inconclusively when outputs are ambiguous. For a symmetric not-fully-corrupted channel $N : X \\to X$, the single-shot conclusive identification index $\\mathrm{ci}_\\circ(N)$ counts the maximum number of conclusively identifiable inputs. We show $\\mathrm{ci}_\\circ(N)$ exhibits a striking superactivation phenomenon: a channel with $\\mathrm{ci}_\\circ(N) = 0$ achieves $\\mathrm{ci}_\\circ(N \\otimes \\mathrm{id}^c_\\beta) = |X|$ when assisted by a perfect classical channel of dimension $\\beta < |X|$. The minimum classical assistance required equals the chromatic number $\\chi(\\mathtt{S}_N)$ of the channel's support graph $\\mathtt{S}_N$. We provide channel families where the superactivation gap $\\mathrm{ci}_\\circ(N \\otimes \\mathrm{id}^c_\\beta) - \\mathrm{ci}_\\circ(\\mathrm{id}^c_\\beta)$ can be made arbitrarily large. A noiseless quantum channel of dimension equal to the orthogonal rank $\\xi(\\mathtt{S}_N)$ suffices, yielding a strict quantum advantage whenever $\\xi(\\mathtt{S}_N) < \\chi(\\mathtt{S}_N)$. This advantage is demonstrated through three explicit constructions motivated by combinatorial and algebraic state-independent, and state-dependent proofs of Kochen-Specker contextuality. Via the co-normal product of graphs, we analyze the scaling of the quantum advantage ratio $\\chi_f(\\mathtt{S}_N)/\\xi(\\mathtt{S}_N)$, and present a channel for which quantum assistance is exponentially more efficient than classical. Our results establish $\\mathtt{S}_N$, rather than the confusability graph $\\mathtt{G}_N$, as the natural combinatorial object for conclusive identification, revealing that channels deemed useless under Shannon's zero-error framework can exhibit rich superactivation and quantum advantage, with deep connections to quantum contextuality.", "url": "https://arxiv.org/abs/2604.00089", "type": "理论", "summary": "我们为经典通道引入了结论性识别任务：接收器尽可能无误地识别传输的输入，并在输出不明确时做出不确定的响应。对于对称未完全损坏的通道 $N : X \\to X$，单次结论性识别索引 $\\mathrm{ci}_\\circ(N)$ 计算结论性可识别输入的最大数量。我们证明 $\\mathrm{ci}_\\circ(N)$ 表现出惊人的超激活现象：当 $\\mathrm{ci}_\\circ(N) = 0$ 的通道在维度 $\\beta < |X|$ 的完美经典通道辅助下实现 $\\mathrm{ci}_\\circ(N \\otimes \\mathrm{id}^c_\\beta) = |X|$ 。所需的最小经典辅助等于通道支持图 $\\mathtt{S}_N$ 的色数 $\\chi(\\mathtt{S}_N)$。我们提供超激活间隙 $\\mathrm{ci}_\\circ(N \\otimes \\mathrm{id}^c_\\beta) - \\mathrm{ci}_\\circ(\\mathrm{id}^c_\\beta)$ 可以任意大的通道族。维度等于正交秩 $\\xi(\\mathtt{S}_N)$ 的无噪声量子通道就足够了，只要 $\\xi(\\mathtt{S}_N) < \\chi(\\mathtt{S}_N)$ 就会产生严格的量子优势。\n\n这一优势通过由 Kochen-Specker 上下文性的组合和代数状态独立和状态相关证明所驱动的三个显式构造来证明。通过图的共范积，我们分析了量子优势比 $\\chi_f(\\mathtt{S}_N)/\\xi(\\mathtt{S}_N)$ 的缩放，并提出了一种量子辅助比经典辅助效率呈指数级提高的通道。我们的结果建立了$\\mathtt{S}_N$，而不是混淆性图$\\mathtt{G}_N$，作为结论性识别的自然组合对象，揭示了在香农零错误框架下被认为无用的通道可以表现出丰富的超激活和量子优势，与量子上下文有着深刻的联系。", "authors": [{"name": "Anushko Chattopadhyay"}, {"name": "Ambuj"}, {"name": "Rakesh Das"}, {"name": "Smritikana Patra"}, {"name": "Chitrak Roychowdhury"}, {"name": "Manik Banik"}, {"name": "Amit Mukherjee"}], "featured_authors": [{"name": "Anushko Chattopadhyay"}, {"name": "Ambuj"}, {"name": "Rakesh Das"}, {"name": "Chitrak Roychowdhury"}, {"name": "Manik Banik"}, {"name": "Amit Mukherjee"}], "author_count": 7}, {"id": "2604.00092", "category": "quant-ph", "title": "The time of arrival problem in the Page-Wootters formalism", "abstract": "The time-of-arrival problem asks for the probability distribution for when a quantum particle reaches a specified location. It has been the subject of decades of debate, exemplifying the lack of a self-adjoint time observable in quantum theory. In the Page-Wootters framework, time is a relational quantity, emerging from correlations between a system and a clock induced by a global Hamiltonian constraint. We construct a time-of-arrival distribution by inverting the Page-Wootters approach, asking what time a clock reads given that the particle arrives at some fixed position. The result coincides with a common approach to the time-of-arrival problem, suggesting a potential relational interpretation of the latter. In addition to providing a relational description of the time-of-arrival problem, this gives an application of the Page-Wootters formalism to a concrete physical problem, and reveals some complications with its canonical interpretation as a theory of conditional probabilities.", "url": "https://arxiv.org/abs/2604.00092", "type": "理论", "summary": "到达时间问题要求量子粒子到达指定位置时的概率分布。它一直是数十年争论的主题，例证了量子理论中缺乏可观测的自伴时间。在 Page-Wootters 框架中，时间是一个关系量，源于全局哈密顿约束引起的系统和时钟之间的相关性。我们通过反转 Page-Wootters 方法构建到达时间分布，询问假设粒子到达某个固定位置时时钟读数的时间。结果与到达时间问题的常见方法一致，表明后者的潜在关系解释。除了提供到达时间问题的关系描述之外，这还给出了佩奇-伍特斯形式主义在具体物理问题上的应用，并揭示了其作为条件概率理论的规范解释的一些复杂性。", "authors": [{"name": "Niyusha Hosseini"}, {"name": "Maximilian P. E. Lock"}], "featured_authors": [{"name": "Niyusha Hosseini"}, {"name": "Maximilian P. E. Lock"}], "author_count": 2}, {"id": "2604.00118", "category": "quant-ph", "title": "When level repulsion fails: non-normality and chaos in open quantum systems", "abstract": "For Hamiltonian systems, level statistics provide a faithful diagnostic of quantum chaos. By analogy, the statistics of the Lindbladian spectrum are often used in open quantum systems, and the Grobe-Haake-Sommers conjecture proposes that systems with chaotic classical counterparts should exhibit level repulsion in the Lindbladian spectrum. Here we point out an important flaw in this analogy: Hamiltonian and Lindbladian spectra behave differently and have distinct physical interpretations, and one should therefore not expect the latter to provide a reliable diagnostic. For Lindbladians, the late-time dynamics are not determined by the bulk of the eigenvalues but only by those eigenvalues -- and their corresponding eigenvectors -- with small real parts. Combined with the strong non-normality typical of Lindbladians, this allows situations in which the level statistics can be tuned almost arbitrarily without affecting the dynamics on either short or long time scales. We explicitly demonstrate this phenomenon and provide examples in which Ginibre level repulsion arises while the system dynamics at no time show signatures of chaos. We further relate this mechanism to the emergence of a non-Hermitian skin effect in Liouville space, linking boundary-induced eigenvector localization to the observed spectral instability. Our results show that level statistics cannot universally serve as a reliable diagnostic of quantum chaos in open quantum systems and highlight the need for alternative diagnostics that remain robust in strongly non-normal regimes.", "url": "https://arxiv.org/abs/2604.00118", "type": "理论", "summary": "对于哈密顿系统，能级统计提供了对量子混沌的忠实诊断。以此类推，林布拉德谱的统计经常用于开放量子系统，并且格罗布-哈克-索默斯猜想提出，具有混沌经典对应物的系统应该在林布拉德谱中表现出能级排斥。在这里，我们指出这个类比中的一个重要缺陷：哈密顿谱和林布拉德谱表现不同，并且具有不同的物理解释，因此人们不应期望后者提供可靠的诊断。对于 Lindbladian 来说，后期动态不是由大量特征值决定的，而是仅由那些具有较小实部的特征值及其相应的特征向量决定。结合 Lindbladians 典型的强非正态性，这使得水平统计数据可以几乎任意调整，而不会影响短期或长期尺度的动态。我们明确地证明了这种现象，并提供了一些例子，其中 Ginibre 级排斥力出现，而系统动力学在任何时候都没有显示出混沌的特征。\n\n我们进一步将这种机制与刘维尔空间中非厄米趋肤效应的出现联系起来，将边界引起的特征向量定位与观察到的光谱不稳定性联系起来。我们的结果表明，水平统计不能普遍用作开放量子系统中量子混沌的可靠诊断，并强调需要在强非正常状态下保持稳健的替代诊断。", "authors": [{"name": "Caio B. Naves"}, {"name": "Thomas Klein Kvorning"}, {"name": "Jonas Larson"}], "featured_authors": [{"name": "Caio B. Naves"}, {"name": "Thomas Klein Kvorning"}, {"name": "Jonas Larson"}], "author_count": 3}, {"id": "2604.00203", "category": "quant-ph", "title": "Query Learning Nearly Pauli Sparse Unitaries in Diamond Distance", "abstract": "We study the problem of learning nearly $(s,\\epsilon)$-sparse unitaries, meaning that the Pauli spectrum is concentrated on at most $s$ components with at most $\\epsilon$ residual mass in Pauli $\\ell_1$-norm. This class generalizes well-studied families, including sparse unitaries, quantum $k$-juntas, $2^k$-Pauli dimensional channels, and compositions of depth $O(\\log\\log n)$ circuits with near-Clifford circuits. Given query access to an unknown nearly sparse unitary $U$, our goal is to efficiently (both in time and query complexity) construct a quantum channel that is close in diamond distance to $U$. We design a learning algorithm achieving this guarantee using $\\tilde{O}(s^6/\\epsilon^4)$ forward queries to $U$, and running time polynomial in relevant parameters. A key contribution is an efficient quantum algorithm that, given query access to an arbitrary unknown unitary $U$, estimates all Pauli coefficients (up to a shared global phase) whose magnitude exceeds a given threshold $\\theta$, extending existing sparse recovery techniques to general unitaries. We also study the broader class of unitaries with bounded Pauli $\\ell_1$-norm. For that class, we prove an exponential query lower bound $\\Omega(2^{n/2})$. We introduce a more relaxed accuracy metric which is the diamond distance restricted to a set of input states. Then, we show that, under this metric, unitaries with Pauli $\\ell_1$-norm uniformly bounded by $L_1$ are learnable with $\\tilde{O}(L_1^8/\\epsilon^{16})$.", "url": "https://arxiv.org/abs/2604.00203", "type": "理论+数值", "summary": "我们研究学习近 $(s,\\epsilon)$ 稀疏幺正的问题，这意味着泡利谱集中在最多 $s$ 分量上，在泡利 $\\ell_1$-范数下最多具有 $\\epsilon$ 剩余质量。此类概括了经过充分研究的系列，包括稀疏幺正、量子 $k$-juntas、$2^k$-Pauli 维通道以及深度 $O(\\log\\log n)$ 电路与近 Clifford 电路的组合。给定对未知的近稀疏酉 $U$ 的查询访问，我们的目标是有效地（在时间和查询复杂性上）构造一个与 $U$ 钻石距离接近的量子通道。我们设计了一种学习算法，使用 $\\tilde{O}(s^6/\\epsilon^4)$ 将查询转发到 $U$ 并在相关参数中运行时间多项式来实现此保证。一个关键的贡献是一种高效的量子算法，在给定对任意未知酉$U$的查询访问的情况下，估计其大小超过给定阈值$\\theta$的所有泡利系数（直到共享全局相位），将现有的稀疏恢复技术扩展到一般酉。我们还研究了具有有界泡利 $\\ell_1$-范数的更广泛的幺正类。\n\n对于该类，我们证明了指数查询下界 $\\Omega(2^{n/2})$。我们引入了一种更宽松的精度度量，即仅限于一组输入状态的菱形距离。然后，我们证明，在这个指标下，泡利 $\\ell_1$-范数统一由 $L_1$ 界定的幺正可以用 $\\tilde{O}(L_1^8/\\epsilon^{16})$ 来学习。", "authors": [{"name": "Zahra Honjani"}, {"name": "Mohsen Heidari"}], "featured_authors": [{"name": "Zahra Honjani"}, {"name": "Mohsen Heidari"}], "author_count": 2}, {"id": "2604.00229", "category": "quant-ph", "title": "A Security-Aware Nonlinearity Study of FPGA-Based Time-to-Digital Converters for Quantum Key Distribution Systems", "abstract": "Intrinsic nonlinearity in FPGA-based time-to-digital converters (TDCs) is often treated as a calibration issue and evaluated mainly through post-correction metrics. In quantum key distribution (QKD), however, raw delay-line nonuniformity can affect coincidence timing and thereby influence accidental-coincidence rate and Quantum Bit Error Rate (QBER). This paper analyzes how measured FPGA-TDC nonlinearity propagates to QKD timing metrics using a conservative system-level model that combines random timing uncertainty and deterministic nonlinearity. We also propose fabric-level mitigation strategies based on LUT-assisted delay shaping and placement constraints to reduce severe bin-width irregularities without statistical calibrations. The method is evaluated by reproducing two open-source TDCs implemented on a low-cost Zynq-7000 FPGA. We observe reductions of 14\\%-21\\% in integral nonlinearity (INL) compared with the non-optimized design, leading to a reduced QBER contribution and an improvement by 3.7\\%-14.2\\% in the estimated secret fraction. These results suggest that raw FPGA-TDC nonlinearity deserves explicit consideration in timing-sensitive QKD implementations.", "url": "https://arxiv.org/abs/2604.00229", "type": "理论+数值", "summary": "基于 FPGA 的时间数字转换器 (TDC) 中的固有非线性通常被视为校准问题，并主要通过后校正指标进行评估。然而，在量子密钥分发 (QKD) 中，原始延迟线不均匀性会影响重合时序，从而影响意外重合率和量子误码率 (QBER)。本文使用结合了随机时序不确定性和确定性非线性的保守系统级模型，分析了测量的 FPGA-TDC 非线性如何传播到 QKD 时序指标。我们还提出了基于 LUT 辅助延迟整形和布局约束的结构级缓解策略，以减少严重的 bin 宽度不规则性，而无需统计校准。通过重现在低成本 Zynq-7000 FPGA 上实现的两个开源 TDC 来评估该方法。我们观察到与非优化设计相比，积分非线性 (INL) 减少了 14\\%-21\\%，导致 QBER 贡献减少，估计秘密分数提高了 3.7\\%-14.2\\%。这些结果表明，在时序敏感的 QKD 实现中，原始 FPGA-TDC 非线性值得明确考虑。", "authors": [{"name": "Kun Qin"}, {"name": "Carsten Trinitis"}], "featured_authors": [{"name": "Kun Qin"}, {"name": "Carsten Trinitis"}], "author_count": 2}, {"id": "2604.00231", "category": "quant-ph", "title": "100 years of spin: fundamental physics, dark matter, exotic interactions, and all that", "abstract": "For a century, spin has been an indispensable probe of the fundamental laws of nature. A reflection on the role of spin in shaping modern physics is presented, from the early days of quantum mechanics to the latest precision tests of the Standard Model. The significance of magnetic and electric dipole moments in testing CP and CPT symmetries is surveyed, along with the ongoing searches for exotic spin-dependent interactions that may reveal the nature of dark matter and its connection to spacetime geometry. Through these vignettes, it is shown that spin continues to provide a fresh perspective on the most profound questions in physics today.", "url": "https://arxiv.org/abs/2604.00231", "type": "理论", "summary": "一个世纪以来，自旋一直是探索自然基本规律不可或缺的手段。从量子力学的早期到标准模型的最新精密测试，对自旋在塑造现代物理学中的作用进行了反思。研究了磁偶极矩和电偶极矩在测试 CP 和 CPT 对称性中的重要性，以及对奇异自旋相关相互作用的持续探索，这些相互作用可能揭示暗物质的本质及其与时空几何的联系。通过这些小插曲，可以看出自旋继续为当今物理学中最深刻的问题提供新的视角。", "authors": [{"name": "Dmitry Budker"}, {"name": "Tim Chupp"}, {"name": "Klaus Kirch"}, {"name": "W. Mike Snow"}], "featured_authors": [{"name": "Dmitry Budker"}, {"name": "Tim Chupp"}, {"name": "Klaus Kirch"}, {"name": "W. Mike Snow"}], "author_count": 4}, {"id": "2604.00272", "category": "quant-ph", "title": "Quantum Non-Moduler Multiplication with QFT-Based Multi Input Parallelized Adder", "abstract": "In this study, we propose an efficient quantum multiplication approach based on a QFT-assisted parallelized addition scheme. The multiplication stage is implemented using a structure composed entirely of Toffoli gates, which generate partial products. In the second stage, these partial results are accumulated using a QFT-based adder. Unlike conventional QFT-based arithmetic circuits, the proposed design eliminates the repeated application of QFT and inverse QFT (IQFT) operations during intermediate summation processes. This leads to a significant reduction in the total gate count and circuit complexity, enabling a more resource-efficient implementation. To demonstrate the feasibility of the proposed approach, a quantum circuit that performs the multiplication of two 3-bit numbers is designed. The circuit is tested and validated using IBM quantum simulators. The results indicate that the proposed method provides a more efficient alternative to traditional quantum multiplication techniques in terms of gate cost and circuit depth.", "url": "https://arxiv.org/abs/2604.00272", "type": "理论", "summary": "在这项研究中，我们提出了一种基于 QFT 辅助并行加法方案的高效量子乘法方法。乘法阶段使用完全由 Toffoli 门组成的结构来实现，该结构生成部分乘积。在第二阶段，使用基于 QFT 的加法器累加这些部分结果。与传统的基于 QFT 的算术电路不同，所提出的设计消除了中间求和过程中重复应用 QFT 和逆 QFT (IQFT) 运算。这导致总门数和电路复杂性显着减少，从而实现更资源高效的实施。为了证明所提出方法的可行性，设计了一个执行两个 3 位数字相乘的量子电路。该电路使用 IBM 量子模拟器进行了测试和验证。结果表明，所提出的方法在门成本和电路深度方面提供了比传统量子乘法技术更有效的替代方案。", "authors": [{"name": "Murat Kurtand Selçuk Çakmak"}, {"name": "Azmi Gençten"}], "featured_authors": [{"name": "Murat Kurtand Selçuk Çakmak"}, {"name": "Azmi Gençten"}], "author_count": 2}, {"id": "2604.00603", "category": "quant-ph", "title": "Quantum algorithms for the fractional Poisson equation via rational approximation", "abstract": "This paper presents a quantum algorithm for solving the fractional Poisson equation \\((-\\Delta)^s u = f\\) with \\(s \\in (0,1)\\) on bounded domains. The proposed approach combines rational approximation techniques with quantum linear system solvers to achieve exponential quantum advantage. The rational approximation represents the inverse fractional Laplacian as a weighted sum of standard resolvents, transforming the original nonlocal problem into a collection of shifted integer-order partial differential equations. These equations are consolidated into a single large linear system through a modified right-hand side construction that simplifies the quantum implementation. To enable practical implementation, we develop explicit quantum circuits via the Schrödingerization technique, which converts the non-unitary dynamics of the linear system into a higher-dimensional Schrödinger-type equation, allowing the use of standard Hamiltonian simulation. The circuit construction leverages the decomposition of shift operators to realize the discrete Laplacian and employs controlled operations to implement the select oracle. Under finite difference discretization, we provide detailed algorithmic procedures utilizing block-encoding techniques for the coefficient matrices. A comprehensive complexity analysis demonstrates that the quantum algorithm achieves a dependence on the inverse mesh size \\(h^{-1}\\) that is independent of the spatial dimension \\(d\\), in stark contrast to classical methods which suffer from exponential growth in high dimensions. This establishes an exponential quantum advantage for high-dimensional fractional problems, effectively overcoming the curse of dimensionality that limits classical approaches.", "url": "https://arxiv.org/abs/2604.00603", "type": "理论+数值", "summary": "本文提出了一种量子算法，用于在有界域上求解分数阶泊松方程 \\((-\\Delta)^s u = f\\) 和 \\(s \\in (0,1)\\)。所提出的方法将有理逼近技术与量子线性系统求解器相结合，以实现指数量子优势。有理近似将反分数拉普拉斯算子表示为标准解的加权和，将原始非局部问题转换为移位整数阶偏微分方程的集合。通过修改后的右侧结构将这些方程合并为一个大型线性系统，从而简化了量子实现。为了实现实际实施，我们通过薛定谔化技术开发显式量子电路，该技术将线性系统的非单一动力学转换为高维薛定谔型方程，从而允许使用标准哈密顿模拟。该电路结构利用移位算子的分解来实现离散拉普拉斯算子，并采用受控操作来实现选择预言机。\n\n在有限差分离散化下，我们利用系数矩阵的块编码技术提供详细的算法过程。全面的复杂性分析表明，量子算法实现了对逆网格大小 \\(h^{-1}\\) 的依赖，而与空间维度 \\(d\\) 无关，这与在高维度上呈指数增长的经典方法形成鲜明对比。这为高维分数问题建立了指数量子优势，有效克服了限制经典方法的维数诅咒。", "authors": [{"name": "Yin Yang"}, {"name": "Yue Yu"}, {"name": "Long Zhang"}, {"name": "Ming Zhou"}], "featured_authors": [{"name": "Yin Yang"}, {"name": "Yue Yu"}, {"name": "Long Zhang"}, {"name": "Ming Zhou"}], "author_count": 4}, {"id": "2604.00606", "category": "quant-ph", "title": "Beyond Perturbation Theory: A Resolvent-Based Framework for Strongly Correlated Many-Body Systems", "abstract": "Traditional perturbation theory, based on local analyticity (Taylor expansion), often fails in many-body systems with exponentially small energy gaps and strong interactions. This work presents an alternative methodological framework built on two core principles: (1) starting from the pole expansion of the resolvent to directly capture the global analytic structure, and (2) treating local fluctuations statistically (in the spirit of the eigenstate thermalization hypothesis) to close the mean-field equations. Crucially, we go beyond the mean-field level by deriving an exact recursive re-expansion of the cross-correlated terms, which systematically generates higher-order corrections that control the distribution tails, branch splitting, and fluctuations. The framework is realized through a hierarchical ansatz strategy, solving self-consistent equations with Lorentzian, Gaussian, and hybrid forms to describe the bulk, tail, and full distribution, respectively. This methodology does not rely on weak-coupling assumptions and is applicable to the quantitative analysis of global properties such as entropy production and distribution functions in nonintegrable many-body systems. We detail its mathematical structure, the recursive expansion of fluctuations, conditions of validity, comparison with traditional methods, and provide a general implementation workflow.", "url": "https://arxiv.org/abs/2604.00606", "type": "理论", "summary": "基于局部解析性（泰勒展开）的传统微扰理论在能隙呈指数级小且相互作用强的多体系统中通常会失败。这项工作提出了一种基于两个核心原则的替代方法框架：（1）从解析器的极展开开始，直接捕获全局解析结构，（2）统计处理局部涨落（本着本征态热化假说的精神）以闭合平均场方程。至关重要的是，我们通过导出互相关项的精确递归重新展开来超越平均场水平，系统地生成控制分布尾部、分支分裂和波动的高阶校正。该框架是通过分层 ansatz 策略实现的，用洛伦兹、高斯和混合形式求解自洽方程，分别描述体分布、尾分布和全分布。该方法不依赖于弱耦合假设，适用于不可积多体系统中熵产生和分布函数等全局特性的定量分析。\n\n我们详细介绍了其数学结构、波动的递归展开、有效性条件、与传统方法的比较，并提供了一般的实现流程。", "authors": [{"name": "Zhi-qiang Huang"}, {"name": "Qing-yu Cai"}], "featured_authors": [{"name": "Zhi-qiang Huang"}, {"name": "Qing-yu Cai"}], "author_count": 2}, {"id": "2604.00607", "category": "quant-ph", "title": "No quantum advantage implies improved bounds and classical algorithms for the binary paint shop problem", "abstract": "The binary paint shop problem (BPSP) is an APX-hard optimization problem in which, given n car models that occur twice in a sequence of length 2n, the goal is to find a colouring sequence such that the two occurrences of each model are painted differently, while minimizing the number of times the paint is swapped along the sequence. A recent classical heuristic, known as the recursive star greedy (RSG) algorithm, is conjectured to achieve an expected paint swap ratio of 0.361, thereby outperforming the QAOA with circuit depth p = 7. Since the performance of the QAOA with logarithmic circuit depth is instance independent, the average paint swap ratio is upper-bounded by the QAOA, which numerical evidence suggests is approximately between 0.265 and 0.282. To provide hardware-relevant comparisons, we additionally implement the BPSP on a D-Wave Quantum Annealer Advantage 2, obtaining a minimum paint swap ratio of 0.320. Given that the QAOA with logarithmic circuit depth does not exhibit quantum advantage for sparse optimization problems such as the BPSP, this implies the existence of a classical algorithm that surpasses both the RSG algorithm and logarithmic depth QAOA. We provide numerical evidence that the Mean-Field Approximate Optimization Algorithm (MF-AOA) is one such algorithm that beats all known classical heuristics and quantum algorithms to date with a paint swap ratio of approximately 0.2799.", "url": "https://arxiv.org/abs/2604.00607", "type": "理论+数值", "summary": "二元喷漆车间问题 (BPSP) 是一个 APX 难题优化问题，其中给定在长度为 2n 的序列中出现两次的 n 个汽车模型，目标是找到一个着色序列，使得每个模型的两次出现的喷漆方式不同，同时最大限度地减少沿序列交换油漆的次数。最近的经典启发式算法，称为递归星贪婪 (RSG) 算法，据推测可实现 0.361 的预期油漆交换率，从而优于电路深度 p = 7 的 QAOA。由于具有对数电路深度的 QAOA 的性能与实例无关，因此平均油漆交换率受到 QAOA 的上限，数值证据表明大约在 0.265 和 0.282 之间。为了提供与硬件相关的比较，我们还在 D-Wave Quantum Annealer Advantage 2 上实现了 BPSP，获得了 0.320 的最小油漆交换率。鉴于对数电路深度的 QAOA 对于 BPSP 等稀疏优化问题没有表现出量子优势，这意味着存在一种超越 RSG 算法和对数深度 QAOA 的经典算法。\n\n我们提供的数值证据表明，平均场近似优化算法 (MF-AOA) 就是这样一种算法，它以大约 0.2799 的油漆交换率击败了迄今为止所有已知的经典启发式算法和量子算法。", "authors": [{"name": "Mark Goh"}, {"name": "Lara Caroline Pereira dos Santos"}, {"name": "Matthias Sperl"}], "featured_authors": [{"name": "Mark Goh"}, {"name": "Lara Caroline Pereira dos Santos"}, {"name": "Matthias Sperl"}], "author_count": 3}, {"id": "2604.00639", "category": "quant-ph", "title": "Nonlinearity-Induced Thouless Pumping in Quasiperiodic Lattices", "abstract": "Nonlinear Thouless pumping has been established in periodic lattices; its counterpart in quasiperiodic lattices remains unexplored. Here, we show a nonlinear topological pumping of gap solitons in quasiperiodic lattices where the local nonlinear self-consistent potentials lead to a lattice potential reconstruction; as a result, an emergent topological structure induced by this local reconstruction governs the dynamics of the gap solitons. This enables solitons to adiabatically occupy a single topological band, realizing quasi-quantized Thouless pumping. In addition, the intrinsic lattice perturbations disrupt this band occupation, which drives solitons into a non-quantized drifting regime. However, even in this regime, we also find that the soliton transport is constrained by the topological properties of a critical rational approximant. Tuning nonlinearity or lattice scaling reveals a controllable switching among topological pumping, drifting, and localization. Our work uncovers a mechanism for nonlinearity-induced topological behavior in complex lattice potentials.", "url": "https://arxiv.org/abs/2604.00639", "type": "理论", "summary": "非线性Thouless抽运已在周期晶格中建立；它在准周期晶格中的对应物仍未被探索。在这里，我们展示了准周期晶格中间隙孤子的非线性拓扑泵浦，其中局部非线性自洽势导致晶格势重构；因此，由这种局部重建引起的新兴拓扑结构控制着间隙孤子的动力学。这使得孤子能够绝热地占据单个拓扑带，实现准量子化的无意识泵浦。此外，固有的晶格扰动破坏了这种能带占据，从而驱动孤子进入非量子化漂移状态。然而，即使在这种情况下，我们也发现孤子输运受到临界有理近似的拓扑性质的限制。调整非线性或晶格缩放揭示了拓扑泵浦、漂移和局域化之间的可控切换。我们的工作揭示了复杂晶格势中非线性引起的拓扑行为的机制。", "authors": [{"name": "Xiao-Xiao Hu"}, {"name": "Dun Zhao"}, {"name": "Hong-Gang Luo"}], "featured_authors": [{"name": "Xiao-Xiao Hu"}, {"name": "Dun Zhao"}, {"name": "Hong-Gang Luo"}], "author_count": 3}, {"id": "2604.00656", "category": "quant-ph", "title": "Quantum Algorithms for Gibbs Expectation of Non-log-concave and Heavy-tailed Distributions", "abstract": "We establish a systematic framework of unbiased quantum sampling and estimation protocols for the classical Gibbs expectation. This framework generalizes existing approaches to the partition function estimation and has broader applications in various fields. We consider sampling and estimation for a wide class of non-log-concave distributions, particularly heavy-tailed ones, under relaxed assumptions beyond strong convexity, such as dissipativity. We develop an unbiased extension of quantum-accelerated multilevel Monte Carlo (QA-MLMC) to eliminate all biases from discretization and time truncation, together with introducing a change-of-measure approach and the Girsanov theorem via Radon-Nikodym derivatives. As a result, our approach achieves quantum complexity $\\widetilde{\\mathcal{O}}(\\epsilon^{-1})$ within error $\\epsilon$, whereas the classical MLMC requires $\\widetilde{\\mathcal{O}}(\\epsilon^{-2})$ and existing quantum algorithms yield biased estimators under stronger assumptions. Furthermore, our unified framework enables unbiased quantum sampling and estimation for certain heavy-tailed distributions after transformation. We provide several concrete applications of our approach in statistics, machine learning, and finance, towards more practical scenarios of the quantum acceleration of stochastic processes.", "url": "https://arxiv.org/abs/2604.00656", "type": "理论+数值", "summary": "我们为经典吉布斯期望建立了无偏量子采样和估计协议的系统框架。该框架概括了现有的配分函数估计方法，并在各个领域具有更广泛的应用。我们考虑在超出强凸性的宽松假设（例如耗散性）下对各种非对数凹分布（尤其是重尾分布）进行采样和估计。我们开发了量子加速多级蒙特卡罗 (QA-MLMC) 的无偏扩展，以消除离散化和时间截断带来的所有偏差，同时引入测量变化方法和通过 Radon-Nikodym 导数的吉尔萨诺夫定理。因此，我们的方法在误差 $\\epsilon$ 内实现了量子复杂度 $\\widetilde{\\mathcal{O}}(\\epsilon^{-1})$，而经典的 MLMC 需要 $\\widetilde{\\mathcal{O}}(\\epsilon^{-2})$ 并且现有的量子算法在更强的假设下产生有偏差的估计器。此外，我们的统一框架可以对变换后的某些重尾分布进行无偏量子采样和估计。\n\n我们提供了我们的方法在统计、机器学习和金融方面的一些具体应用，以实现随机过程量子加速的更实际场景。", "authors": [{"name": "Xinmiao Li"}, {"name": "Jin-Peng Liu"}], "featured_authors": [{"name": "Xinmiao Li"}, {"name": "Jin-Peng Liu"}], "author_count": 2}, {"id": "2604.00766", "category": "quant-ph", "title": "Lower Bounds on Coherent State Rank", "abstract": "The approximate coherent state rank is the minimal number of (classical) coherent states required to approximate a continuous-variable bosonic quantum state and directly relates to the classical complexity of simulating bosonic computations. Despite its importance, little is known about lower bounds on this quantity, even for basic families of states. In this work, we initiate a systematic study of lower bounds on the approximate coherent state rank. Our contributions are as follows. (i) We introduce a technique based on low-rank approximation theory yielding generic lower bounds on the approximate coherent state rank of arbitrary single-mode states. (ii) Using this technique, we find a complete characterization of all single-mode states of finite approximate coherent state rank, and we obtain in particular analytical expressions for the approximate coherent state rank of squeezed states and of finite superpositions of Fock states. (iii) We further show that our single-mode lower bounds can be lifted to multimode lower bounds for finite superpositions of multimode Fock states. (iv) Finally, we prove a super-polynomial lower bound on the approximate coherent state rank of the $n$-mode Fock state $|1\\rangle^{\\otimes n}$, by exploiting a connection to the permanent. To do so, we show that the algebraic complexity of approximate multi-linear formulas for the permanent is super-polynomial, building upon the proof of a lower bound for exact formulas due to [Raz, JACM 2009]. Our results establish an unconditional barrier to efficient classical simulation of Boson Sampling via coherent state decompositions and connect non-classicality of bosonic quantum systems to central questions in algebraic complexity.", "url": "https://arxiv.org/abs/2604.00766", "type": "理论+数值", "summary": "近似相干态等级是近似连续变量玻色子量子态所需的（经典）相干态的最小数量，并且与模拟玻色子计算的经典复杂性直接相关。尽管它很重要，但人们对这个数量的下限知之甚少，即使对于基本的国家家族也是如此。在这项工作中，我们启动了对近似相干态等级下界的系统研究。我们的贡献如下。 （i）我们引入了一种基于低秩近似理论的技术，产生任意单模态的近似相干态秩的通用下界。 (ii)使用这种技术，我们找到了有限近似相干态秩的所有单模态的完整表征，并且我们特别获得了压缩态和福克态的有限叠加的近似相干态秩的解析表达式。 (iii) 我们进一步表明，对于多模 Fock 态的有限叠加，我们的单模下界可以提升到多模下界。\n\n(iv) 最后，通过利用与永久的连接，我们证明了 $n$ 模式 Fock 状态 $|1\\rangle^{\\otimes n}$ 的近似相干状态等级的超多项式下界。为此，我们证明了永久近似多线性公式的代数复杂度是超多项式，建立在 [Raz, JACM 2009] 的精确公式下界证明的基础上。我们的结果为通过相干态分解进行玻色子采样的有效经典模拟建立了无条件障碍，并将玻色子量子系统的非经典性与代数复杂性的中心问题联系起来。", "authors": [{"name": "Florian Cottier"}, {"name": "Ulysse Chabaud"}], "featured_authors": [{"name": "Florian Cottier"}, {"name": "Ulysse Chabaud"}], "author_count": 2}, {"id": "2604.00875", "category": "quant-ph", "title": "Conditions for 3-partite and 4-partite genuine entanglement", "abstract": "A system of three or four particle can be entangled in a number of different ways. It may be the case that only subsets of the particles are entangled, and these subsets are not entangled with each other. It may also be the case that the state is the sum of states in which entanglement only exists within subsets. If this is not the case, the state is said to be genuinely entangled. GHZ states, for example, are genuinely entangled. Deciding whether a state is genuinely entangled is not simple, but conditions do exist to detect it. Here we would like to propose additional sufficient conditions based on one for bipartite entanglement.", "url": "https://arxiv.org/abs/2604.00875", "type": "理论", "summary": "三个或四个粒子的系统可以通过多种不同的方式纠缠在一起。可能的情况是，只有粒子子集发生纠缠，并且这些子集彼此不纠缠。状态也可能是纠缠仅存在于子集中的状态的总和。如果情况并非如此，则可以说国家确实陷入了困境。例如，GHZ 各州确实陷入了困境。确定一个状态是否真正纠缠并不简单，但检测它的条件确实存在。在这里，我们想在二分纠缠的基础上提出额外的充分条件。", "authors": [{"name": "Mark Hillery"}], "featured_authors": [{"name": "Mark Hillery"}], "author_count": 1}, {"id": "2604.00908", "category": "quant-ph", "title": "Quantum walk on a random comb", "abstract": "We study continuous time quantum walk on a random comb graph with infinite teeth. Due to localization effects along the spine, the walk cannot go to infinity in the spine direction, while it can escape to infinity along the teeth of the comb. Starting from an initial vertex the walk has a nonzero probability to stay trapped in a finite region. These results are obtained by studying the spectrum and eigenstates of the random Hamiltonian for the graph and analysing its properties. We use both analytic and numerical methods many of which come from the theory of Anderson localization in one dimension.", "url": "https://arxiv.org/abs/2604.00908", "type": "理论+数值", "summary": "我们研究具有无限齿的随机梳图上的连续时间量子行走。由于沿着脊柱的定位效应，行走不能在脊柱方向上无限远，而可以沿着梳齿逃逸到无限远。从初始顶点开始，行走有非零概率被困在有限区域中。这些结果是通过研究图的随机哈密顿量的谱和本征态并分析其性质而获得的。我们使用解析和数值方法，其中许多方法来自一维安德森局域化理论。", "authors": [{"name": "François David"}, {"name": "Thordur Jonsson"}], "featured_authors": [{"name": "François David"}, {"name": "Thordur Jonsson"}], "author_count": 2}, {"id": "2604.00919", "category": "quant-ph", "title": "Multi-Mode Quantum Annealing for Variational Autoencoders with General Boltzmann Priors", "abstract": "Variational autoencoders (VAEs) learn compact latent representations of complex data, but their generative capacity is fundamentally constrained by the choice of prior distribution over the latent space. Energy-based priors offer a principled way to move beyond factorized assumptions and capture structured interactions among latent variables, yet training such priors at scale requires accurate and efficient sampling from intractable distributions. Here we present Boltzmann-machine--prior VAEs (BM-VAEs) trained using quantum annealing--based sampling in three distinct operational modes within a single generative system. During training, diabatic quantum annealing (DQA) provides unbiased Boltzmann samples for gradient estimation of the energy-based prior; for unconditional generation, slower quantum annealing (QA) concentrates samples near low-energy minima; for conditional generation, bias fields are added to direct sampling toward attribute-specific regions of the energy landscape (c-QA). Using up to 2000 qubits on a D-Wave Advantage2 processor, we demonstrate stable and efficient training across multiple datasets, with faster convergence and lower reconstruction loss than a Gaussian-prior VAE. The learned Boltzmann prior enables unconditional generation by sampling directly from the energy-based latent distribution, a capability that plain autoencoders lack, and conditional generation through latent biasing that leverages the learned pairwise interactions.", "url": "https://arxiv.org/abs/2604.00919", "type": "数值", "summary": "变分自动编码器（VAE）学习复杂数据的紧凑潜在表示，但它们的生成能力从根本上受到潜在空间上先验分布选择的限制。基于能量的先验提供了一种超越分解假设并捕获潜在变量之间的结构化相互作用的原则性方法，但大规模训练此类先验需要从棘手的分布中进行准确有效的采样。在这里，我们提出了使用基于量子退火的采样在单个生成系统中以三种不同的操作模式进行训练的玻尔兹曼机先验 VAE（BM-VAE）。在训练过程中，非绝热量子退火（DQA）提供无偏玻尔兹曼样本，用于基于能量的先验的梯度估计；对于无条件生成，较慢的量子退火 (QA) 将样本集中在低能量最小值附近；对于条件生成，添加偏置场以直接采样能源景观的特定属性区域（c-QA）。\n\n我们在 D-Wave Advantage2 处理器上使用多达 2000 个量子位，展示了跨多个数据集的稳定高效的训练，与高斯先验 VAE 相比，具有更快的收敛速度和更低的重建损失。学习到的玻尔兹曼先验可以通过直接从基于能量的潜在分布进行采样来实现无条件生成，这是普通自动编码器所缺乏的功能，并且可以通过利用学习到的成对相互作用的潜在偏差来进行条件生成。", "authors": [{"name": "Gilhan Kim"}, {"name": "Daniel K. Park"}], "featured_authors": [{"name": "Gilhan Kim"}, {"name": "Daniel K. Park"}], "author_count": 2}, {"id": "2604.00958", "category": "quant-ph", "title": "Properties of multiqubit variational quantum states representing weighted graphs and their computing with quantum programming", "abstract": "We study multiqubit variational quantum states that can be considered as weighted quantum graph states. These states are constructed as single-layer variational circuits with $RX$ rotations and $RZZ$ entangling gates, corresponding to graphs of arbitrary structure. In general case of quantum graph states of arbitrary structure we derive the geometric measure of entanglement and evaluate quantum correlators. It is shown that these quantities are directly related to the degrees of the corresponding vertices in graph. As an example, we analyze the state associated with the star graph $K_{1,4}$ using noisy quantum computing on the AerSimulator. The results are in good agreement with theoretical predictions. These findings demonstrate a connection between graph structure and quantum properties, enabling the study of classical graphs via quantum computing.", "url": "https://arxiv.org/abs/2604.00958", "type": "理论+数值", "summary": "我们研究可以被视为加权量子图状态的多量子位变分量子态。这些状态被构造为具有 $RX$ 旋转和 $RZZ$ 纠缠门的单层变分电路，对应于任意结构的图。在任意结构的量子图态的一般情况下，我们推导出纠缠的几何测度并评估量子相关器。结果表明，这些量与图中相应顶点的度数直接相关。例如，我们在 AerSimulator 上使用噪声量子计算来分析与星图 $K_{1,4}$ 相关的状态。结果与理论预测非常吻合。这些发现证明了图结构和量子特性之间的联系，使得通过量子计算研究经典图成为可能。", "authors": [{"name": "Kh. P. Gnatenko"}, {"name": "A. Kaczmarek"}], "featured_authors": [{"name": "Kh. P. Gnatenko"}, {"name": "A. Kaczmarek"}], "author_count": 2}, {"id": "2604.01022", "category": "quant-ph", "title": "A Factorization Identity for Twisted Multinomial Coefficients with Application to Pilot States in Hamiltonian Decoded Quantum Interferometry", "abstract": "The $q$-multinomial coefficient, a classical object in enumerative combinatorics, counts permutations of multisets weighted by the number of inversions, with a single deformation parameter $q$. We introduce the twisted multinomial coefficient, in which each inversion between letters $i$ and $j$ carries a pair-dependent weight $\\omega_{ij}$ determined by a skew-symmetric matrix $\\Omega$. In general, no closed-form evaluation is known. Our main result is that under a natural structural condition on $\\Omega$ - predecessor-uniformity ($\\omega_{ij} = q_j$ for all $i<j$) - the twisted multinomial factorizes as a product of Gaussian ($q$-deformed) binomials with site-dependent parameters: $\\binom{k}{k_1,\\ldots,k_m}_\\Omega = \\prod_j\\binom{\\ell_j}{k_j}_{q_j}$. This extends the standard product formula for the $q$-multinomial from a single parameter $q$ to $m-1$ independent parameters. The identity is purely combinatorial: it holds for arbitrary $q_j \\in \\mathbb{C}\\setminus\\{0\\}$ without any algebraic constraints. We were led to this identity by studying pilot state preparation in Hamiltonian Decoded Quantum Interferometry (HDQI), a recently proposed quantum algorithm for preparing Gibbs and ground states. As an application, we show that the factorization yields an exact matrix product state (MPS) of bond dimension $k+1$ for the expansion coefficients of $h^k$ in a twisted algebra. We note that this addresses only one component of the HDQI pipeline (pilot state preparation); the full protocol additionally requires efficient decoding of the associated Hamiltonian code, and both components must work in conjunction for Hamiltonians of physical interest. Identifying such Hamiltonians remains an important open problem.", "url": "https://arxiv.org/abs/2604.01022", "type": "理论+数值", "summary": "$q$-多项式系数是枚举组合学中的经典对象，它使用单个变形参数 $q$ 来计算按反演次数加权的多重集的排列。我们引入了扭曲多项式系数，其中字母 $i$ 和 $j$ 之间的每个反转都带有由斜对称矩阵 $\\Omega$ 确定的成对相关权重 $\\omega_{ij}$。一般来说，没有已知的封闭式评估。我们的主要结果是，在 $\\Omega$ 的自然结构条件下 - 前驱均匀性（对于所有 $i<j$，$\\omega_{ij} = q_j$） - 扭曲多项式因式分解为高斯（$q$ 变形）二项式与位点相关参数的乘积： $\\binom{k}{k_1,\\ldots,k_m}_\\Omega = \\prod_j\\binom{\\ell_j}{k_j}_{q_j}$。这将 $q$ 多项式的标准乘积公式从单个参数 $q$ 扩展到 $m-1$ 独立参数。恒等式是纯粹的组合：它适用于任意 $q_j \\in \\mathbb{C}\\setminus\\{0\\}$，没有任何代数约束。\n\n我们通过研究哈密顿解码量子干涉测量 (HDQI) 中的导频状态准备得出了这一结论，HDQI 是最近提出的一种用于准备吉布斯和基态的量子算法。作为一个应用，我们表明，对于扭曲代数中 $h^k$ 的展开系数，分解可以产生键维数为 $k+1$ 的精确矩阵乘积状态 (MPS)。我们注意到，这仅涉及 HDQI 管道的一个组成部分（试点状态准备）；完整的协议还需要对相关的哈密顿量代码进行有效解码，并且两个组件必须针对物理利益的哈密顿量协同工作。识别这样的哈密顿量仍然是一个重要的悬而未决的问题。", "authors": [{"name": "Pawel Wocjan"}], "featured_authors": [{"name": "Pawel Wocjan"}], "author_count": 1}, {"id": "2604.01040", "category": "quant-ph", "title": "Geometry-induced correlated noise in qLDPC syndrome extraction", "abstract": "With code and syndrome-extraction schedule fixed, can routed geometry alone change the correlated fault model enough to impact logical performance? Starting from a geometry-conditioned same-tick interaction Hamiltonian, we derive a controlled retained single-and-pair data-fault model for bivariate-bicycle (BB) layouts. Two geometry metrics emerge in two kernel regimes: under a crossing-local diagnostic kernel, a matching argument reduces the support-level effective fault weight; when every support pair appears in at least one retained round with finite same-round separation, strictly positive kernels saturate the support graph, and weighted exposure becomes the discriminating quantity. Circuit-level Monte Carlo on the $[\\![72, 12, 6]\\!]$ and $[\\![144, 12, 12]\\!]$ benchmarks confirms that a biplanar bounded-thickness layout suppresses the monomial single-layer embedding penalty, with weighted exposure tracking logical error rate across 101 operating points (Spearman correlation 0.893). A single-layer logical-family optimization on BB72 reduces worst-case exposure by 26.11% and lowers logical error rate in the tested power-law window. Routed geometry should be optimized together with code, schedule, and decoder.", "url": "https://arxiv.org/abs/2604.01040", "type": "理论+数值", "summary": "代码和综合症提取时间表固定后，路由几何结构是否足以单独改变相关故障模型以影响逻辑性能？从几何条件相同滴答交互哈密顿量开始，我们导出了用于双变量自行车（BB）布局的受控保留单对数据故障模型。两个几何度量出现在两个内核机制中：在跨局部诊断内核下，匹配参数降低了支持级别的有效故障权重；当每个支持对出现在至少一个具有有限同轮间隔的保留轮中时，严格正核使支持图饱和，并且加权曝光成为判别量。 $[\\![72, 12, 6]\\!]$ 和 $[\\![144, 12, 12]\\!]$ 基准上的电路级蒙特卡罗证实，双平面有界厚度布局可以抑制单项式单层嵌入惩罚，并且在 101 个操作点上具有加权曝光跟踪逻辑错误率（Spearman 相关性 0.893）。 BB72 上的单层逻辑系列优化将最坏情况暴露降低了 26.11%，并降低了测试幂律窗口中的逻辑错误率。\n\n路由几何结构应与代码、调度和解码器一起优化。", "authors": [{"name": "Angelo Di Bella"}], "featured_authors": [{"name": "Angelo Di Bella"}], "author_count": 1}, {"id": "2604.01048", "category": "quant-ph", "title": "Distilling Unitary Operations: A No-Go Theorem and Minimal Realization", "abstract": "Quantum gates executed on physical hardware are inevitably degraded by environmental noise. While state purification effectively distills static quantum resources, the dynamic execution of quantum algorithms requires a higher-order approach to mitigate errors on the operations themselves. In this work, we investigate unitary purification: the task of utilizing a quantum higher-order operation to partially restore the ideal action of an unknown unitary corrupted by a known noise model. Focusing on canonical depolarizing noise, we first reveal a fundamental operational obstruction. We prove that within the indefinite causal order framework, no nontrivial 2-slot higher-order operation can universally purify the set of single-qubit unitaries. Overcoming this strict limitation, we establish that a 3-slot architecture provides the minimal realization for non-trivial universal purification. We analytically derive the optimal average fidelity for the 3-slot regime, demonstrating that it strictly surpasses trivial strategies by systematically utilizing ancillary qubits as a quantum memory to absorb errors. Furthermore, we provide a concrete quantum circuit construction for this optimal higher-order operation. Our results establish the strict theoretical boundaries of distilling clean operations from noisy gates, offering immediate architectural insights for robust gate design.", "url": "https://arxiv.org/abs/2604.01048", "type": "理论+数值", "summary": "在物理硬件上执行的量子门不可避免地会受到环境噪声的影响。虽然状态净化可以有效地提取静态量子资源，但量子算法的动态执行需要采用高阶方法来减少操作本身的错误。在这项工作中，我们研究酉纯化：利用量子高阶运算部分恢复被已知噪声模型破坏的未知酉的理想行为的任务。着眼于典型的去极化噪声，我们首先揭示了一个基本的操作障碍。我们证明，在不定因果顺序框架内，任何非平凡的 2 时隙高阶运算都不能普遍净化单量子位酉集。克服了这一严格限制，我们确定 3 槽架构为非平凡的通用纯化提供了最低限度的实现。我们通过分析推导了 3 槽机制的最佳平均保真度，证明它通过系统地利用辅助量子位作为量子存储器来吸收错误，从而严格超越了平凡的策略。\n\n此外，我们为这种最佳高阶操作提供了具体的量子电路结构。我们的结果建立了从嘈杂的门中提取清洁操作的严格理论界限，为稳健的门设计提供了直接的架构见解。", "authors": [{"name": "Jiayi Zhao"}, {"name": "Yu-Ao Chen"}, {"name": "Guocheng Zhen"}, {"name": "Chengkai Zhu"}, {"name": "Ranyiliu Chen"}, {"name": "Xin Wang"}], "featured_authors": [{"name": "Jiayi Zhao"}, {"name": "Yu-Ao Chen"}, {"name": "Guocheng Zhen"}, {"name": "Chengkai Zhu"}, {"name": "Ranyiliu Chen"}, {"name": "Xin Wang"}], "author_count": 6}, {"id": "2604.01050", "category": "quant-ph", "title": "Simulated Bifurcation Quantum Annealing", "abstract": "We introduce Simulated Bifurcation Quantum Annealing (SBQA), a quantum-inspired optimization algorithm that extends simulated bifurcation by incorporating inter-replica interactions to mimic quantum tunneling. SBQA retains the efficiency and parallelism of simulated bifurcation while improving performance on sparse and rugged energy landscapes. We derive its equations of motion, analyze parameter dependence, and propose a lightweight auto-tuning strategy. A comprehensive benchmarking study on both large-scale problems and smaller instances relevant for current quantum hardware shows that SBQA systematically improves on SBM in the sparse and rugged regimes where SBM is known to struggle, while remaining competitive and versatile across a diverse set of tested problem families. These results position SBQA as a practical quantum-inspired optimization heuristic and a stronger classical baseline for the sparse and rugged regimes studied here.", "url": "https://arxiv.org/abs/2604.01050", "type": "理论+数值", "summary": "我们引入了模拟分叉量子退火 (SBQA)，这是一种受量子启发的优化算法，它通过合并副本间相互作用来模拟量子隧道，从而扩展了模拟分叉。 SBQA 保留了模拟分叉的效率和并行性，同时提高了稀疏和崎岖能源景观的性能。我们推导了其运动方程，分析了参数依赖性，并提出了一种轻量级自动调整策略。对与当前量子硬件相关的大规模问题和较小实例进行的全面基准测试研究表明，SBQA 在已知 SBM 难以应对的稀疏和崎岖的情况下系统地改进了 SBM，同时在各种经过测试的问题系列中保持竞争力和多功能性。这些结果将 SBQA 定位为一种实用的量子启发优化启发式方法，也是这里研究的稀疏和崎岖状态的更强的经典基线。", "authors": [{"name": "Jakub Pawłowski"}, {"name": "Paweł Tarasiuk"}, {"name": "Jan Tuziemski"}, {"name": "Łukasz Pawela"}, {"name": "Bartłomiej Gardas"}], "featured_authors": [{"name": "Jakub Pawłowski"}, {"name": "Paweł Tarasiuk"}, {"name": "Jan Tuziemski"}, {"name": "Łukasz Pawela"}, {"name": "Bartłomiej Gardas"}], "author_count": 5}, {"id": "2604.01157", "category": "quant-ph", "title": "Thermal Entanglement and Out-of-Equilibrium Thermodynamics in 1D Bose gases", "abstract": "We investigate entanglement in and out of equilibrium in a one-dimensional Bose gas in its low-energy Bogoliubov regime. In this Gaussian setting, the state is fully characterized by its covariance matrix, which allows us to detect and quantify entanglement using a covariance-based framework and associated entanglement monotones. For thermal states, we determine the optimal entanglement witness arising from the covariance matrix criterion and show that it has a remarkably simple mode-resolved structure: it is diagonal in the normal-mode basis and admits a simple analytic form that can be expressed as a product of only two normal-mode uncertainties. We then study out-of-equilibrium dynamics induced by unitary compression and show that entanglement can be generated even from initially separable thermal states. When the evolution is fully adiabatic, the optimal witness retains the same two-mode structure as in the thermal case. Departing from this regime, i.e., performing increasingly rapid compression, the optimal witness becomes genuinely more intricate. Our methods and results provide a unified and physically intuitive picture of how entanglement emerges and evolves in 1D quantum Bose gases, and identify an optimal witness structure relevant more broadly to the analysis of entanglement in quadratic bosonic models and its role in thermodynamic cycles.", "url": "https://arxiv.org/abs/2604.01157", "type": "理论+数值", "summary": "我们研究一维玻色气体在低能 Bogoliubov 态下的平衡态和非平衡态纠缠。在这种高斯设置中，状态完全由其协方差矩阵表征，这使我们能够使用基于协方差的框架和相关的纠缠单调来检测和量化纠缠。对于热态，我们确定了由协方差矩阵准则产生的最佳纠缠见证，并表明它具有非常简单的模式解析结构：它在简正模基础上是对角的，并且允许简单的解析形式，可以表示为仅两个简正模不确定性的乘积。然后，我们研究了由单一压缩引起的不平衡动力学，并表明即使从最初可分离的热态也可以产生纠缠。当演化完全绝热时，最佳见证保留与热情况下相同的双模结构。偏离这种制度，即执行越来越快的压缩，最佳见证实际上变得更加复杂。\n\n我们的方法和结果提供了关于一维量子玻色气体中纠缠如何出现和演化的统一且物理直观的图片，并确定了与二次玻色子模型中的纠缠分析及其在热力学循环中的作用更广泛相关的最佳见证结构。", "authors": [{"name": "Julia Mathé"}, {"name": "Nicky Kai Hong Li"}, {"name": "Pharnam Bakhshinezhad"}, {"name": "Giuseppe Vitagliano"}], "featured_authors": [{"name": "Julia Mathé"}, {"name": "Nicky Kai Hong Li"}, {"name": "Pharnam Bakhshinezhad"}, {"name": "Giuseppe Vitagliano"}], "author_count": 4}, {"id": "2604.01165", "category": "quant-ph", "title": "Variational Dynamics of Open Quantum Spin Systems in Phase Space", "abstract": "We introduce a variational method for simulating the dynamics of interacting open quantum spin systems. The method is based on the spin phase-space representation and variationally targets the Husimi-$Q$ function with an ansatz based on a multi-dimensional mixture of spin-coherent states. Crucially, the mixture coefficients are allowed to take negative values, enabling the faithful capture of quantum correlations beyond semiclassical descriptions. The resulting equations of motion are derived from the Dirac-Frenkel variational principle and can be evaluated efficiently without resorting to Monte Carlo sampling by exploiting the analytical structure of the ansatz. As a first application, we demonstrate that this approach accurately captures both the full quantum dynamics and the non-equilibrium steady states of the transverse-field quantum Ising model, in excellent agreement with exact diagonalization. Furthermore, we show that the method scales efficiently to large two-dimensional lattices, a regime that remains challenging for other techniques.", "url": "https://arxiv.org/abs/2604.01165", "type": "理论+数值", "summary": "我们引入了一种变分方法来模拟相互作用的开放量子自旋系统的动力学。该方法基于自旋相空间表示，并通过基于自旋相干态的多维混合的 ansatz 来变化地瞄准 Husimi-$Q$ 函数。至关重要的是，允许混合系数取负值，从而能够忠实地捕获超出半经典描述的量子相关性。由此产生的运动方程源自狄拉克-弗兰克尔变分原理，并且可以通过利用 ansatz 的分析结构进行有效评估，而无需借助蒙特卡洛采样。作为第一个应用，我们证明这种方法准确地捕获了横向场量子伊辛模型的完整量子动力学和非平衡稳态，与精确对角化非常一致。此外，我们表明该方法可以有效地扩展到大型二维晶格，这对于其他技术来说仍然具有挑战性。", "authors": [{"name": "Jacopo Tosca"}, {"name": "Zejian Li"}, {"name": "Francesco Carnazza"}, {"name": "Cristiano Ciuti"}], "featured_authors": [{"name": "Jacopo Tosca"}, {"name": "Zejian Li"}, {"name": "Francesco Carnazza"}, {"name": "Cristiano Ciuti"}], "author_count": 4}, {"id": "2604.01192", "category": "quant-ph", "title": "Quantum Gibbs Sampling in Infinite Dimensions: Generation, Mixing Times and Circuit Implementation", "abstract": "We develop a rigorous and implementable framework for Gibbs sampling of infinite-dimensional quantum systems governed by unbounded Hamiltonians. Extending dissipative Gibbs samplers beyond finite d
