  <script>
    const papers = [{"id": "2604.00145", "category": "cond-mat", "title": "Retained-spin micropolar hydrodynamics from the Boltzmann--Curtiss equation: a generalized Chapman--Enskog construction", "abstract": "We derive a retained-spin micropolar hydrodynamic closure from the Boltzmann--Curtiss equation using a generalized Chapman--Enskog construction in which the local mean spin is retained as a quasi-slow variable. Starting from the exact kinetic balance laws for mass, linear momentum, and intrinsic angular momentum, we isolate the bookkeeping relation between antisymmetric stress and stress-induced spin torque, decompose the first-order source into irreducible scalar, axial, and symmetric-traceless sectors, and show explicitly how the standard micropolar constitutive structure with coefficients $(\\eta,\\xi,\\eta_r,\\alpha,\\beta,\\gamma)$ emerges. This decomposition makes clear that the one-particle kinetic stress contributes only to the symmetric stress, whereas the rotational viscosity belongs to an intrinsic/collisional transfer channel. For perfectly rough elastic hard spheres, we further obtain explicit dilute-gas estimates for the rotational viscosity $\\eta_r$ from homogeneous spin relaxation and for the transverse spin-diffusion combination $\\beta+\\gamma$ from a transport-relaxation calculation. Targeted event-driven molecular-dynamics simulations are used as a posteriori checks: expanded homogeneous-spin density and roughness sweeps support the predicted $n^2$ and $K/(K+1)$ trends for $\\eta_r$, while finite-$k$ transverse runs provide a qualitative diagnostic of the retained-spin response. The result is a self-contained derivation and coefficient-level estimate of retained-spin micropolar hydrodynamics that clarifies which parts of the closure are exact, which are first-order generalized Chapman--Enskog results, and which remain controlled rough-sphere estimates.", "url": "https://arxiv.org/abs/2604.00145", "type": "理论+数值", "summary": "我们使用广义的 Chapman-Enskog 构造从 Boltzmann-Curtiss 方程导出保留自旋微极性流体动力闭合，其中局部平均自旋被保留为准慢变量。从质量、线性动量和内禀角动量的精确动平衡定律出发，我们分离出反对称应力和应力引起的自旋扭矩之间的簿记关系，将一阶源分解为不可约标量、轴向和对称无迹扇区，并明确显示系数为 $(\\eta,\\xi,\\eta_r,\\alpha,\\beta,\\gamma)$ 的标准微极本构结构是如何出现的。这种分解清楚地表明，单粒子动应力仅对对称应力有贡献，而旋转粘度属于固有/碰撞传递通道。对于完全粗糙弹性硬球，我们进一步从均匀自旋弛豫中获得旋转粘度 $\\eta_r$ 的显式稀释气体估计，并从输运弛豫计算中获得横向自旋扩散组合 $\\beta+\\gamma$ 的显式稀释气体估计。\n\n有针对性的事件驱动分子动力学模拟用作后验检查：扩展的均质自旋密度和粗糙度扫描支持 $\\eta_r$ 的预测 $n^2$ 和 $K/(K+1)$ 趋势，而有限 $k$ 横向运行提供了保留自旋响应的定性诊断。结果是保留自旋微极流体动力学的独立推导和系数水平估计，阐明了闭合的哪些部分是精确的，哪些是一阶广义查普曼-恩斯科格结果，哪些仍然是受控的粗糙球估计。", "authors": [{"name": "Satori Tsuzuki"}], "featured_authors": [{"name": "Satori Tsuzuki"}], "author_count": 1}, {"id": "2604.00147", "category": "cond-mat", "title": "Microscopic Basis for Recovery Rheology and the Nonequilibrium Structure,Yielding, and Flow of Dense Particle Suspensions", "abstract": "The recent introduction of recovery rheology has provided qualitatively new physical insights into the yielding and flow of soft matter systems across diverse mechanically driven nonequilibrium protocols by separating the deformation strain into recoverable and unrecoverable components. A striking finding is that the fluid-like response associated with the gradually increasing unrecoverable strain ultimately leads to the continuous yielding transition from a solid to a liquid. We build on the force and particle level Elastically Collective Nonlinear Langevin Equation theory of activated dynamics within a nonequilibrium microrheological framework to formulate a general statistical mechanical foundation of step-rate start-up shear response that relates recovery rheology to microscopic structure, relaxation, and elasticity. Quantitative applications to metastable hard and soft sphere colloidal suspensions reveal testable new predictions and interconnections between macroscopic and microscopic properties: (i) the steady state recoverable strain is directly related to the steady-state shear thinning; (ii) the transient stress overshoot amplitude varies non-monotonically with packing fraction and is quantitatively linked to the steady-state recoverable strain; (iii) the acquired unrecoverable strain dictates the stress overshoot strain; (iv) the predicted enormous reduction of the structural relaxation time under deformation is inversely related to the unrecoverable strain-rate.", "url": "https://arxiv.org/abs/2604.00147", "type": "理论", "summary": "最近引入的恢复流变学通过将变形应变分离为可恢复和不可恢复的分量，为跨不同机械驱动的非平衡协议的软物质系统的屈服和流动提供了定性的新物理见解。一个惊人的发现是，与逐渐增加的不可恢复应变相关的类流体响应最终导致从固体到液体的连续屈服转变。我们以非平衡微流变学框架内的激活动力学的力和粒子级弹性集体非线性朗之万方程理论为基础，制定了阶跃启动剪切响应的一般统计力学基础，将恢复流变学与微观结构、松弛和弹性联系起来。\n\n亚稳态硬球和软球胶体悬浮液的定量应用揭示了可测试的新预测以及宏观和微观特性之间的相互关系：（i）稳态可恢复应变与稳态剪切稀化直接相关； (ii) 瞬态应力超调幅度随填充率非单调变化，并与稳态可恢复应变定量相关； (iii) 获得的不可恢复应变决定了应力超调应变； (iv) 预测变形下结构松弛时间的大幅减少与不可恢复的应变率成反比。", "authors": [{"name": "Anoop Mutneja"}, {"name": "Kenneth S. Schweizer"}], "featured_authors": [{"name": "Anoop Mutneja"}, {"name": "Kenneth S. Schweizer"}], "author_count": 2}, {"id": "2604.00221", "category": "cond-mat", "title": "Field-unmasked quantum geometry in a symmetry-forbidden photocurrent", "abstract": "Frequency- and polarization-resolved photocurrents provide a sensitive probe of hidden symmetry and band geometry in quantum materials. Here we study a chiral cubic sillenite whose global crystal symmetry forbids a longitudinal odd-in-B magneto-photocurrent in the Voigt geometry. Nevertheless, we observe a pronounced longitudinal response across the visible range that is predominantly linear in magnetic field, persists below the band gap, and exhibits strong helicity selectivity, with the circular channel exceeding the linear one and reversing sign upon switching light helicity. We resolve this apparent contradiction by identifying defect-enabled, field-selected spin ordering as the mechanism that lowers the effective magnetic symmetry without altering the global crystal structure. First-principles calculations show that O vacancies generate in-gap bound states and localized magnetic moments on neighboring Bi-O units, stabilized by strong SOC. Although symmetry-related vacancy configurations remain energetically degenerate and preserve the macroscopic T symmetry at zero field, an applied magnetic field selects a time-reversal-broken sector of the defect ensemble and reduces the effective magnetic symmetry to the subgroup that leaves B invariant, thereby lifting the longitudinal selection rule. Importantly, this field-selected symmetry reduction does more than activate a nominally forbidden photocurrent: it unmasks latent quantum-geometric responses encoded in the electronic structure. Momentum-resolved calculations show that the dominant circular and linear magneto-photocurrent channels spatially correlate with Berry-curvature-rich and quantum-metric-rich regions of the Brillouin zone, respectively. Our results establish field-selected defect symmetry lowering as a route to revealing hidden quantum geometry and activating forbidden nonlinear photocurrents in chiral quantum materials.", "url": "https://arxiv.org/abs/2604.00221", "type": "理论+数值", "summary": "频率和偏振分辨光电流提供了量子材料中隐藏对称性和能带几何形状的灵敏探针。在这里，我们研究了一种手性立方硅长石，其整体晶体对称性禁止 Voigt 几何中的纵向奇数 B 磁光电流。然而，我们在可见光范围内观察到明显的纵向响应，该响应在磁场中主要是线性的，持续低于带隙，并表现出很强的螺旋选择性，圆形通道超过线性通道，并且在切换光螺旋性时反转符号。我们通过将缺陷启用的场选择自旋排序确定为降低有效磁对称性而不改变全局晶体结构的机制来解决这一明显的矛盾。第一性原理计算表明，O 空位在邻近的 Bi-O 单元上产生能隙内束缚态和局域磁矩，并通过强 SOC 进行稳定。\n\n尽管与对称相关的空位构型保持能量简并并在零场下保持宏观 T 对称性，但施加的磁场会选择缺陷系综的时间反转破碎扇区，并将有效磁对称性降低到使 B 保持不变的子群，从而提升纵向选择规则。重要的是，这种场选择的对称性降低不仅仅是激活名义上禁止的光电流：它揭示了电子结构中编码的潜在量子几何响应。动量解析计算表明，占主导地位的圆形和线性磁光电流通道分别与布里渊区的贝里曲率丰富和量子度量丰富的区域空间相关。我们的结果建立了场选择缺陷对称性降低作为揭示隐藏的量子几何结构和激活手性量子材料中禁止的非线性光电流的途径。", "authors": [{"name": "Bumseop Kim"}, {"name": "Aaron M. Burger"}, {"name": "Zhenbang Dai"}, {"name": "Sayed Ali Akbar Ghorashi"}, {"name": "Adam Abirou"}, {"name": "Md Al Helal"}, {"name": "Vladmir M. Fridkin"}, {"name": "Jonathan E. Spanier"}, {"name": "Andrew M. Rappe"}], "featured_authors": [{"name": "Bumseop Kim"}, {"name": "Aaron M. Burger"}, {"name": "Zhenbang Dai"}, {"name": "Vladmir M. Fridkin"}, {"name": "Jonathan E. Spanier"}, {"name": "Andrew M. Rappe"}], "author_count": 9}, {"id": "2604.00238", "category": "cond-mat", "title": "Stress Asymmetry in Hard Magnetic Soft Materials", "abstract": "Hard magnetic soft materials -- soft polymers embedded with hard magnetic particles -- are modeled using continuum magnetomechanical formulations in which the deformation and the magnetization field are the primary kinematic variables. A recent question in such formulations is whether the Cauchy stress is symmetric, which is directly related to frame invariance and angular momentum balance. This note discusses energetically equivalent formulations, related by a change of variables between referential and current descriptions of the magnetization, and shows that they generally yield different Cauchy stresses, including a change in their symmetry. Specifically, the formulation based on a referential magnetization produces a symmetric Cauchy stress, while that based on a current magnetization generally yields an asymmetric Cauchy stress. We highlight that when the internal variable (magnetization field) is at the energy-minimizing equilibrium configuration, the divergences of these stresses are the same, and both stresses are symmetric.", "url": "https://arxiv.org/abs/2604.00238", "type": "理论", "summary": "硬磁软材料（嵌入硬磁颗粒的软聚合物）使用连续磁力公式进行建模，其中变形和磁化场是主要运动学变量。这种公式中最近的一个问题是柯西应力是否对称，这与框架不变性和角动量平衡直接相关。本文讨论了能量等效公式，与磁化强度的参考描述和当前描述之间的变量变化相关，并表明它们通常产生不同的柯西应力，包括其对称性的变化。具体而言，基于参考磁化强度的公式产生对称柯西应力，而基于当前磁化强度的公式通常产生不对称柯西应力。我们强调，当内部变量（磁场）处于能量最小化平衡配置时，这些应力的散度相同，并且两个应力是对称的。", "authors": [{"name": "H. Gökçen Güner"}, {"name": "Francois Barthelat"}, {"name": "John D. Clayton"}, {"name": "Carlos Mora-Corral"}, {"name": "Noel Walkington"}, {"name": "Kaushik Dayal"}], "featured_authors": [{"name": "H. Gökçen Güner"}, {"name": "Francois Barthelat"}, {"name": "John D. Clayton"}, {"name": "Carlos Mora-Corral"}, {"name": "Noel Walkington"}, {"name": "Kaushik Dayal"}], "author_count": 6}, {"id": "2604.00262", "category": "cond-mat", "title": "Dielectric response and viscosity due to dipolar interactions", "abstract": "The dielectric response and viscosity are two fundamental properties of liquids that are usually treated separately. Here we show that in highly polar liquids the viscosity can be predicted directly from the dielectric function. We employ a stochastic field theory for thermal dipole-field dynamics coupled to hydrodynamic flow, and derive a very general Kubo relation for the response of an observable to the flow. We then use this to derive a Green-Kubo formula for the viscosity operator in terms of the correlation function for the body force, rather than the usual stress tensor formulation, and from this we derive the contribution to the viscosity due to dipolar interactions. In strongly polar liquids like water we show that viscous dissipation arising from these thermal van der Waals interactions is the dominant dissipative mechanism, leading to a direct connection between dielectric relaxation and viscosity. The theory also predicts the emergence of a second relaxation time in the dielectric response even when only a single microscopic relaxation mechanism is present. This additional timescale contributes to the intrinsic Debye relaxation and provides a natural explanation for the widespread empirical observation that many liquids require two relaxation times to fit their dielectric spectra. By establishing a predictive link between dielectric properties and viscosity, our results revisit classical ideas of liquid dynamics originating with Debye and suggest a practical route for identifying promising solvents for electrochemical energy storage.", "url": "https://arxiv.org/abs/2604.00262", "type": "理论", "summary": "介电响应和粘度是液体的两个基本特性，通常分开处理。在这里，我们表明，在高极性液体中，可以直接从介电函数预测粘度。我们采用随机场理论来研究与流体动力流耦合的热偶极场动力学，并推导出可观测量对流的响应的非常通用的 Kubo 关系。然后，我们用它根据体积力的相关函数（而不是通常的应力张量公式）推导出粘度算子的 Green-Kubo 公式，并由此推导出偶极相互作用对粘度的贡献。在像水这样的强极性液体中，我们发现这些热范德华相互作用产生的粘性耗散是主要的耗散机制，导致介电弛豫和粘性之间的直接联系。该理论还预测，即使仅存在单一微观弛豫机制，介电响应中也会出现第二弛豫时间。\n\n这个额外的时间尺度有助于内在的德拜弛豫，并为广泛的经验观察提供了自然的解释，即许多液体需要两个弛豫时间来拟合其介电谱。通过建立介电特性和粘度之间的预测联系，我们的结果重新审视了德拜提出的液体动力学的经典思想，并提出了一种识别有前途的电化学储能溶剂的实用途径。", "authors": [{"name": "David S. Dean"}, {"name": "Haim Diamant"}], "featured_authors": [{"name": "David S. Dean"}, {"name": "Haim Diamant"}], "author_count": 2}, {"id": "2604.00294", "category": "cond-mat", "title": "Self-similar summation of virial expansions", "abstract": "Virial expansions are the series in powers of density assumed to be small. However, the equations of state require to consider finite densities for which virial expansions, as a rule, diverge. In order to extrapolate a virial expansion to the values, where this expansion diverges, one uses summation methods. The most often used method is the Padé summation, which has several deficiencies. First of all, Padé approximants are not uniquely defined, suggesting a large table of admissible variants. Second, often there appear spurious unphysical poles. On the contrary, in those cases where the existence of a pole is physically motivated, Padé approximants do not necessarily exhibit it. A new approach for the summation of virial expansions is suggested, based on self-similar approximation theory. The method is regular and uniquely defined. It allows for the determination of physically motivated poles. The accuracy of self-similar approximants is not worse than that of the best Padé approximants with fitting parameters or of Monte Carlo simulations. The self-similar summation is based solely on virial expansions, involving no fitting parameters. In some cases, self-similar summation allows for reconstructing the sought functions exactly. The approach is illustrated by summing virial expansions for hard-disk fluids, hard-sphere fluids, and systems with power-law potentials.", "url": "https://arxiv.org/abs/2604.00294", "type": "理论+数值", "summary": "维里展开式是假定很小的密度幂级数。然而，状态方程需要考虑有限密度，对于该有限密度，维里展开式通常会发散。为了将维里展开外推到该展开发散的值，可以使用求和方法。最常用的方法是 Padé 求和，它有一些缺陷。首先，Padé 近似值并不是唯一定义的，这表明有一个很大的可接受变体表。其次，经常出现虚假的非物理极点。相反，在极点的存在是出于物理动机的情况下，Padé 近似并不一定会表现出来。基于自相似近似理论，提出了一种新的维里展开式求和方法。该方法是常规且唯一定义的。它允许确定物理驱动的极点。自相似近似法的精度并不比具有拟合参数的最佳 Padé 近似法或蒙特卡罗模拟的精度差。自相似求和仅基于维里展开，不涉及拟合参数。\n\n在某些情况下，自相似求和允许精确地重建所寻求的函数。该方法通过对硬盘流体、硬球流体和具有幂律势的系统的维里展开求和来说明。", "authors": [{"name": "V.I. Yukalov"}, {"name": "E.P. Yukalova"}], "featured_authors": [{"name": "V.I. Yukalov"}, {"name": "E.P. Yukalova"}], "author_count": 2}, {"id": "2604.00354", "category": "cond-mat", "title": "Unified Gauge-Geometry Symmetry for Equilibrium Statistical Mechanics", "abstract": "We present a symmetry-based framework for equilibrium statistical mechanics that formulates a single Lie group combining conventional spacetime symmetries with a recently identified phase-space gauge-shifting invariance [Muller et al., Phys. Rev. Lett. 133, 217101 (2024)]. Using Noether's theorem, we obtain a set of general Ward identities together with previously unexplored cross-relations arising from the noncommutation of different symmetry generators. The approach extends standard many-body symmetries, such as translations, rotations, Galilean boosts, dilations, and particle exchange, by incorporating an internal gauge-shift symmetry within a unified group structure. The resulting Lie algebra suggests a hierarchy of exact identities that encompass established sum rules and indicate possible cross-coupling relations between distinct response and correlation functions. We also identify a Wigner-Eckart-Ward reduction that simplifies tensor-hyperforce correlators to two scalar radial spectra in isotropic fluids, and we outline an equivariant gauge-constrained DFT formulation whose Euler-Lagrange equations are constructed to satisfy the corresponding Ward and cross-Ward constraints. This framework provides a consistent organizational basis for phenomena in liquids, mixtures, and interfaces, and may offer a symmetry-based perspective connecting structure, mechanics, and dynamics in many-body systems.", "url": "https://arxiv.org/abs/2604.00354", "type": "理论+数值", "summary": "我们提出了一个基于对称性的平衡统计力学框架，该框架将传统时空对称性与最近确定的相空间规范移位不变性相结合，制定了单个李群[Muller et al., Phys.莱特牧师。 133, 217101 (2024)]。利用诺特定理，我们获得了一组一般沃德恒等式以及之前未探索过的由不同对称生成元的非交换性产生的交叉关系。该方法通过将内部规范移位对称性纳入统一的群结构中，扩展了标准的多体对称性，例如平移、旋转、伽利略增强、膨胀和粒子交换。由此产生的李代数提出了精确恒等式的层次结构，其中包含已建立的总和规则，并指示不同响应和相关函数之间可能的交叉耦合关系。我们还确定了 Wigner-Eckart-Ward 约简，将张量超力相关器简化为各向同性流体中的两个标量径向谱，并且概述了等变规范约束 DFT 公式，其欧拉-拉格朗日方程被构造为满足相应的 Ward 和跨 Ward 约束。\n\n该框架为液体、混合物和界面中的现象提供了一致的组织基础，并且可以提供基于对称性的视角来连接多体系统中的结构、力学和动力学。", "authors": [{"name": "Hai Pham-Van"}], "featured_authors": [{"name": "Hai Pham-Van"}], "author_count": 1}, {"id": "2604.00366", "category": "cond-mat", "title": "Nonlinear Frequency-Momentum Topology and Doubling of Multifold Exceptional Points", "abstract": "Even in the linear limit, the topology of multifold (also called higher-order) exceptional points across the Brillouin zone has lacked a general characterization, leaving the doubling theorem essentially limited to two-fold exceptional points. Here, we establish the doubling theorem of $n$-fold exceptional points [EP$n$s ($n=2,3,\\ldots$)] for systems where nonlinearity enters through eigenvalues. To this end, we introduce new topological invariants, termed frequency-momentum winding numbers, which characterize nonlinear EP$n$s in $m$-band systems throughout the Brillouin zone for arbitrary $n$ and $m$ ($m\\geq n$). These invariants enable a unified proof of the doubling theorem in the absence of symmetry and under several symmetry constraints, including parity-time ($PT$) and charge-conjugation-parity symmetries. Furthermore, even in the linear limit, the frequency-momentum winding number indicates $\\mathbb{Z}$ topology of $PT$-symmetric EP$2$s which is beyond the previously reported $\\mathbb{Z}_2$ topology. The frequency-momentum winding numbers can also be extended to a class of coupled resonators in which nonlinearity enters via the eigenvectors, whereas the spectrum is determined by a nonlinear scalar equation for the frequency.", "url": "https://arxiv.org/abs/2604.00366", "type": "理论", "summary": "即使在线性极限下，布里渊区上的多重（也称为高阶）异常点的拓扑也缺乏一般的表征，使得倍增定理本质上仅限于两倍异常点。在这里，我们为非线性通过特征值进入的系统建立了 $n$ 倍异常点 [EP$n$s ($n=2,3,\\ldots$)] 的倍增定理。为此，我们引入了新的拓扑不变量，称为频率动量绕数，它表征了整个布里渊区中任意 $n$ 和 $m$ ($m\\geq n$) 的 $m$ 带系统中的非线性 EP$n$s。这些不变量能够在不存在对称性和几个对称约束下（包括宇称时间（$PT$）和电荷共轭宇称对称性）对倍增定理进行统一证明。此外，即使在线性极限下，频率动量绕数也表明$PT$对称EP$2$s的$\\mathbb{Z}$拓扑超出了先前报道的$\\mathbb{Z}_2$拓扑。\n\n频率动量绕组数也可以扩展到一类耦合谐振器，其中非线性通过特征向量进入，而频谱由频率的非线性标量方程确定。", "authors": [{"name": "Tsuneya Yoshida"}], "featured_authors": [{"name": "Tsuneya Yoshida"}], "author_count": 1}, {"id": "2604.00486", "category": "cond-mat", "title": "Electronic Raman scattering from 2D metals with broken inversion symmetry", "abstract": "Lack of inversion symmetry in metals breaks SU(2) symmetry which results in spin-splitting of the electronic states at the Fermi level due to various types of spin-orbit coupling (SOC) such as Dresselhaus, Rashba, or Ising (also called valley-Zeeman). This splitting is known to enable both incoherent spin-flip excitations and coherent chiral-spin modes. Another effect of breaking of SU(2) is the introduction of a direct spin-photon interaction. We use this concept to formulate a theory of inelastic scattering of photons from the charge carriers of such a system [electronic Raman scattering (eRS)]. As a result of broken SU(2), we show that the eRS probe, unlike conventional theory of Raman scattering, couples to spin excitations even without tuning the laser to an internal resonance. We show that the spin dependent excitations induced by photon scattering are sensitive to the polarization geometries as well as to the spin structure of the Hilbert space of the low-energy states. As a concrete realization, we examine doped/gated graphene on substrates with strong SOC with various compositions of Rashba and valley-Zeeman SOC and compare their spectra with those for a model 2D electron gas (2DEG). The spectra are shown to have a resonant feature in select polarization geometries near the SOC-splitting energy and, importantly, is shown to be different in the two systems. The signal in graphene systems is shown to be stronger than that in a 2DEG by orders of magnitude owing to the large Dirac velocity. We also outline how the lineshapes from the spectra can be used to infer various components of SOC in the system.", "url": "https://arxiv.org/abs/2604.00486", "type": "理论", "summary": "金属中缺乏反演对称性会破坏 SU(2) 对称性，由于各种类型的自旋轨道耦合 (SOC)，如 Dresselhaus、Rashba 或 Ising（也称为 Valley-Zeeman），导致费米能级电子态发生自旋分裂。已知这种分裂可以实现非相干自旋翻转激发和相干手性自旋模式。 SU(2) 断裂的另一个影响是引入直接的自旋光子相互作用。我们使用这个概念来制定光子从此类系统的电荷载流子非弹性散射的理论[电子拉曼散射（eRS）]。由于 SU(2) 被破坏，我们表明，与传统的拉曼散射理论不同，eRS 探针即使没有将激光调谐到内部共振，也会耦合到自旋激发。我们表明，光子散射引起的自旋相关激发对偏振几何形状以及低能态希尔伯特空间的自旋结构敏感。\n\n作为具体实现，我们检查了具有强 SOC 的基板上的掺杂/门控石墨烯，其中具有各种 Rashba 和 Valley-Zeeman SOC 成分，并将它们的光谱与模型 2D 电子气 (2DEG) 的光谱进行了比较。光谱显示在 SOC 分裂能量附近的选定偏振几何形状中具有共振特征，并且重要的是，在两个系统中显示出不同的光谱。由于狄拉克速度较大，石墨烯系统中的信号比 2DEG 中的信号强几个数量级。我们还概述了如何使用光谱中的线形来推断系统中 SOC 的各个组成部分。", "authors": [{"name": "Mojdeh Saleh"}, {"name": "Saurabh Maiti"}], "featured_authors": [{"name": "Mojdeh Saleh"}, {"name": "Saurabh Maiti"}], "author_count": 2}, {"id": "2604.00492", "category": "cond-mat", "title": "Braiding and exchange statistics of liquid crystalline Majorana quasiparticles", "abstract": "Liquid crystalline defects in 3D can be viewed as geometric spinors, whose emergent properties are reminiscent of those of topological excitations in quantum condensed matter, such as Majorana quasiparticles. However, it is unclear how deep this analogy is, and whether this is a purely mathematical mapping, or it extends to key physical features, such as the exchange statistics or braiding behaviour. To address this question, here we consider a simple pattern made up of four nematic Majorana-like defect profiles, and ask how the defect profiles change as we braid them repeatedly around each other. Surprisingly, we find that in a large range of parameter space the defect profiles behave as classical analogues of non-Abelian anyons, which can be described in our case by defect bivectors moving on a Bloch-like hemisphere. Elastic interactions and dynamical effects enhance the complexity of the gates which can be performed by braiding these quasiparticles, making these liquid crystalline spinors promising candidates as components of topological computers.", "url": "https://arxiv.org/abs/2604.00492", "type": "理论", "summary": "3D 中的液晶缺陷可以被视为几何旋量，其涌现性质让人想起量子凝聚态物质中的拓扑激发，例如马约拉纳准粒子。然而，目前尚不清楚这种类比有多深，以及这是否是纯粹的数学映射，或者它扩展到关键的物理特征，例如交换统计数据或编织行为。为了解决这个问题，我们在这里考虑一个由四个向列马约拉纳状缺陷轮廓组成的简单图案，并询问当我们将它们反复编织在一起时，缺陷轮廓如何变化。令人惊讶的是，我们发现在大范围的参数空间中，缺陷轮廓的行为与非阿贝尔任意子的经典类似物类似，在我们的例子中可以通过在类布洛赫半球上移动的缺陷双向量来描述。弹性相互作用和动力学效应增强了门的复杂性，这可以通过编织这些准粒子来实现，使这些液晶旋量成为拓扑计算机组件的有希望的候选者。", "authors": [{"name": "A. I. Tóth"}, {"name": "G. Negro"}, {"name": "A. D. Huxley"}, {"name": "D. Marenduzzo"}], "featured_authors": [{"name": "A. I. Tóth"}, {"name": "G. Negro"}, {"name": "A. D. Huxley"}, {"name": "D. Marenduzzo"}], "author_count": 4}, {"id": "2604.00526", "category": "cond-mat", "title": "Magnetoelectric Control of Toroidal Moment in Ferroaxial Crystal PbMn$_{2}$Ni$_{6}$Te$_{3}$O$_{18}$", "abstract": "Ferroic multipole orders break some symmetry and often activate unique physical properties, such as nonreciprocal directional dichroism and linear magnetoelectric effects. Here, we demonstrate the control of magnetic toroidal orientation in PbMn$_{2}$Ni$_{6}$Te$_{3}$O$_{18}$ through the application of electric and magnetic fields in two distinct configurations. Through directional dichroism, we successfully visualize magnetic ferrotoroidic domains, establishing the intrinsic coupling among magnetic toroidal moment, crystallographic ferroaxial moment, and magnetoelectric monopoles. Our findings not only present an effective pathway for controlling magnetic toroidal moment but also provide a novel approach for investigating ferroaxial ordering.", "url": "https://arxiv.org/abs/2604.00526", "type": "理论", "summary": "铁性多极有序打破了一些对称性，并且经常激活独特的物理性质，例如非互易方向二色性和线性磁电效应。在这里，我们演示了通过在两种不同配置中应用电场和磁场来控制 PbMn$_{2}$Ni$_{6}$Te$_{3}$O$_{18}$ 中的磁环方向。通过定向二色性，我们成功地可视化了磁铁磁畴，建立了磁环形矩、晶体铁轴矩和磁电单极子之间的内在耦合。我们的研究结果不仅提供了控制磁环矩的有效途径，而且还为研究铁轴有序性提供了一种新方法。", "authors": [{"name": "Shungo Aoyagi"}, {"name": "Shunsuke Kitou"}, {"name": "Taka-hisa Arima"}, {"name": "Yusuke Tokunaga"}], "featured_authors": [{"name": "Shungo Aoyagi"}, {"name": "Shunsuke Kitou"}, {"name": "Taka-hisa Arima"}, {"name": "Yusuke Tokunaga"}], "author_count": 4}, {"id": "2604.00552", "category": "cond-mat", "title": "Emergent Macroscopic Nonreciprocity from Identical Active Particles via Spontaneous Symmetry Breaking", "abstract": "Nonreciprocity is known to generate a wide range of exotic phenomena in multi-species many-body systems, where different species influence one another through couplings that violate Newton's third law. In contrast, in the absence of explicitly imposed macroscopic nonreciprocal processes, single-species nonreciprocity -- another distinct form of nonreciprocity -- typically plays only a limited role in shaping macroscopic physics. Here, using a single-species Vicsek model with a vision cone and extrinsic noise, we show that spontaneous symmetry breaking (SSB) can dramatically enhance the macroscopic consequences of microscopic single-species nonreciprocity. In the ordered phase, this enhancement gives rise to an emergent macroscopic nonreciprocity that induces the system of identical active particles to admit an effective description with a \"two-species\" non-Hermitian structure. The resulting SSB-enhanced nonreciprocity substantially promotes traveling-band formation and, more strikingly, drives a novel real-space condensation of identical active particles, characterized by a \"traveling line\" with vanishing longitudinal width. Our findings uncover a fundamental mechanism by which microscopic single-species nonreciprocity can exert strong macroscopic influences in complex systems.", "url": "https://arxiv.org/abs/2604.00552", "type": "理论", "summary": "众所周知，非互易性会在多物种多体系统中产生各种奇异现象，其中不同物种通过违反牛顿第三定律的耦合相互影响。相比之下，在缺乏明确施加的宏观非互易过程的情况下，单物种非互易性（非互易性的另一种独特形式）通常在塑造宏观物理方面仅发挥有限的作用。在这里，我们使用具有视锥和外在噪声的单物种 Vicsek 模型，表明自发对称破缺（SSB）可以显着增强微观单物种非互易性的宏观后果。在有序相中，这种增强产生了一种新出现的宏观非互易性，导致相同活性粒子的系统承认具有“双物种”非厄米结构的有效描述。由此产生的单边带增强的非互易性大大促进了行带的形成，更引人注目的是，驱动了相同活性粒子的新型实空间凝聚，其特征是纵向宽度消失的“行进线”。\n\n我们的研究结果揭示了一种基本机制，通过这种机制，微观单物种非互易性可以在复杂系统中产生强大的宏观影响。", "authors": [{"name": "Wei-Chen Guo"}, {"name": "Zuo Wang"}, {"name": "Pei-Fang Wu"}, {"name": "Li-Jun Lang"}, {"name": "Bao-Quan Ai"}, {"name": "Liang He"}], "featured_authors": [{"name": "Wei-Chen Guo"}, {"name": "Zuo Wang"}, {"name": "Pei-Fang Wu"}, {"name": "Li-Jun Lang"}, {"name": "Bao-Quan Ai"}, {"name": "Liang He"}], "author_count": 6}, {"id": "2604.00571", "category": "cond-mat", "title": "Beyond Beryllium: AI-Accelerated Materials Discovery for Interstellar Spacecraft Shielding", "abstract": "Project Daedalus (1973--1978), the most detailed interstellar probe design study ever conducted, specified a 9 mm beryllium erosion shield to protect the spacecraft payload during its 5.9 light-year cruise to Barnard's Star at 12% of the speed of light. This design, however, predated both the isolation of two-dimensional materials and the development of graph neural network (GNN) property predictors. Here, we systematically screen 20 candidate materials--spanning conventional aerospace metals, transition metal dichalcogenides, and ultra-high-temperature ceramics--using density functional theory (DFT) data from the JARVIS database (76,000 materials) with independent validation by the Atomistic Line Graph Neural Network (ALIGNN). We evaluate candidates across four criteria: specific mechanical stiffness (KV/rho), sputtering resistance, thermal neutron absorption cross-section, and thermodynamic stability. Our screening identifies hexagonal boron nitride (h-BN) and boron carbide (B4C) as dual-function materials offering simultaneous mechanical protection and neutron radiation shielding, and we propose a graphene/h-BN/polymer layered heterostructure shield design that achieves an estimated 47% mass reduction relative to the original beryllium specification. These findings will become immediately actionable upon the successful development of fusion pulse propulsion, which we note remains an outstanding engineering challenge.", "url": "https://arxiv.org/abs/2604.00571", "type": "理论+数值", "summary": "代达罗斯计划（1973--1978）是迄今为止进行的最详细的星际探测器设计研究，指定了一个 9 毫米铍腐蚀防护罩，以在以 12% 光速航行 5.9 光年前往巴纳德星期间保护航天器有效载荷。然而，这种设计早于二维材料的隔离和图神经网络（GNN）属性预测器的发展。在这里，我们使用 JARVIS 数据库（76,000 种材料）中的密度泛函理论 (DFT) 数据系统地筛选了 20 种候选材料，涵盖传统航空航天金属、过渡金属二硫属化物和超高温陶瓷，并通过原子线图神经网络 (ALIGNN) 进行独立验证。我们根据四个标准评估候选材料：比机械刚度 (KV/rho)、耐溅射性、热中子吸收截面和热力学稳定性。\n\n我们的筛选确定六方氮化硼 (h-BN) 和碳化硼 (B4C) 作为双功能材料，可同时提供机械保护和中子辐射屏蔽，并且我们提出了一种石墨烯/h-BN/聚合物层状异质结构屏蔽设计，相对于原始铍规格，预计质量减少了 47%。这些发现将在聚变脉冲推进的成功开发后立即付诸实践，我们注意到这仍然是一个突出的工程挑战。", "authors": [{"name": "Yue Li"}, {"name": "Xu Pan"}, {"name": "Kaiyuan Guo"}], "featured_authors": [{"name": "Yue Li"}, {"name": "Xu Pan"}, {"name": "Kaiyuan Guo"}], "author_count": 3}, {"id": "2604.00574", "category": "cond-mat", "title": "Nonequilibrium phase transition of dissipative fermionic superfluids: Case study of multi-terminal Josephson junctions", "abstract": "We investigate nonequilibrium dynamics of a triad of fermionic superfluids connected via Josephson junctions, following sudden switch-on of two-body loss in one of the three superfluids. By formulating the dissipative BCS theory for the Lindblad equation, we find that the superfluid order parameter exhibits a phase rotation, thereby giving rise to three types of dc Josephson currents corresponding to different junctions. We demonstrate that, when the tunneling amplitude $V_{31}$ between superfluids without two-body loss is weak, two-step nonequilibrium dynamical phase transition (NDPT) characterized by the vanishing dc Josephson currents occurs: dissipation first induces the NDPT by making one dc Josephson current finite, while further increasing dissipation makes this remaining dc Josephson current vanish. By contrast, when $V_{31}$ is strong, dissipation induces the NDPT in which all dc Josephson currents simultaneously vanish. An analytical study based on a simplified model further supports this observation.", "url": "https://arxiv.org/abs/2604.00574", "type": "理论", "summary": "我们研究了通过约瑟夫森结连接的三重费米子超流体的非平衡动力学，在三种超流体之一突然开启二体损失后。通过对 Lindblad 方程建立耗散 BCS 理论，我们发现超流体序参数表现出相位旋转，从而产生对应于不同结点的三种类型的直流约瑟夫森电流。我们证明，当没有两体损失的超流体之间的隧道振幅 $V_{31}$ 较弱时，会发生以直流约瑟夫森电流消失为特征的两步非平衡动态相变（NDPT）：耗散首先通过使一个直流约瑟夫森电流有限而引起NDPT，而进一步增加耗散使剩余的直流约瑟夫森电流消失。相比之下，当 $V_{31}$ 较强时，耗散会引起 NDPT，其中所有直流约瑟夫森电流同时消失。基于简化模型的分析研究进一步支持了这一观察结果。", "authors": [{"name": "Soma Takemori"}, {"name": "Kazuki Yamamoto"}], "featured_authors": [{"name": "Soma Takemori"}, {"name": "Kazuki Yamamoto"}], "author_count": 2}, {"id": "2604.00608", "category": "cond-mat", "title": "Directional-dependent Berezinskii-Kosterlitz-Thouless transition at EuO/KTaO$_3$(111) interfaces", "abstract": "In two dimensions, a phase-coherent superconducting state is established via a Berezinskii-Kosterlitz-Thouless (BKT) transition, whose critical temperature $T_{\\rm BKT}$ is determined by the global superfluid stiffness in uniform superconducting systems. We report that at the interface between (111)-oriented KTaO$_3$ and ferromagnetic EuO, the two-dimensional superconducting state exhibits a BKT transition relying on the direction of in-plane bias current. The highest $T_{\\rm BKT}$ occurs when current is applied along one of the [11$\\bar{2}$] axes of KTaO$_3$, underscoring a spontaneous breaking of the threefold lattice rotational symmetry. Such directional dependence of $T_{\\rm BKT}$ is consistently reflected in the nonreciprocal signals stemming from superconducting fluctuations above the transition. We attribute this phenomenon to an interfacial phase segregation; the phase with higher $T_{\\rm BKT}$ self-organizes into quasi-one-dimensional textures that stretch along one of the [11$\\bar{2}$] directions. Our results point toward the emergence of exotic phases of matter beyond the description of conventional BKT physics at a superconducting interface that is subjected to ferromagnetic proximity.", "url": "https://arxiv.org/abs/2604.00608", "type": "理论", "summary": "在二维中，相位相干超导态是通过 Berezinskii-Kosterlitz-Thouless (BKT) 转变建立的，其临界温度 $T_{\\rm BKT}$ 由均匀超导系统中的全局超流体刚度决定。我们报告说，在（111）取向的 KTaO$_3$ 和铁磁 EuO 之间的界面处，二维超导态表现出依赖于面内偏置电流方向的 BKT 转变。当沿着 KTaO$_3$ 的 [11$\\bar{2}$] 轴之一施加电流时，会出现最高的 $T_{\\rm BKT}$，这强调了三重晶格旋转对称性的自发破缺。 $T_{\\rm BKT}$ 的这种方向依赖性始终反映在源自跃迁上方超导涨落的不可逆信号中。我们将这种现象归因于界面相分离；具有较高 $T_{\\rm BKT}$ 的相自组织成准一维纹理，沿着 [11$\\bar{2}$] 方向之一延伸。\n\n我们的结果表明，在受到铁磁邻近影响的超导界面上，会出现超出传统 BKT 物理描述的奇异物质相。", "authors": [{"name": "Zongyao Huang"}, {"name": "Zhengjie Wang"}, {"name": "Xiangyu Hua"}, {"name": "Huiyu Wang"}, {"name": "Zhaohang Li"}, {"name": "Shihao Liu"}, {"name": "Zhiwei Wang"}, {"name": "Feixiong Quan"}, {"name": "Zhen Wang"}, {"name": "Jing Tao"}, {"name": "James Jun He"}, {"name": "Ziji Xiang"}, {"name": "Xianhui Chen"}], "featured_authors": [{"name": "Zongyao Huang"}, {"name": "Zhengjie Wang"}, {"name": "Xiangyu Hua"}, {"name": "James Jun He"}, {"name": "Ziji Xiang"}, {"name": "Xianhui Chen"}], "author_count": 13}, {"id": "2604.00707", "category": "cond-mat", "title": "The motion of tracer particles in turbulent superfluid $^4$He down to the zero-temperature limit", "abstract": "An injection system for polymer particles, with diameters ranging from 1 to 6 $\\mu$m, has been developed for visualizing flows in superfluid $^4$He at temperatures down to 0.14 K. Using an ultrasound transducer, bursts of particles were launched into a sample of superfluid and allowed to descend under gravity. The particles were imaged using their fluorescence in the presence of a sheet of laser light. We report on the statistical behavior of particles during their descent, including descriptions of a mixture of smooth and erratic trajectories, indicative of the interactions with thermal excitations and quantized vortex lines. Temperature-dependent velocity distributions were measured and analyzed, yielding Gaussian distributions with power law tails persisting into the zero temperature limit. When sampled over increasing length scales, these distributions bifurcated into exponential for the smallest particles and bimodal Gaussian for the largest. We also report observations of long-lived suspensions of small particles at temperatures near 1 K, which appear to be associated with the trapping of large numbers of particles in a turbulent vortex tangle. A method was developed for identifying and quantifying the numbers of particles bound to vortex lines, allowing for a description of the temporal dynamics of their population by an analytical model.", "url": "https://arxiv.org/abs/2604.00707", "type": "理论", "summary": "直径范围为 1 至 6 $\\mu$m 的聚合物颗粒注射系统已开发出来，用于可视化温度低至 0.14 K 的超流体 $^4$He 中的流动。使用超声波换能器，将颗粒群发射到超流体样品中，并使其在重力作用下下降。在激光照射下，利用颗粒的荧光对颗粒进行成像。我们报告粒子在下降过程中的统计行为，包括对平滑和不稳定轨迹混合的描述，表明与热激发和量子化涡线的相互作用。测量和分析了与温度相关的速度分布，产生幂律尾部持续到零温度极限的高斯分布。当在不断增加的长度尺度上进行采样时，这些分布对于最小粒子分为指数分布，对于最大粒子则分为双峰高斯分布。我们还报告了在接近 1 K 温度下小颗粒长期悬浮的观察结果，这似乎与湍流涡旋缠结中大量颗粒的捕获有关。\n\n开发了一种方法来识别和量化与涡流线结合的粒子数量，从而可以通过分析模型描述其总体的时间动态。", "authors": [{"name": "C. O. Goodwin"}, {"name": "M. J. Doyle"}, {"name": "J. A. Hay"}, {"name": "I. Skachko"}, {"name": "W. Guo"}, {"name": "P. M. Walmsley"}, {"name": "A. I. Golov"}], "featured_authors": [{"name": "C. O. Goodwin"}, {"name": "M. J. Doyle"}, {"name": "J. A. Hay"}, {"name": "W. Guo"}, {"name": "P. M. Walmsley"}, {"name": "A. I. Golov"}], "author_count": 7}, {"id": "2604.00777", "category": "cond-mat", "title": "Negative Differential Heat Conductivity in a Harmonic Chain Coupled to a Particle Reservoir", "abstract": "When coupling thermal baths at different temperatures, negative differential thermal conductivity is typically attributed to nonlinear interactions in the connecting medium. In this work, we demonstrate that such an effect can arise purely from the nature of the thermal baths and their coupling with the medium. Specifically, we construct a bath composed of overdamped thermal particles, which is coupled to one end of a harmonic chain, while the other end is connected to a standard Langevin heat bath. By analyzing the steady-state heat current, we observe significant negative differential thermal conductivity. In particular, as the temperature difference between the two baths diverges, the steady-state heat current through the chain vanishes. The effect is thermokinetic: we compute the effective dissipative coefficient and we find that it scales inversely with the square of the temperature of the particle bath in the high-temperature limit, resulting in an asymptotic decoupling between the bath and the chain. Our results highlight that nonequilibrium transport properties can be strongly influenced by the structure of the environment and its coupling to the system, even in otherwise linear systems.", "url": "https://arxiv.org/abs/2604.00777", "type": "理论", "summary": "当在不同温度下耦合热浴时，负导热系数通常归因于连接介质中的非线性相互作用。在这项工作中，我们证明这种效应纯粹是由温泉浴的性质及其与介质的耦合产生的。具体来说，我们构建了一个由过阻尼热粒子组成的浴，该浴耦合到谐波链的一端，而另一端连接到标准朗之万热浴。通过分析稳态热流，我们观察到显着的负微分热导率。特别是，当两个浴之间的温差发散时，通过链条的稳态热流消失。这种效应是热动力学的：我们计算有效耗散系数，发现它与高温极限下粒子浴温度的平方成反比，导致粒子浴和链条之间渐近解耦。\n\n我们的结果强调，即使在其他线性系统中，非平衡输运特性也会受到环境结构及其与系统的耦合的强烈影响。", "authors": [{"name": "Simon Krekels"}, {"name": "Christian Maes"}, {"name": "Ion Santra"}, {"name": "Ruoxun Zhai"}], "featured_authors": [{"name": "Simon Krekels"}, {"name": "Christian Maes"}, {"name": "Ion Santra"}, {"name": "Ruoxun Zhai"}], "author_count": 4}, {"id": "2604.00797", "category": "cond-mat", "title": "Emergent Weyl Nodes and Berry Curvature in Bose Polarons via $p$-Wave Feshbach Coupling", "abstract": "We show that an impurity quasiparticle immersed in a Bose-Einstein condensate, known as a Bose polaron, exhibits topological properties characterized by a nonzero Berry curvature, which is induced by Weyl nodes that emerge via interspecies $p$-wave Feshbach resonance. Such nodes occur even in the absence of spin degrees of freedom and spin-orbit coupling. For charged impurities, the corresponding $p$-wave polarons are shown to be accompanied by chiral anomaly. The above predictions can be tested in a cold atomic environment by observing the Hall transport of the atomic or ionic impurity cloud.", "url": "https://arxiv.org/abs/2604.00797", "type": "理论", "summary": "我们证明，浸入玻色-爱因斯坦凝聚体中的杂质准粒子（称为玻色极化子）表现出以非零贝里曲率为特征的拓扑特性，这是由通过种间$p$波费什巴赫共振出现的韦尔节点引起的。即使没有自旋自由度和自旋轨道耦合，这样的节点也会出现。对于带电杂质，相应的$p$波极化子被证明伴随着手性异常。上述预测可以在冷原子环境中通过观察原子或离子杂质云的霍尔输运来检验。", "authors": [{"name": "Hiroyuki Tajima"}, {"name": "Eiji Nakano"}, {"name": "Kei Iida"}], "featured_authors": [{"name": "Hiroyuki Tajima"}, {"name": "Eiji Nakano"}, {"name": "Kei Iida"}], "author_count": 3}, {"id": "2604.00858", "category": "cond-mat", "title": "Statistical Physics of Coding for the Integers", "abstract": "We study a paradigm of coding for compression of the natural numbers via the zeta distribution and develop a statistical-mechanical interpretation, both in terms of Hagedorn systems and a Bose gas with energy levels given by logarithms of prime numbers. We also propose a simple coding scheme for the zeta distribution that nearly achieves the ideal code length. For block coding of vectors of natural numbers, we derive the micro-canonical entropy function and demonstrate its asymptotic linearity implying that its behavior is analogous to that of a Hagedorn system. We also derive the large deviations rate function, and provide a formula for the best coding parameter in the large deviations sense. We show that due the Hagedorn-type phase transition there is only partial equivalence of ensembles, due to the degeneration of the domain of the partition function.", "url": "https://arxiv.org/abs/2604.00858", "type": "理论", "summary": "我们研究了通过 zeta 分布压缩自然数的编码范式，并根据哈格多恩系统和能量水平由素数对数给出的玻色气体开发了统计力学解释。我们还提出了一种简单的 zeta 分布编码方案，几乎达到了理想的码长。对于自然数向量的块编码，我们推导了微正则熵函数并证明了其渐近线性，这意味着其行为类似于 Hgedorn 系统。我们还推导了大偏差率函数，并提供了大偏差意义上的最佳编码参数的公式。我们表明，由于哈格多恩型相变，由于配分函数域的退化，系综仅部分等价。", "authors": [{"name": "Neri Merhav"}], "featured_authors": [{"name": "Neri Merhav"}], "author_count": 1}, {"id": "2604.00870", "category": "cond-mat", "title": "The Klein bottle ratio of two-dimensional ferromagnetic Potts models", "abstract": "The weakly first-order nature of the two-dimensional 5-state ferromagnetic Potts model poses challenges for numerical study. Using density-matrix and tensor-network renormalization group methods, we investigate these transitions of the Potts-$q$ model via the Klein bottle ratio $g$ on original and dual lattices. Finite-size scaling of $g$ as a function of transverse system size $L_y$ accurately locates the critical points for $q = 4, 5, 6$. We further examine the transfer-matrix spectra and entanglement entropy, extracting central charges through toroidal and Klein bottle boundary conditions. For $q = 5$, the extracted central charge ($c \\approx 1.14811$) is close to the real part of the theoretical value $c_{5\\text{-Potts}} = 1.1375 \\pm 0.0211 i$ predicted by complex conformal field theories. The observed drift in the scaling exponent $b$ effectively distinguishes the continuous transition from the weakly first-order regime. Furthermore, the extrapolated divergence of $g$ confirms the first-order nature of the $q=5$ Potts model.", "url": "https://arxiv.org/abs/2604.00870", "type": "理论+数值", "summary": "二维五态铁磁 Potts 模型的弱一阶性质给数值研究带来了挑战。使用密度矩阵和张量网络重正化群方法，我们通过原始晶格和对偶晶格上的克莱因瓶比率 $g$ 研究 Potts-$q$ 模型的这些转变。 $g$ 的有限尺寸缩放作为横向系统尺寸 $L_y$ 的函数，准确定位 $q = 4, 5, 6$ 的关键点。我们进一步检查转移矩阵谱和纠缠熵，通过环形和克莱因瓶边界条件提取中心电荷。对于$q = 5$，提取的中心电荷（$c \\approx 1.14811$）接近复杂共形场论预测的理论值$c_{5\\text{-Potts}} = 1.1375 \\pm 0.0211 i$的实部。观察到的标度指数 $b$ 的漂移有效地区分了连续转变与弱一阶状态。此外，$g$ 的外推散度证实了 $q=5$ Potts 模型的一阶性质。", "authors": [{"name": "Zi-Han Wang"}, {"name": "Li-Ping Yang"}], "featured_authors": [{"name": "Zi-Han Wang"}, {"name": "Li-Ping Yang"}], "author_count": 2}, {"id": "2604.00889", "category": "cond-mat", "title": "Ground-state solution of quantum droplets in Bose-Bose mixtures", "abstract": "In this paper, we present a systematic study on the ground state computation of quantum droplets in homonuclear Bose-Bose mixtures, governed by the extended Gross-Pitaevskii equations (eGPEs) with Lee-Huang-Yang (LHY) corrections. This model captures the formation of self-bound droplets stabilized by the delicate balance between the attractive mean-field interaction and the repulsive quantum fluctuations. We formulate dimensionless energy functionals for both the general two-component system and the reduced single-component density-locked model. To compute the ground states efficiently, we adapt and benchmark various gradient flow discretization schemes, identifying a backward-forward sine-pseudospectral scheme based on the gradient flow with Lagrange multiplier method (GFLM-BFSP) as the robust solver for our simulations. Utilizing this method, we report three main numerical observations: (i) the density-locked model is quantitatively validated as a reliable approximation for ground state properties; (ii) the dimension-dependent convergence rates of the Thomas-Fermi approximation are established in the strong-coupling regime; and (iii) the critical particle number for self-binding in free space is numerically determined, providing a precise correction to the analytical prediction by Petrov [Phys. Rev. Lett. 115, 155302 (2015)].", "url": "https://arxiv.org/abs/2604.00889", "type": "理论+数值", "summary": "在本文中，我们对同核玻色-玻色混合物中量子液滴的基态计算进行了系统研究，该计算由带有 Lee-Huang-Yang (LHY) 校正的扩展 Gross-Pitaevskii 方程 (eGPE) 控制。该模型捕获了自束缚液滴的形成，该液滴通过吸引平均场相互作用和排斥量子涨落之间的微妙平衡而稳定。我们为一般的双组分系统和简化的单组分密度锁定模型制定了无量纲能量泛函。为了有效地计算基态，我们对各种梯度流离散化方案进行了调整和基准测试，确定了基于梯度流的后向正弦伪谱方案，并使用拉格朗日乘子法（GFLM-BFSP）作为我们模拟的鲁棒求解器。\n\n利用这种方法，我们报告了三个主要的数值观察结果：（i）密度锁定模型被定量验证为基态特性的可靠近似； (ii) 在强耦合状态下建立托马斯-费米近似的与尺寸相关的收敛速率； (iii) 自由空间中自结合的临界粒子数是通过数值确定的，为 Petrov [Phys.莱特牧师。 115, 155302 (2015)]。", "authors": [{"name": "Wei Liu"}, {"name": "Limin Xu"}], "featured_authors": [{"name": "Wei Liu"}, {"name": "Limin Xu"}], "author_count": 2}, {"id": "2604.00895", "category": "cond-mat", "title": "The effect of staggered nonlinearity on the Su-Schrieffer-Heeger model", "abstract": "We investigate the spectral properties of the Su-Schrieffer-Heeger (SSH) model with sublattice-dependent onsite nonlinearity. Two complementary approaches are employed in our studies. First, Bloch state solutions under periodic boundary conditions are assumed to enable semi-analytical treatment, which allows us to obtain the system's energy band structure and further derive a general expression of the Zak phase that incorporates nonlinearity-induced correction (referred to as nonlinear Zak phase). This analysis reveals that, at sufficiently high nonlinearities, a nonlinearity-induced topological phase transition occurs, marked by a discontinuity in the nonlinear Zak phase. The second approach amounts to numerically obtaining other (non-Bloch) solutions under open boundary conditions, employing the Self-Consistent Field Iterative Method. Its main results include the observation of an edge state's energy that is independent of a nonlinear parameter, a persisting band touching point that only shifts in the presence of perturbations reminiscent of Weyl points in a Weyl semimetal, as well as delocalized solutions that persist even at extreme nonlinearity strengths. These findings illuminate the rich interplay between topology and nonlinearity in lattice models with potential realization in optical/acoustic waveguide settings.", "url": "https://arxiv.org/abs/2604.00895", "type": "理论+数值", "summary": "我们研究了具有亚晶格相关现场非线性的 Su-Schrieffer-Heeger (SSH) 模型的光谱特性。我们的研究采用了两种互补的方法。首先，假设周期性边界条件下的Bloch状态解能够进行半解析处理，这使我们能够获得系统的能带结构，并进一步推导包含非线性引起的校正的Zak相位的一般表达式（称为非线性Zak相位）。该分析表明，在足够高的非线性度下，会发生非线性引起的拓扑相变，其特征是非线性 Zak 相的不连续性。第二种方法相当于采用自洽场迭代方法在开放边界条件下以数值方式获得其他（非布洛赫）解。其主要结果包括观察到独立于非线性参数的边缘态能量、仅在存在让人想起Weyl半金属中的Weyl点的扰动时才会发生变化的持续能带接触点，以及即使在极端非线性强度下也持续存在的离域解。\n\n这些发现阐明了晶格模型中拓扑和非线性之间丰富的相互作用，并有可能在光/声波导设置中实现。", "authors": [{"name": "Ahmed Alharthy"}, {"name": "RW Bomantara"}], "featured_authors": [{"name": "Ahmed Alharthy"}, {"name": "RW Bomantara"}], "author_count": 2}, {"id": "2604.00905", "category": "cond-mat", "title": "The origin of KPZ-scaling in arrays of polariton condensates", "abstract": "This work investigates the origin of Kardar-Parisi-Zhang (KPZ) scaling in the phase dynamics of one-dimensional and two-dimensional polariton condensates. We demonstrate that the key mechanism leading to the observed power laws for the first-order correlation function $g^{(1)}$ is the fluctuation of the population of Goldstone modes, which arise due to the spontaneous breaking of $U(1)$ symmetry. Numerical simulations and analytical theory confirm that the critical exponents describing the KPZ universality class directly follow from the dynamics of Goldstone excitations. Our results establish a direct connection between the microscopic parameters of arrays of exciton-polariton condensates and the coherent properties of the light they emit.", "url": "https://arxiv.org/abs/2604.00905", "type": "理论+数值", "summary": "这项工作研究了一维和二维极化子凝聚相动力学中卡达尔-帕里西-张 (KPZ) 标度的起源。我们证明，导致一阶相关函数 $g^{(1)}$ 观察到幂律的关键机制是戈德斯通模式总体的波动，这是由于 $U(1)$ 对称性的自发破缺而产生的。数值模拟和分析理论证实，描述 KPZ 普适性类别的临界指数直接来自 Goldstone 激励的动力学。我们的结果在激子-极化子凝聚体阵列的微观参数与其发出的光的相干特性之间建立了直接联系。", "authors": [{"name": "Denis Novokreschenov"}, {"name": "Alexey Kavokin"}], "featured_authors": [{"name": "Denis Novokreschenov"}, {"name": "Alexey Kavokin"}], "author_count": 2}, {"id": "2604.00910", "category": "cond-mat", "title": "The $\\mathbb{Z}_N^{\\times 3}$ symmetry protected boundary modes in two-dimensional Potts paramagnets", "abstract": "We construct and analyze a class of one-dimensional boundary Hamiltonians arising from two-dimensional symmetry-protected topological phases with $\\mathbb{Z}_N^{\\times 3}$ symmetry on a triangular lattice. Using a cohomology-based transformation, the lattice models for the edge modes are explicitly obtained, and their structure is shown to be governed by the arithmetic properties of $N$. For prime $N$, the boundary theory admits a formulation in terms of mutually commuting Temperley-Lieb algebras. For the composite values of $N$, the models exhibit hierarchical or factorized structures. We demonstrate that all phases can be understood in terms of primary models augmented by local defect degrees of freedom that partition the system into independent segments. Finally, the global symmetry is realized on the boundary in a non-on-site and anomalous manner via a projective representation, directly realizing the corresponding 't Hooft anomaly.", "url": "https://arxiv.org/abs/2604.00910", "type": "理论", "summary": "我们构造并分析了一类由二维对称保护拓扑相产生的一维边界哈密顿量，在三角晶格上具有 $\\mathbb{Z}_N^{\\times 3}$ 对称性。使用基于上同调的变换，显式地获得了边缘模式的晶格模型，并且它们的结构被证明由$N$的算术属性控制。对于素数 $N$，边界理论允许采用相互交换 Temperley-Lieb 代数的公式。对于 $N$ 的复合值，模型表现出分层或分解结构。我们证明，所有阶段都可以用主要模型来理解，该模型通过局部缺陷自由度来增强，将系统划分为独立的部分。最后，通过射影表示以非现场异常的方式在边界上实现全局对称，直接实现相应的't Hooft异常。", "authors": [{"name": "Hrant Topchyan"}], "featured_authors": [{"name": "Hrant Topchyan"}], "author_count": 1}, {"id": "2604.00930", "category": "cond-mat", "title": "Absence of $O (2)$ symmetry in the Vicsek model", "abstract": "The phase transition in the Vicsek model is widely believed to be associated with spontaneous symmetry breaking of the two-dimensional rotational symmetry $O (2)$. In this paper, we revisit the original Vicsek model introduced in [Phys. Rev. Lett. 75, 1226] and demonstrate that the model lacks $O (2)$ symmetry. As a consequence, we numerically demonstrate that the phase transition reported in the original paper vanishes when the global phase is adaptively chosen.", "url": "https://arxiv.org/abs/2604.00930", "type": "理论+数值", "summary": "人们普遍认为 Vicsek 模型中的相变与二维旋转对称 $O (2)$ 的自发对称破缺有关。在本文中，我们重新审视了 [Phys.莱特牧师。 75, 1226] 并证明该模型缺乏 $O (2)$ 对称性。因此，我们通过数值证明，当自适应选择全局相位时，原始论文中报告的相变消失。", "authors": [{"name": "Yushin Takahashi"}, {"name": "Kota Mitsui"}, {"name": "Tsuyoshi Mizohata"}, {"name": "Hideyuki Miyahara"}], "featured_authors": [{"name": "Yushin Takahashi"}, {"name": "Kota Mitsui"}, {"name": "Tsuyoshi Mizohata"}, {"name": "Hideyuki Miyahara"}], "author_count": 4}, {"id": "2604.01017", "category": "cond-mat", "title": "Parameter-Efficient Fine-Tuning of Machine-Learning Interatomic Potentials for Phonon and Thermal Properties", "abstract": "Machine-learning interatomic potentials are widely used as computationally efficient surrogates for density functional theory in atomistic simulations, enabling large-scale, long-time modeling of materials systems. We investigate how different fine-tuning strategies influence the prediction of harmonic phonon band structures, thermal properties, and the potential energy surface along imaginary phonon modes. We achieve substantial accuracy improvements with minimal additional data, with as few as 10 additional training structures already yielding significant gains. In addition to existing approaches, we introduce Equitrain, a finetuning framework that implements LoRA-based adaptation. Across 53 materials systems, we show that fine-tuned models consistently outperform both the underlying pretrained model and models trained from scratch. Equitrain achieves the best overall performance, and our results demonstrate that fine-tuning enables accurate phonon predictions.", "url": "https://arxiv.org/abs/2604.01017", "type": "理论+数值", "summary": "机器学习原子间势被广泛用作原子模拟中密度泛函理论的计算高效替代物，从而实现材料系统的大规模、长时间建模。我们研究了不同的微调策略如何影响谐波声子能带结构、热性质和沿虚声子模式的势能表面的预测。我们用最少的额外数据实现了显着的准确性提升，仅仅 10 个额外的训练结构就已经产生了显着的收益。除了现有方法之外，我们还引入了 Equitrain，这是一个实现基于 LoRA 的自适应的微调框架。在 53 个材料系统中，我们表明微调模型的性能始终优于底层预训练模型和从头开始训练的模型。 Equitrain 实现了最佳的整体性能，我们的结果表明微调可以实现准确的声子预测。", "authors": [{"name": "Jonas Grandel"}, {"name": "Philipp Benner"}, {"name": "Janine George"}], "featured_authors": [{"name": "Jonas Grandel"}, {"name": "Philipp Benner"}, {"name": "Janine George"}], "author_count": 3}, {"id": "2604.01062", "category": "cond-mat", "title": "Uniaxial Compression-Induced Anisotropy and Electronic Dimensionality in the Iron-Based Superconductor FeSe", "abstract": "The evolution of the superconducting transition temperature ($T_c$) in FeSe was investigated under in-plane, out-of-plane, and hydrostatic compression. For pressures up to 0.6 GPa, $T_c$ increases regardless of the compression mode, consistent with the suppression of nematic ordering. However, once nematicity is suppressed, $T_c$ exhibits a striking directional dependence: out-of-plane compression shows behavior similar to the hydrostatic case, with a sharp increase in $T_c$, whereas in-plane compression suppresses superconductivity. First-principles calculations suggest that in-plane compression shifts a hybridized band of Se $p_z$ and Fe $d_{x^2-y^2}$ character so that it crosses the Fermi level along the $\\Gamma$-Z direction, leading to the emergence of an additional metallic band. This leads to an increased three-dimensionality of the electronic structure and may be interpreted as a possible Lifshitz-type change in the Fermi surface. These results indicate that the dimensionality of the electronic structure plays a key role in determining the $T_c$ response of FeSe under different compression modes.", "url": "https://arxiv.org/abs/2604.01062", "type": "理论+数值", "summary": "研究了面内、面外和静水压缩下 FeSe 超导转变温度 ($T_c$) 的演变。对于高达 0.6 GPa 的压力，无论压缩模式如何，$T_c$ 都会增加，这与向列有序的抑制一致。然而，一旦向列性被抑制，$T_c$ 就会表现出惊人的方向依赖性：面外压缩表现出与静水压情况类似的行为，$T_c$ 急剧增加，而面内压缩则抑制超导性。第一性原理计算表明，面内压缩会移动 Se $p_z$ 和 Fe $d_{x^2-y^2}$ 特征的混合能带，使其沿着 $\\Gamma$-Z 方向穿过费米能级，从而导致出现额外的金属能带。这导致电子结构的三维度增加，并且可以解释为费米表面中可能的利夫希茨型变化。这些结果表明，电子结构的维数在决定不同压缩模式下 FeSe 的 $T_c$ 响应方面起着关键作用。", "authors": [{"name": "Alexy Bertrand"}, {"name": "Masaki Mito"}, {"name": "Kazuma Nakamura"}, {"name": "Mahmoud Abdel-Hafiez"}], "featured_authors": [{"name": "Alexy Bertrand"}, {"name": "Masaki Mito"}, {"name": "Kazuma Nakamura"}, {"name": "Mahmoud Abdel-Hafiez"}], "author_count": 4}, {"id": "2604.01109", "category": "cond-mat", "title": "High-symmetry ill-fitting subunits in 3D form aggregates of all dimensions", "abstract": "Proteins can combine into functional elements in living cells or self-assemble into unwanted structures in a number of diseases. The resulting aggregates often display filamentous morphologies across a large range of protein shapes and molecular interactions. This has led to the suggestion that filament formation could be a generic outcome of the aggregation of geometrically complex, ill-fitting objects, although such a mechanism has not been demonstrated in three dimensions. To address this problem, we theoretically study the self-assembly of three-dimensional identical, ill-fitting deformable subunits mimicking globular proteins in solution. In our model, self-assembling subunits incur deformations that accumulate as the aggregate size increases and can eventually hamper further assembly. We analytically predict the ground state morphologies of the resulting aggregates as a function of the subunit adhesivity and elasticity by mapping their mechanics onto those of two incompatible, interconnected networks. We find that zero-dimensional clusters, three-dimensional bulks as well as symmetry-broken one-dimensional filaments and two-dimensional layers can all form depending on assembly parameters. Incompressible, moderately adhesive subunits favor filaments. These findings hint at a generic pathway to control self-assembly in three dimensions and suggests that such mechanisms could be investigated in more realistic protein models.", "url": "https://arxiv.org/abs/2604.01109", "type": "理论", "summary": "蛋白质可以组合成活细胞中的功能元件，或者在许多疾病中自组装成不需要的结构。所得的聚集体通常在多种蛋白质形状和分子相互作用中表现出丝状形态。这导致人们认为，细丝的形成可能是几何复杂、不合适的物体聚集的一般结果，尽管这种机制尚未在三个维度上得到证明。为了解决这个问题，我们从理论上研究了三维相同、不合适的可变形亚基在溶液中模仿球状蛋白的自组装。在我们的模型中，自组装子单元会产生变形，随着聚集体尺寸的增加而累积，最终会阻碍进一步的组装。通过将所得聚集体的力学映射到两个不相容的互连网络的力学上，我们分析预测了所得聚集体的基态形态作为亚基粘附性和弹性的函数。\n\n我们发现零维簇、三维体以及对称破缺的一维细丝和二维层都可以根据组装参数形成。不可压缩的、中等粘性的亚基有利于细丝。这些发现暗示了在三个维度上控制自组装的通用途径，并表明可以在更现实的蛋白质模型中研究这种机制。", "authors": [{"name": "Elena N. Govorun"}, {"name": "Martin Lenz"}], "featured_authors": [{"name": "Elena N. Govorun"}, {"name": "Martin Lenz"}], "author_count": 2}, {"id": "2604.01223", "category": "cond-mat", "title": "Electronic structure and correlation of La$_4$Co$_2$NiO$_8$Cl$_2$: a theoretical proposal for a La$_4$Ni$_3$O$_{10}$-like high-temperature superconductor", "abstract": "Based on the discovery of high-temperature superconductivity in the bilayer nickelate La$_3$Ni$_2$O$_7$, several Co-based La$_3$Ni$_2$O$_7$-like materials were theoretically predicted as possible high-temperature superconductors by electron doping. Motivated by these findings and the subsequent discovery of superconductivity in the trilayer nickelate La$_4$Ni$_3$O$_{10}$ under high pressure, we propose and investigate a Co-based La$_4$Ni$_3$O$_{10}$-like material. With electron doping to the high-pressure trilayer cobaltate La$_4$Co$_3$O$_{10}$, using density functional theory combined with dynamical mean-field theory (DFT+DMFT), we find that the resulting compound La$_4$Co$_2$NiO$_8$Cl$_2$ exhibits a crystal structure and a strongly correlated electronic structure similar to those of La$_4$Ni$_3$O$_{10}$ under high pressure. This suggests that this new compound may host high-temperature superconductivity.", "url": "https://arxiv.org/abs/2604.01223", "type": "理论+数值", "summary": "基于双层镍酸盐La$_3$Ni$_2$O$_7$中高温超导性的发现，理论上预测了几种Co基La$_3$Ni$_2$O$_7$类材料通过电子掺杂可能成为高温超导体。受这些发现以及随后在高压下三层镍酸盐La$_4$Ni$_3$O$_{10}$中超导性发现的启发，我们提出并研究了一种Co基La$_4$Ni$_3$O$_{10}$类材料。通过对高压三层钴酸La$_4$Co$_3$O$_{10}$进行电子掺杂，利用密度泛函理论结合动态平均场理论（DFT+DMFT），我们发现所得化合物La$_4$Co$_2$NiO$_8$Cl$_2$在高压下表现出与La$_4$Ni$_3$O$_{10}$相似的晶体结构和强关联电子结构。压力。这表明这种新化合物可能具有高温超导性。", "authors": [{"name": "Si-Yong Jia"}, {"name": "Jing-Xuan Wang"}, {"name": "Jian-Hong She"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "featured_authors": [{"name": "Si-Yong Jia"}, {"name": "Jing-Xuan Wang"}, {"name": "Jian-Hong She"}, {"name": "Rong-Qiang He"}, {"name": "Zhong-Yi Lu"}], "author_count": 5}, {"id": "2604.00083", "category": "hep-th", "title": "An All-Loop Amplituhedron in Two Dimensions", "abstract": "We define and study a positive geometry $\\Delta^{(L)}$ which serves as a natural generalization of loop amplituhedra to two-dimensional Minkowski space $\\mathbb{R}^{1,1}$. The geometry is formulated in the framework of lightcone geometries in dual momentum space, and can equivalently be obtained as a specific boundary of the $L$-loop amplituhedron for $\\mathcal{N}=4$ super Yang--Mills. The simplicity of the two-dimensional setting allows us to calculate the canonical form of $\\Delta^{(L)}$ at any loop order, which is shown to correspond to massless banana graphs. We integrate the canonical form at all loop orders in dimensional regularization, and find that the full IR divergence structure at $L$-loops is captured by the $L$th power of the one-loop result, a phenomenon analogous to IR exponentiation. Furthermore, these integrated functions can be resummed into a closed-form non-perturbative result given by a Fox--Wright function. In the limit where $L\\to\\infty$, the geometry gives rise to a path integral over worldlines, suggesting the emergence of a dual description at strong coupling. This construction provides a simple and tractable setting in which to explore the geometry of loop amplitudes, and offers a controlled toy model for investigating loop amplituhedra beyond their standard scope.", "url": "https://arxiv.org/abs/2604.00083", "type": "理论", "summary": "我们定义并研究了一个正几何 $\\Delta^{(L)}$，它作为循环振幅面体到二维 Minkowski 空间 $\\mathbb{R}^{1,1}$ 的自然推广。该几何结构是在双动量空间中的光锥几何框架中制定的，并且可以等效地获得$\\mathcal{N}=4$ super Yang--Mills 的$L$环振幅面体的特定边界。二维设置的简单性使我们能够以任何循环顺序计算 $\\Delta^{(L)}$ 的规范形式，这与无质量香蕉图相对应。我们在维度正则化中整合了所有循环阶数的规范形式，并发现 $L$ 循环处的完整 IR 发散结构由单循环结果的 $L$ 次方捕获，这种现象类似于 IR 求幂。此外，这些积分函数可以恢复为由 Fox-Wright 函数给出的封闭形式非微扰结果。在 $L\\to\\infty$ 的极限下，几何产生了世界线上的路径积分，这表明强耦合下对偶描述的出现。\n\n这种结构提供了一个简单且易于处理的设置，用于探索环振幅的几何形状，并提供了一个受控玩具模型，用于研究超出标准范围的环振幅六面体。", "authors": [{"name": "Jonah Stalknecht"}], "featured_authors": [{"name": "Jonah Stalknecht"}], "author_count": 1}, {"id": "2604.00095", "category": "hep-th", "title": "Instanton condensation and a new phase of BPS black holes", "abstract": "We analyse the 1/16-BPS superconformal index for BPS black holes at equal charge in $AdS_5 \\times S_5$, uncovering evidence for a new instability in the microcanonical ensemble along the small black hole saddle. This is indicated by instanton condensation in the matrix model description of the index. This instability occurs for black holes of radius close to, but below, the scale at which black holes become `small', and implies a new dominant phase in this region. We propose a connection to the partially deconfined phase in the field theory dual description. This would resolve recent confusion about the location of the partially deconfined phase in the BPS phase diagram and promises new avenues for understanding confinement, partial deconfinement, and the encoding of colour degrees of freedom under the holographic map. We also motivate the importance of instantons in partial deconfinement from a matrix model perspective.", "url": "https://arxiv.org/abs/2604.00095", "type": "理论", "summary": "我们分析了 $AdS_5 \\times S_5$ 中等电荷 BPS 黑洞的 1/16-BPS 超共形指数，发现了小黑洞鞍部微正则系综中新的不稳定性的证据。这通过指数的矩阵模型描述中的瞬子凝聚来指示。这种不稳定性发生在半径接近但低于黑洞变“小”尺度的黑洞中，并且意味着该区域存在新的主导相。我们提出了与场论对偶描述中的部分解除限制阶段的联系。这将解决最近关于 BPS 相图中部分解禁相位置的困惑，并为理解禁闭、部分解禁以及全息图下颜色自由度的编码提供新途径。我们还从矩阵模型的角度激发了瞬子在部分解除限制中的重要性。", "authors": [{"name": "Jack Holden"}], "featured_authors": [{"name": "Jack Holden"}], "author_count": 1}, {"id": "2604.00108", "category": "hep-th", "title": "de Sitter extremal surfaces, time contours, complexifications and pseudo-entropies", "abstract": "We study no-boundary de Sitter extremal surfaces and their pseudo-entropy areas for generic subregions at the future boundary, building on previous work. For large subregions, timelike+Euclidean extremal surfaces exist with transparent geometric interpretations, as do complex ones. The situation for small subregions is analogous to Poincare $dS$ and only complex extremal surfaces exist. In general, the extremal surface area integrals are defined via time contours in the complex time plane. We find multiple extremal surfaces with indistinguishable areas whose time contours can be deformed into each other in the complex time plane without obstruction, which are equivalent for these purposes. This also suggests equivalences between complex $dS$ replica geometries. We discuss $dS_3$ as a simple example at length. This suggests a picture for multiple subregions and entropy inequalities in de Sitter, as encoding $AdS$ ones via analytic continuation. We also discuss mapping future boundary subregions and those on constant time slices in the static patch via lightrays.", "url": "https://arxiv.org/abs/2604.00108", "type": "理论", "summary": "我们在之前工作的基础上，研究了未来边界处通用子区域的无边界德西特极值表面及其伪熵区域。对于大的子区域，类时+欧几里得极值面与复杂的极值面一样，具有透明的几何解释。小子区域的情况类似于庞加莱$dS$，并且仅存在复杂的极值表面。一般来说，极值表面积积分是通过复时间平面中的时间轮廓来定义的。我们发现多个具有不可区分区域的极值表面，其时间轮廓可以在复杂时间平面中无阻碍地相互变形，这对于这些目的是等效的。这也表明复杂的 $dS$ 副本几何形状之间的等效性。我们详细讨论 $dS_3$ 作为一个简单的例子。这表明德西特中的多个子区域和熵不等式的图片，通过分析延拓对 $AdS$ 进行编码。我们还讨论了通过光线映射未来边界子区域和静态补丁中恒定时间切片上的边界子区域。", "authors": [{"name": "K. Narayan"}], "featured_authors": [{"name": "K. Narayan"}], "author_count": 1}, {"id": "2604.00116", "category": "hep-th", "title": "How to (Non-)Perturb a BPS Black Hole", "abstract": "We relate the structure of non-perturbative corrections to BPS black hole observables in flat-spacetime theories with certain properties of probe charged particles in the near-horizon geometry. Concretely, we consider 4d $\\mathcal{N} = 2$ supergravity with an infinite tower of F-terms and probe branes in $\\text{AdS}_2\\times \\mathbf{S}^2$ backgrounds threaded by constant electric-magnetic fields. The higher dimensional operators we pick are computed by Type II topological string theory, and we approximate them via the constant map contribution, which is valid at large volume and can be interpreted as arising from D0-branes integrated out in M-theory on a Calabi-Yau threefold times a circle. We analyze the resulting force conditions on massive particles carrying $(q_A, p^A)$ charges, their classical trajectories, and the 1-loop effective action they produce. A simple semiclassical analysis allows us to understand qualitatively the structure of the non-perturbative corrections. The exact path integral assessment then reproduces the Gopakumar--Vafa integral of the flat-spacetime theory, now evaluated in the black hole attractor geometry. Thus, we make explicit how the physics of the fully backreacted black hole solution is controlled by the behaviour of the light D-brane states which generate the relevant set of higher derivative corrections.", "url": "https://arxiv.org/abs/2604.00116", "type": "理论", "summary": "我们将平坦时空理论中 BPS 黑洞可观测量的非微扰修正结构与近地平线几何中探测带电粒子的某些属性联系起来。具体来说，我们考虑 4d $\\mathcal{N} = 2$ 超引力，具有无限的 F 项塔，并在 $\\text{AdS}_2\\times \\mathbf{S}^2$ 背景中通过恒定电磁场进行探测膜。我们选择的高维算子是通过 II 型拓扑弦理论计算的，我们通过常量映射贡献来近似它们，这在大体积下有效，并且可以解释为由在卡拉比-丘三倍圆周上的 M 理论中积分出来的 D0 膜产生。我们分析了带有 $(q_A, p^A)$ 电荷的大质量粒子所产生的力条件、它们的经典轨迹以及它们产生的 1 环有效作用。简单的半经典分析使我们能够定性地理解非微扰校正的结构。然后，精确的路径积分评估再现了平坦时空理论的 Gopakumar-Vafa 积分，现在在黑洞吸引子几何中进行了评估。\n\n因此，我们明确了完全反反应的黑洞溶液的物理性质是如何由产生一组相关的更高导数校正的轻 D 膜态的行为控制的。", "authors": [{"name": "Alberto Castellano"}, {"name": "Matteo Zatti"}], "featured_authors": [{"name": "Alberto Castellano"}, {"name": "Matteo Zatti"}], "author_count": 2}, {"id": "2604.00139", "category": "hep-th", "title": "The Observer Paradigm in Semiclassical Gravity: A Postmodern Perspective", "abstract": "Recent advances in semiclassical gravity, both in our understanding of the gravitational path integral and the algebraic structure of a gravitating subregion, rely on the presence of an observer to obtain a nontrivial Hilbert space for closed universe backgrounds. Here I examine this proposal from a postmodern lens, identifying attempts to define ``observer rules'' as manifestations of metanarrative breakdown: the observer both supplies and undermines the perturbative gravitational Hilbert space. Rather than resolving this tension, I advocate for a post-postmodern acceptance of the incompatibility between observer-dependent and observer-free descriptions of closed universes, treating the ambiguity as a feature of quantum gravity's fundamental degrees of freedom. To my knowledge, this is the first reference to post-postmodernism in concert with physics.", "url": "https://arxiv.org/abs/2604.00139", "type": "理论", "summary": "半经典引力的最新进展，无论是在我们对引力路径积分和引力子区域的代数结构的理解方面，都依赖于观察者的存在来获得封闭宇宙背景的非平凡希尔伯特空间。在这里，我从后现代的角度审视这一提议，将“观察者规则”定义为元叙事崩溃的表现：观察者既提供又破坏微扰引力希尔伯特空间。我主张以后后现代的方式接受封闭宇宙的依赖于观察者和无观察者的描述之间的不相容性，而不是解决这种紧张关系，并将这种模糊性视为量子引力基本自由度的一个特征。据我所知，这是第一次将后现代主义与物理学结合起来。", "authors": [{"name": "Sean McBride"}], "featured_authors": [{"name": "Sean McBride"}], "author_count": 1}, {"id": "2604.00141", "category": "hep-th", "title": "Manifest Moebius invariance of massive tree-level three-point amplitudes in pure spinor superspace", "abstract": "Using BRST cohomology properties in pure spinor superspace and identities for OPE brackets of non-free fields, we obtain a new compact nested-bracket representation of massive tree-level three-point open-string amplitudes in which Moebius invariance is manifest. Explicit superspace calculations for amplitudes with level-one massive states confirm this finding, and we derive new BRST recurrence relations among three-point numerators to extend the result to arbitrary mass levels. This provides a manifestly Moebius-invariant expression for massive three-point amplitudes in the pure spinor formalism.", "url": "https://arxiv.org/abs/2604.00141", "type": "理论", "summary": "利用纯旋量超空间中的 BRST 上同调性质和非自由域 OPE 括号的恒等式，我们获得了大规模树级三点开弦振幅的新紧凑嵌套括号表示，其中表现出莫比乌斯不变性。对一级质量态振幅的显式超空间计算证实了这一发现，并且我们推导了三点分子之间新的 BRST 递推关系，以将结果扩展到任意质量水平。这为纯旋量形式中的大三点振幅提供了明显的莫比斯不变表达式。", "authors": [{"name": "Chen Huang"}, {"name": "Carlos R. Mafra"}, {"name": "Yi-Xiao Tao"}], "featured_authors": [{"name": "Chen Huang"}, {"name": "Carlos R. Mafra"}, {"name": "Yi-Xiao Tao"}], "author_count": 3}, {"id": "2604.00160", "category": "hep-th", "title": "Sine-Gordon solitons in AdS, dS and other hyperbolic spaces", "abstract": "We find infinitely many soliton-like solutions in a deformation of the sine-Gordon theory in $(d+1)$-dimensional $AdS_{d+1}$ (anti-de Sitter) spacetime for $d \\geq 2$, as well as single solitonic solutions in $dS_{d+1}$ (de Sitter) and $\\mathrm{H}{d+1}$ (Lobachevsky) spaces for $d \\geq 1$ and in $AdS_2$. We also find a deformation of the kink solution in scalar field theory with a polynomial potential in $AdS_2$. The deformation of the sine-Gordon theory strikingly resembles the bosonic part of the flat-space supersymmetric sine-Gordon theory. In the infinite radius limit, single soliton solutions reduce to solitons in flat space. Meanwhile, the multisoliton solution of $AdS{d+1}$, $d\\geq 2$ for certain values of the parameters reduces in the same limit to a single soliton solution boosted in the normal direction. However, there are also multisoliton solutions in $AdS_{d+1}$, $d \\geq 2$ that do not have a flat space limit.", "url": "https://arxiv.org/abs/2604.00160", "type": "理论", "summary": "我们在 $(d+1)$ 维 $AdS_{d+1}$ (反德西特) 时空中为 $d \\geq 2$ 找到无限多个正弦戈登理论变形中的类孤子解，以及在 $d \\geq 1$ 的 $dS_{d+1}$ (德西特) 和 $\\mathrm{H}{d+1}$ (Lobachevsky) 空间中找到无限多个类孤子解以及 $AdS_2$ 中。我们还发现标量场论中扭结解的变形，其多项式势为 $AdS_2$。正弦戈登理论的变形与平坦空间超对称正弦戈登理论的玻色子部分惊人地相似。在无限半径限制下，单个孤子解简化为平坦空间中的孤子。同时，对于某些参数值，$AdS{d+1}$, $d\\geq 2$ 的多孤子解在相同极限下减少为在法线方向上增强的单孤子解。然而，$AdS_{d+1}$、$d \\geq 2$ 中也存在没有平坦空间限制的多孤子解。", "authors": [{"name": "E.T. Akhmedov"}, {"name": "D.V. Diakonov"}], "featured_authors": [{"name": "E.T. Akhmedov"}, {"name": "D.V. Diakonov"}], "author_count": 2}, {"id": "2604.00182", "category": "hep-th", "title": "Limits to Computational Acceleration Imposed by Quantum Field Theory and Quantum Gravity", "abstract": "A computer, in order to perform a given computation, requires a certain amount of space (memory) and a certain amount of time (runtime). This leaves certain computations beyond reach due to technological limits on processing speed and memory density. Some computations, such as the halting problem, are not possible even in principle. However, curved spacetimes and exotic fields appear to provide avenues to accelerate computation, for instance by exploiting time dilation. Impossible computations seemingly become tractable, butting up against intuition. However, we show that such schemes are consistently thwarted by physical effects from quantum gravity (including swampland conjectures) and quantum field theory in curved space. More precisely, we show that an observer and a computer able to withstand energy scales up to order $E$ can, by using relativistic effects, accelerate computation at a rate of at most $\\mathcal O(1)E$ e-folds per unit time in natural units: $(\\ln\\alpha)/\\tau\\lesssim E$. The Bekenstein bound for entropy can then be understood as the space (memory) analogue to (run)time: if a computer of length scale $D$, operating at energies up to order $E$, has access to $N$ different memory states, then $(\\ln N)/D\\lesssim E$.", "url": "https://arxiv.org/abs/2604.00182", "type": "理论", "summary": "计算机为了执行给定的计算，需要一定量的空间（内存）和一定量的时间（运行时）。由于处理速度和内存密度的技术限制，某些计算无法实现。有些计算，例如停止问题，即使在原则上也是不可能的。然而，弯曲时空和奇异场似乎提供了加速计算的途径，例如通过利用时间膨胀。不可能的计算似乎变得容易处理，与直觉相悖。然而，我们表明，此类方案始终受到量子引力（包括沼泽猜想）和弯曲空间中的量子场论的物理效应的阻碍。更准确地说，我们表明，能够承受高达 $E$ 量级能量的观察者和计算机可以通过使用相对论效应，以自然单位每单位时间最多 $\\mathcal O(1)E$ e 倍的速度加速计算：$(\\ln\\alpha)/\\tau\\lesssim E$。\n\n熵的贝肯斯坦界限可以理解为与（运行）时间类似的空间（内存）：如果一台长度为 $D$ 的计算机，在高达 $E$ 的能量下运行，可以访问 $N$ 不同的内存状态，则 $(\\ln N)/D\\lesssim E$。", "authors": [{"name": "Leron Borsten"}, {"name": "Hyungrok Kim"}], "featured_authors": [{"name": "Leron Borsten"}, {"name": "Hyungrok Kim"}], "author_count": 2}, {"id": "2604.00193", "category": "hep-th", "title": "On Entropic Gravity from BFSS Matrix Theory", "abstract": "We study Matrix theory at strong coupling in a setting describing two static objects a fixed distance apart, using numerical techniques. We reproduce the exact general relativistic force law between the two objects as an entropic force in Matrix theory. This involves employing an operator algebra that represents an external observer measuring the relative positions and momenta of the two objects. We identify the location of the horizons of the objects from this entropic force and are led to a modification of the Schwarzschild spacetime inside the horizon. We find evidence that the inside of a black hole is instead to be described by AdS space. The conclusions constitute numerical validation of Verlinde's entropic gravity proposition and the fuzzball paradigm.", "url": "https://arxiv.org/abs/2604.00193", "type": "理论", "summary": "我们使用数值技术在描述两个相距固定距离的静态物体的设置中研究强耦合矩阵理论。我们将两个物体之间的广义相对论力定律再现为矩阵理论中的熵力。这涉及使用算子代数来表示测量两个物体的相对位置和动量的外部观察者。我们从这种熵力中识别出物体视界的位置，并导致视界内史瓦西时空的修改。我们发现证据表明黑洞内部可以用 AdS 空间来描述。这些结论构成了 Verlinde 熵引力命题和模糊球范式的数值验证。", "authors": [{"name": "Korin Aldam-Tajima"}, {"name": "Vatche Sahakian"}], "featured_authors": [{"name": "Korin Aldam-Tajima"}, {"name": "Vatche Sahakian"}], "author_count": 2}, {"id": "2604.00355", "category": "hep-th", "title": "The matrix edge of holography", "abstract": "The IKKT matrix model arises at the extremal $p= -1$ limit of holographic dualities based on D$p$-brane geometries. We review the one-dimensional maximal supergravity that governs bulk fluctuations dual to the lowest BPS multiplet of gauge-invariant operators in the IKKT model. We present the Killing spinor equations and discuss their general half-supersymmetric solutions within the $\\rm{SO}(3)\\times \\rm{SO}(7)$-invariant subsector. The explicit uplift of these solutions to Euclidean IIB supergravity in ten dimensions is provided.", "url": "https://arxiv.org/abs/2604.00355", "type": "理论", "summary": "IKKT 矩阵模型出现在基于 D$p$ 膜几何结构的全息对偶性的极值 $p= -1$ 极限处。我们回顾了 IKKT 模型中控制体积波动的一维最大超重力与规范不变算子的最低 BPS 倍数。我们提出了 Killing 旋量方程，并讨论了它们在 $\\rm{SO}(3)\\times \\rm{SO}(7)$ 不变子扇区内的一般半超对称解。提供了这些解决方案在十个维度上对欧几里得 IIB 超引力的明确提升。", "authors": [{"name": "Franz Ciceri"}, {"name": "Henning Samtleben"}], "featured_authors": [{"name": "Franz Ciceri"}, {"name": "Henning Samtleben"}], "author_count": 2}, {"id": "2604.00690", "category": "hep-th", "title": "Topological defect induced phase separation in a holographic system", "abstract": "We investigate the coupled dynamics of symmetry breaking and phase separation during quenches across the critical point in a first-order phase transition. Based on the Einstein-Maxwell-scalar theory, we construct a holographic superfluid model with $\\mathbb{Z}_2$ symmetry. By introducing higher-order nonlinear terms $\\lambda\\Psi^4$ and $\\tau\\Psi^6$ into the scalar field potential, we realize a rich phase structure, which enables us to study the coupling effects between symmetry breaking and phase separation. Furthermore, by preparing initial conditions with well-defined spatial partitions, we discover a new triggering mechanism for the invasion phenomenon, namely that kinks serve as triggering sites for the phase separation process. This study reveals a novel coupling mechanism between topological defects and phase separation, enriches our understanding of nonequilibrium structure formation in strongly coupled systems.", "url": "https://arxiv.org/abs/2604.00690", "type": "理论", "summary": "我们研究了一级相变临界点淬火过程中对称破缺和相分离的耦合动力学。基于爱因斯坦-麦克斯韦标量理论，我们构建了具有 $\\mathbb{Z}_2$ 对称性的全息超流体模型。通过在标量场势中引入高阶非线性项$\\lambda\\Psi^4$和$\\tau\\Psi^6$，我们实现了丰富的相结构，这使得我们能够研究对称破缺和相分离之间的耦合效应。此外，通过准备具有明确空间分区的初始条件，我们发现了一种新的入侵现象触发机制，即扭结作为相分离过程的触发位点。这项研究揭示了拓扑缺陷与相分离之间的新型耦合机制，丰富了我们对强耦合系统中非平衡结构形成的理解。", "authors": [{"name": "Zi-Qiang Zhao"}, {"name": "Zhang-Yu Nie"}, {"name": "Jing-Fei Zhang"}, {"name": "Xin Zhang"}], "featured_authors": [{"name": "Zi-Qiang Zhao"}, {"name": "Zhang-Yu Nie"}, {"name": "Jing-Fei Zhang"}, {"name": "Xin Zhang"}], "author_count": 4}, {"id": "2604.00769", "category": "hep-th", "title": "Tensionless hybrid strings in $\\rm AdS_3\\times S^3\\times S^3\\times S^1$: Free field realisation", "abstract": "We discuss a Wakimoto-like free field realisation of ${\\frak d}(2,1;\\alpha)_1$, whose $\\frak{sl}(2,\\mathbb{R})$ subalgebra has level $k=1$, that requires no gauging, i.e., realises the current algebra exactly. We then compute the partition function of the theory and show that, by combining this with the ghost contribution, the full, on-shell projected string partition function reproduces precisely the single-particle partition function of the ${\\rm Sym}^N({\\cal S'}_0^2)$ theory, i.e. the symmetric orbifold theory of 8 free fermions, 1 compact free boson, and 1 non-compact free boson. We also discuss other aspects such as DDF operators and BRST and physical state conditions.", "url": "https://arxiv.org/abs/2604.00769", "type": "理论", "summary": "我们讨论 ${\\frak d}(2,1;\\alpha)_1$ 的类似 Wakimoto 的自由场实现，其 $\\frak{sl}(2,\\mathbb{R})$ 子代数具有级别 $k=1$，不需要测量，即准确地实现当前代数。然后，我们计算理论的配分函数，并表明，通过将其与幽灵贡献相结合，完整的壳上投影弦配分函数精确地再现了 ${\\rm Sym}^N({\\cal S'}_0^2)$ 理论的单粒子配分函数，即 8 个自由费米子、1 个紧致自由玻色子和 1 个非紧致自由玻色子的对称轨道折叠理论。我们还讨论了其他方面，例如 DDF 算子和 BRST 以及物理状态条件。", "authors": [{"name": "Vit Sriprachyakul"}], "featured_authors": [{"name": "Vit Sriprachyakul"}], "author_count": 1}, {"id": "2604.00924", "category": "hep-th", "title": "Superconformal index for $\\mathcal{N} = 4$ Super Yang-Mills and Elliptic Macdonald Polynomials", "abstract": "We establish a connection between the superconformal index of $\\mathcal{N}=4$ $U(N)$ SYM and the elliptic Ruijsenaars-Schneider integrable system. The index admits an expression in terms of elliptic Macdonald polynomials, which leads to a compact summation over generalized partitions involving the structure constants $
