name: Update arXiv Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '15 13 * * *'

permissions:
  contents: write

jobs:
  update-arxiv-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-arxiv-daily.txt

      - name: Generate arXiv daily archive
        run: python -u tools/generate_arxiv_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arxiv_daily
          if git diff --cached --quiet; then
            echo "No arXiv Daily changes detected."
            exit 0
          fi
          git commit -m "Update arXiv daily digest"
          git push